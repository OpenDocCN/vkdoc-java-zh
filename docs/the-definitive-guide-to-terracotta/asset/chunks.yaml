- fmt: '# In building an e-commerce site that has grown to be among the top ten in
    the world—a monster—some architectural decisions proved critical, while others
    were not as important as initially assumed. The application was to be load balanced
    and stateful with all business data and associated workflow managed via transactions
    in the database. Database transactions seem, in retrospect, an obvious mistake,
    mostly because transactions in a three-tier system imply spreading workflow between
    the database and the Java tier. The Java tier generates the update task and asks
    the database to make changes that can be rejected for various reasons.


    Now, this seems like having two conductors of an orchestra.


    Discussing Terracotta’s origins might seem like a tangent to the discussion of
    scaling the application tier. It is not: the architecture should have been predicated
    on workflow in the Java tier. But there was a problem with workflow in the Java
    tier in the year 2000. That problem was one of volatility of memory (or heap).
    If conversational state, otherwise known as workflow state, were to be maintained
    in memory, then conversations could be lost. At the time, there was no linearly
    scalable way to deliver high availability for in-memory replicated state. So the
    business data was stored in the database and cached in the application tier, thrusting
    the site into a stateful/stateless hybrid where database data was cached and replicated
    in memory to avoid database bottlenecks. Think of the architecture as “read from
    memory,” because most database data was cached, and “write to disk,” because all
    I/O was made in a durable fashion by flushing those updates to the database directly.


    One alternative at the time was distributed transactions. The underpinnings of
    sharing state and coordinating updates across Java processes in a coherent fashion
    did not exist in the JVM or as a scalable Java service, and building a distributed
    in-memory system with transactional guarantees seemed hard. Another alternative
    was an eventually correct architecture.


    While other sites such as Amazon.com took an eventually correct approach where
    each application instance could complete transactions to local disk and eventually
    flush to the database, Terracotta’s founders chose not to. The business was not
    prepared to discuss the ramifications of an eventually correct architecture, where
    users might be told that a previously confirmed purchase order could not be completed
    because of miscalculations in inventory long after checkout completed.


    986-1 CH02.qxd 4/28/08 9:54 AM Page 32


    **32**


    C H A P T E R 2 ■ H I S TO RY O F T E R R A C OT TA


    > **Note** By “eventually correct,” we refer to the CAP theorem, which refers
    to the trade-off between consistency, availability, and partitioning. An eventually
    correct architecture is one that prioritizes partitioning over consistency. For
    example, an e-commerce purchase transaction can be conducted on two separate nodes
    and reconciled later by realizing that the same customer is buying the same products
    at the same time and thus one order should be canceled before debiting the customer’s
    financial accounts.


    ## The Application Is a Giant Computer


    Within weeks of initial launch, the production application was failing to handle
    the user volumes, and the database was the culprit. We immediately learned our
    first lesson: the n-tier application should be viewed as if it were a giant multiprocessor
    computer. The modern Intel architecture calls for several levels of caching between
    the processor, which is running very fast, and the I/O subsystems, which cannot
    keep up with that processor. Multiprocessor computers have registers on the chip,
    an L1 cache on the chip as well, and an L2 cache that is external to the chip
    but can either be dedicated per chip or shared across processors.


    The processor reads through these various caching layers of main memory. Data
    from main memory gets cached in the L2 and again in the L1. If a thread moves
    across processors, data in the thread’s stack must move from one chip’s cache
    to the other’s as part of the process of context switching. The hardware deals
    with the coherence of each of these levels of cache somewhat transparently.


    The L2 cache is much larger than the L1 cache but significantly slower as it is
    not on-chip. This implies a significant cost to go to L2, but modern servers have
    large L2 caches because the cost of going to L2 is still much lower than going
    to main memory. Sharing L2 can drastically reduce or even eliminate the cost of
    a context switch.


    In the analogy between motherboards and applications, we can think of the L1 as
    caching inside the JVM, because the application pays almost no price for going
    to its own heap. In n-tier applications, the application server spends several
    hundred milliseconds on average per query waiting for the database. In the chip
    analogy, the CPU spends several thousand cycles waiting for main memory or disk.
    The database is expensive, like main memory on the motherboard.


    Once we realized this, the presence of a cache in each Java process felt like
    an L1 cache on the processor. It became reasonable and acceptable, if not obvious,
    to introduce an L2 cache that could work as the superset cache of all L1 caches.
    This L2 service helped application instances avoid waiting for the database as
    well as lessening the cost of context switching tasks across those application
    server instances. If the L2 were to succeed for this web monster, it had only
    one requirement—calling the L2 had to be lower cost than calling the underlying
    database, ideally an order of magnitude faster.


    Once delivered, this approach of L1 combined with an L2 caching service eliminated
    a few big scalability bottlenecks. First, just like on the motherboard, there
    no longer was pressure to fit all thread data into the L1 cache inside the application
    server. The entire dataset could, instead, be cached in L2 regardless of how much
    or little memory the application servers had as long as the shared L2 could spill
    to disk. This allowed application servers to stay very small. Second, the L1 could
    free memory when under high load simply by dropping parts or all of its cache
    data. The L1 could arbitrarily and unilaterally evict items from cache without
    causing downstream pressure on the database, since the L2 would protect the application
    from the database and vice versa. This allowed the application servers to maintain
    predictable throughput and simultaneously kept the database working at sustainable
    lower query volumes, well below the actual query traffic the site was generating.


    A third benefit of running an L2 cache outside the application servers and sharing
    that L2 across application server instances was that the L2 provided availability
    to the data in cache even when the database was down. The L1 could use traditional
    caching techniques, such as least-recently-used/least-frequently-used, to flush
    the cache. Even if the database were busy or otherwise unavailable, the L2 was
    there to handle the requests. Getting the L2 to outperform the underlying database,
    therefore, provided not just scalability but high availability.


    Because of the L2 concept, the web site could spread across machines to get easy
    scalability and availability. With the L2 service, the database’s role in helping
    to scale the system was greatly diminished. And with the L1 cache inside the application
    server instances, linear scale was achievable.


    > **Note** With two machines, a well-designed application should be able to do
    twice as much work as one.'
