  raw: 'In the event that all of the session data will fit on the physical heap of
    the application servers, a round-robin load balancer will tend to pin all of the
    active session data into the local heap of all of the application servers. This
    happens because requests for any given session will tend to be evenly distributed
    across the active servers. During the processing of those requests, the session
    data will be automatically faulted into whichever server is handling the request
    until, eventually, every server will have served a request for every session.
    Therefore, every session will reside on each server’s heap, which will cause every
    change to every session to be propagated to every application server. The amount
    of network traffic, processing, and overhead to keep session state in sync across
    the cluster multiplies with the number of application servers. Because this architecture
    doesn’t scale linearly, at some point, adding new servers to meet increasing demand
    will result in diminishing returns and a hard limit on the scalability of the
    application.


    This situation gets remarkably worse when not all of the active session data will
    fit into available physical heap on the application servers. In this case, not
    only is there the extra overhead of keeping all of the session data in sync, but
    the Terracotta object cache in each application server will start to thrash. This
    happens because, as the amount of heap taken up by session data increases beyond
    what will fit into the Terracotta object cache, the Terracotta client will take
    steps to evict objects from the cache. However, since a round-robin load balancer
    distributes all sessions to all application servers evenly, there will be no active
    sessions that are used less than others; to conserve memory, the Terracotta virtual
    memory subsystem will be evicting active session data, which will soon need to
    be faulted in again.


    This cache churn will seriously affect the performance of the Terracotta virtual
    heap, further degrading scalability. You may have experienced a situation very
    much like this on your own computer if your active memory usage has ever exceeded
    the available physical RAM. As the programs on your computer compete for access
    to memory that doesn’t all fit into RAM, your memory I/O degrades from RAM speed
    to disk speed causing your computer to become sluggish and unusable.


    Using a Sticky Load Balancer


    Given the negative impact of a round-robin load balancer on Terracotta scalability,
    we strongly caution against using one. Instead, a much friendlier load-balancing
    scheme is one that maintains session affinity between users and the servers hosting
    their session. This kind of sticky load balancer tends to keep data for a particular
    session on only one application server, greatly increasing locality of reference.
    Since data for any given session is only in the physical heap of one server, changes
    to it need not be propagated to any other application server, eliminating much
    of the network and processing overhead of maintaining the virtual heap.


    Also, since data for any given session is only in the physical heap of one server,
    it doesn’t take up heap space on any other application server, reducing the overall
    amount of physical heap required and minimizing cache churn. Accurately provisioning
    your cluster is also easier, since you know how many active sessions will fit
    into the physical heap of an application server. When the number of active sessions
    grows beyond what will fit in physical heap, you can provision more application
    servers, keeping the number of sessions per server constant and ensuring that
    all of the active objects will fit in the local Terracotta cache. As an example,
    assume your application session objects take 1KB each, and you have 1MB of memory
    per server. A server can therefore handle 1000 sessions. If your web site will
    be visited by 10,000


