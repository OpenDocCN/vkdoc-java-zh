  trans: '

    当越来越多的内部 SEDA 阶段必须参与对象更新时，Terracotta 服务器将成为瓶颈。例如，如果对一个对象的更新需要广播到多个 JVM 并刷新到磁盘，并且该更新针对的是最近事务中已更新的相同对象，则服务器必须对所有操作进行排序，并在等待其他操作完成时挂起多个处理阶段。JVM
    之间重叠的对象更新越少，系统运行速度就越快。将对象保留在不需要它们的 JVM 之外，并尽可能将对象常驻内存以靠近处理器的概念，被称为**引用局部性**。


    成功调优应用程序的秘诀之一就是尝试维持引用局部性。“引用”指的是对象引用，“局部性”指的是尽可能将对象引用保持在 L1 和 L2 缓存附近。如果 Terracotta
    管理的数据占用的空间超过可用内存，L1 将无法维持局部性，并且会将任何不需要或无法保留的数据溢出到 L2。如果 Terracotta 管理的数据必须溢出到磁盘，L2
    将无法维持局部性。


    任何及所有 I/O——无论是磁盘、网络，甚至是内存——都可能导致应用程序瓶颈。快照和可视化工具收集的数据提供了系统可能执行 I/O 并最终等待该 I/O 的每个点的针对性视图。


    使用该工具自行确认您的应用程序具有良好的局部性，这意味着在大部分时间里，不需要频繁地从 L2 到 L1 以及从磁盘到 L2 进行对象错误加载。回想一下，我们以不同的方式执行了
    `inventory.pounder` 应用程序。`pounder` 处理 `productArray` 中的随机元素，这意味着两个 JVM 一直在对相同的对象进行更改。而
    `poundOneProduct()` 则是在一个循环中更新同一个产品，即 1GB 闪存卡，这明确破坏了引用局部性，并强制在两个 JVM 之间推送和确认对象更改。最后一个模型处理的是两个不同的对象，每个
    JVM 中各一个。


    可以将引用局部性类比为线性可扩展性。只要我们的应用程序在运行时不跨 JVM 共享对象，除了与 L2 的通信外，就不需要其他通信。这是最快的运行方式，因为 L2
    不会为了等待其他 L1 确认更新而阻塞来自任何一个 L1 的事务流。让我们自行确认，以高度本地化模式运行的 `inventory.pounder` 应用程序比在所有
    JVM 中更新随机对象时运行得快得多。


    **inventory.pounder 中的特定瓶颈**


    我们在本章开头创建的 `pounder` 基本上以两种不同的模式运行。这些模式经过精心设计，旨在说明真实应用程序在 Terracotta 环境中运行时将遇到的关键瓶颈。鉴于您对
    Terracotta 服务器内部机制的新理解，让我们回顾一下这三个测试。


    广播更改


    每当多个 JVM 触及同一个对象时，就会出现一个问题：一个上下文中的所有更改必须发送到该对象驻留的所有 JVM。在我们每个 `pounder` 测试中，特定的广播速率（由工具测量的每事务广播次数）是不同的。这将直接导致不同的性能特征。我们将通过检查两个
    JVM 在同一个产品上、在同一映射中的不同产品上以及在不同映射上（使用独立根运行时，`inventory` 与 `inventory2`）进行压力测试时的事务吞吐量来验证这一断言。


    锁获取


    现在让我们考虑获取锁的成本。通过网络获取锁可能代价高昂，原因有二。第一个问题是，如果 JVM 不必首先通过网络到 L2 请求锁，它们可以更快地锁定和解锁。第二个问题是，Java
    锁定是排他性的，这意味着一个锁内一次只允许一个线程。


    在本书中，我们多次提到贪婪锁优化。我们可以通过查看各种 `pounder` 测试运行期间记录的锁定统计信息来确认此优化是否存在。考虑仅在单个 JVM 上再次运行
    `pounder`。在这种修改后的测试中，JVM 会将所有锁保留在本地，并且不会向 L2 发出任何锁请求。因此，这种修改应该会显著增加每秒事务数，或者相应地减少完成场景所用的时间。


    在您运行的测试中，`poundRandomProducts()` 随机更新对象，其贪婪性低于在循环中更新同一产品 `1GFR` 的测试。在第二种场景中，Terracotta
    服务器将贪婪地授予锁，并且 L1 将在将锁让给其对等节点之前保持该锁多次迭代。在第一种场景中，系统无法判断这种将锁长时间授予 L1 的优化是否有益，因为 L1
    每次通过循环时都会获取不同的锁。


    由于 L1 处理的对象随时间变化，因此在处理随机对象时，贪婪锁优化的效率较低，因此锁获取是一个有趣的瓶颈。我们将在测试结果中研究锁的贪婪性。


    **可视化瓶颈**


    现在您已经深入理解了堆栈中的各个层，可视化各层之间微妙的相互作用将具有启发性。首先，再次启动 Terracotta 可视化工具。


    > cd $TC_HOME/lib; java -cp tc.jar com.tc.admin.cvt.ClusterVisualizerFrame 使用检索功能从三次
    `pounder` 运行中获取数据。保持所有复选框选中，然后单击“生成图表”。图 12-9 演示了如何执行此操作。


    滚动浏览右侧窗格中的各种图表。注意每个客户端和 Terracotta 服务器的不同事务速率。请记住，事务可以批量提交，锁可以贪婪地授予。因此，L1 实例和
    L2 CPU 对系统内这些事件发生次数的看法应该不同。


    让我们重点关注两个图表：L2 视角的事务速率（如图 12-13 所示），以及同一时间段内 L2 内部的 SEDA 阶段（如图 12-14 所示）。


    ![Image 28](img/index-342_1.jpg)


    986-1 CH12.qxd 5/28/08 10:06 PM Page 318


    **318**


    第十二章 n 可视化应用程序


    **图 12-13.** *可视化测试运行之间的吞吐量差异* **图 12-14.** *所有测试期间 Terracotta 服务器内部的 SEDA 队列深度*
    图 12-13 显示了每种场景的事务速率。首先，我们观察到最高的事务速率出现在使用独立根的情况下。这是有道理的，因为两个 JVM 彼此不共享任何信息，因此永远不必等待
    Terracotta 授予它们锁或将更新应用于内存。Terracotta 检测到 JVM 一和 JVM 二中没有共享对象，因此，在 L2 提交更改时，永远不会让任何一个
    JVM 等待。所有对象更新


    ![Image 29](img/index-343_1.png)


    986-1 CH12.qxd 5/28/08 10:06 PM Page 319


    第十二章 n 可视化应用程序


    **319**


    都变为异步。换句话说，在完美的局部性下，JVM 始终信任自己的堆，并且在将数据写入堆时永远不会被等待。在这种场景下，JVM 将以本地 CPU 的速度运行。

