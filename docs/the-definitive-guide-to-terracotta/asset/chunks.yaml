    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    **73**


    changes that can be made under that lock; the fact that locks are associated with
    objects is essentially syntactic sugar). The JVM ensures that the state of all
    objects visible to a thread that has acquired a particular lock reflects all of
    the changes to those objects made under the scope of that same lock by all other
    threads.


    Another thread-related function connected to locking provided by the JVM is the
    wait() and notify() facility. An object that holds a lock on an object may call
    the wait() method on that object, which will cause that thread of execution to
    pause. That thread will remain paused until either a specified time interval has
    passed or until another thread calls notify() or notifyAll(). When a waiting thread
    is notified, it is placed back into contention for the lock on the object in question.
    Thread coordination to perform all sorts of time- and sequence-sensitive operations
    can be programmed using just the concurrency primitives, synchronized(), wait(),
    and notify(). Over time, these concurrency concerns have been encapsulated into
    standard Java libraries, most notably the java.util.concurrent package (which,
    incidentally, can also be clustered by Terracotta).


    Terracotta provides exactly the same access serialization, coordination, and visibility
    guarantees to threads in different JVMs as the JVM itself provides to threads
    within the same JVM. The facilities that Terracotta uses to provide these guarantees
    take the form of locks and transactions.


    **Locks**


    Terracotta extends the built-in locking semantics of the JVM to have a clusterwide,
    cross-JVM


    meaning. Clustered locking is injected into application code based on the <locks>
    section of the Terracotta configuration file. Each lock configuration stanza uses
    a regular expression that matches a set of methods. The locking that Terracotta
    injects into that set of methods is controlled by further configuration options
    specified in the lock configuration stanza.


    We did some lock configuration in the last chapter for HelloClusteredWorld. There,
    we had a lock configuration stanza that looked like this:


    <locks>


    <autolock>


    <lock-level>write</lock-level>


    <method-expression>void HelloClusteredWorld.main(..)</method-expression>


    </autolock>


    </locks>


    This configuration stanza tells Terracotta to look for methods in your code that
    match the method expression. The method expression is expressed in a pattern selection
    language developed by AspectWerkz, a pioneering aspect-oriented programming (AOP)
    framework. This pattern selection language allows you to specify particular sections
    of your code. In AOP parl-ance, this is known as a join point. Using this expression
    language, you can precisely specify how Terracotta should treat the locking in
    your code. For a complete reference to the AspectWerkz pattern language, see [http://www.terracotta.org/confluence/display/docs1/](http://www.terracotta.org/confluence/display/docs1)


    AspectWerkz+Pattern+Language.


    Let’s use the main() method in our familiar HelloClusteredWorld program to discuss
    the effect of each lock configuration option. For convenience, we’ll reiterate
    it here:


    986-1 CH04.qxd 5/6/08 3:01 PM Page 74


    **74**


    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    public static void main( String args[] ) throws Exception {


    while( true ) {


    synchronized( buffer ) {


    int messageIndex = loopCounter++ % length;


    if(messageIndex == 0) java.util.Arrays.fill(buffer, ''\u0000'');


    buffer[messageIndex] = message.charAt(messageIndex);


    System.out.println( buffer );


    }


    Thread.sleep( 100 );


    }


    }


    **Autolocks and Named Locks**


    A lock stanza must be specified as either a named lock or an autolock. Methods
    that match an autolock stanza are augmented by Terracotta to acquire a clusterwide
    lock on a clustered object wherever there is synchronization on that object. You
    can think of autolocks as an extension of a method’s existing Java synchronization
    to have a clusterwide meaning. The configuration for HelloClusteredWorld uses
    an autolock that tells Terracotta to inspect the main() method for synchronization.
    In this case, the synchronization on the buffer field is augmented by Terracotta
    to have a clusterwide effect.


    Unlike autolocks, named locks function only at method entry and exit. This means
    that, for methods that match a named lock configuration stanza, a thread must
    first acquire the lock of that name from the Terracotta server before being allowed
    to execute that method. As a result, named locks are very coarse grained and should
    only be used when autolocks are not possible. Had we chosen to use a named lock
    for HelloClusteredWorld, only one thread in the entire cluster would have been
    allowed into the main() method at a time. The effect would be to allow the first
    JVM to execute the main() method. Thereafter, any JVM that joins the cluster would
    block at the entrance to the main() method attempting to acquire the named lock.


    Since the main() method never exits, all except the first JVM would block indefinitely
    or until the first JVM was terminated, at which point another JVM would be granted
    the lock and be allowed into the main() method.


    Autolocks can provide considerably more concurrency than named locks, but autolocks
    only acquire a lock if the object being synchronized on is a clustered object.
    In automatically locked methods, if the object being synchronized on is not a
    clustered object, then only the local JVM lock is acquired. For example, if an
    object of type product is clustered, maintains a reference to objects of type
    productprice, and you exclude the productprice object from instrumentation, product
    will not be updated across a cluster of JVMs when methods in the productprice
    class are invoked.


    Autolocks applied to methods that have no synchronization in them will have no
    clustered locking. Also, methods that match a lock stanza but do not belong to
    a class included in the set of classes configured for instrumentation by Terracotta
    will have no clustered locking behavior. Such methods are invisible to Terracotta
    (more on class instrumentation later).


    986-1 CH04.qxd 5/6/08 3:01 PM Page 75


    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    **75**


    **Lock Level**


    Another configuration option in the lock configuration stanza is the lock level.
    Unlike Java, Terracotta locks come in four levels:


    • write


    • synchronous-write


    • read


    • concurrent


    Write locks are mutual exclusion locks that act like regular Java locks. They
    guarantee that only one thread in the entire cluster can acquire that lock at
    any given time.


    Synchronous write locks add the further guarantee that the thread holding the
    lock will not release the lock until the changes made under the scope of that
    lock have been fully applied and acknowledged by the server.'
  trans: "\n在 JVM 中，通过使用互斥锁同步对某些关键代码区域的访问，来保护对象数据免受并发线程执行的影响。在线程进入由 `synchronized`\
    \ 块标识的此类关键代码段之前，它必须首先获取一个互斥锁，该锁将对该代码段的访问进行序列化。任何两个线程都不能同时执行 `synchronized` 块中的代码。\n\
    \n除了提供对关键代码段的序列化访问之外，同步代码块的锁获取和随后的锁释放还为对象数据的一致性提供了另一个关键功能：它们充当了事务边界，线程对对象所做的更改在此边界内进行批处理和排序。当一个线程获取一个对象的锁（也称为其监视器）时，对于其他线程对该对象所做的更改的可见性，存在某些保证（实际上，对象的锁与在该锁下可以进行的更改之间没有关系；锁与对象关联这一事实本质上是语法糖）。JVM\
    \ 确保，对于一个已获取特定锁的线程可见的所有对象的状态，都反映了所有其他线程在同一锁的作用域下对这些对象所做的所有更改。\n\nJVM 提供的与锁定相关的另一个线程功能是\
    \ `wait()` 和 `notify()` 机制。持有对象锁的线程可以调用该对象的 `wait()` 方法，这将导致该执行线程暂停。该线程将保持暂停状态，直到指定的时间间隔过去，或者直到另一个线程调用\
    \ `notify()` 或 `notifyAll()`。当等待的线程被通知时，它会被重新置于对相关对象锁的竞争状态。仅使用并发原语 `synchronized()`、`wait()`\
    \ 和 `notify()`，就可以编写执行各种时间和序列敏感操作的线程协调程序。随着时间的推移，这些并发问题已被封装到标准 Java 库中，最著名的是 `java.util.concurrent`\
    \ 包（顺便提一下，该包也可以由 Terracotta 进行集群）。\n\nTerracotta 为不同 JVM 中的线程提供了与 JVM 自身为同一 JVM\
    \ 内线程提供的完全相同的访问序列化、协调和可见性保证。Terracotta 用于提供这些保证的机制采用锁和事务的形式。\n\n**锁**\n\nTerracotta\
    \ 将 JVM 内置的锁定语义扩展到具有集群范围、跨 JVM 的含义。集群锁定基于 Terracotta 配置文件的 `<locks>` 部分注入到应用程序代码中。每个锁配置节使用一个正则表达式来匹配一组方法。Terracotta\
    \ 注入到该组方法中的锁定行为，由锁配置节中指定的进一步配置选项控制。\n\n在上一章中，我们为 HelloClusteredWorld 进行了一些锁配置。在那里，我们有一个如下所示的锁配置节：\n\
    \n<locks>\n    <autolock>\n        <lock-level>write</lock-level>\n        <method-expression>void\
    \ HelloClusteredWorld.main(..)</method-expression>\n    </autolock>\n</locks>\n\
    \n此配置节告诉 Terracotta 在代码中查找与该方法表达式匹配的方法。该方法表达式使用由 AspectWerkz（一个开创性的面向方面编程（AOP）框架）开发的模式选择语言来表达。这种模式选择语言允许你指定代码的特定部分。用\
    \ AOP 的术语来说，这被称为连接点。使用这种表达式语言，你可以精确指定 Terracotta 应如何处理代码中的锁定。有关 AspectWerkz 模式语言的完整参考，请参见\
    \ [`www.terracotta.org/confluence/display/docs1/`](http://www.terracotta.org/confluence/display/docs1)\
    \ AspectWerkz+Pattern+Language。\n\n让我们使用熟悉的 HelloClusteredWorld 程序中的 `main()`\
    \ 方法来讨论每个锁配置选项的效果。为方便起见，我们在此重申一下：\n\npublic static void main( String args[] )\
    \ throws Exception {\n    while( true ) {\n        synchronized( buffer ) {\n\
    \            int messageIndex = loopCounter++ % length;\n            if(messageIndex\
    \ == 0) java.util.Arrays.fill(buffer, '\\u0000');\n            buffer[messageIndex]\
    \ = message.charAt(messageIndex);\n            System.out.println( buffer );\n\
    \        }\n        Thread.sleep( 100 );\n    }\n}\n\n**自动锁和命名锁**\n\n锁节必须指定为命名锁或自动锁。匹配自动锁节的方法会被\
    \ Terracotta 增强，以便在对象上存在同步的地方获取该对象的集群范围锁。你可以将自动锁视为方法现有 Java 同步的扩展，使其具有集群范围的含义。HelloClusteredWorld\
    \ 的配置使用了一个自动锁，告诉 Terracotta 检查 `main()` 方法中的同步。在这种情况下，对 `buffer` 字段的同步被 Terracotta\
    \ 增强，以具有集群范围的效果。\n\n与自动锁不同，命名锁仅在方法入口和出口处起作用。这意味着，对于匹配命名锁配置节的方法，线程必须先向 Terracotta\
    \ 服务器获取该名称的锁，然后才能被允许执行该方法。因此，命名锁非常粗粒度，仅应在无法使用自动锁时使用。如果我们为 HelloClusteredWorld\
    \ 选择使用命名锁，那么整个集群中一次只允许一个线程进入 `main()` 方法。其效果将是允许第一个 JVM 执行 `main()` 方法。此后，任何加入集群的\
    \ JVM 都将在 `main()` 方法的入口处阻塞，试图获取该命名锁。由于 `main()` 方法永远不会退出，除了第一个 JVM 之外的所有 JVM\
    \ 都将无限期阻塞，或者直到第一个 JVM 被终止，此时另一个 JVM 才会被授予锁并被允许进入 `main()` 方法。\n\n自动锁可以提供比命名锁多得多的并发性，但自动锁仅在同步的对象是集群对象时才获取锁。在自动锁定的方法中，如果同步的对象不是集群对象，则仅获取本地\
    \ JVM 锁。例如，如果 `product` 类型的对象是集群的，并且它维护了对 `productprice` 类型对象的引用，而你排除了对 `productprice`\
    \ 对象的检测，那么当调用 `productprice` 类中的方法时，`product` 将不会在 JVM 集群中更新。\n\n应用于没有同步的方法的自动锁将不会产生集群锁定效果。此外，匹配锁节但不属于\
    \ Terracotta 配置为进行检测的类集合中的类的方法，将不会有集群锁定行为。此类方法对 Terracotta 是不可见的（稍后会详细介绍类检测）。\n\
    \n**锁级别**\n\n锁配置节中的另一个配置选项是锁级别。与 Java 不同，Terracotta 锁有四个级别：\n\n*   write\n*  \
    \ synchronous-write\n*   read\n*   concurrent\n\n写锁是互斥锁，其行为类似于常规的 Java 锁。它们保证在整个集群中，任何时候只有一个线程可以获取该锁。\n\
    \n同步写锁增加了进一步的保证：持有锁的线程不会释放该锁，直到在该锁作用域下所做的更改已被服务器完全应用并确认。\n"
- fmt: '# Caution


    While synchronous-write locking sounds like a good idea for guaranteed transactions,
    the overhead is high. The JVM holding the lock will be blocked while the Terracotta
    server receives acknowledgement from all other JVMs and while the server flushes
    the change to disk. Normally, Terracotta allows threads to continue and asynchronously
    waits for acknowledgement, so the performance difference will be large.


    Read locks allow multiple reader threads to acquire the lock at a time, but those
    threads are not allowed to make any changes to clustered objects while holding
    the read lock. No thread may acquire a write lock if any thread holds a read lock.
    No thread may acquire a read lock if any thread holds a write lock. If a thread
    attempts to make modifications while holding a read lock, Terracotta will cause
    an exception to be thrown.


    If, however, it crosses another lock acquisition boundary on the same lock (e.g.,
    a synchronization on the same object), but that new lock acquisition boundary
    is configured to be a write lock, that thread will try to upgrade its lock from
    a read lock to a write lock and will not be allowed to proceed until it acquires
    that upgraded write lock. Read locks offer a significant performance advantage
    over write locks when multiple threads concurrently execute code that does not
    modify any clustered objects.


    Concurrent locks are always granted. They do not protect critical code sections
    and serve only as transaction boundaries. Changes made within the scope of a concurrent
    lock are applied automatically, but there is no guarantee about the order in which
    transactions created in the scope of concurrent locks in different threads are
    applied. Nor is there a guarantee that changes from other threads are not being
    received and applied to heap while inside the lock.


    You should only use concurrent locks when you care about neither potential write-write
    conflicts between threads nor about dirty reads. Concurrent locks are best when
    every JVM is guaranteed to work on different objects from any other JVM yet Terracotta
    is in use for things like master/worker relationship (see Chapter 11).


    # Distributed `wait()` and `notify()`


    A thread that holds the clustered lock for a clustered object may call `wait()`
    on that object. This will cause the thread to commit the current Terracotta transaction,
    release the clustered lock, and pause execution. Any other thread in the cluster
    that holds the clustered lock on that object may call `notify()` on that object.
    The Terracotta server will select a waiting thread (in the case of a `notify()`
    call) or the set of all waiting threads (in the case of a `notifyAll()` call)
    and ensure that the appropriate waiting threads throughout the Terracotta cluster
    are notified.


    Any thread that is notified will contend for the clustered lock and resume execution
    when granted that lock.


    # Transactions


    Terracotta batches changes made to objects into sets called transactions. A Terracotta
    transaction is bounded by the acquisition and later release of a lock. When a
    thread acquires a clustered lock, a Terracotta transaction is started for that
    thread, and all changes to clustered objects made by that thread within the scope
    of that lock are added to that transaction. When the lock is released, the Terracotta
    transaction is committed, meaning that it is sent to the Terracotta server. (It
    might not be sent immediately; Terracotta optimizes the conversation between clients
    and the Terracotta server by batching transactions when possible.) Transactions
    are applied in order to preserve the "happens before" relationship discussed in
    Chapter 1. When a lock is acquired, Terracotta guarantees that all of the transactions
    made under the scope of that lock in every JVM in the Terracotta cluster are applied
    locally on the heap of the acquiring thread. This ensures that threads always
    see a consistent view of clustered objects.


    All changes to clustered objects must happen within the context of a Terracotta
    transaction. This means that a thread must acquire a clustered lock prior to modifying
    the state of any clustered objects. If a thread attempts to modify a clustered
    object outside the context of a Terracotta transaction, a runtime exception will
    be thrown.


    A special case of this is worth mentioning, because it is not obvious. If a thread
    synchronizes on an object that is not yet clustered, that thread does not acquire
    a clustered lock and does not start a Terracotta transaction. That thread may
    not make modifications to any shared objects, even if the object the thread has
    synchronized becomes shared within the scope of that synchronization.


    # Distributed Method Invocation


    Terracotta provides a facility for causing methods on shared objects to be called
    wherever they are resident in the cluster. This facility is called Distributed
    Method Invocation (DMI). An invocation of a method declared as a distributed method
    on a clustered object will trigger that same method invocation on all the instances
    of that object that happen to be currently instantiated on the heap of any JVM
    in the cluster.


    It is important to note that distributed methods work in the context of a shared
    instance that defines that method. There are also no guarantees about when the
    distributed methods will be executed. Likewise, there are no guarantees about
    which JVMs that method will be executed on, since whether or not the method is
    executed is contingent on whether or not the object in question is currently on
    the heap of a JVM.


    DMI is a useful mechanism for implementing a distributed listener model. It is
    not, however, a good way to coordinate actions or share data between threads in
    different JVMs. For those purposes, the `java.util.concurrent` package is a much
    better fit.


    # Transparency and Bytecode Instrumentation


    So far, we have discussed how Terracotta augments your application code to give
    it clusterwide meaning, but we haven''t discussed exactly how this happens. The
    essential mechanism behind Terracotta''s transparency is bytecode instrumentation.
    Java classes are compiled down to bytecode instructions that must be loaded by
    the JVM before new instances of those classes may be created. That process of
    loading the bytecode gives Terracotta an opportunity to inspect and manipulate
    the bytecode of your classes prior to being used in your application.


    These techniques were first developed to enable AOP and are currently in widespread
    use in frameworks like Spring.


    Terracotta can be configured to instrument all or just a subset of the classes
    loaded into the JVM. You can elect to instrument all classes to make sure that
    Terracotta can see into everything your business logic does to memory at runtime.
    For performance reasons, however, it is often beneficial to restrict the set of
    classes that Terracotta instruments to only those that you know will interact
    with clustered objects. Just remember that if a class isn''t instrumented, it
    is essentially invisible to Terracotta. Any changes to clustered objects made
    by a class that isn''t instrumented will not be reflected in the cluster.


    It is also important to note that the code of a class may manipulate clustered
    objects even if no instances of that class are themselves clustered. This means
    that the set of classes that you must instrument is not just the set of classes
    whose objects may become clustered, but rather, the set of classes that manipulate
    shared objects.'
  raw: '■**Caution** While synchronous-write locking sounds like a good idea for guaranteed
    transactions, the overhead is high. The JVM holding the lock will be blocked while
    the Terracotta server receives acknowledgement from all other JVMs and while the
    server flushes the change to disk. Normally, Terracotta allows threads to continue
    and asynchronously waits for acknowledgement, so the performance difference will
    be large.


    Read locks allow multiple reader threads to acquire the lock at a time, but those
    threads are not allowed to make any changes to clustered objects while holding
    the read lock. No thread may acquire a write lock if any thread holds a read lock.
    No thread may acquire a read lock if any thread holds a write lock. If a thread
    attempts to make modifications while holding a read lock, Terracotta will cause
    an exception to be thrown.


    If, however, it crosses another lock acquisition boundary on the same lock (e.g.,
    a synchronization on the same object), but that new lock acquisition boundary
    is configured to be a write lock, that thread will try to upgrade its lock from
    a read lock to a write lock and will not be allowed to proceed until it acquires
    that upgraded write lock. Read locks offer a significant performance advantage
    over write locks when multiple threads concurrently execute code that does not
    modify any clustered objects.


    Concurrent locks are always granted. They do not protect critical code sections
    and serve only as transaction boundaries. Changes made within the scope of a concurrent
    lock are applied automatically, but there is no guarantee about the order in which
    transactions created in the scope of concurrent locks in different threads are
    applied. Nor is there a guarantee that changes from other threads are not being
    received and applied to heap while inside the lock.


    You should only use concurrent locks when you care about neither potential write-write
    conflicts between threads nor about dirty reads. Concurrent locks are best when
    every JVM is guaranteed to work on different objects from any other JVM yet Terracotta
    is in use for things like master/worker relationship (see Chapter 11).


