    **总结**


    Terracotta 集成模块 (TIM) 提供了一种强大的机制，可以以抽象的形式使用 Terracotta。所谓“抽象”，是指您构建的库和您进行集群的框架的用户无需手动将所需的
    Terracotta 指令集成到其应用程序的 `tc-config.xml` 中。相反，您的用户可以在集群环境中使用更简单的 `<module>` 指令来使用您的库，就像您使用
    Hibernate 和 Ehcache 等 TIM，或用于同步的 Java 集合一样。


    使用 Terracotta，可以包含 XML 配置指令，这非常类似于 C 编程语言中 `#include` 的概念。也可以发布新代码，这些代码可以添加到不适合开箱即用集群的包或库中，或以其他方式更改其中的类和代码。


    事实上，集成模块的概念最初就是为了方便在各种开源项目中捆绑 Terracotta 支持而创建的。您也应该利用这种捆绑能力，使您自己的项目和产品更加稳定且更易于理解。


    在第 10 章中，您将学习如何使用 Terracotta 构建一个主/从（或网格）计算框架。该框架中的所有类和接口都可以在 Terracotta 的 Forge
    上作为库用于项目中。该库仅包含 POJO 集合、多线程执行逻辑以及适当的锁，以确保所有内容都是线程安全的。您将实现网格中工作和工作路由的概念。


    正如您将在下一章中学到的，主/从框架的所有配置都通过一个 TIM 进行了抽象。了解 TIM 的构建方式有助于您理解像主/从这样的框架，并且这些知识也使您能够构建自己的框架和库，其他开发人员无需手动包含或集成即可使用。如果您发现自己需要跨多个项目保存配置片段和相关源代码的配方，请考虑将这些片段和配方实现在一个模块中。现在，让我们来看看主/从框架，请记住，您可以通过
    TIM 来使用该框架。


