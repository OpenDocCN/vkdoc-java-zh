    scaling out forces us to push data into memory and replicate it. In fact, most
    real applications are stateless and stateful simultaneously, and this is what
    Terracotta realized. Developers and operators need a way to fundamentally get
    past the trade-offs of availability and scalability (see Figure 1-4) without heading
    down the path of partitioning the application prematurely.


    **Terracotta’s Origin in a Web Monster**'
  trans: '

    另一种方法——同样是在 Web 应用领域——有时被称为有状态（stateful）模型。该模型指的是将会话数据保存在内存中。通过将数据复制到其他应用实例以应对故障，保存在内存中的应用数据可获得更高的可用性。


    有状态应用编程的目标是消除对数据库的依赖，并改善应用的延迟和可扩展性。在存在会话 Cookie 的 Web 世界中，应用可以利用粘性负载均衡的概念，将同一用户的会话反复路由到同一个应用实例。这解决了有状态编程的一个关键问题：应用应如何使其所有实例保持实时同步？如果工作负载始终被路由到同一个实例，那么我们可以仅在一两个节点中保存内存数据，这样就没问题。如果工作被随机发送到各个应用实例，那么所有实例都需要了解特定上下文中之前发生的所有事情。


    ■**注意** 此处使用“happened before”意在提醒你回顾第 1 章，我们在那里讨论了多线程编程以及 Java 内存模型中“happens before”的概念。你将在第
    3 章和第 4 章中看到，Terracotta 仅使用多线程编程就实现了多节点横向扩展。我们还将讨论如何从大部分代码中抽象出多个线程，以便在适当的时候避免应用中线程和并发编程的复杂性。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 29 页


    第 2 章 ■ TERRA COT TA 的历史


    **29**


    内存复制可能通过两种方式压垮应用实例。首先，将应用的整个工作数据集保存在内存中的压力，可能会使 JVM 的垃圾回收器不堪重负。其次，将此实例上的每次更改复制到所有其他实例的压力，可能在小至两个节点时就已过大，具体取决于工作负载。很少有简单的复制方案能够扩展到三到四个节点以上。似乎内存复制和有状态编程模型的扩展性比无状态模型更差。然而，有状态架构也有其优点。


    在任何可以对数据库进行分区的场景下，都可以对内存架构进行分区。这意味着，如果客户表可以分成两半，那么一半的客户内存数据可以存储在一台服务器上，另一半存储在另一台服务器上。一旦数据进入内存，访问该数据的延迟就几乎降为零。低延迟是有状态架构的最佳品质。


    有状态架构中唯一无法解决的风险是可用性问题。如果单个进程断电，借助复制我们可能不会丢失任何东西；但如果所有应用进程都断电，我们几乎肯定会丢失内存中的所有数据。


    为了换取可用性风险，我们希望获得简单性上的好处。如果我们处理的是内存中的对象，难道不能避免应用与数据库之间经典的阻抗不匹配问题吗？遗憾的是，答案是否定的。无论是使用
    EJB（远程 Bean 或消息 Bean）、Java 消息服务（JMS）、HTTP 会话复制、远程方法调用（RMI）还是其他方法，都会出现相同的数据流：**1.**
    在一个服务器中创建一个对象。


    **2.** 该对象被序列化并推送到所有其他服务器。


    **3.** 该对象随后在该服务器中被更改。


    **4.** 该对象现在必须在所有其他服务器中更新（即，回到步骤 2）。


    由于内存中的对象实际上会被序列化以在网络上发送，因此两台服务器会拥有该对象的不同副本。序列化允许多个线程同时编辑对象而不会破坏对象。可以通过如下方式增强上述数据流以证明这一点：


    **5.** 某个线程需要该对象。


    **6.** 该对象从缓存或另一个 JVM 中反序列化。


    **7.** 该对象在此服务器中被更改。


    **8.** 该对象现在必须在所有其他服务器中更新。如果另一台服务器同时编辑了此对象，则抛出异常，并丢弃此服务器或另一台服务器中的更改。


    此数据流意味着，与我们对象交互的每个线程都必须处理该对象的一个副本。换句话说，不仅步骤 2 中创建对象的线程必须序列化对象以将其发送到其他 JVM，而且步骤
    5 中消费对象的线程也必须反序列化它才能访问该对象。为什么？答案要追溯到并发性。在无状态模型中，内存中的对象显然只是数据库行的一种临时表示，这意味着数据库才是真正的记录系统。然而，在内存中，谁维护记录系统并不明确。事实上，所有
    JVM 共同构成了记录系统。通过要求应用程序处理对象副本，使用内存复制来近似实现数据库的事务能力。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 30 页


    **30**


    第 2 章 ■ TERRA COT TA 的历史


    更确切地说，序列化对象图以发送到网络，以及反序列化从网络接收到的字节数组，这一行为迫使应用开发者接受一种“读取时复制”的语义。我们将在第 3 章和第 4 章花更多时间讨论对象标识。现在，我们先断言：有状态编程并不比无状态编程更简单。而无状态编程也并不比有状态编程更具可扩展性，这是因为数据条带化（striping）对于有状态和无状态范式都适用。


    **殊途同归：分区**


    到目前为止，在第 2 章中，所有分析都集中在复制与分区的对比上。分区，有时被称为分片（sharding）或分而治之，是一种将数据跨服务器集群拆分的技术。通过沿着一致的界限划分数据以及相应的工作，分区可以缓解网络和数据库流量中许多典型的瓶颈。例如，一个典型的数据库应用需要支持创建、读取、更新和删除操作。如果创建操作将数据拆分到两个数据库实例，而读取、更新和删除操作也以相同方式拆分数据，那么两个大小相似的数据库服务器将提供单个服务器两倍的容量。图
    2-4 展示了通过将业务数据划分为偶数和奇数键，在两台服务器之间进行数据分区的概念。


    **图 2-4.** *通过将数据拆分为偶数和奇数来对 CRUD 应用进行分区*


    ■**注意** 图 2-4 中，未分区和已分区的负载均衡器是不同的。未分区版本很简单，将任何流量发送到任一应用服务器。已分区的负载均衡器应了解分区逻辑，并根据数据分区规则将工作路由到不同的应用服务器。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 31 页


    第 2 章 ■ TERRA COT TA 的历史


    **31**


    对于许多应用团队来说，分区似乎是实现可扩展性的唯一途径，因为随着应用的增长，数据复制或管理会成为首要瓶颈。正如我们已经讨论过的，应用可以通过缓存并在内存中保存更多数据，或者将数据条带化到多个物理位置来提升速度。


    更准确地说，在无状态架构中最容易实现高可用性，而横向扩展则迫使我们把数据推入内存并进行复制。事实上，大多数真实应用同时具备无状态和有状态特性，这正是 Terracotta
    所认识到的。开发者和运维人员需要一种方法，从根本上摆脱可用性和可扩展性之间的权衡（见图 1-4），而无需过早地走上应用分区的道路。


    **Terracotta 的起源：一个网络巨兽**

