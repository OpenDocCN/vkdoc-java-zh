- fmt: '# Typical Hibernate Invocation


    A typical interaction with Hibernate is illustrated by the following pseudo code:


    ```

    session.beginTransaction();

    Object foo = { Hibernate HQL }

    foo.getSomething();

    foo.setSomethingElse(somethingElse);

    session.getTransaction().commit();

    ```


    First, we tell Hibernate to begin a new transaction or, in other words, begin
    a new unit of work. In the second line, we retrieve a POJO from the session (first-level
    cache). If the object does not exist already in the session, Hibernate will perform
    a query against the database to retrieve it and store it in the session. It’s
    important to note that all subsequent requests to Hibernate that match this object
    will return the *same* physical object located in the session on the Java heap.


    In the third and fourth lines, we perform some operation(s) on the object, whether
    it is to read some fields or update some fields. Finally, in the last line, we
    commit the transaction, or the entire unit of work, which will flush all of the
    changes made to all of the objects held in the session back to the database.


    # Using Terracotta to Improve Hibernate


    There are two places where it makes sense to plug in Terracotta to the Hibernate
    model. Which one you choose to use depends on your application’s requirements.


    - The first place you can use Terracotta is to cluster the second-level cache
    used by Hibernate. This option is the easiest option to choose, because it requires
    only a simple configuration change. No changes will have to be made to your application
    to choose this option. However, due to the design of the second-level cache, clustering
    the second-level cache cannot take full advantage of all of the benefits that
    the Terracotta solution can provide.


    - The second place you can use Terracotta is to provide clustering of the session
    objects (don’t get confused with HTTP sessions). This option, because it clusters
    Hibernate POJOs, can take full advantage of the Terracotta solution, and thus
    can provide performance improvements over the second-level cache option. However,
    unlike the second-level cache option, this option may, depending on your application,
    require some small changes to your application logic.


    # How Terracotta Improves Hibernate Performance


    To help you understand where to integrate Terracotta with your Hibernate application,
    we’ll look at the array of options already available to improve Hibernate performance
    without Terracotta. After that, we’ll evaluate how Terracotta can be added to
    further improve the scalability and availability of our solution.


    First, though, you need to understand the basic steps for improving performance
    with a Hibernate enabled application.


    ## Basic Steps for Improving Performance of a Hibernate Application


    The following sections show the basic steps that any Hibernate developer must
    follow to improve performance:


    1. Determine your application’s baseline performance.

    2. Add Hibernate.

    3. Enable the second-level cache.

    4. Cluster the session objects (the detached instances).

    5. Benchmark the enhancements.


    To provide a baseline, we start with a typical conversational application. This
    conversational application will make three requests to complete the conversation.
    Within each request, the example will execute one read operation and two write
    operations. Of course, a real-world application would vary much more, by varying
    the number of overall conversational requests as well as the number of data operations
    per request; this example serves merely to provide a clear understanding of the
    impact of each decision along the Hibernate performance curve.


    ## Baseline Performance


    As Figure 6-2 shows, a baseline JDBC application with no Hibernate framework calls
    will communicate directly with the database for each request. This results in
    three conversational requests, each with three operations, for a total of nine
    operations.'
