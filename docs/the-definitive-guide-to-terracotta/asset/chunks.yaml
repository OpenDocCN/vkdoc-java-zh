  trans: '

    **H**ibernate 提供了一个强大的数据库访问工具。它是一项成熟的技术，广泛应用于多种类型的应用程序中，包括独立 Java 应用、Web 应用、J2EE
    应用以及基于 Spring 的应用。通过提供一种简单的模型来实现与数据库之间的数据转换，Hibernate 减轻了处理数据库的负担。Hibernate 有助于消除编写
    SQL 语句以及执行实例化对象、用数据库数据填充对象、将内存中的对象映射到数据库表等繁琐工作的需要。虽然本书的重点并非 Hibernate，但大多数 Terracotta
    应用程序都需要与数据库交互，如果不讨论 Hibernate，我们对跨机器集群和扩展应用程序的论述将是不完整的。借助 Terracotta，我们可以利用您已学过的关于
    POJO 集群的许多工具和技术，在集群环境中提升 Hibernate 的性能。


    在扩展启用 Hibernate 的应用程序集群时，数据库通常会成为瓶颈。在本章中，我们将了解如何使用 Terracotta 来消除这些常见的 Hibernate
    瓶颈，无论是通过 Hibernate 的缓存接口，还是通过 Hibernate 之外的 POJO。


    为了理解 Terracotta 如何与 Hibernate 协同工作，我们首先需要介绍 Hibernate 所基于的基本概念。第一个概念是对象关系映射（ORM）。


    **对象关系映射**


    对象关系映射（ORM）简单来说就是将数据库关系模型中的数据转换为 Java 堆中面向对象（OO）模型的数据。其核心在于，ORM 意味着将数据库的表、列和行转换为
    Java 堆中的对象实例、字段和引用指针，反之亦然。


    虽然执行此任务采用了多种技术，但所有 ORM 工具（如 Hibernate、iBatis 和 TopLink）都必须解决本质上相同的问题。由于本章是关于 Hibernate
    的，我们将重点介绍 Hibernate 如何执行 ORM 任务。


    **131**


    986-1 CH06.qxd 5/27/08 7:34 PM 第 132 页


    **132**


    第 6 章 n HIBERNATE 与 TERRACOTTA


    **Hibernate 是如何工作的？**


    Hibernate 架构提供了一个非常优秀的抽象层，Hibernate 技术正是构建于此之上。其核心是，Hibernate 通过在对象和数据库之间提供一组定义明确的转换点，允许
    Java 开发者与对象交互，同时允许数据库与数据交互。构成 Hibernate 架构核心抽象集的有三个部分；让我们逐一详细查看：


    *   **一级缓存**：通常被视为会话，一级缓存是一个将我们的对象以 POJO 形式存储在内存中的地方。由于我们在代码中只处理对象，因此作为 Hibernate
    的用户，一级缓存对我们来说基本上是透明的。然而，我们必须意识到它的存在，因为复制到 Hibernate 外部（即应用程序堆空间）的对象通常需要谨慎处理。


    *   **事务边界**：这是工作单元的开始和结束边界。在一个工作单元内，所有数据的读取或写入都是事务性的，这意味着它具有读隔离语义，并且是原子性提交的。作为
    Hibernate 的用户，事务边界对我们来说是非常明显的，因为它们通常转化为 `beginTransaction()` 和 `commit()` API
    调用，尽管它们也可能隐藏在框架或其他抽象层内部，从而无需手动进行这些调用，例如在 Servlet 过滤器内部。


    *   **二级缓存**：这是一个将数据库数据的副本以原始数据形式存储在内存中的地方。Hibernate 提供了一个可插拔的模型，因此存在许多提供二级缓存的实现。除了配置和性能方面的考虑，作为
    Hibernate 的用户，二级缓存对我们来说基本上是透明的。


    图 6-1 展示了这些组件如何协同工作。


    **图 6-1.** *简化的 Hibernate 架构说明*


