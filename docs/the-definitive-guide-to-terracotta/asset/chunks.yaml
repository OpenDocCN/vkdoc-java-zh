    **207**


    其中许多功能都基于 Maven，本章稍后将详细讨论。自动化构建、测试、构件部署和网站生成均通过 Maven 使用持续集成服务器完成。


    Terracotta 在 Terracotta Forge 上提供了许多 TIM。随着时间的推移，预计所有 TIM 都将在 Forge 上可用，并且获取 TIM
    的首选机制将是从 Forge 构件仓库中获取。


    要在 Forge 上托管您自己的项目，请访问该网站，并按照那里的说明进行注册和提交项目。


    **创建 TIM**


    在本节中，您将学习如何制作自己的 TIM，无论是用于外部库还是您自己应用程序中的组件。


    **TIM 结构剖析**


    TIM JAR 文件的三个主要部分是清单文件、Terracotta 配置片段，以及可选的代码（将在后面讨论）。


    Terracotta 模块系统基于 OSGi（开放服务网关倡议）平台，这是一个用于基于模块化插件的 Java 系统的流行标准。例如，Eclipse 生态系统也基于
    OSGi 并通过插件进行组装。


    n**注意** OSGi 联盟是一个由参与成员和董事组成的委员会，他们共同协作并对规范进行投票，这些规范主要涉及 Java 应用程序的动态依赖解析和库加载能力。该规范可在
    [`www.osgi.org/Specifications/HomePage`](http://www.osgi.org/Specifications/HomePage)
    获取。


    创建清单文件


    在 OSGi 中，代码以插件的形式分发，这些插件可以包含在称为 bundle 的 JAR 文件中。bundle 只不过是一个 JAR 文件，其中在 JAR
    文件清单中定义了特殊属性。JAR 规范定义清单文件位于 `META-INF/MANIFEST.MF` 路径。该文件只是一个文本文件，具有定义属性、换行等的良好格式。


    清单 9-4 展示了一个遵循 JAR 清单和 OSGi 约定的 TIM 清单示例。在此例中，这是前面章节中看到的、可在 Terracotta Forge 上获取的自动锁定同步
    Map 的清单。


    **清单 9-4.** *来自同步 Map 集成模块的清单* Manifest-Version: 1.0


    Bundle-Name: Terracotta Synchronized Map


    Bundle-Description: Terracotta Autolock SynchronizedMap Configuration Import-Package:
    org.terracotta.modules.configuration


