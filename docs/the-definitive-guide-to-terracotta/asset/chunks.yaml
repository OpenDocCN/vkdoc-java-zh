    \ 安装目录的 `modules` 子目录会被首先搜索，因此无需指定它。此外，`<repository>` 元素会按指定的顺序被搜索，因此如清单 9-3 所示，你可以使用网络文件服务器上的共享仓库，同时通过先搜索本地仓库来覆盖共享仓库。目前，仅支持通过\
    \ `file://` URL 定义的仓库。\n\n**清单 9-3.** *在 `tc-config.xml` 中指定仓库*\n\n```xml\n<clients>\n\
