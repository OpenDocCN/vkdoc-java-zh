    configuration. If a Spring or Hibernate application were loaded without the Spring
    or Hibernate libraries present, that application would cease to function.


    Clustered caches and clustered application servers fail to realize that Hibernate
    and Spring both represent a development model and methodology. Clustered application
    servers are not supposed to represent a rigid development model. Spring, for example,
    provides a development model that is not rigid or fixed. But clustering frameworks
    ruin elegance and simplicity for the rest of the application. They are supposed
    to take any application that can be run inside the container and cluster the application.
    Clustered application servers and clustered caches fail at this goal and thus
    are a notoriously poor solution for scaling applications.


    **Summary**


    Since Terracotta provides transparent scalability and availability to Java applications,
    it allows those applications to spread out and run on as many machines as is necessary.
    Transparency allows the system to decide what to push among the JVMs and to the
    L2 server (otherwise known as a Terracotta server), and this provides very high
    scalability. Transparency has an additional benefit in that it does not enforce
    a programming model such as clustered caching, or EJB, or even Hibernate or Spring.
    Terracotta can take an existing application and scale it to many machines, whereas
    other approaches dictate a model that, if followed, can enable scaling out.


    Let’s now switch gears and work with actual Java program source code and Terracotta
    configuration to learn more about how this works. Chapter 3 introduces Terracotta
    configuration concepts.


