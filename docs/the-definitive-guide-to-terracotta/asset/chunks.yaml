  trans: '

    • 当一个根（root）首次被 JVM 分配时（该分配在集群的生命周期内有效），该根会在 Terracotta 集群中被创建，并且分配给该根字段的对象图将成为该逻辑根的对象图。


    • 一旦分配完成，根字段的值就永远不能更改。在首次分配之后，所有后续对声明为该根的字段的赋值都将被忽略。如果根是一个 Terracotta 字面量（稍后会详细介绍字面量），则原始类型的值可以更改，但如果根是一个对象，则对该对象的引用不能更改。


    • 代表根对象的顶层对象永远不会被 Terracotta 分布式垃圾回收器回收。


    由于根的生命周期超越了单个 JVM 的生命周期范围，因此它们有时被称为超静态（superstatic，这只是 Terracotta 创造者起的名字）。静态字段引用的生命周期与其声明的类相同。而超静态的根则与虚拟堆具有相同的生命周期。无论根字段的作用域修饰符是什么，这一点都成立。如果一个静态字段被声明为根，那么该静态字段将采用超静态的生命周期。


    同样，如果一个实例字段被声明为根，那么该实例字段也将采用相同的超静态生命周期。这可能会对针对根对象编写的代码产生重大影响，并且如果对 Terracotta
    关于根的行为理解不透彻，可能会引起一些惊讶。


    虽然根字段本身的引用不能更改，但该根对象的对象图可以更改。通常，像 `Map`、`List` 和其他 `Collection` 对象这样的数据结构被选为根对象——尽管任何可移植的对象都可以被声明为根（稍后会详细介绍对象可移植性）。例如，虽然不能更改将
    `Map` 分配给根字段的赋值，但该 `Map` 的内容可以更改。


    **71**


    **集群对象**


    正如我们刚才提到的，当一个根字段首次被赋值时，分配给该字段的 Java 对象以及从该对象通过引用可达的所有对象都成为集群对象。当一个对象成为集群对象时，其所有字段数据都会被收集并存储在
    Terracotta 虚拟堆中。该对象还会被分配一个集群范围内唯一的对象 ID，用于在 Terracotta 虚拟堆中唯一标识该对象（实际上，该 ID 也是该对象数据在
    Terracotta 服务器中基于磁盘的对象存储中存储的键）。在适当的时候，所有这些对象数据都会被发送到 Terracotta 服务器，此后，它便作为集群对象由
    Terracotta 管理。


    一个对象的数据由该对象的引用字段和字面量字段的值组成。引用字段是对其他 Java 对象的引用。引用字段的值是该字段所引用的对象的集群范围对象 ID。字面量字段是对象中那些不是引用字段的字段——即，其类型不被
    Terracotta 视为对象的字段。


    Terracotta 字面量类似于（但不完全相同于）Java 原始类型。它们包括 Java 原始类型以及 Terracotta 特殊处理的其他类型。


    当一个对象被任何集群对象引用时，它就会成为集群对象，除非该引用是瞬时的（稍后会详细介绍瞬时性）。实际上，就像创建根时一样，当一个对象成为集群对象时，它的整个对象图都会被遍历，并且其所有非瞬时引用都会被转换为集群对象。从这个意义上说，根创建是集群对象创建的一个特例。一旦一个对象成为集群对象，它将始终是集群对象，并存活在虚拟堆中，直到被
    Terracotta 服务器中的 Terracotta 分布式垃圾回收器回收。


    **关于类加载器的说明**


    在 Java 中，对象类的标识与其类加载器（ClassLoader）相关联。由一个类加载器加载的类与由另一个类加载器加载的字节码相同的类是不同的。这意味着在一个类加载器上下文中实例化的对象，实际上与在另一个类加载器上下文中实例化的对象不属于同一个类。尽管它们的类看起来相同，但它们实际上是不同类的对象。可以保证，在每个
    JVM 的每个类加载器中，一个特定的集群对象有且只有一个实例。


    这带来的副作用是，集群对象与其创建时的类加载器绑定，并且不能跨越类加载器的边界。例如，在一个 JVM 的默认类加载器上下文中创建的集群对象，不能在 Web
    应用程序的类加载器上下文中实例化（在大多数容器中，每个 Web 应用程序都有自己的类加载器；这允许例如 JSP 类的动态重新加载等功能）。尝试在与创建时不同的类加载器上下文中实例化
    Terracotta 对象将导致 `ClassCastException`。


    **虚拟堆与内存管理**


    Terracotta 虚拟堆的内容是集群中所有现存共享对象的集合。


    由于虚拟堆的状态（即每个集群对象字段的当前值）由 Terracotta 服务器管理，因此在您的应用程序 JVM 中运行的 Terracotta 客户端库可以自由地操作客户端
    JVM 中的物理堆。这意味着并非虚拟堆上的每个对象都需要在任何 JVM 中实例化。Terracotta 可以在您的应用程序需要时自动从服务器加载对象。当您遍历一个当前未在本地物理堆上实例化的集群对象的引用时，Terracotta
    会自动从 Terracotta 服务器请求该对象的数据，在本地堆上实例化它，并连接您正在遍历的引用，而您的应用程序对此一无所知。


    同样，随着内存压力的增加，Terracotta 可以人为地向集群对象添加空引用，这使得任意大的集群对象图能够适应受限的物理堆空间。这种向 Terracotta
    服务器刷新（flush）对象和从服务器加载（fault）对象的能力，正是 Terracotta 虚拟堆中“虚拟”部分的体现。就像现代操作系统的虚拟内存子系统在磁盘和
    RAM 之间交换物理内存的内容，让计算机上的程序表现得好像拥有无限的物理内存一样，Terracotta 虚拟内存子系统让您的应用程序表现得好像拥有无限的物理
    Java 堆。


    **分布式垃圾回收**


    Terracotta 服务器有一个分布式垃圾回收器，它会移除不再被引用的集群对象。这样做是为了防止虚拟堆用不再需要的对象数据填满 Terracotta 服务器下的磁盘。一个集群对象要符合垃圾回收的条件，它必须不能从任何根可达（即，不能是根对象图的一部分），并且不能驻留在任何客户端
    JVM 的堆中。当分布式垃圾回收器找到符合回收条件的对象时，它会将这些对象从服务器及其持久化存储中移除。


    **管理对象变更与协调线程**


    就像单个 JVM 中线程之间共享的对象一样，不同 JVM 中的线程对 Terracotta 集群对象的访问必须进行协调，以防止线程意外覆盖彼此的更改，并确保更改能够可靠地应用到需要的地方。为此，Terracotta
    进一步借鉴了现有 JVM 架构的设计思路。

