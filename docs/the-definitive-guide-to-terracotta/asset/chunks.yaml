  trans: "\n每个与网站交互的用户在未进行身份验证前，默认都是匿名的。这与桌面应用程序存在根本性差异——在桌面应用中，只要操作系统在登录时验证了用户身份并授予其访问文档的权限，该交互用户就被视为可信的。Web\
    \ 应用依赖于一台被众多用户从不同计算机和设备、在任何地点访问的服务器。这使得准确掌握谁有权访问哪些数据变得更加困难。HTTP 规范并未为此提供便利，导致人们不得不采用自定义解决方案来处理此问题。历史上最流行的解决方案是：当用户开始使用应用时，立即为其分配一个包含唯一标识符的\
    \ Cookie。每当用户与 Web 应用交互时，Web 浏览器都会提交这个唯一标识符。服务器端的逻辑随后能够查找与该凭证对应的数据，并据此为该特定用户定制应用功能。\n\
    \n通过 Java EE Servlet 规范，HTTP 会话接口为开发者提供了一个标准 API，使其能够精确实现上一段所述的功能。开发者无需关心如何发放\
    \ Cookie 以及如何将这些 Cookie 与数据关联的实现细节。他们只需启动一个用户会话，就能以隔离的方式轻松存储和检索数据。所有这些数据都保留在服务器内存中，并且根据\
    \ API 的实现方式，可以存储在文件系统或数据库等多种位置。\n\n该 API 非常简单；要创建新会话或检索现有会话，只需在容器提供给 Servlet 的\
    \ HTTP 请求实例上调用 `getSession()` 方法即可。可选地，可以提供一个参数来显式创建新会话或检索已存在的会话。清单 7-1 展示了 `HttpServletRequest`\
    \ 接口中相关的方法。\n\n**清单 7-1.** *与 HTTP 会话相关的 HttpServletRequest 方法*\n```java\npublic\
    \ interface HttpServletRequest{\n    HttpSession getSession();\n    HttpSession\
    \ getSession(boolean create);\n}\n```\n\n之后，为了向会话中存储数据或从会话中检索数据，`HttpSession`\
    \ 接口提供了一个类似 Map 的简单 API。清单 7-2 展示了相关的方法。\n\n**清单 7-2.** *用于操作会话属性的 HttpSession\
    \ 方法*\n```java\npublic interface HttpSession{\n    Object getAttribute(String\
    \ name);\n    Enumeration getAttributeNames();\n    void removeAttribute(String\
    \ name);\n    void setAttribute(String name, Object value);\n}\n```\n\n这里没有任何复杂之处。关于整个\
    \ API 的详细信息可以在 Java Servlet 技术网站 ([`java.sun.com/products/servlet/`](http://java.sun.com/products/servlet))\
    \ 上在线找到，该网站对于本书范围之外的专题（如 HTTP 会话的一般用法）是很有用的资源。我们将重点关注最重要的特性，以及它们如何通过 Terracotta\
    \ 与 HTTP 会话的分布式使用相关联。\n\n**陈旧数据的自动超时**\n\nWeb 应用与桌面应用之间的另一个根本区别在于，Web 应用无法判断用户是否已停止使用应用。在桌面上，应用会被退出，或者计算机会被关闭，从而导致所有活动内存被清除。然而，对于\
    \ Web 应用，用户可以在不通知服务器的情况下停止使用，例如，通过访问另一个 URL、关闭浏览器，或者只是离开公共终端。由于 Web 服务器被众多用户访问，为每个可能返回的用户维护会话可能会迅速耗尽所有可用内存。\n\
    \n为了解决这个问题，会话具有自动过期时间，该时间从会话最后一次被使用的请求开始计算。这种过期事件被称为驱逐。如果会话已过期，它将自动失效，所有关联的数据将被清除。过期时间可以通过\
    \ Web 应用的 `web.xml` 配置文件中的 `<session-config>` 部分进行设置，也可以针对每个单独的会话实例以编程方式设置。清单\
    \ 7-3 展示了相关的 `HttpSession` 接口方法。\n\n**清单 7-3.** *与过期时间相关的 HttpSession 方法*\n```java\n\
    public interface HttpSession{\n    long getLastAccessedTime();\n    int getMaxInactiveInterval();\n\
    \    void setMaxInactiveInterval(int interval);\n}\n```\n\n最后访问时间以自 1970 年 1 月\
    \ 1 日午夜（GMT）以来的毫秒数表示，间隔以秒表示。所有 Servlet 容器都有最大不活动间隔的默认值；在 Tomcat 上，这个值是 30 分钟。\n\
    \n**手动失效以清除数据**\n\n尽管会话会自动清除以保护服务器资源，但在许多情况下，手动失效也很有用。最合理的用法是，当用户明确退出应用时，可以进一步节省服务器资源。这可以防止会话数据在过期前一直残留，即使它永远不会再被使用。\n\
    \n另一个有用的技术是，当用户完成一个长时间的事务处理过程，且临时数据不再需要时，使会话失效。在多页面的业务事务或工作流结束时使会话失效，可以确保数据不会在不需要时继续残留——如果关键的会话属性未在正确时间清除，可能会引发问题。使整个会话失效可确保用户从一个干净的状态开始，例如，在完成下单之后。当会话中存储了敏感数据（如信用卡号）时，重新开始变得更为重要。\n\
    \n`HttpSession` 接口为此提供了一个简单的失效方法，如清单 7-4 所示。\n\n**清单 7-4.** *用于手动使会话失效的 HttpSession\
    \ 方法*\n```java\npublic interface HttpSession{\n    void invalidate();\n}\n```\n\
    \n**协调状态修改的事件**\n\n复杂的框架通常通过将全局应用状态等数据元素设置为会话属性，将其与会话关联起来。应用中的每个组件都可以利用这些数据快速访问全局状态，并协调所有组件应如何交互。\n\
    \n这种状态通常与应用的整体生命周期绑定，并且需要在用户正在使用或停止使用它时得到通知。如果实现了 `HttpSessionBindingListener`，Servlet\
    \ 容器会自动发送此类通知。清单 7-5 记录了该接口的方法。\n\n**清单 7-5.** *完整的 HttpSessionBindingListener\
    \ 接口*\n```java\npublic interface HttpSessionBindingListerner {\n    void valueBound(HttpSessionBindingEvent\
    \ event);\n    void valueUnbound(HttpSessionBindingEvent event);\n}\n```\n\n无需执行任何特殊操作来启用这些通知。Servlet\
    \ 容器会自动检测会话属性值是否实现了 `HttpSessionBindingListener` 接口。当属性被添加到会话时，会调用 `valueBound`\
    \ 方法；当该值被移除时，会调用 `valueUnbound` 方法。\n\n请注意，我们不建议依赖这些事件来清理应用程序中的系统资源（如 JDBC 连接）。这些资源应独立管理，例如，使用像\
    \ Spring 这样的 IoC 框架。一般来说，一个好的指导原则是让会话纯粹专注于数据，不要让资源渗透到会话中。\n\n**会话状态持久化**\n"
- fmt: '# Distributed HTTP Sessions with Terracotta


    Web sites are generally expected to be available all the time. Users become quickly
    frustrated if the information a site provided disappears for no obvious reason,
    and this frustration usually translates into reduced repeat visits. This expectation
    translates to the requirement for high stability and predictable latency of the
    underlying application, which, in turn, requires total availability of its data.
    Sadly, the infrastructure that is used to run applications is rarely problem-free.
    Both software and hardware failure can happen unexpectedly. In failure situations,
    important data should be protected and automatically become available again when
    a failed server is brought back to life.


    `Session state persistence` provides the ability to failover from one JVM to another,
    and while it’s not part of the standard specification, most servlet containers
    provide a solution that allows you to turn on this feature with a configuration
    parameter. Apache Tomcat even ships with this feature enabled by default. Usually,
    these persistence implementations will serialize all the session attributes to
    disk and deserialize from disk to reconstitute a session across server restarts.
    Persisting the session’s state like this has shortcomings, though, such as a higher
    demand for processing power, higher disk utilization, and the requirement for
    all value classes containing session attributes to implement the `Serializable`
    interface. However, in most cases, being able to persist a session is the basis
    for replicating sessions across different servers. Terracotta takes a totally
    different approach for distributing HTTP sessions that avoids most these pitfalls
    of session persistence.


    ## Distributed HTTP Sessions


    As the popularity of a web site increases, so does the load on their servers.
    The ability to respond to this increasing demand for resources is called scalability.
    When servers go down, the ability to migrate those users seamlessly to another
    server represents much of the availability challenge. As discussed in Chapters
    1 and 2, Terracotta makes it easier to spread applications across machines. For
    web applications, using Terracotta means that a load balancer, session distribution
    through DSO, and a web application server are sufficient for scalability and availability.
    With Terracotta, servers running in a cluster will act like one huge web application
    server, and users will not notice individual server performance or availability
    issues. Using distributed HTTP sessions is an easy way to share the state of web
    applications across such a Terracotta-enabled cluster.


    ## Motivation for Using HTTP Sessions


    When a cluster is created for a web application, users should not have to worry
    which server is available when they’re connecting to the application. Users would
    become frustrated if they had to check which machine is the least active and connect
    to that one—they should be able to just connect to an application and let the
    back-end automatically select the most appropriate server. Also, since users can
    take a long time when working with a web application, selecting the right server
    should be possible at any moment and not only at the start of an application.
    To be able to achieve this, the state of the web application must be transferable
    from one server to another.


    ### Accessing Sessions State from Other Nodes


    Usually, when an arbitrary application is turned into a clustered one, developers
    are forced to search for the classes that contain state that has to be shared
    across the different cluster nodes. Web applications with sessions are easier
    to cluster than arbitrary applications, since all the server-side application
    state is stored in those sessions. HTTP sessions can thus be extended to become
    an API for transparently handling state across a web application cluster.


    Developers then only need to be concerned with ensuring that all conditions are
    present for sessions to become distributed. Since this is not standardized, each
    servlet container and application server vendor has its own implementation of
    distributed HTTP sessions. We will not cover these in detail.


    Web containers tend to either store session data in a database or replicate sessions
    across a network of application servers. Let’s focus on network replication as
    the containers that scale best do not use the database for session storage. Network
    replication means that session data is copied to the other servers in the cluster.
    This allows the data to be available in case a user is redirected to any of the
    other servers. Some vendors provide optimizations here, for example, to lazily
    pull in sessions on other servers instead of constantly pushing all the data out.
    A common approach, though, is to serialize the entire session and transfer it
    to the other nodes in the cluster each time the session changes, even for a single
    value. As you can imagine, this process can create quite some network chatter
    and impose large CPU requirements once replication is enabled in a cluster. Developers
    should also be careful to not add objects that can’t be serialized by Java to
    a session; all the classes that participate in the application state thus have
    to implement the `Serializable` interface. You’ll see how Terracotta addresses
    all these issues in the next section.


    ### Dynamic Horizontal Scale-Out to Handle Traffic Spikes


    Apart from allowing a server infrastructure to grow over time by adding new nodes
    to a cluster as the number of users of an application increases, distributed HTTP
    sessions are also very handy for reacting dynamically to traffic spikes. It’s
    not uncommon nowadays for web applications to become hugely popular in a short
    period of time as communities of users discover them. This word-of-mouth popularity
    over the web can be scary, as can what’s commonly referred to as the “Slashdot
    effect”—this refers to a sudden and dramatic increase of users on a web site about
    which a news announcement is posted to the front page of a very popular web site,
    such as `Slashdot.org`. Investing in hardware and cluster reconfiguration each
    time a news announcement is about to be posted would not be financially viable.
    Worse even, since other people can unexpectedly write such articles, web sites
    can be swarmed without any warning and instantly become unresponsive.


    Server virtualization solutions come to the rescue here. Services like Amazon’s
    Elastic Compute Cloud (EC2) allow disk images of servers to be prepared beforehand
    (see [http://aws.amazon.com/ec2](http://aws.amazon.com/ec2)). A cluster can be
    set up to monitor the load of each participating server. Whenever the load exceeds
    a certain amount, new virtual servers can be launched to join the cluster in a
    matter of seconds, assuming a precreated standard disk image exists. Also, when
    the monitoring software detects that servers in the cluster are often idle, nodes
    can be shut down to reduce the cost of running the cluster. If distributed HTTP
    sessions are used for shared state across a web application cluster, all state
    will be available on the new nodes and transferred from the removed nodes. This
    is a typical example of where vertical scalability is inappropriate, and horizontal
    scalability provides rapid dynamic adaptation to changing usage patterns for an
    appropriate cost factor.


    Terracotta batches shared state operations lazily from a central server, allowing
    dynamic changes to the topology of a cluster to be highly optimized. Only the
    previously existing sessions that are used in new nodes will have to be transferred.
    This is depicted in Figure 7-2.


    Notice how only sessions `d`, `e`, and `f` from the second, failed application
    server instance migrate to the newly added server.'
