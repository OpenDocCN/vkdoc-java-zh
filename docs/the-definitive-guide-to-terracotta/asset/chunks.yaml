    C H A P T E R 5 n CACHING


    This is shown in Figure 5-2, where a load of the cache in the first application
    server will place the data in the Terracotta server. Subsequent reads in the other
    application servers of the same data causes the data to be paged in transparently
    from the Terracotta server, and the database does not need to be accessed.


    **Figure 5-2.** *Terracotta transparently pages Item1234 into cache only when
    the load balancer* *sends traffic to other application server instances.*


    Similarly, the virtual heap removes the complexity of keeping a cache up to date
    across many instances of the cache. A single update to the cache in one server
    is automatically visible to every instance of the cache. Because such changes
    are ACID (see note), you can rely on the cache being up to date everywhere, even
    if your data is very sensitive data and *must* be accurate. And, because changes
    to the Terracotta virtual heap are already optimized to send only fine-grained
    changes to only the nodes that have the changed data resident in memory, you avoid
    sending the flurry of update messages that would otherwise occur.


