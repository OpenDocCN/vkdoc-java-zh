    ==========================

    Shopping Cart

    item 1: Price: $13.20; Name: 14 blade super razor

    ==========================

    Shopping Cart

    item 1: Price: $5.50; Name: Super-smooth shaving cream

    ```


    In the console output of the other application instance, you should see something
