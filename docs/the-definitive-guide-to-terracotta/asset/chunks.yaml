    **Summary**


    Terracotta Integration Modules (TIMs) provide a powerful mechanism for using Terracotta
    in an abstracted form. By “abstracted,” we mean that users of libraries that you
    build and frameworks that you cluster do not need to manually integrate the required
    Terracotta directives into their application’s tc-config.xml. Your users can,
    instead, use your library in a clustered environment with simpler <module> directives,
    just as you can with TIMs such as Hibernate and Ehcache, or for synchronized Java
    collections.


    With Terracotta, it is possible to include XML configuration directives, much
    like the concept of #include in the C programming language. It is also possible
    to ship new code that can be added to or otherwise change classes and code in
    a package or library that is not well suited to clustering out of the box.


    In fact, the very notion of integration modules was first created to make it easy
    to bundle Terracotta support in various open source projects. You too should use
    this bundling capability to make your own projects and products more stable and
    easier to understand.


    In Chapter 10, you will learn how to build a master/worker, or grid, computing
    framework using Terracotta. All the classes and interfaces in the framework are
    available on Terracotta’s Forge as a library for use in projects. The library
    consists only of POJO collections, multithreaded execution logic, and appropriate
    locking to make everything thread-safe. You implement the notions of work and
    routing of work in the grid.


    As you will learn in the next chapter, all of the configuration for the master/worker
    framework is abstracted through a TIM. Knowing how TIMs are constructed helps
    you understand frameworks like master/worker, and that knowledge also enables
    you to build your own frameworks and libraries that other developers can use without
    manual inclusion or integration. If you find yourself keeping recipes of configuration
    fragments and associated source code for inclusion across various projects, consider
    implementing those fragments and recipes in a module. Let’s look at the master/worker
    framework now, keeping in mind that you can use that framework through TIMs.


