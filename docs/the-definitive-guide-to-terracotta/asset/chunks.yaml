    第 4 章 ■ POJO 集群


    **95**


    这在 Terracotta 配置中指定如下（再次使用 `config-examples/tc-config-pojo.xml` 文件作为基础）：


    <roots>


    <root>


    <field-name>example.Roots.barrier</field-name>


    </root>


    <root>


    <field-name>example.Roots.catalog</field-name>


    </root>


    <root>


    <field-name>example.Roots.activeShoppingCarts</field-name>


    </root>


    </roots>


    下一步配置是确定哪些类应在加载时进行字节码增强。任何将成为共享对象图一部分的对象的类，在加载该类时都必须由 Terracotta 进行字节码增强。这个增强过程就是
    Terracotta 的透明集群能力如何注入到应用程序中的。对于此示例，我们只需包含 `example.*` 包中的所有内容。`CyclicBarrier`
    类由 Terracotta 自动包含，因为它是需要被增强的核心 Java 库类集的一部分。


    `<instrumented-classes>` 配置部分如下所示：


