- fmt: "# POJO Clustering\n\nThe Java runtime environment gained traction, in part,\
    \ because of reasonably rapid development cycles offered by the language. It also\
    \ gained traction because it can deliver on the promise of “write once, run anywhere.”\
    \ Terracotta is taking this promise one step further in asserting that spreading\
    \ an application across JVMs should be a run-time decision. With Terracotta, developers\
    \ avoid hard-coded clustering techniques. As a result, an operations team gets\
    \ to decide if it wants an eight-CPU machine with 12 gigabytes of RAM or eight\
    \ dual-core machines each with 2 gigabytes of RAM.\n\nChapter 4 will take the\
    \ concepts and terminology introduced in Chapter 3 to the next level; by the end\
    \ of that chapter, you will be able to cluster any POJO you write yourself. From\
    \ Chapter 5 on, we will use the core concepts behind POJO clustering to cluster\
    \ the objects inside popular frameworks such as Hibernate and Spring.\n\n986-1\
    \ CH03.qxd 5/5/08 9:13 AM Page 68\n\n986-1 CH04.qxd 5/6/08 3:01 PM Page 69\n\n\
    ## POJO Clustering\n\nIn the last chapter, you got some hands-on experience with\
    \ Terracotta by building and running `HelloClusteredWorld`. Now that you’ve gotten\
    \ your feet wet, it’s time to introduce some major concepts that we have only\
    \ briefly mentioned so far.\n\nThere are three broad concepts we need to discuss\
    \ to help you understand how Terracotta works under the hood. The first is how\
    \ Terracotta handles Java objects and the virtual heap.\n\nThe second is how Terracotta\
    \ manages the coordination of threads between JVMs and the changes threads make\
    \ to objects on the virtual heap. The third major concept we’ll introduce here\
    \ is transparency and how Terracotta extends the existing semantics of your application\
    \ to introduce clustering behavior at run time.\n\nArmed with these crucial Terracotta\
    \ concepts, we’ll extend the hands-on experience you got with `HelloClusteredWorld`\
    \ and walk through a more complex example of how Terracotta can transform a simple\
    \ POJO application into a highly available, multi-JVM, scaled-out application.\n\
    \n### All About Objects and Roots\n\nIn `HelloClusteredWorld`, we talked briefly\
    \ about roots and how to configure them. You can think of a root as the top-level\
    \ object in a clustered object graph—all objects referenced by the root object—on\
    \ the virtual heap; in a sense, it’s where Terracotta starts. A root is any field\
    \ in any class that you declare in the Terracotta configuration as the beginning\
    \ of a clustered object graph.\n\nThe first time you assign a value to a field\
    \ declared as a root, Terracotta goes through the process of turning that object\
    \ into a root. Terracotta traverses the object graph, transforming each of those\
    \ objects, including the root itself, into a clustered object (more on what a\
    \ clustered object is follows).\n\nRoots are declared in the Terracotta configuration\
    \ by name. You may create as many roots as you want (although, there is seldom\
    \ need for more than a few). Additionally, the same root may be assigned to more\
    \ than one field. When two different fields are assigned the same root, they are\
    \ made by Terracotta to refer to the same clustered object graph.\n\nA `<root>`\
    \ stanza in the Terracotta configuration looks like this:\n\n```\n<roots>\n  ...\n\
    \  <root>\n    <field-name>my.package.MyClass.myRootField</field-name>\n    <root-name>my_root_name</root-name>\n\
    \  </root>\n  ...\n</roots>\n```\n\nThe `<root-name>` element is optional. If\
    \ you don’t specify a name, the field name is used implicitly as the root name.\
    \ Here is an example where the same logical root is assigned to two separate fields:\n\
    \n```\n<roots>\n  <root>\n    <field-name>demo.jtable.Main.model</field-name>\n\
    \    <root-name>jtable_model</root-name>\n  </root>\n  <root>\n    <field-name>demo.jtable.Roots.model</field-name>\n\
    \    <root-name>jtable_model</root-name>\n  </root>\n</roots>\n```\n\nFields that\
    \ are declared as roots assume special behavior. This is the one area of Terracotta\
    \ that diverges significantly from regular Java semantics."
