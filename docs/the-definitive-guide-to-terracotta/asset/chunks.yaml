    \ of Terracotta by adding a file to the `bin` directory that will properly configure\
    \ the environment. This file is called `setenv.bat`, and it should contain what\
    \ you see in Listing 7-13. Make sure to put it in the `<TOMCAT_HOME>/bin` directory;\
    \ otherwise, it will not be picked up when Tomcat is started. Also, don’t forget\
    \ to properly replace `<TC_HOME>` with the root directory of your Terracotta installation.\n\
    \n**Listing 7-13.** *Contents of the Tomcat bin/setenv.bat File*\n\n```\nset TC_INSTALL_DIR=<TC_HOME>\n\
    set TC_CONFIG_PATH=\"localhost:9510\"\ncall %TC_INSTALL_DIR%\\bin\\dso-env.bat\
    \ -q\nset JAVA_OPTS=%TC_JAVA_OPTS% %JAVA_OPTS%\n```\n\nGo ahead and see if the\
    \ example application is working as expected. Start up the Terracotta server with\
    \ your `tc-config.xml` file:\n\n> `<TC_HOME>\\bin\\start-tc-server.bat -f <TOMCAT_HOME>\\\
    tc-config.xml`\n\nYou can now start Tomcat in another terminal with its standard\
    \ script:\n\n> `cd <TOMCAT_HOME>`\n> `bin\\startup.bat`\n\nThe example application\
    \ is available at the URL `http://localhost:8080/example2/cart.jsp`; visit it\
    \ in your web browser to see that it works.\n\nAlso, feel free to install a second\
    \ Tomcat instance elsewhere on your hard disk. If you modify its `conf/server.xml`\
    \ configuration file to change the TCP/IP ports, you can run it alongside the\
    \ first Tomcat instance. You need to start the Terracotta server only once, so\
    \ don’t do that again. However, don’t forget to put the `setenv.bat` file in the\
    \ `bin` directory of your second Tomcat server; otherwise, that server will not\
    \ use Terracotta. After you start up your second Tomcat instance and access it\
    \ in your web browser, you should see that the sessions are automatically shared\
    \ between the instances. You can even try to install Tomcat on another machine\
    \ and change the `TC_CONFIG_PATH` variable in the `setenv.bat` file so that it\
    \ points to the IP address of the machine where the Terracotta server runs.\n\n\
    ## Verifying Fine-Grain Change Detection\n\nIt’s one thing to take our word for\
    \ the fact that Terracotta supports fine-grained changes, but nothing beats seeing\
    \ it working with your own eyes. Terracotta supports a whole collection of debug\
    \ settings, and two of them come in handy for demonstrating fine-grained changes.\n\
    \nOpen the `tc-config.xml` file of this example; locate the `<clients>` section;\
    \ and add the contents of Listing 7-14 before the terminating tag.\n\n**Listing\
    \ 7-14.** *Debug Settings for tc-config.xml to See Fine-Grained Changes*\n\n```\n\
    <dso>\n  <debugging>\n    <runtime-logging>\n      <field-change-debug>true</field-change-debug>\n\
    \      <new-object-debug>true</new-object-debug>\n    </runtime-logging>\n  </debugging>\n\
    </dso>\n```\n\nMake sure you shut down the Terracotta server and your Tomcat instances,\
    \ and start them all again. Visit the example URL at `http://localhost:8080/example2/cart.jsp`,\
    \ and create a couple of items in the cart. Then, modify the amount of an existing\
    \ item by entering another number in the first form field and the name of an existing\
    \ item in the second form field. Submit the form, and open the file `<TOMCAT_HOME>/logs/client-logs/terracotta-client.log`.\n\
    \nYou’ll see something similar to Listing 7-15 at the end of the file.\n\n**Listing\
    \ 7-15.** *Excerpt of terracotta-client.log with Debug Statements That Show Fine-Grained\
    \ Changes*\n\n```\n<<snip>> com.terracottatech.dso.runtime - New DSO Object instance\
    \ created\ninstance: example.Item@2ade54\nobject ID: ObjectID=[1009]\n<<snip>>\
    \ com.terracottatech.dso.runtime - DSO object field changed\nclass: com.terracotta.session.SessionData,\n\
    field: com.terracotta.session.SessionData.lastAccessedTime\nnewValue type: java.lang.Long,\
    \ identityHashCode: 0xb5b633\n<<snip>> com.terracottatech.dso.runtime - DSO object\
    \ field changed\nclass: example.Item,\nfield: example.Item.amount\nnewValue type:\
    \ java.lang.Integer, identityHashCode: 0xd40b9d\n<<snip>> com.terracottatech.dso.runtime\
    \ - DSO object field changed\nclass: com.terracotta.session.SessionData,\nfield:\
    \ com.terracotta.session.SessionData.lastAccessedTime\nnewValue type: java.lang.Long,\
    \ identityHashCode: 0xe9ee3f\n```\n\nYou can clearly see that a new item was created\
    \ when it was first added to the session; afterward, the `amount` field of that\
    \ entry was changed when a new value was submitted. Also, each time the session\
    \ is used, the `lastAccessedTime` field of the session data is updated.\n\n##\
    \ Understanding HTTP Sessions with Terracotta\n\nNow that you’ve learned about\
    \ the theory and the practice behind HTTP session clustering, we’re going to cover\
    \ some areas that are specific to Terracotta.\n\n### Supported Platforms\n\nWe\
    \ explained in the beginning of this chapter that Terracotta provides its own\
    \ implementation of HTTP sessions that is optimized for clustered usage. To make\
    \ this implementation as easy to use as possible, it’s integrated with various\
    \ application servers, servlet containers, and frameworks, so you can add just\
    \ the appropriate parameters and integration modules to the configuration file\
    \ and be able to use clustered HTTP sessions without any additional effort.\n\n\
    Terracotta has worked closely with the development teams of a number of web application\
    \ technologies to provide seamless integration. At the time of this writing, Terracotta\
    \ version 2.6 currently supports the following products:\n\n- Apache Tomcat\n\
    - BEA WebLogic\n- IBM WebSphere Application Server and Community Edition\n- Jetty\n\
    - Apache Geronimo\n- JBoss\n- Apache Struts 1.1\n- RIFE\n- Wicket\n\nSupport for\
    \ containers and frameworks continually evolves, so be sure to check `http://www.terracotta.org/`\
    \ for a complete and up-to-date list.\n\n### Architecture Considerations\n\nTerracotta\
    \ does its best to keep data where it’s used. If a session is used on a particular\
    \ server, Terracotta will keep it instantiated on the heap, assuming there isn’t\
    \ too much data to fit in RAM. The typical scale-out architecture for web applications\
    \ includes an array of application servers fronted by a load balancer. The user\
    \ agent connects to the load balancer, which then decides how to route the requests\
    \ to the application servers. If a user’s request traffic should be routed to\
    \ a different server by the load balancer, Terracotta will automatically fault\
    \ that session into heap on the new server. That being said, there are some deployment\
    \ architecture decisions that you can make to greatly improve the performance\
    \ of your cluster.\n\n#### The Effects of a Round-Robin Load Balancer\n\nHow the\
    \ load balancer decides to route requests is of great importance to achieving\
    \ scalability with Terracotta. A naive load balancing approach is to cycle through\
    \ the application servers, irrespective of the properties of the incoming request—this\
    \ approach is typically referred to as a round-robin load distribution mechanism.\
    \ It evenly distributes the request load across the available application servers,\
    \ but it will have a negative impact on Terracotta scalability."
