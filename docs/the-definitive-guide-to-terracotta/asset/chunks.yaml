    # 第 5 章 缓存


    **缓存**提供了数据的临时存储，这些数据可以比从更权威的来源计算或获取更快地被访问。在第一种情况下，计算成本高昂的值被记住，以避免重复执行计算。在第二种情况下，值被记住，以避免从更慢或更昂贵的来源（如数据库、远程源或文件系统）获取它们。


    在本章中，我们将研究缓存可以帮助和损害应用程序的多种方式。然后，我们将研究 Terracotta 如何解决缓存的一些常见问题，以及如何将缓存的好处扩展到分布式系统。最后，我们将查看使用基本
    Java 数据结构以及像 Ehcache 这样复杂的开源缓存库进行缓存的示例。


    ## 缓存的痛点


    虽然缓存是减少延迟或减轻过载记录系统负载的宝贵工具，但它并非没有代价地提供其好处，任何管理过缓存的人都可以证明。这些代价通常表现为以下几种形式：


    - **空间换时间**：缓存数据必须存储在可访问的位置（例如，RAM 或本地磁盘）一段时间。该可访问位置的空间成本必须与从源获取结果的成本相平衡。

    - **新鲜度**：由于缓存不是数据的权威来源，其有用性取决于数据的新鲜程度、该新鲜度的重要性以及保持缓存足够新鲜的难度。

    - **复杂性**：管理空间和新鲜度的权衡会引入一定程度的复杂性，这种复杂性可能很快变得难以承受。


    让我们花点时间回顾一下缓存管理可能使缓存维护者感到痛苦的一些最常见方式。


    ### 大数据集的痛点


    如果你的数据集中重要的部分（你经常使用以至于值得缓存的部分）适合放入可用的 RAM，并且其变化足够慢以至于新鲜度不是问题，那么缓存可以简单到将计算结果按唯一标识符存储在映射中，偶尔在缓存条目变旧时使其失效。然而，缓存往往会超出可用
    RAM 的边界。当这种情况发生时，你有几个选择：


    - **购买更多 RAM**。这在某种程度上是可行的，但你能安装或操作系统可寻址的 RAM 有硬性限制。在 JVM 中，非常大的堆也可能带来显著的垃圾回收调优挑战。可以说，购买更多
    RAM 并不总是最佳甚至可行的选择。

    - **清除不太重要的缓存条目**，即使它们仍然有效，以便为更重要的条目腾出空间。这可能会降低缓存的有效性，甚至使缓存变得无用。如果未命中率足够高，你的缓存可能会陷入抖动状态——不断清除和重新加载条目——以至于维护缓存的开销实际上使情况变得更糟。

    - **将缓存溢出到磁盘或网络缓存服务器**。这更复杂，但你的缓存实现必须支持它。如果你需要缓存的这种复杂功能，并且你正在使用一个最初只是简单映射的自研实现，那么可能是时候将其替换为已经能处理这类事情的现有缓存实现了。除非你的业务是编写缓存实现，否则你不应该扩展你的自研缓存来提供这些更复杂的功能，否则无论你是否愿意，你最终都会陷入编写，更糟糕的是，*维护*缓存实现的业务中。


    ### 陈旧性的痛点


    保持缓存更新是缓存维护的另一个常见问题。如果你幸运的话，你缓存的数据变化不大。如果不是，你必须处理保持缓存条目足够新鲜的问题。“足够新鲜”高度依赖于数据。有时，只要它们最终得到更新，你可以容忍一些陈旧条目。在这种情况下，你可能可以依靠基于算法的失效策略。


    然而，通常缓存数据*必须*始终与记录系统保持一致。这对于金融和交易数据很常见。缓存必须越新鲜，对实现的约束就越多。同时保持新鲜度和足够高的命中率以值得使用缓存可能需要极端措施。缓存如何保持新鲜最终是一个架构和业务决策。


    ### 重复的痛点


    如果相同的数据源在多个位置被缓存，缓存的许多痛点会变得更加严重，这在扩展部署中很常见，其中同一应用程序的多个实例都保留自己相同缓存数据的副本。随着每个新的缓存实例上线，它必须查询记录系统以填充其尚未拥有的条目。因此，缓存为记录系统提供的保护是缓存副本数量的倒数。Terracotta
    将此称为 `1/n` 效应（读作“one-over-n”），其中缓存保护宝贵数据源的有效性是缓存副本数量分之一。


    图 5-1 展示了 `1/n` 效应：如果有 `n` 个应用服务器，每个应用服务器必须在请求时加载相同的数据，这会导致 `n-1` 次不必要的缓存加载。最终，这意味着缓存效率最多只能达到其可能效率的
    `1/n`。


    **图 5-1.** *`1/n` 效应*


    保持多个相同缓存数据副本的更新也带来了类似的问题，特别是如果，例如，缓存部署使用网络消息发送更新或失效消息。更新或失效消息的数量是缓存副本数量的倍数。随着扩展部署实例数量的增长，处理这些缓存消息的开销可能会压垮连接网络和用于发送此类消息的基础设施。


    最后但同样重要的是，随着管理许多缓存的状态、新鲜度和大小的复杂性增加，操作许多缓存可能导致管理和调优的噩梦。


