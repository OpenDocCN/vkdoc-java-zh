- fmt: '# Terracotta 核心原理与优化策略


    `Terracotta` 采用仅追加（append-only）的写入方式。对象永远不会在磁盘上进行排序、索引或重新定位/碎片整理。


    ## 四种优化策略分析


    让我们进一步分析这四种优化策略，首先从缓存读取开始。


    ### 1. 内存缓存读取


    首先，应用程序拥有数据的内存缓存（见图1-3），因此读取时无需磁盘 I/O。该缓存位于应用程序端（相对于`Terracotta`服务器而言的网络侧），因此与数据库的内部缓存不同，`Terracotta`能够以内存速度响应某些请求。由于`Terracotta`是透明的，因此才能在应用程序内部以透明方式进行缓存。这也有助于显著减轻`Terracotta`服务器进程的工作负载。


    ### 2. 按需精确读取


    其次，`Terracotta`只读取它需要的内容。`Terracotta`将对象的字段在磁盘上彼此分开存储，但位于同一磁盘块中相邻的位置。每个字段都可以单独检索。由于数据在磁盘上的格式化方式类似于`HashMap`在内存中的组织方式，`Terracotta`可以将待检索字段的标识符作为键，对该标识符进行哈希运算以定位文件位置，移动到文件中的相应块，然后加载该字段，而无需加载任何其他磁盘块。


    这里还有一个进一步的优化：对象的字段是在应用程序中调用构造函数的同时创建的。因此，对象的字段在磁盘上都存储在一起。由于`Terracotta`一次读取整个磁盘块，它通常在一次磁盘操作中读取许多同时创建的对象和字段。这些对象和字段通常需要一起使用，因为它们代表同一对象或紧密相关对象的不同部分。


    ### 3. 增量写入与批量写入


    第三，服务器只写入发生变化的内容，并且以批量方式写入。正如我们所指出的，`Terracotta`服务器写入磁盘的方式类似于哈希映射（`HashMap`）写入内存的方式。每个字段都可以独立更改，无需更新其他任何数据。当多个对象发生变化时，它们的更改会被一起写入磁盘上的同一块，从而尊重我们之前讨论的块级读取优化。


    ### 4. 仅追加写入


    第四，服务器以仅追加（append-only）方式写入。这意味着我们无需为字段数据的变化而增加负担，也无需从磁盘读取块以便将块写回磁盘。通常，更改磁盘上的数据需要将数据所在的块读入内存，修改文件缓冲区，然后将缓冲区刷新回磁盘。`Terracotta`避免了这种额外的读取
    I/O。更重要的是，如果运行`Terracotta`进程的服务器有足够的内存，文件数据可以全部缓存在操作系统文件缓冲区的内存中。如果能够实现这种缓存，所有读取流量都将由内存缓冲区提供服务（额外的防御层），而磁盘子系统仅需向数据文件的末尾写入。这意味着`Terracotta`服务器可以被调优以充分利用整个磁盘子系统的吞吐量，因为它永远不需要寻道到磁盘上的随机位置。


    > **注意**：如果`Terracotta`服务器需要支持超过单个磁盘所能承受的写入流量，操作员可以将`Terracotta`跨多个磁盘进行条带化，以便写入流量分布到这些磁盘上。例如，如果一个转速为
    10,000 rpm 的单个硬盘可以承受每秒 100 MB 的读取或写入流量，那么在`Terracotta`下将四个磁盘条带化在一起，将为运行在`Terracotta`之上的
    Java 进程提供每秒 400 MB 的高可用对象 I/O 总容量。每秒 400 MB 相当于超过 4 Gbps 的网络吞吐量。


    ## 扩展性与磁盘 I/O


    这些扩展性和磁盘 I/O 方案，虽然对于数据库管理员来说是相当标准的做法，但被大型电子商务网站的`Terracotta`设计者所关注，并现已内置于`Terracotta`中。


    因此，虽然数据库可以像`Terracotta`一样将新记录追加到表的末尾，但随着数据的变化，索引必须进行调整和维护。数据库必须为对已排序索引的随机 I/O
    做好准备，这会导致显著的延迟，因为磁盘需要寻道到索引必须更改的磁盘位置。然而，`Terracotta`并不关心对象在磁盘上相对于其他对象的存储位置。它只需要能够通过对象的
    ID 检索单个对象。与数据库对磁盘的多种用途相比，`Terracotta`对磁盘的单一用途意味着它可以自我优化，而数据库则需要管理员干预，以告知系统针对特定数据应利用多种优化中的哪一种。


    ## 使用场景


    `Terracotta`使多个服务器像一台逻辑服务器一样协同工作。它可以应用于多种方式和多种使用场景，但它与 JVM 协同工作，以消除我们通常在逐个应用程序中处理的可扩展性/可用性权衡。


    `Terracotta`的基本使用场景属于以下大类：


    - 分布式缓存

    - 数据库卸载

    - 会话复制

    - 工作负载分区


    ### 分布式缓存


    当用于分发应用程序缓存数据时，`Terracotta`在 Java 进程之间共享 Java 集合。在这种架构下，典型用例需要跨进程共享映射（`Map`）、列表（`List`）、数组（`Array`）和向量（`Vector`）——包括`java.util`和`java.util.concurrent`中的类型。有几个`Terracotta`功能将使此用例更简单。首先是对象标识将正常工作。这意味着`hashCode()`和`==`将按预期工作，例如，在映射和列表中关于多次存储相同键的情况。这也意味着以下代码示例将返回`TRUE`：


    ```java

    Object foo1, foo2;

    foo1 = cache.get(key);

    foo2 = cache.get(key);

    return(foo1 == foo2);

    ```


    透明集群服务对分布式缓存应用程序的另一个好处是，缓存不会影响领域模型。经典的例子是对数据集的多重索引。例如，旅游行业的网站需要能够按位置、价格、房间设施和可用性来显示酒店。存储酒店数据的自然位置是数据库，其中所有这些细节都转化为针对数据表的
    SQL 查询，并且索引在运行时指定。然而，大多数旅游网站并非每次用户访问网站并尝试查找酒店时都向数据库发出查询；相反，它们使用缓存。而且，能够在缓存中完成我们在数据库中能做的事情会很好，即只存储酒店一次，但拥有价格范围、位置名称和其他数据作为不同键的备用索引。


    我可以将旧金山市中心的威斯汀圣弗朗西斯酒店存储在键“San Francisco”、“US POSTAL CODE 94102”和“Hotels between
    $300 and $1,000 per night”下。但无论以何种方式返回，酒店都是同一家酒店。这一切都很好，直到我们想要将酒店的特价价格更新为 259
    美元；现在，酒店落入了其最初存储在缓存中的价格范围之外，因为它现在低于 300 美元。如果我们在数据库中建模，没有问题。如果我们在内存中跨机器建模，就会有问题。第
    5 章将详细介绍分布式缓存用例以及如何处理随时间变化的数据。


    ### 数据库卸载


    数据库既是 Java 开发人员存在的祸根，同时也是我们最好的朋友。'
  raw: '• Terracotta writes in an append-only fashion. Objects are never sorted, indexed,
    or relocated/defragmented on the disk.


    986-1 CH01.qxd 5/30/08 8:58 PM Page 16


    **16**


    C H A P T E R 1 ■ T H E O RY A N D F O U N D AT I O N


    Let’s analyze each of the four optimizations further, starting with reading from
    cache.


    First and foremost, the application has an in-memory cache of the data (see Figure
    1-3) so that when reading, there is no disk I/O. This cache is on the application’s
    side of the network with respect to the Terracotta server, so unlike a database’s
    internal cache, Terracotta can respond to some requests at in-memory speed. Caching
    inside the application in a transparent fashion is only possible because Terracotta
    is transparent. This also serves to significantly lessen the workload on the Terracotta
    server process.


    Second, Terracotta reads only what it needs. Terracotta stores an object’s fields
    separate from each other on disk but near each other on the same disk block. Each
    field can be retrieved separately. Since the data is formatted on disk much like
    a HashMap would be in memory, Terracotta can take the identifier for a field to
    be retrieved as a key, hash that identifier into a file location, move to the
    appropriate block within the file, and load the field without loading any other
    disk blocks.


    There is a further optimization here in that an object’s fields are created at
    the same point in time that the constructor is called inside the application.
    Thus, the object’s fields are all stored near each other on disk. Since Terracotta
    reads entire disk blocks at once, it usually reads, in a single disk operation,
    many objects and fields that were created together. Those objects and fields are
    often needed together, since they represent parts of the same object or closely
    related objects.


    Third, the server writes what changes, and it writes in batches. As we pointed
    out, the Terracotta server writes to disk much like a hash map (HashMap) would
    write to memory. Each field can change without updating any other data. When several
    objects change, their changes are written together to the same block on disk so
    that they honor the block-level read optimization we discussed previously.


    Fourth, the server writes in append-only fashion. This means that we needn’t burden
    ourselves with changes in field data, and we needn’t read blocks from disk in
    order to write blocks back to disk. Normally, changing data on disk requires reading
    the block where the data is located into memory, mutating the file buffers, and
    flushing the buffer back to disk. Terracotta avoids this extra read I/O. What’s
    more, if the server running the Terracotta process has enough memory, the file
    data can all be cached in memory inside the operating system’s file buffers. If
    this caching can occur, all read traffic is served from memory buffers (an additional
    line of defense), and the disk subsystem is only writing to the end of our data
    file. This implies that a Terracotta server can be tuned to utilize the entire
    disk subsystem’s throughput, since it never has to seek to random locations on
    disk.


    ■**Note** If a Terracotta server needs to support more write traffic than a single
    disk can sustain, the operator can stripe Terracotta across multiple disks so
    that write traffic spreads across those disks. For example, if a single hard disk
    spinning at 10,000 rpm can sustain 100 megabytes per second of read or write traffic,
    striping four disks together under Terracotta would deliver a total capacity of
    400 megabytes per second of highly available object I/O to Java processes running
    on top of Terracotta. 400 megabytes per second translates to over 4 gigabits of
    network throughput.


    986-1 CH01.qxd 5/30/08 8:58 PM Page 17


    C H A P T E R 1 ■ T H E O RY A N D F O U N D AT I O N


    **17**


    These scaling and disk I/O recipes, while quite standard fare for database administrators,
    were brought to the attention of Terracotta’s designers at the large e-commerce
    web site and are now baked into Terracotta


    So, while the database can append new records onto the end of a table like Terracotta
    does, indexes must be adjusted and maintained as data changes. Databases must
    be prepared for random I/O into sorted indexes, and this costs significant latency
    while the disk seeks the point on the disk where an index must change. Terracotta,
    however, does not burden itself with where on the disk an object is stored relative
    to other objects. It merely needs to be able to retrieve individual objects by
    their IDs. Terracotta’s singular use of the disk, as compared with the multiple
    uses a database has for the disk, means Terracotta can optimize itself, whereas
    a database requires administrator intervention to tell the system which of many
    optimizations to leverage for specific data.


    **Use Cases**


    Terracotta makes several servers work together like one logical server. It can
    be applied in many ways and to many use cases, but it works in conjunction with
    the JVM to eliminate scalability/availability trade offs that we otherwise deal
    with application after application.


    The basic use cases of Terracotta fall under the following umbrella categories:


    • Distributed cache


    • Database offload


    • Session replication


    • Workload partitioning


    **Distributed Caching**


    When used to distribute application cache data, Terracotta shares Java collections
    across Java processes. Under such architectures, typical cases require maps, lists,
    arrays, and vectors—in both java.util and java.util.concurrent—to be shared across
    processes. There are several Terracotta capabilities that will make this use case
    easier. The first is that object identity will work. This means that hashCode()
    and == will work as expected, for example, in maps and lists with respect to storing
    the same key more than once. This also means that the following code example will
    return TRUE:


    Object foo1, foo2;


    foo1 = cache.get( key );


    foo2 = cache.get( key );


    return( foo1 == foo2 );


    Another benefit of transparent clustering services for distributed cache applications
    is that the cache does not impinge on the domain model. The classic example here
    is that of multiple indexes to a dataset. For example, a web site in the travel
    industry needs to be able to display hotels by location, price, room amenities,
    and availability. The natural place to store the hotel data is in a database where
    all these details amount to SQL queries against a data table and indexes are specified
    at run time. However, most travel web sites are not issuing


    986-1 CH01.qxd 5/30/08 8:58 PM Page 18


    **18**


    C H A P T E R 1 ■ T H E O RY A N D F O U N D AT I O N


    queries against the database every time a user comes to the site and attempts
    to locate a hotel; rather, they use a cache. And, it would be nice to be able
    to do in the cache what we can do in the database, namely store the hotel once
    and only once but have alternate indexes with price ranges, location names, and
    other data as different keys.


    I can store the Westin St. Francis Hotel in downtown San Francisco under the keys
    “San Francisco,” “US POSTAL CODE 94102,” and “Hotels between $300 and $1,000 per
    night”. But the hotel is the same hotel no matter how it gets returned. This is
    all fine and good until we want to update the hotel’s price to $259 on special;
    now, the hotel falls out of the price range under which it was originally stored
    in cache, because it is now less than $300\. If we model this in the database,
    there’s no problem. If we model it in memory, spread across machines—problem.
    Chapter 5 will detail the distributed cache use case and how to work with changing
    data over time.


    **Database Offload**


    The database is the bane of Java developers’ existence and, simultaneously, our
    best friend.'
