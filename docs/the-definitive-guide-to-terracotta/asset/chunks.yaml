  raw: 'The Terracotta server will become a bottleneck when more and more of its internal
    SEDA stages must be involved in an object update. For example, if an update to
    an object requires a broadcast to several JVMs and a flush to disk and that update
    is to the same objects that were updated in a recent transaction, the server must
    order all the operations and make pending several stages of processing while waiting
    for others to complete. The less object updates over-lap across JVMs, the faster
    the system will go. The concept of keeping objects out of JVMs that don’t need
    them and keeping objects resident in memory as close to the processor as possible
    is referred to as locality of reference.


    One of the secrets to successfully tuning an application is to try to maintain
    locality of reference. “Reference” refers to object references and “locality”
    to keeping object references as close to L1 and L2 as possible. L1 will not be
    able to maintain locality if the data Terracotta is managing takes more space
    than available memory, and it will then spill to the L2 anything it doesn’t need
    or cannot retain. L2 will not be able to maintain locality if the data Terracotta
    is managing must spill to disk.


    Any and all I/O—be it disk, network, or even memory—can result in application
    bottlenecks. The data gathered by the snapshot and visualization tools provides
    a targeted view of each of the points at which the system can execute I/O and
    end up waiting for that I/O.


    Use the tool to confirm for yourself that your application exhibits good locality,
    meaning that object faults from L2 to L1 and from disk to L2 are not required
    much of the time. Recall that we executed inventory.pounder application in different
    ways. The pounder worked on random elements in the productArray, meaning both
    JVMs were making changes to the same objects all the time. poundOneProduct() instead
    updated the same product, namely the 1 gigabyte flash card in a loop, explicitly
    breaking locality of reference and forcing the object changes to be pushed and
    acknowledged between both JVMs. The last model worked on two different objects,
    one in each JVM.


    Think of locality of reference as akin to linear scalability. As long as our application
    runs without sharing objects across JVMs, no communication other than to L2 needs
    occur. This is the fastest way to run, because the L2 will not block transaction
    flow from any one L1, waiting for other L1s to acknowledge updates. Let’s confirm
    for ourselves that the inventory.pounder application running in a highly localized
    mode runs much faster than when updating random objects in all JVMs.


    **Specific Bottlenecks in inventory.pounder**


    The pounder we created at the beginning of this chapter was run in essentially
    two different modes. The modes were carefully designed to illustrate the key bottlenecks
    that a real-world application will experience when running in a Terracotta environment.
    Given your new understanding of the Terracotta server’s internals, let’s review
    the three tests.


    Broadcasting Changes


    One issue that occurs whenever the same object is touched by more than one JVM
    is that all changes in one context must be sent to all JVMs where the object lies
    resident. The specific broadcast rate (broadcasts per transaction as measured
    by the tools) in each of our pounder


