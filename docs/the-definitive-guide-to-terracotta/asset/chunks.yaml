    首先，我们看看在最细粒度的情况下会发生什么，即批次大小仅为 1。在这种情况下，事务数量将等于缓存的大小（此处为 100,000 个项目）。细粒度批处理用例显示了最差的时间，并表明涉及的
    I/O 有显著影响。


    之后，每个批次的大小乘以 10。输出表明，增加批次大小会在一定程度上提高性能，但随后性能开始下降，这可能是由于内存开销和垃圾回收开始产生影响。如前所述，使用非常粗粒度的事务（例如包含整个加载过程的单个事务）更有可能导致
    OutOfMemoryError 场景。


    Terracotta 正在努力使这种批处理优化变得不再必要。未来，Terracotta 将自动调整事务边界，并在处理一系列细粒度事务时优化 I/O。


    **锁定与映射**


    清单 5-4 及其在清单 5-6 中的相关配置展示了如何将 Map 包装到自定义的 Cache 类中，并使用自动集群同步在 Cache 级别指定锁定。清单
    5-4 中的 Cache 类省略了所有其他方法，但如果它有像 get() 这样的面向读取的方法，我们建议将该方法的锁定级别指定为 *read*，而不是 *write*。这将允许集群中的多个读取器并发访问
    HashMap。写锁定级别的行为类似于 Java 中的同步块。


    如前所述，自动锁定的集合 TIM 为各种同步集合中的方法提供了自动锁定，并将根据需要正确指定读锁和写锁。


    **映射的映射**


    使用 Terracotta 插桩版本的 Map 实现的好处之一是，Map 中的值可以从 JVM 中逐出，因为它们存储在虚拟堆中。


    当需要时，例如在 get() 上，Terracotta 会自动将对象回传到 JVM。


    n**注意** java.util.TreeMap 实现使用逻辑插桩来维护跨集群的内部树结构的排序性质。逻辑插桩记录对 TreeMap 的调用，并在集群中的其他
    JVM 上重放它们。因此，每个 JVM 维护自己的排序树结构。这种技术的一个副作用是，与 HashMap 和 ConcurrentHashMap 不同，值对象永远不会从
    TreeMap 结构中逐出。


    986-1 CH05.qxd 5/31/08 8:56 AM Page 120


    **120**


    C H A P T E R 5 n CACHING


    然而，HashMap 或 ConcurrentHashMap 中的键值不会从 JVM 中逐出，因此 Map 中的所有键必须适合内存。在非常大的 Map 的情况下，键集的大小不能超过
    JVM 堆大小。例如，如果您的键对象包含一个 100 字节的 String 字段和两个整数字段，则该对象大约为 108 字节。如果 Map 包含一百万个键，则键集占用的总内存为
    108MB。始终确保键集可以放入 Java 堆中。


    可用于解决此问题的一种策略是创建映射的映射。这将允许子映射（即顶层 Map 的值）在特定节点未使用时被完全逐出。如果使用分区策略，其中每个节点处理数据的一个子集，则顶层
    Map 的键应基于相同的分区策略（按 ID 空间、地理位置或任何其他方式）。然后，Terracotta 将自然地逐出特定节点上分区未使用的子映射。


    **深入探讨缓存**


    现在您已经看到了一些使用简单 Map 实现进行缓存的示例，是时候更深入地研究缓存，看看我们如何充分利用 Terracotta 的强大功能来处理更广泛的共享数据用例。


    **逐出与过期**

