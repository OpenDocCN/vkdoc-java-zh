    中瞥见的 Terracotta 的强大功能应该已经在你的脑海中逐渐成形。能够编写跨 JVM 工作的普通 Java 代码意味着什么，应该变得越来越清晰。


    请记住，你使用 Terracotta 的方式，就像 Java 本身一样，仅受限于你的想象力。Terracotta 的开发始终以可扩展性和高可用性问题为核心，我们将向你介绍
    Terracotta 为这些问题提供的许多解决方案。


    但很可能，对于透明且持久的虚拟 JVM 堆，还有许多尚未有人想到的用途。


    既然你已经从概念和实践层面理解了 Terracotta 是什么以及它是如何工作的，接下来的章节将探讨 Terracotta 如何在许多特定的问题领域中使用。


