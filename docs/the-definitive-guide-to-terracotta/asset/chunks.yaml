    In this section, we will address both of these issues. The first one will be addressed
    by using the oldest trick in the book, batching, while the solution for the other
    one is based on Terracotta cluster events.


    **Work Batching**


    Earlier in this chapter, we discussed two of the most important things to think
    about when you are developing with Terracotta: locality of reference and lock
    contention. Minimizing lock contention means trying to minimize the wait time
    for the different threads to further utilize the CPU (i.e., improving the throughput).
    However, another thing closely tied to lock contention is worth considering—the
    granularity of locking. In multithreaded programming, making the lock granularity
    (i.e., the scope of the critical section) as small as possible is generally best.
    But it is important to understand is that this is not always true with Terracotta.
    As we


    986-1 CH11.qxd 5/28/08 12:54 PM Page 275


    C H A P T E R 1 1 n GRID COMPUTING USING TERRACOTTA


    **275**


    discussed in the first chapters, Terracotta treats critical sections of code (i.e.,
    synchronized blocks and methods) as a single transaction and collects all changes
    made within this transaction into one atomic change set that is flushed to the
    server when the transaction commits (which happens just before the lock is released).


    If you stop and think about this for a moment, collecting all the changes is fairly
    cheap, while flushing them to the server, which requires sending data over the
    network, is relatively expensive. Implicit network chatter underneath fine-grained
    locking means that aiming for the most fine-grained locking you can get is not
    always best. The optimal lock granularity is typically use case specific, but
    in some cases, you’ll see improved throughput by using coarse-grained locks.


    Making the locking (and thus the transactions) more coarse-grained in master/worker–based
    use cases can sometimes improve throughput immensely. The good news is that, in
    the master/worker container, the problem can be solved in a generic fashion using
    batching. The actual implementation is out of the scope of this book (see the
    accompa-nying code for details) but can be solved fairly straightforwardly. Instead
    of adding each WorkItem to its specific Pipe’s pending work queue immediately
    after it has been created, collect them in a work set, and define a batching threshold;
    whenever the threshold is reached, put all the work items in the queue in one
    single Terracotta transaction. The workers can use the same strategy when adding
    completed work items to the work queue of completed work items.


    **Dynamic Worker Management**


    The master/worker container we have implemented so far has a rather static configuration.


    It requires knowledge about all pipes that will ever be needed and used for work
    scheduling, since their routing ids have to be fed to the master at startup time.
    This setup naturally poses very limiting and sometimes unacceptable constraints
    in the management and operation of the master/worker cluster, especially in regard
    to worker failure and failover, which is something we will discuss in the next
    section.


    Terracotta provides a high-level event subscription system where nodes can subscribe
    to events triggered by other nodes as they either leave or join the cluster. These
    events are regular JMX events and can therefore be consumed and used by any JMX-compliant
    library or tool. In order to make things simpler for the developer, Terracotta
    has provided a utility library that makes it very easy and straightforward to
    start making use of these events. The library is called jmx-util and is replicated
    in the SVN repository for this chapter for simplicity. A walkthrough of this library
    is out of scope for this chapter (see Chapter 4 for more information), but we
    will show you how to make use of the library to simply and efficiently implement
    dynamic worker management and worker failover. We will now refactor the code from
    previous sessions to make use of Terracotta cluster events to enable transparent
    worker management, meaning being able to add and remove workers on the fly.


