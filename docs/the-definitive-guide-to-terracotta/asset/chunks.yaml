    \      <logs>terracotta/server-logs</logs>\n    </server>\n  </servers>\n  <clients>\n\
    \    <logs>terracotta/client-logs</logs>\n  </clients>\n  <application>\n    <dso>\n\
    \      <instrumented-classes>\n        <include>\n          <class-expression>org.terracotta.book.coordination.queues.CoordinationWithQueues</class-expression>\n\
    \        </include>\n        <include>\n          <class-expression>org.terracotta.book.coordination.queues.CoordinationWithQueues$NamedQueue</class-expression>\n\
    \        </include>\n      </instrumented-classes>\n      <roots>\n        <root>\n\
    \          <field-name>org.terracotta.book.coordination.queues.CoordinationWithQueues.QUEUES</field-name>\n\
    \        </root>\n        <root>\n          <field-name>org.terracotta.book.coordination.queues.CoordinationWithQueues.sharedCounter</field-name>\n\
    \        </root>\n      </roots>\n      <locks>\n        <autolock>\n        \
    \  <method-expression>void org.terracotta.book.coordination.queues.CoordinationWithQueues.main(java.lang.String[])</method-expression>\n\
    \          <lock-level>write</lock-level>\n        </autolock>\n      </locks>\n\
    \    </dso>\n  </application>\n</con:tc-config>\n```\n\n此示例的配置指定了`CoordinationWithQueues`示例类及其内部类`NamedQueue`必须被检测。指定了两个根：队列列表`QUEUES`和共享计数器`sharedCounter`。`main()`方法被添加到`<locks>`部分，使其对Terracotta锁定敏感，但由于`LinkedBlockingQueue`由Terracotta隐式配置，因此无需为队列的操作配置锁定。\n\
    \n这个相当直接的示例说明了Terracotta为简单Java程序提供的强大功能，允许它们使用标准的Java库类相互发送消息，从而有效地提供一种看起来就像线程间通信的IPC/RPC机制。\n\
    \n## 总结\n\n本章中的示例说明了如何利用Terracotta将JVM内置的简单并发工具用于提供极其强大的JVM间协调机制。使用简单的Java构造使得这种方法易于开发，并且更重要的是，可以在单元级别进行测试，因为您的应用程序可以在单个JVM中无需Terracotta即可执行。Terracotta透明地提供其能力，使其不干扰您的代码，并允许您以最清晰的方式表达您的意图。\n\
