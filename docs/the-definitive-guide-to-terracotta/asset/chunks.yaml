    第 7 章 n 使用 TERRACOTTA 扩展 HTTP 会话


    **173**


    **支持的平台**


    我们在本章开头已经解释过，Terracotta 提供了其专为集群使用而优化的 HTTP 会话实现。为了使此实现尽可能易于使用，它与各种应用服务器、Servlet
    容器和框架进行了集成，因此你只需在配置文件中添加适当的参数和集成模块，即可无需额外工作就能使用集群 HTTP 会话。


    Terracotta 与许多 Web 应用技术的开发团队密切合作，以提供无缝集成。在撰写本文时，Terracotta 2.6 版本支持以下产品：


    • Apache Tomcat


    • BEA WebLogic


    • IBM WebSphere Application Server 和 Community Edition


    • Jetty


    • Apache Geronimo


    • JBoss


    • Apache Struts 1.1


    • RIFE


    • Wicket


    对容器和框架的支持在不断演进，因此请务必查看 [`www.terracotta.org/`](http://www.terracotta.org/) 以获取完整且最新的列表。


    **架构考量**


    Terracotta 会尽力将数据保留在其使用的位置。如果某个会话在特定服务器上使用，Terracotta 会将其实例化在堆上，前提是数据量不大，RAM 可以容纳。Web
    应用程序典型的横向扩展架构包括一组应用服务器，前端由负载均衡器负责。用户代理连接到负载均衡器，负载均衡器再决定如何将请求路由到应用服务器。如果负载均衡器将用户的请求流量路由到另一台服务器，Terracotta
    会自动将该会话故障转移到新服务器的堆中。话虽如此，你可以做出一些部署架构决策，以大幅提高集群的性能。


    轮询负载均衡器的影响


    负载均衡器如何决定路由请求对于实现 Terracotta 的可伸缩性至关重要。一种简单的负载均衡方法是循环遍历应用服务器，而不考虑传入请求的属性——这种方法通常称为轮询负载分发机制。它可以在可用的应用服务器之间均匀分配请求负载，但会对
    Terracotta 的可伸缩性产生负面影响。


