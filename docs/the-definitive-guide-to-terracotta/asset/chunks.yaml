- fmt: "```java\nimport org.terracotta.book.masterworker.queue.QueueListener;\n```\n\
    \n```java\n/**\n* A pipe is a two way queue for work management.\n*\n* <p>\n*\
    \ It is wrapping one queue for pending work and one for completed work as well\
    \ as\n* two listeners that are receiving call backs whenever an item has been\
    \ added to\n* one of its corresponding queues.\n*\n* @param <T>\n*/\npublic interface\
    \ Pipe<T, ID> {\n    Queue<T> getPendingWorkQueue();\n    Queue<T> getCompletedWorkQueue();\n\
    \    QueueListener<T, ID> getQueueListener();\n    void startQueueListener(Set<T>\
    \ allCompletedWork);\n    void clear();\n\n    public static interface Factory<T,\
    \ ID> {\n        Pipe<T, ID> create(ID routingID);\n    }\n}\n```\n\nAs you can\
    \ see, the `Pipe` is using an abstraction called `Queue`, which is a simple generic\
    \ interface for a queue abstraction. In this example’s implementation in the SVN\
    \ repository, you can find three different implementations of this interface:\
    \ `ListBasedQueue` (wrapping a `java.util.ArrayList`), `DmiBasedQueue` (based\
    \ on Terracotta’s Distributed Method Invocation feature) and `BlockingQueueBasedQueue`\
    \ (wrapping a `java.util.concurrent.LinkedBlockingQueue`).\n\nAmong these three,\
    \ the third is the one that gives best throughput and scale (each of these `Queue`\
    \ implementations also has a `Factory` that creates the queue in question). The\
    \ `Queue` class is shown in Listing 11-7.\n\n**Listing 11-7.** *The Queue Class*\n\
    \n```java\npackage org.terracotta.book.masterworker.queue;\n\nimport java.util.Iterator;\n\
    import java.util.concurrent.TimeUnit;\n\n/**\n* Represents a one-way communication\
    \ channel. Abstract notion of putting\n* objects and receiving them (take or poll)\n\
    *\n* @param <T>\n*/\npublic interface Queue<T> {\n    public static interface\
    \ Factory<T> {\n        public Queue<T> create();\n    }\n\n    T poll(long timeout,\
    \ TimeUnit unit) throws InterruptedException;\n    T put(T item) throws InterruptedException;\n\
    \    T take() throws InterruptedException;\n    int size();\n    void clear();\n\
    \    Iterator<T> iterator();\n}\n```\n\nIf we take a look at the current code,\
    \ we discover that we need to refactor the `SimpleQueue` class—we need to rename\
    \ it `PipeManager` and swap the single `LinkedBlockingQueue` to a `ConcurrentHashMap`\
    \ with entries containing a routing ID mapped to our new `Pipe` abstraction.\n\
    \nIn practice this means going from this\n\n```java\npublic class SimpleQueue\
    \ {\n    BlockingQueue<WorkItem> m_workQueue = new LinkedBlockingQueue<WorkItem>();\n\
    \    ...\n}\n```\n\nto this\n\n```java\npublic class PipeManager<ID> {\n    private\
    \ final Map<ID, Pipe<RoutableWorkItem<ID>, ID>> m_pipes =\n        new ConcurrentHashMap<ID,\
    \ Pipe<RoutableWorkItem<ID>, ID>>();\n    ...\n}\n```\n\nFinally, we need to change\
    \ the `Master` implementation to start making use of the multiple pipes and their\
    \ routing IDs by adding a `Router` abstraction that is responsible for putting\
    \ the work on its dedicated pipe according to some predefined routing algorithm\
    \ (more of which we’ll see in the next section). In order to do that, we will\
    \ have to slightly rewrite the `schedule()` methods to hand the work to a `Router`\
    \ and not put it directly into the queue. This would mean changing the `WorkManager`\
    \ from this\n\n```java\npublic class SimpleWorkManager implements WorkManager\
    \ {\n    ...\n    public WorkItem schedule(Work work, WorkListener listener) {\n\
    \        WorkItem workItem = new DefaultWorkItem(work, listener);\n        m_queue.put(workItem);\n\
    \        return workItem;\n    }\n    ...\n}\n```\n\nto this\n\n```java\npublic\
    \ class StaticWorkManager<ID> implements WorkManager {\n    private final Router<ID>\
    \ m_router;\n    ...\n    public WorkItem schedule(final Work work, final WorkListener\
    \ listener) {\n        return m_router.route(work, listener);\n    }\n    ...\n\
    }\n```\n\nn**Note** The reason for naming the class `StaticWorkManager` is that\
    \ this implementation reflects a static configuration with all the routing ids\
    \ predefined and passed into the `WorkManager` at startup. This limitation is\
    \ removed in the next refactoring session, in which we introduce a `DynamicWorkManager`\
    \ that can handle workers joining and leaving the cluster on the fly."
