    **127**


    **将 Ehcache 与 Terracotta 结合使用**


    Ehcache 在多种配置中支持分布式缓存。Terracotta 提供了一种即插即用的解决方案，该方案提供了分布式缓存的另一种实现，与内置的 Ehcache
    选项相比，具有显著的性能和可扩展性优势。


    增强功能与配置


    Terracotta Ehcache 集成为分布式缓存提供了许多重要的增强功能，包括细粒度的读写锁定、优化的分布式驱逐策略、更高的可扩展性以及集群范围的缓存一致性。


    当将 Terracotta 与 Ehcache 结合使用时，标准的内存驱逐策略（LRU、LFU 和 FIFO）将被一种新的基于时间的驱逐策略所取代。该驱逐策略旨在通过在靠近使用点的地方处理驱逐，来最大限度地减少对象在网络上的错误加载。


    如果你的应用程序在一组节点上运行，并且这些节点可以访问按应用程序划分的数据，那么 Terracotta 将尽可能在每个分区本地执行驱逐。全局驱逐器还将负责处理不再在任何节点上使用的缓存条目的驱逐。发生驱逐时，该条目将从集群中每个节点的缓存中移除。


    要配置 Terracotta 驱逐策略，需要使用以下 Ehcache 属性；其中一些属性的含义已更改：


    • maxElementsInCache：此属性被 Terracotta 集成忽略。分布式 Terracotta 缓存中可以存储的对象数量是无限制的，缓存改由分布式驱逐策略管理。


    • timeToIdleSeconds：此属性与正常内存驱逐中的含义相同。


    • timeToLiveSeconds：此属性与正常内存驱逐中的含义相同。


    • eternal：此属性被 Terracotta 驱逐策略忽略。要模拟此行为，可以将 timeToIdleSeconds 和 timeToLiveSeconds
    设置为零。


    • diskExpiryThreadIntervalSeconds：此属性与正常磁盘驱逐中的含义相同，但适用于 Terracotta 分布式驱逐策略，指定过期和驱逐发生的频率。


    此外，由于 Terracotta 集成的性质，一些标准的 Ehcache 功能不受支持，特别是通知（传统上用于内置的分布式缓存支持，Terracotta 不需要）和磁盘存储。Terracotta
    将缓存持久化到共享虚拟堆中，如果以这种方式配置，也会持久化到服务器磁盘上，因此不需要基于磁盘的存储。


