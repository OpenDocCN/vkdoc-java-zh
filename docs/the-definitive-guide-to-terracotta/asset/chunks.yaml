    int expectedParticipants = MINIMUM_EXPECTED_PARTICIPANTS;


    if (args.length == 0) {


    System.out.println("Node count NOT specified. Setting count to "


    + MINIMUM_EXPECTED_PARTICIPANTS);


    } else {


    try {


