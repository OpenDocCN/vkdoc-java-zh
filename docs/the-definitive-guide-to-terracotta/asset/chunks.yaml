    The <include> and <exclude> stanzas are evaluated bottom up according to the order
    in the Terracotta configuration file. The first pattern that matches will determine
    whether the class will or will not be instrumented. If no patterns match, the
    class will not be instrumented.


    Using a combination of <include> and <exclude> class expressions, you can pick
    out exactly the set of classes that you want included for instrumentation.


    <instrumented-classes>


    <include>


    <class-expression>com.mycompany.pkga.*</class-expression>


    </include>


    <exclude>com.mycompany.pkga.subpkg.*</exclude>


    <include>


    <class-expression>com.mycompany.pkgb.*</class-expression>


    </include>


    </instrumented-classes>


    986-1 CH04.qxd 5/6/08 3:01 PM Page 78


    **78**


    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    In the preceding example, every class in the package com.mycompany.pkgb and in
    every package under it will be instrumented. However, no class in com.mycompany.pkga.subpkg
    or in any package under it will be instrumented. But, every class in the package
    com.mycompany.pkga and in every package under it *except* com.mycompany.pkga.subpkg
    and below will be instrumented. You may also use class name patterns as well as
    package patterns to fine-tune the set of included classes.


    ■**Note** Some classes are automatically instrumented by Terracotta. These classes
    are placed automatically in the Terracotta boot JAR when the boot JAR is created.


    **Portability**


    Terracotta can cluster most Java objects, but there are limits to what you can
    add to a Terracotta cluster. An object that can be clustered by Terracotta is
    called portable. For any object to be portable, its class must be instrumented.


    Instances of most instrumented classes are portable, but there are a few constraints
    on portability. Some objects are inherently nonportable, because they represent
    JVM-specific or host-machine-specific resources that don’t make sense in a clustered
    context. Some file-system-related classes such as java.io.FileDescriptor are examples
    of host-machine-specific resources that are inherently nonportable. Instances
    of java.lang.Thread and java.lang.Runtime are examples of JVM-specific resources
    that are inherently nonportable.


    Other nonportable objects are instances of classes that extend inherently nonportable
    classes, uninstrumented classes, or classes of logically managed objects (more
    on logically managed objects later).


    **Boot JAR Classes**


    Most classes may be instrumented at class load time if you need them to be. Some
    classes, however, are loaded too early in the life cycle of the JVM for Terracotta
    to hook into their loading process. Such classes cannot be instrumented at load
    time but must instead be preinstrumented and placed in a special JAR file that
    is then prepended to the boot classpath.


    Some of the classes in the boot JAR are placed there automatically by Terracotta.
    Other classes may be added to the boot JAR by augmenting the Terracotta configuration
    to include them in the boot JAR section of the Terracotta configuration and then
    running the make-boot-jar script in the bin directory of the Terracotta installation.


    The location of the boot JAR must be passed in as a JVM argument to the java command
    when you start your application. You can run the dso-env script in the bin directory
    of the Terracotta installation to see how to add the boot JAR to your JVM arguments.


    **Physically vs. Logically Managed Objects**


    Most objects are managed by moving their field data around the Terracotta cluster.
    These classes of objects are described as physically managed because Terracotta
    records and distributes


    986-1 CH04.qxd 5/6/08 3:01 PM Page 79


    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    **79**


    changes to the physical structure of the object. When a field of a physically
    managed object changes, the new value of the field is sent to the Terracotta server
    and to other members of the Terracotta cluster that currently have the changed
    object in memory.


    Some classes of objects are not shared this way, however. Instead of moving the
    physical structure of such objects around, we record the methods called on those
    objects along with the arguments to those method calls and then replay those method
    calls on the other members of the Terracotta cluster. These classes of objects
    are described as logically managed, because Terracotta records and distributes
    the logical operations that were performed on them rather than recording the changes
    to their internal structure.


    Terracotta uses logical management either for performance reasons or because a
    class’s internal structure is JVM specific. For example, classes that use hashed
    structures such as java.util.Hashtable, java.util.HashMap, or java.util.HashSet
    are logically managed. The hashcodes used to create the internal structure of
    these classes are JVM specific. If an object that has a structure based on JVM-specific
    hashcodes were physically managed, its structure on other JVMs in the Terracotta
    cluster would be incorrect and nonsensical, since the hashcodes would be different
    on those other JVMs.


    Other classes are logically managed, because changes to them can involve wholesale
    shifts in their internal structure. While those shifts in memory happen with acceptable
    latency, they would cause a flurry of clustered object changes in the cluster.
    This happens when, for example, an array-backed List is rebalanced or reordered.
    Rather than mirroring the exact internal structure of such objects, Terracotta
    keeps track of the methods that are called. The object may be brought up to date
    by replaying the method call sequence, which updates the internal data structures
    inside the object in memory.


    **Nonportable and Logically Managed Classes**


    You saw previously that classes with a nonportable class in their type hierarchy
    are not portable. Subclasses of uninstrumented classes fall into this category,
    as do subclasses of inherently nonportable classes like java.lang.Thread.


    While logically managed classes are themselves portable, there are some restrictions
    on the portability of classes that have logically managed classes in their type
    hierarchy. This stems from the technical details of the Terracotta implementation
    of logically managed classes.


    If the subclass of a logically managed class has declared additional fields, that
    class is not portable if


    • It directly writes to a field declared in the logically managed superclass.


    • It overrides a method declared in the logically managed superclass.


    If you find that a class is nonportable because it inherits from a class that
    is nonportable because it hasn’t been instrumented, you can modify the Terracotta
    configuration to include all of the classes in the type hierarchy for instrumentation.
    However, if you find that a class is not portable because of the other inheritance
    restrictions, you must refactor the class you want to make portable so that it
    does not violate the inheritance restriction.


    986-1 CH04.qxd 5/6/08 3:01 PM Page 80


    **80**


    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    **Portability Contexts**


    There are a number of contexts in which objects become shared by Terracotta. In
    each of these contexts, the portability of the objects that are about to be shared
    is checked. If there is a portability error, Terracotta throws an exception.


