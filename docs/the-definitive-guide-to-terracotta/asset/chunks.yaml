- fmt: '# Grid Computing Using Terracotta


    There are two main categories of grids: compute grids and data grids. The differences
    between these two are easier to understand in the context of a framework of load-balancing
    and partitioning. Grids are not like web applications, in that you don’t need
    a load balancing switch and HTTP doesn’t have to be the mode of communication.
    Grids are all about manually or programmatically partitioning work to a large
    number of low-cost servers. With partitioning in mind, now think of data grids
    as clusters of computers where the data has been spread out in memory across application
    nodes in order to avoid the roundtrips and latencies in retrieving the data from
    a database. Ten low-cost servers would each store and manage one-tenth of the
    data.


    Compute grids split workload across application nodes; they only make sense for
    stateless workloads (e.g., only computational work tasks) or on top of data grids
    where the data has been partitioned. If a compute grid does not work in conjunction
    with the data grid, meaning that data and workload could be partitioned on different
    criteria, network bottlenecks could result when compute tasks running on server
    one of ten is accessing data on server seven.


    From now on, our discussion will mainly relate to data grids, which provide both
    scalability and high availability. Data grids arguably provide the most interesting
    service for enterprise applications with their focus on fault tolerance and failover
    of stateful application-specific data as well as scalability in terms of access
    to this data.


    ## How Grids Handle Scalability


    One of the main reasons grids can scale so well is that grid engines can make
    intelligent choices between either moving data to its processing context or moving
    the processing context (the operations) to the data. Effectively moving the processing
    context to the data means that the processor can make use of locality of reference;
    therefore, data that is being processed on a specific node stays local to that
    node and will, in the ideal case, never have to leave that node. Instead, all
    operations working on this specific data set will always be routed to this specific
    node. The immediate benefits are that this approach minimizes the latency and
    can give close to unlimited and linear scalability. How well it scales is naturally
    use-case specific, and achieving scalability can take both effort and skill in
    partitioning the data and grouping the work items, as well as tuning potential
    routing algorithms.


    The ultimate (and simplest) situation is when all work items are what we call
    embarrassingly parallel, which means that the work items have no shared state.
    All work items are self-contained and can execute their tasks in complete isolation,
    independently of all the other work items, which means that we do not need to
    worry about data partitioning or routing schemes. The most typical example of
    embarrassingly parallel work is an arithmetic calculation. Invoking some sort
    of `add()`, `subtract()`, `multiply()`, or `divide()` routine with two integer
    arguments requires no external context. All the data needed to execute work is
    available in the arguments to the worker. And the return results are well defined
    and need no further processing to be valuable: `add(2, 2)` should return `4`.
    However, even though embarrassingly parallel work sets are fairly common, we are
    sometimes faced with more complicated situations that require both intelligent
    data partitioning and routing algorithms in order to scale well, something that
    we will take a look at later on in this chapter.


    ## How Grids Handle Failover and High Availability


    Grids are resilient to failure and down time by effectively copying all data across
    nodes two or three times. Grids can be seen as an organic system of nodes that
    is designed to handle failure of individual nodes outside the business logic.
    This is very different from traditional design of distributed systems in which
    each node is seen as an always-on unit, leaving the developer to deal with the
    possibility of node failure in source code. Failure in a grid system—meaning failure
    of a node, a work task, the network, and so on—is not a problem, since the infrastructure
    will address the problem accordingly. For example, pending work item(s) can be
    rescheduled to another node; the node can be restarted, and so forth.


    ## Use Cases


    Applications that could benefit from being run on a grid are usually applications
    that need to work on large data sets and/or have a need to parallelize processing
    of the data to achieve better throughput and performance. Examples of compute
    grids are financial risk analysis and other simulations, searching and aggregation
    on large datasets as well as sales order pipeline processing. Examples of data
    grids are giant distributed Internet indexes such as Google’s or Yahoo’s.


    ## Introducing the Master/Worker Pattern


    The Master/Worker pattern is the key enabler in grid computing and one of the
    most well-known and common patterns for parallelizing work. In this chapter, we
    will explain the characteristics of the pattern and walk through some possible
    implementation strategies.


    The Master/Worker pattern consists of three logical entities: a master, a shared
    workspace, and one or more instances of a worker. The master initiates the computation
    by creating a set of work tasks, puts them in the shared workspace, and waits
    for the work tasks to be picked up and completed by the worker(s). The shared
    workspace is usually some sort of queue, but it can also be implemented as a tuple
    space (for example, in Linda programming environments, such as JavaSpaces, where
    the pattern is used extensively).


    > **Note** Linda programming was invented at Yale University by a team led by
    David Gelernter. The system is made up of shared memory spaces for multiple processes
    to post and take objects. The shared memory is augmented with the concept of mutual
    exclusion, where a thread must take what it needs out of the shared space before
    operating on the object. By taking objects from shared memory while working on
    them, a thread can safely assume no other operations can occur, and thus no concurrency
    or transactions are required.


    One of the advantages of using the Master/Worker pattern is that the algorithm
    automatically balances the load. This balancing is possible because the workspace
    is shared, and the workers continue to pull work tasks from the workspace as soon
    as those workers are able to do work until there are no more pending tasks. The
    algorithm usually exhibits good scalability as long as the number of tasks by
    far exceeds the number of workers and if the tasks take a fairly similar amount
    of time to complete. See Figure 11-1 for an overview of the algorithm.


    **Figure 11-1.** *The flow of work through the Master/Worker design pattern*


    ## Master/Worker in Java


    Let’s now look at the different alternatives we have for implementing the Master/Worker
    pattern in Java. There might be more ways of doing it, but we will focus the discussion
    on three different alternatives, each one with a higher abstraction level.


    ### Using the Java Language’s Thread Coordination Primitives'
