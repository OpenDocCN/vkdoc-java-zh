    **应对现实世界的挑战**


    到目前为止，我们已经构建了一个可供使用的分布式主/工作节点容器，但尚未运行它，因为这是一个非常简陋的实现。尽管它实现了集群化的主/工作节点模式，但其扩展性并不理想。向当前实现发送过多任务本质上会导致工作队列成为瓶颈。在一个旨在实现线性扩展的框架中出现瓶颈，会阻碍我们达成目标。此外，当前实现也无法处理任务失败和重新提交的情况。


    现在，我们将对实现进行重构和扩展，以应对在现实世界中使用 `SimpleQueue` 解决实际问题时可能出现的部分挑战。


    我们将探讨以下挑战：


    • 极高的数据量


    • 路由


    986-1 CH11.qxd 5/28/08 12:54 PM 第 259 页


    第 11 章 n 使用 Terracotta 进行网格计算


    **259**


    • 任务故障与故障转移


    • 工作节点故障与故障转移


    • 动态集群管理（工作节点可在运行时连接或断开网格）


    **针对大工作负载、路由和任务故障转移的重构**


    首先要解决的挑战是线性提升工作负载吞吐量。`SimpleQueue` 之所以简陋，是因为它使用单一队列供所有主节点和工作节点通信。使用单一队列就像把旧金山所有公司的员工都塞进一辆公交车，一次只送一个人上班，其他人则排队等待被送到办公室。相反，我们将通过队列条带化技术来最小化竞争。


    **最小化竞争并最大化引用局部性**


    当前实现的主要问题之一是所有主节点和工作节点共享一个队列。在中小型工作负载下，这或许能提供可接受的性能和扩展性。然而，如果需要处理极高的数据量，单一队列就会成为瓶颈。


    一种解决方案是通过为每个工作节点创建一个队列来实现队列条带化，并让主节点更智能地将工作负载均衡地分配到各个独立的工作队列中（每个工作节点对应一个队列）。


    数据分区将实现以下目标：


    • *最大化引用局部性的利用*：如果所有操作同一数据集的任务都被路由到同一个队列，并由同一个工作节点处理，那么工作节点之间就不会跨 JVM 共享对象，从而避免对象更新引发集群流量传输到其他节点。这是迈向线性扩展的良好开端，因为每个节点必须避免与其他节点通信。


    • *最小化竞争*：由于每个队列只有一个读取者（工作节点）和一个写入者（主节点），工作节点无需等待其他工作节点即可接收或响应工作负载请求。


    为了进一步减少竞争，我们可以将每个工作队列拆分为两个队列：一个用于存放来自主节点的待处理任务请求，另一个用于存放来自工作节点的已完成任务响应。这种重构需要一个新的抽象来将这两个队列封装为一个单元——我们称这个抽象为管道。接下来，我们应该构建某种管道管理器来持有并管理不同的管道。每个管道将被分配一个唯一的
    ID。任务将根据预定义的路由算法和故障转移方案（本章稍后会详细讨论）被路由到不同的队列。


    首先，让我们引入两个新类：`RoutableWorkItem` 和 `Pipe`。我们从清单 11-5 中的 `RoutableWorkItem` 开始，它通过添加一个路由
    ID 扩展了我们的 `DefaultWorkItem` 类。该 ID 的目的是决定主节点应将任务发送到哪个管道。


    986-1 CH11.qxd 5/28/08 12:54 PM 第 260 页


    **260**


    第 11 章 n 使用 Terracotta 进行网格计算


    路由 ID 还使主节点能够在必要时更改 ID 以将任务重新路由到另一个管道，这通常是由于工作节点故障导致的，我们将在本章稍后部分进行探讨。

