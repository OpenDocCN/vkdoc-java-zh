- fmt: '# Hibernate with Terracotta


    `Hibernate` provides a powerful tool to access databases. It is a mature technology,
    widely used in many types of applications, including stand-alone Java, web, J2EE,
    and Spring-based applications. By providing a simple model for translating data
    to and from a database, `Hibernate` eases the burden of working with the database.
    `Hibernate` helps eliminate the need to write SQL and perform the mundane chores
    of instantiating objects, filling them with data from the database, and mapping
    objects in memory into tables in the database. While the focus of this book is
    not `Hibernate`, most Terracotta applications talk to a database, and our treatment
    of clustering and scaling applications across machines would be incomplete without
    addressing `Hibernate`. With Terracotta, we can improve the performance of `Hibernate`
    in a clustered environment using many of the tools and techniques you have already
    learned regarding POJO clustering.


    When scaling out a cluster of `Hibernate`-enabled applications, the database commonly
    becomes a bottleneck. In this chapter, we will see how Terracotta can be used
    to eliminate these common `Hibernate` bottlenecks working with either `Hibernate`''s
    caching interface or POJOs outside of `Hibernate`.


    To understand how Terracotta works with `Hibernate`, we will cover the basic concepts
    around which `Hibernate` is built first. The first is object-relational mapping
    (ORM).


    ## Object-Relational Mapping


    Object-relational mapping (ORM) simply means translating the data from the database''s
    relational model to the Java heap''s object-oriented (OO) model. At its core,
    ORM means translating the tables, columns, and rows of a database into the object
    instances, fields, and reference pointers of the Java heap, and vice versa.


    While many techniques are employed to perform this job, all ORM tools, such as
    `Hibernate`, `iBatis`, and `TopLink`, must solve fundamentally the same problem.
    Because this chapter is about `Hibernate`, we will focus on how `Hibernate` performs
    the ORM job.


    ## How Does Hibernate Work?


    The `Hibernate` architecture presents a very good abstraction, on which the `Hibernate`
    technology is built. At its core, `Hibernate` allows a Java developer to interact
    with objects and the database to interact with data by providing a well defined
    set of translation points between the two. Three pieces make up the core set of
    abstractions that comprise the `Hibernate` architecture; let''s look at each in
    detail:


    - **First-level cache**: Oftentimes thought of as the session, the first-level
    cache is a place to store our objects in memory as POJOs. Because we deal with
    only objects in our code, the first-level cache is largely invisible to us as
    users of `Hibernate`. One must be aware of it, however, because objects copied
    outside of `Hibernate`—into the application heap space—must typically be treated
    with care.


    - **Transaction boundaries**: These are the beginning and ending edges of the
    unit of work. Within a single unit of work, all data is read or written transactionally,
    meaning it has read-isolation semantics and is committed atomically. Transaction
    boundaries are quite visible to us as users of `Hibernate`, since they usually
    translate into `beginTransaction()` and `commit()` API calls, although they may
    also be hidden inside frameworks or other abstractions that obviate the need for
    making these calls by hand, such as inside of a servlet filter.


    - **Second-level cache**: This is a place to store a copy of our database data
    in memory as raw data. `Hibernate` provides a pluggable model, so many implementations
    exist that provide second-level caching. Except for configuration and performance
    considerations, the second-level cache is largely invisible to us as users of
    `Hibernate`.


    Figure 6-1 shows how these components work together.


    **Figure 6-1.** *Simplified Hibernate architecture*'
