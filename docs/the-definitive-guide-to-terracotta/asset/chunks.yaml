    }


    这些是对应用程序的关键更改：同步不再重要；loopCounter 现在根据当前 buffer 长度派生；我们将 buffer 序列化到网络并从网络反序列化，每次复制整个
    buffer。无需纠结 HelloClusteredWorld 的 get() 和 put() 形式是否优于 Terracotta 版本，需要记住的是，JDBC、JMS、RMI
    或其他集群和


    986-1 CH03.qxd 5/5/08 9:13 AM 第 50 页


    **50**


    第 3 章 ■ 深入 Terracotta


    共享方法都可以替代 get() 和 put()。表 3-2 将每个框架的特定 API 映射到 get() 和 put() 的逻辑概念。


    **表 3-2.** *JDBC、JMS 和 RMI 中与 map.get() 和 map.put() 接口等效的操作* **框架**


    **get() 等效操作**


    **put() 等效操作**


    JDBC


    [prepared]statement.execute()


    [prepared]statement.execute()


    SELECT


    UPDATE


    INSERT


    UPSERT


    JMS


    MessageConsumer.receive()


    QueueSender.send()


    RMI


    Portable.ObjectImpl._request()


    Portable.ObjectImpl._invoke()


    在上述伪代码调用 Cluster.get() 的地方，我们可以轻松地用关系数据库（配合适当的模式）和 JDBC 查询来替换逻辑，查询一个单行表。我们可以将该单行表命名为
    HelloClusteredWorld_TABLE。该表代表应用程序存储 buffer，以便任何 JVM 都可以查询 buffer 的当前状态，并在更改 buffer
    时更新该表。HelloClusteredWorld 的数据库版本可能包含如下代码：


    try {


    String buffer;


    stmt = con.createStatement();


    rs = stmt.executeQuery( "SELECT * FROM HelloClusteredWorld_TABLE" ); buffer =
    rs.getString( 1 );


    stmt.close();


    con.close();


    } catch( SQLException ex ) {


    System.err.println( "SQLException: " + ex.getMessage() );


    }


    在上面的示例中，我们只是在数据库和 JDBC 连接的上下文中调用 get() 和 put()。Terracotta 不需要开发者插入 get() 和 put()
    调用，因为 Terracotta 会注入到应用程序字节码中，寻找应用程序逻辑对 buffer 和 loopCounter 对象的读写操作。在 Terracotta
    注入的情况下，读取内存中的 loopCounter 实际上相当于询问 Terracotta：loopCounter 是否已根据其他 JVM 的变更更新？如果未更新，Terracotta
    保证在将控制流返回给应用程序逻辑之前更新 loopCounter。


    **Terracotta 之旅**


    现在你已经从高层次了解了 HelloClusteredWorld，让我们逐步了解安装 Terracotta、设置可运行的 HelloClusteredWorld
    版本、配置它并在 Terracotta 集群中运行它的过程。


    986-1 CH03.qxd 5/5/08 9:13 AM 第 51 页


    第 3 章 ■ 深入 Terracotta


    **51**


    **下载和安装 Terracotta**


    第一步是从 [`www.terracotta.org/`](http://www.terracotta.org) 下载软件包。点击下载链接，选择适合你平台的下载包。Terracotta
    包有两种形式：一种带有 Microsoft Windows 安装程序，另一种适用于所有平台但没有安装程序。就本章而言，我们将重点介绍 Windows 包，但除了安装程序外，两个下载包在结构和行为上几乎没有区别。


    下载 Terracotta 后，进行安装。在 Windows 上，运行安装程序。在其他操作系统上，使用 tar 程序解压归档文件。Windows 安装程序默认会将
    Terracotta 放置在 C:\Program Files\Terracotta。它还会在开始菜单中添加便捷项目，用于运行管理控制台、Terracotta
    欢迎屏幕等。


    Windows 安装程序完成后，会自动启动 Terracotta 欢迎屏幕。在其他操作系统上，可以通过运行 Terracotta 安装顶级目录中的 welcome.sh
    脚本手动启动欢迎屏幕。欢迎屏幕是探索 Terracotta 示例应用程序、启动 Terracotta 管理控制台、安装 Terracotta Eclipse
    插件以及完成一些 Terracotta 教程的良好起点。我们稍后在逐步运行 Hello Clustered World 示例时，会再次回到管理控制台和 Eclipse
    插件。


    **Terracotta 安装布局**

    '
- fmt: 'Now that you’ve installed Terracotta and seen the Welcome screen, let’s take
    a look at the contents of the Terracotta installation. It is important to note
    that the Terracotta kit contains everything needed for both the Terracotta client
    functions (the libraries that run inside your JVM) and the Terracotta server functions.
    In a typical Terracotta deployment, each application server machine running a
    Terracotta-enabled JVM would have an installation of the Terracotta kit on it.
    Likewise, the machine that runs the Terracotta server will also have the Terracotta
    kit installed. However, the application machines will use only the client parts
    of the Terracotta kit, and the Terracotta server machine will use only the server
    parts.


    You’ll find the following directories in the Terracotta kit:


    - `bin`: This contains all of the scripts needed to run the various Terracotta
    functions. Each script will be covered in more detail later.

    - `config-examples`: This contains example configuration files for various types
    of Terracotta deployments. You can use those scripts either as templates to start
    from or just as informative examples.

    - `docs`: This contains the small amount of documentation that comes with the
    Terracotta kit. Most of the Terracotta product documentation is kept online at
    [http://www.terracotta.org/](http://www.terracotta.org/).

    - `lib`: This contains all of the JAR libraries on which Terracotta depends.

    - `modules`: This contains any prepackaged Terracotta Integration Modules (TIMs)
    that come with the Terracotta kit. Terracotta Integration Modules are JAR files
    that bundle Terracotta configuration together with any necessary supporting code
    and other resources into a single unit that may be included in your Terracotta
    configuration. You can think of them as plug-ins that provide Terracotta support
    for third-party applications. You can also build your own Terracotta Integration
    Modules to prepackage your own Terracotta-enabled libraries. More information
    about Terracotta Integration Modules and existing Terracotta integrations with
    third-party technologies can be found online at [http://www.terracotta.org/confluence/display/integrations/About](http://www.terracotta.org/confluence/display/integrations/About).

    - `samples`: This contains a wealth of sample projects that demonstrate various
    usages of Terracotta, including source code, Terracotta configuration, and start-up
    scripts.

    - `schema`: This contains the XML schema for the Terracotta configuration file.

    - `tools`: This contains tools for exploring Terracotta and to help configure
    Terracotta for HTTP session clustering.

    - `vendors`: This contains resources for third-party applications that are used
    in the Terracotta installation.


    ## Terracotta Scripts


    The important Terracotta scripts are in the `bin` directory. For each function,
    there is a Windows batch script and a corresponding Unix-style shell script. We
    will arrive at a more detailed description of the important scripts through our
    exploration of the Welcome screen later.


    For a more detailed and up-to-date description of the Terracotta scripts and tools,
    see the online documentation [at http://www.terracotta.org/confluence/display/docs1/Terracotta+Tools+Overview](http://www.terracotta.org/confluence/display/docs1/Terracotta+Tools+Overview).


    To get you started though, these are the main Terracotta scripts, in alphabetical
    order:


    - `admin.[bat|sh]`: This starts the Terracotta administration console. The administration
    console is a Java program that connects to the Terracotta server via JMX and receives
    telemetry data from a running Terracotta cluster.

    - `archive-tool.[bat|sh]`: This is used to package up all of the relevant data
    and configuration files of a Terracotta deployment for diagnostic purposes.

    - `boot-jar-path.[bat|sh]`: This is a helper script that sets the environment
    variable for the boot JAR location, creating the boot JAR if necessary. This is
    not intended for stand-alone use. It is used by the other scripts to help set
    up the Terracotta environment.'
