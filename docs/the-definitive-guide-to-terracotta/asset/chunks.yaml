    **配置 Terracotta 以用于分离实例**


    配置 Terracotta 与分离实例一起使用同样只需几个简单步骤：**1.** 配置 Terracotta 以使用 Hibernate 集成模块。


    **2.** 存储分离实例。


    **3.** 重新附加分离实例。


    重构您的应用程序


    现在，我们正在使用分离实例策略，必须更改获取对象以供业务逻辑使用的策略，并且必须延迟提交这些对象，直到我们完全使用完它们。Hibernate 将此策略称为跨越长时间运行工作单元的应用程序事务（更多信息请参阅
    Hibernate 文档：[`www.hibernate.org/hib_docs/reference/en/html/objectstate.html`](http://www.hibernate.org/hib_docs/reference/en/html/objectstate.html)）。


    根据您的应用程序，您可能需要重构对 `session.beginTransaction()` 和 `session.getTransaction().commit()`
    调用的使用。


    例如，某些应用程序使用一种策略，通过 servlet 过滤器自动调用 `session.beginTransaction()` 和 `session.getTransaction().commit()`。通过在常规
    servlet 之前插入 servlet 过滤器，您无需再费心记住调用 `session.beginTransaction()` 和 `session.getTransaction().commit()`。


    配置 Terracotta 以使用 Hibernate 集成模块


    对于所有使用集群分离实例的应用程序，第一步是配置 Terracotta 以与 Hibernate 一起使用。为此，请在 `tc-config.xml` 中添加以下内容：


    <clients>


    <modules>


    <module name="clustered-cglib-2.1.3" version="1.0.0" />


    <module name="clustered-hibernate-3.1.2" version="1.0.0" />


    </modules>


    </clients>


