    本章给出的示例在 OSGi 包和 Maven 项目的上下文中都显示了版本号。这两种上下文中的版本控制方案相似但不完全相同。


    通常，在使用 Maven 中未发布版本的项目时，你会将该版本称为快照版本。这些版本通常是每日构建，甚至通过持续集成系统更频繁地构建，并且不被认为是稳定的。


    Maven 中使用的快照版本标识符与 OSGi 包清单中使用的标识符之间存在一个重要区别。在 Maven 中，SNAPSHOT 版本使用连字符，例如 `2.5.0-SNAPSHOT`。在
