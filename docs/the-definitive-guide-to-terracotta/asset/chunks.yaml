    in the JLS, and that is exactly what the data structure abstractions in the java.util.concurrent
    library, introduced by JDK 1.5, does for us.


    **Using the java.util.concurrent Abstractions**


    Given that using the low-level abstractions in the JLS is both tedious and difficult,
    the concurrency abstractions in JDK 1.5 are a very welcome and natural addition
    to the Java libraries.


    This very rich API provides everything from locks, semaphores, and barriers to
    implementations of the Java collections interfaces highly tuned for concurrent
    access.


    It also provides an ExecutorService, which is mainly a thread pool that provides
    direct support for the Master/Worker pattern. This service is very powerful, since
    you’re implementing the Master/Worker pattern using a single abstraction and framework,
    as shown in Figure 11-2.


    Even though this approach would be sufficient in many situations and use cases,
    it has some problems. First, it does not separate the master from the worker,
    since they are both part of the same abstraction. In practice, this means that
    you cannot control and manage the master independently of the workers, which will
    prove to be a serious limitation when we cluster the implementation with Terracotta
    to scale it out onto not only multiple threads but multiple JVMs. The problem
    here is that clustering the ExecutorService as it is, even though possible and
    sometimes even sufficient, will not allow us to scale out the master independently
    of the workers but force us to run them all on every JVM.


    **Figure 11-2.** *The ExecutorService has limitions; it does not allow us to maintain
    a many-to-many* *relationship (instead of one-to-many) where masters and workers
    are more loosely coupled* *and we are able to communicate using shared queues
    (instead of thread pools and threading* *primitives).*


    The second, and perhaps even more important, limitation is that ExecutorService
    is lacking a layer of reliability and control. Since the ExecutorService is implemented
    as a black box, we have no way of knowing if a specific work task has been started,
    completed, or rejected due


    986-1 CH11.qxd 5/28/08 12:54 PM Page 248


    **248**


    C H A P T E R 1 1 n GRID COMPUTING USING TERRACOTTA


    to some error. Consequently, we have no way to detect if a work item has failed
    and retry the work item, on the same node or on another node. We need a way to
    deal with these things in a simple and, if possible, standardized way.


    n**Note** The Oswego util.concurrent library provides most of the abstractions
    found in the Java 5


    concurrency library but works with JDK 1.2 and above. The library can be downloaded
    at


    [http://g.oswego.edu/dl/classes/EDU/oswego/cs/dl/util/concurrent/intro.html](http://g.oswego.edu/dl/classes/EDU/oswego/cs/dl/util/concurrent/intro.html)


    **Using the CommonJ Work Manager Specification**


    Spawning and coordinating threads inside an EJB container is something that has
    been prohib-ited by the EJB specification. However, enterprise applications very
    often have a need to coordinate tasks both in a synchronous and asynchronous manner.
    This is something that was partly solved in a fairly verbose way with Message-Driven
    Beans (MDB) and was the main motivation for IBM and BEA to create a joint specification
    that solves this problem by providing a standardized and well defined way of executing
    concurrent tasks in a JEE environment. The specification is called CommonJ and
    has support for the Master/Worker pattern in its Work Manager API. BEA provides
    a good article on getting started with the CommonJ interface at


    [http://dev2dev.bea.com/wlplatform/commonj/.](http://dev2dev.bea.com/wlplatform/commonj)


    Interestingly, the specification not only defines an API for submitting work and
    getting the result back but also provides functionality for tracking work status,
    in that it allows you to register listeners that will receive callback events
    whenever the state of the work has changed.


    This functionality for tracking work status makes it possible to not only detect
    work failure but also to acquire a handle to the work that failed, including the
    reason why it failed, which gives us enough information to deal with the failure
    in a sensible way.


    Each of the three approaches we have looked at so far has been built on the previous
    one and has gradually raised the abstraction level, and even more importantly,
    minimized and simplified the code that we as users have to write and maintain.


    The most natural choice is to base our implementation on the CommonJ Work Manager
    specification. It is a simple and minimalist specification and seems to provide
    most of the functionality that we need to build a reliable master/worker container.


    Let’s take a look at the interfaces in the specification. First, we have the Work
    interface; this is the only interface that will be implemented not by the framework
    but by the user of the master/worker implementation—this should be expected because
    the actual work to be executed is always use-case specific. The Interface extends
    the java.lang.Runnable interface with its run() method, the method that the user
    should use to implement the actual work task: public interface Work extends Runnable
    { }


    The second interface is the WorkManager, which provides the main API for our master.
    It defines two methods for scheduling work; both return an instance of WorkItem
    (which is discussed next), wrapping and giving us a handle to the Work instance.
    The difference between the two methods is that one allows us to pass in an optional
    WorkListener so we can listen to changes to the state of the Work. Two more methods
    give us different ways to wait for work to be completed. The waitForAll() method
    blocks and waits until all Work has been completed


    986-1 CH11.qxd 5/28/08 12:54 PM Page 249


    C H A P T E R 1 1 n GRID COMPUTING USING TERRACOTTA


    **249**


    or the method has timed out, while the waitForAny() method returns immediately
    with a collection of all the completed Work so far:


    public interface WorkManager {


    WorkItem schedule(Work work);


    WorkItem schedule(Work work, WorkListener listener);


    boolean waitForAll(Collection workItems, long timeout);


    Collection waitForAny(Collection workItems, long timeout);


    }


    The WorkItem interface, which acts as a wrapper around the pending Work instance
    adds a method returning status information about the Work being wrapped. This
    simple addition allows us to build a layer of reliability for our master/worker
    implementation.


    public interface WorkItem {


    Work getResult();


    int getStatus();


    }


    The WorkListener is an optional abstraction that provides a set of callback methods
    that will be invoked whenever state for a Work item has changed:


    public interface WorkListener {


    void workAccepted(WorkEvent we);


    void workRejected(WorkEvent we);


    void workStarted(WorkEvent we);


    void workCompleted(WorkEvent we);


    }'
