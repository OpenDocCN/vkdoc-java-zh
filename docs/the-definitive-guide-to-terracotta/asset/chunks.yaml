- fmt: '# POJO Clustering


    ## Step-by-Step Example


    In step 1, the two threads in the different application instances were waiting
    for each other to start and arrive at the same rendezvous point. In step 2, the
    first thread created `Product` objects and added them to the clustered `Catalog`.
    In step 3, each thread pulled a `Product` object out of the clustered `Catalog`
    by SKU—notice that the products added by the first thread in one JVM are automatically
    available in the `Catalog` in the other JVM. In step 4, both threads iterate over
    all of the active shopping carts in all JVMs and print the contents. In step 5,
    the first thread made a ten percent price increase by iterating over all of the
    `Product` objects in the `Catalog` while the second thread blocks. In step 6,
    both threads display all of the active shopping carts—notice that the price increase
    was applied in one thread by manipulating the `Catalog`, and the new prices were
    automatically reflected in all of the `ShoppingCart` objects in both JVMs.


    All of the clustered objects can be viewed in real time in the Terracotta administration
    console. Each root can be viewed as a tree of primitives and references. Figure
    4-2 is a view of the `Catalog`.


    **Figure 4-2.** *A runtime view of a Product object in the Terracotta administration
    console*


    You can see the `Product` objects inside the `catalog` `HashMap`. In Figure 4-3,
    you can see those same `Product` objects referenced by the `ShoppingCart` objects
    as well.


    ![Image 15](index-124_1.png)


    **Figure 4-3.** *A runtime view of the ActiveShoppingCarts object graph in the
    Terracotta administration console*


    This view shows the `Product` objects referenced by the `LinkedList` inside the
    `ShoppingCart`.


    If you run the example a second time, you will see the effect of a durable heap.
    The example is designed to run in pairs of executions; by default, the `CyclicBarrier`
    defined in the `Roots` class is set to block at `await()` until two threads arrive.
    After the second thread arrives, the `CyclicBarrier` is reset so that the example
    can be run with two new invocations of `Main.main()`. When you run the example
    a second time with a new pair of JVM invocations, you will notice that the prices
    of the items maintain the ten percent price increase from the last invocation.


    ## What the Example Shows


    This example exercises many of the strengths and features of Terracotta, the first
    being basic object sharing. By declaring shared roots in the `Roots` class, Terracotta
    automatically makes all objects referenceable from those root objects shared objects
    available to every connected JVM.


    The shared `Catalog` object is essentially a shared `Map` of SKUs mapped to `Product`
    objects. `Product` objects can be added and removed from the `Catalog` simply
    by adding or removing them from the shared `Map`. The `ActiveShoppingCarts` object
    is essentially a shared `List` of `ShoppingCart` objects that provides a global
    view of all currently active shopping carts. Bookkeeping active shopping carts
    is as simple as modifying the list, and viewing the active shopping carts is as
    simple as iterating over the list. The power of Terracotta here comes from being
    able to express business policy in simple Java, while at the same time, that expression
    of business policy is available clusterwide and persistent.


    In step 5, a ten percent price increase was placed into effect across all products
    simply by iterating over all of the `Product` objects and updating their prices.
    That change is automatically visible to any JVM that has a reference to a `Product`
    object. This highlights two essential characteristics of Terracotta: object identity
    and fine-grained change management.


    > **Caution** This example is meant to illustrate the transparency and simplicity
    of Terracotta clustering. It is not performance-optimized. Iterating over a clustered
    collection will force all clustered objects into a single thread in one JVM and,
    thus, does not perform well.


    In an application running on a single JVM, coding a business rule like this in
    such a way is rather obvious. All references to a `Product` object point to the
    same object on the heap (the heap provides object identity); any modifications
    to that object are trivially made visible to every thread with a reference to
    that object. But, because the JVMs in a multitier, scaled-out architecture don’t
    share the same heap, object identity is broken, making changes to business data
    by simple reference traversal impossible.


    Typically, to make a price change visible across multiple machines in an enterprise
    Java application, you would have to send messages around the cluster or flush
    a database cache and force a reload or perform some similar behavior. And, at
    each JVM, you would have to make sure that all of the appropriate `Product` objects
    were updated accordingly.


    Without Terracotta, most enterprise Java frameworks force on you the notion of
    a management context from which objects are checked in and out. The manager gives
    application threads copies of business entities so that multiple threads can work
    separately from each other and any exceptions at runtime cannot corrupt the manager’s
    internal copy of objects and data. Basically, heap can’t be trusted to be consistent
    across all instances of the application, so copies and managers are used instead.
    Enterprise software developers are so used to being abused by this problem that
    they don’t think twice about being forced to discard nice, clear object-oriented
    code in favor of a complex data externalization framework to keep all of the heaps
    in sync. When you can’t trust your objects, you can’t write simple code.


    With Terracotta, you get all of that nice, clean object-oriented code back, because
    Terracotta handles the data externalization and synchronization transparently.
    Terracotta effectively provides a shared heap that all JVMs can trust. A perusal
    of the example code will show that any given `Product` object may be referenced
    in a number of different places: in the `Catalog` map as well as in users’ `ShoppingCart`
    objects. As you have seen from the price increase operation, an update made to
    a `Product` object by traversing any of these references is automatically visible
    across the entire cluster, just as it was made visible to all threads in the same
    JVM. This is possible precisely because object identity is preserved.


    Because object identity is preserved across JVMs, it’s safe again to make changes
    to business data by simple reference traversal in an enterprise Java application,
    while achieving the availability and scalability characteristics provided by a
    multi-JVM scale-out architecture.


    Another important and related feature of Terracotta highlighted by the price increase
    example is fine-grained change management. On a trusted heap, making a change
    to a product object is as simple as updating the appropriate field. Unfortunately,
    the externalization frameworks imposed by traditional enterprise Java programming
    usually rely on some form of whole-object serialization or, in the worst case,
    whole-object-graph serialization, replication, and synchronization. This means
    that a change to a single field of an object usually requires much more than just
    that field to be moved around the network and patched on each JVM.


    Terracotta, on the other hand, can make the same surgical field modification that
    normally happens in Java on a single JVM’s heap happen in a shared heap without
    resorting to object or whole-graph serialization. And, because the Terracotta
    server knows which JVMs have references to the changed object, it can send only
    the changed field to the JVMs that need it.'
