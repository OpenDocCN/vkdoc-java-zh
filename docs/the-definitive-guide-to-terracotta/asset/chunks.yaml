    C H A P T E R 5 n CACHING


    **127**


    **Using Ehcache with Terracotta**


    Ehcache has support for distributed caching in a number of configurations. Terracotta
    provides a drop-in solution that provides an alternate implementation of distributed
    caching that yields significant performance and scalability benefits over the
    built-in Ehcache options.


    Enhancements and Configuration


    The Terracotta Ehcache integration provides a number of important enhancements
    for distributed caching, including fine-grained read/write locking, an optimized
    distributed eviction policy, increased scalability, and clusterwide cache coherency.


    When using Terracotta with Ehcache, the standard memory eviction policies (LRU,
    LFU, and FIFO) are replaced by a new time-based eviction policy. The eviction
    is designed to minimize the faulting of objects across the network by handling
    evictions close to the point of use.


    If your application works on a set of nodes with access to data partitioned on
    a per-application basis, Terracotta will perform eviction locally for each partition
    as much as possible. A global evictor will also take care of evictions for cache
    entries no longer used in any node. When eviction occurs, the entry is removed
    from the cache in every node in the cluster.


    To configure the Terracotta eviction policy, the following Ehcache properties
    are used; some have altered meanings:


    • maxElementsInCache: This property is ignored by Terracotta integration. The
    number of objects that can be stored in the distributed Terracotta cache is unbounded,
    and the cache is managed instead by the distributed eviction policy.


    • timeToIdleSeconds: This property has the same meaning as in normal memory eviction.


    • timeToLiveSeconds: This property has the same meaning as in normal memory eviction.


    • eternal: This property is ignored by Terracotta eviction policy. To simulate,
    you can set the timeToIdleSeconds and timeToLiveSeconds to zero.


    • diskExpiryThreadIntervalSeconds: This property has the same memory as in normal
    disk eviction but applies instead to the Terracotta distributed eviction policy,
    specifying the frequency with which expiration and eviction will occur.


    Additionally, due to the nature of the Terracotta integration, some standard Ehcache
    features are unsupported, specifically notifications (which are traditionally
    used for the built-in distributed cache support and are not needed with Terracotta)
    and disk storage. Terracotta persists the cache in shared virtual heap and to
    disk on the server if configured in that manner, so there is no need for disk-based
    storage.


    986-1 CH05.qxd 5/31/08 8:56 AM Page 128


    **128**


    C H A P T E R 5 n CACHING


    Downloading and Installing Ehcache Integration


    To use the Ehcache TIM, you will first need to download and install it from the
    Terracotta Forge at [http://forge.terracotta.org.](http://forge.terracotta.org)
    To download the binary distribution for tim-ehcache, version 1.0.2, issue this
    command:


    $ curl \


    -o tim-ehcache-1.0.2-bin.zip \


    [http://forge.terracotta.org/projects/tim-ehcache/downloads/tim-ehcache-1.0.2-bin.zip](http://forge.terracotta.org/projects/tim-ehcache/downloads/tim-ehcache-1.0.2-bin.zip)


    This command will download a zip file containing several JARs. The Ehcache support
    is actually broken into multiple TIMs: ehcache-commons, ehcache-1.2.4, and ehcache-1.3\.
    To unzip and install these JARs to your Terracotta installation, run these commands:
    $ unzip tim-ehcache-1.0.2-bin.zip


    $ cd tim-ehcache-1.0.2


    $ cp *.jar ${TC_INSTALL_DIR}/modules


    Now that we have installed the Ehcache TIMs, we can use this module from any application
    using this Terracotta installation.


    Using Ehcache with Terracotta


    To enable support for distributed Ehcache, you will need to declare a dependency
    on the Terracotta Ehcache integration module in the tc-config.xml configuration,
    as shown in Listing 5-9.


    To include the Ehcache module, we add a module dependency in the <clients> block.


    **Listing 5-9.** *Terracotta Configuration tc-config.xml*


    <?xml version="1.0" encoding="UTF-8"?>


    [<tc:tc-config](http://www.terracotta.org/config)


    [xsi:schemaLocation="http://www.terracotta.org/schema/terracotta-4.xsd">](http://www.terracotta.org/schema/terracotta-4.xsd)


    <servers>


    <server host="%i" name="book.ehcache-hostname"/>


    <update-check>


    <enabled>true</enabled>


    </update-check>


    </servers>


    <system>


    <configuration-model>development</configuration-model>


    </system>


    <clients>


    <modules>


    986-1 CH05.qxd 5/31/08 8:56 AM Page 129


    C H A P T E R 5 n CACHING


    **129**


    <module name="tim-ehcache-1.3" version="1.0.2"/>


    </modules>


    <logs>%(user.home)/terracotta/client-logs/book.ehcache/%D</logs>


    </clients>


    <application>


    <dso>


    <instrumented-classes>


    <include>


    <class-expression>


    org.terracotta.book.caching.ehcache.UserEhcacheExample


    </class-expression>


    </include>


    </instrumented-classes>


    </dso>


    </application>


    </tc:tc-config>


    Currently, the Ehcache TIM also provides integration for the JSR 107 JCache API
    to Ehcache and thus requires the inclusion of the JSR 107 JAR from


    [http://sourceforge.net/projects/jsr107cache/.](http://sourceforge.net/projects/jsr107cache)


    Next, you will need to run your application as a Terracotta application using
    dso-java.sh: dso-java.sh \


    –cp .:ehcache-1.3.0.jar:commons-logging-1.0.4.jar:jsr107cache-1.0.jar \


    –Dtc.config=tc-config.xml org.terracotta.book.caching.ehcache.UserEhcacheExample
    When you do so, you will see results similar to running the Terracotta-enabled
    Map application. The cache is clustered and all nodes will see changes made on
    any particular node.


    **Summary**


    Caching is a necessary part of almost any application architecture. It is common
    to start with a simple caching system only to find later that it is insufficient
    for the real needs of your data size, freshness, and scalability requirements.
    Scaling a system like this after the fact can be a difficult undertaking.


    With Terracotta, you can start simple but use Terracotta’s clustered, persistent
    virtual heap to mitigate many of the pains related to scaling an application cache.
    And the best part is that you can achieve this scale with your original simple
    code.


    In this chapter, you saw how you can build simple but powerful distributed caches
    using built-in JDK collections and how you can leverage existing open source caching
    libraries to get more sophisticated features and behavior, while still leveraging
    the benefits of Terracotta.


    In the next chapter, we take a look at caching at work inside Hibernate, a popular
    object-relational mapping framework. We’ll explore in detail how Terracotta can
    scale Hibernate-backed data access in your application to achieve scalability
    that’s orders of magnitude greater than using just Hibernate by itself.


