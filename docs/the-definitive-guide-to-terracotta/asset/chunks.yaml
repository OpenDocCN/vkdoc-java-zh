    第 1 章


    理论与基础


    建立共识


    **T**erracotta 是一种 Java 基础设施软件，它允许你将应用程序扩展到任意数量的计算机上，而无需昂贵的自定义代码或数据库。但 Terracotta
    的意义远不止这二十六个字的定义。如果你拿起了这本书，说明你正在寻求更深入地理解这项技术及其应用场景。为了达成这种理解，我们必须首先解析围绕扩展、集群化和应用程序架构的行话。在第
    1 章中，我们将花一些时间来定义术语，然后解释 Terracotta 为应用程序提供的价值。这将有助于我们建立对这项技术目标受众的共同理解。


    应用程序总是有开发者和运维者，尽管有时一个人可能同时扮演这两个角色。应用程序开发者负责交付符合规范的业务逻辑，并对所有应用程序代码负责。运维者管理生产环境中的应用程序，并与开发者合作，确保应用程序具有足够的可扩展性以处理其潜在的生产工作负载。如果应用程序要成功，即运行成本低且稳定，那么这两者必须协同工作。Terracotta
    在设计时就考虑到了开发者和运维者双方。


    Terracotta 的设计旨在将应用程序开发者从企业开发框架（如 Hibernate、Spring 和 Enterprise JavaBeans (EJB)）的约束中解放出来。


    无论应用程序是否使用这些框架，对数据库的紧密依赖都会导致设计缺乏自由度。虽然 Hibernate 和 Spring 通过极大地简化应用程序代码来帮助开发者，但许多应用程序未能实现自由的承诺，因为它们从未真正与数据库解耦。Terracotta
    独特地提供了一个完整的解决方案，可以在编写纯粹的普通旧 Java 对象 (POJO) 的同时，实现与数据库的解耦和扩展。


    Terracotta 的设计也旨在为生产环境中的 Java 应用程序提供最稳定的运行平台，仅此而已。该系统可以像管理数据库一样进行管理——如果你能操作数据库，你就能操作
    Terracotta。并且，Terracotta 代表应用程序管理的数据不会丢失。然而，与数据库不同，Terracotta 提供了开发线性可扩展应用程序的解决方案。


    **1**


    986-1 CH01.qxd 5/30/08 8:58 PM 第 2 页


    **2**


    第 1 章 ■ 理论与基础


    虽然大多数集群化供应商专注于应用程序的可扩展性，但 Terracotta 成功地实现了可扩展性与最高级别可用性的结合，并且这一切都在没有数据库的情况下完成。该系统还在单一供应商解决方案中提供了前所未有的跨应用程序堆栈的可视性。具体来说，我们现在可以通过一个单一的图形仪表板或通过
    Java 管理扩展 (JMX) 在操作系统级别、JVM 级别和应用程序级别监控应用程序。这意味着我们不仅可以监控应用程序或应用服务器的性能，还可以从一个中心位置监控硬件性能。


    开发者和运维者需要一种简单的方法来扩展生产环境中的应用程序。迄今为止，这种方法一直是数据库，但它之所以有效，仅仅是因为数据库拥有大量用于生产运维的管理工具，并且其开发模型（SQL
    查询、存储过程和对象关系映射）被广泛理解。然而，如果我们可以选择，数据库并非开发者真正想要的，而 Terracotta 的创始人看到了另一种选择。事实上，Terracotta
    对开发和运维需求的双重关注并非偶然。


    Terracotta 诞生于一个大规模生产环境 Java 应用程序的“烈火”之中。当业务以每年 100% 的速度增长时（这听起来可能不算太大，直到我们说明其收入达到数十亿美元），平台团队坚持了一个标准：在运营第一年后不购买任何新硬件。该团队连续四年非常接近实现这一目标。Terracotta
    从那个排名前十的电子商务网站中吸取了经验教训，并通过创建一种通用的 Java 扩展，显著推进了可扩展性的技术水平，任何应用程序都可以利用该扩展来获得简单开发以及同时具备可扩展性和高可用性生产运维的好处。


    集群化曾因对单个服务器故障敏感而被认为是复杂且高度不稳定的，但随着 Terracotta 的出现，集群化这个想法终于迎来了它的时代。通过本书的篇章，你将学习
    Terracotta 对集群化的独特定义。前四章侧重于概念和原理，接下来的几章则展示如何将 Terracotta 应用于常见用例，例如使用 Hibernate
    进行集群化缓存、Spring 中的集群化、HTTP 会话复制等等。


    一旦这些章节吊起了你的胃口，本书将转而介绍使用 Terracotta 构建强大抽象层的详细技术，以及如何针对任何及所有 Terracotta 用法进行调优。现在，让我们深入探讨该技术的更详细定义。


    **Terracotta 框架的定义**


    正如我们已经说过的，为了不让你被晦涩的术语所困扰，我们将给出一个简短的定义并解释该方法的好处。我们将把定义中的每个术语分解成通俗易懂的英语，以便我们有一个坚实的基础来继续学习用例。


    *Terracotta 是一种用于 Java 应用程序的透明集群化服务*。Terracotta 也可以被称为 JVM 级别的集群化。Terracotta 的
    JVM 级别集群化技术通过提供一个简单、可扩展、高可用的运行环境来帮助应用程序。'
- fmt: '# 第1章 理论与基础


    为了理解这一定义，我们需要定义“透明集群服务”及其运营优势，包括“简单性”、“可扩展性”和“高可用性”。然后我们可以讨论这项技术的应用。


    ## 透明性


    对用户而言，透明性意味着支持`Terracotta`的应用程序在未安装`Terracotta`时，仍能按原样运行且无需任何更改。这并不意味着`Terracotta`适用于所有场景，也不意味着`Terracotta`不可见且无需对应用程序代码进行任何更改。对于`Terracotta`用户而言，透明性代表着一种有价值的自由和设计纯粹性，因为应用程序仍然是你的，按照你最初想要的方式构建。


    ## 集群


    集群有多种定义，因此`Terracotta`曾一度难以将自己称为集群服务。集群服务的独特之处在于：虽然集群指的是服务器通过网络相互通信，但集群服务指的是允许你将一个未包含任何集群逻辑或库的应用程序，通过在`JVM`层面（应用程序之下）进行集群，将其分布到多台服务器上的技术。这将集群从架构概念转变为应用程序在生产环境中运行时可以依赖的服务。


    ## 简单性


    复杂性及其对立面简单性，指的是开发人员在构建可扩展应用程序过程中必须做出的更改。例如，为了使应用程序可扩展，对象可能需要实现`Java`语言规范中的`Serializable`接口，以便在服务器之间共享这些对象。


    ## 可扩展性


    可扩展性可能令人困惑。此时统计学背景会有所帮助，因为开发人员经常混淆许多性能测量术语，例如平均值与中位数、可扩展性与性能。如果你希望通过从小规模起步、仅在需求增长时扩展来节省成本，那么可扩展性就很重要。可扩展性是低延迟和高吞吐量的结果。一个应用程序可能响应非常快，但一次只能处理一个请求（低延迟、低吞吐量）。或者，一个应用程序可能响应非常慢，但能处理数千个并发请求（高延迟、高吞吐量），数据库就是后一类应用程序的典型例子。与传统关系数据库不同，`Terracotta`有助于同时优化延迟和吞吐量，从而创建真正可扩展的应用程序。


    ## 可用性


    可用性意味着每一份共享数据都必须写入磁盘。如果运行`Terracotta`的应用程序集群所在的数据中心断电，当电力恢复时不会丢失任何数据。没有哪个单独的进程是关键的，应用程序可以从中断处继续运行。


    有了这些通用术语，接下来我们将探讨数据中心环境中与`Terracotta`类似的现有技术。


    ## 网络附加存储与Terracotta的相似之处


    `Terracotta`是一种透明集群服务，可用于实现多种功能，例如会话复制、分布式缓存和分区（也称为网格计算）。正如我们所定义的，透明性允许应用程序依赖`Terracotta`而无需嵌入`Terracotta`。有几种透明服务是应用程序依赖的，但无需将这些服务嵌入到应用程序源代码中。


    文件存储就是透明服务的一个例子。文件可以存储在单个服务器的本地。文件存储设备可以从磁带变为光盘或硬盘，而无需更改应用程序源代码。更重要的是，文件系统性能可以在不更改应用程序的情况下进行调整。文件是一种流行的应用程序数据存储机制，因为它们提供了存储位置、存储格式和性能优化的透明性。


    `Terracotta`为`Java`应用程序内存带来了同样的能力。因此，虽然网络文件存储服务与`Terracotta`并非完全平行，但文件`I/O`值得探讨这些相似之处。这些相似之处应该有助于你在深入了解`Terracotta`和`JVM`级集群之前，理解透明服务的价值。


    文件`API`可以概括为包含`open()`、`seek()`、`read()`和`write()`方法。在这些方法之下，可以附加许多不同的行为，每种行为都有特定的优势。文件可以存储在各种类型的文件系统上，使我们能够在源代码之外为某些应用程序优化性能。


    当今使用的一些文件系统包括日志文件系统（`JFS`）架构的变体、高性能文件系统（`HPFS`）、伯克利快速文件系统（`FFS`）、`MS-DOS`文件系统和`Solaris`的泽字节文件系统（`ZFS`）。这些技术中的每一种都有特定的性能特征和最佳应用场景。例如，日志记录非常适合生产系统，因为对磁盘的更改可以回滚，以修复应用程序中的错误可能在近期导致的文件损坏。因此，`JFS`非常适合高可用性数据。伯克利`FFS`非常适合多用户服务器下的大规模随机访问场景，其中许多任务在随机时间以不同原因向不同大小的多个文件写入数据。在这里，由于所有数据的随机和均匀分布，显式碎片化导致了可预测的延迟和吞吐量。与伯克利文件系统相反，`DOS`文件系统针对专用用户场景中文字处理应用程序下的顺序访问进行了优化。微软最初的文件系统方法效果很好，因为单个文件是连续的，并且位于硬盘上的一个位置。


    ## 抽象层


    非常有趣的是，这些文件系统各自能很好地处理某些用例，而处理其他用例则不那么好（我们都曾经历过等待微软`Windows`磁盘碎片整理程序在夜间重新整理硬盘以加快访问速度的情况）。尽管如此，当微软改变其操作系统架构并采用一些`HPFS`或伯克利技术时，许多应用程序并未察觉。如果程序只使用标准的文件`API`，则无需重写。当然，任何对`DOS`文件系统的性能特征和能力做出假设的应用程序，在底层文件系统发生变化时都必须进行更改。


    `Terracotta`用户在集群方面发现了与应用程序在文件系统方面类似的抽象。`Terracotta`用户不会对对象如何在网络上移动做出假设，也不会编写代码来显式地在`Java`进程之间分区数据。就像操作系统可以在生产环境中切换文件系统而无需更改应用程序源代码一样，`Terracotta`可以运行不同的优化（你将在后续章节中了解），而无需应用程序进行更改。'
  raw: 'To understand this definition, we need to define “transparent clustering service,”
    as well as the operational benefits, including “simplicity,” “scalability,” and
    “high availability.” We can then discuss the applications for this technology.


    986-1 CH01.qxd 5/30/08 8:58 PM Page 3


    C H A P T E R 1 ■ T H E O RY A N D F O U N D AT I O N


    **3**


    • *Transparency*: To users, transparency means that an application written to
    support Terracotta will still function as implemented with zero changes when Terracotta
    is not installed. This does not mean Terracotta works for everything or that Terracotta
    is invisible and does not require any changes to application code. Transparency
    for the Terracotta user denotes a freedom and purity of design that is valuable,
    because the application stays yours, the way you wanted to build it in the first
    place.


    • *Clustering*: Clustering has had many definitions, and as a result, Terracotta
    struggled for some time with calling itself a clustering service. A clustering
    service is unique in that, while clustering refers to servers talking to each
    other over a network, a clustering service refers to technology that allows you
    to take an application written without any clustering logic or libraries and spread
    it across servers by clustering in the JVM, below the application. This moves
    clustering from an architecture concept to a service on which applications can
    rely when running in a production environment.


    • *Simplicity*: Complexity and its antithesis simplicity refer to the changes
    that developers have to make along the road to building scalable applications.
    For example, to make an application scalable, objects may have to implement the
    Serializable interface from the Java language specifications in order to share
    those objects across servers.


    • *Scalability*: Scalability can be confusing. This is a time when a background
    in statistics helps, because developers often confuse many of our performance-measuring
    terms, such as mean versus median and scalability versus performance. Scalability
    is important if you want to save money by starting small and growing only when
    demand requires. Scalability is the result of low latency and high throughput.
    An application can be very quick to respond but might only handle one request
    at a time (low latency and low throughput). Alternatively, an application can
    be very slow to respond but handle thousands of concurrent requests (high latency
    and high throughput), and the database is a great example of this latter type
    of application. Unlike the traditional relational database, Terracotta helps optimize
    both latency and throughput to create a truly scalable application.


    • *Availability*: Availability means that every piece of shared data must get
    written to disk.


    If the datacenter in which the application cluster is running on top of Terracotta
    loses power, nothing will be lost when the power is restored. No individual process
    is critical, and the application can pick up where it left off.


    With this common terminology, we will next look at analogies to Terracotta that
    already exist in the datacenter environment.


    **Network Attached Storage Similarities to Terracotta**


    Terracotta is a transparent clustering service, which can be used to deliver many
    different things such as session replication, distributed caching, and partitioning
    (otherwise known as grid computing). Transparency, as we have defined it, allows
    applications to depend on Terracotta without embedding Terracotta. There are several
    transparent services on which applications rely without embedding those services
    inside our application source code.


    986-1 CH01.qxd 5/30/08 8:58 PM Page 4


    **4**


    C H A P T E R 1 ■ T H E O RY A N D F O U N D AT I O N


    File storage is an example of a transparent service. Files can be stored locally
    on an individual server. File storage devices can change from tape to CD to hard
    disk without changing our application source code. What’s more, file system performance
    can be tuned without changing our application. Files represent a popular mechanism
    for storing application data because they provide transparency of storage location,
    storage format, and performance optimization.


    Terracotta brings the same capabilities to Java application memory. Thus, while
    networked file storage services are not a perfect parallel to Terracotta, file
    I/O is worth exploring a bit for these similarities. Their similarities should
    help you understand the value of transparent services before we jump into Terracotta
    and JVM-level clustering.


    The file API can be summarized as having open(), seek(), read(), and write() methods.


    Underneath these methods, many different behaviors can be bolted on, each with
    specific strengths. A file can be stored on various types of file systems, allowing
    us to optimize performance for certain applications completely outside of source
    code.


    Some file systems in use today include variants of the Journaled File System (JFS)
    architecture, the High Performance File System (HPFS), the Berkeley Fast File
    System (FFS), the MS-DOS File System, and Solaris’s Zettabyte File System (ZFS).
    Each of these technologies has a specific performance character and sweet spot.
    For example, journaling is very good for production systems, because changes to
    the disk can be rolled back to repair file corruption that a bug in an application
    might have caused in the recent past. JFS is, therefore, well suited to highly
    available data. The Berkeley FFS is very good for large-scale random access usage
    underneath a multiuser server, where many tasks are writing to many files of different
    sizes for varying reasons at random times. Here, explicit fragmentation leads
    to predictable latency and throughput as a result of the random and even distribution
    of all data. Taking the opposite approach to Berkeley’s file system, the DOS file
    system was tuned for sequential access underneath word processing applications
    in dedicated user scenarios. Microsoft’s original file system approach worked
    well, because individual files were contiguous and in one place on the hard disk.


    A Layer of Abstraction


    It is quite interesting to see that these file systems each handle certain use
    cases very well and others not as well (we have all had to wait while the Microsoft
    Windows defragmenter rearranged our hard drives overnight for faster access).
    Nonetheless, when Microsoft changed its operating system architecture and adopted
    some of the HPFS or Berkeley techniques, many applications were none the wiser.
    No programs had to be rewritten if they used only the standard file APIs. Of course,
    any application that made assumptions about the performance characteristics and
    capabilities of the DOS file system had to change when the underlying file system
    changed.


    Terracotta users find a similar abstraction with clustering that applications
    find with file systems. Terracotta users do not make assumptions about how objects
    move across the network, nor do the users write code explicitly to partition data
    among Java processes, as an example. Just like the operating system can switch
    file systems in production without changing an application’s source code, Terracotta
    can run different optimizations (about which you will learn in subsequent chapters)
    without requiring the application to change.


    986-1 CH01.qxd 5/30/08 8:58 PM Page 5


    C H A P T E R 1 ■ T H E O RY A N D F O U N D AT I O N


    **5**'
  trans: '

    要理解这个定义，我们需要先定义“透明集群服务”及其带来的运营优势，包括“简单性”、“可扩展性”和“高可用性”。然后，我们可以讨论这项技术的应用场景。


    986-1 CH01.qxd 5/30/08 8:58 PM 第 3 页


    第 1 章 ■ 理论与基础


    **3**


    •   *透明性*：对用户而言，透明性意味着一个为支持 Terracotta 而编写的应用程序，在未安装 Terracotta 时，仍能按原样运行，无需任何更改。这并不意味着
    Terracotta 适用于所有情况，也不意味着 Terracotta 是隐形的，不需要对应用程序代码做任何修改。对 Terracotta 用户而言，透明性代表着一种宝贵的、自由且纯粹的设计，因为应用程序仍然是你的，是你最初想要构建的样子。


    •   *集群*：集群有很多定义，因此，Terracotta 曾一度难以将自己称为集群服务。集群服务的独特之处在于，虽然集群指的是服务器通过网络相互通信，但集群服务指的是一种技术，它允许你将一个未包含任何集群逻辑或库的应用程序，通过在
    JVM 层面（应用程序之下）进行集群，将其分布到多台服务器上。这使集群从一个架构概念转变为一个应用程序在生产环境中运行时可以依赖的服务。


    •   *简单性*：复杂性及其对立面简单性，指的是开发人员在构建可扩展应用程序的过程中必须做出的更改。例如，为了使应用程序可扩展，对象可能需要实现 Java
    语言规范中的 `Serializable` 接口，以便在服务器之间共享这些对象。


    •   *可扩展性*：可扩展性可能令人困惑。这时，统计学背景会有所帮助，因为开发人员经常混淆许多性能衡量术语，例如平均值与中位数，以及可扩展性与性能。如果你想通过从小规模起步、仅在需求增长时扩展来节省成本，那么可扩展性就很重要。可扩展性是低延迟和高吞吐量的结果。一个应用程序可能响应非常快，但一次只能处理一个请求（低延迟、低吞吐量）。或者，一个应用程序可能响应非常慢，但能处理数千个并发请求（高延迟、高吞吐量），数据库就是后一种应用程序的典型例子。与传统的
    relational database 不同，Terracotta 有助于同时优化延迟和吞吐量，从而创建真正可扩展的应用程序。


    •   *可用性*：可用性意味着每一份共享数据都必须写入磁盘。


    如果运行 Terracotta 之上的应用程序集群所在的数据中心断电，当电力恢复时，不会丢失任何数据。没有哪个单独的进程是关键的，应用程序可以从它中断的地方继续运行。


    有了这些通用术语，接下来我们将看看数据中心环境中已经存在的、与 Terracotta 类似的例子。


    **网络附加存储与 Terracotta 的相似之处**


    Terracotta 是一种透明集群服务，可用于交付许多不同的功能，例如会话复制、分布式缓存和分区（也称为网格计算）。正如我们所定义的，透明性允许应用程序依赖
    Terracotta，而无需嵌入 Terracotta。有许多透明服务是应用程序依赖的，但并未将这些服务嵌入到我们的应用程序源代码中。


    986-1 CH01.qxd 5/30/08 8:58 PM 第 4 页


    **4**


    第 1 章 ■ 理论与基础


    文件存储就是一个透明服务的例子。文件可以存储在单个服务器的本地。文件存储设备可以从磁带变为 CD 再变为硬盘，而无需更改我们的应用程序源代码。更重要的是，文件系统的性能可以在不更改应用程序的情况下进行调整。文件是一种流行的存储应用程序数据的机制，因为它们提供了存储位置、存储格式和性能优化的透明性。


    Terracotta 将同样的能力带给了 Java 应用程序内存。因此，虽然网络文件存储服务与 Terracotta 并非完全平行，但文件 I/O 值得探讨一下这些相似之处。它们的相似之处应该能帮助你在我们深入探讨
    Terracotta 和 JVM 级集群之前，理解透明服务的价值。


    文件 API 可以概括为具有 `open()`、`seek()`、`read()` 和 `write()` 方法。在这些方法之下，可以附加许多不同的行为，每种行为都有特定的优势。文件可以存储在各种类型的文件系统上，使我们能够在源代码之外，为某些应用程序完全优化性能。


    当今使用的一些文件系统包括日志文件系统（JFS）架构的变体、高性能文件系统（HPFS）、伯克利快速文件系统（FFS）、MS-DOS 文件系统和 Solaris
    的 Zettabyte 文件系统（ZFS）。这些技术中的每一种都有特定的性能特征和最佳应用场景。例如，日志记录非常适合生产系统，因为对磁盘的更改可以回滚，以修复应用程序
    bug 在近期可能导致的文件损坏。因此，JFS 非常适合高可用性数据。伯克利 FFS 非常适合多用户服务器下的大规模随机访问场景，在这种场景下，许多任务会在随机时间、出于不同原因、向不同大小的许多文件写入数据。在这里，由于所有数据的随机和均匀分布，显式的碎片化导致了可预测的延迟和吞吐量。与伯克利文件系统的方法相反，DOS
    文件系统针对专用用户场景下文字处理应用程序的顺序访问进行了优化。微软最初的文件系统方法效果很好，因为单个文件是连续的，并且位于硬盘上的一个位置。


    **抽象层**


    非常有趣的是，这些文件系统各自都能很好地处理某些用例，而对其他用例则处理得不太好（我们都曾经历过等待微软 Windows 磁盘碎片整理程序在夜间重新整理硬盘以加快访问速度的情况）。尽管如此，当微软改变其操作系统架构并采用了一些
    HPFS 或伯克利的技术时，许多应用程序并未察觉。如果程序只使用标准的文件 API，则无需重写。当然，任何对 DOS 文件系统的性能特征和能力做出假设的应用程序，在底层文件系统发生变化时，都必须进行更改。


    Terracotta 用户发现，集群提供了与应用程序在文件系统中发现的类似的抽象层。例如，Terracotta 用户不会对对象如何在网络上移动做出假设，也不会显式编写代码在
    Java 进程之间分区数据。就像操作系统可以在不更改应用程序源代码的情况下在生产环境中切换文件系统一样，Terracotta 可以运行不同的优化（你将在后续章节中了解到），而无需应用程序进行更改。


    986-1 CH01.qxd 5/30/08 8:58 PM 第 5 页


    第 1 章 ■ 理论与基础


    **5**

