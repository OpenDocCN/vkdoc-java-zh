  trans: '

    用于分析此 Terracotta 服务器中仅特定数据子集的工具。请选择与您刚刚执行的运行相对应的快照会话。如果您是第一次按照步骤操作，应该只有一个会话。但每次启动快照会话时，都会自动创建另一个会话。


    **提示** Terracotta 管理控制台提供了用于管理性能记录会话和快照的工具。您可以使用该工具删除任何及所有会话。


    现在，为每个应用程序 JVM 以及 Terracotta 服务器生成图表。为此，您必须单击用户界面中的“生成图表”按钮（见图 12-9）。每当您更改快照会话或想要获取数据的
    JVM 时，都必须再次单击“生成图表”。


    **图 12-9.** *为所有性能数据生成图表*


    到目前为止，我们已经构建了一组 pounder 方法来对 Terracotta 基础设施进行压力测试。我们还在每个 JVM 以及 Terracotta 服务器上记录性能快照数据的同时运行了这些方法。并且我们已经生成了图表以供查看。在查看这些图表并理解其含义之前，您应该了解要寻找什么。


    **潜在瓶颈**


    在开始分析测试运行的输出之前，您应该了解各个图表显示的内容。这些图表中的任何一个都可能代表特定应用程序中的瓶颈。理解任何图表背后的统计数据，可以告诉我们特定应用程序中的瓶颈是什么。


    **回顾主板**


    回顾第 2 章，我们将 Terracotta 视为使应用程序能够像在一台大型计算机上运行一样进行扩展。我们将 Terracotta 的库称为 L1 客户端，将
    Terracotta 服务器称为 L2 实例——就像主板和 CPU 缓存的类比一样。


    图 12-10 展示了这一概念。


    ![Image 27](img/index-335_1.png)


    986-1 CH12.qxd 5/28/08 10:06 PM 第 311 页


    第 1 2 章 n 可视化应用程序


    **311**


    **图 12-10.** *Terracotta 类似于 SMP 主板。*


    可视化工具中的每个图表都对应于管理控制台中的一个复选框选项，如图 12-11 所示。该可视化工具允许为集群中的特定 Java 机器绘制特定统计数据的图表。每个统计图表都可以启用或禁用。节点也可以被完全忽略。


    **图 12-11.** *管理控制台快照选项*


    986-1 CH12.qxd 5/28/08 10:06 PM 第 312 页


    **312**


    第 1 2 章 n 可视化应用程序


    我们将定义快照工具提供的每个指标，因为这些是可能导致问题的关键 Terracotta 组件：


    • *缓存对象逐出请求*：此统计数据跟踪需要将对象从 Terracotta 服务器逐出到磁盘的次数。


    • *L1 L2 刷新*：在 Terracotta 中，L1 是您的某个应用程序 JVM 的昵称。L2 是 Terracotta 服务器的昵称。与主板类比一样，“刷新”指的是当
    L1 内存不足或垃圾回收对象时，将一些对象刷新到 L2 以释放堆空间的时间点。


    • *每次广播的 L2 更改数*：L2 在磁盘上离散地更新每个更改对象的每个字段。如果发生广播，则可能导致 L2 中发生一个或多个更改。此统计数据跟踪每次广播导致的
    L2 更改比率。


    • *L2 待处理事务*：L2 在将增量应用到其磁盘之前会保留事务一段时间。这些待处理事务在传输过程中会占用内存。此外，任何属于待处理事务一部分的对象在事务完成之前都不能再次更新。系统将事务保持在待处理状态，以便可以将对对象的冗余更改合并在一起，或者在可能的情况下从更新中压缩掉。当事务被压缩并合并为尽可能少的磁盘更新时，它们会保持待处理状态。因此，此统计数据表示对对象发生大量冗余更新的情况，因此这些对象在更新期间会被系统临时锁定。


    • *消息监视器*：此统计数据跟踪通过 TCP 从客户端流向服务器的网络消息数量。


    • *线程转储*：此数据是一个标记，它会在所有性能图表上添加一个里程碑标记，注明线程转储发生的时间。在可视化工具中，这些标记是可点击的，并将显示在性能测试期间请求并记录到快照中的线程转储。虽然我们从未在管理控制台中点击过“获取线程转储”按钮，但请随意尝试此功能。


    • *已逐出的缓存对象*：此统计数据与逐出请求直接相关。逐出请求跟踪应该发生逐出的次数，而此统计数据跟踪实际从内存中逐出了多少个对象。


    • *L2 广播计数*：L2 将向驻留在多个 L1 JVM 中的对象广播任何增量。“广播”这个说法并不准确，因为 L2 会确定哪个 L1 需要某些更新，并且实际上从不向最终不需要这些更改的
    JVM 发送更新。系统会跟踪发生的每次广播，这意味着此统计数据提供了对以下情况的可见性：每当一个 JVM 中的对象发生更改，并且该对象驻留在另一个 JVM
    中且需要更新时。


    • *来自磁盘的 L2 故障*：当 L2 内存太少，无法在 Java 堆的 RAM 中维护所有对象时，它会将对象溢出到磁盘。此统计数据表示 L2 必须从磁盘加载对象以满足
    L1 对象需求的次数。


    986-1 CH12.qxd 5/28/08 10:06 PM 第 313 页


    第 1 2 章 n 可视化应用程序


    **313**


    • *L2 事务计数*：在 Terracotta 中，事务被定义为由同步边界标记的一组对象更改。当对象在 JVM 中被解锁时，特定线程中做出的所有更改都将被刷新。一个
    Terracotta 事务既不是单个对象字段更改，也不是单个对象更改。事务是使用 Java 锁捆绑在一起的、特定于应用程序数量的字段更改。例如，一个应用程序可能会在锁内的
    setter 方法中更改一个对象字段。另一个应用程序可能会在释放对象锁之前在 for 循环中更改一千个对象。对于应用程序一，单个事务等于一个字段更改。对于另一个应用程序，单个事务等于
    1,000 个字段更改。无论应用程序对事务的定义如何，此指标都会对其进行计数。


    • *阶段队列深度*：L2 本质上是异步的，这意味着，像现代操作系统一样，它使用一组固定的资源，并在所有待处理工作之间分配时间，每次执行每个任务的一小部分。例如，当一个
    JVM 需要来自 Terracotta 的对象时，检索这些对象的任务被分解为多个阶段，并且每个阶段可能有许多 JVM 请求在该点等待工作。阶段队列深度跟踪允许查看所有
    L2 阶段，并显示服务器中每种类型的待处理工作量。使用此指标来确定您的应用程序是否在 Terracotta 内部导致了特定类型的瓶颈。这可以让您详细了解哪些地方缓慢或存在瓶颈，所有这些都是希望您可以更改应用程序以避免潜在的减速。

