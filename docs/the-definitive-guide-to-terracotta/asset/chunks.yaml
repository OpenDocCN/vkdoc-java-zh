    C H A P T E R 7


    Extending HTTP Sessions with


    Terracotta


    **H**TTP sessions are traditionally used for web applications where the state
    is stored on the server side. While this approach is convenient on a single server,
    as soon as your application grows and multiple servers are needed to fulfill the
    load, sessions can become both a performance bottleneck and a development burden.


    In this chapter, we will explore how Terracotta makes working with HTTP sessions
    as convenient in a cluster as on a single machine. You’ll see how each shortcoming
    is addressed and how extremely easily you can integrate Terracotta with standard
    Java web applications.


    **What Are HTTP Sessions?**


    Web sites have long since outgrown their initial static nature and are now highly
    interactive and sometimes even full-fledged applications. For these applications
    to work, each user needs to be able to have a state that is maintained during
    interaction with the web site. The HTTP


    specification that made the World Wide Web so prevalent never evolved to provide
    a solution for this state management. Some of its characteristics, like query
    string parameters and cookies combined with hidden HTML form parameters, did allow
    for certain application state management needs to be fulfilled. These were, however,
    quite limited, and when application state became bigger and needed to be secured,
    technologies such as servlet containers came up with a solution to store user
    data on the server. Figure 7-1 depicts the difference between HTTP session state
    maintained on the application server and cookie state maintained by the web browser.


