- fmt: "# Terracotta Configuration and Usage Guide\n\nThe Terracotta configuration\
    \ file allows a developer to control where Terracotta inserts itself, on a class-by-class\
    \ basis. For example, `MyObject` can be examined and made clustered by Terracotta,\
    \ while `MyOtherObject` can be ignored.\n\nArguably, there are a couple of unanswered\
    \ questions at this point:\n\n- What is Terracotta’s ability to figure out relationships\
    \ among objects across JVMs?\n- Does Terracotta have the ability to batch?\n\n\
    These topics are more advanced and will be covered in Chapter 4. For now, the\
    \ concept of bytecode augmentation is the key. When reading memory, Terracotta\
    \ inserts itself just before the read occurs in the original application logic.\
    \ Before memory is trusted, Terracotta ensures all changes from other Java processes\
    \ have been applied. Terracotta also inserts itself just after writes occur in\
    \ the original application logic. After memory is changed, Terracotta ensures\
    \ all changes are made available to any other Java process that may need them.\
    \ In short, before and after existing application logic runs, Terracotta can insert\
    \ itself into the logic updating local memory or informing the cluster of changes\
    \ to local memory.\n\n**Tip** If you are comfortable with what you have seen thus\
    \ far, try guessing what will happen if you kill the JVM running `HelloClusteredWorld`\
    \ and start it up again. What will print next? Will “H” print out? No. Can you\
    \ explain why not? We’ll talk more about persistence and availability in Chapter\
    \ 4.\n\n## Alternatives to Terracotta\n\nOther approaches that you might use to\
    \ build `HelloClusteredWorld` would actually require integration some sort of\
    \ API. Think of these alternatives to Terracotta as `get()` and `put()` interfaces.\
    \ If the application calls `put(key, value)`, it can later call `get(key)` to\
    \ obtain a copy of the value. The changed application would resemble the following\
    \ pseudo code (differences are in bold):\n\n```java\npublic class HelloClusteredWorldWithAnAPI\
    \ {\n\n    private static final String message = \"Hello Clustered World!\";\n\
    \    private static final int length = message.length();\n    private static final\
    \ char[] buffer = new char[length];\n    int loopCounter;\n\n    public static\
    \ void main(String args[]) throws Exception {\n        while (true) {\n      \
    \      // thread-level coordination no longer valuable\n            // synchronized(\
    \ buffer ) {\n            // get the up-to-date version from the cluster\n   \
    \         // note: expect deserialization\n            buffer = cluster.get(\"\
    HelloClusteredWorldBufferID\");\n            // can't trust loopCounter because\
    \ it is not a clustered object\n            // int messageIndex = loopCounter++\
    \ % length;\n            // drive the index from the current length instead\n\
    \            int messageIndex = buffer.length;\n            if (messageIndex ==\
    \ 0) java.util.Arrays.fill(buffer, '\\u0000');\n            buffer[messageIndex]\
    \ = message.charAt(messageIndex);\n            System.out.println(buffer);\n \
    \           // expect buffer to get serialized\n            Cluster.put(\"HelloClusteredWorldBufferID\"\
    , buffer);\n            Thread.sleep(100);\n            catch (InterruptedException\
    \ e) {\n                e.printStackTrace();\n            }\n        }\n    }\n\
    }\n```\n\nThese are key changes to the application: synchronization is no longer\
    \ important; the `loopCounter` is now derived from the current buffer length;\
    \ and we serialize the buffer to the network and deserialize it from the network,\
    \ copying the entire buffer each time. Without worrying about whether the `get()`\
    \ and `put()` form of `HelloClusteredWorld` is better or worse than the Terracotta\
    \ version, the information to take away is that JDBC, JMS, RMI, or other clustering\
    \ and sharing approaches could be substituted in place of `get()` and `put()`.\
    \ Table 3-2 maps the specific APIs to the logic concepts of `get()` and `put()`\
    \ for each framework.\n\n**Table 3-2.** *JDBC, JMS, and RMI Equivalents to the\
    \ `map.get()` and `map.put()` Interfaces*\n\n| Framework | `get()` Equivalent\
    \ | `put()` Equivalent |\n|-----------|-------------------|-------------------|\n\
    | JDBC | `[prepared]statement.execute()` SELECT | `[prepared]statement.execute()`\
    \ UPDATE, INSERT, UPSERT |\n| JMS | `MessageConsumer.receive()` | `QueueSender.send()`\
    \ |\n| RMI | `Portable.ObjectImpl._request()` | `Portable.ObjectImpl._invoke()`\
    \ |\n\nWhere the preceding pseudo code calls `Cluster.get()`, we could easily\
    \ replace the logic with a relational database with the appropriate schema plus\
    \ a JDBC query looking up a row in a one-row table. We might call that one-row\
    \ table `HelloClusteredWorld_TABLE`. The table stores the buffer on our application’s\
    \ behalf so that any JVM can query the table for the buffer’s current state and\
    \ can update the table when changing the buffer. The database version of `HelloClusteredWorld`\
    \ might contain some code like this:\n\n```java\ntry {\n    String buffer;\n \
    \   stmt = con.createStatement();\n    rs = stmt.executeQuery(\"SELECT * FROM\
    \ HelloClusteredWorld_TABLE\");\n    buffer = rs.getString(1);\n    stmt.close();\n\
    \    con.close();\n} catch (SQLException ex) {\n    System.err.println(\"SQLException:\
    \ \" + ex.getMessage());\n}\n```\n\nIn the preceding example, we are simply calling\
    \ `get()` and `put()` in the context of a database and JDBC connection. Terracotta\
    \ does not need the developer to insert `get()` and `put()` calls, because Terracotta\
    \ inserts itself into the application byte code looking for the application logic\
    \ to read or write from the objects named `buffer` and `loopCounter`. The act\
    \ of reading the `loopCounter` in memory with Terracotta inserted, in effect,\
    \ asks Terracotta if `loopCounter` is up to date with respect to changes from\
    \ other JVMs. If it is not up to date, Terracotta guarantees that `loopCounter`\
    \ will be updated before returning control flow back to the application logic.\n\
    \n## A Tour Through Terracotta\n\nNow that you’ve seen `HelloClusteredWorld` at\
    \ a high level, let’s go step by step through the process of installing Terracotta,\
    \ setting up a working version of `HelloClusteredWorld`, configuring it, and running\
    \ it in a Terracotta cluster.\n\n### Downloading and Installing Terracotta\n\n\
    The first step is to download the software kit from [http://www.terracotta.org/](http://www.terracotta.org/).\
    \ Follow the Download link, and choose the download kit for your platform. The\
    \ Terracotta kit comes in two flavors: one that comes with a Microsoft Windows\
    \ installer and another that works on all platforms but does not come with an\
    \ installer. For the purposes of this chapter, we will focus on the Windows kit,\
    \ but other than the installer, there is little difference between the structure\
    \ and behavior of the two downloads.\n\nOnce you have downloaded Terracotta, install\
    \ it. On Windows, run the installer program. On other operating systems, use the\
    \ `tar` program to unpack the archive. The Windows installer will place Terracotta\
    \ in `C:\\Program Files\\Terracotta` by default. It will also add convenience\
    \ items to your Start menu for running the administration console, the Terracotta\
    \ Welcome screen, and the like.\n\nOnce the Windows installer has finished, it\
    \ will automatically launch the Terracotta Welcome screen. On other operating\
    \ systems, the Welcome screen may be launched manually by running the `welcome.sh`\
    \ script in the top-level Terracotta installation directory. The Welcome screen\
    \ is a good jumping-off place for exploring the Terracotta sample applications\
    \ as well as starting the Terracotta administrator console, installing the Terracotta\
    \ Eclipse plug-in, and working through some Terracotta tutorials. We will come\
    \ back to the administrator console and the Eclipse plug-in later when we run\
    \ through the Hello Clustered World example step by step.\n\n### Terracotta Installation\
    \ Layout"
