    **总结**


    在本章中，我们经历了创建普通 Java 应用程序、对其进行集群化、将其增强为 Spring 应用程序，并最终成为集群化 Spring 应用程序的整个过程。


    正如您所见，使用 Spring 所强化的控制反转模式设计的应用程序，与 Terracotta 配合得非常好，即使您不将其与 Spring 一起使用也是如此。


    DI 所提倡的关注点分离，使得在集群化应用程序时，哪些对象属于虚拟堆变得非常清晰。此外，Terracotta 提供的 Spring 集成使得配置您的 Spring
    应用程序以与 Terracotta 协同工作变得容易。


    但是，与其他技术配合使用的应用程序呢？是否有办法在 Terracotta 和除 Spring 之外的第三方技术之间提供紧密集成？


    在下一章中，我们将探讨如何使用和构建 Terracotta 集成模块（TIM）。TIM 提供了一种便捷且可移植的方式来封装与特定库或应用程序配合使用所需的所有配置和支持代码。Terracotta
    提供了许多 TIM，使得将 Terracotta 与其他现有技术结合使用变得像与 Spring 结合使用一样简单。而且，您可以构建和发布自己的 TIM，以便与您自己的代码或库，或者尚未获得显式
    Terracotta 支持的技术配合使用。


