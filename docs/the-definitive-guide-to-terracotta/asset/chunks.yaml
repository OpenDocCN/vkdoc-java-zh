- fmt: '# The Alternate Approach: Stateful Programming


    The alternate approach is—again in the web application world—sometimes referred
    to as stateful. This model refers to keeping session data in memory. Application
    data kept in memory is made more highly available by replicating data to other
    application instances in case of failure.


    The goals of stateful application programming are to eliminate the dependency
    on the database and improve application latency and scalability. In the Web world,
    where session cookies exist, applications can leverage the notion of sticky load
    balancing where the same user’s session is routed to the same application instance
    over and over again. This solves one key problem with stateful programming: how
    should an application keep all its instances synchronized in real time? If the
    workload will always be routed to the same instance, then we can keep data in
    memory in only one or two nodes, and this will be fine. If work is sent around
    the application instances randomly, all instances need to know everything that
    has happened before in a particular context.


    > **Note** The use of “happened before” is meant to remind you of Chapter 1, where
    we talked about multithreaded programming and the Java Memory Model’s notion of
    “happens before.” You will see in Chapters 3 and 4 that Terracotta delivers multinode
    scale out using only multithreaded programming. We will also discuss how to abstract
    multiple threads from most of our code so as to avoid the complexity of threading
    and concurrency in applications when appropriate.


    ## In-Memory Replication Challenges


    In-memory replication can crush an application instance in two ways. First, the
    pressure to keep the application’s entire working data in memory can push on the
    JVM’s garbage collector to the point of exhaustion. Second, the pressure to replicate
    every change made on this instance to all others can be too great at as few as
    two nodes, depending on workload. Rarely can simple replication schemes scale
    past three or four nodes. It seems that in-memory replication and stateful programming
    models scale more poorly than stateless ones. There are good qualities to stateful
    architecture, however.


    One can partition an in-memory architecture in any case where a database could
    have been partitioned. This means that if customer tables can be split in half,
    half of the in-memory customer data can be stored on one server and half on another.
    Once data is in memory, latency to access that data drops to nearly zero. Low
    latency is stateful architecture’s best quality.


    The only unaddressable risk in stateful architecture is that of availability.
    If the power to one process is lost, we may not lose anything with the help of
    replication, but if the power to all application processes is lost, we will most
    certainly lose everything in memory.


    In exchange for the availability risk, we would hope that we gain a simplicity
    benefit. If we are working with objects in memory, can we not avoid the classic
    impedance mismatch between the application and the database? Sadly, the answer
    is no. Whether developing using EJB (remote or messaging beans), Java Messaging
    Service (JMS), HTTP session replication, remote method invocation (RMI), or another
    approach, the same data flow occurs:


    1. An object is created in one server.

    2. The object is serialized and pushed to all other servers.

    3. The object is later changed in that server.

    4. The object now must get updated in all other servers (meaning, go to step 2).


    Since the object in memory is, in fact, going to get serialized to be sent on
    the wire, two servers would have different copies of an object. Serialization
    allows multiple threads to edit objects at the same time without corrupting the
    objects. The preceding data flow can be augmented as follows to prove the point:


    5. The object is needed in one thread.

    6. The object is deserialized from the cache or another JVM.

    7. The object is changed in this server.

    8. The object now must get updated in all other servers. If another server has
    edited this object at the same time, throw an exception, and discard the changes
    in either this server or the other.


    This data flow implies that every thread that interacts with our objects must
    deal with a copy of the object. In other words, not only does the thread creating
    objects in step 2 have to serialize an object to send it to other JVMs but the
    thread consuming the object in step 5 must deserialize it to gain access to the
    object. Why? The answer goes back to concurrency. In a stateless model, it is
    clear that an object in memory is only a temporal representation of the database
    row, meaning that the database is the true system of record. However, in memory,
    it is not clear who maintains the system of record. In fact, all the JVMs together
    are the system of record. Transactional capabilities of the database are approximated
    when using in-memory replication by asking the application to work with object
    copies.


    More to the point, the act of serializing object graphs to send them to the network
    and deserializing those byte arrays received from the network forces an application
    developer to live with a copy-on-read semantic. We will spend more time on object
    identity in Chapters 3 and 4. For now, let us assert that stateful programming
    is not simpler than stateless. And stateless programming is not more scalable
    than stateful, which is due to the fact that striping can work for both stateful
    and stateless paradigms.


    ## All Paths Lead to Partitioning


    So far in Chapter 2, all analysis has focused on replication versus partitioning.
    Partitioning, sometimes referred to as sharding or dividing and conquering, is
    an architecture that splits data across a cluster of servers. Partitioning can
    alleviate many typical bottlenecks in network and database traffic by dividing
    the data and corresponding work on that data along consistent lines. For example,
    a typical database application needs to support create, read, update, and delete
    operations. If create operations were to split data across two database instances,
    and read, update, and delete operations were to split data the same way, then
    two similarly sized database servers would provide twice the capacity of one.
    Figure 2-4 illustrates the concept of partitioning data between two servers by
    partitioning the business data into even and odd keys.


    **Figure 2-4.** *Partitioning a CRUD application by splitting data into evens
    and odds*


    > **Note** The nonpartitioned and the partitioned load balancers are different
    in Figure 2-4. The nonpartitioned version is simple and sends any traffic to either
    application server. The partitioned load balancer should be aware of the partitioning
    logic and route work to various application servers based on data partitioning
    rules.


    Partitioning might seem the only path toward scalability for many application
    teams, because as applications grow, data replication or management turns into
    the number one bottleneck. As we already discussed, an application goes faster
    by either caching and keeping more data in memory or striping the data across
    multiple physical locations.


    More accurately, availability is best achieved in a stateless architecture, whereas
    scaling out forces us to push data into memory and replicate it. In fact, most
    real applications are stateless and stateful simultaneously, and this is what
    Terracotta realized. Developers and operators need a way to fundamentally get
    past the trade-offs of availability and scalability (see Figure 1-4) without heading
    down the path of partitioning the application prematurely.


    ## Terracotta’s Origin in a Web Monster'
