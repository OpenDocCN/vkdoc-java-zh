    C H A P T E R 7 n EXTENDING HTTP SESSIONS WITH TERRACOTTA


    In general, only a very small percentage of user sessions will be moving between
    application servers. New users can easily be directed to the latest nodes that
    have joined the cluster, as those servers should report to any Layer 7 load balancer,
    such as F5’s Big IP or Cisco’s Content Director switch, as faster and less burdened
    than all other server nodes. What we are implying is that existing users stay
    on the nodes they started working with, new users get the newly added servers,
    and at any time, any server failure will result in a small number of user sessions
    rebalanced evenly across the entire server cluster. Similarly, since the central
    server is aware of the state of all the nodes, just shutting down some of them
    is also easy. If a user has to gain access to a session on another node, that
    session will be provided by Terracotta on the fly.


    See Chapters 3 and 4 if you want to understand more about how this works.


    High Availability in Case of Server Failure


    Software and hardware can and will fail sooner or later; you can be sure of that.
    If your application must be highly available, you need to decide how to react
    to these failures. For many years, people have been buying redundant power supplies,
    RAID discs, hot backup systems, and other solutions for each server of an important
    application to prevent failure and to reduce the downtime in case failure does
    happen. Recently, commodity hardware has become good enough to be used in place
    of enterprise-class servers, even while lacking the expensive systems’ stability
    guarantees, such as CPUs placed on daughter boards (so that individual CPUs can
    fail without crashing the server) and dual redundant power supplies. A new and
    popular trend is to simply expect that everything will fail and to plan for it.
    With application servers and hardware, the plan tends to involve something like
    lots of simple, small servers running Intel-type technology with a few gigabytes
    of RAM and small local disks with two network cards in the machine. This approach
    makes an entire machine modular and low impact when it crashes. Failure becomes
    a part of the design of your application, not an exception.


    When the application state is stored in sessions that are distributed over the
    cluster, each server node is disposable and can be replaced by any other machine
    that is able to handle the same application logic. The state will be provided
    through the distributed session’s mechanism, as long as the infrastructure responsible
    for dispatching the state is also designed to be fault tolerant. Terracotta assumes
    that you will run the Terracotta server on roughly the same class of machine as
    you run your application. Thus, the Terracotta server is designed to fail over
    automatically on any issue. The central Terracotta server can be configured to
    have another machine available on standby as a passive server. If the active server
    goes down, the passive one will automatically take over to continue distributing
    the sessions. Chapter 4 gives you more detail about how to configure this; other
    scenarios like multiple active servers are also possible, if you want another
    machine to take over instantly without having to start up first.


    **Alternatives to HTTP Sessions**


    HTTP sessions are not always an appropriate mechanism for maintaining application
    state.


    Also, sometimes, applications have been created to externalize the state to another
    tier and aim for statelessness in web servers. These approaches are largely driven
    by application requirements, use cases, and design decisions. The two most important
    approaches that are used instead of distributed HTTP sessions are distributed
    caches and central database stores.


    Interestingly enough, applications that rely heavily on distributed caches or
    a central database might rely less on those stores if the applications had a reliable
    and scalable clustered session


