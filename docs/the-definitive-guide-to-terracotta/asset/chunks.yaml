    第 4 章


    POJO 集群


    **在**上一章中，你通过构建和运行 HelloClusteredWorld 获得了 Terracotta 的实践经验。既然你已经初步涉足，现在是时候介绍一些我们迄今为止仅简要提及的主要概念了。


    我们需要讨论三个广泛的概念，以帮助你理解 Terracotta 在底层是如何工作的。第一个是 Terracotta 如何处理 Java 对象和虚拟堆。


    第二个是 Terracotta 如何管理 JVM 之间线程的协调，以及线程对虚拟堆上对象所做的更改。我们将在这里介绍的第三个主要概念是透明性，以及 Terracotta
    如何扩展应用程序的现有语义，在运行时引入集群行为。


    掌握了这些关键的 Terracotta 概念后，我们将扩展你在 HelloClusteredWorld 中获得的实践经验，并逐步讲解一个更复杂的示例，展示
    Terracotta 如何将一个简单的 POJO 应用程序转变为一个高可用、多 JVM、可扩展的应用程序。


    **关于对象和根的一切**


    在 HelloClusteredWorld 中，我们简要讨论了根以及如何配置它们。你可以将根视为集群对象图中的顶层对象——即根对象在虚拟堆上引用的所有对象；从某种意义上说，这是
    Terracotta 的起点。根是在任何类中，你在 Terracotta 配置中声明为集群对象图起点的任何字段。


    当你首次为声明为根的字段赋值时，Terracotta 会经历将该对象转变为根的过程。Terracotta 遍历对象图，将每个对象（包括根本身）转换为集群对象（关于集群对象是什么，后续会有更多说明）。


    根在 Terracotta 配置中通过名称声明。你可以创建任意数量的根（尽管通常只需要几个）。此外，同一个根可以分配给多个字段。当两个不同的字段被分配同一个根时，Terracotta
    会使它们引用同一个集群对象图。


    Terracotta 配置中的 `<root>` 语句块如下所示：


    <roots>


    ...


    <root>


    <field-name>my.package.MyClass.myRootField</field-name>


    <root-name>my_root_name</root-name>


