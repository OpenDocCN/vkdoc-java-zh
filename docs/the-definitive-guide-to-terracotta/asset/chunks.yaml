    **Worker Failover**


    In a world clustered without Terracotta where you would use sockets or JMS to
    send messages among cluster nodes, you will find that detecting death of workers
    is quite difficult. With Terracotta, however, cluster membership events are all
    we need. The networking library inside Terracotta sends periodic heartbeat messages
    to and from JVMs in the grid. There are several timeouts that can be set at a
    networking level to detect deadlocked, hung, or otherwise


