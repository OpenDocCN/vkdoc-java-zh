- fmt: '# The Tool to Do Analysis of Only a Specific Subset of the Data in This Terracotta
    Server


    Pick the snapshot session that corresponds to the run you just made. There should
    be only one if you are following along for the first time. But every time you
    start a snapshot session, you will automatically create another session.


    **Tip** The Terracotta administration console provides tools for managing performance
    recording sessions and snapshots. You can delete any and all sessions using that
    tool.


    Now, generate the graphs for every application JVM as well as for the Terracotta
    server. To do so, you must click the “Generate graphs” button in the user interface
    (see Figure 12-9). Any time you change the snapshot session or the JVMs for which
    you want data, you must click “Generate graphs” again.


    **Figure 12-9.** *Generating graphs for all performance data*


    So far we have built a set of pounder methods to exercise the Terracotta infrastructure.
    We have also run those methods while recording performance snapshot data on every
    JVM as well as on the Terracotta server. And we have generated graphs to view.
    Before we view these graphs and make sense of them, you should understand what
    to look for.


    ## Potential Bottlenecks


    Before jumping in to analysis of the output of the test runs, you should understand
    what the various graphs display. Any of these graphs can represent a bottleneck
    in a specific application. Understanding the statistic underlying any graph tells
    us what the bottleneck in a specific application is.


    ## Recalling the Motherboard


    Recall from Chapter 2 that we view Terracotta as enabling applications to scale
    out as if the application were running on one large computer. We refer to Terracotta’s
    libraries as L1 clients and the Terracotta server as an L2 instance—as in the
    motherboard and CPU cache analogy.


    Figure 12-10 demonstrates the concept.


    ![Image 27](index-335_1.png)


    **Figure 12-10.** *Terracotta is analagous to the SMP motherboard.*


    Each graph in the visualization tool corresponds to a check box option in the
    administration console, as Figure 12-11 shows. The visualization tool allows graphing
    of specific stats for specific Java machines in the cluster. Each statistical
    graph can be enabled or disabled. Nodes can also be entirely ignored.


    **Figure 12-11.** *Administration console snapshot options*


    We’ll define every metric that the snapshot tool offers, as these are key Terracotta
    components that can cause trouble:


    - **Cache objects evict request**: This statistic tracks the number of times objects
    need to get evicted from the Terracotta server to disk.

    - **L1 L2 flush**: The L1 is a nickname in Terracotta for one of your application
    JVMs. The L2 is a nickname for the Terracotta server. “Flush,” just as in the
    motherboard analogy, refers to point in time when the L1 runs out of memory or
    garbage collects objects and flushes some objects to the L2 to free heap space.

    - **L2 changes per broadcast**: The L2 updates each field of each changing object
    discretely on disk. If a broadcast occurs, one or many changes in the L2 can occur
    as a result. This statistic tracks the ratio of L2 changes that result from each
    broadcast.

    - **L2 pending transactions**: The L2 holds on to transactions for a while before
    applying the deltas to its disks. Those pending transactions take memory while
    in flight. Furthermore, any object that is part of a pending transaction cannot
    be updated again until the transaction is completed. The system holds transactions
    in the pending state so that redundant changes to objects can be folded together,
    or compressed out of updates when possible. Transactions remain pending while
    being compressed and folded into the fewest number of disk updates possible. So
    this statistic represents the situation where lots of updates occur redundantly
    to objects, and those objects are, therefore, temporarily locked by the system
    while being updated.

    - **Message monitor**: This statistic tracks the network message count flowing
    over TCP from clients to server.

    - **Thread dump**: This data is a marker that decorates all the performance graphs
    with a milestone mark that notes when the thread dump happened. In the visualization
    tools, these marks are clickable and will display the thread dump as recorded
    when requested during performance testing and recorded into the snapshot. While
    we never clicked the “Take thread dump” button in the administration console,
    feel free to experiment with this feature.

    - **Cache objects evicted**: This statistic is directly related to evict requests.
    While evict requests tracks the number of times eviction should happen, this statistic
    tracks how many objects actually are evicted from memory.

    - **L2 broadcast count**: The L2 will broadcast any deltas to objects that are
    resident in more than one L1 JVM. “Broadcast” is a misnomer, because the L2 determines
    which L1 needs certain updates and never actually sends updates to JVMs that won’t
    end up needing the changes. The system keeps track of each broadcast that occurs,
    meaning this statistic provides visibility into every time an object changes in
    one JVM and that object is resident in another JVM and needs to be updated.

    - **L2 faults from disk**: When the L2 has too little memory to maintain all objects
    in RAM on the Java heap, it spills objects to disk. This statistic represents
    how many times the L2 has to load objects from disk to serve L1 object demand.

    - **L2 transaction count**: In Terracotta, a transaction is defined as a group
    of changes to objects marked by synchronization boundaries. When an object is
    unlocked in the JVM, all the changes made in a particular thread will be flushed.
    A Terracotta transaction is neither a single object field change nor a single
    object change. A transaction is an application-specific number of field changes
    bundled together using a Java lock. As an example, one application might change
    one object field inside a setter method within a lock. Another might change one
    thousand objects in a for loop before releasing an object lock. A single transaction
    for application one equals one field change. A single transaction in the other
    application equals 1,000 field changes. Whatever the application’s definition
    of a transaction, this metric counts them.

    - **Stage queue depth**: The L2 is asynchronous in nature meaning, like a modern
    operating system, it uses a fixed set of resources and splits its time among all
    pending work doing a little bit of each task at a time. As an example, when one
    JVM needs objects from Terracotta, the task of retrieving those objects is broken
    into stages, and each stage can have many JVM requests waiting for work at that
    point. Stage queue depth tracking allows visibility into all the L2 stages and
    shows how much work of each type is pending in the server. Use this metric to
    determine if your application is causing a specific type of bottleneck inside
    Terracotta. This lets you know what is slow or bottlenecked in detail, all in
    hopes that you can change your application to avoid potential slowdowns.'
