    缓存


    **缓**存提供数据的临时存储，其访问速度比从更权威的来源计算或获取数据更快。在第一种情况下，计算成本高昂的值被记住，以避免重复执行计算。在第二种情况下，值被记住，以避免从更慢或更昂贵的来源（例如数据库、远程源或文件系统）获取它们。


    在本章中，我们将探讨缓存可能对应用程序产生帮助或损害的多种方式。然后，我们将研究 Terracotta 如何解决缓存中的一些常见问题，以及如何将缓存的好处扩展到分布式系统。最后，我们将通过使用基本
    Java 数据结构以及像 Ehcache 这样成熟的开源缓存库来查看缓存的示例。


    **缓存的痛点**


    虽然缓存是减少延迟或减轻过载记录系统负载的宝贵工具，但它并非没有代价，任何管理过缓存的人都可以证明这一点。这些代价通常表现为以下几种形式：


    *   **用空间换时间**：缓存数据必须存储在可访问的位置（例如，RAM 或本地磁盘）一段时间。在该可访问位置的空间成本必须与从源获取结果的成本相权衡。

    *   **新鲜度**：由于缓存不是数据的权威来源，其有用性取决于数据的新鲜程度、新鲜度的重要性以及保持缓存足够新鲜的难度。

    *   **复杂性**：管理空间和新鲜度之间的权衡会引入一定程度的复杂性，这种复杂性可能很快变得难以承受。


    让我们花点时间回顾一下缓存管理可能使缓存维护者感到痛苦的一些最常见方式。


    **大数据集的痛点**


    如果你的数据集中重要的部分（你经常使用以至于值得缓存的部分）适合放入可用的 RAM，并且其变化足够慢以至于新鲜度不是问题，那么缓存可以简单到将计算结果按唯一标识符存储在映射中，偶尔在缓存条目变旧时使其失效。然而，缓存往往会超出可用
    RAM 的边界。当这种情况发生时，你有几个选择：


    *   **购买更多 RAM**。这在某种程度上是可行的，但你能安装或操作系统可寻址的 RAM 数量存在硬性限制。在 JVM 中，非常大的堆也可能带来重大的垃圾回收调优挑战。可以说，购买更多
    RAM 并不总是最佳选择，甚至不是一个可行的选择。

    *   **清除不太重要的缓存条目**，即使它们仍然有效，以便为更重要的条目腾出空间。这可能会降低缓存的有效性，甚至使缓存变得无用。如果未命中率足够高，你的缓存最终可能会抖动——不断地清除和重新加载条目——以至于维护缓存的开销实际上使情况变得更糟。

    *   **将缓存溢出到磁盘或网络缓存服务器**。这更复杂，但你的缓存实现必须支持它。如果你需要缓存的这种复杂功能，并且你正在使用一个最初只是简单映射的自研实现，那么可能是时候将其替换为已经能处理这类事情的现有缓存实现了。除非你的业务就是编写缓存实现，否则你不应该扩展你的自研缓存来提供这些更复杂的功能，否则无论你是否愿意，你最终都会陷入编写，更糟糕的是，*维护*一个缓存实现的困境。


    **过时数据的痛点**


    保持缓存更新是缓存维护的另一个常见问题。如果你幸运的话，你缓存的数据变化不大。如果不是，你必须处理保持缓存条目足够新鲜的问题。“足够新鲜”高度依赖于数据。有时，只要最终能更新，你可以容忍一些过时的条目。在这种情况下，你或许可以依靠基于算法的失效策略。


    然而，通常情况下，缓存数据*必须*始终与记录系统保持一致。这对于金融和交易数据很常见。缓存必须越新鲜，对实现的约束就越多。同时保持新鲜度和足够高的命中率以使缓存值得使用，可能需要采取极端措施。缓存如何保持新鲜度最终是一个架构和业务决策。


    **重复数据的痛点**


    如果相同的数据源在多个位置被缓存，缓存的许多痛点会变得更加严重，这在扩展部署中很常见，其中同一应用程序的多个实例都保留着相同缓存数据的自己的副本。随着每个新的缓存实例上线，它必须查询记录系统以填充其尚未拥有的条目。因此，缓存为记录系统提供的保护与缓存副本的数量成反比。Terracotta
    将此称为 1/*n* 效应（读作“one-over-n”），其中缓存保护宝贵数据源的有效性等于缓存副本数量的倒数。


    图 5-1 展示了 1/*n* 效应：如果有 *n* 个应用服务器，每个应用服务器必须在请求时加载相同的数据，这会导致 *n*–1 次不必要的缓存加载。


