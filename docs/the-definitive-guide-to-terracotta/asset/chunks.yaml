    force is Linux. Without Linux and the associated open source approach, license
    fees and support fees for expensive operating systems would have forced us to
    find ways to scale our applications on fewer servers; the backs of our IT budgets
    would have otherwise been broken as we bought more and more nodes across the enterprise.


