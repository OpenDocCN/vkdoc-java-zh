    \ |\n| --- | --- | --- |\n| `Require-Bundle` | The bundles required by this bundle\
    \ (a comma-separated list), sorted by symbolic name and optionally by version\
    \ in the form `<bundle-symbolicname>`; `bundle-version:=<bundle-version>.1` |\
    \ Optional |\n| `Bundle-Category` | The purely informational bundle category.\
