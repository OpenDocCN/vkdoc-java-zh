- fmt: '### Listing 8-7. `tc-config-no-spring.xml`


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    [<con:tc-config >](http://www.terracotta.org/config)


    <servers>


    <server host="%i" name="localhost">


    <dso-port>9510</dso-port>


    <jmx-port>9520</jmx-port>


    <data>terracotta/server-data</data>


    <logs>terracotta/server-logs</logs>


    </server>


    </servers>


    <clients>


    <logs>terracotta/client-logs</logs>


    </clients>


    <application>


    <dso>


    <instrumented-classes>


    <include>


    <class-expression>


    org.terracotta.book.inventory.entity..*


    </class-expression>


    </include>


    <include>


    <class-expression>


    org.terracotta.book.inventory.cli.CLI


    </class-expression>


    </include>


    <include>


    <class-expression>


    org.terracotta.book.inventory.util.DepartmentByNameComparator


    </class-expression>


    </include>


    <include>


    <class-expression>


    org.terracotta.book.inventory.util.ProductByNameComparator


    </class-expression>


    </include>


    </instrumented-classes>


    <locks>


    <autolock>


    <method-expression>


    * org.terracotta.book.inventory.entity..*(..)


    </method-expression>


    <lock-level>write</lock-level>


    </autolock>


    </locks>


    <roots>


    <root>


    <field-name>org.terracotta.book.inventory.cli.CLI.store</field-name>


    </root>


    </roots>


    </dso>


    </application>


    </con:tc-config>

    ```


    All of the objects in the `org.terracotta.book.inventory.entity` package will
    be clustered, so we use a class expression to include all classes in that package
    for instrumentation. The two comparator objects in the `util` package will be
    clustered also, so we add include expressions for them.


    The `store` reference in the `CLI` class is declared as a root field. The `CLI`
    object never becomes a shared object. However, it manipulates shared objects directly,
    so it must also be instrumented.


    The only methods that modify clustered objects are in the entity classes, so we
    use a method expression to declare all methods in the entity package to be automatically
    locked.


    To run the example clustered with Terracotta, first start the Terracotta server
    in a separate terminal window. Make sure you specify the correct Terracotta configuration
    file and remember to replace `<$TC_HOME>` with the directory where you unzipped
    the Terracotta download:


    ```bash

    %> <$TC_HOME>/bin/start-tc-server.sh -f tc-config-no-spring.xml

    ```


    Back in your application terminal, use the `dso-env` script to determine the JVM
    arguments that need to be added to the `java` command. You will see output that
    looks like this, with slight variations depending on the version of Terracotta
    you are using and where you installed it:


    ```bash

    <$TC_HOME>/bin/dso-env.sh localhost:9510


    2008-03-24 14:33:28,124 INFO - Terracotta 26, as of 20080218-120204 (Revision
    7031 by cruise@rh4mo0 from 2.6)

    2008-03-24 14:33:28,669 INFO - Configuration loaded from the server at

    ''localhost:9510''.


    -Xbootclasspath/p:<$TC_HOME>/lib/dso-boot/dso-boot-

    hotspot_osx_150_13.jar -Dtc.install-root=<$TC_HOME>/bin/..

    -Dtc.config=localhost:9510

    ```


    **Note:** Passing `localhost:9510` as an argument to `dso-env` tells Terracotta
    that the client JVMs should receive their configuration from the Terracotta server.
    This is a good practice that will ensure that all of the Terracotta client JVMs
    operate with the same configuration.


    Now that you know what the Terracotta JVM arguments are, you can run Java with
    Terracotta enabled (the actual values of the Terracotta arguments you pass to
    Java will probably be slightly different than those shown here):


    ```bash

    %> java \

    -Xbootclasspath/p<$TC_HOME>/bin/../lib/dso-boot/dso-boot-

    hotspot_osx_150_13.jar \

    -Dtc.install-root=<$TC_HOME>/bin/.. \

    -Dtc.config=localhost:9510 \

    -cp bin \

    org.terracotta.book.inventory.cli.Main

    ```


    The application will operate exactly the same as it did before. The `store`, however,
    will be clustered. If you look at the runtime clustered object graph in the Terracotta
    administration console, you will see the `Store`, `Inventory`, `Departments`,
    `Department`, and `Product` objects on the Terracotta virtual heap.'
