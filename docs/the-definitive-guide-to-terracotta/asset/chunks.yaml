- fmt: "# 排版后的内容\n\nThere is one more step: tell Terracotta to prepare the `HelloClusteredWorld`\
    \ class for clustering, including honoring any threading logic present in our\
    \ application. The most basic form of configuration is to tell Terracotta to prepare\
    \ any and all classes for clustering using broad-reaching regular expressions,\
    \ like this:\n\n```\n<instrumented-classes>\n  <include>\n    <class-expression>*..*</class-expression>\n\
    \  </include>\n</instrumented-classes>\n\n<locks>\n  <autolock>\n    <method-expression>*\
    \ *..*.*(..)</method-expression>\n  </autolock>\n</locks>\n```\n\nFor now, we\
    \ will not worry about how to configure threads and locking, since the focus is\
    \ on how transparently sharing objects helps to cluster applications. Now, it\
    \ is time to run the application as a clustered version of `HelloClusteredWorld`.\n\
    \nTo run this application in a clustered fashion using Terracotta, the command\
    \ line will have to change from `java` to `dso-java.sh`. The shell script is located\
    \ in the directory named `bin` in the directory where you unpacked the Terracotta\
    \ download (we will address the structure of the Terracotta kit in detail before\
    \ the end of this chapter). The shell script adds the Terracotta libraries to\
    \ the classpath for Terracotta's class loader to find. It also installs Terracotta's\
    \ class loader as part of the boot class loader hierarchy and places itself in\
    \ the boot classpath. Being part of the boot class loader hierarchy allows the\
    \ JVM to connect to the Terracotta cluster at process start-up. As a boot class\
    \ loader, Terracotta also has the privilege of helping to load almost all classes\
    \ into the JVM. The command-line arguments to Java that you otherwise run will\
    \ be passed undisturbed to the underlying JVM.\n\n> **Note:** To learn more about\
    \ boot class loaders, the boot classpath, and how Terracotta connects its libraries\
    \ and agent into the JVM at run time, visit [http://java.sun.com/j2se/1.5.0/docs/tooldocs/findingclasses.html](http://java.sun.com/j2se/1.5.0/docs/tooldocs/findingclasses.html).\n\
    \nWhen we run the application using `dso-java.sh`, we will find no change in output\
    \ (these results are not shown here). The change comes when there are two instances\
    \ of the application. The output of the second JVM when two processes are running\
    \ follows:\n\n```\n% dso-java.sh HelloClusteredWorld\nHel\nHello\nHello C\nHello\
    \ Clu\nHello Clust\n```\n\nNote that the very first line of output from the application\
    \ is \"Hel\" as opposed to \"H,\" as the result would have been without Terracotta.\
    \ What has happened to our application? The two JVMs are moving through the infinite\
    \ while loop together, which is quite interesting. Figure 3-1 shows a UML sequence\
    \ diagram of this loop: each JVM has one thread whose starting point is signified\
    \ by the thicker arrow. The JVMs then take turns synchronizing on the lock, adding\
    \ a character, and sleeping. This continues in the infinite loop.\n\n**Figure\
    \ 3-1.** *UML sequence diagram of `HelloClusteredWorld` running in two JVMs in\
    \ parallel*\n\n## Why `HelloClusteredWorld` Works\n\n`HelloClusteredWorld` works\
    \ with Terracotta, because Terracotta functions below the application to cluster\
    \ at the level of the JVM itself. Terracotta inserts itself between the application\
    \ logic and its memory, looking for calls to the heap. Those calls could be reads\
    \ from memory or writes to memory.\n\nA memory read or write results from Java\
    \ instructions running in the JVM. For a moment, break down an object in your\
    \ head into the class definition and the instance data. This is, in fact, what\
    \ Terracotta does. The class definition contains the methods that implement the\
    \ business rules and object model. The instance data contains only data in memory.\
    \ So an instance of a class writes to memory via the assignment operator (`=`).\
    \ And an instance of a class reads memory via the accessor operator (`.`)."
