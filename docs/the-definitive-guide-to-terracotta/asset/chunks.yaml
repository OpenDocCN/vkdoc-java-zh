    at the beginning of this chapter, once the second instance joins the cluster,
    each instance will start printing with the `messageIndex` moved forward two characters
    instead of one. Again, as we discussed earlier, this is because the `loopCounter`
    variable is being incremented each time by the other instance between loop iterations—because
    the `loopCounter` is shared between them, the count advances twice per loop rather
    than just once.


    ## Viewing Runtime Data in the Terracotta Administration Console


    Now that we have a cluster running, let’s use the Terracotta Administrator Console
    to get picture of the runtime data moving around our cluster. You can launch the
    Terracotta Administrator Console from the command line like this:


    ```

    %> /usr/local/terracotta/bin/admin.sh

    ```


    This will launch a Java Swing application that looks something like Figure 3-2.


    ![Image 5](index-85_1.jpg)


    ![Image 6](index-85_2.jpg)


    **Figure 3-2.** *Terracotta Administrator Console’s initial display*


    If you select or expand the Roots control, you will see a snapshot of the runtime
    state of the clustered object graphs. It should look something like Figure 3-3.


    **Figure 3-3.** *Using the administrator console to examine shared objects*


    As the program runs, you can click Refresh in the context menu for any point in
    the object graph to have that segment of the graph updated with a current snapshot.
    Do that a few times while `HelloClusteredWorld` is running, and you will see the
    contents of the character buffer fill up, get cleared, and fill up again. Likewise,
    you can watch the value of the `loopCounter` field increment.


    The next item down from the Roots control displays the number of instances of
    each class that has been added to the cluster. In this example, nothing is displayed
    because `HelloClusteredWorld` doesn’t actually share any objects—only primitives:
    a character array and an `int`.


    The “Lock profiler” item allows you to turn on lock statistics gathering. If you
    enable lock statistics and click the server, you can see the locks on the buffer
    character array (denoted by `"[C"`) and the `loopCounter` int are requested by
    each client as it goes through the `while` loop (there’s an implicit lock acquisition
    when a root is accessed—nonroot fields do not require that implicit lock acquisition).


    The Clients control displays information about currently connected client JVMs.
    If you still have your two instances of `HelloClusteredWorld` running, you should
    see two entries. Each entry can be expanded to display host and port information,
    as well as per-client graphs of client-side cache flush and fault rates, and the
    per-client transaction rate. The same cache and transaction rate statistics for
    the cluster as a whole can be viewed beneath the Clients control.


    The “Garbage collection” item shows the statistics on executions of the Terracotta
    distributed garbage collector.


    ## High Availability


    Now that we’ve got a cluster up and running, let’s see what happens when we start
    turning off and restarting parts of the cluster. First, let’s try to kill the
    server while the two clients are running. You can do this by causing the server
    process to exit (for example, if you started it from a Unix-style command line,
    you can type `Ctrl+C` in the terminal you ran the server in).


    When the Terracotta server process exits, you should see the clients halt. This
    happens because the thread that is in the `while` loop requests a clustered lock,
    but the server can’t receive the lock request because it isn’t running. What you
    aren’t seeing in the standard output (but you can see in the client logs) is that
    the clients are continually trying to reconnect to the Terracotta server and being
    rebuffed because the server still isn’t running.


    If we had configured redundant Terracotta servers, killing the active server would
    have caused one of the passive secondary servers to automatically take over as
    the primary active server. For simplicity, we have only configured one server,
    but we can simulate this failover behavior by starting the server again the same
    way we started it the last time. Once the new server instance starts up, the clients
    will automatically reconnect and resume where they left off.


    ## Heap Durability


    Next, try killing all of the `HelloClusteredWorld` instances. Without Terracotta,
    the next time you start the program, it will start from the beginning. With Terracotta,
    however, when you kill all of the `HelloClusteredWorld` instances and start a
    new one, instead of starting from the beginning, the application will start *where
    it left off* in whatever state `loopCounter` and `buffer` were in when you killed
    the last `HelloClusteredWorld` instance. This is because the state of the clustered
    heap and, therefore, the state of `loopCounter` and `buffer` are maintained across
    JVM invocations.


    ![Image 7](index-87_1.png)


    ![Image 8](index-87_2.jpg)


    In fact, the heap is maintained even if you shut down all of the `HelloClusteredWorld`
    instances *and* the Terracotta server, power down the machines they are running
    on (or, for example, your laptop), take the machines apart, and store them for
    ten years. If, after ten years, you reassemble the machines, plug them all back
    in, power them up, and start up the cluster again, your Terracotta-enabled Java
    program will resume operation exactly where it left off when you shut it down
    a decade ago.


    ## Step-by-Step Hello Clustered World in Eclipse


    Now that we’ve built up a simple Terracotta-enabled program and clustered it from
