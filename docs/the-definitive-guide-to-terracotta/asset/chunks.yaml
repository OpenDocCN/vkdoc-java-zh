    section of the Terracotta configuration file that are not included in the boot
    JAR, as well as classes in the boot JAR that are not listed in the <additional-boot-jar-classes/>
    section.


    It returns the exit code 1 if the boot JAR file is incomplete; otherwise, the
    exit code is 0.


    start-tc-server.[bat|sh]: This will start the Terracotta server.


    stop-tc-server.[bat|sh]: This will stop the Terracotta server.


    version.[bat|sh]: This will print out the current Terracotta version.


    **Step-by-Step Hello Clustered World in Unix**


    At the beginning of this chapter, we introduced the standard “hello, world” program.
    For the sake of clarity, we left out specific instructions on how to run it. Let’s
    return now to Hello Clustered World and walk through it step by step, exploring
    the details of how to get it running. The first pass through, we will use just
    a text editor and command-line tools. Then, we will explore how to get it running
    in the Eclipse IDE with the Terracotta Eclipse plug-in.


    Creating a Project Skeleton


    The first step is to create a project directory skeleton that looks like this:
    hello_clustered_world/build


    hello_clustered_world/src


    hello_clustered_world/src/HelloClusteredWorld.java


    hello_clustered_world/tc-config.xml


    986-1 CH03.qxd 5/5/08 9:13 AM Page 54


    **54**


    C H A P T E R 3 ■ J U M P I N G I N TO T E R R A C OT TA


    Make a top-level project directory called hello_clustered_world. Under that, create
    a directory called build that we’ll use to put the compiled classes. Also under
    the top-level directory, create a directory called src that we’ll use to put our
    Java source files. We will create the tc-config.xml file in a moment.


    Creating HelloClusteredWorld.java


    Once the project skeleton is created, using your favorite text editor, create
    a file under the src directory called HelloClusteredWorld.java. Type the following
    code into it: public class HelloClusteredWorld {


    private static final String message = "Hello Clustered World!"; private static
    final int length = message.length();


    private static char[] buffer = new char [length ];


    private static int loopCounter;


    public static void main( String args[] ) throws Exception {


    while( true ) {


    synchronized( buffer ) {


    int messageIndex = loopCounter++ % length;


    if(messageIndex == 0) java.util.Arrays.fill(buffer, ''\u0000'');


    buffer[messageIndex] = message.charAt(messageIndex);


    System.out.println( buffer );


    Thread.sleep( 100 );


    }


    }


    }


    }


    Once you’ve saved the file, compile the program with the following command (make
    sure your working directory is the top-level project directory):


    %> javac -d build/ src/HelloClusteredWorld.java


