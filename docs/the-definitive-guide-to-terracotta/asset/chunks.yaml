  raw: 'When you run a second execution instance and it arrives at the enterBarrier,
    both threads will be allowed through. The same thing will happen at the exitBarrier.
    Since two threads—albeit in different JVMs—are participating, when they both arrive
    at the exitBarrier, they will be allowed through. You should see the following
    text printed out: Step 2: Passed through enterBarrier because all threads arrived.
    Arriving at exitBarrier...


    Step 3: Passed through exitBarrier. All done. Goodbye.


    As you can see, there is very little functional difference between the two examples.
    The main difference is that the policy of blocking all threads until the expected
    number of threads has arrived at an execution point has been abstracted into a
    generic library class, CyclicBarrier. The power of Terracotta comes into play
    once again by automatically supporting the CyclicBarrier class so that you may
    take advantage of its policy behavior for threads across multiple JVMs.


    **Thread Coordination and JMX Cluster Events**


    The next example is the same as the previous one with the addition of Terracotta
    cluster events. Cluster events are JMX events that get fired in a client JVM when
    JVMs join or leave the cluster. In order to receive the Terracotta cluster events,
    the example class has to be augmented to implement four methods:


    • nodeConnected(Object nodeID): Called when another JVM joins the cluster


    • nodeDisconnected(Object nodeID): Called when another JVM leaves the cluster


    • thisNodeConnected(Object nodeID): Called when this JVM joins the cluster


    • thisNodeDisconnected(Object nodeID): Called when this JVM leaves the cluster
    Cluster events in Terracotta will eventually grow to include all logical stages
    a cluster or JVM can experience. A more robust solution for event handling must
    include methods such as these:


    • nodeInit(Object nodeID): Called when this node starts.


    • nodeConnecting(Object nodeID): Called when this node invokes the socket connect()
    method to the Terracotta server.


    • nodeConnected(Object nodeID): Called when a TCP handshake is complete and a
    node has joined the cluster.


    • nodeReconnecting(Object nodeID): Called when the network hiccups and a node
    is reconnecting.


    986-1 CH10.qxd 5/28/08 10:51 AM Page 231


    C H A P T E R 1 0 n THREAD COORDINATION


    **231**


    • nodeOrphaned(Object nodeID): Called when a cluster no longer waits for a node
    and the node will never reconnect without exiting first. Note that the orphaned
    node will never find out it has been orphaned; the server and other nodes can
    find out.


    • nodeReconnected(Object nodeID): A node successfully rejoined a cluster (the
    same as the nodeConnected() event but documented here for clarity’s sake).


    • nodeDisconnecting(Object nodeID): A node exiting normally.


    • nodeDisconnected(Object nodeID): A node exited normally.


    As you can see from the previous list of ideal cluster events, Terracotta plans
    significant updates to this subsystem. The current functionality, while sufficient,
