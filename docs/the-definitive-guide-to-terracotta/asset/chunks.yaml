    这就是依赖注入（DI）的精髓。Store 组件只负责一件事——提供对商店各组件的访问。它本身不构建任何状态；因此，它与之交互的其他系统组件的实际实现完全独立于
    Store 的实现。Store 的依赖项通过构造函数参数注入到其中。


    ■**注意** 除了通过构造函数参数传递之外，DI 还有许多其他风格；我们不会全部讨论。Spring 也远不止 DI 这一项功能。要更深入地探索 Spring、DI
    和控制反转，请访问 Spring 框架网站：[`www.springframework.org/`](http://www.springframework.org)。


