    scaled across server processes, while business data is simultaneously accessed
    through each process. Concurrent access to data is either managed in a stateful
    or stateless manner. Neither stateless nor stateful architecture avoids the scalability
    bottleneck. Let’s validate that assertion now.


    **Scale the Database**


    One approach to building an application that can spread across Java processes
    is to ensure that no process has information that other processes have at the
    same time. In the web application space, we call such architecture stateless,
    but the generic concept is more powerful than storing data in a database. The
    generic concept simply implies that no data can be stored in a single process’s
    memory and that, ideally, no data should be stored in memory, period.


    986-1 CH02.qxd 4/28/08 9:54 AM Page 26


    **26**


    C H A P T E R 2 ■ H I S TO RY O F T E R R A C OT TA


    We can build a stateless application by writing all data to a database (or to
    flat files on a shared file server). We might even use durable message queuing
    to write out objects as messages that we can later retrieve. Regardless of the
    storage mechanism, stateless applications do not become a scalability challenge
    until those applications are spread across processes (Java or otherwise). This
    is due to the fact that, with a single application instance, we can perfectly
    cache the data coming from the database, thus reducing our dependency on that
    database.


    A perfect cache is one where the cache never misses where we would expect it to
    hit. If a certain application workload pulls records from the database into memory
    as objects and those objects are cached, a developer would expect the database
    to see no queries regarding these objects until the cache is flushed. A scaled
    out application cannot exhibit perfect caching behavior, because each Java process
    needs to cache data separately and redundantly.


    Records pulled into memory in one JVM are not available to other JVMs.


    When the application is scaled across processes, we need to distribute the cache
    in order to get the same benefit of caching on an application that is not clustered.
    Figure 2-2 illustrates the inefficiency associated with failing to distribute
    application caches.


    **Figure 2-2.** *Nondistributed caches leading to unnecessary cache misses*


    986-1 CH02.qxd 4/28/08 9:54 AM Page 27


    C H A P T E R 2 ■ H I S TO RY O F T E R R A C OT TA


    **27**


    If an application is designed to trust its own cache as consistent with the database
    at all times, when spreading the application across processes, the cache must
    be either disabled, as in the case of Hibernate second level caching, or distributed.
    Without a distributed cache, an individual process could return stale data to
    the end user if that node does not know that the data changed on another application
    instance. Imagine that one application server in Figure 2-2 changed item 1234
    and did not tell the other that it had done so. Then both application servers
    would have a different version of item 1234 in cache, and only one would be in
    sync with the database.


    Figure 2-2 illustrates that applications that don’t store some state in the application
    tier are prone to bottlenecks, because they issue redundant SQL queries at the
    database. The redundant SQL queries sent to a database from various application
    nodes eventually crush it.


    The example also shows that, without distributing the cache, the application can
    become inconsistent. So, while developers get persistence and consistency from
    databases and stateless architecture, the application cannot scale without more
    work from the developer on stateful caching and replication of that cache.


    The seemingly most expedient choice for an operator to scale a mature stateless
    application without demanding that the developer change the application is to
    scale the storage—database or otherwise. There are several problems with the notion
    of clustered databases. While database tuning is a topic for another book, suffice
    it to say that database latency is managed through indexing, building query plans,
    caching disk blocks, and otherwise optimizing queries. Meanwhile, database scalability
    is predicated on the concept of striping. Disk striping helps a single database
    server handle more application workload by summing the capacity of several hard
    drives together underneath a data table.


    This idea can be extended to striping across database instances. If we take a
    customer table and split the table across two database instances on separate servers,
    we get twice the database capacity. However, we must now externally remember to
    check both instances for the data. The problem with partitioning the database
    is that the stripes across disks are purely up to database administrators and
    storage administrators, whereas striping data across database servers usually
    requires application-level support. Figure 2-3 shows a database partitioned across
    disks versus across servers and the resulting application changes required to
    support partitioned database instances.


    If the database attempts to do this split on its own as a black box, then we do
    not get quite double the capacity because the instances have to route queries
    to each other on a miss. Thus, scaling the database is a misnomer, because the
    operator eventually has to ask the developer to make changes. Stateless architecture
    is not the silver bullet it appears to be on first blush.


    Either state or partitioning leaks back into the application through caching as
    a result of scaling out. Many Java developers have experienced this problem and
    choose to use in-memory replication.


    986-1 CH02.qxd 4/28/08 9:54 AM Page 28


    **28**


    C H A P T E R 2 ■ H I S TO RY O F T E R R A C OT TA


    **Figure 2-3.** *Striping disks under databases (left) versus striping databases
    under applications* *(right)*


    **In-Memory Replication**'
  trans: '

    现在，让我们更详细地讨论复杂昂贵的集群与简单的数据库支持应用之间的这场拉锯战。这将帮助你认识到，一个试图扩展的应用可以采用与多处理器主板架构相同的技术。分析
    Terracotta 的起源和基本原则，将有助于你理解应用与现代主板之间的类比。到第 2 章结束时，你将了解主板式方法如何使横向扩展变得透明，以及这种透明性如何在应用设计的其他方面发挥作用。


    **扩展方法**


    在一般开发项目开始时，我们必须确定业务需求。架构师、开发人员以及管理生产应用的人员（Terracotta 有时将后者称为应用运维人员）可以选择自上而下或自下而上的方式开始工作。自上而下架构的一个例子是：决定最终用户需要图形界面并希望使用网页浏览器，因此我们需要一个
    HTTP 服务器、一个 Web 开发框架、一个运行所有组件的容器，以及一个存储业务数据的系统。相反的方法是自下而上，即从首选的数据存储引擎（数据库、文件服务器或其他）开始，然后寻找最佳、最具可扩展性的数据存储方式，逐步回溯到支持我们数据存储的开发框架，并最终决定最终用户如何访问所有这些软件。与导致
    Web 应用的自上而下方法形成对比，从底层开始可能会产生一个用户上传到服务器以供后续处理的电子表格。


    无论我们讨论的是自上而下还是自下而上，只有那些之前构建过大规模应用的人才会在设计的早期阶段纳入可扩展性框架和模式。可扩展性的根本挑战在于，应用跨服务器进程进行扩展，而业务数据则通过每个进程同时访问。对数据的并发访问要么以有状态方式管理，要么以无状态方式管理。无状态架构和有状态架构都无法避免可扩展性瓶颈。现在让我们来验证这一论断。


    **扩展数据库**


    构建一个能够跨 Java 进程分布的应用的一种方法是确保没有进程拥有其他进程同时拥有的信息。在 Web 应用领域，我们将这种架构称为无状态架构，但这个通用概念比将数据存储在数据库中更强大。该通用概念仅仅意味着没有数据可以存储在单个进程的内存中，并且理想情况下，根本不应该将任何数据存储在内存中。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 26 页


    **26**


    第 2 章 ■ TERRA COT TA 的历史


    我们可以通过将所有数据写入数据库（或共享文件服务器上的平面文件）来构建无状态应用。我们甚至可以使用持久化消息队列将对象作为消息写出，以便稍后检索。无论采用何种存储机制，无状态应用只有在这些应用跨进程（Java
    或其他）分布时才会成为可扩展性挑战。这是因为，对于单个应用实例，我们可以完美地缓存来自数据库的数据，从而减少对该数据库的依赖。


    完美缓存是指缓存永远不会在我们期望命中的地方未命中。如果某个特定的应用工作负载将记录从数据库作为对象拉入内存，并且这些对象被缓存，那么开发人员会期望在缓存被刷新之前，数据库不会看到针对这些对象的查询。一个横向扩展的应用无法表现出完美的缓存行为，因为每个
    Java 进程都需要独立且冗余地缓存数据。


    在一个 JVM 中拉入内存的记录对其他 JVM 不可用。


    当应用跨进程扩展时，我们需要分发缓存，以获得与未集群的应用相同的缓存优势。图 2-2 说明了未能分发应用缓存所带来的低效问题。


    **图 2-2.** *非分布式缓存导致不必要的缓存未命中*


    986-1 CH02.qxd 4/28/08 9:54 AM 第 27 页


    第 2 章 ■ TERRA COT TA 的历史


    **27**


    如果一个应用被设计为始终信任其缓存与数据库保持一致，那么在将应用跨进程分布时，必须要么禁用缓存（如 Hibernate 二级缓存的情况），要么分发缓存。如果没有分布式缓存，如果某个节点不知道数据在另一个应用实例上发生了更改，那么该单个进程可能会向最终用户返回过时数据。想象一下，图
    2-2 中的一个应用服务器更改了项目 1234，但没有告知另一个应用服务器它已这样做。那么两个应用服务器的缓存中都会有项目 1234 的不同版本，并且只有一个版本与数据库同步。


    图 2-2 说明，在应用层不存储某些状态的应用容易出现瓶颈，因为它们会向数据库发出冗余的 SQL 查询。从各个应用节点发送到数据库的冗余 SQL 查询最终会压垮它。


    该示例还表明，如果不分发缓存，应用可能会变得不一致。因此，虽然开发人员从数据库和无状态架构中获得了持久性和一致性，但如果没有开发人员在有状态缓存和该缓存的复制方面做更多工作，应用就无法扩展。


    对于运维人员来说，在不要求开发人员更改应用的情况下扩展一个成熟的无状态应用，看似最便捷的选择是扩展存储（数据库或其他）。集群数据库的概念存在几个问题。虽然数据库调优是另一本书的主题，但可以说数据库延迟是通过索引、构建查询计划、缓存磁盘块以及优化查询来管理的。同时，数据库的可扩展性基于条带化的概念。磁盘条带化通过将数据表下的多个硬盘驱动器的容量相加，帮助单个数据库服务器处理更多应用工作负载。


    这个想法可以扩展到跨数据库实例的条带化。如果我们获取一个客户表，并将其拆分到位于不同服务器上的两个数据库实例上，我们将获得两倍的数据库容量。但是，我们现在必须从外部记住检查两个实例以获取数据。分区数据库的问题在于，跨磁盘的条带化完全由数据库管理员和存储管理员决定，而跨数据库服务器的数据条带化通常需要应用层支持。图
    2-3 显示了跨磁盘分区数据库与跨服务器分区数据库，以及为支持分区数据库实例所需的应用更改。


    如果数据库尝试作为一个黑盒自行进行这种拆分，那么我们将无法获得两倍的容量，因为实例必须在未命中时相互路由查询。因此，扩展数据库是用词不当，因为运维人员最终不得不要求开发人员进行更改。无状态架构并非乍看起来那样的银弹。


    由于横向扩展，状态或分区会通过缓存泄漏回应用中。许多 Java 开发人员都遇到过这个问题，并选择使用内存复制。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 28 页


    **28**


    第 2 章 ■ TERRA COT TA 的历史


    **图 2-3.** *数据库下的磁盘条带化（左）与应用下的数据库条带化（右）*


    **内存复制**

