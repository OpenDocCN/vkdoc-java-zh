  trans: '

    • *JVM 垃圾回收器*：该统计指标追踪垃圾回收器在所有 JVM 上的行为。


    • *分布式垃圾回收*：这个 Terracotta 特有的概念，更应被理解为分布式垃圾的收集器，而非分布式的垃圾回收器。该工具从不遍历所有 JVM 的内存来定位集群中的垃圾。它仅在
    L2 内部运行。然而，在分布式垃圾回收的关键时刻，L2 会暂停所有其他类型的工作，确保没有正在被活跃引用的对象被标记为垃圾。与 Java 垃圾回收一样，这种
    L2 回收在暂停系统时可能导致瓶颈。


    • *每事务 L2 广播*：此统计指标表示广播与事务的比率。如果你的应用每秒更新对象 1000 次，且每次更新都导致一次广播，那么比率就是 1:1。1:1
    的比率意味着所有事务都会引发广播，这表明引用的局部性较差，并且很可能限制了可扩展性。广播比率为零意味着没有对象同时驻留在多个 JVM 中。这样的配置应该具有线性可扩展性。


    • *L2 L1 缺页*：此统计指标追踪与刷出相反的情况。当某个 JVM 需要本地堆中没有的对象时，就会发生缺页。L1 必须等待 L2 发送该对象，因此会被
    L2 阻塞而无法继续推进。良好的局部性加上适当数量的 JVM，意味着一个 JVM 应该总有足够的内存来将其使用的所有对象保存在本地堆中。缺页越少，可扩展性越好。


    • *内存*：此统计指标追踪堆内存随时间的使用情况。对于 JDK 1.5 或更新版本，这些数据可以通过 JConsole 独立获取，但 Terracotta
    将这些数据与所有其他统计指标放在同一位置，以便于关联分析。


    986-1 CH12.qxd 5/28/08 10:06 PM 第 314 页


    **314**


    第 12 章 n 可视化应用


    • *系统属性*：这根本不是一项统计指标，而是每个 JVM 在启动时传入和设置的所有 Java 属性的快照。这有助于判断某个 JVM 的配置是否与其他 JVM
    不同。它也有助于确定特定数据快照的设置是什么。


    **深入 Terracotta 服务器内部**


    现在是解释为什么 L2 不会自动成为瓶颈的好时机。广播、刷出/缺页以及锁瓶颈这些概念，都是 L2 内部实现细节的直接结果。要完全理解这些概念，需要理解 Terracotta
    服务器的内部机制。


    SEDA


    自首次发布以来，Terracotta 就基于阶段事件驱动架构（SEDA）的原则，设计为异步工作流。SEDA 是一种概念，它将任何任务分解为其组成部分，然后通过外部工作流执行引擎在其执行生命周期中进行管理。在第
    11 章中，你了解了主/从关系，它可以用于将工作分散到 JVM 集群中。SEDA 背后的概念与主/从类似，但 SEDA 用于将工作分散到单个 JVM 中的多个线程上，其方式是每个工作阶段都不知道其前后阶段的存在。


    SEDA 由构建块组成。具体来说，队列、排水口和水龙头构成了其接口。队列代表一个工作桶。排水口代表从一个桶到另一个桶的输出连接，水龙头代表对一个桶的输入。想象一下水流经一系列桶和软管的情景。现在，设想一个
    Servlet 容器，并使用这种范式将其处理 HTTP 请求的各种内部阶段分解开来。


    基于 SEDA 的 Servlet 容器可以提供多线程 Servlet 容器的所有能力。主要区别在于，基于 SEDA 的容器不会为每个用户请求占用系统资源，而例如
    Tomcat 5.*x* 容器则会。另一方面，Tomcat 的核心开发人员在使用线程局部变量处理 HTTP 请求时，可以轻松地提供安全性和上下文管理。如果基于
    SEDA 的容器仅使用线程局部对象，则会遇到对象作用域问题，因为一个线程只完成部分工作，因此必须将其创建的对象打包，以便其他线程能够访问。


    尽管由于 SEDA 带来的解耦、异步编程的负担，它可能适合你也可能不适合你，但它绝对适合 Terracotta 服务器。该服务器不会在 JVM 中引起不必要的线程争用。它也不会随着流经系统的事务数量增加而增大规模和资源利用率。SEDA
    使得 Terracotta 服务器的延迟和吞吐量非常高效且可预测。


    将一个看似单一的任务分解成多个部分，然后将这些部分分散到多个线程上，其价值与主/从模型不同。SEDA 旨在帮助架构师以逻辑方式分解任务，以便可以将可串行化的工作阶段与可并行化的工作阶段分离开来，同时工作始终以一致的方式在并行和串行阶段之间流动。在主/从场景中我们获得并行性，而
    SEDA 可以在系统的不同阶段同时提供并行和串行执行。理解 Terracotta 服务器内部的 SEDA 工作流将有助于


