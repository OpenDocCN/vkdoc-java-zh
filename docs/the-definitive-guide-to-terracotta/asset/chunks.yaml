- fmt: '# Scalability


    *Scalability*: Distributed caches have historically scaled better than applications
    clustered using only a database by putting objects at risk (recall Figure 1-4,
    where we trade off scalability and availability) and keeping our object data only
    in memory. Having JVMs hold our objects only in memory means that we cannot eliminate
    the database, because a loss of power would otherwise imply a loss of data. Thus
    we end up in a hybrid world with clustering plus databases and their associated
    scalability issues, which is back where we started.


    By our definition, distributed caches are not transparent clustering services.
    Consider now that distributed caches are rich networking libraries where developers
    do not see network stacks and APIs, such as sockets. Because these caches hide
    the network transport, compared to TCP or UDP, distributed caches are a higher
    form of networking. The higher form is valuable, but it is neither transparent
    nor a clustering service.


    The definition of Terracotta as a transparent clustering service presented in
    this chapter is something new and worth exploring in further detail: in Chapter
    2, you will learn about the history of the concept, and in Chapter 3, we will
    dive into our first example—`HelloClusteredWorld`.


    ---


    # Chapter 2: History of Terracotta


    The galactic forces of Linux, Java, and the Internet have fundamentally changed
    application architecture, and the Java community is still trying to catch up with
    the impacts of the changes.


    Typical business applications in the past were rarely spread across servers; this
    has changed.


    Databases used to see much more than the networked SQL workload; they contained
    a significant portion of our business logic in the form of stored procedures or
    similar embedded execution technology. Today, they see mostly object-relational
    mapping (ORM) queries. Linux and the Internet have taken us down a different path
    than Oracle may have preferred.


    With the Internet came the introduction of the n-tier architecture (see Figure
    2-1). In their simplest form, enterprise applications can be viewed as either
    two-tier or three-tier. The third tier arose from the notion of the web server,
    which was first used to serve static HTML out of HTTP servers produced by vendors
    such as Apache. Eventually, this became a formal architecture paradigm involving
    presentation to users across the Internet behind a browser interface—we call the
    third tier the presentation tier for this reason.


    **Figure 2-1.** *The n-tier architecture*


    The presentation tier quite rapidly changed from presenting static HTML to serving
    as part of the application tier in delivering a dynamic application development
    platform. For many reasons, the most important of which was the ubiquity of the
    web browser, three-tier architecture began to spill from Internet to enterprise
    applications.


    For enterprises, the application tier caused a new problem. Operationally, there
    were now many requests coming in to the application tier from over the network
    (Internet, intranet, and extranet inclusive), yet the application tier was not
    scaling well. The database was a serious bottleneck. Also, application server
    stability and availability was at issue.


    The database and application tiers are capable of finite capacity for any given
    design, whereas inbound traffic to an application can be unbounded. Individual
    users and use cases could exhaust application nodes or databases at any time.
    The data and application tiers proved to be expensive to deploy and manage, because
    scalability was hard to predict and ensure.


    Architecture was shifting to a loosely coupled model wherein different components
    of the application could be abstracted behind interfaces and other components
    could ignore the implementation details. And loose coupling was accelerating the
    move toward n-tier architecture in that one service could be hosted on a completely
    different server from another without complicating the programming model.


    In Chapter 1, we discussed the notion of files and file I/O as separate and apart
    from the notion of the file server on which the file lies. The value is in the
    operational ability to scale a service without changing the application. The trade-off
    for this flexibility is that many performance bottlenecks do not show at smaller
    scales and on nonproduction configurations and therefore are uncovered only in
    production, thus making capacity planning quite challenging.


