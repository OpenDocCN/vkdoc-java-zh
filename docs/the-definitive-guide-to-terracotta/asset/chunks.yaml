- fmt: '# 排版后的内容


    - **Chapter 7, Extending HTTP Sessions with Terracotta**: You’ll learn how to
    use `Terracotta` to cluster HTTP sessions in your web application in this chapter.

    - **Chapter 8, Clustering Spring**: This chapter takes you through the process
    of turning a non-Spring clustered application into a Spring-enabled clustered
    application. It shows you how you can integrate `Terracotta` and `Spring` in a
    simple and effective fashion.

    - **Chapter 9, Integration Modules**: We show you how to use `Terracotta Integration
    Modules` to cluster an external library or framework or modularize the configuration
    of your own application in this chapter.

    - **Chapter 10, Thread Coordination**: In this chapter, we explain how to deal
    with threads and concurrency in `Terracotta`. We take a cookbook approach to give
    you a number of use case models that you can apply to your own applications.

    - **Chapter 11, Grid Computing Using Terracotta**: This chapter showcases `Terracotta`’s
    abilities to act as the platform for your own grid computing applications.

    - **Chapter 12, Visualizing Applications**: The final chapter describes how to
    tune your `Terracotta` applications using `Terracotta`’s visualization tools.


    ## Prerequisites


    To run the code in this book, you need to install the `Java Software Development
    Kit 1.4` or greater.


    ## Contacting the Authors


    For more information about `Terracotta`, visit the web site at [http://www.terracotta.org](http://www.terracotta.org).
    There, you can find forums ([http://forums.terracotta.org](http://forums.terracotta.org))
    and mailing lists dedicated to `Terracotta`, where members of the author team
    monitor and respond to queries from `Terracotta` users.


    ---


    # Chapter 1: Theory and Foundation


    ## Forming a Common Understanding


    **Terracotta** is Java infrastructure software that allows you to scale your application
    for use on as many computers as needed, without expensive custom code or databases.
    But `Terracotta` is more than this twenty-six-word definition. If you have picked
    up this book, you are looking for a deeper understanding of the technology and
    where to use it. To achieve that understanding, we must first break down the jargon
    surrounding scaling, clustering, and application architecture. In Chapter 1, we
    will spend some time defining terms and then explain the value `Terracotta` provides
    to applications. This will help us to build a shared understanding of the target
    audience of the technology.


    Applications always have a developer and operator, although sometimes one individual
    may serve in both roles. The application developer works to deliver business logic
    that functions to specifications and is responsible for all the application code.
    The operator manages the production application and works with the developer to
    make sure the application is scalable enough to handle its potential production
    workload. The two must work together if the application is going to be successful,
    meaning that it is low cost to run and stable. `Terracotta` was designed with
    both the developer and operator in mind.


    `Terracotta` was designed to free the application developer from the constraints
    of enterprise development frameworks, like `Hibernate`, `Spring`, and `Enterprise
    JavaBeans (EJB)`. Whether or not applications use these frameworks, close reliance
    on the database leads to a lack of freedom of design. While `Hibernate` and `Spring`
    strive to help the developer by greatly simplifying application code, many applications
    fall short of the promise of freedom because they are never truly decoupled from
    the database. `Terracotta` uniquely provides a complete solution for decoupling
    from the database and scaling while simultaneously writing pure plain old Java
    objects (`POJOs`).


    `Terracotta` was also designed to deliver the most stable operating platform for
    production Java applications, period. The system can be managed in a manner similar
    to databases—if you can operate a database, you can operate `Terracotta`. And
    data that `Terracotta` is managing on behalf of an application cannot be lost.
    Unlike the database however, `Terracotta` provides solutions for developing linearly
    scalable applications.


    While most clustering vendors focus on application scalability, `Terracotta` manages
    to deliver scalability in conjunction with the highest levels of availability,
    and it does all this without a database. The system also provides unprecedented
    visibility across the application stack in a single vendor solution. Specifically,
    we can now monitor applications at the operating system level, the `JVM` level,
    and the application level through a single graphical dashboard or via `Java Management
    Extensions (JMX)`. This means we can monitor not just application or application
    server performance but also hardware performance from a central location.


    The developer and operator need a simple way to scale production applications.
    To date, that way has been the database, but it tends to work only because a database
    has a large array of management tools for production operation and because its
    development model (`SQL` queries, stored procedures, and object-relational mapping)
    is widely understood. The database is not really what developers would ask for
    had we the choice however, and `Terracotta`’s founders have seen another option.
    In fact, `Terracotta`’s dual focus on developmental and operational needs did
    not come about by chance.


    `Terracotta` was born in the fires of a large-scale production Java application.
    While the business was growing by 100 percent year on year (which may not sound
    all that large until we explain that revenue was in billions of dollars), the
    platform team held itself to a standard of purchasing no new hardware after the
    first year of operation. The team came very close to meeting that goal for four
    years in a row. `Terracotta` takes lessons learned at that top-ten e-commerce
    website and significantly advances the state of the art of scalability by creating
    a general purpose extension to Java that any application can use to reap the benefits
    of simple development with simultaneously scalable and highly available production
    operation.


    Clustering was once thought of as complex and highly unstable due to sensitivity
    to individual server failure, but with the advent of `Terracotta`, clustering
    is an idea whose time has finally come. Through the pages of this book, you will
    learn `Terracotta`’s unique definition of clustering. The first four chapters
    focus on concepts and principles and the next few show how to apply `Terracotta`
    to common use cases such as clustered caching with `Hibernate`, clustering in
    `Spring`, HTTP session replication, and more.


    Once these chapters have whet your appetite, this book will transition into covering
    both detailed techniques for building powerful abstractions using `Terracotta`
    and how to tune for any and all `Terracotta` usage. Now, let’s dive into a more
    detailed definition of the technology.


    ## Definition of the Terracotta Framework


    As we’ve already stated, instead of filling your head with jargon by defining
    `Terracotta` using otherwise unclear terms, we will give a short definition and
    an explanation of the benefits of the approach. We’ll break down each term in
    that definition into plain English, so that we have a strong basis from which
    to proceed to use cases.


    *Terracotta is a transparent clustering service for Java applications*. `Terracotta`
    can also be referred to as `JVM`-level clustering. `Terracotta`’s `JVM`-level
    clustering technology aids applications by providing a simple, scalable, highly
    available world in which to run.'
