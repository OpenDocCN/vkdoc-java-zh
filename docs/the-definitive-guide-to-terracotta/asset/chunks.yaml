    \ 路由策略\n\n通过将单个工作队列拆分为多个管道，每个管道具有唯一的路由 ID，我们能够提供不同的、可插拔的路由方案，这些方案可以针对特定的用例进行定制。"
  raw: 'While we are refactoring the WorkManager, we can take the time to get rid
    of the busy wait in our waitForAll() and waitForAny() methods (which we implemented
    in the previous section). Their functionality is implemented in terms of a new
    utility method also called waitForAny() (which is useful enough to actually expose
    in our public API even though it is not part of the CommonJ specification). You’ll
    see the refactored original waitForAny() method at the end of the section.


    This method waits until at least one WorkItem has been completed and returns only
    that WorkItem. Instead of relying on a busy wait, we use wait() and notify().
    As you can see in the next code snippet, if we have a completed WorkItem in our
    set all completed work items would just return, but if the set is empty and the
    timeout is set to INDEFINITE, we will invoke wait() on the set, which will block
    until someone else calls notify() on the set (see the line in bold close to the
    end in the next code listing).


    To get this method to work, we need to make sure that each time a WorkItem is
    added to the set with all the completed WorkItem objects, we call the notify method,
    which will then notify the thread blocked at the wait() in the waitForAny() method.


    Using this utility method, refactoring the waitForAll() and waitForAny() becomes
    close to trivial. Here is the full source listing of the StaticWorkManager class:


    /**


    * A routing aware WorkerManager that uses an implementation of the Router


    * interface to do the route work to different work queues.


    */


    public class StaticWorkManager<ID> implements WorkManager {


    private final Router<ID> m_router;


    private final Set<RoutableWorkItem<ID>> m_completedWork; private int m_nrOfScheduledWork
    = 0;


    public StaticWorkManager(Router<ID> router) {


    m_router = router;


    m_completedWork = router.getAllCompletedWork();


    }


    public WorkItem schedule(final Work work, final WorkListener listener) {


    System.out.println("scheduled work #: " + m_nrOfScheduledWork++); return m_router.route(work,
    listener);


    }


