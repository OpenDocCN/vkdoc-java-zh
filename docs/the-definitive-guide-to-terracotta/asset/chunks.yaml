- fmt: '# Making this data-driven approach successful depends on providing a centralized
    view of all this information as well as on showing the appropriate information.


    The information that must be observed can be thought of as a stack of data streams.
    This stack is depicted in Figure 12-1 and is composed of the operating system
    information at the bottom to information about application objects at the top.


    **Figure 12-1.** *Measurement points for application tuning*


    In a cluster, one node could be slowing down the others. In that cluster, observing
    an individual node will show us only that it is slow, and not why. Terracotta
    concluded that the stack of information is less helpful when viewed on a JVM-by-JVM
    basis. The visualization tool and administration console are designed to help
    us correlate performance across processes.


    The visualization tool shows us all the JVMs in the cluster at once, allowing
    us to drill into any metric across JVMs or any JVM across metrics as the need
    arises.


    ## Visualization Tools and Architecture


    Terracotta provides the tools and internal architecture for gathering and managing
    performance data emanating from application JVMs as well as from the Terracotta
    server. The system is designed to gather the clusterwide data depicted in Figure
    12-1 in a single database. This strategy is useful when performance tuning applications
    before deploying into a production environment. The system provides not just visualization
    tools but also tools for taking snapshots of the cluster’s performance for offline
    analysis of production performance issues.


    Figure 12-2 depicts the architecture of the system.


    **Figure 12-2.** *Terracotta cluster visualization database architecture*


    When using the system, you have the choice to view real-time data in the visualization
    client or to ask the system to only gather data into the cluster database inside
    the Terracotta server. In either mode, the system records all the data in its
    central database and can export the records in a comma-delimited format for transfer
    to other developers or even to Terracotta engineers during offline analysis.


    The data that the Terracotta server gathers is also streamed via JMX to any tool
    of your choice. Just as Terracotta’s server and visualization client can manage
    and display performance data, so too can your existing monitoring and management
    tools.


    **Tip** In fact, in order to gather statistics at the operating system level,
    Terracotta uses a plug-in from Hyperic ([http://www.hyperic.com/](http://www.hyperic.com)).
    Hyperic offers an excellent example of a monitoring framework through which Terracotta
    can be managed.


    Now that you understand the system architecture, let’s build an application that
    exhibits performance problems and discover its problems together, using the visualization
    tools in the kit.


    ## The Sample Inventory Application


    The application we will use to learn about visualization is included in the Terracotta
    kit. The inventory application is located in the following directory on Unix:
    `$TC_HOME/samples/pojo/inventory`


    or this one on Windows


    `<drive>:\$TC_HOME\samples\pojo\inventory`


    The application was initially designed to illustrate anemic domain modeling in
    a clustered environment. Anemic domain models are those where the tools and frameworks
    restrict freedom of expression of the Java language. The restriction usually is
    embedded in the marshalling of POJOs to and from clustering, messaging, or database
    infrastructure. Terracotta users do not suffer the pitfalls of anemic domain modeling,
    because the service is transparent.


    The inventory application illustrates freedom in modeling by representing the
    data inside a store in a manner that is well suited to supporting two different
    use cases. The first use of the inventory application’s data is in selling products
    to consumers. An inventory system must track the quantity on hand for every item
    the store sells. The second usage of the data is in merchandizing products that
    are related in one way or another. The domain model is captured in Figure 12-3.


    **Figure 12-3.** *Inventory application schema*


    The domain model enables the application to efficiently update items by ID, named
    Stock Keeping Unit (SKU) numbers in retail terminology. When the retailer buys
    more basketballs, for example, the warehouse must receive the goods against the
    SKU. In this domain model, the warehouse worker needs to enter the SKU of the
    basketballs, and then the system can look up the SKU as a key in the inventory
    `Map`. The worker can then ask the system to update the quantity available for
    sale to reflect the new stock received into the warehouse. Storing the inventory
    in a map makes sense, because there are many uses where the product will be accessed
    by its SKU.


    Simultaneously, the e-commerce web site that fronts this example needs to convince
    web users to buy products. This task, referred to as merchandizing, might have
    the business deciding to sell basketballs as toys and sporting goods simultaneously.
    Thus, the basketballs need to be represented in a navigational tree or hierarchy
    of some sort. Ideally, the basketball items could be stored in the map and simultaneously
    in the tree so that, when the price changes, the application uses the SKU to update
    the price on the web site automatically.


    The inventory application is focused on illustrating the freedom of domain modeling
    inherent to the Terracotta approach to scale out. As a result, the application
    can do only two things. We can change the price of products in the map, and we
    can also ask the system to display the merchandizing hierarchy under which this
    fictitious store is selling its products.


    The application runs at the command line, which is ideal for the purpose of tuning
    and visualization. We can make a few changes to the application and end up with
    a system for changing different objects across JVMs or changing the same objects.
    We can make these decisions at run time and, thus, will have the flexibility to
    test the various scenarios under which Terracotta performs well or not so well.


    ## Modifying to Generate Load


    What makes this application interesting is that we can easily extend it to generate
    interesting workload for the Terracotta server. The best way to do this is provide
    a way to have many JVMs mutating the same object at the same time, versus different
    objects at the same time. Our hope is to end up with a system where changing different
    objects delivers linear scale, while changing the same object causes bottlenecks.
    If the tools work, we will be able to visualize good or poor parallelism, depending
    how we run the system.


    Before we change the application, let’s first review the structure of the application
    on disk.


    As with all Terracotta samples, the `samples/pojo/inventory` directory comes with
    the tools to run the sample as well as recompile it when we want to make changes.


    You can use `ant` and the file named `build.xml` in this directory to compile
    the application once we make changes. The script named `run.sh` (or `run.bat`
    on Windows) is used to start and stop the application. The file named `tc-config.xml`
    contains the root and lock definitions needed to run the inventory application
    inside Terracotta. The directory named `classes` contains the compiled application,
    and the directory named `src` contains the Java files we will now modify.


    The package name is `demo.inventory`, so there are two directories nested inside
    `src`.'
