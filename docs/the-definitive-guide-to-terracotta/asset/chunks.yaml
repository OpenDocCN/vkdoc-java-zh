    **When Not to Use the Master/Worker Pattern**


    In working with large-scale use cases in financial services and telecommunications
    industries, we have developed best practices around where Terracotta is most effective
    and, additionally, where the Terracotta Master/Worker approach should not be used.
    The two biggest cautions for developers are around rogue clients and WAN load
    balancing. Because Terracotta is an extension of your application memory, the
    Master/Worker pattern is focused on somewhat uniform large grids of servers in
    reasonably close proximity to each other.


    Rogue clients were first a demonstrable problem when a Terracotta developer built
    a distributed cache where some nodes in the cluster were servers in a data center
    while others were end users’ laptops. When the laptops were shut down for the
    day, the cluster would stop


