- fmt: 'The next fastest scenario is when roots are not separate yet the object that
    the test pounds is different in each JVM. When one JVM pounds on the price of
    the camera tripod, while the other pounds on the USB mouse, the cluster delivers
    about 10,000 updates per second as opposed to about 12,000 in the previous scenario.
    So we can conclude that locality was automatically in play under this scenario
    just as in the first, simply by keeping the JVMs from touching the same objects.
    This conclusion is also important. It is not necessary to separate JVMs at a root
    level. Just make sure the JVMs do not lock on and update the same objects, and
    as this exercise proves, the system will automatically make parallel updates and
    localize the objects as appropriate.


    The remaining two scenarios (which we ran first) are slowest by far. Pounding
    on the same product produces about 800 transactions per second, and pounding on
    random products produces about 500 transactions per second. As we have stated,
    when we pound on one product in both JVMs, Terracotta invokes special greedy algorithms
    that allow each JVM to keep the lock for a long time. When accessing all objects
    randomly, no optimization is in play, and thus, all updates are broadcast between
    the two JVMs.


    Now, go back to your test environment, and restart the `inventory.pounder` application
    with shared roots:


    ```

    > ./run.sh

    ```


    In the administration console, select “Lock profiler” (see Figure 12-15), and
    run the two pounders.


    **Figure 12-15.** *Select the Lock profiler*


    Run `poundRandomProducts()` and `poundOneProduct()`. Use a single product when
    running `poundOneProduct()`, such as `1GFR`. In the lock profiler screen, while
    the tests are running, keep clicking the Refresh button and switching between
    the Clients and Server views. The Clients view shows how many times the JVMs lock
    and unlock your objects with or without talking to Terracotta. The Server view
    shows how many times the server was involved in a lock request. As in Figure 12-16,
    the administration console shows us that locking inside `poundRandomProducts()`
    leads to almost as many hops as lock requests. For a lock to hop, it has to be
    reclaimed from


    ![Image 30](index-344_1.png)


    ![Image 31](index-344_2.png)


    one JVM to hop over to another. This means the network and the Terracotta server
    are slowing down the application, because each JVM blocks on operations in the
    other.


    **Figure 12-16.** *Illustrating the lock hopping problem for `poundRandomProducts()`*


    When running `poundOneProduct()`, we can see that the lock hops far fewer times
    than it was requested. In Figure 12-17, the system is granting locks approximately
    four times before reclaiming the lock to hand to the other JVM.


    **Figure 12-17.** *Illustrating greedy locks underneath `poundOneProduct()` for
    `1GFR`*


    You have just seen everything needed to understand what makes each `inventory.pounder`
    scenario fast or slow. The visualization tool can be used not just to see transactions
    per second and SEDA queue depths but broadcast rates, disk I/O, and more. The
    power of seeing all the data in a single place comes from the fact that a slowdown
    in one metric might be correlated to a high count of updates in another metric.
    For example, you should be able to use these tools to prove to yourself that bad
    garbage collection tuning leads to clusterwide slowdowns when one JVM pauses inside
    garbage collection when it was supposed to be acknowledging object broadcasts.


    ## Managing Production Environments


    The visualization tools and administration console are all designed with production
    application monitoring in mind. No tuning has been done, however, to make this
    safe. Terracotta has, instead, made every monitoring point an option. You can
    decide to monitor locking or not. You can decide to monitor transaction rates,
    garbage collection, or what have you. You can decide on the sample rate as well.


    The safest way to set up the system for a production environment is to turn off
    all monitoring, run load at your application, and observe the transaction rate
    as reported by the Terracotta server in the administration console. Next, start
    turning on snapshot details and lock profiling details, and observe how much throughput
    is lost. Tune the sample rates and the data that is gathered until you strike
    an acceptable balance of loss in throughput versus increased visibility.


    Note that all metrics gathering can be started and stopped through JMX events.
    This means that you can choose to gather no data at all and monitor only the default
    data such as the transaction rate. When the transaction rate dips or increases
    beyond expected thresholds, you can use a monitoring framework (like Hyperic)
    to issue a JMX event to Terracotta to instantaneously start recording more data.


    You should do lots of testing with metrics on, off, and at increased and decreased
    rates, all under load. Observing a running system can, in fact, exacerbate performance
    problems, so the more you automate, the more you should validate that automation
    is safe.


    All these graphical tools can be run on the developer’s desktop. Run statistics
    snapshots. Then export them to zip files on the Terracotta server, and secure
    copy (SCP) or otherwise transfer the files to your desktop computer. After that,
    import the data into the visualization tools instead of retrieving the data from
    the running, production L2 as we did in this chapter thus far. As for the administration
    console, it is a Swing tool and can be run from your desktop, connecting over
    TCP to the Terracotta server. For most people, this option works fine, but when
    you have a slow network from your desktop to a production environment where the
    Terracotta server is running, consider running a virtual network computing (VNC)
    or remote desktop tool of some sort near your production Terracotta server. The
    administration console then runs over the local network, and only the graphical
    display data traverses the slow network back to your desktop.


    ## Summary


    Visualization is a powerful concept that has been leveraged for years inside profiling
    tools. When brought to bear against the problem of tuning and managing a clustered
    application that is spread across processes and machines, visualization might
    be the only way forward.


    Terracotta provides transparent clustering, which means that much of your performance
    tuning work can be delivered at a unit level using traditional profilers. At some
    point, however, seeing and understanding what Terracotta is doing behind the scenes
    becomes important. To that end, we developed the `inventory.pounder` application
    in this chapter. However, the `inventory.pounder` application you built, ran,
    and analyzed in this chapter was not meant to dictate a rigid way for seeing what
    Terracotta is doing. Rather, it was meant merely to illustrate the concept of
    pounding your application in a test environment with Terracotta’s monitoring tools
    turned on and gathering data.


    Not only did you learn how to pound on an application and observe and measure
    the Terracotta inner workings, you learned about some of the internal details
    and how bottlenecks can occur. If we were to establish any rules of thumb in this
    chapter, those rules would include the need to profile locks. Never assume greedy
    locks are or are not working. Confirm, using the administration console, that
    lock acquisition does not require the network. Study transaction rates and broadcast
    rates. Also study system-level resources such as disk I/O, CPU utilization, heap
    utilization, and garbage collection activity.'
