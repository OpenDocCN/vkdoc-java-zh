    \n---\n\n# 使用Terracotta进行网格计算\n\n**主/从模式**是最著名且最常见的并行化工作模式之一，它也是网格计算的核心模式之一，以至于大多数网格启用技术或多或少都可以被视为该模式的工业实现。在本章中，我们将解释该模式的特征，介绍一些可能的实现策略，并思考所有这些热议背后的真正含义。我们将简要讨论网格的真正意义，以及它们如何使用主/从模式来解决非常具有挑战性的现实世界问题。我们还将逐步向您展示如何使用Terracotta实现一个非常可扩展且高性能的网格风格数据处理和工作负载管理框架。到本章结束时，您将拥有一个在Terracotta上运行的自己的网格。用例将引导您手动构建一个分布式网络爬虫。最终的系统将能够在任意数量的JVM上运行，按照您的意愿深度爬取任何网站（例如，跟踪四层HREF链接），并将该网站上的所有网页存储到您的Terracotta网格中。\n\
    \n## 什么是网格？\n\n网格是一组服务器，它们共同创建一个大型机级别的处理服务，在该服务中，时间敏感的操作可以在操作系统级别配置为遵守业务服务级别协议（SLA）。在大型机中，任务可以启动、停止、暂停并在硬件之间迁移。在网格中，数据和操作可以无缝地在网格中移动，以优化当前计算任务的性能和可扩展性。\n\
    \n网格通过利用引用局部性进行扩展，并通过有效使用数据复制实现高可用性。它将数据管理与数据处理相结合。\n\n### 计算网格 vs. 数据网格"
  raw: 'The main() method uses a shared AtomicInteger as a counter of the number of
    JVMs that have joined. If the counter value is zero, this is the first JVM to
    join the cluster and is, therefore, assigned the queue reader/printer function.
    The first JVM performs the initialization task of instantiating the shared queues
    and adding them to the shared queue list. For each queue, it spawns a reader thread
    and creates an associated QueueReader object. The QueueReader is a Runnable, so
    when its thread is started, the QueueReader.run() method will get called. The
    QueueReader.run() method simply enters into a while loop, taking from the queue
    and printing the result to System.out.


    Subsequent invocations of the example will be assigned one of the seven colors,
    again based on the value of the AtomicInteger counter. The main() method will
    choose the appropriate message queue for its color and invoke the run() method
    on an instance of the example class. This run() method simply enters a while loop,
    wherein it picks a mood at random from the available MOODS array, reports its
    mood by adding a message object to the queue, and sleeps for one second. Adding
    a message object to the shared queue will cause the thread in the first JVM, which
    is blocked trying to take from that queue, to remove the message object from the
    queue, print the message, and return to the queue to block on take() until another
    message arrives on that queue.


