    接口。如果应用程序调用 put(key, value)，之后可以调用 get(key) 来获取值的副本。修改后的应用程序将类似于以下伪代码（差异部分以粗体显示）：


    public class HelloClusteredWorldWithAnAPI {


    private static final String message = "Hello Clustered World!"; private static
    final int length = message.length();


    private static final char[] buffer = new char [length];


    int loopCounter;


    public static void main( String args[] ) throws Exception{


    while( true ) {


    // 线程级协调不再有价值


    // synchronized( buffer ) {


    **// 从集群获取最新版本**


    **// 注意：需要反序列化**


    **buffer = cluster.get( "HelloClusteredWorldBufferID" );**


    **// 不能信任 loopCounter，因为它不是集群对象**


    **// int messageIndex = loopCounter++ % length;**


    **// 改为根据当前长度驱动索引**


    **int messageIndex = buffer.length;**


