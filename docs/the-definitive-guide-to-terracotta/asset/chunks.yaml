    Java 运行时环境之所以受到青睐，部分原因在于该语言提供了相当快速的开发周期。另一个原因是它能够兑现“一次编写，随处运行”的承诺。Terracotta 则将这一承诺向前推进了一步，主张将应用程序分布到多个
    JVM 上应是一个运行时决策。使用 Terracotta，开发者可以避免硬编码的集群技术。因此，运维团队可以决定是使用一台配备 12 GB 内存的八核 CPU
    机器，还是八台各配备 2 GB 内存的双核机器。


    第 4 章将把第 3 章介绍的概念和术语提升到一个新的高度；到本章结束时，你将能够对任何自己编写的 POJO 进行集群。从第 5 章开始，我们将利用 POJO
    集群背后的核心概念，对 Hibernate 和 Spring 等流行框架内部的对象进行集群。


