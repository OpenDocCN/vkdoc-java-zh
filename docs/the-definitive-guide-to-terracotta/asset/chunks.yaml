  trans: '

    通过这个示例可以看到，使用 Map 作为缓存来构建单机虚拟机应用，然后通过应用一些外部配置，利用 Terracotta 对该应用进行集群或分布式部署，是相当容易的。在许多应用中，这种基本技术足以构建分布式共享数据结构。而在其他情况下，你可能需要一个具有更复杂行为、缓存淘汰策略等的缓存，这时你可以使用集成了
    Terracotta 的流行开源缓存框架。


    986-1 CH05.qxd 5/31/08 8:56 AM 第 112 页


    **112**


    第 5 章 n 缓存


    **使用 Map 进行缓存**


    JDK 提供了一系列 Map 实现，供你在创建应用时选择。本节将探讨在 Java 和 Terracotta 中可用的选择以及各种权衡。


    **未排序的 Map**


    在 JDK 中，未排序的 Map 实现包括 `Hashtable`、`HashMap`、`LinkedHashMap` 和 `ConcurrentHashMap`。


    • `Hashtable` 是一种遗留数据结构，在最初的 JDK 中提供，早于现代 Java 集合 API。它应被视为 JDK 中已弃用的部分，不建议使用。


    • `HashMap` 是最常用的 Map 实现。它是非同步的，因此在没有外部同步的情况下，不应在并发（或分布式）代码中使用。`HashMap` 将其值存储在一个大型表中。当内部表更新时，必须为所有用户锁定它。这种全局锁定常常会成为性能瓶颈。Terracotta
    为 `HashMap` 提供了出色的支持，但在跨集群更新时也会面临同样的锁定瓶颈。


    • `ConcurrentHashMap` 通常是使用 Terracotta 共享 Map 时的最佳选择。`ConcurrentHashMap` API 专为并发使用而设计。该实现使用内部锁定，因此对
    Map 的调用不需要外部同步来保证安全。在内部，数据被分割到多个表（也称为段）中，每个段可以单独锁定。无论是在日常 Java 使用中还是与 Terracotta
    配合使用时，这通常都能在并发使用下提供比普通 `HashMap` 好得多的性能。


    • `LinkedHashMap` 基本上是一个 `HashMap`，但增加了一个贯穿条目的双向链表。该链表通常用于跟踪插入顺序，尽管它也可以用于跟踪 Map
    中条目的使用情况。这种额外的能力使得将 `LinkedHashMap` 转变为具有 LRU（最近最少使用）缓存淘汰语义的缓存变得容易。在撰写本文时，Terracotta
    不支持 `LinkedHashMap`。


    `Collections.synchronizedMap()` 方法可用于将非同步的 Map（如 `HashMap` 或 `LinkedHashMap`）包装成一个同步的线程安全包装器。默认情况下，Terracotta
    不会对此方法返回的同步 Map 对象提供自动锁定，这让你在分布式锁粒度方面拥有更多自由。你可以通过使用本章后面讨论的自动锁定集合 Terracotta 集成模块，为同步包装器集合和遗留集合（如
    `Hashtable` 和 `Vector`）添加锁定支持。


    **已排序的 Map**


    JDK 还提供了一个用于已排序 Map 的接口（`SortedMap`），由 `TreeMap` 实现。Terracotta 完全支持此实现（其底层是树形数据结构），但未排序的
    Map 的 `get()` 和 `put()` 操作比 `TreeMap` 更快。这与常规 Java 中 `TreeMap` 和 Map 的 `get()`
    和 `put()` 的相对性能是一致的。性能较慢是因为数据存储在一棵树中，该树必须在 `put` 和 `remove` 操作时进行平衡，并在 `get` 操作时进行遍历。


    986-1 CH05.qxd 5/31/08 8:56 AM 第 113 页


    第 5 章 n 缓存


    **113**


    `Collections.synchronizedSortedMap()` 方法可用于将非同步的 `SortedMap`（如 `TreeMap`）包装成一个同步的线程安全包装器。默认情况下，Terracotta
    不会对此方法返回的同步 Map 实例提供自动锁定，这让你在分布式锁粒度方面拥有更多自由。同样，你可以通过使用自动锁定集合 Terracotta 集成模块来添加锁定支持。


    `ConcurrentSkipListMap` 是在 Java 6 中添加的，它提供了一个高性能的并发已排序 Map 实现。然而，它是使用无锁算法实现的，这些算法更难有效地移植到分布式实现中。Terracotta
    目前还不支持 `ConcurrentSkipListMap`。


    **自动锁定集合**


    在使用 Terracotta 共享集合时，获得卓越性能的关键之一是优化锁定。Terracotta 提供了多种锁级别，在只需要读锁的情况下，使用分布式读锁可以极大地提高性能。


    默认情况下，同步集合不会应用 Terracotta 锁定，这样你的应用可以自由决定锁定对同步集合访问的最佳方式。


    如果你希望提供与普通同步集合相同粒度的锁定，Terracotta 提供了一个用于自动锁定集合的 Terracotta 集成模块（TIM），它可以实现这一点。


    可用的自动锁定集合如下：


    • `tim-vector`：自动锁定 `java.util.Vector`


    • `tim-hashtable`：自动锁定 `java.util.Hashtable`


    • `tim-synchronizedcollection`：自动锁定从 `java.util.Collections.synchronizedCollection()`
    返回的集合


    • `tim-synchronizedmap`：自动锁定从 `java.util.Collections.synchronizedMap()` 返回的集合


    • `tim-synchronizedset`：自动锁定从 `java.util.Collections.synchronizedSet()` 返回的集合


    • `tim-synchronizedsortedmap`：自动锁定从 `java.util.Collections.synchronizedSortedMap()`
    返回的集合


    • `tim-synchronizedsortedset`：自动锁定从 `java.util.Collections.synchronizedSortedSet()`
    返回的集合


    这些自动锁定集合模块中的每一个都会在同步集合上适当地指定读写锁定。例如，从自动锁定的同步 Map 中获取一个条目将获得一个集群读锁，而 `put()` 操作将获得一个集群写锁。这将通过减少读取所需的排他锁来提高性能，从而允许集群中有多个并发读取者。


    986-1 CH05.qxd 5/31/08 8:56 AM 第 114 页


    **114**


    第 5 章 n 缓存


    下载并安装自动锁定集合 TIM


    要使用自动锁定集合 TIM，你首先需要从 Terracotta Forge 网站 [`forge.terracotta.org`](http://forge.terracotta.org)
    下载并安装它。


    n**注意** 安装模块有多种方式，取决于你是想从源码还是二进制文件安装，以及你是想将模块加载到你的 Terracotta 安装目录中还是你自己的本地仓库中。对于这个示例，我们假设你将下载二进制形式并将其安装到你的
    Terracotta 安装目录中。更多信息，请参见 Terracotta Forge 网站或第 9 章。


    要下载 tim-collections 版本 2.0.1 的二进制发行版，请执行以下命令：


    $ curl -o tim-collections-2.0.1-bin.zip \


    [`forge.terracotta.org/\`](http://forge.terracotta.org/\)


    projects/tim-collections/downloads/tim-collections-2.0.1-bin.zip


    此命令将下载一个包含多个 JAR 文件的 zip 文件，每种集合类型对应一个 JAR。


    要解压并将这些 JAR 安装到你的 Terracotta 安装目录中，请使用以下命令： $ unzip tim-collections-2.0.1-bin.zip


    $ cd tim-collections-2.0.1


    $ cp *.jar ${TC_INSTALL_DIR}/modules


    这样就完成了自动锁定集合 TIM 的安装。现在它们可以在任何 Terracotta 安装中单独或一起使用。


    使用自动锁定集合

    '
- fmt: "# 安装自动锁定集合\n\n要在您自己的项目中安装自动锁定集合 TIM，请将其添加到模块部分，如清单 5-3 所示。\n\n**清单 5-3.**\
    \ *在 Terracotta 配置中加载同步集合*\n\n```\n<tc:tc-config xmlns=\"http://www.terracotta.org/config\"\
    >\n  <clients>\n    <modules>\n      <module name=\"tim-synchronizedcollection\"\
    \ version=\"2.0.1\" />\n    </modules>\n  </clients>\n</tc:tc-config>\n```\n\n\
    虽然自动锁定集合是获取对同步集合进行适当集群锁定的一种简单方法，但您可能希望在应用程序级别提供自己的锁定，以便复合操作（例如对集合（无论是否同步）进行多次相关的`get()`调用）能够被适当地锁定。在这种情况下，您不应使用自动锁定集合模块，而应在\
    \ Terracotta 配置中显式指定锁定。\n\n## 批量加载 Map\n\n使用共享 Map 的一个特殊情况是批量加载，即需要一次性向 Map 中添加大量项目，例如在初始化缓存时。通常，对\
    \ Map 的每次`put()`方法调用都会定义一个独立的事务，但通常在执行批量加载时，使用更宽的事务范围更为可取。这可以更好地利用带宽并最小化锁定。\n\n\
    为了处理这种情况，建议将`Map`实现包装在您自己的类中，并在该类上以更粗的粒度提供锁定。通常，您会发现使用非常细粒度的加载（为每个缓存项调用`put()`）会因事务数量过多而导致性能不佳。另一方面，在单个`putAll()`调用周围使用单个同步块可能会提供更好的性能，但存在因单个事务过大而导致内存溢出的风险。通常，在批量调用`put()`时可以看到最佳性能，这结合了更粗的粒度和内存安全性。\n\
    \n> **提示** Terracotta 可以批处理并更改事务的顺序，而不会违反 JVM 的预期行为。因此，某些应用程序会发现 Terracotta 在管理细粒度更新和对象更改方面速度很快，无需手动批处理`put()`调用。\n\
    \n另一个值得考虑的方面是并发性。使用`putAll()`或批量调用`put()`将减少总体 I/O 并提高性能，但也会通过使用更粗粒度的锁范围来降低并发性。理解最佳权衡点取决于您的应用程序，并应基于实验来确定。\n\
    \n清单 5-4 展示了一个`Cache`类，它包装了一个`Map`，并提供了一个批量加载的方法（可以指定批量大小）。请注意该方法中的`synchronized`块，它仅为每批`put`操作创建一个锁。通过改变批量大小，您可以改变发生的事务的大小和数量。\n\
    \n**清单 5-4.** *批量加载 Map*\n\n```java\npackage org.terracotta.book.caching.batch;\n\
    \nimport java.util.ArrayList;\nimport java.util.HashMap;\nimport java.util.List;\n\
    import java.util.Map;\n\npublic class Cache<K, V> {\n    private final Map<K,\
    \ V> data = new HashMap<K, V>();\n\n    // ... other methods like get and put\n\
    \n    public void putAllBatched(Map<K, V> entries, int batchSize) {\n        List<Map.Entry<K,\
    \ V>> entryList = new ArrayList<Map.Entry<K, V>>(\n                entries.entrySet());\n\
    \        int itemCount = entries.size();\n        int batchStart = 0; // first\
    \ index of current batch\n\n        while (batchStart < itemCount) {\n       \
    \     int batchEnd = batchStart + batchSize;\n            if (batchEnd > itemCount)\
    \ {\n                batchEnd = itemCount;\n            }\n\n            synchronized\
    \ (this) {\n                for (int i = batchStart; i < batchEnd; i++) {\n  \
    \                  Map.Entry<K, V> entry = entryList.get(i);\n               \
    \     data.put(entry.getKey(), entry.getValue());\n                }\n       \
    \     }\n\n            batchStart = batchEnd;\n        }\n    }\n}\n```"
  raw: 'To install the autolocked collections TIM in your own project, add it to the
    modules section as shown in Listing 5-3.


    **Listing 5-3.** *Loading Synchronized Collections in the Terracotta Configuration*


    [<tc:tc-config >](http://www.terracotta.org/config)


    <clients>


    <modules>


    <module name="tim-synchronizedcollection" version="2.0.1" />


    </modules>


    </clients>


    </tc:tc-config>


    While autolocked collections are an easy way to get proper clustered locking for
    access to a synchronized collection, you may wish to provide your own locking
    at the application level


    986-1 CH05.qxd 5/31/08 8:56 AM Page 115


    C H A P T E R 5 n CACHING


    **115**


    so that composite operations such as making multiple related calls to get() against
    a collection (synchronized or not) can be locked appropriately. In that case,
    you should not use the autolocked collection modules and should instead specify
    the locking explicitly in your Terracotta configuration.


    **Bulk Loading a Map**


    One special case for using shared maps is bulk loading, where a large number of
    items need to be added to a map at once, for instance, when priming a cache. Normally,
    each put() method to a Map would define an independent transaction, but generally,
    it is desirable to use a much wider transaction scope when performing a bulk load.
    This makes better use of bandwidth and minimizes locking.


    To handle a scenario like this, it is advisable to wrap the Map implementation
    in your own class and provide locking on that class at a coarser granularity.
    Generally, you will find that using very fine-granularity loading (calling put()
    for every cache item) will yield poor performance due to the large number of transactions.
    At the other end of the scale, doing a single synchronized block around a single
    putAll() call is likely to give much better performance at the risk of causing
    out of memory errors from having one very large transaction. Generally, the optimal
    performance is seen when batching put() calls, giving a combination of coarser
    granularity with memory safety.


    n**Tip** Terracotta can batch and change the order of transactions without violating
    the expected behavior of the JVM. As a result, some applications will find that
    Terracotta is fast at managing fine-grained updates and object changes without
    manually batching put() calls.


    Another interesting aspect to consider is concurrency. Using putAll() or batching
    put() calls will reduce overall I/O and improve performance but will also reduce
    concurrency by using a coarser-grained lock scope. Understanding the best trade-off
    point will depend on your application and should be determined based on experimentation.


    Listing 5-4 shows a Cache class that wraps a Map and provides a method to bulk
    load in batches (batch size can be specified). Note the synchronized block in
    this method that creates a lock just around each batch of put operations. By varying
    the batch size, you can vary the size and number of transactions that occur.


