    是 `int` 类型，因此偏移量为 4。`playWithMemory()` 方法的参数会被复制到我们的实例 `this` 中，从而造成一次 4 字节的堆写入。


    下一行代码转化为一次堆内存读取。同样，读取操作发生在实例中存储 `i` 的 4 字节偏移处。`i` 的值被复制到名为 `j` 的栈变量中。随着应用程序逻辑的运行，堆访问实际上在
