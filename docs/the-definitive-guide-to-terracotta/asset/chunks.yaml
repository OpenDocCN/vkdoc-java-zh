- fmt: '# Terracotta Roots and Clustered Objects


    ## Roots


    - The first time a root is assigned by a JVM (which assigns it for the lifetime
    of the cluster), the root is created in the Terracotta cluster, and the object
    graph of the object assigned to the root field becomes the object graph of that
    logical root.

    - Once assigned, the value of a root field may never be changed. After the first
    assignment, all subsequent assignments to fields declared to be that root are
    ignored. If a root is a Terracotta literal (more on literals later), the value
    of the primitive may be changed, but if the root is an object, the reference to
    that object may not be changed.

    - The top-level object that represents the root object will never be collected
    by the Terracotta distributed garbage collector.


    Because roots are durable beyond the scope of a single JVM’s life cycle, they
    are sometimes called *superstatic* (that’s just a name the creators of Terracotta
    made up). Static field references have the same life cycle as the classes they
    are declared in. Roots, which are superstatic, have the same life cycle as the
    virtual heap. This is true no matter what the scope modifier of the root field
    is. If a static field is declared to be a root, that static field will assume
    a superstatic life cycle.


    Likewise, if an instance field is declared to be a root, that instance field will
    assume the same superstatic life cycle. This can have a significant effect on
    code written with respect to root objects and can cause some astonishment if the
    behavior of Terracotta with respect to roots is not well understood.


    While the reference of the root field itself cannot be changed, the object graph
    of that root object can. Typically, data structures like `Map`, `List`, and other
    `Collection` objects are chosen as root objects—although any portable object can
    be declared a root (more on object portability later). While the assignment of
    a `Map`, say, to a root field cannot be changed, the contents of that `Map` may
    be changed.


    ## Clustered Objects


    As we just mentioned, when a root field is first assigned, the Java object assigned
    to that field and all objects reachable by reference from that object become clustered
    objects. When an object becomes clustered, all of its field data is collected
    and stored in the Terracotta virtual heap. That object is also assigned a clusterwide
    unique object ID that is used to uniquely identify the object in the Terracotta
    virtual heap (and is, in fact, the key under which that object’s data is stored
    in the disk-backed object store in the Terracotta server). At the appropriate
    time, all of this object data is sent to the Terracotta server, and thereafter,
    it is managed by Terracotta as a clustered object.


    An object’s data is composed of the values of that object’s reference fields and
    its literal fields. Reference fields are references to other Java objects. The
    value of reference fields is the clusterwide object ID of the object that field
    refers to. Literal fields are those fields of an object that aren’t reference
    fields—that is, fields whose type is not treated by Terracotta as an object.


    A Terracotta literal is similar to (but not exactly the same as) a Java primitive.
    They include the Java primitives as well as other types that are treated specially
    by Terracotta.


    An object becomes clustered when it becomes referenced by any clustered object,
    unless that reference is transient (more on transience later). In fact, just like
    when a root is created, when an object becomes clustered, its entire object graph
    is traversed and all of its non-transient references are transformed into clustered
    objects. In that sense, root creation is a special case of clustered object creation.
    Once an object becomes clustered, it is always a clustered object and survives
    on the virtual heap until it becomes garbage collected by the Terracotta distributed
    garbage collector in the Terracotta server.


    ### A Note About ClassLoaders


    In Java, the identity of an object’s class is tied to its `ClassLoader`. A class
    loaded by one `ClassLoader` is not the same as a bytecode-identical class loaded
    by a different `ClassLoader`. This means that an object instantiated in one `ClassLoader`
    context is not actually an object of the same class as an object instantiated
    in another `ClassLoader`. Even though their classes seem identical, they are actually
    objects of different classes. There is guaranteed to be one and only one instance
    of a particular clustered object per `ClassLoader` per JVM.


    This has the side-effect that clustered objects are tied to the `ClassLoader`
    in which they were created and cannot cross `ClassLoader` boundaries. For example,
    a clustered object created in the context of the default `ClassLoader` in one
    JVM cannot be instantiated in the context of the `ClassLoader` of a web application
    (in most containers, each web application has its own `ClassLoader`; this allows,
    among other things, the dynamic reloading of JSP classes, for example). An attempt
    to instantiate Terracotta objects in a `ClassLoader` context different from that
    in which they were created will result in a `ClassCastException`.


    ## Virtual Heap and Memory Management


    The content of the Terracotta virtual heap is the set of all shared objects extant
    in the cluster. Because the virtual heap’s state (i.e., the current values of
    every clustered object’s fields) is managed by the Terracotta server, the Terracotta
    client libraries running in your application JVMs are free to manipulate the physical
    heap in the client JVMs. This means that not every object on the virtual heap
    needs to be instantiated in any JVM. Terracotta can load an object from the server
    automatically as it is needed by your application. When you traverse a reference
    to a clustered object that isn’t currently instantiated on the local physical
    heap, Terracotta will automatically request that object’s data from the Terracotta
    server, instantiate it on the local heap, and wire up the reference you are traversing,
    and your application will be none the wiser.


    Likewise, Terracotta can artificially add null references to clustered objects
    as memory pressure increases, which lets arbitrarily large clustered object graphs
    fit within a constrained physical heap space. This ability to flush and fault
    objects to and from the Terracotta server is the *virtual* part of the Terracotta
    virtual heap. Just like the virtual memory subsystem of a modern operating system
    swaps the contents of physical memory back and forth between disk and RAM, letting
    the programs on your computer behave as if they had unlimited physical memory,
    the Terracotta virtual memory subsystem lets your application behave like it has
    an unlimited physical Java heap.


    ## Distributed Garbage Collection


    The Terracotta server has a distributed garbage collector that will remove clustered
    objects that are no longer referenced. This happens so the virtual heap doesn’t
    fill up the disk under the Terracotta server with object data that is no longer
    needed. In order for a clustered object to be eligible for garbage collection,
    it must not be reachable from any root (i.e., must not be part of a root’s object
    graph), and it must not be resident in the heap of any client JVM. When the distributed
    garbage collector finds objects that are eligible for collection, it removes them
    from the server and from the server’s persistent storage.


    ## Managing Object Changes and Coordinating Threads


    Just like objects shared between threads in a single JVM, access to Terracotta
    clustered objects by threads in different JVMs must be coordinated so that threads
    don’t unexpectedly overwrite each other’s changes and so that changes are reliably
    applied where they need to be. To do this, Terracotta takes further cues from
    the existing architecture of the JVM.'
