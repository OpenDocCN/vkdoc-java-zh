    is the garbage collector. The application makes assumptions about the presence
    of a garbage collector inside the JVM and thus never attempts to call delete()
    at some point after calling new(), as we would in C++. Counter examples to transparent
    services are Hibernate and Spring. While both are mostly transparent, their behavior
    is controlled as much by source code integration as by


