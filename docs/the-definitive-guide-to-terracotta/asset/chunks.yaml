    **Clustering Requirements for the Example**


    Out of the box, this code works fine in the context of a single JVM. Multiple
    threads interact with Catalog, Product, ShoppingCart, Customer, and Order objects
    as simple POJOs and can coordinate with each other, if need be, using standard
    Java library java.util.concurrent classes, namely CyclicBarrier.


    If this were more than just a sample application, however, we would want to deploy
    it on at least two physical servers for high availability with the option to add
    additional servers for scalability as usage increases over time. Adding servers
    causes a number of requirements to emerge that don’t exist in the single JVM deployment
    scenario:


    • All active shopping carts should be available in all JVMs, so a browsing customer’s
    requests can be sent to any of the servers without losing the items in that customer’s
    shopping cart.


    • A view on all the active carts will require access to all active carts in every
    JVM.


    • Thread interaction expressed in the example code by using CyclicBarrier must
    be extended to threads in multiple JVMs.


    If the Catalog data becomes large enough, it might not fit comfortably in RAM.
    It could be retrieved as needed from the product database, but the database will
    be a bottleneck. If caching is used to alleviate the database bottleneck, each
    JVM will need access to that cache.


    To avoid critical spikes in database usage, the cache should be loaded once from
    the database and shared among the JVMs rather than loaded separately by each JVM.


    All of the requirements introduced by deploying the application in a cluster can
    be met by using Terracotta with a small amount of configuration and no code changes.
    Let’s take a quick look at what the configuration looks like to make this happen.


    **Configuration for the Example**


    The first configuration step is to determine which objects in the application
    should be shared by the cluster. These shared object graphs are specified by declaring
    specific variables to be roots. Every object reachable by reference from a root
    object becomes a shared object available to all JVMs, clusterwide. In our example
    so far, we have three roots, all of them declared in


