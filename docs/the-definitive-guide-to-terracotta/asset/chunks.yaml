    \n**图7-8.** *访问集群中第二个Tomcat实例后的基本会话示例*\n\n![Image 21](index-189_1.jpg)\n\n986-1\
    \ CH07.qxd 5/29/08 8:12 AM Page 165\n\nC H A P T E R 7 n 使用Terracotta扩展HTTP会话\n\
    \n**165**\n\n现在，为了更有趣，尝试在另一个浏览器或另一台机器的浏览器中打开同一页面（将`localhost`替换为运行服务器的机器的IP地址）。您会看到状态确实存储在服务器上。另外，尝试重新加载直到计数器达到值10。由于会话将失效，下次访问应用程序时，计数器将显示值1。\n\
