- fmt: '# The Key Reasons for Using a Database


    The key reasons for using a database are that the data gets written to disk and
    can be queried and updated in a well-known format and that the database can be
    tuned without significant impact to the business logic. The reasons not to use
    the database are that the object-relational translation complicates code, transactional
    architectures are hard to scale, and the database is a bottleneck.


    Applications can use Terracotta to eliminate the database bottleneck. In such
    scenarios, leave objects in memory, and cluster them via Terracotta. Since Terracotta
    is infrastructure separate from any application process, objects in memory do
    not necessarily get lost (recall that Terracotta stores objects on disk, so objects
    will not get lost). Therefore, when using Terracotta, the database’s role is well
    contained; it is used primarily for query and reporting of business data. It is
    used less as a central store for objects on disk and as a transactional control
    point where synchronization suffices.


    ## Session Replication


    Session replication has long been a feature of the application server or container.
    Apache Tomcat, BEA WebLogic, JBoss Application Server, IBM Websphere (CE), Jetty
    from Webtide, and Sun GlassFish each has a session replication solution bundled
    within the container. But transparent infrastructure for sharing objects across
    processes can provide unique value when compared to these frameworks.


    Terracotta’s transparency implies something new and different from all prior session
    replication approaches. Specifically, session replication usually pushes a few
    programming rules back up through the container to the application developer.
    Web application developers know that all session attributes must implement `java.io.Serializable`.
    Developers also know that those attributes must be small. And domain objects should
    not be referenced by the session attributes, or you risk serializing too much
    or serializing dangerous data. Last, any attribute that is accessed via `getAttribute()`
    must later be put back into session by calling `setAttribute()`.


    These rules and more regarding the use of session replication are, in fact, direct
    results of containers’ having used session serialization and replication when
    sharing objects in session.


    If we follow the session, what we would find is that the session is retrieved
    from an internal `HashMap` when the container receives a web request. That session
    is marked as clean when the container hands the session object to the servlet
    code. The session will get serialized and sent across the wire to other instances
    of the application only if we call `setAttribute()` when changing objects inside
    the session.


    Transparent object sharing across Java processes is different. Transparent object
    sharing implies that if we, the application developers, can share the session
    `HashMap` and all the sessions and attributes inside that map, then we needn’t
    signal to the container what we change and when. We no longer need to call `setAttribute()`
    when we change attributes. Nor do we have to make sure objects implement the serializable
    interface, nor worry about their size. In some cases, references to domain objects
    and singletons will even prove acceptable.


    ## Workload Partitioning


    Workload partitioning is currently referred to under more popular names like MapReduce,
    data grid, and compute grid. The idea here is to divide and conquer. With Terracotta,
    divide-and-conquer architecture is achieved either by using Java data structures
    for messaging along with thread coordination or by using JMS or socket communications
    instead of threading for coordination and using shared data structures for a different
    purpose.


    Without going into too much detail now, Figure 1-5 illustrates the power of partitioning.


    Essentially, an application can spread computational workload such as querying,
    updating of large amounts of data, or similar use cases without the need for message
    queuing, a database, or other infrastructure services. A Java application and
    some multithreaded logic will suffice.


    **Figure 1-5.** *Distributing workload to many computers using only memory, threads,
    and Terracotta (see Chapters 10 and 11 for details)*


    ## Summary


    Terracotta is a transparent clustering service with an object-oriented development
    model.


    “Transparent” refers to the pure Java language and JVM memory interface with no
    explicit programming model requirements, such as a requirement to use Spring or
    Hibernate. “Clustering” refers to the ability to allow multiple machines and Java
    processes to work together on the same data and to signal each other using pure
    objects and threading logic. And “service” refers to the infrastructure nature
    of this technology. A look at distributed caching APIs helps tighten this definition.


    Distributed caches are not transparent clustering services. These libraries are
    designed to push bytes among networked servers when the cache is updated through
    `get()` and `put()` calls, and it’s important to note the following details about
    them:


    - **Transparency**: Distributed caches cannot be transparent. They require the
    developer to call `get()`, which copies data from the cache into objects when
    the API is called. Distributed caches also require the developer to call `put()`
    after objects are changed; this copies data back to the cache. `get()` and `put()`
    imply that the application code and the object model cannot support certain things.
    Methods in our source code cannot hold on to references to objects across calls
    to `get()`, because we will not get the up-to-date data from the cache from the
    last time a thread called `put()`. And object models cannot include rich domains
    where objects, like our User and his Address and Friends from earlier in this
    chapter, could actually be Java references. If our domain model is made up of
    regular references, the entire object graph will get serialized on `put()`, which
    means we will end up with different objects on `get()` than we initially created.


    - **Clustering**: Distributed caches deliver Java developers a form of clustering.
    They do not provide clustering as a service, as we defined “service” earlier,
    because they are not transparent. An application cannot be written for a single
    machine and then operate across a group of machines in production. Furthermore,
    since most clustered caching libraries must be present at runtime for even threads
    on one machine to share objects, they cannot be removed from the application without
    rewriting that application to some degree.


    - **Simplicity**: The relative complexity of distributed caches is quite high,
    not just because they force changes to the application source but also because
    they require changes to the production operating procedure. This is due to the
    fact that, in order to scale, distributed caches ask that we keep all objects
    in memory spread across many JVMs. For example, if we want to manage a 100-gigabyte
    dataset, and our JVM is 32-bit, we will need a minimum of 50 JVMs at 2 gigabytes
    of heap per JVM to store the entire data set. If we want that data to be highly
    available, we need to store each object in two JVMs, meaning we need a minimum
    of 100 JVMs. 100 JVMs are required just to manage 100 gigabytes of data, and this
    example ignores the application’s actual purpose and business workload, which
    will surely drive even more servers.'
