    第 8 章 ■ 集群化 Spring


    **201**


    **用于 Spring 的 Terracotta 会话集群**


    Terracotta 支持对 Spring Web Flow 和会话作用域 Bean 进行集群。要启用此功能，您需要将 session-support 设置为
