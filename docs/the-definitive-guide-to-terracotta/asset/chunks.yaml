- fmt: "\nFor this example, however, we want to see the Terracotta durable heap in\
    \ action, so we want to configure the Terracotta server to run in persistent mode\
    \ so that it may be safely stopped and restarted without resetting the clustered\
    \ heap state. To do that, we must set the value of `/tc:tc-config/servers/server/dso/persistence/mode`\
    \ to `permanent-store` by adding the following XML snippet to the existing `/tc:tc-config/servers/server`\
    \ stanza:\n\n```xml\n<dso>\n  <persistence>\n    <mode>permanent-store</mode>\n\
    \  </persistence>\n</dso>\n```\n\n## Configuring the Terracotta Client\n\nNow\
    \ that we have the server configured, let’s move on to the Terracotta client configuration.\n\
    \nThe client configuration consists of the `client` and the `application` sections.\
    \ The `client` section describes general behaviors of the Terracotta client libraries.\n\
    \nThe template configuration already has a `clients` stanza which, like the `server`\
    \ stanza, describes where to write the Terracotta client logs. Unlike the Terracotta\
    \ server stanza, though, the `clients` stanza does not contain configuration for\
    \ specific Terracotta clients. The cluster configuration remains agnostic about\
    \ how many Terracotta clients may join the cluster throughout the life of the\
    \ cluster. We will leave the existing `clients` configuration stanza untouched.\n\
    \nThe `application` section describes application-specific configuration. In the\
    \ `application` section, we will be setting the clustered root fields, declaring\
    \ which classes are eligible for Terracotta instrumentation, and declaring which\
    \ methods should be augmented with Terracotta clustered locking and object change\
    \ management.\n\n## Configuring Roots\n\nIn our previous discussion of `HelloClusteredWorld`,\
    \ we determined that certain fields must be declared as clustered roots, which\
    \ are the tops of clustered object graphs. Every object reachable by reference\
    \ from a root field (that is not also declared transient) itself becomes a clustered\
    \ object. Once instantiated the first time in the cluster, a root field becomes\
    \ immutable, regardless of the modifiers applied to it in the source code.\n\n\
    `HelloClusteredWorld` has two fields that we want to declare as roots, `buffer`\
    \ and `loopCounter`. To make those fields roots, we must add the following XML\
    \ snippet to the `/tc:tc-config/applications/dso/` section:\n\n```xml\n<roots>\n\
    \  <root>\n    <field-name>HelloClusteredWorld.buffer</field-name>\n  </root>\n\
    \  <root>\n    <field-name>HelloClusteredWorld.loopCounter</field-name>\n  </root>\n\
    </roots>\n```\n\n## Configuring Instrumentation\n\nTerracotta’s transparency system\
    \ augments Java byte code as it gets loaded into the JVM in order to observe changes\
    \ to objects and coordinate cross-JVM locking and object updates.\n\nOur current\
    \ configuration is set to instrument every class that gets loaded by the JVM.\
    \ For our purposes in this example, this will work just fine. However, in real-life\
    \ use, it is much more likely that you will want to restrict the set of classes\
    \ that Terracotta instruments to just those that are necessary to eliminate the\
    \ overhead of Terracotta instrumentation from the parts of your application (and\
    \ third-party libraries that you are using) that do not interact with clustered\
    \ objects.\n\nTo narrow down the instrumentation of `HelloClusteredWorld` to just\
    \ what is necessary, let’s modify the current `instrumented-classes` section to\
    \ look like this:\n\n```xml\n<instrumented-classes>\n  <include>\n    <class-expression>HelloClusteredWorld</class-expression>\n\
    \  </include>\n</instrumented-classes>\n```\n\nThis tells Terracotta to only instrument\
    \ the `HelloClusteredWorld` class. Terracotta also instruments a number of other\
    \ classes by default, all of which are found in the boot JAR.\n\n## Configuring\
    \ Locks\n\nLike the instrumentation section, our template configuration sets up\
    \ locking for every method in every instrumented class. Again, this will work\
    \ for our small example but is not generally practical for real-world use. To\
    \ narrow down the methods that are sensitive to Terracotta locking, let’s modify\
    \ the `locks` section to look like this:\n\n```xml\n<locks>\n```"
