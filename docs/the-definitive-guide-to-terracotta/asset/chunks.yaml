    **使用队列进行线程协调**


    下一个示例演示了如何使用队列将消息从一个 JVM 发送到另一个 JVM。共享数据结构是一个队列列表，每个队列分别与红色、橙色、黄色、绿色、蓝色、靛蓝和紫色相关联。第一个加入集群的
    JVM 将为列表中的每个队列生成一个线程。这些线程将阻塞，等待从队列中获取消息。当线程解除阻塞并从队列中取出一条消息时，第一个 JVM 将简单地将发送到该特定队列的消息打印到控制台，并重复此过程。随后加入集群的每个
    JVM 都会被分配七种颜色之一，并将消息放入其指定的颜色队列中。图 10-2 展示了不同 JVM 之间交互的示意图。


