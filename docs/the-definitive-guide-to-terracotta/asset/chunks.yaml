    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE web-app

    PUBLIC "-//Sun Microsystems, Inc.//DTD Web Application 2.3//EN"

    ["http://java.sun.com/dtd/web-app_2_3.dtd">](http://java.sun.com/dtd/web-app_2_3.dtd)

    <web-app>

    <servlet>

    <servlet-name>SessionExample1</servlet-name>

    <servlet-class>SessionExample1</servlet-class>

    </servlet>

    <servlet-mapping>

    <servlet-name>SessionExample1</servlet-name>

    <url-pattern>/sessionexample1</url-pattern>

    </servlet-mapping>

    </web-app>

    ```


    ## Package and Configure the Web Application


    To try out this example, you first have to create the directory structure for
    a Java web application. Execute the following commands to create this structure
    and place the example files in it:


    ```

    > cd %HOMEPATH%

    > md example1\WEB-INF\classes

    > move SessionExample1.java example1\WEB-INF\classes

    > move web.xml example1\WEB-INF

    ```


    ![Image 16](index-186_1.jpg)


    Now, you need to compile the servlet to be able to run it:


    ```

    > cd %HOMEPATH%\example1\WEB-INF\classes

    > javac -cp <TC_HOME>\lib\servlet-api-2.4.jar SessionExample1.java

    ```


    Finally, you should create a WAR file that can be deployed in a servlet container:


    ```

    > cd %HOMEPATH%\example1

    > jar cvf example1.war .

    ```


    You will end up with an `example1.war` archive that is ready to be deployed.


    ## Install and Run the Application with the Terracotta Sessions Configurator


    Terracotta ships with a handy graphical user interface that allows you to configure
    web applications. It also allows you to deploy them into servlet containers with
    HTTP-enabled distributed sessions. Launching this tool is easy:


    ```

    > <TC_HOME>\tools\sessions\sessions-configurator.bat

    ```


    After executing this command, you will see a window appear that looks similar
    to Figure 7-4.


    **Figure 7-4.** *Terracotta Sessions Configurator startup window*


    ![Image 17](index-187_1.jpg)


    ![Image 18](index-187_2.jpg)


    By default, the Sessions Configurator uses the Apache Tomcat version that is shipped
    with Terracotta. Other servlet containers can also be used, and we’ll show you
    how in the last section of this chapter. For now, let’s just settle on Tomcat
    and import your web application into it. This is simply done by selecting “Import
    webapp” from the File menu, as shown in Figure 7-5.


    **Figure 7-5.** *Sessions Configurator menu to import a new web application*


    You will be presented with a file selector, and you should select the `example1.war`
    archive you just created. A dialog will tell you when the import task is complete.
    Afterward, a new item will appear in the left pane of the Sessions Configurator,
    named `example1`. This is your web application deployed to the servlet container.


    Let’s run the example now by starting the two Tomcat instances that are set up
    by default in the right pane. Go ahead and click the “Start all” button. The Tomcat
    servers first go into a wait state while the Terracotta server starts; afterward,
    they’ll become ready, and the Sessions Configurator will look like Figure 7-6.


    **Figure 7-6.** *Sessions Configurator after starting all the Tomcat instances*


    ![Image 19](index-188_1.jpg)


    ![Image 20](index-188_2.jpg)


    ## Trying the Example


    Now, launch a web browser to visit the application that is running on the first
    web server on port 9081. The full URL is `http://localhost:9081/example1/sessionexample1`.
    Reload the page a few times to see the counter increase. You’ll see something
    similar to Figure 7-7.


    **Figure 7-7.** *Basic session example after reloading the browser a few times*


    Next, you should open a second browser window and visit the application that is
    running on the second web server on port 9082; the full URL this time is `http://localhost:9082/`.'
