    C H A P T E R 8


    Clustering Spring


    **T**he Spring framework has recently become one of the primary choices for POJO-based
    web and enterprise development. Spring is, among other things, a dependency injection
    container that allows the developer to write business logic in POJOs and declaratively
    configure and inject dependencies, infrastructure services that are needed, and
    so on.


    Spring’s main goal has been to bring back simplicity to Java enterprise development
    by returning to POJOs that can be tested and deployed without a specific execution
    environment.


    Spring effectively helps you separate the enterprise qualities from the functional
    parts of your application: You write your application using an object model that
    best expresses its meaning.


    Spring then injects into your applications the gory enterprise details of how
    data is accessed, how the life cycles of objects are managed, and other such aspects
    of enterprise applications.


    This way, you can write code that is about your application, not about talking
    to a database, participating in transactions, or preparing messages to be shipped
    to other JVMs as messages.


    Handily, Terracotta shares Spring’s philosophy, making Terracotta and Spring a
    well-matched pair. Terracotta was designed specifically to let you write code
    about your application, avoiding manual development of code that makes your application
    highly available or scalable. As such, Terracotta’s dedicated support for the
    Spring Framework allows developers to create regular nonclustered Spring applications,
    test them as usual, and when needed, declaratively define which Spring beans (in
    which application contexts) they want to have clustered. Terracotta will then
    ensure that these Spring beans are clustered as effectively as possible while
    retaining exactly the same semantics across the cluster as on the single node.


    You can think of Terracotta as allowing you to cluster a Spring application context
    across multiple JVMs as if they were all on the same JVM. The singleton beans,
    session scoped beans, and custom scoped beans in a particular application context
    that have been declared as clustered in Terracotta will be shared among all instances
    of that application context in every JVM


    attached to the Terracotta cluster. Additionally, application events for that
    application context can be configured to be automatically sent to all listeners
    of that application’s events in all JVMs.


    In this chapter, we will take a tour through the process of turning a non-Spring
    clustered application into a Spring-enabled clustered application, showing you
    how you can integrate Terracotta and Spring in a simple, effective, and natural
    fashion.


