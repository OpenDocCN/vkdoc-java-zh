    配置中显式指定锁定。


    **批量加载 Map**


    使用共享 Map 的一个特殊情况是批量加载，即需要一次性向 Map 中添加大量条目，例如在初始化缓存时。通常，对 Map 的每次 put() 方法调用都会定义一个独立的事务，但一般来说，在执行批量加载时，使用更宽的事务范围更为可取。这样可以更好地利用带宽并最大限度地减少锁定。


    为了处理此类场景，建议将 Map 实现封装在您自己的类中，并在该类上以更粗的粒度提供锁定。通常，您会发现使用非常细粒度的加载（为每个缓存项调用 put()）会因事务数量过多而导致性能不佳。而在另一个极端，在单个
    putAll() 调用周围使用单个同步块，可能会带来更好的性能，但存在因单个事务过大而导致内存溢出错误的风险。通常，在批量调用 put() 时，可以实现最佳性能，即在粗粒度和内存安全性之间取得平衡。


    n**提示** Terracotta 可以对事务进行批处理和更改顺序，而不会违反 JVM 的预期行为。因此，某些应用程序会发现，无需手动批处理 put()
    调用，Terracotta 也能快速管理细粒度的更新和对象更改。


    另一个值得考虑的方面是并发性。使用 putAll() 或批量 put() 调用会减少总体 I/O 并提高性能，但也会因使用更粗粒度的锁定范围而降低并发性。理解最佳权衡点取决于您的应用程序，并应通过实验来确定。


