    Using Separate Roots


    Separate roots are going to prove helpful when we start looking for bottlenecks.
    “Separate roots” means that one instance of the inventory application will be
    able to connect to its own copy of the shared object data, and no other JVM will
    see or share objects with this JVM. With separate roots, you baseline the application’s
    performance with Terracotta integrated as well as with more than one instance
    of the application running at once, which will help isolate any bottlenecks in
    our own application logic, versus bottlenecks that may exist in the Terracotta
    server.


    Do not assume that Terracotta is slow or that Terracotta causes high overhead
    to your application based solely on initial observations after getting Terracotta
    up and running.


    Instead, use a methodical approach such the one as we are about to undertake together.
    The approach as outlined thus far includes pounding on random products in an array
    as well as pounding on a single product. In fact, the tests will be run several
    times, both to get valid sample data and to run various scenarios. poundOneProduct
    will be run where two JVMs each pound on the same product as well as on different
    products. poundRandomProducts will be run only once.


