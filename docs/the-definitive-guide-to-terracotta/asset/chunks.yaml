    ## 线程协调与JMX集群事件


    下一个示例与上一个相同，但增加了Terracotta集群事件。集群事件是在客户端JVM中触发的JMX事件，当JVM加入或离开集群时触发。为了接收Terracotta集群事件，示例类需要被增强以实现四个方法：


    - `nodeConnected(Object nodeID)`：当另一个JVM加入集群时调用

    - `nodeDisconnected(Object nodeID)`：当另一个JVM离开集群时调用

    - `thisNodeConnected(Object nodeID)`：当此JVM加入集群时调用

    - `thisNodeDisconnected(Object nodeID)`：当此JVM离开集群时调用


    Terracotta中的集群事件最终将扩展为包含集群或JVM可能经历的所有逻辑阶段。一个更健壮的事件处理解决方案必须包含以下方法：


    - `nodeInit(Object nodeID)`：当此节点启动时调用。

    - `nodeConnecting(Object nodeID)`：当此节点调用到Terracotta服务器的`socket connect()`方法时调用。

