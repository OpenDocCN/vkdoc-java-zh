    **我们所说的 POJO 是什么意思？**


    要理解什么是 POJO 集群，我们首先需要准确描述我们所说的 POJO 是什么意思。我们使用术语“POJO”来表示一个普通的 Java 对象，它存在于你的
    JVM 堆上，并且不需要任何额外的框架或组件支撑即可实现其预期功能。

    '
- fmt: 'POJO 的本质特征在于它实际存在于 JVM 堆上，并且可以作为一个常规的 Java 对象来对待，不会产生任何令人意外的副作用。对 POJO 的引用应该是普通的引用，使得通过`==`运算符进行比较时结果为`true`。你应该能够通过普通的访问（`.`）运算符（例如，`foo.bar
    = baz`）来修改 POJO 的字段，而无需在之后调用某个`commit`或`put-back`操作（例如，`session.setAttribute("foo",
    foo)`）。你应该能够将 POJO 放入一个数据结构（如`Map`）中，然后将其取出，而不会被返回一个对象的副本。你还应该能够在 POJO 上执行并发操作（例如，`synchronized`、`wait()`和`notify()`），并且这些操作的行为符合预期。


    传统上，POJO 一直被使用，直到它们所代表的数据需要被外部化到单个 JVM 堆的边界之外。例如，如果你想将对象所代表的数据存储到数据库，你可能会使用 EJB
    或像 Hibernate 这样的对象关系框架来为你管理持久化。或者，如果你想在 JVM 之间发送消息，你可能会使用 JMS 或 RMI。在所有这些情况下，大量的框架支撑结构支持将对象数据外部化到本地堆之外，并且所涉及的对象不能被称为
    POJO。与这些外部化对象的交互是依赖于框架的，有时还很复杂，并且它们总是需要以特殊的方式对待。


    ## 什么是集群 POJO？


    基于对 POJO 的这种理解，那么，什么是集群 POJO？对于 Terracotta 来说，集群 POJO 是一个具有常规 POJO 所有特性，并额外具有一个特征的对象：它存在于集群中所有
    JVM 共享的虚拟堆上。


    首先，集群 POJO 应该是一个在集群堆上具有唯一标识的一等对象。这意味着对它的引用应该是普通引用，使得通过`==`运算符进行比较时结果为`true`。不应该存在对象克隆，无论是通过
    Java 对象克隆机制显式进行，还是通过数据复制或对象序列化隐式进行。因此，你应该能够将集群 POJO 放入一个数据结构中，然后将其取出，而不会被返回一个对象的副本。所有对
    POJO（无论是否集群）的引用，都应该指向堆上完全相同的对象。


    如果同步得当，对象修改应该对共享同一虚拟堆的多个 JVM 上的线程可见，就像这些修改对共享同一物理堆的同一 JVM 上的线程可见一样。


    你还应该能够在集群 POJO 上执行并发操作（例如，`synchronized`、`wait()`和`notify()`），并且这些操作在共享同一虚拟堆的多个
    JVM 上的线程间的行为，与它们在共享同一物理堆的同一 JVM 上的线程间的行为完全相同。


    由于集群 POJO 的作用域和生命周期超越了任何特定 JVM，集群 POJO 所在的虚拟堆应该在任何特定 JVM 的生命周期之后仍然持久存在。这意味着集群
    POJO 是持久的，并且与非集群 POJO 不同，当任意数量的 JVM 关闭时，它们不会消失。


    ## 为什么使用集群 POJO？


    本质上，使用集群堆背后的动机是简单性。使用虚拟堆让你能够专注于应用程序的逻辑，而无需处理显式对象外部化所固有的架构和语义扭曲。所有其他提供对象持久性和/或
    JVM 间通信的尝试，都将对象修改和跨 JVM 消息传递呈现为一个显式的 API，这个 API 不可避免地嵌入在你的应用程序代码中。


    为了使 Java 应用程序达到企业级标准，人们付出了巨大的努力，这意味着它们具有非常高的正常运行时间、可靠地处理数据，并且能够适当扩展以保持感知延迟最小化，无论用户负载如何。为了提供企业级功能，需要
    JVM 未提供的两个特性：


    - 对象数据的持久性和可移植性

    - 跨 JVM 线程通信


    对象数据的持久性和可移植性是实现可靠性和高可用性所必需的。可靠的数据处理要求应用程序数据是持久的。由于 Java 堆不是持久的，对象数据必须被外部化到持久存储中。


    为了使应用程序具有高可用性，它必须要么运行在高可用性硬件上，要么可以冗余部署在商用硬件上。传统上，Java 企业架构师选择后一种路径来提供高可用性，原因有很多，其中重要的一点是，它可以通过弹性地添加（或移除）商用硬件来适应需求，从而扩展以实现可伸缩性，理论上可以保持延迟稳定。如前所述，这种横向扩展架构要求至少将应用程序实例的部分运行状态外部化，这样，如果一个应用程序实例发生故障或被下线，另一个实例可以无缝地接替它的位置，从它中断的地方继续执行。因此，对象数据的持久性和可移植性是在横向扩展架构中维护应用程序状态所必需的。


    一旦应用程序部署在横向扩展架构中，不可避免地会出于某种原因产生对 JVM 间通信和协调的需求。典型的例子是缓存刷新或过期以及管理功能。更高级的架构，例如第
    11 章讨论的主/从形式的工作负载分配，被明确设计为利用多 JVM 部署环境，并且需要健壮且灵活的 JVM 间通信和协调。


    自 Java 诞生以来，这两个特性——对象数据的持久性和可移植性以及跨 JVM 线程通信——已经通过多种或多或少复杂的方式被补充到 Java 执行环境中。许多此类技术的核心是对象序列化，这是外部化对象数据最基本的方式。一旦对象图被序列化，它就可以被导出到持久存储（如文件或数据库）或通过网络导出到另一个
    JVM。


    基于这个核心特性，已经构建了额外的框架来提供更复杂的持久化处理（例如，EJB 或像 Hibernate 这样的对象关系映射引擎），或者提供 JVM 间通信（例如，RMI
    或 JMS）和数据共享。


    在构思 Terracotta 时，其创建者注意到，如果扩展 JVM 中已有的现有设施，以允许不在同一 JVM 中的线程参与，那么显式对象持久化和 JVM 间通信框架提供的大部分功能都可以更简单地实现。JVM
    已经具有本地和远程对象的概念：线程内存和主内存（堆）。同样，它也已经具有进程间通信和协调的概念：线程级并发原语`synchronized`、`wait()`、`notify()`和`join()`。


    通过添加一个持久对象存储（形式为扩展的、网络连接的虚拟堆），并将并发原语的含义扩展到适用于所有参与 JVM 中的所有线程，就可以提供对象持久性和可移植性以及
    JVM 间通信和协调这两个企业级特性，其方式与仅考虑单个 JVM 编写的 Java 代码看起来非常相似，甚至在所有情况下都完全相同。'
  raw: 'The essential feature of a POJO is that it actually lives on the heap of the
    JVM and that it can be treated as a regular Java object without any surprising
    side effects. References to a POJO should be plain references such that comparisons
    to them with the == operator evaluate to true. You should be able to modify the
    fields of a POJO through the normal access (.) operator (e.g., foo.bar = baz)
    without having to later call some commit or put-back operation (e.g., session.setAttribute("foo",
    foo)). You should be able to put a POJO into a data structure (like a Map) and
    get it out again without being handed back a copy of the object. You should also
    be able to execute concurrency operations (e.g., synchronized, wait(), and notify())
    on a POJO and have them do what you expect.


    Traditionally, POJOs are used until the data they represent needs to be externalized
    outside the boundaries of a single JVM’s heap. For example, if you want to store
    the data represented by an object to a database, you might use EJBs or an object-relational
    framework like Hibernate to manage the persistence for you. Or, if you want to
    send messages between JVMs, you might use JMS or RMI. In all of these cases, a
    significant amount of framework trussing supports the externalization of object
    data off the local heap, and the objects involved can’t be called POJOs. Interactions
    with these externalized objects are framework dependent and sometimes complicated,
    and they always need to be treated in special ways.


    **What’s a Clustered POJO?**


    Given this understanding of POJOs, what, then, is a clustered POJO? For Terracotta,
    a clustered POJO is an object that has all of the qualities of a regular POJO
    plus the additional feature that it lives on a virtual heap shared by all the
    JVMs in the cluster.


    A clustered POJO, first and foremost, should be a first-class object with a unique
    identity on the clustered heap. This means that references to it should be plain
    references such that comparisons to them with the == operator evaluate to true.
    There should be no object cloning, either explicitly through the Java object cloning
    mechanism or implicitly through data copying or object serialization. Therefore,
    you should be able to put a clustered POJO into a data structure and get it out
    again without being handed back a copy of the object. All references to a POJO,
    clustered or not, should point to exactly the same object on the heap.


    If synchronized properly, object modifications should be visible across threads
    on multiple JVMs sharing the same virtual heap exactly as those modifications
    are visible across threads on the same JVM sharing the same physical heap.


    You should also be able to execute concurrency operations (e.g., synchronized,
    wait(), and notify()) on a clustered POJO and have them behave across threads
    on multiple JVMs sharing the same virtual heap exactly as they do across threads
    in the same JVM sharing the same physical heap.


    Since the scope and life cycle of a clustered POJO are beyond those of any specific
    JVM, the virtual heap on which clustered POJOs live should be persistent beyond
    the life cycle of any particular JVM. That means that clustered POJOs are durable
    and, unlike nonclustered POJOs, they don’t disappear when any number of JVMs shut
    down.


