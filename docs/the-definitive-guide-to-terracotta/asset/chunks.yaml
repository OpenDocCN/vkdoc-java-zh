  trans: '

    要使这种数据驱动的方法取得成功，关键在于提供所有信息的集中视图，并展示适当的信息。


    需要观察的信息可以看作是一堆数据流。该堆栈如图 12-1 所示，从底部的操作系统信息到顶部的应用程序对象信息。


    **293**


    986-1 CH12.qxd 5/28/08 10:06 PM 第 294 页


    **294**


    第 12 章 n 应用程序可视化


    **图 12-1.** *应用程序调优的测量点*


    在集群中，一个节点可能会拖慢其他节点。在该集群中，观察单个节点只会让我们知道它很慢，而不会知道原因。Terracotta 得出结论，在逐个 JVM 的基础上查看信息堆栈帮助不大。可视化工具和管理控制台旨在帮助我们关联跨进程的性能。


    可视化工具会同时显示集群中的所有 JVM，允许我们根据需要深入查看跨 JVM 的任何指标，或跨指标查看任何 JVM。


    **可视化工具与架构**


    Terracotta 提供了用于收集和管理来自应用程序 JVM 以及 Terracotta 服务器的性能数据的工具和内部架构。该系统旨在将图 12-1 中描绘的集群范围数据收集到单个数据库中。在将应用程序部署到生产环境之前进行性能调优时，此策略非常有用。该系统不仅提供可视化工具，还提供用于拍摄集群性能快照的工具，以便对生产性能问题进行离线分析。


    图 12-2 描绘了该系统的架构。


    986-1 CH12.qxd 5/28/08 10:06 PM 第 295 页


    第 12 章 n 应用程序可视化


    **295**


    **图 12-2.** *Terracotta 集群可视化数据库架构* 使用该系统时，您可以选择在可视化客户端中查看实时数据，或者要求系统仅将数据收集到 Terracotta
    服务器内的集群数据库中。在任一模式下，系统都会将所有数据记录在其中央数据库中，并可以逗号分隔的格式导出记录，以便在离线分析期间传输给其他开发人员，甚至 Terracotta
    工程师。


    Terracotta 服务器收集的数据也会通过 JMX 流式传输到您选择的任何工具。正如 Terracotta 的服务器和可视化客户端可以管理和显示性能数据一样，您现有的监控和管理工具也可以做到这一点。


    n**提示** 实际上，为了在操作系统级别收集统计数据，Terracotta 使用了来自 Hyperic ([`www.hyperic.com/`](http://www.hyperic.com))
    的插件。Hyperic 提供了一个优秀的监控框架示例，通过该框架可以管理 Terracotta。


    现在您已经了解了系统架构，让我们构建一个存在性能问题的应用程序，并使用工具包中的可视化工具一起发现其问题。


    **示例库存应用程序**


    我们将用来学习可视化的应用程序包含在 Terracotta 工具包中。库存应用程序位于 Unix 上的以下目录：$TC_HOME/samples/pojo/inventory


