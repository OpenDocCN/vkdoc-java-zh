    C H A P T E R 9


    Integration Modules


    **T**his chapter discusses the Terracotta Integration Module (TIM) framework,
    which allows you to specify sets of clustering configurations as components, and
    include those components in your own configuration. We will investigate how to
    use TIMs and how to build them from scratch, which you might do to cluster an
    external library or framework where you need clustering or when modularizing the
    clustering configuration of your own application.


    **Clustering by Configuration**


    Terracotta’s approach to clustering is founded on the idea of transparency. The
    best abstraction to use when writing scalable distributed software is the same
    abstraction you use when writing scalable concurrent single-JVM software. Thus,
    clustering occurs via external configuration rather than by the use of an API
    and new libraries in your code.


    A key consequence of this approach is that external configuration can be applied
    to existing libraries even when they were not originally designed for that purpose.


    Configuration-driven clustering allows you to take advantage of the many great
    open source libraries available today in your distributed system.


    Terracotta supports the concept of external configuration for a library or component
    with the Terracotta Integration Module (TIM). A TIM consists of configuration
    information and occasionally code that specifies how the component should be clustered
    and instrumented, how locking is performed, and so on.


    A TIM itself is contained in a JAR file. The TIM has within it a manifest, some
    Terracotta configuration defined in an XML file, and possibly some code that can
    be applied to modify the original library if necessary.


    **Using TIMs**


    We will begin our exploration of TIMs by looking at an example of when they are
    useful and at how you can use modules created by Terracotta or someone else.


    **Clustering a Synchronized Map**


    By default, most collection classes are unsynchronized. A class like HashMap has
    no synchronization and can only be used safely in a single thread at a time. However,
    the Java Collections **203**


    986-1 CH09.qxd 5/28/08 10:41 AM Page 204


    **204**


    C H A P T E R 9 n INTEGRATION MODULES


    API contains a utility class named Collections with a synchronizedMap() method
    that will wrap any Map passed to it with another class that synchronizes on the
    Map for every method call (similar to Hashtable).


    If you then cluster that synchronized Map, you will need to specify clustered
    locks for access to every method on the Map object. Typically, you will need to
    specify write-level autolocks on all methods that modify the state of the Map
    and read-level autolocks on all other methods. You would do this in your tc-config.xml
    file by adding a <locks> section as shown in Listing 9-1.


    **Listing 9-1.** *The Locks Stanza in tc-config.xml*


    <locks>


    <autolock>


    <method-expression>


    void java.util.Collections$SynchronizedMap.clear()


    </method-expression>


    <lock-level>write</lock-level>


    </autolock>


    <autolock>


    <method-expression>


    Object java.util.Collections$SynchronizedMap.clone()


    </method-expression>


    <lock-level>read</lock-level>


    </autolock>


    ...for every method in Set...


    </locks>


    This locking code will work fine, but you will need to use this in every application
    that uses a synchronized Map. An alternative is to bundle up this lock configuration
    into a TIM, which can then be included in any application that needs it.


    **Importing a TIM**


    As it turns out, Terracotta provides the synchronized Map autolock configuration
    in the Autolocked Collections Terracotta Integration Module called tim-synchronizedmap.


    To include a TIM, you simply include it in the <clients> section of your Terracotta
    configuration. Listing 9-2 shows an example fragment of how to include the tim-synchronizedmap
    module in your configuration’s <clients> section of your application’s Terracotta
    configuration file (usually tc-config.xml).


    **Listing 9-2.** *Requiring a Module in tc-config.xml*


    <clients>


    <modules>


    <module name="tim-synchronizedmap" version="2.0.0" />


    </modules>


    </clients>


    986-1 CH09.qxd 5/28/08 10:41 AM Page 205


    C H A P T E R 9 n INTEGRATION MODULES


    **205**


    Each module declaration consists of three attributes:


    • name: The module name, which is required.


    • version: The module version, which is required.


    • group-id: The module group identifier, which is optional. If not specified,
    it is assumed to be org.terracotta.modules.


    At run time, Terracotta will read your configuration and the included modules
    and include the configuration from each module in your application’s configuration.
    An integration module’s configuration may itself include other configuration modules,
    which will be included as well.


    This allows you to, in effect, create modules that are bundles of other modules.'
