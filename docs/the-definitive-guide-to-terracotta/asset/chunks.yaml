    C H A P T E R 4


    POJO Clustering


    **I**n the last chapter, you got some hands-on experience with Terracotta by building
    and running HelloClusteredWorld. Now that you’ve gotten your feet wet, it’s time
    to introduce some major concepts that we have only briefly mentioned so far.


    There are three broad concepts we need to discuss to help you understand how Terracotta
    works under the hood. The first is how Terracotta handles Java objects and the
    virtual heap.


    The second is how Terracotta manages the coordination of threads between JVMs
    and the changes threads make to objects on the virtual heap. The third major concept
    we’ll introduce here is transparency and how Terracotta extends the existing semantics
    of your application to introduce clustering behavior at run time.


    Armed with these crucial Terracotta concepts, we’ll extend the hands-on experience
    you got with HelloClusteredWorld and walk through a more complex example of how
    Terracotta can transform a simple POJO application into a highly available, multi-JVM,
    scaled-out application.


    **All About Objects and Roots**


    In HelloClusteredWorld, we talked briefly about roots and how to configure them.
    You can think of a root as the top-level object in a clustered object graph—all
    objects referenced by the root object—on the virtual heap; in a sense, it’s where
    Terracotta starts. A root is any field in any class that you declare in the Terracotta
    configuration as the beginning of a clustered object graph.


    The first time you assign a value to a field declared as a root, Terracotta goes
    through the process of turning that object into a root. Terracotta traverses the
    object graph, transforming each of those objects, including the root itself, into
    a clustered object (more on what a clustered object is follows).


    Roots are declared in the Terracotta configuration by name. You may create as
    many roots as you want (although, there is seldom need for more than a few). Additionally,
    the same root may be assigned to more than one field. When two different fields
    are assigned the same root, they are made by Terracotta to refer to the same clustered
    object graph.


    A <root> stanza in the Terracotta configuration looks like this:


    <roots>


    ...


    <root>


    <field-name>my.package.MyClass.myRootField</field-name>


    <root-name>my_root_name</root-name>


    **69**


    986-1 CH04.qxd 5/6/08 3:01 PM Page 70


    **70**


    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    </root>


    ...


    </roots>


    The <root-name> element is optional. If you don’t specify a name, the field name
    is used implicitly as the root name. Here is an example where the same logical
    root is assigned to two separate fields:


    <roots>


    <root>


    <field-name>demo.jtable.Main.model</field-name>


    <root-name>jtable_model</root-name>


    </root>


    <root>


    <field-name>demo.jtable.Roots.model</field-name>


    <root-name>jtable_model</root-name>


    </root>


    </roots>


    Fields that are declared as roots assume special behavior. This is the one area
    of Terracotta that diverges significantly from regular Java semantics.'
