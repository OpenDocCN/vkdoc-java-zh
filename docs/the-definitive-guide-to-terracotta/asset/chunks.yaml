    \       <method-expression>* Demo.inventory.Department.*(..)</method-expression>\n\
    \    </autolock>\n    <autolock>\n        <method-expression>* Demo.inventory.Store.*(..)</method-expression>\n\
    \    </autolock>\n    <autolock>\n        <method-expression>* Demo.inventory.Main.*(..)</method-expression>\n\
    \    </autolock>\n</locks>\n```\n\n现在应用程序几乎可以运行了。领域模型的最后一个更改是引入独立的根。\n\n### 使用独立根\n\
    \n当我们开始寻找瓶颈时，独立根将证明是有帮助的。“独立根”意味着库存应用程序的一个实例将能够连接到其自己的共享对象数据副本，并且没有其他JVM会看到或与此JVM共享对象。通过独立根，您可以在集成Terracotta以及同时运行多个应用程序实例时，对应用程序的性能进行基准测试，这将有助于隔离我们自己的应用程序逻辑中的瓶颈，与Terracotta服务器中可能存在的瓶颈区分开来。\n\
    \n不要仅仅基于让Terracotta启动并运行后的初步观察，就假设Terracotta很慢或会给您的应用程序带来高开销。相反，请使用一种系统性的方法，就像我们即将一起进行的那样。到目前为止概述的方法包括随机冲击数组中的产品以及冲击单个产品。实际上，测试将运行多次，既是为了获取有效的样本数据，也是为了运行各种场景。`poundOneProduct`将在两个JVM各自冲击同一产品以及不同产品的情况下运行。`poundRandomProducts`将只运行一次。\n\
    \n随着独立根的加入，所有测试将重新运行。第二组测试将在JVM启动时进行，使得每个JVM获得自己的根，而不是共享一个根，但所有根都存储在同一台Terracotta服务器中。因此，在两个JVM上运行的`poundRandomProducts()`将冲击两个独立的数组。而`poundOneProduct()`可以在每个JVM上冲击相同的产品ID，但修改的是Terracotta中不同的对象。这种独立根模式可能看起来像是额外的工作，但它允许我们自行确认测试中一个JVM中的对象不会被另一个JVM所需。现在让我们进行适当的更改。\n\
    \n打开`Store.java`文件。将名为`Store`的类顶部的成员字段更改如下：\n\n```java\nimport java.util.concurrent.atomic.AtomicInteger;\n\
