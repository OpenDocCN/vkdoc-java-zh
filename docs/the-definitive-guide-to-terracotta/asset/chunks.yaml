    Thread Coordination


    **I**n a computer, just like the rest of the world, more work can get done if
    there are more workers working at the same time. In a computer, these workers
    take the form of multiple concurrently executing processes and, inside of a single
    process, multiple concurrent threads of execution. In the real world, if more
    than one worker is working on the same thing or if workers need to perform their
    work in a certain order relative to each other, they must have some form of communication
    and coordination between them. Just as in the physical world, if more than one
    thread is working on the same object or if those threads need to mutate objects
    in a certain order relative to each other, they must have some way to coordinate
    with each other.


    With Terracotta, thread coordination constructs that exist in the Java language
    will transparently work across JVM process boundaries. One thread in one JVM can
    call wait() on an object and another thread in another JVM on another machine
    can call notify() to wake up the waiting thread. The challenge is that not all
    Java developers have experience with thread coordination and concurrency. Treat
    this chapter as a cookbook for concurrency with Terracotta.


    It works as a cookbook, because it is designed to steer you toward use cases and
    coordination models that will be easy to code and debug and will simultaneously
    scale very well in a Terracotta world. Let’s dive in to the concurrency recipes
    now.


    **Terracotta and Thread Coordination**


    Thread coordination comes in two flavors:


    • *Coordination of access to data*: For example, if thread A is sorting a list
    and thread B is iterating over the elements in list, thread A needs to finish
    sorting the list before thread B starts iterating.


    • *Coordination of activities*: For example, assume thread A and thread B need
    to leave an apartment together, and thread A needs to turn out the lights, and
    thread B needs to close the door. In that case, threads A and B need to wait until
    thread A has turned off the light; likewise, thread B must wait until the light
    is off and both threads have walked over the threshold before closing the door.


    The JVM has simple and elegant built-in mechanisms for coordinating threads: the
    bytecode instructions MONITORENTER and MONITOREXIT (also known as the synchronized
    method or **221**


