  trans: '

    让应用程序透明地分布到网络上的难点在于，应用程序必须与网络通信，而网络的速度远慢于 CPU。Sun Microsystems 和 IBM 都曾在 2000
    年尝试构建集群化的 JVM。这些努力很快揭示出，与 CPU 相比，网络慢得令人痛苦，并且大多数应用程序都必须重写才能利用分布在慢速网络上的优势。因此，人们得出结论：CPU
    太快，集群太慢，开发者只需在需要时使用工具来序列化对象并在网络上传输即可（RMI、JMS，甚至 JDBC 都可以用于在 Java 进程间共享对象）。


    这正是当今问题所在。为了可扩展性和高可用性而进行的集群化，要求开发者在集群中的 Java 进程间复制对象，并且要求应用程序意识到自己正被部署到多台服务器上。过去，开发者编写应用程序、调优算法，并引入诸如缓存之类的
    I/O 优化，以便一个进程能适应大型机器的一小部分。随着工作负载增加，进程可以被优化，但到了某个节点，服务器就必须被替换。归根结底，很少有人尝试在网络上分布应用程序。这太难了。而在进程间推送对象这件事上，情况从未改变——它依然很难。


    然而，Terracotta 带来了一项改变：我们不再将对象传递给集群中的一组应用服务器。借助 Terracotta 引入的进程外运行的 L2，Terracotta
    应用程序仅将对象传递给 Terracotta。Terracotta 服务器（L2）可以做出明智的决策，判断哪些 Java 进程需要哪些变更。而且，由于该解决方案被设计为透明的，Terracotta
    能在细粒度变更发生时（精确到字节级别）感知到它们。这意味着，只有拥有中央集群服务器的透明解决方案才能写入磁盘，从而为我们提供可用性，而无需依赖 Oracle。


    这是为什么呢？记住，写入磁盘越少，速度越快。Terracotta 仅将变更写入磁盘。而且，它可以在帮助应用程序进程共享状态的同时，写入这些变更。


    让我们回顾一下。回想第 1 章中的 `ClusteredClass`。如果我们更改 `name` 字段或 `id` 字段，Terracotta 可以仅推送更改后的信息。如果
    `id` 是一个 `int`（或 `Integer`，这并不重要），Terracotta 只需通过网络向 L2 进程发送 4 个字节，并将这 4 个字节写入磁盘。否则，该类的一个实例大约需要
    30 个字节，因此，无需编写自定义代码，我们就能在 I/O 上实现显著节省。


    Terracotta 服务器也是一个独立的进程，目前在我们的应用程序中被称为 L2（我们将在第 3 章停止使用这种命名法）。在第 4 章以及第 13 章中，你将了解更多关于
    Terracotta 服务器如何安全地将其内部磁盘存储与应用程序内存变更解耦，而不会冒数据丢失风险的内容。服务器经过调优，可以在不使应用程序等待的情况下执行磁盘
    I/O，这意味着，我们终于可以同时拥有可扩展性和高可用性了。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 37 页


    第 2 章 ■ Terracotta 的历史


    **37**


    **重新审视透明集群服务**


    在第 1 章中，我们将 Terracotta 定义为一个透明集群服务，它帮助应用程序扩展到尽可能多的机器上以实现规模。过去，应用程序被困在通过缓存、复制和分区进行无休止调优的黑暗狭窄隧道中，而现在，隧道尽头出现了一线光明。过去，我们通过大量手动编码和在进程边界间编组对象来实现扩展，而现在，我们什么都不用做。当我们找到一种方法，将进程间和服务器间的通信从应用程序代码中移出，下放到运行时环境中的某个位置时（如图
    2-6 所示），扩展的工作量和复杂性就会得到改善。


    **图 2-6.** *应用程序集群需要多种不同的方法；Terracotta 则不需要。*


    在第 1 章中，我们得出结论，Terracotta 可以被视为一个透明集群服务。现在，我们已经确认了这种服务的需求是存在的。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 38 页


    **38**


    第 2 章 ■ Terracotta 的历史


    **透明性带来更高的可扩展性**


    我们每天都依赖透明性来帮助扩展应用程序。垃圾回收器就是一个透明的内存管理服务。在大多数情况下，它运行良好。而且，它比开发者做得更好，并非因为它的编写者比普通开发者更聪明（好吧，也许他们确实比我们大多数人都聪明），而是因为运行时环境拥有关于使用模式的完美信息。它可以做出开发者认为过于复杂的更改。


    用户对象可能在中午使用一种算法进行回收，而在午夜使用另一种算法，具体取决于应用程序工作负载的变化。


    Terracotta 发现，透明性以及作为运行时服务，不仅解决了开发者面临的复杂性挑战，还提供了超越开发者自身构建能力的可扩展性和性能。运行时性能提升的一个例子是贪婪锁。Terracotta
    可以在运行时决定一个锁应该是悲观的、集中的和排他的，还是分散的和乐观的。开发者必须对排他访问做出假设，这些假设仅针对最坏情况进行保护，因此，没有 Terracotta
    的 JVM 主要提供悲观的、排他的锁语义。


    **集群应用服务器与集群缓存**


    Terracotta 不仅仅用于缓存存储在数据库中的数据。委托给 Terracotta 的数据始终存储在磁盘上，因此在某些用例中，Terracotta 可以在没有数据库的情况下使用，本书第
    5 章至第 12 章将涵盖其中大部分内容。


    我们已经讨论了，如果没有 Terracotta，应用程序如何通过数据库进行扩展。我们还讨论了内存复制以及跨 Java 进程手动复制状态。似乎存在手动复制对象的替代方案。


    但实际上，没有替代方案。好吧，这个说法可能过于绝对，但它清楚地表明，我们对无状态和有状态方法的分析，对于应用服务器供应商或集群供应商来说并不会改变，只要他们使用与应用服务器或缓存库之上的开发者相同的工具来手动复制和缓存状态（见图
    2-6）。


    如今，集群应用服务器、集群缓存和其他集群库的衡量标准是它们如何复制数据。有些使用 N 路复制，而另一些则使用伙伴系统。有些在对象更改时复制数据，而另一些则要求开发者直接通知库有关更改的信息。当然，还有
    EJB、JPA 和 Hibernate，它们不需要复制，因为应用程序状态以无状态方式存储在数据库中。


    我们不应该根据一个框架是无状态还是有状态，或者它是伙伴复制还是 N 路复制来评判它。相反，我们应该根据它是一项透明服务还是一个开发工具来评判它。

    '
- fmt: "# A Transparent Service\n\nA transparent service is one that is installed\
    \ after the application has been written and deployed and whose behavior is controlled\
    \ by configuration. One example is the garbage collector. The application makes\
    \ assumptions about the presence of a garbage collector inside the JVM and thus\
    \ never attempts to call `delete()` at some point after calling `new()`, as we\
    \ would in C++. Counter examples to transparent services are Hibernate and Spring.\
    \ While both are mostly transparent, their behavior is controlled as much by source\
    \ code integration as by configuration. If a Spring or Hibernate application were\
    \ loaded without the Spring or Hibernate libraries present, that application would\
    \ cease to function.\n\nClustered caches and clustered application servers fail\
    \ to realize that Hibernate and Spring both represent a development model and\
    \ methodology. Clustered application servers are not supposed to represent a rigid\
    \ development model. Spring, for example, provides a development model that is\
    \ not rigid or fixed. But clustering frameworks ruin elegance and simplicity for\
    \ the rest of the application. They are supposed to take any application that\
    \ can be run inside the container and cluster the application. Clustered application\
    \ servers and clustered caches fail at this goal and thus are a notoriously poor\
    \ solution for scaling applications.\n\n## Summary\n\nSince Terracotta provides\
    \ transparent scalability and availability to Java applications, it allows those\
    \ applications to spread out and run on as many machines as is necessary. Transparency\
    \ allows the system to decide what to push among the JVMs and to the L2 server\
    \ (otherwise known as a Terracotta server), and this provides very high scalability.\
    \ Transparency has an additional benefit in that it does not enforce a programming\
    \ model such as clustered caching, or EJB, or even Hibernate or Spring. Terracotta\
    \ can take an existing application and scale it to many machines, whereas other\
    \ approaches dictate a model that, if followed, can enable scaling out.\n\nLet’s\
    \ now switch gears and work with actual Java program source code and Terracotta\
    \ configuration to learn more about how this works. Chapter 3 introduces Terracotta\
    \ configuration concepts.\n\n# Jumping Into Terracotta\n\nTerracotta delivers\
    \ a transparent scale-out model to Java programming. The lightweight nature of\
    \ the development model is inherent in the fact that the software plugs in to\
    \ an off-the-shelf JVM and allows developers to write applications without explicit\
    \ in-memory replication or mapping data to an underlying data store. Those applications\
    \ then spread across machines at run time. The point of such an approach is not\
    \ just for scale but for high availability. Based on knowledge gained from some\
    \ of the largest scale applications in the world, Terracotta helps you achieve\
    \ scalability and availability with less effort. Let’s now take a look at a system\
    \ that illustrates ease, scale, and availability in a short, “hello world” style\
    \ program.\n\n## Hello Clustered World\n\nWe call this application “Hello Clustered\
    \ World.” The relevant source code follows:\n\n```java\npublic class HelloClusteredWorld\
    \ {\n\n    private static final String message = \"Hello Clustered World!\";\n\
    \    private static final int length = message.length();\n\n    private static\
    \ char[] buffer = new char [length ];\n\n    private static int loopCounter;\n\
    \n    public static void main( String args[] ) throws Exception {\n\n        while(\
    \ true ) {\n\n            synchronized( buffer ) {\n\n                int messageIndex\
    \ = loopCounter++ % length;\n\n                if(messageIndex == 0) java.util.Arrays.fill(buffer,\
