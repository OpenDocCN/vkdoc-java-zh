    in Figure 3-5, and name it “hello_clustered_world_eclipse” (actually, you can
    give it whatever name you want).


    **Figure 3-5.** *Eclipse project browser*


    ![Image 9](index-88_1.jpg)


    ![Image 10](index-88_2.jpg)


