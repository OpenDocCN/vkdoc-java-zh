- fmt: "# Thread Coordination\n\n`synchronized` block and the various signatures of\
    \ the `Object` methods `wait()`, `notify()`, and `join()`. As of Terracotta 2.6,\
    \ `join()` is not supported as a clustered thread interaction. Since Java 1.5,\
    \ higher level concurrency constructs have been added to the Java library to provide\
    \ canonical implementations of commonly used coordination techniques. These higher-level\
    \ thread coordination tools can be found in the `java.util.concurrent` package.\
    \ Figure 10-1 depicts the way in which Terracotta instruments Java `synchronized`\
    \ blocks.\n\n**Figure 10-1.** Terracotta hooks into the `MONITORENTER` and `MONITOREXIT`\
    \ bytecodes.\n\nTerracotta's virtual heap extends the utility of Java's built-in\
    \ thread coordination to allow threads on multiple JVMs to coordinate with each\
    \ other using exactly the same techniques as threads on the same JVM. This means\
    \ that the number of workers that can be brought to bear to execute your program\
    \ is no longer limited to the number of threads and processors available to a\
    \ single JVM; Terracotta lets your program, which was written to run on a single\
    \ JVM, run on many JVMs as if they were all one big JVM. The power of Terracotta's\
    \ virtual heap lies in this ability to write software for a single JVM but run\
    \ it on as many JVMs as you want—without the complexity and intrusiveness of a\
    \ special inter-JVM signaling and data-sharing framework.\n\n## Clustering Threads\n\
    \nTo see Terracotta inter-JVM thread coordination in action, let's look at a few\
    \ thread clustering examples.\n\n### Thread Coordination Using Concurrency Primitives\n\
    \nThe first example shows how to coordinate the actions of threads using just\
    \ the concurrency primitives available in JDK 1.4.2 and above. The code for this\
    \ example is available on this book's page at [http://www.apress.com](http://www.apress.com).\n\
    \nThis example contains a configuration file and a single Java class with a `main()`\
    \ method and some coordination code. The Java class is displayed in Listing 10-1.\n\
    \n**Listing 10-1.** `WaitNotify.java`\n\n```java\npackage org.terracotta.book.coordination.jdk14;\n\
    \n/**\n * This sample shows the use of wait and notify to coordinate 2 or more\
    \ processes\n * as if they were threads.\n * It also demonstrates how one might\
    \ share a clustered configuration\n * across processes in the same way that it\
    \ is shared across threads.\n *\n * In this case the passed in number of nodes\
    \ (2 by default) will startup\n * and wait for the number to join (like a cyclic\
    \ barrier).\n *\n *\n */\npublic class WaitNotify {\n    private static final\
    \ int MINIMUM_EXPECTED_PARTICIPANTS = 2;\n    private Configuration config;\n\
    \    private int nodesJoined;\n\n    public WaitNotify(Configuration aConfig)\
    \ {\n        this.config = aConfig;\n        synchronized (this.config) {\n  \
    \          config.setMyNodeID(++nodesJoined);\n            System.out.println(\"\
    Nodes Joined:\" + nodesJoined);\n            this.config.notifyAll();\n      \
    \  }\n    }\n\n    public void run() throws Exception {\n        synchronized\
    \ (config) {\n            while (nodesJoined < config.getTotalNodeCount()) {\n\
    \                System.out.println(\"Node \" + config.getMyNodeID()\n       \
    \             + \" is waiting for more nodes to join.\");\n                config.wait();\n\
    \            }\n            System.out.println(\"All \" + config.getTotalNodeCount()\n\
    \                + \" nodes joined! I'm node:\" + config.getMyNodeID());\n   \
    \     }\n    }\n\n    public static void main(String[] args) throws Exception\
    \ {\n        int expectedParticipants = MINIMUM_EXPECTED_PARTICIPANTS;\n     \
    \   if (args.length == 0) {\n            System.out.println(\"Node count NOT specified.\
    \ Setting count to \"\n                + MINIMUM_EXPECTED_PARTICIPANTS);\n   \
    \     } else {\n            try {\n                expectedParticipants = Integer.parseInt(args[0]);\n\
    \                if (expectedParticipants < 1) {\n                    throw new\
    \ Exception(\"Invalid node count\");\n                }\n            } catch (Exception\
    \ e) {\n                System.out.println(\"Invalid node count:\" + args[0]);\n\
    \                System.exit(1);\n            }\n        }\n        Configuration\
    \ c = new Configuration(expectedParticipants);\n        new WaitNotify(c).run();\n\
    \    }\n\n    private static class Configuration {\n        private int totalNodeCount;\n\
    \        private transient int myNodeID;\n\n        public Configuration(int totalNodeCount)\
    \ {\n            this.totalNodeCount = totalNodeCount;\n        }\n\n        public\
    \ int getMyNodeID() {\n            return myNodeID;\n        }\n\n        public\
    \ void setMyNodeID(int myNodeID) {\n            this.myNodeID = myNodeID;\n  \
    \      }\n\n        public int getTotalNodeCount() {\n            return totalNodeCount;\n\
    \        }\n    }\n}\n```\n\nThe `main()` method checks the command line arguments\
    \ for the number of participating threads, which, in the normal execution case,\
    \ will equal the number of participating JVMs. It then creates an instance of\
