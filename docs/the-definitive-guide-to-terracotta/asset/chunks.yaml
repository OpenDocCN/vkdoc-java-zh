    This example overrides the addInstrumentation() method in the bundle activator.
    First, it calls super.addInstrumentation() to add any standard instrumentation
    (at the moment, there is none). Next, you obtain your own bundle instance using
    the getExportedBundle() method, and finally, you replace the original org.myfavoriteframework.Impl
    with an alternate implementation.


