    让我们简要地看一下 `ehcache.xml` 配置文件。该文件包含两个块。第一个块定义了名为 `userCache` 的缓存的配置（即我们在代码中使用的那个）。


    第二个块包含一个默认配置，用于从 `CacheManager` 动态创建的未命名缓存。`ehcache.xml` 文件中必须包含 `defaultCache`
    定义。


    让我们详细检查一下在命名的 `userCache` 上设置的属性：


    • **maxElementsInMemory**：此属性设置内存中缓存的最大大小。


    • **memoryStoreEvictionPolicy**：将此属性设置为 `LFU` 表示当内存存储过大时，采用最不常用驱逐策略。


    • **eternal**：此属性可设置为指示元素应在缓存中永久存在，在这种情况下，后续的过期设置将无效。


    • **timeToIdleSeconds**：此属性设置一个项目在过期前，可以在缓存中未被使用的最大时间。


    • **timeToLiveSeconds**：此属性设置一个项目在缓存中可以存在的最大总时间，无论是否被使用。


    • **overflowToDisk**：此属性确定当缓存大小超过内存最大值时，是否应溢出到磁盘。


    • **diskExpiryThreadIntervalSeconds**：此属性设置后台磁盘过期线程运行间隔的秒数，该线程将清理磁盘上已过期的元素。

