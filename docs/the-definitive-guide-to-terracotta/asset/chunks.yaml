    3-9 所示。


    ![Image 12](img/index-89_1.jpg)


    986-1 CH03.qxd 5/5/08 9:13 AM Page 65


    第 3 章 ■ 初探 TERRACOTTA


    **65**


    **图 3-9.** *以 Terracotta 特性运行应用程序* 创建运行配置文件后，单击“运行”按钮。Eclipse 将启动一个完全配置、启用了 Terracotta
    的 `HelloClusteredWorld` 实例，该实例将连接到正在运行的服务器。你应该会看到熟悉的 `HelloClusteredWorld` 输出。如果你再次从“运行”菜单中选择“运行”，第二个集群化的
    `HelloClusteredWorld` 实例将启动，你会看到每个实例的输出每次循环前进两个字母，而不是一个。


    **对每位开发者的启示**


    `HelloClusteredWorld` 不仅帮助你清晰地理解 Terracotta 的工作原理，还展示了另一件事：它说明了集群化的规则正在改变。在第 1
    章中，你了解到集群基础设施的强大之处在于，应用程序可以同时具备可扩展性、高可用性和简单性。`HelloClusteredWorld` 展示了其中的两个维度。第一个维度是可扩展性。两个
    JVM 协同工作，各自完成构建缓冲区的一半工作。两者共同完成“Hello Clustered World!”这条消息的时间也缩短了一半。


    三个 JVM 将各自完成三分之一的工作，缓冲区填充时间也将缩短至三分之一。概括而言，应用程序的吞吐量增加了，因为与单个 JVM 相比，*n* 个服务器完成手头任务所需的时间仅为原来的
    *n* 分之一。


    986-1 CH03.qxd 5/5/08 9:13 AM Page 66


    **66**


    第 3 章 ■ 初探 TERRACOTTA


    该应用程序还通过透明性展示了简单性。考虑到该应用程序并非多线程，并且对这样一个简单的应用程序进行集群化似乎没有直接价值，它可能被认为是不可集群化的，或者非常像一个孤岛。然而，在运行时，我们仍然能够为
    `HelloClusteredWorld` 实现一种有价值的横向扩展概念。


    最后，我们留给你尝试停止并重启应用程序的练习，但你将在第 4 章中了解到，`buffer` 和 `loopCounter` 变量不仅在 JVM 进程间持久存在，而且在应用程序调用之间也持久存在。换句话说，如果
    `loopCounter` 在我们终止 Java 进程之前达到了 27，那么下次使用 `dso-java.sh` 调用 `HelloClusteredWorld`
    时，应用程序将从 `loopCounter` 为 27 而不是 0 开始。由于运行在 Terracotta 的集群基础设施内，`HelloClusteredWorld`
    具有高可用性和可重启性。


    在 `HelloClusteredWorld` 中展示的强大功能可以扩展到我们编写的大多数 Java 应用程序中。由于 Terracotta 能够集群化任何堆级别的对象和线程协调，大多数应用程序都可以利用这项技术服务。


    ■**注意** Terracotta 是一个纯 Java 解决方案，在 Terracotta 服务器进程内部以及应用程序 JVM 使用的 Java 引导类加载器和库中，都仅使用
    Java。Terracotta 无法集群化那些改变系统级资源的对象。Terracotta 定义的系统级资源包括套接字、文件、设备以及操作系统结构（如管道或共享内存）。Terracotta
    也无法窥探 JNI 库内部。应用程序可以在使用 Terracotta 的同时使用这些技术中的任何一种。Terracotta 只是无法看到，因此也无法挂钩这些技术可能对堆内存施加的更改。


    **总结**


    借助 Terracotta，在 JEE 容器中运行的企业级应用程序现在可以实现简单、可扩展、高可用的对象共享，而无需显式地使用对象关系映射器或 Bean 风格的编程。对于在
    JSE 容器中运行的应用程序也是如此。这种强大功能可以应用于从开源供应商和创建者那里下载的框架。Terracotta 可以对从第三方购买的 Java 应用程序进行集群化，即使原始软件供应商未曾考虑过横向扩展。而且，正如在
    `HelloClusteredWorld` 中那样，我们现在可以对在命令行运行的简单 Java `main()` 进行集群化。


    从一个原本不可集群化的应用程序中摆脱对可扩展性和高可用性的担忧，也能节省资金和时间。正如你在本章中所见，传统上，开发人员一直生活在与业务逻辑紧密耦合的集群化和可扩展性之中。


    这种紧密耦合给开发人员带来了负担，从设计阶段开始，一直持续到应用程序部署之后很久。具体来说，如果没有 Terracotta，开发人员和架构师必须选择 JDBC、JMS
    或类似技术来在进程间序列化和移动字节。


    在开发过程中，这些技术被集成到业务逻辑中。在质量保证阶段，应用程序必须以集群化的方式进行测试。测试非常具有挑战性，因为必须强力推动 JVM 以发现复制逻辑中的瓶颈，并且工作负载必须分布在试图更新相同对象的
    JVM 之间，然后我们才能确信应用程序中没有竞态条件或事务问题。


