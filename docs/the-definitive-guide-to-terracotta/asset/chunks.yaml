- fmt: '# Handling Real-World Challenges


    So far, we have built a distributed master/worker container ready for use, but
    we haven’t run it, because it is a very naïve implementation. Even though it implements
    a clustered Master/Worker pattern, it will not scale very well. Sending too much
    work to our current implementation will essentially bottleneck on our work queue.
    Bottlenecks in a framework designed to deliver linear scale block us from achieving
    our goals. The current implementation also doesn’t handle failure and resubmission
    of work.


    Now, we will refactor and extend our implementation a bit to address some of these
    challenges that are likely to arise if we were to use `SimpleQueue` in the real
    world solving real-world problems.


    We will look at the following challenges:


    - Very high volumes of data

    - Routing

    - Work failure and failover

    - Worker failure and failover

    - Dynamic cluster management (workers can attach and detach from the grid at run
    time)


    ## Refactoring for Large Workloads, Routing, and Work Failover


    The first challenge to tackle is scaling workload throughput linearly. What makes
    the `SimpleQueue` naïve is that it uses one queue for all masters and works to
    communicate through. Using one queue is like putting every employee of every company
    in the city of San Francisco on a bus together, driving each one to work, one
    at a time, while all the others wait for their turn to be dropped off at the office.
    Instead, we will minimize contention through queue striping techniques.


    ### Minimizing Contention and Maximizing Locality of Reference


    One of the main problems with our current implementation is that one queue is
    shared by all the masters and workers. This might give acceptable performance
    and scalability when used under a small to moderate work load. However, if we
    need to deal with very high volumes of data, the single queue will be a bottleneck.


    One solution is to stripe queues by creating one queue per worker and have the
    master do some more intelligent load balancing of work onto discrete work queues,
    one per worker.


    Partitioning data will enable the following:


    - *Maximized use of locality of reference*: If all work operating on the same
    data set is routed to the same queue with the same worker working on it, no workers
    will share objects across JVMs, and thus no object updates will result in cluster
    traffic to other nodes. This is a good start toward linear scale where each node
    must avoid conversations with other nodes.

    - *Minimized contention*: Since there will be only one reader and one writer per
    queue—the master on one end and the worker on the other—workers will not have
    to wait behind other workers to receive or respond to workload requests.


    To reduce the contention even more, we can split up each work queue into two queues,
    one for pending work requests from the master and the other one for completed
    work responses from the worker. This refactoring calls for a new abstraction that
    wraps up both queues as a single unit—let’s call this abstraction a `pipe`. We
    should go ahead and build some sort of `pipe` manager that holds on to and manages
    the different pipes. Each one of these pipes will be assigned a unique ID. Work
    will be routed to different queues according to predefined routing algorithms
    and failover schemes (something that we will talk more about later in this chapter).


    First, let’s introduce two new classes: `RoutableWorkItem` and `Pipe`. We’ll start
    with `RoutableWorkItem` in Listing 11-5, which extends our `DefaultWorkItem` class
    by adding a routing ID. The purpose of this ID is to decide on which pipe the
    master should send work. The routing ID also gives the master the ability to change
    the ID to reroute the work onto another pipe if necessary, normally due to worker
    failure, which we will take a look at later in this chapter.'
