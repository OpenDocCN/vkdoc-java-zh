    **64**


    C H A P T E R 3 ■ J U M P I N G I N TO T E R R A C OT TA


    Once the project has been created, create a new class called HelloClusteredWorld
    in the default package, and paste the source code from the last exercise into
    it. Now that we have the code in place, the Eclipse plug-in makes configuring
    and launching very simple.


    To configure the roots, right-click each root field and, in the Terracotta context
    menu, declare it to be a shared root, as shown in Figure 3-6.


    **Figure 3-6.** *Marking objects as Terracotta roots with Eclipse* Once you’ve
    configured the root fields, you should see an adornment in the left gutter of
    the editor that looks like a little object graph.


    Next, configure the main method for locking by right-clicking the method name
    and choosing Autolock from the Terracotta context menu, as shown in Figure 3-7.


    **Figure 3-7.** *Using Eclipse to mark methods and classes as locked in Terracotta*
    That’s it for the configuration. Now, let’s run it normally, without Terracotta,
    to make sure things are working properly. Go to the Run menu, and choose Run.
    You should see the familiar HelloClusteredWorld output.


    When we’re sure everything is working properly, it’s time to run the Terracotta
    server.


    Make sure no other Terracotta servers are running (for example, the one you started
    from the command line in the previous exercise), and choose the localhost server
    in the Terracotta menu, as shown in Figure 3-8.


    **Figure 3-8.** *Starting the Terracotta server inside Eclipse* With the server
    running, we can start some clients. To configure a run profile for a Terracotta-enabled
    HelloClusteredWorld instance, choose Open Run Dialog from the Run menu, and double-click
    Terracotta DSO Application, as shown in Figure 3-9.


    ![Image 12](index-89_1.jpg)


    986-1 CH03.qxd 5/5/08 9:13 AM Page 65


    C H A P T E R 3 ■ J U M P I N G I N TO T E R R A C OT TA


    **65**


    **Figure 3-9.** *Running the application with the Terracotta nature* When the
    run profile is created, click the Run button. Eclipse will launch a fully configured,
    Terracotta-enabled instance of HelloClusteredWorld that will connect to the running
    server. You should see the familiar HelloClusteredWorld output. If you choose
    Run again from the Run menu, a second clustered instance of HelloClusteredWorld
    will start, and you will see the output of each start to advance two letters each
    cycle instead of one.


    **Implications for Every Developer**


    HelloClusteredWorld helps make clear to you how Terracotta works, but the application
    also does something else. It illustrates that the rules for clustering are changing.
    In Chapter 1, you learned that the power of clustering infrastructure is that
    an application can be simultaneously scalable, available, and simple. HelloClusteredWorld
    has shown two of these dimensions. The first dimension is scalability. Two JVMs
    working together each do half the work of building the buffer. The two together
    complete the message “Hello Clustered World!” in half the time too.


    Three JVMs would each do a third of the work, and the buffer would be populated
    in one third the time. In generic terms, the application throughput increases
    because it takes one- *n* th the time for *n* servers to complete the task at
    hand versus a single JVM.


    986-1 CH03.qxd 5/5/08 9:13 AM Page 66


    **66**


    C H A P T E R 3 ■ J U M P I N G I N TO T E R R A C OT TA


    The application also illustrates simplicity through transparency. The application
    might be considered unclusterable or very much a silo with respect to the fact
    that it is not multithreaded and there is no upfront value in clustering such
    a simple application. At run time, it was possible to express a value-added notion
    of scale out to HelloClusteredWorld, nonethe-less.


    Last, we left the exercise of attempting to stop and restart the application to
    you, but you will learn in Chapter 4 that the buffer and the loopCounter variables
    persist across JVM


    processes as well as across application invocations. In other words, if the loopCounter
    were to reach 27 before we kill the Java process, the next time HelloClusteredWorld
    is invoked using dso-java.sh, the application would start with loopCounter at
    27, not 0. HelloClusteredWorld is highly available and restartable as a result
    of running inside Terracotta’s clustering infrastructure.


    The power shown in Hello Clustered World can be extended into most Java applications
    we write. Since Terracotta is capable of clustering any heap-level objects and
    thread coordination, most applications can leverage the technology service.


    ■**Note** Terracotta is a pure Java solution and uses only Java inside the Terracotta
    server process as well as the Java boot class loader and libraries used by the
    application’s JVM. Terracotta cannot cluster objects that mutate system-level
    resources. System-level resources in Terracotta’s definition include sockets,
    files, devices, and operating system constructs such as pipes or shared memory.
    Terracotta also cannot see inside JNI libraries. An application can use any of
    these technologies in the presence of Terracotta. Terracotta simply cannot see
    and thus is not able to hook into changes these technologies can apply to heap
    memory.


    **Summary**


    With Terracotta, simple, scalable, highly available object sharing is now available
    for enterprise applications running in a JEE container without the express need
    for object-relational mappers or bean-style programming. The same is true for
    applications running in a JSE container. The power can be delivered for frameworks
    downloaded from open source vendors and creators. Terracotta can cluster Java
    applications purchased from third parties, even if the original software vendor
    hasn’t thought about scale out. And, as in HelloClusteredWorld, we can now cluster
    a simple Java main() run at the command line.


    The ability to extract ourselves from scalability and availability concerns in
    an otherwise unclustered application saves money and time too. Developers have
    traditionally lived with clustering and scalability tightly coupled to business
    logic, as you have seen in this chapter.


    This tight coupling puts a burden on developers, starting in design and continuing
    long after application deployment. Specifically, without Terracotta, developers
    and architects have to select JDBC, JMS, or similar technologies for serializing
    and moving bytes between processes.


    During development, these technologies get integrated into the business logic.
    And during QA, the application must be tested in a clustered manner. Testing is
    quite challenging, because JVMs must be pushed hard to find bottlenecks in the
    replication logic, and workload must spread across JVMs attempting to update the
    same objects before we can be sure there are no race conditions or transactional
    issues with our application.


    986-1 CH03.qxd 5/5/08 9:13 AM Page 67


    C H A P T E R 3 ■ J U M P I N G I N TO T E R R A C OT TA


    **67**'
