- fmt: "# The Definitive Guide to Terracotta\n\n## Cluster the JVM™ for Spring, Hibernate,\
    \ and POJO Scalability\n\nDear Reader,\n\nDeveloping, maintaining, and operating\
    \ scalable and reliable Java™ applications is hard. Terracotta eases this challenge\
    \ by delivering distributed computing services as part of the JVM™. With Terracotta,\
    \ enterprise applications are written using simple Java constructs, allowing developers\
    \ to focus on business features.\n\nThe new power Terracotta gives to the JVM\
    \ relieves the database of the burden of providing application availability and\
    \ significantly reduces the cost of infrastructure. This power also benefits operations,\
    \ as distributed applications can be managed as a single logical unit, greatly\
    \ simplifying the task of managing enterprise applications.\n\nWe at Terracotta\
    \ have written this book to pass on the unique insights and experience we’ve gained\
    \ deploying and supporting Terracotta in a huge number of situations, from telecommunication\
    \ to financial services. We will take you through the whats, wheres, whens, and\
    \ whys of Terracotta to give you the skills you need to cluster your applications,\
    \ big or small.\n\nThis book has several pragmatic real-world case studies, which\
    \ will empower you to build highly scalable enterprise Java applications. We’ll\
    \ show you how to cluster everything from POJO applications to web applications\
    \ to Hibernate and Spring applications. Our final case study covers grid computing\
    \ using Terracotta, showing the power and elegance that Terracotta can bring to\
    \ distributed computing.\n\nThis breadth of coverage lets you take what you have\
    \ learned and apply it to your own projects in a wide variety of scenarios. Reading\
    \ the collective thoughts of the Terracotta team will equip you with the expertise\
    \ to deliver scalable, reliable enterprise applications.\n\nSincerely,\n\nTerracotta,\
    \ Inc.\n\n*Shows how to scale your critical Java™ applications for optimum performance\
    \ in an enterprise or web environment.*\n\n---\n\n**The Definitive Guide to Terracotta:\
    \ Cluster the JVM™ for Spring, Hibernate, and POJO Scalability**  \nCopyright\
    \ © 2008 by Terracotta, Inc.\n\nAll rights reserved. No part of this work may\
    \ be reproduced or transmitted in any form or by any means, electronic or mechanical,\
    \ including photocopying, recording, or by any information storage or retrieval\
    \ system, without the prior written permission of the copyright owner and the\
    \ publisher.\n\nISBN-13 (pbk): 978-1-59059-986-0  \nISBN-10 (pbk): 1-59059-986-1\
    \  \nISBN-13 (electronic): 978-1-4302-0640-8\n\nPrinted and bound in the United\
    \ States of America 9 8 7 6 5 4 3 2 1\n\nTrademarked names may appear in this\
    \ book. Rather than use a trademark symbol with every occurrence of a trademarked\
    \ name, we use the names only in an editorial fashion and to the benefit of the\
    \ trademark owner, with no intention of infringement of the trademark."
