    About Terracotta, Inc.


    Founded in 2003, **TERRACOTTA, INC**., is a private firm headquartered in San
    Francisco, California.


    Terracotta delivers runtime plug-in capacity and availability for Java applications.
    Terracotta products simplify development, testing, deployment, and management
    of enterprise Java applications by adding clustering and distributed computing
    services to the JVM, allowing application development to focus on business features.
    Terracotta customers include leaders in a number of industries such as the packaged
    software development, financial services, telecommunications, travel, and online
    entertainment sectors.


