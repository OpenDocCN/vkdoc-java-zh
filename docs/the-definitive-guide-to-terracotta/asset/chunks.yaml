    environment.'
  trans: '

    现在您已经安装了 Terracotta 并看到了欢迎界面，让我们来看看 Terracotta 安装目录的内容。需要注意的是，Terracotta 工具包包含了
    Terracotta 客户端功能（在 JVM 内部运行的库）和 Terracotta 服务器功能所需的一切。在典型的 Terracotta 部署中，每台运行启用
    Terracotta 的 JVM 的应用服务器机器上都会安装 Terracotta 工具包。同样，运行 Terracotta 服务器的机器也会安装 Terracotta
    工具包。然而，应用机器只会使用 Terracotta 工具包的客户端部分，而 Terracotta 服务器机器只会使用服务器部分。


    您会在 Terracotta 工具包中找到以下目录：


    bin：该目录包含运行各种 Terracotta 功能所需的所有脚本。每个脚本将在后续内容中详细介绍。


    config-examples：该目录包含各种类型 Terracotta 部署的示例配置文件。您可以将这些脚本用作起始模板，或仅作为参考示例。


    docs：该目录包含 Terracotta 工具包附带的一小部分文档。大部分 Terracotta 产品文档保存在 [`www.`](http://www)
    terracotta.org/ 网站上。


    lib：该目录包含 Terracotta 所依赖的所有 JAR 库。


    modules：该目录包含 Terracotta 工具包附带的任何预打包的 Terracotta 集成模块（TIM）。Terracotta 集成模块是 JAR
    文件，它将 Terracotta 配置与任何必要的支持代码及其他资源捆绑成一个单元，可以包含在您的 Terracotta 配置中。您可以将它们视为为第三方应用程序提供
    Terracotta 支持的插件。您也可以构建自己的 Terracotta 集成模块，以预打包您自己的启用 Terracotta 的库。有关 Terracotta
    集成模块以及现有与第三方技术的 Terracotta 集成的更多信息，请访问 [`www.`](http://www) terracotta.org/confluence/display/integrations/About
    网站。


    samples：该目录包含大量示例项目，演示了 Terracotta 的各种用法，包括源代码、Terracotta 配置和启动脚本。


    schema：该目录包含 Terracotta 配置文件的 XML 模式。


    tools：该目录包含用于探索 Terracotta 以及帮助配置 Terracotta 以实现 HTTP 会话集群的工具。


    vendors：该目录包含 Terracotta 安装中使用的第三方应用程序的资源。


    **Terracotta 脚本**


    重要的 Terracotta 脚本位于 bin 目录中。每个功能都有一个 Windows 批处理脚本和一个对应的 Unix 风格 shell 脚本。稍后，我们将通过探索欢迎界面来更详细地描述这些重要脚本。


    有关 Terracotta 脚本和工具的更详细且最新的描述，请参阅在线文档 [`www.terracotta.org/confluence/display/docs1/`](http://www.terracotta.org/confluence/display/docs1)
    Terracotta+Tools+Overview。


    为了让您入门，以下是主要的 Terracotta 脚本，按字母顺序排列：admin.[bat|sh]：启动 Terracotta 管理控制台。管理控制台是一个
    Java 程序，通过 JMX 连接到 Terracotta 服务器，并从正在运行的 Terracotta 集群接收遥测数据。


    archive-tool.[bat|sh]：用于打包 Terracotta 部署的所有相关数据和配置文件，以供诊断之用。


    boot-jar-path.[bat|sh]：这是一个辅助脚本，用于设置引导 JAR 位置的环境变量，并在必要时创建引导 JAR。此脚本不适用于独立使用。它被其他脚本用于帮助设置
    Terracotta 环境。

    '
- fmt: "# dso-env.[bat|sh]\n\n`dso-env.[bat|sh]`脚本会打印出启动支持Terracotta的JVM所需的JVM参数，这些参数相对于调用脚本的工作目录。您可以使用此脚本确定要传递给应用程序启动脚本的适当JVM参数。例如，如果您在Tomcat中运行支持Terracotta的应用程序，可以将`dso-env`脚本的输出粘贴到`catalina.sh`脚本中，如下所示；作为副作用，如果boot\
    \ JAR尚不存在，此脚本将创建它：\n\n```\nexport \\\nJAVA_OPTS=\"-Xbootclasspath/p:/usr/local/terracotta/lib/dso-boot/my-boot-jar.jar\
    \ \\\n-Dtc.install-root=/usr/local/terracotta -Dtc.config=localhost:9510\"\n```\n\
    \n# dso-java.[bat|sh]\n\n这是一个便捷脚本，您可以使用它来启动应用程序，而不是使用`java`命令。它将调用您发行版中的`java`命令，并尽可能设置好Terracotta环境。\n\
    \n# make-boot-jar.[bat|sh]\n\n这将创建Terracotta boot JAR。您可以选择传入一个配置文件，该文件描述要将哪些额外的类放入boot\
    \ JAR，以及非默认的boot JAR文件名和位置。\n\n# run-dgc.[bat|sh]\n\n默认情况下，分布式垃圾收集器会按设定的时间间隔在Terracotta服务器中运行。此脚本将立即使Terracotta垃圾收集器周期开始执行。\n\
    \n# scan-boot-jar.[bat|sh]\n\n这是一个辅助脚本，供其他工具用于验证Terracotta boot JAR的有效性。它将根据L1配置验证boot\
    \ JAR文件的内容。它会列出在Terracotta配置文件的`<additional-boot-jar-classes/>`部分中声明但未包含在boot\
    \ JAR中的所有类，以及boot JAR中未在`<additional-boot-jar-classes/>`部分中列出的类。如果boot JAR文件不完整，则返回退出码1；否则，退出码为0。\n\
    \n# start-tc-server.[bat|sh]\n\n这将启动Terracotta服务器。\n\n# stop-tc-server.[bat|sh]\n\
    \n这将停止Terracotta服务器。\n\n# version.[bat|sh]\n\n这将打印当前的Terracotta版本。\n\n# Unix环境下的Hello\
    \ Clustered World分步指南\n\n在本章开头，我们介绍了标准的“hello, world”程序。为了清晰起见，我们省略了关于如何运行它的具体说明。现在让我们回到Hello\
    \ Clustered World，并逐步进行，探索如何让它运行起来的细节。第一次尝试，我们将只使用文本编辑器和命令行工具。然后，我们将探索如何使用Terracotta\
    \ Eclipse插件在Eclipse IDE中运行它。\n\n## 创建项目骨架\n\n第一步是创建一个如下所示的项目目录骨架：\n\n```\nhello_clustered_world/build\n\
    hello_clustered_world/src\nhello_clustered_world/src/HelloClusteredWorld.java\n\
    hello_clustered_world/tc-config.xml\n```\n\n创建一个名为`hello_clustered_world`的顶级项目目录。在该目录下，创建一个名为`build`的目录，用于存放编译后的类。同样在顶级目录下，创建一个名为`src`的目录，用于存放Java源文件。我们稍后将创建`tc-config.xml`文件。\n\
    \n## 创建HelloClusteredWorld.java\n\n项目骨架创建完成后，使用您喜欢的文本编辑器，在`src`目录下创建一个名为`HelloClusteredWorld.java`的文件。在其中输入以下代码：\n\
    \n```java\npublic class HelloClusteredWorld {\n    private static final String\
    \ message = \"Hello Clustered World!\";\n    private static final int length =\
    \ message.length();\n    private static char[] buffer = new char [length ];\n\
    \    private static int loopCounter;\n\n    public static void main( String args[]\
    \ ) throws Exception {\n        while( true ) {\n            synchronized( buffer\
    \ ) {\n                int messageIndex = loopCounter++ % length;\n          \
    \      if(messageIndex == 0) java.util.Arrays.fill(buffer, '\\u0000');\n     \
    \           buffer[messageIndex] = message.charAt(messageIndex);\n           \
    \     System.out.println( buffer );\n                Thread.sleep( 100 );\n  \
    \          }\n        }\n    }\n}\n```\n\n保存文件后，使用以下命令编译程序（确保您的工作目录是顶级项目目录）：\n\
    \n```\n%> javac -d build/ src/HelloClusteredWorld.java\n```\n\n现在，您应该在`build`目录中有一个名为`HelloClusteredWorld.class`的文件。现在，我们可以将其作为普通Java进程运行，如下所示（再次确保您的工作目录是顶级项目目录）：\n\
    \n```\n%> java -cp build HelloClusteredWorld\n```\n\n输出如下：\n\n```\nH\nHe\nHel\n\
    Hell\nHello\nHello \nHello C\nHello Cl\nHello Clu\nHello Clus\nHello Clust\nHello\
    \ Cluste\nHello Cluster\nHello Clustere\nHello Clustered\nHello Clustered \nHello\
    \ Clustered W\nHello Clustered Wo\nHello Clustered Wor\nHello Clustered Worl\n\
    Hello Clustered World\nHello Clustered World!\nH\nHe\nHel\nHell\nHello\n```\n\n\
    ## 创建Terracotta配置\n\n下一步是创建Terracotta配置文件。在文本编辑器中，在顶级项目目录中创建一个名为`tc-config.xml`的文件。一个很好的起点是Terracotta工具包中的POJO示例配置文件：`config-examples/tc-config-pojo.xml`。将该配置文件的内容复制到当前在文本编辑器中打开的`tc-config.xml`文件中。我们需要对此模板配置进行一些修改，使其适用于`HelloClusteredWorld`。\n\
    \n> **注意**：您可以在线获取Terracotta配置的完整参考指南，网址为：[http://www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference](http://www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference)。\n\
    \n## 使Terracotta服务器以持久模式运行\n\n配置文件分为两个主要部分，一个用于服务器，一个用于客户端——从Terracotta的角度来看，运行应用程序的JVM是客户端；尽管从应用程序开发者的角度来看，这些JVM被称为应用服务器。第一个修改将针对配置文件的服务器部分。\n\
    \n`/tc:tc-config/servers`部分可以包含多个服务器条目，其中之一是主活动服务器。如果有多个服务器条目，客户端将按顺序尝试连接它们，直到连接到活动服务器。如果活动服务器变得不可用，客户端将尝试此处描述的每个其他服务器，直到它们连接到新的活动服务器。然而，在此示例中，我们将只使用单个服务器。\n\
    \n现有的服务器配置节`/tc:tc-config/servers/server`已经包含了一些配置信息，即`data`和`logs`元素。`/tc:tc-config/servers/server/data`元素决定了Terracotta服务器将写入Terracotta集群数据（集群对象数据、连接的客户端数据等）的位置。`/tc:tc-config/servers/server/logs`元素决定了Terracotta服务器应将其日志写入哪个目录。\n\
    \n默认情况下，Terracotta服务器未配置为将集群状态持久化到永久存储。这意味着如果Terracotta服务器重新启动，它将从头开始，没有集群应用程序状态。这相当于重新启动单个JVM：先前实例的所有内存都被清空。"
  raw: 'dso-env.[bat|sh]: The dso-env.[bat|sh] script prints out the JVM arguments
    required to launch a Terracotta-enabled JVM relative to the working directory
    from which the script is invoked. You can use this script to determine the appropriate
    JVM arguments to pass to your application’s start-up scripts. For example, if
