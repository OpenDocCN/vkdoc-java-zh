- fmt: "That’s it. Now, let’s try to run it as a distributed spider that can scale\
    \ out by distributing out the page processing and data aggregation onto multiple\
    \ nodes. We can reuse the `tc-config.xml` from the previous sections, but we have\
    \ to add a couple of include statements to add a couple of include statements\
    \ to tell Terracotta to include our spider classes for instrumentation as well\
    \ as a third-party JAR (for Jericho) that we have used to parse the pages. When\
    \ we ran the spider, we also realized that we have to add the `commonj.work.WorkException`\
    \ for instrumentation to allow the spider’s state to be managed by Terracotta\
    \ (in case of a `Work` failure); for example, its state can be sent over the wire,\
    \ from the worker to the master.\n\n```\n<instrumented-classes>\n  <include>\n\
    \    <class-expression>org.terracotta.book.masterworker..*</class-expression>\n\
    \    <honor-transient>true</honor-transient>\n  </include>\n  <include>\n    <class-expression>au.id.jericho..*</class-expression>\n\
    \  </include>\n  <include>\n    <class-expression>commonj.work.WorkException</class-expression>\n\
    \  </include>\n</instrumented-classes>\n```\n\nWhen we run the master and the\
    \ worker, we have to feed this XML configuration to Terracotta with a call to\
    \ `dso-java`. You would normally start up many workers and have each one of them\
    \ up and running for a long period of time serving multiple master initiated sessions.\
    \ For example purposes, here is how to start a single worker and a single master\
    \ instance:\n\n```\ndso-java -Dtc.config=tc-config.xml -cp ... \\\norg.terracotta.book.masterworker.spider.StartWorker\n\
    \ndso-java -Dtc.config=tc-config.xml -cp ... \\\norg.terracotta.book.masterworker.spider.StartMaster\n\
    ```\n\n## When Not to Use the Master/Worker Pattern\n\nIn working with large-scale\
    \ use cases in financial services and telecommunications industries, we have developed\
    \ best practices around where Terracotta is most effective and, additionally,\
    \ where the Terracotta Master/Worker approach should not be used. The two biggest\
    \ cautions for developers are around rogue clients and WAN load balancing. Because\
    \ Terracotta is an extension of your application memory, the Master/Worker pattern\
    \ is focused on somewhat uniform large grids of servers in reasonably close proximity\
    \ to each other.\n\nRogue clients were first a demonstrable problem when a Terracotta\
    \ developer built a distributed cache where some nodes in the cluster were servers\
    \ in a data center while others were end users’ laptops. When the laptops were\
    \ shut down for the day, the cluster would stop running. We commonly refer to\
    \ these laptops as rogue clients. A similar problem arises in slow consumption\
    \ off the queue. If some servers in your grid are eight core and have 16 gigabytes\
    \ of RAM while others are two core and have 2 gigabytes of RAM, the two classes\
    \ of machine will work at different speeds. The slower consumer will throttle\
    \ Terracotta’s entire grid to its speed unless perfectly partitioned in its work.\n\
    \nThe Master/Worker pattern seems like a perfect way to sandbox or otherwise fence\
    \ off these rogue clients and slow consumers, and it does work in many cases.\
    \ But be cautioned that as soon as rogue and slow consuming clients, acting as\
    \ workers, begin to share data with any node other than a master, these slower\
    \ nodes will slow down their peers in the grid.\n\nAs for WAN, the Master/Worker\
    \ pattern is simply insufficient. In fact, WAN-based replication should be done\
    \ with messaging services. Interestingly, if you take the Master/Worker pattern\
    \ and customize it as we have shown, you can create what we call a “worker on\
    \ the edge.” Imagine building a cluster with POJO/Terracotta-based workers who\
    \ communicate using a linked blocking queue and simultaneously act as a bridge\
    \ on the WAN. These bridge workers would take messages off of the local grid and\
    \ relay them to another grid across the WAN. Thus the nomenclature: these special\
    \ bridging-workers are on the edge of your local datacenter’s grid.\n\n## Summary\n\
    \nIn this chapter, you learned how to extend your skills from Chapters 5 through\
    \ 10 to use Terracotta for scaling out POJO-based applications and a host of popular\
    \ frameworks. Now, you should also be able to use Terracotta for multithreaded,\
    \ multi-JVM, scaled out custom processing.\n\nData grids and compute grids built\
    \ on Terracotta are highly flexible, because every aspect of the framework is\
    \ open and in your control. You decide what the unit of work is. You decide the\
    \ batching levels. You decide on the routing capabilities, and you edit the interfaces\
    \ as you see fit.\n\nYou learned how to scale your grid using only one Terracotta\
    \ server by simply tuning the locality and granularity of your grid operations.\
    \ While Terracotta requires more custom code when used in grid use cases than\
    \ when with other enterprise use cases, the resulting applications and frameworks\
    \ remain flexible and easy to understand and maintain.\n\nIn Chapter 12, you will\
    \ learn the one remaining technique you will need for tuning and scaling applications:\
    \ visualization techniques and tools are important to understanding what a cluster\
    \ is doing and why it is going fast or slow. Visualization is especially valuable\
    \ for grids where the application is never contained on any one node but is, in\
    \ fact, a loosely coupled grid of nodes working together as one big server. Visualization\
    \ is the only way to understand what a grid is doing. Let’s take a look at visualization\
    \ and general tuning techniques now.\n\n# Visualizing Applications\n\n**T**uning\
    \ applications that run in a cluster is hard. What makes tuning difficult is that\
    \ the application is a logical entity running across processes and machines, while\
    \ the available tools work almost exclusively at the process or machine level.\n\
    \nFor example, you know from Chapter 5 that Terracotta helps distribute application\
    \ cache data. We also know an application that accesses the cache in a random\
    \ way will not scale, because the objects have to move around the cluster through\
    \ the Terracotta server. But none of the tools that exist for performance tuning\
    \ (including CPU and memory monitoring tools, JVM heap monitoring tools, and Java\
    \ application profilers) would show that a distributed cache is slow, because\
    \ random JVMs in a cluster keep updating the cache contents in a manner requiring\
    \ notification to all other JVMs in the cluster.\n\nThis lack of tools for tuning\
    \ and optimizing clustered applications led to the creation of clusterwide visualization\
    \ tools at Terracotta. The idea is to stack all the relevant metrics and measurements\
    \ a developer should be observing for every JVM in a single dashboard view along\
    \ with the activities of the Terracotta server. Through visualization, we can\
    \ study an application quite literally as it runs, without building custom tools\
    \ to do so.\n\nIn this chapter, we will work with a derivative of the inventory\
    \ application from Chapter 8.\n\nThis demonstration will be altered so that it\
    \ can generate lots of changes to objects and so that those changes can be either\
    \ random or highly focused on specific objects. You will learn how to use Terracotta’s\
    \ tools to help visualize and point out what is causing slowness in various scenarios.\
    \ By the end of the chapter, you should be comfortable with the concept of cluster\
    \ visualization and, further, be able to apply the tools to solving real problems.\n\
    \n## Observing an Application\n\nIn the practice of medicine, the concept underlying\
    \ observing the electrical patterns transmitted by the body is that doctors can\
    \ attach to key points on the body and visualize key information that helps determine\
    \ what the heart and brain are doing. With applications, we can do the same. Specifically,\
    \ it is possible to connect to key data points in the application stack and, by\
    \ taking repeated measurements over time, learn what the application is doing."
