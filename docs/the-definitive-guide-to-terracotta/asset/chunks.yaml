    ## 对每位开发者的启示


    `HelloClusteredWorld`不仅帮助你清晰地理解Terracotta的工作原理，还展示了另一件事。它说明了集群化的规则正在改变。在第1章中，你了解到集群基础设施的强大之处在于，应用程序可以同时实现可扩展性、高可用性和简单性。`HelloClusteredWorld`展示了其中的两个维度。第一个维度是可扩展性。两个JVM协同工作，各自完成构建缓冲区的一半工作。两者共同完成消息“Hello
    Clustered World!”的时间也缩短了一半。


    三个JVM将各自完成三分之一的工作，缓冲区填充时间将缩短为原来的三分之一。概括来说，应用程序的吞吐量增加了，因为对于手头的任务，*n*个服务器完成所需的时间是单个JVM的*n*分之一。


    该应用程序还通过透明性展示了简单性。这个应用程序可能被认为是不可集群化的，或者就它并非多线程且集群化这样一个简单的应用程序没有前期价值而言，它非常像一个孤岛。然而，在运行时，仍然有可能向`HelloClusteredWorld`表达一种增值的横向扩展概念。


    最后，我们留给你尝试停止并重启应用程序的练习，但你将在第4章中了解到，`buffer`和`loopCounter`变量不仅在JVM进程间持久化，而且在应用程序调用之间也持久化。换句话说，如果在我们杀死Java进程之前`loopCounter`达到了27，那么下次使用`dso-java.sh`调用`HelloClusteredWorld`时，应用程序将从`loopCounter`等于27开始，而不是0。由于在Terracotta的集群基础设施内运行，`HelloClusteredWorld`具有高可用性和可重启性。


    在`Hello Clustered World`中展示的强大功能可以扩展到我们编写的大多数Java应用程序中。由于Terracotta能够集群化任何堆级别的对象和线程协调，大多数应用程序都可以利用这项技术服务。


    > **注意** Terracotta是一个纯Java解决方案，在Terracotta服务器进程内部以及应用程序JVM使用的Java引导类加载器和库中，都只使用Java。Terracotta无法集群化那些改变系统级资源的对象。Terracotta定义的系统级资源包括套接字、文件、设备以及操作系统结构（如管道或共享内存）。Terracotta也无法看到JNI库内部。应用程序可以在使用Terracotta的同时使用这些技术中的任何一种。Terracotta只是无法看到，因此也无法挂钩这些技术可能对堆内存所做的更改。


    ## 总结


    借助Terracotta，现在可以在JEE容器中运行的企业应用程序实现简单、可扩展、高可用的对象共享，而无需显式地使用对象关系映射器或Bean风格的编程。对于在JSE容器中运行的应用程序也是如此。这种强大功能可以应用于从开源供应商和创建者那里下载的框架。Terracotta可以集群化从第三方购买的Java应用程序，即使原始软件供应商没有考虑过横向扩展。而且，就像在`HelloClusteredWorld`中一样，我们现在可以在命令行集群化一个简单的`Java
    main()`运行。


    将我们从原本非集群化应用程序的可扩展性和可用性担忧中解脱出来，也节省了金钱和时间。正如你在本章中所见，传统上，开发人员一直将集群化和可扩展性与业务逻辑紧密耦合在一起。


    这种紧密耦合给开发人员带来了负担，从设计阶段开始，一直持续到应用程序部署之后很久。具体来说，如果没有Terracotta，开发人员和架构师必须选择`JDBC`、`JMS`或类似技术来序列化并在进程之间移动字节。在开发过程中，这些技术被集成到业务逻辑中。在QA期间，应用程序必须以集群方式进行测试。测试非常具有挑战性，因为必须强力推动JVM以发现复制逻辑中的瓶颈，并且工作负载必须分布在试图更新相同对象的JVM之间，然后我们才能确定应用程序中没有竞态条件或事务问题。'
