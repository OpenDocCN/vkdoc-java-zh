    of these classes in the](http://asm.objectweb.org) TIM source code. Take a look
    at the Ehcache TIM or the Lucene TIM in the Terracotta Forge, as both use ASM
    and create custom visitors. The possibilities are effectively unlimited—class
    adapters can add, remove, and modify fields, methods, bytecode within methods,
    access modifiers, and so on.


