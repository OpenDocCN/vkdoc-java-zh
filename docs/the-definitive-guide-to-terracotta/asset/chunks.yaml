    the JVM, we have extracted much of the complexity of distributed computing from
    application-level code where explicit enterprise frameworks have traditionally
    forced it to live. Instead, distributed computing becomes an inherent feature
    of the JVM rather than an explicit problem to be solved inside the application.


    **An Example of Clustered POJOs**


    To explore the simplicity of using clustered POJOs, let’s look at an in-depth
    example. This example is a simplified version of a retail system with a catalog
    of products that can be added to a shopping cart by a customer. At any time, an
    operator may view any or all of the active shopping carts. The sample code is
    written using simple Java data structures. Some of the problem domain is idealized
    for simplicity. For example, the business data encapsulated in the product, catalog,
    customer, and order classes in a real system would likely be backed by a relational
    database and perhaps be fronted by an object-relational system like Hibernate,
    as described in Chapter 6\. The transient shopping cart data, though, might very
    well be best expressed purely as simple Java objects with no backing system of
    record.


