    algorithms, such as these:


    • *Round-robin balancing*: The Router loops through all queues one by one. This
    is probably the least useful strategy; it’s only useful if the work items have
    no state to share (i.e., they are embarrassingly parallel).


    • *Workload-sensitive balancing*: The Router looks at queue depth and always sends
    the next pending work item to the shortest queue.


