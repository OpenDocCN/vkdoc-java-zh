    这个示例可以通过直接对 JDBC API 进行编程来简单实现。当然，这种方法虽然简单，但无法提供良好的性能，尤其对于那些在每次会话请求中需要进行大量细粒度更改的应用程序而言。对于复杂的应用程序，手动管理
    JDBC 通常并不像这个简单示例所暗示的那样容易。


    **图 6-2.** *基准 JDBC 应用程序执行了九次 SQL 调用。*


    986-1 CH06.qxd 5/27/08 7:34 PM 第 135 页


    第 6 章 n HIBERNATE 与 TERRACOTTA


    **135**


    我们来总结一下这种方法：该应用程序总共执行了九次操作。其优点是简单，但扩展性很差。因此，这种应用程序在简单性上的权衡体现在其性能上。JDBC 易于使用，但我们很快就会发现，无论是在应用程序复杂性还是性能方面，它都无法很好地扩展。


    这个应用程序不存在集群方面的问题。多个系统可以直接使用 JDBC，开发人员几乎无需考虑其他因素，只需处理提交时的异常即可。


    此外，Terracotta 在这个基准应用程序中实际上也帮不上什么忙（当然，可以使用本书其他章节已经讨论过的任何 POJO 技术直接缓存对象）。该应用程序设计为利用数据库来实现高可用性和可扩展性，但一个可扩展的高可用性数据库实例每年的运行成本可能高达数百万美元——因此我们需要寻找更好的解决方案。


    **添加 Hibernate 以节省三次数据库调用**


    如图 6-3 所示，仅仅添加 Hibernate 就减少了数据库操作的总数，因为 Hibernate 不会为每次更新都执行一次数据库操作，而是将这些更新存储在第一级缓存中，并在事务提交时将它们全部作为一个*工作单元*推送出去。这一节省将我们之前的示例从九次操作减少到了六次。


    **图 6-3.** *Hibernate 应用程序仅执行了六次 SQL 调用。*


    在我们之前简单的 JDBC 应用程序中添加 Hibernate，消除了每次提交操作之前对数据库的中间更新。请注意，在图 6-3 中，应用程序中的更新仅发送到
    Hibernate，而不会传递到底层数据库。


    Hibernate 能够跳过更新数据库，直到开发人员调用 commit() 方法，这有助于使应用程序运行得更快。除了这一性能优势之外，Hibernate 还可以从你的代码库中抽象出大部分数据库接口。


    986-1 CH06.qxd 5/27/08 7:34 PM 第 136 页


    **136**


    第 6 章 n HIBERNATE 与 TERRACOTTA


    虽然直接的 JDBC 是更容易理解的实现方式，但许多人会认为 Hibernate 同时使应用程序性能更好且更易于维护，因为它消除了对数据库的冗余 SQL 调用，并且无需编写自定义
    SQL 代码。此外，这种架构在集群方面并不比基于 JDBC 的对应架构更难。


    有趣的是，图 6-2 和图 6-3 中描述的虚构应用程序尚未能够以任何显著方式利用 Terracotta。Terracotta 旨在为大多数应用程序提供高可用性和可扩展性，但这种架构（如
    JDBC 示例）已经隐式地使用数据库来实现这一点。同样，为了获得真正的可用性和可扩展性，我们必须考虑更昂贵的解决方案来增强基本数据库服务器，例如用于可用性的
    SAN 存储和用于可扩展性的数据库集群。


    **启用二级缓存以节省五次 SQL 调用**


    如图 6-4 所示，一旦启用二级缓存，应用程序会记住先前会话请求期间查询过的数据，从而消除对数据库的冗余查询，并将操作总数从九次减少到六次，现在进一步减少到四次。


    **图 6-4.** *二级缓存应用程序仅执行了四次 SQL 调用。*

