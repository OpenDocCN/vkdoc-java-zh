    \n## Simultaneous Linear Scalability and High Availability\n\nBalancing scalability\
    \ and availability is traditionally a hard problem. Linear scalability requires\
    \ throughput to remain constant as more resources are brought to bear to meet\
    \ application load; this scalability is typically achieved by sharing no information\
    \ or objects across application server instances. High availability requires that\
    \ application state be available on every application server instance and conflicts\
    \ with linear scalability as a result. Nevertheless, in the web application world,\
    \ you must find a way to add application servers as your web traffic increases\
    \ without introducing replication overhead while doing so. High availability demands\
    \ that you should also be able to serve any request from any application server,\
