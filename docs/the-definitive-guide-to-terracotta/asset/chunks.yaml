    杰夫成功地将开源开发的努力、倡议和成功案例引入了多家全球 2000 强企业，为这些组织节省了数百万美元的许可成本。


    **第十七页**


    986-1 FM.qxd 5/31/08 9:19 PM 第 xviii 页


    986-1 FM.qxd 5/31/08 9:19 PM 第 xix 页


    引言


    **想**象一下，你可以在一个 JVM 中对一个 Java 对象调用 `wait()`，然后想象在另一台计算机的另一个 JVM 中，有一个线程对同一个对象调用了
    `notify()`，并且这个 `notify()` 调用穿透了两个 JVM 之间不可逾越的进程边界，将你的线程从沉睡中唤醒。再想象一下，在你等待期间，另一个
    JVM 中对那个对象所做的所有更改，现在对你的线程都是可见的。现在想象一下，你为实现这一切所编写的代码，*看起来*与这个程序仅在单个 JVM 上运行时你可能会编写的代码*毫无二致*——无需对特殊框架做出妥协，无需调用特殊
    API，无需存根，无需骨架，无需复制，无需回写，也无需魔法豆。


    如果你能自动在虚拟机之间共享 Java 堆，使得运行在不同 JVM 中的线程能够像在同一个 JVM 中运行一样相互交互，那会是什么样子？想象一下，拥有这种能力你能做什么——这种能力让你能够以尽可能简单的术语来表达一个计算问题，同时忠实于手头的问题，却又能够同时在多台计算机上运行该程序，而程序本身却认为自己是在一台大型计算机上运行。这会是什么样的东西？而且，如果能够拥有它，你难道不是真的、真的想要它吗？


    Terracotta 正是诞生于这样的想象之中。


    Terracotta 是一款 Java 基础设施软件，它允许你将应用程序扩展到任意数量的计算机，而无需昂贵的定制代码或数据库。在本书中，它被称为 JVM 级集群或网络附加内存。你现在面临的问题是如何理解并最好地利用这项技术。


    本书的目标就是帮助你回答这个问题。尽管该产品已经投入了总计近五十人年的工程开发，但迄今为止关于 Terracotta 的文档记录却非常少。经过多年的地下实验室工作和数百次生产环境部署，Terracotta
    的作者团队汇聚一堂，撰写了这本关于 Terracotta 的权威指南。本书将帮助你学习该技术的官方定义和详细架构。它还将引导你了解 JVM 级集群最流行的应用场景。


    它将教你如何调优和管理运行在 Terracotta 环境中的生产应用程序。


    请将本指南视为一个入口。Terracotta 是一种基础设施，就像数据库、文件服务器甚至网络交换机一样。借助它，你可以实现许多功能，设计许多不同的用例。任何声称适用于所有用例的技术都应谨慎看待。我们推出这本著作，是为了帮助你理解并在特定用例中信任
    Terracotta。虽然文件服务器和关系数据库在过去 30 年中取得了巨大成功，但它们也被不同程度地滥用（例如，我们见过一个关系数据库每天处理 15 亿次插入，其中填充的数据仅保留
    30 天，这一切都是通过禁用回滚实现的）。我们认识到，数据库之所以成功，是因为一个开发者社区围绕这一概念团结起来，构建了一套共享的工具集，并理解了数据库在哪些地方适用，哪些地方不适用。


    **第十九页**


    986-1 FM.qxd 5/31/08 9:19 PM 第 xx 页


    **第二十页**


    n 引言


    Java 社区是理解数据库技术的入口。


    社区成员共同帮助彼此设计被普遍认为是成功的系统。Terracotta 发明了新的术语——自称为网络附加内存。因此，社区需要一个立足点来建立关于这个新事物（即网络附加内存）的共享知识。本书是你进入网络附加内存世界及其所代表力量的入口。请利用它来开启关于
    JVM 级集群方法优劣用例的讨论和思考过程。


    我想，是时候举个例子了。（顺便说一句，在本书中，我们主要通过示例进行交流。希望这种教学风格对你有所帮助。）工程师 A 想要使用 Terracotta 作为互联网上的点对点通信协议，将电影流式传输到网络浏览器。与此同时，工程师
    B 想要使用 Terracotta 来维护其应用程序配置数据的集中式或共享视图，而无需单独维护每个 JVM 的系统属性或基于 XML 的配置。工程师 C 想要使用
    Terracotta 将其 Web 应用程序当前的无状态架构替换为更自然的有状态架构。该产品将以最小的初始工作量集成到每位工程师的应用程序中，那么工程师 A、B
    或 C 如何知道会发生什么？对于工程师 A 来说，Terracotta 会显得不稳定、缓慢且通常笨重，而对于工程师 B 和 C 来说，Terracotta
    则近乎理想。


    如果你能区分这些应用程序模式之间的差异，那么你就算得上是少数派了。如果你目前正在为运行在 Terracotta 上的应用程序而苦恼，或者正在考虑在何处使用它、在何处不使用它，那么本指南代表了关于该主题的最前沿思考。


    在这里，你将学习几个使用 Terracotta 的流行案例。你将详细了解如何在每种情况下配置系统，并且你将了解是什么细节使得该案例成为潜在的成功案例或最佳应用点。


    到本书结束时，你将能够自己识别这些模式，并且能够帮助你的朋友也理解其中的差异。对于我们这些在 Terracotta 工作的人来说，这是一个激动人心的时刻。我们正在讨论并向你建议的概念并非全新或激进。产品中所体现的概念——集中管理、有状态开发、无状态运行时等等——从未像这样被整合或打包在一起。正是这种方法和技术的组合使得
    Terracotta 令人兴奋。向应用程序开发团队传达这项技术提供的新功能既充满挑战又富有回报。我们希望你觉得这本书读起来和我们写它时一样引人入胜。


    在你的帮助下，这将是关于 Terracotta、网络附加内存和 JVM 级集群主题的几本书中的第一本。


    **本书结构**


    本书结构如下：


    •   *第 1 章，理论与基础*：我们首先探讨 Terracotta 是什么及其背后的理论。

    •   *第 2 章，Terracotta 的历史*：本章简要介绍 Terracotta 的历史，为本书其余部分提供背景。

    •   *第 3 章，快速上手 Terracotta*：在本章中，我们将进入 Terracotta 的实践环节，介绍其配置的基本概念，并展示一个 Terracotta
    集群的简单示例。


    986-1 FM.qxd 5/31/08 9:19 PM 第 xxi 页


    n 引言


    **第二十一页**


    •   *第 4 章，POJO 集群*：这一实践章节涵盖了如何对现有 POJO 应用程序进行集群。

    •   *第 5 章，缓存*：本章解释了如何使用 Terracotta 来缓解缓存中固有的一些问题，以及如何将缓存的好处带给分布式系统。

    •   *第 6 章，Hibernate 与 Terracotta*：在本章中，我们将向你展示如何扩展启用了 Hibernate 的应用程序。我们将介绍 Hibernate
    所基于的概念，以便你全面理解使用 Hibernate 进行集群。

