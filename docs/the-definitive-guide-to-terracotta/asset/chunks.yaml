- fmt: "# Extending HTTP Sessions with Terracotta\n\nEach user that interacts with\
    \ a web site is by definition anonymous until he has identified himself. This\
    \ is a fundamental difference with desktop applications, where the interacting\
    \ user is trusted as long as the operating system authenticates the user at login\
    \ time and grants him access to his documents. A web application relies on a server\
    \ that is accessed by many users, from many computers and devices, from anywhere.\
    \ This makes it more difficult to know who actually has access to which data.\
    \ The HTTP specification doesn’t facilitate this, causing people to resort to\
    \ custom solutions for this problem. The solution that has historically gained\
    \ the most traction is to give users a cookie with a unique identifier as soon\
    \ as they start using the application. The web browser presents this unique identifier\
    \ each time the user interacts with the web application. The logic on the server\
    \ is then able to look up the data that corresponds to the ticket and use it to\
    \ tailor the application’s functionalities for that particular user.\n\nThrough\
    \ the Java EE servlet specification, the HTTP session interface provides developers\
    \ with a standard API that allows them to do exactly what has been described in\
    \ the previous paragraph. They don’t need to be bothered with the implementation\
    \ details of how to give out cookies and how to tie those to data. They can simply\
    \ start a user session and easily store and retrieve the data in an isolated fashion.\
    \ All that data remains in memory on the server and, depending on the implementation\
    \ of the API, can be stored in a variety of locations like on the file system\
    \ or in a database.\n\nThe API is very simple; to create a new session or retrieve\
    \ an existing one, you simply call the `getSession()` method on the HTTP request\
    \ instance that is provided to your servlet by the container. Optionally, an argument\
    \ can be provided to explicitly create a new session or retrieve one that already\
    \ exists. Listing 7-1 shows the methods of the `HttpServletRequest` interface\
    \ that are relevant.\n\n**Listing 7-1.** *Methods of `HttpServletRequest` That\
    \ Are Relevant to HTTP Sessions*\n\n```\npublic interface HttpServletRequest{\n\
    \    HttpSession getSession();\n    HttpSession getSession(boolean create);\n\
    }\n```\n\nAfterward, to store data into the session and retrieve data from the\
    \ session, a simple map-like API is provided by the `HttpSession` interface. Listing\
    \ 7-2 shows the methods that are relevant.\n\n**Listing 7-2.** *Methods of `HttpSession`\
    \ to Work with Session Attributes*\n\n```\npublic interface HttpSession{\n   \
    \ Object getAttribute(String name);\n    Enumeration getAttributeNames();\n  \
    \  void removeAttribute(String name);\n    void setAttribute(String name, Object\
    \ value);\n}\n```\n\nThere’s nothing complicated here. Details about the entire\
    \ API can be found online at the Java Servlet Technology web site ([http://java.sun.com/products/servlet/](http://java.sun.com/products/servlet/)),\
    \ which can be a useful resource for topics, like the general usage of HTTP sessions,\
    \ that are outside the scope of this book. We’re going to focus on the features\
    \ that are the most important and how they tie into a distributed usage of HTTP\
    \ sessions through Terracotta.\n\n## Automatic Time-Out of Stale Data\n\nAnother\
    \ fundamental difference between web and desktop applications is that web applications\
    \ cannot tell that a user stopped using the application. On the desktop, the application\
    \ is quit, or the computer is turned off, causing all the live memory to be cleared.\
    \ With a web application, however, the user can stop using the application without\
    \ ever notifying the server by, for example, visiting another URL, quitting the\
    \ browser, or just stepping away from a public terminal. Since web servers are\
    \ visited by many users, maintaining sessions for every user that might return\
    \ could quickly eat up all available memory.\n\nTo solve this, sessions have an\
    \ automated expiration time that is measured from the request in which they were\
    \ last used. This expiration event is called eviction. If a session has expired,\
    \ it will automatically be invalidated, and all the associated data will be cleared.\
    \ The expiration time can be set up through a web application’s `web.xml` configuration\
    \ file in the `<session-config>` section or programmatically for each individual\
    \ session instance. Listing 7-3 shows the `HttpSession` interface methods that\
    \ are relevant.\n\n**Listing 7-3.** *Methods of `HttpSession` That Are Related\
    \ to the Expiration Time*\n\n```\npublic interface HttpSession{\n    long getLastAccessedTime();\n\
    \    int getMaxInactiveInterval();\n    void setMaxInactiveInterval(int interval);\n\
    }\n```\n\nThe last accessed time is expressed in milliseconds since midnight January\
    \ 1, 1970, GMT, and the interval is expressed in seconds. All servlet containers\
    \ have a default value for the maximum inactive interval; on Tomcat, this is 30\
    \ minutes.\n\n## Manual Invalidation to Clear Out Data\n\nEven though sessions\
    \ are cleared automatically to preserve the server’s resources, there are many\
    \ situations where manual invalidation is also useful. The most logical way to\
    \ use this is to preserve even more server resources when users do explicitly\
    \ log out of an application. This prevents the session data from lingering around\
    \ until it has expired, even though it will never be used again.\n\nAnother useful\
    \ technique is to invalidate a session when a user has finished performing a long\
    \ transactional process, and the temporary data is no longer needed. Invalidating\
    \ sessions at the end of a many-page business transaction or workflow ensures\
    \ that no data lingers longer than it needs to—problems can be created if critical\
    \ session attributes aren’t cleared at the right time. Invalidating the entire\
    \ session ensures that a user starts with a clean slate, after, for example, having\
    \ placed an order. Starting fresh becomes even more important when sensitive data\
    \ is stored in a session, like credit card numbers.\n\nThe `HttpSession` interface\
    \ provides a simple invalidation method for this, as shown in Listing 7-4.\n\n\
    **Listing 7-4.** *Method of `HttpSession` to Manually Invalidate a Session*\n\n\
    ```\npublic interface HttpSession{\n    void invalidate();\n}\n```\n\n## Events\
    \ to Coordinate State Modification\n\nComplex frameworks often associate data\
    \ elements like global application state with a session by setting them as session\
    \ attributes. This can then be used by each component in the application to quickly\
    \ access global data and coordinate how all the components should interact.\n\n\
    Such state is usually tied into the entire life cycle of the application and needs\
    \ to be notified when users are or aren’t working with it. If you implement the\
    \ `HttpSessionBindingListener`, such notifications are sent automatically by the\
    \ servlet container. Listing 7-5 documents the methods of the interface.\n\n**Listing\
    \ 7-5.** *Complete `HttpSessionBindingListener` Interface*\n\n```\npublic interface\
    \ HttpSessionBindingListerner {\n    void valueBound(HttpSessionBindingEvent event);\n\
    \    void valueUnbound(HttpSessionBindingEvent event);\n}\n```\n\nThere is no\
    \ need to do anything special to enable these notifications. The servlet container\
    \ will simply detect if a session attribute value implements the `HttpSessionBindingListener`\
    \ interface. When the attribute is added to the session, the `valueBound` method\
    \ is called, and when this value is removed, the `valueUnbound` method is called.\n\
    \nNote that we do not recommend relying on these events to clean up system resources,\
    \ like JDBC connections, in your applications. These resources should be managed\
    \ independently by, for example, using an IoC framework like Spring. In general,\
    \ it’s a good guideline to keep sessions purely focused on data and not let resources\
    \ bleed into them.\n\n## Session State Persistence"
