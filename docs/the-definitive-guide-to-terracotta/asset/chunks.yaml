  trans: '

    网站通常被期望能够全天候可用。如果网站提供的信息无故消失，用户会很快感到沮丧，而这种沮丧通常会转化为重复访问量的减少。这种期望转化为对底层应用高稳定性和可预测延迟的要求，进而要求其数据完全可用。遗憾的是，用于运行应用的基础设施很少是毫无问题的。软件和硬件故障都可能意外发生。在故障情况下，重要数据应受到保护，并在故障服务器恢复运行时自动重新可用。


    会话状态持久化提供了从一个 JVM 故障转移到另一个 JVM 的能力。虽然这不是标准规范的一部分，但大多数 Servlet 容器都提供了一种解决方案，允许你通过配置参数开启此功能。Apache
    Tomcat 甚至默认启用了此功能。通常，这些持久化实现会将所有会话属性序列化到磁盘，并在服务器重启时从磁盘反序列化以重建会话。然而，像这样持久化会话状态存在缺点，例如对处理能力的需求更高、磁盘利用率更高，并且要求所有包含会话属性的值类都必须实现`Serializable`接口。不过，在大多数情况下，能够持久化会话是在不同服务器间复制会话的基础。Terracotta
    采用了一种完全不同的方法来分发 HTTP 会话，从而避免了会话持久化的这些大部分陷阱。


    **分布式 HTTP 会话**


    随着网站受欢迎程度的提高，其服务器上的负载也会增加。响应这种对资源日益增长的需求的能力被称为可伸缩性。当服务器宕机时，将这些用户无缝迁移到另一台服务器的能力是可用性挑战的重要组成部分。如第
    1 章和第 2 章所述，Terracotta 使得跨机器分布应用变得更加容易。


    986-1 CH07.qxd 5/29/08 8:12 AM 第 152 页


    **152**


    第 7 章 n 使用 Terracotta 扩展 HTTP 会话


    对于 Web 应用，使用 Terracotta 意味着一个负载均衡器、通过 DSO 进行的会话分发以及一个 Web 应用服务器就足以实现可伸缩性和可用性。借助
    Terracotta，在集群中运行的服务器将像一个巨大的 Web 应用服务器一样工作，用户不会注意到单个服务器的性能或可用性问题。使用分布式 HTTP 会话是在支持
    Terracotta 的集群中共享 Web 应用状态的一种简单方法。


    **使用 HTTP 会话的动机**


    当为 Web 应用创建集群时，用户不应担心他们在连接应用时哪台服务器可用。如果用户必须检查哪台机器负载最低并连接到那台机器，他们会感到沮丧——他们应该能够直接连接到应用，并让后端自动选择最合适的服务器。此外，由于用户在使用
    Web 应用时可能需要很长时间，因此应该能够在任何时刻（而不仅仅是在应用启动时）选择正确的服务器。为了实现这一点，Web 应用的状态必须能够从一台服务器传输到另一台服务器。


    从其他节点访问会话状态


    通常，当将一个任意应用转变为集群化应用时，开发人员被迫寻找包含需要在不同集群节点间共享的状态的类。带有会话的 Web 应用比任意应用更容易集群化，因为所有服务器端的应用状态都存储在这些会话中。因此，HTTP
    会话可以扩展为一个 API，用于透明地处理 Web 应用集群中的状态。


    开发人员随后只需关注确保所有条件都满足，以便会话能够被分发。由于这并非标准化，每个 Servlet 容器和应用服务器供应商都有自己实现分布式 HTTP 会话的方式。我们不会详细讨论这些。


    Web 容器倾向于将会话数据存储在数据库中，或者在应用服务器网络间复制会话。让我们专注于网络复制，因为那些可伸缩性最好的容器不使用数据库来存储会话。网络复制意味着会话数据被复制到集群中的其他服务器。这样，如果用户被重定向到任何其他服务器，数据都是可用的。一些供应商在此提供了优化，例如，在其他服务器上惰性拉取会话，而不是持续推送所有数据。然而，一种常见的方法是，每次会话发生变化时（即使只是一个值发生变化），都将整个会话序列化并传输到集群中的其他节点。可以想象，一旦在集群中启用复制，这个过程会产生相当多的网络通信，并带来巨大的
    CPU 需求。开发人员还应注意不要将 Java 无法序列化的对象添加到会话中；因此，所有参与应用状态的类都必须实现`Serializable`接口。在下一节中，你将看到
    Terracotta 如何解决所有这些问题。


    动态水平扩展以应对流量峰值


    除了允许随着应用用户数量的增加，通过向集群添加新节点来使服务器基础设施随时间增长之外，分布式 HTTP 会话对于动态响应流量峰值也非常有用。


    986-1 CH07.qxd 5/29/08 8:12 AM 第 153 页


    第 7 章 n 使用 Terracotta 扩展 HTTP 会话


    **153**


    如今，Web 应用在短时间内因用户群体的发现而变得极其流行的情况并不少见。这种基于网络的口碑传播可能令人担忧，就像通常所说的“Slashdot 效应”——这指的是当一篇新闻公告被发布到一个非常受欢迎的网站（如
    Slashdot.org）的首页时，该网站的用户数量会突然急剧增加。每次有新闻公告即将发布时就投资硬件和重新配置集群，在经济上是不可行的。更糟糕的是，由于其他人可能会意外地撰写此类文章，网站可能会在没有预警的情况下被大量用户涌入，并立即变得无法响应。


    服务器虚拟化解决方案在此提供了帮助。像亚马逊弹性计算云（EC2）这样的服务允许预先准备服务器的磁盘镜像（参见[`aws.amazon.com/ec2`](http://aws.amazon.com/ec2)）。可以设置一个集群来监控每个参与服务器的负载。每当负载超过一定阈值时，假设存在预先创建的标准磁盘镜像，就可以在几秒钟内启动新的虚拟服务器加入集群。此外，当监控软件检测到集群中的服务器经常空闲时，可以关闭节点以降低运行集群的成本。如果在
    Web 应用集群中使用分布式 HTTP 会话作为共享状态，那么所有状态都将在新节点上可用，并从被移除的节点转移。这是一个典型的例子，说明垂直可伸缩性不合适，而水平可伸缩性能够以适当的成本因素快速动态地适应不断变化的使用模式。


    Terracotta 从中央服务器惰性地批处理共享状态操作，从而允许对集群拓扑的动态变化进行高度优化。只有新节点中使用的先前存在的会话才需要被转移。如图 7-2
    所示。


    请注意，只有来自第二个故障应用服务器实例的会话 d、e 和 f 迁移到了新添加的服务器。

    '
- fmt: '# Figure 7-2. *Session failover with Terracotta where only impacted sessions
    migrate*


    In general, only a very small percentage of user sessions will be moving between
    application servers. New users can easily be directed to the latest nodes that
    have joined the cluster, as those servers should report to any Layer 7 load balancer,
    such as F5’s Big IP or Cisco’s Content Director switch, as faster and less burdened
    than all other server nodes. What we are implying is that existing users stay
    on the nodes they started working with, new users get the newly added servers,
    and at any time, any server failure will result in a small number of user sessions
    rebalanced evenly across the entire server cluster. Similarly, since the central
    server is aware of the state of all the nodes, just shutting down some of them
    is also easy. If a user has to gain access to a session on another node, that
    session will be provided by Terracotta on the fly.


    See Chapters 3 and 4 if you want to understand more about how this works.


    ## High Availability in Case of Server Failure


    Software and hardware can and will fail sooner or later; you can be sure of that.
    If your application must be highly available, you need to decide how to react
    to these failures. For many years, people have been buying redundant power supplies,
    RAID discs, hot backup systems, and other solutions for each server of an important
    application to prevent failure and to reduce the downtime in case failure does
    happen. Recently, commodity hardware has become good enough to be used in place
    of enterprise-class servers, even while lacking the expensive systems’ stability
    guarantees, such as CPUs placed on daughter boards (so that individual CPUs can
    fail without crashing the server) and dual redundant power supplies. A new and
    popular trend is to simply expect that everything will fail and to plan for it.
    With application servers and hardware, the plan tends to involve something like
    lots of simple, small servers running Intel-type technology with a few gigabytes
    of RAM and small local disks with two network cards in the machine. This approach
    makes an entire machine modular and low impact when it crashes. Failure becomes
    a part of the design of your application, not an exception.


    When the application state is stored in sessions that are distributed over the
    cluster, each server node is disposable and can be replaced by any other machine
    that is able to handle the same application logic. The state will be provided
    through the distributed session’s mechanism, as long as the infrastructure responsible
    for dispatching the state is also designed to be fault tolerant. Terracotta assumes
    that you will run the Terracotta server on roughly the same class of machine as
    you run your application. Thus, the Terracotta server is designed to fail over
    automatically on any issue. The central Terracotta server can be configured to
    have another machine available on standby as a passive server. If the active server
    goes down, the passive one will automatically take over to continue distributing
    the sessions. Chapter 4 gives you more detail about how to configure this; other
    scenarios like multiple active servers are also possible, if you want another
    machine to take over instantly without having to start up first.


    ## Alternatives to HTTP Sessions


    HTTP sessions are not always an appropriate mechanism for maintaining application
    state.


    Also, sometimes, applications have been created to externalize the state to another
    tier and aim for statelessness in web servers. These approaches are largely driven
    by application requirements, use cases, and design decisions. The two most important
    approaches that are used instead of distributed HTTP sessions are distributed
    caches and central database stores.


    Interestingly enough, applications that rely heavily on distributed caches or
    a central database might rely less on those stores if the applications had a reliable
    and scalable clustered session implementation. Consider this as you read the rest
    of the chapter: is there state that you can migrate from your database to the
    HTTP session now that a scalable replication service exists?


    We’re not covering the alternatives in detail but will give you enough information
    to allow you to decide when to use distributed HTTP sessions.


    ### Distributed Caches


    When the application state is not tied to individual users, distributed caches
    might be more appropriate. They function in a similar fashion as sessions but
    are globally available from the entire application, meaning caches can be easily
    accessed outside the scope of a request and can safely store objects shared by
    more than one session. This global availability can also make them useful when
    state is shared among different tiers, for example, a web server and a desktop
    application. Terracotta integrates with many of the standard open source caching
    solutions, and its support for regular JDK maps is advanced enough to consider
    them caches also. More information about distributed caches can be found in Chapter
    5.


    ### A Database As a Central Store


    If an application is not very interactive and mostly reads user-independent data,
    it could be sufficient to make every web server stateless and to always go back
    to a central database server. This makes every web server totally disposable,
