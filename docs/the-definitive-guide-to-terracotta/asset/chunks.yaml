    如果应用程序没有跨Java进程共享`buffer`对象，则必须修改应用程序。按现有代码，应用程序每次只向`buffer`中复制一个字符。


    假设应用程序不共享对象，并且将`loopCounter`的递增步长从1改为2，这样两个协同工作的JVM就不会向`buffer`中重复复制数据。进一步假设，在一个JVM中，`loopCounter`从0开始，而在另一个JVM中，从1开始。


    两个进程各自以这种方式完成一半工作，在`while`循环仅两次迭代后就会破坏`buffer`。表3-1列出了在`main()`中每次`while`循环迭代结束时，两个JVM中名为`buffer`的对象的状态。


    **表3-1.** *关键`while`循环迭代时的内存状态*


    | **迭代** | **JVM 1 的 Buffer 状态** | **JVM 2 的 Buffer 状态** |

    | --- | --- | --- |

    | 初始状态 | `null` | `null` |

    | 1 | `"H"` | `"<empty character>e"` |

    | 2 | `"H<empty char>l"` | `"<empty char>e<empty char>l"` |

    | 3 | `"H<empty char>l<empty char>o"` | `"<empty char>e<empty char>l<empty char><space>"`
    |


    表3-1说明了不共享`buffer`对象的问题。我们必须修改应用程序，使其不仅复制一个字符，而是复制从消息开头到`loopCounter`索引位置的所有字符。因此，共享`buffer`对象是合理的。


    如果不共享`loopCounter`，将其作为消息的索引使用，则必须对应用程序进行一些修改才能正常工作。我们已经讨论过如何硬编码应用程序，使`loopCounter`的递增步长从1改为2，并分别为每个JVM设置初始值0和1。但如果我们希望三个JVM协同构建`buffer`呢？我们必须再次修改应用程序，使每个JVM将`loopCounter`的递增步长改为3。因此，共享`loopCounter`和`buffer`都是合理的。


