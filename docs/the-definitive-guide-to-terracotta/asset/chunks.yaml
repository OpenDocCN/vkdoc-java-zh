- fmt: "# Configuring Hibernate to use Ehcache as a second-level cache with Terracotta\n\
    \nConfiguring Hibernate to use Ehcache as a second-level cache with Terracotta\
    \ consists of a few simple steps:\n\n1. Configure Ehcache.\n2. Enable Ehcache\
    \ second-level caching in Hibernate.\n3. Configure Terracotta.\n\n## Configuring\
    \ Ehcache\n\nNote that the Ehcache configuration in this section is a suggested\
    \ configuration and will likely need to be adjusted to your particular environment.\
    \ Typically, your Ehcache configuration will live at the root of the classpath\
    \ in a file named `ehcache.xml`. It would contain settings such as these:\n\n\
    ```xml\n<ehcache>\n  <diskStore path=\"java.io.tmpdir\"/>\n  <defaultCache\n \
    \   maxElementsInMemory=\"10000\"\n    eternal=\"false\"\n    overflowToDisk=\"\
    false\"\n    timeToIdleSeconds=\"300\"\n    timeToLiveSeconds=\"300\"\n    diskPersistent=\"\
    false\"\n    diskExpiryThreadIntervalSeconds=\"120\"\n    memoryStoreEvictionPolicy=\"\
    LRU\"/>\n  <cache name=\"...\" ... />\n</ehcache>\n```\n\n## Enabling Ehcache\
    \ Second-Level Caching in Hibernate\n\nYou must enable Ehcache as your second-level\
    \ cache in your Hibernate configuration as follows:\n\n```xml\n<property name=\"\
    hibernate.cache.use_second_level_cache\">true</property>\n<property name=\"hibernate.cache.use_query_cache\"\
    >true</property>\n<property name=\"cache.provider_class\">\n  net.sf.ehcache.hibernate.EhCacheProvider\n\
    </property>\n```\n\n## Configuring Terracotta\n\nAlso, you must tell Terracotta\
    \ that you will be using both Hibernate and Ehcache. A few modules are required\
    \ to get all of the proper configuration. Note that the versions of these modules\
    \ may change (please check [http://www.terracotta.org](http://www.terracotta.org)\
    \ for the latest information):\n\n```xml\n<clients>\n  <modules>\n    <module\
    \ name=\"clustered-cglib-2.1.3\" version=\"1.0.0\" />\n    <module name=\"clustered-hibernate-3.1.2\"\
    \ version=\"1.0.0\" />\n    <module name=\"clustered-ehcache-commons-1.0\" version=\"\
    1.0.0\" />\n    <module name=\"clustered-ehcache-1.3\" version=\"1.0.0\" />\n\
    \  </modules>\n</clients>\n```\n\n## Configuring Terracotta for Use with Detached\
    \ Instances\n\nConfiguring Terracotta with detached instances likewise requires\
    \ a few simple steps:\n\n1. Configure Terracotta to use the Hibernate integration\
    \ module.\n2. Store the detached instances.\n3. Reattach the detached instances.\n\
    \n### Refactoring Your Application\n\nNow that we are using a detached instance\
    \ strategy, we must change the strategy we use to get objects for use by our business\
    \ logic, and we must delay committing these objects until we are completely finished\
    \ with them. Hibernate calls this strategy an application transaction that spans\
    \ a long-running unit of work (see the Hibernate documentation for more information:\
    \ [http://www.hibernate.org/hib_docs/reference/en/html/objectstate.html](http://www.hibernate.org/hib_docs/reference/en/html/objectstate.html)).\n\
    \nDepending on your application, you may need to refactor your use of the `session.beginTransaction()`\
    \ and `session.getTransaction().commit()` calls.\n\nFor example, some applications\
    \ use a strategy that automatically calls the `session.beginTransaction()` and\
    \ `session.getTransaction().commit()` calls using a servlet filter. By inserting\
    \ the servlet filter in front of the regular servlet, you are freed from the tedious\
    \ task of having to remember to call `session.beginTransaction()` and `session.getTransaction().commit()`.\n\
    \n### Configuring Terracotta to Use the Hibernate Integration Module\n\nFor all\
    \ applications using clustered detached instances, the first step is to configure\
    \ Terracotta for use with Hibernate. To do so, place the following in `tc-config.xml`:\n\
    \n```xml\n<clients>\n  <modules>\n    <module name=\"clustered-cglib-2.1.3\" version=\"\
    1.0.0\" />\n    <module name=\"clustered-hibernate-3.1.2\" version=\"1.0.0\" />\n\
    \  </modules>\n</clients>\n```\n\n### Storing the Detached Instances\n\nTo use\
    \ detached instances in your application, you must store them somewhere and retrieve\
    \ them when your application needs them. How you do this is up to you and depends\
    \ on the requirements of your application, but application developers typically\
    \ employ one of three common strategies.\n\n#### Store the Detached Instances\
    \ in the HTTP Session Context\n\nIf you are working in a web application and have\
    \ access to the HTTP session context, and the Hibernate objects you are storing\
    \ pertain to the current user, you might opt to store the POJOs (detached instances)\
    \ in the HTTP session context.\n\nTo store the detached instances in the HTTP\
    \ session context, simply use the `setAttrribute()` method in the HTTP session,\
    \ just as you would with any other object you would like to be cached in the session:\n\
    \n```java\n//~ retrieve the foo object\nsession.beginTransaction();\nObject foo\
    \ = { Hibernate HQL }\nsession.getTransaction().commit();\n\n//~ store in the\
    \ session\nrequest.setAttribute(\"fooObject\", foo);\n```\n\n#### Store the Detached\
    \ Objects in a HashMap\n\nIn other contexts, where you do not have access to an\
    \ HTTP session context or you have data that pertains to more than one user, storing\
    \ the detached instances in the HTTP session context may not make sense. Another\
    \ option is to store them in a `HashMap`.\n\nTo store the detached objects in\
    \ a `HashMap`, simply use the `get()` and `put()` methods of the `HashMap`, as\
    \ shown in the following code snippet. The most appropriate key might be the primary\
    \ key used to fetch the row from a table in the database. To ensure that the objects\
    \ are available in the Terracotta cluster, this `HashMap` must be marked as a\
    \ clustered object using the techniques outlined in Chapter 4 (it must be a part\
    \ of a clustered graph of objects or marked as a Terracotta root).\n\n```java\n\
    //~ retrieve the foo object\nsession.beginTransaction();\nObject foo = { Hibernate\
    \ HQL }\nsession.getTransaction().commit();\n\n//~ store in the map\nmyClusteredeMap.put(\"\
    fooObject\", foo);\n```\n\n#### Store the Detached Objects in a Clustered Cache\n\
    \nStoring the detached instances in a clustered cache may work better than a `HashMap`\
    \ for your application. A clustered cache implementation often has more features,\
    \ such expiry times for items, and is a good choice when more sophisticated features\
    \ are needed than the `Map` interface has to offer.\n\nTo store the detached instances\
    \ in a clustered cache, simply configure a clustered cache using the techniques\
    \ outlined in Chapter 5 and store the objects in the cache:\n\n```java\n//~ retrieve\
    \ the foo object\nsession.beginTransaction();\nObject foo = { Hibernate HQL }\n\
    session.getTransaction().commit();\n\n//~ store in the cache (ehcache)\nmyCache.put(new\
    \ Element(\"fooObject\", foo));\n```\n\n### Reattaching the Detached Instances\n\
    \nAt some point in your application business logic, you must write the detached\
    \ instances back to the database. This point in your application marks the end\
    \ of the long-running unit of work. These points vary from application to application,\
    \ but typical examples are the business logic that executes as the result of selecting\
    \ the Buy option in a standard shopping cart application or the finish stage of\
    \ a multiscreen web flow. To reattach detached objects, simply use the Hibernate\
    \ `saveOrUpdate()` API:\n\n```java\n//~ get the object from the HTTP session\n\
    Object foo = request.getAttribute(\"fooObject\");\n\n//~ flush the object to the\
    \ database\nsession.saveOrUpdate(foo);\nsession.getTransaction().commit();\n```\n\
    \n## Suggestions for Further Reading\n\nFor more information on working with detached\
    \ instances, you should refer to the Hibernate documentation, Section 10.6, located\
    \ at [http://www.hibernate.org/hib_docs/reference/en/html/objectstate.html](http://www.hibernate.org/hib_docs/reference/en/html/objectstate.html).\n\
    \n## Debugging, Testing, and Tuning Concerns\n\nIn general, debugging and tuning\
    \ Hibernate and Terracotta are separate exercises. You should tune your Hibernate\
    \ settings according to the best practices described in Chapter 19 of the Hibernate\
    \ documentation: [http://www.hibernate.org/hib_docs/reference/en/html/](http://www.hibernate.org/hib_docs/reference/en/html/)."
