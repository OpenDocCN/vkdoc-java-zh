    Terracotta clients may join the cluster throughout the life of the cluster. We
    will leave the existing clients configuration stanza untouched.


    The application section describes application-specific configuration. In the application
    section, we will be setting the clustered root fields, declaring which classes
    are eligible for Terracotta instrumentation, and declaring which methods should
    be augmented with Terracotta clustered locking and object change management.


    Configuring Roots


    In our previous discussion of HelloClusteredWorld, we determined that certain
    fields must be declared as clustered roots, which are the tops of clustered object
    graphs. Every object reachable by reference from a root field (that is not also
    declared transient) itself becomes a clustered object. Once instantiated the first
    time in the cluster, a root field becomes immutable, regardless of the modifiers
    applied to it in the source code.


