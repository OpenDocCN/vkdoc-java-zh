    C H A P T E R 7 n EXTENDING HTTP SESSIONS WITH TERRACOTTA


    **155**


    implementation. Consider this as you read the rest of the chapter: is there state
    that you can migrate from your database to the HTTP session now that a scalable
    replication service exists?


    We’re not covering the alternatives in detail but will give you enough information
    to allow you to decide when to use distributed HTTP sessions.


    Distributed Caches


    When the application state is not tied to individual users, distributed caches
    might be more appropriate. They function in a similar fashion as sessions but
    are globally available from the entire application, meaning caches can be easily
    accessed outside the scope of a request and can safely store objects shared by
    more than one session. This global availability can also make them useful when
    state is shared among different tiers, for example, a web server and a desktop
    application. Terracotta integrates with many of the standard open source caching
    solutions, and its support for regular JDK maps is advanced enough to consider
    them caches also. More information about distributed caches can be found in Chapter
    5.


