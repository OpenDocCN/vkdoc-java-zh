    这次，Hibernate 内部引入了一个缓存机制。该缓存确保能够消除那些会重复获取已检索对象的冗余 SELECT 操作。同时，缓存还提供了一种批量处理 UPDATE
    操作的机制。在示例中，缓存将总的 SQL 操作次数减少到了四次。


    986-1 CH06.qxd 5/27/08 7:35 PM 第 137 页


    第 6 章 n 使用 TERRACOTTA 的 HIBERNATE


    **137**


    尽管到目前为止，Hibernate 几乎无需修改代码就能显著提升应用程序性能，但风险也开始显现。当启用二级缓存时，Hibernate 不再每次使用数据库实体时都查询数据库。如果应用程序的两个副本同时运行，它们将无法看到彼此对数据库所做的更改。根据应用程序请求在服务器之间的路由或负载均衡方式，任一节点上的缓存数据都可能轻易变得陈旧。


    与之前的步骤不同，我们现在需要做出的权衡要困难得多。之前，我们只关心简单性和实现问题，所做的任何优化都不会影响应用程序的行为或正确性。现在，我们必须考虑添加二级缓存将对应用程序产生的影响。特别是，二级缓存现在可能与数据库不同步。普遍接受的解决方案是设置一个明确的过期时间，强制
    Hibernate 根据某种过期时间或生存时间（TTL）来刷新缓存条目。


    在某些情况下，你可能已经发现 TTL 是不可接受的，并且可能被迫完全关闭缓存。


    **注意** 我们还有一个风险——如果我们的应用程序是数据的唯一消费者，我们可以相对安全地假设数据只会被我们修改，因此不必担心数据在我们控制之外被修改。然而，如果其他应用程序与此应用程序同时更新数据库，那么无论是否使用
    Terracotta，都不能启用二级缓存。唯一的选项是 POJO 缓存和数据库触发器，用于通知 POJO 其他应用程序所做的更改。


    如果没有集群策略，写入一个 JVM 中二级缓存的数据可能不会反映到集群中的另一个 JVM 中。即使我们的应用程序是数据的唯一消费者，我们现在也必须考虑应用程序被分割成许多部分，这些部分必须同步以提供一致的数据视图。当数据存储在应用层时，我们现在必须考虑缓存未命中时会发生什么：我们是否希望在每个节点上都从数据库加载数据，从而导致集群范围的缓存未命中？还是可以对数据进行集群，从而消除集群范围的未命中？


    Terracotta 可用于对二级缓存进行集群，确保写入一个节点的数据在所有节点上保持一致，并消除数据陈旧问题。同时，Terracotta 消除了集群范围的缓存未命中。最后，由于其虚拟内存能力，Terracotta
    可以维护一个比任何单个节点可用物理内存大得多的缓存。如果应用程序的热数据集无法放入任何单个节点的物理内存空间，这一点就非常重要。有关分布式缓存的更多详细信息，请参见第
    5 章。


    **对 Session 对象进行集群**


    对 Session 对象（即 Hibernate 所称的分离实例）进行集群是与 Terracotta 集成的最快模式，如图 6-5 所示。将数据库映射对象的
    POJO 实例从 Hibernate 中分离出来，可以消除所有不必要的数据库操作，并将所有内容存储在内存中。对象可以从 RAM 中以零延迟读取。对象也可以以低内存延迟进行写入。数据库仅仅成为记录系统，并且只在你希望更新时才进行更新。数据库本质上

