    现在，假设有两个服务器，我们希望这两个服务器作为一个逻辑服务器协同工作。我们必须由 JVM 保证，在一个服务器上创建的 `ClusteredClass` 实例，在另一个服务器上也能以相同的对象
    ID 访问。为什么？简单来说，如果一个 JVM 上创建的对象在所有 JVM 上不是同一个对象，那么应用程序就无法从透明集群中获得任何价值。回想一下 NFS
    的类比。如果两个应用程序实例想要读写同一个文件，它们必须挂载相同的远程文件系统，并通过名称打开同一个文件。在 Java 中，对象 ID 就像文件名。Terracotta
    使用对象 ID 作为内存中特定对象的集群范围路径。


    如果没有跨 JVM 的一致对象标识符，应用程序会发现，在一个服务器上创建的任何对象在另一个服务器上都会不同，并且在从一个 JVM 移动到另一个 JVM 时，必须重新创建或重新连接到对象图。不知何故，所有这些麻烦听起来并不透明。因此，让我们假设，在一个
    JVM 中以特定 ID 创建的对象，在任何其他 JVM 中都将具有相同的 ID。


    如果第二个服务器能够看到在第一个服务器上构造的 `ClusteredClass` 实例，那也会很好。然而，我们的共享目标存在几个固有的挑战。


    在一个内存空间中创建的对象，在 RAM 中会有不同的地址，因此与另一个空间中的对象相比，会有不同的标识符。不仅内存地址无法跨进程对齐，而且在一个内存空间中创建的对象最终会被修改，这些修改必须从一个服务器的内存传递到另一个服务器的内存。我们如何实现这一切？毕竟，假设
    Terracotta 能够自行找到我们所有的 User 对象（来自上一节）并共享它们，这是一个相当大的跨越。


    思考这个挑战的一种方式是考虑对象的作用域。如果一个对象 `o` 不是在适当的作用域级别创建或引用的，以至于它可以跨线程访问，甚至稍后被同一线程访问，那么该对象就无法跨服务器共享。方法局部作用域指的是对象的生命周期与其被创建的方法的生命周期相同；对象在方法的作用域内被创建和销毁。方法局部对象对于现代垃圾收集器来说往往是即时垃圾，因此不是我们追求的目标。这一点很重要：*没有必要在两个服务器之间共享每一个对象。*
    我们更追求的是共享集合、单例、静态变量和全局对象中的对象。只有当服务器一在一个可被多个线程访问的作用域中创建对象 `o` 时，服务器二才能看到它。因此，如果我们在方法局部上下文中调用构造函数，我们不应该担心集群问题，但在全局上下文中则应该担心：


    void printAClusteredClassInstance( ) { **// 方法级作用域**


    ClusteredClass c1 = new ClusteredClass( 1, "ari" );


    c1.toString( );


    }


    ClusteredClass clone( ClusteredClass c ) { **// 调用级作用域** ClusteredClass c2 = new
    ClusteredClass( c.getid(), c.getname( ) );


    return c2; // c2 逃逸出了方法，所以它可能值得关注……


    }


