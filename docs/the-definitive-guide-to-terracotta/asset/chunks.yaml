- fmt: "# In the JVM, object data is protected from concurrent thread execution by\
    \ synchronizing access to certain critical areas of code through the use of mutexes.\
    \ Before a thread may enter such a critical code section—signified by a `synchronized`\
    \ block—it must first acquire a mutual exclusion lock that serializes access to\
    \ that code section. No two threads may execute the code in a `synchronized` block\
    \ at the same time.\n\nIn addition to providing serialized access to critical\
    \ code sections, the lock acquisition and subsequent lock release of `synchronized`\
    \ code blocks provide another crucial function for the consistency of object data:\
    \ they serve as transaction boundaries between which changes made to objects by\
    \ a thread are batched and ordered. When a thread acquires an object’s lock—also\
    \ known as its monitor—there are certain guarantees about the visibility of changes\
    \ made to objects by other threads (there is actually no relation between an object’s\
    \ lock and the changes that can be made under that lock; the fact that locks are\
    \ associated with objects is essentially syntactic sugar). The JVM ensures that\
    \ the state of all objects visible to a thread that has acquired a particular\
    \ lock reflects all of the changes to those objects made under the scope of that\
    \ same lock by all other threads.\n\nAnother thread-related function connected\
    \ to locking provided by the JVM is the `wait()` and `notify()` facility. An object\
    \ that holds a lock on an object may call the `wait()` method on that object,\
    \ which will cause that thread of execution to pause. That thread will remain\
    \ paused until either a specified time interval has passed or until another thread\
    \ calls `notify()` or `notifyAll()`. When a waiting thread is notified, it is\
    \ placed back into contention for the lock on the object in question. Thread coordination\
    \ to perform all sorts of time- and sequence-sensitive operations can be programmed\
    \ using just the concurrency primitives, `synchronized()`, `wait()`, and `notify()`.\
    \ Over time, these concurrency concerns have been encapsulated into standard Java\
    \ libraries, most notably the `java.util.concurrent` package (which, incidentally,\
    \ can also be clustered by Terracotta).\n\nTerracotta provides exactly the same\
    \ access serialization, coordination, and visibility guarantees to threads in\
    \ different JVMs as the JVM itself provides to threads within the same JVM. The\
    \ facilities that Terracotta uses to provide these guarantees take the form of\
    \ locks and transactions.\n\n## Locks\n\nTerracotta extends the built-in locking\
    \ semantics of the JVM to have a clusterwide, cross-JVM meaning. Clustered locking\
    \ is injected into application code based on the `<locks>` section of the Terracotta\
    \ configuration file. Each lock configuration stanza uses a regular expression\
    \ that matches a set of methods. The locking that Terracotta injects into that\
    \ set of methods is controlled by further configuration options specified in the\
    \ lock configuration stanza.\n\nWe did some lock configuration in the last chapter\
    \ for `HelloClusteredWorld`. There, we had a lock configuration stanza that looked\
    \ like this:\n\n```xml\n<locks>\n  <autolock>\n    <lock-level>write</lock-level>\n\
    \    <method-expression>void HelloClusteredWorld.main(..)</method-expression>\n\
    \  </autolock>\n</locks>\n```\n\nThis configuration stanza tells Terracotta to\
    \ look for methods in your code that match the method expression. The method expression\
    \ is expressed in a pattern selection language developed by AspectWerkz, a pioneering\
    \ aspect-oriented programming (AOP) framework. This pattern selection language\
    \ allows you to specify particular sections of your code. In AOP parlance, this\
    \ is known as a join point. Using this expression language, you can precisely\
    \ specify how Terracotta should treat the locking in your code. For a complete\
    \ reference to the AspectWerkz pattern language, see [AspectWerkz+Pattern+Language](http://www.terracotta.org/confluence/display/docs1/AspectWerkz+Pattern+Language).\n\
    \nLet’s use the `main()` method in our familiar `HelloClusteredWorld` program\
    \ to discuss the effect of each lock configuration option. For convenience, we’ll\
    \ reiterate it here:\n\n```java\npublic static void main( String args[] ) throws\
    \ Exception {\n  while( true ) {\n    synchronized( buffer ) {\n      int messageIndex\
    \ = loopCounter++ % length;\n      if(messageIndex == 0) java.util.Arrays.fill(buffer,\
    \ '\\u0000');\n      buffer[messageIndex] = message.charAt(messageIndex);\n  \
    \    System.out.println( buffer );\n    }\n    Thread.sleep( 100 );\n  }\n}\n\
    ```\n\n## Autolocks and Named Locks\n\nA lock stanza must be specified as either\
    \ a named lock or an autolock. Methods that match an autolock stanza are augmented\
    \ by Terracotta to acquire a clusterwide lock on a clustered object wherever there\
    \ is synchronization on that object. You can think of autolocks as an extension\
    \ of a method’s existing Java synchronization to have a clusterwide meaning. The\
    \ configuration for `HelloClusteredWorld` uses an autolock that tells Terracotta\
    \ to inspect the `main()` method for synchronization. In this case, the synchronization\
    \ on the `buffer` field is augmented by Terracotta to have a clusterwide effect.\n\
    \nUnlike autolocks, named locks function only at method entry and exit. This means\
    \ that, for methods that match a named lock configuration stanza, a thread must\
    \ first acquire the lock of that name from the Terracotta server before being\
    \ allowed to execute that method. As a result, named locks are very coarse grained\
    \ and should only be used when autolocks are not possible. Had we chosen to use\
    \ a named lock for `HelloClusteredWorld`, only one thread in the entire cluster\
    \ would have been allowed into the `main()` method at a time. The effect would\
    \ be to allow the first JVM to execute the `main()` method. Thereafter, any JVM\
    \ that joins the cluster would block at the entrance to the `main()` method attempting\
    \ to acquire the named lock.\n\nSince the `main()` method never exits, all except\
    \ the first JVM would block indefinitely or until the first JVM was terminated,\
    \ at which point another JVM would be granted the lock and be allowed into the\
    \ `main()` method.\n\nAutolocks can provide considerably more concurrency than\
    \ named locks, but autolocks only acquire a lock if the object being synchronized\
    \ on is a clustered object. In automatically locked methods, if the object being\
    \ synchronized on is not a clustered object, then only the local JVM lock is acquired.\
    \ For example, if an object of type `Product` is clustered, maintains a reference\
    \ to objects of type `ProductPrice`, and you exclude the `ProductPrice` object\
    \ from instrumentation, `Product` will not be updated across a cluster of JVMs\
    \ when methods in the `ProductPrice` class are invoked.\n\nAutolocks applied to\
    \ methods that have no synchronization in them will have no clustered locking.\
    \ Also, methods that match a lock stanza but do not belong to a class included\
    \ in the set of classes configured for instrumentation by Terracotta will have\
    \ no clustered locking behavior. Such methods are invisible to Terracotta (more\
    \ on class instrumentation later).\n\n## Lock Level\n\nAnother configuration option\
    \ in the lock configuration stanza is the lock level. Unlike Java, Terracotta\
    \ locks come in four levels:\n\n- `write`\n- `synchronous-write`\n- `read`\n-\
    \ `concurrent`\n\nWrite locks are mutual exclusion locks that act like regular\
    \ Java locks. They guarantee that only one thread in the entire cluster can acquire\
    \ that lock at any given time.\n\nSynchronous write locks add the further guarantee\
    \ that the thread holding the lock will not release the lock until the changes\
    \ made under the scope of that lock have been fully applied and acknowledged by\
    \ the server."
  raw: 'In the JVM, object data is protected from concurrent thread execution by synchronizing
    access to certain critical areas of code through the use of mutexes. Before a
    thread may enter such a critical code section—signified by a synchronized block—it
    must first acquire a mutual exclusion lock that serializes access to that code
    section. No two threads may execute the code in a synchronized block at the same
    time.


    In addition to providing serialized access to critical code sections, the lock
    acquisition and subsequent lock release of synchronized code blocks provide another
    crucial function for the consistency of object data: they serve as transaction
    boundaries between which changes made to objects by a thread are batched and ordered.
    When a thread acquires an object’s lock—also known as its monitor—there are certain
    guarantees about the visibility of changes made to objects by other threads (there
    is actually no relation between an object’s lock and the


