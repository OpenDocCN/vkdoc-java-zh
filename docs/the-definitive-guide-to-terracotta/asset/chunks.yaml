    Instead, developers were busy choosing the easiest path for building applications.
    In the Java 2 Standard Edition (J2SE) world, Tomcat and Struts prevailed with
    stateless data access objects stored in the database. In the Java 2 Enterprise
    Edition (J2EE) world, EJB prevailed, and the container helped the developer store
    objects in the database. The database façade was destined to crack under the load
    of the new three-tier architecture. If the database was an immovable object, scale
    was the opposing unstoppable force. A tug-of-war began to play out regarding how
