- fmt: "In the previous section, we introduced a new abstraction called `Router`.\
    \ Here is the interface that we will use for it:\n\n```\nimport commonj.work.Work;\n\
    import commonj.work.WorkItem;\nimport commonj.work.WorkListener;\n\npublic interface\
    \ Router<ID> {\n    RoutableWorkItem<ID> route(Work work);\n    RoutableWorkItem<ID>\
    \ route(Work work, WorkListener listener);\n    RoutableWorkItem<ID> route(RoutableWorkItem<ID>\
    \ WorkItem);\n}\n```\n\nThis interface can be used to implement various data partitioning\
    \ and load-balancing algorithms, such as these:\n\n- **Round-robin balancing**:\
    \ The `Router` loops through all queues one by one. This is probably the least\
    \ useful strategy; it’s only useful if the work items have no state to share (i.e.,\
    \ they are embarrassingly parallel).\n- **Workload-sensitive balancing**: The\
    \ `Router` looks at queue depth and always sends the next pending work item to\
    \ the shortest queue.\n- **Data affinity**: Using sticky routing, meaning that\
    \ the `Router` sends all pending work of a specific type to a specific queue,\
    \ is useful for different data partitioning strategies, and is use case specific.\n\
    - **Roll your own**: To maximize locality of reference for your use-case-specific\
    \ requirements, you can create your own balancing solution.\n\nHere is an example\
    \ of the load-balancing router implementation that takes an array of the routing\
    \ IDs that are registered and always sends the next pending work to the shortest\
    \ queue:\n\n```\npublic class LoadBalancingRouter<ID> implements Router<ID> {\n\
    \    private final PipeManager<ID> m_pipeManager;\n    private final RoutableWorkItem.Factory<ID>\
    \ m_workItemFactory =\n        new RoutableWorkItem.Factory<ID>();\n\n    public\
    \ LoadBalancingRouter(PipeManager<ID> pipeManager, ID[] routingIDs) {\n      \
    \  m_pipeManager = pipeManager;\n        // create all queues upfront\n      \
    \  for (int i = 0; i < routingIDs.length; i++) {\n            m_pipeManager.getOrCreatePipeFor(routingIDs[i]);\n\
    \        }\n    }\n\n    public RoutableWorkItem<ID> route(Work work) {\n    \
    \    return route(work, null);\n    }\n\n    public RoutableWorkItem<ID> route(final\
    \ Work work, final WorkListener listener) {\n        LoadBalancingRouter.PipeInfo<ID>\
    \ shortestPipeInfo = getShortestPipe();\n        RoutableWorkItem<ID> workItem\
