- fmt: '# In fact, spreading application instances across separate hardware, otherwise
    known as scaling out, should be superior to multiprocessing (scaled up) architectures,
    because everything is doubled; nothing is shared.


    We get twice the memory, disk, network, bus, and processor. Three servers, four
    servers, and so on will give us linear scale as long as the application can take
    advantage of all this hardware.


    `Terracotta`’s architecture, like that of its web monster parent, has both `L1`
    and `L2` components. The motherboard analogy maps to `Terracotta`, because `Terracotta`
    has libraries that install into the application’s `JVM` and insert `L1` object
    caches transparently, while `Terracotta`’s server runs in its own process usually
    on a dedicated server, just like the `L2`.


    ## Terracotta Makes L2 General Purpose


    Running applications across servers seemed to be a good idea, especially considering
    the `L2` solution. But `Terracotta`’s web application experience proved that the
    costs were shifting from expensive database hardware to complicated application
    development. To inject `L1` caches into arbitrary Java applications, `Terracotta`
    had to make a general purpose server (`L2` server) that was smarter about what
    it was storing and when it was being invoked.


    ## Original L2 Was Intrusive


    The `L2` cache, while critical, was not the entire solution. `Terracotta` leverages
    the power of the `L2` concept, but also provides a solution to the complexities
    surrounding distribution of objects—replication and serialization. The `L2` solution
    for the web monster was a simple networked cache service that took keys and associated
    values, pushed the pair across the network, and stored them on the `L2` server
    instance. No objects ended up in the `L2` that the developer had not put there
    on purpose.


    Maintenance of the monster web site suffered because of constant regressions in
    correctness and performance. Sometimes, a developer would forget to serialize
    and replicate changes to `L2`-based objects, causing the application to break
    when the load balancer sent the user to other application servers because data
    was only in one `JVM` and coherence would be lost (as shown in Figure 2-5).


    **Figure 2-5.** *Developer error where `IncrementValue()` operation does not update
    clustered cache*


    Application performance would also suffer when the developer replicated changes
    too often or neglected in-memory caching and stored data straight to the database.
    The cost of scaling out was very high.


    In founding the company, `Terracotta`’s leaders sought to deliver the value of
    both stateless and stateful paradigms. Namely, the goal was to deliver a stateless
    runtime for operators with an `L2` that persisted to disk and to simultaneously
    deliver a stateful programming model for developers where the `L2` was transparent
    to the application and challenges with coherence and replication would not exist.


    The reality of having hundreds of developers working in one code base led to misuse
    or nonuse of by-hand replication tools. No by-hand tool solves every problem and
    is only applicable if the use case for which it was designed happens to align
    with the developer’s needs.


    These challenges are part and parcel of the issue with application programming
    interfaces (`APIs`). `APIs` do what the developer who is integrating them into
    the application asks. Any integration or application code changes required by
    an `L2`-type solution would risk negating the benefits of that `L2`-type product.
    `Terracotta` chose to create a better model for clustering—a transparent `L2`
    server.


    ## We Needed More Transparency


    The goal was to build an application server that scaled out across Java processes
    and ran underneath a sticky load balancer, all without developers perceiving the
    existence of multiple processes (`L1` and `L2`). The reality fell short of the
    goal, however, in that developers were well aware of the design of the cluster.
    The web site’s creators built a very efficient session replication technology
    and several custom caches. All objects had to implement the Java `Serializable`
    interface, and developers were constantly tuning session sizes so that the system
    could replicate sessions with minimal impact to end-user traffic. These caching
    and replication services suffered from the same marshal-across-the-network pratfalls
    that any other approach would.


    The initial impact of developing a clustered web application seemed acceptable.
    However, many projects would stall not because they were hard to design but because
    they were hard to scale. Many application features could take down the core web
    infrastructure if poorly designed. And, most importantly, the application continually
    slowed down and presented itself as an ever-increasing challenge to maintain.
    What’s more, the average project would go through phases such as Key Business
    Project Phase One, Phase Two, and so on, and phases usually encompassed refactoring
    existing code for performance, as opposed to introducing new features. Over time,
    the business noticed that the burden of maintaining a scalable application was
    slowing down new development.


    ## Transparency Equals General Purpose


    Decisions that seemed so critical to productivity, such as `Struts` versus `Java
    Server Faces (JSF)` or `Tomcat` versus another container, proved less important
    than the core scalability and availability model.


    If an application is stateless and uses an object-relational mapper to store objects
    in a database, the team will likely work to lower database latency only to find
    that throughput is too low. The team may end up tuning the `SQL` that `Hibernate`
    generates. The database administrator might make changes to the database schema,
    while the Java developer changes the object model to compensate. The storage administrator
    may adjust storage array by striping tables across disks.


    Ultimately, however, caching will appear. The `Terracotta` team’s experience shows
    that this is inevitable. Caching is essentially the process of shifting an application
    from a stateless model to a stateful or hybrid model. As discussed earlier in
    this chapter, if the application is stateful and we want to scale the application
    across Java processes, a coherent protocol for editing objects across Java processes
    gets built as the application scales. In all cases, the domain model is affected,
    and business feature development slows as developers spend time tuning.


    So the founders sought a transparent solution, one that works inside the `JVM`
    without serialization, thus avoiding the pratfalls of replication. The components
    of scalable application architecture are now in place. We need an `L2` service
    for deflecting workload off the database and coordinating application activities,
    and we need a transparent interface that makes the notion of `L2`, `L1`, and application
    object all the same, just as in the motherboard analogy.


    ## Transparent Scalability with Availability


    Scalability and availability are opposing forces. Anything we write to disk slows
    us down, and anything we leave in memory is at risk of process or even power failure.
    Scalability comes from performance, and performance comes from alleviating bottlenecks.
    Memory is the least slow point of `I/O` on the motherboard. The disk is, of course,
    one of the slowest. Worse yet, the network is closer in performance to the disk
    than to memory.'
