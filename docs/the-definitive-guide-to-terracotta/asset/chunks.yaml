    Visualizing Applications


    **T**uning applicationsthat run in a cluster is hard. What makes tuning difficult
    is that the application is a logical entity running across processes and machines,
    while the available tools work almost exclusively at the process or machine level.


    For example, you know from Chapter 5 that Terracotta helps distribute application
    cache data. We also know an application that accesses the cache in a random way
    will not scale, because the objects have to move around the cluster through the
    Terracotta server. But none of the tools that exist for performance tuning (including
    CPU and memory monitoring tools, JVM heap monitoring tools, and Java application
    profilers) would show that a distributed cache is slow, because random JVMs in
    a cluster keep updating the cache contents in a manner requiring notification
    to all other JVMs in the cluster.


