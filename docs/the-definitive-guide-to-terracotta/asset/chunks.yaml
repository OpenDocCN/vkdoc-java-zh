    IDs have to be known in advance, and new workers are not allowed to join the cluster
    after the computation has begun. But perhaps most importantly, we do not have
    a failover mechanism for workers. This means that if a worker crashes, we have
    no way of detecting it and rerouting all the pending work that the worker has
