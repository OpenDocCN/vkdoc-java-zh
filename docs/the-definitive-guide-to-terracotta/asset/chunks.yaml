    Creating the Terracotta Configuration


    The next step is to create a Terracotta configuration file. In a text editor,
    create a file called tc-config.xml in the top-level project directory. A good
    starting point is the POJO example configuration file in the Terracotta kit: config-examples/tc-config-pojo.xml.
    Copy the text of that configuration file into the tc-config.xml file currently
    open in your text editor. We will need to make a few alterations to this template
    configuration to work with HelloClusteredWorld.


    ■**Note** You can get a complete reference guide to the Terracotta configuration
    online a[t http://](http://www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference)


    [www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference.](http://www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference)


    Making the Terracotta Server Run in Persistent Mode


    The configuration file is split up into two main sections, one for the server(s)
    and one for the clients—from the perspective of Terracotta, the JVMs running your
    application are clients; although, from the perspective of the application developer,
    those JVMs are known as application servers. The first alteration will be to the
    server section of the configuration file.


    The /tc:tc-config/servers section can contain multiple server entries, one of
    them being the primary active server. If there is more than one server entry,
    the clients will try to connect to them in order until the active server is reached.
    Should the active server become unavailable, the clients will try each of the
    other servers described here until they connect to the new active server. In this
    example, however, we will use only a single server.


    986-1 CH03.qxd 5/5/08 9:13 AM Page 56


    **56**


    C H A P T E R 3 ■ J U M P I N G I N TO T E R R A C OT TA


    The existing server configuration stanza, /tc:tc-config/servers/server, already
    contains some configuration information, namely the data and logs elements. The
    /tc:tc-config/servers/server/data element determines where the Terracotta server
    will write the Terracotta cluster data (clustered object data, connected client
    data, etc.). The /tc:tc-config/servers/server/logs element determines what directory
    the Terracotta server ought to write its logs to.


    By default, the Terracotta server is not configured to persist the state of the
    cluster to permanent storage. This means that if the Terracotta server is restarted,
    it starts from scratch with no clustered application state. This is the equivalent
    of restarting a single JVM: all of the memory from the previous instantiation
    is wiped clean.'
