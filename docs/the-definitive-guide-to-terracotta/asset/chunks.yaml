- fmt: "# 重构 WorkManager 中的忙等待\n\n在重构 `WorkManager` 时，我们可以借此机会消除 `waitForAll()` 和\
    \ `waitForAny()` 方法中的忙等待（我们在上一节中实现了这些方法）。它们的功能是通过一个同样名为 `waitForAny()` 的新工具方法实现的（这个方法足够有用，可以在我们的公共\
    \ API 中公开，尽管它不属于 `CommonJ` 规范）。你将在本节末尾看到重构后的原始 `waitForAny()` 方法。\n\n该方法会等待至少一个\
    \ `WorkItem` 完成，并仅返回该 `WorkItem`。我们不依赖忙等待，而是使用 `wait()` 和 `notify()`。如下一个代码片段所示，如果我们的集合中有一个已完成的\
    \ `WorkItem`，所有已完成的 `WorkItem` 都会直接返回；但如果集合为空且超时设置为 `INDEFINITE`，我们将在集合上调用 `wait()`，这会阻塞直到其他人在该集合上调用\
    \ `notify()`（请参见下一个代码清单末尾附近的粗体行）。\n\n为了使此方法正常工作，我们需要确保每次将 `WorkItem` 添加到包含所有已完成\
    \ `WorkItem` 对象的集合时，都调用 `notify` 方法，该方法将通知在 `waitForAny()` 方法中阻塞于 `wait()` 的线程。\n\
    \n使用这个工具方法，重构 `waitForAll()` 和 `waitForAny()` 变得非常简单。以下是 `StaticWorkManager` 类的完整源代码清单：\n\
    \n```java\n/**\n * A routing aware WorkerManager that uses an implementation of\
    \ the Router\n * interface to do the route work to different work queues.\n */\n\
