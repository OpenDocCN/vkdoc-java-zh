- fmt: "# Table 12-1 explains each of the Java files inside `demo.inventory`.\n\n\
    **Table 12-1.** *The Source Files in the `demo.inventory` Directory*\n\n| **File**\
    \ | **Purpose** |\n| --- | --- |\n| `Product.java` | Contains the definition of\
    \ a product object |\n| `Department.java` | Contains the tree where products get\
    \ stored for web display |\n| `Store.java` | Wrapper class to products, inventory,\
    \ and departments that contains our map and tree |\n| `Main.java` | The command\
    \ line interface driver that instantiates an instance of `Store` and preloads\
    \ a database into the map and tree |\n\nThe changes we will make are documented\
    \ in Table 12-2.\n\n**Table 12-2.** *Changes to the Source Files*\n\n| **Step**\
    \ | **Description** | **Goal** |\n| --- | --- | --- |\n| Copy | Copy the entire\
    \ demonstration to a new location. | Leave the original sample in place for future\
    \ reference. |\n| Pounder | The core load-generating logic. Insert methods that\
    \ change product prices in a loop. Products are clustered in Terracotta. | |\n\
    | Lock tuning | Ensure that the demonstration locks properly. | Make the lock\
    \ more coarse grained for visualization. |\n| Separate roots | Add a second root\
    \ to the `Store` object. | Allow us to test with two JVMs pounding one root or\
    \ separate roots in order to measure scalability. |\n| Update the CLI | Change\
    \ the command line interface so that we can call the pounder we insert. | Provide\
    \ a way to make the whole test work. |\n| Update Terracotta configuration | Update\
    \ `tc-config.xml` to support our changes. | Make sure the locks and objects are\
    \ properly clustered. |\n\n## Copying the Sample\n\nChange directories to the\
    \ inventory sample in the Terracotta distribution. Note that we will refer to\
    \ the directory where you unpacked Terracotta as `$TC_HOME`. If, for example,\
    \ you decompress Terracotta into `/Users/ari/terracotta-2.6` (something like `c:\\\
    Documents and Settings\\ari\\terracotta-2.6` under Windows), you want to issue\
    \ the following command.\n\n```\n> cd /Users/ari/terracotta-2.6/samples/pojo (c:\\\
    Documents and Settings\\ari\\ terracotta-2.6)\n```\n\nNext, copy the inventory\
    \ sample. On Unix, the command would look something like this:\n\n```\n> cp –R\
    \ inventory inventory.pounder (xcopy inventory inventory.pounder)\n```\n\n**Note**\
    \ You can avoid making all the manual changes to the inventory application by\
    \ downloading the `inventory.pounder` application from [http://www.apress.com](http://www.apress.com).\n\
    \n## Pounder Methods\n\nA pounder is a test that continually calls some routine,\
    \ effectively pounding or exercising an aspect of a system to create load or attempt\
    \ to fatigue or break the system at a key stress point.\n\nWe will now introduce\
    \ a pounder that takes one SKU from inventory and changes its price to random\
    \ values a certain number of times. First, change directories as follows:\n\n\
    ```\n> cd inventory.pounder/src/demo/inventory\n% cd inventory.pounder\\src\\\
    demo\\inventory (in Windows)\n```\n\nNow, edit `Main.java` with your favorite\
    \ editor, and add the following method:\n\n```java\nprivate void poundRandomProducts()\
    \ {\n    ArrayList productArray = new ArrayList( 4 );\n    productArray.add( store.getInventory().get(\
    \ \"1GFR\" ) );\n    productArray.add( store.getInventory().get( \"TRPD\" ) );\n\
    \    productArray.add( store.getInventory().get( \"WRPC\" ) );\n    productArray.add(\
    \ store.getInventory().get( \"USBM\" ) );\n    for( int i = 0; i < max; i++ )\
    \ {\n        synchronized( productArray.get( i % 4 )) {\n            ( ( Product\
    \ ) productArray.get( i % 4 ) ).setPrice(i);\n        }\n    }\n}\n```\n\nThe\
    \ first part of this new method initializes an array of `Product` objects to four\
    \ discrete values. The second section takes the `productArray` and loops through,\
    \ changing one of the four products to some monotonically increasing price, `i`.\
    \ We will use this method to run a clustered pounding routine that updates any\
    \ of the objects in the array so that all JVMs in the cluster are making changes\
    \ that the others will hear about. The call to `synchronized( productArray.get(\
    \ i%4 ) )` may or may not cause a problem that we will visualize later.\n\nLet’s\
    \ now add another pounder that does something different:\n\n```java\nprivate void\
    \ poundOneProduct( ) {\n    Product p = null;\n    // if we run separate_roots,\
    \ this returns one of 2 Inventory copies\n    Map inventory = store.getInventory();\n\
    \    assert( inventory != null );\n    printInventory();\n    boolean failedToLoad\
    \ = true;\n    do {\n        out.println(\"\\nEnter SKU of product to update:\"\
    );\n        out.print(\"> \");\n        out.flush();\n        String s = getInput().toUpperCase();\n\
    \        p = (Product) inventory.get(s);\n        if (p != null) failedToLoad\
    \ = false;\n        else out.print(\"[ERR] No such product with SKU '\" + s +\
    \ \"'\\n\");\n    } while( failedToLoad == true );\n    double newPrice;\n   \
    \ assert( p != null );\n    newPrice = p.getPrice( );\n    for( int i = 0; i <\
    \ max; i++) {\n        synchronized( p ){\n            p.setPrice( newPrice );\n\
    \        }\n        newPrice = 1234.34;\n    }\n}\n```\n\nWhereas the `poundRandomProducts()`\
    \ method changes any and all products in the array, `poundOneProduct()` can be\
    \ made to change just one. This new pounder is naïve in nature, because it allows\
    \ the user to specify one product to incessantly change. If the user were to set\
    \ up two instances of the modified inventory application to pound on one product,\
    \ those two JVMs would have to yield to each other all the time, just like `HelloClusteredWorld`\
    \ from Chapter 3. But, if each inventory instance pounds on a different product,\
    \ perhaps two JVMs needn’t yield to each other at all and can run in parallel.\
    \ Hopefully, visualization will help us validate the performance differences among\
    \ all three options: pounding the same product in each of two JVMs, pounding separate\
    \ products in each JVM, and pounding random products in all JVMs.\n\nBefore we\
    \ finish with `Main.java`, we have to wire up the ability to accept a command\
    \ line argument regarding the use of separate roots. We will explain separate\
    \ roots soon. For now, you should change the `main()` method to check for a command\
    \ line argument named `separate_roots`. If that argument is present, pass a `Boolean`\
    \ to the `Store` constructor; we will edit the `Store` constructor shortly. First,\
    \ let’s add a couple of fields to the `Main` class:\n\n```java\npublic class Main\
    \ {\n    /**\n     * Description of the Field\n     */\n    public Store store;\n\
    \    private PrintWriter out = new PrintWriter(System.out, true);\n    Map serverCount\
    \ = new HashMap();\n    private static Boolean separateRoots = false;\n    private\
    \ static int max = 50000;\n```\n\nMaking the `Boolean` a member field of the class\
    \ allows the `main()` method to configure the test and for the pounder methods\
    \ to react when invoked later. The integer `max` field will be used to enable\
    \ the pounder methods to execute dynamic loop iterations. You will learn later\
    \ in this chapter why separate roots are faster or slower than shared roots across\
    \ JVMs (one of the two types of roots is so much faster than the other that we\
    \ need to increase the number of iterations to compensate for testing in that\
    \ particular mode; otherwise, the test duration will be too short for you to run\
    \ the visualization tools). Next, let’s change the `main()` method to set these\
    \ two new fields:\n\n```java\npublic static void main(String[] args) {\n    if(\
    \ ( args.length > 0 ) && args[ 0 ].equals( \"separate_roots\" ) ) {\n        System.out.println(\
    \ \"[INFO] Running With 2 roots.\" );\n        separateRoots = true;\n       \
    \ max = 200000;\n    }\n    try {\n        new Main().run( );\n    }\n    catch\
    \ (Exception e) {\n        e.printStackTrace();\n        System.out.flush();\n\
    \    }\n}\n```\n\nAlso, we should change the `run` method to pass the `Boolean`\
    \ for separate roots to the `Store` constructor:\n\n```java\nprivate void run(\
    \ ) {\n    store = new Store( separateRoots );\n    menu_main();\n}\n```\n\n##\
    \ Tuning the Locks"
