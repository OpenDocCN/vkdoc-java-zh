  trans: '

    网格主要分为两大类：计算网格和数据网格。在负载均衡与分区的框架下，这两者的区别更容易理解。网格与 Web 应用不同，它不需要负载均衡交换机，HTTP 也不必作为通信模式。网格的核心在于手动或通过编程方式将工作分配给大量低成本服务器。基于分区的概念，现在可以将数据网格视为计算机集群，其中数据已分散存储在应用节点的内存中，以避免从数据库检索数据时的往返延迟和时延。十台低成本服务器各自存储并管理十分之一的数据。


    **243**


    986-1 CH11.qxd 5/28/08 12:54 PM 第 244 页


    **244**


    第 11 章 n 使用 Terracotta 的网格计算


    计算网格将工作负载分配到各个应用节点；它们仅适用于无状态工作负载（例如，仅计算型任务），或建立在数据已分区的数据网格之上。如果计算网格不与数据网格协同工作，即数据和负载可能基于不同标准进行分区，那么当运行在十台服务器中第一台上的计算任务访问第七台上的数据时，就可能导致网络瓶颈。


    从现在开始，我们的讨论将主要围绕数据网格展开，因为它既能提供可扩展性，也能实现高可用性。可以说，数据网格为企业应用提供了最有趣的服务，其重点在于对具有状态的应用特定数据的容错和故障转移，以及访问这些数据时的可扩展性。


    **网格如何处理可扩展性**


    网格能够如此出色地扩展的主要原因之一，在于网格引擎可以智能地选择：是将数据移动到其处理上下文，还是将处理上下文（操作）移动到数据。将处理上下文移动到数据，实际上意味着处理器可以利用引用的局部性；因此，在特定节点上处理的数据会保持在该节点本地，理想情况下永远不会离开该节点。相反，所有针对此特定数据集的操作都将始终路由到此特定节点。这样做最直接的好处是最大限度地减少了延迟，并能实现近乎无限且线性的可扩展性。其扩展效果自然取决于具体用例，要实现可扩展性，需要在数据分区、工作项分组以及优化潜在路由算法方面投入精力和技巧。


    最理想（也最简单）的情况是，所有工作项都属于所谓的“易并行”类型，这意味着工作项之间没有共享状态。所有工作项都是自包含的，可以完全独立于其他工作项执行任务，这意味着我们无需担心数据分区或路由方案。易并行工作最典型的例子是算术计算。调用某种带有两个整数参数的
    `add()`、`subtract()`、`multiply()` 或 `divide()` 例程不需要任何外部上下文。执行工作所需的所有数据都包含在工作项的参数中。返回结果定义明确，无需进一步处理即可使用：`add(2,
    2)` 应返回 `4`。然而，尽管易并行工作集相当常见，但我们有时也会面临更复杂的情况，需要智能的数据分区和路由算法才能良好扩展，我们将在本章稍后部分探讨这一点。


    **网格如何处理故障转移和高可用性**


    网格通过将数据在所有节点上有效复制两到三份，从而能够抵御故障和停机。网格可以被视为一个有机的节点系统，其设计目的是在业务逻辑之外处理单个节点的故障。这与传统的分布式系统设计截然不同，在传统设计中，每个节点被视为一个始终在线的单元，开发者需要在源代码中处理节点故障的可能性。在网格系统中，故障——即节点、工作任务、网络等的故障——并非问题，因为基础设施会相应地处理问题。例如，待处理的工作项可以重新调度到另一个节点；节点可以重启，等等。


    986-1 CH11.qxd 5/28/08 12:54 PM 第 245 页


    第 11 章 n 使用 Terracotta 的网格计算


    **245**


    **用例**


    适合在网格上运行的应用程序通常是那些需要处理大型数据集，和/或需要并行化数据处理以获得更高吞吐量和性能的应用。计算网格的例子包括金融风险分析和其他模拟、大型数据集的搜索和聚合，以及销售订单管道处理。数据网格的例子包括像谷歌或雅虎这样的大型分布式互联网索引。


    **主/从模式介绍**


    主/从模式是网格计算的关键推动因素，也是并行化工作最著名、最常用的模式之一。在本章中，我们将解释该模式的特征，并探讨一些可能的实现策略。


    主/从模式由三个逻辑实体组成：一个主节点、一个共享工作空间，以及一个或多个从节点实例。主节点通过创建一组工作任务来启动计算，将它们放入共享工作空间，并等待工作任务被从节点拾取并完成。共享工作空间通常是某种队列，但也可以实现为元组空间（例如，在
    Linda 编程环境中，如 JavaSpaces，该模式被广泛使用）。


    n**注意** Linda 编程是由耶鲁大学 David Gelernter 领导的团队发明的。该系统由共享内存空间组成，供多个进程发布和获取对象。共享内存增加了互斥的概念，线程在操作对象之前必须从共享空间中取出所需内容。通过在工作时从共享内存中取出对象，线程可以安全地假设没有其他操作可以发生，因此不需要并发控制或事务。


    使用主/从模式的一个优势是算法会自动平衡负载。这种平衡之所以可能，是因为工作空间是共享的，并且从节点一旦有能力工作，就会持续从工作空间中拉取工作任务，直到没有待处理的任务为止。只要任务数量远远超过从节点数量，并且每个任务完成所需的时间大致相似，该算法通常表现出良好的可扩展性。有关该算法的概述，请参见图
    11-1。


    986-1 CH11.qxd 5/28/08 12:54 PM 第 246 页


    **246**


    第 11 章 n 使用 Terracotta 的网格计算


    **图 11-1.** *主/从设计模式中的工作流* **Java 中的主/从模式**


    现在，让我们看看在 Java 中实现主/从模式的不同方案。可能还有其他方法，但我们将重点讨论三种不同的方案，每种方案的抽象级别都更高。


    **使用 Java 语言的线程协调原语**

