    第 9 章


    集成模块


    **本**章讨论 Terracotta 集成模块（TIM）框架，该框架允许您将一组集群配置指定为组件，并将这些组件包含在您自己的配置中。我们将研究如何使用
    TIM 以及如何从头构建它们，当您需要对某个外部库或框架进行集群，或者需要模块化您自己应用程序的集群配置时，可能会用到这些知识。


    **通过配置进行集群**


    Terracotta 的集群方法建立在透明性的理念之上。编写可扩展的分布式软件时使用的最佳抽象，与编写可扩展的并发单 JVM 软件时使用的抽象是相同的。因此，集群是通过外部配置实现的，而不是通过使用
    API 和代码中的新库来实现的。


    这种方法的一个关键结果是，外部配置可以应用于现有的库，即使这些库最初并非为此目的而设计。


    配置驱动的集群允许您在分布式系统中利用当今许多优秀的开源库。


    Terracotta 通过 Terracotta 集成模块（TIM）支持库或组件的外部配置概念。一个 TIM 包含配置信息，有时还包含指定组件应如何集群和检测、如何执行锁定等的代码。


    TIM 本身包含在一个 JAR 文件中。TIM 内部包含一个清单文件、一些在 XML 文件中定义的 Terracotta 配置，以及可能的一些代码，这些代码可以在必要时应用于修改原始库。


    **使用 TIM**


    我们将通过一个示例来开始探索 TIM，该示例展示了 TIM 何时有用，以及如何使用 Terracotta 或其他人创建的模块。


    **集群化同步 Map**


    默认情况下，大多数集合类都是非同步的。像 HashMap 这样的类没有同步机制，一次只能安全地在单个线程中使用。然而，Java 集合 **203**


    986-1 CH09.qxd 5/28/08 10:41 AM 第 204 页


    **204**


    第 9 章 ■ 集成模块


    API 包含一个名为 Collections 的工具类，它有一个 synchronizedMap() 方法，该方法会将传递给它的任何 Map 包装成另一个类，该类在每次方法调用时都会在
    Map 上进行同步（类似于 Hashtable）。


    如果您随后对该同步 Map 进行集群，则需要为对 Map 对象的每个方法的访问指定集群锁。通常，您需要为所有修改 Map 状态的方法指定写级别的自动锁，并为所有其他方法指定读级别的自动锁。您可以在您的
    tc-config.xml 文件中通过添加一个 <locks> 部分来实现这一点，如清单 9-1 所示。


    **清单 9-1.** *tc-config.xml 中的 Locks 节*


    <locks>


    <autolock>


    <method-expression>


    void java.util.Collections$SynchronizedMap.clear()


    </method-expression>


    <lock-level>write</lock-level>


    </autolock>


    <autolock>


    <method-expression>


    Object java.util.Collections$SynchronizedMap.clone()


    </method-expression>


    <lock-level>read</lock-level>


    </autolock>


    ...针对 Set 中的每个方法...


    </locks>


    这个锁定代码可以正常工作，但您需要在每个使用同步 Map 的应用程序中都使用它。另一种方法是将此锁定配置打包到一个 TIM 中，然后任何需要它的应用程序都可以包含该
    TIM。


    **导入 TIM**


    事实证明，Terracotta 在名为 tim-synchronizedmap 的自动锁定集合 Terracotta 集成模块中提供了同步 Map 的自动锁定配置。


    要包含一个 TIM，您只需将其包含在 Terracotta 配置的 <clients> 部分中。清单 9-2 显示了一个示例片段，说明如何将 tim-synchronizedmap
    模块包含在应用程序 Terracotta 配置文件（通常是 tc-config.xml）的 <clients> 部分中。


    **清单 9-2.** *在 tc-config.xml 中要求一个模块*


    <clients>


    <modules>


    <module name="tim-synchronizedmap" version="2.0.0" />


    </modules>


    </clients>


    986-1 CH09.qxd 5/28/08 10:41 AM 第 205 页


    第 9 章 ■ 集成模块


    **205**


    每个模块声明由三个属性组成：


    *   name：模块名称，必填。

    *   version：模块版本，必填。

    *   group-id：模块组标识符，可选。如果未指定，则默认为 org.terracotta.modules。


    在运行时，Terracotta 将读取您的配置和包含的模块，并将每个模块的配置包含到您的应用程序配置中。一个集成模块的配置本身可能包含其他配置模块，这些模块也会被包含进来。


    这实际上允许您创建作为其他模块包的模块。

