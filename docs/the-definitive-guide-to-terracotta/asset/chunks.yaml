    就是这样。现在，让我们尝试将其作为分布式爬虫运行，通过将页面处理和数据聚合分发到多个节点上来实现横向扩展。我们可以复用前面章节中的 `tc-config.xml`
    文件，但需要添加几条 `include` 语句，以告知 Terracotta 对我们的爬虫类以及用于解析页面的第三方 JAR（Jericho）进行检测。在运行爬虫时，我们还意识到必须添加
    `commonj.work.WorkException` 进行检测，以便 Terracotta 能够管理爬虫的状态（例如，当 Work 失败时）；这样，其状态就可以通过网络从工作节点发送到主节点。


    <instrumented-classes>


    <include>


    <class-expression>


    org.terracotta.book.masterworker..*


    </class-expression>


    <honor-transient>true</honor-transient>


    </include>


    <include>


    <class-expression>au.id.jericho..*</class-expression>


    </include>


    <include>


    <class-expression>commonj.work.WorkException</class-expression>


    </include>


    </instrumented-classes>


    当我们运行主节点和工作节点时，需要通过调用 `dso-java` 将此 XML 配置提供给 Terracotta。通常，你会启动多个工作节点，让它们长时间运行，为多个由主节点发起的会话提供服务。出于示例目的，以下是启动单个工作节点和单个主节点实例的方法：


    dso-java -Dtc.config=tc-config.xml -cp ... \


    org.terracotta.book.masterworker.spider.StartWorker


    dso-java -Dtc.config=tc-config.xml -cp ... \


    org.terracotta.book.masterworker.spider.StartMaster


    **何时不应使用主/工作节点模式**


    在金融服务和电信行业的大规模用例实践中，我们总结出了 Terracotta 最有效的最佳实践，此外，也明确了不应使用 Terracotta 主/工作节点模式的情况。对开发者而言，最大的两个注意事项是**失控客户端**和**广域网负载均衡**。由于
    Terracotta 是应用程序内存的扩展，主/工作节点模式主要适用于彼此距离较近、配置相对统一的服务器大型网格。


    失控客户端最初是一个可论证的问题，当时一位 Terracotta 开发者构建了一个分布式缓存，集群中的某些节点是数据中心的服务器，而其他节点则是终端用户的笔记本电脑。当笔记本电脑在一天结束时被关闭，整个集群就会停止运行。我们通常将这些笔记本电脑称为失控客户端。队列消费速度过慢也会引发类似问题。如果你的网格中有些服务器是
    8 核 16GB 内存，而另一些是 2 核 2GB 内存，那么这两类机器将以不同的速度运行。除非对工作进行完美的分区，否则速度较慢的消费者会将 Terracotta
    整个网格的速度拖慢到与其一致。


    主/工作节点模式看起来像是隔离或限制这些失控客户端和慢速消费者的完美方法，并且在许多情况下也确实有效。但需要注意的是，一旦作为工作节点的失控或慢速消费客户端开始与主节点之外的任何节点共享数据，这些较慢的节点就会拖慢网格中其他对等节点的速度。


    至于广域网，主/工作节点模式则完全不够用。事实上，基于广域网的复制应该通过消息服务来完成。有趣的是，如果你按照我们展示的方式对主/工作节点模式进行定制，就可以创建出我们所谓的“边缘工作节点”。想象一下，构建一个基于
    POJO/Terracotta 的工作节点集群，它们使用链接阻塞队列进行通信，并同时充当广域网上的桥梁。这些桥梁工作节点会从本地网格中获取消息，并将其中继到广域网上的另一个网格。因此得名：这些特殊的桥梁工作节点位于你本地数据中心网格的边缘。


    **总结**


    在本章中，你学习了如何将第 5 章到第 10 章的技能进行扩展，使用 Terracotta 来横向扩展基于 POJO 的应用程序以及一系列流行的框架。现在，你应该也能够使用
    Terracotta 进行多线程、多 JVM、横向扩展的自定义处理。


    基于 Terracotta 构建的数据网格和计算网格具有高度的灵活性，因为框架的每个方面都是开放的，并且由你掌控。你可以决定工作单元是什么，决定批处理级别，决定路由能力，并根据需要编辑接口。


    你学习了如何仅通过调整网格操作的局部性和粒度，使用单个 Terracotta 服务器来扩展网格。虽然与其他企业用例相比，在网格用例中使用 Terracotta
    需要编写更多自定义代码，但最终得到的应用程序和框架仍然保持灵活、易于理解和维护。


    在第 12 章中，你将学习调优和扩展应用程序所需的最后一项技术：可视化技术和工具对于理解集群正在做什么以及为什么运行得快或慢至关重要。可视化对于网格尤其有价值，因为应用程序从不局限于任何一个节点，实际上，它是一个松散耦合的节点网格，作为一个大型服务器协同工作。可视化是理解网格运行状态的唯一途径。现在，让我们来看看可视化和通用的调优技术。


    **第 12 章**


    **应用程序可视化**


    **调**优在集群中运行的应用程序是困难的。调优之所以困难，是因为应用程序是一个跨进程和机器运行的逻辑实体，而可用的工具几乎只在进程或机器级别工作。


    例如，从第 5 章可知，Terracotta 有助于分发应用程序缓存数据。我们也知道，以随机方式访问缓存的应用程序无法扩展，因为对象必须通过 Terracotta
    服务器在集群中移动。但是，现有的性能调优工具（包括 CPU 和内存监控工具、JVM 堆监控工具和 Java 应用程序分析器）都无法显示分布式缓存速度慢的原因，因为集群中的随机
    JVM 会持续更新缓存内容，这种方式需要通知集群中的所有其他 JVM。


    这种缺乏用于调优和优化集群应用程序的工具的情况，促使 Terracotta 创建了集群范围的可视化工具。其理念是将开发者应该为每个 JVM 观察的所有相关指标和测量值，以及
    Terracotta 服务器的活动，堆叠在单个仪表板视图中。通过可视化，我们可以在应用程序运行时直接对其进行研究，而无需构建自定义工具。


    在本章中，我们将使用第 8 章中库存应用程序的一个衍生版本。这个演示将被修改，以便能够生成大量对对象的更改，并且这些更改可以是随机的，也可以高度集中于特定对象。你将学习如何使用
    Terracotta 的工具来帮助可视化并指出在各种场景中导致速度缓慢的原因。到本章结束时，你应该能够熟悉集群可视化的概念，并能够应用这些工具来解决实际问题。


    **观察应用程序**


    在医学实践中，观察身体传输的电模式这一概念的基础是，医生可以连接到身体的关键点，并可视化有助于确定心脏和大脑活动状态的关键信息。对于应用程序，我们也可以这样做。具体来说，可以连接到应用程序堆栈中的关键数据点，并通过随时间重复测量，了解应用程序正在做什么。

