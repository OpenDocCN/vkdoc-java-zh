    try {


    workItem.setStatus(WorkEvent.WORK_STARTED, null);


    work.run();


    workItem.setStatus(WorkEvent.WORK_COMPLETED, null);


    } catch (Throwable e) {


    workItem.setStatus(WorkEvent.WORK_REJECTED, new WorkException(e));


    }


    }


    });


    }


    }


    public void stop() {


    m_threadPool.shutdown();


    m_isRunning = false;


    }


