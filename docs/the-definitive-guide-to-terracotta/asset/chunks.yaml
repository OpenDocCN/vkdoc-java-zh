    in the prior section.


    **4.** Issue the following command to build the module:


    ```

    jar cvfm tim-bar-1.0.jar META-INF/MANIFEST.MF terracotta.xml

    ```


    You can then follow these steps to use this TIM in another project:


    **1.** Place the module in a module repository at the appropriate location. The
    `Bundle-SymbolicName` should map to a path in the repository with the `.` character
    replaced with the correct path separator. For example, if the `Bundle-SymbolicName`
    was `com.foo.tim-bar`; the module repository path would be `com/foo`; and the
    JAR should be named `tim-bar-1.0.jar`.


    **2.** In a new project, create a `tc-config.xml` that contains the following
    module:


    ```

    <module name="tim-bar" version="1.0" group-id="com.foo"/>

    ```


    **3.** If necessary, include the module repository containing your module JAR
    in the `tc-config.xml`:


    ```

    <repository>file:///usr/local/share/terracotta/modules</repository>

    ```


    That’s all there is to it. Bundling external configuration into a TIM is an easy
    way to let others cluster a library or application just like you do.


    ## Creating TIMs with Maven


    The prior section provided instructions on creating your own TIM. Terracotta also
    provides full Maven integration if you wish to manage your TIM project with Maven
    and build the TIM through the Terracotta Maven plug-in, which makes it even easier.


    **Note** This section assumes that you have downloaded and installed Maven by
    adding it to your path. See the Maven documentation located at [http://maven.apache.org/download.html](http://maven.apache.org/download.html)
    for instructions on downloading and installing it.


    Maven provides a standardized project object model, build life cycle, and a broad
    set of built-in goals for performing common tasks. One concept in Maven is that
    of an archetype that can be used to create a new project that is typical for some
    particular context. Maven provides built-in archetypes for common project types.
    Terracotta provides several archetypes specific to Terracotta.


    To create your own TIM Maven project, you can use the `tim-archetype` provided
    by Terracotta with the following command:


    ```

    mvn org.apache.maven.plugins:maven-archetype-plugin:1.0-alpha-7:create \

    -DarchetypeGroupId=org.terracotta.maven.archetypes \

    -DarchetypeArtifactId=tim-archetype \

    -DarchetypeVersion=1.0.5 \

    -DgroupId=org.myfavoriteframework \

    -DartifactId=tim-mymodulename \

    -Dversion=1.0.0 \

    -DremoteRepositories=http://www.terracotta.org/download/reflector/maven2

    ```


    **Caution** The names, versions, and URLs in this command are subject to change.
    Check the Terracotta Forge web site for current details.


    This command first specifies the identification information for the archetype
    plug-in itself and specifies the `groupId`, `artifactId`, and `version` for the
    TIM project you wish to create.


    When executed, this command will retrieve the TIM archetype from the Terracotta
    repository and create a new project for you in a subdirectory named after the
    `artifactId` (in this case, `tim-mymodulename`).


    You will see the package structure in your newly created Maven project area in
    Figure 9-1.


    **Figure 9-1.** *Integration module project area created through a Maven archetype*


    At the root of the project, you will find a `pom.xml` file and two subdirectories—`sample`
    and `src`. `pom.xml` is the Maven configuration file (POM stands for project object
    model). It will be preconfigured with reasonable defaults. It also references
    a parent project (`tim-parent`) that defines important configuration details that
    are inherited. You should edit and update the Maven file based on the instructions
    in the file.


    The `src` directory is where code and resources for the project will live. Most
    simple TIMs do not have code, and thus the only file created in the `src` directory
    will be the `terracotta.xml` file in `src/main/resources`. You will need to edit
    this file to specify the configuration for your TIM.


    The `src/site` directory contains default files used to build a web site pertaining
    to this project. These files will likely be useful to you only if you plan to
    publish a site around this project or host this project on the Terracotta Forge.


    The `sample` directory contains a sample application that demonstrates how to
    use the TIM produced by this project in another application. Most likely, the
    item of most interest will be the Terracotta configuration file at `sample/src/main/resources/tc-config.xml`.
    This file will contain a reference to the module you created.


    To actually build your project and produce a TIM, go to the project root and type
    the following:


    ```

    mvn install

    ```


    This command will create a new subdirectory called `target` and produce a JAR
    file in the `target` directory (along with some other files) called `tim-bar-1.0.0.jar`
    in this case. This JAR file is the TIM module. You’ll notice that there was no
    need to define the bundle manifest; Maven created it automatically as a result
    of the default `pom.xml` and the parent POM configuration.


    The `mvn install` command also installs the TIM into your local Maven repository,
    which can serve as a Terracotta module repository. You can then refer to it in
    your application’s Terracotta configuration and load it from there, if you wish.


    ## Module Versioning


    The examples given in this chapter show version numbers in the context of both
    OSGi bundles and Maven projects. The versioning schemes in these two contexts
    are similar but not identical.


    Often when working with an unreleased version of a project in Maven, you will
    call the release a snapshot release. These are typically done nightly or even
    more frequently with a continuous integration system and are not expected to be
    stable.


    There is an important difference between the snapshot version identifiers used
    in Maven versus those used in the OSGi bundle manifest. In Maven, `SNAPSHOT` versions
    use a hyphen as in `2.5.0-SNAPSHOT`. In OSGi, that would be an invalid version,
    and we must instead use a period, as in `2.5.0.SNAPSHOT`. In the module section
    of your `tc-config.xml` file, either form can be used; the Terracotta module resolver
    will find the module, but the hyphenated `-SNAPSHOT` Maven form is preferred.


    In the Maven POM, dependencies are supplied with a version, and in this case,
    Maven is resolving the dependency, so the Maven form (`-SNAPSHOT`) must be used.
    Similarly, in the Maven project version, the `-SNAPSHOT` form must be used.


    For a TIM project built by Maven, the Terracotta manifest plug-in included with
    the Terracotta Maven plug-in will automatically build bundles with the proper
    `.SNAPSHOT` form from a Maven `-SNAPSHOT` version.


    In summary, you should use the `-SNAPSHOT` form in all Maven files and Terracotta
    configuration files. The only place you must use the `.SNAPSHOT` form is in a
    bundle manifest if you are building the TIM without Maven.


    ## Including Code in a TIM


    Earlier in this chapter, we mentioned that it was possible to include not just
    configuration but code in a TIM. Let’s now consider why you might do this and
    how you can do it. Terracotta’s philosophy is to transparently distribute an application’s
    or library’s state by applying external configuration. In the majority of cases,
    properly concurrent and even many nonconcurrent applications can be configured
    externally to work in a clustered environment.'
