    Now, we have the three main artifacts in place; the Master, the Worker, and the
    SimpleQueue.


    But what about the Work abstraction, and what role does the WorkItem play?


    Let’s start with the Work, which is an interface in the CommonJ Work Manager specification.
    We cannot implement this interface generically in our master/worker container.
    Instead, the user of the framework should implement it, since the implementation
    of the actual work that is supposed to be done is by its nature use case specific.


