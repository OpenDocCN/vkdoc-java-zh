- fmt: '# 986-1 CH06.qxd 5/27/08 7:35 PM Page 138


    **138**


    ## CHAPTER 6: HIBERNATE WITH TERRACOTTA


    divorced entirely from managing the intermediary state. This approach reduces
    the original nine operations in our simple JDBC application down to just two—one
    load operation and one store operation.


    **Figure 6-5.** *The detached instances application makes only two SQL calls.*


    The detached mode architecture proves to be the fastest performing option for
    integrating Terracotta and Hibernate. Not only is the database invoked only two
    times versus the original JDBC application’s nine database calls, but the objects
    the application interacts with are now pure POJOs in memory. While Hibernate second-level
    cache objects are, in fact, byte arrays that need to be marshaled back and forth
    from POJO to cache entry, detached mode entities are purely heap-based objects
    and thus can be accessed at literally zero latency.


    You must make sure to store detached POJOs in Terracotta; otherwise, those POJOs
    will be lost on system failure or workload failover across JVMs.


    Terracotta can counteract the concerns with detached mode. The concerns are—as
    stated—loss of JVM memory as well as side effects of serialization on POJOs when
    those POJOs are clustered such as the violation of object identity discussed in
    Chapter 2. While most clustering solutions cannot safely help cluster detached
    POJOs, Terracotta does not have serialization and availability limitations.


    In Chapters 1 and 2, you learned that Terracotta provides the same level of data
    integrity and availability that a database can provide. When using Terracotta
    in conjunction with Hibernate, we can leverage this availability guarantee to
    eliminate the risk of losing our


    986-1 CH06.qxd 5/27/08 7:35 PM Page 139


    ## CHAPTER 6: HIBERNATE WITH TERRACOTTA


    **139**


    intermediary state while working with that state as detached (POJO) instances.
    Terracotta is not limited to small serializable object graphs—it can be used with
    arbitrarily large object graphs regardless of whether or not those objects implement
    certain interfaces.


    ### Benchmarking the Enhancements


    Table 6-1 shows results we get using a simple benchmarking program to measure
    the time it takes to perform a fixed number of updates or reads, using Terracotta
    with the techniques presented in the preceding sections.


    **Table 6-1.** *Relative Performance of Combinations of Hibernate and Terracotta*


    | **Operation Type** | **Results** |

    | --- | --- |

    | Update | Hibernate: 1,000 operations / second |

    | | Hibernate with a second-level cache: 1,800 operations / second |

    | | Hibernate with detached instances clustered with Terracotta: 7,000 operations
    / second |

    | Read | Hibernate: 1,000 operations / second |

    | | Hibernate with a second-level cache: 1,800 operations / second |

    | | Hibernate with detached instances clustered with Terracotta: 500,000 operations
    / second |


    As you can see, we gain some benefit by opting to use a second-level cache, but
    we gain the most by using detached instances. These findings are, of course, not
    too surprising, because detached instances are really just POJOs, and Terracotta
    is designed as a plain Java, or POJO, clustering solution.


    **Note** These results were obtained using a MacBook Pro and the HSQLDB database
    and are meant only to enable direct comparison between using Hibernate with Terracotta
    and using Hibernate without it. Explicit testing underneath a specific use case
    is recommended to measure the benefit for a particular application or in a specific
    hardware environment.


    ### Configuring Hibernate to Work with Terracotta


    We’ve talked about the benefits you will get by using Hibernate and Terracotta
    together. This section will give you practical information on how to configure
    Terracotta to work with your Hibernate-based application.


    First, as outlined previously, you must decide where you will integrate Terracotta:
    as a second-level cache, for detached instances, or both.


    986-1 CH06.qxd 5/27/08 7:35 PM Page 140


    **140**


    ## CHAPTER 6: HIBERNATE WITH TERRACOTTA


    ### Configuring a Second-Level Cache'
