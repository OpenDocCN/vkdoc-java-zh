    模块解析器会找到该模块，但更推荐使用带连字符的 `-SNAPSHOT` Maven 形式。


    在 Maven POM 中，依赖项会附带一个版本，在这种情况下，Maven 正在解析依赖项，因此必须使用 Maven 形式（`-SNAPSHOT`）。类似地，在
    Maven 项目版本中，必须使用 `-SNAPSHOT` 形式。


