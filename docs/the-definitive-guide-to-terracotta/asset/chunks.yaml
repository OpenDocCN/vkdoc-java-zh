    ID 来检索单个对象。与数据库对磁盘的多种用途相比，Terracotta 对磁盘的单一用途意味着它可以自我优化，而数据库则需要管理员干预，以告知系统针对特定数据应利用众多优化中的哪一种。


    **用例**


    Terracotta 使多台服务器协同工作，如同一个逻辑服务器。它可以应用于多种方式和众多用例，但它与 JVM 协同工作，以消除我们在处理一个又一个应用程序时通常会遇到的扩展性/可用性权衡问题。


    Terracotta 的基本用例涵盖以下大类：


    • 分布式缓存


    • 数据库卸载


    • 会话复制


    • 工作负载分区


    **分布式缓存**


    当用于分发应用程序缓存数据时，Terracotta 会在多个 Java 进程之间共享 Java 集合。在这种架构下，典型用例需要跨进程共享映射（maps）、列表（lists）、数组（arrays）和向量（vectors）——包括
    `java.util` 和 `java.util.concurrent` 中的类型。Terracotta 的几项能力将使此用例更加容易。首先是对象标识将正常工作。这意味着
    `hashCode()` 和 `==` 将按预期工作，例如，在映射和列表中多次存储同一个键时。这也意味着以下代码示例将返回 TRUE：


    Object foo1, foo2;


    foo1 = cache.get( key );


    foo2 = cache.get( key );


    return( foo1 == foo2 );


    透明集群服务对分布式缓存应用程序的另一个好处是，缓存不会影响领域模型。这里经典的例子是对数据集建立多个索引。例如，旅游行业的网站需要能够按位置、价格、房间设施和可用性来显示酒店。存储酒店数据的自然位置是数据库，在那里所有这些细节都转化为对数据表的
    SQL 查询，并且索引在运行时指定。然而，大多数旅游网站并不会在每次用户访问网站并尝试查找酒店时都向数据库发起查询；相反，它们使用缓存。而且，如果能在缓存中实现我们在数据库中能做的事情，那就太好了，即只存储酒店一次，但拥有以价格范围、位置名称和其他数据作为不同键的备用索引。


    我可以将位于旧金山市中心的威斯汀圣弗朗西斯酒店存储在键“旧金山”、“美国邮政编码 94102”和“每晚 300 至 1000 美元的酒店”下。但无论以何种方式返回，这家酒店都是同一家酒店。这一切都很好，直到我们想将酒店的特价价格更新为
    259 美元；现在，该酒店不再属于最初存储在缓存中的价格范围，因为它现在低于 300 美元。如果我们在数据库中建模，这没有问题。但如果我们在内存中跨机器建模，就会有问题。第
    5 章将详细介绍分布式缓存用例以及如何处理随时间变化的数据。


    **数据库卸载**


    数据库既是 Java 开发人员存在的祸根，同时也是我们最好的朋友。

