    # 第 8 章


    # 集群 Spring


    **Spring** 框架最近已成为基于 POJO 的 Web 和企业开发的主要选择之一。Spring 是一个依赖注入容器，允许开发人员在 POJO 中编写业务逻辑，并以声明方式配置和注入依赖项、所需的基础设施服务等。


    Spring 的主要目标是通过回归到可以在没有特定执行环境的情况下进行测试和部署的 POJO，将简单性带回 Java 企业开发。


    Spring 有效地帮助您将企业特性与应用程序的功能部分分离：您使用最能表达其含义的对象模型来编写应用程序。


    然后，Spring 将关于数据如何访问、对象生命周期如何管理以及企业应用程序的其他此类方面的繁琐企业细节注入到您的应用程序中。


    这样，您可以编写关于您的应用程序的代码，而不是关于与数据库通信、参与事务或准备要作为消息发送到其他 JVM 的消息的代码。


    方便的是，Terracotta 与 Spring 的理念相同，使 Terracotta 和 Spring 成为一对完美的搭档。Terracotta 专门设计用于让您编写关于应用程序的代码，避免手动编写使应用程序具有高可用性或可扩展性的代码。因此，Terracotta
    对 Spring 框架的专门支持允许开发人员创建常规的非集群 Spring 应用程序，像往常一样测试它们，并在需要时声明式地定义他们想要集群的 Spring
    Bean（在哪些应用程序上下文中）。然后，Terracotta 将确保这些 Spring Bean 尽可能有效地集群，同时在集群中保留与单个节点上完全相同的语义。


    您可以将 Terracotta 视为允许您跨多个 JVM 集群 Spring 应用程序上下文，就好像它们都在同一个 JVM 上一样。在特定应用程序上下文中已声明为在
    Terracotta 中集群的单例 Bean、会话作用域 Bean 和自定义作用域 Bean，将在连接到 Terracotta 集群的每个 JVM 中的该应用程序上下文的所有实例之间共享。此外，可以配置该应用程序上下文的应用程序事件，以自动发送到所有
    JVM 中该应用程序事件的所有监听器。


    在本章中，我们将逐步介绍将非 Spring 集群应用程序转变为支持 Spring 的集群应用程序的过程，向您展示如何以简单、有效且自然的方式集成 Terracotta
    和 Spring。


