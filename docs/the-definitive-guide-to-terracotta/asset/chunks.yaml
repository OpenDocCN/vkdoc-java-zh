    detects the need for a remote file system and mounts that file system on demand.


    In `storeAClusteredClassInstance()`, if we assume server one starts before server
    two, then we want only the first JVM to construct `myMap`, just like the code
    fragment would behave in one JVM. You are starting to see that Terracotta cannot
    only look for objects in memory but, in fact, has to address a few special instructions
    such as object construction, which translates into new memory allocation, as well
    as thread locking, which translates into mutex operations in the underlying operating
    system. In Chapters 3 and 4, we will explain how this works in more detail.


    For now, it is sufficient to know that there are only a handful of instructions
    that the JVM executes when manipulating memory, and Terracotta can observe all
    of them.


    To round out our initial understanding of sharing objects across Java processes
    to achieve transparent clustering, threading and coordination must be considered.
    In the file analogy, an application process must lock the part of the file it
    wishes to write so that other processes do not corrupt it. For threads and locks,
    Terracotta can provide for cross-JVM locking just by using Java synchronization.
    You need to understand a bit about the Java memory model before you can fully
    understand this concept.


    Threads are part of the clustering equation in that they manipulate objects and
    have to be synchronized when accessing those objects. Let’s assume for a moment
    that Terracotta is deployed and working such that we have `c3` on servers one
    and two and that `c3` is exactly the same object in both JVMs. If one server wants
    to change `myMap`, it needs to lock `myMap`. Thus, locking and threading semantics
    must spread across processes, just like objects spread across Java processes.


    ## Honoring the Java Memory Model


    You know just about all you need to know to get started—except we still need to
    consider the memory model. We must synchronize our changes to `myMap` or `c3`
    across Java processes just as we would across Java threads; at least, we do if
    we want changes to either object to be sent reliably between servers one and two.
    In a sense, the process boundaries have melted away.


    But when do the servers communicate? And what do they send? The memory model provides
    the answer.


    The Java Memory Model is quite well documented elsewhere, but the key concept
    we should focus on is "happens before," as laid out in JSR 133. To the JVM, "happens
    before" is defined as the logical time before a thread enters a synchronized block.
    The JVM assures that the objects this thread will gain access to once inside the
    synchronized block will be up to date.


    ■**Note** The Terracotta authors relied on the graduate thesis of Bill Pugh at
    Carnegie Mellon University dated June, 2004 in designing the software, as did
    we when writing this book.


    The model asserts that any changes that happened before a thread is granted entry
    into a synchronized block will be applied to main memory before the lock is granted.
    Terracotta uses the memory model to ensure proper cross-process behavior and semantics.
    For example, if object `o` has been changed by server one at some point in the
    recent past, server two will get those changes before entering into a synchronized
    block that is protecting access to `o`. Server one''s changes in this case *happened
    before* server two began working with `o`, so server two sees server one''s changes.
    Since locks are exclusive and pessimistic, meaning only one thread is allowed
    into a synchronized block at a time, the memory model proves sufficient for defining
    ordering in an environment where threads are spread across Java processes. We
    will go into more detail on this assertion in Chapter 4.


    ■**Note** To the highly informed reader, Martin Fowler''s statement "remember
    the first law of distributed computing: don''t distribute your objects" might
    seem to be questioned by Terracotta''s transparency. In fact, it is. Fowler''s
    claim is too simple and ignores the fact that distributing objects is indeed ambiguous.
    Fowler was focused on remote method invocation (RMI). RMI serializes an object,
    sends it to a remote JVM, deserializes that object, runs the specified method,
    serializes the object, and returns control back to the first JVM.


    Terracotta does, in fact, distribute object data and coordinating events, but
    Terracotta never moves the processing context from one JVM to another as RMI would.
    Just as we can remotely store the files underneath an application without breaking
    that application, we can remotely store application objects without breaking the
    application. Therefore, Terracotta is not bound by Fowler''s law as stated, because
    Terracotta never uses RMI, serialization, or other frameworks—each of which is
    not transparent. In fact, such frameworks throw exceptions that only the developer
    can address in source code, such as `RemoteMethodInvocationException`.


    ## Being a Service Has Advantages


    It has already been established that the technology offers a Java developer transparent
    clustering. Let''s now turn our attention to the "service" component of our definition
    of Terracotta.


    Terracotta is made up of only a few components. It feels and smells like the services
    that operators are used to, meaning that Terracotta is not only some sort of agent
    or library running inside existing Java processes but also itself is a Java process.


    To restate, Terracotta is made up of libraries you install next to any JVM that
    is to join a cluster, and Terracotta is a separate Java process unto itself, as
    shown in Figure 1-3.


    **Figure 1-3.** *Terracotta''s two components include libraries and a server process
    that communicate over TCP/IP.*


    The Java process running the Terracotta server runs *only* Terracotta. This Java
    process is the focal point of an operator''s effort in managing a cluster of Java
    processes running on top of Terracotta. This means two things: scalability can
    be as easy as adding more JVMs, and high availability works similarly to that
    of the database or a file server. While applications use Terracotta to deliver
    availability and scalability, Terracotta itself delivers both scalability and
    availability when the operator managing the process can make the Terracotta service
    highly available. To simplify this concept, Terracotta makes an application highly
    available and Terracotta is, itself, made highly available much like a relational
    database.


    ### Availability


    In subsequent chapters, you will learn how Terracotta stores a copy of our shared
    object data outside our existing Java processes. This implies that if all our
    Java processes were to stop, we could, in fact, start the processes again and
    gain access to those objects as they existed in memory before Java was terminated.
    When running on top of Terracotta''s transparent clustering service, an application
    does not stop running until the operator flushes the objects from Terracotta''s
    memory and disk. This is how Terracotta delivers high availability as a runtime
    service.'
