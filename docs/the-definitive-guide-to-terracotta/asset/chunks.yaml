  raw: 'This is the essence of DI. The store component is responsible for exactly
    one thing—providing access to the components of the store. It constructs none
    of its state by itself; therefore, the actual implementation of the other system
    components it interacts with is completely independent of the implementation of
    the store. The store’s dependencies are injected into it through constructor arguments.


    ■**Note** There are many styles of DI beyond passing in constructor arguments;
    we won’t discuss all of them. There is also much more to Spring than just DI.
    To explore Spring, DI, and inversion of control more deeply, visit the Spring
    Framework web site at [http://www.springframework.org/](http://www.springframework.org).


