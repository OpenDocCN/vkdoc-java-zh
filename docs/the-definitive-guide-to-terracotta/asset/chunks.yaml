    Terracotta 服务器上针对该对象的等效锁定操作。对未存储在 Terracotta 中的对象进行的锁定操作，不会受到集群范围的 Terracotta
    锁定增强的影响。同样，所有未在 `<locks>` 部分指定的方法中的锁定操作也是如此。


    如果你在 Terracotta 中运行此示例，第一次执行会将 `nodesJoined` 计数器从零递增到一，并进入 `run()` 方法中的 `while`
