- fmt: '# 会话数据与负载均衡


    当所有会话数据都能放入应用服务器的物理堆内存时，轮询负载均衡器会将所有活跃会话数据固定到所有应用服务器的本地堆中。这是因为任何给定会话的请求都会被均匀地分发到所有活跃服务器上。在处理这些请求的过程中，会话数据会自动被加载到处理请求的服务器中，直到最终每台服务器都为每个会话处理过请求。因此，每个会话都会驻留在每台服务器的堆中，这会导致对每个会话的每次更改都传播到每台应用服务器。在集群中保持会话状态同步所需的网络流量、处理开销和系统开销会随着应用服务器数量的增加而倍增。由于这种架构无法线性扩展，在某个临界点，为满足不断增长的需求而添加新服务器将导致收益递减，并对应用程序的可扩展性形成硬性限制。


    当并非所有活跃会话数据都能放入应用服务器的可用物理堆内存时，情况会变得更加糟糕。在这种情况下，不仅存在保持所有会话数据同步的额外开销，而且每台应用服务器中的`Terracotta`对象缓存也会开始抖动。这是因为，当会话数据占用的堆内存量超过`Terracotta`对象缓存所能容纳的范围时，`Terracotta`客户端会采取措施从缓存中驱逐对象。然而，由于轮询负载均衡器将所有会话均匀地分发到所有应用服务器，因此不存在使用频率低于其他会话的活跃会话；为了节省内存，`Terracotta`虚拟内存子系统会驱逐活跃的会话数据，而这些数据很快又需要被重新加载。


    这种缓存抖动会严重影响`Terracotta`虚拟堆的性能，进一步降低可扩展性。您可能在自己的计算机上遇到过类似的情况：当您的活跃内存使用量超过可用物理`RAM`时，计算机上的程序会争相访问无法全部放入`RAM`的内存，导致内存`I/O`从`RAM`速度降级为磁盘速度，从而使计算机变得缓慢且无法使用。


    ## 使用粘性负载均衡器


    鉴于轮询负载均衡器对`Terracotta`可扩展性的负面影响，我们强烈建议不要使用它。相反，一种更为友好的负载均衡方案是保持用户与其会话所在服务器之间的会话亲和性。这种粘性负载均衡器倾向于将特定会话的数据仅保留在一台应用服务器上，从而极大地提高了引用的局部性。由于任何给定会话的数据仅存在于一台服务器的物理堆中，对其的更改无需传播到任何其他应用服务器，从而消除了维护虚拟堆所需的大量网络和处理开销。


    此外，由于任何给定会话的数据仅存在于一台服务器的物理堆中，它不会占用其他应用服务器的堆空间，从而减少了所需的物理堆总量并最小化了缓存抖动。准确配置您的集群也变得更加容易，因为您可以知道一台应用服务器的物理堆能够容纳多少个活跃会话。当活跃会话数量增长到超出物理堆容量时，您可以配置更多的应用服务器，保持每台服务器的会话数量恒定，并确保所有活跃对象都能放入本地`Terracotta`缓存。例如，假设您的应用程序会话对象每个占用`1KB`，并且每台服务器有`1MB`内存。那么一台服务器可以处理`1000`个会话。如果您的网站将有`10,000`个访客访问，您需要配置`10`台服务器。


    ```

