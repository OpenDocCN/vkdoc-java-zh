    **84**


    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    **Why Clustered POJOs?**


    Essentially, the motivation behind using a clustered heap is simplicity. Using
    a virtual heap lets you focus on the logic of your application without the architectural
    and semantic distor-tions inherent with explicit object externalization. Every
    other attempt to provide object durability and/or inter-JVM communication presents
    object modification and cross-JVM


    message passing as an explicit API that is inextricably embedded in your application
    code.


    A great deal of effort has been put in to making Java applications enterprise
    class, meaning that they have very high uptimes, handle data reliably, and scale
    properly to keep perceived latency minimal regardless of user load. To provide
    enterprise-class functionality, two features are required that are not provided
    by the JVM:


    • Durability and portability of object data


    • Cross-JVM thread communication


    Durability and portability of object data is required for reliability and high
    availability.


    Reliable data handling requires that application data be durable. Since the Java
    heap is not durable, object data must be externalized to a durable store.


    For an application to be highly available, it must either run on highly available
    hardware or be deployable redundantly on commodity hardware. This latter path
    has traditionally been chosen by Java enterprise architects to provide high availability
    for a number of reasons, not the least of which is that it can be extended to
    yield scalability by elastically adding (or removing) commodity hardware to fit
    user demand, theoretically keeping latency stable. As discussed earlier, this
    scale-out architecture requires that at least some of the running state of an
    application instance be externalized so that, should one application instance
    fail or be taken offline, another may seamlessly take its place, picking up from
    where it left off. Durability and portability of object data are, therefore, required
    to maintain application state in a scaled-out architecture.


    Once an application is deployed in a scaled-out architecture, there inevitably
    arises the need for inter-JVM communication and coordination for one reason or
    another. Typical examples are cache flushing or expiration and administrative
    functionality. More advanced architectures, such as the master/worker form of
    workload distribution discussed in Chapter 11, are explicitly designed to take
    advantage of multiple JVM deployment footprints and require robust and flexible
    inter-JVM communication and coordination.


    These twin features, durability and portability of object data and cross-JVM thread
    communication, have been backfilled into the Java execution environment in a number
    of more or less sophisticated ways since Java’s inception. The core of many such
    technologies is object serialization, the most basic way to externalize object
    data. Once an object graph is serialized, it may then be exported to a durable
    store such as a file or a database or across a network to another JVM.


    Based on this core feature, extra scaffolding has been built up to provide more
    sophisticated persistence handling (e.g., EJBs or object-relational mapping engines
    like Hibernate), or to provide inter-JVM communication (e.g., RMI or JMS) and
    data sharing.


    In conceiving Terracotta, the creators noticed that most of the features provided
    by explicit object durability and inter-JVM communication frameworks could be
    provided much more simply if existing facilities already found in the JVM were
    extended to allow the participation of threads not in the same JVM. The JVM already
    has a notion of local and remote


    986-1 CH04.qxd 5/6/08 3:01 PM Page 85


    C H A P T E R 4 ■ P O J O C L U S T E R I N G


    **85**


    objects: thread memory and main memory (heap). Likewise, it already has a notion
    of interprocess communication and coordination: the thread-level concurrency primitives
    synchronized, wait(), notify(), and join().


    Adding a durable object store in the form of an extended, network-attached virtual
    heap and extending the meaning of the concurrency primitives to apply to all threads
    in all participating JVMs provides the twin enterprise features of object durability
    and portability and inter-JVM communication and coordination in a way that looks
    remarkably similar, if not identical in all cases, to Java code written with only
    one JVM in mind.'
