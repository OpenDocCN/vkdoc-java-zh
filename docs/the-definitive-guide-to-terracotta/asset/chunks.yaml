    <field-name>HelloClusteredWorld.buffer</field-name>


    </root>


    <root>


    <field-name>HelloClusteredWorld.loopCounter</field-name>


    </root>


    </roots>


    Configuring Instrumentation


    Terracotta’s transparency system augments Java byte code as it gets loaded into
    the JVM in order to observe changes to objects and coordinate cross-JVM locking
    and object updates.


    Our current configuration is set to instrument every class that gets loaded by
