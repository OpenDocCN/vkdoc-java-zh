- fmt: '# Extending HTTP Sessions with Terracotta


    When a session is created, it is also sent to Terracotta. When a session is read
    or accessed, its contents can be paged in from Terracotta just in time. When a
    session is updated or deleted, Terracotta is made aware of the changes. Terracotta
    always keeps the sessions in sync across the application cluster. From a developer’s
    point of view, nothing changes and the application is automatically clustered.


    ## Transparently Plugs into Web Containers


    As you saw in the first section of this chapter, the HTTP session API is standardized
    by the servlet specification. This allows Terracotta to create its own implementation
    that is highly optimized for our distributed virtual heap. Even though Terracotta
    is able to take any regular Java class and make it distributed, a lot of optimizations
    can be done to improve the performance in a cluster. By using its own session
    implementation, Terracotta is, for example, able to avoid faulting attributes
    into nodes when the session eviction logic is running or to prevent the transfer
    of all attributes when only a single one is used in a session.


    The good news is that you don’t have to worry about the custom implementation
    at all.


    When Terracotta is activated for a supported servlet container or application
    server, Terracotta transparently instruments the supported product’s internals
    to work better in a Terracotta-based world. The Terracotta-specific version of
    the servlet session hooks in underneath both your application as well as the container
    without any specific configuration necessary. You merely have to indicate the
    names of the web applications that should become clustered in the Terracotta configuration
    file, and all the rest is automatically taken care of. The next section will show
    you how this is done.


    **Note:** The intrepid reader who skips ahead to Chapter 9 will notice that HTTP
    session clustering for web applications does not follow the notion of Terracotta
    Integration Modules. Session distribution with Terracotta predates Integration
    Modules. Terracotta may decide to move some or all container-specific session
    behavior to modules. For now, session distribution with Terracotta is a special
    case in that Terracotta’s implementation is exposed to the user and must be installed
    into the container before distribution will occur. More information on various
    containers is available at [http://www.terracotta.org/confluence/display/integrations/Home](http://www.terracotta.org/confluence/display/integrations/Home).


    ## Appropriate Lock Granularity and Isolation


    Two aspects to locking have a profound impact on the performance and concurrency
    of a cluster: granularity and isolation. In generic terms, lock granularity refers
    to the relationship between the object being locked and the object being changed.
    Think of two objects in a graph, a root object with five child objects underneath
    the root. Locking the root to edit the child is a coarse-grained locking, while
    locking the child to edit itself is fine-grained. Update isolation, following
    the example, exists or is maintained as long as two children of the root, locking
    separately of each other, do not block each other, commingle field updates, or
    otherwise corrupt each other’s state.


    In the context of HTTP sessions, each session should be able to update its internals
    independently from other sessions but still ensure that the data can’t be corrupted
    during simultaneous access. This includes updating the timestamp when the session
    was last used.


    Similarly, when the eviction logic is executed to remove expired sessions, the
    entire cluster shouldn’t need to wait for the operation to be finished.


    Also, the retrieval of sessions should be executed in perfect concurrency. However,
    when a session is stored, exclusive access to the session store should be ensured.
    The retrieval should thus use read lock isolation, while the storage uses write
    lock isolation.


    Concurrency can be optimized in many other ways. Terracotta’s session implementation
    properly locks shared data elements across a cluster to strive for optimal performance.


    ## Benefits


    Earlier in this chapter, we touched on some of the benefits of using Terracotta
    for distributing HTTP sessions. This section will cover some additional important
    features.


    ### No Serialization


    As we discussed in the section about session state persistence, serialization
    is usually used to transfer the session state to another node in a cluster. Terracotta
    doesn’t rely on this. In Chapter 4, you learned that Terracotta plugs in at the
    byte code level and is able to break down every Java class into basic types that
    can be shared with other nodes without having to rely on serialization.


    This makes the developer’s life a lot easier because it eliminates the worry of
    bringing a single-server web application to a cluster. Often, in the early stages
    of an application’s life, a lot of attention is brought to ensuring that it’s
    bug-free and works as intended. Testing often occurs on a small or unit scale,
    and scalability testing is conducted near the end of the development effort when
    the entire application can be assembled in one place. Terracotta’s HTTP session
    support allows the clustering to simply be activated on either the developer’s
    workstation or when the application is deployed in the performance lab or production
    environment, without having to ensure that all the classes in the session implement
    the `Serializable` interface. Developers using Terracotta for session replication
    can write units of application functionality, test them with `JUnit` or whatever
    they like, and test them again on two JVMs running on the same desktop.


    Ensuring that data structures are properly serialized and deserialized is also
    very error-prone, particularly when data structures evolve over time and older
    persisted state needs to be compatible with newer classes. Not having to worry
    about this reduces the development effort and makes your application more resilient
    to changes over time.


    ### Rolling Upgrades


    Terracotta stores the shared state in a logical structure that is dissociated
    from the actual class structure of the objects in your shared state. Each class
    field gets a dedicated logical key that is associated with the field’s value.
    When the session state is retrieved by another node, these logical keys are looked
    up when an object in the session is instantiated by Terracotta. If fields have
    been added to a newer version the class, these will simply use their default values
    if no appropriate logical keys can be found. Once these new fields are part of
    the session state, their values will be stored in the same fashion as the other
    fields. If fields are removed, their logical keys will simply not be looked up,
    and the values will not be applied. In other words, the class object in each JVM
    drives which fields are accessible to your application code and which version
    of each field to access. A class that changes over time does not break the instances
    stored in the Terracotta server.


    Figure 7-3 illustrates the behavior of a web application that changes over time.
    The first change introduces a new field, and the second change removes a field.
    In the figure, versions 2 and 3 of the session logic can see the `age` object
    in session whereas version 1 cannot. Version 1 never requests the `age` object
    and thus everything works. Further, version 3 is the only version that cannot
    see the `order history` object and will therefore not act on that object while
    the two previous versions can still see the `order history` object even though
    servers with version 3 of the application logic are present in the cluster.


    **Figure 7-3.** *Terracotta’s transparent object versioning works well when rolling
    web application changes into production.*'
