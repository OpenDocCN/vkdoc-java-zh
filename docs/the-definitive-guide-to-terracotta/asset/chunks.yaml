    is bottlenecked somewhere we don’t really want, because the pounder methods change
    the price of Product objects as rapidly as possible. Given the requirement to
    flush the changes at each lock release, every time setPrice() is called, network
    I/O will occur. If both the pounder method and setPrice() lock the object, we
    will flush changes twice each time through the loop.


