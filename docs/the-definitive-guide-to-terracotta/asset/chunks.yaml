    of buying expensive parallel processing machines with lots of RAM and CPU. The
    preferred deployment model was what many referred to as scaling out an application
    across many small machines, as opposed to scaling up an application inside one
    large multiprocessor server.


    So while the Internet drove us to scale out, scaling out itself was simultaneously
    forced on us, since we now had multiple JVMs on the brain. Multiple JVMs on multiple
    nodes was not a difficult leap forward for IT departments. Perl scripts and the
    like helped to manage the sprawl, and managing the sprawl was the most important
    capability that kept operations teams from rejecting the scale-out model.


