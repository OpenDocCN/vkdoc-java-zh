    C H A P T E R 5


    Caching


    **A**cache provides temporary storage of data that can be accessed faster than
    it can be computed or obtained from a more authoritative source. In the first
    case, values that are expensive to compute are remembered to avoid performing
    the computation repeatedly. In the second case, values are remembered to avoid
    obtaining them from a much slower or more expensive source such as a database,
    a remote source, or a file system.


    In this chapter, we will examine the many ways caching can help and hurt your
    application. We will then examine how Terracotta can address some of the common
    problems with caching and how to extend the benefits of caching to distributed
    systems. Finally, we will look at examples of caching using basic Java data structures
    and also with sophisticated open source caching libraries like Ehcache.


    **The Pain of Caching**


    While caching is an invaluable tool for reducing latency or relieving load from
    an overbur-dened system of record, it does not provide its benefits without trade-offs,
    as anyone who has ever managed a cache can attest. The trade-offs are generally
    various flavors of the following:


    • *Space for time*: The cached data must be stored in an accessible location (e.g.,
    RAM or local disk) for some period of time. The cost of space in that accessible
    location must be balanced against the cost of going to the source for the result.


    • *Freshness*: Since the cache is not the authoritative source of the data, its
    usefulness is relative to how fresh the data is, how important that freshness
    is, and how hard it is to keep the cache fresh enough.


    • *Complexity*: Managing the trade-offs of space and freshness introduces a degree
    of complexity that can quickly become unbearable.


    Let’s take a moment to walk through some of the most common ways that cache management
    can make the life of a cache maintainer painful.


    **The Pain of Large Data Sets**


    If the important part of your data set (the part that you use often enough to
    warrant caching) fits into available RAM and it changes slowly enough so that
    freshness is not an issue, caching can be as simple as storing computed results
    in a map by some unique identifier, occasionally **103**


    986-1 CH05.qxd 5/31/08 8:56 AM Page 104


    **104**


    C H A P T E R 5 n CACHING


    invalidating cache entries as they grow stale. However, caches have a habit of
    outgrowing the boundaries of available RAM. When that happens, you have a few
    choices:


    • Buy more RAM. This works up to a point, but there’s a hard limit on how much
    RAM


    you can install or is addressable by your operating system. In a JVM, very large
    heaps can also present significant garbage collection tuning challenges. Suffice
    it to say that buying more RAM isn’t always the best or even a viable option.


    • Purge less important cache entries even though they are still valid to make
    room for the more important entries. This can reduce the effectiveness of your
    cache to the point of making the cache useless. If the miss rate is high enough,
    your cache may end up thrashing—continually purging and reloading entries—so that
    the overhead of maintaining the cache actually makes things worse.


    • Spill the cache to disk or a networked cache server. This is more sophisticated,
    but your cache implementation must support it. If you require this sophisticated
    functionality of your cache and you are using a homegrown implementation that
    started out life as a simple map, it’s probably time to swap it for an existing
    cache implementation that does this kind of thing already. Unless you are in the
    business of writing a cache implementation, you shouldn’t extend your homegrown
    cache to provide these more sophisticated features, or you will end up in the
    business of writing and, worse, *maintaining* a cache implementation whether you
    like it or not.


    **The Pain of Staleness**


    Keeping a cache up to date is another common problem of cache maintenance. If
    you’re lucky, you’ll be caching data that doesn’t change much. If not, you have
    to deal with keeping the cache entries fresh enough. “Fresh enough” is highly
    data dependent. Sometimes, you can get away with having some stale entries as
    long as they get updated eventually. In that case, you might be able to get away
    with an algorithm-based invalidation policy.


    Often, though, the cached data *must* agree with the system of record at all times.
    This is common for financial and transaction data. The fresher the cache must
    be, the more constraints exist on the implementation. Maintaining both freshness
    and a hit rate high enough to be worth using a cache at all may require extreme
    measures. How a cache is kept fresh is ultimately an architectural and business
    decision.


    **The Pain of Duplication**


    The many pains of caching become even worse if the same data source is cached
    in multiple locations, as is common in a scaled-out deployment where many instances
    of the same application all keep their own copies of the same cached data. As
    each new instance of the cache comes online, it must query the system of record
    to populate the cache with entries it doesn’t have yet. As such, the protection
    provided by caching to the system of record is the reciprocal of the number of
    copies of the cache. Terracotta calls this the 1/ *n* effect (pronounced “one-over-n”),
    where the effectiveness of a cache at protecting a precious data source is one
    over the number of copies of the cache.


    Figure 5-1 demonstrates the 1/ *n* effect: if there are *n* application servers,
    each application server must load the same data as it is requested, which causes
    *n–1* unnecessary cache loads.


    986-1 CH05.qxd 5/31/08 8:56 AM Page 105


    C H A P T E R 5 n CACHING


    **105**


    Ultimately, this means that the cache efficiency can be no more than 1/ *n* of
    its possible efficiency.


    **Figure 5-1.** *The 1/n effect*


    Keeping many copies of the same cached data up to date presents a similar problem,
    especially if, for example, the cache deployment uses network messages to send
    updates or invalidation messages. The number of update or invalidation messages
    is a multiple of the number of copies of the cache. As the number of instances
    of a scale-out deployment grows, the overhead of processing these cache messages
    can overwhelm the connecting network and the infrastructure used to send such
    messages.


    Last but not least, operating many caches can lead to an administrative and tuning
    night-mare as the complexity of managing the state, freshness, and size of many
    caches mounts.


