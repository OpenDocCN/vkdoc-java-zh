  raw: 'The Terracotta virtual heap can help resolve the complexity and reduce the
    cost of caching along every painful dimension we have so far discussed. When a
    cache lives on the virtual heap, it is simultaneously available to every instance
    of the cache connected to the Terracotta cluster. This minimizes the 1/ *n* effect,
    because each cache entry needs to be loaded only once for the entire cluster,
    not once per instance of the cache. And, because the Terracotta virtual heap is
    persistent, it survives application server restarts, avoiding the hit to the system
    of record such a restart would normally engender.


