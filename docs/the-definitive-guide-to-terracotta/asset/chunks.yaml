    第 1 章 ■ 理论与基础


    **11**


    **遵循 Java 内存模型**


    你几乎已经了解了入门所需的一切——但我们仍需考虑内存模型。我们必须像跨 Java 线程同步对 myMap 或 c3 的更改一样，跨 Java 进程同步这些更改；至少，如果我们希望任一对象的更改能在服务器一和服务器二之间可靠地发送，就需要这样做。从某种意义上说，进程边界已经消失了。


    但是，服务器何时通信？它们发送什么？内存模型提供了答案。


    Java 内存模型在其他地方已有详尽的文档记录，但我们应关注的关键概念是 JSR 133 中提出的“先行发生”（happens-before）。对于 JVM
    而言，“先行发生”被定义为线程进入同步块之前的逻辑时间点。JVM 保证线程一旦进入同步块，其将要访问的对象是最新的。


    ■**注意** Terracotta 的作者在设计该软件时参考了 Bill Pugh 于 2004 年 6 月在卡内基梅隆大学的毕业论文，我们在撰写本书时也同样参考了该论文。


    该模型断言，在线程被允许进入同步块之前发生的任何更改，都将在授予锁之前应用到主内存。Terracotta 利用内存模型来确保正确的跨进程行为和语义。例如，如果对象
    o 在最近的某个时间点被服务器一更改了，那么服务器二在进入保护对 o 的访问的同步块之前，将会获取这些更改。在这种情况下，服务器一的更改*先行发生*于服务器二开始处理
    o 之前，因此服务器二能看到服务器一的更改。由于锁是独占且悲观的，意味着同一时间只允许一个线程进入同步块，因此内存模型足以定义在线程分布在不同 Java 进程的环境中的顺序。我们将在第
    4 章更详细地讨论这个断言。


    ■**注意** 对于知识渊博的读者来说，Martin Fowler 的声明“记住分布式计算的第一定律：不要分布你的对象”似乎会因 Terracotta 的透明性而受到质疑。事实上，确实如此。Fowler
    的说法过于简单，并且忽略了分布对象本身确实存在歧义这一事实。Fowler 关注的是远程方法调用（RMI）。RMI 序列化一个对象，将其发送到远程 JVM，反序列化该对象，运行指定的方法，再次序列化该对象，然后将控制权返回给第一个
    JVM。


    实际上，Terracotta 确实分布了对象数据和协调事件，但 Terracotta 永远不会像 RMI 那样将处理上下文从一个 JVM 移动到另一个 JVM。正如我们可以远程存储应用程序底层的文件而不破坏该应用程序一样，我们也可以远程存储应用程序对象而不破坏该应用程序。因此，Terracotta
    不受 Fowler 所述定律的约束，因为 Terracotta 从不使用 RMI、序列化或其他框架——这些框架都不是透明的。事实上，此类框架会抛出只有开发人员才能在源代码中处理的异常，例如
    `RemoteMethodInvocationException`。


    986-1 CH01.qxd 5/30/08 8:58 PM 第 12 页


    **12**


    第 1 章 ■ 理论与基础


    **作为服务具有优势**


    我们已经确定该技术为 Java 开发人员提供了透明的集群。现在，让我们将注意力转向我们对 Terracotta 定义中的“服务”组件。


    Terracotta 仅由少数几个组件组成。它的感觉和特性类似于运维人员习惯使用的服务，这意味着 Terracotta 不仅仅是运行在现有 Java 进程内部的某种代理或库，它本身也是一个
    Java 进程。


    重申一下，Terracotta 由安装在要加入集群的任何 JVM 旁边的库组成，并且 Terracotta 本身是一个独立的 Java 进程，如图 1-3
    所示。


    **图 1-3.** *Terracotta 的两个组件包括库和一个通过 TCP/IP 通信的服务器进程。*


    运行 Terracotta 服务器的 Java 进程*仅*运行 Terracotta。该 Java 进程是运维人员管理运行在 Terracotta 之上的
    Java 进程集群的工作焦点。这意味着两件事：可扩展性可以像添加更多 JVM 一样简单，而高可用性的工作方式类似于数据库或文件服务器。当应用程序使用 Terracotta
    来实现可用性和可扩展性时，Terracotta 本身在管理该进程的运维人员能够使 Terracotta 服务高可用的情况下，同时提供可扩展性和高可用性。为了简化这个概念，Terracotta
    使应用程序高可用，而 Terracotta 本身也像关系数据库一样被实现为高可用。


    **可用性**


    在后续章节中，你将学习 Terracotta 如何在现有 Java 进程之外存储共享对象数据的副本。这意味着，如果我们所有的 Java 进程都停止，


    986-1 CH01.qxd 5/30/08 8:58 PM 第 13 页


    第 1 章 ■ 理论与基础


    **13**


    实际上，我们可以重新启动这些进程，并访问那些在 Java 终止前存在于内存中的对象。当运行在 Terracotta 的透明集群服务之上时，应用程序会持续运行，直到运维人员从
    Terracotta 的内存和磁盘中刷新掉这些对象。这就是 Terracotta 作为运行时服务提供高可用性的方式。

