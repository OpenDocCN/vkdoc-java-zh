    This indicates that the main thread in the first instance is blocking at barrier.await().


    The barrier field is an instance of java.util.concurrent.CyclicBarrier. It is
    designed to coordinate the arrival of a specified number of threads at a certain
    point such that no thread is allowed to proceed until all expected threads have
    arrived. Every thread that calls the method java.util.concurrent.CyclicBarrier.await()
    will block until the specified number of threads has arrived at the barrier point.
    Once the expected number of threads has called await(), all the threads blocking
    on await() will be allowed to proceed through the await() method. After the expected
    number of threads passes through the await() barrier, the barrier is reset so
    that subsequent calls to await() will be blocked until the expected number of
    threads calls await() again. This is why it’s called a cyclic barrier: once the
    barrier is released, it recycles back to its initial state.


    ■**Note** An in-depth discussion of inter-JVM thread coordination techniques using
    both basic concurrency primitives and the java.util.concurrent library follows
    in Chapter 10.


    Since the barrier is a shared object, the main thread will be blocked until another
    thread in either this JVM or another JVM in this Terracotta cluster calls barrier.await().
    Then, both threads will be allowed to proceed. This will happen if we start up
    another application instance. Once the second application instance is started,
    you should see something like the following output in the consoles (you might
    see slightly different output depending on the order in which the threads reach
    the various barrier points):


