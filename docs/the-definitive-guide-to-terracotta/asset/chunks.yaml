    replication-based approach. In this section, we’ll delve deeper into the features
    that Terracotta provides, and you’ll see how they are implemented behind the scenes.


    ### How Terracotta Sessions Work


    Distributed HTTP sessions with Terracotta are based entirely on the virtual heap
    principles that we discussed in Chapters 2 through 4. A central data root, in
    this case, a session map inside a container’s session manager, is distributed
    across the cluster and instrumented so that any session operations are made available
    to the Terracotta server as well as the application cluster. When a'
