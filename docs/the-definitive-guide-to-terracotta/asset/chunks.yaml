    This fairly straightforward example illustrates the power Terracotta provides
    to simple Java programs by allowing them to send messages to each other using
    stock Java library classes, effectively providing an IPC/RPC mechanism that looks
    just like interthread communication.


    **Summary**


    The examples presented in this chapter illustrate how the simple concurrency utilities
    built into the JVM can be harnessed using Terracotta to provide an extremely powerful
    mechanism of inter-JVM coordination. Using simple Java constructs makes this approach
    easy to develop and, perhaps more importantly, testable at a unit level, because
    your application can be executed in a single JVM without Terracotta. Terracotta
    provides its power transparently, enabling it to stay out of the way of your code
    and allowing you to express your intent in the clearest possible manner.


    The examples in this chapter are highly idealized for clarity, but with a little
    imagination, you can see how their principles may be applied to many different
    situations, including multi-step coordination, IPC/RPC, work partitioning or grid
    computing (see Chapter 11), policy enforcement, JVM or application configuration,
    application monitoring, workload load balancing, and more. And, because the state
    of the virtual heap is durable and highly available, should a particular member
    of the cluster go offline, another can be provisioned to seamlessly take its place.
    As such, you can easily add redundancy and failover systems to your implementation,
    so you can use these simple mechanisms in mission-critical environments.


