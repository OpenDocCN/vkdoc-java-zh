    **How Grids Handle Scalability**


    One of the main reasons grids can scale so well is that grid engines can make
    intelligent choices between either moving data to its processing context or moving
    the processing context (the operations) to the data. Effectively moving the processing
    context to the data means that the processor can make use of locality of reference;
    therefore, data that is being processed on a specific node stays local to that
    node and will, in the ideal case, never have to leave that node. Instead, all
    operations working on this specific data set will always be routed to this specific
    node. The immediate benefits are that this approach minimizes the latency and
    can give close to unlimited and linear scalability. How well it scales is naturally
    use-case specific, and achieving scalability can take both effort and skill in
    partitioning the data and grouping the work items, as well as tuning potential
    routing algorithms.


