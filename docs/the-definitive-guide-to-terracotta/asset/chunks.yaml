    To see the effect of clustering, go through the steps of adding items to the store
    and modifying a product or two. Next, start the application again in a different
    JVM in a new terminal window. Now, instead of prompting you to fill an empty store,
    the application instance running in the new JVM will find that there are already
    items in the store and skip straight to the main menu. When you view the inventory
    or departments lists, you will see all of the modifications to the store that
    you made in the first JVM reflected automatically in the new JVM.


    You can continue to make modifications to the store in either JVM and view those
    modifications in the other JVM. Of course, you can shut down both application
    JVMs and start new ones to prove that the store data is durable.


    ## A Note on DI and Terracotta


    Before we move on to use Spring with this example, a few observations should be
    reiterated.


    The most important thing to notice is that the DI coding style has encouraged
    the code to have a very good separation of concerns. It is no accident that all
    of the clustered objects live in the same package. Lots of other classes help
    perform various display activities, and the CLI object contains all of the application
    logic, but none of those objects ever join the cluster.


    The fact that only entity objects ever need to be clustered reinforces the second
    important point about Terracotta and the separation of concerns. Terracotta was
    never intended to cluster the *entire* Java heap. It is designed to cluster just
    those parts of the heap that ought to be shared across all instances of your application.


    The Terracotta team occasionally receives feedback that the framework is not “perfectly
    drop-in.” This is done on purpose. Clustering every byte of a Java heap would
    be not only wildly inefficient, but in many cases nonsensical. What would you
    do, for instance, with a clustered AWT Graphics context? By giving you declarative
    control of what parts of the Java heap ought to be clustered (in the form of what
    you pick as your roots and what objects join clustered object graphs), Terracotta
    lets you keep important application state data clustered, while leaving data that
    doesn’t need to be clustered alone.


    In your experiments with Terracotta, if you find that you need to make a lot of
    things transient because objects with no business being in the cluster are being
    sucked into clustered object graphs, your code may be commingling concerns that
    ought to be separated. Coding in a DI style reinforces the separation of concerns
    that will make Terracotta integration very natural.


    ## Growing Spring Beans


    So far, you have seen the example running as a stand-alone application and as
    a Terracotta clustered application. Now, let’s look at how it might work as a
    Spring application and as a clustered Spring application.


    Luckily, the example was coded with inversion of control in mind, so adapting
    it for Spring is trivial. We need only two new things to get the application to
    function with Spring.


    The first is the Spring application context configuration file, shown in Listing
    8-8. In this Spring configuration, we tell Spring about Spring beans. Spring beans
    are components that Spring knows are part of an application and that need to be
    wired together in a particular way.


    **Listing 8-8.** *The Spring Application Context Configuration File (applicationContext.xml)*


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE beans PUBLIC "-//SPRING//DTD BEAN//EN"

    ["http://www.springframework.org/dtd/spring-beans.dtd">](http://www.springframework.org/dtd/spring-beans.dtd)


    <beans default-lazy-init="false">


    <bean id="stringUtil" class="org.terracotta.book.inventory.util.StringUtil"

    singleton="true"/>


    <bean id="productByNameComparator"

    class="org.terracotta.book.inventory.util.ProductByNameComparator"

    singleton="true"/>


    <bean id="departmentByNameComparator"

