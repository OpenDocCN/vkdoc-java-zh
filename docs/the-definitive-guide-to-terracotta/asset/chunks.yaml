    <?xml version="1.0" encoding="UTF-8"?>


    [<con:tc-config >](http://www.terracotta.org/config)


    <servers>


    <server host="%i" name="localhost">


    <dso-port>9510</dso-port>


    <jmx-port>9520</jmx-port>


    <data>terracotta/server-data</data>


    <logs>terracotta/server-logs</logs>


    </server>


    </servers>


    <clients>


    <logs>terracotta/client-logs</logs>


    </clients>


    <application>


    <dso>


    <instrumented-classes>


    <include>


    <class-expression>


    org.terracotta.book.inventory.entity..*


    </class-expression>


    </include>


    <include>


    <class-expression>


    org.terracotta.book.inventory.cli.CLI


    </class-expression>


    </include>


    <include>


    <class-expression>


    org.terracotta.book.inventory.util.DepartmentByNameComparator


    </class-expression>


    </include>


    <include>


    <class-expression>


    org.terracotta.book.inventory.util.ProductByNameComparator


    </class-expression>


    </include>


    </instrumented-classes>


    <locks>


    <autolock>


    <method-expression>


    * org.terracotta.book.inventory.entity..*(..)


    </method-expression>


    986-1 CH08.qxd 5/5/08 8:40 AM Page 192


    **192**


    第 8 章 ■ 集群化 Spring


    <lock-level>write</lock-level>


    </autolock>


    </locks>


    <roots>


    <root>


    <field-name>org.terracotta.book.inventory.cli.CLI.store</field-name>


    </root>


    </roots>


    </dso>


    </application>


    </con:tc-config>


    `org.terracotta.book.inventory.entity` 包中的所有对象都将被集群化，因此我们使用一个类表达式来包含该包中的所有类以进行检测。`util`
    包中的两个比较器对象也将被集群化，因此我们为它们添加了包含表达式。


    `CLI` 类中的 `store` 引用被声明为一个根字段。`CLI` 对象本身永远不会成为共享对象。但是，它直接操作共享对象，因此也必须被检测。


    唯一修改集群化对象的方法是实体类中的方法，因此我们使用一个方法表达式来声明实体包中的所有方法将被自动锁定。


    要运行与 Terracotta 集群化的示例，首先在一个单独的终端窗口中启动 Terracotta 服务器。确保指定了正确的 Terracotta 配置文件，并记得将
    `<$TC_HOME>` 替换为你解压 Terracotta 下载文件的目录：


    %> <$TC_HOME>/bin/start-tc-server.sh -f tc-config-no-spring.xml


    回到你的应用程序终端，使用 `dso-env` 脚本来确定需要添加到 `java` 命令中的 JVM 参数。你将看到类似如下的输出，根据你使用的 Terracotta
    版本和安装位置，输出会略有不同：


    <$TC_HOME>/bin/dso-env.sh localhost:9510


    2008-03-24 14:33:28,124 INFO - Terracotta 26, as of 20080218-120204 (Revision
    7031 by cruise@rh4mo0 from 2.6)


    2008-03-24 14:33:28,669 INFO - Configuration loaded from the server at


    ''localhost:9510''.


    -Xbootclasspath/p:<$TC_HOME>/lib/dso-boot/dso-boot-


    hotspot_osx_150_13.jar -Dtc.install-root=<$TC_HOME>/bin/..


    -Dtc.config=localhost:9510


    ■**注意** 将 `localhost:9510` 作为参数传递给 `dso-env` 是告诉 Terracotta，客户端 JVM 应从 Terracotta
    服务器接收其配置。这是一个很好的实践，可以确保所有 Terracotta 客户端 JVM 使用相同的配置运行。


    986-1 CH08.qxd 5/5/08 8:40 AM Page 193


    第 8 章 ■ 集群化 Spring


    **193**


    现在你已经知道了 Terracotta JVM 参数，就可以在启用 Terracotta 的情况下运行 Java 了（你传递给 Java 的 Terracotta
    参数的实际值可能与这里显示的略有不同）：


    %> java \


    -Xbootclasspath/p<$TC_HOME>/bin/../lib/dso-boot/dso-boot-


