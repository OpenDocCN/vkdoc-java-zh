- fmt: "We will reexamine some of these properties in the context of Terracotta integration\
    \ in the following section.\n\nTo run the Ehcache program, we will need the Ehcache\
    \ JAR file and some dependencies.\n\nYou can obtain `ehcache.jar` from the Ehcache\
    \ web site. You will also need to download the Apache Commons Logging library\
    \ from [http://commons.apache.org/logging/](http://commons.apache.org/logging/).\n\
    \nYou can then run the program with the following command line:\n\n```\njava –cp\
    \ .:ehcache-1.3.0.jar:commons-logging-1.0.4.jar \\\norg.terracotta.book.caching.ehcache.UserEhcacheExample\n\
    ```\n\nThe results we will see are identical to the output that we saw when running\
    \ the Map-based version. The major difference with the Ehcache version is that\
    \ expiration and eviction policies are enabled, so when the cache gets big or\
    \ contains items that have been there for a while, items will be automatically\
    \ removed from it.\n\n## Using Ehcache with Terracotta\n\nEhcache has support\
    \ for distributed caching in a number of configurations. Terracotta provides a\
    \ drop-in solution that provides an alternate implementation of distributed caching\
    \ that yields significant performance and scalability benefits over the built-in\
    \ Ehcache options.\n\n### Enhancements and Configuration\n\nThe Terracotta Ehcache\
    \ integration provides a number of important enhancements for distributed caching,\
    \ including fine-grained read/write locking, an optimized distributed eviction\
    \ policy, increased scalability, and clusterwide cache coherency.\n\nWhen using\
    \ Terracotta with Ehcache, the standard memory eviction policies (LRU, LFU, and\
    \ FIFO) are replaced by a new time-based eviction policy. The eviction is designed\
    \ to minimize the faulting of objects across the network by handling evictions\
    \ close to the point of use.\n\nIf your application works on a set of nodes with\
    \ access to data partitioned on a per-application basis, Terracotta will perform\
    \ eviction locally for each partition as much as possible. A global evictor will\
    \ also take care of evictions for cache entries no longer used in any node. When\
    \ eviction occurs, the entry is removed from the cache in every node in the cluster.\n\
    \nTo configure the Terracotta eviction policy, the following Ehcache properties\
    \ are used; some have altered meanings:\n\n- `maxElementsInCache`: This property\
    \ is ignored by Terracotta integration. The number of objects that can be stored\
    \ in the distributed Terracotta cache is unbounded, and the cache is managed instead\
    \ by the distributed eviction policy.\n- `timeToIdleSeconds`: This property has\
    \ the same meaning as in normal memory eviction.\n- `timeToLiveSeconds`: This\
    \ property has the same meaning as in normal memory eviction.\n- `eternal`: This\
    \ property is ignored by Terracotta eviction policy. To simulate, you can set\
    \ the `timeToIdleSeconds` and `timeToLiveSeconds` to zero.\n- `diskExpiryThreadIntervalSeconds`:\
    \ This property has the same meaning as in normal disk eviction but applies instead\
    \ to the Terracotta distributed eviction policy, specifying the frequency with\
    \ which expiration and eviction will occur.\n\nAdditionally, due to the nature\
    \ of the Terracotta integration, some standard Ehcache features are unsupported,\
    \ specifically notifications (which are traditionally used for the built-in distributed\
    \ cache support and are not needed with Terracotta) and disk storage. Terracotta\
    \ persists the cache in shared virtual heap and to disk on the server if configured\
    \ in that manner, so there is no need for disk-based storage.\n\n### Downloading\
    \ and Installing Ehcache Integration\n\nTo use the Ehcache TIM, you will first\
    \ need to download and install it from the Terracotta Forge at [http://forge.terracotta.org](http://forge.terracotta.org).\
    \ To download the binary distribution for `tim-ehcache`, version 1.0.2, issue\
    \ this command:\n\n```\n$ curl \\\n-o tim-ehcache-1.0.2-bin.zip \\\nhttp://forge.terracotta.org/projects/tim-ehcache/downloads/tim-ehcache-1.0.2-bin.zip\n\
    ```\n\nThis command will download a zip file containing several JARs. The Ehcache\
    \ support is actually broken into multiple TIMs: `ehcache-commons`, `ehcache-1.2.4`,\
    \ and `ehcache-1.3`. To unzip and install these JARs to your Terracotta installation,\
    \ run these commands:\n\n```\n$ unzip tim-ehcache-1.0.2-bin.zip\n$ cd tim-ehcache-1.0.2\n\
    $ cp *.jar ${TC_INSTALL_DIR}/modules\n```\n\nNow that we have installed the Ehcache\
    \ TIMs, we can use this module from any application using this Terracotta installation.\n\
    \n### Using Ehcache with Terracotta\n\nTo enable support for distributed Ehcache,\
    \ you will need to declare a dependency on the Terracotta Ehcache integration\
    \ module in the `tc-config.xml` configuration, as shown in Listing 5-9.\n\nTo\
    \ include the Ehcache module, we add a module dependency in the `<clients>` block.\n\
    \n**Listing 5-9.** *Terracotta Configuration `tc-config.xml`*\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<tc:tc-config xmlns:tc=\"http://www.terracotta.org/config\"\
    \n xsi:schemaLocation=\"http://www.terracotta.org/schema/terracotta-4.xsd\">\n\
    \  <servers>\n    <server host=\"%i\" name=\"book.ehcache-hostname\"/>\n    <update-check>\n\
    \      <enabled>true</enabled>\n    </update-check>\n  </servers>\n  <system>\n\
    \    <configuration-model>development</configuration-model>\n  </system>\n  <clients>\n\
    \    <modules>\n      <module name=\"tim-ehcache-1.3\" version=\"1.0.2\"/>\n \
    \   </modules>\n    <logs>%(user.home)/terracotta/client-logs/book.ehcache/%D</logs>\n\
    \  </clients>\n  <application>\n    <dso>\n      <instrumented-classes>\n    \
    \    <include>\n          <class-expression>org.terracotta.book.caching.ehcache.UserEhcacheExample</class-expression>\n\
    \        </include>\n      </instrumented-classes>\n    </dso>\n  </application>\n\
    </tc:tc-config>\n```\n\nCurrently, the Ehcache TIM also provides integration for\
    \ the JSR 107 JCache API to Ehcache and thus requires the inclusion of the JSR\
    \ 107 JAR from [http://sourceforge.net/projects/jsr107cache/](http://sourceforge.net/projects/jsr107cache/).\n\
    \nNext, you will need to run your application as a Terracotta application using\
    \ `dso-java.sh`:\n\n```\ndso-java.sh \\\n–cp .:ehcache-1.3.0.jar:commons-logging-1.0.4.jar:jsr107cache-1.0.jar\
    \ \\\n–Dtc.config=tc-config.xml org.terracotta.book.caching.ehcache.UserEhcacheExample\n\
    ```\n\nWhen you do so, you will see results similar to running the Terracotta-enabled\
    \ Map application. The cache is clustered and all nodes will see changes made\
    \ on any particular node.\n\n## Summary\n\nCaching is a necessary part of almost\
    \ any application architecture. It is common to start with a simple caching system\
    \ only to find later that it is insufficient for the real needs of your data size,\
    \ freshness, and scalability requirements. Scaling a system like this after the\
    \ fact can be a difficult undertaking.\n\nWith Terracotta, you can start simple\
    \ but use Terracotta’s clustered, persistent virtual heap to mitigate many of\
    \ the pains related to scaling an application cache. And the best part is that\
    \ you can achieve this scale with your original simple code.\n\nIn this chapter,\
    \ you saw how you can build simple but powerful distributed caches using built-in\
    \ JDK collections and how you can leverage existing open source caching libraries\
    \ to get more sophisticated features and behavior, while still leveraging the\
    \ benefits of Terracotta.\n\nIn the next chapter, we take a look at caching at\
    \ work inside Hibernate, a popular object-relational mapping framework. We’ll\
    \ explore in detail how Terracotta can scale Hibernate-backed data access in your\
    \ application to achieve scalability that’s orders of magnitude greater than using\
    \ just Hibernate by itself.\n\n## Hibernate with Terracotta\n\nUsing Terracotta\
    \ to Offload the Database"
