    类似地，我们可以更改生产服务器使用的文件系统来写入磁盘，而无需返回开发阶段重写应用程序，并且可以将存储文件的任务转移到任何单个服务器的范围之外。如果文件位于远程文件服务器上，应用程序并不关心这一点。运维团队决定使用哪种文件系统。他们可能会选择一种文件系统技术，因为它能使应用程序运行得更快，或者选择远程文件服务器，因为它使应用程序更易于管理，或者因为应用程序可以使用网络文件系统（NFS）协议作为跨进程共享信息的中央代理。


    **添加网络文件存储**


    进一步探讨，Network Appliance 公司成立于 1992 年 4 月，旨在利用网络文件存储的概念来构建大型应用程序集群。当时，Sun 公司主导着
    Unix 市场，是手动构建网络文件服务器的首选平台，这些服务器使用大多数 Unix 变体中内置的 NFS 协议。Novell 在 PC 市场占据主导地位，为
    MS-DOS 和 Windows 用户提供类似的网络文件和登录服务。


    Network Appliance 意识到网络存储的设置、维护和持续运营成本过高，因此决定生产一种硬件设备，该设备遵循 NFS 规范，但除了插电之外无需任何设置。网络文件存储的价值在于，存储可以独立于应用服务器进行管理。通过众所周知的备份和恢复技术，例如备份到昂贵的集中式磁带机器人或定期将数据复制到灾难恢复站点，可以使存储具有高可用性。存储服务器还可以进行扩展，以满足应用程序的
    I/O 需求，而无需同时购买更大的 CPU 和更昂贵的应用服务器硬件。


    **与 Terracotta 的相似之处**


    Terracotta 为运维人员提供了类似于网络文件存储的好处。具体来说，对象存储在 Terracotta 的远程位置，尽管这些对象会在 JVM 内部缓存以实现快速的应用程序访问。这意味着运维人员可以专注于强化
    Terracotta 服务器以提供高可用性，就像文件系统的类比一样。Terracotta 的数据可以像文件服务器一样进行复制、备份和其他管理。因此，应用程序开发者可以像使用简单的文件
    I/O 一样在 Java 中使用对象，而 Terracotta 会将对象从进程移动到中央位置，在那里可以安全且经济高效地管理这些对象。


    我们提到的文件与 Terracotta 之间的最后一个相似之处是，两者都通过简单直接的数据共享和锁定事件来实现集群。通过锁定要处理的部分文件来写入文件的应用程序，可以在用户之间安全地实时共享。如果没有
    NFS 或类似的网络文件共享技术，这种简单的方法将无法奏效。开发者将不得不在应用层中，通过手动使用网络套接字，在应用程序进程之间推送数据，这远远超出了文件系统的范畴。结果，运维人员将失去仅通过管理存储来管理这些集群应用程序的能力。


    文件是透明集群服务的一个很好的例子。开发者按照自己的意愿在文件内写入，而运维人员则按照自己的意愿存储该文件。简而言之，像 NFS 这样的透明服务，帮助开发者以他们喜欢的方式编写应用程序，同时允许运维人员自由地为受管理的数据构建可扩展、高可用的生产环境。


    986-1 CH01.qxd 5/30/08 8:58 PM Page 6


    **6**


    第 1 章 ■ 理论与基础


    此时，你可能会问自己：“NFS 协议和数据库有什么区别？”对于数据库，开发者使用 SQL；而对于 NFS，开发者使用专有的文件布局。此外，对于数据库，其实例可以在我们想要的任何服务器上运行，而无需更改应用程序，并且数据库可以在不更改应用程序的情况下进行调优。数据库当然是一种服务。我们并不是断言
    NFS 和文件比 SQL 和数据库更好。我们只是在寻找与 Terracotta 的良好相似之处。在其操作特性上，数据库是一个很好的类比。然而，在其编程模型上，则并非如此。


    开发者知道何时需要写入文件，并且会有意为之。在现代应用程序中，数据库的使用大多是通过像 Hibernate 这样的对象关系映射工具进行的，因此，一个宁愿不写入数据库的开发者也被迫这样做。


    Terracotta 的工作方式更像文件 I/O 而不是数据库，因为 Terracotta 以开发者期望的方式呈现自身。Terracotta 作为 JVM
    内部的内存被消耗。将内存从本地服务器迁移到网络上某处的服务（就像对文件所做的那样）这一概念，需要相当大的信念飞跃。尽管如此，Terracotta 是透明服务的一个新例子。


    其核心目标是，Terracotta 允许几台计算机相互通信，就好像它们是一台大型计算机一样，通过内存和纯内存结构（如线程和锁（互斥对象等））进行通信。你可能会倾向于认为
    Terracotta 的功能就像 NFS 一样，因为 Terracotta 获取本地资源并将其移动到网络上。然而，与 NFS 的相似之处仅此而已。现在，让我们更详细地探讨拥有透明内存位置的力量，并了解它的独特性和重要性。


    **内存位置的透明性**


    与处理文件不同，使用 Terracotta 的开发者看不到 API。回想一下，我们的定义包含了 JVM 级集群的概念。这意味着，对于应用程序来说，Terracotta
    就是 JVM；而对于 JVM 来说，Terracotta 就是应用程序。图 1-1 说明了这一概念。


    **图 1-1.** *Terracotta 位于应用程序和 JVM 之间。*


    986-1 CH01.qxd 5/30/08 8:58 PM Page 7


    第 1 章 ■ 理论与基础


    **7**


    与文件 I/O 不同，内存位置的透明性意味着 Terracotta 必须自行判断要共享和移动什么。回想一下文件类比，并暂时聚焦于 open() API 调用：open(<path_to_file>,
    mode)。开发者决定相对于应用程序运行目录将文件写入何处。希望应用程序写入文件的开发者通常会将文件名及其所在目录作为用户的启动选项。假设我们的应用程序想要将数据写入位于目录路径
    /path/to/my/application/data 下名为 application.dat 的数据文件。应用程序只需调用 open("/path/to/my/application/data/application.dat")。然后，运维人员可以使用
    NFS 移动我们应用程序的数据。要使用 NFS，生产运维团队需要在应用程序调用 open() 时写入的目录下挂载远程文件系统。在我们的示例中，这看起来类似于以下内容：mount
    //remoteserver/remotepath /path/to/my/application/data


    一旦建立了远程挂载，我们的应用程序就会将其数据写入远程服务器。

