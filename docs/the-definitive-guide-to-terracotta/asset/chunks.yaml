    \ JAR 文件？Terracotta 会在模块仓库中查找模块，模块仓库本质上是一个存放 JAR 文件的目录。\n\n模块不必存放在单个仓库中；可以指定多个仓库，并会按顺序依次搜索。Terracotta\
