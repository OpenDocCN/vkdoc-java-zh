    bean 的实例，并将它们装配在一起。如果仔细观察，你会发现此配置文件与本章前面的 `Main` 类非常相似，区别仅在于组件之间的关系是用 XML 而非 Java
    声明的。


    此示例中的每个 bean 都被声明为单例（singleton），这意味着每个应用上下文中每个 bean 只有一个实例。


    将此应用转换为使用 Spring 的最后一步是添加一个 `main()` 方法，该方法启动应用上下文的创建、装配 bean，并在 CLI 对象中启动 `run()`
    循环。为此，我们创建了一个类似于前面 `Main` 类的类，将其命名为 `SpringMain`；如清单 8-9 所示。


    **清单 8-9.** *SpringMain 类*


    package org.terracotta.book.inventory.cli;


    import org.springframework.beans.factory.BeanFactory;


    import org.springframework.context.support.ClassPathXmlApplicationContext; public
    class SpringMain {


    public static void main(String[] args) {


    BeanFactory factory = new ClassPathXmlApplicationContext(new String[] {


    "applicationContext.xml" });


    CLI cli = (CLI) factory.getBean("cli");


    cli.run();


    }


    }


    `SpringMain` 基于 `applicationContext.xml` 配置创建了一个新的 `BeanFactory`（一个应用上下文）。Spring
    会完成其余所有工作，包括实例化 bean，并根据配置文件中声明的 bean 关系，将正确的参数传递给它们。一旦应用上下文创建完成，我们就从应用上下文中获取
    `cli` bean，并在 `run()` 方法中启动应用循环。


    在运行启用 Spring 的应用之前，我们需要像这样编译 `SpringMain`：


    %> javac -cp lib/spring-2.0.8.jar -d bin -sourcepath src/main/java \ src/main/java/org/terracotta/book/inventory/cli/SpringMain.java


