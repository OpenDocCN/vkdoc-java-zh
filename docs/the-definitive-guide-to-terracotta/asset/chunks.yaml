    rapid development cycles offered by the language. It also gained traction because
    it can deliver on the promise of “write once, run anywhere.” Terracotta is taking
    this promise one step further in asserting that spreading an application across
    JVMs should be a run-time decision. With Terracotta, developers avoid hard-coded
    clustering techniques. As a result, an operations team gets to decide if it wants
    an eight-CPU machine with 12 gigabytes of RAM or eight dual-core machines each
    with 2 gigabytes of RAM.


    Chapter 4 will take the concepts and terminology introduced in Chapter 3 to the
    next level; by the end of that chapter, you will be able to cluster any POJO you
    write yourself. From Chapter 5 on, we will use the core concepts behind POJO clustering
    to cluster the objects inside popular frameworks such as Hibernate and Spring.


