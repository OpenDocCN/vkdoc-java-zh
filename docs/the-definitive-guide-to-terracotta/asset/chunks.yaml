    \ needed for\n\nOptional\n\nuse from dependencies.\n\n# Export-Package\n\nExport\
    \ packages needed by\n\nOptional\n\nmodules using this one.\n\n# Bundle-RequiredExecutionEnvironment\n\
    \nThe required minimum execution\n\nRecommended\n\nenvironment. The most likely\
    \ constants you will need are `J2SE-1.4`, `J2SE-1.5`, and `JavaSE-1.6`.\n\n# Bundle-Vendor\n\
    \nThe vendor name providing\n\nOptional\n\nthe bundle.\n\n# Bundle-ManifestVersion\n\
    \nThe OSGI bundle manifest version.\n\nRecommended\n\n# Bundle-SymbolicName\n\n\
