    \ Maven 仓库结构兼容，尽管它只要求存在实际的 JAR 文件。\n\n> **注意**：有关 Maven 仓库的更多信息，请参见 [http://maven.apache.org/guides/introduction/introduction-to-repositories.html](http://maven.apache.org/guides/introduction/introduction-to-repositories.html)。\n\
