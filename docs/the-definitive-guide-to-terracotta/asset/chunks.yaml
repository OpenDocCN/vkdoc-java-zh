  trans: '

    实际上，将应用实例分散到不同的硬件上（即横向扩展）应该优于多处理（纵向扩展）架构，因为所有资源都是双倍的，没有任何共享。


    我们获得双倍的内存、磁盘、网络、总线和处理器。三台服务器、四台服务器，以此类推，只要应用能够充分利用所有这些硬件，就能实现线性扩展。


    Terracotta 的架构与其“网络巨兽”父级类似，都包含 L1 和 L2 组件。主板类比映射到 Terracotta，因为 Terracotta 拥有可安装到应用
    JVM 中的库，并透明地插入 L1 对象缓存，而 Terracotta 服务器通常在其自己的进程中运行，位于专用服务器上，就像 L2 一样。


    **Terracotta 使 L2 通用化**


    跨服务器运行应用似乎是个好主意，尤其是考虑到 L2 解决方案。但 Terracotta 的 Web 应用经验证明，成本正从昂贵的数据库硬件转移到复杂的应用开发上。为了将
    L1 缓存注入任意 Java 应用，Terracotta 必须构建一个通用服务器（L2 服务器），使其更智能地了解存储内容及调用时机。


    **最初的 L2 具有侵入性**


    L2 缓存虽然关键，但并非完整的解决方案。Terracotta 利用了 L2 概念的力量，同时也为围绕对象分布（复制和序列化）的复杂性提供了解决方案。针对“网络巨兽”的
    L2 解决方案是一个简单的网络缓存服务，它接收键和关联值，将这些键值对通过网络推送并存储在 L2 服务器实例上。除非开发者有意为之，否则不会有对象最终进入
    L2。


    由于正确性和性能的持续退化，维护这个巨兽级网站变得困难重重。有时，开发者会忘记序列化并复制对基于 L2 的对象的更改，导致当负载均衡器将用户发送到其他应用服务器时，应用崩溃，因为数据仅存在于一个
    JVM 中，从而失去一致性（如图 2-5 所示）。


    **图 2-5.** *开发者错误：IncrementValue() 操作未更新集群缓存* 当开发者过于频繁地复制更改，或忽略内存缓存而直接将数据存储到数据库时，应用性能也会受到影响。横向扩展的成本非常高。


    在创立公司时，Terracotta 的领导者们力求同时交付无状态和有状态范式的价值。具体来说，目标是为运维人员提供一个无状态的运行时环境，配备一个持久化到磁盘的
    L2；同时为开发者提供一个有状态的编程模型，其中 L2 对应用透明，且一致性和复制方面的挑战不复存在。


    数百名开发者在同一个代码库中工作的现实，导致手动复制工具被误用或弃用。没有任何手动工具能解决所有问题，它仅在其设计用例恰好符合开发者需求时才适用。


    这些挑战是应用程序编程接口（API）问题的固有部分。API 执行的是将其集成到应用中的开发者的指令。任何 L2 类型解决方案所需的集成或应用代码更改，都可能面临抵消该
    L2 类型产品优势的风险。Terracotta 选择创建一种更好的集群模型——一个透明的 L2 服务器。


    **我们需要更高的透明度**


    目标是构建一个能够跨 Java 进程横向扩展，并在粘性负载均衡器下运行的应用服务器，同时让开发者完全感知不到多进程（L1 和 L2）的存在。然而，现实并未达到目标，因为开发者非常清楚集群的设计。该网站的创建者构建了非常高效的会话复制技术和几个自定义缓存。所有对象都必须实现
    Java 可序列化接口，开发者不断调整会话大小，以便系统能以最小影响复制会话到最终用户流量。这些缓存和复制服务同样遭受着与其他任何方法一样的网络传输编组陷阱。


    开发集群 Web 应用的初始影响似乎可以接受。然而，许多项目停滞不前，并非因为设计困难，而是因为难以扩展。许多应用特性如果设计不当，可能会拖垮核心 Web
    基础设施。最重要的是，应用持续变慢，并成为维护难度日益增大的挑战。此外，普通项目会经历诸如关键业务项目第一阶段、第二阶段等阶段，而这些阶段通常涉及为性能重构现有代码，而非引入新功能。随着时间的推移，业务部门注意到，维护可扩展应用的负担正在拖慢新功能的开发速度。


    **透明度等于通用性**


    那些看似对生产力至关重要的决策，例如 Struts 与 Java Server Faces（JSF）之争，或 Tomcat 与其他容器的选择，最终被证明不如核心的可扩展性和可用性模型重要。


    如果应用是无状态的，并使用对象关系映射器将对象存储到数据库中，团队很可能会努力降低数据库延迟，却只发现吞吐量过低。团队最终可能会调整 Hibernate 生成的
    SQL。数据库管理员可能会修改数据库模式，而 Java 开发者则相应地更改对象模型。存储管理员可能会通过跨磁盘条带化表来调整存储阵列。


    然而，缓存最终会出现。Terracotta 团队的经验表明，这是不可避免的。缓存本质上是将应用从无状态模型转变为有状态或混合模型的过程。正如本章前面所讨论的，如果应用是有状态的，并且我们希望跨
    Java 进程扩展应用，那么随着应用的扩展，就会构建一个用于跨 Java 进程编辑对象的一致性协议。在所有情况下，领域模型都会受到影响，业务功能开发速度也会因开发者花费时间进行调优而减慢。


    因此，创始人寻求一种透明的解决方案，一种在 JVM 内部工作、无需序列化，从而避免复制陷阱的方案。可扩展应用架构的组件现已就位。我们需要一个 L2 服务来将工作负载从数据库转移并协调应用活动，同时需要一个透明的接口，使
    L2、L1 和应用对象的概念统一起来，就像主板类比那样。


    **具备可用性的透明可扩展性**


    可扩展性和可用性是相互对立的力量。任何写入磁盘的操作都会拖慢我们的速度，而任何留在内存中的数据都面临进程甚至电源故障的风险。可扩展性源于性能，而性能源于消除瓶颈。内存是主板上
    I/O 最不慢的环节。磁盘当然是最慢的之一。更糟的是，网络的性能更接近磁盘而非内存。

    '
- fmt: '# What Makes Transparent Clustering Difficult


    What makes transparently spreading out an application difficult is that the application
    has to talk to the network, and the network is far slower than the CPU. Sun Microsystems
    attempted to build a clustered JVM, as did IBM, in 2000. The efforts quickly revealed
    that the network was painfully slow compared to the CPU and that most applications
    would have to be rewritten to take advantage of being spread across slow networks.
    So, it was decided that the CPU is too fast, clustering is too slow, and the developer
    would simply be handed tools to serialize and ship objects across the network
    when needed (`RMI`, `JMS`, and even `JDBC` can be used to share objects across
    Java processes).


    This is what makes things hard today. Clustering in the name of scalability and
    availability requires the developer to copy objects around the Java processes
    in the cluster, and it requires the application to be aware that it is being deployed
    to many servers. In the past, developers wrote applications, tuned algorithms,
    and introduced I/O optimizations such as caching so that a process could fit in
    a small part of a large machine. As workload ramped, the process could be optimized,
    but at some point, the server had to be replaced. At the end of the day, very
    few tried to spread out an application on the network. It was too hard. And nothing
    has changed about pushing objects around processes—it is still hard.


    One thing has changed with Terracotta, however: we no longer pass objects around
    to a group of application servers in a cluster. With the `L2` that runs out of
    process introduced by Terracotta, a Terracotta application only passes objects
    to Terracotta. The Terracotta server (`L2`) can make an informed decision about
    which Java processes need what changes. And since the solution was designed to
    be transparent, Terracotta sees fine-grained changes as they occur, down to the
    byte level. This means that only a transparent solution with a central clustering
    server can write to disk, thus providing us availability without the need for
    Oracle.


    Why is that? The less we write to disk, the faster we go, remember? Terracotta
    writes only what changes to disk. And, it can write those changes at the same
    time it is helping our application processes share state.


    Let’s review. Recall the `ClusteredClass` from Chapter 1. If we change the `name`
    field or the `id` field, Terracotta can push only the changed information. If
    the `id` is an `int` (or `Integer`, it really does not matter), Terracotta needs
    to ship 4 bytes across the wire to the `L2` process, and it needs to write the
    4 bytes to disk. An instance of the class would otherwise be more like 30 bytes,
    so right there, we have a significant savings in I/O without writing custom code
    to make this possible.


    The Terracotta server is also a separate process, currently referred to as an
    `L2` for our application (we will stop using this nomenclature in Chapter 3).
    In Chapter 4 as well as in Chapter 13, you will learn more about how the Terracotta
    server can safely decouple its internal disk storage from application memory changes
    without risking data loss. The fact that the server is tuned to do disk I/O without
    making the application wait means that, for once, we can have our scalability
    and availability too.


    ## Transparent Clustering Service Revisited


    In Chapter 1, we defined Terracotta as a transparent clustering service that helps
    applications spread to as many machines as necessary for scale. While applications
    used to be stuck navigating a dark narrow tunnel of endless tuning through caching,
    replication, and partitioning, a light now appears at the end of the tunnel. Where
    we used to scale by doing lots of by-hand coding and marshalling objects across
    process boundaries, we now do nothing. The labor and complexity of scaling out
    change for the better when we find a way to move interprocess and interserver
    communication out of our own application code and down below somewhere in the
    runtime environment (as shown in Figure 2-6).


    **Figure 2-6.** *Application clustering requires many different approaches; Terracotta
    does not.*


    In Chapter 1, we concluded that Terracotta could be thought of as a transparent
    clustering service. Now, we have confirmed that the need for such a service exists.


    ## Transparency Delivers Higher Scalability


    We rely on transparency to help scale applications every day. The garbage collector
    is a transparent memory management service. For the most part, it works. It also
    does a better job than the developer not because its writers are smarter than
    the average developer (well, maybe they are smarter than most of us) but because
    the runtime environment has perfect information about usage patterns. It can make
    changes that the developer deems too complicated.


    User objects might be collected using one algorithm at noon and another at midnight,
    depending on how application workloads change.


    Terracotta found that transparency and being a runtime service not only solves
    the complexity challenge developers otherwise face but also provides for scalability
    and performance beyond what the developer can build. One example of a runtime
    performance enhancement is greedy locking. Terracotta can decide at run time whether
    a lock should be pessimistic, centralized and exclusive, or decentralized and
    optimistic. A developer must make assumptions about exclusive access that protect
    for the worst case scenario only, and thus the JVM provides mostly pessimistic,
    exclusive locking semantics without Terracotta.


    ## Clustered Application Servers and Clustered Caches


    Terracotta is not just for caching data stored in the database. The data that
    has been entrusted to Terracotta is always stored on disk, thus Terracotta can
    be used without a database in certain use cases, most of which will be covered
    in Chapters 5 through 12 of this book.


    If Terracotta did not exist, we have covered how applications could otherwise
    scale using a database. We also discussed in-memory replication and replicating
    state by hand across Java processes. There are alternatives to replicating objects
    by hand, or so it would seem.


    In practice, there are no alternatives. OK, that was way too strong a statement,
    but it gets the point across that our analysis of stateless and stateful approaches
    does not change for application server vendors or clustering vendors as long as
    they use the same tools that application developers above the server or caching
    library use to replicate and cache state by hand (see Figure 2-6).


    Today, clustered application servers, clustered caches, and other clustering libraries
    are measured on how they replicate data. Some use n-way replication, while others
    use a buddy system. Some replicate data when objects change, while others require
    the developer to directly inform the library of changes. And, of course, there
    are `EJB`, `JPA`, and `Hibernate` where replication is not needed, because the
    application state is stored in the database in a stateless manner.


    We should not judge a framework on whether it is stateless or stateful or whether
    it is buddy-replication or n-way. We should, instead, judge a framework on whether
    or not it is a transparent service or a development tool.'
