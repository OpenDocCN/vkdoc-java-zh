  trans: '

    在构建一个跻身全球前十的电商网站——一个庞然大物——的过程中，某些架构决策被证明至关重要，而另一些则不如最初设想的那样重要。该应用被设计为有状态且负载均衡的，所有业务数据及关联的工作流都通过数据库事务进行管理。事后看来，数据库事务显然是个错误，这主要是因为在三层架构系统中，事务意味着工作流在数据库和
    Java 层之间分散。Java 层生成更新任务，并请求数据库进行更改，而这些更改可能因各种原因被拒绝。


    现在，这就像一支交响乐团有了两位指挥。


    讨论 Terracotta 的起源，似乎与讨论应用层的扩展问题有些跑题。但事实并非如此：架构本应基于 Java 层的工作流。然而，在 2000 年，Java
    层的工作流存在一个问题。这个问题就是内存（或堆）的易失性。如果会话状态（也称为工作流状态）保存在内存中，那么会话可能会丢失。当时，还没有一种线性可扩展的方式能为内存中的复制状态提供高可用性。因此，业务数据存储在数据库中，并在应用层进行缓存，这使得网站陷入了一种有状态/无状态的混合模式：数据库数据被缓存并在内存中复制，以避免数据库瓶颈。可以将这种架构理解为“从内存读取”（因为大部分数据库数据都被缓存了）和“写入磁盘”（因为所有
    I/O 操作都通过直接将更新刷新到数据库来保证持久性）。


    当时的一种替代方案是分布式事务。在 JVM 中，或者作为一种可扩展的 Java 服务，并不存在跨 Java 进程以一致方式共享状态和协调更新的基础架构，而构建一个具有事务保证的分布式内存系统似乎很困难。另一种替代方案是最终一致性架构。


    虽然其他网站，如 Amazon.com，采用了最终一致性的方法，即每个应用实例可以完成对本地磁盘的事务，并最终刷新到数据库，但 Terracotta 的创始人并没有选择这条路。该业务尚未准备好讨论最终一致性架构的后果，在这种架构下，用户可能会在结账完成很久之后，被告知之前确认的采购订单因库存计算错误而无法完成。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 32 页


    **32**


    第 2 章 ■ Terracotta 的历史


    ■**注意** 这里所说的“最终一致性”，我们指的是 CAP 定理，它涉及一致性、可用性和分区容忍性之间的权衡。最终一致性架构是一种优先考虑分区容忍性而非一致性的架构。例如，一个电商购买交易可以在两个独立的节点上进行，之后通过意识到同一客户正在同时购买相同的产品来协调，从而在扣减客户财务账户之前取消其中一个订单。


    **应用程序就是一台巨型计算机**


    在初始上线后的几周内，生产环境的应用就无法处理用户量了，而数据库就是罪魁祸首。我们立刻学到了第一课：n 层应用应该被视为一台巨大的多处理器计算机。现代英特尔架构要求在运行速度极快的处理器与无法跟上处理器速度的
    I/O 子系统之间设置多个缓存层级。多处理器计算机在芯片上有寄存器，也有 L1 缓存，以及一个芯片外部的 L2 缓存，该缓存可以是每个芯片专用的，也可以是跨处理器共享的。


    处理器会读取主内存的这些不同缓存层。来自主内存的数据会被缓存在 L2 中，然后再缓存在 L1 中。如果一个线程跨处理器移动，线程栈中的数据必须从一个芯片的缓存移动到另一个芯片的缓存，这是上下文切换过程的一部分。硬件会以某种透明的方式处理每个缓存层级的一致性。


    L2 缓存比 L1 缓存大得多，但由于不在芯片上，速度也慢得多。


    这意味着访问 L2 的成本很高，但现代服务器拥有较大的 L2 缓存，因为访问 L2 的成本仍然远低于访问主内存。共享 L2 可以显著降低甚至消除上下文切换的成本。


    在主板与应用的类比中，我们可以将 L1 视为 JVM 内部的缓存，因为应用访问自己的堆几乎不需要付出代价。在 n 层应用中，应用服务器每次查询平均要花费几百毫秒等待数据库。在芯片的类比中，CPU
    要花费几千个周期等待主内存或磁盘。数据库是昂贵的，就像主板上的主内存一样。


    一旦我们意识到这一点，每个 Java 进程中的缓存感觉就像是处理器上的 L1 缓存。引入一个可以作为所有 L1 缓存超集缓存的 L2 缓存，即使不是显而易见的，也变得合理且可接受。这个
    L2 服务帮助应用实例避免等待数据库，同时也降低了跨这些应用服务器实例进行上下文切换任务的成本。如果 L2 要在这个网络巨兽上取得成功，它只有一个要求——调用
    L2 的成本必须低于调用底层数据库的成本，理想情况下要快一个数量级。


    一旦实现，这种 L1 结合 L2 缓存服务的方法消除了几个大的可扩展性瓶颈。首先，就像在主板上一样，不再有将所有线程数据都塞进应用服务器内部 L1 缓存的压力。相反，整个数据集都可以缓存在
    L2 中，无论应用服务器拥有多少内存，只要共享的 L2 能够溢出到磁盘即可。这使得应用服务器可以保持


    986-1 CH02.qxd 4/28/08 9:54 AM 第 33 页


    第 2 章 ■ Terracotta 的历史


    **33**


    非常小巧。其次，L1 可以在高负载下通过简单地丢弃部分或全部缓存数据来释放内存。L1 可以任意且单方面地从缓存中驱逐条目，而不会对数据库造成下游压力，因为
    L2 会保护应用免受数据库影响，反之亦然。这使得应用服务器能够保持可预测的吞吐量，同时使数据库工作在可持续的较低查询量下，远低于网站实际产生的查询流量。


    在应用服务器外部运行 L2 缓存并在应用服务器实例之间共享该 L2 的第三个好处是，即使数据库宕机，L2 也能为缓存中的数据提供可用性。L1 可以使用传统的缓存技术，例如最近最少使用/最不经常使用，来刷新缓存。即使数据库繁忙或不可用，L2
    也能处理请求。因此，让 L2 的性能优于底层数据库，不仅提供了可扩展性，还提供了高可用性。


    由于 L2 的概念，该网站可以跨机器分布，从而轻松获得可扩展性和可用性。有了 L2 服务，数据库在帮助扩展系统方面的作用大大减弱。而有了应用服务器实例内部的
    L1 缓存，线性扩展就成为了可能。


    ■**注意** 对于两台机器，一个设计良好的应用应该能够完成一台机器两倍的工作量。

