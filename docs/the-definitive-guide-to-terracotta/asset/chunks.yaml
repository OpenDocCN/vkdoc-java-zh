    \ 133），Terracotta必须在锁被释放时推送数据。图12-3演示了一个场景：一个线程可以持有对象B的锁，然后获取对象A的锁并修改A，而稍后某个时间点，第二个线程可以在B解锁之前获取A的锁。\n\
    \n**图12-4.** *锁批处理*\n\n第二个线程必须看到第一个线程对A所做的更改。如果我们查看`Product.java`文件中的`Product`类，会发现`setPrice(double\
    \ p)`方法在内部进行了同步。\n\n```java\npublic void setPrice(double p) {\n    synchronized\
    \ (this) {\n        price = p;\n    }\n}\n```\n\n保留此同步会导致应用程序在我们不希望的地方出现瓶颈，因为`pounder`方法会尽可能快地更改`Product`对象的价格。鉴于需要在每次锁释放时刷新更改，每次调用`setPrice()`都会发生网络I/O。如果`pounder`方法和`setPrice()`都锁定了对象，那么每次循环中我们会刷新两次更改。\n\
