- fmt: '# Caching


    In the simple example at the beginning of this chapter, we checked our cache for
    the presence of a user and, if necessary, loaded and cached that user. You may
    have noticed that no code ever removed users from the cache. This means that,
    over time, the cache will grow without bound and could ultimately contain all
    users if every user has been accessed.


    In some limited cache applications, this may be acceptable. For example, if the
    maximum number of items in the cache is fixed, the cache will not grow without
    bound. However, in most use cases, we must consider how items will be evicted
    (removed) from the cache. Cache eviction can be based on a number of factors such
    as size (evict when too many items exist), time (periodically evict expired elements),
    or demand from some external event.


    Element eviction generally follows a policy based on either usage or age. The
    most common usage eviction strategies follow:


    - **LRU** (least recently used) will remove the item with the oldest last-accessed
    timestamp.

    - **LFU** (least frequently used) will remove the item that has been used the
    fewest number of times.

    - **FIFO** (first in, first out) works like a queue to remove the oldest item,
    regardless of use.


    Other strategies may also be applicable based on application-specific needs. For
    example, sometimes, allowing items to expire based on a combination of absolute
    age and use is helpful.


    The policy used in your application will typically depend on the application.
    If you are using a `Map`-based application, you generally have full control over
    how and when to evict, and any of the preceding strategies may be employed. If
    you are using a caching library, the library will often provide one or more eviction
    algorithms or let you plug in your own.


    As one example, we’ll discuss later how Terracotta supports eviction and expiration
    when used with Ehcache.


    ## Persistence


    In many cases, it is faster to pull a cached item from disk than it is to retrieve
    it from the database or other system of record. In those cases, building caches
    that use disk to grow past the constraints of available JVM heap is worthwhile.
    Many cache systems provide the ability to spill the cache to disk when it becomes
    too large. In general, Java-based cache frameworks rely on serialization to persist
    to disk.


    Persistence can also be used to avoid reloading the cache on startup by flushing
    the cache to disk on shutdown (or periodically) and starting from that backup
    on restart. This can greatly reduce the time to warm up the cache in a restarted
    process. The disk cache is usually a risky architecture if cache eviction, cache
    sorting, and searching are requirements. The disk is slow, and when these operations
    move from traversing RAM to disk, the application slows down. All these concerns
    imply that spill to disk is good for managing data when the database cannot respond
    as fast as the cache’s disk but spill to disk does not improve throughput or latency
    unless the database is significantly slower than the local disk.


    ## Distributed Caching


    As you scale your application across multiple nodes, you will also want to scale
    your application caches. For read-only caches, you can get away with having separate
    independent caches in each application node. This is somewhat wasteful, as you
    are typically lazily fetching data from the database on multiple nodes for any
    hot item but can still provide some benefit.


    For read-write caches, it is not acceptable to use independent caches, as they
    will be out of date, and users will experience inconsistent results when they
    hit a node that has out-of-date data. The typical approach in this case is to
    coordinate the state of the cache among the nodes. When one node modifies an item
    in the cache, it sends an invalidation event to all other nodes in the cache.
    To maintain cache coherency across the cluster, this invalidation broadcast must
    either wait for acknowledgement or implement some other complicated versioning
    scheme. Invalidation is also based on the assumption that there is some more permanent
    backing store.


    There are some major problems with broadcast and acknowledgement. The most obvious
    problem is that broadcasting introduces a significant performance hit to the caching
    system, which will necessarily reduce the efficiency of the cache. It is still
    likely to be faster than going back to the database for the data, but it is adding
    significant network overhead. Additionally, broadcast messaging introduces coupling
    between all the nodes in the system, so a bad node can infect other nodes in the
    cluster as the other nodes wait for acknowledgments from the bad node. In the
    worst case, a single bad node can actually bring down a cluster, which eliminates
    the whole benefit of having a cluster in the first place.


    ## Partitioned Data


    One important strategy for distributed caching is the concept of data partitioning.
    Partitioning involves breaking up the data set across nodes such that each node
    in a cluster handles a subset of the data, and some component (such as a load
    balancer) directs traffic appropriately in front of the cluster. Partitioning
    can be used to reduce the need for broadcast and cluster communication. However,
    it also makes high availability more challenging, as the partitioned cache state
    lives at only one place in the cluster.


    As we discussed in Chapter 2, you can divide the data in the database based on
    some key, as Figure 5-3 demonstrates.


    **Figure 5-3.** *Partitioning with Terracotta (This figure is same as Figure 2-4.)*


    We will see in the following section how Terracotta is an excellent companion
    service to partitioned data.


    ## Leveraging Terracotta


    Terracotta provides a scalable, highly available technology for building distributed
    shared data stores. It addresses the critical issues with distributed caching:
    persistence, coherency, and performance.


    Terracotta provides a virtual, clustered, persistent Java heap and thus provides
    persistence as an intrinsic part of its architecture. It is not necessary to implement
    or use a caching technology that spills cache to disk and makes it persistent,
    because Terracotta can do this automatically by using a persistent L2 server.
    Also, because that state is persistent, it is available on node start-up and will
    be faulted into the JVM as necessary without any additional setup.


    Terracotta also provides a truly coherent cache without trading off scalability
    or performance. Changes in the cache can occur at a fine-grained field level and
    are propagated to the Terracotta server cluster, not directly to all other application
    nodes. As a cached data value is needed, it will be dynamically faulted into each
    node that needs it. This avoids the dependence on broadcast and the coupling between
    nodes in the application cluster.


    Performance is a key concern in any distributed system, and Terracotta optimizes
    performance through a number of techniques. One of the most important differentiators
    for Terracotta is that Java serialization is not used when transmitting updates
    through the cluster.'
