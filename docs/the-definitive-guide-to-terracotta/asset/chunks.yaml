- fmt: "# With Terracotta\n\nWith Terracotta, however, everything works at a memory\
    \ level. The interface, in this case, is the object orientation of the language\
    \ itself. The parallel to mounting remote repositories applies, because objects\
    \ have structure just like files and directories. Developers build object models,\
    \ and the JVM maps those objects onto the heap at run time. Object models are\
    \ the key to interfacing with Terracotta, because they contain all the information\
    \ the JVM needs to map an object model to memory, and thus, all the information\
    \ Terracotta needs at the same time.\n\nTo explore this idea further, consider\
    \ that object models are made up of graphs of related objects. A user has a first\
    \ name, last name, and ID. These are its fields. A home address and work address\
    \ can be stored inline in a user object as fields, but they are usually broken\
    \ out into their own address class. Users can also have friends. This simple object\
    \ model is illustrated in Figure 1-2.\n\n**Figure 1-2.** *A simple object domain\
    \ model*\n\nIf a developer points to the `User` object, the expectation would\
    \ be that the object references to `Home address`, `Work address`, and `Friends`\
    \ would become shared automatically. In Terracotta, the developer need only specify\
    \ the `User` object as being shared. Terracotta learns from the object definition\
    \ itself what the fields of our shared object are (`First name`, `Last name`,\
    \ etc.) as well as what the object relationships (`Addresses` and `Friends`) are.\
    \ Consider this to be analogous to mounting a remote file system onto the local\
    \ machine: the `User` object is mounted into memory from Terracotta, and after\
    \ that, the memory operations can be cached locally but persisted remotely on\
    \ the Terracotta service for sharing and later retrieval.\n\nYou will learn more\
    \ about how this works in Chapter 3, but for now, know that Terracotta’s ability\
    \ to understand the intent of an application by analyzing the use of memory is\
    \ what makes Terracotta transparent to our source code.\n\n## Putting Transparency\
    \ and Clustering Together\n\nTerracotta’s transparent clustering service helps\
    \ a developer share part of a Java process’s memory across process boundaries\
    \ and machines. This means that any object resident in memory in one Java process\
    \ can be seen by another Java process, whether that process is on the same machine\
    \ or somewhere else across the network. In the previous section, you learned that\
    \ sharing part of a JVM means that we are mounting objects that appear local but\
    \ are, in fact, stored in a central service. We should break this down in more\
    \ detail.\n\nFirst, let’s build a simple class, `ClusteredClass`:\n\n```java\n\
    class ClusteredClass {\n\n    int id;\n    String name;\n\n    ClusteredClass(\
    \ int id, String name ) {\n        this.id = id;\n        this.name = name;\n\
    \    }\n\n    final Integer getid( ) {\n        return new Integer( id );\n  \
    \  }\n\n    final String getname( ) {\n        return name;\n    }\n\n    void\
    \ setid( int id ) {\n        this.id = id;\n    }\n\n    void setname( String\
    \ s ) {\n        this.name = s;\n    }\n\n    public String toString( ) {\n  \
    \      return ( \"Customer id=[\" + id + \"] name=[\" + name + \"]\\n\" );\n \
    \   }\n}\n```\n\nNow, imagine that there are two servers, and we want those two\
    \ servers to act together as one logical server. We have to be assured by the\
    \ JVM that instances of `ClusteredClass` created in one server are available to\
    \ the other under the same object ID. Why? Simply put, if an object created on\
    \ one JVM were not the same object on all JVMs, the application would not reap\
    \ any value from transparent clustering. Think back to the NFS analogy. If two\
    \ application instances wanted to read from and write to the same file, they must\
    \ mount the same remote file system and open the same file by name. In Java, an\
    \ object ID is like a file name. Terracotta uses the object ID as the clusterwide\
    \ path to a specific object in memory.\n\nWithout consistent object identifiers\
    \ across JVMs, the application would find that any object created on one server\
    \ would be different and have to be re-created or reconnected to object graphs\
    \ when moving from one JVM to another. Somehow, all this fuss does not sound transparent.\
    \ Let’s, therefore, assume that objects created with a particular ID in one JVM\
    \ will have the same ID in any and all other JVMs.\n\nIt would also be nice if\
    \ the second server could see an instance of `ClusteredClass` constructed on the\
    \ first server. However, there are several challenges inherent to our sharing\
    \ goal.\n\nObjects created in one memory space will have different addresses in\
    \ RAM, and thus different identifiers, than in another space. Not only do memory\
    \ addresses not align across processes, but objects created in one memory space\
    \ will eventually get modified, and those modifications have to make it from one\
    \ server’s memory to the other’s. How can we make all this happen? It is, after\
    \ all, quite a leap to assume that Terracotta can find all of our `User` objects\
    \ (from the previous section) and share them on its own.\n\nOne way to think of\
    \ this challenge is in terms of object scope. If an object `o` is not created\
    \ or referenced at an appropriate level of scope, such that it can be accessed\
    \ across threads or even by the same thread at some time later, the object is\
    \ not shareable across servers. Method-local scope refers to an object whose life\
    \ cycle is that of the method in which it is created; the object is created and\
    \ destroyed within the method’s scope. Method-local objects tend to be immediate\
    \ garbage to the modern collector and are not, therefore, what we are after. This\
    \ is important: *sharing every object between the two servers is not necessary.*\
    \ Sharing objects in collections, singletons, statics, and global objects is more\
    \ what we are after. Server two should only be able to see object `o` that server\
    \ one created if server one creates the object in a scope that is accessible to\
    \ more than one thread. So if we invoke a constructor in a method-local context,\
    \ we should not worry about clustering, but in the global context we should:\n\
    \n```java\nvoid printAClusteredClassInstance( ) {  // method-level scope\n   \
    \ ClusteredClass c1 = new ClusteredClass( 1, \"ari\" );\n    c1.toString( );\n\
    }\n\nClusteredClass clone( ClusteredClass c ) {  // calling-level scope\n    ClusteredClass\
    \ c2 = new ClusteredClass( c.getid(), c.getname( ) );\n    return c2; // c2 escapes\
    \ the method so it might be interesting…\n}\n\nstatic Map myMap = new HashMap();\n\
    \nvoid storeAClusteredClassInstance( ClusteredClass c3 ) {  // Stored in a singleton…\n\
    \    myMap.put( new Integer( c3.getid( ) ), c3 );\n}\n```\n\nIn the preceding\
    \ examples, `c1` is not worth clustering; `c2` might be worth clustering, depending\
    \ on what happens in the thread that calls `clone()`; and `c3` should be clustered,\
    \ because it joins `myMap`, which would likely be clustered. Thinking about it\
    \ further, consider that if we are trying to get `c1`, `c2`, and `c3` shared between\
    \ servers one and two. `c1` cannot, in fact, be shared because if server one creates\
    \ it, there is no way for server two to reach `c1`. Similarly, there is no way\
    \ for another thread in server one to reach `c1` (unless we change the declaration\
    \ of `c1` to make it a static variable). `c2` might be clustered if the thread\
    \ calling `clone()` actually places `c2` in a location in memory where multiple\
    \ threads could reach it. `c3` is definitely and easily reachable by server two,\
    \ however, when server two executes `myMap.get()` with the appropriate key.\n\n\
    Now, we have to examine the constructor, because Terracotta usually has to do\
    \ something with constructor calls to get a handle on objects when those objects\
    \ are first created (the constructor is sort of like the call to the `mount` command\
    \ in the NFS analogy). Terracotta can decide when to invoke the constructor sort\
    \ of like an automatic file system mounter. Let’s now walk through an example."
