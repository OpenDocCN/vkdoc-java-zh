    running. We commonly refer to these laptops as rogue clients. A similar problem
    arises in slow consumption off the queue. If some servers in your grid are eight
    core and have16 gigabytes of RAM while others are two core and have 2 gigabytes
    of RAM, the two classes of machine will work at different speeds. The slower consumer
    will throttle Terracotta’s entire grid to its speed unless perfectly partitioned
    in its work.


    The Master/Worker pattern seems like a perfect way to sandbox or otherwise fence
    off these rogue clients and slow consumers, and it does work in many cases. But
    be cautioned that as soon as rogue and slow consuming clients, acting as workers,
    begin to share data with any node other than a master, these slower nodes will
    slow down their peers in the grid.


    As for WAN, the Master/Worker pattern is simply insufficient. In fact, WAN-based
    replication should be done with messaging services. Interestingly, if you take
    the Master/Worker pattern and customize it as we have shown, you can create what
    we call a “worker on the edge.” Imagine building a cluster with POJO/Terracotta-based
    workers who communicate using a linked blocking queue and simultaneously act as
    a bridge on the WAN. These bridge workers would take messages off of the local
    grid and relay them to another grid across the WAN. Thus the nomenclature: these
    special bridging-workers are on the edge of your local datacenter’s grid.


    **Summary**


    In this chapter, you learned how to extend your skills from Chapters 5 through
    10 to use Terracotta for scaling out POJO-based applications and a host of popular
    frameworks. Now, you should also be able to use Terracotta for multithreaded,
    multi-JVM, scaled out custom processing.


    Data grids and compute grids built on Terracotta are highly flexible, because
    every aspect of the framework is open and in your control. You decide what the
    unit of work is. You decide the batching levels. You decide on the routing capabilities,
    and you edit the interfaces as you see fit.


    You learned how to scale your grid using only one Terracotta server by simply
    tuning the locality and granularity of your grid operations. While Terracotta
    requires more custom code when used in grid use cases than when with other enterprise
    use cases, the resulting applications and frameworks remain flexible and easy
    to understand and maintain.


    In Chapter 12, you will learn the one remaining technique you will need for tuning
    and scaling applications: visualization techniques and tools are important to
    understanding what a cluster is doing and why it is going fast or slow. Visualization
    is especially valuable for grids where the application is never contained on any
    one node but is, in fact, a loosely coupled grid of nodes working together as
    one big server. Visualization is the only way to understand what a grid is doing.
