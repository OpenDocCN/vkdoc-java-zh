- fmt: '# Hibernate with Terracotta


    This time, there is a cache in place inside Hibernate. The cache makes sure that
    redundant `SELECT` operations that would fetch already retrieved objects are eliminated.
    The cache also provides a mechanism for batching `UPDATE` operations. The cache
    reduces the total SQL operations in the example to four.


    While Hibernate has managed to make the application go significantly faster with
    almost no code changes thus far, risks are beginning to emerge. When second-level
    caching is enabled, Hibernate no longer queries the database every time the application
    uses a database entity. If two copies of the application are running at once,
    they cannot see the changes each other is making to the database. The data in
    cache can easily become stale on either node, depending on how application requests
    are routed or balanced between servers.


    Unlike in the previous steps, the tradeoffs we have to make now are significantly
    more difficult. Previously, we concerned ourselves only with simplicity and implementation
    issues, but any optimizations we made did not have an impact on the behavior or
    correctness of the application. Now, we must consider the effects that adding
    the second-level cache will have on our application. In particular, the second-level
    cache can now become out of sync with the database. The generally accepted solution
    here is to set some explicit expiration time that will force Hibernate to refresh
    the entry based on some sort of expiry time, or time to live (`TTL`).


    In some cases, you may have already found a `TTL` is unacceptable, and you might
    have been forced to turn off caching altogether.


    > **Note:** We have one more risk—if our application is the only consumer of the
    data, we can assume with relative safety that the data will only ever be modified
    by us, and therefore, we do not have to worry about it being modified out of our
    control. If, however, other applications update the database at the same time
    this application does, second-level caching with or without Terracotta cannot
    be turned on. The only option here is `POJO` caching and database triggers notifying
    the `POJOs` of changes made by other applications.


    Without a clustering strategy, data written to the second-level cache in one `JVM`
    may not be reflected in another `JVM` in the cluster. Even if our application
    is the only consumer of the data, we now have to consider that our application
    is separated into many pieces, which must be synchronized to provide a coherent
    view of the data. With data stored at the application tier, we must now consider
    what happens when there is a cache miss: Do we want to load the data from the
    database in every node, resulting in a clusterwide cache miss? Or can we cluster
    the data, thereby eliminating the clusterwide miss?


    Terracotta can be used to cluster the second-level cache, ensuring that the data
    written in one node is consistent on all nodes, and eliminating the stale data
    problem. Simultaneously, Terracotta eliminates the clusterwide cache misses. Finally,
    due to its virtual memory ability, Terracotta can maintain a cache that is much
    larger than the physical memory available to any one node. This is important if
    the hot data set for your application does not fit into the physical memory space
    of any one node. See Chapter 5 on distributed caching for more details.


    ## Clustering the Session Objects


    Clustering the session objects, or what Hibernate refers to as detached instances,
    is the fastest mode of integration with Terracotta, as shown in Figure 6-5. Detaching
    `POJO` instances of database-mapped objects from Hibernate eliminates all unnecessary
    database operations, and stores everything in memory. Objects can be read at zero
    latency from `RAM`. Objects can also be written at low in-memory latency as well.
    The database simply becomes the system of record and gets updated only when you
    want it to be updated. The database is essentially'
