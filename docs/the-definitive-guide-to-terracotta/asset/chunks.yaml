    第 12 章 n 可视化应用


    **315**


    你理解为什么集群应用执行的某些操作会比其他的运行得更快。


    Terracotta 的 SEDA 管道


    在 Terracotta 服务器内部运行的 SEDA 管道，通过可视化工具提供给 Terracotta 用户。因此，理解该管道以及工具可能指示的内容非常重要。图
    12-12 展示了 Terracotta 服务器内部的内部结构。这些结构必须相互通信才能完成任何工作。


    **图 12-12.** *Terracotta 服务器内部的 SEDA 阶段* L2 内部的阶段可以分为四个部分。第一个是事务处理，在图中表示为最左侧的集群。第二个是广播管理，由广播事务和事务确认阶段表示（图
    12-12 中的“广播 txn 阶段”和“txn ack 阶段”）。最后两部分是你所期望的，即对象请求/响应和锁请求/响应。由于这些部分是独立的 SEDA
    阶段，因此可以并行地获取锁、缺页和刷出对象以及提交事务。事实上，一旦 L1 将事务刷出到服务器，它就可以立即继续执行。服务器必须确保所有其他 L1 在必要时确认此事务。因此，在大多数情况下系统是异步的，而广播会使服务器进入同步模式，必须管理所有确认并保证交付。


    使用可视化工具，我们可以判断服务器在这四个组中分别做了多少工作。并且使用这些工具，我们可以判断服务器是否跟上了应用生成的工作负载。在通过工具确认我们的预期之前，让我们先回顾一下我们的预期。


    986-1 CH12.qxd 5/28/08 10:06 PM 第 316 页


    **316**


    第 12 章 n 可视化应用


    **寻找局部性问题**

