- fmt: '# Caching with Maps


    The JDK provides a range of `Map` implementations that you can choose from when
    creating your application. This section will explore the available choices and
    the various trade-offs in both Java and Terracotta.


    ## Unsorted Maps


    In the JDK, your unsorted `Map` implementations include `Hashtable`, `HashMap`,
    `LinkedHashMap`, and `ConcurrentHashMap`.


    - `Hashtable` is a legacy data structure, provided in the initial JDK and predating
    the modern Java Collections API. It should be considered a deprecated part of
    the JDK and is not recommended for use.

    - `HashMap` is the most commonly used `Map` implementation. It is unsynchronized,
    so it should not be used in concurrent (or distributed) code without external
    synchronization. `HashMap` stores its values in a single large table. When the
    internal table is updated, it must be locked for all users. This global locking
    can often become a performance bottleneck. Terracotta provides excellent support
    for `HashMap` but will face the same bottleneck in locking across the cluster
    on updates.

    - `ConcurrentHashMap` is generally the best choice when sharing maps with Terracotta.
    The `ConcurrentHashMap` API is designed for concurrent use. The implementation
    uses internal locking, so calls to the map do not need external synchronization
    for safety. Internally, data is split across many tables (also called segments),
    and each segment can be locked individually. This generally yields far better
    performance under concurrent use than a normal `HashMap`, both in everyday Java
    and with Terracotta.

    - `LinkedHashMap` is basically a `HashMap`, but one with an additional doubly
    linked list running through the entries. The linked list is usually used to track
    insertion order, although it can also be used to track usage of entries in the
    `Map`. This additional capability makes it easy to turn `LinkedHashMap` into a
    cache with LRU (least recently used) cache eviction semantics. At the time of
    this writing, `LinkedHashMap` is not supported by Terracotta.


    The `Collections.synchronizedMap()` method can be used to wrap a synchronized
    thread-safe wrapper around an unsynchronized `Map` such as `HashMap` or `LinkedHashMap`.
    By default, Terracotta does not provide automatic locking on synchronized `Map`
    objects returned from this method, which gives you more freedom in distributed
    lock granularity. You can add locking support to the synchronized wrapper collections
    and legacy collections like `Hashtable` and `Vector` by using the autolocked collections
    Terracotta Integration Module, which is discussed later in this chapter.


    ## Sorted Maps


    The JDK also provides an interface for sorted maps (`SortedMap`), which is implemented
    by `TreeMap`. Terracotta fully supports this implementation (which is backed by
    a tree data structure), but unsorted `Map` will `get()` and `put()` faster than
    a `TreeMap`. This is consistent with the relative performance of `get()` and `put()`
    for `TreeMap` and `Map` in regular Java. Performance is slower because the data
    is stored in a tree that must be balanced on `put` and `remove` actions and traversed
    on a `get` action.


    The `Collections.synchronizedSortedMap()` method can be used to wrap a synchronized
    thread-safe wrapper around an unsynchronized `SortedMap` like `TreeMap`. By default,
    Terracotta does not provide automatic locking on synchronized `Map` instances
    returned from this method, which gives you more freedom in distributed lock granularity.
    Again, you can add locking support by using the autolocked collections Terracotta
    Integration Module.


    `ConcurrentSkipListMap` was added in Java 6 and provides a high-performance concurrent
    sorted `Map` implementation. However, it is implemented using lock-free algorithms,
    and these algorithms are much more difficult to efficiently port to distributed
    implementations. Terracotta does not yet support `ConcurrentSkipListMap`.


    ## Autolocked Collections


    When using shared collections with Terracotta, one of the keys to getting excellent
    performance is to optimize locking. Terracotta provides multiple lock levels,
    and in cases where only a read lock is required, using distributed read locks
    greatly improves performance.


    By default, synchronized collections do not have Terracotta locking applied to
    them so that your application is free to decide the best way to lock access to
    a synchronized collection.


    If you wish to provide locking at the same granularity as a normal, synchronized
    collection, Terracotta provides a Terracotta Integration Module (TIM) for autolocked
    collections that will do this.


    The available autolocked collections follow:


    - `tim-vector`: Automatically locks `java.util.Vector`

    - `tim-hashtable`: Automatically locks `java.util.Hashtable`

    - `tim-synchronizedcollection`: Automatically locks collections returned from
    `java.util.Collections.synchronizedCollection()`

    - `tim-synchronizedmap`: Automatically locks collections returned from `java.util.Collections.synchronizedMap()`

    - `tim-synchronizedset`: Automatically locks collections returned from `java.util.Collections.synchronizedSet()`

    - `tim-synchronizedsortedmap`: Automatically locks collections returned from `java.util.Collections.synchronizedSortedMap()`

    - `tim-synchronizedsortedset`: Automatically locks collections returned from `java.util.Collections.synchronizedSortedSet()`


    Each of these autolocked collection modules specifies read and write locking appropriately
    on the synchronized collection. For example, getting an item from an autolocked
    synchronized `Map` will obtain a clustered read lock, whereas a `put()` will obtain
    a clustered write lock. This will yield better performance by requiring less exclusive
    locks for reads, allowing multiple concurrent readers in the cluster.


    ### Downloading and Installing the Autolocked Collections TIM


    To use the autolocked Collections TIM, you will first need to download and install
    it from the Terracotta Forge at [http://forge.terracotta.org](http://forge.terracotta.org).


    **Note** There are a variety of ways to install modules, depending on whether
    you want to install from source or binary and whether you want to load the module
    into your Terracotta installation or your own local repository. For this example,
    we’ll assume you’re going to download in the binary form and install it in your
    Terracotta installation. For more information, see the Terracotta Forge web site
    or Chapter 9.


    To download the binary distribution for `tim-collections`, version 2.0.1, issue
    this command:


    ```

    $ curl -o tim-collections-2.0.1-bin.zip \

    http://forge.terracotta.org/\

    projects/tim-collections/downloads/tim-collections-2.0.1-bin.zip

    ```


    This command will download a zip file containing several JARs, one per collection
    type.


    To unzip and install these JARs to your Terracotta installation use these commands:


    ```

    $ unzip tim-collections-2.0.1-bin.zip

    $ cd tim-collections-2.0.1

    $ cp *.jar ${TC_INSTALL_DIR}/modules

    ```


    This completes the installation of the autolocked collections TIM. They can now
    be used separately or together in any Terracotta installation.


    ### Using Autolocked Collections'
