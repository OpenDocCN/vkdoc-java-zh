    透明地嵌入 Web 容器


    正如你在本章第一部分所见，HTTP 会话 API 是由 Servlet 规范标准化的。这使得 Terracotta 能够创建自己的实现，并针对我们的分布式虚拟堆进行高度优化。尽管
    Terracotta 能够将任何常规的 Java 类变得可分布式，但仍可进行大量优化以提升集群性能。例如，通过使用自己的会话实现，Terracotta 能够在运行会话驱逐逻辑时避免将属性错误地加载到节点中，或者当会话中仅使用单个属性时，防止传输所有属性。


    好消息是，你完全无需担心这个自定义实现。


    当 Terracotta 为受支持的 Servlet 容器或应用服务器激活时，它会透明地检测受支持产品的内部机制，使其在基于 Terracotta 的环境中更好地工作。Terracotta
    特有的 Servlet 会话钩子位于你的应用和容器之下，无需任何特定配置。你只需在 Terracotta 配置文件中指明需要集群化的 Web 应用名称，其余一切都会自动处理。下一节将展示如何操作。


    **注意** 那些跳过章节直接阅读第 9 章的勇敢读者会发现，Web 应用的 HTTP 会话集群化并不遵循 Terracotta 集成模块的概念。Terracotta
    的会话分发功能早于集成模块。Terracotta 可能会决定将部分或全部特定于容器的会话行为迁移到模块中。目前，使用 Terracotta 进行会话分发是一个特例，因为
    Terracotta 的实现是暴露给用户的，并且必须在分发发生之前安装到容器中。有关各种容器的更多信息，请访问 [`www.terracotta.org/confluence/display/`](http://www.terracotta.org/confluence/display)
    integrations/Home。


    适当的锁粒度与隔离性


    锁定的两个方面对集群的性能和并发性有深远影响：粒度和隔离性。通俗地说，锁粒度指的是被锁定的对象与被更改的对象之间的关系。想象一个对象图中的两个对象：一个根对象及其下的五个子对象。锁定根对象来编辑子对象是粗粒度锁定，而锁定子对象自身来编辑它则是细粒度锁定。沿用这个例子，更新隔离性存在或得以维持的条件是：根对象的两个子对象，在彼此独立锁定的情况下，不会互相阻塞、不会混淆字段更新，也不会破坏彼此的状态。


    在 HTTP 会话的上下文中，每个会话应该能够独立于其他会话更新其内部状态，同时仍要确保在并发访问期间数据不会被破坏。这包括更新会话最后使用的时间戳。


