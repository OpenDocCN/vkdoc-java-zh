- fmt: '# 排版后的内容


    在任何时候，用户数量（有时称为并发用户）可能需要大约十台服务器来处理所有会话对象，而不会发生 Terracotta 缓存驱逐。


    ## 运行 Terracotta 集群


    正如我们之前警告过的，停止 Terracotta 服务器意味着冻结应用程序集群。


    具体来说，任何需要创建或更新的会话都需要 Terracotta 服务器来完成会话操作。相反，驻留在应用程序服务器节点内存中且仅被读取的会话不需要 Terracotta
    服务器。由于无法预测最终用户何时读取或写入其会话数据，以及特定应用程序节点何时宕机或在负载均衡器中触发会话故障转移，因此 Terracotta 必须始终保持运行，以确保最终用户不会遇到延迟或暂停。


    为了实现 100% 的正常运行时间，基于 Terracotta 的应用程序集群包含内置的高可用性复制服务。您可以通过两种方式以高可用性方式运行 Terracotta。第一种称为网络主动-被动（NAP）模式。此模式仅需要
    TCP/IP 支持和第二个 Terracotta 实例，以确保为应用程序集群提供一致的服务。在第二种模式中，Terracotta 与共享磁盘存储（首选 SAN）配合使用，使其数据可供多个
    Terracotta 服务器实例使用。NAP 是首选，因为它易于设置且无需额外的硬件来运行。


    ## 总结


    横向扩展架构使得简单的 HTTP 会话使用变得困难。因此，使用 HTTP 会话存储用户状态在很大程度上已被不鼓励，转而支持无状态架构，其中数据保存在服务器之外。然而，从应用程序开发人员的角度来看，使用会话来存储用户状态通常是最佳答案。事实上，一些流行的
    Web 应用程序框架大量使用 HTTP 会话。使用 Terracotta 虚拟堆来存储会话数据，并结合提供高局部性引用的粘性负载均衡器，可以透明地为您的 Web
    应用程序提供非常高的可扩展性和高可用性。


    在第 1 章和第 2 章中，您首先了解了在无状态运行时环境中进行有状态编程的概念。对于 HTTP 会话复制（Terracotta 首次应用的地方），向无状态编程的推动使容器和架构变得复杂。Terracotta
    通过根本不复制会话，而是在应用程序集群中高效地分发会话对象，简化或消除了会话复制的大部分权衡。


    一个真实的应用程序必须同时拥有存储在数据库中的领域对象和存储在会话中的会话状态。让我们继续第 8 章，我们将讨论用于 Spring 的 Terracotta。我们将集群领域对象和会话对象的组合，并向您介绍基于
    Terracotta 的应用程序中的依赖注入。


