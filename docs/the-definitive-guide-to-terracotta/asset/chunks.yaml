    ■**注意** automount 最初随 Solaris 操作系统一同发布。它能检测对远程文件系统的需求，并按需挂载该文件系统。


    在 `storeAClusteredClassInstance()` 方法中，如果我们假设服务器一先于服务器二启动，那么我们希望只有第一个 JVM 来构造
    myMap，就像代码片段在单个 JVM 中的行为一样。你开始看到，Terracotta 不仅需要查找内存中的对象，实际上还必须处理一些特殊的指令，例如对象构造（这转化为新的内存分配）以及线程锁定（这转化为底层操作系统中的互斥操作）。在第
    3 章和第 4 章中，我们将更详细地解释其工作原理。


    目前，只需知道 JVM 在操作内存时执行的指令只有少数几种，而 Terracotta 可以观察到所有这些指令，这就足够了。


    为了初步理解跨 Java 进程共享对象以实现透明集群，必须考虑线程和协调。在文件类比中，一个应用程序进程必须锁定它想要写入的文件部分，以防止其他进程破坏它。对于线程和锁，Terracotta
    可以仅通过使用 Java 同步来提供跨 JVM 的锁定。在完全理解这个概念之前，你需要对 Java 内存模型有所了解。


    线程是集群方程的一部分，因为它们操作对象，并且在访问这些对象时必须进行同步。让我们暂时假设 Terracotta 已部署并正常工作，使得我们在服务器一和服务器二上都有
    c3，并且 c3 在两个 JVM 中是完全相同的对象。如果一台服务器想要更改 myMap，它需要锁定 myMap。因此，锁定和线程语义必须像对象跨 Java
    进程分布一样，跨进程传播。


