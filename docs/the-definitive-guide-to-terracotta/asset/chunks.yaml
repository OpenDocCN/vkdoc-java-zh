    `tc-config.xml` 的文件。


    使用显式路径指定 Terracotta 配置文件来启动服务器的命令行如下所示：


    %> /usr/local/terracotta/bin/start-tc-server.sh –f /path/to/tc-config.xml


    要使用隐式路径启动服务器，请将目录切换到示例项目的顶层目录。项目顶层目录包含 `tc-config.xml` 文件。然后，你可以执行以下命令：


    %> /usr/local/terracotta/bin/start-tc-server.sh


    在 Eclipse 中，可以通过 Terracotta 菜单中的“启动 Terracotta 服务器”命令来启动服务器。服务器启动后，即可启动应用程序的实例。


    对于此示例，我们必须在两个 JVM 中运行 `Main` 类，因此你需要调用 Java 两次。根据你的操作系统和 Terracotta 安装目录，命令行将类似于以下内容（同样，假设你从项目顶层目录运行命令）：


