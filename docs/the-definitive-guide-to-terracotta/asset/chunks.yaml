    As you can see, the Pipe is using an abstraction called Queue, which is a simple
    generic interface for a queue abstraction. In this example’s implementation in
    the SVN repository, you can find three different implementations of this interface:
    ListBasedQueue (wrapping a java.util.ArrayList), DmiBasedQueue (based on Terracotta’s
    Distributed Method Invocation feature) and BlockingQueueBasedQueue (wrapping a
    java.util.concurrent.LinkedBlockingQueue).


    Among these three, the third is the one that gives best throughput and scale (each
    of these Queue implementations also has a Factory that creates the queue in question).
    The Queue class is shown in Listing 11-7.


