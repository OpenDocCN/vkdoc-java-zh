- fmt: '# Exclude a set of methods from automatic locking


    These methods allow your bundle activator class to modify the instrumented classes,
    roots, and locks as in the Terracotta configuration file. Many TIM bundle activators
    available on the Terracotta Forge consist primarily of calls to these methods
    to define configuration.


    ## Class Replacement and Modification


    So far, we have talked about writing code to duplicate things we can do with a
    `terracotta.xml` file in the bundle. Now, we will examine some things that can’t
    be done any other way. The two primary capabilities we will discuss are class
    replacement and class modification.


    Sometimes, classes in a library cannot efficiently be clustered. One example of
    this is a cache evictor. A cache evictor is usually implemented via a thread that
    iterates across the cache looking for objects that have timed out in some way.
    Eviction in a clustered environment cannot be implemented via a simple iterator,
    because every object in the cache will be forced into the JVM doing the work of
    iterating through the collection underlying the cache.


    The evictor in the example would significantly impact application performance
    while running. Another example might be clustering a class that is not thread-safe.


    In such cases, it may be necessary to entirely replace one or more classes with
    alternate versions that provide data structures and synchronization that can more
    readily be clustered.


    Due to the maintenance issues this creates regarding adhering to the library’s
    own interfaces and internal structure, this technique should be considered carefully.


    The methods involved in class replacement and modification are defined in Tables
    9-3 (methods on the `StandardDSOClientConfigHelper` class) and 9-4 (helper methods
    on the `TerracottaConfiguratorModule` class itself).


    **Table 9-3.** *Available Methods on the `StandardDSOClientConfigHelper` Class*


