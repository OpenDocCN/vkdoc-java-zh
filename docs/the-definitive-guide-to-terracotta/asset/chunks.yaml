    在Terracotta中，这一切的实现方式是：指向对象所在的类。Terracotta将负责构造共享对象，并同步各个JVM中对象所在的位置。现在的问题是：哪些对象需要共享，以及如何共享它们？


    在`HelloClusteredWorld`示例中，跨Java进程共享`buffer`的能力，使得每个JVM中运行的两个`while`循环能够协同处理同一个`buffer`实例。`loopCounter`变量是循环在消息中的索引，用于决定将哪个字符复制到`buffer`中。如果不跨JVM共享`loopCounter`实例，两个JVM将无法复制正确的字符。几个反例将有助于阐明这一点。


