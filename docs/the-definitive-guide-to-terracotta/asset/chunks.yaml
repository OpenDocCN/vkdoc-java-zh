    <class-expression>


    org.terracotta.book.caching.ehcache.UserEhcacheExample


    </class-expression>


    </include>


    </instrumented-classes>


    </dso>


    </application>


    </tc:tc-config>


    目前，Ehcache TIM 还提供了 JSR 107 JCache API 到 Ehcache 的集成，因此需要从 [`sourceforge.net/projects/jsr107cache/`](http://sourceforge.net/projects/jsr107cache)
    包含 JSR 107 JAR。


    接下来，你需要使用 dso-java.sh 将你的应用程序作为 Terracotta 应用程序运行：dso-java.sh \


    –cp .:ehcache-1.3.0.jar:commons-logging-1.0.4.jar:jsr107cache-1.0.jar \


    –Dtc.config=tc-config.xml org.terracotta.book.caching.ehcache.UserEhcacheExample
    执行此操作时，你将看到与运行启用了 Terracotta 的 Map 应用程序类似的结果。缓存是集群化的，所有节点都将看到在任何特定节点上所做的更改。


    **总结**


    缓存几乎是任何应用程序架构中必不可少的一部分。通常，我们从简单的缓存系统开始，但后来发现它无法满足数据大小、新鲜度和可扩展性方面的实际需求。事后扩展这样的系统可能是一项艰巨的任务。


    使用 Terracotta，你可以从简单的方案开始，但利用 Terracotta 的集群化、持久化虚拟堆来缓解与扩展应用程序缓存相关的许多痛点。最棒的是，你可以使用原始的简单代码实现这种规模的扩展。


    在本章中，你了解了如何使用内置的 JDK 集合构建简单但功能强大的分布式缓存，以及如何利用现有的开源缓存库来获得更复杂的功能和行为，同时仍然利用 Terracotta
    的优势。


    在下一章中，我们将研究 Hibernate（一个流行的对象关系映射框架）中的缓存工作方式。我们将详细探讨 Terracotta 如何扩展应用程序中基于 Hibernate
    的数据访问，以实现比单独使用 Hibernate 高出数个数量级的可扩展性。


