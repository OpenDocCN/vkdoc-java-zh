    主控器最有趣的部分是 `run()` 方法，它实现了我们之前讨论的算法。对于那些已经忘记的人，这里做一个回顾。


    **1.** 从起始 URL 获取页面。


    **2.** 解析页面，并收集所有出站 URL。


    **3.** 为页面建立索引。


    **4.** 对于每个出站 URL，转到步骤 1。


    正如你在我们的网络爬虫示例中所见，在这个递归算法中（我们将其实现为一个常规循环），我们首先尝试通过将初始 URL 传递给 `scheduleWork()`
    方法来获取该 URL 的页面。作为返回，我们得到第一个待处理的 `WorkItem`，它充当了进行中工作的句柄。我们通过将所有待处理的工作项添加到一个 `Set`
    中来跟踪这个以及所有未来的 `WorkItem` 对象。现在，既然我们的 `Set` 中至少有一个 `WorkItem`，我们就可以开始一个循环，该循环将持续迭代此
    `Set` 中的所有项（直到集合为空）。在这个循环中，我们做的第一件事是通过调用 `WorkManager` 中的 `waitForAny()` 方法来检查是否有任何已完成的
    `WorkItem` 对象。此方法将返回一个包含至少一个已完成 `WorkItem` 的 `Collection`；我们可以遍历该集合，检查每个已完成 `WorkItem`
    的状态，并过滤出所有成功完成的项。过滤是必要的，因为 `WorkItem` 可能因失败而“完成”，此时其状态标志将被设置为 `WORK_REJECTED`
    而非成功的 `WORK_COMPLETED`。现在，我们将每个成功完成的 `WorkItem` 传递给 `processLinks()` 方法，该方法将为其每个出站链接创建一个新的
    `SpiderWork` 对象，并将其传递给 `scheduleWork()` 方法。这个 `SpiderWork` 项将为我们提供一个指向新待处理 `WorkItem`
    的句柄，然后我们可以继续循环的下一轮。


    最后，我们需要实现两个包装类来启动主控器和工作者，即 `StartWorker` 和 `StartMaster`：


