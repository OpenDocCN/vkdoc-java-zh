- fmt: "```xml\n<groupId>org.terracotta.maven.plugins</groupId>\n<artifactId>tc-maven-plugin</artifactId>\n\
    <version>1.0.0</version>\n<configuration>\n  <bundleActivator>org.myfavoriteframework.MyConfiguratorModule</bundleActivator>\n\
    \  <importPackage>org.terracotta.modules.configuration</importPackage>\n</configuration>\n\
    ```\n\nFirst, it is important that the POM declare a dependency on the `terracotta-api`\
    \ Maven module. Doing so will bring in all dependencies needed to compile the\
    \ TIM. You may need to specify a SNAPSHOT version in this section if you are developing\
    \ against an unreleased version of Terracotta.\n\nSecond, you must specify the\
    \ bundle activator for the JAR manifest using the `BundleActivator` element under\
    \ `configuration`. Also, you must import packages you are using in your code from\
    \ the `terracotta-api` module. Similarly, the `<exportPackage>` element can be\
    \ used to export portions of your module for use by other modules. For a full\
    \ list of the properties that can be set in the `<configuration>` element for\
    \ the Terracotta Maven plug-in, see Table 9-5.\n\nOnce these items are in place,\
    \ you can then run Maven commands as normal, such as `compile`, `package`, and\
    \ `install`. During the build life cycle defined by Maven, the manifest will be\
    \ generated automatically and included in the JAR created in the `target` directory\
    \ along with other artifacts of the Maven build.\n\n**Table 9-5.** Exportable\
    \ Properties and Options for Maven-Based Builds\n\n| Configuration Element | Description\
    \ | Default |\n| --- | --- | --- |\n| `bundleActivator` | OSGi Bundle-Activator\
    \ manifest attribute | |\n| `bundleCategory` | OSGi Bundle-Category manifest attribute\
    \ | |\n| `bundleCopyright` | OSGi Bundle-Copyright manifest attribute | |\n| `bundleDescription`\
    \ | OSGi Bundle-Description manifest attribute | `${project.description}` |\n\
    | `bundleName` | OSGi Bundle-Name manifest attribute | |\n| `bundleRequiredExecutionEnvironment`\
    \ | OSGi Bundle-RequiredExecutionEnvironment manifest attribute | |\n| `bundleSymbolicName`\
