- fmt: '# Introduction


    Jeff has successfully brought open source development efforts, initiatives, and
    success stories into a number of Global 2000 companies, saving these organizations
    millions in licensing costs.


    **xvii**


    986-1 FM.qxd 5/31/08 9:19 PM Page xviii


    986-1 FM.qxd 5/31/08 9:19 PM Page xix


    **I**magine being able to call `wait()` on a Java object in one JVM, and imagine
    that later a thread in another JVM on another computer calls `notify()` on that
    same object and that `notify()` call penetrates the impermeable process boundary
    between the two JVMs to wake your thread from its slumber. Further imagine that
    all of the changes to that object made in the other JVM while you were waiting
    are now visible to your thread. Imagine now that the code you wrote to make this
    happen looked *no different* than code you would have written were this program
    to run only on a single JVM—no concessions to special frameworks, no callouts
    to special APIs, no stubs, no skeletons, no copies, no put-backs, and no magic
    beans.


    What would it be like if you could automatically share Java heap between virtual
    machines so that threads running in different JVMs could interact with each other
    exactly as if they were running in the same JVM? Imagine what you could do with
    that kind of power—the power to express a computing problem in the simplest possible
    terms that stay true to the problem at hand yet be able to run that program on
    multiple computers at once while the program thinks it’s running on one big computer.
    What would such a thing be? And wouldn’t you really, really want it if you could
    have it?


    Terracotta was born out of just such imaginings.


    Terracotta is Java infrastructure software that allows you to scale your application
    to as many computers as needed, without expensive custom code or databases. Throughout
    this book, it is referred to as JVM-level clustering or network-attached memory.
    The question you now face is how to understand and leverage this technology best.


    The goal of this book is to help you answer that question. While a total of almost
    fifty person-years of engineering have gone into the product, to date very little
    has been documented about Terracotta. After years of underground lab work and
    hundreds of production deployments under its belt, Terracotta’s team of authors
    have come together to write this definitive guide to Terracotta. This book will
    help you learn the official definition and detailed architecture of the technology.
    It will also walk you through the most popular applications of JVM-level clustering.


    It will teach you how to tune and manage a production application running in a
    Terracotta environment.


    Use this guide as a gateway. Terracotta is infrastructure just like a database,
    a file server, or even a networking switch. With it you can achieve many things
    and design many different use cases. Any technology that claims it is well suited
    to all use cases should be viewed with caution. We have put forth this work to
    help you both understand and trust Terracotta for certain use cases. While file
    servers and relational databases have been used with great success over the past
    30 years, they have also been abused with varying levels of success (for example,
    we have seen a single relational database handle 1.5 billion inserts a day, filling
    it with data that was retained for only 30 days, all achieved by disabling rollback).
    We realize that databases succeed because a community of developers rallied around
    the concept and built a shared toolset and understanding of where databases fit
    and where they do not.


    **xix**


    986-1 FM.qxd 5/31/08 9:19 PM Page xx


    **xx**


    The Java community acts as a gateway to this understanding of database technology.
    Together, the community members help each other design systems that are generally
    accepted as successful. Terracotta has invented new nomenclature—calling itself
    network-attached memory. As a result, the community needs a foothold with which
    to establish a shared knowledge of this new thing, this network-attached memory.
    This book is your gateway into the universe of network-attached memory and the
    power it represents. Use it to help begin the conversation and thought process
    around what are good and bad use cases for a JVM-level clustering approach.


    I think an example is in order. (By the way, we communicate mostly by example
    in this book. Hopefully, this style of teaching will be helpful to you.) Engineer
    A wants to use Terracotta to act as a point-to-point communication protocol on
    the Internet to stream movies to web browsers. Meanwhile, Engineer B wants to
    use Terracotta to maintain a centralized or shared view of her application configuration
    data without having to maintain each JVM’s system properties or XML-based configuration
    separately. Engineer C wants to use Terracotta to replace his web application’s
    current stateless architecture for a more natural stateful one. The product will
    integrate to each engineer’s application with minimal initial effort, so how is
    engineer A, B, or C to know what to expect? For engineer A, Terracotta will seem
    unstable, slow, and generally cumbersome, while for engineers B and C, Terracotta
    will seem almost ideal.


    If you can tell the differences among these application patterns, consider yourself
    among the few. If you are currently wrestling with an application running on Terracotta
    or are contemplating where to use it and where to not use it, this guide represents
    the foremost thinking on the subject.


    Here, you will learn about several popular cases for using Terracotta. You will
    learn in detail how to configure the system in each case, and you will learn the
    details of what makes that case a potential success or sweet spot.


    By the end of this book, you will see the patterns for yourself and be able to
    help your friends understand the differences too. It’s an exciting time for those
    of us at Terracotta. The concepts we are discussing and suggesting to you will
    not prove new or radical. The concepts embodied within the product—centralized
    management, stateful development, stateless runtime, and more—have never been
    brought together or assembled into a package like this. This assembly of approaches
    and techniques is what makes Terracotta exciting. Communicating the new capabilities
    this technology provides to the application development team is challenging yet
    rewarding. We hope you find the book as engaging to read as we found it to write.


    With your help, this will be the first of several books on the topics of Terracotta,
    network-attached memory, and JVM-level clustering.


    ## How This Book Is Structured


    This book is structured as follows:


    - **Chapter 1, Theory and Foundation**: We start with a look at what Terracotta
    is and the theory behind it.

    - **Chapter 2, History of Terracotta**: This chapter provides a brief history
    of Terracotta to give the rest of the book some context.

    - **Chapter 3, Jumping Into Terracotta**: In this chapter, we get into the practicalities
    of Terracotta, introducing the basic concepts of its configuration and showing
    a simple example of Terracotta clustering.

    - **Chapter 4, POJO Clustering**: This practical chapter covers how to cluster
    an existing POJO application.

    - **Chapter 5, Caching**: This chapter explains how to use Terracotta to alleviate
    some of the problems inherent in caching and how to bring the benefits of caching
    to distributed systems.

    - **Chapter 6, Hibernate with Terracotta**: In this chapter, we show you how to
    scale Hibernate-enabled applications. We cover the concepts on which Hibernate
    is built so that you gain a full understanding of clustering with Hibernate.'
