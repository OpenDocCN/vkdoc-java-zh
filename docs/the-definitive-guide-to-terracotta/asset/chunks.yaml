    crashed workers (and masters). The only case you should address in code, then,
    is long-running work for which the JVM and the node and network remain healthy
    yet the work still takes too long to complete. If you want to eject a worker and
    send its work to another node, simply augment the master/worker framework using
    JDK 1.5 util.concurrent locking and wait()/notify() API options that include a
    timeout. Terracotta will honor those timeouts on attempts to wait for or lock
    objects (using wait()or synchronized().


    In all of the strategies, we need to take proper action when worker failure has
    been detected. In the context of master/worker, among other things, this need
    means we must reroute all pending, uncompleted work to another pipe to be consumed
    by its specific worker.


    Using cluster membership events is by far the simplest, most straightforward,
    and most stable way of integrating our code for handling failures.


