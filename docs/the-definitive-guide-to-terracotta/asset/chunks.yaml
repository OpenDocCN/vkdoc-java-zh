    C H A P T E R 8 ■ C L U S T E R I N G S P R I N G


    **A Sample: Spring Beans Without a Database**


    The application we’ll be working with is similar in spirit to the inventory sample
    that comes with the Terracotta kit and that you’ll see elsewhere in this book
    (we will performance-tune and visualize the inventory application in Chapter 12).
    However, it has been rewritten to adhere more closely to the DI paradigm.


    The application represents a simple retail store with an inventory of products
    that can be viewed and modified. The store entities are modeled with five components:


    • Product: A Product object contains the SKU, name, price, and inventory level
    of a particular product in the store.


    • Department: Department objects group products into like sets. For example, there
    might be a Shoes department with all of the shoes products in it. The same product
    might be a member of more than one department.


    • Departments: This controls access to all Department objects.


    • Inventory: This represents all of the products in the entire store, irrespective
    of their departments. It provides a view onto all of the products in the store.


    • Store: The Store is the main component that contains all of the other components.


    Access to products, departments, and inventory is controlled through the Store.


    In addition to the entity components, a number of other supporting classes implement
    application and display logic. These include a class called CLI that contains
    the application loop and user-input functions for the command-line interface.


    ■**Note** The code for the sample project can be retrieved from [http://www.apress.com.](http://www.apress.com)


    A first look at the store component, shown in Listing 8-1, reveals that all of
    the other components that the Store object itself interacts with are passed to
    it via the Store() constructor.'
