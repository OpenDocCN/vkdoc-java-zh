    同时使用这两种技术时，您需要了解一些基本事项。这些注意事项将在以下各节中介绍。


    ## 验证Ehcache配置集群


    您可以通过以下三种方式之一识别您的Ehcache是否已集群：


    - 使用Terracotta管理控制台检查Ehcache存储中的数据。在控制台中，从左侧面板打开`roots`选项卡，查找名为`net.sf.ehcache.CacheManager.singleton`的根。此自动根由Terracotta
    Ehcache TIM为Ehcache单例创建，它包含所有Ehcache `CacheManager`实例。如果您看到此条目，则您的Terracotta配置已正确配置为集群Ehcache。


    - 在`hibernate.xml`中启用Hibernate SQL调试属性，以确保缓存命中不输出SQL：


    ```xml

    <!-- Echo all executed SQL to stdout -->

    <property name="show_sql">true</property>

    ```


    - 使用Hibernate中的`Statistics`对象在运行时查询二级缓存的命中次数和未命中次数：


    ```java

    Statistics stats = HibernateUtil.getSessionFactory().getStatistics();

    stats.setStatisticsEnabled(true);


    QueryStatistics queryStats = stats.getQueryStatistics("from Event");

    queryStats.getCacheHitCount();

    ```


    ## 调优二级缓存


    通常，您使用的调优策略应与Hibernate文档第19.2节中概述的策略相同。与Terracotta一起使用时，您需要考虑一些特殊事项。


    您应确保缓存条目配置了适当的TTL，以防止缓存随时间增长过大。借助Terracotta网络附加内存，您的应用程序可以使用比本地JVM中可分配的虚拟空间大得多的空间。这通常是一个有利且期望的好处，但您需要确保不会滥用此功能，在二级缓存中存储超出预期的数据。Ehcache可以在构造`CacheManager`时指定TTL设置，也可以通过Ehcache配置文件进行控制。有关最大空闲生存时间和最大空闲时间的更多详细信息，请参阅Ehcache文档。


    当存在高引用局部性时，所有缓存的性能最佳。现在，我们快速提醒您主板类比。引用局部性是指特定CPU指令集所需的数据在该CPU的数据缓存中可用的状态：访问数据不需要磁盘或网络I/O。有关引用局部性在Terracotta和JVM级集群中的更多信息，请参阅第12章。如果您的应用程序引用局部性较低，或者主要执行写入而非读取（即写密集型），您应考虑使用缓存是否有助于提高应用程序性能，或者该缓存是否只是在无用的垃圾回收中浪费内存和CPU。


    ## 调优分离实例


    由于分离实例只是POJO，因此调优它们与使用Terracotta调优POJO或分布式缓存实例没有区别。有关更多信息，请参阅第12章了解一般调优信息，或参阅第5章了解调优分布式缓存性能的具体信息。


    ## 总结


    本章展示了将Hibernate应用程序从单节点迁移到集群环境时面临的挑战。Terracotta不仅能够缓解这些挑战，还能提升整个集群的应用程序性能。


    将Terracotta与启用Hibernate的应用程序集成存在两种主要策略：


    - 使用集群化的Ehcache实现作为二级缓存

    - 在会话外部集群化Hibernate创建的POJO，也称为分离实例


    在第5章中，您了解了分布式缓存，现在您对缓存范式以及Terracotta如何帮助Hibernate应用程序从数据库分离有了更好的理解。在第7章中，我们将探讨使用Terracotta进行Web应用程序的集群。我们将学习如何以透明、高可用的方式共享HTTP会话信息。对于基于Hibernate的应用程序，HTTP会话被证明是我们可以存储分离POJO的一个位置。此外，可扩展且高可用的HTTP会话集群可以帮助我们将某些围绕Web对话的数据完全保留在数据库之外。


    集群化的HTTP会话为我们提供了另一种无需借助数据库即可共享状态的方式。通过这些不同的集成点，我们可以开始看到Terracotta为我们提供的远不止一个分布式缓存库——Terracotta为我们提供了一个通用解决方案，在我们现有的应用程序在跨Java进程扩展过程中面临各种挑战时，我们可以使用它。


    # 第7章 使用Terracotta扩展HTTP会话


    HTTP会话传统上用于在服务器端存储状态的Web应用程序。虽然这种方法在单台服务器上很方便，但一旦您的应用程序增长并且需要多台服务器来满足负载，会话就可能成为性能瓶颈和开发负担。


    在本章中，我们将探讨Terracotta如何使在集群中处理HTTP会话像在单台机器上一样方便。您将看到每个缺点是如何被解决的，以及将Terracotta与标准Java
    Web应用程序集成是多么容易。


    ## 什么是HTTP会话？


    网站早已超越了其最初的静态特性，现在具有高度交互性，有时甚至是成熟的应用程序。为了使这些应用程序正常工作，每个用户都需要能够在与网站交互期间维护一个状态。使万维网如此普及的HTTP规范从未发展出提供这种状态管理解决方案的能力。其某些特性，如查询字符串参数和Cookie，结合隐藏的HTML表单参数，确实允许满足某些应用程序状态管理需求。然而，这些功能相当有限，当应用程序状态变得更大且需要保护时，诸如Servlet容器之类的技术提出了在服务器上存储用户数据的解决方案。图7-1展示了由应用服务器维护的HTTP会话状态与由Web浏览器维护的Cookie状态之间的区别。


    **图7-1.** *应用服务器代表Web浏览器管理的HTTP会话状态*


