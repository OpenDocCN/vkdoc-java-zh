- fmt: "```java\nclass MyObject {\n\n    int i = 0;\n\n    // ...\n\n    int playWithMemory(\
    \ int input ) {\n\n        int j;\n\n        this.i = input;\n\n        j = this.i;\n\
    \n        return j;\n\n    }\n\n}\n```\n\nAt run time, the few lines of arguably\
    \ silly code in the method named `playWithMemory()` would turn into instructions\
    \ to the JVM. The first line turns into a stack variable allocation of 4 bytes\
    \ where the variable `j` will be stored. The next line writes to heap memory.\
    \ The address in memory at which to write is the address where `this` is stored.\
    \ The size of the type of field `i` dictates an offset into `this`, where the\
    \ application intends to write. In this case, `i` is an `int`, so the offset would\
    \ be four. The argument to the `playWithMemory()` method will get copied into\
    \ our instance, `this`, thus causing a 4-byte write to heap.\n\nThe next line\
    \ of code turns into a read from heap memory. Again, the read operation occurs\
    \ at a 4-byte offset into our instance where `i` is stored. The value of `i` gets\
    \ copied into the stack variable named `j`. Heap access is actually occurring\
    \ transparently, line by line inside the JVM as our application logic runs. Some\
    \ logic will cause reads from heap memory, while others cause writes. Of course,\
    \ the JVM can perform many operations other than reading and writing to memory,\
    \ but Terracotta is concerned mostly with these two byte code operations.\n\n\
    We will refer to these memory instructions by their proper names later, but for\
    \ now, let’s focus on the concepts only; the names of these instructions would\
    \ be confusing when looking at alternatives to Terracotta in the next section.\
    \ Also, there are many more instructions inside the JVM to which Terracotta attaches,\
    \ including constructor special instructions, and threading instructions such\
    \ as locking and unlocking objects, but the core concept is represented sufficiently\
    \ by these two.\n\nThe core concept behind Terracotta is that of bytecode manipulation.\
    \ When `playWithMemory()` is invoked and a heap memory read occurs with Terracotta\
    \ enabled, the read will do more than just read from memory. Things will be clearest\
    \ using pseudo code. We can see in pseudo code that the application logic does\
    \ not change while Terracotta hooks into the object:\n\n```java\nclass MyObjectWithTerracottaPseudoCodeForm\
    \ {\n\n    int i = 0;\n\n    // ...\n\n    int playWithMemory( int input ) {\n\
    \n        int j;\n\n        // Terracotta inserts itself here because a memory\
    \ operation is occuring\n        if( Terracotta.isOutOfDate( this.i ) ) {\n  \
    \          Terracotta.updateFromNetwork( this.i );\n        }\n\n        this.i\
    \ = input;\n\n        // send deltas to the network since a shared object just\
    \ changed\n        Terracotta.sendDeltasToTheNetwork( this.i );\n\n        //\
    \ Terracotta inserts itself here as well\n        if( Terracotta.isOutOfDate(\
    \ this.i ) ) {\n            Terracotta.updateFromnetwork( this.i );\n        }\n\
    \n        j = this.i;\n\n        // no delta is sent because the logic read memory\
    \ as opposed to writing it.\n        return j;\n\n    }\n\n}\n```\n\nIn practice,\
    \ the preceding pseudo code does not perform well when every operation on heap\
    \ memory causes a network call to Terracotta, checking for updates when reading\
    \ and sending back updates when writing. The real system is far more intelligent\
    \ and is capable of sending many updates in a single batch to the network.\n\n\
    What is still not clear is how Terracotta knows to hook itself into the application\
    \ at these particular places. The answer is bytecode. Bytecode turns arbitrary\
    \ application logic into a very well formed syntax, regardless of coding style,\
    \ frameworks, or development practices.\n\nThat syntax can be thought of as `HEAPREAD()`\
    \ and `HEAPWRITE()`.\n\nTerracotta does not insert itself into our Java source\
    \ files; it inserts itself into our classes as they load. Those classes come from\
    \ class files, which the compiler wrote to disk (in most cases). Terracotta does\
    \ not understand Java syntax, because it does not have to. It only looks for `HEAPREAD()`\
    \ and `HEAPWRITE()` logic operations and wraps them, as in the previous pseudo\
    \ code example."
