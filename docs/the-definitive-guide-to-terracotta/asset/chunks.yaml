    存储分离实例


    要在应用程序中使用分离实例，您必须将它们存储在某处，并在应用程序需要时检索它们。如何执行此操作取决于您，并取决于应用程序的需求，但应用程序开发人员通常采用三种常见策略之一。


    **将分离实例存储在 HTTP 会话上下文中**


    如果您在 Web 应用程序中工作，可以访问 HTTP 会话上下文，并且您存储的 Hibernate 对象与当前用户相关，您可以选择将 POJO（分离实例）存储在
    HTTP 会话上下文中。


    要将分离实例存储在 HTTP 会话上下文中，只需使用 HTTP 会话中的 `setAttribute()` 方法，就像处理任何其他您希望缓存在会话中的对象一样：


    //~ 检索 foo 对象


    session.beginTransaction();


    Object foo = { Hibernate HQL }


    session.getTransaction().commit();


    //~ 存储在会话中


    request.setAttribute("fooObject", foo);


    **将分离对象存储在 HashMap 中**


    在其他上下文中，如果您无法访问 HTTP 会话上下文，或者您的数据涉及多个用户，则将分离实例存储在 HTTP 会话上下文中可能没有意义。另一种选择是将它们存储在
    HashMap 中。


    要将分离对象存储在 HashMap 中，只需使用 HashMap 的 `get()` 和 `put()` 方法，如下面的代码片段所示。最合适的键可能是用于从数据库表中获取行的主键。为了确保这些对象在
    Terracotta 集群中可用，必须使用第 4 章中概述的技术将此 HashMap 标记为集群对象（它必须是集群对象图的一部分，或者被标记为 Terracotta
    根）。


    //~ 检索 foo 对象


    session.beginTransaction();


    Object foo = { Hibernate HQL }


    session.getTransaction().commit();


    //~ 存储在映射中


    myClusteredeMap.put("fooObject", foo);


    **将分离对象存储在集群缓存中**


    对于您的应用程序而言，将分离实例存储在集群缓存中可能比使用 HashMap 效果更好。集群缓存实现通常具有更多功能，例如项目的过期时间，并且在需要比 Map
    接口提供的功能更复杂的功能时，它是一个不错的选择。


