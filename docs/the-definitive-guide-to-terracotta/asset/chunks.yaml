    **Clustered POJOs Step by Step**


    Now that you’ve been introduced to some of the major concepts of Terracotta, we
    are ready to discuss POJO clustering in depth and what it means for your application.
    The definition of a POJO is quite contentious. Rebecca Parsons originally defined
    POJO. Later, on the definition, Fowler wrote:


    *“I’ve come to the conclusion that people forget about regular Java objects because
    they* *haven’t got a fancy name—so while preparing for a talk Rebecca Parsons,
    Josh Macken-zie, and I gave them one: POJO (Plain Old Java Object). A POJO domain
    model is easier* *to put together, quick to build, can run and test outside of
    an EJB container, and isn’t* *dependent on EJB (maybe that’s why EJB vendors don’t
    encourage you to use them).”*


    —Martin Fo[wler (http://www.martinfowler.com/isa/domainModel.html)](http://www.martinfowler.com/isa/domainModel.html)


    POJO is essentially a feeling more than a specification. What is certain is that
    a developer knows when he is writing POJOs and when he is not.


    Terracotta enables a POJO programming model when running applications in a cluster.


    The model is represented by the ability to honor the Java Memory Model as well
    as the language semantics. Specifically, POJO clustering implies that object identity
    is preserved across JVMs. Clustered POJOs are, in a fundamental way, the *same*
    object in different JVMs, not merely copies or clones that have the same data.
    A POJO should be able to simultaneously reside in two separate object graphs without
    ending up cloned into one of them.


    A Java developer should be able to synchronize access to a POJO using the synchronized
    keyword. POJO clustering is the basis of Terracotta’s ability to cluster many
    frameworks. Community members have built prototypes for Scala, JRuby, Quercus,
    and Groovy clustering.


    These technologies were not implemented with clustering in mind, but as long as
    the clustering honors the language specification and developer contract (preserving
    threading semantics and object identity), these technologies needn’t think about
    clustering.


    In Chapters 5 and on, you will see a number of use cases that demonstrate Terracotta
    adapted for a particular technology. But, under the covers, Terracotta is a generic
    technology that can be applied to any distributed computing task. The core Terracotta
    technology makes POJOs available across JVM instances as if they all shared a
    massive distributed heap. In the rest of this chapter, we will address how POJO
    clustering works and can be used under many use cases. With this knowledge, you
    can better understand subsequent chapters, and you can build your own prototypes
    or production applications using frameworks Terracotta has yet to support.


