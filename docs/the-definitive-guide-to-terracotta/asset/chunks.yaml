  raw: 'In this example, the previous autolock configuration no longer needs to be
    included, as the module will pull it in as a chunk of additional configuration.


    **Module Repositories**


    The next question is how does your application know where to find the JAR files
    that define the modules included in your application? Terracotta looks for modules
    in a module repository, which is nothing but a directory that serves as a collection
    of JAR files.


    Modules do not need to be in a single repository; multiple repositories may be
    specified and will be searched in order. Terracotta always first searches an implicit
    repository defined as follows:


    file://<terracotta-install-dir>/modules


    The module repository structure is compatible with the Maven repository structure,
    although it requires only the actual JAR files to be present.


    [n**Note** See http://maven.apache.org/guides/introduction/introduction-to-](http://maven.apache.org/guides/introduction/introduction-to-repositories.html)


    [repositories.html for more information on Maven repositories.](http://maven.apache.org/guides/introduction/introduction-to-repositories.html)


    The directory path is based on the group-id and TIM name. The JAR file in that
    directory is named based on the TIM name and version. For example, the module
    specified in Listing 9-2


    translates to the following repository path:


    org/terracotta/modules/tim-synchronizedmap/2.0.0/tim-synchronizedmap-2.0.0.jar
    You can specify additional repository locations in the <clients> configuration
    element using the <repository> element. For example, Listing 9-3 shows multiple
    repositories that will be searched. The Terracotta installation modules subdirectory
    will be searched first, so there is no need to specify it. Further, the <repository>
    elements will be searched in the order specified, so as Listing 9-3 illustrates,
    you can use shared repositories on file servers on the network yet override shared
    ones by searching a local repository first. Currently, only repositories


    [defined via a file:// URL ar](file://URL)e supported.


    986-1 CH09.qxd 5/28/08 10:41 AM Page 206


    **206**


    C H A P T E R 9 n INTEGRATION MODULES


    **Listing 9-3.** *Specifying Repositories in tc-config.xml*


    <clients>


    <modules>


    [<repository>file:///usr/local/share/terracotta/modules</repository>](file:///usr/local/share/terracotta/modules%3C/repository)


    [<repository>file://share/mygroup/terracotta/modules</repository>](file://share/mygroup/terracotta/modules%3C/repository)


    [<repository>file://othershare/mycompany/terracotta/modules</repository>](file://othershare/mycompany/terracotta/modules%3C/repository)


    <module name="tim-synchronizedmap" version="2.0.0 " />


    </modules>


    </clients>


    Generally, you will want to list the repositories in order from the most volatile
    directories on your local machine, such as those where you are currently developing
    modules, to the most stable or frozen modules shared on your network. In Listing
    9-3, the Terracotta installation directory is searched first, then the user’s
    local repository, followed by the user’s group repository, and finally the company
    repository.


    You can obtain TIMs in several places: from the Terracotta download kit, from
    the Terracotta Forge, or by making one yourself. The Terracotta kit contains a
    modules subdirectory, as previously discussed, that can serve as a module repository.


    **The Terracotta Forge**


    The Terracotta Forge provides an open repository for the development of code and
    projects related to Terracotta. Most importantly, the Forge provides a place where
    both Terracotta and community members can develop and share TIMs. The Forge can
    be accessed at


    [http://forge.terracotta.org and has an associated module r](http://forge.terracotta.org)epository.


    Each project hosted on the Terracotta Forge has access to the following resources:


    • Subversion source code repository


    • Wiki space


    • Web forum


    • Project-specific web site generation and hosting


    • Automated build


    • Automated testing


    • Automated project artifact creation and deployment'
