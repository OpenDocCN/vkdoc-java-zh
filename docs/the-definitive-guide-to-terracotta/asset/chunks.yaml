- fmt: '# Hibernate with Terracotta


    This example can be implemented by simply programming directly to the `JDBC` API.
    Of course, this approach is simple but fails to give us good performance, especially
    for applications that make many fine-grained changes during each conversational
    request. For complex applications, managing `JDBC` by hand often is not as simple
    as this trivial example might otherwise suggest.


    **Figure 6-2.** *The baseline JDBC application makes nine SQL calls.*


    Let’s sum up this approach: This application performs a total of nine operations.
    Its advantage is simplicity, but it scales poorly. The trade-off for the simplicity
    of this application, then, is in its performance. `JDBC` is easy to use, but we
    very quickly find out it does not scale, both in terms of application complexity
    and performance.


    There are no clustering concerns for this application. Multiple systems can use
    `JDBC` directly with little to no consideration from the developer other than
    handling exceptions on commit.


    Also, Terracotta won’t really be of help in this baseline application (although,
    of course, the objects could be cached directly using any of the `POJO` techniques
    already discussed in other chapters of this book). This application is designed
    to use the database for high availability and scalability, but a scalable highly
    available database instance can cost millions of dollars per year to run—so we
    need to look toward a better solution.


    ## Add Hibernate to Save Three DB Calls


    As shown in Figure 6-3, simply adding Hibernate reduces the overall number of
    database operations, because instead of making a database operation for each update,
    Hibernate stores those updates in the first-level cache and pushes them all in
    a single *unit of work* when the transaction commits. This savings takes our previous
    example down from nine operations to six.


    **Figure 6-3.** *The Hibernate application makes only six SQL calls.*


    Adding Hibernate to our previously trivial `JDBC` application eliminates the interim
    updates to the database before each commit operation. Notice in Figure 6-3 that
    the updates in the application go only to Hibernate without passing through to
    the underlying database.


    Hibernate’s ability to skip updating the database until the developer calls `commit()`
    helps make the application run faster. This performance advantage comes in addition
    to the fact that Hibernate can abstract most of the database interface from your
    code base.


    While straight `JDBC` is the more easily understood implementation, many would
    argue that Hibernate simultaneously makes the application perform better and makes
    it easier to maintain, due to the fact that it eliminates redundant SQL calls
    to the database and eliminates the need to write custom SQL code. There is also
    nothing about this architecture that makes it harder to cluster than its `JDBC`-based
    counterpart.


    Interestingly enough, the fictitious application depicted in Figures 6-2 and 6-3
    has yet to be able take advantage of Terracotta in any significant fashion. Terracotta
    is designed to give high availability and scalability to most applications, but
    this architecture, like the `JDBC` example, already implicitly uses the database
    to do so. Again, to get true availability and scalability, we must look at more
    expensive solutions to augment the basic database server such as SAN storage for
    availability and database clustering for scalability.


    ## Enable the Second-Level Cache to Save Five SQL Calls


    As shown in Figure 6-4, once you enable second-level caching, the application
    remembers the data that was queried during previous conversational requests, thus
    eliminating the redundant queries to the database and delivering a reduction in
    the overall number of operations from nine to six, and now down to four.


    **Figure 6-4.** *The second-level cache application makes only four SQL calls.*'
