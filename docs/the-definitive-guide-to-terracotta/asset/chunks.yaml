  trans: '

    使用数据库的关键原因在于，数据会被写入磁盘，并且能够以众所周知的格式进行查询和更新，同时数据库可以在不显著影响业务逻辑的情况下进行调优。不使用数据库的原因则在于，对象-关系转换会使代码复杂化，事务架构难以扩展，并且数据库会成为瓶颈。


    应用程序可以使用 Terracotta 来消除数据库瓶颈。在这种场景下，将对象保留在内存中，并通过 Terracotta 将它们集群化。由于 Terracotta
    是独立于任何应用程序进程的基础设施，内存中的对象不一定会丢失（请记住，Terracotta 会将对象存储在磁盘上，因此对象不会丢失）。因此，在使用 Terracotta
    时，数据库的角色被很好地限定；它主要用于业务数据的查询和报表。它较少被用作磁盘上对象的中央存储库，也较少被用作同步即可满足需求的事务控制点。


    **会话复制**


    会话复制长期以来一直是应用服务器或容器的特性。Apache Tomcat、BEA WebLogic、JBoss Application Server、IBM
    Websphere (CE)、Webtide 的 Jetty 以及 Sun GlassFish 都在其容器中捆绑了会话复制解决方案。但与这些框架相比，用于跨进程共享对象的透明基础设施可以提供独特的价值。


    Terracotta 的透明性意味着与以往所有的会话复制方法相比，它带来了全新且不同的东西。具体来说，会话复制通常会将一些编程规则通过容器推回给应用程序开发者。Web
    应用程序开发者都知道，所有会话属性都必须实现 `java.io.Serializable`。开发者也知道这些属性必须很小。并且域对象不应被会话属性引用，否则你可能会序列化过多内容或序列化危险数据。最后，任何通过
    `getAttribute()` 访问的属性，之后都必须通过调用 `setAttribute()` 放回会话中。


    这些关于使用会话复制的规则以及其他规则，实际上是容器在会话中共享对象时使用会话序列化和复制的直接结果。


    如果我们追踪会话，会发现当容器收到一个 Web 请求时，会话是从一个内部的 `HashMap` 中检索出来的。当容器将会话对象交给 Servlet 代码时，该会话被标记为“干净”状态。只有当我们在会话内部更改对象时调用了
    `setAttribute()`，会话才会被序列化并通过网络发送到应用程序的其他实例。


    跨 Java 进程的透明对象共享则不同。透明对象共享意味着，如果我们（应用程序开发者）能够共享会话 `HashMap` 以及该映射中的所有会话和属性，那么我们就无需向容器发出我们更改了什么以及何时更改的信号。当我们更改属性时，不再需要调用
    `setAttribute()`。我们也不必确保对象实现了 `Serializable` 接口，也无需担心它们的大小。在某些情况下，对域对象和单例对象的引用甚至被证明是可以接受的。


    **工作负载分区**


    工作负载分区目前以更流行的名称被提及，例如 MapReduce、数据网格和计算网格。其核心理念是分而治之。使用 Terracotta，可以通过使用 Java
    数据结构进行消息传递并结合线程协调，或者使用 JMS 或套接字通信（而非线程）进行协调并将共享数据结构用于不同目的，来实现分而治之的架构。


    现在先不深入细节，图 1-5 展示了分区的强大之处。


    本质上，应用程序可以分散计算工作负载，例如查询、更新大量数据或类似的用例，而无需消息队列、数据库或其他基础设施服务。一个 Java 应用程序和一些多线程逻辑就足够了。


    **图 1-5.** *仅使用内存、线程和 Terracotta 将工作负载分发到多台计算机（详见第 10 章和第 11 章）*


    **总结**


    Terracotta 是一个具有面向对象开发模型的透明集群服务。


    “透明”指的是纯 Java 语言和 JVM 内存接口，没有显式的编程模型要求，例如要求使用 Spring 或 Hibernate。“集群”指的是允许多台机器和
    Java 进程协同处理相同数据，并使用纯对象和线程逻辑相互发送信号的能力。而“服务”指的是这项技术的基础设施性质。审视分布式缓存 API 有助于更精确地定义这一点。


    分布式缓存并非透明的集群服务。这些库的设计目的是在通过 `get()` 和 `put()` 调用更新缓存时，在网络服务器之间推送字节。注意以下关于它们的细节非常重要：


    *   **透明性**：分布式缓存无法做到透明。它们要求开发者调用 `get()`，这会在调用 API 时将数据从缓存复制到对象中。分布式缓存还要求开发者在对象更改后调用
    `put()`；这会将数据复制回缓存。`get()` 和 `put()` 意味着应用程序代码和对象模型无法支持某些事情。我们源代码中的方法不能在 `get()`
    调用之间持有对象的引用，因为我们无法从缓存中获取自上次线程调用 `put()` 以来的最新数据。并且对象模型不能包含丰富的域，其中对象（例如本章前面提到的
    User 及其 Address 和 Friends）实际上可以是 Java 引用。如果我们的域模型由常规引用组成，那么整个对象图将在 `put()` 时被序列化，这意味着我们在
    `get()` 时得到的对象将与最初创建的对象不同。


    *   **集群**：分布式缓存为 Java 开发者提供了一种集群形式。它们并没有像我们之前定义“服务”那样，将集群作为一种服务来提供，因为它们不透明。一个应用程序不能为单机编写，然后就在生产环境中跨一组机器运行。此外，由于大多数集群缓存库即使在单台机器上的线程之间共享对象时也必须在运行时存在，因此如果不以某种程度重写应用程序，就无法将其从应用程序中移除。


    *   **简单性**：分布式缓存的相对复杂性相当高，这不仅是因为它们强制更改应用程序源代码，还因为它们要求更改生产操作流程。这是因为，为了扩展，分布式缓存要求我们将所有对象保存在分布在多个
    JVM 中的内存里。例如，如果我们想管理一个 100 GB 的数据集，而我们的 JVM 是 32 位的，那么我们将至少需要 50 个 JVM（每个 JVM
    有 2 GB 堆内存）来存储整个数据集。如果我们希望这些数据是高可用的，我们需要在每个 JVM 中存储每个对象，这意味着我们至少需要 100 个 JVM。仅仅管理
    100 GB 的数据就需要 100 个 JVM，而这个例子还没有考虑应用程序的实际目的和业务工作负载，这些无疑会驱动使用更多的服务器。

