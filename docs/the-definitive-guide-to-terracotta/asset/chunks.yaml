  trans: '

    •   **可扩展性**：分布式缓存历来比仅使用数据库进行集群的应用具有更好的扩展性，其方式是将对象置于风险之中（回顾图 1-4，我们在可扩展性和可用性之间进行权衡），并将对象数据仅保存在内存中。让
    JVM 仅将对象保存在内存中意味着我们无法消除数据库，因为一旦断电，数据就会丢失。因此，我们最终陷入了一个混合世界：集群加数据库，以及随之而来的可扩展性问题，这又回到了原点。


    根据我们的定义，分布式缓存并非透明的集群服务。现在请考虑，分布式缓存是丰富的网络库，开发者无需看到网络栈和 API（例如套接字）。由于这些缓存隐藏了网络传输，与
    TCP 或 UDP 相比，分布式缓存是一种更高级的网络形式。这种更高级的形式很有价值，但它既不是透明的，也不是集群服务。


    本章将 Terracotta 定义为一种透明的集群服务，这是一个新概念，值得进一步详细探讨：在第 2 章中，你将了解这一概念的历史，而在第 3 章中，我们将深入探讨第一个示例——HelloClusteredWorld。


    986-1 CH01.qxd 5/30/08 8:58 PM 第 22 页


    986-1 CH02.qxd 4/28/08 9:54 AM 第 23 页


    第 2 章


    Terracotta 的历史


    **L**inux、Java 和互联网这三大力量从根本上改变了应用架构，而 Java 社区仍在努力追赶这些变化带来的影响。


    过去典型的业务应用很少跨服务器部署；这种情况已经改变。


    数据库过去处理的远不止网络化的 SQL 工作负载；它们以存储过程或类似的嵌入式执行技术的形式，承载了我们很大一部分业务逻辑。如今，它们主要处理对象关系映射（ORM）查询。Linux
    和互联网将我们引向了一条与 Oracle 可能偏好的道路截然不同的路径。


    随着互联网的出现，引入了 n 层架构（见图 2-1）。在最简单的形式下，企业应用可以被视为两层或三层架构。第三层源于 Web 服务器的概念，它最初用于从 Apache
    等厂商生产的 HTTP 服务器提供静态 HTML 服务。最终，这演变为一种正式的架构范式，涉及通过浏览器界面在互联网上向用户呈现内容——因此，我们将第三层称为表示层。


    **图 2-1.** *n 层架构*


    **23**


    986-1 CH02.qxd 4/28/08 9:54 AM 第 24 页


    **24**


    第 2 章 ■ Terracotta 的历史


    表示层很快从呈现静态 HTML 转变为作为应用层的一部分，提供动态应用开发平台。出于多种原因，其中最重要的是 Web 浏览器的普及，三层架构开始从互联网扩展到企业应用。


    对于企业而言，应用层带来了一个新问题。在运维层面，现在有大量请求通过网络（包括互联网、内联网和外联网）涌入应用层，但应用层的扩展性并不好。数据库是一个严重的瓶颈。此外，应用服务器的稳定性和可用性也成问题。


    对于任何给定的设计，数据库和应用层的容量都是有限的，而进入应用的入站流量可能是无限的。单个用户或用例随时可能耗尽应用节点或数据库。事实证明，数据层和应用层的部署和管理成本高昂，因为可扩展性难以预测和保障。


    架构正在向松耦合模型转变，其中应用的不同组件可以抽象在接口之后，其他组件可以忽略实现细节。而松耦合正在加速向 n 层架构的迁移，因为一个服务可以托管在与另一个服务完全不同的服务器上，而不会使编程模型复杂化。


    在第 1 章中，我们讨论了文件和文件 I/O 的概念，并将其与文件所在的文件服务器的概念区分开来。其价值在于无需更改应用即可在运维层面扩展服务的能力。这种灵活性的代价是，许多性能瓶颈在较小规模和非生产配置下不会显现，因此只有在生产环境中才会被发现，这使得容量规划极具挑战性。


    除了松耦合应用架构固有的容量规划挑战外，控制持续的开发成本通常是首要任务，许多人选择 Java 是因为其灵活性和同时具备的简单性。早期的 Java 虚拟机（JVM）如果不经过非常仔细的调优，就无法充分利用整个
    CPU。通常的做法是每个 CPU 运行两个 JVM，每个节点两个 CPU，即每个节点运行四个 JVM。主流应用服务器厂商本身也选择了 Java。基于 Java
    的应用服务器过去和现在都对工作负载非常敏感。所有 JVM 都带来了对内存的渴求，而获取大量内存最廉价的方式是部署内存为 500MB 到 2GB 的小型机器，而不是购买拥有大量内存和
    CPU 的昂贵并行处理机器。首选的部署模型是许多人所说的跨多台小型机器横向扩展应用，而不是在一台大型多处理器服务器内部纵向扩展应用。


    因此，当互联网驱使我们进行横向扩展时，横向扩展本身也同时被强加于我们，因为我们现在脑子里想的是多个 JVM。在多个节点上运行多个 JVM 对 IT 部门来说并非一个难以跨越的进步。Perl
    脚本等工具有助于管理这种蔓延，而管理这种蔓延是让运维团队不拒绝横向扩展模型的最重要能力。


    最后一股力量巩固了多台服务器上运行多个 JVM 的模型。这股力量就是 Linux。没有 Linux 及其相关的开源方法，昂贵操作系统的许可费和支持费将迫使我们寻找在更少服务器上扩展应用的方法；否则，随着我们在整个企业内购买越来越多的节点，我们的
    IT 预算将不堪重负。


    986-1 CH02.qxd 4/28/08 9:54 AM 第 25 页


    第 2 章 ■ Terracotta 的历史


    **25**


    因此，大多数架构师最终选择了横向扩展，而不是纵向扩展。当时，横向扩展还是纵向扩展对 Oracle 等数据库厂商来说都无关紧要，因为数据库处理着除最大型互联网网站之外的所有工作负载。很少有人预见到数据库瓶颈即将到来。相反，开发者正忙于选择构建应用的最简单路径。在
    Java 2 标准版（J2SE）世界中，Tomcat 和 Struts 盛行，它们使用存储在数据库中的无状态数据访问对象。在 Java 2 企业版（J2EE）世界中，EJB
    盛行，容器帮助开发者将对象存储在数据库中。在新的三层架构负载下，数据库这层外衣注定要破裂。如果数据库是不可移动的物体，那么扩展性就是与之对抗的不可阻挡的力量。一场关于如何扩展的拉锯战就此展开。

