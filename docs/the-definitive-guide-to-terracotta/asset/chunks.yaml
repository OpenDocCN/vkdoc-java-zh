    turning this example into a distributed cache a simple exercise. Because Terracotta
    is transparent (to the application), the code itself does not need to be modified.
    Instead, we create a Terracotta configuration file that specifies how the objects
    in this application should be clustered and locked. Then, when the application
    is run, the data can be accessed in every node of the cluster with no additional
    changes. Updates to the data on one node are automatically (and safely) made available
    on every node.


