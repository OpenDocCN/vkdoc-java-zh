- fmt: '`<locks>`部分`tc-config.xml`描述了哪些方法应对 Terracotta 锁定敏感。在此例中，需要配置两个方法：`run()`方法和构造函数（指定为`__INIT__`）。在这些方法中，对共享对象的所有锁操作（`synchronized()`、`wait()`和`notify()`）都会被增强，除了在该对象本地堆上发生的锁操作外，还会包含在
    Terracotta 服务器上对该对象的等效锁操作。对未存储在 Terracotta 中的对象的锁操作，不会受到集群范围的 Terracotta 锁增强的影响。同样，所有未在`<locks>`部分指定的方法中的锁操作也是如此。


    如果你在 Terracotta 中运行此示例，第一次执行会将`nodesJoined`计数器从零递增到一，并进入`run()`方法中的`while`循环，因为`nodesJoined`的值小于默认的参与者数量（二）。进入`while`循环后，程序的第一个实例将请求并获取共享`Configuration`对象上的集群锁，并在该对象上等待，从而暂停第一个执行实例中主线程的执行。


    当你运行第二个执行实例时，其主线程在执行`WaitNotify`的构造函数时，会将共享的`nodesJoined`整数从一递增到二，然后在共享的`Configuration`对象上调用`notifyAll()`。此方法调用将导致第一个执行实例中的主线程尝试获取共享`Configuration`对象上的锁。当第一个执行实例的主线程获得该锁时，该实例将恢复执行并重新测试`while`子句。此时，由于第二个执行实例已将`nodesJoined`整数值递增到预期的值（二），第一个执行实例将退出`while`循环，打印所有参与节点已加入的消息，然后退出。


    随后，第二个执行实例的主线程将进入`run()`方法，并在测试`while`循环的条件时，发现`nodesJoined`的值已经达到预期值。因此，第二个执行实例将绕过`while`循环，继续打印所有参与节点已加入的消息，然后也会退出。


    如本例所示，通过使用内置的并发原语`synchronized()`、`wait()`和`notify()`，Terracotta 允许你编写简单的 Java
    代码，这些代码可用于协调同一 JVM 或不同 JVM 中线程的活动。


