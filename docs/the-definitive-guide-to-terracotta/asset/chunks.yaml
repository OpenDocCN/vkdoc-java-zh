    will fill the buffer together in half the elapsed time, because each will put
    exactly one half of the total characters into the buffer.


    The way all this works in Terracotta is to point at the class in which objects
    reside. Terracotta will take care of constructing shared objects and synchronizing
    the various JVMs where objects reside. The question now is which objects to share
    and how to share them?


    In the case of HelloClusteredWorld, the ability to share buffer across Java process
    boundaries enables the two while loops running in each of the JVMs to work together
    on one instance of buffer. The loopCounter variable is the loop’s index into the
    message, driving which character to copy into the buffer. Without sharing the
    loopCounter instance across JVMs, the two JVMs would not copy the appropriate
    characters. A few counter examples will help make this clear.


    986-1 CH03.qxd 5/5/08 9:13 AM Page 44


    **44**


    C H A P T E R 3 ■ J U M P I N G I N TO T E R R A C OT TA


    If the application did not share the buffer object across Java processes, the
    application would have to change. As written, the application copies only one
    character into the buffer.


    Assume the application were not sharing objects and the loopCounter was instead
    changed to increment by two instead of by one so that each of the two JVMs working
    together would not copy data redundantly to the buffer. Further, assume that in
    one JVM, the loopCounter starts at zero, while the other starts at one.


    Two processes each doing only half the work in this manner would have corrupted
    the buffer after just two iterations of the while loop. Table 3-1 contains a listing
    of the state of the object named buffer in both JVMs at the end of each iteration
    through the while loop in main().


    **Table 3-1.** *State of Memory at Key while Loop Iterations*


    **Iteration**


    **JVM One Buffer State**


    **JVM Two Buffer State**


    Initial state


    null


    null


    "H"


    "<empty character>e"


    "H<empty char>l"


    "<empty char>e<empty char>l"


    "H<empty char>l<empty char>o"


    "<empty char>e<empty char>l<empty


    char><space>"


    Table 3-1 illustrates the problem with unshared buffer objects. We would have
    to edit the application to copy not just one character but all the characters
    from the message up to the loopCounter point. So it makes sense to share the buffer
    object.


    Using loopCounter as an index into the message without sharing it would not work
    without making some changes to the application. We already discussed how it is
    possible to hard-code our application to increment the loopCounter by two instead
    of one, starting with an initial value of zero and one for each respective JVM.
    But what if we want three JVMs to work together on building buffers? We would
    have to edit the application so that each JVM


    incremented the loopCounter by three. It makes sense to share loopCounter as well
    as buffer.


    By considering which objects need to be shared, we can conclude that the field
    names we want to cluster are HelloClusteredWorld.buffer and HelloClusteredWorld.loopCounter.
    With Terracotta, we can achieve this without altering the program. We write a
    Terracotta configuration file (more on that later) and tell it to share the buffer
    and the loopCounter, and we are almost done. A snippet of the configuration file
    follows:


    <field-name>HelloClusteredWorld.buffer</field-name>


    <field-name>HelloClusteredWorld.loopCounter</field-name>


