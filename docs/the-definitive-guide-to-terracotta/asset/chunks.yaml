    tests is different. This will directly lead to different performance characteristics.
    We will validate this assertion by examining the transaction throughput for two
    JVMs pounding on the same product versus on different products in the same map
    and on different maps (inventory versus inventory2 when running with separate
    roots).


    Lock Acquisition


    Now let’s consider the cost of acquiring a lock. Acquiring a lock over the network
    can be expensive for two reasons. The first problem is that JVMs can lock and
    unlock much faster if they do not have to traverse the network to L2 to request
    the lock in the first place. The second problem is that Java locking is exclusive,
    meaning only one thread at a time is allowed inside a lock.


    Throughout this book, we have mentioned the greedy lock optimization. We can confirm
    this optimization is present simply by viewing the locking statistics recorded
    during the various pounder test runs. Consider running the pounder again on just
    one JVM. In such a modified test, the JVM would keep all locks local to itself
    and will not make any lock requests to L2\. So such a modification should produce
    a significant increase in transactions per second or a corresponding decrease
    in elapsed time to complete the scenario.


    In the tests you ran, poundRandomProducts() randomly updated objects and exhibits
    less greediness than a test where the same product, 1GFR, is updated in a loop.
    In the second scenario, the Terracotta server will grant the lock greedily, and
