- fmt: "将以下内容添加到*所有*类加载器的类路径中，使其对类可用，无论类加载器上下文如何。\n\n`registerModuleSpec(BundleContext\
    \ context)`\n\n此抽象方法旨在由需要注册可动态生成类适配器的自定义服务的捆绑包激活器重写。\n\n要用您自己的版本替换库类，您可以按照清单9-7所示实现您的捆绑包激活器类。\n\
    \n**清单9-7.** *使用TIMs用您自己的实现替换类*\n```java\npackage org.myfavoriteframework;\n\n\
    import org.osgi.framework.Bundle;\nimport org.osgi.framework.BundleContext;\n\
    import org.terracotta.modules.configuration.TerracottaConfiguratorModule;\n\n\
    public class MyConfiguratorModule extends TerracottaConfiguratorModule {\n\n \
    \   protected void addInstrumentation(BundleContext context) {\n        super.addInstrumentation(context);\n\
    \        Bundle bundle = getExportedBundle(\n            context,\n          \
    \  \"org.myfavoriteframework.tim-myfavoriteframework\");\n        addClassReplacement(bundle,\
    \ \"org.myfavoriteframework.Impl\",\n            \"org.myfavoriteframework.ClusteredImpl\"\
    );\n    }\n}\n```\n此示例重写了捆绑包激活器中的`addInstrumentation()`方法。首先，它调用`super.addInstrumentation()`来添加任何标准检测（目前没有）。接下来，您使用`getExportedBundle()`方法获取您自己的捆绑包实例，最后，您将原始的`org.myfavoriteframework.Impl`替换为替代实现。\n\
    \n进行类修改的方法不止一种，但最简单的方法是为特定类添加一个自定义类适配器。例如，您可以在`addInstrumentation()`方法中添加清单9-8中的行，以便为特定类安装一个类适配器。\n\
    \n**清单9-8.** *添加您自己的类适配器*\n```java\nClassAdapterFactory adapterFactory = new ImplAdapterFactory();\n\
    configHelper.addCustomAdapter(\"org.myfavoriteframework.Impl\", adapterFactory);\n\
    ```\n这里的关键当然是，如何创建一个`com.tc.object.bytecode.ClassAdapterFactory`。\n\n这个类来自ASM，即字节码操作框架。ASM的工作原理是通过一个访问者读取类文件，将它们泵送通过您的自定义访问者，然后通过另一个访问者将它们写回。`ClassAdapterFactory`只有一个方法，它知道如何创建一个`ClassAdapter`，这个`ClassAdapter`是当类在JVM中加载时ASM将使用的访问者。\n\
    \n通常的做法是创建一个实现`ClassAdapterFactory`的类，以返回它自身的一个实例，该实例也应该扩展`ClassAdapter`。编写类适配器超出了本书的范围，有关更多信息，您应该查看位于[http://asm.objectweb.org](http://asm.objectweb.org)的ASM文档，或者查看TIM源代码中的这些类示例。请查看Terracotta\
    \ Forge中的Ehcache TIM或Lucene TIM，两者都使用了ASM并创建了自定义访问者。可能性实际上是无限的——类适配器可以添加、删除和修改字段、方法、方法内的字节码、访问修饰符等等。\n\
    \n## 使用Maven创建带有代码的TIMs\n\n之前关于使用贡献代码创建TIMs的文档，重点介绍了如何通过修改清单以指定捆绑包激活器，并使用编译后的代码重建JAR。\n\
