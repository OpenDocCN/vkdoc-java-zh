    **高可用性**


    现在我们已经启动并运行了一个集群，让我们看看当我们开始关闭并重启集群的某些部分时会发生什么。首先，让我们尝试在两个客户端运行时杀死服务器。你可以通过使服务器进程退出来实现这一点（例如，如果你从
    Unix 风格命令行启动它，你可以在运行服务器的终端中按 Ctrl+C）。


    当 Terracotta 服务器进程退出时，你应该会看到客户端停止。发生这种情况是因为处于 `while` 循环中的线程请求了一个集群锁，但服务器无法接收该锁请求，因为它没有运行。你在标准输出中看不到（但可以在客户端日志中看到）的是，客户端正在不断尝试重新连接到
    Terracotta 服务器，但由于服务器仍未运行而被拒绝。


    如果我们配置了冗余的 Terracotta 服务器，杀死活动服务器将导致其中一个被动备用服务器自动接管成为主活动服务器。为简单起见，我们只配置了一个服务器，但我们可以通过像上次一样重新启动服务器来模拟这种故障转移行为。一旦新的服务器实例启动，客户端将自动重新连接并从中断处继续。


    **堆持久性**


    接下来，尝试杀死所有 `HelloClusteredWorld` 实例。如果没有 Terracotta，下次启动程序时，它将从头开始。但是，使用 Terracotta，当你杀死所有
    `HelloClusteredWorld` 实例并启动一个新实例时，应用程序不会从头开始，而是会从*上次中断的地方*开始，状态为 `loopCounter`
    和 `buffer` 在你杀死最后一个 `HelloClusteredWorld` 实例时的状态*。*这是因为集群堆的状态，以及因此 `loopCounter`
    和 `buffer` 的状态，在 JVM 调用之间得以保持。


