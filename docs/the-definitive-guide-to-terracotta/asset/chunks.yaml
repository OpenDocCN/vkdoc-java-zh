    由于变更被捕获在字段级别，因此无需传输整个对象图——只需传输特定的变更值。仅避免序列化这一项，就比许多其他集群数据解决方案（几乎所有方案都依赖某种形式的 Java
    序列化）带来了显著的性能提升。这种性能提升源于 CPU 和堆内存无需为序列化对象数据分配和释放字节数组。


    986-1 CH05.qxd 5/31/08 8:56 AM 第 123 页


    第 5 章 n 缓存


    **123**


    此外，只需将更新发送到 Terracotta 服务器，而非广播到集群中的每个节点，这也带来了显著的性能提升。最大的性能优势在于 Terracotta 服务器会计算每个
    JVM 所需的补丁更新，并为每个 JVM 的内存提供定制的更新负载。然后 JVM 会自行修补其内存。


    Terracotta 会根据使用情况自动动态地将对象换入和换出内存，因此它是分区策略中的完美搭档。如果您的缓存分布在集群中，并且对数据的访问是分区的，那么每个节点将处理特定的数据子集。例如，每个节点可以根据用户名的首字母来处理用户。Terracotta
    自然只会将每个节点上该分区所需的必要数据换入 JVM。因此，每个节点只需在内存中保留与其正在使用的数据完美匹配的那部分数据。这种策略可用于实现高性能和可扩展性。


    然而，Terracotta 也解决了跨硬件节点扩展应用时的高可用性问题，因为每个节点在必要时都可以访问所有分布式缓存。如果某个特定节点宕机，负载均衡器将新流量引导至另一个节点，该节点除了其原始分区外，还可以为另一个分区换入对象。


    所有这一切都是 Terracotta 透明共享虚拟堆的自动结果，无需应用程序发出任何显式命令。有关如何使用 Terracotta 检测 JVM 故障并自动重启
    JVM 的讨论，请参见第 11 章。服务器会利用称为集群成员事件的功能，向集群成员发送关于节点加入和离开的 JMX 事件。


    **使用 Ehcache 进行缓存**


    在前面的章节中，我们了解了如何使用标准 Java 集合 API 通过 Terracotta 构建共享数据结构。使用共享 Map 很简单，可以满足保存和检索缓存值的需求，但无法处理缓存中元素的驱逐和过期问题。围绕
    Map 构建自定义解决方案当然是可行的，但对于许多用途而言，您会发现使用一个开箱即用就支持驱逐和过期的缓存框架会更简单。


    市场上有许多开源缓存框架，Terracotta 与其中几个最流行的框架进行了集成。在本节中，我们将了解 Terracotta 与 Ehcache 的集成，Ehcache
    是一个优秀且流行的缓存解决方案。Ehcache 提供了丰富的缓存功能，包括可插拔的过期和驱逐策略、持久化存储、向您自己的方法传递变更事件，甚至支持分布式缓存。您可以在其网站
    [`ehcache.sourceforge.net`](http://ehcache.sourceforge.net) 上找到有关 Ehcache 的更多信息。


    **重写缓存示例**


    为了开始使用 Ehcache，我们将重写清单 5-1 中的简单示例。只需进行少量更改。


    在清单 5-7 中，我们必须导入 Ehcache 类并声明一个 CacheManager。每个 CacheManager 都有自己的配置，可以通过多种方式获取。对于此示例，我们将使用在类路径中查找
    ehcache.xml 文件的默认方法。有关 Ehcache API 的更多信息，请参阅其网站上的 Ehcache 文档。

