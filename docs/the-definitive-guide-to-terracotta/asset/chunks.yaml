    权威指南


    **为 Spring、Hibernate 和 POJO 的可扩展性而集群 JVM™** 亲爱的读者，


    开发、维护和运营可扩展且可靠的 Java™ 应用程序是困难的。Terracotta 通过将分布式计算服务作为 JVM™ 的一部分来交付，从而缓解了这一挑战。借助
    Terracotta，企业应用程序可以使用简单的 Java 结构编写，使开发人员能够专注于业务功能。


    Terracotta 赋予 JVM 的新能力减轻了数据库提供应用程序可用性的负担，并显著降低了基础设施成本。这种能力也有利于运维，因为分布式应用程序可以作为单个逻辑单元进行管理，极大地简化了管理企业应用程序的任务。


    我们 Terracotta 团队编写本书，旨在传递我们在从电信到金融服务等大量场景中部署和支持 Terracotta 所获得的独特见解和经验。我们将带您了解
    Terracotta 的“是什么、在哪里、何时以及为什么”，为您提供集群应用程序（无论大小）所需的技能。


    本书包含多个实用的真实案例研究，将帮助您构建高度可扩展的企业级 Java 应用程序。我们将向您展示如何对从 POJO 应用程序到 Web 应用程序，再到 Hibernate
    和 Spring 应用程序的一切进行集群。我们的最后一个案例研究涵盖了使用 Terracotta 的网格计算，展示了 Terracotta 可以为分布式计算带来的强大功能和优雅性。


    这种广泛的覆盖范围使您能够将所学知识应用于各种场景下的自有项目。阅读 Terracotta 团队的集体思想将使您掌握交付可扩展、可靠的企业应用程序的专业知识。


    此致，


    Terracotta, Inc.


    *展示如何扩展您关键的 Java™*


    *应用程序以获得最佳性能*


    配套电子书


