    Storing the Detached Instances


    To use detached instances in your application, you must store them somewhere and
    retrieve them when your application needs them. How you do this is up to you and
    depends on the requirements of your application, but application developers typically
    employ one of three common strategies.


    **Store the Detached Instances in the HTTP Session Context**


    If you are working in a web application and have access to the HTTP session context,
    and the Hibernate objects you are storing pertain to the current user, you might
    opt to store the POJOs (detached instances) in the HTTP session context.


    To store the detached instances in the HTTP session context, simply use the setAttrribute()
    method in the HTTP session, just as you would with any other object you would
    like to be cached in the session:


    //~ retrieve the foo object


    session.beginTransaction();


    Object foo = { Hibernate HQL }


    session.getTransaction().commit();


    //~ store in the session


    request.setAttribute("fooObject", foo);


    **Store the Detached Objects in a HashMap**


    In other contexts, where you do not have access to an HTTP session context or
    you have data that pertains to more than one user, storing the detached instances
    in the HTTP session context may not make sense. Another option is to store them
    in a HashMap.


    To store the detached objects in a HashMap, simply use the get() and put() methods
    of the HashMap, as shown in the following code snippet. The most appropriate key
    might be the primary key used to fetch the row from a table in the database. To
    ensure that the objects are available in the Terracotta cluster, this HashMap
    must be marked as a clustered object using the techniques outlined in Chapter
    4 (it must be a part of a clustered graph of objects or marked as a Terracotta
    root).


    //~ retrieve the foo object


    session.beginTransaction();


    Object foo = { Hibernate HQL }


    session.getTransaction().commit();


    //~ store in the map


    myClusteredeMap.put("fooObject", foo);


    **Store the Detached Objects in a Clustered Cache**


    Storing the detached instances in a clustered cache may work better than a HashMap
    for your application. A clustered cache implementation often has more features,
    such expiry times for items, and is a good choice when more sophisticated features
    are needed than the Map interface has to offer.


