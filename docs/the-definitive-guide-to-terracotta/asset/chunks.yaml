    ## About Terracotta, Inc.


    Founded in 2003, **TERRACOTTA, INC**., is a private firm headquartered in San
    Francisco, California.


    Terracotta delivers runtime plug-in capacity and availability for Java applications.
    Terracotta products simplify development, testing, deployment, and management
    of enterprise Java applications by adding clustering and distributed computing
    services to the JVM, allowing application development to focus on business features.
    Terracotta customers include leaders in a number of industries such as the packaged
    software development, financial services, telecommunications, travel, and online
    entertainment sectors.


    ## About the Authors


    **ARI ZILKA** is the CTO of Terracotta, Inc. Ari spends most of his time on the
    product roadmap and customer use cases, as well as speaking at conferences. Ari
    has worked as an architecture lead for several large-scale systems, most notably
    as the chief architect at Walmart.com.


    **GEERT BEVIN** is a senior developer at Terracotta, Inc. Geert spends most of
    his time developing and optimizing the JVM internal hooks and libraries that make
    Terracotta transparent, as well as being an invited speaker at the largest developer
    conferences worldwide. Geert has worked as creator and contributor on several
    popular open source development projects such as RIFE, OpenLaszlo, and Gentoo
    Linux in addition to consulting with very large companies on implementing and
    improving their Java-based web applications. His work on providing continuations
    natively to Java contributed to him being elected as an official Sun Java Champion.


    **JONAS BONÉR** is a senior developer at Terracotta, Inc. Jonas spends most of
    his time developing large-scale financial systems and integrating Terracotta with
    various products and tools, as well as lecturing and speaking at developer conferences
    worldwide. He has worked on the Terracotta core and the JRockit JVM at BEA and
    is an active contributor to the open source community; most notably, he created
    the AspectWerkz aspect-oriented programming framework and has been part of the
    Eclipse AspectJ team.


    **TAYLOR GAUTIER** is a product manager at Terracotta, Inc. Taylor spends most
    of his time designing and using Terracotta’s products. He is a converted, yet
    still devout, developer who has helped write parts of systems-level servers and
    technology at companies like Scale8 and Reactivity.


    **ORION LETIZI** is a cofounding engineer at Terracotta, Inc. Orion spends most
    of his time designing and documenting clear use cases and guides for using Terracotta.
    He, of course, helped write the first two versions of the product but has since
    transitioned to helping others maximize their use of the technology. Orion has
    worked as a lead at several of the most popular e-commerce web sites and content
    portals on the Internet including Walmart.com.


    **ALEX MILLER** is a technical lead at Terracotta, Inc. Alex leads and manages
    the transparency team at Terracotta. His focus is on transparently integrating
    cluster support into a user’s application, the JDK, and third-party libraries.
    The transparency and server teams work together to optimize scaling and minimize
    the costs of clustered applications. Alex previously served as Chief Architect
    at MetaMatrix and worked on enterprise products at BEA. Alex speaks at conferences
    and blogs at `http://tech.puredanger.com`.


