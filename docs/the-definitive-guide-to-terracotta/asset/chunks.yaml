    Terracotta。


    **使用 Terracotta 集群化我们的主/从架构**


    要使用 Terracotta 对我们当前的 WorkManager 实现进行集群化，我们只需创建一个 Terracotta 配置文件，在其中定义三样东西：根（roots）、包含项（includes）和锁（locks）。


    我们先从根开始。首先，我们必须定义要在集群中共享的状态。在我们的例子中，我们要共享工作队列，即 SimpleQueue 实例中的 LinkedBlockingQueue
    实例。现在，将其添加为根：


