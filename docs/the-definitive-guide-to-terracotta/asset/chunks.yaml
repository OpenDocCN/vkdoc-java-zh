    **Building a Distributed Web Spider**


    In the previous section, we discussed how we can implement a framework based on
    Terracotta, the Master/Worker pattern, and the CommonJ Work Manager specification,
    which is suitable for managing very large workloads in a scalable and efficient
    manner. What we didn’t cover in much detail is how to use our framework (and similar
    techniques) to solve real-world problems. Therefore, we will now show you how
    you can make use of Terracotta and our master/worker container by implementing
    distributed Web search (á la Google). We will do that by developing a distributed
    web spider that can crawl the Internet and index the pages it finds using the
    Lucene search framework. Here is the basic algorithm defining the workflow: **1.**
    Fetch the page from a starting URL.


    **2.** Parse the page, and collect all outgoing URLs.


    **3.** Index the page.


    **4.** For each outgoing URL, go to step 1.


    This is a classic recursive algorithm working on a tree structure. No work task
    shares state with any other task, which means that they are all embarrassingly
    parallel (i.e., the data is by nature perfectly partitioned). This algorithm is
    very well suited for a divide-and-conquer


