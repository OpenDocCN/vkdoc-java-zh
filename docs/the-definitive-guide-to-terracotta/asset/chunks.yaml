    然而，在本示例中，我们希望观察 Terracotta 持久堆的实际运行效果，因此需要将 Terracotta 服务器配置为持久模式，以便能够安全地停止和重启，而无需重置集群堆状态。为此，我们必须将
    `/tc:tc-config/servers/server/dso/persistence/mode` 的值设置为 `permanent-store`，方法是在现有的
    `/tc:tc-config/servers/server` 段落中添加以下 XML 片段：


    <dso>


    <persistence>


    <mode>permanent-store</mode>


    </persistence>


    </dso>


    配置 Terracotta 客户端


    现在服务器已配置完毕，接下来我们进行 Terracotta 客户端的配置。


    客户端配置包含客户端部分和应用程序部分。客户端部分描述了 Terracotta 客户端库的一般行为。


    模板配置中已有一个 `clients` 段落，与 `server` 段落类似，它指定了 Terracotta 客户端日志的写入位置。但与 Terracotta
    服务器段落不同的是，`clients` 段落不包含针对特定 Terracotta 客户端的配置。集群配置对于在集群生命周期内可能加入集群的 Terracotta
    客户端数量保持无关性。我们将保持现有的 `clients` 配置段落不变。


    应用程序部分描述了特定于应用程序的配置。在应用程序部分中，我们将设置集群根字段，声明哪些类符合 Terracotta 插桩条件，并声明哪些方法应被增强以支持
