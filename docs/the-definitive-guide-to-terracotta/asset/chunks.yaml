    The last parallel between files and Terracotta that we mentioned was that the
    two enable clustering through simple, straightforward sharing of data and locking
    events. Applications that write to files by locking the parts of the file they
    want to work on can safely be shared across users in real time. Without NFS or
    similar networked file sharing technology, this simple approach will not work.
    The developer would have to push data among application processes in the application
    layer using network sockets by hand far above the file system. As a result, operators
    would lose the ability to manage these clustered applications by managing only
    their storage.


    Files are a good example of a transparent clustering service. Developers write
    inside a file as they desire, while operators store that file as they desire.
    In short, transparent services, such as NFS, help developers write applications
    as they would prefer, while allowing operators the freedom to build scalable,
    highly available production environments for managed data.


    986-1 CH01.qxd 5/30/08 8:58 PM Page 6


    **6**


    C H A P T E R 1 ■ T H E O RY A N D F O U N D AT I O N


    At this point, you might be asking yourself, “What’s the difference between the
    NFS protocol and the database?” With databases, developers use SQL, whereas with
    NFS, developers use the proprietary file layout. Also, with the database, the
    instance can run on any server we want without changing the application, and the
    database can be tuned without changing the application. The database certainly
    is a service. We are not asserting that NFS and files are better than SQL and
    a database. We are merely looking for good parallels to Terracotta. In its operating
    character, a database is a good parallel. In its programming model, however, it
    is not.


    A developer knows when writing to files is necessary and does so intentionally.
    In the modern application, much of the use of the database is through an object-relational
    mapping tool like Hibernate, and thus, a developer who would rather not write
    to a database is forced to do so.


    Terracotta works more like file I/O than a database, because Terracotta presents
    itself in the manner the developer desires. Terracotta is consumed as memory inside
    the JVM. The notion of migrating memory from the local server to a service somewhere
    on the network, as can be done with files, is quite a leap of faith. Nonetheless,
    Terracotta is a new example of a transparent service.


    At its core, Terracotta’s goal is to allow several computers to communicate with
    each other as if they were one big computer through memory and pure memory constructs,
    such as threads and locks (mutex objects and the like). You might be tempted to
    think of Terracotta as functioning just like NFS, because Terracotta takes a local
    resource and moves it to the network. The similarities to NFS start an end there,
    however. Let us now explore the power in having a transparent memory location
    in more detail and learn how it is unique and important.


    **Transparency of Memory Location**


    Unlike when working with files, developers using Terracotta do not see an API.
    Recall that our definition includes the notion of JVM-level clustering. This means
    that to the application, Terracotta is the JVM, and to the JVM, Terracotta is
    the application. Figure 1-1 illustrates this concept.


    **Figure 1-1.** *Terracotta sits between the application and the JVM.*


    986-1 CH01.qxd 5/30/08 8:58 PM Page 7


    C H A P T E R 1 ■ T H E O RY A N D F O U N D AT I O N


    **7**


    Unlike file I/O, transparency of the memory location implies that Terracotta has
    to figure out what to share and move on its own. Think back to the file analogy
    and focus for a moment on the open() API call: open(<path_to_file>, mode). A developer
    decides where to write the file relative to the application’s running directory.
    A developer who wants an application to write to a file usually makes the file
    name and directory in which it resides a start-up option for the user. Suppose
    our application wants to write to a data file named application.dat in the directory
    path /path/to/my/application/data. The application merely needs to invoke open("/path/to/my/application/data/application.dat").
    An operator can then move our application’s data using NFS. To use NFS, the production
    operations team needs to mount the remote file system underneath the directory
    the application writes to when that application calls open(). In our example,
    this would look something like the following: mount //remoteserver/remotepath
    /path/to/my/application/data


    Once the remote mount is established, our application will write its data to the
    remote server.'
