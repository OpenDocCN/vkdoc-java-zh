- fmt: '# The Terracotta Process


    The Terracotta process is designed to be reliable and restartable. If it were
    killed or stopped, Terracotta could restart where it left off, and the application
    processes would not see any errors or exceptions while Terracotta restarts. The
    ability to restart is helpful for small applications and in development environments.
    For production systems, a more nonstop approach is preferable. Terracotta server
    processes can be configured to identify each other on the network and to share
    the duties of object management for an application cluster. In essence, Terracotta
    doesn’t just cluster your application but is also capable of being clustered for
    availability using built-in features in the software.


    ## Scalability


    In subsequent chapters, you will also learn how to use Terracotta to tune and
    scale applications that are spread across Java process boundaries. Tuning applications
    can be achieved on multiple levels, from limiting the scope of the clustering
    behavior purely in Terracotta configuration files to sometimes making changes
    to source code. Source code changes can result in the biggest bang for the buck
    in terms of getting more scalability from an application running on Terracotta.
    We will study in detail how to configure Terracotta, as well as how to write code
    that is best suited for the environment.


    Once an application is perfectly configured, or is at least as good as it is going
    to get, there is still more that can be done. If scaling is defined as adding
    more JVMs, and throughput is defined as how many operations per second a single
    node can handle, Terracotta can help in delivering more throughput per node as
    much as it can help in delivering better scaling to apply against the business
    need.


    To help a JVM perform, Terracotta provides built-in caching designed to allow
    applications to perform at nonclustered speeds even when clustered. To improve
    performance, an application needs to optimize its use of Terracotta’s internal
    caches. Optimizing the use of cache is a function of optimizing workload routing.
    One example of workload routing is sticky load balancing for web applications.
    In sticky load balancing, the same user session gets routed to the same JVM for
    every request. If some sort of stickiness can be applied, Terracotta will keep
    objects in memory as long as it can. Load balancing is not always as simple as
    stickiness and session replication, though. In general, developers and operators
    have to work together to consistently route a workload to the same JVM over time.


    > **Note** Several members of the Java community refer to Terracotta as a distributed
    cache. As you can see from the fact that Terracotta’s caches are internal, and
    external load balancing is required to optimize cache efficiency, Terracotta is
    not a cache. It merely uses caching technology to ensure application performance
    and scalability.


    By routing requests to the same JVM over time, we ensure that all the information
    a thread needs to process application requests is local to that JVM in memory.
    Without such assurance, our application will need Terracotta’s server process
    to move the memory into context underneath us just in time. The application will
    have to wait for the network in order to complete an operation. This is commonly
    referred to as paging. Terracotta works at a byte level and not at a page level,
    but it has adopted the paging terminology from virtual memory inside operating
    systems because the notion is the same. In most operating systems, virtual memory
    allows an application to spill 4-kilobyte pages of memory to disk. The ability
    to page out unused memory frees the application to get more work done with less
    memory. When the application needs a page back from disk, that application begins
    to perform very slowly, however.


    Here’s another way to view the performance optimization Terracotta delivers through
    its use of caching inside the application’s JVM: Terracotta will move as little
    data as possible given the changing workload it sees. This improves performance
    by allowing applications to move at the speed of memory instead of the speed of
    the network. Just like in the operating system and virtual memory, moving this
    caching feature into the transparent clustering service provides operators the
    configuration hooks to make runtime decisions about how large Terracotta’s cache
    will be.


    Terracotta can scale independently of the application above it. Much like a relational
    database, the Terracotta server’s I/O and throughput are tuned using various IT
    strategies with which operators are familiar. These include disk striping and
    data partitioning. In a future release, Terracotta’s designers also intend to
    provide the ability to cluster Terracotta servers for scale. Once the feature
    is implemented, Terracotta is able to stripe objects across Terracotta instances
    on its own.


    Going back to our example code, Terracotta’s core architecture can support storing
    `myMap` on one Terracotta server while storing `c3` on a second Terracotta server.
    When the application runs `myMap.get(id)`, Terracotta knows that the map is on
    one Terracotta instance, while `c3` is on another, and routes I/O based on Terracotta
    object identifier and corresponding routing information. Terracotta honors object
    identity as well as the Java Memory Model so there are no copies of objects, only
    real objects, which allows the system to store parts of objects on one Terracotta
    instance and other parts on another. This architecture delivers the ability to
    scale linearly, because any number of Terracotta instances will split the responsibility
    of storing and manipulating objects evenly: two instances split the data in half,
    three instances in thirds, and so on.


    ## Avoiding Bottlenecks


    The hardest part of tuning an application is in storing data on disk for availability
    yet simultaneously avoiding I/O bottlenecks. Figure 1-4 illustrates why tuning
    is hard. Essentially, the database helps us deliver high availability but with
    high latency or low scalability compared to purely in-memory applications. Simultaneously,
    caching and purely in-memory applications provide low and sometimes zero availability,
    since nothing is written to disk.


    **Figure 1-4.** *Consider the scalability versus availability trade-off to help
    avoid bottlenecks and deliver reliability.*


    The database can be mostly transparent through Hibernate and object-relational
    mapping, and it can support clustering if all application servers read and write
    to the same database tables. So why is the database not a transparent clustering
    service? The database should not be used for clustering, because it shifts the
    burden of scaling and clustering an application from application source code to
    production operations through complex and expensive database clustering technologies,
    such as Oracle Realtime Application Clusters (RAC). This is another way of saying
    what some of us might already know—the database is a bottleneck.


    Unlike the database, Terracotta does not merely shift the object-sharing burden
    from the developer and source code to the operator. Terracotta’s architecture
    and implementation contain several optimizations that provide an application with
    multiple lines of defense against disk I/O bottlenecks, the sum of these techniques
    make the solution over ten times faster than the database. Here are a few of these
    optimizations:


    - Terracotta reads from in-memory caches when available.

    - Terracotta reads only what it needs, and no more, from its server, and it can
    read in near-constant time from disk.

    - Terracotta writes only what changes, and it writes the changes in batches.'
