- fmt: '# JVM Garbage Collector


    - **JVM garbage collector**: This statistic tracks the garbage collector’s behavior
    on any and all JVMs.


    - **Distributed gc**: This Terracotta-specific concept is better thought of as
    a collector of distributed garbage rather than a distributed garbage collector.
    This tool never crawls memory across all JVMs in order to locate clustered garbage.
    It instead runs only inside the `L2`. At critical points during distributed garbage
    collection, however, the `L2` pauses all other types of work, making sure that
    no object being actively referenced gets flagged as garbage. Just like Java garbage
    collection, this `L2` collection can cause bottlenecks while pausing the system.


    - **L2 broadcast per transaction**: This statistic represents the ratio of broadcasts
    to transactions. If your application updates objects 1,000 times per second, and
    each update causes a broadcast, the ratio would be one-to-one. A ratio of one-to-one
    means all transactions are causing broadcasts, which implies poor locality of
    reference and most likely limited scalability. A broadcast ratio of zero implies
    that no objects are simultaneously resident in more than one JVM at a time. Such
    a configuration should be linearly scalable.


    - **L2 L1 fault**: This statistic tracks the opposite of a flush. A fault occurs
    when a JVM needs an object it doesn’t have in the local heap. The `L1` must wait
    for the `L2` to send the object and thus is blocked by the `L2` from making forward
    progress. Good locality combined with the appropriate number of JVMs implies that
    a JVM should always have enough memory to keep all the objects it uses in the
    local heap. Less faulting implies better scalability.


    - **Memory**: This statistic tracks the heap usage over time. This data is available
    stand-alone through `JConsole` for JDK 1.5 or newer, but Terracotta puts the data
    in the same place as all other statistics for easy correlation.


    - **System properties**: This is not a statistic at all but a snapshot of all
    the Java properties passed in and set at startup time for each JVM. This helps
    determine if one JVM is configured differently from others. It also helps determine
    what the settings for a particular snapshot of data were.


    ## Inside the Terracotta Server


    Now would be a good time to explain why the `L2` is not automatically a bottleneck.
    The notions of broadcasting, flushing/faulting, and lock bottlenecks are a direct
    result of the internal implementation details of the `L2`. Understanding these
    concepts fully requires understanding the internals of the Terracotta server.


    ### SEDA


    Since its first release, Terracotta has been designed on an asynchronous workflow
    under the principles of staged event driven architecture (SEDA). SEDA is a concept
    where any task gets broken into its component parts and then gets managed through
    its execution life cycle via an external workflow execution engine. In Chapter
    11, you learned about master/worker relationships, which can be used to spread
    work across a cluster of JVMs. The concept behind SEDA is just like master/worker,
    but SEDA is used to spread work across threads in a single JVM, in a manner where
    each work stage is unaware of those that come before or after.


    SEDA is made up of building blocks. Specifically, queues, drains, and faucets
    make up the interface. A queue represents a bucket of work. A drain represents
    an outgoing connection from one bucket to another, and a faucet represents an
    input to a bucket. Picture water flowing through a series of buckets and hoses.
    Now, imagine taking a servlet container and breaking up its various internal stages
    of processing an HTTP request using this paradigm.


    The SEDA-based servlet container can provide all the capabilities of a multithreaded
    servlet container. The main difference is that the SEDA-based containers do not
    take a system resource per user request, whereas the Tomcat 5.*x* container, for
    example, does. On the other hand, Tomcat’s core developers can easily provide
    for security and context management while processing an HTTP request using thread
    local variables. A SEDA-based container would have an object scoping problem if
    it used only thread local objects, since one thread would do only part of the
    work and must, therefore, bundle up the objects it created for other threads to
    be able to reach.


    While SEDA may or may not be for you because of the burden of decoupled, asynchronous
    programming it places, it is definitely good for the Terracotta server. The server
    does not cause unnecessary thread contention in the JVM. It also doesn’t increase
    in size and resource utilization as the number of transactions flowing through
    the system increases. SEDA makes the latency and throughput of a Terracotta server
    very efficient and predictable.


    The advantage of breaking up a seemingly singular task into parts and then spreading
    those parts across threads does not have the same value as the master/worker model.
    SEDA is meant to help an architect break up a task in a logical manner so that
    the stages of work that can be serialized are separated from those that can go
    parallel while at all times, work moves through parallel and serial stages in
    a consistent manner. While in master/worker scenarios we get parallelism, SEDA
    can provide for both parallelism and serial execution at various stages in a system.
    Understanding the SEDA workflow inside the Terracotta server will help you understand
    why some operations that a clustered application executes will run faster than
    others.


    ### Terracotta’s SEDA Pipeline


    The SEDA pipeline that runs inside the Terracotta server is made available to
    Terracotta users through the visualization tools. It is, therefore, important
    to understand the pipeline and what the tools might be indicating. Figure 12-12
    represents the internal structures inside the Terracotta server. These structures
    have to communicate among themselves in order to complete any work.


    **Figure 12-12.** *The SEDA stages inside the Terracotta server*


    The stages inside the `L2` can be grouped into four segments. The first is transaction
    processing and is depicted in the figure as the cluster on the far left. The second
    is broadcast management represented by the broadcast transaction and transaction
    acknowledgement stages (`broadcast txn stage` and `txn ack stage` in Figure 12-12).
    The last two sections are the ones you would expect, namely object request/response
    and lock request/response. Since these segments are separate SEDA stages, locks
    can be acquired, objects faulted and flushed, and transactions committed in parallel.
    In fact, an `L1` is allowed to continue as soon as it flushes a transaction to
    the server. The server must ensure that all other `L1`s acknowledge this transaction
    when necessary. So while most of the time, the system is asynchronous, broadcasts
    put the server into synchronous mode, having to manage all the acknowledgements
    and guarantee delivery.


    Using the visualization tools, we can tell how much work the server is doing in
    each of the four groups. And using the tools, we can tell if the server is keeping
    up with the workload the application is generating. Before confirming in the tools
    what we expect, let’s review our expectations.


    ## Looking for Locality Issues'
