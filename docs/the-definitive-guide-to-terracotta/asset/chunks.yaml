    **示例的集群需求**


    开箱即用，此代码在单个 JVM 环境中运行良好。多个线程将 Catalog、Product、ShoppingCart、Customer 和 Order 对象作为简单的
    POJO 进行交互，并且如果需要，可以使用标准 Java 库 `java.util.concurrent` 类（即 `CyclicBarrier`）相互协调。


    然而，如果这不仅仅是一个示例应用程序，我们希望将其部署在至少两台物理服务器上以实现高可用性，并随着使用量随时间增长，可以选择添加更多服务器以实现可伸缩性。添加服务器会引发一系列在单
    JVM 部署场景中不存在的新需求：


    •   所有活动购物车应在所有 JVM 中可用，以便浏览客户的请求可以发送到任何服务器，而不会丢失该客户购物车中的商品。


    •   对所有活动购物车的视图需要访问每个 JVM 中的所有活动购物车。


    •   示例代码中使用 `CyclicBarrier` 表达的线程交互必须扩展到多个 JVM 中的线程。


    如果 Catalog 数据变得足够大，可能无法舒适地放入 RAM。可以根据需要从产品数据库中检索，但数据库将成为瓶颈。如果使用缓存来缓解数据库瓶颈，每个 JVM
    都需要访问该缓存。


    为避免数据库使用出现严重峰值，缓存应从数据库加载一次，并在 JVM 之间共享，而不是由每个 JVM 单独加载。


    通过使用 Terracotta 并进行少量配置且无需更改代码，可以满足在集群中部署应用程序所引入的所有需求。让我们快速了解一下实现这一目标所需的配置。


    **示例的配置**


    第一步配置是确定应用程序中哪些对象应由集群共享。这些共享对象图通过声明特定变量为根（roots）来指定。从根对象通过引用可到达的每个对象都成为集群范围内所有
    JVM 可用的共享对象。在我们目前的示例中，有三个根，它们都在 Roots 类中声明。


