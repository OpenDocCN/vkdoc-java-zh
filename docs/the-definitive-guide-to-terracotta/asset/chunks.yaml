- fmt: 'Terracotta provides a Spring-specific set of configuration tags in the configuration
    file; these tags help to raise the abstraction level from working with fields,
    classes, and methods to working with services (beans). This means that Spring
    users do not have to leave their domain to configure the distribution of their
    beans; instead, they can refer to their beans using the same names as in the Spring
    configuration file. Listing 8-10 shows our example file.


    **Listing 8-10.** *The Terracotta Spring Configuration File (`tc-config-spring.xml`)*


    ```

    [<con:tc-config >](http://www.terracotta.org/config)


    <servers>


    <server host="%i" name="localhost">


    <dso-port>9510</dso-port>


    <jmx-port>9520</jmx-port>


    <data>terracotta/server-data</data>


    <logs>terracotta/server-logs</logs>


    </server>


    </servers>


    <clients>


    <logs>terracotta/client-logs</logs>


    </clients>


    <application>


    <spring>


    <jee-application name="*">


    <application-contexts>


    <application-context>


    <paths>


    <path>applicationContext.xml</path>


    </paths>


    <beans>


    <bean name="store" />


    </beans>


    </application-context>


    </application-contexts>


    <instrumented-classes>


    <include>


    <class-expression>


    org.terracotta.book.inventory.util.DepartmentByNameComparator


    </class-expression>


    </include>


    <include>


    <class-expression>


    org.terracotta.book.inventory.util.ProductByNameComparator


    </class-expression>


    </include>


    </instrumented-classes>


    </jee-application>


    986-1 CH08.qxd 5/5/08 8:40 AM Page 199


    C H A P T E R 8 ■ C L U S T E R I N G S P R I N G


    **199**


    </spring>


    </application>


    </con:tc-config>

    ```


    Notice that not all beans are declared as clustered. In fact, the only bean we
    declared as clustered is the `store` bean. This is because Terracotta analyzes
    the dependency graph of clustered Spring beans and determines the appropriate
    configuration for them. From that dependency graph, Terracotta is able to determine
    which classes need to be instrumented and which methods must be automatically
    locked.


    Apart from defining which beans should be clustered, we need to define three more
    things:


    - We have to define the path to the Spring bean definition file. In this example,
    it is `applicationContext.xml`.

    - There are two classes that aren’t recognized by Terracotta in the `store` bean
    dependency graph, `DepartmentByNameComparator` and `ProductByNameComparator`,
    so we must explicitly configure them for instrumentation.

    - We have to define the name of the JEE application associated with this application
    context. If the Spring application is deployed as a web application, the JEE application
    name is usually the name of the WAR file the web application is deployed in. This
    means that the configuration is local to this specific web application. Because
    this example is a stand-alone Spring application, we use the wildcard character
    (`*`) as the application name.


    ## NONDISTRIBUTED BEAN FIELDS


    By default, all of a clustered bean''s references (fields) are also clustered
    (i.e., the whole object graph that is referenced from the clustered bean is clustered).
    But you are allowed to define certain fields as nondistributable, which means
    that they will not be clustered and will maintain a local value. This ability
    allows you to effectively limit the graph. Avoiding DSO-based replication is very
    important in certain cases since the bean might have references to objects that
    are holding on to operating-system–specific resources, such as files and sockets,
    that are by nature not clusterable. The fields are referred to by their names
    in the Java code.


    Here is an example:


    ```

    <beans>


    <bean name="beanName">


    <non-distributed-field>myFieldOne</non-distributed-field>


    <non-distributed-field>myFieldTwo</non-distributed-field>


    </bean>


    </beans>

    ```


