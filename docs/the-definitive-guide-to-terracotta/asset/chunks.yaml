    First, we see what happens in the most fine-grained case, where a batch has a
    size of just one. In this case, the number of transactions will be equal to the
    size of the cache (100,000


    items here). The fine-grained batching use case shows the worst time and indicates
    that the I/O involved has a significant impact.


    After that, the size of each batch multiplies by ten. The output indicates that
    increasing the batch size improves performance to a point, but then performance
    starts to decrease, probably as the memory overhead and garbage collection start
    to have an impact. As stated before, using very coarse-grained transactions (such
    as a single transaction encompassing the entire load) is more likely to yield
    an OutOfMemoryError scenario.


    Terracotta is working to render this batching optimization unnecessary. In the
    future, Terracotta will automatically adjust transaction boundaries and optimize
    I/O in the case of a series of many fine-grained transactions.


    **Locking and Maps**


    Listing 5-4 and its associated configuration in Listing 5-6 showed how to wrap
    a Map into a custom Cache class and specify locking at the Cache level using automatically
    clustered synchronization. The Cache class in Listing 5-4 omits all other methods,
    but if it had read-oriented methods like get(), we would recommend that the lock-level
    for that method be specified as *read*, not *write*. This will allow multiple
    readers in the cluster to concurrently access the HashMap. The write lock level
    will perform similarly to a synchronized block in Java.


    As previously mentioned, the autolocked collection TIMs provide automatic locking
    for methods in various synchronized collections and will properly specify read
    and write locks as necessary.


    **Maps of Maps**


    One of the benefits of using Terracotta instrumented versions of the Map implementations
    is that values in the Map can be flushed out of the JVM, since they are stored
    in the virtual heap.


    Terracotta will automatically fault the object back into the JVM when it is needed,
    for example on a get().


    n**Note** The java.util.TreeMap implementation uses logical instrumentation to
    maintain the sorted nature of the internal tree structure across the cluster.
    Logical instrumentation records calls against the TreeMap and replays them on
    other JVMs in the cluster. Thus, each JVM maintains its own sorted tree structure.
    One side effect of this technique is that value objects are never faulted out
    of the TreeMap structure, in contrast to HashMap and ConcurrentHashMap.


    986-1 CH05.qxd 5/31/08 8:56 AM Page 120


    **120**


    C H A P T E R 5 n CACHING


    However, the key values in a HashMap or ConcurrentHashMap are not faulted out
    of the JVM, so all keys in a Map must fit in memory. In the case of a very large
    Map, the size of the key set must not exceed the JVM heap size. If, for example,
    your key objects include a 100-byte String field and two integer fields, the object
    would be approximately 108 bytes. If the Map contains one million keys, the total
    memory taken by the set of keys is 108MB. Always make sure the set of keys can
    fit in Java heap.


    One strategy that can be used to address this problem is to create a Map of Maps.
    This will allow the submap, which is a value of the top-level Map, to be faulted
    out entirely if not in use by a particular node. If a partitioning strategy is
    used where each node handles a subset of the data, the top-level Map should be
    keyed based on the same partitioning strategy (by ID space, geography, or whatever
    other means is used). Terracotta will then naturally fault out submaps that are
    not in use by the partition on a particular node.


    **A Deeper Look at Caching**


    Now that you’ve seen some examples of using simple Map implementations for caching,
    it’s time to examine caching in greater depth and see how we can fully leverage
    the power of Terracotta to handle a broader range of shared data use cases.


    **Eviction and Expiration**'
