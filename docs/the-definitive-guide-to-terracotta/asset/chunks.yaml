    **297**


    库存存储在 map 中是有意义的，因为在许多使用场景中，产品将通过其 SKU 进行访问。


    同时，作为此示例前端的电子商务网站需要说服网络用户购买产品。这项任务称为营销，可能使企业决定同时将篮球作为玩具和体育用品销售。因此，篮球需要以某种导航树或层次结构来表示。理想情况下，篮球商品可以同时存储在
    map 和树中，这样当价格变化时，应用程序可以使用 SKU 自动更新网站上的价格。


    库存应用程序专注于说明 Terracotta 扩展方法所固有的领域建模自由。因此，该应用程序只能做两件事。我们可以更改 map 中产品的价格，也可以要求系统显示此虚构商店销售其产品的营销层次结构。


    该应用程序在命令行运行，这对于调优和可视化目的来说非常理想。我们可以对应用程序进行一些更改，最终得到一个用于跨 JVM 更改不同对象或更改相同对象的系统。我们可以在运行时做出这些决定，因此将能够灵活地测试
    Terracotta 表现良好或不太好的各种场景。


    **修改以生成负载**


    使此应用程序有趣的是，我们可以轻松地扩展它，为 Terracotta 服务器生成有趣的工作负载。最好的方法是提供一种方式，让许多 JVM 同时修改同一个对象，而不是同时修改不同的对象。我们希望最终得到一个系统，在该系统中，更改不同的对象可实现线性扩展，而更改同一个对象则会导致瓶颈。如果工具正常工作，我们将能够可视化良好或较差的并行性，具体取决于我们运行系统的方式。


    在更改应用程序之前，让我们先回顾一下应用程序在磁盘上的结构。


    与所有 Terracotta 示例一样，samples/pojo/inventory 目录附带用于运行示例以及在我们想要进行更改时重新编译它的工具。


    您可以使用 ant 和此目录中名为 build.xml 的文件在我们进行更改后编译应用程序。名为 run.sh（在 Windows 上为 run.bat）的脚本用于启动和停止应用程序。名为
    tc-config.xml 的文件包含在 Terracotta 中运行库存应用程序所需的根和锁定义。名为 classes 的目录包含编译后的应用程序，名为
    src 的目录包含我们将要修改的 Java 文件。


    包名是 demo.inventory，因此在 src 内部嵌套了两个目录。

