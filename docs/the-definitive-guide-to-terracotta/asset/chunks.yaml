    stands for atomicity, consistency, isolation, and durability. Atomicity means
    that a transaction is either committed or rolled back, never partially committed.
    Consistency means that the integrity of the data store is maintained as invariant
    before, during, and after the transaction. Isolation means that one transaction
    in progress does not see the in-progress state of another transaction. Durability
    means that once a transactional commit has been acknowledged, it is saved and
    cannot be lost. In reality, some of these properties may be relaxed at the user’s
    discretion to improve performance. For example, databases often allow you to choose
    your level of transaction isolation to improve concurrency and performance.


    The problem of very large data sets is solved by Terracotta’s built-in memory
    management capabilities, where the hottest data is kept in local heap but cooler
    cache entries are pushed and pulled automatically to and from the Terracotta server.
    This means that the entire cache can fit in the virtual heap, radically increasing
    the cache’s effectiveness on large data sets, since you don’t have to prematurely
    purge cache entries. Because the virtual heap is disk backed, your cache can grow
    to the size of available disk on the Terracotta server.


