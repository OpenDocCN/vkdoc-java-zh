  trans: '

    在本章开头的简单示例中，我们检查了缓存中是否存在某个用户，并在必要时加载并缓存了该用户。你可能已经注意到，没有任何代码会将用户从缓存中移除。这意味着，随着时间的推移，缓存将无限制地增长，如果每个用户都被访问过，最终可能会包含所有用户。


    在某些有限的缓存应用中，这或许是可以接受的。例如，如果缓存中项目的最大数量是固定的，那么缓存就不会无限制地增长。然而，在大多数用例中，我们必须考虑如何将项目从缓存中逐出（移除）。缓存逐出可以基于多种因素，例如大小（当项目过多时逐出）、时间（定期逐出过期元素），或来自某些外部事件的需求。


    元素逐出通常遵循基于使用情况或存在时间的策略。最常见的使用情况逐出策略如下：


    • *LRU*（最近最少使用）会移除具有最旧最后访问时间戳的项目。

    • *LFU*（最不经常使用）会移除使用次数最少的项目。

    • *FIFO*（先进先出）像队列一样工作，移除最旧的项目，无论其使用情况如何。


    其他策略也可能基于特定应用的需求而适用。例如，有时允许项目基于绝对存在时间和使用情况的组合来过期是很有帮助的。


    你的应用程序中使用的策略通常取决于应用程序本身。如果你使用的是基于 `Map` 的应用程序，你通常可以完全控制如何以及何时进行逐出，并且可以采用上述任何一种策略。如果你使用的是缓存库，该库通常会提供一个或多个逐出算法，或者允许你插入自己的算法。


    作为一个例子，我们稍后将讨论 Terracotta 在与 Ehcache 一起使用时如何支持逐出和过期。


    986-1 CH05.qxd 5/31/08 8:56 AM Page 121


    第 5 章 n 缓存


    **121**


    **持久化**


    在许多情况下，从磁盘获取缓存项比从数据库或其他记录系统检索它更快。在这些情况下，构建使用磁盘来突破可用 JVM 堆限制的缓存是值得的。许多缓存系统提供了在缓存变得过大时将缓存溢出到磁盘的能力。通常，基于
    Java 的缓存框架依赖序列化来持久化到磁盘。


    持久化也可以用来避免在启动时重新加载缓存，方法是在关闭时（或定期地）将缓存刷新到磁盘，并在重启时从该备份开始。这可以大大减少在重启进程中预热缓存所需的时间。如果缓存逐出、缓存排序和搜索是需求，那么磁盘缓存通常是一种有风险的架构。磁盘速度很慢，当这些操作从遍历
    RAM 转移到磁盘时，应用程序会变慢。所有这些考虑都意味着，当数据库无法像缓存的磁盘那样快速响应时，溢出到磁盘对于管理数据是有益的，但除非数据库比本地磁盘慢得多，否则溢出到磁盘并不能提高吞吐量或延迟。


    **分布式缓存**


    当你在多个节点上扩展应用程序时，你也会希望扩展应用程序的缓存。对于只读缓存，你可以在每个应用程序节点上使用独立的缓存。这有些浪费，因为你通常会在多个节点上为任何热点数据从数据库惰性地获取数据，但仍然可以提供一些好处。


    对于读写缓存，使用独立的缓存是不可接受的，因为它们会过时，并且当用户访问到包含过时数据的节点时，会体验到不一致的结果。在这种情况下，典型的方法是在节点之间协调缓存的状态。当一个节点修改了缓存中的某个项目时，它会向缓存中的所有其他节点发送一个失效事件。为了在集群中维护缓存一致性，这个失效广播必须等待确认，或者实现一些其他复杂的版本控制方案。失效也基于存在某个更永久的后端存储的假设。


    广播和确认存在一些主要问题。最明显的问题是，广播会给缓存系统带来显著的性能损失，这必然会降低缓存的效率。它可能仍然比回到数据库获取数据要快，但它增加了显著的网络开销。此外，广播消息在系统中的所有节点之间引入了耦合，因此一个故障节点可能会感染集群中的其他节点，因为其他节点会等待来自该故障节点的确认。在最坏的情况下，单个故障节点实际上可能导致整个集群宕机，这首先就消除了拥有集群的全部好处。


    **分区数据**


    分布式缓存的一个重要策略是数据分区的概念。分区涉及跨节点拆分数据集，使得集群中的每个节点处理数据的一个子集，并且某个组件（例如负载均衡器）在集群前端适当地引导流量。分区可以用来减少对广播和集群通信的需求。然而，它也使得高可用性更具挑战性，因为分区缓存的状态只存在于集群中的一个位置。


    986-1 CH05.qxd 5/31/08 8:56 AM Page 122


    **122**


    第 5 章 n 缓存


    正如我们在第 2 章中讨论的，你可以基于某个键来划分数据库中的数据，如图 5-3 所示。


    **图 5-3.** *使用 Terracotta 进行分区（此图与图 2-4 相同。）* 我们将在下一节中看到 Terracotta 如何成为分区数据的优秀配套服务。


    **利用 Terracotta**


    Terracotta 提供了一种可扩展、高可用的技术，用于构建分布式共享数据存储。它解决了分布式缓存的关键问题：持久化、一致性和性能。


    Terracotta 提供了一个虚拟的、集群化的、持久的 Java 堆，从而将持久化作为其架构的内在组成部分。没有必要实现或使用一种将缓存溢出到磁盘并使其持久化的缓存技术，因为
    Terracotta 可以通过使用持久的 L2 服务器自动完成此操作。此外，由于该状态是持久的，它在节点启动时可用，并且会在需要时自动故障转移到 JVM 中，无需任何额外设置。


    Terracotta 还提供了真正一致的缓存，而无需牺牲可扩展性或性能。缓存中的更改可以在细粒度的字段级别发生，并传播到 Terracotta 服务器集群，而不是直接传播到所有其他应用程序节点。当需要某个缓存数据值时，它会动态地故障转移到需要它的每个节点。这避免了对广播的依赖以及应用程序集群中节点之间的耦合。


    性能是任何分布式系统中的关键问题，Terracotta 通过多种技术优化性能。对于 Terracotta 来说，最重要的区别之一是在通过集群传输更新时不使用
    Java 序列化。

