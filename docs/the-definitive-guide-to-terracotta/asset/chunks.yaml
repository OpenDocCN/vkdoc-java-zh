    **Thread Coordination with Queues**


    The next example illustrates the use of queues to send messages from one JVM to
    another. The shared data structure is a list of queues, each of which is associated
    with the color red, orange, yellow, green, blue, indigo, and violet. The first
    JVM to join the cluster will spawn one thread for each queue in the list. The
    threads will block on taking messages from the queue. When a thread is unblocked
    and takes a message off of a queue, this first JVM will simply print to console
    the message sent to it on that particular queue and repeat the process. Each subsequent
    JVM that joins the cluster is assigned one of the seven colors and proceeds to
    place messages into its designated color queue. Figure 10-2 presents a picture
    of the interaction between the different JVMs.


