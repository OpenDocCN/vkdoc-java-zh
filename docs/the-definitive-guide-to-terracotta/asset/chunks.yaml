    \n后续的示例调用将被分配七种颜色之一，同样基于`AtomicInteger`计数器的值。`main()`方法会为其颜色选择相应的消息队列，并在示例类的一个实例上调用`run()`方法。这个`run()`方法简单地进入一个`while`循环，在其中从可用的`MOODS`数组中随机选择一种心情，通过向队列添加一个消息对象来报告其心情，然后休眠一秒钟。向共享队列添加消息对象将导致第一个JVM中阻塞等待从该队列取元素的线程移除该消息对象，打印消息，然后返回队列并阻塞在`take()`上，直到另一个消息到达该队列。\n\
