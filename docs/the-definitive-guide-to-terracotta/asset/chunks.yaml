    private Map<String,String> generateData(int count) {


    Map<String,String> data = new HashMap<String,String>(); for(int i=0; i<count;
    i++) {


    String key = "key" + i;


    String value = "value" + i;


    data.put(key, value);


    }


    return data;


    }


    public void primeCache() {


    cache.putAllBatched(data, batchSize);


    }


    }


