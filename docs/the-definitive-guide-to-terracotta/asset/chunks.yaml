- fmt: '# The Forge


    The Forge also provides a set of resources shared among all projects:


    - Mailing lists

    - A Maven 2 artifact repository

    - Issue tracking with JIRA

    - Maven Archetypes for creating typical project types


    Many of these capabilities are based on Maven, which will be discussed in detail
    later in this chapter. The automated build, test, artifact deployment, and web
    site generation are done through Maven using a continuous integration server.


    Terracotta provides many TIMs on the Terracotta Forge. Over time, it is expected
    that all TIMs will be available on the Forge and that the preferred mechanism
    for obtaining TIMs will be from the Forge artifact repository.


    To host your own project on the Forge, visit the web site, and follow the instructions
    there to register and propose a project.


    ## Creating a TIM


    In this section, you will learn how you can make your own TIM, either for an external
    library or for a component within your own application.


    ### TIM Anatomy


    The three major parts of a TIM JAR file are the manifest, the Terracotta configuration
    fragment, and optionally, code that will be discussed later.


    The Terracotta module system is based on the OSGi (the Open Services Gateway initiative)
    platform, a popular standard for modular plug-in–based Java systems. For example,
    the Eclipse ecosystem is also based on OSGi and assembly via plug-ins.


    **Note** The OSGi Alliance is a board of participating members and directors who
    work together and vote on specifications regarding, essentially, dynamic dependency
    resolution and library loading capabilities for Java applications. The specification
    is available at [http://www.osgi.org/Specifications/HomePage](http://www.osgi.org/Specifications/HomePage).


    ### Creating a Manifest


    In OSGi, code is distributed in the form of plug-ins, which may be contained in
    JAR files called bundles. A bundle is nothing more than a JAR file with special
    properties defined in the JAR file manifest. The JAR specification defines the
    manifest as existing at the location `META-INF/MANIFEST.MF`. This file is simply
    a text file with a well-defined format for specifying properties, line wrapping,
    and so on.


    Listing 9-4 shows an example of a TIM manifest following the JAR manifest and
    OSGi conventions. In this case, this is the manifest for the automatically locked
    synchronized Map seen in prior sections and available on the Terracotta Forge.


    **Listing 9-4.** *Manifest from the Synchronized Map Integration Module*


    ```

    Manifest-Version: 1.0

    Bundle-Name: Terracotta Synchronized Map

    Bundle-Description: Terracotta Autolock SynchronizedMap Configuration

    Import-Package: org.terracotta.modules.configuration

    Bundle-RequiredExecutionEnvironment: J2SE-1.5

    Bundle-Vendor: Terracotta, Inc.

    Bundle-ManifestVersion: 2

    Bundle-SymbolicName: org.terracotta.modules.tim-synchronizedmap

    Require-Bundle: org.terracotta.modules.modules-common;bundle-version:=2.5.0

    Bundle-Category: Terracotta Integration Module

    Bundle-Version: 2.0.0

    Bundle-Copyright: Copyright (c) 2007 Terracotta, Inc.

    ```


    Many of the properties in this manifest will be automatically inserted for you
    when using popular tools to create JARs such as Ant or Maven. For example, the
    manifest in this listing was built using Maven in the Terracotta Forge. For more
    information on the most common and important bundle properties, see Table 9-1.
    Because a TIM is an OSGi bundle, it is actually possible to use any valid OSGi
    bundle manifest property.


    **Table 9-1.** *Manifest Properties Supported by OSGi and Terracotta*


    | Manifest Property | Description | Importance |

    | --- | --- | --- |

    | `Manifest-Version` | The JAR manifest version; should always be 1.0. | Recommended
    |

    | `Archiver-Version` | The purely informational software building the JAR. | Optional
    |

    | `Created-By` | The purely informational company or software creating the JAR.
    | Optional |

    | `Built-By` | The purely informational name of the user building the JAR. | Optional
    |'
