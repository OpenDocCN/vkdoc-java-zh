    **Understanding HTTP Sessions with Terracotta**


    Now that you’ve learned about the theory and the practice behind HTTP session
    clustering, we’re going to cover some areas that are specific to Terracotta.


    986-1 CH07.qxd 5/29/08 8:12 AM Page 173


    C H A P T E R 7 n EXTENDING HTTP SESSIONS WITH TERRACOTTA


    **173**


    **Supported Platforms**


    We explained in the beginning of this chapter that Terracotta provides its own
    implementation of HTTP sessions that is optimized for clustered usage. To make
    this implementation as easy to use as possible, it’s integrated with various application
    servers, servlet containers, and frameworks, so you can add just the appropriate
    parameters and integration modules to the configuration file and be able to use
    clustered HTTP sessions without any additional effort.


    Terracotta has worked closely with the development teams of a number of web application
    technologies to provide seamless integration. At the time of this writing, Terracotta
    version 2.6 currently supports the following products:


    • Apache Tomcat


    • BEA WebLogic


    • IBM WebSphere Application Server and Community Edition


    • Jetty


    • Apache Geronimo


    • JBoss


    • Apache Struts 1.1


    • RIFE


    • Wicket


    Support for containers and frameworks continually evolves, so be sure to check


    [http://www.terracotta.org/](http://www.terracotta.org) for a complete and up-to-date
    list.


    **Architecture Considerations**


    Terracotta does its best to keep data where it’s used. If a session is used on
    a particular server, Terracotta will keep it instantiated on the heap, assuming
    there isn’t too much data to fit in RAM. The typical scale-out architecture for
    web applications includes an array of application servers fronted by a load balancer.
    The user agent connects to the load balancer, which then decides how to route
    the requests to the application servers. If a user’s request traffic should be
    routed to a different server by the load balancer, Terracotta will automatically
    fault that session into heap on the new server. That being said, there are some
    deployment architecture decisions that you can make to greatly improve the performance
    of your cluster.


    The Effects of a Round-Robin Load Balancer


    How the load balancer decides to route requests is of great importance to achieving
    scalability with Terracotta. A naive load balancing approach is to cycle through
    the application servers, irrespective of the properties of the incoming request—this
    approach is typically referred to as a round-robin load distribution mechanism.
    It evenly distributes the request load across the available application servers,
    but it will have a negative impact on Terracotta scalability.


