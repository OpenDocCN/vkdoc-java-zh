    **Figure 10-1.** *Terracotta hooks into the MONITORENTER and MONITOREXIT bytecodes.*


    Terracotta’s virtual heap extends the utility of Java’s built-in thread coordination
    to allow threads on multiple JVMs to coordinate with each other using exactly
    the same techniques as threads on the same JVM. This means that the number of
    workers that can be brought to bear to execute your program is no longer limited
    to the number of threads and processors available to a single JVM; Terracotta
    lets your program, which was written to run on a single JVM, run on many JVMs
    as if they were all one big JVM. The power of Terracotta’s virtual heap lies in
    this ability to write software for a single JVM but run it on as many JVMs as
    you want—without the complexity and intrusiveness of a special inter-JVM signaling
    and data-sharing framework.


    **Clustering Threads**


    To see Terracotta inter-JVM thread coordination in action, let’s look at a few
    thread clustering examples.


    **Thread Coordination Using Concurrency Primitives**


    The first example shows how to coordinate the actions of threads using just the
    concurrency primitives available in JDK 1.4.2 and above. The code for this example
    is available on this book’s page at [http://www.apress.com.](http://www.apress.com)


    This example contains a configuration file and a single Java class with a main()
    method and some coordination code. The Java class is displayed in Listing 10-1.


