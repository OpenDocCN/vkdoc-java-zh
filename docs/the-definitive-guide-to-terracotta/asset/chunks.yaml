    **Summary**


    We’ve covered a lot of ground in this chapter. First, we introduced the major
    concepts that make Terracotta work. Then, we showed how those concepts are brought
    to bear in actual code. By now, the power of Terracotta that you glimpsed in HelloClusteredWorld
    should be taking shape in your mind. What it means to be able to write plain Java
    that works across JVMs should be getting clearer.


    Remember that how you use Terracotta, like Java itself, is limited only by your
    imagination. Terracotta was developed with the problems of scalability and high
    availability in mind, and we will introduce you to many of the solutions to these
    problems that Terracotta provides.


    But in all likelihood, many uses exist for a transparent and durable virtual JVM
    heap that nobody has thought of yet.


    Now that you are armed with the conceptual and practical understanding of what
    Terracotta is and how it works, the following chapters will explore how Terracotta
    can be used in a number of specific problem domains.


