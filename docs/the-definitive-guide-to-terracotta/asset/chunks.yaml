    need approximately ten servers to handle all the session objects without experiencing
    Terracotta cache eviction.


    Running a Terracotta Cluster


    As we cautioned earlier, stopping the Terracotta server implies freezing the application
    cluster.


    Specifically, any session that needs to be created or updated will need the Terracotta
    server to complete the session operations. Conversely, any session resident in
    an application server node’s memory that is only being read from does not need
    the Terracotta server. Since it is impossible to predict when end users will read
    or write their session data and when specific application nodes will go down or
    otherwise invoke a session failover in the load balancer, Terracotta must always
    be up and running to ensure no delays or pauses for end users.


    To achieve 100 percent uptime, a Terracotta-based application cluster includes
    built-in high-availability replication services. You can run Terracotta in a highly
    available manner in two ways. The first is called networked active passive (NAP)
    mode. This mode needs only TCP/IP support and a second instance of Terracotta
    to ensure consistent service to the application cluster. In the second mode, Terracotta
    works with shared disk storage (SAN is preferred) to make its data available to
    multiple Terracotta server instances. NAP is preferred because it is easy to set
    up and requires no additional hardware to operate.


    **Summary**


    Scale-out architectures have made simple HTTP session usage difficult. As a result,
    the use of HTTP sessions for storing user state has been largely discouraged in
    favor of stateless architectures where that data is kept off-server. However,
    from the application developer’s point of view, using the session for user state
    is often the best answer. In fact, some popular web application frameworks make
    heavy use of the HTTP session. Using the Terracotta virtual heap to store session
    data in conjunction with a sticky load balancer that yields high locality of reference
    can transparently provide very high scalability with high availability to your
    web application.


    In Chapters 1 and 2, you were first introduced to the idea of stateful programming
    with a stateless runtime environment. For HTTP session replication—where Terracotta
    was first applied—the push toward stateless programming has complicated the container
    and the architecture. Terracotta has simplified or removed most of the trade-offs
    of session replication by not replicating session at all and instead distributing
    the session objects efficiently in the application cluster.


    A real application must have both domain objects stored in the database and conversational
    state stored in the session. Let’s move on to Chapter 8, where we’ll discuss Terracotta
    for Spring. We’ll cluster a combination of domain objects and session objects,
    and introduce you to dependency injection in a Terracotta-based application.


