- fmt: '# Because changes are trapped at the field level, whole object graphs do not
    need to be transmitted—just the particular changed value. Avoiding serialization
    alone accounts for a significant performance improvement over many other clustered
    data solutions, virtually all of which rely on some form of Java serialization.
    The performance improvement in this case comes from the fact that the CPU and
    the heap are not burned on allocating and deallocating byte arrays for serialized
    object data. Additionally, the need to send updates only to the Terracotta server,
    instead of broadcasting them to every node in the cluster, yields a significant
    performance improvement. The biggest performance benefit comes from the fact that
    the Terracotta server computes the patch updates that each JVM needs, and delivers
    a custom update payload for each JVM’s memory. The JVM then patches its own memory.


    Terracotta will automatically fault objects in and out of memory dynamically based
    on use and is thus a perfect partner in a partitioning strategy. If your cache
    is distributed across a cluster and access to your data is partitioned, each node
    will handle a specific subset of the data. For example, each node might handle
    user names based on their starting letter. Terracotta will naturally only fault
    the necessary data into the JVM at each node that is needed for that partition.
    So, each node needs only a portion of the data in memory that perfectly matches
    the data it is using. This strategy can be used to achieve high performance and
    scalability.


    However, Terracotta also addresses the high availability aspect of scaling out
    an application across hardware nodes as every node has access to all of the distributed
    cache if necessary. If a particular node goes down and a load balancer directs
    new traffic to another node, that node can fault in objects for another partition
    in addition to its original partition.


    All of this happens automatically as a consequence of Terracotta’s transparent
    shared virtual heap without any explicit command from the application. See Chapter
    11 for a discussion of how to use Terracotta to detect JVM failure and automatically
    restart JVMs. The server sends JMX events to members of the cluster about nodes
    coming and going using the capability called cluster membership events.


    ## Caching with Ehcache


    In previous sections, we looked at how you can use the standard Java collection
    APIs to build shared data structures with Terracotta. Using a shared `Map` is
    easy and takes care of the ability to save and retrieve cached values but does
    not address the need to handle eviction and expiration of elements within the
    cache. Building a custom solution around a `Map` is certainly possible, but for
    many uses, you will find it simpler to use a cache framework that provides support
    for eviction and expiration out of the box.


    There are a number of open source caching frameworks available in the market,
    and Terracotta integrates with several of the most popular. In this section, we’ll
    look at Terracotta integration with Ehcache, an excellent and popular caching
    solution. Ehcache provides a rich set of caching capabilities, including pluggable
    expiration and eviction policies, persistent storage, delivery of change events
    to your own methods, and even support for distributed caches. You can find more
    information about Ehcache at its web site [http://ehcache.sourceforge.net](http://ehcache.sourceforge.net).


    ### Rewriting the Cache Example


    To get started with Ehcache, we’ll rework the simple example from Listing 5-1.
    Only a few changes are necessary.


    In Listing 5-7, we must import the Ehcache classes and declare a `CacheManager`.
    Each `CacheManager` has its own configuration, which can be obtained in a variety
    of ways. For this example, we will use the default method of finding an `ehcache.xml`
    file in the classpath. For more information on the Ehcache API, see the Ehcache
    documentation on its web site.'
