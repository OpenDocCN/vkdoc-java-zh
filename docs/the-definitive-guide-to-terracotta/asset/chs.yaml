  \ \\\n\n-cp bin \\\n\norg.terracotta.book.inventory.cli.Main\n\n该应用程序的运行方式将与之前完全相同。但是，`store`\
  \ 将被集群化。如果你在 Terracotta 管理控制台中查看运行时集群化对象图，你将看到 Terracotta 虚拟堆上的 `Store`、`Inventory`、`Departments`、`Department`\
  \ 和 `Product` 对象。\n\n\n要观察集群的效果，请按照步骤向商店添加商品并修改一两个产品。接着，在新的终端窗口中，以不同的 JVM 启动应用程序。此时，新\
  \ JVM 中运行的应用程序实例不会提示你填充空商店，而是会发现商店中已有商品，并直接跳转到主菜单。当你查看库存或部门列表时，会看到你在第一个 JVM 中对商店所做的所有修改都自动反映在了新\
  \ JVM 中。\n\n你可以在任一 JVM 中继续修改商店，并在另一个 JVM 中查看这些修改。当然，你可以关闭两个应用程序 JVM 并启动新的 JVM，以证明商店数据是持久的。\n\
  \n**关于 DI 和 Terracotta 的说明**\n\n在继续使用 Spring 进行此示例之前，需要重申几点观察。\n\n最重要的一点是，DI 编码风格促使代码实现了非常好的关注点分离。所有集群对象都位于同一个包中并非偶然。许多其他类帮助执行各种显示活动，CLI\
  \ 对象包含所有应用程序逻辑，但这些对象从未加入集群。\n\n只有实体对象需要被集群这一事实，强化了关于 Terracotta 和关注点分离的第二个重要观点。Terracotta\
  \ 从未打算集群*整个* Java 堆。它旨在仅集群堆中那些应该在应用程序所有实例之间共享的部分。\n\nTerracotta 团队偶尔会收到反馈，称该框架并非“完美即插即用”。这是有意为之。集群\
  \ Java 堆的每一个字节不仅效率极低，而且在许多情况下毫无意义。例如，你会如何处理一个集群化的 AWT Graphics 上下文？通过让你声明式地控制 Java\
  \ 堆的哪些部分应该被集群（以你选择哪些作为根对象以及哪些对象加入集群对象图的形式），Terracotta 让你能够保持重要的应用程序状态数据处于集群状态，同时让不需要集群的数据保持独立。\n\
  \n在你使用 Terracotta 进行实验时，如果发现需要将许多对象设为 transient，因为本不该在集群中的对象被吸入了集群对象图，那么你的代码可能混淆了本应分离的关注点。采用\
  \ DI 风格编码强化了关注点分离，这将使 Terracotta 的集成变得非常自然。\n\n986-1 CH08.qxd 5/5/08 8:40 AM 第 194\
  \ 页\n\n**194**\n\n第 8 章 ■ 集群 Spring\n\n**培育 Spring Bean**\n\n到目前为止，你已经看到了该示例作为独立应用程序和\
