  \ Google）来展示如何利用 Terracotta 和我们的主/从工作节点容器。我们将通过开发一个分布式网络爬虫来实现，该爬虫能够爬取互联网，并使用 Lucene\
  \ 搜索框架对找到的页面建立索引。以下是定义工作流程的基本算法：**1.** 从起始 URL 获取页面。\n\n**2.** 解析页面，并收集所有出站 URL。\n\
