  \ \\\n\norg.terracotta.book.caching.ehcache.UserEhcacheExample\n\n我们将看到的结果与运行基于\
  \ Map 的版本时看到的输出完全相同。与 Ehcache 版本的主要区别在于，启用了过期和驱逐策略，因此当缓存变大或包含存在一段时间的条目时，条目将自动从缓存中移除。\n\
  \n986-1 CH05.qxd 5/31/08 8:56 AM 第 127 页\n\n第 5 章 n 缓存\n\n**127**\n\n**将 Ehcache\
  \ 与 Terracotta 结合使用**\n\nEhcache 在多种配置中支持分布式缓存。Terracotta 提供了一种即插即用的解决方案，该方案提供了分布式缓存的另一种实现，与内置的\
  \ Ehcache 选项相比，具有显著的性能和可扩展性优势。\n\n增强功能与配置\n\nTerracotta Ehcache 集成为分布式缓存提供了许多重要的增强功能，包括细粒度的读写锁定、优化的分布式驱逐策略、更高的可扩展性以及集群范围的缓存一致性。\n\
  \n当将 Terracotta 与 Ehcache 结合使用时，标准的内存驱逐策略（LRU、LFU 和 FIFO）将被一种新的基于时间的驱逐策略所取代。该驱逐策略旨在通过在靠近使用点的地方处理驱逐，来最大限度地减少对象在网络上的错误加载。\n\
  \n如果你的应用程序在一组节点上运行，并且这些节点可以访问按应用程序划分的数据，那么 Terracotta 将尽可能在每个分区本地执行驱逐。全局驱逐器还将负责处理不再在任何节点上使用的缓存条目的驱逐。发生驱逐时，该条目将从集群中每个节点的缓存中移除。\n\
  \n要配置 Terracotta 驱逐策略，需要使用以下 Ehcache 属性；其中一些属性的含义已更改：\n\n• maxElementsInCache：此属性被\
  \ Terracotta 集成忽略。分布式 Terracotta 缓存中可以存储的对象数量是无限制的，缓存改由分布式驱逐策略管理。\n\n• timeToIdleSeconds：此属性与正常内存驱逐中的含义相同。\n\
  \n• timeToLiveSeconds：此属性与正常内存驱逐中的含义相同。\n\n• eternal：此属性被 Terracotta 驱逐策略忽略。要模拟此行为，可以将\
  \ timeToIdleSeconds 和 timeToLiveSeconds 设置为零。\n\n• diskExpiryThreadIntervalSeconds：此属性与正常磁盘驱逐中的含义相同，但适用于\
  \ Terracotta 分布式驱逐策略，指定过期和驱逐发生的频率。\n\n此外，由于 Terracotta 集成的性质，一些标准的 Ehcache 功能不受支持，特别是通知（传统上用于内置的分布式缓存支持，Terracotta\
  \ 不需要）和磁盘存储。Terracotta 将缓存持久化到共享虚拟堆中，如果以这种方式配置，也会持久化到服务器磁盘上，因此不需要基于磁盘的存储。\n\n986-1\
  \ CH05.qxd 5/31/08 8:56 AM 第 128 页\n\n**128**\n\n第 5 章 n 缓存\n\n下载和安装 Ehcache 集成\n\
  \n要使用 Ehcache TIM，你首先需要从 Terracotta Forge 网站 [`forge.terracotta.org`](http://forge.terracotta.org)\
  \ 下载并安装它。要下载 tim-ehcache 1.0.2 版本的二进制发行版，请执行以下命令：\n\n$ curl \\\n\n-o tim-ehcache-1.0.2-bin.zip\
  \ \\\n\n[`forge.terracotta.org/projects/tim-ehcache/downloads/tim-ehcache-1.0.2-bin.zip`](http://forge.terracotta.org/projects/tim-ehcache/downloads/tim-ehcache-1.0.2-bin.zip)\n\
  \n此命令将下载一个包含多个 JAR 文件的 zip 文件。Ehcache 支持实际上被拆分为多个 TIM：ehcache-commons、ehcache-1.2.4\
  \ 和 ehcache-1.3。要解压并将这些 JAR 安装到你的 Terracotta 安装目录中，请运行以下命令：$ unzip tim-ehcache-1.0.2-bin.zip\n\
  \n$ cd tim-ehcache-1.0.2\n\n$ cp *.jar ${TC_INSTALL_DIR}/modules\n\n现在我们已经安装了 Ehcache\
  \ TIM，我们可以从任何使用此 Terracotta 安装的应用程序中使用此模块。\n\n将 Ehcache 与 Terracotta 结合使用\n\n要启用对分布式\
  \ Ehcache 的支持，你需要在 tc-config.xml 配置中声明对 Terracotta Ehcache 集成模块的依赖，如清单 5-9 所示。\n\
  \n要包含 Ehcache 模块，我们在 `<clients>` 块中添加一个模块依赖项。\n\n**清单 5-9.** *Terracotta 配置 tc-config.xml*\n\
  \n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n[<tc:tc-config](http://www.terracotta.org/config)\n\
  \n[xsi:schemaLocation=\"http://www.terracotta.org/schema/terracotta-4.xsd\">](http://www.terracotta.org/schema/terracotta-4.xsd)\n\
  \n<servers>\n\n<server host=\"%i\" name=\"book.ehcache-hostname\"/>\n\n<update-check>\n\
  \n<enabled>true</enabled>\n\n</update-check>\n\n</servers>\n\n<system>\n\n<configuration-model>development</configuration-model>\n\
  \n</system>\n\n<clients>\n\n<modules>\n\n986-1 CH05.qxd 5/31/08 8:56 AM 第 129 页\n\
  \n第 5 章 n 缓存\n\n**129**\n\n<module name=\"tim-ehcache-1.3\" version=\"1.0.2\"/>\n\
  \n</modules>\n\n<logs>%(user.home)/terracotta/client-logs/book.ehcache/%D</logs>\n\
  \n</clients>\n\n<application>\n\n<dso>\n\n<instrumented-classes>\n\n<include>\n\n\
  <class-expression>\n\norg.terracotta.book.caching.ehcache.UserEhcacheExample\n\n\
  </class-expression>\n\n</include>\n\n</instrumented-classes>\n\n</dso>\n\n</application>\n\
  \n</tc:tc-config>\n\n目前，Ehcache TIM 还提供了 JSR 107 JCache API 到 Ehcache 的集成，因此需要从\
  \ [`sourceforge.net/projects/jsr107cache/`](http://sourceforge.net/projects/jsr107cache)\
  \ 包含 JSR 107 JAR。\n\n接下来，你需要使用 dso-java.sh 将你的应用程序作为 Terracotta 应用程序运行：dso-java.sh\
  \ \\\n\n–cp .:ehcache-1.3.0.jar:commons-logging-1.0.4.jar:jsr107cache-1.0.jar \\\
  \n\n–Dtc.config=tc-config.xml org.terracotta.book.caching.ehcache.UserEhcacheExample\
  \ 执行此操作时，你将看到与运行启用了 Terracotta 的 Map 应用程序类似的结果。缓存是集群化的，所有节点都将看到在任何特定节点上所做的更改。\n\n\
  **总结**\n\n缓存几乎是任何应用程序架构中必不可少的一部分。通常，我们从简单的缓存系统开始，但后来发现它无法满足数据大小、新鲜度和可扩展性方面的实际需求。事后扩展这样的系统可能是一项艰巨的任务。\n\
  \n使用 Terracotta，你可以从简单的方案开始，但利用 Terracotta 的集群化、持久化虚拟堆来缓解与扩展应用程序缓存相关的许多痛点。最棒的是，你可以使用原始的简单代码实现这种规模的扩展。\n\
  \n在本章中，你了解了如何使用内置的 JDK 集合构建简单但功能强大的分布式缓存，以及如何利用现有的开源缓存库来获得更复杂的功能和行为，同时仍然利用 Terracotta\
  \ 的优势。\n\n在下一章中，我们将研究 Hibernate（一个流行的对象关系映射框架）中的缓存工作方式。我们将详细探讨 Terracotta 如何扩展应用程序中基于\
  \ Hibernate 的数据访问，以实现比单独使用 Hibernate 高出数个数量级的可扩展性。\n\n986-1 CH05.qxd 5/31/08 8:56\
  \ AM 第 130 页\n\n986-1 CH06.qxd 5/27/08 7:34 PM 第 131 页\n\n第 6 章\n\nHibernate 与 Terracotta\n\
  \n使用 Terracotta 卸载\n\n数据库负载\n\n\n\n**H**ibernate 提供了一个强大的数据库访问工具。它是一项成熟的技术，广泛应用于多种类型的应用程序中，包括独立\
  \ Java 应用、Web 应用、J2EE 应用以及基于 Spring 的应用。通过提供一种简单的模型来实现与数据库之间的数据转换，Hibernate 减轻了处理数据库的负担。Hibernate\
  \ 有助于消除编写 SQL 语句以及执行实例化对象、用数据库数据填充对象、将内存中的对象映射到数据库表等繁琐工作的需要。虽然本书的重点并非 Hibernate，但大多数\
  \ Terracotta 应用程序都需要与数据库交互，如果不讨论 Hibernate，我们对跨机器集群和扩展应用程序的论述将是不完整的。借助 Terracotta，我们可以利用您已学过的关于\
  \ POJO 集群的许多工具和技术，在集群环境中提升 Hibernate 的性能。\n\n在扩展启用 Hibernate 的应用程序集群时，数据库通常会成为瓶颈。在本章中，我们将了解如何使用\
  \ Terracotta 来消除这些常见的 Hibernate 瓶颈，无论是通过 Hibernate 的缓存接口，还是通过 Hibernate 之外的 POJO。\n\
  \n为了理解 Terracotta 如何与 Hibernate 协同工作，我们首先需要介绍 Hibernate 所基于的基本概念。第一个概念是对象关系映射（ORM）。\n\
  \n**对象关系映射**\n\n对象关系映射（ORM）简单来说就是将数据库关系模型中的数据转换为 Java 堆中面向对象（OO）模型的数据。其核心在于，ORM\
  \ 意味着将数据库的表、列和行转换为 Java 堆中的对象实例、字段和引用指针，反之亦然。\n\n虽然执行此任务采用了多种技术，但所有 ORM 工具（如 Hibernate、iBatis\
  \ 和 TopLink）都必须解决本质上相同的问题。由于本章是关于 Hibernate 的，我们将重点介绍 Hibernate 如何执行 ORM 任务。\n\n\
  **131**\n\n986-1 CH06.qxd 5/27/08 7:34 PM 第 132 页\n\n**132**\n\n第 6 章 n HIBERNATE\
  \ 与 TERRACOTTA\n\n**Hibernate 是如何工作的？**\n\nHibernate 架构提供了一个非常优秀的抽象层，Hibernate 技术正是构建于此之上。其核心是，Hibernate\
  \ 通过在对象和数据库之间提供一组定义明确的转换点，允许 Java 开发者与对象交互，同时允许数据库与数据交互。构成 Hibernate 架构核心抽象集的有三个部分；让我们逐一详细查看：\n\
  \n*   **一级缓存**：通常被视为会话，一级缓存是一个将我们的对象以 POJO 形式存储在内存中的地方。由于我们在代码中只处理对象，因此作为 Hibernate\
  \ 的用户，一级缓存对我们来说基本上是透明的。然而，我们必须意识到它的存在，因为复制到 Hibernate 外部（即应用程序堆空间）的对象通常需要谨慎处理。\n\
  \n*   **事务边界**：这是工作单元的开始和结束边界。在一个工作单元内，所有数据的读取或写入都是事务性的，这意味着它具有读隔离语义，并且是原子性提交的。作为\
  \ Hibernate 的用户，事务边界对我们来说是非常明显的，因为它们通常转化为 `beginTransaction()` 和 `commit()` API\
  \ 调用，尽管它们也可能隐藏在框架或其他抽象层内部，从而无需手动进行这些调用，例如在 Servlet 过滤器内部。\n\n*   **二级缓存**：这是一个将数据库数据的副本以原始数据形式存储在内存中的地方。Hibernate\
  \ 提供了一个可插拔的模型，因此存在许多提供二级缓存的实现。除了配置和性能方面的考虑，作为 Hibernate 的用户，二级缓存对我们来说基本上是透明的。\n\n\
  图 6-1 展示了这些组件如何协同工作。\n\n**图 6-1.** *简化的 Hibernate 架构说明*\n\n986-1 CH06.qxd 5/27/08\
  \ 7:34 PM 第 133 页\n\n第 6 章 n HIBERNATE 与 TERRACOTTA\n\n**133**\n\n\n  \n**典型的 Hibernate\
  \ 调用流程**\n\n以下伪代码展示了与 Hibernate 交互的典型过程：  \n`session.beginTransaction();`  \n\n\
  `Object foo = { Hibernate HQL }`  \n\n`foo.getSomething();`  \n\n`foo.setSomethingElse(somethingElse);`\
  \  \n\n`session.getTransaction().commit();`  \n\n首先，我们告知 Hibernate 开启一个新事务，换言之，即开始一个新的工作单元。在第二行中，我们从会话（一级缓存）中检索一个\
  \ POJO。如果该对象尚未存在于会话中，Hibernate 将向数据库发起查询以获取该对象，并将其存入会话。值得注意的是，此后所有与该对象匹配的 Hibernate\
  \ 请求，都将返回位于 Java 堆中会话内的*同一个*物理对象。  \n\n在第三行和第四行中，我们对对象执行某些操作，无论是读取某些字段还是更新某些字段。最后一行，我们提交事务（即整个工作单元），这将把会话中所有对象所做的更改全部刷新回数据库。\
  \  \n\n**使用 Terracotta 优化 Hibernate**  \n\n在 Hibernate 模型中有两个合理的切入点来集成 Terracotta。选择哪一个取决于你的应用需求。\
  \  \n\n• 第一个切入点是将 Terracotta 用于集群 Hibernate 使用的二级缓存。这是最简单的选项，因为它仅需修改配置即可。选择此选项无需对应用程序做任何改动。然而，受限于二级缓存的设计，集群二级缓存无法充分利用\
  \ Terracotta 解决方案提供的全部优势。  \n\n• 第二个切入点是将 Terracotta 用于集群会话对象（请勿与 HTTP 会话混淆）。由于该选项集群的是\
  \ Hibernate POJO，因此可以充分利用 Terracotta 解决方案，从而在性能上超越二级缓存选项。但与二级缓存选项不同，此选项可能需要根据你的应用程序对应用逻辑进行少量调整。\
  \  \n\n**Terracotta 如何提升 Hibernate 性能**  \n\n为了帮助你理解如何将 Terracotta 集成到 Hibernate\
  \ 应用中，我们将先审视在不使用 Terracotta 的情况下，现有可用于提升 Hibernate 性能的一系列选项。随后，我们将评估如何加入 Terracotta\
  \ 以进一步提升解决方案的可扩展性和可用性。  \n\n986-1 CH06.qxd 5/27/08 7:34 PM Page 134  \n\n**134**\
  \  \n\n第 6 章 n 使用 TERRACOTTA 的 HIBERNATE  \n\n不过，首先你需要了解提升启用了 Hibernate 的应用性能的基本步骤。\
  \  \n\n**提升 Hibernate 应用性能的基本步骤**  \n以下小节展示了任何 Hibernate 开发者都必须遵循的性能提升基本步骤：  \n\n\
  **1.** 确定应用的基准性能。  \n\n**2.** 添加 Hibernate。  \n\n**3.** 启用二级缓存。  \n\n**4.** 集群会话对象（分离实例）。\
  \  \n\n**5.** 对增强效果进行基准测试。  \n\n为了提供基准，我们从典型的会话式应用开始。该会话式应用需要发起三次请求来完成一次会话。在每次请求中，示例将执行一次读取操作和两次写入操作。当然，实际应用中的变化会大得多，无论是会话请求的总数还是每次请求的数据操作数量都会有所不同；此示例仅用于清晰展示\
  \ Hibernate 性能曲线上每个决策所带来的影响。  \n\n**基准性能**  \n\n如图 6-2 所示，一个未使用 Hibernate 框架的基准\
  \ JDBC 应用，每次请求都会直接与数据库通信。这导致三次会话请求，每次请求包含三次操作，总共九次操作。  \n\n\n\n这个示例可以通过直接对 JDBC\
  \ API 进行编程来简单实现。当然，这种方法虽然简单，但无法提供良好的性能，尤其对于那些在每次会话请求中需要进行大量细粒度更改的应用程序而言。对于复杂的应用程序，手动管理\
  \ JDBC 通常并不像这个简单示例所暗示的那样容易。\n\n**图 6-2.** *基准 JDBC 应用程序执行了九次 SQL 调用。*\n\n986-1 CH06.qxd\
  \ 5/27/08 7:34 PM 第 135 页\n\n第 6 章 n HIBERNATE 与 TERRACOTTA\n\n**135**\n\n我们来总结一下这种方法：该应用程序总共执行了九次操作。其优点是简单，但扩展性很差。因此，这种应用程序在简单性上的权衡体现在其性能上。JDBC\
  \ 易于使用，但我们很快就会发现，无论是在应用程序复杂性还是性能方面，它都无法很好地扩展。\n\n这个应用程序不存在集群方面的问题。多个系统可以直接使用 JDBC，开发人员几乎无需考虑其他因素，只需处理提交时的异常即可。\n\
  \n此外，Terracotta 在这个基准应用程序中实际上也帮不上什么忙（当然，可以使用本书其他章节已经讨论过的任何 POJO 技术直接缓存对象）。该应用程序设计为利用数据库来实现高可用性和可扩展性，但一个可扩展的高可用性数据库实例每年的运行成本可能高达数百万美元——因此我们需要寻找更好的解决方案。\n\
  \n**添加 Hibernate 以节省三次数据库调用**\n\n如图 6-3 所示，仅仅添加 Hibernate 就减少了数据库操作的总数，因为 Hibernate\
  \ 不会为每次更新都执行一次数据库操作，而是将这些更新存储在第一级缓存中，并在事务提交时将它们全部作为一个*工作单元*推送出去。这一节省将我们之前的示例从九次操作减少到了六次。\n\
  \n**图 6-3.** *Hibernate 应用程序仅执行了六次 SQL 调用。*\n\n在我们之前简单的 JDBC 应用程序中添加 Hibernate，消除了每次提交操作之前对数据库的中间更新。请注意，在图\
  \ 6-3 中，应用程序中的更新仅发送到 Hibernate，而不会传递到底层数据库。\n\nHibernate 能够跳过更新数据库，直到开发人员调用 commit()\
  \ 方法，这有助于使应用程序运行得更快。除了这一性能优势之外，Hibernate 还可以从你的代码库中抽象出大部分数据库接口。\n\n986-1 CH06.qxd\
  \ 5/27/08 7:34 PM 第 136 页\n\n**136**\n\n第 6 章 n HIBERNATE 与 TERRACOTTA\n\n虽然直接的\
  \ JDBC 是更容易理解的实现方式，但许多人会认为 Hibernate 同时使应用程序性能更好且更易于维护，因为它消除了对数据库的冗余 SQL 调用，并且无需编写自定义\
  \ SQL 代码。此外，这种架构在集群方面并不比基于 JDBC 的对应架构更难。\n\n有趣的是，图 6-2 和图 6-3 中描述的虚构应用程序尚未能够以任何显著方式利用\
  \ Terracotta。Terracotta 旨在为大多数应用程序提供高可用性和可扩展性，但这种架构（如 JDBC 示例）已经隐式地使用数据库来实现这一点。同样，为了获得真正的可用性和可扩展性，我们必须考虑更昂贵的解决方案来增强基本数据库服务器，例如用于可用性的\
  \ SAN 存储和用于可扩展性的数据库集群。\n\n**启用二级缓存以节省五次 SQL 调用**\n\n如图 6-4 所示，一旦启用二级缓存，应用程序会记住先前会话请求期间查询过的数据，从而消除对数据库的冗余查询，并将操作总数从九次减少到六次，现在进一步减少到四次。\n\
  \n**图 6-4.** *二级缓存应用程序仅执行了四次 SQL 调用。*\n\n\n\n这次，Hibernate 内部引入了一个缓存机制。该缓存确保能够消除那些会重复获取已检索对象的冗余\
  \ SELECT 操作。同时，缓存还提供了一种批量处理 UPDATE 操作的机制。在示例中，缓存将总的 SQL 操作次数减少到了四次。\n\n986-1 CH06.qxd\
  \ 5/27/08 7:35 PM 第 137 页\n\n第 6 章 n 使用 TERRACOTTA 的 HIBERNATE\n\n**137**\n\n尽管到目前为止，Hibernate\
  \ 几乎无需修改代码就能显著提升应用程序性能，但风险也开始显现。当启用二级缓存时，Hibernate 不再每次使用数据库实体时都查询数据库。如果应用程序的两个副本同时运行，它们将无法看到彼此对数据库所做的更改。根据应用程序请求在服务器之间的路由或负载均衡方式，任一节点上的缓存数据都可能轻易变得陈旧。\n\
  \n与之前的步骤不同，我们现在需要做出的权衡要困难得多。之前，我们只关心简单性和实现问题，所做的任何优化都不会影响应用程序的行为或正确性。现在，我们必须考虑添加二级缓存将对应用程序产生的影响。特别是，二级缓存现在可能与数据库不同步。普遍接受的解决方案是设置一个明确的过期时间，强制\
  \ Hibernate 根据某种过期时间或生存时间（TTL）来刷新缓存条目。\n\n在某些情况下，你可能已经发现 TTL 是不可接受的，并且可能被迫完全关闭缓存。\n\
  \n**注意** 我们还有一个风险——如果我们的应用程序是数据的唯一消费者，我们可以相对安全地假设数据只会被我们修改，因此不必担心数据在我们控制之外被修改。然而，如果其他应用程序与此应用程序同时更新数据库，那么无论是否使用\
  \ Terracotta，都不能启用二级缓存。唯一的选项是 POJO 缓存和数据库触发器，用于通知 POJO 其他应用程序所做的更改。\n\n如果没有集群策略，写入一个\
  \ JVM 中二级缓存的数据可能不会反映到集群中的另一个 JVM 中。即使我们的应用程序是数据的唯一消费者，我们现在也必须考虑应用程序被分割成许多部分，这些部分必须同步以提供一致的数据视图。当数据存储在应用层时，我们现在必须考虑缓存未命中时会发生什么：我们是否希望在每个节点上都从数据库加载数据，从而导致集群范围的缓存未命中？还是可以对数据进行集群，从而消除集群范围的未命中？\n\
  \nTerracotta 可用于对二级缓存进行集群，确保写入一个节点的数据在所有节点上保持一致，并消除数据陈旧问题。同时，Terracotta 消除了集群范围的缓存未命中。最后，由于其虚拟内存能力，Terracotta\
  \ 可以维护一个比任何单个节点可用物理内存大得多的缓存。如果应用程序的热数据集无法放入任何单个节点的物理内存空间，这一点就非常重要。有关分布式缓存的更多详细信息，请参见第\
  \ 5 章。\n\n**对 Session 对象进行集群**\n\n对 Session 对象（即 Hibernate 所称的分离实例）进行集群是与 Terracotta\
  \ 集成的最快模式，如图 6-5 所示。将数据库映射对象的 POJO 实例从 Hibernate 中分离出来，可以消除所有不必要的数据库操作，并将所有内容存储在内存中。对象可以从\
  \ RAM 中以零延迟读取。对象也可以以低内存延迟进行写入。数据库仅仅成为记录系统，并且只在你希望更新时才进行更新。数据库本质上\n\n\n\n986-1 CH06.qxd\
  \ 5/27/08 7:35 PM 第 138 页\n\n**138**\n\n第 6 章 n HIBERNATE 与 TERRACOTTA 集成\n\n完全脱离了中间状态的管理。这种方法将我们简单\
  \ JDBC 应用程序中原本的九个操作缩减到只有两个——一个加载操作和一个存储操作。\n\n**图 6-5.** *分离实例应用程序仅执行两次 SQL 调用。*\n\
  \n分离模式架构被证明是集成 Terracotta 和 Hibernate 时性能最优的选择。不仅数据库调用次数从原始 JDBC 应用程序的九次减少到两次，而且应用程序交互的对象现在变成了内存中的纯\
  \ POJO。虽然 Hibernate 二级缓存对象实际上是需要在 POJO 和缓存条目之间来回编组的字节数组，但分离模式实体完全是基于堆的对象，因此可以以几乎零延迟进行访问。\n\
  \n你必须确保将分离的 POJO 存储在 Terracotta 中；否则，这些 POJO 将在系统故障或跨 JVM 的工作负载故障转移时丢失。\n\nTerracotta\
  \ 可以解决分离模式带来的顾虑。这些顾虑——如前所述——包括 JVM 内存的丢失，以及当这些 POJO 被集群化时序列化对 POJO 产生的副作用，例如第 2\
  \ 章讨论的对象标识违反问题。虽然大多数集群解决方案无法安全地帮助集群化分离的 POJO，但 Terracotta 没有序列化和可用性方面的限制。\n\n在第\
  \ 1 章和第 2 章中，你了解到 Terracotta 提供了与数据库相同级别的数据完整性和可用性。当将 Terracotta 与 Hibernate 结合使用时，我们可以利用这种可用性保证来消除在处理中间状态（作为分离的\
  \ POJO 实例）时丢失该状态的风险。\n\n986-1 CH06.qxd 5/27/08 7:35 PM 第 139 页\n\n第 6 章 n HIBERNATE\
  \ 与 TERRACOTTA 集成\n\n**139**\n\nTerracotta 不仅限于可序列化的小型对象图——它可以用于任意大的对象图，无论这些对象是否实现了特定接口。\n\
  \n**基准测试增强效果**\n\n表 6-1 展示了我们使用一个简单的基准测试程序，结合前面章节介绍的技术使用 Terracotta，测量执行固定数量的更新或读取操作所需时间的结果。\n\
