  \ 库中找到。它是一个简单的类，隐藏了让任意数量的线程在方法中精确的同一位置相互等待后再继续执行所需的线程逻辑。可以将屏障想象为一扇门，所有线程必须在门前集合，然后门打开，所有线程通过。\n\
