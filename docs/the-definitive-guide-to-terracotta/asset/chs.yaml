  \n<lock-level>read</lock-level>\n\n</autolock>\n\n<autolock>\n\n<method-expression>\n\
  \n* org.terracotta.book.caching.map.UserCacheExample.cachePut(..)\n\n</method-expression>\n\
  \n<lock-level>write</lock-level>\n\n</autolock>\n\n</locks>\n\n</dso>\n\n</application>\n\
  \n</con:tc-config>\n\n986-1 CH05.qxd 5/31/08 8:56 AM 第 111 页\n\n第 5 章 n 缓存\n\n**111**\n\
  \n首先，`<servers>` 和 `<clients>` 块将指定 Terracotta 服务器和客户端要使用的端口和日志文件。\n\n接下来，我们必须指定应用程序中哪些类需要被检测。被检测的类将包括所有共享的类以及所有持有集群根对象的类。在我们的示例中，我们只需检测单个类。\n\
  \n接下来，我们指定将要集群的根对象。任何连接到根对象图的对象都将被集群（不过存在几种排除技术）。\n\n在我们的例子中，`Map` 字段 `userCache`\
  \ 将被集群，因此我们将其声明为根。一旦我们将 `userCache` 声明为根，所有被 `userCache` 引用的对象都将成为集群对象。\n\n最后，我们必须指定围绕集群根的锁定约束。在我们的例子中，我们希望自动锁定访问缓存的两个方法。我们将使用读锁锁定\
  \ `cacheGet()` 方法（以便集群中的多个线程可以同时读取），并使用写锁锁定 `cachePut()` 方法，因为它会修改 `Map`。\n\n然后，我们可以使用\
  \ `start-tc-server.sh` 启动 Terracotta 服务器，并使用 `dso-java.sh` 将应用程序作为 Terracotta 客户端应用程序再次运行：\n\
  \ndso-java.sh –Dtc.config=tc-config.xml \\\n\norg.terracotta.book.caching.map.UserCacheExample\n\
  \n当我们这样做时，我们将看到与简单缓存示例相同的输出。但是，如果我们再次运行它，将会看到不同的结果，如下所示：\n\nFind 0 - HIT\n\nFind\
  \ 1 - HIT\n\nFind 2 - HIT\n\nFind 3 - HIT\n\nFind 4 - HIT\n\nFind 0 - HIT\n\nFind\
  \ 1 - HIT\n\nFind 2 - HIT\n\nFind 3 - HIT\n\nFind 4 - HIT\n\n在第二次运行时，我们看到每次用户查找都是缓存命中。这是因为由于我们添加的配置，缓存现在是共享且持久的。当第二个客户端启动时，它能够透明地从\
  \ Terracotta 共享虚拟堆中加载缓存对象。这些对象是按需加载的，因此无需进行昂贵的计算或检索缓存值的调用。\n\n\n\n通过这个示例可以看到，使用\
  \ Map 作为缓存来构建单机虚拟机应用，然后通过应用一些外部配置，利用 Terracotta 对该应用进行集群或分布式部署，是相当容易的。在许多应用中，这种基本技术足以构建分布式共享数据结构。而在其他情况下，你可能需要一个具有更复杂行为、缓存淘汰策略等的缓存，这时你可以使用集成了\
  \ Terracotta 的流行开源缓存框架。\n\n986-1 CH05.qxd 5/31/08 8:56 AM 第 112 页\n\n**112**\n\n\
  第 5 章 n 缓存\n\n**使用 Map 进行缓存**\n\nJDK 提供了一系列 Map 实现，供你在创建应用时选择。本节将探讨在 Java 和 Terracotta\
  \ 中可用的选择以及各种权衡。\n\n**未排序的 Map**\n\n在 JDK 中，未排序的 Map 实现包括 `Hashtable`、`HashMap`、`LinkedHashMap`\
  \ 和 `ConcurrentHashMap`。\n\n• `Hashtable` 是一种遗留数据结构，在最初的 JDK 中提供，早于现代 Java 集合 API。它应被视为\
  \ JDK 中已弃用的部分，不建议使用。\n\n• `HashMap` 是最常用的 Map 实现。它是非同步的，因此在没有外部同步的情况下，不应在并发（或分布式）代码中使用。`HashMap`\
  \ 将其值存储在一个大型表中。当内部表更新时，必须为所有用户锁定它。这种全局锁定常常会成为性能瓶颈。Terracotta 为 `HashMap` 提供了出色的支持，但在跨集群更新时也会面临同样的锁定瓶颈。\n\
  \n• `ConcurrentHashMap` 通常是使用 Terracotta 共享 Map 时的最佳选择。`ConcurrentHashMap` API 专为并发使用而设计。该实现使用内部锁定，因此对\
  \ Map 的调用不需要外部同步来保证安全。在内部，数据被分割到多个表（也称为段）中，每个段可以单独锁定。无论是在日常 Java 使用中还是与 Terracotta\
  \ 配合使用时，这通常都能在并发使用下提供比普通 `HashMap` 好得多的性能。\n\n• `LinkedHashMap` 基本上是一个 `HashMap`，但增加了一个贯穿条目的双向链表。该链表通常用于跟踪插入顺序，尽管它也可以用于跟踪\
  \ Map 中条目的使用情况。这种额外的能力使得将 `LinkedHashMap` 转变为具有 LRU（最近最少使用）缓存淘汰语义的缓存变得容易。在撰写本文时，Terracotta\
  \ 不支持 `LinkedHashMap`。\n\n`Collections.synchronizedMap()` 方法可用于将非同步的 Map（如 `HashMap`\
  \ 或 `LinkedHashMap`）包装成一个同步的线程安全包装器。默认情况下，Terracotta 不会对此方法返回的同步 Map 对象提供自动锁定，这让你在分布式锁粒度方面拥有更多自由。你可以通过使用本章后面讨论的自动锁定集合\
  \ Terracotta 集成模块，为同步包装器集合和遗留集合（如 `Hashtable` 和 `Vector`）添加锁定支持。\n\n**已排序的 Map**\n\
  \nJDK 还提供了一个用于已排序 Map 的接口（`SortedMap`），由 `TreeMap` 实现。Terracotta 完全支持此实现（其底层是树形数据结构），但未排序的\
  \ Map 的 `get()` 和 `put()` 操作比 `TreeMap` 更快。这与常规 Java 中 `TreeMap` 和 Map 的 `get()`\
  \ 和 `put()` 的相对性能是一致的。性能较慢是因为数据存储在一棵树中，该树必须在 `put` 和 `remove` 操作时进行平衡，并在 `get` 操作时进行遍历。\n\
  \n986-1 CH05.qxd 5/31/08 8:56 AM 第 113 页\n\n第 5 章 n 缓存\n\n**113**\n\n`Collections.synchronizedSortedMap()`\
  \ 方法可用于将非同步的 `SortedMap`（如 `TreeMap`）包装成一个同步的线程安全包装器。默认情况下，Terracotta 不会对此方法返回的同步\
  \ Map 实例提供自动锁定，这让你在分布式锁粒度方面拥有更多自由。同样，你可以通过使用自动锁定集合 Terracotta 集成模块来添加锁定支持。\n\n`ConcurrentSkipListMap`\
  \ 是在 Java 6 中添加的，它提供了一个高性能的并发已排序 Map 实现。然而，它是使用无锁算法实现的，这些算法更难有效地移植到分布式实现中。Terracotta\
  \ 目前还不支持 `ConcurrentSkipListMap`。\n\n**自动锁定集合**\n\n在使用 Terracotta 共享集合时，获得卓越性能的关键之一是优化锁定。Terracotta\
  \ 提供了多种锁级别，在只需要读锁的情况下，使用分布式读锁可以极大地提高性能。\n\n默认情况下，同步集合不会应用 Terracotta 锁定，这样你的应用可以自由决定锁定对同步集合访问的最佳方式。\n\
  \n如果你希望提供与普通同步集合相同粒度的锁定，Terracotta 提供了一个用于自动锁定集合的 Terracotta 集成模块（TIM），它可以实现这一点。\n\
  \n可用的自动锁定集合如下：\n\n• `tim-vector`：自动锁定 `java.util.Vector`\n\n• `tim-hashtable`：自动锁定\
  \ `java.util.Hashtable`\n\n• `tim-synchronizedcollection`：自动锁定从 `java.util.Collections.synchronizedCollection()`\
  \ 返回的集合\n\n• `tim-synchronizedmap`：自动锁定从 `java.util.Collections.synchronizedMap()`\
  \ 返回的集合\n\n• `tim-synchronizedset`：自动锁定从 `java.util.Collections.synchronizedSet()`\
  \ 返回的集合\n\n• `tim-synchronizedsortedmap`：自动锁定从 `java.util.Collections.synchronizedSortedMap()`\
  \ 返回的集合\n\n• `tim-synchronizedsortedset`：自动锁定从 `java.util.Collections.synchronizedSortedSet()`\
  \ 返回的集合\n\n这些自动锁定集合模块中的每一个都会在同步集合上适当地指定读写锁定。例如，从自动锁定的同步 Map 中获取一个条目将获得一个集群读锁，而 `put()`\
  \ 操作将获得一个集群写锁。这将通过减少读取所需的排他锁来提高性能，从而允许集群中有多个并发读取者。\n\n986-1 CH05.qxd 5/31/08 8:56\
  \ AM 第 114 页\n\n**114**\n\n第 5 章 n 缓存\n\n下载并安装自动锁定集合 TIM\n\n要使用自动锁定集合 TIM，你首先需要从\
  \ Terracotta Forge 网站 [`forge.terracotta.org`](http://forge.terracotta.org) 下载并安装它。\n\
  \nn**注意** 安装模块有多种方式，取决于你是想从源码还是二进制文件安装，以及你是想将模块加载到你的 Terracotta 安装目录中还是你自己的本地仓库中。对于这个示例，我们假设你将下载二进制形式并将其安装到你的\
  \ Terracotta 安装目录中。更多信息，请参见 Terracotta Forge 网站或第 9 章。\n\n要下载 tim-collections 版本\
  \ 2.0.1 的二进制发行版，请执行以下命令：\n\n$ curl -o tim-collections-2.0.1-bin.zip \\\n\n[`forge.terracotta.org/\\\
  `](http://forge.terracotta.org/\\)\n\nprojects/tim-collections/downloads/tim-collections-2.0.1-bin.zip\n\
  \n此命令将下载一个包含多个 JAR 文件的 zip 文件，每种集合类型对应一个 JAR。\n\n要解压并将这些 JAR 安装到你的 Terracotta 安装目录中，请使用以下命令：\
  \ $ unzip tim-collections-2.0.1-bin.zip\n\n$ cd tim-collections-2.0.1\n\n$ cp *.jar\
  \ ${TC_INSTALL_DIR}/modules\n\n这样就完成了自动锁定集合 TIM 的安装。现在它们可以在任何 Terracotta 安装中单独或一起使用。\n\
  \n使用自动锁定集合\n\n\n\n要在您自己的项目中安装自动锁定集合 TIM，请将其添加到 modules 部分，如清单 5-3 所示。\n\n**清单 5-3.**\
  \ *在 Terracotta 配置中加载同步集合*\n\n[<tc:tc-config >](http://www.terracotta.org/config)\n\
  \n<clients>\n\n<modules>\n\n<module name=\"tim-synchronizedcollection\" version=\"\
  2.0.1\" />\n\n</modules>\n\n</clients>\n\n</tc:tc-config>\n\n虽然自动锁定集合是获取对同步集合进行访问的适当集群锁定的一种简便方法，但您可能希望在应用程序级别提供自己的锁定，\n\
  \n986-1 CH05.qxd 5/31/08 8:56 AM 第 115 页\n\n第 5 章 n 缓存\n\n**115**\n\n以便能够对诸如针对一个集合（无论是否同步）进行多次关联的\
  \ get() 调用这样的复合操作进行适当锁定。在这种情况下，您不应使用自动锁定集合模块，而应在 Terracotta 配置中显式指定锁定。\n\n**批量加载\
  \ Map**\n\n使用共享 Map 的一个特殊情况是批量加载，即需要一次性向 Map 中添加大量条目，例如在初始化缓存时。通常，对 Map 的每次 put()\
  \ 方法调用都会定义一个独立的事务，但一般来说，在执行批量加载时，使用更宽的事务范围更为可取。这样可以更好地利用带宽并最大限度地减少锁定。\n\n为了处理此类场景，建议将\
  \ Map 实现封装在您自己的类中，并在该类上以更粗的粒度提供锁定。通常，您会发现使用非常细粒度的加载（为每个缓存项调用 put()）会因事务数量过多而导致性能不佳。而在另一个极端，在单个\
  \ putAll() 调用周围使用单个同步块，可能会带来更好的性能，但存在因单个事务过大而导致内存溢出错误的风险。通常，在批量调用 put() 时，可以实现最佳性能，即在粗粒度和内存安全性之间取得平衡。\n\
  \nn**提示** Terracotta 可以对事务进行批处理和更改顺序，而不会违反 JVM 的预期行为。因此，某些应用程序会发现，无需手动批处理 put()\
  \ 调用，Terracotta 也能快速管理细粒度的更新和对象更改。\n\n另一个值得考虑的方面是并发性。使用 putAll() 或批量 put() 调用会减少总体\
  \ I/O 并提高性能，但也会因使用更粗粒度的锁定范围而降低并发性。理解最佳权衡点取决于您的应用程序，并应通过实验来确定。\n\n清单 5-4 展示了一个 Cache\
  \ 类，它封装了一个 Map，并提供了一个批量加载的方法（可以指定批量大小）。请注意该方法中的同步块，它仅在每批 put 操作周围创建一个锁。通过改变批量大小，您可以改变所发生事务的大小和数量。\n\
  \n**清单 5-4.** *批量加载 Map*\n\npackage org.terracotta.book.caching.batch;\n\nimport\
  \ java.util.ArrayList;\n\nimport java.util.HashMap;\n\nimport java.util.List;\n\n\
  import java.util.Map;\n\npublic class Cache<K, V> {\n\n986-1 CH05.qxd 5/31/08 8:56\
  \ AM 第 116 页\n\n**116**\n\n第 5 章 n 缓存\n\nprivate final Map<K, V> data = new HashMap<K,\
  \ V>();\n\n// ... 其他方法，如 get 和 put\n\npublic void putAllBatched(Map<K, V> entries,\
  \ int batchSize) {\n\nList<Map.Entry<K, V>> entryList = new ArrayList<Map.Entry<K,\
  \ V>>(\n\nentries.entrySet());\n\nint itemCount = entries.size();\n\nint batchStart\
  \ = 0; // 当前批次的起始索引\n\nwhile (batchStart < itemCount) {\n\nint batchEnd = batchStart\
  \ + batchSize;\n\nif (batchEnd > itemCount) {\n\nbatchEnd = itemCount;\n\n}\n\n\
  synchronized (this) {\n\nfor (int i = batchStart; i < batchEnd; i++) {\n\nMap.Entry<K,\
  \ V> entry = entryList.get(i);\n\ndata.put(entry.getKey(), entry.getValue());\n\n\
  }\n\n}\n\nbatchStart = batchEnd;\n\n}\n\n}\n\n}\n\n\n\n我们可以构建一个驱动程序来测试这种批量加载，如清单\
  \ 5-5 所示。该程序接受两个参数：要加载到缓存中的项目数量，以及每个批次大小要运行的重复次数。此测试将加载一个集群缓存，初始批次大小为 1，并在后续每次测试中将批次大小乘以\
  \ 10。对于每个批次大小，会运行一定次数的重复，并输出最佳时间。\n\n**清单 5-5.** *批量测试程序*\n\npackage org.terracotta.book.caching.batch;\n\
  \nimport java.util.HashMap;\n\nimport java.util.Map;\n\npublic class CacheMain {\n\
  \npublic static void main(String arg[]) {\n\nint itemCount = Integer.parseInt(arg[0]);\
  \ // 要批量加载的数量\n\nint reps = Integer.parseInt(arg[1]); // 测试中的重复次数\n\n986-1 CH05.qxd\
