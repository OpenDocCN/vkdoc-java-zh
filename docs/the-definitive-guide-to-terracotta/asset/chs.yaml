  \n\n用于创建新 Department 对象的对象。它包含显示部门的方法，但所有实际的显示逻辑都委托给了显示策略类。\n\n如清单 8-3 所示的 Department\
  \ 类，包含一个对该部门中所有 Product 对象集合的引用。它还有一个用于存储部门名称的字段，以及对 Inventory 对象的引用。当一个 Product\
