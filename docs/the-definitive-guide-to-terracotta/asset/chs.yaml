  Hello Clustered Wo\n\nHello Clustered Wor\n\nHello Clustered Worl\n\nHello Clustered\
  \ World\n\nHello Clustered World!\n\nH\n\nHe\n\nHel\n\nHell\n\nHello\n\n创建 Terracotta\
  \ 配置\n\n下一步是创建一个 Terracotta 配置文件。在文本编辑器中，在顶级项目目录下创建一个名为 `tc-config.xml` 的文件。一个很好的起点是\
  \ Terracotta 工具包中的 POJO 示例配置文件：`config-examples/tc-config-pojo.xml`。将该配置文件的内容复制到当前在文本编辑器中打开的\
  \ `tc-config.xml` 文件中。我们需要对此模板配置进行一些修改，使其能与 HelloClusteredWorld 配合使用。\n\n■**注意**\
  \ 您可以在线获取 Terracotta 配置的完整参考指南，网址为 [`www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference`](http://www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference)。\n\
  \n使 Terracotta 服务器以持久模式运行\n\n配置文件分为两个主要部分，一部分用于服务器，一部分用于客户端——从 Terracotta 的角度来看，运行您应用程序的\
  \ JVM 是客户端；尽管从应用程序开发者的角度来看，这些 JVM 被称为应用服务器。第一个修改将针对配置文件的服务器部分。\n\n`/tc:tc-config/servers`\
  \ 部分可以包含多个服务器条目，其中之一是主活动服务器。如果存在多个服务器条目，客户端将按顺序尝试连接它们，直到连接到活动服务器。如果活动服务器变得不可用，客户端将尝试此处描述的每个其他服务器，直到它们连接到新的活动服务器。但是，在此示例中，我们将只使用单个服务器。\n\
  \n986-1 CH03.qxd 5/5/08 9:13 AM 第 56 页\n\n**56**\n\n第 3 章 ■ 快速入门 Terracotta\n\n\
  现有的服务器配置节 `/tc:tc-config/servers/server` 已经包含了一些配置信息，即 `data` 和 `logs` 元素。`/tc:tc-config/servers/server/data`\
  \ 元素决定了 Terracotta 服务器将 Terracotta 集群数据（集群对象数据、已连接客户端数据等）写入何处。`/tc:tc-config/servers/server/logs`\
  \ 元素决定了 Terracotta 服务器应将其日志写入哪个目录。\n\n默认情况下，Terracotta 服务器未配置为将集群状态持久化到永久存储。这意味着如果\
  \ Terracotta 服务器重新启动，它将从头开始，不保留任何集群应用程序状态。这相当于重新启动单个 JVM：先前实例的所有内存都被完全清除。\n\n\n\n\
  然而，在本示例中，我们希望观察 Terracotta 持久堆的实际运行效果，因此需要将 Terracotta 服务器配置为持久模式，以便能够安全地停止和重启，而无需重置集群堆状态。为此，我们必须将\
  \ `/tc:tc-config/servers/server/dso/persistence/mode` 的值设置为 `permanent-store`，方法是在现有的\
  \ `/tc:tc-config/servers/server` 段落中添加以下 XML 片段：\n\n<dso>\n\n<persistence>\n\n<mode>permanent-store</mode>\n\
  \n</persistence>\n\n</dso>\n\n配置 Terracotta 客户端\n\n现在服务器已配置完毕，接下来我们进行 Terracotta\
  \ 客户端的配置。\n\n客户端配置包含客户端部分和应用程序部分。客户端部分描述了 Terracotta 客户端库的一般行为。\n\n模板配置中已有一个 `clients`\
  \ 段落，与 `server` 段落类似，它指定了 Terracotta 客户端日志的写入位置。但与 Terracotta 服务器段落不同的是，`clients`\
  \ 段落不包含针对特定 Terracotta 客户端的配置。集群配置对于在集群生命周期内可能加入集群的 Terracotta 客户端数量保持无关性。我们将保持现有的\
  \ `clients` 配置段落不变。\n\n应用程序部分描述了特定于应用程序的配置。在应用程序部分中，我们将设置集群根字段，声明哪些类符合 Terracotta\
  \ 插桩条件，并声明哪些方法应被增强以支持 Terracotta 集群锁定和对象变更管理。\n\n配置根字段\n\n在我们之前对 HelloClusteredWorld\
  \ 的讨论中，我们确定某些字段必须声明为集群根字段，这些字段是集群对象图的顶层。从根字段（未声明为瞬态的字段）通过引用可访问的每个对象本身都会成为集群对象。一旦在集群中首次实例化，根字段就变为不可变，无论源代码中对其应用了何种修饰符。\n\
  \nHelloClusteredWorld 有两个字段我们希望声明为根字段：`buffer` 和 `loopCounter`。要使这些字段成为根字段，我们必须将以下\
  \ XML 片段添加到 `/tc:tc-config/applications/dso/` 部分：\n\n986-1 CH03.qxd 5/5/08 9:13\
  \ AM 第 57 页\n\n第 3 章 ■ 深入 Terracotta\n\n**57**\n\n<roots>\n\n<root>\n\n<field-name>HelloClusteredWorld.buffer</field-name>\n\
  \n</root>\n\n<root>\n\n<field-name>HelloClusteredWorld.loopCounter</field-name>\n\
  \n</root>\n\n</roots>\n\n配置插桩\n\nTerracotta 的透明系统在 Java 字节码加载到 JVM 时对其进行增强，以便观察对象的变更并协调跨\
  \ JVM 的锁定和对象更新。\n\n我们当前的配置设置为对 JVM 加载的每个类进行插桩。在本示例中，这样做完全可行。然而，在实际使用中，更常见的做法是将 Terracotta\
  \ 插桩的类集限制为必要的类，以消除 Terracotta 插桩对应用程序中（以及您正在使用的第三方库中）不与集群对象交互的部分带来的开销。\n\n为了将 HelloClusteredWorld\
  \ 的插桩范围缩小到仅必要的部分，让我们修改当前的 `instrumented-classes` 部分，使其如下所示：\n\n<instrumented-classes>\n\
  \n<include>\n\n<class-expression>HelloClusteredWorld</class-expression>\n\n</include>\n\
  \n</instrumented-classes>\n\n这告诉 Terracotta 仅对 HelloClusteredWorld 类进行插桩。Terracotta\
  \ 默认还会对许多其他类进行插桩，所有这些类都位于引导 JAR 中。\n\n配置锁\n\n与插桩部分类似，我们的模板配置为每个被插桩类中的每个方法设置了锁定。同样，这对于我们的小示例是可行的，但在实际应用中通常不实用。为了缩小对\
  \ Terracotta 锁定敏感的方法范围，让我们修改 `locks` 部分，使其如下所示：\n\n<locks>\n\n\n\n<autolock>\n\n\
  <lock-level>write</lock-level>\n\n<method-expression>void HelloClusteredWorld.main(..)</method-expression>\n\
  \n</autolock>\n\n</locks>\n\n这将告诉 Terracotta 仅将集群锁定应用于 `HelloClusteredWorld` 的 `main`\
  \ 方法。该表达式中参数部分的两个点表示它应匹配 `HelloClusteredWorld` 中名为 `main` 的方法，该方法可接受零个或多个任意类型的参数。这是一种快捷写法，因为我们知道\
  \ `HelloClusteredWorld` 中只有一个 `main` 方法。\n\n986-1 CH03.qxd 5/5/08 9:13 AM 第 58 页\n\
