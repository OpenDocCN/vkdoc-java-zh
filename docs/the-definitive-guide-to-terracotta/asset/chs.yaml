  \ Terracotta 客户端 JVM 使用相同的配置运行。\n\n986-1 CH08.qxd 5/5/08 8:40 AM Page 193\n\n第 8\
  \ 章 ■ 集群化 Spring\n\n**193**\n\n现在你已经知道了 Terracotta JVM 参数，就可以在启用 Terracotta 的情况下运行\
