  \ \\\n\n-Dtc.install-root=<$TC_HOME>/bin/.. \\\n\n-Dtc.config=localhost:9510 \\\n\
  \n-cp .:bin:lib/spring-2.0.8.jar:lib/commons-logging.jar \\\n\norg.terracotta.book.inventory.cli.SpringMain\n\
  \n按照相同的过程向商店添加产品并修改它们；然后，启动另一个实例。毫不意外，集群化的 Spring 应用程序与不使用 Spring 的集群化应用程序运行方式相同。\n\
  \n然而，这两个应用程序版本之间存在一个区别。在不使用 Spring 的集群化应用程序中，我们将 CLI 的 store 字段声明为 Terracotta 根字段。\n\
  \n由于 Terracotta 会为您集群化 Spring Bean，因此您无需指定根。如果您启动 Terracotta 管理控制台，您将看到 Terracotta\
  \ 已为您创建了一个根，其中包含 Spring 上下文中的集群化 Bean（见图 8-1）。\n\n**图 8-1.** *为 Spring 应用程序上下文自动创建的根*\n\
  \n986-1 CH08.qxd 5/5/08 8:40 AM 第 201 页\n\n第 8 章 ■ 集群化 Spring\n\n**201**\n\n**用于\
  \ Spring 的 Terracotta 会话集群**\n\nTerracotta 支持对 Spring Web Flow 和会话作用域 Bean 进行集群。要启用此功能，您需要将\
  \ session-support 设置为 true。\n\n<!-- 位于 c:config/application/spring/jee-application\
  \ 下 -->\n\n<session-support>true</session-support>\n\n这还会为包含在 <jee-application>\
  \ 元素中的 Web 应用程序启用常规 HTTP 会话集群。\n\n**总结**\n\n在本章中，我们经历了创建普通 Java 应用程序、对其进行集群化、将其增强为\
  \ Spring 应用程序，并最终成为集群化 Spring 应用程序的整个过程。\n\n正如您所见，使用 Spring 所强化的控制反转模式设计的应用程序，与\
  \ Terracotta 配合得非常好，即使您不将其与 Spring 一起使用也是如此。\n\nDI 所提倡的关注点分离，使得在集群化应用程序时，哪些对象属于虚拟堆变得非常清晰。此外，Terracotta\
  \ 提供的 Spring 集成使得配置您的 Spring 应用程序以与 Terracotta 协同工作变得容易。\n\n但是，与其他技术配合使用的应用程序呢？是否有办法在\
  \ Terracotta 和除 Spring 之外的第三方技术之间提供紧密集成？\n\n在下一章中，我们将探讨如何使用和构建 Terracotta 集成模块（TIM）。TIM\
  \ 提供了一种便捷且可移植的方式来封装与特定库或应用程序配合使用所需的所有配置和支持代码。Terracotta 提供了许多 TIM，使得将 Terracotta\
  \ 与其他现有技术结合使用变得像与 Spring 结合使用一样简单。而且，您可以构建和发布自己的 TIM，以便与您自己的代码或库，或者尚未获得显式 Terracotta\
  \ 支持的技术配合使用。\n\n986-1 CH08.qxd 5/5/08 8:40 AM 第 202 页\n\n986-1 CH09.qxd 5/28/08\
  \ 10:41 AM 第 203 页\n\n第 9 章\n\n集成模块\n\n**本**章讨论 Terracotta 集成模块（TIM）框架，该框架允许您将一组集群配置指定为组件，并将这些组件包含在您自己的配置中。我们将研究如何使用\
  \ TIM 以及如何从头构建它们，当您需要对某个外部库或框架进行集群，或者需要模块化您自己应用程序的集群配置时，可能会用到这些知识。\n\n**通过配置进行集群**\n\
  \nTerracotta 的集群方法建立在透明性的理念之上。编写可扩展的分布式软件时使用的最佳抽象，与编写可扩展的并发单 JVM 软件时使用的抽象是相同的。因此，集群是通过外部配置实现的，而不是通过使用\
  \ API 和代码中的新库来实现的。\n\n这种方法的一个关键结果是，外部配置可以应用于现有的库，即使这些库最初并非为此目的而设计。\n\n配置驱动的集群允许您在分布式系统中利用当今许多优秀的开源库。\n\
  \nTerracotta 通过 Terracotta 集成模块（TIM）支持库或组件的外部配置概念。一个 TIM 包含配置信息，有时还包含指定组件应如何集群和检测、如何执行锁定等的代码。\n\
  \nTIM 本身包含在一个 JAR 文件中。TIM 内部包含一个清单文件、一些在 XML 文件中定义的 Terracotta 配置，以及可能的一些代码，这些代码可以在必要时应用于修改原始库。\n\
  \n**使用 TIM**\n\n我们将通过一个示例来开始探索 TIM，该示例展示了 TIM 何时有用，以及如何使用 Terracotta 或其他人创建的模块。\n\
  \n**集群化同步 Map**\n\n默认情况下，大多数集合类都是非同步的。像 HashMap 这样的类没有同步机制，一次只能安全地在单个线程中使用。然而，Java\
  \ 集合 **203**\n\n986-1 CH09.qxd 5/28/08 10:41 AM 第 204 页\n\n**204**\n\n第 9 章 ■ 集成模块\n\
  \nAPI 包含一个名为 Collections 的工具类，它有一个 synchronizedMap() 方法，该方法会将传递给它的任何 Map 包装成另一个类，该类在每次方法调用时都会在\
  \ Map 上进行同步（类似于 Hashtable）。\n\n如果您随后对该同步 Map 进行集群，则需要为对 Map 对象的每个方法的访问指定集群锁。通常，您需要为所有修改\
  \ Map 状态的方法指定写级别的自动锁，并为所有其他方法指定读级别的自动锁。您可以在您的 tc-config.xml 文件中通过添加一个 <locks> 部分来实现这一点，如清单\
  \ 9-1 所示。\n\n**清单 9-1.** *tc-config.xml 中的 Locks 节*\n\n<locks>\n\n<autolock>\n\n\
  <method-expression>\n\nvoid java.util.Collections$SynchronizedMap.clear()\n\n</method-expression>\n\
  \n<lock-level>write</lock-level>\n\n</autolock>\n\n<autolock>\n\n<method-expression>\n\
  \nObject java.util.Collections$SynchronizedMap.clone()\n\n</method-expression>\n\
  \n<lock-level>read</lock-level>\n\n</autolock>\n\n...针对 Set 中的每个方法...\n\n</locks>\n\
  \n这个锁定代码可以正常工作，但您需要在每个使用同步 Map 的应用程序中都使用它。另一种方法是将此锁定配置打包到一个 TIM 中，然后任何需要它的应用程序都可以包含该\
  \ TIM。\n\n**导入 TIM**\n\n事实证明，Terracotta 在名为 tim-synchronizedmap 的自动锁定集合 Terracotta\
  \ 集成模块中提供了同步 Map 的自动锁定配置。\n\n要包含一个 TIM，您只需将其包含在 Terracotta 配置的 <clients> 部分中。清单\
  \ 9-2 显示了一个示例片段，说明如何将 tim-synchronizedmap 模块包含在应用程序 Terracotta 配置文件（通常是 tc-config.xml）的\
  \ <clients> 部分中。\n\n**清单 9-2.** *在 tc-config.xml 中要求一个模块*\n\n<clients>\n\n<modules>\n\
  \n<module name=\"tim-synchronizedmap\" version=\"2.0.0\" />\n\n</modules>\n\n</clients>\n\
  \n986-1 CH09.qxd 5/28/08 10:41 AM 第 205 页\n\n第 9 章 ■ 集成模块\n\n**205**\n\n每个模块声明由三个属性组成：\n\
