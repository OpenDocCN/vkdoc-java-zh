  \n类替换与修改\n\n到目前为止，我们讨论了如何编写代码来复制在 Bundle 中通过 `terracotta.xml` 文件所能完成的操作。现在，我们将研究一些无法通过其他方式完成的操作。我们将讨论的两个主要能力是类替换和类修改。\n\
  \n有时，库中的类无法高效地进行集群化。一个例子是缓存驱逐器。缓存驱逐器通常通过一个线程来实现，该线程遍历缓存，查找以某种方式超时的对象。在集群环境中，驱逐操作无法通过简单的迭代器实现，因为缓存中的每个对象都会被强制加载到执行底层集合遍历工作的\
  \ JVM 中。\n\n示例中的驱逐器在运行时会显著影响应用程序性能。另一个例子可能是对一个非线程安全的类进行集群化。\n\n在这种情况下，可能有必要用一个或多个提供更易于集群化的数据结构和同步机制的替代版本，来完全替换原有的类。\n\
  \n由于这会产生与库自身接口和内部结构保持一致性的维护问题，因此应谨慎考虑此技术。\n\n与类替换和修改相关的方法定义在表 9-3（`StandardDSOClientConfigHelper`\
