  \n第 10 章 n 线程协调\n\n**241**\n\n这个相当直接的示例说明了 Terracotta 为简单 Java 程序提供的强大功能，允许它们使用标准\
  \ Java 库类相互发送消息，从而有效地提供一种看起来就像线程间通信的 IPC/RPC 机制。\n\n**总结**\n\n本章中的示例说明了如何利用 Terracotta\
  \ 驾驭 JVM 内置的简单并发工具，以提供一种极其强大的 JVM 间协调机制。使用简单的 Java 结构使得这种方法易于开发，并且更重要的是，可以在单元级别进行测试，因为你的应用程序可以在没有\
  \ Terracotta 的单个 JVM 中执行。Terracotta 透明地提供其强大功能，使其不干扰你的代码，并允许你以最清晰的方式表达意图。\n\n本章中的示例为了清晰起见而高度理想化，但稍加想象，你就可以看到它们的原理如何应用于许多不同的场景，包括多步骤协调、IPC/RPC、工作分区或网格计算（参见第\
  \ 11 章）、策略执行、JVM 或应用程序配置、应用程序监控、工作负载均衡等等。而且，由于虚拟堆的状态是持久且高可用的，如果集群中的某个特定成员离线，可以配置另一个成员无缝地接替其位置。因此，你可以轻松地向你的实现添加冗余和故障转移系统，从而可以在关键任务环境中使用这些简单的机制。\n\
  \n986-1 CH10.qxd 5/28/08 10:51 AM Page 242\n\n986-1 CH11.qxd 5/28/08 12:54 PM Page\
  \ 243\n\n第 11 章\n\n使用 Terracotta 进行网格计算\n\n**主**/从模式是并行化工作最著名和最常用的模式之一，它也是网格计算的核心模式之一，以至于大多数支持网格的技术或多或少都可以被视为该模式的工业实现。在本章中，我们将解释该模式的特征，介绍一些可能的实现策略，并思考所有这些热议背后的真正含义。我们将简要讨论网格的真正意义，以及它们如何使用主/从模式来解决非常具有挑战性的现实世界问题。我们还将逐步向你展示如何使用\
  \ Terracotta 实现一个高度可扩展且高性能的网格风格数据处理和工作负载管理框架。到本章结束时，你将拥有一个运行在 Terracotta 上的自己的网格。用例将引导你手动构建一个分布式网络爬虫。最终的系统将能够在你想要的任意多个\
  \ JVM 上运行，按照你的意愿深度爬取任何网站（例如，跟踪四层 HREF 链接），并将该网站上的所有网页存储到你的 Terracotta 网格中。\n\n**什么是网格？**\n\
  \n网格是一组服务器，它们共同创建一个大型机级别的处理服务，在该服务中，可以配置对时间敏感的操作，以在操作系统级别遵守业务服务级别协议（SLA）。在大型机中，任务可以在硬件上启动、停止、暂停和迁移。在网格中，数据和操作可以无缝地在网格中移动，以优化当前计算任务的性能和可扩展性。\n\
  \n网格通过利用引用局部性进行扩展，并通过有效利用数据复制实现高可用性。它将数据管理与数据处理相结合。\n\n**计算网格 vs. 数据网格**\n\n\n\n\
  网格主要分为两大类：计算网格和数据网格。在负载均衡与分区的框架下，这两者的区别更容易理解。网格与 Web 应用不同，它不需要负载均衡交换机，HTTP 也不必作为通信模式。网格的核心在于手动或通过编程方式将工作分配给大量低成本服务器。基于分区的概念，现在可以将数据网格视为计算机集群，其中数据已分散存储在应用节点的内存中，以避免从数据库检索数据时的往返延迟和时延。十台低成本服务器各自存储并管理十分之一的数据。\n\
  \n**243**\n\n986-1 CH11.qxd 5/28/08 12:54 PM 第 244 页\n\n**244**\n\n第 11 章 n 使用 Terracotta\
  \ 的网格计算\n\n计算网格将工作负载分配到各个应用节点；它们仅适用于无状态工作负载（例如，仅计算型任务），或建立在数据已分区的数据网格之上。如果计算网格不与数据网格协同工作，即数据和负载可能基于不同标准进行分区，那么当运行在十台服务器中第一台上的计算任务访问第七台上的数据时，就可能导致网络瓶颈。\n\
  \n从现在开始，我们的讨论将主要围绕数据网格展开，因为它既能提供可扩展性，也能实现高可用性。可以说，数据网格为企业应用提供了最有趣的服务，其重点在于对具有状态的应用特定数据的容错和故障转移，以及访问这些数据时的可扩展性。\n\
  \n**网格如何处理可扩展性**\n\n网格能够如此出色地扩展的主要原因之一，在于网格引擎可以智能地选择：是将数据移动到其处理上下文，还是将处理上下文（操作）移动到数据。将处理上下文移动到数据，实际上意味着处理器可以利用引用的局部性；因此，在特定节点上处理的数据会保持在该节点本地，理想情况下永远不会离开该节点。相反，所有针对此特定数据集的操作都将始终路由到此特定节点。这样做最直接的好处是最大限度地减少了延迟，并能实现近乎无限且线性的可扩展性。其扩展效果自然取决于具体用例，要实现可扩展性，需要在数据分区、工作项分组以及优化潜在路由算法方面投入精力和技巧。\n\
  \n最理想（也最简单）的情况是，所有工作项都属于所谓的“易并行”类型，这意味着工作项之间没有共享状态。所有工作项都是自包含的，可以完全独立于其他工作项执行任务，这意味着我们无需担心数据分区或路由方案。易并行工作最典型的例子是算术计算。调用某种带有两个整数参数的\
  \ `add()`、`subtract()`、`multiply()` 或 `divide()` 例程不需要任何外部上下文。执行工作所需的所有数据都包含在工作项的参数中。返回结果定义明确，无需进一步处理即可使用：`add(2,\
  \ 2)` 应返回 `4`。然而，尽管易并行工作集相当常见，但我们有时也会面临更复杂的情况，需要智能的数据分区和路由算法才能良好扩展，我们将在本章稍后部分探讨这一点。\n\
  \n**网格如何处理故障转移和高可用性**\n\n网格通过将数据在所有节点上有效复制两到三份，从而能够抵御故障和停机。网格可以被视为一个有机的节点系统，其设计目的是在业务逻辑之外处理单个节点的故障。这与传统的分布式系统设计截然不同，在传统设计中，每个节点被视为一个始终在线的单元，开发者需要在源代码中处理节点故障的可能性。在网格系统中，故障——即节点、工作任务、网络等的故障——并非问题，因为基础设施会相应地处理问题。例如，待处理的工作项可以重新调度到另一个节点；节点可以重启，等等。\n\
  \n986-1 CH11.qxd 5/28/08 12:54 PM 第 245 页\n\n第 11 章 n 使用 Terracotta 的网格计算\n\n**245**\n\
  \n**用例**\n\n适合在网格上运行的应用程序通常是那些需要处理大型数据集，和/或需要并行化数据处理以获得更高吞吐量和性能的应用。计算网格的例子包括金融风险分析和其他模拟、大型数据集的搜索和聚合，以及销售订单管道处理。数据网格的例子包括像谷歌或雅虎这样的大型分布式互联网索引。\n\
  \n**主/从模式介绍**\n\n主/从模式是网格计算的关键推动因素，也是并行化工作最著名、最常用的模式之一。在本章中，我们将解释该模式的特征，并探讨一些可能的实现策略。\n\
  \n主/从模式由三个逻辑实体组成：一个主节点、一个共享工作空间，以及一个或多个从节点实例。主节点通过创建一组工作任务来启动计算，将它们放入共享工作空间，并等待工作任务被从节点拾取并完成。共享工作空间通常是某种队列，但也可以实现为元组空间（例如，在\
  \ Linda 编程环境中，如 JavaSpaces，该模式被广泛使用）。\n\nn**注意** Linda 编程是由耶鲁大学 David Gelernter\
  \ 领导的团队发明的。该系统由共享内存空间组成，供多个进程发布和获取对象。共享内存增加了互斥的概念，线程在操作对象之前必须从共享空间中取出所需内容。通过在工作时从共享内存中取出对象，线程可以安全地假设没有其他操作可以发生，因此不需要并发控制或事务。\n\
  \n使用主/从模式的一个优势是算法会自动平衡负载。这种平衡之所以可能，是因为工作空间是共享的，并且从节点一旦有能力工作，就会持续从工作空间中拉取工作任务，直到没有待处理的任务为止。只要任务数量远远超过从节点数量，并且每个任务完成所需的时间大致相似，该算法通常表现出良好的可扩展性。有关该算法的概述，请参见图\
  \ 11-1。\n\n986-1 CH11.qxd 5/28/08 12:54 PM 第 246 页\n\n**246**\n\n第 11 章 n 使用 Terracotta\
  \ 的网格计算\n\n**图 11-1.** *主/从设计模式中的工作流* **Java 中的主/从模式**\n\n现在，让我们看看在 Java 中实现主/从模式的不同方案。可能还有其他方法，但我们将重点讨论三种不同的方案，每种方案的抽象级别都更高。\n\
  \n**使用 Java 语言的线程协调原语**\n\n\n\n最硬核的方法是使用 Java 语言本身在 Java 语言规范（JLS）中定义的并发和线程原语，例如\
  \ `wait()` 和 `notify()` 方法以及 `synchronized` 和 `volatile` 关键字。使用这种方法的好处是一切都尽在掌握，这意味着你可以\n\
  \n986-1 CH11.qxd 5/28/08 12:54 PM 第 247 页\n\n第 11 章 n 使用 Terracotta 进行网格计算\n\n**247**\n\
  \n不受限制地定制解决方案（当然，你仍然会受到 Java 语言抽象和语义的约束）。然而，这也是其主要问题，因为以这种方式实现 Master/Worker 模式既非常困难又繁琐，而且很可能更难以维护。这些底层抽象通常不是你日常工作中想要使用的。我们需要做的是将抽象层次提升到\
  \ JLS 核心原语之上，而这正是 JDK 1.5 引入的 `java.util.concurrent` 库中的数据结构抽象为我们所做的。\n\n**使用 java.util.concurrent\
  \ 抽象**\n\n鉴于使用 JLS 中的底层抽象既繁琐又困难，JDK 1.5 中的并发抽象是对 Java 库一个非常受欢迎且自然的补充。\n\n这个非常丰富的\
  \ API 提供了从锁、信号量和屏障到针对并发访问高度优化的 Java 集合接口实现的一切。\n\n它还提供了一个 `ExecutorService`，它主要是一个线程池，为\
  \ Master/Worker 模式提供直接支持。这个服务非常强大，因为你只需使用一个抽象和框架就能实现 Master/Worker 模式，如图 11-2 所示。\n\
  \n尽管这种方法在许多情况和用例中已经足够，但它也存在一些问题。首先，它没有将 master 与 worker 分离，因为它们都是同一个抽象的一部分。实际上，这意味着你无法独立于\
  \ worker 来控制和管理 master，当我们使用 Terracotta 对实现进行集群以将其扩展到不仅多个线程而且多个 JVM 时，这将成为一个严重的限制。这里的问题在于，对\
  \ `ExecutorService` 本身进行集群，尽管可能并且有时甚至足够，但不会允许我们独立于 worker 来扩展 master，而是迫使我们让它们在每个\
  \ JVM 上都运行。\n\n**图 11-2.** *ExecutorService 存在局限性；它不允许我们维护一种多对多关系（而不是一对多关系），在这种关系中，master\
  \ 和 worker 更加松散耦合，并且我们能够使用共享队列（而不是线程池和线程原语）进行通信。*\n\n第二个，也许更重要的限制是，`ExecutorService`\
  \ 缺乏一层可靠性和控制力。由于 `ExecutorService` 是作为一个黑盒实现的，我们无法知道某个特定工作任务是否已启动、完成或因错误而被拒绝。\n\n\
  986-1 CH11.qxd 5/28/08 12:54 PM 第 248 页\n\n**248**\n\n第 11 章 n 使用 Terracotta 进行网格计算\n\
  \n因此，我们无法检测工作项是否失败，并在同一节点或另一节点上重试该工作项。我们需要一种简单且可能标准化的方式来处理这些事情。\n\nn**注意** Oswego\
  \ util.concurrent 库提供了 Java 5 并发库中的大部分抽象，但适用于 JDK 1.2 及以上版本。该库可从以下网址下载：\n\n[`g.oswego.edu/dl/classes/EDU/oswego/cs/dl/util/concurrent/intro.html`](http://g.oswego.edu/dl/classes/EDU/oswego/cs/dl/util/concurrent/intro.html)\n\
  \n**使用 CommonJ Work Manager 规范**\n\n在 EJB 容器内生成和协调线程是 EJB 规范所禁止的。然而，企业应用程序通常需要以同步和异步方式协调任务。这在某种程度上通过消息驱动\
  \ Bean（MDB）以一种相当冗长的方式得到了部分解决，这也是 IBM 和 BEA 创建联合规范的主要动机，该规范通过提供一种标准化且定义良好的方式在 JEE\
  \ 环境中执行并发任务来解决这个问题。该规范称为 CommonJ，并在其 Work Manager API 中支持 Master/Worker 模式。BEA 在以下网址提供了一篇关于\
  \ CommonJ 接口入门的优秀文章：\n\n[`dev2dev.bea.com/wlplatform/commonj/.`](http://dev2dev.bea.com/wlplatform/commonj)\n\
  \n有趣的是，该规范不仅定义了用于提交工作和获取结果的 API，还提供了跟踪工作状态的功能，因为它允许你注册监听器，每当工作状态发生变化时，这些监听器将接收回调事件。\n\
  \n这种跟踪工作状态的功能不仅使得检测工作失败成为可能，还可以获取失败工作的句柄，包括失败原因，这为我们提供了足够的信息来以合理的方式处理失败。\n\n我们目前所研究的三种方法都建立在先前方法的基础上，并逐步提高了抽象层次，更重要的是，最小化并简化了我们作为用户需要编写和维护的代码。\n\
  \n最自然的选择是将我们的实现基于 CommonJ Work Manager 规范。这是一个简单且极简的规范，似乎提供了构建可靠 master/worker 容器所需的大部分功能。\n\
  \n让我们看看该规范中的接口。首先，我们有 `Work` 接口；这是唯一一个不由框架实现，而是由 master/worker 实现的用户来实现的接口——这应该是意料之中的，因为要执行的实际工作总是特定于用例的。该接口通过其\
  \ `run()` 方法扩展了 `java.lang.Runnable` 接口，用户应使用该方法来实现实际的工作任务：`public interface Work\
  \ extends Runnable { }`\n\n第二个接口是 `WorkManager`，它为我们的 master 提供了主要 API。它定义了两个用于调度工作的方法；两者都返回一个\
  \ `WorkItem` 实例（接下来讨论），该实例包装并为我们提供了 `Work` 实例的句柄。这两个方法之间的区别在于，其中一个允许我们传入一个可选的 `WorkListener`，以便我们可以监听\
  \ `Work` 状态的变化。另外两个方法为我们提供了等待工作完成的不同方式。`waitForAll()` 方法会阻塞并等待直到所有 `Work` 完成\n\n\
  986-1 CH11.qxd 5/28/08 12:54 PM 第 249 页\n\n第 11 章 n 使用 Terracotta 进行网格计算\n\n**249**\n\
  \n或方法超时，而 `waitForAny()` 方法会立即返回一个包含到目前为止所有已完成 `Work` 的集合：\n\n```java\npublic interface\
