  \ `HelloClusteredWorld` 实例配置运行配置文件，请从“运行”菜单中选择“打开运行对话框”，然后双击“Terracotta DSO 应用程序”，如图\
  \ 3-9 所示。\n\n![Image 12](img/index-89_1.jpg)\n\n986-1 CH03.qxd 5/5/08 9:13 AM Page\
  \ 65\n\n第 3 章 ■ 初探 TERRACOTTA\n\n**65**\n\n**图 3-9.** *以 Terracotta 特性运行应用程序* 创建运行配置文件后，单击“运行”按钮。Eclipse\
  \ 将启动一个完全配置、启用了 Terracotta 的 `HelloClusteredWorld` 实例，该实例将连接到正在运行的服务器。你应该会看到熟悉的\
  \ `HelloClusteredWorld` 输出。如果你再次从“运行”菜单中选择“运行”，第二个集群化的 `HelloClusteredWorld` 实例将启动，你会看到每个实例的输出每次循环前进两个字母，而不是一个。\n\
  \n**对每位开发者的启示**\n\n`HelloClusteredWorld` 不仅帮助你清晰地理解 Terracotta 的工作原理，还展示了另一件事：它说明了集群化的规则正在改变。在第\
  \ 1 章中，你了解到集群基础设施的强大之处在于，应用程序可以同时具备可扩展性、高可用性和简单性。`HelloClusteredWorld` 展示了其中的两个维度。第一个维度是可扩展性。两个\
  \ JVM 协同工作，各自完成构建缓冲区的一半工作。两者共同完成“Hello Clustered World!”这条消息的时间也缩短了一半。\n\n三个 JVM\
  \ 将各自完成三分之一的工作，缓冲区填充时间也将缩短至三分之一。概括而言，应用程序的吞吐量增加了，因为与单个 JVM 相比，*n* 个服务器完成手头任务所需的时间仅为原来的\
  \ *n* 分之一。\n\n986-1 CH03.qxd 5/5/08 9:13 AM Page 66\n\n**66**\n\n第 3 章 ■ 初探 TERRACOTTA\n\
  \n该应用程序还通过透明性展示了简单性。考虑到该应用程序并非多线程，并且对这样一个简单的应用程序进行集群化似乎没有直接价值，它可能被认为是不可集群化的，或者非常像一个孤岛。然而，在运行时，我们仍然能够为\
  \ `HelloClusteredWorld` 实现一种有价值的横向扩展概念。\n\n最后，我们留给你尝试停止并重启应用程序的练习，但你将在第 4 章中了解到，`buffer`\
  \ 和 `loopCounter` 变量不仅在 JVM 进程间持久存在，而且在应用程序调用之间也持久存在。换句话说，如果 `loopCounter` 在我们终止\
  \ Java 进程之前达到了 27，那么下次使用 `dso-java.sh` 调用 `HelloClusteredWorld` 时，应用程序将从 `loopCounter`\
  \ 为 27 而不是 0 开始。由于运行在 Terracotta 的集群基础设施内，`HelloClusteredWorld` 具有高可用性和可重启性。\n\n\
  在 `HelloClusteredWorld` 中展示的强大功能可以扩展到我们编写的大多数 Java 应用程序中。由于 Terracotta 能够集群化任何堆级别的对象和线程协调，大多数应用程序都可以利用这项技术服务。\n\
  \n■**注意** Terracotta 是一个纯 Java 解决方案，在 Terracotta 服务器进程内部以及应用程序 JVM 使用的 Java 引导类加载器和库中，都仅使用\
  \ Java。Terracotta 无法集群化那些改变系统级资源的对象。Terracotta 定义的系统级资源包括套接字、文件、设备以及操作系统结构（如管道或共享内存）。Terracotta\
  \ 也无法窥探 JNI 库内部。应用程序可以在使用 Terracotta 的同时使用这些技术中的任何一种。Terracotta 只是无法看到，因此也无法挂钩这些技术可能对堆内存施加的更改。\n\
  \n**总结**\n\n借助 Terracotta，在 JEE 容器中运行的企业级应用程序现在可以实现简单、可扩展、高可用的对象共享，而无需显式地使用对象关系映射器或\
  \ Bean 风格的编程。对于在 JSE 容器中运行的应用程序也是如此。这种强大功能可以应用于从开源供应商和创建者那里下载的框架。Terracotta 可以对从第三方购买的\
  \ Java 应用程序进行集群化，即使原始软件供应商未曾考虑过横向扩展。而且，正如在 `HelloClusteredWorld` 中那样，我们现在可以对在命令行运行的简单\
  \ Java `main()` 进行集群化。\n\n从一个原本不可集群化的应用程序中摆脱对可扩展性和高可用性的担忧，也能节省资金和时间。正如你在本章中所见，传统上，开发人员一直生活在与业务逻辑紧密耦合的集群化和可扩展性之中。\n\
  \n这种紧密耦合给开发人员带来了负担，从设计阶段开始，一直持续到应用程序部署之后很久。具体来说，如果没有 Terracotta，开发人员和架构师必须选择 JDBC、JMS\
  \ 或类似技术来在进程间序列化和移动字节。\n\n在开发过程中，这些技术被集成到业务逻辑中。在质量保证阶段，应用程序必须以集群化的方式进行测试。测试非常具有挑战性，因为必须强力推动\
  \ JVM 以发现复制逻辑中的瓶颈，并且工作负载必须分布在试图更新相同对象的 JVM 之间，然后我们才能确信应用程序中没有竞态条件或事务问题。\n\n986-1\
  \ CH03.qxd 5/5/08 9:13 AM Page 67\n\n第 3 章 ■ 初探 TERRACOTTA\n\n**67**\n\n\n\nJava\
  \ 运行时环境之所以受到青睐，部分原因在于该语言提供了相当快速的开发周期。另一个原因是它能够兑现“一次编写，随处运行”的承诺。Terracotta 则将这一承诺向前推进了一步，主张将应用程序分布到多个\
  \ JVM 上应是一个运行时决策。使用 Terracotta，开发者可以避免硬编码的集群技术。因此，运维团队可以决定是使用一台配备 12 GB 内存的八核 CPU\
  \ 机器，还是八台各配备 2 GB 内存的双核机器。\n\n第 4 章将把第 3 章介绍的概念和术语提升到一个新的高度；到本章结束时，你将能够对任何自己编写的\
  \ POJO 进行集群。从第 5 章开始，我们将利用 POJO 集群背后的核心概念，对 Hibernate 和 Spring 等流行框架内部的对象进行集群。\n\
  \n986-1 CH03.qxd 5/5/08 9:13 AM 第 68 页\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第 69 页\n\
  \n第 4 章\n\nPOJO 集群\n\n**在**上一章中，你通过构建和运行 HelloClusteredWorld 获得了 Terracotta 的实践经验。既然你已经初步涉足，现在是时候介绍一些我们迄今为止仅简要提及的主要概念了。\n\
  \n我们需要讨论三个广泛的概念，以帮助你理解 Terracotta 在底层是如何工作的。第一个是 Terracotta 如何处理 Java 对象和虚拟堆。\n\n\
  第二个是 Terracotta 如何管理 JVM 之间线程的协调，以及线程对虚拟堆上对象所做的更改。我们将在这里介绍的第三个主要概念是透明性，以及 Terracotta\
  \ 如何扩展应用程序的现有语义，在运行时引入集群行为。\n\n掌握了这些关键的 Terracotta 概念后，我们将扩展你在 HelloClusteredWorld\
  \ 中获得的实践经验，并逐步讲解一个更复杂的示例，展示 Terracotta 如何将一个简单的 POJO 应用程序转变为一个高可用、多 JVM、可扩展的应用程序。\n\
  \n**关于对象和根的一切**\n\n在 HelloClusteredWorld 中，我们简要讨论了根以及如何配置它们。你可以将根视为集群对象图中的顶层对象——即根对象在虚拟堆上引用的所有对象；从某种意义上说，这是\
  \ Terracotta 的起点。根是在任何类中，你在 Terracotta 配置中声明为集群对象图起点的任何字段。\n\n当你首次为声明为根的字段赋值时，Terracotta\
  \ 会经历将该对象转变为根的过程。Terracotta 遍历对象图，将每个对象（包括根本身）转换为集群对象（关于集群对象是什么，后续会有更多说明）。\n\n根在\
  \ Terracotta 配置中通过名称声明。你可以创建任意数量的根（尽管通常只需要几个）。此外，同一个根可以分配给多个字段。当两个不同的字段被分配同一个根时，Terracotta\
  \ 会使它们引用同一个集群对象图。\n\nTerracotta 配置中的 `<root>` 语句块如下所示：\n\n<roots>\n\n...\n\n<root>\n\
  \n<field-name>my.package.MyClass.myRootField</field-name>\n\n<root-name>my_root_name</root-name>\n\
  \n**69**\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第 70 页\n\n**70**\n\n第 4 章 ■ POJO 集群\n\n\
  </root>\n\n...\n\n</roots>\n\n`<root-name>` 元素是可选的。如果你不指定名称，字段名将隐式用作根名。以下是一个示例，其中同一个逻辑根被分配给两个不同的字段：\n\
  \n<roots>\n\n<root>\n\n<field-name>demo.jtable.Main.model</field-name>\n\n<root-name>jtable_model</root-name>\n\
  \n</root>\n\n<root>\n\n<field-name>demo.jtable.Roots.model</field-name>\n\n<root-name>jtable_model</root-name>\n\
  \n</root>\n\n</roots>\n\n声明为根的字段具有特殊行为。这是 Terracotta 与常规 Java 语义存在显著差异的一个领域。\n\n\
  \n\n• 当一个根（root）首次被 JVM 分配时（该分配在集群的生命周期内有效），该根会在 Terracotta 集群中被创建，并且分配给该根字段的对象图将成为该逻辑根的对象图。\n\
  \n• 一旦分配完成，根字段的值就永远不能更改。在首次分配之后，所有后续对声明为该根的字段的赋值都将被忽略。如果根是一个 Terracotta 字面量（稍后会详细介绍字面量），则原始类型的值可以更改，但如果根是一个对象，则对该对象的引用不能更改。\n\
  \n• 代表根对象的顶层对象永远不会被 Terracotta 分布式垃圾回收器回收。\n\n由于根的生命周期超越了单个 JVM 的生命周期范围，因此它们有时被称为超静态（superstatic，这只是\
  \ Terracotta 创造者起的名字）。静态字段引用的生命周期与其声明的类相同。而超静态的根则与虚拟堆具有相同的生命周期。无论根字段的作用域修饰符是什么，这一点都成立。如果一个静态字段被声明为根，那么该静态字段将采用超静态的生命周期。\n\
  \n同样，如果一个实例字段被声明为根，那么该实例字段也将采用相同的超静态生命周期。这可能会对针对根对象编写的代码产生重大影响，并且如果对 Terracotta\
  \ 关于根的行为理解不透彻，可能会引起一些惊讶。\n\n虽然根字段本身的引用不能更改，但该根对象的对象图可以更改。通常，像 `Map`、`List` 和其他 `Collection`\
  \ 对象这样的数据结构被选为根对象——尽管任何可移植的对象都可以被声明为根（稍后会详细介绍对象可移植性）。例如，虽然不能更改将 `Map` 分配给根字段的赋值，但该\
  \ `Map` 的内容可以更改。\n\n**71**\n\n**集群对象**\n\n正如我们刚才提到的，当一个根字段首次被赋值时，分配给该字段的 Java 对象以及从该对象通过引用可达的所有对象都成为集群对象。当一个对象成为集群对象时，其所有字段数据都会被收集并存储在\
  \ Terracotta 虚拟堆中。该对象还会被分配一个集群范围内唯一的对象 ID，用于在 Terracotta 虚拟堆中唯一标识该对象（实际上，该 ID 也是该对象数据在\
  \ Terracotta 服务器中基于磁盘的对象存储中存储的键）。在适当的时候，所有这些对象数据都会被发送到 Terracotta 服务器，此后，它便作为集群对象由\
  \ Terracotta 管理。\n\n一个对象的数据由该对象的引用字段和字面量字段的值组成。引用字段是对其他 Java 对象的引用。引用字段的值是该字段所引用的对象的集群范围对象\
  \ ID。字面量字段是对象中那些不是引用字段的字段——即，其类型不被 Terracotta 视为对象的字段。\n\nTerracotta 字面量类似于（但不完全相同于）Java\
  \ 原始类型。它们包括 Java 原始类型以及 Terracotta 特殊处理的其他类型。\n\n当一个对象被任何集群对象引用时，它就会成为集群对象，除非该引用是瞬时的（稍后会详细介绍瞬时性）。实际上，就像创建根时一样，当一个对象成为集群对象时，它的整个对象图都会被遍历，并且其所有非瞬时引用都会被转换为集群对象。从这个意义上说，根创建是集群对象创建的一个特例。一旦一个对象成为集群对象，它将始终是集群对象，并存活在虚拟堆中，直到被\
  \ Terracotta 服务器中的 Terracotta 分布式垃圾回收器回收。\n\n**关于类加载器的说明**\n\n在 Java 中，对象类的标识与其类加载器（ClassLoader）相关联。由一个类加载器加载的类与由另一个类加载器加载的字节码相同的类是不同的。这意味着在一个类加载器上下文中实例化的对象，实际上与在另一个类加载器上下文中实例化的对象不属于同一个类。尽管它们的类看起来相同，但它们实际上是不同类的对象。可以保证，在每个\
  \ JVM 的每个类加载器中，一个特定的集群对象有且只有一个实例。\n\n这带来的副作用是，集群对象与其创建时的类加载器绑定，并且不能跨越类加载器的边界。例如，在一个\
  \ JVM 的默认类加载器上下文中创建的集群对象，不能在 Web 应用程序的类加载器上下文中实例化（在大多数容器中，每个 Web 应用程序都有自己的类加载器；这允许例如\
  \ JSP 类的动态重新加载等功能）。尝试在与创建时不同的类加载器上下文中实例化 Terracotta 对象将导致 `ClassCastException`。\n\
  \n**虚拟堆与内存管理**\n\nTerracotta 虚拟堆的内容是集群中所有现存共享对象的集合。\n\n由于虚拟堆的状态（即每个集群对象字段的当前值）由\
  \ Terracotta 服务器管理，因此在您的应用程序 JVM 中运行的 Terracotta 客户端库可以自由地操作客户端 JVM 中的物理堆。这意味着并非虚拟堆上的每个对象都需要在任何\
  \ JVM 中实例化。Terracotta 可以在您的应用程序需要时自动从服务器加载对象。当您遍历一个当前未在本地物理堆上实例化的集群对象的引用时，Terracotta\
  \ 会自动从 Terracotta 服务器请求该对象的数据，在本地堆上实例化它，并连接您正在遍历的引用，而您的应用程序对此一无所知。\n\n同样，随着内存压力的增加，Terracotta\
  \ 可以人为地向集群对象添加空引用，这使得任意大的集群对象图能够适应受限的物理堆空间。这种向 Terracotta 服务器刷新（flush）对象和从服务器加载（fault）对象的能力，正是\
  \ Terracotta 虚拟堆中“虚拟”部分的体现。就像现代操作系统的虚拟内存子系统在磁盘和 RAM 之间交换物理内存的内容，让计算机上的程序表现得好像拥有无限的物理内存一样，Terracotta\
  \ 虚拟内存子系统让您的应用程序表现得好像拥有无限的物理 Java 堆。\n\n**分布式垃圾回收**\n\nTerracotta 服务器有一个分布式垃圾回收器，它会移除不再被引用的集群对象。这样做是为了防止虚拟堆用不再需要的对象数据填满\
  \ Terracotta 服务器下的磁盘。一个集群对象要符合垃圾回收的条件，它必须不能从任何根可达（即，不能是根对象图的一部分），并且不能驻留在任何客户端 JVM\
  \ 的堆中。当分布式垃圾回收器找到符合回收条件的对象时，它会将这些对象从服务器及其持久化存储中移除。\n\n**管理对象变更与协调线程**\n\n就像单个 JVM\
  \ 中线程之间共享的对象一样，不同 JVM 中的线程对 Terracotta 集群对象的访问必须进行协调，以防止线程意外覆盖彼此的更改，并确保更改能够可靠地应用到需要的地方。为此，Terracotta\
  \ 进一步借鉴了现有 JVM 架构的设计思路。\n\n\n\n在 JVM 中，通过使用互斥锁同步对某些关键代码区域的访问，来保护对象数据免受并发线程执行的影响。在线程进入由\
  \ `synchronized` 块标识的此类关键代码段之前，它必须首先获取一个互斥锁，该锁将对该代码段的访问进行序列化。任何两个线程都不能同时执行 `synchronized`\
  \ 块中的代码。\n\n除了提供对关键代码段的序列化访问之外，同步代码块的锁获取和随后的锁释放还为对象数据的一致性提供了另一个关键功能：它们充当了事务边界，线程对对象所做的更改在此边界内进行批处理和排序。当一个线程获取一个对象的锁（也称为其监视器）时，对于其他线程对该对象所做的更改的可见性，存在某些保证（实际上，对象的锁与在该锁下可以进行的更改之间没有关系；锁与对象关联这一事实本质上是语法糖）。JVM\
  \ 确保，对于一个已获取特定锁的线程可见的所有对象的状态，都反映了所有其他线程在同一锁的作用域下对这些对象所做的所有更改。\n\nJVM 提供的与锁定相关的另一个线程功能是\
  \ `wait()` 和 `notify()` 机制。持有对象锁的线程可以调用该对象的 `wait()` 方法，这将导致该执行线程暂停。该线程将保持暂停状态，直到指定的时间间隔过去，或者直到另一个线程调用\
  \ `notify()` 或 `notifyAll()`。当等待的线程被通知时，它会被重新置于对相关对象锁的竞争状态。仅使用并发原语 `synchronized()`、`wait()`\
  \ 和 `notify()`，就可以编写执行各种时间和序列敏感操作的线程协调程序。随着时间的推移，这些并发问题已被封装到标准 Java 库中，最著名的是 `java.util.concurrent`\
  \ 包（顺便提一下，该包也可以由 Terracotta 进行集群）。\n\nTerracotta 为不同 JVM 中的线程提供了与 JVM 自身为同一 JVM\
  \ 内线程提供的完全相同的访问序列化、协调和可见性保证。Terracotta 用于提供这些保证的机制采用锁和事务的形式。\n\n**锁**\n\nTerracotta\
  \ 将 JVM 内置的锁定语义扩展到具有集群范围、跨 JVM 的含义。集群锁定基于 Terracotta 配置文件的 `<locks>` 部分注入到应用程序代码中。每个锁配置节使用一个正则表达式来匹配一组方法。Terracotta\
  \ 注入到该组方法中的锁定行为，由锁配置节中指定的进一步配置选项控制。\n\n在上一章中，我们为 HelloClusteredWorld 进行了一些锁配置。在那里，我们有一个如下所示的锁配置节：\n\
  \n<locks>\n    <autolock>\n        <lock-level>write</lock-level>\n        <method-expression>void\
  \ HelloClusteredWorld.main(..)</method-expression>\n    </autolock>\n</locks>\n\n\
  此配置节告诉 Terracotta 在代码中查找与该方法表达式匹配的方法。该方法表达式使用由 AspectWerkz（一个开创性的面向方面编程（AOP）框架）开发的模式选择语言来表达。这种模式选择语言允许你指定代码的特定部分。用\
  \ AOP 的术语来说，这被称为连接点。使用这种表达式语言，你可以精确指定 Terracotta 应如何处理代码中的锁定。有关 AspectWerkz 模式语言的完整参考，请参见\
  \ [`www.terracotta.org/confluence/display/docs1/`](http://www.terracotta.org/confluence/display/docs1)\
  \ AspectWerkz+Pattern+Language。\n\n让我们使用熟悉的 HelloClusteredWorld 程序中的 `main()` 方法来讨论每个锁配置选项的效果。为方便起见，我们在此重申一下：\n\
  \npublic static void main( String args[] ) throws Exception {\n    while( true )\
  \ {\n        synchronized( buffer ) {\n            int messageIndex = loopCounter++\
  \ % length;\n            if(messageIndex == 0) java.util.Arrays.fill(buffer, '\\\
  u0000');\n            buffer[messageIndex] = message.charAt(messageIndex);\n   \
  \         System.out.println( buffer );\n        }\n        Thread.sleep( 100 );\n\
  \    }\n}\n\n**自动锁和命名锁**\n\n锁节必须指定为命名锁或自动锁。匹配自动锁节的方法会被 Terracotta 增强，以便在对象上存在同步的地方获取该对象的集群范围锁。你可以将自动锁视为方法现有\
  \ Java 同步的扩展，使其具有集群范围的含义。HelloClusteredWorld 的配置使用了一个自动锁，告诉 Terracotta 检查 `main()`\
  \ 方法中的同步。在这种情况下，对 `buffer` 字段的同步被 Terracotta 增强，以具有集群范围的效果。\n\n与自动锁不同，命名锁仅在方法入口和出口处起作用。这意味着，对于匹配命名锁配置节的方法，线程必须先向\
  \ Terracotta 服务器获取该名称的锁，然后才能被允许执行该方法。因此，命名锁非常粗粒度，仅应在无法使用自动锁时使用。如果我们为 HelloClusteredWorld\
  \ 选择使用命名锁，那么整个集群中一次只允许一个线程进入 `main()` 方法。其效果将是允许第一个 JVM 执行 `main()` 方法。此后，任何加入集群的\
  \ JVM 都将在 `main()` 方法的入口处阻塞，试图获取该命名锁。由于 `main()` 方法永远不会退出，除了第一个 JVM 之外的所有 JVM 都将无限期阻塞，或者直到第一个\
  \ JVM 被终止，此时另一个 JVM 才会被授予锁并被允许进入 `main()` 方法。\n\n自动锁可以提供比命名锁多得多的并发性，但自动锁仅在同步的对象是集群对象时才获取锁。在自动锁定的方法中，如果同步的对象不是集群对象，则仅获取本地\
  \ JVM 锁。例如，如果 `product` 类型的对象是集群的，并且它维护了对 `productprice` 类型对象的引用，而你排除了对 `productprice`\
  \ 对象的检测，那么当调用 `productprice` 类中的方法时，`product` 将不会在 JVM 集群中更新。\n\n应用于没有同步的方法的自动锁将不会产生集群锁定效果。此外，匹配锁节但不属于\
  \ Terracotta 配置为进行检测的类集合中的类的方法，将不会有集群锁定行为。此类方法对 Terracotta 是不可见的（稍后会详细介绍类检测）。\n\n\
  **锁级别**\n\n锁配置节中的另一个配置选项是锁级别。与 Java 不同，Terracotta 锁有四个级别：\n\n*   write\n*   synchronous-write\n\
  *   read\n*   concurrent\n\n写锁是互斥锁，其行为类似于常规的 Java 锁。它们保证在整个集群中，任何时候只有一个线程可以获取该锁。\n\
  \n同步写锁增加了进一步的保证：持有锁的线程不会释放该锁，直到在该锁作用域下所做的更改已被服务器完全应用并确认。\n\n\n\n■**警告** 虽然同步写入锁定对于保证事务而言看似是个好主意，但其开销很高。当\
  \ Terracotta 服务器等待所有其他 JVM 确认并刷新更改到磁盘时，持有锁的 JVM 将被阻塞。通常情况下，Terracotta 允许线程继续执行并异步等待确认，因此性能差异会很大。\n\
  \n读锁允许多个读取线程同时获取锁，但这些线程在持有读锁期间不得对集群对象进行任何更改。如果任何线程持有读锁，则任何线程都不能获取写锁。如果任何线程持有写锁，则任何线程都不能获取读锁。如果线程在持有读锁时尝试进行修改，Terracotta\
  \ 将抛出异常。\n\n然而，如果它在同一个锁上跨越了另一个锁获取边界（例如，对同一个对象的同步），但该新锁获取边界被配置为写锁，则该线程将尝试将其锁从读锁升级为写锁，并且在获取该升级后的写锁之前将无法继续执行。当多个线程并发执行不修改任何集群对象的代码时，读锁比写锁具有显著的性能优势。\n\
  \n并发锁始终被授予。它们不保护关键代码段，仅作为事务边界。在并发锁范围内所做的更改会自动应用，但无法保证不同线程在并发锁范围内创建的事务的应用顺序。也无法保证在锁内部时，来自其他线程的更改不会被接收并应用到堆内存中。\n\
  \n只有当您既不关心线程之间潜在的写-写冲突，也不关心脏读时，才应使用并发锁。当每个 JVM 都保证处理与其他 JVM 不同的对象，并且 Terracotta\
  \ 用于主/从关系（参见第 11 章）等情况时，并发锁是最佳选择。\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第 76 页\n\n**76**\n\
  \n第 4 章 ■ POJO 集群\n\n**分布式 wait() 和 notify()**\n\n持有集群对象集群锁的线程可以对该对象调用 `wait()`。\n\
  \n这将导致该线程提交当前 Terracotta 事务，释放集群锁，并暂停执行。集群中任何其他持有该对象集群锁的线程都可以对该对象调用 `notify()`。Terracotta\
  \ 服务器将选择一个等待线程（在调用 `notify()` 的情况下）或所有等待线程的集合（在调用 `notifyAll()` 的情况下），并确保通知整个 Terracotta\
  \ 集群中相应的等待线程。\n\n任何被通知的线程都将竞争集群锁，并在获得该锁后恢复执行。\n\n**事务**\n\nTerracotta 将对对象所做的更改分批处理成称为事务的集合。一个\
  \ Terracotta 事务由锁的获取和随后的释放界定。当线程获取集群锁时，会为该线程启动一个 Terracotta 事务，并且该线程在该锁范围内对集群对象所做的所有更改都会添加到该事务中。当锁被释放时，Terracotta\
  \ 事务被提交，这意味着它被发送到 Terracotta 服务器。（它可能不会立即发送；Terracotta 通过尽可能批量处理事务来优化客户端与 Terracotta\
  \ 服务器之间的通信。）事务按顺序应用，以保持第 1 章中讨论的“先于”关系。当获取锁时，Terracotta 保证在 Terracotta 集群中每个 JVM\
  \ 的该锁范围内所做的所有事务都将在获取线程的本地堆上应用。这确保了线程始终看到集群对象的一致视图。\n\n对集群对象的所有更改都必须在 Terracotta\
  \ 事务的上下文中发生。这意味着线程在修改任何集群对象的状态之前必须获取集群锁。如果线程尝试在 Terracotta 事务上下文之外修改集群对象，则会抛出运行时异常。\n\
  \n这种情况的一个特例值得一提，因为它并不明显。如果线程同步在一个尚未集群的对象上，则该线程不会获取集群锁，也不会启动 Terracotta 事务。该线程不得对任何共享对象进行修改，即使该线程同步的对象在该同步范围内变为共享对象。\n\
  \n**分布式方法调用**\n\nTerracotta 提供了一种机制，用于在集群中任何驻留共享对象的地方调用其方法。这种机制称为分布式方法调用（DMI）。在集群对象上调用声明为分布式方法的方法，将触发该对象所有当前恰好实例化在集群中任何\
  \ JVM 堆上的实例执行相同的方法调用。\n\n需要注意的是，分布式方法在定义该方法的共享实例的上下文中工作。同样，无法保证分布式方法何时执行。同样，也无法保证该方法将在哪些\
  \ JVM 上执行，因为该方法是否执行取决于所讨论的对象当前是否在某个 JVM 的堆上。\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第\
  \ 77 页\n\n第 4 章 ■ POJO 集群\n\n**77**\n\nDMI 是实现分布式监听器模型的有用机制。然而，它并不是协调不同 JVM 中线程之间的操作或共享数据的好方法。对于这些目的，`java.util.concurrent`\
  \ 包是更合适的选择。\n\n**透明性与字节码增强**\n\n到目前为止，我们已经讨论了 Terracotta 如何增强您的应用程序代码以赋予其集群范围的意义，但我们还没有确切讨论这是如何发生的。Terracotta\
  \ 透明性背后的基本机制是字节码增强。Java 类被编译成字节码指令，这些指令必须在创建这些类的新实例之前由 JVM 加载。该加载字节码的过程使 Terracotta\
  \ 有机会在您的类被应用程序使用之前检查和操作它们的字节码。\n\n这些技术最初是为了实现 AOP 而开发的，目前广泛用于像 Spring 这样的框架中。\n\n\
  Terracotta 可以配置为增强加载到 JVM 中的所有类或仅增强其中的一个子集。您可以选择增强所有类，以确保 Terracotta 能够在运行时洞察您的业务逻辑对内存所做的所有操作。然而，出于性能原因，通常将\
  \ Terracotta 增强的类集限制为仅那些您知道会与集群对象交互的类是有益的。请记住，如果一个类没有被增强，那么它对 Terracotta 来说基本上是透明的。由未被增强的类对集群对象所做的任何更改都不会反映在集群中。\n\
  \n同样重要的是要注意，即使某个类的实例本身没有被集群，该类的代码也可能操作集群对象。这意味着您必须增强的类集不仅仅是其对象可能被集群的类集，而是操作共享对象的类集。\n\
  \n\n\n被检测的类集合由 Terracotta 配置中的 `<instrumented-classes>` 部分决定。在 HelloClusteredWorld\
  \ 中，我们配置 Terracotta 检测所有类。要缩小被检测类的范围，你可以修改 `<include>` 或 `<exclude>` 语句中的类选择表达式。与你之前在锁部分看到的方法表达式类似，类表达式是\
  \ AspectWerkz 连接点选择模式语言的一部分。\n\n`<include>` 和 `<exclude>` 语句根据它们在 Terracotta 配置文件中的顺序自下而上进行评估。第一个匹配的模式将决定该类是否会被检测。如果没有模式匹配，该类将不会被检测。\n\
  \n通过组合使用 `<include>` 和 `<exclude>` 类表达式，你可以精确挑选出想要包含进来进行检测的类集合。\n\n<instrumented-classes>\n\
  \n<include>\n\n<class-expression>com.mycompany.pkga.*</class-expression>\n\n</include>\n\
  \n<exclude>com.mycompany.pkga.subpkg.*</exclude>\n\n<include>\n\n<class-expression>com.mycompany.pkgb.*</class-expression>\n\
  \n</include>\n\n</instrumented-classes>\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第 78 页\n\
  \n**78**\n\n第 4 章 ■ 简单 Java 对象集群\n\n在前面的示例中，包 `com.mycompany.pkgb` 及其下所有子包中的每个类都会被检测。然而，`com.mycompany.pkga.subpkg`\
  \ 及其下任何子包中的类都不会被检测。但是，包 `com.mycompany.pkga` 及其下所有子包中，*除了* `com.mycompany.pkga.subpkg`\
  \ 及其子包之外的每个类都会被检测。你也可以使用类名模式以及包模式来微调包含的类集合。\n\n■**注意** 某些类会被 Terracotta 自动检测。当创建引导\
  \ JAR 时，这些类会被自动放入 Terracotta 引导 JAR 中。\n\n**可移植性**\n\nTerracotta 可以对大多数 Java 对象进行集群，但可以添加到\
  \ Terracotta 集群中的对象是有限制的。能够被 Terracotta 集群的对象称为可移植的。任何对象要具有可移植性，其类必须被检测。\n\n大多数被检测类的实例是可移植的，但可移植性存在一些限制。某些对象本质上是不可移植的，因为它们代表了\
  \ JVM 特定或主机特定的资源，这些资源在集群上下文中没有意义。一些与文件系统相关的类，例如 `java.io.FileDescriptor`，就是本质上不可移植的主机特定资源的例子。`java.lang.Thread`\
  \ 和 `java.lang.Runtime` 的实例则是本质上不可移植的 JVM 特定资源的例子。\n\n其他不可移植的对象是那些继承了本质上不可移植类、未被检测的类或逻辑管理对象类（稍后会详细介绍逻辑管理对象）的类的实例。\n\
  \n**引导 JAR 类**\n\n如果你需要，大多数类可以在类加载时被检测。然而，有些类在 JVM 生命周期中加载得太早，以至于 Terracotta 无法介入它们的加载过程。这些类无法在加载时被检测，而必须预先被检测并放入一个特殊的\
  \ JAR 文件中，然后将该文件附加到引导类路径的前面。\n\n引导 JAR 中的某些类是由 Terracotta 自动放入的。其他类可以通过扩充 Terracotta\
  \ 配置，将它们包含在 Terracotta 配置的引导 JAR 部分，然后运行 Terracotta 安装目录下 `bin` 目录中的 `make-boot-jar`\
  \ 脚本来添加到引导 JAR 中。\n\n当你启动应用程序时，必须将引导 JAR 的位置作为 JVM 参数传递给 `java` 命令。你可以运行 Terracotta\
  \ 安装目录下 `bin` 目录中的 `dso-env` 脚本来查看如何将引导 JAR 添加到你的 JVM 参数中。\n\n**物理管理对象与逻辑管理对象**\n\
  \n大多数对象通过在其字段数据在 Terracotta 集群中移动来进行管理。这些类别的对象被描述为物理管理的，因为 Terracotta 记录并分发对象物理结构的更改。当物理管理对象的某个字段发生变化时，该字段的新值会被发送到\
  \ Terracotta 服务器以及当前在内存中拥有该已更改对象的 Terracotta 集群的其他成员。\n\n然而，某些类别的对象并非以这种方式共享。我们不是移动这些对象的物理结构，而是记录在这些对象上调用的方法以及这些方法调用的参数，然后在\
  \ Terracotta 集群的其他成员上重放这些方法调用。这些类别的对象被描述为逻辑管理的，因为 Terracotta 记录并分发对它们执行的逻辑操作，而不是记录对其内部结构的更改。\n\
  \nTerracotta 使用逻辑管理要么是出于性能原因，要么是因为类的内部结构是 JVM 特定的。例如，使用哈希结构的类，如 `java.util.Hashtable`、`java.util.HashMap`\
  \ 或 `java.util.HashSet`，是逻辑管理的。用于创建这些类内部结构的哈希码是 JVM 特定的。如果一个具有基于 JVM 特定哈希码的结构的对象被物理管理，那么它在\
  \ Terracotta 集群中其他 JVM 上的结构将是不正确且无意义的，因为那些其他 JVM 上的哈希码会不同。\n\n其他类被逻辑管理，是因为对它们的更改可能涉及其内部结构的大规模重组。虽然这些内存中的重组以可接受的延迟发生，但它们会在集群中引发一连串的集群对象更改。例如，当基于数组的\
  \ List 进行重新平衡或重新排序时，就会发生这种情况。Terracotta 不是镜像这些对象的精确内部结构，而是跟踪被调用的方法。通过重放方法调用序列可以使对象更新，这会在内存中更新对象内部的内部数据结构。\n\
  \n**不可移植类和逻辑管理类**\n\n你之前已经看到，在其类型层次结构中包含不可移植类的类是不可移植的。未被检测类的子类属于此类别，同样，本质上不可移植类（如\
  \ `java.lang.Thread`）的子类也属于此类别。\n\n虽然逻辑管理类本身是可移植的，但对于在其类型层次结构中包含逻辑管理类的类的可移植性存在一些限制。这源于\
  \ Terracotta 实现逻辑管理类的技术细节。\n\n如果逻辑管理类的子类声明了额外的字段，那么该类在以下情况下是不可移植的：\n\n• 它直接写入在逻辑管理父类中声明的字段。\n\
  • 它重写了在逻辑管理父类中声明的方法。\n\n如果你发现某个类因为继承自一个因未被检测而不可移植的类而变得不可移植，你可以修改 Terracotta 配置，将类型层次结构中的所有类都包含进来进行检测。但是，如果你发现某个类由于其他继承限制而不可移植，则必须重构你想要使其可移植的类，使其不违反继承限制。\n\
  \n986-1 CH04.qxd 5/6/08 3:01 PM 第 80 页\n\n**80**\n\n第 4 章 ■ 简单 Java 对象集群\n\n**可移植性上下文**\n\
  \n存在多种上下文，在这些上下文中对象会被 Terracotta 共享。在每个上下文中，都会检查即将被共享的对象的可移植性。如果存在可移植性错误，Terracotta\
  \ 会抛出一个异常。\n\n**字段更改**\n\n\n\n当已共享对象的某个字段发生变化时，会检查新分配给该字段的对象是否可移植。如果该对象不可移植，Terracotta\
  \ 会抛出可移植性异常。\n\n如果新引用的对象本身是可移植的，则会遍历其对象图。如果新引用对象可到达的任何对象不可移植，Terracotta 会抛出可移植性异常。\n\
  \n**逻辑操作**\n\n在逻辑管理对象上调用会改变该对象状态的方法，称为逻辑操作。调用此类方法时，会检查该方法的参数是否可移植。如果其中任何对象不可移植，Terracotta\
  \ 会抛出可移植性异常。\n\n如果参数对象本身是可移植的，则会遍历其对象图。如果参数对象可到达的任何对象不可移植，Terracotta 会抛出可移植性异常。\n\
  \n**对象图遍历**\n\n当对象通过上述任一机制（包括通过字段赋值加入另一个共享对象的对象图，或成为逻辑共享操作的参数）变为共享时，Terracotta 会遍历该对象图中所有可到达的对象。\n\
  \n在此遍历过程中，如果遇到任何不可移植的对象，Terracotta 会抛出可移植性异常。\n\n**瞬态字段与加载时行为**\n\n如果你想要集群的对象的某个字段不可移植，你有两个选择：\n\
  \n• 重构代码以移除不可移植的字段。\n\n• 将该字段声明为瞬态。\n\nTerracotta 中的瞬态字段类似于 Java 中的瞬态字段：在共享对象图时，它会在对象图遍历中被忽略。你可以在\
  \ Terracotta 配置中像这样将字段声明为瞬态：\n\n<transient-fields>\n\n<field-name>com.mycompany.pkga.MyClassOne.fieldA</field-name>\n\
  \n<field-name>com.mycompany.pkgb.subpkg2.fieldB</field-name>\n\n</transient-fields>\n\
  \n986-1 CH04.qxd 5/6/08 3:01 PM 第 81 页\n\n第 4 章 ■ POJO 集群\n\n**81**\n\n你也可以通过在 Terracotta\
  \ 配置的类插桩部分设置 `<honor-transient>` 选项来将字段声明为瞬态。任何匹配指定了 `<honor-transient>` 的 `<include>`\
  \ 语句的类，都会检查 Java 语言中的 `transient` 关键字。源代码中标记为 `transient` 的任何字段都会被 Terracotta 视为瞬态字段。\n\
  \n<instrumented-classes>\n\n<include>\n\n<honor-transient>true</honor-transient>\n\
  \n<class-expression>com.mycompany.pkga.*</class-expression>\n\n</include>\n\n...\n\
  \n</instrumented-classes>\n\n**加载时初始化瞬态字段**\n\n由于瞬态字段会被 Terracotta 忽略，你必须在它们于其他\
  \ JVM 上实例化后负责初始化它们。当 Terracotta 在 JVM 上物化一个对象时，任何瞬态引用字段将为 null，而瞬态原始类型字段将为其默认值。\n\
  \nTerracotta 提供了两种工具来将这些字段初始化为其正确值。在 Terracotta 配置中，你可以指定一个方法，在对象于 JVM 堆上物化时调用。该方法应包含正确的初始化代码。或者，你可以将\
  \ BeanShell 脚本直接写入配置文件，该脚本将在对象加载时执行。\n\n以下配置片段声明了一个初始化方法。它指示 Terracotta 在 JVM 中加载\
  \ `com.mycompany.pkga.MyClass` 的集群实例时，调用 `com.mycompany.pkga.MyClass.myMethod()`。\n\
