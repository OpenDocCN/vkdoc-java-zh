  \ JVM 数量的计数器。如果计数器值为零，说明这是第一个加入集群的 JVM，因此被分配队列读取/打印功能。第一个 JVM 执行初始化任务，实例化共享队列并将其添加到共享队列列表中。对于每个队列，它会生成一个读取线程并创建一个关联的\
  \ `QueueReader` 对象。`QueueReader` 是一个 `Runnable`，因此当它的线程启动时，会调用 `QueueReader.run()`\
  \ 方法。`QueueReader.run()` 方法简单地进入一个 while 循环，从队列中取出元素并将结果打印到 `System.out`。\n\n后续的示例调用将被分配七种颜色之一，同样基于\
  \ `AtomicInteger` 计数器的值。`main()` 方法会为其颜色选择相应的消息队列，并在示例类的一个实例上调用 `run()` 方法。这个 `run()`\
  \ 方法简单地进入一个 while 循环，在其中从可用的 `MOODS` 数组中随机选择一种心情，通过向队列添加一个消息对象来报告其心情，然后休眠一秒钟。向共享队列添加消息对象将导致第一个\
  \ JVM 中阻塞等待从该队列取元素的线程，将该消息对象从队列中移除，打印消息，然后返回队列并阻塞在 `take()` 方法上，直到另一个消息到达该队列。\n\n\
