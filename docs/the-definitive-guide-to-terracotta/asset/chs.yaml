  **模块版本控制**\n\n本章给出的示例在 OSGi 包和 Maven 项目的上下文中都显示了版本号。这两种上下文中的版本控制方案相似但不完全相同。\n\n\
  通常，在使用 Maven 中未发布版本的项目时，你会将该版本称为快照版本。这些版本通常是每日构建，甚至通过持续集成系统更频繁地构建，并且不被认为是稳定的。\n\n\
  Maven 中使用的快照版本标识符与 OSGi 包清单中使用的标识符之间存在一个重要区别。在 Maven 中，SNAPSHOT 版本使用连字符，例如 `2.5.0-SNAPSHOT`。在\
  \ OSGi 中，这将是一个无效版本，我们必须改用句点，例如 `2.5.0.SNAPSHOT`。在你的 `tc-config.xml` 文件的模块部分中，两种形式都可以使用；Terracotta\
  \ 模块解析器会找到该模块，但更推荐使用带连字符的 `-SNAPSHOT` Maven 形式。\n\n在 Maven POM 中，依赖项会附带一个版本，在这种情况下，Maven\
  \ 正在解析依赖项，因此必须使用 Maven 形式（`-SNAPSHOT`）。类似地，在 Maven 项目版本中，必须使用 `-SNAPSHOT` 形式。\n\n\
  对于由 Maven 构建的 TIM 项目，Terracotta Maven 插件中包含的 Terracotta 清单插件将自动从 Maven 的 `-SNAPSHOT`\
  \ 版本构建具有正确 `.SNAPSHOT` 形式的包。\n\n总之，你应该在所有 Maven 文件和 Terracotta 配置文件中使用 `-SNAPSHOT`\
  \ 形式。唯一必须使用 `.SNAPSHOT` 形式的地方是在不使用 Maven 构建 TIM 时的包清单中。\n\n**在 TIM 中包含代码**\n\n在本章前面，我们提到过在\
  \ TIM 中不仅可以包含配置，还可以包含代码。现在让我们考虑一下为什么要这样做以及如何做到这一点。Terracotta 的\n\n986-1 CH09.qxd\
  \ 5/28/08 10:42 AM 第 214 页\n\n**214**\n\n第 9 章 n 集成模块\n\n理念是通过应用外部配置来透明地分发应用程序或库的状态。在大多数情况下，适当并发的应用程序，甚至许多非并发的应用程序，都可以通过外部配置在集群环境中工作。\n\
  \n\n\n你可以在 TIM 中包含代码，以实现 terracotta.xml 文件片段中能够完成的任何功能。除非你需要通过反射或动态方式对大量类、锁等进行检测（这种情况下通过代码进行检测可能更高效或更易于维护），否则像这样编写配置代码通常没有实际用途。\n\
  \n你还可以包含能够在运行时通过替换或修改他人提供的类来实际修改现有库或应用程序的代码。如果需要这样做，通过 TIM 向应用程序包含或贡献代码是唯一的解决方案，因为这在\
  \ XML 配置中无法实现。\n\n本章的其余部分将详细探讨如何以实现这两个目标的方式贡献代码，并创建使用这些代码的 Bundle。\n\n**定义 Bundle\
