  \ `Main` 类非常相似，区别仅在于组件之间的关系是用 XML 而非 Java 声明的。\n\n此示例中的每个 bean 都被声明为单例（singleton），这意味着每个应用上下文中每个\
  \ bean 只有一个实例。\n\n将此应用转换为使用 Spring 的最后一步是添加一个 `main()` 方法，该方法启动应用上下文的创建、装配 bean，并在\
