  \ 根）。\n\n//~ 检索 foo 对象\n\nsession.beginTransaction();\n\nObject foo = { Hibernate\
  \ HQL }\n\nsession.getTransaction().commit();\n\n//~ 存储在映射中\n\nmyClusteredeMap.put(\"\
  fooObject\", foo);\n\n**将分离对象存储在集群缓存中**\n\n对于您的应用程序而言，将分离实例存储在集群缓存中可能比使用 HashMap\
  \ 效果更好。集群缓存实现通常具有更多功能，例如项目的过期时间，并且在需要比 Map 接口提供的功能更复杂的功能时，它是一个不错的选择。\n\n986-1 CH06.qxd\
  \ 5/27/08 7:35 PM 第 143 页\n\n第 6 章 n HIBERNATE 与 TERRACOTTA\n\n**143**\n\n要将分离实例存储在集群缓存中，只需使用第\
  \ 5 章中概述的技术配置一个集群缓存，并将对象存储在缓存中：\n\n//~ 检索 foo 对象\n\nsession.beginTransaction();\n\
  \nObject foo = { Hibernate HQL }\n\nsession.getTransaction.commit();\n\n//~ 存储在缓存中\
  \ (ehcache)\n\nmyCache.put(new Element(\"fooObject\", foo));\n\n重新附加分离实例\n\n在应用程序业务逻辑的某个时刻，您必须将分离实例写回数据库。应用程序中的这个时刻标志着长时间运行工作单元的结束。这些时刻因应用程序而异，但典型的例子包括在标准购物车应用程序中选择“购买”选项后执行的业务逻辑，或多屏幕\
  \ Web 流程的完成阶段。要重新附加分离对象，只需使用 Hibernate 的 `saveOrUpdate()` API：\n\n//~ 从 HTTP 会话获取对象\n\
  \nObject foo = request.getAttribute(\"fooObject\");\n\n//~ 将对象刷新到数据库\n\nsession.saveOrUpdate(foo);\n\
  \nsession.getTransaction().commit();\n\n//~\n\n进一步阅读建议\n\n有关使用分离实例的更多信息，您应参考 Hibernate\
  \ 文档第 10.6 节，位于 [`www.hibernate.org/hib_docs/reference/`](http://www.hibernate.org/hib_docs/reference)\
  \ en/html/objectstate.html。\n\n**调试、测试和调优注意事项**\n\n通常，调试和调优 Hibernate 和 Terracotta\
  \ 是分开进行的。您应根据 Hibernate 文档第 19 章中描述的最佳实践来调优您的 Hibernate 设置：[`www.hibernate.org/hib_docs/reference/en/html/`](http://www.hibernate.org/hib_docs/reference/en/html)\n\
  \n\n\nperformance.html。即使使用分离模式，也请先在单个 JVM 上运行单元测试，确保应用程序在正确的位置调用 `saveOrUpdate()`。确认数据能够到达数据库，并且不存在竞态条件。然后再将\
  \ Terracotta 加入组合中，用于二级集群缓存以及集群化和持久化分离对象。\n\n当同时使用这两种技术时，有一些基本事项需要了解。这些注意事项将在以下各节中介绍。\n\
  \n986-1 CH06.qxd 5/27/08 7:35 PM 第 144 页\n\n**144**\n\n第 6 章 n HIBERNATE 与 TERRACOTTA\
  \ 集成\n\n**验证 Ehcache 配置集群**\n\n您可以通过以下三种方式之一来识别您的 Ehcache 是否已集群：\n\n• 使用 Terracotta\
  \ 管理控制台检查 Ehcache 存储中的数据。\n\n在控制台中，从左侧面板打开“根”选项卡，查找名为 `net.sf.ehcache.CacheManager.singleton`\
  \ 的根。此自动根由 Terracotta Ehcache TIM 为 Ehcache 单例创建，它包含所有 Ehcache CacheManager 实例。如果您看到此条目，则说明您的\
  \ Terracotta 配置已正确配置为集群 Ehcache。\n\n• 在您的 `hibernate.xml` 中启用 Hibernate SQL 调试属性，以确保缓存命中不会输出\
  \ SQL：\n\n<!-- 将所有执行的 SQL 输出到 stdout -->\n\n<property name=\"show_sql\">true</property>\n\
  \n• 使用 Hibernate 中的 Statistics 对象在运行时查询二级缓存的命中次数和未命中次数：\n\nStatistics stats = HibernateUtil.getSessionFactory().getStatistics();\
  \ stats.setStatisticsEnabled(true);\n\nQueryStatistics queryStats = stats.getQueryStatistics(\"\
  from Event\"); queryStats.getCacheHitCount();\n\n**调优二级缓存**\n\n通常，您使用的调优策略应与 Hibernate\
  \ 文档第 19.2 节中概述的策略相同。当与 Terracotta 一起使用时，您需要考虑一些特殊情况。\n\n您应确保缓存条目配置了适当的 TTL（生存时间），以防止缓存随时间增长过大。借助\
  \ Terracotta 网络附加内存，您的应用程序可以使用比本地 JVM 中可分配的虚拟空间大得多的空间。这通常是一个有利且期望的好处，但您需要确保不会滥用此功能，在二级缓存中存储超出预期的数据。Ehcache\
  \ 可以在构造 CacheManager 时指定 TTL 设置，也可以通过 Ehcache 配置文件进行控制。有关最大空闲生存时间和最大空闲时间的更多详细信息，请参阅\
  \ Ehcache 文档。\n\n当引用局部性较高时，所有缓存的性能最佳。现在，我们快速提醒您主板类比。引用局部性是指特定 CPU 指令集所需的数据在该 CPU\
  \ 的数据缓存中可用的状态：访问数据不需要磁盘或网络 I/O。有关引用局部性（涉及 Terracotta 和 JVM 级集群）的更多信息，请参见第 12 章。如果您的应用程序引用局部性较低，或者主要执行写入操作而非读取操作（即写入密集型），则应考虑使用缓存是否有助于提高应用程序性能，或者该缓存是否只是在不必要的垃圾回收中浪费内存和\
  \ CPU。\n\n986-1 CH06.qxd 5/27/08 7:35 PM 第 145 页\n\n第 6 章 n HIBERNATE 与 TERRACOTTA\
  \ 集成\n\n**145**\n\n**调优分离实例**\n\n由于分离实例只是 POJO，因此调优它们与使用 Terracotta 调优 POJO 或分布式缓存实例并无不同。有关更多信息，请参阅第\
  \ 12 章了解一般调优信息，或参阅第 5 章了解调优分布式缓存性能的具体信息。\n\n**总结**\n\n本章展示了将 Hibernate 应用程序从单节点迁移到集群环境时面临的挑战。Terracotta\
  \ 不仅能够缓解这些挑战，还能提升整个集群的应用程序性能。\n\n将 Terracotta 与启用 Hibernate 的应用程序集成有两种主要策略：\n\n\
  • 使用集群化的 Ehcache 实现作为二级缓存\n\n• 在会话外部对 Hibernate 创建的 POJO 进行集群化，也称为分离实例\n\n在第 5 章中，您了解了分布式缓存，现在您对缓存范式以及\
  \ Terracotta 如何帮助 Hibernate 应用程序从数据库分离有了更深入的理解。在第 7 章中，我们将探讨使用 Terracotta 对 Web\
  \ 应用程序进行集群化。我们将学习如何以透明、高可用的方式共享 HTTP 会话信息。对于基于 Hibernate 的应用程序，HTTP 会话被证明是我们可以存储分离\
  \ POJO 的一个位置。此外，可扩展且高可用的 HTTP 会话集群可以帮助我们将某些 Web 会话数据完全保留在数据库之外。\n\n集群化的 HTTP 会话为我们提供了另一种无需借助数据库即可共享状态的方式。通过这些不同的集成点，我们可以开始看到\
  \ Terracotta 为我们提供的远不止一个分布式缓存库——Terracotta 为我们提供了一个通用解决方案，当我们在跨 Java 进程扩展的现有应用程序中遇到任何和所有挑战时，都可以使用它。\n\
  \n986-1 CH06.qxd 5/27/08 7:35 PM 第 146 页\n\n986-1 CH07.qxd 5/29/08 8:12 AM 第 147\
  \ 页\n\n第 7 章\n\n使用 Terracotta 扩展 HTTP 会话\n\n**H**TTP 会话传统上用于 Web 应用程序，其中状态存储在服务器端。虽然这种方法在单台服务器上很方便，但一旦您的应用程序增长并且需要多台服务器来满足负载，会话就可能成为性能瓶颈和开发负担。\n\
  \n在本章中，我们将探讨 Terracotta 如何使在集群中处理 HTTP 会话像在单台机器上一样方便。您将看到每个缺点是如何被解决的，以及将 Terracotta\
  \ 集成到标准 Java Web 应用程序中是多么容易。\n\n**什么是 HTTP 会话？**\n\n网站早已超越了其最初的静态特性，现在具有高度交互性，有时甚至是成熟的应用程序。为了使这些应用程序正常工作，每个用户都需要能够在与网站交互期间维护一个状态。使万维网如此普及的\
  \ HTTP 规范从未发展到为这种状态管理提供解决方案。它的一些特性，如查询字符串参数和 cookie，结合隐藏的 HTML 表单参数，确实允许满足某些应用程序状态管理需求。然而，这些功能相当有限，当应用程序状态变得更大且需要保护时，诸如\
  \ Servlet 容器之类的技术提出了将用户数据存储在服务器上的解决方案。图 7-1 描绘了由应用服务器维护的 HTTP 会话状态与由 Web 浏览器维护的\
  \ cookie 状态之间的区别。\n\n**147**\n\n986-1 CH07.qxd 5/29/08 8:12 AM 第 148 页\n\n**148**\n\
  \n第 7 章 n 使用 TERRACOTTA 扩展 HTTP 会话\n\n**图 7-1.** *应用服务器代表 Web 浏览器管理的 HTTP 会话状态*\
  \ **服务器端状态管理**\n\n\n\n每个与网站交互的用户在未进行身份验证前，默认都是匿名的。这与桌面应用程序存在根本性差异——在桌面应用中，只要操作系统在登录时验证了用户身份并授予其访问文档的权限，该交互用户就被视为可信的。Web\
  \ 应用依赖于一台被众多用户从不同计算机和设备、在任何地点访问的服务器。这使得准确掌握谁有权访问哪些数据变得更加困难。HTTP 规范并未为此提供便利，导致人们不得不采用自定义解决方案来处理此问题。历史上最流行的解决方案是：当用户开始使用应用时，立即为其分配一个包含唯一标识符的\
  \ Cookie。每当用户与 Web 应用交互时，Web 浏览器都会提交这个唯一标识符。服务器端的逻辑随后能够查找与该凭证对应的数据，并据此为该特定用户定制应用功能。\n\
  \n通过 Java EE Servlet 规范，HTTP 会话接口为开发者提供了一个标准 API，使其能够精确实现上一段所述的功能。开发者无需关心如何发放 Cookie\
  \ 以及如何将这些 Cookie 与数据关联的实现细节。他们只需启动一个用户会话，就能以隔离的方式轻松存储和检索数据。所有这些数据都保留在服务器内存中，并且根据\
  \ API 的实现方式，可以存储在文件系统或数据库等多种位置。\n\n该 API 非常简单；要创建新会话或检索现有会话，只需在容器提供给 Servlet 的 HTTP\
  \ 请求实例上调用 `getSession()` 方法即可。可选地，可以提供一个参数来显式创建新会话或检索已存在的会话。清单 7-1 展示了 `HttpServletRequest`\
  \ 接口中相关的方法。\n\n**清单 7-1.** *与 HTTP 会话相关的 HttpServletRequest 方法*\n```java\npublic\
  \ interface HttpServletRequest{\n    HttpSession getSession();\n    HttpSession\
  \ getSession(boolean create);\n}\n```\n\n之后，为了向会话中存储数据或从会话中检索数据，`HttpSession` 接口提供了一个类似\
  \ Map 的简单 API。清单 7-2 展示了相关的方法。\n\n**清单 7-2.** *用于操作会话属性的 HttpSession 方法*\n```java\n\
  public interface HttpSession{\n    Object getAttribute(String name);\n    Enumeration\
  \ getAttributeNames();\n    void removeAttribute(String name);\n    void setAttribute(String\
  \ name, Object value);\n}\n```\n\n这里没有任何复杂之处。关于整个 API 的详细信息可以在 Java Servlet 技术网站\
  \ ([`java.sun.com/products/servlet/`](http://java.sun.com/products/servlet)) 上在线找到，该网站对于本书范围之外的专题（如\
  \ HTTP 会话的一般用法）是很有用的资源。我们将重点关注最重要的特性，以及它们如何通过 Terracotta 与 HTTP 会话的分布式使用相关联。\n\n\
  **陈旧数据的自动超时**\n\nWeb 应用与桌面应用之间的另一个根本区别在于，Web 应用无法判断用户是否已停止使用应用。在桌面上，应用会被退出，或者计算机会被关闭，从而导致所有活动内存被清除。然而，对于\
  \ Web 应用，用户可以在不通知服务器的情况下停止使用，例如，通过访问另一个 URL、关闭浏览器，或者只是离开公共终端。由于 Web 服务器被众多用户访问，为每个可能返回的用户维护会话可能会迅速耗尽所有可用内存。\n\
  \n为了解决这个问题，会话具有自动过期时间，该时间从会话最后一次被使用的请求开始计算。这种过期事件被称为驱逐。如果会话已过期，它将自动失效，所有关联的数据将被清除。过期时间可以通过\
  \ Web 应用的 `web.xml` 配置文件中的 `<session-config>` 部分进行设置，也可以针对每个单独的会话实例以编程方式设置。清单 7-3\
  \ 展示了相关的 `HttpSession` 接口方法。\n\n**清单 7-3.** *与过期时间相关的 HttpSession 方法*\n```java\n\
  public interface HttpSession{\n    long getLastAccessedTime();\n    int getMaxInactiveInterval();\n\
  \    void setMaxInactiveInterval(int interval);\n}\n```\n\n最后访问时间以自 1970 年 1 月 1\
  \ 日午夜（GMT）以来的毫秒数表示，间隔以秒表示。所有 Servlet 容器都有最大不活动间隔的默认值；在 Tomcat 上，这个值是 30 分钟。\n\n\
  **手动失效以清除数据**\n\n尽管会话会自动清除以保护服务器资源，但在许多情况下，手动失效也很有用。最合理的用法是，当用户明确退出应用时，可以进一步节省服务器资源。这可以防止会话数据在过期前一直残留，即使它永远不会再被使用。\n\
  \n另一个有用的技术是，当用户完成一个长时间的事务处理过程，且临时数据不再需要时，使会话失效。在多页面的业务事务或工作流结束时使会话失效，可以确保数据不会在不需要时继续残留——如果关键的会话属性未在正确时间清除，可能会引发问题。使整个会话失效可确保用户从一个干净的状态开始，例如，在完成下单之后。当会话中存储了敏感数据（如信用卡号）时，重新开始变得更为重要。\n\
  \n`HttpSession` 接口为此提供了一个简单的失效方法，如清单 7-4 所示。\n\n**清单 7-4.** *用于手动使会话失效的 HttpSession\
  \ 方法*\n```java\npublic interface HttpSession{\n    void invalidate();\n}\n```\n\n\
  **协调状态修改的事件**\n\n复杂的框架通常通过将全局应用状态等数据元素设置为会话属性，将其与会话关联起来。应用中的每个组件都可以利用这些数据快速访问全局状态，并协调所有组件应如何交互。\n\
  \n这种状态通常与应用的整体生命周期绑定，并且需要在用户正在使用或停止使用它时得到通知。如果实现了 `HttpSessionBindingListener`，Servlet\
  \ 容器会自动发送此类通知。清单 7-5 记录了该接口的方法。\n\n**清单 7-5.** *完整的 HttpSessionBindingListener 接口*\n\
  ```java\npublic interface HttpSessionBindingListerner {\n    void valueBound(HttpSessionBindingEvent\
  \ event);\n    void valueUnbound(HttpSessionBindingEvent event);\n}\n```\n\n无需执行任何特殊操作来启用这些通知。Servlet\
  \ 容器会自动检测会话属性值是否实现了 `HttpSessionBindingListener` 接口。当属性被添加到会话时，会调用 `valueBound`\
  \ 方法；当该值被移除时，会调用 `valueUnbound` 方法。\n\n请注意，我们不建议依赖这些事件来清理应用程序中的系统资源（如 JDBC 连接）。这些资源应独立管理，例如，使用像\
  \ Spring 这样的 IoC 框架。一般来说，一个好的指导原则是让会话纯粹专注于数据，不要让资源渗透到会话中。\n\n**会话状态持久化**\n\n\n\n\
  网站通常被期望能够全天候可用。如果网站提供的信息无故消失，用户会很快感到沮丧，而这种沮丧通常会转化为重复访问量的减少。这种期望转化为对底层应用高稳定性和可预测延迟的要求，进而要求其数据完全可用。遗憾的是，用于运行应用的基础设施很少是毫无问题的。软件和硬件故障都可能意外发生。在故障情况下，重要数据应受到保护，并在故障服务器恢复运行时自动重新可用。\n\
  \n会话状态持久化提供了从一个 JVM 故障转移到另一个 JVM 的能力。虽然这不是标准规范的一部分，但大多数 Servlet 容器都提供了一种解决方案，允许你通过配置参数开启此功能。Apache\
  \ Tomcat 甚至默认启用了此功能。通常，这些持久化实现会将所有会话属性序列化到磁盘，并在服务器重启时从磁盘反序列化以重建会话。然而，像这样持久化会话状态存在缺点，例如对处理能力的需求更高、磁盘利用率更高，并且要求所有包含会话属性的值类都必须实现`Serializable`接口。不过，在大多数情况下，能够持久化会话是在不同服务器间复制会话的基础。Terracotta\
  \ 采用了一种完全不同的方法来分发 HTTP 会话，从而避免了会话持久化的这些大部分陷阱。\n\n**分布式 HTTP 会话**\n\n随着网站受欢迎程度的提高，其服务器上的负载也会增加。响应这种对资源日益增长的需求的能力被称为可伸缩性。当服务器宕机时，将这些用户无缝迁移到另一台服务器的能力是可用性挑战的重要组成部分。如第\
  \ 1 章和第 2 章所述，Terracotta 使得跨机器分布应用变得更加容易。\n\n986-1 CH07.qxd 5/29/08 8:12 AM 第 152\
  \ 页\n\n**152**\n\n第 7 章 n 使用 Terracotta 扩展 HTTP 会话\n\n对于 Web 应用，使用 Terracotta 意味着一个负载均衡器、通过\
  \ DSO 进行的会话分发以及一个 Web 应用服务器就足以实现可伸缩性和可用性。借助 Terracotta，在集群中运行的服务器将像一个巨大的 Web 应用服务器一样工作，用户不会注意到单个服务器的性能或可用性问题。使用分布式\
  \ HTTP 会话是在支持 Terracotta 的集群中共享 Web 应用状态的一种简单方法。\n\n**使用 HTTP 会话的动机**\n\n当为 Web\
  \ 应用创建集群时，用户不应担心他们在连接应用时哪台服务器可用。如果用户必须检查哪台机器负载最低并连接到那台机器，他们会感到沮丧——他们应该能够直接连接到应用，并让后端自动选择最合适的服务器。此外，由于用户在使用\
  \ Web 应用时可能需要很长时间，因此应该能够在任何时刻（而不仅仅是在应用启动时）选择正确的服务器。为了实现这一点，Web 应用的状态必须能够从一台服务器传输到另一台服务器。\n\
  \n从其他节点访问会话状态\n\n通常，当将一个任意应用转变为集群化应用时，开发人员被迫寻找包含需要在不同集群节点间共享的状态的类。带有会话的 Web 应用比任意应用更容易集群化，因为所有服务器端的应用状态都存储在这些会话中。因此，HTTP\
  \ 会话可以扩展为一个 API，用于透明地处理 Web 应用集群中的状态。\n\n开发人员随后只需关注确保所有条件都满足，以便会话能够被分发。由于这并非标准化，每个\
  \ Servlet 容器和应用服务器供应商都有自己实现分布式 HTTP 会话的方式。我们不会详细讨论这些。\n\nWeb 容器倾向于将会话数据存储在数据库中，或者在应用服务器网络间复制会话。让我们专注于网络复制，因为那些可伸缩性最好的容器不使用数据库来存储会话。网络复制意味着会话数据被复制到集群中的其他服务器。这样，如果用户被重定向到任何其他服务器，数据都是可用的。一些供应商在此提供了优化，例如，在其他服务器上惰性拉取会话，而不是持续推送所有数据。然而，一种常见的方法是，每次会话发生变化时（即使只是一个值发生变化），都将整个会话序列化并传输到集群中的其他节点。可以想象，一旦在集群中启用复制，这个过程会产生相当多的网络通信，并带来巨大的\
  \ CPU 需求。开发人员还应注意不要将 Java 无法序列化的对象添加到会话中；因此，所有参与应用状态的类都必须实现`Serializable`接口。在下一节中，你将看到\
  \ Terracotta 如何解决所有这些问题。\n\n动态水平扩展以应对流量峰值\n\n除了允许随着应用用户数量的增加，通过向集群添加新节点来使服务器基础设施随时间增长之外，分布式\
  \ HTTP 会话对于动态响应流量峰值也非常有用。\n\n986-1 CH07.qxd 5/29/08 8:12 AM 第 153 页\n\n第 7 章 n 使用\
  \ Terracotta 扩展 HTTP 会话\n\n**153**\n\n如今，Web 应用在短时间内因用户群体的发现而变得极其流行的情况并不少见。这种基于网络的口碑传播可能令人担忧，就像通常所说的“Slashdot\
  \ 效应”——这指的是当一篇新闻公告被发布到一个非常受欢迎的网站（如 Slashdot.org）的首页时，该网站的用户数量会突然急剧增加。每次有新闻公告即将发布时就投资硬件和重新配置集群，在经济上是不可行的。更糟糕的是，由于其他人可能会意外地撰写此类文章，网站可能会在没有预警的情况下被大量用户涌入，并立即变得无法响应。\n\
  \n服务器虚拟化解决方案在此提供了帮助。像亚马逊弹性计算云（EC2）这样的服务允许预先准备服务器的磁盘镜像（参见[`aws.amazon.com/ec2`](http://aws.amazon.com/ec2)）。可以设置一个集群来监控每个参与服务器的负载。每当负载超过一定阈值时，假设存在预先创建的标准磁盘镜像，就可以在几秒钟内启动新的虚拟服务器加入集群。此外，当监控软件检测到集群中的服务器经常空闲时，可以关闭节点以降低运行集群的成本。如果在\
  \ Web 应用集群中使用分布式 HTTP 会话作为共享状态，那么所有状态都将在新节点上可用，并从被移除的节点转移。这是一个典型的例子，说明垂直可伸缩性不合适，而水平可伸缩性能够以适当的成本因素快速动态地适应不断变化的使用模式。\n\
  \nTerracotta 从中央服务器惰性地批处理共享状态操作，从而允许对集群拓扑的动态变化进行高度优化。只有新节点中使用的先前存在的会话才需要被转移。如图 7-2\
  \ 所示。\n\n请注意，只有来自第二个故障应用服务器实例的会话 d、e 和 f 迁移到了新添加的服务器。\n\n\n\n**图 7-2.** *使用 Terracotta\
  \ 实现会话故障转移，仅受影响会话发生迁移*\n\n986-1 CH07.qxd 5/29/08 8:12 AM Page 154\n\n**154**\n\n\
  第 7 章 n 使用 Terracotta 扩展 HTTP 会话\n\n通常，只有很小比例的用户会话会在应用服务器之间移动。新用户可以轻松地被引导至集群中最新加入的节点，因为这些服务器会向任何第\
  \ 7 层负载均衡器（例如 F5 的 Big IP 或 Cisco 的 Content Director 交换机）报告，表明它们比其他所有服务器节点更快且负载更轻。我们想表达的是，现有用户停留在他们最初开始使用的节点上，新用户则使用新添加的服务器，并且在任何时候，任何服务器故障都会导致少量用户会话在整个服务器集群中均匀地重新平衡。类似地，由于中央服务器知晓所有节点的状态，仅关闭其中一些节点也很容易。如果用户需要访问另一个节点上的会话，该会话将由\
  \ Terracotta 即时提供。\n\n如果你想更深入地了解其工作原理，请参阅第 3 章和第 4 章。\n\n服务器故障时的高可用性\n\n软件和硬件迟早会发生故障；你可以确信这一点。如果你的应用程序必须具有高可用性，你需要决定如何应对这些故障。多年来，人们一直在为重要应用程序的每台服务器购买冗余电源、RAID\
  \ 磁盘、热备份系统和其他解决方案，以防止故障发生，并在故障确实发生时减少停机时间。最近，商用硬件已经足够好，可以替代企业级服务器，即使它们缺乏昂贵系统的稳定性保证，例如放置在子板上的\
  \ CPU（以便单个 CPU 故障不会导致服务器崩溃）和双冗余电源。一种新的流行趋势是简单地预期一切都会失败并为此做好计划。对于应用服务器和硬件，该计划往往涉及大量简单、小型、运行英特尔类型技术的服务器，配备几\
  \ GB 的 RAM、小型本地磁盘和机器内的两块网卡。这种方法使整个机器模块化，并在其崩溃时影响较小。故障成为你应用程序设计的一部分，而非例外。\n\n当应用程序状态存储在分布在集群中的会话中时，每个服务器节点都是可丢弃的，并且可以由任何能够处理相同应用程序逻辑的其他机器替换。只要负责分发状态的基础设施也被设计为容错的，状态将通过分布式会话机制提供。Terracotta\
  \ 假设你将在与你运行应用程序大致相同级别的机器上运行 Terracotta 服务器。因此，Terracotta 服务器被设计为在任何问题上自动进行故障转移。中央\
  \ Terracotta 服务器可以配置为让另一台机器作为备用被动服务器。如果活动服务器宕机，被动服务器将自动接管以继续分发会话。第 4 章提供了关于如何配置此功能的更多细节；如果你希望另一台机器无需先启动即可立即接管，其他场景（如多个活动服务器）也是可能的。\n\
  \n**HTTP 会话的替代方案**\n\nHTTP 会话并不总是维护应用程序状态的合适机制。\n\n此外，有时应用程序被设计为将状态外部化到另一层，并旨在使\
  \ Web 服务器无状态。这些方法主要由应用程序需求、用例和设计决策驱动。用于替代分布式 HTTP 会话的两种最重要的方法是分布式缓存和中央数据库存储。\n\n\
  有趣的是，如果应用程序拥有一个可靠且可扩展的集群会话实现，那些严重依赖分布式缓存或中央数据库的应用程序可能对这些存储的依赖会减少。\n\n986-1 CH07.qxd\
  \ 5/29/08 8:12 AM Page 155\n\n第 7 章 n 使用 Terracotta 扩展 HTTP 会话\n\n**155**\n\n在阅读本章剩余部分时请考虑这一点：既然存在可扩展的复制服务，是否有状态可以从你的数据库迁移到\
  \ HTTP 会话？\n\n我们不会详细讨论这些替代方案，但会提供足够的信息，让你能够决定何时使用分布式 HTTP 会话。\n\n分布式缓存\n\n当应用程序状态不与单个用户绑定时，分布式缓存可能更合适。它们的功能与会话类似，但可从整个应用程序全局访问，这意味着可以在请求范围之外轻松访问缓存，并且可以安全地存储由多个会话共享的对象。这种全局可用性也使它们在状态在不同层之间共享时非常有用，例如，Web\
  \ 服务器和桌面应用程序。Terracotta 与许多标准的开源缓存解决方案集成，并且它对常规 JDK 映射的支持足够先进，也可以将它们视为缓存。更多关于分布式缓存的信息可以在第\
  \ 5 章中找到。\n\n数据库作为中央存储\n\n如果应用程序交互性不强，并且主要读取与用户无关的数据，那么使每个 Web 服务器无状态并始终返回中央数据库服务器可能就足够了。这使得每个\
  \ Web 服务器完全可丢弃，运行集群就像添加新机器一样简单，无需协调状态。然而，在每个请求时从数据库检索数据会限制集群的性能，使其受限于数据库的容量。通过在每个\
  \ Web 服务器上添加本地缓存，可以轻松解决此问题，它允许在本地维护最常访问元素的副本，从而显著减少数据库的负载。许多 LAMP（Linux、Apache、MySQL、Perl/PHP）和\
  \ Ruby on Rails 应用程序就是以这种方式创建的。\n\n在 Java 世界中，数据库前面的本地缓存可以替换为使用 Terracotta 的分布式缓存，这使得中央数据库方法在数据定期更新时更加有用。当适当的条目被修改时，只需将它们从分布式缓存中移除。当稍后访问时，最新的条目将被故障转移到缓存中。这种方法构成了对象关系映射解决方案的基础，其中\
  \ Terracotta 作为二级缓存插入。你可以在第 6 章中阅读更多相关信息。\n\n**使用 Terracotta 的分布式 HTTP 会话**\n\n\
  在上一节中，我们讨论了分布式 HTTP 会话的一般原则，并简要提到了 Terracotta 可以在哪些方面改进通常基于复制的方法。在本节中，我们将深入探讨 Terracotta\
  \ 提供的功能，你将看到它们是如何在幕后实现的。\n\n**Terracotta 会话的工作原理**\n\n使用 Terracotta 的分布式 HTTP 会话完全基于我们在第\
  \ 2 章到第 4 章中讨论的虚拟堆原则。一个中央数据根，在这种情况下是容器会话管理器内的会话映射，被分布到整个集群并进行检测，以便任何会话操作对 Terracotta\
  \ 服务器以及应用程序集群都可用。当一个\n\n986-1 CH07.qxd 5/29/08 8:12 AM Page 156\n\n**156**\n\n第\
  \ 7 章 n 使用 Terracotta 扩展 HTTP 会话\n\n\n\n会话创建时，也会被发送到 Terracotta。当读取或访问会话时，其内容可以即时从\
  \ Terracotta 分页调入。当会话更新或删除时，Terracotta 会感知到这些变化。Terracotta 始终确保会话在整个应用集群中保持同步。从开发者的角度来看，一切照旧，应用会自动实现集群化。\n\
  \n透明地嵌入 Web 容器\n\n正如你在本章第一部分所见，HTTP 会话 API 是由 Servlet 规范标准化的。这使得 Terracotta 能够创建自己的实现，并针对我们的分布式虚拟堆进行高度优化。尽管\
  \ Terracotta 能够将任何常规的 Java 类变得可分布式，但仍可进行大量优化以提升集群性能。例如，通过使用自己的会话实现，Terracotta 能够在运行会话驱逐逻辑时避免将属性错误地加载到节点中，或者当会话中仅使用单个属性时，防止传输所有属性。\n\
  \n好消息是，你完全无需担心这个自定义实现。\n\n当 Terracotta 为受支持的 Servlet 容器或应用服务器激活时，它会透明地检测受支持产品的内部机制，使其在基于\
  \ Terracotta 的环境中更好地工作。Terracotta 特有的 Servlet 会话钩子位于你的应用和容器之下，无需任何特定配置。你只需在 Terracotta\
  \ 配置文件中指明需要集群化的 Web 应用名称，其余一切都会自动处理。下一节将展示如何操作。\n\n**注意** 那些跳过章节直接阅读第 9 章的勇敢读者会发现，Web\
  \ 应用的 HTTP 会话集群化并不遵循 Terracotta 集成模块的概念。Terracotta 的会话分发功能早于集成模块。Terracotta 可能会决定将部分或全部特定于容器的会话行为迁移到模块中。目前，使用\
  \ Terracotta 进行会话分发是一个特例，因为 Terracotta 的实现是暴露给用户的，并且必须在分发发生之前安装到容器中。有关各种容器的更多信息，请访问\
  \ [`www.terracotta.org/confluence/display/`](http://www.terracotta.org/confluence/display)\
  \ integrations/Home。\n\n适当的锁粒度与隔离性\n\n锁定的两个方面对集群的性能和并发性有深远影响：粒度和隔离性。通俗地说，锁粒度指的是被锁定的对象与被更改的对象之间的关系。想象一个对象图中的两个对象：一个根对象及其下的五个子对象。锁定根对象来编辑子对象是粗粒度锁定，而锁定子对象自身来编辑它则是细粒度锁定。沿用这个例子，更新隔离性存在或得以维持的条件是：根对象的两个子对象，在彼此独立锁定的情况下，不会互相阻塞、不会混淆字段更新，也不会破坏彼此的状态。\n\
  \n在 HTTP 会话的上下文中，每个会话应该能够独立于其他会话更新其内部状态，同时仍要确保在并发访问期间数据不会被破坏。这包括更新会话最后使用的时间戳。\n\n\
  986-1 CH07.qxd 5/29/08 8:12 AM 第 157 页\n\n第 7 章 n 使用 Terracotta 扩展 HTTP 会话\n\n**157**\n\
  \n类似地，当执行驱逐逻辑以移除过期会话时，整个集群不应需要等待该操作完成。\n\n此外，会话的检索应该以完美的并发方式执行。然而，当存储会话时，应确保对会话存储的独占访问。因此，检索应使用读锁隔离，而存储应使用写锁隔离。\n\
  \n并发性还可以通过许多其他方式进行优化。Terracotta 的会话实现会正确地锁定整个集群中的共享数据元素，以追求最佳性能。\n\n**优势**\n\n在本章前面部分，我们提到了使用\
  \ Terracotta 分发 HTTP 会话的一些优势。本节将涵盖一些额外的重要特性。\n\n无需序列化\n\n正如我们在会话状态持久化部分所讨论的，序列化通常用于将会话状态传输到集群中的另一个节点。Terracotta\
  \ 不依赖于此。在第 4 章中，你了解到 Terracotta 在字节码级别进行嵌入，并且能够将每个 Java 类分解为可以与其它节点共享的基本类型，而无需依赖序列化。\n\
  \n这大大简化了开发者的工作，因为它消除了将单服务器 Web 应用迁移到集群时的担忧。通常，在应用生命周期的早期阶段，大量精力都集中在确保其无缺陷并按预期工作。测试通常在小规模或单元级别进行，而可扩展性测试则在开发工作接近尾声、整个应用可以集中部署时进行。Terracotta\
  \ 的 HTTP 会话支持允许在开发者的工作站上，或者在应用部署到性能实验室或生产环境时，简单地激活集群化，而无需确保会话中的所有类都实现了 `Serializable`\
  \ 接口。使用 Terracotta 进行会话复制的开发者可以编写应用功能单元，使用 JUnit 或任何他们喜欢的工具进行测试，然后在同一台桌面上的两个 JVM\
  \ 上再次测试。\n\n确保数据结构被正确序列化和反序列化也非常容易出错，特别是当数据结构随时间演变，并且旧的持久化状态需要与新的类兼容时。无需担心这一点可以减少开发工作量，并使你的应用更能适应随时间发生的变化。\n\
  \n滚动升级\n\nTerracotta 将共享状态存储在一个逻辑结构中，该结构与共享状态中对象的实际类结构分离。每个类字段都有一个专用的逻辑键，该键与字段的值相关联。当另一个节点检索会话状态时，Terracotta\
  \ 会在实例化会话中的对象时查找这些逻辑键。如果字段已添加到类的较新版本中，则在找不到相应的逻辑键时，这些字段将简单地使用其默认值。一旦这些新字段成为会话状态的一部分，它们的值将以与其他字段相同的方式存储。如果字段被移除，它们的逻辑键将不会被查找，相应的值也不会被应用。换句话说，每个\
  \ JVM 中的类对象决定了哪些字段对你的应用代码可访问，以及访问每个字段的哪个版本。随时间变化的类不会破坏存储在 Terracotta 服务器中的实例。\n\n\
  986-1 CH07.qxd 5/29/08 8:12 AM 第 158 页\n\n**158**\n\n第 7 章 n 使用 Terracotta 扩展 HTTP\
  \ 会话\n\n图 7-3 展示了一个随时间变化的 Web 应用的行为。第一次更改引入了一个新字段，第二次更改移除了一个字段。在图中，会话逻辑的版本 2 和版本\
  \ 3 可以看到会话中的 `age` 对象，而版本 1 则不能。版本 1 从不请求 `age` 对象，因此一切正常。此外，版本 3 是唯一无法看到 `order\
  \ history` 对象的版本，因此它不会对该对象进行操作，而前两个版本仍然可以看到 `order history` 对象，即使集群中存在运行版本 3 应用逻辑的服务器。\n\
  \nord\n\nor er\n\nhistory\n\n**图 7-3.** *当将 Web 应用变更滚动部署到生产环境时，Terracotta 的透明对象版本控制效果良好。*\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n图 7-3 所示的方法允许数据类随时间演变，而不会与现有状态产生向后兼容性问题。因此，您可以自由地使用适合应用程序逻辑的、具有类层次结构的丰富面向对象数据结构。\n\
  \n细粒度变更\n\n第 4 章解释了 Terracotta 的虚拟堆如何能够检测大型对象图中最微小的变化，并仅将该变化暴露给集群。对于分布式 HTTP 会话，也存在同样的好处。无需反复序列化整个会话状态，只有对状态的实际更改才会被使用修改后会话的其他节点拉取。\n\
  \n同步线性可扩展性与高可用性\n\n传统上，平衡可扩展性和高可用性是一个难题。线性可扩展性要求随着投入更多资源来应对应用程序负载，吞吐量保持恒定；这种可扩展性通常通过在应用服务器实例之间不共享任何信息或对象来实现。高可用性要求应用程序状态在每个应用服务器实例上都可用，因此与线性可扩展性相冲突。然而，在\
  \ Web 应用世界中，您必须找到一种方法，在 Web 流量增加时添加应用服务器，同时不引入复制开销。高可用性要求您还应该能够从任何应用服务器处理任何请求，以便在一个或多个应用服务器离线时，用户体验不会中断。\n\
  \n没有 Terracotta，可扩展性和可用性就会相互矛盾。由于 Terracotta 虚拟堆针对细粒度变更进行了优化，并且仅将这些变更推送到集群中需要的地方，因此无论附加了多少节点，附加\
  \ JVM 的吞吐量都可以保持恒定。同时，由于 Terracotta 虚拟堆上的对象是持久的，并且可以根据需要从集群的任何成员中故障导入，因此用户和应用程序状态可以实现高可用性。由于虚拟堆的机制是透明的，这种线性扩展和高可用性之间的平衡无需增加应用程序代码的复杂性即可实现。\n\
  \n要实现线性扩展，您必须部署能够进行粘性会话路由的负载均衡器。\n\n诸如 F5 的 Big IP 或 Cisco 的本地、内容和全局导向器之类的负载均衡器采用各种策略将同一用户路由到同一台机器以处理所有\
  \ HTTP 请求。\n\n一些设备使用最终用户浏览器的 IP 地址。这在规模上不是一个好策略，因为像 AOL 这样的网络为其最终用户使用 Web 代理和缓存；所有\
  \ AOL 用户似乎都来自少数几个 IP 地址之一。\n\n能够感知会话 cookie（在许多流行的 Web 容器中为 `JSESSIONID`）的粘性负载均衡器与底层的\
  \ Terracotta 配合得非常好。在此类环境中，用户将保持粘性到单个应用服务器实例，从而帮助您完全避免会话复制的成本。会话将存储在需要它们的服务器上，同时也存储在\
  \ Terracotta 中，以防应用服务器实例发生故障。在故障转移时，最终用户会被负载均衡器重新路由，因为均衡器检测到原始应用服务器已宕机或响应缓慢。当新的应用服务器实例尝试访问会话时，用户的会话会通过\
  \ Terracotta 动态故障导入到新节点。用户将完全察觉不到节点故障，同时您的集群将实现线性扩展。\n\n每次更改后无需设置属性\n\n由于 Terracotta\
  \ 确保对象标识得以保留，并且所有细粒度变更都会自动传播给共享对象实例，因此实际上无需将属性存储到会话中即可更新集群范围的状态。\n\n其他分布式会话实现无法检测属性值的变化，除非通过\
  \ `setAttribute()` 方法进行通知。在这些情况下，当开发人员将应用程序从单服务器迁移到集群时，他们实际上必须更改代码。一些容器和应用服务器允许您进行配置，以便在每个\
  \ HTTP 请求上自动复制每个会话，即使没有进行任何更改。这减轻了开发负担，但给系统和网络带来了非常高且不必要的负载。\n\nTerracotta 再次表现得与您在单节点上工作时所熟悉的方式完全一样。\n\
  \n易于设置\n\n我们将在第 9 章详细介绍集成模块。它们允许将 Terracotta 配置和检测打包到独立的 JAR 文件中，只需一行 XML 即可将其包含到您自己的\
  \ `tc-config.xml` 文件中。大多数受支持的 Servlet 容器都包含在 Terracotta 核心下载包中。要使用它们，您需要按照 [`www.terracotta.org/`](http://www.terracotta.org)\
  \ 上针对您的特定应用服务器类型的安装说明进行操作。安装包括确保 Terracotta 库已安装到 JVM 中，并且 Terracotta 已作为引导类加载器添加（如第\
  \ 3 章和第 4 章所述）。\n\n少数容器通过集成模块得到支持，只需将其包含在配置文件中即可启用。当以后支持其他应用服务器或 Servlet 容器时，Terracotta\
  \ 将使用集成模块来捆绑它们。在下一节中，我们将演示在引入 Terracotta 时，典型 Tomcat 实例所需进行的更改。\n\n**使用 Terracotta\
  \ 和 HTTP 会话**\n\n是时候抛开理论，看一些实际例子了。我们将研究使用 HTTP 会话的几种方法，以及如何使用 Terracotta 分发会话。\n\
  \n**共享会话状态**\n\n第一个例子非常简单，仅用于说明会话状态是可以分发的。我们维护一个简单的计数器，每次在 Web 浏览器中单击“刷新”按钮时，该计数器都会增加。当计数器达到十时，活动会话失效，计数器重新开始。我们使用\
  \ Java Servlet 实现此功能。该示例的源代码见清单 7-6。\n\n**清单 7-6.** *SessionExample1.java Servlet\
  \ 的源代码*\n```java\nimport java.io.PrintWriter;\nimport java.io.IOException;\nimport\
  \ javax.servlet.ServletException;\nimport javax.servlet.http.HttpServlet;\nimport\
  \ javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import javax.servlet.http.HttpSession;\n\npublic class SessionExample1 extends HttpServlet\
  \ {\n    protected void service(HttpServletRequest req, HttpServletResponse res)\
  \ throws ServletException, IOException {\n        res.setContentType(\"text/html;charset=UTF-8\"\
  );\n        PrintWriter out = res.getWriter();\n        HttpSession session = req.getSession();\n\
  \        Integer count = (Integer)session.getAttribute(\"count\");\n        if (null\
  \ == count) {\n            count = 0;\n        }\n        count = count + 1;\n \
  \       session.setAttribute(\"count\", count);\n        try {\n            out.println(\"\
  <html>\");\n            out.println(\"<head><title>Session Example 1</title></head>\"\
  );\n            out.println(\"<body>\");\n            out.println(\"<p>Current count\
  \ \"+count+\"</p>\");\n            out.println(\"</body>\");\n            out.println(\"\
  </html>\");\n        } finally {\n            out.close();\n        }\n        if\
  \ (count >= 10) {\n            session.invalidate();\n        }\n    }\n}\n```\n\
  示例 Servlet 的 `web.xml` 文件如清单 7-7 所示。\n\n**清单 7-7.** *用于部署示例 Servlet 的 web.xml 文件源代码*\n\
