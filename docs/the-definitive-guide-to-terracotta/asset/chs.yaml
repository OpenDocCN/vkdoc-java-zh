  \ I/O。\n\n**锁定与映射**\n\n清单 5-4 及其在清单 5-6 中的相关配置展示了如何将 Map 包装到自定义的 Cache 类中，并使用自动集群同步在\
  \ Cache 级别指定锁定。清单 5-4 中的 Cache 类省略了所有其他方法，但如果它有像 get() 这样的面向读取的方法，我们建议将该方法的锁定级别指定为\
  \ *read*，而不是 *write*。这将允许集群中的多个读取器并发访问 HashMap。写锁定级别的行为类似于 Java 中的同步块。\n\n如前所述，自动锁定的集合\
  \ TIM 为各种同步集合中的方法提供了自动锁定，并将根据需要正确指定读锁和写锁。\n\n**映射的映射**\n\n使用 Terracotta 插桩版本的 Map\
  \ 实现的好处之一是，Map 中的值可以从 JVM 中逐出，因为它们存储在虚拟堆中。\n\n当需要时，例如在 get() 上，Terracotta 会自动将对象回传到\
  \ JVM。\n\nn**注意** java.util.TreeMap 实现使用逻辑插桩来维护跨集群的内部树结构的排序性质。逻辑插桩记录对 TreeMap 的调用，并在集群中的其他\
  \ JVM 上重放它们。因此，每个 JVM 维护自己的排序树结构。这种技术的一个副作用是，与 HashMap 和 ConcurrentHashMap 不同，值对象永远不会从\
  \ TreeMap 结构中逐出。\n\n986-1 CH05.qxd 5/31/08 8:56 AM Page 120\n\n**120**\n\nC H A\
  \ P T E R 5 n CACHING\n\n然而，HashMap 或 ConcurrentHashMap 中的键值不会从 JVM 中逐出，因此 Map 中的所有键必须适合内存。在非常大的\
  \ Map 的情况下，键集的大小不能超过 JVM 堆大小。例如，如果您的键对象包含一个 100 字节的 String 字段和两个整数字段，则该对象大约为 108\
  \ 字节。如果 Map 包含一百万个键，则键集占用的总内存为 108MB。始终确保键集可以放入 Java 堆中。\n\n可用于解决此问题的一种策略是创建映射的映射。这将允许子映射（即顶层\
  \ Map 的值）在特定节点未使用时被完全逐出。如果使用分区策略，其中每个节点处理数据的一个子集，则顶层 Map 的键应基于相同的分区策略（按 ID 空间、地理位置或任何其他方式）。然后，Terracotta\
  \ 将自然地逐出特定节点上分区未使用的子映射。\n\n**深入探讨缓存**\n\n现在您已经看到了一些使用简单 Map 实现进行缓存的示例，是时候更深入地研究缓存，看看我们如何充分利用\
  \ Terracotta 的强大功能来处理更广泛的共享数据用例。\n\n**逐出与过期**\n\n\n\n在本章开头的简单示例中，我们检查了缓存中是否存在某个用户，并在必要时加载并缓存了该用户。你可能已经注意到，没有任何代码会将用户从缓存中移除。这意味着，随着时间的推移，缓存将无限制地增长，如果每个用户都被访问过，最终可能会包含所有用户。\n\
  \n在某些有限的缓存应用中，这或许是可以接受的。例如，如果缓存中项目的最大数量是固定的，那么缓存就不会无限制地增长。然而，在大多数用例中，我们必须考虑如何将项目从缓存中逐出（移除）。缓存逐出可以基于多种因素，例如大小（当项目过多时逐出）、时间（定期逐出过期元素），或来自某些外部事件的需求。\n\
  \n元素逐出通常遵循基于使用情况或存在时间的策略。最常见的使用情况逐出策略如下：\n\n• *LRU*（最近最少使用）会移除具有最旧最后访问时间戳的项目。\n\
  • *LFU*（最不经常使用）会移除使用次数最少的项目。\n• *FIFO*（先进先出）像队列一样工作，移除最旧的项目，无论其使用情况如何。\n\n其他策略也可能基于特定应用的需求而适用。例如，有时允许项目基于绝对存在时间和使用情况的组合来过期是很有帮助的。\n\
  \n你的应用程序中使用的策略通常取决于应用程序本身。如果你使用的是基于 `Map` 的应用程序，你通常可以完全控制如何以及何时进行逐出，并且可以采用上述任何一种策略。如果你使用的是缓存库，该库通常会提供一个或多个逐出算法，或者允许你插入自己的算法。\n\
  \n作为一个例子，我们稍后将讨论 Terracotta 在与 Ehcache 一起使用时如何支持逐出和过期。\n\n986-1 CH05.qxd 5/31/08\
  \ 8:56 AM Page 121\n\n第 5 章 n 缓存\n\n**121**\n\n**持久化**\n\n在许多情况下，从磁盘获取缓存项比从数据库或其他记录系统检索它更快。在这些情况下，构建使用磁盘来突破可用\
  \ JVM 堆限制的缓存是值得的。许多缓存系统提供了在缓存变得过大时将缓存溢出到磁盘的能力。通常，基于 Java 的缓存框架依赖序列化来持久化到磁盘。\n\n\
  持久化也可以用来避免在启动时重新加载缓存，方法是在关闭时（或定期地）将缓存刷新到磁盘，并在重启时从该备份开始。这可以大大减少在重启进程中预热缓存所需的时间。如果缓存逐出、缓存排序和搜索是需求，那么磁盘缓存通常是一种有风险的架构。磁盘速度很慢，当这些操作从遍历\
  \ RAM 转移到磁盘时，应用程序会变慢。所有这些考虑都意味着，当数据库无法像缓存的磁盘那样快速响应时，溢出到磁盘对于管理数据是有益的，但除非数据库比本地磁盘慢得多，否则溢出到磁盘并不能提高吞吐量或延迟。\n\
  \n**分布式缓存**\n\n当你在多个节点上扩展应用程序时，你也会希望扩展应用程序的缓存。对于只读缓存，你可以在每个应用程序节点上使用独立的缓存。这有些浪费，因为你通常会在多个节点上为任何热点数据从数据库惰性地获取数据，但仍然可以提供一些好处。\n\
  \n对于读写缓存，使用独立的缓存是不可接受的，因为它们会过时，并且当用户访问到包含过时数据的节点时，会体验到不一致的结果。在这种情况下，典型的方法是在节点之间协调缓存的状态。当一个节点修改了缓存中的某个项目时，它会向缓存中的所有其他节点发送一个失效事件。为了在集群中维护缓存一致性，这个失效广播必须等待确认，或者实现一些其他复杂的版本控制方案。失效也基于存在某个更永久的后端存储的假设。\n\
  \n广播和确认存在一些主要问题。最明显的问题是，广播会给缓存系统带来显著的性能损失，这必然会降低缓存的效率。它可能仍然比回到数据库获取数据要快，但它增加了显著的网络开销。此外，广播消息在系统中的所有节点之间引入了耦合，因此一个故障节点可能会感染集群中的其他节点，因为其他节点会等待来自该故障节点的确认。在最坏的情况下，单个故障节点实际上可能导致整个集群宕机，这首先就消除了拥有集群的全部好处。\n\
  \n**分区数据**\n\n分布式缓存的一个重要策略是数据分区的概念。分区涉及跨节点拆分数据集，使得集群中的每个节点处理数据的一个子集，并且某个组件（例如负载均衡器）在集群前端适当地引导流量。分区可以用来减少对广播和集群通信的需求。然而，它也使得高可用性更具挑战性，因为分区缓存的状态只存在于集群中的一个位置。\n\
  \n986-1 CH05.qxd 5/31/08 8:56 AM Page 122\n\n**122**\n\n第 5 章 n 缓存\n\n正如我们在第 2 章中讨论的，你可以基于某个键来划分数据库中的数据，如图\
  \ 5-3 所示。\n\n**图 5-3.** *使用 Terracotta 进行分区（此图与图 2-4 相同。）* 我们将在下一节中看到 Terracotta\
  \ 如何成为分区数据的优秀配套服务。\n\n**利用 Terracotta**\n\nTerracotta 提供了一种可扩展、高可用的技术，用于构建分布式共享数据存储。它解决了分布式缓存的关键问题：持久化、一致性和性能。\n\
  \nTerracotta 提供了一个虚拟的、集群化的、持久的 Java 堆，从而将持久化作为其架构的内在组成部分。没有必要实现或使用一种将缓存溢出到磁盘并使其持久化的缓存技术，因为\
  \ Terracotta 可以通过使用持久的 L2 服务器自动完成此操作。此外，由于该状态是持久的，它在节点启动时可用，并且会在需要时自动故障转移到 JVM 中，无需任何额外设置。\n\
  \nTerracotta 还提供了真正一致的缓存，而无需牺牲可扩展性或性能。缓存中的更改可以在细粒度的字段级别发生，并传播到 Terracotta 服务器集群，而不是直接传播到所有其他应用程序节点。当需要某个缓存数据值时，它会动态地故障转移到需要它的每个节点。这避免了对广播的依赖以及应用程序集群中节点之间的耦合。\n\
  \n性能是任何分布式系统中的关键问题，Terracotta 通过多种技术优化性能。对于 Terracotta 来说，最重要的区别之一是在通过集群传输更新时不使用\
  \ Java 序列化。\n\n\n\n由于变更被捕获在字段级别，因此无需传输整个对象图——只需传输特定的变更值。仅避免序列化这一项，就比许多其他集群数据解决方案（几乎所有方案都依赖某种形式的\
  \ Java 序列化）带来了显著的性能提升。这种性能提升源于 CPU 和堆内存无需为序列化对象数据分配和释放字节数组。\n\n986-1 CH05.qxd 5/31/08\
  \ 8:56 AM 第 123 页\n\n第 5 章 n 缓存\n\n**123**\n\n此外，只需将更新发送到 Terracotta 服务器，而非广播到集群中的每个节点，这也带来了显著的性能提升。最大的性能优势在于\
  \ Terracotta 服务器会计算每个 JVM 所需的补丁更新，并为每个 JVM 的内存提供定制的更新负载。然后 JVM 会自行修补其内存。\n\nTerracotta\
  \ 会根据使用情况自动动态地将对象换入和换出内存，因此它是分区策略中的完美搭档。如果您的缓存分布在集群中，并且对数据的访问是分区的，那么每个节点将处理特定的数据子集。例如，每个节点可以根据用户名的首字母来处理用户。Terracotta\
  \ 自然只会将每个节点上该分区所需的必要数据换入 JVM。因此，每个节点只需在内存中保留与其正在使用的数据完美匹配的那部分数据。这种策略可用于实现高性能和可扩展性。\n\
  \n然而，Terracotta 也解决了跨硬件节点扩展应用时的高可用性问题，因为每个节点在必要时都可以访问所有分布式缓存。如果某个特定节点宕机，负载均衡器将新流量引导至另一个节点，该节点除了其原始分区外，还可以为另一个分区换入对象。\n\
  \n所有这一切都是 Terracotta 透明共享虚拟堆的自动结果，无需应用程序发出任何显式命令。有关如何使用 Terracotta 检测 JVM 故障并自动重启\
  \ JVM 的讨论，请参见第 11 章。服务器会利用称为集群成员事件的功能，向集群成员发送关于节点加入和离开的 JMX 事件。\n\n**使用 Ehcache\
  \ 进行缓存**\n\n在前面的章节中，我们了解了如何使用标准 Java 集合 API 通过 Terracotta 构建共享数据结构。使用共享 Map 很简单，可以满足保存和检索缓存值的需求，但无法处理缓存中元素的驱逐和过期问题。围绕\
  \ Map 构建自定义解决方案当然是可行的，但对于许多用途而言，您会发现使用一个开箱即用就支持驱逐和过期的缓存框架会更简单。\n\n市场上有许多开源缓存框架，Terracotta\
  \ 与其中几个最流行的框架进行了集成。在本节中，我们将了解 Terracotta 与 Ehcache 的集成，Ehcache 是一个优秀且流行的缓存解决方案。Ehcache\
  \ 提供了丰富的缓存功能，包括可插拔的过期和驱逐策略、持久化存储、向您自己的方法传递变更事件，甚至支持分布式缓存。您可以在其网站 [`ehcache.sourceforge.net`](http://ehcache.sourceforge.net)\
  \ 上找到有关 Ehcache 的更多信息。\n\n**重写缓存示例**\n\n为了开始使用 Ehcache，我们将重写清单 5-1 中的简单示例。只需进行少量更改。\n\
