  \n内存读取或写入是由在 JVM 中运行的 Java 指令产生的。现在，请在你的脑海中将对象分解为类定义和实例数据。事实上，这正是 Terracotta 所做的。类定义包含实现业务规则和对象模型的方法。实例数据仅包含内存中的数据。因此，类的实例通过赋值运算符（=）向内存写入数据。而类的实例通过访问运算符（.）从内存读取数据。\n\
  \n\n\nclass MyObject {\n\nint i = 0;\n\n// ...\n\nint playWithMemory( int input\
  \ ) {\n\nint j;\n\nthis.i = input;\n\nj = this.i;\n\nreturn j;\n\n}\n\n}\n\n在运行时，`playWithMemory()`\
  \ 方法中这几行看似无意义的代码会转化为 JVM 指令。第一行转化为一个栈变量分配，占用 4 字节，用于存储变量 `j`。下一行写入堆内存。写入的内存地址是 `this`\
  \ 存储的地址。字段 `i` 的类型大小决定了应用程序意图写入时相对于 `this` 的偏移量。在此例中，`i` 是 `int` 类型，因此偏移量为 4。`playWithMemory()`\
  \ 方法的参数会被复制到我们的实例 `this` 中，从而造成一次 4 字节的堆写入。\n\n下一行代码转化为一次堆内存读取。同样，读取操作发生在实例中存储 `i`\
  \ 的 4 字节偏移处。`i` 的值被复制到名为 `j` 的栈变量中。随着应用程序逻辑的运行，堆访问实际上在 JVM 内部逐行透明地进行。某些逻辑会导致堆内存读取，而另一些则导致写入。当然，JVM\
  \ 除了读写内存外还可以执行许多操作，但 Terracotta 主要关注这两种字节码操作。\n\n我们稍后将用这些内存指令的正式名称来指代它们，但目前请只关注概念本身；在下一节讨论\
