  \n986-1 CH04.qxd 5/6/08 3:01 PM 第 101 页\n\n第 4 章 ■ P O J O 集 群\n\n**101**\n\n■**警告**\
  \ 此示例旨在说明 Terracotta 集群的透明性和简单性。它并未进行性能优化。遍历集群化集合会强制将所有集群化对象集中到一个 JVM 的单个线程中，因此性能不佳。\n\
  \n在单个 JVM 上运行的应用程序中，以这种方式编写业务规则是相当直观的。对 Product 对象的所有引用都指向堆上的同一个对象（堆提供了对象标识）；对该对象的任何修改都能轻易地让持有该对象引用的每个线程可见。但是，由于多层、横向扩展架构中的\
  \ JVM 不共享同一个堆，对象标识被破坏，导致无法通过简单的引用遍历来更改业务数据。\n\n通常，在企业级 Java 应用程序中，要使价格变更在多台机器上可见，您必须在集群中发送消息，或刷新数据库缓存并强制重新加载，或执行某些类似的行为。并且，在每个\
  \ JVM 上，您都必须确保所有相关的 Product 对象都得到相应的更新。\n\n没有 Terracotta，大多数企业级 Java 框架会强制您接受一个管理上下文的概念，对象通过它进行签入和签出。管理器向应用程序线程提供业务实体的副本，以便多个线程可以彼此独立工作，并且运行时的任何异常都不会破坏管理器内部的对象和数据副本。基本上，堆无法保证在应用程序的所有实例中保持一致，因此转而使用副本和管理器。企业软件开发人员已经习惯了被这个问题困扰，以至于他们对于被迫放弃漂亮、清晰的面相对象代码，转而使用复杂的数据外部化框架来保持所有堆同步的做法，已经习以为常。当您无法信任您的对象时，您就无法编写简单的代码。\n\
  \n有了 Terracotta，您就能重新获得所有这些漂亮、整洁的面相对象代码，因为 Terracotta 透明地处理了数据外部化和同步。Terracotta\
  \ 有效地提供了一个所有 JVM 都可以信任的共享堆。浏览示例代码会发现，任何给定的 Product 对象都可能在多个不同的地方被引用：在 Catalog 映射中，以及在用户的\
  \ ShoppingCart 对象中。正如您从涨价操作中看到的，通过遍历任何这些引用对 Product 对象所做的更新，会自动在整个集群中可见，就像它在同一个\
  \ JVM 中对所有线程可见一样。这之所以成为可能，正是因为对象标识得以保留。\n\n由于对象标识在 JVM 之间得以保留，在企业级 Java 应用程序中，通过简单的引用遍历来更改业务数据再次变得安全，同时还能获得多\
  \ JVM 横向扩展架构所提供的可用性和可伸缩性特性。\n\n涨价示例所突出的 Terracotta 的另一个重要且相关的特性是细粒度变更管理。在可信堆上，更改产品对象就像更新相应字段一样简单。不幸的是，传统企业级\
  \ Java 编程所强加的外部化框架通常依赖于某种形式的全对象序列化，或者在最坏的情况下，依赖于全对象图的序列化、复制和同步。这意味着，对对象单个字段的更改通常需要比仅仅在网络上移动该字段并在每个\
  \ JVM 上打补丁多得多的操作。\n\n另一方面，Terracotta 可以在共享堆上执行通常发生在单个 JVM 堆上的 Java 中那种精确的字段修改，而无需诉诸对象或全图序列化。并且，由于\
  \ Terracotta 服务器知道哪些 JVM\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第 102 页\n\n**102**\n\n\
  第 4 章 ■ P O J O 集 群\n\n\n\n共享堆的哪些部分，它可以高效地仅发送为每个 JVM 量身定制的必要更改。Terracotta 细粒度的字段级变更管理是保持共享堆同步的最高效方式。\n\
  \n**总结**\n\n本章我们涵盖了大量内容。首先，我们介绍了使 Terracotta 能够工作的主要概念。然后，我们展示了这些概念如何在实际代码中得以应用。到现在为止，你在\
  \ HelloClusteredWorld 中瞥见的 Terracotta 的强大功能应该已经在你的脑海中逐渐成形。能够编写跨 JVM 工作的普通 Java 代码意味着什么，应该变得越来越清晰。\n\
  \n请记住，你使用 Terracotta 的方式，就像 Java 本身一样，仅受限于你的想象力。Terracotta 的开发始终以可扩展性和高可用性问题为核心，我们将向你介绍\
  \ Terracotta 为这些问题提供的许多解决方案。\n\n但很可能，对于透明且持久的虚拟 JVM 堆，还有许多尚未有人想到的用途。\n\n既然你已经从概念和实践层面理解了\
  \ Terracotta 是什么以及它是如何工作的，接下来的章节将探讨 Terracotta 如何在许多特定的问题领域中使用。\n\n986-1 CH05.qxd\
  \ 5/31/08 8:56 AM 第 103 页\n\n第 5 章\n\n缓存\n\n**缓**存提供数据的临时存储，其访问速度比从更权威的来源计算或获取数据更快。在第一种情况下，计算成本高昂的值被记住，以避免重复执行计算。在第二种情况下，值被记住，以避免从更慢或更昂贵的来源（例如数据库、远程源或文件系统）获取它们。\n\
  \n在本章中，我们将探讨缓存可能对应用程序产生帮助或损害的多种方式。然后，我们将研究 Terracotta 如何解决缓存中的一些常见问题，以及如何将缓存的好处扩展到分布式系统。最后，我们将通过使用基本\
  \ Java 数据结构以及像 Ehcache 这样成熟的开源缓存库来查看缓存的示例。\n\n**缓存的痛点**\n\n虽然缓存是减少延迟或减轻过载记录系统负载的宝贵工具，但它并非没有代价，任何管理过缓存的人都可以证明这一点。这些代价通常表现为以下几种形式：\n\
  \n*   **用空间换时间**：缓存数据必须存储在可访问的位置（例如，RAM 或本地磁盘）一段时间。在该可访问位置的空间成本必须与从源获取结果的成本相权衡。\n\
  *   **新鲜度**：由于缓存不是数据的权威来源，其有用性取决于数据的新鲜程度、新鲜度的重要性以及保持缓存足够新鲜的难度。\n*   **复杂性**：管理空间和新鲜度之间的权衡会引入一定程度的复杂性，这种复杂性可能很快变得难以承受。\n\
  \n让我们花点时间回顾一下缓存管理可能使缓存维护者感到痛苦的一些最常见方式。\n\n**大数据集的痛点**\n\n如果你的数据集中重要的部分（你经常使用以至于值得缓存的部分）适合放入可用的\
  \ RAM，并且其变化足够慢以至于新鲜度不是问题，那么缓存可以简单到将计算结果按唯一标识符存储在映射中，偶尔在缓存条目变旧时使其失效。然而，缓存往往会超出可用\
  \ RAM 的边界。当这种情况发生时，你有几个选择：\n\n*   **购买更多 RAM**。这在某种程度上是可行的，但你能安装或操作系统可寻址的 RAM 数量存在硬性限制。在\
  \ JVM 中，非常大的堆也可能带来重大的垃圾回收调优挑战。可以说，购买更多 RAM 并不总是最佳选择，甚至不是一个可行的选择。\n*   **清除不太重要的缓存条目**，即使它们仍然有效，以便为更重要的条目腾出空间。这可能会降低缓存的有效性，甚至使缓存变得无用。如果未命中率足够高，你的缓存最终可能会抖动——不断地清除和重新加载条目——以至于维护缓存的开销实际上使情况变得更糟。\n\
  *   **将缓存溢出到磁盘或网络缓存服务器**。这更复杂，但你的缓存实现必须支持它。如果你需要缓存的这种复杂功能，并且你正在使用一个最初只是简单映射的自研实现，那么可能是时候将其替换为已经能处理这类事情的现有缓存实现了。除非你的业务就是编写缓存实现，否则你不应该扩展你的自研缓存来提供这些更复杂的功能，否则无论你是否愿意，你最终都会陷入编写，更糟糕的是，*维护*一个缓存实现的困境。\n\
  \n**过时数据的痛点**\n\n保持缓存更新是缓存维护的另一个常见问题。如果你幸运的话，你缓存的数据变化不大。如果不是，你必须处理保持缓存条目足够新鲜的问题。“足够新鲜”高度依赖于数据。有时，只要最终能更新，你可以容忍一些过时的条目。在这种情况下，你或许可以依靠基于算法的失效策略。\n\
  \n然而，通常情况下，缓存数据*必须*始终与记录系统保持一致。这对于金融和交易数据很常见。缓存必须越新鲜，对实现的约束就越多。同时保持新鲜度和足够高的命中率以使缓存值得使用，可能需要采取极端措施。缓存如何保持新鲜度最终是一个架构和业务决策。\n\
  \n**重复数据的痛点**\n\n如果相同的数据源在多个位置被缓存，缓存的许多痛点会变得更加严重，这在扩展部署中很常见，其中同一应用程序的多个实例都保留着相同缓存数据的自己的副本。随着每个新的缓存实例上线，它必须查询记录系统以填充其尚未拥有的条目。因此，缓存为记录系统提供的保护与缓存副本的数量成反比。Terracotta\
  \ 将此称为 1/*n* 效应（读作“one-over-n”），其中缓存保护宝贵数据源的有效性等于缓存副本数量的倒数。\n\n图 5-1 展示了 1/*n* 效应：如果有\
  \ *n* 个应用服务器，每个应用服务器必须在请求时加载相同的数据，这会导致 *n*–1 次不必要的缓存加载。\n\n986-1 CH05.qxd 5/31/08\
  \ 8:56 AM 第 105 页\n\n第 5 章 n 缓存\n\n**105**\n\n最终，这意味着缓存效率最多只能达到其可能效率的 1/*n*。\n\n\
  **图 5-1.** *1/n 效应*\n\n保持同一缓存数据的多个副本更新会带来类似的问题，特别是例如，如果缓存部署使用网络消息发送更新或失效消息。更新或失效消息的数量是缓存副本数量的倍数。随着扩展部署实例数量的增长，处理这些缓存消息的开销可能会压垮连接网络和用于发送此类消息的基础设施。\n\
  \n最后但同样重要的是，随着管理多个缓存的状态、新鲜度和大小的复杂性增加，操作多个缓存可能会导致管理和调优的噩梦。\n\n**Terracotta 如何提供帮助**\n\
  \n\n\nTerracotta 虚拟堆有助于解决复杂性，并降低我们迄今讨论的每个棘手维度上的缓存成本。当缓存存在于虚拟堆上时，连接到 Terracotta 集群的每个缓存实例都可以同时访问它。这最大限度地减少了\
  \ 1/*n* 效应，因为每个缓存条目只需为整个集群加载一次，而不是每个缓存实例加载一次。而且，由于 Terracotta 虚拟堆是持久的，它能在应用服务器重启后继续存在，避免了此类重启通常会对记录系统造成的冲击。\n\
  \n986-1 CH05.qxd 5/31/08 8:56 AM 第 106 页\n\n**106**\n\n第 5 章 n 缓存\n\n如图 5-2 所示，在第一个应用服务器中加载缓存会将数据放入\
  \ Terracotta 服务器。其他应用服务器随后对同一数据的读取会导致数据从 Terracotta 服务器透明地分页调入，而无需访问数据库。\n\n**图\
  \ 5-2.** *仅当负载均衡器将流量发送到其他应用服务器实例时，Terracotta 才会将 Item1234 透明地分页到缓存中。*\n\n类似地，虚拟堆消除了跨多个缓存实例保持缓存更新的复杂性。在一个服务器中对缓存的单次更新会自动对所有缓存实例可见。由于此类更改是\
  \ ACID（参见注释）的，因此即使你的数据非常敏感且*必须*准确，你也可以信赖缓存处处保持最新。而且，由于对 Terracotta 虚拟堆的更改已经过优化，仅将细粒度的更改发送到内存中驻留有已更改数据的节点，因此你避免了发送原本会发生的更新消息风暴。\n\
  \n986-1 CH05.qxd 5/31/08 8:56 AM 第 107 页\n\n第 5 章 n 缓存\n\n**107**\n\nn**注释** “ACID”\
  \ 是一个用于描述事务属性的首字母缩略词；它代表原子性、一致性、隔离性和持久性。原子性意味着事务要么提交，要么回滚，绝不会部分提交。一致性意味着数据存储的完整性在事务之前、期间和之后都保持不变。隔离性意味着一个正在进行的事务看不到另一个事务的进行中状态。持久性意味着一旦事务提交被确认，它就被保存下来且不会丢失。实际上，用户可以根据需要放宽其中一些属性以提高性能。例如，数据库通常允许你选择事务隔离级别以提高并发性和性能。\n\
  \n非常大的数据集问题通过 Terracotta 内置的内存管理功能得到解决，其中最热的数据保存在本地堆中，而较冷的缓存条目则自动推送到 Terracotta\
  \ 服务器或从其中拉取。这意味着整个缓存可以容纳在虚拟堆中，从而显著提高缓存对大型数据集的有效性，因为你无需过早地清除缓存条目。由于虚拟堆有磁盘支持，你的缓存可以增长到\
  \ Terracotta 服务器上可用磁盘的大小。\n\n为了实际了解这些缓解痛点的功能，让我们看一些现实世界中的缓存示例及其对应的 Terracotta 启用版本。\n\
  \n**一个简单的缓存示例**\n\n一个基本的缓存可以仅使用 Java 中的 Map 来构建。在此示例中，我们使用一个简单的 HashMap 来缓存关于用户的信息。清单\
  \ 5-1 展示了使用 Map 作为用户（由 String 表示）按标识符（由 Integer 表示）的缓存。\n\n**清单 5-1.** *简单的 Map\
  \ 示例*\n\npackage org.terracotta.book.caching.map;\n\nimport java.util.HashMap;\n\
  \nimport java.util.Map;\n\npublic class UserCacheExample {\n\nprivate Map<Integer,\
  \ String> userCache = new HashMap<Integer, String>(); public String findUser(Integer\
  \ id) {\n\nString user = cacheGet(id);\n\nif (user == null) {\n\nuser = fetch(id);\n\
  \ncachePut(id, user);\n\nSystem.out.println(\"\\t- MISS\");\n\n\n\n} else {\n\n\
  System.out.println(\"\\t- HIT\");\n\n986-1 CH05.qxd 5/31/08 8:56 AM 第 108 页\n\n\
  **108**\n\n第 5 章 n 缓存\n\n}\n\nreturn user;\n\n}\n\nprivate String cacheGet(Integer\
  \ id) {\n\nsynchronized (userCache) {\n\nreturn userCache.get(id);\n\n}\n\n}\n\n\
  private void cachePut(Integer id, String user) {\n\nsynchronized (userCache) {\n\
  \nuserCache.put(id, user);\n\n}\n\n}\n\nprivate String fetch(Integer id) {\n\nswitch\
  \ (id.intValue()) {\n\ncase 0: return \"Ari Zilka\";\n\ncase 1: return \"Alex Miller\"\
  ;\n\ncase 2: return \"Geert Bevin\";\n\ncase 3: return \"Taylor Gautier\";\n\ncase\
  \ 4: return \"Jonas Boner\";\n\ndefault:\n\nthrow new RuntimeException(\"Unknown\
  \ id: \" + id.intValue());\n\n}\n\n}\n\npublic static void main(String arg[]) throws\
  \ InterruptedException {\n\nUserCacheExample userCache = new UserCacheExample();\n\
  \nfor (int i = 0; i < 10; i++) {\n\nhelpFind(i % 5, userCache);\n\n}\n\n}\n\npublic\
  \ static void helpFind(int id, UserCacheExample userCache) {\n\nSystem.out.print(\"\
  Find \" + id);\n\nuserCache.findUser(id);\n\n}\n\n}\n\n在这个程序中，`userCache` 属性是一个用作用户缓存的\
  \ `HashMap`。`findUser()` 方法接收一个用户标识符，并在缓存中查找用户名。如果未找到用户，我们必须查找真实对象（这里我们使用 `fetchUser()`\
  \ 方法模拟），并用它来填充缓存。我们返回在缓存中找到或通过 `fetch` 获取的用户，并在控制台打印此次查找操作是命中（hit）还是未命中（miss）。\n\
  \n由于此程序中的 `Map` 未同步，我们在读取或写入缓存时，必须通过对同一个 `Map` 实例进行同步来保护对 `Map` 的访问。\n\n986-1 CH05.qxd\
  \ 5/31/08 8:56 AM 第 109 页\n\n第 5 章 n 缓存\n\n**109**\n\n运行此程序将遍历所有用户标识符两次。第一次调用每个标识符时，会发生缓存未命中，并填充缓存。第二次遍历标识符时，由于缓存已完全填充，所有请求都将命中。输出如下：\n\
  Find 0 - MISS\nFind 1 - MISS\nFind 2 - MISS\nFind 3 - MISS\nFind 4 - MISS\nFind\
  \ 0 - HIT\nFind 1 - HIT\nFind 2 - HIT\nFind 3 - HIT\nFind 4 - HIT\n\n**分布式缓存**\n\
  \n分布式缓存解决了当我们在集群中多个节点上运行应用程序并共享数据时该怎么做的问题。此外，假设我们不仅存储这些 `User` 对象，偶尔还会修改它们。在这种情况下，当某个特定的\
  \ `User` 对象被修改时，修改后的对象需要在集群中复制。根据数据的性质，确保同一个 `User` 对象不在不同节点上同时被修改可能非常重要。\n\n有多种方法可以解决这些复制和一致性问题。通常，复制是通过通知集群中的其他节点缓存中的数据已更改来执行的。这种通知可以通过\
  \ TCP、多播、RMI、JMS 或其他方式进行。然后，每个本地缓存必须通过使本地缓存失效和/或重新加载值来监听并应用远程更改。一个完全一致的缓存通常使用事务和提交协议来构建。\n\
  \n查看我们的代码示例并考虑这些问题，应该清楚的是，没有简单的修改能让我们将 `Map` 转变为分布式 `Map`。所需的更改将是广泛、侵入性的，并且比现有代码复杂得多。\n\
  \n**透明分布式缓存**\n\n幸运的是，Terracotta 提供了透明的分布式共享对象，并将此示例转变为分布式缓存变成了一项简单的练习。由于 Terracotta\
  \ 对应用程序是透明的，因此代码本身无需修改。相反，我们创建一个 Terracotta 配置文件，指定此应用程序中的对象应如何集群和锁定。然后，当应用程序运行时，集群中的每个节点都可以访问数据，无需额外更改。一个节点上的数据更新会自动（且安全地）在每个节点上可用。\n\
  \n完整的配置文件见清单 5-2。我们将依次检查配置的每个部分。Terracotta 配置文件的完整参考可在 [`www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference`](http://www.terracotta.org/confluence/display/docs1/Configuration+Guide+and+Reference)\
  \ 在线找到。\n\n986-1 CH05.qxd 5/31/08 8:56 AM 第 110 页\n\n**110**\n\n第 5 章 n 缓存\n\n**清单\
  \ 5-2.** *CacheUserExample 分布式配置*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  \n[<con:tc-config >](http://www.terracotta.org/config)\n\n<servers>\n\n<server host=\"\
  %i\" name=\"localhost\">\n\n<dso-port>9510</dso-port>\n\n<jmx-port>9520</jmx-port>\n\
  \n<data>terracotta/server-data</data>\n\n<logs>terracotta/server-logs</logs>\n\n\
  </server>\n\n</servers>\n\n<clients>\n\n<logs>terracotta/client-logs</logs>\n\n\
  </clients>\n\n<application>\n\n<dso>\n\n<instrumented-classes>\n\n<include>\n\n\
  <class-expression>org.terracotta.book.caching.map.UserCacheExample\n\n</class-expression>\n\
  \n</include>\n\n</instrumented-classes>\n\n<roots>\n\n<root>\n\n<field-name>org.terracotta.book.caching.map.UserCacheExample.userCache\n\
  \n</field-name>\n\n</root>\n\n</roots>\n\n<locks>\n\n<autolock>\n\n<method-expression>\n\
