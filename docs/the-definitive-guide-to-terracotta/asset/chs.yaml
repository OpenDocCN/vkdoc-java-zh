  \n[repositories.html](http://maven.apache.org/guides/introduction/introduction-to-repositories.html)\n\
  \n目录路径基于 group-id 和 TIM 名称。该目录中的 JAR 文件根据 TIM 名称和版本命名。例如，清单 9-2 中指定的模块对应以下仓库路径：\n\
