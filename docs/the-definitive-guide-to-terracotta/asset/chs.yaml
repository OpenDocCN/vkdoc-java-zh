  )) {\n\n**cart.removeItem(name);**\n\n}\n\n}\n\nif (null == name) name = \"\";\n\
  \nif (null == amount) amount = \"\";%>\n\n<h2>你的购物车中有以下商品：</h2>\n\n<table><%\n\n\
  **for (Item i : cart.getItems()) {%>**\n\n<tr>\n\n<td align=\"right\"><%=i.getAmount()%></td>\n\
  \n<td>x</td>\n\n<td><b><%=i.getName()%></b></td>\n\n</tr><%\n\n\n\n**}%>**\n\n</table>\n\
  \n<form method=\"post\" action=\"<%=request.getContextPath()%>/cart.jsp\">\n\n<h2>要添加或删除的商品：</h2>\n\
  \n<div>\n\n<input type=\"text\" name=\"amount\" value=\"<%=amount%>\"/> x\n\n<input\
  \ type=\"text\" name=\"name\" value=\"<%=name%>\"/>\n\n</div>\n\n<div><em>(数量 x\
  \ 名称)</em></div>\n\n<div>\n\n<input type=\"submit\" name=\"operation\" value=\"\
  add\"/>\n\n<input type=\"submit\" name=\"operation\" value=\"remove\"/>\n\n</div>\n\
  \n</form>\n\n</body>\n\n</html>\n\n986-1 CH07.qxd 5/29/08 8:12 AM Page 167\n\n第\
  \ 7 章 n 使用 Terracotta 扩展 HTTP 会话\n\n**167**\n\n此处，JSP 文件底部构建了一个 HTML 表单。该表单设置了两个文本字段，分别用于输入商品名称和数量，以及两个提交按钮，用于执行相应的操作。当\
  \ JSP 初始化时，会从会话中获取购物车的一个实例。\n\n如果会话中尚无购物车，则会创建一个新的购物车。随后，检索并评估通过 HTML 表单发送的参数。如果操作参数是\
  \ add，则向购物车添加一个新商品。类似地，如果操作是 remove，则移除提交的商品名称。JSP 的中间部分获取购物车中已有的商品，并遍历它们，以表格形式显示商品名称和数量。\n\
  \n值得注意的是，与会话相关的代码仅通过 `<jsp:useBean>` 标签实现。\n\n一旦从会话中获取了购物车对象，对购物车的所有操作都作为常规的 Java\
  \ 方法调用执行，无需将任何内容存回会话。这是使用 Terracotta 能带来诸多好处的情况之一。其他分布式会话解决方案会要求你在对购物车执行完所有操作后，将购物车对象重新设置为会话属性。Terracotta\
  \ 则不需要这样做，并且能够根据你在非集群应用中已经熟悉的相同规则，在集群中继续工作。\n\n清单 7-9 展示了用作购物车的 Cart.java 文件。\n\n\
  **清单 7-9.** *结构化会话属性示例中 Cart.java 的源代码* package example;\n\nimport java.util.Collection;\n\
  \nimport java.util.Collections;\n\nimport java.util.Iterator;\n\nimport java.util.TreeSet;\n\
  \npublic class Cart {\n\nprivate Collection<Item> items = new TreeSet<Item>();\n\
  \npublic Collection<Item> getItems() {\n\nreturn Collections.unmodifiableCollection(items);\n\
  \n}\n\npublic void addItem(Item item) {\n\nIterator<Item> it = items.iterator();\n\
  \nwhile (it.hasNext()) {\n\nItem i = it.next();\n\nif (i.equals(item)) {\n\nif (item.getAmount()\
  \ <= 0) {\n\n**it.remove();**\n\n} else {\n\n**i.setAmount(item.getAmount());**\n\
  \n}\n\nreturn;\n\n}\n\n}\n\nif (item.getAmount() > 0) {\n\n**items.add(item);**\n\
  \n}\n\n986-1 CH07.qxd 5/29/08 8:12 AM Page 168\n\n**168**\n\n第 7 章 n 使用 Terracotta\
  \ 扩展 HTTP 会话\n\n}\n\npublic void removeItem(String name) {\n\naddItem(new Item(name,\
  \ 0));\n\n}\n\n}\n\n`addItem()` 方法提供了购物车功能的核心。它查找现有的购物车商品，如果找到该商品，则将其移除或用新数量进行更新。这是另一个能体现\
  \ Terracotta 实用性的操作。当商品数量更新时，只有该值会被传播到集群中的其他节点。在本节后面，你将了解到如何观察这一过程。\n\n清单 7-10 展示了\
  \ Item.java 类。\n\n**清单 7-10.** *结构化会话属性示例中 Item.java 的源代码* package example;\n\n\
  public class Item implements Comparable {\n\nprivate String name;\n\nprivate int\
  \ amount;\n\npublic Item(String name, int amount) {\n\nsetName(name);\n\nsetAmount(amount);\n\
  \n}\n\npublic String getName() {\n\nreturn name;\n\n}\n\npublic void setName(String\
  \ name) {\n\nif (null == name) throw new IllegalArgumentException();\n\nthis.name\
  \ = name;\n\n}\n\npublic int getAmount() {\n\nreturn amount;\n\n}\n\npublic void\
  \ setAmount(int amount) {\n\nthis.amount = amount;\n\n}\n\n@Override\n\npublic boolean\
  \ equals(Object o) {\n\nreturn name.equalsIgnoreCase(((Item)o).name);\n\n}\n\n986-1\
  \ CH07.qxd 5/29/08 8:12 AM Page 169\n\n第 7 章 n 使用 Terracotta 扩展 HTTP 会话\n\n**169**\n\
  \n@Override\n\npublic int hashCode() {\n\nreturn name.toLowerCase().hashCode();\n\
  \n}\n\n\n\npublic int compareTo(Object o) {\n\nreturn name.compareToIgnoreCase(((Item)o).name);\n\
  \n}\n\n}\n\nItem 类是一个常规的 Java bean，其中已实现了 equals()、hashCode() 和 compareTo() 方法，以忽略\
  \ amount 作为商品的重要数据元素。这意味着名称相同的商品将被视为相等，即使名称的大小写不同。\n\n请注意，Cart 类和 Item 类都没有实现 Serializable\
  \ 接口。\n\n然而，当你按照下一节的说明在多个 Tomcat 实例上尝试该示例时，你会看到会话状态被正确共享。\n\n清单 7-11 显示了该应用程序的 web.xml\
