  \nCacheMain main = new CacheMain(itemCount, batchSize);\n\nfor(int rep=0; rep<reps;\
  \ rep++) {\n\nlong start = System.currentTimeMillis();\n\nmain.primeCache();\n\n\
  long elapsed = System.currentTimeMillis() - start;\n\nif(elapsed < bestElapsed)\
  \ {\n\nbestElapsed = elapsed;\n\n}\n\n}\n\nSystem.out.println(\"已加载 \" + itemCount\
  \ +\n\n\" 个项目，批次大小 = \" + batchSize +\n\n\" 最佳时间 = \" + bestElapsed + \" 毫秒\");\n\
  \n}\n\n}\n\nprivate final int batchSize;\n\nprivate final Map<String,String> data;\n\
  \nprivate final Cache<String,String> cache = new Cache<String,String>(); // 根 public\
  \ CacheMain(int itemCount, int batchSize) {\n\nthis.batchSize = batchSize;\n\ndata\
