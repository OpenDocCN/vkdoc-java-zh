  \ JVM 调用再次运行该示例时，您会注意到商品的价格保持了上次调用时百分之十的涨幅。\n\n**示例说明**\n\n此示例展示了 Terracotta 的许多优势和特性，首先是基本的对象共享。通过在\
  \ Roots 类中声明共享根，Terracotta 会自动使所有可从这些根对象引用的对象成为共享对象，并对每个连接的 JVM 可用。\n\n共享的 Catalog\
  \ 对象本质上是一个将 SKU 映射到 Product 对象的共享 Map。只需在共享 Map 中添加或移除 Product 对象，即可从 Catalog 中添加或移除它们。ActiveShoppingCarts\
