  \ 字段被更改。此外，每次使用会话时，会话数据的 lastAccessedTime 字段都会被更新。\n\n**理解使用 Terracotta 的 HTTP 会话**\n\
  \n现在你已经了解了 HTTP 会话集群的理论和实践，我们将介绍一些 Terracotta 特有的领域。\n\n986-1 CH07.qxd 5/29/08 8:12\
  \ AM 第 173 页\n\n第 7 章 n 使用 TERRACOTTA 扩展 HTTP 会话\n\n**173**\n\n**支持的平台**\n\n我们在本章开头已经解释过，Terracotta\
  \ 提供了其专为集群使用而优化的 HTTP 会话实现。为了使此实现尽可能易于使用，它与各种应用服务器、Servlet 容器和框架进行了集成，因此你只需在配置文件中添加适当的参数和集成模块，即可无需额外工作就能使用集群\
  \ HTTP 会话。\n\nTerracotta 与许多 Web 应用技术的开发团队密切合作，以提供无缝集成。在撰写本文时，Terracotta 2.6 版本支持以下产品：\n\
  \n• Apache Tomcat\n\n• BEA WebLogic\n\n• IBM WebSphere Application Server 和 Community\
  \ Edition\n\n• Jetty\n\n• Apache Geronimo\n\n• JBoss\n\n• Apache Struts 1.1\n\n\
  • RIFE\n\n• Wicket\n\n对容器和框架的支持在不断演进，因此请务必查看 [`www.terracotta.org/`](http://www.terracotta.org/)\
  \ 以获取完整且最新的列表。\n\n**架构考量**\n\nTerracotta 会尽力将数据保留在其使用的位置。如果某个会话在特定服务器上使用，Terracotta\
  \ 会将其实例化在堆上，前提是数据量不大，RAM 可以容纳。Web 应用程序典型的横向扩展架构包括一组应用服务器，前端由负载均衡器负责。用户代理连接到负载均衡器，负载均衡器再决定如何将请求路由到应用服务器。如果负载均衡器将用户的请求流量路由到另一台服务器，Terracotta\
  \ 会自动将该会话故障转移到新服务器的堆中。话虽如此，你可以做出一些部署架构决策，以大幅提高集群的性能。\n\n轮询负载均衡器的影响\n\n负载均衡器如何决定路由请求对于实现\
  \ Terracotta 的可伸缩性至关重要。一种简单的负载均衡方法是循环遍历应用服务器，而不考虑传入请求的属性——这种方法通常称为轮询负载分发机制。它可以在可用的应用服务器之间均匀分配请求负载，但会对\
  \ Terracotta 的可伸缩性产生负面影响。\n\n986-1 CH07.qxd 5/29/08 8:12 AM 第 174 页\n\n**174**\n\
  \n第 7 章 n 使用 TERRACOTTA 扩展 HTTP 会话\n\n\n\n如果所有会话数据都能容纳在应用服务器的物理堆中，轮询负载均衡器会将所有活跃会话数据固定到所有应用服务器的本地堆中。这是因为任何特定会话的请求都会被均匀地分配到所有活跃服务器上。在处理这些请求的过程中，会话数据会自动故障转移到处理请求的服务器上，最终每台服务器都会为每个会话处理过请求。因此，每个会话都会驻留在每台服务器的堆中，这会导致对每个会话的每次更改都要传播到每台应用服务器。跨集群保持会话状态同步所需的网络流量、处理开销和系统开销会随着应用服务器数量的增加而倍增。由于这种架构无法线性扩展，在某个临界点，为满足日益增长的需求而增加新服务器将导致收益递减，并对应用的可扩展性形成硬性限制。\n\
  \n当并非所有活跃会话数据都能容纳在应用服务器的可用物理堆中时，情况会变得更加糟糕。在这种情况下，不仅需要额外的开销来保持所有会话数据同步，而且每台应用服务器中的\
  \ Terracotta 对象缓存也会开始抖动。这是因为，当会话数据占用的堆空间超过 Terracotta 对象缓存的容量时，Terracotta 客户端会采取措施从缓存中驱逐对象。然而，由于轮询负载均衡器将所有会话均匀地分配到所有应用服务器上，因此不存在使用频率低于其他会话的活跃会话；为了节省内存，Terracotta\
  \ 虚拟内存子系统会驱逐活跃的会话数据，而这些数据很快又需要被重新故障转移进来。\n\n这种缓存抖动会严重影响 Terracotta 虚拟堆的性能，进一步降低可扩展性。如果你的计算机曾出现过活跃内存使用量超过可用物理\
  \ RAM 的情况，你可能就遇到过非常类似的情况。当计算机上的程序争相访问无法全部装入 RAM 的内存时，内存 I/O 会从 RAM 速度降级为磁盘速度，导致计算机变得缓慢且无法使用。\n\
  \n使用粘性负载均衡器\n\n鉴于轮询负载均衡器对 Terracotta 可扩展性的负面影响，我们强烈建议不要使用它。相反，一种更友好的负载均衡方案是保持用户与其会话所在服务器之间的会话亲和性。这种粘性负载均衡器倾向于将特定会话的数据仅保留在一台应用服务器上，从而大大提高了引用的局部性。由于任何给定会话的数据仅存在于一台服务器的物理堆中，对其的更改无需传播到任何其他应用服务器，从而消除了维护虚拟堆所需的大量网络和处理开销。\n\
  \n此外，由于任何给定会话的数据仅存在于一台服务器的物理堆中，它不会占用其他任何应用服务器的堆空间，从而减少了所需的物理堆总量，并最大限度地减少了缓存抖动。准确配置集群也变得更加容易，因为你可以知道一台应用服务器的物理堆能容纳多少个活跃会话。当活跃会话数量超过物理堆容量时，你可以配置更多的应用服务器，保持每台服务器的会话数量恒定，并确保所有活跃对象都能容纳在本地\
  \ Terracotta 缓存中。例如，假设你的应用会话对象每个占用 1KB，并且每台服务器有 1MB 内存。那么一台服务器可以处理 1000 个会话。如果你的网站将有\
  \ 10,000 个访客\n\n986-1 CH07.qxd 5/29/08 8:12 AM 第 175 页\n\n第 7 章 n 使用 Terracotta\
  \ 扩展 HTTP 会话\n\n**175**\n\n\n\n在任何时候，用户数量（有时称为并发用户）大约需要十台服务器来处理所有会话对象，而不会出现 Terracotta\
  \ 缓存驱逐。\n\n**运行 Terracotta 集群**\n\n正如我们之前所警告的，停止 Terracotta 服务器意味着冻结应用程序集群。\n\n\
  具体来说，任何需要创建或更新的会话都需要 Terracotta 服务器来完成会话操作。相反，任何仅驻留在应用服务器节点内存中且仅被读取的会话则不需要 Terracotta\
  \ 服务器。由于无法预测最终用户何时读取或写入其会话数据，以及特定应用节点何时宕机或在负载均衡器中触发会话故障转移，因此 Terracotta 必须始终保持运行，以确保最终用户不会遇到延迟或暂停。\n\
  \n为了实现 100% 的正常运行时间，基于 Terracotta 的应用程序集群包含了内置的高可用性复制服务。你可以通过两种方式以高可用性模式运行 Terracotta。第一种称为网络主动-被动（NAP）模式。此模式仅需要\
  \ TCP/IP 支持和第二个 Terracotta 实例，以确保为应用程序集群提供一致的服务。在第二种模式中，Terracotta 与共享磁盘存储（首选 SAN）配合使用，使其数据可供多个\
  \ Terracotta 服务器实例使用。NAP 是首选方案，因为它易于设置，且无需额外的硬件即可运行。\n\n**总结**\n\n横向扩展架构使得简单的 HTTP\
  \ 会话使用变得困难。因此，使用 HTTP 会话存储用户状态在很大程度上已被弃用，转而采用无状态架构，将数据保存在服务器之外。然而，从应用程序开发人员的角度来看，使用会话来存储用户状态通常是最佳方案。事实上，一些流行的\
  \ Web 应用程序框架大量使用了 HTTP 会话。使用 Terracotta 虚拟堆来存储会话数据，并结合能够产生高引用局部性的粘性负载均衡器，可以透明地为你的\
  \ Web 应用程序提供极高的可扩展性和高可用性。\n\n在第 1 章和第 2 章中，你首次接触到了在无状态运行时环境中进行有状态编程的概念。对于 HTTP 会话复制（Terracotta\
  \ 最初应用的领域），向无状态编程的推动使得容器和架构变得复杂。Terracotta 通过完全不复制会话，而是在应用程序集群中高效地分发会话对象，简化或消除了会话复制的大部分权衡。\n\
  \n一个真实的应用程序必须既有存储在数据库中的领域对象，也有存储在会话中的会话状态。让我们继续阅读第 8 章，我们将在其中讨论用于 Spring 的 Terracotta。我们将对领域对象和会话对象的组合进行集群，并向你介绍基于\
  \ Terracotta 的应用程序中的依赖注入。\n\n986-1 CH07.qxd 5/29/08 8:12 AM 第 176 页\n\n986-1 CH08.qxd\
  \ 5/5/08 8:40 AM 第 177 页\n\n第 8 章\n\nSpring 集群\n\n**S**pring 框架最近已成为基于 POJO 的 Web\
  \ 和企业开发的主要选择之一。Spring 是一个依赖注入容器，允许开发人员用 POJO 编写业务逻辑，并以声明方式配置和注入依赖项、所需的基础设施服务等。\n\
  \nSpring 的主要目标是通过回归到可以在没有特定执行环境的情况下进行测试和部署的 POJO，从而为 Java 企业开发重新带来简洁性。\n\nSpring\
  \ 有效地帮助你从应用程序的功能部分中分离出企业级特性：你使用最能表达其含义的对象模型来编写应用程序。\n\n然后，Spring 将关于数据如何访问、对象生命周期如何管理以及企业应用程序的其他此类方面的繁琐企业细节注入到你的应用程序中。\n\
  \n这样，你就可以编写关于应用程序本身的代码，而不是关于与数据库通信、参与事务或准备要作为消息发送到其他 JVM 的消息的代码。\n\n方便的是，Terracotta\
  \ 与 Spring 的理念相同，使得 Terracotta 和 Spring 成为一对完美的搭档。Terracotta 专门设计用于让你编写关于应用程序的代码，避免手动编写使应用程序具有高可用性或可扩展性的代码。因此，Terracotta\
  \ 对 Spring 框架的专门支持允许开发人员创建常规的非集群 Spring 应用程序，像往常一样测试它们，并在需要时声明式地定义他们想要集群的 Spring\
  \ Bean（在哪些应用程序上下文中）。然后，Terracotta 将确保这些 Spring Bean 尽可能有效地进行集群，同时在集群中保留与单个节点上完全相同的语义。\n\
  \n你可以将 Terracotta 视为允许你在多个 JVM 之间集群一个 Spring 应用程序上下文，就好像它们都在同一个 JVM 上一样。在特定应用程序上下文中，已声明为在\
  \ Terracotta 中集群的单例 Bean、会话作用域 Bean 和自定义作用域 Bean，将在连接到 Terracotta 集群的每个 JVM 中的该应用程序上下文的所有实例之间共享。此外，可以配置该应用程序上下文的应用程序事件，以自动发送到所有\
  \ JVM 中该应用程序事件的所有监听器。\n\n在本章中，我们将逐步介绍将非 Spring 集群应用程序转变为支持 Spring 的集群应用程序的过程，向你展示如何以简单、有效且自然的方式集成\
  \ Terracotta 和 Spring。\n\n**177**\n\n986-1 CH08.qxd 5/5/08 8:40 AM 第 178 页\n\n**178**\n\
  \n第 8 章 ■ Spring 集群\n\n**示例：无数据库的 Spring Bean**\n\n我们将要使用的应用程序在精神上与 Terracotta 工具包附带的库存示例类似，你将在本书的其他地方看到该示例（我们将在第\
  \ 12 章中对库存应用程序进行性能调优和可视化）。但是，它已被重写以更紧密地遵循 DI 范式。\n\n该应用程序代表一个简单的零售商店，其中包含可以查看和修改的产品库存。商店实体使用五个组件进行建模：\n\
  \n*   **Product**：Product 对象包含商店中特定产品的 SKU、名称、价格和库存水平。\n*   **Department**：Department\
  \ 对象将产品分组为相似的集合。例如，可能有一个“鞋子”部门，其中包含所有鞋子产品。同一产品可能属于多个部门。\n*   **Departments**：这控制对所有\
  \ Department 对象的访问。\n*   **Inventory**：这代表整个商店中的所有产品，无论它们属于哪个部门。它提供了商店中所有产品的视图。\n\
  *   **Store**：Store 是包含所有其他组件的主要组件。对产品、部门和库存的访问通过 Store 进行控制。\n\n除了实体组件之外，许多其他支持类实现了应用程序和显示逻辑。其中包括一个名为\
  \ CLI 的类，它包含应用程序循环和用于命令行界面的用户输入函数。\n\n■**注意** 示例项目的代码可以从 [`www.apress.com`](http://www.apress.com)\
  \ 获取。\n\n初步查看清单 8-1 中显示的 Store 组件，可以发现 Store 对象本身与之交互的所有其他组件都通过 Store() 构造函数传递给它。\n\
  \n\n\n这就是依赖注入（DI）的精髓。Store 组件只负责一件事——提供对商店各组件的访问。它本身不构建任何状态；因此，它与之交互的其他系统组件的实际实现完全独立于\
  \ Store 的实现。Store 的依赖项通过构造函数参数注入到其中。\n\n■**注意** 除了通过构造函数参数传递之外，DI 还有许多其他风格；我们不会全部讨论。Spring\
  \ 也远不止 DI 这一项功能。要更深入地探索 Spring、DI 和控制反转，请访问 Spring 框架网站：[`www.springframework.org/`](http://www.springframework.org)。\n\
