  \ Terracotta 用户的问题。\n\n986-1 FM.qxd 5/31/08 9:19 PM 第 xxii 页\n\n986-1 CH01.qxd 5/30/08\
  \ 8:58 PM 第 1 页\n\n第 1 章\n\n理论与基础\n\n建立共识\n\n**T**erracotta 是一种 Java 基础设施软件，它允许你将应用程序扩展到任意数量的计算机上，而无需昂贵的自定义代码或数据库。但\
  \ Terracotta 的意义远不止这二十六个字的定义。如果你拿起了这本书，说明你正在寻求更深入地理解这项技术及其应用场景。为了达成这种理解，我们必须首先解析围绕扩展、集群化和应用程序架构的行话。在第\
  \ 1 章中，我们将花一些时间来定义术语，然后解释 Terracotta 为应用程序提供的价值。这将有助于我们建立对这项技术目标受众的共同理解。\n\n应用程序总是有开发者和运维者，尽管有时一个人可能同时扮演这两个角色。应用程序开发者负责交付符合规范的业务逻辑，并对所有应用程序代码负责。运维者管理生产环境中的应用程序，并与开发者合作，确保应用程序具有足够的可扩展性以处理其潜在的生产工作负载。如果应用程序要成功，即运行成本低且稳定，那么这两者必须协同工作。Terracotta\
  \ 在设计时就考虑到了开发者和运维者双方。\n\nTerracotta 的设计旨在将应用程序开发者从企业开发框架（如 Hibernate、Spring 和 Enterprise\
  \ JavaBeans (EJB)）的约束中解放出来。\n\n无论应用程序是否使用这些框架，对数据库的紧密依赖都会导致设计缺乏自由度。虽然 Hibernate\
  \ 和 Spring 通过极大地简化应用程序代码来帮助开发者，但许多应用程序未能实现自由的承诺，因为它们从未真正与数据库解耦。Terracotta 独特地提供了一个完整的解决方案，可以在编写纯粹的普通旧\
  \ Java 对象 (POJO) 的同时，实现与数据库的解耦和扩展。\n\nTerracotta 的设计也旨在为生产环境中的 Java 应用程序提供最稳定的运行平台，仅此而已。该系统可以像管理数据库一样进行管理——如果你能操作数据库，你就能操作\
  \ Terracotta。并且，Terracotta 代表应用程序管理的数据不会丢失。然而，与数据库不同，Terracotta 提供了开发线性可扩展应用程序的解决方案。\n\
  \n**1**\n\n986-1 CH01.qxd 5/30/08 8:58 PM 第 2 页\n\n**2**\n\n第 1 章 ■ 理论与基础\n\n虽然大多数集群化供应商专注于应用程序的可扩展性，但\
  \ Terracotta 成功地实现了可扩展性与最高级别可用性的结合，并且这一切都在没有数据库的情况下完成。该系统还在单一供应商解决方案中提供了前所未有的跨应用程序堆栈的可视性。具体来说，我们现在可以通过一个单一的图形仪表板或通过\
  \ Java 管理扩展 (JMX) 在操作系统级别、JVM 级别和应用程序级别监控应用程序。这意味着我们不仅可以监控应用程序或应用服务器的性能，还可以从一个中心位置监控硬件性能。\n\
  \n开发者和运维者需要一种简单的方法来扩展生产环境中的应用程序。迄今为止，这种方法一直是数据库，但它之所以有效，仅仅是因为数据库拥有大量用于生产运维的管理工具，并且其开发模型（SQL\
  \ 查询、存储过程和对象关系映射）被广泛理解。然而，如果我们可以选择，数据库并非开发者真正想要的，而 Terracotta 的创始人看到了另一种选择。事实上，Terracotta\
  \ 对开发和运维需求的双重关注并非偶然。\n\nTerracotta 诞生于一个大规模生产环境 Java 应用程序的“烈火”之中。当业务以每年 100% 的速度增长时（这听起来可能不算太大，直到我们说明其收入达到数十亿美元），平台团队坚持了一个标准：在运营第一年后不购买任何新硬件。该团队连续四年非常接近实现这一目标。Terracotta\
  \ 从那个排名前十的电子商务网站中吸取了经验教训，并通过创建一种通用的 Java 扩展，显著推进了可扩展性的技术水平，任何应用程序都可以利用该扩展来获得简单开发以及同时具备可扩展性和高可用性生产运维的好处。\n\
  \n集群化曾因对单个服务器故障敏感而被认为是复杂且高度不稳定的，但随着 Terracotta 的出现，集群化这个想法终于迎来了它的时代。通过本书的篇章，你将学习\
  \ Terracotta 对集群化的独特定义。前四章侧重于概念和原理，接下来的几章则展示如何将 Terracotta 应用于常见用例，例如使用 Hibernate\
  \ 进行集群化缓存、Spring 中的集群化、HTTP 会话复制等等。\n\n一旦这些章节吊起了你的胃口，本书将转而介绍使用 Terracotta 构建强大抽象层的详细技术，以及如何针对任何及所有\
  \ Terracotta 用法进行调优。现在，让我们深入探讨该技术的更详细定义。\n\n**Terracotta 框架的定义**\n\n正如我们已经说过的，为了不让你被晦涩的术语所困扰，我们将给出一个简短的定义并解释该方法的好处。我们将把定义中的每个术语分解成通俗易懂的英语，以便我们有一个坚实的基础来继续学习用例。\n\
  \n*Terracotta 是一种用于 Java 应用程序的透明集群化服务*。Terracotta 也可以被称为 JVM 级别的集群化。Terracotta 的\
  \ JVM 级别集群化技术通过提供一个简单、可扩展、高可用的运行环境来帮助应用程序。\n\n\n要理解这个定义，我们需要先定义“透明集群服务”及其带来的运营优势，包括“简单性”、“可扩展性”和“高可用性”。然后，我们可以讨论这项技术的应用场景。\n\
  \n986-1 CH01.qxd 5/30/08 8:58 PM 第 3 页\n\n第 1 章 ■ 理论与基础\n\n**3**\n\n•   *透明性*：对用户而言，透明性意味着一个为支持\
  \ Terracotta 而编写的应用程序，在未安装 Terracotta 时，仍能按原样运行，无需任何更改。这并不意味着 Terracotta 适用于所有情况，也不意味着\
  \ Terracotta 是隐形的，不需要对应用程序代码做任何修改。对 Terracotta 用户而言，透明性代表着一种宝贵的、自由且纯粹的设计，因为应用程序仍然是你的，是你最初想要构建的样子。\n\
  \n•   *集群*：集群有很多定义，因此，Terracotta 曾一度难以将自己称为集群服务。集群服务的独特之处在于，虽然集群指的是服务器通过网络相互通信，但集群服务指的是一种技术，它允许你将一个未包含任何集群逻辑或库的应用程序，通过在\
  \ JVM 层面（应用程序之下）进行集群，将其分布到多台服务器上。这使集群从一个架构概念转变为一个应用程序在生产环境中运行时可以依赖的服务。\n\n•   *简单性*：复杂性及其对立面简单性，指的是开发人员在构建可扩展应用程序的过程中必须做出的更改。例如，为了使应用程序可扩展，对象可能需要实现\
  \ Java 语言规范中的 `Serializable` 接口，以便在服务器之间共享这些对象。\n\n•   *可扩展性*：可扩展性可能令人困惑。这时，统计学背景会有所帮助，因为开发人员经常混淆许多性能衡量术语，例如平均值与中位数，以及可扩展性与性能。如果你想通过从小规模起步、仅在需求增长时扩展来节省成本，那么可扩展性就很重要。可扩展性是低延迟和高吞吐量的结果。一个应用程序可能响应非常快，但一次只能处理一个请求（低延迟、低吞吐量）。或者，一个应用程序可能响应非常慢，但能处理数千个并发请求（高延迟、高吞吐量），数据库就是后一种应用程序的典型例子。与传统的\
  \ relational database 不同，Terracotta 有助于同时优化延迟和吞吐量，从而创建真正可扩展的应用程序。\n\n•   *可用性*：可用性意味着每一份共享数据都必须写入磁盘。\n\
  \n如果运行 Terracotta 之上的应用程序集群所在的数据中心断电，当电力恢复时，不会丢失任何数据。没有哪个单独的进程是关键的，应用程序可以从它中断的地方继续运行。\n\
  \n有了这些通用术语，接下来我们将看看数据中心环境中已经存在的、与 Terracotta 类似的例子。\n\n**网络附加存储与 Terracotta 的相似之处**\n\
  \nTerracotta 是一种透明集群服务，可用于交付许多不同的功能，例如会话复制、分布式缓存和分区（也称为网格计算）。正如我们所定义的，透明性允许应用程序依赖\
  \ Terracotta，而无需嵌入 Terracotta。有许多透明服务是应用程序依赖的，但并未将这些服务嵌入到我们的应用程序源代码中。\n\n986-1 CH01.qxd\
  \ 5/30/08 8:58 PM 第 4 页\n\n**4**\n\n第 1 章 ■ 理论与基础\n\n文件存储就是一个透明服务的例子。文件可以存储在单个服务器的本地。文件存储设备可以从磁带变为\
  \ CD 再变为硬盘，而无需更改我们的应用程序源代码。更重要的是，文件系统的性能可以在不更改应用程序的情况下进行调整。文件是一种流行的存储应用程序数据的机制，因为它们提供了存储位置、存储格式和性能优化的透明性。\n\
  \nTerracotta 将同样的能力带给了 Java 应用程序内存。因此，虽然网络文件存储服务与 Terracotta 并非完全平行，但文件 I/O 值得探讨一下这些相似之处。它们的相似之处应该能帮助你在我们深入探讨\
  \ Terracotta 和 JVM 级集群之前，理解透明服务的价值。\n\n文件 API 可以概括为具有 `open()`、`seek()`、`read()`\
  \ 和 `write()` 方法。在这些方法之下，可以附加许多不同的行为，每种行为都有特定的优势。文件可以存储在各种类型的文件系统上，使我们能够在源代码之外，为某些应用程序完全优化性能。\n\
  \n当今使用的一些文件系统包括日志文件系统（JFS）架构的变体、高性能文件系统（HPFS）、伯克利快速文件系统（FFS）、MS-DOS 文件系统和 Solaris\
  \ 的 Zettabyte 文件系统（ZFS）。这些技术中的每一种都有特定的性能特征和最佳应用场景。例如，日志记录非常适合生产系统，因为对磁盘的更改可以回滚，以修复应用程序\
  \ bug 在近期可能导致的文件损坏。因此，JFS 非常适合高可用性数据。伯克利 FFS 非常适合多用户服务器下的大规模随机访问场景，在这种场景下，许多任务会在随机时间、出于不同原因、向不同大小的许多文件写入数据。在这里，由于所有数据的随机和均匀分布，显式的碎片化导致了可预测的延迟和吞吐量。与伯克利文件系统的方法相反，DOS\
  \ 文件系统针对专用用户场景下文字处理应用程序的顺序访问进行了优化。微软最初的文件系统方法效果很好，因为单个文件是连续的，并且位于硬盘上的一个位置。\n\n**抽象层**\n\
  \n非常有趣的是，这些文件系统各自都能很好地处理某些用例，而对其他用例则处理得不太好（我们都曾经历过等待微软 Windows 磁盘碎片整理程序在夜间重新整理硬盘以加快访问速度的情况）。尽管如此，当微软改变其操作系统架构并采用了一些\
  \ HPFS 或伯克利的技术时，许多应用程序并未察觉。如果程序只使用标准的文件 API，则无需重写。当然，任何对 DOS 文件系统的性能特征和能力做出假设的应用程序，在底层文件系统发生变化时，都必须进行更改。\n\
  \nTerracotta 用户发现，集群提供了与应用程序在文件系统中发现的类似的抽象层。例如，Terracotta 用户不会对对象如何在网络上移动做出假设，也不会显式编写代码在\
  \ Java 进程之间分区数据。就像操作系统可以在不更改应用程序源代码的情况下在生产环境中切换文件系统一样，Terracotta 可以运行不同的优化（你将在后续章节中了解到），而无需应用程序进行更改。\n\
  \n986-1 CH01.qxd 5/30/08 8:58 PM 第 5 页\n\n第 1 章 ■ 理论与基础\n\n**5**\n\n\n\n类似地，我们可以更改生产服务器使用的文件系统来写入磁盘，而无需返回开发阶段重写应用程序，并且可以将存储文件的任务转移到任何单个服务器的范围之外。如果文件位于远程文件服务器上，应用程序并不关心这一点。运维团队决定使用哪种文件系统。他们可能会选择一种文件系统技术，因为它能使应用程序运行得更快，或者选择远程文件服务器，因为它使应用程序更易于管理，或者因为应用程序可以使用网络文件系统（NFS）协议作为跨进程共享信息的中央代理。\n\
  \n**添加网络文件存储**\n\n进一步探讨，Network Appliance 公司成立于 1992 年 4 月，旨在利用网络文件存储的概念来构建大型应用程序集群。当时，Sun\
  \ 公司主导着 Unix 市场，是手动构建网络文件服务器的首选平台，这些服务器使用大多数 Unix 变体中内置的 NFS 协议。Novell 在 PC 市场占据主导地位，为\
  \ MS-DOS 和 Windows 用户提供类似的网络文件和登录服务。\n\nNetwork Appliance 意识到网络存储的设置、维护和持续运营成本过高，因此决定生产一种硬件设备，该设备遵循\
  \ NFS 规范，但除了插电之外无需任何设置。网络文件存储的价值在于，存储可以独立于应用服务器进行管理。通过众所周知的备份和恢复技术，例如备份到昂贵的集中式磁带机器人或定期将数据复制到灾难恢复站点，可以使存储具有高可用性。存储服务器还可以进行扩展，以满足应用程序的\
  \ I/O 需求，而无需同时购买更大的 CPU 和更昂贵的应用服务器硬件。\n\n**与 Terracotta 的相似之处**\n\nTerracotta 为运维人员提供了类似于网络文件存储的好处。具体来说，对象存储在\
  \ Terracotta 的远程位置，尽管这些对象会在 JVM 内部缓存以实现快速的应用程序访问。这意味着运维人员可以专注于强化 Terracotta 服务器以提供高可用性，就像文件系统的类比一样。Terracotta\
  \ 的数据可以像文件服务器一样进行复制、备份和其他管理。因此，应用程序开发者可以像使用简单的文件 I/O 一样在 Java 中使用对象，而 Terracotta\
  \ 会将对象从进程移动到中央位置，在那里可以安全且经济高效地管理这些对象。\n\n我们提到的文件与 Terracotta 之间的最后一个相似之处是，两者都通过简单直接的数据共享和锁定事件来实现集群。通过锁定要处理的部分文件来写入文件的应用程序，可以在用户之间安全地实时共享。如果没有\
  \ NFS 或类似的网络文件共享技术，这种简单的方法将无法奏效。开发者将不得不在应用层中，通过手动使用网络套接字，在应用程序进程之间推送数据，这远远超出了文件系统的范畴。结果，运维人员将失去仅通过管理存储来管理这些集群应用程序的能力。\n\
  \n文件是透明集群服务的一个很好的例子。开发者按照自己的意愿在文件内写入，而运维人员则按照自己的意愿存储该文件。简而言之，像 NFS 这样的透明服务，帮助开发者以他们喜欢的方式编写应用程序，同时允许运维人员自由地为受管理的数据构建可扩展、高可用的生产环境。\n\
  \n986-1 CH01.qxd 5/30/08 8:58 PM Page 6\n\n**6**\n\n第 1 章 ■ 理论与基础\n\n此时，你可能会问自己：“NFS\
  \ 协议和数据库有什么区别？”对于数据库，开发者使用 SQL；而对于 NFS，开发者使用专有的文件布局。此外，对于数据库，其实例可以在我们想要的任何服务器上运行，而无需更改应用程序，并且数据库可以在不更改应用程序的情况下进行调优。数据库当然是一种服务。我们并不是断言\
  \ NFS 和文件比 SQL 和数据库更好。我们只是在寻找与 Terracotta 的良好相似之处。在其操作特性上，数据库是一个很好的类比。然而，在其编程模型上，则并非如此。\n\
  \n开发者知道何时需要写入文件，并且会有意为之。在现代应用程序中，数据库的使用大多是通过像 Hibernate 这样的对象关系映射工具进行的，因此，一个宁愿不写入数据库的开发者也被迫这样做。\n\
  \nTerracotta 的工作方式更像文件 I/O 而不是数据库，因为 Terracotta 以开发者期望的方式呈现自身。Terracotta 作为 JVM\
  \ 内部的内存被消耗。将内存从本地服务器迁移到网络上某处的服务（就像对文件所做的那样）这一概念，需要相当大的信念飞跃。尽管如此，Terracotta 是透明服务的一个新例子。\n\
  \n其核心目标是，Terracotta 允许几台计算机相互通信，就好像它们是一台大型计算机一样，通过内存和纯内存结构（如线程和锁（互斥对象等））进行通信。你可能会倾向于认为\
  \ Terracotta 的功能就像 NFS 一样，因为 Terracotta 获取本地资源并将其移动到网络上。然而，与 NFS 的相似之处仅此而已。现在，让我们更详细地探讨拥有透明内存位置的力量，并了解它的独特性和重要性。\n\
  \n**内存位置的透明性**\n\n与处理文件不同，使用 Terracotta 的开发者看不到 API。回想一下，我们的定义包含了 JVM 级集群的概念。这意味着，对于应用程序来说，Terracotta\
  \ 就是 JVM；而对于 JVM 来说，Terracotta 就是应用程序。图 1-1 说明了这一概念。\n\n**图 1-1.** *Terracotta 位于应用程序和\
  \ JVM 之间。*\n\n986-1 CH01.qxd 5/30/08 8:58 PM Page 7\n\n第 1 章 ■ 理论与基础\n\n**7**\n\n\
  与文件 I/O 不同，内存位置的透明性意味着 Terracotta 必须自行判断要共享和移动什么。回想一下文件类比，并暂时聚焦于 open() API 调用：open(<path_to_file>,\
  \ mode)。开发者决定相对于应用程序运行目录将文件写入何处。希望应用程序写入文件的开发者通常会将文件名及其所在目录作为用户的启动选项。假设我们的应用程序想要将数据写入位于目录路径\
  \ /path/to/my/application/data 下名为 application.dat 的数据文件。应用程序只需调用 open(\"/path/to/my/application/data/application.dat\"\
  )。然后，运维人员可以使用 NFS 移动我们应用程序的数据。要使用 NFS，生产运维团队需要在应用程序调用 open() 时写入的目录下挂载远程文件系统。在我们的示例中，这看起来类似于以下内容：mount\
  \ //remoteserver/remotepath /path/to/my/application/data\n\n一旦建立了远程挂载，我们的应用程序就会将其数据写入远程服务器。\n\
  \n\n\n然而，Terracotta 的一切操作都在内存层面进行。在这种情况下，接口就是语言本身的面向对象特性。这与挂载远程仓库的原理类似，因为对象就像文件和目录一样具有结构。开发者构建对象模型，JVM\
  \ 在运行时将这些对象映射到堆上。对象模型是与 Terracotta 交互的关键，因为它们包含了 JVM 将对象模型映射到内存所需的所有信息，因此也同时包含了\
  \ Terracotta 所需的所有信息。\n\n为了进一步探讨这个想法，请考虑对象模型是由相关对象构成的图。一个用户拥有名字、姓氏和 ID，这些是它的字段。家庭地址和工作地址可以作为字段内联存储在用户对象中，但它们通常会被拆分成独立的地址类。用户也可以有朋友。这个简单的对象模型如图\
  \ 1-2 所示。\n\n**图 1-2.** *一个简单的对象领域模型*\n\n986-1 CH01.qxd 5/30/08 8:58 PM 第 8 页\n\n\
  **8**\n\n第 1 章 ■ 理论与基础\n\n如果开发者指向 User 对象，那么期望是，对家庭地址、工作地址和朋友的引用会自动变为共享。在 Terracotta\
  \ 中，开发者只需指定 User 对象为共享对象。Terracotta 会从对象定义本身了解我们共享对象的字段（名字、姓氏等）以及对象关系（地址和朋友）是什么。可以将其类比为将远程文件系统挂载到本地机器上：User\
  \ 对象从 Terracotta 挂载到内存中，之后，内存操作可以在本地缓存，但会持久化到远程的 Terracotta 服务上，以便共享和后续检索。\n\n你将在第\
  \ 3 章中了解更多关于其工作原理的细节，但现在，只需知道 Terracotta 通过分析内存使用情况来理解应用程序意图的能力，正是其对我们源代码透明的关键所在。\n\
  \n**将透明性与集群结合起来**\n\nTerracotta 的透明集群服务帮助开发者在跨进程边界和跨机器的环境中共享 Java 进程的部分内存。这意味着，一个\
  \ Java 进程中内存中的任何对象都可以被另一个 Java 进程看到，无论该进程是在同一台机器上还是在网络上的其他地方。在上一节中，你了解到共享部分 JVM\
  \ 意味着我们正在挂载那些看似本地但实际上存储在中心服务中的对象。我们应该更详细地分解这一点。\n\n首先，让我们构建一个简单的类，`ClusteredClass`：\n\
  \nclass ClusteredClass {\n\nint id;\n\nString name;\n\nClusteredClass( int id, String\
  \ name ) {\n\nthis.id = id;\n\nthis.name = name;\n\n}\n\nfinal Integer getid( )\
  \ {\n\nreturn new Integer( id );\n\n}\n\nfinal String getname( ) {\n\nreturn name;\n\
  \n}\n\nvoid setid( int id ) {\n\nthis.id = id;\n\n}\n\nvoid setname( String s )\
  \ {\n\nthis.name = s;\n\n}\n\n986-1 CH01.qxd 5/30/08 8:58 PM 第 9 页\n\n第 1 章 ■ 理论与基础\n\
  \n**9**\n\npublic String toString( ) {\n\nreturn ( \"Customer id=[\" + id + \"]\
  \ name=[\" + name + \"]\\n\" );\n\n}\n\n}\n\n现在，假设有两个服务器，我们希望这两个服务器作为一个逻辑服务器协同工作。我们必须由\
  \ JVM 保证，在一个服务器上创建的 `ClusteredClass` 实例，在另一个服务器上也能以相同的对象 ID 访问。为什么？简单来说，如果一个 JVM\
  \ 上创建的对象在所有 JVM 上不是同一个对象，那么应用程序就无法从透明集群中获得任何价值。回想一下 NFS 的类比。如果两个应用程序实例想要读写同一个文件，它们必须挂载相同的远程文件系统，并通过名称打开同一个文件。在\
  \ Java 中，对象 ID 就像文件名。Terracotta 使用对象 ID 作为内存中特定对象的集群范围路径。\n\n如果没有跨 JVM 的一致对象标识符，应用程序会发现，在一个服务器上创建的任何对象在另一个服务器上都会不同，并且在从一个\
  \ JVM 移动到另一个 JVM 时，必须重新创建或重新连接到对象图。不知何故，所有这些麻烦听起来并不透明。因此，让我们假设，在一个 JVM 中以特定 ID 创建的对象，在任何其他\
  \ JVM 中都将具有相同的 ID。\n\n如果第二个服务器能够看到在第一个服务器上构造的 `ClusteredClass` 实例，那也会很好。然而，我们的共享目标存在几个固有的挑战。\n\
  \n在一个内存空间中创建的对象，在 RAM 中会有不同的地址，因此与另一个空间中的对象相比，会有不同的标识符。不仅内存地址无法跨进程对齐，而且在一个内存空间中创建的对象最终会被修改，这些修改必须从一个服务器的内存传递到另一个服务器的内存。我们如何实现这一切？毕竟，假设\
  \ Terracotta 能够自行找到我们所有的 User 对象（来自上一节）并共享它们，这是一个相当大的跨越。\n\n思考这个挑战的一种方式是考虑对象的作用域。如果一个对象\
  \ `o` 不是在适当的作用域级别创建或引用的，以至于它可以跨线程访问，甚至稍后被同一线程访问，那么该对象就无法跨服务器共享。方法局部作用域指的是对象的生命周期与其被创建的方法的生命周期相同；对象在方法的作用域内被创建和销毁。方法局部对象对于现代垃圾收集器来说往往是即时垃圾，因此不是我们追求的目标。这一点很重要：*没有必要在两个服务器之间共享每一个对象。*\
  \ 我们更追求的是共享集合、单例、静态变量和全局对象中的对象。只有当服务器一在一个可被多个线程访问的作用域中创建对象 `o` 时，服务器二才能看到它。因此，如果我们在方法局部上下文中调用构造函数，我们不应该担心集群问题，但在全局上下文中则应该担心：\n\
  \nvoid printAClusteredClassInstance( ) { **// 方法级作用域**\n\nClusteredClass c1 = new\
  \ ClusteredClass( 1, \"ari\" );\n\nc1.toString( );\n\n}\n\nClusteredClass clone(\
  \ ClusteredClass c ) { **// 调用级作用域** ClusteredClass c2 = new ClusteredClass( c.getid(),\
  \ c.getname( ) );\n\nreturn c2; // c2 逃逸出了方法，所以它可能值得关注……\n\n}\n\n986-1 CH01.qxd\
  \ 5/30/08 8:58 PM 第 10 页\n\n**10**\n\n第 1 章 ■ 理论与基础\n\nstatic Map myMap = new HashMap();\n\
  \nvoid storeAClusteredClassInstance( ClusteredClass c3 ) { **// 存储在单例中…**\n\nmyMap.put(\
  \ new Integer( c3.getid( ) ), c3 );\n\n}\n\n在前面的例子中，`c1` 不值得集群；`c2` 可能值得集群，这取决于调用\
  \ `clone()` 的线程中发生了什么；而 `c3` 应该被集群，因为它加入了 `myMap`，而 `myMap` 很可能会被集群。进一步思考，考虑我们试图让\
  \ `c1`、`c2` 和 `c3` 在服务器一和服务器二之间共享。`c1` 实际上无法共享，因为如果服务器一创建了它，服务器二无法访问到 `c1`。类似地，服务器一中的另一个线程也无法访问到\
  \ `c1`（除非我们将 `c1` 的声明改为静态变量）。如果调用 `clone()` 的线程实际上将 `c2` 放置在一个多个线程可以访问到的内存位置，那么\
  \ `c2` 可能会被集群。然而，当服务器二使用适当的键执行 `myMap.get()` 时，`c3` 肯定且很容易被服务器二访问到。\n\n现在，我们必须检查构造函数，因为\
  \ Terracotta 通常需要对构造函数调用做一些处理，以便在这些对象首次创建时获取它们的句柄（构造函数有点像 NFS 类比中调用 mount 命令）。Terracotta\
  \ 可以决定何时调用构造函数，有点像自动文件系统挂载器。现在，让我们通过一个例子来具体说明。\n\n\n\n■**注意** automount 最初随 Solaris\
  \ 操作系统一同发布。它能检测对远程文件系统的需求，并按需挂载该文件系统。\n\n在 `storeAClusteredClassInstance()` 方法中，如果我们假设服务器一先于服务器二启动，那么我们希望只有第一个\
  \ JVM 来构造 myMap，就像代码片段在单个 JVM 中的行为一样。你开始看到，Terracotta 不仅需要查找内存中的对象，实际上还必须处理一些特殊的指令，例如对象构造（这转化为新的内存分配）以及线程锁定（这转化为底层操作系统中的互斥操作）。在第\
  \ 3 章和第 4 章中，我们将更详细地解释其工作原理。\n\n目前，只需知道 JVM 在操作内存时执行的指令只有少数几种，而 Terracotta 可以观察到所有这些指令，这就足够了。\n\
  \n为了初步理解跨 Java 进程共享对象以实现透明集群，必须考虑线程和协调。在文件类比中，一个应用程序进程必须锁定它想要写入的文件部分，以防止其他进程破坏它。对于线程和锁，Terracotta\
  \ 可以仅通过使用 Java 同步来提供跨 JVM 的锁定。在完全理解这个概念之前，你需要对 Java 内存模型有所了解。\n\n线程是集群方程的一部分，因为它们操作对象，并且在访问这些对象时必须进行同步。让我们暂时假设\
  \ Terracotta 已部署并正常工作，使得我们在服务器一和服务器二上都有 c3，并且 c3 在两个 JVM 中是完全相同的对象。如果一台服务器想要更改 myMap，它需要锁定\
  \ myMap。因此，锁定和线程语义必须像对象跨 Java 进程分布一样，跨进程传播。\n\n986-1 CH01.qxd 5/30/08 8:58 PM 第\
  \ 11 页\n\n第 1 章 ■ 理论与基础\n\n**11**\n\n**遵循 Java 内存模型**\n\n你几乎已经了解了入门所需的一切——但我们仍需考虑内存模型。我们必须像跨\
  \ Java 线程同步对 myMap 或 c3 的更改一样，跨 Java 进程同步这些更改；至少，如果我们希望任一对象的更改能在服务器一和服务器二之间可靠地发送，就需要这样做。从某种意义上说，进程边界已经消失了。\n\
  \n但是，服务器何时通信？它们发送什么？内存模型提供了答案。\n\nJava 内存模型在其他地方已有详尽的文档记录，但我们应关注的关键概念是 JSR 133 中提出的“先行发生”（happens-before）。对于\
  \ JVM 而言，“先行发生”被定义为线程进入同步块之前的逻辑时间点。JVM 保证线程一旦进入同步块，其将要访问的对象是最新的。\n\n■**注意** Terracotta\
  \ 的作者在设计该软件时参考了 Bill Pugh 于 2004 年 6 月在卡内基梅隆大学的毕业论文，我们在撰写本书时也同样参考了该论文。\n\n该模型断言，在线程被允许进入同步块之前发生的任何更改，都将在授予锁之前应用到主内存。Terracotta\
  \ 利用内存模型来确保正确的跨进程行为和语义。例如，如果对象 o 在最近的某个时间点被服务器一更改了，那么服务器二在进入保护对 o 的访问的同步块之前，将会获取这些更改。在这种情况下，服务器一的更改*先行发生*于服务器二开始处理\
  \ o 之前，因此服务器二能看到服务器一的更改。由于锁是独占且悲观的，意味着同一时间只允许一个线程进入同步块，因此内存模型足以定义在线程分布在不同 Java 进程的环境中的顺序。我们将在第\
  \ 4 章更详细地讨论这个断言。\n\n■**注意** 对于知识渊博的读者来说，Martin Fowler 的声明“记住分布式计算的第一定律：不要分布你的对象”似乎会因\
  \ Terracotta 的透明性而受到质疑。事实上，确实如此。Fowler 的说法过于简单，并且忽略了分布对象本身确实存在歧义这一事实。Fowler 关注的是远程方法调用（RMI）。RMI\
  \ 序列化一个对象，将其发送到远程 JVM，反序列化该对象，运行指定的方法，再次序列化该对象，然后将控制权返回给第一个 JVM。\n\n实际上，Terracotta\
  \ 确实分布了对象数据和协调事件，但 Terracotta 永远不会像 RMI 那样将处理上下文从一个 JVM 移动到另一个 JVM。正如我们可以远程存储应用程序底层的文件而不破坏该应用程序一样，我们也可以远程存储应用程序对象而不破坏该应用程序。因此，Terracotta\
  \ 不受 Fowler 所述定律的约束，因为 Terracotta 从不使用 RMI、序列化或其他框架——这些框架都不是透明的。事实上，此类框架会抛出只有开发人员才能在源代码中处理的异常，例如\
  \ `RemoteMethodInvocationException`。\n\n986-1 CH01.qxd 5/30/08 8:58 PM 第 12 页\n\n\
  **12**\n\n第 1 章 ■ 理论与基础\n\n**作为服务具有优势**\n\n我们已经确定该技术为 Java 开发人员提供了透明的集群。现在，让我们将注意力转向我们对\
  \ Terracotta 定义中的“服务”组件。\n\nTerracotta 仅由少数几个组件组成。它的感觉和特性类似于运维人员习惯使用的服务，这意味着 Terracotta\
  \ 不仅仅是运行在现有 Java 进程内部的某种代理或库，它本身也是一个 Java 进程。\n\n重申一下，Terracotta 由安装在要加入集群的任何 JVM\
  \ 旁边的库组成，并且 Terracotta 本身是一个独立的 Java 进程，如图 1-3 所示。\n\n**图 1-3.** *Terracotta 的两个组件包括库和一个通过\
  \ TCP/IP 通信的服务器进程。*\n\n运行 Terracotta 服务器的 Java 进程*仅*运行 Terracotta。该 Java 进程是运维人员管理运行在\
  \ Terracotta 之上的 Java 进程集群的工作焦点。这意味着两件事：可扩展性可以像添加更多 JVM 一样简单，而高可用性的工作方式类似于数据库或文件服务器。当应用程序使用\
  \ Terracotta 来实现可用性和可扩展性时，Terracotta 本身在管理该进程的运维人员能够使 Terracotta 服务高可用的情况下，同时提供可扩展性和高可用性。为了简化这个概念，Terracotta\
  \ 使应用程序高可用，而 Terracotta 本身也像关系数据库一样被实现为高可用。\n\n**可用性**\n\n在后续章节中，你将学习 Terracotta\
  \ 如何在现有 Java 进程之外存储共享对象数据的副本。这意味着，如果我们所有的 Java 进程都停止，\n\n986-1 CH01.qxd 5/30/08\
  \ 8:58 PM 第 13 页\n\n第 1 章 ■ 理论与基础\n\n**13**\n\n实际上，我们可以重新启动这些进程，并访问那些在 Java 终止前存在于内存中的对象。当运行在\
  \ Terracotta 的透明集群服务之上时，应用程序会持续运行，直到运维人员从 Terracotta 的内存和磁盘中刷新掉这些对象。这就是 Terracotta\
  \ 作为运行时服务提供高可用性的方式。\n\n\n\nTerracotta 的设计目标是可靠且可重启的。如果它被终止或停止，Terracotta 可以从断点处重新启动，并且在\
  \ Terracotta 重启期间，应用程序进程不会看到任何错误或异常。这种重启能力对于小型应用程序和开发环境非常有用。对于生产系统，更倾向于采用不间断的方法。Terracotta\
  \ 服务器进程可以配置为在网络中相互识别，并为应用程序集群分担对象管理的职责。本质上，Terracotta 不仅能够集群你的应用程序，还能利用软件内置的功能实现自身集群以实现高可用性。\n\
  \n**可扩展性**\n\n在后续章节中，你还将学习如何使用 Terracotta 来调优和扩展跨越 Java 进程边界的应用程序。应用程序的调优可以在多个层面实现，从纯粹在\
  \ Terracotta 配置文件中限制集群行为的范围，到有时修改源代码。就提升运行在 Terracotta 上的应用程序的可扩展性而言，修改源代码往往能带来最大的性价比。我们将详细研究如何配置\
  \ Terracotta，以及如何编写最适合该环境的代码。\n\n一旦应用程序被完美配置，或者至少达到了它所能达到的最佳状态，仍然有更多工作可以做。如果将扩展定义为增加更多的\
  \ JVM，将吞吐量定义为单个节点每秒能处理的操作数，那么 Terracotta 既能帮助提升每个节点的吞吐量，也能帮助实现更好的扩展以满足业务需求。\n\n\
  为了帮助 JVM 提升性能，Terracotta 提供了内置缓存，旨在使应用程序即使在集群环境下也能以非集群的速度运行。为了提升性能，应用程序需要优化其对 Terracotta\
  \ 内部缓存的使用。优化缓存使用是优化工作负载路由的一个功能。工作负载路由的一个例子是 Web 应用程序的粘性负载均衡。在粘性负载均衡中，同一个用户会话的每个请求都会被路由到同一个\
  \ JVM。如果能够应用某种粘性策略，Terracotta 会尽可能长时间地将对象保留在内存中。不过，负载均衡并不总是像粘性和会话复制那么简单。通常，开发人员和运维人员需要协同工作，以持续地将工作负载路由到同一个\
  \ JVM。\n\n■**注意** Java 社区的一些成员将 Terracotta 称为分布式缓存。从 Terracotta 的缓存是内部的，并且需要外部负载均衡来优化缓存效率这一事实可以看出，Terracotta\
  \ 并非一个缓存。它只是利用缓存技术来确保应用程序的性能和可扩展性。\n\n986-1 CH01.qxd 5/30/08 8:58 PM Page 14\n\n\
  **14**\n\n第 1 章 ■ 理论与基础\n\n通过持续将请求路由到同一个 JVM，我们确保线程处理应用程序请求所需的所有信息都位于该 JVM 的本地内存中。如果没有这种保证，我们的应用程序将需要\
  \ Terracotta 的服务器进程在底层及时地将内存移入上下文。应用程序将不得不等待网络以完成操作。这通常被称为分页。Terracotta 在字节级别而非页面级别工作，但它采用了操作系统中虚拟内存的分页术语，因为概念是相同的。在大多数操作系统中，虚拟内存允许应用程序将\
  \ 4KB 大小的内存页交换到磁盘。将未使用的内存分页出去的能力使应用程序能够用更少的内存完成更多工作。然而，当应用程序需要从磁盘取回一个页面时，它的运行速度会变得非常慢。\n\
  \n以下是看待 Terracotta 通过在应用程序的 JVM 内部使用缓存来实现性能优化的另一种方式：Terracotta 会根据其观察到的变化的工作负载，尽可能少地移动数据。这通过允许应用程序以内存的速度而非网络的速度运行来提升性能。就像在操作系统和虚拟内存中一样，将此缓存特性移入透明集群服务，为运维人员提供了配置钩子，以便在运行时决定\
  \ Terracotta 缓存的大小。\n\nTerracotta 可以独立于其上层的应用程序进行扩展。与关系型数据库非常相似，Terracotta 服务器的\
  \ I/O 和吞吐量可以使用运维人员熟悉的多种 IT 策略进行调整。这些策略包括磁盘条带化和数据分区。在未来的版本中，Terracotta 的设计者还打算提供对\
  \ Terracotta 服务器进行集群以实现扩展的能力。一旦该功能实现，Terracotta 将能够自行在多个 Terracotta 实例之间条带化对象。\n\
  \n回到我们的示例代码，Terracotta 的核心架构可以支持将 myMap 存储在一个 Terracotta 服务器上，同时将 c3 存储在第二个 Terracotta\
  \ 服务器上。当应用程序运行 myMap.get(id) 时，Terracotta 知道该映射在一个 Terracotta 实例上，而 c3 在另一个实例上，并根据\
  \ Terracotta 对象标识符和相应的路由信息来路由 I/O。Terracotta 尊重对象标识以及 Java 内存模型，因此不存在对象的副本，只有真实的对象，这使得系统可以将对象的一部分存储在一个\
  \ Terracotta 实例上，而将其他部分存储在另一个实例上。这种架构提供了线性扩展的能力，因为任意数量的 Terracotta 实例都会均匀地分担存储和操作对象的职责：两个实例将数据一分为二，三个实例分为三份，以此类推。\n\
  \n**避免瓶颈**\n\n调优应用程序最困难的部分在于，既要将数据存储在磁盘上以保证可用性，同时又要避免 I/O 瓶颈。图 1-4 说明了调优为何困难。本质上，与纯内存应用程序相比，数据库帮助我们实现了高可用性，但代价是高延迟或低可扩展性。同时，缓存和纯内存应用程序提供了低可用性，有时甚至为零可用性，因为没有数据写入磁盘。\n\
  \n986-1 CH01.qxd 5/30/08 8:58 PM Page 15\n\n第 1 章 ■ 理论与基础\n\n**15**\n\n**图 1-4.**\
  \ *权衡可扩展性与可用性，以帮助避免瓶颈并实现可靠性。*\n\n通过 Hibernate 和对象关系映射，数据库在很大程度上可以是透明的，并且如果所有应用服务器都读写同一个数据库表，它可以支持集群。那么，为什么数据库不是一种透明集群服务呢？数据库不应该用于集群，因为它将扩展和集群应用程序的负担从应用程序源代码转移到了生产运维上，这需要依赖复杂且昂贵的数据库集群技术，例如\
  \ Oracle 实时应用集群 (RAC)。这不过是换种方式表达我们有些人可能已经知道的事实——数据库是一个瓶颈。\n\n与数据库不同，Terracotta 并不仅仅是将对象共享的负担从开发者和源代码转移到运维人员身上。Terracotta\
  \ 的架构和实现包含了多项优化，为应用程序提供了多道防线来抵御磁盘 I/O 瓶颈，这些技术的总和使得该解决方案比数据库快十倍以上。以下是其中一些优化措施：\n\n\
  • Terracotta 在可用时从内存缓存中读取数据。\n\n• Terracotta 只从它的服务器读取它需要的数据，不多读，并且可以以近乎恒定的时间从磁盘读取。\n\
  \n• Terracotta 只写入发生变化的数据，并且批量写入这些更改。\n\n\n\n• Terracotta 采用仅追加（append-only）的写入方式。对象在磁盘上永远不会被排序、索引或重新定位/碎片整理。\n\
  \n986-1 CH01.qxd 5/30/08 8:58 PM 第 16 页\n\n**16**\n\n第 1 章 ■ 理论与基础\n\n让我们进一步分析这四种优化策略，首先从缓存读取开始。\n\
  \n首先，应用程序拥有数据的内存缓存（见图 1-3），因此在读取时无需磁盘 I/O。相对于 Terracotta 服务器，该缓存位于应用程序所在的网络一侧，因此与数据库的内部缓存不同，Terracotta\
  \ 能够以内存速度响应某些请求。之所以能够以透明的方式在应用程序内部进行缓存，完全得益于 Terracotta 的透明性。这也有助于显著减轻 Terracotta\
  \ 服务器进程的工作负载。\n\n其次，Terracotta 只读取它需要的内容。Terracotta 将对象的各个字段在磁盘上分开存储，但彼此又位于同一磁盘块内。每个字段都可以单独检索。由于数据在磁盘上的格式化方式类似于\
  \ HashMap 在内存中的组织方式，Terracotta 可以将待检索字段的标识符作为键，对该标识符进行哈希运算以定位文件中的位置，移动到文件内的相应块，然后加载该字段，而无需加载任何其他磁盘块。\n\
  \n这里还有进一步的优化：对象的字段是在应用程序内部调用构造函数的同时创建的。因此，对象的字段在磁盘上都彼此相邻存储。由于 Terracotta 一次读取整个磁盘块，因此它通常在一次磁盘操作中就能读取许多同时创建的对象和字段。这些对象和字段通常需要一起使用，因为它们代表了同一对象或紧密相关对象的不同部分。\n\
  \n第三，服务器只写入发生变化的内容，并且采用批量写入方式。正如我们指出的，Terracotta 服务器写入磁盘的方式很像哈希映射（HashMap）写入内存。每个字段都可以独立更改，无需更新其他任何数据。当多个对象发生变化时，它们的更改会被一起写入磁盘上的同一块，从而遵循我们之前讨论的块级读取优化。\n\
  \n第四，服务器采用仅追加（append-only）的写入方式。这意味着我们无需为字段数据的变化而增加负担，也无需为了将块写回磁盘而先从磁盘读取块。通常，更改磁盘上的数据需要将数据所在的块读入内存，修改文件缓冲区，然后将缓冲区刷新回磁盘。Terracotta\
  \ 避免了这种额外的读取 I/O。更重要的是，如果运行 Terracotta 进程的服务器拥有足够的内存，文件数据可以全部缓存在操作系统文件缓冲区的内存中。如果能够实现这种缓存，所有读取流量都将由内存缓冲区提供服务（这构成了另一道防线），而磁盘子系统仅负责向数据文件的末尾写入数据。这意味着\
  \ Terracotta 服务器可以被调优以充分利用整个磁盘子系统的吞吐量，因为它永远不需要寻道到磁盘上的随机位置。\n\n■**注意** 如果 Terracotta\
  \ 服务器需要支持的写入流量超过单个磁盘的承受能力，操作员可以将 Terracotta 条带化到多个磁盘上，从而使写入流量分布到这些磁盘上。例如，如果一个转速为\
  \ 10,000 rpm 的单个硬盘能够承受每秒 100 MB 的读取或写入流量，那么在 Terracotta 下将四个磁盘条带化组合，将为运行在 Terracotta\
  \ 之上的 Java 进程提供每秒 400 MB 的高可用对象 I/O 总容量。每秒 400 MB 相当于超过 4 Gbps 的网络吞吐量。\n\n986-1\
  \ CH01.qxd 5/30/08 8:58 PM 第 17 页\n\n第 1 章 ■ 理论与基础\n\n**17**\n\n这些扩展和磁盘 I/O 方案，虽然对数据库管理员来说是相当标准的做法，但最初是由一家大型电子商务网站引起\
  \ Terracotta 设计者注意的，现在已内置于 Terracotta 中。\n\n因此，虽然数据库可以像 Terracotta 一样将新记录追加到表的末尾，但随着数据的变化，索引必须进行调整和维护。数据库必须为对已排序索引的随机\
  \ I/O 做好准备，这会导致显著的延迟，因为磁盘需要寻道到索引必须更改的磁盘位置。然而，Terracotta 并不关心对象在磁盘上相对于其他对象的存储位置。它只需要能够通过对象的\
  \ ID 来检索单个对象。与数据库对磁盘的多种用途相比，Terracotta 对磁盘的单一用途意味着它可以自我优化，而数据库则需要管理员干预，以告知系统针对特定数据应利用众多优化中的哪一种。\n\
  \n**用例**\n\nTerracotta 使多台服务器协同工作，如同一个逻辑服务器。它可以应用于多种方式和众多用例，但它与 JVM 协同工作，以消除我们在处理一个又一个应用程序时通常会遇到的扩展性/可用性权衡问题。\n\
  \nTerracotta 的基本用例涵盖以下大类：\n\n• 分布式缓存\n\n• 数据库卸载\n\n• 会话复制\n\n• 工作负载分区\n\n**分布式缓存**\n\
  \n当用于分发应用程序缓存数据时，Terracotta 会在多个 Java 进程之间共享 Java 集合。在这种架构下，典型用例需要跨进程共享映射（maps）、列表（lists）、数组（arrays）和向量（vectors）——包括\
  \ `java.util` 和 `java.util.concurrent` 中的类型。Terracotta 的几项能力将使此用例更加容易。首先是对象标识将正常工作。这意味着\
  \ `hashCode()` 和 `==` 将按预期工作，例如，在映射和列表中多次存储同一个键时。这也意味着以下代码示例将返回 TRUE：\n\nObject\
  \ foo1, foo2;\n\nfoo1 = cache.get( key );\n\nfoo2 = cache.get( key );\n\nreturn(\
  \ foo1 == foo2 );\n\n透明集群服务对分布式缓存应用程序的另一个好处是，缓存不会影响领域模型。这里经典的例子是对数据集建立多个索引。例如，旅游行业的网站需要能够按位置、价格、房间设施和可用性来显示酒店。存储酒店数据的自然位置是数据库，在那里所有这些细节都转化为对数据表的\
  \ SQL 查询，并且索引在运行时指定。然而，大多数旅游网站并不会在每次用户访问网站并尝试查找酒店时都向数据库发起查询；相反，它们使用缓存。而且，如果能在缓存中实现我们在数据库中能做的事情，那就太好了，即只存储酒店一次，但拥有以价格范围、位置名称和其他数据作为不同键的备用索引。\n\
  \n我可以将位于旧金山市中心的威斯汀圣弗朗西斯酒店存储在键“旧金山”、“美国邮政编码 94102”和“每晚 300 至 1000 美元的酒店”下。但无论以何种方式返回，这家酒店都是同一家酒店。这一切都很好，直到我们想将酒店的特价价格更新为\
  \ 259 美元；现在，该酒店不再属于最初存储在缓存中的价格范围，因为它现在低于 300 美元。如果我们在数据库中建模，这没有问题。但如果我们在内存中跨机器建模，就会有问题。第\
  \ 5 章将详细介绍分布式缓存用例以及如何处理随时间变化的数据。\n\n**数据库卸载**\n\n数据库既是 Java 开发人员存在的祸根，同时也是我们最好的朋友。\n\
  \n\n\n使用数据库的关键原因在于，数据会被写入磁盘，并且能够以众所周知的格式进行查询和更新，同时数据库可以在不显著影响业务逻辑的情况下进行调优。不使用数据库的原因则在于，对象-关系转换会使代码复杂化，事务架构难以扩展，并且数据库会成为瓶颈。\n\
  \n应用程序可以使用 Terracotta 来消除数据库瓶颈。在这种场景下，将对象保留在内存中，并通过 Terracotta 将它们集群化。由于 Terracotta\
  \ 是独立于任何应用程序进程的基础设施，内存中的对象不一定会丢失（请记住，Terracotta 会将对象存储在磁盘上，因此对象不会丢失）。因此，在使用 Terracotta\
  \ 时，数据库的角色被很好地限定；它主要用于业务数据的查询和报表。它较少被用作磁盘上对象的中央存储库，也较少被用作同步即可满足需求的事务控制点。\n\n**会话复制**\n\
  \n会话复制长期以来一直是应用服务器或容器的特性。Apache Tomcat、BEA WebLogic、JBoss Application Server、IBM\
  \ Websphere (CE)、Webtide 的 Jetty 以及 Sun GlassFish 都在其容器中捆绑了会话复制解决方案。但与这些框架相比，用于跨进程共享对象的透明基础设施可以提供独特的价值。\n\
  \nTerracotta 的透明性意味着与以往所有的会话复制方法相比，它带来了全新且不同的东西。具体来说，会话复制通常会将一些编程规则通过容器推回给应用程序开发者。Web\
  \ 应用程序开发者都知道，所有会话属性都必须实现 `java.io.Serializable`。开发者也知道这些属性必须很小。并且域对象不应被会话属性引用，否则你可能会序列化过多内容或序列化危险数据。最后，任何通过\
  \ `getAttribute()` 访问的属性，之后都必须通过调用 `setAttribute()` 放回会话中。\n\n这些关于使用会话复制的规则以及其他规则，实际上是容器在会话中共享对象时使用会话序列化和复制的直接结果。\n\
  \n如果我们追踪会话，会发现当容器收到一个 Web 请求时，会话是从一个内部的 `HashMap` 中检索出来的。当容器将会话对象交给 Servlet 代码时，该会话被标记为“干净”状态。只有当我们在会话内部更改对象时调用了\
  \ `setAttribute()`，会话才会被序列化并通过网络发送到应用程序的其他实例。\n\n跨 Java 进程的透明对象共享则不同。透明对象共享意味着，如果我们（应用程序开发者）能够共享会话\
  \ `HashMap` 以及该映射中的所有会话和属性，那么我们就无需向容器发出我们更改了什么以及何时更改的信号。当我们更改属性时，不再需要调用 `setAttribute()`。我们也不必确保对象实现了\
  \ `Serializable` 接口，也无需担心它们的大小。在某些情况下，对域对象和单例对象的引用甚至被证明是可以接受的。\n\n**工作负载分区**\n\n\
  工作负载分区目前以更流行的名称被提及，例如 MapReduce、数据网格和计算网格。其核心理念是分而治之。使用 Terracotta，可以通过使用 Java 数据结构进行消息传递并结合线程协调，或者使用\
  \ JMS 或套接字通信（而非线程）进行协调并将共享数据结构用于不同目的，来实现分而治之的架构。\n\n现在先不深入细节，图 1-5 展示了分区的强大之处。\n\
  \n本质上，应用程序可以分散计算工作负载，例如查询、更新大量数据或类似的用例，而无需消息队列、数据库或其他基础设施服务。一个 Java 应用程序和一些多线程逻辑就足够了。\n\
  \n**图 1-5.** *仅使用内存、线程和 Terracotta 将工作负载分发到多台计算机（详见第 10 章和第 11 章）*\n\n**总结**\n\n\
  Terracotta 是一个具有面向对象开发模型的透明集群服务。\n\n“透明”指的是纯 Java 语言和 JVM 内存接口，没有显式的编程模型要求，例如要求使用\
  \ Spring 或 Hibernate。“集群”指的是允许多台机器和 Java 进程协同处理相同数据，并使用纯对象和线程逻辑相互发送信号的能力。而“服务”指的是这项技术的基础设施性质。审视分布式缓存\
  \ API 有助于更精确地定义这一点。\n\n分布式缓存并非透明的集群服务。这些库的设计目的是在通过 `get()` 和 `put()` 调用更新缓存时，在网络服务器之间推送字节。注意以下关于它们的细节非常重要：\n\
  \n*   **透明性**：分布式缓存无法做到透明。它们要求开发者调用 `get()`，这会在调用 API 时将数据从缓存复制到对象中。分布式缓存还要求开发者在对象更改后调用\
  \ `put()`；这会将数据复制回缓存。`get()` 和 `put()` 意味着应用程序代码和对象模型无法支持某些事情。我们源代码中的方法不能在 `get()`\
  \ 调用之间持有对象的引用，因为我们无法从缓存中获取自上次线程调用 `put()` 以来的最新数据。并且对象模型不能包含丰富的域，其中对象（例如本章前面提到的\
  \ User 及其 Address 和 Friends）实际上可以是 Java 引用。如果我们的域模型由常规引用组成，那么整个对象图将在 `put()` 时被序列化，这意味着我们在\
  \ `get()` 时得到的对象将与最初创建的对象不同。\n\n*   **集群**：分布式缓存为 Java 开发者提供了一种集群形式。它们并没有像我们之前定义“服务”那样，将集群作为一种服务来提供，因为它们不透明。一个应用程序不能为单机编写，然后就在生产环境中跨一组机器运行。此外，由于大多数集群缓存库即使在单台机器上的线程之间共享对象时也必须在运行时存在，因此如果不以某种程度重写应用程序，就无法将其从应用程序中移除。\n\
  \n*   **简单性**：分布式缓存的相对复杂性相当高，这不仅是因为它们强制更改应用程序源代码，还因为它们要求更改生产操作流程。这是因为，为了扩展，分布式缓存要求我们将所有对象保存在分布在多个\
  \ JVM 中的内存里。例如，如果我们想管理一个 100 GB 的数据集，而我们的 JVM 是 32 位的，那么我们将至少需要 50 个 JVM（每个 JVM\
  \ 有 2 GB 堆内存）来存储整个数据集。如果我们希望这些数据是高可用的，我们需要在每个 JVM 中存储每个对象，这意味着我们至少需要 100 个 JVM。仅仅管理\
  \ 100 GB 的数据就需要 100 个 JVM，而这个例子还没有考虑应用程序的实际目的和业务工作负载，这些无疑会驱动使用更多的服务器。\n\n\n\n• \
  \  **可扩展性**：分布式缓存历来比仅使用数据库进行集群的应用具有更好的扩展性，其方式是将对象置于风险之中（回顾图 1-4，我们在可扩展性和可用性之间进行权衡），并将对象数据仅保存在内存中。让\
  \ JVM 仅将对象保存在内存中意味着我们无法消除数据库，因为一旦断电，数据就会丢失。因此，我们最终陷入了一个混合世界：集群加数据库，以及随之而来的可扩展性问题，这又回到了原点。\n\
  \n根据我们的定义，分布式缓存并非透明的集群服务。现在请考虑，分布式缓存是丰富的网络库，开发者无需看到网络栈和 API（例如套接字）。由于这些缓存隐藏了网络传输，与\
  \ TCP 或 UDP 相比，分布式缓存是一种更高级的网络形式。这种更高级的形式很有价值，但它既不是透明的，也不是集群服务。\n\n本章将 Terracotta\
  \ 定义为一种透明的集群服务，这是一个新概念，值得进一步详细探讨：在第 2 章中，你将了解这一概念的历史，而在第 3 章中，我们将深入探讨第一个示例——HelloClusteredWorld。\n\
  \n986-1 CH01.qxd 5/30/08 8:58 PM 第 22 页\n\n986-1 CH02.qxd 4/28/08 9:54 AM 第 23 页\n\
  \n第 2 章\n\nTerracotta 的历史\n\n**L**inux、Java 和互联网这三大力量从根本上改变了应用架构，而 Java 社区仍在努力追赶这些变化带来的影响。\n\
  \n过去典型的业务应用很少跨服务器部署；这种情况已经改变。\n\n数据库过去处理的远不止网络化的 SQL 工作负载；它们以存储过程或类似的嵌入式执行技术的形式，承载了我们很大一部分业务逻辑。如今，它们主要处理对象关系映射（ORM）查询。Linux\
  \ 和互联网将我们引向了一条与 Oracle 可能偏好的道路截然不同的路径。\n\n随着互联网的出现，引入了 n 层架构（见图 2-1）。在最简单的形式下，企业应用可以被视为两层或三层架构。第三层源于\
  \ Web 服务器的概念，它最初用于从 Apache 等厂商生产的 HTTP 服务器提供静态 HTML 服务。最终，这演变为一种正式的架构范式，涉及通过浏览器界面在互联网上向用户呈现内容——因此，我们将第三层称为表示层。\n\
  \n**图 2-1.** *n 层架构*\n\n**23**\n\n986-1 CH02.qxd 4/28/08 9:54 AM 第 24 页\n\n**24**\n\
  \n第 2 章 ■ Terracotta 的历史\n\n表示层很快从呈现静态 HTML 转变为作为应用层的一部分，提供动态应用开发平台。出于多种原因，其中最重要的是\
  \ Web 浏览器的普及，三层架构开始从互联网扩展到企业应用。\n\n对于企业而言，应用层带来了一个新问题。在运维层面，现在有大量请求通过网络（包括互联网、内联网和外联网）涌入应用层，但应用层的扩展性并不好。数据库是一个严重的瓶颈。此外，应用服务器的稳定性和可用性也成问题。\n\
  \n对于任何给定的设计，数据库和应用层的容量都是有限的，而进入应用的入站流量可能是无限的。单个用户或用例随时可能耗尽应用节点或数据库。事实证明，数据层和应用层的部署和管理成本高昂，因为可扩展性难以预测和保障。\n\
  \n架构正在向松耦合模型转变，其中应用的不同组件可以抽象在接口之后，其他组件可以忽略实现细节。而松耦合正在加速向 n 层架构的迁移，因为一个服务可以托管在与另一个服务完全不同的服务器上，而不会使编程模型复杂化。\n\
  \n在第 1 章中，我们讨论了文件和文件 I/O 的概念，并将其与文件所在的文件服务器的概念区分开来。其价值在于无需更改应用即可在运维层面扩展服务的能力。这种灵活性的代价是，许多性能瓶颈在较小规模和非生产配置下不会显现，因此只有在生产环境中才会被发现，这使得容量规划极具挑战性。\n\
  \n除了松耦合应用架构固有的容量规划挑战外，控制持续的开发成本通常是首要任务，许多人选择 Java 是因为其灵活性和同时具备的简单性。早期的 Java 虚拟机（JVM）如果不经过非常仔细的调优，就无法充分利用整个\
  \ CPU。通常的做法是每个 CPU 运行两个 JVM，每个节点两个 CPU，即每个节点运行四个 JVM。主流应用服务器厂商本身也选择了 Java。基于 Java\
  \ 的应用服务器过去和现在都对工作负载非常敏感。所有 JVM 都带来了对内存的渴求，而获取大量内存最廉价的方式是部署内存为 500MB 到 2GB 的小型机器，而不是购买拥有大量内存和\
  \ CPU 的昂贵并行处理机器。首选的部署模型是许多人所说的跨多台小型机器横向扩展应用，而不是在一台大型多处理器服务器内部纵向扩展应用。\n\n因此，当互联网驱使我们进行横向扩展时，横向扩展本身也同时被强加于我们，因为我们现在脑子里想的是多个\
  \ JVM。在多个节点上运行多个 JVM 对 IT 部门来说并非一个难以跨越的进步。Perl 脚本等工具有助于管理这种蔓延，而管理这种蔓延是让运维团队不拒绝横向扩展模型的最重要能力。\n\
  \n最后一股力量巩固了多台服务器上运行多个 JVM 的模型。这股力量就是 Linux。没有 Linux 及其相关的开源方法，昂贵操作系统的许可费和支持费将迫使我们寻找在更少服务器上扩展应用的方法；否则，随着我们在整个企业内购买越来越多的节点，我们的\
  \ IT 预算将不堪重负。\n\n986-1 CH02.qxd 4/28/08 9:54 AM 第 25 页\n\n第 2 章 ■ Terracotta 的历史\n\
  \n**25**\n\n因此，大多数架构师最终选择了横向扩展，而不是纵向扩展。当时，横向扩展还是纵向扩展对 Oracle 等数据库厂商来说都无关紧要，因为数据库处理着除最大型互联网网站之外的所有工作负载。很少有人预见到数据库瓶颈即将到来。相反，开发者正忙于选择构建应用的最简单路径。在\
  \ Java 2 标准版（J2SE）世界中，Tomcat 和 Struts 盛行，它们使用存储在数据库中的无状态数据访问对象。在 Java 2 企业版（J2EE）世界中，EJB\
  \ 盛行，容器帮助开发者将对象存储在数据库中。在新的三层架构负载下，数据库这层外衣注定要破裂。如果数据库是不可移动的物体，那么扩展性就是与之对抗的不可阻挡的力量。一场关于如何扩展的拉锯战就此展开。\n\
  \n\n\n现在，让我们更详细地讨论复杂昂贵的集群与简单的数据库支持应用之间的这场拉锯战。这将帮助你认识到，一个试图扩展的应用可以采用与多处理器主板架构相同的技术。分析\
  \ Terracotta 的起源和基本原则，将有助于你理解应用与现代主板之间的类比。到第 2 章结束时，你将了解主板式方法如何使横向扩展变得透明，以及这种透明性如何在应用设计的其他方面发挥作用。\n\
  \n**扩展方法**\n\n在一般开发项目开始时，我们必须确定业务需求。架构师、开发人员以及管理生产应用的人员（Terracotta 有时将后者称为应用运维人员）可以选择自上而下或自下而上的方式开始工作。自上而下架构的一个例子是：决定最终用户需要图形界面并希望使用网页浏览器，因此我们需要一个\
  \ HTTP 服务器、一个 Web 开发框架、一个运行所有组件的容器，以及一个存储业务数据的系统。相反的方法是自下而上，即从首选的数据存储引擎（数据库、文件服务器或其他）开始，然后寻找最佳、最具可扩展性的数据存储方式，逐步回溯到支持我们数据存储的开发框架，并最终决定最终用户如何访问所有这些软件。与导致\
  \ Web 应用的自上而下方法形成对比，从底层开始可能会产生一个用户上传到服务器以供后续处理的电子表格。\n\n无论我们讨论的是自上而下还是自下而上，只有那些之前构建过大规模应用的人才会在设计的早期阶段纳入可扩展性框架和模式。可扩展性的根本挑战在于，应用跨服务器进程进行扩展，而业务数据则通过每个进程同时访问。对数据的并发访问要么以有状态方式管理，要么以无状态方式管理。无状态架构和有状态架构都无法避免可扩展性瓶颈。现在让我们来验证这一论断。\n\
  \n**扩展数据库**\n\n构建一个能够跨 Java 进程分布的应用的一种方法是确保没有进程拥有其他进程同时拥有的信息。在 Web 应用领域，我们将这种架构称为无状态架构，但这个通用概念比将数据存储在数据库中更强大。该通用概念仅仅意味着没有数据可以存储在单个进程的内存中，并且理想情况下，根本不应该将任何数据存储在内存中。\n\
  \n986-1 CH02.qxd 4/28/08 9:54 AM 第 26 页\n\n**26**\n\n第 2 章 ■ TERRA COT TA 的历史\n\n\
  我们可以通过将所有数据写入数据库（或共享文件服务器上的平面文件）来构建无状态应用。我们甚至可以使用持久化消息队列将对象作为消息写出，以便稍后检索。无论采用何种存储机制，无状态应用只有在这些应用跨进程（Java\
  \ 或其他）分布时才会成为可扩展性挑战。这是因为，对于单个应用实例，我们可以完美地缓存来自数据库的数据，从而减少对该数据库的依赖。\n\n完美缓存是指缓存永远不会在我们期望命中的地方未命中。如果某个特定的应用工作负载将记录从数据库作为对象拉入内存，并且这些对象被缓存，那么开发人员会期望在缓存被刷新之前，数据库不会看到针对这些对象的查询。一个横向扩展的应用无法表现出完美的缓存行为，因为每个\
  \ Java 进程都需要独立且冗余地缓存数据。\n\n在一个 JVM 中拉入内存的记录对其他 JVM 不可用。\n\n当应用跨进程扩展时，我们需要分发缓存，以获得与未集群的应用相同的缓存优势。图\
  \ 2-2 说明了未能分发应用缓存所带来的低效问题。\n\n**图 2-2.** *非分布式缓存导致不必要的缓存未命中*\n\n986-1 CH02.qxd 4/28/08\
  \ 9:54 AM 第 27 页\n\n第 2 章 ■ TERRA COT TA 的历史\n\n**27**\n\n如果一个应用被设计为始终信任其缓存与数据库保持一致，那么在将应用跨进程分布时，必须要么禁用缓存（如\
  \ Hibernate 二级缓存的情况），要么分发缓存。如果没有分布式缓存，如果某个节点不知道数据在另一个应用实例上发生了更改，那么该单个进程可能会向最终用户返回过时数据。想象一下，图\
  \ 2-2 中的一个应用服务器更改了项目 1234，但没有告知另一个应用服务器它已这样做。那么两个应用服务器的缓存中都会有项目 1234 的不同版本，并且只有一个版本与数据库同步。\n\
  \n图 2-2 说明，在应用层不存储某些状态的应用容易出现瓶颈，因为它们会向数据库发出冗余的 SQL 查询。从各个应用节点发送到数据库的冗余 SQL 查询最终会压垮它。\n\
  \n该示例还表明，如果不分发缓存，应用可能会变得不一致。因此，虽然开发人员从数据库和无状态架构中获得了持久性和一致性，但如果没有开发人员在有状态缓存和该缓存的复制方面做更多工作，应用就无法扩展。\n\
  \n对于运维人员来说，在不要求开发人员更改应用的情况下扩展一个成熟的无状态应用，看似最便捷的选择是扩展存储（数据库或其他）。集群数据库的概念存在几个问题。虽然数据库调优是另一本书的主题，但可以说数据库延迟是通过索引、构建查询计划、缓存磁盘块以及优化查询来管理的。同时，数据库的可扩展性基于条带化的概念。磁盘条带化通过将数据表下的多个硬盘驱动器的容量相加，帮助单个数据库服务器处理更多应用工作负载。\n\
  \n这个想法可以扩展到跨数据库实例的条带化。如果我们获取一个客户表，并将其拆分到位于不同服务器上的两个数据库实例上，我们将获得两倍的数据库容量。但是，我们现在必须从外部记住检查两个实例以获取数据。分区数据库的问题在于，跨磁盘的条带化完全由数据库管理员和存储管理员决定，而跨数据库服务器的数据条带化通常需要应用层支持。图\
  \ 2-3 显示了跨磁盘分区数据库与跨服务器分区数据库，以及为支持分区数据库实例所需的应用更改。\n\n如果数据库尝试作为一个黑盒自行进行这种拆分，那么我们将无法获得两倍的容量，因为实例必须在未命中时相互路由查询。因此，扩展数据库是用词不当，因为运维人员最终不得不要求开发人员进行更改。无状态架构并非乍看起来那样的银弹。\n\
  \n由于横向扩展，状态或分区会通过缓存泄漏回应用中。许多 Java 开发人员都遇到过这个问题，并选择使用内存复制。\n\n986-1 CH02.qxd 4/28/08\
  \ 9:54 AM 第 28 页\n\n**28**\n\n第 2 章 ■ TERRA COT TA 的历史\n\n**图 2-3.** *数据库下的磁盘条带化（左）与应用下的数据库条带化（右）*\n\
  \n**内存复制**\n\n\n\n另一种方法——同样是在 Web 应用领域——有时被称为有状态（stateful）模型。该模型指的是将会话数据保存在内存中。通过将数据复制到其他应用实例以应对故障，保存在内存中的应用数据可获得更高的可用性。\n\
  \n有状态应用编程的目标是消除对数据库的依赖，并改善应用的延迟和可扩展性。在存在会话 Cookie 的 Web 世界中，应用可以利用粘性负载均衡的概念，将同一用户的会话反复路由到同一个应用实例。这解决了有状态编程的一个关键问题：应用应如何使其所有实例保持实时同步？如果工作负载始终被路由到同一个实例，那么我们可以仅在一两个节点中保存内存数据，这样就没问题。如果工作被随机发送到各个应用实例，那么所有实例都需要了解特定上下文中之前发生的所有事情。\n\
  \n■**注意** 此处使用“happened before”意在提醒你回顾第 1 章，我们在那里讨论了多线程编程以及 Java 内存模型中“happens before”的概念。你将在第\
  \ 3 章和第 4 章中看到，Terracotta 仅使用多线程编程就实现了多节点横向扩展。我们还将讨论如何从大部分代码中抽象出多个线程，以便在适当的时候避免应用中线程和并发编程的复杂性。\n\
