  \n986-1 CH07.qxd 5/29/08 8:12 AM 第 162 页\n\n**162**\n\n第 7 章 n 使用 Terracotta 扩展\
  \ HTTP 会话\n\n现在，你需要编译 servlet 才能运行它：\n\n> cd %HOMEPATH%\\example1\\WEB-INF\\classes\n\
  \n> javac -cp <TC_HOME>\\lib\\servlet-api-2.4.jar SessionExample1.java\n\n最后，你应该创建一个可以部署到\
