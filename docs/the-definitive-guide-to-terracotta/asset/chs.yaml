  **318**\n\n第十二章 n 可视化应用程序\n\n**图 12-13.** *可视化测试运行之间的吞吐量差异* **图 12-14.** *所有测试期间\
  \ Terracotta 服务器内部的 SEDA 队列深度* 图 12-13 显示了每种场景的事务速率。首先，我们观察到最高的事务速率出现在使用独立根的情况下。这是有道理的，因为两个\
  \ JVM 彼此不共享任何信息，因此永远不必等待 Terracotta 授予它们锁或将更新应用于内存。Terracotta 检测到 JVM 一和 JVM 二中没有共享对象，因此，在\
  \ L2 提交更改时，永远不会让任何一个 JVM 等待。所有对象更新\n\n![Image 29](img/index-343_1.png)\n\n986-1\
  \ CH12.qxd 5/28/08 10:06 PM Page 319\n\n第十二章 n 可视化应用程序\n\n**319**\n\n都变为异步。换句话说，在完美的局部性下，JVM\
  \ 始终信任自己的堆，并且在将数据写入堆时永远不会被等待。在这种场景下，JVM 将以本地 CPU 的速度运行。\n\n\n\n第二快的场景是，当根对象并非独立，但每个\
  \ JVM 中测试所压测的对象不同时。当一个 JVM 压测相机三脚架的价格，而另一个 JVM 压测 USB 鼠标时，集群每秒处理约 10,000 次更新，而前一个场景约为\
  \ 12,000 次。因此我们可以得出结论：与第一个场景一样，在此场景下，局部性自动发挥作用，只需让 JVM 不触碰相同的对象即可。这个结论也很重要。没有必要在根级别分离\
  \ JVM。只需确保 JVM 不会锁定并更新相同的对象，正如本次实践所证明的，系统会自动进行并行更新并适当地本地化对象。\n\n剩下的两个场景（我们先运行的这两个）是目前最慢的。压测同一个产品时，每秒产生约\
  \ 800 笔事务；压测随机产品时，每秒产生约 500 笔事务。正如我们所说，当在两个 JVM 中压测同一个产品时，Terracotta 会调用特殊的贪婪算法，允许每个\
  \ JVM 长时间持有锁。当随机访问所有对象时，没有优化措施生效，因此所有更新都在两个 JVM 之间广播。\n\n现在，回到你的测试环境，使用共享根对象重新启动\
  \ inventory.pounder 应用程序：\n\n> ./run.sh\n\n在管理控制台中，选择“锁分析器”（参见图 12-15），然后运行两个压测程序。\n\
  \n**图 12-15.** *选择锁分析器*\n\n运行 poundRandomProducts() 和 poundOneProduct()。运行 poundOneProduct()\
  \ 时使用单个产品，例如 1GFR。在锁分析器屏幕中，当测试运行时，持续点击“刷新”按钮并在“客户端”和“服务器”视图之间切换。“客户端”视图显示 JVM 在与\
  \ Terracotta 通信或不通信的情况下锁定和解锁对象的次数。“服务器”视图显示服务器参与锁请求的次数。如图 12-16 所示，管理控制台向我们展示，在\
  \ poundRandomProducts() 内部进行锁定导致的跳转次数几乎与锁请求次数一样多。锁要发生跳转，就必须从一个 JVM 回收并跳转到另一个 JVM。\n\
  \n![Image 30](img/index-344_1.png)\n\n![Image 31](img/index-344_2.png)\n\n986-1\
  \ CH12.qxd 5/28/08 10:06 PM 第 320 页\n\n**320**\n\n第 12 章 n 可视化应用程序\n\n这意味着网络和 Terracotta\
  \ 服务器正在拖慢应用程序，因为每个 JVM 都在另一个 JVM 的操作上阻塞。\n\n**图 12-16.** *说明 poundRandomProducts()\
  \ 的锁跳转问题* 当运行 poundOneProduct() 时，我们可以看到锁跳转的次数远少于锁请求的次数。在图 12-17 中，系统在回收锁并将其交给另一个\
  \ JVM 之前，大约会授予锁四次。\n\n**图 12-17.** *说明 poundOneProduct() 下针对 1GFR 的贪婪锁*\n\n你刚刚已经看到了理解每个\
  \ inventory.pounder 场景快慢原因所需的一切。可视化工具不仅可用于查看每秒事务数和 SEDA 队列深度，还可用于查看广播速率、磁盘 I/O 等。在单个位置查看所有数据的强大之处在于，一个指标的放缓可能与另一个指标的高更新计数相关。例如，你应该能够使用这些工具向自己证明，糟糕的垃圾回收调优会导致集群范围的放缓，当一个\
  \ JVM 在应该确认对象广播时在垃圾回收中暂停。\n\n**管理生产环境**\n\n可视化工具和管理控制台的设计都考虑到了生产应用程序监控。然而，尚未进行任何调优来使其安全。相反，Terracotta\
  \ 将每个监控点都设为可选。你可以决定是否监控锁定。你可以决定是否监控事务速率、垃圾回收或其他任何指标。你也可以决定采样率。\n\n为生产环境设置系统最安全的方法是关闭所有监控，在应用程序上运行负载，并观察管理控制台中\
  \ Terracotta 服务器报告的事务速率。接下来，开始启用快照详细信息和锁分析详细信息，并观察吞吐量损失了多少。调整采样率和收集的数据，直到在吞吐量损失与增强的可视性之间达到可接受的平衡。\n\
  \n请注意，所有指标收集都可以通过 JMX 事件启动和停止。这意味着你可以选择不收集任何数据，仅监控默认数据，例如事务速率。当事务速率低于或超过预期阈值时，你可以使用监控框架（如\
  \ Hyperic）向 Terracotta 发出 JMX 事件，以立即开始记录更多数据。\n\n你应该在启用和禁用指标、以及提高和降低速率的情况下，在负载下进行大量测试。观察正在运行的系统实际上可能会加剧性能问题，因此自动化程度越高，就越需要验证自动化是安全的。\n\
  \n所有这些图形工具都可以在开发者的桌面上运行。运行统计快照。然后将它们导出为 zip 文件到 Terracotta 服务器，并使用安全复制（SCP）或其他方式将文件传输到你的桌面计算机。之后，将数据导入可视化工具，而不是像本章到目前为止所做的那样，从正在运行的生产环境\
  \ L2 服务器检索数据。至于管理控制台，它是一个 Swing 工具，可以从你的桌面运行，通过 TCP 连接到 Terracotta 服务器。对大多数人来说，这个选项工作良好，但当你的桌面到运行\
  \ Terracotta 服务器的生产环境网络速度较慢时，请考虑在生产环境 Terracotta 服务器附近运行某种虚拟网络计算（VNC）或远程桌面工具。然后，管理控制台通过本地网络运行，只有图形显示数据通过慢速网络传输回你的桌面。\n\
  \n**总结**\n\n可视化是一个强大的概念，多年来一直在性能分析工具中得到应用。当将其应用于调优和管理跨进程和机器分布的集群应用程序这一问题时，可视化可能是唯一的出路。\n\
  \nTerracotta 提供透明集群，这意味着你的大部分性能调优工作可以在单元级别使用传统性能分析器完成。然而，在某些时候，查看和理解 Terracotta\
  \ 在幕后所做的事情变得很重要。为此，我们在本章中开发了 inventory.pounder 应用程序。然而，你在本章中构建、运行和分析的 inventory.pounder\
  \ 应用程序，其目的并非规定一种查看 Terracotta 行为的固定方式。相反，它仅仅是为了说明在测试环境中，开启 Terracotta 的监控工具并收集数据来压测你的应用程序这一概念。\n\
  \n你不仅学会了如何压测应用程序并观察和测量 Terracotta 的内部工作原理，还了解了一些内部细节以及瓶颈是如何产生的。如果我们要在本章中建立任何经验法则，这些法则将包括分析锁的必要性。永远不要假设贪婪锁在工作或不工作。使用管理控制台确认锁的获取不需要网络。研究事务速率和广播速率。还要研究系统级资源，如磁盘\
  \ I/O、CPU 利用率、堆利用率和垃圾回收活动。\n\n986-1 CH12.qxd 5/28/08 10:06 PM 第 322 页\n\n**322**\n\
