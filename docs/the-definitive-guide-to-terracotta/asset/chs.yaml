  \ JVM 的线程。\n\n**线程协调与 JMX 集群事件**\n\n下一个示例与上一个相同，但增加了 Terracotta 集群事件。集群事件是当 JVM\
  \ 加入或离开集群时，在客户端 JVM 中触发的 JMX 事件。为了接收 Terracotta 集群事件，示例类需要扩展以实现四个方法：\n\n• `nodeConnected(Object\
  \ nodeID)`：当另一个 JVM 加入集群时调用\n• `nodeDisconnected(Object nodeID)`：当另一个 JVM 离开集群时调用\n\
  • `thisNodeConnected(Object nodeID)`：当本 JVM 加入集群时调用\n• `thisNodeDisconnected(Object\
  \ nodeID)`：当本 JVM 离开集群时调用\n\nTerracotta 中的集群事件最终将扩展为包含集群或 JVM 可能经历的所有逻辑阶段。一个更健壮的事件处理解决方案必须包含以下方法：\n\
  \n• `nodeInit(Object nodeID)`：当本节点启动时调用。\n• `nodeConnecting(Object nodeID)`：当本节点调用到\
  \ Terracotta 服务器的 socket `connect()` 方法时调用。\n• `nodeConnected(Object nodeID)`：当\
  \ TCP 握手完成且节点加入集群时调用。\n• `nodeReconnecting(Object nodeID)`：当网络出现故障且节点正在重新连接时调用。\n\
  \n986-1 CH10.qxd 5/28/08 10:51 AM Page 231\n\n第 10 章 n 线程协调\n\n**231**\n\n• `nodeOrphaned(Object\
  \ nodeID)`：当集群不再等待某个节点，且该节点在不先退出的情况下永远无法重新连接时调用。请注意，被孤立的节点永远不会知道自己已被孤立；服务器和其他节点可以得知。\n\
  • `nodeReconnected(Object nodeID)`：节点成功重新加入集群（与 `nodeConnected()` 事件相同，但此处为清晰起见而记录）。\n\
  • `nodeDisconnecting(Object nodeID)`：节点正常退出。\n• `nodeDisconnected(Object nodeID)`：节点已正常退出。\n\
