  \ 包中的所有对象都将被集群化，因此我们使用一个类表达式来包含该包中的所有类以进行检测。`util` 包中的两个比较器对象也将被集群化，因此我们为它们添加了包含表达式。\n\
  \n`CLI` 类中的 `store` 引用被声明为一个根字段。`CLI` 对象本身永远不会成为共享对象。但是，它直接操作共享对象，因此也必须被检测。\n\n\
  唯一修改集群化对象的方法是实体类中的方法，因此我们使用一个方法表达式来声明实体包中的所有方法将被自动锁定。\n\n要运行与 Terracotta 集群化的示例，首先在一个单独的终端窗口中启动\
  \ Terracotta 服务器。确保指定了正确的 Terracotta 配置文件，并记得将 `<$TC_HOME>` 替换为你解压 Terracotta 下载文件的目录：\n\
  \n%> <$TC_HOME>/bin/start-tc-server.sh -f tc-config-no-spring.xml\n\n回到你的应用程序终端，使用\
  \ `dso-env` 脚本来确定需要添加到 `java` 命令中的 JVM 参数。你将看到类似如下的输出，根据你使用的 Terracotta 版本和安装位置，输出会略有不同：\n\
  \n<$TC_HOME>/bin/dso-env.sh localhost:9510\n\n2008-03-24 14:33:28,124 INFO - Terracotta\
