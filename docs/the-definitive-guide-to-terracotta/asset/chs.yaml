  <logs>terracotta/client-logs</logs>\n\n</clients>\n\n<application>\n\n<spring>\n\
  \n<jee-application name=\"*\">\n\n<application-contexts>\n\n<application-context>\n\
  \n<paths>\n\n<path>applicationContext.xml</path>\n\n</paths>\n\n<beans>\n\n<bean\
  \ name=\"store\" />\n\n</beans>\n\n</application-context>\n\n</application-contexts>\n\
  \n<instrumented-classes>\n\n<include>\n\n<class-expression>\n\norg.terracotta.book.inventory.util.DepartmentByNameComparator\n\
  \n</class-expression>\n\n</include>\n\n<include>\n\n<class-expression>\n\norg.terracotta.book.inventory.util.ProductByNameComparator\n\
  \n</class-expression>\n\n</include>\n\n</instrumented-classes>\n\n</jee-application>\n\
  \n986-1 CH08.qxd 5/5/08 8:40 AM Page 199\n\n第 8 章 ■ 集群 Spring\n\n**199**\n\n</spring>\n\
  \n</application>\n\n</con:tc-config>\n\n请注意，并非所有 Bean 都被声明为集群。事实上，我们声明为集群的唯一 Bean\
  \ 是 store Bean。这是因为 Terracotta 会分析集群 Spring Bean 的依赖关系图，并为其确定适当的配置。根据该依赖关系图，Terracotta\
  \ 能够确定哪些类需要被注入（instrumented），以及哪些方法必须自动锁定。\n\n除了定义哪些 Bean 应该被集群化之外，我们还需要定义三件事：\n\
  \n• 我们必须定义 Spring Bean 定义文件的路径。在此示例中，它是 applicationContext.xml。\n\n• 在 store Bean\
  \ 的依赖关系图中，有两个类无法被 Terracotta 识别，即 `DepartmentByNameComparator` 和 `ProductByNameComparator`，因此我们必须显式配置它们以进行注入。\n\
  \n• 我们必须定义与此应用程序上下文关联的 JEE 应用程序的名称。如果 Spring 应用程序作为 Web 应用程序部署，则 JEE 应用程序名称通常是该\
  \ Web 应用程序所部署的 WAR 文件的名称。这意味着该配置是特定于此 Web 应用程序的本地配置。由于此示例是一个独立的 Spring 应用程序，我们使用通配符（*）作为应用程序名称。\n\
  \n**非分布式 Bean 字段**\n\n默认情况下，集群 Bean 的所有引用（字段）也会被集群化（即，从集群 Bean 引用的整个对象图都会被集群化）。但允许您将某些字段定义为不可分发（nondistributable），这意味着它们不会被集群化，并将保持本地值。此功能使您能够有效地限制对象图。在某些情况下，避免基于\
  \ DSO 的复制非常重要，因为 Bean 可能引用了持有操作系统特定资源（例如文件和套接字）的对象，而这些资源本质上不可集群化。这些字段通过其在 Java 代码中的名称进行引用。\n\
  \n以下是一个示例：\n\n<beans>\n\n<bean name=\"beanName\">\n\n<non-distributed-field> **myFieldOne**</non-distributed-field>\n\
  \n<non-distributed-field> **myFieldTwo**</non-distributed-field>\n\n</bean>\n\n\
  </beans>\n\n![Image 22](img/index-224_1.jpg)\n\n986-1 CH08.qxd 5/5/08 8:40 AM Page\
  \ 200\n\n**200**\n\n第 8 章 ■ 集群 Spring\n\n**使用集群 Spring Bean 运行**\n\n现在，所有部分都已就绪，可以使用集群\
