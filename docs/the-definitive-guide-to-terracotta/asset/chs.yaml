  \ 增强的行为敏感。`<roots>` 部分声明哪些对象图应成为虚拟堆的一部分，从而在 JVM 之间共享。\n\n此示例有两个根：`WaitNotify.config`\
  \ 和 `WaitNotify.nodesJoined`。字段 `Configuration.myNodeID` 仅与本地 JVM 相关，因此被声明为 `transient`，这意味着其值不是虚拟堆的一部分。当\
  \ `Configuration` 对象在另一个 JVM 的本地堆上被具体化时，`myNodeID` 字段为 `null`，必须使用本地值显式初始化。\n\n\n\
  \n`tc-config.xml` 的 `<locks>` 部分描述了哪些方法应对 Terracotta 锁定敏感。在本例中，需要配置两个方法：`run()`\
  \ 方法和构造函数（指定为 `__INIT__`）。这些方法中对共享对象的所有锁定操作（`synchronized()`、`wait()` 和 `notify()`）都会被增强，除了在该对象本地堆上发生的锁定操作外，还会包含\
  \ Terracotta 服务器上针对该对象的等效锁定操作。对未存储在 Terracotta 中的对象进行的锁定操作，不会受到集群范围的 Terracotta\
  \ 锁定增强的影响。同样，所有未在 `<locks>` 部分指定的方法中的锁定操作也是如此。\n\n如果你在 Terracotta 中运行此示例，第一次执行会将\
  \ `nodesJoined` 计数器从零递增到一，并进入 `run()` 方法中的 `while` 循环，因为 `nodesJoined` 的值小于默认的参与者数量（二）。进入\
  \ `while` 循环后，程序的第一个实例将请求并获取共享 `Configuration` 对象上的集群锁，并在此对象上等待，从而暂停第一个执行实例中主线程的执行。\n\
  \n当你运行第二个执行实例时，其主线程在执行 `WaitNotify` 的构造函数时，会将共享的 `nodesJoined` 整数从一递增到二，然后在共享的 `Configuration`\
  \ 对象上调用 `notifyAll()`。此方法调用将导致第一个执行实例中的主线程尝试获取共享 `Configuration` 对象上的锁。当第一个执行实例的主线程获得该锁时，该实例将恢复执行并重新测试\
  \ `while` 子句。此时，由于第二个执行实例已将 `nodesJoined` 整数值递增到预期的值二，第一个执行实例将退出 `while` 循环，打印所有参与节点已加入的消息，然后退出。\n\
