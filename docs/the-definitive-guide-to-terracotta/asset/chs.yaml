  \ 和\n\nruntime 作用域的\n\n依赖项\n\n**总结**\n\nTerracotta 集成模块 (TIM) 提供了一种强大的机制，可以以抽象的形式使用\
  \ Terracotta。所谓“抽象”，是指您构建的库和您进行集群的框架的用户无需手动将所需的 Terracotta 指令集成到其应用程序的 `tc-config.xml`\
  \ 中。相反，您的用户可以在集群环境中使用更简单的 `<module>` 指令来使用您的库，就像您使用 Hibernate 和 Ehcache 等 TIM，或用于同步的\
  \ Java 集合一样。\n\n使用 Terracotta，可以包含 XML 配置指令，这非常类似于 C 编程语言中 `#include` 的概念。也可以发布新代码，这些代码可以添加到不适合开箱即用集群的包或库中，或以其他方式更改其中的类和代码。\n\
  \n事实上，集成模块的概念最初就是为了方便在各种开源项目中捆绑 Terracotta 支持而创建的。您也应该利用这种捆绑能力，使您自己的项目和产品更加稳定且更易于理解。\n\
  \n在第 10 章中，您将学习如何使用 Terracotta 构建一个主/从（或网格）计算框架。该框架中的所有类和接口都可以在 Terracotta 的 Forge\
  \ 上作为库用于项目中。该库仅包含 POJO 集合、多线程执行逻辑以及适当的锁，以确保所有内容都是线程安全的。您将实现网格中工作和工作路由的概念。\n\n正如您将在下一章中学到的，主/从框架的所有配置都通过一个\
  \ TIM 进行了抽象。了解 TIM 的构建方式有助于您理解像主/从这样的框架，并且这些知识也使您能够构建自己的框架和库，其他开发人员无需手动包含或集成即可使用。如果您发现自己需要跨多个项目保存配置片段和相关源代码的配方，请考虑将这些片段和配方实现在一个模块中。现在，让我们来看看主/从框架，请记住，您可以通过\
  \ TIM 来使用该框架。\n\n986-1 CH10.qxd 5/28/08 10:51 AM Page 221\n\n第 1 0 章\n\n线程协调\n\n\
  **在**计算机中，就像现实世界一样，如果有更多的工作者同时工作，就能完成更多的工作。在计算机中，这些工作者表现为多个并发执行的进程，以及在单个进程内部的多个并发执行线程。在现实世界中，如果多个工作者处理同一件事，或者工作者需要按照彼此相关的特定顺序执行工作，那么他们之间必须进行某种形式的沟通和协调。就像在物理世界中一样，如果多个线程处理同一个对象，或者这些线程需要按照彼此相关的特定顺序改变对象，那么它们必须有一种相互协调的方式。\n\
  \n使用 Terracotta，Java 语言中存在的线程协调结构将透明地跨 JVM 进程边界工作。一个 JVM 中的一个线程可以对一个对象调用 `wait()`，而另一台机器上另一个\
  \ JVM 中的另一个线程可以调用 `notify()` 来唤醒等待的线程。挑战在于，并非所有 Java 开发人员都有线程协调和并发的经验。请将本章视为使用 Terracotta\
  \ 进行并发的实用指南。\n\n它之所以能作为实用指南，是因为它旨在引导您走向那些易于编码和调试，同时在 Terracotta 世界中能够良好扩展的用例和协调模型。现在，让我们深入了解并发的秘诀。\n\
  \n**Terracotta 与线程协调**\n\n线程协调有两种形式：\n\n• *数据访问的协调*：例如，如果线程 A 正在对列表进行排序，而线程 B 正在迭代列表中的元素，那么线程\
  \ A 需要在线程 B 开始迭代之前完成对列表的排序。\n\n• *活动的协调*：例如，假设线程 A 和线程 B 需要一起离开公寓，线程 A 需要关灯，而线程\
  \ B 需要关门。在这种情况下，线程 A 和 B 需要等待，直到线程 A 关掉灯；同样，线程 B 必须等到灯熄灭并且两个线程都跨过门槛后才能关门。\n\nJVM\
  \ 具有简单而优雅的内置机制来协调线程：字节码指令 `MONITORENTER` 和 `MONITOREXIT`（也称为 `synchronized` 方法或\n\
  \n986-1 CH10.qxd 5/28/08 10:51 AM Page 222\n\n**222**\n\n第 1 0 章 n 线程协调\n\n\n\n\
  `synchronized` 块）以及 Object 方法 `wait()`、`notify()` 和 `join()` 的各种签名。从 Terracotta\
  \ 2.6 开始，`join()` 不再支持作为集群线程交互。自 Java 1.5 起，Java 库中增加了更高级别的并发构造，为常用的协调技术提供了规范实现。这些更高级别的线程协调工具可以在\
  \ `java.util.concurrent` 包中找到。图 10-1 展示了 Terracotta 如何对 Java 的 `synchronized` 块进行插桩。\n\
  \n**图 10-1.** *Terracotta 挂钩到 MONITORENTER 和 MONITOREXIT 字节码。*\n\nTerracotta 的虚拟堆扩展了\
  \ Java 内置线程协调的实用性，允许在多个 JVM 上的线程使用与同一 JVM 上线程完全相同的技术相互协调。这意味着可用于执行程序的 worker 数量不再局限于单个\
  \ JVM 可用的线程和处理器数量；Terracotta 让您为单个 JVM 编写的程序，可以在多个 JVM 上运行，就好像它们是一个大型 JVM 一样。Terracotta\
  \ 虚拟堆的强大之处在于，它能够为单个 JVM 编写软件，但可以在任意数量的 JVM 上运行——而无需使用特殊且侵入性强的 JVM 间信号和数据共享框架。\n\n\
  **集群线程**\n\n为了实际了解 Terracotta 的 JVM 间线程协调，让我们看几个线程集群示例。\n\n**使用并发原语进行线程协调**\n\n\
  第一个示例展示了如何仅使用 JDK 1.4.2 及以上版本中可用的并发原语来协调线程的操作。此示例的代码可在本书的页面 [`www.apress.com`](http://www.apress.com)\
  \ 上找到。\n\n此示例包含一个配置文件和一个带有 `main()` 方法及一些协调代码的 Java 类。Java 类如清单 10-1 所示。\n\n986-1\
