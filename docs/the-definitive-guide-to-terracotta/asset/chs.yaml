  \n<on-load>\n\n<method>myMethod</method>\n\n</on-load>\n\n</include>\n\n...\n\n\
  </instrumented-classes>\n\n以下配置片段声明了一些 BeanShell 脚本，这些脚本将在 JVM 中加载 `com.mycompany.pkga.MyClass`\
  \ 的集群实例时执行：\n\n<instrumented-classes>\n\n<include>\n\n<class-expression>com.mycompany.pkga.MyClass</class-expression>\n\
  \n<on-load>\n\n<execute><![CDATA[self.myTransientField = new ArrayList();]]></execute>\n\
  \n</on-load>\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第 82 页\n\n**82**\n\n第 4 章 ■ POJO 集群\n\
  \n</include>\n\n...\n\n</instrumented-classes>\n\n有关 BeanShell 脚本的更多信息，请访问 [`www.beanshell.org/`](http://www.beanshell.org)。\n\
  \n**逐步实现集群 POJO**\n\n既然你已经了解了 Terracotta 的一些主要概念，我们现在可以深入讨论 POJO 集群及其对你的应用程序的意义。POJO\
  \ 的定义颇具争议。Rebecca Parsons 最初定义了 POJO。后来，Fowler 对此定义写道：\n\n*“我得出的结论是，人们忘记了常规的 Java\
  \ 对象，因为它们没有一个花哨的名字——所以，在为一次演讲做准备时，Rebecca Parsons、Josh MacKenzie 和我给它们起了一个名字：POJO（Plain\
  \ Old Java Object，简单老式 Java 对象）。POJO 领域模型更容易组合、构建快速，可以在 EJB 容器之外运行和测试，并且不依赖于 EJB（也许这就是\
  \ EJB 供应商不鼓励你使用它们的原因）。”*\n\n—Martin Fo[wler (http://www.martinfowler.com/isa/domainModel.html)](http://www.martinfowler.com/isa/domainModel.html)\n\
  \nPOJO 本质上更像是一种感觉而非规范。可以肯定的是，开发人员知道自己在何时编写 POJO，何时不是。\n\nTerracotta 使得在集群中运行应用程序时能够采用\
  \ POJO 编程模型。\n\n该模型体现在能够遵循 Java 内存模型以及语言语义。具体来说，POJO 集群意味着对象标识在 JVM 之间得以保留。集群 POJO\
  \ 从根本上说，是不同 JVM 中的*同一个*对象，而不仅仅是具有相同数据的副本或克隆。一个 POJO 应该能够同时存在于两个独立的对象图中，而不会最终被克隆到其中一个中。\n\
  \nJava 开发人员应该能够使用 `synchronized` 关键字来同步对 POJO 的访问。POJO 集群是 Terracotta 能够集群许多框架的基础。社区成员已经为\
  \ Scala、JRuby、Quercus 和 Groovy 集群构建了原型。\n\n这些技术在设计时并未考虑集群，但只要集群遵循语言规范和开发者契约（保留线程语义和对象标识），这些技术就无需考虑集群问题。\n\
  \n在第 5 章及后续章节中，你将看到许多展示 Terracotta 针对特定技术进行适配的用例。但在底层，Terracotta 是一种可应用于任何分布式计算任务的通用技术。核心\
  \ Terracotta 技术使得 POJO 可以在 JVM 实例之间使用，就好像它们都共享一个巨大的分布式堆一样。在本章的其余部分，我们将讨论 POJO 集群的工作原理以及如何在许多用例中使用它。掌握了这些知识，你就能更好地理解后续章节，并且可以使用\
  \ Terracotta 尚未支持的框架构建自己的原型或生产应用程序。\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第 83 页\n\n\
  第 4 章 ■ POJO 集群\n\n**83**\n\n**我们所说的 POJO 是什么意思？**\n\n要理解什么是 POJO 集群，我们首先需要准确描述我们所说的\
  \ POJO 是什么意思。我们使用术语“POJO”来表示一个普通的 Java 对象，它存在于你的 JVM 堆上，并且不需要任何额外的框架或组件支撑即可实现其预期功能。\n\
  \n\n\nPOJO 的本质特征在于它实际存在于 JVM 的堆内存中，并且可以作为一个常规的 Java 对象来对待，不会产生任何令人意外的副作用。对 POJO\
  \ 的引用应该是普通引用，使得使用 `==` 运算符进行比较时结果为 true。你应该能够通过普通的访问（`.`）运算符（例如 `foo.bar = baz`）来修改\
  \ POJO 的字段，而无需之后调用某个提交或放回操作（例如 `session.setAttribute(\"foo\", foo)`）。你应该能够将 POJO\
  \ 放入一个数据结构（如 `Map`）中，然后再将其取出，而不会得到该对象的一个副本。你还应该能够在 POJO 上执行并发操作（例如 `synchronized`、`wait()`\
  \ 和 `notify()`），并且这些操作的行为符合预期。\n\n传统上，POJO 一直被使用，直到其所代表的数据需要被外部化到单个 JVM 堆边界之外。例如，如果你想将对象所代表的数据存储到数据库，你可能会使用\
  \ EJB 或像 Hibernate 这样的对象关系框架来为你管理持久化。或者，如果你想在 JVM 之间发送消息，你可能会使用 JMS 或 RMI。在所有这些情况下，大量的框架支撑结构支持将对象数据外部化到本地堆之外，并且所涉及的对象不能再被称为\
  \ POJO。与这些外部化对象的交互是依赖于框架的，有时还很复杂，并且总是需要以特殊方式处理。\n\n**什么是集群 POJO？**\n\n基于对 POJO 的这种理解，那么，什么是集群\
  \ POJO？对于 Terracotta 来说，集群 POJO 是一个拥有常规 POJO 所有特性，并额外具备存在于集群中所有 JVM 共享的虚拟堆上这一特性的对象。\n\
  \n首先，集群 POJO 应该是一个在集群堆上具有唯一标识的一等对象。这意味着对它的引用应该是普通引用，使得使用 `==` 运算符进行比较时结果为 true。不应该存在对象克隆，无论是通过\
  \ Java 对象克隆机制显式进行，还是通过数据复制或对象序列化隐式进行。因此，你应该能够将集群 POJO 放入一个数据结构中，然后再将其取出，而不会得到该对象的一个副本。对\
  \ POJO 的所有引用，无论是否集群，都应该指向堆上完全相同的对象。\n\n如果同步得当，对象修改应该对共享同一虚拟堆的多个 JVM 上的线程可见，就像这些修改对共享同一物理堆的同一\
  \ JVM 上的线程可见一样。\n\n你还应该能够在集群 POJO 上执行并发操作（例如 `synchronized`、`wait()` 和 `notify()`），并且这些操作在共享同一虚拟堆的多个\
  \ JVM 上的线程间的行为，与它们在共享同一物理堆的同一 JVM 上的线程间的行为完全相同。\n\n由于集群 POJO 的作用域和生命周期超出了任何特定 JVM\
  \ 的范围，集群 POJO 所在的虚拟堆应该在任何特定 JVM 的生命周期之后仍然持久存在。这意味着集群 POJO 是持久的，并且与非集群 POJO 不同，当任意数量的\
  \ JVM 关闭时，它们不会消失。\n\n986-1 CH04.qxd 5/6/08 3:01 PM 第 84 页\n\n**84**\n\n第 4 章 ■ POJO\
  \ 集群\n\n**为什么使用集群 POJO？**\n\n本质上，使用集群堆背后的动机是简单性。使用虚拟堆让你能够专注于应用程序的逻辑，而无需处理显式对象外部化所固有的架构和语义扭曲。所有其他提供对象持久性和/或\
  \ JVM 间通信的尝试，都将对象修改和跨 JVM 消息传递呈现为一个显式的 API，这个 API 不可避免地嵌入在你的应用程序代码中。\n\n人们投入了大量精力来使\
  \ Java 应用程序达到企业级，这意味着它们具有非常高的正常运行时间、可靠地处理数据，并且能够适当扩展以保持感知延迟最小化，无论用户负载如何。为了提供企业级功能，需要\
  \ JVM 未提供的两个特性：\n\n• 对象数据的持久性和可移植性\n• 跨 JVM 线程通信\n\n对象数据的持久性和可移植性是实现可靠性和高可用性所必需的。可靠的数据处理要求应用程序数据是持久的。由于\
  \ Java 堆不是持久的，对象数据必须被外部化到持久存储中。\n\n为了使应用程序具有高可用性，它必须要么运行在高可用性硬件上，要么可以冗余部署在商用硬件上。传统上，Java\
  \ 企业架构师出于多种原因选择了后一种路径来提供高可用性，其中一个重要原因是它可以通过弹性地添加（或移除）商用硬件来适应需求，从而理论上保持延迟稳定，进而实现可扩展性。如前所述，这种横向扩展架构要求至少将应用程序实例的部分运行状态外部化，以便当一个应用程序实例发生故障或下线时，另一个实例可以无缝地接替其位置，从它中断的地方继续执行。因此，对象数据的持久性和可移植性是在横向扩展架构中维护应用程序状态所必需的。\n\
  \n一旦应用程序部署在横向扩展架构中，就不可避免地会出于某种原因产生对 JVM 间通信和协调的需求。典型的例子是缓存刷新或过期以及管理功能。更高级的架构，例如第\
  \ 11 章讨论的主/从形式的工作负载分配，就是专门设计来利用多 JVM 部署环境的，并且需要强大且灵活的 JVM 间通信和协调。\n\n自 Java 诞生以来，这两个特性——对象数据的持久性和可移植性以及跨\
  \ JVM 线程通信——已经以多种或多或少复杂的方式被补充到 Java 执行环境中。许多此类技术的核心是对象序列化，这是外部化对象数据最基本的方式。一旦对象图被序列化，它就可以被导出到持久存储（如文件或数据库）或通过网络传输到另一个\
  \ JVM。\n\n基于这个核心特性，已经构建了额外的支撑结构来提供更复杂的持久化处理（例如，EJB 或像 Hibernate 这样的对象关系映射引擎），或者提供\
  \ JVM 间通信（例如，RMI 或 JMS）和数据共享。\n\n在构思 Terracotta 时，其创建者注意到，如果扩展 JVM 中已有的现有设施，以允许不在同一\
  \ JVM 中的线程参与，那么显式对象持久化和 JVM 间通信框架提供的大部分功能都可以更简单地实现。JVM 已经具有本地和远程对象的概念：线程内存和主内存（堆）。同样，它也已经具有进程间通信和协调的概念：线程级并发原语\
  \ `synchronized`、`wait()`、`notify()` 和 `join()`。\n\n通过添加一个扩展的、连接网络的虚拟堆形式的持久对象存储，并将并发原语的含义扩展到适用于所有参与\
  \ JVM 中的所有线程，从而以与仅考虑单个 JVM 编写的 Java 代码极其相似（即使并非在所有情况下都完全相同）的方式，提供了对象持久性和可移植性以及 JVM\
  \ 间通信和协调这两个企业级特性。\n\n\n\n通过将分布式计算注入 JVM 提供的现有设施中，我们已将分布式计算的许多复杂性从应用层代码中剥离出来——传统上，显式企业框架迫使这些复杂性存在于应用层代码中。如今，分布式计算已成为\
  \ JVM 的一项固有特性，而非需要在应用内部解决的显式问题。\n\n**集群化 POJO 示例**\n\n为了探索使用集群化 POJO 的简便性，让我们看一个深入的示例。该示例是一个零售系统的简化版本，其中包含一个产品目录，客户可以将产品添加到购物车中。操作员可以随时查看任意或所有活跃的购物车。示例代码使用简单的\
  \ Java 数据结构编写。为简化起见，部分问题领域被理想化。例如，在真实系统中，封装在产品、目录、客户和订单类中的业务数据可能由关系数据库支持，并可能由像 Hibernate\
  \ 这样的对象关系系统作为前端，如第 6 章所述。然而，瞬态的购物车数据很可能最好纯粹以简单的 Java 对象形式表达，无需任何记录支持系统。\n\n**示例类**\n\
  \n该系统中有六个重要的类：\n\n• ProductImpl\n\n• Catalog\n\n• ShoppingCartImpl\n\n• ActiveShoppingCarts\n\
