  \n**入门：简单的单工作队列**\n\n**实现**\n\n我们已经研究了在 Java 中实现主/从模式的三种不同方法，每一种的抽象级别都比前一种略高。现在，让我们利用这些知识，将它们整合起来创建一个主/从实现——我们称之为容器——它将实现\
  \ CommonJ WorkManager 接口。我们将使用`java.util.concurrent`抽象来构建我们的容器，这样我们将获得一个标准 API，它拥有足够丰富的抽象，能够提供我们所需的可靠性级别，同时充分利用标准\
  \ Java 并发库的全部性能、稳定性和正确性。\n\n我们将实现三个不同版本的主/从容器。第一个版本将非常简单——实际上甚至算不上简单，而是简陋。然后，我们将用它来整合概念，并为我们迈向真实世界实现的旅程奠定基础。每次实现之后，我们都会花一些时间来研究如何利用\
  \ Terracotta 及其网络附加内存将其扩展到多个节点。\n\n听起来是个好计划？让我们付诸行动。\n\n**实现一个单 JVM 的简陋主/从容器**\n\
  \n我们的第一个简陋实现仅包含一个工作队列、一个主节点和任意数量的工作节点（我们很快就会明白为什么说它简陋）。\n\n我们需要做的第一件事是构建我们的单工作队列，它仅仅是`java.util.concurrent.LinkedBlockingQueue`类实例的一个包装器。该类的语义足以满足我们跨线程或跨\
  \ JVM 的通信需求。然而，我们对其进行包装，只是为了添加一个基本的故障处理策略——如果在尝试向队列添加新工作项时捕获到`InterruptedException`，我们会将工作项的状态设置为`WORK_REJECTED`，并在将异常重新抛出给调用者之前，传递导致问题的异常。清单\
  \ 11-1 展示了我们的单工作队列。这里，`DefaultWorkItem`是我们对`WorkItem`接口的实现。\n\n**清单 11-1.** *SimpleQueue\
