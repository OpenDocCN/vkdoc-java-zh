  \ arg0) {}\n\n}\n\n**Worker 故障转移**\n\n在未使用 Terracotta 的集群环境中，你通常会使用套接字或 JMS 在集群节点间发送消息，此时你会发现检测\
  \ Worker 的死亡相当困难。然而，有了 Terracotta，我们只需要集群成员事件即可。Terracotta 内部的网络库会在网格中的 JVM 之间定期发送心跳消息。在网络层面可以设置多个超时时间，用于检测死锁、挂起或崩溃的\
  \ Worker（以及 Master）。因此，你需要在代码中处理的唯一情况是长时间运行的任务——即 JVM、节点和网络均保持健康，但任务仍然耗时过长。如果你想驱逐一个\
  \ Worker 并将其任务发送到另一个节点，只需使用 JDK 1.5 的 `util.concurrent` 锁机制以及包含超时参数的 `wait()`/`notify()`\
  \ API 来增强 Master/Worker 框架即可。Terracotta 会尊重这些在等待或锁定对象（使用 `wait()` 或 `synchronized()`）时的超时设置。\n\
  \n在所有策略中，当检测到 Worker 故障时，我们需要采取适当的行动。在 Master/Worker 的上下文中，这意味着我们必须将所有待处理、未完成的工作重新路由到另一个管道，由其对应的\
  \ Worker 消费。\n\n使用集群成员事件是目前为止集成故障处理代码最简单、最直接、最稳定的方式。\n\n我们需要做的，是在上一节的 `nodeDisconnected(Object\
