  由于屏障是一个共享对象，主线程将一直阻塞，直到此 JVM 或此 Terracotta 集群中另一个 JVM 中的另一个线程调用 `barrier.await()`。然后，两个线程都将被允许继续执行。如果我们启动另一个应用程序实例，就会发生这种情况。一旦第二个应用程序实例启动，你应该会在控制台中看到类似以下的输出（根据线程到达各个屏障点的顺序，你可能会看到略有不同的输出）：\n\
