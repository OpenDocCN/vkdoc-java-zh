  \nWaiting for everyone to arrive. I'm expecting 1 other thread(s)...\n\n这表明第一个实例中的主线程正在\
  \ `barrier.await()` 处阻塞。\n\n`barrier` 字段是 `java.util.concurrent.CyclicBarrier` 的一个实例。它旨在协调指定数量的线程在某个点到达，以便在所有预期线程到达之前，不允许任何线程继续执行。每个调用\
  \ `java.util.concurrent.CyclicBarrier.await()` 方法的线程都将阻塞，直到指定数量的线程到达屏障点。一旦预期数量的线程调用了\
  \ `await()`，所有在 `await()` 上阻塞的线程将被允许通过 `await()` 方法继续执行。在预期数量的线程通过 `await()` 屏障后，屏障会被重置，以便后续对\
  \ `await()` 的调用将被阻塞，直到预期数量的线程再次调用 `await()`。这就是它被称为循环屏障的原因：一旦屏障被释放，它会循环回到其初始状态。\n\
