  \n你可以在 `<clients>` 配置元素中使用 `<repository>` 元素指定额外的仓库位置。例如，清单 9-3 展示了将要搜索的多个仓库。Terracotta\
  \ 安装目录的 modules 子目录会被首先搜索，因此无需指定它。此外，`<repository>` 元素将按指定的顺序进行搜索，因此如清单 9-3 所示，你可以在网络上的文件服务器上使用共享仓库，同时通过先搜索本地仓库来覆盖共享仓库。目前，仅支持通过\
