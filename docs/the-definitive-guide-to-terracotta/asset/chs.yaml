  \ 来集群化 Web 应用程序中的 HTTP 会话。\n\n•   *第 8 章，集群化 Spring*：本章将引导你完成将一个非 Spring 集群化应用程序转变为支持\
  \ Spring 的集群化应用程序的过程。它将向你展示如何以简单有效的方式集成 Terracotta 和 Spring。\n\n•   *第 9 章，集成模块*：在本章中，我们将向你展示如何使用\
  \ Terracotta 集成模块来集群化外部库或框架，或者模块化你自己应用程序的配置。\n\n•   *第 10 章，线程协调*：在本章中，我们将解释如何在\
  \ Terracotta 中处理线程和并发问题。我们采用一种“菜谱式”的方法，为你提供一些可以应用于你自己应用程序的用例模型。\n\n•   *第 11 章，使用\
  \ Terracotta 进行网格计算*：本章展示了 Terracotta 作为你自己的网格计算应用程序平台的能力。\n\n•   *第 12 章，可视化应用程序*：最后一章描述了如何使用\
  \ Terracotta 的可视化工具来调优你的 Terracotta 应用程序。\n\n**前提条件**\n\n要运行本书中的代码，你需要安装 Java 软件开发工具包\
  \ 1.4 或更高版本。\n\n**联系作者**\n\n有关 Terracotta 的更多信息，请访问网站 [`www.terracotta.org`](http://www.terracotta.org)。\n\
