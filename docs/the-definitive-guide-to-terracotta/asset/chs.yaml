  \n在本节中，我们将解决这两个问题。第一个问题将通过使用最古老的方法——批处理来解决，而另一个问题的解决方案则基于 Terracotta 集群事件。\n\n**工作批处理**\n\
  \n在本章前面部分，我们讨论了使用 Terracotta 开发时需要考虑的两个最重要事项：引用局部性和锁竞争。最小化锁竞争意味着要尽量减小不同线程的等待时间，以进一步利用\
  \ CPU（即提高吞吐量）。然而，另一个与锁竞争密切相关且值得考虑的因素是锁的粒度。在多线程编程中，通常最好让锁的粒度（即临界区的范围）尽可能小。但重要的是要理解，在使用\
  \ Terracotta 时，情况并非总是如此。正如我们在前几章中讨论的，Terracotta 将代码的临界区（即同步块和方法）视为单个事务，并收集此事务内所做的所有更改，形成一个原子变更集，当事务提交时（恰好在锁释放之前），该变更集会被刷新到服务器。\n\
  \n如果你停下来思考一下，收集所有更改的成本相当低，而将它们刷新到服务器（这需要通过网络发送数据）则相对昂贵。细粒度锁背后隐含的网络通信意味着，追求尽可能细粒度的锁并不总是最佳选择。最佳的锁粒度通常取决于具体的用例，但在某些情况下，使用粗粒度锁会看到吞吐量的提升。\n\
  \n在基于主/从的用例中，使锁定（以及事务）更加粗粒度有时可以极大地提高吞吐量。好消息是，在主/从容器中，可以通过批处理以通用方式解决这个问题。具体的实现超出了本书的范围（详情请参见随附代码），但可以相当直接地解决。不是在每个\
  \ `WorkItem` 创建后立即将其添加到特定管道的待处理工作队列中，而是将它们收集到一个工作集合中，并定义一个批处理阈值；每当达到阈值时，就在一个单一的\
  \ Terracotta 事务中将所有工作项放入队列。工作节点在将已完成的工作项添加到已完成工作项的工作队列时，也可以使用相同的策略。\n\n**动态工作节点管理**\n\
  \n我们目前实现的主/从容器具有相当静态的配置。它需要预先知晓所有可能被需要并用于工作调度的管道，因为它们的路由 ID 必须在启动时提供给主节点。这种设置自然对主/从集群的管理和操作施加了非常严格且有时不可接受的限制，尤其是在工作节点故障和故障转移方面，这将是我们在下一节中讨论的内容。\n\
  \nTerracotta 提供了一个高级事件订阅系统，节点可以订阅由其他节点在离开或加入集群时触发的事件。这些事件是标准的 JMX 事件，因此可以被任何符合 JMX\
  \ 标准的库或工具消费和使用。为了简化开发者的工作，Terracotta 提供了一个实用工具库，使得开始使用这些事件变得非常容易和直接。该库名为 `jmx-util`，为简单起见，已复制到本章的\
  \ SVN 仓库中。对该库的详细讲解超出了本章的范围（更多信息请参见第 4 章），但我们将展示如何使用该库来简单高效地实现动态工作节点管理和工作节点故障转移。现在，我们将重构之前章节的代码，以利用\
