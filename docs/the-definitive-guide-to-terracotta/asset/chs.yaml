  \ Terracotta 的历史，为本书其余部分提供背景。\n•   *第 3 章，快速上手 Terracotta*：在本章中，我们将进入 Terracotta\
  \ 的实践环节，介绍其配置的基本概念，并展示一个 Terracotta 集群的简单示例。\n\n986-1 FM.qxd 5/31/08 9:19 PM 第 xxi\
  \ 页\n\nn 引言\n\n**第二十一页**\n\n•   *第 4 章，POJO 集群*：这一实践章节涵盖了如何对现有 POJO 应用程序进行集群。\n\
  •   *第 5 章，缓存*：本章解释了如何使用 Terracotta 来缓解缓存中固有的一些问题，以及如何将缓存的好处带给分布式系统。\n•   *第 6 章，Hibernate\
  \ 与 Terracotta*：在本章中，我们将向你展示如何扩展启用了 Hibernate 的应用程序。我们将介绍 Hibernate 所基于的概念，以便你全面理解使用\
