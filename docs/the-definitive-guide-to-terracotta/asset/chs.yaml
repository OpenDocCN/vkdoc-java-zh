  第 1 2 章 n 可视化应用程序\n\n我们将定义快照工具提供的每个指标，因为这些是可能导致问题的关键 Terracotta 组件：\n\n• *缓存对象逐出请求*：此统计数据跟踪需要将对象从\
  \ Terracotta 服务器逐出到磁盘的次数。\n\n• *L1 L2 刷新*：在 Terracotta 中，L1 是您的某个应用程序 JVM 的昵称。L2\
  \ 是 Terracotta 服务器的昵称。与主板类比一样，“刷新”指的是当 L1 内存不足或垃圾回收对象时，将一些对象刷新到 L2 以释放堆空间的时间点。\n\
  \n• *每次广播的 L2 更改数*：L2 在磁盘上离散地更新每个更改对象的每个字段。如果发生广播，则可能导致 L2 中发生一个或多个更改。此统计数据跟踪每次广播导致的\
  \ L2 更改比率。\n\n• *L2 待处理事务*：L2 在将增量应用到其磁盘之前会保留事务一段时间。这些待处理事务在传输过程中会占用内存。此外，任何属于待处理事务一部分的对象在事务完成之前都不能再次更新。系统将事务保持在待处理状态，以便可以将对对象的冗余更改合并在一起，或者在可能的情况下从更新中压缩掉。当事务被压缩并合并为尽可能少的磁盘更新时，它们会保持待处理状态。因此，此统计数据表示对对象发生大量冗余更新的情况，因此这些对象在更新期间会被系统临时锁定。\n\
  \n• *消息监视器*：此统计数据跟踪通过 TCP 从客户端流向服务器的网络消息数量。\n\n• *线程转储*：此数据是一个标记，它会在所有性能图表上添加一个里程碑标记，注明线程转储发生的时间。在可视化工具中，这些标记是可点击的，并将显示在性能测试期间请求并记录到快照中的线程转储。虽然我们从未在管理控制台中点击过“获取线程转储”按钮，但请随意尝试此功能。\n\
  \n• *已逐出的缓存对象*：此统计数据与逐出请求直接相关。逐出请求跟踪应该发生逐出的次数，而此统计数据跟踪实际从内存中逐出了多少个对象。\n\n• *L2 广播计数*：L2\
  \ 将向驻留在多个 L1 JVM 中的对象广播任何增量。“广播”这个说法并不准确，因为 L2 会确定哪个 L1 需要某些更新，并且实际上从不向最终不需要这些更改的\
  \ JVM 发送更新。系统会跟踪发生的每次广播，这意味着此统计数据提供了对以下情况的可见性：每当一个 JVM 中的对象发生更改，并且该对象驻留在另一个 JVM\
  \ 中且需要更新时。\n\n• *来自磁盘的 L2 故障*：当 L2 内存太少，无法在 Java 堆的 RAM 中维护所有对象时，它会将对象溢出到磁盘。此统计数据表示\
  \ L2 必须从磁盘加载对象以满足 L1 对象需求的次数。\n\n986-1 CH12.qxd 5/28/08 10:06 PM 第 313 页\n\n第 1\
  \ 2 章 n 可视化应用程序\n\n**313**\n\n• *L2 事务计数*：在 Terracotta 中，事务被定义为由同步边界标记的一组对象更改。当对象在\
  \ JVM 中被解锁时，特定线程中做出的所有更改都将被刷新。一个 Terracotta 事务既不是单个对象字段更改，也不是单个对象更改。事务是使用 Java 锁捆绑在一起的、特定于应用程序数量的字段更改。例如，一个应用程序可能会在锁内的\
  \ setter 方法中更改一个对象字段。另一个应用程序可能会在释放对象锁之前在 for 循环中更改一千个对象。对于应用程序一，单个事务等于一个字段更改。对于另一个应用程序，单个事务等于\
  \ 1,000 个字段更改。无论应用程序对事务的定义如何，此指标都会对其进行计数。\n\n• *阶段队列深度*：L2 本质上是异步的，这意味着，像现代操作系统一样，它使用一组固定的资源，并在所有待处理工作之间分配时间，每次执行每个任务的一小部分。例如，当一个\
  \ JVM 需要来自 Terracotta 的对象时，检索这些对象的任务被分解为多个阶段，并且每个阶段可能有许多 JVM 请求在该点等待工作。阶段队列深度跟踪允许查看所有\
  \ L2 阶段，并显示服务器中每种类型的待处理工作量。使用此指标来确定您的应用程序是否在 Terracotta 内部导致了特定类型的瓶颈。这可以让您详细了解哪些地方缓慢或存在瓶颈，所有这些都是希望您可以更改应用程序以避免潜在的减速。\n\
  \n\n\n• *JVM 垃圾回收器*：该统计指标追踪垃圾回收器在所有 JVM 上的行为。\n\n• *分布式垃圾回收*：这个 Terracotta 特有的概念，更应被理解为分布式垃圾的收集器，而非分布式的垃圾回收器。该工具从不遍历所有\
  \ JVM 的内存来定位集群中的垃圾。它仅在 L2 内部运行。然而，在分布式垃圾回收的关键时刻，L2 会暂停所有其他类型的工作，确保没有正在被活跃引用的对象被标记为垃圾。与\
  \ Java 垃圾回收一样，这种 L2 回收在暂停系统时可能导致瓶颈。\n\n• *每事务 L2 广播*：此统计指标表示广播与事务的比率。如果你的应用每秒更新对象\
  \ 1000 次，且每次更新都导致一次广播，那么比率就是 1:1。1:1 的比率意味着所有事务都会引发广播，这表明引用的局部性较差，并且很可能限制了可扩展性。广播比率为零意味着没有对象同时驻留在多个\
  \ JVM 中。这样的配置应该具有线性可扩展性。\n\n• *L2 L1 缺页*：此统计指标追踪与刷出相反的情况。当某个 JVM 需要本地堆中没有的对象时，就会发生缺页。L1\
  \ 必须等待 L2 发送该对象，因此会被 L2 阻塞而无法继续推进。良好的局部性加上适当数量的 JVM，意味着一个 JVM 应该总有足够的内存来将其使用的所有对象保存在本地堆中。缺页越少，可扩展性越好。\n\
  \n• *内存*：此统计指标追踪堆内存随时间的使用情况。对于 JDK 1.5 或更新版本，这些数据可以通过 JConsole 独立获取，但 Terracotta\
  \ 将这些数据与所有其他统计指标放在同一位置，以便于关联分析。\n\n986-1 CH12.qxd 5/28/08 10:06 PM 第 314 页\n\n**314**\n\
  \n第 12 章 n 可视化应用\n\n• *系统属性*：这根本不是一项统计指标，而是每个 JVM 在启动时传入和设置的所有 Java 属性的快照。这有助于判断某个\
  \ JVM 的配置是否与其他 JVM 不同。它也有助于确定特定数据快照的设置是什么。\n\n**深入 Terracotta 服务器内部**\n\n现在是解释为什么\
  \ L2 不会自动成为瓶颈的好时机。广播、刷出/缺页以及锁瓶颈这些概念，都是 L2 内部实现细节的直接结果。要完全理解这些概念，需要理解 Terracotta\
  \ 服务器的内部机制。\n\nSEDA\n\n自首次发布以来，Terracotta 就基于阶段事件驱动架构（SEDA）的原则，设计为异步工作流。SEDA 是一种概念，它将任何任务分解为其组成部分，然后通过外部工作流执行引擎在其执行生命周期中进行管理。在第\
  \ 11 章中，你了解了主/从关系，它可以用于将工作分散到 JVM 集群中。SEDA 背后的概念与主/从类似，但 SEDA 用于将工作分散到单个 JVM 中的多个线程上，其方式是每个工作阶段都不知道其前后阶段的存在。\n\
  \nSEDA 由构建块组成。具体来说，队列、排水口和水龙头构成了其接口。队列代表一个工作桶。排水口代表从一个桶到另一个桶的输出连接，水龙头代表对一个桶的输入。想象一下水流经一系列桶和软管的情景。现在，设想一个\
  \ Servlet 容器，并使用这种范式将其处理 HTTP 请求的各种内部阶段分解开来。\n\n基于 SEDA 的 Servlet 容器可以提供多线程 Servlet\
  \ 容器的所有能力。主要区别在于，基于 SEDA 的容器不会为每个用户请求占用系统资源，而例如 Tomcat 5.*x* 容器则会。另一方面，Tomcat 的核心开发人员在使用线程局部变量处理\
  \ HTTP 请求时，可以轻松地提供安全性和上下文管理。如果基于 SEDA 的容器仅使用线程局部对象，则会遇到对象作用域问题，因为一个线程只完成部分工作，因此必须将其创建的对象打包，以便其他线程能够访问。\n\
  \n尽管由于 SEDA 带来的解耦、异步编程的负担，它可能适合你也可能不适合你，但它绝对适合 Terracotta 服务器。该服务器不会在 JVM 中引起不必要的线程争用。它也不会随着流经系统的事务数量增加而增大规模和资源利用率。SEDA\
  \ 使得 Terracotta 服务器的延迟和吞吐量非常高效且可预测。\n\n将一个看似单一的任务分解成多个部分，然后将这些部分分散到多个线程上，其价值与主/从模型不同。SEDA\
  \ 旨在帮助架构师以逻辑方式分解任务，以便可以将可串行化的工作阶段与可并行化的工作阶段分离开来，同时工作始终以一致的方式在并行和串行阶段之间流动。在主/从场景中我们获得并行性，而\
  \ SEDA 可以在系统的不同阶段同时提供并行和串行执行。理解 Terracotta 服务器内部的 SEDA 工作流将有助于\n\n986-1 CH12.qxd\
  \ 5/28/08 10:06 PM 第 315 页\n\n第 12 章 n 可视化应用\n\n**315**\n\n你理解为什么集群应用执行的某些操作会比其他的运行得更快。\n\
  \nTerracotta 的 SEDA 管道\n\n在 Terracotta 服务器内部运行的 SEDA 管道，通过可视化工具提供给 Terracotta 用户。因此，理解该管道以及工具可能指示的内容非常重要。图\
  \ 12-12 展示了 Terracotta 服务器内部的内部结构。这些结构必须相互通信才能完成任何工作。\n\n**图 12-12.** *Terracotta\
  \ 服务器内部的 SEDA 阶段* L2 内部的阶段可以分为四个部分。第一个是事务处理，在图中表示为最左侧的集群。第二个是广播管理，由广播事务和事务确认阶段表示（图\
  \ 12-12 中的“广播 txn 阶段”和“txn ack 阶段”）。最后两部分是你所期望的，即对象请求/响应和锁请求/响应。由于这些部分是独立的 SEDA\
  \ 阶段，因此可以并行地获取锁、缺页和刷出对象以及提交事务。事实上，一旦 L1 将事务刷出到服务器，它就可以立即继续执行。服务器必须确保所有其他 L1 在必要时确认此事务。因此，在大多数情况下系统是异步的，而广播会使服务器进入同步模式，必须管理所有确认并保证交付。\n\
  \n使用可视化工具，我们可以判断服务器在这四个组中分别做了多少工作。并且使用这些工具，我们可以判断服务器是否跟上了应用生成的工作负载。在通过工具确认我们的预期之前，让我们先回顾一下我们的预期。\n\
  \n986-1 CH12.qxd 5/28/08 10:06 PM 第 316 页\n\n**316**\n\n第 12 章 n 可视化应用\n\n**寻找局部性问题**\n\
  \n\n\n当越来越多的内部 SEDA 阶段必须参与对象更新时，Terracotta 服务器将成为瓶颈。例如，如果对一个对象的更新需要广播到多个 JVM 并刷新到磁盘，并且该更新针对的是最近事务中已更新的相同对象，则服务器必须对所有操作进行排序，并在等待其他操作完成时挂起多个处理阶段。JVM\
  \ 之间重叠的对象更新越少，系统运行速度就越快。将对象保留在不需要它们的 JVM 之外，并尽可能将对象常驻内存以靠近处理器的概念，被称为**引用局部性**。\n\
  \n成功调优应用程序的秘诀之一就是尝试维持引用局部性。“引用”指的是对象引用，“局部性”指的是尽可能将对象引用保持在 L1 和 L2 缓存附近。如果 Terracotta\
  \ 管理的数据占用的空间超过可用内存，L1 将无法维持局部性，并且会将任何不需要或无法保留的数据溢出到 L2。如果 Terracotta 管理的数据必须溢出到磁盘，L2\
  \ 将无法维持局部性。\n\n任何及所有 I/O——无论是磁盘、网络，甚至是内存——都可能导致应用程序瓶颈。快照和可视化工具收集的数据提供了系统可能执行 I/O\
  \ 并最终等待该 I/O 的每个点的针对性视图。\n\n使用该工具自行确认您的应用程序具有良好的局部性，这意味着在大部分时间里，不需要频繁地从 L2 到 L1\
  \ 以及从磁盘到 L2 进行对象错误加载。回想一下，我们以不同的方式执行了 `inventory.pounder` 应用程序。`pounder` 处理 `productArray`\
  \ 中的随机元素，这意味着两个 JVM 一直在对相同的对象进行更改。而 `poundOneProduct()` 则是在一个循环中更新同一个产品，即 1GB 闪存卡，这明确破坏了引用局部性，并强制在两个\
  \ JVM 之间推送和确认对象更改。最后一个模型处理的是两个不同的对象，每个 JVM 中各一个。\n\n可以将引用局部性类比为线性可扩展性。只要我们的应用程序在运行时不跨\
  \ JVM 共享对象，除了与 L2 的通信外，就不需要其他通信。这是最快的运行方式，因为 L2 不会为了等待其他 L1 确认更新而阻塞来自任何一个 L1 的事务流。让我们自行确认，以高度本地化模式运行的\
  \ `inventory.pounder` 应用程序比在所有 JVM 中更新随机对象时运行得快得多。\n\n**inventory.pounder 中的特定瓶颈**\n\
  \n我们在本章开头创建的 `pounder` 基本上以两种不同的模式运行。这些模式经过精心设计，旨在说明真实应用程序在 Terracotta 环境中运行时将遇到的关键瓶颈。鉴于您对\
  \ Terracotta 服务器内部机制的新理解，让我们回顾一下这三个测试。\n\n广播更改\n\n每当多个 JVM 触及同一个对象时，就会出现一个问题：一个上下文中的所有更改必须发送到该对象驻留的所有\
  \ JVM。在我们每个 `pounder` 测试中，特定的广播速率（由工具测量的每事务广播次数）是不同的。这将直接导致不同的性能特征。我们将通过检查两个 JVM\
  \ 在同一个产品上、在同一映射中的不同产品上以及在不同映射上（使用独立根运行时，`inventory` 与 `inventory2`）进行压力测试时的事务吞吐量来验证这一断言。\n\
  \n锁获取\n\n现在让我们考虑获取锁的成本。通过网络获取锁可能代价高昂，原因有二。第一个问题是，如果 JVM 不必首先通过网络到 L2 请求锁，它们可以更快地锁定和解锁。第二个问题是，Java\
  \ 锁定是排他性的，这意味着一个锁内一次只允许一个线程。\n\n在本书中，我们多次提到贪婪锁优化。我们可以通过查看各种 `pounder` 测试运行期间记录的锁定统计信息来确认此优化是否存在。考虑仅在单个\
  \ JVM 上再次运行 `pounder`。在这种修改后的测试中，JVM 会将所有锁保留在本地，并且不会向 L2 发出任何锁请求。因此，这种修改应该会显著增加每秒事务数，或者相应地减少完成场景所用的时间。\n\
  \n在您运行的测试中，`poundRandomProducts()` 随机更新对象，其贪婪性低于在循环中更新同一产品 `1GFR` 的测试。在第二种场景中，Terracotta\
  \ 服务器将贪婪地授予锁，并且 L1 将在将锁让给其对等节点之前保持该锁多次迭代。在第一种场景中，系统无法判断这种将锁长时间授予 L1 的优化是否有益，因为 L1\
  \ 每次通过循环时都会获取不同的锁。\n\n由于 L1 处理的对象随时间变化，因此在处理随机对象时，贪婪锁优化的效率较低，因此锁获取是一个有趣的瓶颈。我们将在测试结果中研究锁的贪婪性。\n\
  \n**可视化瓶颈**\n\n现在您已经深入理解了堆栈中的各个层，可视化各层之间微妙的相互作用将具有启发性。首先，再次启动 Terracotta 可视化工具。\n\
  \n> cd $TC_HOME/lib; java -cp tc.jar com.tc.admin.cvt.ClusterVisualizerFrame 使用检索功能从三次\
  \ `pounder` 运行中获取数据。保持所有复选框选中，然后单击“生成图表”。图 12-9 演示了如何执行此操作。\n\n滚动浏览右侧窗格中的各种图表。注意每个客户端和\
  \ Terracotta 服务器的不同事务速率。请记住，事务可以批量提交，锁可以贪婪地授予。因此，L1 实例和 L2 CPU 对系统内这些事件发生次数的看法应该不同。\n\
  \n让我们重点关注两个图表：L2 视角的事务速率（如图 12-13 所示），以及同一时间段内 L2 内部的 SEDA 阶段（如图 12-14 所示）。\n\n\
