  \n}\n\n调优锁\n\n\n\n我们刚刚添加的两种压力测试方法都包含了同步机制。在同步代码块内部，这两个方法都调用了同样被同步的 `Product.setPrice()`。鉴于同步机制在\
  \ Java 内存模型中的工作方式（回顾第 1 章讨论的 JSR 133），Terracotta 必须在锁释放时推送数据。图 12-3 展示了一个场景：一个线程可以持有对象\
  \ B 的锁，然后获取对象 A 的锁并修改 A，而在稍后的某个时间点，第二个线程可以在 B 解锁之前获取 A 的锁。\n\n**图 12-4.** *锁批处理*\n\
  \n线程二必须看到线程一对 A 所做的更改。如果我们查看 `Product.java` 文件中的 `Product` 类，会发现 `setPrice(double\
  \ p)` 方法在内部进行了同步。\n\npublic void setPrice(double p) {\n\n**synchronized (this) {**\n\
  \nprice = p;\n\n**}**\n\n}\n\n如果保留这种同步机制，最终应用程序会在我们并不希望的地方出现瓶颈，因为压力测试方法会尽可能快地更改\
  \ `Product` 对象的价格。考虑到每次释放锁时都需要刷新更改，每次调用 `setPrice()` 都会发生网络 I/O。如果压力测试方法和 `setPrice()`\
  \ 都锁定了对象，那么每次循环中我们会刷新两次更改。\n\n因此，我们必须要么注释掉 `setPrice()` 方法中的同步，要么修改 `tc-config.xml`\
  \ 以避免自动锁定此方法。如果没有 `setPrice()` 上的同步，两个压力测试方法中的同步将生效。\n\nn**注意** 如果 `setPrice()`\
  \ 上有同步，两个压力测试方法中的同步将没有数据可刷新，因为 `setPrice()` 会自行触发刷新。你应该尝试使用我们即将启动的可视化工具来观察这种锁定行为。首先保留\
  \ `setPrice()` 方法中的同步，然后移除它，并比较性能。\n\n我们不会费心向你展示如何注释掉同步，但如果你对修改配置文件感兴趣，以下示例说明了在库存演示根目录下的\
