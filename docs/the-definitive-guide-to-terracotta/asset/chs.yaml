  \ PM 第 142 页\n\n**142**\n\n第 6 章 n HIBERNATE 与 TERRACOTTA\n\n存储分离实例\n\n要在应用程序中使用分离实例，您必须将它们存储在某处，并在应用程序需要时检索它们。如何执行此操作取决于您，并取决于应用程序的需求，但应用程序开发人员通常采用三种常见策略之一。\n\
  \n**将分离实例存储在 HTTP 会话上下文中**\n\n如果您在 Web 应用程序中工作，可以访问 HTTP 会话上下文，并且您存储的 Hibernate\
  \ 对象与当前用户相关，您可以选择将 POJO（分离实例）存储在 HTTP 会话上下文中。\n\n要将分离实例存储在 HTTP 会话上下文中，只需使用 HTTP\
  \ 会话中的 `setAttribute()` 方法，就像处理任何其他您希望缓存在会话中的对象一样：\n\n//~ 检索 foo 对象\n\nsession.beginTransaction();\n\
  \nObject foo = { Hibernate HQL }\n\nsession.getTransaction().commit();\n\n//~ 存储在会话中\n\
  \nrequest.setAttribute(\"fooObject\", foo);\n\n**将分离对象存储在 HashMap 中**\n\n在其他上下文中，如果您无法访问\
  \ HTTP 会话上下文，或者您的数据涉及多个用户，则将分离实例存储在 HTTP 会话上下文中可能没有意义。另一种选择是将它们存储在 HashMap 中。\n\n\
  要将分离对象存储在 HashMap 中，只需使用 HashMap 的 `get()` 和 `put()` 方法，如下面的代码片段所示。最合适的键可能是用于从数据库表中获取行的主键。为了确保这些对象在\
