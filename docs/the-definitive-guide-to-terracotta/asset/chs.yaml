  \n</autolock>\n\n</locks>\n\n现在应用程序几乎可以运行了。对领域模型的最后一项更改是引入独立根。\n\n### 使用独立根\n\n\
  当我们开始寻找瓶颈时，独立根将证明非常有用。“独立根”意味着库存应用程序的一个实例将能够连接到其自己的共享对象数据副本，并且没有其他 JVM 会看到或与此 JVM\
  \ 共享对象。通过独立根，你可以基准测试集成 Terracotta 后以及同时运行多个应用程序实例时的性能，这将有助于隔离我们自身应用程序逻辑中的瓶颈，与 Terracotta\
  \ 服务器中可能存在的瓶颈区分开来。\n\n不要仅仅基于启动并运行 Terracotta 后的初步观察，就假设 Terracotta 速度慢或会给你的应用程序带来高开销。\n\
  \n相反，请使用系统化的方法，比如我们即将共同采用的方法。到目前为止概述的方法包括对数组中的随机产品进行压力测试，以及对单个产品进行压力测试。实际上，测试将运行多次，既是为了获取有效的样本数据，也是为了运行各种场景。`poundOneProduct`\
  \ 将在两个 JVM 分别对同一产品和不同产品进行压力测试时运行。`poundRandomProducts` 将只运行一次。\n\n随着独立根的加入，所有测试将重新运行。第二组测试将在\
  \ JVM 启动时进行，这样每个 JVM 将获得自己的根，而不是共享一个根，但所有根都将存储在同一台 Terracotta 服务器中。因此，在两个 JVM 上运行的\
  \ `poundRandomProducts()` 将对两个独立的数组进行压力测试。而 `poundOneProduct()` 可以在每个 JVM 上对相同的产品\
  \ ID 进行压力测试，但修改的是 Terracotta 中不同的对象。这种独立根模式可能看起来像是额外的工作，但它使我们能够确认测试中一个 JVM 中的对象不会被另一个\
  \ JVM 所需。现在让我们进行适当的更改。\n\n打开名为 `Store.java` 的文件。更改名为 `Store` 的类顶部的成员字段，如下所示：\n\n\
