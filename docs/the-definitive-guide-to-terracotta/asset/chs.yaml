  内存复制可能通过两种方式压垮应用实例。首先，将应用的整个工作数据集保存在内存中的压力，可能会使 JVM 的垃圾回收器不堪重负。其次，将此实例上的每次更改复制到所有其他实例的压力，可能在小至两个节点时就已过大，具体取决于工作负载。很少有简单的复制方案能够扩展到三到四个节点以上。似乎内存复制和有状态编程模型的扩展性比无状态模型更差。然而，有状态架构也有其优点。\n\
  \n在任何可以对数据库进行分区的场景下，都可以对内存架构进行分区。这意味着，如果客户表可以分成两半，那么一半的客户内存数据可以存储在一台服务器上，另一半存储在另一台服务器上。一旦数据进入内存，访问该数据的延迟就几乎降为零。低延迟是有状态架构的最佳品质。\n\
  \n有状态架构中唯一无法解决的风险是可用性问题。如果单个进程断电，借助复制我们可能不会丢失任何东西；但如果所有应用进程都断电，我们几乎肯定会丢失内存中的所有数据。\n\
  \n为了换取可用性风险，我们希望获得简单性上的好处。如果我们处理的是内存中的对象，难道不能避免应用与数据库之间经典的阻抗不匹配问题吗？遗憾的是，答案是否定的。无论是使用\
  \ EJB（远程 Bean 或消息 Bean）、Java 消息服务（JMS）、HTTP 会话复制、远程方法调用（RMI）还是其他方法，都会出现相同的数据流：**1.**\
  \ 在一个服务器中创建一个对象。\n\n**2.** 该对象被序列化并推送到所有其他服务器。\n\n**3.** 该对象随后在该服务器中被更改。\n\n**4.**\
  \ 该对象现在必须在所有其他服务器中更新（即，回到步骤 2）。\n\n由于内存中的对象实际上会被序列化以在网络上发送，因此两台服务器会拥有该对象的不同副本。序列化允许多个线程同时编辑对象而不会破坏对象。可以通过如下方式增强上述数据流以证明这一点：\n\
  \n**5.** 某个线程需要该对象。\n\n**6.** 该对象从缓存或另一个 JVM 中反序列化。\n\n**7.** 该对象在此服务器中被更改。\n\n\
  **8.** 该对象现在必须在所有其他服务器中更新。如果另一台服务器同时编辑了此对象，则抛出异常，并丢弃此服务器或另一台服务器中的更改。\n\n此数据流意味着，与我们对象交互的每个线程都必须处理该对象的一个副本。换句话说，不仅步骤\
  \ 2 中创建对象的线程必须序列化对象以将其发送到其他 JVM，而且步骤 5 中消费对象的线程也必须反序列化它才能访问该对象。为什么？答案要追溯到并发性。在无状态模型中，内存中的对象显然只是数据库行的一种临时表示，这意味着数据库才是真正的记录系统。然而，在内存中，谁维护记录系统并不明确。事实上，所有\
  \ JVM 共同构成了记录系统。通过要求应用程序处理对象副本，使用内存复制来近似实现数据库的事务能力。\n\n986-1 CH02.qxd 4/28/08 9:54\
  \ AM 第 30 页\n\n**30**\n\n第 2 章 ■ TERRA COT TA 的历史\n\n更确切地说，序列化对象图以发送到网络，以及反序列化从网络接收到的字节数组，这一行为迫使应用开发者接受一种“读取时复制”的语义。我们将在第\
  \ 3 章和第 4 章花更多时间讨论对象标识。现在，我们先断言：有状态编程并不比无状态编程更简单。而无状态编程也并不比有状态编程更具可扩展性，这是因为数据条带化（striping）对于有状态和无状态范式都适用。\n\
  \n**殊途同归：分区**\n\n到目前为止，在第 2 章中，所有分析都集中在复制与分区的对比上。分区，有时被称为分片（sharding）或分而治之，是一种将数据跨服务器集群拆分的技术。通过沿着一致的界限划分数据以及相应的工作，分区可以缓解网络和数据库流量中许多典型的瓶颈。例如，一个典型的数据库应用需要支持创建、读取、更新和删除操作。如果创建操作将数据拆分到两个数据库实例，而读取、更新和删除操作也以相同方式拆分数据，那么两个大小相似的数据库服务器将提供单个服务器两倍的容量。图\
  \ 2-4 展示了通过将业务数据划分为偶数和奇数键，在两台服务器之间进行数据分区的概念。\n\n**图 2-4.** *通过将数据拆分为偶数和奇数来对 CRUD\
  \ 应用进行分区*\n\n■**注意** 图 2-4 中，未分区和已分区的负载均衡器是不同的。未分区版本很简单，将任何流量发送到任一应用服务器。已分区的负载均衡器应了解分区逻辑，并根据数据分区规则将工作路由到不同的应用服务器。\n\
  \n986-1 CH02.qxd 4/28/08 9:54 AM 第 31 页\n\n第 2 章 ■ TERRA COT TA 的历史\n\n**31**\n\n\
  对于许多应用团队来说，分区似乎是实现可扩展性的唯一途径，因为随着应用的增长，数据复制或管理会成为首要瓶颈。正如我们已经讨论过的，应用可以通过缓存并在内存中保存更多数据，或者将数据条带化到多个物理位置来提升速度。\n\
  \n更准确地说，在无状态架构中最容易实现高可用性，而横向扩展则迫使我们把数据推入内存并进行复制。事实上，大多数真实应用同时具备无状态和有状态特性，这正是 Terracotta\
  \ 所认识到的。开发者和运维人员需要一种方法，从根本上摆脱可用性和可扩展性之间的权衡（见图 1-4），而无需过早地走上应用分区的道路。\n\n**Terracotta\
  \ 的起源：一个网络巨兽**\n\n\n\n在构建一个跻身全球前十的电商网站——一个庞然大物——的过程中，某些架构决策被证明至关重要，而另一些则不如最初设想的那样重要。该应用被设计为有状态且负载均衡的，所有业务数据及关联的工作流都通过数据库事务进行管理。事后看来，数据库事务显然是个错误，这主要是因为在三层架构系统中，事务意味着工作流在数据库和\
  \ Java 层之间分散。Java 层生成更新任务，并请求数据库进行更改，而这些更改可能因各种原因被拒绝。\n\n现在，这就像一支交响乐团有了两位指挥。\n\n\
  讨论 Terracotta 的起源，似乎与讨论应用层的扩展问题有些跑题。但事实并非如此：架构本应基于 Java 层的工作流。然而，在 2000 年，Java 层的工作流存在一个问题。这个问题就是内存（或堆）的易失性。如果会话状态（也称为工作流状态）保存在内存中，那么会话可能会丢失。当时，还没有一种线性可扩展的方式能为内存中的复制状态提供高可用性。因此，业务数据存储在数据库中，并在应用层进行缓存，这使得网站陷入了一种有状态/无状态的混合模式：数据库数据被缓存并在内存中复制，以避免数据库瓶颈。可以将这种架构理解为“从内存读取”（因为大部分数据库数据都被缓存了）和“写入磁盘”（因为所有\
  \ I/O 操作都通过直接将更新刷新到数据库来保证持久性）。\n\n当时的一种替代方案是分布式事务。在 JVM 中，或者作为一种可扩展的 Java 服务，并不存在跨\
  \ Java 进程以一致方式共享状态和协调更新的基础架构，而构建一个具有事务保证的分布式内存系统似乎很困难。另一种替代方案是最终一致性架构。\n\n虽然其他网站，如\
  \ Amazon.com，采用了最终一致性的方法，即每个应用实例可以完成对本地磁盘的事务，并最终刷新到数据库，但 Terracotta 的创始人并没有选择这条路。该业务尚未准备好讨论最终一致性架构的后果，在这种架构下，用户可能会在结账完成很久之后，被告知之前确认的采购订单因库存计算错误而无法完成。\n\
  \n986-1 CH02.qxd 4/28/08 9:54 AM 第 32 页\n\n**32**\n\n第 2 章 ■ Terracotta 的历史\n\n\
  ■**注意** 这里所说的“最终一致性”，我们指的是 CAP 定理，它涉及一致性、可用性和分区容忍性之间的权衡。最终一致性架构是一种优先考虑分区容忍性而非一致性的架构。例如，一个电商购买交易可以在两个独立的节点上进行，之后通过意识到同一客户正在同时购买相同的产品来协调，从而在扣减客户财务账户之前取消其中一个订单。\n\
  \n**应用程序就是一台巨型计算机**\n\n在初始上线后的几周内，生产环境的应用就无法处理用户量了，而数据库就是罪魁祸首。我们立刻学到了第一课：n 层应用应该被视为一台巨大的多处理器计算机。现代英特尔架构要求在运行速度极快的处理器与无法跟上处理器速度的\
  \ I/O 子系统之间设置多个缓存层级。多处理器计算机在芯片上有寄存器，也有 L1 缓存，以及一个芯片外部的 L2 缓存，该缓存可以是每个芯片专用的，也可以是跨处理器共享的。\n\
  \n处理器会读取主内存的这些不同缓存层。来自主内存的数据会被缓存在 L2 中，然后再缓存在 L1 中。如果一个线程跨处理器移动，线程栈中的数据必须从一个芯片的缓存移动到另一个芯片的缓存，这是上下文切换过程的一部分。硬件会以某种透明的方式处理每个缓存层级的一致性。\n\
  \nL2 缓存比 L1 缓存大得多，但由于不在芯片上，速度也慢得多。\n\n这意味着访问 L2 的成本很高，但现代服务器拥有较大的 L2 缓存，因为访问 L2\
  \ 的成本仍然远低于访问主内存。共享 L2 可以显著降低甚至消除上下文切换的成本。\n\n在主板与应用的类比中，我们可以将 L1 视为 JVM 内部的缓存，因为应用访问自己的堆几乎不需要付出代价。在\
  \ n 层应用中，应用服务器每次查询平均要花费几百毫秒等待数据库。在芯片的类比中，CPU 要花费几千个周期等待主内存或磁盘。数据库是昂贵的，就像主板上的主内存一样。\n\
  \n一旦我们意识到这一点，每个 Java 进程中的缓存感觉就像是处理器上的 L1 缓存。引入一个可以作为所有 L1 缓存超集缓存的 L2 缓存，即使不是显而易见的，也变得合理且可接受。这个\
  \ L2 服务帮助应用实例避免等待数据库，同时也降低了跨这些应用服务器实例进行上下文切换任务的成本。如果 L2 要在这个网络巨兽上取得成功，它只有一个要求——调用\
  \ L2 的成本必须低于调用底层数据库的成本，理想情况下要快一个数量级。\n\n一旦实现，这种 L1 结合 L2 缓存服务的方法消除了几个大的可扩展性瓶颈。首先，就像在主板上一样，不再有将所有线程数据都塞进应用服务器内部\
  \ L1 缓存的压力。相反，整个数据集都可以缓存在 L2 中，无论应用服务器拥有多少内存，只要共享的 L2 能够溢出到磁盘即可。这使得应用服务器可以保持\n\n\
  986-1 CH02.qxd 4/28/08 9:54 AM 第 33 页\n\n第 2 章 ■ Terracotta 的历史\n\n**33**\n\n非常小巧。其次，L1\
  \ 可以在高负载下通过简单地丢弃部分或全部缓存数据来释放内存。L1 可以任意且单方面地从缓存中驱逐条目，而不会对数据库造成下游压力，因为 L2 会保护应用免受数据库影响，反之亦然。这使得应用服务器能够保持可预测的吞吐量，同时使数据库工作在可持续的较低查询量下，远低于网站实际产生的查询流量。\n\
  \n在应用服务器外部运行 L2 缓存并在应用服务器实例之间共享该 L2 的第三个好处是，即使数据库宕机，L2 也能为缓存中的数据提供可用性。L1 可以使用传统的缓存技术，例如最近最少使用/最不经常使用，来刷新缓存。即使数据库繁忙或不可用，L2\
  \ 也能处理请求。因此，让 L2 的性能优于底层数据库，不仅提供了可扩展性，还提供了高可用性。\n\n由于 L2 的概念，该网站可以跨机器分布，从而轻松获得可扩展性和可用性。有了\
  \ L2 服务，数据库在帮助扩展系统方面的作用大大减弱。而有了应用服务器实例内部的 L1 缓存，线性扩展就成为了可能。\n\n■**注意** 对于两台机器，一个设计良好的应用应该能够完成一台机器两倍的工作量。\n\
  \n\n\n实际上，将应用实例分散到不同的硬件上（即横向扩展）应该优于多处理（纵向扩展）架构，因为所有资源都是双倍的，没有任何共享。\n\n我们获得双倍的内存、磁盘、网络、总线和处理器。三台服务器、四台服务器，以此类推，只要应用能够充分利用所有这些硬件，就能实现线性扩展。\n\
  \nTerracotta 的架构与其“网络巨兽”父级类似，都包含 L1 和 L2 组件。主板类比映射到 Terracotta，因为 Terracotta 拥有可安装到应用\
  \ JVM 中的库，并透明地插入 L1 对象缓存，而 Terracotta 服务器通常在其自己的进程中运行，位于专用服务器上，就像 L2 一样。\n\n**Terracotta\
  \ 使 L2 通用化**\n\n跨服务器运行应用似乎是个好主意，尤其是考虑到 L2 解决方案。但 Terracotta 的 Web 应用经验证明，成本正从昂贵的数据库硬件转移到复杂的应用开发上。为了将\
  \ L1 缓存注入任意 Java 应用，Terracotta 必须构建一个通用服务器（L2 服务器），使其更智能地了解存储内容及调用时机。\n\n**最初的 L2\
  \ 具有侵入性**\n\nL2 缓存虽然关键，但并非完整的解决方案。Terracotta 利用了 L2 概念的力量，同时也为围绕对象分布（复制和序列化）的复杂性提供了解决方案。针对“网络巨兽”的\
  \ L2 解决方案是一个简单的网络缓存服务，它接收键和关联值，将这些键值对通过网络推送并存储在 L2 服务器实例上。除非开发者有意为之，否则不会有对象最终进入\
  \ L2。\n\n由于正确性和性能的持续退化，维护这个巨兽级网站变得困难重重。有时，开发者会忘记序列化并复制对基于 L2 的对象的更改，导致当负载均衡器将用户发送到其他应用服务器时，应用崩溃，因为数据仅存在于一个\
  \ JVM 中，从而失去一致性（如图 2-5 所示）。\n\n**图 2-5.** *开发者错误：IncrementValue() 操作未更新集群缓存* 当开发者过于频繁地复制更改，或忽略内存缓存而直接将数据存储到数据库时，应用性能也会受到影响。横向扩展的成本非常高。\n\
  \n在创立公司时，Terracotta 的领导者们力求同时交付无状态和有状态范式的价值。具体来说，目标是为运维人员提供一个无状态的运行时环境，配备一个持久化到磁盘的\
  \ L2；同时为开发者提供一个有状态的编程模型，其中 L2 对应用透明，且一致性和复制方面的挑战不复存在。\n\n数百名开发者在同一个代码库中工作的现实，导致手动复制工具被误用或弃用。没有任何手动工具能解决所有问题，它仅在其设计用例恰好符合开发者需求时才适用。\n\
  \n这些挑战是应用程序编程接口（API）问题的固有部分。API 执行的是将其集成到应用中的开发者的指令。任何 L2 类型解决方案所需的集成或应用代码更改，都可能面临抵消该\
  \ L2 类型产品优势的风险。Terracotta 选择创建一种更好的集群模型——一个透明的 L2 服务器。\n\n**我们需要更高的透明度**\n\n目标是构建一个能够跨\
  \ Java 进程横向扩展，并在粘性负载均衡器下运行的应用服务器，同时让开发者完全感知不到多进程（L1 和 L2）的存在。然而，现实并未达到目标，因为开发者非常清楚集群的设计。该网站的创建者构建了非常高效的会话复制技术和几个自定义缓存。所有对象都必须实现\
  \ Java 可序列化接口，开发者不断调整会话大小，以便系统能以最小影响复制会话到最终用户流量。这些缓存和复制服务同样遭受着与其他任何方法一样的网络传输编组陷阱。\n\
  \n开发集群 Web 应用的初始影响似乎可以接受。然而，许多项目停滞不前，并非因为设计困难，而是因为难以扩展。许多应用特性如果设计不当，可能会拖垮核心 Web\
  \ 基础设施。最重要的是，应用持续变慢，并成为维护难度日益增大的挑战。此外，普通项目会经历诸如关键业务项目第一阶段、第二阶段等阶段，而这些阶段通常涉及为性能重构现有代码，而非引入新功能。随着时间的推移，业务部门注意到，维护可扩展应用的负担正在拖慢新功能的开发速度。\n\
  \n**透明度等于通用性**\n\n那些看似对生产力至关重要的决策，例如 Struts 与 Java Server Faces（JSF）之争，或 Tomcat\
  \ 与其他容器的选择，最终被证明不如核心的可扩展性和可用性模型重要。\n\n如果应用是无状态的，并使用对象关系映射器将对象存储到数据库中，团队很可能会努力降低数据库延迟，却只发现吞吐量过低。团队最终可能会调整\
  \ Hibernate 生成的 SQL。数据库管理员可能会修改数据库模式，而 Java 开发者则相应地更改对象模型。存储管理员可能会通过跨磁盘条带化表来调整存储阵列。\n\
  \n然而，缓存最终会出现。Terracotta 团队的经验表明，这是不可避免的。缓存本质上是将应用从无状态模型转变为有状态或混合模型的过程。正如本章前面所讨论的，如果应用是有状态的，并且我们希望跨\
  \ Java 进程扩展应用，那么随着应用的扩展，就会构建一个用于跨 Java 进程编辑对象的一致性协议。在所有情况下，领域模型都会受到影响，业务功能开发速度也会因开发者花费时间进行调优而减慢。\n\
  \n因此，创始人寻求一种透明的解决方案，一种在 JVM 内部工作、无需序列化，从而避免复制陷阱的方案。可扩展应用架构的组件现已就位。我们需要一个 L2 服务来将工作负载从数据库转移并协调应用活动，同时需要一个透明的接口，使\
  \ L2、L1 和应用对象的概念统一起来，就像主板类比那样。\n\n**具备可用性的透明可扩展性**\n\n可扩展性和可用性是相互对立的力量。任何写入磁盘的操作都会拖慢我们的速度，而任何留在内存中的数据都面临进程甚至电源故障的风险。可扩展性源于性能，而性能源于消除瓶颈。内存是主板上\
  \ I/O 最不慢的环节。磁盘当然是最慢的之一。更糟的是，网络的性能更接近磁盘而非内存。\n\n\n\n让应用程序透明地分布到网络上的难点在于，应用程序必须与网络通信，而网络的速度远慢于\
  \ CPU。Sun Microsystems 和 IBM 都曾在 2000 年尝试构建集群化的 JVM。这些努力很快揭示出，与 CPU 相比，网络慢得令人痛苦，并且大多数应用程序都必须重写才能利用分布在慢速网络上的优势。因此，人们得出结论：CPU\
  \ 太快，集群太慢，开发者只需在需要时使用工具来序列化对象并在网络上传输即可（RMI、JMS，甚至 JDBC 都可以用于在 Java 进程间共享对象）。\n\n\
  这正是当今问题所在。为了可扩展性和高可用性而进行的集群化，要求开发者在集群中的 Java 进程间复制对象，并且要求应用程序意识到自己正被部署到多台服务器上。过去，开发者编写应用程序、调优算法，并引入诸如缓存之类的\
  \ I/O 优化，以便一个进程能适应大型机器的一小部分。随着工作负载增加，进程可以被优化，但到了某个节点，服务器就必须被替换。归根结底，很少有人尝试在网络上分布应用程序。这太难了。而在进程间推送对象这件事上，情况从未改变——它依然很难。\n\
  \n然而，Terracotta 带来了一项改变：我们不再将对象传递给集群中的一组应用服务器。借助 Terracotta 引入的进程外运行的 L2，Terracotta\
  \ 应用程序仅将对象传递给 Terracotta。Terracotta 服务器（L2）可以做出明智的决策，判断哪些 Java 进程需要哪些变更。而且，由于该解决方案被设计为透明的，Terracotta\
  \ 能在细粒度变更发生时（精确到字节级别）感知到它们。这意味着，只有拥有中央集群服务器的透明解决方案才能写入磁盘，从而为我们提供可用性，而无需依赖 Oracle。\n\
  \n这是为什么呢？记住，写入磁盘越少，速度越快。Terracotta 仅将变更写入磁盘。而且，它可以在帮助应用程序进程共享状态的同时，写入这些变更。\n\n让我们回顾一下。回想第\
  \ 1 章中的 `ClusteredClass`。如果我们更改 `name` 字段或 `id` 字段，Terracotta 可以仅推送更改后的信息。如果 `id`\
  \ 是一个 `int`（或 `Integer`，这并不重要），Terracotta 只需通过网络向 L2 进程发送 4 个字节，并将这 4 个字节写入磁盘。否则，该类的一个实例大约需要\
  \ 30 个字节，因此，无需编写自定义代码，我们就能在 I/O 上实现显著节省。\n\nTerracotta 服务器也是一个独立的进程，目前在我们的应用程序中被称为\
  \ L2（我们将在第 3 章停止使用这种命名法）。在第 4 章以及第 13 章中，你将了解更多关于 Terracotta 服务器如何安全地将其内部磁盘存储与应用程序内存变更解耦，而不会冒数据丢失风险的内容。服务器经过调优，可以在不使应用程序等待的情况下执行磁盘\
  \ I/O，这意味着，我们终于可以同时拥有可扩展性和高可用性了。\n\n986-1 CH02.qxd 4/28/08 9:54 AM 第 37 页\n\n第 2\
  \ 章 ■ Terracotta 的历史\n\n**37**\n\n**重新审视透明集群服务**\n\n在第 1 章中，我们将 Terracotta 定义为一个透明集群服务，它帮助应用程序扩展到尽可能多的机器上以实现规模。过去，应用程序被困在通过缓存、复制和分区进行无休止调优的黑暗狭窄隧道中，而现在，隧道尽头出现了一线光明。过去，我们通过大量手动编码和在进程边界间编组对象来实现扩展，而现在，我们什么都不用做。当我们找到一种方法，将进程间和服务器间的通信从应用程序代码中移出，下放到运行时环境中的某个位置时（如图\
  \ 2-6 所示），扩展的工作量和复杂性就会得到改善。\n\n**图 2-6.** *应用程序集群需要多种不同的方法；Terracotta 则不需要。*\n\n\
  在第 1 章中，我们得出结论，Terracotta 可以被视为一个透明集群服务。现在，我们已经确认了这种服务的需求是存在的。\n\n986-1 CH02.qxd\
  \ 4/28/08 9:54 AM 第 38 页\n\n**38**\n\n第 2 章 ■ Terracotta 的历史\n\n**透明性带来更高的可扩展性**\n\
  \n我们每天都依赖透明性来帮助扩展应用程序。垃圾回收器就是一个透明的内存管理服务。在大多数情况下，它运行良好。而且，它比开发者做得更好，并非因为它的编写者比普通开发者更聪明（好吧，也许他们确实比我们大多数人都聪明），而是因为运行时环境拥有关于使用模式的完美信息。它可以做出开发者认为过于复杂的更改。\n\
  \n用户对象可能在中午使用一种算法进行回收，而在午夜使用另一种算法，具体取决于应用程序工作负载的变化。\n\nTerracotta 发现，透明性以及作为运行时服务，不仅解决了开发者面临的复杂性挑战，还提供了超越开发者自身构建能力的可扩展性和性能。运行时性能提升的一个例子是贪婪锁。Terracotta\
  \ 可以在运行时决定一个锁应该是悲观的、集中的和排他的，还是分散的和乐观的。开发者必须对排他访问做出假设，这些假设仅针对最坏情况进行保护，因此，没有 Terracotta\
  \ 的 JVM 主要提供悲观的、排他的锁语义。\n\n**集群应用服务器与集群缓存**\n\nTerracotta 不仅仅用于缓存存储在数据库中的数据。委托给\
  \ Terracotta 的数据始终存储在磁盘上，因此在某些用例中，Terracotta 可以在没有数据库的情况下使用，本书第 5 章至第 12 章将涵盖其中大部分内容。\n\
  \n我们已经讨论了，如果没有 Terracotta，应用程序如何通过数据库进行扩展。我们还讨论了内存复制以及跨 Java 进程手动复制状态。似乎存在手动复制对象的替代方案。\n\
  \n但实际上，没有替代方案。好吧，这个说法可能过于绝对，但它清楚地表明，我们对无状态和有状态方法的分析，对于应用服务器供应商或集群供应商来说并不会改变，只要他们使用与应用服务器或缓存库之上的开发者相同的工具来手动复制和缓存状态（见图\
  \ 2-6）。\n\n如今，集群应用服务器、集群缓存和其他集群库的衡量标准是它们如何复制数据。有些使用 N 路复制，而另一些则使用伙伴系统。有些在对象更改时复制数据，而另一些则要求开发者直接通知库有关更改的信息。当然，还有\
  \ EJB、JPA 和 Hibernate，它们不需要复制，因为应用程序状态以无状态方式存储在数据库中。\n\n我们不应该根据一个框架是无状态还是有状态，或者它是伙伴复制还是\
  \ N 路复制来评判它。相反，我们应该根据它是一项透明服务还是一个开发工具来评判它。\n\n\n\n透明服务是指在应用程序编写并部署后安装的服务，其行为由配置控制。垃圾收集器就是一个例子。应用程序假设\
  \ JVM 中存在垃圾收集器，因此永远不会像在 C++中那样在调用 new()之后尝试调用 delete()。不透明的服务反例包括 Hibernate 和 Spring。虽然两者在很大程度上是透明的，但其行为既受源代码集成控制，也受配置控制。\n\
  \n986-1 CH02.qxd 4/28/08 9:54 AM 第 39 页\n\n第 2 章 ■ TERRA COT TA 的历史\n\n**39**\n\n\
  配置。如果一个 Spring 或 Hibernate 应用程序在没有 Spring 或 Hibernate 库的情况下加载，该应用程序将无法运行。\n\n集群缓存和集群应用服务器未能认识到\
  \ Hibernate 和 Spring 都代表了一种开发模型和方法论。集群应用服务器本不应代表一种僵化的开发模型。例如，Spring 提供了一种不僵化或固定的开发模型。但集群框架破坏了应用程序其余部分的优雅和简洁。它们本应能够将任何可以在容器内运行的应用程序进行集群。集群应用服务器和集群缓存未能实现这一目标，因此是扩展应用程序的著名糟糕解决方案。\n\
  \n**总结**\n\n由于 Terracotta 为 Java 应用程序提供了透明的可扩展性和可用性，它允许这些应用程序扩展到尽可能多的机器上运行。透明性使得系统能够决定在\
  \ JVM 之间以及向 L2 服务器（也称为 Terracotta 服务器）推送什么内容，这提供了非常高的可扩展性。透明性还有一个额外的好处，即它不强加诸如集群缓存、EJB\
  \ 甚至 Hibernate 或 Spring 之类的编程模型。Terracotta 可以获取现有应用程序并将其扩展到多台机器，而其他方法则规定了一种模型，只有遵循该模型才能实现横向扩展。\n\
  \n现在让我们转换思路，通过实际的 Java 程序源代码和 Terracotta 配置来进一步了解其工作原理。第 3 章将介绍 Terracotta 的配置概念。\n\
  \n986-1 CH02.qxd 4/28/08 9:54 AM 第 40 页\n\n986-1 CH03.qxd 5/5/08 9:13 AM 第 41 页\n\
  \n第 3 章\n\n深入 Terracotta\n\n**T**erracotta 为 Java 编程提供了一种透明的横向扩展模型。开发模型的轻量级特性源于这样一个事实：该软件可以插入到现成的\
  \ JVM 中，并允许开发人员编写应用程序，而无需显式的内存复制或将数据映射到底层数据存储。这些应用程序随后在运行时跨机器分布。这种方法的要点不仅在于扩展，还在于高可用性。基于从世界上一些最大规模应用程序中获取的知识，Terracotta\
  \ 帮助您以更少的努力实现可扩展性和可用性。现在让我们来看一个系统，它通过一个简短的“hello world”风格程序展示了易用性、扩展性和可用性。\n\n**Hello\
  \ Clustered World**\n\n我们将这个应用程序称为“Hello Clustered World”。相关的源代码如下：\n```java\npublic\
  \ class HelloClusteredWorld {\n\n    private static final String message = \"Hello\
  \ Clustered World!\";\n    private static final int length = message.length();\n\
  \n    private static char[] buffer = new char [length ];\n\n    private static int\
  \ loopCounter;\n\n    public static void main( String args[] ) throws Exception\
  \ {\n\n        while( true ) {\n\n            synchronized( buffer ) {\n\n     \
  \           int messageIndex = loopCounter++ % length;\n\n                if(messageIndex\
  \ == 0) java.util.Arrays.fill(buffer, '\\u0000');\n\n                buffer[messageIndex]\
  \ = message.charAt(messageIndex);\n\n                System.out.println( buffer\
  \ );\n\n                Thread.sleep( 100 );\n\n            }\n\n        }\n\n \
  \   }\n\n}\n```\n\n**41**\n\n986-1 CH03.qxd 5/5/08 9:13 AM 第 42 页\n\n**42**\n\n\
  第 3 章 ■ 深入 Terracotta\n\nHelloClusteredWorld 将执行一个非常简单的操作。如果我们关注 main()方法，会立刻注意到有一个无限循环。在该循环中，我们获取一个名为\
  \ message 的静态字符串，其中包含句子“Hello Clustered World!”，并将该消息逐字符复制到缓冲区中。第一次循环时，名为 buffer\
  \ 的数组将包含字符“H”。第二次循环时，数组将包含“H”和“e”。第三次循环时，它将包含“H”、“e”和“l”。以此类推。有一个小细节我们尚未涉及。我们每次循环都会检查\
  \ loopCounter，如果消息已完全复制到缓冲区中，我们就清空缓冲区。在命令行快速运行此程序会产生我们预期的结果：\n\n```\n% java HelloClusteredWorld\n\
  \nH\nHe\nHel\nHell\nHello\nHello\nHello C\nHello Cl\nHello Clu\nHello Clus\nHello\
  \ Clust\nHello Cluste\nHello Cluster\nHello Clustere\nHello Clustered\nHello Clustered\n\
  Hello Clustered W\nHello Clustered Wo\nHello Clustered Wor\nHello Clustered Worl\n\
  Hello Clustered World\nHello Clustered World!\nH\nHe\nHel\nHell\nHello\n...\n```\n\
  \n现在，让我们对这个应用程序进行集群。我们应该期望什么行为？“集群”可能是一个令人困惑的词。在前两章中，我们提到 Terracotta 帮助应用程序跨 Java\
  \ 进程分布。如果这个应用程序要跨进程分布，我们实际上不会期望任何变化。该应用程序中没有多线程，也没有值得共享的状态。\n\n986-1 CH03.qxd 5/5/08\
  \ 9:13 AM 第 43 页\n\n第 3 章 ■ 深入 Terracotta\n\n**43**\n\n**集群 HelloClusteredWorld**\n\
  \n在 Web 应用程序中，人们可能将集群定义为会话复制。在企业应用程序中，实体 Bean 可以被复制或以其他方式共享。在企业应用程序和 Web 应用程序的上下文中，我们都有对象作用域和生命周期的概念，这意味着容器可以代表应用程序执行一些集群操作。在\
  \ HelloClusteredWorld 中，我们只有一个 Java main()方法。\n\n在 Java main()的上下文中，集群的概念并不明确。至少，它看起来不明确。在拼凑集群此程序可能意味着什么时，我们应该认识到，如果这个\
  \ main()方法同时在两个或多个 Java 进程上运行，它唯一能做的就是运行 while 循环，同时向两个不同的控制台产生相同的输出。毕竟，提供输出是这个应用程序唯一做的事情。\n\
  \n也许让多个进程在 while 循环内部协作将消息复制到缓冲区是有意义的。如果多个 Java 进程同时在 while 循环内部运行，共享 HelloClusteredWorld\
  \ 类内部的变量将允许这些进程以某种方式协同处理这个问题。\n\n在这种情况下，协同工作可能意味着两个进程各自承担一半的复制工作负载。例如，如果进程一将“H”放入缓冲区，那么进程二将放入“e”。进程一不必将“e”放入缓冲区，接下来应该将“l”放入缓冲区；否则，屏幕上将打印出“Hello\
  \ Clustered World!”以外的内容。\n\n■**注意** 当编写应用程序时没有打算将 main()跨多个进程分布时，main()方法中的同步逻辑似乎不合时宜。然而，在分布此\
  \ main()方法的上下文中，我们选择通过使用同步来保护所有对象更新，从而为并发对象访问做好准备。在后续章节中，我们将讨论如何在不使用显式同步的情况下使用 Terracotta；有几种选择。\n\
  \n如果两个虚拟机一起运行，期望的行为是让第一个 JVM\n\n\n\n初始化 `buffer` 和 `loopCounter` 变量，并将 `buffer`\
  \ 设置为“H”。随后，该 JVM 应在休眠 100 毫秒并尝试向 `buffer` 添加另一个字符之前释放锁。假设启动了第二个 JVM，并且两者通过 Terracotta\
  \ 协调工作，那么当第一个 JVM 休眠时，第二个 JVM 应获取 `buffer` 上的锁，添加另一个字符，并在休眠前递增循环计数器。因此，两个 JVM 协同工作将在更短的时间内共同填满\
  \ `buffer`，因为每个 JVM 恰好会将总字符数的一半放入 `buffer`。\n\n在 Terracotta 中，这一切的实现方式是指向对象所在的类。Terracotta\
  \ 将负责构造共享对象，并同步对象所在的不同 JVM。现在的问题是：哪些对象需要共享，以及如何共享它们？\n\n在 HelloClusteredWorld 示例中，跨\
  \ Java 进程边界共享 `buffer` 的能力，使得每个 JVM 中运行的两个 `while` 循环能够在一个 `buffer` 实例上协同工作。`loopCounter`\
  \ 变量是循环在消息中的索引，用于决定将哪个字符复制到 `buffer` 中。如果不跨 JVM 共享 `loopCounter` 实例，两个 JVM 将无法复制正确的字符。几个反例将有助于阐明这一点。\n\
