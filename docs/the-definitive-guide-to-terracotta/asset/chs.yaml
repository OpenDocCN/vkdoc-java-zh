  \n**198**\n\n第 8 章 ■ 集群 Spring\n\n对 Spring 有显式支持，因此对于这个启用 Spring 的示例应用版本，其配置甚至比纯\
  \ Java 版本更简单。\n\n\n\nTerracotta 在配置文件中提供了一套 Spring 专用的配置标签；这些标签有助于将抽象层级从字段、类和方法提升到服务（Bean）层面。这意味着\
  \ Spring 用户无需离开其领域即可配置 Bean 的分布；相反，他们可以使用与 Spring 配置文件中相同的名称来引用其 Bean。清单 8-10 展示了我们的示例文件。\n\
  \n**清单 8-10.** *Terracotta Spring 配置文件 (tc-config-spring.xml)*\n\n[<con:tc-config\
  \ >](http://www.terracotta.org/config)\n\n<servers>\n\n<server host=\"%i\" name=\"\
