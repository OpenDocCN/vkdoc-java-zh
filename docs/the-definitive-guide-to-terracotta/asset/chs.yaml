  \ CH07.qxd 5/29/08 8:12 AM Page 171\n\n第 7 章 n 使用 Terracotta 扩展 HTTP 会话\n\n**171**\n\
  \n现在，找到你的 Tomcat 安装根目录；从现在起，我们将其称为 <TOMCAT_HOME>。你应该将文件系统中出现的所有 <TOMCAT_HOME> 替换为相应的目录。为了以后更方便，让我们将\
