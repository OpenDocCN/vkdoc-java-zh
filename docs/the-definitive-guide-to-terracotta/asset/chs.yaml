  \ 章 ■ 深入 Terracotta\n\n**51**\n\n**下载和安装 Terracotta**\n\n第一步是从 [`www.terracotta.org/`](http://www.terracotta.org)\
  \ 下载软件包。点击下载链接，选择适合你平台的下载包。Terracotta 包有两种形式：一种带有 Microsoft Windows 安装程序，另一种适用于所有平台但没有安装程序。就本章而言，我们将重点介绍\
  \ Windows 包，但除了安装程序外，两个下载包在结构和行为上几乎没有区别。\n\n下载 Terracotta 后，进行安装。在 Windows 上，运行安装程序。在其他操作系统上，使用\
  \ tar 程序解压归档文件。Windows 安装程序默认会将 Terracotta 放置在 C:\\Program Files\\Terracotta。它还会在开始菜单中添加便捷项目，用于运行管理控制台、Terracotta\
  \ 欢迎屏幕等。\n\nWindows 安装程序完成后，会自动启动 Terracotta 欢迎屏幕。在其他操作系统上，可以通过运行 Terracotta 安装顶级目录中的\
  \ welcome.sh 脚本手动启动欢迎屏幕。欢迎屏幕是探索 Terracotta 示例应用程序、启动 Terracotta 管理控制台、安装 Terracotta\
  \ Eclipse 插件以及完成一些 Terracotta 教程的良好起点。我们稍后在逐步运行 Hello Clustered World 示例时，会再次回到管理控制台和\
  \ Eclipse 插件。\n\n**Terracotta 安装布局**\n\n\n\n现在您已经安装了 Terracotta 并看到了欢迎界面，让我们来看看\
  \ Terracotta 安装目录的内容。需要注意的是，Terracotta 工具包包含了 Terracotta 客户端功能（在 JVM 内部运行的库）和 Terracotta\
  \ 服务器功能所需的一切。在典型的 Terracotta 部署中，每台运行启用 Terracotta 的 JVM 的应用服务器机器上都会安装 Terracotta\
  \ 工具包。同样，运行 Terracotta 服务器的机器也会安装 Terracotta 工具包。然而，应用机器只会使用 Terracotta 工具包的客户端部分，而\
  \ Terracotta 服务器机器只会使用服务器部分。\n\n您会在 Terracotta 工具包中找到以下目录：\n\nbin：该目录包含运行各种 Terracotta\
  \ 功能所需的所有脚本。每个脚本将在后续内容中详细介绍。\n\nconfig-examples：该目录包含各种类型 Terracotta 部署的示例配置文件。您可以将这些脚本用作起始模板，或仅作为参考示例。\n\
  \ndocs：该目录包含 Terracotta 工具包附带的一小部分文档。大部分 Terracotta 产品文档保存在 [`www.`](http://www)\
  \ terracotta.org/ 网站上。\n\nlib：该目录包含 Terracotta 所依赖的所有 JAR 库。\n\nmodules：该目录包含 Terracotta\
  \ 工具包附带的任何预打包的 Terracotta 集成模块（TIM）。Terracotta 集成模块是 JAR 文件，它将 Terracotta 配置与任何必要的支持代码及其他资源捆绑成一个单元，可以包含在您的\
  \ Terracotta 配置中。您可以将它们视为为第三方应用程序提供 Terracotta 支持的插件。您也可以构建自己的 Terracotta 集成模块，以预打包您自己的启用\
  \ Terracotta 的库。有关 Terracotta 集成模块以及现有与第三方技术的 Terracotta 集成的更多信息，请访问 [`www.`](http://www)\
  \ terracotta.org/confluence/display/integrations/About 网站。\n\nsamples：该目录包含大量示例项目，演示了\
  \ Terracotta 的各种用法，包括源代码、Terracotta 配置和启动脚本。\n\nschema：该目录包含 Terracotta 配置文件的 XML\
  \ 模式。\n\ntools：该目录包含用于探索 Terracotta 以及帮助配置 Terracotta 以实现 HTTP 会话集群的工具。\n\nvendors：该目录包含\
  \ Terracotta 安装中使用的第三方应用程序的资源。\n\n**Terracotta 脚本**\n\n重要的 Terracotta 脚本位于 bin 目录中。每个功能都有一个\
  \ Windows 批处理脚本和一个对应的 Unix 风格 shell 脚本。稍后，我们将通过探索欢迎界面来更详细地描述这些重要脚本。\n\n有关 Terracotta\
  \ 脚本和工具的更详细且最新的描述，请参阅在线文档 [`www.terracotta.org/confluence/display/docs1/`](http://www.terracotta.org/confluence/display/docs1)\
  \ Terracotta+Tools+Overview。\n\n为了让您入门，以下是主要的 Terracotta 脚本，按字母顺序排列：admin.[bat|sh]：启动\
  \ Terracotta 管理控制台。管理控制台是一个 Java 程序，通过 JMX 连接到 Terracotta 服务器，并从正在运行的 Terracotta\
  \ 集群接收遥测数据。\n\narchive-tool.[bat|sh]：用于打包 Terracotta 部署的所有相关数据和配置文件，以供诊断之用。\n\n\
  boot-jar-path.[bat|sh]：这是一个辅助脚本，用于设置引导 JAR 位置的环境变量，并在必要时创建引导 JAR。此脚本不适用于独立使用。它被其他脚本用于帮助设置\
  \ Terracotta 环境。\n\n\n\ndso-env.[bat|sh]：`dso-env.[bat|sh]` 脚本会输出启动支持 Terracotta\
  \ 的 JVM 所需的 JVM 参数，这些参数相对于调用该脚本的工作目录。您可以使用此脚本确定要传递给应用程序启动脚本的适当 JVM 参数。例如，如果您在 Tomcat\
  \ 中运行支持 Terracotta 的应用程序，您可以将 `dso-env` 脚本的输出粘贴到 `catalina.sh` 脚本中，如下所示；作为副作用，如果引导\
  \ JAR 尚不存在，此脚本将创建它：\n\n986-1 CH03.qxd 5/5/08 9:13 AM 第 53 页\n\n第 3 章 ■ 快速入门 Terracotta\n\
  \n**53**\n\nexport \\\n\nJAVA_OPTS=\"-Xbootclasspath/p:/usr/local/terracotta/lib/dso-boot/my-boot-jar.jar\
  \ \\\n\n-Dtc.install-root=/usr/local/terracotta -Dtc.config=localhost:9510\"\n\n\
  dso-java.[bat|sh]：这是一个便捷脚本，您可以使用它来启动应用程序，而无需使用 `java` 命令。它将调用您发行版中的 `java` 命令，并尽可能设置好\
  \ Terracotta 环境。\n\nmake-boot-jar.[bat|sh]：这将创建 Terracotta 引导 JAR。您可以选择传入一个配置文件，该文件描述了要将哪些额外的类放入引导\
  \ JAR，以及非默认的引导 JAR 文件名和位置。\n\nrun-dgc.[bat|sh]：默认情况下，分布式垃圾回收器会按设定的时间间隔在 Terracotta\
  \ 服务器中运行。此脚本将立即使 Terracotta 垃圾回收周期开始执行。\n\nscan-boot-jar.[bat|sh]：这是一个辅助脚本，供其他工具用于确定\
  \ Terracotta 引导 JAR 的有效性。它将根据 L1 配置验证引导 JAR 文件的内容。它会列出 Terracotta 配置文件的 `<additional-boot-jar-classes/>`\
  \ 部分中声明的、但未包含在引导 JAR 中的所有类，以及引导 JAR 中未在 `<additional-boot-jar-classes/>` 部分列出的类。\n\
  \n如果引导 JAR 文件不完整，它将返回退出码 1；否则，退出码为 0。\n\nstart-tc-server.[bat|sh]：这将启动 Terracotta\
  \ 服务器。\n\nstop-tc-server.[bat|sh]：这将停止 Terracotta 服务器。\n\nversion.[bat|sh]：这将输出当前的\
  \ Terracotta 版本。\n\n**在 Unix 中逐步实现 Hello Clustered World**\n\n在本章开头，我们介绍了标准的“hello,\
  \ world”程序。为清晰起见，我们省略了关于如何运行它的具体说明。现在让我们回到 Hello Clustered World，并逐步进行，探索如何让它运行起来的细节。第一次尝试时，我们将只使用文本编辑器和命令行工具。然后，我们将探索如何使用\
  \ Terracotta Eclipse 插件在 Eclipse IDE 中运行它。\n\n创建项目骨架\n\n第一步是创建一个如下所示的项目目录骨架： hello_clustered_world/build\n\
  \nhello_clustered_world/src\n\nhello_clustered_world/src/HelloClusteredWorld.java\n\
  \nhello_clustered_world/tc-config.xml\n\n986-1 CH03.qxd 5/5/08 9:13 AM 第 54 页\n\n\
  **54**\n\n第 3 章 ■ 快速入门 Terracotta\n\n创建一个名为 `hello_clustered_world` 的顶级项目目录。在该目录下，创建一个名为\
  \ `build` 的目录，用于存放编译后的类文件。同样在顶级目录下，创建一个名为 `src` 的目录，用于存放我们的 Java 源文件。我们稍后将创建 `tc-config.xml`\
  \ 文件。\n\n创建 HelloClusteredWorld.java\n\n创建项目骨架后，使用您喜欢的文本编辑器，在 `src` 目录下创建一个名为 `HelloClusteredWorld.java`\
  \ 的文件。在其中输入以下代码： public class HelloClusteredWorld {\n\nprivate static final String\
  \ message = \"Hello Clustered World!\"; private static final int length = message.length();\n\
  \nprivate static char[] buffer = new char [length ];\n\nprivate static int loopCounter;\n\
  \npublic static void main( String args[] ) throws Exception {\n\nwhile( true ) {\n\
  \nsynchronized( buffer ) {\n\nint messageIndex = loopCounter++ % length;\n\nif(messageIndex\
  \ == 0) java.util.Arrays.fill(buffer, '\\u0000');\n\nbuffer[messageIndex] = message.charAt(messageIndex);\n\
  \nSystem.out.println( buffer );\n\nThread.sleep( 100 );\n\n}\n\n}\n\n}\n\n}\n\n\
  保存文件后，使用以下命令编译程序（确保您的工作目录是顶级项目目录）：\n\n%> javac -d build/ src/HelloClusteredWorld.java\n\
  \n现在，您应该在 `build` 目录中有一个名为 `HelloClusteredWorld.class` 的文件。现在，我们可以像运行普通 Java 进程一样运行它，如下所示（再次确保您的工作目录是顶级项目目录）：\n\
  \n%> java -cp build HelloClusteredWorld\n\nH\n\nHe\n\nHel\n\nHell\n\nHello\n\nHello\n\
  \nHello C\n\nHello Cl\n\n986-1 CH03.qxd 5/5/08 9:13 AM 第 55 页\n\n第 3 章 ■ 快速入门 Terracotta\n\
  \n**55**\n\nHello Clu\n\nHello Clus\n\nHello Clust\n\nHello Cluste\n\nHello Cluster\n\
