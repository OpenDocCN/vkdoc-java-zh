    `ReadWriteHandler` 是一个 `CompletionHandler`，用于响应 `read()` 或 `write()` 操作的完成。其 `completed()`
    方法在成功完成 `read()` 或 `write()` 时被调用，其中包括发起对应的 `write()` 或 `read()` 操作。当客户端断开与服务器的连接时，会调用其
    `failed()` 方法。


    `completed()` 方法的首要任务是判断是否执行了 `read()` 操作并做出相应响应。如果是，它会将缓冲区中的字节提取到数组中，然后将数组转换为字符串并输出。


    接下来，`completed()` 方法让用户有机会输入一条消息，该消息将被发送到服务器。如果用户指定了 `end`，客户端线程将被中断，客户端终止。任何其他消息的字节都会从字符串中提取并存储到缓冲区中，随后被写入套接字通道。


    如果未发生 `read()` 调用，`completed()` 方法将执行 `if`-`else` 语句的 `else` 部分。在将 `isReadMode`
    设置为 `true` 后，它会清空缓冲区并调用 `read()`。


    为了更清晰地说明，以下是客户端启动时发生的情况。


    `Client` 的 `main()` 方法将 `isReadMode` 设置为 `false`，在缓冲区中存储一条 `Hello` 消息，并通过 `write()`
    将消息写入通道，这会导致消息被发送到服务器并由服务器显示。服务器的读/写处理程序通过 `write()` 将此消息回写给客户端。由于 `isReadMode`
    为 `false`，`Client` 的读/写处理程序的 `completed()` 方法执行 `if`-`else` 语句的 `else` 部分，将 `isReadMode`
    设置为 `true` 并调用 `read()`，从而将服务器写入的 `Hello` 字节存储到缓冲区中。`Client` 的读/写处理程序的 `completed()`
    方法被调用。它注意到 `isReadMode` 为 `true`，从缓冲区中提取字节，并将等效的字符串作为 `Server responded` 消息的一部分输出。现在，客户端将从用户处获取消息并做出相应处理。


    按如下方式编译清单 13-7 至 13-9：


    `javac Client.java`


    按如下方式运行生成的应用程序：


    `java Client`


    假设服务器按之前所示正在运行，您应该会看到类似于以下初始输出的内容：


    `Client at /0:0:0:0:0:0:0:0:55359 connected`


    `Server responded: Hello`


    `Enter message ("end" to quit):`


    继续操作，您应该在服务器端看到类似于以下输出的内容：


    `Accepted connection from /127.0.0.1:55359`


    `Client at /127.0.0.1:55359 sends message: Hello`


    当您通过客户端输入消息时，您会看到这些消息在服务器端以“`Client at /127.0.0.1:xxxxx sends message:`”（`xxxxx`
    表示端口号）开头回显，在客户端则以“`Server responded:`”开头回显。当您终止客户端时，它会显示 `Client terminating`；服务器会显示
    `Connection with client broken`。

