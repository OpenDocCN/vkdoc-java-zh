- fmt: "### Creating Files\n\nYou can create a new and empty regular file by calling\
    \ the `Files` class’s `Path createFile(Path path, FileAttribute<?>... attrs)`\
    \ method. When creating a file, you must specify a `path` and optionally specify\
    \ a varargs list of file attributes.\n\nThe `attrs` parameter specifies a list\
    \ of file attribute objects whose classes implement the `java.nio.file.attribute.FileAttribute`\
    \ interface. Each attribute is identified by its name. If more than one attribute\
    \ of the same name is included in the list, all but the last occurrence are ignored.\n\
    \n`createFile()` returns the `Path` to the file on success. It throws `UnsupportedOperationException`\
    \ when the list includes an attribute that cannot be set atomically when creating\
    \ the file, `java.nio.file.FileAlreadyExistsException` when a file with the same\
    \ name already exists, and `IOException` when an I/O error occurs or the parent\
    \ directory doesn’t exist.\n\n**Note**\n\n`FileAlreadyExistsException` is an example\
    \ of an optional specific exception. It’s optional because it’s thrown when the\
    \ underlying operating system can detect the specific error leading to the exception.\
    \ If the error cannot be detected, its `IOException` ancestor is thrown instead.\n\
    \nListing [12-21](#A978-1-4842-1565-4_12_Chapter.html#FPar35) presents the source\
    \ code to an application that demonstrates `createFile()` without file attributes.\n\
    \n**Listing 12-21.** Creating an Empty File\n\n```\nimport java.io.IOException;\n\
    import java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class CFDemo\n\
    {\n   public static void main(String[] args) throws IOException\n   {\n      if\
    \ (args.length != 1)\n      {\n         System.err.println(\"usage: java CFDemo\
    \ path\");\n         return;\n      }\n      Files.createFile(Paths.get(args[0]));\n\
    \   }\n}\n```\n\nCompile Listing [12-21](#A978-1-4842-1565-4_12_Chapter.html#FPar35)\
    \ as follows:\n\n```\njavac CFDemo.java\n```\n\nRun the resulting application\
    \ as follows:\n\n```\njava CFDemo x\n```\n\nYou should observe no output as well\
    \ as a zero-byte file named `x` in the current directory. If you run this application\
    \ again, you should observe a `FileAlreadyExistsException` message on the standard\
    \ error stream.\n\n`FileAttribute` is the return type of the `PosixFilePermissions`\
    \ class’s `FileAttribute<Set<PosixFilePermission>> asFileAttribute(Set<PosixFilePermission>\
    \ perms)` method, which creates a `FileAttribute` that encapsulates a copy of\
    \ the given file permissions. When creating a regular file, you can use this method\
    \ to assign a set of permissions on a POSIX file system, as follows:\n\n```\n\
    Set<PosixFilePermission> perms =\n   PosixFilePermissions.fromString(\"rw-------\"\
    );\nFileAttribute<Set<PosixFilePermission>> fa =\n   PosixFilePermissions.asFileAttribute(perms);\n\
    Files.createFile(Paths.get(\"report\"), fa);\n```\n\n### Creating and Deleting\
    \ Temporary Files\n\nApplications often need to create and work with temporary\
    \ regular files. For example, temporary files would probably be used by a memory-intensive\
    \ video-editing application. Also, an application that performs external sorting\
    \ ( [`https://en.wikipedia.org/wiki/External_sorting`](https://en.wikipedia.org/wiki/External_sorting)\
    \ ) would output intermediate sorted data to a temporary file.\n\nYou create a\
    \ temporary file by working with either of the following methods:\n\n*   `Path\
    \ createTempFile(Path dir, String prefix, String suffix, FileAttribute<?>... attrs)`\n\
    *   `Path createTempFile(String prefix, String suffix, FileAttribute<?>... attrs)`\n\
    \nThe first method creates this file in the directory identified by `dir` and\
    \ the second method creates this file in the default temporary-file directory\
    \ (identified by the Java property `java.io.tmpdir`). The name of the temporary\
    \ file begins with the specified `prefix`, continues with a sequence of digits,\
    \ and ends with the specified `suffix`. Either `prefix` or `suffix` may be `null`.\
    \ When `prefix` is `null`, nothing appears before the digit sequence. When `suffix`\
    \ is `null`, `.tmp` follows the digit sequence.\n\nOn success, each method returns\
    \ the path to the newly-created file that didn’t exist before this method was\
    \ invoked. Otherwise, each method throws `IOException` when an I/O error occurs\
    \ (or, for the first method, when the directory identified by `dir` doesn’t exist),\
    \ `IllegalArgumentException` when `prefix` or `suffix` cannot be used to create\
    \ a candidate file name, or `UnsupportedOperationException` when the `attrs` list\
    \ includes an attribute that cannot be set atomically when creating the file.\n\
    \nListing [12-22](#A978-1-4842-1565-4_12_Chapter.html#FPar36) presents the source\
    \ code to an application that demonstrates the first `createTempFile()` method\
    \ (without file attributes).\n\n**Listing 12-22.** Creating an Empty Temporary\
    \ File\n\n```\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport\
    \ java.nio.file.Paths;\n\npublic class CTFDemo\n{\n   public static void main(String[]\
    \ args) throws IOException\n   {\n      if (args.length != 1)\n      {\n     \
    \    System.err.println(\"usage: java CTFDemo path\");\n         return;\n   \
    \   }\n      Files.createTempFile(Paths.get(args[0]), \"video\", null);\n   }\n\
    }\n```\n\nListing [12-22](#A978-1-4842-1565-4_12_Chapter.html#FPar36) describes\
    \ an application that takes a single command-line argument, which is a path to\
    \ a directory in which to store the temporary file. The temporary file is assigned\
    \ the prefix `video` and (by virtue of `suffix` being assigned a `null` argument)\
    \ the suffix `.tmp`.\n\nCompile Listing [12-22](#A978-1-4842-1565-4_12_Chapter.html#FPar36)\
    \ as follows:\n\n```\njavac CTFDemo.java\n```\n\nRun the resulting application\
    \ as follows:\n\n```\njava CTFDemo .\n```\n\nThe period character signifies the\
    \ current directory. You should observe an empty file with a name similar to `video5826353313510732011.tmp`\
    \ in this directory.\n\nWhen `CTFDemo` ends, the temporary file remains behind,\
    \ which isn’t tidy and would consume disk space if I chose to write data to it.\
    \ It’s better to delete the temporary file before the application ends. There\
    \ are three ways to accomplish this task:\n\n*   Add a shutdown hook (a runtime\
    \ mechanism that lets you clean up resources or save data before the JVM shuts\
    \ down) via the `java.lang.Runtime` class’s `void addShutdownHook(Thread hook)`\
    \ method.\n*   Convert the returned `Path` object to a `File` object (via `Path`’s\
    \ `toFile()` method) and invoke `File`’s `void deleteOnExit()` method on the `File`\
    \ object.\n*   Work with the `Files` class’s `newOutputStream()` method and NIO.2’s\
    \ `DELETE_ON_CLOSE` constant. You’ll learn about this method and constant later\
    \ in this chapter.\n\nListing [12-23](#A978-1-4842-1565-4_12_Chapter.html#FPar37)\
    \ expands on Listing [12-22](#A978-1-4842-1565-4_12_Chapter.html#FPar36) by using\
    \ `toFile()` followed by `deleteOnExit()` to register the temporary file for deletion.\n\
    \n**Listing 12-23.** Registering a Temporary File for Deletion on Application\
    \ Exit\n\n```\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport\
    \ java.nio.file.Path;\nimport java.nio.file.Paths;\n\npublic class CTFDemo\n{\n\
    \   public static void main(String[] args) throws IOException\n   {\n      if\
    \ (args.length != 1)\n      {\n         System.err.println(\"usage: java CTFDemo\
    \ path\");\n         return;\n      }\n      Path path = Files.createTempFile(Paths.get(args[0]),\
    \ \"video\", null);\n      path.toFile().deleteOnExit();\n   }\n}\n```\n\nCompile\
    \ Listing [12-23](#A978-1-4842-1565-4_12_Chapter.html#FPar37) (`javac CTFDemo.java`)\
    \ and run the resulting application (`java CTFDemo .`). You should not observe\
    \ the temporary file in the current directory after the application terminates."
  raw: '#### Creating Files


    You can create a new and empty regular file by calling the `Files` class’s `Path
    createFile(Path path, FileAttribute<?>... attrs)` method. When creating a file,
    you must specify a `path` and optionally specify a varargs list of file attributes.


    The `attrs` parameter specifies a list of file attribute objects whose classes
    implement the `java.nio.file.attribute.FileAttribute` interface. Each attribute
    is identified by its name. If more than one attribute of the same name is included
    in the list, all but the last occurrence are ignored.


    `createFile()` returns the `Path` to the file on success. It throws `UnsupportedOperationException`
    when the list includes an attribute that cannot be set atomically when creating
    the file, `java.nio.file.FileAlreadyExistsException` when a file with the same
    name already exists, and `IOException` when an I/O error occurs or the parent
    directory doesn’t exist.


    Note


    `FileAlreadyExistsException` is an example of an optional specific exception.
    It’s optional because it’s thrown when the underlying operating system can detect
    the specific error leading to the exception. If the error cannot be detected,
    its `IOException` ancestor is thrown instead.


    Listing [12-21](#A978-1-4842-1565-4_12_Chapter.html#FPar35) presents the source
    code to an application that demonstrates `createFile()` without file attributes.


    Listing 12-21\. Creating an Empty File


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CFDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java CFDemo path");`


             `return;`


          `}`


          `Files.createFile(Paths.get(args[0]));`


       `}`


    `}`


    Compile Listing [12-21](#A978-1-4842-1565-4_12_Chapter.html#FPar35) as follows:


    `javac CFDemo.java`


    Run the resulting application as follows:


    `java CFDemo x`


    You should observe no output as well as a zero-byte file named `x` in the current
    directory. If you run this application again, you should observe a `FileAlreadyExistsException`
    message on the standard error stream.


    `FileAttribute` is the return type of the `PosixFilePermissions` class’s `FileAttribute<Set<PosixFilePermission>>
    asFileAttribute(Set<PosixFilePermission> perms)` method, which creates a `FileAttribute`
    that encapsulates a copy of the given file permissions. When creating a regular
    file, you can use this method to assign a set of permissions on a POSIX file system,
    as follows:


    `Set<PosixFilePermission> perms =`


       `PosixFilePermissions.fromString("rw-------");`


    `FileAttribute<Set<PosixFilePermission>> fa =`


       `PosixFilePermissions.asFileAttribute(perms);`


    `Files.createFile(Paths.get("report"), fa);`


    #### Creating and Deleting Temporary Files


    Applications often need to create and work with temporary regular files. For example,
    temporary files would probably be used by a memory-intensive video-editing application.
    Also, an application that performs external sorting ( [`https://en.wikipedia.org/wiki/External_sorting`](https://en.wikipedia.org/wiki/External_sorting)
    ) would output intermediate sorted data to a temporary file.


    You create a temporary file by working with either of the following methods:


    *   `Path createTempFile(Path dir, String prefix, String suffix, FileAttribute<?>...
    attrs)`

    *   `Path createTempFile(String prefix, String suffix, FileAttribute<?>... attrs)`


    The first method creates this file in the directory identified by `dir` and the
    second method creates this file in the default temporary-file directory (identified
    by the Java property `java.io.tmpdir`). The name of the temporary file begins
    with the specified `prefix`, continues with a sequence of digits, and ends with
    the specified `suffix`. Either `prefix` or `suffix` may be `null`. When `prefix`
    is `null`, nothing appears before the digit sequence. When `suffix` is `null`,
    `.tmp` follows the digit sequence.


    On success, each method returns the path to the newly-created file that didn’t
    exist before this method was invoked. Otherwise, each method throws `IOException`
    when an I/O error occurs (or, for the first method, when the directory identified
    by `dir` doesn’t exist), `IllegalArgumentException` when `prefix` or `suffix`
    cannot be used to create a candidate file name, or `UnsupportedOperationException`
    when the `attrs` list includes an attribute that cannot be set atomically when
    creating the file.


    Listing [12-22](#A978-1-4842-1565-4_12_Chapter.html#FPar36) presents the source
    code to an application that demonstrates the first `createTempFile()` method (without
    file attributes).


    Listing 12-22\. Creating an Empty Temporary File


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CTFDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java CTFDemo path");`


    `return;`


    `}`


    `Files.createTempFile(Paths.get(args[0]), "video", null);`


    `}`


    `}`


    Listing [12-22](#A978-1-4842-1565-4_12_Chapter.html#FPar36) describes an application
    that takes a single command-line argument, which is a path to a directory in which
    to store the temporary file. The temporary file is assigned the prefix `video`
    and (by virtue of `suffix` being assigned a `null` argument) the suffix `.tmp`.


    Compile Listing [12-22](#A978-1-4842-1565-4_12_Chapter.html#FPar36) as follows:


    `javac CTFDemo.java`


    Run the resulting application as follows:


    `java CTFDemo .`


    The period character signifies the current directory. You should observe an empty
    file with a name similar to `video5826353313510732011.tmp` in this directory.


    When `CTFDemo` ends, the temporary file remains behind, which isn’t tidy and would
    consume disk space if I chose to write data to it. It’s better to delete the temporary
    file before the application ends. There are three ways to accomplish this task:


    *   Add a shutdown hook (a runtime mechanism that lets you clean up resources
    or save data before the JVM shuts down) via the `java.lang.Runtime` class’s `void
    addShutdownHook(` [`Thread`](https://docs.oracle.com/javase/8/docs/api/java/lang/Thread.html#class%20in%20java.lang)
    `hook)` method.

    *   Convert the returned `Path` object to a `File` object (via `Path`’s `toFile()`
    method) and invoke `File`’s `void deleteOnExit()` method on the `File` object.

    *   Work with the `Files` class’s `newOutputStream()` method and NIO.2’s `DELETE_ON_CLOSE`
    constant. You’ll learn about this method and constant later in this chapter.


    Listing [12-23](#A978-1-4842-1565-4_12_Chapter.html#FPar37) expands on Listing
    [12-22](#A978-1-4842-1565-4_12_Chapter.html#FPar36) by using `toFile()` followed
    by `deleteOnExit()` to register the temporary file for deletion.


    Listing 12-23\. Registering a Temporary File for Deletion on Application Exit


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class CTFDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java CTFDemo path");`


    `return;`


    `}`


    `Path path = Files.createTempFile(Paths.get(args[0]), "video", null);`


    `path.toFile().deleteOnExit();`


    `}`


    `}`


    Compile Listing [12-23](#A978-1-4842-1565-4_12_Chapter.html#FPar37) (`javac CTFDemo.java`)
    and run the resulting application (`java CTFDemo .`). You should not observe the
    temporary file in the current directory after the application terminates.'
  trans: '

    #### 创建文件


    你可以通过调用 `Files` 类的 `Path createFile(Path path, FileAttribute<?>... attrs)` 方法来创建一个新的空普通文件。创建文件时，必须指定一个
    `path`，并可选地指定一个可变参数列表的文件属性。


    `attrs` 参数指定了一个文件属性对象列表，这些对象的类实现了 `java.nio.file.attribute.FileAttribute` 接口。每个属性由其名称标识。如果列表中包含多个同名属性，则除了最后一个之外，所有之前的同名属性都会被忽略。


    `createFile()` 方法在成功时返回文件的 `Path`。当列表包含一个在创建文件时无法原子设置的属性时，它会抛出 `UnsupportedOperationException`；当同名文件已存在时，抛出
    `java.nio.file.FileAlreadyExistsException`；当发生 I/O 错误或父目录不存在时，抛出 `IOException`。


    注意


    `FileAlreadyExistsException` 是一个可选特定异常的例子。之所以说它是可选的，是因为它仅在底层操作系统能够检测到导致该异常的特定错误时才会被抛出。如果无法检测到该错误，则会抛出其父类
    `IOException`。


    清单 12-21 展示了一个演示不带文件属性的 `createFile()` 方法的应用程序源代码。


    清单 12-21\. 创建一个空文件


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CFDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java CFDemo path");`


             `return;`


          `}`


          `Files.createFile(Paths.get(args[0]));`


       `}`


    `}`


    按如下方式编译清单 12-21：


    `javac CFDemo.java`


    按如下方式运行生成的应用程序：


    `java CFDemo x`


    你应该会看到没有输出，并且在当前目录中有一个名为 `x` 的零字节文件。如果你再次运行此应用程序，你应该会在标准错误流上看到一条 `FileAlreadyExistsException`
    消息。


    `FileAttribute` 是 `PosixFilePermissions` 类的 `FileAttribute<Set<PosixFilePermission>>
    asFileAttribute(Set<PosixFilePermission> perms)` 方法的返回类型，该方法创建一个封装了给定文件权限副本的 `FileAttribute`。在创建普通文件时，你可以使用此方法在
    POSIX 文件系统上分配一组权限，如下所示：


    `Set<PosixFilePermission> perms =`


       `PosixFilePermissions.fromString("rw-------");`


    `FileAttribute<Set<PosixFilePermission>> fa =`


       `PosixFilePermissions.asFileAttribute(perms);`


    `Files.createFile(Paths.get("report"), fa);`


    #### 创建和删除临时文件


    应用程序通常需要创建和使用临时普通文件。例如，一个内存密集型的视频编辑应用程序可能会使用临时文件。此外，执行外部排序（ [`https://en.wikipedia.org/wiki/External_sorting`](https://en.wikipedia.org/wiki/External_sorting)
    ）的应用程序会将中间排序数据输出到临时文件。


    你可以通过使用以下任一方法来创建临时文件：


    *   `Path createTempFile(Path dir, String prefix, String suffix, FileAttribute<?>...
    attrs)`

    *   `Path createTempFile(String prefix, String suffix, FileAttribute<?>... attrs)`


    第一个方法在由 `dir` 标识的目录中创建此文件，第二个方法在默认的临时文件目录（由 Java 属性 `java.io.tmpdir` 标识）中创建此文件。临时文件的名称以指定的
    `prefix` 开头，接着是一串数字，并以指定的 `suffix` 结尾。`prefix` 或 `suffix` 都可以是 `null`。当 `prefix`
    为 `null` 时，数字序列之前没有任何内容。当 `suffix` 为 `null` 时，数字序列后面跟着 `.tmp`。


    成功时，每个方法都返回新创建文件的路径，该文件在调用此方法之前不存在。否则，当发生 I/O 错误时（对于第一个方法，当由 `dir` 标识的目录不存在时），每个方法都会抛出
    `IOException`；当 `prefix` 或 `suffix` 无法用于创建候选文件名时，抛出 `IllegalArgumentException`；当
    `attrs` 列表包含一个在创建文件时无法原子设置的属性时，抛出 `UnsupportedOperationException`。


    清单 12-22 展示了一个演示第一个 `createTempFile()` 方法（不带文件属性）的应用程序源代码。


    清单 12-22\. 创建一个空临时文件


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CTFDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java CTFDemo path");`


    `return;`


    `}`


    `Files.createTempFile(Paths.get(args[0]), "video", null);`


    `}`


    `}`


    清单 12-22 描述了一个应用程序，它接受一个命令行参数，该参数是用于存储临时文件的目录路径。临时文件被分配了前缀 `video`，并且（由于 `suffix`
    被赋值为 `null` 参数）后缀为 `.tmp`。


    按如下方式编译清单 12-22：


    `javac CTFDemo.java`


    按如下方式运行生成的应用程序：


    `java CTFDemo .`


    句点字符表示当前目录。你应该会在此目录中看到一个空文件，其名称类似于 `video5826353313510732011.tmp`。


    当 `CTFDemo` 结束时，临时文件会保留下来，这既不整洁，而且如果我选择向其中写入数据，还会消耗磁盘空间。最好在应用程序结束前删除临时文件。有三种方法可以完成此任务：


    *   通过 `java.lang.Runtime` 类的 `void addShutdownHook(` [`Thread`](https://docs.oracle.com/javase/8/docs/api/java/lang/Thread.html#class%20in%20java.lang)
    `hook)` 方法添加一个关闭钩子（一种运行时机制，允许你在 JVM 关闭前清理资源或保存数据）。

    *   将返回的 `Path` 对象转换为 `File` 对象（通过 `Path` 的 `toFile()` 方法），并在该 `File` 对象上调用 `File`
    的 `void deleteOnExit()` 方法。

    *   使用 `Files` 类的 `newOutputStream()` 方法和 NIO.2 的 `DELETE_ON_CLOSE` 常量。你将在本章后面了解此方法和常量。


    清单 12-23 在清单 12-22 的基础上进行了扩展，它使用 `toFile()` 后跟 `deleteOnExit()` 来注册临时文件以便删除。


    清单 12-23\. 注册临时文件以便在应用程序退出时删除


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class CTFDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java CTFDemo path");`


    `return;`


    `}`


    `Path path = Files.createTempFile(Paths.get(args[0]), "video", null);`


    `path.toFile().deleteOnExit();`


    `}`


    `}`


    编译清单 12-23（`javac CTFDemo.java`）并运行生成的应用程序（`java CTFDemo .`）。应用程序终止后，你应该不会在当前目录中看到该临时文件。

