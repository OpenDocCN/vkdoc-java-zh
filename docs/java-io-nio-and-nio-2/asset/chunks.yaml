    ## 字符类


    字符类是出现在 `[` 和 `]` 之间的一组字符。共有六种字符类：


    *   **简单字符类**由并排放置的字面字符组成，仅匹配这些字符。例如，`[abc]` 由字符 `a`、`b` 和 `c` 组成。此外，`java RegExDemo
    t[aiou]ck tack` 会报告匹配成功，因为 `a` 是 `[aiou]` 的成员。当输入为 `tick`、`tock` 或 `tuck` 时，它也会报告匹配成功，因为
    `i`、`o` 和 `u` 也是其成员。

    *   **否定字符类**由一个脱字符元字符（`^`）后跟并排放置的字面字符组成，匹配除该类中字符之外的所有字符。例如，`[^abc]` 包含除 `a`、`b`
    和 `c` 之外的所有字符。此外，`java RegExDemo "[^b]ox" box` 不会报告匹配成功，因为 `b` 不是 `[^b]` 的成员；而
    `java RegExDemo "[^b]ox" fox` 会报告匹配成功，因为 `f` 是其成员。（在我的 Windows 7 操作系统上，`[^b]ox`
    周围的双引号是必需的，因为 `^` 在命令行中会被特殊处理。）

    *   **范围字符类**由连续的多个字面字符组成，表示为一个起始字面字符，后跟连字符元字符（`-`），再跟一个结束字面字符，匹配该范围内的所有字符。例如，`[a-z]`
    包含从 `a` 到 `z` 的所有字符。此外，`java RegExDemo [h-l]ouse house` 会报告匹配成功，因为 `h` 是该类的成员；而
    `java RegExDemo [h-l]ouse mouse` 不会报告匹配成功，因为 `m` 超出了范围，因此不属于该类。你可以通过并排放置多个范围来组合它们，例如，`[A-Za-z]`
    包含所有大写和小写拉丁字母。

    *   **并集字符类**由多个嵌套的字符类组成，匹配属于最终并集的所有字符。例如，`[abc[u-z]]` 包含字符 `a`、`b`、`c`、`u`、`v`、`w`、`x`、`y`
    和 `z`。此外，`java RegExDemo [[0-9][A-F][a-f]] e` 会报告匹配成功，因为 `e` 是一个十六进制字符。（我也可以通过组合多个范围，将此类表示为
    `[0-9A-Fa-f]`。）

    *   **交集字符类**由多个用 `&&` 分隔的嵌套字符类组成，匹配这些嵌套字符类共有的所有字符。例如，`[a-c&&[c-f]]` 包含字符 `c`，它是
    `[a-c]` 和 `[c-f]` 共有的唯一字符。此外，`java RegExDemo "[aeiouy&&[y]]" y` 会报告匹配成功，因为 `y`
    是类 `[aeiouy]` 和 `[y]` 共有的字符。

    *   **差集字符类**由多个用 `&&` 分隔的嵌套字符类组成，其中至少有一个嵌套字符类是否定字符类，匹配除否定字符类所指示字符之外的所有字符。例如，`[a-z&&[^x-z]]`
    包含从 `a` 到 `w` 的字符。（`^x-z` 周围的方括号是必需的；否则，`^` 会被忽略，结果类将只包含 `x`、`y` 和 `z`。）此外，`java
    RegExDemo "[a-z&&[^aeiou]]" g` 会报告匹配成功，因为 `g` 是一个辅音字母，只有辅音字母属于此类。（这里忽略了 `y`，它有时被视为辅音，有时被视为元音。）


    **预定义字符类**是针对常用字符类的正则表达式构造。表 9-3 列出了 `Pattern` 的预定义字符类。


    表 9-3. 预定义字符类


    | 预定义字符类 | 描述 |

    | --- | --- |

    | `\d` | 匹配任意数字字符。`\d` 等价于 `[0-9]`。 |

    | `\D` | 匹配任意非数字字符。`\D` 等价于 `[^\d]`。 |

    | `\s` | 匹配任意空白字符。`\s` 等价于 `[\t\n\x0B\f\r ]`。 |

    | `\S` | 匹配任意非空白字符。`\S` 等价于 `[^\s]`。 |

    | `\w` | 匹配任意单词字符。`\w` 等价于 `[a-zA-Z0-9]`。 |

    | `\W` | 匹配任意非单词字符。`\W` 等价于 `[^\w]`。 |


    例如，以下命令行报告匹配成功，因为 `\w` 匹配了 `abc` 中的单词字符 `a`：


    `java RegExDemo \wbc abc`


    ## 捕获组


    捕获组会保存匹配的字符，以便在模式匹配过程中后续引用，它表示为用括号元字符 `(` 和 `)` 包围的字符序列。捕获组内的所有字符都被视为一个单元。例如，`(Java)`
    捕获组将 `J`、`a`、`v` 和 `a` 组合成一个单元。它匹配输入中所有出现的 `Java` 模式。每次匹配都会用下一次匹配的 `Java` 字符替换上一次匹配保存的
    `Java` 字符。


    捕获组可以出现在其他捕获组内部。例如，捕获组 `(A)` 和 `(B(C))` 出现在捕获组 `((A)(B(C)))` 内部，而捕获组 `(C)` 出现在捕获组
    `(B(C))` 内部。每个嵌套或非嵌套的捕获组都会获得自己的编号，编号从 1 开始，并且捕获组按从左到右的顺序编号。例如，`((A)(B(C)))` 被分配为
    1，`(A)` 被分配为 2，`(B(C))` 被分配为 3，`(C)` 被分配为 4。


    捕获组保存其匹配结果，以便通过**反向引用**进行后续引用。反向引用是一个反斜杠字符后跟一个表示捕获组编号的数字字符。反向引用会导致匹配器使用其捕获组编号来回忆该捕获组保存的匹配结果，然后使用该匹配结果的字符尝试进一步匹配。以下示例使用反向引用判断输入是否由两个连续的
    `Java` 模式组成：


    `java RegExDemo "(Java) \1" "Java Java"`


    `RegExDemo` 报告匹配成功，因为匹配器在输入中检测到 `Java`，后跟一个空格，再后跟 `Java`。


    ## 边界匹配器和零长度匹配


    边界匹配器是一种正则表达式构造，用于标识行首、单词边界、文本结尾以及其他常见的边界。参见表 9-4。


    表 9-4. 边界匹配器


    | 边界匹配器 | 描述 |

    | --- | --- |

    | `^` | 匹配行首。 |

    | `$` | 匹配行尾。 |

    | `\b` | 匹配单词边界。 |

    | `\B` | 匹配非单词边界。 |

    | `\A` | 匹配文本开头。 |

    | `\G` | 匹配上一次匹配的结尾。 |

    | `\Z` | 匹配文本结尾（如果存在行终止符，则不包括它）。 |

    | `\z` | 匹配文本结尾。 |


    考虑以下示例：


    `java RegExDemo \b\b "I think"`


    此示例报告了多次匹配，如下输出所示：


    `regex = \b\b`


    `input = I think`


    `Located [] starting at 0 and ending at -1`


    `Located [] starting at 1 and ending at 0`


    `Located [] starting at 2 and ending at 1`


    `Located [] starting at 7 and ending at 6`


    此输出揭示了几个零长度匹配。当发生零长度匹配时，起始索引和结束索引相等，尽管输出显示结束索引比起始索引小 1，因为我在清单 9-1 中指定了 `end()
    - 1`（这样匹配的结束索引标识的是非零长度匹配的最后一个字符，而不是非零长度匹配最后一个字符之后的那个字符）。


    注意


    零长度匹配发生在空输入文本中、输入文本的开头、输入文本最后一个字符之后，或者该文本任意两个字符之间。零长度匹配很容易识别，因为它们总是在同一个索引位置开始和结束。

