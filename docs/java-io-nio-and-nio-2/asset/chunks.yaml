    ## [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html): Writers and Readers


    Java’s stream classes are not good at streaming characters because those classes
    have no knowledge of character encodings.   Java provides writer and reader classes
    as the preferred alternative to stream classes when it comes to character I/O.
      The answer is false: `Reader` doesn’t declare an `available()` method.   The
    purpose of the `OutputStreamWriter` class is to serve as a bridge between an incoming
    sequence of characters and an outgoing stream of bytes. Characters written to
    this writer are encoded into bytes according to the default or specified character
    encoding. The purpose of the `InputStreamReader` class is to serve as a bridge
    between an incoming stream of bytes and an outgoing sequence of characters. Characters
    read from this reader are decoded from bytes according to the default or specified
    character encoding.   You identify the default character encoding by reading the
    value of the `file.encoding` system property.   The purpose of the `FileWriter`
    class is to conveniently connect to the underlying file output stream using the
    default character encoding. The purpose of the `FileReader` class is to conveniently
    connect to the underlying file input stream using the default character encoding.
      `BufferedWriter` provides the `newLine()` method for writing a line separator.
