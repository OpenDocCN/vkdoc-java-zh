    #### Moving Files


    `File`’s lack of a proper file-move capability has also bothered many developers.
    The `Files` class addresses this problem by providing the [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `move(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `source,` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `target,` [`CopyOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/CopyOption.html#interface%20in%20java.nio.file)
    `... options)` method.


    `move` `(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `source,` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `target,` [`CopyOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/CopyOption.html#interface%20in%20java.nio.file)
    `... options)` moves the `source` path to `target`. It fails when `target` exists
    except when `source` and `target` are the [same](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Files.html#isSameFile-java.nio.file.Path-java.nio.file.Path-),
    in which case this method has no effect. If `source` is a symbolic link, the link
    (and not its target) is moved.


    The following copy options are supported:


    *   `ATOMIC_MOVE`: The move is performed as an atomic file system operation and
    all other options are ignored. When the `target` exists, either the existing `target`
    is replaced or this method fails by throwing `IOException`. If the move cannot
    be performed as an atomic file system operation, `java.nio.file.AtomicMoveNotSupportedException`
    is thrown.

    *   `REPLACE_EXISTING`: When the `target` exists, the `target` is replaced unless
    it’s a nonempty directory. When the `target` exists and is a symbolic link, the
    symbolic link itself and not the target of the link is replaced.


    Moving a path will copy the `lastModifiedTime` attribute to the `target` when
    supported by the `source` and `target` file stores. Copying timestamps may result
    in precision loss. A `move()` implementation may also attempt to copy other attributes.
    It’s not required to fail when they cannot be copied.


    This method returns the `target Path` object. It throws `UnsupportedOperationException`
    when `options` includes an unsupported copy option, `FileAlreadyExistsException`
    when `target` exists but cannot be replaced because `REPLACE_EXISTING` isn’t specified,
    `DirectoryNotEmptyException` when `REPLACE_EXISTING` is specified but the file
    cannot be replaced because it’s a nonempty directory, `AtomicMoveNotSupportedException`
    when `options` includes `ATOMIC_MOVE` but the file cannot be moved as an atomic
    file system operation, and `IOException` when an I/O error occurs.


    Note


    `move()` may be used to move an empty directory. When invoked to move a nonempty
    directory, the directory is moved when it doesn’t require moving the directory’s
    entries. For example, renaming a directory on the same file store will usually
    not require moving the directory entries. When moving a directory requires that
    its entries be moved, this method fails (by throwing `IOException`).


