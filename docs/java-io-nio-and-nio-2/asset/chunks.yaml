    \ is thrown when the file doesn’t exist, `DirectoryNotEmptyException` is thrown\
    \ when `path` identifies a directory that couldn’t be deleted, and `IOException`\
    \ is thrown when an I/O error occurs.\n\nI previously demonstrated `delete(Path\
    \ path)` in the context of using a shutdown hook to delete a temporary directory.\n\
    \n`deleteIfExists(Path path)` deletes the file identified by `path` when it exists.\
    \ If `path` identifies a symbolic link, the symbolic link (and not the final target\
    \ of the link) is deleted. This method returns `true` when the file is deleted;\
    \ otherwise, it returns `false`. `DirectoryNotEmptyException` is thrown when `path`\
    \ identifies a directory that couldn’t be deleted, and `IOException` is thrown\
    \ when an I/O error occurs.\n\nListing [12-39](#A978-1-4842-1565-4_12_Chapter.html#FPar58)\
    \ presents the source code to an application that demonstrates `deleteIfExists()`.\n\
    \n**Listing 12-39.** Deleting a File When It Exists\n\n```\nimport java.io.IOException;\n\
    import java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Delete\n\
    {\n   public static void main(String[] args) throws IOException\n   {\n      if\
    \ (args.length != 1)\n      {\n         System.err.println(\"usage: java Delete\
    \ path\");\n         return;\n      }\n\n      if (!Files.deleteIfExists(Paths.get(args[0])))\n\
    \         System.err.printf(\"%s does not exist%n\", args[0]);\n   }\n}\n```\n\
    \nCompile Listing [12-39](#A978-1-4842-1565-4_12_Chapter.html#FPar58) as follows:\n\
    \n```\njavac Delete.java\n```\n\nRun the resulting application as follows:\n\n\
    ```\njava Delete x\n```\n\nWhen there is no directory `x` in the current directory,\
    \ you should observe the following message:\n\n```\nx does not exist\n```\n\n\
    Otherwise, you should observe no message.\n\n### Managing Symbolic and Hard Links\n\
    \nFile systems store regular files, directories, and links, which are files that\
    \ point to real files, directories, or other links. Links are classified as symbolic\
    \ (also known as soft) or hard. Along with providing methods that take symbolic\
    \ links into account (such as the `copy()` and `move()` methods), the `Files`\
    \ class provides several methods for managing symbolic links. It also provides\
    \ a method for creating hard links.\n\n#### Managing Symbolic Links\n\nA symbolic\
    \ link (soft link or symlink) is a special file that references another file.\
    \ Symbolic links are typically invisible to applications; operations on symbolic\
    \ links are automatically redirected to the link’s target (the file or directory\
    \ being pointed to), except for when a symbolic link is deleted or renamed, in\
    \ which case it’s the link that’s deleted or renamed and not the target. Figure\
    \ [12-3](#A978-1-4842-1565-4_12_Chapter.html#Fig3) illustrates a symbolic link.\n\
    \n![A978-1-4842-1565-4_12_Fig3_HTML.jpg](A978-1-4842-1565-4_12_Fig3_HTML.jpg)\n\
    \n**Figure 12-3.** Jack and Jill’s symbolic links point to the most current quarterly\
    \ sales directories (for brevity, Q3 and Q4 are ignored)\n\nIn Figure [12-3](#A978-1-4842-1565-4_12_Chapter.html#Fig3),\
    \ the `Jack` and `Jill` files under `CurSales` are actually symbolic links to\
    \ `Sales\\Jack\\2015\\Q2` and `Sales\\Jill\\2015\\Q2`, respectively. The `Q2`\
    \ directories are the actual targets of these links. Each link is resolved by\
    \ substituting the actual location in the file system for the symbolic link.\n\
    \nMany file systems use symbolic links extensively. Now and then, a symbolic link\
    \ may be created that produces a circular reference (where the target of a link\
    \ points back to the original link). For example, directory `X` could point to\
    \ directory `Y`, which contains a subdirectory that points back to `X`. A circular\
    \ reference can be problematic when recursively walking a file tree, which is\
    \ a task that I’ll discuss later in this chapter. However, NIO.2’s file tree-walking\
    \ feature takes this possibility into account.\n\nThe `Files` class provides the\
    \ `Path createSymbolicLink(Path link, Path target, FileAttribute<?>... attrs)`\
    \ method for creating a symbolic link to a target. The `link` parameter identifies\
    \ the symbolic link path and the `target` parameter identifies the target path,\
