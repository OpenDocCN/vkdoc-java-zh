    \  \n`Files`提供了什么方法来将一个文件移动到另一个文件？  \n这个文件移动方法支持哪些复制选项？  \n识别`Files`中用于删除文件的方法。\
    \  \n定义符号链接和循环引用。  \n识别`Files`中用于为目标创建符号链接的方法。  \n如何判断一个任意路径是否代表一个符号链接？  \n如何读取符号链接的目标？\
    \  \n定义硬链接。  \n硬链接在哪些方面比软链接限制更多？  \n识别`Files`中用于为现有文件创建硬链接的方法。  \n描述文件树遍历 API。\
    \  \n识别构成文件树遍历 API 公共部分的类型。  \n判断正误：`SKIP_SUBTREE`仅在从[`preVisitDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#preVisitDirectory-T-java.nio.file.attribute.BasicFileAttributes-)`()`方法返回时才有意义；否则，此结果类型与[`CONTINUE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#CONTINUE)相同。\
    \  \n`Files`类提供了哪些方法来遍历文件树？  \n`Stream<Path> find(Path start, int maxDepth, BiPredicate<Path,BasicFileAttributes>\
    \ matcher, FileVisitOption... options)`方法的作用是什么？  \nNIO.2 如何支持路径匹配？  \nWatch Service\
    \ API 的目的是什么？  \n识别并描述构成 Watch Service API 的类型。  \n第 2 章中的练习 22 要求你创建一个`Touch`应用程序。请使用\
    \ NIO.2 类型重写此应用程序。\n"
- fmt: '## Summary


    NIO.2 improves the file system interface that was previously limited to the `File`
    class. The improved file system interface features methods throwing exceptions,
    support for symbolic links, broad and efficient support for file attributes, directory
    streams, support for alternative file systems via custom file system providers,
    support for file copying and file moving, support for walking the file tree/visiting
    files and watching directories, and more.


    The improved file system interface is implemented mainly by the various types
    in the `java.nio.file`, `java.nio.file.attribute`, and `java.nio.file.spi` packages.
    `FileSystem`, `FileSystems`, and `FileSystemProvider` form the core of the improved
    file system interface.


    [Chapter 13](#A978-1-4842-1565-4_13_Chapter.html) presents NIO.2''s support for
    asynchronous I/O.


    # 13. Asynchronous I/O


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1565-4_13](http://dx.doi.org/10.1007/978-1-4842-1565-4_13))
    contains supplementary material, which is available to authorized users.


    NIO provides multiplexed I/O (a combination of nonblocking I/O, discussed in [Chapter
    7](#A978-1-4842-1565-4_7_Chapter.html), and readiness selection, discussed in
    [Chapter 8](#A978-1-4842-1565-4_8_Chapter.html)) to facilitate the creation of
    highly scalable servers. Client code registers a socket channel with a selector
    to be notified when the channel is ready to start I/O.


    NIO.2 provides asynchronous I/O, which lets client code initiate an I/O operation
    and subsequently notifies the client when the operation is complete. Like multiplexed
    I/O, asynchronous I/O is also commonly used to facilitate the creation of highly
    scalable servers.


    **Note:** Multiplexed I/O is often used with operating systems that offer highly
    scalable and performant polling interfaces—Linux and Solaris are examples. Asynchronous
    I/O is often used with operating systems that provide highly scalable and performant
    asynchronous I/O facilities—newer Windows operating systems come to mind.


    This chapter first presents an overview of asynchronous I/O. It then explores
    asynchronous file channels, socket channels, and channel groups.


    ## Asynchronous I/O Overview


    The `java.nio.channels.AsynchronousChannel` interface describes an asynchronous
    channel, which is a channel that supports asynchronous I/O operations (reads,
    writes, and so on). An I/O operation is initiated by calling a method that returns
    a future or requires a completion handler argument:


    *   `Future<V> operation(...)`: Call `operation` and return a `java.util.concurrent.Future<V>`
    interface object, where `V` is `operation`''s result type. `Future` methods may
    be called to check if the I/O operation has completed, to wait for its completion,
    and to retrieve the result.

    *   `void operation(... A attachment, CompletionHandler<V,? super A> handler)`:
    Call `operation` with `attachment` (an object attached to the I/O operation to
    provide context when consuming the result) and `handler`, which is an instance
    of the `java.nio.channels.CompletionHandler<V, A>` interface, as arguments. `A`
    is the type of the attachment. `V` is the result type of the I/O operation. The
    `attachment` is important for cases where a stateless `CompletionHandler` object
    is used to consume the result of many I/O operations. The `handler` is invoked
    to consume the result of the I/O operation when it completes or fails.


    `CompletionHandler` declares the following methods to consume the result of an
    operation when it completes successfully, and to learn why the operation failed
    and take appropriate action:


    *   `void completed(V result, A attachment)`: Called when the operation completes
    successfully. The operation''s result is identified by `result` and the object
    attached to the operation when it was initiated is identified by `attachment`.

    *   `void failed(Throwable t, A attachment)`: Called when the operation fails.
    The reason why the operation failed is identified by `t` and the object attached
    to the operation when it was initiated is identified by `attachment`.


    After being called, the method returns immediately. You then call `Future` methods
    or provide code in the `CompletionHandler` implementation to learn more about
    the I/O operation status and/or process the I/O operation''s results.


    ### Cancellation


    `Future` declares the `boolean cancel(boolean mayInterruptIfRunning)` method to
    cancel execution. This method causes all threads waiting on the result of the
    I/O operation to throw `java.util.concurrent.CancellationException`. Whether the
    underlying I/O operation can be cancelled is highly implementation-specific and
    is therefore not specified. If cancellation leaves the channel or the entity to
    which it''s connected in an inconsistent state, the channel is put into an implementation-specific
    error state that prevents further attempts to initiate I/O operations that are
    similar to the cancelled operation. For example, if an operation is cancelled,
    but the implementation cannot guarantee that bytes have not been read from the
    channel, it puts the channel into an error state. Further attempts to initiate
    an operation cause an unspecified runtime exception to be thrown. Similarly, if
    an operation is cancelled, but the implementation cannot guarantee that bytes
    have not been written to the channel, subsequent attempts to initiate an operation
    will fail with an unspecified runtime exception.'
