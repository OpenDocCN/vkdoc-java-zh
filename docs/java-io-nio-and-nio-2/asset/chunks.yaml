    \ file tree. Listing [12-45](#A978-1-4842-1565-4_12_Chapter.html#FPar64) presents\
    \ the source code to an application that accomplishes this task.\n\n**Listing\
    \ 12-45.** Copying a File Tree\n\n```java\nimport java.io.IOException;\nimport\
    \ java.nio.file.Files;\nimport java.nio.file.FileVisitOption;\nimport java.nio.file.FileVisitResult;\n\
    import java.nio.file.Path;\nimport java.nio.file.Paths;\nimport java.nio.file.SimpleFileVisitor;\n\
    import java.nio.file.StandardCopyOption;\nimport java.nio.file.attribute.BasicFileAttributes;\n\
    import java.util.EnumSet;\n\npublic class Copy\n{\n   public static class CopyVisitor\
    \ extends SimpleFileVisitor<Path>\n   {\n      private Path fromPath;\n      private\
    \ Path toPath;\n      private StandardCopyOption copyOption =\n         StandardCopyOption.REPLACE_EXISTING;\n\
    \n      CopyVisitor(Path fromPath, Path toPath)\n      {\n         this.fromPath\
    \ = fromPath;\n         this.toPath = toPath;\n      }\n\n      @Override\n  \
    \    public FileVisitResult preVisitDirectory(Path dir,\n                    \
    \                           BasicFileAttributes attrs)\n         throws IOException\n\
    \      {\n         System.out.println(\"dir = \" + dir);\n         System.out.println(\"\
    fromPath = \" + fromPath);\n         System.out.println(\"toPath = \" + toPath);\n\
    \         System.out.println(\"fromPath.relativize(dir) = \" +\n             \
    \               fromPath.relativize(dir));\n         System.out.println(\"toPath.resolve(fromPath.relativize(dir))\
    \ = \" +\n                            toPath.resolve(fromPath.relativize(dir)));\n\
    \         Path targetPath = toPath.resolve(fromPath.relativize(dir));\n      \
    \   if (!Files.exists(targetPath))\n            Files.createDirectory(targetPath);\n\
    \         return FileVisitResult.CONTINUE;\n      }\n\n      @Override\n     \
    \ public FileVisitResult visitFile(Path file,\n                              \
    \         BasicFileAttributes attrs)\n         throws IOException\n      {\n \
    \        System.out.println(\"file = \" + file);\n         System.out.println(\"\
    fromPath = \" + fromPath);\n         System.out.println(\"toPath = \" + toPath);\n\
    \         System.out.println(\"fromPath.relativize(file) = \" +\n            \
    \                fromPath.relativize(file));\n         System.out.println(\"toPath.resolve(fromPath.relativize(file))\
    \ = \" +\n                            toPath.resolve(fromPath.relativize(file)));\n\
    \         Files.copy(file, toPath.resolve(fromPath.relativize(file)),\n      \
    \              copyOption);\n         return FileVisitResult.CONTINUE;\n     \
    \ }\n\n      @Override\n      public FileVisitResult visitFileFailed(Path file,\
    \ IOException ioe)\n      {\n         System.err.println(ioe);\n         return\
    \ FileVisitResult.CONTINUE;\n      }\n   }\n\n   public static void main(String[]\
    \ args) throws IOException\n   {\n      if (args.length != 2)\n      {\n     \
    \    System.err.println(\"usage: java Copy source target\");\n         return;\n\
    \      }\n\n      Path source = Paths.get(args[0]);\n      Path target = Paths.get(args[1]);\n\
    \n      if (!Files.exists(source))\n      {\n         System.err.printf(\"%s source\
    \ path doesn’t exist%n\", source);\n         return;\n      }\n\n      if (!Files.isDirectory(source))\
    \ // Is source a nondirectory?\n      {\n         if (Files.exists(target))\n\
    \            if (Files.isDirectory(target)) // Is target a directory?\n      \
    \         target = target.resolve(source.getFileName());\n         try\n     \
    \    {\n            Files.copy(source, target, StandardCopyOption.REPLACE_EXISTING);\n\
    \         }\n         catch (IOException ioe)\n         {\n            System.err.printf(\"\
    I/O error: %s%n\", ioe.getMessage());\n         }\n         return;\n      }\n\
    \n      if (Files.exists(target) && !Files.isDirectory(target)) // Is target\n\
    \      {                                                       // an\n       \
    \                                                       // existing\n        \
    \                                                      // file?\n         System.err.printf(\"\
    %s is not a directory%n\", target);\n         return;\n      }\n\n      EnumSet<FileVisitOption>\
    \ options\n         = EnumSet.of(FileVisitOption.FOLLOW_LINKS);\n      CopyVisitor\
    \ copier = new CopyVisitor(source, target);\n      Files.walkFileTree(source,\
    \ options, Integer.MAX_VALUE, copier);\n   }\n}\n```\n\nListing [12-45](#A978-1-4842-1565-4_12_Chapter.html#FPar64)\
    \ presents a `Copy` class with a `CopyVisitor` nested class (discussed later)\
    \ and a `main()` method as its members.\n\n`main()` first verifies that exactly\
    \ two command-line arguments, which identify the source and target paths of the\
    \ copy operation, have been specified and then obtains their `Path` objects. Next,\
    \ `main()` invokes the `Files` class’s `exists()` method on the source path (there\
    \ is no point in attempting to copy a nonexistent file). If this method returns\
