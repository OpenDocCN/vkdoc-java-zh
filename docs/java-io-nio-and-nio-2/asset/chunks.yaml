- fmt: "A buffer is an object that stores a fixed amount of data to be sent to or\
    \ received from an I/O service (an operating system component for performing input/output).\
    \ It sits between an application and a channel that writes the buffered data to\
    \ the service or reads the data from the service and deposits it into the buffer.\n\
    \nA buffer’s four properties are capacity, limit, position, and mark.\n\nWhen\
    \ you invoke `Buffer`’s `array()` method on a buffer backed by a read-only array,\
    \ this method throws `ReadOnlyBufferException`.\n\nWhen you invoke `Buffer`’s\
    \ `flip()` method on a buffer, the limit is set to the current position and then\
    \ the position is set to zero. When the mark is defined, it’s discarded. The buffer\
    \ is now ready to be drained.\n\nWhen you invoke `Buffer`’s `reset()` method on\
    \ a buffer where a mark has not been set, this method throws `InvalidMarkException`.\n\
    \nThe answer is false: buffers are not thread-safe.\n\nThe abstract classes that\
    \ extend the abstract `Buffer` class are `ByteBuffer`, `CharBuffer`, `DoubleBuffer`,\
    \ `FloatBuffer`, `IntBuffer`, `LongBuffer`, and `ShortBuffer`. Furthermore, `ByteBuffer`\
    \ is subclassed by the abstract `MappedByteBuffer` class.\n\nYou create a byte\
    \ buffer by invoking one of its `allocate()`, `allocateDirect()`, or `wrap()`\
    \ class methods.\n\nA view buffer is a buffer that manages another buffer’s data.\n\
    \nA view buffer is created by calling a `Buffer` subclass’s `duplicate()` method.\n\
    \nYou create a read-only view buffer by calling a `Buffer` subclass method such\
    \ as `ByteBuffer asReadOnlyBuffer()` or `CharBuffer asReadOnlyBuffer()`.\n\n`ByteBuffer`’s\
    \ methods for storing a single byte in a byte buffer are `ByteBuffer put(int index,\
    \ byte b)` and `ByteBuffer put(byte b)`. `ByteBuffer`’s methods for fetching a\
    \ single byte from a byte buffer are `byte get(int index)` and `byte get()`.\n\
    \nAttempting to use the relative `put()` method or the relative `get()` method\
    \ when the current position is greater than or equal to the limit causes `BufferOverflowException`\
    \ or `BufferUnderflowException` to occur.\n\nThe equivalent of executing `buffer.flip();`\
    \ is to execute `buffer.limit(buffer.position()).position(0);`.\n\nThe answer\
    \ is false: calling `flip()` twice doesn’t return you to the original state. Instead,\
    \ the buffer has a zero size.\n\nThe difference between `Buffer`’s `clear()` and\
    \ `reset()` methods is as follows: the `clear()` method marks a buffer as empty,\
    \ whereas `reset()` changes the buffer’s current position to the previously set\
    \ mark or throws `InvalidMarkException` when there’s no previously set mark.\n\
    \n`ByteBuffer`’s `compact()` method compacts a buffer by copying all bytes between\
    \ the current position and the limit to the beginning of the buffer. The byte\
    \ at index `p = position()` is copied to index 0, the byte at index `p + 1` is\
    \ copied to index 1, and so on until the byte at index `limit() - 1` is copied\
    \ to index `n = limit() - 1 - p`. The buffer’s current position is then set to\
    \ `n + 1` and its limit is set to its capacity. The mark, when defined, is discarded.\n\
    \nThe purpose of the `ByteOrder` class is to help you deal with byte-order issues\
    \ when writing/reading multibyte values to/from a multibyte buffer.\n\nA direct\
    \ byte buffer is a byte buffer that interacts with channels and native code to\
    \ perform I/O. The direct byte buffer attempts to store byte elements in a memory\
    \ area that a channel uses to perform direct (raw) access via native code that\
    \ tells the operating system to drain or fill the memory area directly.\n\nYou\
    \ obtain a direct byte buffer by invoking `ByteBuffer`’s `allocateDirect()` method.\n\
    \nIt can be expensive to create a direct byte buffer because memory extraneous\
    \ to the JVM’s heap will need to be allocated by the operating system, and setting\
    \ up/tearing down this memory might take longer than when the buffer was located\
    \ within the heap.\n\nListing [A-6](#A978-1-4842-1565-4_15_Chapter.html#FPar6)\
    \ presents the `ViewBufferDemo` application that was called for in [Chapter 6](#A978-1-4842-1565-4_6_Chapter.html).\n\
    \nListing A-6. Viewing a Byte Sequence as a Character Sequence\n\n```\nimport\
    \ java.nio.ByteBuffer;\nimport java.nio.CharBuffer;\n\npublic class ViewBufferDemo\n\
    {\n   public static void main(String[] args)\n   {\n      ByteBuffer bb = ByteBuffer.allocate(6);\n\
    \      byte zero = 0;\n      bb.put(zero).put((byte) 0x6e).put(zero).put((byte)\
    \ 0x69)\n        .put(zero).put((byte) 0x6f);\n      bb.rewind();\n      CharBuffer\
    \ cb = bb.asCharBuffer();\n      for (int i = 0; i < cb.limit(); i++)\n      \
    \   System.out.print(cb.get());\n   }\n}\n```\n\n## [Chapter 7](#A978-1-4842-1565-4_7_Chapter.html):\
    \ Channels"
