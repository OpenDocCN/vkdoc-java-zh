- fmt: "# Charsets and the String Class\n\nThe `String` class describes a string as\
    \ a sequence of characters. It declares constructors that can be passed byte arrays.\
    \ Because a byte array contains an encoded character sequence, a charset is required\
    \ to decode them. Here is a partial list of `String` constructors that work with\
    \ charsets:\n\n- `String(byte[] data)`: Constructs a new `String` instance by\
    \ decoding the specified array of bytes using the platform’s default charset.\n\
    - `String(byte[] data, int offset, int byteCount)`: Constructs a new `String`\
    \ instance by decoding the specified subsequence of the byte array using the platform’s\
    \ default charset.\n- `String(byte[] data, String charsetName)`: Constructs a\
    \ new `String` instance by decoding the specified array of bytes using the named\
    \ charset.\n\nFurthermore, `String` declares methods that encode its sequence\
    \ of characters into a byte array with help from the default charset or a named\
    \ charset. Two of these methods are described here:\n\n- `byte[] getBytes()`:\
    \ Returns a new byte array containing the characters of this string encoded using\
    \ the platform’s default charset.\n- `byte[] getBytes(String charsetName)`: Returns\
    \ a new byte array containing the characters of this string encoded using the\
    \ named charset.\n\nNote that `String(byte[] data, String charsetName)` and `byte[]\
    \ getBytes(String charsetName)` throw `java.io.UnsupportedEncodingException` when\
    \ the charset isn’t supported.\n\nI’ve created a small application that demonstrates\
    \ `String` and charsets. Listing [10-2](#A978-1-4842-1565-4_10_Chapter.html#FPar4)\
    \ presents the source code.\n\n## Listing 10-2. Using Charsets with `String`\n\
    \n```\nimport java.io.UnsupportedEncodingException;\n\npublic class CharsetDemo\n\
    {\n   public static void main(String[] args)\n      throws UnsupportedEncodingException\n\
    \   {\n      byte[] encodedMsg =\n      {\n         0x66, 0x61, (byte) 0xc3, (byte)\
    \ 0xa7, 0x61, 0x64, 0x65, 0x20, 0x74,\n         0x6f, 0x75, 0x63, 0x68, (byte)\
    \ 0xc3, (byte) 0xa9\n      };\n      String s = new String(encodedMsg, \"UTF-8\"\
    );\n      System.out.println(s);\n      System.out.println();\n      byte[] bytes\
    \ = s.getBytes();\n      for (byte _byte: bytes)\n         System.out.print(Integer.toHexString(_byte\
    \ & 255) + \" \");\n      System.out.println();\n   }\n}\n```\n\nListing [10-2](#A978-1-4842-1565-4_10_Chapter.html#FPar4)’s\
    \ `main()` method first creates a byte array containing a UTF-8 encoded message.\
    \ It then converts this array to a `String` object via the `UTF-8` charset. After\
    \ outputting the resulting `String` object, it extracts this object’s bytes into\
    \ a new byte array and proceeds to output these bytes in hexadecimal format. As\
    \ demonstrated earlier in this chapter, I bitwise AND each byte value with 255\
    \ to remove the `0xFF` sign extension bytes for negative integers when the 8-bit\
    \ byte integer value is converted to a 32-bit integer value. These sign extension\
    \ bytes would otherwise be output.\n\nCompile Listing [10-2](#A978-1-4842-1565-4_10_Chapter.html#FPar4)\
    \ (`javac CharsetDemo.java`) and run this application (`java CharsetDemo`). You\
    \ should observe the following output:\n\n```\nfaçade touché\n66 61 e7 61 64 65\
    \ 20 74 6f 75 63 68 e9\n```\n\nYou might be wondering why you observe `e7` instead\
    \ of `c3 a7` (Latin small letter c with a cedilla [a hook or tail]) and `e9` instead\
    \ of `c3 a9` (Latin small letter e with an acute accent). The answer is that I\
    \ invoked the noargument `getBytes()` method to encode the string. This method\
    \ uses the default charset, which is `windows-1252` on my platform. According\
    \ to this charset, `e7` is equivalent to `c3 a7` and `e9` is equivalent to `c3\
    \ a9`. The result is a shorter encoded sequence.\n\n## EXERCISES\n\nThe following\
    \ exercises are designed to test your understanding of [Chapter 10](#A978-1-4842-1565-4_10_Chapter.html)’s\
    \ content:\n\n- Define charset.\n- What is the purpose of the `Charset` class?\n\
    - Identify the standard charsets supported by the JVM.\n- What is the purpose\
    \ of the byte order mark?\n- How do you obtain the default charset?\n- What does\
    \ `Charset`’s `Charset forName(String charsetName)` factory method do when the\
    \ desired charset isn’t supported by the JVM?\n- How would you typically encode\
    \ a string via a `Charset` instance?\n- Identify the `Charset` methods that perform\
    \ the actual encoding and decoding tasks.\n- What does `String`’s `byte[] getBytes()`\
    \ method accomplish?\n- Write an `AvailCharsets` application that obtains and\
    \ outputs a map of all charsets that the current JVM supports. (Hint: You’ll find\
    \ the method that returns this map in the `Charset` class.)\n\n## Summary\n\n\
    Charsets combine coded character sets with character-encoding schemes. They’re\
    \ used to translate between byte sequences and the characters that are encoded\
    \ into these sequences. Java supports charsets by providing `Charset` and related\
    \ classes. It also uses charsets with the `String` class.\n\n[Chapter 11](#A978-1-4842-1565-4_11_Chapter.html)\
    \ presents NIO’s `java.util.Formatter` class and related types.\n\n# 11. Formatter\n\
    \nElectronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1565-4_11](http://dx.doi.org/10.1007/978-1-4842-1565-4_11))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    The description of JSR 51 ([http://jcp.org/en/jsr/detail?id=51](http://jcp.org/en/jsr/detail?id=51))\
    \ indicates that a simple `printf`-style formatting facility was proposed for\
    \ inclusion in NIO. If you’re familiar with the C language, you’ve probably worked\
    \ with the `printf()` family of functions that support formatted output.\n\nOne\
    \ feature that makes the `printf()` functions useful is varargs, which lets you\
    \ pass a variable number of arguments to these functions. Because support for\
    \ varargs wasn’t added to Java until JDK 5, and because this support is very useful\
    \ for achieving formatted output, the `printf`-style formatting facility was deferred\
    \ to JDK 5.\n\nThis chapter explores JDK 5’s `printf`-style formatting facility."
  raw: '## Charsets and the String Class


    The `String` class describes a string as a sequence of characters. It declares
    constructors that can be passed byte arrays. Because a byte array contains an
    encoded character sequence, a charset is required to decode them. Here is a partial
    list of `String` constructors that work with charsets:


    *   `String(byte[] data)`: Constructs a new `String` instance by decoding the
    specified array of bytes using the platform’s default charset.

    *   `String(byte[] data, int offset, int byteCount)`: Constructs a new `String`
    instance by decoding the specified subsequence of the byte array using the platform’s
    default charset.

    *   `String(byte[] data, String charsetName)`: Constructs a new `String` instance
    by decoding the specified array of bytes using the named charset.


    Furthermore, `String` declares methods that encode its sequence of characters
    into a byte array with help from the default charset or a named charset. Two of
    these methods are described here:


    *   `byte[] getBytes()`: Returns a new byte array containing the characters of
    this string encoded using the platform’s default charset.

    *   `byte[] getBytes(String charsetName)`: Returns a new byte array containing
    the characters of this string encoded using the named charset.


    Note that `String(byte[] data, String charsetName)` and `byte[] getBytes(String
    charsetName)` throw `java.io.UnsupportedEncodingException` when the charset isn’t
    supported.


    I’ve created a small application that demonstrates `String` and charsets. Listing
    [10-2](#A978-1-4842-1565-4_10_Chapter.html#FPar4) presents the source code.


    Listing 10-2\. Using Charsets with `String`


    `import java.io.UnsupportedEncodingException;`


    `public class CharsetDemo`


    `{`


    `public static void main(String[] args)`


    `throws UnsupportedEncodingException`


    `{`


    `byte[] encodedMsg =`


    `{`


    `0x66, 0x61, (byte) 0xc3, (byte) 0xa7, 0x61, 0x64, 0x65, 0x20, 0x74,`


    `0x6f, 0x75, 0x63, 0x68, (byte) 0xc3, (byte) 0xa9`


    `};`


    `String s = new String(encodedMsg, "UTF-8");`


    `System.out.println(s);`


    `System.out.println();`


    `byte[] bytes = s.getBytes();`


    `for (byte _byte: bytes)`


    `System.out.print(Integer.toHexString(_byte & 255) + " ");`


    `System.out.println();`


    `}`


    `}`


    Listing [10-2](#A978-1-4842-1565-4_10_Chapter.html#FPar4)’s `main()` method first
    creates a byte array containing a UTF-8 encoded message. It then converts this
    array to a `String` object via the `UTF-8` charset. After outputting the resulting
    `String` object, it extracts this object’s bytes into a new byte array and proceeds
    to output these bytes in hexadecimal format. As demonstrated earlier in this chapter,
    I bitwise AND each byte value with 255 to remove the `0xFF` sign extension bytes
    for negative integers when the 8-bit byte integer value is converted to a 32-bit
    integer value. These sign extension bytes would otherwise be output.


    Compile Listing [10-2](#A978-1-4842-1565-4_10_Chapter.html#FPar4) (`javac CharsetDemo.java`)
    and run this application (`java CharsetDemo`). You should observe the following
    output:


    `façade touché`


    `66 61 e7 61 64 65 20 74 6f 75 63 68 e9`


    You might be wondering why you observe e7 instead of c3 a7 (Latin small letter
    c with a cedilla [a hook or tail]) and e9 instead of c3 a9 (Latin small letter
    e with an acute accent). The answer is that I invoked the noargument `getBytes()`
    method to encode the string. This method uses the default charset, which is `windows-1252`
    on my platform. According to this charset, e7 is equivalent to c3 a7 and e9 is
    equivalent to c3 a9\. The result is a shorter encoded sequence.


    EXERCISES


    The following exercises are designed to test your understanding of [Chapter 10](#A978-1-4842-1565-4_10_Chapter.html)’s
    content:


    Define charset.   What is the purpose of the `Charset` class?   Identify the standard
    charsets supported by the JVM.   What is the purpose of the byte order mark?  
    How do you obtain the default charset?   What does `Charset`’s `Charset forName(String
    charsetName)` factory method do when the desired charset isn’t supported by the
    JVM?   How would you typically encode a string via a `Charset` instance?   Identify
    the `Charset` methods that perform the actual encoding and decoding tasks.   What
    does `String`’s `byte[] getBytes()` method accomplish?   Write an `AvailCharsets`
    application that obtains and outputs a map of all charsets that the current JVM
    supports. (Hint: You’ll find the method that returns this map in the `Charset`
    class.)


    ## Summary


    Charsets combine coded character sets with character-encoding schemes. They’re
    used to translate between byte sequences and the characters that are encoded into
    these sequences. Java supports charsets by providing `Charset` and related classes.
    It also uses charsets with the `String` class.


    [Chapter 11](#A978-1-4842-1565-4_11_Chapter.html) presents NIO’s `java.util.Formatter`
    class and related types.


    # 11. Formatter


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​11](http://dx.doi.org/10.1007/978-1-4842-1565-4_11))
    contains supplementary material, which is available to authorized users.


    The description of JSR 51 ( [`http://jcp.org/en/jsr/detail?id=51`](http://jcp.org/en/jsr/detail?id=51)
    ) indicates that a simple `printf`-style formatting facility was proposed for
    inclusion in NIO. If you’re familiar with the C language, you’ve probably worked
    with the `printf()` family of functions that support formatted output.


    One feature that makes the `printf()` functions useful is varargs, which lets
    you pass a variable number of arguments to these functions. Because support for
    varargs wasn’t added to Java until JDK 5, and because this support is very useful
    for achieving formatted output, the `printf`-style formatting facility was deferred
    to JDK 5.


    This chapter explores JDK 5’s `printf`-style formatting facility.'
  trans: "\n## 字符集与字符串类\n\n`String` 类将字符串描述为字符序列。它声明了可以接收字节数组的构造方法。由于字节数组包含编码后的字符序列，因此需要字符集来解码它们。以下是部分与字符集配合使用的\
    \ `String` 构造方法列表：\n\n*   `String(byte[] data)`：使用平台的默认字符集解码指定的字节数组，构造一个新的 `String`\
    \ 实例。\n*   `String(byte[] data, int offset, int byteCount)`：使用平台的默认字符集解码字节数组中指定的子序列，构造一个新的\
    \ `String` 实例。\n*   `String(byte[] data, String charsetName)`：使用指定的字符集名称解码指定的字节数组，构造一个新的\
    \ `String` 实例。\n\n此外，`String` 声明了一些方法，这些方法借助默认字符集或指定的字符集将其字符序列编码为字节数组。这里描述了其中两种方法：\n\
    \n*   `byte[] getBytes()`：返回一个新的字节数组，其中包含使用平台默认字符集编码的此字符串的字符。\n*   `byte[] getBytes(String\
    \ charsetName)`：返回一个新的字节数组，其中包含使用指定字符集名称编码的此字符串的字符。\n\n请注意，当字符集不受支持时，`String(byte[]\
    \ data, String charsetName)` 和 `byte[] getBytes(String charsetName)` 会抛出 `java.io.UnsupportedEncodingException`\
    \ 异常。\n\n我创建了一个演示 `String` 和字符集的小型应用程序。清单 10-2 展示了源代码。\n\n**清单 10-2.** 在 `String`\
    \ 中使用字符集\n\n`import java.io.UnsupportedEncodingException;`\n\n`public class CharsetDemo`\n\
    \n`{`\n\n`public static void main(String[] args)`\n\n`throws UnsupportedEncodingException`\n\
    \n`{`\n\n`byte[] encodedMsg =`\n\n`{`\n\n`0x66, 0x61, (byte) 0xc3, (byte) 0xa7,\
    \ 0x61, 0x64, 0x65, 0x20, 0x74,`\n\n`0x6f, 0x75, 0x63, 0x68, (byte) 0xc3, (byte)\
    \ 0xa9`\n\n`};`\n\n`String s = new String(encodedMsg, \"UTF-8\");`\n\n`System.out.println(s);`\n\
    \n`System.out.println();`\n\n`byte[] bytes = s.getBytes();`\n\n`for (byte _byte:\
    \ bytes)`\n\n`System.out.print(Integer.toHexString(_byte & 255) + \" \");`\n\n\
    `System.out.println();`\n\n`}`\n\n`}`\n\n清单 10-2 的 `main()` 方法首先创建一个包含 UTF-8 编码消息的字节数组。然后，它通过\
    \ `UTF-8` 字符集将此数组转换为 `String` 对象。输出生成的 `String` 对象后，它将此对象的字节提取到一个新的字节数组中，并继续以十六进制格式输出这些字节。正如本章前面演示的，我将每个字节值与\
    \ 255 进行按位与运算，以在 8 位字节整数值转换为 32 位整数值时，移除负整数的 `0xFF` 符号扩展字节。否则，这些符号扩展字节也会被输出。\n\
    \n编译清单 10-2 (`javac CharsetDemo.java`) 并运行此应用程序 (`java CharsetDemo`)。您应该会看到以下输出：\n\
    \n`façade touché`\n\n`66 61 e7 61 64 65 20 74 6f 75 63 68 e9`\n\n您可能会疑惑为什么看到的是\
    \ `e7` 而不是 `c3 a7`（带软缺音的拉丁小写字母 c [一个钩子或尾巴]），以及 `e9` 而不是 `c3 a9`（带尖音符的拉丁小写字母 e）。答案是，我调用了无参数的\
    \ `getBytes()` 方法来编码字符串。此方法使用默认字符集，在我的平台上它是 `windows-1252`。根据此字符集，`e7` 等同于 `c3\
    \ a7`，`e9` 等同于 `c3 a9`。结果是更短的编码序列。\n\n**练习**\n\n以下练习旨在测试您对第 10 章内容的理解：\n\n定义字符集。\
    \  \n`Charset` 类的用途是什么？  \n识别 JVM 支持的标准字符集。  \n字节顺序标记的用途是什么？  \n如何获取默认字符集？  \n\
    当 JVM 不支持所需的字符集时，`Charset` 的 `Charset forName(String charsetName)` 工厂方法会做什么？ \
    \ \n通常如何通过 `Charset` 实例对字符串进行编码？  \n识别执行实际编码和解码任务的 `Charset` 方法。  \n`String` 的\
    \ `byte[] getBytes()` 方法实现了什么功能？  \n编写一个 `AvailCharsets` 应用程序，获取并输出当前 JVM 支持的所有字符集的映射。（提示：您可以在\
    \ `Charset` 类中找到返回此映射的方法。）\n\n## 总结\n\n字符集将编码字符集与字符编码方案结合在一起。它们用于在字节序列和编码到这些序列中的字符之间进行转换。Java\
    \ 通过提供 `Charset` 和相关类来支持字符集。它还在 `String` 类中使用字符集。\n\n第 11 章 介绍了 NIO 的 `java.util.Formatter`\
    \ 类及相关类型。\n\n# 11. Formatter\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​11](http://dx.doi.org/10.1007/978-1-4842-1565-4_11))\
    \ 包含补充材料，仅供授权用户使用。\n\nJSR 51 ([`http://jcp.org/en/jsr/detail?id=51`](http://jcp.org/en/jsr/detail?id=51))\
    \ 的描述指出，提议在 NIO 中包含一个简单的 `printf` 风格的格式化工具。如果您熟悉 C 语言，您可能使用过支持格式化输出的 `printf()`\
    \ 函数族。\n\n使 `printf()` 函数有用的一个特性是可变参数，它允许您向这些函数传递可变数量的参数。由于 Java 直到 JDK 5 才添加对可变参数的支持，并且由于这种支持对于实现格式化输出非常有用，因此\
    \ `printf` 风格的格式化工具被推迟到 JDK 5 中实现。\n\n本章探讨 JDK 5 的 `printf` 风格格式化工具。\n"
- fmt: "# Exploring Formatter\n\nJDK 5 introduced the `java.util.Formatter` class\
    \ as an interpreter for `printf()`-style format strings. This class provides support\
    \ for layout justification and alignment; common formats for numeric, string,\
    \ and date/time data; and more. Commonly used Java types (such as `byte` and `java.math.BigDecimal`)\
    \ are supported.\n\n`Formatter` declares several constructors for creating `Formatter`\
    \ objects. These constructors let you specify where you want formatted output\
    \ to be sent. For example, `Formatter()` writes formatted output to an internal\
    \ `java.lang.StringBuilder` instance and `Formatter(OutputStream os)` writes formatted\
    \ output to the specified output stream. You can access the destination by calling\
    \ `Formatter`’s `Appendable out()` method.\n\n**Note**\n\nThe `java.lang.Appendable`\
    \ interface describes an object to which `char` values and character sequences\
    \ can be appended. Classes (such as `StringBuilder`) whose instances are to receive\
    \ formatted output (via the `Formatter` class) implement `Appendable`. This interface\
    \ declares methods such as `Appendable append(char c)`—append `c`’s character\
    \ to this appendable. When an I/O error occurs, this method throws `java.io.IOException`.\n\
    \nAfter creating a `Formatter` object, you would call a `format()` method to format\
    \ a varying number of values. For example, `Formatter format(String format, Object...\
    \ args)` formats the `args` array according to the string of format specifiers\
    \ passed to the `format` parameter, and returns a reference to the invoking `Formatter`\
    \ so that you can chain `format()` calls together (for convenience).\n\nEach format\
    \ specifier has one of the following syntaxes:\n\n* `%`[argument_index `$`][flags][width][`.`\
    \ precision]conversion\n* `%`[argument_index `$`][flags][width]conversion\n* `%`[flags][width]conversion\n\
    \nThe first syntax describes a format specifier for general (such as string),\
    \ character, and numeric types. The second syntax describes a format specifier\
    \ for types that are used to represent dates and times. The third syntax describes\
    \ a format specifier that doesn’t correspond to arguments.\n\nThe optional argument_index\
    \ is a decimal integer indicating the position of the argument in the argument\
    \ list. The first argument is referenced by `1$`, the second argument is referenced\
    \ by `2$`, and so on.\n\nThe optional flags represents a set of characters that\
    \ modify the output format. The set of valid flags depends on the conversion.\n\
    \nThe optional width is a positive decimal integer indicating the minimum number\
    \ of characters to be written to the output.\n\nThe optional precision is a nonnegative\
    \ decimal integer typically used to restrict the number of characters. The specific\
    \ behavior depends on the conversion.\n\nThe required conversion depends on the\
    \ syntax. For the first syntax, it’s a character indicating how the argument should\
    \ be formatted. The set of valid conversions for a given argument depends on the\
    \ argument’s data type. For the second syntax, it’s a two-character sequence.\
    \ The first character is `t` or `T`. The second character indicates the format\
