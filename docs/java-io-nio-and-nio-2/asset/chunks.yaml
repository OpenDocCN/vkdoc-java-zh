    ### 访问文件存储


    `FileSystem` 依赖 `java.nio.file.FileStore` 类来提供关于文件存储的信息，这些存储池、设备、分区、卷、具体文件系统或其他特定于实现的文件存储方式。一个文件存储包含名称、类型、空间大小（以字节为单位）以及其他信息。


    `Files` 声明了 `FileStore getFileStore(Path path)` 方法，用于返回一个 `FileStore` 对象，该对象代表由
    `path` 标识的文件所在的文件存储。一旦你获得了 `FileStore`，就可以调用方法来获取空间大小、判断文件存储是否为只读，以及获取文件存储的名称和类型：


    *   `long getTotalSpace()`：返回文件存储的大小（以字节为单位）。当发生 I/O 错误时，此方法会抛出 `IOException`。

    *   `long getUnallocatedSpace()`：返回文件存储中未分配的字节数。返回的未分配字节数是一个提示，而非保证，表明可以使用这些字节的大部分或全部。在获取空间属性后立即获取的未分配字节数最可能是准确的。任何外部
    I/O 操作（包括在此 JVM 之外的操作系统上进行的操作）都可能导致其不准确。当发生 I/O 错误时，此方法会抛出 `IOException`。

    *   `long getUsableSpace()`：返回此 JVM 在文件存储上可用的字节数。返回的可用字节数是一个提示，而非保证，表明可以使用这些字节的大部分或全部。在获取空间属性后立即获取的可用字节数最可能是准确的。任何外部
    I/O 操作（包括在此 JVM 之外的操作系统上进行的操作）都可能导致其不准确。当发生 I/O 错误时，此方法会抛出 `IOException`。

    *   `boolean isReadOnly()`：当此文件存储为只读时返回 `true`。当文件存储不支持写入操作或对文件的其他更改时，它就是只读的。任何尝试创建文件、打开现有文件进行写入等操作都会导致抛出
    `IOException`。

    *   `String name()`：返回此文件存储的名称。名称的格式高度依赖于具体实现。它通常是存储池或卷的名称。返回的字符串可能与 `toString()`
    方法返回的字符串不同。

    *   `String type()`：返回此文件存储的类型。返回字符串的格式高度依赖于具体实现。例如，它可能指示所使用的格式，或者文件存储是本地还是远程的。


    清单 12-7 展示了一个应用程序的源代码，该程序获取与路径对应的文件存储，并输出有关该文件存储的信息。


    清单 12-7\. 访问文件存储并输出文件存储详情


    `import java.io.IOException;`


    `import java.nio.file.FileStore;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class FSDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java FSDemo path");`


    `return;`


    `}`


    `FileStore fs = Files.getFileStore(Paths.get(args[0]));`


    `System.out.printf("Total space: %d%n", fs.getTotalSpace());`


    `System.out.printf("Unallocated space: %d%n",`


    `fs.getUnallocatedSpace());`


    `System.out.printf("Usable space: %d%n",`


    `fs.getUsableSpace());`


    `System.out.printf("Read only: %b%n", fs.isReadOnly());`


    `System.out.printf("Name: %s%n", fs.name());`


    `System.out.printf("Type: %s%n%n", fs.type());`


    `}`


    `}`


    按如下方式编译清单 12-7：


    `javac FSDemo.java`


    按如下方式运行生成的应用程序：


    `java FSDemo FSDemo.java`


    在一次运行中，我观察到以下输出：


    `Total space: 499808989184`


    `Unallocated space: 108411215872`


    `Usable space: 108411215872`


    `Read only: false`


    `Name:`


    `Type: NTFS`


    `getFileStore()` 方法专注于特定的文件存储。如果你想遍历给定 `FileSystem` 对象的所有文件存储，则需要使用 `FileSystem`
    的 `Iterable<FileStore> getFileStores()` 方法，该方法允许你遍历所有文件存储。


    清单 12-8 展示了一个应用程序的源代码，该程序遍历默认文件系统的所有文件存储并输出它们的名称。


    清单 12-8\. 遍历默认文件系统的文件存储


    `import java.io.IOException;`


    `import java.nio.file.FileStore;`


    `import java.nio.file.FileSystem;`


    `import java.nio.file.FileSystems;`


