- fmt: "### Determining View Support\n\nBefore working with any of these views, make\
    \ sure that it’s supported. One way to accomplish this task is to call `FileSystem`’s\
    \ `Set<String> supportedFileAttributeViews()` method, which returns a set of strings\
    \ identifying views that are supported by the invoking `FileSystem`.\n\nListing\
    \ [12-9](#A978-1-4842-1565-4_12_Chapter.html#FPar15) presents the source code\
    \ to an application that outputs the names of views supported by the default `FileSystem`.\n\
    \n**Listing 12-9.** Outputting the Names of Default File System-Supported File\
    \ Attribute Views\n\n```java\nimport java.nio.file.FileSystem;\nimport java.nio.file.FileSystems;\n\
    \npublic class FAVDemo\n{\n   public static void main(String[] args)\n   {\n \
    \     FileSystem fsDefault = FileSystems.getDefault();\n      for (String view:\
    \ fsDefault.supportedFileAttributeViews())\n         System.out.println(view);\n\
    \   }\n}\n```\n\nCompile Listing [12-9](#A978-1-4842-1565-4_12_Chapter.html#FPar15)\
    \ as follows:\n\n`javac FAVDemo.java`\n\nRun the resulting application as follows:\n\
    \n`java FAVDemo`\n\nI observe the following output:\n\n```\nowner\ndos\nacl\n\
    basic\nuser\n```\n\n**Note**\n\nAll `FileSystem`s support the basic file attribute\
    \ view so you should see at least `basic` in the output.\n\nYou could also use\
    \ `Files`’s `<V extends FileAttributeView> V getFileAttributeView(Path path, Class<V>\
    \ type, LinkOption... options)` method, which returns an object created from an\
    \ implementation of the view interface type or `null` when the view isn’t supported,\
    \ to accomplish this task. Listing [12-10](#A978-1-4842-1565-4_12_Chapter.html#FPar17)\
    \ presents an application that uses this method in a utility method context to\
    \ determine view support.\n\n**Listing 12-10.** Determining Specific File Attribute\
    \ View Support\n\n```java\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
    import java.nio.file.attribute.AclFileAttributeView;\nimport java.nio.file.attribute.BasicFileAttributeView;\n\
    import java.nio.file.attribute.FileAttributeView;\nimport java.nio.file.attribute.PosixFileAttributeView;\n\
    \npublic class FAVDemo\n{\n   public static void main(String[] args)\n   {\n \
    \     System.out.printf(\"Supports basic: %b%n\",\n                        isSupported(BasicFileAttributeView.class));\n\
    \      System.out.printf(\"Supports posix: %b%n\",\n                        isSupported(PosixFileAttributeView.class));\n\
    \      System.out.printf(\"Supports acl: %b%n\",\n                        isSupported(AclFileAttributeView.class));\n\
    \   }\n\n   static boolean isSupported(Class<? extends FileAttributeView> clazz)\n\
    \   {\n      return Files.getFileAttributeView(Paths.get(\".\"), clazz) != null;\n\
    \   }\n}\n```\n\nListing [12-10](#A978-1-4842-1565-4_12_Chapter.html#FPar17) declares\
    \ an `isSupported()` utility method that takes a `java.lang.Class` object representing\
    \ a `FileAttributeView` subinterface as an argument. It returns `true` when the\
    \ view is supported or `false` when it isn’t supported.\n\nThe `Class` argument\
    \ and a `Path` object describing the current directory are passed to `getFileAttributeView()`,\
    \ which returns either an object created from a class that implements the interface\
    \ when the view is supported or `null` when it isn’t supported.\n\nCompile Listing\
    \ [12-10](#A978-1-4842-1565-4_12_Chapter.html#FPar17) (`javac FAVDemo.java`) and\
    \ run the resulting application (`java FAVDemo`). I observe the following output:\n\
    \n```\nSupports basic: true\nSupports posix: false\nSupports acl: true\n```\n\n\
    Ultimately, `getFileAttributeView()` provides a result for the `FileSystem` associated\
    \ with the `Path` argument. Because `Paths.get(\".\")` returns a `FileSystem`\
    \ for the default file system, `isSupport()` is relevant in a default file system\
    \ context only.\n\nFinally, a file store can support various file attribute views.\
    \ Call either of `FileStore`’s `supportsFileAttributeView()` methods to determine\
    \ whether or not the file store supports the file attributes identified by the\
    \ given file attribute view:\n\n*   `boolean supportsFileAttributeView(Class<?\
    \ extends FileAttributeView> type)`\n*   `boolean supportsFileAttributeView(String\
    \ name)`\n\nOne of these methods takes a `Class` object describing a subinterface\
    \ of `FileAttributeView` as an argument:\n\n```java\nSystem.out.printf(\"supports\
    \ basic file attribute view: %b%n\",\n                  fileStore.supportsFileAttributeView(BasicFileAttributeView.class));\n\
    ```\n\nThe other method takes a string argument, which is one of the strings returned\
    \ from `FileSystem`’s `supportedFileAttributeViews()` method:\n\n```java\nSystem.out.printf(\"\
    supports basic file attribute view: %b%n\",\n                  fileStore.supportsFileAttributeView(\"\
    basic\"));\n```\n\n### Exploring the Basic View\n\nThe `BasicFileAttributeView`\
    \ interface supports several basic attributes. The following list identifies each\
    \ attribute in terms of its string name and type:\n\n*   `creationTime` (`FileTime`)\n\
    *   `fileKey` (`Object`)\n*   `isDirectory` (`Boolean`)\n*   `isOther` (`Boolean`)\n\
    *   `isRegularFile` (`Boolean`)\n*   `isSymbolicLink` (`Boolean`)\n*   `lastAccessTime`\
    \ (`FileTime`)\n*   `lastModifiedTime` (`FileTime`)\n*   `size` (`Long`)\n\nEach\
    \ of `creationTime`, `lastAccessTime`, and `lastModifiedTime` has type `java.nio.file.attribute.FileTime`,\
    \ an immutable class representing a file’s timestamp. `fileKey` has type `java.lang.Object`.\
    \ Each of `isDirectory`, `isOther`, `isRegularFile`, and `isSymbolicLink` has\
    \ type `java.lang.Boolean`. `size` has type `java.lang.Long`.\n\n`BasicFileAttributeView`\
    \ declares the following methods:\n\n*   `BasicFileAttributes readAttributes()`:\
    \ Read the basic file attributes as a bulk operation.\n*   `void setTimes(FileTime\
    \ lastModifiedTime, FileTime lastAccessTime, FileTime creationTime)`: Update any\
    \ or all of the file’s `lastModifiedTime`, `lastAccessTime`, and `creationTime`\
    \ attributes.\n\nThese methods throw `IOException` when an I/O error occurs.\n\
    \n`readAttributes()` returns a `java.nio.file.attribute.BasicFileAttributes` object\
    \ that offers type-safe methods for reading attribute values:\n\n*   `FileTime\
    \ creationTime()`\n*   `Object fileKey()`\n*   `boolean isDirectory()`\n*   `boolean\
    \ isOther()`\n*   `boolean isRegularFile()`\n*   `boolean isSymbolicLink()`\n\
    *   `FileTime lastAccessTime()`\n*   `FileTime lastModifiedTime()`\n*   `long\
    \ size()`\n\n**Note**\n\nOn some file systems, it’s possible to use an identifier\
    \ or a combination of identifiers to uniquely identify a file. Such identifiers\
    \ are known as file keys. File keys are important for operations such as file\
    \ tree walks in file systems that support [symbolic links](https://docs.oracle.com/javase/8/docs/api/java/nio/file/package-summary.html#links),\
    \ and for file systems that allow a file to be an entry in more than one directory.\
    \ For example, on Unix-based file systems, the device ID and information node\
    \ (inode) are commonly used for such purposes."
