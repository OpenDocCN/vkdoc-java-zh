    #### Randomly Accessing Files


    [Chapter 3](#A978-1-4842-1565-4_3_Chapter.html) introduced the `java.io.RandomAccessFile`
    class for creating and/or opening regular files for random access. NIO.2 provides
    an equivalent `java.nio.channels.SeekableByteChannel` interface.


    `SeekableByteChannel` extends the `java.nio.channels.ByteChannel` interface and
    describes a byte channel that maintains a current position and allows the position
    to be changed. Table [12-1](#A978-1-4842-1565-4_12_Chapter.html#Tab1) presents
    its methods.


    Table 12-1.


    The Methods That Define a Seekable Byte Channel


    | Method | Description |

    | --- | --- |

    | `long position()` | Return this channel’s position, which is a non-negative
    count of bytes from the beginning of the seekable entity to the current position.
    This method throws `java.nio.channels.ClosedChannelException` when this channel
    is closed and `IOException` when some other I/O error occurs. |

    | `SeekableByteChannel position(long newPosition)` | Set this channel’s position
    to `newPosition`, a non-negative count of bytes from the beginning of the entity.
    Setting the position to a value greater than the current size is legal but doesn’t
    change the size of the entity. A later attempt to read bytes at such a position
    immediately returns an end-of-file indication. A later attempt to write bytes
    at the position causes the entity to grow to accommodate the new bytes; the values
    of any bytes between the previous end-of-file and the newly-written bytes are
    unspecified. Setting the channel’s position isn’t recommended when connected to
    an entity that’s opened with the [`APPEND`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#APPEND)
    option. When opened for append, the position is advanced to the end before writing.
    This method throws `ClosedChannelException` when this channel is closed, `IllegalArgumentException`
    when the new position is negative, and `IOException` when some other I/O error
    occurs. |

    | `int read(ByteBuffer dst)` | Read a sequence of bytes from this channel into
    the given buffer. Bytes are read starting at this channel’s current position,
    and then the position is updated with the number of bytes actually read. The number
    of bytes read is returned. When end-of-stream is reached, `-1` is returned. This
    method throws `ClosedChannelException` when this channel is closed; `java.nio.channels.AsynchronousCloseException`
    when another thread closes this channel while a read operation is in progress;
    `java.nio.channels.ClosedByInterruptException` when another thread interrupts
    the current thread while the read operation is in progress, thereby closing the
    channel and setting the current thread’s interrupt status; and `IOException` when
    some other I/O error occurs. |

    | `long size()` | Return the current size (in bytes) of the entity to which this
    channel is connected. This method throws `ClosedChannelException` when this channel
    is closed and `IOException` when some other I/O error occurs. |

    | `SeekableByteChannel truncate(long size)` | Truncate the entity to which this
    channel is connected to `size`. If `size` is less than the current size, the entity
    is truncated, discarding any bytes beyond the new end. If `size` is greater than
    or equal to the current size, the entity isn’t modified. In either case, when
    the current position is greater than `size` the position is set to `size`. This
    method throws `java.nio.channels.NonWritableChannelException` when this channel
    wasn’t opened for writing, `ClosedChannelException` when this channel is closed,
    `IllegalArgumentException` when `size` is negative, and `IOException` when some
    other I/O error occurs. |

    | `int write(ByteBuffer src)` | Write a sequence of bytes to this channel from
    the given buffer. Bytes are written starting at this channel’s current position,
    unless the channel is connected to an entity that’s opened with the [`APPEND`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#APPEND)
    option, in which case the position is first advanced to the end. The entity to
    which the channel is connected is grown, when necessary, to accommodate the written
    bytes, and then the position is updated with the number of bytes actually written.
    This method returns a count of the bytes written to the channel. It throws `ClosedChannelException`
    when this channel is closed; `AsynchronousCloseException` when another thread
    closes this channel while the write operation is in progress; `ClosedByInterruptException`
    when another thread interrupts the current thread while the write operation is
    in progress, thereby closing the channel and setting the current thread’s interrupt
    status; and `IOException` when some other I/O error occurs. |'
