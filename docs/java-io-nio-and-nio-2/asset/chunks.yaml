- fmt: "Listing [13-3](#A978-1-4842-1565-4_13_Chapter.html#FPar7)’s `main()` method\
    \ first attempts to open an asynchronous server socket channel and then bind it\
    \ to a local address, which happens to be port `9090` on the localhost. It then\
    \ calls `AsynchronousServerSocketChannel`’s `getLocalAddress()` method to return\
    \ the socket address to which this channel’s socket (the local socket) is bound.\
    \ Finally, it outputs a message stating that the server is listening at this address.\n\
    \nIf an exception is thrown, the server outputs a message and terminates. Otherwise,\
    \ it creates an `Attachment` object and initializes the object’s `channelServer`\
    \ field to the newly-opened asynchronous server socket channel. (For convenience,\
    \ I directly access `public` fields instead of calling getter and setter methods.)\
    \ This field will be accessed by the `ConnectionHandler` object that is subsequently\
    \ created, and which is passed with the `Attachment` object to the `<A> void accept(A\
    \ attachment, CompletionHandler<AsynchronousSocketChannel, ? super A> handler)`\
    \ generic method. `accept()` listens for incoming connections and processes them\
    \ accordingly via the `ConnectionHandler` object.\n\nAt this point, `main()`’s\
    \ thread of execution blocks by calling `Thread.join()`. The only way to unblock\
    \ this thread and return from `main()` is to interrupt the thread from another\
    \ thread. However, I have not implemented this feature.\n\nThe server can interact\
    \ with multiple clients simultaneously via a single `ConnectionHandler` object\
    \ and multiple `ReadWriteHandler` objects (one object per client). The `Attachment`\
    \ class lets the connection and read/write handlers conveniently access the server\
    \ socket channel. Also, it records client-specific details. Listing [13-4](#A978-1-4842-1565-4_13_Chapter.html#FPar7)\
    \ presents `Attachment`’s source code.\n\n**Listing 13-4.** Bundling Fields That\
    \ the Server and Clients Use to Communicate\n\n```\nimport java.net.SocketAddress;\n\
    import java.nio.ByteBuffer;\nimport java.nio.channels.AsynchronousServerSocketChannel;\n\
    import java.nio.channels.AsynchronousSocketChannel;\n\npublic class Attachment\n\
    {\n    public AsynchronousServerSocketChannel channelServer;\n    public AsynchronousSocketChannel\
    \ channelClient;\n    public boolean isReadMode;\n    public ByteBuffer buffer;\n\
    \    public SocketAddress clientAddr;\n}\n```\n\nThe `channelServer` field stores\
    \ the reference to the server socket channel that was created in the `Server`\
    \ class’s `main()` method. It’s used by the connection handler to call `AsynchronousServerSocketChannel`’s\
    \ `accept()` method.\n\nThe `channelClient` field stores the reference to the\
    \ socket channel that is passed to `ConnectionHandler`’s `completed()` method\
    \ in response to `accept()` successfully accepting a client connection. It’s also\
    \ used in this method to perform an initial `read()` call, and to perform `read()`/`write()`\
    \ calls in the `ReadWriteHandler` object.\n\nThe `isReadMode` field indicates\
    \ that a read (`true`) or write (`false`) operation was performed before the `ReadWriteHandler`\
    \ object’s `completed()` method was called. For a read, `completed()` obtains\
    \ and outputs the read data. The `completed()` method ends by performing the opposite\
    \ operation.\n\nThe `buffer` field identifies the byte buffer that’s created in\
    \ the connection handler and that’s used to communicate bytes between the server\
    \ and a client. Each client has its own byte buffer.\n\nFinally, the `clientAddr`\
    \ field stores the `java.net.SocketAddress` of the remote client. It stores the\
    \ client’s socket address and is output as part of various client-specific messages."
