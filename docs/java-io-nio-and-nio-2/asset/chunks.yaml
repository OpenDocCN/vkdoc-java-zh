    #### 探索文件树遍历 API


    文件树遍历 API 提供了遍历文件树并访问其所有文件（常规文件、目录和链接）的能力。除了提供执行遍历的私有实现外，此 API 还提供了供应用程序使用的公共接口。


    公共接口以 `java.nio.file.FileVisitor<T>` 接口类型为中心，该类型描述了一个访问者。在遍历过程中的各个点，文件树遍历实现会调用此接口的方法，以通知访问者已遇到某个文件并提供其他通知：


    *   `FileVisitResult postVisitDirectory(T dir, IOException ioe)`

    *   `FileVisitResult preVisitDirectory(T dir, BasicFileAttributes attrs)`

    *   `FileVisitResult visitFile(T file, BasicFileAttributes attrs)`

    *   [`FileVisitResult`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#enum%20in%20java.nio.file)
    `visitFileFailed(` [`T`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#type%20parameter%20in%20FileVisitor)
    `file,` [`IOException`](https://docs.oracle.com/javase/8/docs/api/java/io/IOException.html#class%20in%20java.io)
    `ioe)`


    每个方法都使用各种参数进行调用，应用程序代码可以查询这些参数。方法执行完毕后，会返回在 `java.nio.file.FileVisitResult` 枚举类型中声明的以下常量之一：


    *   `CONTINUE`：继续遍历。当从 `preVisitDirectory()` 方法返回时，表示还应访问该目录中的条目。

    *   `SKIP_` `SIBLINGS`：继续遍历，但不访问此文件的同级文件。如果从 [`preVisitDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#preVisitDirectory-T-java.nio.file.attribute.BasicFileAttributes-)
    `()` 方法返回，则还会跳过该目录中的条目，并且不会调用 [`postVisitDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#postVisitDirectory-T-java.io.IOException-)
    `()` 方法。

    *   `SKIP_` `SUBTREE`：继续遍历，但不访问此目录中的条目。此结果仅在从 [`preVisitDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#preVisitDirectory-T-java.nio.file.attribute.BasicFileAttributes-)
    `()` 方法返回时才有意义；否则，此结果类型与 [`CONTINUE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#CONTINUE)
    相同。

    *   `TERMINATE`：终止遍历。


    `FileVisitResult` `postVisitDirectory` `(T dir, IOException ioe)` 在访问完目录 `dir`
    中的条目及其所有后代之后被调用。当目录的迭代提前完成时（由于 [`visitFile`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#visitFile-T-java.nio.file.attribute.BasicFileAttributes-)
    `()` 返回 [`SKIP_SIBLINGS`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#SKIP_SIBLINGS)
    ，或在迭代目录时发生 I/O 错误），也会调用此方法。当目录的迭代无错误完成时，传递给 `ioe` 的值为 `null`；否则，该值为导致目录迭代提前完成的
    I/O 异常。


    `FileVisitResult` `preVisitDirectory` `(T dir, BasicFileAttributes attrs)` 在访问目录
    `dir` 中的条目之前被调用。如果此方法返回 `CONTINUE`，则会访问目录中的条目。如果此方法返回 `SKIP_SUBTREE` 或 `SKIP_SIBLINGS`，则不会访问目录中的条目（以及任何后代）。对于
    `SKIP_SIBLINGS`，将不会调用 `postVisitDirectory()`。传递给 `attrs` 的值标识了该目录的基本属性。


    `FileVisitResult` `visitFile` `(T file, BasicFileAttributes attrs)` 针对目录中的非目录
    `file` 被调用。传递给 `attrs` 的值标识了该文件的基本属性。


    [`FileVisitResult`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#enum%20in%20java.nio.file)
    `visitFileFailed` `(` [`T`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#type%20parameter%20in%20FileVisitor)
    `file,` [`IOException`](https://docs.oracle.com/javase/8/docs/api/java/io/IOException.html#class%20in%20java.io)
    `ioe)` 针对无法访问的 `file` 被调用，原因可能是无法读取其属性、`file` 是一个无法打开的目录，或者其他原因。传递给 `ioe` 的值标识了阻止访问该
    `file` 的 I/O 异常。


    当发生 I/O 错误时，每个方法都会抛出 `IOException`。


    `java.nio.file.SimpleFileVisitor<T>` 类实现了所有四个方法，提供了访问所有文件并重新抛出 I/O 错误的默认行为。除 `visitFileFailed()`
    之外的所有方法都返回 `CONTINUE`；`visitFileFailed()` 会重新抛出阻止访问该文件的 I/O 异常。


    `SimpleFileVisitor` 声明了一个 `protected` 构造函数，这意味着您不能直接实例化此类。相反，您必须继承 `SimpleFileVisitor`，如下所示：


    `class DoNothingVisitor extends SimpleFileVisitor<Path>`


    `{`


    `}`


    声明并实现一个访问者类后，您可以将此类的实例以及一个标识遍历起点的 `Path` 对象传递给 `Files` 类中的以下方法：


    `Path walkFileTree(Path start, FileVisitor<? super Path> visitor)`


    此方法启动对以 `start` 为根的整个文件树的深度优先遍历。它会根据需要调用 `visitor` 中的各种方法。如果这些方法之一抛出 `IOException`，则
    `walkFileTree()` 也会抛出 `IOException`。以下示例演示了从当前目录开始的遍历：


    `Files.walkFileTree(Paths.get("."), new DoNothingVisitor());`


