    \n`Files`类通过提供以下方法让您获取`SeekableByteChannel`：\n\n*   `SeekableByteChannel newByteChannel(Path\
    \ path, OpenOption... options)`\n*   `SeekableByteChannel newByteChannel(Path\
    \ path, Set<? extends OpenOption> options, FileAttribute<?>... attrs)`\n\n每个方法都会打开或创建一个常规文件，并返回一个可寻址的字节通道来访问该文件。当指定了无效的打开选项组合时，会抛出`IllegalArgumentException`；当指定了不支持的打开选项时，会抛出`UnsupportedOperationException`；当发生I/O错误时，会抛出`IOException`。\n\
    \n我创建了一个应用程序，演示了`SeekableByteChannel`在`FileChannel`上下文以及更通用上下文中的使用。清单12-28展示了该应用程序的源代码。\n\
    \n**清单12-28. 演示`SeekableByteChannel`**\n\n```java\nimport java.io.IOException;\n\
    \nimport java.nio.ByteBuffer;\n\nimport java.nio.channels.FileChannel;\n\nimport\
    \ java.nio.channels.SeekableByteChannel;\n\nimport java.nio.file.Files;\n\nimport\
    \ java.nio.file.Path;\n\nimport java.nio.file.Paths;\n\nimport java.util.EnumSet;\n\
    \nimport static java.nio.file.StandardOpenOption.*;\n\npublic class SBCDemo\n\n\
    {\n\n   final static int RECLEN = 50;\n\n   public static void main(String[] args)\
    \ throws IOException\n\n   {\n\n      Path path = Paths.get(\"emp\");\n\n    \
    \  FileChannel fc;\n\n      fc = FileChannel.open(path, CREATE, WRITE, SYNC).position(RECLEN\
    \ * 2);\n\n      ByteBuffer buffer = ByteBuffer.wrap(\"John Doe\".getBytes());\n\
    \n      fc.write(buffer);\n\n      fc.close();\n\n      buffer.clear();\n\n  \
    \    SeekableByteChannel sbc;\n\n      sbc = Files.newByteChannel(path, EnumSet.of(READ)).\n\
    \n                position(RECLEN * 2);\n\n      sbc.read(buffer);\n\n      sbc.close();\n\
    \n      System.out.println(new String(buffer.array()));\n\n   }\n\n}\n```\n\n\
    清单12-28中的`main()`方法首先获取指向`emp`（员工）文件的路径。然后调用`FileChannel`的`FileChannel open(Path\
    \ path, OpenOption... options)`方法来打开或创建并返回一个指向该文件的通道。\n\n> **注意**\n>\n> NIO.2\
    \ 向`FileChannel`类添加了`FileChannel open(Path path, OpenOption... options)`和`FileChannel\
    \ open(Path path, Set<? extends OpenOption> options, FileAttribute<?>... attrs)`方法，这样您就不再需要依赖传统的I/O类型（如`RandomAccessFile`）来获取文件通道。\n\
    \n调用`open()`方法时，传入了`CREATE`（当文件不存在时创建新文件）、`WRITE`（以写访问权限打开文件）和`SYNC`（要求对文件内容或元数据的每次更新都同步写入底层存储设备）选项。\n\
    \n成功获取可寻址文件通道后，`main()`在该通道上调用`position()`，将读/写位置设置为记录长度的两倍。（假设`emp`是一个平面文件数据库，被划分为记录，每条记录的长度为`RECLEN`字节。）由于`position()`返回一个`FileChannel`，此方法调用被链接到`open()`方法的结果上。\n\
