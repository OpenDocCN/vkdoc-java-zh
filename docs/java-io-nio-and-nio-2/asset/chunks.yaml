- fmt: "# Completion of Socket Channel Functionality\n\nThe capabilities that NIO.2\
    \ provides for completing socket channel functionality are support for binding\
    \ and option configuration in the `DatagramChannel`, `ServerSocketChannel`, and\
    \ `SocketChannel` classes and support for channel-based multicasting. JDK 7 overcame\
    \ the counterintuitive mix of socket channel and socket APIs by introducing the\
    \ `NetworkChannel` interface, which is implemented by the `DatagramChannel`, `ServerSocketChannel`,\
    \ `SocketChannel`, `AsynchronousServerSocketChannel`, and `AsynchronousSocketChannel`\
    \ classes.\n\nThe exceptions that are thrown by `SocketChannel`'s `shutdownInput()`\
    \ and `shutdownOutput()` methods are `NotYetConnectedException`, `ClosedChannelException`,\
    \ and `IOException`.\n\nJDK 7 supports multicasting by introducing a `MulticastChannel`\
    \ interface that extends `NetworkChannel`, by introducing a `MembershipKey` class,\
    \ and by adding an `open(ProtocolFamily)` method to the `DatagramChannel` class.\n\
    \nThe answer is false: The `MembershipKey.join(InetAddress group, NetworkInterface\
    \ ni, InetAddress source)` method performs include-mode filtering.\n\nListing\
    \ A-13 presents the `EnumNI` application that was called for in Chapter 14.\n\n\
    **Listing A-13.** Enumerating Network Interfaces and Outputting Their Names\n\n\
    ```java\nimport java.net.NetworkInterface;\nimport java.util.Enumeration;\n\n\
    public class EnumNI\n{\n   public static void main(String[] args) throws Exception\n\
    \   {\n      Enumeration<NetworkInterface> e;\n      e = NetworkInterface.getNetworkInterfaces();\n\
    \      while (e.hasMoreElements())\n         System.out.println(e.nextElement());\n\
    \   }\n}\n```\n\nListing A-14 presents the `ChannelClient` application that was\
    \ called for in Chapter 15.\n\n**Listing A-14.** Dropping Group Membership and\
    \ Closing the Channel\n\n```java\nimport java.io.IOException;\nimport java.net.InetAddress;\n\
    import java.net.InetSocketAddress;\nimport java.net.NetworkInterface;\nimport\
    \ java.net.StandardProtocolFamily;\nimport java.net.StandardSocketOptions;\nimport\
    \ java.nio.ByteBuffer;\nimport java.nio.channels.DatagramChannel;\nimport java.nio.channels.MembershipKey;\n\
    \npublic class ChannelClient\n{\n   final static int PORT = 9999;\n   public static\
    \ void main(String[] args) throws IOException\n   {\n      NetworkInterface ni;\n\
    \      ni = NetworkInterface.getByInetAddress(InetAddress.getLocalHost());\n \
    \     DatagramChannel dc;\n      dc = DatagramChannel.open(StandardProtocolFamily.INET)\n\
    \                          .setOption(StandardSocketOptions.SO_REUSEADDR,\n  \
    \                                   true)\n                          .bind(new\
    \ InetSocketAddress(PORT))\n                          .setOption(StandardSocketOptions.IP_MULTICAST_IF,\n\
    \                                     ni);\n      InetAddress group = InetAddress.getByName(\"\
    239.255.0.1\");\n      MembershipKey key = dc.join(group, ni);\n      ByteBuffer\
    \ response = ByteBuffer.allocate(50);\n      for (int i = 0; i < 10; i++)\n  \
    \    {\n         dc.receive(response);\n         response.flip();\n         while\
    \ (response.hasRemaining())\n            System.out.print((char) response.get());\n\
    \         System.out.println();\n         response.clear();\n      }\n      key.drop();\n\
    \      dc.close();\n   }\n}\n```\n\nListing A-15 presents the `StockServer` application\
    \ that was called for in Chapter 14.\n\n**Listing A-15.** Broadcasting a Stock's\
