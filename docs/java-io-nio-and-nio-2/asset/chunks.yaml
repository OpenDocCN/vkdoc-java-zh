    `SerEmployee`’s `writeObject()` and `readObject()` methods rely on `DataOutput`
    and `DataInput` methods: they don’t need to call `ObjectOutputStream`’s `writeObject()`
    method and `ObjectInputStream`’s `readObject()` method to perform their tasks.


    When you run this application, it generates the following output:


    `John Doe`


