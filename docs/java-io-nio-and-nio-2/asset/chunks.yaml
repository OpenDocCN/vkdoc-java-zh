    \ 的子类型是 `DosFileAttributeView` 和 `PosixFileAttributeView`。`FileOwnerAttributeView`\
    \ 的子类型是 `AclFileAttributeView` 和 `PosixFileAttributeView`。`AttributeView` 的子类型还有\
    \ `FileStoreAttributeView`。  \n你可以通过调用 `FileSystem` 的 `Set<String> supportedFileAttributeViews()`\
    \ 方法来识别给定文件系统所有支持的属性视图，该方法返回一个字符串集合，标识调用该方法的 `FileSystem` 所支持的视图。  \n基本属性是许多文件系统共有的属性。用于管理基本属性的视图是\
