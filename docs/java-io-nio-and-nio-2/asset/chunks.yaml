- fmt: "# Revisiting Standard I/O\n\nJava supports standard I/O. You input data items\
    \ from the standard input stream by making `System.in.read()` method calls, you\
    \ output data items to the standard output stream by making `System.out.print()`\
    \ and `System.out.println()` method calls, and you output data items to the standard\
    \ error stream by making `System.err.print()` and `System.err.println()` method\
    \ calls.\n\n`System.in`, `System.out`, and `System.err` are formally described\
    \ by the following class fields in the `System` class:\n\n- `public static final\
    \ InputStream in`\n- `public static final PrintStream out`\n- `public static final\
    \ PrintStream err`\n\nThese fields contain references to `InputStream` and `PrintStream`\
    \ objects that represent the standard input, standard output, and standard error\
    \ streams.\n\nWhen you invoke `System.in.read()`, the input is originating from\
    \ the source identified by the `InputStream` instance assigned to `in`. Similarly,\
    \ when you invoke `System.out.print()` or `System.err.println()`, the output is\
    \ being sent to the destination identified by the `PrintStream` instance assigned\
    \ to `out` or `err`, respectively.\n\nJava initializes `in` to refer to the keyboard\
    \ or a file when the standard input stream is redirected to the file. Similarly,\
    \ Java initializes `out`/`err` to refer to the screen or a file when the standard\
