    #### 删除文件树


    文件树遍历 API 可用于删除文件树。清单 12-46 展示了一个实现此功能的应用程序源代码。


    清单 12-46\. 删除文件树


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.FileVisitResult;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.SimpleFileVisitor;`


    `import java.nio.file.attribute.BasicFileAttributes;`


    `public class Delete`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java Delete path");`


    `return;`


    `}`


    `class DeleteVisitor extends SimpleFileVisitor<Path>`


    `{`


    `@Override`


    `public FileVisitResult postVisitDirectory(Path dir,`


    `IOException ioe)`


    `throws IOException`


    `{`


    `if (ioe == null)`


    `if (Files.deleteIfExists(dir))`


    `System.out.printf("deleted directory %s%n", dir);`


    `else`


    `System.out.printf("couldn’t delete directory %s%n", dir);`


    `else`


    `throw ioe;`


    `return FileVisitResult.CONTINUE;`


    `}`


    `@Override`


    `public FileVisitResult visitFile(Path file,`


    `BasicFileAttributes attr)`


    `throws IOException`


    `{`


    `if (Files.deleteIfExists(file))`


    `System.out.printf("deleted regular file %s%n", file);`


    `else`


    `System.out.printf("couldn’t delete regular file %s%n", file);`


    `return FileVisitResult.CONTINUE;`


    `}`


    `}`


    `Files.walkFileTree(Paths.get(args[0]), new DeleteVisitor());`


    `}`


    `}`


    清单 12-46 的 `main()` 方法执行删除操作。它首先验证是否恰好指定了一个命令行参数（用于标识要删除的文件树）。然后获取该参数的 `Path`
    对象，并实例化 `DeleteVisitor` 局部类。这两个对象都被传递给 `walkFileTree()`，该方法遍历以此路径为根的文件树。符号链接不会被跟踪。


    注意


    `Delete` 旨在删除符号链接本身，而非其目标。符号链接可能指向文件树之外且不应被删除的文件。


    `DeleteVisitor` 在其 `visitFile()` 方法中删除非目录文件。此方法通过调用 `deleteIfExists()` 执行删除。如果该方法返回
    `true`，则输出文件已被删除的消息。否则，输出无法删除文件的消息。（在遍历期间发现文件与调用 `deleteIfExists()` 之间，该文件可能已被外部进程删除。）


    由于只有在目录的常规文件和其他条目被删除后，才能删除目录本身，因此 `DeleteVisitor` 在其 `postVisitDirectory()` 方法中删除目录。当调用此方法时，目录中的所有条目都已被删除。调用
    `deleteIfExists()` 来执行删除操作。


    `postVisitDirectory()` 仅在访问非目录文件时未发生异常的情况下，才会尝试删除目录。如果发生异常，则会重新抛出该异常。


    按如下方式编译清单 12-46：


    `javac Delete.java`


    假设当前目录下有以下文件树：


    `sales`


    `joe`


    `2015`


    `q1`


    `sales.txt`


    按如下方式运行生成的应用程序：


    `java Delete sales`


    您应该会看到以下输出：


    `deleted regular file sales\joe\2015\q1\sales.txt`


    `deleted directory sales\joe\2015\q1`


    `deleted directory sales\joe\2015`


    `deleted directory sales\joe`


    `deleted directory sales`


    #### 移动文件树


    文件树遍历 API 可用于移动文件树。清单 12-47 展示了一个实现此功能的应用程序源代码。


    清单 12-47\. 移动文件树


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.FileVisitResult;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.SimpleFileVisitor;`


    `import java.nio.file.StandardCopyOption;`


    `import java.nio.file.attribute.BasicFileAttributes;`


    `public class Move`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Move srcpath destpath");`


    `return;`


    `}`


    `class MoveVisitor extends SimpleFileVisitor<Path>`


    `{`


    `private Path srcPath, dstPath;`


    `MoveVisitor(Path srcPath, Path dstPath)`


    `{`


    `this.srcPath = srcPath;`


    `this.dstPath = dstPath;`


    `}`


    `@Override`


    `public FileVisitResult postVisitDirectory(Path dir,`


    `IOException ioe)`


    `throws IOException`


    `{`


    `if (ioe == null)`


    `Files.delete(dir);`


    `else`


    `throw ioe;`


    `return FileVisitResult.CONTINUE;`


    `}`


    `@Override`


    `public FileVisitResult preVisitDirectory(Path dir,`


    `BasicFileAttributes attrs)`


    `throws IOException`


    `{`


    `Path targetPath = dstPath.resolve(srcPath.relativize(dir));`


    `Files.copy(dir, targetPath, StandardCopyOption.REPLACE_EXISTING,`


    `StandardCopyOption.COPY_ATTRIBUTES);`


    `return FileVisitResult.CONTINUE;`


    `}`


    `@Override`


    `public FileVisitResult visitFile(Path file,`


    `BasicFileAttributes attr)`


    `throws IOException`


    `{`


    `Path targetPath = dstPath.resolve(srcPath.relativize(file));`


    `Files.move(file, targetPath,`


    `StandardCopyOption.REPLACE_EXISTING,`


    `StandardCopyOption.ATOMIC_MOVE);`


    `return FileVisitResult.CONTINUE;`


    `}`


    `}`


    `Path src = Paths.get(args[0]);`


    `Path dst = Paths.get(args[1]);`


    `Files.walkFileTree(src, new MoveVisitor(src, dst));`


    `}`


    `}`


    清单 12-47 的 `main()` 方法执行移动操作。它首先验证是否恰好指定了两个命令行参数（用于标识要移动的文件树及其新位置）。然后获取每个参数的 `Path`
    对象，并实例化 `MoveVisitor` 局部类，将源和目标 `Path` 对象传递给 `MoveVisitor` 的构造函数。最后，`main()` 调用
    `walkFileTree()` 来遍历以源路径为根的文件树。符号链接不会被跟踪。


    在移动目录的条目之前，必须先移动目录本身。`MoveVisitor` 的 `preVisitDirectory()` 方法完成此任务。您可能会认为可以使用
    `move()` 方法代替。然而，当调用 `move()` 来移动非空目录时，仅当移动该目录不需要移动其条目时，目录才会被移动。当必须移动条目时，此方法会失败（通过抛出
    `IOException`）。解决方案是使用 `copy()` 方法，该方法执行以下操作：当文件是目录时，`copy()` 在目标位置创建一个空目录（目录中的条目不会被复制）。


    调用 `copy()` 时使用了 `REPLACE_EXISTING` 和 `COPY_ATTRIBUTES` 选项。`REPLACE_EXISTING`
    按如下方式配置复制：当目标存在时，如果目标不是非空目录，则替换目标。当目标存在且是符号链接时，替换的是符号链接本身，而不是链接的目标。`COPY_ATTRIBUTES`
    尝试将与目录关联的属性复制到目标。实际复制的确切文件属性取决于文件系统，因此未指定。至少，当源和目标文件存储都支持时，`lastModifiedTime`
    会被复制到目标。时间戳的复制可能会导致精度损失。

