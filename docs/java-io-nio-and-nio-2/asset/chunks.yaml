  trans: "\n## 第 3 章: RandomAccessFile\n\n`RandomAccessFile` 类的用途是创建和/或打开文件以进行随机访问，在这种访问模式下，可以在文件关闭前，在不同位置混合执行写入和读取操作。\
    \  \n文件的元数据是关于文件的数据，而非文件的实际内容。元数据的示例包括文件长度和文件最后修改时间。  \n`\"rwd\"` 和 `\"rws\"`\
    \ 模式参数的用途是确保对本地存储设备上文件的任何写入操作都会实际写入设备，从而保证在系统崩溃时关键数据不会丢失。当文件不在本地设备上时，则不提供此保证。\
    \  \n文件指针是一个光标，用于标识下一个要写入或读取的字节的位置。当打开一个现有文件时，文件指针会设置在其第一个字节处，偏移量为 0。当创建文件时，文件指针也会设置为\
    \ 0。  \n当写入位置超过文件末尾时，文件会被扩展。  \n答案是错误的：当你调用 `RandomAccessFile` 的 `seek(long)`\
    \ 方法来设置文件指针的值，并且该值大于文件长度时，文件的长度不会改变。只有在将偏移量设置到文件末尾之后进行写入操作时，文件长度才会改变。  \n方法 `void\
    \ write(int b)` 将 `b` 的低八位写入当前文件指针位置处的文件。  \n`FileDescriptor` 的 `sync()` 方法会通知底层操作系统将打开文件的输出缓冲区内容清空到其关联的本地磁盘设备。`sync()`\
    \ 会在所有修改后的数据和属性都已写入相关设备后返回。  \n平面文件数据库是一个按记录和字段组织的单一文件。一条记录存储一个条目（例如零件数据库中的一个零件），一个字段存储该条目的一个单一属性（例如零件编号）。\
    \  \n清单 A-2 展示了 第 3 章 中要求的 `RAFDemo` 应用程序。  \n\n清单 A-2. 演示 `RandomAccessFile`\n\
    \n`import java.io.IOException;`\n\n`import java.io.RandomAccessFile;`\n\n`public\
    \ class RAFDemo`\n\n`{`\n\n   `final static String MSG = \"Test\";`\n\n   `public\
    \ static void main(String[] args)`\n\n   `{`\n\n      `try (RandomAccessFile raf\
    \ = new RandomAccessFile(\"data\", \"rw\"))`\n\n      `{`\n\n         `raf.writeInt(127);`\n\
    \n         `raf.writeChars(MSG);`\n\n         `raf.seek(0);`\n\n         `System.out.println(raf.readInt());`\n\
    \n         `for (int i = 0; i < MSG.length(); i++)`\n\n            `System.out.print(raf.readChar());`\n\
    \n         `System.out.println();`\n\n      `}`\n\n      `catch (IOException ioe)`\n\
    \n      `{`\n\n         `ioe.printStackTrace();`\n\n      `}`\n\n   `}`\n\n`}`\n\
    \n## 第 4 章: 流\n"
- fmt: '流（`stream`）是一个任意长度的有序字节序列。字节通过输出流从应用程序流向目的地，并通过输入流从源流向应用程序。


    `OutputStream`的`flush()`方法旨在将所有缓冲的输出字节写入目的地。如果此输出流的目标是底层操作系统提供的抽象（例如文件），则刷新流仅保证先前写入流的字节被传递给底层操作系统进行写入；它不保证这些字节实际写入物理设备（如磁盘驱动器）。


    答案是正确：`OutputStream`的`close()`方法会自动刷新输出流。如果在调用`close()`之前应用程序结束，输出流会自动关闭，其数据也会被刷新。


    `InputStream`的`mark(int)`和`reset()`方法旨在重新读取流的一部分。`mark(int)`标记此输入流中的当前位置。随后调用`reset()`会将此流重新定位到最后一个标记位置，以便后续的读取操作重新读取相同的字节。不要忘记调用`markSupported()`来查明子类是否支持`mark()`和`reset()`。


    你可以通过调用`ByteArrayOutputStream`的`toByteArray()`方法来访问`ByteArrayOutputStream`实例内部字节数组的副本。


    答案是错误：`FileOutputStream`和`FileInputStream`不提供内部缓冲区来提高写入和读取操作的性能。


    你可以使用`PipedOutputStream`和`PipedInputStream`在一对执行线程之间通信数据。


    过滤流是一种在字节序列到达目的地之前对其进行缓冲、压缩/解压缩、加密/解密或以其他方式操作输入流字节序列的流。


    当一个流实例被传递给另一个流类的构造函数时，两个流就被链接在一起。


    你可以通过将`BufferedOutputStream`实例链接到`FileOutputStream`实例，并调用`BufferedOutputStream`实例的`write()`方法，使数据在流向文件输出流之前被缓冲，从而提高文件输出流的性能。你可以通过将`BufferedInputStream`实例链接到`FileInputStream`实例，使来自文件输入流的数据在被`BufferedInputStream`实例通过调用其`read()`方法返回之前被缓冲，从而提高文件输入流的性能。


    `DataOutputStream`和`DataInputStream`通过提供以独立于操作系统的方式写入和读取原始类型值及字符串的方法，来支持`FileOutputStream`和`FileInputStream`。相比之下，`FileOutputStream`和`FileInputStream`仅提供写入/读取字节和字节数组的方法。


    对象序列化是一种将对象状态序列化为字节流的JVM机制。其对应的反序列化是一种从字节流反序列化此状态的JVM机制。


    Java支持的三种序列化和反序列化形式是：默认序列化和反序列化、自定义序列化和反序列化，以及外部化。


    `Serializable`接口的目的是告诉JVM，可以对实现该类的对象进行序列化。


    当序列化机制遇到其类未实现`Serializable`的对象时，它会抛出`NotSerializableException`类的实例。


    Java不支持无限序列化的三个既定原因是：安全性、性能以及对象不适合序列化。


    你可以通过创建`ObjectOutputStream`实例并调用其`writeObject()`方法来启动序列化。你可以通过创建`ObjectInputStream`实例并调用其`readObject()`方法来启动反序列化。


    答案是错误：类字段不会自动序列化。


    `transient`保留字的目的是标记不参与默认序列化和默认反序列化的实例字段。


    当反序列化机制尝试反序列化其类已更改的对象时，会导致`readObject()`抛出`InvalidClassException`类的实例。


    反序列化机制通过以下方式检测序列化对象的类是否已更改：每个序列化对象都有一个标识符。反序列化机制将正在反序列化的对象的标识符与其类的序列化标识符（所有可序列化的类都会自动获得唯一标识符，除非它们显式指定自己的标识符）进行比较，并在检测到不匹配时抛出`InvalidClassException`。


    你可以通过向类中引入`long serialVersionUID = long integer value;`声明来添加实例字段，并避免在反序列化在添加实例字段之前序列化的对象时出现问题。`long
    integer value`必须是唯一的，称为流唯一标识符（SUID）。你可以使用JDK的`serialver`工具来协助完成此任务。


    你可以通过在该类中声明私有的`void writeObject(ObjectOutputStream)`和`void readObject(ObjectInputStream)`方法，在不使用外部化的情况下自定义默认序列化和反序列化机制。


    你可以通过在`writeObject(ObjectOutputStream)`中首先调用`ObjectOutputStream`的`defaultWriteObject()`方法，或者在`readObject(ObjectInputStream)`中首先调用`ObjectInputStream`的`defaultReadObject()`方法，来告知序列化和反序列化机制在序列化或反序列化额外数据项之前，先序列化或反序列化对象的正常状态。


    外部化与默认及自定义序列化和反序列化的不同之处在于，它提供了对序列化和反序列化任务的完全控制。


    一个类通过实现`Externalizable`接口（而非`Serializable`），并声明`void writeExternal(ObjectOutput)`和`void
    readExternal(ObjectInput in)`方法（而非`void writeObject(ObjectOutputStream)`和`void
    readObject(ObjectInputStream)`方法），来表示它支持外部化。


    答案是正确：在外部化过程中，当反序列化机制未检测到`public`无参构造函数时，它会抛出带有“no valid constructor”消息的`InvalidClassException`。


    `PrintStream`的`print()`和`println()`方法之间的区别在于，`print()`方法不会在其输出后追加行终止符，而`println()`方法会追加行终止符。


    `PrintStream`的无参`void println()`方法输出`line.separator`系统属性的值，以确保以可移植的方式终止行（例如，在Windows上是回车符后跟换行符/换行，在Unix/Linux上仅是一个换行符/换行）。


