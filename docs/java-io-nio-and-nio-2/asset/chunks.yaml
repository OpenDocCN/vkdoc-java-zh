    Listing [7-4](#A978-1-4842-1565-4_7_Chapter.html#FPar11) describes an application
    that either updates a file named `temp` or queries this file. Because file locking
    applies at the process level and not at the thread level, you need to run two
    copies of this application to demonstrate file locking for yourself. One copy
    will behave as a writer, updating the file. The other copy will behave as a reader,
    querying the file.


    The `ChannelDemo` class first declares a pair of constants for controlling the
    duration of the update and query loops, along with a constant that denotes the
    length of a record. It then allocates a byte buffer that can accommodate the entire
    16-byte record and an `int`-based view buffer for treating the byte buffer as
    a sequence of four `int` values. Finally, a `counter` variable initialized to
    `1` is declared.


    The `main()` method first determines whether the application runs as a writer
    or reader. If you specify any command-line arguments, writer is assumed. This
    method then either opens (for a reader) or creates (for a writer) `temp` as a
    random access file. If this file doesn’t exist when you run the application as
    a reader, an exception is thrown.


    After opening or creating `temp`, a file channel to this file is obtained. This
    channel is then passed to either the `update()` or `query()` method.


    Consider `update()`. This method receives the file channel argument and enters
    a fixed-length `for` loop whose duration is governed by the `MAXUPDATES` constant.
    After outputting a lock-acquisition message, it attempts to obtain an exclusive
    lock to the entire 16-byte record. If the reader process has locked that record
    via a shared lock, `lock()` blocks until the shared lock is released.


    Once the lock is obtained, the view buffer is cleared, which sets the position
    to 0 and the limit to the capacity. The buffer is ready to be completely filled.


    The `counter` variable’s current value is now accessed and saved in a variable.
    This value is multiplied by 2, 3, and 4, and the results are also saved in their
    own variables. After outputting a writing message that identifies these values,
    `update()` makes four `put()` calls on the view buffer to store the values in
    the byte buffer. The `counter` variable is incremented and the byte buffer is
    cleared to ensure that it can be completely drained. Finally, the file channel’s
    `write()` method is called to drain the buffer to the underlying `temp` file.


    The `query()` method has a similar structure to the `update()` method. However,
    it uses the file channel to read the `temp` file’s record and stores the results
    in the byte buffer. After outputting a message to display the read results, it
    verifies that the values are correct. Any deviation from what is expected causes
    the method to terminate after outputting an error message.


    Compile Listing [7-4](#A978-1-4842-1565-4_7_Chapter.html#FPar11) (`javac ChannelDemo.java`)
    and execute the following command line in one command window:


    `java ChannelDemo w`


    You should observe messages similar to the following:


    ```

    acquiring exclusive lock

    Writing: 1 2 3 4

    acquiring exclusive lock

    Writing: 2 4 6 8

    acquiring exclusive lock

    Writing: 3 6 9 12

    acquiring exclusive lock

    Writing: 4 8 12 16

    acquiring exclusive lock

    Writing: 5 10 15 20

    ```


    In a second command window, execute the following command line:


    `java ChannelDemo`


    You should observe messages similar to the following:


    ```

    acquiring shared lock

    Reading: 2500 5000 7500 10000

    acquiring shared lock

    Reading: 2501 5002 7503 10004

    acquiring shared lock

    Reading: 2502 5004 7506 10008

    acquiring shared lock

    Reading: 2503 5006 7509 10012

    acquiring shared lock

    Reading: 2504 5008 7512 10016

    ```


    If you run these applications until they finish, you should observe no error messages.
    The file locking ensures that only the writer process or the reader process can
    access `temp`’s 16-byte record. The other process is denied while these bytes
    are locked. As a result, there can be no corruption to this record’s values.


    To prove to yourself that the file locking is actually working, comment out the
    following four lines from the previous listing, recompile `ChannelDemo.java`,
    and re-run this application as a writer and as a reader:


    ```

    FileLock lock = fc.lock(0, RECLEN, true);

    FileLock lock = fc.lock(0, RECLEN, false);

    lock.release();

    lock.release();

    ```


    At some point during the execution, you should observe output similar to that
    shown here:


    ```

    acquiring shared lock

    Reading: 803 1606 2412 3216

    error

    ```


    The output is invalid—it should be `803 1606 2409 3212` but isn’t because the
    reader and writer were able to access the record at the same time.


    **Note**


    The more `ChannelDemo` reader processes that run, the slower a `ChannelDemo` writer
    process will run. Eventually, the `ChannelDemo` writer process will block during
    a lock acquisition attempt and not unblock because there will always be a shared
    lock in use.'
