  raw: '## Buffer and its Children


    Buffers are implemented by classes that derive from the abstract `java.nio.Buffer`
    class. Table [6-1](#A978-1-4842-1565-4_6_Chapter.html#Tab1) describes `Buffer`’s
    methods.


    Table 6-1.


    `Buffer` Methods


    | Method | Description |

    | --- | --- |

    | `Object array()` | Return the array that backs this buffer. This method is intended
    to allow array-backed buffers to be passed to native code more efficiently. Concrete
    subclasses override this method and provide more strongly typed return values
    via covariant return types. This method throws `java.nio.ReadOnlyBufferException`
    when this buffer is backed by an array but is read-only and throws `java.lang.UnsupportedOperationException`
    when this buffer isn’t backed by an accessible array. |

    | `int arrayOffset()` | Return the offset of the first buffer element within this
    buffer’s backing array. When this buffer is backed by an array, buffer position
    `p` corresponds to array index `p + arrayOffset()`. Invoke `hasArray()` before
    invoking this method to ensure that this buffer has an accessible backing array.
    This method throws `ReadOnlyBufferException` when this buffer is backed by an
    array but is read-only and throws `UnsupportedOperationException` when this buffer
    isn’t backed by an accessible array. |

    | `int capacity()` | Return this buffer’s capacity. |

    | `Buffer clear()` | Clear this buffer. The position is set to `0`, the limit
    is set to the capacity, and the mark is discarded. This method doesn’t erase the
    data in the buffer but is named as if it did because it will most often be used
    in situations in which that might as well be the case. |

    | `Buffer flip()` | Flip this buffer. The limit is set to the current position
    and then the position is set to `0`. When the mark is defined, it’s discarded.
    |

    | `boolean hasArray()` | Return `true` when this buffer is backed by an array
    and isn’t read-only; otherwise, return `false`. When this method returns `true`,
    `array()` and `arrayOffset()` may be invoked safely. |

    | `boolean hasRemaining()` | Return `true` when at least one element remains in
    this buffer (that is, between the current position and the limit); otherwise,
    return `false`. |

    | `boolean isDirect()` | Return `true` when this buffer is a direct byte buffer
    (discussed later in this chapter); otherwise, return `false`. |

    | `boolean isReadOnly()` | Return `true` when this buffer is read-only, otherwise,
    return `false`. |

    | `int limit()` | Return this buffer’s limit. |

    | `Buffer limit(int newLimit)` | Set this buffer’s limit to `newLimit`. When the
    position is larger than `newLimit`, the position is set to `newLimit`. When the
    mark is defined and is larger than `newLimit`, the mark is discarded. This method
    throws `java.lang.IllegalArgumentException` when `newLimit` is negative or larger
    than this buffer’s capacity; otherwise, it returns this buffer. |

    | `Buffer mark()` | Set this buffer’s mark to its position and return this buffer.
    |

    | `int position()` | Return this buffer’s position. |

    | `Buffer` `position` `(int newPosition)` | Set this buffer’s position to `newPosition`.
    When the mark is defined and is larger than `newPosition`, the mark is discarded.
    This method throws `IllegalArgumentException` when `newPosition` is negative or
    larger than this buffer’s current limit; otherwise, it returns this buffer. |

    | `int remaining()` | Return the number of elements between the current position
    and the limit. |

    | `Buffer reset()` | Reset this buffer’s position to the previously marked position.
    Invoking this method neither changes nor discards the mark’s value. This method
    throws `java.nio.InvalidMarkException` when the mark hasn’t been set; otherwise,
    it returns this buffer. |

    | `Buffer rewind()` | Rewind and then return this buffer. The position is set
    to `0` and the mark is discarded. |


    Table [6-1](#A978-1-4842-1565-4_6_Chapter.html#Tab1) shows that many of `Buffer`’s
    methods return `Buffer` references so that you can chain instance method calls
    together. For example, instead of specifying the following three lines:


    `buf.mark();`


    `buf.position(2);`


    `buf.reset();`


    you can more conveniently specify the following line:


    `buf.mark().position(2).reset();`


    Table [6-1](#A978-1-4842-1565-4_6_Chapter.html#Tab1) also shows that all buffers
    can be read but not all buffers can be written—for example, a buffer backed by
    a memory-mapped file that’s read-only. You must not write to a read-only buffer;
    otherwise, `ReadOnlyBufferException` is thrown. Call `isReadOnly()` when you’re
    unsure that a buffer is writable before attempting to write to that buffer.


    Caution


    Buffers are not thread-safe. You must employ synchronization when you want to
    access a buffer from multiple threads.


    The `java.nio` package includes several abstract classes that extend `Buffer`,
    one for each primitive type except for Boolean: `ByteBuffer`, `CharBuffer`, `DoubleBuffer`,
    `FloatBuffer`, `IntBuffer`, `LongBuffer`, and `ShortBuffer`. Furthermore, this
    package includes `MappedByteBuffer` as an abstract `ByteBuffer` subclass.


    Note


    Operating systems perform byte-oriented I/O and you use `ByteBuffer` to create
    byte-oriented buffers that store the bytes to write to a destination or that are
    read from a source. The other primitive-type buffer classes let you create multibyte
    view buffers (discussed later) so that you can conceptually perform I/O in terms
    of characters, double precision floating-point values, 32-bit integers, and so
    on. However, the I/O operation is really being carried out as a flow of bytes.


    Listing [6-1](#A978-1-4842-1565-4_6_Chapter.html#FPar3) demonstrates the `Buffer`
    class in terms of `ByteBuffer`, capacity, limit, position, and remaining elements.


    Listing 6-1\. Demonstrating a Byte-Oriented Buffer


    `import java.nio.Buffer;`


    `import java.nio.ByteBuffer;`


    `public class BufferDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `Buffer buffer = ByteBuffer.allocate(7);`


    `System.out.println("Capacity: " + buffer.capacity());`


    `System.out.println("Limit: " + buffer.limit());`


    `System.out.println("Position: " + buffer.position());`


    `System.out.println("Remaining: " + buffer.remaining());`


    `System.out.println("Changing buffer limit to 5");`


    `buffer.limit(5);`


    `System.out.println("Limit: " + buffer.limit());`


    `System.out.println("Position: " + buffer.position());`


    `System.out.println("Remaining: " + buffer.remaining());`


    `System.out.println("Changing buffer position to 3");`


    `buffer.position(3);`


    `System.out.println("Position: " + buffer.position());`


    `System.out.println("Remaining: " + buffer.remaining());`


    `System.out.println(buffer);`


    `}`


    `}`


    Listing [6-1](#A978-1-4842-1565-4_6_Chapter.html#FPar3)’s `main()` method first
    needs to obtain a buffer. It cannot instantiate the `Buffer` class because that
    class is abstract. Instead, it uses the `ByteBuffer` class and its `allocate()`
    class method to allocate the seven-byte buffer shown in Figure [6-1](#A978-1-4842-1565-4_6_Chapter.html#Fig1).
    `main()` then calls assorted `Buffer` methods to demonstrate capacity, limit,
    position, and remaining elements.


    Compile Listing [6-1](#A978-1-4842-1565-4_6_Chapter.html#FPar3) as follows:


    `javac BufferDemo.java`


    Run the resulting application as follows:


    `java BufferDemo`


    You should observe the following output:


    `Capacity: 7`


    `Limit: 7`


    `Position: 0`


    `Remaining: 7`


    `Changing buffer limit to 5`


    `Limit: 5`


    `Position: 0`


    `Remaining: 5`


    `Changing buffer position to 3`


    `Position: 3`


    `Remaining: 2`


    `java.nio.HeapByteBuffer[pos=3 lim=5 cap=7]`


    The final output line reveals that the `ByteBuffer` instance assigned to `buffer`
    is actually an instance of the package-private `java.nio.HeapByteBuffer` class.'
