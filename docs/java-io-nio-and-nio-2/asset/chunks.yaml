    ### AsynchronousServerSocketChannel


    要获取一个 `AsynchronousServerSocketChannel` 对象，可以调用该类的 [`AsynchronousServerSocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#class%20in%20java.nio.channels)
    `open()` 类方法，如下所示：


    `AsynchronousServerSocketChannel ch;`


    `ch = AsynchronousServerSocketChannel.open();`


    根据 `AsynchronousServerSocketChannel` 的文档，该方法返回一个绑定到默认组的异步服务器套接字通道。另一种 [`AsynchronousServerSocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#class%20in%20java.nio.channels)
    `open(` [`AsynchronousChannelGroup`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousChannelGroup.html#class%20in%20java.nio.channels)
    `group)` 方法则返回一个绑定到指定 `group` 的异步服务器套接字通道。我将在本章后面讨论异步通道组。


    你可以通过调用 `<T> AsynchronousServerSocketChannel setOption(SocketOption<T> name, T
    value)` 泛型方法来配置异步服务器套接字通道。唯一支持的已记录选项是 `SO_RCVBUF` 和 `SO_REUSEADDR`。


    一个新建且可能已配置的异步服务器套接字通道是打开的，但尚未绑定到本地地址。它可以通过调用 `AsynchronousServerSocketChannel`
    的 [`bind`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#bind-java.net.SocketAddress-int-)
    `()` 方法之一绑定到本地地址，并配置为监听连接。一旦绑定，就可以使用其 [`accept`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#accept-A-java.nio.channels.CompletionHandler-)
    `()` 方法之一（一个方法返回 `Future`，另一个方法接受 `CompletionHandler` 参数）来启动对通道套接字连接的接受。尝试在未绑定的通道上调用
    `accept()` 会导致 `java.nio.channels.` [`NotYetBoundException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/NotYetBoundException.html#class%20in%20java.nio.channels)
    异常。


    注意


    异步服务器套接字通道可安全地供多个并发线程使用，尽管在任何时候最多只能有一个接受操作处于未完成状态。如果某个线程在前一个接受操作结束前启动了另一个接受操作，则会抛出
    `java.nio.channels.` [`AcceptPendingException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AcceptPendingException.html#class%20in%20java.nio.channels)
    异常。


    为了演示 `AsynchronousServerSocketChannel`，我创建了一个由 `Server`、`Attachment`、`ConnectionHandler`
    和 `ReadWriteHandler` 类组成的 `Server` 应用程序。清单 13-3 展示了 `Server` 的源代码。


    清单 13-3\. 启动一个异步处理连接和读写的服务器


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.channels.AsynchronousServerSocketChannel;`


    `public class Server`


    `{`


    `private final static int PORT = 9090;`


    `private final static String HOST = "localhost";`


    `public static void main(String[] args)`


    `{`


    `AsynchronousServerSocketChannel channelServer;`


    `try`


    `{`


    `channelServer = AsynchronousServerSocketChannel.open();`


    `channelServer.bind(new InetSocketAddress(HOST, PORT));`


    `System.out.printf("服务器正在监听 %s%n",`


    `channelServer.getLocalAddress());`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("无法打开或绑定服务器套接字通道");`


    `return;`


    `}`


    `Attachment att = new Attachment();`


    `att.channelServer = channelServer;`


    `channelServer.accept(att, new ConnectionHandler());`


    `try`


    `{`


    `Thread.currentThread().join();`


    `}`


    `catch (InterruptedException ie)`


    `{`


    `System.out.println("服务器终止");`


    `}`


    `}`


    `}`

