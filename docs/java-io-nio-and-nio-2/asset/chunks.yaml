    `ReadWriteHandler` is a `CompletionHandler` that responds to `read()` or `write()`
    completions. Its `completed()` method is called to respond to a successful `read()`
    or `write()`, which includes issuing a counterpart `write()` or `read()`. Its
    `failed()` method is called when the client breaks off its connection with the
    server.


    The `completed()` method’s first task is to determine if a `read()` has been performed
    and respond accordingly. If so, it extracts the buffer’s bytes into an array,
    which is converted to a string that is subsequently output.


    Next, `completed()` gives the user the opportunity to enter a message that will
    be sent to the server. If the user specifies `end`, the client thread is interrupted
    and the client terminates. Any other message’s bytes are extracted from the string
    and stored in the buffer, which is subsequently written to the socket channel.


    If a `read()` call had not occurred, `completed()` would execute the `else` part
    of the `if`-`else` statement. After setting `isReadMode` to `true`, it empties
    the buffer and calls `read()`.


    To put this into perspective, here is what happens when the client starts running.


    `Client`’s `main()` method sets `isReadMode` to `false`, stores a `Hello` message
    in the buffer, and `write()`s the message to the channel, which results in the
    message being sent to and displayed by the server.   The server’s read/write handler
    `write()`s this message back to the client.   Because `isReadMode` is `false`,
    `Client`’s read/write handler’s `completed()` method executes the `else` part
    of the `if`-`else` statement, setting `isReadMode` to `true` and calling `read()`,
    which stores in the buffer the `Hello` bytes written by the server.   `Client`’s
    read/write handler’s `completed()` method is called. It notes that `isReadMode`
    is `true`, extracts the bytes from the buffer, and outputs the equivalent string
    as part of a `Server responded` message.   The client will now obtain a message
    from the user and act accordingly.


