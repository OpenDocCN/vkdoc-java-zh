  raw: 'The `force(boolean)` method ensures that all changes made to a file residing
    in the local file system and since this method was previously invoked are written
    to the disk. This capability is vital for critical tasks such as transaction processing,
    where you must maintain data integrity and ensure reliable recovery. However,
    this guarantee doesn’t apply to remote file systems.


    Passing `true` to `force(boolean)` results in metadata (last modification time,
    access permissions, and so on) also being synchronized to the disk. Because metadata
    isn’t usually critical to file recovery, you can often pass `false` and gain a
    small performance increase because an extra I/O operation isn’t required to output
    the metadata.


    `FileChannel` objects support the concept of a current file position, which determines
    the location where the next data item will be read from or written to. The `position()`
    method returns the current position and the `position(long newPosition)` method
    sets the current position to `newPosition`. The value passed to `newPosition`
    must be non-negative or `IllegalArgumentException` will be thrown.


    There are two forms of the `read()` and `write()` methods. The relative forms
    don’t take `position` arguments and ensure that the current file position is updated
    after a call to either method. The absolute forms of these methods take a `position`
    argument and don’t update the position. Absolute reads and writes can be more
    efficient because the channel’s state doesn’t need to be updated.


    If you attempt to perform an absolute read past the end of a file, which `size()`
    returns, `-1` is returned to signify end of file. Attempting to perform an absolute
    write past the end of a file causes the file to grow to accommodate the bytes
    being written. The values of the bytes located between the previous end of file
    and the first newly written byte are file system-specific and may constitute a
    hole.


    A hole occurs in a file when the amount of disk space allocated for the file is
    smaller than the file’s size. Modern file systems typically allocate space only
    for data that’s written to the file. When data is written to noncontiguous areas,
    holes can appear. When the file is read, holes typically appear to be zero-filled
    but don’t take up disk space.


    The `truncate(long size)` method is useful for reducing a file’s size. This method
    truncates all data beyond the specified `size`. When the file’s size is greater
    than the specified `size`, all bytes past the specified `size` are discarded.
    When the specified `size` is greater than or equal to the current size, the file
    isn’t changed.


    Listing [7-3](#A978-1-4842-1565-4_7_Chapter.html#FPar10) demonstrates various
    methods from Table [7-1](#A978-1-4842-1565-4_7_Chapter.html#Tab1).


    Listing 7-3\. Demonstrating a File Channel


    `import java.io.IOException;`


    `import java.io.RandomAccessFile;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.FileChannel;`


    `public class ChannelDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `RandomAccessFile raf = new RandomAccessFile("temp", "rw");`


    `FileChannel fc = raf.getChannel();`


    `long pos;`


    `System.out.println("Position = " + (pos = fc.position()));`


    `System.out.println("size: " + fc.size());`


    `String msg = "This is a test message.";`


    `ByteBuffer buffer = ByteBuffer.allocateDirect(msg.length() * 2);`


    `buffer.asCharBuffer().put(msg);`


    `fc.write(buffer);`


    `fc.force(true);`


    `System.out.println("position: " + fc.position());`


    `System.out.println("size: " + fc.size());`


    `buffer.clear();`


    `fc.position(pos);`


    `fc.read(buffer);`


    `buffer.flip();`


    `while (buffer.hasRemaining())`


    `System.out.print(buffer.getChar());`


    `}`


    `}`


    Listing [7-3](#A978-1-4842-1565-4_7_Chapter.html#FPar10)’s `main()` method first
    creates a randomly-accessible file named `temp` for writing and reading. It then
    obtains a file channel for communicating with this file and reports the file channel’s
    current position and the file’s size, which are both `0` for a newly created file.


    `main()` next allocates a direct byte buffer for storing a message to be written
    to the file, treats this buffer as a character buffer, and calls the character
    buffer’s `put()` method to store the message in the buffer, which is then output
    to the file.


    `main()` now calls `force(true)` to recommend to the underlying operating system
    that the data be committed to the underlying storage device.


    After reporting the new current position and file size, `main()` clears the buffer,
    resets the file position to where it was before the message was written, and reads
    the previously written content back into the buffer. It then flips the buffer
    and outputs its contents.


    Compile Listing [7-3](#A978-1-4842-1565-4_7_Chapter.html#FPar10) (`javac ChannelDemo.java`)
    and run this application (`java ChannelDemo`). You should observe the following
    output:


    `Position = 0`


    `size: 0`


    `position: 46`


    `size: 46`


    `This is a test message.`


    On subsequent runs, the presence of a file named `temp` will change the output
    to the following:


    `Position = 0`


    `size: 46`


    `position: 46`


    `size: 46`


    `This is a test message.`'
