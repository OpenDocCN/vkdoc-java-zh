    The `completed()` method’s first task is to obtain and output the client’s socket
    address for identification. I specified `channelClient.getRemoteAddress()` instead
    of `channelClient.getLocalAddress()` to `r`eturn the client’s socket address because
    the socket corresponding to `channelClient` was created on the server side and
    it communicates with the client-side socket. Calling `getLocalAddress()` on `channelClient`
    returns the server-side socket address. Calling `getRemoteAddress()` on `channelClient`
    returns the client-side socket address.


    Next, `completed()` calls `accept()` on the server socket channel with the passed
    `Attachment` object and a reference to the current completion handler as arguments.
    This call allows the server to respond to the next incoming connection.


    The `accept()` method is called on the server socket channel referenced from the
    `Attachment` object passed to `completed()`. This same object is passed as the
    first argument to `accept()`. None of the other fields in the `Attachment` object
    have been initialized because they aren’t required. This `Attachment` object is
    only needed to identify the server socket channel.


    After calling `accept()`, a second `Attachment` object is created and initialized
    in preparation for reading from the client. Also, a `ReadWriteHandler` object
    is created to respond to the read operation. The new `Attachment` object’s byte
    buffer, the new `Attachment` object, and the `ReadWriteHandler` object are passed
    as arguments to the client socket channel’s `read()` method.


    Listing [13-6](#A978-1-4842-1565-4_13_Chapter.html#FPar7) presents `ReadWriteHandler`’s
    source code.


    Listing 13-6\. Managing Reads and Writes with the Client


    `import java.io.IOException;`


    `import java.nio.channels.CompletionHandler;`


    `import java.nio.charset.Charset;`


    `public class ReadWriteHandler`


    `implements CompletionHandler<Integer, Attachment>`


    `{`


    `private final static Charset CSUTF8 = Charset.forName("UTF-8");`


    `@Override`


    `public void completed(Integer result, Attachment att)`


    `{`


    `if (result == -1)`


    `{`


    `try`


    `{`


    `att.channelClient.close();`


    `System.out.printf("Stopped listening to client %s%n",`


    `att.clientAddr);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `return;`


    `}`


    `if (att.isReadMode)`


    `{`


    `att.buffer.flip();`


    `int limit = att.buffer.limit();`


    `byte bytes[] = new byte[limit];`


    `att.buffer.get(bytes, 0, limit);`


    `System.out.printf("Client at %s sends message: %s%n",`


    `att.clientAddr,`


    `new String(bytes, CSUTF8));`


    `att.isReadMode = false;`


    `att.buffer.rewind();`


    `att.channelClient.write(att.buffer, att, this);`


    `}`


    `else`


    `{`


    `att.isReadMode = true;`


    `att.buffer.clear();`


    `att.channelClient.read(att.buffer, att, this);`


    `}`


    `}`


    `@Override`


    `public void failed(Throwable t, Attachment att)`


    `{`


    `System.out.println("Connection with client broken");`


    `}`


    `}`


    `ReadWriteHandler` is a `CompletionHandler` that responds to `read()` or `write()`
    method completions. Its `completed()` method is called to respond to a successful
    `read()` or `write()`, which includes issuing a counterpart `write()` or `read()`.
    Its `failed()` method is called when the client breaks off its connection with
    the server.


    The `completed()` method’s first task is to respond to a `read()` call that returns
    `-1`, which indicates that no bytes could be read because end-of-stream has been
    reached. (The client may have terminated before writing data.) It closes the client
    socket channel, outputs a message to indicate that the server is no longer listening
    to the client, and returns.


    Assuming that the read/write handler is operating in read mode (`true`), the buffer
    contents are flipped and extracted to a `bytes` array, which is subsequently converted
    to a string that is output.


    The read/write handler is then configured for write mode by assigning `false`
    to `isReadMode`, the buffer is rewound in preparation for being written, and the
    buffer along with the attachment and current completion handler are passed to
    the client socket channel’s `write()` method so that the buffer contents can be
    sent to the client.


    After a successful write operation, the read/write handler’s `completed()` method
    is called. Because `isReadMode` is no longer `true`, the `else` part of the `if`-`else`
    statement executes. It toggles `isReadMode` to `true`, clears the buffer, and
    initiates a read operation to read from the client. This pattern continues until
    the client presents nothing more to read and the completion handler can terminate.
    (This latter scenario will probably never happen.)


    Compile Listings [13-3](#A978-1-4842-1565-4_13_Chapter.html#FPar7) through [13-6](#A978-1-4842-1565-4_13_Chapter.html#FPar7)
    as follows:


    `javac Server.java`


    Run the resulting application as follows:


    `java Server`


    You should observe the following initial output:


    `Server listening at /127.0.0.1:9090`'
