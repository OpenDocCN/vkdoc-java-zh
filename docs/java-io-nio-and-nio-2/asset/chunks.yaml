    #### 读取文件


    `Files` 类通过声明以下方法，支持读取常规文件内容，以便将所有字节或所有文本行读入内存：


    *   `byte[] readAllBytes(Path path)`

    *   `List<String> readAllLines(Path path)`

    *   `List<String> readAllLines(Path path, Charset cs)`


    `readAllBytes(Path path)` 方法将 `path` 所标识文件的内容读入一个字节数组，并返回该数组。它确保在读取完所有字节后关闭文件。当从文件读取时发生
    I/O 错误，会抛出 `IOException`；当无法分配所需大小的数组时（可能文件长度超过 2 GB），会抛出 `java.lang.OutOfMemoryError`。`readAllBytes()`
    适用于将所有字节读入字节数组的简单场景，不适用于读取大文件。


    `readAllLines(Path path)` 的行为等同于指定了 `Files.readAllLines(path, java.nio.charset.StandardCharsets.UTF_8);`。


    `readAllLines(Path path, Charset cs)` 方法将 `path` 所标识文件中的所有行读入一个字符串列表，并返回该列表。文件中的字节使用字符集
    `cs` 解码为字符。它目前将回车符（`\u000D`）、换行符（`\u000A`）或回车符后跟换行符识别为行终止符。此外，它确保在读取完所有行后关闭文件。当从文件读取时发生
    I/O 错误，或读取到格式错误或无法映射的字节序列时，会抛出 `IOException`。`readAllLines()` 适用于在单次操作中读取所有行的简单场景，不适用于读取大文件。


    清单 12-24 描述了一个使用 `readAllLines(Path path)` 从文本文件读取所有行的应用程序。随后输出这些行。


    清单 12-24\. 将文本文件转储到标准输出流


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `import java.util.List;`


    `public class DumpText`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java DumpText textfilepath");`


    `return;`


    `}`


    `List<String> lines = Files.readAllLines(Paths.get(args[0]));`


    `for (String line: lines)`


    `System.out.println(line);`


    `}`


    `}`


    按如下方式编译清单 12-24：


    `javac DumpText.java`


    按如下方式运行生成的应用程序：


    `java DumpText DumpText.java`


    你应该会在标准输出流上看到清单 12-24 的副本。如果你尝试转储一个二进制文件，你很可能会发现一条 `java.nio.charset.MalformedInputException`
    消息。


    前述方法仅限于将较小的文件读入内存。对于非常大的文件，`Files` 提供了以下方法：


    *   `BufferedReader newBufferedReader(Path path)`

    *   `BufferedReader newBufferedReader(Path path, Charset cs)`

    *   `InputStream newInputStream(Path path, OpenOption... options)`


    `newBufferedReader(Path path)` 的行为等同于指定了 `Files.newBufferedReader(path, StandardCharsets.UTF_8);`。


    `newBufferedReader(Path path, Charset cs)` 方法打开 `path` 所标识的文件，并返回一个 `java.io.BufferedReader`（使用默认缓冲区大小），可用于高效地从文件中读取文本。文件中的字节使用字符集
    `cs` 解码为字符。读取从文件开头开始。当发生 I/O 错误时，会抛出 `IOException`。当 `BufferedReader` 的某个 `read()`
    方法读取到格式错误或无法映射的字节序列时，也会抛出此异常。


    `newInputStream(Path path, OpenOption... options)` 方法打开 `path` 所标识的文件，返回一个 `java.io.InputStream`
    用于读取文件。该流不会被缓冲，并且不需要支持 `mark()` 或 `reset()` 方法。该流对于多个并发线程的访问是安全的。读取从文件开头开始。


    可以传递一个 `java.nio.file.OpenOption` 的可变参数列表。这些选项用于配置如何打开或创建文件。`java.nio.file.StandardOpenOption`
    枚举实现了此接口，并提供了以下常量：


    *   `APPEND`：如果文件是为 `WRITE` 访问而打开的，则将字节写入文件末尾，而不是开头。

    *   `CREATE`：当文件不存在时创建一个新文件。

    *   `CREATE_NEW`：创建一个新文件，如果文件已存在则失败。

    *   `DELETE_ON_CLOSE`：尽最大努力在文件关闭时删除该文件。

    *   `DSYNC`：要求对文件内容的每次更新都同步写入底层存储设备。

    *   `READ`：以读取访问权限打开文件。

    *   `SPARSE`：打开一个稀疏文件（ [`https://en.wikipedia.org/wiki/Sparse_file`](https://en.wikipedia.org/wiki/Sparse_file)
    ）。当与 `CREATE_NEW` 选项一起使用时，`SPARSE` 提示新文件将是稀疏的。如果文件系统不支持创建稀疏文件，则忽略此选项。

    *   `SYNC`：要求对文件内容或元数据的每次更新都同步写入底层存储设备。

    *   `TRUNCATE_EXISTING`：将打开用于 [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    访问的现有文件的长度截断为 0。

    *   `WRITE`：以写入访问权限打开文件。


    并非所有这些常量都适用于 `newInputStream()`；其中一些适用于 `newOutputStream()` 方法，我将在本章后面讨论。


    当没有提供选项时，此方法使用 `READ` 选项打开文件。


    当发生 I/O 错误时，会抛出 `IOException`。当指定了无效的选项组合时，会抛出 `IllegalArgumentException`。当指定了不受支持的选项（例如
    `WRITE`）时，会抛出 `UnsupportedOperationException`。


    清单 12-25 描述了一个演示 `newBufferedReader(Path path)` 的应用程序。


    清单 12-25\. 将文本文件转储到标准输出流（重访）


