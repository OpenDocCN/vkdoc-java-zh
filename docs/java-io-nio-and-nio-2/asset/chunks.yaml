- fmt: "# Using RandomAccessFile\n\n`RandomAccessFile` is useful for creating a flat\
    \ file database, a single file organized into records and fields. A record stores\
    \ a single entry (such as a part in a parts database) and a field stores a single\
    \ attribute of the entry (such as a part number).\n\n> **Note:** The term *field*\
    \ is also used to refer to a variable declared within a class. To avoid confusion\
    \ with this overloaded terminology, think of a field variable as being analogous\
    \ to a record's field attribute.\n\nA flat file database typically organizes its\
    \ content into a sequence of fixed-length records. Each record is further organized\
    \ into one or more fixed-length fields. Figure 3-1 illustrates this concept in\
    \ the context of a parts database.\n\n![A978-1-4842-1565-4_3_Fig1_HTML.jpg](A978-1-4842-1565-4_3_Fig1_HTML.jpg)\n\
    \n**Figure 3-1.** A flat file database of automotive parts is divided into records\
    \ and fields\n\nAccording to Figure 3-1, each field has a name (`partnum`, `desc`,\
    \ `qty`, and `ucost`). Also, each record is assigned a number starting at 0. This\
    \ example consists of five records, of which only three are shown for brevity.\n\
    \nTo show you how to implement a flat file database in terms of `RandomAccessFile`,\
    \ I've created a simple `PartsDB` class to model Figure 3-1. Check out Listing\
    \ 3-1.\n\n**Listing 3-1.** Implementing the Parts Flat File Database\n\n```java\n\
    import java.io.IOException;\nimport java.io.RandomAccessFile;\n\npublic class\
    \ PartsDB\n{\n   public final static int PNUMLEN = 20;\n   public final static\
    \ int DESCLEN = 30;\n   public final static int QUANLEN = 4;\n   public final\
    \ static int COSTLEN = 4;\n   private final static int RECLEN = 2 * PNUMLEN +\
    \ 2 * DESCLEN + QUANLEN +\n                                    COSTLEN;\n   private\
    \ RandomAccessFile raf;\n\n   public PartsDB(String path) throws IOException\n\
