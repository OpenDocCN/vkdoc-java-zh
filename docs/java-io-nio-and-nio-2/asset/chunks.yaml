    ### 分散/聚集 I/O


    通道提供了在多个缓冲区上执行单个 I/O 操作的能力。这种能力被称为分散/聚集 I/O（也称为向量 I/O）。


    在写操作中，多个缓冲区的内容会按顺序被聚集（排空），然后通过通道发送到目的地。这些缓冲区不需要具有相同的容量。在读操作中，通道的内容会按顺序被分散（填充）到多个缓冲区中；每个缓冲区都会被填充到其上限，直到通道为空或所有缓冲区空间被用完。


    注意


    现代操作系统提供了支持向量 I/O 的 API，以消除（或至少减少）系统调用或缓冲区复制，从而提高性能。例如，Win32/Win64 API 为此提供了 `ReadFileScatter()`
    和 `WriteFileGather()` 函数。


    Java 提供了 `java.nio.channels.ScatteringByteChannel` 接口来支持分散操作，以及 `java.nio.channels.GatheringByteChannel`
    接口来支持聚集操作。


    `ScatteringByteChannel` 提供了以下方法：


    *   `long read(ByteBuffer[] buffers, int offset, int length)`

    *   `long read(ByteBuffer[] buffers)`


    `GatheringByteChannel` 提供了以下方法：


    *   `long write(ByteBuffer[] buffers, int offset, int length)`

    *   `long write(ByteBuffer[] buffers)`


    第一个 `read()` 方法和第一个 `write()` 方法允许你通过向 `offset` 传递一个从零开始的偏移量来指定要读取/写入的第一个缓冲区，并通过向
    `length` 传递一个值来指定要读取/写入的缓冲区数量。第二个 `read()` 方法和第二个 `write()` 方法会按顺序读取和写入所有缓冲区。


    清单 7-2 演示了 `read(ByteBuffer[] buffers)` 和 `write(ByteBuffer[] buffers)`。


    清单 7-2. 演示分散/聚集


    `import java.io.FileInputStream;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.Channels;`


    `import java.nio.channels.GatheringByteChannel;`


    `import java.nio.channels.ReadableByteChannel;`


    `import java.nio.channels.ScatteringByteChannel;`


    `public class ChannelDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `ScatteringByteChannel src;`


    `FileInputStream fis = new FileInputStream("x.dat");`


    `src = (ScatteringByteChannel) Channels.newChannel(fis);`


    `ByteBuffer buffer1 = ByteBuffer.allocateDirect(5);`


    `ByteBuffer buffer2 = ByteBuffer.allocateDirect(3);`


    `ByteBuffer[] buffers = { buffer1, buffer2 };`


    `src.read(buffers);`


    `buffer1.flip();`


    `while (buffer1.hasRemaining())`


    `System.out.println(buffer1.get());`


    `System.out.println();`


    `buffer2.flip();`


    `while (buffer2.hasRemaining())`


    `System.out.println(buffer2.get());`


    `buffer1.rewind();`


    `buffer2.rewind();`


    `GatheringByteChannel dest;`


    `FileOutputStream fos = new FileOutputStream("y.dat");`


    `dest = (GatheringByteChannel) Channels.newChannel(fos);`


    `buffers[0] = buffer2;`


    `buffers[1] = buffer1;`


    `dest.write(buffers);`


    `}`


    `}`


    清单 7-2 的 `main()` 方法首先通过实例化 `java.io.FileInputStream` 并将此实例传递给 `Channels` 类的 `ReadableByteChannel
    newChannel(InputStream inputStream)` 方法来获取一个分散字节通道。返回的 `ReadableByteChannel` 实例被转换为
    `ScatteringByteChannel`，因为该实例实际上是一个实现了 `ScatteringByteChannel` 的文件通道（稍后讨论）。


    接下来，`main()` 创建了一对直接字节缓冲区；第一个缓冲区容量为 5 字节，第二个缓冲区容量为 3 字节。这些缓冲区随后被存储在一个数组中，并将该数组传递给
    `read(ByteBuffer[])` 来填充它们。


    填充缓冲区后，`main()` 翻转它们，以便将其内容输出到标准输出。输出这些内容后，缓冲区被倒回，准备通过聚集操作进行排空。


    现在，`main()` 通过实例化 `java.io.FileOutputStream` 并将此实例传递给 `Channels` 类的 `WritableByteChannel`
    `newChannel(OutputStream outputStream)` 方法来获取一个聚集字节通道。返回的 `WritableByteChannel`
    实例被转换为 `GatheringByteChannel`，因为该实例实际上是一个实现了 `GatheringByteChannel` 的文件通道（稍后讨论）。


    最后，`main()` 将这些缓冲区以与原始分配顺序相反的顺序分配给 `buffers` 数组，然后将该数组传递给 `write(ByteBuffer[])`
    来排空它们。


    创建一个名为 `x.dat` 的文件，并在该文件中存储以下文本：


    `12345abcdefg`


    现在编译清单 7-2（`javac ChannelDemo.java`）并运行此应用程序（`java ChannelDemo`）。你应该会看到前八个字符的以下
    Unicode 值：


    `49`


    `50`


    `51`


    `52`


    `53`


    `97`


    `98`


    `99`


    此外，你应该会看到一个新创建的 `y.dat` 文件，其内容如下：


    `abc12345`


    ### 文件通道


    我之前提到过，`RandomAccessFile` 声明了一个 `FileChannel` `getChannel()` 方法，用于返回一个文件通道实例，该实例描述了一个到文件的打开连接。事实证明，`FileInputStream`
    和 `FileOutputStream` 也提供了相同的方法。相比之下，`java.io.FileReader` 和 `java.io.FileWriter`
    不提供获取文件通道的方式。


    警告


    从 `FileInputStream` 的 `getChannel()` 方法返回的文件通道是只读的，而从 `FileOutputStream` 的 `getChannel()`
    方法返回的文件通道是只写的。尝试写入只读文件通道或从只写文件通道读取将导致异常。


    抽象的 `java.nio.channels.FileChannel` 类描述了一个文件通道。由于此类实现了 `InterruptibleChannel`
    接口，文件通道是可中断的。由于此类实现了 `ByteChannel`、`GatheringByteChannel` 和 `ScatteringByteChannel`
    接口，你可以对底层文件进行写入、读取以及执行分散/聚集 I/O 操作。然而，还不止这些。


    注意


    与线程不安全的缓冲区不同，文件通道是线程安全的。


    文件通道维护一个文件中的当前位置，`FileChannel` 允许你获取和更改该位置。它还允许你请求将缓存数据强制写入磁盘、读取/写入文件内容、获取通道底层文件的大小、截断文件、尝试锁定整个文件或仅锁定文件的一部分、执行内存映射文件
    I/O，以及以可能被操作系统优化的方式直接将数据传输到另一个通道。


    表 7-1 描述了 `FileChannel` 的一些方法。


    表 7-1.


    `FileChannel` 方法

    '
- fmt: '| Method | Description |

    | --- | --- |

    | `void force(boolean metadata)` | Request that all updates to this file channel
    be committed to the storage device. When this method returns, all modifications
    made to the file underlying this channel have been committed when the file resides
    on a local storage device. However, when the file isn’t hosted locally (it’s on
    a networked file system, for example), applications cannot be certain that the
    modifications have been committed. (No assurances are given that changes made
    to the file using methods defined elsewhere will be committed. For example, changes
    made via a mapped byte buffer may not be committed.) The `metadata` value indicates
    whether the update should include the file’s metadata (such as last modification
    time and last access time), when `true` is passed, or not include the file’s metadata,
    when `false` is passed. Passing `true` may invoke an underlying write to the operating
    system (if the operating system is maintaining metadata, such as last access time),
    even when the channel is opened as a read-only channel. This method throws `ClosedChannelException`
    when the channel is already closed and throws `IOException` when any other I/O
    error occurs. |

    | `long position()` | Return the current zero-based file position maintained by
    this file channel. This method throws `ClosedChannelException` when the file channel
    is closed and `IOException` when another I/O error occurs. |

    | `FileChannel position(long newPosition)` | Set this file channel’s current file
    position to `newPosition`. The argument is the number of bytes counted from the
    start of the file. The position cannot be set to a negative value. However, it
    can be set beyond the current file size. If it’s set beyond the current file size,
    attempts to read will return end of file. Write operations will succeed, but they
    will fill the bytes between the current end of file and the new position with
    the required number of (unspecified) byte values. This method throws `java.lang.IllegalArgumentException`
    when `offset` is negative, `ClosedChannelException` when the file channel is closed,
    and `IOException` when another I/O error occurs. |

    | `int read(ByteBuffer buffer)` | Read bytes from this file channel into the given
    buffer. The maximum number of bytes that will be read is the remaining number
    of bytes in the buffer when the method is invoked. The bytes will be copied into
    the buffer starting at the buffer’s current position. The call may block when
    other threads are also attempting to read from this channel. Upon completion,
    the buffer’s position is set to the end of the bytes that have been read. The
    buffer’s limit isn’t changed. This method returns the number of bytes actually
    read and throws the same exceptions as previously discussed regarding `ReadableByteChannel`.
    |

    | `int read(ByteBuffer dst, long position)` | Equivalent to the previous method
    except that bytes are read starting at the specified file `position`. `IllegalArgumentException`
    is thrown when `position` is negative. |

    | `long size()` | Return the size (in bytes) of the file underlying this file
    channel. This method throws `ClosedChannelException` when the file channel is
    closed and `IOException` when another I/O error occurs. |

    | `FileChannel truncate(long size)` | Truncate the file underlying this file channel
    to `size`. Any bytes beyond the given `size` are removed from the file. When there
    are no bytes beyond the given `size`, the file contents are unmodified. When the
    current file position is greater than the given `size`, it’s set to `size`. |

    | `int write(ByteBuffer buffer)` | Write a sequence of bytes to this file channel
    from the given `buffer`. Bytes are written starting at the channel’s current file
    position unless the channel is in append mode, in which case the position is first
    advanced to the end of the file. The file is grown (when necessary) to accommodate
    the written bytes, and then the file position is updated with the number of bytes
    actually written. Otherwise this method behaves exactly as specified by the `WritableByteChannel`
    interface. This method returns the number of bytes actually written and throws
    the same exceptions as previously discussed regarding `WritableByteChannel`. |

    | `int write(ByteBuffer src, long position)` | Equivalent to the previous method
    except that bytes are written starting at the specified file `position`. `IllegalArgumentException`
    is thrown when `position` is negative. |'
