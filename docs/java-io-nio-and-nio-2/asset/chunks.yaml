    Listing [B-4](#A978-1-4842-1565-4_16_Chapter.html#FPar16) is similar to Listing
    [B-3](#A978-1-4842-1565-4_16_Chapter.html#FPar14), but there’s one big difference.
    I use the `DatagramPacket(byte[] buf, int length, InetAddress address, int port)`
    constructor to specify the server’s destination, which happens to be port 10000
    on the local host, in the datagram packet. The `send()` method call routes the
    packet to this destination.


