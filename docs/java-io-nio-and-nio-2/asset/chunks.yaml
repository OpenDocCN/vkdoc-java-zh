    Path: %s%n\", path);\nSystem.out.println(path1.relativize(path));\n}\n}\ncatch\
    \ (IllegalArgumentException iae)\n{\niae.printStackTrace();\n}\nSystem.out.println();\n\
    \npath1 = Paths.get(\"reports\", \"2015\");\nSystem.out.println(path1);\nSystem.out.println(path1.resolve(\"\
    apr\"));\nSystem.out.println();\n\nPath path2 = Paths.get(\"reports\", \"2015\"\
    , \"jan\");\nSystem.out.println(path2);\nSystem.out.println(path2.getParent());\n\
    System.out.println(path2.resolveSibling(Paths.get(\"mar\")));\nSystem.out.println(path2.resolve(Paths.get(\"\
    mar\")));\n}\n}\n```\n\nCompile Listing [12-5](#A978-1-4842-1565-4_12_Chapter.html#FPar10)\
    \ (`javac PathDemo.java`) and run the resulting application (`java PathDemo`).\
    \ I observe the following output:\n\n```\nreports\\.\\2015\\jan\nreports\\2015\\\
    jan\nreports\\jan\n\nreports\\2015\\jan\n..\\..\\2016\\mar\nRoot: C:\\\nPath:\
    \ C:\\reports\\2016\\mar\njava.lang.IllegalArgumentException: ’other’ is different\
    \ type of Path\nat sun.nio.fs.WindowsPath.relativize(WindowsPath.java:388)\nat\
    \ sun.nio.fs.WindowsPath.relativize(WindowsPath.java:44)\nat PathDemo.main(PathDemo.java:29)\n\
    \nreports\\2015\nreports\\2015\\apr\n\nreports\\2015\\jan\nreports\\2015\nreports\\\
    2015\\mar\nreports\\2015\\jan\\mar\n```\n\nThe output reveals `IllegalArgumentException`,\
    \ which is thrown from `relativize()` when it cannot relativize its `Path` argument\
    \ against the current `Path`. It cannot do so when one of the `Path`s has a root\
    \ element.\n\nThe output also reveals the difference between `resolveSibling()`\
    \ and `resolve()`. `resolveSibling()` resolves `mar` against `reports\\2015` (the\
    \ parent of `reports\\2015\\jan`); `resolve()` resolves `mar` against `reports\\\
    2015\\jan`."
