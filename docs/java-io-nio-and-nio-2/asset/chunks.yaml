    ![A978-1-4842-1565-4_12_Fig4_HTML.jpg](img/A978-1-4842-1565-4_12_Fig4_HTML.jpg)


    **图 12-4. 在 inode 上下文中的软链接（上）与硬链接（下）**


    图 12-4 展示了软链接（符号链接）和硬链接在 Linux 上下文中的工作方式。每个图的上半部分显示了用户将软链接或硬链接视为某个文件的别名。然而，下半部分显示了实际发生的情况。


    对于软链接，文件指向一个 inode，而软链接指向另一个 inode。软链接 inode 引用文件 inode，文件 inode 指向文件存储上的数据。对于硬链接，文件和硬链接都指向文件
    inode，文件 inode 指向文件存储上的数据。


    硬链接比软链接更具限制性：


    *   链接的目标必须存在。

    *   通常不允许在目录上创建硬链接。

    *   不允许硬链接跨越分区或卷。换句话说，它们不能跨文件系统存在。

    *   硬链接看起来和行为都像普通文件，因此可能很难找到。


    `Files` 类提供了 `Path createLink(Path link, Path existing)` 方法，用于为 `existing` 文件创建硬
    `link`（目录条目）。此方法返回 `link Path` 对象。当实现不支持将现有文件添加到目录时，它会抛出 `UnsupportedOperationException`；当由于
    `link` 名称已存在而无法创建条目时，它会抛出 `FileAlreadyExistsException`；当发生 I/O 错误时，它会抛出 `IOException`。


    清单 12-43 展示了一个演示硬链接创建的应用程序的源代码。


    **清单 12-43. 创建硬链接**


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CLDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 2)`


          `{`


             `System.err.println("usage: java CLDemo linkpath existfilepath");`


             `return;`


          `}`


          `Files.createLink(Paths.get(args[0]), Paths.get(args[1]));`


       `}`


    `}`


    按如下方式编译清单 12-43：


    `javac CLDemo.java`


    假设存在一个 `report.txt` 文件，按如下方式运行生成的应用程序：


    `java CLDemo myrep report.txt`


    你应该看不到任何输出。相反，你应该在目录中看到一个 `myrep` 条目。此条目标识的内容和属性与 `report.txt` 相同。如果你更改 `myrep`
    或 `report.txt`，则可以在另一个文件中观察到这些更改。


    ### 遍历文件树


    `Files` 类的 `copy()`、`move()` 和 `delete()` 方法复制、移动和删除单个文件，而不是多个对象。当与 NIO.2 的文件树遍历
    API 结合使用时，你可以使用这些方法来复制、移动和删除文件层次结构。

