    #### 在通道间传输字节


    为了优化执行批量传输的常见做法，`FileChannel` 新增了两个方法，从而避免了对中间缓冲区的需求：


    *   `long transferFrom(ReadableByteChannel src, long position, long count)`

    *   `long transferTo(long position, long count, WritableByteChannel target)`


    `transferFrom(ReadableByteChannel, long, long)` 方法将字节从给定的可读字节通道传输到此通道的文件中。参数 `src`
    标识源通道，`position` 标识文件中传输开始的非负起始位置，`count` 标识要传输的最大字节数（非负）。


    此方法返回实际传输的字节数（可能为 0）。当某个参数的前提条件（例如 `position` 为非负数）不满足时，它会抛出 `IllegalArgumentException`；当源通道未以读取方式打开时，抛出
    `NonReadableChannelException`；当此通道未以写入方式打开时，抛出 `NonWritableChannelException`；当此通道或源通道已关闭时，抛出
    `ClosedChannelException`；当传输进行中另一个线程中断了当前线程，从而导致两个通道都关闭并设置了当前线程的中断状态时，抛出 `ClosedByInterruptException`；当发生其他
    I/O 错误时，抛出 `IOException`。


    `transferTo(long, long, WritableByteChannel)` 方法将字节从此通道的文件传输到给定的可写字节通道。参数 `position`
    标识文件中传输开始的非负起始位置，`count` 标识要传输的最大字节数（非负），`target` 标识目标通道。


    此方法返回实际传输的字节数（可能为 0）。当某个参数的前提条件不满足时，它会抛出 `IllegalArgumentException`；当此通道未以读取方式打开时，抛出
    `NonReadableChannelException`；当目标通道未以写入方式打开时，抛出 `NonWritableChannelException`；当此通道或目标通道已关闭时，抛出
    `ClosedChannelException`；当传输进行中另一个线程中断了当前线程，从而导致两个通道都关闭并设置了当前线程的中断状态时，抛出 `ClosedByInterruptException`；当发生其他
    I/O 错误时，抛出 `IOException`。


    如果你将 `transferTo()` 与文件通道一起用作传输源，当 `position` 加上 `count` 超过文件大小时，传输会在文件末尾停止。类似地，当
    `src` 是文件通道并且到达其文件末尾时，`transferFrom()` 会停止。


    清单 7-6 展示了一个演示通道传输的应用程序。


    清单 7-6. 演示通道传输


    `import java.io.FileInputStream;`


    `import java.io.IOException;`


    `import java.nio.channels.Channels;`


    `import java.nio.channels.FileChannel;`


    `import java.nio.channels.WritableByteChannel;`


    `public class ChannelDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java ChannelDemo filespec");`


    `return;`


    `}`


    `try (FileInputStream fis = new FileInputStream(args[0]))`


    `{`


    `FileChannel inChannel = fis.getChannel();`


    `WritableByteChannel outChannel = Channels.newChannel(System.out);`


    `inChannel.transferTo(0, inChannel.size(), outChannel);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.out.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    清单 7-6 的 `main()` 方法验证是否指定了单个命令行参数。此参数标识一个文件，其内容将被复制到标准输出流。


    接下来，`main()` 为命令行参数标识的文件创建一个文件输入流，并创建一个用于从该文件读取的文件通道。


    最后，获取一个用于将字节发送到标准输出流的输出通道，并调用输入文件通道的 `transferTo()` 方法将文件内容传输到标准输出。


    编译清单 7-6 (`javac ChannelDemo.java`) 并执行以下命令行以创建 `ChannelDemo.java` 的副本：


    `java ChannelDemo ChannelDemo.java >ChannelDemo.bak`


    你应该会看到一个 `ChannelDemo.bak` 文件，其大小和内容与 `ChannelDemo.java` 相同。


    ### 套接字通道


    我之前提到过，`Socket` 声明了一个 `SocketChannel` `getChannel()` 方法，用于返回一个套接字通道实例，该实例描述了一个到套接字的开放连接。与套接字不同，套接字通道是可选择的，并且可以在非阻塞模式下运行。这些能力（将在本章后面讨论）增强了大型应用程序（如
    Web 服务器）的可扩展性和灵活性。


    套接字通道由 `java.nio.channels` 包中的抽象类 `ServerSocketChannel`、`SocketChannel` 和 `DatagramChannel`
    描述。每个类最终都扩展了 `java.nio.channels.SelectableChannel` 并实现了 `InterruptibleChannel`，这使得
    `ServerSocketChannel`、`SocketChannel` 和 `DatagramChannel` 实例既可选择又可中断。由于 `SocketChannel`
    和 `DatagramChannel` 实现了 `ByteChannel`、`GatheringByteChannel` 和 `ScatteringByteChannel`
    接口，你可以对其底层套接字进行写入、读取以及执行分散/聚集 I/O。


    注意


    与缓冲区不同（缓冲区不是线程安全的），服务器套接字通道、套接字通道和数据报通道是线程安全的。


    每个 `ServerSocketChannel`、`SocketChannel` 和 `DatagramChannel` 实例都会从 `java.net.ServerSocket`、`Socket`
    或 `java.net.DatagramSocket` 类创建一个对等套接字对象。每个类都已进行改造以与通道协同工作。你可以通过调用 `ServerSocketChannel`、`SocketChannel`
    或 `DatagramChannel` 的 `socket()` 方法来获取对等套接字对象。


    注意


    当在从 `socket()` 返回的套接字实例上调用 `getChannel()` 时，它会返回关联的套接字通道。但是，当在通过实例化 `ServerSocket`、`Socket`
    或 `DatagramSocket` 获得的套接字上调用 `getChannel()` 时，它会返回 `null`。

