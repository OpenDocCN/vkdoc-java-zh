    enum defines `DIRECTORY_INHERIT` (can be placed on a directory and indicates that
    the ACL entry should be added to each new directory created), `FILE_INHERIT` (can
    be placed on a directory and indicates that the ACL entry should be added to each
    new nondirectory file created), `INHERIT_ONLY` (can be placed on a directory but
    does not apply to the directory, only to newly-created files/directories as specified
