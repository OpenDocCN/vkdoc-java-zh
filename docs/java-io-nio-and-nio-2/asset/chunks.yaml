  raw: '## Exploring Formatter


    JDK 5 introduced the `java.util.Formatter` class as an interpreter for `printf()`-style
    format strings. This class provides support for layout justification and alignment;
    common formats for numeric, string, and date/time data; and more. Commonly used
    Java types (such as `byte` and `java.math.BigDecimal`) are supported.


    `Formatter` declares several constructors for creating `Formatter` objects. These
    constructors let you specify where you want formatted output to be sent. For example,
    `Formatter()` writes formatted output to an internal `java.lang.StringBuilder`
    instance and `Formatter(OutputStream os)` writes formatted output to the specified
    output stream. You can access the destination by calling `Formatter`’s `Appendable
    out()` method.


    Note


    The `java.lang.Appendable` interface describes an object to which `char` values
    and character sequences can be appended. Classes (such as `StringBuilder`) whose
    instances are to receive formatted output (via the `Formatter` class) implement
    `Appendable`. This interface declares methods such as `Appendable append(char
    c)`—append `c`’s character to this appendable. When an I/O error occurs, this
    method throws `java.io.IOException`.


    After creating a `Formatter` object, you would call a `format()` method to format
    a varying number of values. For example, `Formatter format(String format, Object...
    args)` formats the `args` array according to the string of format specifiers passed
    to the `format` parameter, and returns a reference to the invoking `Formatter`
    so that you can chain `format()` calls together (for convenience).


    Each format specifier has one of the following syntaxes:


    *   `%`[argument_index `$`][flags][width][`.` precision]conversion

    *   `%`[argument_index `$`][flags][width]conversion

    *   `%`[flags][width]conversion


    The first syntax describes a format specifier for general (such as string), character,
    and numeric types. The second syntax describes a format specifier for types that
    are used to represent dates and times. The third syntax describes a format specifier
    that doesn’t correspond to arguments.


    The optional argument_index is a decimal integer indicating the position of the
    argument in the argument list. The first argument is referenced by `1$`, the second
    argument is referenced by `2$`, and so on.


    The optional flags represents a set of characters that modify the output format.
    The set of valid flags depends on the conversion.


    The optional width is a positive decimal integer indicating the minimum number
    of characters to be written to the output.


    The optional precision is a nonnegative decimal integer typically used to restrict
    the number of characters. The specific behavior depends on the conversion.


    The required conversion depends on the syntax. For the first syntax, it’s a character
    indicating how the argument should be formatted. The set of valid conversions
    for a given argument depends on the argument’s data type. For the second syntax,
    it’s a two-character sequence. The first character is `t` or `T`. The second character
    indicates the format to be used. For the third syntax, it’s a character indicating
    content to be inserted in the output.


    Conversions are divided into six categories: general, character, numeric (integer
    or floating-point), date/time, percent, and line separator. The following list
    identifies a few example format specifiers and their conversions:


    *   `%d`: Formats the argument as a decimal integer.

    *   `%x`: Formats the argument as a hexadecimal integer.

    *   `%c`: Formats the argument as a character.

    *   `%f`: Formats the argument as a decimal number.

    *   `%s`: Formats the argument as a string.

    *   `%n`: Outputs an operating system-specific line separator.

    *   `%10.2f`: Formats the argument as a decimal number with `10` as the minimum
    number of characters to be written (leading spaces are written when the number
    is smaller than the width) and `2` as the number of characters to be written after
    the decimal point.

    *   `%05d`: Formats the argument as a decimal integer with `5` as the minimum
    number of characters to be written (leading `0`s are written when the number is
    smaller than the width).


    When you’re finished with the formatter, you might want to invoke the `void` `flush()`
    method to ensure that any buffered output in the destination is written to the
    underlying stream. You would typically invoke `flush()` when the destination is
    a file.


    Continuing, invoke the formatter’s `void` `close()` method. As well as closing
    the formatter, this method also closes the underlying output destination when
    this destination’s class implements the `java.io.Closeable` interface. If the
    formatter has been closed, this method has no effect. Attempting to format after
    calling `close()` results in `java.util.FormatterClosedException`.


    Listing [11-1](#A978-1-4842-1565-4_11_Chapter.html#FPar2) provides a simple demonstration
    of `Formatter` using the aforementioned format specifiers.


    Listing 11-1\. Demonstrating the `Formatter` Class


    `import java.util.Formatter;`


    `public class FormatterDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `Formatter formatter = new Formatter();`


    `formatter.format("%d", 123);`


    `System.out.println(formatter.toString());`


    `formatter.format("%x", 123);`


    `System.out.println(formatter.toString());`


    `formatter.format("%c", ’X’);`


    `System.out.println(formatter.toString());`


    `formatter.format("%f", 0.1);`


    `System.out.println(formatter.toString());`


    `formatter.format("%s%n", "Hello, World");`


    `System.out.println(formatter.toString());`


    `formatter.format("%10.2f", 98.375);`


    `System.out.println(formatter.toString());`


    `formatter.format("%05d", 123);`


    `System.out.println(formatter.toString());`


    `formatter.format("%1$d %1$d", 123);`


    `System.out.println(formatter.toString());`


    `formatter.format("%d %d", 123);`


    `System.out.println(formatter.toString());`


    `formatter.close();`


    `}`


    `}`


    Listing [11-1](#A978-1-4842-1565-4_11_Chapter.html#FPar2)’s `main()` method first
    creates a `Formatter` object via the `Formatter()` constructor, which sends formatted
    output to an internal `StringBuilder` instance. It then demonstrates the aforementioned
    format specifiers by invoking a `format()` method, followed by the `toString()`
    method to obtain the formatted content, which is subsequently output.


    The `formatter.format("%1$d %1$d", 123);` method call accesses the single data
    item argument to be formatted (`123`) twice by referencing this argument via `1$`.
    Without this reference, which is demonstrated via `formatter.format("%d %d", 123);`,
    an exception would be thrown because there must be a separate argument for each
    format specifier unless you use an argument index.


    Lastly, the formatter is closed.


    Compile Listing [11-1](#A978-1-4842-1565-4_11_Chapter.html#FPar2) as follows:


    `javac FormatterDemo.java`


    Run the resulting application as follows:


    `java FormatterDemo`


    You should observe the following output:


    `123`


    `1237b`


    `1237bX`


    `1237bX0.100000`


    `1237bX0.100000Hello, World`


    `1237bX0.100000Hello, World`


    `98.38`


    `1237bX0.100000Hello, World`


    `98.3800123`


    `1237bX0.100000Hello, World`


    `98.3800123123 123`


    `Exception in thread "main" java.util.MissingFormatArgumentException: Format specifier
    ’%d’`


    `at java.util.Formatter.format(Formatter.java:2519)`


    `at java.util.Formatter.format(Formatter.java:2455)`


    `at FormatterDemo.main(FormatterDemo.java:24)`'
  trans: '

    ## 探索 Formatter


    JDK 5 引入了 `java.util.Formatter` 类，作为 `printf()` 风格格式字符串的解释器。该类支持布局对齐；数字、字符串和日期/时间数据的常见格式；以及更多功能。常用的
    Java 类型（例如 `byte` 和 `java.math.BigDecimal`）均受支持。


    `Formatter` 声明了多个用于创建 `Formatter` 对象的构造器。这些构造器允许你指定格式化输出的目标位置。例如，`Formatter()`
    将格式化输出写入内部的 `java.lang.StringBuilder` 实例，而 `Formatter(OutputStream os)` 则将格式化输出写入指定的输出流。你可以通过调用
    `Formatter` 的 `Appendable out()` 方法来访问该目标。


    注意


    `java.lang.Appendable` 接口描述了一个可以追加 `char` 值和字符序列的对象。其实例需要接收格式化输出（通过 `Formatter`
    类）的类（例如 `StringBuilder`）实现了 `Appendable`。该接口声明了诸如 `Appendable append(char c)`
    之类的方法——将 `c` 的字符追加到此 appendable 对象。当发生 I/O 错误时，此方法会抛出 `java.io.IOException`。


    创建 `Formatter` 对象后，你可以调用 `format()` 方法来格式化可变数量的值。例如，`Formatter format(String format,
    Object... args)` 根据传递给 `format` 参数的格式说明符字符串格式化 `args` 数组，并返回对调用该方法的 `Formatter`
    的引用，以便你可以链式调用 `format()` 方法（为方便起见）。


    每个格式说明符都具有以下语法之一：


    *   `%`[argument_index `$`][flags][width][`.` precision]conversion

    *   `%`[argument_index `$`][flags][width]conversion

    *   `%`[flags][width]conversion


    第一种语法描述了用于通用（如字符串）、字符和数字类型的格式说明符。第二种语法描述了用于表示日期和时间的类型的格式说明符。第三种语法描述了不对应任何参数的格式说明符。


    可选的 argument_index 是一个十进制整数，指示参数在参数列表中的位置。第一个参数由 `1$` 引用，第二个参数由 `2$` 引用，依此类推。


    可选的 flags 表示一组用于修改输出格式的字符。有效标志集取决于转换类型。


    可选的 width 是一个正十进制整数，指示要写入输出的最小字符数。


    可选的 precision 是一个非负十进制整数，通常用于限制字符数。具体行为取决于转换类型。


    必需的 conversion 取决于语法。对于第一种语法，它是一个字符，指示应如何格式化参数。给定参数的有效转换集取决于该参数的数据类型。对于第二种语法，它是一个双字符序列。第一个字符是
    `t` 或 `T`。第二个字符指示要使用的格式。对于第三种语法，它是一个字符，指示要插入到输出中的内容。


    转换分为六类：通用、字符、数字（整数或浮点数）、日期/时间、百分号和行分隔符。以下列表标识了几个示例格式说明符及其转换：


    *   `%d`：将参数格式化为十进制整数。

    *   `%x`：将参数格式化为十六进制整数。

    *   `%c`：将参数格式化为字符。

    *   `%f`：将参数格式化为十进制数。

    *   `%s`：将参数格式化为字符串。

    *   `%n`：输出一个操作系统特定的行分隔符。

    *   `%10.2f`：将参数格式化为十进制数，其中 `10` 是要写入的最小字符数（当数字小于宽度时，会写入前导空格），`2` 是小数点后要写入的字符数。

    *   `%05d`：将参数格式化为十进制整数，其中 `5` 是要写入的最小字符数（当数字小于宽度时，会写入前导 `0`）。


    当你使用完格式化器后，可能需要调用 `void` `flush()` 方法，以确保目标中任何缓冲的输出都被写入底层流。当目标是文件时，你通常会调用 `flush()`。


    接着，调用格式化器的 `void` `close()` 方法。除了关闭格式化器之外，当此目标的类实现了 `java.io.Closeable` 接口时，此方法还会关闭底层输出目标。如果格式化器已关闭，则此方法无效。在调用
    `close()` 后尝试格式化会导致 `java.util.FormatterClosedException`。


    清单 11-1 使用上述格式说明符提供了一个简单的 `Formatter` 演示。


    清单 11-1. 演示 `Formatter` 类


    `import java.util.Formatter;`


    `public class FormatterDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `Formatter formatter = new Formatter();`


    `formatter.format("%d", 123);`


    `System.out.println(formatter.toString());`


    `formatter.format("%x", 123);`


    `System.out.println(formatter.toString());`


    `formatter.format("%c", ’X’);`


    `System.out.println(formatter.toString());`


    `formatter.format("%f", 0.1);`


    `System.out.println(formatter.toString());`


    `formatter.format("%s%n", "Hello, World");`


    `System.out.println(formatter.toString());`


    `formatter.format("%10.2f", 98.375);`


    `System.out.println(formatter.toString());`


    `formatter.format("%05d", 123);`


    `System.out.println(formatter.toString());`


    `formatter.format("%1$d %1$d", 123);`


    `System.out.println(formatter.toString());`


    `formatter.format("%d %d", 123);`


    `System.out.println(formatter.toString());`


    `formatter.close();`


    `}`


    `}`


    清单 11-1 的 `main()` 方法首先通过 `Formatter()` 构造器创建一个 `Formatter` 对象，该构造器将格式化输出发送到内部的
    `StringBuilder` 实例。然后，它通过调用 `format()` 方法演示了上述格式说明符，接着调用 `toString()` 方法获取格式化后的内容，随后将其输出。


    `formatter.format("%1$d %1$d", 123);` 方法调用通过 `1$` 引用同一个数据项参数（`123`）两次来访问它。如果没有这个引用（如
    `formatter.format("%d %d", 123);` 所示），则会抛出异常，因为除非使用参数索引，否则每个格式说明符都必须有一个单独的参数。


    最后，格式化器被关闭。


    按如下方式编译清单 11-1：


    `javac FormatterDemo.java`


    按如下方式运行生成的应用程序：


    `java FormatterDemo`


    你应该会观察到以下输出：


    `123`


    `1237b`


    `1237bX`


    `1237bX0.100000`


    `1237bX0.100000Hello, World`


    `1237bX0.100000Hello, World`


    `98.38`


    `1237bX0.100000Hello, World`


    `98.3800123`


    `1237bX0.100000Hello, World`


    `98.3800123123 123`


    `Exception in thread "main" java.util.MissingFormatArgumentException: Format specifier
    ’%d’`


    `at java.util.Formatter.format(Formatter.java:2519)`


    `at java.util.Formatter.format(Formatter.java:2455)`


    `at FormatterDemo.main(FormatterDemo.java:24)`

