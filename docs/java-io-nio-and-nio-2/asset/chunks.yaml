    as follows:


    `javac *.java`


    Run the resulting application as follows:


    `java FormatterDemo`


    You should observe the following output:


    `[John Doe: 1000]`


    `[Jean Dupont: 1000]`


    `[JOHN DOE: 1000]`


    `[       10*]`


    `[10*       ]`


    `[1000]`


    EXERCISES


    The following exercises are designed to test your understanding of [Chapter 11](#A978-1-4842-1565-4_11_Chapter.html)’s
    content:


    Identify the three nonexception types that contribute to NIO’s `printf`-style
    formatting facility.   How do you reference an argument from within a format specifier
    string?   What does the `%n` format specifier accomplish?   Modify Listing [11-1](#A978-1-4842-1565-4_11_Chapter.html#FPar2)
    so that `FormatterDemo`’s output isn’t concatenated into one long string.


    ## Summary


    JDK 5 introduced the `Formatter` class as an interpreter for `printf()`-style
    format strings. This class provides support for layout justification and alignment;
    common formats for numeric, string, and date/time data; and more. Commonly used
    Java types (such as `byte` and `BigDecimal`) are supported.


    `Formatter` declares several constructors for creating `Formatter` objects. These
    constructors let you specify where you want formatted output to be sent. For example,
    `Formatter()` writes formatted output to an internal `StringBuilder` instance.
    You can access the destination by calling `Formatter`’s `Appendable out()` method.


    After creating a `Formatter` object, call a `format()` method to format a varying
    number of values. For example, `Formatter format(String format, Object... args)`
    formats the `args` array according to the string of format specifiers passed to
    the `format` parameter, and returns a reference to the invoking `Formatter` so
    that you can chain the `format()` calls together.


    It’s cumbersome to have to create and manage a `Formatter` object when all you
    want to do is achieve something equivalent to the C language’s `printf()` function.
    Java addresses this situation by adding `format()` and equivalent `printf()` methods
    (such as `PrintStream printf(String format, Object... args)`) to the `PrintStream`
    class.


    `Formatter` is accompanied by a `Formattable` interface and a `FormattableFlags`
    class that collectively support limited formatting customization for arbitrary
    user-defined types. `Formattable` is implemented by any class that needs to perform
    custom formatting using [`Formatter`](https://docs.oracle.com/javase/8/docs/api/java/util/Formatter.html#class%20in%20java.util)
    ’s “`s`” (format argument as string) conversion character.


    [Chapter 12](#A978-1-4842-1565-4_12_Chapter.html) presents NIO.2’s improved file
    system interface.


