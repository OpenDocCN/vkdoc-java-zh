    #### Exploring the POSIX View


    The `PosixFileAttributeView` interface extends `BasicFileAttributeView` and supports
    the POSIX group owner and nine access permissions attributes:


    *   `group` (`GroupPrincipal`)

    *   `permissions` (`Set<PosixFilePermission>`)


    `PosixFileAttributeView` declares the following methods:


    *   `PosixFileAttributes readAttributes()`: Read the POSIX file attributes as
    a bulk operation.

    *   `void setGroup(GroupPrincipal group)`: Update the file group-owner.

    *   `void setPermissions(Set<PosixFilePermission> perms)`: Update the file permissions.


    These methods throw `IOException` when an I/O error occurs. `setPermissions()`
    throws `java.lang.ClassCastException` when the `java.util.Set` object contains
    elements that are not of type `java.nio.file.attribute.PosixFilePermission`, which
    is an enum that declares `GROUP_EXECUTE`, `GROUP_READ`, `GROUP_WRITE`, `OTHERS_EXECUTE`,
    `OTHERS_READ`, `OTHERS_WRITE`, `OWNER_EXECUTE`, `OWNER_READ`, and `OWNER_WRITE`
    constants.


    `readAttributes()` returns a `java.nio.file.attribute.PosixFileAttributes` object
    that offers type-safe methods for reading attribute values:


    *   `GroupPrincipal group()`

    *   `UserPrincipal owner()`

    *   `Set<PosixFilePermission> permissions()`


    The empty `java.nio.file.attribute.UserPrincipal` interface represents an identity
    for determining access rights to objects in a file system and extends `java.security.Principal`.
    The empty `java.nio.file.attribute.GroupPrincipal` interface represents a group
    identity and extends `UserPrincipal`.


    ##### Reading POSIX File Attribute Values in Bulk


    Listing [12-15](#A978-1-4842-1565-4_12_Chapter.html#FPar24) presents the source
    code to an application that shows how to read a file’s POSIX file attributes in
    bulk.


    Listing 12-15\. Reading POSIX File Attributes in Bulk


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.PosixFileAttributes;`


    `import java.nio.file.attribute.PosixFilePermission;`


    `public class PFAVDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java PFAVDemo path");`


             `return;`


          `}`


          `Path path = Paths.get(args[0]);`


          `PosixFileAttributes pfa;`


          `pfa = Files.readAttributes(path, PosixFileAttributes.class);`


          `System.out.printf("Group: %s%n", pfa.group());`


          `for (PosixFilePermission perm: pfa.permissions())`


             `System.out.printf("Permission: %s%n", perm);`


       `}`


    `}`


    Compile Listing [12-15](#A978-1-4842-1565-4_12_Chapter.html#FPar24) as follows:


    `javac PFAVDemo.java`


    Assuming that the POSIX file attribute view is supported, run the resulting application
    as follows:


    `java PFAVDemo PFAVDemo.java`


    Because I’m running Windows 7, POSIX isn’t supported and I observe a thrown `UnsupportedOperationException`
    message.'
  trans: '

    #### 探索 DOS 视图


    `DosFileAttributeView` 接口扩展了 `BasicFileAttributeView`，并支持以下四种 MS-DOS/PC-DOS 文件属性：


    *   `archive`（`Boolean`）

    *   `hidden`（`Boolean`）

    *   `readonly`（`Boolean`）

    *   `system`（`Boolean`）


    `DosFileAttributeView` 声明了以下方法：


    *   `DosFileAttributes readAttributes()`：以批量操作的方式读取 DOS 文件属性。

    *   `void setArchive(boolean value)`：更新 `archive` 属性的值。

    *   `void setHidden(boolean value)`：更新 `hidden` 属性的值。

    *   `void setReadOnly(boolean value)`：更新 `readonly` 属性的值。

    *   `void setSystem(boolean value)`：更新 `system` 属性的值。


    当发生 I/O 错误时，这些方法会抛出 `IOException`。


    `readAttributes()` 返回一个 `java.nio.file.attribute.DosFileAttributes` 对象，该对象提供了用于读取属性值的类型安全方法：


    *   `boolean isArchive()`

    *   `boolean isHidden()`

    *   `boolean isReadOnly()`

    *   `boolean isSystem()`


    ##### 批量读取 DOS 文件属性值


    清单 12-13 展示了一个应用程序的源代码，该程序演示了如何批量读取文件的 DOS 文件属性。


    清单 12-13. 批量读取 DOS 文件属性


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.DosFileAttributes;`


    `public class DFAVDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java DFAVDemo path");`


             `return;`


          `}`


          `Path path = Paths.get(args[0]);`


          `DosFileAttributes dfa;`


          `dfa = Files.readAttributes(path, DosFileAttributes.class);`


          `System.out.printf("Is archive: %b%n", dfa.isArchive());`


          `System.out.printf("Is hidden: %b%n", dfa.isHidden());`


          `System.out.printf("Is readonly: %b%n", dfa.isReadOnly());`


          `System.out.printf("Is system: %b%n", dfa.isSystem());`


       `}`


    `}`


    按如下方式编译清单 12-13：


    `javac DFAVDemo.java`


    假设支持 DOS 文件属性视图，按如下方式运行生成的应用程序：


    `java DFAVDemo DFAVDemo.java`


    我观察到以下输出：


    `Is archive: true`


    `Is hidden: false`


    `Is readonly: false`


    `Is system: false`


    ##### 获取和设置单个 DOS 文件属性值


    清单 12-14 展示了一个应用程序的源代码，该程序演示了如何获取和设置单个 DOS 文件属性值。


    清单 12-14. 获取和设置单个 DOS 文件属性值


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.FileTime;`


    `import java.time.Instant;`


    `public class DFAVDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length < 1 || args.length > 2)`


          `{`


             `System.err.println("usage: java DFAVDemo path [set]");`


             `return;`


          `}`


          `Path path = Paths.get(args[0]);`


          `boolean setAttr = false;`


          `if (args.length == 2)`


             `setAttr = true;`


          `System.out.printf("Is archive: %b%n",`


                            `Files.getAttribute(path, "dos:archive"));`


          `System.out.printf("Is hidden: %b%n",`


                            `Files.getAttribute(path, "dos:hidden"));`


          `System.out.printf("Is readonly: %b%n",`


                            `Files.getAttribute(path, "dos:readonly"));`


          `System.out.printf("Is system: %b%n",`


                            `Files.getAttribute(path, "dos:system"));`


          `if (setAttr)`


          `{`


             `Files.setAttribute(path, "dos:system", true);`


             `System.out.printf("Is system: %s%n",`


                               `Files.getAttribute(path, "dos:system"));`


          `}`


       `}`


    `}`


    与基本文件属性不同，DOS 文件属性名称需要一个前缀，即 `dos:`。


    编译清单 12-14（`javac DFAVDemo.java`）并按如下方式运行应用程序：


    `java DFAVDemo DFAVDemo.java`


    假设支持 DOS 文件属性视图，您应该会观察到以下输出：


    `Is archive: true`


    `Is hidden: false`


    `Is readonly: false`


    `Is system: false`


    现在，按如下方式运行 `DFAVDemo`：


    `java DFAVDemo DFAVDemo.java set`


    这一次，在输出 DOS 属性值之后，系统属性应该会被设置。


    #### 探索 POSIX 视图


    `PosixFileAttributeView` 接口扩展了 `BasicFileAttributeView`，并支持 POSIX 组所有者以及九个访问权限属性：


    *   `group`（`GroupPrincipal`）

    *   `permissions`（`Set<PosixFilePermission>`）


    `PosixFileAttributeView` 声明了以下方法：


    *   `PosixFileAttributes readAttributes()`：以批量操作的方式读取 POSIX 文件属性。

    *   `void setGroup(GroupPrincipal group)`：更新文件组所有者。

    *   `void setPermissions(Set<PosixFilePermission> perms)`：更新文件权限。


    当发生 I/O 错误时，这些方法会抛出 `IOException`。当 `java.util.Set` 对象包含的类型不是 `java.nio.file.attribute.PosixFilePermission`
    的元素时，`setPermissions()` 会抛出 `java.lang.ClassCastException`。`PosixFilePermission`
    是一个枚举，它声明了 `GROUP_EXECUTE`、`GROUP_READ`、`GROUP_WRITE`、`OTHERS_EXECUTE`、`OTHERS_READ`、`OTHERS_WRITE`、`OWNER_EXECUTE`、`OWNER_READ`
    和 `OWNER_WRITE` 常量。


    `readAttributes()` 返回一个 `java.nio.file.attribute.PosixFileAttributes` 对象，该对象提供了用于读取属性值的类型安全方法：


    *   `GroupPrincipal group()`

    *   `UserPrincipal owner()`

    *   `Set<PosixFilePermission> permissions()`


    空的 `java.nio.file.attribute.UserPrincipal` 接口表示用于确定文件系统中对象访问权限的身份标识，并扩展了 `java.security.Principal`。空的
    `java.nio.file.attribute.GroupPrincipal` 接口表示组身份标识，并扩展了 `UserPrincipal`。


    ##### 批量读取 POSIX 文件属性值


    清单 12-15 展示了一个应用程序的源代码，该程序演示了如何批量读取文件的 POSIX 文件属性。


    清单 12-15. 批量读取 POSIX 文件属性


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.PosixFileAttributes;`


    `import java.nio.file.attribute.PosixFilePermission;`


    `public class PFAVDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java PFAVDemo path");`


             `return;`


          `}`


          `Path path = Paths.get(args[0]);`


          `PosixFileAttributes pfa;`


          `pfa = Files.readAttributes(path, PosixFileAttributes.class);`


          `System.out.printf("Group: %s%n", pfa.group());`


          `for (PosixFilePermission perm: pfa.permissions())`


             `System.out.printf("Permission: %s%n", perm);`


       `}`


    `}`


    按如下方式编译清单 12-15：


    `javac PFAVDemo.java`


    假设支持 POSIX 文件属性视图，按如下方式运行生成的应用程序：


    `java PFAVDemo PFAVDemo.java`


    因为我运行的是 Windows 7，不支持 POSIX，所以我观察到了一个抛出的 `UnsupportedOperationException` 消息。

