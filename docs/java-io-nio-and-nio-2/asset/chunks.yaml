- fmt: "`MappedByteBuffer`继承自其超类`java.nio.ByteBuffer`的方法。它还声明了以下方法：\n\n- `MappedByteBuffer\
    \ load()`：尝试将映射文件的所有内容加载到内存中。对于大文件，这可以显著提高访问速度，因为虚拟内存管理器无需在遍历映射缓冲区时，根据请求（通过读取/写入相应位置）逐步将文件部分加载到内存。尽管`load()`会尽力而为，但可能不会成功，因为外部程序可能促使虚拟内存管理器移除已加载文件内容的部分，以便为它们加载内容到物理内存的请求腾出空间。此外，`load()`在时间上可能开销较大，因为它可能导致虚拟内存管理器执行大量I/O操作；此方法可能需要较长时间才能完成。\n\
    - `boolean isLoaded()`：当映射文件的所有内容已加载到内存时返回`true`；否则返回`false`。如果此方法返回`true`，则很可能可以以极少或零I/O操作访问所有内容。如果此方法返回`false`，缓冲区访问仍可能很快，且映射内容可能完全驻留在内存中。请将`isLoaded()`视为对映射字节缓冲区状态的提示。\n\
    - `MappedByteBuffer force()`：将对映射字节缓冲区所做的更改写入永久存储。处理映射字节缓冲区时，应调用此方法而非文件通道的`force()`方法，因为通道可能不知道通过映射字节缓冲区所做的各种更改。调用此方法对`READ_ONLY`和`PRIVATE`映射没有影响。\n\
    \n清单[7-5](#A978-1-4842-1565-4_7_Chapter.html#FPar16)展示了一个演示文件映射的应用程序。\n\n**清单7-5.\
    \ 演示文件映射**\n\n```\nimport java.io.IOException;\nimport java.io.RandomAccessFile;\n\
    import java.nio.ByteBuffer;\nimport java.nio.MappedByteBuffer;\nimport java.nio.channels.FileChannel;\n\
    \npublic class ChannelDemo\n{\n   public static void main(String[] args) throws\
    \ IOException\n   {\n      if (args.length != 1)\n      {\n         System.out.println(\"\
    usage: java ChannelDemo filespec\");\n         return;\n      }\n      RandomAccessFile\
    \ raf = new RandomAccessFile(args[0], \"rw\");\n      FileChannel fc = raf.getChannel();\n\
    \      long size = fc.size();\n      System.out.println(\"Size: \" + size);\n\
    \      MappedByteBuffer mbb = fc.map(FileChannel.MapMode.READ_WRITE, 0,\n    \
    \                                size);\n      while (mbb.remaining() > 0)\n \
    \        System.out.print((char) mbb.get());\n      System.out.println();\n  \
    \    System.out.println();\n      for (int i = 0; i < mbb.limit() / 2; i++)\n\
    \      {\n         byte b1 = mbb.get(i);\n         byte b2 = mbb.get(mbb.limit()\
    \ - i - 1);\n         mbb.put(i, b2);\n         mbb.put(mbb.limit() - i - 1, b1);\n\
    \      }\n      mbb.flip();\n      while (mbb.remaining() > 0)\n         System.out.print((char)\
    \ mbb.get());\n      fc.close();\n   }\n}\n```\n\n在验证您已指定一个命令行参数（该参数应标识一个现有文件）后，`main()`创建一个`RandomAccessFile`对象，用于以读/写模式访问此文件。然后，它获取一个文件通道以与此文件通信。\n\
    \n使用文件通道获取文件大小（随后输出）后，`main()`使用文件通道调用`map()`以获取整个文件的读/写映射。随后，它输出返回的映射字节缓冲区的内容。\n\
