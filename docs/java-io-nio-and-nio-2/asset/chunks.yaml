    为什么 Java 的流类不擅长处理字符流？在字符 I/O 方面，Java 提供了哪种更优的替代方案来替代流类？判断正误：`Reader` 声明了一个 `available()`
    方法。`OutputStreamWriter` 类的用途是什么？`InputStreamReader` 类的用途是什么？如何识别默认字符编码？`FileWriter`
    类的用途是什么？`FileReader` 类的用途是什么？`BufferedWriter` 提供了哪个方法来写入行分隔符？从标准输入读取文本行通常很方便，而
    `InputStreamReader` 和 `BufferedReader` 类使这一任务成为可能。创建一个名为 `CircleInfo` 的 Java 应用程序，在获取一个链接到标准输入的
    `BufferedReader` 实例后，呈现一个循环，提示用户输入半径，将输入的半径解析为 `double` 值，并输出两条消息，分别报告基于该半径的圆的周长和面积。


    ## 摘要


    Java 的流类擅长处理字节序列的流，但不擅长处理字符序列的流，因为字节和字符是两种不同的东西。字节表示一个 8 位的数据项，而字符表示一个 16 位的数据项。此外，Java
    的 `char` 和 `String` 类型天然处理字符而非字节。更重要的是，字节流不了解字符集及其编码。


    Java 提供了 writer 和 reader 类来处理字符流。它们支持字符 I/O（它们处理 `char` 而非 `byte`），并考虑字符编码。抽象类
    `Writer` 和 `Reader` 描述了 writer 和 reader 的定义。


    `Writer` 和 `Reader` 的子类 `OutputStreamWriter` 和 `InputStreamReader` 弥补了字符流和字节流之间的差距。这些类的子类
    `FileWriter` 和 `FileReader` 是便捷类，用于简化向文件写入字符或从文件读取字符的操作。`Writer` 和 `Reader` 的子类还包括
    `BufferedWriter` 和 `BufferedReader`，它们通过缓冲字符来提高效率。


    第 6 章 介绍了 NIO 的缓冲区类。


    # 第三部分

    新的 I/O API


    # 6. 缓冲区


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​6](http://dx.doi.org/10.1007/978-1-4842-1565-4_6))
    包含补充材料，可供授权用户使用。


    NIO 基于缓冲区，缓冲区的内容通过通道发送到 I/O 服务或从 I/O 服务接收。本章将向您介绍 NIO 的缓冲区类。


    ## 缓冲区简介


    缓冲区是一个对象，用于存储要发送到 I/O 服务（执行输入/输出的操作系统组件）或从 I/O 服务接收的固定数量的数据。它位于应用程序和通道之间，通道将缓冲的数据写入服务，或从服务读取数据并将其存入缓冲区。


    缓冲区具有四个属性：


    *   **容量**：缓冲区中可以存储的数据项总数。容量在创建缓冲区时指定，之后无法更改。

    *   **界限**：不应读取或写入的第一个元素的从零开始的索引。换句话说，它标识缓冲区中“活跃”数据项的数量。

    *   **位置**：下一个可以读取的数据项的从零开始的索引，或者可以写入数据项的位置。

    *   **标记**：一个从零开始的索引，当调用缓冲区的 `reset()` 方法（稍后介绍）时，缓冲区的位置将重置为该索引。标记最初是未定义的。


    这四个属性的关系如下：0 <= 标记 <= 位置 <= 界限 <= 容量


    图 6-1 展示了一个新创建的、容量为 7 的面向字节的缓冲区。


    ![A978-1-4842-1565-4_6_Fig1_HTML.jpg](img/A978-1-4842-1565-4_6_Fig1_HTML.jpg)


    图 6-1.


    面向字节的缓冲区的逻辑布局包括一个未定义的标记、当前的位置、界限和容量


    图 6-1 中的缓冲区最多可以存储七个元素。标记最初是未定义的，位置初始设置为 `0`，界限初始设置为容量 (`7`)，这指定了缓冲区中可以存储的最大字节数。您只能访问位置
    `0` 到 `6`。位置 `7` 位于缓冲区之外。

