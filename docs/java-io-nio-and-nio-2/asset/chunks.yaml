    `File` 类提供了对底层操作系统可用文件系统的访问。每个 `File` 实例存储某个文件系统对象的抽象路径。各种 `File` 方法（例如 `void
    delete()`）会影响抽象路径所代表的文件系统对象。


    您首先学习了如何构造 `File` 实例。然后探索了用于获取存储的抽象路径及其文件或目录信息、获取根目录列表和磁盘空间、列出目录、创建/修改文件/目录、设置/获取权限等方法。


