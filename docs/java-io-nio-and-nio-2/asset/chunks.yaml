    `exe` files as follows:


    `java StreamsDemo C:\windows exe`


    I then observed the following output:


    `C:\windows\bfsvc.exe`


    `C:\windows\explorer.exe`


    `C:\windows\fveupdate.exe`


    `C:\windows\HelpPane.exe`


    `C:\windows\hh.exe`


    `C:\windows\IsUninst.exe`


    `C:\windows\kindlegen.exe`


    `C:\windows\notepad.exe`


    `C:\windows\regedit.exe`


    `C:\windows\splwow64.exe`


    `C:\windows\twunk_16.exe`


    `C:\windows\twunk_32.exe`


    `C:\windows\unins000.exe`


    `C:\windows\winhlp32.exe`


    `C:\windows\write.exe`


    The `lines()`methods return `Stream<String>` objects that are lazily populated
    with lines of text. `lines(Path path)` decodes bytes into characters via the UTF-8
    charset. In contrast, `lines(Path path, Charset cs)` performs this decoding via
    charset `cs`. Listing [12-49](#A978-1-4842-1565-4_12_Chapter.html#FPar70) presents
    the source code to an application that demonstrates `lines(Path path)`.


    Listing 12-49\. Streaming and Outputting All Lines from a Text File


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class StreamsDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java StreamsDemo textfilepath");`


    `return;`


    `}`


    `Files.lines(Paths.get(args[0])).forEach(System.out::println);`


    `}`


    `}`


    In this application, `main()` first verifies that exactly one command-line argument
    (identifying a text file path) has been specified. It then invokes `lines()` on
    this path and `forEach()` on the resulting stream to iterate over the strings.
    I pass a `System.out::println` method reference (a compact representation of a
    lambda) argument to `forEach()`, which it executes to output the string. The stream
    is closed when the application ends.


    Compile Listing [12-49](#A978-1-4842-1565-4_12_Chapter.html#FPar70) (`javac StreamsDemo.java`)
    and run the resulting application (`java StreamsDemo StreamsDemo.java`). You should
    observe the contents of the text file on the standard output stream.


    For brevity, I’m ignoring the remaining methods. If you need help using them,
    check out “Java 8 Friday Goodies: The New New I/O APIs” at [`http://blog.jooq.org/2014/01/24/java-8-friday-goodies-the-new-new-io-apis/`](http://blog.jooq.org/2014/01/24/java-8-friday-goodies-the-new-new-io-apis/)
