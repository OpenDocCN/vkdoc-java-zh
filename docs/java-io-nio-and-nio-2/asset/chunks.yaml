    was last called. This method throws `IOException` when this input stream has not
    been marked or the mark has been invalidated. |

    | `long skip(long n)` | Skip over and discard `n` bytes of data from this input
    stream. This method might skip over some smaller number of bytes (possibly zero),
    for example, when the end of the file is reached before `n` bytes have been skipped.
    The actual number of bytes skipped is returned. When `n` is negative, no bytes
    are skipped. This method throws `IOException` when this input stream doesn’t support
    skipping or when some other I/O error occurs. |


