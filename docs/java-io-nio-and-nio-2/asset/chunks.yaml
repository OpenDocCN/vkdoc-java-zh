- fmt: "### Socket and ServerSocket\n\nThe `Socket` and `ServerSocket` classes support\
    \ TCP-based communications between client processes (such as an application running\
    \ on a tablet) and server processes (such as an application running on one of\
    \ your Internet Service Provider’s computers that provides access to the World\
    \ Wide Web). Because `Socket` is associated with the `java.io.InputStream` and\
    \ `java.io.OutputStream` classes, sockets based on the `Socket` class are commonly\
    \ referred to as stream sockets.\n\n`Socket` supports the creation of client-side\
    \ sockets. It declares several constructors for this purpose, including the following\
    \ pair:\n\n- `Socket(InetAddress dstAddress, int dstPort)` creates a stream socket\
    \ and connects it to the specified port number (described by `dstPort`) at the\
    \ specified IP address (described by `dstAddress`). This constructor throws `java.io.IOException`\
    \ when an I/O error occurs while creating the socket, `java.lang.IllegalArgumentException`\
    \ when the argument passed to `dstPort` is outside the valid range of port values,\
    \ which is 0 through 65535, and `java.lang.NullPointerException` when `dstAddress`\
    \ is `null`.\n- `Socket(String dstName, int dstPort)` creates a stream socket\
    \ and connects it to the port identified by `dstPort` on the host identified by\
    \ `dstName`. When `dstName` is `null`, this constructor is equivalent to invoking\
    \ `Socket(InetAddress.getByName(null), port)`. It throws the same `IOException`\
    \ and `IllegalArgumentException` instances as the previous constructor. However,\
    \ instead of throwing `NullPointerException`, it throws `UnknownHostException`\
    \ when the host’s IP address cannot be determined.\n\nAfter a `Socket` instance\
    \ is created via these constructors, it’s bound to an arbitrary local host socket\
    \ address before a connection is made to the remote host socket address. Binding\
    \ makes a client socket address available to a server socket so that a server\
    \ process can communicate with the client process via the server socket.\n\n`Socket`\
    \ offers additional constructors. For example, `Socket()` and `Socket(Proxy proxy)`\
    \ create unbound and unconnected sockets. Before using these sockets, they must\
    \ be bound to local socket addresses, by calling `void bind(SocketAddress localAddr)`,\
    \ and then connections must be made, by calling `Socket`’s `connect()` methods\
    \ (`void connect(SocketAddress remoteAddr)`, for example).\n\n**Note**\n\nA proxy\
    \ is a host that sits between an intranet and the Internet for security purposes.\
    \ Proxy settings are represented via instances of the `Proxy` class and help sockets\
    \ communicate through proxies.\n\nAnother constructor is `Socket(InetAddress dstAddress,\
    \ int dstPort, InetAddress localAddr, int localPort)`, which lets you specify\
    \ your own local host socket address via `localAddr` and `localPort`. This constructor\
    \ automatically binds to the local socket address and then attempts a connection\
    \ to the remote `dstPort` on `dstAddress`.\n\nAfter creating a `Socket` instance,\
    \ and possibly invoking `bind()` and `connect()` on that instance, an application\
    \ invokes `Socket`’s `InputStream getInputStream()` and `OutputStream getOutputStream()`\
    \ methods to acquire an input stream for reading bytes from the socket and an\
    \ output stream for writing bytes to the socket. Also, the application often calls\
    \ `Socket`’s `void close()` method to close the socket when it’s no longer needed\
    \ for I/O.\n\nThe following example demonstrates how to create a socket that’s\
    \ bound to port number 9999 on the local host and then access its input and output\
    \ streams—exceptions are ignored for brevity:\n\n```\nSocket socket = new Socket(\"\
    localhost\", 9999);\nInputStream is = socket.getInputStream();\nOutputStream os\
    \ = socket.getOutputStream();\n// Do some work with the socket.\nsocket.close();\n\
    ```\n\n`ServerSocket` supports the creation of server-side sockets. It declares\
    \ the following four constructors for this purpose:\n\n- `ServerSocket()` creates\
    \ an unbound server socket. You can bind this socket to a specific socket address\
    \ (to which client sockets communicate) by invoking either of `ServerSocket`’s\
    \ two `bind()` methods. Binding makes the server socket address available to a\
    \ client socket so that a client process can communicate with the server process\
    \ via the client socket. This constructor throws `IOException` when an I/O error\
    \ occurs while attempting to open the socket.\n- `ServerSocket(int port)` creates\
    \ a server socket bound to the specified `port` value and an IP address associated\
    \ with one of the host’s NICs. When you pass `0` to `port`, an arbitrary port\
    \ number is chosen. The port number can be retrieved by calling `int getLocalPort()`.\
    \ The maximum queue length for incoming connection requests from clients is set\
    \ to 50. If a connection request arrives when the queue is full, the connection\
    \ is refused. This constructor throws `IOException` when an I/O error occurs while\
    \ attempting to open the socket and `IllegalArgumentException` when `port`’s value\
    \ lies outside the specified range of valid port values, which is between 0 and\
    \ 65535, inclusive.\n- `ServerSocket(int port, int backlog)` is equivalent to\
    \ the previous constructor, but it also lets you specify the maximum queue length\
    \ for incoming connections by passing a positive integer to `backlog`.\n- `ServerSocket(int\
    \ port, int backlog, InetAddress localAddress)` is equivalent to the previous\
    \ constructor, but it also lets you specify a different IP address to which the\
    \ server socket binds. (Any address is chosen when `null` is passed.) This constructor\
    \ is useful for machines that have multiple NICs and you want to listen for connection\
    \ requests on a specific NIC.\n\nAfter a server socket is created via these constructors,\
    \ a server application enters a loop that first invokes `ServerSocket`’s `Socket\
    \ accept()` method to listen for a connection request and return a `Socket` instance\
    \ that lets it communicate with the associated client socket. It then communicates\
    \ with the client socket to perform some kind of processing. When processing finishes,\
    \ the server socket calls the client socket’s `close()` method to terminate its\
    \ connection with the client.\n\n**Note**\n\n`ServerSocket` declares a `void close()`\
    \ method for closing a server socket before terminating the server application.\
    \ An unclosed socket is automatically closed when an application terminates.\n\
    \nThe following example demonstrates how to create a server socket that’s bound\
    \ to port 9999 on the current host, listen for incoming connection requests, return\
    \ their sockets, perform work on those sockets, and close the sockets; exceptions\
    \ are ignored for brevity:\n\n```\nServerSocket ss = new ServerSocket(9999);\n\
    while (true)\n{\n    Socket socket = ss.accept();\n    // obtain socket input/output\
    \ streams and communicate with socket\n    socket.close();\n}\n```\n\nThe `accept()`\
    \ method call blocks until a connection request is available and then returns\
    \ a `Socket` object so that the server application can communicate with its associated\
    \ client. The socket is closed after this communication takes place. The server\
    \ socket is automatically closed when the application exits.\n\nThis example assumes\
    \ that socket communication takes place on the server application’s main thread,\
    \ which is a problem when processing takes time to perform because server response\
    \ time to incoming connection requests decreases.\n\nTo speed up response time,\
    \ it’s often necessary to communicate with the socket on a worker thread, as demonstrated\
    \ in the following example:\n\n```\nServerSocket ss = new ServerSocket(9999);\n\
    while (true)\n{\n    final Socket s = ss.accept();\n    new Thread(new Runnable()\n\
    \    {\n        @Override\n        public void run()\n        {\n            //\
    \ obtain socket input/output streams and\n            // communicate with socket\n\
    \            try { s.close(); } catch (IOException ioe) {}\n        }\n    }).start();\n\
    }\n```"
  raw: '### Socket and ServerSocket


    The `Socket` and `ServerSocket` classes support TCP-based communications between
    client processes (such as an application running on a tablet) and server processes
    (such as an application running on one of your Internet Service Provider’s computers
    that provides access to the World Wide Web). Because `Socket` is associated with
    the `java.io.InputStream` and `java.io.OutputStream` classes, sockets based on
    the `Socket` class are commonly referred to as stream sockets.


    `Socket` supports the creation of client-side sockets. It declares several constructors
    for this purpose, including the following pair:


    *   `Socket(InetAddress dstAddress, int dstPort)` creates a stream socket and
    connects it to the specified port number (described by `dstPort`) at the specified
    IP address (described by `dstAddress`). This constructor throws `java.io.IOException`
    when an I/O error occurs while creating the socket, `java.lang.IllegalArgumentException`
    when the argument passed to `dstPort` is outside the valid range of port values,
    which is 0 through 65535, and `java.lang.NullPointerException` when `dstAddress`
    is `null`.

    *   `Socket(String dstName, int dstPort)` creates a stream socket and connects
    it to the port identified by `dstPort` on the host identified by `dstName`. When
    `dstName` is `null`, this constructor is equivalent to invoking `Socket(InetAddress.getByName(null),
    port)`. It throws the same `IOException` and `IllegalArgumentException` instances
    as the previous constructor. However, instead of throwing `NullPointerException`,
    it throws `UnknownHostException` when the host’s IP address cannot be determined.


    After a `Socket` instance is created via these constructors, it’s bound to an
    arbitrary local host socket address before a connection is made to the remote
    host socket address. Binding makes a client socket address available to a server
    socket so that a server process can communicate with the client process via the
    server socket.


    `Socket` offers additional constructors. For example, `Socket()` and `Socket(Proxy
    proxy)` create unbound and unconnected sockets. Before using these sockets, they
    must be bound to local socket addresses, by calling `void bind(SocketAddress localAddr)`,
    and then connections must be made, by calling `Socket`’s `connect()` methods (`void
    connect(SocketAddress remoteAddr)`, for example).


    Note


    A proxy is a host that sits between an intranet and the Internet for security
    purposes. Proxy settings are represented via instances of the `Proxy` class and
    help sockets communicate through proxies.


    Another constructor is `Socket(InetAddress dstAddress, int dstPort, InetAddress
    localAddr, int localPort)`, which lets you specify your own local host socket
    address via `localAddr` and `localPort`. This constructor automatically binds
    to the local socket address and then attempts a connection to the remote `dstPort`
    on `dstAddress`.


    After creating a `Socket` instance, and possibly invoking `bind()` and `connect()`
    on that instance, an application invokes `Socket`’s `InputStream getInputStream()`
    and `OutputStream getOutputStream()` methods to acquire an input stream for reading
    bytes from the socket and an output stream for writing bytes to the socket. Also,
    the application often calls `Socket`’s `void close()` method to close the socket
    when it’s no longer needed for I/O.


    The following example demonstrates how to create a socket that’s bound to port
    number 9999 on the local host and then access its input and output streams—exceptions
    are ignored for brevity:


    `Socket socket = new Socket("localhost", 9999);`


    `InputStream is = socket.getInputStream();`


    `OutputStream os = socket.getOutputStream();`


    `// Do some work with the socket.`


    `socket.close();`


    `ServerSocket` supports the creation of server-side sockets. It declares the following
    four constructors for this purpose:


    *   `ServerSocket()` creates an unbound server socket. You can bind this socket
    to a specific socket address (to which client sockets communicate) by invoking
    either of `ServerSocket`’s two `bind()` methods. Binding makes the server socket
    address available to a client socket so that a client process can communicate
    with the server process via the client socket. This constructor throws `IOException`
    when an I/O error occurs while attempting to open the socket.

    *   `ServerSocket(int port)` creates a server socket bound to the specified `port`
    value and an IP address associated with one of the host’s NICs. When you pass
    `0` to `port`, an arbitrary port number is chosen. The port number can be retrieved
    by calling `int getLocalPort()`. The maximum queue length for incoming connection
    requests from clients is set to 50\. If a connection request arrives when the
    queue is full, the connection is refused. This constructor throws `IOException`
    when an I/O error occurs while attempting to open the socket and `IllegalArgumentException`
    when `port`’s value lies outside the specified range of valid port values, which
    is between 0 and 65535, inclusive.

    *   `ServerSocket(int port, int backlog)` is equivalent to the previous constructor,
    but it also lets you specify the maximum queue length for incoming connections
    by passing a positive integer to `backlog`.

    *   `ServerSocket(int port, int backlog, InetAddress localAddress)` is equivalent
    to the previous constructor, but it also lets you specify a different IP address
    to which the server socket binds. (Any address is chosen when `null` is passed.)
    This constructor is useful for machines that have multiple NICs and you want to
    listen for connection requests on a specific NIC.


    After a server socket is created via these constructors, a server application
    enters a loop that first invokes `ServerSocket`’s `Socket accept()` method to
    listen for a connection request and return a `Socket` instance that lets it communicate
    with the associated client socket. It then communicates with the client socket
    to perform some kind of processing. When processing finishes, the server socket
    calls the client socket’s `close()` method to terminate its connection with the
    client.


    Note


    `ServerSocket` declares a `void close()` method for closing a server socket before
    terminating the server application. An unclosed socket is automatically closed
    when an application terminates.


    The following example demonstrates how to create a server socket that’s bound
    to port 9999 on the current host, listen for incoming connection requests, return
    their sockets, perform work on those sockets, and close the sockets; exceptions
    are ignored for brevity:


    `ServerSocket ss = new ServerSocket(9999);`


    `while (true)`


    `{`


    `Socket socket = ss.accept();`


    `// obtain socket input/output streams and communicate with socket`


    `socket.close();`


    `}`


    The `accept()` method call blocks until a connection request is available and
    then returns a `Socket` object so that the server application can communicate
    with its associated client. The socket is closed after this communication takes
    place. The server socket is automatically closed when the application exits.


    This example assumes that socket communication takes place on the server application’s
    main thread, which is a problem when processing takes time to perform because
    server response time to incoming connection requests decreases.


    To speed up response time, it’s often necessary to communicate with the socket
    on a worker thread, as demonstrated in the following example:


    `ServerSocket ss = new ServerSocket(9999);`


    `while (true)`


    `{`


    `final Socket s = ss.accept();`


    `new Thread(new Runnable()`


    `{`


    `@Override`


    `public void run()`


    `{`


    `// obtain socket input/output streams and`


    `// communicate with socket`


    `try { s.close(); } catch (IOException ioe) {}`


    `}`


    `}).start();`


    `}`'
  trans: '

    ### Socket 与 ServerSocket


    `Socket` 和 `ServerSocket` 类支持基于 TCP 的客户端进程（例如平板电脑上运行的应用程序）与服务器进程（例如互联网服务提供商计算机上运行的、提供万维网访问权限的应用程序）之间的通信。由于
    `Socket` 与 `java.io.InputStream` 和 `java.io.OutputStream` 类相关联，基于 `Socket` 类的套接字通常被称为流套接字。


    `Socket` 支持创建客户端套接字。为此，它声明了多个构造函数，包括以下一对：


    *   `Socket(InetAddress dstAddress, int dstPort)`：创建一个流套接字，并将其连接到指定 IP 地址（由 `dstAddress`
    描述）上的指定端口号（由 `dstPort` 描述）。当创建套接字时发生 I/O 错误，此构造函数会抛出 `java.io.IOException`；当传递给
    `dstPort` 的参数超出端口值的有效范围（0 到 65535）时，会抛出 `java.lang.IllegalArgumentException`；当
    `dstAddress` 为 `null` 时，会抛出 `java.lang.NullPointerException`。

    *   `Socket(String dstName, int dstPort)`：创建一个流套接字，并将其连接到由 `dstName` 标识的主机上由 `dstPort`
    标识的端口。当 `dstName` 为 `null` 时，此构造函数等同于调用 `Socket(InetAddress.getByName(null), port)`。它会抛出与前一个构造函数相同的
    `IOException` 和 `IllegalArgumentException` 异常。但是，当无法确定主机的 IP 地址时，它会抛出 `UnknownHostException`，而不是
    `NullPointerException`。


    通过这些构造函数创建 `Socket` 实例后，在连接到远程主机套接字地址之前，它会绑定到一个任意的本地主机套接字地址。绑定使得客户端套接字地址对服务器套接字可用，以便服务器进程可以通过服务器套接字与客户端进程进行通信。


    `Socket` 提供了其他构造函数。例如，`Socket()` 和 `Socket(Proxy proxy)` 会创建未绑定且未连接的套接字。在使用这些套接字之前，必须通过调用
    `void bind(SocketAddress localAddr)` 将它们绑定到本地套接字地址，然后通过调用 `Socket` 的 `connect()`
    方法（例如 `void connect(SocketAddress remoteAddr)`）建立连接。


    注意


    代理是出于安全目的位于内网和互联网之间的主机。代理设置通过 `Proxy` 类的实例表示，并帮助套接字通过代理进行通信。


    另一个构造函数是 `Socket(InetAddress dstAddress, int dstPort, InetAddress localAddr, int
    localPort)`，它允许你通过 `localAddr` 和 `localPort` 指定自己的本地主机套接字地址。此构造函数会自动绑定到本地套接字地址，然后尝试连接到
    `dstAddress` 上的远程 `dstPort`。


    创建 `Socket` 实例后，并可能在该实例上调用了 `bind()` 和 `connect()` 之后，应用程序会调用 `Socket` 的 `InputStream
    getInputStream()` 和 `OutputStream getOutputStream()` 方法来获取用于从套接字读取字节的输入流和用于向套接字写入字节的输出流。此外，当不再需要该套接字进行
    I/O 操作时，应用程序通常会调用 `Socket` 的 `void close()` 方法来关闭套接字。


    以下示例演示了如何创建一个绑定到本地主机端口 9999 的套接字，然后访问其输入和输出流——为简洁起见，忽略了异常：


    `Socket socket = new Socket("localhost", 9999);`


    `InputStream is = socket.getInputStream();`


    `OutputStream os = socket.getOutputStream();`


    `// 使用套接字执行一些工作。`


    `socket.close();`


    `ServerSocket` 支持创建服务器端套接字。为此，它声明了以下四个构造函数：


    *   `ServerSocket()`：创建一个未绑定的服务器套接字。你可以通过调用 `ServerSocket` 的两个 `bind()` 方法中的任意一个，将此套接字绑定到特定的套接字地址（客户端套接字与之通信）。绑定使得服务器套接字地址对客户端套接字可用，以便客户端进程可以通过客户端套接字与服务器进程进行通信。当尝试打开套接字时发生
    I/O 错误，此构造函数会抛出 `IOException`。

    *   `ServerSocket(int port)`：创建一个绑定到指定 `port` 值以及与主机某个 NIC 关联的 IP 地址的服务器套接字。当你向
    `port` 传递 `0` 时，会选择一个任意的端口号。可以通过调用 `int getLocalPort()` 来检索该端口号。来自客户端的传入连接请求的最大队列长度设置为
    50。如果在队列已满时收到连接请求，则该连接将被拒绝。当尝试打开套接字时发生 I/O 错误，此构造函数会抛出 `IOException`；当 `port`
    的值超出指定的有效端口值范围（0 到 65535，包括两端）时，会抛出 `IllegalArgumentException`。

    *   `ServerSocket(int port, int backlog)`：等同于前一个构造函数，但它还允许你通过向 `backlog` 传递一个正整数来指定传入连接的最大队列长度。

    *   `ServerSocket(int port, int backlog, InetAddress localAddress)`：等同于前一个构造函数，但它还允许你指定服务器套接字绑定的不同
    IP 地址。（当传递 `null` 时，会选择任意地址。）此构造函数对于拥有多个 NIC 并且希望监听特定 NIC 上的连接请求的机器非常有用。


    通过这些构造函数创建服务器套接字后，服务器应用程序会进入一个循环，该循环首先调用 `ServerSocket` 的 `Socket accept()` 方法来监听连接请求并返回一个
    `Socket` 实例，该实例允许它与关联的客户端套接字通信。然后，它与客户端套接字通信以执行某种处理。当处理完成时，服务器套接字调用客户端套接字的 `close()`
    方法来终止与客户端的连接。


    注意


    `ServerSocket` 声明了一个 `void close()` 方法，用于在终止服务器应用程序之前关闭服务器套接字。当应用程序终止时，未关闭的套接字会自动关闭。


    以下示例演示了如何创建一个绑定到当前主机端口 9999 的服务器套接字，监听传入的连接请求，返回它们的套接字，在这些套接字上执行工作，然后关闭套接字；为简洁起见，忽略了异常：


    `ServerSocket ss = new ServerSocket(9999);`


    `while (true)`


    `{`


    `Socket socket = ss.accept();`


    `// 获取套接字的输入/输出流并与套接字通信`


    `socket.close();`


    `}`


    `accept()` 方法调用会阻塞，直到有连接请求可用，然后返回一个 `Socket` 对象，以便服务器应用程序可以与其关联的客户端通信。通信完成后，套接字被关闭。当应用程序退出时，服务器套接字会自动关闭。


    此示例假设套接字通信发生在服务器应用程序的主线程上，当处理需要花费时间执行时，这会成为一个问题，因为服务器对传入连接请求的响应时间会降低。


    为了加快响应时间，通常需要在工作线程上与套接字进行通信，如下例所示：


    `ServerSocket ss = new ServerSocket(9999);`


    `while (true)`


    `{`


    `final Socket s = ss.accept();`


    `new Thread(new Runnable()`


    `{`


    `@Override`


    `public void run()`


    `{`


    `// 获取套接字的输入/输出流并`


    `// 与套接字通信`


    `try { s.close(); } catch (IOException ioe) {}`


    `}`


    `}).start();`


    `}`

