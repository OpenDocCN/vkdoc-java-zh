    backslash or forward slash (`/`) on Windows, other separators will probably result
    in `InvalidPathException`. For example, specifying `:x:y` (for some hypothetical
    file system) as a path on Windows will result in `InvalidPathException`.


    NIO.2 provides a more convenient `java.nio.file.Paths` utility class with a pair
    of class methods for returning `Path` objects:


    *   `Path get(String first, String... more)`

    *   `Path get(URI uri)`


    The first method is equivalent to calling `getPath()` on the default file system
    and returning the result:


    `return FileSystems.getDefault().getPath(first, more);`


    The second method is a bit more involved. It iterates over the installed file
    system providers to locate the provider that is identified by the given URI’s
    scheme component. When this provider is found for the `file` scheme, this method
    executes the following code:


    `return FileSystems.getDefault().provider().getPath(uri);`


    After obtaining the default file system, `FileSystem`’s `FileSystemProvider provider()`
    method is called to return the file system provider that created the `FileSystem`
    object. Then, `FileSystemProvider`’s `Path getPath(URI uri)` method is called
    to convert the URI argument to a `Path` object.


    For any other scheme, the installed providers list is searched for the first provider
    with a matching scheme. `getPath(uri)` is called on the provider.


    `get(String, String...)` throws `InvalidPathException` when a path cannot be constructed
    because of bad syntax. `get(URI)` throws `java.nio.file.FileSystemNotFoundException`
    when no `FileSystem` matches the scheme and `java.lang.IllegalArgumentException`
    for a bad URI.


    `Path` declares several methods for accessing its name elements:


    *   `Path getFileName()`: Return the name of the file denoted by this path as
    a `Path` object.

    *   `Path` `getName` `(int index)`: Return the `index`th name element in this
    path as a `Path` object. The `index` starts at 0, which represents the element
    closest to the root. The element farthest from the root is identified by one less
    than the name count.

    *   `int getNameCount()`: Return the number of name elements in the path.

    *   `Path getParent()`: Return the parent path or `null` when there is no parent.

    *   `Path getRoot()`: Return the root name element in this path as a `Path` object
    or `null` when there is no root.

    *   [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `subpath` `(int beginIndex, int endIndex)`: Return a relative path that is a subsequence
    of the name elements in this path. The first name element (closest to the root)
    is located at `beginIndex` and the last name element (farthest from the root)
    is located at one less than `endIndex`.


    Listing [12-2](#A978-1-4842-1565-4_12_Chapter.html#FPar7) presents the source
    code to an application that demonstrates path construction and these methods.


    Listing 12-2\. Constructing a Path and Accessing Its Name Elements


    `import java.nio.file.FileSystem;`


    `import java.nio.file.FileSystems;`


    `import java.nio.file.Path;`


    `public class PathDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `FileSystem fsDefault = FileSystems.getDefault();`


    `Path path = fsDefault.getPath("a", "b", "c");`


    `System.out.println(path);`


    `System.out.printf("File name: %s%n", path.getFileName());`


    `for (int i = 0; i < path.getNameCount(); i++)`


    `System.out.println(path.getName(i));`


    `System.out.printf("Parent: %s%n", path.getParent());`


    `System.out.printf("Root: %s%n", path.getRoot());`


    `System.out.printf("SubPath [0, 2): %s%n", path.subpath(0, 2));`


    `}`


    `}`


    Compile Listing [12-2](#A978-1-4842-1565-4_12_Chapter.html#FPar7) as follows:


    `javac PathDemo.java`


    Run the resulting application as follows:


    `java PathDemo`


    I observe the following output:


    `a\b\c`


    `File name: c`


    `a`


    `b`


    `c`


    `Parent: a\b`


    `Root: null`


    `SubPath [0, 2): a\b`'
