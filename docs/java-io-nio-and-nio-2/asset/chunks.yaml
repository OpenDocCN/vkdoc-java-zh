    #### 探索用户自定义视图


    除了之前的内置文件属性外，你还可以定义自己的属性。例如，你可能希望为文件系统中的对象提供一个 `description` 属性。你可以通过使用 `UserDefinedFileAttributeView`
    接口来定义属性。该接口声明了以下方法：


    *   `void delete(String name)`：删除一个用户自定义属性。

    *   `List<String> list()`：返回用户自定义属性名称的列表。

    *   `int read(String name, ByteBuffer dst)`：将用户自定义属性的值读取到缓冲区中。

    *   `int size(` [`String`](https://docs.oracle.com/javase/8/docs/api/java/lang/String.html#class%20in%20java.lang)
    `name)`：返回用户自定义属性值的大小。

    *   `int write(` [`String`](https://docs.oracle.com/javase/8/docs/api/java/lang/String.html#class%20in%20java.lang)
    `name,` [`ByteBuffer`](https://docs.oracle.com/javase/8/docs/api/java/nio/ByteBuffer.html#class%20in%20java.nio)
    `src)`：从缓冲区写入用户自定义属性的值。


    当发生 I/O 错误时，这些方法会抛出 `IOException`。当属性大小大于 `java.lang.Integer.MAX_VALUE` 时，`size()`
    会抛出 `java.lang.ArithmeticException`。对于只读的目标缓冲区，`read()` 会抛出 `IllegalArgumentException`。


    在定义自己的属性之前，你需要确定文件存储是否支持所需的属性。通过调用 `FileStore` 的 `supportsFileAttributeView()`
    方法之一来完成此任务。以下代码片段演示了这一点：


    `FileStore fs = Files.getFileStore(path);`


    `if (!fs.supportsFileAttributeView(UserDefinedFileAttributeView.class))`


    `System.out.println("User-defined attributes are supported.");`


    `else`


    `System.out.println("User-defined attributes are not supported.");`


    清单 12-19 展示了一个应用程序的源代码，该程序演示了用于将描述与文件关联的用户自定义 `file.description` 属性。


    清单 12-19\. 将描述与文件关联


