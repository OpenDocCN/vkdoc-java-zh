- fmt: "### Deleting a File Tree\n\nThe File Tree-Walking API can be used to delete\
    \ a file tree. Listing [12-46](#A978-1-4842-1565-4_12_Chapter.html#FPar65) presents\
    \ the source code to an application that accomplishes this task.\n\n**Listing\
    \ 12-46.** Deleting a File Tree\n\n```java\nimport java.io.IOException;\nimport\
    \ java.nio.file.Files;\nimport java.nio.file.FileVisitResult;\nimport java.nio.file.Path;\n\
    import java.nio.file.Paths;\nimport java.nio.file.SimpleFileVisitor;\nimport java.nio.file.attribute.BasicFileAttributes;\n\
    \npublic class Delete\n{\n   public static void main(String[] args) throws IOException\n\
    \   {\n      if (args.length != 1)\n      {\n         System.err.println(\"usage:\
    \ java Delete path\");\n         return;\n      }\n\n      class DeleteVisitor\
    \ extends SimpleFileVisitor<Path>\n      {\n         @Override\n         public\
    \ FileVisitResult postVisitDirectory(Path dir,\n                             \
    \                       IOException ioe)\n                                   \
    \                 throws IOException\n         {\n            if (ioe == null)\n\
    \               if (Files.deleteIfExists(dir))\n                  System.out.printf(\"\
    deleted directory %s%n\", dir);\n               else\n                  System.out.printf(\"\
    couldn’t delete directory %s%n\", dir);\n            else\n               throw\
    \ ioe;\n            return FileVisitResult.CONTINUE;\n         }\n\n         @Override\n\
    \         public FileVisitResult visitFile(Path file,\n                      \
    \                     BasicFileAttributes attr)\n                            \
    \               throws IOException\n         {\n            if (Files.deleteIfExists(file))\n\
    \               System.out.printf(\"deleted regular file %s%n\", file);\n    \
    \        else\n               System.out.printf(\"couldn’t delete regular file\
    \ %s%n\", file);\n            return FileVisitResult.CONTINUE;\n         }\n \
    \     }\n\n      Files.walkFileTree(Paths.get(args[0]), new DeleteVisitor());\n\
    \   }\n}\n```\n\nListing [12-46](#A978-1-4842-1565-4_12_Chapter.html#FPar65)’s\
    \ `main()` method accomplishes the delete. It first verifies that exactly one\
    \ command-line argument (identifying the file tree to be deleted) has been specified.\
    \ It then obtains the argument’s `Path` object and instantiates the `DeleteVisitor`\
    \ local class. Both objects are passed to `walkFileTree()`, which walks the file\
    \ tree rooted in this path. Symbolic links are not followed.\n\n> **Note:** `Delete`\
    \ is designed to delete symbolic links and not their targets. A symbolic link\
    \ might point to a file that exists outside of the file tree and that shouldn’t\
    \ be deleted.\n\n`DeleteVisitor` deletes a nondirectory file in its `visitFile()`\
    \ method. This method performs the deletion by calling `deleteIfExists()`. If\
    \ this method returns `true`, a message about the file being deleted is output.\
    \ Otherwise, a message about not being able to delete the file is output. (The\
    \ file could be deleted by an external process between the time it was discovered\
    \ during the walk and the time that `deleteIfExists()` is called.)\n\nBecause\
    \ a directory cannot be deleted until its regular file and other entries have\
    \ been deleted, `DeleteVisitor` deletes a directory in its `postVisitDirectory()`\
    \ method. When this method is called, all of the entries in the directory will\
    \ have been deleted. `deleteIfExists()` is called to perform the deletion.\n\n\
    `postVisitDirectory()` will only attempt to delete the directory when an exception\
    \ did not occur while visiting the nondirectory files. If an exception occurs,\
    \ the exception is re-thrown.\n\nCompile Listing [12-46](#A978-1-4842-1565-4_12_Chapter.html#FPar65)\
    \ as follows:\n\n```\njavac Delete.java\n```\n\nAssume the following file tree\
    \ in the current directory:\n\n```\nsales\n  joe\n    2015\n      q1\n       \
    \ sales.txt\n```\n\nRun the resulting application as follows:\n\n```\njava Delete\
    \ sales\n```\n\nYou should observe the following output:\n\n```\ndeleted regular\
    \ file sales\\joe\\2015\\q1\\sales.txt\ndeleted directory sales\\joe\\2015\\q1\n\
    deleted directory sales\\joe\\2015\ndeleted directory sales\\joe\ndeleted directory\
    \ sales\n```\n\n### Moving a File Tree\n\nThe File Tree-Walking API can be used\
    \ to move a file tree. Listing [12-47](#A978-1-4842-1565-4_12_Chapter.html#FPar67)\
    \ presents the source code to an application that accomplishes this task.\n\n\
    **Listing 12-47.** Moving a File Tree\n\n```java\nimport java.io.IOException;\n\
    import java.nio.file.Files;\nimport java.nio.file.FileVisitResult;\nimport java.nio.file.Path;\n\
    import java.nio.file.Paths;\nimport java.nio.file.SimpleFileVisitor;\nimport java.nio.file.StandardCopyOption;\n\
    import java.nio.file.attribute.BasicFileAttributes;\n\npublic class Move\n{\n\
    \   public static void main(String[] args) throws IOException\n   {\n      if\
    \ (args.length != 2)\n      {\n         System.err.println(\"usage: java Move\
    \ srcpath destpath\");\n         return;\n      }\n\n      class MoveVisitor extends\
    \ SimpleFileVisitor<Path>\n      {\n         private Path srcPath, dstPath;\n\n\
    \         MoveVisitor(Path srcPath, Path dstPath)\n         {\n            this.srcPath\
    \ = srcPath;\n            this.dstPath = dstPath;\n         }\n\n         @Override\n\
    \         public FileVisitResult postVisitDirectory(Path dir,\n              \
    \                                      IOException ioe)\n                    \
    \                                throws IOException\n         {\n            if\
    \ (ioe == null)\n               Files.delete(dir);\n            else\n       \
    \        throw ioe;\n            return FileVisitResult.CONTINUE;\n         }\n\
    \n         @Override\n         public FileVisitResult preVisitDirectory(Path dir,\n\
    \                                                   BasicFileAttributes attrs)\n\
    \                                                   throws IOException\n     \
    \    {\n            Path targetPath = dstPath.resolve(srcPath.relativize(dir));\n\
    \            Files.copy(dir, targetPath, StandardCopyOption.REPLACE_EXISTING,\n\
    \                       StandardCopyOption.COPY_ATTRIBUTES);\n            return\
    \ FileVisitResult.CONTINUE;\n         }\n\n         @Override\n         public\
    \ FileVisitResult visitFile(Path file,\n                                     \
    \      BasicFileAttributes attr)\n                                           throws\
    \ IOException\n         {\n            Path targetPath = dstPath.resolve(srcPath.relativize(file));\n\
    \            Files.move(file, targetPath,\n                       StandardCopyOption.REPLACE_EXISTING,\n\
    \                       StandardCopyOption.ATOMIC_MOVE);\n            return FileVisitResult.CONTINUE;\n\
    \         }\n      }\n\n      Path src = Paths.get(args[0]);\n      Path dst =\
    \ Paths.get(args[1]);\n      Files.walkFileTree(src, new MoveVisitor(src, dst));\n\
    \   }\n}\n```\n\nListing [12-47](#A978-1-4842-1565-4_12_Chapter.html#FPar67)’s\
    \ `main()` method accomplishes the move. It first verifies that exactly two command-line\
    \ arguments (identifying the file tree to be moved and its new location) have\
    \ been specified. It then obtains each argument’s `Path` object and instantiates\
    \ the `MoveVisitor` local class, passing the source and destination `Path` objects\
    \ to `MoveVisitor`’s constructor. Lastly, `main()` calls `walkFileTree()` to walk\
    \ the file tree rooted in the source path. Symbolic links are not followed.\n\n\
    Before a directory’s entries can be moved, the directory must be moved. `MoveVisitor`’s\
    \ `preVisitDirectory()` method accomplishes this task. You might think that you\
    \ could use the `move()` method instead. However, when `move()` is invoked to\
    \ move a nonempty directory, the directory is moved only when it doesn’t require\
    \ moving the directory’s entries. When the entries must be moved, this method\
    \ fails (by throwing `IOException`). The solution is to use the `copy()` method,\
    \ which does the following: when the file is a directory, `copy()` creates an\
    \ empty directory in the target location (entries in the directory are not copied).\n\
    \n`copy()` is called with the `REPLACE_EXISTING` and `COPY_ATTRIBUTES` options.\
    \ `REPLACE_EXISTING` configures the copy as follows: when the target exists, the\
    \ target is replaced when it’s not a nonempty directory. When the target exists\
    \ and is a symbolic link, the symbolic link itself and not the target of the link\
    \ is replaced. `COPY_ATTRIBUTES` attempts to copy the attributes associated with\
    \ the directory to the target. The exact file attributes that are copied are file\
    \ system-dependent and therefore unspecified. Minimally, `lastModifiedTime` is\
    \ copied to the target when supported by both the source and target file stores.\
    \ The copying of timestamps may result in precision loss."
