- fmt: "### Marking Buffers\n\nYou can mark a buffer by invoking the `mark()` method\
    \ and later return to the marked position by invoking `reset()`. For example,\
    \ suppose you’ve executed `ByteBuffer buffer = ByteBuffer.allocate(7);`, followed\
    \ by `buffer.put((byte) 10).put((byte) 20).put((byte) 30).put((byte) 40);`, followed\
    \ by `buffer.limit(4);`. The current position and limit are set to `4`.\n\nContinuing,\
    \ suppose you execute `buffer.position(1).mark().position(3);`. Figure [6-4](#A978-1-4842-1565-4_6_Chapter.html#Fig4)\
    \ reveals the buffer state at this point.\n\n![A978-1-4842-1565-4_6_Fig4_HTML.jpg](A978-1-4842-1565-4_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4. The mark has been set to position 1\n\nIf you sent this buffer to\
    \ a channel, byte 40 would be sent (the current position is `3` because of `position(3)`)\
    \ and the position would advance to `4`. If you subsequently executed `buffer.reset();`\
    \ and sent this buffer to the channel, the position would be set to the mark (`1`)\
    \ and bytes 20, 30, and 40 (all bytes from the current position to one position\
    \ below the limit) would be sent to the channel (and in that order).\n\nListing\
    \ [6-5](#A978-1-4842-1565-4_6_Chapter.html#FPar11) demonstrates this mark/reset\
    \ scenario.\n\n**Listing 6-5.** Marking the Current Buffer Position and Resetting\
    \ the Current Position to the Marked Position\n\n```\nimport java.nio.ByteBuffer;\n\
    \npublic class BufferDemo\n{\n   public static void main(String[] args)\n   {\n\
    \      ByteBuffer buffer = ByteBuffer.allocate(7);\n      buffer.put((byte) 10).put((byte)\
    \ 20).put((byte) 30).put((byte) 40);\n      buffer.limit(4);\n      buffer.position(1).mark().position(3);\n\
    \      System.out.println(buffer.get());\n      System.out.println();\n      buffer.reset();\n\
    \      while (buffer.hasRemaining())\n         System.out.println(buffer.get());\n\
    \   }\n}\n```\n\nCompile Listing [6-5](#A978-1-4842-1565-4_6_Chapter.html#FPar11)\
    \ (`javac BufferDemo.java`) and run this application (`java BufferDemo`). You\
    \ should observe the following output:\n\n```\n40\n\n20\n30\n40\n```\n\n**Caution:**\
    \ Don’t confuse `reset()` with `clear()`. The `clear()` method marks a buffer\
    \ as empty whereas `reset()` changes the buffer’s current position to the previously\
    \ set mark, or throws `InvalidMarkException` when there’s no previously set mark.\n\
    \n### Buffer Subclass Operations\n\n`ByteBuffer` and the other primitive-type\
    \ buffer classes declare a `compact()` method that’s useful for compacting a buffer\
    \ by copying all bytes between the current position and the limit to the beginning\
    \ of the buffer. The byte at index `p = position()` is copied to index `0`, the\
    \ byte at index `p + 1` is copied to index `1`, and so on until the byte at index\
    \ `limit() - 1` is copied to index `n = limit() - 1 - p`. The buffer’s current\
    \ position is then set to `n + 1` and its limit is set to its capacity. The mark,\
    \ when defined, is discarded.\n\nYou invoke `compact()` after writing data from\
    \ a buffer to handle situations where not all of the buffer’s content is written.\
    \ Consider the following example, which copies content from an `in` channel to\
    \ an `out` channel via buffer `buf`:\n\n```\nbuf.clear(); // Prepare buffer for\
    \ use\nwhile (in.read(buf) != -1)\n{\n   buf.flip(); // Prepare buffer for draining.\n\
    \   out.write(buf); // Write the buffer.\n   buf.compact(); // Do this in case\
    \ of a partial write.\n}\n```\n\nThe `compact()` method call moves unwritten buffer\
    \ data to the beginning of the buffer so that the next `read()` method call appends\
    \ read data to the buffer’s data instead of overwriting that data when `compact()`\
    \ isn’t specified.\n\nYou may occasionally need to compare buffers for equality\
    \ or order. All `Buffer` subclasses except for `ByteBuffer`’s `MappedByteBuffer`\
    \ subclass override the `equals()` and `compareTo()` methods to perform these\
    \ comparisons—`MappedByteBuffer` inherits these methods from its `ByteBuffer`\
    \ superclass. The following example shows you how to compare the byte buffers\
    \ `bytBuf1` and `bytBuf2` for equality and ordering:\n\n```\nSystem.out.println(bytBuf1.equals(bytBuf2));\n\
    System.out.println(bytBuf1.compareTo(bytBuf2));\n```\n\nThe `equals()` contract\
    \ for `ByteBuffer` states that two byte buffers are equal if and only if they\
    \ have the same element type; they have the same number of remaining elements;\
    \ and the two sequences of remaining elements, considered independently of their\
    \ starting positions, are individually equal. This contract is the same for the\
    \ other `Buffer` subclasses.\n\nThe `compareTo()` method for `ByteBuffer` states\
    \ that two byte buffers are compared for order by comparing their sequences of\
    \ remaining elements lexicographically, without regard to the starting position\
    \ of each sequence within its corresponding buffer. Pairs of byte elements are\
    \ compared as if by invoking `Byte.compare(byte, byte)`. Similar descriptions\
    \ apply to the other `Buffer` subclasses."
