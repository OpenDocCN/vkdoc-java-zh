- fmt: "### Reading Files\n\n`Files`类通过声明以下方法来支持读取常规文件内容，这些方法用于将所有字节或所有文本行读入内存：\n\n\
    - `byte[] readAllBytes(Path path)`\n- `List<String> readAllLines(Path path)`\n\
    - `List<String> readAllLines(Path path, Charset cs)`\n\n`readAllBytes(Path path)`读取由`path`标识的文件内容到字节数组中，并返回该数组。它确保在读取所有字节后关闭文件。当从文件读取时发生I/O错误，会抛出`IOException`；当无法分配所需大小的数组时（例如文件超过2GB），会抛出`java.lang.OutOfMemoryError`。`readAllBytes()`适用于简单场景，即方便将所有字节读入字节数组的情况，不适用于读取大文件。\n\
    \n`readAllLines(Path path)`的行为等同于指定`Files.readAllLines(path, java.nio.charset.StandardCharsets.UTF_8);`。\n\
    \n`readAllLines(Path path, Charset cs)`从由`path`标识的文件中读取所有行到字符串列表中，并返回该列表。文件中的字节使用字符集`cs`解码为字符。它目前将回车符（`\\\
    u000D`）、换行符（`\\u000A`）或回车符后跟换行符识别为行终止符。此外，它确保在读取所有行后关闭文件。当从文件读取时发生I/O错误，或读取到格式错误或不可映射的字节序列时，会抛出`IOException`。`readAllLines()`适用于简单场景，即方便在单次操作中读取所有行的情况，不适用于读取大文件。\n\
    \n清单[12-24](#A978-1-4842-1565-4_12_Chapter.html#FPar38)描述了一个使用`readAllLines(Path\
    \ path)`从文本文件读取所有行的应用程序。这些行随后被输出。\n\n**清单12-24. 将文本文件转储到标准输出流**\n\n```\nimport\
    \ java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
    import java.util.List;\n\npublic class DumpText\n{\n   public static void main(String[]\
    \ args) throws IOException\n   {\n      if (args.length != 1)\n      {\n     \
    \    System.err.println(\"usage: java DumpText textfilepath\");\n         return;\n\
    \      }\n      List<String> lines = Files.readAllLines(Paths.get(args[0]));\n\
    \      for (String line: lines)\n         System.out.println(line);\n   }\n}\n\
    ```\n\n按如下方式编译清单[12-24](#A978-1-4842-1565-4_12_Chapter.html#FPar38)：\n\n`javac\
    \ DumpText.java`\n\n按如下方式运行生成的应用程序：\n\n`java DumpText DumpText.java`\n\n你应该会在标准输出流上看到清单[12-24](#A978-1-4842-1565-4_12_Chapter.html#FPar38)的副本。如果你尝试转储二进制文件，可能会发现一条`java.nio.charset.MalformedInputException`消息。\n\
    \n前述方法仅限于将较小的文件读入内存。对于非常大的文件，`Files`提供了以下方法：\n\n- `BufferedReader newBufferedReader(Path\
    \ path)`\n- `BufferedReader newBufferedReader(Path path, Charset cs)`\n- `InputStream\
    \ newInputStream(Path path, OpenOption... options)`\n\n`newBufferedReader(Path\
    \ path)`的行为等同于指定`Files.newBufferedReader(path, StandardCharsets.UTF_8);`。\n\n\
    `newBufferedReader(Path path, Charset cs)`打开由`path`标识的文件，并返回一个`java.io.BufferedReader`（使用默认缓冲区大小），可用于高效地从文件中读取文本。文件中的字节使用字符集`cs`解码为字符。读取从文件开头开始。当发生I/O错误时，会抛出`IOException`。当`BufferedReader`的`read()`方法读取到格式错误或不可映射的字节序列时，也会抛出此异常。\n\
    \n`newInputStream(Path path, OpenOption... options)`打开由`path`标识的文件，返回一个`java.io.InputStream`用于从文件读取。该流不会被缓冲，并且不需要支持`mark()`或`reset()`方法。该流对于多个并发线程的访问是安全的。读取从文件开头开始。\n\
