    \ output isn’t concatenated into one long string.\n\n## Summary\n\nJDK 5 introduced\
    \ the `Formatter` class as an interpreter for `printf()`-style format strings.\
    \ This class provides support for layout justification and alignment; common formats\
    \ for numeric, string, and date/time data; and more. Commonly used Java types\
