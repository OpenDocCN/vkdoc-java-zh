  raw: '### Buffer Writing and Reading


    `ByteBuffer` and the other primitive-type buffer classes declare several overloaded
    `put()` and `get()` methods for writing data items to and reading data items from
    a buffer. These methods are absolute when they require an index argument or relative
    when they don’t require an index.


    For example, `ByteBuffer` declares the absolute `ByteBuffer put(int index, byte
    b)` method to store byte `b` in the buffer at the `index` value and the absolute
    `byte get(int index)` method to fetch the byte located at position `index`. This
    class also declares the relative `ByteBuffer put(byte b)` method to store byte
    `b` in the buffer at the current position and then increment the current position,
    and the relative `byte get()` method to fetch the byte located at the buffer’s
    current position and increment the current position.


    The absolute `put()` and `get()` methods throw `IndexOutOfBoundsException` when
    `index` is negative or greater than or equal to the buffer’s limit. The relative
    `put()` method throws `java.nio.BufferOverflowException` when the current position
    is greater than or equal to the limit, and the relative `get()` method throws
    `java.nio.BufferUnderflowException` when the current position is greater than
    or equal to the limit. Furthermore, the absolute and relative `put()` methods
    throw `ReadOnlyBufferException` when the buffer is read-only.


    Listing [6-3](#A978-1-4842-1565-4_6_Chapter.html#FPar7) demonstrates the relative
    `put()` method and the absolute `get()` method.


    Listing 6-3\. Writing Bytes to and Reading Them from a Buffer


    `import java.nio.ByteBuffer;`


    `public class BufferDemo`


    `{`


       `public static void main(String[] args)`


       `{`


          `ByteBuffer buffer = ByteBuffer.allocate(7);`


          `System.out.println("Capacity = " + buffer.capacity());`


          `System.out.println("Limit = " + buffer.limit());`


          `System.out.println("Position = " + buffer.position());`


          `System.out.println("Remaining = " + buffer.remaining());`


          `buffer.put((byte) 10).put((byte) 20).put((byte) 30);`


          `System.out.println("Capacity = " + buffer.capacity());`


          `System.out.println("Limit = " + buffer.limit());`


          `System.out.println("Position = " + buffer.position());`


          `System.out.println("Remaining = " + buffer.remaining());`


          `for (int i = 0; i < buffer.position(); i++)`


             `System.out.println(buffer.get(i));`


       `}`


    `}`


    Compile Listing [6-3](#A978-1-4842-1565-4_6_Chapter.html#FPar7) (`javac BufferDemo.java`)
    and run this application (`java BufferDemo`). You should observe the following
    output:


    `Capacity = 7`


    `Limit = 7`


    `Position = 0`


    `Remaining = 7`


    `Capacity = 7`


    `Limit = 7`


    `Position = 3`


    `Remaining = 4`


    `10`


    `20`


    `30`


    Figure [6-2](#A978-1-4842-1565-4_6_Chapter.html#Fig2) illustrates the state of
    the buffer following the three `put()` method calls and presented in the previous
    output.


    ![A978-1-4842-1565-4_6_Fig2_HTML.jpg](A978-1-4842-1565-4_6_Fig2_HTML.jpg)


    Figure 6-2.


    The buffer can store four more data items before reaching its capacity


    The subsequent calls to the absolute `get()` method don’t change the position,
    which remains set to `3`.


    Tip


    For maximum efficiency, you can perform bulk data transfers by using the `ByteBuffer
    put(byte[] src)`, `ByteBuffer put(byte[] src, int offset, int length)`, `ByteBuffer
    get(byte[] dst)`, and `ByteBuffer get(byte[] dst, int offset, int length)` methods
    to write and read an array of bytes.


    ### Flipping Buffers


    After filling a buffer, you must prepare it for draining by a channel. When you
    pass the buffer as is, the channel accesses undefined data beyond the current
    position.


    To solve this problem, you could reset the position to `0`, but how would the
    channel know when the end of the inserted data had been reached? The solution
    is to work with the limit property, which indicates the end of the active portion
    of the buffer. Basically, you set the limit to the current position and then reset
    the current position to `0`.


    You could accomplish this task by executing the following code, which also clears
    any defined mark:


    `buffer.limit(buffer.position()).position(0);`


    However, there’s an easier way to accomplish the same task, as shown here:


    `buffer.flip();`


    In either case, the buffer is ready to be drained.


    Assuming that `buffer.flip();` is executed at the end of Listing [6-3](#A978-1-4842-1565-4_6_Chapter.html#FPar7)’s
    `main()` method, Figure [6-3](#A978-1-4842-1565-4_6_Chapter.html#Fig3) reveals
    what the buffer state would look like after calling `flip()`.


    ![A978-1-4842-1565-4_6_Fig3_HTML.jpg](A978-1-4842-1565-4_6_Fig3_HTML.jpg)


    Figure 6-3.


    The buffer is ready to be drained


    A call to `buffer.remaining()` would return `3`. This value indicates the number
    of bytes available for draining (10, 20, and 30).


    Listing [6-4](#A978-1-4842-1565-4_6_Chapter.html#FPar9) provides another buffer-flipping
    demonstration, which uses a character buffer.


    Listing 6-4\. Writing Characters to and Reading Them from a Character Buffer


    `import java.nio.CharBuffer;`


    `public class BufferDemo`


    `{`


       `public static void main(String[] args)`


       `{`


          `String[] poem =`


          `{`


             `"Roses are red",`


             `"Violets are blue",`


             `"Sugar is sweet",`


             `"And so are you."`


          `};`


          `CharBuffer buffer = CharBuffer.allocate(50);`


          `for (int i = 0; i < poem.length; i++)`


          `{`


             `// Fill the buffer.`


             `for (int j = 0; j < poem[i].length(); j++)`


                `buffer.put(poem[i].charAt(j));`


             `// Flip the buffer so that its contents can be read.`


             `buffer.flip();`


             `// Drain the buffer.`


             `while (buffer.hasRemaining())`


                `System.out.print(buffer.get());`


             `// Empty the buffer to prevent BufferOverflowException.`


             `buffer.clear();`


             `System.out.println();`


          `}`


       `}`


    `}`


    Compile Listing [6-4](#A978-1-4842-1565-4_6_Chapter.html#FPar9) (`javac BufferDemo.java`)
    and run this application (`java BufferDemo`). You should observe the following
    output:


    `Roses are red`


    `Violets are blue`


    `Sugar is sweet`


    `And so are you.`


    Note


    `rewind()` is similar to `flip()` but ignores the limit. Also, calling `flip()`
    twice doesn’t return you to the original state. Instead, the buffer has a zero
    size. Calling a `put()` method results in `BufferOverflowException`, and calling
    a `get()` method results in `BufferUnderflowException` or (in the case of `get(int)`),
    `IndexOutOfBoundsException`.'
  trans: '

    ### 缓冲区的写入与读取


    `ByteBuffer` 和其他基本类型缓冲区类声明了几个重载的 `put()` 和 `get()` 方法，用于向缓冲区写入数据项以及从缓冲区读取数据项。这些方法在需要索引参数时是**绝对**的，在不需要索引时是**相对**的。


    例如，`ByteBuffer` 声明了绝对方法 `ByteBuffer put(int index, byte b)`，用于将字节 `b` 存储在缓冲区中
    `index` 值指定的位置；以及绝对方法 `byte get(int index)`，用于获取位于 `index` 位置的字节。该类还声明了相对方法 `ByteBuffer
    put(byte b)`，用于将字节 `b` 存储在缓冲区的当前位置，然后递增当前位置；以及相对方法 `byte get()`，用于获取缓冲区当前位置的字节并递增当前位置。


    当 `index` 为负数或大于等于缓冲区的界限时，绝对 `put()` 和 `get()` 方法会抛出 `IndexOutOfBoundsException`。当当前位置大于等于界限时，相对
    `put()` 方法会抛出 `java.nio.BufferOverflowException`；当当前位置大于等于界限时，相对 `get()` 方法会抛出
    `java.nio.BufferUnderflowException`。此外，当缓冲区为只读时，绝对和相对 `put()` 方法都会抛出 `ReadOnlyBufferException`。


    清单 6-3 演示了相对 `put()` 方法和绝对 `get()` 方法。


    **清单 6-3.** 向缓冲区写入字节并从缓冲区读取字节


    `import java.nio.ByteBuffer;`


    `public class BufferDemo`


    `{`


       `public static void main(String[] args)`


       `{`


          `ByteBuffer buffer = ByteBuffer.allocate(7);`


          `System.out.println("Capacity = " + buffer.capacity());`


          `System.out.println("Limit = " + buffer.limit());`


          `System.out.println("Position = " + buffer.position());`


          `System.out.println("Remaining = " + buffer.remaining());`


          `buffer.put((byte) 10).put((byte) 20).put((byte) 30);`


          `System.out.println("Capacity = " + buffer.capacity());`


          `System.out.println("Limit = " + buffer.limit());`


          `System.out.println("Position = " + buffer.position());`


          `System.out.println("Remaining = " + buffer.remaining());`


          `for (int i = 0; i < buffer.position(); i++)`


             `System.out.println(buffer.get(i));`


       `}`


    `}`


    编译清单 6-3（`javac BufferDemo.java`）并运行此应用程序（`java BufferDemo`）。您应该会看到以下输出：


    `Capacity = 7`


    `Limit = 7`


    `Position = 0`


    `Remaining = 7`


    `Capacity = 7`


    `Limit = 7`


    `Position = 3`


    `Remaining = 4`


    `10`


    `20`


    `30`


    图 6-2 展示了在三次 `put()` 方法调用后缓冲区的状态，如之前的输出所示。


    ![A978-1-4842-1565-4_6_Fig2_HTML.jpg](img/A978-1-4842-1565-4_6_Fig2_HTML.jpg)


    **图 6-2.** 缓冲区在达到其容量之前还可以存储四个数据项


    随后对绝对 `get()` 方法的调用不会改变位置，该位置仍保持为 `3`。


    **提示**


    为了获得最大效率，您可以通过使用 `ByteBuffer put(byte[] src)`、`ByteBuffer put(byte[] src, int
    offset, int length)`、`ByteBuffer get(byte[] dst)` 和 `ByteBuffer get(byte[] dst,
    int offset, int length)` 方法来执行批量数据传输，以写入和读取字节数组。


    ### 翻转缓冲区


    填充缓冲区后，您必须准备它以便通道进行排空。如果您按原样传递缓冲区，通道将访问当前位置之后的未定义数据。


    为了解决这个问题，您可以将位置重置为 `0`，但是通道如何知道已插入数据的结束位置呢？解决方案是使用界限属性，它指示缓冲区活动部分的结束位置。基本上，您将界限设置为当前位置，然后将当前位置重置为
    `0`。


    您可以通过执行以下代码来完成此任务，该代码还会清除任何已定义的标记：


    `buffer.limit(buffer.position()).position(0);`


    但是，有一种更简单的方法可以完成相同的任务，如下所示：


    `buffer.flip();`


    无论哪种情况，缓冲区都已准备好被排空。


    假设在清单 6-3 的 `main()` 方法末尾执行了 `buffer.flip();`，图 6-3 显示了调用 `flip()` 后缓冲区的状态。


    ![A978-1-4842-1565-4_6_Fig3_HTML.jpg](img/A978-1-4842-1565-4_6_Fig3_HTML.jpg)


    **图 6-3.** 缓冲区已准备好被排空


    调用 `buffer.remaining()` 将返回 `3`。此值表示可用于排空的字节数（10、20 和 30）。


    清单 6-4 提供了另一个缓冲区翻转演示，该演示使用了字符缓冲区。


    **清单 6-4.** 向字符缓冲区写入字符并从字符缓冲区读取字符


    `import java.nio.CharBuffer;`


    `public class BufferDemo`


    `{`


       `public static void main(String[] args)`


       `{`


          `String[] poem =`


          `{`


             `"Roses are red",`


             `"Violets are blue",`


             `"Sugar is sweet",`


             `"And so are you."`


          `};`


          `CharBuffer buffer = CharBuffer.allocate(50);`


          `for (int i = 0; i < poem.length; i++)`


          `{`


             `// 填充缓冲区。`


             `for (int j = 0; j < poem[i].length(); j++)`


                `buffer.put(poem[i].charAt(j));`


             `// 翻转缓冲区，以便可以读取其内容。`


             `buffer.flip();`


             `// 排空缓冲区。`


             `while (buffer.hasRemaining())`


                `System.out.print(buffer.get());`


             `// 清空缓冲区以防止 BufferOverflowException。`


             `buffer.clear();`


             `System.out.println();`


          `}`


       `}`


    `}`


    编译清单 6-4（`javac BufferDemo.java`）并运行此应用程序（`java BufferDemo`）。您应该会看到以下输出：


    `Roses are red`


    `Violets are blue`


    `Sugar is sweet`


    `And so are you.`


    **注意**


    `rewind()` 类似于 `flip()`，但会忽略界限。此外，两次调用 `flip()` 不会使您回到原始状态。相反，缓冲区的大小变为零。调用 `put()`
    方法会导致 `BufferOverflowException`，调用 `get()` 方法会导致 `BufferUnderflowException` 或（在
    `get(int)` 的情况下）`IndexOutOfBoundsException`。

