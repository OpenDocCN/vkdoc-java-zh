- fmt: "\nThe first thing to notice about the output is that each `format()` call\
    \ appends formatted output to the previously formatted output. The second thing\
    \ to notice is that `java.util.MissingFormatArgumentException` is thrown when\
    \ you don’t specify a needed argument.\n\n**Note**\n\n`MissingFormatArgumentException`\
    \ is one of several formatter exception types, which subtype `java.util.IllegalFormatException`.\n\
    \nIf you aren’t happy with this concatenated output, there are two ways to solve\
    \ the problem:\n\n* Instantiate a new `Formatter` instance, as in `formatter =\
    \ new Formatter();`, before calling `format()`. This ensures that a new default\
    \ and empty string builder is created.\n* Create your own `StringBuilder` instance\
    \ and pass it to a constructor such as `Formatter(Appendable a)`. After outputting\
    \ the formatted content, invoke `StringBuilder`’s `void setLength(int newLength)`\
    \ method with `0` as the argument to erase the previous content.\n\nIt’s cumbersome\
    \ to have to create and manage a `Formatter` object when all you want to do is\
    \ achieve something equivalent to the C language’s `printf()` function. Java addresses\
    \ this situation by adding `format()` and the equivalent `printf()` methods to\
    \ the `java.io.PrintStream` class.\n\nOf the various formatter-oriented methods\
    \ added to `PrintStream`, you’ll often invoke `PrintStream.printf(String format,\
    \ Object... args)`. After sending its formatted content to the print stream, this\
    \ method returns a reference to this stream so that you can chain method calls\
    \ together.\n\nListing [11-2](#A978-1-4842-1565-4_11_Chapter.html#FPar4) provides\
    \ a small `printf()` demonstration.\n\n**Listing 11-2.** Formatting via `printf()`\n\
    \n```\npublic class FormatterDemo\n{\n   public static void main(String[] args)\n\
    \   {\n      System.out.printf(\"%04X%n\", 478);\n      System.out.printf(\"Current\
    \ date: %1$tb %1$te, %1$tY%n\",\n                        System.currentTimeMillis());\n\
    \   }\n}\n```\n\nListing [11-2](#A978-1-4842-1565-4_11_Chapter.html#FPar4)’s `main()`\
    \ method invokes `System.out.printf()` twice. The first invocation formats 32-bit\
    \ integer `478` into a four-digit hexadecimal string with a leading zero and uppercase\
    \ hexadecimal digits. The second invocation formats the current millisecond value\
    \ returned from `System.currentTimeMillis()` into a date. The `tb` conversion\
    \ specifies an abbreviated month name (such as Jan), the `te` conversion specifies\
    \ the day of the month (such as 1 through 31), and the `tY` conversion specifies\
    \ the year (formatted with at least four digits, with leading 0s as necessary).\n\
    \nCompile Listing [11-2](#A978-1-4842-1565-4_11_Chapter.html#FPar4) (`javac FormatterDemo.java`)\
    \ and run the application (`java FormatterDemo`). You should observe output similar\
    \ to the output shown here:\n\n```\n01DE\nCurrent date: Jul 28, 2015\n```\n\n\
    **Note**\n\nFor more information on `Formatter` and its supported format specifiers,\
    \ check out `Formatter`’s Java documentation.\n\n## Exploring Formattable and\
    \ FormattableFlags\n\n`Formatter` is accompanied by a `java.util.Formattable`\
    \ interface and a `java.util.FormattableFlags` class that collectively support\
    \ limited formatting customization for arbitrary user-defined types.\n\n`Formattable`\
    \ is implemented by any class that needs to perform custom formatting using `Formatter`’s\
    \ “`s`” (format argument as string) conversion character. This interface allows\
    \ basic control for formatting arbitrary objects.\n\n`Formattable` declares the\
    \ following method, which is called by `Formatter`’s `format()` methods to perform\
    \ custom formatting:\n\n```\nvoid formatTo(Formatter formatter, int flags, int\
    \ width, int precision)\n```\n\nThese parameters have the following meanings:\n\
    \n* `formatter` is the `Formatter` object that holds the locale and is where you\
    \ send the output when it’s done.\n* `flags` is a bitmask of `FormattableFlags`\
    \ constants: `ALTERNATE` (the user specified `#` for alternate formatting), `LEFT_JUSTIFY`\
    \ (the user specified `-` for left justification), and `UPPERCASE` (the user specified\
    \ `S` for locale-based conversion to uppercase).\n* `width` is the minimum number\
    \ of characters to be written to the output. If the length of the converted value\
    \ is less than the width, the output will be padded by space characters until\
    \ the total number of characters equals the width. By default, the padding is\
    \ at the beginning of the output. If `FormattableFlags.LEFT_JUSTIFY` is specified,\
    \ the padding will be at the end. If width is `-1`, there is no minimum.\n* `precision`\
    \ is the maximum number of characters to be written to the output. Because the\
    \ precision is applied before the width, the output will be truncated to precision\
    \ characters even when the width is greater than the precision. If precision is\
    \ `-1`, there is no explicit limit on the number of characters in the output.\n\
    \nThe `width` and `precision` parameters may seem confusing. To help you understand\
    \ them, consider the following examples:\n\n```\nSystem.out.printf(\"[%10.2s]%n\"\
