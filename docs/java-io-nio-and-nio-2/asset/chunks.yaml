    I/O 错误时抛出 `IOException`。


    清单 5-1 展示了一个演示 `FileWriter`、`FileReader` 以及这些方法的简短应用程序。


    清单 5-1. 演示 `FileWriter` 和 `FileReader` 类


    `import java.io.FileReader;`


    `import java.io.FileWriter;`


    `import java.io.IOException;`


    `public class FWFRDemo`


    `{`


       `final static String MSG = "Test message";`


       `public static void main(String[] args) throws IOException`


       `{`


          `try (FileWriter fw = new FileWriter("temp"))`


          `{`


             `fw.write(MSG, 0, MSG.length());`


          `}`


          `char[] buf = new char[MSG.length()];`


          `try (FileReader fr = new FileReader("temp"))`


          `{`


             `fr.read(buf, 0, MSG.length());`


             `System.out.println(buf);`


          `}`


       `}`


    `}`


    `FWFRDemo` 首先创建一个连接到名为 `temp` 的文件的 `FileWriter` 实例。然后它调用 `void write(` [`String`](http://docs.oracle.com/javase/7/docs/api/java/lang/String.html#class%20in%20java.lang)
    `str, int off, int len)` 向该文件写入一条消息。`try`-with-resources 语句会在该操作后自动关闭文件。


    接下来，`FWFRDemo` 创建一个用于存储一行文本的缓冲区，然后创建一个连接到 `temp` 的 `FileReader` 实例。接着它调用 `int
    read(char[] cbuf, int off, int len)` 读取之前写入的消息，并将其输出到标准输出流。然后文件被关闭。


    按如下方式编译清单 5-1：


    `javac FWFRDemo.java`


    按如下方式运行此应用程序：


    `java FWFRDemo`


    你应该会看到以下输出（以及一个名为 `temp` 的文件）：


    `Test message`


    ## BufferedWriter 和 BufferedReader


    `BufferedWriter` 将文本写入字符输出流（一个 `Writer` 实例），并对字符进行缓冲，以便高效地写入单个字符、数组和字符串。调用以下任一构造函数来构造一个缓冲写入器：


    *   `BufferedWriter(` [`Writer`](http://docs.oracle.com/javase/7/docs/api/java/io/Writer.html#class%20in%20java.io)
    `out)`

    *   `BufferedWriter(` [`Writer`](http://docs.oracle.com/javase/7/docs/api/java/io/Writer.html#class%20in%20java.io)
    `out, int size)`


    可以指定缓冲区 `size`，也可以接受默认大小（8,192 字节）。对于大多数用途而言，默认大小已经足够。


    `BufferedWriter` 包含一个方便的 `void newLine()` 方法，用于写入行分隔符字符串，从而有效地终止当前行。


    `BufferedReader` 从字符输入流（一个 `Reader` 实例）读取文本，并对字符进行缓冲，以便高效地读取字符、数组和行。调用以下任一构造函数来构造一个缓冲读取器：


    *   `BufferedReader(` [`Reader`](http://docs.oracle.com/javase/7/docs/api/java/io/Reader.html#class%20in%20java.io)
    `in)`

    *   `BufferedReader(` [`Reader`](http://docs.oracle.com/javase/7/docs/api/java/io/Reader.html#class%20in%20java.io)
    `in, int size)`


    可以指定缓冲区 `size`，也可以使用默认大小（8,192 字节）。对于大多数用途而言，默认大小已经足够。


    `BufferedReader` 包含一个方便的 [`String`](http://docs.oracle.com/javase/7/docs/api/java/lang/String.html#class%20in%20java.lang)
    `readLine()` 方法，用于读取一行文本，不包括任何行终止字符。


    清单 5-2 展示了一个演示 `BufferedWriter`、`BufferedReader` 以及这些方法的简短应用程序。


    清单 5-2. 演示 `BufferedWriter` 和 `BufferedReader` 类


