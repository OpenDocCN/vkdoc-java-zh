  raw: '## Summary


    Text-processing applications often need to match text against patterns. NIO includes
    regular expressions to help these applications perform pattern matching with high
    performance. Java supports regular expressions by providing the `Pattern`, `PatternSyntaxException`,
    and `Matcher` classes.


    In this chapter, you explored `Pattern`, `PatternSyntaxException`, and `Matcher`.
    You then learned about character classes, capturing groups, boundary matchers
    and zero-length matches, and quantifiers. Finally, you observed a practical use
    case for regexes: phone number matching.


    [Chapter 10](#A978-1-4842-1565-4_10_Chapter.html) presents NIO’s support for charsets.


    # 10. Charsets


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​10](http://dx.doi.org/10.1007/978-1-4842-1565-4_10))
    contains supplementary material, which is available to authorized users.


    In [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html), I briefly introduced the concepts
    of character set and character encoding. I also referred to some of the types
    located in the `java.nio.charset` package. In this chapter, I expand on these
    topics and explore this package. I also discuss the part of the `java.lang.String`
    class that’s relevant to these topics.


    ## A Brief Review of the Fundamentals


    Java uses Unicode to represent characters. (Unicode is a 16-bit character set
    standard [actually, more of an encoding standard because some characters are represented
    by multiple numeric values; each value is known as a code point] whose goal is
    to map all of the world’s significant character sets into an all-encompassing
    map.) Although Unicode makes it much easier to work with characters from different
    languages, it doesn’t automate everything and you often need to work with charsets.
    Before I dig into this topic, you should understand the following terms:


    *   Character: A meaningful symbol. For example, “$” and “E” are characters. These
    symbols predate the computer era.

    *   Character set: A set of characters. For example, uppercase letters A through
    Z could be considered to form a character set. No numeric values are assigned
    to the characters in the set. There is no relationship to Unicode, ASCII, EBCDIC,
    or any other kind of character set standard.

    *   Coded character set: A character set where each character is assigned a unique
    numeric value. Standards bodies such as US-ASCII or ISO-8859-1 define mappings
    from characters to numeric values.

    *   Character-encoding scheme: An encoding of a coded character set’s numeric
    values to sequences of bytes that represent these values. Some encodings are one-to-one.
    For example, in ASCII, character A is mapped to integer 65 and encoded as integer
    65. For some other mappings, encodings are one-to-one or one-to-many. For example,
    UTF-8 encodes Unicode characters. Each character whose numeric value is less than
    128 is encoded as a single byte to be compatible with ASCII. Other Unicode characters
    are encoded as two-to-six-byte sequences. See [`www.ietf.org/rfc/rfc2279.txt`](http://www.ietf.org/rfc/rfc2279.txt)
    for more information.

    *   Charset: A coded character set combined with a character-encoding scheme.
    Charsets are described by the abstract `java.nio.charset.Charset` class.


    Although Unicode is widely used and increasing in popularity, other character
    set standards are also used. Because operating systems perform I/O at the byte
    level, and because files store data as byte sequences, it’s necessary to translate
    between byte sequences and the characters that are encoded into these sequences.
    `Charset` and the other classes located in the `java.nio.charset` package address
    this translation task.


    ## Working with Charsets


    Beginning with JDK 1.4, Java virtual machines (JVMs) were required to support
    a standard collection of charsets and could support additional charsets. They
    also support the default charset, which doesn’t have to be one of the standard
    charsets and is obtained when the JVM starts running. Table [10-1](#A978-1-4842-1565-4_10_Chapter.html#Tab1)
    identifies and describes the standard charsets.


    Table 10-1.


    Standard Charsets


    | Charset Name | Description |

    | --- | --- |

    | `US-ASCII` | Seven-bit ASCII, which forms the American-English character set.
    Also known as the basic Latin block in Unicode. |

    | `ISO-8859-1` | The 8-bit character set used by most European languages. It’s
    a superset of ASCII and includes most non-English European characters. |

    | `UTF-8` | An 8-bit byte-oriented character encoding for Unicode. Characters
    are encoded in one to six bytes. |

    | `UTF-16BE` | A 16-bit encoding using big-endian order for Unicode. Characters
    are encoded in two bytes with the high-order eight bits written first. |

    | `UTF-16LE` | A 16-bit encoding using little-endian order for Unicode. Characters
    are encoded in two bytes with the low-order eight bits written first. |

    | `UTF-16` | A 16-bit encoding whose endian order is determined by an optional
    byte-order mark. |


    Charset names are case-insensitive and are maintained by the Internet Assigned
    Names Authority (IANA). The names in Table [10-1](#A978-1-4842-1565-4_10_Chapter.html#Tab1)
    are included in IANA’s official registry.


    `UTF-16BE` and `UTF-16LE` encode each character as a two-byte sequence in big-endian
    or little-endian order, respectively. A decoder for a `UTF-16BE`- or `UTF-16LE`-encoded
    byte sequence needs to know how the byte sequence was encoded or have a way to
    detect the byte order from the encoded data. In contrast, `UTF-16` relies on a
    byte order mark that appears at the beginning of the sequence. If this mark is
    absent, decoding proceeds according to `UTF-16BE` (Java’s native byte order).
    If this mark equals `\uFEFF`, the sequence is decoded according to `UTF-16BE`.
    If this mark equals `\uFFFE`, the sequence is decoded according to `UTF-16LE`.


    Each charset name is associated with a `Charset` object, which you obtain by invoking
    one of this class’s factory methods. Listing [10-1](#A978-1-4842-1565-4_10_Chapter.html#FPar1)
    presents an application that shows you how to use this class to obtain the default
    and standard charsets, which are then used to encode characters into byte sequences.


    Listing 10-1\. Using Charsets to Encode Characters into Byte Sequences


    `import java.nio.ByteBuffer;`


    `import java.nio.charset.Charset;`


    `public class CharsetDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `String msg = "façade touché";`


    `String[] csNames =`


    `{`


    `"US-ASCII",`


    `"ISO-8859-1",`


    `"UTF-8",`


    `"UTF-16BE",`


    `"UTF-16LE",`


    `"UTF-16"`


    `};`


    `encode(msg, Charset.defaultCharset());`


    `for (String csName: csNames)`


    `encode(msg, Charset.forName(csName));`


    `}`


    `static void encode(String msg, Charset cs)`


    `{`


    `System.out.println("Charset: " + cs.toString());`


    `System.out.println("Message: " + msg);`


    `ByteBuffer buffer = cs.encode(msg);`


    `System.out.println("Encoded: ");`


    `for (int i = 0; buffer.hasRemaining(); i++)`


    `{`


    `int _byte = buffer.get() & 255;`


    `char ch = (char) _byte;`


    `if (Character.isWhitespace(ch) || Character.isISOControl(ch))`


    `ch = ’\u0000’;`


    `System.out.printf("%2d: %02x (%c)%n", i, _byte, ch);`


    `}`


    `System.out.println();`


    `}`


    `}`


    Listing [10-1](#A978-1-4842-1565-4_10_Chapter.html#FPar1)’s `main()` method first
    creates a message consisting of two French words and an array of names for the
    standard collection of charsets. Next, it invokes the `encode()` method to encode
    the message according to the default charset, which it obtains by calling `Charset`’s
    `Charset defaultCharset()` factory method.'
