    this point, the client can receive datagram packets sent to the group and can
    even send datagram packets to other group members. After the client has read all
    datagram packets that it wants to read, it removes itself from the group by applying
    a leave group operation that specifies the special IP address.


    IPv4 addresses 224.0.0.1 to 239.255.255.255 (inclusive) are reserved for use as
    multicast group addresses.


