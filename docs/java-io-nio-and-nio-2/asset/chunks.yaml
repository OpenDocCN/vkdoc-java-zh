    options)`、`Path write(Path path, Iterable<? extends CharSequence> lines, Charset
    cs, OpenOption... options)` 和 `Path write(Path path, Iterable<? extends CharSequence>
    lines, OpenOption... options)`。


    用于写入非常大的文件（其内容可能无法放入内存）的方法是：`BufferedWriter newBufferedWriter(Path path, Charset
    cs, OpenOption... options)`、`BufferedWriter newBufferedWriter(Path path, OpenOption...
    options)` 和 `OutputStream newOutputStream(Path path, OpenOption... options)`。


    答案是肯定的：当未指定任何选项时，`newOutputStream()` 的工作方式如同指定了 `CREATE`、`TRUNCATE_EXISTING` 和
    `WRITE` 选项。


    `SeekableByteChannel` 接口的目的是描述可以随机访问的字节通道。它提供了获取当前位置以及将当前位置更改为新位置的能力。


    `FileChannel` 类指定了 `FileChannel position(long newPosition)` 和 `FileChannel truncate(long
    size)`，而不是指定 `SeekableByteChannel position(long newPosition)` 和 `SeekableByteChannel
    truncate(long size)`，原因如下：`SeekableByteChannel` 的文档建议，实现 `SeekableByteChannel`
    的类应特化方法的返回类型，以便在实现类上的方法调用可以链式进行。


    你可以通过调用 `Files` 类的 `SeekableByteChannel newByteChannel(Path path, OpenOption...
    options)` 方法或其 `SeekableByteChannel newByteChannel(Path path, Set<? extends OpenOption>
    options, FileAttribute<?>... attrs)` 方法来获取 `SeekableByteChannel` 对象。


    NIO.2 向 `FileChannel` 类添加了 `FileChannel open(Path path, OpenOption... options)`
    和 `FileChannel open(Path path, Set<? extends OpenOption> options, FileAttribute<?>...
    attrs)` 方法，这样你就不再需要依赖传统的 I/O 类型（如 `RandomAccessFile`）来获取文件通道。


    `Files` 类提供了 `Path createDirectory(Path dir, FileAttribute<?>... attrs)` 方法来创建目录。


    答案是错误的：`Files` 类的目录创建方法不会自动创建正在创建的目录的不存在的祖先目录。你需要使用 `createDirectories()` 方法来执行该任务。


    `Files` 类用于创建临时目录的方法是 `Path createTempDirectory(Path dir, String prefix, FileAttribute<?>...
    attrs)` 和 `Path createTempDirectory(String prefix, FileAttribute<?>... attrs)`。


    NIO.2 提供了 `DirectoryStream<T>` 接口，以及 `Files` 类中的 `DirectoryStream<Path> newDirectoryStream(Path
    dir)`、`DirectoryStream<Path> newDirectoryStream(Path dir, DirectoryStream.Filter<?
    super Path> filter)` 和 `DirectoryStream<Path> newDirectoryStream(Path dir, String
    glob)` 方法，用于获取目录条目的列表。


    你可以通过子类化 `DirectoryStream.Filter<T>` 并重写其 `boolean accept(T path)` 方法（确保将 `Path`
    传递给 `T`）来过滤目录条目列表，以便仅返回所需的条目。当 `path` 被接受（包含在目录流中）时，此方法必须返回 `true`；否则，必须返回 `false`。


