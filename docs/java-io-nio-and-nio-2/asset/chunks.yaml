- fmt: "Nondirectory files are moved in the `visitFile()` method by calling `move()`\
    \ with `REPLACE_EXISTING` and `ATOMIC_MOVE` options. `ATOMIC_MOVE` configures\
    \ the move as follows: the move is performed as an atomic file system operation\
    \ and all other options are ignored (I also specified `REPLACE_EXISTING` anyway).\
    \ When the target exists, it’s implementation-specific if the existing file is\
    \ replaced or if this method fails by throwing `IOException`. If the move cannot\
    \ be performed as an atomic file system operation, `AtomicMoveNotSupportedException`\
    \ is thrown. This can arise, for example, when the target location is on a different\
    \ file store and would require that the file be copied.\n\nFinally, the directory\
    \ that was copied in `preVisitDirectory()` is deleted in `postVisitDirectory()`,\
    \ which completes the directory “move”.\n\nCompile Listing 12-47 as follows:\n\
    \n`javac Move.java`\n\nAssume the following file tree in the current directory:\n\
    \n`sales`\n\n`joe`\n\n`2015`\n\n`q1`\n\n`sales.txt`\n\nRun the resulting application\
    \ as follows:\n\n`java Move sales salesbak`\n\nYou should observe no output. Instead,\
    \ you should observe a `salesbak` directory with an identical hierarchy to the\
    \ `sales` hierarchy. The `sales` directory should not be present.\n\n### Working\
    \ with Additional Capabilities\n\nYou’ve explored nearly all of the methods in\
    \ the `Files` class, but there is still one group of methods to explore. These\
    \ methods are designed for use with Java 8’s Streams API and lambda expressions\
    \ (anonymous functions that are passed to constructors or methods for subsequent\
    \ execution):\n\n*   `Stream<Path> find(Path start, int maxDepth, BiPredicate<Path,BasicFileAttributes>\
    \ matcher, FileVisitOption... options)`\n*   `Stream<String> lines(Path path)`\n\
    *   `Stream<String> lines(Path path, Charset cs)`\n*   `Stream<Path> list(Path\
    \ dir)`\n*   `Stream<Path> walk(Path start, FileVisitOption... options)`\n*  \
    \ `Stream<Path> walk(Path start, int maxDepth, FileVisitOption... options)`\n\n\
    Note\n\nAs I mentioned in the book’s introduction, I assume that you’re familiar\
    \ with the Streams API and lambdas, and won’t discuss them in this book. If you’re\
    \ unfamiliar with streams, check out my article called “Java SE 8’s New Streams\
    \ API” ( `www.informit.com/articles/article.aspx?p=2198914` ).\n\nThe `find()`\
    \ method returns a `java.util.stream.Stream<Path>` object that is lazily populated\
    \ with the `Path`s of those files that are accepted by a `java.util.function.BiPredicate`\
    \ object. Listing 12-48 presents the source code to an application that demonstrates\
    \ `find()` and `BiPredicate`.\n\n**Listing 12-48.** Streaming and Outputting the\
    \ Paths of All Files That Match a File Extension\n\n```\nimport java.io.IOException;\n\
    import java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
    import java.nio.file.attribute.BasicFileAttributes;\nimport java.util.List;\n\
    import java.util.function.BiPredicate;\nimport java.util.stream.Collectors;\n\
    import java.util.stream.Stream;\n\npublic class StreamsDemo\n{\n   public static\
    \ void main(String[] args)\n   {\n      if (args.length != 2)\n      {\n     \
    \    System.err.println(\"usage: java StreamsDemo dirpath ext\");\n         return;\n\
    \      }\n\n      BiPredicate<Path, BasicFileAttributes> predicate = (path, attrs)\
    \ ->\n         attrs.isRegularFile() &&\n         path.getFileName().toString().endsWith(args[1]);\n\
    \n      try (Stream<Path> stream = Files.find(Paths.get(args[0]), 1,\n       \
    \                                     predicate))\n      {\n         List<Path>\
    \ entries = stream.collect(Collectors.toList());\n         for (Path entry: entries)\n\
    \            System.out.println(entry);\n      }\n      catch (IOException ioe)\n\
    \      {\n         ioe.printStackTrace();\n      }\n   }\n}\n```\n\nAfter verifying\
    \ that two command-line arguments (a directory path and a file extension) have\
    \ been passed, `main()` uses a lambda to create a two-argument predicate (Boolean-valued\
    \ function). This predicate returns `true` when the path identifies a regular\
    \ file and its file name ends with the specified file extension. Otherwise, it\
    \ returns `false`.\n\nBecause `Stream` inherits from `AutoCloseable` (streams\
    \ are closed when they’re no longer needed), I invoke `find()` and obtain the\
    \ `Stream` in the context of a `try`-with-resources statement. I then obtain a\
    \ list of those entries that match the predicate and iterate over the entries,\
    \ outputting each entry to the standard output stream.\n\nCompile Listing 12-48\
    \ as follows:\n\n`javac StreamsDemo.java`\n\nI chose to run the resulting application\
    \ against my `C:\\windows` directory and `exe` files as follows:\n\n`java StreamsDemo\
    \ C:\\windows exe`\n\nI then observed the following output:\n\n`C:\\windows\\\
    bfsvc.exe`\n`C:\\windows\\explorer.exe`\n`C:\\windows\\fveupdate.exe`\n`C:\\windows\\\
    HelpPane.exe`\n`C:\\windows\\hh.exe`\n`C:\\windows\\IsUninst.exe`\n`C:\\windows\\\
    kindlegen.exe`\n`C:\\windows\\notepad.exe`\n`C:\\windows\\regedit.exe`\n`C:\\\
    windows\\splwow64.exe`\n`C:\\windows\\twunk_16.exe`\n`C:\\windows\\twunk_32.exe`\n\
    `C:\\windows\\unins000.exe`\n`C:\\windows\\winhlp32.exe`\n`C:\\windows\\write.exe`\n\
    \nThe `lines()` methods return `Stream<String>` objects that are lazily populated\
    \ with lines of text. `lines(Path path)` decodes bytes into characters via the\
    \ UTF-8 charset. In contrast, `lines(Path path, Charset cs)` performs this decoding\
    \ via charset `cs`. Listing 12-49 presents the source code to an application that\
    \ demonstrates `lines(Path path)`.\n\n**Listing 12-49.** Streaming and Outputting\
    \ All Lines from a Text File\n\n```\nimport java.io.IOException;\nimport java.nio.file.Files;\n\
    import java.nio.file.Paths;\n\npublic class StreamsDemo\n{\n   public static void\
    \ main(String[] args) throws IOException\n   {\n      if (args.length != 1)\n\
    \      {\n         System.err.println(\"usage: java StreamsDemo textfilepath\"\
    );\n         return;\n      }\n\n      Files.lines(Paths.get(args[0])).forEach(System.out::println);\n\
    \   }\n}\n```\n\nIn this application, `main()` first verifies that exactly one\
    \ command-line argument (identifying a text file path) has been specified. It\
    \ then invokes `lines()` on this path and `forEach()` on the resulting stream\
    \ to iterate over the strings. I pass a `System.out::println` method reference\
    \ (a compact representation of a lambda) argument to `forEach()`, which it executes\
    \ to output the string. The stream is closed when the application ends.\n\nCompile\
    \ Listing 12-49 (`javac StreamsDemo.java`) and run the resulting application (`java\
    \ StreamsDemo StreamsDemo.java`). You should observe the contents of the text\
    \ file on the standard output stream.\n\nFor brevity, I’m ignoring the remaining\
    \ methods. If you need help using them, check out “Java 8 Friday Goodies: The\
    \ New New I/O APIs” at `http://blog.jooq.org/2014/01/24/java-8-friday-goodies-the-new-new-io-apis/`.\n\
    \n## Using Path Matchers and Watch Services\n\nThe `Files` class provides utility\
    \ methods for most of the file system tasks that you’ll encounter while working\
    \ with I/O. However, it doesn’t provide methods to handle path-matching and watch\
    \ services. For these tasks, you need to work directly with `FileSystem`."
