    \ stream classes, and the writer/reader classes. The benefit of the `try`-with-resources\
    \ statement is a reduction in verbosity. You can use this statement to automatically\
    \ close open files and other resources instead of having to provide this resource-closing\
    \ code. The API categories that comprise NIO are buffers, channels, selectors,\
    \ regular expressions, charsets, and a `printf`-style formatting facility based\
    \ mainly on the `Formatter` class. The `Selector` class (and related types) let\
    \ Java programs leverage readiness selection. The API categories that comprise\
    \ NIO.2 are an improved file system interface, asynchronous I/O, and the completion\
    \ of socket channel functionality. NIO.2 completes the socket channel functionality\
    \ by adding binding support and option configuration to the `DatagramChannel`,\
    \ `ServerSocketChannel`, and `SocketChannel` classes. It also introduces a `MulticastChannel`\
    \ interface.\n\n## [Chapter 2](#A978-1-4842-1565-4_2_Chapter.html): File\n\nThe\
    \ purpose of the `File` class is to offer access to the underlying operating system’s\
    \ available file system(s). Instances of the `File` class contain the paths of\
    \ files and directories that might not exist in their file systems. A path is\
    \ a compact map that locates and identifies a file system object (also known as\
    \ a file). The difference between an absolute path and a relative path is as follows:\
    \ an absolute path starts with the root directory symbol; no other information\
    \ is required to locate the file/directory that it denotes. In contrast, a relative\
    \ path doesn’t start with the root directory symbol; it’s interpreted via information\
    \ taken from another path. You obtain the current user directory (also known as\
    \ the working directory) by specifying `System.getProperty(\"user.dir\")`. A parent\
    \ path consists of all path components except for the last name. Normalize means\
    \ to replace separator characters with the default name-separator character so\
    \ that the path is compliant with the underlying file system. You obtain the default\
    \ name-separator character by accessing `File`’s `separator` and `separatorChar`\
    \ class fields. The first field stores the character as a `char` and the second\
    \ field stores it as a `String`. A canonical path is a path that’s absolute and\
    \ unique and is formatted the same way every time. The difference between `File`’s\
    \ `getParent()` and `getName()` methods is that `getParent()` returns the parent\
    \ path and `getName()` returns the last name in the path’s name sequence. The\
    \ answer is false: `File`’s `exists()` method determines whether a file or directory\
    \ exists. A normal file (also known as a regular file) is not a directory and\
    \ satisfies other operating system-dependent criteria: it’s not a symbolic link\
    \ or named pipe, for example. Any nondirectory file created by a Java application\
    \ is guaranteed to be a normal file. `File`’s `lastModified()` method returns\
    \ the time that the file denoted by this `File` object’s path was last modified\
    \ or 0 when the file doesn’t exist or an I/O error occurred during this method\
    \ call. The returned value is measured in milliseconds since the Unix epoch (00:00:00\
    \ GMT, January 1, 1970). `File`’s `listRoots()` method returns an array of `File`\
