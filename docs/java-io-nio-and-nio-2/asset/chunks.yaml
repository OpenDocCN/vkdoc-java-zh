    An instance of the `File` class contains an abstract representation of a file
    or directory path (a compact map that locates and identifies a file system object).
    To create a `File` instance, call a constructor such as `File(String path)`, which
    creates a `File` instance that stores the `path` string:


    `File file1 = new File("/x/y");`


    `File file2 = new File("C:\\temp\\x.dat");`


