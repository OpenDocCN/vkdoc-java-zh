    The `receive()` method copies the incoming datagram’s data payload into the byte
    buffer argument and returns a socket address identifying the datagram’s source
    address. If the channel is blocking, `receive()` sleeps until the packet arrives
    or some event results in a thrown exception. If the channel is nonblocking, `receive()`
    returns `null` when a datagram isn’t available. If the data payload is larger
    than will fit in the buffer, excess bytes are quietly removed.


    The `send()` method sends the given byte buffer’s content, starting from the current
    position and ranging to the buffer’s limit, to the destination address/port number
    specified by the socket address argument. If the datagram channel is blocking,
    `send()` sleeps until the datagram is queued for sending or some event results
    in a thrown exception. If the channel isn’t blocking, this method returns with
    one of two values: the entire length of the buffer content that was sent or `0`
    indicating that the buffer content wasn’t sent (nothing is sent when there isn’t
    room to store the entire datagram before transmission).


