    `link Path` 对象。当实现不支持符号链接，或者 `attrs` 包含无法在创建符号链接时原子性设置的属性时，会抛出 `UnsupportedOperationException`；当
    `link` 名称已存在时，会抛出 `FileAlreadyExistsException`；当发生 I/O 错误（例如文件存储不支持符号链接）时，会抛出
    `IOException`。


