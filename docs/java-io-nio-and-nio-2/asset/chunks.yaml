  trans: '

    ### FilterOutputStream 和 FilterInputStream


    字节数组、文件和管道流会将字节原封不动地传递到其目标位置。Java 还支持过滤流，这些流可以在字节序列（即过滤器的输入）到达目标位置之前，对其进行缓冲、压缩/解压缩、加密/解密或其他操作。


    一个过滤输出流会获取传递给其 `write()` 方法的数据（输入流），对其进行过滤，然后将过滤后的数据写入到底层输出流中，该底层输出流可能是另一个过滤输出流，也可能是目标输出流（例如文件输出流）。


    过滤输出流是通过具体类 `FilterOutputStream`（它是 `OutputStream` 的子类）的子类创建的。`FilterOutputStream`
    声明了一个唯一的构造函数 `FilterOutputStream(OutputStream out)`，该构造函数用于创建一个构建在底层输出流 `out`
    之上的过滤输出流。


    清单 4-4 展示了继承 `FilterOutputStream` 是非常容易的。至少，你需要声明一个构造函数，将其 `OutputStream` 参数传递给
    `FilterOutputStream` 的构造函数，并重写 `FilterOutputStream` 的 `write(int)` 方法。


    **清单 4-4. 打乱字节流**


    `import java.io.FilterOutputStream;`


    `import java.io.IOException;`


    `import java.io.OutputStream;`


    `public class` `ScrambledOutputStream` `extends FilterOutputStream`


    `{`


    `private int[] map;`


    `public ScrambledOutputStream(OutputStream out, int[] map)`


    `{`


    `super(out);`


    `if (map == null)`


    `throw new NullPointerException("map is null");`


    `if (map.length != 256)`


    `throw new IllegalArgumentException("map.length != 256");`


    `this.map = map;`


    `}`


    `@Override`


    `public void write(int b) throws IOException`


    `{`


    `out.write(map[b]);`


    `}`


    `}`


    清单 4-4 展示了一个 `ScrambledOutputStream` 类，它通过重映射操作来打乱输入流的字节，从而对其输入流执行简单的加密。该构造函数声明了两个参数：


    *   `out` 标识用于写入打乱后字节的输出流。

    *   `map` 标识一个包含 256 个字节整数值的数组，输入流的字节将映射到这些值上。


    构造函数首先通过 `super(out);` 调用将其 `out` 参数传递给父类 `FilterOutputStream`。然后，在保存 `map` 之前，它会验证
    `map` 参数的完整性（`map` 必须非空且长度为 256；一个字节流正好提供 256 个字节用于映射）。


    `write(int)` 方法很简单：它使用参数 `b` 所映射到的字节来调用底层输出流的 `write(int)` 方法。`FilterOutputStream`
    将 `out` 声明为 `protected`（出于性能考虑），这就是你可以直接访问此字段的原因。


    > **注意**

    > 只需要重写 `write(int)` 方法，因为 `FilterOutputStream` 的其他两个 `write()` 方法都是通过此方法实现的。


    清单 4-5 展示了一个 `Scramble` 应用程序的源代码，用于实验通过 `ScrambledOutputStream` 打乱源文件的字节，并将这些打乱后的字节写入目标文件。


    **清单 4-5. 打乱文件字节**


    `import java.io.FileInputStream;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `import java.util.Random;`


    `public class Scramble`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Scramble srcpath destpath");`


    `return;`


    `}`


    `FileInputStream fis = null;`


    `ScrambledOutputStream sos = null;`


    `try`


    `{`


    `fis = new FileInputStream(args[0]);`


    `FileOutputStream fos = new FileOutputStream(args[1]);`


    `sos = new ScrambledOutputStream(fos, makeMap());`


    `int b;`


    `while ((b = fis.read()) != -1)`


    `sos.write(b);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `finally`


    `{`


    `if (fis != null)`


    `try`


    `{`


    `fis.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `if (sos != null)`


    `try`


    `{`


    `sos.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `}`


