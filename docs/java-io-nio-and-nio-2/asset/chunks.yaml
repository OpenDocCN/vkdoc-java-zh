  raw: '## Learning About Stored Abstract Paths


    After obtaining a `File` object, you can interrogate it to learn about its stored
    abstract path by calling the methods described in Table [2-1](#A978-1-4842-1565-4_2_Chapter.html#Tab1).


    Table 2-1.


    `File` Methods for Learning About a Stored Abstract Path


    | Method | Description |

    | --- | --- |

    | `File getAbsoluteFile()` | Return the absolute form of this `File` object’s
    abstract path. This method is equivalent to `new File(this.getAbsolutePath())`.
    |

    | `String getAbsolutePath()` | Return the absolute path string of this `File`
    object’s abstract path. When it’s already absolute, the path string is returned
    as if by calling `getPath()`. When it’s the empty abstract path, the path string
    of the current user directory (identified via `user.dir`) is returned. Otherwise,
    the abstract path is resolved in an operating system-dependent manner. On Unix/Linux
    operating systems, a relative path is made absolute by resolving it against the
    current user directory. On Windows operating systems, the path is made absolute
    by resolving it against the current directory of the drive named by the path,
    or the current user directory when there is no drive. |

    | `File getCanonical` `File()` | Return the canonical (simplest possible, absolute
    and unique) form of this `File` object’s abstract path. This method throws `java.io.IOException`
    when an I/O error occurs (creating the canonical path may require file system
    queries); it equates to `new File(this.getCanonicalPath())`. |

    | `String getCanonicalPath()` | Return the canonical path string of this `File`
    object’s abstract path. This method first converts this path to the absolute form
    when necessary, as if by invoking `getAbsolutePath()`, and then maps it to its
    unique form in an operating system-dependent way. Doing so typically involves
    removing redundant names such as “`.`” and “`..`” from the path, resolving symbolic
    links (on Unix/Linux operating systems), and converting drive letters to a standard
    case (on Windows operating systems). This method throws `IOException` when an
    I/O error occurs (creating the canonical path may require file system queries).
    |

    | `String getName()` | Return the file name or directory name denoted by this
    `File` object’s abstract path. This name is the last in a path’s name sequence.
    The empty string is returned when the path’s name sequence is empty. |

    | `String getParent()` | Return the parent path string of this `File` object’s
    path, or return null when this path doesn’t name a parent directory. |

    | `File getParent` `File()` | Return a `File` object storing this `File` object’s
    abstract path’s parent abstract path; return null when the parent path isn’t a
    directory. |

    | `String getPath()` | Convert this `File` object’s abstract path into a path
    string where the names in the sequence are separated by the character stored in
    `File`’s `separator` field. Return the resulting path string. |

    | `boolean isAbsolute()` | Return true when this `File` object’s abstract path
    is absolute; otherwise, return false when it’s relative. The definition of absolute
    path is system dependent. For Unix/Linux operating systems, a path is absolute
    when its prefix is “`/`”. For Windows operating systems, a path is absolute when
    its prefix is a drive specifier followed by “`\`” or when its prefix is “`\\`”.
    |

    | `String toString()` | A synonym for `getPath()`. |


    Table [2-1](#A978-1-4842-1565-4_2_Chapter.html#Tab1) refers to `IOException`,
    which is the common exception superclass for those exception classes that describe
    various kinds of I/O errors such as `java.io.FileNotFoundException`.


    Listing [2-1](#A978-1-4842-1565-4_2_Chapter.html#FPar6) instantiates `File` with
    its path command-line argument and calls some of the `File` methods described
    in Table [2-1](#A978-1-4842-1565-4_2_Chapter.html#Tab1) to learn about this path.


    Listing 2-1\. Obtaining Abstract Path Information


    `import java.io.File;`


    `import java.io.IOException;`


    `public class PathInfo`


    `{`


    `public static void main(final String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java PathInfo path");`


    `return;`


    `}`


    `File file = new File(args[0]);`


    `System.out.println("Absolute path = " + file.getAbsolutePath());`


    `System.out.println("Canonical path = " + file.getCanonicalPath());`


    `System.out.println("Name = " + file.getName());`


    `System.out.println("Parent = " + file.getParent());`


    `System.out.println("Path = " + file.getPath());`


    `System.out.println("Is absolute = " + file.isAbsolute());`


    `}`


    `}`


    Compile Listing [2-1](#A978-1-4842-1565-4_2_Chapter.html#FPar6) as follows:


    `javac PathInfo.java`


    Run the resulting application as follows:


    `java PathInfo .`


    The period represents the current directory on my Windows 7 operating system;
    use your own equivalent. I observed the following output:


    `Absolute path = C:\prj\books\io\ch02\code\PathInfo\.`


    `Canonical path = C:\prj\books\io\ch02\code\PathInfo`


    `Name = .`


    `Parent = null`


    `Path = .`


    `Is absolute = false`


    This output reveals that the canonical path doesn’t include the period. It also
    shows that there is no parent path and that the path is relative.


    Continuing, specify `java PathInfo C:\reports\2015\..\2014\February`. You should
    observe the following output:


    `Absolute path = C:\reports\2015\..\2014\February`


    `Canonical path = C:\reports\2014\February`


    `Name = February`


    `Parent = C:\reports\2015\..\2014`


    `Path = C:\reports\2015\..\2014\February`


    `Is absolute = true`


    This output reveals that the canonical path doesn’t include `2015`. It also shows
    that the path is absolute.


    Finally, specify `java PathInfo ""` to obtain information for the empty path.
    I observed the following output:


    `Absolute path = C:\prj\books\io\ch02\code\PathInfo`


    `Canonical path = C:\prj\books\io\ch02\code\PathInfo`


    `Name =`


    `Parent = null`


    `Path =`


    `Is absolute = false`


    The output reveals that `getName()` and `getPath()` return the empty string (`""`)
    because the empty path is empty. Also, `C:` is the default drive.'
  trans: '

    ## 了解存储的抽象路径


    获取 `File` 对象后，你可以通过调用表 2-1 中描述的方法来查询其存储的抽象路径。


    表 2-1. 用于了解存储抽象路径的 `File` 方法


    | 方法 | 描述 |

    | --- | --- |

    | `File getAbsoluteFile()` | 返回此 `File` 对象抽象路径的绝对形式。此方法等同于 `new File(this.getAbsolutePath())`。
    |

    | `String getAbsolutePath()` | 返回此 `File` 对象抽象路径的绝对路径字符串。当路径已经是绝对路径时，返回的路径字符串如同调用了
    `getPath()`。当它是空抽象路径时，返回当前用户目录（通过 `user.dir` 标识）的路径字符串。否则，抽象路径将以操作系统相关的方式解析。在
    Unix/Linux 操作系统上，相对路径通过相对于当前用户目录解析而变为绝对路径。在 Windows 操作系统上，路径通过相对于路径指定的驱动器的当前目录（如果没有驱动器，则相对于当前用户目录）解析而变为绝对路径。
    |

    | `File getCanonical` `File()` | 返回此 `File` 对象抽象路径的规范形式（尽可能简单、绝对且唯一）。当发生 I/O 错误时，此方法会抛出
    `java.io.IOException`（创建规范路径可能需要查询文件系统）；它等同于 `new File(this.getCanonicalPath())`。
    |

    | `String getCanonicalPath()` | 返回此 `File` 对象抽象路径的规范路径字符串。此方法首先在必要时将此路径转换为绝对形式（如同调用
    `getAbsolutePath()`），然后以操作系统相关的方式将其映射到唯一形式。这样做通常涉及从路径中删除冗余名称（例如“`.`”和“`..`”）、解析符号链接（在
    Unix/Linux 操作系统上）以及将驱动器号转换为标准大小写（在 Windows 操作系统上）。当发生 I/O 错误时，此方法会抛出 `IOException`（创建规范路径可能需要查询文件系统）。
    |

    | `String getName()` | 返回此 `File` 对象抽象路径所表示的文件名或目录名。此名称是路径名称序列中的最后一个。当路径的名称序列为空时，返回空字符串。
    |

    | `String getParent()` | 返回此 `File` 对象路径的父路径字符串，如果此路径未指定父目录，则返回 null。 |

    | `File getParent` `File()` | 返回一个 `File` 对象，该对象存储此 `File` 对象抽象路径的父抽象路径；如果父路径不是目录，则返回
    null。 |

    | `String getPath()` | 将此 `File` 对象的抽象路径转换为路径字符串，其中序列中的名称由存储在 `File` 的 `separator`
    字段中的字符分隔。返回结果路径字符串。 |

    | `boolean isAbsolute()` | 如果此 `File` 对象的抽象路径是绝对路径，则返回 true；否则，如果是相对路径，则返回 false。绝对路径的定义取决于系统。对于
    Unix/Linux 操作系统，如果路径的前缀是“`/`”，则该路径是绝对路径。对于 Windows 操作系统，如果路径的前缀是后跟“`\`”的驱动器说明符，或者前缀是“`\\`”，则该路径是绝对路径。
    |

    | `String toString()` | 是 `getPath()` 的同义词。 |


    表 2-1 提到了 `IOException`，它是描述各种 I/O 错误（例如 `java.io.FileNotFoundException`）的那些异常类的常见异常超类。


    清单 2-1 使用其路径命令行参数实例化 `File`，并调用表 2-1 中描述的一些 `File` 方法来了解此路径。


    清单 2-1. 获取抽象路径信息


    `import java.io.File;`


    `import java.io.IOException;`


    `public class PathInfo`


    `{`


    `public static void main(final String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java PathInfo path");`


    `return;`


    `}`


    `File file = new File(args[0]);`


    `System.out.println("Absolute path = " + file.getAbsolutePath());`


    `System.out.println("Canonical path = " + file.getCanonicalPath());`


    `System.out.println("Name = " + file.getName());`


    `System.out.println("Parent = " + file.getParent());`


    `System.out.println("Path = " + file.getPath());`


    `System.out.println("Is absolute = " + file.isAbsolute());`


    `}`


    `}`


    按如下方式编译清单 2-1：


    `javac PathInfo.java`


    按如下方式运行生成的应用程序：


    `java PathInfo .`


    句点代表我 Windows 7 操作系统上的当前目录；请使用你自己的等效目录。我观察到以下输出：


    `Absolute path = C:\prj\books\io\ch02\code\PathInfo\.`


    `Canonical path = C:\prj\books\io\ch02\code\PathInfo`


    `Name = .`


    `Parent = null`


    `Path = .`


    `Is absolute = false`


    此输出显示规范路径不包含句点。它还显示没有父路径，并且该路径是相对路径。


    继续，指定 `java PathInfo C:\reports\2015\..\2014\February`。你应该会观察到以下输出：


    `Absolute path = C:\reports\2015\..\2014\February`


    `Canonical path = C:\reports\2014\February`


    `Name = February`


    `Parent = C:\reports\2015\..\2014`


    `Path = C:\reports\2015\..\2014\February`


    `Is absolute = true`


    此输出显示规范路径不包含 `2015`。它还显示该路径是绝对路径。


    最后，指定 `java PathInfo ""` 以获取空路径的信息。我观察到以下输出：


    `Absolute path = C:\prj\books\io\ch02\code\PathInfo`


    `Canonical path = C:\prj\books\io\ch02\code\PathInfo`


    `Name =`


    `Parent = null`


    `Path =`


    `Is absolute = false`


    输出显示 `getName()` 和 `getPath()` 返回空字符串 (`""`)，因为空路径是空的。此外，`C:` 是默认驱动器。

