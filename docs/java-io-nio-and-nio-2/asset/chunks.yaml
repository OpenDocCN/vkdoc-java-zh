    \ character, numeric (integer or floating-point), date/time, percent, and line\
    \ separator. The following list identifies a few example format specifiers and\
    \ their conversions:\n\n* `%d`: Formats the argument as a decimal integer.\n*\
    \ `%x`: Formats the argument as a hexadecimal integer.\n* `%c`: Formats the argument\
    \ as a character.\n* `%f`: Formats the argument as a decimal number.\n* `%s`:\
    \ Formats the argument as a string.\n* `%n`: Outputs an operating system-specific\
    \ line separator.\n* `%10.2f`: Formats the argument as a decimal number with `10`\
    \ as the minimum number of characters to be written (leading spaces are written\
    \ when the number is smaller than the width) and `2` as the number of characters\
    \ to be written after the decimal point.\n* `%05d`: Formats the argument as a\
    \ decimal integer with `5` as the minimum number of characters to be written (leading\
    \ `0`s are written when the number is smaller than the width).\n\nWhen you’re\
    \ finished with the formatter, you might want to invoke the `void flush()` method\
    \ to ensure that any buffered output in the destination is written to the underlying\
    \ stream. You would typically invoke `flush()` when the destination is a file.\n\
    \nContinuing, invoke the formatter’s `void close()` method. As well as closing\
    \ the formatter, this method also closes the underlying output destination when\
    \ this destination’s class implements the `java.io.Closeable` interface. If the\
    \ formatter has been closed, this method has no effect. Attempting to format after\
    \ calling `close()` results in `java.util.FormatterClosedException`.\n\nListing\
    \ [11-1](#A978-1-4842-1565-4_11_Chapter.html#FPar2) provides a simple demonstration\
    \ of `Formatter` using the aforementioned format specifiers.\n\n**Listing 11-1.**\
    \ Demonstrating the `Formatter` Class\n\n```\nimport java.util.Formatter;\n\n\
    public class FormatterDemo\n{\n   public static void main(String[] args)\n   {\n\
