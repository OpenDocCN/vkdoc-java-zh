    # 9. Regular Expressions


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​9](http://dx.doi.org/10.1007/978-1-4842-1565-4_9))
    contains supplementary material, which is available to authorized users.


    Text-processing applications often need to match text against patterns (character
    strings that concisely describe sets of strings that are considered to be matches).
    For example, an application might need to locate all occurrences of a specific
    word pattern in a text file so that it can replace those occurrences with another
    word. NIO includes regular expressions to help text-processing applications perform
    pattern matching with high performance. This chapter introduces regular expressions.


    ## Pattern, PatternSyntaxException, and Matcher


    A regular expression (also known as a regex or regexp) is a string-based pattern
    that represents the set of strings that match this pattern. The pattern consists
    of literal characters and metacharacters, which are characters with special meanings
    instead of literal meanings.


    The Regular Expressions API provides the `java.util.regex.Pattern` class to represent
    patterns via compiled regexes. Regexes are compiled for performance reasons; pattern
    matching via compiled regexes is much faster than if the regexes were not compiled.
    Table [9-1](#A978-1-4842-1565-4_9_Chapter.html#Tab1) describes `Pattern`’s methods.


    Table 9-1.


    `Pattern` Methods


    | Method | Description |

    | --- | --- |

    | `static Pattern compile(String regex)` | Compile `regex` and return its `Pattern`
    object. This method throws `java.util.regex.PatternSyntaxException` when `regex`’s
    syntax is invalid. |

    | `static Pattern compile(String regex,int flags)` | Compile `regex` according
    to the given `flags` (a bitset consisting of some combination of `Pattern`’s `CANON_EQ`,
    `CASE_INSENSITIVE`, `COMMENTS`, `DOTALL`, `LITERAL`, `MULTILINE`, `UNICODE_CASE`,
    and `UNIX_LINES` constants) and return its `Pattern` object. This method throws
    `PatternSyntaxException` when `regex`’s syntax is invalid, and throws `java.lang.IllegalArgumentException`
    when bit values other than those corresponding to the defined match flags are
    set in `flags`. |

    | `int flags()` | Return this `Pattern` object’s match flags. This method returns
    `0` for `Pattern` instances created via `compile(String)` and the bitset of flags
    for `Pattern` instances created via `compile(String, int)`. |

    | `Matcher matcher(CharSequence input)` | Return a `java.util.regex.Matcher` that
    will match `input` against this `Pattern`’s compiled regex. |

    | `static boolean matches(String regex, CharSequence input)` | Compile `regex`
    and attempt to match `input` against the compiled regex. Return `true` when there
    is a match; otherwise, return `false`. This convenience method is equivalent to
    `Pattern.compile(regex).matcher(input).matches()` and throws `PatternSyntaxException`
    when `regex`’s syntax is invalid. |

    | `String pattern()` | Return this `Pattern`’s uncompiled regex. |

    | `static String quote(String s)` | Quote `s` using `"\Q"` and `"\E"` so that
    all other metacharacters lose their special meaning. When the returned `java.lang.String`
    object is later compiled into a `Pattern` instance, it only can be matched literally.
    |

    | `String[] split(CharSequence input)` | Split `input` around matches of this
    `Pattern`’s compiled regex and return an array containing the matches. |

    | `String[] split(CharSequence input, int limit)` | Split `input` around matches
    of this `Pattern`’s compiled regex; `limit` controls the number of times the compiled
    regex is applied and thus affects the length of the resulting array. |

    | `String toString()` | Return this `Pattern`’s uncompiled regex. |


