    Write a small Java application named `RAFDemo` that opens file `data` in read/write
    mode, uses `void write(int b)` to write byte value `127` followed by `void writeChars(String
    s)` to write string `"Test"` (minus the quotes) to this file, resets the file
    pointer to the start of the file, and read/outputs these values.


    ## Summary


    Files can be opened for random access in which a mixture of write and read operations
    at various locations can occur until the file is closed. Java supports this random
    access by providing the `RandomAccessFile` class (in the `java.io` package).


    You first learned about `RandomAccessFile`’s constructors, operation modes, and
    the file pointer. You then explored a sample of this class’s methods. Next, you
    learned about the `FileDescriptor` class and its methods. Lastly, you learned
    how to use `RandomAccessFile` to create a flat file database.


    [Chapter 4](#A978-1-4842-1565-4_4_Chapter.html) presents classic I/O’s stream
    classes.


    # 4. Streams


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​4](http://dx.doi.org/10.1007/978-1-4842-1565-4_4))
    contains supplementary material, which is available to authorized users.


    Along with `java.io.File` and `java.io.RandomAccessFile`, Java’s classic I/O infrastructure
    provides streams for performing I/O operations. A stream is an ordered sequence
    of bytes of an arbitrary length. Bytes flow over an output stream from an application
    to a destination and flow over an input stream from a source to an application.


    Java provides classes in the `java.io` package that identify various stream destinations
    for writing; for example, byte arrays, files, and thread pipes. Java also provides
    classes in this package that identify various stream sources for reading. Examples
    include byte arrays, files, and thread pipes. This chapter explores many of these
    classes.


    ## Stream Classes Overview


    The `java.io` package provides several output stream and input stream classes
    that are descendants of its abstract `OutputStream` and `InputStream` classes.
    Figure [4-1](#A978-1-4842-1565-4_4_Chapter.html#Fig1) reveals the hierarchy of
    output stream classes.


    ![A978-1-4842-1565-4_4_Fig1_HTML.jpg](A978-1-4842-1565-4_4_Fig1_HTML.jpg)


    Figure 4-1.


    All output stream classes except for `PrintStream` are denoted by their `OutputStream`
    suffixes


    Figure [4-2](#A978-1-4842-1565-4_4_Chapter.html#Fig2) reveals the hierarchy of
    input stream classes.


    ![A978-1-4842-1565-4_4_Fig2_HTML.jpg](A978-1-4842-1565-4_4_Fig2_HTML.jpg)


    Figure 4-2.


    `LineNumberInputStream` and `StringBufferInputStream` are deprecated


    `LineNumberInputStream` and `StringBufferInputStream` have been deprecated because
    they don’t support different character encodings, a topic I discuss in [Chapter
    5](#A978-1-4842-1565-4_5_Chapter.html). `java.io.LineNumberReader` and `java.io.StringReader`
    are their replacements. (I discuss readers along with writers in [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html).)


    Note


    `PrintStream` is another class that should be deprecated because it doesn’t support
    different character encodings; `java.io.PrintWriter` is its replacement. However,
    it’s doubtful that Oracle will deprecate this class because `PrintStream` is the
    type of the `java.lang.System` class’s `out` and `err` class fields, and too much
    legacy code depends on this fact.


    Other Java packages provide additional output stream and input stream classes.
    For example, `java.util.zip` provides four output stream classes that compress
    uncompressed data into various formats and four matching input stream classes
    that uncompress compressed data from the same formats:


    *   `CheckedOutputStream`

    *   `CheckedInputStream`

    *   `DeflaterOutputStream`

    *   `GZIPOutputStream`

    *   `GZIPInputStream`

    *   `InflaterInputStream`

    *   `ZipOutputStream`

    *   `ZipInputStream`


    Also, the `java.util.jar` package provides a pair of stream classes for writing
    content to a JAR file and for reading content from a JAR file:


    *   `JarOutputStream`

    *   `JarInputStream`


    ## Touring the Stream Classes


    In the next several sections, I take you on a tour of most of `java.io`’s output
    stream and input stream classes, beginning with `OutputStream` and `InputStream`.


    ### OutputStream and InputStream


    Java provides the abstract `OutputStream` and `InputStream` classes to describe
    classes that perform stream I/O. `OutputStream` is the superclass of all output
    stream subclasses. Table [4-1](#A978-1-4842-1565-4_4_Chapter.html#Tab1) describes
    `OutputStream`’s methods.


    Table 4-1.


    `OutputStream` Methods


    | Method | Description |

    | --- | --- |

    | `void close()` | Close this output stream and release any operating system resources
    associated with the stream. This method throws `java.io.IOException` when an I/O
    error occurs. |

    | `void flush()` | Flush this output stream by writing any buffered output bytes
    to the destination. If the intended destination of this output stream is an abstraction
    provided by the underlying operating system (for example, a file), flushing the
    stream only guarantees that bytes previously written to the stream are passed
    to the underlying operating system for writing; it doesn’t guarantee that they’re
    actually written to a physical device such as a disk drive. This method throws
    `IOException` when an I/O error occurs. |

    | `void write(byte[] b)` | Write `b.length` bytes from byte array `b` to this
    output stream. In general, `write(b)` behaves as if you specified `write(b, 0,
    b.length)`. This method throws `java.lang.NullPointerException` when `b` is `null`
    and `IOException` when an I/O error occurs. |

    | `void write(byte[] b, int off, int len)` | Write `len` bytes from byte array
    `b` starting at offset `off` to this output stream. This method throws `NullPointerException`
    when `b` is `null`; `java.lang.IndexOutOfBoundsException` when `off` is negative,
    `len` is negative, or `off + len` is greater than `b.length`; and `IOException`
    when an I/O error occurs. |

    | `void write(int b)` | Write byte `b` to this output stream. Only the eight low-order
    bits are written; the 24 high-order bits are ignored. This method throws `IOException`
    when an I/O error occurs. |


    The `flush()` method is useful in a long-running application that needs to save
    changes every so often, for example, a text editor application that saves changes
    to a temporary file every few minutes. Remember that `flush()` only flushes bytes
    to the operating system; doing so doesn’t necessarily result in the operating
    system flushing these bytes to the disk.


    Note


    The `close()` method automatically flushes the output stream. If an application
    ends before `close()` is called, the output stream is automatically closed and
    its data is flushed.


    `InputStream` is the superclass of all input stream subclasses. Table [4-2](#A978-1-4842-1565-4_4_Chapter.html#Tab2)
    describes `InputStream`’s methods.


