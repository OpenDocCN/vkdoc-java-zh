    store them in byte array `b`. Return the number of bytes actually read (which
    might be less than `b`’s length but is never more than its length), or return
    `-1` when the end of the stream is reached (no byte is available to read). This
    method blocks until input is available, the end of the stream is detected, or
    an exception is thrown. It throws `NullPointerException` when `b` is `null` and
    `IOException` when an I/O error occurs. |

    | `int read(byte[] b, int off, int len)` | Read no more than `len` bytes from
    this input stream and store them in byte array `b`, starting at the offset specified
    by `off`. Return the number of bytes actually read (which might be less than `len`
    but is never more than `len`), or return `-1` when the end of the stream is reached
    (no byte is available to read). This method blocks until input is available, the
    end of the stream is detected, or an exception is thrown. It throws `NullPointerException`
    when `b` is `null`; `IndexOutOfBoundsException` when `off` is negative, `len`
    is negative, or `len` is greater than `b.length - off`; and `IOException` when
    an I/O error occurs. |

