    input, standard output, and standard error streams?   Improve Listing [4-1](#A978-1-4842-1565-4_4_Chapter.html#FPar5)’s
    `Copy` application (performance wise) by using `BufferedInputStream` and `BufferedOutputStream`.
    `Copy` should read the bytes to be copied from the buffered input stream and write
