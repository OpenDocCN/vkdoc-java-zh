    object. Listing [12-48](#A978-1-4842-1565-4_12_Chapter.html#FPar69) presents the
    source code to an application that demonstrates `find()` and `BiPredicate`.


    Listing 12-48\. Streaming and Outputting the Paths of All Files That Match a File
    Extension


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.BasicFileAttributes;`


    `import java.util.List;`


    `import java.util.function.BiPredicate;`


    `import java.util.stream.Collectors;`


    `import java.util.stream.Stream;`


    `public class StreamsDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java StreamsDemo dirpath ext");`


    `return;`


    `}`


    `BiPredicate<Path, BasicFileAttributes> predicate = (path, attrs) ->`


    `attrs.isRegularFile() &&`


    `path.getFileName().toString().endsWith(args[1]);`


    `try (Stream<Path> stream = Files.find(Paths.get(args[0]), 1,`


    `predicate))`


    `{`


    `List<Path> entries = stream.collect(Collectors.toList());`


    `for (Path entry: entries)`


    `System.out.println(entry);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `}`


    After verifying that two command-line arguments (a directory path and a file extension)
    have been passed, `main()` uses a lambda to create a two-argument predicate (Boolean-valued
    function). This predicate returns `true` when the path identifies a regular file
    and its file name ends with the specified file extension. Otherwise, it returns
    `false`.


    Because `Stream` inherits from `AutoCloseable` (streams are closed when they’re
    no longer needed), I invoke `find()` and obtain the `Stream` in the context of
    a `try`-with-resources statement. I then obtain a list of those entries that match
    the predicate and iterate over the entries, outputting each entry to the standard
    output stream.


    Compile Listing [12-48](#A978-1-4842-1565-4_12_Chapter.html#FPar69) as follows:


    `javac StreamsDemo.java`


