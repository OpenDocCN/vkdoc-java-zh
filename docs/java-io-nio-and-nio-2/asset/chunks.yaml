    #### Exploring the File Store View


    `AttributeView` is also subtyped by `java.nio.file.attribute.` `FileStoreAttributeVie`
    `w`, which is a view of attributes associated with a file store. This interface
    declares no methods.


    A file store has the `totalSpace`, `unallocatedSpace`, and `usableSpace` attributes.
    You can access the values of these attributes by calling `FileStore`’s `getAttribute()`
    method.


    The `getAttribute()` method takes a single string argument that identifies an
    attribute according to the `view-name:attribute-name` syntax. For the `WindowsFileStore`
    subclass, I’ve found that a view name isn’t required for the `totalSpace`, `unallocatedSpace`,
    and `usableSpace` names:


    `System.out.printf("total space: %d%n",`


                       `fileStore.getAttribute("totalSpace"));`


    `System.out.printf("unallocated space: %d%n",`


                       `fileStore.getAttribute("unallocatedSpace"));`


    `System.out.printf("usable space: %d%n",`


                       `fileStore.getAttribute("usableSpace"));`


    Note


    Instead of accessing `totalSpace`, `unallocatedSpace`, and `usableSpace` via `getAttribute()`,
    it’s better to use `FileStore`’s type-safe `getTotalSpace()`, `getUnallocatedSpace()`,
    and `getUsableSpace()` methods, which I demonstrated earlier in this chapter.


    In contrast, you need to specify `volume` as the `view-name` when accessing the
    Windows-specific `vsn`, `isRemovable`, and `isCdrom` attributes:


    `System.out.printf("volume serial number: %b%n",`


                       `fileStore.getAttribute("volume:vsn"));`


    `System.out.printf("is removable: %b%n",`


                       `fileStore.getAttribute("volume:isRemovable"));`


    `System.out.printf("is CD-ROM: %b%n",`


                       `fileStore.getAttribute("volume:isCdrom"));`


    The `totalSpace`, `unallocatedSpace`, and `usableSpace` attributes are standard
    attributes that are available to every file store. However, file stores can have
    nonstandard attributes, such as a compression indicator. You can access these
    nonstandard attributes by working with `FileStoreAttributeView`.


    The empty `FileStoreAttributeView` interface can be extended by interfaces that
    identify groups of nonstandard custom file store attributes. However, the standard
    class library doesn’t expose any subinterfaces. If you have access to a custom
    interface, you can call the following method:


    `<V extends FileStoreAttributeView> V getFileStoreAttributeView(Class<V> type)`


    This method is used where the file store attribute view declares type-safe methods
    to read or update the file store attributes. The `type` parameter specifies the
    type of the attribute view required and the method returns an instance of this
    type when supported.


    ### Managing Files and Directories


    Paths let you locate files. You will commonly use paths with assorted `Files`
    methods to manage regular files, directories, and more. Management tasks that
    you can perform range from checking a path to determine if the file it represents
    exists to deleting a file.'
