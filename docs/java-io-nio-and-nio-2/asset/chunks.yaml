    ## 使用路径定位文件


    文件系统用于存储文件（包括常规文件和目录，也可能包含符号链接和硬链接）。文件通常按层级结构存储，并通过指定路径来定位，路径是一种紧凑的映射，通过分隔的名称元素序列在这些层级结构中导航。


    `java.nio.file.Path` 接口表示指向某个文件（该文件可能不存在）的层级路径。它可以选择性地以一个标识文件系统层级的名称元素开头，并可以选择性地后跟一系列由分隔符字符分隔的目录元素。距离目录层级根最远的名称元素是目录或其他类型文件的名称。其他名称元素则是目录名称。


    注意


    `Path` 声明了 `FileSystem getFileSystem()` 方法，用于返回对创建该 `Path` 对象所描述文件的 `FileSystem`
    的引用。


    一个 `Path` 可以表示根目录、根目录加一系列名称元素，或者一个或多个名称元素。当它完全由一个空名称元素组成时，表示一个空路径。使用空路径访问文件等同于访问文件系统的默认目录。


    注意


    `Path` 声明了 `File toFile()` 方法，用于返回一个表示其路径的 `File` 对象。当 `Path` 对象未与默认提供程序关联时，`toFile()`
    会抛出 `UnsupportedOperationException`。`File` 声明了 `Path toPath()` 方法，用于返回一个表示 `File`
    对象抽象路径的 `Path` 对象。当无法从抽象路径构造 `Path` 时，`toPath()` 会抛出 `java.nio.file.InvalidPathException`。这些方法允许你在源代码中混合使用
    `Path` 和 `File`，从而可以逐步将基于旧版 `File` 的代码迁移到使用改进后文件系统接口的代码。


    ### 获取路径并访问其名称元素


    `FileSystem` 提供了一个 `Path getPath(String first, String... more)` 方法，用于返回一个 `Path`
    对象。传递给 `first` 的参数标识路径字符串的初始部分。分配给 `more` 的可变参数列表标识了附加字符串，这些字符串会与 `first` 连接以形成完整的路径字符串。


    注意


    在构造 `Path` 时，其名称元素通常使用从 `FileSystem` 的 `String getSeparator()` 方法返回的名称分隔符进行连接。生成的路径字符串表示一个依赖于系统的文件路径。


    考虑以下示例：


    `Path path = fsDefault.getPath("x", "y");`


    此示例构造了一个 `Path`，其中 `y` 从属于 `x`。你也可以按如下方式构造此 `Path`：


    `Path path = fsDefault.getPath("x\\y");`


    与前一个示例不同，我在这里包含了 Windows 能理解的反斜杠（`\`）名称分隔符字符（已转义以满足 Java 编译器要求）。


    `Path` 必须符合创建了调用 `getPath()` 方法的 `FileSystem` 的文件系统提供程序所解析的语法。否则，此方法将抛出 `InvalidPathException`。


    警告


    在构造 `Path` 时，应避免硬编码名称分隔符字符，例如 Windows 上的反斜杠。尽管某些分隔符是合法的，例如 Windows 上的反斜杠或正斜杠（`/`），但其他分隔符很可能会导致
    `InvalidPathException`。例如，在 Windows 上将 `:x:y`（针对某个假设的文件系统）指定为路径会导致 `InvalidPathException`。


    NIO.2 提供了一个更方便的 `java.nio.file.Paths` 工具类，其中包含一对用于返回 `Path` 对象的类方法：


    *   `Path get(String first, String... more)`

    *   `Path get(URI uri)`


    第一个方法等同于在默认文件系统上调用 `getPath()` 并返回结果：


    `return FileSystems.getDefault().getPath(first, more);`


    第二个方法稍微复杂一些。它会遍历已安装的文件系统提供程序，以定位由给定 URI 的 scheme 组件标识的提供程序。当为 `file` scheme 找到此提供程序时，该方法会执行以下代码：


    `return FileSystems.getDefault().provider().getPath(uri);`


    获取默认文件系统后，会调用 `FileSystem` 的 `FileSystemProvider provider()` 方法来返回创建该 `FileSystem`
    对象的文件系统提供程序。然后，调用 `FileSystemProvider` 的 `Path getPath(URI uri)` 方法将 URI 参数转换为
    `Path` 对象。


    对于任何其他 scheme，会在已安装的提供程序列表中搜索第一个具有匹配 scheme 的提供程序。然后在该提供程序上调用 `getPath(uri)`。


    当由于语法错误而无法构造路径时，`get(String, String...)` 会抛出 `InvalidPathException`。当没有 `FileSystem`
    与 scheme 匹配时，`get(URI)` 会抛出 `java.nio.file.FileSystemNotFoundException`；对于错误的
    URI，则会抛出 `java.lang.IllegalArgumentException`。


    `Path` 声明了几个用于访问其名称元素的方法：


    *   `Path getFileName()`：返回此路径所表示文件的名称，作为一个 `Path` 对象。

    *   `Path getName(int index)`：返回此路径中第 `index` 个名称元素，作为一个 `Path` 对象。`index` 从 0
    开始，表示最接近根的元素。距离根最远的元素由名称计数减一来标识。

    *   `int getNameCount()`：返回路径中名称元素的数量。

    *   `Path getParent()`：返回父路径，如果没有父路径则返回 `null`。

    *   `Path getRoot()`：返回此路径中的根名称元素，作为一个 `Path` 对象，如果没有根则返回 `null`。

    *   [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `subpath(int beginIndex, int endIndex)`：返回一个相对路径，该路径是此路径中名称元素的一个子序列。第一个名称元素（最接近根）位于
    `beginIndex`，最后一个名称元素（距离根最远）位于 `endIndex` 减一的位置。


    清单 12-2 展示了一个演示路径构造及上述方法的应用程序源代码。


    清单 12-2. 构造路径并访问其名称元素


    `import java.nio.file.FileSystem;`


    `import java.nio.file.FileSystems;`


    `import java.nio.file.Path;`


    `public class PathDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `FileSystem fsDefault = FileSystems.getDefault();`


    `Path path = fsDefault.getPath("a", "b", "c");`


    `System.out.println(path);`


    `System.out.printf("File name: %s%n", path.getFileName());`


    `for (int i = 0; i < path.getNameCount(); i++)`


    `System.out.println(path.getName(i));`


    `System.out.printf("Parent: %s%n", path.getParent());`


    `System.out.printf("Root: %s%n", path.getRoot());`


    `System.out.printf("SubPath 0, 2): %s%n", path.subpath(0, 2));`


    `}`


    `}`


    按如下方式编译清单 [12-2：


    `javac PathDemo.java`


    按如下方式运行生成的应用程序：


    `java PathDemo`


    我观察到以下输出：


    `a\b\c`


    `File name: c`


    `a`


    `b`


    `c`


    `Parent: a\b`


    `Root: null`


    `SubPath [0, 2): a\b`

