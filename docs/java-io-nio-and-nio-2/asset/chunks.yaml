    is created or opened. When no options are specified, this method works as if the
    [`CREATE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#CREATE)
    , [`TRUNCATE_EXISTING`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#TRUNCATE_EXISTING)
    , and [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    options are present. It throws `UnsupportedOperationException` when an unsupported
    option (such as `READ`) is specified. It throws `IOException` when an I/O error
    occurs.


