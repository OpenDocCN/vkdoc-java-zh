  raw: '## [Chapter 14](#A978-1-4842-1565-4_14_Chapter.html): Completion of Socket
    Channel Functionality


    The capabilities that NIO.2 provides for completing socket channel functionality
    are support for binding and option configuration in the `DatagramChannel`, `ServerSocketChannel`,
    and `SocketChannel` classes and support for channel-based multicasting.   JDK
    7 overcame the counterintuitive mix of socket channel and socket APIs by introducing
    the `NetworkChannel` interface, which is implemented by the `DatagramChannel`,
    `ServerSocketChannel`, `SocketChannel`, `AsynchronousServerSocketChannel`, and
    `AsynchronousSocketChannel` classes.   The exceptions that are thrown by `SocketChannel`’s
    `shutdownInput()` and `shutdownOutput()` methods are `NotYetConnectedException`,
    `ClosedChannelException`, and `IOException`.   JDK 7 supports multicasting by
    introducing a `MulticastChannel` interface that extends `NetworkChannel`, by introducing
    a `MembershipKey` class, and by adding an `open(ProtocolFamily)` method to the
    `DatagramChannel` class.   The answer is false: The [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `join(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `group,` [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `ni,` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `source)` method performs include-mode filtering.   Listing [A-13](#A978-1-4842-1565-4_15_Chapter.html#FPar13)
