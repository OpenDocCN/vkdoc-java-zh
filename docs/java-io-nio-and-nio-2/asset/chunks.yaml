    \   {\n      if (args.length != 1)\n      {\n         System.err.println(\"usage:\
    \ java DSDemo dirpath\");\n         return;\n      }\n\n      Path path = Paths.get(args[0]);\n\
    \      DirectoryStream<Path> ds = Files.newDirectoryStream(path);\n      for (Path\
    \ p: ds)\n         System.out.println(p);\n   }\n}\n```\n\nIn Listing [12-32](#A978-1-4842-1565-4_12_Chapter.html#FPar48),\
    \ I didn’t bother to use `try`-with-resources, for convenience. (After all, this\
