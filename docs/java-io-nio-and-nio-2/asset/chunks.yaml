- fmt: "### Writing Files\n\nThe `Files` class provides support for writing regular\
    \ file content by declaring the following methods for writing all bytes or all\
    \ text lines to a file:\n\n- `Path write(Path path, byte[] bytes, OpenOption...\
    \ options)`\n- `Path write(Path path, Iterable<? extends CharSequence> lines,\
    \ Charset cs, OpenOption... options)`\n- `Path write(Path path, Iterable<? extends\
    \ CharSequence> lines, OpenOption... options)`\n\n`write(Path path, byte[] bytes,\
    \ OpenOption... options)` writes bytes to the file identified by `path`. The `options`\
    \ parameter specifies how the file is created or opened. When no options are present,\
    \ this method operates as if the `CREATE`, `TRUNCATE_EXISTING`, and `WRITE` options\
    \ are present. All bytes in the byte array are written to the file. The file is\
    \ then closed, even when an exception is thrown. This method throws `UnsupportedOperationException`\
    \ when an unsupported open option (such as `READ`) is specified. It throws `IOException`\
    \ when an I/O error occurs.\n\n`write(Path path, Iterable<? extends CharSequence>\
    \ lines, Charset cs, OpenOption... options)` writes lines of text to the file\
    \ identified by `path`. Each line is a char sequence that’s written to the file\
    \ in sequence with each line terminated by the operating system’s line separator,\
    \ as defined by the Java property `line.separator`. Characters are encoded into\
    \ bytes using charset `cs`. The `options` parameter specifies how the file is\
    \ created or opened. When no options are present, this method operates as if the\
    \ `CREATE`, `TRUNCATE_EXISTING`, and `WRITE` options are present. All lines are\
    \ written to the file. The file is then closed, even when an exception is thrown.\
    \ This method throws `UnsupportedOperationException` when an unsupported open\
    \ option is specified. It throws `IOException` when an I/O error occurs or when\
    \ the text cannot be encoded using the specified charset.\n\n`write(Path path,\
    \ Iterable<? extends CharSequence> lines, OpenOption... options)` behaves as if\
    \ you specified `Files.write(path, lines, StandardCharsets.UTF_8, options);`.\n\
    \nListing 12-26 describes an application that reads a web page and saves its HTML\
    \ text to a file named `page.html`.\n\n**Listing 12-26.** Saving Web Page HTML\
    \ to a Text File\n\n```\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\n\
    import java.io.IOException;\nimport java.net.URL;\nimport java.nio.file.Files;\n\
    import java.nio.file.Paths;\nimport java.util.ArrayList;\nimport java.util.List;\n\
    \npublic class SavePage\n{\n   public static void main(String[] args) throws IOException\n\
    \   {\n      if (args.length != 1)\n      {\n         System.err.println(\"usage:\
