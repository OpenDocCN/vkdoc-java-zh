    \ Doe`字节序列。\n\n现在，`main()`打开`emp`并读取最近写入的内容，然后将其输出。它通过`newByteChannel()`和`SeekableByteChannel`以通用方式处理这些任务。与其在源代码中硬编码`FileChannel`，不如使用`SeekableByteChannel`，原因与您使用`List`接口而不是`java.util.ArrayList`列表实现类来声明列表集合变量相同：您希望最大限度地减少因更改列表实现类而导致的源代码更改。尽管`FileChannel`目前是`SeekableByteChannel`的唯一实现，但未来可能会发生变化，您可能希望最大限度地减少源代码更改。\n\
