    `att.clientAddr,`


    `new String(bytes, CSUTF8));`


    `att.isReadMode = false;`


    `att.buffer.rewind();`


    `att.channelClient.write(att.buffer, att, this);`


    `}`


    `else`


    `{`


    `att.isReadMode = true;`


    `att.buffer.clear();`


    `att.channelClient.read(att.buffer, att, this);`


    `}`


    `}`


    `@Override`


    `public void failed(Throwable t, Attachment att)`


    `{`


    `System.out.println("Connection with client broken");`


    `}`


    `}`


    `ReadWriteHandler` 是一个 `CompletionHandler`，用于响应 `read()` 或 `write()` 方法的完成。调用其
    `completed()` 方法来响应成功的 `read()` 或 `write()`，这包括发出对应的 `write()` 或 `read()`。当客户端断开与服务器的连接时，会调用其
    `failed()` 方法。


    `completed()` 方法的第一个任务是响应返回 `-1` 的 `read()` 调用，这表示由于已到达流末尾而无法读取任何字节。（客户端可能在写入数据之前已终止。）它会关闭客户端套接字通道，输出一条消息以指示服务器不再监听该客户端，然后返回。


    假设读写处理器处于读取模式（`true`），缓冲区内容会被翻转并提取到一个 `bytes` 数组中，随后该数组被转换为一个字符串并输出。


    然后，通过将 `false` 赋值给 `isReadMode` 将读写处理器配置为写入模式，缓冲区被倒回以准备写入，接着缓冲区连同附件和当前完成处理器一起被传递给客户端套接字通道的
    `write()` 方法，以便将缓冲区内容发送给客户端。


    成功写入操作后，会调用读写处理器的 `completed()` 方法。由于 `isReadMode` 不再是 `true`，因此会执行 `if`-`else`
    语句的 `else` 部分。它将 `isReadMode` 切换为 `true`，清除缓冲区，并启动一个读取操作以从客户端读取数据。此模式会持续，直到客户端没有更多数据可读且完成处理器可以终止为止。（后一种情况可能永远不会发生。）


