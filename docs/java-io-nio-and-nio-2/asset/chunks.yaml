  trans: '

    ### 套接字地址


    以 `Socket` 结尾的类的实例与由 IP 地址和端口号组成的套接字地址相关联。这些类通常依赖 `InetAddress` 类来表示套接字地址中的 IPv4
    或 IPv6 地址部分；端口号则单独表示。


    注意


    `InetAddress` 依赖其 `Inet4Address` 子类来表示 IPv4 地址，并依赖其 `Inet6Address` 子类来表示 IPv6
    地址。


    `InetAddress` 声明了几个用于获取 `InetAddress` 实例的类方法。这些方法包括：


    *   `InetAddress[] getAllByName` `(String host)` 返回一个 `InetAddress` 数组，其中存储了与
    `host` 关联的 IP 地址。你可以向此参数传递域名（例如“`tutortutor.ca`”）或 IP 地址（例如“`70.33.247.10`”）作为参数。（要了解域名，请查看维基百科的“域名”条目
    [ [`http://en.wikipedia.org/wiki/Domain_name`](http://en.wikipedia.org/wiki/Domain_name)
    ]。）传递 `null` 以获取一个存储回环接口（一种基于软件的网络接口，发出的数据会作为传入数据循环回来）IP 地址的 `InetAddress` 实例。当找不到指定
    `host` 的 IP 地址，或者为全局 IPv6 地址指定了作用域标识符时，此方法会抛出 `UnknownHostException`。

    *   `InetAddress getByAddress` `(byte[] addr)` 返回给定原始 IP 地址的 `InetAddress` 对象。传递给
    `addr` 的参数采用网络字节序（最高有效字节在前），其中最高位字节存储在 `addr[0]` 中。对于 IPv4 地址，`addr` 数组的长度必须为
    4 字节；对于 IPv6 地址，长度必须为 16 字节。当数组为其他长度时，此方法会抛出 `UnknownHostException`。

    *   `InetAddress getByAddress` `(String hostName, byte[] ipAddress)` 根据主机名和 IP
    地址参数返回一个 `InetAddress` 实例。当数组长度既不是 4 也不是 16 时，此方法会抛出 `UnknownHostException`。

    *   `InetAddress getByName` `(String host)` 根据 `host` 参数返回一个 `InetAddress` 实例，该参数可以是机器名称（例如“`tutortutor.ca`”）或其
    IP 地址的文本表示形式。向 `host` 传递 `null` 会导致返回一个表示回环接口地址的 `InetAddress` 实例。

    *   `InetAddress getLocalHost` `()` 返回本地主机（当前主机）的地址，该地址由主机名 `localhost` 或通常表示为
    `127.0.0.1` (IPv4) 或 `::1` (IPv6) 的 IP 地址表示。当无法将本地主机解析为地址时，此方法会抛出 `UnknownHostException`。


    获取 `InetAddress` 对象后，你可以通过调用实例方法来查询它，例如 `byte[] getAddress()`，它返回此 `InetAddress`
    对象的原始 IP 地址（采用网络字节序）；以及 `boolean isLoopbackAddress()`，它确定此 `InetAddress` 对象是否表示回环地址。


    Java 1.4 引入了抽象的 `SocketAddress` 类，用于表示“无协议附加”的套接字地址。（此类的创建者可能预见到 Java 最终会支持除广泛流行的互联网协议之外的低级通信协议。）


    `SocketAddress` 由具体的 `InetSocketAddress` 类继承，该类将套接字地址表示为 IP 地址和端口号。它也可以表示主机名和端口号，并会尝试解析该主机名。


    通过调用 `InetSocketAddress(InetAddress addr, int port)` 和其他构造函数来创建 `InetSocketAddress`
    实例。创建实例后，你可以调用诸如 `InetAddress getAddress()` 和 `int getPort()` 之类的方法来返回套接字地址的组成部分。


    ### 套接字选项


    以 `Socket` 结尾的类的实例共享套接字选项的概念，这些选项是用于配置套接字行为的参数。套接字选项由 `SocketOptions` 接口中声明的常量描述：


    *   `IP_MULTICAST_IF`：指定用于多播数据包的传出网络接口（在多宿主 [多个 NIC] 主机上）。

    *   `IP_MULTICAST_IF2`：使用接口索引指定用于多播数据包的传出网络接口。

    *   `IP_MULTICAST_LOOP`：启用或禁用多播数据报的本地回环。

    *   `IP_TOS`：为 TCP 或 UDP 套接字设置 IP 头部中的服务类型 (IPv4) 或流量类别 (IPv6) 字段。

    *   `SO_BINDADDR`：获取套接字的本地地址绑定。

    *   `SO_BROADCAST`：启用套接字发送广播消息。

    *   `SO_KEEPALIVE`：打开套接字的保活设置。

    *   `SO_LINGER`：指定在关闭仍有缓冲数据待发送的套接字时要等待的秒数。

    *   `SO_OOBINLINE`：启用 TCP 紧急数据的内联接收。

    *   `SO_RCVBUF`：设置或获取最大套接字接收缓冲区大小（以字节为单位）。

    *   `SO_REUSEADDR`：启用套接字的地址重用。

    *   `SO_SNDBUF`：设置或获取最大套接字发送缓冲区大小（以字节为单位）。

    *   `SO_TIMEOUT`：为阻塞的 accept 或 read/receive（但不包括 write/send）套接字操作指定超时时间（以毫秒为单位）。（不要永远阻塞！）

    *   `TCP_NODELAY`：禁用 Nagle 算法（`http://en.wikipedia.org/wiki/Nagle’s_algorithm`）。写入网络的数据不会被缓冲，以等待先前写入数据的确认。


    `SocketOptions` 还声明了以下用于设置和获取这些选项的方法：


    *   `void setOption(int optID, Object value)`

    *   `Object getOption(int optID)`


    `optID` 是上述常量之一，`value` 是合适类（例如 `java.lang.Boolean`）的对象。


    `SocketOptions` 由抽象的 `SocketImpl` 和 `DatagramSocketImpl` 类实现。这些类的具体实例被各种以 `Socket`
    结尾的类包装。因此，你不能直接调用这些方法。相反，你需要使用以 `Socket` 结尾的类提供的类型安全的 setter 和 getter 方法来设置和获取这些选项。


    例如，`Socket` 声明了 `void setKeepAlive(boolean keepAlive)` 用于设置 `SO_KEEPALIVE` 选项，`ServerSocket`
    声明了 `void setSoTimeout(int timeout)` 用于设置 `SO_TIMEOUT` 选项。请查阅以 `Socket` 结尾的类的文档，以了解这些及其他套接字选项方法。


    注意


    适用于 `DatagramSocket` 的套接字选项方法也适用于其 `MulticastSocket` 子类。

