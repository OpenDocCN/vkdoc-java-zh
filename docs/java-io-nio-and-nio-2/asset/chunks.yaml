  raw: '`MappedByteBuffer` inherits methods from its `java.nio.ByteBuffer` superclass.
    It also declares the following methods:


    *   `MappedByteBuffer load()`: Attempt to load all of the mapped file content
    into memory. This results in much faster access for large files because the virtual
    memory manager doesn’t have to load portions of the file into memory as those
    portions are requested (by reading from/writing to their locations) while traversing
    the mapped buffer. Although `load()` makes a best effort, it may not succeed because
    external programs may cause the virtual memory manager to remove portions of the
    loaded file content to make room for their requests to load content into physical
    memory. Also, `load()` can be expensive time-wise because it can cause the virtual
    memory manager to perform many I/O operations; it may take time for this method
    to complete.

    *   `boolean isLoaded()`: Return `true` when all of the mapped file content has
    been loaded into memory; otherwise, return `false`. If this method returns `true`,
    you can probably access all of the content with few or no I/O operations. If this
    method returns `false`, it’s still possible that buffer access will be fast and
    that the mapped content will be entirely resident in memory. Think of `isLoaded()`
    as hinting at the mapped byte buffer’s status.

    *   `MappedByteBuffer force()`: Cause changes made to the mapped byte buffer to
    be written out to permanent storage. When working with mapped byte buffers, you
    should invoke this method instead of the file channel’s `force()` method because
    the channel might be unaware of various changes made through the mapped byte buffer.
    Calling this method has no effect on `READ_ONLY` and `PRIVATE` mappings.


    Listing [7-5](#A978-1-4842-1565-4_7_Chapter.html#FPar16) presents an application
    that demonstrates file mapping.


    Listing 7-5\. Demonstrating File Mapping


    `import java.io.IOException;`


    `import java.io.RandomAccessFile;`


    `import java.nio.ByteBuffer;`


    `import java.nio.MappedByteBuffer;`


    `import java.nio.channels.FileChannel;`


    `public class ChannelDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.out.println("usage: java ChannelDemo filespec");`


    `return;`


    `}`


    `RandomAccessFile raf = new RandomAccessFile(args[0], "rw");`


    `FileChannel fc = raf.getChannel();`


    `long size = fc.size();`


    `System.out.println("Size: " + size);`


    `MappedByteBuffer mbb = fc.map(FileChannel.MapMode.READ_WRITE, 0,`


    `size);`


    `while (mbb.remaining() > 0)`


    `System.out.print((char) mbb.get());`


    `System.out.println();`


    `System.out.println();`


    `for (int i = 0; i < mbb.limit() / 2; i++)`


    `{`


    `byte b1 = mbb.get(i);`


    `byte b2 = mbb.get(mbb.limit() - i - 1);`


    `mbb.put(i, b2);`


    `mbb.put(mbb.limit() - i - 1, b1);`


    `}`


    `mbb.flip();`


    `while (mbb.remaining() > 0)`


    `System.out.print((char) mbb.get());`


    `fc.close();`


    `}`


    `}`


    After verifying that you’ve specified a single command-line argument, which should
    identify an existing file, `main()` creates a `RandomAccessFile` object for accessing
    this file in read/write mode. It then obtains a file channel for communicating
    with this file.


    After using the file channel to obtain the file size, which is subsequently output,
    `main()` uses the file channel to invoke `map()` to obtain a read/write mapping
    of the entire file. It subsequently outputs the contents of the returned mapped
    byte buffer.


    Later on, `main()` enters a `for` loop whose purpose is to reverse the file’s
    contents. In each of the iterations, two bytes that mirror each other are obtained
    and then swapped. After leaving this loop, `main()` flips the buffer for draining
    and outputs its reversed contents.


    Compile Listing [7-5](#A978-1-4842-1565-4_7_Chapter.html#FPar16) (`javac ChannelDemo.java`)
    and, assuming the existence of a `poem.txt` file, execute the following command
    line to reverse this file’s contents:


    `java ChannelDemo poem.txt`


    You should observe output similar to the following:


    `Size: 67`


    `Roses are red,`


    `Violets are blue,`


    `Sugar is sweet,`


    `And so are you!`


    `!uoy era os dnA`


    `,teews si raguS`


    `,eulb era steloiV`


    `,der era sesoR`


    Note that the blank lines in the reversed text result from reversing the carriage
    return (13)/line feed (10) sequences on Windows operating systems.


    Furthermore, the contents of `poem.txt` should be reversed.'
