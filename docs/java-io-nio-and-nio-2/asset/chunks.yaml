- fmt: "# Buffers in Depth\n\nThe previous discussion of the `Buffer` class has given\
    \ you some insight into NIO buffers. However, there’s much more to explore. This\
    \ section takes you deeper into buffers by exploring buffer creation, buffer writing\
    \ and reading, buffer flipping, buffer marking, `Buffer` subclass operations,\
    \ byte ordering, and direct buffers.\n\n**Note:** Although the primitive-type\
    \ buffer classes have similar capabilities, `ByteBuffer` is the largest and most\
    \ versatile. After all, bytes are the basic unit used by operating systems to\
    \ transfer data items. I’ll therefore use `ByteBuffer` to demonstrate most buffer\
    \ operations. I’ll also use `CharBuffer` to add variety.\n\n## Buffer Creation\n\
    \n`ByteBuffer` and the other primitive-type buffer classes declare various class\
    \ methods for creating a buffer of that type. For example, `ByteBuffer` declares\
    \ the following class methods for creating `ByteBuffer` instances:\n\n- `ByteBuffer\
    \ allocate(int capacity)`: Allocate a new byte buffer with the specified `capacity`\
    \ value. Its position is 0, its limit is its capacity, its mark is undefined,\
    \ and each element is initialized to 0. It has a backing array, and its array\
    \ offset is 0. This method throws `IllegalArgumentException` when `capacity` is\
    \ negative.\n- `ByteBuffer allocateDirect(int capacity)`: Allocate a new direct\
    \ byte buffer (discussed later) with the specified `capacity` value. Its position\
    \ is 0, its limit is its capacity, its mark is undefined, and each element is\
    \ initialized to 0. Whether or not it has a backing array is unspecified. This\
    \ method throws `IllegalArgumentException` when `capacity` is negative.\n\nBefore\
    \ JDK 7, direct buffers allocated via this method were aligned on a page boundary.\
    \ In JDK 7, the implementation changed so that direct buffers are no longer page-aligned.\
    \ This should reduce the memory requirements of applications that create lots\
    \ of small buffers. (To learn about an operating system’s paging memory-management\
    \ mechanism, which is based on pages, check out Wikipedia’s “Paging” topic at\
    \ [`https://en.wikipedia.org/wiki/Paging`](https://en.wikipedia.org/wiki/Paging).)\n\
    \n- `ByteBuffer wrap(byte[] array)`: Wrap a byte array into a buffer. The new\
    \ buffer is backed by `array`; that is, modifications to the buffer will cause\
    \ the array to be modified and vice versa. The new buffer’s capacity and limit\
    \ are set to `array.length`, its position is set to 0, and its mark is undefined.\
    \ Its array offset is 0.\n- `ByteBuffer wrap(byte[] array, int offset, int length)`:\
    \ Wrap a byte array into a buffer. The new buffer is backed by `array`. The new\
    \ buffer’s capacity is set to `array.length`, its position is set to `offset`,\
    \ its limit is set to `offset + length`, and its mark is undefined. Its array\
    \ offset is 0. This method throws `java.lang.IndexOutOfBoundsException` when `offset`\
    \ is negative or greater than `array.length` or when `length` is negative or greater\
    \ than `array.length - offset`.\n\nThese methods show two ways to create a byte\
    \ buffer: create the `ByteBuffer` object and allocate an internal array that stores\
    \ `capacity` bytes or create the `ByteBuffer` object and use the specified `array`\
    \ to store these bytes. Consider these examples:\n\n```\nByteBuffer buffer = ByteBuffer.allocate(10);\n\
    byte[] bytes = new byte[200];\nByteBuffer buffer2 = ByteBuffer.wrap(bytes);\n\
    ```\n\nThe first line creates a byte buffer with an internal byte array that stores\
    \ a maximum of 10 bytes, and the second and third lines create a byte array and\
    \ a byte buffer that uses this array to store a maximum of 200 bytes.\n\nNow consider\
    \ the following example, which extends the previous example:\n\n```\nbuffer =\
    \ ByteBuffer.wrap(bytes, 10, 50);\n```\n\nThis example creates a byte buffer with\
    \ a position of 10, a limit of 50, and a capacity of `bytes.length` (which happens\
    \ to be 200). Although it appears that the buffer can only access a subrange of\
    \ this array, it actually has access to the entire array: values 10 and 50 are\
    \ only the starting values for the position and limit.\n\n`ByteBuffer`s (and other\
    \ primitive-type buffers) created via `allocate()` or `wrap()` are nondirect byte\
    \ buffers—you’ll learn about direct byte buffers later. Nondirect byte buffers\
    \ have backing arrays, and you can access these backing arrays via the `array()`\
    \ method (which happens to be declared as `byte[] array()` in the `ByteArray`\
    \ class) as long as `hasArray()` returns true. (When `hasArray()` returns true,\
    \ you’ll need to call `arrayOffset()` to obtain the location of the first data\
    \ item in the array.)\n\nListing 6-2 demonstrates buffer allocation and wrapping.\n\
    \n**Listing 6-2.** Creating Byte-Oriented Buffers via Allocation and Wrapping\n\
    \n```\nimport java.nio.ByteBuffer;\n\npublic class BufferDemo\n{\n   public static\
    \ void main(String[] args)\n   {\n      ByteBuffer buffer1 = ByteBuffer.allocate(10);\n\
    \      if (buffer1.hasArray())\n      {\n         System.out.println(\"buffer1\
    \ array: \" + buffer1.array());\n         System.out.println(\"Buffer1 array offset:\
    \ \" +\n                            buffer1.arrayOffset());\n         System.out.println(\"\
    Capacity: \" + buffer1.capacity());\n         System.out.println(\"Limit: \" +\
    \ buffer1.limit());\n         System.out.println(\"Position: \" + buffer1.position());\n\
    \         System.out.println(\"Remaining: \" + buffer1.remaining());\n       \
    \  System.out.println();\n      }\n\n      byte[] bytes = new byte[200];\n   \
    \   ByteBuffer buffer2 = ByteBuffer.wrap(bytes);\n      buffer2 = ByteBuffer.wrap(bytes,\
    \ 10, 50);\n      if (buffer2.hasArray())\n      {\n         System.out.println(\"\
    buffer2 array: \" + buffer2.array());\n         System.out.println(\"Buffer2 array\
    \ offset: \" +\n                            buffer2.arrayOffset());\n        \
    \ System.out.println(\"Capacity: \" + buffer2.capacity());\n         System.out.println(\"\
    Limit: \" + buffer2.limit());\n         System.out.println(\"Position: \" + buffer2.position());\n\
    \         System.out.println(\"Remaining: \" + buffer2.remaining());\n      }\n\
    \   }\n}\n```\n\nCompile Listing 6-2 (`javac BufferDemo.java`) and run this application\
    \ (`java BufferDemo`). You should observe output that is similar to the following:\n\
    \n```\nbuffer1 array: [B@659e0bfd\nBuffer1 array offset: 0\nCapacity: 10\nLimit:\
    \ 10\nPosition: 0\nRemaining: 10\n\nbuffer2 array: [B@2a139a55\nBuffer2 array\
    \ offset: 0\nCapacity: 200\nLimit: 60\nPosition: 10\nRemaining: 50\n```\n\nAs\
    \ well as managing data elements stored in external arrays (via the `wrap()` methods),\
    \ buffers can manage data stored in other buffers. When you create a buffer that\
    \ manages another buffer’s data, the created buffer is known as a view buffer.\
    \ Changes made in either buffer are reflected in the other.\n\nView buffers are\
    \ created by calling a `Buffer` subclass’s `duplicate()` method. The resulting\
    \ view buffer is equivalent to the original buffer; both buffers share the same\
    \ data items and have equivalent capacities. However, each buffer has its own\
    \ position, limit, and mark. When the buffer being duplicated is read-only or\
    \ direct, the view buffer is also read-only or direct.\n\nConsider the following\
    \ example:\n\n```\nByteBuffer buffer = ByteBuffer.allocate(10);\nByteBuffer bufferView\
    \ = buffer.duplicate();\n```\n\nThe `ByteBuffer` instance identified by `bufferView`\
    \ shares the same internal array of 10 elements as `buffer`. At the moment, these\
    \ buffers have the same position, limit, and (undefined) mark. However, these\
    \ properties in one buffer can be changed independently of the properties in the\
    \ other buffer.\n\nView buffers are also created by calling one of `ByteBuffer`’s\
    \ `asXxxBuffer()` methods. For example, `LongBuffer asLongBuffer()` returns a\
    \ view buffer that conceptualizes the byte buffer as a buffer of long integers.\n\
    \n**Note:** Read-only view buffers can be created by calling a method such as\
    \ `ByteBuffer asReadOnlyBuffer()`. Any attempt to change a read-only view buffer’s\
    \ content results in `ReadOnlyBufferException`. However, the original buffer content\
    \ (provided that it isn’t read-only) can be changed, and the read-only view buffer\
    \ will reflect these changes."
  raw: '## Buffers in Depth


    The previous discussion of the `Buffer` class has given you some insight into
    NIO buffers. However, there’s much more to explore. This section takes you deeper
    into buffers by exploring buffer creation, buffer writing and reading, buffer
    flipping, buffer marking, `Buffer` subclass operations, byte ordering, and direct
    buffers.


    Note


    Although the primitive-type buffer classes have similar capabilities, `ByteBuffer`
    is the largest and most versatile. After all, bytes are the basic unit used by
    operating systems to transfer data items. I’ll therefore use `ByteBuffer` to demonstrate
    most buffer operations. I’ll also use `CharBuffer` to add variety.


    ### Buffer Creation


    `ByteBuffer` and the other primitive-type buffer classes declare various class
    methods for creating a buffer of that type. For example, `ByteBuffer` declares
    the following class methods for creating `ByteBuffer` instances:


    *   `ByteBuffer` `allocate` `(int capacity)`: Allocate a new byte buffer with
    the specified `capacity` value. Its position is 0, its limit is its capacity,
    its mark is undefined, and each element is initialized to 0\. It has a backing
    array, and its array offset is 0\. This method throws `IllegalArgumentException`
    when `capacity` is negative.

    *   `ByteBuffer` `allocateDirect` `(int capacity)`: Allocate a new direct byte
    buffer (discussed later) with the specified `capacity` value. Its position is
    0, its limit is its capacity, its mark is undefined, and each element is initialized
    to 0\. Whether or not it has a backing array is unspecified. This method throws
    `IllegalArgumentException` when `capacity` is negative.


    Before JDK 7, direct buffers allocated via this method were aligned on a page
    boundary. In JDK 7, the implementation changed so that direct buffers are no longer
    page-aligned. This should reduce the memory requirements of applications that
    create lots of small buffers. (To learn about an operating system’s paging memory-management
    mechanism, which is based on pages, check out Wikipedia’s “Paging” topic at [`https://en.wikipedia.org/wiki/Paging`](https://en.wikipedia.org/wiki/Paging)
    .)


    *   `ByteBuffer` `wrap` `(byte[] array)`: Wrap a byte array into a buffer. The
    new buffer is backed by `array`; that is, modifications to the buffer will cause
    the array to be modified and vice versa. The new buffer’s capacity and limit are
    set to `array.length`, its position is set to `0`, and its mark is undefined.
    Its array offset is `0`.

    *   `ByteBuffer` `wrap` `(byte[] array, int offset, int length)`: Wrap a byte
    array into a buffer. The new buffer is backed by `array`. The new buffer’s capacity
    is set to `array.length`, its position is set to `offset`, its limit is set to
    `offset + length`, and its mark is undefined. Its array offset is `0`. This method
    throws `java.lang.IndexOutOfBoundsException` when `offset` is negative or greater
    than `array.length` or when `length` is negative or greater than `array.length
    - offset`.


    These methods show two ways to create a byte buffer: create the `ByteBuffer` object
    and allocate an internal array that stores `capacity` bytes or create the `ByteBuffer`
    object and use the specified `array` to store these bytes. Consider these examples:


    `ByteBuffer buffer = ByteBuffer.allocate(10);`


    `byte[] bytes = new byte[200];`


    `ByteBuffer buffer2 = ByteBuffer.wrap(bytes);`


    The first line creates a byte buffer with an internal byte array that stores a
    maximum of 10 bytes, and the second and third lines create a byte array and a
    byte buffer that uses this array to store a maximum of 200 bytes.


    Now consider the following example, which extends the previous example:


    `buffer = ByteBuffer.wrap(bytes, 10, 50);`


    This example creates a byte buffer with a position of `10`, a limit of `50`, and
    a capacity of `bytes.length` (which happens to be 200). Although it appears that
    the buffer can only access a subrange of this array, it actually has access to
    the entire array: values `10` and `50` are only the starting values for the position
    and limit.


    `ByteBuffer`s (and other primitive-type buffers) created via `allocate()` or `wrap()`
    are nondirect byte buffers—you’ll learn about direct byte buffers later. Nondirect
    byte buffers have backing arrays, and you can access these backing arrays via
    the `array()` method (which happens to be declared as `byte[] array()` in the
    `ByteArray` class) as long as `hasArray()` returns true. (When `hasArray()` returns
    true, you’ll need to call `arrayOffset()` to obtain the location of the first
    data item in the array.)


    Listing [6-2](#A978-1-4842-1565-4_6_Chapter.html#FPar5) demonstrates buffer allocation
    and wrapping.


    Listing 6-2\. Creating Byte-Oriented Buffers via Allocation and Wrapping


    `import java.nio.ByteBuffer;`


    `public class BufferDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `ByteBuffer buffer1 = ByteBuffer.allocate(10);`


    `if (buffer1.hasArray())`


    `{`


    `System.out.println("buffer1 array: " + buffer1.array());`


    `System.out.println("Buffer1 array offset: " +`


    `buffer1.arrayOffset());`


    `System.out.println("Capacity: " + buffer1.capacity());`


    `System.out.println("Limit: " + buffer1.limit());`


    `System.out.println("Position: " + buffer1.position());`


    `System.out.println("Remaining: " + buffer1.remaining());`


    `System.out.println();`


    `}`


    `byte[] bytes = new byte[200];`


    `ByteBuffer buffer2 = ByteBuffer.wrap(bytes);`


    `buffer2 = ByteBuffer.wrap(bytes, 10, 50);`


    `if (buffer2.hasArray())`


    `{`


    `System.out.println("buffer2 array: " + buffer2.array());`


    `System.out.println("Buffer2 array offset: " +`


    `buffer2.arrayOffset());`


    `System.out.println("Capacity: " + buffer2.capacity());`


    `System.out.println("Limit: " + buffer2.limit());`


    `System.out.println("Position: " + buffer2.position());`


    `System.out.println("Remaining: " + buffer2.remaining());`


    `}`


    `}`


    `}`


    Compile Listing [6-2](#A978-1-4842-1565-4_6_Chapter.html#FPar5) (`javac BufferDemo.java`)
    and run this application (`java BufferDemo`). You should observe output that is
    similar to the following:


    `buffer1 array: [B@659e0bfd`


    `Buffer1 array offset: 0`


    `Capacity: 10`


    `Limit: 10`


    `Position: 0`


    `Remaining: 10`


    `buffer2 array: [B@2a139a55`


    `Buffer2 array offset: 0`


    `Capacity: 200`


    `Limit: 60`


    `Position: 10`


    `Remaining: 50`


    As well as managing data elements stored in external arrays (via the `wrap()`
    methods), buffers can manage data stored in other buffers. When you create a buffer
    that manages another buffer’s data, the created buffer is known as a view buffer.
    Changes made in either buffer are reflected in the other.


    View buffers are created by calling a `Buffer` subclass’s `duplicate()` method.
    The resulting view buffer is equivalent to the original buffer; both buffers share
    the same data items and have equivalent capacities. However, each buffer has its
    own position, limit, and mark. When the buffer being duplicated is read-only or
    direct, the view buffer is also read-only or direct.


    Consider the following example:


    `ByteBuffer buffer = ByteBuffer.allocate(10);`


    `ByteBuffer bufferView = buffer.duplicate();`


    The `ByteBuffer` instance identified by `bufferView` shares the same internal
    array of 10 elements as `buffer`. At the moment, these buffers have the same position,
    limit, and (undefined) mark. However, these properties in one buffer can be changed
    independently of the properties in the other buffer.


    View buffers are also created by calling one of `ByteBuffer`’s `asxBuffer()` methods.
    For example, `LongBuffer asLongBuffer()` returns a view buffer that conceptualizes
    the byte buffer as a buffer of long integers.


    Note


    Read-only view buffers can be created by calling a method such as `ByteBuffer
    asReadOnlyBuffer()`. Any attempt to change a read-only view buffer’s content results
    in `ReadOnlyBufferException`. However, the original buffer content (provided that
    it isn’t read-only) can be changed, and the read-only view buffer will reflect
    these changes.'
  trans: '

    ## 深入理解缓冲区


    之前对 `Buffer` 类的讨论已经让你对 NIO 缓冲区有了一些了解。然而，还有更多内容值得探索。本节将通过探讨缓冲区的创建、写入与读取、翻转、标记、`Buffer`
    子类操作、字节序以及直接缓冲区，带你更深入地理解缓冲区。


    注意


    尽管基本类型缓冲区类具有相似的功能，但 `ByteBuffer` 是最大且最通用的。毕竟，字节是操作系统用来传输数据项的基本单位。因此，我将使用 `ByteBuffer`
    来演示大多数缓冲区操作。我也会使用 `CharBuffer` 来增加多样性。


    ### 创建缓冲区


    `ByteBuffer` 和其他基本类型缓冲区类声明了多种用于创建该类型缓冲区的类方法。例如，`ByteBuffer` 声明了以下用于创建 `ByteBuffer`
    实例的类方法：


    *   `ByteBuffer` `allocate` `(int capacity)`：分配一个新的字节缓冲区，其容量为指定的 `capacity` 值。其位置为
    0，限制为容量，标记未定义，每个元素初始化为 0。它有一个后备数组，其数组偏移量为 0。当 `capacity` 为负数时，此方法抛出 `IllegalArgumentException`。

    *   `ByteBuffer` `allocateDirect` `(int capacity)`：分配一个新的直接字节缓冲区（稍后讨论），其容量为指定的
    `capacity` 值。其位置为 0，限制为容量，标记未定义，每个元素初始化为 0。它是否有后备数组未指定。当 `capacity` 为负数时，此方法抛出
    `IllegalArgumentException`。


    在 JDK 7 之前，通过此方法分配的直接缓冲区在页边界上对齐。在 JDK 7 中，实现发生了变化，直接缓冲区不再按页对齐。这应该会减少创建大量小缓冲区的应用程序的内存需求。（要了解基于页的操作系统分页内存管理机制，请查看维基百科的“分页”主题，网址为
    [`https://en.wikipedia.org/wiki/Paging`](https://en.wikipedia.org/wiki/Paging)
    。）


    *   `ByteBuffer` `wrap` `(byte[] array)`：将字节数组包装到缓冲区中。新缓冲区由 `array` 支持；也就是说，对缓冲区的修改会导致数组被修改，反之亦然。新缓冲区的容量和限制设置为
    `array.length`，其位置设置为 `0`，标记未定义。其数组偏移量为 `0`。

    *   `ByteBuffer` `wrap` `(byte[] array, int offset, int length)`：将字节数组包装到缓冲区中。新缓冲区由
    `array` 支持。新缓冲区的容量设置为 `array.length`，其位置设置为 `offset`，其限制设置为 `offset + length`，标记未定义。其数组偏移量为
    `0`。当 `offset` 为负数或大于 `array.length`，或者 `length` 为负数或大于 `array.length - offset`
    时，此方法抛出 `java.lang.IndexOutOfBoundsException`。


    这些方法展示了创建字节缓冲区的两种方式：创建 `ByteBuffer` 对象并分配一个内部数组来存储 `capacity` 个字节，或者创建 `ByteBuffer`
    对象并使用指定的 `array` 来存储这些字节。考虑以下示例：


    `ByteBuffer buffer = ByteBuffer.allocate(10);`


    `byte[] bytes = new byte[200];`


    `ByteBuffer buffer2 = ByteBuffer.wrap(bytes);`


    第一行创建了一个字节缓冲区，其内部字节数组最多可存储 10 个字节，第二行和第三行创建了一个字节数组和一个使用该数组最多可存储 200 个字节的字节缓冲区。


    现在考虑以下扩展了前一个示例的示例：


    `buffer = ByteBuffer.wrap(bytes, 10, 50);`


    此示例创建了一个字节缓冲区，其位置为 `10`，限制为 `50`，容量为 `bytes.length`（恰好是 200）。尽管看起来该缓冲区只能访问此数组的一个子范围，但它实际上可以访问整个数组：值
    `10` 和 `50` 只是位置和限制的起始值。


    通过 `allocate()` 或 `wrap()` 创建的 `ByteBuffer`（和其他基本类型缓冲区）是非直接字节缓冲区——稍后你将了解直接字节缓冲区。非直接字节缓冲区有后备数组，只要
    `hasArray()` 返回 true，你就可以通过 `array()` 方法（该方法在 `ByteArray` 类中声明为 `byte[] array()`）访问这些后备数组。（当
    `hasArray()` 返回 true 时，你需要调用 `arrayOffset()` 来获取数组中第一个数据项的位置。）


    清单 6-2 演示了缓冲区的分配和包装。


    清单 6-2\. 通过分配和包装创建面向字节的缓冲区


    `import java.nio.ByteBuffer;`


    `public class BufferDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `ByteBuffer buffer1 = ByteBuffer.allocate(10);`


    `if (buffer1.hasArray())`


    `{`


    `System.out.println("buffer1 array: " + buffer1.array());`


    `System.out.println("Buffer1 array offset: " +`


    `buffer1.arrayOffset());`


    `System.out.println("Capacity: " + buffer1.capacity());`


    `System.out.println("Limit: " + buffer1.limit());`


    `System.out.println("Position: " + buffer1.position());`


    `System.out.println("Remaining: " + buffer1.remaining());`


    `System.out.println();`


    `}`


    `byte[] bytes = new byte[200];`


    `ByteBuffer buffer2 = ByteBuffer.wrap(bytes);`


    `buffer2 = ByteBuffer.wrap(bytes, 10, 50);`


    `if (buffer2.hasArray())`


    `{`


    `System.out.println("buffer2 array: " + buffer2.array());`


    `System.out.println("Buffer2 array offset: " +`


    `buffer2.arrayOffset());`


    `System.out.println("Capacity: " + buffer2.capacity());`


    `System.out.println("Limit: " + buffer2.limit());`


    `System.out.println("Position: " + buffer2.position());`


    `System.out.println("Remaining: " + buffer2.remaining());`


    `}`


    `}`


    `}`


    编译清单 6-2（`javac BufferDemo.java`）并运行此应用程序（`java BufferDemo`）。你应该会看到类似于以下的输出：


    `buffer1 array: [B@659e0bfd`


    `Buffer1 array offset: 0`


    `Capacity: 10`


    `Limit: 10`


    `Position: 0`


    `Remaining: 10`


    `buffer2 array: [B@2a139a55`


    `Buffer2 array offset: 0`


    `Capacity: 200`


    `Limit: 60`


    `Position: 10`


    `Remaining: 50`


    除了管理存储在外部数组中的数据元素（通过 `wrap()` 方法），缓冲区还可以管理存储在其他缓冲区中的数据。当你创建一个管理另一个缓冲区数据的缓冲区时，所创建的缓冲区称为视图缓冲区。任一缓冲区中的更改都会反映在另一个缓冲区中。


    视图缓冲区是通过调用 `Buffer` 子类的 `duplicate()` 方法创建的。生成的视图缓冲区等同于原始缓冲区；两个缓冲区共享相同的数据项并具有相同的容量。但是，每个缓冲区都有自己的位置、限制和标记。当被复制的缓冲区是只读或直接缓冲区时，视图缓冲区也是只读或直接缓冲区。


    考虑以下示例：


    `ByteBuffer buffer = ByteBuffer.allocate(10);`


    `ByteBuffer bufferView = buffer.duplicate();`


    由 `bufferView` 标识的 `ByteBuffer` 实例与 `buffer` 共享相同的 10 个元素的内部数组。目前，这些缓冲区具有相同的位置、限制和（未定义的）标记。但是，一个缓冲区中的这些属性可以独立于另一个缓冲区中的属性进行更改。


    视图缓冲区也可以通过调用 `ByteBuffer` 的某个 `asxBuffer()` 方法来创建。例如，`LongBuffer asLongBuffer()`
    返回一个将字节缓冲区概念化为长整数缓冲区的视图缓冲区。


    注意


    只读视图缓冲区可以通过调用诸如 `ByteBuffer asReadOnlyBuffer()` 之类的方法来创建。任何更改只读视图缓冲区内容的尝试都会导致
    `ReadOnlyBufferException`。但是，原始缓冲区内容（前提是它不是只读的）可以被更改，并且只读视图缓冲区将反映这些更改。

