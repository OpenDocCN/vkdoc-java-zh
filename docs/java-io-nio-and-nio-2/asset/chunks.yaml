    and `SocketChannel` with several useful methods:


    *   `DatagramChannel` received a [`SocketAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/SocketAddress.html#class%20in%20java.net)
    `getRemoteAddress()` method that returns the remote address to which this channel’s
    socket is connected.

    *   `ServerSocketChannel` received a `ServerSocketChannel bind(SocketAddress local,
    int backlog)` method that also lets you specify the maximum number of pending
    connections.

    *   `SocketChannel` received [`SocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/SocketChannel.html#class%20in%20java.nio.channels)
    `shutdownInput()` and [`SocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/SocketChannel.html#class%20in%20java.nio.channels)
    `shutdownOutput()` methods that shut down the connection for reading or writing,
    respectively, without closing this channel. Also, it received a `SocketAddress
    getRemoteAddress()` method that returns the remote address to which this channel’s
    socket is connected.


