    and `reset()`; otherwise, return false. |

    | `int read()` | Read and return (as an `int` in the range 0 to 255) the next
    byte from this input stream, or return `-1` when the end of the stream is reached.
    This method blocks until input is available, the end of the stream is detected,
    or an exception is thrown. It throws `IOException` when an I/O error occurs. |

