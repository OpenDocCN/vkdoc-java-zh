- fmt: "# Obtaining Disk Space Information\n\nA partition is an operating system-specific\
    \ portion of storage for a file system. Obtaining the amount of partition free\
    \ space is important to installers and other applications. Until Java 6 arrived,\
    \ the only portable way to accomplish this task was to guess by creating files\
    \ of different sizes.\n\nJava 6 added to the `File` class `long getFreeSpace()`,\
    \ `long getTotalSpace()`, and `long getUsableSpace()` methods that return space\
    \ information about the partition described by the `File` instance’s abstract\
    \ path:\n\n- `long getFreeSpace()` returns the number of unallocated bytes in\
    \ the partition identified by this `File` object’s abstract path; it returns zero\
    \ when the abstract path doesn’t name a partition.\n- `long getTotalSpace()` returns\
    \ the size (in bytes) of the partition identified by this `File` object’s abstract\
    \ path; it returns zero when the abstract path doesn’t name a partition.\n- `long\
    \ getUsableSpace()` returns the number of bytes available to the current JVM on\
    \ the partition identified by this `File` object’s abstract path; it returns zero\
    \ when the abstract path doesn’t name a partition.\n\nAlthough `getFreeSpace()`\
    \ and `getUsableSpace()` appear to be equivalent, they differ in the following\
    \ respect: unlike `getFreeSpace()`, `getUsableSpace()` checks for write permissions\
    \ and other operating system restrictions, resulting in a more accurate estimate.\n\
    \n**Note:** The `getFreeSpace()` and `getUsableSpace()` methods return a hint\
    \ (not a guarantee) that a Java application can use all (or most) of the unallocated\
    \ or available bytes. These values are hints because a program running outside\
    \ the JVM can allocate partition space, resulting in actual unallocated and available\
    \ values being lower than the values returned by these methods.\n\nListing 2-4\
    \ presents an application that demonstrates these methods. After obtaining an\
    \ array of all available file system roots, this application obtains and outputs\
    \ the free, total, and usable space for each partition identified by the array.\n\
    \n**Listing 2-4.** Outputting the Free, Usable, and Total Space on All Partitions\n\
    \n```\nimport java.io.File;\n\npublic class PartitionSpace\n{\n   public static\
    \ void main(String[] args)\n   {\n      File[] roots = File.listRoots();\n   \
    \   for (File root: roots)\n      {\n         System.out.println(\"Partition:\
    \ \" + root);\n         System.out.println(\"Free space on this partition = \"\
    \ +\n                            root.getFreeSpace());\n         System.out.println(\"\
    Usable space on this partition = \" +\n                            root.getUsableSpace());\n\
    \         System.out.println(\"Total space on this partition = \" +\n        \
    \                    root.getTotalSpace());\n         System.out.println(\"***\"\
    );\n      }\n   }\n}\n```\n\nCompile Listing 2-4 as follows:\n\n```\njavac PartitionSpace.java\n\
    ```\n\nRun the resulting application as follows:\n\n```\njava PartitionSpace\n\
    ```\n\nWhen run on my Windows 7 machine with a hard drive designated as `C:`,\
    \ a DVD drive designated as `D:`, an external hard drive designated as `E:`, and\
    \ a flash drive designated as `F:`, I observed the following output (usually with\
    \ different free/usable space amounts on `C:`, `E:`, and `F:`):\n\n```\nPartition:\
    \ C:\\\nFree space on this partition = 143271129088\nUsable space on this partition\
    \ = 143271129088\nTotal space on this partition = 499808989184\n***\nPartition:\
    \ D:\\\nFree space on this partition = 0\nUsable space on this partition = 0\n\
    Total space on this partition = 0\n***\nPartition: E:\\\nFree space on this partition\
    \ = 733418569728\nUsable space on this partition = 733418569728\nTotal space on\
    \ this partition = 1000169533440\n***\nPartition: F:\\\nFree space on this partition\
    \ = 33728192512\nUsable space on this partition = 33728192512\nTotal space on\
    \ this partition = 64021835776\n***\n```\n\n# Listing Directories\n\n`File` declares\
    \ five methods that return the names of files and directories located in the directory\
    \ identified by a `File` object’s abstract path. Table 2-3 describes these methods.\n\
    \n**Table 2-3.** `File` Methods for Obtaining Directory Content\n\n| Method |\
    \ Description |\n| --- | --- |\n| `String[] list()` | Return a potentially empty\
    \ array of strings naming the files and directories in the directory denoted by\
    \ this `File` object’s abstract path. If the path doesn’t denote a directory,\
    \ or if an I/O error occurs, this method returns null. Otherwise, it returns an\
    \ array of strings, one string for each file or directory in the directory. Names\
    \ denoting the directory itself and the directory’s parent directory are not included\
    \ in the result. Each string is a file name rather than a complete path. Also,\
    \ there is no guarantee that the name strings in the resulting array will appear\
    \ in alphabetical or any other order. |\n| `String[] list(FilenameFilter filter)`\
    \ | A convenience method for calling `list()` and returning only those `String`s\
    \ that satisfy `filter`. |\n| `File[] listFiles()` | A convenience method for\
    \ calling `list()`, converting its array of `String`s to an array of `File`s,\
    \ and returning the `File`s array. |\n| `File[] listFiles(FileFilter filter)`\
    \ | A convenience method for calling `list()`, converting its array of `String`s\
    \ to an array of `File`s, but only for those `String`s that satisfy `filter`,\
    \ and returning the `File`s array. |\n| `File[] listFiles(FilenameFilter filter)`\
    \ | A convenience method for calling `list()`, converting its array of `String`s\
    \ to an array of `File`s, but only for those `String`s that satisfy `filter`,\
    \ and returning the `File`s array. |\n\nThe overloaded `list()` methods return\
    \ arrays of `String`s denoting file and directory names. The second method lets\
    \ you return only those names of interest (such as only those names that end with\
    \ the `.txt` extension) via a `java.io.FilenameFilter`-based filter object.\n\n\
    The `FilenameFilter` interface declares a single `boolean accept(File dir, String\
    \ name)` method that is called for each file/directory located in the directory\
    \ identified by the `File` object’s path:\n\n- `dir` identifies the parent portion\
    \ of the path (the directory path).\n- `name` identifies the final directory name\
    \ or the file name portion of the path.\n\nThe `accept()` method uses the arguments\
    \ passed to these parameters to determine whether or not the file or directory\
    \ satisfies its criteria for what is acceptable. It returns true when the file/directory\
    \ name should be included in the returned array; otherwise, this method returns\
    \ false.\n\nListing 2-5 presents a `Dir`(ectory) application that uses `list(FilenameFilter)`\
    \ to obtain only those names that end with a specific extension.\n\n**Listing\
    \ 2-5.** Listing Specific Names\n\n```\nimport java.io.File;\nimport java.io.FilenameFilter;\n\
    \npublic class Dir\n{\n   public static void main(final String[] args)\n   {\n\
    \      if (args.length != 2)\n      {\n         System.err.println(\"usage: java\
    \ Dir dirpath ext\");\n         return;\n      }\n\n      File file = new File(args[0]);\n\
    \      FilenameFilter fnf = new FilenameFilter()\n      {\n         @Override\n\
    \         public boolean accept(File dir, String name)\n         {\n         \
    \   return name.endsWith(args[1]);\n         }\n      };\n      String[] names\
    \ = file.list(fnf);\n      for (String name: names)\n         System.out.println(name);\n\
    \   }\n}\n```\n\nCompile Listing 2-5 as follows:\n\n```\njavac Dir.java\n```\n\
    \nAssuming Windows, run the resulting application as follows:\n\n```\njava Dir\
    \ C:\\windows exe\n```\n\nI observe the following output, which consists of those\
    \ file system objects that have an `.exe` extension:\n\n```\nbfsvc.exe\nexplorer.exe\n\
    fveupdate.exe\nHelpPane.exe\nhh.exe\nIsUninst.exe\nkindlegen.exe\nnotepad.exe\n\
    regedit.exe\nsplwow64.exe\ntwunk_16.exe\ntwunk_32.exe\nwinhlp32.exe\nwrite.exe\n\
    ```"
  raw: '## Obtaining Disk Space Information


    A partition is an operating system-specific portion of storage for a file system.
    Obtaining the amount of partition free space is important to installers and other
    applications. Until Java 6 arrived, the only portable way to accomplish this task
    was to guess by creating files of different sizes.


    Java 6 added to the `File` class `long getFreeSpace()`, `long getTotalSpace()`,
    and `long getUsableSpace()` methods that return space information about the partition
    described by the `File` instance’s abstract path:


    *   `long getFreeSpace()` returns the number of unallocated bytes in the partition
    identified by this `File` object’s abstract path; it returns zero when the abstract
    path doesn’t name a partition.

    *   `long getTotalSpace()` returns the size (in bytes) of the partition identified
    by this `File` object’s abstract path; it returns zero when the abstract path
    doesn’t name a partition.

    *   `long getUsableSpace()` returns the number of bytes available to the current
    JVM on the partition identified by this `File` object’s abstract path; it returns
    zero when the abstract path doesn’t name a partition.


    Although `getFreeSpace()` and `getUsableSpace()` appear to be equivalent, they
    differ in the following respect: unlike `getFreeSpace()`, `getUsableSpace()` checks
    for write permissions and other operating system restrictions, resulting in a
    more accurate estimate.


    Note


    The `getFreeSpace()` and `getUsableSpace()` methods return a hint (not a guarantee)
    that a Java application can use all (or most) of the unallocated or available
    bytes. These values are hints because a program running outside the JVM can allocate
    partition space, resulting in actual unallocated and available values being lower
    than the values returned by these methods.


    Listing [2-4](#A978-1-4842-1565-4_2_Chapter.html#FPar11) presents an application
    that demonstrates these methods. After obtaining an array of all available file
    system roots, this application obtains and outputs the free, total, and usable
    space for each partition identified by the array.


    Listing 2-4\. Outputting the Free, Usable, and Total Space on All Partitions


    `import java.io.File;`


    `public class PartitionSpace`


    `{`


       `public static void main(String[] args)`


       `{`


          `File[] roots = File.listRoots();`


          `for (File root: roots)`


          `{`


             `System.out.println("Partition: " + root);`


             `System.out.println("Free space on this partition = " +`


                                `root.getFreeSpace());`


             `System.out.println("Usable space on this partition = " +`


                                `root.getUsableSpace());`


             `System.out.println("Total space on this partition = " +`


                                `root.getTotalSpace());`


             `System.out.println("***");`


          `}`


       `}`


    `}`


    Compile Listing [2-4](#A978-1-4842-1565-4_2_Chapter.html#FPar11) as follows:


    `javac PartitionSpace.java`


    Run the resulting application as follows:


    `java PartitionSpace`


    When run on my Windows 7 machine with a hard drive designated as `C:`, a DVD drive
    designated as `D:`, an external hard drive designated as `E:`, and a flash drive
    designated as `F:`, I observed the following output (usually with different free/usable
    space amounts on `C:`, `E:`, and `F:`):


    `Partition: C:\`


    `Free space on this partition = 143271129088`


    `Usable space on this partition = 143271129088`


    `Total space on this partition = 499808989184`


    `***`


    `Partition: D:\`


    `Free space on this partition = 0`


    `Usable space on this partition = 0`


    `Total space on this partition = 0`


    `***`


    `Partition: E:\`


    `Free space on this partition = 733418569728`


    `Usable space on this partition = 733418569728`


    `Total space on this partition = 1000169533440`


    `***`


    `Partition: F:\`


    `Free space on this partition = 33728192512`


    `Usable space on this partition = 33728192512`


    `Total space on this partition = 64021835776`


    `***`


    ## Listing Directories


    `File` declares five methods that return the names of files and directories located
    in the directory identified by a `File` object’s abstract path. Table [2-3](#A978-1-4842-1565-4_2_Chapter.html#Tab3)
    describes these methods.


    Table 2-3.


    `File` Methods for Obtaining Directory Content


    | Method | Description |

    | --- | --- |

    | `String[] list()` | Return a potentially empty array of strings naming the files
    and directories in the directory denoted by this `File` object’s abstract path.
    If the path doesn’t denote a directory, or if an I/O error occurs, this method
    returns null. Otherwise, it returns an array of strings, one string for each file
    or directory in the directory. Names denoting the directory itself and the directory’s
    parent directory are not included in the result. Each string is a file name rather
    than a complete path. Also, there is no guarantee that the name strings in the
    resulting array will appear in alphabetical or any other order. |

    | `String[] list(FilenameFilter filter)` | A convenience method for calling `list()`
    and returning only those `String`s that satisfy `filter`. |

    | `File[] listFiles()` | A convenience method for calling `list()`, converting
    its array of `String`s to an array of `File`s, and returning the `File`s array.
    |

    | `File[] listFiles(FileFilter filter)` | A convenience method for calling `list()`,
    converting its array of `String`s to an array of `File`s, but only for those `String`s
    that satisfy `filter`, and returning the `File`s array. |

    | `File[] listFiles(FilenameFilter filter)` | A convenience method for calling
    `list()`, converting its array of `String`s to an array of `File`s, but only for
    those `String`s that satisfy `filter`, and returning the `File`s array. |


    The overloaded `list()` methods return arrays of `String`s denoting file and directory
    names. The second method lets you return only those names of interest (such as
    only those names that end with the `.txt` extension) via a `java.io.FilenameFilter`-based
    filter object.


    The `FilenameFilter` interface declares a single `boolean accept(File dir, String
    name)` method that is called for each file/directory located in the directory
    identified by the `File` object’s path:


    *   `dir` identifies the parent portion of the path (the directory path).

    *   `name` identifies the final directory name or the file name portion of the
    path.


    The `accept()` method uses the arguments passed to these parameters to determine
    whether or not the file or directory satisfies its criteria for what is acceptable.
    It returns true when the file/directory name should be included in the returned
    array; otherwise, this method returns false.


    Listing [2-5](#A978-1-4842-1565-4_2_Chapter.html#FPar12) presents a `Dir`(ectory)
    application that uses `list(FilenameFilter)` to obtain only those names that end
    with a specific extension.


    Listing 2-5\. Listing Specific Names


    `import java.io.File;`


    `import java.io.FilenameFilter;`


    `public class Dir`


    `{`


    `public static void main(final String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Dir dirpath ext");`


    `return;`


    `}`


    `File file = new File(args[0]);`


    `FilenameFilter fnf = new FilenameFilter()`


    `{`


    `@Override`


    `public boolean accept(File dir, String name)`


    `{`


    `return name.endsWith(args[1]);`


    `}`


    `};`


    `String[] names = file.list(fnf);`


    `for (String name: names)`


    `System.out.println(name);`


    `}`


    `}`


    Compile Listing [2-5](#A978-1-4842-1565-4_2_Chapter.html#FPar12) as follows:


    `javac Dir.java`


    Assuming Windows, run the resulting application as follows:


    `java Dir C:\windows exe`


    I observe the following output, which consists of those file system objects that
    have an `.exe` extension:


    `bfsvc.exe`


    `explorer.exe`


    `fveupdate.exe`


    `HelpPane.exe`


    `hh.exe`


    `IsUninst.exe`


    `kindlegen.exe`


    `notepad.exe`


    `regedit.exe`


    `splwow64.exe`


    `twunk_16.exe`


    `twunk_32.exe`


    `winhlp32.exe`


    `write.exe`'
