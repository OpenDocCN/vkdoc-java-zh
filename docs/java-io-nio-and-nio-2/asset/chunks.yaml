    its limit is set to its capacity. The mark, when defined, is discarded.


    You invoke `compact()` after writing data from a buffer to handle situations where
    not all of the buffer’s content is written. Consider the following example, which
    copies content from an `in` channel to an `out` channel via buffer `buf`:


    `buf.clear(); // Prepare buffer for use`


    `while (in.read(buf) != -1)`


    `{`


       `buf.flip(); // Prepare buffer for draining.`


       `out.write(buf); // Write the buffer.`


       `buf.compact(); // Do this in case of a partial write.`


    `}`


    The `compact()` method call moves unwritten buffer data to the beginning of the
    buffer so that the next `read()` method call appends read data to the buffer’s
    data instead of overwriting that data when `compact()` isn’t specified.


    You may occasionally need to compare buffers for equality or order. All `Buffer`
    subclasses except for `ByteBuffer`’s `MappedByteBuffer` subclass override the
    `equals()` and `compareTo()` methods to perform these comparisons—`MappedByteBuffer`
    inherits these methods from its `ByteBuffer` superclass. The following example
    shows you how to compare the byte buffers `bytBuf1` and `bytBuf2` for equality
    and ordering:


    `System.out.println(bytBuf1.equals(bytBuf2));`


    `System.out.println(bytBuf1.compareTo(bytBuf2));`


    The `equals()` contract for `ByteBuffer` states that two byte buffers are equal
    if and only if they have the same element type; they have the same number of remaining
    elements; and the two sequences of remaining elements, considered independently
    of their starting positions, are individually equal. This contract is the same
    for the other `Buffer` subclasses.


    The `compareTo()` method for `ByteBuffer` states that two byte buffers are compared
    for order by comparing their sequences of remaining elements lexicographically,
    without regard to the starting position of each sequence within its corresponding
    buffer. Pairs of byte elements are compared as if by invoking `Byte.compare(byte,
    byte)`. Similar descriptions apply to the other `Buffer` subclasses.'
  trans: '

    ### 标记缓冲区


    你可以通过调用 `mark()` 方法来标记一个缓冲区，之后通过调用 `reset()` 方法返回到被标记的位置。例如，假设你执行了 `ByteBuffer
    buffer = ByteBuffer.allocate(7);`，接着执行 `buffer.put((byte) 10).put((byte) 20).put((byte)
    30).put((byte) 40);`，再执行 `buffer.limit(4);`。此时当前位置和界限都被设置为 `4`。


    继续，假设你执行 `buffer.position(1).mark().position(3);`。图 6-4 展示了此时缓冲区的状态。


    ![A978-1-4842-1565-4_6_Fig4_HTML.jpg](img/A978-1-4842-1565-4_6_Fig4_HTML.jpg)


    图 6-4.


    标记已被设置到位置 1


    如果你将这个缓冲区发送到一个通道，字节 40 将被发送（由于 `position(3)`，当前位置是 `3`），并且位置将前进到 `4`。如果你随后执行 `buffer.reset();`
    并将此缓冲区发送到通道，位置将被设置为标记（`1`），并且字节 20、30 和 40（从当前位置到界限前一个位置的所有字节）将按顺序发送到通道。


    清单 6-5 演示了这个标记/重置场景。


    清单 6-5\. 标记当前缓冲区位置并将当前位置重置到被标记的位置


    `import java.nio.ByteBuffer;`


    `public class BufferDemo`


    `{`


       `public static void main(String[] args)`


       `{`


          `ByteBuffer buffer = ByteBuffer.allocate(7);`


          `buffer.put((byte) 10).put((byte) 20).put((byte) 30).put((byte) 40);`


          `buffer.limit(4);`


          `buffer.position(1).mark().position(3);`


          `System.out.println(buffer.get());`


          `System.out.println();`


          `buffer.reset();`


          `while (buffer.hasRemaining())`


             `System.out.println(buffer.get());`


       `}`


    `}`


    编译清单 6-5（`javac BufferDemo.java`）并运行此应用程序（`java BufferDemo`）。你应该会看到以下输出：


    `40`


    `20`


    `30`


    `40`


    警告


    不要将 `reset()` 与 `clear()` 混淆。`clear()` 方法将缓冲区标记为空，而 `reset()` 将缓冲区的当前位置更改为先前设置的标记，如果没有先前设置的标记，则抛出
    `InvalidMarkException`。


    ### 缓冲区子类操作


    `ByteBuffer` 和其他原始类型缓冲区类声明了一个 `compact()` 方法，该方法通过将当前位置和界限之间的所有字节复制到缓冲区的开头来压缩缓冲区。索引
    `p = position()` 处的字节被复制到索引 `0`，索引 `p + 1` 处的字节被复制到索引 `1`，依此类推，直到索引 `limit() -
    1` 处的字节被复制到索引 `n = limit() - 1 - p`。然后，缓冲区的当前位置被设置为 `n + 1`，其界限被设置为其容量。如果定义了标记，则将其丢弃。


    在将数据从缓冲区写入后，你可以调用 `compact()` 来处理并非所有缓冲区内容都被写入的情况。考虑以下示例，该示例通过缓冲区 `buf` 将内容从 `in`
    通道复制到 `out` 通道：


    `buf.clear(); // 准备缓冲区以供使用`


    `while (in.read(buf) != -1)`


    `{`


       `buf.flip(); // 准备缓冲区以供排出。`


       `out.write(buf); // 写入缓冲区。`


       `buf.compact(); // 在部分写入的情况下执行此操作。`


    `}`


    `compact()` 方法调用将未写入的缓冲区数据移动到缓冲区的开头，以便下一次 `read()` 方法调用将读取的数据追加到缓冲区数据之后，而不是在未指定
    `compact()` 时覆盖这些数据。


    你可能偶尔需要比较缓冲区以判断相等性或顺序。除了 `ByteBuffer` 的 `MappedByteBuffer` 子类之外，所有 `Buffer` 子类都重写了
    `equals()` 和 `compareTo()` 方法来执行这些比较——`MappedByteBuffer` 从其 `ByteBuffer` 超类继承了这些方法。以下示例向你展示了如何比较字节缓冲区
    `bytBuf1` 和 `bytBuf2` 的相等性和顺序：


    `System.out.println(bytBuf1.equals(bytBuf2));`


    `System.out.println(bytBuf1.compareTo(bytBuf2));`


    `ByteBuffer` 的 `equals()` 约定规定，两个字节缓冲区相等当且仅当它们具有相同的元素类型；它们具有相同数量的剩余元素；并且两个剩余元素序列（独立于它们的起始位置考虑）各自相等。此约定对于其他
    `Buffer` 子类相同。


    `ByteBuffer` 的 `compareTo()` 方法规定，通过按字典顺序比较两个字节缓冲区的剩余元素序列（不考虑每个序列在其对应缓冲区中的起始位置）来比较它们的顺序。字节元素对进行比较时，如同调用
    `Byte.compare(byte, byte)` 一样。类似的描述适用于其他 `Buffer` 子类。

