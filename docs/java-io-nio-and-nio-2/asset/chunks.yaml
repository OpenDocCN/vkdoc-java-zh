    \ systems perform byte-oriented I/O and you use `ByteBuffer` to create byte-oriented\
    \ buffers that store the bytes to write to a destination or that are read from\
    \ a source. The other primitive-type buffer classes let you create multibyte view\
    \ buffers (discussed later) so that you can conceptually perform I/O in terms\
    \ of characters, double precision floating-point values, 32-bit integers, and\
    \ so on. However, the I/O operation is really being carried out as a flow of bytes.\n\
    \nListing [6-1](#A978-1-4842-1565-4_6_Chapter.html#FPar3) demonstrates the `Buffer`\
