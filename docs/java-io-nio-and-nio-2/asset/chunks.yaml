    Listing B-6\. Receiving Multicasted Datagram Packets


    `import java.io.IOException;`


    `import java.net.DatagramPacket;`


    `import java.net.InetAddress;`


    `import java.net.MulticastSocket;`


    `public class MCClient`


    `{`


    `final static int PORT = 10000;`


    `public static void main(String[] args)`


    `{`


    `try`


    `{`


    `MulticastSocket mcs = new MulticastSocket(PORT);`


    `InetAddress group = InetAddress.getByName("231.0.0.1");`


    `mcs.joinGroup(group);`


    `for (int i = 0; i < 10; i++)`


    `{`


    `byte[] buffer = new byte[256];`


    `DatagramPacket dgp = new DatagramPacket(buffer, buffer.length);`


    `mcs.receive(dgp);`


    `byte[] buffer2 = new byte[dgp.getLength()];`


    `System.arraycopy(dgp.getData(), 0, buffer2, 0, dgp.getLength());`


    `System.out.println(new String(buffer2));`


    `}`


    `mcs.leaveGroup(group);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    Listing [B-6](#A978-1-4842-1565-4_16_Chapter.html#FPar19)’s `main()` method first
    creates a `MulticastSocket` instance bound to port 10000 via the `MulticastSocket(int
    port)` constructor. It then obtains an `InetAddress` object that contains multicast
    group IP address 231.0.0.1 and uses this object to join the group at this address
    by calling `MulticastSocket`’s `void joinGroup(InetAddress mcastaddr)` method.


    `main()` next receives 10 datagram packets, prints their contents, and leaves
    the group by calling `MulticastSocket`’s `void leaveGroup(InetAddress mcastaddr)`
    method with the same multicast IP address as its argument.


