- fmt: "### Watching Directories\n\nThe improved file system interface includes a\
    \ Watch Service API that’s used to watch registered directories for changes and\
    \ events. For example, a file manager can use a watch service to monitor a directory\
    \ for changes so that it can update its list-of-files display when files are created\
    \ or deleted.\n\nThe Watch Service API consists of the following types in the\
    \ `java.nio.file` package:\n\n- `Watchable`: An interface that describes any object\
    \ that may be registered with a watch service so that it can be watched for changes\
    \ and events. Because `Path` extends `Watchable`, all entries in directories represented\
    \ as `Path`s can be watched.\n- `WatchEvent<T>`: An interface describing any event\
    \ or repeated event for an object that’s registered with a watch service.\n- `WatchEvent<T>.Kind`:\
    \ A nested interface that identifies an event kind (such as directory entry creation).\n\
    - `WatchEvent<T>.Modifier`: A nested interface qualifying how a watchable is registered\
    \ with a watch service. This interface isn’t used at this time.\n- `WatchKey`:\
    \ An interface describing a token representing the registration of a watchable\
    \ with a watch service.\n- `WatchService`: An interface describing any object\
    \ that watches registered objects for changes and events.\n- `StandardWatchEventKinds`:\
    \ A class describing four event kind constants (directory entry creation, deletion,\
    \ or modification; and overflow, which indicates that events may have been lost\
    \ because the file system is generating them too quickly).\n- `ClosedWatchServiceException`:\
    \ A class describing an unchecked exception that’s thrown when an attempt is made\
    \ to invoke an operation on a watch service that’s closed.\n\nYou would typically\
    \ perform the following steps to interact with the Watch Service API:\n\n1. Create\
    \ a `WatchService` object to watch one or more directories with the current or\
    \ some other file system. This object is known as a watcher.\n2. Register each\
    \ directory to be monitored with the watcher. When registering a directory, specify\
    \ the kinds of events (described by the `StandardWatchEventKinds` class) of which\
    \ you want to receive notification. For each registration, you will receive a\
    \ `WatchKey` instance that serves as a registration token.\n3. Implement an infinite\
    \ loop to wait for incoming events. When an event occurs, the key is signaled\
    \ and placed into the watcher’s queue.\n4. Retrieve the key from the watcher’s\
    \ queue. You can obtain the file name from the key.\n5. Retrieve each pending\
    \ event for the key (there might be multiple events) and process as needed.\n\
    6. Reset the key and resume waiting for events.\n7. Close the watch service. The\
    \ watch service exits when the thread exits or when it’s explicitly closed (by\
    \ invoking its `close()` method).\n\nYou create a `WatchService` object by invoking\
    \ `FileSystem`’s `WatchService newWatchService()` method:\n\n`WatchService watcher\
    \ = FileSystems.getDefault().newWatchService();`\n\nYou register a `Path` object\
    \ with the watch service by invoking either of its registration methods, which\
    \ identify the watch service and event kinds:\n\n- `WatchKey register(WatchService\
    \ ws, WatchEvent.Kind<?>... events)`\n- `WatchKey register(WatchService ws, WatchEvent.Kind<?>[]\
    \ events, WatchEvent.Modifier... modifiers)`\n\nAn invocation of the former `register()`\
    \ method behaves as if you specified `watchable.register(watcher, events, new\
    \ WatchEvent.Modifier[0]);`.\n\nEach `register()` method returns a `WatchKey`\
    \ object representing the registration of this object with the given watch service.\n\
    \nWithin a loop, you will typically invoke `WatchService`’s `WatchKey take()`\
    \ method to retrieve and remove the next watch key. This method blocks until a\
    \ watch key is available. Alternatively, you can call one of `WatchService`’s\
    \ `poll()` methods to avoid blocking or to set an upper limit on the block time.\n\
    \n**Note:** A watch key has state. It’s in the ready state when initially created\
    \ and in the signaled state when an event is detected (the watch key is then queued\
    \ for retrieval by `poll()` or `take()`). Events detected while the key is in\
    \ the signaled state are queued but don’t cause the key to be requeued for retrieval.\n\
    \nAfter extracting the watch key, you would call its `List<WatchEvent<?>> pollEvents()`\
    \ method to retrieve and remove all pending events. You would then iterate over\
    \ the returned list of `WatchEvent`s, identifying the kind of event and taking\
    \ the appropriate action.\n\nFinally, you reset the key by calling `WatchKey`’s\
    \ `boolean reset()` method. Calling `reset()` immediately requeues the watch key\
    \ to the watch service when there are pending events. If there are no pending\
    \ events, the watch key is put into the ready state and will remain in this state\
    \ until an event is detected or the watch key is canceled. This method returns\
    \ `true` when the watch key is valid and has been reset. When it returns `false`,\
    \ the watch key couldn’t be reset because it’s no longer valid. You can use this\
    \ condition to exit the infinite loop.\n\nI’ve created an application that demonstrates\
    \ how to interact with a watch service. The application doesn’t call `close()`\
    \ because the watch service is closed automatically when the application ends\
    \ (although it’s unlikely that the loop will ever terminate). Listing 12-51 presents\
    \ the source code.\n\n**Listing 12-51.** Watching a Directory for Creations, Deletions,\
    \ and Modifications\n\n```\nimport java.io.IOException;\nimport java.nio.file.FileSystem;\n\
    import java.nio.file.FileSystems;\nimport java.nio.file.Path;\nimport java.nio.file.WatchEvent;\n\
    import java.nio.file.WatchKey;\nimport java.nio.file.WatchService;\nimport static\
    \ java.nio.file.StandardWatchEventKinds.*;\n\npublic class WatchServiceDemo\n\
    {\n   public static void main(String[] args) throws IOException\n   {\n      if\
    \ (args.length != 1)\n      {\n         System.err.println(\"usage: java WatchServiceDemo\
    \ directory\");\n         return;\n      }\n\n      FileSystem fsDefault = FileSystems.getDefault();\n\
    \      WatchService ws = fsDefault.newWatchService();\n      Path dir = fsDefault.getPath(args[0]);\n\
    \      dir.register(ws, ENTRY_CREATE, ENTRY_DELETE, ENTRY_MODIFY);\n\n      for\
    \ (;;)\n      {\n         WatchKey key;\n         try\n         {\n          \
    \  key = ws.take();\n         }\n         catch (InterruptedException ie)\n  \
    \       {\n            return;\n         }\n\n         for (WatchEvent event:\
    \ key.pollEvents())\n         {\n            WatchEvent.Kind kind = event.kind();\n\
    \            if (kind == OVERFLOW)\n            {\n               System.out.println(\"\
    overflow\");\n               continue;\n            }\n\n            WatchEvent\
    \ ev = (WatchEvent) event;\n            Path filename = (Path) ev.context();\n\
    \            System.out.printf(\"%s: %s%n\", ev.kind(), filename);\n         }\n\
    \n         boolean valid = key.reset();\n         if (!valid)\n            break;\n\
    \      }\n   }\n}\n```\n\n`WatchServiceDemo`’s `main()` method first validates\
    \ that a single command-line argument identifying a directory to watch has been\
    \ specified. It then creates a watch service, converts the command-line argument\
    \ to a `Path` object, and registers the `Path` object with the watch service.\
    \ Events are to be triggered when any entries are created, deleted, or modified\
    \ in the directory identified by the `Path` object."
  raw: '### Watching Directories


    The improved file system interface includes a Watch Service API that’s used to
    watch registered directories for changes and events. For example, a file manager
    can use a watch service to monitor a directory for changes so that it can update
    its list-of-files display when files are created or deleted.


    The Watch Service API consists of the following types in the `java.nio.file` package:


    *   `Watchable`: An interface that describes any object that may be registered
    with a watch service so that it can be watched for changes and events. Because
    `Path` extends `Watchable`, all entries in directories represented as `Path`s
    can be watched.

    *   `WatchEvent<T>`: An interface describing any event or repeated event for an
    object that’s registered with a watch service.

    *   `WatchEvent<T>.Kind`: A nested interface that identifies an event kind (such
    as directory entry creation).

    *   `WatchEvent<T>.Modifier`: A nested interface qualifying how a watchable is
    registered with a watch service. This interface isn’t used at this time.

    *   `WatchKey`: An interface describing a token representing the registration
    of a watchable with a watch service.

    *   `WatchService`: An interface describing any object that watches registered
    objects for changes and events.

    *   `StandardWatchEventKinds`: A class describing four event kind constants (directory
    entry creation, deletion, or modification; and overflow, which indicates that
    events may have been lost because the file system is generating them too quickly).

    *   `ClosedWatchServiceException`: A class describing an unchecked exception that’s
    thrown when an attempt is made to invoke an operation on a watch service that’s
    closed.


    You would typically perform the following steps to interact with the Watch Service
    API:


    Create a `WatchService` object to watch one or more directories with the current
    or some other file system. This object is known as a watcher.   Register each
    directory to be monitored with the watcher. When registering a directory, specify
    the kinds of events (described by the `StandardWatchEventKinds` class) of which
    you want to receive notification. For each registration, you will receive a `WatchKey`
    instance that serves as a registration token.   Implement an infinite loop to
    wait for incoming events. When an event occurs, the key is signaled and placed
    into the watcher’s queue.   Retrieve the key from the watcher’s queue. You can
    obtain the file name from the key.   Retrieve each pending event for the key (there
    might be multiple events) and process as needed.   Reset the key and resume waiting
    for events.   Close the watch service. The watch service exits when the thread
    exits or when it’s explicitly closed (by invoking its `close()` method).


    You create a `WatchService` object by invoking `FileSystem`’s `WatchService newWatchService()`
    method:


    `WatchService watcher = FileSystems.getDefault().newWatchService();`


    You register a `Path` object with the watch service by invoking either of its
    registration methods, which identify the watch service and event kinds:


    *   `WatchKey register(WatchService ws, WatchEvent.Kind<?>... events)`

    *   `WatchKey register(WatchService ws, WatchEvent.Kind<?>[] events, WatchEvent.Modifier...
    modifiers)`


    An invocation of the former `register()` method behaves as if you specified `watchable.`
    [`register`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#register-java.nio.file.WatchService-java.nio.file.WatchEvent.Kind:A-java.nio.file.WatchEvent.Modifier%E2%80%A6-)
    `(watcher, events, new WatchEvent.Modifier[0]);`.


    Each `register()` method returns a `WatchKey` object representing the registration
    of this object with the given watch service.


    Within a loop, you will typically invoke `WatchService`’s `WatchKey take()` method
    to retrieve and remove the next watch key. This method blocks until a watch key
    is available. Alternatively, you can call one of `WatchService`’s `poll()` methods
    to avoid blocking or to set an upper limit on the block time.


    Note


    A watch key has state. It’s in the ready state when initially created and in the
    signaled state when an event is detected (the watch key is then queued for retrieval
    by `poll()` or `take()`). Events detected while the key is in the signaled state
    are queued but don’t cause the key to be requeued for retrieval.


    After extracting the watch key, you would call its `List<WatchEvent<?>> pollEvents()`
    method to retrieve and remove all pending events. You would then iterate over
    the returned list of `WatchEvent`s, identifying the kind of event and taking the
    appropriate action.


    Finally, you reset the key by calling `WatchKey`’s `boolean reset()` method. Calling
    `reset()` immediately requeues the watch key to the watch service when there are
    pending events. If there are no pending events, the watch key is put into the
    ready state and will remain in this state until an event is detected or the watch
    key is canceled. This method returns `true` when the watch key is valid and has
    been reset. When it returns `false`, the watch key couldn’t be reset because it’s
    no longer valid. You can use this condition to exit the infinite loop.


    I’ve created an application that demonstrates how to interact with a watch service.
    The application doesn’t call `close()` because the watch service is closed automatically
    when the application ends (although it’s unlikely that the loop will ever terminate).
    Listing [12-51](#A978-1-4842-1565-4_12_Chapter.html#FPar73) presents the source
    code.


    Listing 12-51\. Watching a Directory for Creations, Deletions, and Modifications


    `import java.io.IOException;`


    `import java.nio.file.FileSystem;`


    `import java.nio.file.FileSystems;`


    `import java.nio.file.Path;`


    `import java.nio.file.WatchEvent;`


    `import java.nio.file.WatchKey;`


    `import java.nio.file.WatchService;`


    `import static java.nio.file.StandardWatchEventKinds.*;`


    `public class WatchServiceDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java WatchServiceDemo directory");`


    `return;`


    `}`


    `FileSystem fsDefault = FileSystems.getDefault();`


    `WatchService ws = fsDefault.newWatchService();`


    `Path dir = fsDefault.getPath(args[0]);`


    `dir.register(ws, ENTRY_CREATE, ENTRY_DELETE, ENTRY_MODIFY);`


    `for (;;)`


    `{`


    `WatchKey key;`


    `try`


    `{`


    `key = ws.take();`


    `}`


    `catch (InterruptedException ie)`


    `{`


    `return;`


    `}`


    `for (WatchEvent event: key.pollEvents())`


    `{`


    `WatchEvent.Kind kind = event.kind();`


    `if (kind == OVERFLOW)`


    `{`


    `System.out.println("overflow");`


    `continue;`


    `}`


    `WatchEvent ev = (WatchEvent) event;`


    `Path filename = (Path) ev.context();`


    `System.out.printf("%s: %s%n", ev.kind(), filename);`


    `}`


    `boolean valid = key.reset();`


    `if (!valid)`


    `break;`


    `}`


    `}`


    `}`


    `WatchServiceDemo`’s `main()` method first validates that a single command-line
    argument identifying a directory to watch has been specified. It then creates
    a watch service, converts the command-line argument to a `Path` object, and registers
    the `Path` object with the watch service. Events are to be triggered when any
    entries are created, deleted, or modified in the directory identified by the `Path`
    object.'
  trans: "\n### 监视目录\n\n改进后的文件系统接口包含一个监视服务 API，用于监视已注册目录的变化和事件。例如，文件管理器可以使用监视服务来监控目录的变化，以便在创建或删除文件时更新其文件列表显示。\n\
    \n监视服务 API 由 `java.nio.file` 包中的以下类型组成：\n\n*   `Watchable`：一个接口，描述任何可以注册到监视服务的对象，以便监视其变化和事件。由于\
    \ `Path` 扩展了 `Watchable`，因此可以监视表示为 `Path` 的目录中的所有条目。\n*   `WatchEvent<T>`：一个接口，描述已注册到监视服务的对象的任何事件或重复事件。\n\
    *   `WatchEvent<T>.Kind`：一个嵌套接口，用于标识事件类型（例如目录条目创建）。\n*   `WatchEvent<T>.Modifier`：一个嵌套接口，用于限定如何将可监视对象注册到监视服务。此接口目前尚未使用。\n\
    *   `WatchKey`：一个接口，描述表示可监视对象在监视服务中注册的令牌。\n*   `WatchService`：一个接口，描述任何监视已注册对象变化和事件的对象。\n\
    *   `StandardWatchEventKinds`：一个类，描述四种事件类型常量（目录条目创建、删除或修改；以及溢出，表示由于文件系统生成事件过快，可能已丢失事件）。\n\
    *   `ClosedWatchServiceException`：一个类，描述当尝试对已关闭的监视服务调用操作时抛出的非受检异常。\n\n通常，您需要执行以下步骤来与监视服务\
    \ API 交互：\n\n创建一个 `WatchService` 对象，用于监视当前或其他文件系统中的一个或多个目录。此对象称为监视器。  \n将要监视的每个目录注册到监视器。注册目录时，指定您希望接收通知的事件类型（由\
    \ `StandardWatchEventKinds` 类描述）。每次注册，您都会收到一个 `WatchKey` 实例，作为注册令牌。  \n实现一个无限循环来等待传入事件。当事件发生时，键被标记为信号状态并放入监视器的队列中。\
    \  \n从监视器的队列中检索键。您可以从键中获取文件名。  \n检索该键的每个待处理事件（可能有多个事件）并根据需要进行处理。  \n重置键并继续等待事件。\
    \  \n关闭监视服务。当线程退出或显式关闭监视服务（通过调用其 `close()` 方法）时，监视服务退出。\n\n您通过调用 `FileSystem`\
    \ 的 `WatchService newWatchService()` 方法来创建 `WatchService` 对象：\n\n`WatchService\
    \ watcher = FileSystems.getDefault().newWatchService();`\n\n您通过调用 `Path` 对象的任一注册方法（这些方法标识监视服务和事件类型）来将其注册到监视服务：\n\
    \n*   `WatchKey register(WatchService ws, WatchEvent.Kind<?>... events)`\n*  \
    \ `WatchKey register(WatchService ws, WatchEvent.Kind<?>[] events, WatchEvent.Modifier...\
    \ modifiers)`\n\n调用前一个 `register()` 方法的行为等同于您指定了 `watchable.` [`register`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#register-java.nio.file.WatchService-java.nio.file.WatchEvent.Kind:A-java.nio.file.WatchEvent.Modifier%E2%80%A6-)\
    \ `(watcher, events, new WatchEvent.Modifier[0]);`。\n\n每个 `register()` 方法都返回一个\
    \ `WatchKey` 对象，表示此对象在给定监视服务中的注册。\n\n在循环中，您通常会调用 `WatchService` 的 `WatchKey take()`\
    \ 方法来检索并移除下一个监视键。此方法会阻塞，直到有监视键可用。或者，您可以调用 `WatchService` 的某个 `poll()` 方法来避免阻塞或设置阻塞时间的上限。\n\
    \n注意\n\n监视键具有状态。初始创建时处于就绪状态，检测到事件时处于信号状态（然后监视键被排队，等待通过 `poll()` 或 `take()` 检索）。当键处于信号状态时检测到的事件会被排队，但不会导致该键被重新排队等待检索。\n\
    \n提取监视键后，您应调用其 `List<WatchEvent<?>> pollEvents()` 方法来检索并移除所有待处理事件。然后，您将遍历返回的 `WatchEvent`\
    \ 列表，识别事件类型并采取相应操作。\n\n最后，您通过调用 `WatchKey` 的 `boolean reset()` 方法来重置键。当有待处理事件时，调用\
    \ `reset()` 会立即将监视键重新排队到监视服务。如果没有待处理事件，监视键将进入就绪状态，并保持此状态直到检测到事件或监视键被取消。当监视键有效且已重置时，此方法返回\
    \ `true`。当返回 `false` 时，监视键无法重置，因为它不再有效。您可以使用此条件来退出无限循环。\n\n我创建了一个演示如何与监视服务交互的应用程序。该应用程序没有调用\
    \ `close()`，因为监视服务会在应用程序结束时自动关闭（尽管循环不太可能终止）。清单 12-51 展示了源代码。\n\n**清单 12-51.**\
    \ 监视目录的创建、删除和修改\n\n`import java.io.IOException;`\n\n`import java.nio.file.FileSystem;`\n\
    \n`import java.nio.file.FileSystems;`\n\n`import java.nio.file.Path;`\n\n`import\
    \ java.nio.file.WatchEvent;`\n\n`import java.nio.file.WatchKey;`\n\n`import java.nio.file.WatchService;`\n\
    \n`import static java.nio.file.StandardWatchEventKinds.*;`\n\n`public class WatchServiceDemo`\n\
    \n`{`\n\n`public static void main(String[] args) throws IOException`\n\n`{`\n\n\
    `if (args.length != 1)`\n\n`{`\n\n`System.err.println(\"usage: java WatchServiceDemo\
    \ directory\");`\n\n`return;`\n\n`}`\n\n`FileSystem fsDefault = FileSystems.getDefault();`\n\
    \n`WatchService ws = fsDefault.newWatchService();`\n\n`Path dir = fsDefault.getPath(args[0]);`\n\
    \n`dir.register(ws, ENTRY_CREATE, ENTRY_DELETE, ENTRY_MODIFY);`\n\n`for (;;)`\n\
    \n`{`\n\n`WatchKey key;`\n\n`try`\n\n`{`\n\n`key = ws.take();`\n\n`}`\n\n`catch\
    \ (InterruptedException ie)`\n\n`{`\n\n`return;`\n\n`}`\n\n`for (WatchEvent event:\
    \ key.pollEvents())`\n\n`{`\n\n`WatchEvent.Kind kind = event.kind();`\n\n`if (kind\
    \ == OVERFLOW)`\n\n`{`\n\n`System.out.println(\"overflow\");`\n\n`continue;`\n\
    \n`}`\n\n`WatchEvent ev = (WatchEvent) event;`\n\n`Path filename = (Path) ev.context();`\n\
    \n`System.out.printf(\"%s: %s%n\", ev.kind(), filename);`\n\n`}`\n\n`boolean valid\
    \ = key.reset();`\n\n`if (!valid)`\n\n`break;`\n\n`}`\n\n`}`\n\n`}`\n\n`WatchServiceDemo`\
    \ 的 `main()` 方法首先验证是否指定了一个标识要监视目录的命令行参数。然后，它创建一个监视服务，将命令行参数转换为 `Path` 对象，并将该 `Path`\
    \ 对象注册到监视服务。当 `Path` 对象标识的目录中有任何条目被创建、删除或修改时，将触发事件。\n"
- fmt: '此时进入一个无限循环，以获取下一个监视键并轮询其事件。对于每个事件，通过调用`WatchEvent`的`WatchEvent.Kind<T> kind()`方法来确定事件类型。如果类型是`OVERFLOW`，则输出一条说明此情况的消息。否则，调用`WatchEvent`的`T
    context()`方法返回事件上下文，随后将其输出。对于`ENTRY_CREATE`、`ENTRY_DELETE`和`ENTRY_MODIFY`事件，上下文是一个`Path`，标识注册到监视服务的目录与被创建、删除或修改的条目之间的相对路径。


    最后，循环尝试重置该键。如果重置失败（因为该键不再有效，例如监视服务已关闭），则跳出循环，应用程序结束。重置键非常重要。如果未能调用`reset()`，该键将不会接收任何后续事件。


    按如下方式编译清单12-51：


    ```

    javac WatchServiceDemo.java

    ```


    使用合适的目录参数运行生成的应用程序。例如，我指定了以下命令：


    ```

    java WatchServiceDemo \temp

    ```


    在`\temp`目录中，我执行了以下命令：


    ```

    md foo

    rd foo

    copy con test

    abc

    ```


    然后我按下了`F6`功能键。


    在运行`WatchServiceDemo`的命令窗口中，我观察到以下输出：


    ```

    ENTRY_CREATE: foo

    ENTRY_DELETE: foo

    ENTRY_CREATE: test

    ENTRY_MODIFY: test

    ENTRY_MODIFY: test

    ```


    多出的`ENTRY_MODIFY: test`行可能与文件关闭时写入文件元数据有关。


    注意


    如果尝试使用非目录参数运行此应用程序，你可能会观察到`NotDirectoryException`。


    练习


    以下练习旨在测试你对第12章内容的理解。'
  raw: 'At this point, an infinite loop is entered to take the next watch key and
    poll its events. For each event, the kind is determined by calling `WatchEvent`’s
    `WatchEvent.Kind<T> kind()` method. If the kind is `OVERFLOW`, a message stating
    this fact is output. Otherwise, `WatchEvent`’s [`T`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/WatchEvent.html#type%20parameter%20in%20WatchEvent)
    `context()` method is called to return the event context, which is subsequently
    output. For [`ENTRY_CREATE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardWatchEventKinds.html#ENTRY_CREATE)
    , [`ENTRY_DELETE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardWatchEventKinds.html#ENTRY_DELETE)
    , and [`ENTRY_MODIFY`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardWatchEventKinds.html#ENTRY_MODIFY)
    events, the context is a `Path` identifying the [relative](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#relativize-java.nio.file.Path-)
    path between the directory registered with the watch service and the entry that’s
    created, deleted, or modified.


    Lastly, the loop attempts to reset the key. If reset fails because the key is
    no longer valid (perhaps because the watch service has been closed), the loop
    is broken and the application ends. Resetting the key is very important. If you
    fail to invoke reset(), this key will not receive any further events.


    Compile Listing [12-51](#A978-1-4842-1565-4_12_Chapter.html#FPar73) as follows:


    `javac WatchServiceDemo.java`


    Run the resulting application with a suitable directory argument. For example,
    I specified the following:


    `java WatchServiceDemo \temp`


    Within the `\temp` directory, I executed the following commands:


    `md foo`


    `rd foo`


    `copy con test`


    `abc`


    I then pressed the `F6` function key.


    In the command window where `WatchServiceDemo` is running, I observed the following
    output:


    `ENTRY_CREATE: foo`


    `ENTRY_DELETE: foo`


    `ENTRY_CREATE: test`


    `ENTRY_MODIFY: test`


    `ENTRY_MODIFY: test`


    The extra `ENTRY_MODFIY: test` line probably has to do with writing out the file
    metadata when the file is closed.


    Note


    If you attempt to run this application with a nondirectory argument, you will
    probably observe `NotDirectoryException`.


    EXERCISES


    The following exercises are designed to test your understanding of [Chapter 12](#A978-1-4842-1565-4_12_Chapter.html)’s
    content:'
  trans: '

    此时，程序进入一个无限循环，以获取下一个监视键并轮询其事件。对于每个事件，通过调用 `WatchEvent` 的 `WatchEvent.Kind<T> kind()`
    方法来确定其类型。如果类型是 `OVERFLOW`，则输出一条说明此情况的消息。否则，调用 `WatchEvent` 的 [`T`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/WatchEvent.html#type%20parameter%20in%20WatchEvent)
    `context()` 方法返回事件上下文，随后将其输出。对于 [`ENTRY_CREATE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardWatchEventKinds.html#ENTRY_CREATE)、[`ENTRY_DELETE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardWatchEventKinds.html#ENTRY_DELETE)
    和 [`ENTRY_MODIFY`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardWatchEventKinds.html#ENTRY_MODIFY)
    事件，上下文是一个 `Path`，用于标识向监视服务注册的目录与被创建、删除或修改的条目之间的[相对](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#relativize-java.nio.file.Path-)路径。


    最后，循环尝试重置该键。如果重置失败（可能是因为监视服务已关闭导致该键不再有效），则循环中断，应用程序结束。重置键非常重要。如果未能调用 reset()，该键将不再接收任何后续事件。


    按如下方式编译清单 12-51：


    `javac WatchServiceDemo.java`


    使用合适的目录参数运行生成的应用程序。例如，我指定了以下内容：


    `java WatchServiceDemo \temp`


    在 `\temp` 目录中，我执行了以下命令：


    `md foo`


    `rd foo`


    `copy con test`


    `abc`


    然后我按下了 `F6` 功能键。


    在运行 `WatchServiceDemo` 的命令窗口中，我观察到以下输出：


    `ENTRY_CREATE: foo`


    `ENTRY_DELETE: foo`


    `ENTRY_CREATE: test`


    `ENTRY_MODIFY: test`


    `ENTRY_MODIFY: test`


    多出的 `ENTRY_MODIFY: test` 行可能与文件关闭时写入文件元数据有关。


    注意


    如果你尝试使用非目录参数运行此应用程序，可能会观察到 `NotDirectoryException`。


