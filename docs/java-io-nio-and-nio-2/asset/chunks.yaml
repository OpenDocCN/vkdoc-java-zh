    \ to delete the temporary directory. I’ll discuss this method later in this chapter.\n\
    \nCompile Listing [12-31](#A978-1-4842-1565-4_12_Chapter.html#FPar46) (`javac\
    \ CTDDemo.java`) and run the resulting application (`java CTDDemo .`). You should\
    \ not observe the temporary directory in the current directory after the application\
    \ terminates.\n\n### Listing Directory Content\n\nIt’s often necessary to obtain\
    \ a list of a directory’s entries. NIO.2 provides the `java.nio.file.DirectoryStream<T>`\
    \ interface to assist with this task. `DirectoryStream` subtypes `java.lang.Iterable<T>`,\
    \ which makes a directory stream a target for the convenient enhanced `for` loop\
    \ statement.\n\n`DirectoryStream` also subtypes `java.io.Closeable`, which subtypes\
    \ `java.lang.AutoCloseable`. This arrangement makes it possible to use `DirectoryStream`\
    \ with the `try`-with-resources statement to automatically close the directory\
    \ stream.\n\n**Note**\n\nWhen not using `try`-with-resources, invoke the directory\
    \ stream’s `close()` method after iteration is completed to free any resources\
    \ held for the open directory. A stream is automatically closed when the application\
    \ ends.\n\n`DirectoryStream` inherits `Iterable`’s `Iterator<T> iterator()` method,\
    \ which makes directory streams the targets of enhanced `for` loops. Also, `DirectoryStream`\
    \ declares a nested `Filter<T>` interface that’s implemented by classes to decide\
    \ if a directory entry should be accepted or filtered.\n\nYou can obtain a `DirectoryStream`\
    \ by calling one of the `Files` class’s `newDirectoryStream()` methods:\n\n* \
    \  `DirectoryStream<Path> newDirectoryStream(Path dir)`\n*   `DirectoryStream<Path>\
    \ newDirectoryStream(Path dir, DirectoryStream.Filter<? super Path> filter)`\n\
    *   `DirectoryStream<Path> newDirectoryStream(Path dir, String glob)`\n\n`newDirectoryStream(Path\
    \ dir)` opens a directory, returning a `DirectoryStream` to iterate over all entries\
    \ in the directory. The elements returned by the directory stream’s iterator are\
    \ of type `Path`; each `Path` object represents an entry in the directory. The\
    \ `Path` objects are obtained as if by resolving the name of the directory entry\
    \ against `dir`. This method throws `IOException` when an I/O error occurs and\
    \ `java.nio.file.NotDirectoryException` when the path couldn’t be opened because\
    \ it’s not a directory.\n\nListing [12-32](#A978-1-4842-1565-4_12_Chapter.html#FPar48)\
    \ presents an application that obtains and outputs all entries in the specified\
    \ directory.\n\n**Listing 12-32.** Obtaining and Outputting All Entries in a Directory\n\
    \n```\nimport java.io.IOException;\nimport java.nio.file.DirectoryStream;\nimport\
