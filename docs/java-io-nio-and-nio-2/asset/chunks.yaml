    \n`}`\n\n`catch (IOException ioe)`\n\n`{`\n\n`System.err.println(\"I/O error:\
    \ \" + ioe.getMessage());`\n\n`}`\n\n`}`\n\n`}`\n\n## 第 8 章：选择器\n\n选择器是从抽象类 `Selector`\
    \ 的子类创建的对象。它维护一组通道，并检查这些通道以确定哪些通道已准备好进行读取、写入、完成连接序列、接受另一个连接或这些任务的某种组合。实际工作通过 POSIX\
    \ `select()` 或类似的系统调用委托给操作系统。  \n支持选择器的三种主要类型是 `SelectableChannel`、`SelectionKey`\
    \ 和 `Selector`。  \n答案是错误：文件通道不能与选择器一起使用。只有实现了 `SelectableChannel` 的通道才能与选择器一起使用。`FileChannel`\
    \ 没有实现 `SelectableChannel`。  \n`SelectionKey` 提供了 `boolean` `isReadable()` 方法，作为表达式\
    \ `key.readyOps() & OP_READ != 0` 的便捷替代方案。\n"
- fmt: "# Chapter 9: Regular Expressions\n\nA regular expression (also known as a\
    \ regex or regexp) is a string-based pattern that represents the set of strings\
    \ that match this pattern. Instances of the `Pattern` class represent patterns\
    \ via compiled regexes. Regexes are compiled for performance reasons; pattern\
    \ matching via compiled regexes is much faster than if the regexes were not compiled.\
    \ `Pattern`'s `compile()` methods throw `PatternSyntaxException` when they discover\
    \ illegal syntax in their regular expression arguments. Instances of the `Matcher`\
    \ class attempt to match compiled regexes against input text. The difference between\
    \ `Matcher`'s `matches()` and `lookingAt()` methods is that, unlike `matches()`,\
    \ `lookingAt()` doesn't require the entire region to be matched.\n\nA character\
    \ class is a set of characters appearing between `[` and `]`. There are six kinds\
    \ of character classes: simple, negation, range, union, intersection, and subtraction.\
    \ The answer is false: a subtraction character class consists of multiple `&&`-separated\
    \ nested character classes, where at least one nested character class is a negation\
    \ character class, and it matches all characters except for those indicated by\
    \ the negation character class/classes.\n\nA capturing group saves a match's characters\
    \ for later recall during pattern matching. A zero-length match is a match of\
    \ zero length in which the start and end indexes are equal. A quantifier is a\
    \ numeric value implicitly or explicitly bound to a pattern. Quantifiers are categorized\
    \ as greedy, reluctant, or possessive. The difference between greedy and reluctant\
    \ quantifiers is that a greedy quantifier attempts to find the longest match,\
    \ whereas a reluctant quantifier attempts to find the shortest match. Possessive\
    \ and greedy quantifiers differ in that a possessive quantifier only makes one\
    \ attempt to find the longest match, whereas a greedy quantifier can make multiple\
    \ attempts.\n\nListing A-8 presents the `ReplaceText` application that was called\
    \ for in Chapter 9.\n\n**Listing A-8.** Replacing All Matches of the Pattern with\
    \ Replacement Text\n\n```\nimport java.util.regex.Matcher;\nimport java.util.regex.Pattern;\n\
    import java.util.regex.PatternSyntaxException;\n\npublic class ReplaceText\n{\n\
    \   public static void main(String[] args)\n   {\n      if (args.length != 3)\n\
    \      {\n         System.err.println(\"usage: java ReplaceText text oldText newText\"\
    );\n         return;\n      }\n      try\n      {\n         Pattern p = Pattern.compile(args[1]);\n\
    \         Matcher m = p.matcher(args[0]);\n         String result = m.replaceAll(args[2]);\n\
    \         System.out.println(result);\n      }\n      catch (PatternSyntaxException\
    \ pse)\n      {\n         System.err.println(pse);\n      }\n   }\n}\n```\n\n\
    # Chapter 10: Charsets\n\nA charset is a coded character set combined with a character-encoding\
    \ scheme. The purpose of the `Charset` class is to translate between byte sequences\
    \ and the characters that are encoded into these sequences. The standard charsets\
    \ supported by the JVM are US-ASCII, ISO-8859-1, UTF-8, UTF-16BE, UTF-16LE, and\
    \ UTF-16. The purpose of the byte order mark is to tell a decoder how a `UTF-16`-encoded\
    \ byte sequence was encoded.\n\nYou obtain the default charset by invoking `Charset`'s\
    \ `Charset defaultCharset()` factory method. `Charset`'s `Charset forName(String\
    \ charsetName)` factory method throws `UnsupportedCharsetException` when the desired\
    \ charset isn't supported by the JVM. You would typically encode a string via\
    \ a `Charset` instance by invoking `Charset`'s `ByteBuffer encode(String s)` method,\
    \ which returns a new `ByteBuffer` object containing the bytes that encode the\
    \ characters from `s`. You could also invoke `Charset`'s `ByteBuffer encode(CharBuffer\
    \ cb)` method. The `Charset` methods that perform the actual encoding and decoding\
    \ tasks are `CharsetEncoder newEncoder()` and `CharsetDecoder newDecoder()`. `String`'s\
    \ `byte[] getBytes()` method returns a new byte array containing the characters\
    \ of this string encoded using the operating system's default charset.\n\nListing\
    \ A-9 presents the `AvailCharsets` application that was called for in Chapter\
    \ 10.\n\n**Listing A-9.** Obtaining and Outputting a Map of Available Charsets\n\
    \n```\nimport java.nio.charset.Charset;\nimport java.util.SortedMap;\n\npublic\
    \ class AvailCharsets\n{\n   public static void main(String[] args)\n   {\n  \
    \    SortedMap<String, Charset> acs = Charset.availableCharsets();\n      System.out.println(acs);\n\
    \   }\n}\n```\n\n# Chapter 11: Formatter\n\nThe three nonexception types that\
    \ contribute to NIO's `printf`-style formatting facility are `Formatter`, `Formattable`,\
    \ and `FormattableFlags`. You reference an argument from within a format specifier\
    \ string by specifying the argument's 1-based index followed by the dollar sign\
    \ character. For example, `1$` references the first argument and `2$` references\
    \ the second argument. The `%n` format specifier outputs an operating system-specific\
    \ line separator.\n\nListing A-10 presents the `FormatterDemo` application that\
    \ was called for in Chapter 11.\n\n**Listing A-10.** Formatting Output to an External\
    \ `StringBuilder` Object\n\n```\nimport java.util.Formatter;\n\npublic class FormatterDemo\n\
    {\n   public static void main(String[] args)\n   {\n      StringBuilder output\
    \ = new StringBuilder();\n      Formatter formatter = new Formatter(output);\n\
    \      formatter.format(\"%d\", 123);\n      System.out.println(formatter.toString());\n\
    \      output.setLength(0);\n      formatter.format(\"%x\", 123);\n      System.out.println(formatter.toString());\n\
    \      output.setLength(0);\n      formatter.format(\"%c\", 'X');\n      System.out.println(formatter.toString());\n\
    \      output.setLength(0);\n      formatter.format(\"%f\", 0.1);\n      System.out.println(formatter.toString());\n\
    \      output.setLength(0);\n      formatter.format(\"%s%n\", \"Hello, World\"\
    );\n      System.out.println(formatter.toString());\n      output.setLength(0);\n\
    \      formatter.format(\"%10.2f\", 98.375);\n      System.out.println(formatter.toString());\n\
    \      output.setLength(0);\n      formatter.format(\"%05d\", 123);\n      System.out.println(formatter.toString());\n\
    \      output.setLength(0);\n      formatter.format(\"%1$d %1$d\", 123);\n   \
    \   System.out.println(formatter.toString());\n      output.setLength(0);\n  \
    \    formatter.format(\"%d %d\", 123);\n      System.out.println(formatter.toString());\n\
    \      output.setLength(0);\n      formatter.close();\n   }\n}\n```\n\n# Chapter\
    \ 12: Improved File System Interface"
