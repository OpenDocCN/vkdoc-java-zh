    to keep in mind:'
  trans: '

    ## 基于通道的多播


    JDK 7 引入了对基于通道的 IP 多播的支持，这是一种将 IP 数据报发送给组成员（由单个目标地址标识的零个或多个主机）的传输方式。多播是广播的互联网版本，类似于电视或广播信号从源头发射，信号覆盖区域内拥有合适且活跃接收设备的任何人都可以接收。


    组由 D 类 IP 地址标识，这是一个多播组 IPv4 地址，范围从 224.0.0.1 到 239.255.255.255。新的接收者（客户端）通过组的
    IP 地址连接到该组，从而加入一个多播组。然后，接收者监听传入的数据报。


    JDK 7 引入了 `java.nio.channels.MulticastChannel` 接口来支持多播。`MulticastChannel` 扩展了
    `NetworkChannel`，并由 `DatagramChannel` 类实现。它声明了一对用于加入组的 `join()` 方法和一个用于关闭通道的 `close()`
    方法。


    接收者调用 [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `join(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `group,` [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `ni)` 方法来加入一个多播组，以开始接收发送到该组的所有数据报。调用时，需要传入组的 IP 地址和要加入该组的网络接口作为参数。当此方法成功时，它会返回一个
    `java.nio.channels.MembershipKey` 实例，该实例作为代表组成员身份的令牌。


    注意


    网络接口由 `java.net.NetworkInterface` 类的实例描述。要获取 `NetworkInterface` 实例，可以调用各种 `NetworkInterface`
    类的方法，例如 [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `getByInetAddress(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `addr)`。


    或者，接收者可以调用 [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `join(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `group,` [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `ni,` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `source)` 方法来加入一个多播组，并从特定的源地址接收数据报。由于成员身份是可累积的，可以使用相同的组和网络接口再次调用此方法，以允许接收由其他源地址发送到该组的数据报。


    注意


    第一个 `join()` 方法类似于有线电视提供商要求你订阅频道包，其中包含那些你不感兴趣的频道。第二个 `join()` 方法类似于有线电视提供商允许你订阅感兴趣的特定频道。


    第二个 `join()` 方法演示了源过滤，你可以根据数据报的源地址对其进行过滤。你可以调用此方法来接收来自特定 IP 源的数据报。这种源过滤形式被称为包含模式过滤。


    `MembershipKey` 声明了几个方法：


    *   [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `block(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `source)`：当此成员身份密钥不是特定于源的，并且操作系统支持源过滤时，阻止来自给定 `source` 地址的多播数据报。

    *   [`MulticastChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MulticastChannel.html#interface%20in%20java.nio.channels)
    `channel()`：返回创建此成员身份密钥的通道。

    *   `void drop()`：放弃成员身份。

    *   [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `group()`：返回创建此成员身份密钥的多播组。

    *   `boolean isValid()`：返回此成员身份是否有效（`true`）或无效（`false`）。

    *   [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `networkInterface()`：返回创建此成员身份密钥的网络接口。

    *   [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `sourceAddress()`：当此成员身份密钥是特定于源时，返回源地址；当此成员身份不是特定于源时，返回 `null`。

    *   [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `unblock(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `source)`：取消阻止先前通过 `block()` 阻止的来自给定 `source` 地址的多播数据报。


    你可以使用 `MembershipKey` 的 `block()` 方法来执行第二种形式的源过滤，即加入一个组以接收所有多播数据报，但来自特定 IP 源地址的数据报除外。这种源过滤形式被称为排除模式过滤，如下所示：


    `MembershipKey key = dc.join(group, nif).block(source1).block(source2);`


    一旦通道加入了组，它就会以与单播数据报相同的方式接收多播数据报。当完成与该组的交互后，它会通过调用 `MembershipKey` 的 `drop()` 方法来放弃其成员身份。在放弃所有组成员身份后，它会调用
    `MulticastChannel` 的 `close()` 方法。


    要创建多播服务器或多播客户端，需要牢记三个重要事项：

    '
- fmt: "- When creating the datagram channel, specify the `ProtocolFamily` that corresponds\
    \ to the address type of the multicast groups the channel will join. There is\
    \ no guarantee that a channel to a socket in one protocol family can join and\
    \ receive multicast datagrams when the address of the multicast group corresponds\
    \ to another protocol family. For example, it’s implementation-specific if a channel\
    \ to an `IPv6` socket can join an `IPv4` multicast group and receive multicast\
    \ datagrams sent to the group. You create a datagram channel by calling `DatagramChannel`’s\
    \ `DatagramChannel.open(ProtocolFamily family)` class method. This method requires\
    \ an argument whose class implements the `java.net.ProtocolFamily` interface.\
    \ Because `ProtocolFamily` is implemented by the `java.net.StandardProtocolFamily`\
    \ enum, you would pass one of this enum’s `INET` (for IPv4) or `INET6` (for IPv6)\
    \ constants to `family`.\n- The channel’s socket should be bound to the wildcard\
    \ address. If the socket is bound to a specific address, rather than the wildcard\
    \ address, it’s implementation-specific if multicast datagrams are received by\
    \ the socket. The `InetSocketAddress` class declares an `InetSocketAddress(int\
    \ port)` constructor that creates a socket address where the IP address is the\
    \ wildcard address and the port number is the specified `port` value.\n- The `SO_REUSEADDR`\
    \ option should be enabled prior to binding the socket. This is required to allow\
    \ multiple members of the group to bind to the same address.\n\nI’ve created multicast\
    \ server and client applications that demonstrate channel-based multicasting.\
    \ Listing 14-3 presents the server.\n\n**Listing 14-3.** Demonstrating a Channel-Based\
    \ Multicast Server\n\n```\nimport java.io.IOException;\nimport java.net.InetAddress;\n\
    import java.net.InetSocketAddress;\nimport java.net.NetworkInterface;\nimport\
    \ java.net.StandardProtocolFamily;\nimport java.net.StandardSocketOptions;\nimport\
    \ java.nio.ByteBuffer;\nimport java.nio.channels.DatagramChannel;\nimport java.nio.channels.MembershipKey;\n\
    \npublic class ChannelServer\n{\n   final static int PORT = 9999;\n\n   public\
    \ static void main(String[] args) throws IOException\n   {\n      NetworkInterface\
    \ ni;\n      ni = NetworkInterface.getByInetAddress(InetAddress.getLocalHost());\n\
    \      DatagramChannel dc;\n      dc = DatagramChannel.open(StandardProtocolFamily.INET)\n\
    \                         .setOption(StandardSocketOptions.SO_REUSEADDR,\n   \
    \                                 true)\n                         .bind(new InetSocketAddress(PORT))\n\
    \                         .setOption(StandardSocketOptions.IP_MULTICAST_IF,\n\
    \                                    ni);\n      InetAddress group = InetAddress.getByName(\"\
    239.255.0.1\");\n      int i = 0;\n      while (true)\n      {\n         ByteBuffer\
    \ bb = ByteBuffer.wrap((\"line \" + i).getBytes());\n         dc.send(bb, new\
    \ InetSocketAddress(group, PORT));\n         i++;\n      }\n   }\n}\n```\n\n`ChannelServer`’s\
    \ `main()` method first obtains a network interface and then opens and configures\
    \ a datagram channel. Next, it obtains the group IP address and enters an infinite\
    \ loop that sends byte buffers of string-based messages to the group.\n\nListing\
    \ 14-4 presents the companion client application.\n\n**Listing 14-4.** Demonstrating\
    \ a Channel-Based Multicast Client\n\n```\nimport java.io.IOException;\nimport\
    \ java.net.InetAddress;\nimport java.net.InetSocketAddress;\nimport java.net.NetworkInterface;\n\
    import java.net.StandardProtocolFamily;\nimport java.net.StandardSocketOptions;\n\
    import java.nio.ByteBuffer;\nimport java.nio.channels.DatagramChannel;\nimport\
    \ java.nio.channels.MembershipKey;\n\npublic class ChannelClient\n{\n   final\
    \ static int PORT = 9999;\n\n   public static void main(String[] args) throws\
    \ IOException\n   {\n      NetworkInterface ni;\n      ni = NetworkInterface.getByInetAddress(InetAddress.getLocalHost());\n\
    \      DatagramChannel dc;\n      dc = DatagramChannel.open(StandardProtocolFamily.INET)\n\
    \                         .setOption(StandardSocketOptions.SO_REUSEADDR,\n   \
    \                                 true)\n                         .bind(new InetSocketAddress(PORT))\n\
    \                         .setOption(StandardSocketOptions.IP_MULTICAST_IF,\n\
    \                                    ni);\n      InetAddress group = InetAddress.getByName(\"\
    239.255.0.1\");\n      MembershipKey key = dc.join(group, ni);\n      ByteBuffer\
    \ response = ByteBuffer.allocate(50);\n      while (true)\n      {\n         dc.receive(response);\n\
    \         response.flip();\n         while (response.hasRemaining())\n       \
    \     System.out.print((char) response.get());\n         System.out.println();\n\
    \         response.clear();\n      }\n   }\n}\n```\n\n`ChannelClient`’s `main()`\
    \ method is identical to `ChannelServer`’s equivalent until the `join()` call\
    \ to join the group at the specified group IP address. A byte buffer is then allocated\
    \ to store datagrams. After receiving a datagram, the buffer is flipped, its content\
    \ is output, and the buffer is cleared.\n\nCompile these listings and run the\
    \ resulting applications in separate windows. Here is a portion of `ChannelClient`’s\
    \ output.\n\n```\nline 156573\nline 156574\nline 156575\nline 156576\nline 156577\n\
    line 156578\nline 156579\nline 156580\nline 156581\nline 156582\n```\n\nRun a\
    \ second `ChannelClient` application in another window. You should observe similar\
    \ output in that window.\n\n## EXERCISES\n\nThe following exercises are designed\
    \ to test your understanding of Chapter 14’s content:\n\n- What capabilities does\
    \ NIO.2 provide for completing socket channel functionality?\n- How did JDK 7\
    \ overcome the counterintuitive mix of socket channel and socket APIs?\n- Identify\
    \ the exceptions that are thrown by `SocketChannel`’s `shutdownInput()` and `shutdownOutput()`\
    \ methods.\n- How does JDK 7 support multicasting?\n- True or false: The `MembershipKey.join(InetAddress\
    \ group, NetworkInterface ni, InetAddress source)` method performs exclude-mode\
    \ filtering.\n- Write an `EnumNI` application that enumerates your machine’s network\
    \ interfaces, outputting their names.\n- Modify Listing 14-4’s `ChannelClient`\
    \ application to also demonstrate dropping membership from the group and closing\
    \ the channel before quitting the application.\n- Create a `StockServer` application\
    \ that repeatedly broadcasts the open, low, high, and close share prices for a\
    \ stock as floating-point values. Each broadcast should randomly adjust the low,\
    \ high, and close values, subject to the following constraints: the low share\
    \ price must not exceed the high share price, the close share price must not be\
    \ lower than the low share price, and the close share price must not be higher\
    \ than the high share price. Create a `StockClient` application that joins a group\
    \ to repeatedly receive these prices, which it outputs."
