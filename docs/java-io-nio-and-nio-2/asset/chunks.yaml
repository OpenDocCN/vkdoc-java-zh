- fmt: "# 12. Improved File System Interface\n\nElectronic supplementary material\
    \ The online version of this chapter (doi:[10.1007/978-1-4842-1565-4_12](http://dx.doi.org/10.1007/978-1-4842-1565-4_12))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    `NIO.2` improves the file system interface that was previously limited to the\
    \ `java.io.File` class. This chapter introduces the improved file system interface’s\
    \ architecture and shows you how to use the new APIs to accomplish a wide range\
    \ of file system tasks.\n\n> **Note**  \n> A file system manages files, which\
    \ are classified as regular files, directories, symbolic links ([https://en.wikipedia.org/wiki/Symbolic_link](https://en.wikipedia.org/wiki/Symbolic_link)),\
    \ and hard links ([https://en.wikipedia.org/wiki/Hard_link](https://en.wikipedia.org/wiki/Hard_link)).\n\
    \n## Architecting a Better File Class\n\nThe `File`-based file system interface\
    \ is problematic. Several problems are listed here:\n\n- Many methods return Boolean\
    \ values rather than throw exceptions. As a result, you don’t know why an operation\
    \ fails. For example, when the `delete()` method returns `false`, you don’t know\
    \ why the file could not be deleted (such as the file not existing or the user\
    \ not having the appropriate permission to perform the deletion).\n- `File` doesn’t\
    \ support file system-specific symbolic links and hard links.\n- `File` provides\
    \ access to a limited set of file attributes. For example, it doesn’t support\
    \ access control lists (ACLs) ([https://en.wikipedia.org/wiki/Access_control_list](https://en.wikipedia.org/wiki/Access_control_list)).\n\
    - `File` doesn’t support efficient file-attribute access. Every query results\
    \ in a call to the underlying operating system.\n- `File` doesn’t scale to large\
    \ directories. Requesting a large directory listing over a server can result in\
    \ a hung application. Large directories can also cause memory resource problems,\
    \ resulting in a denial of service.\n- `File` is limited to the default file system\
    \ (the file system that is accessible to the Java Virtual Machine—JVM). It doesn’t\
    \ support alternatives, such as a memory-based file system.\n- `File` doesn’t\
    \ offer a file-copy or a file-move capability. The `renameTo()` method, which\
    \ is often used in a file-move context, doesn’t work consistently across operating\
    \ systems.\n\n`NIO.2` provides an improved file system interface that offers solutions\
    \ to the previous problems. Some of its features are listed here:\n\n- Methods\
    \ throwing exceptions\n- Support for symbolic links\n- Broad and efficient support\
    \ for file attributes\n- Directory streams\n- Support for alternative file systems\
    \ via custom file system providers\n- Support for file copying and file moving\n\
    - Support for walking the file tree/visiting files and watching directories\n\n\
    The improved file system interface is implemented mainly by the various types\
    \ in the following packages:\n\n- `java.nio.file`: Provides interfaces and classes\
    \ for accessing file systems and their files.\n- `java.nio.file.attribute`: Provides\
    \ interfaces and classes for accessing file system attributes.\n- `java.nio.file.spi`:\
    \ Provides classes for creating a file system implementation.\n\nThese packages\
    \ organize many types. `FileSystem`, `FileSystems`, and `FileSystemProvider` form\
    \ the core of the improved file system interface.\n\n### File Systems and File\
    \ System Providers\n\nAn operating system can host one or more file systems. For\
    \ example, Unix/Linux combines all mounted disks into one virtual file system.\
    \ In contrast, Windows associates a separate file system with each active disk\
    \ drive; for example, FAT16 for drive `A:` and NTFS for drive `C:`.\n\nThe `java.nio.file.FileSystem`\
    \ class interfaces between Java code and a file system. Furthermore, `FileSystem`\
    \ is a factory for obtaining many types of file system-related objects (such as\
    \ file stores and paths) and services (such as watch services).\n\n`FileSystem`\
    \ cannot be instantiated because this class is abstract. Instead, the `java.nio.file.FileSystems`\
    \ utility class is used to obtain `FileSystem`s via several factory methods. For\
    \ example, the `FileSystem` `getDefault()` class method returns a `FileSystem`\
    \ object for the default file system:\n\n```\nFileSystem fsDefault = FileSystems.getDefault();\n\
    ```\n\n`FileSystems` also declares a `FileSystem getFileSystem(URI uri)` class\
    \ method for obtaining a `FileSystem` associated with the specified uniform resource\
    \ identifier (URI) argument. Furthermore, `FileSystems` declares three `newFileSystem()`\
    \ methods for creating new `FileSystem`s.\n\nThe abstract `java.nio.file.spi.FileSystemProvider`\
    \ class is used by the `FileSystems` factory methods to obtain existing file systems\
    \ or create new file systems. A concrete subclass of `FileSystemProvider` implements\
    \ its various methods for copying, moving, and deleting files; for obtaining a\
    \ path; for reading attributes and the targets of symbolic links; for creating\
    \ directories, links, and symbolic links; and more.\n\nFigure 12-1 shows how `FileSystem`,\
    \ `FileSystems`, and `FileSystemProvider` are related.\n\n![A978-1-4842-1565-4_12_Fig1_HTML.jpg](A978-1-4842-1565-4_12_Fig1_HTML.jpg)\n\
    \n**Figure 12-1.** `FileSystems` methods instantiate `FileSystemProvider`s to\
    \ obtain `FileSystem`s\n\nA Java implementation provides concrete `FileSystemProvider`\
    \ subclasses that describe different kinds of file system providers. If you’re\
    \ curious about the file system providers supported by your Java implementation,\
    \ run the application whose source code appears in Listing 12-1.\n\n**Listing\
    \ 12-1.** Identifying Installed File System Providers\n\n```\nimport java.nio.file.spi.FileSystemProvider;\n\
    import java.util.List;\n\npublic class ListProviders\n{\n   public static void\
    \ main(String[] args)\n   {\n      List<FileSystemProvider> providers =\n    \
    \     FileSystemProvider.installedProviders();\n      for (FileSystemProvider\
    \ provider: providers)\n         System.out.println(provider);\n   }\n}\n```\n\
    \nListing 12-1 invokes `FileSystemProvider`’s `List<FileSystemProvider>` `installedProviders()`\
    \ class method to obtain a list of the installed file system providers. It then\
    \ iterates over this list, implicitly invoking each provider’s `toString()` method\
    \ and outputting the resulting string.\n\nCompile Listing 12-1 as follows:\n\n\
    ```\njavac ListProviders.java\n```\n\nRun the resulting application as follows:\n\
    \n```\njava ListProviders\n```\n\nWhen I run this application, I observe the following\
    \ output:\n\n```\nsun.nio.fs.WindowsFileSystemProvider@4aa298b7\ncom.sun.nio.zipfs.ZipFileSystemProvider@7d4991ad\n\
    ```\n\nThis output tells me two things: `FileSystem`s that interface to the file\
    \ systems that are native to my Windows 7 operating system are obtained from the\
    \ `WindowsFileSystemProvider` subclass. Also, I can obtain `FileSystem`s that\
    \ are based on ZIP files.\n\nWith few exceptions, `NIO.2`’s various types ultimately\
    \ delegate to the foundational `FileSystem`, `FileSystems`, and `FileSystemProvider`\
    \ types."
  raw: '# 12. Improved File System Interface


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​12](http://dx.doi.org/10.1007/978-1-4842-1565-4_12))
    contains supplementary material, which is available to authorized users.


    NIO.2 improves the file system interface that was previously limited to the `java.io.File`
    class. This chapter introduces the improved file system interface’s architecture
    and shows you how to use the new APIs to accomplish a wide range of file system
    tasks.


    Note


    A file system manages files, which are classified as regular files, directories,
    symbolic links ( [`https://en.wikipedia.org/wiki/Symbolic_link`](https://en.wikipedia.org/wiki/Symbolic_link)
    ), and hard links ( [`https://en.wikipedia.org/wiki/Hard_link`](https://en.wikipedia.org/wiki/Hard_link)
    ).


    ## Architecting a Better File Class


    The `File`-based file system interface is problematic. Several problems are listed
    here:


    *   Many methods return Boolean values rather than throw exceptions. As a result,
    you don’t know why an operation fails. For example, when the `delete()` method
    returns `false`, you don’t know why the file could not be deleted (such as the
    file not existing or the user not having the appropriate permission to perform
    the deletion).

    *   `File` doesn’t support file system-specific symbolic links and hard links.

    *   `File` provides access to a limited set of file attributes. For example, it
    doesn’t support access control lists (ACLs) ( [`https://en.wikipedia.org/wiki/Access_control_list`](https://en.wikipedia.org/wiki/Access_control_list)
    ).

    *   `File` doesn’t support efficient file-attribute access. Every query results
    in a call to the underlying operating system.

    *   `File` doesn’t scale to large directories. Requesting a large directory listing
    over a server can result in a hung application. Large directories can also cause
    memory resource problems, resulting in a denial of service.

    *   `File` is limited to the default file system (the file system that is accessible
    to the Java Virtual Machine—JVM). It doesn’t support alternatives, such as a memory-based
    file system.

    *   `File` doesn’t offer a file-copy or a file-move capability. The `renameTo()`
    method, which is often used in a file-move context, doesn’t work consistently
    across operating systems.


    NIO.2 provides an improved file system interface that offers solutions to the
    previous problems. Some of its features are listed here:


    *   Methods throwing exceptions

    *   Support for symbolic links

    *   Broad and efficient support for file attributes

    *   Directory streams

    *   Support for alternative file systems via custom file system providers

    *   Support for file copying and file moving

    *   Support for walking the file tree/visiting files and watching directories


    The improved file system interface is implemented mainly by the various types
    in the following packages:


    *   `java.nio.file`: Provides interfaces and classes for accessing file systems
    and their files.

    *   `java.nio.file.attribute`: Provides interfaces and classes for accessing file
    system attributes.

    *   `java.nio.file.spi`: Provides classes for creating a file system implementation.


    These packages organize many types. `FileSystem`, `FileSystems`, and `FileSystemProvider`
    form the core of the improved file system interface.


    ### File Systems and File System Providers


    An operating system can host one or more file systems. For example, Unix/Linux
    combines all mounted disks into one virtual file system. In contrast, Windows
    associates a separate file system with each active disk drive; for example, FAT16
    for drive `A:` and NTFS for drive `C:`.


    The `java.nio.file.FileSystem` class interfaces between Java code and a file system.
    Furthermore, `FileSystem` is a factory for obtaining many types of file system-related
    objects (such as file stores and paths) and services (such as watch services).


    `FileSystem` cannot be instantiated because this class is abstract. Instead, the
    `java.nio.file.FileSystems` utility class is used to obtain `FileSystem`s via
    several factory methods. For example, the `FileSystem` `getDefault()` class method
    returns a `FileSystem` object for the default file system:


    `FileSystem fsDefault = FileSystems.getDefault();`


    `FileSystems` also declares a `FileSystem getFileSystem(URI uri)` class method
    for obtaining a `FileSystem` associated with the specified uniform resource identifier
    (URI) argument. Furthermore, `FileSystems` declares three `newFileSystem()` methods
    for creating new `FileSystem`s.


    The abstract `java.nio.file.spi.FileSystemProvider` class is used by the `FileSystems`
    factory methods to obtain existing file systems or create new file systems. A
    concrete subclass of `FileSystemProvider` implements its various methods for copying,
    moving, and deleting files; for obtaining a path; for reading attributes and the
    targets of symbolic links; for creating directories, links, and symbolic links;
    and more.


    Figure [12-1](#A978-1-4842-1565-4_12_Chapter.html#Fig1) shows how `FileSystem`,
    `FileSystems`, and `FileSystemProvider` are related.


    ![A978-1-4842-1565-4_12_Fig1_HTML.jpg](A978-1-4842-1565-4_12_Fig1_HTML.jpg)


    Figure 12-1.


    `FileSystems` methods instantiate `FileSystemProvider`s to obtain `FileSystem`s


    A Java implementation provides concrete `FileSystemProvider` subclasses that describe
    different kinds of file system providers. If you’re curious about the file system
    providers supported by your Java implementation, run the application whose source
    code appears in Listing [12-1](#A978-1-4842-1565-4_12_Chapter.html#FPar2).


    Listing 12-1\. Identifying Installed File System Providers


    `import java.nio.file.spi.FileSystemProvider;`


    `import java.util.List;`


    `public class ListProviders`


    `{`


       `public static void main(String[] args)`


       `{`


          `List<FileSystemProvider> providers =`


             `FileSystemProvider.installedProviders();`


          `for (FileSystemProvider provider: providers)`


             `System.out.println(provider);`


       `}`


    `}`


    Listing [12-1](#A978-1-4842-1565-4_12_Chapter.html#FPar2) invokes `FileSystemProvider`’s
    `List<FileSystemProvider>` `installedProviders()` class method to obtain a list
    of the installed file system providers. It then iterates over this list, implicitly
    invoking each provider’s `toString()` method and outputting the resulting string.


    Compile Listing [12-1](#A978-1-4842-1565-4_12_Chapter.html#FPar2) as follows:


    `javac ListProviders.java`


    Run the resulting application as follows:


    `java ListProviders`


    When I run this application, I observe the following output:


    `sun.nio.fs.WindowsFileSystemProvider@4aa298b7`


    `com.sun.nio.zipfs.ZipFileSystemProvider@7d4991ad`


    This output tells me two things: `FileSystem`s that interface to the file systems
    that are native to my Windows 7 operating system are obtained from the `WindowsFileSystemProvider`
    subclass. Also, I can obtain `FileSystem`s that are based on ZIP files.


    With few exceptions, NIO.2’s various types ultimately delegate to the foundational
    `FileSystem`, `FileSystems`, and `FileSystemProvider` types.'
