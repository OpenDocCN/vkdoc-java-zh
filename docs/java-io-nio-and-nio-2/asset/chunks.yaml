    ## 探索 Formattable 和 FormattableFlags


    `Formatter` 附带了一个 `java.util.Formattable` 接口和一个 `java.util.FormattableFlags` 类，它们共同支持对任意用户定义类型进行有限的格式化定制。


    任何需要使用 [`Formatter`](https://docs.oracle.com/javase/8/docs/api/java/util/Formatter.html#class%20in%20java.util)
    的“`s`”（将格式参数作为字符串）转换字符来执行自定义格式化的类，都应实现 `Formattable`。该接口允许对任意对象的格式化进行基本控制。


    `Formattable` 声明了以下方法，该方法由 `Formatter` 的 `format()` 方法调用以执行自定义格式化：


    `void formatTo(` [`Formatter`](https://docs.oracle.com/javase/8/docs/api/java/util/Formatter.html#class%20in%20java.util)
    `formatter, int flags, int width, int precision)`


    这些参数的含义如下：


    *   `formatter` 是持有区域设置的 `Formatter` 对象，当输出完成时，你将输出发送到该对象。

    *   `flags` 是 `FormattableFlags` 常量的位掩码：`ALTERNATE`（用户指定了 `#` 用于替代格式）、`LEFT_JUSTIFY`（用户指定了
    `-` 用于左对齐）和 `UPPERCASE`（用户指定了 `S` 用于基于区域设置转换为大写）。

    *   `width` 是要写入输出的最小字符数。如果转换后的值长度小于宽度，则输出将用空格字符填充，直到总字符数等于宽度。默认情况下，填充位于输出的开头。如果指定了
    [`FormattableFlags.LEFT_JUSTIFY`](https://docs.oracle.com/javase/8/docs/api/java/util/FormattableFlags.html#LEFT_JUSTIFY)，则填充将位于末尾。如果宽度为
    `-1`，则没有最小宽度。

    *   `precision` 是要写入输出的最大字符数。由于精度在宽度之前应用，因此即使宽度大于精度，输出也会被截断为精度指定的字符数。如果精度为 `-1`，则对输出中的字符数没有明确限制。


    `width` 和 `precision` 参数可能看起来令人困惑。为了帮助你理解它们，请考虑以下示例：


    `System.out.printf("[%10.2s]%n", "ABC");`


    `System.out.printf("[%10.12s]%n", "ABC");`


    `System.out.printf("[%10.2s]%n", "ABCDEFGHIJKLMNOP");`


    `System.out.printf("[%10.12s]%n", "ABCDEFGHIJKLMNOP");`


    当你执行这些语句时，应该会看到以下输出：


    `[        AB]`


    `[       ABC]`


    `[        AB]`


    `[ABCDEFGHIJKL]`


    最后一个示例显示输出了 12 个字符。虽然这个值超过了 10 个字符的宽度，但并未超过 12 个字符的精度。当输出的字符数少于 `width` 时，传递给
    `width` 的值在对齐方面最为有用。


    `formatTo` `(Formatter, int, int, int)` 方法会在字符串构建器中构建一个字符串，然后在返回之前，将该字符串传递给格式化器的
