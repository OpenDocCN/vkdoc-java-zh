    `System.out.println(msg);`


    `OutputStream os = s.getOutputStream();`


    `OutputStreamWriter osw = new OutputStreamWriter(os);`


    `PrintWriter pw = new PrintWriter(osw);`


    `pw.println(msg);`


    `pw.flush();`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `finally`


    `{`


    `try`


    `{`


    `s.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `assert false; // shouldn’t happen in this context`


    `}`


    `}`


    `}`


    `}`


    `}`


    `EchoServer` 首先向标准输出输出一条介绍性消息，然后创建一个服务器套接字，该套接字监听 9999 端口上的连接。接着进入一个无限循环，每次迭代调用
    `ServerSocket` 的 `Socket accept()` 方法，阻塞直到收到连接，然后返回一个代表此连接的 `Socket` 对象。


    获取套接字后，`EchoServer` 获取一个输入流，用于从套接字读取数据。由于输入流只能处理字节序列，因此使用 `InputStreamReader`
    和 `BufferedReader` 类将读取字符的读取器连接到面向字节的输入流。


    现在，`EchoServer` 获取一个输出流，用于将字符串作为字节序列写入。然后，通过实例化 `OutputStreamWriter` 和 `PrintWriter`，将输出字符的写入器连接到面向字节的输出流。


    将消息输出到标准输出后，`EchoServer` 调用 `flush()` 将输出刷新到客户端。然后关闭客户端套接字。


    要试验这些应用程序，首先将 `EchoClient.java` 和 `EchoServer.java` 复制到同一目录，并打开两个控制台窗口，将当前目录设置为此目录。


    按如下方式编译这些源文件：


    `javac *.java`


    在一个窗口中按如下方式运行 `EchoServer`：


    `java EchoServer`


    您应该会看到以下输出：


    `Starting echo server...`


    注意


    如果您启用了防火墙（ [`http://en.wikipedia.org/wiki/Firewall_(computing)`](http://en.wikipedia.org/wiki/Firewall_(computing))
    ），您可能需要启用 9999 端口。


    启动服务器后，在另一个窗口中按如下方式运行 `EchoClient`：


    `java EchoClient "This is a test."`


    您应该会在两个窗口中看到“`This is a test.`”。

