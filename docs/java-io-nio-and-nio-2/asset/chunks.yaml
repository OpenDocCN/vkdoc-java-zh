    ##### 获取和设置单个 POSIX 文件属性值


    清单 12-16 展示了一个应用程序的源代码，演示如何获取和设置单个 POSIX 文件属性值。


    **清单 12-16.** 获取和设置单个 POSIX 文件属性值


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.GroupPrincipal;`


    `import java.nio.file.attribute.PosixFilePermission;`


    `import java.util.Set;`


    `public class PFAVDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length < 1 || args.length > 2)`


          `{`


             `System.err.println("usage: java PFAVDemo path [group]");`


             `return;`


          `}`


          `Path path = Paths.get(args[0]);`


          `boolean setAttr = false;`


          `if (args.length == 2)`


             `setAttr = true;`


          `System.out.printf("Group: %b%n",`


                            `Files.getAttribute(path, "posix:group"));`


          `@SuppressWarnings("unchecked")`


          `Set<PosixFilePermission> perms =`


             `(Set<PosixFilePermission>)`


             `Files.getAttribute(path, "posix: permissions");`


          `for (PosixFilePermission perm: perms)`


             `System.out.printf("Permission: %s%n", perm);`


          `if (setAttr)`


          `{`


             `GroupPrincipal gp = path.getFileSystem().`


                                      `getUserPrincipalLookupService().`


                                      `lookupPrincipalByGroupName(args[1]);`


             `Files.setAttribute(path, "posix:group", gp);`


             `System.out.printf("Group: %b%n",`


                               `Files.getAttribute(path, "posix:group"));`


          `}`


       `}`


    `}`


    与基本文件属性不同，POSIX 文件属性名称需要一个前缀，即 `posix:`。


    要更改 `group` 属性，你需要获取一个与命令行参数中指定的组名相对应的新 `GroupPrincipal` 对象。此任务通过以下步骤完成：


    1.  调用 `Path` 的 `FileSystem getFileSystem()` 方法，返回创建该 `Path` 对象的 `FileSystem`。

    2.  调用 `FileSystem` 的 `UserPrincipalLookupService getUserPrincipalLookupService()`
    方法，返回 `java.nio.file.attribute.UserPrincipalLookupService` 对象，用于获取 `UserPrincipal`
    和 `GroupPrincipal`。

    3.  调用 `UserPrincipalLookupService` 的 `GroupPrincipal lookupPrincipalByGroupName(String
    group)` 方法，返回所需的 `GroupPrincipal` 对象。


    编译清单 12-16（`javac PFAVDemo.java`），假设支持 POSIX 文件属性视图，在任意文件上运行此应用程序。我观察到了 `UnsupportedOperationException`。


    `Files` 类声明了以下便捷方法来获取和设置 POSIX 权限属性：


    *   `Set<PosixFilePermission> getPosixFilePermissions(Path path, LinkOption...
    options)`

    *   `Path setPosixFilePermissions(Path path, Set<PosixFilePermission> perms)`


    例如，你可以更便捷地指定：


    `Set<PosixFilePermission> perms = Files.getPosixFilePermissions(path);`


    而不是：


    `Set<PosixFilePermission> perms =`


             `(Set<PosixFilePermission>)`


             `Files.getAttribute(path, "posix: permissions");`


    #### 探索文件所有者视图


    许多文件系统支持文件所有权的概念。文件所有者是创建文件的拥有者的身份标识。NIO.2 通过提供 `FileOwnerAttributeView` 接口来支持文件所有权，该接口支持以下属性：


    *   `owner` (`UserPrincipal`)


    `FileOwnerAttributeView` 声明了以下方法来访问此属性：


    *   [`UserPrincipal`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/UserPrincipal.html#interface%20in%20java.nio.file.attribute)
    `getOwner()`：读取文件所有者。

    *   `void setOwner(UserPrincipal owner)`：更新文件所有者。


    这些方法表明文件所有者是作为用户主体实现的。当发生 I/O 错误时，它们会抛出 `IOException`。


    你通常不需要直接使用这些方法，因为 `Files` 声明了以下更方便的方法：


    *   [`UserPrincipal`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/UserPrincipal.html#interface%20in%20java.nio.file.attribute)
    `getOwner(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`LinkOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/LinkOption.html#enum%20in%20java.nio.file)
    `... options)`

    *   [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `setOwner(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`UserPrincipal`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/UserPrincipal.html#interface%20in%20java.nio.file.attribute)
    `owner)`


    注意


    你也可以通过 `Files.getAttribute()` 或 `Files.setAttribute()` 访问文件所有者属性。你需要为视图前缀和属性名称指定
    `owner:owner`。


    清单 12-17 展示了一个演示 `getOwner()` 和 `setOwner()` 的应用程序源代码。


    **清单 12-17.** 获取和设置文件所有权


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.UserPrincipal;`


    `public class FOAVDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java FOAVDemo path");`


    `return;`


    `}`


    `Path path = Paths.get(args[0]);`


    `System.out.printf("Owner: %s%n", Files.getOwner(path));`


    `UserPrincipal up = path.getFileSystem().`


    `getUserPrincipalLookupService().`


    `lookupPrincipalByName("jeff");`


    `System.out.println(up);`


    `Files.setOwner(path, up);`


    `System.out.printf("Owner: %s%n", Files.getOwner(path));`


