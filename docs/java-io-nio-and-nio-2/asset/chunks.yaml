    The various `System.out.printf()` method calls attempt to format and then output
    the string returned from the `Employee` object’s `toString()` method in different
    ways. For example, the first call outputs the value returned from `toString()`
    verbatim.


    The second call attempts to output it in the French locale. You will see the English
    name because there is no customization. The third call outputs the name in uppercase;
    the fourth and fifth calls right-justify and left-justify the first three characters
    from `toString()` in a width of 10 characters.


    The final call attempts to use a conversion-dependent alternate form, which is
    indicated by `#s`. However, because customization has not yet been added to `Employee`,
    `java.util.FormatFlagsConversionMismatchException` will be thrown when `#s` is
    detected.


    Compile Listings [11-3](#A978-1-4842-1565-4_11_Chapter.html#FPar6) and [11-4](#A978-1-4842-1565-4_11_Chapter.html#FPar7)
    as follows:


    `javac *.java`


