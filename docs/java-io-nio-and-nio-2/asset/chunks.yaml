- fmt: "### Scatter/Gather I/O\n\nChannels provide the ability to perform a single\
    \ I/O operation across multiple buffers. This capability is known as scatter/gather\
    \ I/O (and is also known as vectored I/O).\n\nIn the context of a write operation,\
    \ the contents of several buffers are gathered (drained) in sequence and then\
    \ sent through the channel to a destination. These buffers are not required to\
    \ have identical capacities. In the context of a read operation, the contents\
    \ of a channel are scattered (filled) to multiple buffers in sequence; each buffer\
    \ is filled to its limit until the channel is empty or until the total buffer\
    \ space is used.\n\n**Note:** Modern operating systems provide APIs that support\
    \ vectored I/O to eliminate (or at least reduce) system calls or buffer copies,\
    \ and hence improve performance. For example, the Win32/Win64 APIs provide `ReadFileScatter()`\
    \ and `WriteFileGather()` functions for this purpose.\n\nJava provides the `java.nio.channels.ScatteringByteChannel`\
    \ interface to support scattering and the `java.nio.channels.GatheringByteChannel`\
    \ interface to support gathering.\n\n`ScatteringByteChannel` offers the following\
    \ methods:\n\n- `long read(ByteBuffer[] buffers, int offset, int length)`\n- `long\
    \ read(ByteBuffer[] buffers)`\n\n`GatheringByteChannel` offers the following methods:\n\
    \n- `long write(ByteBuffer[] buffers, int offset, int length)`\n- `long write(ByteBuffer[]\
    \ buffers)`\n\nThe first `read()` method and the first `write()` method let you\
    \ identify the first buffer to read/write by passing a zero-based offset to `offset`,\
    \ and the number of buffers to read/write by passing a value to `length`. The\
    \ second `read()` method and the second `write()` method read and write all buffers\
    \ in sequence.\n\nListing 7-2 demonstrates `read(ByteBuffer[] buffers)` and `write(ByteBuffer[]\
    \ buffers)`.\n\n**Listing 7-2.** Demonstrating Scatter/Gather\n\n```\nimport java.io.FileInputStream;\n\
    import java.io.FileOutputStream;\nimport java.io.IOException;\nimport java.nio.ByteBuffer;\n\
    import java.nio.channels.Channels;\nimport java.nio.channels.GatheringByteChannel;\n\
    import java.nio.channels.ReadableByteChannel;\nimport java.nio.channels.ScatteringByteChannel;\n\
    \npublic class ChannelDemo\n{\n   public static void main(String[] args) throws\
    \ IOException\n   {\n      ScatteringByteChannel src;\n      FileInputStream fis\
    \ = new FileInputStream(\"x.dat\");\n      src = (ScatteringByteChannel) Channels.newChannel(fis);\n\
    \      ByteBuffer buffer1 = ByteBuffer.allocateDirect(5);\n      ByteBuffer buffer2\
    \ = ByteBuffer.allocateDirect(3);\n      ByteBuffer[] buffers = { buffer1, buffer2\
    \ };\n      src.read(buffers);\n      buffer1.flip();\n      while (buffer1.hasRemaining())\n\
    \         System.out.println(buffer1.get());\n      System.out.println();\n  \
    \    buffer2.flip();\n      while (buffer2.hasRemaining())\n         System.out.println(buffer2.get());\n\
    \      buffer1.rewind();\n      buffer2.rewind();\n      GatheringByteChannel\
    \ dest;\n      FileOutputStream fos = new FileOutputStream(\"y.dat\");\n     \
    \ dest = (GatheringByteChannel) Channels.newChannel(fos);\n      buffers[0] =\
    \ buffer2;\n      buffers[1] = buffer1;\n      dest.write(buffers);\n   }\n}\n\
    ```\n\nListing 7-2’s `main()` method first obtains a scattering byte channel by\
    \ instantiating `java.io.FileInputStream` and passing this instance to the `Channels`\
    \ class’s `ReadableByteChannel newChannel(InputStream inputStream)` method. The\
    \ returned `ReadableByteChannel` instance is cast to `ScatteringByteChannel` because\
    \ this instance is actually a file channel (discussed later) that implements `ScatteringByteChannel`.\n\
    \nNext, `main()` creates a couple of direct byte buffers; the first buffer has\
    \ a capacity of five bytes and the second buffer has a capacity of three bytes.\
    \ These buffers are subsequently stored in an array and this array is passed to\
    \ `read(ByteBuffer[])` to fill them.\n\nAfter filling the buffers, `main()` flips\
    \ them so that it can output their contents to standard output. After these contents\
    \ have been output, the buffers are rewound in preparation for being drained via\
    \ a gather operation.\n\n`main()` now obtains a gathering byte channel by instantiating\
    \ `java.io.FileOutputStream` and passing this instance to the `Channels` class’s\
    \ `WritableByteChannel newChannel(OutputStream outputStream)` method. The returned\
    \ `WritableByteChannel` instance is cast to `GatheringByteChannel` because this\
    \ instance is actually a file channel (discussed later) that implements `GatheringByteChannel`.\n\
    \nFinally, `main()` assigns these buffers to the `buffers` array in reverse order\
    \ to how they were originally assigned, and then passes this array to `write(ByteBuffer[])`\
    \ to drain them.\n\nCreate a file named `x.dat` and store the following text in\
    \ this file:\n\n```\n12345abcdefg\n```\n\nNow compile Listing 7-2 (`javac ChannelDemo.java`)\
    \ and run this application (`java ChannelDemo`). You should observe the following\
