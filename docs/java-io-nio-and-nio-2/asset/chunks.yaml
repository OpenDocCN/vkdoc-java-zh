- fmt: '### Byte Ordering


    Nonbyte primitive types except for `Boolean` (which might be represented by a
    bit or by a byte) are composed of several bytes: a character or a `short` integer
    occupies two bytes, a 32-bit integer or a floating-point value occupies four bytes,
    and a `long` integer or a double precision floating-point value occupies eight
    bytes. Each value of one of these multibyte types is stored in a sequence of contiguous
    memory locations. However, the order of these bytes can differ from operating
    system to operating system.


    For example, consider 32-bit long integer `0x10203040`. This value’s four bytes
    could be stored in memory (from low address to high address) as `10`, `20`, `30`,
    `40`; this arrangement is known as big endian order (the most-significant byte,
    the “big” end, is stored at the lowest address). Alternatively, these bytes could
    be stored as `40`, `30`, `20`, `10`; this arrangement is known as little endian
    order (the least-significant byte, the “little” end, is stored at the lowest address).


    Java provides the `java.nio.ByteOrder` class to help you deal with byte-order
    issues when writing/reading multibyte values to/from a multibyte buffer. `ByteOrder`
    declares a `ByteOrder nativeOrder()` method that returns the operating system’s
    byte order as a `ByteOrder` instance. Because this instance is one of `ByteOrder`’s
    `BIG_ENDIAN` and `LITTLE_ENDIAN` constants, and because no other `ByteOrder` instances
    can be created, you can compare `nativeOrder()`’s return value to one of these
    constants via the `==` or `!=` operator.


    Also, each multibyte class (such as `FloatBuffer`) declares a `ByteOrder order()`
    method that returns the buffer’s byte order. This method returns `ByteOrder.BIG_ENDIAN`
    or `ByteOrder.LITTLE_ENDIAN`.


    The `ByteOrder` value returned from `order()` can take on a different value based
    on how the buffer was created. If a multibyte buffer (such as a floating-point
    buffer) was created by allocation or by wrapping an existing array, the buffer’s
    byte order is the native order of the underlying operating system. However, if
    a multibyte buffer was created as a view of a byte buffer, the view buffer’s byte
    order is that of the byte buffer when the view was created. The view buffer’s
    byte order cannot be subsequently changed.


    `ByteBuffer` differs from the multibyte classes when it comes to byte order. Its
    default byte order is always big endian, even when the underlying operating system’s
    byte order is little endian. `ByteBuffer` defaults to big endian because Java’s
    default byte order is also big endian, which lets classfiles and serialized objects
    store data consistently across Java virtual machines (JVMs).


    Because this big endian default can impact performance on little endian operating
    systems, `ByteBuffer` also declares a `ByteBuffer order(ByteOrder bo)` method
    to change the byte buffer’s byte order.


    Although it may seem unusual to change the byte order of a byte buffer (where
    only single-byte data items are accessed), this method is useful because `ByteBuffer`
    also declares several convenience methods for writing and reading multibyte values
    (`ByteBuffer putInt(int value)` and `int getInt()`, for example). These convenience
    methods write these values according to the byte buffer’s current byte order.
    Furthermore, you can subsequently call `ByteBuffer`’s `LongBuffer asLongBuffer()`
    or another `asxBuffer()` method to return a view buffer whose order will reflect
    the byte buffer’s changed byte order.


    ### Direct Byte Buffers


    Unlike multibyte buffers, byte buffers can serve as the sources and/or targets
    of channel-based I/O. This shouldn’t come as a surprise because operating systems
    perform I/O on memory areas that are contiguous sequences of 8-bit bytes (not
    floating-point values, not 32-bit integers, and so on).


    Operating systems can directly access the address space of a process. For example,
    an operating system could directly access a JVM process’s address space to perform
    a data transfer operation based on a byte array. However, a JVM might not store
    the array of bytes contiguously or its garbage collector might move the byte array
    to another location. Because of these limitations, direct byte buffers were created.


    A direct byte buffer is a byte buffer that interacts with channels and native
    code to perform I/O. The direct byte buffer attempts to store byte elements in
    a memory area that a channel uses to perform direct (raw) access via native code
    that tells the operating system to drain or fill the memory area directly.


    Direct byte buffers are the most efficient means for performing I/O on the JVM.
    Although you can also pass nondirect byte buffers to channels, a performance problem
    might arise because nondirect byte buffers are not always able to serve as the
    target of native I/O operations.


    When passed a nondirect byte buffer, a channel might have to create a temporary
    direct byte buffer, copy the nondirect byte buffer’s content to the direct byte
    buffer, perform the I/O operation on the temporary direct byte buffer, and copy
    the temporary direct byte buffer’s content to the nondirect byte buffer. The temporary
    direct byte buffer will then be subject to garbage collection.


    Although optimal for I/O, a direct byte buffer can be expensive to create because
    memory extraneous to the JVM’s heap will need to be allocated by the operating
    system, and setting up/tearing down this memory might take longer than when the
    buffer was located within the heap.


    After your code is working and should you want to experiment with performance
    optimization, you can easily obtain a direct byte buffer by invoking `ByteBuffer`’s
    `allocateDirect()` method, which I discussed earlier.


    ### EXERCISES


    The following exercises are designed to test your understanding of [Chapter 6](#A978-1-4842-1565-4_6_Chapter.html)’s
    content:


    - What is a buffer?

    - Identify a buffer’s four properties.

    - What happens when you invoke `Buffer`’s `array()` method on a buffer backed
    by a read-only array?

    - What happens when you invoke `Buffer`’s `flip()` method on a buffer?

    - What happens when you invoke `Buffer`’s `reset()` method on a buffer where a
    mark has not been set?

    - True or false: Buffers are thread-safe.

    - Identify the classes that extend the abstract `Buffer` class.

    - How do you create a byte buffer?

    - Define view buffer.

    - How is a view buffer created?

    - How do you create a read-only view buffer?

    - Identify `ByteBuffer`’s methods for storing a single byte in a byte buffer and
    fetching a single byte from a byte buffer.

    - What causes `BufferOverflowException` or `BufferUnderflowException` to occur?

    - What is the equivalent of executing `buffer.flip();`?

    - True or false: Calling `flip()` twice returns you to the original state.

    - What is the difference between `Buffer`’s `clear()` and `reset()` methods?

    - What does `ByteBuffer`’s `compact()` method accomplish?

    - What is the purpose of the `ByteOrder` class?

    - Define direct byte buffer.

    - How do you obtain a direct byte buffer?

    - Why could it be expensive to create a direct byte buffer?

    - Create a `ViewBufferDemo` application that populates a byte buffer with the
    values `0`, `0x6e`, `0`, `0x69`, `0`, `0x6f`; creates a character view buffer;
    and iterates over the view buffer, outputting each character.'
