    ## BufferedWriter and BufferedReader


    `BufferedWriter` writes text to a character-output stream (a `Writer` instance),
    buffering characters so as to provide for the efficient writing of single characters,
    arrays, and strings. Invoke either of the following constructors to construct
    a buffered writer:


    *   `BufferedWriter(` [`Writer`](http://docs.oracle.com/javase/7/docs/api/java/io/Writer.html#class%20in%20java.io)
    `out)`

    *   `BufferedWriter(` [`Writer`](http://docs.oracle.com/javase/7/docs/api/java/io/Writer.html#class%20in%20java.io)
    `out, int size)`


    The buffer `size` may be specified, or the default size (8,192 bytes) may be accepted.
    The default is large enough for most purposes.


    `BufferedWriter` includes a handy `void newLine()` method for writing a line-separator
    string, which effectively terminates the current line.


    `BufferedReader` reads text from a character-input stream (a `Reader` instance),
    buffering characters so as to provide for the efficient reading of characters,
    arrays, and lines. Invoke either of the following constructors to construct a
    buffered reader:


    *   `BufferedReader(` [`Reader`](http://docs.oracle.com/javase/7/docs/api/java/io/Reader.html#class%20in%20java.io)
    `in)`

    *   `BufferedReader(` [`Reader`](http://docs.oracle.com/javase/7/docs/api/java/io/Reader.html#class%20in%20java.io)
    `in, int size)`


    The buffer `size` may be specified, or the default size (8,192 bytes) may be used.
    The default is large enough for most purposes.


    `BufferedReader` includes a handy [`String`](http://docs.oracle.com/javase/7/docs/api/java/lang/String.html#class%20in%20java.lang)
    `readLine()` method for reading a line of text, not including any line-termination
    characters.


