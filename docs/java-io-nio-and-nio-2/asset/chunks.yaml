    ## 摘要


    选择器（selector）是从抽象类 `Selector` 的子类创建的对象。选择器维护一组通道，通过检查这些通道来确定哪些通道已准备好进行读取、写入、完成连接序列、接受另一个连接或这些任务的某种组合。


    选择器与可选择的通道一起使用，这些通道的类最终继承自抽象类 `SelectableChannel`，该类描述了一个可由选择器多路复用的通道。


    一个或多个先前创建的可选择通道会注册到选择器上。每次注册都会返回抽象类 `SelectionKey` 的一个子类实例，该实例是一个令牌，表示一个通道与选择器之间的关系。当调用选择方法时，通过检查所有注册到该选择器的通道来更新选择器关联的键。然后，应用程序可以获取一组键，这些键对应的通道已被发现处于就绪状态，并遍历这些键，以服务自上次
    `select` 方法调用以来变为就绪的每个通道。


