  raw: 'Listing [12-31](#A978-1-4842-1565-4_12_Chapter.html#FPar46) creates a shutdown
    hook that registers a `java.lang.Thread` subclass object whose overriding `run()`
    method will execute before the JVM ends. Specifically, it will execute `Files.delete(path);`
    to delete the temporary directory. I’ll discuss this method later in this chapter.


    Compile Listing [12-31](#A978-1-4842-1565-4_12_Chapter.html#FPar46) (`javac CTDDemo.java`)
    and run the resulting application (`java CTDDemo .`). You should not observe the
    temporary directory in the current directory after the application terminates.


    #### Listing Directory Content


    It’s often necessary to obtain a list of a directory’s entries. NIO.2 provides
    the `java.nio.file.DirectoryStream<T>` interface to assist with this task. `DirectoryStream`
    subtypes `java.lang.Iterable<T>`, which makes a directory stream a target for
    the convenient enhanced `for` loop statement.


    `DirectoryStream` also subtypes `java.io.Closeable`, which subtypes `java.lang.AutoCloseable`.
    This arrangement makes it possible to use `DirectoryStream` with the `try`-with-resources
    statement to automatically close the directory stream.


    Note


    When not using `try`-with-resources, invoke the directory stream’s `close()` method
    after iteration is completed to free any resources held for the open directory.
    A stream is automatically closed when the application ends.


    `DirectoryStream` inherits `Iterable`’s `Iterator<T> iterator()` method, which
    makes directory streams the targets of enhanced `for` loops. Also, `DirectoryStream`
    declares a nested `Filter<T>` interface that’s implemented by classes to decide
    if a directory entry should be accepted or filtered.


    You can obtain a `DirectoryStream` by calling one of the `Files` class’s `newDirectoryStream()`
    methods:


    *   [`DirectoryStream`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/DirectoryStream.html#interface%20in%20java.nio.file)
    `<` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `> newDirectoryStream(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `dir)`

    *   `DirectoryStream<Path> newDirectoryStream(Path dir, DirectoryStream.Filter<?
    super Path> filter)`

    *   [`DirectoryStream`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/DirectoryStream.html#interface%20in%20java.nio.file)
    `<` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `> newDirectoryStream(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `dir,` [`String`](https://docs.oracle.com/javase/8/docs/api/java/lang/String.html#class%20in%20java.lang)
    `glob)`


    `newDirectoryStream(` `Path` `dir)` opens a directory, returning a `DirectoryStream`
    to iterate over all entries in the directory. The elements returned by the directory
    stream’s iterator are of type `Path`; each `Path` object represents an entry in
    the directory. The `Path` objects are obtained as if by resolving the name of
    the directory entry against `dir`. This method throws `IOException` when an I/O
    error occurs and `java.nio.file.NotDirectoryException` when the path couldn’t
    be opened because it’s not a directory.


    Listing [12-32](#A978-1-4842-1565-4_12_Chapter.html#FPar48) presents an application
    that obtains and outputs all entries in the specified directory.


    Listing 12-32\. Obtaining and Outputting All Entries in a Directory


    `import java.io.IOException;`


    `import java.nio.file.DirectoryStream;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class DSDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java DSDemo dirpath");`


    `return;`


    `}`


    `Path path = Paths.get(args[0]);`


    `DirectoryStream<Path> ds = Files.newDirectoryStream(path);`


    `for (Path p: ds)`


    `System.out.println(p);`


    `}`


    `}`


    In Listing [12-32](#A978-1-4842-1565-4_12_Chapter.html#FPar48), I didn’t bother
    to use `try`-with-resources, for convenience. (After all, this is just a small
    throw-away application.) Also, I didn’t bother to call `close()` because the directory
    stream is closed automatically when the application terminates.


    Compile Listing [12-32](#A978-1-4842-1565-4_12_Chapter.html#FPar48) as follows:


    `javac DSDemo.java`


    Run the resulting application as follows:


    `java DSDemo .`


    I obtained the following output:


    `.\DSDemo.class`


    `.\DSDemo.java`'
