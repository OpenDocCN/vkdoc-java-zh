- fmt: "`newOutputStream(Path path, OpenOption... options)` opens the file identified\
    \ by `path`, returning a `java.io.OutputStream` to write to the file. The stream\
    \ will not be buffered and will be safe for access by multiple concurrent threads.\
    \ The `options` parameter specifies how the file is created or opened. When no\
    \ options are specified, this method works as if the `CREATE`, `TRUNCATE_EXISTING`,\
    \ and `WRITE` options are present. It throws `UnsupportedOperationException` when\
    \ an unsupported option (such as `READ`) is specified. It throws `IOException`\
    \ when an I/O error occurs.\n\nListing 12-27 describes an application that demonstrates\
    \ `newBufferedWriter(Path path, OpenOption... options)`.\n\n**Listing 12-27.**\
    \ Saving Web Page HTML to a Text File, Revisited\n\n```\nimport java.io.BufferedReader;\n\
    import java.io.BufferedWriter;\nimport java.io.InputStreamReader;\nimport java.io.IOException;\n\
    import java.net.URL;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
    \npublic class SavePage\n{\n   public static void main(String[] args) throws IOException\n\
    \   {\n      if (args.length != 1)\n      {\n         System.err.println(\"usage:\
    \ java SavePage url\");\n         return;\n      }\n      URL url = new URL(args[0]);\n\
    \      InputStreamReader isr = new InputStreamReader(url.openStream());\n    \
    \  BufferedReader br = new BufferedReader(isr);\n      BufferedWriter bw = Files.newBufferedWriter(Paths.get(\"\
    page.html\"));\n      String line;\n      while ((line = br.readLine()) != null)\n\
    \      {\n         bw.write(line, 0, line.length()); bw.newLine();\n      }\n\
    \      bw.close(); // You must close the file to write data to storage.\n   }\n\
    }\n```\n\nCompile Listing 12-27 (`javac SavePage.java`) and run the resulting\
    \ application (`java SavePage http://apress.com`). You should observe the same\
    \ result as you observed for the previous version of this application.\n\n###\
    \ Randomly Accessing Files\n\nChapter 3 introduced the `java.io.RandomAccessFile`\
    \ class for creating and/or opening regular files for random access. NIO.2 provides\
    \ an equivalent `java.nio.channels.SeekableByteChannel` interface.\n\n`SeekableByteChannel`\
    \ extends the `java.nio.channels.ByteChannel` interface and describes a byte channel\
    \ that maintains a current position and allows the position to be changed. Table\
    \ 12-1 presents its methods.\n\n**Table 12-1.** The Methods That Define a Seekable\
    \ Byte Channel\n\n| Method | Description |\n| --- | --- |\n| `long position()`\
    \ | Return this channel’s position, which is a non-negative count of bytes from\
    \ the beginning of the seekable entity to the current position. This method throws\
    \ `java.nio.channels.ClosedChannelException` when this channel is closed and `IOException`\
    \ when some other I/O error occurs. |\n| `SeekableByteChannel position(long newPosition)`\
    \ | Set this channel’s position to `newPosition`, a non-negative count of bytes\
    \ from the beginning of the entity. Setting the position to a value greater than\
    \ the current size is legal but doesn’t change the size of the entity. A later\
    \ attempt to read bytes at such a position immediately returns an end-of-file\
    \ indication. A later attempt to write bytes at the position causes the entity\
    \ to grow to accommodate the new bytes; the values of any bytes between the previous\
    \ end-of-file and the newly-written bytes are unspecified. Setting the channel’s\
    \ position isn’t recommended when connected to an entity that’s opened with the\
    \ `APPEND` option. When opened for append, the position is advanced to the end\
    \ before writing. This method throws `ClosedChannelException` when this channel\
    \ is closed, `IllegalArgumentException` when the new position is negative, and\
    \ `IOException` when some other I/O error occurs. |\n| `int read(ByteBuffer dst)`\
    \ | Read a sequence of bytes from this channel into the given buffer. Bytes are\
    \ read starting at this channel’s current position, and then the position is updated\
    \ with the number of bytes actually read. The number of bytes read is returned.\
    \ When end-of-stream is reached, `-1` is returned. This method throws `ClosedChannelException`\
    \ when this channel is closed; `java.nio.channels.AsynchronousCloseException`\
    \ when another thread closes this channel while a read operation is in progress;\
    \ `java.nio.channels.ClosedByInterruptException` when another thread interrupts\
    \ the current thread while the read operation is in progress, thereby closing\
    \ the channel and setting the current thread’s interrupt status; and `IOException`\
    \ when some other I/O error occurs. |\n| `long size()` | Return the current size\
    \ (in bytes) of the entity to which this channel is connected. This method throws\
    \ `ClosedChannelException` when this channel is closed and `IOException` when\
    \ some other I/O error occurs. |\n| `SeekableByteChannel truncate(long size)`\
    \ | Truncate the entity to which this channel is connected to `size`. If `size`\
    \ is less than the current size, the entity is truncated, discarding any bytes\
    \ beyond the new end. If `size` is greater than or equal to the current size,\
    \ the entity isn’t modified. In either case, when the current position is greater\
    \ than `size` the position is set to `size`. This method throws `java.nio.channels.NonWritableChannelException`\
    \ when this channel wasn’t opened for writing, `ClosedChannelException` when this\
    \ channel is closed, `IllegalArgumentException` when `size` is negative, and `IOException`\
    \ when some other I/O error occurs. |\n| `int write(ByteBuffer src)` | Write a\
    \ sequence of bytes to this channel from the given buffer. Bytes are written starting\
    \ at this channel’s current position, unless the channel is connected to an entity\
    \ that’s opened with the `APPEND` option, in which case the position is first\
    \ advanced to the end. The entity to which the channel is connected is grown,\
    \ when necessary, to accommodate the written bytes, and then the position is updated\
    \ with the number of bytes actually written. This method returns a count of the\
    \ bytes written to the channel. It throws `ClosedChannelException` when this channel\
    \ is closed; `AsynchronousCloseException` when another thread closes this channel\
    \ while the write operation is in progress; `ClosedByInterruptException` when\
    \ another thread interrupts the current thread while the write operation is in\
    \ progress, thereby closing the channel and setting the current thread’s interrupt\
    \ status; and `IOException` when some other I/O error occurs. |"
