  raw: '### What About AsynchronousFileChannel?


    `AsynchronousFileChannel`s don’t belong to groups. However, they are associated
    with a thread pool to which tasks are submitted, to handle I/O events and to dispatch
    to completion handlers that consume the results of I/O operations on the channel.


    The completion handler for an I/O operation initiated on a channel is guaranteed
    to be invoked by one of the threads in the thread pool, which ensures that the
    completion handler is run by a thread with the expected identity. If an I/O operation
    completes immediately and the initiating thread is itself a thread in the thread
    pool, the completion handler may be invoked directly by the initiating thread.


    When an asynchronous file channel is created without specifying a thread pool,
    the channel is associated with a system-dependent default thread pool that may
    be shared with other channels. The default thread pool is configured by the system
    properties defined by [`AsynchronousChannelGroup`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousChannelGroup.html#class%20in%20java.nio.channels)
    .


    An asynchronous file channel created by `AsynchronousFileChannel`’s `AsynchronousFileChannel
    open(Path file, OpenOption... options)` class method is associated with the default
    thread pool. You can associate a file channel with another thread pool by calling
    the [`AsynchronousFileChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#class%20in%20java.nio.channels)
    `open(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `file,` [`Set`](https://docs.oracle.com/javase/8/docs/api/java/util/Set.html#interface%20in%20java.util)
    `<? extends` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `> options,` [`ExecutorService`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ExecutorService.html#interface%20in%20java.util.concurrent)
    `executor,` [`FileAttribute`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/FileAttribute.html#interface%20in%20java.nio.file.attribute)
    `<?>... attrs)` class method. Here, `executor` identifies the desired thread pool.


    EXERCISES


    The following exercises are designed to test your understanding of [Chapter 13](#A978-1-4842-1565-4_13_Chapter.html)’s
    content:


    Define asynchronous channel.   Identify the two ways to initiate an I/O operation
    with an asynchronous channel.   True or false: After a channel is closed, further
    attempts to initiate asynchronous I/O operations complete immediately with cause
    `AsynchronousCloseException`.   Identify the methods declared by the `AsynchronousByteChannel`
    interface.   True or false: The [ByteBuffer](https://docs.oracle.com/javase/8/docs/api/java/nio/ByteBuffer.html#class%20in%20java.nio)
    object is safe for use by multiple concurrent threads.   Identify the class for
    reading, writing, and manipulating a file asynchronously.   True or false: An
    asynchronous file channel doesn’t have a current position within a file.   If
    you pass no options to `AsynchronousFileChannel`’s [AsynchronousFile​Channel](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#class%20in%20java.nio.channels)
    open([Path](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    file, [OpenOption](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)...
    options) method, what is this method’s default behavior?   How do you obtain an
    `AsynchronousServerSocketChannel` object or an `AsynchronousSocketChannel` object?
      Identify `AsynchronousServerSocketChannel’s` documented socket options.   After
    obtaining an `AsynchronousServerSocketChannel` object, what must you do before
    you can call either of its `accept()` methods?   After obtaining an `AsynchronousSocketChannel`
    object, what must you do before you can perform reads and writes?   How do you
    determine if an asynchronous socket channel is connected to an asynchronous server
    socket channel?   True or false: Asynchronous socket channels are safe for use
    by multiple concurrent threads.   What is the purpose of the `AsynchronousChannelGroup`
    class?   What does a group use for task submission?   Identify the system properties
    for configuring the default group.   Describe `AsynchronousChannelGroup`’s `shutDownNow()`
    method.   True or false: `AsynchronousFileChannels` belong to groups.   Write
    a Copy application that uses `AsynchronousFileChannel` to copy a source file to
    a destination file asynchronously.


    ## Summary


    Asynchronous I/O lets client code initiate an I/O operation and subsequently notifies
    the client when the operation is complete. The `AsynchronousChannel` interface
    describes an asynchronous channel that supports asynchronous I/O operations (reads,
    writes, and so on). An I/O operation is initiated by calling a method that returns
    a `Future` or requires a `CompletionHandler` argument.


    `CompletionHandler` declares a `completed()` method to consume the result of an
    operation when it completes successfully. It also declares a `failed()` method
    to report operation failure (in terms of an exception) and allow an application
    to take appropriate action.


    The `AsynchronousByteChannel` interface extends `AsynchronousChannel` and declares
    a pair of `read()` methods and a pair of `write()` methods. Each pair consists
    of a method that returns a `Future` and a method that requires a `CompletionHandler`
    argument.


    The abstract `AsynchronousFileChannel` class describes an asynchronous channel
    for reading, writing, and manipulating a file. The abstract `AsynchronousServerSocketChannel`
    class describes an asynchronous channel for stream-oriented listening sockets.
    Its counterpart channel for stream-oriented connecting sockets is described by
    the abstract `AsynchronousSocketChannel` class.


    The abstract `AsynchronousChannelGroup` class describes a grouping of asynchronous
    channels for the purpose of resource sharing. A group has an associated thread
    pool to which tasks are submitted, to handle I/O events and to dispatch to [completion
    handlers](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/CompletionHandler.html#interface%20in%20java.nio.channels)
    that consume the results of asynchronous operations performed on the group’s channels.


    `AsynchronousServerSocketChannel`s and `AsynchronousSocketChannel`s created via
    their noargument `open()` methods are bound to the default group. They can be
    bound to groups created from `AsynchronousChannelGroup`’s class methods by passing
    these group objects to their `open(AsynchronousChannelGroup)` methods.


    `AsynchronousFileChannel`s don’t belong to groups. However, they are associated
    with a default thread pool, which can be configured or replaced.


    [Chapter 14](#A978-1-4842-1565-4_14_Chapter.html) presents NIO.2’s completion
    of socket channel functionality.


    # 14. Completion of Socket Channel Functionality


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​14](http://dx.doi.org/10.1007/978-1-4842-1565-4_14))
    contains supplementary material, which is available to authorized users.


    Completion of socket channel functionality is JDK 7’s final contribution to NIO.2\.
    The `java.nio.channels` package’s `DatagramChannel`, `ServerSocketChannel`, and
    `SocketChannel` classes have been extended to support binding and option configuration.
    Also, channel-based multicasting is supported. This chapter wraps up the book
    by introducing you to these capabilities.'
  trans: '

    ### 那么 `AsynchronousFileChannel` 呢？


    `AsynchronousFileChannel` 不属于任何组。然而，它们与一个用于提交任务的线程池相关联，该线程池负责处理 I/O 事件，并分派给完成处理器，这些处理器会消费在通道上执行的
    I/O 操作的结果。


    在通道上发起的 I/O 操作的完成处理器保证由线程池中的某个线程调用，这确保了完成处理器由具有预期身份的线程运行。如果 I/O 操作立即完成，并且发起线程本身是线程池中的一个线程，那么完成处理器可能会由发起线程直接调用。


    当创建异步文件通道时，如果没有指定线程池，该通道会与一个系统相关的默认线程池关联，这个线程池可能与其他通道共享。默认线程池由 [`AsynchronousChannelGroup`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousChannelGroup.html#class%20in%20java.nio.channels)
    定义的系统属性进行配置。


    通过 `AsynchronousFileChannel` 的 `AsynchronousFileChannel open(Path file, OpenOption...
    options)` 类方法创建的异步文件通道与默认线程池关联。你可以通过调用 [`AsynchronousFileChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#class%20in%20java.nio.channels)
    的 `open(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `file,` [`Set`](https://docs.oracle.com/javase/8/docs/api/java/util/Set.html#interface%20in%20java.util)
    `<? extends` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `> options,` [`ExecutorService`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ExecutorService.html#interface%20in%20java.util.concurrent)
    `executor,` [`FileAttribute`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/FileAttribute.html#interface%20in%20java.nio.file.attribute)
    `<?>... attrs)` 类方法将文件通道与另一个线程池关联起来。在这里，`executor` 标识了所需的线程池。


    练习


    以下练习旨在测试你对第 13 章内容的理解：


    定义异步通道。   指出使用异步通道发起 I/O 操作的两种方式。   判断正误：通道关闭后，任何进一步发起异步 I/O 操作的尝试都会立即完成，并抛出 `AsynchronousCloseException`。
      指出 `AsynchronousByteChannel` 接口声明的方法。   判断正误：[ByteBuffer](https://docs.oracle.com/javase/8/docs/api/java/nio/ByteBuffer.html#class%20in%20java.nio)
    对象对于多个并发线程是安全的。   指出用于异步读取、写入和操作文件的类。   判断正误：异步文件通道在文件中没有当前位置。   如果你没有向 `AsynchronousFileChannel`
    的 [AsynchronousFile​Channel](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#class%20in%20java.nio.channels)
    open([Path](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    file, [OpenOption](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)...
    options) 方法传递任何选项，该方法的默认行为是什么？   如何获取 `AsynchronousServerSocketChannel` 对象或 `AsynchronousSocketChannel`
    对象？   指出 `AsynchronousServerSocketChannel` 文档中记录的套接字选项。   获取 `AsynchronousServerSocketChannel`
    对象后，在调用其任一 `accept()` 方法之前，你必须做什么？   获取 `AsynchronousSocketChannel` 对象后，在执行读写操作之前，你必须做什么？
      如何确定一个异步套接字通道是否连接到了一个异步服务器套接字通道？   判断正误：异步套接字通道对于多个并发线程是安全的。   `AsynchronousChannelGroup`
    类的用途是什么？   组使用什么来提交任务？   指出用于配置默认组的系统属性。   描述 `AsynchronousChannelGroup` 的 `shutDownNow()`
    方法。   判断正误：`AsynchronousFileChannel` 属于组。   编写一个 Copy 应用程序，使用 `AsynchronousFileChannel`
    异步地将源文件复制到目标文件。


    ## 总结


    异步 I/O 允许客户端代码发起一个 I/O 操作，并在操作完成时通知客户端。`AsynchronousChannel` 接口描述了一个支持异步 I/O 操作（如读取、写入等）的异步通道。I/O
    操作通过调用一个返回 `Future` 或需要一个 `CompletionHandler` 参数的方法来发起。


    `CompletionHandler` 声明了一个 `completed()` 方法，用于在操作成功完成时消费其结果。它还声明了一个 `failed()`
    方法，用于报告操作失败（以异常的形式）并允许应用程序采取适当的措施。


    `AsynchronousByteChannel` 接口扩展了 `AsynchronousChannel`，并声明了一对 `read()` 方法和一对 `write()`
    方法。每一对方法都包含一个返回 `Future` 的方法和一个需要 `CompletionHandler` 参数的方法。


    抽象类 `AsynchronousFileChannel` 描述了一个用于读取、写入和操作文件的异步通道。抽象类 `AsynchronousServerSocketChannel`
    描述了一个用于面向流的监听套接字的异步通道。其对应的用于面向流的连接套接字的通道由抽象类 `AsynchronousSocketChannel` 描述。


    抽象类 `AsynchronousChannelGroup` 描述了为资源共享目的而分组的异步通道。一个组有一个关联的线程池，用于提交任务，以处理 I/O
    事件并分派给[完成处理器](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/CompletionHandler.html#interface%20in%20java.nio.channels)，这些处理器消费在组内通道上执行的异步操作的结果。


    通过其无参 `open()` 方法创建的 `AsynchronousServerSocketChannel` 和 `AsynchronousSocketChannel`
    会绑定到默认组。它们可以通过将组对象传递给其 `open(AsynchronousChannelGroup)` 方法，绑定到由 `AsynchronousChannelGroup`
    的类方法创建的组。


    `AsynchronousFileChannel` 不属于任何组。然而，它们与一个默认线程池关联，该线程池可以被配置或替换。


    第 14 章 将介绍 NIO.2 中套接字通道功能的完善。


    # 14. 套接字通道功能的完善


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​14](http://dx.doi.org/10.1007/978-1-4842-1565-4_14))
    包含补充材料，可供授权用户使用。


    套接字通道功能的完善是 JDK 7 对 NIO.2 的最终贡献。`java.nio.channels` 包中的 `DatagramChannel`、`ServerSocketChannel`
    和 `SocketChannel` 类已得到扩展，以支持绑定和选项配置。此外，还支持基于通道的多播。本章通过向你介绍这些功能来结束本书。

    '
- fmt: '# Binding and Option Configuration


    NIO’s `DatagramChannel`, `ServerSocketChannel`, and `SocketChannel` classes don’t
    completely abstract a network socket. To bind into the channel’s socket, or to
    get/set socket options, you have to first retrieve the peer socket by invoking
    each class’s `socket()` method.


    This counterintuitive mix of socket channel and socket APIs exists because there
    wasn’t enough time to define a full socket channel API for the JDK 1.4 release.
    JDK 7 overcame this problem by introducing the `java.nio.channels.NetworkChannel`
    interface.


    `NetworkChannel` represents a channel to a network socket. This interface is implemented
    by `DatagramChannel`, `ServerSocketChannel`, `SocketChannel`, `java.nio.channels.AsynchronousServerSocketChannel`
    (see [Chapter 13](#A978-1-4842-1565-4_13_Chapter.html)), and `java.nio.channels.AsynchronousSocketChannel`
    (see [Chapter 13](#A978-1-4842-1565-4_13_Chapter.html)).


    Table [14-1](#A978-1-4842-1565-4_14_Chapter.html#Tab1) presents `NetworkChannel`’s
    methods.


    **Table 14-1.** The Methods that Define a Network Channel


    | Method | Description |

    | --- | --- |

    | `NetworkChannel bind(SocketAddress local)` | Bind this channel’s socket to a
    local address. Once an association is established, the socket remains bound until
    this channel is closed. If you pass `null` to `local`, the socket will be bound
    to an address that is assigned automatically. `bind()` returns this channel on
    success. Otherwise, it throws `java.nio.channels.AlreadyBoundException` when the
    socket is already bound, `java.nio.channels.UnsupportedAddressTypeException` when
    the type of the given address is not supported, `java.nio.channels.ClosedChannelException`
    when this channel is closed, and `java.io.IOException` when some other I/O error
    occurs. |

    | `SocketAddress getLocalAddress()` | Return the socket address to which this
    channel’s socket is bound. When this channel is bound to an Internet Protocol
    (IP) socket address, the return value from this method is of type `java.net.InetSocketAddress`.
    `getLocalAddress()` throws `ClosedChannelException` when this channel is closed
    and `IOException` when an I/O error occurs. |

    | `<T> T getOption(SocketOption<T> name)` | Return the value of the socket option
    identified by `name`. A return value of `null` might be valid for some socket
    options. `getOption()` throws `java.lang.UnsupportedOperationException` when this
    channel doesn’t support this socket option, `ClosedChannelException` when this
    channel is closed, and `IOException` when an I/O error occurs. |

    | `<T> NetworkChannel setOption(SocketOption<T> name, T value)` | Set the value
    of the socket option identified by `name` to `value`. Passing `null` to `value`
    might be valid for some socket options. `setOption()` returns this channel. It
    throws `UnsupportedOperationException` when this channel doesn’t support this
    socket option, `java.lang.IllegalArgumentException` when the value passed to `value`
    isn’t valid for this socket option, `ClosedChannelException` when this channel
    is closed, and `IOException` when an I/O error occurs. |

    | `Set<SocketOption<?>> supportedOptions()` | Return a set of the socket options
    supported by this channel. This method will continue to return the set of options
    even after this channel is closed. |


    The arguments passed to `getOption()`’s and `setOption()`’s `name` parameters
    must be of the `java.net.SocketOption` interface type. JDK 7 also added the `java.net.StandardSocketOptions`
    class, which implements this interface and enumerates various `SocketOption` constants,
    such as `SO_RCVBUF` (size of socket receive buffer) and `TCP_NODELAY` (disable
    the Nagle algorithm).'
