    their no-argument `open()` methods are bound to the default group. They can be
    bound to groups created from `AsynchronousChannelGroup`’s class methods by passing
    these group objects to their `open(AsynchronousChannelGroup)` methods.


    `AsynchronousFileChannel`s don’t belong to groups. However, they are associated
    with a default thread pool, which can be configured or replaced.


