    JDK 7 completed socket channel functionality by extending the `DatagramChannel`,
    `ServerSocketChannel`, and `SocketChannel` classes to support binding and option
    configuration. These capabilities are declared in the `NetworkChannel` interface,
    which these and other classes implement.


    JDK 7 also completed socket channel functionality by introducing support for channel-based
    multicasting. This support consists of `MulticastChannel` (an interface that extends
    `NetworkChannel`), the `MembershipKey` class, and an `open(ProtocolFamily)` method
    in the `DatagramChannel` class.


    Appendix A presents the answers to each chapter’s exercises.


    # Part V

    Appendices


    # Answers to Exercises


