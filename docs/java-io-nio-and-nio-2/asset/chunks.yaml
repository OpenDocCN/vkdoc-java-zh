- fmt: "# Asynchronous Channel Groups\n\nThe abstract `java.nio.channels.AsynchronousChannelGroup`\
    \ class describes a grouping of asynchronous channels for the purpose of resource\
    \ sharing. A group has an associated thread pool to which tasks are submitted,\
    \ to handle I/O events and to dispatch to [completion handlers](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/CompletionHandler.html#interface%20in%20java.nio.channels)\
    \ that consume the results of asynchronous operations performed on the group’s\
    \ channels.\n\n**Note:** The associated thread pool is owned by the group; termination\
    \ of the group results in the associated thread pool being shut down.\n\n`AsynchronousServerSocketChannel`s\
    \ and `AsynchronousSocketChannel`s belong to groups. When you create an `AsynchronousServerSocketChannel`\
    \ or an `AsynchronousSocketChannel` via the noargument `open()` method, the channel\
    \ is bound to the default group, which is the system-wide channel group that’s\
    \ automatically constructed and maintained by the Java virtual machine (JVM).\
    \ The default group has an associated thread pool that creates new threads as\
    \ needed. You can configure the default group by initializing the following system\
    \ properties at JVM startup:\n\n- `java.nio.channels.DefaultThreadPool.threadFactory`:\
    \ The value of this property is the fully-qualified name of a concrete `java.util.concurrent.ThreadFactory`\
    \ class. The class is loaded using the system classloader and instantiated. The\
    \ factory’s `newThread(Runnable r)` method is invoked to create each thread for\
    \ the default group’s thread pool. If the process to load and instantiate the\
    \ value of the property fails, an unspecified error is thrown during the construction\
    \ of the default group. (If the `ThreadFactory` for the default group is not configured,\
    \ the pooled threads of the default group are daemon threads.)\n- `java.nio.channels.DefaultThreadPool.initialSize`:\
    \ The value of `initialSize` specifies the initialize size of the default group’s\
    \ thread pool. If the string-based value cannot be parsed as an integer, it causes\
    \ an unspecified error to be thrown during the construction of the default group.\n\
    \nYou might prefer to define your own channel group because it gives you more\
    \ control over the threads that are used to service the I/O operations. Furthermore,\
    \ it provides the mechanisms to shut down threads and to await termination. You\
    \ would create your own asynchronous channel group by calling one of the following\
    \ class methods:\n\n- `AsynchronousChannelGroup.withCachedThreadPool(ExecutorService\
    \ executor, int initialSize)`: Create an asynchronous channel group with a given\
    \ thread pool (specified as a `java.util.concurrent.ExecutorService` object) that\
    \ creates new threads as needed.\n- `AsynchronousChannelGroup.withFixedThreadPool(int\
    \ nThreads, ThreadFactory threadFactory)`: Create an asynchronous channel group\
    \ with a fixed thread pool.\n- `AsynchronousChannelGroup.withThreadPool(ExecutorService\
    \ executor)`: Create an asynchronous channel group with a given thread pool (specified\
    \ as an `ExecutorService` object).\n\nThe following example creates a new channel\
    \ group that has a fixed pool of 20 threads. Each thread is constructed with the\
    \ default thread factory from the `java.util.concurrent.Executors` class:\n\n\
    ```\nAsynchronousChannelGroup group;\ngroup = AsynchronousChannelGroup.withFixedThreadPool(20,\n\
    \    Executors.defaultThreadFactory());\n```\n\nAfter creating a group, you can\
    \ bind an asynchronous server socket channel and an asynchronous socket channel\
    \ to the group by calling the following class methods in their respective classes:\n\
    \n- `AsynchronousServerSocketChannel.open(AsynchronousChannelGroup group)`\n-\
    \ `AsynchronousSocketChannel.open(AsynchronousChannelGroup group)`\n\nThe following\
    \ example creates an asynchronous server socket channel and an asynchronous socket\
    \ channel that are bound to the previously-created group:\n\n```\nAsynchronousServerSocketChannel\
    \ chServer;\nchServer = AsynchronousServerSocketChannel.open(group);\nAsynchronousSocketChannel\
    \ chClient = AsynchronousSocketChannel.open(group);\n```\n\n**Note:** When writing\
    \ a completion handler, it’s important to avoid operations that may block the\
    \ thread. The entire application could block when all threads are blocked. For\
    \ a custom or cached thread pool, the queue could grow very large and ultimately\
    \ result in an out-of-memory situation.\n\nYou’ll primarily instantiate `AsynchronousChannelGroup`\
    \ and bind your socket channels to this group for shutdown and termination. The\
    \ `void shutdown()` method initiates an orderly shutdown of a group. An orderly\
    \ shutdown marks the group as shutdown; attempting to construct a channel that\
    \ binds to the group results in `java.nio.channels.ShutdownChannelGroupException`.\
    \ Whether or not a group is shut down can be tested by calling the `boolean isShutdown()`\
    \ method.\n\nOnce shut down, the group terminates when all asynchronous channels\
    \ that are bound to the group are closed, all actively executing completion handlers\
    \ have run to completion, and resources used by the group are released. No attempt\
    \ is made to stop or interrupt threads that are executing completion handlers.\
    \ The `boolean isTerminated()` method is used to test if the group has terminated,\
    \ and the `boolean awaitTermination(long timeout, TimeUnit unit)` method is used\
    \ to block until the group has terminated.\n\nThe `void shutdownNow()` method\
    \ is used to initiate a forceful shutdown of the group. In addition to the actions\
    \ performed by an orderly shutdown, `shutdownNow()` closes all open channels in\
    \ the group as if by invoking each channel’s `close()` method.\n\nThe following\
    \ example demonstrates the aforementioned methods:\n\n```\n// Initiate an I/O\
    \ operation that isn’t satisfied.\nchannel.accept(null, completionHandler);\n\n\
    // After the operation has begun, the channel group is used to control\n// the\
    \ shutdown.\nif (!group.isShutdown())\n{\n    // After the group is shut down,\
    \ no more channels can be bound to it.\n    group.shutdown();\n}\n\nif (!group.isTerminated())\n\
    {\n    // Forcibly shut down the group. The channel is closed and the\n    //\
    \ accept operation aborts.\n    group.shutdownNow();\n}\n\n// The group should\
    \ be able to terminate; wait for 10 seconds maximum.\ngroup.awaitTermination(10,\
    \ TimeUnit.SECONDS);\n```"
  raw: '## Asynchronous Channel Groups


    The abstract `java.nio.channels.AsynchronousChannelGroup` class describes a grouping
    of asynchronous channels for the purpose of resource sharing. A group has an associated
    thread pool to which tasks are submitted, to handle I/O events and to dispatch
    to [completion handlers](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/CompletionHandler.html#interface%20in%20java.nio.channels)
    that consume the results of asynchronous operations performed on the group’s channels.


    Note


    The associated thread pool is owned by the group; termination of the group results
    in the associated thread pool being shut down.


    `AsynchronousServerSocketChannel`s and `AsynchronousSocketChannel`s belong to
    groups. When you create an `AsynchronousServerSocketChannel` or an `AsynchronousSocketChannel`
    via the noargument `open()` method, the channel is bound to the default group,
    which is the system-wide channel group that’s automatically constructed and maintained
    by the Java virtual machine (JVM). The default group has an associated thread
    pool that creates new threads as needed. You can configure the default group by
    initializing the following system properties at JVM startup:


    *   `java.nio.channels.DefaultThreadPool.` `threadFactory`: The value of this
    property is the fully-qualified name of a concrete `java.util.concurrent.` [`ThreadFactory`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ThreadFactory.html#interface%20in%20java.util.concurrent)
    class. The class is loaded using the system classloader and instantiated. The
    factory’s [`newThread`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ThreadFactory.html#newThread-java.lang.Runnable-)
    `(Runnable r)` method is invoked to create each thread for the default group’s
    thread pool. If the process to load and instantiate the value of the property
    fails, an unspecified error is thrown during the construction of the default group.
    (If the [`ThreadFactory`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ThreadFactory.html#interface%20in%20java.util.concurrent)
    for the default group is not configured, the pooled threads of the default group
    are daemon threads.)

    *   `java.nio.channels.DefaultThreadPool.` `initialSize`: The value of `initialSize`
    specifies the initialize size of the default group’s thread pool. If the string-based
    value cannot be parsed as an integer, it causes an unspecified error to be thrown
    during the construction of the default group.


    You might prefer to define your own channel group because it gives you more control
    over the threads that are used to service the I/O operations. Furthermore, it
    provides the mechanisms to shut down threads and to await termination. You would
    create your own asynchronous channel group by calling one of the following class
    methods:


    *   `AsynchronousChannelGroupwithCachedThreadPool` `(ExecutorService executor,
    int initialSize)`: Create an asynchronous channel group with a given thread pool
    (specified as a `java.util.concurrent.ExecutorService` object) that creates new
    threads as needed.

    *   `AsynchronousChannelGroup` `withFixedThreadPool` `(int nThreads, ThreadFactory
    threadFactory)`: Create an asynchronous channel group with a fixed thread pool.

    *   `AsynchronousChannelGroup` `withThreadPool` `(ExecutorService executor)`:
    Create an asynchronous channel group with a given thread pool (specified as an
    `ExecutorService` object).


    The following example creates a new channel group that has a fixed pool of 20
    threads. Each thread is constructed with the default thread factory from the `java.util.concurrent.Executors`
    class:


    `AsynchronousChannelGroup group;`


    `group = AsynchronousChannelGroup.`


    `withFixedThreadPool(20,`


    `Executors.defaultThreadFactory());`


    After creating a group, you can bind an asynchronous server socket channel and
    an asynchronous socket channel to the group by calling the following class methods
    in their respective classes:


    *   `AsynchronousServerSocketChannel open(AsynchronousChannelGroup group)`

    *   `AsynchronousSocketChannel open(AsynchronousChannelGroup group)`


    The following example creates an asynchronous server socket channel and an asynchronous
    socket channel that are bound to the previously-created group:


    `AsynchronousServerSocketChannel chServer;`


    `chServer = AsynchronousServerSocketChannel.open(group);`


    `AsynchronousSocketChannel chClient = AsynchronousSocketChannel.open(group);`


    Note


    When writing a completion handler, it’s important to avoid operations that may
    block the thread. The entire application could block when all threads are blocked.
    For a custom or cached thread pool, the queue could grow very large and ultimately
    result in an out-of-memory situation.


    You’ll primarily instantiate `AsynchronousChannelGroup` and bind your socket channels
    to this group for shutdown and termination. The `void` `shutdown()` method initiates
    an orderly shutdown of a group. An orderly shutdown marks the group as shutdown;
    attempting to construct a channel that binds to the group results in `java.nio.channels.`
    [`ShutdownChannelGroupException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/ShutdownChannelGroupException.html#class%20in%20java.nio.channels)
    . Whether or not a group is shut down can be tested by calling the `boolean isShutdown()`
    method.


    Once shut down, the group terminates when all asynchronous channels that are bound
    to the group are closed, all actively executing completion handlers have run to
    completion, and resources used by the group are released. No attempt is made to
    stop or interrupt threads that are executing completion handlers. The `boolean
    isTerminated()` method is used to test if the group has terminated, and the `boolean
    awaitTermination(long timeout, TimeUnit unit)` method is used to block until the
    group has terminated.


    The `void` `shutdownNow()` method is used to initiate a forceful shutdown of the
    group. In addition to the actions performed by an orderly shutdown, `shutdownNow()`
    closes all open channels in the group as if by invoking each channel’s `close()`
    method.


    The following example demonstrates the aforementioned methods:


    `// Initiate an I/O operation that isn’t satisfied.`


    `channel.accept(null, completionHandler);`


    `// After the operation has begun, the channel group is used to control`


    `// the shutdown.`


    `if (!group.isShutdown())`


    `{`


    `// After the group is shut down, no more channels can be bound to it.`


    `group.shutdown();`


    `}`


    `if (!group.isTerminated())`


    `{`


    `// Forcibly shut down the group. The channel is closed and the`


    `// accept operation aborts.`


    `group.shutdownNow();`


    `}`


    `// The group should be able to terminate; wait for 10 seconds maximum.`


    `group.awaitTermination(10, TimeUnit.SECONDS);`'
  trans: '

    ## 异步通道组


    抽象类 `java.nio.channels.AsynchronousChannelGroup` 描述了一组用于资源共享的异步通道。一个组拥有一个关联的线程池，任务被提交到该线程池，用于处理
    I/O 事件并分派给[完成处理器](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/CompletionHandler.html#interface%20in%20java.nio.channels)，这些处理器消费在该组通道上执行的异步操作的结果。


    注意


    关联的线程池归该组所有；组的终止会导致关联的线程池被关闭。


    `AsynchronousServerSocketChannel` 和 `AsynchronousSocketChannel` 属于组。当你通过无参的 `open()`
    方法创建 `AsynchronousServerSocketChannel` 或 `AsynchronousSocketChannel` 时，该通道会绑定到默认组，这是一个由
    Java 虚拟机（JVM）自动构建和维护的系统级通道组。默认组有一个关联的线程池，该线程池会根据需要创建新线程。你可以通过在 JVM 启动时初始化以下系统属性来配置默认组：


    *   `java.nio.channels.DefaultThreadPool.` `threadFactory`：此属性的值是一个具体的 `java.util.concurrent.`
    [`ThreadFactory`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ThreadFactory.html#interface%20in%20java.util.concurrent)
    类的完全限定名。该类通过系统类加载器加载并实例化。工厂的 [`newThread`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ThreadFactory.html#newThread-java.lang.Runnable-)
    `(Runnable r)` 方法被调用来为默认组的线程池创建每个线程。如果加载和实例化该属性值的过程失败，则在构建默认组期间会抛出一个未指定的错误。（如果未配置默认组的
    [`ThreadFactory`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ThreadFactory.html#interface%20in%20java.util.concurrent)，则默认组的池化线程是守护线程。）

    *   `java.nio.channels.DefaultThreadPool.` `initialSize`：`initialSize` 的值指定了默认组线程池的初始大小。如果基于字符串的值无法解析为整数，则会在构建默认组期间导致抛出未指定的错误。


    你可能更倾向于定义自己的通道组，因为它能让你对用于服务 I/O 操作的线程拥有更多控制权。此外，它还提供了关闭线程和等待终止的机制。你可以通过调用以下类方法之一来创建自己的异步通道组：


    *   `AsynchronousChannelGroupwithCachedThreadPool` `(ExecutorService executor,
    int initialSize)`：使用一个给定的线程池（指定为 `java.util.concurrent.ExecutorService` 对象）创建一个异步通道组，该线程池会根据需要创建新线程。

    *   `AsynchronousChannelGroup` `withFixedThreadPool` `(int nThreads, ThreadFactory
    threadFactory)`：使用一个固定线程池创建一个异步通道组。

    *   `AsynchronousChannelGroup` `withThreadPool` `(ExecutorService executor)`：使用一个给定的线程池（指定为
    `ExecutorService` 对象）创建一个异步通道组。


    以下示例创建了一个新的通道组，该组拥有一个包含 20 个线程的固定线程池。每个线程都使用来自 `java.util.concurrent.Executors`
    类的默认线程工厂构造：


    `AsynchronousChannelGroup group;`


    `group = AsynchronousChannelGroup.`


    `withFixedThreadPool(20,`


    `Executors.defaultThreadFactory());`


    创建组之后，你可以通过调用各自类中的以下类方法，将异步服务器套接字通道和异步套接字通道绑定到该组：


    *   `AsynchronousServerSocketChannel open(AsynchronousChannelGroup group)`

    *   `AsynchronousSocketChannel open(AsynchronousChannelGroup group)`


    以下示例创建了一个异步服务器套接字通道和一个异步套接字通道，它们都绑定到先前创建的组：


    `AsynchronousServerSocketChannel chServer;`


    `chServer = AsynchronousServerSocketChannel.open(group);`


    `AsynchronousSocketChannel chClient = AsynchronousSocketChannel.open(group);`


    注意


    在编写完成处理器时，务必避免可能阻塞线程的操作。当所有线程都被阻塞时，整个应用程序可能会阻塞。对于自定义或可缓存的线程池，队列可能会变得非常大，最终导致内存不足的情况。


    你主要会实例化 `AsynchronousChannelGroup` 并将你的套接字通道绑定到该组，以便进行关闭和终止操作。`void` `shutdown()`
    方法启动一个组的有序关闭。有序关闭会将组标记为已关闭；尝试构造一个绑定到该组的通道会导致 `java.nio.channels.` [`ShutdownChannelGroupException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/ShutdownChannelGroupException.html#class%20in%20java.nio.channels)
    异常。可以通过调用 `boolean isShutdown()` 方法来测试组是否已关闭。


    一旦关闭，当所有绑定到该组的异步通道都已关闭、所有正在积极执行的完成处理器都已运行完毕、并且该组使用的资源已被释放时，该组即终止。不会尝试停止或中断正在执行完成处理器的线程。`boolean
    isTerminated()` 方法用于测试组是否已终止，`boolean awaitTermination(long timeout, TimeUnit
    unit)` 方法用于阻塞直到组终止。


    `void` `shutdownNow()` 方法用于启动组的强制关闭。除了有序关闭执行的操作外，`shutdownNow()` 还会关闭组中所有打开的通道，就像调用每个通道的
    `close()` 方法一样。


    以下示例演示了上述方法：


    `// 启动一个不会完成的 I/O 操作。`


    `channel.accept(null, completionHandler);`


    `// 操作开始后，使用通道组来控制关闭。`


    `if (!group.isShutdown())`


    `{`


    `// 组关闭后，不能再有通道绑定到它。`


    `group.shutdown();`


    `}`


    `if (!group.isTerminated())`


    `{`


    `// 强制关闭组。通道被关闭，accept 操作中止。`


    `group.shutdownNow();`


    `}`


    `// 组应该能够终止；最多等待 10 秒。`


    `group.awaitTermination(10, TimeUnit.SECONDS);`

    '
- fmt: '### What About `AsynchronousFileChannel`?


    `AsynchronousFileChannel`s don’t belong to groups. However, they are associated
    with a thread pool to which tasks are submitted, to handle I/O events and to dispatch
    to completion handlers that consume the results of I/O operations on the channel.


    The completion handler for an I/O operation initiated on a channel is guaranteed
    to be invoked by one of the threads in the thread pool, which ensures that the
    completion handler is run by a thread with the expected identity. If an I/O operation
    completes immediately and the initiating thread is itself a thread in the thread
    pool, the completion handler may be invoked directly by the initiating thread.


    When an asynchronous file channel is created without specifying a thread pool,
    the channel is associated with a system-dependent default thread pool that may
    be shared with other channels. The default thread pool is configured by the system
    properties defined by [`AsynchronousChannelGroup`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousChannelGroup.html#class%20in%20java.nio.channels).


    An asynchronous file channel created by `AsynchronousFileChannel`’s `AsynchronousFileChannel.open(Path
    file, OpenOption... options)` class method is associated with the default thread
    pool. You can associate a file channel with another thread pool by calling the
    [`AsynchronousFileChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#class%20in%20java.nio.channels)
    `open(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `file,` [`Set`](https://docs.oracle.com/javase/8/docs/api/java/util/Set.html#interface%20in%20java.util)
    `<? extends` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `> options,` [`ExecutorService`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/ExecutorService.html#interface%20in%20java.util.concurrent)
    `executor,` [`FileAttribute`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/FileAttribute.html#interface%20in%20java.nio.file.attribute)
    `<?>... attrs)` class method. Here, `executor` identifies the desired thread pool.


    ### EXERCISES


    The following exercises are designed to test your understanding of [Chapter 13](#A978-1-4842-1565-4_13_Chapter.html)’s
    content:


    - Define asynchronous channel.

    - Identify the two ways to initiate an I/O operation with an asynchronous channel.

    - True or false: After a channel is closed, further attempts to initiate asynchronous
    I/O operations complete immediately with cause `AsynchronousCloseException`.

    - Identify the methods declared by the `AsynchronousByteChannel` interface.

    - True or false: The [`ByteBuffer`](https://docs.oracle.com/javase/8/docs/api/java/nio/ByteBuffer.html#interface%20in%20java.nio)
    object is safe for use by multiple concurrent threads.

    - Identify the class for reading, writing, and manipulating a file asynchronously.

    - True or false: An asynchronous file channel doesn’t have a current position
    within a file.

    - If you pass no options to `AsynchronousFileChannel`’s [`AsynchronousFileChannel.open(Path
    file, OpenOption... options)`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#open-java.nio.file.Path-java.nio.file.OpenOption...-)
    method, what is this method’s default behavior?

    - How do you obtain an `AsynchronousServerSocketChannel` object or an `AsynchronousSocketChannel`
    object?

    - Identify `AsynchronousServerSocketChannel`’s documented socket options.

    - After obtaining an `AsynchronousServerSocketChannel` object, what must you do
    before you can call either of its `accept()` methods?

    - After obtaining an `AsynchronousSocketChannel` object, what must you do before
    you can perform reads and writes?

    - How do you determine if an asynchronous socket channel is connected to an asynchronous
    server socket channel?

    - True or false: Asynchronous socket channels are safe for use by multiple concurrent
    threads.

    - What is the purpose of the `AsynchronousChannelGroup` class?

    - What does a group use for task submission?

    - Identify the system properties for configuring the default group.

    - Describe `AsynchronousChannelGroup`’s `shutDownNow()` method.

    - True or false: `AsynchronousFileChannel`s belong to groups.

    - Write a Copy application that uses `AsynchronousFileChannel` to copy a source
    file to a destination file asynchronously.


    ## Summary


    Asynchronous I/O lets client code initiate an I/O operation and subsequently notifies
    the client when the operation is complete. The `AsynchronousChannel` interface
    describes an asynchronous channel that supports asynchronous I/O operations (reads,
    writes, and so on). An I/O operation is initiated by calling a method that returns
    a `Future` or requires a `CompletionHandler` argument.


    `CompletionHandler` declares a `completed()` method to consume the result of an
    operation when it completes successfully. It also declares a `failed()` method
    to report operation failure (in terms of an exception) and allow an application
    to take appropriate action.


    The `AsynchronousByteChannel` interface extends `AsynchronousChannel` and declares
    a pair of `read()` methods and a pair of `write()` methods. Each pair consists
    of a method that returns a `Future` and a method that requires a `CompletionHandler`
    argument.


    The abstract `AsynchronousFileChannel` class describes an asynchronous channel
    for reading, writing, and manipulating a file. The abstract `AsynchronousServerSocketChannel`
    class describes an asynchronous channel for stream-oriented listening sockets.
    Its counterpart channel for stream-oriented connecting sockets is described by
    the abstract `AsynchronousSocketChannel` class.


    The abstract `AsynchronousChannelGroup` class describes a grouping of asynchronous
    channels for the purpose of resource sharing. A group has an associated thread
    pool to which tasks are submitted, to handle I/O events and to dispatch to [completion
    handlers](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/CompletionHandler.html#interface%20in%20java.nio.channels)
