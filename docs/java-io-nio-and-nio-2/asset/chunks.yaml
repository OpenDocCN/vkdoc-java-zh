    当反序列化一个已序列化的对象时，无法保证相同的类仍然存在（例如，某个实例字段可能已被删除）。在反序列化期间，当此机制检测到反序列化对象与其类之间存在差异时，会导致
    `readObject()` 抛出 `java.io.InvalidClassException`——`IOException` 类的间接子类。


    每个序列化对象都有一个标识符。反序列化机制会将正在反序列化的对象的标识符与其类的序列化标识符（所有可序列化的类都会自动获得唯一标识符，除非它们显式指定了自己的标识符）进行比较，并在检测到不匹配时导致抛出
    `InvalidClassException`。


    也许你向一个类添加了一个实例字段，并且你希望反序列化机制将该实例字段设置为默认值，而不是让 `readObject()` 抛出 `InvalidClassException`
    实例。（下次序列化该对象时，新字段的值将被写出。）


    你可以通过向该类添加 `static final long serialVersionUID = long integer value;` 声明来避免抛出
    `InvalidClassException` 实例。`long integer value` 必须是唯一的，并被称为流唯一标识符（SUID）。


    在反序列化期间，JVM 会将反序列化对象的 SUID 与其类的 SUID 进行比较。如果它们匹配，当遇到兼容的类更改（例如添加一个实例字段）时，`readObject()`
    将不会抛出 `InvalidClassException`。但是，当遇到不兼容的类更改（例如更改实例字段的名称或类型）时，它仍会抛出此异常。


    注意


    每当你以某种方式更改一个类时，都必须计算一个新的 SUID 并将其分配给 `serialVersionUID`。


    JDK 提供了一个 `serialver` 工具用于计算 SUID。例如，要为清单 4-9 的 `Employee` 类生成一个 SUID，请切换到包含 `Employee.class`
    的目录并执行以下命令：


    `serialver Employee`


