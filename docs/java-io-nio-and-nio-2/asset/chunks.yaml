  raw: '## Revisiting Standard I/O


    Java supports standard I/O. You input data items from the standard input stream
    by making `System.in.read()` method calls, you output data items to the standard
    output stream by making `System.out.print()` and `System.out.println()` method
    calls, and you output data items to the standard error stream by making `System.err.print()`
    and `System.err.println()` method calls.


    `System.in`, `System.out`, and `System.err` are formally described by the following
    class fields in the `System` class:


    *   `public static final InputStream in`

    *   `public static final PrintStream out`

    *   `public static final PrintStream err`


    These fields contain references to `InputStream` and `PrintStream` objects that
    represent the standard input, standard output, and standard error streams.


    When you invoke `System.in.read()`, the input is originating from the source identified
    by the `InputStream` instance assigned to `in`. Similarly, when you invoke `System.out.print()`
    or `System.err.println()`, the output is being sent to the destination identified
    by the `PrintStream` instance assigned to `out` or `err`, respectively.


    Java initializes `in` to refer to the keyboard or a file when the standard input
    stream is redirected to the file. Similarly, Java initializes `out`/`err` to refer
    to the screen or a file when the standard output/error stream is redirected to
    the file. You can programmatically specify the input source, output destination,
    and error destination by calling the following `System` class methods:


    *   `void setIn(InputStream in)`

    *   `void setOut(PrintStream out)`

    *   `void setErr(PrintStream err)`


    Listing [4-14](#A978-1-4842-1565-4_4_Chapter.html#FPar39) presents a `RedirectIO`
    application that shows you how to use these methods to programmatically redirect
    the standard input, standard output, and standard error destinations.


    Listing 4-14. Programmatically Specifying the Standard Input Source and Standard
    Output/Error Destinations


    `import java.io.FileInputStream;`


    `import java.io.IOException;`


    `import java.io.PrintStream;`


    `public class RedirectIO`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 3)`


    `{`


    `System.err.println("usage: java RedirectIO stdinfile " +`


    `"stdoutfile stderrfile");`


    `return;`


    `}`


    `System.setIn(new FileInputStream(args[0]));`


    `System.setOut(new PrintStream(args[1]));`


    `System.setErr(new PrintStream(args[2]));`


    `int ch;`


    `while ((ch = System.in.read()) != -1)`


    `System.out.print((char) ch);`


    `System.err.println("Redirected error output");`


    `}`


    `}`


    Listing [4-14](#A978-1-4842-1565-4_4_Chapter.html#FPar39) lets you specify (via
    command-line arguments) the name of a file from which `System.in.read()` obtains
    its content as well as the names of the files to which `System.out.print()` and
    `System.err.println()` send their content. It then proceeds to copy standard input
    to standard output and then demonstrates outputting content to standard error.


    `new FileInputStream(args[0])` provides access to the input sequence of bytes
    that is stored in the file identified by `args[0]`. Similarly, `new PrintStream(args[1])`
    provides access to the file identified by `args[1]`, which will store the output
    sequence of bytes, and `new PrintStream(args[2])` provides access to the file
    identified by `args[2]`, which will store the error sequence of bytes.


    Compile Listing [4-14](#A978-1-4842-1565-4_4_Chapter.html#FPar39) as follows:


    `javac RedirectIO.java`


    Run the resulting application as follows:


    `java RedirectIO RedirectIO.java out.txt err.txt`


    This command line produces no visual output on the screen. Instead, it copies
    the contents of `RedirectIO.java` to `out.txt`. It also stores `Redirected error
    output` in `err.txt`.


    EXERCISES


    The following exercises are designed to test your understanding of [Chapter 4](#A978-1-4842-1565-4_4_Chapter.html)’s
    content:


    What is a stream?   What is the purpose of `OutputStream`’s `flush()` method?
      True or false: `OutputStream`’s `close()` method automatically flushes the output
    stream.   What is the purpose of `InputStream`’s `mark(int)` and `reset()` methods?
      How would you access a copy of a `ByteArrayOutputStream` instance’s internal
    byte array?   True or false: `FileOutputStream` and `FileInputStream` provide
    internal buffers to improve the performance of write and read operations.   Why
    would you use `PipedOutputStream` and `PipedInputStream`?   Define filter stream.
      What does it mean for two streams to be chained together?   How do you improve
