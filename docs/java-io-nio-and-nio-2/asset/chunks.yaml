    `PartsDB` 首先声明了一些常量，用于标识字符串和 32 位整数字段的长度。然后，它声明了一个常量，用于以字节为单位计算记录长度。该计算考虑到了文件中一个字符占用两个字节的事实。


    这些常量之后是一个名为 `raf` 的字段，其类型为 `RandomAccessFile`。在随后的构造函数中，该字段被赋值为 `RandomAccessFile`
    类的一个实例，该构造函数由于使用了 `"rw"` 参数，会创建/打开一个新文件或打开一个现有文件。


    接下来，`PartsDB` 声明了 `append()`、`close()`、`numRecs()`、`select()` 和 `update()` 方法。这些方法分别用于向文件追加一条记录、关闭文件、返回文件中的记录数、选择并返回特定记录，以及更新特定记录：


    *   `append()` 方法首先调用 `length()` 和 `seek()`。这样做是为了确保在调用私有的 `write()` 方法写入一条包含该方法参数的记录之前，文件指针位于文件末尾。

    *   `RandomAccessFile` 的 `close()` 方法可能抛出 `IOException`。由于这种情况很少发生，我选择在 `PartDB`
    的 `close()` 方法中处理此异常，这保持了该方法签名的简洁性。但是，当发生 `IOException` 时，我会打印一条消息。

    *   `numRecs()` 方法返回文件中的记录数。这些记录的编号从 0 开始，到 `numRecs() - 1` 结束。`select()` 和 `update()`
    方法都会验证其 `recno` 参数是否在此范围内。

    *   `select()` 方法调用私有的 `read()` 方法，以嵌套类 `Part` 的实例形式返回由 `recno` 标识的记录。`Part` 的构造函数将
    `Part` 对象初始化为记录的字段值，其 getter 方法返回这些值。

    *   `update()` 方法同样简单。与 `select()` 一样，它首先将文件指针定位到由 `recno` 标识的记录的起始位置。与 `append()`
    一样，它调用 `write()` 来写出其参数，但替换的是记录而不是添加一条。


    记录通过私有的 `write()` 方法写入。由于字段必须有精确的大小，`write()` 会在右侧用空格填充比字段大小短的基于 `String` 的值，并在需要时将这些值截断到字段大小。


    记录通过私有的 `read()` 方法读取。`read()` 在将基于 `String` 的字段值保存到 `Part` 对象之前会移除填充。


    `PartsDB` 本身是无用的。你需要一个应用程序来试验这个类，而清单 3-2 满足了这一要求。


