    instantiates `Employee` and serializes this instance via `writeObject()` to `employee.dat`.
    It then deserializes this instance from this file via `readObject()` and invokes
    the instance’s `getName()` and `getAge()` methods.


    Compile Listings [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23) and [4-10](#A978-1-4842-1565-4_4_Chapter.html#FPar28)
    as follows:


