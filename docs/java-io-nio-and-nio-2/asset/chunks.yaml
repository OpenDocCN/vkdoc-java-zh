    你可以通过调用每个抽象类的两个 `open()` 方法之一来获取 `AsynchronousServerSocketChannel` 对象或 `AsynchronousSocketChannel`
    对象。`AsynchronousServerSocketChannel` 文档中记录的套接字选项是 `SO_RCVBUF` 和 `SO_REUSEADDR`。


