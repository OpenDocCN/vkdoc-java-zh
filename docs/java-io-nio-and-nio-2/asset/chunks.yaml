    ## 网络接口


    `NetworkInterface` 类根据名称（例如 `le0`）和分配给此接口的 IP 地址列表来表示网络接口。尽管网络接口通常在物理网卡上实现，但它也可以在软件中实现；例如，回环接口（对于测试客户端很有用）。


    注意


    网络接口是计算机与私有或公共网络之间的互连点。它通常是一个网络接口卡（NIC），但不需要物理形态。相反，它可以在软件中实现。例如，回环接口（IPv4 为 127.0.0.1，IPv6
    为 ::1）不是一个物理设备，而是一个模拟网络接口的软件。回环接口常用于测试环境。


