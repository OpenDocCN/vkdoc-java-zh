    `copy(Path source, Path target, CopyOption... options)` copies a `source` path
    to a `target` path adhering to the specified copy `options`. By default, the copy
    operation fails when the `target` exists or is a symbolic link. However, when
    the `source` and `target` are the same, the method will complete without performing
    a copy.


    There are a few additional items to note:


    *   Attributes will not necessarily be copied to the `target`.

    *   When symbolic links are supported and the `source` is a symbolic link, the
    final target of the link is copied.

    *   When the `source` is a directory, `copy()` creates an empty directory in the
    `target` location (directory entries are not copied).


    You may specify the following copy options:


    *   `COPY_ATTRIBUTES`: Attempt to copy the attributes associated with this path
    to the `target`. The exact attributes that are copied are file system-dependent
    and therefore unspecified. Minimally, `lastModifiedTime` is copied to the `target`
    when supported by both the `source` and `target` file stores. Note that copying
    timestamps may result in precision loss.

    *   `NOFOLLOW_LINKS`: Symbolic links are not followed. When the path is a symbolic
    link, the symbolic link itself and not the target of the link is copied. It’s
    implementation-specific as to whether attributes can be copied to the new link.
    In other words, `COPY_ATTRIBUTES` may be ignored when copying a symbolic link.

    *   `REPLACE_EXISTING`: When the `target` exists, the `target` is replaced unless
    it’s a nonempty directory. When the `target` exists and is a symbolic link, the
    symbolic link itself and not the target of the link is replaced.


    This method returns the `target Path` object. It throws `UnsupportedOperationException`
    when `options` includes an unsupported copy option, `IOException` when an I/O
    error occurs, `FileAlreadyExistsException` when the `target` exists but cannot
    be replaced because the `REPLACE_EXISTING` option was not specified, and `DirectoryNotEmptyException`
    when `REPLACE_EXISTING` was specified but the path cannot be replaced because
    it’s a nonempty directory.


