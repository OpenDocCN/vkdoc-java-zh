    `36`


    There’s no guarantee that the same class will exist when a serialized object is
    deserialized (perhaps an instance field has been deleted). During deserialization,
    this mechanism causes `readObject()` to throw `java.io.InvalidClassException`—an
    indirect subclass of the `IOException` class—when it detects a difference between
    the deserialized object and its class.


    Every serialized object has an identifier. The deserialization mechanism compares
    the identifier of the object being deserialized with the serialized identifier
    of its class (all serializable classes are automatically given unique identifiers
    unless they explicitly specify their own identifiers) and causes `InvalidClassException`
    to be thrown when it detects a mismatch.


    Perhaps you’ve added an instance field to a class, and you want the deserialization
    mechanism to set the instance field to a default value rather than have `readObject()`
    throw an `InvalidClassException` instance. (The next time you serialize the object,
    the new field’s value will be written out.)


    You can avoid the thrown `InvalidClassException` instance by adding a `static
    final long serialVersionUID = long integer value;` declaration to the class. The
    `long integer value` must be unique and is known as a stream unique identifier
    (SUID).


    During deserialization, the JVM will compare the deserialized object’s SUID to
    its class’s SUID. If they match, `readObject()` will not throw `InvalidClassException`
    when it encounters a compatible class change (such as adding an instance field).
    However, it will still throw this exception when it encounters an incompatible
    class change (such as changing an instance field’s name or type).


    Note


    Whenever you change a class in some fashion, you must calculate a new SUID and
    assign it to `serialVersionUID`.


    The JDK provides a `serialver` tool for calculating the SUID. For example, to
    generate an SUID for Listing [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23)’s
    `Employee` class, change to the directory containing `Employee.class` and execute
