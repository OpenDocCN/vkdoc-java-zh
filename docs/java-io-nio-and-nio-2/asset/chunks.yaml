- fmt: "#### Exploring Server Socket Channels\n\n`ServerSocketChannel` is the simplest\
    \ of the three socket channel classes. This class includes the following methods:\n\
    \n- `static ServerSocketChannel open()`: Attempt to open a server-socket channel,\
    \ which is initially unbound; it must be bound to a specific address via one of\
    \ its peer socket’s `bind()` methods before connections can be accepted. If the\
    \ channel cannot be opened, `IOException` is thrown.\n- `ServerSocket socket()`:\
    \ Return the peer `ServerSocket` instance associated with this server socket channel.\n\
    - `SocketChannel accept()`: Accept the connection made to this channel’s socket.\
    \ If this channel is nonblocking, `accept()` immediately returns `null` when there\
    \ are no pending connections or returns a socket channel that represents the connection.\
    \ Otherwise, when the channel is blocking, `accept()` blocks indefinitely until\
    \ a new connection is available or an I/O error occurs. The socket channel returned\
    \ by `accept()` is blocking regardless of whether the server socket channel is\
    \ blocking or nonblocking. This method throws `ClosedChannelException` when the\
    \ server socket channel is closed, `AsynchronousCloseException` when another thread\
    \ closes this server socket channel while the accept operation is in progress,\
