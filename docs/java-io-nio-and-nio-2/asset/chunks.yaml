    system isn’t accessible.


    ### Normalization, Relativization, and Resolution


    `Path` declares several methods to remove path redundancies, to create a relative
    path between two paths, and to resolve (join) two paths:


    *   `Path normalize()`

    *   `Path relativize(Path other)`

    *   `Path resolve(Path other)`

    *   `Path resolve(String other)`


    `normalize()` is useful for removing redundancies from a path. For example, `reports/./2015/jan`
    includes the redundant “.” (current directory) element. When normalized, this
    path becomes the shorter `reports/2015/jan`.


    `relativize()` creates a relative path between two paths. For example, given current
    directory `jan` in the `reports/2015/jan` hierarchy, the relative path to navigate
    to `reports/2016/mar` is `../../2016/mar`.


    `resolve()` is the inverse of `relativize()`. It lets you join a partial path
    (a path without a root element) to another path. For example, resolving `apr`
    against `reports/2015` results in `reports/2015/apr`.


    Furthermore, `Path` declares the following methods to resolve a path string against
    the current path’s parent path:


    *   `Path resolveSibling(Path other)`

    *   `Path resolveSibling(String other)`


    I’ve created an application that demonstrates these methods. Listing [12-5](#A978-1-4842-1565-4_12_Chapter.html#FPar10)
    presents its source code.


    Listing 12-5\. Normalizing, Relativizing, and Resolving Paths


    `import java.nio.file.FileSystems;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class PathDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `Path path1 = Paths.get("reports", ".", "2015", "jan");`


    `System.out.println(path1);`


    `System.out.println(path1.normalize());`


    `path1 = Paths.get("reports", "2015", "..", "jan");`


    `System.out.println(path1.normalize());`


    `System.out.println();`


    `path1 = Paths.get("reports", "2015", "jan");`


    `System.out.println(path1);`


    `System.out.println(path1.relativize(Paths.get("reports", "2016",`


    `"mar")));`


    `try`


    `{`


    `Path root = FileSystems.getDefault().getRootDirectories()`


    `.iterator().next();`


    `if (root != null)`


    `{`


    `System.out.printf("Root: %s%n", root.toString());`


    `Path path = Paths.get(root.toString(), "reports", "2016",`


    `"mar");`


    `System.out.printf("Path: %s%n", path);`


    `System.out.println(path1.relativize(path));`


    `}`


    `}`


    `catch (IllegalArgumentException iae)`


    `{`


    `iae.printStackTrace();`


    `}`


    `System.out.println();`


    `path1 = Paths.get("reports", "2015");`


    `System.out.println(path1);`


    `System.out.println(path1.resolve("apr"));`


    `System.out.println();`


    `Path path2 = Paths.get("reports", "2015", "jan");`


    `System.out.println(path2);`


    `System.out.println(path2.getParent());`


    `System.out.println(path2.resolveSibling(Paths.get("mar")));`


    `System.out.println(path2.resolve(Paths.get("mar")));`


    `}`


    `}`


    Compile Listing [12-5](#A978-1-4842-1565-4_12_Chapter.html#FPar10) (`javac PathDemo.java`)
    and run the resulting application (`java PathDemo`). I observe the following output:


    `reports\.\2015\jan`


    `reports\2015\jan`


    `reports\jan`


    `reports\2015\jan`


    `..\..\2016\mar`


    `Root: C:\`


    `Path: C:\reports\2016\mar`


    `java.lang.IllegalArgumentException: ’other’ is different type of Path`


    `at sun.nio.fs.WindowsPath.relativize(WindowsPath.java:388)`


    `at sun.nio.fs.WindowsPath.relativize(WindowsPath.java:44)`


    `at PathDemo.main(PathDemo.java:29)`


    `reports\2015`


    `reports\2015\apr`


    `reports\2015\jan`


    `reports\2015`


    `reports\2015\mar`


    `reports\2015\jan\mar`


    The output reveals `IllegalArgumentException`, which is thrown from `relativize()`
    when it cannot relativize its `Path` argument against the current `Path`. It cannot
    do so when one of the `Path`s has a root element.


    The output also reveals the difference between `resolveSibling()` and `resolve().
    resolveSibling()` resolves `mar` against `reports\2015` (the parent of `reports\2015\jan`);
    `resolve()` resolves `mar` against `reports\2015\jan`.'
