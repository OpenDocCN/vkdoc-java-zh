    ## 总结


    文件可以以随机访问方式打开，在这种方式下，可以在文件关闭前在多个位置混合执行写入和读取操作。Java通过提供`RandomAccessFile`类（位于`java.io`包中）来支持这种随机访问。


    你首先了解了`RandomAccessFile`的构造函数、操作模式和文件指针。然后你探索了该类的一些方法示例。接下来，你学习了`FileDescriptor`类及其方法。最后，你学习了如何使用`RandomAccessFile`创建平面文件数据库。


    [第4章](#A978-1-4842-1565-4_4_Chapter.html)介绍了经典I/O的流类。


    # 4. 流


    电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1565-4_​4](http://dx.doi.org/10.1007/978-1-4842-1565-4_4)）包含补充材料，可供授权用户使用。


    除了`java.io.File`和`java.io.RandomAccessFile`，Java的经典I/O基础设施还提供了用于执行I/O操作的流。流是一个任意长度的有序字节序列。字节通过输出流从应用程序流向目的地，并通过输入流从源流向应用程序。


    Java在`java.io`包中提供了标识各种用于写入的流目的地的类；例如，字节数组、文件和线程管道。Java还在该包中提供了标识各种用于读取的流源的类。例如，字节数组、文件和线程管道。本章将探讨其中的许多类。


    ## 流类概述


    `java.io`包提供了几个输出流和输入流类，它们是抽象类`OutputStream`和`InputStream`的子类。图[4-1](#A978-1-4842-1565-4_4_Chapter.html#Fig1)展示了输出流类的层次结构。


    ![A978-1-4842-1565-4_4_Fig1_HTML.jpg](A978-1-4842-1565-4_4_Fig1_HTML.jpg)


    图4-1.


    除了`PrintStream`之外，所有输出流类都以`OutputStream`后缀表示


    图[4-2](#A978-1-4842-1565-4_4_Chapter.html#Fig2)展示了输入流类的层次结构。


    ![A978-1-4842-1565-4_4_Fig2_HTML.jpg](A978-1-4842-1565-4_4_Fig2_HTML.jpg)


    图4-2.


    `LineNumberInputStream`和`StringBufferInputStream`已被弃用


    `LineNumberInputStream`和`StringBufferInputStream`已被弃用，因为它们不支持不同的字符编码，我将在[第5章](#A978-1-4842-1565-4_5_Chapter.html)中讨论这个主题。`java.io.LineNumberReader`和`java.io.StringReader`是它们的替代品。（我将在[第5章](#A978-1-4842-1565-4_5_Chapter.html)中与写入器一起讨论读取器。）


    注意


    `PrintStream`是另一个应该被弃用的类，因为它不支持不同的字符编码；`java.io.PrintWriter`是其替代品。然而，Oracle不太可能弃用这个类，因为`PrintStream`是`java.lang.System`类的`out`和`err`类字段的类型，并且有太多遗留代码依赖于这一事实。


    其他Java包提供了额外的输出流和输入流类。例如，`java.util.zip`提供了四个将未压缩数据压缩成各种格式的输出流类，以及四个从相同格式解压缩压缩数据的匹配输入流类：


    *   `CheckedOutputStream`

    *   `CheckedInputStream`

    *   `DeflaterOutputStream`

    *   `GZIPOutputStream`

    *   `GZIPInputStream`

    *   `InflaterInputStream`

    *   `ZipOutputStream`

    *   `ZipInputStream`


    此外，`java.util.jar`包提供了一对流类，用于向JAR文件写入内容和从JAR文件读取内容：


    *   `JarOutputStream`

    *   `JarInputStream`


    ## 流类导览


    在接下来的几个部分中，我将带你浏览`java.io`中的大部分输出流和输入流类，从`OutputStream`和`InputStream`开始。


    ### OutputStream 和 InputStream


    Java提供了抽象类`OutputStream`和`InputStream`来描述执行流I/O的类。`OutputStream`是所有输出流子类的超类。表[4-1](#A978-1-4842-1565-4_4_Chapter.html#Tab1)描述了`OutputStream`的方法。


    表4-1.


    `OutputStream`方法


    | 方法 | 描述 |

    | --- | --- |

    | `void close()` | 关闭此输出流并释放与该流关联的任何操作系统资源。当发生I/O错误时，此方法抛出`java.io.IOException`。
    |

    | `void flush()` | 通过将任何缓冲的输出字节写入目的地来刷新此输出流。如果此输出流的目标是底层操作系统提供的抽象（例如，文件），则刷新流仅保证先前写入流的字节被传递给底层操作系统进行写入；它不保证这些字节实际上被写入物理设备（如磁盘驱动器）。当发生I/O错误时，此方法抛出`IOException`。
    |

    | `void write(byte[] b)` | 将字节数组`b`中的`b.length`个字节写入此输出流。通常，`write(b)`的行为就像你指定了`write(b,
    0, b.length)`一样。当`b`为`null`时，此方法抛出`java.lang.NullPointerException`；当发生I/O错误时，抛出`IOException`。
