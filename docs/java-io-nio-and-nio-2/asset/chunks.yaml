  trans: '

    ### 缓冲区


    缓冲区是 NIO 操作的基础。本质上，NIO 就是关于将数据移入和移出缓冲区。


    像 JVM 这样的进程通过请求操作系统将缓冲区内容通过写操作排空到存储设备来执行 I/O。类似地，它也请求操作系统用从存储设备读取的数据来填充缓冲区。


    考虑一个涉及磁盘驱动器的读取操作。操作系统向磁盘控制器发出命令，从磁盘读取一个字节块到操作系统缓冲区。一旦此操作完成，操作系统就会将缓冲区内容复制到进程在发出
    `read()` 操作时指定的缓冲区。请参见图 1-2。


    ![A978-1-4842-1565-4_1_Fig2_HTML.jpg](img/A978-1-4842-1565-4_1_Fig2_HTML.jpg)


    图 1-2.


    在操作系统级别填充缓冲区


    在图 1-2 中，一个进程已向操作系统发出了 `read()` 调用。相应地，操作系统已请求磁盘控制器从磁盘读取一个字节块。磁盘控制器（也称为 DMA 控制器）通过直接内存访问（DMA）将这些字节直接读取到操作系统缓冲区中。DMA
    是计算机系统的一项特性，它允许某些硬件子系统独立于中央处理单元（CPU）访问主系统（RAM）[内存](https://en.wikipedia.org/wiki/Computer_storage#Computer%20storage)。然后，操作系统将这些字节复制到进程的缓冲区。


    将字节从操作系统缓冲区复制到进程缓冲区效率不高。让 DMA 控制器直接复制到进程缓冲区性能会更好，但这种方法存在两个问题：


    *   DMA 控制器通常无法直接与 JVM 进程运行的用户空间通信。相反，它与操作系统的内核空间通信。

    *   像 DMA 控制器这样的面向块的设备处理的是固定大小的数据块。相比之下，JVM 进程可能请求的数据大小不是块大小的整数倍，或者存在未对齐的情况。


    由于这些问题，操作系统充当了中介的角色，在 JVM 进程和 DMA 控制器之间切换时，对数据进行拆分和重组。


    通过让 JVM 进程在单个系统调用中向操作系统传递一个缓冲区地址列表，可以使数据组装/拆解任务更加高效。然后，操作系统按顺序填充或排空这些缓冲区，在读取操作时将数据分散到多个缓冲区，或在写入操作时从多个缓冲区收集数据。这种分散/聚集活动减少了
    JVM 进程必须进行的（可能代价高昂的）系统调用次数，并且由于操作系统知道总的缓冲区空间大小，它可以优化数据处理。此外，当有多个处理器或核心可用时，操作系统可能允许同时填充或排空多个缓冲区。


    JDK 1.4 的 `java.nio.Buffer` 类抽象了 JVM 进程缓冲区的概念。它是 `java.nio.ByteBuffer` 和其他缓冲区类的超类。由于
    I/O 从根本上说是面向字节的，因此只有 `ByteBuffer` 实例可以与通道（稍后讨论）一起使用。大多数其他 `Buffer` 子类是为了方便处理多字节数据（如字符或整数）而设计的。


    第 6 章 将深入探讨 `Buffer` 类及其子类。


    ### 通道


    强制 CPU 执行 I/O 任务并等待 I/O 完成（这种 CPU 被称为 I/O 密集型）是对这种资源的浪费。通过将这些任务卸载到 DMA 控制器，处理器可以继续处理其他工作，从而提高性能。


    通道充当了（通过操作系统）与 DMA 控制器通信的管道，用于高效地将字节缓冲区排空到磁盘或从磁盘填充字节缓冲区。JDK 1.4 的 `java.nio.channels.Channel`
    接口、其子接口以及各种类实现了通道架构。


    其中一个类叫做 `java.nio.channels.FileChannel`，它抽象了一个用于读取、写入、映射和操作文件的通道。`FileChannel`
    的一个有趣特性是它对文件锁定的支持，数据库管理系统等复杂应用程序都依赖于此。


    文件锁定允许进程在访问文件时阻止或限制其他进程对该文件的访问。虽然文件锁定可以应用于整个文件，但通常将其缩小到更小的区域。锁定范围从文件中的起始字节偏移量开始，并持续特定数量的字节。


    `FileChannel` 的另一个有趣特性是通过 `map()` 方法实现的内存映射文件 I/O。`map()` 返回一个 `java.nio.MappedByteBuffer`，其内容是文件的一个内存映射区域。文件内容通过内存访问来访问；消除了缓冲区复制和读写系统调用。


    您可以通过调用 `java.nio.channels.Channels` 类的方法或经典 I/O 类（如 `RandomAccessFile`）中的方法来获取通道。


    第 7 章 将深入探讨 `Channel`、`Channels` 等。


    ### 选择器


    I/O 分为面向块和面向流两种。从文件读取或写入文件是面向块 I/O 的一个例子。相比之下，从键盘读取或写入网络连接是面向流 I/O 的一个例子。


    流 I/O 通常比块 I/O 慢。此外，输入往往是间歇性的。例如，用户可能在输入一串字符时暂停，或者网络连接的瞬时缓慢会导致播放视频时出现卡顿。


    许多操作系统允许将流配置为在非阻塞模式下运行，在这种模式下，线程在没有输入可用时会持续检查可用输入而不会阻塞。线程可以处理传入的数据或执行其他任务，直到数据到达。


    这种“轮询可用输入”的活动可能很浪费，尤其是当线程需要监视许多输入流时（例如在 Web 服务器环境中）。现代操作系统可以高效地执行这种检查，这被称为就绪选择，并且通常构建在非阻塞模式之上。操作系统监视一组流，并向线程返回哪些流已准备好执行
    I/O 的指示。因此，单个线程可以通过通用代码多路复用许多活动流，并且在 Web 服务器环境中，这使得管理大量网络连接成为可能。


    JDK 1.4 通过提供选择器来支持就绪选择，选择器是 `java.nio.channels.Selector` 类的实例，它可以检查一个或多个通道，并确定哪些通道已准备好进行读取或写入。这样，单个线程就可以高效地管理多个通道（因此，也管理多个网络连接）。在性能和/或内存使用方面，线程创建和线程上下文切换代价高昂的情况下，能够使用更少的线程是有利的。请参见图
    1-3。


    ![A978-1-4842-1565-4_1_Fig3_HTML.jpg](img/A978-1-4842-1565-4_1_Fig3_HTML.jpg)


    图 1-3.


    一个线程通过一个选择器管理三个通道


    第 8 章 将深入探讨 `Selector` 及其相关类型。

    '
- fmt: '### Regular Expressions


    Regular expressions were introduced as part of NIO. Although you might wonder
    about the rationale for doing this (what have regular expressions got to do with
    I/O?), regular expressions are commonly used to scan textual data that is read
    from a file or other source. The need to perform these scans as quickly as possible
    mandated their inclusion. JDK 1.4 supports regular expressions via the `java.util.regex`
    package and its `Pattern` and `Matcher` classes.


    [Chapter 9](#A978-1-4842-1565-4_9_Chapter.html) explores the `Pattern` and `Matcher`
    classes.


    ### Charsets


    I previously mentioned that JDK 1.1 introduced writer/reader classes that take
    character encodings into account. Originally, classes such as `java.io.InputStreamReader`
    worked with the `java.io.ByteToCharConverter` class to perform conversions based
    on encodings. `ByteToCharConverter` was eventually deprecated and removed from
    JDK 6 and successors. In its place, the more capable `java.nio.charset` package
    along with its `Charset`, `CharsetEncoder`, `CharsetDecoder`, and related types
    was introduced.


    [Chapter 10](#A978-1-4842-1565-4_10_Chapter.html) explores the `Charset` class.


    ### Formatter


    JSR 51 mentions a simple `printf`-style formatting facility. Such a facility offers
    significant value in preparing data for presentation, to which many C programmers
    can attest. However, JDK 1.4 did not include this capability because it relies
    on variable argument lists, a language feature that did not debut until JDK 5.
    Fortunately, JDK 5 also included a `java.util.Formatter` class with a wealth of
    formatting capabilities along with related types that support custom formatting,
    and added `printf()` (and related `format()`) methods to the `PrintStream` class.


    [Chapter 11](#A978-1-4842-1565-4_11_Chapter.html) explores `Formatter` and demonstrates
    `printf()`.


    ## NIO.2


    JSR 51 specifies that NIO would introduce an improved file system interface that
    overcomes various problems with the legacy `File` class. However, lack of time
    prevented this feature from being included. Also, it wasn’t possible to support
    asynchronous I/O and complete socket channel functionality. JSR 203 ([`www.jcp.org/en/jsr/detail?id=203`](http://www.jcp.org/en/jsr/detail?id=203))
    was subsequently created to address these omissions, which debuted in JDK 7.


    **Note**


    Before the official JDK 7 release, big buffers (buffers with 64-bit addressability)
    were considered for NIO.2. Classes such as `BigByteBuffer` and `MappedBigByteBuffer`
    were planned for inclusion in package `java.nio` or a different package. However,
    as explained in the “`BigByteBuffer`/`MappedBigByteBuffer`” OpenJDK discussion
    topic ([`http://mail.openjdk.java.net/pipermail/nio-discuss/2009-June/000207.html`](http://mail.openjdk.java.net/pipermail/nio-discuss/2009-June/000207.html)),
    this capability was abandoned in favor of pursuing “64-bit arrays or collections.”


    ### Improved File System Interface


    The legacy `File` class suffers from various problems. For example, the `renameTo()`
    method doesn’t work consistently across operating systems. Also, many of `File`’s
    methods don’t scale; requesting a large directory listing from a server could
    result in a hang. The new file system interface mentioned in JSR 203 fixes these
    and other problems. For example, it supports bulk access to file attributes, provides
    a change notification facility, offers the ability to escape to file system-specific
    APIs, and has a service provider interface for pluggable file system implementations.


    [Chapter 12](#A978-1-4842-1565-4_12_Chapter.html) explores the improved file system
    interface.


    ### Asynchronous I/O


    Nonblocking mode improves performance by preventing a thread that performs a read
    or write operation on a channel from blocking until input is available or the
    output has been fully written. However, it doesn’t let an application determine
    if it can perform an operation without actually performing the operation. For
    example, when a nonblocking read operation succeeds, the application learns that
    the read operation is possible but also has read some data that must be managed.
    This duality prevents you from separating code that checks for stream readiness
    from the data-processing code without making your code significantly complicated.


    Asynchronous I/O overcomes this problem by letting the thread initiate the operation
    and immediately proceed to other work. The thread specifies some kind of callback
    function that is invoked when the operation finishes.


    [Chapter 13](#A978-1-4842-1565-4_13_Chapter.html) explores asynchronous I/O.


    ### Completion of Socket Channel Functionality


    JDK 1.4 added the `DatagramChannel`, `ServerSocketChannel`, and `SocketChannel`
    classes to the `java.nio.channels` package. However, lack of time prevented these
    classes from supporting binding and option configuration. Also, channel-based
    multicast datagrams were not supported. JDK 7 added binding support and option
    configuration to the aforementioned classes. Also, it introduced a new `java.nio.channels.MulticastChannel`
    interface.


    [Chapter 14](#A978-1-4842-1565-4_14_Chapter.html) explores the completion of socket
    channel functionality.


    **EXERCISES**


    The following exercises are designed to test your understanding of [Chapter 1](#A978-1-4842-1565-4_1_Chapter.html)’s
    content:


    - Identify the API categories that comprise classic I/O.

    - What benefit is offered by the `try`-with-resources statement?

    - Identify the API categories that comprise NIO.

    - Which API class lets Java programs leverage readiness selection?

    - Identify the API categories that comprise NIO.2.

    - How does NIO.2 complete socket channel functionality?


    ## Summary


    I/O is fundamental to operating systems, computer languages, and language libraries.
    Java supports I/O through its classic I/O, NIO, and NIO.2 API categories.


    Classic I/O provides APIs to access the file system, access file content randomly
    (as opposed to sequentially), stream byte-oriented data between sources and destinations,
    and support character streams.


    NIO provides APIs to manage buffers, communicate buffered data over channels,
    leverage readiness selection via selectors, scan textual data quickly via regular
    expressions, specify character encodings via charsets, and support `printf`-style
    formatting.


    NIO.2 provides APIs to improve the file system interface; support asynchronous
    I/O; and complete socket channel functionality by upgrading `DatagramChannel`,
    `ServerSocketChannel`, and `SocketChannel`, and by introducing a new `MulticastChannel`
    interface.


    [Chapter 2](#A978-1-4842-1565-4_2_Chapter.html) presents classic I/O’s `File`
    class.


    # Part II

    Classic I/O APIs


    # 2. File


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1565-4_2](http://dx.doi.org/10.1007/978-1-4842-1565-4_2))
    contains supplementary material, which is available to authorized users.


    Applications often interact with a file system, which is usually implemented as
    a hierarchy of files and directories starting from a root directory. Operating
    systems on which a Java virtual machine (JVM) runs typically support at least
    one file system. For example, Unix/Linux combines all mounted (attached and prepared)
    disks into one virtual file system. In contrast, Windows associates a separate
    file system with each active disk drive. Java offers access to the underlying
    operating system’s available file system(s) via its concrete `java.io.File` class,
    which this chapter explores.'
