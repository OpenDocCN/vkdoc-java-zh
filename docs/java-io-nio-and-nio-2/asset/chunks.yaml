  raw: '#### Checking Paths


    The `Files` class declares a pair of methods for checking a path to learn whether
    or not the file that it represents exists:


    *   `boolean` `exists` `(Path path, LinkOption... options)`: Check the file represented
    by `path` to determine if it exists. By default, symbolic links are followed,
    but if you pass `LinkOption.NOFOLLOW_LINKS` to `options`, symbolic links are not
    followed. Return `true` when the file exists; return `false` when the file doesn’t
    exist or its existence cannot be determined.

    *   `boolean` `notExists` `(Path path, LinkOption... options)`: Check the file
    represented by `path` to determine if it doesn’t exist. By default, symbolic links
    are followed, but if you pass `LinkOption.NOFOLLOW_LINKS` to `options`, symbolic
    links are not followed. Return `true` when the file doesn’t exist; return `false`
    when the file exists or its existence cannot be determined.


    Note


    Expression `!exists(path)` isn’t equivalent to `notExists(path)`. This is probably
    because `!exists()` isn’t atomic (executed as a single operation), whereas `notExists()`
    is atomic. Also, when `exists()` and `notExists()` return `false`, the existence
    of the file cannot be verified.


    The `Files` class also declares several `is`-prefixed methods for checking a path
    for additional conditions:


    *   `boolean` `isDirectory` `(Path path, LinkOption... options)`: Check that `path`
    represents a directory. It returns `true` for a directory and `false` for not
    a directory, when there is no file backing the `path`, or when it cannot be determined
    that `path` represents a directory. Specify `LinkOption.NOFOLLOW_LINKS` when you
    don’t want this method to follow symbolic links.

    *   `boolean` `isExecutable` `(Path path)`: Check that `path` represents an executable
    file. It returns `true` when the file exists and is executable and `false` when
    the file doesn’t exist, when execute access would be denied because the JVM has
    insufficient privileges, or when access cannot be determined.

    *   `boolean` `isHidden` `(Path path)`: Check whether the file represented by
    `path` is hidden. The exact definition of hidden is operating system-dependent.
    For example, Unix considers a file to be hidden when its name begins with a period
    character. On Windows, a file is considered hidden when it isn’t a directory and
    the DOS `hidden` attribute is set. This method returns `true` when the file is
    considered hidden; otherwise, it returns `false`. It throws `IOException` when
    an I/O error occurs.

    *   `boolean` `isReadable` `(Path path)`: Check that `path` represents a readable
    file. It returns `true` when the file exists and is readable and `false` when
    the file doesn’t exist, when read access would be denied because the JVM has insufficient
    privileges, or when access cannot be determined.

    *   `boolean` `isRegularFile` `(Path path, LinkOption... options)`: Check that
    `path` represents a regular file. It returns `true` for a regular file and `false`
    for not a regular file, when there is no file backing the `path`, or when it cannot
    be determined that `path` represents a regular file. Specify `LinkOption.NOFOLLOW_LINKS`
    when you don’t want this method to follow symbolic links.

    *   `boolean` `isSameFile` `(Path path1, Path path2)`: Check whether `path1` and
    `path2` locate the same file, returning `true` when this is the case. If the two
    `Path` objects are associated with different file system providers, this method
    returns `false`. It throws `IOException` when an I/O error occurs.

    *   `boolean` `isWritable` `(Path path)`: Check that `path` represents a writable
    file. It returns `true` when the file exists and is writable and `false` when
    the file doesn’t exist, when write access would be denied because the JVM has
    insufficient privileges, or when access cannot be determined.


    Each of `isExecutable()`, `isReadable()`, and `isWritable()` checks that a file
    exists and that the JVM has appropriate privileges for executing the file, opening
    it for reading, or opening it for writing. Depending on the implementation, the
    method might need to read file permissions, ACLs, or other file attributes to
    check the effective access to the file. Consequently, the method might not be
    atomic with respect to other file system operations.


    The return value from `exists()`, `notExists()`, `isExecutable()`, `isReadable()`,
    and `isWritable()` is immediately outdated. The file system may experience changes
    in the time between the method call and the use of its result. This race condition
    ( [`https://en.wikipedia.org/wiki/Race_condition`](https://en.wikipedia.org/wiki/Race_condition)
    ) is known as time-of-check-to-time-of-use (TOCTTOU). Check out [`https://en.wikipedia.org/wiki/Time_of_check_to_time_of_use`](https://en.wikipedia.org/wiki/Time_of_check_to_time_of_use)
    for more information.


    Listing [12-20](#A978-1-4842-1565-4_12_Chapter.html#FPar33) presents the source
    code to an application that demonstrates these path-checking methods.


    Listing 12-20\. Checking Paths for Various Conditions


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class CheckPath`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length < 1 || args.length > 2)`


    `{`


    `System.err.println("usage: java CheckPath path1 [path2]");`


    `return;`


    `}`


    `Path path1 = Paths.get(args[0]);`


    `System.out.printf("Path1: %s%n", path1);`


    `System.out.printf("Exists: %b%n", Files.exists(path1));`


    `System.out.printf("Not exists: %b%n", Files.notExists(path1));`


    `System.out.printf("Is directory: %b%n", Files.notExists(path1));`


    `System.out.printf("Is executable: %b%n", Files.isExecutable(path1));`


    `try`


    `{`


    `System.out.printf("Hidden: %b%n", Files.isHidden(path1));`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `System.out.printf("Is readable: %b%n", Files.isReadable(path1));`


    `System.out.printf("Is regular file: %b%n",`


    `Files.isRegularFile(path1));`


    `System.out.printf("Is writable: %b%n",`


    `Files.isWritable(path1));`


    `if (args.length == 2)`


    `{`


    `Path path2 = Paths.get(args[1]);`


    `System.out.printf("Path2: %s%n", path2);`


    `System.out.printf("Is same path: %b%n",`


    `Files.isSameFile(path1, path2));`


    `}`


    `}`


    `}`


    Compile Listing [12-20](#A978-1-4842-1565-4_12_Chapter.html#FPar33) as follows:


    `javac CheckPath.java`


    Run the resulting application as follows:


    `java CheckPath CheckPath.java`


    You should observe the following output:


    `Path1: CheckPath.java`


    `Exists: true`


    `Not exists: false`


    `Is directory: false`


    `Is executable: true`


    `Hidden: false`


    `Is readable: true`


    `Is regular file: true`


    `Is writable: true`


    It might not always be obvious that two paths point to the same file. For example,
    one path might be absolute and the other path relative, as demonstrated here:


    `java CheckPath C:\prj\books\io\ch12\code\CheckPath\CheckPath.java` ![A978-1-4842-1565-4_12_Figa_HTML.jpg](A978-1-4842-1565-4_12_Figa_HTML.jpg)
    `.\CheckPath.java`


    This command line runs `CheckPath` on a Windows operating system with absolute
    and relative paths to the same `CheckPath.java` file. I observe the following
    output:


    `Path1: C:\prj\books\io\ch12\code\CheckPath\CheckPath.java`


    `Exists: true`


    `Not exists: false`


    `Is directory: false`


    `Is executable: true`


    `Hidden: false`


    `Is readable: true`


    `Is regular file: true`


    `Is writable: true`


    `Path2: .\CheckPath.java`


    `Is same path: true`'
