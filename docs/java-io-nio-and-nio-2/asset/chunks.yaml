- fmt: "### Buffer Writing and Reading\n\n`ByteBuffer` and the other primitive-type\
    \ buffer classes declare several overloaded `put()` and `get()` methods for writing\
    \ data items to and reading data items from a buffer. These methods are absolute\
    \ when they require an index argument or relative when they don’t require an index.\n\
    \nFor example, `ByteBuffer` declares the absolute `ByteBuffer put(int index, byte\
    \ b)` method to store byte `b` in the buffer at the `index` value and the absolute\
    \ `byte get(int index)` method to fetch the byte located at position `index`.\
    \ This class also declares the relative `ByteBuffer put(byte b)` method to store\
    \ byte `b` in the buffer at the current position and then increment the current\
    \ position, and the relative `byte get()` method to fetch the byte located at\
    \ the buffer’s current position and increment the current position.\n\nThe absolute\
    \ `put()` and `get()` methods throw `IndexOutOfBoundsException` when `index` is\
    \ negative or greater than or equal to the buffer’s limit. The relative `put()`\
    \ method throws `java.nio.BufferOverflowException` when the current position is\
    \ greater than or equal to the limit, and the relative `get()` method throws `java.nio.BufferUnderflowException`\
    \ when the current position is greater than or equal to the limit. Furthermore,\
    \ the absolute and relative `put()` methods throw `ReadOnlyBufferException` when\
    \ the buffer is read-only.\n\nListing [6-3](#A978-1-4842-1565-4_6_Chapter.html#FPar7)\
    \ demonstrates the relative `put()` method and the absolute `get()` method.\n\n\
    **Listing 6-3.** Writing Bytes to and Reading Them from a Buffer\n\n```\nimport\
    \ java.nio.ByteBuffer;\n\npublic class BufferDemo\n{\n   public static void main(String[]\
    \ args)\n   {\n      ByteBuffer buffer = ByteBuffer.allocate(7);\n      System.out.println(\"\
    Capacity = \" + buffer.capacity());\n      System.out.println(\"Limit = \" + buffer.limit());\n\
    \      System.out.println(\"Position = \" + buffer.position());\n      System.out.println(\"\
    Remaining = \" + buffer.remaining());\n\n      buffer.put((byte) 10).put((byte)\
    \ 20).put((byte) 30);\n\n      System.out.println(\"Capacity = \" + buffer.capacity());\n\
    \      System.out.println(\"Limit = \" + buffer.limit());\n      System.out.println(\"\
    Position = \" + buffer.position());\n      System.out.println(\"Remaining = \"\
    \ + buffer.remaining());\n\n      for (int i = 0; i < buffer.position(); i++)\n\
    \         System.out.println(buffer.get(i));\n   }\n}\n```\n\nCompile Listing\
    \ [6-3](#A978-1-4842-1565-4_6_Chapter.html#FPar7) (`javac BufferDemo.java`) and\
    \ run this application (`java BufferDemo`). You should observe the following output:\n\
    \n```\nCapacity = 7\nLimit = 7\nPosition = 0\nRemaining = 7\n\nCapacity = 7\n\
    Limit = 7\nPosition = 3\nRemaining = 4\n\n10\n20\n30\n```\n\nFigure [6-2](#A978-1-4842-1565-4_6_Chapter.html#Fig2)\
    \ illustrates the state of the buffer following the three `put()` method calls\
    \ and presented in the previous output.\n\n![A978-1-4842-1565-4_6_Fig2_HTML.jpg](A978-1-4842-1565-4_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2.** The buffer can store four more data items before reaching its\
    \ capacity\n\nThe subsequent calls to the absolute `get()` method don’t change\
    \ the position, which remains set to `3`.\n\n**Tip**\n\nFor maximum efficiency,\
    \ you can perform bulk data transfers by using the `ByteBuffer put(byte[] src)`,\
    \ `ByteBuffer put(byte[] src, int offset, int length)`, `ByteBuffer get(byte[]\
    \ dst)`, and `ByteBuffer get(byte[] dst, int offset, int length)` methods to write\
    \ and read an array of bytes.\n\n### Flipping Buffers\n\nAfter filling a buffer,\
    \ you must prepare it for draining by a channel. When you pass the buffer as is,\
    \ the channel accesses undefined data beyond the current position.\n\nTo solve\
    \ this problem, you could reset the position to `0`, but how would the channel\
    \ know when the end of the inserted data had been reached? The solution is to\
    \ work with the limit property, which indicates the end of the active portion\
    \ of the buffer. Basically, you set the limit to the current position and then\
    \ reset the current position to `0`.\n\nYou could accomplish this task by executing\
    \ the following code, which also clears any defined mark:\n\n```\nbuffer.limit(buffer.position()).position(0);\n\
    ```\n\nHowever, there’s an easier way to accomplish the same task, as shown here:\n\
    \n```\nbuffer.flip();\n```\n\nIn either case, the buffer is ready to be drained.\n\
    \nAssuming that `buffer.flip();` is executed at the end of Listing [6-3](#A978-1-4842-1565-4_6_Chapter.html#FPar7)’s\
    \ `main()` method, Figure [6-3](#A978-1-4842-1565-4_6_Chapter.html#Fig3) reveals\
    \ what the buffer state would look like after calling `flip()`.\n\n![A978-1-4842-1565-4_6_Fig3_HTML.jpg](A978-1-4842-1565-4_6_Fig3_HTML.jpg)\n\
    \n**Figure 6-3.** The buffer is ready to be drained\n\nA call to `buffer.remaining()`\
    \ would return `3`. This value indicates the number of bytes available for draining\
    \ (10, 20, and 30).\n\nListing [6-4](#A978-1-4842-1565-4_6_Chapter.html#FPar9)\
    \ provides another buffer-flipping demonstration, which uses a character buffer.\n\
