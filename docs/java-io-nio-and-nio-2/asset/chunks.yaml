    let processes coordinate access to various regions in a file.


    There are two kinds of file locks: exclusive and shared. An exclusive lock gives
    a single writer process access to a file region; it prohibits additional file
    locks from being applied simultaneously to the region. A shared lock gives one
    of multiple reader processes access to the same file region; it does not prohibit
    other shared locks but does prohibit an exclusive lock from being applied simultaneously
    to the region.


    Exclusive and shared locks are commonly used in scenarios where a shared file
    is primarily read and occasionally updated. A process that needs to read from
    the file acquires a shared lock to the entire file or to the desired subregion.
    A second process that also needs to read from the file acquires a shared lock
    to the desired region. Both processes can read the file without interfering with
    each other.


    Suppose a third process wants to perform updates. To do so, it would request an
    exclusive lock. The process would block until all exclusive or shared locks that
    overlap with its region were released. Once the exclusive lock was granted to
    the updater process, any reader process requesting a shared lock would block until
    the exclusive lock was released. The updater process could then update the file
    without the reader processes observing inconsistent data.


    There are a couple more items to keep in mind regarding file locking:


    *   When an operating system doesn’t support shared locks, a shared lock request
    is quietly promoted to a request for an exclusive lock. Although correctness is
    assured, performance may be impacted.

    *   Locks are applied on a per-file basis. They are not applied on a per-thread
    or per-channel basis. Two threads running on the same JVM that request, via different
    channels, an exclusive lock to the same file region are granted access. However,
    if these threads were running on different JVMs, the second thread would block.
    Locks are ultimately arbitrated by the operating system’s file system, and almost
    always at the process level. They are not arbitrated at the thread level. Locks
    associate with files and not with file handles or channels.


    `FileChannel` declares four methods for obtaining exclusive and shared locks:


    *   `FileLock lock()`: Obtain an exclusive lock on this file channel’s underlying
    file. This convenience method is equivalent to executing `fileChannel.lock(0L,
    Long.MAX_VALUE, false);`, where `fileChannel` references a file channel.


    This method returns a `java.nio.channels.FileLock` object representing the locked
    area. It throws `ClosedChannelException` when the file channel is closed; `NonWritableChannelException`
    when the channel isn’t open for writing; `java.nio.channels.OverlappingFileLockException`
    when either a lock that overlaps the requested region is already held by this
    JVM, or another thread is already blocked in this method and is attempting to
    lock an overlapping region of the same file; `java.nio.channels.FileLockInterruptionException`
    when the calling thread was interrupted while waiting to acquire the lock; `AsynchronousCloseException`
    when the channel was closed while the calling thread was waiting to acquire the
    lock; and `IOException` when some other I/O error occurs while obtaining the requested
    lock.


    *   `FileLock lock(long position, long size, boolean shared)`: This method is
    similar to the previous method except that it attempts to acquire a lock on the
    given region of this channel’s file. Pass non-negative values to `position` and
    `size` to delimit the region. Pass `true` to `shared` to request a shared lock
    and `false` to `shared` to request an exclusive lock.

    *   `FileLock tryLock()`: Attempt to obtain an exclusive lock on this file channel’s
    underlying file without blocking. This convenience method is equivalent to executing
    `fileChannel.tryLock(0L, Long.MAX_VALUE, false);` where `fileChannel` references
    a file channel. This method returns a `FileLock` object representing the locked
    area or `null` when the lock would overlap with an existing exclusive lock in
    another operating system process. It throws `ClosedChannelException` when the
    file channel is closed; `OverlappingFileLockException` when a lock that overlaps
    the requested region is already held by this JVM, or when another thread is already
    blocked in this method and is attempting to lock an overlapping region; and `IOException`
    when some other I/O error occurs while obtaining the requested lock.

    *   `FileLock tryLock(long position, long size, boolean shared)`: This method
    is similar to the previous method except that it attempts to acquire a lock on
    the given region of this channel’s file. Pass non-negative values to `position`
    and `size` to delimit the region. Pass `true` to `shared` to request a shared
    lock and `false` to `shared` to request an exclusive lock.


    The `lock()` methods block when the desired region to be locked is already locked
    (unless both locks are shared locks). In contrast, the `tryLock()` methods return
    immediately with a `null` value (when the lock would overlap with an existing
    exclusive lock in another operating system process).


    Each method returns a `FileLock` instance, which encapsulates a locked region
    in the file. `FileLock`’s methods are described next:'
