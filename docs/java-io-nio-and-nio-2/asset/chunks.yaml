- fmt: 'Define file system and file. The `File`-based file system interface is problematic.
    For example, `File`’s `delete()` method returns `false` when it cannot delete
    a file. Why is this behavior a problem? Identify the packages that implement the
    improved file system interface. Identify the types that form the core of the improved
    file system interface. How do you obtain a reference to the default file system?
    How would you create a new file system? Define path. True or false: The `Path`
    interface represents a hierarchical path to a file that must exist. Describe the
    element layout of a `Path` object. What methods do `Path` and `File` provide for
    converting from `Path` to `File` and from `File` to `Path`? Identify the `FileSystem`
    method that returns a `Path` object. What happens when you attempt to create a
    `Path` object using syntax that doesn’t conform to the syntax that is parsed by
    the file system provider that created the `FileSystem` responsible for creating
    the `Path` object? Which methods does the `Paths` class provide for more conveniently
    returning `Path` objects? Identify `Path`’s methods for returning its name elements.
    True or false: `Path`’s `boolean isRelative()` method returns `false` to signify
    an absolute path. How do you obtain a file system’s root(s)? How do you convert
    a relative path to an absolute path? Identify `Path`’s method for removing path
    redundancies, creating a relative path between two paths, and resolving (joining)
    two paths. How do you resolve a path string against the current path’s parent
    path? How do you convert the current `Path` instance to a `URI` object? What does
    the `Path toRealPath(LinkOption... options)` method accomplish? True or false:
    The `Files` class provides `static` methods for performing path-matching and directory-watching
