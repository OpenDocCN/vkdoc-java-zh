    `main()` 现在决定执行哪种文件复制操作（非目录到非目录、非目录到目录，或目录层次结构到目录层次结构）。它通过 `Files.isDirectory(source)`
    测试源路径，以判断其描述的是非目录文件还是目录。


    如果源路径描述的是非目录文件，则执行 `if (!Files.isDirectory(source))` 后面的复合语句。该语句首先判断目标路径是否存在，如果存在，则进一步判断它是否描述了一个目录。如果目标路径描述了一个已存在的目录，则从源路径中提取文件名，并与目标路径进行解析，以便将源文件复制到该目录中（而不是替换该目录）。例如，如果源路径是
    `foo`（一个常规文件），目标路径是 `bak`（一个目录），则解析后的目标路径为 `bak\foo`（在 Windows 系统上）。如果目标路径不存在，则假定它是一个非目录。在任何情况下，都会执行复制操作。如果目标已存在，则会被替换。


    此时，源路径必须描述一个目录（直接或通过符号链接）。由于唯一允许的其他文件复制操作是目录层次结构到目录层次结构，`main()` 会验证目标路径是否描述了一个已存在的目录（通过
    `Files.exists(target) && !Files.isDirectory(target)`），如果不符合条件，则输出错误信息并终止应用程序。


    最后，`main()` 准备 NIO.2 的文件树遍历机制，以遍历源层次结构中的所有非目录文件和目录，并将它们复制到目标位置；然后启动遍历。


    `main()` 创建一个 `FileVisitOption` 的枚举集合（该接口提供的唯一选项是 `FOLLOW_LINKS`——跟随符号链接，以便复制链接的目标而非链接本身），然后实例化
    `CopyVisitor`（稍后将介绍），并将源路径和目标路径传递给其构造函数。`main()` 通过调用 `walkFileTree()` 启动遍历，参数包括源路径、选项列表、`Integer.MAX_VALUE`（遍历所有目录层级）以及
    `CopyVisitor` 对象。


    `walkFileTree()` 对以源路径为根的文件树执行深度优先遍历。在此遍历过程中，它会调用 `CopyVisitor` 提供的各种方法。


    在访问目录之前，`walkFileTree()` 会调用 `preVisitDirectory()`，参数为目录的路径和该目录的基本属性。


    在输出某些信息（这些信息有助于更深入地了解遍历的这一方面，并帮助你熟悉相对化和解析操作）之后，`preVisitDirectory()` 执行 `Path
    targetPath = toPath.resolve(fromPath.relativize(dir));`，原因如下：每个传入的目录路径都是相对于源路径（在
    `CopyVisitor` 中称为 `fromPath`）的，必须将其转换为相对于目标路径（在 `CopyVisitor` 中称为 `toPath`）。例如，假设源路径是
    `s`，`s` 包含目录 `d`，目标路径是 `t`。当调用该方法时，`dir` 包含 `s\d`。相对化操作产生 `d`；解析操作产生 `t\d`。


    变量 `targetPath` 被赋值为解析后的结果（例如 `t\d`）。`preVisitDirectory()` 判断该目录是否存在，如果不存在，则创建该目录（通过
    `Files` 类的 `Path createDirectory(Path dir, FileAttribute<?>... attrs)` 方法）。假设
    `createDirectory()` 没有抛出 `IOException`，`preVisitDirectory()` 返回 `FileVisitResult.CONTINUE`
    以继续遍历。


    `visitFile()` 则简单得多。它执行复制操作（在将文件从源路径相对化并解析到目标路径之后），然后返回 `CONTINUE` 以继续遍历。

