    `return (value == -1) ? -1 : map[value];`


    `}`


    `@Override`


    `public int read(byte[] b, int off, int len) throws IOException`


    `{`


    `int nBytes = in.read(b, off, len);`


    `if (nBytes <= 0)`


    `return nBytes;`


    `for (int i = 0; i < nBytes; i++)`


    `b[off + i] = (byte) map[off + i];`


    `return nBytes;`


    `}`


    `}`


    清单 4-6 展示了一个 `ScrambledInputStream` 类，它通过重映射操作对其底层输入流中的加扰字节进行解扰，从而执行简单的解密。


    `read()` 方法首先从其底层输入流中读取加扰后的字节。如果返回值为 `-1`（文件末尾），则将该值返回给调用者。否则，将该字节映射为其解扰后的值并返回。


    `read(byte[], int, int)` 方法与 `read()` 类似，但将从底层输入流读取的字节存储到一个字节数组中，并考虑了该数组的偏移量和长度（要读取的字节数）。


    同样，底层 `read()` 方法调用可能返回 `-1`。如果是这样，必须返回该值。否则，将数组中的每个字节映射为其解扰后的值，并返回读取的字节数。


    注意


    只需重写 `read()` 和 `read(byte[], int, int)` 方法即可，因为 `FilterInputStream` 的 `read(byte[])`
    方法是通过后者实现的。


    清单 4-7 展示了一个 `Unscramble` 应用程序的源代码，用于通过解扰源文件的字节并将这些解扰后的字节写入目标文件来试验 `ScrambledInputStream`。


    清单 4-7\. 解扰文件字节


    `import java.io.FileInputStream;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `import java.util.Random;`


    `public class Unscramble`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Unscramble srcpath destpath");`


    `return;`


    `}`


    `ScrambledInputStream sis = null;`


    `FileOutputStream fos = null;`


    `try`


    `{`


    `FileInputStream fis = new FileInputStream(args[0]);`


    `sis = new ScrambledInputStream(fis, makeMap());`


    `fos = new FileOutputStream(args[1]);`


    `int b;`


    `while ((b = sis.read()) != -1)`


    `fos.write(b);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `finally`


    `{`


    `if (sis != null)`


    `try`


    `{`


    `sis.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `if (fos != null)`


    `try`


    `{`


    `fos.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `}`


    `static int[] makeMap()`


    `{`


    `int[] map = new int[256];`


    `for (int i = 0; i < map.length; i++)`


    `map[i] = i;`


    `// 打乱映射表。`


    `Random r = new Random(0);`


    `for (int i = 0; i < map.length; i++)`


    `{`


    `int n = r.nextInt(map.length);`


    `int temp = map[i];`


    `map[i] = map[n];`


    `map[n] = temp;`


    `}`


    `int[] temp = new int[256];`


    `for (int i = 0; i < temp.length; i++)`


    `temp[map[i]] = i;`


    `return temp;`


    `}`


    `}`


    `Unscramble` 的 `main()` 方法首先验证命令行参数的数量：第一个参数标识包含加扰内容的源文件路径；第二个参数标识存储解扰后内容的目标文件路径。


    假设已指定两个命令行参数，`main()` 实例化 `FileInputStream`，创建一个连接到由 `args[1]` 标识的文件的文件输入流。


    接着，`main()` 实例化 `FileInputStream`，创建一个连接到由 `args[0]` 标识的文件的文件输入流。然后实例化 `ScrambledInputStream`，并将
    `FileInputStream` 实例传递给 `ScrambledInputStream` 的构造函数。


    注意


    当一个流实例被传递给另一个流类的构造函数时，这两个流会被链接在一起。例如，加扰输入流被链接到文件输入流。


    现在，`main()` 进入一个循环，从加扰输入流中读取字节并将其写入文件输出流。此循环持续进行，直到 `ScrambledInputStream` 的 `read()`
    方法返回 `-1`（文件末尾）。


    `finally` 块通过调用加扰输入流和文件输出流的 `close()` 方法来关闭它们。它没有调用文件输入流的 `close()` 方法，因为 `FilterOutputStream`
    会自动调用底层输入流的 `close()` 方法。


    `makeMap()` 方法负责创建传递给 `ScrambledInputStream` 构造函数的映射数组。其思路是复制清单 4-5 中的映射数组，然后将其反转，以便能够执行解扰操作。


    按如下方式编译清单 4-6 和 4-7：


    `javac *.java`


    假设您已将之前生成的 `hello.out` 文件复制到当前目录，请按如下方式使用此文件运行生成的应用程序：


    `java Unscramble hello.out hello.bak`


    您应该会在 `hello.bak` 中看到与 `hello.txt` 中相同的解扰后内容。


    注意


    有关过滤输出流及其配套过滤输入流的另一个示例，请参阅 Dr. Dobb''s 网站上的文章“扩展 Java 流以支持位流”（[`www.drdobbs.com/184410423`](http://www.drdobbs.com/184410423)）。该文章介绍了
    `BitStreamOutputStream` 和 `BitStreamInputStream` 类，它们对于输出和输入位流非常有用。然后，文章在 Lempel-Zif-Welch
    (LZW) 数据压缩和解压缩算法的 Java 实现中演示了这些类。

