  trans: '

    #### 探索数据报通道


    `DatagramChannel` 模拟了一种无连接的、基于数据包的协议（例如 UDP/IP）。该类包含以下方法：


    *   `static DatagramChannel open()`：尝试打开一个数据报通道。如果无法打开该通道，则抛出 `IOException`。

    *   `DatagramSocket socket()`：返回与此数据报通道关联的对等 `DatagramSocket` 实例。

    *   `DatagramChannel connect(SocketAddress remoteAddr)`：尝试将此数据报通道的套接字对象连接到远程地址。该通道的套接字被配置为仅接收来自该地址的数据报，并仅向该地址发送数据报。一旦连接，就无法从任何其他地址接收数据报，也无法向任何其他地址发送数据报。数据报套接字保持连接状态，直到显式断开连接或关闭。此方法在成功时返回该数据报通道。当数据报通道已关闭时抛出
    `ClosedChannelException`；当连接操作进行中时，另一个线程关闭此通道，则抛出 `AsynchronousCloseException`；当连接操作进行中时，另一个线程中断当前线程，从而关闭通道并设置当前线程的中断状态，则抛出
    `ClosedByInterruptException`；当发生其他 I/O 错误时抛出 `IOException`。

    *   `boolean isConnected()`：当此通道的套接字已打开并连接时返回 `true`；否则返回 `false`。

    *   `DatagramChannel disconnect()`：断开此通道的套接字连接。此方法可随时调用，并且对已在进行中的读取或写入操作没有影响。当套接字未连接或通道已关闭时，调用此方法无效。

    *   `SocketAddress receive(ByteBuffer buffer)`：通过此通道接收一个数据报。如果数据报立即可用，或者此通道处于阻塞模式且数据报变为可用，则将该数据报复制到给定的字节缓冲区中，并返回其源地址。如果此通道处于非阻塞模式且数据报不可立即使用，则此方法立即返回
    `null`。数据报从当前缓冲区位置开始传输到给定的字节缓冲区中，就像常规的读取操作一样。如果缓冲区中剩余的字节数少于容纳该数据报所需的字节数，则数据报的剩余部分将被静默丢弃。此方法返回数据报的源地址，如果通道处于非阻塞模式且没有可用数据报，则返回
    `null`。当数据报通道已关闭时抛出 `ClosedChannelException`；当读取操作进行中时，另一个线程关闭此通道，则抛出 `AsynchronousCloseException`；当读取操作进行中时，另一个线程中断当前线程，从而关闭通道并设置当前线程的中断状态，则抛出
    `ClosedByInterruptException`；当发生其他 I/O 错误时抛出 `IOException`。

    *   `int send(ByteBuffer buffer, SocketAddress destAddr)`：通过此通道发送一个数据报。如果此通道处于非阻塞模式且底层输出缓冲区中有足够的空间，或者此通道处于阻塞模式且空间变得足够，则给定缓冲区中的剩余字节将作为单个数据报传输到给定的目标地址。数据报从字节缓冲区中传输，就像常规的写入操作一样。此方法返回发送的字节数，该字节数等于调用此方法时源缓冲区中剩余的字节数；或者，当此通道处于非阻塞模式时，如果底层输出缓冲区中没有足够的空间容纳该数据报，则可能为零。当数据报通道已关闭时抛出
    `ClosedChannelException`；当写入操作进行中时，另一个线程关闭此通道，则抛出 `AsynchronousCloseException`；当写入操作进行中时，另一个线程中断当前线程，从而关闭通道并设置当前线程的中断状态，则抛出
    `ClosedByInterruptException`；当发生其他 I/O 错误时抛出 `IOException`。

