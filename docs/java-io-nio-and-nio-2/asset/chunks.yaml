    ### AsynchronousSocketChannel


    你可以通过调用该类的 [`AsynchronousSocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#class%20in%20java.nio.channels)
    `open()` 类方法来获取一个 `AsynchronousSocketChannel` 对象，具体如下：


    `AsynchronousSocketChannel ch = AsynchronousSocketChannel.open();`


    根据 `AsynchronousSocketChannel` 的文档，该方法返回一个绑定到默认组的异步套接字通道。另一种 [`AsynchronousSocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#class%20in%20java.nio.channels)
    `open(` [`AsynchronousChannelGroup`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousChannelGroup.html#class%20in%20java.nio.channels)
    `group)` 方法则返回一个绑定到指定 `group` 的异步套接字通道。同样，我将在本章后面讨论异步通道组。


    你可以通过调用 `<T> AsynchronousSocketChannel setOption(SocketOption<T> name, T value)`
    泛型方法来配置异步套接字通道。支持的已记录选项仅有 `SO_RCVBUF`、`SO_SNDBUF`、`SO_KEEPALIVE`、`SO_REUSEADDR`
    和 `TCP_NODELAY`。


    一个新建且可能已配置的异步套接字通道处于打开状态，但尚未连接。当与[异步服务器套接字通道](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#class%20in%20java.nio.channels)的套接字建立连接时，会创建一个已连接的异步套接字通道。无法为任意预先存在的[套接字](https://docs.oracle.com/javase/8/docs/api/java/net/Socket.html#class%20in%20java.net)创建异步套接字通道。


    新建的套接字通道通过调用其 [`connect`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousSocketChannel.html#connect-java.net.SocketAddress-A-java.nio.channels.CompletionHandler-)
    `()` 方法之一进行连接；其中一个 `connect()` 方法返回一个 `Future`，另一个 `connect()` 方法则需要一个 `CompletionHandler`
    参数。


    一旦连接，套接字通道将保持连接状态，直到关闭。可以通过调用其 `SocketAddress getRemoteAddress()` 方法来确定套接字通道是否已连接，该方法返回远程套接字的套接字地址（如果没有连接，则返回
    `null`）。尝试在未连接的通道上执行 I/O 操作将导致抛出 [`NotYetConnectedException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/NotYetConnectedException.html#class%20in%20java.nio.channels)。


    注意


    异步套接字通道可安全地供多个并发线程使用。它们支持并发读写，但任何时候最多只能有一个读取和一个写入操作未完成。如果某个线程在前一次读取完成之前发起新的读取，将抛出
    [`ReadPendingException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/ReadPendingException.html#class%20in%20java.nio.channels)。类似地，在前一次写入完成之前尝试发起新的写入，将抛出
    [`WritePendingException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/WritePendingException.html#class%20in%20java.nio.channels)。


    为了演示 `AsynchronousSocketChannel`，我创建了一个由 `Client`、`Attachment` 和 `ReadWriteHandler`
    类组成的 `Client` 应用程序。清单 13-7 展示了 `Client` 的源代码。


    清单 13-7\. 启动一个异步处理读/写的客户端


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.AsynchronousSocketChannel;`


    `import java.nio.charset.Charset;`


    `import java.util.concurrent.ExecutionException;`


    `public class Client`


    `{`

    '
- fmt: '`private final static Charset CSUTF8 = Charset.forName("UTF-8");`


    `private final static int PORT = 9090;`


    `private final static String HOST = "localhost";`


    `public static void main(String[] args)`


    `{`


    `AsynchronousSocketChannel channel;`


    `try`


    `{`


    `channel = AsynchronousSocketChannel.open();`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("Unable to open client socket channel");`


    `return;`


    `}`


    `try`


    `{`


    `channel.connect(new InetSocketAddress(HOST, PORT)).get();`


    `System.out.printf("Client at %s connected%n",`


    `channel.getLocalAddress());`


    `}`


    `catch (ExecutionException | InterruptedException eie)`


    `{`


    `System.err.println("Server not responding");`


    `return;`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("Unable to obtain client socket channel’s " +`


    `"local address");`


    `return;`


    `}`


    `Attachment att = new Attachment();`


    `att.channel = channel;`


    `att.isReadMode = false;`


    `att.buffer = ByteBuffer.allocate(2048);`


    `att.mainThd = Thread.currentThread();`


    `byte[] data = "Hello".getBytes(CSUTF8);`


    `att.buffer.put(data);`


    `att.buffer.flip();`


    `channel.write(att.buffer, att, new ReadWriteHandler());`


    `try`


    `{`


    `att.mainThd.join();`


    `}`


    `catch (InterruptedException ie)`


    `{`


    `System.out.println("Client terminating");`


    `}`


    `}`


    `}`


    Listing [13-7](#A978-1-4842-1565-4_13_Chapter.html#FPar7)’s `main()` method first
    attempts to open an asynchronous socket channel and connect it to the server at
    port `9090` on the localhost. It then calls `AsynchronousSocketChannel`’s `S`
    [`ocketAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/SocketAddress.html#class%20in%20java.net)
    `getLocalAddress()` method to return the socket address to which this channel’s
    socket (the local socket) is bound, and it then outputs a message stating that
