    #### 复制文件


    许多开发者对 `File` 类的一个痛点在于它缺少用于将文件复制到其他文件的 `copy()` 方法。`Files` 类通过提供三个 `copy()` 方法解决了这一缺陷：


    *   `long` `copy` `(InputStream in, Path target, CopyOption... options)`：从经典 I/O
    输入流复制到路径。

    *   `long` `copy` `(Path source, OutputStream out)`：从路径复制到经典 I/O 输出流。

    *   `Path` `copy` `(Path source, Path target, CopyOption... options)`：从一个路径复制到另一个路径。


    `copy(InputStream in, Path target, CopyOption... options)` 将输入流 `in` 中的所有字节复制到
    `target` 路径。返回时，输入流将处于流末尾状态。


    可以传递一个 `java.nio.file.CopyOption` 的可变参数列表。这些 `options` 用于配置复制操作。`java.nio.file.StandardCopyOption`
    枚举实现了此接口，并提供了以下常量：


    *   `ATOMIC_MOVE`：将移动操作作为原子文件系统操作执行。此常量不用于 `copy()` 方法，因为在复制上下文中它没有意义。

    *   `COPY_ATTRIBUTES`：同时复制属性和内容。

    *   `REPLACE_EXISTING`：替换已存在的目标。


    `LinkOption` 枚举也实现了 `CopyOption`，它提供了一个 `NOFOLLOW_LINKS` 常量（不跟踪符号链接），我在本章前面已经介绍过。


    默认情况下，当 `target` 已存在或是符号链接时，复制操作会失败。如果指定了 `REPLACE_EXISTING` 且 `target` 已存在，则替换
    `target`（除非它是一个非空目录）。如果 `target` 存在且是符号链接，则替换该符号链接。


    此方法返回读取或写入的字节数。当发生 I/O 错误时抛出 `IOException`，当 `target` 存在但因未指定 `REPLACE_EXISTING`
    而无法替换时抛出 `FileAlreadyExistsException`，当指定了 `REPLACE_EXISTING` 且 `target` 是非空目录时抛出
    `DirectoryNotEmptyException`，当 `options` 包含不支持的复制选项（例如 `ATOMIC_MOVE`）时抛出 `UnsupportedOperationException`。


    警告


    如果在从输入流读取或向目标路径写入时发生 I/O 错误，则可能在目标已创建且已读取或写入部分字节后发生。因此，输入流可能不在流末尾状态，并且可能处于不一致状态。强烈建议在发生
    I/O 错误时立即关闭输入流。


