- fmt: "### Copying Files\n\nA sore spot for many developers regarding the `File`\
    \ class is its lack of a `copy()` method for copying files to other files. The\
    \ `Files` class addresses this shortcoming by providing three `copy()` methods:\n\
    \n- `long copy(InputStream in, Path target, CopyOption... options)`: Copy from\
    \ a classic I/O input stream to a path.\n- `long copy(Path source, OutputStream\
    \ out)`: Copy from a path to a classic I/O output stream.\n- `Path copy(Path source,\
    \ Path target, CopyOption... options)`: Copy from one path to another.\n\n`copy(InputStream\
    \ in, Path target, CopyOption... options)` copies all bytes from input stream\
    \ `in` to the `target` path. On return, the input stream will be at end-of-stream.\n\
    \nA varargs list of `java.nio.file.CopyOption`s may be passed. These `options`\
    \ configure the copy operation. The `java.nio.file.StandardCopyOption` enum implements\
    \ this interface and provides the following constants:\n\n- `ATOMIC_MOVE`: Perform\
    \ the move as an atomic file system operation. This constant isn’t used by the\
    \ `copy()` methods because it’s meaningless in a copy context.\n- `COPY_ATTRIBUTES`:\
    \ Copy attributes as well as content.\n- `REPLACE_EXISTING`: Replace an existing\
    \ target.\n\n`CopyOption` is also implemented by the `LinkOption` enum, which\
    \ provides a `NOFOLLOW_LINKS` constant (don’t follow symbolic links), and which\
    \ I presented earlier in this chapter.\n\nBy default, the copy operation fails\
    \ when the `target` already exists or is a symbolic link. If `REPLACE_EXISTING`\
    \ is specified and the `target` already exists, the `target` is replaced (unless\
    \ it’s a nonempty directory). If the `target` exists and is a symbolic link, the\
    \ symbolic link is replaced.\n\nThis method returns the number of bytes read or\
    \ written. It throws `IOException` for an I/O error, `FileAlreadyExistsException`\
    \ when the `target` exists but cannot be replaced because `REPLACE_EXISTING` wasn’t\
    \ specified, `DirectoryNotEmptyException` when `REPLACE_EXISTING` is specified\
    \ and the `target` is a nonempty directory, and `UnsupportedOperationException`\
    \ when `options` includes an unsupported copy option (such as `ATOMIC_MOVE`).\n\
    \n**Caution**\n\nIf an I/O error occurs while reading from the input stream or\
    \ writing to the target path, it may do so after the target has been created and\
    \ after some bytes have been read or written. Consequently, the input stream may\
    \ not be at end-of-stream and may be in an inconsistent state. It’s strongly recommended\
    \ that the input stream be closed immediately when an I/O error occurs.\n\nListing\
    \ [12-35](#A978-1-4842-1565-4_12_Chapter.html#FPar52) refactors Listing [12-27](#A978-1-4842-1565-4_12_Chapter.html#FPar41)’s\
    \ `SavePage` application to use `copy(InputStream in, Path target, CopyOption...\
    \ options)` to copy a web page to a file.\n\n**Listing 12-35.** Saving Web Page\
    \ HTML via `copy(InputStream, Path, CopyOption...)`\n\n```\nimport java.io.IOException;\n\
    import java.net.URL;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
    \npublic class SavePage\n{\n   public static void main(String[] args) throws IOException\n\
    \   {\n      if (args.length != 1)\n      {\n         System.err.println(\"usage:\
    \ java SavePage url\");\n         return;\n      }\n      URL url = new URL(args[0]);\n\
    \      Files.copy(url.openStream(), Paths.get(\"page.html\"));\n   }\n}\n```\n\
    \nListing [12-35](#A978-1-4842-1565-4_12_Chapter.html#FPar52)’s use of `copy()`\
    \ to copy from the `URL`’s input stream to the `Path`’s `page.html` file results\
    \ in a much shorter listing than its Listing [12-27](#A978-1-4842-1565-4_12_Chapter.html#FPar41)\
    \ counterpart.\n\nCompile Listing [12-35](#A978-1-4842-1565-4_12_Chapter.html#FPar52)\
    \ (`javac SavePage.java`) and run the application (`java SavePage http://apress.com`).\
    \ You should observe a `page.html` file with similar content to that generated\
    \ by the earlier `SavePage` application.\n\n`copy(Path source, OutputStream out)`\
    \ copies all bytes from the `source` path to output stream `out`. If the given\
    \ output stream is `Flushable`, its `flush()` method may need to be invoked after\
    \ this method finishes so as to flush any buffered output. This method returns\
    \ the number of bytes read or written. It throws `IOException` when an I/O error\
    \ occurs while reading or writing.\n\n**Caution**\n\nIf an I/O error occurs while\
    \ reading from the source path or writing to the output stream, it may do so after\
    \ some bytes have been read or written. Therefore, the output stream may be in\
    \ an inconsistent state. It’s strongly recommended that the output stream be closed\
    \ immediately after the I/O error.\n\nListing [12-36](#A978-1-4842-1565-4_12_Chapter.html#FPar54)\
    \ presents the source code to an application that copies all bytes from a `source`\
    \ path to a file output stream.\n\n**Listing 12-36.** Copying from a Source Path\
    \ to a File Output Stream\n\n```\nimport java.io.FileOutputStream;\nimport java.io.IOException;\n\
    import java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Copy\n\
    {\n   public static void main(String[] args) throws IOException\n   {\n      if\
    \ (args.length != 2)\n      {\n         System.err.println(\"usage: java Copy\
    \ src dst\");\n         return;\n      }\n      Files.copy(Paths.get(args[0]),\
    \ new FileOutputStream(args[1]));\n   }\n}\n```\n\nCompile Listing [12-36](#A978-1-4842-1565-4_12_Chapter.html#FPar54)\
    \ as follows:\n\n```\njavac Copy.java\n```\n\nRun the resulting application as\
    \ follows:\n\n```\njava Copy Copy.java Copy.bak\n```\n\nYou should observe, in\
    \ the current directory, a `Copy.bak` file containing the same content as `Copy.java`.\n\
    \n`copy(Path source, Path target, CopyOption... options)` copies a `source` path\
    \ to a `target` path adhering to the specified copy `options`. By default, the\
    \ copy operation fails when the `target` exists or is a symbolic link. However,\
    \ when the `source` and `target` are the same, the method will complete without\
    \ performing a copy.\n\nThere are a few additional items to note:\n\n- Attributes\
    \ will not necessarily be copied to the `target`.\n- When symbolic links are supported\
    \ and the `source` is a symbolic link, the final target of the link is copied.\n\
    - When the `source` is a directory, `copy()` creates an empty directory in the\
    \ `target` location (directory entries are not copied).\n\nYou may specify the\
    \ following copy options:\n\n- `COPY_ATTRIBUTES`: Attempt to copy the attributes\
    \ associated with this path to the `target`. The exact attributes that are copied\
    \ are file system-dependent and therefore unspecified. Minimally, `lastModifiedTime`\
    \ is copied to the `target` when supported by both the `source` and `target` file\
    \ stores. Note that copying timestamps may result in precision loss.\n- `NOFOLLOW_LINKS`:\
    \ Symbolic links are not followed. When the path is a symbolic link, the symbolic\
    \ link itself and not the target of the link is copied. It’s implementation-specific\
    \ as to whether attributes can be copied to the new link. In other words, `COPY_ATTRIBUTES`\
    \ may be ignored when copying a symbolic link.\n- `REPLACE_EXISTING`: When the\
    \ `target` exists, the `target` is replaced unless it’s a nonempty directory.\
    \ When the `target` exists and is a symbolic link, the symbolic link itself and\
    \ not the target of the link is replaced.\n\nThis method returns the `target Path`\
    \ object. It throws `UnsupportedOperationException` when `options` includes an\
    \ unsupported copy option, `IOException` when an I/O error occurs, `FileAlreadyExistsException`\
    \ when the `target` exists but cannot be replaced because the `REPLACE_EXISTING`\
    \ option was not specified, and `DirectoryNotEmptyException` when `REPLACE_EXISTING`\
    \ was specified but the path cannot be replaced because it’s a nonempty directory.\n\
    \nListing [12-37](#A978-1-4842-1565-4_12_Chapter.html#FPar55) presents the source\
    \ code to an application that copies all bytes from a `source` path to a `target`\
    \ path.\n\n**Listing 12-37.** Copying from a Source Path to a Target Path\n\n\
    ```\nimport java.io.IOException;\n```"
  raw: '#### Copying Files


    A sore spot for many developers regarding the `File` class is its lack of a `copy()`
    method for copying files to other files. The `Files` class addresses this shortcoming
    by providing three `copy()` methods:


    *   `long` `copy` `(InputStream in, Path target, CopyOption... options)`: Copy
    from a classic I/O input stream to a path.

    *   `long` `copy` `(Path source, OutputStream out)`: Copy from a path to a classic
    I/O output stream.

    *   `Path` `copy` `(Path source, Path target, CopyOption... options)`: Copy from
    one path to another.


    `copy(InputStream in, Path target, CopyOption... options)` copies all bytes from
    input stream `in` to the `target` path. On return, the input stream will be at
    end-of-stream.


    A varargs list of `java.nio.file.CopyOption`s may be passed. These `options` configure
    the copy operation. The `java.nio.file.StandardCopyOption` enum implements this
    interface and provides the following constants:


    *   `ATOMIC_MOVE`: Perform the move as an atomic file system operation. This constant
    isn’t used by the `copy()` methods because it’s meaningless in a copy context.

    *   `COPY_ATTRIBUTES`: Copy attributes as well as content.

    *   `REPLACE_EXISTING`: Replace an existing target.


    `CopyOption` is also implemented by the `LinkOption` enum, which provides a `NOFOLLOW_LINKS`
    constant (don’t follow symbolic links), and which I presented earlier in this
    chapter.


    By default, the copy operation fails when the `target` already exists or is a
    symbolic link. If `REPLACE_EXISTING` is specified and the `target` already exists,
    the `target` is replaced (unless it’s a nonempty directory). If the `target` exists
    and is a symbolic link, the symbolic link is replaced.


    This method returns the number of bytes read or written. It throws `IOException`
    for an I/O error, `FileAlreadyExistsException` when the `target` exists but cannot
    be replaced because `REPLACE_EXISTING` wasn’t specified, `DirectoryNotEmptyException`
    when `REPLACE_EXISTING` is specified and the `target` is a nonempty directory,
    and `UnsupportedOperationException` when `options` includes an unsupported copy
    option (such as `ATOMIC_MOVE`).


    Caution


    If an I/O error occurs while reading from the input stream or writing to the target
    path, it may do so after the target has been created and after some bytes have
    been read or written. Consequently, the input stream may not be at end-of-stream
    and may be in an inconsistent state. It’s strongly recommended that the input
    stream be closed immediately when an I/O error occurs.


    Listing [12-35](#A978-1-4842-1565-4_12_Chapter.html#FPar52) refactors Listing
    [12-27](#A978-1-4842-1565-4_12_Chapter.html#FPar41)’s `SavePage` application to
    use `copy(InputStream in, Path target, CopyOption... options)` to copy a web page
    to a file.


    Listing 12-35\. Saving Web Page HTML via `copy(InputStream, Path, CopyOption...)`


    `import java.io.IOException;`


    `import java.net.URL;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class SavePage`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java SavePage url");`


    `return;`


    `}`


    `URL url = new URL(args[0]);`


    `Files.copy(url.openStream(), Paths.get("page.html"));`


    `}`


    `}`


    Listing [12-35](#A978-1-4842-1565-4_12_Chapter.html#FPar52)’s use of `copy()`
    to copy from the `URL`’s input stream to the `Path`’s `page.html` file results
    in a much shorter listing than its Listing [12-27](#A978-1-4842-1565-4_12_Chapter.html#FPar41)
    counterpart.


    Compile Listing [12-35](#A978-1-4842-1565-4_12_Chapter.html#FPar52) (`javac SavePage.java`)
    and run the application (`java SavePage` [`http://apress.com`](http://apress.com/)
    ). You should observe a `page.html` file with similar content to that generated
    by the earlier `SavePage` application.


    `copy(Path source, OutputStream out)` copies all bytes from the `source` path
    to output stream `out`. If the given output stream is f[lushable](https://docs.oracle.com/javase/8/docs/api/java/io/Flushable.html#interface%20in%20java.io),
    its `flush``()`method may need to be invoked after this method finishes so as
    to flush any buffered output. This method returns the number of bytes read or
    written. It throws `IOException` when an I/O error occurs while reading or writing.


    Caution


    If an I/O error occurs while reading from the source path or writing to the output
    stream, it may do so after some bytes have been read or written. Therefore, the
    output stream may be in an inconsistent state. It’s strongly recommended that
    the output stream be closed immediately after the I/O error.


    Listing [12-36](#A978-1-4842-1565-4_12_Chapter.html#FPar54) presents the source
    code to an application that copies all bytes from a `source` path to a file output
    stream.


    Listing 12-36\. Copying from a Source Path to a File Output Stream


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class Copy`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Copy src dst");`


    `return;`


    `}`


    `Files.copy(Paths.get(args[0]), new FileOutputStream(args[1]));`


    `}`


    `}`


