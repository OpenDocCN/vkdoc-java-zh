- fmt: "异步通道支持异步 I/O 操作（读取、写入等）。使用异步通道发起 I/O 操作的两种方式如下：调用返回`Future`的方法，以及调用接受`CompletionHandler`参数的方法。\n\
    \n答案是 false：通道关闭后，进一步尝试发起异步 I/O 操作会立即完成，并导致`ClosedChannelException`。\n\n`AsynchronousByteChannel`接口声明的方法包括：`Future<Integer>\
    \ read(ByteBuffer dst)`、`<A> void read(ByteBuffer dst, A attachment, CompletionHandler<Integer,?\
    \ super A> handler)`、`Future<Integer> write(ByteBuffer src)`以及`<A> void write(ByteBuffer\
    \ src, A attachment, CompletionHandler<Integer,? super A> handler)`。\n\n答案是 false：`ByteBuffer`对象不适合被多个并发线程安全使用。\n\
    \n用于异步读取、写入和操作文件的类是`AsynchronousFileChannel`。\n\n答案是 true：异步文件通道在文件内没有当前位置。\n\n\
    如果你没有向`AsynchronousFileChannel`的`open(Path file, OpenOption... options)`方法传递任何选项，该方法会尝试打开一个已存在的文件。\n\
    \n你可以通过调用每个抽象类的两个`open()`方法之一来获取`AsynchronousServerSocketChannel`对象或`AsynchronousSocketChannel`对象。\n\
    \n`AsynchronousServerSocketChannel`记录的套接字选项是`SO_RCVBUF`和`SO_REUSEADDR`。\n\n在获取`AsynchronousServerSocketChannel`对象后，你必须先调用`AsynchronousServerSocketChannel`的`bind()`方法之一，将此通道绑定到本地地址并配置其监听连接，然后才能调用其`accept()`方法。\n\
    \n在获取`AsynchronousSocketChannel`对象后，你必须先调用`AsynchronousSocketChannel`的`connect()`方法之一，将其连接到异步服务器套接字通道的套接字，然后才能执行读取和写入操作。\n\
    \n你可以通过调用`AsynchronousSocketChannel`的`getRemoteAddress()`方法来确定异步套接字通道是否已连接到异步服务器套接字通道；当通道的套接字未连接时，该方法返回`null`。\n\
    \n答案是 true：异步套接字通道可以被多个并发线程安全使用。\n\n`AsynchronousChannelGroup`类的目的是描述一组异步通道，以便进行资源共享。\n\
    \n一个组使用线程池来提交任务。\n\n用于配置默认组的系统属性是`java.nio.channels.DefaultThreadPool.threadFactory`和`java.nio.channels.DefaultThreadPool.initialSize`。\n\
    \n`void shutdownNow()`方法用于启动组的强制关闭。除了有序关闭所执行的操作外，`shutdownNow()`会关闭组中所有打开的通道，如同调用了每个通道的`close()`方法一样。\n\
    \n答案是 false：`AsynchronousFileChannel`不属于组。然而，它们与一个线程池相关联，任务被提交到该线程池，以处理 I/O 事件并分派给完成处理器，这些处理器消费通道上\
    \ I/O 操作的结果。\n\n清单 A-12 展示了第 13 章中要求的`Copy`应用程序。\n\n**清单 A-12. 异步复制源文件到目标文件**\n\
    \n```java\nimport java.io.IOException;\nimport java.nio.ByteBuffer;\nimport java.nio.channels.AsynchronousFileChannel;\n\
    import java.nio.channels.CompletionHandler;\nimport java.nio.file.Paths;\nimport\
    \ static java.nio.file.StandardOpenOption.*;\n\npublic class Copy\n{\n   final\
    \ static Thread THDMAIN = Thread.currentThread();\n\n   public static void main(String[]\
    \ args) throws IOException\n   {\n      if (args.length != 2)\n      {\n     \
    \    System.err.println(\"usage: java Copy src dest\");\n         return;\n  \
    \    }\n\n      copy(AsynchronousFileChannel.open(Paths.get(args[0])),\n     \
    \      AsynchronousFileChannel.open(Paths.get(args[1]), WRITE,\n             \
    \                           TRUNCATE_EXISTING, CREATE));\n      try\n      {\n\
    \         THDMAIN.join();\n      }\n      catch (InterruptedException ie)\n  \
    \    {\n         System.out.println(\"done\");\n      }\n   }\n\n   public static\
    \ void copy(AsynchronousFileChannel chSrc,\n                           AsynchronousFileChannel\
    \ chDest)\n   {\n      ByteBuffer buffer = ByteBuffer.allocate(8192);\n\n    \
    \  class ReadCompletionHandler implements CompletionHandler<Integer,\n       \
    \                                                        Integer>\n      {\n \
    \        @Override\n         public void completed(Integer result, Integer pos)\n\
    \         {\n            if (result == -1)\n            {\n               THDMAIN.interrupt();\n\
    \               return;\n            }\n\n            buffer.flip();\n       \
    \     chDest.write(buffer, pos, pos + result,\n                         new CompletionHandler<Integer,\
    \ Integer>()\n                         {\n                            @Override\n\
    \                            public void completed(Integer result,\n         \
    \                                         Integer newPos)\n                  \
    \          {\n                               buffer.compact();\n             \
    \                  chSrc.read(buffer, newPos, newPos,\n                      \
    \                    ReadCompletionHandler.this);\n                          \
    \  }\n\n                            @Override\n                            public\
    \ void failed(Throwable t, Integer pos)\n                            {\n     \
    \                          System.out.println(\"write failure\");\n          \
    \                     THDMAIN.interrupt();\n                            }\n  \
    \                       });\n         }\n\n         @Override\n         public\
    \ void failed(Throwable t, Integer pos)\n         {\n            System.out.println(\"\
    read failure\");\n            THDMAIN.interrupt();\n         }\n      }\n\n  \
    \    chSrc.read(buffer, 0, 0, new ReadCompletionHandler());\n   }\n}\n```"
  raw: 'An asynchronous channel supports asynchronous I/O operations (reads, writes,
    and so on).   The two ways to initiate an I/O operation with an asynchronous channel
    are as follows: call a method that returns a `Future` and call a method that takes
    a `CompletionHandler` argument.   The answer is false: after a channel is closed,
    further attempts to initiate asynchronous I/O operations complete immediately
    with cause `ClosedChannelException`.   The methods declared by the `AsynchronousByteChannel`
    interface are `Future<Integer> read(ByteBuffer dst)`, `<A> void read(ByteBuffer
    dst, A attachment, CompletionHandler<Integer,? super A> handler)`, `Future<Integer>
    write(ByteBuffer src)`, and `<A> void write(ByteBuffer src, A attachment, CompletionHandler<Integer,?
    super A> handler)`.   The answer is false: the [`ByteBuffer`](https://docs.oracle.com/javase/8/docs/api/java/nio/ByteBuffer.html#class%20in%20java.nio)
    object isn’t safe for use by multiple concurrent threads.   The class for reading,
    writing, and manipulating a file asynchronously is `AsynchronousFileChannel`.
      The answer is true: an asynchronous file channel doesn’t have a current position
    within a file.   If you pass no options to `AsynchronousFileChannel`’s [`AsynchronousFileChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#class%20in%20java.nio.channels)
    `open(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `file,` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `... options)` method, this method attempts to open an existing file.   You obtain
    an `AsynchronousServerSocketChannel` object or an `AsynchronousSocketChannel`
    object by calling either of each abstract class’s two `open()` methods.   `AsynchronousServerSocketChannel`’s
    documented socket options are `SO_RCVBUF` and `SO_REUSEADDR`.   After obtaining
    an `AsynchronousServerSocketChannel` object, you must bind this channel to a local
    address and configure it to listen for connections by invoking one of `AsynchronousServerSocketChannel`’s
    [`bind`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#bind-java.net.SocketAddress-int-)
    `()` methods before you can call either of its `accept()` methods.   After obtaining
    an `AsynchronousSocketChannel` object, you must connect it to the socket of an
    [asynchronous server socket channel](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#class%20in%20java.nio.channels)
    by invoking one of `AsynchronousSocketChannel`’s `connect()` methods before you
    can perform reads and writes.   You determine if an asynchronous socket channel
    is connected to an asynchronous server socket channel by calling `AsynchronousSocketChannel`’s
    `getRemoteAddress()` method, which returns `null` when the channel’s socket isn’t
    connected.   The answer is true: asynchronous socket channels are safe for use
    by multiple concurrent threads.   The purpose of the `AsynchronousChannelGroup`
    class is to describe a grouping of asynchronous channels for the purpose of resource
    sharing.   A group uses a thread pool for task submission.   The system properties
    for configuring the default group are `java.nio.channels.DefaultThreadPool.threadFactory`
    and `java.nio.channels.DefaultThreadPool.initialSize`.   The `void` `shutdownNow()`
    method is used to initiate a forceful shutdown of the group. In addition to the
    actions performed by an orderly shutdown, `shutdownNow()` closes all open channels
    in the group as if by invoking each channel’s `close()` method.   The answer is
    false: `AsynchronousFileChannel`s don’t belong to groups. However, they are associated
    with a thread pool to which tasks are submitted, to handle I/O events and to dispatch
    to completion handlers that consume the results of I/O operations on the channel.
      Listing [A-12](#A978-1-4842-1565-4_15_Chapter.html#FPar12) presents the `Copy`
    application that was called for in [Chapter 13](#A978-1-4842-1565-4_13_Chapter.html).
