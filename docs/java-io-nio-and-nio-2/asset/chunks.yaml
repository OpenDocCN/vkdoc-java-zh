- fmt: "### Externalization\n\nAlong with default serialization/deserialization and\
    \ custom serialization/deserialization, Java supports externalization. Unlike\
    \ default/custom serialization/deserialization, externalization offers complete\
    \ control over the serialization and deserialization tasks.\n\n**Note:** Externalization\
    \ helps you improve the performance of the reflection-based serialization and\
    \ deserialization mechanisms by giving you complete control over what fields are\
    \ serialized and deserialized.\n\nJava supports externalization via `java.io.Externalizable`.\
    \ This interface declares the following pair of `public` methods:\n\n- `void writeExternal(ObjectOutput\
    \ out)` saves the calling object’s contents by calling various methods on the\
    \ `out` object. This method throws `IOException` when an I/O error occurs. (`java.io.ObjectOutput`\
    \ is a subinterface of `DataOutput` and is implemented by `ObjectOutputStream`.)\n\
    - `void readExternal(ObjectInput in)` restores the calling object’s contents by\
    \ calling various methods on the `in` object. This method throws `IOException`\
    \ when an I/O error occurs and `ClassNotFoundException` when the class of the\
    \ object being restored cannot be found. (`java.io.ObjectInput` is a subinterface\
    \ of `DataInput` and is implemented by `ObjectInputStream`.)\n\nIf a class implements\
    \ `Externalizable`, its `writeExternal()` method is responsible for saving all\
    \ field values that are to be saved. Also, its `readExternal()` method is responsible\
    \ for restoring all saved field values and in the order they were saved.\n\nListing\
    \ 4-13 presents a refactored version of Listing 4-9’s `Employee` class to show\
    \ you how to take advantage of externalization.\n\n**Listing 4-13.** Refactoring\
    \ Listing 4-9’s `Employee` Class to Support Externalization\n\n```\nimport java.io.Externalizable;\n\
    import java.io.IOException;\nimport java.io.ObjectInput;\nimport java.io.ObjectOutput;\n\
    \npublic class Employee implements Externalizable\n{\n   private String name;\n\
    \   private int age;\n\n   public Employee()\n   {\n      System.out.println(\"\
    Employee() called\");\n   }\n\n   public Employee(String name, int age)\n   {\n\
    \      this.name = name;\n      this.age = age;\n   }\n\n   public String getName()\
    \ { return name; }\n   public int getAge() { return age; }\n\n   @Override\n \
    \  public void writeExternal(ObjectOutput out) throws IOException\n   {\n    \
    \  System.out.println(\"writeExternal() called\");\n      out.writeUTF(name);\n\
    \      out.writeInt(age);\n   }\n\n   @Override\n   public void readExternal(ObjectInput\
    \ in)\n      throws IOException, ClassNotFoundException\n   {\n      System.out.println(\"\
    readExternal() called\");\n      name = in.readUTF();\n      age = in.readInt();\n\
    \   }\n}\n```\n\n`Employee` declares a `public Employee()` constructor because\
    \ each class that participates in externalization must declare a `public` no-argument\
    \ constructor. The deserialization mechanism calls this constructor to instantiate\
    \ the object.\n\n**Caution:** The deserialization mechanism throws `InvalidClassException`\
    \ with a “no valid constructor” message when it doesn’t detect a `public` no-argument\
    \ constructor.\n\nInitiate externalization by instantiating `ObjectOutputStream`\
    \ and calling its `writeObject(Object)` method, or by instantiating `ObjectInputStream`\
    \ and calling its `readObject()` method.\n\n**Note:** When passing an object whose\
    \ class (directly/indirectly) implements `Externalizable` to `writeObject()`,\
    \ the `writeObject()`-initiated serialization mechanism writes only the identity\
    \ of the object’s class to the object output stream.\n\nSuppose you compiled Listing\
    \ 4-10’s `SerializationDemo.java` source code and Listing 4-13’s `Employee.java`\
    \ source code in the same directory. Now suppose you executed `java SerializationDemo`.\
    \ In response, you would observe the following output:\n\n```\nwriteExternal()\
    \ called\nEmployee() called\nreadExternal() called\nJohn Doe\n36\n```\n\nBefore\
    \ serializing an object, the serialization mechanism checks the object’s class\
    \ to see if it implements `Externalizable`. If so, the mechanism calls `writeExternal()`.\
    \ Otherwise, it looks for a private `writeObject(ObjectOutputStream)` method and\
    \ calls this method when present. When this method isn’t present, this mechanism\
    \ performs default serialization, which includes only non-`transient` instance\
    \ fields.\n\nBefore deserializing an object, the deserialization mechanism checks\
    \ the object’s class to see if it implements `Externalizable`. If so, the mechanism\
    \ attempts to instantiate the class via the `public` no-argument constructor.\
    \ Assuming success, it calls `readExternal()`.\n\nWhen the object’s class doesn’t\
    \ implement `Externalizable`, the deserialization mechanism looks for a private\
    \ `readObject(ObjectInputStream)` method. When this method isn’t present, this\
    \ mechanism performs default deserialization, which includes only non-`transient`\
    \ instance fields."
  raw: '#### Externalization


    Along with default serialization/deserialization and custom serialization/deserialization,
    Java supports externalization. Unlike default/custom serialization/deserialization,
    externalization offers complete control over the serialization and deserialization
    tasks.


    Note


    Externalization helps you improve the performance of the reflection-based serialization
    and deserialization mechanisms by giving you complete control over what fields
    are serialized and deserialized.


    Java supports externalization via `java.io.Externalizable`. This interface declares
    the following pair of `public` methods:


    *   `void writeExternal(ObjectOutput out)` saves the calling object’s contents
    by calling various methods on the `out` object. This method throws `IOException`
    when an I/O error occurs. (`java.io.ObjectOutput` is a subinterface of `DataOutput`
    and is implemented by `ObjectOutputStream`.)

    *   `void readExternal(ObjectInput in)` restores the calling object’s contents
    by calling various methods on the `in` object. This method throws `IOException`
    when an I/O error occurs and `ClassNotFoundException` when the class of the object
    being restored cannot be found. (`java.io.ObjectInput` is a subinterface of `DataInput`
    and is implemented by `ObjectInputStream`.)


    If a class implements `Externalizable`, its `writeExternal()` method is responsible
    for saving all field values that are to be saved. Also, its `readExternal()` method
    is responsible for restoring all saved field values and in the order they were
    saved.


    Listing [4-13](#A978-1-4842-1565-4_4_Chapter.html#FPar33) presents a refactored
    version of Listing [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23)’s `Employee`
    class to show you how to take advantage of externalization.


    Listing 4-13\. Refactoring Listing [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23)’s
    `Employee` Class to Support Externalization


    `import java.io.Externalizable;`


    `import java.io.IOException;`


    `import java.io.ObjectInput;`


    `import java.io.ObjectOutput;`


    `public class Employee implements Externalizable`


    `{`


    `private String name;`


    `private int age;`


    `public` `Employee()`


    `{`


    `System.out.println("Employee() called");`


    `}`


    `public Employee(String name, int age)`


    `{`


    `this.name = name;`


    `this.age = age;`


    `}`


    `public String getName() { return name; }`


    `public int getAge() { return age; }`


    `@Override`


    `public void writeExternal(ObjectOutput out) throws IOException`


    `{`


    `System.out.println("writeExternal() called");`


    `out.writeUTF(name);`


    `out.writeInt(age);`


    `}`


    `@Override`


    `public void readExternal(ObjectInput in)`


    `throws IOException, ClassNotFoundException`


    `{`


    `System.out.println("readExternal() called");`


    `name = in.readUTF();`


    `age = in.readInt();`


    `}`


    `}`


    `Employee` declares a `public Employee()` constructor because each class that
    participates in externalization must declare a `public` noargument constructor.
    The deserialization mechanism calls this constructor to instantiate the object.


    Caution


    The deserialization mechanism throws `InvalidClassException` with a “no valid
    constructor” message when it doesn’t detect a `public` noargument constructor.


    Initiate externalization by instantiating `ObjectOutputStream` and calling its
    `writeObject(Object)` method, or by instantiating `ObjectInputStream` and calling
    its `readObject()` method.


    Note


    When passing an object whose class (directly/indirectly) implements `Externalizable`
    to `writeObject()`, the `writeObject()`-initiated serialization mechanism writes
    only the identity of the object’s class to the object output stream.


    Suppose you compiled Listing [4-10](#A978-1-4842-1565-4_4_Chapter.html#FPar28)’s
    `SerializationDemo.java` source code and Listing [4-13](#A978-1-4842-1565-4_4_Chapter.html#FPar33)’s
    `Employee.java` source code in the same directory. Now suppose you executed `java
    SerializationDemo`. In response, you would observe the following output:


    `writeExternal() called`


    `Employee() called`


    `readExternal() called`


    `John Doe`


    `36`


    Before serializing an object, the serialization mechanism checks the object’s
    class to see if it implements `Externalizable`. If so, the mechanism calls `writeExternal()`.
    Otherwise, it looks for a private `writeObject(ObjectOutputStream)` method and
    calls this method when present. When this method isn’t present, this mechanism
    performs default serialization, which includes only non-`transient` instance fields.


    Before deserializing an object, the deserialization mechanism checks the object’s
    class to see if it implements `Externalizable`. If so, the mechanism attempts
    to instantiate the class via the `public` noargument constructor. Assuming success,
    it calls `readExternal()`.


    When the object’s class doesn’t implement `Externalizable`, the deserialization
    mechanism looks for a private `readObject(ObjectInputStream)` method. When this
    method isn’t present, this mechanism performs default deserialization, which includes
    only non-`transient` instance fields.'
  trans: '

    #### 外部化


    除了默认序列化/反序列化和自定义序列化/反序列化之外，Java 还支持外部化。与默认/自定义序列化/反序列化不同，外部化提供了对序列化和反序列化任务的完全控制。


    注意


    外部化通过让您完全控制哪些字段被序列化和反序列化，帮助您提升基于反射的序列化和反序列化机制的性能。


    Java 通过 `java.io.Externalizable` 支持外部化。该接口声明了以下一对 `public` 方法：


    *   `void writeExternal(ObjectOutput out)` 通过调用 `out` 对象上的各种方法来保存调用对象的内容。当发生 I/O
    错误时，此方法抛出 `IOException`。（`java.io.ObjectOutput` 是 `DataOutput` 的子接口，并由 `ObjectOutputStream`
    实现。）

    *   `void readExternal(ObjectInput in)` 通过调用 `in` 对象上的各种方法来恢复调用对象的内容。当发生 I/O 错误时，此方法抛出
    `IOException`；当找不到正在恢复的对象所属的类时，抛出 `ClassNotFoundException`。（`java.io.ObjectInput`
    是 `DataInput` 的子接口，并由 `ObjectInputStream` 实现。）


    如果一个类实现了 `Externalizable`，其 `writeExternal()` 方法负责保存所有需要保存的字段值。同时，其 `readExternal()`
    方法负责按照保存的顺序恢复所有已保存的字段值。


    清单 4-13 展示了清单 4-9 中 `Employee` 类的重构版本，向您展示如何利用外部化。


    清单 4-13\. 重构清单 4-9 中的 `Employee` 类以支持外部化


    `import java.io.Externalizable;`


    `import java.io.IOException;`


    `import java.io.ObjectInput;`


    `import java.io.ObjectOutput;`


    `public class Employee implements Externalizable`


    `{`


    `private String name;`


    `private int age;`


    `public` `Employee()`


    `{`


    `System.out.println("Employee() called");`


    `}`


    `public Employee(String name, int age)`


    `{`


    `this.name = name;`


    `this.age = age;`


    `}`


    `public String getName() { return name; }`


    `public int getAge() { return age; }`


    `@Override`


    `public void writeExternal(ObjectOutput out) throws IOException`


    `{`


    `System.out.println("writeExternal() called");`


    `out.writeUTF(name);`


    `out.writeInt(age);`


    `}`


    `@Override`


    `public void readExternal(ObjectInput in)`


    `throws IOException, ClassNotFoundException`


    `{`


    `System.out.println("readExternal() called");`


    `name = in.readUTF();`


    `age = in.readInt();`


    `}`


    `}`


    `Employee` 声明了一个 `public Employee()` 构造函数，因为每个参与外部化的类都必须声明一个 `public` 无参构造函数。反序列化机制会调用此构造函数来实例化对象。


    警告


    当反序列化机制未检测到 `public` 无参构造函数时，它会抛出带有“no valid constructor”消息的 `InvalidClassException`。


    通过实例化 `ObjectOutputStream` 并调用其 `writeObject(Object)` 方法，或者实例化 `ObjectInputStream`
    并调用其 `readObject()` 方法来启动外部化。


    注意


    当将类（直接/间接）实现了 `Externalizable` 的对象传递给 `writeObject()` 时，由 `writeObject()` 发起的序列化机制仅将对象类的标识写入对象输出流。


    假设您在同一个目录下编译了清单 4-10 的 `SerializationDemo.java` 源代码和清单 4-13 的 `Employee.java`
    源代码。现在假设您执行了 `java SerializationDemo`。作为响应，您将观察到以下输出：


    `writeExternal() called`


    `Employee() called`


    `readExternal() called`


    `John Doe`


    `36`


    在序列化对象之前，序列化机制会检查对象的类是否实现了 `Externalizable`。如果是，该机制会调用 `writeExternal()`。否则，它会查找私有的
    `writeObject(ObjectOutputStream)` 方法，如果存在则调用该方法。当此方法不存在时，该机制执行默认序列化，其中仅包含非 `transient`
    的实例字段。


    在反序列化对象之前，反序列化机制会检查对象的类是否实现了 `Externalizable`。如果是，该机制会尝试通过 `public` 无参构造函数实例化该类。假设成功，它会调用
    `readExternal()`。


    当对象的类未实现 `Externalizable` 时，反序列化机制会查找私有的 `readObject(ObjectInputStream)` 方法。当此方法不存在时，该机制执行默认反序列化，其中仅包含非
    `transient` 的实例字段。

    '
- fmt: '### `PrintStream`


    在所有流类中，`PrintStream`是一个异类：为了与命名约定保持一致，它本应被命名为`PrintOutputStream`。这个过滤输出流类将输入数据项的字符串表示形式写入底层输出流。


    注意


    `PrintStream`使用默认字符编码将字符串的字符转换为字节。（我将在[第5章](#A978-1-4842-1565-4_5_Chapter.html)介绍`Writer`和`Reader`时讨论字符编码。）由于`PrintStream`不支持不同的字符编码，你应该使用等效的`PrintWriter`类而不是`PrintStream`。然而，由于标准I/O的存在，你需要了解`PrintStream`。


    `PrintStream`实例是打印流，其各种`print()`和`println()`方法将整数、浮点值和其他数据项的字符串表示形式打印到底层输出流。与`print()`方法不同，`println()`方法会在其输出后追加一个行终止符。


    注意


    行终止符（也称为行分隔符）不一定是换行符（通常也称为换行）。相反，为了促进可移植性，行分隔符是由系统属性`line.separator`定义的字符序列。在Windows操作系统上，`System.getProperty("line.separator")`返回实际的回车码（13），符号表示为`\r`，后跟实际的换行码（10），符号表示为`\n`。相比之下，在Unix和Linux操作系统上，`System.getProperty("line.separator")`仅返回实际的换行码。


    `println()`方法会调用对应的`print()`方法，然后调用等效于`void println()`的方法，最终导致输出`line.separator`的值。例如，`void
    println(int x)`输出`x`的字符串表示，并调用此方法来输出行分隔符。


    警告


    切勿在将通过`print()`或`println()`方法输出的字符串字面量中硬编码`\n`转义序列。这样做不具备可移植性。例如，当Java执行`System.out.print("first
    line\n");`后跟`System.out.println("second line");`时，在Windows命令行中查看此输出时，你会看到`first
    line`在一行，随后`second line`在下一行。相反，在Windows记事本应用程序中查看此输出时，你会看到`first linesecond line`（因为记事本需要回车/换行序列来终止行）。当你需要输出一个空行时，最简单的方法是执行`System.out.println();`，这就是为什么你会在本书其他地方看到此方法调用。我承认我并非总是遵循自己的建议，因此你可能会在本书其他地方找到传递给`System.out.print()`或`System.out.println()`的字面量字符串中出现`\n`的实例。


    `PrintStream`还提供了其他三个你会觉得有用的特性：


    *   与其他输出流不同，打印流永远不会重新抛出从底层输出流抛出的`IOException`实例。相反，异常情况会设置一个内部标志，该标志可以通过调用`PrintStream`的`boolean
    checkError()`方法来测试，该方法返回`true`表示存在问题。

    *   `PrintStream`对象可以被创建为自动将其输出刷新到底层输出流。换句话说，在写入字节数组、调用某个`println()`方法或写入换行符后，会自动调用`flush()`方法。

    *   `PrintStream`声明了一个`PrintStream format(String format, Object... args)`方法，用于实现格式化输出。在幕后，此方法与我在[第11章](#A978-1-4842-1565-4_11_Chapter.html)中介绍的`Formatter`类协同工作。`PrintStream`还声明了一个`printf(String
    format, Object... args)`便捷方法，该方法委托给`format()`方法。例如，通过`out.printf(format, args)`调用`printf()`等同于调用`out.format(format,
    args)`。'
  raw: '### PrintStream


    Of all the stream classes, `PrintStream` is an oddball: it should have been named
    `PrintOutputStream` for consistency with the naming convention. This filter output
    stream class writes string representations of input data items to the underlying
    output stream.


    Note


    `PrintStream` uses the default character encoding to convert a string’s characters
    to bytes. (I’ll discuss character encodings when I introduce you to writers and
    readers in [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html).) Because `PrintStream`
    doesn’t support different character encodings, you should use the equivalent `PrintWriter`
    class instead of `PrintStream`. However, you need to know about `PrintStream`
    because of standard I/O.


    `PrintStream` instances are print streams whose various `print()` and `println()`
    methods print string representations of integers, floating-point values, and other
    data items to the underlying output stream. Unlike the `print()` methods, `println()`
    methods append a line terminator to their output.


    Note


    The line terminator (also known as line separator) isn’t necessarily the newline
    (also commonly referred to as line feed). Instead, to promote portability, the
    line separator is the sequence of characters defined by system property `line.separator`.
    On Windows operating systems, `System.getProperty("line.separator")` returns the
    actual carriage return code (13), which is symbolically represented by `\r`, followed
    by the actual newline/line feed code (10), which is symbolically represented by
    `\n`. In contrast, `System.getProperty("line.separator")` returns only the actual
    newline/line feed code on Unix and Linux operating systems.


    The `println()` methods call their corresponding `print()` methods followed by
    the equivalent of the `void println()` method, which eventually results in `line.separator`’s
    value being output. For example, `void println(int x)` outputs `x`’s string representation
    and calls this method to output the line separator.


    Caution


    Never hard-code the `\n` escape sequence in a string literal that you are going
    to output via a `print()` or `println()` method. Doing so isn’t portable. For
    example, when Java executes `System.out.print("first line\n");` followed by `System.out.println("second
    line");`, you will see `first line` on one line followed by `second line` on a
    subsequent line when this output is viewed at the Windows command line. In contrast,
    you’ll see `first linesecond line` when this output is viewed in the Windows Notepad
    application (which requires a carriage return/line feed sequence to terminate
    lines). When you need to output a blank line, the easiest way to do this is to
    execute `System.out.println();`, which is why you find this method call used elsewhere
    in my book. I confess that I don’t always follow my own advice, so you might find
    instances of `\n` in literal strings being passed to `System.out.print()` or `System.out.println()`
    elsewhere in this book.


    `PrintStream` offers three other features that you’ll find useful:


    *   Unlike other output streams, a print stream never rethrows an `IOException`
    instance thrown from the underlying output stream. Instead, exceptional situations
    set an internal flag that can be tested by calling `PrintStream`’s `boolean checkError()`
    method, which returns true to indicate a problem.

    *   `PrintStream` objects can be created to automatically flush their output to
    the underlying output stream. In other words, the `flush()` method is automatically
    called after a byte array is written, one of the `println()` methods is called,
    or a newline is written.

    *   `PrintStream` declares a `PrintStream format(String format, Object... args)`
    method for achieving formatted output. Behind the scene, this method works with
    the `Formatter` class that I introduce in [Chapter 11](#A978-1-4842-1565-4_11_Chapter.html).
    `PrintStream` also declares a `printf(String format, Object... args)` convenience
    method that delegates to the `format()` method. For example, invoking `printf()`
    via `out.printf(format, args)` is identical to invoking `out.format(format, args)`.'
