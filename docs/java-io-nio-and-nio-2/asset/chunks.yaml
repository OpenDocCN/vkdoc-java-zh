    ## 摘要


    文本处理应用程序通常需要将文本与模式进行匹配。NIO 包含正则表达式，可帮助这些应用程序以高性能执行模式匹配。Java 通过提供 `Pattern`、`PatternSyntaxException`
    和 `Matcher` 类来支持正则表达式。


    在本章中，你学习了 `Pattern`、`PatternSyntaxException` 和 `Matcher`。然后，你了解了字符类、捕获组、边界匹配器和零长度匹配以及量词。最后，你观察了一个正则表达式的实际用例：电话号码匹配。


    第 10 章介绍了 NIO 对字符集的支持。


    # 10. 字符集


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​10](http://dx.doi.org/10.1007/978-1-4842-1565-4_10))
    包含补充材料，仅供授权用户使用。


    在第 5 章中，我简要介绍了字符集和字符编码的概念。我还提到了位于 `java.nio.charset` 包中的一些类型。在本章中，我将深入探讨这些主题并研究这个包。我还将讨论
    `java.lang.String` 类中与这些主题相关的部分。


    ## 基础概念简要回顾


    Java 使用 Unicode 来表示字符。（Unicode 是一个 16 位字符集标准 [实际上，更像是一种编码标准，因为某些字符由多个数值表示；每个数值称为一个码点]，其目标是将世界上所有重要的字符集映射到一个包罗万象的映射表中。）尽管
    Unicode 使处理不同语言的字符变得更加容易，但它并不能自动化所有事情，你通常需要处理字符集。在深入探讨这个主题之前，你应该了解以下术语：


    *   **字符**：一个有意义的符号。例如，“$”和“E”都是字符。这些符号在计算机时代之前就已存在。

    *   **字符集**：一组字符。例如，大写字母 A 到 Z 可以被认为构成一个字符集。集合中的字符没有分配数值。它与 Unicode、ASCII、EBCDIC
    或任何其他类型的字符集标准无关。

    *   **编码字符集**：每个字符都被分配了一个唯一数值的字符集。诸如 US-ASCII 或 ISO-8859-1 之类的标准机构定义了从字符到数值的映射。

    *   **字符编码方案**：对编码字符集的数值进行编码，以形成表示这些数值的字节序列的编码方式。某些编码是一对一的。例如，在 ASCII 中，字符 A 映射为整数
    65，并编码为整数 65。对于其他一些映射，编码可以是一对一或一对多的。例如，UTF-8 对 Unicode 字符进行编码。每个数值小于 128 的字符被编码为单个字节，以与
    ASCII 兼容。其他 Unicode 字符被编码为二到六字节的序列。更多信息请参见 [`www.ietf.org/rfc/rfc2279.txt`](http://www.ietf.org/rfc/rfc2279.txt)。

    *   **字符集**：一个编码字符集与一个字符编码方案的组合。字符集由抽象的 `java.nio.charset.Charset` 类描述。


    尽管 Unicode 被广泛使用且日益流行，但其他字符集标准也在使用中。由于操作系统在字节级别执行 I/O，并且文件将数据存储为字节序列，因此有必要在字节序列和编码到这些序列中的字符之间进行转换。`Charset`
    和位于 `java.nio.charset` 包中的其他类负责处理此转换任务。


    ## 使用字符集


    从 JDK 1.4 开始，Java 虚拟机 (JVM) 被要求支持一组标准的字符集，并且可以支持额外的字符集。它们还支持默认字符集，该字符集不必是标准字符集之一，并且在
    JVM 启动时获取。表 10-1 标识并描述了标准字符集。


    表 10-1. 标准字符集


    | 字符集名称 | 描述 |

    | --- | --- |

    | `US-ASCII` | 七位 ASCII，构成美式英语字符集。在 Unicode 中也称为基本拉丁块。 |

    | `ISO-8859-1` | 大多数欧洲语言使用的 8 位字符集。它是 ASCII 的超集，并包含大多数非英语欧洲字符。 |

    | `UTF-8` | 一种面向 8 位字节的 Unicode 字符编码。字符被编码为一到六个字节。 |

    | `UTF-16BE` | 一种使用大端序的 16 位 Unicode 编码。字符被编码为两个字节，高位八位先写入。 |

    | `UTF-16LE` | 一种使用小端序的 16 位 Unicode 编码。字符被编码为两个字节，低位八位先写入。 |

    | `UTF-16` | 一种 16 位编码，其字节顺序由可选的字节顺序标记决定。 |


    字符集名称不区分大小写，并由互联网号码分配局 (IANA) 维护。表 10-1 中的名称包含在 IANA 的官方注册表中。


    `UTF-16BE` 和 `UTF-16LE` 分别以大端序或小端序将每个字符编码为两个字节的序列。`UTF-16BE` 或 `UTF-16LE` 编码字节序列的解码器需要知道字节序列是如何编码的，或者有一种方法可以从编码数据中检测字节顺序。相比之下，`UTF-16`
    依赖于出现在序列开头的字节顺序标记。如果此标记不存在，则解码将按照 `UTF-16BE`（Java 的本机字节顺序）进行。如果此标记等于 `\uFEFF`，则序列按照
    `UTF-16BE` 解码。如果此标记等于 `\uFFFE`，则序列按照 `UTF-16LE` 解码。


    每个字符集名称都与一个 `Charset` 对象关联，你可以通过调用该类的工厂方法之一来获取该对象。清单 10-1 展示了一个应用程序，演示了如何使用此类获取默认字符集和标准字符集，然后使用它们将字符编码为字节序列。


    清单 10-1. 使用字符集将字符编码为字节序列


    `import java.nio.ByteBuffer;`


    `import java.nio.charset.Charset;`


    `public class CharsetDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `String msg = "façade touché";`


    `String[] csNames =`


    `{`


    `"US-ASCII",`


    `"ISO-8859-1",`


    `"UTF-8",`


    `"UTF-16BE",`


    `"UTF-16LE",`


    `"UTF-16"`


    `};`


    `encode(msg, Charset.defaultCharset());`


    `for (String csName: csNames)`


    `encode(msg, Charset.forName(csName));`


    `}`


    `static void encode(String msg, Charset cs)`


    `{`


    `System.out.println("Charset: " + cs.toString());`


    `System.out.println("Message: " + msg);`


    `ByteBuffer buffer = cs.encode(msg);`


    `System.out.println("Encoded: ");`


    `for (int i = 0; buffer.hasRemaining(); i++)`


    `{`


    `int _byte = buffer.get() & 255;`


    `char ch = (char) _byte;`


    `if (Character.isWhitespace(ch) || Character.isISOControl(ch))`


    `ch = ’\u0000’;`


    `System.out.printf("%2d: %02x (%c)%n", i, _byte, ch);`


    `}`


    `System.out.println();`


    `}`


    `}`


    清单 10-1 的 `main()` 方法首先创建一条由两个法语单词组成的消息和一个标准字符集集合的名称数组。接下来，它调用 `encode()` 方法，根据默认字符集对消息进行编码，该默认字符集通过调用
    `Charset` 的 `Charset defaultCharset()` 工厂方法获得。

    '
- fmt: 'Continuing, `main()` invokes `encode()` for each of the standard charsets.
    `Charset`''s `Charset.forName(String charsetName)` factory method is used to obtain
    the `Charset` instance that corresponds to `charsetName`.


    **Caution**


    `forName()` throws `java.nio.charset.IllegalCharsetNameException` when the specified
    charset name is illegal and throws `java.nio.charset.UnsupportedCharsetException`
    when the desired charset isn''t supported by the JVM.


    The `encode()` method first identifies the charset and the message. It then invokes
    `Charset`''s `ByteBuffer encode(String s)` method to return a new `java.nio.ByteBuffer`
    object containing the bytes that encode the characters from `s`.


    `main()` next iterates over the bytes in the byte buffer, converting each byte
    to a character. It uses `java.lang.Character`''s `isWhitespace()` and `isISOControl()`
    methods to determine if the character is whitespace or a control character (neither
    is regarded as printable) and converts such a character to Unicode `0` (an empty
    string). (A carriage return or newline would screw up the output, for example.)


    Finally, the index of the character, its hexadecimal value, and the character
    itself are printed to the standard output stream. I chose to use `System.out.printf()`
    for this task. You''ll learn about this method in the next chapter.


