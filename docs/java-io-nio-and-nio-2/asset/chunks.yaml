    \ on default serialization and deserialization (with the exception of marking\
    \ an instance field `transient` to prevent it from being included during serialization).\
    \ However, situations arise where you need to customize these tasks.\n\nFor example,\
    \ suppose you want to serialize instances of a class that doesn’t implement `Serializable`.\
    \ As a workaround, you subclass this other class, have the subclass implement\
    \ `Serializable`, and forward the subclass constructor calls to the superclass.\n\
    \nAlthough this workaround lets you serialize subclass objects, you cannot deserialize\
    \ these serialized objects when the superclass doesn’t declare a noargument constructor,\
    \ which is required by the deserialization mechanism. Listing [4-11](#A978-1-4842-1565-4_4_Chapter.html#FPar30)\
    \ demonstrates this problem.\n\n**Listing 4-11.** Problematic Deserialization\n\
    \n```\nimport java.io.FileInputStream;\nimport java.io.FileOutputStream;\nimport\
    \ java.io.IOException;\nimport java.io.ObjectInputStream;\nimport java.io.ObjectOutputStream;\n\
    import java.io.Serializable;\n\nclass Employee\n{\n   private String name;\n\n\
    \   Employee(String name)\n   {\n      this.name = name;\n   }\n\n   @Override\n\
    \   public String toString()\n   {\n      return name;\n   }\n}\n\nclass SerEmployee\
    \ extends Employee implements Serializable\n{\n   SerEmployee(String name)\n \
    \  {\n      super(name);\n   }\n}\n\npublic class SerializationDemo\n{\n   public\
    \ static void main(String[] args)\n   {\n      ObjectOutputStream oos = null;\n\
    \      ObjectInputStream ois = null;\n      try\n      {\n         oos = new ObjectOutputStream(new\
    \ FileOutputStream(\"employee.dat\"));\n         SerEmployee se = new SerEmployee(\"\
    John Doe\");\n         System.out.println(se);\n         oos.writeObject(se);\n\
    \         oos.close();\n         oos = null;\n         System.out.println(\"se\
    \ object written to file\");\n         ois = new ObjectInputStream(new FileInputStream(\"\
    employee.dat\"));\n         se = (SerEmployee) ois.readObject();\n         System.out.println(\"\
    se object read from file\");\n         System.out.println(se);\n      }\n    \
    \  catch (ClassNotFoundException cnfe)\n      {\n         cnfe.printStackTrace();\n\
    \      }\n      catch (IOException ioe)\n      {\n         ioe.printStackTrace();\n\
    \      }\n      finally\n      {\n         if (oos != null)\n            try\n\
    \            {\n               oos.close();\n            }\n            catch\
    \ (IOException ioe)\n            {\n               assert false; // shouldn’t\
    \ happen in this context\n            }\n         if (ois != null)\n         \
    \   try\n            {\n               ois.close();\n            }\n         \
    \   catch (IOException ioe)\n            {\n               assert false; // shouldn’t\
    \ happen in this context\n            }\n      }\n   }\n}\n```\n\nListing [4-11](#A978-1-4842-1565-4_4_Chapter.html#FPar30)’s\
    \ `main()` method instantiates `SerEmployee` with an employee name. This class’s\
    \ `SerEmployee(String)` constructor passes this argument to its `Employee` counterpart.\n\
    \n`main()` next calls `Employee`’s `toString()` method indirectly via `System.out.println()`,\
    \ to obtain this name, which is then output.\n\nContinuing, `main()` serializes\
    \ the `SerEmployee` instance to an `employee.dat` file via `writeObject()`. It\
    \ then attempts to deserialize this object via `readObject()`, and this is where\
    \ the trouble occurs, as revealed by the following output:\n\n```\nJohn Doe\n\
    se object written to file\njava.io.InvalidClassException: SerEmployee; no valid\
    \ constructor\n\tat java.io.ObjectStreamClass$ExceptionInfo.newInvalidClassException(ObjectStreamClass.java:150)\n\
    \tat java.io.ObjectStreamClass.checkDeserialize(ObjectStreamClass.java:768)\n\t\
