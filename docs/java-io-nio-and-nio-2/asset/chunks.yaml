- fmt: "# Setting and Getting Permissions\n\nJava 1.2 added a `boolean` `setReadOnly()`\
    \ method to the `File` class to mark a file or directory as read-only. However,\
    \ a method to revert the file or directory to the writable state wasn’t added.\
    \ More importantly, until Java 6’s arrival, `File` offered no way to manage an\
    \ abstract path’s read, write, and execute permissions.\n\nJava 6 added to the\
    \ `File` class `boolean setExecutable(boolean executable)`, `boolean setExecutable(boolean\
    \ executable, boolean ownerOnly)`, `boolean setReadable(boolean readable)`, `boolean\
    \ setReadable(boolean readable, boolean ownerOnly)`, `boolean setWritable(boolean\
    \ writable)`, and `boolean setWritable(boolean writable, boolean ownerOnly)` methods\
    \ that let you set the owner’s or everybody’s execute, read, and write permissions\
    \ for the file identified by the `File` object’s abstract path:\n\n* `boolean\
    \ setExecutable(boolean executable, boolean ownerOnly)` enables (pass `true` to\
    \ `executable`) or disables (pass `false` to `executable`) this abstract path’s\
    \ execute permission for its owner (pass `true` to `ownerOnly`) or everyone (pass\
    \ `false` to `ownerOnly`). When the file system doesn’t differentiate between\
    \ the owner and everyone, this permission always applies to everyone. It returns\
    \ `true` when the operation succeeds. It returns `false` when the user doesn’t\
    \ have permission to change this abstract path’s access permissions or when `executable`\
    \ is `false` and the file system doesn’t implement an execute permission.\n* `boolean\
    \ setExecutable(boolean executable)` is a convenience method that invokes the\
    \ previous method to set the execute permission for the owner.\n* `boolean setReadable(boolean\
    \ readable, boolean ownerOnly)` enables (pass `true` to `readable`) or disables\
    \ (pass `false` to `readable`) this abstract path’s read permission for its owner\
    \ (pass `true` to `ownerOnly`) or everyone (pass `false` to `ownerOnly`). When\
    \ the file system doesn’t differentiate between the owner and everyone, this permission\
    \ always applies to everyone. It returns `true` when the operation succeeds. It\
    \ returns `false` when the user doesn’t have permission to change this abstract\
    \ path’s access permissions or when `readable` is `false` and the file system\
    \ doesn’t implement a read permission.\n* `boolean setReadable(boolean readable)`\
    \ is a convenience method that invokes the previous method to set the read permission\
    \ for the owner.\n* `boolean setWritable(boolean writable, boolean ownerOnly)`\
    \ enables (pass `true` to `writable`) or disables (pass `false` to `writable`)\
    \ this abstract path’s write permission for its owner (pass `true` to `ownerOnly`)\
    \ or everyone (pass `false` to `ownerOnly`). When the file system doesn’t differentiate\
    \ between the owner and everyone, this permission always applies to everyone.\
    \ It returns `true` when the operation succeeds. It returns `false` when the user\
    \ doesn’t have permission to change this abstract path’s access permissions.\n\
    * `boolean setWritable(boolean writable)` is a convenience method that invokes\
    \ the previous method to set the write permission for the owner.\n\nAlong with\
    \ these methods, Java 6 retrofitted `File`’s `boolean canRead()` and `boolean\
    \ canWrite()` methods, and introduced a `boolean canExecute()` method to return\
    \ an abstract path’s access permissions. These methods return `true` when the\
    \ file or directory object identified by the abstract path exists and when the\
    \ appropriate permission is in effect. For example, `canWrite()` returns `true`\
    \ when the abstract path exists and when the application has permission to write\
    \ to the file.\n\nThe `canRead()`, `canWrite()`, and `canExecute()` methods can\
    \ be used to implement a simple utility that identifies which permissions have\
    \ been assigned to an arbitrary file or directory. This utility’s source code\
    \ is presented in Listing 2-7.\n\n**Listing 2-7.** Checking a File’s or Directory’s\
    \ Permissions\n\n```\nimport java.io.File;\n\npublic class Permissions\n{\n  \
    \ public static void main(String[] args)\n   {\n      if (args.length != 1)\n\
    \      {\n         System.err.println(\"usage: java Permissions filespec\");\n\
    \         return;\n      }\n\n      File file = new File(args[0]);\n\n      System.out.println(\"\
    Checking permissions for \" + args[0]);\n      System.out.println(\"  Execute\
    \ = \" + file.canExecute());\n      System.out.println(\"  Read = \" + file.canRead());\n\
    \      System.out.println(\"  Write = \" + file.canWrite());\n   }\n}\n```\n\n\
    Compile Listing 2-7 as follows:\n\n```\njavac Permissions.java\n```\n\nAssuming\
    \ a readable and executable (only) file named `x` in the current directory, run\
    \ the resulting application as follows:\n\n```\njava Permissions x\n```\n\nYou\
    \ should observe the following output:\n\n```\nChecking permissions for x\nExecute\
    \ = true\nRead = true\nWrite = false\n```"
  raw: '## Setting and Getting Permissions


    Java 1.2 added a `boolean` `setReadOnly()` method to the `File` class to mark
    a file or directory as read-only. However, a method to revert the file or directory
    to the writable state wasn’t added. More importantly, until Java 6’s arrival,
    `File` offered no way to manage an abstract path’s read, write, and execute permissions.


    Java 6 added to the `File` class `boolean setExecutable(boolean executable)`,
    `boolean setExecutable(boolean executable, boolean ownerOnly)`, `boolean setReadable(boolean
    readable)`, `boolean setReadable(boolean readable, boolean ownerOnly)`, `boolean
    setWritable(boolean writable)`, and `boolean setWritable(boolean writable, boolean
    ownerOnly)` methods that let you set the owner’s or everybody’s execute, read,
    and write permissions for the file identified by the `File` object’s abstract
    path:


    *   `boolean setExecutable` `(boolean executable, boolean ownerOnly)` enables
    (pass `true` to `executable`) or disables (pass `false` to `executable`) this
    abstract path’s execute permission for its owner (pass `true` to `ownerOnly`)
    or everyone (pass `false` to `ownerOnly`). When the file system doesn’t differentiate
    between the owner and everyone, this permission always applies to everyone. It
    returns `true` when the operation succeeds. It returns `false` when the user doesn’t
    have permission to change this abstract path’s access permissions or when `executable`
    is `false` and the file system doesn’t implement an execute permission.

    *   `boolean setExecutable(boolean executable)` is a convenience method that invokes
    the previous method to set the execute permission for the owner.

    *   `boolean setReadable` `(boolean readable, boolean ownerOnly)` enables (pass
    `true` to `readable`) or disables (pass `false` to `readable`) this abstract path’s
    read permission for its owner (pass `true` to `ownerOnly`) or everyone (pass `false`
    to `ownerOnly`). When the file system doesn’t differentiate between the owner
    and everyone, this permission always applies to everyone. It returns `true` when
    the operation succeeds. It returns `false` when the user doesn’t have permission
    to change this abstract path’s access permissions or when `readable` is `false`
    and the file system doesn’t implement a read permission.

    *   `boolean setReadable(boolean readable)` is a convenience method that invokes
    the previous method to set the read permission for the owner.

    *   `boolean setWritable` `(boolean writable, boolean ownerOnly)` enables (pass
    `true` to `writable`) or disables (pass `false` to `writable`) this abstract path’s
    write permission for its owner (pass `true` to `ownerOnly`) or everyone (pass
    `false` to `ownerOnly`). When the file system doesn’t differentiate between the
    owner and everyone, this permission always applies to everyone. It returns `true`
    when the operation succeeds. It returns `false` when the user doesn’t have permission
    to change this abstract path’s access permissions.

    *   `boolean setWritable(boolean writable)` is a convenience method that invokes
    the previous method to set the write permission for the owner.


    Along with these methods, Java 6 retrofitted `File`’s `boolean canRead()` and
    `boolean canWrite()` methods, and introduced a `boolean canExecute()` method to
    return an abstract path’s access permissions. These methods return `true` when
    the file or directory object identified by the abstract path exists and when the
    appropriate permission is in effect. For example, `canWrite()` returns `true`
    when the abstract path exists and when the application has permission to write
    to the file.


    The `canRead()`, `canWrite()`, and `canExecute()` methods can be used to implement
    a simple utility that identifies which permissions have been assigned to an arbitrary
    file or directory. This utility’s source code is presented in Listing [2-7](#A978-1-4842-1565-4_2_Chapter.html#FPar15).


    Listing 2-7\. Checking a File’s or Directory’s Permissions


    `import java.io.File;`


    `public class Permissions`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java Permissions filespec");`


    `return;`


    `}`


    `File file = new File(args[0]);`


    `System.out.println("Checking permissions for " + args[0]);`


    `System.out.println("  Execute = " + file.canExecute());`


    `System.out.println("  Read = " + file.canRead());`


    `System.out.println("  Write = " + file.canWrite());`


    `}`


    `}`


    Compile Listing [2-7](#A978-1-4842-1565-4_2_Chapter.html#FPar15) as follows:


    `javac Permissions.java`


    Assuming a readable and executable (only) file named `x` in the current directory,
    run the resulting application as follows:


    `java Permissions x`


    You should observe the following output:


    `Checking permissions for x`


    `Execute = true`


    `Read = true`


    `Write = false`'
  trans: '

    ## 设置与获取权限


    Java 1.2 为 `File` 类添加了一个 `boolean` 类型的 `setReadOnly()` 方法，用于将文件或目录标记为只读。然而，并未添加将文件或目录恢复为可写状态的方法。更重要的是，在
    Java 6 到来之前，`File` 类没有提供任何方式来管理抽象路径的读取、写入和执行权限。


    Java 6 为 `File` 类添加了 `boolean setExecutable(boolean executable)`、`boolean setExecutable(boolean
    executable, boolean ownerOnly)`、`boolean setReadable(boolean readable)`、`boolean
    setReadable(boolean readable, boolean ownerOnly)`、`boolean setWritable(boolean
    writable)` 以及 `boolean setWritable(boolean writable, boolean ownerOnly)` 方法。这些方法允许你为
    `File` 对象抽象路径所标识的文件，设置所有者或所有用户的执行、读取和写入权限：


    *   `boolean setExecutable(boolean executable, boolean ownerOnly)` 启用（向 `executable`
    传入 `true`）或禁用（向 `executable` 传入 `false`）此抽象路径对其所有者（向 `ownerOnly` 传入 `true`）或所有用户（向
    `ownerOnly` 传入 `false`）的执行权限。当文件系统不区分所有者与所有用户时，此权限始终适用于所有用户。操作成功时返回 `true`。当用户没有权限更改此抽象路径的访问权限，或者当
    `executable` 为 `false` 且文件系统未实现执行权限时，返回 `false`。

    *   `boolean setExecutable(boolean executable)` 是一个便捷方法，它调用前一个方法来为所有者设置执行权限。

    *   `boolean setReadable(boolean readable, boolean ownerOnly)` 启用（向 `readable`
    传入 `true`）或禁用（向 `readable` 传入 `false`）此抽象路径对其所有者（向 `ownerOnly` 传入 `true`）或所有用户（向
    `ownerOnly` 传入 `false`）的读取权限。当文件系统不区分所有者与所有用户时，此权限始终适用于所有用户。操作成功时返回 `true`。当用户没有权限更改此抽象路径的访问权限，或者当
    `readable` 为 `false` 且文件系统未实现读取权限时，返回 `false`。

    *   `boolean setReadable(boolean readable)` 是一个便捷方法，它调用前一个方法来为所有者设置读取权限。

    *   `boolean setWritable(boolean writable, boolean ownerOnly)` 启用（向 `writable`
    传入 `true`）或禁用（向 `writable` 传入 `false`）此抽象路径对其所有者（向 `ownerOnly` 传入 `true`）或所有用户（向
    `ownerOnly` 传入 `false`）的写入权限。当文件系统不区分所有者与所有用户时，此权限始终适用于所有用户。操作成功时返回 `true`。当用户没有权限更改此抽象路径的访问权限时，返回
    `false`。

    *   `boolean setWritable(boolean writable)` 是一个便捷方法，它调用前一个方法来为所有者设置写入权限。


    除了这些方法，Java 6 还改进了 `File` 的 `boolean canRead()` 和 `boolean canWrite()` 方法，并引入了
    `boolean canExecute()` 方法来返回抽象路径的访问权限。当抽象路径标识的文件或目录对象存在，并且相应的权限生效时，这些方法返回 `true`。例如，当抽象路径存在且应用程序拥有对该文件的写入权限时，`canWrite()`
    返回 `true`。


    `canRead()`、`canWrite()` 和 `canExecute()` 方法可用于实现一个简单的工具，用于识别已分配给任意文件或目录的权限。该工具的源代码如清单
    2-7 所示。


    **清单 2-7.** 检查文件或目录的权限


    `import java.io.File;`


    `public class Permissions`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java Permissions filespec");`


    `return;`


    `}`


    `File file = new File(args[0]);`


    `System.out.println("Checking permissions for " + args[0]);`


    `System.out.println("  Execute = " + file.canExecute());`


    `System.out.println("  Read = " + file.canRead());`


    `System.out.println("  Write = " + file.canWrite());`


    `}`


    `}`


    按如下方式编译清单 2-7：


    `javac Permissions.java`


    假设当前目录下有一个名为 `x` 的可读且可执行（仅此权限）的文件，按如下方式运行生成的应用程序：


    `java Permissions x`


    你应该会看到以下输出：


    `Checking permissions for x`


    `Execute = true`


    `Read = true`


    `Write = false`

