    \ ASCII, character A is mapped to integer 65 and encoded as integer 65. For some\
    \ other mappings, encodings are one-to-one or one-to-many. For example, UTF-8\
    \ encodes Unicode characters. Each character whose numeric value is less than\
    \ 128 is encoded as a single byte to be compatible with ASCII. Other Unicode characters\
