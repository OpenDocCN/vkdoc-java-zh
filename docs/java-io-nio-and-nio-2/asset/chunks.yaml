- fmt: "### Matching Paths\n\nWe commonly take advantage of pattern matching to filter\
    \ out those entries of interest when obtaining a directory listing. For example,\
    \ we might specify `ls -l *.html` (Unix/Linux) or `dir *.html` to obtain a list\
    \ of those files whose extension is `.html`.\n\nNIO.2 provides `java.nio.file.PathMatcher`\
    \ to support the pattern matching of paths. This interface declares a single method:\n\
    \n`boolean matches(Path path)`\n\n`matches()` compares its `path` argument with\
    \ the `PathMatcher`’s current pattern. It returns `true` when there is a match;\
    \ otherwise, it returns `false`.\n\n`FileSystem`’s `PathMatcher getPathMatcher(String\
    \ syntaxAndPattern)` method returns a `PathMatcher` object for matching paths\
    \ against the pattern described by `syntaxAndPattern`, which identifies a pattern\
    \ language (`syntax`) and a pattern (`pattern`) via this syntax:\n\n`syntax:pattern`\n\
    \nTwo pattern languages are supported: `regex` and `glob`. When you specify `regex`\
    \ for `syntax`, you can specify any regular expression for `pattern`. For example,\
    \ you might specify `regex:([^\\s]+(\\.(?i)(png|jpg))$)` to match all files with\
    \ `.png` and `.jpg` extensions. (Chapter 9 covers regular expressions.)\n\nAlternatively,\
    \ you can specify `glob` for syntax. The `glob` pattern language is more limited\
    \ than `regex`; it resembles regular expressions with a simpler syntax. The JDK\
    \ documentation offers several examples of `glob` expressions, which I repeat\
    \ here:\n\n- `*.java`: Match a path that represents a file name ending in `.java`.\n\
    - `*.*`: Match file names containing a period character.\n- `*.{java,class}`:\
    \ Match file names ending with `.java` or `.class`.\n- `foo.?`: Match file names\
    \ starting with `foo.` and a single character extension.\n- `/home/*/*`: Match\
    \ Unix-like paths such as `/home/gus/data`.\n- `/home/**`: Match Unix-like paths\
    \ such as `/home/gus` and `/home/gus/data`.\n- `C:\\\\*`: Match Windows-like paths\
    \ such as `C:\\foo` and `C:\\bar`. (The backslash is escaped. As a Java string\
    \ literal, the pattern would be `\"C:\\\\\\\\*\"`.)\n\nThe JDK documentation also\
    \ identifies several rules for interpreting `glob` patterns. I repeat these rules\
    \ here:\n\n- The `*` character matches zero or more characters of a name element\
    \ without crossing directory boundaries.\n- The `**` characters match zero or\
    \ more characters crossing directory boundaries.\n- The `?` character matches\
    \ exactly one character of a name element.\n- The backslash character (`\\`) is\
    \ used to escape characters that would otherwise be interpreted as special characters.\
    \ For example, the expression `\\\\` matches a single backslash and the expression\
    \ `\\{` matches a left brace.\n- The `[` and `]` characters delimit a bracket\
    \ expression that matches a single character of a name element out of a set of\
    \ characters. For example, `[abc]` matches `a`, `b`, or `c`. The hyphen (`-`)\
    \ may be used to specify a range, so `[a-z]` specifies a range that matches from\
    \ `a` to `z` (inclusive). These forms can be mixed, so `[abce-g]` matches `a`,\
    \ `b`, `c`, `e`, `f`, or `g`. If the character after the `[` is a `!`, the `!`\
    \ is used for negation, so `[!a-c]` matches any character except for `a`, `b`,\
    \ or `c`.\n- Within a bracket expression, the `*`, `?`, and `\\` characters match\
    \ themselves. The hyphen matches itself when it’s the first character in the brackets,\
    \ or when it’s the first character after the `!` when negating.\n- The `{` and\
    \ `}` characters identify a group of subpatterns, where the group matches when\
    \ any subpattern in the group matches. The comma is used to separate the subpatterns.\
    \ Groups cannot be nested.\n- Leading period/dot characters in file names are\
    \ treated as regular characters in match operations. For example, the `* glob`\
    \ pattern matches file name `.login`.\n- All other characters match themselves\
    \ in an implementation-dependent manner. This includes characters representing\
    \ any name separators.\n- The matching of root elements is highly implementation-dependent\
    \ and is not specified.\n\nListing 12-50 shows you how to obtain a `PathMatcher`\
    \ object and use this object to match paths.\n\n**Listing 12-50.** Demonstrating\
    \ `Path`-Matching\n\n```\nimport java.nio.file.FileSystem;\nimport java.nio.file.FileSystems;\n\
    import java.nio.file.Path;\nimport java.nio.file.PathMatcher;\n\npublic class\
    \ PathMatcherDemo\n{\n   public static void main(String[] args)\n   {\n      if\
    \ (args.length != 2)\n      {\n         System.err.println(\"usage: java PatchMatcherDemo\
    \ \" +\n                            \"syntax:pattern path\");\n         return;\n\
    \      }\n\n      FileSystem fsDefault = FileSystems.getDefault();\n      PathMatcher\
    \ pm = fsDefault.getPathMatcher(args[0]);\n\n      if (pm.matches(fsDefault.getPath(args[1])))\n\
    \         System.out.printf(\"%s matches pattern%n\", args[1]);\n      else\n\
    \         System.out.printf(\"%s doesn’t match pattern%n\", args[1]);\n   }\n\
    }\n```\n\nCompile Listing 12-50 as follows:\n\n`javac PathMatcherDemo.java`\n\n\
    Run the resulting application as follows:\n\n`java PathMatcherDemo glob:*.java\
    \ PathMatcherDemo.java`\n\nYou should observe the following output:\n\n`PathMatcherDemo.java\
    \ matches pattern`\n\nNow, run the application as follows:\n\n`java PathMatcherDemo\
    \ glob:*.java PathMatcherDemo.txt`\n\nThis time, you should observe the following\
    \ output:\n\n`PathMatcherDemo.txt doesn’t match pattern`\n\nWhile you’re trying\
    \ out this application, execute the following command line:\n\n`java PathMatcherDemo\
    \ \"regex:([^\\s]+(\\.(?i)(png|jpg))$)\" figure1.jpg`\n\nThe double quotes surrounding\
    \ `regex:([^\\s]+(\\.(?i)(png|jpg))$)` are necessary on Windows. You should observe\
    \ the following output:\n\n`figure1.jpg matches pattern`\n\nYou would observe\
    \ similar output for a second argument of `figure1.png`. However, you would observe\
    \ that `figure1.gif` doesn’t match the pattern."
  raw: '### Matching Paths


    We commonly take advantage of pattern matching to filter out those entries of
    interest when obtaining a directory listing. For example, we might specify `ls
    -l *.html` (Unix/Linux) or `dir *.html` to obtain a list of those files whose
    extension is `.html`.


    NIO.2 provides `java.nio.file.PathMatcher` to support the pattern matching of
    paths. This interface declares a single method:


    `boolean matches(Path path)`


    `matches()` compares its `path` argument with the `PathMatcher`’s current pattern.
    It returns `true` when there is a match; otherwise, it returns `false`.


    `FileSystem`’s `PathMatcher getPathMatcher(String syntaxAndPattern)` method returns
    a `PathMatcher` object for matching paths against the pattern described by `syntaxAndPattern`,
    which identifies a pattern language (`syntax`) and a pattern (`pattern`) via this
    syntax:


    `syntax:pattern`


    Two pattern languages are supported: `regex` and `glob`. When you specify `regex`
    for `syntax`, you can specify any regular expression for `pattern`. For example,
    you might specify `regex:([^\s]+(\.(?i)(png|jpg))$)` to match all files with `.png`
    and `.jpg` extensions. ([Chapter 9](#A978-1-4842-1565-4_9_Chapter.html) covers
    regular expressions.)


    Alternatively, you can specify `glob` for syntax. The `glob` pattern language
    is more limited than `regex`; it resembles regular expressions with a simpler
    syntax. The JDK documentation offers several examples of `glob` expressions, which
    I repeat here:


    *   `*.java`: Match a path that represents a file name ending in `.java`.

    *   `*.*`: Match file names containing a period character.

    *   `*.{java,class}`: Match file names ending with `.java` or `.class`.

    *   `foo.?`: Match file names starting with `foo.` and a single character extension.

    *   `/home/*/*`: Match Unix-like paths such as `/home/gus/data`.

    *   `/home/**`: Match Unix-like paths such as `/home/gus` and `/home/gus/data`.

    *   `C:\\*`: Match Windows-like paths such as `C:\foo` and `C:\bar`. (The backslash
    is escaped. As a Java string literal, the pattern would be `"C:\\\\*"`.)


    The JDK documentation also identifies several rules for interpreting `glob` patterns.
    I repeat these rules here:


    *   The `*` character matches zero or more characters of a name element without
    crossing directory boundaries.

    *   The `**` characters match zero or more characters crossing directory boundaries.

    *   The `?` character matches exactly one character of a name element.

    *   The backslash character (`\`) is used to escape characters that would otherwise
    be interpreted as special characters. For example, the expression `\\` matches
    a single backslash and the expression `\{` matches a left brace.

    *   The `[` and `]` characters delimit a bracket expression that matches a single
    character of a name element out of a set of characters. For example, `[abc]` matches
    `a`, `b`, or `c`. The hyphen (`-`) may be used to specify a range, so `[a-z]`
    specifies a range that matches from `a` to `z` (inclusive). These forms can be
    mixed, so `[abce-g]` matches `a`, `b`, `c`, `e`, `f`, or `g`. If the character
    after the `[` is a `!`, the `!` is used for negation, so `[!a-c]` matches any
    character except for `a`, `b`, or `c`.

    *   Within a bracket expression, the `*`, `?`, and `\` characters match themselves.
    The hyphen matches itself when it’s the first character in the brackets, or when
    it’s the first character after the `!` when negating.

    *   The `{` and `}` characters identify a group of subpatterns, where the group
    matches when any subpattern in the group matches. The comma is used to separate
    the subpatterns. Groups cannot be nested.

    *   Leading period/dot characters in file names are treated as regular characters
    in match operations. For example, the `* glob` pattern matches file name `.login`.

    *   All other characters match themselves in an implementation-dependent manner.
    This includes characters representing any name separators.

    *   The matching of root elements is highly implementation-dependent and is not
    specified.


    Listing [12-50](#A978-1-4842-1565-4_12_Chapter.html#FPar71) shows you how to obtain
    a `PathMatcher` object and use this object to match paths.


    Listing 12-50\. Demonstrating `Path`-Matching


    `import java.nio.file.FileSystem;`


    `import java.nio.file.FileSystems;`


    `import java.nio.file.Path;`


    `import java.nio.file.PathMatcher;`


    `public class PathMatcherDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java PatchMatcherDemo " +`


    `"syntax:pattern path");`


    `return;`


    `}`


    `FileSystem fsDefault = FileSystems.getDefault();`


    `PathMatcher pm = fsDefault.getPathMatcher(args[0]);`


    `if (pm.matches(fsDefault.getPath(args[1])))`


    `System.out.printf("%s matches pattern%n", args[1]);`


    `else`


    `System.out.printf("%s doesn’t match pattern%n", args[1]);`


    `}`


    `}`


    Compile Listing [12-50](#A978-1-4842-1565-4_12_Chapter.html#FPar71) as follows:


    `javac PathMatcherDemo.java`


    Run the resulting application as follows:


    `java PathMatcherDemo glob:*.java PathMatcherDemo.java`


    You should observe the following output:


    `PathMatcherDemo.java matches pattern`


    Now, run the application as follows:


    `java PathMatcherDemo glob:*.java PathMatcherDemo.txt`


    This time, you should observe the following output:


    `PathMatcherDemo.txt doesn’t match pattern`


    While you’re trying out this application, execute the following command line:


    `java PathMatcherDemo "regex:([^\s]+(\.(?i)(png|jpg))$)" figure1.jpg`


    The double quotes surrounding `regex:([^\s]+(\.(?i)(png|jpg))$)` are necessary
    on Windows. You should observe the following output:


    `figure1.jpg matches pattern`


    You would observe similar output for a second argument of `figure1.png`. However,
    you would observe that `figure1.gif` doesn’t match the pattern.'
