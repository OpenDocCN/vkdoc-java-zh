  raw: '#### Reading Files


    The `Files` class provides support for reading regular file content by declaring
    the following methods for reading all bytes or all text lines into memory:


    *   `byte[] readAllBytes(Path path)`

    *   `List<String> readAllLines(Path path)`

    *   `List<String> readAllLines(Path path, Charset cs)`


    `readAllBytes(Path path)` reads the contents of the file identified by `path`
    into a byte array and returns this array. It ensures that the file is closed after
    all bytes have been read. `IOException` is thrown when an I/O error occurs while
    reading from the file, and `java.lang.OutOfMemoryError` is thrown when an array
    of the required size cannot be allocated (perhaps the file exceeds 2 gigabytes
    in length). `readAllBytes()` is intended for simple cases where it’s convenient
    to read all bytes into a byte array. It’s not intended for reading in large files.


    `readAllLines(Path path)` behaves as if you specified `Files.readAllLines(path,
    java.nio.charset.StandardCharsets.UTF_8);`.


    `readAllLines(Path path, Charset cs)` reads all lines from the file identified
    by `path` into a list of strings and returns this list. Bytes from the file are
    decoded into characters using charset `cs`. It currently recognizes carriage return
    (`\u000D`), line feed (`\u000A`), or carriage return followed by line feed as
    line terminators. Also, it ensures that the file is closed after all lines have
    been read. `IOException` is thrown when an I/O error occurs while reading from
    the file or a malformed or unmappable byte sequence is read. `readAllLines()`
    is intended for simple cases where it’s convenient to read all lines in a single
    operation. It’s not intended for reading in large files.


    Listing [12-24](#A978-1-4842-1565-4_12_Chapter.html#FPar38) describes an application
    that uses `readAllLines(Path path)` to read all lines from a text file. These
    lines are subsequently output.


    Listing 12-24\. Dumping a Text File to the Standard Output Stream


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `import java.util.List;`


    `public class DumpText`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java DumpText textfilepath");`


    `return;`


    `}`


    `List<String> lines = Files.readAllLines(Paths.get(args[0]));`


    `for (String line: lines)`


    `System.out.println(line);`


    `}`


    `}`


    Compile Listing [12-24](#A978-1-4842-1565-4_12_Chapter.html#FPar38) as follows:


    `javac DumpText.java`


    Run the resulting application as follows:


    `java DumpText DumpText.java`


    You should observe a duplicate of Listing [12-24](#A978-1-4842-1565-4_12_Chapter.html#FPar38)
    on the standard output stream. If you try to dump a binary file, you will probably
    discover a `java.nio.charset.MalformedInputException` message instead.


    The former methods are limited to reading smaller files into memory. For very
    large files, `Files` offers the following methods:


    *   `BufferedReader newBufferedReader(Path path)`

    *   `BufferedReader newBufferedReader(Path path, Charset cs)`

    *   `InputStream newInputStream(Path path, OpenOption... options)`


    `newBufferedReader(Path path)` behaves as if you specified `Files.newBufferedReader(path,
    StandardCharsets.UTF_8);`.


    `newBufferedReader(Path path, Charset cs)` opens the file identified by `path`
    and returns a `java.io.BufferedReader` (with the default buffer size) that may
    be used to read text from the file in an efficient manner. Bytes from the file
    are decoded into characters using charset `cs`. Reading starts at the beginning
    of the file. `IOException` is thrown when an I/O error occurs. This exception
    is also thrown when one of `BufferedReader`’s `read()` methods reads a malformed
    or unmappable byte sequence.


    `newInputStream(Path path, OpenOption... options)` opens the file identified by
    `path`, returning a `java.io.InputStream` to read from the file. The stream will
    not be buffered, and it’s not required to support the `mark` `()` or `reset` `()`
    methods. The stream will be safe for access by multiple concurrent threads. Reading
    commences at the beginning of the file.


    A varargs list of `java.nio.file.OpenOption`s may be passed. These options configure
    how to open or create the file. The `java.nio.file.StandardOpenOption` enum implements
    this interface and provides the following constants:


    *   `APPEND`: If the file is opened for `WRITE` access, write bytes to the end
    of the file rather than to the beginning.

    *   `CREATE`: Create a new file when it doesn’t exist.

    *   `CREATE_NEW`: Create a new file, failing when the file already exists.

    *   `DELETE_ON_CLOSE`: Make a best effort to delete the file when the file is
    closed.

    *   `DSYNC`: Require that every update to the file’s content be written synchronously
    to the underlying storage device.

    *   `READ`: Open the file for read access.

    *   `SPARSE`: Open a sparse file ( [`https://en.wikipedia.org/wiki/Sparse_file`](https://en.wikipedia.org/wiki/Sparse_file)
    ). When used with the `CREATE_NEW` option, `SPARSE` provides a hint that the new
    file will be sparse. The option is ignored when the file system doesn’t support
    the creation of sparse files.

    *   `SYNC`: Require that every update to the file’s content or metadata be written
    synchronously to the underlying storage device.

    *   `TRUNCATE_EXISTING`: Truncate the length of an existing file that’s opened
    for [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    access to 0.

    *   `WRITE`: Open the file for write access.


    Not all of these constants apply to `newInputStream()`; some of them apply to
    the `newOutputStream()` method, which I’ll discuss later in this chapter.


    When no options are present, this method opens the file with the `READ` option.


    `IOException` is thrown when an I/O error occurs. `IllegalArgumentException` is
    thrown when an invalid combination of options is specified. `UnsupportedOperationException`
    is thrown when an unsupported option (such as `WRITE`) is specified.


    Listing [12-25](#A978-1-4842-1565-4_12_Chapter.html#FPar39) describes an application
    that demonstrates `newBufferedReader(Path path)`.


    Listing 12-25\. Dumping a Text File to the Standard Output Stream, Revisited


    `import java.io.BufferedReader;`


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class DumpText`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java DumpText textfilepath");`


    `return;`


    `}`


    `BufferedReader br = Files.newBufferedReader(Paths.get(args[0]));`


    `String line;`


    `while ((line = br.readLine()) != null)`


    `System.out.println(line);`


    `}`


    `}`


    Compile Listing [12-25](#A978-1-4842-1565-4_12_Chapter.html#FPar39) (`javac DumpText.java`)
    and run the resulting application (`java DumpText DumpText.java`). You should
    observe the same output as previously shown.'
