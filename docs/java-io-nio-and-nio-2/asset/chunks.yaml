  raw: '`Channel` is also extended by the `java.nio.channels.InterruptibleChannel`
    interface. `InterruptibleChannel` describes a channel that can be asynchronously
    closed and interrupted. This interface overrides its `Channel` superinterface’s
    `close()` method header, presenting the following additional stipulation to `Channel`’s
    contract for this method: Any thread currently blocked in an I/O operation on
    this channel will receive `AsynchronousCloseException` (an `IOException` descendent).


    A channel that implements this interface is asynchronously closeable: When a thread
    is blocked in an I/O operation on an interruptible channel, another thread may
    invoke the channel’s `close()` method. This causes the blocked thread to receive
    a thrown `AsynchronousCloseException` instance.


    A channel that implements this interface is also interruptible: When a thread
    is blocked in an I/O operation on an interruptible channel, another thread may
    invoke the blocked thread’s `interrupt()` method. Doing this causes the channel
    to be closed, the blocked thread to receive a thrown `ClosedByInterruptException`
    instance, and the blocked thread to have its interrupt status set. (When a thread’s
    interrupt status is already set and it invokes a blocking I/O operation on a channel,
    the channel is closed and the thread will immediately receive a thrown `ClosedByInterruptException`
    instance; its interrupt status will remain set.)


    NIO’s designers chose to shut down a channel when a blocked thread is interrupted
    because they couldn’t find a way to reliably handle interrupted I/O operations
    in the same manner across operating systems. The only way to guarantee deterministic
    behavior was to shut down the channel.


    Tip


    You can determine whether or not a channel supports asynchronous closing and interruption
    by using the `instanceof` operator in an expression such as `channel instanceof`
    `InterruptibleChannel`.


    In [Chapter 6](#A978-1-4842-1565-4_6_Chapter.html), you learned that you must
    call a class method on a `java.nio.Buffer` subclass to obtain a buffer. Regarding
    channels, there are two ways to obtain a channel:


    *   The `java.nio.channels` package provides a `Channels` utility class that offers
    two methods for obtaining channels from streams. For each of the following methods,
    the underlying stream is closed when the channel is closed, and the channel isn’t
    buffered:

    *   `WritableByteChannel newChannel(OutputStream outputStream)` returns a writable
    byte channel for the given `outputStream`.

    *   `ReadableByteChannel newChannel(InputStream inputStream)` returns a readable
    byte channel for the given `inputStream`.

    *   Various classic I/O classes have been retrofitted to support channel creation.
    For example, `java.io.RandomAccessFile` declares a `FileChannel getChannel()`
    method for returning a file channel, and `java.net.Socket` declares a `SocketChannel
    getChannel()` method for returning a socket channel.


    Listing [7-1](#A978-1-4842-1565-4_7_Chapter.html#FPar4) uses the `Channels` class
    to obtain channels for the standard input and output streams and then uses these
    channels to copy bytes from the input channel to the output channel.


    Listing 7-1\. Copying Bytes from an Input Channel to an Output Channel


    `import java.io.IOException;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.Channels;`


    `import java.nio.channels.ReadableByteChannel;`


    `import java.nio.channels.WritableByteChannel;`


    `public class ChannelDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `ReadableByteChannel src = Channels.newChannel(System.in);`


    `WritableByteChannel dest = Channels.newChannel(System.out);`


    `try`


    `{`


    `copy(src, dest); // or copyAlt(src, dest);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `finally`


    `{`


    `try`


    `{`


    `src.close();`


    `dest.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `}`


    `static void copy(ReadableByteChannel src, WritableByteChannel dest)`


    `throws IOException`


    `{`


    `ByteBuffer buffer = ByteBuffer.allocateDirect(2048);`


    `while (src.read(buffer) != -1)`


    `{`


    `buffer.flip();`


    `dest.write(buffer);`


    `buffer.compact();`


    `}`


    `buffer.flip();`


    `while (buffer.hasRemaining())`


    `dest.write(buffer);`


    `}`


    `static void copyAlt(ReadableByteChannel src, WritableByteChannel dest)`


    `throws IOException`


    `{`


    `ByteBuffer buffer = ByteBuffer.allocateDirect(2048);`


    `while (src.read(buffer) != -1)`


    `{`


    `buffer.flip();`


    `while (buffer.hasRemaining())`


    `dest.write(buffer);`


    `buffer.clear();`


    `}`


    `}`


    `}`


    Listing [7-1](#A978-1-4842-1565-4_7_Chapter.html#FPar4) presents two approaches
    to copying bytes from the standard input stream to the standard output stream.
    In the first approach, which is exemplified by the `copy()` method, the goal is
    to minimize operating system I/O calls (via the `write()` method calls), although
    more data may end up being copied as a result of the `compact()` method calls.
    In the second approach, as demonstrated by `copyAlt()`, the goal is to eliminate
    data copying, although more operating system I/O calls might occur.


    The `copy()` and `copyAlt()` methods first allocate a direct byte buffer (recall
    that a direct byte buffer is the most efficient means for performing I/O on the
    Java virtual machine [JVM]) and enter a `while` loop that continually reads bytes
    from the source channel until end-of-input (`read()` returns `-1`). Following
    the read, the buffer is flipped so that it can be drained. Here is where the methods
    diverge.


    *   The `copy()` method `while` loop makes a single call to `write()`. Because
    `write()` might not completely drain the buffer, `compact()` is called to compact
    the buffer before the next read. Compaction ensures that unwritten buffer content
    isn’t overwritten during the next read operation. Following the `while` loop,
    `copy()` flips the buffer in preparation for draining any remaining content, and
    then works with `hasRemaining()` and `write()` to completely drain the buffer.

    *   The `copyAlt()` method `while` loop contains a nested `while` loop that works
    with `hasRemaining()` and `write()` to continue draining the buffer until the
    buffer is empty. This is followed by a `clear()` method call, which empties the
    buffer so that it can be filled on the next `read()` call.


    Note


    It’s important to realize that a single `write()` method call may not output the
    entire content of a buffer. Similarly, a single `read()` call may not completely
    fill a buffer.


    Compile Listing [7-1](#A978-1-4842-1565-4_7_Chapter.html#FPar4) as follows:


    `javac ChannelDemo.java`


    Run the resulting application as follows:


    `java ChannelDemo`


    `java ChannelDemo <ChannelDemo.java >ChannelDemo.bak`


    The first command line copies the standard input to the standard output. The second
    command line copies the contents of `ChannelDemo.java` to `ChannelDemo.bak`. After
    testing the `copy()` method, replace `copy(src, dest);` with `copyAlt(src, dest);`
    and repeat.


    ## Channels in Depth


    The previous discussion of the `Channel` interface and its direct descendants
    has given you some insight into channels. However, there’s much more to explore.
    This section takes you deeper into channels by exploring scatter/gather I/O, file
    channels, socket channels, and pipes.'
  trans: '

    `Channel`接口也由`java.nio.channels.InterruptibleChannel`接口扩展。`InterruptibleChannel`描述了一种可以异步关闭和中断的通道。该接口重写了其父接口`Channel`的`close()`方法声明，并为`Channel`的该方法契约增加了以下附加规定：任何当前在此通道的
    I/O 操作中被阻塞的线程都将收到`AsynchronousCloseException`（`IOException`的子类）。


    实现此接口的通道是异步可关闭的：当一个线程在可中断通道的 I/O 操作中被阻塞时，另一个线程可以调用该通道的`close()`方法。这会导致被阻塞的线程收到一个抛出的`AsynchronousCloseException`实例。


    实现此接口的通道也是可中断的：当一个线程在可中断通道的 I/O 操作中被阻塞时，另一个线程可以调用被阻塞线程的`interrupt()`方法。这样做会导致通道被关闭，被阻塞的线程收到一个抛出的`ClosedByInterruptException`实例，并且被阻塞线程的中断状态被设置。（当一个线程的中断状态已被设置，并且它在一个通道上调用阻塞
    I/O 操作时，该通道会被关闭，线程将立即收到一个抛出的`ClosedByInterruptException`实例；其中断状态将保持设置状态。）


    NIO 的设计者选择在阻塞线程被中断时关闭通道，因为他们无法找到一种跨操作系统以相同方式可靠处理中断 I/O 操作的方法。保证确定性行为的唯一方法就是关闭通道。


    提示


    你可以通过使用`instanceof`运算符来确定一个通道是否支持异步关闭和中断，例如在表达式`channel instanceof InterruptibleChannel`中。


    在第 6 章中，你了解到必须调用`java.nio.Buffer`子类上的类方法来获取缓冲区。关于通道，有两种获取通道的方法：


    *   `java.nio.channels`包提供了一个`Channels`工具类，它提供了两种从流中获取通道的方法。对于以下每种方法，当通道关闭时，底层流也会被关闭，并且该通道不是缓冲的：

    *   `WritableByteChannel newChannel(OutputStream outputStream)` 为给定的`outputStream`返回一个可写字节通道。

    *   `ReadableByteChannel newChannel(InputStream inputStream)` 为给定的`inputStream`返回一个可读字节通道。

    *   各种经典的 I/O 类已被改造以支持通道创建。例如，`java.io.RandomAccessFile`声明了一个`FileChannel getChannel()`方法用于返回文件通道，而`java.net.Socket`声明了一个`SocketChannel
    getChannel()`方法用于返回套接字通道。


    清单 7-1 使用`Channels`类为标准输入和输出流获取通道，然后使用这些通道将字节从输入通道复制到输出通道。


    清单 7-1. 将字节从输入通道复制到输出通道


    `import java.io.IOException;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.Channels;`


    `import java.nio.channels.ReadableByteChannel;`


    `import java.nio.channels.WritableByteChannel;`


    `public class ChannelDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `ReadableByteChannel src = Channels.newChannel(System.in);`


    `WritableByteChannel dest = Channels.newChannel(System.out);`


    `try`


    `{`


    `copy(src, dest); // 或 copyAlt(src, dest);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `finally`


    `{`


    `try`


    `{`


    `src.close();`


    `dest.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `}`


    `static void copy(ReadableByteChannel src, WritableByteChannel dest)`


    `throws IOException`


    `{`


    `ByteBuffer buffer = ByteBuffer.allocateDirect(2048);`


    `while (src.read(buffer) != -1)`


    `{`


    `buffer.flip();`


    `dest.write(buffer);`


    `buffer.compact();`


    `}`


    `buffer.flip();`


    `while (buffer.hasRemaining())`


    `dest.write(buffer);`


    `}`


    `static void copyAlt(ReadableByteChannel src, WritableByteChannel dest)`


    `throws IOException`


    `{`


    `ByteBuffer buffer = ByteBuffer.allocateDirect(2048);`


    `while (src.read(buffer) != -1)`


    `{`


    `buffer.flip();`


    `while (buffer.hasRemaining())`


    `dest.write(buffer);`


    `buffer.clear();`


    `}`


    `}`


    `}`


    清单 7-1 展示了两种将字节从标准输入流复制到标准输出流的方法。第一种方法以`copy()`方法为例，其目标是尽量减少操作系统 I/O 调用（通过`write()`方法调用），尽管由于`compact()`方法的调用，最终可能会复制更多的数据。第二种方法，如`copyAlt()`所示，目标是消除数据复制，尽管可能会发生更多的操作系统
    I/O 调用。


    `copy()`和`copyAlt()`方法首先分配一个直接字节缓冲区（回想一下，直接字节缓冲区是在 Java 虚拟机[JVM]上执行 I/O 最高效的方式），然后进入一个`while`循环，该循环持续从源通道读取字节，直到输入结束（`read()`返回`-1`）。读取之后，缓冲区被翻转以便可以排出数据。这就是两种方法开始分叉的地方。


    *   `copy()`方法的`while`循环对`write()`进行单次调用。因为`write()`可能不会完全排空缓冲区，所以在下一次读取之前调用`compact()`来压缩缓冲区。压缩确保未写入的缓冲区内容在下一次读取操作期间不会被覆盖。在`while`循环之后，`copy()`翻转缓冲区以准备排出任何剩余内容，然后配合`hasRemaining()`和`write()`完全排空缓冲区。

    *   `copyAlt()`方法的`while`循环包含一个嵌套的`while`循环，该循环配合`hasRemaining()`和`write()`持续排空缓冲区，直到缓冲区为空。随后调用`clear()`方法，该方法清空缓冲区，以便在下一次`read()`调用时可以填充它。


    注意


    认识到单次`write()`方法调用可能不会输出缓冲区的全部内容是很重要的。同样，单次`read()`调用也可能不会完全填满一个缓冲区。


    按如下方式编译清单 7-1：


    `javac ChannelDemo.java`


    按如下方式运行生成的应用程序：


    `java ChannelDemo`


    `java ChannelDemo <ChannelDemo.java >ChannelDemo.bak`


    第一个命令行将标准输入复制到标准输出。第二个命令行将`ChannelDemo.java`的内容复制到`ChannelDemo.bak`。测试完`copy()`方法后，将`copy(src,
    dest);`替换为`copyAlt(src, dest);`并重复测试。


    ## 深入理解通道


    前面关于`Channel`接口及其直接子接口的讨论让你对通道有了一些了解。然而，还有更多内容值得探索。本节通过探讨分散/聚集 I/O、文件通道、套接字通道和管道，带你更深入地了解通道。

