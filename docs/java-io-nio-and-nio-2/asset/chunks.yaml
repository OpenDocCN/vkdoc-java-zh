- fmt: "文件系统是操作系统的一个组件，负责管理基于文件的数据存储。文件可以是常规文件、目录、符号链接或硬链接。  \n\n当`File`的`delete()`方法在出现问题时返回`false`会带来问题，因为你无法知道文件为何无法删除（可能文件不存在，或用户没有适当的权限）。抛出特定的异常会更有帮助。\
    \  \n\n实现改进后文件系统接口的包包括`java.nio.file`、`java.nio.file.attribute`和`java.nio.file.spi`。\
    \  \n\n构成改进后文件系统接口核心的类型包括`FileSystem`、`FileSystems`和`FileSystemProvider`。  \n\n\
    你可以通过调用`FileSystems`类的`FileSystem getDefault()`类方法来获取默认文件系统的引用。  \n\n你可以通过调用`FileSystems`类的`newFileSystem()`方法并传入适当的参数来创建新的文件系统。\
    \  \n\n路径是一种紧凑的映射，通过分隔的名称元素序列在文件层级中进行导航。  \n\n答案是`false`：`Path`接口表示一个可能不存在的文件的层级路径。\
    \  \n\n`Path`对象存储的路径可选地以标识文件系统层级的名称元素开头，并可选择地继续以由分隔符分隔的目录元素序列。距离目录层级根最远的名称元素是目录或其他类型文件的名称。其他名称元素是目录名称。\
    \  \n\n`Path`声明了`File toFile()`方法，用于返回表示其路径的`File`对象。`File`声明了`Path toPath()`方法，用于返回表示该`File`对象抽象路径的`Path`对象。\
    \  \n\n`FileSystem`提供了`Path getPath(String first, String... more)`方法，用于返回`Path`对象。\
    \  \n\n当你尝试使用不符合文件系统提供者解析语法的语法创建`Path`对象时，会抛出`InvalidPathException`。该文件系统提供者创建了负责创建该`Path`对象的`FileSystem`。\
    \  \n\n`Paths`类提供的用于更方便地返回`Path`对象的方法包括`Path get(String first, String... more)`和`Path\
    \ get(URI uri)`。  \n\n`Path`用于返回其名称元素的方法包括`Path getFileName()`、`Path getName(int\
    \ index)`、`int getNameCount()`、`Path getParent()`、`Path getRoot()`和`Path subpath(int\
    \ beginIndex, int endIndex)`。  \n\n答案是`false`：`Path`的`boolean isAbsolute()`方法在表示绝对路径时返回`true`。不存在`isRelative()`方法。\
    \  \n\n你可以通过调用`FileSystem`的`Iterable<Path> getRootDirectories()`方法来获取文件系统的根目录，该方法返回一个迭代器，遍历描述根目录的`Path`实例。\
    \  \n\n你可以通过调用`Path`的`Path toAbsolutePath()`方法将相对路径转换为绝对路径。  \n\n`Path`用于移除路径冗余、创建两个路径之间的相对路径以及解析（连接）两个路径的方法分别是`Path\
    \ normalize()`、`Path relativize(Path other)`、`Path resolve(Path other)`和`Path\
    \ resolve(String other)`。  \n\n你可以通过调用`Path`的`Path resolveSibling(Path other)`或`Path\
    \ resolveSibling(String other)`方法，将路径字符串解析到当前路径的父路径上。  \n\n你可以通过调用`Path`的`URI\
    \ toURI()`方法将当前`Path`实例转换为`URI`对象。  \n\n`Path toRealPath(LinkOption... options)`方法返回由`Path`对象表示的文件的真实路径。此方法通常从该路径派生出一个绝对路径，该绝对路径定位与当前路径相同的文件，但其名称元素表示目录和任何非目录文件的实际名称。你可以传递一个逗号分隔的`LinkOption`枚举常量列表作为参数。该枚举定义了处理符号链接的选项。目前，`LinkOption`仅声明了一个`NOFOLLOW_LINKS`（不跟随符号链接）常量。\
    \  \n\n答案是`false`：`Files`类不提供用于执行路径匹配和目录监视任务的`static`方法。你需要调用`FileSystem`的方法来获取路径匹配器和监视服务。\
    \  \n\n文件存储是一个存储池、设备、分区、卷、具体文件系统或其他实现特定的文件存储方式。文件存储由名称、类型、空间量（以字节为单位）以及其他信息组成。文件存储由`FileStore`类表示。\
    \  \n\n`Files`类提供了`FileStore getFileStore(Path path)`方法，用于返回一个`FileStore`，表示存储由`path`标识的文件的文件存储。\
    \  \n\n你可以获取空间量（总空间、未分配空间和可用空间）、文件存储是否为只读的指示，以及文件存储的名称和类型。  \n\n你可以通过调用`FileSystem`的`Iterable<FileStore>\
    \ getFileStores()`方法来获取给定文件系统的所有文件存储，该方法允许你遍历所有文件存储。  \n\nNIO.2 对处理属性提供的支持包括存储在`java.nio.file.attribute`包中的类型，以及`Files`类和其他类型的面向属性的方法。\
    \  \n\n属性被组织成视图，每个视图对应一个特定的文件系统实现。  \n\n属性类型层次结构以`AttributeView`为根。该接口的子类型包括`FileAttributeView`。`FileAttributeView`的子类型包括`BasicFileAttributeView`、`FileOwnerAttributeView`和`UserDefinedFileAttributeView`。`BasicFileAttributeView`的子类型包括`DosFileAttributeView`和`PosixFileAttributeView`。`FileOwnerAttributeView`的子类型包括`AclFileAttributeView`和`PosixFileAttributeView`。`AttributeView`的子类型还包括`FileStoreAttributeView`。\
    \  \n\n你可以通过调用`FileSystem`的`Set<String> supportedFileAttributeViews()`方法来识别给定文件系统支持的所有属性视图，该方法返回一个字符串集合，标识调用该方法的`FileSystem`所支持的视图。\
    \  \n\n基本属性是许多文件系统共有的属性。用于管理基本属性的视图是`BasicFileAttributeView`。基本属性包括`creationTime`、`fileKey`、`isDirectory`、`isOther`、`isRegularFile`、`isSymbolicLink`、`lastAccessTime`、`lastModifiedTime`和`size`。\
    \  \n\n答案是`true`：你可以通过调用`BasicFileAttributeView`的`BasicFileAttributes readAttributes()`方法来批量读取基本属性。你也可以间接地通过调用`Files`类的`<A\
    \ extends BasicFileAttributes> A readAttributes(Path path, Class<A> type, LinkOption...\
    \ options)`方法来完成此任务，并将`BasicFileAttributes.class`传递给`type`参数。  \n\n文件键是一个标识符或标识符的组合，用于唯一标识一个文件。\
    \  \n\n当你调用`Files`类的`getAttribute()`或`setAttribute()`方法来获取或设置基本或其他类型的属性值时，必须遵循的用于标识属性的语法是`[view-name:]attribute-name`。对于基本属性，你无需指定`view-name`，因为`basic`是默认的`view-name`。\
    \  \n\n`UserPrincipal`表示用于确定文件系统中对象访问权限的身份，并扩展了`Principal`。`GroupPrincipal`表示组身份，并扩展了`UserPrincipal`。\
    \  \n\n在 Windows 操作系统上，当无法将安全 ID 分配为所有者时，`FileOwnerAttributeView`的`setOwner()`方法会抛出`FileSystemException`。该安全\
    \ ID 必须是已被授予分配所有者权限的用户或组之一。解决方案是提升`Java`应用程序的权限。  \n\n`AclEntry`的组成部分包括`type`、`principal`、`permissions`和`flags`。这些组成部分分别由`AclEntryType`、`UserPrincipal`、`AclEntryPermission`和`AclEntryFlag`类型描述。\
    \  \n\n答案是`true`：你可以定义自己的文件属性。使用`UserDefinedFileAttributeView`类型来完成此任务。  \n\n\
    `FileStoreAttributeView`支持的属性包括`totalSpace`、`unallocatedSpace`和`usableSpace`。你可以通过将这些名称传递给`FileStore`的`getAttribute()`方法来访问这些属性的值，尽管更推荐通过`FileStore`的类型安全方法`getTotalSpace()`、`getUnallocatedSpace()`和`getUsableSpace()`来访问它们。\
    \  \n\n答案是`false`：`!exists(path)`不等同于`notExists(path)`。  \n\n`isDirectory()`方法关于符号链接的默认策略是跟随它们。如果你不想跟随符号链接，请将`LinkOption.NOFOLLOW_LINKS`传递给此方法。\
    \  \n\n使用`exists()`、`notExists()`、`isExecutable()`、`isReadable()`和`isWritable()`的返回值时应小心，因为这些返回值会立即过时。在方法调用和结果使用之间，文件系统可能会发生变化。\
    \  \n\n当调用`createFile()`方法创建已存在的文件时，会抛出`FileAlreadyExistsException`。  \n\n可选的特定异常是指当底层操作系统能够检测到导致异常的特定错误时抛出的异常。如果无法检测到该错误，则会抛出其`IOException`祖先异常。\
    \  \n\n你可以在创建文件时设置 POSIX 文件权限，方法是调用`PosixFilePermissions`类的`FileAttribute<Set<PosixFilePermission>>\
    \ asFileAttribute(Set<PosixFilePermission> perms)`方法来创建一个封装了给定文件权限副本的`FileAttribute`，然后将`asFileAttribute()`的返回值作为第二个参数传递给`createFile()`。\
    \  \n\n`Path createTempFile(String prefix, String suffix, FileAttribute<?>...\
    \ attrs)`方法在默认临时文件目录（由 Java 属性`java.io.tmpdir`标识）中创建临时文件。  \n\n在应用程序退出前删除临时文件的三种方法如下："
  raw: 'A file system is an operating system component that manages file-based data
    storage. A file is a regular file, a directory, a symbolic link, or a hard link.
      Having `File`’s `delete()` method return `false` when something goes wrong is
    a problem because you don’t know why the file could not be deleted (it may not
    exist or the user may not have the appropriate permission). Throwing a specific
    exception is more helpful.   The packages that implement the improved file system
    interface are `java.nio.file`, `java.nio.file.attribute`, and `java.nio.file.spi`.
      The types that form the core of the improved file system interface are `FileSystem`,
    `FileSystems`, and `FileSystemProvider`.   You obtain a reference to the default
    file system by calling the `FileSystems` class’s `FileSystem getDefault()` class
    method.   You create a new file system by calling the `FileSystems` class’s `newFileSystem()`
    methods with the appropriate arguments.   A path is a compact map that navigates
    a hierarchy of files via a separated name element sequence.   The answer is false:
    the `Path` interface represents a hierarchical path to a file that may not exist.
      A `Path` object’s stored path optionally starts with a name element identifying
    a file system hierarchy and optionally continues with a sequence of directory
    elements separated by a separator character. The name element that is farthest
    from the root of the directory hierarchy is the name of a directory or other kind
    of file. The other name elements are directory names.   `Path` declares `File
    toFile()` to return a `File` object representing its path. `File` declares `Path
    toPath()` to return a `Path` object representing the `File` object’s abstract
    path.   `FileSystem` provides a `Path getPath(String first, String... more)` method
    for returning a `Path` object.   When you attempt to create a `Path` object using
    syntax that doesn’t conform to the syntax that is parsed by the file system provider
    that created the `FileSystem` responsible for creating the `Path` object, `InvalidPathException`
    is thrown.   The methods that the `Paths` class provides for more conveniently
    returning `Path` objects are `Path get(String first, String... more)` and `Path
    get(URI uri)`.   `Path`’s methods for returning its name elements are `Path getFileName()`,
    `Path getName(int index)`, `int getNameCount()`, `Path getParent()`, `Path getRoot()`,
    and `Path subpath(int beginIndex, int endIndex)`.   The answer is false: `Path`’s
    `boolean` `isAbsolute()` method returns `true` to signify an absolute path. There
    is no `isRelative()` method.   You obtain a file system’s root(s) by calling `FileSystem`’s
    `Iterable<Path>` `getRootDirectories()` method, which returns an iterator over
    `Path` instances that describe roots.   You convert a relative path to an absolute
    path by calling `Path`’s `Path` `toAbsolutePath()` method.   `Path`’s method for
    removing path redundancies, creating a relative path between two paths, and resolving
    (joining) two paths are `Path normalize()`, `Path relativize(Path other)`, `Path
    resolve(Path other)`, and `Path resolve(String other)`, respectively.   You resolve
    a path string against the current path’s parent path by calling `Path`’s `Path
    resolveSibling(Path other)` or `Path resolveSibling(String other)` method.   You
    convert the current `Path` instance to a `URI` object by calling `Path`’s `URI
    toURI()` method.   The `Path toRealPath(LinkOption... options)` method returns
    the real path of the file represented by the `Path` object. This method generally
    derives, from this path, an absolute path that locates the [same](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Files.html#isSameFile-java.nio.file.Path-java.nio.file.Path-)
    file as this path, but with name elements that represent the actual names of the
    directories and any nondirectory. You can pass a comma-delimited list of `LinkOption`
    enum constants as arguments. This enum defines the options for how symbolic links
    are handled. Currently, `LinkOption` declares only a `NOFOLLOW_LINKS` (don’t follow
    symbolic links) constant.   The answer is false: the `Files` class doesn’t provide
    `static` methods for performing path-matching and directory-watching tasks. You
    need to call `FileSystem` methods to obtain path-matchers and watch services.
      A file store is a storage pool, device, partition, volume, concrete file system,
    or other implementation-specific means of file storage. A file store consists
    of a name, a type, space amounts (in bytes), and other information. A file store
    is represented by the `FileStore` class.   The `Files` class provides the `FileStore
    getFileStore(Path path)` method to return a `FileStore` representing the file
    store where the file identified by `path` is stored.   You can obtain amounts
    of space (total, unallocated, and usable), an indication if the file store is
    read-only, and the name and type of the file store.   You can obtain all file
    stores for a given file system by calling `FileSystem`’s `Iterable<FileStore>`
    `getFileStores()` method, which lets you iterate over all of the file stores.
      The support offered by NIO.2 for working with attributes are the types stored
    in the `java.nio.file.attribute` package along with the attribute-oriented methods
    of the `Files` class and other types.   Attributes are organized into views where
    each view corresponds to a specific file system implementation.   The attribute
    type hierarchy is rooted in `AttributeView`. This interface is subtyped by `FileAttributeView.
    FileAttributeView` is subtyped by `BasicFileAttributeView`, `FileOwnerAttributeView`,
    and `UserDefinedFileAttributeView. BasicFileAttributeView` is subtyped by `DosFileAttributeView`
    and `PosixFileAttributeView. FileOwnerAttributeView` is subtyped by `AclFileAttributeView`
    and `PosixFileAttributeView. AttributeView` is also subtyped by `FileStoreAttributeView`.
      You can identify all supported attribute views for a given file system by calling
    `FileSystem`’s `Set<String> supportedFileAttributeViews()` method, which returns
    a set of strings identifying views that are supported by the invoking `FileSystem`.
      Basic attributes are those attributes that are common to many file systems.
    The view for managing basic attributes is `BasicFileAttributeView`. The basic
    attributes are `creationTime`, `fileKey`, `isDirectory`, `isOther`, `isRegularFile`,
    `isSymbolicLink`, `lastAccessTime`, `lastModifiedTime`, and `size`.   The answer
    is true: you can read basic attributes in bulk by calling `BasicFileAttributeView`’s
    `BasicFileAttributes` `readAttributes()` method. You would accomplish this task
    indirectly by calling the `Files` class’s `<A extends BasicFileAttributes> A readAttributes(Path
    path, Class<A> type, LinkOption... options)` method, passing `BasicFileAttributes.class`
    to `type`.   A file key is an identifier or a combination of identifiers that
    uniquely identifies a file.   When you call the `Files` class’s `getAttribute()`
    or `setAttribute()` method to get or set a basic or other kind of attribute value,
    the syntax that you must follow for identifying the attribute is `[view-name:]attribute-name`.
    You don’t have to specify the `view-name` for basic attributes because `basic`
    is the default `view-name`.   `UserPrincipal` represents an identity for determining
    access rights to objects in a file system and extends `Principal. GroupPrincipal`
    represents a group identity and extends `UserPrincipal`.   `FileOwnerAttributeView`’s
    `setOwner()` method throws `FileSystemException` on a Windows operating system
    when a security ID cannot be assigned as the owner, which must be one of the users
    or groups that you have been given the right to assign as the owner. The solution
    is to elevate the privilege of the `Java` application.   An `AclEntry`’s components
    are `type`, `principal`, `permissions`, and `flags`. The components are described
    by the `AclEntryType`, `UserPrincipal`, `AclEntryPermission`, and `AclEntryFlag`
    types.   The answer is true: you can define your own file attributes. Use the
    `UserDefinedFileAttributeView` type for this task.   The attributes supported
    by `FileStoreAttributeView` are `totalSpace`, `unallocatedSpace`, and `usableSpace`.
    You can access the values of these attributes by passing these names to `FileStore`’s
    `getAttribute()` method, although it’s preferred to access them via `FileStore`’s
    type-safe `getTotalSpace()`, `getUnallocatedSpace()`, and `getUsableSpace()` methods.
      The answer is false: `!exists(path)` is not equivalent to `notExists(path)`.
      The `isDirectory()` method’s default policy on symbolic links is to follow them.
    If you don’t want to follow symbolic links, pass `LinkOption.NOFOLLOW_LINKS` to
    this method.   You should be careful when using the return values from `exists()`,
    `notExists()`, `isExecutable()`, `isReadable()`, and `isWritable()` because the
    return values are immediately outdated. The file system may experience changes
    in the time between the method call and the use of its result.   The `createFile()`
    method throws `FileAlreadyExistsException` when called to create a file that already
    exists.   An optional specific exception is an exception that’s thrown when the
    underlying operating system can detect the specific error leading to the exception.
    If the error cannot be detected, its `IOException` ancestor is thrown instead.
      You would set POSIX file permissions when creating a file by calling the `PosixFilePermissions`
    class’s `FileAttribute<Set<PosixFilePermission>> asFileAttribute(Set<PosixFilePermission>
    perms)` method to create a `FileAttribute` that encapsulates a copy of the given
    file permissions, and then passing `asFileAttribute()`’s return value as the second
    argument to `createFile()`.   The `Path createTempFile(String prefix, String suffix,
    FileAttribute<?>... attrs)` method creates the temporary file in the default temporary-file
    directory (identified by the Java property `java.io.tmpdir`).   Three ways to
    delete a temporary file before an application exits are as follows:'
  trans: "\n文件系统是操作系统的一个组件，负责管理基于文件的数据存储。文件可以是常规文件、目录、符号链接或硬链接。  \n当 `File` 的 `delete()`\
