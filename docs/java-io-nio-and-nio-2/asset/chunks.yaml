    #### Exploring the ACL View


    The `AclFileAttributeView` interface extends `FileOwnerAttributeView` and supports
    the following attribute:


    *   `acl` (`List<AclEntry>`)


    `AclFileAttributeView` declares the following methods to access this attribute:


    *   `List<AclEntry> getAcl()`: Read the ACL into a `java.util.List` of `java.nio.file.attribute.AclEntry`s.

    *   `void setAcl(List<AclEntry> acl)`: Update (replace) the ACL.


    These methods throw `IOException` when an I/O error occurs.


    The `AclEntry` class describes an entry in an ACL. It has four components:


    *   `type` determines if the entry grants or denies access. It’s read by calling
    the `AclEntryType type()` method. The `java.nio.file.attribute.AclEntryType` enum
    defines `ALARM` (generate an alarm, in a system-dependent way, for the access
    specified in the `permissions` component of the ACL entry), `ALLOW` (explicitly
    grant access to a regular file or directory), `AUDIT` (log, in a system-dependent
    way, the access specified in the `permissions` component of the ACL entry), and
    `DENY` (explicitly deny access to a regular file or directory entry) type constants.

    *   `principal`, sometimes called the “who” component, is a `UserPrincipal` corresponding
    to the identity that the entry grants or denies access. It’s read by calling the
    `UserPrincipal principal()` method.

    *   `permissions` is a set of permissions. It’s read by calling the `Set<AclEntryPermission>
    permissions()` method. The `java.nio.file.attribute.AclEntryPermission` enum defines
    `APPEND_DATA` (permission to append data to a file), `DELETE` (permission to delete
    the file), `DELETE_CHILD` (permission to delete a file in a directory), `EXECUTE`
    (permission to execute a regular file), `READ_ACL` (permission to read the ACL
    attribute), `READ_ATTRIBUTES` (the ability to read nonACL file attributes), `READ_DATA`
    (permission to read the file’s data), `READ_NAMED_ATTRS` (permission to read the
    file’s named attributes), `SYNCHRONIZE` (permission to access the file locally
    at the server with synchronous reads and writes), `WRITE_ACL` (permission to write
    the ACL attribute), `WRITE_ATTRIBUTES` (the ability to write nonACL file attributes),
    `WRITE_DATA` (permission to modify the file’s data), `WRITE_NAMED_ATTRS` (permission
    to write the file’s named attributes), and `WRITE_OWNER` (permission to change
    the owner) permission constants.

    *   [`flags`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/AclEntry.html#flags)
    is a set of [flags](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/AclEntryFlag.html#enum%20in%20java.nio.file.attribute)
