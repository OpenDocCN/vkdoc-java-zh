    `se object read from file`


    `John Doe`


    The `writeObject()` and `readObject()` methods can be used to serialize/deserialize
    data items beyond the normal state (non-`transient` instance fields), for example,
    serializing/deserializing the contents of a `static` field.


    However, before serializing or deserializing the additional data items, you must
    tell the serialization and deserialization mechanisms to serialize or deserialize
    the object’s normal state. The following methods help you accomplish this task:


    *   `ObjectOutputStream`’s `defaultWriteObject()` method outputs the object’s
    normal state. Your `writeObject()` method first calls this method to output that
    state and then outputs additional data items via `ObjectOutputStream` methods
    such as `writeUTF()`.

