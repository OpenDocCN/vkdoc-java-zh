    #### 将文件映射到内存


    `FileChannel` 声明了一个 `map()` 方法，该方法允许你在打开文件的某个区域与一个包装此区域的 `java.nio.MappedByteBuffer`
    实例之间创建虚拟内存映射。这种映射机制提供了一种高效访问文件的方式，因为执行 I/O 操作无需耗时的系统调用。


    注意


    虚拟内存是一种用虚拟地址（也称为人工地址）替代物理（RAM）地址的内存。请查阅维基百科的“虚拟内存”主题（ [`http://en.wikipedia.org/wiki/Virtual_memory`](http://en.wikipedia.org/wiki/Virtual_memory)
    ）以了解更多关于虚拟内存的信息。


    `map()` 方法具有以下签名：


    `MappedByteBuffer map(FileChannel.MapMode mode, long position, long size)`


    `mode` 参数定义了映射模式，并接收由 `FileChannel.MapMode` 枚举类型定义的以下常量之一：


    *   `READ_ONLY`：任何修改缓冲区的尝试都会导致抛出 `java.nio.ReadOnlyBufferException`。

    *   `READ_WRITE`：对结果缓冲区所做的更改最终会传播到文件；这些更改可能不会对映射了同一文件的其他程序可见。

    *   `PRIVATE`：对结果缓冲区所做的更改不会传播到文件，也不会对映射了同一文件的其他程序可见。相反，更改会导致创建缓冲区修改部分的私有副本。当缓冲区被垃圾回收时，这些更改将丢失。


    指定的映射模式受调用 `FileChannel` 对象的访问权限约束。例如，如果文件通道是以只读通道方式打开的，并且你请求 `READ_WRITE` 模式，`map()`
    将抛出 `NonWritableChannelException`，因为它无法写入文件通道。类似地，当通道以只写方式打开并且你请求 `READ_ONLY`
    模式时，会抛出 `NonReadableChannelException`。（你可以为以读写通道方式打开的文件通道请求 `READ_ONLY` 模式。）


    提示


    调用 `MappedByteBuffer` 的 `isReadOnly()` 方法来确定你是否可以修改映射的文件。


    `position` 和 `size` 参数定义了映射区域的起始位置和范围。传递给这些参数的参数必须为非负数。此外，传递给 `size` 的参数不得超过 `Integer.MAX_VALUE`。


    指定的范围不应超过文件的大小，因为文件会被扩大以容纳该范围。例如，如果你将 `Integer.MAX_VALUE` 传递给 `size`，文件将增长到超过两
    GB。此外，对于只读映射，`map()` 可能会抛出 `IOException`。


    返回的 `MappedByteBuffer` 对象的行为类似于内存映射缓冲区，但其内容存储在文件中。当你在此对象上调用 `get()` 时，将获取文件的当前内容，即使这些内容已被外部程序修改。类似地，当你拥有写入权限时，调用
    `put()` 会更新文件，并且更改对外部程序可用。


    注意


    由于映射字节缓冲区是直接字节缓冲区，分配给它们的内存空间存在于 JVM 堆之外。


    考虑以下示例：


    `MappedByteBuffer buffer = fileChannel.map(FileChannel.MapMode.READ_ONLY, 50,
    100);`


    此示例映射了 `fileChannel` 所描述文件的一个子范围，从位置 50 到位置 149。相比之下，以下示例映射了整个文件：


    `MappedByteBuffer buffer = fileChannel.map(FileChannel.MapMode.READ_ONLY, 0, fileChannel.size());`


    没有 `unmap()` 方法。一旦建立了映射，它将一直存在，直到 `MappedByteBuffer` 对象被垃圾回收（或应用程序退出，以先发生者为准）。由于映射的字节缓冲区与其创建时所用的文件通道没有连接，因此当文件通道关闭时，映射不会被销毁。

