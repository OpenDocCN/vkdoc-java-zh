    `SerEmployee` 的 `writeObject()` 和 `readObject()` 方法依赖于 `DataOutput` 和 `DataInput`
    方法：它们无需调用 `ObjectOutputStream` 的 `writeObject()` 方法和 `ObjectInputStream` 的 `readObject()`
    方法来执行任务。


    当你运行此应用程序时，它会生成以下输出：


    `John Doe`


    `se object written to file`


    `se object read from file`


    `John Doe`


    `writeObject()` 和 `readObject()` 方法可用于序列化/反序列化正常状态（非 `transient` 实例字段）之外的数据项，例如，序列化/反序列化
    `static` 字段的内容。


    然而，在序列化或反序列化这些额外数据项之前，你必须告知序列化和反序列化机制先序列化或反序列化对象的正常状态。以下方法可帮助你完成此任务：


    *   `ObjectOutputStream` 的 `defaultWriteObject()` 方法输出对象的正常状态。你的 `writeObject()`
    方法首先调用此方法输出该状态，然后通过 `ObjectOutputStream` 的方法（如 `writeUTF()`）输出额外的数据项。

    *   `ObjectInputStream` 的 `defaultReadObject()` 方法输入对象的正常状态。你的 `readObject()`
    方法首先调用此方法输入该状态，然后通过 `ObjectInputStream` 的方法（如 `readUTF()`）输入额外的数据项。

