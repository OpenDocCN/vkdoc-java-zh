    `FileInputStream` 继承自 `InputStream`，并声明了三个用于创建文件输入流的构造函数。例如，`FileInputStream(String
    name)` 从由 `name` 标识的现有文件创建一个文件输入流。当文件不存在、它是一个目录而不是普通文件，或者存在其他原因导致无法打开文件进行输入时，此构造函数会抛出
    `FileNotFoundException`。


    以下示例使用 `FileInputStream(String name)` 创建一个以 `employee.dat` 为源的文件输入流：


    `FileInputStream fis = new FileInputStream("employee.dat");`


    `FileOutputStream` 和 `FileInputStream` 在文件复制场景中非常有用。清单 4-1 展示了一个提供演示的 `Copy` 应用程序的源代码。


