  raw: '#### Writing Files


    The `Files` class provides support for writing regular file content by declaring
    the following methods for writing all bytes or all text lines to a file:


    *   `Path write(Path path, byte[] bytes, OpenOption... options)`

    *   `Path write(Path path, Iterable<? extends CharSequence> lines, Charset cs,
    OpenOption... options)`

    *   `Path write(Path path, Iterable<? extends CharSequence> lines, OpenOption...
    options)`


    `write(Path path, byte[] bytes, OpenOption... options)` writes bytes to the file
    identified by `path`. The `options` parameter specifies how the file is created
    or opened. When no options are present, this method operates as if the [`CREATE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#CREATE)
    , [`TRUNCATE_EXISTING`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#TRUNCATE_EXISTING)
    , and [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    options are present. All bytes in the byte array are written to the file. The
    file is then closed, even when an exception is thrown. This method throws `UnsupportedOperationException`
    when an unsupported open option (such as `READ`) is specified. It throws `IOException`
    when an I/O error occurs.


    `write(Path path, Iterable<? extends CharSequence> lines, Charset cs, OpenOption...
    options)` writes lines of text to the file identified by `path`. Each line is
    a char sequence that’s written to the file in sequence with each line terminated
    by the operating system’s line separator, as defined by the Java property `line.separator`.
    Characters are encoded into bytes using charset `cs`. The `options` parameter
    specifies how the file is created or opened. When no options are present, this
    method operates as if the [`CREATE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#CREATE)
    , [`TRUNCATE_EXISTING`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#TRUNCATE_EXISTING)
    , and [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    options are present. All lines are written to the file. The file is then closed,
    even when an exception is thrown. This method throws `UnsupportedOperationException`
    when an unsupported open option is specified. It throws `IOException` when an
    I/O error occurs or when the text cannot be encoded using the specified charset.


    `write(Path path, Iterable<? extends CharSequence> lines, OpenOption... options)`
    behaves as if you specified `Files.write(path, lines, StandardCharsets.UTF_8,
    options);`.


    Listing [12-26](#A978-1-4842-1565-4_12_Chapter.html#FPar40) describes an application
    that reads a web page and saves its HTML text to a file named `page.html`.


    Listing 12-26\. Saving Web Page HTML to a Text File


    `import java.io.BufferedReader;`


    `import java.io.InputStreamReader;`


    `import java.io.IOException;`


    `import java.net.URL;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `import java.util.ArrayList;`


    `import java.util.List;`


    `public class SavePage`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java SavePage url");`


    `return;`


    `}`


    `URL url = new URL(args[0]);`


    `InputStreamReader isr = new InputStreamReader(url.openStream());`


    `BufferedReader br = new BufferedReader(isr);`


    `List<String> lines = new ArrayList<>();`


    `String line;`


    `while ((line = br.readLine()) != null)`


    `lines.add(line);`


    `Files.write(Paths.get("page.html"), lines);`


    `}`


    `}`


    Listing [12-26](#A978-1-4842-1565-4_12_Chapter.html#FPar40) uses an input stream
    reader to connect a buffered reader to the `java.net.URL` object’s input stream.
    Each line is read by calling `BufferedReader`’s `readLine()` method and is stored
    in a list of strings. This list is subsequently written to `page.html` via `write(Path
    path, Iterable<? extends CharSequence> lines, OpenOption... options)`.


    Compile Listing [12-26](#A978-1-4842-1565-4_12_Chapter.html#FPar40) as follows:


    `javac SavePage.java`


    Run the resulting application as follows:


    `java SavePage` [`http://apress.com`](http://apress.com/)


    You should observe a `page.html` file containing the HTML content of Apress’s
    main web page.


    The former methods are limited to writing smaller amounts of content to files.
    For very large amounts of content, `Files` offers the following methods:


    *   [`BufferedWriter`](https://docs.oracle.com/javase/8/docs/api/java/io/BufferedWriter.html#class%20in%20java.io)
    `newBufferedWriter(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`Charset`](https://docs.oracle.com/javase/8/docs/api/java/nio/charset/Charset.html#class%20in%20java.nio.charset)
    `cs,` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `... options)`

    *   [`BufferedWriter`](https://docs.oracle.com/javase/8/docs/api/java/io/BufferedWriter.html#class%20in%20java.io)
    `newBufferedWriter(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `... options)`

    *   [`OutputStream`](https://docs.oracle.com/javase/8/docs/api/java/io/OutputStream.html#class%20in%20java.io)
    `newOutputStream(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `... options)`


    `newBufferedWriter(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`Charset`](https://docs.oracle.com/javase/8/docs/api/java/nio/charset/Charset.html#class%20in%20java.nio.charset)
    `cs,` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `... options)` opens or creates the file identified by `path` for writing and
    returns a `java.io.BufferedWriter` (with the default buffer size) that may be
    used to efficiently write text. Characters are encoded into bytes using charset
    `cs`. The `options` parameter specifies how the file is created or opened. When
    no options are present, this method works as if the [`CREATE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#CREATE)
    , [`TRUNCATE_EXISTING`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#TRUNCATE_EXISTING)
    , and [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    options are present. It throws `UnsupportedOperationException` when an unsupported
