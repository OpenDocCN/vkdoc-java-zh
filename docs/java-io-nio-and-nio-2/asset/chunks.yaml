    清单 12-31 创建了一个关闭钩子，它注册了一个 `java.lang.Thread` 子类对象，该对象重写的 `run()` 方法将在 JVM 结束前执行。具体来说，它将执行
    `Files.delete(path);` 来删除临时目录。我将在本章后面讨论这个方法。


    编译清单 12-31（`javac CTDDemo.java`）并运行生成的应用程序（`java CTDDemo .`）。应用程序终止后，您应该不会在当前目录中看到临时目录。


    #### 列出目录内容


    通常需要获取目录条目的列表。NIO.2 提供了 `java.nio.file.DirectoryStream<T>` 接口来协助完成此任务。`DirectoryStream`
    是 `java.lang.Iterable<T>` 的子类型，这使得目录流成为便捷的增强型 `for` 循环语句的目标。


    `DirectoryStream` 也是 `java.io.Closeable` 的子类型，而 `java.io.Closeable` 又是 `java.lang.AutoCloseable`
    的子类型。这种安排使得可以将 `DirectoryStream` 与 `try`-with-resources 语句一起使用，以自动关闭目录流。


    注意


    当不使用 `try`-with-resources 时，请在迭代完成后调用目录流的 `close()` 方法，以释放为打开目录所持有的任何资源。当应用程序结束时，流会自动关闭。


    `DirectoryStream` 继承了 `Iterable` 的 `Iterator<T> iterator()` 方法，这使得目录流成为增强型 `for`
    循环的目标。此外，`DirectoryStream` 声明了一个嵌套的 `Filter<T>` 接口，由类实现该接口来决定是否应接受或过滤目录条目。


    您可以通过调用 `Files` 类的 `newDirectoryStream()` 方法之一来获取 `DirectoryStream`：


    *   [`DirectoryStream`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/DirectoryStream.html#interface%20in%20java.nio.file)
    `<` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `> newDirectoryStream(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `dir)`

    *   `DirectoryStream<Path> newDirectoryStream(Path dir, DirectoryStream.Filter<?
    super Path> filter)`

    *   [`DirectoryStream`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/DirectoryStream.html#interface%20in%20java.nio.file)
    `<` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `> newDirectoryStream(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `dir,` [`String`](https://docs.oracle.com/javase/8/docs/api/java/lang/String.html#class%20in%20java.lang)
    `glob)`


    `newDirectoryStream(` `Path` `dir)` 打开一个目录，返回一个 `DirectoryStream` 以迭代该目录中的所有条目。目录流迭代器返回的元素类型为
    `Path`；每个 `Path` 对象代表目录中的一个条目。这些 `Path` 对象是通过将目录条目的名称相对于 `dir` 进行解析而获得的。当发生 I/O
    错误时，此方法会抛出 `IOException`；当路径无法打开（因为它不是一个目录）时，会抛出 `java.nio.file.NotDirectoryException`。


    清单 12-32 展示了一个应用程序，它获取并输出指定目录中的所有条目。


    清单 12-32\. 获取并输出目录中的所有条目


    `import java.io.IOException;`


    `import java.nio.file.DirectoryStream;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class DSDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java DSDemo dirpath");`


    `return;`


    `}`


    `Path path = Paths.get(args[0]);`


    `DirectoryStream<Path> ds = Files.newDirectoryStream(path);`


    `for (Path p: ds)`


    `System.out.println(p);`


    `}`


    `}`


    在清单 12-32 中，为了方便起见，我没有费心使用 `try`-with-resources。（毕竟，这只是一个随手可弃的小应用程序。）另外，我也没有费心调用
    `close()`，因为当应用程序终止时，目录流会自动关闭。


    按如下方式编译清单 12-32：


    `javac DSDemo.java`


    按如下方式运行生成的应用程序：


    `java DSDemo .`


    我得到了以下输出：


    `.\DSDemo.class`


    `.\DSDemo.java`

