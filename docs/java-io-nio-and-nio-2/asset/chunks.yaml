  raw: '#### Exploring Server Socket Channels


    `ServerSocketChannel` is the simplest of the three socket channel classes. This
    class includes the following methods:


    *   `static ServerSocketChannel open()`: Attempt to open a server-socket channel,
    which is initially unbound; it must be bound to a specific address via one of
    its peer socket’s `bind()` methods before connections can be accepted. If the
    channel cannot be opened, `IOException` is thrown.

    *   `ServerSocket socket()`: Return the peer `ServerSocket` instance associated
    with this server socket channel.

    *   `SocketChannel accept()`: Accept the connection made to this channel’s socket.
    If this channel is nonblocking, `accept()` immediately returns `null` when there
    are no pending connections or returns a socket channel that represents the connection.
    Otherwise, when the channel is blocking, `accept()` blocks indefinitely until
    a new connection is available or an I/O error occurs. The socket channel returned
    by `accept()` is blocking regardless of whether the server socket channel is blocking
    or nonblocking. This method throws `ClosedChannelException` when the server socket
    channel is closed, `AsynchronousCloseException` when another thread closes this
    server socket channel while the accept operation is in progress, `java.nio.channels.NotYetBoundException`
    when the server socket channel hasn’t been bound, or `IOException` when an I/O
    error occurs.


    A server socket channel behaves as a server in the TCP/IP stream protocol. You
    use server socket channels to listen for incoming connections with clients.


    You create a new server socket channel by invoking the static `open()` factory
    method. If all goes well, `open()` returns a `ServerSocketChannel` instance associated
    with an unbound peer `ServerSocket` object. You can obtain this object by invoking
    `socket()`, and then invoke `ServerSocket`’s `bind()` method to bind the server
    socket (and ultimately the server socket channel) to a specific address.


    You can then invoke `ServerSocketChannel`’s `accept()` method to accept an incoming
    connection. Depending on whether or not you have configured the server socket
    channel to be nonblocking, this method either returns immediately with `null`
    or a socket channel to an incoming connection, or blocks until there is an incoming
    connection.


    Note


    Alternatively, you can invoke `accept()` on the peer `ServerSocket` object that
    `socket()` returns. However, this `accept()` method will always block.


    Listing [7-7](#A978-1-4842-1565-4_7_Chapter.html#FPar22) presents a `ChannelServer`
    application that demonstrates `ServerSocketChannel`.


    Listing 7-7\. Demonstrating `ServerSocketChannel`


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.ServerSocketChannel;`


    `import java.nio.channels.SocketChannel;`


    `public class ChannelServer`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `System.out.println("Starting server...");`


    `ServerSocketChannel ssc = ServerSocketChannel.open();`


    `ssc.socket().bind(new InetSocketAddress(9999));`


    `ssc.configureBlocking(false);`


    `String msg = "Local address: " + ssc.socket().getLocalSocketAddress();`


    `ByteBuffer buffer = ByteBuffer.wrap(msg.getBytes());`


    `while (true)`


    `{`


    `System.out.print(".");`


    `SocketChannel sc = ssc.accept();`


    `if (sc != null)`


    `{`


    `System.out.println();`


    `System.out.println("Received connection from " +`


    `sc.socket().getRemoteSocketAddress());`


    `buffer.rewind();`


    `sc.write(buffer);`


    `sc.close();`


    `}`


    `else`


    `try`


    `{`


    `Thread.sleep(100);`


    `}`


    `catch (InterruptedException ie)`


    `{`


    `assert false; // shouldn’t happen`


    `}`


    `}`


    `}`


    `}`


    Listing [7-7](#A978-1-4842-1565-4_7_Chapter.html#FPar22)’s `main()` method first
    outputs a startup message and then obtains a server socket channel. Continuing,
    it accesses the `ServerSocket` peer object and uses this object to bind the socket/channel
    to port 9999.


    Next, `main()` configures the server socket channel to be nonblocking and creates
