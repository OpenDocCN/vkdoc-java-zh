    `joinGroup()` and `leaveGroup()` throw `IOException` when an I/O error occurs
    while attempting to join or leave the group or when the IP address is not a multicast
    IP address.


    Because the client doesn’t know exactly how long the arrays of bytes will be,
    it assumes 256 bytes to ensure that the data buffer will hold the entire array.
    If it tried to print out the returned array, you would see a lot of empty space
    after the actual data had been printed.


    To eliminate this space, the client invokes `DatagramPacket`’s `int getLength()`
    method to obtain the actual length of the array, creates a second byte array (`buffer2`)
