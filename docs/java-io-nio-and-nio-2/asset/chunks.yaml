    ### Managing Attributes


    Files are associated with attributes, such as size, last modification time, hidden,
    permissions, and owner. NIO.2 supports attributes via the types in the `java.nio.file.attribute`
    package along with the attribute-oriented methods of the `Files` class and other
    types.


    Attributes are grouped into views, where each view corresponds to a specific file
    system implementation. Some views let you read attributes in bulk by providing
    a `readAttributes()` method. Also, you can get and set attributes by calling `Files`’s
    `getAttribute()` and `setAttribute()` methods.


    Views are described by interfaces that descend from `AttributeView`, whose `String
    name()` method returns the view’s name. This interface is subtyped by `FileAttributeView`,
    which is a view of attributes associated with files. `FileAttributeView` doesn’t
    contribute any methods.


    `FileAttributeView` is subtyped by the following interfaces:


    *   `BasicFileAttributeView`: Provides a view of a basic set of file attributes
    common to many file systems.

    *   `FileOwnerAttributeView`: Provides support for reading or updating a file
    owner.

    *   `UserDefinedFileAttributeView`: Provides a view of a file’s user-defined attributes
    (also called extended attributes).


    `BasicFileAttributeView` is subtyped by the following interfaces:


    *   `DosFileAttributeView`: Provides a view of the legacy MS-DOS/PC-DOS file attributes.

    *   `PosixFileAttributeView`: Provides a view of the file attributes commonly
    associated with files on file systems used by operating systems that implement
    the Portable Operating System Interface (POSIX) family of standards.


    `FileOwnerAttributeView` is subtyped by the following interfaces:


    *   `AclFileAttributeView`: Provides support for reading or updating a file’s
    ACL or file owner attributes.

    *   `PosixFileAttributeView`


    As you can see, `PosixFileAttributeView` has two immediate parent interfaces;
    it’s a specialized basic file attribute view and a specialized file owner attribute
    view. Figure [12-2](#A978-1-4842-1565-4_12_Chapter.html#Fig2) clarifies this relationship
    along with other relationships among the view hierarchy’s interfaces.


    ![A978-1-4842-1565-4_12_Fig2_HTML.jpg](A978-1-4842-1565-4_12_Fig2_HTML.jpg)


    Figure 12-2.


    Relating view types; subtypes are indented to the right'
