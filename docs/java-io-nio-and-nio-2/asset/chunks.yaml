  raw: '#### Custom Serialization and Deserialization


    The previous discussion focused on default serialization and deserialization (with
    the exception of marking an instance field `transient` to prevent it from being
    included during serialization). However, situations arise where you need to customize
    these tasks.


    For example, suppose you want to serialize instances of a class that doesn’t implement
    `Serializable`. As a workaround, you subclass this other class, have the subclass
    implement `Serializable`, and forward the subclass constructor calls to the superclass.


    Although this workaround lets you serialize subclass objects, you cannot deserialize
    these serialized objects when the superclass doesn’t declare a noargument constructor,
    which is required by the deserialization mechanism. Listing [4-11](#A978-1-4842-1565-4_4_Chapter.html#FPar30)
    demonstrates this problem.


    Listing 4-11\. Problematic Deserialization


    `import java.io.FileInputStream;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `import java.io.ObjectInputStream;`


    `import java.io.ObjectOutputStream;`


    `import java.io.Serializable;`


    `class Employee`


    `{`


    `private String name;`


    `Employee(String name)`


    `{`


    `this.name = name;`


    `}`


    `@Override`


    `public String toString()`


    `{`


    `return name;`


    `}`


    `}`


    `class SerEmployee extends Employee implements Serializable`


    `{`


    `SerEmployee(String name)`


    `{`


    `super(name);`


    `}`


    `}`


    `public class SerializationDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `ObjectOutputStream oos = null;`


    `ObjectInputStream ois = null;`


    `try`


    `{`


    `oos = new ObjectOutputStream(new FileOutputStream("employee.dat"));`


    `SerEmployee se = new SerEmployee("John Doe");`


    `System.out.println(se);`


    `oos.writeObject(se);`


    `oos.close();`


    `oos = null;`


    `System.out.println("se object written to file");`


    `ois = new ObjectInputStream(new FileInputStream("employee.dat"));`


    `se = (SerEmployee) ois.readObject();`


    `System.out.println("se object read from file");`


    `System.out.println(se);`


    `}`


    `catch (ClassNotFoundException cnfe)`


    `{`


    `cnfe.printStackTrace();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `finally`


    `{`


    `if (oos != null)`


    `try`


    `{`


    `oos.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `assert false; // shouldn’t happen in this context`


    `}`


    `if (ois != null)`


    `try`


    `{`


    `ois.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `assert false; // shouldn’t happen in this context`


    `}`


    `}`


    `}`


    `}`


    Listing [4-11](#A978-1-4842-1565-4_4_Chapter.html#FPar30)’s `main()` method instantiates
    `SerEmployee` with an employee name. This class’s `SerEmployee(String)` constructor
    passes this argument to its `Employee` counterpart.


    `main()` next calls `Employee`’s `toString()` method indirectly via `System.out.println()`,
    to obtain this name, which is then output.


    Continuing, `main()` serializes the `SerEmployee` instance to an `employee.dat`
    file via `writeObject()`. It then attempts to deserialize this object via `readObject()`,
    and this is where the trouble occurs, as revealed by the following output:


    `John Doe`


    `se object written to file`


    `java.io.InvalidClassException: SerEmployee; no valid constructor`


    `at java.io.ObjectStreamClass$ExceptionInfo.newInvalidClassException(ObjectStreamClass.java:150)`


    `at java.io.ObjectStreamClass.checkDeserialize(ObjectStreamClass.java:768)`


    `at java.io.ObjectInputStream.readOrdinaryObject(ObjectInputStream.java:1775)`


    `at java.io.ObjectInputStream.readObject0(ObjectInputStream.java:1351)`


    `at java.io.ObjectInputStream.readObject(ObjectInputStream.java:371)`


    `at SerializationDemo.main(SerializationDemo.java:48)`


    This output reveals a thrown instance of the `InvalidClassException` class. This
    exception object was thrown during deserialization because `Employee` doesn’t
    possess a noargument constructor.


    You can overcome this problem by taking advantage of the adapter pattern ( [`https://en.wikipedia.org/wiki/Adapter_pattern`](https://en.wikipedia.org/wiki/Adapter_pattern)
