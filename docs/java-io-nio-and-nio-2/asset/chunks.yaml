- fmt: "# Listing 13-5: Managing Connections from Clients\n\n`ConnectionHandler`’s\
    \ source code is presented in Listing [13-5](#A978-1-4842-1565-4_13_Chapter.html#FPar7).\n\
    \n```java\nimport java.io.IOException;\nimport java.net.SocketAddress;\nimport\
    \ java.nio.ByteBuffer;\nimport java.nio.channels.AsynchronousSocketChannel;\n\
    import java.nio.channels.CompletionHandler;\n\npublic class ConnectionHandler\n\
    implements CompletionHandler<AsynchronousSocketChannel, Attachment>\n{\n    @Override\n\
    \    public void completed(AsynchronousSocketChannel channelClient,\n        \
    \                  Attachment att)\n    {\n        try\n        {\n          \
    \  SocketAddress clientAddr = channelClient.getRemoteAddress();\n            System.out.printf(\"\
    Accepted connection from %s%n\", clientAddr);\n            att.channelServer.accept(att,\
    \ this);\n            Attachment newAtt = new Attachment();\n            newAtt.channelServer\
    \ = att.channelServer;\n            newAtt.channelClient = channelClient;\n  \
    \          newAtt.isReadMode = true;\n            newAtt.buffer = ByteBuffer.allocate(2048);\n\
    \            newAtt.clientAddr = clientAddr;\n            ReadWriteHandler rwh\
    \ = new ReadWriteHandler();\n            channelClient.read(newAtt.buffer, newAtt,\
    \ rwh);\n        }\n        catch (IOException ioe)\n        {\n            ioe.printStackTrace();\n\
    \        }\n    }\n\n    @Override\n    public void failed(Throwable t, Attachment\
    \ att)\n    {\n        System.out.println(\"Failed to accept connection\");\n\
    \    }\n}\n```\n\n`ConnectionHandler` is a `CompletionHandler` that responds to\
    \ incoming connections. Its `completed()` method is called when a connection is\
    \ successful; otherwise, its `failed()` method is called.\n\nThe `completed()`\
    \ method’s first task is to obtain and output the client’s socket address for\
    \ identification. I specified `channelClient.getRemoteAddress()` instead of `channelClient.getLocalAddress()`\
    \ to return the client’s socket address because the socket corresponding to `channelClient`\
    \ was created on the server side and it communicates with the client-side socket.\
    \ Calling `getLocalAddress()` on `channelClient` returns the server-side socket\
    \ address. Calling `getRemoteAddress()` on `channelClient` returns the client-side\
    \ socket address.\n\nNext, `completed()` calls `accept()` on the server socket\
    \ channel with the passed `Attachment` object and a reference to the current completion\
    \ handler as arguments. This call allows the server to respond to the next incoming\
    \ connection.\n\nThe `accept()` method is called on the server socket channel\
    \ referenced from the `Attachment` object passed to `completed()`. This same object\
    \ is passed as the first argument to `accept()`. None of the other fields in the\
    \ `Attachment` object have been initialized because they aren’t required. This\
    \ `Attachment` object is only needed to identify the server socket channel.\n\n\
    After calling `accept()`, a second `Attachment` object is created and initialized\
    \ in preparation for reading from the client. Also, a `ReadWriteHandler` object\
    \ is created to respond to the read operation. The new `Attachment` object’s byte\
    \ buffer, the new `Attachment` object, and the `ReadWriteHandler` object are passed\
    \ as arguments to the client socket channel’s `read()` method.\n\n# Listing 13-6:\
    \ Managing Reads and Writes with the Client\n\n`ReadWriteHandler`’s source code\
    \ is presented in Listing [13-6](#A978-1-4842-1565-4_13_Chapter.html#FPar7).\n\
    \n```java\nimport java.io.IOException;\nimport java.nio.channels.CompletionHandler;\n\
    import java.nio.charset.Charset;\n\npublic class ReadWriteHandler\nimplements\
    \ CompletionHandler<Integer, Attachment>\n{\n    private final static Charset\
    \ CSUTF8 = Charset.forName(\"UTF-8\");\n\n    @Override\n    public void completed(Integer\
    \ result, Attachment att)\n    {\n        if (result == -1)\n        {\n     \
    \       try\n            {\n                att.channelClient.close();\n     \
    \           System.out.printf(\"Stopped listening to client %s%n\",\n        \
    \                          att.clientAddr);\n            }\n            catch\
    \ (IOException ioe)\n            {\n                ioe.printStackTrace();\n \
    \           }\n            return;\n        }\n\n        if (att.isReadMode)\n\
    \        {\n            att.buffer.flip();\n            int limit = att.buffer.limit();\n\
    \            byte bytes[] = new byte[limit];\n            att.buffer.get(bytes,\
    \ 0, limit);\n            System.out.printf(\"Client at %s sends message: %s%n\"\
    ,\n                              att.clientAddr,\n                           \
    \   new String(bytes, CSUTF8));\n            att.isReadMode = false;\n       \
    \     att.buffer.rewind();\n            att.channelClient.write(att.buffer, att,\
    \ this);\n        }\n        else\n        {\n            att.isReadMode = true;\n\
    \            att.buffer.clear();\n            att.channelClient.read(att.buffer,\
    \ att, this);\n        }\n    }\n\n    @Override\n    public void failed(Throwable\
    \ t, Attachment att)\n    {\n        System.out.println(\"Connection with client\
    \ broken\");\n    }\n}\n```\n\n`ReadWriteHandler` is a `CompletionHandler` that\
    \ responds to `read()` or `write()` method completions. Its `completed()` method\
    \ is called to respond to a successful `read()` or `write()`, which includes issuing\
    \ a counterpart `write()` or `read()`. Its `failed()` method is called when the\
    \ client breaks off its connection with the server.\n\nThe `completed()` method’s\
    \ first task is to respond to a `read()` call that returns `-1`, which indicates\
    \ that no bytes could be read because end-of-stream has been reached. (The client\
    \ may have terminated before writing data.) It closes the client socket channel,\
    \ outputs a message to indicate that the server is no longer listening to the\
    \ client, and returns.\n\nAssuming that the read/write handler is operating in\
    \ read mode (`true`), the buffer contents are flipped and extracted to a `bytes`\
    \ array, which is subsequently converted to a string that is output.\n\nThe read/write\
    \ handler is then configured for write mode by assigning `false` to `isReadMode`,\
    \ the buffer is rewound in preparation for being written, and the buffer along\
    \ with the attachment and current completion handler are passed to the client\
    \ socket channel’s `write()` method so that the buffer contents can be sent to\
    \ the client.\n\nAfter a successful write operation, the read/write handler’s\
    \ `completed()` method is called. Because `isReadMode` is no longer `true`, the\
    \ `else` part of the `if`-`else` statement executes. It toggles `isReadMode` to\
    \ `true`, clears the buffer, and initiates a read operation to read from the client.\
    \ This pattern continues until the client presents nothing more to read and the\
    \ completion handler can terminate. (This latter scenario will probably never\
    \ happen.)\n\nCompile Listings [13-3](#A978-1-4842-1565-4_13_Chapter.html#FPar7)\
    \ through [13-6](#A978-1-4842-1565-4_13_Chapter.html#FPar7) as follows:\n\n```bash\n\
    javac Server.java\n```\n\nRun the resulting application as follows:\n\n```bash\n\
    java Server\n```\n\nYou should observe the following initial output:\n\n```\n\
    Server listening at /127.0.0.1:9090\n```"
