    #### 随机访问文件


    第 3 章 介绍了用于创建和/或打开常规文件以进行随机访问的 `java.io.RandomAccessFile` 类。NIO.2 提供了一个等效的 `java.nio.channels.SeekableByteChannel`
    接口。


    `SeekableByteChannel` 扩展了 `java.nio.channels.ByteChannel` 接口，描述了一个维护当前位置并允许更改位置的字节通道。表
    12-1 列出了其方法。


    表 12-1.


    定义可查找字节通道的方法


    | 方法 | 描述 |

    | --- | --- |

    | `long position()` | 返回此通道的位置，该位置是从可查找实体的开头到当前位置的非负字节计数。当此通道关闭时，此方法抛出 `java.nio.channels.ClosedChannelException`；当发生其他
    I/O 错误时，抛出 `IOException`。 |

    | `SeekableByteChannel position(long newPosition)` | 将此通道的位置设置为 `newPosition`，即从实体开头算起的非负字节计数。将位置设置为大于当前大小的值是合法的，但不会改变实体的大小。随后尝试在该位置读取字节会立即返回文件结束指示。随后尝试在该位置写入字节会导致实体增长以容纳新字节；先前文件结束与新写入字节之间的任何字节值都是未指定的。当连接到使用
    [`APPEND`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#APPEND)
    选项打开的实体时，不建议设置通道的位置。当以追加模式打开时，位置会在写入前前进到末尾。当此通道关闭时，此方法抛出 `ClosedChannelException`；当新位置为负数时，抛出
    `IllegalArgumentException`；当发生其他 I/O 错误时，抛出 `IOException`。 |

    | `int read(ByteBuffer dst)` | 从此通道读取一个字节序列到给定的缓冲区。从该通道的当前位置开始读取字节，然后使用实际读取的字节数更新位置。返回读取的字节数。当到达流末尾时，返回
    `-1`。当此通道关闭时，此方法抛出 `ClosedChannelException`；当另一个线程在读取操作进行中关闭此通道时，抛出 `java.nio.channels.AsynchronousCloseException`；当另一个线程在读取操作进行中中断当前线程，从而关闭通道并设置当前线程的中断状态时，抛出
    `java.nio.channels.ClosedByInterruptException`；当发生其他 I/O 错误时，抛出 `IOException`。
    |

    | `long size()` | 返回此通道所连接实体的当前大小（以字节为单位）。当此通道关闭时，此方法抛出 `ClosedChannelException`；当发生其他
    I/O 错误时，抛出 `IOException`。 |

    | `SeekableByteChannel truncate(long size)` | 将此通道所连接的实体截断为 `size`。如果 `size` 小于当前大小，则实体被截断，丢弃新末尾之后的任何字节。如果
    `size` 大于或等于当前大小，则实体不会被修改。无论哪种情况，如果当前位置大于 `size`，则位置被设置为 `size`。当此通道未以写入方式打开时，此方法抛出
    `java.nio.channels.NonWritableChannelException`；当此通道关闭时，抛出 `ClosedChannelException`；当
    `size` 为负数时，抛出 `IllegalArgumentException`；当发生其他 I/O 错误时，抛出 `IOException`。 |

    | `int write(ByteBuffer src)` | 从给定的缓冲区向此通道写入一个字节序列。除非通道连接到一个使用 [`APPEND`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#APPEND)
    选项打开的实体（在这种情况下，位置首先前进到末尾），否则从该通道的当前位置开始写入字节。必要时，通道所连接的实体将增长以容纳写入的字节，然后使用实际写入的字节数更新位置。此方法返回写入通道的字节数。当此通道关闭时，它抛出
    `ClosedChannelException`；当另一个线程在写入操作进行中关闭此通道时，抛出 `AsynchronousCloseException`；当另一个线程在写入操作进行中中断当前线程，从而关闭通道并设置当前线程的中断状态时，抛出
    `ClosedByInterruptException`；当发生其他 I/O 错误时，抛出 `IOException`。 |

