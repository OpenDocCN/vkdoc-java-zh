    it serializes the contents of all instance fields that are not explicitly prefixed
    with the `transient` reserved word. For example, consider the following field
    declaration:


    `public transient char[] password;`


    This declaration specifies `transient` to avoid serializing a password for some
    hacker to encounter. The JVM’s serialization mechanism ignores any instance field
    that’s marked `transient`.


    Note


    Check out my “Transience” blog post ( [`www.javaworld.com/community/node/13451`](http://www.javaworld.com/community/node/13451)
    ) to learn more about `transient`.


    `writeObject()` throws an instance of `IOException` or an `IOException` subclass
    when something goes wrong. For example, this method throws `NotSerializableException`
    when it encounters an object whose class doesn’t implement `Serializable`.


    Note


    Because `ObjectOutputStream` implements `DataOutput`, it also declares methods
    for writing primitive-type values and strings to an object output stream.


    Java provides the concrete `ObjectInputStream` class to initiate the deserialization
    of an object’s state from an object input stream. This class declares an `ObjectInputStream(InputStream
    in)` constructor that chains the object input stream to the input stream specified
    by `in`.


    When you pass an input stream reference to `in`, this constructor attempts to
    read a serialization header from that input stream. It throws `NullPointerException`
    when `in` is `null`, `IOException` when an I/O error prevents it from reading
    this header, and `java.io.StreamCorruptedException` (an indirect subclass of `IOException`)
    when the stream header is incorrect.


    `ObjectInputStream` deserializes an object via its `Object readObject()` method.
    This method attempts to read information about `obj`’s class followed by the values
    of `obj`’s instance fields from the underlying input stream.


    `readObject()` throws an instance of `java.lang.ClassNotFoundException`, `IOException`,
    or an `IOException` subclass when something goes wrong. For example, this method
    throws `java.io.OptionalDataException` when it encounters primitive-type values
    instead of objects.


    Note


    Because `ObjectInputStream` implements `DataInput`, it also declares methods for
    reading primitive-type values and strings from an object input stream.


    Listing [4-10](#A978-1-4842-1565-4_4_Chapter.html#FPar28) presents an application
    that uses these classes to serialize and deserialize an instance of Listing [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23)’s
