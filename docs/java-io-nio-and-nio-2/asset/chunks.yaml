    Channels partner with buffers to achieve high-performance I/O. This chapter introduces
    you to NIO’s channel types.


    ## Introducing Channels


    A channel is an object that represents an open connection to a hardware device,
    a file, a network socket, an application component, or another entity that’s capable
    of performing writes, reads, and other I/O operations. Channels efficiently transfer
    data between byte buffers and operating system-based I/O service sources or destinations.


    Note


    Channels are gateways through which I/O services are accessed. Channels use byte
    buffers as the endpoints for sending and receiving data.


    There often exists a one-to-one correspondence between an operating system file
    handle or file descriptor and a channel. When you work with channels in a file
    context, the channel will often be connected to an open file descriptor. Despite
    channels being more abstract than file descriptors, they are still capable of
    modeling an operating system’s I/O facilities.


    ## Channel and Its Children


    Java supports channels via its `java.nio.channels` and `java.nio.channels.spi`
    packages. Applications interact with the types located in the former package;
    developers who are defining new selector providers work with the latter package.
    (I will discuss selectors in the next chapter.)


    All channels are instances of classes that ultimately implement the `java.nio.channels.Channel`
    interface. `Channel` declares the following methods:


    *   `void close()`: Close this channel. When this channel is already closed, invoking
    `close()` has no effect. When another thread has already invoked `close()`, a
    new `close()` invocation blocks until the first invocation finishes, after which
    `close()` returns without effect. This method throws `java.io.IOException` when
    an I/O error occurs. After the channel is closed, any further attempts to invoke
    I/O operations on it result in `java.nio.channels.ClosedChannelException` being
    thrown.

    *   `boolean isOpen()`: Return this channel’s open status. This method returns
    `true` when the channel is open; otherwise, it returns `false`.


    These methods indicate that only two operations are common to all channels: close
    the channel and determine whether the channel is open or closed. To support I/O,
    `Channel` is extended by the `java.nio.channels.WritableByteChannel` and `java.nio.channels.ReadableByteChannel`
    interfaces:


    *   `WritableByteChannel` declares an abstract `int write(ByteBuffer buffer)`
    method that writes a sequence of bytes from `buffer` to the current channel. This
    method returns the number of bytes actually written. It throws `java.nio.channels.NonWritableChannelException`
    when the channel was not opened for writing, `java.nio.channels.ClosedChannelException`
    when the channel is closed, `java.nio.channels.AsynchronousCloseException` when
    another thread closes the channel during the write, `java.nio.channels.ClosedByInterruptException`
    when another thread interrupts the current thread while the write operation is
    in progress (thereby closing the channel and setting the current thread’s interrupt
    status), and `IOException` when some other I/O error occurs.

    *   `ReadableByteChannel` declares an abstract `int read(ByteBuffer buffer)` method
    that reads bytes from the current channel into `buffer`. This method returns the
    number of bytes actually read (or `-1` when there are no more bytes to read).
    It throws `java.nio.channels.NonReadableChannelException` when the channel was
    not opened for reading; `ClosedChannelException` when the channel is closed; `AsynchronousCloseException`
    when another thread closes the channel during the read; `ClosedByInterruptException`
    when another thread interrupts the current thread while the write operation is
    in progress, thereby closing the channel and setting the current thread’s interrupt
    status; and `IOException` when some other I/O error occurs.


    Note


    A channel whose class implements only `WritableByteChannel` or `ReadableByteChannel`
    is unidirectional. Attempting to read from a writable byte channel or write to
    a readable byte channel results in a thrown exception.


    You can use the `instanceof` operator to determine if a channel instance implements
    either interface. Because it’s somewhat awkward to test for both interfaces, Java
    supplies the `java.nio.channels.ByteChannel` interface, which is an empty marker
    interface that subtypes `WritableByteChannel` and `ReadableByteChannel`. When
    you need to learn whether or not a channel is bidirectional, it’s more convenient
    to specify an expression such as `channel instanceof ByteChannel`.'
  trans: '

    ## 摘要


    缓冲区是一种 NIO 对象，用于存储固定数量的数据，这些数据将被发送到 I/O 服务或从 I/O 服务接收。它位于应用程序与通道之间，通道负责将缓冲的数据写入服务，或从服务读取数据并将其存入缓冲区。


    缓冲区具有容量、界限、位置和标记属性。这四个属性的关系如下：0 <= 标记 <= 位置 <= 界限 <= 容量。


    缓冲区由派生自抽象 `Buffer` 类的抽象类实现。这些类包括 `ByteBuffer`、`CharBuffer`、`DoubleBuffer`、`FloatBuffer`、`IntBuffer`、`LongBuffer`
    和 `ShortBuffer`。此外，`ByteBuffer` 还被抽象类 `MappedByteBuffer` 进一步子类化。


    在本章中，您学习了如何创建缓冲区（包括视图缓冲区）、写入和读取缓冲区内容、翻转缓冲区、标记缓冲区，以及执行其他缓冲区操作（如压缩）。您还了解了字节顺序和直接字节缓冲区。


    第 7 章 将介绍 NIO 的通道类型。


    # 7. 通道


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​7](http://dx.doi.org/10.1007/978-1-4842-1565-4_7))
    包含补充材料，仅供授权用户使用。


    通道与缓冲区协同工作，以实现高性能 I/O。本章将向您介绍 NIO 的通道类型。


    ## 通道简介


    通道是一个对象，代表与硬件设备、文件、网络套接字、应用程序组件或其他能够执行写入、读取及其他 I/O 操作的实体之间的开放连接。通道在字节缓冲区和基于操作系统的
    I/O 服务源或目标之间高效地传输数据。


    注意


    通道是访问 I/O 服务的网关。通道使用字节缓冲区作为发送和接收数据的端点。


    操作系统的文件句柄或文件描述符与通道之间通常存在一一对应的关系。当您在文件上下文中使用通道时，该通道通常会连接到一个打开的文件描述符。尽管通道比文件描述符更抽象，但它们仍然能够模拟操作系统的
    I/O 设施。


    ## 通道及其子类


    Java 通过 `java.nio.channels` 和 `java.nio.channels.spi` 包支持通道。应用程序与前者包中的类型交互；而定义新选择器提供程序的开发者则使用后者包。（我将在下一章讨论选择器。）


    所有通道都是最终实现了 `java.nio.channels.Channel` 接口的类的实例。`Channel` 声明了以下方法：


    *   `void close()`：关闭此通道。当此通道已关闭时，调用 `close()` 无效。当另一个线程已调用 `close()` 时，新的 `close()`
    调用将阻塞，直到第一个调用完成，之后 `close()` 返回且无效果。当发生 I/O 错误时，此方法抛出 `java.io.IOException`。通道关闭后，任何进一步尝试对其执行
    I/O 操作都将导致抛出 `java.nio.channels.ClosedChannelException`。

    *   `boolean isOpen()`：返回此通道的打开状态。当通道打开时，此方法返回 `true`；否则返回 `false`。


    这些方法表明，所有通道共有的操作只有两个：关闭通道和判断通道是打开还是关闭。为了支持 I/O，`Channel` 被 `java.nio.channels.WritableByteChannel`
    和 `java.nio.channels.ReadableByteChannel` 接口扩展：


    *   `WritableByteChannel` 声明了一个抽象方法 `int write(ByteBuffer buffer)`，该方法将 `buffer`
    中的字节序列写入当前通道。此方法返回实际写入的字节数。当通道未以写入方式打开时，抛出 `java.nio.channels.NonWritableChannelException`；当通道关闭时，抛出
    `java.nio.channels.ClosedChannelException`；当另一个线程在写入期间关闭通道时，抛出 `java.nio.channels.AsynchronousCloseException`；当另一个线程在写入操作进行中中断当前线程（从而关闭通道并设置当前线程的中断状态）时，抛出
    `java.nio.channels.ClosedByInterruptException`；当发生其他 I/O 错误时，抛出 `IOException`。

    *   `ReadableByteChannel` 声明了一个抽象方法 `int read(ByteBuffer buffer)`，该方法从当前通道读取字节到
    `buffer` 中。此方法返回实际读取的字节数（当没有更多字节可读时返回 `-1`）。当通道未以读取方式打开时，抛出 `java.nio.channels.NonReadableChannelException`；当通道关闭时，抛出
    `ClosedChannelException`；当另一个线程在读取期间关闭通道时，抛出 `AsynchronousCloseException`；当另一个线程在写入操作进行中中断当前线程，从而关闭通道并设置当前线程的中断状态时，抛出
    `ClosedByInterruptException`；当发生其他 I/O 错误时，抛出 `IOException`。


    注意


    其类仅实现 `WritableByteChannel` 或 `ReadableByteChannel` 的通道是单向的。尝试从可写字节通道读取或向可读字节通道写入将导致抛出异常。


    您可以使用 `instanceof` 运算符来判断通道实例是否实现了任一接口。由于同时测试两个接口有些不便，Java 提供了 `java.nio.channels.ByteChannel`
    接口，这是一个空的标记接口，是 `WritableByteChannel` 和 `ReadableByteChannel` 的子类型。当您需要了解通道是否为双向时，使用诸如
    `channel instanceof ByteChannel` 这样的表达式会更加方便。

    '
- fmt: "`Channel`也被`java.nio.channels.InterruptibleChannel`接口扩展。`InterruptibleChannel`描述了一个可以异步关闭和中断的通道。该接口覆盖了其父接口`Channel`的`close()`方法头，为`Channel`的契约增加了以下额外规定：任何当前在此通道的I/O操作中被阻塞的线程都将收到`AsynchronousCloseException`（它是`IOException`的子类）。\n\
    \n实现此接口的通道是异步可关闭的：当一个线程在可中断通道的I/O操作上被阻塞时，另一个线程可以调用该通道的`close()`方法。这会导致被阻塞的线程收到一个抛出的`AsynchronousCloseException`实例。\n\
    \n实现此接口的通道也是可中断的：当一个线程在可中断通道的I/O操作上被阻塞时，另一个线程可以调用被阻塞线程的`interrupt()`方法。这样做会导致通道被关闭，被阻塞的线程收到一个抛出的`ClosedByInterruptException`实例，并且被阻塞线程的中断状态被设置。（当一个线程的中断状态已经设置，并且它在一个通道上调用阻塞I/O操作时，该通道会被关闭，线程将立即收到一个抛出的`ClosedByInterruptException`实例；其中断状态将保持设置。）\n\
    \nNIO的设计者选择在被阻塞线程被中断时关闭通道，因为他们无法找到一种跨操作系统以相同方式可靠处理中断I/O操作的方法。保证确定性行为的唯一方法是关闭通道。\n\
    \n> **提示**\n>\n> 你可以通过使用`instanceof`运算符来确定一个通道是否支持异步关闭和中断，例如在表达式`channel instanceof\
    \ InterruptibleChannel`中。\n\n在[第6章](#A978-1-4842-1565-4_6_Chapter.html)中，你了解到必须调用`java.nio.Buffer`子类上的类方法来获取缓冲区。关于通道，有两种获取通道的方式：\n\
    \n*   `java.nio.channels`包提供了一个`Channels`工具类，它提供了两种从流中获取通道的方法。对于以下每种方法，当通道关闭时，底层流也会被关闭，并且通道不是缓冲的：\n\
    \    *   `WritableByteChannel newChannel(OutputStream outputStream)`为给定的`outputStream`返回一个可写字节通道。\n\
    \    *   `ReadableByteChannel newChannel(InputStream inputStream)`为给定的`inputStream`返回一个可读字节通道。\n\
    *   各种经典的I/O类已经被改造以支持通道创建。例如，`java.io.RandomAccessFile`声明了一个`FileChannel getChannel()`方法用于返回文件通道，而`java.net.Socket`声明了一个`SocketChannel\
    \ getChannel()`方法用于返回套接字通道。\n\n[清单 7-1](#A978-1-4842-1565-4_7_Chapter.html#FPar4)\
    \ 使用`Channels`类为标准输入和输出流获取通道，然后使用这些通道将字节从输入通道复制到输出通道。\n\n**清单 7-1. 将字节从输入通道复制到输出通道**\n\
    \n```java\nimport java.io.IOException;\nimport java.nio.ByteBuffer;\nimport java.nio.channels.Channels;\n\
    import java.nio.channels.ReadableByteChannel;\nimport java.nio.channels.WritableByteChannel;\n\
    \npublic class ChannelDemo\n{\n   public static void main(String[] args)\n   {\n\
    \      ReadableByteChannel src = Channels.newChannel(System.in);\n      WritableByteChannel\
    \ dest = Channels.newChannel(System.out);\n      try\n      {\n         copy(src,\
    \ dest); // or copyAlt(src, dest);\n      }\n      catch (IOException ioe)\n \
