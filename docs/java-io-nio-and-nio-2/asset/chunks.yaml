- fmt: '# Summary


    Java uses streams to perform I/O operations. A stream is an ordered sequence of
    bytes of an arbitrary length. Bytes flow over an output stream from an application
    to a destination and flow over an input stream from a source to an application.


    The `java.io` package provides several classes that identify various stream destinations
    and sources. These classes are descendants of the abstract `OutputStream` and
    `InputStream` classes. `FileOutputStream` and `BufferedInputStream` are examples.


    This chapter explored `OutputStream` and `InputStream`, followed by the byte array,
    file, piped, filter, buffered, data, object, and print streams. While covering
    object streams, it introduced the topics of serialization and externalization.
    The chapter concluded by revisiting standard I/O.


    [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html) presents classic I/O’s writer
    and reader classes.


    # 5. Writers and Readers


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​5](http://dx.doi.org/10.1007/978-1-4842-1565-4_5))
    contains supplementary material, which is available to authorized users.


    Java’s stream classes are good for streaming sequences of bytes, but they’re not
    good for streaming sequences of characters because bytes and characters are two
    different things: a byte represents an 8-bit data item and a character represents
    a 16-bit data item. Also, Java’s `char` and `java.lang.String` types naturally
    handle characters instead of bytes.


    More importantly, byte streams have no knowledge of character sets (sets of mappings
    between integer values, known as code points, and symbols, such as Unicode) and
    their character encodings (mappings between the members of a character set and
    sequences of bytes that encode these characters for efficiency, such as UTF-8).


    ## A Brief History of Character Sets and Character Encodings


    Early computers and programming languages were created mainly by English-speaking
    programmers in countries where English was the native language. They developed
    a standard mapping between code points 0 through 127 and the 128 commonly used
    characters in the English language (such as A–Z). The resulting character set/encoding
    was named American Standard Code for Information Interchange (ASCII).


    The problem with ASCII is that it’s inadequate for most non-English languages.
    For example, ASCII doesn’t support diacritical marks such as the cedilla used
    in French. Because a byte can represent a maximum of 256 different characters,
    developers around the world started creating different character sets/encodings
    that encoded the 128 ASCII characters, but also encoded extra characters to meet
    the needs of languages such as French, Greek, and Russian. Over the years, many
    legacy (and still important) data files have been created whose bytes represent
    characters defined by specific character sets/encodings.


    The International Organization for Standardization (ISO) and the International
    Electrotechnical Commission (IEC) worked to standardize these 8-bit character
    sets/encodings under a joint umbrella standard called ISO/IEC 8859. The result
    is a series of substandards named ISO/IEC 8859-1, ISO/IEC 8859-2, and so on. For
    example, ISO/IEC 8859-1 (also known as Latin-1) defines a character set/encoding
    that consists of ASCII plus the characters covering most Western European countries.
    Also, ISO/IEC 8859-2 (also known as Latin-2) defines a similar character set/encoding
    covering Central and Eastern European countries.


    Despite the ISO’s/IEC’s best efforts, a plethora of character sets/encodings is
    still inadequate. For example, most character sets/encodings only allow you to
    create documents in a combination of English and one other language (or a small
    number of other languages). You cannot, for example, use an ISO/IEC character
    set/encoding to create a document using a combination of English, French, Turkish,
    Russian, and Greek characters.


    This and other problems are being addressed by an international effort that has
    created and is continuing to develop Unicode, a single universal character set.
    Because Unicode characters are bigger than ISO/IEC characters, Unicode uses one
    of several variable-length encoding schemes known as Unicode Transformation Format
    (UTF) to encode Unicode characters for efficiency. For example, UTF-8 encodes
    every character in the Unicode character set in one to four bytes (and is backward-compatible
    with ASCII).


    Finally, the terms character set and character encoding are often used interchangeably.
    They mean the same thing in the context of ISO/IEC character sets in which a code
    point is the encoding. However, these terms are different in the context of Unicode
    in which Unicode is the character set and UTF-8 is one of several possible character
    encodings for Unicode characters.


    If you need to stream characters, you should take advantage of Java’s writer and
    reader classes, which were designed to support character I/O (they work with `char`
    instead of `byte`). Furthermore, the writer and reader classes take character
    encodings into account. [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html) introduces
    you to Java’s writer and reader classes.


    ## Writer and Reader Classes Overview


    The `java.io` package provides several writer and reader classes that are descendants
    of this package’s abstract `Writer` and `Reader` classes. Figure [5-1](#A978-1-4842-1565-4_5_Chapter.html#Fig1)
    reveals the hierarchy of writer classes.


    ![A978-1-4842-1565-4_5_Fig1_HTML.jpg](A978-1-4842-1565-4_5_Fig1_HTML.jpg)


    Figure 5-1. Unlike `java.io.FilterOutputStream`, `FilterWriter` is abstract


    Figure [5-2](#A978-1-4842-1565-4_5_Chapter.html#Fig2) reveals the hierarchy of
    reader classes.


    ![A978-1-4842-1565-4_5_Fig2_HTML.jpg](A978-1-4842-1565-4_5_Fig2_HTML.jpg)


    Figure 5-2. Unlike `java.io.FilterInputStream`, `FilterReader` is abstract


    Although the writer and reader class hierarchies are similar to their output stream
    and input stream counterparts, there are differences. For example, `FilterWriter`
    and `FilterReader` are abstract, whereas their `FilterOutputStream` and `FilterInputStream`
    equivalents are not abstract. Also, `BufferedWriter` and `BufferedReader` don’t
    extend `FilterWriter` and `FilterReader`, whereas `java.io.BufferedOutputStream`
    and `java.io.BufferedInputStream` extend `FilterOutputStream` and `FilterInputStream`.


    The output stream and input stream classes were introduced in Java 1.0. After
    their release, design issues emerged. For example, `FilterOutputStream` and `FilterInputStream`
    should have been abstract. However, it was too late to make these changes because
    the classes were already being used; making these changes would have resulted
    in broken code. The designers of Java 1.1’s writer and reader classes took the
    time to correct these mistakes.


    **Note:** Regarding `BufferedWriter` and `BufferedReader` directly subclassing
    `Writer` and `Reader` instead of `FilterWriter` and `FilterReader`, I believe
    that this change has to do with performance. Calls to `BufferedOutputStream`’s
    `write()` methods and `BufferedInputStream`’s `read()` methods result in calls
    to `FilterOutputStream`’s `write()` methods and `FilterInputStream`’s `read()`
    methods. Because a file I/O activity such as copying one file to another can involve
    many `write()`/`read()` method calls, you want the best performance possible.
    By not subclassing `FilterWriter` and `FilterReader`, `BufferedWriter` and `BufferedReader`
    achieve better performance.


    For brevity, I focus only on the `Writer`, `Reader`, `OutputStreamWriter`, `InputStreamReader`,
    `FileWriter`, `FileReader`, `BufferedWriter`, and `BufferedReader` classes in
    this chapter.'
  raw: '## Summary


    Java uses streams to perform I/O operations. A stream is an ordered sequence of
    bytes of an arbitrary length. Bytes flow over an output stream from an application
    to a destination and flow over an input stream from a source to an application.


    The `java.io` package provides several classes that identify various stream destinations
    and sources. These classes are descendants of the abstract `OutputStream` and
    `InputStream` classes. `FileOutputStream` and `BufferedInputStream` are examples.


    This chapter explored `OutputStream` and `InputStream`, followed by the byte array,
    file, piped, filter, buffered, data, object, and print streams. While covering
    object streams, it introduced the topics of serialization and externalization.
    The chapter concluded by revisiting standard I/O.


    [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html) presents classic I/O’s writer
    and reader classes.


    # 5. Writers and Readers


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​5](http://dx.doi.org/10.1007/978-1-4842-1565-4_5))
    contains supplementary material, which is available to authorized users.


    Java’s stream classes are good for streaming sequences of bytes, but they’re not
    good for streaming sequences of characters because bytes and characters are two
    different things: a byte represents an 8-bit data item and a character represents
    a 16-bit data item. Also, Java’s `char` and `java.lang.String` types naturally
    handle characters instead of bytes.


    More importantly, byte streams have no knowledge of character sets (sets of mappings
    between integer values, known as code points, and symbols, such as Unicode) and
    their character encodings (mappings between the members of a character set and
    sequences of bytes that encode these characters for efficiency, such as UTF-8).


    A BRIEF HISTORY OF CHARACTER SETS AND CHARACTER ENCODINGS


    Early computers and programming languages were created mainly by English-speaking
    programmers in countries where English was the native language. They developed
    a standard mapping between code points 0 through 127 and the 128 commonly used
    characters in the English language (such as A–Z). The resulting character set/encoding
    was named American Standard Code for Information Interchange (ASCII).


    The problem with ASCII is that it’s inadequate for most non-English languages.
    For example, ASCII doesn’t support diacritical marks such as the cedilla used
    in French. Because a byte can represent a maximum of 256 different characters,
    developers around the world started creating different character sets/encodings
    that encoded the 128 ASCII characters, but also encoded extra characters to meet
    the needs of languages such as French, Greek, and Russian. Over the years, many
    legacy (and still important) data files have been created whose bytes represent
    characters defined by specific character sets/encodings.


    The International Organization for Standardization (ISO) and the International
    Electrotechnical Commission (IEC) worked to standardize these 8-bit character
    sets/encodings under a joint umbrella standard called ISO/IEC 8859\. The result
    is a series of substandards named ISO/IEC 8859-1, ISO/IEC 8859-2, and so on. For
    example, ISO/IEC 8859-1 (also known as Latin-1) defines a character set/encoding
    that consists of ASCII plus the characters covering most Western European countries.
    Also, ISO/IEC 8859-2 (also known as Latin-2) defines a similar character set/encoding
    covering Central and Eastern European countries.


    Despite the ISO’s/IEC’s best efforts, a plethora of character sets/encodings is
    still inadequate. For example, most character sets/encodings only allow you to
    create documents in a combination of English and one other language (or a small
    number of other languages). You cannot, for example, use an ISO/IEC character
    set/encoding to create a document using a combination of English, French, Turkish,
    Russian, and Greek characters.


    This and other problems are being addressed by an international effort that has
    created and is continuing to develop Unicode, a single universal character set.
    Because Unicode characters are bigger than ISO/IEC characters, Unicode uses one
    of several variable-length encoding schemes known as Unicode Transformation Format
    (UTF) to encode Unicode characters for efficiency. For example, UTF-8 encodes
    every character in the Unicode character set in one to four bytes (and is backward-compatible
    with ASCII).


    Finally, the terms character set and character encoding are often used interchangeably.
    They mean the same thing in the context of ISO/IEC character sets in which a code
    point is the encoding. However, these terms are different in the context of Unicode
    in which Unicode is the character set and UTF-8 is one of several possible character
    encodings for Unicode characters.


    If you need to stream characters, you should take advantage of Java’s writer and
    reader classes, which were designed to support character I/O (they work with `char`
    instead of `byte`). Furthermore, the writer and reader classes take character
    encodings into account. [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html) introduces
    you to Java’s writer and reader classes.


    ## Writer and Reader Classes Overview


    The `java.io` package provides several writer and reader classes that are descendants
    of this package’s abstract `Writer` and `Reader` classes. Figure [5-1](#A978-1-4842-1565-4_5_Chapter.html#Fig1)
    reveals the hierarchy of writer classes.


    ![A978-1-4842-1565-4_5_Fig1_HTML.jpg](A978-1-4842-1565-4_5_Fig1_HTML.jpg)


    Figure 5-1.


    Unlike `java.io.FilterOutputStream`, `FilterWriter` is abstract


    Figure [5-2](#A978-1-4842-1565-4_5_Chapter.html#Fig2) reveals the hierarchy of
    reader classes.


    ![A978-1-4842-1565-4_5_Fig2_HTML.jpg](A978-1-4842-1565-4_5_Fig2_HTML.jpg)


    Figure 5-2.


    Unlike `java.io.FilterInputStream`, `FilterReader` is abstract


    Although the writer and reader class hierarchies are similar to their output stream
    and input stream counterparts, there are differences. For example, `FilterWriter`
    and `FilterReader` are abstract, whereas their `FilterOutputStream` and `FilterInputStream`
    equivalents are not abstract. Also, `BufferedWriter` and `BufferedReader` don’t
    extend `FilterWriter` and `FilterReader`, whereas `java.io.BufferedOutputStream`
    and `java.io.BufferedInputStream` extend `FilterOutputStream` and `FilterInputStream`.


    The output stream and input stream classes were introduced in Java 1.0. After
    their release, design issues emerged. For example, `FilterOutputStream` and `FilterInputStream`
    should have been abstract. However, it was too late to make these changes because
    the classes were already being used; making these changes would have resulted
    in broken code. The designers of Java 1.1’s writer and reader classes took the
    time to correct these mistakes.


    Note


    Regarding `BufferedWriter` and `BufferedReader` directly subclassing `Writer`
    and `Reader` instead of `FilterWriter` and `FilterReader`, I believe that this
    change has to do with performance. Calls to `BufferedOutputStream`’s `write()`
    methods and `BufferedInputStream`’s `read()` methods result in calls to `FilterOutputStream`’s
    `write()` methods and `FilterInputStream`’s `read()` methods. Because a file I/O
    activity such as copying one file to another can involve many `write()`/`read()`
    method calls, you want the best performance possible. By not subclassing `FilterWriter`
    and `FilterReader`, `BufferedWriter` and `BufferedReader` achieve better performance.


    For brevity, I focus only on the `Writer`, `Reader`, `OutputStreamWriter`, `InputStreamReader`,
    `FileWriter`, `FileReader`, `BufferedWriter`, and `BufferedReader` classes in
    this chapter.'
  trans: '

    ## 摘要


    Java 使用流来执行 I/O 操作。流是任意长度的有序字节序列。字节通过输出流从应用程序流向目的地，并通过输入流从源流向应用程序。


    `java.io` 包提供了多个用于标识各种流目的地和源的类。这些类是抽象类 `OutputStream` 和 `InputStream` 的子类。`FileOutputStream`
    和 `BufferedInputStream` 就是其中的例子。


    本章探讨了 `OutputStream` 和 `InputStream`，接着介绍了字节数组流、文件流、管道流、过滤流、缓冲流、数据流、对象流和打印流。在介绍对象流时，引入了序列化和外部化的主题。本章最后重新审视了标准
    I/O。


    第 5 章将介绍经典 I/O 的写入器和读取器类。


    # 5. 写入器和读取器


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​5](http://dx.doi.org/10.1007/978-1-4842-1565-4_5))
    包含补充材料，仅供授权用户使用。


    Java 的流类非常适合处理字节序列的流式传输，但并不适合处理字符序列的流式传输，因为字节和字符是两种不同的东西：字节代表一个 8 位数据项，而字符代表一个
    16 位数据项。此外，Java 的 `char` 和 `java.lang.String` 类型天然地处理字符而非字节。


    更重要的是，字节流不了解字符集（整数值（称为码点）与符号（如 Unicode）之间的映射集合）及其字符编码（字符集成员与编码这些字符以提高效率的字节序列之间的映射，例如
    UTF-8）。


    字符集与字符编码简史


    早期的计算机和编程语言主要由英语为母语国家的英语程序员创建。他们开发了码点 0 到 127 与英语中 128 个常用字符（如 A-Z）之间的标准映射。由此产生的字符集/编码被命名为美国信息交换标准码（ASCII）。


    ASCII 的问题在于它对大多数非英语语言来说是不够的。例如，ASCII 不支持变音符号，如法语中使用的软音符。由于一个字节最多可以表示 256 个不同的字符，世界各地的开发人员开始创建不同的字符集/编码，这些编码不仅编码了
    128 个 ASCII 字符，还编码了额外的字符以满足法语、希腊语和俄语等语言的需求。多年来，已经创建了许多遗留的（但仍然重要的）数据文件，这些文件中的字节代表由特定字符集/编码定义的字符。


    国际标准化组织（ISO）和国际电工委员会（IEC）致力于将这些 8 位字符集/编码标准化，形成了一个名为 ISO/IEC 8859 的联合总括标准。结果产生了一系列子标准，分别命名为
    ISO/IEC 8859-1、ISO/IEC 8859-2 等。例如，ISO/IEC 8859-1（也称为 Latin-1）定义了一个字符集/编码，它由 ASCII
    加上覆盖大多数西欧国家的字符组成。同样，ISO/IEC 8859-2（也称为 Latin-2）定义了一个类似的字符集/编码，覆盖中欧和东欧国家。


    尽管 ISO/IEC 做出了最大努力，但过多的字符集/编码仍然不够用。例如，大多数字符集/编码只允许你创建英语和另一种语言（或少数几种其他语言）组合的文档。例如，你不能使用
    ISO/IEC 字符集/编码来创建包含英语、法语、土耳其语、俄语和希腊语字符组合的文档。


    这个问题和其他问题正通过一项国际努力来解决，该努力已经创建并正在持续开发 Unicode，这是一个单一的通用字符集。由于 Unicode 字符比 ISO/IEC
    字符大，Unicode 使用几种可变长度编码方案之一，称为 Unicode 转换格式（UTF），来高效地编码 Unicode 字符。例如，UTF-8 用一到四个字节对
    Unicode 字符集中的每个字符进行编码（并且向后兼容 ASCII）。


    最后，术语“字符集”和“字符编码”经常互换使用。在 ISO/IEC 字符集的上下文中，它们含义相同，其中码点就是编码。然而，在 Unicode 的上下文中，这些术语是不同的，其中
    Unicode 是字符集，而 UTF-8 是 Unicode 字符的几种可能字符编码之一。


    如果你需要流式传输字符，你应该利用 Java 的写入器和读取器类，这些类旨在支持字符 I/O（它们处理 `char` 而不是 `byte`）。此外，写入器和读取器类会考虑字符编码。第
    5 章 将向你介绍 Java 的写入器和读取器类。


    ## 写入器和读取器类概述


    `java.io` 包提供了多个写入器和读取器类，它们是该包中抽象类 `Writer` 和 `Reader` 的子类。图 5-1 展示了写入器类的层次结构。


    ![A978-1-4842-1565-4_5_Fig1_HTML.jpg](img/A978-1-4842-1565-4_5_Fig1_HTML.jpg)


    图 5-1.


    与 `java.io.FilterOutputStream` 不同，`FilterWriter` 是抽象的


    图 5-2 展示了读取器类的层次结构。


    ![A978-1-4842-1565-4_5_Fig2_HTML.jpg](img/A978-1-4842-1565-4_5_Fig2_HTML.jpg)


    图 5-2.


    与 `java.io.FilterInputStream` 不同，`FilterReader` 是抽象的


    尽管写入器和读取器类的层次结构与它们的输出流和输入流对应类相似，但也存在差异。例如，`FilterWriter` 和 `FilterReader` 是抽象的，而它们对应的
    `FilterOutputStream` 和 `FilterInputStream` 则不是抽象的。此外，`BufferedWriter` 和 `BufferedReader`
    不继承 `FilterWriter` 和 `FilterReader`，而 `java.io.BufferedOutputStream` 和 `java.io.BufferedInputStream`
    则继承自 `FilterOutputStream` 和 `FilterInputStream`。


    输出流和输入流类是在 Java 1.0 中引入的。在它们发布后，设计问题出现了。例如，`FilterOutputStream` 和 `FilterInputStream`
    本应是抽象的。然而，由于这些类已经在使用中，进行这些更改为时已晚；进行这些更改会导致代码出错。Java 1.1 的写入器和读取器类的设计者花时间纠正了这些错误。


    注意


    关于 `BufferedWriter` 和 `BufferedReader` 直接继承 `Writer` 和 `Reader` 而不是 `FilterWriter`
    和 `FilterReader`，我认为这种改变与性能有关。对 `BufferedOutputStream` 的 `write()` 方法和 `BufferedInputStream`
    的 `read()` 方法的调用会导致对 `FilterOutputStream` 的 `write()` 方法和 `FilterInputStream`
    的 `read()` 方法的调用。因为像将一个文件复制到另一个文件这样的文件 I/O 活动可能涉及许多 `write()`/`read()` 方法调用，所以你希望获得尽可能最佳的性能。通过不继承
    `FilterWriter` 和 `FilterReader`，`BufferedWriter` 和 `BufferedReader` 实现了更好的性能。


    为简洁起见，本章我将只关注 `Writer`、`Reader`、`OutputStreamWriter`、`InputStreamReader`、`FileWriter`、`FileReader`、`BufferedWriter`
    和 `BufferedReader` 类。

    '
- fmt: '# Writer and Reader


    Java provides the `Writer` and `Reader` classes for performing character I/O.
    `Writer` is the superclass of all writer subclasses. The following list identifies
    the differences between `Writer` and `java.io.OutputStream`:


    - `Writer` declares several `append()` methods for appending characters to this
    writer. These methods exist because `Writer` implements the `java.lang.Appendable`
    interface, which is used in partnership with the `java.util.Formatter` class (discussed
    in [Chapter 11](#A978-1-4842-1565-4_11_Chapter.html)) to output formatted strings.

    - `Writer` declares additional `write()` methods, including a convenient `void
    write(String str)` method for writing a `String` object’s characters to this writer.


    `Reader` is the superclass of all reader subclasses. The following list identifies
    differences between `Reader` and `java.io.InputStream`:


    - `Reader` declares `read(char[])` and `read(char[], int, int)` methods instead
    of `read(byte[])` and `read(byte[], int, int)` methods.

    - `Reader` doesn’t declare an `available()` method.

    - `Reader` declares a `boolean ready()` method that returns true when the next
    `read()` call is guaranteed not to block for input.

    - `Reader` declares an `int read(CharBuffer target)` method for reading characters
    from a character buffer. (I discuss `CharBuffer` in [Chapter 6](#A978-1-4842-1565-4_6_Chapter.html).)


    ## OutputStreamWriter and InputStreamReader


    The concrete `OutputStreamWriter` class (a `Writer` subclass) is a bridge between
    an incoming sequence of characters and an outgoing stream of bytes. Characters
    written to this writer are encoded into bytes according to the default or specified
    character encoding.


    **Note:** The default character encoding is accessible via the `file.encoding`
    system property.


    Each call to one of `OutputStreamWriter`’s `write()` methods causes an encoder
    to be called on the given character(s). The resulting bytes are accumulated in
    a buffer before being written to the underlying output stream. The characters
    passed to the `write()` methods are not buffered.


    `OutputStreamWriter` declares four constructors, including the following pair:


    - `OutputStreamWriter(OutputStream out)` creates a bridge between an incoming
    sequence of characters (passed to `OutputStreamWriter` via its `append()` and
    `write()` methods) and the underlying output stream `out`. The default character
    encoding is used to encode characters into bytes.

    - `OutputStreamWriter(OutputStream out, String charsetName)` creates a bridge
    between an incoming sequence of characters (passed to `OutputStreamWriter` via
    its `append()` and `write()` methods) and the underlying output stream `out`.
    `charsetName` identifies the character encoding used to encode characters into
    bytes. This constructor throws `java.io.UnsupportedEncodingException` when the
    named character encoding isn’t supported.


    **Note:** `OutputStreamWriter` depends on the abstract `java.nio.charset.Charset`
    and `java.nio.charset.CharsetEncoder` classes (see [Chapter 10](#A978-1-4842-1565-4_10_Chapter.html))
    to perform character encoding.


    The following example uses the second constructor to create a bridge to an underlying
    file output stream so that Polish text can be written to an ISO/IEC 8859-2-encoded
    file.


    ```

    FileOutputStream fos = new FileOutputStream("polish.txt");

    OutputStreamWriter osw = new OutputStreamWriter(fos, "8859_2");

    char ch = ’\u0323’; // Accented N.

    osw.write(ch);

    ```


    The concrete `InputStreamReader` class (a `Reader` subclass) is a bridge between
    an incoming stream of bytes and an outgoing sequence of characters. Characters
    read from this reader are decoded from bytes according to the default or specified
    character encoding.


    Each call to one of `InputStreamReader`’s `read()` methods may cause one or more
    bytes to be read from the underlying input stream. To enable the efficient conversion
    of bytes to characters, more bytes may be read ahead from the underlying stream
    than are necessary to satisfy the current read operation.


    `InputStreamReader` declares four constructors, including the following pair:


    - `InputStreamReader(InputStream in)` creates a bridge between the underlying
    input stream `in` and an outgoing sequence of characters (returned from `InputStreamReader`
    via its `read()` methods). The default character encoding is used to decode bytes
    into characters.

    - `InputStreamReader(InputStream in, String charsetName)` creates a bridge between
    the underlying input stream `in` and an outgoing sequence of characters (returned
    from `InputStreamReader` via its `read()` methods). `charsetName` identifies the
    character encoding used to decode bytes into characters. This constructor throws
    `UnsupportedEncodingException` when the named character encoding is not supported.


    **Note:** `InputStreamReader` depends on the abstract `Charset` and `java.nio.charset.CharsetDecoder`
    classes (see [Chapter 10](#A978-1-4842-1565-4_10_Chapter.html)) to perform character
    decoding.


    The following example uses the second constructor to create a bridge to an underlying
    file input stream so that Polish text can be read from an ISO/IEC 8859-2-encoded
    file.


    ```

    FileInputStream fis = new FileInputStream("polish.txt");

    InputStreamReader isr = new InputStreamReader(fis, "8859_2");

    char ch = isr.read(ch);

    ```


    **Note:** `OutputStreamWriter` and `InputStreamReader` declare a `String getEncoding()`
    method that returns the name of the character encoding in use. If the encoding
    has a historical name, that name is returned; otherwise, the encoding’s canonical
    name is returned.'
