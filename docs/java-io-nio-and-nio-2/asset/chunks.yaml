  raw: '## Selector Demonstration


    Selectors are commonly used in server applications. Listing [8-1](#A978-1-4842-1565-4_8_Chapter.html#FPar7)
    shows the source code of a server application that sends its local time to clients.


    Listing 8-1\. Serving Time to Clients


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.net.ServerSocket;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.SelectionKey;`


    `import java.nio.channels.Selector;`


    `import java.nio.channels.ServerSocketChannel;`


    `import java.nio.channels.SocketChannel;`


    `import java.util.Iterator;`


    `public class SelectorServer`


    `{`


    `final static int DEFAULT_PORT = 9999;`


    `static ByteBuffer bb = ByteBuffer.allocateDirect(8);`


    `public static void main(String[] args) throws IOException`


    `{`


    `int port = DEFAULT_PORT;`


    `if (args.length > 0)`


    `port = Integer.parseInt(args[0]);`


    `System.out.println("Server starting ... listening on port " + port);`


    `ServerSocketChannel ssc = ServerSocketChannel.open();`


    `ServerSocket ss = ssc.socket();`


    `ss.bind(new InetSocketAddress(port));`


    `ssc.configureBlocking(false);`


    `Selector s = Selector.open();`


    `ssc.register(s, SelectionKey.OP_ACCEPT);`


    `while (true)`


    `{`


    `int n = s.select();`


    `if (n == 0)`


    `continue;`


    `Iterator it = s.selectedKeys().iterator();`


    `while (it.hasNext())`


    `{`


    `SelectionKey key = (SelectionKey) it.next();`


    `if (key.isAcceptable())`


    `{`


    `SocketChannel sc;`


    `sc = ((ServerSocketChannel) key.channel()).accept();`


    `if (sc == null)`


    `continue;`


    `System.out.println("Receiving connection");`


    `bb.clear();`


    `bb.putLong(System.currentTimeMillis());`


    `bb.flip();`


    `System.out.println("Writing current time");`


    `while (bb.hasRemaining())`


    `sc.write(bb);`


    `sc.close();`


    `}`


    `it.remove();`


    `}`


    `}`


    `}`


    `}`


    Listing [8-1](#A978-1-4842-1565-4_8_Chapter.html#FPar7)’s server application consists
    of a `SelectorServer` class. This class allocates a direct byte buffer after this
    class is loaded.


    When the `main()` method is executed, it first checks for a command-line argument,
    which is assumed to represent a port number. If no argument is specified, a default
    port number is used; otherwise, `main()` tries to convert it to an integer representing
    the port by passing the argument to `Integer.parseInt()`. (This method throws
    `java.lang.NumberFormatException` when a noninteger argument is passed.)


    After outputting a startup message that identifies the listening port, `main()`
    obtains a server socket channel followed by the underlying socket, which is bound
    to the specified port. The server socket channel is then configured for nonblocking
    mode in preparation for registering this channel with a selector.


    A selector is now obtained and the server socket channel registers itself with
    the selector so that it can learn when the channel is ready to perform an accept
    operation. The returned key isn’t saved because it’s never cancelled (and the
    selector is never closed).


    `main()` now enters an infinite loop, first invoking the selector’s `select()`
    method. If the server socket channel isn’t ready (`select()` returns `0`), the
    rest of the loop is skipped.


    The selected keys (just one key in the example) along with an iterator for iterating
    over them are now obtained and `main()` enters an inner loop to loop over these
    keys. Each key’s `isAcceptable()` method is invoked to find out if the server
    socket channel is ready to perform an accept operation. If this is the case, the
    channel is obtained and cast to `ServerSocketChannel`, and `ServerSocketChannel`’s
    `accept()` method is called to accept the new connection.


    To guard against the unlikely possibility of the returned `SocketChannel` instance
    being null (`accept()` returns null when the server socket channel is in nonblocking
    mode and no connection is available to be accepted), `main()` tests for this scenario
    and continues the loop when null is detected.


    A message about receiving a connection is output and the byte buffer is cleared
    in preparation for storing the local time. After this long integer has been stored
    in the buffer, the buffer is flipped in preparation for draining. A message about
    writing the current time is output and the buffer is drained. The socket channel
    is then closed and the key is removed from the set of keys.


    Compile Listing [8-1](#A978-1-4842-1565-4_8_Chapter.html#FPar7) as follows:


    `javac SelectorServer.java`


    Run the resulting application as follows:


    `java SelectorServer`


    You should observe the following output and the server should continue to run:


    `Server starting ... listening on port 9999`


    We need a client to exercise this server. Listing [8-2](#A978-1-4842-1565-4_8_Chapter.html#FPar7)
    shows the source code of a sample client application.


    Listing 8-2\. Receiving Time from the Server


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.SocketChannel;`


    `import java.util.Date;`


    `public class SelectorClient`


    `{`


    `final static int DEFAULT_PORT = 9999;`


    `static ByteBuffer bb = ByteBuffer.allocateDirect(8);`


    `public static void main(String[] args)`


    `{`


    `int port = DEFAULT_PORT;`


    `if (args.length > 0)`


    `port = Integer.parseInt(args[0]);`


    `try`


    `{`


    `SocketChannel sc = SocketChannel.open();`


    `InetSocketAddress addr = new InetSocketAddress("localhost", port);`


    `sc.connect(addr);`


    `long time = 0;`


    `while (sc.read(bb) != -1)`


    `{`


    `bb.flip();`


    `while (bb.hasRemaining())`


    `{`


    `time <<= 8;`


    `time |= bb.get() & 255;`


    `}`


    `bb.clear();`


    `}`


    `System.out.println(new Date(time));`


    `sc.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    Listing [8-2](#A978-1-4842-1565-4_8_Chapter.html#FPar7) is much simpler than Listing
    [8-1](#A978-1-4842-1565-4_8_Chapter.html#FPar7) because selectors aren’t used.
    There’s no need for a selector in this simple application. You would typically
    use selectors in a client context when the client interacts with several servers.


    There are a couple of interesting items in the source code:


    *   `bb.get()` returns a 32-bit integer representation of an 8-bit byte. Sign
    extension is used for byte values greater than 127, which are regarded as negative
    numbers. Because leading one bits affect the result after bitwise ORing them with
    `time`, they are removed by bitwise ANDing the integer with 255.

    *   This value in `time` is passed to the `java.util.Date(long time)` constructor
    when a new `Date` object is constructed. In turn, the `Date` object is passed
    to `System.out.println()`, which invokes `Date`’s `toString()` method to obtain
    a human-readable date/time string.


    Compile Listing [8-2](#A978-1-4842-1565-4_8_Chapter.html#FPar7) as follows:


    `javac SelectorClient.java`


    In a second command window, run the resulting application as follows:


    `java SelectorClient`


    You should observe output similar to the following:


    `Tue Jul 28 13:38:20 CDT 2015`


    In the server command window, you should observe the following messages:


    `Receiving connection`


    `Writing current time`


    EXERCISES


    The following exercises are designed to test your understanding of [Chapter 8](#A978-1-4842-1565-4_8_Chapter.html)’s
    content:


    Define selector.   Identify the three main types that support selectors.   True
    or false: File channels can be used with selectors.   What does `SelectionKey`
    provide as a convenient alternative to the expression `key.readyOps() & OP_READ
    != 0`?'
  trans: '

    ## 选择器演示


    选择器在服务器应用程序中很常用。清单 8-1 展示了一个向客户端发送本地时间的服务器应用程序的源代码。


    **清单 8-1\. 向客户端提供时间服务**


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.net.ServerSocket;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.SelectionKey;`


    `import java.nio.channels.Selector;`


    `import java.nio.channels.ServerSocketChannel;`


    `import java.nio.channels.SocketChannel;`


    `import java.util.Iterator;`


    `public class SelectorServer`


    `{`


    `final static int DEFAULT_PORT = 9999;`


    `static ByteBuffer bb = ByteBuffer.allocateDirect(8);`


    `public static void main(String[] args) throws IOException`


    `{`


    `int port = DEFAULT_PORT;`


    `if (args.length > 0)`


    `port = Integer.parseInt(args[0]);`


    `System.out.println("Server starting ... listening on port " + port);`


    `ServerSocketChannel ssc = ServerSocketChannel.open();`


    `ServerSocket ss = ssc.socket();`


    `ss.bind(new InetSocketAddress(port));`


    `ssc.configureBlocking(false);`


    `Selector s = Selector.open();`


    `ssc.register(s, SelectionKey.OP_ACCEPT);`


    `while (true)`


    `{`


    `int n = s.select();`


    `if (n == 0)`


    `continue;`


    `Iterator it = s.selectedKeys().iterator();`


    `while (it.hasNext())`


    `{`


    `SelectionKey key = (SelectionKey) it.next();`


    `if (key.isAcceptable())`


    `{`


    `SocketChannel sc;`


    `sc = ((ServerSocketChannel) key.channel()).accept();`


    `if (sc == null)`


    `continue;`


    `System.out.println("Receiving connection");`


    `bb.clear();`


    `bb.putLong(System.currentTimeMillis());`


    `bb.flip();`


    `System.out.println("Writing current time");`


    `while (bb.hasRemaining())`


    `sc.write(bb);`


    `sc.close();`


    `}`


    `it.remove();`


    `}`


    `}`


    `}`


    `}`


    清单 8-1 的服务器应用程序包含一个 `SelectorServer` 类。该类在加载后会分配一个直接字节缓冲区。


    当执行 `main()` 方法时，它首先检查命令行参数，该参数假定代表一个端口号。如果未指定参数，则使用默认端口号；否则，`main()` 尝试通过将该参数传递给
    `Integer.parseInt()` 将其转换为代表端口的整数。（当传入非整数参数时，此方法会抛出 `java.lang.NumberFormatException`。）


    在输出一条标识监听端口的启动消息后，`main()` 获取一个服务器套接字通道，随后获取底层套接字，并将其绑定到指定端口。然后将服务器套接字通道配置为非阻塞模式，以便将该通道注册到选择器。


    现在获取一个选择器，服务器套接字通道将自己注册到该选择器，以便了解通道何时准备好执行接受操作。返回的键不会被保存，因为它永远不会被取消（并且选择器也永远不会被关闭）。


    `main()` 现在进入一个无限循环，首先调用选择器的 `select()` 方法。如果服务器套接字通道未就绪（`select()` 返回 `0`），则跳过循环的其余部分。


    现在获取选定的键（示例中只有一个键）以及用于遍历它们的迭代器，然后 `main()` 进入一个内部循环来遍历这些键。调用每个键的 `isAcceptable()`
    方法以查明服务器套接字通道是否准备好执行接受操作。如果是这种情况，则获取该通道并将其转换为 `ServerSocketChannel`，然后调用 `ServerSocketChannel`
    的 `accept()` 方法来接受新连接。


    为了防止返回的 `SocketChannel` 实例为 null 这种不太可能的情况（当服务器套接字通道处于非阻塞模式且没有可接受的连接时，`accept()`
    返回 null），`main()` 会测试这种情况，并在检测到 null 时继续循环。


    输出一条关于接收连接的消息，并清除字节缓冲区以准备存储本地时间。在将此长整数存储到缓冲区后，翻转缓冲区以准备排出。输出一条关于写入当前时间的消息，然后排出缓冲区。接着关闭套接字通道，并将该键从键集中移除。


    按如下方式编译清单 8-1：


    `javac SelectorServer.java`


    按如下方式运行生成的应用程序：


    `java SelectorServer`


    您应该会看到以下输出，并且服务器应继续运行：


    `Server starting ... listening on port 9999`


    我们需要一个客户端来测试这个服务器。清单 8-2 展示了一个示例客户端应用程序的源代码。


    **清单 8-2\. 从服务器接收时间**


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.SocketChannel;`


    `import java.util.Date;`


    `public class SelectorClient`


    `{`


    `final static int DEFAULT_PORT = 9999;`


    `static ByteBuffer bb = ByteBuffer.allocateDirect(8);`


    `public static void main(String[] args)`


    `{`


    `int port = DEFAULT_PORT;`


    `if (args.length > 0)`


    `port = Integer.parseInt(args[0]);`


    `try`


    `{`


    `SocketChannel sc = SocketChannel.open();`


    `InetSocketAddress addr = new InetSocketAddress("localhost", port);`


    `sc.connect(addr);`


    `long time = 0;`


    `while (sc.read(bb) != -1)`


    `{`


    `bb.flip();`


    `while (bb.hasRemaining())`


    `{`


    `time <<= 8;`


    `time |= bb.get() & 255;`


    `}`


    `bb.clear();`


    `}`


    `System.out.println(new Date(time));`


    `sc.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    清单 8-2 比清单 8-1 简单得多，因为没有使用选择器。在这个简单的应用程序中不需要选择器。当客户端与多个服务器交互时，通常会在客户端上下文中使用选择器。


    源代码中有几个有趣的地方：


    *   `bb.get()` 返回一个 8 位字节的 32 位整数表示。对于大于 127 的字节值，会使用符号扩展，这些值被视为负数。由于前导 1 位在与
    `time` 进行按位或运算后会影响结果，因此通过将整数与 255 进行按位与运算来移除它们。

    *   当构造新的 `Date` 对象时，`time` 中的这个值会传递给 `java.util.Date(long time)` 构造函数。接着，`Date`
    对象被传递给 `System.out.println()`，后者会调用 `Date` 的 `toString()` 方法来获取人类可读的日期/时间字符串。


    按如下方式编译清单 8-2：


    `javac SelectorClient.java`


    在第二个命令窗口中，按如下方式运行生成的应用程序：


    `java SelectorClient`


    您应该会看到类似于以下的输出：


    `Tue Jul 28 13:38:20 CDT 2015`


    在服务器命令窗口中，您应该会看到以下消息：


    `Receiving connection`


    `Writing current time`


    **练习题**


    以下练习题旨在测试您对第 8 章内容的理解：


    定义选择器。   识别支持选择器的三种主要类型。   判断对错：文件通道可以与选择器一起使用。   `SelectionKey` 提供了什么作为表达式 `key.readyOps()
    & OP_READ != 0` 的便捷替代方案？

