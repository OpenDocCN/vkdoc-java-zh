    ## Writer 和 Reader


    Java 提供了 `Writer` 和 `Reader` 类来执行字符 I/O 操作。`Writer` 是所有写入器子类的超类。以下列表指出了 `Writer`
    与 `java.io.OutputStream` 之间的区别：


    *   `Writer` 声明了几个 `append()` 方法，用于向此写入器追加字符。这些方法之所以存在，是因为 `Writer` 实现了 `java.lang.Appendable`
    接口，该接口与 `java.util.Formatter` 类（在第 11 章中讨论）配合使用，以输出格式化字符串。

    *   `Writer` 声明了额外的 `write()` 方法，包括一个便捷的 `void write(String str)` 方法，用于将 `String`
    对象的字符写入此写入器。


    `Reader` 是所有读取器子类的超类。以下列表指出了 `Reader` 与 `java.io.InputStream` 之间的区别：


    *   `Reader` 声明了 `read(char[])` 和 `read(char[], int, int)` 方法，而不是 `read(byte[])`
    和 `read(byte[], int, int)` 方法。

    *   `Reader` 没有声明 `available()` 方法。

    *   `Reader` 声明了一个 `boolean ready()` 方法，当保证下一次调用 `read()` 不会阻塞等待输入时，该方法返回 true。

    *   `Reader` 声明了一个 `int read(CharBuffer target)` 方法，用于从字符缓冲区读取字符。（我在第 6 章中讨论了
    `CharBuffer`。）


    ## OutputStreamWriter 和 InputStreamReader


    具体的 `OutputStreamWriter` 类（`Writer` 的子类）是传入字符序列和传出字节流之间的桥梁。写入此写入器的字符会根据默认或指定的字符编码被编码成字节。


    注意


    默认字符编码可通过 `file.encoding` 系统属性访问。


    每次调用 `OutputStreamWriter` 的 `write()` 方法之一都会导致对给定字符调用编码器。生成的字节会累积在缓冲区中，然后写入到底层输出流。传递给
    `write()` 方法的字符不会被缓冲。


    `OutputStreamWriter` 声明了四个构造器，包括以下一对：


    *   `OutputStreamWriter(OutputStream out)` 在传入的字符序列（通过其 `append()` 和 `write()`
    方法传递给 `OutputStreamWriter`）与底层输出流 `out` 之间创建一个桥梁。使用默认字符编码将字符编码为字节。

    *   `OutputStreamWriter(OutputStream out, String charsetName)` 在传入的字符序列（通过其 `append()`
    和 `write()` 方法传递给 `OutputStreamWriter`）与底层输出流 `out` 之间创建一个桥梁。`charsetName` 标识用于将字符编码为字节的字符编码。当指定的字符编码不受支持时，此构造器会抛出
    `java.io.UnsupportedEncodingException`。


    注意


    `OutputStreamWriter` 依赖于抽象的 `java.nio.charset.Charset` 和 `java.nio.charset.CharsetEncoder`
    类（参见第 10 章）来执行字符编码。


    以下示例使用第二个构造器创建一个到底层文件输出流的桥梁，以便将波兰语文本写入 ISO/IEC 8859-2 编码的文件。


    `FileOutputStream fos = new FileOutputStream("polish.txt");`


    `OutputStreamWriter osw = new OutputStreamWriter(fos, "8859_2");`


    `char ch = ’\u0323’; // 带重音符号的 N。`


    `osw.write(ch);`


    具体的 `InputStreamReader` 类（`Reader` 的子类）是传入字节流和传出字符序列之间的桥梁。从此读取器读取的字符会根据默认或指定的字符编码从字节解码而来。


    每次调用 `InputStreamReader` 的 `read()` 方法之一都可能导致从底层输入流读取一个或多个字节。为了能够高效地将字节转换为字符，可能会从底层流中预读比满足当前读取操作所需更多的字节。


    `InputStreamReader` 声明了四个构造器，包括以下一对：


    *   `InputStreamReader(InputStream in)` 在底层输入流 `in` 与传出的字符序列（通过其 `read()` 方法从
    `InputStreamReader` 返回）之间创建一个桥梁。使用默认字符编码将字节解码为字符。

    *   `InputStreamReader(InputStream in, String charsetName)` 在底层输入流 `in` 与传出的字符序列（通过其
    `read()` 方法从 `InputStreamReader` 返回）之间创建一个桥梁。`charsetName` 标识用于将字节解码为字符的字符编码。当指定的字符编码不受支持时，此构造器会抛出
    `UnsupportedEncodingException`。


    注意


    `InputStreamReader` 依赖于抽象的 `Charset` 和 `java.nio.charset.CharsetDecoder` 类（参见第
    10 章）来执行字符解码。


    以下示例使用第二个构造器创建一个到底层文件输入流的桥梁，以便从 ISO/IEC 8859-2 编码的文件中读取波兰语文本。


    `FileInputStream fis = new FileInputStream("polish.txt");`


    `InputStreamReader isr = new InputStreamReader(fis, "8859_2");`


    `char ch = isr.read(ch);`


    注意


    `OutputStreamWriter` 和 `InputStreamReader` 声明了一个 `String getEncoding()` 方法，该方法返回正在使用的字符编码的名称。如果该编码有历史名称，则返回该名称；否则，返回该编码的规范名称。

