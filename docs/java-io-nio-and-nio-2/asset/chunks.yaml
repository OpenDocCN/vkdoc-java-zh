    **练习题**


    以下练习题旨在测试你对第 7 章内容的理解：


    什么是通道？  `Channel` 接口提供了哪些能力？  指出直接扩展 `Channel` 的三个接口。  判断正误：实现 `InterruptibleChannel`
    的通道是异步可关闭的。  指出获取通道的两种方式。  定义分散/聚集 I/O。  提供了哪些接口来实现分散/聚集 I/O？  定义文件通道。  判断正误：文件通道不支持分散/聚集
    I/O。  定义排他锁和共享锁。  `FileChannel` 的 `lock()` 和 `tryLock()` 方法之间的根本区别是什么？  当已经持有与此锁请求重叠的锁，或者另一个线程正在等待获取将与此请求重叠的锁时，`FileLock
    lock()` 方法会做什么？  指定你应该采用的模式，以确保始终释放已获取的文件锁。  `FileChannel` 提供了什么方法用于将文件区域映射到内存？ 
    指出三种文件映射模式。  哪种文件映射模式对应于写时复制？  指出优化批量传输常见实践的 `FileChannel` 方法。  判断正误：套接字通道是可选择的，并且可以在非阻塞模式下运行。 
    指出描述套接字通道的三个类。  判断正误：数据报通道不是线程安全的。  为什么套接字通道支持非阻塞模式？  如何获取套接字通道的关联套接字？  如何获取服务器套接字通道？ 
    创建一个 `Copy` 应用程序，该应用程序使用 `ByteBuffer` 和 `FileChannel` 类与 `FileInputStream` 和 `FileOutputStream`
    配合，将源文件复制到目标文件。

