    `COPY_ATTRIBUTES`。

    *   `REPLACE_EXISTING`：当 `target` 存在时，替换 `target`，除非它是非空目录。当 `target` 存在且是符号链接时，替换的是符号链接本身，而不是链接的目标。


    此方法返回 `target Path` 对象。当 `options` 包含不支持的复制选项时抛出 `UnsupportedOperationException`，当发生
    I/O 错误时抛出 `IOException`，当 `target` 存在但因未指定 `REPLACE_EXISTING` 选项而无法替换时抛出 `FileAlreadyExistsException`，当指定了
    `REPLACE_EXISTING` 但因路径是非空目录而无法替换时抛出 `DirectoryNotEmptyException`。


