    ## Using Network Interfaces with Sockets


    `NetworkInterface` is useful for a multihomed system, which is a system with multiple
    NICs. Using `NetworkInterface`, you can specify the NIC to use for a specific
    network activity. For example, assume your machine has two configured NICs and
    you want to send data to a server. You create a socket as follows:


    `Socket socket = new Socket();`


    `socket.connect(new InetSocketAddress(address, port));`


    Before sending the data, the operating system (OS) determines which interface
    is to be used. However, if you have a preference or otherwise need to specify
    the NIC to use, you can query the OS for the appropriate interfaces and find an
    address on the interface you want to use. When you create the socket and bind
    it to that address, the OS uses the associated interface. Consider the following
    example:


    `NetworkInterface nif = NetworkInterface.getByName("bge0");`


    `Enumeration<InetAddress> nifAddresses = nif.getInetAddresses();`


    `Socket socket = new Socket();`


    `socket.bind(new InetSocketAddress(nifAddresses.nextElement(), 0));`


    `socket.connect(new InetSocketAddress(address, port));`


    You can also use `NetworkInterface` to identify the local interface on which a
    multicast group is to be joined. Consider the following example:


    `NetworkInterface nif = NetworkInterface.getByName("bge0");`


    `MulticastSocket ms = new MulticastSocket();`


    `ms.joinGroup(new InetSocketAddress(hostname, port), nif);`


    These are just two of the many ways to use `NetworkInterface` with the various
    `Socket` classes.'
