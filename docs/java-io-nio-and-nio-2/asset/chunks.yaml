  raw: 'Each time a connection request arrives, `accept()` returns a `Socket` instance,
    and then a `java.lang.Thread` object is created whose runnable accesses that socket
    for communicating with the socket on a worker thread.


    I’ve created `EchoClient` and `EchoServer` applications that demonstrate `Socket`
    and `ServerSocket`. Listing [B-1](#A978-1-4842-1565-4_16_Chapter.html#FPar8) presents
    `EchoClient`’s source code.


    Listing B-1\. Echoing Data to and Receiving It Back from a Server


    `import java.io.BufferedReader;`


    `import java.io.InputStream;`


    `import java.io.InputStreamReader;`


    `import java.io.IOException;`


    `import java.io.OutputStream;`


    `import java.io.OutputStreamWriter;`


    `import java.io.PrintWriter;`


    `import java.net.Socket;`


    `import java.net.UnknownHostException;`


    `public class EchoClient`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage  : java EchoClient message");`


    `System.err.println("example: java EchoClient \"This is a test.\"");`


    `return;`


    `}`


    `try`


    `{`


    `Socket socket = new Socket("localhost", 9999);`


    `OutputStream os = socket.getOutputStream();`


    `OutputStreamWriter osw = new OutputStreamWriter(os);`


    `PrintWriter pw = new PrintWriter(osw);`


    `pw.println(args[0]);`


    `pw.flush();`


    `InputStream is = socket.getInputStream();`


    `InputStreamReader isr = new InputStreamReader(is);`


    `BufferedReader br = new BufferedReader(isr);`


    `System.out.println(br.readLine());`


    `}`


    `catch (UnknownHostException uhe)`


    `{`


    `System.err.println("unknown host: " + uhe.getMessage());`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    `EchoClient` first verifies that it has received a single command-line argument
    and then creates a socket that will connect to a process running on port 9999
    of the local host.


    After creating the socket, `EchoClient` obtains an output stream for writing a
    string to the socket. Because the output stream can only handle a sequence of
    bytes, the `java.io.OutputStreamWriter` and `java.io.PrintWriter` classes are
    used to connect the writer that outputs characters to the byte-oriented output
    stream.


    After instantiating `PrintWriter`, `EchoClient` invokes its `void println(String
    str)` method to write the string followed by a newline character. The `void flush()`
    method is subsequently called to ensure that all pending data is written to the
    server.


    `EchoClient` now obtains an input stream for reading the string as a sequence
    of bytes. It then connects the reader (that inputs characters) to the byte-oriented
    input stream by instantiating `java.io.InputStreamReader` and `java.io.BufferedReader`.


    Finally, `EchoClient` invokes `BufferedReader`’s `String readLine()` method to
    read the characters followed by a newline from the socket. (`readLine()` doesn’t
    include the newline character in the returned string.) These characters followed
    by a newline are then written to standard output.


    Note


    In a long-running application, you would explicitly close the `socket` instance
    by invoking its `void close()` method when the socket is no longer needed. For
    brevity, I’ve chosen not to do so in this and most of the remaining `Socket`-suffixed
    class examples.


    Listing [B-2](#A978-1-4842-1565-4_16_Chapter.html#FPar10) presents `EchoServer`’s
    source code.


    Listing B-2\. Receiving Data from and Echoing It Back to a Client


    `import java.io.BufferedReader;`


    `import java.io.InputStream;`


    `import java.io.InputStreamReader;`


    `import java.io.IOException;`


    `import java.io.OutputStream;`


    `import java.io.OutputStreamWriter;`


    `import java.io.PrintWriter;`


    `import java.net.ServerSocket;`


    `import java.net.Socket;`


    `public class EchoServer`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `System.out.println("Starting echo server...");`


    `ServerSocket ss = new ServerSocket(9999);`


    `while (true)`


    `{`


    `Socket s = ss.accept();`


    `try`


    `{`


    `InputStream is = s.getInputStream();`


    `InputStreamReader isr = new InputStreamReader(is);`


    `BufferedReader br = new BufferedReader(isr);`


    `String msg = br.readLine();`


    `System.out.println(msg);`


    `OutputStream os = s.getOutputStream();`


    `OutputStreamWriter osw = new OutputStreamWriter(os);`


    `PrintWriter pw = new PrintWriter(osw);`


    `pw.println(msg);`


    `pw.flush();`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `finally`


    `{`


    `try`


    `{`


    `s.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `assert false; // shouldn’t happen in this context`


    `}`


    `}`


    `}`


    `}`


    `}`


    `EchoServer` first outputs an introductory message to standard output and then
    creates a server socket that listens for connections on port 9999\. It then enters
    an infinite loop, where each iteration invokes `ServerSocket`’s `Socket accept()`
    method to block until a connection is received and then return a `Socket` object
    representing this connection.


    After obtaining the socket, `EchoServer` obtains an input stream for reading from
    the socket. Because the input stream can only handle a sequence of bytes, the
    `InputStreamReader` and `BufferedReader` classes are used to connect the reader
    that inputs characters to the byte-oriented input stream.


    `EchoServer` now obtains an output stream for writing the string as a sequence
    of bytes. It then connects the writer that outputs characters to the byte-oriented
    output stream by instantiating `OutputStreamWriter` and `PrintWriter`.


    After outputting the message to standard output, `EchoServer` calls `flush()`
    to flush the output to the client. The client socket is then closed.


    To experiment with these applications, first copy `EchoClient.java` and `EchoServer.java`
    to the same directory and open two console windows with this directory being current.


    Compile these source files as follows:


    `javac *.java`


    Run `EchoServer` in one window as follows:


    `java EchoServer`


    You should observe the following output:


    `Starting echo server...`


    Note


    If you have an enabled firewall ( [`http://en.wikipedia.org/wiki/Firewall_(computing)`](http://en.wikipedia.org/wiki/Firewall_(computing))
    ), you might need to enable port 9999.


    Having started the server, run `EchoClient` in the other window as follows:


    `java EchoClient "This is a test."`


    You should observe “`This is a test.`” in both windows.'
