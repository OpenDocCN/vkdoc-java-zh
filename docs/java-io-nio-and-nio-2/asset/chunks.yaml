    前面的示例演示了单播（unicasting），即服务器向单个客户端发送消息。然而，也可以将同一条消息广播给多个客户端（例如，向一组已注册在线程序以接收此通知的家长群成员发送“因恶劣天气学校停课”的通知）；这种活动被称为多播（multicasting）。


    服务器通过向一个特殊的 IP 地址（称为多播组地址）和特定端口（由端口号指定）发送一系列数据报包来实现多播。想要接收这些数据报包的客户端会创建一个使用该端口号的多播套接字。它们通过一个指定该特殊
    IP 地址的加入组操作来请求加入该组。此时，客户端可以接收发送到该组的数据报包，甚至可以向其他组成员发送数据报包。在客户端读取完所有想要读取的数据报包后，它会通过一个指定该特殊
    IP 地址的离开组操作将自己从组中移除。


    IPv4 地址 224.0.0.1 到 239.255.255.255（含）被保留用作多播组地址。


    清单 B-5 展示了一个多播服务器。


    **清单 B-5.** 多播数据报包


    `import java.io.IOException;`


    `import java.net.DatagramPacket;`


    `import java.net.InetAddress;`


    `import java.net.MulticastSocket;`


    `public class MCServer`


    `{`


    `final static int PORT = 10000;`


    `public static void main(String[] args)`


    `{`


    `try`


    `{`


    `MulticastSocket mcs = new MulticastSocket();`


    `InetAddress group = InetAddress.getByName("231.0.0.1");`


    `byte[] dummy = new byte[0];`


    `DatagramPacket dgp = new DatagramPacket(dummy, 0, group, PORT);`


    `int i = 0;`


    `while (true)`


    `{`


    `byte[] buffer = ("line " + i).getBytes();`


    `dgp.setData(buffer);`


    `dgp.setLength(buffer.length);`


    `mcs.send(dgp);`


    `i++;`


    `}`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    清单 B-5 的 `main()` 方法首先通过 `MulticastSocket()` 构造器创建了一个 `MulticastSocket` 实例。该多播套接字不需要绑定到端口号，因为端口号会与多播组的
    IP 地址（231.0.0.1）一起，作为随后创建的 `DatagramPacket` 实例的一部分来指定。（`dummy` 数组的存在是为了防止 `DatagramPacket`
    构造器抛出 `NullPointerException` 对象——该数组不用于存储要广播的数据。）


    此时，`main()` 进入一个无限循环，该循环首先从一个 `java.lang.String` 对象创建一个字节数组，并使用平台的默认字符编码将 Unicode
    字符转换为字节。（尽管在每次循环迭代中，通过表达式 `"line " + i` 创建了多余的 `java.lang.StringBuilder` 和 `String`
    对象，但在这个简短的一次性应用程序中，我并不担心它们对垃圾回收的影响。）


    随后，通过调用 `DatagramPacket` 对象的 `void setData(byte[] buf)` 方法，将这个数据缓冲区分配给该对象，然后该数据报包被广播到与端口
    10000 和多播 IP 地址 231.0.0.1 关联的组中的所有成员。


    按如下方式编译清单 B-5：


    `javac MCServer.java`


    按如下方式运行生成的应用程序：


    `java MCServer`


    你应该不会观察到任何输出。


    清单 B-6 展示了一个多播客户端。


    **清单 B-6.** 接收多播数据报包


    `import java.io.IOException;`


    `import java.net.DatagramPacket;`


    `import java.net.InetAddress;`


    `import java.net.MulticastSocket;`


    `public class MCClient`


    `{`


    `final static int PORT = 10000;`


    `public static void main(String[] args)`


    `{`


    `try`


    `{`


    `MulticastSocket mcs = new MulticastSocket(PORT);`


    `InetAddress group = InetAddress.getByName("231.0.0.1");`


    `mcs.joinGroup(group);`


    `for (int i = 0; i < 10; i++)`


    `{`


    `byte[] buffer = new byte[256];`


    `DatagramPacket dgp = new DatagramPacket(buffer, buffer.length);`


    `mcs.receive(dgp);`


    `byte[] buffer2 = new byte[dgp.getLength()];`


    `System.arraycopy(dgp.getData(), 0, buffer2, 0, dgp.getLength());`


    `System.out.println(new String(buffer2));`


    `}`


    `mcs.leaveGroup(group);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    清单 B-6 的 `main()` 方法首先通过 `MulticastSocket(int port)` 构造器创建了一个绑定到端口 10000 的 `MulticastSocket`
    实例。然后，它获取一个包含多播组 IP 地址 231.0.0.1 的 `InetAddress` 对象，并通过调用 `MulticastSocket` 的
    `void joinGroup(InetAddress mcastaddr)` 方法，使用该对象加入此地址的组。


    接下来，`main()` 接收 10 个数据报包，打印它们的内容，并通过调用 `MulticastSocket` 的 `void leaveGroup(InetAddress
    mcastaddr)` 方法（使用相同的多播 IP 地址作为参数）离开该组。


    注意


    当尝试加入或离开组时发生 I/O 错误，或者当 IP 地址不是多播 IP 地址时，`joinGroup()` 和 `leaveGroup()` 会抛出 `IOException`。


    由于客户端不知道字节数组的确切长度，它假设为 256 字节，以确保数据缓冲区能容纳整个数组。如果它尝试打印返回的数组，你会看到在实际数据打印后有很多空白空间。


    为了消除这些空白，客户端调用 `DatagramPacket` 的 `int getLength()` 方法来获取数组的实际长度，创建一个具有此长度的第二个字节数组（`buffer2`），并使用
    `System.arraycopy()` 将此数量的字节复制到 `buffer2`。在将此字节数组转换为 `String` 对象（通过 `String(byte[]
    bytes)` 构造器，该构造器使用平台的默认字符集）后，它将生成的字符打印到标准输出流。


