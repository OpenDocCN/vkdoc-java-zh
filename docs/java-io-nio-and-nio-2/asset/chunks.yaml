    \ 标识）中创建临时文件。  \n在应用程序退出前删除临时文件的三种方法如下：\n"
- fmt: '*   通过`Runtime`类的`void addShutdownHook(Thread hook)`方法添加一个关闭钩子，并在该钩子中删除文件。

    *   将返回的`Path`对象转换为`File`对象（通过`Path`的`toFile()`方法），并在该`File`对象上调用`File`的`void
    deleteOnExit()`方法。

    *   使用`Files`类的`newOutputStream()`方法和NIO.2的`DELETE_ON_CLOSE`常量。


    NIO.2 中用于从常规文件读取所有字节或文本行到内存的三个方法是：`byte[] readAllBytes(Path path)`、`List<String>
    readAllLines(Path path)` 和 `List<String> readAllLines(Path path, Charset cs)`。用于读取非常大的文件（其内容可能无法放入内存）的方法是：`BufferedReader
    newBufferedReader(Path path)`、`BufferedReader newBufferedReader(Path path, Charset
    cs)` 和 `InputStream newInputStream(Path path, OpenOption... options)`。`StandardOpenOption`枚举支持的打开选项如下：


    *   `APPEND`：如果文件是为`WRITE`访问而打开的，则将字节写入文件末尾，而不是开头。

    *   `CREATE`：当文件不存在时创建一个新文件。

    *   `CREATE_NEW`：创建一个新文件，如果文件已存在则失败。

    *   `DELETE_ON_CLOSE`：尽最大努力在文件关闭时删除该文件。

    *   `DSYNC`：要求对文件内容的每次更新都同步写入底层存储设备。

    *   `READ`：以读取访问权限打开文件。

    *   `SPARSE`：打开一个稀疏文件。当与`CREATE_NEW`选项一起使用时，`SPARSE`提示新文件将是稀疏的。如果文件系统不支持创建稀疏文件，则忽略此选项。

    *   `SYNC`：要求对文件内容或元数据的每次更新都同步写入底层存储设备。

    *   `TRUNCATE_EXISTING`：将为`WRITE`访问而打开的现有文件的长度截断为0。

    *   `WRITE`：以写入访问权限打开文件。'
  raw: '*   Add a shutdown hook via the `Runtime` class’s `void addShutdownHook(`
    [`Thread`](https://docs.oracle.com/javase/8/docs/api/java/lang/Thread.html#class%20in%20java.lang)
    `hook)` method and delete the file in the shutdown hook.

    *   Convert the returned `Path` object to a `File` object (via `Path`’s `toFile()`
    method) and invoke `File`’s `void deleteOnExit()` method on the `File` object.

    *   Work with the `Files` class’s `newOutputStream()` method and NIO.2’s `DELETE_ON_CLOSE`
    constant.


    NIO.2’s three methods for reading all bytes or lines of text from a regular file
    into memory are `byte[] readAllBytes(Path path)`, `List<String> readAllLines(Path
    path)`, and `List<String> readAllLines(Path path, Charset cs)`.   The methods
    you would use to read very large files (whose contents probably don’t fit into
    memory) are `BufferedReader newBufferedReader(Path path)`, `BufferedReader newBufferedReader(Path
    path, Charset cs)`, and `InputStream newInputStream(Path path, OpenOption... options)`.
      The open options supported by the `StandardOpenOption` enum are as follows:


    *   `APPEND`: If the file is opened for `WRITE` access, write bytes to the end
    of the file rather than to the beginning.

    *   `CREATE`: Create a new file when it doesn’t exist.

    *   `CREATE_NEW`: Create a new file, failing when the file already exists.

    *   `DELETE_ON_CLOSE`: Make a best effort to delete the file when the file is
    closed.

    *   `DSYNC`: Require that every update to the file’s content be written synchronously
    to the underlying storage device.

    *   `READ`: Open the file for read access.

    *   `SPARSE`: Open a sparse file. When used with the [`CREATE_NEW`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#CREATE_NEW)
    option, `SPARSE` provides a hint that the new file will be sparse. The option
    is ignored when the file system doesn’t support the creation of sparse files.

    *   `SYNC`: Require that every update to the file’s content or metadata be written
    synchronously to the underlying storage device.

    *   `TRUNCATE_EXISTING`: Truncate the length of an existing file that’s opened
    for [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    access to 0.

    *   `WRITE`: Open the file for write access.'
