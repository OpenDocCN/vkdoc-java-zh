    ### PipedOutputStream 与 PipedInputStream


    线程之间经常需要进行通信。一种方法是使用共享变量。另一种方法是通过 `PipedOutputStream` 和 `PipedInputStream` 类使用管道流。`PipedOutputStream`
    类允许发送线程将字节流写入 `PipedInputStream` 类的实例，而接收线程则随后使用该实例读取这些字节。


    注意


    不建议在单个线程中使用 `PipedOutputStream` 对象和 `PipedInputStream` 对象，因为这可能导致线程死锁。


    `PipedOutputStream` 声明了一对用于创建管道输出流的构造方法：


    *   `PipedOutputStream()` 创建一个尚未连接到管道输入流的管道输出流。在使用前，必须由接收方或发送方将其连接到管道输入流。

    *   `PipedOutputStream(PipedInputStream dest)` 创建一个连接到管道输入流 `dest` 的管道输出流。写入此管道输出流的字节可以从
    `dest` 中读取。当发生 I/O 错误时，此构造方法会抛出 `IOException`。


    `PipedOutputStream` 声明了一个 `void connect(PipedInputStream dest)` 方法，用于将此管道输出流连接到
    `dest`。如果此管道输出流已连接到另一个管道输入流，则此方法会抛出 `IOException`。


    `PipedInputStream` 声明了四个用于创建管道输入流的构造方法：


    *   `PipedInputStream()` 创建一个尚未连接到管道输出流的管道输入流。在使用前，必须将其连接到管道输出流。

    *   `PipedInputStream(int pipeSize)` 创建一个尚未连接到管道输出流的管道输入流，并使用 `pipeSize` 来设置管道输入流缓冲区的大小。在使用前，必须将其连接到管道输出流。当
    `pipeSize` 小于或等于 0 时，此构造方法会抛出 `IllegalArgumentException`。

    *   `PipedInputStream(PipedOutputStream src)` 创建一个连接到管道输出流 `src` 的管道输入流。写入 `src`
    的字节可以从该管道输入流中读取。当发生 I/O 错误时，此构造方法会抛出 `IOException`。

    *   `PipedInputStream(PipedOutputStream src, int pipeSize)` 创建一个连接到管道输出流 `src`
    的管道输入流，并使用 `pipeSize` 来设置管道输入流缓冲区的大小。写入 `src` 的字节可以从该管道输入流中读取。当发生 I/O 错误时，此构造方法会抛出
    `IOException`；当 `pipeSize` 小于或等于 0 时，会抛出 `IllegalArgumentException`。


    `PipedInputStream` 声明了一个 `void connect(PipedOutputStream src)` 方法，用于将此管道输入流连接到
    `src`。如果此管道输入流已连接到另一个管道输出流，则此方法会抛出 `IOException`。


    创建一对管道流最简单的方法是在同一个线程中，并且可以按任意顺序创建。例如，可以先创建管道输出流：


    `PipedOutputStream pos = new PipedOutputStream();`


    `PipedInputStream pis = new PipedInputStream(pos);`


    或者，也可以先创建管道输入流：


    `PipedInputStream pis = new PipedInputStream();`


    `PipedOutputStream pos = new PipedOutputStream(pis);`


    你可以让两个流都保持未连接状态，稍后再使用相应管道流的 `connect()` 方法将它们连接起来，如下所示：


    `PipedOutputStream pos = new PipedOutputStream();`


    `PipedInputStream pis = new PipedInputStream();`


    `// ...`


    `pos.connect(pis);`


    清单 4-3 展示了一个 `PipedStreamsDemo` 应用程序，其发送线程将一系列随机生成的字节整数流式传输到接收线程，接收线程则输出该序列。


    清单 4-3\. 将随机生成的字节从发送线程管道传输到接收线程


    `import java.io.IOException;`


    `import java.io.PipedInputStream;`


    `import java.io.PipedOutputStream;`


    `public class PipedStreamsDemo`


    `{`


    `final static int LIMIT = 10;`


    `public static void main(String[] args) throws IOException`


    `{`


    `final PipedOutputStream pos = new PipedOutputStream();`


    `final PipedInputStream pis = new PipedInputStream(pos);`


    `Runnable senderTask = () -> {`


    `try`


    `{`


    `for (int i = 0 ; i < LIMIT; i++)`


    `pos.write((byte)`


    `(Math.random() * 256));`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `finally`


    `{`


    `try`


    `{`


    `pos.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `};`


    `Runnable receiverTask = () -> {`


    `try`


    `{`


    `int b;`


    `while ((b = pis.read()) != -1)`


    `System.out.println(b);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `finally`


    `{`


    `try`


    `{`


    `pis.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `};`


    `Thread sender = new Thread(senderTask);`


    `Thread receiver = new Thread(receiverTask);`


    `sender.start();`


    `receiver.start();`


    `}`


    `}`


    清单 4-3 的 `main()` 方法创建了管道输出流和管道输入流，`senderTask` 线程将使用它们来通信一系列随机生成的字节整数，而 `receiverTask`
    线程则使用它们来接收该序列。


    发送任务的 `run()` 方法在完成数据发送后显式关闭其管道流。如果不这样做，当接收线程最后一次调用 `read()` 时（否则会返回 `-1` 表示流结束），将会抛出一个带有“写入端已死”消息的
    `IOException` 实例。有关此消息的更多信息，请查看 Daniel Ferber 的博客文章“这是什么？IOException: Write End
    Dead”（ [`http://techtavern.wordpress.com/2008/07/16/whats-this-ioexception-write-end-dead/`](http://techtavern.wordpress.com/2008/07/16/whats-this-ioexception-write-end-dead/)
    ）。


    按如下方式编译清单 4-3：


    `javac PipedStreamsDemo.java`


    按如下方式运行生成的应用程序：


    `java PipedStreamsDemo`


    你将看到类似于以下的输出：


    `243`


    `147`


    `34`


    `68`


    `174`


    `251`


    `99`


    `44`


    `7`


    `19`

