    for `Employee:`) into `Employee.java`:


    `Employee:    static final long serialVersionUID = 1517331364702470316L;`


    The Windows version of `serialver` also provides a graphical user interface that
    you might find more convenient to use. To access this interface, specify the following
    command line:


    `serialver -show`


