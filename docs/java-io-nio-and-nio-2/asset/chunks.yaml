    method, which keeps that method’s signature simple. However, I print a message
    when `IOException` occurs.

    *   The `numRecs()` method returns the number of records in the file. These records
    are numbered starting with 0 and ending with `numRecs() - 1`. Each of the `select()`
    and `update()` methods verifies that its `recno` argument lies within this range.

    *   The `select()` method calls the private `read()` method to return the record
    identified by `recno` as an instance of the nested `Part` class. `Part`’s constructor
    initializes a `Part` object to a record’s field values, and its getter methods
    return these values.

    *   The `update()` method is equally simple. As with `select()`, it first positions
    the file pointer to the start of the record identified by `recno`. As with `append()`,
    it calls `write()` to write out its arguments but replaces a record instead of
    adding one.


    Records are written with the private `write()` method. Because fields must have
    exact sizes, `write()` pads `String`-based values that are shorter than a field
    size with spaces on the right and truncates these values to the field size when
    needed.


    Records are read via the private `read()` method. `read()` removes the padding
    before saving a `String`-based field value in the `Part` object.


    By itself, `PartsDB` is useless. You need an application that lets you experiment
    with this class, and Listing [3-2](#A978-1-4842-1565-4_3_Chapter.html#FPar7) fulfills
    this requirement.


