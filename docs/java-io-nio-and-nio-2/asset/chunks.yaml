    清单 12-45 展示了一个 `Copy` 类，其成员包括一个嵌套类 `CopyVisitor`（稍后讨论）和一个 `main()` 方法。


    `main()` 首先验证是否恰好指定了两个命令行参数（分别标识复制操作的源路径和目标路径），然后获取它们的 `Path` 对象。接着，`main()` 在源路径上调用
    `Files` 类的 `exists()` 方法（尝试复制不存在的文件没有意义）。如果此方法返回 `false`，则源路径不存在，输出错误消息，应用程序终止。'
- fmt: '`main()` now determines which file-copy operation (nondirectory to nondirectory,
    nondirectory to directory, or directory hierarchy to directory hierarchy) to perform.
    It tests the source path, via `Files.isDirectory(source)`, to find out if it describes
    a nondirectory file or a directory.


    If the source path describes a nondirectory file, the compound statement following
    `if (!Files.isDirectory(source))` is executed. This statement first determines
    whether the target path exists, and, if so, whether or not it describes a directory.
    If the target path describes an existing directory, the file name is extracted
    from the source path and resolved against the target path so that the source file
    will be copied into the directory (and not replace the directory). For example,
    if the source path is `foo` (a regular file) and the target path is `bak` (a directory),
    the target path following resolution is `bak\foo` (on Windows). If the target
    path doesn’t exist, it will be assumed to be a nondirectory. In any case, the
    copy operation is performed. If the target exists, it’s replaced.


    At this point, the source path must describe a directory (directly or via a symbolic
    link). Because the only other permitted file-copy operation is directory hierarchy
    to directory hierarchy, `main()` verifies that the target path describes an existing
    directory (via `Files.exists(target) && !Files.isDirectory(target)`), outputting
    an error message and terminating the application when this isn’t the case.


    Finally, `main()` prepares NIO.2’s file tree-walking mechanism to walk through
    all nondirectory files and directories in the source hierarchy and copy them to
    the target; and then initiates the walk.


    `main()` creates an enumerated set of `FileVisitOption`s (the only option presented
    by this interface is `FOLLOW_LINKS`—follow symbolic links so that the target of
    a link instead of the link itself will be copied) and then instantiates `CopyVisitor`,
    which I’ll describe shortly, passing the source and target paths to its constructor.
    `main()` initiates the walk by invoking `walkFileTree()` with the source path,
    the options list, `Integer.MAX_VALUE` (walk all directory levels), and the `CopyVisitor`
    object as arguments.


    `walkFileTree()` performs a depth-first walk of the file tree rooted at the source
    path. During this walk, it invokes the various methods provided by `CopyVisitor`.


    Before visiting a directory, `walkFileTree()` invokes `preVisitDirectory()` with
    a path to the directory and the directory’s basic attributes as arguments.


    After outputting certain information (which is useful for learning more about
    this aspect of the walk, and which helps you become comfortable with relativization
    and resolution), `preVisitDirectory()` executes `Path targetPath = toPath.resolve(fromPath.relativize(dir));`
    for the following reason: Each incoming directory path is relative to the source
    path (known in `CopyVisitor` as `fromPath`) and it must be made relative to the
    target path (known in `CopyVisitor` as `toPath`). For example, suppose the source
    path is `s`, `s` contains directory `d`, and the target path is `t`. When the
    method is called, `dir` contains `s\d`. Relativization produces `d`; resolution
    produces `t\d`.


    Variable `targetPath` is assigned the resolved result (for example, `t\d`). `preVisitDirectory()`
    determines if this directory exists and creates the directory (via the `Files`
    class’s `Path createDirectory(Path dir, FileAttribute<?>... attrs)` method) when
    it doesn’t exist. Assuming that `createDirectory()` doesn’t throw `IOException`,
    `preVisitDirectory()` returns `FileVisitResult.CONTINUE` to continue the walk.


    `visitFile()` is much simpler. It performs the copy operation (after relativizing
    and resolving the file from the source to the target) and then returns `CONTINUE`
    to continue the walk.'
