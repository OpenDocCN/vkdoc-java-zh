- fmt: "# Locating Files with Paths\n\nA file system stores files (definitely regular\
    \ files and directories, and possibly symbolic links and hard links). Files are\
    \ typically stored in hierarchies and are located by specifying paths, which are\
    \ compact maps that navigate these hierarchies via separated name element sequences.\n\
    \nThe `java.nio.file.Path` interface represents a hierarchical path to a file\
    \ that may not exist. It optionally starts with a name element identifying a file\
    \ system hierarchy and optionally continues with a sequence of directory elements\
    \ separated by a separator character. The name element that is farthest from the\
    \ root of the directory hierarchy is the name of a directory or other kind of\
    \ file. The other name elements are directory names.\n\n**Note**\n\n`Path` declares\
    \ `FileSystem getFileSystem()` to return a reference to the `FileSystem` that\
    \ created the file described by the `Path` object.\n\nA `Path` can represent a\
    \ root, a root and a sequence of name elements, or one or more name elements.\
    \ It signifies an empty path when it consists entirely of one name element that\
    \ is empty. Accessing a file using an empty path is equivalent to accessing the\
    \ file system’s default directory.\n\n**Note**\n\n`Path` declares `File toFile()`\
    \ to return a `File` object representing its path. `toFile()` throws `UnsupportedOperationException`\
    \ when the `Path` object isn’t associated with the default provider. `File` declares\
    \ `Path toPath()` to return a `Path` object representing the `File` object’s abstract\
    \ path. `toPath()` throws `java.nio.file.InvalidPathException` when a `Path` cannot\
    \ be constructed from the abstract path. These methods let you mix `Path` and\
    \ `File` in your source code so that you can slowly transition your legacy `File`-based\
    \ code to code that uses the improved file system interface.\n\n## Getting a Path\
    \ and Accessing Its Name Elements\n\n`FileSystem` provides a `Path getPath(String\
    \ first, String... more)` method for returning a `Path` object. The argument passed\
    \ to `first` identifies the initial part of the path string. The variable arguments\
    \ (varargs) list that’s assigned to `more` identifies additional strings that\
    \ are joined to `first` to form the complete path string.\n\n**Note**\n\nWhen\
    \ constructing a `Path`, its name elements are typically joined by using the name\
    \ separator that’s returned from `FileSystem`’s `String getSeparator()` method.\
    \ The resulting path string represents a system-dependent file path.\n\nConsider\
    \ the following example:\n\n```\nPath path = fsDefault.getPath(\"x\", \"y\");\n\
    ```\n\nThis example constructs a `Path` with `y` subordinate to `x`. You could\
    \ also construct this `Path` as follows:\n\n```\nPath path = fsDefault.getPath(\"\
    x\\\\y\");\n```\n\nUnlike in the former example, I’ve included the backslash (`\\\
    `) name-separator character (escaped to satisfy the Java compiler) that Windows\
    \ understands.\n\nA `Path` must conform to the syntax that is parsed by the file\
    \ system provider that created the `FileSystem` on which `getPath()` is called.\
    \ Otherwise, this method will throw `InvalidPathException`.\n\n**Caution**\n\n\
    When constructing a `Path`, you should avoid hardcoding name-separator characters,\
    \ such as the backslash on Windows. Although some separators are legal, such as\
    \ backslash or forward slash (`/`) on Windows, other separators will probably\
    \ result in `InvalidPathException`. For example, specifying `:x:y` (for some hypothetical\
    \ file system) as a path on Windows will result in `InvalidPathException`.\n\n\
    NIO.2 provides a more convenient `java.nio.file.Paths` utility class with a pair\
    \ of class methods for returning `Path` objects:\n\n- `Path get(String first,\
    \ String... more)`\n- `Path get(URI uri)`\n\nThe first method is equivalent to\
    \ calling `getPath()` on the default file system and returning the result:\n\n\
    ```\nreturn FileSystems.getDefault().getPath(first, more);\n```\n\nThe second\
    \ method is a bit more involved. It iterates over the installed file system providers\
    \ to locate the provider that is identified by the given URI’s scheme component.\
    \ When this provider is found for the `file` scheme, this method executes the\
    \ following code:\n\n```\nreturn FileSystems.getDefault().provider().getPath(uri);\n\
    ```\n\nAfter obtaining the default file system, `FileSystem`’s `FileSystemProvider\
    \ provider()` method is called to return the file system provider that created\
    \ the `FileSystem` object. Then, `FileSystemProvider`’s `Path getPath(URI uri)`\
    \ method is called to convert the URI argument to a `Path` object.\n\nFor any\
    \ other scheme, the installed providers list is searched for the first provider\
    \ with a matching scheme. `getPath(uri)` is called on the provider.\n\n`get(String,\
    \ String...)` throws `InvalidPathException` when a path cannot be constructed\
    \ because of bad syntax. `get(URI)` throws `java.nio.file.FileSystemNotFoundException`\
    \ when no `FileSystem` matches the scheme and `java.lang.IllegalArgumentException`\
    \ for a bad URI.\n\n`Path` declares several methods for accessing its name elements:\n\
    \n- `Path getFileName()`: Return the name of the file denoted by this path as\
    \ a `Path` object.\n- `Path getName(int index)`: Return the `index`th name element\
    \ in this path as a `Path` object. The `index` starts at 0, which represents the\
    \ element closest to the root. The element farthest from the root is identified\
    \ by one less than the name count.\n- `int getNameCount()`: Return the number\
    \ of name elements in the path.\n- `Path getParent()`: Return the parent path\
    \ or `null` when there is no parent.\n- `Path getRoot()`: Return the root name\
    \ element in this path as a `Path` object or `null` when there is no root.\n-\
    \ `Path subpath(int beginIndex, int endIndex)`: Return a relative path that is\
    \ a subsequence of the name elements in this path. The first name element (closest\
    \ to the root) is located at `beginIndex` and the last name element (farthest\
    \ from the root) is located at one less than `endIndex`.\n\nListing 12-2 presents\
    \ the source code to an application that demonstrates path construction and these\
    \ methods.\n\n**Listing 12-2.** Constructing a Path and Accessing Its Name Elements\n\
    \n```\nimport java.nio.file.FileSystem;\nimport java.nio.file.FileSystems;\nimport\
    \ java.nio.file.Path;\n\npublic class PathDemo\n{\n   public static void main(String[]\
    \ args)\n   {\n      FileSystem fsDefault = FileSystems.getDefault();\n      Path\
    \ path = fsDefault.getPath(\"a\", \"b\", \"c\");\n      System.out.println(path);\n\
    \      System.out.printf(\"File name: %s%n\", path.getFileName());\n      for\
    \ (int i = 0; i < path.getNameCount(); i++)\n         System.out.println(path.getName(i));\n\
    \      System.out.printf(\"Parent: %s%n\", path.getParent());\n      System.out.printf(\"\
    Root: %s%n\", path.getRoot());\n      System.out.printf(\"SubPath [0, 2): %s%n\"\
    , path.subpath(0, 2));\n   }\n}\n```\n\nCompile Listing 12-2 as follows:\n\n```\n\
    javac PathDemo.java\n```\n\nRun the resulting application as follows:\n\n```\n\
    java PathDemo\n```\n\nI observe the following output:\n\n```\na\\b\\c\nFile name:\
    \ c\na\nb\nc\nParent: a\\b\nRoot: null\nSubPath [0, 2): a\\b\n```"
