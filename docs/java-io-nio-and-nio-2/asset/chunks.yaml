- fmt: '#### Mapping Files into Memory


    `FileChannel` declares a `map()` method that lets you create a virtual memory
    mapping between a region of an open file and a `java.nio.MappedByteBuffer` instance
    that wraps itself around this region. This mapping mechanism offers an efficient
    way to access a file because no time-consuming system calls are needed to perform
    I/O.


    **Note:** Virtual memory is a kind of memory in which virtual addresses (also
    known as artificial addresses) replace physical (RAM memory) addresses. Check
    out Wikipedia’s “Virtual Memory” topic ([`http://en.wikipedia.org/wiki/Virtual_memory`](http://en.wikipedia.org/wiki/Virtual_memory))
    to learn more about virtual memory.


    The `map()` method has the following signature:


    ```

    MappedByteBuffer map(FileChannel.MapMode mode, long position, long size)

    ```


    The `mode` parameter defines the mapping mode and receives one of the following
    constants defined by the `FileChannel.MapMode` enumerated type:


    * `READ_ONLY`: Any attempt to modify the buffer will cause `java.nio.ReadOnlyBufferException`
    to be thrown.

    * `READ_WRITE`: Changes made to the resulting buffer will eventually be propagated
    to the file; they might not be made visible to other programs that have mapped
    the same file.

    * `PRIVATE`: Changes made to the resulting buffer will not be propagated to the
    file and will not be visible to other programs that have mapped the same file.
    Instead, changes will cause private copies of the modified portions of the buffer
    to be created. These changes are lost when the buffer is garbage collected.


    The specified mapping mode is constrained by the invoking `FileChannel` object’s
    access permissions. For example, if the file channel was opened as a read-only
    channel, and if you request `READ_WRITE` mode, `map()` will throw `NonWritableChannelException`
    because it cannot write to the file channel. Similarly, `NonReadableChannelException`
    is thrown when the channel was opened as write-only and you request `READ_ONLY`
    mode. (You can request `READ_ONLY` for a file channel opened as a read-write channel.)


    **Tip:** Invoke `MappedByteBuffer`’s `isReadOnly()` method to determine whether
    or not you can modify the mapped file.


    The `position` and `size` parameters define the start and extent of the mapped
    region. Arguments passed to these parameters must be non-negative. Furthermore,
    the argument passed to `size` must not exceed `Integer.MAX_VALUE`.


    The specified range shouldn’t exceed the file’s size because the file will be
    made larger to accommodate the range. For example, if you pass `Integer.MAX_VALUE`
    to `size`, the file will grow to more than two gigabytes. Also, for a read-only
    mapping, `map()` will probably throw `IOException`.


    The returned `MappedByteBuffer` object behaves like a memory-mapped buffer but
    its contents are stored in a file. When you invoke `get()` on this object, the
    current contents of the file are obtained, even when these contents have been
    modified by an external program. Similarly, when you have write permission, invoking
    `put()` updates the file and changes are available to external programs.


    **Note:** Because mapped byte buffers are direct byte buffers, the memory space
    assigned to them exists outside of the JVM’s heap.


    Consider the following example:


    ```

    MappedByteBuffer buffer = fileChannel.map(FileChannel.MapMode.READ_ONLY, 50, 100);

    ```


    This example maps a subrange, from location 50 through location 149, of the file
    described by `fileChannel`. In contrast, the following example maps the entire
    file:


    ```

    MappedByteBuffer buffer = fileChannel.map(FileChannel.MapMode.READ_ONLY, 0, fileChannel.size());

    ```


    There is no `unmap()` method. Once a mapping is established, it remains until
    the `MappedByteBuffer` object is garbage collected (or the application exits,
    whichever happens first). Because a mapped byte buffer isn’t connected to the
    file channel by which it was created, the mapping isn’t destroyed when the file
    channel is closed.'
