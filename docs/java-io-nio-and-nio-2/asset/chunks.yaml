    As well as providing encoding methods such as the aforementioned `ByteBuffer encode(String
    s)` method, `Charset` provides a complementary `CharBuffer decode(ByteBuffer buffer)`
    decoding method. The return type is `java.nio.CharBuffer` because byte sequences
    are decoded into characters.


    **Note**


    `ByteBuffer encode(String s)` is a convenience method for specifying `CharBuffer.wrap(s)`
    and passing the result to the `ByteBuffer encode(CharBuffer buffer)` method.


    If you dig deeper into `Charset`, you''ll encounter the following pair of methods:


    *   `CharsetEncoder newEncoder()`

    *   `CharsetDecoder newDecoder()`


    These methods perform the actual work of encoding and decoding. `Charset`''s `encode()`
    and `decode()` methods delegate to the `java.nio.charset.CharsetEncoder` and `java.nio.charset.CharsetDecoder`
    objects returned from `newEncoder()` and `newDecoder()`, and invoke their `encode()`
    and `decode()` (along with additional) methods. (For brevity, I don''t discuss
    `CharsetEncoder` and `CharsetDecoder`.)'
