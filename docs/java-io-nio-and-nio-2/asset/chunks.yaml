  raw: '#### Deleting Files


    The `Files` class includes a pair of methods for deleting a file:


    *   `void delete(Path path)`

    *   `boolean deleteIfExists(Path path)`


    `delete` `(Path path)` deletes the file identified by `path`. If `path` identifies
    a directory, the directory must be empty. If `path` identifies a symbolic link,
    the symbolic link (and not the final target of the link) is deleted. `NoSuchFileException`
    is thrown when the file doesn’t exist, `DirectoryNotEmptyException` is thrown
    when `path` identifies a directory that couldn’t be deleted, and `IOException`
    is thrown when an I/O error occurs.


    I previously demonstrated `delete(Path path)` in the context of using a shutdown
    hook to delete a temporary directory.


    `deleteIfExists(Path path)` deletes the file identified by `path` when it exists.
    If `path` identifies a symbolic link, the symbolic link (and not the final target
    of the link) is deleted. This method returns `true` when the file is deleted;
    otherwise, it returns `false. DirectoryNotEmptyException` is thrown when `path`
    identifies a directory that couldn’t be deleted, and `IOException` is thrown when
    an I/O error occurs.


    Listing [12-39](#A978-1-4842-1565-4_12_Chapter.html#FPar58) presents the source
    code to an application that demonstrates `deleteIfExists()`.


    Listing 12-39\. Deleting a File When It Exists


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class Delete`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java Delete path");`


             `return;`


          `}`


          `if (!Files.deleteIfExists(Paths.get(args[0])))`


             `System.err.printf("%s does not exist%n", args[0]);`


       `}`


    `}`


    Compile Listing [12-39](#A978-1-4842-1565-4_12_Chapter.html#FPar58) as follows:


    `javac Delete.java`


    Run the resulting application as follows:


    `java Delete x`


    When there is no directory `x` in the current directory, you should observe the
    following message:


    `x does not exist`


    Otherwise, you should observe no message.


    ### Managing Symbolic and Hard Links


    File systems store regular files, directories, and links, which are files that
    point to real files, directories, or other links. Links are classified as symbolic
    (also known as soft) or hard. Along with providing methods that take symbolic
    links into account (such as the `copy()` and `move()` methods), the `Files` class
    provides several methods for managing symbolic links. It also provides a method
    for creating hard links.


    #### Managing Symbolic Links


    A symbolic link (soft link or symlink) is a special file that references another
    file. Symbolic links are typically invisible to applications; operations on symbolic
    links are automatically redirected to the link’s target (the file or directory
    being pointed to), except for when a symbolic link is deleted or renamed, in which
    case it’s the link that’s deleted or renamed and not the target. Figure [12-3](#A978-1-4842-1565-4_12_Chapter.html#Fig3)
    illustrates a symbolic link.


    ![A978-1-4842-1565-4_12_Fig3_HTML.jpg](A978-1-4842-1565-4_12_Fig3_HTML.jpg)


    Figure 12-3.


    Jack and Jill’s symbolic links point to the most current quarterly sales directories
    (for brevity, Q3 and Q4 are ignored)


    In Figure [12-3](#A978-1-4842-1565-4_12_Chapter.html#Fig3), the `Jack` and `Jill`
    files under `CurSales` are actually symbolic links to `Sales\Jack\2015\Q2` and
    `Sales\Jill\2015\Q2`, respectively. The `Q2` directories are the actual targets
    of these links. Each link is resolved by substituting the actual location in the
    file system for the symbolic link.


    Many file systems use symbolic links extensively. Now and then, a symbolic link
    may be created that produces a circular reference (where the target of a link
    points back to the original link). For example, directory `X` could point to directory
    `Y`, which contains a subdirectory that points back to `X`. A circular reference
    can be problematic when recursively walking a file tree, which is a task that
    I’ll discuss later in this chapter. However, NIO.2’s file tree-walking feature
    takes this possibility into account.


    The `Files` class provides the `Path createSymbolicLink(Path link, Path target,
    FileAttribute<?>... attrs)` method for creating a symbolic link to a target. The
    `link` parameter identifies the symbolic link path and the `target` parameter
    identifies the target path, which may be absolute or relative and may not exist.
    When the `target` is a relative path, file system operations on the resulting
    link are relative to the `link` path. The `attrs` parameter identifies optional
    attributes to set atomically when creating the link. Each attribute is identified
    by its name. When more than one attribute of the same name is included, all but
    the last occurrence is ignored. This method returns the `link Path` object. It
    throws `UnsupportedOperationException` when the implementation doesn’t support
    symbolic links or `attrs` includes an attribute that cannot be set atomically
    when creating the symbolic link, `FileAlreadyExistsException` when the `link`
    name already exists, and `IOException` when an I/O error (such as the file store
    not supporting symbolic links) occurs.


    Listing [12-40](#A978-1-4842-1565-4_12_Chapter.html#FPar59) presents the source
    code to an application that demonstrates symbolic link creation.


    Listing 12-40\. Creating a Symbolic Link


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CSLDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java CSLDemo linkpath targetpath");`


    `return;`


    `}`


    `Files.createSymbolicLink(Paths.get(args[0]), Paths.get(args[1]));`


    `}`


    `}`


    Compile Listing [12-40](#A978-1-4842-1565-4_12_Chapter.html#FPar59) as follows:


    `javac CSLDemo.java`


    Assuming the existence of `target`, a subdirectory of the current directory, run
    the application as follows:


    `java CSLDemo link target`


    If you run this command line on Windows 7, you might encounter the following error
    message:


    `Exception in thread "main" java.nio.file.FileSystemException: link: A required
    privilege is not held by the client.`


    `at sun.nio.fs.WindowsException.translateToIOException(WindowsException.java:86)`


    `at sun.nio.fs.WindowsException.rethrowAsIOException(WindowsException.java:97)`


    `at sun.nio.fs.WindowsException.rethrowAsIOException(WindowsException.java:102)`


    `at sun.nio.fs.WindowsFileSystemProvider.createSymbolicLink(WindowsFileSystemProvider.java:585)`'
  trans: '

    #### 删除文件


    `Files` 类包含一对用于删除文件的方法：


    *   `void delete(Path path)`

    *   `boolean deleteIfExists(Path path)`


    `delete(Path path)` 删除由 `path` 标识的文件。如果 `path` 标识的是一个目录，则该目录必须为空。如果 `path` 标识的是一个符号链接，则会删除该符号链接（而非链接的最终目标）。当文件不存在时，会抛出
    `NoSuchFileException`；当 `path` 标识的目录无法删除时，会抛出 `DirectoryNotEmptyException`；当发生
    I/O 错误时，会抛出 `IOException`。


    我之前在通过关闭钩子删除临时目录的上下文中演示过 `delete(Path path)`。


    `deleteIfExists(Path path)` 在文件存在时删除由 `path` 标识的文件。如果 `path` 标识的是一个符号链接，则会删除该符号链接（而非链接的最终目标）。此方法在文件被删除时返回
    `true`；否则返回 `false`。当 `path` 标识的目录无法删除时，会抛出 `DirectoryNotEmptyException`；当发生 I/O
    错误时，会抛出 `IOException`。


    清单 12-39 展示了一个演示 `deleteIfExists()` 的应用程序源代码。


    清单 12-39\. 删除存在的文件


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class Delete`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java Delete path");`


             `return;`


          `}`


          `if (!Files.deleteIfExists(Paths.get(args[0])))`


             `System.err.printf("%s does not exist%n", args[0]);`


       `}`


    `}`


    按如下方式编译清单 12-39：


    `javac Delete.java`


    按如下方式运行生成的应用程序：


    `java Delete x`


    当当前目录中没有目录 `x` 时，您应该会看到以下消息：


    `x does not exist`


    否则，您应该不会看到任何消息。


    ### 管理符号链接和硬链接


    文件系统存储常规文件、目录和链接，这些链接是指向真实文件、目录或其他链接的文件。链接分为符号链接（也称为软链接）和硬链接。除了提供考虑符号链接的方法（例如
    `copy()` 和 `move()` 方法）之外，`Files` 类还提供了几个用于管理符号链接的方法。它还提供了一个用于创建硬链接的方法。


    #### 管理符号链接


    符号链接（软链接或 symlink）是一种引用另一个文件的特殊文件。符号链接通常对应用程序不可见；对符号链接的操作会自动重定向到链接的目标（被指向的文件或目录），除非是删除或重命名符号链接，在这种情况下，删除或重命名的是链接本身，而不是目标。图
    12-3 展示了一个符号链接。


    ![A978-1-4842-1565-4_12_Fig3_HTML.jpg](img/A978-1-4842-1565-4_12_Fig3_HTML.jpg)


    图 12-3.


    Jack 和 Jill 的符号链接指向最新的季度销售目录（为简洁起见，忽略了 Q3 和 Q4）


    在图 12-3 中，`CurSales` 下的 `Jack` 和 `Jill` 文件实际上分别是指向 `Sales\Jack\2015\Q2` 和 `Sales\Jill\2015\Q2`
    的符号链接。`Q2` 目录是这些链接的实际目标。每个链接通过将文件系统中的实际位置替换为符号链接来解析。


    许多文件系统广泛使用符号链接。有时，可能会创建产生循环引用的符号链接（即链接的目标指回原始链接）。例如，目录 `X` 可能指向目录 `Y`，而 `Y` 包含一个指向回
    `X` 的子目录。在递归遍历文件树时，循环引用可能会带来问题，这是本章后面将要讨论的任务。不过，NIO.2 的文件树遍历功能考虑到了这种可能性。


    `Files` 类提供了 `Path createSymbolicLink(Path link, Path target, FileAttribute<?>...
    attrs)` 方法，用于创建指向目标的符号链接。`link` 参数标识符号链接路径，`target` 参数标识目标路径，该路径可以是绝对路径或相对路径，并且可能不存在。当
