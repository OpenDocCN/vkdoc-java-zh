    #### Managing Hard Links


    A hard link is a directory entry that associates a name with a [file](https://en.wikipedia.org/wiki/Computer_file#Computer%20file)
    on a file system. It’s basically the same entity as the original file. All attributes
    are identical: they have the same file permissions, timestamps, and so on. Figure
    [12-4](#A978-1-4842-1565-4_12_Chapter.html#Fig4) differentiates between a soft
    link and a hard link.


    ![A978-1-4842-1565-4_12_Fig4_HTML.jpg](A978-1-4842-1565-4_12_Fig4_HTML.jpg)


    Figure 12-4.


    A soft link (top) versus a hard link (bottom) in an inode context


    Figure [12-4](#A978-1-4842-1565-4_12_Chapter.html#Fig4) shows how soft links (symbolic
    links) and hard links work in a Linux context. The upper half of each diagram
    shows the user perception of a soft link or a hard link as an alias for some file.
    However, the bottom part shows what is really happening.


    For a soft link, the file points to an inode and the soft link points to another
    inode. The soft link inode references the file inode, which points to the data
    on the file store. For a hard link, both the file and the hard link point to the
    file inode, which points to the data on the file store.


    Hard links are more restrictive than soft links:


    *   The target of the link must exist.

    *   Hard links are generally not allowed on directories.

    *   Hard links are not allowed to cross partitions or volumes. In other words,
    they cannot exist across file systems.

    *   A hard link looks and behaves like a normal file and so can be hard to find.


    The `Files` class provides the `Path createLink(Path link, Path existing)` method
    for creating a hard `link` (directory entry) for an `existing` file. This method
    returns the `link Path` object. It throws `UnsupportedOperationException` when
    the implementation doesn’t support adding an existing file to a directory, `FileAlreadyExistsException`
    when the entry couldn’t be created because the `link` name already exists, and
    `IOException` when an I/O error occurs.


    Listing [12-43](#A978-1-4842-1565-4_12_Chapter.html#FPar62) presents the source
    code to an application that demonstrates hard link creation.


    Listing 12-43\. Creating a Hard Link


