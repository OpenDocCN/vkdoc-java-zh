- fmt: '# Summary


    Channels partner with buffers to achieve high-performance I/O. A channel is an
    object that represents an open connection to a hardware device, a file, a network
    socket, an application component, or another entity that’s capable of performing
    write, read, and other I/O operations. Channels efficiently transfer data between
    byte buffers and operating system-based I/O service sources or destinations.


    Java supports channels by providing the `Channel` interface, its `WritableByteChannel`
    and `ReadableByteChannel` subinterfaces, the `Channels` class, and other types
    in the `java.nio.channels` package. While exploring this package, you learned
    about scatter/gather I/O, file channels (in terms of the `FileChannel` class with
    emphasis on its file locking, memory-mapped file I/O, and byte-transfer capabilities),
    socket channels, and pipes.


    [Chapter 8](#A978-1-4842-1565-4_8_Chapter.html) presents NIO’s support for selectors.


    # 8. Selectors


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​8](http://dx.doi.org/10.1007/978-1-4842-1565-4_8))
    contains supplementary material, which is available to authorized users.


    I/O is either block-oriented (such as file I/O) or stream-oriented (such as network
    I/O). Streams are often slower than block devices (such as fixed disks) and read/write
    operations often cause the calling thread to block until input is available or
    output has been fully written. To compensate, modern operating systems let streams
    operate in nonblocking mode, which makes it possible for a thread to read or write
    data without blocking. The operation fully succeeds or indicates partial success.
    Either way, the thread is able to perform other useful work instead of waiting.


    Nonblocking mode doesn’t let an application determine if it can perform an operation
    without actually performing the operation. For example, when a nonblocking read
    operation succeeds, the application learns that the read operation is possible
    but also has read some data that must be managed. This duality prevents you from
    separating code that checks for stream readiness from the data-processing code
    without making your code significantly complicated.


    Nonblocking mode serves as a foundation for performing readiness selection, which
    offloads to the operating system the work involved in checking for I/O stream
    readiness to perform write, read, and other operations without actually performing
    the operations. The operating system is instructed to observe a group of streams
    and return some indication of which streams are ready to perform a specific operation
    (such as read) or operations (such as accept and read). This capability lets a
    thread multiplex a potentially huge number of active streams by using the readiness
    information provided by the operating system. In this way, network servers can
    handle large numbers of network connections; they are vastly scalable.


    **Note:** Modern operating systems make readiness selection available to applications
    by providing system calls such as the POSIX `select()` call.


    Selectors let you achieve readiness selection in a Java context. This chapter
    introduces you to selector fundamentals and then provides a demonstration.


    ## Selector Fundamentals


    A selector is an object created from a subclass of the abstract `java.nio.channels.Selector`
    class. The selector maintains a set of channels that it examines to determine
    which channels are ready for reading, writing, completing a connection sequence,
    accepting another connection, or some combination of these tasks. The actual work
    is delegated to the operating system via a POSIX `select()` or similar system
    call.


    **Note:** The ability to check a channel without having to wait when something
    isn’t ready (such as bytes are not available for reading) and without also having
    to perform the operation while checking is the key to scalability. A single thread
    can manage a huge number of channels, which reduces code complexity and potential
    threading issues.


    Selectors are used with selectable channels, which are objects whose classes ultimately
    inherit from the abstract `java.nio.channels.SelectableChannel` class, which describes
    a channel that can be multiplexed by a selector. Socket channels, server socket
    channels, datagram channels, and pipe source/sink channels are selectable channels
    because `java.nio.channels.SocketChannel`, `java.nio.channels.ServerSocketChannel`,
    `java.nio.channels.DatagramChannel`, `java.nio.channels.Pipe.SinkChannel`, and
    `java.nio.channels.Pipe.SourceChannel` are derived from `SelectableChannel`. In
    contrast, file channels are not selectable channels because `java.nio.channels.FileChannel`
    doesn’t include `SelectableChannel` in its ancestry.


    One or more previously created selectable channels are registered with a selector.
    Each registration returns an instance of a subclass of the abstract `SelectionKey`
    class, which is a token signifying the relationship between one channel and the
    selector. This key keeps track of two sets of operations: interest set and ready
    set. The interest set identifies the operation categories that will be tested
    for readiness the next time one of the selector’s selection methods is invoked.
    The ready set identifies the operation categories for which the key’s channel
    has been found to be ready by the key’s selector. When a selection method is invoked,
    the selector’s associated keys are updated by checking all channels registered
    with that selector. The application can then obtain a set of keys whose channels
    were found ready and iterate over these keys to service each channel that has
    become ready since the previous select method call.


    **Note:** A selectable channel can be registered with more than one selector.
    It has no knowledge of the selectors to which it’s currently registered.


    To work with selectors, you first need to create one. You can accomplish this
    task by invoking `Selector`’s `Selector open()` class method, which returns a
    `Selector` instance on success or throws `java.io.IOException` on failure. The
    following code fragment demonstrates this task:


    ```

    Selector selector = Selector.open();

    ```


    You can create your selectable channels before or after creating your selector.
    However, you must ensure that each channel is in nonblocking mode before registering
    the channel with the selector. You register a selectable channel with a selector
    by invoking either of the following `SelectableChannel` registration methods:


    - `SelectionKey register(Selector sel, int ops)`

    - `SelectionKey register(Selector sel, int ops, Object att)`


    Each method requires that you pass a previously created selector to `sel` and
    a bitwise ORed combination of the following `SelectionKey` `int`-based constants
    to `ops`, which signifies the interest set:


    - `OP_ACCEPT`: Operation-set bit for socket-accept operations.

    - `OP_CONNECT`: Operation-set bit for socket-connect operations.

    - `OP_READ`: Operation-set bit for read operations.

    - `OP_WRITE`: Operation-set bit for write operations.'
