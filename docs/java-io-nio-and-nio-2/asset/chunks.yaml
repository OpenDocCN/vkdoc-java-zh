    readAllLines(Path path)` 和 `List<String> readAllLines(Path path, Charset cs)`。用于读取非常大的文件（其内容可能无法放入内存）的方法是
    `BufferedReader newBufferedReader(Path path)`、`BufferedReader newBufferedReader(Path
    path, Charset cs)` 和 `InputStream newInputStream(Path path, OpenOption... options)`。`StandardOpenOption`
    枚举支持的打开选项如下：


    *   `APPEND`：如果文件以 `WRITE` 访问权限打开，则将字节写入文件末尾，而非开头。

    *   `CREATE`：当文件不存在时创建新文件。

    *   `CREATE_NEW`：创建新文件，若文件已存在则失败。

    *   `DELETE_ON_CLOSE`：在文件关闭时尽最大努力删除该文件。

    *   `DSYNC`：要求对文件内容的每次更新都同步写入底层存储设备。

    *   `READ`：以读取访问权限打开文件。

    *   `SPARSE`：打开一个稀疏文件。当与 [`CREATE_NEW`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#CREATE_NEW)
    选项一起使用时，`SPARSE` 会提示新文件将是稀疏文件。如果文件系统不支持创建稀疏文件，则忽略此选项。

    *   `SYNC`：要求对文件内容或元数据的每次更新都同步写入底层存储设备。

    *   `TRUNCATE_EXISTING`：将以 [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    访问权限打开的现有文件的长度截断为 0。

    *   `WRITE`：以写入访问权限打开文件。

