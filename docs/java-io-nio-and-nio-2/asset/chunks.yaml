  raw: '### AsynchronousServerSocketChannel


    To obtain an `AsynchronousServerSocketChannel` object, invoke this class’s [`AsynchronousServerSocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#class%20in%20java.nio.channels)
    `open()` class method, as follows:


    `AsynchronousServerSocketChannel ch;`


    `ch = AsynchronousServerSocketChannel.open();`


    According to `AsynchronousServerSocketChannel`’s documentation, this method returns
    an asynchronous server socket channel that’s bound to the default group. The alternative
    [`AsynchronousServerSocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#class%20in%20java.nio.channels)
    `open(` [`AsynchronousChannelGroup`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousChannelGroup.html#class%20in%20java.nio.channels)
    `group)` method returns an asynchronous server socket channel that’s bound to
    the specified `group`. I’ll discuss asynchronous channel groups later in this
    chapter.


    You can configure an asynchronous server socket channel by invoking the `<T> AsynchronousServerSocketChannel
    setOption(SocketOption<T> name, T value)` generic method. The only documented
    options that are supported are `SO_RCVBUF` and `SO_REUSEADDR`.


    A newly-created and possibly configured asynchronous server socket channel is
    open but not yet bound to a local address. It can be bound to a local address
    and configured to listen for connections by invoking one of `AsynchronousServerSocketChannel`’s
    [`bind`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#bind-java.net.SocketAddress-int-)
    `()` methods. Once bound, either of its [`accept`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousServerSocketChannel.html#accept-A-java.nio.channels.CompletionHandler-)
    `()` methods (one method returns a `Future` and the other method takes a `CompletionHandler`
    argument) is used to initiate the accepting of connections to the channel’s socket.
    Attempting to invoke `accept()` on an unbound channel results in `java.nio.channels.`
    [`NotYetBoundException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/NotYetBoundException.html#class%20in%20java.nio.channels)
    .


    Note


    Asynchronous server socket channels are safe for use by multiple concurrent threads,
    although at most one accept operation can be outstanding at any time. If a thread
    initiates an accept operation before a previous accept operation ends, `java.nio.channels.`
    [`AcceptPendingException`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AcceptPendingException.html#class%20in%20java.nio.channels)
    is thrown.


    To demonstrate `AsynchronousServerSocketChannel`, I’ve created a `Server` application
    consisting of `Server`, `Attachment`, `ConnectionHandler`, and `ReadWriteHandler`
    classes. Listing [13-3](#A978-1-4842-1565-4_13_Chapter.html#FPar7) presents `Server`’s
    source code.


    Listing 13-3\. Launching a Server That Handles Connections and Reads/Writes Asynchronously


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.channels.AsynchronousServerSocketChannel;`


    `public class Server`


    `{`


    `private final static int PORT = 9090;`


    `private final static String HOST = "localhost";`


    `public static void main(String[] args)`


    `{`


    `AsynchronousServerSocketChannel channelServer;`


    `try`


    `{`


    `channelServer = AsynchronousServerSocketChannel.open();`


    `channelServer.bind(new InetSocketAddress(HOST, PORT));`


    `System.out.printf("Server listening at %s%n",`


    `channelServer.getLocalAddress());`


    `}`


    `catch (IOException ioe)`


    `{`


