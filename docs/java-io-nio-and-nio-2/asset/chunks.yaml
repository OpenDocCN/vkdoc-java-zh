  raw: '#### Exploring the DOS View


    The `DosFileAttributeView` interface extends `BasicFileAttributeView` and supports
    the following four MS-DOS/PC-DOS file attributes:


    *   `archive` (`Boolean`)

    *   `hidden` (`Boolean`)

    *   `readonly` (`Boolean`)

    *   `system` (`Boolean`)


    `DosFileAttributeView` declares the following methods:


    *   `DosFileAttributes readAttributes()`: Read the DOS file attributes as a bulk
    operation.

    *   `void setArchive(boolean value)`: Update the value of the `archive` attribute.

    *   `void setHidden(boolean value)`: Update the value of the `hidden` attribute.

    *   `void setReadOnly(boolean value)`: Update the value of the `readonly` attribute.

    *   `void setSystem(boolean value)`: Update the value of the `system` attribute.


    These methods throw `IOException` when an I/O error occurs.


    `readAttributes()` returns a `java.nio.file.attribute.DosFileAttributes` object
    that offers type-safe methods for reading attribute values:


    *   `boolean isArchive()`

    *   `boolean isHidden()`

    *   `boolean isReadOnly()`

    *   `boolean isSystem()`


    ##### Reading DOS File Attribute Values in Bulk


    Listing [12-13](#A978-1-4842-1565-4_12_Chapter.html#FPar22) presents the source
    code to an application that shows how to read a file’s DOS file attributes in
    bulk.


    Listing 12-13\. Reading DOS File Attributes in Bulk


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.DosFileAttributes;`


    `public class DFAVDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java DFAVDemo path");`


             `return;`


          `}`


          `Path path = Paths.get(args[0]);`


          `DosFileAttributes dfa;`


          `dfa = Files.readAttributes(path, DosFileAttributes.class);`


          `System.out.printf("Is archive: %b%n", dfa.isArchive());`


          `System.out.printf("Is hidden: %b%n", dfa.isHidden());`


          `System.out.printf("Is readonly: %b%n", dfa.isReadOnly());`


          `System.out.printf("Is system: %b%n", dfa.isSystem());`


       `}`


    `}`


    Compile Listing [12-13](#A978-1-4842-1565-4_12_Chapter.html#FPar22) as follows:


    `javac DFAVDemo.java`


    Assuming that the DOS file attribute view is supported, run the resulting application
    as follows:


    `java DFAVDemo DFAVDemo.java`


    I observe the following output:


    `Is archive: true`


    `Is hidden: false`


    `Is readonly: false`


    `Is system: false`


    ##### Getting and Setting Single DOS File Attribute Values


    Listing [12-14](#A978-1-4842-1565-4_12_Chapter.html#FPar23) presents the source
