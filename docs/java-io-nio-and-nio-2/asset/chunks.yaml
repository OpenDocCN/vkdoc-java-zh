    \ a path to learn whether or not the file that it represents exists:\n\n- `boolean\
    \ exists(Path path, LinkOption... options)`: Check the file represented by `path`\
    \ to determine if it exists. By default, symbolic links are followed, but if you\
    \ pass `LinkOption.NOFOLLOW_LINKS` to `options`, symbolic links are not followed.\
    \ Return `true` when the file exists; return `false` when the file doesn’t exist\
    \ or its existence cannot be determined.\n- `boolean notExists(Path path, LinkOption...\
    \ options)`: Check the file represented by `path` to determine if it doesn’t exist.\
    \ By default, symbolic links are followed, but if you pass `LinkOption.NOFOLLOW_LINKS`\
    \ to `options`, symbolic links are not followed. Return `true` when the file doesn’t\
    \ exist; return `false` when the file exists or its existence cannot be determined.\n\
    \n**Note**\n\nExpression `!exists(path)` isn’t equivalent to `notExists(path)`.\
    \ This is probably because `!exists()` isn’t atomic (executed as a single operation),\
    \ whereas `notExists()` is atomic. Also, when `exists()` and `notExists()` return\
    \ `false`, the existence of the file cannot be verified.\n\nThe `Files` class\
    \ also declares several `is`-prefixed methods for checking a path for additional\
    \ conditions:\n\n- `boolean isDirectory(Path path, LinkOption... options)`: Check\
    \ that `path` represents a directory. It returns `true` for a directory and `false`\
    \ for not a directory, when there is no file backing the `path`, or when it cannot\
    \ be determined that `path` represents a directory. Specify `LinkOption.NOFOLLOW_LINKS`\
    \ when you don’t want this method to follow symbolic links.\n- `boolean isExecutable(Path\
    \ path)`: Check that `path` represents an executable file. It returns `true` when\
    \ the file exists and is executable and `false` when the file doesn’t exist, when\
    \ execute access would be denied because the JVM has insufficient privileges,\
    \ or when access cannot be determined.\n- `boolean isHidden(Path path)`: Check\
    \ whether the file represented by `path` is hidden. The exact definition of hidden\
    \ is operating system-dependent. For example, Unix considers a file to be hidden\
    \ when its name begins with a period character. On Windows, a file is considered\
    \ hidden when it isn’t a directory and the DOS `hidden` attribute is set. This\
    \ method returns `true` when the file is considered hidden; otherwise, it returns\
    \ `false`. It throws `IOException` when an I/O error occurs.\n- `boolean isReadable(Path\
    \ path)`: Check that `path` represents a readable file. It returns `true` when\
    \ the file exists and is readable and `false` when the file doesn’t exist, when\
    \ read access would be denied because the JVM has insufficient privileges, or\
    \ when access cannot be determined.\n- `boolean isRegularFile(Path path, LinkOption...\
    \ options)`: Check that `path` represents a regular file. It returns `true` for\
    \ a regular file and `false` for not a regular file, when there is no file backing\
    \ the `path`, or when it cannot be determined that `path` represents a regular\
    \ file. Specify `LinkOption.NOFOLLOW_LINKS` when you don’t want this method to\
    \ follow symbolic links.\n- `boolean isSameFile(Path path1, Path path2)`: Check\
    \ whether `path1` and `path2` locate the same file, returning `true` when this\
    \ is the case. If the two `Path` objects are associated with different file system\
    \ providers, this method returns `false`. It throws `IOException` when an I/O\
