    文本处理应用程序通常需要将文本与模式（即简洁地描述被视为匹配的字符串集合的字符串）进行匹配。例如，一个应用程序可能需要定位文本文件中某个特定单词模式的所有出现位置，以便用另一个单词替换这些出现。NIO
    包含正则表达式，以帮助文本处理应用程序高性能地执行模式匹配。本章介绍正则表达式。


    ## Pattern、PatternSyntaxException 和 Matcher


    正则表达式（也称为 regex 或 regexp）是一种基于字符串的模式，表示与该模式匹配的字符串集合。该模式由字面字符和元字符组成，元字符是具有特殊含义而非字面含义的字符。


    正则表达式 API 提供了 `java.util.regex.Pattern` 类，通过编译后的正则表达式来表示模式。出于性能原因，正则表达式会被编译；通过编译后的正则表达式进行模式匹配，比未编译的正则表达式要快得多。表
    9-1 描述了 `Pattern` 的方法。


    表 9-1. `Pattern` 方法


    | 方法 | 描述 |

    | --- | --- |

    | `static Pattern compile(String regex)` | 编译 `regex` 并返回其 `Pattern` 对象。当 `regex`
    的语法无效时，此方法抛出 `java.util.regex.PatternSyntaxException`。 |

    | `static Pattern compile(String regex,int flags)` | 根据给定的 `flags`（一个位集，由 `Pattern`
    的 `CANON_EQ`、`CASE_INSENSITIVE`、`COMMENTS`、`DOTALL`、`LITERAL`、`MULTILINE`、`UNICODE_CASE`
    和 `UNIX_LINES` 常量的某种组合构成）编译 `regex`，并返回其 `Pattern` 对象。当 `regex` 的语法无效时，此方法抛出 `PatternSyntaxException`；当
    `flags` 中设置了与已定义匹配标志不对应的位值时，抛出 `java.lang.IllegalArgumentException`。 |

    | `int flags()` | 返回此 `Pattern` 对象的匹配标志。对于通过 `compile(String)` 创建的 `Pattern` 实例，此方法返回
    `0`；对于通过 `compile(String, int)` 创建的 `Pattern` 实例，返回标志的位集。 |

    | `Matcher matcher(CharSequence input)` | 返回一个 `java.util.regex.Matcher`，它将把 `input`
    与此 `Pattern` 的已编译正则表达式进行匹配。 |

    | `static boolean matches(String regex, CharSequence input)` | 编译 `regex` 并尝试将
    `input` 与编译后的正则表达式进行匹配。匹配时返回 `true`；否则返回 `false`。此便捷方法等同于 `Pattern.compile(regex).matcher(input).matches()`，并在
    `regex` 语法无效时抛出 `PatternSyntaxException`。 |

    | `String pattern()` | 返回此 `Pattern` 的未编译正则表达式。 |

    | `static String quote(String s)` | 使用 `"\Q"` 和 `"\E"` 引用 `s`，以便所有其他元字符失去其特殊含义。当返回的
    `java.lang.String` 对象随后被编译成 `Pattern` 实例时，它只能进行字面匹配。 |

    | `String[] split(CharSequence input)` | 根据此 `Pattern` 的已编译正则表达式的匹配结果拆分 `input`，并返回包含匹配结果的数组。
    |

    | `String[] split(CharSequence input, int limit)` | 根据此 `Pattern` 的已编译正则表达式的匹配结果拆分
    `input`；`limit` 控制已编译正则表达式应用的次数，从而影响结果数组的长度。 |

    | `String toString()` | 返回此 `Pattern` 的未编译正则表达式。 |


    表 9-1 揭示了 `java.lang.CharSequence` 接口，该接口描述了一个可读且不可变的 `char` 值序列——底层实现可能是可变的。任何实现此接口的类（例如
    `String`、`java.lang.StringBuffer` 和 `java.lang.StringBuilder`）的实例都可以传递给接受 `CharSequence`
    参数的 `Pattern` 方法（例如 `split(CharSequence)`）。


    表 9-1 还揭示了 `Pattern` 的每个 `compile()` 方法及其 `matches()` 方法（该方法调用 `compile(String)`
    方法）在编译模式参数时遇到语法错误时会抛出 `PatternSyntaxException`。表 9-2 描述了 `PatternSyntaxException`
    的方法。


    表 9-2. `PatternSyntaxException` 方法

