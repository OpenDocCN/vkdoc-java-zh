- fmt: '# Quantifiers


    The final regex construct I present is the quantifier, a numeric value implicitly
    or explicitly bound to a pattern. Quantifiers are categorized as greedy, reluctant,
    or possessive:


    - A greedy quantifier (`?`, `*`, or `+`) attempts to find the longest match. Specify
    `X?` to find one or no occurrences of `X`, `X*` to find zero or more occurrences
    of `X`, `X+` to find one or more occurrences of `X`, `X{n}` to find `n` occurrences
    of `X`, `X{n,}` to find at least `n` (and possibly more) occurrences of `X`, and
    `X{n,m}` to find at least `n` but no more than `m` occurrences of `X`.

    - A reluctant quantifier (`??`, `*?`, or `+?`) attempts to find the shortest match.
    Specify `X??` to find one or no occurrences of `X`, `X*?` to find zero or more
    occurrences of `X`, `X+?` to find one or more occurrences of `X`, `X{n}?` to find
    `n` occurrences of `X`, `X{n,}?` to find at least `n` (and possibly more) occurrences
    of `X`, and `X{n,m}?` to find at least `n` but no more than `m` occurrences of
    `X`.

    - A possessive quantifier (`?+`, `*+`, or `++`) is similar to a greedy quantifier
    except that a possessive quantifier makes only one attempt to find the longest
    match, whereas a greedy quantifier can make multiple attempts. Specify `X?+` to
    find one or no occurrences of `X`, `X*+` to find zero or more occurrences of `X`,
    `X++` to find one or more occurrences of `X`, `X{n}+` to find `n` occurrences
    of `X`, `X{n,}+` to find at least `n` (and possibly more) occurrences of `X`,
    and `X{n,m}+` to find at least `n` but no more than `m` occurrences of `X`.


    For an example of a greedy quantifier, execute the following command line:


    `java RegExDemo .*end "wend rend end"`


    You’ll discover the following output:


    ```

    regex = .*end

    input = wend rend end

    Located [wend rend end] starting at 0 and ending at 12

    ```


    The greedy quantifier (`.*`) matches the longest sequence of characters that terminates
    in `end`. It starts by consuming all of the input text and then is forced to back
    off until it discovers that the input text terminates with these characters.


    For an example of a reluctant quantifier, execute the following command line:


    `java RegExDemo .*?end "wend rend end"`


    You’ll discover the following output:


    ```

    regex = .*?end

    input = wend rend end

    Located [wend] starting at 0 and ending at 3

    Located [ rend] starting at 4 and ending at 8

    Located [ end] starting at 9 and ending at 12

    ```


    The reluctant quantifier (`.*?`) matches the shortest sequence of characters that
    terminates in `end`. It begins by consuming nothing and then slowly consumes characters
    until it finds a match. It then continues until it exhausts the input text.


    For an example of a possessive quantifier, execute the following command line:


    `java RegExDemo .*+end "wend rend end"`


    You’ll discover the following output:


    ```

    regex = .*+end

    input = wend rend end

    ```


    The possessive quantifier (`.*+`) doesn’t detect a match because it consumes the
    entire input text, leaving nothing left over to match `end` at the end of the
    regex. Unlike a greedy quantifier, a possessive quantifier doesn’t back off.


    While working with quantifiers, you’ll probably encounter zero-length matches.
    For example, execute the following command line:


    `java RegExDemo 1? 101101`


    You should observe the following output:


    ```

    regex = 1?

    input = 101101

    Located [1] starting at 0 and ending at 0

    Located [] starting at 1 and ending at 0

    Located [1] starting at 2 and ending at 2

    Located [1] starting at 3 and ending at 3

    Located [] starting at 4 and ending at 3

    Located [1] starting at 5 and ending at 5

    Located [] starting at 6 and ending at 5

    ```


    The result of this greedy quantifier is that `1` is detected at locations 0, 2,
    3, and 5 in the input text, and nothing is detected (a zero-length match) at locations
    1, 4, and 6.


    This time, execute the following command line:


    `java RegExDemo 1?? 101101`


    You should observe the following output:


    ```

    regex = 1??

    input = 101101

    Located [] starting at 0 and ending at -1

    Located [] starting at 1 and ending at 0

    Located [] starting at 2 and ending at 1

    Located [] starting at 3 and ending at 2

    Located [] starting at 4 and ending at 3

    Located [] starting at 5 and ending at 4

    Located [] starting at 6 and ending at 5

    ```


    This output might look surprising, but remember that a reluctant quantifier looks
    for the shortest match, which (in this case) is no match at all.


    Finally, execute the following command line:


    `java RegExDemo 1+? 101101`


    You should observe the following output:


    ```

    regex = 1+?

    input = 101101

    Located [1] starting at 0 and ending at 0

    Located [1] starting at 2 and ending at 2

    Located [1] starting at 3 and ending at 3

    Located [1] starting at 5 and ending at 5

    ```


    This possessive quantifier only matches the locations where `1` is detected in
    the input text. It doesn’t perform zero-length matches.


    **Note:** Check out the Java documentation on the `Pattern` class to learn about
    additional regex constructs.


    # Practical Regular Expressions


    Most of the previous regex examples haven’t been practical, except to help you
    grasp how to use the various regex constructs. In contrast, the following examples
    reveal a regex that matches phone numbers of the form `(ddd) ddd-dddd` or `ddd-dddd`.
    A single space appears between `(ddd)` and `ddd`; there’s no space on either side
    of the hyphen.


    `java RegExDemo "(\(\d{3}\))?\s*\d{3}-\d{4}" "(800) 555-1212"`


    ```

    regex = (\(\d{3}\))?\s*\d{3}-\d{4}

    input = (800) 555-1212

    Located [(800) 555-1212] starting at 0 and ending at 13

    ```


    `java RegExDemo "(\(\d{3}\))?\s*\d{3}-\d{4}" 555-1212`


    ```

    regex = (\(\d{3}\))?\s*\d{3}-\d{4}

    input = 555-1212

    Located [555-1212] starting at 0 and ending at 7

    ```


    **Note:** To learn more about regular expressions, check out “Lesson: Regular
    Expressions” at [`http://download.oracle.com/javase/tutorial/essential/regex/index.html`](http://download.oracle.com/javase/tutorial/essential/regex/index.html)
    in The Java Tutorials.


    # Exercises


    The following exercises are designed to test your understanding of Chapter 9’s
    content:


    1. Define regular expression.

    2. What does the `Pattern` class accomplish?

    3. What do `Pattern`’s `compile()` methods do when they discover illegal syntax
    in their regular expression arguments?

    4. What does the `Matcher` class accomplish?

    5. What is the difference between `Matcher`’s `matches()` and `lookingAt()` methods?

    6. Define character class.

    7. Identify the various kinds of character classes.

    8. True or false: An intersection character class consists of multiple `&&`-separated
    nested character classes, where at least one nested character class is a negation
    character class, and matches all characters except for those indicated by the
    negation character class/classes.

    9. Define capturing group.

    10. What is a zero-length match?

    11. Define quantifier.

    12. What is the difference between greedy and reluctant quantifiers?

    13. How do possessive and greedy quantifiers differ?

    14. Create a `ReplaceText` application that takes input text, a pattern that specifies
    text to replace, and replacement text command-line arguments, and uses `Matcher`’s
    `String replaceAll(String replacement)` method to replace all matches of the pattern
    with the replacement text (passed to `replacement`). For example, `java ReplaceText
    "too many embedded spaces" "\s+" " "` should output `too many embedded spaces`
    with only a single space character between successive words.'
