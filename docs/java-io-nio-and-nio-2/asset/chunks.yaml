    ## Using Path Matchers and Watch Services


    The `Files` class provides utility methods for most of the file system tasks that
    you’ll encounter while working with I/O. However, it doesn’t provide methods to
    handle path-matching and watch services. For these tasks, you need to work directly
    with `FileSystem`.'
