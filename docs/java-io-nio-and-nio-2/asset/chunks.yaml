    This example demonstrates the traditional way to open a file and create an input
    stream for reading bytes from the file. It then goes on to read the file’s contents.
    An exception handler takes care of any thrown exceptions, which are represented
    by instances of the `java.io.IOException` class.


    Whether or not an exception is thrown, the input stream and underlying file must
    be closed. This action takes place in the `try` statement’s `finally` block. Because
    of the verbosity in closing the file, you can alternatively use JDK 7’s `try`-with-resources
    statement to automatically close it, as follows:


    `try (FileInputStream fis = new FileInputStream("image.jpg"))`


    `{`


       `// Read bytes from file.`


       `int _byte;`


       `while ((_byte = fis.read()) != -1) // -1 signifies EOF`


          `; // Process _byte in some way.`


    `}`


    `catch (IOException ioe)`


    `{`


       `// Handle exception.`


    `}`


    I demonstrate both the traditional and `try`-with-resources approaches to closing
    files throughout subsequent chapters.


    Some stream classes are used to filter other streams. For example, to improve
    performance, `BufferedInputStream` reads a block of bytes from another stream
    and returns bytes from its buffer until the buffer is empty, in which case it
    reads another block. Consider the following example:


    `try (FileInputStream fis = new FileInputStream("image.jpg");`


         `BufferedInputStream bis = new BufferedInputStream(fis))`


    `{`


       `// Read bytes from file.`


       `int _byte;`


       `while ((_byte = bis.read()) != -1) // -1 signifies EOF`


          `; // Process _byte in some way.`


    `}`


    `catch (IOException ioe)`


    `{`


       `// Handle exception.`


    `}`


    A file input stream that reads from the `image.jpg` file is created. This stream
    is passed to a buffered input stream constructor. Subsequent reads are performed
    on the buffered input stream, which calls file input stream `read()` methods when
    appropriate.


    [Chapter 4](#A978-1-4842-1565-4_4_Chapter.html) explores the stream classes.


    #### Stream Classes and Standard I/O


    Many operating systems support standard I/O, which is preconnected input and output
    data streams between a computer program and its environment when it begins execution.
    The preconnected streams are known as standard input, standard output, and standard
    error.


    Standard input defaults to reading its input from the keyboard. Also, standard
    output and standard error default to writing their output to the screen. However,
    these streams can be redirected to read input from a different source and write
    output to a different destination (such as a file).


    JDK 1.0 introduced support for standard I/O by adding the `in`, `out`, and `err`
    objects of type `InputStream` and `PrintStream` to the `java.lang.System` class.
    You specify method calls on these objects to access standard input, standard output,
    and standard error, as follows:


    `int ch = System.in.read(); // Read single character from standard input.`


    `System.out.println("Hello"); // Write string to standard output.`


    `System.err.println("I/O error: " +`


                       `ioe.getMessage()); // Write string to standard error.`


    As well as exploring `InputStream` and `PrintStream`, [Chapter 4](#A978-1-4842-1565-4_4_Chapter.html)
    also revisits standard I/O to show you how to programmatically redirect these
    streams.


    ### JDK 1.1 and the Writer/Reader Classes


    JDK 1.0’s I/O capabilities are suitable for streaming bytes, but cannot properly
    stream characters because they don’t account for character encodings. JDK 1.1
    overcame this problem by introducing writer/reader classes that take character
    encodings into account. For example, the `java.io` package includes `FileWriter`
    and `FileReader` classes for writing and reading character streams.


    [Chapter 5](#A978-1-4842-1565-4_5_Chapter.html) explores various writer and reader
    classes.


    ## NIO


    Modern operating systems offer sophisticated I/O services (such as readiness selection)
    for improving I/O performance and simplifying I/O. Java Specification Request
    (JSR) 51 ( [`www.jcp.org/en/jsr/detail?id=51`](http://www.jcp.org/en/jsr/detail?id=51)
    ) was created to address these capabilities.


    JSR 51’s description indicates that it provides APIs for scalable I/O, fast buffered
    binary and character I/O, regular expressions, and charset conversion. Collectively,
    these APIs are known as NIO. JDK 1.4 implemented NIO in terms of the following
    APIs:


    *   Buffers

    *   Channels

    *   Selectors

    *   Regular expressions

    *   Charsets


    The regular expression and charset APIs were provided to simplify common I/O-related
    tasks.'
  trans: '

    ### 通过流类进行流式数据传输


    经典的 I/O 包含用于执行 I/O 操作的流。流是一个任意长度的有序字节序列。字节通过输出流从应用程序流向目的地，并通过输入流从源流向应用程序。图 1-1
    展示了这些流程。


    ![A978-1-4842-1565-4_1_Fig1_HTML.jpg](img/A978-1-4842-1565-4_1_Fig1_HTML.jpg)


    图 1-1.


    将输出流和输入流概念化为字节流


    Java 在 `java.io` 包中提供了用于标识各种写入目的地的流类；例如，字节数组和文件。Java 还在该包中提供了用于标识各种读取来源的流类。示例包括文件和线程管道。


    例如，你可以使用 `FileInputStream` 打开一个现有文件，并将一个输入流连接到该文件。然后，你可以调用各种 `read()` 方法，通过输入流从文件中读取字节。最后，调用
    `close()` 来关闭流和文件。请参考以下示例：


    `FileInputStream fis = null;`


    `try`


    `{`


       `fis = new FileInputStream("image.jpg");`


       `// 从文件中读取字节。`


       `int _byte;`


       `while ((_byte = fis.read()) != -1) // -1 表示文件结束符`


          `; // 以某种方式处理 _byte。`


    `}`


    `catch (IOException ioe)`


    `{`


       `// 处理异常。`


    `}`


    `finally`


    `{`


       `if (fis != null)`


          `try`


          `{`


             `fis.close();`


          `}`


    `}`


    此示例演示了打开文件并创建用于从文件读取字节的输入流的传统方式。然后继续读取文件的内容。异常处理器负责处理任何抛出的异常，这些异常由 `java.io.IOException`
    类的实例表示。


    无论是否抛出异常，输入流和底层文件都必须被关闭。此操作在 `try` 语句的 `finally` 块中执行。由于关闭文件的代码较为冗长，你也可以使用 JDK
    7 的 `try`-with-resources 语句来自动关闭它，如下所示：


    `try (FileInputStream fis = new FileInputStream("image.jpg"))`


    `{`


       `// 从文件中读取字节。`


       `int _byte;`


       `while ((_byte = fis.read()) != -1) // -1 表示文件结束符`


          `; // 以某种方式处理 _byte。`


    `}`


    `catch (IOException ioe)`


    `{`


       `// 处理异常。`


    `}`


    在后续章节中，我将演示关闭文件的传统方法和 `try`-with-resources 方法。


    一些流类用于过滤其他流。例如，为了提高性能，`BufferedInputStream` 从另一个流中读取一个字节块，并从其缓冲区返回字节，直到缓冲区为空，此时它会读取另一个块。请参考以下示例：


    `try (FileInputStream fis = new FileInputStream("image.jpg");`


         `BufferedInputStream bis = new BufferedInputStream(fis))`


    `{`


       `// 从文件中读取字节。`


       `int _byte;`


       `while ((_byte = bis.read()) != -1) // -1 表示文件结束符`


          `; // 以某种方式处理 _byte。`


    `}`


    `catch (IOException ioe)`


    `{`


       `// 处理异常。`


    `}`


    创建了一个从 `image.jpg` 文件读取数据的文件输入流。此流被传递给一个缓冲输入流的构造函数。后续的读取操作在缓冲输入流上执行，该流会在适当时调用文件输入流的
    `read()` 方法。


    第 4 章 将深入探讨流类。


    #### 流类与标准 I/O


    许多操作系统支持标准 I/O，即计算机程序在开始执行时与其环境之间预先连接的输入和输出数据流。这些预先连接的流被称为标准输入、标准输出和标准错误。


    标准输入默认从键盘读取其输入。同样，标准输出和标准错误默认将其输出写入屏幕。但是，这些流可以被重定向，以从不同的源读取输入，并将输出写入不同的目的地（例如文件）。


    JDK 1.0 通过在 `java.lang.System` 类中添加类型为 `InputStream` 和 `PrintStream` 的 `in`、`out`
    和 `err` 对象，引入了对标准 I/O 的支持。你可以对这些对象调用方法，以访问标准输入、标准输出和标准错误，如下所示：


    `int ch = System.in.read(); // 从标准输入读取单个字符。`


    `System.out.println("Hello"); // 将字符串写入标准输出。`


    `System.err.println("I/O error: " +`


                       `ioe.getMessage()); // 将字符串写入标准错误。`


    除了探讨 `InputStream` 和 `PrintStream` 之外，第 4 章 还将重新审视标准 I/O，向你展示如何以编程方式重定向这些流。


    ### JDK 1.1 与 Writer/Reader 类


    JDK 1.0 的 I/O 功能适用于流式传输字节，但由于未考虑字符编码，因此无法正确流式传输字符。JDK 1.1 通过引入考虑字符编码的 writer/reader
    类克服了这个问题。例如，`java.io` 包包含了用于写入和读取字符流的 `FileWriter` 和 `FileReader` 类。


    第 5 章 将探讨各种 writer 和 reader 类。


    ## NIO


    现代操作系统提供了复杂的 I/O 服务（例如就绪选择），以提高 I/O 性能并简化 I/O。Java 规范请求 (JSR) 51 ( [`www.jcp.org/en/jsr/detail?id=51`](http://www.jcp.org/en/jsr/detail?id=51)
    ) 的创建就是为了解决这些能力。


    JSR 51 的描述表明，它提供了用于可扩展 I/O、快速缓冲二进制和字符 I/O、正则表达式以及字符集转换的 API。这些 API 统称为 NIO。JDK
    1.4 通过以下 API 实现了 NIO：


    *   缓冲区

    *   通道

    *   选择器

    *   正则表达式

    *   字符集


    提供正则表达式和字符集 API 是为了简化常见的 I/O 相关任务。

