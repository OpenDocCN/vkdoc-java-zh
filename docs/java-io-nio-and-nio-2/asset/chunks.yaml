- fmt: "### Pipes\n\n`java.nio.channels`包中包含一个`Pipe`类。`Pipe`描述了一对实现单向管道的通道，这是一种在两个实体（例如两个文件通道或两个套接字通道）之间单向传递数据的管道。`Pipe`类似于`java.io.PipedInputStream`和`java.io.PipedOutputStream`类——参见[第4章](#A978-1-4842-1565-4_4_Chapter.html)。\n\
    \n`Pipe`声明了嵌套的`SourceChannel`和`SinkChannel`类，它们分别作为可读和可写的字节通道。`Pipe`还声明了以下方法：\n\
    \n- `static Pipe open()`：该类方法打开一个新的管道，当发生I/O错误时抛出`IOException`。\n- `SourceChannel\
    \ source()`：该方法返回管道的源通道（数据来源）。\n- `SinkChannel sink()`：该方法返回管道的接收端通道（数据发送目标）。\n\
    \n管道可用于在同一JVM内传递数据；不能使用它们在JVM和外部程序之间传递数据。由于封装性，管道在生产/消费者场景中非常理想：根据呈现给管道的通道类型，可以使用相同的代码将数据写入文件、套接字或管道。\n\
    \n清单[7-11](#A978-1-4842-1565-4_7_Chapter.html#FPar28)展示了一个使用管道实现两个线程间通信的生产者/消费者应用程序。\n\
    \n**清单7-11. 通过管道生产和消费字节**\n\n```\nimport java.io.IOException;\nimport java.nio.ByteBuffer;\n\
    import java.nio.channels.Pipe;\nimport java.nio.channels.ReadableByteChannel;\n\
    import java.nio.channels.WritableByteChannel;\n\npublic class ChannelDemo\n{\n\
    \    final static int BUFSIZE = 10;\n    final static int LIMIT = 3;\n\n    public\
    \ static void main(String[] args) throws IOException\n    {\n        final Pipe\
    \ pipe = Pipe.open();\n\n        Runnable senderTask =\n            new Runnable()\n\
    \            {\n                @Override\n                public void run()\n\
    \                {\n                    WritableByteChannel src = pipe.sink();\n\
    \                    ByteBuffer buffer = ByteBuffer.allocate(BUFSIZE);\n     \
    \               for (int i = 0; i < LIMIT; i++)\n                    {\n     \
    \                   buffer.clear();\n                        for (int j = 0; j\
    \ < BUFSIZE; j++)\n                            buffer.put((byte) (Math.random()\
    \ * 256));\n                        buffer.flip();\n                        try\n\
    \                        {\n                            while (src.write(buffer)\
    \ > 0);\n                        }\n                        catch (IOException\
    \ ioe)\n                        {\n                            System.err.println(ioe.getMessage());\n\
    \                        }\n                    }\n                    try\n \
    \                   {\n                        src.close();\n                \
    \    }\n                    catch (IOException ioe)\n                    {\n \
    \                       ioe.printStackTrace();\n                    }\n      \
    \          }\n            };\n\n        Runnable receiverTask =\n            new\
    \ Runnable()\n            {\n                @Override\n                public\
    \ void run()\n                {\n                    ReadableByteChannel dst =\
    \ pipe.source();\n                    ByteBuffer buffer = ByteBuffer.allocate(BUFSIZE);\n\
    \                    try\n                    {\n                        while\
    \ (dst.read(buffer) >= 0)\n                        {\n                       \
    \     buffer.flip();\n                            while (buffer.remaining() >\
    \ 0)\n                                System.out.println(buffer.get() & 255);\n\
    \                            buffer.clear();\n                        }\n    \
    \                }\n                    catch (IOException ioe)\n            \
    \        {\n                        System.err.println(ioe.getMessage());\n  \
    \                  }\n                }\n            };\n\n        Thread sender\
    \ = new Thread(senderTask);\n        Thread receiver = new Thread(receiverTask);\n\
    \        sender.start();\n        receiver.start();\n    }\n}\n```\n\n清单[7-11](#A978-1-4842-1565-4_7_Chapter.html#FPar28)的`main()`方法首先获取一个管道，然后创建作为生产者和消费者的发送者任务和接收者任务。`main()`接着创建发送者线程和接收者线程并启动它们。\n\
    \n发送者任务的`run()`方法首先通过调用`Pipe`的`sink()`方法从管道获取一个可写字节通道。然后它分配一个字节缓冲区用于存储要写入的内容。\n\
    \n`run()`继续进入一对`for`循环，用于向可写字节通道发送面向字节的数据。每个外层`for`循环迭代都会清除缓冲区，以便内层`for`循环填充。然后翻转缓冲区准备排空，通过将缓冲区传递给可写字节通道的`write()`方法来完成。由于单次方法调用可能无法排空整个缓冲区，因此在一个循环中调用`write()`，直到它返回`0`，这意味着没有更多内容可写。然后关闭通道，这样接收者任务在从通道读取时就不会阻塞，因为它期望接收更多数据。\n\
    \n接收者任务的`run()`方法首先通过调用`Pipe`的`source()`方法从管道获取一个可读字节通道。然后它分配一个缓冲区用于存储读取的内容。\n\
    \n接着，`run()`进入一个`while`循环，持续从通道读取，直到`read()`方法返回`-1`，这表示通道已到达流的末尾。如果发送者的`run()`方法没有关闭通道，此方法不会到达流的末尾。\n\
    \n此时，翻转缓冲区以准备排空。然后通过将其字节值打印到标准输出流来排空。每个字节与255进行按位与运算，以防止输出负值。基本上，`get()`返回一个8位整数值，在`System.out.println()`方法调用期间会转换为32位整数。此转换应用了符号扩展，这意味着某些字节值会变成负的32位整数。通过将字节值与255进行按位与运算，此转换确保没有字节值变成负的32位整数。\n\
    \n最后，清除缓冲区以准备填充，循环继续。\n\n编译清单[7-11](#A978-1-4842-1565-4_7_Chapter.html#FPar28)（`javac\
    \ ChannelDemo.java`）并运行应用程序（`java ChannelDemo`）。您应该会看到一系列30个随机整数，类似于下面所示：\n\n\
    ```\n245\n56\n137\n166\n52\n183\n252\n166\n246\n124\n163\n11\n159\n68\n203\n118\n\
    157\n70\n54\n148\n186\n17\n12\n203\n75\n223\n224\n175\n205\n47\n```\n\n### 练习题\n\
    \n以下练习题旨在测试您对[第7章](#A978-1-4842-1565-4_7_Chapter.html)内容的理解：\n\n- 什么是通道？`Channel`接口提供了哪些功能？\n\
    - 指出直接扩展`Channel`的三个接口。\n- 判断正误：实现`InterruptibleChannel`的通道是异步可关闭的。\n- 指出获取通道的两种方式。\n\
    - 定义分散/聚集I/O。提供了哪些接口来实现分散/聚集I/O？\n- 定义文件通道。\n- 判断正误：文件通道不支持分散/聚集I/O。\n- 定义独占锁和共享锁。\n\
    - `FileChannel`的`lock()`和`tryLock()`方法之间的根本区别是什么？\n- 当已经持有与此锁请求重叠的锁，或者另一个线程正在等待获取将与此请求重叠的锁时，`FileLock\
    \ lock()`方法会做什么？\n- 指定您应该采用的模式，以确保始终释放已获取的文件锁。\n- `FileChannel`提供了什么方法用于将文件区域映射到内存？\n\
    - 指出三种文件映射模式。\n- 哪种文件映射模式对应于写时复制？\n- 指出优化批量传输常见实践的`FileChannel`方法。\n- 判断正误：套接字通道是可选择的，并且可以在非阻塞模式下运行。\n\
    - 指出描述套接字通道的三个类。\n- 判断正误：数据报通道不是线程安全的。\n- 为什么套接字通道支持非阻塞模式？\n- 如何获取套接字通道的关联套接字？\n\
    - 如何获取服务器套接字通道？\n- 创建一个`Copy`应用程序，该应用程序使用`ByteBuffer`和`FileChannel`类与`FileInputStream`和`FileOutputStream`配合，将源文件复制到目标文件。"
  raw: '### Pipes


    The `java.nio.channels` package includes a `Pipe` class. `Pipe` describes a pair
    of channels that implement a unidirectional pipe, which is a conduit for passing
    data in one direction between two entities, such as two file channels or two socket
    channels. `Pipe` is analogous to the `java.io.PipedInputStream` and `java.io.PipedOutputStream`
    classes—see [Chapter 4](#A978-1-4842-1565-4_4_Chapter.html).


    `Pipe` declares nested `SourceChannel` and `SinkChannel` classes that serve as
    readable and writable byte channels, respectively. `Pipe` also declares the following
    methods:


    *   `static` `Pipe open()`: This class method opens a new pipe, throwing `IOException`
    when an I/O error occurs.

    *   `SourceChannel source()`: This method returns the pipe’s source channel (from
    which data originates).

    *   `SinkChannel sink()`: This method returns the pipe’s sink channel (to which
    data is sent).


    Pipes can be used to pass data within the same JVM; you cannot use them to pass
    data between the JVM and an external program. Pipes are ideal in producer/consumer
    scenarios because of encapsulation: you can use the same code to write data to
    files, sockets, or pipes depending on the kind of channel presented to the pipe.


    Listing [7-11](#A978-1-4842-1565-4_7_Chapter.html#FPar28) presents a producer/consumer
    application that uses a pipe to achieve communication between two threads.


    Listing 7-11\. Producing and Consuming Bytes via a Pipe


    `import java.io.IOException;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.Pipe;`


    `import java.nio.channels.ReadableByteChannel;`


    `import java.nio.channels.WritableByteChannel;`


    `public class ChannelDemo`


    `{`


    `final static int BUFSIZE = 10;`


    `final static int LIMIT = 3;`


    `public static void main(String[] args) throws IOException`


    `{`


    `final Pipe pipe = Pipe.open();`


    `Runnable senderTask =`


    `new Runnable()`


    `{`


    `@Override`


    `public void run()`


    `{`


    `WritableByteChannel src = pipe.sink();`


    `ByteBuffer buffer = ByteBuffer.allocate(BUFSIZE);`


    `for (int i = 0; i < LIMIT; i++)`


    `{`


    `buffer.clear();`


    `for (int j = 0; j < BUFSIZE; j++)`


    `buffer.put((byte) (Math.random() * 256));`


    `buffer.flip();`


    `try`


    `{`


    `while (src.write(buffer) > 0);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println(ioe.getMessage());`


    `}`


    `}`


    `try`


    `{`


    `src.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `};`


    `Runnable receiverTask =`


    `new Runnable()`


    `{`


    `@Override`


    `public void run()`


    `{`


    `ReadableByteChannel dst = pipe.source();`


    `ByteBuffer buffer = ByteBuffer.allocate(BUFSIZE);`


    `try`


    `{`


    `while (dst.read(buffer) >= 0)`


    `{`


    `buffer.flip();`


    `while (buffer.remaining() > 0)`


    `System.out.println(buffer.get() & 255);`


    `buffer.clear();`


    `}`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println(ioe.getMessage());`


    `}`


    `}`


    `};`


    `Thread sender = new Thread(senderTask);`


    `Thread receiver = new Thread(receiverTask);`


    `sender.start();`


    `receiver.start();`


    `}`


    `}`


    Listing [7-11](#A978-1-4842-1565-4_7_Chapter.html#FPar28)’s `main()` method first
    obtains a pipe and then creates sender and receiver tasks that serve as producer
    and consumer. `main()` then creates sender and receiver threads and starts them.


    The sender task’s `run()` method first obtains a writable byte channel from the
    pipe by invoking `Pipe`’s `sink()` method. It then allocates a byte buffer for
    storing content to be written.


    `run()` continues by entering a pair of `for` loops for sending byte-oriented
    data to the writable byte channel. Each of the outer `for` loop iterations clears
    the buffer in preparation for filling by the inner `for` loop. The buffer is then
    flipped in preparation for draining, which is accomplished by passing the buffer
    to the writable byte channel’s `write()` method. Because a single method call
    might not drain the entire buffer, `write()` is invoked in a loop until it returns
    `0`, which means that there is no more content to write. The channel is then closed
    so that the receiver task doesn’t block when reading from the channel because
    it expects to receive more data.


    The receiver task’s `run()` method first obtains a readable byte channel from
    the pipe by invoking `Pipe`’s `source()` method. It then allocates a buffer for
    storing read content.


    Continuing, `run()` enters a `while` loop that continually reads from the channel
    until the `read()` method returns `-1`, which indicates that the channel has reached
    the end of the stream. This method wouldn’t reach the end of the stream if the
    sender’s `run()` method hadn’t closed the channel.


    At this point, the buffer is flipped to prepare it for draining. It’s then drained
    by printing its byte values to the standard output stream. Each byte is bitwise
    ANDed with 255 to prevent a negative value from being output. Basically, `get()`
    returns an 8-bit integer value that’s converted to a 32-bit integer during the
    `System.out.println()` method call. This conversion applies sign extension, which
    means that some byte values become negative 32-bit integers. By bitwise ANDing
    the byte value with 255, the conversion ensures that no byte value is turned into
    a negative 32-bit integer.


    Finally, the buffer is cleared in preparation for filling and the loop continues.


    Compile Listing [7-11](#A978-1-4842-1565-4_7_Chapter.html#FPar28) (`javac ChannelDemo.java`)
    and run the application (`java ChannelDemo`). You should observe a sequence of
    30 random integers similar to that shown here:


    `245`


    `56`


    `137`


    `166`


    `52`


    `183`


    `252`


    `166`


    `246`


    `124`


    `163`


    `11`


    `159`


    `68`


    `203`


    `118`


    `157`


    `70`


    `54`


    `148`


    `186`


    `17`


    `12`


    `203`


    `75`


    `223`


    `224`


    `175`


    `205`


    `47`


    EXERCISES


    The following exercises are designed to test your understanding of [Chapter 7](#A978-1-4842-1565-4_7_Chapter.html)’s
    content:


    What is a channel?   What capabilities does the `Channel` interface provide?  
    Identify the three interfaces that directly extend `Channel`.   True or false:
    A channel that implements `InterruptibleChannel` is asynchronously closeable.
      Identify the two ways to obtain a channel.   Define scatter/gather I/O.   What
    interfaces are provided for achieving scatter/gather I/O?   Define file channel.
      True or false: File channels don’t support scatter/gather I/O.   Define exclusive
    lock and shared lock.   What is the fundamental difference between `FileChannel`’s
    `lock()` and `tryLock()` methods?   What does the `FileLock lock()` method do
    when either a lock is already held that overlaps this lock request or another
    thread is waiting to acquire a lock that will overlap with this request?   Specify
    the pattern that you should adopt to ensure that an acquired file lock is always
    released.   What method does `FileChannel` provide for mapping a region of a file
    into memory?   Identify the three file-mapping modes.   Which file-mapping mode
    corresponds to copy-on-write?   Identify the `FileChannel` methods that optimize
    the common practice of performing bulk transfers.   True or false: Socket channels
    are selectable and can function in nonblocking mode.   Identify the three classes
    that describe socket channels.   True or false: Datagram channels are not thread-safe.
      Why do socket channels support nonblocking mode?   How would you obtain a socket
    channel’s associated socket?   How do you obtain a server socket channel?   Create
    a `Copy` application that uses the `ByteBuffer` and `FileChannel` classes in partnership
    with `FileInputStream` and `FileOutputStream` to copy a source file to a destination
    file.'
