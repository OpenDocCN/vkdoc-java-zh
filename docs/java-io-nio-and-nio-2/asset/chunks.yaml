    and `DIRECTORY_INHERIT` flags), and `NO_PROPAGATE_INHERIT` (can be placed on a
    directory to indicate that the ACL entry should not be placed on the newly-created
    directory, which is inheritable by subdirectories of the created directory), flag
    constants.


