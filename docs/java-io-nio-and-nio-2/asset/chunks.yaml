    Before working with any of these views, make sure that it’s supported. One way
    to accomplish this task is to call `FileSystem`’s `Set<String>` `supportedFileAttributeViews()`
    method, which returns a set of strings identifying views that are supported by
    the invoking `FileSystem`.


    Listing [12-9](#A978-1-4842-1565-4_12_Chapter.html#FPar15) presents the source
    code to an application that outputs the names of views supported by the default
    `FileSystem`.


    Listing 12-9\. Outputting the Names of Default File System-Supported File Attribute
    Views


    `import java.nio.file.FileSystem;`


    `import java.nio.file.FileSystems;`


    `public class FAVDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `FileSystem fsDefault = FileSystems.getDefault();`


    `for (String view: fsDefault.supportedFileAttributeViews())`


    `System.out.println(view);`


    `}`


    `}`


    Compile Listing [12-9](#A978-1-4842-1565-4_12_Chapter.html#FPar15) as follows:


    `javac FAVDemo.java`


    Run the resulting application as follows:


    `java FAVDemo`


    I observe the following output:


    `owner`


    `dos`


    `acl`


    `basic`


    `user`


    Note


    All `FileSystem`s support the basic file attribute view so you should see at least
    `basic` in the output.


    You could also use `Files`’s `<V extends FileAttributeView> V getFileAttributeView(Path
    path, Class<V> type, LinkOption... options)` method, which returns an object created
    from an implementation of the view interface type or `null` when the view isn’t
    supported, to accomplish this task. Listing [12-10](#A978-1-4842-1565-4_12_Chapter.html#FPar17)
    presents an application that uses this method in a utility method context to determine
    view support.


    Listing 12-10\. Determining Specific File Attribute View Support


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.AclFileAttributeView;`


    `import java.nio.file.attribute.BasicFileAttributeView;`


    `import java.nio.file.attribute.FileAttributeView;`


    `import java.nio.file.attribute.PosixFileAttributeView;`


    `public class FAVDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `System.out.printf("Supports basic: %b%n",`


    `isSupported(BasicFileAttributeView.class));`


    `System.out.printf("Supports posix: %b%n",`


    `isSupported(PosixFileAttributeView.class));`


    `System.out.printf("Supports acl: %b%n",`


    `isSupported(AclFileAttributeView.class));`


    `}`


    `static boolean isSupported(Class<? extends FileAttributeView> clazz)`


    `{`


    `return Files.getFileAttributeView(Paths.get("."), clazz) != null;`


    `}`


    `}`


    Listing [12-10](#A978-1-4842-1565-4_12_Chapter.html#FPar17) declares an `isSupported()`
    utility method that takes a `java.lang.Class` object representing a `FileAttributeView`
    subinterface as an argument. It returns `true` when the view is supported or `false`
    when it isn’t supported.


    The `Class` argument and a `Path` object describing the current directory are
    passed to `getFileAttributeView()`, which returns either an object created from
    a class that implements the interface when the view is supported or `null` when
    it isn’t supported.


    Compile Listing [12-10](#A978-1-4842-1565-4_12_Chapter.html#FPar17) (`javac FAVDemo.java`)
    and run the resulting application (`java FAVDemo`). I observe the following output:


    `Supports basic: true`


    `Supports posix: false`


    `Supports acl: true`


    Ultimately, `getFileAttributeView()` provides a result for the `FileSystem` associated
    with the `Path` argument. Because `Paths.get(".")` returns a `FileSystem` for
    the default file system, `isSupport()` is relevant in a default file system context
    only.


    Finally, a file store can support various file attribute views. Call either of
    `FileStore`’s `supportsFileAttributeView()` methods to determine whether or not
    the file store supports the file attributes identified by the given file attribute
    view:


    *   `boolean supportsFileAttributeView(Class<? extends FileAttributeView> type)`

    *   `boolean supportsFileAttributeView(` [`String`](https://docs.oracle.com/javase/8/docs/api/java/lang/String.html#class%20in%20java.lang)
    `name)`


    One of these methods takes a `Class` object describing a subinterface of `FileAttributeView`
    as an argument:


    `System.out.printf("supports basic file attribute view: %b%n",`


    `fileStore.supportsFileAttributeView(BasicFileAttributeView.class));`


    The other method takes a string argument, which is one of the strings returned
    from `FileSystem`’s `supportedFileAttributeViews()` method:


    `System.out.printf("supports basic file attribute view: %b%n",`


    `fileStore.supportsFileAttributeView("basic"));`


    #### Exploring the Basic View


    The `BasicFileAttributeView` interface supports several basic attributes. The
    following list identifies each attribute in terms of its string name and type:


    *   `creationTime` (`FileTime`)

    *   `fileKey` (`Object`)

    *   `isDirectory` (`Boolean`)

    *   `isOther` (`Boolean`)

    *   `isRegularFile` (`Boolean`)

    *   `isSymbolicLink` (`Boolean`)

    *   `lastAccessTime` (`FileTime`)

    *   `lastModifiedTime` (`FileTime`)

    *   `size` (`Long`)


    Each of `creationTime`, `lastAccessTime`, and `lastModifiedTime` has type `java.nio.file.attribute.FileTime`,
    an immutable class representing a file’s timestamp. `fileKey` has type `java.lang.Object`.
    Each of `isDirectory`, `isOther`, `isRegularFile`, and `isSymbolicLink` has type
    `java.lang.Boolean. size` has type `java.lang.Long`.


    `BasicFileAttributeView` declares the following methods:


    *   `BasicFileAttributes readAttributes()`: Read the basic file attributes as
    a bulk operation.

    *   `void setTimes(FileTime lastModifiedTime, FileTime lastAccessTime, FileTime
    creationTime)`: Update any or all of the file’s `lastModifiedTime`, `lastAccessTime`,
    and `creationTime` attributes.


    These methods throw `IOException` when an I/O error occurs.


    `readAttributes()` returns a `java.nio.file.attribute.BasicFileAttributes` object
    that offers type-safe methods for reading attribute values:


    *   `FileTime creationTime()`

    *   `Object fileKey()`

    *   `boolean isDirectory()`

    *   `boolean isOther()`

    *   `boolean isRegularFile()`

    *   `boolean isSymbolicLink()`

    *   `FileTime lastAccessTime()`

    *   `FileTime lastModifiedTime()`

    *   `long size()`


    Note


    On some file systems, it’s possible to use an identifier or a combination of identifiers
    to uniquely identify a file. Such identifiers are known as file keys. File keys
    are important for operations such as file tree walks in file systems that support
    [symbolic links](https://docs.oracle.com/javase/8/docs/api/java/nio/file/package-summary.html#links),
    and for file systems that allow a file to be an entry in more than one directory.
    For example, on Unix-based file systems, the device ID and information node (inode)
    are commonly used for such purposes.'
