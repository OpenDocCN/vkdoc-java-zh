    ## 第 9 章：正则表达式


    正则表达式（也称为 regex 或 regexp）是一种基于字符串的模式，它表示与该模式匹配的字符串集合。`Pattern` 类的实例通过编译后的正则表达式来表示模式。出于性能原因，正则表达式会被编译；通过编译后的正则表达式进行模式匹配，其速度远快于未编译的正则表达式。当
    `Pattern` 的 `compile()` 方法在其正则表达式参数中发现非法语法时，会抛出 `PatternSyntaxException`。`Matcher`
    类的实例尝试将编译后的正则表达式与输入文本进行匹配。`Matcher` 的 `matches()` 和 `lookingAt()` 方法的区别在于，与 `matches()`
    不同，`lookingAt()` 不要求匹配整个区域。


    字符类是出现在 `[` 和 `]` 之间的一组字符。字符类有六种：简单类、否定类、范围类、并集类、交集类和差集类。答案是错误的：差集字符类由多个以 `&&`
    分隔的嵌套字符类组成，其中至少有一个嵌套字符类是否定字符类，它匹配除否定字符类所指示字符之外的所有字符。


    捕获组会保存匹配的字符，以便在模式匹配期间稍后调用。零长度匹配是长度为零的匹配，其起始索引和结束索引相等。量词是隐式或显式绑定到模式的数值。量词分为贪婪型、勉强型和占有型。贪婪量词和勉强量词的区别在于，贪婪量词试图找到最长的匹配，而勉强量词试图找到最短的匹配。占有型量词和贪婪量词的区别在于，占有型量词只尝试一次以找到最长的匹配，而贪婪量词可以进行多次尝试。


    清单 A-8 展示了 第 9 章 中要求的 `ReplaceText` 应用程序。


    清单 A-8\. 用替换文本替换模式的所有匹配项


    `import java.util.regex.Matcher;`


    `import java.util.regex.Pattern;`


    `import java.util.regex.PatternSyntaxException;`


    `public class ReplaceText`


    `{`


       `public static void main(String[] args)`


       `{`


          `if (args.length != 3)`


          `{`


             `System.err.println("usage: java ReplaceText text oldText newText");`


             `return;`


          `}`


          `try`


          `{`


             `Pattern p = Pattern.compile(args[1]);`


             `Matcher m = p.matcher(args[0]);`


             `String result = m.replaceAll(args[2]);`


             `System.out.println(result);`


          `}`


          `catch (PatternSyntaxException pse)`


          `{`


             `System.err.println(pse);`


          `}`


       `}`


    `}`


    ## 第 10 章：字符集


    字符集是编码字符集与字符编码方案的结合。`Charset` 类的目的是在字节序列和编码到这些序列中的字符之间进行转换。JVM 支持的标准字符集有 US-ASCII、ISO-8859-1、UTF-8、UTF-16BE、UTF-16LE
    和 UTF-16。字节顺序标记的目的是告诉解码器一个 `UTF-16` 编码的字节序列是如何编码的。你可以通过调用 `Charset` 的 `Charset`
    `defaultCharset()` 工厂方法来获取默认字符集。当 JVM 不支持所需的字符集时，`Charset` 的 `Charset forName(String
    charsetName)` 工厂方法会抛出 `UnsupportedCharsetException`。


    通常，你会通过调用 `Charset` 的 `ByteBuffer encode(String s)` 方法来使用 `Charset` 实例对字符串进行编码，该方法返回一个新的
    `ByteBuffer` 对象，其中包含对 `s` 中的字符进行编码后的字节。你也可以调用 `Charset` 的 `ByteBuffer encode(CharBuffer
    cb)` 方法。执行实际编码和解码任务的 `Charset` 方法是 `CharsetEncoder newEncoder()` 和 `CharsetDecoder
    newDecoder()`。`String` 的 `byte[]` `getBytes()` 方法返回一个新的字节数组，其中包含使用操作系统默认字符集编码的此字符串的字符。


    清单 A-9 展示了 第 10 章 中要求的 `AvailCharsets` 应用程序。


    清单 A-9\. 获取并输出可用字符集的映射


    `import java.nio.charset.Charset;`


    `import java.util.SortedMap;`


    `public class AvailCharsets`


    `{`


       `public static void main(String[] args)`


       `{`


          `SortedMap<String, Charset> acs = Charset.availableCharsets();`


          `System.out.println(acs);`


       `}`


    `}`


    ## 第 11 章：格式化器


    构成 NIO 的 `printf` 风格格式化功能的三个非异常类型是 `Formatter`、`Formattable` 和 `FormattableFlags`。你可以通过在格式说明符字符串中指定参数的基于
    1 的索引后跟美元符号字符来引用参数。例如，`1$` 引用第一个参数，`2$` 引用第二个参数。`%n` 格式说明符输出一个特定于操作系统的行分隔符。


    清单 A-10 展示了 第 11 章 中要求的 `FormatterDemo` 应用程序。


