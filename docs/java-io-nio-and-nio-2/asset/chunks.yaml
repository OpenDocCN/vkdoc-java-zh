  trans: '

    ### 字节顺序


    除布尔值（可能由一位或一个字节表示）外，非字节基本类型由多个字节组成：一个字符或短整型占用两个字节，一个 32 位整型或浮点值占用四个字节，一个长整型或双精度浮点值占用八个字节。这些多字节类型的每个值都存储在连续的内存位置序列中。然而，这些字节的顺序可能因操作系统而异。


    例如，考虑 32 位长整型 `0x10203040`。该值的四个字节在内存中（从低地址到高地址）可以存储为 `10, 20, 30, 40`；这种排列称为大端序（最高有效字节，即“大”端，存储在最低地址）。或者，这些字节可以存储为
    `40, 30, 20, 10`；这种排列称为小端序（最低有效字节，即“小”端，存储在最低地址）。


    Java 提供了 `java.nio.ByteOrder` 类来帮助你在向多字节缓冲区写入或从多字节缓冲区读取多字节值时处理字节顺序问题。`ByteOrder`
    声明了一个 `ByteOrder nativeOrder()` 方法，该方法以 `ByteOrder` 实例的形式返回操作系统的字节顺序。由于该实例是 `ByteOrder`
    的 `BIG_ENDIAN` 和 `LITTLE_ENDIAN` 常量之一，并且无法创建其他 `ByteOrder` 实例，因此你可以通过 `==` 或 `!=`
    运算符将 `nativeOrder()` 的返回值与这些常量之一进行比较。


    此外，每个多字节类（例如 `FloatBuffer`）都声明了一个 `ByteOrder order()` 方法，该方法返回缓冲区的字节顺序。此方法返回 `ByteOrder.BIG_ENDIAN`
    或 `ByteOrder.LITTLE_ENDIAN`。


    从 `order()` 返回的 `ByteOrder` 值可能根据缓冲区的创建方式而取不同的值。如果多字节缓冲区（例如浮点缓冲区）是通过分配或包装现有数组创建的，则缓冲区的字节顺序是底层操作系统的本机顺序。但是，如果多字节缓冲区是作为字节缓冲区的视图创建的，则视图缓冲区的字节顺序就是创建视图时字节缓冲区的字节顺序。视图缓冲区的字节顺序随后无法更改。


    在字节顺序方面，`ByteBuffer` 与多字节类不同。其默认字节顺序始终是大端序，即使底层操作系统的字节顺序是小端序也是如此。`ByteBuffer`
    默认使用大端序，因为 Java 的默认字节顺序也是大端序，这允许类文件和序列化对象在 Java 虚拟机（JVM）之间一致地存储数据。


    由于这个大端序默认值可能会影响小端序操作系统上的性能，`ByteBuffer` 还声明了一个 `ByteBuffer order(ByteOrder bo)`
    方法来更改字节缓冲区的字节顺序。


    尽管更改字节缓冲区（其中仅访问单字节数据项）的字节顺序看起来不寻常，但此方法很有用，因为 `ByteBuffer` 还声明了几个用于写入和读取多字节值的便捷方法（例如
    `ByteBuffer putInt(int value)` 和 `int getInt()`）。这些便捷方法根据字节缓冲区的当前字节顺序写入这些值。此外，你可以随后调用
    `ByteBuffer` 的 `LongBuffer asLongBuffer()` 或其他 `asxBuffer()` 方法来返回一个视图缓冲区，其顺序将反映字节缓冲区更改后的字节顺序。


    ### 直接字节缓冲区


    与多字节缓冲区不同，字节缓冲区可以作为基于通道的 I/O 的源和/或目标。这并不令人惊讶，因为操作系统在内存区域上执行 I/O，这些内存区域是连续的 8 位字节序列（而不是浮点值、32
    位整数等）。


    操作系统可以直接访问进程的地址空间。例如，操作系统可以直接访问 JVM 进程的地址空间，以基于字节数组执行数据传输操作。然而，JVM 可能不会连续存储字节数组，或者其垃圾收集器可能会将字节数组移动到另一个位置。由于这些限制，创建了直接字节缓冲区。


    直接字节缓冲区是一种与通道和本机代码交互以执行 I/O 的字节缓冲区。直接字节缓冲区尝试将字节元素存储在一个内存区域中，通道使用该内存区域通过本机代码执行直接（原始）访问，本机代码告诉操作系统直接排空或填充该内存区域。


    直接字节缓冲区是在 JVM 上执行 I/O 的最有效方式。尽管你也可以将非直接字节缓冲区传递给通道，但可能会出现性能问题，因为非直接字节缓冲区并不总是能够作为本机
    I/O 操作的目标。


    当传递一个非直接字节缓冲区时，通道可能必须创建一个临时的直接字节缓冲区，将非直接字节缓冲区的内容复制到直接字节缓冲区，在临时直接字节缓冲区上执行 I/O 操作，然后将临时直接字节缓冲区的内容复制回非直接字节缓冲区。然后，临时直接字节缓冲区将受到垃圾回收的影响。


    尽管对于 I/O 来说是最优的，但创建直接字节缓冲区的成本可能很高，因为操作系统需要分配 JVM 堆之外的内存，并且设置/拆除此内存可能比缓冲区位于堆内时花费更长的时间。


    在你的代码正常工作后，如果你想尝试性能优化，可以通过调用我之前讨论过的 `ByteBuffer` 的 `allocateDirect()` 方法轻松获取直接字节缓冲区。


    练习


    以下练习旨在测试你对第 6 章内容的理解：


    什么是缓冲区？   识别缓冲区的四个属性。   当你在由只读数组支持的缓冲区上调用 `Buffer` 的 `array()` 方法时会发生什么？   当你在缓冲区上调用
    `Buffer` 的 `flip()` 方法时会发生什么？   当你在未设置标记的缓冲区上调用 `Buffer` 的 `reset()` 方法时会发生什么？
      判断正误：缓冲区是线程安全的。   识别扩展抽象 `Buffer` 类的类。   如何创建字节缓冲区？   定义视图缓冲区。   如何创建视图缓冲区？
      如何创建只读视图缓冲区？   识别 `ByteBuffer` 用于在字节缓冲区中存储单个字节和从字节缓冲区中获取单个字节的方法。   什么原因会导致 `BufferOverflowException`
    或 `BufferUnderflowException` 发生？   执行 `buffer.flip();` 的等价操作是什么？   判断正误：调用 `flip()`
    两次会返回到原始状态。   `Buffer` 的 `clear()` 和 `reset()` 方法有什么区别？   `ByteBuffer` 的 `compact()`
    方法完成了什么？   `ByteOrder` 类的目的是什么？   定义直接字节缓冲区。   如何获取直接字节缓冲区？   为什么创建直接字节缓冲区的成本可能很高？
      创建一个 `ViewBufferDemo` 应用程序，该应用程序用值 `0`、`0x6e`、`0`、`0x69`、`0`、`0x6f` 填充字节缓冲区；创建一个字符视图缓冲区；并遍历该视图缓冲区，输出每个字符。

