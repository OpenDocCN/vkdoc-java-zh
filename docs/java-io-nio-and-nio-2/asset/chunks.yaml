- fmt: "# Exploring the File Tree-Walking API\n\nThe File Tree-Walking API provides\
    \ the ability to walk a file tree and visit all of its files (regular files, directories,\
    \ and links). As well as providing a private implementation that performs the\
    \ walk, this API provides a public interface for an application to use.\n\nThe\
    \ public interface is centered about the `java.nio.file.FileVisitor<T>` interface\
    \ type, which describes a visitor. At various points during a walk, the File Tree-Walking\
    \ implementation calls this interface’s methods to notify the visitor that a file\
    \ has been encountered and to provide other notifications:\n\n- `FileVisitResult\
    \ postVisitDirectory(T dir, IOException ioe)`\n- `FileVisitResult preVisitDirectory(T\
    \ dir, BasicFileAttributes attrs)`\n- `FileVisitResult visitFile(T file, BasicFileAttributes\
    \ attrs)`\n- `FileVisitResult visitFileFailed(T file, IOException ioe)`\n\nEach\
    \ method is called with various arguments that the application code can interrogate.\
    \ When the method is finished, it returns one of the following constants that\
    \ are declared in the `java.nio.file.FileVisitResult` enum type:\n\n- `CONTINUE`:\
    \ Continue the walk. When returned from the `preVisitDirectory()` method, it indicates\
    \ that the entries in the directory should also be visited.\n- `SKIP_SIBLINGS`:\
    \ Continue without visiting the siblings of this file. If returned from the `preVisitDirectory()`\
    \ method, the entries in the directory are also skipped and the `postVisitDirectory()`\
    \ method is not invoked.\n- `SKIP_SUBTREE`: Continue without visiting the entries\
    \ in this directory. This result is only meaningful when returned from the `preVisitDirectory()`\
    \ method; otherwise, this result type is the same as `CONTINUE`.\n- `TERMINATE`:\
    \ Terminate the walk.\n\n`FileVisitResult postVisitDirectory(T dir, IOException\
    \ ioe)` is invoked for a directory `dir` after the entries in the directory and\
    \ all of their descendants have been visited. It’s also invoked when iteration\
    \ of the directory completes prematurely (by `visitFile()` returning `SKIP_SIBLINGS`,\
    \ or by an I/O error when iterating over the directory). The value passed to `ioe`\
    \ is `null` when the iteration of the directory completes without an error; otherwise,\
    \ the value is the I/O exception that caused the iteration of the directory to\
    \ complete prematurely.\n\n`FileVisitResult preVisitDirectory(T dir, BasicFileAttributes\
    \ attrs)` is invoked for a directory `dir` before entries in the directory are\
    \ visited. If this method returns `CONTINUE`, entries in the directory are visited.\
    \ If this method returns `SKIP_SUBTREE` or `SKIP_SIBLINGS`, entries in the directory\
    \ (and any descendants) will not be visited. For `SKIP_SIBLINGS`, `postVisitDirectory()`\
    \ will not be called. The value passed to `attrs` identifies the directory’s basic\
    \ attributes.\n\n`FileVisitResult visitFile(T file, BasicFileAttributes attrs)`\
    \ is invoked for a nondirectory `file` in a directory. The value passed to `attrs`\
    \ identifies the file’s basic attributes.\n\n`FileVisitResult visitFileFailed(T\
    \ file, IOException ioe)` is invoked for a `file` that could not be visited because\
    \ its attributes could not be read, the `file` is a directory that could not be\
    \ opened, or for another reason. The value passed to `ioe` identifies the I/O\
    \ exception that prevented the `file` from being visited.\n\nEach method throws\
    \ `IOException` when an I/O error occurs.\n\nThe `java.nio.file.SimpleFileVisitor<T>`\
    \ class implements all four methods, offering the default behavior of visiting\
    \ all files and rethrowing I/O errors. Each method except for `visitFileFailed()`\
    \ returns `CONTINUE`; `visitFileFailed()` rethrows the I/O exception that prevented\
    \ the file from being visited.\n\n`SimpleFileVisitor` declares a `protected` constructor,\
    \ which means that you cannot instantiate this class directly. Instead, you must\
    \ subclass `SimpleFileVisitor`, which is demonstrated here:\n\n```java\nclass\
    \ DoNothingVisitor extends SimpleFileVisitor<Path>\n{\n\n}\n```\n\nAfter declaring\
    \ and implementing a visitor class, you can pass an instance of this class along\
    \ with a `Path` object that identifies the start of the walk to the following\
    \ method in the `Files` class:\n\n`Path walkFileTree(Path start, FileVisitor<?\
    \ super Path> visitor)`\n\nThis method initiates a depth-first walk of the entire\
    \ file tree rooted in `start`. It invokes the various methods in `visitor` as\
    \ necessary. If one of these methods throws `IOException`, `walkFileTree()` also\
    \ throws `IOException`. The following example demonstrates a walk that starts\
    \ in the current directory:\n\n`Files.walkFileTree(Paths.get(\".\"), new DoNothingVisitor());`\n\
    \nDon’t expect to see any output. Instead, you will need to codify the visitor\
    \ methods to generate output. This task is demonstrated in Listing 12-44.\n\n\
    **Listing 12-44.** Visiting a File Tree and Reporting Last Modified Times and\
    \ Sizes\n\n```java\nimport java.io.IOException;\nimport java.nio.file.Files;\n\
    import java.nio.file.FileVisitResult;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
    import java.nio.file.SimpleFileVisitor;\nimport java.nio.file.attribute.BasicFileAttributes;\n\
    \npublic class FTWDemo\n{\n   public static void main(String[] args) throws IOException\n\
    \   {\n      if (args.length != 1)\n      {\n         System.err.println(\"usage:\
    \ java FTWDemo path\");\n         return;\n      }\n\n      class DoNothingVisitor\
    \ extends SimpleFileVisitor<Path>\n      {\n         @Override\n         public\
    \ FileVisitResult postVisitDirectory(Path dir,\n                             \
    \                      IOException ioe)\n                                    \
    \               throws IOException\n         {\n            System.out.printf(\"\
    postVisitDirectory: %s %s%n%n\", dir, ioe);\n            return super.postVisitDirectory(dir,\
    \ ioe);\n         }\n\n         @Override\n         public FileVisitResult preVisitDirectory(Path\
    \ dir,\n                                                  BasicFileAttributes\
    \ attrs)\n                                                  throws IOException\n\
    \         {\n            System.out.printf(\"preVisitDirectory: %s%n\", dir);\n\
    \            System.out.printf(\"   lastModifiedTime: %s%n\",\n              \
    \                attrs.lastModifiedTime());\n            System.out.printf(\"\
    \   size: %d%n%n\", attrs.size());\n            return super.preVisitDirectory(dir,\
    \ attrs);\n         }\n\n         @Override\n         public FileVisitResult visitFile(Path\
    \ file,\n                                          BasicFileAttributes attrs)\n\
    \                                          throws IOException\n         {\n  \
    \          System.out.printf(\"visitFile: %s%n%n\", file);\n            System.out.printf(\"\
    \   lastModifiedTime: %s%n\",\n                              attrs.lastModifiedTime());\n\
    \            System.out.printf(\"   size: %d%n%n\", attrs.size());\n         \
    \   return super.visitFile(file, attrs);\n         }\n\n         @Override\n \
    \        public FileVisitResult visitFileFailed(Path file,\n                 \
    \                               IOException ioe)\n                           \
    \                     throws IOException\n         {\n            System.out.printf(\"\
    visitFileFailed: %s %s%n%n\", file, ioe);\n            return super.visitFileFailed(file,\
    \ ioe);\n         }\n      }\n   }\n}\n```"
  raw: '#### Exploring the File Tree-Walking API


    The File Tree-Walking API provides the ability to walk a file tree and visit all
    of its files (regular files, directories, and links). As well as providing a private
    implementation that performs the walk, this API provides a public interface for
    an application to use.


    The public interface is centered about the `java.nio.file.FileVisitor<T>` interface
    type, which describes a visitor. At various points during a walk, the File Tree-Walking
    implementation calls this interface’s methods to notify the visitor that a file
    has been encountered and to provide other notifications:


    *   `FileVisitResult postVisitDirectory(T dir, IOException ioe)`

    *   `FileVisitResult preVisitDirectory(T dir, BasicFileAttributes attrs)`

    *   `FileVisitResult visitFile(T file, BasicFileAttributes attrs)`

    *   [`FileVisitResult`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#enum%20in%20java.nio.file)
    `visitFileFailed(` [`T`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#type%20parameter%20in%20FileVisitor)
    `file,` [`IOException`](https://docs.oracle.com/javase/8/docs/api/java/io/IOException.html#class%20in%20java.io)
    `ioe)`


    Each method is called with various arguments that the application code can interrogate.
    When the method is finished, it returns one of the following constants that are
    declared in the `java.nio.file.FileVisitResult` enum type:


    *   `CONTINUE`: Continue the walk. When returned from the `preVisitDirectory()`
    method, it indicates that the entries in the directory should also be visited.

    *   `SKIP_` `SIBLINGS`: Continue without visiting the siblings of this file. If
    returned from the [`preVisitDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#preVisitDirectory-T-java.nio.file.attribute.BasicFileAttributes-)
    `()` method, the entries in the directory are also skipped and the [`postVisitDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#postVisitDirectory-T-java.io.IOException-)
    `()` method is not invoked.

    *   `SKIP_` `SUBTREE`: Continue without visiting the entries in this directory.
    This result is only meaningful when returned from the [`preVisitDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#preVisitDirectory-T-java.nio.file.attribute.BasicFileAttributes-)
    `()` method; otherwise, this result type is the same as [`CONTINUE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#CONTINUE)
    .

    *   `TERMINATE`: Terminate the walk.


    `FileVisitResult` `postVisitDirectory` `(T dir, IOException ioe)` is invoked for
    a directory `dir` after the entries in the directory and all of their descendants
    have been visited. It’s also invoked when iteration of the directory completes
    prematurely (by [`visitFile`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#visitFile-T-java.nio.file.attribute.BasicFileAttributes-)
    `()` returning [`SKIP_SIBLINGS`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#SKIP_SIBLINGS)
    , or by an I/O error when iterating over the directory). The value passed to `ioe`
    is `null` when the iteration of the directory completes without an error; otherwise,
    the value is the I/O exception that caused the iteration of the directory to complete
    prematurely.


    `FileVisitResult` `preVisitDirectory` `(T dir, BasicFileAttributes attrs)` is
    invoked for a directory `dir` before entries in the directory are visited. If
    this method returns `CONTINUE`, entries in the directory are visited. If this
    method returns `SKIP_SUBTREE` or `SKIP_SIBLINGS`, entries in the directory (and
    any descendants) will not be visited. For `SKIP_SIBLINGS`, `postVisitDirectory()`
    will not be called. The value passed to `attrs` identifies the directory’s basic
    attributes.


    `FileVisitResult` `visitFile` `(T file, BasicFileAttributes attrs)` is invoked
    for a nondirectory `file` in a directory. The value passed to `attrs` identifies
    the file’s basic attributes.


    [`FileVisitResult`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitResult.html#enum%20in%20java.nio.file)
    `visitFileFailed` `(` [`T`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#type%20parameter%20in%20FileVisitor)
    `file,` [`IOException`](https://docs.oracle.com/javase/8/docs/api/java/io/IOException.html#class%20in%20java.io)
    `ioe)` is invoked for a `file` that could not be visited because its attributes
    could not be read, the `file` is a directory that could not be opened, or for
    another reason. The value passed to `ioe` identifies the I/O exception that prevented
    the `file` from being visited.


    Each method throws `IOException` when an I/O error occurs.


    The `java.nio.file.SimpleFileVisitor<T>` class implements all four methods, offering
    the default behavior of visiting all files and rethrowing I/O errors. Each method
    except for `visitFileFailed()` returns `CONTINUE`; `visitFileFailed()` rethrows
    the I/O exception that prevented the file from being visited.


    `SimpleFileVisitor` declares a `protected` constructor, which means that you cannot
    instantiate this class directly. Instead, you must subclass `SimpleFileVisitor`,
    which is demonstrated here:


    `class DoNothingVisitor extends SimpleFileVisitor<Path>`


    `{`


    `}`


    After declaring and implementing a visitor class, you can pass an instance of
    this class along with a `Path` object that identifies the start of the walk to
    the following method in the `Files` class:


    `Path walkFileTree(Path start, FileVisitor<? super Path> visitor)`


    This method initiates a depth-first walk of the entire file tree rooted in `start`.
    It invokes the various methods in `visitor` as necessary. If one of these methods
    throws `IOException`, `walkFileTree()` also throws `IOException`. The following
    example demonstrates a walk that starts in the current directory:


    `Files.walkFileTree(Paths.get("."), new DoNothingVisitor());`


    Don’t expect to see any output. Instead, you will need to codify the visitor methods
    to generate output. This task is demonstrated in Listing [12-44](#A978-1-4842-1565-4_12_Chapter.html#FPar63).


    Listing 12-44\. Visiting a File Tree and Reporting Last Modified Times and Sizes


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.FileVisitResult;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.SimpleFileVisitor;`


    `import java.nio.file.attribute.BasicFileAttributes;`


    `public class FTWDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java FTWDemo path");`


    `return;`


    `}`


    `class DoNothingVisitor extends SimpleFileVisitor<Path>`


    `{`


    `@Override`


    `public FileVisitResult postVisitDirectory(Path dir,`


    `IOException ioe)`


    `throws IOException`


    `{`


    `System.out.printf("postVisitDirectory: %s %s%n%n", dir, ioe);`


    `return super.postVisitDirectory(dir, ioe);`


    `}`


    `@Override`


    `public FileVisitResult preVisitDirectory(Path dir,`


    `BasicFileAttributes attrs)`


    `throws IOException`


    `{`


    `System.out.printf("preVisitDirectory: %s%n", dir);`


    `System.out.printf("   lastModifiedTime: %s%n",`


    `attrs.lastModifiedTime());`


    `System.out.printf("   size: %d%n%n", attrs.size());`


    `return super.preVisitDirectory(dir, attrs);`


    `}`


    `@Override`


    `public FileVisitResult visitFile(Path file,`


    `BasicFileAttributes attrs)`


    `throws IOException`


    `{`


    `System.out.printf("visitFile: %s%n%n", file);`


    `System.out.printf("   lastModifiedTime: %s%n",`


    `attrs.lastModifiedTime());`


    `System.out.printf("   size: %d%n%n", attrs.size());`


    `return super.visitFile(file, attrs);`


    `}`


    `@Override`


    `public FileVisitResult visitFileFailed(Path file,`


    `IOException ioe)`


    `throws IOException`


    `{`


    `System.out.printf("visitFileFailed: %s %s%n%n", file, ioe);`


    `return super.visitFileFailed(file, ioe);`


    `}`


    `}`'
