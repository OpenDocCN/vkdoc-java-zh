    `path1.compareTo(path2): -2`


    `path1.startsWith("x"): false`


    `path1.startsWith(Paths.get("a"): true`


    `path2.endsWith("d"): false`


    `path2.endsWith(Paths.get("c", "d"): true`


    `path2.toUri(): file:///C:/prj/books/io/ch12/code/PathDemo/v5/a/b/c/d`


    `path3: .`


    `path3.toRealPath(): C:\prj\books\io\ch12\code\PathDemo\v5`


    ## Performing File System Tasks with Files


    For the most part, you could work with `FileSystem`, `FileSystems`, and `FileSystemProvider`
    to perform various file system tasks, such as copy or move a file. However, there
    is an easier way to perform these tasks: invoke the `java.nio.file.Files` utility
    class’s `static` methods.


    Note


    `Files` doesn’t support path-matching and directory-watching tasks. However, `Files`
    exclusively supports walking the file tree and visiting its files.'
