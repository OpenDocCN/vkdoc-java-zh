    directory symbol `/`, and continues with directory name `x`, separator character
    `/`, and file or directory name `y`. (It also works on Windows, which assumes
    this path begins at the root directory on the current drive.)


    Note


    An operating system-dependent separator character (such as the Windows backslash
    [`\`] character) appears between a path’s consecutive names.


    The second line assumes a Windows operating system, starts the path with drive
    specifier `C:`, and continues with root directory symbol `\`, directory name `temp`,
    separator character `\`, and file name `x.dat` (although `x.dat` might refer to
    a directory). (You could also use forward slashes [`/`] on Windows.)


    Caution


    Always double backslash characters that appear in a string literal, especially
    when specifying a path; otherwise, you run the risk of introducing bugs or receiving
    compiler error messages. For example, I doubled the backslash characters in the
    second statement to denote a backslash and not a tab (`\t`) and to avoid a compiler
    error message (`\x` is illegal).


    Each statement’s path is absolute, which is a path that starts with the root directory
    symbol; no other information is required to locate the file/directory that it
    denotes. In contrast, a relative path doesn’t start with the root directory symbol;
    it’s interpreted via information taken from another path.


    Note


    The `java.io` package’s classes default to resolving relative paths against the
    current user (also known as working) directory, which is identified by the system
    property `user.dir` and which is typically the directory in which the JVM was
    launched. (You obtain a system property value by calling the `java.lang.System`
    class’s `getProperty()` method.)


    `File` instances contain abstract representations of file and directory paths
    (these files or directories may or may not exist in their file systems) by storing
    abstract paths, which offer operating system-independent views of hierarchical
    paths. In contrast, user interfaces and operating systems use operating system-dependent
    path strings to name files and directories.


    An abstract path consists of an optional operating system-dependent prefix string,
    such as a disk drive specifier, “/” for the Unix/Linux root directory, or “\\”
    for a Windows Universal Naming Convention (UNC) path, and a sequence of zero or
    more string names. The first name in an abstract path may be a directory name
    or, in the case of Windows UNC paths, a hostname. Each subsequent name denotes
    a directory; the last name may denote a directory or a file. The empty abstract
    path has no prefix and an empty name sequence.


    The conversion of a path string to or from an abstract path is inherently operating
    system-dependent. When a path string is converted into an abstract path, the names
    within this string may be separated by the default name-separator character or
    by any other name-separator character that is supported by the underlying operating
    system. When an abstract path is converted into a path string, each name is separated
    from the next by a single copy of the default name-separator character.


    Note


    The default name-separator character is defined by the system property `file.separator`
    and is made available in `File`’s `public static` [`separator`](http://docs.oracle.com/javase/7/docs/api/java/io/File.html#separator)
    and [`separatorChar`](http://docs.oracle.com/javase/7/docs/api/java/io/File.html#separatorChar)
    fields—the first field stores the character in a `java.lang.String` instance and
    the second field stores it as a `char` value.


    `File` offers additional constructors for instantiating this class. For example,
    the following constructors merge parent and child paths into combined paths that
    are stored in `File` objects:


    *   `File(String parent, String child)` creates a new `File` instance from a `parent`
    path string and a `child` path string.

    *   `File(File parent, String child)` creates a new `File` instance from a `parent`
    path `File` instance and a `child` path string.


    Each constructor’s `parent` parameter is passed a parent path, a path that consists
    of all path components except for the last name, which is specified by `child`.
    The following statement demonstrates this concept via the first constructor:


    `File file3 = new File("prj/books/", "io");`


    The constructor merges the parent path `prj/books/` with the child path `io` into
    the `prj/books/io` path. (If I had specified `prj/books` as the parent path, the
    constructor would have added the separator character after `books`.)


    Tip


    Because `File(String path)`, `File(String parent, String child)`, and `File(File
    parent, String child)` don’t detect invalid path arguments (apart from throwing
    a `java.lang.NullPointerException` when `path` or `child` is `null`), you must
    be careful when specifying paths. You should strive to only specify paths that
    are valid for all operating systems on which the application will run. For example,
    instead of hard-coding a drive specifier (such as `C:`) in a path, use a root
    returned from `listRoots()`, which I discuss later. Even better, keep your paths
    relative to the current user/working directory (returned from the `user.dir` system
    property).'
  trans: '

    ## 构造 File 实例


    `File` 类的实例包含文件或目录路径的抽象表示（一种定位和标识文件系统对象的紧凑映射）。要创建 `File` 实例，可以调用诸如 `File(String
    path)` 之类的构造方法，该方法会创建一个存储 `path` 字符串的 `File` 实例：


    `File file1 = new File("/x/y");`


    `File file2 = new File("C:\\temp\\x.dat");`


    第一行假设在 Unix/Linux 操作系统下，路径以根目录符号 `/` 开头，后跟目录名 `x`、分隔符 `/` 以及文件或目录名 `y`。（该路径在 Windows
    系统下也能工作，Windows 会假定此路径从当前驱动器的根目录开始。）


    注意


    操作系统相关的分隔符（例如 Windows 的反斜杠 [`\`] 字符）会出现在路径的连续名称之间。


    第二行假设在 Windows 操作系统下，路径以驱动器标识符 `C:` 开头，后跟根目录符号 `\`、目录名 `temp`、分隔符 `\` 以及文件名 `x.dat`（尽管
    `x.dat` 也可能指向一个目录）。（在 Windows 上也可以使用正斜杠 [`/`]。）


    警告


    字符串字面量中出现的反斜杠字符务必使用双反斜杠，尤其是在指定路径时；否则，你可能会引入错误或收到编译器错误消息。例如，我在第二条语句中使用了双反斜杠，以表示反斜杠本身而非制表符（`\t`），并避免编译器报错（`\x`
    是非法的）。


    每条语句中的路径都是绝对路径，即从根目录符号开始的路径；无需其他信息即可定位其所指的文件或目录。相比之下，相对路径不以根目录符号开头；它需要通过从其他路径获取的信息来解释。


    注意


    `java.io` 包中的类默认根据当前用户目录（也称为工作目录）来解析相对路径，该目录由系统属性 `user.dir` 标识，通常是启动 JVM 的目录。（你可以通过调用
    `java.lang.System` 类的 `getProperty()` 方法来获取系统属性值。）


    `File` 实例通过存储抽象路径来包含文件和目录路径的抽象表示（这些文件或目录在文件系统中可能存在也可能不存在），抽象路径提供了与操作系统无关的层次化路径视图。相比之下，用户界面和操作系统则使用与操作系统相关的路径字符串来命名文件和目录。


    抽象路径由一个可选的、与操作系统相关的前缀字符串（例如磁盘驱动器标识符、Unix/Linux 根目录的“/”，或 Windows 通用命名约定（UNC）路径的“\\”）以及零个或多个字符串名称序列组成。抽象路径中的第一个名称可以是目录名，或者对于
    Windows UNC 路径而言，可以是主机名。后续每个名称都表示一个目录；最后一个名称可以表示目录或文件。空的抽象路径没有前缀，也没有名称序列。


    路径字符串与抽象路径之间的相互转换本质上是与操作系统相关的。当路径字符串转换为抽象路径时，该字符串中的名称可以由默认的名称分隔符或底层操作系统支持的任何其他名称分隔符分隔。当抽象路径转换为路径字符串时，每个名称之间由单个默认名称分隔符分隔。


    注意


    默认的名称分隔符由系统属性 `file.separator` 定义，并可通过 `File` 类的 `public static` 字段 [`separator`](http://docs.oracle.com/javase/7/docs/api/java/io/File.html#separator)
    和 [`separatorChar`](http://docs.oracle.com/javase/7/docs/api/java/io/File.html#separatorChar)
    获取——第一个字段将字符存储在 `java.lang.String` 实例中，第二个字段将其存储为 `char` 值。


    `File` 提供了其他构造方法来实例化该类。例如，以下构造方法将父路径和子路径合并为组合路径，并存储在 `File` 对象中：


    *   `File(String parent, String child)` 根据父路径字符串和子路径字符串创建一个新的 `File` 实例。

    *   `File(File parent, String child)` 根据父路径 `File` 实例和子路径字符串创建一个新的 `File` 实例。


    每个构造方法的 `parent` 参数接收一个父路径，该路径包含除最后一个名称（由 `child` 指定）之外的所有路径组件。以下语句通过第一个构造方法演示了这一概念：


    `File file3 = new File("prj/books/", "io");`


    该构造方法将父路径 `prj/books/` 与子路径 `io` 合并为路径 `prj/books/io`。（如果我将父路径指定为 `prj/books`，构造方法会在
    `books` 之后添加分隔符。）


    提示


    由于 `File(String path)`、`File(String parent, String child)` 和 `File(File parent,
    String child)` 不会检测无效的路径参数（除了当 `path` 或 `child` 为 `null` 时会抛出 `java.lang.NullPointerException`），因此在指定路径时必须格外小心。你应该尽量只指定那些在应用程序将要运行的所有操作系统上都有效的路径。例如，不要在路径中硬编码驱动器标识符（如
    `C:`），而应使用 `listRoots()` 返回的根路径，我稍后会讨论这个方法。更好的做法是，保持路径相对于当前用户/工作目录（由 `user.dir`
    系统属性返回）。

    '
- fmt: "# Learning About Stored Abstract Paths\n\nAfter obtaining a `File` object,\
    \ you can interrogate it to learn about its stored abstract path by calling the\
    \ methods described in Table [2-1](#A978-1-4842-1565-4_2_Chapter.html#Tab1).\n\
    \nTable 2-1. `File` Methods for Learning About a Stored Abstract Path\n\n| Method\
    \ | Description |\n| --- | --- |\n| `File getAbsoluteFile()` | Return the absolute\
    \ form of this `File` object’s abstract path. This method is equivalent to `new\
    \ File(this.getAbsolutePath())`. |\n| `String getAbsolutePath()` | Return the\
    \ absolute path string of this `File` object’s abstract path. When it’s already\
    \ absolute, the path string is returned as if by calling `getPath()`. When it’s\
    \ the empty abstract path, the path string of the current user directory (identified\
    \ via `user.dir`) is returned. Otherwise, the abstract path is resolved in an\
    \ operating system-dependent manner. On Unix/Linux operating systems, a relative\
    \ path is made absolute by resolving it against the current user directory. On\
    \ Windows operating systems, the path is made absolute by resolving it against\
    \ the current directory of the drive named by the path, or the current user directory\
    \ when there is no drive. |\n| `File getCanonicalFile()` | Return the canonical\
    \ (simplest possible, absolute and unique) form of this `File` object’s abstract\
    \ path. This method throws `java.io.IOException` when an I/O error occurs (creating\
    \ the canonical path may require file system queries); it equates to `new File(this.getCanonicalPath())`.\
    \ |\n| `String getCanonicalPath()` | Return the canonical path string of this\
    \ `File` object’s abstract path. This method first converts this path to the absolute\
    \ form when necessary, as if by invoking `getAbsolutePath()`, and then maps it\
    \ to its unique form in an operating system-dependent way. Doing so typically\
    \ involves removing redundant names such as “`.`” and “`..`” from the path, resolving\
    \ symbolic links (on Unix/Linux operating systems), and converting drive letters\
    \ to a standard case (on Windows operating systems). This method throws `IOException`\
    \ when an I/O error occurs (creating the canonical path may require file system\
    \ queries). |\n| `String getName()` | Return the file name or directory name denoted\
    \ by this `File` object’s abstract path. This name is the last in a path’s name\
    \ sequence. The empty string is returned when the path’s name sequence is empty.\
    \ |\n| `String getParent()` | Return the parent path string of this `File` object’s\
    \ path, or return null when this path doesn’t name a parent directory. |\n| `File\
    \ getParentFile()` | Return a `File` object storing this `File` object’s abstract\
    \ path’s parent abstract path; return null when the parent path isn’t a directory.\
    \ |\n| `String getPath()` | Convert this `File` object’s abstract path into a\
    \ path string where the names in the sequence are separated by the character stored\
    \ in `File`’s `separator` field. Return the resulting path string. |\n| `boolean\
    \ isAbsolute()` | Return true when this `File` object’s abstract path is absolute;\
    \ otherwise, return false when it’s relative. The definition of absolute path\
    \ is system dependent. For Unix/Linux operating systems, a path is absolute when\
    \ its prefix is “`/`”. For Windows operating systems, a path is absolute when\
    \ its prefix is a drive specifier followed by “`\\`” or when its prefix is “`\\\
    \\`”. |\n| `String toString()` | A synonym for `getPath()`. |\n\nTable [2-1](#A978-1-4842-1565-4_2_Chapter.html#Tab1)\
    \ refers to `IOException`, which is the common exception superclass for those\
    \ exception classes that describe various kinds of I/O errors such as `java.io.FileNotFoundException`.\n\
    \nListing [2-1](#A978-1-4842-1565-4_2_Chapter.html#FPar6) instantiates `File`\
    \ with its path command-line argument and calls some of the `File` methods described\
    \ in Table [2-1](#A978-1-4842-1565-4_2_Chapter.html#Tab1) to learn about this\
    \ path.\n\nListing 2-1. Obtaining Abstract Path Information\n\n```\nimport java.io.File;\n\
