    We can improve on this output by having `Employee` implement `Formattable`. For
    example, we can display an equivalent name for the French locale. Also, we can
    display just the employee number when the precision is less than 8\. Listing [11-5](#A978-1-4842-1565-4_11_Chapter.html#FPar8)
    presents an improved `Employee` class.


    Listing 11-5\. Implementing `Formattable`


    `import java.util.Formattable;`


    `import java.util.FormattableFlags;`


    `import java.util.Formatter;`


    `import java.util.Locale;`


    `public class Employee implements Formattable`


    `{`


    `private String name;`


    `private int empno;`


    `public Employee(String name, int empno)`


    `{`


    `this.name = name;`


    `this.empno = empno;`


    `}`


    `@Override`


    `public void formatTo(Formatter formatter, int flags, int width,`


    `int precision)`


    `{`


    `StringBuilder sb = new StringBuilder();`


    `String output = this.name;`


    `if (formatter.locale().equals(Locale.FRENCH) &&`


    `name.equals("John Doe"))`


    `output = "Jean Dupont";`


    `output += ": " + empno;`


    `if (((flags & FormattableFlags.UPPERCASE) ==`


    `FormattableFlags.UPPERCASE))`


    `output = output.toUpperCase();`


    `boolean alternate = (flags & FormattableFlags.ALTERNATE) ==`


    `FormattableFlags.ALTERNATE;`


    `alternate |= (precision >= 0 && precision < 8);`


    `if (alternate)`


    `output = "" + empno;`


    `if (precision == -1 || output.length() <= precision)`


    `sb.append(output);`


    `else`


    `sb.append(output.substring(0, precision - 1)).append(’*’);`


    `int len = sb.length();`


    `if (len < width)`


    `{`


    `boolean leftJustified = (flags & FormattableFlags.LEFT_JUSTIFY)`


    `== FormattableFlags.LEFT_JUSTIFY;`


    `for (int i = 0; i < width - len; i++)`


    `if (leftJustified)`


    `sb.append(’ ’);`


    `else`


    `sb.insert(0, ’ ’);`


    `}`


    `formatter.format(sb.toString());`


    `}`


    `@Override`


    `public String toString()`


    `{`


    `return name + ": " + empno;`


    `}`


    `}`


    `formatTo(Formatter, int, int, int)` first creates a string builder to store the
    output string.


    Next, the output string is defaulted to the employee’s name. If the locale is
    French and the name equals John Doe, the output string is changed to Jean Dupont.
    A colon and the employee number are appended to this string. If the uppercase
    flag was specified, the output string is uppercased.


    Continuing, if the alternate flag was specified or the precision is between 0
    and 7 inclusive, the output string is shortened to the employee number.


    If the precision equals `-1` (unlimited) or the output string length doesn’t exceed
    the precision, the output string is appended to the string buffer. Otherwise,
    no more than the left-most precision `-1` characters followed by `*` (which signifies
    a truncated string) are appended.


    At this point, if the number of characters in the string buffer is less than the
    specified width, the string buffer contents are either left- or right-justified.


    The work is now finished so the final task is to convert the string builder to
    a string and then pass it to the formatter’s `format()` method.


