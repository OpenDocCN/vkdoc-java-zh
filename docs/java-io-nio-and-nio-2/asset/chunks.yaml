  trans: "\n缓冲区是一个用于存储固定数量数据的对象，这些数据将被发送到 I/O 服务（执行输入/输出的操作系统组件）或从该服务接收。它位于应用程序与通道之间，通道负责将缓冲的数据写入服务，或从服务读取数据并将其存入缓冲区。\
    \  \n缓冲区的四个属性是容量、限制、位置和标记。  \n当你在由只读数组支持的缓冲区上调用 `Buffer` 的 `array()` 方法时，该方法会抛出\
    \ `ReadOnlyBufferException`。  \n当你在缓冲区上调用 `Buffer` 的 `flip()` 方法时，限制被设置为当前位置，然后位置被设置为零。如果定义了标记，它会被丢弃。此时缓冲区已准备好被清空。\
    \  \n当你在未设置标记的缓冲区上调用 `Buffer` 的 `reset()` 方法时，该方法会抛出 `InvalidMarkException`。 \
    \ \n答案是 false：缓冲区不是线程安全的。  \n扩展抽象 `Buffer` 类的抽象类包括 `ByteBuffer`、`CharBuffer`、`DoubleBuffer`、`FloatBuffer`、`IntBuffer`、`LongBuffer`\
    \ 和 `ShortBuffer`。此外，`ByteBuffer` 被抽象类 `MappedByteBuffer` 进一步子类化。  \n你可以通过调用 `allocate()`、`allocateDirect()`\
    \ 或 `wrap()` 类方法来创建字节缓冲区。  \n视图缓冲区是管理另一个缓冲区数据的缓冲区。  \n视图缓冲区通过调用 `Buffer` 子类的 `duplicate()`\
    \ 方法创建。  \n你可以通过调用 `Buffer` 子类的方法（例如 `ByteBuffer asReadOnlyBuffer()` 或 `CharBuffer\
    \ asReadOnlyBuffer()`）来创建只读视图缓冲区。  \n`ByteBuffer` 用于在字节缓冲区中存储单个字节的方法有 `ByteBuffer\
    \ put(int index, byte b)` 和 `ByteBuffer put(byte b)`。`ByteBuffer` 用于从字节缓冲区中获取单个字节的方法有\
    \ `byte get(int index)` 和 `byte get()`。  \n当当前位置大于或等于限制时，尝试使用相对 `put()` 方法或相对\
    \ `get()` 方法会导致 `BufferOverflowException` 或 `BufferUnderflowException` 异常。  \n\
    执行 `buffer.flip();` 等同于执行 `buffer.limit(buffer.position()).position(0);`。  \n\
    答案是 false：连续调用两次 `flip()` 不会让你回到原始状态。相反，缓冲区的大小会变为零。  \n`Buffer` 的 `clear()` 和\
    \ `reset()` 方法的区别如下：`clear()` 方法将缓冲区标记为空，而 `reset()` 将缓冲区的当前位置更改为先前设置的标记，如果没有先前设置的标记，则抛出\
    \ `InvalidMarkException`。  \n`ByteBuffer` 的 `compact()` 方法通过将当前位置与限制之间的所有字节复制到缓冲区的开头来压缩缓冲区。索引\
    \ `p = position()` 处的字节被复制到索引 0，索引 `p + 1` 处的字节被复制到索引 1，依此类推，直到索引 `limit() - 1`\
    \ 处的字节被复制到索引 `n = limit() - 1 - p`。然后，缓冲区的当前位置被设置为 `n + 1`，其限制被设置为容量。如果定义了标记，它会被丢弃。\
    \  \n`ByteOrder` 类的目的是帮助你在向多字节缓冲区写入或从多字节缓冲区读取多字节值时处理字节顺序问题。  \n直接字节缓冲区是一种与通道和本地代码交互以执行\
    \ I/O 的字节缓冲区。直接字节缓冲区尝试将字节元素存储在一个内存区域中，通道通过本地代码使用该区域执行直接（原始）访问，本地代码告诉操作系统直接清空或填充该内存区域。\
    \  \n你可以通过调用 `ByteBuffer` 的 `allocateDirect()` 方法来获取直接字节缓冲区。  \n创建直接字节缓冲区的开销可能很高，因为操作系统需要分配\
    \ JVM 堆之外的内存，并且设置/拆除此内存可能比缓冲区位于堆内时花费更长时间。  \n清单 A-6 展示了第 6 章中要求的 `ViewBufferDemo`\
    \ 应用程序。  \n清单 A-6\\. 将字节序列视为字符序列\n\n`import java.nio.ByteBuffer;`\n\n`import java.nio.CharBuffer;`\n\
    \n`public class ViewBufferDemo`\n\n`{`\n\n`public static void main(String[] args)`\n\
    \n`{`\n\n`ByteBuffer bb = ByteBuffer.allocate(6);`\n\n`byte zero = 0;`\n\n`bb.put(zero).put((byte)\
    \ 0x6e).put(zero).put((byte) 0x69)`\n\n`.put(zero).put((byte) 0x6f);`\n\n`bb.rewind();`\n\
    \n`CharBuffer cb = bb.asCharBuffer();`\n\n`for (int i = 0; i < cb.limit(); i++)`\n\
    \n`System.out.print(cb.get());`\n\n`}`\n\n`}`\n\n## 第 7 章: 通道\n"
- fmt: "# 通道与选择器\n\n## 通道\n\n通道是一个对象，表示与硬件设备、文件、网络套接字、应用程序组件或其他能够执行写入、读取和其他 I/O 操作的实体的开放连接。通道在字节缓冲区和基于操作系统的\
    \ I/O 服务源或目标之间高效地传输数据。\n\n`Channel`接口提供的功能包括关闭通道（通过`close()`方法）以及确定通道是否打开（通过`isOpen()`方法）。\n\
    \n直接扩展`Channel`的三个接口是`WritableByteChannel`、`ReadableByteChannel`和`InterruptibleChannel`。\n\
    \n答案是 true：实现了`InterruptibleChannel`的通道是异步可关闭的。\n\n获取通道的两种方式是：调用`Channels`类的方法（例如`WritableByteChannel\
    \ newChannel(OutputStream outputStream)`），以及调用经典 I/O 类上的通道方法（例如`RandomAccessFile`的`FileChannel\
    \ getChannel()`方法）。\n\n分散/聚集 I/O 是跨多个缓冲区执行单个 I/O 操作的能力。提供了`ScatteringByteChannel`和`GatheringByteChannel`接口来实现分散/聚集\
    \ I/O。\n\n文件通道是到底层文件的通道。答案是 false：文件通道支持分散/聚集 I/O。\n\n排他锁授予单个写入进程对文件区域的访问权限；它禁止同时对该区域应用其他文件锁。共享锁授予多个读取进程之一对同一文件区域的访问权限；它不禁止其他共享锁，但禁止同时对该区域应用排他锁。\n\
    \n`FileChannel`的`lock()`和`tryLock()`方法之间的根本区别在于，`lock()`方法可能会阻塞，而`tryLock()`方法永远不会阻塞。\n\
    \n当已经持有与此锁请求重叠的锁，或者另一个线程正在等待获取将与此请求重叠的锁时，`FileLock lock()`方法会抛出`OverlappingFileLockException`。\n\
    \n为确保始终释放已获取的文件锁而应采用的模式如下：\n\n```\nFileLock lock = fileChannel.lock(); // Assume\
    \ fileChannel exists.\ntry\n{\n   // interact with the file channel\n}\ncatch\
    \ (IOException ioe)\n{\n   // handle the exception\n}\nfinally\n{\n   lock.release();\n\
    }\n```\n\n`FileChannel`提供了`MappedByteBuffer map(FileChannel.MapMode mode, long\
    \ position, long size)`方法，用于将文件区域映射到内存中。\n\n三种文件映射模式是只读、读写和私有。它们由`FileChannel.MapMode`枚举类型声明的`READ_ONLY`、`READ_WRITE`和`PRIVATE`常量描述。\n\
    \n私有文件映射模式对应于写时复制。对结果缓冲区所做的更改不会传播到文件，也不会对其他映射了同一文件的程序可见。相反，更改会导致创建缓冲区修改部分的私有副本。当缓冲区被垃圾回收时，这些更改将丢失。\n\
    \n优化执行批量传输这一常见实践的`FileChannel`方法是`transferFrom()`和`transferTo()`。\n\n答案是 true：套接字通道是可选择的，并且可以在非阻塞模式下运行。\n\
    \n描述套接字通道的三个类是`ServerSocketChannel`、`SocketChannel`和`DatagramChannel`。\n\n答案是\
    \ false：数据报通道是线程安全的。\n\n套接字通道支持非阻塞模式，因为从 Java 套接字类创建的套接字的阻塞特性是面向网络的 Java 应用程序可扩展性的严重限制。\n\
    \n您可以通过调用套接字通道的`socket()`方法来获取其关联的套接字。\n\n您可以通过调用`ServerSocketChannel`的`open()`类方法来获取服务器套接字通道。\n\
    \n清单 [A-7](#A978-1-4842-1565-4_15_Chapter.html#FPar7) 展示了 [第 7 章](#A978-1-4842-1565-4_7_Chapter.html)\
    \ 中要求的`Copy`应用程序。\n\n**清单 A-7. 通过字节缓冲区和文件通道复制文件**\n\n```\nimport java.io.FileInputStream;\n\
    import java.io.FileNotFoundException;\nimport java.io.FileOutputStream;\nimport\
    \ java.io.IOException;\nimport java.nio.ByteBuffer;\nimport java.nio.channels.FileChannel;\n\
    \npublic class Copy\n{\n   public static void main(String[] args)\n   {\n    \
    \  if (args.length != 2)\n      {\n         System.err.println(\"usage: java Copy\
    \ srcfile dstfile\");\n         return;\n      }\n\n      try (FileInputStream\
    \ fis = new FileInputStream(args[0]);\n           FileChannel fcSrc = fis.getChannel();\n\
    \           FileOutputStream fos = new FileOutputStream(args[1]);\n          \
    \ FileChannel fcDest = fos.getChannel())\n      {\n         ByteBuffer buffer\
    \ = ByteBuffer.allocateDirect(2048);\n         while ((fcSrc.read(buffer)) !=\
    \ -1)\n         {\n            buffer.flip();\n            while (buffer.hasRemaining())\n\
    \               fcDest.write(buffer);\n            buffer.clear();\n         }\n\
    \      }\n      catch (FileNotFoundException fnfe)\n      {\n         System.err.println(args[0]\
    \ +\n            \" could not be opened for input, or \" +\n            args[1]\
    \ +\n            \" could not be created for output\");\n      }\n      catch\
    \ (IOException ioe)\n      {\n         System.err.println(\"I/O error: \" + ioe.getMessage());\n\
    \      }\n   }\n}\n```\n\n## [第 8 章](#A978-1-4842-1565-4_8_Chapter.html)：选择器\n\
    \n选择器是从抽象`Selector`类的子类创建的对象。它维护一组通道，并检查这些通道以确定哪些通道已准备好进行读取、写入、完成连接序列、接受另一个连接或这些任务的某种组合。实际工作通过\
    \ POSIX `select()`或类似的系统调用委托给操作系统。\n\n支持选择器的三种主要类型是`SelectableChannel`、`SelectionKey`和`Selector`。\n\
    \n答案是 false：文件通道不能与选择器一起使用。只有实现了`SelectableChannel`的通道才能与选择器一起使用。`FileChannel`没有实现`SelectableChannel`。\n\
    \n`SelectionKey`提供了`boolean isReadable()`方法，作为表达式`key.readyOps() & OP_READ !=\
    \ 0`的便捷替代方案。"
  raw: 'A channel is an object that represents an open connection to a hardware device,
    a file, a network socket, an application component, or another entity that’s capable
    of performing write, read, and other I/O operations. Channels efficiently transfer
    data between byte buffers and operating system-based I/O service sources or destinations.
      The capabilities that the `Channel` interface provides are closing a channel
    (via the `close()` method) and determining whether or not a channel is open (via
    the `isOpen()` method).   The three interfaces that directly extend `Channel`
    are `WritableByteChannel`, `ReadableByteChannel`, and `InterruptibleChannel`.
      The answer is true: a channel that implements `InterruptibleChannel` is asynchronously
    closeable.   The two ways to obtain a channel are to invoke a `Channels` class
    method, such as `WritableByteChannel newChannel(OutputStream outputStream)`, and
    to invoke a channel method on a classic I/O class, such as `RandomAccessFile`
    ’s `FileChannel getChannel()` method.   Scatter/gather I/O is the ability to perform
    a single I/O operation across multiple buffers.   The `ScatteringByteChannel`
    and `GatheringByteChannel` interfaces are provided for achieving scatter/gather
    I/O.   A file channel is a channel to an underlying file.   The answer is false:
    file channels support scatter/gather I/O.   An exclusive lock gives a single writer
    process access to a file region; it prohibits additional file locks from being
    applied simultaneously to the region. A shared lock gives one of multiple reader
    processes access to the same file region; it does not prohibit other shared locks
    but does prohibit an exclusive lock from being applied simultaneously to the region.
      The fundamental difference between `FileChannel`’s `lock()` and `tryLock()`methods
    is that the `lock()` methods can block and the `tryLock()` methods never block.
      The `FileLock lock()` method throws `OverlappingFileLockException` when either
    a lock is already held that overlaps this lock request or another thread is waiting
    to acquire a lock that will overlap with this request.   The pattern that you
    should adopt to ensure that an acquired file lock is always released appears here:
    `FileLock lock = fileChannel.lock(); // Assume fileChannel exists.` `try` `{`
       `// interact with the file channel` `}` `catch (IOException ioe)` `{`    `//
    handle the exception` `}` `finally` `{`    `lock.release();` `}`   `FileChannel`
    provides the `MappedByteBuffer map(FileChannel.MapMode mode, long position, long
    size)` method for mapping a region of a file into memory.   The three file-mapping
    modes are read-only, read-write, and private. They’re described by the `READ_ONLY`,
    `READ_WRITE`, and `PRIVATE` constants declared by the `FileChannel.MapMode` enumerated
    type.   The private file-mapping mode corresponds to copy-on-write. Changes made
    to the resulting buffer will not be propagated to the file and will not be visible
    to other programs that have mapped the same file. Instead, changes will cause
    private copies of the modified portions of the buffer to be created. These changes
    are lost when the buffer is garbage collected.   The `FileChannel` methods that
    optimize the common practice of performing bulk transfers are `transferFrom()`
    and `transferTo()`.   The answer is true: socket channels are selectable and can
    function in nonblocking mode.   The three classes that describe socket channels
    are `ServerSocketChannel`, `SocketChannel`, and `DatagramChannel`.   The answer
    is false: datagram channels are thread-safe.   Socket channels support nonblocking
    mode because the blocking nature of sockets created from Java’s socket classes
    is a serious limitation to a network-oriented Java application’s scalability.
      You would obtain a socket channel’s associated socket by invoking its `socket()`
    method.   You obtain a server socket channel by invoking `ServerSocketChannel`’s
    `open()` class method.   Listing [A-7](#A978-1-4842-1565-4_15_Chapter.html#FPar7)
    presents the `Copy` application that was called for in [Chapter 7](#A978-1-4842-1565-4_7_Chapter.html).
      Listing A-7\. Copying a File via a Byte Buffer and a File Channel


    `import java.io.FileInputStream;`


    `import java.io.FileNotFoundException;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.FileChannel;`


    `public class Copy`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Copy srcfile dstfile");`


    `return;`


    `}`


    `try (FileInputStream fis = new FileInputStream(args[0]);`


    `FileChannel fcSrc = fis.getChannel();`


    `FileOutputStream fos = new FileOutputStream(args[1]);`


    `FileChannel fcDest = fos.getChannel())`


    `{`


    `ByteBuffer buffer = ByteBuffer.allocateDirect(2048);`


    `while ((fcSrc.read(buffer)) != -1)`


    `{`


    `buffer.flip();`


    `while (buffer.hasRemaining())`


    `fcDest.write(buffer);`


    `buffer.clear();`


    `}`


    `}`


    `catch (FileNotFoundException fnfe)`


    `{`


    `System.err.println(args[0] +`


    `" could not be opened for input, or " +`


    `args[1] +`


    `" could not be created for output");`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    ## [Chapter 8](#A978-1-4842-1565-4_8_Chapter.html): Selectors


    A selector is an object created from a subclass of the abstract `Selector` class.
    It maintains a set of channels that it examines to determine which of them are
    ready for reading, writing, completing a connection sequence, accepting another
    connection, or some combination of these tasks. The actual work is delegated to
    the operating system via a POSIX `select()` or similar system call.   The three
    main types that support selectors are `SelectableChannel`, `SelectionKey`, and
    `Selector`.   The answer is false: file channels cannot be used with selectors.
    Only channels that implement `SelectableChannel` can be used with selectors. `FileChannel`
    doesn’t implement `SelectableChannel`.   `SelectionKey` provides the `boolean`
    `isReadable()` method as a convenient alternative to the expression `key.readyOps()
    & OP_READ != 0`.'
