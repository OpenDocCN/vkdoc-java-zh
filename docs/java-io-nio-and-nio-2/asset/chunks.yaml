- fmt: "### Object Serialization and Deserialization\n\nJava provides the `DataOutputStream`\
    \ and `DataInputStream` classes to stream primitive-type values and `String` objects.\
    \ However, you cannot use these classes to stream non-`String` objects. Instead,\
    \ you must use object serialization and deserialization to stream objects of arbitrary\
    \ types.\n\nObject serialization is a Java virtual machine (JVM) mechanism for\
    \ serializing object state into a stream of bytes. Its deserialization counterpart\
    \ is a JVM mechanism for deserializing this state from a byte stream.\n\n**Note**\n\
    \nAn object’s state consists of instance fields that store primitive-type values\
    \ and/or references to other objects. When an object is serialized, the objects\
    \ that are part of this state are also serialized (unless you prevent them from\
    \ being serialized). Furthermore, the objects that are part of those objects’\
    \ states are serialized (unless you prevent this), and so on.\n\nJava supports\
    \ default serialization and deserialization, custom serialization and deserialization,\
    \ and externalization.\n\n#### Default Serialization and Deserialization\n\nDefault\
    \ serialization and deserialization is the easiest form to use but offers little\
    \ control over how objects are serialized and deserialized. Although Java handles\
    \ most of the work on your behalf, there are a couple of tasks that you must perform.\n\
    \nYour first task is to have the class of the object that’s to be serialized implement\
    \ the `java.io.Serializable` interface, either directly or indirectly via the\
    \ class’s superclass. The rationale for implementing `Serializable` is to avoid\
    \ unlimited serialization.\n\n**Note**\n\n`Serializable` is an empty marker interface\
    \ (there are no methods to implement) that a class implements to tell the JVM\
    \ that it’s okay to serialize the class’s objects. When the serialization mechanism\
    \ encounters an object whose class doesn’t implement `Serializable`, it throws\
    \ an instance of the `java.io.NotSerializableException` class (an indirect subclass\
    \ of `IOException`).\n\nUnlimited serialization is the process of serializing\
    \ an entire object graph. Java doesn’t support unlimited serialization for the\
    \ following reasons:\n\n*   **Security**: If Java automatically serialized an\
    \ object containing sensitive information (such as a password or a credit card\
    \ number), it would be easy for a hacker to discover this information and wreak\
    \ havoc. It’s better to give the developer a choice to prevent this from happening.\n\
    *   **Performance**: Serialization leverages the Reflection API, which tends to\
    \ slow down application performance. Unlimited serialization could really hurt\
    \ an application’s performance.\n*   **Objects not amenable to serialization**:\
    \ Some objects exist only in the context of a running application and it’s meaningless\
    \ to serialize them. For example, a file stream object that’s deserialized no\
    \ longer represents a connection to a file.\n\nListing [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23)\
    \ declares an `Employee` class that implements the `Serializable` interface to\
    \ tell the JVM that it’s okay to serialize `Employee` objects.\n\n**Listing 4-9.**\
    \ Implementing `Serializable`\n\n```\nimport java.io.Serializable;\n\npublic class\
    \ Employee implements Serializable\n{\n   private String name;\n   private int\
    \ age;\n\n   public Employee(String name, int age)\n   {\n      this.name = name;\n\
    \      this.age = age;\n   }\n\n   public String getName() { return name; }\n\
    \   public int getAge() { return age; }\n}\n```\n\nBecause `Employee` implements\
    \ `Serializable`, the serialization mechanism will not throw a `NotSerializableException`\
    \ instance when serializing an `Employee` object. Not only does `Employee` implement\
    \ `Serializable`, the `java.lang.String` class also implements this interface.\n\
    \nYour second task is to work with the `ObjectOutputStream` class and its `writeObject()`\
    \ method to serialize an object and the `ObjectInputStream` class and its `readObject()`\
    \ method to deserialize the object.\n\n**Note**\n\nAlthough `ObjectOutputStream`\
    \ extends `OutputStream` instead of `FilterOutputStream`, and although `ObjectInputStream`\
    \ extends `InputStream` instead of `FilterInputStream`, these classes behave as\
    \ filter streams.\n\nJava provides the concrete `ObjectOutputStream` class to\
    \ initiate the serialization of an object’s state to an object output stream.\
    \ This class declares an `ObjectOutputStream(OutputStream out)` constructor that\
    \ chains the object output stream to the output stream specified by `out`.\n\n\
    When you pass an output stream reference to `out`, this constructor attempts to\
    \ write a serialization header to that output stream. It throws `NullPointerException`\
    \ when `out` contains the null reference and `IOException` when an I/O error prevents\
    \ it from writing this header.\n\n`ObjectOutputStream` serializes an object via\
    \ its `void writeObject(Object obj)` method. This method attempts to write information\
    \ about `obj`’s class followed by the values of `obj`’s instance fields to the\
    \ underlying output stream."
  raw: '### Object Serialization and Deserialization


    Java provides the `DataOutputStream` and `DataInputStream` classes to stream primitive-type
    values and `String` objects. However, you cannot use these classes to stream non-`String`
    objects. Instead, you must use object serialization and deserialization to stream
    objects of arbitrary types.


    Object serialization is a Java virtual machine (JVM) mechanism for serializing
    object state into a stream of bytes. Its deserialization counterpart is a JVM
    mechanism for deserializing this state from a byte stream.


    Note


    An object’s state consists of instance fields that store primitive-type values
    and/or references to other objects. When an object is serialized, the objects
    that are part of this state are also serialized (unless you prevent them from
    being serialized). Furthermore, the objects that are part of those objects’ states
    are serialized (unless you prevent this), and so on.


    Java supports default serialization and deserialization, custom serialization
    and deserialization, and externalization.


    #### Default Serialization and Deserialization


    Default serialization and deserialization is the easiest form to use but offers
    little control over how objects are serialized and deserialized. Although Java
    handles most of the work on your behalf, there are a couple of tasks that you
    must perform.


    Your first task is to have the class of the object that’s to be serialized implement
    the `java.io.Serializable` interface, either directly or indirectly via the class’s
    superclass. The rationale for implementing `Serializable` is to avoid unlimited
    serialization.


    Note


    `Serializable` is an empty marker interface (there are no methods to implement)
    that a class implements to tell the JVM that it’s okay to serialize the class’s
    objects. When the serialization mechanism encounters an object whose class doesn’t
    implement `Serializable`, it throws an instance of the `java.io.NotSerializableException`
    class (an indirect subclass of `IOException`).


    Unlimited serialization is the process of serializing an entire object graph.
    Java doesn’t support unlimited serialization for the following reasons:


    *   Security: If Java automatically serialized an object containing sensitive
    information (such as a password or a credit card number), it would be easy for
    a hacker to discover this information and wreak havoc. It’s better to give the
    developer a choice to prevent this from happening.

    *   Performance: Serialization leverages the Reflection API, which tends to slow
    down application performance. Unlimited serialization could really hurt an application’s
    performance.

    *   Objects not amenable to serialization: Some objects exist only in the context
    of a running application and it’s meaningless to serialize them. For example,
    a file stream object that’s deserialized no longer represents a connection to
    a file.


    Listing [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23) declares an `Employee`
    class that implements the `Serializable` interface to tell the JVM that it’s okay
    to serialize `Employee` objects.


    Listing 4-9\. Implementing `Serializable`


    `import java.io.Serializable;`


    `public class Employee implements Serializable`


    `{`


    `private String name;`


    `private int age;`


    `public Employee(String name, int age)`


    `{`


    `this.name = name;`


    `this.age = age;`


    `}`


    `public String getName() { return name; }`


    `public int getAge() { return age; }`


    `}`


    Because `Employee` implements `Serializable`, the serialization mechanism will
    not throw a `NotSerializableException` instance when serializing an `Employee`
    object. Not only does `Employee` implement `Serializable`, the `java.lang.String`
    class also implements this interface.


    Your second task is to work with the `ObjectOutputStream` class and its `writeObject()`
    method to serialize an object and the `OutputInputStream` class and its `readObject()`
    method to deserialize the object.


    Note


    Although `ObjectOutputStream` extends `OutputStream` instead of `FilterOutputStream`,
    and although `ObjectInputStream` extends `InputStream` instead of `FilterInputStream`,
    these classes behave as filter streams.


    Java provides the concrete `ObjectOutputStream` class to initiate the serialization
    of an object’s state to an object output stream. This class declares an `ObjectOutputStream(OutputStream
    out)` constructor that chains the object output stream to the output stream specified
    by `out`.


    When you pass an output stream reference to `out`, this constructor attempts to
    write a serialization header to that output stream. It throws `NullPointerException`
    when `out` contains the null reference and `IOException` when an I/O error prevents
    it from writing this header.


    `ObjectOutputStream` serializes an object via its `void writeObject(Object obj)`
    method. This method attempts to write information about `obj`’s class followed
    by the values of `obj`’s instance fields to the underlying output stream.'
  trans: '

    ### 对象序列化与反序列化


    Java 提供了 `DataOutputStream` 和 `DataInputStream` 类来流式传输基本类型值和 `String` 对象。但是，你不能使用这些类来流式传输非
    `String` 对象。相反，你必须使用对象序列化和反序列化来流式传输任意类型的对象。


    对象序列化是一种 Java 虚拟机（JVM）机制，用于将对象状态序列化为字节流。其对应的反序列化是一种 JVM 机制，用于从字节流中反序列化此状态。


    注意


    对象的状态由存储基本类型值和/或对其他对象的引用的实例字段组成。当一个对象被序列化时，构成此状态的对象也会被序列化（除非你阻止它们被序列化）。此外，构成这些对象状态的对象也会被序列化（除非你阻止），以此类推。


    Java 支持默认序列化和反序列化、自定义序列化和反序列化，以及外部化。


    #### 默认序列化与反序列化


    默认序列化和反序列化是最容易使用的形式，但对对象如何被序列化和反序列化的控制很少。尽管 Java 为你处理了大部分工作，但仍有一些任务你必须执行。


    你的第一个任务是让要被序列化的对象的类实现 `java.io.Serializable` 接口，可以直接实现，也可以通过类的超类间接实现。实现 `Serializable`
    的理由是为了避免无限序列化。


    注意


    `Serializable` 是一个空的标记接口（没有需要实现的方法），类实现它是为了告诉 JVM 可以序列化该类的对象。当序列化机制遇到其类未实现 `Serializable`
    的对象时，它会抛出一个 `java.io.NotSerializableException` 类的实例（`IOException` 的间接子类）。


    无限序列化是序列化整个对象图的过程。Java 不支持无限序列化，原因如下：


    *   **安全性**：如果 Java 自动序列化包含敏感信息（如密码或信用卡号）的对象，黑客很容易发现这些信息并造成严重破坏。最好让开发者有选择权来防止这种情况发生。

    *   **性能**：序列化利用了反射 API，这往往会降低应用程序性能。无限序列化可能会严重损害应用程序的性能。

    *   **不适合序列化的对象**：某些对象仅存在于正在运行的应用程序的上下文中，序列化它们毫无意义。例如，一个被反序列化的文件流对象不再代表与文件的连接。


    清单 4-9 声明了一个 `Employee` 类，它实现了 `Serializable` 接口，以告诉 JVM 可以序列化 `Employee` 对象。


    清单 4-9. 实现 `Serializable`


    `import java.io.Serializable;`


    `public class Employee implements Serializable`


    `{`


    `private String name;`


    `private int age;`


    `public Employee(String name, int age)`


    `{`


    `this.name = name;`


    `this.age = age;`


    `}`


    `public String getName() { return name; }`


    `public int getAge() { return age; }`


    `}`


    因为 `Employee` 实现了 `Serializable`，序列化机制在序列化 `Employee` 对象时不会抛出 `NotSerializableException`
    实例。不仅 `Employee` 实现了 `Serializable`，`java.lang.String` 类也实现了这个接口。


    你的第二个任务是使用 `ObjectOutputStream` 类及其 `writeObject()` 方法来序列化对象，以及使用 `OutputInputStream`
    类及其 `readObject()` 方法来反序列化对象。


    注意


    尽管 `ObjectOutputStream` 扩展了 `OutputStream` 而不是 `FilterOutputStream`，并且尽管 `ObjectInputStream`
    扩展了 `InputStream` 而不是 `FilterInputStream`，但这些类的行为类似于过滤流。


    Java 提供了具体的 `ObjectOutputStream` 类来启动将对象状态序列化到对象输出流的过程。该类声明了一个 `ObjectOutputStream(OutputStream
    out)` 构造函数，该构造函数将对象输出流链接到由 `out` 指定的输出流。


    当你将输出流引用传递给 `out` 时，此构造函数会尝试将序列化标头写入该输出流。当 `out` 包含空引用时，它会抛出 `NullPointerException`；当
    I/O 错误阻止它写入此标头时，它会抛出 `IOException`。


    `ObjectOutputStream` 通过其 `void writeObject(Object obj)` 方法序列化对象。此方法尝试将关于 `obj`
    类的信息以及 `obj` 实例字段的值写入底层输出流。

