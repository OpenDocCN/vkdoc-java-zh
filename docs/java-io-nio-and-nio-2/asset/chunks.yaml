    Most of Table [3-1](#A978-1-4842-1565-4_3_Chapter.html#Tab1)’s methods are fairly
    self-explanatory. However, the `getFD()` method requires further enlightenment.


    Note


    `RandomAccessFile`’s `read`-prefixed methods and `skipBytes()` originate in the
    `java.io.DataInput` interface, which this class implements. Furthermore, `RandomAccessFile`’s
    `write`-prefixed methods originate in the `java.io.DataOutput` interface, which
    this class also implements.


    When a file is opened, the underlying operating system creates an operating system-dependent
    structure to represent the file. A handle to this structure is stored in an instance
    of the `java.io.FileDescriptor` class, which `getFD()` returns.


    Note


    A handle is an identifier that Java passes to the underlying operating system
    to identify, in this case, a specific open file when it requires that the underlying
    operating system perform a file operation.


    `FileDescriptor` is a small class that declares three `FileDescriptor` constants
    named `in`, `out`, and `err`. These constants let `System.in`, `System.out`, and
    `System.err` provide access to the standard input, standard output, and standard
    error streams.


    `FileDescriptor` also declares the following pair of methods:


    *   `void sync()` tells the underlying operating system to flush (empty) the contents
    of the open file’s output buffers to their associated local disk device. `sync()`
    returns after all modified data and attributes have been written to the relevant
    device. It throws `java.io.SyncFailedException` when the buffers cannot be flushed
    or because the operating system cannot guarantee that all the buffers have been
    synchronized with physical media.

    *   `boolean valid()` determines whether this file descriptor object is valid.
    It returns true when the file descriptor object represents an open file or other
    active I/O connection; otherwise, it returns false.


    Data that is written to an open file is stored in the underlying operating system’s
    output buffers. When the buffers fill to capacity, the operating system empties
    them to the disk. Buffers improve performance because disk access is much slower
    than access to the computer’s internal memory.


    However, when you write data to a random access file that’s been opened via mode
    `"rwd"` or `"rws"`, each write operation’s data is written straight to the disk.
    As a result, write operations are slower than when the random access file is opened
    in `"rw"` mode.


    Suppose you have a situation that combines writing data through the output buffers
    and writing data directly to the disk. The following example addresses this hybrid
    scenario by opening the file in mode `"rw"` and selectively calling `FileDescriptor`’s
    `sync()` method.


    `RandomAccessFile raf = new RandomAccessFile("employee.dat", "rw");`


    `FileDescriptor fd = raf.getFD();`


    `// Perform a critical write operation.`


    `raf.write(...);`


    `// Synchronize with the underlying disk by flushing the operating system`


    `// output buffers to the disk.`


    `fd.sync();`


    `// Perform a non-critical write operation where synchronization isn’t`


    `// necessary.`


    `raf.write(...);`


    `// Do other work.`


    `// Close the file, emptying output buffers to the disk.`


    `raf.close();`'
