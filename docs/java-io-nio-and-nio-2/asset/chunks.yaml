- fmt: "# Learning About a Path’s File or Directory\n\nYou can interrogate the file\
    \ system to learn about the file or directory represented by a `File` object’s\
    \ stored path by calling the methods that are described in Table [2-2](#A978-1-4842-1565-4_2_Chapter.html#Tab2).\n\
    \nTable 2-2. `File` Methods for Learning About a File or Directory\n\n| Method\
    \ | Description |\n| --- | --- |\n| `boolean exists()` | Return true if and only\
    \ if the file or directory that’s denoted by this `File` object’s abstract path\
    \ exists. |\n| `boolean isDirectory()` | Return true when this `File` object’s\
    \ abstract path refers to an existing directory. |\n| `boolean isFile()` | Return\
    \ true when this `File` object’s abstract path refers to an existing normal file.\
    \ A file is normal when it’s not a directory and satisfies other operating system-dependent\
    \ criteria. It’s not a symbolic link or a named pipe, for example. Any nondirectory\
    \ file created by a Java application is guaranteed to be a normal file. |\n| `boolean\
    \ isHidden()` | Return true when the file denoted by this `File` object’s abstract\
    \ path is hidden. The exact definition of hidden is operating system dependent.\
    \ On Unix/Linux operating systems, a file is hidden when its name begins with\
    \ a period character. On Windows operating systems, a file is hidden when it has\
    \ been marked as such in the file system. |\n| `long lastModified()` | Return\
    \ the time that the file denoted by this `File` object’s abstract path was last\
    \ modified, or `0` when the file doesn’t exist or an I/O error occurred during\
    \ this method call. The returned value is measured in milliseconds since the Unix\
    \ epoch (00:00:00 GMT, January 1, 1970). |\n| `long length()` | Return the length\
    \ of the file denoted by this `File` object’s abstract path. The return value\
    \ is unspecified when the path denotes a directory and will be `0` when the file\
    \ doesn’t exist. |\n\nListing [2-2](#A978-1-4842-1565-4_2_Chapter.html#FPar7)\
    \ instantiates `File` with its path command-line argument and calls all of the\
    \ `File` methods described in Table [2-2](#A978-1-4842-1565-4_2_Chapter.html#Tab2)\
    \ to learn about the path’s file/directory.\n\nListing 2-2. Obtaining File/Directory\
    \ Information\n\n```\nimport java.io.File;\nimport java.io.IOException;\nimport\
    \ java.util.Date;\n\npublic class FileDirectoryInfo\n{\n   public static void\
    \ main(final String[] args) throws IOException\n   {\n      if (args.length !=\
    \ 1)\n      {\n         System.err.println(\"usage: java FileDirectoryInfo pathname\"\
    );\n         return;\n      }\n      File file = new File(args[0]);\n      System.out.println(\"\
    About \" + file + \":\");\n      System.out.println(\"Exists = \" + file.exists());\n\
    \      System.out.println(\"Is directory = \" + file.isDirectory());\n      System.out.println(\"\
    Is file = \" + file.isFile());\n      System.out.println(\"Is hidden = \" + file.isHidden());\n\
    \      System.out.println(\"Last modified = \" +\n                         new\
    \ Date(file.lastModified()));\n      System.out.println(\"Length = \" + file.length());\n\
    \   }\n}\n```\n\nCompile Listing [2-2](#A978-1-4842-1565-4_2_Chapter.html#FPar7)\
    \ as follows:\n\n`javac FileDirectoryInfo.java`\n\nRun the resulting application\
    \ as follows:\n\n`java FileDirectoryInfo x.dat`\n\nAssuming the existence of a\
    \ three-byte file named `x.dat`, you should observe output similar to that shown\
    \ here:\n\n```\nAbout x.dat:\nExists = true\nIs directory = false\nIs file = true\n\
    Is hidden = false\nLast modified = Sat Jul 25 15:49:41 CDT 2015\nLength = 3\n\
    ```\n\n## Listing File System Root Directories\n\n`File` declares the `File[]\
    \ listRoots()` class method to return the root directories (roots) of available\
    \ file systems as an array of `File` objects.\n\nNote: The set of available file\
    \ system roots is affected by operating system-level operations, such as inserting\
    \ or ejecting removable media, and disconnecting or unmounting physical or virtual\
    \ disk drives.\n\nListing [2-3](#A978-1-4842-1565-4_2_Chapter.html#FPar9) presents\
    \ a `DumpRoots` application that uses `listRoots()` to obtain an array of available\
    \ file system roots and then outputs the array’s contents.\n\nListing 2-3. Dumping\
    \ Available File System Roots to Standard Output\n\n```\nimport java.io.File;\n\
    \npublic class DumpRoots\n{\n   public static void main(String[] args)\n   {\n\
    \      File[] roots = File.listRoots();\n      for (File root: roots)\n      \
    \   System.out.println(root);\n   }\n}\n```\n\nCompile Listing [2-3](#A978-1-4842-1565-4_2_Chapter.html#FPar9)\
    \ as follows:\n\n`javac DumpRoots.java`\n\nRun the resulting application as follows:\n\
    \n`java DumpRoots`\n\nWhen I run this application on my Windows 7 operating system,\
    \ I receive the following output, which reveals four available roots:\n\n```\n\
    C:\\\nD:\\\nE:\\\nF:\\\n```\n\nIf I ran `DumpRoots` on a Unix or Linux operating\
    \ system, I would receive one line of output that consists of the virtual file\
    \ system root (`/`)."
  raw: '## Learning About a Path’s File or Directory


    You can interrogate the file system to learn about the file or directory represented
    by a `File` object’s stored path by calling the methods that are described in
    Table [2-2](#A978-1-4842-1565-4_2_Chapter.html#Tab2).


    Table 2-2.


    `File` Methods for Learning About a File or Directory


    | Method | Description |

    | --- | --- |

    | `boolean exists()` | Return true if and only if the file or directory that’s
    denoted by this `File` object’s abstract path exists. |

    | `boolean isDirectory()` | Return true when this `File` object’s abstract path
    refers to an existing directory. |

    | `boolean isFile()` | Return true when this `File` object’s abstract path refers
    to an existing normal file. A file is normal when it’s not a directory and satisfies
    other operating system-dependent criteria. It’s not a symbolic link or a named
    pipe, for example. Any nondirectory file created by a Java application is guaranteed
    to be a normal file. |

    | `boolean isHidden()` | Return true when the file denoted by this `File` object’s
    abstract path is hidden. The exact definition of hidden is operating system dependent.
    On Unix/Linux operating systems, a file is hidden when its name begins with a
    period character. On Windows operating systems, a file is hidden when it has been
    marked as such in the file system. |

    | `long lastModified()` | Return the time that the file denoted by this `File`
    object’s abstract path was last modified, or `0` when the file doesn’t exist or
    an I/O error occurred during this method call. The returned value is measured
    in milliseconds since the Unix epoch (00:00:00 GMT, January 1, 1970). |

    | `long length()` | Return the length of the file denoted by this `File` object’s
    abstract path. The return value is unspecified when the path denotes a directory
    and will be `0` when the file doesn’t exist. |


    Listing [2-2](#A978-1-4842-1565-4_2_Chapter.html#FPar7) instantiates `File` with
    its path command-line argument and calls all of the `File` methods described in
    Table [2-2](#A978-1-4842-1565-4_2_Chapter.html#Tab2) to learn about the path’s
    file/directory.


    Listing 2-2\. Obtaining File/Directory Information


    `import java.io.File;`


    `import java.io.IOException;`


    `import java.util.Date;`


    `public class FileDirectoryInfo`


    `{`


       `public static void main(final String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java FileDirectoryInfo pathname");`


             `return;`


          `}`


          `File file = new File(args[0]);`


          `System.out.println("About " + file + ":");`


          `System.out.println("Exists = " + file.exists());`


          `System.out.println("Is directory = " + file.isDirectory());`


          `System.out.println("Is file = " + file.isFile());`


          `System.out.println("Is hidden = " + file.isHidden());`


          `System.out.println("Last modified = " +`


                             `new Date(file.lastModified()));`


          `System.out.println("Length = " + file.length());`


       `}`


    `}`


    Compile Listing [2-2](#A978-1-4842-1565-4_2_Chapter.html#FPar7) as follows:


    `javac FileDirectoryInfo.java`


    Run the resulting application as follows:


    `java FileDirectoryInfo x.dat`


    Assuming the existence of a three-byte file named `x.dat`, you should observe
    output similar to that shown here:


    `About x.dat:`


