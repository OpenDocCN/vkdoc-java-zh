- fmt: "# Understanding Nonblocking Mode\n\nThe blocking nature of sockets created\
    \ from Java’s socket classes is a serious limitation to a network-oriented Java\
    \ application’s scalability. For example, the `ServerSocket` class’s `Socket accept()`\
    \ method blocks until an incoming connection arrives, at which point it creates\
    \ and returns a `Socket` instance that lets the server communicate with the client.\
    \ If this method didn’t block, scalability would improve because the server could\
    \ be accomplishing other useful work instead of having to wait.\n\nThe abstract\
    \ `SelectableChannel` class is a common ancestor of the `ServerSocketChannel`,\
    \ `SocketChannel`, and `DatagramChannel` classes. As well as letting the socket\
    \ channel work in a selector context (I discuss selectors in [Chapter 8](#A978-1-4842-1565-4_8_Chapter.html)),\
    \ `SelectableChannel` lets socket channels choose to block or operate in nonblocking\
    \ mode, in which a thread can check for input or send output without blocking\
    \ when no input is available or when the output buffer is full.\n\n**Note:** `SelectableChannel`\
    \ merges functionality related to selectors with nonblocking mode because nonblocking\
    \ mode is most useful in conjunction with selector-based multiplexing.\n\n`SelectableChannel`\
    \ offers the following methods to enable blocking or nonblocking, determine whether\
    \ the channel is blocking or nonblocking, and obtain the blocking lock:\n\n- `SelectableChannel\
    \ configureBlocking(boolean block)`: Specify the calling selectable channel’s\
    \ blocking status. Pass `true` to make the channel blocking and `false` to make\
    \ the channel nonblocking. The method returns the selectable channel or throws\
    \ an exception: `ClosedChannelException` when the channel is closed, `java.net.channels.IllegalBlockingModeException`\
    \ when `block` is `true` and the channel has been registered with one or more\
    \ selectors, and `IOException` when an I/O error occurs.\n- `boolean isBlocking()`:\
    \ This method returns `true` when the calling selectable channel is blocking;\
    \ otherwise, it returns `false`. Newly created channels default to blocking.\n\
    - `Object blockingLock()`: Return the object on which `configureBlocking()` synchronizes.\
    \ The returned object is useful in the implementation of adaptors that require\
    \ the current blocking mode value to not change for a short period of time.\n\n\
    It’s trivial to set or reset a selectable channel’s blocking/nonblocking status.\
    \ To enable nonblocking, pass `false` to an invocation of `configureBlocking()`,\
    \ which the following example demonstrates:\n\n```\nServerSocketChannel ssc =\
    \ ServerSocketChannel.open();\nssc.configureBlocking(false); // enable nonblocking\
    \ mode\n```\n\nAlthough nonblocking sockets are commonly used in server-oriented\
    \ applications, they are also beneficial on the client side. For example, a GUI-based\
    \ application can leverage nonblocking sockets to keep the user interface responsive\
    \ while communicating simultaneously with several server applications.\n\nThe\
    \ `blockingLock()` method lets you prevent other threads from changing a socket\
    \ channel’s blocking/nonblocking status. This method returns the object that a\
    \ channel implementation uses for synchronizing when changing this status. Only\
    \ the thread that holds the lock on this object can change the status and the\
    \ lock is often obtained by using Java’s `synchronized` keyword. Consider the\
    \ following example:\n\n```\nServerSocketChannel ssc = ServerSocketChannel.open();\n\
    SocketChannel sc = null;\nObject lock = ssc.blockingLock();\n\n// Thread might\
    \ block when obtaining the lock associated with\n// the lock object.\nsynchronized(lock)\n\
    {\n    // Current thread owns the lock. No other thread can\n    // change blocking\
    \ mode.\n    // Obtaining server socket channel’s current blocking mode.\n   \
    \ boolean blocking = ssc.isBlocking();\n    // Set server socket channel to nonblocking.\n\
    \    ssc.configureBlocking(false);\n    // Obtain next connection, which is null\
    \ when there is no\n    // connection.\n    sc = ssc.accept();\n    // Restore\
    \ previous blocking mode.\n    ssc.configureBlocking(blocking);\n}\n\n// The lock\
    \ is released and some other thread may modify the\n// server socket channel’s\
    \ blocking mode.\nif (sc != null)\n    communicateWithSocket(sc);\n```"
  raw: '#### Understanding Nonblocking Mode


    The blocking nature of sockets created from Java’s socket classes is a serious
    limitation to a network-oriented Java application’s scalability. For example,
    the `ServerSocket` class’s `Socket accept()` method blocks until an incoming connection
    arrives, at which point it creates and returns a `Socket` instance that lets the
    server communicate with the client. If this method didn’t block, scalability would
    improve because the server could be accomplishing other useful work instead of
    having to wait.


    The abstract `SelectableChannel` class is a common ancestor of the `ServerSocketChannel`,
    `SocketChannel`, and `DatagramChannel` classes. As well as letting the socket
    channel work in a selector context (I discuss selectors in [Chapter 8](#A978-1-4842-1565-4_8_Chapter.html)),
    `SelectableChannel` lets socket channels choose to block or operate in nonblocking
    mode, in which a thread can check for input or send output without blocking when
    no input is available or when the output buffer is full.


    Note


    `SelectableChannel` merges functionality related to selectors with nonblocking
    mode because nonblocking mode is most useful in conjunction with selector-based
    multiplexing.


    `SelectableChannel` offers the following methods to enable blocking or nonblocking,
    determine whether the channel is blocking or nonblocking, and obtain the blocking
    lock:


    *   `SelectableChannel configureBlocking(boolean block)`: Specify the calling
    selectable channel’s blocking status. Pass `true` to make the channel blocking
    and `false` to make the channel nonblocking. The method returns the selectable
    channel or throws an exception: `ClosedChannelException` when the channel is closed,
    `java.net.channels.IllegalBlockingModeException` when `block` is `true` and the
    channel has been registered with one or more selectors, and `IOException` when
    an I/O error occurs.

    *   `boolean isBlocking()`: This method returns `true` when the calling selectable
    channel is blocking; otherwise, it returns `false`. Newly created channels default
    to blocking.

    *   `Object blockingLock()`: Return the object on which `configureBlocking()`
    synchronizes. The returned object is useful in the implementation of adaptors
    that require the current blocking mode value to not change for a short period
    of time.


    It’s trivial to set or reset a selectable channel’s blocking/nonblocking status.
    To enable nonblocking, pass `false` to an invocation of `configureBlocking()`,
    which the following example demonstrates:


    `ServerSocketChannel ssc = ServerSocketChannel.open();`


    `ssc.configureBlocking(false); // enable nonblocking mode`


    Although nonblocking sockets are commonly used in server-oriented applications,
    they are also beneficial on the client side. For example, a GUI-based application
    can leverage nonblocking sockets to keep the user interface responsive while communicating
    simultaneously with several server applications.


    The `blockingLock()` method lets you prevent other threads from changing a socket
    channel’s blocking/nonblocking status. This method returns the object that a channel
    implementation uses for synchronizing when changing this status. Only the thread
    that holds the lock on this object can change the status and the lock is often
    obtained by using Java’s `synchronized` keyword. Consider the following example:


    `ServerSocketChannel ssc = ServerSocketChannel.open();`


    `SocketChannel sc = null;`


    `Object lock = ssc.blockingLock();`


    `// Thread might block when obtaining the lock associated with`


    `// the lock object.`


    `synchronized(lock)`


    `{`


    `// Current thread owns the lock. No other thread can`


    `// change blocking mode.`


    `// Obtaining server socket channel’s current blocking mode.`


    `boolean blocking = ssc.isBlocking();`


    `// Set server socket channel to nonblocking.`


    `ssc.configureBlocking(false);`


    `// Obtain next connection, which is null when there is no`


    `// connection.`


    `sc = ssc.accept();`


    `// Restore previous blocking mode.`


    `ssc.configureBlocking(blocking);`


    `}`


    `// The lock is released and some other thread may modify the`


    `// server socket channel’s blocking mode.`


    `if (sc != null)`


    `communicateWithSocket(sc);`'
