  trans: '

    ### DatagramSocket 与 MulticastSocket


    `DatagramSocket` 和 `MulticastSocket` 类允许你在两台主机（`DatagramSocket`）或多台主机（`MulticastSocket`）之间进行基于
    UDP 的通信。使用这两个类中的任何一个，你都可以通过数据报包（即与 `DatagramPacket` 类实例关联的字节数组）来发送单向消息。


    注意


    尽管你可能认为 `Socket` 和 `ServerSocket` 已经足够，但 `DatagramSocket` 及其子类 `MulticastSocket`
    仍有其用途。例如，考虑这样一个场景：一组机器需要偶尔向服务器报告它们仍在运行。偶尔丢失消息，甚至消息未能按时到达，都无关紧要。另一个例子是低优先级的股票行情机，它会定期广播股票价格。当一个数据包未能到达时，很可能下一个数据包会到达，然后你就能收到最新价格的通知。在实时应用中，**及时**交付比**可靠**或**有序**交付更为重要。


    `DatagramPacket` 声明了多个构造器，其中 `DatagramPacket(byte[] buf, int length)` 是最简单的。此构造器要求你向
    `buf` 和 `length` 传递字节数组和整数参数，其中 `buf` 是存储待发送或接收数据的数据缓冲区，而 `length`（必须小于或等于 `buf.length`）指定了从
    `buf[0]` 开始要发送/接收的字节数。


    以下示例演示了此构造器：


    `byte[] buffer = new byte[100];`


    `DatagramPacket dgp = new DatagramPacket(buffer, buffer.length);`


    注意


    其他构造器允许你指定 `buf` 中的一个偏移量，用于标识第一个传出或传入字节的存储位置，和/或允许你指定目标套接字地址。


    `DatagramSocket` 描述了 UDP 通信链路中客户端或服务器端的套接字。尽管此类声明了多个构造器，但在本附录中，我发现使用 `DatagramSocket()`
    构造器用于客户端，以及使用 `DatagramSocket(int port)` 构造器用于服务器端更为方便。当无法创建数据报套接字或无法将数据报套接字绑定到本地端口时，这两个构造器都会抛出
    `SocketException`。


    应用程序实例化 `DatagramSocket` 后，会调用 `void send(DatagramPacket dgp)` 和 `void receive(DatagramPacket
    dgp)` 来发送和接收数据报包。


    清单 B-3 在服务器上下文中演示了 `DatagramPacket` 和 `DatagramSocket`。


    清单 B-3. 接收来自客户端的数据报包并将其回显给客户端


    `import java.io.IOException;`


    `import java.net.DatagramPacket;`


    `import java.net.DatagramSocket;`


    `import java.net.SocketException;`


    `public class DGServer`


    `{`


    `final static int PORT = 10000;`


    `public static void main(String[] args) throws SocketException`


    `{`


    `System.out.println("Server is starting");`


    `DatagramSocket dgs = new DatagramSocket(PORT);`


    `try`


    `{`


    `System.out.println("Send buffer size = " +`


    `dgs.getSendBufferSize());`


    `System.out.println("Receive buffer size = " +`


    `dgs.getReceiveBufferSize());`


    `byte[] data = new byte[100];`


    `DatagramPacket dgp = new DatagramPacket(data, data.length);`


    `while (true)`


    `{`


    `dgs.receive(dgp);`


    `System.out.println(new String(data));`


    `dgs.send(dgp);`


    `}`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    清单 B-3 的 `main()` 方法首先创建一个 `DatagramSocket` 对象，并将该套接字绑定到本地主机的端口 10000。然后，它调用 `DatagramSocket`
    的 `int getSendBufferSize()` 和 `int getReceiveBufferSize()` 方法来获取 `SO_SNDBUF` 和
    `SO_RCVBUF` 套接字选项的值，并将它们输出。


    注意


    套接字与底层平台的发送和接收缓冲区相关联，其大小可通过调用 `getSendBufferSize()` 和 `getReceiveBufferSize()`
    来访问。同样，也可以通过调用 `DatagramSocket` 的 `void setReceiveBufferSize(int size)` 和 `void
    setSendBufferSize(int size)` 方法来设置其大小。虽然你可以调整这些缓冲区大小以提高性能，但对于 UDP 来说存在一个实际限制。在
    IPv4 下，可以发送或接收的 UDP 数据包的最大大小为 65,507 字节——这是从 65,535 中减去 8 字节的 UDP 头部和 20 字节的 IP
    头部值后得出的。尽管你可以指定一个更大的发送/接收缓冲区，但这样做是浪费的，因为最大的数据包被限制为 65,507 字节。此外，尝试发送或接收缓冲区长度超过
    65,507 字节的数据包会导致 `IOException`。


    接下来，`main()` 实例化 `DatagramPacket`，为从客户端接收数据报包并将该数据包回显给客户端做准备。它假设数据包的大小为 100 字节或更少。


    最后，`main()` 进入一个无限循环，该循环接收一个数据包，输出数据包内容，然后将数据包发送回客户端。客户端的寻址信息存储在 `DatagramPacket`
    中。


    按如下方式编译清单 B-3：


    `javac DGServer.java`


