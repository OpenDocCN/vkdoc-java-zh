    `catch (FileAlreadyExistsException faee)`


    `{`


    `System.err.printf("%s: file already exists%n", target);`


    `}`


    `catch (DirectoryNotEmptyException dnee)`


    `{`


    `System.err.printf("%s: not empty%n", target);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.printf("I/O error: %s%n", ioe.getMessage());`


    `}`


    `}`


    `}`


    获取源路径和目标路径后，`main()` 方法调用带有 `REPLACE_EXISTING` 选项的 `copy()` 方法，以便在目标文件存在时替换它。如果没有此选项，则会抛出
    `FileAlreadyExistsException` 异常。


    编译清单 12-37（`javac Copy.java`）并按如下方式运行生成的应用程序：


    `java Copy Copy.java Copy.bak`


    你应该会看到一个与 `Copy.java` 内容完全相同的 `Copy.bak` 文件。


    在与 `Copy.java` 相同的目录下，创建一个名为 `x` 的目录。然后将任意文件复制到此目录中。最后，执行以下命令行：


    `java Copy Copy.java x`


    你应该会收到一条关于 `x` 非空的消息，这是由于抛出了 `DirectoryNotEmptyException` 异常。


    #### 移动文件


    `File` 类缺乏合适的文件移动功能，这也困扰了许多开发者。`Files` 类通过提供 [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `move(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `source,` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `target,` [`CopyOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/CopyOption.html#interface%20in%20java.nio.file)
    `... options)` 方法解决了这个问题。


    `move` `(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `source,` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `target,` [`CopyOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/CopyOption.html#interface%20in%20java.nio.file)
    `... options)` 方法将 `source` 路径移动到 `target`。当 `target` 已存在时，该方法会失败，除非 `source`
    和 `target` 是[相同](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Files.html#isSameFile-java.nio.file.Path-java.nio.file.Path-)的，在这种情况下该方法不产生任何效果。如果
    `source` 是一个符号链接，则移动的是该链接（而非其目标）。


    支持以下复制选项：


    *   `ATOMIC_MOVE`：该移动作为原子文件系统操作执行，所有其他选项均被忽略。当 `target` 存在时，要么替换现有的 `target`，要么该方法失败并抛出
    `IOException`。如果无法作为原子文件系统操作执行移动，则抛出 `java.nio.file.AtomicMoveNotSupportedException`。

    *   `REPLACE_EXISTING`：当 `target` 存在时，除非它是一个非空目录，否则替换该 `target`。当 `target` 存在且是一个符号链接时，替换的是符号链接本身，而非链接的目标。


    当源和目标文件存储支持时，移动路径会将 `lastModifiedTime` 属性复制到 `target`。复制时间戳可能会导致精度损失。`move()`
    的实现也可能尝试复制其他属性。如果无法复制这些属性，也不要求必须失败。


    该方法返回 `target Path` 对象。当 `options` 包含不支持的复制选项时，抛出 `UnsupportedOperationException`；当
    `target` 存在但因未指定 `REPLACE_EXISTING` 而无法替换时，抛出 `FileAlreadyExistsException`；当指定了
    `REPLACE_EXISTING` 但文件因是非空目录而无法替换时，抛出 `DirectoryNotEmptyException`；当 `options`
    包含 `ATOMIC_MOVE` 但文件无法作为原子文件系统操作移动时，抛出 `AtomicMoveNotSupportedException`；当发生 I/O
    错误时，抛出 `IOException`。


    注意


    `move()` 可用于移动空目录。当调用它来移动非空目录时，如果不需要移动该目录的条目，则目录会被移动。例如，在同一文件存储上重命名目录通常不需要移动目录条目。当移动目录需要移动其条目时，此方法会失败（通过抛出
    `IOException`）。


    清单 12-38 展示了一个应用程序的源代码，该应用程序将 `source` 路径的所有字节复制到 `target` 路径。


    清单 12-38\. 将源路径移动到目标路径


    `import java.io.IOException;`


    `import java.nio.file.DirectoryNotEmptyException;`


    `import java.nio.file.Files;`


    `import java.nio.file.FileAlreadyExistsException;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class Move`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Move source target");`


    `return;`


    `}`


    `Path source = Paths.get(args[0]);`


    `Path target = Paths.get(args[1]);`


    `try`


    `{`


    `Files.move(source, target);`


    `}`


    `catch (FileAlreadyExistsException faee)`


    `{`


    `System.err.printf("%s: file already exists%n", target);`


    `}`


    `catch (DirectoryNotEmptyException dnee)`


    `{`


    `System.err.printf("%s: not empty%n", target);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.printf("I/O error: %s%n", ioe.getMessage());`


    `}`


    `}`


    `}`


    按如下方式编译清单 12-38：


    `javac Move.java`


    按如下方式运行生成的应用程序：


    `java Move report.txt report.bak`


    此示例假设存在一个 `report.txt` 文件。当 `Move` 执行完毕后，你应该会发现一个 `report.bak` 文件，而 `report.txt`
    文件则消失了。

