  trans: '

    ## 摘要


    通道与缓冲区协同工作，以实现高性能 I/O。通道是一个对象，代表与硬件设备、文件、网络套接字、应用程序组件或其他能够执行写入、读取及其他 I/O 操作的实体之间的开放连接。通道能在字节缓冲区与基于操作系统的
    I/O 服务源或目标之间高效传输数据。


    Java 通过提供 `Channel` 接口、其子接口 `WritableByteChannel` 和 `ReadableByteChannel`、`Channels`
    类以及 `java.nio.channels` 包中的其他类型来支持通道。在探索此包的过程中，你学习了分散/聚集 I/O、文件通道（重点介绍 `FileChannel`
    类及其文件锁定、内存映射文件 I/O 和字节传输能力）、套接字通道和管道。


    第 8 章将介绍 NIO 对选择器的支持。


    # 8. 选择器


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​8](http://dx.doi.org/10.1007/978-1-4842-1565-4_8))
    包含补充材料，可供授权用户使用。


    I/O 要么是面向块的（例如文件 I/O），要么是面向流的（例如网络 I/O）。流通常比块设备（如固定磁盘）慢，并且读/写操作常常会导致调用线程阻塞，直到输入可用或输出已完全写入。为了弥补这一点，现代操作系统允许流以非阻塞模式运行，这使得线程能够在不阻塞的情况下读取或写入数据。操作要么完全成功，要么指示部分成功。无论哪种情况，线程都能够执行其他有用的工作，而不是等待。


    非阻塞模式并不能让应用程序在不实际执行操作的情况下确定它是否可以执行某个操作。例如，当非阻塞读取操作成功时，应用程序得知读取操作是可行的，但同时也读取了一些必须管理的数据。这种双重性使得你无法在不使代码变得极其复杂的情况下，将检查流就绪状态的代码与数据处理代码分离开来。


    非阻塞模式是执行就绪选择的基础，它将检查 I/O 流是否就绪以执行写入、读取和其他操作（而无需实际执行这些操作）的工作卸载给操作系统。操作系统被指示观察一组流，并返回一些指示，表明哪些流已准备好执行特定操作（如读取）或多个操作（如接受和读取）。这种能力使得一个线程能够利用操作系统提供的就绪信息，多路复用潜在的大量活动流。通过这种方式，网络服务器可以处理大量的网络连接；它们具有极强的可扩展性。


    注意


    现代操作系统通过提供诸如 POSIX `select()` 调用之类的系统调用，使应用程序能够进行就绪选择。


    选择器让你能够在 Java 环境中实现就绪选择。本章将向你介绍选择器的基础知识，然后提供一个演示。


    ## 选择器基础


    选择器是一个从抽象类 `java.nio.channels.Selector` 的子类创建的对象。选择器维护一组通道，并检查这些通道以确定哪些通道已准备好进行读取、写入、完成连接序列、接受另一个连接，或这些任务的某种组合。实际工作通过
    POSIX `select()` 或类似的系统调用委托给操作系统。


    注意


    在某个事物未就绪时（例如字节不可读）无需等待就能检查通道，并且在检查时也无需执行操作，这种能力是可扩展性的关键。单个线程可以管理大量通道，从而降低了代码复杂性和潜在的线程问题。


    选择器与可选择通道一起使用，可选择通道是其类最终继承自抽象类 `java.nio.channels.SelectableChannel` 的对象，该类描述了一个可以被选择器多路复用的通道。套接字通道、服务器套接字通道、数据报通道以及管道源/汇通道都是可选择通道，因为
    `java.nio.channels.SocketChannel`、`java.nio.channels.ServerSocketChannel`、`java.nio.channels.DatagramChannel`、`java.nio.channels.Pipe.SinkChannel`
    和 `java.nio.channels.Pipe.SourceChannel` 都派生自 `SelectableChannel`。相比之下，文件通道不是可选择通道，因为
    `java.nio.channels.FileChannel` 的继承链中不包含 `SelectableChannel`。


    一个或多个先前创建的可选择通道会注册到一个选择器上。每次注册都会返回一个抽象类 `SelectionKey` 的子类实例，该实例是一个令牌，表示一个通道与选择器之间的关系。这个键跟踪两组操作：兴趣集和就绪集。兴趣集标识了在下一次调用选择器的某个选择方法时将测试就绪状态的操作类别。就绪集标识了该键的通道已被其选择器发现已就绪的操作类别。当调用选择方法时，通过检查所有注册到该选择器的通道来更新选择器关联的键。然后，应用程序可以获取一组其通道已被发现就绪的键，并遍历这些键以处理自上次
    `select` 方法调用以来已就绪的每个通道。


    注意


    一个可选择通道可以注册到多个选择器。它不知道当前注册到了哪些选择器。


    要使用选择器，首先需要创建一个。你可以通过调用 `Selector` 的 `Selector open()` 类方法来完成此任务，该方法在成功时返回一个 `Selector`
    实例，在失败时抛出 `java.io.IOException`。以下代码片段演示了此任务：


    `Selector selector = Selector.open();`


    你可以在创建选择器之前或之后创建你的可选择通道。但是，在将通道注册到选择器之前，必须确保每个通道都处于非阻塞模式。你可以通过调用以下任一 `SelectableChannel`
    注册方法将可选择通道注册到选择器：


    *   `SelectionKey register(Selector sel, int ops)`

    *   `SelectionKey register(Selector sel, int ops, Object att)`


    每个方法都要求你将先前创建的选择器传递给 `sel`，并将以下 `SelectionKey` 的 `int` 类型常量的按位 OR 组合传递给 `ops`，该参数表示兴趣集：


    *   `OP_ACCEPT`：用于套接字接受操作的操作集位。

    *   `OP_CONNECT`：用于套接字连接操作的操作集位。

    *   `OP_READ`：用于读取操作的操作集位。

    *   `OP_WRITE`：用于写入操作的操作集位。

    '
- fmt: "The second method also lets you pass an arbitrary `java.lang.Object` or a\
    \ subclass instance (or `null`) to `att`. The non-null object is known as an attachment\
    \ and is a convenient way of recognizing a given channel or attaching additional\
    \ information to the channel. It’s stored in the `SelectionKey` instance returned\
    \ from this method.\n\nUpon success, each method returns a `SelectionKey` instance\
    \ that relates the selectable channel with the selector. Upon failure, an exception\
    \ is thrown. For example, `java.nio.channels.ClosedChannelException` is thrown\
    \ when the channel is closed and `java.nio.channels.IllegalBlockingModeException`\
    \ is thrown when the channel hasn’t been set to nonblocking mode.\n\nThe following\
    \ code fragment extends the previous code fragment by configuring a previously\
    \ created channel to nonblocking mode and registering the channel with the selector.\
    \ The selection methods test the channel for accept, read, and write readiness:\n\
    \n```\nchannel.configureBlocking(false);\nSelectionKey key = channel.register(selector,\
    \ SelectionKey.OP_ACCEPT |\n                                    SelectionKey.OP_READ\
    \ |\n                                    SelectionKey.OP_WRITE);\n```\n\nAt this\
    \ point, the application typically enters an infinite loop where it accomplishes\
    \ the following tasks:\n\n- Performs a selection operation.\n- Obtains the selected\
    \ keys followed by an iterator over the selected keys.\n- Iterates over these\
    \ keys and performs channel operations.\n\nA selection operation is performed\
    \ by invoking one of `Selector`’s selection methods. For example, `int select()`\
    \ performs a blocking selection operation. It doesn’t return until at least one\
    \ channel is selected, until this selector’s `wakeup()` method is invoked, or\
    \ until the current thread is interrupted, whichever comes first.\n\n> **Note**\
    \  \n> `Selector` also declares an `int select(long timeout)` method that doesn’t\
    \ return until at least one channel is selected, until this selector’s `wakeup()`\
    \ method is invoked, until the current thread is interrupted, or until the `timeout`\
    \ value expires, whichever comes first. Additionally, `Selector` declares `int\
    \ selectNow()`, which is a nonblocking version of `select()`.\n\nThe `select()`\
    \ method returns the number of channels that have become ready since the last\
    \ time it was called. For example, if you call `select()` and it returns `1` because\
    \ one channel has become ready, and if you call `select()` again and a second\
    \ channel has become ready, `select()` will once again return `1`. If you’ve not\
    \ yet serviced the first ready channel, you now have two ready channels to service.\
    \ However, only one channel became ready between the two `select()` calls.\n\n\
    A set of the selected keys (the ready set) is now obtained by invoking `Selector`’s\
    \ `Set<SelectionKey> selectedKeys()` method. Invoke the set’s `iterator()` method\
    \ to obtain an iterator over these keys.\n\nFinally, the application iterates\
    \ over the keys. For each of the iterations, a `SelectionKey` instance is returned.\
    \ Some combination of `SelectionKey`’s `boolean isAcceptable()`, `boolean isConnectable()`,\
    \ `boolean isReadable()`, and `boolean isWritable()` methods is called to determine\
    \ if the key indicates that a channel is ready to accept a connection, is finished\
    \ connecting, is readable, or is writable.\n\n> **Note**  \n> The aforementioned\
    \ methods offer a convenient alternative to specifying expressions such as `key.readyOps()\
    \ & OP_READ != 0`. `SelectionKey`’s `int readyOps()` method returns the key’s\
    \ ready set. The returned set will only contain operation bits that are valid\
    \ for this key’s channel. For example, it never returns an operation bit that\
    \ indicates that a read-only channel is ready for writing. Note that every selectable\
    \ channel also declares an `int validOps()` method, which returns a bitwise ORed\
    \ set of operations that are valid for the channel.\n\nOnce the application determines\
    \ that a channel is ready to perform a specific operation, it can call `SelectionKey`’s\
    \ `SelectableChannel channel()` method to obtain the channel and then perform\
    \ work on that channel.\n\n> **Note**  \n> `SelectionKey` also declares a `Selector\
    \ selector()` method that returns the selector for which the key was created.\n\
    \nWhen you’re finished processing a channel, you must remove the key from the\
    \ set of keys; the selector doesn’t perform this task. The next time the channel\
    \ becomes ready, the `Selector` will add the key to the selected key set.\n\n\
    The following code fragment continues from the previous code fragment and demonstrates\
    \ the aforementioned tasks:\n\n```\nwhile (true)\n{\n    int numReadyChannels\
    \ = selector.select();\n    if (numReadyChannels == 0)\n        continue; // there\
    \ are no ready channels to process\n\n    Set<SelectionKey> selectedKeys = selector.selectedKeys();\n\
    \    Iterator<SelectionKey> keyIterator = selectedKeys.iterator();\n\n    while\
    \ (keyIterator.hasNext())\n    {\n        SelectionKey key = keyIterator.next();\n\
    \n        if (key.isAcceptable())\n        {\n            // A connection was\
    \ accepted by a ServerSocketChannel.\n            ServerSocketChannel server =\
    \ (ServerSocketChannel) key.channel();\n            SocketChannel client = server.accept();\n\
    \            if (client == null) // in case accept() returns null\n          \
    \      continue;\n            client.configureBlocking(false); // must be nonblocking\n\
    \            // Register socket channel with selector for read operations.\n \
    \           client.register(selector, SelectionKey.OP_READ);\n        }\n    \
    \    else\n        if (key.isReadable())\n        {\n            // A socket channel\
    \ is ready for reading.\n            SocketChannel client = (SocketChannel) key.channel();\n\
    \            // Perform work on the socket channel.\n        }\n        else\n\
    \        if (key.isWritable())\n        {\n            // A socket channel is\
    \ ready for writing.\n            SocketChannel client = (SocketChannel) key.channel();\n\
    \            // Perform work on the socket channel.\n        }\n\n        keyIterator.remove();\n\
    \    }\n}\n```\n\nAs well as registering the server socket channel with the selector,\
    \ each incoming client socket channel is also registered with the server socket\
    \ channel. When a client socket channel becomes ready for read or write operations,\
    \ either `key.isReadable()` or `key.isWritable()` for the associated socket channel\
    \ return true and the socket channel can be read or written.\n\nA key represents\
    \ a relationship between a selectable channel and a selector. This relationship\
    \ can be terminated by invoking `SelectionKey`’s `void cancel()` method. Upon\
    \ return, the key will be invalid and will have been added to its selector’s cancelled-key\
    \ set. The key will be removed from all of the selector’s key sets during the\
    \ next selection operation.\n\nWhen you’re finished with a selector, call `Selector`’s\
    \ `void close()` method. If a thread is currently blocked in one of this selector’s\
    \ selection methods, it’s interrupted as if by invoking the selector’s `wakeup()`\
    \ method. Any uncancelled keys still associated with this selector are invalidated,\
    \ their channels are deregistered, and any other resources associated with this\
    \ selector are released. If this selector is already closed, invoking `close()`\
    \ has no effect."
  raw: 'The second method also lets you pass an arbitrary `java.lang.Object` or a
    subclass instance (or `null`) to `att`. The non-null object is known as an attachment
    and is a convenient way of recognizing a given channel or attaching additional
    information to the channel. It’s stored in the `SelectionKey` instance returned
    from this method.


    Upon success, each method returns a `SelectionKey` instance that relates the selectable
    channel with the selector. Upon failure, an exception is thrown. For example,
    `java.nio.channels.ClosedChannelException` is thrown when the channel is closed
    and `java.nio.channels.IllegalBlockingModeException` is thrown when the channel
    hasn’t been set to nonblocking mode.


    The following code fragment extends the previous code fragment by configuring
    a previously created channel to nonblocking mode and registering the channel with
    the selector. The selection methods test the channel for accept, read, and write
    readiness:


    `channel.configureBlocking(false);`


    `SelectionKey key = channel.register(selector, SelectionKey.OP_ACCEPT |`


    `SelectionKey.OP_READ |`


    `SelectionKey.OP_WRITE);`


    At this point, the application typically enters an infinite loop where it accomplishes
    the following tasks:


    Performs a selection operation.   Obtains the selected keys followed by an iterator
    over the selected keys.   Iterates over these keys and performs channel operations.


    A selection operation is performed by invoking one of `Selector`’s selection methods.
    For example, `int select()` performs a blocking selection operation. It doesn’t
    return until at least one channel is selected, until this selector’s `wakeup()`
    method is invoked, or until the current thread is interrupted, whichever comes
    first.


    Note


    `Selector` also declares an `int select(long timeout)` method that doesn’t return
    until at least one channel is selected, until this selector’s `wakeup()` method
    is invoked, until the current thread is interrupted, or until the `timeout` value
    expires, whichever comes first. Additionally, `Selector` declares `int selectNow()`,
    which is a nonblocking version of `select()`.


    The `select()` method returns the number of channels that have become ready since
    the last time it was called. For example, if you call `select()` and it returns
    `1` because one channel has become ready, and if you call `select()` again and
    a second channel has become ready, `select()` will once again return `1`. If you’ve
    not yet serviced the first ready channel, you now have two ready channels to service.
    However, only one channel became ready between the two `select()` calls.


    A set of the selected keys (the ready set) is now obtained by invoking `Selector`’s
    `Set < SelectionKey > selectedKeys()` method. Invoke the set’s `iterator()` method
    to obtain an iterator over these keys.


    Finally, the application iterates over the keys. For each of the iterations, a
    `SelectionKey` instance is returned. Some combination of `SelectionKey`’s `boolean
    isAcceptable()`, `boolean isConnectable()`, `boolean isReadable()`, and `boolean
    isWritable()` methods is called to determine if the key indicates that a channel
    is ready to accept a connection, is finished connecting, is readable, or is writable.


    Note


    The aforementioned methods offer a convenient alternative to specifying expressions
    such as `key.readyOps() & OP_READ != 0\. SelectionKey`’s `int readyOps()` method
    returns the key’s ready set. The returned set will only contain operation bits
    that are valid for this key’s channel. For example, it never returns an operation
    bit that indicates that a read-only channel is ready for writing. Note that every
    selectable channel also declares an `int validOps()` method, which returns a bitwise
    ORed set of operations that are valid for the channel.


    Once the application determines that a channel is ready to perform a specific
    operation, it can call `SelectionKey`’s `SelectableChannel channel()` method to
    obtain the channel and then perform work on that channel.


    Note


    `SelectionKey` also declares a `Selector selector()` method that returns the selector
    for which the key was created.


    When you’re finished processing a channel, you must remove the key from the set
    of keys; the selector doesn’t perform this task. The next time the channel becomes
    ready, the `Selector` will add the key to the selected key set.


    The following code fragment continues from the previous code fragment and demonstrates
    the aforementioned tasks:


    `while (true)`


    `{`


    `int numReadyChannels = selector.select();`


    `if (numReadyChannels == 0)`


    `continue; // there are no ready channels to process`


    `Set<SelectionKey> selectedKeys = selector.selectedKeys();`


    `Iterator<SelectionKey> keyIterator = selectedKeys.iterator();`


    `while (keyIterator.hasNext())`


    `{`


    `SelectionKey key = keyIterator.next();`


    `if (key.isAcceptable())`


    `{`


    `// A connection was accepted by a ServerSocketChannel.`


    `ServerSocketChannel server = (ServerSocketChannel) key.channel();`


    `SocketChannel client = server.accept();`


    `if (client == null) // in case accept() returns null`


    `continue;`


    `client.configureBlocking(false); // must be nonblocking`


    `// Register socket channel with selector for read operations.`


    `client.register(selector, SelectionKey.OP_READ);`


    `}`


    `else`


    `if (key.isReadable())`


    `{`


    `// A socket channel is ready for reading.`


    `SocketChannel client = (SocketChannel) key.channel();`


    `// Perform work on the socket channel.`


    `}`


    `else`


    `if (key.isWritable())`


    `{`


    `// A socket channel is ready for writing.`


    `SocketChannel client = (SocketChannel) key.channel();`


    `// Perform work on the socket channel.`


    `}`


    `keyIterator.remove();`


    `}`


    `}`


    As well as registering the server socket channel with the selector, each incoming
    client socket channel is also registered with the server socket channel. When
    a client socket channel becomes ready for read or write operations, either `key.isReadable()`
    or `key.isWritable()` for the associated socket channel return true and the socket
    channel can be read or written.


    A key represents a relationship between a selectable channel and a selector. This
    relationship can be terminated by invoking `SelectionKey`’s `void cancel()` method.
    Upon return, the key will be invalid and will have been added to its selector’s
    cancelled-key set. The key will be removed from all of the selector’s key sets
    during the next selection operation.


    When you’re finished with a selector, call `Selector`’s `void close()` method.
    If a thread is currently blocked in one of this selector’s selection methods,
    it’s interrupted as if by invoking the selector’s `wakeup()` method. Any uncancelled
    keys still associated with this selector are invalidated, their channels are deregistered,
    and any other resources associated with this selector are released. If this selector
    is already closed, invoking `close()` has no effect.'
  trans: '

    第二种方法还允许您将一个任意的 `java.lang.Object` 或子类实例（或 `null`）传递给 `att`。非空对象被称为附件，它是识别特定通道或为通道附加额外信息的一种便捷方式。该对象存储在此方法返回的
    `SelectionKey` 实例中。


    成功时，每个方法都会返回一个 `SelectionKey` 实例，该实例将可选择通道与选择器关联起来。失败时，则会抛出异常。例如，当通道关闭时会抛出 `java.nio.channels.ClosedChannelException`，当通道未设置为非阻塞模式时会抛出
    `java.nio.channels.IllegalBlockingModeException`。


    以下代码片段扩展了之前的代码片段，将先前创建的通道配置为非阻塞模式，并将该通道注册到选择器。选择方法会测试通道是否已准备好进行接受、读取和写入操作：


    `channel.configureBlocking(false);`


    `SelectionKey key = channel.register(selector, SelectionKey.OP_ACCEPT |`


    `SelectionKey.OP_READ |`


    `SelectionKey.OP_WRITE);`


    此时，应用程序通常会进入一个无限循环，在此循环中完成以下任务：


    执行选择操作。   获取已选择的键，然后通过迭代器遍历这些键。   遍历这些键并执行通道操作。


    选择操作通过调用 `Selector` 的某个选择方法来执行。例如，`int select()` 执行阻塞选择操作。它直到至少有一个通道被选中、此选择器的
    `wakeup()` 方法被调用、或当前线程被中断时才会返回，以先发生者为准。


    注意


    `Selector` 还声明了一个 `int select(long timeout)` 方法，该方法直到至少有一个通道被选中、此选择器的 `wakeup()`
    方法被调用、当前线程被中断、或 `timeout` 值到期时才会返回，以先发生者为准。此外，`Selector` 声明了 `int selectNow()`，这是
    `select()` 的非阻塞版本。


    `select()` 方法返回自上次调用以来已就绪的通道数量。例如，如果您调用 `select()` 并且它返回 `1`，因为一个通道已就绪；如果您再次调用
    `select()` 并且第二个通道已就绪，`select()` 将再次返回 `1`。如果您尚未处理第一个就绪的通道，那么您现在有两个就绪通道需要处理。然而，在两次
    `select()` 调用之间，只有一个通道变为就绪状态。


    现在，通过调用 `Selector` 的 `Set < SelectionKey > selectedKeys()` 方法来获取已选择键的集合（就绪集合）。调用该集合的
    `iterator()` 方法以获取遍历这些键的迭代器。


    最后，应用程序遍历这些键。每次迭代都会返回一个 `SelectionKey` 实例。会调用 `SelectionKey` 的 `boolean isAcceptable()`、`boolean
    isConnectable()`、`boolean isReadable()` 和 `boolean isWritable()` 方法中的某些组合，以确定该键是否指示通道已准备好接受连接、已完成连接、可读或可写。


    注意


    上述方法提供了一种便捷的替代方案，无需编写诸如 `key.readyOps() & OP_READ != 0` 这样的表达式。`SelectionKey`
    的 `int readyOps()` 方法返回该键的就绪集合。返回的集合仅包含对此键的通道有效的操作位。例如，它永远不会返回指示只读通道已准备好写入的操作位。请注意，每个可选择通道还声明了一个
    `int validOps()` 方法，该方法返回对该通道有效的操作按位或的结果集。


    一旦应用程序确定某个通道已准备好执行特定操作，它可以调用 `SelectionKey` 的 `SelectableChannel channel()` 方法来获取该通道，然后在该通道上执行工作。


    注意


    `SelectionKey` 还声明了一个 `Selector selector()` 方法，该方法返回创建该键时所针对的选择器。


    当您完成对某个通道的处理后，必须从键集合中移除该键；选择器不会执行此任务。下次该通道变为就绪状态时，`Selector` 会将该键添加到已选择的键集合中。


    以下代码片段延续了之前的代码片段，并演示了上述任务：


    `while (true)`


    `{`


    `int numReadyChannels = selector.select();`


    `if (numReadyChannels == 0)`


    `continue; // 没有需要处理的就绪通道`


    `Set<SelectionKey> selectedKeys = selector.selectedKeys();`


    `Iterator<SelectionKey> keyIterator = selectedKeys.iterator();`


    `while (keyIterator.hasNext())`


    `{`


    `SelectionKey key = keyIterator.next();`


    `if (key.isAcceptable())`


    `{`


    `// 一个连接已被 ServerSocketChannel 接受。`


    `ServerSocketChannel server = (ServerSocketChannel) key.channel();`


    `SocketChannel client = server.accept();`


    `if (client == null) // 以防 accept() 返回 null`


    `continue;`


    `client.configureBlocking(false); // 必须为非阻塞`


    `// 将套接字通道注册到选择器以进行读取操作。`


    `client.register(selector, SelectionKey.OP_READ);`


    `}`


    `else`


    `if (key.isReadable())`


    `{`


    `// 一个套接字通道已准备好进行读取。`


    `SocketChannel client = (SocketChannel) key.channel();`


    `// 在套接字通道上执行工作。`


    `}`


    `else`


    `if (key.isWritable())`


    `{`


    `// 一个套接字通道已准备好进行写入。`


    `SocketChannel client = (SocketChannel) key.channel();`


    `// 在套接字通道上执行工作。`


    `}`


    `keyIterator.remove();`


    `}`


    `}`


    除了将服务器套接字通道注册到选择器之外，每个传入的客户端套接字通道也会注册到服务器套接字通道。当客户端套接字通道准备好进行读取或写入操作时，关联套接字通道的
    `key.isReadable()` 或 `key.isWritable()` 会返回 true，并且可以对该套接字通道进行读取或写入。


    一个键表示一个可选择通道与一个选择器之间的关系。可以通过调用 `SelectionKey` 的 `void cancel()` 方法来终止此关系。返回后，该键将失效，并会被添加到其选择器的已取消键集合中。在下一次选择操作期间，该键将从选择器的所有键集合中移除。


    当您完成对选择器的使用后，请调用 `Selector` 的 `void close()` 方法。如果某个线程当前正阻塞在此选择器的某个选择方法中，该线程会被中断，就像调用了选择器的
    `wakeup()` 方法一样。任何仍与此选择器关联的未取消键都将失效，其通道将被取消注册，并且与此选择器关联的任何其他资源都将被释放。如果此选择器已关闭，则调用
    `close()` 不会产生任何效果。

    '
- fmt: "# Selector Demonstration\n\nSelectors are commonly used in server applications.\
    \ Listing [8-1](#A978-1-4842-1565-4_8_Chapter.html#FPar7) shows the source code\
    \ of a server application that sends its local time to clients.\n\n**Listing 8-1.**\
    \ Serving Time to Clients\n\n```\nimport java.io.IOException;\nimport java.net.InetSocketAddress;\n\
    import java.net.ServerSocket;\nimport java.nio.ByteBuffer;\nimport java.nio.channels.SelectionKey;\n\
    import java.nio.channels.Selector;\nimport java.nio.channels.ServerSocketChannel;\n\
    import java.nio.channels.SocketChannel;\nimport java.util.Iterator;\n\npublic\
    \ class SelectorServer\n{\n   final static int DEFAULT_PORT = 9999;\n   static\
    \ ByteBuffer bb = ByteBuffer.allocateDirect(8);\n\n   public static void main(String[]\
    \ args) throws IOException\n   {\n      int port = DEFAULT_PORT;\n      if (args.length\
    \ > 0)\n         port = Integer.parseInt(args[0]);\n      System.out.println(\"\
    Server starting ... listening on port \" + port);\n      ServerSocketChannel ssc\
    \ = ServerSocketChannel.open();\n      ServerSocket ss = ssc.socket();\n     \
    \ ss.bind(new InetSocketAddress(port));\n      ssc.configureBlocking(false);\n\
    \      Selector s = Selector.open();\n      ssc.register(s, SelectionKey.OP_ACCEPT);\n\
    \      while (true)\n      {\n         int n = s.select();\n         if (n ==\
    \ 0)\n            continue;\n         Iterator it = s.selectedKeys().iterator();\n\
    \         while (it.hasNext())\n         {\n            SelectionKey key = (SelectionKey)\
    \ it.next();\n            if (key.isAcceptable())\n            {\n           \
    \    SocketChannel sc;\n               sc = ((ServerSocketChannel) key.channel()).accept();\n\
    \               if (sc == null)\n                  continue;\n               System.out.println(\"\
    Receiving connection\");\n               bb.clear();\n               bb.putLong(System.currentTimeMillis());\n\
    \               bb.flip();\n               System.out.println(\"Writing current\
    \ time\");\n               while (bb.hasRemaining())\n                  sc.write(bb);\n\
    \               sc.close();\n            }\n            it.remove();\n       \
    \  }\n      }\n   }\n}\n```\n\nListing [8-1](#A978-1-4842-1565-4_8_Chapter.html#FPar7)’s\
    \ server application consists of a `SelectorServer` class. This class allocates\
    \ a direct byte buffer after this class is loaded.\n\nWhen the `main()` method\
    \ is executed, it first checks for a command-line argument, which is assumed to\
    \ represent a port number. If no argument is specified, a default port number\
    \ is used; otherwise, `main()` tries to convert it to an integer representing\
    \ the port by passing the argument to `Integer.parseInt()`. (This method throws\
    \ `java.lang.NumberFormatException` when a noninteger argument is passed.)\n\n\
    After outputting a startup message that identifies the listening port, `main()`\
    \ obtains a server socket channel followed by the underlying socket, which is\
    \ bound to the specified port. The server socket channel is then configured for\
    \ nonblocking mode in preparation for registering this channel with a selector.\n\
    \nA selector is now obtained and the server socket channel registers itself with\
    \ the selector so that it can learn when the channel is ready to perform an accept\
    \ operation. The returned key isn’t saved because it’s never cancelled (and the\
    \ selector is never closed).\n\n`main()` now enters an infinite loop, first invoking\
    \ the selector’s `select()` method. If the server socket channel isn’t ready (`select()`\
    \ returns `0`), the rest of the loop is skipped.\n\nThe selected keys (just one\
    \ key in the example) along with an iterator for iterating over them are now obtained\
    \ and `main()` enters an inner loop to loop over these keys. Each key’s `isAcceptable()`\
    \ method is invoked to find out if the server socket channel is ready to perform\
    \ an accept operation. If this is the case, the channel is obtained and cast to\
    \ `ServerSocketChannel`, and `ServerSocketChannel`’s `accept()` method is called\
    \ to accept the new connection.\n\nTo guard against the unlikely possibility of\
    \ the returned `SocketChannel` instance being null (`accept()` returns null when\
    \ the server socket channel is in nonblocking mode and no connection is available\
    \ to be accepted), `main()` tests for this scenario and continues the loop when\
    \ null is detected.\n\nA message about receiving a connection is output and the\
    \ byte buffer is cleared in preparation for storing the local time. After this\
    \ long integer has been stored in the buffer, the buffer is flipped in preparation\
    \ for draining. A message about writing the current time is output and the buffer\
    \ is drained. The socket channel is then closed and the key is removed from the\
    \ set of keys.\n\nCompile Listing [8-1](#A978-1-4842-1565-4_8_Chapter.html#FPar7)\
    \ as follows:\n\n```\njavac SelectorServer.java\n```\n\nRun the resulting application\
    \ as follows:\n\n```\njava SelectorServer\n```\n\nYou should observe the following\
    \ output and the server should continue to run:\n\n```\nServer starting ... listening\
    \ on port 9999\n```\n\nWe need a client to exercise this server. Listing [8-2](#A978-1-4842-1565-4_8_Chapter.html#FPar7)\
    \ shows the source code of a sample client application.\n\n**Listing 8-2.** Receiving\
    \ Time from the Server\n\n```\nimport java.io.IOException;\nimport java.net.InetSocketAddress;\n\
