    `ConnectionHandler` 是一个 `CompletionHandler`，用于响应传入的连接。当连接成功时，会调用其 `completed()`
    方法；否则，会调用其 `failed()` 方法。


    `completed()` 方法的第一个任务是获取并输出客户端的套接字地址以进行标识。我指定了 `channelClient.getRemoteAddress()`
    而不是 `channelClient.getLocalAddress()` 来返回客户端的套接字地址，因为与 `channelClient` 对应的套接字是在服务器端创建的，并且它与客户端套接字通信。在
    `channelClient` 上调用 `getLocalAddress()` 会返回服务器端的套接字地址。在 `channelClient` 上调用 `getRemoteAddress()`
    会返回客户端的套接字地址。


    接下来，`completed()` 在服务器套接字通道上调用 `accept()`，并将传入的 `Attachment` 对象和当前完成处理器的引用作为参数。此调用允许服务器响应下一个传入的连接。


    `accept()` 方法在从传递给 `completed()` 的 `Attachment` 对象引用的服务器套接字通道上调用。同一个对象作为第一个参数传递给
    `accept()`。`Attachment` 对象中的其他字段均未初始化，因为它们不是必需的。此 `Attachment` 对象仅用于标识服务器套接字通道。


