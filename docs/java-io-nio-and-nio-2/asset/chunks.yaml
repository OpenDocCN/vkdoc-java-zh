    \ 和 `size`。  \n答案是 true：你可以通过调用 `BasicFileAttributeView` 的 `BasicFileAttributes`\
    \ `readAttributes()` 方法来批量读取基本属性。你也可以间接地通过调用 `Files` 类的 `<A extends BasicFileAttributes>\
    \ A readAttributes(Path path, Class<A> type, LinkOption... options)` 方法来完成此任务，并将\
    \ `BasicFileAttributes.class` 传递给 `type` 参数。  \n文件键是一个标识符或标识符的组合，用于唯一标识一个文件。 \
    \ \n当你调用 `Files` 类的 `getAttribute()` 或 `setAttribute()` 方法来获取或设置基本或其他类型的属性值时，标识属性必须遵循的语法是\
    \ `[view-name:]attribute-name`。对于基本属性，你不需要指定 `view-name`，因为 `basic` 是默认的 `view-name`。\
    \  \n`UserPrincipal` 表示用于确定文件系统中对象访问权限的身份，并扩展了 `Principal`。`GroupPrincipal` 表示组身份，并扩展了\
    \ `UserPrincipal`。  \n在 Windows 操作系统上，当无法将安全 ID 分配为所有者时，`FileOwnerAttributeView`\
    \ 的 `setOwner()` 方法会抛出 `FileSystemException`，该所有者必须是您被授予分配所有者权限的用户或组之一。解决方案是提升\
    \ `Java` 应用程序的权限。  \n`AclEntry` 的组成部分是 `type`、`principal`、`permissions` 和 `flags`。这些组成部分由\
    \ `AclEntryType`、`UserPrincipal`、`AclEntryPermission` 和 `AclEntryFlag` 类型描述。 \
    \ \n答案是 true：你可以定义自己的文件属性。使用 `UserDefinedFileAttributeView` 类型来完成此任务。  \n`FileStoreAttributeView`\
    \ 支持的属性是 `totalSpace`、`unallocatedSpace` 和 `usableSpace`。你可以通过将这些名称传递给 `FileStore`\
    \ 的 `getAttribute()` 方法来访问这些属性的值，尽管更推荐通过 `FileStore` 的类型安全方法 `getTotalSpace()`、`getUnallocatedSpace()`\
    \ 和 `getUsableSpace()` 来访问它们。  \n答案是 false：`!exists(path)` 不等同于 `notExists(path)`。\
    \  \n`isDirectory()` 方法关于符号链接的默认策略是跟踪它们。如果你不想跟踪符号链接，请将 `LinkOption.NOFOLLOW_LINKS`\
    \ 传递给此方法。  \n使用 `exists()`、`notExists()`、`isExecutable()`、`isReadable()` 和 `isWritable()`\
    \ 的返回值时应小心，因为这些返回值会立即过时。在方法调用和其结果被使用之间，文件系统可能会发生变化。  \n当调用 `createFile()` 方法创建已存在的文件时，会抛出\
    \ `FileAlreadyExistsException`。  \n可选的特定异常是指当底层操作系统能够检测到导致异常的特定错误时抛出的异常。如果无法检测到该错误，则会抛出其父类\
    \ `IOException`。  \n你可以在创建文件时设置 POSIX 文件权限，方法是调用 `PosixFilePermissions` 类的 `FileAttribute<Set<PosixFilePermission>>\
    \ asFileAttribute(Set<PosixFilePermission> perms)` 方法来创建一个封装了给定文件权限副本的 `FileAttribute`，然后将\
