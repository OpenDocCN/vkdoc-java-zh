    ## 缓冲区及其子类


    缓冲区由继承自抽象类 `java.nio.Buffer` 的类实现。表 6-1 描述了 `Buffer` 的方法。


    表 6-1. `Buffer` 方法


    | 方法 | 描述 |

    | --- | --- |

    | `Object array()` | 返回支持此缓冲区的数组。此方法旨在允许将数组支持的缓冲区更高效地传递给本地代码。具体子类会重写此方法，并通过协变返回类型提供更强类型的返回值。当此缓冲区由数组支持但为只读时，此方法抛出
    `java.nio.ReadOnlyBufferException`；当此缓冲区没有可访问的数组支持时，抛出 `java.lang.UnsupportedOperationException`。
    |

    | `int arrayOffset()` | 返回此缓冲区第一个元素在其支持数组中的偏移量。当此缓冲区由数组支持时，缓冲区位置 `p` 对应数组索引 `p
    + arrayOffset()`。在调用此方法前，请先调用 `hasArray()` 以确保此缓冲区有可访问的支持数组。当此缓冲区由数组支持但为只读时，此方法抛出
    `ReadOnlyBufferException`；当此缓冲区没有可访问的数组支持时，抛出 `UnsupportedOperationException`。
    |

    | `int capacity()` | 返回此缓冲区的容量。 |

    | `Buffer clear()` | 清除此缓冲区。位置被设为 `0`，限制被设为容量，标记被丢弃。此方法不会擦除缓冲区中的数据，但之所以如此命名，是因为它最常用于可能擦除数据的情况。
    |

    | `Buffer flip()` | 翻转此缓冲区。限制被设为当前位置，然后位置被设为 `0`。如果定义了标记，则丢弃它。 |

    | `boolean hasArray()` | 当此缓冲区由数组支持且不是只读时返回 `true`；否则返回 `false`。当此方法返回 `true`
    时，可以安全地调用 `array()` 和 `arrayOffset()`。 |

    | `boolean hasRemaining()` | 当此缓冲区中至少还有一个元素（即当前位置和限制之间）时返回 `true`；否则返回 `false`。
    |

    | `boolean isDirect()` | 当此缓冲区是直接字节缓冲区（本章稍后讨论）时返回 `true`；否则返回 `false`。 |

    | `boolean isReadOnly()` | 当此缓冲区是只读时返回 `true`，否则返回 `false`。 |

    | `int limit()` | 返回此缓冲区的限制。 |

    | `Buffer limit(int newLimit)` | 将此缓冲区的限制设为 `newLimit`。当位置大于 `newLimit` 时，位置被设为
    `newLimit`。当定义了标记且标记大于 `newLimit` 时，丢弃标记。当 `newLimit` 为负数或大于此缓冲区的容量时，此方法抛出 `java.lang.IllegalArgumentException`；否则返回此缓冲区。
    |

    | `Buffer mark()` | 将此缓冲区的标记设为其位置并返回此缓冲区。 |

    | `int position()` | 返回此缓冲区的位置。 |

    | `Buffer position(int newPosition)` | 将此缓冲区的位置设为 `newPosition`。当定义了标记且标记大于 `newPosition`
    时，丢弃标记。当 `newPosition` 为负数或大于此缓冲区的当前限制时，此方法抛出 `IllegalArgumentException`；否则返回此缓冲区。
    |

    | `int remaining()` | 返回当前位置和限制之间的元素数量。 |

    | `Buffer reset()` | 将此缓冲区的位置重置为先前标记的位置。调用此方法不会更改或丢弃标记的值。当标记尚未设置时，此方法抛出 `java.nio.InvalidMarkException`；否则返回此缓冲区。
    |

    | `Buffer rewind()` | 倒带并返回此缓冲区。位置被设为 `0`，标记被丢弃。 |


    表 6-1 显示，`Buffer` 的许多方法返回 `Buffer` 引用，以便你可以将实例方法调用链接在一起。例如，不必指定以下三行：


    `buf.mark();`


    `buf.position(2);`


    `buf.reset();`


    你可以更方便地指定以下一行：


    `buf.mark().position(2).reset();`


    表 6-1 还显示，所有缓冲区都可以读取，但并非所有缓冲区都可以写入——例如，由只读内存映射文件支持的缓冲区。你不能写入只读缓冲区；否则会抛出 `ReadOnlyBufferException`。在尝试写入缓冲区之前，如果你不确定缓冲区是否可写，请调用
    `isReadOnly()`。


    警告


    缓冲区不是线程安全的。当你希望从多个线程访问缓冲区时，必须使用同步机制。


    `java.nio` 包包含几个扩展 `Buffer` 的抽象类，每个类对应一个原始类型（布尔类型除外）：`ByteBuffer`、`CharBuffer`、`DoubleBuffer`、`FloatBuffer`、`IntBuffer`、`LongBuffer`
    和 `ShortBuffer`。此外，该包还包含 `MappedByteBuffer` 作为 `ByteBuffer` 的抽象子类。


    注意


    操作系统执行面向字节的 I/O，你可以使用 `ByteBuffer` 创建面向字节的缓冲区，用于存储要写入目标或从源读取的字节。其他原始类型缓冲区类允许你创建多字节视图缓冲区（稍后讨论），以便你可以在概念上以字符、双精度浮点值、32
    位整数等形式执行 I/O。然而，I/O 操作实际上是以字节流的形式进行的。


    清单 6-1 通过 `ByteBuffer` 演示了 `Buffer` 类的容量、限制、位置和剩余元素。


    清单 6-1. 演示面向字节的缓冲区


    `import java.nio.Buffer;`


    `import java.nio.ByteBuffer;`


    `public class BufferDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `Buffer buffer = ByteBuffer.allocate(7);`


    `System.out.println("Capacity: " + buffer.capacity());`


    `System.out.println("Limit: " + buffer.limit());`


    `System.out.println("Position: " + buffer.position());`


    `System.out.println("Remaining: " + buffer.remaining());`


    `System.out.println("Changing buffer limit to 5");`


    `buffer.limit(5);`


    `System.out.println("Limit: " + buffer.limit());`


    `System.out.println("Position: " + buffer.position());`


    `System.out.println("Remaining: " + buffer.remaining());`


    `System.out.println("Changing buffer position to 3");`


    `buffer.position(3);`


    `System.out.println("Position: " + buffer.position());`


    `System.out.println("Remaining: " + buffer.remaining());`


    `System.out.println(buffer);`


    `}`


    `}`


    清单 6-1 的 `main()` 方法首先需要获取一个缓冲区。它不能实例化 `Buffer` 类，因为该类是抽象的。相反，它使用 `ByteBuffer`
    类及其 `allocate()` 类方法来分配图 6-1 中所示的七字节缓冲区。然后 `main()` 调用各种 `Buffer` 方法来演示容量、限制、位置和剩余元素。


    按如下方式编译清单 6-1：


    `javac BufferDemo.java`


    按如下方式运行生成的应用程序：


    `java BufferDemo`


    你应该会看到以下输出：


    `Capacity: 7`


    `Limit: 7`


    `Position: 0`


    `Remaining: 7`


    `Changing buffer limit to 5`


    `Limit: 5`


    `Position: 0`


    `Remaining: 5`


    `Changing buffer position to 3`


    `Position: 3`


    `Remaining: 2`


    `java.nio.HeapByteBuffer[pos=3 lim=5 cap=7]`


    最后一行输出显示，分配给 `buffer` 的 `ByteBuffer` 实例实际上是包私有类 `java.nio.HeapByteBuffer` 的一个实例。

