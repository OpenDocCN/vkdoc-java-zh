    ## Exploring Formattable and FormattableFlags


    `Formatter` is accompanied by a `java.util.Formattable` interface and a `java.util.FormattableFlags`
    class that collectively support limited formatting customization for arbitrary
    user-defined types.


    `Formattable` is implemented by any class that needs to perform custom formatting
    using [`Formatter`](https://docs.oracle.com/javase/8/docs/api/java/util/Formatter.html#class%20in%20java.util)
    ’s “`s`” (format argument as string) conversion character. This interface allows
    basic control for formatting arbitrary objects.


    `Formattable` declares the following method, which is called by `Formatter`’s
    `format()` methods to perform custom formatting:


    `void formatTo(` [`Formatter`](https://docs.oracle.com/javase/8/docs/api/java/util/Formatter.html#class%20in%20java.util)
    `formatter, int flags, int width, int precision)`


    These parameters have the following meanings:


    *   `formatter` is the `Formatter` object that holds the locale and is where you
    send the output when it’s done.

    *   `flags` is a bitmask of `FormattableFlags` constants: `ALTERNATE` (the user
    specified `#` for alternate formatting), `LEFT_JUSTIFY` (the user specified `-`
    for left justification), and `UPPERCASE` (the user specified `S` for locale-based
    conversion to uppercase).

    *   `width` is the minimum number of characters to be written to the output. If
    the length of the converted value is less than the width, the output will be padded
    by space characters until the total number of characters equals the width. By
    default, the padding is at the beginning of the output. If [`FormattableFlags.LEFT_JUSTIFY`](https://docs.oracle.com/javase/8/docs/api/java/util/FormattableFlags.html#LEFT_JUSTIFY)
    is specified, the padding will be at the end. If width is `-1`, there is no minimum.

    *   `precision` is the maximum number of characters to be written to the output.
    Because the precision is applied before the width, the output will be truncated
    to precision characters even when the width is greater than the precision. If
    precision is `-1`, there is no explicit limit on the number of characters in the
    output.


    The `width` and `precision` parameters may seem confusing. To help you understand
    them, consider the following examples:


    `System.out.printf("[%10.2s]%n", "ABC");`


    `System.out.printf("[%10.12s]%n", "ABC");`


    `System.out.printf("[%10.2s]%n", "ABCDEFGHIJKLMNOP");`


    `System.out.printf("[%10.12s]%n", "ABCDEFGHIJKLMNOP");`


