  trans: "\n## 摘要\n\nJDK 7 通过扩展 `DatagramChannel`、`ServerSocketChannel` 和 `SocketChannel`\
    \ 类以支持绑定和选项配置，完善了套接字通道功能。这些能力在 `NetworkChannel` 接口中声明，上述类及其他类均实现了该接口。\n\nJDK 7\
    \ 还通过引入基于通道的多播支持，进一步完善了套接字通道功能。该支持包括 `MulticastChannel`（一个扩展了 `NetworkChannel`\
    \ 的接口）、`MembershipKey` 类，以及 `DatagramChannel` 类中的 `open(ProtocolFamily)` 方法。\n\
    \n附录 A 提供了每章练习题的答案。\n\n# 第五部分\n附录\n\n# 练习题答案\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​15](http://dx.doi.org/10.1007/978-1-4842-1565-4_15))\
    \ 包含补充材料，仅供授权用户使用。\n\n从第 1 章到第 14 章的每一章末尾都有一个“练习题”部分，用于测试你对本章内容的理解。这些练习题的答案将在本附录中给出。\n\
    \n## 第 1 章：I/O 基础与 API\n\n构成经典 I/O 的 API 类别包括 `File`、`RandomAccessFile`、流类以及写入器/读取器类。\
    \  \n`try`-with-resources 语句的好处是减少了冗长代码。你可以使用此语句自动关闭打开的文件和其他资源，而无需提供这些资源关闭代码。\
    \  \n构成 NIO 的 API 类别包括缓冲区、通道、选择器、正则表达式、字符集以及一个主要基于 `Formatter` 类的 `printf` 风格格式化工具。\
    \  \n`Selector` 类（及相关类型）让 Java 程序能够利用就绪选择功能。  \n构成 NIO.2 的 API 类别包括改进的文件系统接口、异步\
    \ I/O 以及套接字通道功能的完善。  \nNIO.2 通过向 `DatagramChannel`、`ServerSocketChannel` 和 `SocketChannel`\
    \ 类添加绑定支持和选项配置，完善了套接字通道功能。它还引入了一个 `MulticastChannel` 接口。\n\n## 第 2 章：File\n\n\
    `File` 类的目的是提供对底层操作系统可用文件系统的访问。  \n`File` 类的实例包含其文件系统中可能不存在的文件和目录的路径。  \n路径是一个紧凑的映射，用于定位和标识文件系统对象（也称为文件）。\
    \  \n绝对路径和相对路径的区别如下：绝对路径以根目录符号开头；无需其他信息即可定位其所表示的文件/目录。相比之下，相对路径不以根目录符号开头；它通过从另一个路径获取的信息进行解释。\
    \  \n你可以通过指定 `System.getProperty(\"user.dir\")` 来获取当前用户目录（也称为工作目录）。  \n父路径由除最后一个名称之外的所有路径组件组成。\
    \  \n规范化意味着将分隔符字符替换为默认的名称分隔符字符，以使路径符合底层文件系统。  \n你可以通过访问 `File` 的 `separator` 和\
    \ `separatorChar` 类字段来获取默认的名称分隔符字符。第一个字段将字符存储为 `char`，第二个字段将其存储为 `String`。  \n\
    规范路径是绝对且唯一的路径，并且每次都以相同的方式格式化。  \n`File` 的 `getParent()` 和 `getName()` 方法的区别在于：`getParent()`\
    \ 返回父路径，而 `getName()` 返回路径名称序列中的最后一个名称。  \n答案是 false：`File` 的 `exists()` 方法用于确定文件或目录是否存在。\
    \  \n普通文件（也称为常规文件）不是目录，并且满足其他依赖于操作系统的标准：例如，它不是符号链接或命名管道。由 Java 应用程序创建的任何非目录文件都保证是普通文件。\
    \  \n`File` 的 `lastModified()` 方法返回此 `File` 对象路径所表示的文件最后修改的时间，如果文件不存在或在此方法调用期间发生\
    \ I/O 错误，则返回 0。返回值以自 Unix 纪元（1970 年 1 月 1 日 00:00:00 GMT）以来的毫秒数为单位。  \n`File`\
    \ 的 `listRoots()` 方法返回一个 `File` 对象数组，这些对象表示可用文件系统的根目录。  \n答案是 true：`File` 的 `list()`\
    \ 方法返回一个 `String` 数组，其中每个条目都是文件名，而不是完整路径。  \n`FilenameFilter` 和 `FileFilter` 接口的区别如下：`FilenameFilter`\
    \ 声明了一个 `boolean accept(File dir, String name)` 方法，而 `FileFilter` 声明了一个 `boolean\
    \ accept(String path)` 方法。两种方法都完成相同的任务，即接受（返回 `true`）或拒绝（返回 `false`）将参数标识的文件或目录包含在目录列表中。\
    \  \n答案是 false：`File` 的 `createNewFile()` 方法在一个原子操作中检查文件是否存在，并在文件不存在时创建它，该操作相对于所有可能影响该文件的其他文件系统活动是原子的。\
    \  \n`File` 的 `createTempFile(String, String)` 方法创建临时文件的默认临时目录可以通过读取 `java.io.tmpdir`\
    \ 系统属性来定位。  \n你可以通过调用 `File` 的 `deleteOnExit()` 方法注册临时文件以在 Java 虚拟机正常结束时（不会崩溃且不会断电）删除，从而确保临时文件被删除。\
    \  \n`boolean canExecute()` 方法由 Java 6 引入。当抽象路径标识的文件或目录对象存在且可执行时，它返回 `true`。 \
    \ \n要准确比较两个 `File` 对象，应首先在每个 `File` 对象上调用 `File` 的 `getCanonicalFile()` 方法，然后比较返回的\
    \ `File` 对象。  \n清单 A-1 展示了第 2 章中要求的 `Touch` 应用程序。  \n清单 A-1\\. 将文件或目录的时间戳设置为当前时间\n\
    \n`import java.io.File;`\n\n`import java.util.Date;`\n\n`public class Touch`\n\
    \n`{`\n\n`public static void main(String[] args)`\n\n`{`\n\n`if (args.length !=\
    \ 1)`\n\n`{`\n\n`System.err.println(\"usage: java Touch path\");`\n\n`return;`\n\
    \n`}`\n\n`new File(args[0]).setLastModified(new Date().getTime());`\n\n`}`\n\n\
    `}`\n"
- fmt: "# [Chapter 3](#A978-1-4842-1565-4_3_Chapter.html): RandomAccessFile\n\nThe\
    \ purpose of the `RandomAccessFile` class is to create and/or open files for random\
    \ access in which a mixture of write and read operations at various locations\
    \ can occur until the file is closed.\n\nA file’s metadata is data about the file\
    \ and not the actual file contents. Examples of metadata include the file’s length\
    \ and the time the file was last modified.\n\nThe purpose of the `\"rwd\"` and\
    \ `\"rws\"` mode arguments is to ensure than any writes to a file located on a\
    \ local storage device are written to the device, which guarantees that critical\
    \ data isn’t lost when the system crashes. No guarantee is made when the file\
    \ doesn’t reside on a local device.\n\nA file pointer is a cursor that identifies\
    \ the location of the next byte to write or read. When an existing file is opened,\
    \ the file pointer is set to its first byte at offset 0. The file pointer is also\
    \ set to 0 when the file is created.\n\nWhen you write past the end of the file,\
    \ the file is extended.\n\nThe answer is false: when you call `RandomAccessFile`’s\
    \ `seek(long)` method to set the file pointer’s value, and when this value is\
    \ greater than the length of the file, the file’s length doesn’t change. The file\
    \ length will only change by writing after the offset has been set beyond the\
    \ end of the file.\n\nMethod `void write(int b)` writes the lower eight bits of\
    \ `b` to the file at the current file pointer position.\n\n`FileDescriptor`’s\
    \ `sync()` method tells the underlying operating system to empty the contents\
    \ of the open file’s output buffers to their associated local disk device. `sync()`\
    \ returns after all modified data and attributes have been written to the relevant\
    \ device.\n\nA flat file database is a single file organized into records and\
    \ fields. A record stores a single entry (such as a part in a parts database)\
    \ and a field stores a single attribute of the entry (such as a part number).\n\
    \nListing [A-2](#A978-1-4842-1565-4_15_Chapter.html#FPar2) presents the `RAFDemo`\
    \ application that was called for in [Chapter 3](#A978-1-4842-1565-4_3_Chapter.html).\n\
    \nListing A-2. Demonstrating `RandomAccessFile`\n\n```\nimport java.io.IOException;\n\
    import java.io.RandomAccessFile;\n\npublic class RAFDemo\n{\n   final static String\
    \ MSG = \"Test\";\n\n   public static void main(String[] args)\n   {\n      try\
    \ (RandomAccessFile raf = new RandomAccessFile(\"data\", \"rw\"))\n      {\n \
    \        raf.writeInt(127);\n         raf.writeChars(MSG);\n         raf.seek(0);\n\
    \         System.out.println(raf.readInt());\n         for (int i = 0; i < MSG.length();\
    \ i++)\n            System.out.print(raf.readChar());\n         System.out.println();\n\
    \      }\n      catch (IOException ioe)\n      {\n         ioe.printStackTrace();\n\
    \      }\n   }\n}\n```\n\n## [Chapter 4](#A978-1-4842-1565-4_4_Chapter.html):\
    \ Streams"
  raw: '## [Chapter 3](#A978-1-4842-1565-4_3_Chapter.html): RandomAccessFile


    The purpose of the `RandomAccessFile` class is to create and/or open files for
    random access in which a mixture of write and read operations at various locations
    can occur until the file is closed.   A file’s metadata is data about the file
    and not the actual file contents. Examples of metadata include the file’s length
    and the time the file was last modified.   The purpose of the `"rwd"` and `"rws"`
    mode arguments is to ensure than any writes to a file located on a local storage
    device are written to the device, which guarantees that critical data isn’t lost
    when the system crashes. No guarantee is made when the file doesn’t reside on
    a local device.   A file pointer is a cursor that identifies the location of the
    next byte to write or read. When an existing file is opened, the file pointer
    is set to its first byte at offset 0\. The file pointer is also set to 0 when
    the file is created.   When you write past the end of the file, the file is extended.
      The answer is false: when you call `RandomAccessFile`’s `seek(long)` method
    to set the file pointer’s value, and when this value is greater than the length
    of the file, the file’s length doesn’t change. The file length will only change
    by writing after the offset has been set beyond the end of the file.   Method
    `void write(int b)` writes the lower eight bits of `b` to the file at the current
    file pointer position.   `FileDescriptor`’s `sync()` method tells the underlying
    operating system to empty the contents of the open file’s output buffers to their
    associated local disk device. `sync()` returns after all modified data and attributes
    have been written to the relevant device.   A flat file database is a single file
    organized into records and fields. A record stores a single entry (such as a part
    in a parts database) and a field stores a single attribute of the entry (such
    as a part number).   Listing [A-2](#A978-1-4842-1565-4_15_Chapter.html#FPar2)
    presents the `RAFDemo` application that was called for in [Chapter 3](#A978-1-4842-1565-4_3_Chapter.html).
