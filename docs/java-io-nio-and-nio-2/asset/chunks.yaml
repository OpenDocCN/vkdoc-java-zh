    对象不适合多个并发线程使用。


    用于异步读取、写入和操作文件的类是 `AsynchronousFileChannel`。答案是 true：异步文件通道在文件中没有当前位置。


    如果你没有向 `AsynchronousFileChannel` 的 [`AsynchronousFileChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#class%20in%20java.nio.channels)
