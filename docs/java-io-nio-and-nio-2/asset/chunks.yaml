    清单 13-3 中的 `main()` 方法首先尝试打开一个异步服务器套接字通道，然后将其绑定到一个本地地址，该地址恰好是本地主机上的端口 `9090`。接着，它调用
    `AsynchronousServerSocketChannel` 的 `S` [`ocketAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/SocketAddress.html#class%20in%20java.net)
    `getLocalAddress()` 方法，返回该通道的套接字（即本地套接字）所绑定的套接字地址。最后，它输出一条消息，表明服务器正在此地址上监听。


    如果抛出异常，服务器会输出一条消息并终止。否则，它会创建一个 `Attachment` 对象，并将该对象的 `channelServer` 字段初始化为新打开的异步服务器套接字通道。（为方便起见，我直接访问
    `public` 字段，而不是调用 getter 和 setter 方法。）该字段将由随后创建的 `ConnectionHandler` 对象访问，该对象与
    `Attachment` 对象一起传递给 `<A> void accept(A attachment,` [`CompletionHandler`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/CompletionHandler.html#interface%20in%20java.nio.channels)
    `<` [`AsynchronousSocketChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousSocketChannel.html#class%20in%20java.nio.channels)
    `,? super A> handler)` 泛型方法。`accept()` 方法监听传入的连接，并通过 `ConnectionHandler` 对象对其进行相应处理。


    此时，`main()` 的执行线程通过调用 `Thread.join()` 阻塞。解除此线程阻塞并从 `main()` 返回的唯一方法是从另一个线程中断该线程。不过，我尚未实现此功能。


    服务器可以通过单个 `ConnectionHandler` 对象和多个 `ReadWriteHandler` 对象（每个客户端一个对象）同时与多个客户端交互。`Attachment`
    类让连接处理程序和读写处理程序能够方便地访问服务器套接字通道。此外，它还记录了特定于客户端的详细信息。清单 13-4 展示了 `Attachment` 的源代码。


    清单 13-4\. 捆绑服务器和客户端用于通信的字段


    `import java.net.SocketAddress;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.AsynchronousServerSocketChannel;`


    `import java.nio.channels.AsynchronousSocketChannel;`


    `public class Attachment`


    `{`


    `public AsynchronousServerSocketChannel channelServer;`


    `public AsynchronousSocketChannel channelClient;`


    `public boolean isReadMode;`


    `public ByteBuffer buffer;`


    `public SocketAddress clientAddr;`


    `}`


    `channelServer` 字段存储了对在 `Server` 类的 `main()` 方法中创建的服务器套接字通道的引用。连接处理程序使用它来调用 `AsynchronousServerSocketChannel`
    的 `accept()` 方法。


    `channelClient` 字段存储了套接字通道的引用，该通道在 `accept()` 成功接受客户端连接后，被传递给 `ConnectionHandler`
    的 `completed()` 方法。该方法中也使用此字段来执行初始的 `read()` 调用，以及在 `ReadWriteHandler` 对象中执行 `read()`/`write()`
    调用。


    `isReadMode` 字段指示在调用 `ReadWriteHandler` 对象的 `completed()` 方法之前执行的是读取（`true`）还是写入（`false`）操作。对于读取操作，`completed()`
    会获取并输出读取的数据。`completed()` 方法以执行相反操作结束。


    `buffer` 字段标识在连接处理程序中创建的字节缓冲区，该缓冲区用于在服务器和客户端之间传输字节。每个客户端都有自己的字节缓冲区。


    最后，`clientAddr` 字段存储远程客户端的 `java.net.SocketAddress`。它存储客户端的套接字地址，并作为各种特定于客户端的消息的一部分输出。

