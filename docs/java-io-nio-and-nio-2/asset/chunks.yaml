    ## Asynchronous File Channels


    The abstract `java.nio.channels.AsynchronousFileChannel` class describes an asynchronous
    channel for reading, writing, and manipulating a file. This channel is created
    when a file is opened by invoking one of `AsynchronousFileChannel`’s [`open`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#open-java.nio.file.Path-java.util.Set-java.util.concurrent.ExecutorService-java.nio.file.attribute.FileAttribute%E2%80%A6-)
    `()` methods, as follows:


    `AsynchronousFileChannel ch;`


    `ch = AsynchronousFileChannel.open(Paths.get("somefile"));`


    The file contains a variable-length sequence of bytes that can be read and written,
    and whose current size can be queried. The size of the file increases when bytes
    are written beyond its current size; the size decreases when the file is [truncated](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#truncate-long-).


    Files are read and written by calling `AsynchronousFileChannel`’s `read()` and
    `write()` methods. One pair returns a `Future` and the other pair receives a `CompletionHandler`
    as an argument.


    Caution


    `AsynchronousFileChannel` implements `AsynchronousChannel` instead of `AsynchronousByteChannel`
    because this class’s `read()` and `write()` methods take position arguments and
    `AsynchronousByteChannel`’s `read()` and `write()` methods don’t support the concept
    of position.


    An asynchronous file channel doesn’t have a current position within the file.
    Instead, the file position is passed as an argument to each `read()` and `write()`
    method that initiates asynchronous operations.


    Note


    The `read()` and `write()` methods must provide an absolute position (relative
    to zero) in the file from which to read and write. There is no point for a file
    to have an associated position and for reads/writes to occur relative to this
    position because reads/writes can be initiated before previous operations have
    completed and the order in which they occur isn’t guaranteed. For the same reason,
    there are no methods in the `AsynchronousFileChannel` class (as there are in `java.nio.channels.FileChannel`)
    for setting and querying the position.


    In addition to supporting reads and writes, `AsynchronousFileChannel` defines
    the following operations:


    *   Updates made to a file may be [forced out](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#force-boolean-)
    to the underlying storage device, ensuring that data isn’t lost in case of a system
    crash. Call `void force` `(boolean metaData)` to accomplish this task.

    *   A region of a file may be [locked](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#lock-long-long-boolean-A-java.nio.channels.CompletionHandler-)
    against access by other programs. Call the various `lock()` and `tryLock()` methods
    to accomplish this task. Two of the `lock()` methods return a `Future` and take
    a `CompletionHandler` as an argument.


    I’ve created an `AFCDemo` application that uses `AsynchronousFileChannel` to open
    a file and read up to the first 1024 bytes in a `Future` context. Listing [13-1](#A978-1-4842-1565-4_13_Chapter.html#FPar7)
    presents the source code.


