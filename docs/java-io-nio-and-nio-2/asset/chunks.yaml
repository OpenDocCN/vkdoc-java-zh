    `readLine()` 返回 `null`。


    按如下方式编译清单 5-2：


    `javac BWBRDemo.java`


    按如下方式运行此应用程序：


    `java BWBRDemo`


    你应该会看到以下输出（以及一个名为 `temp` 的文件）：


