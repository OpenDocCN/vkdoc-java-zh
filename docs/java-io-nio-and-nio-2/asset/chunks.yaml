    \ symbolic links) occurs.\n\nListing [12-40](#A978-1-4842-1565-4_12_Chapter.html#FPar59)\
    \ presents the source code to an application that demonstrates symbolic link creation.\n\
    \n**Listing 12-40.** Creating a Symbolic Link\n\n```\nimport java.io.IOException;\n\
