    `[        AB]`


    `[       ABC]`


    `[        AB]`


    `[ABCDEFGHIJKL]`


    The final example shows that 12 characters are output. Although this value exceeds
    the width of 10 characters, it does not exceed the precision of 12 characters.
    The value passed to `width` is most useful from an alignment perspective when
    fewer than `width` characters are output.


