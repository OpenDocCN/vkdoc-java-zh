  raw: '## Exploring Miscellaneous Capabilities


    Finally, `File` implements the `java.lang.Comparable` interface’s `compareTo()`
    method and overrides `equals()` and `hashCode()`. Table [2-5](#A978-1-4842-1565-4_2_Chapter.html#Tab5)
    describes these miscellaneous methods.


    Table 2-5.


    `File`’s Miscellaneous Methods


    | Method | Description |

    | --- | --- |

    | `int compareTo(File path)` | Compare two paths lexicographically. The ordering
    defined by this method depends on the underlying operating system. For Unix/Linux
    operating systems, alphabetic case is significant when comparing paths; for Windows
    operating systems, alphabetic case is insignificant. Return zero when `path`’s
    abstract path equals this `File` object’s abstract path, a negative value when
    this `File` object’s abstract path is less than `path`, and a positive value otherwise.
    To accurately compare two `File` objects, call `getCanonicalFile()` on each `File`
    object and then compare the returned `File` objects. |

    | `boolean equals(Object obj))` | Compare this `File` object with `obj` for equality.
    Abstract path equality depends on the underlying operating system. For Unix/Linux
    operating systems, alphabetic case is significant when comparing paths; for Windows
    operating systems, alphabetic case is insignificant. Return true if and only if
    `obj` is not `null` and is a `File` object whose abstract path denotes the same
    file/directory as this `File` object’s abstract path. |

    | `int hashCode()` | Calculate and return a hash code for this path. This calculation
    depends on the underlying operating system. On Unix/Linux operating systems, a
    path’s hash code equals the exclusive OR of its path string’s hash code and decimal
    value `1234321`. On Windows operating systems, the hash code is the exclusive
    OR of the lowercased path string’s hash code and decimal value `1234321`. The
    current locale (geographical, political, or cultural region) is not taken into
    account when lowercasing the path string. |


    Listing [2-8](#A978-1-4842-1565-4_2_Chapter.html#FPar16) presents an application
    that demonstrates `compareTo()` along with `getCanonicalFile()`.


    Listing 2-8\. Comparing Files


    `import java.io.File;`


    `import java.io.IOException;`


    `public class Compare`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Compare filespec1 filespec2");`


    `return;`


    `}`


    `File file1 = new File(args[0]);`


    `File file2 = new File(args[1]);`


    `System.out.println(file1.compareTo(file2));`


    `System.out.println(file1.getCanonicalFile()`


    `.compareTo(file2.getCanonicalFile()));`


    `}`


    `}`


    Compile Listing [2-8](#A978-1-4842-1565-4_2_Chapter.html#FPar16) as follows:


    `javac Compare.java`


    Assuming Windows, run the resulting application as follows:


    `java Compare Compare.class .\Compare.class`


    You should observe the following output:


    `53`


    `0`


    The `53` indicates that `file1`’s abstract path is lexicographically greater than
    `file2`’s abstract path. However, when comparing their canonical representations,
    these abstract paths are considered to be identical (as indicated by the `0`).


    EXERCISE


    The following exercises are designed to test your understanding of [Chapter 2](#A978-1-4842-1565-4_2_Chapter.html)’s
    content:


    What is the purpose of the `File` class?   What do instances of the `File` class
    contain?   What is a path?   What is the difference between an absolute path and
    a relative path?   How do you obtain the current user (also known as working)
    directory?   Define parent path.   `File`’s constructors normalize their path
    arguments. What does normalize mean?   How do you obtain the default name-separator
    character?   What is a canonical path?   What is the difference between `File`’s
    `getParent()` and `getName()` methods?   True or false: `File`’s `exists()` method
    only determines whether or not a file exists.   What is a normal file?   What
    does `File`’s `lastModified()` method return?   What does `File`’s `listRoots()`
    method accomplish?   True or false: `File`’s `list()` method returns an array
    of `String`s where each entry is a file name rather than a complete path.   What
    is the difference between the `FilenameFilter` and `FileFilter` interfaces?  
    True or false: `File`’s `createNewFile()` method doesn’t check for file existence
    and create the file when it doesn’t exist in a single operation that’s atomic
    with respect to all other file system activities that might affect the file.  
    `File`’s `createTempFile(String, String)` method creates a temporary file in the
    default temporary directory. How can you locate this directory?   Temporary files
    should be removed when no longer needed after an application exits (to avoid cluttering
    the file system). How do you ensure that a temporary file is removed when the
    JVM ends normally (it doesn’t crash and the power isn’t lost)?   Which one of
    the `boolean canRead()`, `boolean canWrite()`, and `boolean canExecute()` methods
    was introduced by Java 6?   How would you accurately compare two `File` objects?
      Create a Java application named `Touch` for setting a file’s or directory’s
    timestamp to the current time. This application has the following usage syntax:
    `java Touch pathname`.


    ## Summary


    The `File` class provides access to the underlying operating system’s available
    file system(s). Each `File` instance stores the abstract path for some file system
    object. Various `File` methods (such as `void delete()`) affect the file system
    object represented by the abstract path.


    You first learned how to construct `File` instances. You then explored methods
    for obtaining information about stored abstract paths and their files or directories,
    obtaining a list of roots and disk space, listing directories, creating/modifying
    files/directories, setting/getting permissions, and more.


    [Chapter 3](#A978-1-4842-1565-4_3_Chapter.html) presents classic I/O’s `java.io.RandomAccessFile`
    class.


    # 3. RandomAccessFile


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​3](http://dx.doi.org/10.1007/978-1-4842-1565-4_3))
    contains supplementary material, which is available to authorized users.


    Files can be created and/or opened for random access in which a mixture of write
    and read operations at various locations can occur until the file is closed. Java
    supports this random access by providing a `java.io.RandomAccessFile` class. I
    explore `RandomAccessFile` in this chapter.'
