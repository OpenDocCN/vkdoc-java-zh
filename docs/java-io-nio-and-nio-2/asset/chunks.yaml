  trans: '

    ## 绑定与选项配置


    NIO 的 `DatagramChannel`、`ServerSocketChannel` 和 `SocketChannel` 类并未完全抽象网络套接字。要绑定到通道的套接字，或获取/设置套接字选项，你必须先通过调用每个类的
    `socket()` 方法来获取对等套接字。


    这种违反直觉的套接字通道与套接字 API 混合存在的原因，是 JDK 1.4 发布时没有足够的时间来定义完整的套接字通道 API。JDK 7 通过引入 `java.nio.channels.NetworkChannel`
    接口解决了这个问题。


    `NetworkChannel` 代表一个通往网络套接字的通道。该接口由 `DatagramChannel`、`ServerSocketChannel`、`SocketChannel`、`java.nio.channels.AsynchronousServerSocketChannel`（参见第
    13 章）和 `java.nio.channels.AsynchronousSocketChannel`（参见第 13 章）实现。


    表 14-1 展示了 `NetworkChannel` 的方法。


    表 14-1.


    定义网络通道的方法


    | 方法 | 描述 |

    | --- | --- |

    | [`NetworkChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/NetworkChannel.html#interface%20in%20java.nio.channels)
    `bind(` [`SocketAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/SocketAddress.html#class%20in%20java.net)
    `local)` | 将此通道的套接字绑定到本地地址。一旦建立关联，套接字将保持绑定状态，直到此通道关闭。如果你向 `local` 传递 `null`，套接字将绑定到一个自动分配的地址。`bind()`
    成功时返回此通道。否则，当套接字已绑定时抛出 `java.nio.channels.AlreadyBoundException`，当给定地址类型不受支持时抛出
    `java.nio.channels.UnsupportedAddressTypeException`，当此通道已关闭时抛出 `java.nio.channels.ClosedChannelException`，当发生其他
    I/O 错误时抛出 `java.io.IOException`。 |

    | [`SocketAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/SocketAddress.html#class%20in%20java.net)
    `getLocalAddress()` | 返回此通道套接字所绑定的套接字地址。当此通道[绑定](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/NetworkChannel.html#bind-java.net.SocketAddress-)到互联网协议（IP）套接字地址时，此方法的返回值类型为
    `java.net.` [`InetSocketAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetSocketAddress.html#class%20in%20java.net)。当此通道已关闭时，`getLocalAddress()`
    抛出 `ClosedChannelException`；当发生 I/O 错误时，抛出 `IOException`。 |

    | `<T> T getOption (` [`SocketOption`](https://docs.oracle.com/javase/8/docs/api/java/net/SocketOption.html#interface%20in%20java.net)
    `<T> name)` | 返回由 `name` 标识的套接字选项的值。对于某些套接字选项，返回 `null` 可能是有效的。当此通道不支持此套接字选项时，`getOption()`
    抛出 `java.lang.UnsupportedOperationException`；当此通道已关闭时，抛出 `ClosedChannelException`；当发生
    I/O 错误时，抛出 `IOException`。 |

    | `<T>` [`NetworkChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/NetworkChannel.html#interface%20in%20java.nio.channels)
    `setOption (` [`SocketOption`](https://docs.oracle.com/javase/8/docs/api/java/net/SocketOption.html#interface%20in%20java.net)
    `<T> name, T value)` | 将由 `name` 标识的套接字选项的值设置为 `value`。对于某些套接字选项，向 `value` 传递
    `null` 可能是有效的。`setOption()` 返回此通道。当此通道不支持此套接字选项时，抛出 `UnsupportedOperationException`；当传递给
    `value` 的值对此套接字选项无效时，抛出 `java.lang.IllegalArgumentException`；当此通道已关闭时，抛出 `ClosedChannelException`；当发生
    I/O 错误时，抛出 `IOException`。 |

    | [`Set`](https://docs.oracle.com/javase/8/docs/api/java/util/Set.html#interface%20in%20java.util)
    `<` [`SocketOption`](https://docs.oracle.com/javase/8/docs/api/java/net/SocketOption.html#interface%20in%20java.net)
    `<?>> supportedOptions()` | 返回此通道支持的套接字选项集合。即使在此通道关闭后，此方法仍会继续返回该选项集合。 |


    传递给 `getOption()` 和 `setOption()` 的 `name` 参数必须是 `java.net.SocketOption` 接口类型。JDK
    7 还新增了 `java.net.StandardSocketOptions` 类，该类实现了此接口并枚举了各种 `SocketOption` 常量，例如
    `SO_RCVBUF`（套接字接收缓冲区大小）和 `TCP_NODELAY`（禁用 Nagle 算法）。

