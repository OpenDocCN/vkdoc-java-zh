    To my parents.


    # Introduction


    Input/output (I/O) is not a sexy subject, but it’s an important part of non-trivial
    applications. This book introduces you to most of Java’s I/O capabilities as of
    Java 8 update 51.


    [Chapter 1](#A978-1-4842-1565-4_1_Chapter.html) presents a broad overview of I/O
    in terms of Java’s classic I/O, New I/O (NIO), and NIO.2 categories. You learn
    what each category offers in terms of its capabilities, and you also learn about
    concepts such as paths and Direct Memory Access.


    [Chapters 2](#A978-1-4842-1565-4_2_Chapter.html) through [5](#A978-1-4842-1565-4_5_Chapter.html)
    cover classic I/O APIs. You learn about the `File` and `RandomAccessFile` classes
    along with streams (including object serialization and externalization) and writers/readers.


    [Chapters 6](#A978-1-4842-1565-4_6_Chapter.html) through [11](#A978-1-4842-1565-4_11_Chapter.html)
    focus on NIO. You explore buffers, channels, selectors, regular expressions, charsets,
    and formatters. (Formatters were not introduced with the other NIO types in Java
    1.4 because they depend on the variable arguments capability that was introduced
    in Java 5.)


    NIO is missing several features, which were subsequently provided by NIO.2. [Chapters
    12](#A978-1-4842-1565-4_12_Chapter.html) through [14](#A978-1-4842-1565-4_14_Chapter.html)
    cover NIO.2’s improved file system interface, asynchronous I/O, and the completion
    of socket channel functionality.


    Each chapter ends with assorted exercises that are designed to help you master
    its content. Along with long answers and true/false questions, you are often confronted
    with programming exercises. [Appendix A](#A978-1-4842-1565-4_15_Chapter.html)
    provides the answers and solutions.


    [Appendix B](#A978-1-4842-1565-4_16_Chapter.html) provides a tutorial on sockets
    and network interfaces. Although not directly related to classic I/O, NIO, and
    NIO.2, they leverage I/O capabilities and are mentioned elsewhere in this book.


    **Note**


    I briefly use Java 8’s lambda expression and method reference language features
    and also use Java 8’s Streams API in some examples, but don’t provide a tutorial
    on them. You’ll need to look elsewhere for that knowledge.


    Thanks for purchasing this book. I hope you find it helpful in understanding classic
    I/O, NIO, and NIO.2.


    Jeff Friesen (September 2015)


    **Note**


    You can download this book’s source code by pointing your web browser to [`www.apress.com/9781484215661`](http://www.apress.com/9781484215661)
    and clicking the Source Code tab followed by the Download Now link.


    # Acknowledgments


    I have many people to thank for assisting me in the development of this book.
    I especially thank Steve Anglin for asking me to write it and Mark Powers for
    guiding me through the writing process.'
