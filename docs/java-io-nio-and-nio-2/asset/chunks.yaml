    accomplishes the delete. It first verifies that exactly one command-line argument
    (identifying the file tree to be deleted) has been specified. It then obtains
    the argument’s `Path` object and instantiates the `DeleteVisitor` local class.
    Both objects are passed to `walkFileTree()`, which walks the file tree rooted
    in this path. Symbolic links are not followed.


    Note


    `Delete` is designed to delete symbolic links and not their targets. A symbolic
    link might point to a file that exists outside of the file tree and that shouldn’t
    be deleted.


    `DeleteVisitor` deletes a nondirectory file in its `visitFile()` method. This
    method performs the deletion by calling `deleteIfExists()`. If this method returns
    `true`, a message about the file being deleted is output. Otherwise, a message
    about not being able to delete the file is output. (The file could be deleted
    by an external process between the time it was discovered during the walk and
    the time that `deleteIfExists()` is called.)


    Because a directory cannot be deleted until its regular file and other entries
    have been deleted, `DeleteVisitor` deletes a directory in its `postVisitDirectory()`
    method. When this method is called, all of the entries in the directory will have
    been deleted. `deleteIfExists()` is called to perform the deletion.


    `postVisitDirectory()` will only attempt to delete the directory when an exception
    did not occur while visiting the nondirectory files. If an exception occurs, the
    exception is re-thrown.


    Compile Listing [12-46](#A978-1-4842-1565-4_12_Chapter.html#FPar65) as follows:


    `javac Delete.java`


    Assume the following file tree in the current directory:


    `sales`


    `joe`


    `2015`


    `q1`


    `sales.txt`


    Run the resulting application as follows:


    `java Delete sales`


    You should observe the following output:


    `deleted regular file sales\joe\2015\q1\sales.txt`


    `deleted directory sales\joe\2015\q1`


    `deleted directory sales\joe\2015`


    `deleted directory sales\joe`


    `deleted directory sales`


    #### Moving a File Tree


    The File Tree-Walking API can be used to move a file tree. Listing [12-47](#A978-1-4842-1565-4_12_Chapter.html#FPar67)
    presents the source code to an application that accomplishes this task.


    Listing 12-47\. Moving a File Tree


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.FileVisitResult;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.SimpleFileVisitor;`


    `import java.nio.file.StandardCopyOption;`


    `import java.nio.file.attribute.BasicFileAttributes;`


    `public class Move`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Move srcpath destpath");`


    `return;`


    `}`


    `class MoveVisitor extends SimpleFileVisitor<Path>`


    `{`


    `private Path srcPath, dstPath;`


    `MoveVisitor(Path srcPath, Path dstPath)`


    `{`


    `this.srcPath = srcPath;`


    `this.dstPath = dstPath;`


    `}`


    `@Override`


    `public FileVisitResult postVisitDirectory(Path dir,`


    `IOException ioe)`


    `throws IOException`


    `{`


    `if (ioe == null)`


    `Files.delete(dir);`


    `else`


    `throw ioe;`


    `return FileVisitResult.CONTINUE;`


    `}`


    `@Override`


    `public FileVisitResult preVisitDirectory(Path dir,`


    `BasicFileAttributes attrs)`


    `throws IOException`


    `{`


    `Path targetPath = dstPath.resolve(srcPath.relativize(dir));`


    `Files.copy(dir, targetPath, StandardCopyOption.REPLACE_EXISTING,`


    `StandardCopyOption.COPY_ATTRIBUTES);`


    `return FileVisitResult.CONTINUE;`


    `}`


    `@Override`


    `public FileVisitResult visitFile(Path file,`


    `BasicFileAttributes attr)`


    `throws IOException`


    `{`


    `Path targetPath = dstPath.resolve(srcPath.relativize(file));`


    `Files.move(file, targetPath,`


    `StandardCopyOption.REPLACE_EXISTING,`


    `StandardCopyOption.ATOMIC_MOVE);`


    `return FileVisitResult.CONTINUE;`


    `}`


    `}`


    `Path src = Paths.get(args[0]);`


    `Path dst = Paths.get(args[1]);`


    `Files.walkFileTree(src, new MoveVisitor(src, dst));`


    `}`


    `}`


    Listing [12-47](#A978-1-4842-1565-4_12_Chapter.html#FPar67)’s `main()` method
    accomplishes the move. It first verifies that exactly two command-line arguments
    (identifying the file tree to be moved and its new location) have been specified.
    It then obtains each argument’s `Path` object and instantiates the `MoveVisitor`
    local class, passing the source and destination `Path` objects to `MoveVisitor`’s
    constructor. Lastly, `main()` calls `walkFileTree()` to walk the file tree rooted
    in the source path. Symbolic links are not followed.


    Before a directory’s entries can be moved, the directory must be moved. `MoveVisitor`’s
    `preVisitDirectory()` method accomplishes this task. You might think that you
    could use the `move()` method instead. However, when `move()` is invoked to move
    a nonempty directory, the directory is moved only when it doesn’t require moving
    the directory’s entries. When the entries must be moved, this method fails (by
    throwing `IOException`). The solution is to use the `copy()` method, which does
    the following: when the file is a directory, `copy()` creates an empty directory
    in the target location (entries in the directory are not copied).


    `copy()` is called with the `REPLACE_EXISTING` and `COPY_ATTRIBUTES` options.
    `REPLACE_EXISTING` configures the copy as follows: when the target exists, the
    target is replaced when it’s not a nonempty directory. When the target exists
    and is a symbolic link, the symbolic link itself and not the target of the link
    is replaced. `COPY_ATTRIBUTES` attempts to copy the attributes associated with
    the directory to the target. The exact file attributes that are copied are file
    system-dependent and therefore unspecified. Minimally, `lastModifiedTime` is copied
    to the target when supported by both the source and target file stores. The copying
    of timestamps may result in precision loss.'
