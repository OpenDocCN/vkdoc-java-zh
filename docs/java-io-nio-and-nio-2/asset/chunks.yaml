- fmt: "此外，还有几个你可能想使用的`read()`和`write()`方法。与不需要数据报通道连接的`send()`和`receive()`不同，`read()`和`write()`方法需要建立连接。\n\
    \n与`ServerSocketChannel`和`SocketChannel`类似，你可以通过调用静态的`open()`方法来获取`DatagramChannel`实例。新的数据报通道会关联一个对等的`DatagramSocket`对象，你可以通过调用`DatagramChannel`的`socket()`方法来获取该对象。\n\
    \n数据报通道既可以充当客户端（发送方），也可以充当服务器（监听方）。要充当监听方，数据报通道必须绑定到一个端口和一个可选的地址。通过获取`DatagramSocket`对象并对其调用`bind()`方法来完成此任务，如下所示：\n\
