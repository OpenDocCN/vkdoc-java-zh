    ## 了解路径对应的文件或目录


    你可以通过调用表 2-2 中描述的方法来查询文件系统，以了解由 `File` 对象存储路径所表示的文件或目录的信息。


    表 2-2. 用于了解文件或目录信息的 `File` 方法


    | 方法 | 描述 |

    | --- | --- |

    | `boolean exists()` | 当且仅当此 `File` 对象的抽象路径名所表示的文件或目录存在时，返回 true。 |

    | `boolean isDirectory()` | 当此 `File` 对象的抽象路径名指向一个已存在的目录时，返回 true。 |

    | `boolean isFile()` | 当此 `File` 对象的抽象路径名指向一个已存在的普通文件时，返回 true。当文件不是目录且满足其他操作系统相关的条件时，该文件即为普通文件。例如，它不是符号链接或命名管道。任何由
    Java 应用程序创建的非目录文件都保证是普通文件。 |

    | `boolean isHidden()` | 当此 `File` 对象的抽象路径名所表示的文件是隐藏文件时，返回 true。隐藏文件的确切定义取决于操作系统。在
    Unix/Linux 操作系统上，文件名以句点字符开头时即为隐藏文件。在 Windows 操作系统上，文件在文件系统中被标记为隐藏时即为隐藏文件。 |

    | `long lastModified()` | 返回此 `File` 对象的抽象路径名所表示的文件最后被修改的时间，如果文件不存在或在此方法调用期间发生
    I/O 错误，则返回 `0`。返回值以毫秒为单位，从 Unix 纪元（1970 年 1 月 1 日 00:00:00 GMT）开始计算。 |

    | `long length()` | 返回此 `File` 对象的抽象路径名所表示的文件长度。当路径名表示一个目录时，返回值未指定；当文件不存在时，返回
    `0`。 |


    清单 2-2 使用其路径命令行参数实例化 `File`，并调用表 2-2 中描述的所有 `File` 方法，以了解路径对应的文件/目录信息。


    清单 2-2. 获取文件/目录信息


    `import java.io.File;`


    `import java.io.IOException;`


    `import java.util.Date;`


    `public class FileDirectoryInfo`


    `{`


       `public static void main(final String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java FileDirectoryInfo pathname");`


             `return;`


          `}`


          `File file = new File(args[0]);`


          `System.out.println("About " + file + ":");`


          `System.out.println("Exists = " + file.exists());`


          `System.out.println("Is directory = " + file.isDirectory());`


          `System.out.println("Is file = " + file.isFile());`


          `System.out.println("Is hidden = " + file.isHidden());`


          `System.out.println("Last modified = " +`


                             `new Date(file.lastModified()));`


          `System.out.println("Length = " + file.length());`


       `}`


    `}`


    按如下方式编译 清单 2-2：


