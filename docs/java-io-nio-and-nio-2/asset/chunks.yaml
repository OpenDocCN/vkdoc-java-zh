    \ i)` | Write 32-bit integer `i` to the file starting at the current file pointer\
    \ position. The four bytes are written with the high byte first. This method throws\
    \ `IOException` when an I/O error occurs. |\n\nMost of Table [3-1](#A978-1-4842-1565-4_3_Chapter.html#Tab1)’s\
    \ methods are fairly self-explanatory. However, the `getFD()` method requires\
    \ further enlightenment.\n\n> **Note**  \n> `RandomAccessFile`’s `read`-prefixed\
    \ methods and `skipBytes()` originate in the `java.io.DataInput` interface, which\
    \ this class implements. Furthermore, `RandomAccessFile`’s `write`-prefixed methods\
    \ originate in the `java.io.DataOutput` interface, which this class also implements.\n\
    \nWhen a file is opened, the underlying operating system creates an operating\
    \ system-dependent structure to represent the file. A handle to this structure\
    \ is stored in an instance of the `java.io.FileDescriptor` class, which `getFD()`\
    \ returns.\n\n> **Note**  \n> A handle is an identifier that Java passes to the\
