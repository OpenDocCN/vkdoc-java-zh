  raw: '### Accessing File Stores


    `FileSystem` relies on the `java.nio.file.FileStore` class to provide information
    about file stores, which are storage pools, devices, partitions, volumes, concrete
    file systems, or other implementation-specific means of file storage. A file store
    consists of a name, a type, space amounts (in bytes), and other information.


    `Files` declares the `FileStore getFileStore(Path path)` method to return a `FileStore`
    representing the file store where the file identified by `path` is stored. Once
    you have the `FileStore`, you can call methods to obtain amounts of space, determine
    if the file store is read-only, and obtain the name and type of the file store:


    *   `long getTotalSpace()`: Return the size, in bytes, of the file store. This
    method throws `IOException` when an I/O error occurs.

    *   `long getUnallocatedSpace()`: Return the number of unallocated bytes in the
    file store. The returned number of unallocated bytes is a hint, but not a guarantee,
    that it’s possible to use most or any of these bytes. The number of unallocated
    bytes is most likely to be accurate immediately after the space attributes are
    obtained. It’s likely to be made inaccurate by any external I/O operations, including
    those made on the operating system outside of this JVM. This method throws `IOException`
    when an I/O error occurs.

    *   `long getUsableSpace()`: Return the number of bytes available to this JVM
    on the file store. The returned number of available bytes is a hint, but not a
    guarantee, that it’s possible to use most or any of these bytes. The number of
    usable bytes is most likely to be accurate immediately after the space attributes
    are obtained. It’s likely to be made inaccurate by any external I/O operations,
    including those made on the operating system outside of this JVM. This method
    throws `IOException` when an I/O error occurs.

    *   `boolean isReadOnly()`: Return `true` when this file store is read-only. A
    file store is read-only when it doesn’t support write operations or other changes
    to files. Any attempt to create a file, open an existing file for writing, and
    so on, causes `IOException` to be thrown.

    *   `String name()`: Return the name of this file store. The format of the name
    is highly implementation-specific. It will typically be the name of the storage
    pool or volume. The returned string may differ from the string returned by the
    `toString()` method.

    *   `String type()`: Return the type of this file store. The format of the returned
    string is highly implementation-specific. It may indicate, for example, the format
    used or whether the file store is local or remote.


