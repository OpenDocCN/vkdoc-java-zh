    ## 异步文件通道


    抽象类 `java.nio.channels.AsynchronousFileChannel` 描述了一个用于读取、写入和操作文件的异步通道。当通过调用 `AsynchronousFileChannel`
    的某个 [`open`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#open-java.nio.file.Path-java.util.Set-java.util.concurrent.ExecutorService-java.nio.file.attribute.FileAttribute%E2%80%A6-)`()`
    方法打开文件时，就会创建此通道，如下所示：


    `AsynchronousFileChannel ch;`


    `ch = AsynchronousFileChannel.open(Paths.get("somefile"));`


    该文件包含一个可变长度的字节序列，可以对其进行读取和写入，并且可以查询其当前大小。当写入的字节超出其当前大小时，文件大小会增加；当文件被[截断](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#truncate-long-)时，文件大小会减小。


    通过调用 `AsynchronousFileChannel` 的 `read()` 和 `write()` 方法来读取和写入文件。其中一对方法返回一个 `Future`，另一对方法则接收一个
    `CompletionHandler` 作为参数。


    警告


    `AsynchronousFileChannel` 实现的是 `AsynchronousChannel` 而非 `AsynchronousByteChannel`，因为该类的
    `read()` 和 `write()` 方法接受位置参数，而 `AsynchronousByteChannel` 的 `read()` 和 `write()`
    方法不支持位置的概念。


    异步文件通道在文件中没有当前位置。相反，文件位置作为参数传递给每个启动异步操作的 `read()` 和 `write()` 方法。


    注意


    `read()` 和 `write()` 方法必须提供文件中的绝对位置（相对于零）来进行读取和写入。文件没有必要有关联的位置，并且读取/写入操作相对于此位置发生也没有意义，因为读取/写入操作可能在前一个操作完成之前就已启动，并且它们发生的顺序无法保证。出于同样的原因，`AsynchronousFileChannel`
    类中没有（像 `java.nio.channels.FileChannel` 中那样）用于设置和查询位置的方法。


    除了支持读取和写入之外，`AsynchronousFileChannel` 还定义了以下操作：


    *   对文件所做的更新可能会被[强制写入](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#force-boolean-)到底层存储设备，以确保在系统崩溃时数据不会丢失。调用
    `void force` `(boolean metaData)` 即可完成此任务。

    *   文件的某个区域可以被[锁定](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/AsynchronousFileChannel.html#lock-long-long-boolean-A-java.nio.channels.CompletionHandler-)，以防止其他程序访问。调用各种
    `lock()` 和 `tryLock()` 方法即可完成此任务。其中两个 `lock()` 方法返回一个 `Future`，并接受一个 `CompletionHandler`
    作为参数。


