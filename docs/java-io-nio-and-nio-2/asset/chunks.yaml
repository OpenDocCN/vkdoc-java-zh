  raw: '## Using RandomAccessFile


    `RandomAccessFile` is useful for creating a flat file database, a single file
    organized into records and fields. A record stores a single entry (such as a part
    in a parts database) and a field stores a single attribute of the entry (such
    as a part number).


    Note


    The term field is also used to refer to a variable declared within a class. To
    avoid confusion with this overloaded terminology, think of a field variable as
    being analogous to a record’s field attribute.


    A flat file database typically organizes its content into a sequence of fixed-length
    records. Each record is further organized into one or more fixed-length fields.
    Figure [3-1](#A978-1-4842-1565-4_3_Chapter.html#Fig1) illustrates this concept
    in the context of a parts database.


    ![A978-1-4842-1565-4_3_Fig1_HTML.jpg](A978-1-4842-1565-4_3_Fig1_HTML.jpg)


    Figure 3-1.


    A flat file database of automotive parts is divided into records and fields


    According to Figure [3-1](#A978-1-4842-1565-4_3_Chapter.html#Fig1), each field
    has a name (`partnum`, `desc`, `qty`, and `ucost`). Also, each record is assigned
    a number starting at 0\. This example consists of five records, of which only
    three are shown for brevity.


    To show you how to implement a flat file database in terms of `RandomAccessFile`,
    I’ve created a simple `PartsDB` class to model Figure [3-1](#A978-1-4842-1565-4_3_Chapter.html#Fig1).
    Check out Listing [3-1](#A978-1-4842-1565-4_3_Chapter.html#FPar6).


