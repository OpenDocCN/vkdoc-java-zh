  raw: 'JDK 7 refactored the `java.nio.channels.FileChannel` class to implement `SeekableByteChannel`.
    In [Chapter 7](#A978-1-4842-1565-4_7_Chapter.html), I covered `SeekableByteChannel`’s
    methods in a `FileChannel` context. I specified `FileChannel position(long newPosition)`
    and `FileChannel truncate(long size)` instead of specifying `SeekableByteChannel
    position(long newPosition)` and `SeekableByteChannel truncate(long size)` because
    `SeekableByteChannel`’s documentation recommends that the method return types
    be specialized by classes that implement `SeekableByteChannel` so that method
    invocations on the implementation classes can be chained together.


    The `Files` class lets you obtain a `SeekableByteChannel` by providing the following
    methods:


    *   `SeekableByteChannel newByteChannel(Path path, OpenOption... options)`

    *   [`SeekableByteChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/SeekableByteChannel.html#interface%20in%20java.nio.channels)
    `newByteChannel(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`Set`](https://docs.oracle.com/javase/8/docs/api/java/util/Set.html#interface%20in%20java.util)
    `<? extends` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `> options,` [`FileAttribute`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/FileAttribute.html#interface%20in%20java.nio.file.attribute)
    `<?>... attrs)`


    Each method opens or creates a regular file, returning a seekable byte channel
    to access the file. It throws `IllegalArgumentException` when an invalid combination
    of open options is specified, `UnsupportedOperationException` when an unsupported
    open option is specified, and `IOException` when an I/O error occurs.


    I’ve created an application that demonstrates `SeekableByteChannel` in a `FileChannel`
    context and also in a more generic context. Listing [12-28](#A978-1-4842-1565-4_12_Chapter.html#FPar42)
    presents the application’s source code.


    Listing 12-28\. Demonstrating `SeekableByteChannel`


    `import java.io.IOException;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.FileChannel;`


    `import java.nio.channels.SeekableByteChannel;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.util.EnumSet;`


    `import static java.nio.file.StandardOpenOption.*;`


    `public class SBCDemo`


    `{`


    `final static int RECLEN = 50;`


    `public static void main(String[] args) throws IOException`


    `{`


    `Path path = Paths.get("emp");`


    `FileChannel fc;`


    `fc = FileChannel.open(path, CREATE, WRITE, SYNC).position(RECLEN * 2);`


    `ByteBuffer buffer = ByteBuffer.wrap("John Doe".getBytes());`


    `fc.write(buffer);`


    `fc.close();`


    `buffer.clear();`


    `SeekableByteChannel sbc;`


    `sbc = Files.newByteChannel(path, EnumSet.of(READ)).`


    `position(RECLEN * 2);`


    `sbc.read(buffer);`


    `sbc.close();`


    `System.out.println(new String(buffer.array()));`


    `}`


    `}`


    Listing [12-28](#A978-1-4842-1565-4_12_Chapter.html#FPar42)’s `main()` method
    first obtains a path to an `emp` (employee) file. It then invokes `FileChannel`’s
    `FileChannel open(Path path, OpenOption... options)` method to open or create
    and then return a channel to this file.


    Note


    NIO.2 added `FileChannel open(Path path, OpenOption... options)` and `FileChannel
    open(Path path, Set<? extends OpenOption> options, FileAttribute<?>... attrs)`
    methods to the `FileChannel` class so that you would no longer have to rely on
    a classic I/O type (such as `RandomAccessFile`) to obtain a file channel.


    The `open()` method is called with the `CREATE` (create a new file when it doesn’t
    exist), `WRITE` (open the file for write access), and `SYNC` (require that every
    update to the file’s content or metadata be written synchronously to the underlying
    storage device) options.


    After successfully obtaining a seekable file channel, `main()` invokes `position()`
    on the channel to set the read/write position to twice the length of a record.
    (Assume that `emp` is a flat file database divided into records, with each record
    having a length of `RECLEN` bytes.) Because `position()` returns a `FileChannel`,
    this method call is chained to the result of the `open()` method.


    At this point, a byte buffer is created by invoking `java.nio.ByteBuffer`’s `ByteBuffer
    wrap(byte[] array)` method to wrap the byte array returned from `"John Doe".getBytes()`
    into a buffer. The byte buffer is then written to the file channel, which is subsequently
    closed. The `emp` file should contain the `John Doe` byte sequence starting at
    position 100.


    `main()` now opens `emp` and reads the recently written contents, which are output.
    It approaches these tasks generically via `newByteChannel()` and `SeekableByteChannel`.
    Rather than hardcode `FileChannel` in the source code, it can be advantageous
    to work with `SeekableByteChannel` instead, for the same reason that you would
    declare a list collection variable using the `List` interface as opposed to the
    `java.util.ArrayList` list-implementation class: you want to minimize source code
    changes should you change list-implementation classes. Although `FileChannel`
    is currently the only implementation of `SeekableByteChannel`, that could change
    in the future and you might want to minimize source code changes.


    After closing the seekable byte channel, I chose to invoke `ByteBuffer`’s `byte[]
    array()` method to return the array that backs the byte buffer, for convenience.
    I pass this array to a `java.lang.String` constructor to convert the byte array
    to a string, which I then print. Although `array()` throws `UnsupportedOperationException`
    when the buffer isn’t backed by an accessible array, this isn’t the case in this
    example.


    Compile Listing [12-28](#A978-1-4842-1565-4_12_Chapter.html#FPar42) as follows:


    `javac SBCDemo.java`


    Run the resulting application as follows:


    `java SBCDemo`


    You should observe the following output (along with an `emp` file in the current
    directory):


    `John Doe`'
  trans: '

    JDK 7 重构了 `java.nio.channels.FileChannel` 类，使其实现了 `SeekableByteChannel`。在第 7 章中，我介绍了
    `SeekableByteChannel` 在 `FileChannel` 上下文中的方法。我指定了 `FileChannel position(long
    newPosition)` 和 `FileChannel truncate(long size)`，而不是 `SeekableByteChannel position(long
    newPosition)` 和 `SeekableByteChannel truncate(long size)`，因为 `SeekableByteChannel`
    的文档建议，实现 `SeekableByteChannel` 的类应特化其方法返回类型，以便在实现类上可以进行方法链式调用。


    `Files` 类提供了以下方法，让你可以获取一个 `SeekableByteChannel`：


    *   `SeekableByteChannel newByteChannel(Path path, OpenOption... options)`

    *   [`SeekableByteChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/SeekableByteChannel.html#interface%20in%20java.nio.channels)
    `newByteChannel(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`Set`](https://docs.oracle.com/javase/8/docs/api/java/util/Set.html#interface%20in%20java.util)
    `<? extends` [`OpenOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/OpenOption.html#interface%20in%20java.nio.file)
    `> options,` [`FileAttribute`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/FileAttribute.html#interface%20in%20java.nio.file.attribute)
    `<?>... attrs)`


    每个方法都会打开或创建一个常规文件，并返回一个可查找的字节通道来访问该文件。当指定了无效的打开选项组合时，会抛出 `IllegalArgumentException`；当指定了不支持的打开选项时，会抛出
    `UnsupportedOperationException`；当发生 I/O 错误时，会抛出 `IOException`。


    我创建了一个应用程序，演示了 `SeekableByteChannel` 在 `FileChannel` 上下文以及更通用上下文中的使用。清单 12-28
    展示了该应用程序的源代码。


    **清单 12-28.** 演示 `SeekableByteChannel`


    `import java.io.IOException;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.FileChannel;`


    `import java.nio.channels.SeekableByteChannel;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.util.EnumSet;`


    `import static java.nio.file.StandardOpenOption.*;`


    `public class SBCDemo`


    `{`


    `final static int RECLEN = 50;`


    `public static void main(String[] args) throws IOException`


    `{`


    `Path path = Paths.get("emp");`


    `FileChannel fc;`


    `fc = FileChannel.open(path, CREATE, WRITE, SYNC).position(RECLEN * 2);`


    `ByteBuffer buffer = ByteBuffer.wrap("John Doe".getBytes());`


    `fc.write(buffer);`


    `fc.close();`


    `buffer.clear();`


    `SeekableByteChannel sbc;`


    `sbc = Files.newByteChannel(path, EnumSet.of(READ)).`


    `position(RECLEN * 2);`


    `sbc.read(buffer);`


    `sbc.close();`


    `System.out.println(new String(buffer.array()));`


    `}`


    `}`


    清单 12-28 的 `main()` 方法首先获取了一个指向 `emp`（员工）文件的路径。然后，它调用 `FileChannel` 的 `FileChannel
    open(Path path, OpenOption... options)` 方法来打开或创建并返回一个指向该文件的通道。


    > **注意**

    >

    > NIO.2 向 `FileChannel` 类添加了 `FileChannel open(Path path, OpenOption... options)`
    和 `FileChannel open(Path path, Set<? extends OpenOption> options, FileAttribute<?>...
    attrs)` 方法，这样你就不再需要依赖传统的 I/O 类型（例如 `RandomAccessFile`）来获取文件通道了。


    调用 `open()` 方法时，传入了 `CREATE`（当文件不存在时创建新文件）、`WRITE`（以写入访问权限打开文件）和 `SYNC`（要求对文件内容或元数据的每次更新都同步写入底层存储设备）这些选项。


    成功获取可查找的文件通道后，`main()` 在该通道上调用 `position()` 方法，将读/写位置设置为记录长度的两倍。（假设 `emp` 是一个按记录划分的平面文件数据库，每条记录的长度为
    `RECLEN` 字节。）由于 `position()` 返回一个 `FileChannel`，因此该方法调用被链接到 `open()` 方法的结果上。


    此时，通过调用 `java.nio.ByteBuffer` 的 `ByteBuffer wrap(byte[] array)` 方法，将 `"John Doe".getBytes()`
    返回的字节数组包装到一个缓冲区中，从而创建了一个字节缓冲区。然后，该字节缓冲区被写入文件通道，随后通道被关闭。`emp` 文件应该包含从位置 100 开始的
    `John Doe` 字节序列。


    `main()` 现在打开 `emp` 文件并读取最近写入的内容，然后将其输出。它通过 `newByteChannel()` 和 `SeekableByteChannel`
    以通用的方式处理这些任务。与其在源代码中硬编码 `FileChannel`，不如使用 `SeekableByteChannel` 更有利，原因与你使用 `List`
    接口而不是 `java.util.ArrayList` 列表实现类来声明列表集合变量相同：你希望在你更改列表实现类时，最大限度地减少源代码的更改。尽管 `FileChannel`
    目前是 `SeekableByteChannel` 的唯一实现，但未来可能会发生变化，你可能希望最大限度地减少源代码的更改。


    关闭可查找的字节通道后，为了方便起见，我选择调用 `ByteBuffer` 的 `byte[] array()` 方法来返回支持该字节缓冲区的数组。我将此数组传递给
    `java.lang.String` 构造函数，以将字节数组转换为字符串，然后将其打印出来。尽管当缓冲区没有可访问的数组支持时，`array()` 会抛出
    `UnsupportedOperationException`，但在此示例中并非如此。


    按如下方式编译清单 12-28：


    `javac SBCDemo.java`


    按如下方式运行生成的应用程序：


    `java SBCDemo`


    你应该会看到以下输出（以及当前目录中的 `emp` 文件）：


    `John Doe`

