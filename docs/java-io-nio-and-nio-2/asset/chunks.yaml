  raw: '### Scatter/Gather I/O


    Channels provide the ability to perform a single I/O operation across multiple
    buffers. This capability is known as scatter/gather I/O (and is also known as
    vectored I/O).


    In the context of a write operation, the contents of several buffers are gathered
    (drained) in sequence and then sent through the channel to a destination. These
    buffers are not required to have identical capacities. In the context of a read
    operation, the contents of a channel are scattered (filled) to multiple buffers
    in sequence; each buffer is filled to its limit until the channel is empty or
    until the total buffer space is used.


    Note


    Modern operating systems provide APIs that support vectored I/O to eliminate (or
    at least reduce) system calls or buffer copies, and hence improve performance.
    For example, the Win32/Win64 APIs provide `ReadFileScatter()` and `WriteFileGather()`
    functions for this purpose.


    Java provides the `java.nio.channels.ScatteringByteChannel` interface to support
    scattering and the `java.nio.channels.GatheringByteChannel` interface to support
    gathering.


    `ScatteringByteChannel` offers the following methods:


    *   `long read(ByteBuffer[] buffers, int offset, int length)`

    *   `long read(ByteBuffer[] buffers)`


    `GatheringByteChannel` offers the following methods:


    *   `long write(ByteBuffer[] buffers, int offset, int length)`

    *   `long write(ByteBuffer[] buffers)`


    The first `read()` method and the first `write()` method let you identify the
    first buffer to read/write by passing a zero-based offset to `offset`, and the
    number of buffers to read/write by passing a value to `length`. The second `read()`
    method and the second `write()` method read and write all buffers in sequence.


    Listing [7-2](#A978-1-4842-1565-4_7_Chapter.html#FPar7) demonstrates `read(ByteBuffer[]
    buffers)` and `write(ByteBuffer[] buffers)`.


    Listing 7-2\. Demonstrating Scatter/Gather


    `import java.io.FileInputStream;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.Channels;`


    `import java.nio.channels.GatheringByteChannel;`


    `import java.nio.channels.ReadableByteChannel;`


    `import java.nio.channels.ScatteringByteChannel;`


    `public class ChannelDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `ScatteringByteChannel src;`


    `FileInputStream fis = new FileInputStream("x.dat");`


    `src = (ScatteringByteChannel) Channels.newChannel(fis);`


    `ByteBuffer buffer1 = ByteBuffer.allocateDirect(5);`


    `ByteBuffer buffer2 = ByteBuffer.allocateDirect(3);`


    `ByteBuffer[] buffers = { buffer1, buffer2 };`


    `src.read(buffers);`


    `buffer1.flip();`


    `while (buffer1.hasRemaining())`


    `System.out.println(buffer1.get());`


    `System.out.println();`


    `buffer2.flip();`


    `while (buffer2.hasRemaining())`


    `System.out.println(buffer2.get());`


    `buffer1.rewind();`


    `buffer2.rewind();`


    `GatheringByteChannel dest;`


    `FileOutputStream fos = new FileOutputStream("y.dat");`


    `dest = (GatheringByteChannel) Channels.newChannel(fos);`


    `buffers[0] = buffer2;`


    `buffers[1] = buffer1;`


    `dest.write(buffers);`


    `}`


    `}`


    Listing [7-2](#A978-1-4842-1565-4_7_Chapter.html#FPar7)’s `main()` method first
    obtains a scattering byte channel by instantiating `java.io.FileInputStream` and
    passing this instance to the `Channels` class’s `ReadableByteChannel newChannel(InputStream
    inputStream)` method. The returned `ReadableByteChannel` instance is cast to `ScatteringByteChannel`
    because this instance is actually a file channel (discussed later) that implements
    `ScatteringByteChannel`.


    Next, `main()` creates a couple of direct byte buffers; the first buffer has a
    capacity of five bytes and the second buffer has a capacity of three bytes. These
    buffers are subsequently stored in an array and this array is passed to `read(ByteBuffer[])`
    to fill them.


    After filling the buffers, `main()` flips them so that it can output their contents
    to standard output. After these contents have been output, the buffers are rewound
    in preparation for being drained via a gather operation.


    `main()` now obtains a gathering byte channel by instantiating `java.io.FileOutputStream`
    and passing this instance to the `Channels` class’s `WritableByteChannel` `newChannel(OutputStream
    outputStream)` method. The returned `WritableByteChannel` instance is cast to
    `GatheringByteChannel` because this instance is actually a file channel (discussed
    later) that implements `GatheringByteChannel`.


    Finally, `main()` assigns these buffers to the `buffers` array in reverse order
    to how they were originally assigned, and then passes this array to `write(ByteBuffer[])`
    to drain them.


    Create a file named `x.dat` and store the following text in this file:


    `12345abcdefg`


    Now compile Listing [7-2](#A978-1-4842-1565-4_7_Chapter.html#FPar7) (`javac ChannelDemo.java`)
    and run this application (`java ChannelDemo`). You should observe the following
    Unicode values for the first eight characters:


    `49`


    `50`


    `51`


    `52`


    `53`


    `97`


    `98`


    `99`


    Additionally, you should observe a newly created `y.dat` file with the following
    content:


    `abc12345`


    ### File Channels


    I previously mentioned that `RandomAccessFile` declares a `FileChannel` `getChannel()`
    method for returning a file channel instance, which describes an open connection
    to a file. It turns out that `FileInputStream` and `FileOutputStream` also provide
    the same method. In contrast, `java.io.FileReader` and `java.io.FileWriter` don’t
    offer a way to obtain a file channel.


    Caution


    The file channel returned from `FileInputStream`’s `getChannel()` method is read-only,
    and the file channel returned from `FileOutputStream`’s `getChannel()` method
    is write-only. Attempting to write to a read-only file channel or read from a
    write-only file channel results in an exception.


    The abstract `java.nio.channels.FileChannel` class describes a file channel. Because
    this class implements the `InterruptibleChannel` interface, file channels are
    interruptible. Because this class implements the `ByteChannel`, `GatheringByteChannel`,
    and `ScatteringByteChannel` interfaces, you can write to, read from, and perform
    scatter/gather I/O on underlying files. However, there’s more.


    Note


    Unlike buffers, which are not thread-safe, file channels are thread-safe.


    A file channel maintains a current position into the file, which `FileChannel`
    lets you obtain and change. It also lets you request that cached data be forced
    to the disk, read/write file content, obtain the size of the file underlying the
    channel, truncate a file, attempt to lock the entire file or just a region of
    the file, perform memory-mapped file I/O, and transfer data directly to another
    channel in a manner that has the potential to be optimized by the operating system.


    Table [7-1](#A978-1-4842-1565-4_7_Chapter.html#Tab1)describes a few of `FileChannel`’s
    methods.


    Table 7-1.


    `FileChannel` Methods'
