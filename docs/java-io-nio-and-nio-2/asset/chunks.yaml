    `FileWriter` is a convenience class for writing characters to files. It subclasses
    `OutputStreamWriter`, and its constructors, such as [`FileWriter`](http://docs.oracle.com/javase/7/docs/api/java/io/FileWriter.html#FileWriter%28java.lang.String%29)
    `(` [`String`](http://docs.oracle.com/javase/7/docs/api/java/lang/String.html#class%20in%20java.lang)
    `path)`, call `OutputStreamWriter(OutputStream)`. An instance of this class is
    equivalent to the following code fragment:


    `FileOutputStream fos = new FileOutputStream(path);`


    `OutputStreamWriter osw;`


    `osw = new OutputStreamWriter(fos, System.getProperty("file.encoding"));`


    `FileReader` is a convenience class for reading characters from files. It subclasses
    `InputStreamReader`, and its constructors, such as `FileReader(` [`String`](http://docs.oracle.com/javase/7/docs/api/java/lang/String.html#class%20in%20java.lang)
    `path)`, call `InputStreamReader(InputStream)`. An instance of this class is equivalent
    to the following code fragment:


    `FileInputStream fis = new FileInputStream(path);`


    `InputStreamReader isr;`


    `isr = new InputStreamReader(fis, System.getProperty("file.encoding"));`


    Neither `FileWriter` nor `FileReader` supply their own methods. Instead, you call
    their inherited methods, such as the following:


    *   `void write(` [`String`](http://docs.oracle.com/javase/7/docs/api/java/lang/String.html#class%20in%20java.lang)
    `str, int off, int len)`: Write `len` characters of string `str` starting at zero-based
    offset `off`. Throw `java.io.IOException` when an I/O error occurs.

    *   `int read(char[] cbuf, int off, int len)`: Read `len` characters into `cbuf`
    starting at zero-based offset `off`. Throw `IOException` when an I/O error occurs.


    Listing [5-1](#A978-1-4842-1565-4_5_Chapter.html#FPar7) presents a short application
    that demonstrates `FileWriter`, `FileReader`, and these methods.


    Listing 5-1\. Demonstrating the `FileWriter` and `FileReader` Classes


    `import java.io.FileReader;`


    `import java.io.FileWriter;`


    `import java.io.IOException;`


    `public class FWFRDemo`


    `{`


       `final static String MSG = "Test message";`


       `public static void main(String[] args) throws IOException`


       `{`


          `try (FileWriter fw = new FileWriter("temp"))`


          `{`


             `fw.write(MSG, 0, MSG.length());`


          `}`


          `char[] buf = new char[MSG.length()];`


          `try (FileReader fr = new FileReader("temp"))`


          `{`


             `fr.read(buf, 0, MSG.length());`


             `System.out.println(buf);`


          `}`


       `}`


    `}`


    `FWFRDemo` first creates a `FileWriter` instance connected to a file named `temp`.
    It then invokes `void write(` [`String`](http://docs.oracle.com/javase/7/docs/api/java/lang/String.html#class%20in%20java.lang)
    `str, int off, int len)` to write a message to this file. The `try`-with-resources
    statement automatically closes the file following this operation.


    Next, `FWFRDemo` creates a buffer for storing a line of text, and then creates
    a `FileReader` instance connected to `temp`. It then invokes `int read(char[]
    cbuf, int off, int len)` to read the previously written message and output it
    to the standard output stream. The file is then closed.


