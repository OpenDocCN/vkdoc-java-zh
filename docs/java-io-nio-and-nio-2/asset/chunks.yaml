- fmt: "`newDirectoryStream(Path dir, DirectoryStream.Filter<? super Path> filter)`\
    \ opens a directory, returning a `DirectoryStream` to iterate over the entries\
    \ in the directory. The elements returned by the directory stream’s iterator are\
    \ of type `Path`; each `Path` object represents an entry in the directory. The\
    \ `Path` objects are obtained as if by resolving the name of the directory entry\
    \ against `dir`. The entries returned by the iterator are filtered by the given\
    \ `filter`. This method throws `IOException` when an I/O error occurs and `NotDirectoryException`\
    \ when the path couldn’t be opened because it’s not a directory.\n\nTo create\
    \ a filter, you need to subclass `DirectoryStream.Filter<T>` and override its\
    \ `boolean accept(T path)` method, making sure to pass `Path` to `T`. This method\
    \ must return `true` when `path` is accepted (included in the directory stream);\
    \ otherwise, it must return `false`. The following example demonstrates a filter:\n\
    \n```\nDirectoryStream.Filter<Path> filter;\nfilter = new DirectoryStream.Filter<Path>()\n\
    {\n    @Override\n    public boolean accept(Path path) throws IOException\n  \
    \  {\n        return path.toString().endsWith(\".java\");\n    }\n};\n```\n\n\
    This filter accepts only those entries having the `.java` file extension.\n\n\
    Listing [12-33](#A978-1-4842-1565-4_12_Chapter.html#FPar49) presents an application\
    \ that obtains and outputs all entries in the specified directory that match a\
    \ specific file extension.\n\n## Listing 12-33. Obtaining and Outputting All Directory\
    \ Entries That Match an Extension\n\n```\nimport java.io.IOException;\nimport\
    \ java.nio.file.DirectoryStream;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\n\
    import java.nio.file.Paths;\n\npublic class DSDemo\n{\n    public static void\
    \ main(String[] args)\n    {\n        if (args.length != 2)\n        {\n     \
    \       System.err.println(\"usage: java DSDemo dirpath ext\");\n            return;\n\
    \        }\n\n        DirectoryStream.Filter<Path> filter;\n        filter = new\
    \ DirectoryStream.Filter<Path>()\n        {\n            @Override\n         \
    \   public boolean accept(Path path) throws IOException\n            {\n     \
    \           return path.toString().endsWith(args[1]);\n            }\n       \
    \ };\n\n        Path path = Paths.get(args[0]);\n        try (DirectoryStream<Path>\
    \ ds =\n                Files.newDirectoryStream(path, filter))\n        {\n \
    \           for (Path p: ds)\n                System.out.println(p);\n       \
    \ }\n        catch (IOException ioe)\n        {\n            ioe.printStackTrace();\n\
    \        }\n    }\n}\n```\n\nCompile Listing [12-33](#A978-1-4842-1565-4_12_Chapter.html#FPar49)\
    \ (`javac DSDemo.java`) and run the resulting application. For example, I specified\
    \ the following command line:\n\n```\njava DSDemo \\temp .java\n```\n\nI then\
    \ observed several files in my `\\temp` directory whose extension is `.java`.\n\
    \n`newDirectoryStream(Path dir, String glob)` is similar to the previous method\
    \ but uses a globbing pattern (a simple regular expression-type pattern) to filter\
    \ files. Also, it throws `java.util.regex.PatternSyntaxException` when the pattern\
    \ is invalid.\n\nListing [12-34](#A978-1-4842-1565-4_12_Chapter.html#FPar50) presents\
    \ a variation of Listing [12-33](#A978-1-4842-1565-4_12_Chapter.html#FPar49) that\
    \ uses `newDirectoryStream(Path dir, String glob)`.\n\n## Listing 12-34. Obtaining\
