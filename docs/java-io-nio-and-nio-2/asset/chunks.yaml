  trans: '

    ### 正则表达式


    正则表达式是作为 NIO 的一部分引入的。尽管你可能对其引入的理由感到疑惑（正则表达式与 I/O 有什么关系？），但正则表达式通常用于扫描从文件或其他来源读取的文本数据。尽可能快地执行这些扫描的需求促使其被纳入。JDK
    1.4 通过 `java.util.regex` 包及其 `Pattern` 和 `Matcher` 类支持正则表达式。


    第 9 章 将探讨 `Pattern` 和 `Matcher` 类。


    ### 字符集


    我之前提到过，JDK 1.1 引入了考虑字符编码的 writer/reader 类。最初，诸如 `java.io.InputStreamReader` 之类的类与
    `java.io.ByteToCharConverter` 类协同工作，以基于编码执行转换。`ByteToCharConverter` 最终被弃用，并从 JDK
    6 及后续版本中移除。取而代之的是引入了功能更强大的 `java.nio.charset` 包及其 `Charset`、`CharsetEncoder`、`CharsetDecoder`
    和相关类型。


    第 10 章 将探讨 `Charset` 类。


    ### 格式化器


    JSR 51 提到了一种简单的 `printf` 风格的格式化工具。这种工具在准备展示数据方面具有重要价值，许多 C 语言程序员可以证明这一点。然而，JDK
    1.4 并未包含此功能，因为它依赖于可变参数列表，而这一语言特性直到 JDK 5 才首次亮相。幸运的是，JDK 5 包含了一个 `java.util.Formatter`
    类，它拥有丰富的格式化功能以及支持自定义格式化的相关类型，并且向 `PrintStream` 类添加了 `printf()`（以及相关的 `format()`）方法。


    第 11 章 将探讨 `Formatter` 并演示 `printf()`。


    ## NIO.2


    JSR 51 规定 NIO 将引入一个改进的文件系统接口，以克服传统 `File` 类的各种问题。然而，由于时间不足，此功能未能包含在内。此外，也无法支持异步
    I/O 和完善套接字通道功能。随后创建了 JSR 203（[`www.jcp.org/en/jsr/detail?id=203`](http://www.jcp.org/en/jsr/detail?id=203)）来解决这些遗漏的问题，该规范在
    JDK 7 中首次亮相。


    注意


    在 JDK 7 正式发布之前，曾考虑为 NIO.2 引入大缓冲区（具有 64 位寻址能力的缓冲区）。计划将 `BigByteBuffer` 和 `MappedBigByteBuffer`
    等类包含在 `java.nio` 包或其他包中。然而，正如 OpenJDK 讨论主题“`BigByteBuffer`/`MappedBigByteBuffer`”（[`http://mail.openjdk.java.net/pipermail/nio-discuss/2009-June/000207.html`](http://mail.openjdk.java.net/pipermail/nio-discuss/2009-June/000207.html)）中所解释的那样，此功能已被放弃，转而追求“64
    位数组或集合”。


    ### 改进的文件系统接口


    传统的 `File` 类存在各种问题。例如，`renameTo()` 方法在不同操作系统上的行为不一致。此外，`File` 的许多方法不具备可伸缩性；从服务器请求大型目录列表可能会导致挂起。JSR
    203 中提到的新的文件系统接口修复了这些问题以及其他问题。例如，它支持批量访问文件属性，提供更改通知工具，提供转义到特定文件系统 API 的能力，并拥有用于可插拔文件系统实现的服务提供者接口。


    第 12 章 将探讨改进的文件系统接口。


    ### 异步 I/O


    非阻塞模式通过防止在通道上执行读取或写入操作的线程阻塞（直到输入可用或输出已完全写入）来提高性能。然而，它不允许应用程序在不实际执行操作的情况下确定是否可以执行操作。例如，当非阻塞读取操作成功时，应用程序得知读取操作是可行的，但同时也读取了一些必须管理的数据。这种双重性阻止你将检查流就绪状态的代码与数据处理代码分离，而不会使代码变得非常复杂。


    异步 I/O 通过让线程启动操作并立即继续执行其他工作来克服这个问题。线程指定某种回调函数，该函数在操作完成时被调用。


    第 13 章 将探讨异步 I/O。


    ### 完善套接字通道功能


    JDK 1.4 向 `java.nio.channels` 包添加了 `DatagramChannel`、`ServerSocketChannel` 和 `SocketChannel`
    类。然而，由于时间不足，这些类未能支持绑定和选项配置。此外，基于通道的多播数据报也未得到支持。JDK 7 为上述类添加了绑定支持和选项配置。同时，它还引入了一个新的
    `java.nio.channels.MulticastChannel` 接口。


    第 14 章 将探讨套接字通道功能的完善。


    练习


    以下练习旨在测试你对第 1 章内容的理解：


    识别构成经典 I/O 的 API 类别。   `try`-with-resources 语句提供了什么好处？   识别构成 NIO 的 API 类别。  
    哪个 API 类允许 Java 程序利用就绪选择？   识别构成 NIO.2 的 API 类别。   NIO.2 如何完善套接字通道功能？


    ## 总结


    I/O 是操作系统、计算机语言和语言库的基础。Java 通过其经典 I/O、NIO 和 NIO.2 API 类别支持 I/O。


    经典 I/O 提供了访问文件系统、随机访问文件内容（相对于顺序访问）、在源和目标之间流式传输面向字节的数据以及支持字符流的 API。


    NIO 提供了管理缓冲区、通过通道通信缓冲数据、通过选择器利用就绪选择、通过正则表达式快速扫描文本数据、通过字符集指定字符编码以及支持 `printf` 风格格式化的
    API。


    NIO.2 提供了改进文件系统接口、支持异步 I/O 以及通过升级 `DatagramChannel`、`ServerSocketChannel` 和 `SocketChannel`
    并引入新的 `MulticastChannel` 接口来完善套接字通道功能的 API。


    第 2 章 将介绍经典 I/O 的 `File` 类。


    # 第二部分

    经典 I/O API


    # 2. 文件


    电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1565-4_​2](http://dx.doi.org/10.1007/978-1-4842-1565-4_2)）包含补充材料，仅供授权用户使用。


    应用程序经常与文件系统交互，文件系统通常实现为从根目录开始的文件和目录层次结构。Java 虚拟机（JVM）运行的操作系统通常至少支持一个文件系统。例如，Unix/Linux
    将所有已挂载（已连接并准备好）的磁盘合并到一个虚拟文件系统中。相比之下，Windows 为每个活动的磁盘驱动器关联一个单独的文件系统。Java 通过其具体的
    `java.io.File` 类提供对底层操作系统可用文件系统的访问，本章将对此进行探讨。

    '
- fmt: '# Constructing File Instances


    An instance of the `File` class contains an abstract representation of a file
    or directory path (a compact map that locates and identifies a file system object).
    To create a `File` instance, call a constructor such as `File(String path)`, which
    creates a `File` instance that stores the `path` string:


    ```

    File file1 = new File("/x/y");

    File file2 = new File("C:\\temp\\x.dat");

    ```


    The first line assumes a Unix/Linux operating system, starts the path with root
    directory symbol `/`, and continues with directory name `x`, separator character
    `/`, and file or directory name `y`. (It also works on Windows, which assumes
    this path begins at the root directory on the current drive.)


    > **Note:** An operating system-dependent separator character (such as the Windows
    backslash `\` character) appears between a path’s consecutive names.


    The second line assumes a Windows operating system, starts the path with drive
    specifier `C:`, and continues with root directory symbol `\`, directory name `temp`,
    separator character `\`, and file name `x.dat` (although `x.dat` might refer to
    a directory). (You could also use forward slashes `/` on Windows.)


    > **Caution:** Always double backslash characters that appear in a string literal,
    especially when specifying a path; otherwise, you run the risk of introducing
    bugs or receiving compiler error messages. For example, I doubled the backslash
    characters in the second statement to denote a backslash and not a tab (`\t`)
    and to avoid a compiler error message (`\x` is illegal).


    Each statement’s path is absolute, which is a path that starts with the root directory
    symbol; no other information is required to locate the file/directory that it
    denotes. In contrast, a relative path doesn’t start with the root directory symbol;
    it’s interpreted via information taken from another path.


    > **Note:** The `java.io` package’s classes default to resolving relative paths
    against the current user (also known as working) directory, which is identified
    by the system property `user.dir` and which is typically the directory in which
    the JVM was launched. (You obtain a system property value by calling the `java.lang.System`
    class’s `getProperty()` method.)


    `File` instances contain abstract representations of file and directory paths
    (these files or directories may or may not exist in their file systems) by storing
    abstract paths, which offer operating system-independent views of hierarchical
    paths. In contrast, user interfaces and operating systems use operating system-dependent
    path strings to name files and directories.


    An abstract path consists of an optional operating system-dependent prefix string,
    such as a disk drive specifier, `/` for the Unix/Linux root directory, or `\\`
    for a Windows Universal Naming Convention (UNC) path, and a sequence of zero or
    more string names. The first name in an abstract path may be a directory name
    or, in the case of Windows UNC paths, a hostname. Each subsequent name denotes
    a directory; the last name may denote a directory or a file. The empty abstract
    path has no prefix and an empty name sequence.


    The conversion of a path string to or from an abstract path is inherently operating
    system-dependent. When a path string is converted into an abstract path, the names
    within this string may be separated by the default name-separator character or
    by any other name-separator character that is supported by the underlying operating
    system. When an abstract path is converted into a path string, each name is separated
    from the next by a single copy of the default name-separator character.


    > **Note:** The default name-separator character is defined by the system property
    `file.separator` and is made available in `File`’s `public static` `separator`
    and `separatorChar` fields—the first field stores the character in a `java.lang.String`
    instance and the second field stores it as a `char` value.


    `File` offers additional constructors for instantiating this class. For example,
    the following constructors merge parent and child paths into combined paths that
    are stored in `File` objects:


    - `File(String parent, String child)` creates a new `File` instance from a `parent`
    path string and a `child` path string.

    - `File(File parent, String child)` creates a new `File` instance from a `parent`
    path `File` instance and a `child` path string.


    Each constructor’s `parent` parameter is passed a parent path, a path that consists
    of all path components except for the last name, which is specified by `child`.
    The following statement demonstrates this concept via the first constructor:


    ```

    File file3 = new File("prj/books/", "io");

    ```


    The constructor merges the parent path `prj/books/` with the child path `io` into
    the `prj/books/io` path. (If I had specified `prj/books` as the parent path, the
    constructor would have added the separator character after `books`.)


    > **Tip:** Because `File(String path)`, `File(String parent, String child)`, and
    `File(File parent, String child)` don’t detect invalid path arguments (apart from
    throwing a `java.lang.NullPointerException` when `path` or `child` is `null`),
    you must be careful when specifying paths. You should strive to only specify paths
    that are valid for all operating systems on which the application will run. For
    example, instead of hard-coding a drive specifier (such as `C:`) in a path, use
    a root returned from `listRoots()`, which I discuss later. Even better, keep your
    paths relative to the current user/working directory (returned from the `user.dir`
    system property).'
