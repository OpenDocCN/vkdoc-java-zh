  trans: '

    ## 摘要


    NIO.2 改进了此前仅限于 `File` 类的文件系统接口。改进后的文件系统接口具有以下特性：方法抛出异常、支持符号链接、对文件属性的广泛高效支持、目录流、通过自定义文件系统提供程序支持替代文件系统、支持文件复制和移动、支持遍历文件树/访问文件以及监视目录等。


    改进后的文件系统接口主要由 `java.nio.file`、`java.nio.file.attribute` 和 `java.nio.file.spi`
    包中的各种类型实现。`FileSystem`、`FileSystems` 和 `FileSystemProvider` 构成了改进后文件系统接口的核心。


    第 13 章 介绍了 NIO.2 对异步 I/O 的支持。


    # 13. 异步 I/O


    电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-1565-4_​13](http://dx.doi.org/10.1007/978-1-4842-1565-4_13))
    包含补充材料，仅供授权用户使用。


    NIO 提供了多路复用 I/O（结合了第 7 章讨论的非阻塞 I/O 和第 8 章讨论的就绪选择），以帮助创建高度可扩展的服务器。客户端代码向选择器注册一个套接字通道，以便在通道准备好开始
    I/O 时收到通知。


    NIO.2 提供了异步 I/O，它允许客户端代码发起一个 I/O 操作，并在操作完成时通知客户端。与多路复用 I/O 类似，异步 I/O 也常用于帮助创建高度可扩展的服务器。


    注意


    多路复用 I/O 通常用于提供高度可扩展和高性能轮询接口的操作系统——例如 Linux 和 Solaris。异步 I/O 通常用于提供高度可扩展和高性能异步
    I/O 设施的操作系统——例如较新的 Windows 操作系统。


    本章首先概述异步 I/O，然后探讨异步文件通道、套接字通道和通道组。


    ## 异步 I/O 概述


    `java.nio.channels.AsynchronousChannel` 接口描述了一个异步通道，即支持异步 I/O 操作（读取、写入等）的通道。通过调用返回
    future 或需要完成处理程序参数的方法来发起 I/O 操作：


    *   `Future<V> operation(...)`：调用 `operation` 并返回一个 `java.util.concurrent.Future<V>`
    接口对象，其中 `V` 是 `operation` 的结果类型。可以调用 [`Future`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/Future.html#interface%20in%20java.util.concurrent)
    的方法来检查 I/O 操作是否已完成、等待其完成以及检索结果。

    *   `void operation(... A attachment, CompletionHandler<V,? super A> handler)`：使用
    `attachment`（一个附加到 I/O 操作的对象，用于在消费结果时提供上下文）和 `handler`（`java.nio.channels.CompletionHandler<V,
    A>` 接口的实例）作为参数调用 `operation`。`A` 是附件对象的类型。`V` 是 I/O 操作的结果类型。当使用无状态的 `CompletionHandler`
    对象来消费多个 I/O 操作的结果时，`attachment` 非常重要。当 I/O 操作完成或失败时，会调用 `handler` 来消费结果。


    `CompletionHandler` 声明了以下方法，用于在操作成功完成时消费结果，以及了解操作失败的原因并采取相应措施：


    *   `void completed(V result, A attachment)`：当操作成功完成时调用。操作的结果由 `result` 标识，操作发起时附加的对象由
    `attachment` 标识。

    *   `void failed(Throwable t, A attachment)`：当操作失败时调用。操作失败的原因由 `t` 标识，操作发起时附加的对象由
    `attachment` 标识。


    调用后，该方法会立即返回。然后你可以调用 `Future` 的方法，或在 `CompletionHandler` 实现中提供代码，以了解 I/O 操作的状态和/或处理
    I/O 操作的结果。


    取消


    `Future` 声明了 `boolean cancel(boolean mayInterruptIfRunning)` 方法来取消执行。此方法会导致所有等待
    I/O 操作结果的线程抛出 `java.util.concurrent.`[`CancellationException`](https://docs.oracle.com/javase/8/docs/api/java/util/concurrent/CancellationException.html#class%20in%20java.util.concurrent)。底层
