    | 方法 | 描述 |

    | --- | --- |

    | `void close()` | 关闭文件并释放所有关联的操作系统资源。后续的写入或读取操作将导致 `IOException`。此外，无法通过此 `RandomAccessFile`
    对象重新打开该文件。当发生 I/O 错误时，此方法会抛出 `IOException`。 |

    | `FileDescriptor getFD()` | 返回文件关联的文件描述符对象。当发生 I/O 错误时，此方法会抛出 `IOException`。
    |

    | `long getFilePointer()` | 返回文件指针当前在文件中的基于零的字节偏移量。当发生 I/O 错误时，此方法会抛出 `IOException`。
    |

    | `long length()` | 返回文件的长度（以字节为单位）。当发生 I/O 错误时，此方法会抛出 `IOException`。 |

    | `int read()` | 从文件中读取并返回下一个字节（以 `int` 形式返回，范围 0 到 255），如果到达文件末尾则返回 `-1`。当没有输入可用时，此方法会阻塞；当发生
    I/O 错误时，会抛出 `IOException`。 |

    | `int read(byte[] b)` | 从文件中读取最多 `b.length` 字节的数据到字节数组 `b` 中。此方法会阻塞，直到至少有一个字节的输入可用。它返回读取到数组中的字节数，如果到达文件末尾则返回
    `-1`。当 `b` 为 `null` 时，抛出 `java.lang.NullPointerException`；当发生 I/O 错误时，抛出 `IOException`。
    |

    | `char readChar()` | 从文件中读取并返回一个字符。此方法从当前文件指针位置开始，从文件中读取两个字节。如果按顺序读取的字节是 `b1`
    和 `b2`，其中 0 <= `b1`, `b2` <= 255，则结果等于 `(char) ((b1 << 8) &#124; b2)`。此方法会阻塞，直到读取到两个字节、检测到文件末尾或抛出异常。如果在读取完两个字节之前到达文件末尾，则抛出
    `java.io.EOFException`（`IOException` 的子类）；当发生 I/O 错误时，抛出 `IOException`。 |

    | `int readInt()` | 从文件中读取并返回一个 32 位整数。此方法从当前文件指针位置开始，从文件中读取四个字节。如果按顺序读取的字节是 `b1`、`b2`、`b3`
    和 `b4`，其中 0 <= `b1`, `b2`, `b3`, `b4` <= 255，则结果等于 `(b1 << 24) &#124; (b2 << 16)
    &#124; (b3 << 8) &#124; b4`。此方法会阻塞，直到读取到四个字节、检测到文件末尾或抛出异常。如果在读取完四个字节之前到达文件末尾，则抛出
    `EOFException`；当发生 I/O 错误时，抛出 `IOException`。 |

    | `void seek(long pos)` | 将文件指针的当前偏移量设置为 `pos`（以文件开头的字节数计）。如果偏移量设置到文件末尾之后，文件的长度不会改变。只有在将偏移量设置到文件末尾之后进行写入操作时，文件长度才会改变。当
    `pos` 的值为负数或发生 I/O 错误时，此方法会抛出 `IOException`。 |

    | `void setLength(long newLength)` | 设置文件的长度。如果 `length()` 返回的当前长度大于 `newLength`，则文件会被截断。在这种情况下，如果
    `getFilePointer()` 返回的文件偏移量大于 `newLength`，则在 `setLength()` 返回后，偏移量将等于 `newLength`。如果当前长度小于
    `newLength`，则文件会被扩展。在这种情况下，文件扩展部分的内容是未定义的。当发生 I/O 错误时，此方法会抛出 `IOException`。 |

    | `int skipBytes(int n)` | 尝试跳过 `n` 个字节。如果在跳过 `n` 个字节之前到达文件末尾，此方法会跳过较少数量的字节（可能为零）。在这种情况下，它不会抛出
    `EOFException`。如果 `n` 为负数，则不跳过任何字节。返回实际跳过的字节数。当发生 I/O 错误时，此方法会抛出 `IOException`。
    |

    | `void write(byte[] b)` | 从当前文件指针位置开始，将字节数组 `b` 中的 `b.length` 个字节写入文件。当发生 I/O
    错误时，此方法会抛出 `IOException`。 |

    | `void write(int b)` | 在当前文件指针位置，将 `b` 的低八位作为 32 位整数写入文件。当发生 I/O 错误时，此方法会抛出 `IOException`。
    |

    | `void writeChars(String s)` | 从当前文件指针位置开始，将字符串 `s` 作为字符序列写入文件。当发生 I/O 错误时，此方法会抛出
    `IOException`。 |

    | `void writeInt(int i)` | 从当前文件指针位置开始，将 32 位整数 `i` 写入文件。四个字节按高位优先的顺序写入。当发生 I/O
    错误时，此方法会抛出 `IOException`。 |


    表 3-1 中的大多数方法都相当不言自明。然而，`getFD()` 方法需要进一步说明。


    注意


    `RandomAccessFile` 中以 `read` 为前缀的方法和 `skipBytes()` 方法源自 `java.io.DataInput` 接口，该类实现了该接口。此外，`RandomAccessFile`
    中以 `write` 为前缀的方法源自 `java.io.DataOutput` 接口，该类也实现了该接口。


    当文件被打开时，底层操作系统会创建一个依赖于操作系统的结构来表示该文件。该结构的句柄存储在 `java.io.FileDescriptor` 类的实例中，`getFD()`
    方法返回该实例。


    注意


    句柄是一个标识符，Java 将其传递给底层操作系统，用于在需要底层操作系统执行文件操作时，标识特定的已打开文件。


    `FileDescriptor` 是一个小型类，它声明了三个名为 `in`、`out` 和 `err` 的 `FileDescriptor` 常量。这些常量使得
    `System.in`、`System.out` 和 `System.err` 能够访问标准输入、标准输出和标准错误流。


    `FileDescriptor` 还声明了以下一对方法：


    *   `void sync()` 通知底层操作系统将打开文件的输出缓冲区内容刷新（清空）到其关联的本地磁盘设备。在所有修改过的数据和属性都已写入相关设备后，`sync()`
    返回。当缓冲区无法刷新，或者因为操作系统无法保证所有缓冲区都已与物理介质同步时，它会抛出 `java.io.SyncFailedException`。

    *   `boolean valid()` 判断此文件描述符对象是否有效。如果文件描述符对象表示一个打开的文件或其他活动的 I/O 连接，则返回 true；否则返回
    false。


    写入打开文件的数据存储在底层操作系统的输出缓冲区中。当缓冲区填满时，操作系统会将其清空到磁盘。缓冲区提高了性能，因为磁盘访问比访问计算机内部内存慢得多。


    但是，当你通过模式 `"rwd"` 或 `"rws"` 打开随机访问文件并写入数据时，每次写入操作的数据都会直接写入磁盘。因此，写入操作比以 `"rw"`
    模式打开随机访问文件时要慢。


    假设你遇到一种情况，需要结合使用输出缓冲区写入数据和直接写入磁盘。以下示例通过以 `"rw"` 模式打开文件并有选择地调用 `FileDescriptor`
    的 `sync()` 方法来解决这种混合场景。


    `RandomAccessFile raf = new RandomAccessFile("employee.dat", "rw");`


    `FileDescriptor fd = raf.getFD();`


    `// 执行一次关键的写入操作。`


    `raf.write(...);`


    `// 通过将操作系统输出缓冲区刷新到磁盘来与底层磁盘同步。`


    `fd.sync();`


    `// 执行一次非关键的写入操作，无需同步。`


    `raf.write(...);`


    `// 执行其他工作。`


    `// 关闭文件，将输出缓冲区清空到磁盘。`


    `raf.close();`

