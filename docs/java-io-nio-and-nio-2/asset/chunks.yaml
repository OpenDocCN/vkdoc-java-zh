- fmt: '# Character Classes


    A character class is a set of characters appearing between `[` and `]`. There
    are six kinds of character classes:


    - A simple character class consists of literal characters placed side by side
    and matches only these characters. For example, `[abc]` consists of characters
    `a`, `b`, and `c`. Also, `java RegExDemo t[aiou]ck tack` reports a match because
    `a` is a member of `[aiou]`. It also reports a match when the input is `tick`,
    `tock`, or `tuck` because `i`, `o`, and `u` are members.

    - A negation character class consists of a circumflex metacharacter (`^`), followed
    by literal characters placed side by side, and matches all characters except for
    the characters in the class. For example, `[^abc]` consists of all characters
    except for `a`, `b`, and `c`. Also, `java RegExDemo "[^b]ox" box` doesn’t report
    a match because `b` isn’t a member of `[^b]`, whereas `java RegExDemo "[^b]ox"
    fox` reports a match because `f` is a member. (The double quotes surrounding `[^b]ox`
    are necessary on my Windows 7 operating system because `^` is treated specially
    at the command line.)

    - A range character class consists of successive literal characters expressed
    as a starting literal character, followed by the hyphen metacharacter (`-`), followed
    by an ending literal character, and matches all characters in this range. For
    example, `[a-z]` consists of all characters from `a` through `z`. Also, `java
    RegExDemo [h-l]ouse house` reports a match because `h` is a member of the class,
    whereas `java RegExDemo [h-l]ouse mouse` doesn’t report a match because `m` lies
    outside of the range and is therefore not part of the class. You can combine multiple
    ranges within the same range character class by placing them side by side; for
    example, `[A-Za-z]` consists of all uppercase and lowercase Latin letters.

    - A union character class consists of multiple nested character classes and matches
    all characters that belong to the resulting union. For example, `[abc[u-z]]` consists
    of characters `a`, `b`, `c`, `u`, `v`, `w`, `x`, `y`, and `z`. Also, `java RegExDemo
    [[0-9][A-F][a-f]] e` reports a match because `e` is a hexadecimal character. (I
    could have alternatively expressed this character class as `[0-9A-Fa-f]` by combining
    multiple ranges.)

    - An intersection character class consists of multiple `&&`–separated nested character
    classes and matches all characters that are common to these nested character classes.
    For example, `[a-c&&[c-f]]` consists of character `c`, which is the only character
    common to `[a-c]` and `[c-f]`. Also, `java RegExDemo "[aeiouy&&[y]]" y` reports
    a match because `y` is common to classes `[aeiouy]` and `[y]`.

    - A subtraction character class consists of multiple `&&`-separated nested character
    classes, where at least one nested character class is a negation character class,
    and matches all characters except for those indicated by the negation character
    class/classes. For example, `[a-z&&[^x-z]]` consists of characters `a` through
    `w`. (The square brackets surrounding `^x-z` are necessary; otherwise, `^` is
    ignored and the resulting class consists of only `x`, `y`, and `z`.) Also, `java
    RegExDemo "[a-z&&[^aeiou]]" g` reports a match because `g` is a consonant and
    only consonants belong to this class. (I’m ignoring `y`, which is sometimes regarded
    as a consonant and sometimes regarded as a vowel.)


    A predefined character class is a regex construct for a commonly specified character
    class. Table 9-3 identifies `Pattern`’s predefined character classes.


    **Table 9-3.** Predefined Character Classes


    | Predefined Character Class | Description |

    | --- | --- |

    | `\d` | Match any digit character. `\d` is equivalent to `[0-9]`. |

    | `\D` | Match any nondigit character. `\D` is equivalent to `[^\d]`. |

    | `\s` | Match any whitespace character. `\s` is equivalent to `[\t\n\x0B\f\r
    ]`. |

    | `\S` | Match any nonwhitespace character. `\S` is equivalent to `[^\s]`. |

    | `\w` | Match any word character. `\w` is equivalent to `[a-zA-Z0-9]`. |

    | `\W` | Match any nonword character. `\W` is equivalent to `[^\w]`. |


    For example, the following command line reports a match because `\w` matches the
    word character `a` in `abc`:


    `java RegExDemo \wbc abc`


    # Capturing Groups


    A capturing group saves a match’s characters for later recall during pattern matching
    and is expressed as a character sequence surrounded by parentheses metacharacters
    `(` and `)`. All characters within a capturing group are treated as a unit. For
    example, the `(Java)` capturing group combines `J`, `a`, `v`, and `a` into a unit.
    It matches the `Java` pattern against all occurrences of `Java` in the input.
    Each match replaces the previous match’s saved `Java` characters with the next
    match’s `Java` characters.


    Capturing groups can appear inside other capturing groups. For example, capturing
    groups `(A)` and `(B(C))` appear inside capturing group `((A)(B(C)))`, and capturing
    group `(C)` appears inside capturing group `(B(C))`. Each nested or non-nested
    capturing group receives its own number, numbering starts at 1, and capturing
    groups are numbered from left to right. For example, `((A)(B(C)))` is assigned
    1, `(A)` is assigned 2, `(B(C))` is assigned 3, and `(C)` is assigned 4.


    A capturing group saves its match for later recall via a back reference, which
    is a backslash character followed by a digit character denoting a capturing group
    number. The back reference causes the matcher to use the back reference’s capturing
    group number to recall the capturing group’s saved match and then use that match’s
    characters to attempt a further match. The following example uses a back reference
    to determine if the input consists of two consecutive `Java` patterns:


    `java RegExDemo "(Java) \1" "Java Java"`


    `RegExDemo` reports a match because the matcher detects `Java`, followed by a
    space, followed by `Java` in the input.


    # Boundary Matchers and Zero-Length Matches


    A boundary matcher is a regex construct for identifying the beginning of a line,
    a word boundary, the end of text, and other commonly occurring boundaries. See
    Table 9-4.


    **Table 9-4.** Boundary Matchers


    | Boundary Matcher | Description |

    | --- | --- |

    | `^` | Match beginning of line. |

    | `$` | Match end of line. |

    | `\b` | Match word boundary. |

    | `\B` | Match nonword boundary. |

    | `\A` | Match beginning of text. |

    | `\G` | Match end of previous match. |

    | `\Z` | Match end of text except for line terminator (when present). |

    | `\z` | Match end of text. |


    Consider the following example:


    `java RegExDemo \b\b "I think"`


    This example reports several matches, as revealed in the following output:


    ```

    regex = \b\b

    input = I think

    Located [] starting at 0 and ending at -1

    Located [] starting at 1 and ending at 0

    Located [] starting at 2 and ending at 1

    Located [] starting at 7 and ending at 6

    ```


    This output reveals several zero-length matches. When a zero-length match occurs,
    the starting and ending indexes are equal, although the output shows the ending
    index to be one less than the starting index because I specified `end() - 1` in
    Listing 9-1 (so that a match’s end index identifies a non-zero-length match’s
    last character, not the character following the non-zero-length match’s last character).


    **Note:** A zero-length match occurs in empty input text, at the beginning of
    input text, after the last character of input text, or between any two characters
    of that text. Zero-length matches are easy to identify because they always start
    and end at the same index position.'
