    完整的输出显示少数网络接口的 MTU 大小不同。每个大小代表一条消息在不需被分片成多个 IP 数据报的情况下，能够放入一个 IP 数据报的最大长度。这种分片会对性能产生影响，尤其是在网络游戏中。仅此一点，`getMTU()`
    方法就是 `NetworkInterface` 中一个非常有价值的成员。


    `getInterfaceAddresses()` 方法返回一个 `InterfaceAddress` 对象列表，每个对象包含一个网络接口的 IP 地址以及广播地址和子网掩码（IPv4）或网络前缀长度（IPv6）。


