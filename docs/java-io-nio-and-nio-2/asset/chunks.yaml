- fmt: '| Method | Description |

    | --- | --- |

    | `int available()` | Return an estimate of the number of bytes that can be read
    from this input stream via the next `read()` method call (or skipped over via
    `skip()`) without blocking the calling thread. This method throws `IOException`
    when an I/O error occurs. It’s never correct to use this method’s return value
    to allocate a buffer for holding all of the stream’s data because a subclass might
    not return the total size of the stream. |

    | `void close()` | Close this input stream and release any operating system resources
    associated with the stream. This method throws `IOException` when an I/O error
    occurs. |

    | `void mark(int readlimit)` | Mark the current position in this input stream.
    A subsequent call to `reset()` repositions this stream to the last marked position
    so that subsequent read operations re-read the same bytes. The `readlimit` argument
    tells this input stream to allow that many bytes to be read before invalidating
    this mark (so that the stream cannot be reset to the marked position). |

    | `boolean markSupported()` | Return true when this input stream supports `mark()`
    and `reset()`; otherwise, return false. |

    | `int read()` | Read and return (as an `int` in the range 0 to 255) the next
    byte from this input stream, or return `-1` when the end of the stream is reached.
    This method blocks until input is available, the end of the stream is detected,
    or an exception is thrown. It throws `IOException` when an I/O error occurs. |

    | `int read(byte[] b)` | Read some number of bytes from this input stream and
    store them in byte array `b`. Return the number of bytes actually read (which
    might be less than `b`’s length but is never more than its length), or return
    `-1` when the end of the stream is reached (no byte is available to read). This
    method blocks until input is available, the end of the stream is detected, or
    an exception is thrown. It throws `NullPointerException` when `b` is `null` and
    `IOException` when an I/O error occurs. |

    | `int read(byte[] b, int off, int len)` | Read no more than `len` bytes from
    this input stream and store them in byte array `b`, starting at the offset specified
    by `off`. Return the number of bytes actually read (which might be less than `len`
    but is never more than `len`), or return `-1` when the end of the stream is reached
    (no byte is available to read). This method blocks until input is available, the
    end of the stream is detected, or an exception is thrown. It throws `NullPointerException`
    when `b` is `null`; `IndexOutOfBoundsException` when `off` is negative, `len`
    is negative, or `len` is greater than `b.length - off`; and `IOException` when
    an I/O error occurs. |

    | `void reset()` | Reposition this input stream to the position at the time `mark()`
    was last called. This method throws `IOException` when this input stream has not
    been marked or the mark has been invalidated. |

    | `long skip(long n)` | Skip over and discard `n` bytes of data from this input
    stream. This method might skip over some smaller number of bytes (possibly zero),
    for example, when the end of the file is reached before `n` bytes have been skipped.
    The actual number of bytes skipped is returned. When `n` is negative, no bytes
    are skipped. This method throws `IOException` when this input stream doesn’t support
    skipping or when some other I/O error occurs. |


    `InputStream` subclasses such as `ByteArrayInputStream` support marking the current
    read position in the input stream via the `mark()` method and later return to
    that position via the `reset()` method.


    **Caution**


    Don’t forget to call `markSupported()` to find out if the subclass supports `mark()`
    and `reset()`.


    ### ByteArrayOutputStream and ByteArrayInputStream


    Byte arrays are often useful as stream destinations and sources. The `ByteArrayOutputStream`
    class lets you write a stream of bytes to a byte array; the `ByteArrayInputStream`
    class lets you read a stream of bytes from a byte array.


    `ByteArrayOutputStream` declares two constructors. Each constructor creates a
    byte array output stream with an internal byte array; a copy of this array can
    be returned by calling `ByteArrayOutputStream`’s `byte[] toByteArray()` method:


    * `ByteArrayOutputStream()` creates a byte array output stream with an internal
    byte array whose initial size is 32 bytes. This array grows as necessary.

    * `ByteArrayOutputStream(int size)` creates a byte array output stream with an
    internal byte array whose initial size is specified by `size` and grows as necessary.
    This constructor throws `java.lang.IllegalArgumentException` when `size` is less
    than zero.


    The following example uses `ByteArrayOutputStream()` to create a byte array output
    stream with an internal byte array set to the default size:


    `ByteArrayOutputStream baos = new ByteArrayOutputStream();`


    `ByteArrayInputStream` also declares a pair of constructors. Each constructor
    creates a byte array input stream based on the specified byte array and keeps
    track of the next byte to read from the array and the number of bytes to read:


    * `ByteArrayInputStream(byte[] ba)` creates a byte array input stream that uses
    `ba` as its byte array (`ba` is used directly; a copy isn’t created). The position
    is set to `0` and the number of bytes to read is set to `ba.length`.

    * `ByteArrayInputStream(byte[] ba, int offset, int count)` creates a byte array
    input stream that uses `ba` as its byte array (no copy is made). The position
    is set to `offset` and the number of bytes to read is set to `count`.


    The following example uses `ByteArrayInputStream(byte[])` to create a byte array
    input stream whose source is a copy of the previous byte array output stream’s
    byte array:


    `ByteArrayInputStream bais = new ByteArrayInputStream(baos.toByteArray());`


    `ByteArrayOutputStream` and `ByteArrayInputStream` are useful when you need to
    convert an image to an array of bytes, process these bytes in some manner, and
    convert the bytes back to the image.


    For example, suppose you’re writing an Android-based image-processing application.
    You decode a file containing the image into an Android-specific `android.graphics.BitMap`
    instance, compress this instance into a `ByteArrayOutputStream` instance, obtain
    a copy of the byte array output stream’s array, process this array in some manner,
    convert this array to a `ByteArrayInputStream` instance, and use the byte array
    input stream to decode these bytes into another `BitMap` instance, as follows:


    ```

    String path = ... ; // Assume a legitimate path to an image.


    Bitmap bm = BitmapFactory.decodeFile(path);


    ByteArrayOutputStream baos = new ByteArrayOutputStream();


    if (bm.compress(Bitmap.CompressFormat.PNG, 100, baos))


    {


    byte[] imageBytes = baos.toByteArray();


    // Do something with imageBytes.


    bm = BitMapFactory.decodeStream(new ByteArrayInputStream(imageBytes));


    }

    ```


    This example obtains an image file’s path and then calls the concrete `android.graphics.BitmapFactory`
    class’s `Bitmap decodeFile(String path)` class method. This method decodes the
    image file identified by `path` into a bitmap and returns a `Bitmap` instance
    that represents this bitmap.


    After creating a `ByteArrayOutputStream` object, the example uses the returned
    `BitMap` instance to call `BitMap`’s `boolean compress(Bitmap.CompressFormat format,
    int quality, OutputStream stream)` method to write a compressed version of the
    bitmap to the byte array output stream.'
