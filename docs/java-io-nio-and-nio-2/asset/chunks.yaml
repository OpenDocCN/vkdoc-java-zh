  trans: '

    #### 探索服务器套接字通道


    `ServerSocketChannel` 是三种套接字通道类中最简单的一种。该类包含以下方法：


    *   `static ServerSocketChannel open()`：尝试打开一个服务器套接字通道，该通道初始时未绑定；必须通过其对等套接字的 `bind()`
    方法之一将其绑定到特定地址，然后才能接受连接。如果无法打开通道，则抛出 `IOException`。

    *   `ServerSocket socket()`：返回与此服务器套接字通道关联的对等 `ServerSocket` 实例。

    *   `SocketChannel accept()`：接受发往此通道套接字的连接。如果此通道是非阻塞的，则当没有待处理的连接时，`accept()` 会立即返回
    `null`，或者返回一个表示连接的套接字通道。否则，当通道是阻塞的时，`accept()` 会无限期阻塞，直到有新连接可用或发生 I/O 错误。无论服务器套接字通道是阻塞还是非阻塞，`accept()`
    返回的套接字通道都是阻塞的。当服务器套接字通道已关闭时，此方法抛出 `ClosedChannelException`；当另一个线程在 accept 操作进行中关闭此服务器套接字通道时，抛出
    `AsynchronousCloseException`；当服务器套接字通道尚未绑定时，抛出 `java.nio.channels.NotYetBoundException`；当发生
    I/O 错误时，抛出 `IOException`。


    服务器套接字通道在 TCP/IP 流协议中充当服务器角色。您使用服务器套接字通道来监听来自客户端的传入连接。


    您通过调用静态的 `open()` 工厂方法来创建一个新的服务器套接字通道。如果一切顺利，`open()` 会返回一个 `ServerSocketChannel`
    实例，该实例与一个未绑定的对等 `ServerSocket` 对象关联。您可以通过调用 `socket()` 获取此对象，然后调用 `ServerSocket`
    的 `bind()` 方法将服务器套接字（以及最终的服务器套接字通道）绑定到特定地址。


    然后，您可以调用 `ServerSocketChannel` 的 `accept()` 方法来接受传入连接。根据您是否将服务器套接字通道配置为非阻塞，此方法要么立即返回
    `null` 或一个指向传入连接的套接字通道，要么阻塞直到有传入连接。


    注意


    或者，您可以在 `socket()` 返回的对等 `ServerSocket` 对象上调用 `accept()`。但是，此 `accept()` 方法将始终阻塞。


    清单 7-7 展示了一个演示 `ServerSocketChannel` 的 `ChannelServer` 应用程序。


    清单 7-7. 演示 `ServerSocketChannel`


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.ServerSocketChannel;`


    `import java.nio.channels.SocketChannel;`


    `public class ChannelServer`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `System.out.println("Starting server...");`


    `ServerSocketChannel ssc = ServerSocketChannel.open();`


    `ssc.socket().bind(new InetSocketAddress(9999));`


    `ssc.configureBlocking(false);`


    `String msg = "Local address: " + ssc.socket().getLocalSocketAddress();`


    `ByteBuffer buffer = ByteBuffer.wrap(msg.getBytes());`


    `while (true)`


    `{`


    `System.out.print(".");`


    `SocketChannel sc = ssc.accept();`


    `if (sc != null)`


    `{`


    `System.out.println();`


    `System.out.println("Received connection from " +`


    `sc.socket().getRemoteSocketAddress());`


    `buffer.rewind();`


    `sc.write(buffer);`


    `sc.close();`


    `}`


    `else`


    `try`


    `{`


    `Thread.sleep(100);`


    `}`


    `catch (InterruptedException ie)`


    `{`


    `assert false; // shouldn’t happen`


    `}`


    `}`


    `}`


    `}`


    清单 7-7 的 `main()` 方法首先输出一条启动消息，然后获取一个服务器套接字通道。接着，它访问 `ServerSocket` 对等对象，并使用该对象将套接字/通道绑定到端口
    9999。


    接下来，`main()` 将服务器套接字通道配置为非阻塞，并根据一条标识服务器套接字通道本地套接字地址的消息创建一个字节缓冲区。


    `main()` 现在进入一个 `while` 循环，该循环重复打印一个句点字符以演示通道的非阻塞状态，并检查是否有传入连接。如果检测到连接，则使用其 `SocketChannel`
    实例获取远程套接字地址，并将其输出到标准输出流。然后缓冲区被重置，其内容被写入套接字通道，随后该通道被关闭。但是，如果未检测到连接，`main()` 会休眠一小段时间。


    按如下方式编译清单 7-7：


    `javac ChannelServer.java`


    执行以下命令行以启动服务器：


    `java ChannelServer`


    您应该会看到一条 `starting server...` 消息，随后屏幕上从左到右出现一长串不断增长的句点。此时，没有其他可观察的内容了。

