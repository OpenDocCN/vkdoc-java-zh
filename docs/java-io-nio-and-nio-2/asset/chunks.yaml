  trans: '

    # 第一部分

    I/O 入门


    # 1. I/O 基础与 API


    输入和输出（I/O）设施是操作系统以及计算机语言及其库的基础组成部分。除了极简单的计算机程序外，所有程序都会执行某种形式的输入和/或输出操作。


    Java 一直支持 I/O。其最初的 I/O API 套件及相关架构被称为经典 I/O。由于现代操作系统采用了经典 I/O 所不支持的新 I/O 范式，因此作为
    JDK 1.4 的一部分引入了新 I/O（NIO）来支持这些范式。由于时间不足，一些计划中的 NIO 功能未能包含在此版本中，导致这些其他 NIO 功能被推迟到
    JDK 5 和 JDK 7 中实现。


    本章将向您介绍经典 I/O、NIO 以及更多 NIO（NIO.2）。您将了解它们所解决的基本 I/O 特性。同时，您还将获得其 API 的概览。后续章节将深入探讨这些
    API。


    ## 经典 I/O


    JDK 1.0 引入了基本的 I/O 设施，用于访问文件系统（例如创建目录、删除文件或执行其他任务）、随机访问文件内容（相对于顺序访问），以及以顺序方式在源和目标之间流式传输面向字节的数据。


    ### 文件系统访问与 File 类


    文件系统是操作系统的一个组件，负责管理数据存储及后续检索。运行 Java 虚拟机（JVM）的操作系统至少支持一个文件系统。例如，Unix 或 Linux 将所有已挂载（连接并准备就绪）的磁盘合并为一个虚拟文件系统。相比之下，Windows
    为每个活动的磁盘驱动器关联一个独立的文件系统。


    文件系统将数据存储在文件中，而文件则存储在目录中。其文件和目录对象通过指定路径来访问，路径是定位和标识文件系统对象的紧凑映射。路径可以是绝对路径或相对路径：


    *   **绝对路径**是相对于文件系统根目录的路径。它表示为根目录符号后跟一个由分隔符分隔的目录名称层次结构，并以目标目录或文件名结尾。

    *   **相对路径**是相对于某个其他目录的路径。其表示方式与绝对路径类似，但没有开头的根目录符号。相反，它通常以一个或多个分隔的“`..`”字符序列作为前缀，每个序列表示一个父目录。


    路径的指定方式因操作系统而异。例如，Unix、Linux 及类 Unix 操作系统使用正斜杠（`/`）标识根目录并分隔路径组件，而 Windows 则使用反斜杠（`\`）来实现这些目的。请看两个示例：


    `/users/username/bin`


    `\users\username\bin`


    每个绝对路径都访问根目录下 `users` 子目录中 `username` 子目录下的 `bin` 子目录。第一行的路径在 Unix/Linux 环境下访问
    `bin`，而第二行的路径在 Windows 环境下访问该子目录。


    Windows 及类似操作系统可以管理多个文件系统。每个文件系统通过一个驱动器标识符（例如“`C:`”）来标识。当指定路径时不带驱动器标识符，则该路径相对于当前文件系统。否则，它相对于指定的文件系统：


    `\users\username\bin`


    `C:\users\username\bin`


    第一行访问相对于当前文件系统的路径，而第二行访问相对于 `C:` 文件系统的路径。


    `java.io.File` 类的实例抽象了一个文件或目录路径。该实例提供对文件系统的访问，以在此路径上执行任务，例如删除底层文件或目录。以下示例演示了此类：


    `new File("temp").mkdir();`


    该示例构造了一个 `File` 对象，初始化为文件系统对象 `temp`。然后在此 `File` 对象上调用 `mkdir()` 来创建一个名为 `temp`
    的新目录。


    第 2 章将探讨 `File` 类。


    ### 通过 RandomAccessFile 访问文件内容


    文件内容可以顺序访问或随机访问。随机访问可以加速搜索和排序功能。`java.io.RandomAccessFile` 类的实例提供了对文件的随机访问。以下示例演示了此功能：


    `RandomAccessFile raf = new RandomAccessFile("employees.dat", "r");`


    `int empIndex = 10;`


    `raf.seek(empIndex * EMP_REC_LEN);`


    `// 读取员工记录的内容。`


    在此示例中，正在访问文件 `employees.dat`，该文件被划分为固定长度的员工记录，每条记录长度为 `EMP_REC_LEN` 字节。正在查找索引为
    `10` 的员工记录（第一条记录位于索引 `0`）。此任务通过将文件指针定位到该记录第一个字节的字节位置（即索引乘以记录长度）来完成。然后访问该记录。


    第 3 章将探讨 `RandomAccessFile` 类。

    '
- fmt: "### Streaming Data via Stream Classes\n\nClassic I/O includes streams for\
    \ performing I/O operations. A stream is an ordered sequence of bytes of arbitrary\
    \ length. Bytes flow over an output stream from an application to a destination\
    \ and flow over an input stream from a source to an application. Figure [1-1](#A978-1-4842-1565-4_1_Chapter.html#Fig1)\
    \ illustrates these flows.\n\n![A978-1-4842-1565-4_1_Fig1_HTML.jpg](A978-1-4842-1565-4_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1. Conceptualizing output and input streams as flows of bytes\n\nJava\
    \ provides classes in the `java.io` package that identify various stream destinations\
    \ for writing; for example, byte arrays and files. Java also provides classes\
    \ in this package that identify various stream sources for reading. Examples include\
    \ files and thread pipes.\n\nFor example, you would use `FileInputStream` to open\
    \ an existing file and connect an input stream to it. You would then invoke various\
    \ `read()` methods to read bytes from the file over the input stream. Lastly,\
    \ you would invoke `close()` to close the stream and file. Consider the following\
    \ example:\n\n```\nFileInputStream fis = null;\ntry\n{\n   fis = new FileInputStream(\"\
    image.jpg\");\n   // Read bytes from file.\n   int _byte;\n   while ((_byte =\
    \ fis.read()) != -1) // -1 signifies EOF\n      ; // Process _byte in some way.\n\
    }\ncatch (IOException ioe)\n{\n   // Handle exception.\n}\nfinally\n{\n   if (fis\
    \ != null)\n      try\n      {\n         fis.close();\n      }\n}\n```\n\nThis\
    \ example demonstrates the traditional way to open a file and create an input\
    \ stream for reading bytes from the file. It then goes on to read the file’s contents.\
    \ An exception handler takes care of any thrown exceptions, which are represented\
    \ by instances of the `java.io.IOException` class.\n\nWhether or not an exception\
    \ is thrown, the input stream and underlying file must be closed. This action\
    \ takes place in the `try` statement’s `finally` block. Because of the verbosity\
    \ in closing the file, you can alternatively use JDK 7’s `try`-with-resources\
    \ statement to automatically close it, as follows:\n\n```\ntry (FileInputStream\
    \ fis = new FileInputStream(\"image.jpg\"))\n{\n   // Read bytes from file.\n\
    \   int _byte;\n   while ((_byte = fis.read()) != -1) // -1 signifies EOF\n  \
    \    ; // Process _byte in some way.\n}\ncatch (IOException ioe)\n{\n   // Handle\
    \ exception.\n}\n```\n\nI demonstrate both the traditional and `try`-with-resources\
    \ approaches to closing files throughout subsequent chapters.\n\nSome stream classes\
    \ are used to filter other streams. For example, to improve performance, `BufferedInputStream`\
    \ reads a block of bytes from another stream and returns bytes from its buffer\
    \ until the buffer is empty, in which case it reads another block. Consider the\
    \ following example:\n\n```\ntry (FileInputStream fis = new FileInputStream(\"\
    image.jpg\");\n     BufferedInputStream bis = new BufferedInputStream(fis))\n\
    {\n   // Read bytes from file.\n   int _byte;\n   while ((_byte = bis.read())\
    \ != -1) // -1 signifies EOF\n      ; // Process _byte in some way.\n}\ncatch\
    \ (IOException ioe)\n{\n   // Handle exception.\n}\n```\n\nA file input stream\
    \ that reads from the `image.jpg` file is created. This stream is passed to a\
    \ buffered input stream constructor. Subsequent reads are performed on the buffered\
    \ input stream, which calls file input stream `read()` methods when appropriate.\n\
    \n[Chapter 4](#A978-1-4842-1565-4_4_Chapter.html) explores the stream classes.\n\
    \n#### Stream Classes and Standard I/O\n\nMany operating systems support standard\
    \ I/O, which is preconnected input and output data streams between a computer\
    \ program and its environment when it begins execution. The preconnected streams\
    \ are known as standard input, standard output, and standard error.\n\nStandard\
    \ input defaults to reading its input from the keyboard. Also, standard output\
    \ and standard error default to writing their output to the screen. However, these\
    \ streams can be redirected to read input from a different source and write output\
    \ to a different destination (such as a file).\n\nJDK 1.0 introduced support for\
    \ standard I/O by adding the `in`, `out`, and `err` objects of type `InputStream`\
    \ and `PrintStream` to the `java.lang.System` class. You specify method calls\
    \ on these objects to access standard input, standard output, and standard error,\
    \ as follows:\n\n```\nint ch = System.in.read(); // Read single character from\
    \ standard input.\nSystem.out.println(\"Hello\"); // Write string to standard\
    \ output.\nSystem.err.println(\"I/O error: \" +\n                   ioe.getMessage());\
    \ // Write string to standard error.\n```\n\nAs well as exploring `InputStream`\
    \ and `PrintStream`, [Chapter 4](#A978-1-4842-1565-4_4_Chapter.html) also revisits\
    \ standard I/O to show you how to programmatically redirect these streams.\n\n\
    ### JDK 1.1 and the Writer/Reader Classes\n\nJDK 1.0’s I/O capabilities are suitable\
    \ for streaming bytes, but cannot properly stream characters because they don’t\
    \ account for character encodings. JDK 1.1 overcame this problem by introducing\
    \ writer/reader classes that take character encodings into account. For example,\
    \ the `java.io` package includes `FileWriter` and `FileReader` classes for writing\
    \ and reading character streams.\n\n[Chapter 5](#A978-1-4842-1565-4_5_Chapter.html)\
    \ explores various writer and reader classes.\n\n## NIO\n\nModern operating systems\
    \ offer sophisticated I/O services (such as readiness selection) for improving\
    \ I/O performance and simplifying I/O. Java Specification Request (JSR) 51 ( [`www.jcp.org/en/jsr/detail?id=51`](http://www.jcp.org/en/jsr/detail?id=51)\
    \ ) was created to address these capabilities.\n\nJSR 51’s description indicates\
    \ that it provides APIs for scalable I/O, fast buffered binary and character I/O,\
    \ regular expressions, and charset conversion. Collectively, these APIs are known\
    \ as NIO. JDK 1.4 implemented NIO in terms of the following APIs:\n\n- Buffers\n\
    - Channels\n- Selectors\n- Regular expressions\n- Charsets\n\nThe regular expression\
    \ and charset APIs were provided to simplify common I/O-related tasks."
