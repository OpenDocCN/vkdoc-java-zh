    \ ioe)\n      {\n         System.err.println(\"I/O error: \" + ioe.getMessage());\n\
    \      }\n   }\n}\n```\n\nListing [B-6](#A978-1-4842-1565-4_16_Chapter.html#FPar19)’s\
    \ `main()` method first creates a `MulticastSocket` instance bound to port `10000`\
    \ via the `MulticastSocket(int port)` constructor. It then obtains an `InetAddress`\
    \ object that contains multicast group IP address `231.0.0.1` and uses this object\
