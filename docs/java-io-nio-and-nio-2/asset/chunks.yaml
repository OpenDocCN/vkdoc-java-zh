    选项，此方法会跟踪已访问的目录，以便检测循环。当目录条目是目录的祖先时，就会产生循环。循环检测通过记录目录文件键来执行，或者当文件键不可用时，通过调用 [`isSameFile`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Files.html#isSameFile-java.nio.file.Path-java.nio.file.Path-)
    `()` 方法来测试目录是否与祖先目录是同一个文件。当检测到循环时，它会被视为 I/O 错误，并调用 [`visitFileFailed`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileVisitor.html#visitFileFailed-T-java.io.IOException-)
    `()`，参数为 `java.nio.file.` [`FileSystemLoopException`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileSystemLoopException.html#class%20in%20java.nio.file)
    对象。


