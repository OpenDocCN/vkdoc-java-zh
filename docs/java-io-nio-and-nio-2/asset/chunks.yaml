- fmt: "### Relative and Absolute Paths\n\nThe previous path examples demonstrate\
    \ relative paths. You can prove this to yourself by invoking `Path`’s `boolean`\
    \ `isAbsolute()` method on a `Path` object. This method returns `false` to signify\
    \ that the path isn’t absolute. To create an absolute path, you need to pass a\
    \ root as the first name element.\n\nYou obtain a file system’s root(s) by calling\
    \ `FileSystem`’s `Iterable<Path>` `getRootDirectories()` method, which returns\
    \ an iterator over `Path` instances that describe roots. Listing [12-3](#A978-1-4842-1565-4_12_Chapter.html#FPar8)\
    \ presents the source code to an application that demonstrates this method and\
    \ absolute path creation.\n\n**Listing 12-3.** Demonstrating Root Directory Iteration\
    \ and Absolute Path Creation\n\n```\nimport java.nio.file.FileSystem;\nimport\
    \ java.nio.file.FileSystems;\nimport java.nio.file.Path;\n\npublic class PathDemo\n\
    {\n   public static void main(String[] args)\n   {\n      FileSystem fsDefault\
    \ = FileSystems.getDefault();\n      Path path = fsDefault.getPath(\"a\", \"b\"\
    , \"c\");\n      System.out.println(path);\n      System.out.printf(\"Absolute:\
    \ %b%n\", path.isAbsolute());\n      System.out.printf(\"Root: %s%n\", path.getRoot());\n\
    \      for (Path root: fsDefault.getRootDirectories())\n      {\n         path\
    \ = fsDefault.getPath(root.toString(), \"a\", \"b\", \"c\");\n         System.out.println(path);\n\
    \         System.out.printf(\"Absolute: %b%n\", path.isAbsolute());\n        \
    \ System.out.printf(\"Root: %s%n\", path.getRoot());\n      }\n   }\n}\n```\n\n\
    Compile Listing [12-3](#A978-1-4842-1565-4_12_Chapter.html#FPar8) (`javac PathDemo.java`)\
    \ and run the resulting application (`java PathDemo`). I observe the following\
    \ output:\n\n```\na\\b\\c\nAbsolute: false\nRoot: null\nC:\\a\\b\\c\nAbsolute:\
    \ true\nRoot: C:\\\nD:\\a\\b\\c\nAbsolute: true\nRoot: D:\\\nE:\\a\\b\\c\nAbsolute:\
    \ true\nRoot: E:\\\nF:\\a\\b\\c\nAbsolute: true\nRoot: F:\\\n```\n\nIf you have\
    \ a relative path, you can convert it to an absolute path by calling `Path`’s\
    \ `Path` `toAbsolutePath()` method, as demonstrated in Listing [12-4](#A978-1-4842-1565-4_12_Chapter.html#FPar9).\n\
    \n**Listing 12-4.** Converting a Relative Path to an Absolute Path\n\n```\nimport\
    \ java.nio.file.Path;\nimport java.nio.file.Paths;\n\npublic class PathDemo\n\
    {\n   public static void main(String[] args)\n   {\n      Path path = Paths.get(\"\
    a\", \"b\", \"c\");\n      System.out.printf(\"Path: %s%n\", path.toString());\n\
    \      System.out.printf(\"Absolute: %b%n\", path.isAbsolute());\n      path =\
    \ path.toAbsolutePath();\n      System.out.printf(\"Path: %s%n\", path.toString());\n\
    \      System.out.printf(\"Absolute: %b%n\", path.isAbsolute());\n   }\n}\n```\n\
    \n`PathDemo` calls `Path`’s `String toString()` method to return a string representation\
    \ of the path.\n\nCompile Listing [12-4](#A978-1-4842-1565-4_12_Chapter.html#FPar9)\
    \ (`javac PathDemo.java`) and run the resulting application (`java PathDemo`).\
    \ I observe the following output:\n\n```\nPath: a\\b\\c\nAbsolute: false\nPath:\
    \ C:\\prj\\books\\io\\ch12\\code\\PathDemo\\v3\\a\\b\\c\nAbsolute: true\n```\n\
    \nAccording to `toAbsolutePath()`’s JDK documentation, if the path is already\
    \ absolute, this method returns the path. Otherwise, this method resolves the\
    \ path in an implementation-dependent manner, typically by resolving the path\
    \ against a file system default directory. Depending on the implementation, this\
    \ method may throw an I/O error when the file system isn’t accessible.\n\n###\
    \ Normalization, Relativization, and Resolution\n\n`Path` declares several methods\
    \ to remove path redundancies, to create a relative path between two paths, and\
    \ to resolve (join) two paths:\n\n*   `Path normalize()`\n*   `Path relativize(Path\
    \ other)`\n*   `Path resolve(Path other)`\n*   `Path resolve(String other)`\n\n\
    `normalize()` is useful for removing redundancies from a path. For example, `reports/./2015/jan`\
    \ includes the redundant “.” (current directory) element. When normalized, this\
    \ path becomes the shorter `reports/2015/jan`.\n\n`relativize()` creates a relative\
