- fmt: "Normally, the serialization mechanism writes out a class’s instance fields\
    \ to the underlying output stream. However, you can prevent this from happening\
    \ by declaring a private `void writeObject(ObjectOutputStream oos)` method in\
    \ that class.\n\nWhen the serialization mechanism discovers this method, it calls\
    \ the method instead of automatically outputting instance field values. The only\
    \ values that are output are those explicitly output via the method.\n\nConversely,\
    \ the deserialization mechanism assigns values to a class’s instance fields that\
    \ it reads from the underlying input stream. However, you can prevent this from\
    \ happening by declaring a private `void readObject(ObjectInputStream ois)` method.\n\
    \nWhen the deserialization mechanism discovers this method, it calls the method\
    \ instead of automatically assigning values to instance fields. The only values\
    \ that are assigned to instance fields are those explicitly assigned via the method.\n\
    \nBecause `SerEmployee` doesn’t introduce any fields, and because `Employee` doesn’t\
    \ offer access to its internal fields (assume you don’t have the source code for\
    \ this class), what would a serialized `SerEmployee` object include?\n\nAlthough\
    \ you cannot serialize `Employee`’s internal state, you can serialize the argument(s)\
    \ passed to its constructors, such as the employee name.\n\nListing [4-12](#A978-1-4842-1565-4_4_Chapter.html#FPar31)\
    \ reveals the refactored `SerEmployee` and `SerializationDemo` classes.\n\n**Listing\
    \ 4-12.** Solving Problematic Deserialization\n\n```\nimport java.io.FileInputStream;\n\
    import java.io.FileOutputStream;\nimport java.io.IOException;\nimport java.io.ObjectInputStream;\n\
    import java.io.ObjectOutputStream;\nimport java.io.Serializable;\n\nclass Employee\n\
    {\n   private String name;\n\n   Employee(String name)\n   {\n      this.name\
    \ = name;\n   }\n\n   @Override\n   public String toString()\n   {\n      return\
    \ name;\n   }\n}\n\nclass SerEmployee implements Serializable\n{\n   private Employee\
    \ emp;\n   private String name;\n\n   SerEmployee(String name)\n   {\n      this.name\
    \ = name;\n      emp = new Employee(name);\n   }\n\n   private void writeObject(ObjectOutputStream\
    \ oos) throws IOException\n   {\n      oos.writeUTF(name);\n   }\n\n   private\
    \ void readObject(ObjectInputStream ois)\n      throws ClassNotFoundException,\
    \ IOException\n   {\n      name = ois.readUTF();\n      emp = new Employee(name);\n\
    \   }\n\n   @Override\n   public String toString()\n   {\n      return name;\n\
    \   }\n}\n\npublic class SerializationDemo\n{\n   public static void main(String[]\
    \ args)\n   {\n      ObjectOutputStream oos = null;\n      ObjectInputStream ois\
    \ = null;\n      try\n      {\n         oos = new ObjectOutputStream(new FileOutputStream(\"\
    employee.dat\"));\n         SerEmployee se = new SerEmployee(\"John Doe\");\n\
    \         System.out.println(se);\n         oos.writeObject(se);\n         oos.close();\n\
    \         oos = null;\n         System.out.println(\"se object written to file\"\
    );\n         ois = new ObjectInputStream(new FileInputStream(\"employee.dat\"\
    ));\n         se = (SerEmployee) ois.readObject();\n         System.out.println(\"\
    se object read from file\");\n         System.out.println(se);\n      }\n    \
    \  catch (ClassNotFoundException cnfe)\n      {\n         cnfe.printStackTrace();\n\
    \      }\n      catch (IOException ioe)\n      {\n         ioe.printStackTrace();\n\
    \      }\n      finally\n      {\n         if (oos != null)\n            try\n\
    \            {\n               oos.close();\n            }\n            catch\
    \ (IOException ioe)\n            {\n               assert false; // shouldn’t\
    \ happen in this context\n            }\n         if (ois != null)\n         \
    \   try\n            {\n               ois.close();\n            }\n         \
    \   catch (IOException ioe)\n            {\n               assert false; // shouldn’t\
    \ happen in this context\n            }\n      }\n   }\n}\n```\n\n`SerEmployee`’s\
    \ `writeObject()` and `readObject()` methods rely on `DataOutput` and `DataInput`\
    \ methods: they don’t need to call `ObjectOutputStream`’s `writeObject()` method\
    \ and `ObjectInputStream`’s `readObject()` method to perform their tasks.\n\n\
    When you run this application, it generates the following output:\n\n```\nJohn\
    \ Doe\nse object written to file\nse object read from file\nJohn Doe\n```\n\n\
    The `writeObject()` and `readObject()` methods can be used to serialize/deserialize\
    \ data items beyond the normal state (non-`transient` instance fields), for example,\
    \ serializing/deserializing the contents of a `static` field.\n\nHowever, before\
    \ serializing or deserializing the additional data items, you must tell the serialization\
    \ and deserialization mechanisms to serialize or deserialize the object’s normal\
    \ state. The following methods help you accomplish this task:\n\n*   `ObjectOutputStream`’s\
    \ `defaultWriteObject()` method outputs the object’s normal state. Your `writeObject()`\
    \ method first calls this method to output that state and then outputs additional\
    \ data items via `ObjectOutputStream` methods such as `writeUTF()`.\n*   `ObjectInputStream`’s\
    \ `defaultReadObject()` method inputs the object’s normal state. Your `readObject()`\
    \ method first calls this method to input that state and then inputs additional\
    \ data items via `ObjectInputStream` methods such as `readUTF()`."
