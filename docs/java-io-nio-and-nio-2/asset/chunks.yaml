- fmt: "Previous examples have demonstrated unicasting, which occurs when a server\
    \ sends a message to a single client. However, it’s also possible to broadcast\
    \ the same message to multiple clients (such as transmit a “school closed due\
    \ to bad weather” announcement to all members of a group of parents who have registered\
    \ with an online program to receive this announcement); this activity is known\
    \ as multicasting.\n\nA server multicasts by sending a sequence of datagram packets\
    \ to a special IP address, which is known as a multicast group address, and a\
    \ specific port (as specified by a port number). Clients wanting to receive these\
    \ datagram packets create a multicast socket that uses this port number. They\
    \ request to join the group through a join group operation that specifies the\
    \ special IP address. At this point, the client can receive datagram packets sent\
    \ to the group and can even send datagram packets to other group members. After\
    \ the client has read all datagram packets that it wants to read, it removes itself\
    \ from the group by applying a leave group operation that specifies the special\
    \ IP address.\n\nIPv4 addresses `224.0.0.1` to `239.255.255.255` (inclusive) are\
    \ reserved for use as multicast group addresses.\n\nListing [B-5](#A978-1-4842-1565-4_16_Chapter.html#FPar18)\
    \ presents a multicasting server.\n\n**Listing B-5.** Multicasting Datagram Packets\n\
    \n```\nimport java.io.IOException;\nimport java.net.DatagramPacket;\nimport java.net.InetAddress;\n\
    import java.net.MulticastSocket;\n\npublic class MCServer\n{\n   final static\
    \ int PORT = 10000;\n\n   public static void main(String[] args)\n   {\n     \
    \ try\n      {\n         MulticastSocket mcs = new MulticastSocket();\n      \
    \   InetAddress group = InetAddress.getByName(\"231.0.0.1\");\n         byte[]\
    \ dummy = new byte[0];\n         DatagramPacket dgp = new DatagramPacket(dummy,\
    \ 0, group, PORT);\n         int i = 0;\n         while (true)\n         {\n \
    \           byte[] buffer = (\"line \" + i).getBytes();\n            dgp.setData(buffer);\n\
    \            dgp.setLength(buffer.length);\n            mcs.send(dgp);\n     \
    \       i++;\n         }\n      }\n      catch (IOException ioe)\n      {\n  \
    \       System.err.println(\"I/O error: \" + ioe.getMessage());\n      }\n   }\n\
    }\n```\n\nListing [B-5](#A978-1-4842-1565-4_16_Chapter.html#FPar18)’s `main()`\
    \ method first creates a `MulticastSocket` instance via the `MulticastSocket()`\
    \ constructor. The multicast socket doesn’t need to bind to a port number because\
    \ the port number is specified along with the multicast group’s IP address (`231.0.0.1`)\
    \ as part of the `DatagramPacket` instance that’s subsequently created. (The `dummy`\
    \ array is present to prevent a `NullPointerException` object from being thrown\
    \ from the `DatagramPacket` constructor—this array isn’t used to store data to\
    \ be broadcasted.)\n\nAt this point, `main()` enters an infinite loop that first\
    \ creates an array of bytes from a `java.lang.String` object, and it uses the\
    \ platform’s default character encoding to convert from Unicode characters to\
    \ bytes. (Although extraneous `java.lang.StringBuilder` and `String` objects are\
    \ created via expression `\"line \" + i` in each loop iteration, I’m not worried\
    \ about their impact on garbage collection in this short throwaway application.)\n\
    \nThis data buffer is subsequently assigned to the `DatagramPacket` object by\
    \ calling its `void setData(byte[] buf)` method, and then the datagram packet\
    \ is broadcast to all members of the group associated with port `10000` and multicast\
    \ IP address `231.0.0.1`.\n\nCompile Listing [B-5](#A978-1-4842-1565-4_16_Chapter.html#FPar18)\
    \ as follows:\n\n```\njavac MCServer.java\n```\n\nRun the resulting application\
    \ as follows:\n\n```\njava MCServer\n```\n\nYou shouldn’t observe any output.\n\
    \nListing [B-6](#A978-1-4842-1565-4_16_Chapter.html#FPar19) presents a multicasting\
    \ client.\n\n**Listing B-6.** Receiving Multicasted Datagram Packets\n\n```\n\
    import java.io.IOException;\nimport java.net.DatagramPacket;\nimport java.net.InetAddress;\n\
    import java.net.MulticastSocket;\n\npublic class MCClient\n{\n   final static\
    \ int PORT = 10000;\n\n   public static void main(String[] args)\n   {\n     \
