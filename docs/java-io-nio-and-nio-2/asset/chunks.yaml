    `Is directory = false`


    `Is file = true`


    `Is hidden = false`


    `Last modified = Sat Jul 25 15:49:41 CDT 2015`


    `Length = 3`


    ## Listing File System Root Directories


    `File` declares the `File[] listRoots()` class method to return the root directories
    (roots) of available file systems as an array of `File` objects.


    Note


    The set of available file system roots is affected by operating system-level operations,
    such as inserting or ejecting removable media, and disconnecting or unmounting
    physical or virtual disk drives.


    Listing [2-3](#A978-1-4842-1565-4_2_Chapter.html#FPar9) presents a `DumpRoots`
    application that uses `listRoots()` to obtain an array of available file system
    roots and then outputs the array’s contents.


    Listing 2-3\. Dumping Available File System Roots to Standard Output


    `import java.io.File;`


    `public class DumpRoots`


    `{`


       `public static void main(String[] args)`


       `{`


          `File[] roots = File.listRoots();`


          `for (File root: roots)`


             `System.out.println(root);`


       `}`


    `}`


    Compile Listing [2-3](#A978-1-4842-1565-4_2_Chapter.html#FPar9) as follows:


    `javac DumpRoots.java`


    Run the resulting application as follows:


    `java DumpRoots`


    When I run this application on my Windows 7 operating system, I receive the following
    output, which reveals four available roots:


    `C:\`


    `D:\`


    `E:\`


    `F:\`


    If I ran `DumpRoots` on a Unix or Linux operating system, I would receive one
    line of output that consists of the virtual file system root (`/`).'
