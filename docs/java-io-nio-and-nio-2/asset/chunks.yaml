    #### 检查路径


    `Files` 类声明了一对用于检查路径的方法，以判断其代表的文件是否存在：


    *   `boolean` `exists` `(Path path, LinkOption... options)`：检查 `path` 所代表的文件是否存在。默认情况下，会跟随符号链接，但如果你向
    `options` 传递 `LinkOption.NOFOLLOW_LINKS`，则不会跟随符号链接。如果文件存在则返回 `true`；如果文件不存在或无法确定其是否存在则返回
    `false`。

    *   `boolean` `notExists` `(Path path, LinkOption... options)`：检查 `path` 所代表的文件是否不存在。默认情况下，会跟随符号链接，但如果你向
    `options` 传递 `LinkOption.NOFOLLOW_LINKS`，则不会跟随符号链接。如果文件不存在则返回 `true`；如果文件存在或无法确定其是否存在则返回
    `false`。


    注意


    表达式 `!exists(path)` 不等同于 `notExists(path)`。这可能是因为 `!exists()` 不是原子操作（作为单个操作执行），而
    `notExists()` 是原子操作。此外，当 `exists()` 和 `notExists()` 都返回 `false` 时，表示无法验证文件是否存在。


    `Files` 类还声明了几个以 `is` 开头的方法，用于检查路径的其他条件：


    *   `boolean` `isDirectory` `(Path path, LinkOption... options)`：检查 `path` 是否代表一个目录。如果是目录则返回
    `true`，如果不是目录、`path` 没有对应的文件、或者无法确定 `path` 是否代表目录时返回 `false`。当你不想让此方法跟随符号链接时，请指定
    `LinkOption.NOFOLLOW_LINKS`。

    *   `boolean` `isExecutable` `(Path path)`：检查 `path` 是否代表一个可执行文件。如果文件存在且可执行则返回
    `true`，如果文件不存在、因 JVM 权限不足而拒绝执行访问、或者无法确定访问权限时返回 `false`。

    *   `boolean` `isHidden` `(Path path)`：检查 `path` 所代表的文件是否隐藏。隐藏的具体定义取决于操作系统。例如，Unix
    认为文件名以句点字符开头的文件是隐藏的。在 Windows 上，如果文件不是目录且设置了 DOS `hidden` 属性，则认为该文件是隐藏的。如果文件被认为是隐藏的，此方法返回
    `true`；否则返回 `false`。当发生 I/O 错误时，它会抛出 `IOException`。

    *   `boolean` `isReadable` `(Path path)`：检查 `path` 是否代表一个可读文件。如果文件存在且可读则返回 `true`，如果文件不存在、因
    JVM 权限不足而拒绝读取访问、或者无法确定访问权限时返回 `false`。

    *   `boolean` `isRegularFile` `(Path path, LinkOption... options)`：检查 `path` 是否代表一个常规文件。如果是常规文件则返回
    `true`，如果不是常规文件、`path` 没有对应的文件、或者无法确定 `path` 是否代表常规文件时返回 `false`。当你不想让此方法跟随符号链接时，请指定
    `LinkOption.NOFOLLOW_LINKS`。

    *   `boolean` `isSameFile` `(Path path1, Path path2)`：检查 `path1` 和 `path2` 是否定位到同一个文件，如果是则返回
    `true`。如果两个 `Path` 对象关联到不同的文件系统提供者，此方法返回 `false`。当发生 I/O 错误时，它会抛出 `IOException`。

    *   `boolean` `isWritable` `(Path path)`：检查 `path` 是否代表一个可写文件。如果文件存在且可写则返回 `true`，如果文件不存在、因
    JVM 权限不足而拒绝写入访问、或者无法确定访问权限时返回 `false`。


    `isExecutable()`、`isReadable()` 和 `isWritable()` 中的每一个都会检查文件是否存在，以及 JVM 是否具有执行该文件、打开它进行读取或打开它进行写入的适当权限。根据实现的不同，该方法可能需要读取文件权限、ACL
    或其他文件属性来检查对文件的有效访问。因此，该方法可能相对于其他文件系统操作不是原子的。


    `exists()`、`notExists()`、`isExecutable()`、`isReadable()` 和 `isWritable()` 的返回值会立即过时。在方法调用和其结果使用之间，文件系统可能会发生变化。这种竞态条件
    ( [`https://en.wikipedia.org/wiki/Race_condition`](https://en.wikipedia.org/wiki/Race_condition)
    ) 被称为检查时间到使用时间 (TOCTTOU)。更多信息请查看 [`https://en.wikipedia.org/wiki/Time_of_check_to_time_of_use`](https://en.wikipedia.org/wiki/Time_of_check_to_time_of_use)。


    清单 12-20 展示了一个演示这些路径检查方法的应用程序的源代码。


    清单 12-20\. 检查各种条件下的路径


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class CheckPath`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length < 1 || args.length > 2)`


    `{`


    `System.err.println("usage: java CheckPath path1 [path2]");`


    `return;`


    `}`


    `Path path1 = Paths.get(args[0]);`


    `System.out.printf("Path1: %s%n", path1);`


    `System.out.printf("Exists: %b%n", Files.exists(path1));`


    `System.out.printf("Not exists: %b%n", Files.notExists(path1));`


    `System.out.printf("Is directory: %b%n", Files.notExists(path1));`


