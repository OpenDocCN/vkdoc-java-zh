    最后，表 9-1 中的 `Matcher matcher(CharSequence input)` 方法表明，正则表达式 API 还提供了 `Matcher`
    类，其匹配器尝试将编译后的正则表达式与 `input` 文本进行匹配。`Matcher` 声明了以下方法来执行匹配操作：


    *   `boolean matches()`：尝试将整个区域与模式进行匹配。当匹配成功时，可以通过调用 `Matcher` 的 `start()`、`end()`
    和 `group()` 方法获取更多信息。例如，`int start()` 返回上一次匹配的起始索引，`int end()` 返回上一次匹配之后第一个字符的偏移量，`String
    group()` 返回上一次匹配所匹配到的输入子序列。如果尚未尝试匹配或上一次匹配尝试失败，每个方法都会抛出 `java.lang.IllegalStateException`。

    *   `boolean lookingAt()`：尝试从区域开头开始，将输入序列与模式进行匹配。与 `matches()` 一样，此方法始终从区域开头开始。与
    `matches()` 不同，`lookingAt()` 不要求匹配整个区域。当匹配成功时，可以通过调用 `Matcher` 的 `start()`、`end()`
    和 `group()` 方法获取更多信息。

    *   `boolean find()`：尝试查找与模式匹配的下一个输入序列实例。它可以从该匹配器区域的起始位置开始。或者，如果之前对该方法的调用成功，并且匹配器之后未被重置（通过调用
    `Matcher` 的 `Matcher reset()` 或 `Matcher reset(CharSequence input)` 方法），它将从上一次匹配未匹配到的第一个字符开始。当匹配成功时，可以通过调用
    `Matcher` 的 `start()`、`end()` 和 `group()` 方法获取更多信息。


    注意


    匹配器在其输入的子集（称为区域）中查找匹配项。默认情况下，区域包含匹配器的所有输入。可以通过调用 `Matcher` 的 `Matcher region(int
    start, int end)` 方法（设置此匹配器区域的边界）来修改区域，并通过调用 `Matcher` 的 `int regionStart()` 和
    `int regionEnd()` 方法来查询区域。


    我创建了一个简单的应用程序来演示 `Pattern`、`PatternSyntaxException` 和 `Matcher`。清单 9-1 展示了该应用程序的源代码。


    清单 9-1. 使用正则表达式


    `import java.util.regex.Matcher;`


    `import java.util.regex.Pattern;`


    `import java.util.regex.PatternSyntaxException;`


    `public class RegExDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java RegExDemo regex input");`


    `return;`


    `}`


    `try`


    `{`


    `System.out.println("regex = " + args[0]);`


    `System.out.println("input = " + args[1]);`


    `Pattern p = Pattern.compile(args[0]);`


    `Matcher m = p.matcher(args[1]);`


    `while (m.find())`


    `System.out.println("Located [" + m.group() + "] starting at "`


    `+ m.start() + " and ending at " +`


    `(m.end() - 1));`


    `}`


    `catch (PatternSyntaxException pse)`


    `{`


    `System.err.println("Bad regex: " + pse.getMessage());`


    `System.err.println("Description: " + pse.getDescription());`


    `System.err.println("Index: " + pse.getIndex());`


    `System.err.println("Incorrect pattern: " + pse.getPattern());`


    `}`


    `}`


    `}`


    按如下方式编译清单 9-1：


    `javac RegExDemo.java`


    按如下方式运行生成的应用程序：


    `java RegExDemo ox ox`


    您将看到以下输出：


    `regex = ox`


    `input = ox`


    `Located [ox] starting at 0 and ending at 1`


    `find()` 通过从左到右比较正则表达式字符与输入字符来搜索匹配项，并返回 `true`，因为 `o` 等于 `o`，`x` 等于 `x`。


    继续执行以下命令行：


    `java RegExDemo box ox`


    这次，您将看到以下输出：


    `regex = box`


    `input = ox`


    `find()` 首先将正则表达式字符 `b` 与输入字符 `o` 进行比较。由于这些字符不相等，并且输入中没有足够的字符来继续搜索，因此 `find()`
    不会输出“Located”消息来指示匹配。但是，如果您执行 `java RegExDemo ox box`，您会发现一个匹配：


    `regex = ox`


    `input = box`


    `Located [ox] starting at 1 and ending at 2`


    `ox` 正则表达式由字面字符组成。更复杂的正则表达式将字面字符与元字符（例如句点 [`.`]）和其他正则表达式结构相结合。


    提示


    要将元字符指定为字面字符，请在元字符前加上反斜杠字符（如 `\.`），或者将元字符放在 `\Q` 和 `\E` 之间（如 `\Q.\E`）。无论哪种情况，当转义后的元字符出现在字符串字面量中时，请确保将反斜杠字符加倍；例如，`"\\."`
    或 `"\\Q.\\E"`。


    句点元字符匹配除行终止符之外的所有字符。例如，`java RegExDemo .ox box` 和 `java RegExDemo .ox fox` 都报告匹配，因为句点匹配了
    `box` 中的 `b` 和 `fox` 中的 `f`。


    注意


    `Pattern` 识别以下行终止符：回车符 (`\r`)、换行符 (`\n`)、回车符后紧跟换行符 (`\r\n`)、下一行符 (`\u0085`)、行分隔符
    (`\u2028`) 和段落分隔符 (`\u2029`)。通过在调用 `Pattern.compile(String, int)` 时指定 `Pattern.DOTALL`
    标志，可以使句点元字符也匹配这些行终止符。

