    \n- `APPEND`：如果文件是为`WRITE`访问而打开的，则将字节写入文件末尾而不是开头。\n- `CREATE`：当文件不存在时创建新文件。\n\
    - `CREATE_NEW`：创建新文件，如果文件已存在则失败。\n- `DELETE_ON_CLOSE`：尽最大努力在文件关闭时删除该文件。\n- `DSYNC`：要求对文件内容的每次更新都同步写入底层存储设备。\n\
    - `READ`：以读取访问权限打开文件。\n- `SPARSE`：打开稀疏文件（[https://en.wikipedia.org/wiki/Sparse_file](https://en.wikipedia.org/wiki/Sparse_file)）。当与`CREATE_NEW`选项一起使用时，`SPARSE`提示新文件将是稀疏的。如果文件系统不支持创建稀疏文件，则忽略此选项。\n\
