- fmt: "### Transferring Bytes Among Channels\n\nTo optimize the common practice of\
    \ performing bulk transfers, two methods have been added to `FileChannel` that\
    \ avoid the need for intermediate buffers:\n\n- `long transferFrom(ReadableByteChannel\
    \ src, long position, long count)`\n- `long transferTo(long position, long count,\
    \ WritableByteChannel target)`\n\n`transferFrom(ReadableByteChannel, long, long)`\
    \ transfers bytes into this channel’s file from the given readable byte channel.\
    \ Parameter `src` identifies the source channel, `position` identifies the non-negative\
    \ start position in the file where the transfer is to start, and `count` identifies\
    \ the non-negative maximum number of bytes that are to be transferred.\n\nThis\
    \ method returns the number of bytes (possibly 0) that were actually transferred.\
    \ It throws `IllegalArgumentException` when a precondition on a parameter (such\
    \ as `position` being non-negative) doesn’t hold; `NonReadableChannelException`\
    \ when the source channel wasn’t opened for reading; `NonWritableChannelException`\
    \ when this channel wasn’t opened for writing; `ClosedChannelException` when this\
    \ channel or the source channel is closed; `ClosedByInterruptException` when another\
    \ thread interrupts the current thread while the transfer is in progress, thereby\
    \ closing both channels and setting the current thread’s interrupt status; and\
    \ `IOException` when some other I/O error occurs.\n\n`transferTo(long, long, WritableByteChannel)`\
    \ transfers bytes from this channel’s file to the given writable byte channel.\
    \ Parameter `position` identifies the non-negative start position in the file\
    \ where the transfer is to start, `count` identifies the non-negative maximum\
    \ number of bytes that are to be transferred, and `target` identifies the target\
    \ channel.\n\nThis method returns the number of bytes (possibly 0) that were actually\
    \ transferred. It throws `IllegalArgumentException` when a precondition on a parameter\
    \ doesn’t hold; `NonReadableChannelException` when this channel wasn’t opened\
    \ for reading; `NonWritableChannelException` when the target channel wasn’t opened\
    \ for writing; `ClosedChannelException` when this channel or the target channel\
    \ is closed; `ClosedByInterruptException` when another thread interrupts the current\
    \ thread while the transfer is in progress, thereby closing both channels and\
    \ setting the current thread’s interrupt status; and `IOException` when some other\
    \ I/O error occurs.\n\nIf you’re using `transferTo()` with a file channel as the\
    \ transfer source, the transfer stops at the end of the file when `position` plus\
    \ `count` exceeds the file’s size. Similarly, `transferFrom()` stops when `src`\
    \ is a file channel and its end of file is reached.\n\nListing [7-6](#A978-1-4842-1565-4_7_Chapter.html#FPar17)\
    \ presents an application that demonstrates channel transfer.\n\n**Listing 7-6.**\
    \ Demonstrating Channel Transfer\n\n```\nimport java.io.FileInputStream;\nimport\
    \ java.io.IOException;\nimport java.nio.channels.Channels;\nimport java.nio.channels.FileChannel;\n\
    import java.nio.channels.WritableByteChannel;\n\npublic class ChannelDemo\n{\n\
    \   public static void main(String[] args)\n   {\n      if (args.length != 1)\n\
    \      {\n         System.err.println(\"usage: java ChannelDemo filespec\");\n\
    \         return;\n      }\n      try (FileInputStream fis = new FileInputStream(args[0]))\n\
    \      {\n         FileChannel inChannel = fis.getChannel();\n         WritableByteChannel\
    \ outChannel = Channels.newChannel(System.out);\n         inChannel.transferTo(0,\
    \ inChannel.size(), outChannel);\n      }\n      catch (IOException ioe)\n   \
    \   {\n         System.out.println(\"I/O error: \" + ioe.getMessage());\n    \
    \  }\n   }\n}\n```\n\nListing [7-6](#A978-1-4842-1565-4_7_Chapter.html#FPar17)’s\
    \ `main()` method verifies that a single command-line argument has been specified.\
    \ This argument identifies a file whose contents are to be copied to the standard\
    \ output stream.\n\nNext, `main()` creates a file input stream to the file identified\
    \ by the command-line argument and a file channel for reading from this file.\n\
    \nFinally, an output channel for sending bytes to the standard output stream is\
    \ obtained and the input file channel’s `transferTo()` method is called to transfer\
    \ the file content to standard output.\n\nCompile Listing [7-6](#A978-1-4842-1565-4_7_Chapter.html#FPar17)\
    \ (`javac ChannelDemo.java`) and execute the following command line to make a\
    \ copy of `ChannelDemo.java`:\n\n```\njava ChannelDemo ChannelDemo.java >ChannelDemo.bak\n\
    ```\n\nYou should observe a `ChannelDemo.bak` file with size and contents identical\
    \ to `ChannelDemo.java`.\n\n### Socket Channels\n\nI previously mentioned that\
    \ `Socket` declares a `SocketChannel` `getChannel()` method for returning a socket\
    \ channel instance, which describes an open connection to a socket. Unlike sockets,\
    \ socket channels are selectable and can function in nonblocking mode. These capabilities\
    \ (discussed later in this chapter) enhance the scalability and flexibility of\
    \ large applications (such as web servers).\n\nSocket channels are described by\
    \ the `java.nio.channels` package’s abstract `ServerSocketChannel`, `SocketChannel`,\
    \ and `DatagramChannel` classes. Each class ultimately extends `java.nio.channels.SelectableChannel`\
    \ and implements `InterruptibleChannel`, making `ServerSocketChannel`, `SocketChannel`,\
    \ and `DatagramChannel` instances selectable and interruptible. Because `SocketChannel`\
    \ and `DatagramChannel` implement the `ByteChannel`, `GatheringByteChannel`, and\
    \ `ScatteringByteChannel` interfaces, you can write to, read from, and perform\
    \ scatter/gather I/O on their underlying sockets.\n\n> **Note:** Unlike buffers,\
    \ which are not thread-safe, server socket channels, socket channels, and datagram\
    \ channels are thread-safe.\n\nEach `ServerSocketChannel`, `SocketChannel`, and\
    \ `DatagramChannel` instance creates a peer socket object from the `java.net.ServerSocket`,\
    \ `Socket`, or `java.net.DatagramSocket` class. Each class has been retrofitted\
    \ to work with channels. You can obtain the peer socket object by invoking `ServerSocketChannel`’s,\
    \ `SocketChannel`’s, or `DatagramChannel`’s `socket()` method.\n\n> **Note:**\
    \ When invoked on the socket instance returned from `socket()`, `getChannel()`\
    \ returns the associated socket channel. However, when invoked on a socket obtained\
    \ by instantiating `ServerSocket`, `Socket`, or `DatagramSocket`, `getChannel()`\
    \ returns `null`."
  raw: '#### Transferring Bytes Among Channels


    To optimize the common practice of performing bulk transfers, two methods have
    been added to `FileChannel` that avoid the need for intermediate buffers:


    *   `long transferFrom(ReadableByteChannel src, long position, long count)`

    *   `long transferTo(long position, long count, WritableByteChannel target)`


    `transferFrom(ReadableByteChannel, long, long)` transfers bytes into this channel’s
    file from the given readable byte channel. Parameter `src` identifies the source
    channel, `position` identifies the non-negative start position in the file where
    the transfer is to start, and `count` identifies the non-negative maximum number
    of bytes that are to be transferred.


    This method returns the number of bytes (possibly 0) that were actually transferred.
    It throws `IllegalArgumentException` when a precondition on a parameter (such
    as `position` being non-negative) doesn’t hold; `NonReadableChannelException`
    when the source channel wasn’t opened for reading; `NonWritableChannelException`
    when this channel wasn’t opened for writing; `ClosedChannelException` when this
    channel or the source channel is closed; `ClosedByInterruptException` when another
    thread interrupts the current thread while the transfer is in progress, thereby
    closing both channels and setting the current thread’s interrupt status; and `IOException`
    when some other I/O error occurs.


    `transferTo(long, long, WritableByteChannel)` transfers bytes from this channel’s
    file to the given writable byte channel. Parameter `position` identifies the non-negative
    start position in the file where the transfer is to start, `count` identifies
    the non-negative maximum number of bytes that are to be transferred, and `target`
    identifies the target channel.


    This method returns the number of bytes (possibly 0) that were actually transferred.
    It throws `IllegalArgumentException` when a precondition on a parameter doesn’t
    hold; `NonReadableChannelException` when this channel wasn’t opened for reading;
    `NonWritableChannelException` when the target channel wasn’t opened for writing;
    `ClosedChannelException` when this channel or the target channel is closed; `ClosedByInterruptException`
    when another thread interrupts the current thread while the transfer is in progress,
    thereby closing both channels and setting the current thread’s interrupt status;
    and `IOException` when some other I/O error occurs.


    If you’re using `transferTo()` with a file channel as the transfer source, the
    transfer stops at the end of the file when `position` plus `count` exceeds the
    file’s size. Similarly, `transferFrom()` stops when `src` is a file channel and
    its end of file is reached.


    Listing [7-6](#A978-1-4842-1565-4_7_Chapter.html#FPar17) presents an application
    that demonstrates channel transfer.


    Listing 7-6\. Demonstrating Channel Transfer


    `import java.io.FileInputStream;`


    `import java.io.IOException;`


    `import java.nio.channels.Channels;`


    `import java.nio.channels.FileChannel;`


    `import java.nio.channels.WritableByteChannel;`


    `public class ChannelDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java ChannelDemo filespec");`


    `return;`


    `}`


    `try (FileInputStream fis = new FileInputStream(args[0]))`


    `{`


    `FileChannel inChannel = fis.getChannel();`


    `WritableByteChannel outChannel = Channels.newChannel(System.out);`


    `inChannel.transferTo(0, inChannel.size(), outChannel);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.out.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    Listing [7-6](#A978-1-4842-1565-4_7_Chapter.html#FPar17)’s `main()` method verifies
    that a single command-line argument has been specified. This argument identifies
    a file whose contents are to be copied to the standard output stream.


    Next, `main()` creates a file input stream to the file identified by the command-line
    argument and a file channel for reading from this file.


    Finally, an output channel for sending bytes to the standard output stream is
    obtained and the input file channel’s `transferTo()` method is called to transfer
    the file content to standard output.


    Compile Listing [7-6](#A978-1-4842-1565-4_7_Chapter.html#FPar17) (`javac ChannelDemo.java`)
    and execute the following command line to make a copy of `ChannelDemo.java`:


    `java ChannelDemo ChannelDemo.java >ChannelDemo.bak`


    You should observe a `ChannelDemo.bak` file with size and contents identical to
    `ChannelDemo.java`.


    ### Socket Channels


    I previously mentioned that `Socket` declares a `SocketChannel` `getChannel()`
    method for returning a socket channel instance, which describes an open connection
    to a socket. Unlike sockets, socket channels are selectable and can function in
    nonblocking mode. These capabilities (discussed later in this chapter) enhance
    the scalability and flexibility of large applications (such as web servers).


    Socket channels are described by the `java.nio.channels` package’s abstract `ServerSocketChannel`,
    `SocketChannel`, and `DatagramChannel` classes. Each class ultimately extends
    `java.nio.channels.SelectableChannel` and implements `InterruptibleChannel`, making
    `ServerSocketChannel`, `SocketChannel`, and `DatagramChannel` instances selectable
    and interruptible. Because `SocketChannel` and `DatagramChannel` implement the
    `ByteChannel`, `GatheringByteChannel`, and `ScatteringByteChannel` interfaces,
    you can write to, read from, and perform scatter/gather I/O on their underlying
    sockets.


    Note


    Unlike buffers, which are not thread-safe, server socket channels, socket channels,
    and datagram channels are thread-safe.


    Each `ServerSocketChannel`, `SocketChannel`, and `DatagramChannel` instance creates
    a peer socket object from the `java.net.ServerSocket`, `Socket`, or `java.net.DatagramSocket`
    class. Each class has been retrofitted to work with channels. You can obtain the
    peer socket object by invoking `ServerSocketChannel`’s, `SocketChannel`’s, or
    `DatagramChannel`’s `socket()` method.


    Note


    When invoked on the socket instance returned from `socket()`, `getChannel()` returns
    the associated socket channel. However, when invoked on a socket obtained by instantiating
    `ServerSocket`, `Socket`, or `DatagramSocket`, `getChannel()` returns `null`.'
