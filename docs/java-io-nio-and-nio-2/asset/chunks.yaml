    #### 确定视图支持


    在使用这些视图中的任何一个之前，请确保其受支持。实现此任务的一种方法是调用 `FileSystem` 的 `Set<String>` `supportedFileAttributeViews()`
    方法，该方法返回一组字符串，用于标识调用方 `FileSystem` 所支持的视图。


    清单 12-9 展示了一个应用程序的源代码，该程序输出默认 `FileSystem` 所支持的视图名称。


    **清单 12-9\. 输出默认文件系统支持的文件属性视图名称**


    `import java.nio.file.FileSystem;`


    `import java.nio.file.FileSystems;`


    `public class FAVDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `FileSystem fsDefault = FileSystems.getDefault();`


    `for (String view: fsDefault.supportedFileAttributeViews())`


    `System.out.println(view);`


    `}`


    `}`


    按如下方式编译清单 12-9：


    `javac FAVDemo.java`


    按如下方式运行生成的应用程序：


    `java FAVDemo`


    我观察到以下输出：


    `owner`


    `dos`


    `acl`


    `basic`


    `user`


    注意


    所有 `FileSystem` 都支持基本文件属性视图，因此你至少应在输出中看到 `basic`。


    你也可以使用 `Files` 的 `<V extends FileAttributeView> V getFileAttributeView(Path path,
    Class<V> type, LinkOption... options)` 方法来完成此任务。该方法返回一个由视图接口类型的实现创建的对象，如果视图不受支持，则返回
    `null`。清单 12-10 展示了一个应用程序，它在实用方法上下文中使用此方法来确定视图支持。


    **清单 12-10\. 确定特定文件属性视图支持**


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.AclFileAttributeView;`


    `import java.nio.file.attribute.BasicFileAttributeView;`


    `import java.nio.file.attribute.FileAttributeView;`


    `import java.nio.file.attribute.PosixFileAttributeView;`


    `public class FAVDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `System.out.printf("Supports basic: %b%n",`


    `isSupported(BasicFileAttributeView.class));`


    `System.out.printf("Supports posix: %b%n",`


    `isSupported(PosixFileAttributeView.class));`


    `System.out.printf("Supports acl: %b%n",`


    `isSupported(AclFileAttributeView.class));`


    `}`


    `static boolean isSupported(Class<? extends FileAttributeView> clazz)`


    `{`


    `return Files.getFileAttributeView(Paths.get("."), clazz) != null;`


    `}`


    `}`


    清单 12-10 声明了一个 `isSupported()` 实用方法，该方法接受一个代表 `FileAttributeView` 子接口的 `java.lang.Class`
    对象作为参数。如果视图受支持，则返回 `true`；否则返回 `false`。


    `Class` 参数和一个描述当前目录的 `Path` 对象被传递给 `getFileAttributeView()`，该方法在视图受支持时返回一个由实现该接口的类创建的对象，在视图不受支持时返回
    `null`。


    编译清单 12-10（`javac FAVDemo.java`）并运行生成的应用程序（`java FAVDemo`）。我观察到以下输出：


    `Supports basic: true`


    `Supports posix: false`


    `Supports acl: true`


    最终，`getFileAttributeView()` 为与 `Path` 参数关联的 `FileSystem` 提供了一个结果。由于 `Paths.get(".")`
    返回的是默认文件系统的 `FileSystem`，因此 `isSupport()` 仅在默认文件系统上下文中有效。


    最后，一个文件存储可以支持多种文件属性视图。调用 `FileStore` 的任一 `supportsFileAttributeView()` 方法，以确定该文件存储是否支持由给定文件属性视图标识的文件属性：


    *   `boolean supportsFileAttributeView(Class<? extends FileAttributeView> type)`

    *   `boolean supportsFileAttributeView(` [`String`](https://docs.oracle.com/javase/8/docs/api/java/lang/String.html#class%20in%20java.lang)
    `name)`


    其中一个方法接受一个描述 `FileAttributeView` 子接口的 `Class` 对象作为参数：


    `System.out.printf("supports basic file attribute view: %b%n",`


    `fileStore.supportsFileAttributeView(BasicFileAttributeView.class));`


    另一个方法接受一个字符串参数，该字符串是 `FileSystem` 的 `supportedFileAttributeViews()` 方法返回的字符串之一：


    `System.out.printf("supports basic file attribute view: %b%n",`


    `fileStore.supportsFileAttributeView("basic"));`


    #### 探索基本视图


    `BasicFileAttributeView` 接口支持多个基本属性。以下列表按字符串名称和类型标识了每个属性：


    *   `creationTime` (`FileTime`)

    *   `fileKey` (`Object`)

    *   `isDirectory` (`Boolean`)

    *   `isOther` (`Boolean`)

    *   `isRegularFile` (`Boolean`)

    *   `isSymbolicLink` (`Boolean`)

    *   `lastAccessTime` (`FileTime`)

    *   `lastModifiedTime` (`FileTime`)

    *   `size` (`Long`)


    `creationTime`、`lastAccessTime` 和 `lastModifiedTime` 的类型均为 `java.nio.file.attribute.FileTime`，这是一个表示文件时间戳的不可变类。`fileKey`
    的类型为 `java.lang.Object`。`isDirectory`、`isOther`、`isRegularFile` 和 `isSymbolicLink`
    的类型均为 `java.lang.Boolean`。`size` 的类型为 `java.lang.Long`。


    `BasicFileAttributeView` 声明了以下方法：


    *   `BasicFileAttributes readAttributes()`：以批量操作的方式读取基本文件属性。

    *   `void setTimes(FileTime lastModifiedTime, FileTime lastAccessTime, FileTime
    creationTime)`：更新文件的 `lastModifiedTime`、`lastAccessTime` 和 `creationTime` 属性中的任意或全部。


    当发生 I/O 错误时，这些方法会抛出 `IOException`。


    `readAttributes()` 返回一个 `java.nio.file.attribute.BasicFileAttributes` 对象，该对象提供了用于读取属性值的类型安全方法：


    *   `FileTime creationTime()`

    *   `Object fileKey()`

    *   `boolean isDirectory()`

    *   `boolean isOther()`

    *   `boolean isRegularFile()`

    *   `boolean isSymbolicLink()`

    *   `FileTime lastAccessTime()`

    *   `FileTime lastModifiedTime()`

    *   `long size()`


    注意


    在某些文件系统上，可以使用一个标识符或标识符组合来唯一标识一个文件。此类标识符称为文件键。文件键对于某些操作非常重要，例如在支持[符号链接](https://docs.oracle.com/javase/8/docs/api/java/nio/file/package-summary.html#links)的文件系统中进行文件树遍历，以及允许一个文件成为多个目录中条目的文件系统。例如，在基于
    Unix 的文件系统上，设备 ID 和信息节点（inode）通常用于此目的。

