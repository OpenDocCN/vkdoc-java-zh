    New I/O APIs


    # 6. Buffers


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​6](http://dx.doi.org/10.1007/978-1-4842-1565-4_6))
    contains supplementary material, which is available to authorized users.


    NIO is based on buffers, whose contents are sent to or received from I/O services
    via channels. This chapter introduces you to NIO’s buffer classes.


    ## Introducing Buffers


    A buffer is an object that stores a fixed amount of data to be sent to or received
    from an I/O service (an operating system component for performing input/output).
    It sits between an application and a channel that writes the buffered data to
    the service or reads the data from the service and deposits it into the buffer.


    Buffers possess four properties:


    *   Capacity: The total number of data items that can be stored in the buffer.
    The capacity is specified when the buffer is created and cannot be changed later.

    *   Limit: The zero-based index of the first element that should not be read or
    written. In other words, it identifies the number of “live” data items in the
    buffer.

    *   Position: The zero-based index of the next data item that can be read or the
    location where the data item can be written.

    *   Mark: A zero-based index to which the buffer’s position will be reset when
    the buffer’s `reset()` method (presented shortly) is called. The mark is initially
    undefined.


    These four properties are related as follows: 0 <= mark <= position <= limit <=
    capacity


    Figure [6-1](#A978-1-4842-1565-4_6_Chapter.html#Fig1) reveals a newly created
    and byte-oriented buffer with a capacity of 7.


    ![A978-1-4842-1565-4_6_Fig1_HTML.jpg](A978-1-4842-1565-4_6_Fig1_HTML.jpg)


    Figure 6-1.


    The logical layout of a byte-oriented buffer includes an undefined mark, a current
    position, a limit, and a capacity


    Figure [6-1](#A978-1-4842-1565-4_6_Chapter.html#Fig1)’s buffer can store a maximum
    of seven elements. The mark is initially undefined, the position is initially
    set to `0`, and the limit is initially set to the capacity (`7`), which specifies
    the maximum number of bytes that can be stored in the buffer. You can only access
    positions `0` through `6`. Position `7` lies beyond the buffer.'
