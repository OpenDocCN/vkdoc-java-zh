    由于 `ObjectOutputStream` 实现了 `DataOutput`，它还声明了用于将基本类型值和字符串写入对象输出流的方法。


    Java 提供了具体的 `ObjectInputStream` 类，用于从对象输入流启动对象状态的反序列化。该类声明了一个 `ObjectInputStream(InputStream
