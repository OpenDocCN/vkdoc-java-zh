- fmt: "`writeObject()` doesn’t serialize the contents of `static` fields. In contrast,\
    \ it serializes the contents of all instance fields that are not explicitly prefixed\
    \ with the `transient` reserved word. For example, consider the following field\
    \ declaration:\n\n`public transient char[] password;`\n\nThis declaration specifies\
    \ `transient` to avoid serializing a password for some hacker to encounter. The\
    \ JVM’s serialization mechanism ignores any instance field that’s marked `transient`.\n\
    \n> **Note**  \n> Check out my “Transience” blog post ( [`www.javaworld.com/community/node/13451`](http://www.javaworld.com/community/node/13451)\
    \ ) to learn more about `transient`.\n\n`writeObject()` throws an instance of\
    \ `IOException` or an `IOException` subclass when something goes wrong. For example,\
    \ this method throws `NotSerializableException` when it encounters an object whose\
    \ class doesn’t implement `Serializable`.\n\n> **Note**  \n> Because `ObjectOutputStream`\
    \ implements `DataOutput`, it also declares methods for writing primitive-type\
    \ values and strings to an object output stream.\n\nJava provides the concrete\
    \ `ObjectInputStream` class to initiate the deserialization of an object’s state\
    \ from an object input stream. This class declares an `ObjectInputStream(InputStream\
    \ in)` constructor that chains the object input stream to the input stream specified\
    \ by `in`.\n\nWhen you pass an input stream reference to `in`, this constructor\
    \ attempts to read a serialization header from that input stream. It throws `NullPointerException`\
    \ when `in` is `null`, `IOException` when an I/O error prevents it from reading\
    \ this header, and `java.io.StreamCorruptedException` (an indirect subclass of\
    \ `IOException`) when the stream header is incorrect.\n\n`ObjectInputStream` deserializes\
    \ an object via its `Object readObject()` method. This method attempts to read\
    \ information about `obj`’s class followed by the values of `obj`’s instance fields\
    \ from the underlying input stream.\n\n`readObject()` throws an instance of `java.lang.ClassNotFoundException`,\
    \ `IOException`, or an `IOException` subclass when something goes wrong. For example,\
    \ this method throws `java.io.OptionalDataException` when it encounters primitive-type\
    \ values instead of objects.\n\n> **Note**  \n> Because `ObjectInputStream` implements\
    \ `DataInput`, it also declares methods for reading primitive-type values and\
    \ strings from an object input stream.\n\nListing [4-10](#A978-1-4842-1565-4_4_Chapter.html#FPar28)\
    \ presents an application that uses these classes to serialize and deserialize\
    \ an instance of Listing [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23)’s `Employee`\
    \ class to and from an `employee.dat` file.\n\n## Listing 4-10. Serializing and\
    \ Deserializing an `Employee` Object\n\n```\nimport java.io.FileInputStream;\n\
    import java.io.FileOutputStream;\nimport java.io.IOException;\nimport java.io.ObjectInputStream;\n\
    import java.io.ObjectOutputStream;\n\npublic class SerializationDemo\n{\n   final\
    \ static String FILENAME = \"employee.dat\";\n\n   public static void main(String[]\
    \ args)\n   {\n      ObjectOutputStream oos = null;\n      ObjectInputStream ois\
    \ = null;\n      try\n      {\n         FileOutputStream fos = new FileOutputStream(FILENAME);\n\
    \         oos = new ObjectOutputStream(fos);\n         Employee emp = new Employee(\"\
    John Doe\", 36);\n         oos.writeObject(emp);\n         oos.close();\n    \
    \     oos = null;\n         FileInputStream fis = new FileInputStream(FILENAME);\n\
    \         ois = new ObjectInputStream(fis);\n         emp = (Employee) ois.readObject();\
    \ // (Employee) cast is necessary.\n         ois.close();\n         System.out.println(emp.getName());\n\
    \         System.out.println(emp.getAge());\n      }\n      catch (ClassNotFoundException\
    \ cnfe)\n      {\n         System.err.println(cnfe.getMessage());\n      }\n \
    \     catch (IOException ioe)\n      {\n         System.err.println(ioe.getMessage());\n\
    \      }\n      finally\n      {\n         if (oos != null)\n            try\n\
    \            {\n               oos.close();\n            }\n            catch\
    \ (IOException ioe)\n            {\n               assert false; // shouldn’t\
    \ happen in this context\n            }\n         if (ois != null)\n         \
    \   try\n            {\n               ois.close();\n            }\n         \
    \   catch (IOException ioe)\n            {\n               assert false; // shouldn’t\
    \ happen in this context\n            }\n      }\n   }\n}\n```\n\nListing [4-10](#A978-1-4842-1565-4_4_Chapter.html#FPar28)’s\
    \ `main()` method first instantiates `Employee` and serializes this instance via\
    \ `writeObject()` to `employee.dat`. It then deserializes this instance from this\
    \ file via `readObject()` and invokes the instance’s `getName()` and `getAge()`\
    \ methods.\n\nCompile Listings [4-9](#A978-1-4842-1565-4_4_Chapter.html#FPar23)\
    \ and [4-10](#A978-1-4842-1565-4_4_Chapter.html#FPar28) as follows:\n\n```\njavac\
    \ *.java\n```\n\nRun the resulting application as follows:\n\n```\njava SerializationDemo\n\
    ```\n\nAlong with `employee.dat`, you should discover the following output:\n\n\
    ```\nJohn Doe\n36\n```\n\nThere’s no guarantee that the same class will exist\
    \ when a serialized object is deserialized (perhaps an instance field has been\
    \ deleted). During deserialization, this mechanism causes `readObject()` to throw\
    \ `java.io.InvalidClassException`—an indirect subclass of the `IOException` class—when\
    \ it detects a difference between the deserialized object and its class.\n\nEvery\
    \ serialized object has an identifier. The deserialization mechanism compares\
    \ the identifier of the object being deserialized with the serialized identifier\
    \ of its class (all serializable classes are automatically given unique identifiers\
    \ unless they explicitly specify their own identifiers) and causes `InvalidClassException`\
    \ to be thrown when it detects a mismatch.\n\nPerhaps you’ve added an instance\
    \ field to a class, and you want the deserialization mechanism to set the instance\
    \ field to a default value rather than have `readObject()` throw an `InvalidClassException`\
    \ instance. (The next time you serialize the object, the new field’s value will\
    \ be written out.)\n\nYou can avoid the thrown `InvalidClassException` instance\
    \ by adding a `static final long serialVersionUID = long integer value;` declaration\
    \ to the class. The `long integer value` must be unique and is known as a stream\
    \ unique identifier (SUID).\n\nDuring deserialization, the JVM will compare the\
    \ deserialized object’s SUID to its class’s SUID. If they match, `readObject()`\
    \ will not throw `InvalidClassException` when it encounters a compatible class\
    \ change (such as adding an instance field). However, it will still throw this\
    \ exception when it encounters an incompatible class change (such as changing\
    \ an instance field’s name or type).\n\n> **Note**  \n> Whenever you change a\
    \ class in some fashion, you must calculate a new SUID and assign it to `serialVersionUID`.\n\
