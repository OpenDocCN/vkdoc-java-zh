- fmt: '# Part I

    Getting Started with I/O


    # 1. I/O Basics and APIs


    Input and output (I/O) facilities are fundamental parts of operating systems along
    with computer languages and their libraries. All but trivial computer programs
    perform some kind of input and/or output operations.


    Java has always supported I/O. Its initial suite of I/O APIs and related architecture
    are known as classic I/O. Because modern operating systems feature newer I/O paradigms,
    which classic I/O doesn''t support, new I/O (NIO) was introduced as part of JDK
    1.4 to support them. Lack of time prevented some planned NIO features from being
    included in this release, which led to these other NIO features being deferred
    to JDK 5 and JDK 7.


    This chapter introduces you to classic I/O, NIO, and more NIO (NIO.2). You learn
    about the basic I/O features they address. Also, you receive an overview of their
    APIs. Subsequent chapters dig deeper into these APIs.


    ## Classic I/O


    JDK 1.0 introduced rudimentary I/O facilities for accessing the file system (to
    create a directory, remove a file, or perform another task), accessing file content
    randomly (as opposed to sequentially), and streaming byte-oriented data between
    sources and destinations in a sequential manner.


    ### File System Access and the File Class


    A file system is an operating system component that manages data storage and subsequent
    retrieval. Operating systems on which a Java virtual machine (JVM) runs support
    at least one file system. For example, Unix or Linux combines all mounted (attached
    and prepared) disks into one virtual file system. In contrast, Windows associates
    a separate file system with each active disk drive.


    A file system stores data in files, which are stored in directories. Its file
    and directory objects are accessed by specifying paths, which are compact maps
    that locate and identify file system objects. Paths are either absolute or relative:


    - An absolute path is a path relative to the file system''s root directory. It''s
    expressed as the root directory symbol followed by a delimited hierarchy of directory
    names that ends in the target directory or file name.

    - A relative path is a path relative to some other directory. It''s expressed
    similarly to an absolute path but without the initial root directory symbol. In
    contrast, it''s often prefixed with one or more delimited "`..`" character sequences,
    where each sequence refers to a parent directory.


    Paths are specified differently depending on the operating system. For example,
    Unix, Linux, and Unix-like operating systems identify the root directory and delimit
    path components with a forward slash (`/`), whereas Windows uses a backslash (`\`)
    for these purposes. Consider two examples:


    `/users/username/bin`


    `\users\username\bin`


    Each absolute path accesses the `bin` subdirectory of the `username` subdirectory
    of the `users` subdirectory of the root directory. The path on the first line
    accesses `bin` in a Unix/Linux context, whereas the path on the second line accesses
    this subdirectory in a Windows context.


    Windows and similar operating systems can manage multiple file systems. Each file
    system is identified with a drive specifier such as "`C:`". When specifying a
    path without a drive specifier, the path is relative to the current file system.
    Otherwise, it is relative to the specified file system:


    `\users\username\bin`


    `C:\users\username\bin`


    The first line accesses the path relative to the current file system, whereas
    the second line accesses the path relative to the `C:` file system.


    An instance of the `java.io.File` class abstracts a file or directory path. This
    instance provides access to the file system to perform tasks on this path such
    as removing the underlying file or directory. The following example demonstrates
    this class:


    ```

    new File("temp").mkdir();

    ```


    The example constructs a `File` object initialized to the file system object `temp`.
    It then calls `mkdir()` on this `File` object to make a new directory named `temp`.


    [Chapter 2](#A978-1-4842-1565-4_2_Chapter.html) explores the `File` class.


    ### Accessing File Content via RandomAccessFile


    File content can be accessed sequentially or randomly. Random access can speed
    up searching and sorting capabilities. An instance of the `java.io.RandomAccessFile`
    class provides random access to a file. This capability is demonstrated in the
    following example:


    ```

    RandomAccessFile raf = new RandomAccessFile("employees.dat", "r");

    int empIndex = 10;

    raf.seek(empIndex * EMP_REC_LEN);

    // Read contents of employee record.

    ```


    In this example, file `employees.dat`, which is divided into fixed-length employee
    records where each record is `EMP_REC_LEN` bytes long, is being accessed. The
    employee record at index `10` (the first record is located at index `0`) is being
    sought. This task is accomplished by seeking (setting the file pointer) to the
    byte location of this record''s first byte, which is located at the index multiplied
    by the record length. The record is then accessed.


    [Chapter 3](#A978-1-4842-1565-4_3_Chapter.html) explores the `RandomAccessFile`
    class.'
