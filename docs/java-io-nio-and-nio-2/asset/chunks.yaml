  raw: '`newDirectoryStream(Path dir, DirectoryStream.Filter<? super Path> filter)`
    opens a directory, returning a `DirectoryStream` to iterate over the entries in
    the directory. The elements returned by the directory stream’s iterator are of
    type `Path`; each `Path` object represents an entry in the directory. The `Path`
    objects are obtained as if by resolving the name of the directory entry against
    `dir`. The entries returned by the iterator are filtered by the given `filter`.
    This method throws `IOException` when an I/O error occurs and `NotDirectoryException`
    when the path couldn’t be opened because it’s not a directory.


    To create a filter, you need to subclass `DirectoryStream.Filter<T>` and override
    its `boolean accept(T path)` method, making sure to pass `Path` to `T`. This method
    must return `true` when `path` is accepted (included in the directory stream);
    otherwise, it must return `false`. The following example demonstrates a filter:


    `DirectoryStream.Filter<Path> filter;`


    `filter = new DirectoryStream.Filter<Path>()`


    `{`


    `@Override`


    `public boolean accept(Path path) throws IOException`


    `{`


    `return path.toString().endsWith(".java");`


    `}`


    `};`


    This filter accepts only those entries having the `.java` file extension.


    Listing [12-33](#A978-1-4842-1565-4_12_Chapter.html#FPar49) presents an application
    that obtains and outputs all entries in the specified directory that match a specific
    file extension.


    Listing 12-33\. Obtaining and Outputting All Directory Entries That Match an Extension


    `import java.io.IOException;`


    `import java.nio.file.DirectoryStream;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class DSDemo`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java DSDemo dirpath ext");`


    `return;`


    `}`


    `DirectoryStream.Filter<Path> filter;`


    `filter = new DirectoryStream.Filter<Path>()`


    `{`


    `@Override`


    `public boolean accept(Path path) throws IOException`


    `{`


    `return path.toString().endsWith(args[1]);`


    `}`


    `};`


    `Path path = Paths.get(args[0]);`


    `try (DirectoryStream<Path> ds =`


    `Files.newDirectoryStream(path, filter))`


    `{`


    `for (Path p: ds)`


    `System.out.println(p);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `}`


    Compile Listing [12-33](#A978-1-4842-1565-4_12_Chapter.html#FPar49) (`javac DSDemo.java`)
    and run the resulting application. For example, I specified the following command
    line:


    `java DSDemo \temp .java`


    I then observed several files in my `\temp` directory whose extension is `.java`.


