    Listing [12-16](#A978-1-4842-1565-4_12_Chapter.html#FPar25) presents the source
    code to an application that shows how to get and set single POSIX file attribute
    values.


    Listing 12-16\. Getting and Setting Single POSIX File Attribute Values


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.GroupPrincipal;`


    `import java.nio.file.attribute.PosixFilePermission;`


    `import java.util.Set;`


    `public class PFAVDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length < 1 || args.length > 2)`


          `{`


             `System.err.println("usage: java PFAVDemo path [group]");`


             `return;`


          `}`


          `Path path = Paths.get(args[0]);`


          `boolean setAttr = false;`


          `if (args.length == 2)`


             `setAttr = true;`


          `System.out.printf("Group: %b%n",`


                            `Files.getAttribute(path, "posix:group"));`


          `@SuppressWarnings("unchecked")`


          `Set<PosixFilePermission> perms =`


             `(Set<PosixFilePermission>)`


             `Files.getAttribute(path, "posix: permissions");`


          `for (PosixFilePermission perm: perms)`


             `System.out.printf("Permission: %s%n", perm);`


          `if (setAttr)`


          `{`


             `GroupPrincipal gp = path.getFileSystem().`


                                      `getUserPrincipalLookupService().`


                                      `lookupPrincipalByGroupName(args[1]);`


             `Files.setAttribute(path, "posix:group", gp);`


             `System.out.printf("Group: %b%n",`


                               `Files.getAttribute(path, "posix:group"));`


          `}`


       `}`


    `}`


    Unlike with basic file attributes, POSIX file attribute names require a prefix,
    which happens to be `posix:`.


    To change the `group` attribute, you need to obtain a new `GroupPrincipal` object
    that corresponds to the specified group name command-line argument. This task
    is accomplished by following these steps:


    Calling `Path`’s `FileSystem getFileSystem()` method to return the `FileSystem`
    that created the `Path` object.   Calling `FileSystem`’s `UserPrincipalLookupService
    getUserPrincipalLookupService()` method to return the `java.nio.file.attribute.UserPrincipalLookupService`
    object for obtaining `UserPrincipal`s and `GroupPrincipal`s.   Calling `UserPrincipalLookupService`’s
    `GroupPrincipal lookupPrincipalByGroupName(String group)` method to return the
    desired `GroupPrincipal` object.  


    Compile Listing [12-16](#A978-1-4842-1565-4_12_Chapter.html#FPar25) (`javac PFAVDemo.java`)
    and, assuming that the POSIX file attribute view is supported, run this application
    on an arbitrary file. I observe `UnsupportedOperationException`.


    The `Files` class declares the following convenience methods for getting and setting
    the POSIX permissions attribute:


    *   `Set<PosixFilePermission> getPosixFilePermissions(Path path, LinkOption...
    options)`

    *   `Path setPosixFilePermissions(Path path, Set<PosixFilePermission> perms)`


    For example, instead of specifying


    `Set<PosixFilePermission> perms =`


             `(Set<PosixFilePermission>)`


             `Files.getAttribute(path, "posix: permissions");`


    you could more conveniently specify


    `Set<PosixFilePermission> perms = Files.getPosixFilePermissions(path);`


    #### Exploring the File Owner View


    Many file systems support the concept of file ownership. A file owner is the identity
    of the owner that created a file. NIO.2 supports file ownership by providing the
    `FileOwnerAttributeView` interface, which supports the following attribute:


    *   `owner` (`UserPrincipal`)


    `FileOwnerAttributeView` declares the following methods to access this attribute:


    *   [`UserPrincipal`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/UserPrincipal.html#interface%20in%20java.nio.file.attribute)
    `getOwner()`: Read the file owner.

    *   `void setOwner(UserPrincipal owner)`: Update the file owner.


    These methods show that a file owner is implemented as a user principal. They
    throw `IOException` when an I/O error occurs.


    You should never need to work directly with these methods because `Files` declares
    the following more convenient methods:


    *   [`UserPrincipal`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/UserPrincipal.html#interface%20in%20java.nio.file.attribute)
    `getOwner(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`LinkOption`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/LinkOption.html#enum%20in%20java.nio.file)
    `... options)`

    *   [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `setOwner(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `path,` [`UserPrincipal`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/UserPrincipal.html#interface%20in%20java.nio.file.attribute)
    `owner)`


    Note


    You can also access the file owner attribute via `Files.getAttribute()` or `Files.setAttribute()`.
    You will need to specify `owner:owner` for the view prefix and attribute name.


    Listing [12-17](#A978-1-4842-1565-4_12_Chapter.html#FPar27) presents the source
    code to an application that demonstrates `getOwner()` and `setOwner()`.


    Listing 12-17\. Getting and Setting File Ownership


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import java.nio.file.attribute.UserPrincipal;`


    `public class FOAVDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java FOAVDemo path");`


    `return;`


    `}`


    `Path path = Paths.get(args[0]);`


    `System.out.printf("Owner: %s%n", Files.getOwner(path));`


    `UserPrincipal up = path.getFileSystem().`


    `getUserPrincipalLookupService().`


    `lookupPrincipalByName("jeff");`


    `System.out.println(up);`


    `Files.setOwner(path, up);`


    `System.out.printf("Owner: %s%n", Files.getOwner(path));`


    `}`


    `}`


    `FOAVDemo`’s `main()` method first validates the command line. It requires a single
    command-line argument that identifies the path to a file.


    `main()` subsequently obtains a `Path` object to the file. It invokes `getOwner()`
    on this `Path` to obtain the current owner of the file and then outputs the owner.


    Before the owner can be changed, a `UserPrincipal` named `jeff` is obtained and
    output. (You must add this principal to your operating system before you can run
    the application.)


    `setOwner()` is called to change the file’s ownership to `jeff`. Then, `getOwner()`
    is called and its value is output to verify that the owner has been changed.


    Compile Listing [12-17](#A978-1-4842-1565-4_12_Chapter.html#FPar27) as follows:


    `javac FOAVDemo.java`


    Assuming that a file named `test` exists, run the resulting application as follows:


    `java FOAVDemo test`


