    ## 列出目录


    `File` 声明了五个方法，用于返回位于由 `File` 对象抽象路径标识的目录中的文件和目录的名称。表 2-3 描述了这些方法。


    表 2-3.


    用于获取目录内容的 `File` 方法


    | 方法 | 描述 |

    | --- | --- |

    | `String[] list()` | 返回一个可能为空的字符串数组，这些字符串命名此 `File` 对象抽象路径所表示的目录中的文件和目录。如果路径不表示目录，或者发生
    I/O 错误，则此方法返回 null。否则，它返回一个字符串数组，目录中的每个文件或目录对应一个字符串。结果中不包含表示目录本身及其父目录的名称。每个字符串都是文件名，而不是完整路径。此外，不保证结果数组中的名称字符串按字母顺序或任何其他顺序出现。
    |

    | `String[] list(FilenameFilter filter)` | 一个便捷方法，用于调用 `list()` 并仅返回满足 `filter`
    的 `String`。 |

    | `File[] listFiles()` | 一个便捷方法，用于调用 `list()`，将其 `String` 数组转换为 `File` 数组，并返回
    `File` 数组。 |

    | `File[] listFiles(FileFilter filter)` | 一个便捷方法，用于调用 `list()`，将其 `String` 数组转换为
    `File` 数组，但仅针对满足 `filter` 的 `String`，并返回 `File` 数组。 |

    | `File[] listFiles(FilenameFilter filter)` | 一个便捷方法，用于调用 `list()`，将其 `String`
    数组转换为 `File` 数组，但仅针对满足 `filter` 的 `String`，并返回 `File` 数组。 |


    重载的 `list()` 方法返回表示文件和目录名称的 `String` 数组。第二个方法允许您通过基于 `java.io.FilenameFilter`
    的过滤器对象仅返回感兴趣的名称（例如，仅返回以 `.txt` 扩展名结尾的名称）。


    `FilenameFilter` 接口声明了一个 `boolean accept(File dir, String name)` 方法，该方法为位于 `File`
    对象路径标识的目录中的每个文件/目录调用：


    *   `dir` 标识路径的父部分（目录路径）。

    *   `name` 标识路径的最终目录名称或文件名部分。


    `accept()` 方法使用传递给这些参数的参数来确定文件或目录是否满足其可接受的标准。如果文件/目录名称应包含在返回的数组中，则返回 true；否则，此方法返回
    false。


    清单 2-5 展示了一个 `Dir`(ectory) 应用程序，它使用 `list(FilenameFilter)` 仅获取以特定扩展名结尾的名称。


    清单 2-5\. 列出特定名称


    `import java.io.File;`


    `import java.io.FilenameFilter;`


    `public class Dir`


    `{`


    `public static void main(final String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Dir dirpath ext");`


    `return;`


    `}`


    `File file = new File(args[0]);`


    `FilenameFilter fnf = new FilenameFilter()`


    `{`


    `@Override`


    `public boolean accept(File dir, String name)`


    `{`


    `return name.endsWith(args[1]);`


    `}`


    `};`


    `String[] names = file.list(fnf);`


    `for (String name: names)`


    `System.out.println(name);`


    `}`


    `}`


    按如下方式编译清单 2-5：


    `javac Dir.java`


