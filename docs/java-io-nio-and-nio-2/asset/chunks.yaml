- fmt: "### DatagramSocket and MulticastSocket\n\nThe `DatagramSocket` and `MulticastSocket`\
    \ classes let you perform UDP-based communications between a pair of hosts (`DatagramSocket`)\
    \ or between many hosts (`MulticastSocket`). With either class, you communicate\
    \ one-way messages via datagram packets, which are arrays of bytes associated\
    \ with instances of the `DatagramPacket` class.\n\n**Note:** Although you might\
    \ think that `Socket` and `ServerSocket` are all that you need, `DatagramSocket`\
    \ and its `MulticastSocket` subclass have their uses. For example, consider a\
    \ scenario in which a group of machines need to occasionally tell a server that\
    \ they’re alive. It shouldn’t matter when the occasional message is lost or even\
    \ when the message doesn’t arrive on time. Another example is a low-priority stock\
    \ ticker that periodically broadcasts stock prices. When a packet doesn’t arrive,\
    \ odds are that the next packet will arrive and you’ll then receive notification\
    \ of the latest prices. Timely rather than reliable or orderly delivery is more\
    \ important in realtime applications.\n\n`DatagramPacket` declares several constructors,\
    \ with `DatagramPacket(byte[] buf, int length)` being the simplest. This constructor\
    \ requires you to pass byte array and integer arguments to `buf` and `length`,\
    \ where `buf` is a data buffer that stores data to be sent or received, and `length`\
    \ (which must be less than or equal to `buf.length`) specifies the number of bytes\
    \ (starting at `buf[0]`) to send/receive.\n\nThe following example demonstrates\
    \ this constructor:\n\n```\nbyte[] buffer = new byte[100];\nDatagramPacket dgp\
    \ = new DatagramPacket(buffer, buffer.length);\n```\n\n**Note:** Additional constructors\
    \ let you specify an offset into `buf` that identifies the storage location of\
    \ the first outgoing or incoming byte, and/or let you specify a destination socket\
    \ address.\n\n`DatagramSocket` describes a socket for the client or server side\
    \ of the UDP-communication link. Although this class declares several constructors,\
    \ I find it convenient in this appendix to use the `DatagramSocket()` constructor\
    \ for the client side and the `DatagramSocket(int port)` constructor for the server\
    \ side. Either constructor throws `SocketException` when it cannot create the\
    \ datagram socket or bind the datagram socket to a local port.\n\nAfter an application\
    \ instantiates `DatagramSocket`, it calls `void send(DatagramPacket dgp)` and\
    \ `void receive(DatagramPacket dgp)` to send and receive datagram packets.\n\n\
    Listing B-3 demonstrates `DatagramPacket` and `DatagramSocket` in a server context.\n\
    \n**Listing B-3. Receiving Datagram Packets from and Echoing Them Back to Clients**\n\
    \n```\nimport java.io.IOException;\nimport java.net.DatagramPacket;\nimport java.net.DatagramSocket;\n\
    import java.net.SocketException;\n\npublic class DGServer\n{\n   final static\
    \ int PORT = 10000;\n\n   public static void main(String[] args) throws SocketException\n\
    \   {\n      System.out.println(\"Server is starting\");\n      DatagramSocket\
    \ dgs = new DatagramSocket(PORT);\n      try\n      {\n         System.out.println(\"\
    Send buffer size = \" +\n                            dgs.getSendBufferSize());\n\
    \         System.out.println(\"Receive buffer size = \" +\n                  \
    \          dgs.getReceiveBufferSize());\n         byte[] data = new byte[100];\n\
    \         DatagramPacket dgp = new DatagramPacket(data, data.length);\n      \
    \   while (true)\n         {\n            dgs.receive(dgp);\n            System.out.println(new\
    \ String(data));\n            dgs.send(dgp);\n         }\n      }\n      catch\
    \ (IOException ioe)\n      {\n         System.err.println(\"I/O error: \" + ioe.getMessage());\n\
    \      }\n   }\n}\n```\n\nListing B-3’s `main()` method first creates a `DatagramSocket`\
    \ object and binds the socket to port 10000 on the local host. It then invokes\
    \ `DatagramSocket`’s `int getSendBufferSize()` and `int getReceiveBufferSize()`\
    \ methods to get the values of the `SO_SNDBUF` and `SO_RCVBUF` socket options,\
    \ which are then output.\n\n**Note:** Sockets are associated with underlying platform\
    \ send and receive buffers, and their sizes are accessed by calling `getSendBufferSize()`\
    \ and `getReceiveBufferSize()`. Similarly, their sizes can be set by calling `DatagramSocket`’s\
    \ `void setReceiveBufferSize(int size)` and `void setSendBufferSize(int size)`\
    \ methods. Although you can adjust these buffer sizes to improve performance,\
    \ there’s a practical limit with regard to UDP. The maximum size of a UDP packet\
    \ that can be sent or received is 65,507 bytes under IPv4—it’s derived from subtracting\
    \ the 8-byte UDP header and 20-byte IP header values from 65,535. Although you\
    \ can specify a send/receive buffer with a greater value, doing so is wasteful\
    \ because the largest packet is restricted to 65,507 bytes. Also, attempting to\
    \ send or receive a packet with a buffer length that exceeds 65,507 bytes results\
    \ in `IOException`.\n\n`main()` next instantiates `DatagramPacket` in preparation\
    \ for receiving a datagram packet from a client and then echoing the packet back\
    \ to the client. It assumes that packets will be 100 bytes or less in size.\n\n\
    Finally, `main()` enters an infinite loop that receives a packet, outputs packet\
    \ content, and sends the packet back to the client. The client’s addressing information\
    \ is stored in `DatagramPacket`.\n\nCompile Listing B-3 as follows:\n\n```\njavac\
    \ DGServer.java\n```\n\nRun the resulting application as follows:\n\n```\njava\
    \ DGServer\n```\n\nYou should observe output that’s the same as or similar to\
    \ that shown here:\n\n```\nServer is starting\nSend buffer size = 8192\nReceive\
    \ buffer size = 8192\n```\n\nListing B-4 demonstrates `DatagramPacket` and `DatagramSocket`\
    \ in a client context.\n\n**Listing B-4. Sending a Datagram Packet to and Receiving\
    \ It Back from a Server**\n\n```\nimport java.io.IOException;\nimport java.net.DatagramPacket;\n\
    import java.net.DatagramSocket;\nimport java.net.InetAddress;\nimport java.net.SocketException;\n\
    \npublic class DGClient\n{\n   final static int PORT = 10000;\n   final static\
    \ String ADDR = \"localhost\";\n\n   public static void main(String[] args) throws\
    \ SocketException\n   {\n      System.out.println(\"client is starting\");\n \
    \     DatagramSocket dgs = new DatagramSocket();\n      try\n      {\n       \
    \  byte[] buffer;\n         buffer = \"Send me a datagram\".getBytes();\n    \
    \     InetAddress ia = InetAddress.getByName(ADDR);\n         DatagramPacket dgp\
    \ = new DatagramPacket(buffer, buffer.length,\n                              \
    \                   ia, PORT);\n         dgs.send(dgp);\n         byte[] buffer2\
    \ = new byte[100];\n         dgp = new DatagramPacket(buffer2, buffer.length,\
    \ ia, PORT);\n         dgs.receive(dgp);\n         System.out.println(new String(dgp.getData()));\n\
    \      }\n      catch (IOException ioe)\n      {\n         System.err.println(\"\
    I/O error: \" + ioe.getMessage());\n      }\n   }\n}\n```\n\nListing B-4 is similar\
    \ to Listing B-3, but there’s one big difference. I use the `DatagramPacket(byte[]\
    \ buf, int length, InetAddress address, int port)` constructor to specify the\
    \ server’s destination, which happens to be port 10000 on the local host, in the\
    \ datagram packet. The `send()` method call routes the packet to this destination.\n\
    \nCompile Listing B-4 as follows:\n\n```\njavac DGClient.java\n```\n\nRun the\
    \ resulting application as follows:\n\n```\njava DGClient\n```\n\nAssuming that\
    \ `DGServer` is also running, you should observe the following output in `DGClient`’s\
    \ command window (and the last line of this output in `DGServer`’s command window):\n\
    \n```\nclient is starting\nSend me a datagram\n```\n\n`MulticastSocket` describes\
    \ a socket for the client or server side of a UDP-based multicasting session.\
    \ Two commonly used constructors are `MulticastSocket()` (create a multicast socket\
    \ not bound to a port) and `MulticastSocket(int port)` (create a multicast socket\
    \ bound to the specified `port`). Either constructor throws `IOException` when\
    \ an I/O error occurs.\n\n**What Is Multicasting?**"
  raw: '### DatagramSocket and MulticastSocket


    The `DatagramSocket` and `MulticastSocket` classes let you perform UDP-based communications
    between a pair of hosts (`DatagramSocket`) or between many hosts (`MulticastSocket`).
    With either class, you communicate one-way messages via datagram packets, which
    are arrays of bytes associated with instances of the `DatagramPacket` class.


    Note


    Although you might think that `Socket` and `ServerSocket` are all that you need,
    `DatagramSocket` and its `MulticastSocket` subclass have their uses. For example,
    consider a scenario in which a group of machines need to occasionally tell a server
    that they’re alive. It shouldn’t matter when the occasional message is lost or
    even when the message doesn’t arrive on time. Another example is a low-priority
    stock ticker that periodically broadcasts stock prices. When a packet doesn’t
    arrive, odds are that the next packet will arrive and you’ll then receive notification
    of the latest prices. Timely rather than reliable or orderly delivery is more
    important in realtime applications.


    `DatagramPacket` declares several constructors, with `DatagramPacket(byte[] buf,
    int length)` being the simplest. This constructor requires you to pass byte array
    and integer arguments to `buf` and `length`, where `buf` is a data buffer that
    stores data to be sent or received, and `length` (which must be less than or equal
    to `buf.length`) specifies the number of bytes (starting at `buf[0]`) to send/receive.


    The following example demonstrates this constructor:


    `byte[] buffer = new byte[100];`


    `DatagramPacket dgp = new DatagramPacket(buffer, buffer.length);`


    Note


    Additional constructors let you specify an offset into `buf` that identifies the
    storage location of the first outgoing or incoming byte, and/or let you specify
    a destination socket address.


    `DatagramSocket` describes a socket for the client or server side of the UDP-communication
    link. Although this class declares several constructors, I find it convenient
    in this appendix to use the `DatagramSocket()` constructor for the client side
    and the `DatagramSocket(int port)` constructor for the server side. Either constructor
    throws `SocketException` when it cannot create the datagram socket or bind the
    datagram socket to a local port.


    After an application instantiates `DatagramSocket`, it calls `void send(DatagramPacket
    dgp)` and `void receive(DatagramPacket dgp)` to send and receive datagram packets.


    Listing [B-3](#A978-1-4842-1565-4_16_Chapter.html#FPar14) demonstrates `DatagramPacket`
    and `DatagramSocket` in a server context.


    Listing B-3\. Receiving Datagram Packets from and Echoing Them Back to Clients


    `import java.io.IOException;`


    `import java.net.DatagramPacket;`


    `import java.net.DatagramSocket;`


    `import java.net.SocketException;`


    `public class DGServer`


    `{`


    `final static int PORT = 10000;`


    `public static void main(String[] args) throws SocketException`


    `{`


    `System.out.println("Server is starting");`


    `DatagramSocket dgs = new DatagramSocket(PORT);`


    `try`


    `{`


    `System.out.println("Send buffer size = " +`


    `dgs.getSendBufferSize());`


    `System.out.println("Receive buffer size = " +`


    `dgs.getReceiveBufferSize());`


    `byte[] data = new byte[100];`


    `DatagramPacket dgp = new DatagramPacket(data, data.length);`


    `while (true)`


    `{`


    `dgs.receive(dgp);`


    `System.out.println(new String(data));`


    `dgs.send(dgp);`


    `}`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    Listing [B-3](#A978-1-4842-1565-4_16_Chapter.html#FPar14)’s `main()` method first
    creates a `DatagramSocket` object and binds the socket to port 10000 on the local
    host. It then invokes `DatagramSocket`’s `int getSendBufferSize()` and `int getReceiveBufferSize()`
    methods to get the values of the `SO_SNDBUF` and `SO_RCVBUF` socket options, which
    are then output.


    Note


    Sockets are associated with underlying platform send and receive buffers, and
    their sizes are accessed by calling `getSendBufferSize()` and `getReceiveBufferSize()`.
    Similarly, their sizes can be set by calling `DatagramSocket`’s `void setReceiveBufferSize(int
    size)` and `void setSendBufferSize(int size)` methods. Although you can adjust
    these buffer sizes to improve performance, there’s a practical limit with regard
    to UDP. The maximum size of a UDP packet that can be sent or received is 65,507
    bytes under IPv4—it’s derived from subtracting the 8-byte UDP header and 20-byte
    IP header values from 65,535\. Although you can specify a send/receive buffer
    with a greater value, doing so is wasteful because the largest packet is restricted
    to 65,507 bytes. Also, attempting to send or receive a packet with a buffer length
    that exceeds 65,507 bytes results in `IOException`.


    `main()` next instantiates `DatagramPacket` in preparation for receiving a datagram
    packet from a client and then echoing the packet back to the client. It assumes
    that packets will be 100 bytes or less in size.


    Finally, `main()` enters an infinite loop that receives a packet, outputs packet
    content, and sends the packet back to the client. The client’s addressing information
    is stored in `DatagramPacket`.


