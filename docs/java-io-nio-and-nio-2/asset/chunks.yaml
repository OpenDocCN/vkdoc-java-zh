  trans: '

    | 方法 | 描述 |

    | --- | --- |

    | `void force(boolean metadata)` | 请求将此文件通道的所有更新提交到存储设备。当此方法返回时，若文件位于本地存储设备上，则对该通道底层文件所做的所有修改均已提交。然而，当文件不在本地托管时（例如，位于网络文件系统上），应用程序无法确定修改是否已提交。（不保证使用其他位置定义的方法对文件所做的更改会被提交。例如，通过映射字节缓冲区所做的更改可能不会被提交。）`metadata`
    值指示更新是否应包含文件的元数据（例如最后修改时间和最后访问时间）：传入 `true` 时包含，传入 `false` 时不包含。即使通道以只读模式打开，传入
    `true` 也可能触发对操作系统的底层写入（如果操作系统正在维护元数据，例如最后访问时间）。当通道已关闭时，此方法抛出 `ClosedChannelException`；当发生任何其他
    I/O 错误时，抛出 `IOException`。 |

    | `long position()` | 返回此文件通道维护的当前基于零的文件位置。当文件通道已关闭时，此方法抛出 `ClosedChannelException`；当发生其他
    I/O 错误时，抛出 `IOException`。 |

    | `FileChannel position(long newPosition)` | 将此文件通道的当前文件位置设置为 `newPosition`。该参数是从文件开头计数的字节数。位置不能设置为负值。但是，可以将其设置为超出当前文件大小。如果设置为超出当前文件大小，则读取尝试将返回文件结尾。写入操作将成功，但会用所需数量的（未指定的）字节值填充当前文件结尾与新位置之间的字节。当
    `offset` 为负数时，此方法抛出 `java.lang.IllegalArgumentException`；当文件通道已关闭时，抛出 `ClosedChannelException`；当发生其他
    I/O 错误时，抛出 `IOException`。 |

    | `int read(ByteBuffer buffer)` | 从此文件通道读取字节到给定的缓冲区。读取的最大字节数是调用方法时缓冲区中剩余的字节数。字节将从缓冲区的当前位置开始复制到缓冲区中。当其他线程也尝试从此通道读取时，该调用可能会阻塞。完成后，缓冲区的位置将设置为已读取字节的末尾。缓冲区的限制不会改变。此方法返回实际读取的字节数，并抛出与之前讨论的
    `ReadableByteChannel` 相同的异常。 |

    | `int read(ByteBuffer dst, long position)` | 与前一个方法等效，不同之处在于从指定的文件 `position`
    开始读取字节。当 `position` 为负数时，抛出 `IllegalArgumentException`。 |

    | `long size()` | 返回此文件通道底层文件的大小（以字节为单位）。当文件通道已关闭时，此方法抛出 `ClosedChannelException`；当发生其他
    I/O 错误时，抛出 `IOException`。 |

    | `FileChannel truncate(long size)` | 将此文件通道的底层文件截断为 `size`。超出给定 `size` 的任何字节都将从文件中删除。当没有超出给定
    `size` 的字节时，文件内容保持不变。当当前文件位置大于给定 `size` 时，将其设置为 `size`。 |

    | `int write(ByteBuffer buffer)` | 从给定的 `buffer` 向此文件通道写入一系列字节。除非通道处于追加模式（在这种情况下，位置首先前进到文件末尾），否则字节从通道的当前文件位置开始写入。文件会（在必要时）增长以容纳写入的字节，然后文件位置会更新为实际写入的字节数。除此之外，此方法的行为与
    `WritableByteChannel` 接口指定的完全相同。此方法返回实际写入的字节数，并抛出与之前讨论的 `WritableByteChannel`
    相同的异常。 |

    | `int write(ByteBuffer src, long position)` | 与前一个方法等效，不同之处在于从指定的文件 `position`
    开始写入字节。当 `position` 为负数时，抛出 `IllegalArgumentException`。 |

