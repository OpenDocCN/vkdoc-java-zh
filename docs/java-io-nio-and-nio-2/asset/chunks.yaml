  trans: '

    #### 写入文件


    `Files` 类通过声明以下用于将所有字节或所有文本行写入文件的方法，为写入常规文件内容提供了支持：


    *   `Path write(Path path, byte[] bytes, OpenOption... options)`

    *   `Path write(Path path, Iterable<? extends CharSequence> lines, Charset cs,
    OpenOption... options)`

    *   `Path write(Path path, Iterable<? extends CharSequence> lines, OpenOption...
    options)`


    `write(Path path, byte[] bytes, OpenOption... options)` 将字节写入由 `path` 标识的文件。`options`
    参数指定了文件的创建或打开方式。当未提供任何选项时，此方法的行为如同指定了 [`CREATE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#CREATE)、[`TRUNCATE_EXISTING`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#TRUNCATE_EXISTING)
    和 [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    选项。字节数组中的所有字节都会被写入文件。然后文件会被关闭，即使抛出异常也是如此。当指定了不支持的打开选项（例如 `READ`）时，此方法会抛出 `UnsupportedOperationException`。当发生
    I/O 错误时，会抛出 `IOException`。


    `write(Path path, Iterable<? extends CharSequence> lines, Charset cs, OpenOption...
    options)` 将文本行写入由 `path` 标识的文件。每一行都是一个字符序列，按顺序写入文件，每行由操作系统行分隔符（由 Java 属性 `line.separator`
    定义）终止。字符使用字符集 `cs` 编码为字节。`options` 参数指定了文件的创建或打开方式。当未提供任何选项时，此方法的行为如同指定了 [`CREATE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#CREATE)、[`TRUNCATE_EXISTING`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#TRUNCATE_EXISTING)
    和 [`WRITE`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/StandardOpenOption.html#WRITE)
    选项。所有行都会被写入文件。然后文件会被关闭，即使抛出异常也是如此。当指定了不支持的打开选项时，此方法会抛出 `UnsupportedOperationException`。当发生
    I/O 错误或无法使用指定字符集对文本进行编码时，会抛出 `IOException`。


    `write(Path path, Iterable<? extends CharSequence> lines, OpenOption... options)`
    的行为如同指定了 `Files.write(path, lines, StandardCharsets.UTF_8, options);`。


    清单 12-26 描述了一个读取网页并将其 HTML 文本保存到名为 `page.html` 的文件中的应用程序。


    **清单 12-26\. 将网页 HTML 保存到文本文件**


    `import java.io.BufferedReader;`


    `import java.io.InputStreamReader;`


    `import java.io.IOException;`


    `import java.net.URL;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `import java.util.ArrayList;`


    `import java.util.List;`


    `public class SavePage`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java SavePage url");`


    `return;`


    `}`


    `URL url = new URL(args[0]);`


    `InputStreamReader isr = new InputStreamReader(url.openStream());`


    `BufferedReader br = new BufferedReader(isr);`


    `List<String> lines = new ArrayList<>();`


    `String line;`


    `while ((line = br.readLine()) != null)`


    `lines.add(line);`


    `Files.write(Paths.get("page.html"), lines);`


    `}`


    `}`


    清单 12-26 使用输入流读取器将缓冲读取器连接到 `java.net.URL` 对象的输入流。通过调用 `BufferedReader` 的 `readLine()`
    方法读取每一行，并将其存储在一个字符串列表中。随后，通过 `write(Path path, Iterable<? extends CharSequence>
    lines, OpenOption... options)` 将此列表写入 `page.html`。


    按如下方式编译清单 12-26：


    `javac SavePage.java`


