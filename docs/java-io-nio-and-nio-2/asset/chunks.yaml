    The `open()` method that takes a `java.net.InetSocketAddress` argument also lets
    you connect to another host at the specified remote address, as follows:


    `SocketChannel sc = SocketChannel.open(new InetSocketAddress("localhost", 9999));`


    This convenience method is equivalent to invoking the following code sequence:


    `SocketChannel sc = SocketChannel.open();`


    `sc.connect(new InetSocketAddress("localhost", 9999);`


    When connecting to a server via the peer `Socket` object or via `SocketChannel`’s
    `connect()`/second `open()` method on a blocking socket channel, the thread that
    invokes `connect()` blocks until the socket channel is connected. However, when
    the socket channel isn’t blocking, `connect()` returns immediately, typically
    with `false` to indicate that the connection hasn’t been made (although it might
    return `true` for a local loopback connection). Because a connection must be established
    before you can perform I/O on the socket channel, you need to repeatedly invoke
    `finishConnect()` until this method returns `true`.


    Listing [7-8](#A978-1-4842-1565-4_7_Chapter.html#FPar23) presents a `ChannelClient`
    application that demonstrates `SocketChannel`.


    Listing 7-8\. Demonstrating `SocketChannel`


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.SocketChannel;`


    `public class ChannelClient`


    `{`


    `public static void main(String[] args)`


    `{`


    `try`


    `{`


    `SocketChannel sc = SocketChannel.open();`


    `sc.configureBlocking(false);`


    `InetSocketAddress addr = new InetSocketAddress("localhost", 9999);`


    `sc.connect(addr);`


    `while (!sc.finishConnect())`


    `System.out.println("waiting to finish connection");`


    `ByteBuffer buffer = ByteBuffer.allocate(200);`


    `while (sc.read(buffer) >= 0)`


    `{`


    `buffer.flip();`


    `while (buffer.hasRemaining())`


    `System.out.print((char) buffer.get());`


    `buffer.clear();`


    `}`


    `sc.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    Listing [7-8](#A978-1-4842-1565-4_7_Chapter.html#FPar23)’s `main()` method first
    obtains a socket channel and configures it to be nonblocking. It then creates
    an address to the previous channel server application and initiates a connection
    to this address. Because of the nonblocking status, it’s necessary to repeatedly
    invoke `finishConnect()` until this method returns `true`, which indicates a connection
    to the remote server application.


    `main()` subsequently creates a byte buffer and enters a loop that repeatedly
    reads content into this buffer and outputs this content to the standard output
    stream. The channel is then closed.


    Compile Listing [7-8](#A978-1-4842-1565-4_7_Chapter.html#FPar23) as follows:


    `javac ChannelClient.java`


    Assuming that the channel server is running, execute the following command line
    to start the client:


    `java ChannelClient`


    You should observe a message similar to the following on the channel server output
    stream:


    `Received connection from /127.0.0.1:51177`


    You should also observe the following message on the channel client output stream:


    `Local address: /0:0:0:0:0:0:0:0:9999`'
  trans: '

    #### 探索 Socket 通道


    `SocketChannel` 是三种套接字通道类中最常用的一种，它模拟了面向连接的流协议（如 TCP/IP）。该类包含以下方法：


    *   `static SocketChannel open()`: 尝试打开一个套接字通道。如果无法打开通道，则抛出 `IOException`。

    *   `static SocketChannel open(InetSocketAddress remoteAddr)`: 尝试打开一个套接字通道并将其连接到
    `remoteAddr`。这个便捷方法的效果等同于先调用 `open()` 方法，然后在返回的套接字通道上调用 `connect()` 方法并传入 `remoteAddr`，最后返回该通道。此方法会抛出五种不同的异常：当连接操作进行中时，另一个线程关闭此通道，则抛出
    `AsynchronousCloseException`；当连接操作进行中时，另一个线程中断了当前线程，从而关闭通道并设置当前线程的中断状态，则抛出 `ClosedByInterruptException`；当给定的远程地址未完全解析时，抛出
    `java.nio.channels.UnresolvedAddressException`；当不支持给定远程地址的类型时，抛出 `java.nio.channels.UnsupportedAddressTypeException`；当发生其他
    I/O 错误时，抛出 `IOException`。

    *   `Socket socket()`: 返回与此套接字通道关联的对等 `Socket` 实例。

    *   `boolean connect(SocketAddress remoteAddr)`: 尝试将此套接字通道的套接字对象连接到远程地址。如果此通道是非阻塞的，则调用此方法会启动一个非阻塞连接操作。如果连接立即建立（例如本地连接可能发生的情况），则此方法返回
    `true`。否则，此方法返回 `false`，并且必须随后通过重复调用 `finishConnect()` 方法直到该方法返回 `true` 来完成连接操作。此方法抛出以下异常：当此通道已连接时，抛出
    `java.nio.channels.AlreadyConnectedException`；当此通道上已有非阻塞连接操作正在进行时，抛出 `java.nio.channels.ConnectionPendingException`；当此通道已关闭时，抛出
    `ClosedChannelException`；当连接操作进行中时，另一个线程关闭此通道，则抛出 `AsynchronousCloseException`；当连接操作进行中时，另一个线程中断了当前线程，从而关闭通道并设置当前线程的中断状态，则抛出
    `ClosedByInterruptException`；当给定的远程地址未完全解析时，抛出 `UnresolvedAddressException`；当不支持给定远程地址的类型时，抛出
    `UnsupportedAddressTypeException`；当发生其他 I/O 错误时，抛出 `IOException`。

    *   `boolean isConnectionPending()`: 当连接操作正在等待完成时返回 `true`；否则返回 `false`。

    *   `boolean finishConnect()`: 完成连接套接字通道的过程。当套接字通道完全连接时，此方法返回 `true`；否则返回 `false`。此方法抛出以下异常：当此通道未连接且未启动连接操作时，抛出
    `java.nio.channels.NoConnectionPendingException`；当此通道已关闭时，抛出 `ClosedChannelException`；当连接操作进行中时，另一个线程关闭此通道，则抛出
    `AsynchronousCloseException`；当连接操作进行中时，另一个线程中断了当前线程，从而关闭通道并设置当前线程的中断状态，则抛出 `ClosedByInterruptException`；当发生其他
    I/O 错误时，抛出 `IOException`。

    *   `boolean isConnected()`: 当此通道的套接字已打开并连接时返回 `true`；否则返回 `false`。


    套接字通道在 TCP/IP 流协议中充当客户端角色。你可以使用套接字通道来发起与监听服务器的连接。


    通过调用 `open()` 方法之一来创建新的套接字通道。在后台，会创建一个对等 `Socket` 对象。调用 `SocketChannel` 的 `socket()`
    方法可以返回这个对等对象。此外，你也可以通过对等 `Socket` 对象调用 `getChannel()` 来返回原始的套接字通道。


    从无参 `open()` 方法获得的套接字通道是未连接的。尝试读取或写入此套接字通道会导致 `java.nio.channels.NotYetConnectedException`。要连接套接字，请在套接字通道或其对应的对等套接字上调用
    `connect()` 方法。


    套接字通道连接后，将保持连接状态直到关闭。要判断套接字通道是否已连接，请调用 `SocketChannel` 的 `boolean isConnected()`
    方法。


    接受 `java.net.InetSocketAddress` 参数的 `open()` 方法还允许你连接到指定远程地址的另一台主机，如下所示：


    `SocketChannel sc = SocketChannel.open(new InetSocketAddress("localhost", 9999));`


    这个便捷方法等同于调用以下代码序列：


    `SocketChannel sc = SocketChannel.open();`


    `sc.connect(new InetSocketAddress("localhost", 9999));`


    当通过对等 `Socket` 对象或通过 `SocketChannel` 的 `connect()`/第二个 `open()` 方法在阻塞套接字通道上连接到服务器时，调用
    `connect()` 的线程会阻塞，直到套接字通道连接成功。但是，当套接字通道是非阻塞时，`connect()` 会立即返回，通常返回 `false` 表示连接尚未建立（尽管对于本地回环连接，它可能返回
    `true`）。由于必须在套接字通道上执行 I/O 之前建立连接，因此你需要重复调用 `finishConnect()`，直到此方法返回 `true`。


    清单 7-8 展示了一个演示 `SocketChannel` 的 `ChannelClient` 应用程序。


    清单 7-8. 演示 `SocketChannel`


    `import java.io.IOException;`


    `import java.net.InetSocketAddress;`


    `import java.nio.ByteBuffer;`


    `import java.nio.channels.SocketChannel;`


    `public class ChannelClient`


    `{`


    `public static void main(String[] args)`


    `{`


    `try`


    `{`


    `SocketChannel sc = SocketChannel.open();`


    `sc.configureBlocking(false);`


    `InetSocketAddress addr = new InetSocketAddress("localhost", 9999);`


    `sc.connect(addr);`


    `while (!sc.finishConnect())`


    `System.out.println("waiting to finish connection");`


    `ByteBuffer buffer = ByteBuffer.allocate(200);`


    `while (sc.read(buffer) >= 0)`


    `{`


    `buffer.flip();`


    `while (buffer.hasRemaining())`


    `System.out.print((char) buffer.get());`


    `buffer.clear();`


    `}`


    `sc.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    清单 7-8 的 `main()` 方法首先获取一个套接字通道并将其配置为非阻塞。然后，它创建一个指向之前通道服务器应用程序的地址，并启动到该地址的连接。由于非阻塞状态，有必要重复调用
    `finishConnect()`，直到此方法返回 `true`，这表示已连接到远程服务器应用程序。


    随后，`main()` 创建一个字节缓冲区并进入一个循环，该循环反复将内容读入此缓冲区，并将此内容输出到标准输出流。然后关闭通道。


    按如下方式编译清单 7-8：


    `javac ChannelClient.java`


    假设通道服务器正在运行，执行以下命令行以启动客户端：


    `java ChannelClient`


    你应该会在通道服务器输出流中观察到类似以下的消息：


    `Received connection from /127.0.0.1:51177`


    你还应该在通道客户端输出流中观察到以下消息：


    `Local address: /0:0:0:0:0:0:0:0:9999`

