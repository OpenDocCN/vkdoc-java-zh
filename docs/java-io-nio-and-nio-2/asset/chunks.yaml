    ## Network Interfaces


    The `NetworkInterface` class represents a network interface in terms of a name
    (such as `le0`) and a list of IP addresses assigned to this interface. Although
    a network interface is often implemented on a physical NIC, it also can be implemented
    in software; for example, the loopback interface (which is useful for testing
    a client).


    Note


    A network interface is the point of interconnection between a computer and a private
    or public network. It’s generally a network interface card (NIC), but doesn’t
    need a physical form. Instead, it can be implemented in software. For example,
    the loopback interface (127.0.0.1 for IPv4 and ::1 for IPv6) isn’t a physical
    device but a piece of software simulating a network interface. The loopback interface
    is commonly used in test environments.


