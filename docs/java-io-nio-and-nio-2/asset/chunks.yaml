  raw: '### Additional Capabilities


    `Path` declares additional methods for comparing paths, determining whether a
    path starts with or ends with another path, converting a path to a `java.net.URI`
    (Uniform Resource Identifier) object, and more. Listing [12-6](#A978-1-4842-1565-4_12_Chapter.html#FPar11)
    demonstrates most of these methods.


    Listing 12-6\. Demonstrating Additional `Path` Methods


    `import java.io.IOException;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class PathDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `Path path1 = Paths.get("a", "b", "c");`


    `Path path2 = Paths.get("a", "b", "c", "d");`


    `System.out.printf("path1: %s%n", path1.toString());`


    `System.out.printf("path2: %s%n", path2.toString());`


    `System.out.printf("path1.equals(path2): %b%n", path1.equals(path2));`


    `System.out.printf("path1.equals(path2.subpath(0, 3)): %b%n",`


    `path1.equals(path2.subpath(0, 3)));`


    `System.out.printf("path1.compareTo(path2): %d%n",`


    `path1.compareTo(path2));`


    `System.out.printf("path1.startsWith(\"x\"): %b%n",`


    `path1.startsWith("x"));`


    `System.out.printf("path1.startsWith(Paths.get(\"a\"): %b%n",`


    `path1.startsWith(Paths.get("a")));`


    `System.out.printf("path2.endsWith(\"d\"): %b%n",`


    `path2.startsWith("d"));`


    `System.out.printf("path2.endsWith(Paths.get(\"c\", \"d\"): " +`


    `"%b%n",`


    `path2.endsWith(Paths.get("c", "d")));`


    `System.out.printf("path2.toUri(): %s%n", path2.toUri());`


    `Path path3 = Paths.get(".");`


    `System.out.printf("path3: %s%n", path3.toString());`


    `System.out.printf("path3.toRealPath(): %s%n", path3.toRealPath());`


    `}`


    `}`


    Listing [12-6](#A978-1-4842-1565-4_12_Chapter.html#FPar11)’s `main()` method first
    obtains a reference to the current file system and uses this reference to create
    a pair of `Path` objects. After outputting each object’s path, it demonstrates
    path equality by invoking the `boolean equals(Object other)` method.


    You can also compare paths to determine whether they are equal or which path alphabetically
    precedes the other path. The `main()` method invokes `Path`’s `int compareTo(Path
    other)` method for this purpose.


    Next, `main()` calls `Path`’s `boolean startsWith(Path other)`, `boolean startsWith(String
    other)`, `boolean endsWith(Path other)`, and `boolean endsWith(String other)`
    methods to learn whether a path starts and ends with another path.


    At this point, `main()` demonstrates `Path`’s `URI toUri()` method to convert
    the current `Path` instance to a `URI` object. This method could throw `java.io.IOError`
    during the conversion.


    Finally, `main()` demonstrates the `Path toRealPath(LinkOption... options)` method
    for returning the real path of the file represented by the `Path` object. This
    method generally derives, from this path, an absolute path that locates the same
    file as this path, but with name elements that represent the actual names of the
    directories and any nondirectory. It throws `java.io.IOException` when the file
    doesn’t exist or an I/O error occurs.


    You can pass a comma-delimited list of `java.nio.file.LinkOption` enum constants
    as arguments to this method. This enum defines the options for how symbolic links
    are handled. Currently, `LinkOption` declares only a `NOFOLLOW_LINKS` (don’t follow
    symbolic links) constant.


