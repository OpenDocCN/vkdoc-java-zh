- fmt: '# Buffers


    Buffers are the foundation for NIO operations. Essentially, NIO is all about moving
    data into and out of buffers.


    A process such as the JVM performs I/O by asking the operating system to drain
    a buffer’s contents to storage via a write operation. Similarly, it asks the operating
    system to fill a buffer with data read from a storage device.


    Consider a read operation involving a disk drive. The operating system issues
    a command to the disk controller to read a block of bytes from a disk into an
    operating system buffer. Once this operation completes, the operating system copies
    the buffer contents to the buffer specified by the process when it issued a `read()`
    operation. Check out Figure [1-2](#A978-1-4842-1565-4_1_Chapter.html#Fig2).


    ![A978-1-4842-1565-4_1_Fig2_HTML.jpg](A978-1-4842-1565-4_1_Fig2_HTML.jpg)


    Figure 1-2. Filling a buffer at the operating system level


    In Figure [1-2](#A978-1-4842-1565-4_1_Chapter.html#Fig2), a process has issued
    a `read()` call to the operating system. In turn, the operating system has requested
    to the disk controller to read a block of bytes from the disk. The disk controller
    (also known as a DMA controller) reads these bytes directly into an operating
    system buffer via Direct Memory Access (DMA), a feature of computer systems that
    allows certain hardware subsystems to access main system (RAM) [memory](https://en.wikipedia.org/wiki/Computer_storage#Computer%20storage)
    independently of the [central processing unit](https://en.wikipedia.org/wiki/Central_processing_unit#Central%20processing%20unit)
    (CPU). The operating system then copies these bytes to the process’s buffer.


    Copying bytes from the operating system buffer to the process buffer isn’t very
    efficient. It would be more performant to have the DMA controller copy directly
    to the process buffer, but there are two problems with this approach:


    - The DMA controller typically cannot communicate directly with the user space
    in which the JVM process runs. Instead, it communicates with the operating system’s
    kernel space.

    - Block-oriented devices such as a DMA controller work with fixed-size data blocks.
    In contrast, the JVM process might request a size of data that isn’t a multiple
    of the block size or that is misaligned.


    Because of these problems, the operating system acts as an intermediary, tearing
    apart and recombining data as it switches between the JVM process and the DMA
    controller.


    The data assembly/disassembly tasks can be made more efficient by letting the
    JVM process pass a list of buffer addresses to the operating system in a single
    system call. The operating system then fills or drains these buffers in sequence,
    scattering data to multiple buffers during a read operation or gathering data
    from several buffers during a write operation. This scatter/gather activity reduces
    the number of (potentially expensive) system calls that the JVM process must make
    and lets the operating system optimize data handling because it knows the total
    amount of buffer space. Furthermore, when multiple processors or cores are available,
    the operating system may allow buffers to be filled or drained simultaneously.


    JDK 1.4’s `java.nio.Buffer` class abstracts the concept of a JVM process buffer.
    It serves as the superclass for `java.nio.ByteBuffer` and other buffer classes.
    Because I/O is fundamentally byte-oriented, only `ByteBuffer` instances can be
    used with channels (which are discussed shortly). Most of the other `Buffer` subclasses
    are conveniences for working with multibyte data (such as characters or integers).


    [Chapter 6](#A978-1-4842-1565-4_6_Chapter.html) explores the `Buffer` class and
    its children.


    # Channels


    Forcing a CPU to perform I/O tasks and wait for I/O completions (such a CPU is
    said to be I/O bound) is wasteful of this resource. Performance can be improved
    by offloading these tasks to DMA controllers so that the processor can get on
    with other work.


    A channel serves as a conduit for communicating (via the operating system) with
    a DMA controller to efficiently drain byte buffers to or fill byte buffers from
    a disk. JDK 1.4’s `java.nio.channels.Channel` interface, its subinterfaces, and
    various classes implement the channel architecture.


    One of these classes is called `java.nio.channels.FileChannel`, and it abstracts
    a channel for reading, writing, mapping, and manipulating a file. One interesting
    feature of `FileChannel` is its support for file locking, upon which sophisticated
    applications such as database management systems rely.


    File locking lets a process prevent or limit access to a file while the process
    is accessing the file. Although file locking can be applied to an entire file,
    it is often narrowed to a smaller region. A lock ranges from a starting byte offset
    in the file and continues for a specific number of bytes.


    Another interesting `FileChannel` feature is memory-mapped file I/O via the `map()`
    method. `map()` returns a `java.nio.MappedByteBuffer` whose content is a memory-mapped
    region of a file. File content is accessed via memory accesses; buffer copies
    and read-write system calls are eliminated.


    You can obtain a channel by calling the `java.nio.channels.Channels` class’s methods
    or the methods in classic I/O classes such as `RandomAccessFile`.


    [Chapter 7](#A978-1-4842-1565-4_7_Chapter.html) explores `Channel`, `Channels`,
    and more.


    # Selectors


    I/O is classified as block-oriented or stream-oriented. Reading from or writing
    to a file is an example of block-oriented I/O. In contrast, reading from the keyboard
    or writing to a network connection is an example of stream-oriented I/O.


    Stream I/O is often slower than block I/O. Furthermore, input tends to be intermittent.
    For example, the user might pause while entering a stream of characters or momentary
    slowness in a network connection causes a playing video to proceed in a jerky
    fashion.


    Many operating systems allow streams to be configured to operate in nonblocking
    mode in which a thread continually checks for available input without blocking
    when no input is available. The thread can handle incoming data or perform other
    tasks until data arrives.


    This “polling for available input” activity can be wasteful, especially when the
    thread needs to monitor many input streams (such as in a web server context).
    Modern operating systems can perform this checking efficiently, which is known
    as readiness selection, and which is often built on top of nonblocking mode. The
    operating system monitors a collection of streams and returns an indication to
    the thread of which streams are ready to perform I/O. As a result, a single thread
    can multiplex many active streams via common code and makes it possible, in a
    web server context, to manage a huge number of network connections.


    JDK 1.4 supports readiness selection by providing selectors, which are instances
    of the `java.nio.channels.Selector` class that can examine one or more channels
    and determine which channels are ready for reading or writing. This way a single
    thread can manage multiple channels (and, therefore, multiple network connections)
    efficiently. Being able to use fewer threads is advantageous where thread creation
    and thread context switching is expensive in terms of performance and/or memory
    use. See Figure [1-3](#A978-1-4842-1565-4_1_Chapter.html#Fig3).


    ![A978-1-4842-1565-4_1_Fig3_HTML.jpg](A978-1-4842-1565-4_1_Fig3_HTML.jpg)


    Figure 1-3. A thread manages three channels via a selector


    [Chapter 8](#A978-1-4842-1565-4_8_Chapter.html) explores `Selector` and its related
    types.'
