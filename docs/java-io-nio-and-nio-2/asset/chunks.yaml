- fmt: "### PipedOutputStream and PipedInputStream\n\nThreads must often communicate.\
    \ One approach involves using shared variables. Another approach involves using\
    \ piped streams via the `PipedOutputStream` and `PipedInputStream` classes. The\
    \ `PipedOutputStream` class lets a sending thread write a stream of bytes to an\
    \ instance of the `PipedInputStream` class, which a receiving thread uses to subsequently\
    \ read those bytes.\n\n**Caution**\n\nAttempting to use a `PipedOutputStream`\
    \ object and a `PipedInputStream` object from a single thread is not recommended\
    \ because it might deadlock the thread.\n\n`PipedOutputStream` declares a pair\
    \ of constructors for creating piped output streams:\n\n- `PipedOutputStream()`\
    \ creates a piped output stream that’s not yet connected to a piped input stream.\
    \ It must be connected to a piped input stream, either by the receiver or the\
    \ sender, before being used.\n- `PipedOutputStream(PipedInputStream dest)` creates\
    \ a piped output stream that’s connected to the piped input stream `dest`. Bytes\
    \ written to the piped output stream can be read from `dest`. This constructor\
    \ throws `IOException` when an I/O error occurs.\n\n`PipedOutputStream` declares\
    \ a `void connect(PipedInputStream dest)` method that connects this piped output\
    \ stream to `dest`. This method throws `IOException` when this piped output stream\
    \ is already connected to another piped input stream.\n\n`PipedInputStream` declares\
    \ four constructors for creating piped input streams:\n\n- `PipedInputStream()`\
    \ creates a piped input stream that’s not yet connected to a piped output stream.\
    \ It must be connected to a piped output stream before being used.\n- `PipedInputStream(int\
    \ pipeSize)` creates a piped input stream that’s not yet connected to a piped\
    \ output stream and uses `pipeSize` to size the piped input stream’s buffer. It\
    \ must be connected to a piped output stream before being used. This constructor\
    \ throws `IllegalArgumentException` when `pipeSize` is less than or equal to 0.\n\
    - `PipedInputStream(PipedOutputStream src)` creates a piped input stream that’s\
    \ connected to the piped output stream `src`. Bytes written to `src` can be read\
    \ from this piped input stream. This constructor throws `IOException` when an\
    \ I/O error occurs.\n- `PipedInputStream(PipedOutputStream src, int pipeSize)`\
    \ creates a piped input stream that’s connected to the piped output stream `src`\
    \ and uses `pipeSize` to size the piped input stream’s buffer. Bytes written to\
    \ `src` can be read from this piped input stream. This constructor throws `IOException`\
    \ when an I/O error occurs and `IllegalArgumentException` when `pipeSize` is less\
    \ than or equal to 0.\n\n`PipedInputStream` declares a `void connect(PipedOutputStream\
    \ src)` method that connects this piped input stream to `src`. This method throws\
    \ `IOException` when this piped input stream is already connected to another piped\
    \ output stream.\n\nThe easiest way to create a pair of piped streams is in the\
    \ same thread and in either order. For example, you can first create the piped\
    \ output stream:\n\n```\nPipedOutputStream pos = new PipedOutputStream();\nPipedInputStream\
    \ pis = new PipedInputStream(pos);\n```\n\nAlternatively, you can first create\
    \ the piped input stream:\n\n```\nPipedInputStream pis = new PipedInputStream();\n\
    PipedOutputStream pos = new PipedOutputStream(pis);\n```\n\nYou can leave both\
    \ streams unconnected and later connect them to each other using the appropriate\
    \ piped stream’s `connect()` method, as follows:\n\n```\nPipedOutputStream pos\
    \ = new PipedOutputStream();\nPipedInputStream pis = new PipedInputStream();\n\
    // ...\npos.connect(pis);\n```\n\nListing [4-3](#A978-1-4842-1565-4_4_Chapter.html#FPar8)\
    \ presents a `PipedStreamsDemo` application whose sender thread streams a sequence\
    \ of randomly generated byte integers to a receiver thread, which outputs this\
    \ sequence.\n\n**Listing 4-3.** Piping Randomly Generated Bytes from a Sender\
    \ Thread to a Receiver Thread\n\n```\nimport java.io.IOException;\nimport java.io.PipedInputStream;\n\
    import java.io.PipedOutputStream;\n\npublic class PipedStreamsDemo\n{\n   final\
    \ static int LIMIT = 10;\n\n   public static void main(String[] args) throws IOException\n\
    \   {\n      final PipedOutputStream pos = new PipedOutputStream();\n      final\
    \ PipedInputStream pis = new PipedInputStream(pos);\n\n      Runnable senderTask\
    \ = () -> {\n         try\n         {\n            for (int i = 0 ; i < LIMIT;\
    \ i++)\n               pos.write((byte)\n                         (Math.random()\
    \ * 256));\n         }\n         catch (IOException ioe)\n         {\n       \
    \     ioe.printStackTrace();\n         }\n         finally\n         {\n     \
    \       try\n            {\n               pos.close();\n            }\n     \
    \       catch (IOException ioe)\n            {\n               ioe.printStackTrace();\n\
    \            }\n         }\n      };\n\n      Runnable receiverTask = () -> {\n\
    \         try\n         {\n            int b;\n            while ((b = pis.read())\
    \ != -1)\n               System.out.println(b);\n         }\n         catch (IOException\
    \ ioe)\n         {\n            ioe.printStackTrace();\n         }\n         finally\n\
    \         {\n            try\n            {\n               pis.close();\n   \
    \         }\n            catch (IOException ioe)\n            {\n            \
    \   ioe.printStackTrace();\n            }\n         }\n      };\n\n      Thread\
    \ sender = new Thread(senderTask);\n      Thread receiver = new Thread(receiverTask);\n\
    \n      sender.start();\n      receiver.start();\n   }\n}\n```\n\nListing [4-3](#A978-1-4842-1565-4_4_Chapter.html#FPar8)’s\
    \ `main()` method creates piped output and piped input streams that will be used\
    \ by the `senderTask` thread to communicate a sequence of randomly generated byte\
    \ integers and by the `receiverTask` thread to receive this sequence.\n\nThe sender\
    \ task’s `run()` method explicitly closes its pipe stream when it finishes sending\
    \ the data. If it didn’t do this, an `IOException` instance with a “write end\
    \ dead” message would be thrown when the receiver thread invoked `read()` for\
    \ the final time (which would otherwise return `-1` to indicate end of stream).\
    \ For more information on this message, check out Daniel Ferber’s “What’s this?\
    \ IOException: Write End Dead” blog post ( [http://techtavern.wordpress.com/2008/07/16/whats-this-ioexception-write-end-dead/](http://techtavern.wordpress.com/2008/07/16/whats-this-ioexception-write-end-dead/)\
    \ ).\n\nCompile Listing [4-3](#A978-1-4842-1565-4_4_Chapter.html#FPar8) as follows:\n\
    \n```\njavac PipedStreamsDemo.java\n```\n\nRun the resulting application as follows:\n\
    \n```\njava PipedStreamsDemo\n```\n\nYou’ll discover output similar to the following:\n\
    \n```\n243\n147\n34\n68\n174\n251\n99\n44\n7\n19\n```"
  raw: '### PipedOutputStream and PipedInputStream


    Threads must often communicate. One approach involves using shared variables.
    Another approach involves using piped streams via the `PipedOutputStream` and
    `PipedInputStream` classes. The `PipedOutputStream` class lets a sending thread
    write a stream of bytes to an instance of the `PipedInputStream` class, which
    a receiving thread uses to subsequently read those bytes.


    Caution


    Attempting to use a `PipedOutputStream` object and a `PipedInputStream` object
    from a single thread is not recommended because it might deadlock the thread.


    `PipedOutputStream` declares a pair of constructors for creating piped output
    streams:


    *   `PipedOutputStream()` creates a piped output stream that’s not yet connected
    to a piped input stream. It must be connected to a piped input stream, either
    by the receiver or the sender, before being used.

    *   `PipedOutputStream(PipedInputStream dest)` creates a piped output stream that’s
    connected to the piped input stream `dest`. Bytes written to the piped output
    stream can be read from `dest`. This constructor throws `IOException` when an
    I/O error occurs.


    `PipedOutputStream` declares a `void connect(PipedInputStream dest)` method that
    connects this piped output stream to `dest`. This method throws `IOException`
    when this piped output stream is already connected to another piped input stream.


    `PipedInputStream` declares four constructors for creating piped input streams:


    *   `PipedInputStream()` creates a piped input stream that’s not yet connected
    to a piped output stream. It must be connected to a piped output stream before
    being used.

    *   `PipedInputStream(int pipeSize)` creates a piped input stream that’s not yet
    connected to a piped output stream and uses `pipeSize` to size the piped input
    stream’s buffer. It must be connected to a piped output stream before being used.
    This constructor throws `IllegalArgumentException` when `pipeSize` is less than
    or equal to 0.

    *   `PipedInputStream(PipedOutputStream src)` creates a piped input stream that’s
    connected to the piped output stream `src`. Bytes written to `src` can be read
    from this piped input stream. This constructor throws `IOException` when an I/O
    error occurs.

    *   `PipedInputStream(PipedOutputStream src, int pipeSize)` creates a piped input
    stream that’s connected to the piped output stream `src` and uses `pipeSize` to
    size the piped input stream’s buffer. Bytes written to `src` can be read from
    this piped input stream. This constructor throws `IOException` when an I/O error
    occurs and `IllegalArgumentException` when `pipeSize` is less than or equal to
    0.


    `PipedInputStream` declares a `void connect(PipedOutputStream src)` method that
    connects this piped input stream to `src`. This method throws `IOException` when
    this piped input stream is already connected to another piped output stream.


    The easiest way to create a pair of piped streams is in the same thread and in
    either order. For example, you can first create the piped output stream:


    `PipedOutputStream pos = new PipedOutputStream();`


    `PipedInputStream pis = new PipedInputStream(pos);`


    Alternatively, you can first create the piped input stream:


    `PipedInputStream pis = new PipedInputStream();`


    `PipedOutputStream pos = new PipedOutputStream(pis);`


    You can leave both streams unconnected and later connect them to each other using
    the appropriate piped stream’s `connect()` method, as follows:


    `PipedOutputStream pos = new PipedOutputStream();`


    `PipedInputStream pis = new PipedInputStream();`


    `// ...`


    `pos.connect(pis);`


    Listing [4-3](#A978-1-4842-1565-4_4_Chapter.html#FPar8) presents a `PipedStreamsDemo`
    application whose sender thread streams a sequence of randomly generated byte
    integers to a receiver thread, which outputs this sequence.


    Listing 4-3\. Piping Randomly Generated Bytes from a Sender Thread to a Receiver
    Thread


    `import java.io.IOException;`


    `import java.io.PipedInputStream;`


    `import java.io.PipedOutputStream;`


    `public class PipedStreamsDemo`


    `{`


    `final static int LIMIT = 10;`


    `public static void main(String[] args) throws IOException`


    `{`


    `final PipedOutputStream pos = new PipedOutputStream();`


    `final PipedInputStream pis = new PipedInputStream(pos);`


    `Runnable senderTask = () -> {`


    `try`


    `{`


    `for (int i = 0 ; i < LIMIT; i++)`


    `pos.write((byte)`


    `(Math.random() * 256));`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `finally`


    `{`


    `try`


    `{`


    `pos.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `};`


    `Runnable receiverTask = () -> {`


    `try`


    `{`


    `int b;`


    `while ((b = pis.read()) != -1)`


    `System.out.println(b);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `finally`


    `{`


    `try`


    `{`


    `pis.close();`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `};`


    `Thread sender = new Thread(senderTask);`


    `Thread receiver = new Thread(receiverTask);`


    `sender.start();`


    `receiver.start();`


    `}`


    `}`


    Listing [4-3](#A978-1-4842-1565-4_4_Chapter.html#FPar8)’s `main()` method creates
    piped output and piped input streams that will be used by the `senderTask` thread
    to communicate a sequence of randomly generated byte integers and by the `receiverTask`
    thread to receive this sequence.


    The sender task’s `run()` method explicitly closes its pipe stream when it finishes
    sending the data. If it didn’t do this, an `IOException` instance with a “write
    end dead” message would be thrown when the receiver thread invoked `read()` for
    the final time (which would otherwise return `-1` to indicate end of stream).
    For more information on this message, check out Daniel Ferber’s “What’s this?
    IOException: Write End Dead” blog post ( [`http://techtavern.wordpress.com/2008/07/16/whats-this-ioexception-write-end-dead/`](http://techtavern.wordpress.com/2008/07/16/whats-this-ioexception-write-end-dead/)
    ).


