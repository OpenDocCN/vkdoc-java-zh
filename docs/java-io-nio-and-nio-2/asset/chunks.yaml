- fmt: "### Creating Directories\n\nYou can create a new directory by calling the\
    \ `Files` class’s `Path createDirectory(Path dir, FileAttribute<?>... attrs)`\
    \ method. When creating a directory, you must specify a `path` and optionally\
    \ specify a varargs list of file attributes.\n\nThe `attrs` parameter specifies\
    \ a list of file attribute objects whose classes implement the `FileAttribute`\
    \ interface. Each attribute is identified by its name. If more than one attribute\
    \ of the same name is included in the list, all but the last occurrence are ignored.\n\
    \n`createDirectory()` returns the `Path` to the directory on success. It throws\
    \ `UnsupportedOperationException` when the list includes an attribute that cannot\
    \ be set atomically when creating the file, `FileAlreadyExistsException` when\
    \ a file with the same name already exists, and `IOException` when an I/O error\
    \ occurs or the parent directory doesn’t exist.\n\nListing [12-29](#A978-1-4842-1565-4_12_Chapter.html#FPar44)\
    \ presents the source code to an application that demonstrates `createDirectory()`\
    \ without file attributes.\n\n**Listing 12-29.** Creating an Empty Directory\n\
    \n```\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\
    \npublic class CDDemo\n{\n   public static void main(String[] args) throws IOException\n\
    \   {\n      if (args.length != 1)\n      {\n         System.err.println(\"usage:\
    \ java CDDemo path\");\n         return;\n      }\n      Files.createDirectory(Paths.get(args[0]));\n\
    \   }\n}\n```\n\nCompile Listing [12-29](#A978-1-4842-1565-4_12_Chapter.html#FPar44)\
    \ as follows:\n\n```\njavac CDDemo.java\n```\n\nRun the resulting application\
    \ as follows:\n\n```\njava CDDemo x\n```\n\nYou should observe no output as well\
    \ as an empty directory named `x` in the current directory. If you run this application\
    \ again, you should observe a `FileAlreadyExistsException` message on the standard\
    \ error stream.\n\nNow, run the resulting application as follows:\n\n```\njava\
    \ CDDemo a/b\n```\n\nIf directory `a` doesn’t exist before executing this command,\
    \ you’ll receive a message stating that `java.nio.file.NoSuchFileException` has\
    \ been thrown. When creating a directory, all specified ancestor directories must\
    \ exist or this exception is thrown. You can ensure that they exist by working\
    \ with the `Files` class’s `Path createDirectories(Path dir, FileAttribute<?>...\
    \ attrs)` method, which creates a directory after creating all nonexistent ancestor\
    \ directories. Unlike with `createDirectory()`, an exception isn’t thrown when\
    \ the directory couldn’t be created because it already exists.\n\n`FileAttribute`\
    \ is the return type of the `PosixFilePermissions` class’s `FileAttribute<Set<PosixFilePermission>>\
    \ asFileAttribute(Set<PosixFilePermission> perms)` method, which creates a `FileAttribute`\
    \ that encapsulates a copy of the given file permissions. You can use this method\
    \ when creating a directory to assign a set of permissions on a POSIX file system,\
    \ as follows:\n\n```\nSet<PosixFilePermission> perms =\n   PosixFilePermissions.fromString(\"\
    rw-------\");\nFileAttribute<Set<PosixFilePermission>> fa =\n   PosixFilePermissions.asFileAttribute(perms);\n\
    Files.createDirectory(Paths.get(\"images\"), fa);\n```\n\n### Creating and Deleting\
    \ Temporary Directories\n\nApplications often need to create and work with temporary\
    \ directories in which to store temporary files. You create a temporary directory\
    \ by working with either of the following methods:\n\n- `Path createTempDirectory(Path\
    \ dir, String prefix, FileAttribute<?>... attrs)`\n- `Path createTempDirectory(String\
    \ prefix, FileAttribute<?>... attrs)`\n\nThe first method creates this directory\
    \ in the directory identified by `dir` and the second method creates this directory\
    \ in the default temporary-file directory (identified by the Java property `java.io.tmpdir`).\
    \ The name of the temporary directory begins with the specified `prefix` and continues\
    \ with a sequence of digits. You can pass `null` to `prefix`. When `prefix` is\
    \ `null`, nothing appears before the digit sequence.\n\nOn success, each method\
    \ returns the path to the newly-created directory that didn’t exist before this\
    \ method was invoked. Otherwise, each method throws `IOException` when an I/O\
    \ error occurs or the directory `dir`/temporary directory doesn’t exist, `IllegalArgumentException`\
    \ when `prefix` cannot be used to create a candidate directory name, or `UnsupportedOperationException`\
    \ when the `attrs` list includes an attribute that cannot be set atomically when\
    \ creating the directory.\n\nListing [12-30](#A978-1-4842-1565-4_12_Chapter.html#FPar45)\
    \ presents the source code to an application that demonstrates the first `createTempDirectory()`\
    \ method (without file attributes).\n\n**Listing 12-30.** Creating an Empty Temporary\
    \ Directory\n\n```\nimport java.io.IOException;\nimport java.nio.file.Files;\n\
    import java.nio.file.Paths;\n\npublic class CTDDemo\n{\n   public static void\
    \ main(String[] args) throws IOException\n   {\n      if (args.length != 1)\n\
    \      {\n         System.err.println(\"usage: java CTDDemo path\");\n       \
    \  return;\n      }\n      Files.createTempDirectory(Paths.get(args[0]), \"images\"\
    );\n   }\n}\n```\n\nListing [12-30](#A978-1-4842-1565-4_12_Chapter.html#FPar45)\
    \ describes an application that takes a single command-line argument, which is\
    \ a path to a directory in which to store the temporary directory. The temporary\
    \ directory is assigned the prefix `images`.\n\nCompile Listing [12-30](#A978-1-4842-1565-4_12_Chapter.html#FPar45)\
    \ as follows:\n\n```\njavac CTDDemo.java\n```\n\nRun the resulting application\
    \ as follows:\n\n```\njava CTDDemo .\n```\n\nThe period character signifies the\
    \ current directory. You should observe an empty directory with a name similar\
    \ to `images403981294881023944` in this directory.\n\nWhen `CTDDemo` ends, the\
    \ temporary directory remains behind, which isn’t tidy and consumes disk space.\
    \ It’s better to delete the temporary directory before the application ends. There\
    \ are two ways to accomplish this task:\n\n- Add a shutdown hook via the `Runtime`\
    \ class’s `void addShutdownHook(Thread hook)` method.\n- Convert the returned\
    \ `Path` object to a `File` object (via `Path`’s `toFile()` method) and invoke\
    \ `File`’s `void deleteOnExit()` method on the `File` object.\n\nListing [12-31](#A978-1-4842-1565-4_12_Chapter.html#FPar46)\
    \ expands on Listing [12-30](#A978-1-4842-1565-4_12_Chapter.html#FPar45) by using\
    \ a shutdown hook to remove a temporary directory before the JVM shuts down.\n\
    \n**Listing 12-31.** Using a Shutdown Hook to Remove a Temporary Directory on\
    \ JVM Exit\n\n```\nimport java.io.IOException;\nimport java.nio.file.Files;\n\
    import java.nio.file.Path;\nimport java.nio.file.Paths;\n\npublic class CTDDemo\n\
    {\n   public static void main(String[] args) throws IOException\n   {\n      if\
    \ (args.length != 1)\n      {\n         System.err.println(\"usage: java CTDDemo\
    \ path\");\n         return;\n      }\n      Path path = Files.createTempDirectory(Paths.get(args[0]),\
    \ \"images\");\n      Runtime.getRuntime().addShutdownHook(new Thread()\n    \
    \  {\n         @Override\n         public void run()\n         {\n           \
    \ try\n            {\n               Files.delete(path);\n            }\n    \
    \        catch (IOException ioe)\n            {\n               ioe.printStackTrace();\n\
    \            }\n         }\n      });\n   }\n}\n```"
  raw: '#### Creating Directories


    You can create a new directory by calling the `Files` class’s `Path createDirectory(Path
    dir, FileAttribute<?>... attrs)` method. When creating a directory, you must specify
    a `path` and optionally specify a varargs list of file attributes.


    The `attrs` parameter specifies a list of file attribute objects whose classes
    implement the `FileAttribute` interface. Each attribute is identified by its name.
    If more than one attribute of the same name is included in the list, all but the
    last occurrence are ignored.


    `createDirectory()` returns the `Path` to the directory on success. It throws
    `UnsupportedOperationException` when the list includes an attribute that cannot
    be set atomically when creating the file, `FileAlreadyExistsException` when a
    file with the same name already exists, and `IOException` when an I/O error occurs
    or the parent directory doesn’t exist.


    Listing [12-29](#A978-1-4842-1565-4_12_Chapter.html#FPar44) presents the source
    code to an application that demonstrates `createDirectory()` without file attributes.


    Listing 12-29\. Creating an Empty Directory


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CDDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java CDDemo path");`


             `return;`


          `}`


          `Files.createDirectory(Paths.get(args[0]));`


       `}`


    `}`


    Compile Listing [12-29](#A978-1-4842-1565-4_12_Chapter.html#FPar44) as follows:


    `javac CDDemo.java`


    Run the resulting application as follows:


    `java CDDemo x`


    You should observe no output as well as an empty directory named `x` in the current
    directory. If you run this application again, you should observe a `FileAlreadyExistsException`
    message on the standard error stream.


    Now, run the resulting application as follows:


    `java CDDemo a/b`


    If directory `a` doesn’t exist before executing this command, you’ll receive a
    message stating that `java.nio.file.NoSuchFileException` has been thrown. When
    creating a directory, all specified ancestor directories must exist or this exception
    is thrown. You can ensure that they exist by working with the `Files` class’s
    [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `createDirectories(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `dir,` [`FileAttribute`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/FileAttribute.html#interface%20in%20java.nio.file.attribute)
    `<?>... attrs)` method, which creates a directory after creating all nonexistent
    ancestor directories. Unlike with [`createDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Files.html#createDirectory-java.nio.file.Path-java.nio.file.attribute.FileAttribute%E2%80%A6-)
    `()`, an exception isn’t thrown when the directory couldn’t be created because
    it already exists.


    `FileAttribute` is the return type of the `PosixFilePermissions` class’s `FileAttribute<Set<PosixFilePermission>>
    asFileAttribute(Set<PosixFilePermission> perms)` method, which creates a `FileAttribute`
    that encapsulates a copy of the given file permissions. You can use this method
    when creating a directory to assign a set of permissions on a POSIX file system,
    as follows:


    `Set<PosixFilePermission> perms =`


       `PosixFilePermissions.fromString("rw-------");`


    `FileAttribute<Set<PosixFilePermission>> fa =`


       `PosixFilePermissions.asFileAttribute(perms);`


    `Files.createDirectory(Paths.get("images"), fa);`


    #### Creating and Deleting Temporary Directories


    Applications often need to create and work with temporary directories in which
    to store temporary files. You create a temporary directory by working with either
    of the following methods:


    *   `Path createTempDirectory(Path dir, String prefix, FileAttribute<?>... attrs)`

    *   `Path createTempDirectory(String prefix, FileAttribute<?>... attrs)`


    The first method creates this directory in the directory identified by `dir` and
    the second method creates this directory in the default temporary-file directory
    (identified by the Java property `java.io.tmpdir`). The name of the temporary
    directory begins with the specified `prefix` and continues with a sequence of
    digits. You can pass `null` to `prefix`. When `prefix` is `null`, nothing appears
    before the digit sequence.


    On success, each method returns the path to the newly-created directory that didn’t
    exist before this method was invoked. Otherwise, each method throws `IOException`
    when an I/O error occurs or the directory `dir`/temporary directory doesn’t exist,
    `IllegalArgumentException` when `prefix` cannot be used to create a candidate
    directory name, or `UnsupportedOperationException` when the `attrs` list includes
    an attribute that cannot be set atomically when creating the directory.


    Listing [12-30](#A978-1-4842-1565-4_12_Chapter.html#FPar45) presents the source
    code to an application that demonstrates the first `createTempDirectory()` method
    (without file attributes).


    Listing 12-30\. Creating an Empty Temporary Directory


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CTDDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java CTDDemo path");`


    `return;`


    `}`


    `Files.createTempDirectory(Paths.get(args[0]), "images");`


    `}`


    `}`


    Listing [12-30](#A978-1-4842-1565-4_12_Chapter.html#FPar45) describes an application
    that takes a single command-line argument, which is a path to a directory in which
    to store the temporary directory. The temporary directory is assigned the prefix
    `images`.


    Compile Listing [12-30](#A978-1-4842-1565-4_12_Chapter.html#FPar45) as follows:


    `javac CTDDemo.java`


    Run the resulting application as follows:


    `java CTDDemo .`


    The period character signifies the current directory. You should observe an empty
    directory with a name similar to `images403981294881023944` in this directory.


    When `CTDDemo` ends, the temporary directory remains behind, which isn’t tidy
    and consumes disk space. It’s better to delete the temporary directory before
    the application ends. There are two ways to accomplish this task:


    *   Add a shutdown hook via the `Runtime` class’s `void addShutdownHook(` [`Thread`](https://docs.oracle.com/javase/8/docs/api/java/lang/Thread.html#class%20in%20java.lang)
    `hook)` method.

    *   Convert the returned `Path` object to a `File` object (via `Path`’s `toFile()`
    method) and invoke `File`’s `void deleteOnExit()` method on the `File` object.


    Listing [12-31](#A978-1-4842-1565-4_12_Chapter.html#FPar46) expands on Listing
    [12-30](#A978-1-4842-1565-4_12_Chapter.html#FPar45) by using a shutdown hook to
    remove a temporary directory before the JVM shuts down.


    Listing 12-31\. Using a Shutdown Hook to Remove a Temporary Directory on JVM Exit


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class CTDDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java CTDDemo path");`


    `return;`


    `}`


    `Path path = Files.createTempDirectory(Paths.get(args[0]), "images");`


    `Runtime.getRuntime().addShutdownHook(new Thread()`


    `{`


    `@Override`


    `public void run()`


    `{`


    `try`


    `{`


    `Files.delete(path);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `});`


    `}`


    `}`'
  trans: '

    #### 创建目录


    你可以通过调用 `Files` 类的 `Path createDirectory(Path dir, FileAttribute<?>... attrs)`
    方法来创建一个新目录。创建目录时，必须指定一个 `path`，并可选地指定一个可变参数的文件属性列表。


    `attrs` 参数指定了一个文件属性对象列表，这些对象的类实现了 `FileAttribute` 接口。每个属性由其名称标识。如果列表中包含多个同名属性，则只有最后一个出现的属性会被保留，其余的被忽略。


    `createDirectory()` 在成功时返回指向该目录的 `Path`。当列表中包含一个无法在创建文件时原子设置的属性时，它会抛出 `UnsupportedOperationException`；当同名文件已存在时，抛出
    `FileAlreadyExistsException`；当发生 I/O 错误或父目录不存在时，抛出 `IOException`。


    清单 12-29 展示了一个演示不带文件属性的 `createDirectory()` 方法的应用程序源代码。


    清单 12-29\. 创建一个空目录


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CDDemo`


    `{`


       `public static void main(String[] args) throws IOException`


       `{`


          `if (args.length != 1)`


          `{`


             `System.err.println("usage: java CDDemo path");`


             `return;`


          `}`


          `Files.createDirectory(Paths.get(args[0]));`


       `}`


    `}`


    按如下方式编译清单 12-29：


    `javac CDDemo.java`


    按如下方式运行生成的应用程序：


    `java CDDemo x`


    你应该会看到没有输出，并且在当前目录中有一个名为 `x` 的空目录。如果你再次运行此应用程序，你应该会在标准错误流上看到一条 `FileAlreadyExistsException`
    消息。


    现在，按如下方式运行生成的应用程序：


    `java CDDemo a/b`


    如果在执行此命令之前目录 `a` 不存在，你将收到一条消息，指出已抛出 `java.nio.file.NoSuchFileException`。创建目录时，所有指定的祖先目录都必须存在，否则会抛出此异常。你可以通过使用
    `Files` 类的 [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `createDirectories(` [`Path`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Path.html#interface%20in%20java.nio.file)
    `dir,` [`FileAttribute`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/attribute/FileAttribute.html#interface%20in%20java.nio.file.attribute)
    `<?>... attrs)` 方法来确保它们存在，该方法会在创建所有不存在的祖先目录后创建目录。与 [`createDirectory`](https://docs.oracle.com/javase/8/docs/api/java/nio/file/Files.html#createDirectory-java.nio.file.Path-java.nio.file.attribute.FileAttribute%E2%80%A6-)
    `()` 不同，当目录因已存在而无法创建时，不会抛出异常。


    `FileAttribute` 是 `PosixFilePermissions` 类的 `FileAttribute<Set<PosixFilePermission>>
    asFileAttribute(Set<PosixFilePermission> perms)` 方法的返回类型，该方法创建一个封装了给定文件权限副本的 `FileAttribute`。你可以在创建目录时使用此方法在
    POSIX 文件系统上分配一组权限，如下所示：


    `Set<PosixFilePermission> perms =`


       `PosixFilePermissions.fromString("rw-------");`


    `FileAttribute<Set<PosixFilePermission>> fa =`


       `PosixFilePermissions.asFileAttribute(perms);`


    `Files.createDirectory(Paths.get("images"), fa);`


    #### 创建和删除临时目录


    应用程序通常需要创建和使用临时目录来存储临时文件。你可以通过使用以下任一方法来创建临时目录：


    *   `Path createTempDirectory(Path dir, String prefix, FileAttribute<?>... attrs)`

    *   `Path createTempDirectory(String prefix, FileAttribute<?>... attrs)`


    第一个方法在由 `dir` 标识的目录中创建此目录，第二个方法在默认的临时文件目录（由 Java 属性 `java.io.tmpdir` 标识）中创建此目录。临时目录的名称以指定的
    `prefix` 开头，后跟一系列数字。你可以将 `null` 传递给 `prefix`。当 `prefix` 为 `null` 时，数字序列之前不会出现任何内容。


    成功时，每个方法都会返回指向新创建目录的路径，该目录在调用此方法之前不存在。否则，当发生 I/O 错误或目录 `dir`/临时目录不存在时，每个方法都会抛出
    `IOException`；当 `prefix` 无法用于创建候选目录名称时，抛出 `IllegalArgumentException`；当 `attrs`
    列表包含一个无法在创建目录时原子设置的属性时，抛出 `UnsupportedOperationException`。


    清单 12-30 展示了一个演示第一个 `createTempDirectory()` 方法（不带文件属性）的应用程序源代码。


    清单 12-30\. 创建一个空的临时目录


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Paths;`


    `public class CTDDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java CTDDemo path");`


    `return;`


    `}`


    `Files.createTempDirectory(Paths.get(args[0]), "images");`


    `}`


    `}`


    清单 12-30 描述了一个应用程序，它接受一个命令行参数，该参数是用于存储临时目录的目录路径。临时目录被分配了前缀 `images`。


    按如下方式编译清单 12-30：


    `javac CTDDemo.java`


    按如下方式运行生成的应用程序：


    `java CTDDemo .`


    句点字符表示当前目录。你应该会在此目录中看到一个空目录，其名称类似于 `images403981294881023944`。


    当 `CTDDemo` 结束时，临时目录会保留下来，这既不整洁又占用磁盘空间。最好在应用程序结束前删除临时目录。有两种方法可以完成此任务：


    *   通过 `Runtime` 类的 `void addShutdownHook(` [`Thread`](https://docs.oracle.com/javase/8/docs/api/java/lang/Thread.html#class%20in%20java.lang)
    `hook)` 方法添加一个关闭钩子。

    *   将返回的 `Path` 对象转换为 `File` 对象（通过 `Path` 的 `toFile()` 方法），并在该 `File` 对象上调用 `File`
    的 `void deleteOnExit()` 方法。


    清单 12-31 在清单 12-30 的基础上进行了扩展，通过使用关闭钩子在 JVM 关闭前删除临时目录。


    清单 12-31\. 使用关闭钩子在 JVM 退出时删除临时目录


    `import java.io.IOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `public class CTDDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 1)`


    `{`


    `System.err.println("usage: java CTDDemo path");`


    `return;`


    `}`


    `Path path = Files.createTempDirectory(Paths.get(args[0]), "images");`


    `Runtime.getRuntime().addShutdownHook(new Thread()`


    `{`


    `@Override`


    `public void run()`


    `{`


    `try`


    `{`


    `Files.delete(path);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `}`


    `});`


    `}`


    `}`

