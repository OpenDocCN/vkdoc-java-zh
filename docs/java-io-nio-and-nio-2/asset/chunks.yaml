    You can obtain an `AsynchronousSocketChannel` object by invoking this class’s
    `AsynchronousSocketChannel` `open()` class method, as follows:


    ```

    AsynchronousSocketChannel ch = AsynchronousSocketChannel.open();

    ```


    According to `AsynchronousSocketChannel`’s documentation, this method returns
    an asynchronous socket channel that’s bound to the default group. The alternative
    `AsynchronousSocketChannel` `open(` `AsynchronousChannelGroup` `group)` method
    returns an asynchronous socket channel that’s bound to the specified `group`.
    Again, I’ll discuss asynchronous channel groups later in this chapter.


    You can configure an asynchronous socket channel by invoking the `<T> AsynchronousSocketChannel
    setOption(SocketOption<T> name, T value)` generic method. The only documented
    options that are supported are `SO_RCVBUF`, `SO_SNDBUF`, `SO_KEEPALIVE`, `SO_REUSEADDR`,
    and `TCP_NODELAY`.


    A newly-created and possibly configured asynchronous socket channel is open but
    not yet connected. A connected asynchronous socket channel is created when a connection
    is made to the socket of an asynchronous server socket channel. It’s not possible
    to create an asynchronous socket channel for an arbitrary, preexisting socket.


    A newly-created socket channel is connected by invoking either of its `connect`
    `()` methods; one `connect()` method returns a `Future` and the other `connect()`
    method requires a `CompletionHandler` argument.


    Once connected, a socket channel remains connected until closed. Whether or not
    a socket channel is connected may be determined by invoking its `SocketAddress
    getRemoteAddress()` method, which returns the socket address of the remote socket
    (or `null` when there is no connection). An attempt to invoke an I/O operation
    on an unconnected channel results in `NotYetConnectedException`.


    **Note**


    Asynchronous socket channels are safe for use by multiple concurrent threads.
    They support concurrent reads and writes, although at most one read and one write
    can be outstanding at any time. If a thread initiates a read before a previous
    read has completed, `ReadPendingException` will be thrown. Similarly, an attempt
    to initiate a write before a previous write has completed will throw `WritePendingException`.


