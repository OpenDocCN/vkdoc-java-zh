- fmt: "# Exploring Socket Channels\n\n`SocketChannel` is the most commonly used of\
    \ the three socket channel classes and models a connection-oriented stream protocol\
    \ (such as TCP/IP). This class includes the following methods:\n\n- `static SocketChannel\
    \ open()`: Attempt to open a socket channel. If the channel cannot be opened,\
    \ `IOException` is thrown.\n- `static SocketChannel open(InetSocketAddress remoteAddr)`:\
    \ Attempt to open a socket channel and connect it to `remoteAddr`. This convenience\
    \ method works as if by invoking the `open()` method, invoking the `connect()`\
    \ method on the resulting socket channel, passing it `remoteAddr`, and then returning\
    \ that channel. This method throws five different exceptions. It throws `AsynchronousCloseException`\
    \ when another thread closes this channel while the connect operation is in progress;\
    \ `ClosedByInterruptException` when another thread interrupts the current thread\
    \ while the connect operation is in progress, thereby closing the channel and\
    \ setting the current thread’s interrupt status; `java.nio.channels.UnresolvedAddressException`\
    \ when the given remote address isn’t fully resolved; `java.nio.channels.UnsupportedAddressTypeException`\
    \ when the type of the given remote address isn’t supported; and `IOException`\
    \ when some other I/O error occurs.\n- `Socket socket()`: Return the peer `Socket`\
    \ instance associated with this socket channel.\n- `boolean connect(SocketAddress\
    \ remoteAddr)`: Attempt to connect this socket channel’s socket object to the\
    \ remote address. If this channel is nonblocking, an invocation of this method\
    \ initiates a nonblocking connection operation. If the connection is established\
    \ immediately, as can happen with a local connection, this method returns `true`.\
    \ Otherwise, this method returns `false` and the connection operation must be\
    \ subsequently completed by repeatedly invoking the `finishConnect()` method until\
    \ this method returns `true`. This method throws `java.nio.channels.AlreadyConnectedException`\
    \ when this channel is already connected; `java.nio.channels.ConnectionPendingException`\
    \ when a nonblocking connection operation is already in progress on this channel;\
    \ `ClosedChannelException` when this channel is closed; `AsynchronousCloseException`\
    \ when another thread closes this channel while the connect operation is in progress;\
    \ `ClosedByInterruptException` when another thread interrupts the current thread\
    \ while the connect operation is in progress, thereby closing the channel and\
    \ setting the current thread’s interrupt status; `UnresolvedAddressException`\
    \ when the given remote address isn’t fully resolved; `UnsupportedAddressTypeException`\
    \ when the type of the given remote address isn’t supported; and `IOException`\
    \ when some other I/O error occurs.\n- `boolean isConnectionPending()`: Return\
    \ `true` when a connection operation is pending completion; otherwise, return\
    \ `false`.\n- `boolean finishConnect()`: Finish the process of connecting a socket\
    \ channel. This method returns `true` when the socket channel is fully connected;\
    \ otherwise, it returns `false`. This method throws `java.nio.channels.NoConnectionPendingException`\
    \ when this channel isn’t connected and a connection operation hasn’t been initiated;\
    \ `ClosedChannelException` when this channel is closed; `AsynchronousCloseException`\
    \ when another thread closes this channel while the connect operation is in progress;\
    \ `ClosedByInterruptException` when another thread interrupts the current thread\
    \ while the connect operation is in progress, thereby closing the channel and\
    \ setting the current thread’s interrupt status; and `IOException` when some other\
    \ I/O error occurs.\n- `boolean isConnected()`: Return `true` when this channel’s\
    \ socket is open and connected; otherwise, return `false`.\n\nA socket channel\
    \ behaves as a client in the TCP/IP stream protocol. You use socket channels to\
    \ initiate connections to listening servers.\n\nCreate a new socket channel by\
    \ calling either of the `open()` methods. Behind the scenes, a peer `Socket` object\
    \ is created. Invoke `SocketChannel`’s `socket()` method to return this peer object.\
    \ Also, you can return the original socket channel by invoking `getChannel()`\
    \ on the peer `Socket` object.\n\nA socket channel obtained from the noargument\
    \ `open()` method isn’t connected. Attempting to read from or write to this socket\
    \ channel results in `java.nio.channels.NotYetConnectedException`. To connect\
    \ the socket, call the `connect()` method on the socket channel or on its peer\
    \ socket.\n\nAfter a socket channel has been connected, it remains connected until\
    \ closed. To determine if a socket channel is connected, invoke `SocketChannel`’s\
    \ `boolean isConnected()` method.\n\nThe `open()` method that takes a `java.net.InetSocketAddress`\
    \ argument also lets you connect to another host at the specified remote address,\
    \ as follows:\n\n`SocketChannel sc = SocketChannel.open(new InetSocketAddress(\"\
    localhost\", 9999));`\n\nThis convenience method is equivalent to invoking the\
    \ following code sequence:\n\n`SocketChannel sc = SocketChannel.open();`\n\n`sc.connect(new\
    \ InetSocketAddress(\"localhost\", 9999));`\n\nWhen connecting to a server via\
    \ the peer `Socket` object or via `SocketChannel`’s `connect()`/second `open()`\
    \ method on a blocking socket channel, the thread that invokes `connect()` blocks\
    \ until the socket channel is connected. However, when the socket channel isn’t\
    \ blocking, `connect()` returns immediately, typically with `false` to indicate\
    \ that the connection hasn’t been made (although it might return `true` for a\
    \ local loopback connection). Because a connection must be established before\
    \ you can perform I/O on the socket channel, you need to repeatedly invoke `finishConnect()`\
    \ until this method returns `true`.\n\nListing 7-8 presents a `ChannelClient`\
    \ application that demonstrates `SocketChannel`.\n\n**Listing 7-8.** Demonstrating\
    \ `SocketChannel`\n\n```\nimport java.io.IOException;\nimport java.net.InetSocketAddress;\n\
    import java.nio.ByteBuffer;\nimport java.nio.channels.SocketChannel;\n\npublic\
    \ class ChannelClient\n{\n   public static void main(String[] args)\n   {\n  \
    \    try\n      {\n         SocketChannel sc = SocketChannel.open();\n       \
    \  sc.configureBlocking(false);\n         InetSocketAddress addr = new InetSocketAddress(\"\
    localhost\", 9999);\n         sc.connect(addr);\n         while (!sc.finishConnect())\n\
    \            System.out.println(\"waiting to finish connection\");\n         ByteBuffer\
    \ buffer = ByteBuffer.allocate(200);\n         while (sc.read(buffer) >= 0)\n\
    \         {\n            buffer.flip();\n            while (buffer.hasRemaining())\n\
    \               System.out.print((char) buffer.get());\n            buffer.clear();\n\
    \         }\n         sc.close();\n      }\n      catch (IOException ioe)\n  \
    \    {\n         System.err.println(\"I/O error: \" + ioe.getMessage());\n   \
    \   }\n   }\n}\n```\n\nListing 7-8’s `main()` method first obtains a socket channel\
    \ and configures it to be nonblocking. It then creates an address to the previous\
    \ channel server application and initiates a connection to this address. Because\
    \ of the nonblocking status, it’s necessary to repeatedly invoke `finishConnect()`\
    \ until this method returns `true`, which indicates a connection to the remote\
    \ server application.\n\n`main()` subsequently creates a byte buffer and enters\
    \ a loop that repeatedly reads content into this buffer and outputs this content\
    \ to the standard output stream. The channel is then closed.\n\nCompile Listing\
    \ 7-8 as follows:\n\n`javac ChannelClient.java`\n\nAssuming that the channel server\
    \ is running, execute the following command line to start the client:\n\n`java\
    \ ChannelClient`\n\nYou should observe a message similar to the following on the\
    \ channel server output stream:\n\n`Received connection from /127.0.0.1:51177`\n\
    \nYou should also observe the following message on the channel client output stream:\n\
    \n`Local address: /0:0:0:0:0:0:0:0:9999`"
