- fmt: '# Channel-Based Multicasting


    JDK 7 introduced support for channel-based IP multicasting, which is the transmission
    of IP datagrams to members of a group (zero or more hosts identified by a single
    destination address). Multicasting is the Internet version of broadcasting in
    which a television or radio signal is broadcast from a source, and is available
    to everyone in the signal area with a suitable and active receiving device.


    A group is identified by a class D IP address, which is a multicast group IPv4
    address that ranges from `224.0.0.1` through `239.255.255.255`. A new receiver
    (client) joins a multicast group by connecting to the group via the group’s IP
    address. The receiver then listens for incoming datagrams.


    JDK 7 introduced the `java.nio.channels.MulticastChannel` interface to support
    multicasting. `MulticastChannel` extends `NetworkChannel` and is implemented by
    the `DatagramChannel` class. It declares a pair of `join()` methods for joining
    a group and a `close()` method for closing the channel.


    A receiver calls the `MembershipKey.join(InetAddress group, NetworkInterface ni)`
    method to join a multicast group to begin receiving all datagrams sent to the
    group. It’s called with the group’s IP address and the network interface on which
    to join the group as its arguments. When this method succeeds, it returns a `java.nio.channels.MembershipKey`
    instance that serves as a token representing membership in the group.


    **Note**


    A network interface is described by an instance of the `java.net.NetworkInterface`
    class. To obtain a `NetworkInterface` instance, call various `NetworkInterface`
    class methods, such as `NetworkInterface.getByInetAddress(InetAddress addr)`.


    Alternatively, a receiver can call the `MembershipKey.join(InetAddress group,
    NetworkInterface ni, InetAddress source)` method to join a multicast group and
    receive datagrams from a specific source address. Because membership is cumulative,
    this method can be reinvoked with the same group and network interface to allow
    reception of datagrams sent by other source addresses to the group.


    **Note**


    The first `join()` method is analogous to a cable television provider that requires
    you to subscribe to packages of channels, including those channels that are not
    of interest. The second `join()` method is analogous to a cable television provider
    that lets you subscribe to specific channels of interest.


    The second `join()` method demonstrates source filtering in which you can filter
    datagrams based on their sources. You would call this method to receive datagrams
    from specific IP sources. This form of source filtering is known as include-mode
    filtering.


    `MembershipKey` declares several methods:


    - `MembershipKey.block(InetAddress source)`: Block multicast datagrams from the
    given `source` address when this membership key is not source-specific and the
    operating system supports source filtering.

    - `MulticastChannel.channel()`: Return the channel for which this membership key
    was created.

    - `void drop()`: Drop membership.

    - `InetAddress.group()`: Return the multicast group for which this membership
    key was created.

    - `boolean isValid()`: Return whether this membership is valid (`true`) or not
    (`false`).

    - `NetworkInterface.networkInterface()`: Return the network interface for which
    this membership key was created.

    - `InetAddress.sourceAddress()`: Return the source address when this membership
    key is source-specific; return `null` when this membership is not source-specific.

    - `MembershipKey.unblock(InetAddress source)`: Unblock multicast datagrams from
    the given `source` address that was previously blocked via `block()`.


    You can use `MembershipKey`’s `block()` method to perform a second form of source
    filtering in which a group is joined to receive all multicast datagrams except
    those from specific IP source addresses. This form of source filtering, which
    is known as exclude-mode filtering, is demonstrated here:


    ```

    MembershipKey key = dc.join(group, nif).block(source1).block(source2);

    ```


    Once a channel has joined a group, it receives multicast datagrams in the same
    manner as unicast datagrams. When finished with the group, it drops its membership
    by calling `MembershipKey`’s `drop()` method. It calls `MulticastChannel`’s `close()`
    method after dropping all group memberships.


    To create a multicast server or multicast client, there are three important items
    to keep in mind:'
  raw: '## Channel-Based Multicasting


    JDK 7 introduced support for channel-based IP multicasting, which is the transmission
    of IP datagrams to members of a group (zero or more hosts identified by a single
    destination address). Multicasting is the Internet version of broadcasting in
    which a television or radio signal is broadcast from a source, and is available
    to everyone in the signal area with a suitable and active receiving device.


    A group is identified by a class D IP address, which is a multicast group IPv4
    address that ranges from 224.0.0.1 through 239.255.255.255\. A new receiver (client)
    joins a multicast group by connecting to the group via the group’s IP address.
    The receiver then listens for incoming datagrams.


    JDK 7 introduced the `java.nio.channels.MulticastChannel` interface to support
    multicasting. `MulticastChannel` extends `NetworkChannel` and is implemented by
    the `DatagramChannel` class. It declares a pair of `join()` methods for joining
    a group and a `close()` method for closing the channel.


    A receiver calls the [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `join(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `group,` [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `ni)` method to join a multicast group to begin receiving all datagrams sent to
    the group. It’s called with the group’s IP address and the network interface on
    which to join the group as its arguments. When this method succeeds, it returns
    a `java.nio.channels.MembershipKey` instance that serves as a token representing
    membership in the group.


    Note


    A network interface is described by an instance of the `java.net.NetworkInterface`
    class. To obtain a `NetworkInterface` instance, call various `NetworkInterface`
    class methods, such as [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `getByInetAddress(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `addr)`.


    Alternatively, a receiver can call the [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `join(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `group,` [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `ni,` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `source)` method to join a multicast group and receive datagrams from a specific
    source address. Because membership is cumulative, this method can be reinvoked
    with the same group and network interface to allow reception of datagrams sent
    by other source addresses to the group.


    Note


    The first `join()` methodis analogous to a cable television provider that requires
    you to subscribe to packages of channels, including those channels that are not
    of interest. The second `join()` methodis analogous to a cable television provider
    that lets you subscribe to specific channels of interest.


    The second `join()` methoddemonstrates source filtering in which you can filter
    datagrams based on their sources. You would call this method to receive datagrams
    from specific IP sources. This form of source filtering is known as include-mode
    filtering.


    `MembershipKey` declares several methods:


    *   [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `block(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `source)`: Block multicast datagrams from the given `source` address when this
    membership key is not source-specific and the operating system supports source
    filtering.

    *   [`MulticastChannel`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MulticastChannel.html#interface%20in%20java.nio.channels)
    `channel()`: Return the channel for which this membership key was created.

    *   `void drop()`: Drop membership.

    *   [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `group()`: Return the multicast group for which this membership key was created.

    *   `boolean isValid()`: Return whether this membership is valid (`true`) or not
    (`false`).

    *   [`NetworkInterface`](https://docs.oracle.com/javase/8/docs/api/java/net/NetworkInterface.html#class%20in%20java.net)
    `networkInterface()`: Return the network interface for which this membership key
    was created.

    *   [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `sourceAddress()`: Return the source address when this membership key is source-specific;
    return `null` when this membership is not source-specific.

    *   [`MembershipKey`](https://docs.oracle.com/javase/8/docs/api/java/nio/channels/MembershipKey.html#class%20in%20java.nio.channels)
    `unblock(` [`InetAddress`](https://docs.oracle.com/javase/8/docs/api/java/net/InetAddress.html#class%20in%20java.net)
    `source)`: Unblock multicast datagrams from the given `source` address that was
    previously blocked via `block()`.


    You can use `MembershipKey`’s `block()` methodto perform a second form of source
    filtering in which a group is joined to receive all multicast datagrams except
    those from specific IP source addresses. This form of source filtering, which
    is known as exclude-mode filtering, is demonstrated here:


    `MembershipKey key = dc.join(group, nif).block(source1).block(source2);`


    Once a channel has joined a group, it receives multicast datagrams in the same
    manner as unicast datagrams. When finished with the group, it drops its membership
    by calling `MembershipKey`’s `drop()` method. It calls `MulticastChannel`’s `close()`
    method after dropping all group memberships.


