    options identified by `StandardSocketOptions` constants. For example, `ServerSocketChannel`
    supports only `SO_RCVBUF` and `SO_REUSEADDR`. Each class’s Java documentation
    identifies its supported constants. When in doubt, call `supportedOptions()` to
    find out what options are supported.


