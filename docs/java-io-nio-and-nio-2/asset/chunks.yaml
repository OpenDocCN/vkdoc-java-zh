    #### 理解非阻塞模式


    Java 套接字类创建的套接字其阻塞特性是面向网络的 Java 应用程序可扩展性的严重限制。例如，`ServerSocket` 类的 `Socket accept()`
    方法会阻塞，直到有传入连接到达，此时它会创建并返回一个 `Socket` 实例，让服务器能与客户端通信。如果此方法不阻塞，可扩展性将会提高，因为服务器可以完成其他有用的工作，而无需等待。


    抽象的 `SelectableChannel` 类是 `ServerSocketChannel`、`SocketChannel` 和 `DatagramChannel`
    类的共同祖先。除了让套接字通道能在选择器上下文中工作（我在第 8 章中讨论了选择器），`SelectableChannel` 还允许套接字通道选择阻塞或以非阻塞模式运行。在非阻塞模式下，线程可以在没有输入可用或输出缓冲区已满时检查输入或发送输出而不会阻塞。


    注意


    `SelectableChannel` 将选择器相关的功能与非阻塞模式合并，因为非阻塞模式在与基于选择器的多路复用结合时最为有用。


    `SelectableChannel` 提供了以下方法来启用阻塞或非阻塞、判断通道是阻塞还是非阻塞，以及获取阻塞锁：


    *   `SelectableChannel configureBlocking(boolean block)`：指定调用该方法的可选择通道的阻塞状态。传入
    `true` 使通道阻塞，传入 `false` 使通道非阻塞。该方法返回该可选择通道，或在发生异常时抛出异常：当通道关闭时抛出 `ClosedChannelException`，当
    `block` 为 `true` 且通道已注册到一个或多个选择器时抛出 `java.net.channels.IllegalBlockingModeException`，当发生
    I/O 错误时抛出 `IOException`。

    *   `boolean isBlocking()`：当调用该方法的可选择通道处于阻塞状态时，此方法返回 `true`；否则返回 `false`。新创建的通道默认为阻塞状态。

    *   `Object blockingLock()`：返回 `configureBlocking()` 方法同步时使用的对象。该返回对象在实现适配器时很有用，这些适配器要求在短时间内当前阻塞模式值不发生变化。


    设置或重置可选择通道的阻塞/非阻塞状态非常简单。要启用非阻塞，向 `configureBlocking()` 的调用传入 `false`，如下例所示：


    `ServerSocketChannel ssc = ServerSocketChannel.open();`


    `ssc.configureBlocking(false); // 启用非阻塞模式`


    尽管非阻塞套接字通常用于面向服务器的应用程序，但它们在客户端也很有益。例如，基于 GUI 的应用程序可以利用非阻塞套接字，在与多个服务器应用程序同时通信时保持用户界面的响应性。


    `blockingLock()` 方法允许你阻止其他线程更改套接字通道的阻塞/非阻塞状态。此方法返回通道实现用于在更改此状态时进行同步的对象。只有持有此对象锁的线程才能更改状态，并且通常通过使用
    Java 的 `synchronized` 关键字来获取该锁。请考虑以下示例：


    `ServerSocketChannel ssc = ServerSocketChannel.open();`


    `SocketChannel sc = null;`


    `Object lock = ssc.blockingLock();`


    `// 线程在获取与 lock 对象关联的锁时可能会阻塞。`


    `synchronized(lock)`


    `{`


    `// 当前线程拥有该锁。没有其他线程可以更改阻塞模式。`


    `// 获取服务器套接字通道的当前阻塞模式。`


    `boolean blocking = ssc.isBlocking();`


    `// 将服务器套接字通道设置为非阻塞。`


    `ssc.configureBlocking(false);`


    `// 获取下一个连接，如果没有连接则为 null。`


    `sc = ssc.accept();`


    `// 恢复先前的阻塞模式。`


    `ssc.configureBlocking(blocking);`


    `}`


    `// 锁被释放，其他线程可能会修改服务器套接字通道的阻塞模式。`


    `if (sc != null)`


    `communicateWithSocket(sc);`

