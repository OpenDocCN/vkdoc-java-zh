    \n注意\n\n由于每个接口的`accept()`方法完成相同的任务，您可能想知道该使用哪个接口。如果您更喜欢将路径分解为其目录和名称组件，请使用`FilenameFilter`。但是，如果您更喜欢完整路径，请使用`FileFilter`；您始终可以调用`getParent()`和`getName()`来获取这些组件。\n\
    \n## 创建/修改文件和目录\n\n`File`还声明了几个用于创建新文件和目录以及修改现有文件和目录的方法。表[2-4](#A978-1-4842-1565-4_2_Chapter.html#Tab4)描述了这些方法。\n\
    \n表 2-4. `File`用于创建新文件和操作现有文件及目录的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `boolean\
    \ createNewFile()` | 当且仅当此`File`对象的抽象路径命名的文件尚不存在时，原子性地创建一个新的空文件。检查文件是否存在以及当文件不存在时创建文件是一个单一操作，该操作相对于可能影响文件的所有其他文件系统活动是原子性的。当指定的文件不存在且成功创建时，此方法返回`true`；当指定的文件已存在时，返回`false`。当发生I/O错误时，它抛出`IOException`。\
    \ |\n| `static File createTempFile(String prefix, String suffix)` | 使用给定的`prefix`和`suffix`在默认临时文件目录中创建一个空文件以生成其名称。此重载的类方法调用其三参数变体，将`prefix`、`suffix`和`null`传递给此其他方法，并返回其他方法的返回值。\
    \ |\n| `static File createTempFile(String prefix, String suffix, File directory)`\
    \ | 使用给定的`prefix`和`suffix`在指定的`directory`中创建一个空文件以生成其名称。名称以`prefix`指定的字符序列开头，以`suffix`指定的字符序列结尾；当`suffix`为`null`时，使用“`.tmp`”作为后缀。此方法在成功时返回所创建文件的路径。当`prefix`包含少于三个字符时，它抛出`java.lang.IllegalArgumentException`；当无法创建文件时，抛出`IOException`。\
    \ |\n| `boolean delete()` | 删除此`File`对象路径所表示的文件或目录。成功时返回`true`；否则返回`false`。如果路径表示一个目录，则该目录必须为空才能被删除。\
    \ |\n| `void deleteOnExit()` | 请求在JVM终止时删除此`File`对象抽象路径所表示的文件或目录。对同一`File`对象重新调用此方法无效。一旦请求删除，就无法取消该请求。因此，应谨慎使用此方法。\
    \ |\n| `boolean mkdir()` | 创建此`File`对象抽象路径命名的目录。成功时返回`true`；否则返回`false`。 |\n|\
    \ `boolean mkdirs()` | 创建此`File`对象抽象路径命名的目录以及任何必要的中间目录。成功时返回`true`；否则返回`false`。\
    \ |\n| `boolean renameTo(File dest)` | 将此`File`对象抽象路径所表示的文件重命名为`dest`。成功时返回`true`；否则返回`false`。当`dest`为`null`时，此方法抛出`NullPointerException`。此方法行为的许多方面依赖于操作系统。例如，`rename`操作可能无法将文件从一个文件系统移动到另一个文件系统，该操作可能不是原子性的，或者当目标路径的文件已存在时可能不会成功。应始终检查返回值以确保`rename`操作成功。\
    \ |\n| `boolean setLastModified(long time)` | 设置此`File`对象抽象路径所表示的文件或目录的最后修改时间。成功时返回`true`；否则返回`false`。当`time`为负数时，此方法抛出`IllegalArgumentException`。所有操作系统都支持精确到秒的文件修改时间，但有些提供更高的精度。`time`值将被截断以适配支持的精度。如果操作成功且之后没有对文件进行干预操作，则下一次调用`lastModified()`将返回传递给此方法的（可能被截断的）`time`值。\
