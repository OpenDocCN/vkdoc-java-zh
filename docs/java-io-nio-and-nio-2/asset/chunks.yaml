  raw: 'The overloaded `listFiles()` methods return arrays of `File`s. For the most
    part, they’re symmetrical with their `list()` counterparts. However, `listFiles(FileFilter)`
    introduces an asymmetry.


    The `java.io.FileFilter` interface declares a single `boolean accept(String path)`
    method that is called for each file/directory located in the directory identified
    by the `File` object’s path. The argument passed to `path` identifies the complete
    path of the file or directory.


    The `accept()` method uses this argument to determine whether or not the file
    or directory satisfies its criteria for what is acceptable. It returns true when
    the file/directory name should be included in the returned array; otherwise, this
    method returns false.


    Note


    Because each interface’s `accept()` method accomplishes the same task, you might
    be wondering which interface to use. If you prefer a path broken into its directory
    and name components, use `FilenameFilter`. However, if you prefer a complete path,
    use `FileFilter`; you can always call `getParent()` and `getName()` to get these
    components.


    ## Creating/Modifying Files and Directories


    `File` also declares several methods for creating new files and directories and
    modifying existing files and directories. Table [2-4](#A978-1-4842-1565-4_2_Chapter.html#Tab4)
    describes these methods.


    Table 2-4.


    `File` Methods for Creating New and Manipulating Existing Files and Directories


    | Method | Description |

    | --- | --- |

    | `boolean createNewFile()` | Atomically create a new, empty file named by this
    `File` object’s abstract path if and only if a file with this name doesn’t yet
    exist. The check for file existence and the creation of the file when it doesn’t
    exist are a single operation that’s atomic with respect to all other file system
    activities that might affect the file. This method returns true when the named
    file doesn’t exist and was successfully created, and returns false when the named
    file already exists. It throws `IOException` when an I/O error occurs. |

    | `static File createTempFile(String prefix, String suffix)` | Create an empty
    file in the default temporary file directory using the given `prefix` and `suffix`
    to generate its name. This overloaded class method calls its three-parameter variant,
    passing `prefix`, `suffix`, and `null` to this other method, and returning the
    other method’s return value. |

    | `static File createTempFile(String prefix, String suffix, File directory)` |
    Create an empty file in the specified `directory` using the given `prefix` and
    `suffix` to generate its name. The name begins with the character sequence specified
    by `prefix` and ends with the character sequence specified by `suffix`; “`.tmp`”
    is used as the suffix when `suffix` is `null`. This method returns the created
    file’s path when successful. It throws `java.lang.IllegalArgumentException` when
    `prefix` contains fewer than three characters and `IOException` when the file
    can’t be created. |

    | `boolean delete()` | Delete the file or directory denoted by this `File` object’s
    path. Return true when successful; otherwise, return false. If the path denotes
    a directory, the directory must be empty in order to be deleted. |

    | `void deleteOnExit()` | Request that the file or directory denoted by this `File`
    object’s abstract path be deleted when the JVM terminates. Reinvoking this method
    on the same `File` object has no effect. Once deletion has been requested, it’s
    not possible to cancel the request. Therefore, this method should be used with
    care. |

    | `boolean mkdir()` | Create the directory named by this `File` object’s abstract
    path. Return true when successful; otherwise, return false. |

    | `boolean mkdirs()` | Create the directory and any necessary intermediate directories
    named by this `File` object’s abstract path. Return true when successful; otherwise,
    return false. |

    | `boolean renameTo(` `File dest)` | Rename the file denoted by this `File` object’s
    abstract path to `dest`. Return true when successful; otherwise, return false.
    This method throws `NullPointerException` when `dest` is `null`. Many aspects
    of this method’s behavior are operating system-dependent. For example, the `rename`
    operation might not be able to move a file from one file system to another, the
    operation might not be atomic, or it might not succeed when a file with the destination
    path already exists. The return value should always be checked to make sure that
    the `rename` operation was successful. |

    | `boolean setLastModified(long time)` | Set the last-modified time of the file
    or directory named by this `File` object’s abstract path. Return true when successful;
    otherwise, return false. This method throws `IllegalArgumentException` when `time`
    is negative. All operating systems support file-modification times to the nearest
    second, but some provide more precision. The `time` value will be truncated to
    fit the supported precision. If the operation succeeds and no intervening operations
    on the file take place, the next call to `lastModified()` will return the (possibly
    truncated) `time` value passed to this method. |


    Suppose you’re designing a text editor application that a user will use to open
    a text file and make changes to its content. Until the user explicitly saves these
    changes to the file, you want the text file to remain unchanged.


    Because the user doesn’t want to lose these changes when the application crashes
    or the computer loses power, you design the application to save these changes
    to a temporary file every few minutes. This way, the user has a backup of the
    changes.


    You can use the overloaded `createTempFile()` methods to create the temporary
    file. If you don’t specify a directory in which to store this file, it’s created
    in the directory identified by the `java.io.tmpdir` system property.


    You probably want to remove the temporary file after the user tells the application
    to save or discard the changes. The `deleteOnExit()` method lets you register
    a temporary file for deletion; it’s deleted when the JVM ends without a crash/power
    loss.


    Listing [2-6](#A978-1-4842-1565-4_2_Chapter.html#FPar14) presents a `TempFileDemo`
    application for experimenting with the `createTempFile()` and `deleteOnExit()`
    methods.


    Listing 2-6\. Experimenting with Temporary Files


    `import java.io.File;`


    `import java.io.IOException;`


    `public class TempFileDemo`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `System.out.println(System.getProperty("java.io.tmpdir"));`


    `File temp = File.createTempFile("text", ".txt");`


    `System.out.println(temp);`


    `temp.deleteOnExit();`


    `}`


    `}`


    After outputting the location where temporary files are stored, `TempFileDemo`
    creates a temporary file whose name begins with `text` and which ends with the
    `.txt` extension. `TempFileDemo` next outputs the temporary file’s name and registers
    the temporary file for deletion upon the successful termination of the application.


    Compile Listing [2-6](#A978-1-4842-1565-4_2_Chapter.html#FPar14) as follows:


    `javac TempFileDemo.java`


    Run the resulting application as follows:


    `java TempFileDemo`


    I observed the following output during one run of `TempFileDemo` (and the file
    disappeared on exit):


    `C:\Users\Owner\AppData\Local\Temp\`


    `C:\Users\Owner\AppData\Local\Temp\text8621896953150462138.txt`'
