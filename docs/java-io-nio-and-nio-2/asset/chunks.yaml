- fmt: '# Sockets and Network Interfaces


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​16](http://dx.doi.org/10.1007/978-1-4842-1565-4_16))
    contains supplementary material, which is available to authorized users.


    [Chapter 7](#A978-1-4842-1565-4_7_Chapter.html) introduced the concept of a peer
    socket, which is a socket that is associated with a channel. [Chapter 14](#A978-1-4842-1565-4_14_Chapter.html)
    introduced the concept of a network interface. This appendix introduces sockets,
    network interfaces, and the APIs for interacting with these networking features.


    Note


    A network is a group of interconnected nodes (computing devices such as tablets,
    and peripherals such as scanners or laser printers) that can be shared among the
    network’s users. Networks often use TCP/IP ( [`http://en.wikipedia.org/wiki/TCP/IP_model`](http://en.wikipedia.org/wiki/TCP/IP_model)
    ) to communicate between nodes. TCP/IP includes Transmission Control Protocol
    (TCP), which is a connection-oriented protocol; User Datagram Protocol (UDP),
    which is a connectionless protocol; and Internet Protocol (IP), which is the basic
    protocol over which TCP and UDP perform their tasks.


    The `java.net` package provides types that support TCP/IP between processes (executing
    applications) running on hosts (computer-based TCP/IP nodes).


    ## Sockets


    Two processes communicate by way of sockets, which are endpoints in a communications
    link between these processes. Each endpoint is identified by an IP address that
    identifies the host and by a port number that identifies the process running on
    that host.


    IP ADDRESSES AND PORT NUMBERS


    An IP address is a 32-bit or 128-bit unsigned integer that uniquely identifies
    a network host or some other network node (a router, for example).


    It is common to specify a 32-bit IP address as four 8-bit integer components in
    a period-separated decimal notation, where each component is a decimal integer
    ranging from 0 through 255 and is separated from the next component via a period
    (such as `127.0.0.1`). A 32-bit IP address is often referred to as an Internet
    Protocol Version 4 (IPv4) address (see [`http://en.wikipedia.org/wiki/IPv4`](http://en.wikipedia.org/wiki/IPv4)
    ).


    It’s common to specify a 128-bit IP address as eight 16-bit integer components
    in colon-separated hexadecimal notation, where each component is a hexadecimal
    integer ranging from 0 through FFFF and is separated from the next component via
    a colon (such as `1080:0:0:0:8:800:200C:417A`). A 128-bit IP address is often
    referred to as an Internet Protocol Version 6 (IPv6) address (see [`http://en.wikipedia.org/wiki/IPv6`](http://en.wikipedia.org/wiki/IPv6)
    ).


    A port number is a 16-bit integer that uniquely identifies a process, which is
    the ultimate source or recipient of a message. Port numbers that are less than
    1024 are reserved for standard processes. For example, port number 25 has traditionally
    identified the Simple Mail Transfer Protocol (SMTP) process for sending email,
    although port number 587 has largely obsoleted this older port number (see [`http://en.wikipedia.org/wiki/Smtp`](http://en.wikipedia.org/wiki/Smtp)
    ).


    One process writes a message (a sequence of bytes) to its socket. The network
    management software portion of the underlying platform breaks the message into
    a sequence of packets (addressable message chunks that are often referred to as
    IP datagrams) and forwards them to the other process’s socket, where they are
    recombined into the original message for processing.


    Figure [B-1](#A978-1-4842-1565-4_16_Chapter.html#Fig1) shows how two sockets communicate
    in a TCP/IP context.


    ![A978-1-4842-1565-4_16_Fig1_HTML.jpg](A978-1-4842-1565-4_16_Fig1_HTML.jpg)


    Figure B-1.


    Two processes communicate via a pair of sockets


    In the context of Figure [B-1](#A978-1-4842-1565-4_16_Chapter.html#Fig1), suppose
    that Process A wants to send a message to Process B. Process A sends that message
    to its socket with the destination socket address of Process B. Host A’s network
    management software (often referred to as a protocol stack) obtains this message
    and reduces it to a sequence of packets, with each packet including the destination
    host’s IP address and port number. The network management software then sends
    these packets through Host A’s Network Interface Card (NIC) to Host B.


    Note


    The NIC’s various network interfaces are connections between a computer and a
    network.


    Host B’s protocol stack receives packets through the NIC and reassembles them
    into the original message (packets may be received out of order), which it then
    makes available to Process B via its socket. This scenario reverses when Process
    B communicates with Process A.


    The network management software uses TCP to create an ongoing conversation between
    two hosts in which messages are sent back and forth. Before this conversation
    occurs, a connection is established between these hosts. After the connection
    has been established, TCP enters a pattern where it sends message packets and
    waits for a reply that they arrived correctly (or for a timeout to expire when
    the reply doesn’t arrive because of some network problem). This pattern repeats
    and guarantees a reliable connection. For detailed information on this pattern,
    check out [`http://en.wikipedia.org/wiki/Tcp_receive_window#Flow_control`](https://en.wikipedia.org/wiki/Tcp_receive_window#Flow_control)
    .


    Because it can take time to establish a connection, and it also takes time to
    send packets (as it is necessary to receive reply acknowledgments and also because
    of timeouts), TCP is slow. On the other hand, UDP, which doesn’t require connections
    and packet acknowledgement, is much faster. The downside is that UDP isn’t as
    reliable (there’s no guarantee of packet delivery, ordering, or protection against
    duplicate packets, although UDP uses checksums to verify that data is correct)
    because there’s no acknowledgment. Furthermore, UDP is limited to single-packet
    conversations.


    The `java.net` package provides `Socket`, `ServerSocket`, and other `Socket`-suffixed
    classes for performing TCP-based or UDP-based communications. Before investigating
    these classes, you need to understand socket addresses and socket options.'
  raw: '# Sockets and Network Interfaces


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1565-4_​16](http://dx.doi.org/10.1007/978-1-4842-1565-4_16))
    contains supplementary material, which is available to authorized users.


    [Chapter 7](#A978-1-4842-1565-4_7_Chapter.html) introduced the concept of a peer
    socket, which is a socket that is associated with a channel. [Chapter 14](#A978-1-4842-1565-4_14_Chapter.html)
    introduced the concept of a network interface. This appendix introduces sockets,
    network interfaces, and the APIs for interacting with these networking features.


    Note


    A network is a group of interconnected nodes (computing devices such as tablets,
    and peripherals such as scanners or laser printers) that can be shared among the
    network’s users. Networks often use TCP/IP ( [`http://en.wikipedia.org/wiki/TCP/IP_model`](http://en.wikipedia.org/wiki/TCP/IP_model)
    ) to communicate between nodes. TCP/IP includes Transmission Control Protocol
    (TCP), which is a connection-oriented protocol; User Datagram Protocol (UDP),
    which is a connectionless protocol; and Internet Protocol (IP), which is the basic
    protocol over which TCP and UDP perform their tasks.


    The `java.net` package provides types that support TCP/IP between processes (executing
    applications) running on hosts (computer-based TCP/IP nodes).


    ## Sockets


    Two processes communicate by way of sockets, which are endpoints in a communications
    link between these processes. Each endpoint is identified by an IP address that
    identifies the host and by a port number that identifies the process running on
    that host.


    IP ADDRESSES AND PORT NUMBERS


    An IP address is a 32-bit or 128-bit unsigned integer that uniquely identifies
    a network host or some other network node (a router, for example).


    It is common to specify a 32-bit IP address as four 8-bit integer components in
    a period-separated decimal notation, where each component is a decimal integer
    ranging from 0 through 255 and is separated from the next component via a period
    (such as 127.0.0.1). A 32-bit IP address is often referred to as an Internet Protocol
    Version 4 (IPv4) address (see [`http://en.wikipedia.org/wiki/IPv4`](http://en.wikipedia.org/wiki/IPv4)
    ).


    It’s common to specify a 128-bit IP address as eight 16-bit integer components
    in colon-separated hexadecimal notation, where each component is a hexadecimal
    integer ranging from 0 through FFFF and is separated from the next component via
    a colon (such as 1080:0:0:0:8:800:200C:417A). A 128-bit IP address is often referred
    to as an Internet Protocol Version 6 (IPv6) address (see [`http://en.wikipedia.org/wiki/IPv6`](http://en.wikipedia.org/wiki/IPv6)
    ).


    A port number is a 16-bit integer that uniquely identifies a process, which is
    the ultimate source or recipient of a message. Port numbers that are less than
    1024 are reserved for standard processes. For example, port number 25 has traditionally
    identified the Simple Mail Transfer Protocol (SMTP) process for sending email,
    although port number 587 has largely obsoleted this older port number (see [`http://en.wikipedia.org/wiki/Smtp`](http://en.wikipedia.org/wiki/Smtp)
    ).


    One process writes a message (a sequence of bytes) to its socket. The network
    management software portion of the underlying platform breaks the message into
    a sequence of packets (addressable message chunks that are often referred to as
    IP datagrams) and forwards them to the other process’s socket, where they are
    recombined into the original message for processing.


    Figure [B-1](#A978-1-4842-1565-4_16_Chapter.html#Fig1) shows how two sockets communicate
    in a TCP/IP context.


    ![A978-1-4842-1565-4_16_Fig1_HTML.jpg](A978-1-4842-1565-4_16_Fig1_HTML.jpg)


    Figure B-1.


    Two processes communicate via a pair of sockets


    In the context of Figure [B-1](#A978-1-4842-1565-4_16_Chapter.html#Fig1), suppose
    that Process A wants to send a message to Process B. Process A sends that message
    to its socket with the destination socket address of Process B. Host A’s network
    management software (often referred to as a protocol stack) obtains this message
    and reduces it to a sequence of packets, with each packet including the destination
    host’s IP address and port number. The network management software then sends
    these packets through Host A’s Network Interface Card (NIC) to Host B.


    Note


    The NIC’s various network interfaces are connections between a computer and a
    network.


    Host B’s protocol stack receives packets through the NIC and reassembles them
    into the original message (packets may be received out of order), which it then
    makes available to Process B via its socket. This scenario reverses when Process
    B communicates with Process A.


    The network management software uses TCP to create an ongoing conversation between
    two hosts in which messages are sent back and forth. Before this conversation
    occurs, a connection is established between these hosts. After the connection
    has been established, TCP enters a pattern where it sends message packets and
    waits for a reply that they arrived correctly (or for a timeout to expire when
    the reply doesn’t arrive because of some network problem). This pattern repeats
    and guarantees a reliable connection. For detailed information on this pattern,
    check out [`http://en.wikipedia.org/wiki/Tcp_receive_window#Flow_control`](https://en.wikipedia.org/wiki/Tcp_receive_window#Flow_control)
    .


    Because it can take time to establish a connection, and it also takes time to
    send packets (as it is necessary to receive reply acknowledgments and also because
    of timeouts), TCP is slow. On the other hand, UDP, which doesn’t require connections
    and packet acknowledgement, is much faster. The downside is that UDP isn’t as
    reliable (there’s no guarantee of packet delivery, ordering, or protection against
    duplicate packets, although UDP uses checksums to verify that data is correct)
    because there’s no acknowledgment. Furthermore, UDP is limited to single-packet
    conversations.


    The `java.net` package provides `Socket`, `ServerSocket`, and other `Socket`-suffixed
    classes for performing TCP-based or UDP-based communications. Before investigating
    these classes, you need to understand socket addresses and socket options.'
  trans: '

    # 套接字与网络接口


    电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-1565-4_​16](http://dx.doi.org/10.1007/978-1-4842-1565-4_16)）包含补充材料，仅供授权用户使用。


    第 7 章介绍了对等套接字的概念，即与通道关联的套接字。第 14 章介绍了网络接口的概念。本附录将介绍套接字、网络接口以及用于与这些网络功能交互的 API。


    注意


    网络是由相互连接的节点（如平板电脑等计算设备，以及扫描仪或激光打印机等外围设备）组成的群体，可供网络用户共享。网络通常使用 TCP/IP（[`http://en.wikipedia.org/wiki/TCP/IP_model`](http://en.wikipedia.org/wiki/TCP/IP_model)）在节点之间进行通信。TCP/IP
    包括传输控制协议（TCP，一种面向连接的协议）、用户数据报协议（UDP，一种无连接协议）以及互联网协议（IP，TCP 和 UDP 执行任务所依赖的基础协议）。


    `java.net`包提供了多种类型，用于支持运行在主机（基于计算机的 TCP/IP 节点）上的进程（正在执行的应用程序）之间的 TCP/IP 通信。


    ## 套接字


    两个进程通过套接字进行通信，套接字是这些进程之间通信链路的端点。每个端点由一个标识主机的 IP 地址和一个标识该主机上运行进程的端口号来标识。


    IP 地址与端口号


    IP 地址是一个 32 位或 128 位的无符号整数，用于唯一标识网络主机或其他网络节点（例如路由器）。


    通常，32 位 IP 地址采用点分十进制表示法，表示为四个 8 位整数分量，每个分量是 0 到 255 之间的十进制整数，并通过句点与下一个分量分隔（例如
    127.0.0.1）。32 位 IP 地址通常被称为互联网协议版本 4（IPv4）地址（参见[`http://en.wikipedia.org/wiki/IPv4`](http://en.wikipedia.org/wiki/IPv4)）。


    通常，128 位 IP 地址采用冒分十六进制表示法，表示为八个 16 位整数分量，每个分量是 0 到 FFFF 之间的十六进制整数，并通过冒号与下一个分量分隔（例如
    1080:0:0:0:8:800:200C:417A）。128 位 IP 地址通常被称为互联网协议版本 6（IPv6）地址（参见[`http://en.wikipedia.org/wiki/IPv6`](http://en.wikipedia.org/wiki/IPv6)）。


    端口号是一个 16 位整数，用于唯一标识一个进程，该进程是消息的最终来源或接收方。小于 1024 的端口号保留给标准进程。例如，端口号 25 传统上用于标识发送电子邮件的简单邮件传输协议（SMTP）进程，尽管端口号
    587 在很大程度上已取代了这个较旧的端口号（参见[`http://en.wikipedia.org/wiki/Smtp`](http://en.wikipedia.org/wiki/Smtp)）。


    一个进程将消息（一个字节序列）写入其套接字。底层平台的网络管理软件部分将消息分解为一系列数据包（可寻址的消息块，通常称为 IP 数据报），并将它们转发到另一个进程的套接字，在那里它们被重新组合成原始消息以供处理。


    图 B-1 展示了两个套接字在 TCP/IP 上下文中如何通信。


    ![A978-1-4842-1565-4_16_Fig1_HTML.jpg](img/A978-1-4842-1565-4_16_Fig1_HTML.jpg)


    图 B-1.


    两个进程通过一对套接字进行通信


    在图 B-1 的上下文中，假设进程 A 想要向进程 B 发送一条消息。进程 A 将该消息发送到其套接字，并附带进程 B 的目标套接字地址。主机 A 的网络管理软件（通常称为协议栈）获取此消息，并将其缩减为一系列数据包，每个数据包包含目标主机的
    IP 地址和端口号。然后，网络管理软件通过主机 A 的网络接口卡（NIC）将这些数据包发送到主机 B。


    注意


    NIC 的各种网络接口是计算机与网络之间的连接。


    主机 B 的协议栈通过 NIC 接收数据包，并将它们重新组装成原始消息（数据包可能乱序到达），然后通过其套接字将其提供给进程 B。当进程 B 与进程 A 通信时，此场景反转。


    网络管理软件使用 TCP 在两个主机之间创建持续的对话，在此过程中来回发送消息。在此对话发生之前，需要在这两个主机之间建立连接。连接建立后，TCP 进入一种模式：发送消息数据包，并等待它们正确到达的回复（或者由于某些网络问题未收到回复时等待超时到期）。此模式重复进行，保证了可靠的连接。有关此模式的详细信息，请查看[`http://en.wikipedia.org/wiki/Tcp_receive_window#Flow_control`](https://en.wikipedia.org/wiki/Tcp_receive_window#Flow_control)。


    由于建立连接需要时间，发送数据包也需要时间（因为需要接收回复确认，并且还存在超时），因此 TCP 速度较慢。另一方面，UDP 不需要连接和数据包确认，因此速度要快得多。缺点是
    UDP 不那么可靠（无法保证数据包送达、顺序或防止重复数据包，尽管 UDP 使用校验和来验证数据是否正确），因为没有确认机制。此外，UDP 仅限于单数据包对话。


    `java.net`包提供了`Socket`、`ServerSocket`以及其他以`Socket`结尾的类，用于执行基于 TCP 或 UDP 的通信。在研究这些类之前，您需要了解套接字地址和套接字选项。

    '
- fmt: '### Socket Addresses


    An instance of a `Socket`-suffixed class is associated with a socket address comprised
    of an IP address and a port number. These classes often rely on the `InetAddress`
    class to represent the IPv4 or IPv6 address portion of the socket address; the
    port number is represented separately.


    **Note:** `InetAddress` relies on its `Inet4Address` subclass to represent an
    IPv4 address and on its `Inet6Address` subclass to represent an IPv6 address.


    `InetAddress` declares several class methods for obtaining an `InetAddress` instance.
    These methods include the following:


    - `InetAddress[] getAllByName(String host)` returns an array of `InetAddress`es
    that store the IP addresses associated with `host`. You can pass either a domain
    name (such as “`tutortutor.ca`”) or an IP address (such as “`70.33.247.10`”) argument
    to this parameter. (To learn about domain names, check out Wikipedia’s “Domain
    name” entry [http://en.wikipedia.org/wiki/Domain_name](http://en.wikipedia.org/wiki/Domain_name).)
    Pass `null` to obtain an `InetAddress` instance that stores the IP address of
    the loopback interface (a software-based network interface where outgoing data
    loops back as incoming data). This method throws `UnknownHostException` when no
    IP address for the specified `host` can be found, or when a scope identifier is
    specified for a global IPv6 address.

    - `InetAddress getByAddress(byte[] addr)` returns an `InetAddress` object for
    the given raw IP address. The argument passed to `addr` is in network byte order
    (most significant byte comes first) where the highest order byte is stored in
    `addr[0]`. The `addr` array’s length must be 4 bytes for an IPv4 address and 16
    bytes for an IPv6 address. This method throws `UnknownHostException` when the
    array has another length.

    - `InetAddress getByAddress(String hostName, byte[] ipAddress)` returns an `InetAddress`
    instance based on the hostname and IP address arguments. This method throws `UnknownHostException`
    when the array’s length is neither 4 nor 16.

    - `InetAddress getByName(String host)` returns an `InetAddress` instance based
    on the `host` argument, which can be a machine name (such as “`tutortutor.ca`”)
    or a textual representation of its IP address. Passing `null` to `host` results
    in an `InetAddress` instance representing an address of the loopback interface
    being returned.

    - `InetAddress getLocalHost()` returns the address of the local host (the current
    host), which is represented by hostname `localhost` or by an IP address that’s
    commonly expressed as `127.0.0.1` (IPv4) or `::1` (IPv6). This method throws `UnknownHostException`
    when the local host couldn’t be resolved into an address.


    After you obtain an `InetAddress` object, you can interrogate it by invoking instance
    methods such as `byte[] getAddress()`, which returns the raw IP address (in network
    byte order) of this `InetAddress` object, and `boolean isLoopbackAddress()`, which
    determines whether or not this `InetAddress` object represents a loopback address.


    Java 1.4 introduced the abstract `SocketAddress` class to represent a socket address
    “with no protocol attachment.” (This class’s creator might have anticipated that
    Java would eventually support low-level communication protocols other than the
    widely popular Internet Protocol.)


    `SocketAddress` is subclassed by the concrete `InetSocketAddress` class, which
    represents a socket address as an IP address and a port number. It can also represent
    a hostname and a port number and will make an attempt to resolve the hostname.


    `InetSocketAddress` instances are created by invoking `InetSocketAddress(InetAddress
    addr, int port)` and other constructors. After an instance has been created, you
    can call methods such as `InetAddress getAddress()` and `int getPort()` to return
    socket address components.


    ### Socket Options


    An instance of a `Socket`-suffixed class shares the concept of socket options,
    which are parameters for configuring socket behavior. Socket options are described
    by constants that are declared in the `SocketOptions` interface:


    - `IP_MULTICAST_IF`: Specify the outgoing network interface for multicast packets
    (on multihomed [multiple NIC] hosts).

    - `IP_MULTICAST_IF2`: Specify the outgoing network interface for multicast packets
    using an interface index.

    - `IP_MULTICAST_LOOP`: Enable or disable local loopback of multicast datagrams.

    - `IP_TOS`: Set the type-of-service (IPv4) or traffic class (IPv6) field in the
    IP header for a TCP or UDP socket.

    - `SO_BINDADDR`: Fetch the socket’s local address binding.

    - `SO_BROADCAST`: Enable a socket to send broadcast messages.

    - `SO_KEEPALIVE`: Turn on the socket’s keepalive setting.

    - `SO_LINGER`: Specify the number of seconds to wait when closing a socket when
    there is still some buffered data to be sent.

    - `SO_OOBINLINE`: Enable inline reception of TCP urgent data.

    - `SO_RCVBUF`: Set or get the maximum socket receive buffer size (in bytes).

    - `SO_REUSEADDR`: Enable a socket’s reuse address.

    - `SO_SNDBUF`: Set or get the maximum socket send buffer size (in bytes).

    - `SO_TIMEOUT`: Specify a timeout (in milliseconds) on blocking accept or read/receive
    (but not write/send) socket operations. (Don’t block forever!)

    - `TCP_NODELAY`: Disable Nagle’s algorithm (`http://en.wikipedia.org/wiki/Nagle’s_algorithm`).
    Written data to the network is not buffered, pending acknowledgement of previously
    written data.


    `SocketOptions` also declares the following methods for setting and getting these
    options:


    - `void setOption(int optID, Object value)`

    - `Object getOption(int optID)`


    `optID` is one of the aforementioned constants and `value` is an object of a suitable
    class (such as `java.lang.Boolean`).


    `SocketOptions` is implemented by the abstract `SocketImpl` and `DatagramSocketImpl`
    classes. Concrete instances of these classes are wrapped by the various `Socket`-suffixed
    classes. As a result, you cannot invoke these methods. Instead, you work with
    the type-safe setter and getter methods provided by the `Socket`-suffixed classes
    for setting and getting these options.


    For example, `Socket` declares `void setKeepAlive(boolean keepAlive)` for setting
    the `SO_KEEPALIVE` option, and `ServerSocket` declares `void setSoTimeout(int
    timeout)` for setting the `SO_TIMEOUT` option. Check the documentation on the
    `Socket`-suffixed classes to learn about these and other socket option methods.


    **Note:** Socket option methods that apply to `DatagramSocket` also apply to its
    `MulticastSocket` subclass.'
