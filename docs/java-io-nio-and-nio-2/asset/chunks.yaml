- fmt: "# Buffer and its Children\n\nBuffers are implemented by classes that derive\
    \ from the abstract `java.nio.Buffer` class. Table [6-1](#A978-1-4842-1565-4_6_Chapter.html#Tab1)\
    \ describes `Buffer`’s methods.\n\nTable 6-1. `Buffer` Methods\n\n| Method | Description\
    \ |\n| --- | --- |\n| `Object array()` | Return the array that backs this buffer.\
    \ This method is intended to allow array-backed buffers to be passed to native\
    \ code more efficiently. Concrete subclasses override this method and provide\
    \ more strongly typed return values via covariant return types. This method throws\
    \ `java.nio.ReadOnlyBufferException` when this buffer is backed by an array but\
    \ is read-only and throws `java.lang.UnsupportedOperationException` when this\
    \ buffer isn’t backed by an accessible array. |\n| `int arrayOffset()` | Return\
    \ the offset of the first buffer element within this buffer’s backing array. When\
    \ this buffer is backed by an array, buffer position `p` corresponds to array\
    \ index `p + arrayOffset()`. Invoke `hasArray()` before invoking this method to\
    \ ensure that this buffer has an accessible backing array. This method throws\
    \ `ReadOnlyBufferException` when this buffer is backed by an array but is read-only\
    \ and throws `UnsupportedOperationException` when this buffer isn’t backed by\
    \ an accessible array. |\n| `int capacity()` | Return this buffer’s capacity.\
    \ |\n| `Buffer clear()` | Clear this buffer. The position is set to `0`, the limit\
    \ is set to the capacity, and the mark is discarded. This method doesn’t erase\
    \ the data in the buffer but is named as if it did because it will most often\
    \ be used in situations in which that might as well be the case. |\n| `Buffer\
    \ flip()` | Flip this buffer. The limit is set to the current position and then\
    \ the position is set to `0`. When the mark is defined, it’s discarded. |\n| `boolean\
    \ hasArray()` | Return `true` when this buffer is backed by an array and isn’t\
    \ read-only; otherwise, return `false`. When this method returns `true`, `array()`\
    \ and `arrayOffset()` may be invoked safely. |\n| `boolean hasRemaining()` | Return\
    \ `true` when at least one element remains in this buffer (that is, between the\
    \ current position and the limit); otherwise, return `false`. |\n| `boolean isDirect()`\
    \ | Return `true` when this buffer is a direct byte buffer (discussed later in\
    \ this chapter); otherwise, return `false`. |\n| `boolean isReadOnly()` | Return\
    \ `true` when this buffer is read-only, otherwise, return `false`. |\n| `int limit()`\
    \ | Return this buffer’s limit. |\n| `Buffer limit(int newLimit)` | Set this buffer’s\
    \ limit to `newLimit`. When the position is larger than `newLimit`, the position\
    \ is set to `newLimit`. When the mark is defined and is larger than `newLimit`,\
    \ the mark is discarded. This method throws `java.lang.IllegalArgumentException`\
    \ when `newLimit` is negative or larger than this buffer’s capacity; otherwise,\
    \ it returns this buffer. |\n| `Buffer mark()` | Set this buffer’s mark to its\
    \ position and return this buffer. |\n| `int position()` | Return this buffer’s\
    \ position. |\n| `Buffer position(int newPosition)` | Set this buffer’s position\
    \ to `newPosition`. When the mark is defined and is larger than `newPosition`,\
    \ the mark is discarded. This method throws `IllegalArgumentException` when `newPosition`\
    \ is negative or larger than this buffer’s current limit; otherwise, it returns\
    \ this buffer. |\n| `int remaining()` | Return the number of elements between\
    \ the current position and the limit. |\n| `Buffer reset()` | Reset this buffer’s\
    \ position to the previously marked position. Invoking this method neither changes\
    \ nor discards the mark’s value. This method throws `java.nio.InvalidMarkException`\
    \ when the mark hasn’t been set; otherwise, it returns this buffer. |\n| `Buffer\
    \ rewind()` | Rewind and then return this buffer. The position is set to `0` and\
    \ the mark is discarded. |\n\nTable [6-1](#A978-1-4842-1565-4_6_Chapter.html#Tab1)\
    \ shows that many of `Buffer`’s methods return `Buffer` references so that you\
    \ can chain instance method calls together. For example, instead of specifying\
    \ the following three lines:\n\n```\nbuf.mark();\nbuf.position(2);\nbuf.reset();\n\
    ```\n\nyou can more conveniently specify the following line:\n\n```\nbuf.mark().position(2).reset();\n\
    ```\n\nTable [6-1](#A978-1-4842-1565-4_6_Chapter.html#Tab1) also shows that all\
    \ buffers can be read but not all buffers can be written—for example, a buffer\
    \ backed by a memory-mapped file that’s read-only. You must not write to a read-only\
    \ buffer; otherwise, `ReadOnlyBufferException` is thrown. Call `isReadOnly()`\
    \ when you’re unsure that a buffer is writable before attempting to write to that\
