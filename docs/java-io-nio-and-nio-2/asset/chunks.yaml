- fmt: '### Exploring Datagram Channels


    `DatagramChannel` models a connectionless packet-oriented protocol (such as UDP/IP).
    This class includes the following methods:


    - `static DatagramChannel open()`: Attempt to open a datagram channel. If the
    channel cannot be opened, `IOException` is thrown.

    - `DatagramSocket socket()`: Return the peer `DatagramSocket` instance associated
    with this datagram channel.

    - `DatagramChannel connect(SocketAddress remoteAddr)`: Attempt to connect this
    datagram channel’s socket object to the remote address. The channel’s socket is
    configured so that it only receives datagrams from and sends datagrams to the
    given address. Once connected, datagrams cannot be received from or sent to any
    other address. A datagram socket remains connected until explicitly disconnected
    or closed. This method returns the datagram channel upon success. It throws `ClosedChannelException`
    when the datagram channel is closed; `AsynchronousCloseException` when another
    thread closes this channel while the connect operation is in progress; `ClosedByInterruptException`
    when another thread interrupts the current thread while the connect operation
    is in progress, thereby closing the channel and setting the current thread’s interrupt
    status; and `IOException` when some other I/O error occurs.

    - `boolean isConnected()`: Return `true` when this channel’s socket is open and
    connected; otherwise, return `false`.

    - `DatagramChannel disconnect()`: Disconnect this channel’s socket. This method
    may be invoked at any time and has no effect on read or write operations that
    are already in progress. When the socket isn’t connected or when the channel is
    closed, invoking this method has no effect.

    - `SocketAddress receive(ByteBuffer buffer)`: Receive a datagram via this channel.
    If a datagram is immediately available or if this channel is blocking and a datagram
    becomes available, the datagram is copied into the given byte buffer and its source
    address is returned. If this channel is nonblocking and a datagram isn’t immediately
    available, this method immediately returns `null`. The datagram is transferred
    into the given byte buffer starting at its current position, as if by a regular
    read operation. If there are fewer bytes remaining in the buffer than are required
    to hold the datagram, the remainder of the datagram is silently discarded. This
    method returns the datagram’s source address or `null` when the channel isn’t
    blocking and no datagram is available. It throws `ClosedChannelException` when
    the datagram channel is closed; `AsynchronousCloseException` when another thread
    closes this channel while the read operation is in progress; `ClosedByInterruptException`
    when another thread interrupts the current thread while the read operation is
    in progress, thereby closing the channel and setting the current thread’s interrupt
    status; and `IOException` when some other I/O error occurs.

    - `int send(ByteBuffer buffer, SocketAddress destAddr)`: Send a datagram via this
    channel. If this channel is nonblocking and there is sufficient room in the underlying
    output buffer, or if this channel is blocking and sufficient room becomes available,
    the remaining bytes in the given buffer are transmitted as a single datagram to
    the given destination address. The datagram is transferred from the byte buffer
    as if by a regular write operation. This method returns the number of bytes sent,
    which will be the number of bytes that were remaining in the source buffer when
    this method was invoked or, when this channel is nonblocking, may be zero if there
    was insufficient room for the datagram in the underlying output buffer. It throws
    `ClosedChannelException` when the datagram channel is closed; `AsynchronousCloseException`
    when another thread closes this channel while the write operation is in progress;
    `ClosedByInterruptException` when another thread interrupts the current thread
    while the write operation is in progress, thereby closing the channel and setting
    the current thread’s interrupt status; and `IOException` when some other I/O error
    occurs.'
