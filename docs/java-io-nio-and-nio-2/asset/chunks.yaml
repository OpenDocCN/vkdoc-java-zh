    ## 重温标准 I/O


    Java 支持标准 I/O。您可以通过调用 `System.in.read()` 方法从标准输入流输入数据项，通过调用 `System.out.print()`
    和 `System.out.println()` 方法向标准输出流输出数据项，并通过调用 `System.err.print()` 和 `System.err.println()`
    方法向标准错误流输出数据项。


    `System.in`、`System.out` 和 `System.err` 在 `System` 类中由以下类字段正式描述：


    *   `public static final InputStream in`

    *   `public static final PrintStream out`

    *   `public static final PrintStream err`


    这些字段包含对 `InputStream` 和 `PrintStream` 对象的引用，这些对象分别代表标准输入、标准输出和标准错误流。


    当您调用 `System.in.read()` 时，输入源自分配给 `in` 的 `InputStream` 实例所标识的源。类似地，当您调用 `System.out.print()`
    或 `System.err.println()` 时，输出被发送到分别由分配给 `out` 或 `err` 的 `PrintStream` 实例所标识的目标。


    当标准输入流被重定向到文件时，Java 会初始化 `in` 以引用键盘或该文件。类似地，当标准输出/错误流被重定向到文件时，Java 会初始化 `out`/`err`
    以引用屏幕或该文件。您可以通过调用以下 `System` 类方法以编程方式指定输入源、输出目标和错误目标：


    *   `void setIn(InputStream in)`

    *   `void setOut(PrintStream out)`

    *   `void setErr(PrintStream err)`


    清单 4-14 展示了一个 `RedirectIO` 应用程序，它向您展示了如何使用这些方法以编程方式重定向标准输入、标准输出和标准错误目标。


    **清单 4-14.** 以编程方式指定标准输入源和标准输出/错误目标


    `import java.io.FileInputStream;`


    `import java.io.IOException;`


    `import java.io.PrintStream;`


    `public class RedirectIO`


    `{`


    `public static void main(String[] args) throws IOException`


    `{`


    `if (args.length != 3)`


    `{`


    `System.err.println("usage: java RedirectIO stdinfile " +`


    `"stdoutfile stderrfile");`


    `return;`


    `}`


    `System.setIn(new FileInputStream(args[0]));`


    `System.setOut(new PrintStream(args[1]));`


    `System.setErr(new PrintStream(args[2]));`


    `int ch;`


    `while ((ch = System.in.read()) != -1)`


    `System.out.print((char) ch);`


    `System.err.println("Redirected error output");`


    `}`


    `}`


    清单 4-14 允许您（通过命令行参数）指定一个文件名，`System.in.read()` 将从该文件获取其内容，以及 `System.out.print()`
    和 `System.err.println()` 将内容发送到的文件名。然后，它继续将标准输入复制到标准输出，并演示向标准错误输出内容。


    `new FileInputStream(args[0])` 提供了对存储在由 `args[0]` 标识的文件中的输入字节序列的访问。类似地，`new PrintStream(args[1])`
    提供了对由 `args[1]` 标识的文件的访问，该文件将存储输出字节序列；`new PrintStream(args[2])` 提供了对由 `args[2]`
    标识的文件的访问，该文件将存储错误字节序列。


    按如下方式编译清单 4-14：


    `javac RedirectIO.java`


    按如下方式运行生成的应用程序：


    `java RedirectIO RedirectIO.java out.txt err.txt`


    此命令行在屏幕上不产生任何可见输出。相反，它将 `RedirectIO.java` 的内容复制到 `out.txt`。它还将 `Redirected error
    output` 存储在 `err.txt` 中。


    **练习**


    以下练习旨在测试您对第 4 章内容的理解：


    什么是流？  `OutputStream` 的 `flush()` 方法的目的是什么？  判断正误：`OutputStream` 的 `close()` 方法会自动刷新输出流。 
    `InputStream` 的 `mark(int)` 和 `reset()` 方法的目的是什么？  您如何访问 `ByteArrayOutputStream`
    实例内部字节数组的副本？  判断正误：`FileOutputStream` 和 `FileInputStream` 提供内部缓冲区以提高写入和读取操作的性能。 
    您为什么使用 `PipedOutputStream` 和 `PipedInputStream`？  定义过滤器流。  两个流被链接在一起意味着什么？  您如何提高文件输出流或文件输入流的性能？ 
    `DataOutputStream` 和 `DataInputStream` 如何支持 `FileOutputStream` 和 `FileInputStream`？ 
    什么是对象序列化和反序列化？  Java 支持哪三种形式的序列化和反序列化？  `Serializable` 接口的目的是什么？  当序列化机制遇到其类未实现
    `Serializable` 的对象时，它会做什么？  指出 Java 不支持无限序列化的三个既定原因。  您如何启动序列化？您如何启动反序列化？  判断正误：类字段会被自动序列化。 
    `transient` 保留字的目的是什么？  当反序列化机制尝试反序列化其类已更改的对象时，它会做什么？  反序列化机制如何检测到序列化对象的类已更改？ 
    您如何向类添加实例字段，并在反序列化在添加该实例字段之前序列化的对象时避免出现问题？您可以使用哪个 JDK 工具来帮助完成此任务？  您如何在不使用外部化的情况下自定义默认的序列化和反序列化机制？ 
    您如何告诉序列化和反序列化机制在序列化或反序列化额外数据项之前，先序列化或反序列化对象的正常状态？  外部化如何与默认和自定义的序列化及反序列化不同？  一个类如何表明它支持外部化？ 
    判断正误：在外部化过程中，当反序列化机制未检测到 `public` 无参构造函数时，它会抛出带有“no valid constructor”消息的 `InvalidClassException`。 
    `PrintStream` 的 `print()` 和 `println()` 方法有什么区别？  `PrintStream` 的无参 `void println()`
    方法完成了什么？  您如何重定向标准输入、标准输出和标准错误流？  通过使用 `BufferedInputStream` 和 `BufferedOutputStream`
    来改进清单 4-1 的 `Copy` 应用程序（性能方面）。`Copy` 应从缓冲输入流读取要复制的字节，并将这些字节写入缓冲输出流。  创建一个名为 `Split`
    的 Java 应用程序，用于将一个大文件拆分为多个较小的 `partx` 文件（其中 `x` 从 0 开始并递增；例如，`part0`、`part1`、`part2`
    等）。每个 `partx` 文件（除了可能保存剩余字节的最后一个 `partx` 文件）将具有相同的大小。此应用程序的使用语法为：`java Split path`。此外，您的实现必须使用
    `BufferedInputStream`、`BufferedOutputStream`、`File`、`FileInputStream` 和 `FileOutputStream`
    类。

