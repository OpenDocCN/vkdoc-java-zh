    #### 锁定文件


    在 Java 1.4 出现之前，锁定文件全部或部分内容的能力一直是 Java 中一个缺失的重要特性。此功能允许一个 JVM 进程阻止其他进程访问文件的全部或部分内容，直到该进程完成对整个文件或文件部分的操作。


    虽然可以锁定整个文件，但通常更可取的做法是锁定一个较小的区域。例如，数据库管理系统可能会锁定正在更新的单个表行，而不是锁定整个表，以便读取请求能够被处理，从而提高吞吐量。


    与文件关联的锁被称为文件锁。每个文件锁从文件中的某个特定字节位置开始，并具有从该位置开始的特定长度（以字节为单位）。它们共同定义了锁所管辖的区域。文件锁允许进程协调对文件中不同区域的访问。


    文件锁有两种类型：排他锁和共享锁。排他锁允许单个写入进程访问文件区域；它禁止同时对该区域应用其他文件锁。共享锁允许多个读取进程中的一个访问同一文件区域；它不禁止其他共享锁，但禁止同时对该区域应用排他锁。


    排他锁和共享锁通常用于共享文件主要被读取、偶尔被更新的场景。需要从文件读取的进程会获取整个文件或所需子区域的共享锁。另一个也需要从文件读取的进程会获取所需区域的共享锁。这两个进程可以互不干扰地读取文件。


    假设第三个进程想要执行更新。为此，它会请求一个排他锁。该进程将阻塞，直到所有与其区域重叠的排他锁或共享锁被释放。一旦更新进程获得了排他锁，任何请求共享锁的读取进程都将阻塞，直到排他锁被释放。这样，更新进程就可以更新文件，而读取进程不会观察到不一致的数据。


    关于文件锁定，还有几点需要牢记：


    *   当操作系统不支持共享锁时，共享锁请求会被静默提升为排他锁请求。虽然正确性得到了保证，但性能可能会受到影响。

    *   锁是基于每个文件应用的，而不是基于每个线程或每个通道。运行在同一个 JVM 上的两个线程，通过不同的通道请求对同一文件区域的排他锁，都会被授予访问权限。但是，如果这些线程运行在不同的
    JVM 上，第二个线程将会阻塞。锁最终由操作系统的文件系统仲裁，并且几乎总是在进程级别进行仲裁，而不是在线程级别。锁与文件关联，而不是与文件句柄或通道关联。


    `FileChannel` 声明了四种获取排他锁和共享锁的方法：


    *   `FileLock lock()`: 获取此文件通道底层文件的排他锁。这个便捷方法等同于执行 `fileChannel.lock(0L, Long.MAX_VALUE,
    false);`，其中 `fileChannel` 引用一个文件通道。


    此方法返回一个代表锁定区域的 `java.nio.channels.FileLock` 对象。当文件通道关闭时抛出 `ClosedChannelException`；当通道未打开用于写入时抛出
    `NonWritableChannelException`；当与此 JVM 已持有的锁重叠，或另一个线程已在此方法中阻塞并试图锁定同一文件的重叠区域时抛出
    `java.nio.channels.OverlappingFileLockException`；当调用线程在等待获取锁时被中断抛出 `java.nio.channels.FileLockInterruptionException`；当调用线程在等待获取锁时通道被关闭抛出
    `AsynchronousCloseException`；以及在获取请求的锁时发生其他 I/O 错误时抛出 `IOException`。


    *   `FileLock lock(long position, long size, boolean shared)`: 此方法与前一个方法类似，不同之处在于它尝试获取此通道文件指定区域上的锁。向
    `position` 和 `size` 传递非负值以界定区域。向 `shared` 传递 `true` 以请求共享锁，传递 `false` 以请求排他锁。

    *   `FileLock tryLock()`: 尝试在不阻塞的情况下获取此文件通道底层文件的排他锁。这个便捷方法等同于执行 `fileChannel.tryLock(0L,
    Long.MAX_VALUE, false);`，其中 `fileChannel` 引用一个文件通道。此方法返回一个代表锁定区域的 `FileLock` 对象，如果该锁与另一个操作系统进程中的现有排他锁重叠，则返回
    `null`。当文件通道关闭时抛出 `ClosedChannelException`；当与此 JVM 已持有的锁重叠，或另一个线程已在此方法中阻塞并试图锁定重叠区域时抛出
    `OverlappingFileLockException`；以及在获取请求的锁时发生其他 I/O 错误时抛出 `IOException`。

    *   `FileLock tryLock(long position, long size, boolean shared)`: 此方法与前一个方法类似，不同之处在于它尝试获取此通道文件指定区域上的锁。向
    `position` 和 `size` 传递非负值以界定区域。向 `shared` 传递 `true` 以请求共享锁，传递 `false` 以请求排他锁。


    当要锁定的所需区域已被锁定时（除非两个锁都是共享锁），`lock()` 方法会阻塞。相比之下，`tryLock()` 方法会立即返回，如果锁与另一个操作系统进程中的现有排他锁重叠，则返回
    `null`。


    每个方法都返回一个 `FileLock` 实例，它封装了文件中的一个锁定区域。接下来描述 `FileLock` 的方法：

