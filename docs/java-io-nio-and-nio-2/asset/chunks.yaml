- fmt: "# Exploring Miscellaneous Capabilities\n\nFinally, `File` implements the `java.lang.Comparable`\
    \ interface’s `compareTo()` method and overrides `equals()` and `hashCode()`.\
    \ Table [2-5](#A978-1-4842-1565-4_2_Chapter.html#Tab5) describes these miscellaneous\
    \ methods.\n\nTable 2-5. `File`’s Miscellaneous Methods\n\n| Method | Description\
    \ |\n| --- | --- |\n| `int compareTo(File path)` | Compare two paths lexicographically.\
    \ The ordering defined by this method depends on the underlying operating system.\
    \ For Unix/Linux operating systems, alphabetic case is significant when comparing\
    \ paths; for Windows operating systems, alphabetic case is insignificant. Return\
    \ zero when `path`’s abstract path equals this `File` object’s abstract path,\
    \ a negative value when this `File` object’s abstract path is less than `path`,\
    \ and a positive value otherwise. To accurately compare two `File` objects, call\
    \ `getCanonicalFile()` on each `File` object and then compare the returned `File`\
    \ objects. |\n| `boolean equals(Object obj))` | Compare this `File` object with\
    \ `obj` for equality. Abstract path equality depends on the underlying operating\
    \ system. For Unix/Linux operating systems, alphabetic case is significant when\
    \ comparing paths; for Windows operating systems, alphabetic case is insignificant.\
    \ Return true if and only if `obj` is not `null` and is a `File` object whose\
    \ abstract path denotes the same file/directory as this `File` object’s abstract\
    \ path. |\n| `int hashCode()` | Calculate and return a hash code for this path.\
    \ This calculation depends on the underlying operating system. On Unix/Linux operating\
    \ systems, a path’s hash code equals the exclusive OR of its path string’s hash\
    \ code and decimal value `1234321`. On Windows operating systems, the hash code\
    \ is the exclusive OR of the lowercased path string’s hash code and decimal value\
    \ `1234321`. The current locale (geographical, political, or cultural region)\
    \ is not taken into account when lowercasing the path string. |\n\nListing [2-8](#A978-1-4842-1565-4_2_Chapter.html#FPar16)\
    \ presents an application that demonstrates `compareTo()` along with `getCanonicalFile()`.\n\
    \nListing 2-8. Comparing Files\n\n```\nimport java.io.File;\nimport java.io.IOException;\n\
    \npublic class Compare\n{\n   public static void main(String[] args) throws IOException\n\
    \   {\n      if (args.length != 2)\n      {\n         System.err.println(\"usage:\
    \ java Compare filespec1 filespec2\");\n         return;\n      }\n\n      File\
    \ file1 = new File(args[0]);\n      File file2 = new File(args[1]);\n\n      System.out.println(file1.compareTo(file2));\n\
    \      System.out.println(file1.getCanonicalFile()\n                         .compareTo(file2.getCanonicalFile()));\n\
    \   }\n}\n```\n\nCompile Listing [2-8](#A978-1-4842-1565-4_2_Chapter.html#FPar16)\
    \ as follows:\n\n`javac Compare.java`\n\nAssuming Windows, run the resulting application\
    \ as follows:\n\n`java Compare Compare.class .\\Compare.class`\n\nYou should observe\
    \ the following output:\n\n```\n53\n0\n```\n\nThe `53` indicates that `file1`’s\
    \ abstract path is lexicographically greater than `file2`’s abstract path. However,\
    \ when comparing their canonical representations, these abstract paths are considered\
    \ to be identical (as indicated by the `0`).\n\n## EXERCISE\n\nThe following exercises\
    \ are designed to test your understanding of [Chapter 2](#A978-1-4842-1565-4_2_Chapter.html)’s\
    \ content:\n\n- What is the purpose of the `File` class?\n- What do instances\
    \ of the `File` class contain?\n- What is a path?\n- What is the difference between\
    \ an absolute path and a relative path?\n- How do you obtain the current user\
    \ (also known as working) directory?\n- Define parent path.\n- `File`’s constructors\
    \ normalize their path arguments. What does normalize mean?\n- How do you obtain\
    \ the default name-separator character?\n- What is a canonical path?\n- What is\
    \ the difference between `File`’s `getParent()` and `getName()` methods?\n- True\
    \ or false: `File`’s `exists()` method only determines whether or not a file exists.\n\
    - What is a normal file?\n- What does `File`’s `lastModified()` method return?\n\
    - What does `File`’s `listRoots()` method accomplish?\n- True or false: `File`’s\
    \ `list()` method returns an array of `String`s where each entry is a file name\
    \ rather than a complete path.\n- What is the difference between the `FilenameFilter`\
    \ and `FileFilter` interfaces?\n- True or false: `File`’s `createNewFile()` method\
    \ doesn’t check for file existence and create the file when it doesn’t exist in\
    \ a single operation that’s atomic with respect to all other file system activities\
    \ that might affect the file.\n- `File`’s `createTempFile(String, String)` method\
    \ creates a temporary file in the default temporary directory. How can you locate\
    \ this directory?\n- Temporary files should be removed when no longer needed after\
    \ an application exits (to avoid cluttering the file system). How do you ensure\
    \ that a temporary file is removed when the JVM ends normally (it doesn’t crash\
    \ and the power isn’t lost)?\n- Which one of the `boolean canRead()`, `boolean\
    \ canWrite()`, and `boolean canExecute()` methods was introduced by Java 6?\n\
    - How would you accurately compare two `File` objects?\n- Create a Java application\
    \ named `Touch` for setting a file’s or directory’s timestamp to the current time.\
    \ This application has the following usage syntax: `java Touch pathname`.\n\n\
    ## Summary\n\nThe `File` class provides access to the underlying operating system’s\
    \ available file system(s). Each `File` instance stores the abstract path for\
    \ some file system object. Various `File` methods (such as `void delete()`) affect\
    \ the file system object represented by the abstract path.\n\nYou first learned\
    \ how to construct `File` instances. You then explored methods for obtaining information\
    \ about stored abstract paths and their files or directories, obtaining a list\
    \ of roots and disk space, listing directories, creating/modifying files/directories,\
    \ setting/getting permissions, and more.\n\n[Chapter 3](#A978-1-4842-1565-4_3_Chapter.html)\
    \ presents classic I/O’s `java.io.RandomAccessFile` class.\n\n# 3. RandomAccessFile\n\
