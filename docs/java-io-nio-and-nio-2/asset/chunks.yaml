- fmt: "```java\nint[] map = new int[256];\n\nfor (int i = 0; i < map.length; i++)\n\
    \    map[i] = i;\n\n// Shuffle map.\nRandom r = new Random(0);\nfor (int i = 0;\
    \ i < map.length; i++)\n{\n    int n = r.nextInt(map.length);\n    int temp =\
    \ map[i];\n    map[i] = map[n];\n    map[n] = temp;\n}\n\nreturn map;\n```\n\n\
    `Scramble`’s `main()` method first verifies the number of command-line arguments.\
    \ The first argument identifies the source path of the file with unscrambled content;\
    \ the second argument identifies the destination path of the file that stores\
    \ scrambled content.\n\nAssuming that two command-line arguments have been specified,\
    \ `main()` instantiates `FileInputStream`, creating a file input stream that’s\
    \ connected to the file identified by `args[0]`.\n\nContinuing, `main()` instantiates\
    \ `FileOutputStream`, creating a file output stream that’s connected to the file\
    \ identified by `args[1]`. It then instantiates `ScrambledOutputStream` and passes\
    \ the `FileOutputStream` instance to `ScrambledOutputStream`’s constructor.\n\n\
    **Note**\n\nWhen a stream instance is passed to another stream class’s constructor,\
    \ the two streams are chained together. For example, the scrambled output stream\
    \ is chained to the file output stream.\n\n`main()` now enters a loop, reading\
    \ bytes from the file input stream and writing them to the scrambled output stream\
    \ by calling `ScrambledOutputStream`’s `write(int)` method. This loop continues\
    \ until `FileInputStream`’s `read()` method returns `-1` (end of file).\n\nThe\
    \ `finally` block closes the file input stream and scrambled output stream by\
    \ calling their `close()` methods. It doesn’t call the file output stream’s `close()`\
    \ method because `FilterOutputStream` automatically calls the underlying output\
    \ stream’s `close()` method.\n\nThe `makeMap()` method is responsible for creating\
    \ the map array that’s passed to `ScrambledOutputStream`’s constructor. The idea\
    \ is to populate the array with all 256 byte-integer values, storing them in random\
    \ order.\n\n**Note**\n\nI pass `0` as the seed argument when creating the `java.util.Random`\
    \ object in order to return a predictable sequence of random numbers. I need to\
