- fmt: "### BufferedOutputStream and BufferedInputStream\n\n`FileOutputStream` and\
    \ `FileInputStream` have a performance problem. Each file output stream `write()`\
    \ method call and file input stream `read()` method call results in a native method\
    \ call to one of the underlying operating system’s functions, and these native\
    \ method calls slow down I/O.\n\nThe concrete `BufferedOutputStream` and `BufferedInputStream`\
    \ filter stream classes improve performance by minimizing underlying output stream\
    \ `write()` and underlying input stream `read()` method calls. Instead, calls\
    \ to `BufferedOutputStream`’s `write()` and `BufferedInputStream`’s `read()` methods\
    \ take Java buffers into account:\n\n- When a write buffer is full, `write()`\
    \ calls the underlying output stream `write()` method to empty the buffer. Subsequent\
    \ calls to `BufferedOutputStream`’s `write()` methods store bytes in this buffer\
    \ until it’s once again full.\n- When the read buffer is empty, `read()` calls\
    \ the underlying input stream `read()` method to fill the buffer. Subsequent calls\
    \ to `BufferedInputStream`’s `read()` methods return bytes from this buffer until\
    \ it’s once again empty.\n\n`BufferedOutputStream` declares the following constructors:\n\
    \n- `BufferedOutputStream(OutputStream out)` creates a buffered output stream\
    \ that streams its output to `out`. An internal buffer is created to store bytes\
    \ written to `out`.\n- `BufferedOutputStream(OutputStream out, int size)` creates\
    \ a buffered output stream that streams its output to `out`. An internal buffer\
    \ of length `size` is created to store bytes written to `out`.\n\nThe following\
    \ example chains a `BufferedOutputStream` instance to a `FileOutputStream` instance.\
    \ Subsequent `write()` method calls on the `BufferedOutputStream` instance buffer\
    \ bytes and occasionally result in internal `write()` method calls on the encapsulated\
    \ `FileOutputStream` instance:\n\n```\nFileOutputStream fos = new FileOutputStream(\"\
    employee.dat\");\nBufferedOutputStream bos = new BufferedOutputStream(fos); //\
    \ Chain bos to fos.\nbos.write(0); // Write to employee.dat through the buffer.\n\
    // Additional write() method calls.\nbos.close(); // This method call internally\
    \ calls fos’s close() method.\n```\n\n`BufferedInputStream` declares the following\
    \ constructors:\n\n- `BufferedInputStream(InputStream in)` creates a buffered\
    \ input stream that streams its input from `in`. An internal buffer is created\
    \ to store bytes read from `in`.\n- `BufferedInputStream(InputStream in, int size)`\
    \ creates a buffered input stream that streams its input from `in`. An internal\
    \ buffer of length `size` is created to store bytes read from `in`.\n\nThe following\
    \ example chains a `BufferedInputStream` instance to a `FileInputStream` instance.\
    \ Subsequent `read()` method calls on the `BufferedInputStream` instance unbuffer\
    \ bytes and occasionally result in internal `read()` method calls on the encapsulated\
    \ `FileInputStream` instance:\n\n```\nFileInputStream fis = new FileInputStream(\"\
    employee.dat\");\nBufferedInputStream bis = new BufferedInputStream(fis); // Chain\
    \ bis to fis.\nint ch = bis.read(); // Read employee.dat through the buffer.\n\
    // Additional read() method calls.\nbis.close(); // This method call internally\
    \ calls fis’s close() method.\n```\n\n### DataOutputStream and DataInputStream\n\
    \n`FileOutputStream` and `FileInputStream` are useful for writing and reading\
    \ bytes and arrays of bytes. However, they provide no support for writing and\
    \ reading primitive-type values (such as integers) and strings.\n\nFor this reason,\
    \ Java provides the concrete `DataOutputStream` and `DataInputStream` filter stream\
    \ classes. Each class overcomes this limitation by providing methods to write\
    \ or read primitive-type values and strings in an operating system-independent\
    \ way:\n\n- Integer values are written and read in big-endian format (the most\
    \ significant byte comes first). Check out Wikipedia’s “Endianness” entry ( [http://en.wikipedia.org/wiki/Endianness](http://en.wikipedia.org/wiki/Endianness)\
    \ ) to learn about the concept of endianness.\n- Floating-point and double precision\
    \ floating-point values are written and read according to the IEEE 754 standard,\
    \ which specifies four bytes per floating-point value and eight bytes per double\
    \ precision floating-point value.\n- Strings are written and read according to\
    \ a modified version of UTF-8, a variable-length encoding standard for efficiently\
    \ storing two-byte Unicode characters. Check out Wikipedia’s “UTF-8” entry ( [http://en.wikipedia.org/wiki/Utf-8](http://en.wikipedia.org/wiki/Utf-8)\
    \ ) to learn more about UTF-8.\n\n`DataOutputStream` declares a single `DataOutputStream(OutputStream\
    \ out)` constructor. Because this class implements the `java.io.DataOutput` interface,\
    \ `DataOutputStream` also provides access to the same-named write methods as provided\
    \ by `java.io.RandomAccessFile`.\n\n`DataInputStream` declares a single `DataInputStream(InputStream\
    \ in)` constructor. Because this class implements the `java.io.DataInput` interface,\
    \ `DataInputStream` also provides access to the same-named read methods as provided\
    \ by `RandomAccessFile`.\n\nListing [4-8](#A978-1-4842-1565-4_4_Chapter.html#FPar19)\
    \ presents the source code to a `DataStreamsDemo` application that uses a `DataOutputStream`\
    \ instance to write multibyte values to a `FileOutputStream` instance and uses\
    \ a `DataInputStream` instance to read multibyte values from a `FileInputStream`\
    \ instance.\n\n**Listing 4-8.** Outputting and then Inputting a Stream of Multibyte\
    \ Values\n\n```\nimport java.io.DataInputStream;\nimport java.io.DataOutputStream;\n\
    import java.io.FileInputStream;\nimport java.io.FileOutputStream;\nimport java.io.IOException;\n\
    \npublic class DataStreamsDemo\n{\n   final static String FILENAME = \"values.dat\"\
    ;\n\n   public static void main(String[] args)\n   {\n      try (FileOutputStream\
    \ fos = new FileOutputStream(FILENAME);\n           DataOutputStream dos = new\
    \ DataOutputStream(fos))\n      {\n         dos.writeInt(1995);\n         dos.writeUTF(\"\
    Saving this String in modified UTF-8 format!\");\n         dos.writeFloat(1.0F);\n\
    \      }\n      catch (IOException ioe)\n      {\n         System.err.println(\"\
    I/O error: \" + ioe.getMessage());\n      }\n\n      try (FileInputStream fis\
    \ = new FileInputStream(FILENAME);\n           DataInputStream dis = new DataInputStream(fis))\n\
    \      {\n         System.out.println(dis.readInt());\n         System.out.println(dis.readUTF());\n\
    \         System.out.println(dis.readFloat());\n      }\n      catch (IOException\
    \ ioe)\n      {\n         System.err.println(\"I/O error: \" + ioe.getMessage());\n\
    \      }\n   }\n}\n```\n\n`DataStreamsDemo` creates a file named `values.dat`;\
    \ calls `DataOutputStream` methods to write an integer, a string, and a floating-point\
    \ value to this file; and calls `DataInputStream` methods to read back these values.\n\
    \nCompile Listing [4-8](#A978-1-4842-1565-4_4_Chapter.html#FPar19) as follows:\n\
    \n```\njavac DataStreamsDemo.java\n```\n\nRun the resulting application as follows:\n\
    \n```\njava DataStreamsDemo\n```\n\nYou should observe the following output:\n\
    \n```\n1995\nSaving this String in modified UTF-8 format!\n1.0\n```\n\n**Caution**\n\
    \nWhen reading a file of values written by a sequence of `DataOutputStream` method\
    \ calls, make sure to use the same method-call sequence. Otherwise, you’re bound\
    \ to end up with erroneous data and, in the case of the `readUTF()` methods, thrown\
    \ instances of the `java.io.UTFDataFormatException` class (a subclass of `IOException`)."
  raw: '### BufferedOutputStream and BufferedInputStream


    `FileOutputStream` and `FileInputStream` have a performance problem. Each file
    output stream `write()` method call and file input stream `read()` method call
    results in a native method call to one of the underlying operating system’s functions,
    and these native method calls slow down I/O.


    The concrete `BufferedOutputStream` and `BufferedInputStream` filter stream classes
    improve performance by minimizing underlying output stream `write()` and underlying
    input stream `read()` method calls. Instead, calls to `BufferedOutputStream`’s
    `write()` and `BufferedInputStream`’s `read()` methods take Java buffers into
    account:


    *   When a write buffer is full, `write()` calls the underlying output stream
    `write()` method to empty the buffer. Subsequent calls to `BufferedOutputStream`’s
    `write()` methods store bytes in this buffer until it’s once again full.

    *   When the read buffer is empty, `read()` calls the underlying input stream
    `read()` method to fill the buffer. Subsequent calls to `BufferedInputStream`’s
    `read()` methods return bytes from this buffer until it’s once again empty.


    `BufferedOutputStream` declares the following constructors:


    *   `BufferedOutputStream(OutputStream out)` creates a buffered output stream
    that streams its output to `out`. An internal buffer is created to store bytes
    written to `out`.

    *   `BufferedOutputStream(OutputStream out, int size)` creates a buffered output
    stream that streams its output to `out`. An internal buffer of length `size` is
    created to store bytes written to `out`.


    The following example chains a `BufferedOutputStream` instance to a `FileOutputStream`
    instance. Subsequent `write()` method calls on the `BufferedOutputStream` instance
    buffer bytes and occasionally result in internal `write()` method calls on the
    encapsulated `FileOutputStream` instance:


    `FileOutputStream fos = new FileOutputStream("employee.dat");`


    `BufferedOutputStream bos = new BufferedOutputStream(fos); // Chain bos`


                                                              `// to fos.`


    `bos.write(0); // Write to employee.dat through the buffer.`


    `// Additional write() method calls.`


    `bos.close(); // This method call internally calls fos’s close() method.`


    `BufferedInputStream` declares the following constructors:


    *   `BufferedInputStream(InputStream in)` creates a buffered input stream that
    streams its input from `in`. An internal buffer is created to store bytes read
    from `in`.

    *   `BufferedInputStream(InputStream in, int size)` creates a buffered input stream
    that streams its input from `in`. An internal buffer of length `size` is created
    to store bytes read from `in`.


    The following example chains a `BufferedInputStream` instance to a `FileInputStream`
    instance. Subsequent `read()` method calls on the `BufferedInputStream` instance
    unbuffer bytes and occasionally result in internal `read()` method calls on the
    encapsulated `FileInputStream` instance:


    `FileInputStream fis = new FileInputStream("employee.dat");`


    `BufferedInputStream bis = new BufferedInputStream(fis); // Chain bis to fis.`


    `int ch = bis.read(); // Read employee.dat through the buffer.`


    `// Additional read() method calls.`


    `bis.close(); // This method call internally calls fis’s close() method.`


    ### DataOutputStream and DataInputStream


    `FileOutputStream` and `FileInputStream` are useful for writing and reading bytes
    and arrays of bytes. However, they provide no support for writing and reading
    primitive-type values (such as integers) and strings.


    For this reason, Java provides the concrete `DataOutputStream` and `DataInputStream`
    filter stream classes. Each class overcomes this limitation by providing methods
    to write or read primitive-type values and strings in an operating system-independent
    way:


    *   Integer values are written and read in big-endian format (the most significant
    byte comes first). Check out Wikipedia’s “Endianness” entry ( [`http://en.wikipedia.org/wiki/Endianness`](http://en.wikipedia.org/wiki/Endianness)
    ) to learn about the concept of endianness.

    *   Floating-point and double precision floating-point values are written and
    read according to the IEEE 754 standard, which specifies four bytes per floating-point
    value and eight bytes per double precision floating-point value.

    *   Strings are written and read according to a modified version of UTF-8, a variable-length
    encoding standard for efficiently storing two-byte Unicode characters. Check out
    Wikipedia’s “UTF-8” entry ( [`http://en.wikipedia.org/wiki/Utf-8`](http://en.wikipedia.org/wiki/Utf-8)
    ) to learn more about UTF-8.


    `DataOutputStream` declares a single `DataOutputStream(OutputStream out)` constructor.
    Because this class implements the `java.io.DataOutput` interface, `DataOutputStream`
    also provides access to the same-named write methods as provided by `java.io.RandomAccessFile`.


    `DataInputStream` declares a single `DataInputStream(InputStream in)` constructor.
    Because this class implements the `java.io.DataInput` interface, `DataInputStream`
    also provides access to the same-named read methods as provided by `RandomAccessFile`.


    Listing [4-8](#A978-1-4842-1565-4_4_Chapter.html#FPar19) presents the source code
    to a `DataStreamsDemo` application that uses a `DataOutputStream` instance to
    write multibyte values to a `FileOutputStream` instance and uses a `DataInputStream`
    instance to read multibyte values from a `FileInputStream` instance.


    Listing 4-8\. Outputting and then Inputting a Stream of Multibyte Values


    `import java.io.DataInputStream;`


    `import java.io.DataOutputStream;`


    `import java.io.FileInputStream;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `public class DataStreamsDemo`


    `{`


    `final static String FILENAME = "values.dat";`


    `public static void main(String[] args)`


    `{`


    `try (FileOutputStream fos = new FileOutputStream(FILENAME);`


    `DataOutputStream dos = new DataOutputStream(fos))`


    `{`


    `dos.writeInt(1995);`


    `dos.writeUTF("Saving this String in modified UTF-8 format!");`


    `dos.writeFloat(1.0F);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `try (FileInputStream fis = new FileInputStream(FILENAME);`


    `DataInputStream dis = new DataInputStream(fis))`


    `{`


    `System.out.println(dis.readInt());`


    `System.out.println(dis.readUTF());`


    `System.out.println(dis.readFloat());`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    `DataStreamsDemo` creates a file named `values.dat`; calls `DataOutputStream`
    methods to write an integer, a string, and a floating-point value to this file;
    and calls `DataInputStream` methods to read back these values.


    Compile Listing [4-8](#A978-1-4842-1565-4_4_Chapter.html#FPar19) as follows:


    `javac DataStreamsDemo.java`


    Run the resulting application as follows:


    `java DataStreamsDemo`


    You should observe the following output:


    `1995`


    `Saving this String in modified UTF-8 format!`


    `1.0`


    Caution


    When reading a file of values written by a sequence of `DataOutputStream` method
    calls, make sure to use the same method-call sequence. Otherwise, you’re bound
    to end up with erroneous data and, in the case of the `readUTF()` methods, thrown
    instances of the `java.io.UTFDataFormatException` class (a subclass of `IOException`).'
  trans: '

    ### BufferedOutputStream 和 BufferedInputStream


    `FileOutputStream` 和 `FileInputStream` 存在性能问题。每次调用文件输出流的 `write()` 方法和文件输入流的 `read()`
    方法，都会导致对底层操作系统函数的一次原生方法调用，而这些原生方法调用会拖慢 I/O 速度。


    具体的 `BufferedOutputStream` 和 `BufferedInputStream` 过滤流类通过最小化底层输出流 `write()` 和底层输入流
    `read()` 方法的调用次数来提升性能。相反，对 `BufferedOutputStream` 的 `write()` 方法和 `BufferedInputStream`
    的 `read()` 方法的调用会考虑 Java 缓冲区：


    *   当写入缓冲区已满时，`write()` 会调用底层输出流的 `write()` 方法来清空缓冲区。随后对 `BufferedOutputStream`
    的 `write()` 方法的调用会将字节存储在此缓冲区中，直到它再次被填满。

    *   当读取缓冲区为空时，`read()` 会调用底层输入流的 `read()` 方法来填充缓冲区。随后对 `BufferedInputStream` 的
    `read()` 方法的调用会从此缓冲区返回字节，直到它再次变空。


    `BufferedOutputStream` 声明了以下构造方法：


    *   `BufferedOutputStream(OutputStream out)` 创建一个缓冲输出流，将其输出流式传输到 `out`。会创建一个内部缓冲区来存储写入
    `out` 的字节。

    *   `BufferedOutputStream(OutputStream out, int size)` 创建一个缓冲输出流，将其输出流式传输到 `out`。会创建一个长度为
    `size` 的内部缓冲区来存储写入 `out` 的字节。


    以下示例将一个 `BufferedOutputStream` 实例链接到一个 `FileOutputStream` 实例。随后对 `BufferedOutputStream`
    实例的 `write()` 方法调用会缓冲字节，并偶尔导致对封装的 `FileOutputStream` 实例的内部 `write()` 方法调用：


    `FileOutputStream fos = new FileOutputStream("employee.dat");`


    `BufferedOutputStream bos = new BufferedOutputStream(fos); // 将 bos 链接`


                                                              `// 到 fos。`


    `bos.write(0); // 通过缓冲区写入 employee.dat。`


    `// 其他 write() 方法调用。`


    `bos.close(); // 此方法调用内部会调用 fos 的 close() 方法。`


    `BufferedInputStream` 声明了以下构造方法：


    *   `BufferedInputStream(InputStream in)` 创建一个缓冲输入流，从 `in` 流式读取其输入。会创建一个内部缓冲区来存储从
    `in` 读取的字节。

    *   `BufferedInputStream(InputStream in, int size)` 创建一个缓冲输入流，从 `in` 流式读取其输入。会创建一个长度为
    `size` 的内部缓冲区来存储从 `in` 读取的字节。


    以下示例将一个 `BufferedInputStream` 实例链接到一个 `FileInputStream` 实例。随后对 `BufferedInputStream`
    实例的 `read()` 方法调用会解除字节缓冲，并偶尔导致对封装的 `FileInputStream` 实例的内部 `read()` 方法调用：


    `FileInputStream fis = new FileInputStream("employee.dat");`


    `BufferedInputStream bis = new BufferedInputStream(fis); // 将 bis 链接到 fis。`


    `int ch = bis.read(); // 通过缓冲区读取 employee.dat。`


    `// 其他 read() 方法调用。`


    `bis.close(); // 此方法调用内部会调用 fis 的 close() 方法。`


    ### DataOutputStream 和 DataInputStream


    `FileOutputStream` 和 `FileInputStream` 对于写入和读取字节及字节数组很有用。然而，它们不支持写入和读取基本类型值（例如整数）和字符串。


    因此，Java 提供了具体的 `DataOutputStream` 和 `DataInputStream` 过滤流类。每个类都通过提供以独立于操作系统的方式写入或读取基本类型值和字符串的方法来克服此限制：


    *   整数值以大端格式（最高有效字节在前）写入和读取。请查阅维基百科的“字节序”条目（ [`http://en.wikipedia.org/wiki/Endianness`](http://en.wikipedia.org/wiki/Endianness)
    ）以了解字节序的概念。

    *   浮点数和双精度浮点数值根据 IEEE 754 标准写入和读取，该标准规定每个浮点数值占用四个字节，每个双精度浮点数值占用八个字节。

    *   字符串根据修改版的 UTF-8 写入和读取，UTF-8 是一种用于高效存储双字节 Unicode 字符的可变长度编码标准。请查阅维基百科的“UTF-8”条目（
    [`http://en.wikipedia.org/wiki/Utf-8`](http://en.wikipedia.org/wiki/Utf-8) ）以了解更多关于
    UTF-8 的信息。


    `DataOutputStream` 声明了一个单一的 `DataOutputStream(OutputStream out)` 构造方法。由于此类实现了
    `java.io.DataOutput` 接口，`DataOutputStream` 还提供了与 `java.io.RandomAccessFile` 提供的同名写入方法相同的访问权限。


    `DataInputStream` 声明了一个单一的 `DataInputStream(InputStream in)` 构造方法。由于此类实现了 `java.io.DataInput`
    接口，`DataInputStream` 还提供了与 `RandomAccessFile` 提供的同名读取方法相同的访问权限。


    清单 4-8 展示了一个 `DataStreamsDemo` 应用程序的源代码，该应用程序使用 `DataOutputStream` 实例将多字节值写入 `FileOutputStream`
    实例，并使用 `DataInputStream` 实例从 `FileInputStream` 实例读取多字节值。


    清单 4-8\. 输出然后输入多字节值流


    `import java.io.DataInputStream;`


    `import java.io.DataOutputStream;`


    `import java.io.FileInputStream;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `public class DataStreamsDemo`


    `{`


    `final static String FILENAME = "values.dat";`


    `public static void main(String[] args)`


    `{`


    `try (FileOutputStream fos = new FileOutputStream(FILENAME);`


    `DataOutputStream dos = new DataOutputStream(fos))`


    `{`


    `dos.writeInt(1995);`


    `dos.writeUTF("Saving this String in modified UTF-8 format!");`


    `dos.writeFloat(1.0F);`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `try (FileInputStream fis = new FileInputStream(FILENAME);`


    `DataInputStream dis = new DataInputStream(fis))`


    `{`


    `System.out.println(dis.readInt());`


    `System.out.println(dis.readUTF());`


    `System.out.println(dis.readFloat());`


    `}`


    `catch (IOException ioe)`


    `{`


    `System.err.println("I/O error: " + ioe.getMessage());`


    `}`


    `}`


    `}`


    `DataStreamsDemo` 创建一个名为 `values.dat` 的文件；调用 `DataOutputStream` 方法向此文件写入一个整数、一个字符串和一个浮点数值；并调用
    `DataInputStream` 方法读回这些值。


    按如下方式编译清单 4-8：


    `javac DataStreamsDemo.java`


    按如下方式运行生成的应用程序：


    `java DataStreamsDemo`


    您应该会看到以下输出：


    `1995`


    `Saving this String in modified UTF-8 format!`


    `1.0`


    警告


    当读取由一系列 `DataOutputStream` 方法调用写入的值文件时，请确保使用相同的方法调用顺序。否则，您必然会得到错误的数据，并且在 `readUTF()`
    方法的情况下，会抛出 `java.io.UTFDataFormatException` 类（`IOException` 的子类）的实例。

