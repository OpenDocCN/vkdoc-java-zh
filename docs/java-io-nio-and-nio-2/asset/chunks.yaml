  raw: '### FilterOutputStream and FilterInputStream


    Byte array, file, and piped streams pass bytes unchanged to their destinations.
    Java also supports filter streams that buffer, compress/uncompress, encrypt/decrypt,
    or otherwise manipulate a stream’s byte sequence (that is input to the filter)
    before it reaches its destination.


    A filter output stream takes the data passed to its `write()` methods (the input
    stream), filters it, and writes the filtered data to an underlying output stream,
    which might be another filter output stream or a destination output stream such
    as a file output stream.


    Filter output streams are created from subclasses of the concrete `FilterOutputStream`
    class, an `OutputStream` subclass. `FilterOutputStream` declares a single `FilterOutputStream(OutputStream
    out)` constructor that creates a filter output stream built on top of `out`, the
    underlying output stream.


    Listing [4-4](#A978-1-4842-1565-4_4_Chapter.html#FPar9) reveals that it’s easy
    to subclass `FilterOutputStream`. At a minimum, you declare a constructor that
    passes its `OutputStream` argument to `FilterOutputStream`’s constructor and override
    `FilterOutputStream`’s `write(int)` method.


    Listing 4-4\. Scrambling a Stream of Bytes


    `import java.io.FilterOutputStream;`


    `import java.io.IOException;`


    `import java.io.OutputStream;`


    `public class` `ScrambledOutputStream` `extends FilterOutputStream`


    `{`


    `private int[] map;`


    `public ScrambledOutputStream(OutputStream out, int[] map)`


    `{`


    `super(out);`


    `if (map == null)`


    `throw new NullPointerException("map is null");`


    `if (map.length != 256)`


    `throw new IllegalArgumentException("map.length != 256");`


    `this.map = map;`


    `}`


    `@Override`


    `public void write(int b) throws IOException`


    `{`


    `out.write(map[b]);`


    `}`


    `}`


    Listing [4-4](#A978-1-4842-1565-4_4_Chapter.html#FPar9) presents a `ScrambledOutputStream`
    class that performs trivial encryption on its input stream by scrambling the input
    stream’s bytes via a remapping operation. This constructor declares two parameters:


    *   `out` identifies the output stream on which to write the scrambled bytes.

    *   `map` identifies an array of 256 byte-integer values to which input stream
    bytes map.


    The constructor first passes its `out` argument to the `FilterOutputStream` parent
    via a `super(out);` call. It then verifies its `map` argument’s integrity (`map`
    must be non-null and have a length of 256; a byte stream offers exactly 256 bytes
    to map) before saving `map`.


    The `write(int)` method is trivial: it calls the underlying output stream’s `write(int)`
    method with the byte to which argument `b` maps. `FilterOutputStream` declares
    `out` to be `protected` (for performance), which is why you can directly access
    this field.


    Note


    It’s only essential to override `write(int)` because `FilterOutputStream`’s other
    two `write()` methods are implemented via this method.


    Listing [4-5](#A978-1-4842-1565-4_4_Chapter.html#FPar11) presents the source code
    to a `Scramble` application for experimenting with scrambling a source file’s
    bytes via `ScrambledOutputStream` and writing these scrambled bytes to a destination
    file.


    Listing 4-5\. Scrambling a File’s Bytes


    `import java.io.FileInputStream;`


    `import java.io.FileOutputStream;`


    `import java.io.IOException;`


    `import java.util.Random;`


    `public class Scramble`


    `{`


    `public static void main(String[] args)`


    `{`


    `if (args.length != 2)`


    `{`


    `System.err.println("usage: java Scramble srcpath destpath");`


    `return;`


    `}`


    `FileInputStream fis = null;`


    `ScrambledOutputStream sos = null;`


    `try`


    `{`


    `fis = new FileInputStream(args[0]);`


    `FileOutputStream fos = new FileOutputStream(args[1]);`


    `sos = new ScrambledOutputStream(fos, makeMap());`


    `int b;`


    `while ((b = fis.read()) != -1)`


    `sos.write(b);`


    `}`


    `catch (IOException ioe)`


    `{`


    `ioe.printStackTrace();`


    `}`


    `finally`


    `{`


    `if (fis != null)`


    `try`


    `{`


    `fis.close();`


