  这会在我们的 AWS 实例中创建代码的结构。


  注意


  代码中的一些数据应由用户添加，特别是 `account-id` 和 `region-id`。当用户创建自己的 AWS 账户时，即可获取所有这些数据。


  这段代码为我们的代码创建了基本的构件。现在，我们可以开始创建项目所需的其他文件了。


  ### 创建基本文件


  我们创建的第一个文件是 `buildspec.yml`。该文件用于定义构建软件所需的所有命令。例如，我们可能会有如下所示的文件：


  ```

  version: 0.2

  phases:

  build:

  commands:

  - echo Build started on `date`

  - echo Run the test and package the code...

  - sbt run

  post_build:

  commands:

  - echo Build completed on `date`

  - sbt package

  artifacts:

  files:

  - core/target/scala-2.11/core_2.11-1.0.0.jar

  ```


  我们可以看到，这个文件使用了 DSL，这是一种用于定义构建每个阶段的特定语言。该文件用于构建我们的项目。你可以看到，我们正在使用 `sbt` 命令来构建我们的
  Scala 项目。


  在 DevOps 中，编写测试是必要的，因此我们创建的第二个文件是一个简单的测试文件。


  ```

  object PracticalScalaDSLTest extends App {

  PracticalScalaDSL.sayHello

  }

  ```


  这段代码非常简单，它从另一个对象中调用了 `sayHello` 方法。这个 Scala 文件就是我们在构建代码时执行的文件。


  现在，我们想要编写能够通过测试的代码。相关代码如下：


  ```

  import scala.language.experimental.macros

  import scala.reflect.macros.Context

  object PracticalScalaDSL {

  def impl(c: Context) = {

  import c.universe._

  c.ExprUnit""")

  }

  def sayHello: Unit = macro impl

  }

  ```


  这段代码使用了 Scala 宏。宏是一种定义代码的新方式，在 Scala 2.10 版本中引入，对于定义 DSL 代码非常有用。宏本质上是一个在编译期间由编译器调用的函数。在我们的案例中，函数
  `impl` 在编译期间被调用并创建。这是 DSL 的另一个用途。我们可以定义不同的函数，但在编译之前不会使用它们。这种技术被称为元编程。


  现在你已经了解了如何在 `sayHello` 函数中调用宏。`macro impl` 这一行本质上就是调用宏的执行。该函数不知道宏具体做什么，只负责调用宏的实现。这可以用于在不同的上下文中定义不同的函数，而这种灵活性正是
  DSL 的精髓所在。


  ### 创建构建文件


  我们现在必须做的是为项目创建 Scala 构建文件。该文件如下：


  ```

  import sbt._

  import Keys._

  object BuildSettings {

  val buildSettings = Defaults.defaultSettings ++ Seq(

  organization := "practical.scaladsl",

  version := "1.0.0",

  scalaVersion := "2.11.8",

  crossScalaVersions := Seq("2.10.2", "2.10.3", "2.10.4", "2.10.5", "2.10.6", "2.11.0",
  "2.11.1", "2.11.2", "2.11.3", "2.11.4", "2.11.5", "2.11.6", "2.11.7", "2.11.8"),

  resolvers += Resolver.sonatypeRepo("snapshots"),

  resolvers += Resolver.sonatypeRepo("releases"),

  scalacOptions ++= Seq()

  )

  }

  object PracticalScalaDSLBuuld extends Build {

  import BuildSettings._

  lazy val root: Project = Project(

  "root",

  file("."),

  settings = buildSettings ++ Seq(

  run = 11 =>

  libraryDependencies.value

  // 在 Scala 2.10 中，准引号由 macro paradise 提供

  case Some((2, 10)) =>

  libraryDependencies.value ++ Seq(

  compilerPlugin("org.scalamacros" % "paradise" % "2.1.0-M5" cross CrossVersion.full),

  "org.scalamacros" %% "quasiquotes" % "2.1.0-M5" cross CrossVersion.binary)

  }

  }

  )

  )

  lazy val core: Project = Project(

  "core",

  file("core"),

  settings = buildSettings

  ) dependsOn(macros)

  }

  ```


  这段代码本质上创建了我们的构建流程，并定义了在云端安装服务所需的一切。该代码本质上是一个特定于构建的大型 DSL。


  ## 最终结论


  你已经了解了如何跨不同平台和需求创建和使用 DSL。本章展示了如何构建云端软件。这可以与微服务协同使用，以部署我们的架构并将其发布到云端。我定义了一些 DevOps
  实践，并展示了如何将这些实践与 DSL 结合使用。至此，我们的旅程就结束了，希望你喜欢。


  现在你明白了，DSL 不仅是一种编程技术，本质上更是一种开发更优质代码的方式。




