- '# 8. 移动开发


  移动开发在日常开发中变得越来越重要。越来越多的公司现在拥有移动开发团队。在本章中，您将学习移动开发的基础知识，以及如何使用 Scala 和 DSL 创建自己的应用程序。


  ## Android 移动开发简介


  Android 是由 Android 公司（后来成为 Google 的子公司）开发的开源操作系统。Android 的特性允许开发者为不同的设备（例如台式计算机或手机）使用相同的源代码。


  Android 不仅仅是一个操作系统，更是一个生态系统。社区为您提供了完整的开发工具。Android 是移动社区的游戏规则改变者。要理解为什么 Android
  对技术社区变得如此重要，有必要了解移动软件发展的历史。


  最初的移动开发基本上基于专有操作系统。在开发方面，所有移动公司都定义并发布了 WAP（无线应用协议），这是一种用于定义网页导航的技术标准。借助 WAP，可以启动移动网页开发。每家公司都发布了
  WAP 浏览器，使开发者能够创建第一个移动网站。诺基亚是第一个改进开发的公司。从诺基亚开始，我们拥有了自己的框架，这使开发者能够创建自己的游戏。继诺基亚之后，其他公司也开发了自己的移动开发库。当然，这些软件是专有的，只能用于相应品牌的手机。


  当 Android 诞生时，它允许开发者在不大量修改代码的情况下，为大量设备创建更好的应用程序。对于 Android 开发，Google 发布了 Android
  Studio，这是一个可以简单方式开发 Android 应用程序的工具。我们将使用此工具来开发我们的 Scala 应用程序，因此，首先我们必须安装 Android
  Studio。




  ### 开始 Android 开发


  要开始 Android 开发，第一步是下载 SDK（软件开发工具包）。新版 Android SDK 与 Android Studio 相关联。Android Studio
  是一款基于 JetBrains IntelliJ 的编辑器。SDK 的下载链接是 [`https://developer.android.com/studio/index.html`](https://developer.android.com/studio/index.html)。


  请为正确的操作系统下载软件，并按照说明安装 Android Studio。当 Android Studio 安装并启动后，您将看到类似图 8-1 的界面。


