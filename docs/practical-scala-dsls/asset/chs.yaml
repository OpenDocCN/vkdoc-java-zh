  \ Parser[Statement] = positioned(variableAssignment | outStatement | ifStatement\
  \ | executeFunction | outStatement) ^^ { a => a }\n//此定义了用于定义变量的保留字 DIM\ndef variableAssignment:\
  \ Parser[VariableDefinition] = \"DIM\" ~> ident ~ \"=\" ~ positioned(executeFunction\
