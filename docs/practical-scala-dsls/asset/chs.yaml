  //此类用于识别鼠标的使用情况，现在我们看到使用了 Mouse 对象，该对象告诉程序哪个按键被按下

  object PointDevice {

  def pressed: Option[(Int, Int)] = Mouse.leftPressed.orElse(Touch.pressed)

