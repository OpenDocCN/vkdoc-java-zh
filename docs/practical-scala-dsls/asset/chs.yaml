  安装该插件，然后重启程序。这将在 Android Studio 上安装 Scala 插件。现在，我们已经准备好创建第一个 Android 项目了。


  要创建一个应用程序，请从启动页面选择“开始新的 Android Studio 项目”链接。这将显示创建项目所涉及的步骤。首先，我们必须指定项目名称和包名（图 8-4）。


