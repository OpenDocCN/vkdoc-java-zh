  \ {\nthis.next = next\nthis.previous = previous\n}\n```\n\n所有这些模式都可以用来创建我们的 AST。它们是创建一棵树的基础，我们可以遍历这棵树来创建我们的语言。为了遍历树，我们可以使用另一种特定的模式。每种模式都有不同的用途。以下是这些模式的简要列表：\n\
