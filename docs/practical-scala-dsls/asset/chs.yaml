  ### Android 应用程序剖析


  首先，要编写我们的代码，我们必须了解 Android 应用程序的结构。我们可以在 Android Studio 项目的左侧看到这个结构（图 8-7）。


  ![A443229_1_En_8_Fig7_HTML.jpg](img/A443229_1_En_8_Fig7_HTML.jpg)


  图 8-7


  Android 应用程序剖析


  我们可以识别出三个主要文件夹。


  *   `manifests`：此文件夹包含 `AndroidManifest.xml`。该文件提供了关于应用程序的基本信息。

  *   `java`：此文件夹包含所有 Java 代码。Android 主要使用 Java 开发。在我们的案例中，Scala 文件也放在这里。

  *   `res`：此文件夹包含应用程序所需的所有非代码文件。在这里，我们可以找到 XML 文件、UI、图形文件等。


  `AndroidManifest.xml` 是每个 Android 应用程序所必需的，用于定义我们应用程序中使用的资源。Android 使用 `Activity`
  来定义一组由我们的应用执行的任务。例如，在我们的基本程序中，您可以找到定义的主活动，如下所示：


  您可以看到，本质上，Android 使用其自己的外部 DSL。当我们读取 XML 时，为了定义活动，我们看到了一些用于定义它的特定工作和操作。这本质上是一个用于解析外部
  DSL 的语法定义。每个应用程序的每个活动对于任务目的都是唯一的。所有活动都继承自 `Activity` 类。这是每个 Android 应用程序的构建块。


  `Activity` 类派生自 `Context` 类。在 Android 中，活动本质上是一个窗口。从我们在应用程序中看到的情况来看，`Context` 是
  Android 应用程序的中央命令中心。大多数应用程序功能都可以直接使用 `Context` 类访问。这本质上是一个抽象类。该类允许访问应用程序的所有资源，例如配置文件等。从这个类，我们可以派生操作系统的所有其他类。




  ## 我们的第一个 Scala-Android 应用


  目前，要创建我们的 Scala Android 应用，我们可以将其命名为 `PracticalScalaDSL`。这是因为之前的项目不能是空项目。为了更好地理解整个过程，最好从一个空项目开始。为此，我们启动
  Android Studio 并创建一个新的空项目（图 8-8）。


