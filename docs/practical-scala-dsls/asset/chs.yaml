  创建好一个空的 Android 项目后，我们可以利用这个项目开始添加 Scala 类，并开发我们的 Scala Android 应用。


  我们首先需要创建一个主窗口来显示简单的“Hello World”。这样，我们就能了解如何使用 Scala 编写 Android 应用。为此，我们右键点击文件夹
  `practicalscaladsl.com.practicalscaladsl`，然后选择新建文件，如图 8-9 所示。


  ![A443229_1_En_8_Fig9_HTML.jpg](img/A443229_1_En_8_Fig9_HTML.jpg)


