  def pressed: Option[(Int, Int)] = leftPressed

  def leftPressed: Option[(Int, Int)] = if(Buttons.leftPressed) Some(position) else
  None

  def rightPressed: Option[(Int, Int)] = if(Buttons.rightPressed) Some(position) else
  None

  }

  //此对象模拟键盘，我们在此基本上重新创建了键盘的所有布局

  //我们使用布尔值定义按键，用于表示按键是否被按下

  object Keyboard {

  var left: Boolean = false

  var right: Boolean = false

  var up: Boolean = false

  var down: Boolean = false

  var space: Boolean = false

  var a: Boolean = false

  var b: Boolean = false

