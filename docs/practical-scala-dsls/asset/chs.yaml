  此方法定义了所有事件，用于定义游戏中触发的所有按键和事件。这使得引擎能够响应按下的按键或鼠标点击。此类结构简单，是 DSL 关键原则的另一个示例：定义的方法可以像普通英语一样阅读。



  ## 结论


  到目前为止，你已经看到了 DSL 在不同领域的应用。我最后讨论的是电子游戏领域。在本章中，我着重强调了 DSL 如何在日常开发中使用，不仅用于定义特定模式或使用特定技术，例如，还可以用通俗易懂的英文为方法和变量命名。DSL
  可以从简单的步骤开始，融入日常开发。我们通过 DSL 能够实现的最重要的改变，就是开始用通俗易懂的英文来思考方法和变量。之后，我们就可以开始改进所涉及的方法和模式。


