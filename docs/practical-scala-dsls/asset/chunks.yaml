- fmt: '# What Is a “Language”?


    By language we mean a syntax that respects a grammar used to define a set of words
    that we can combine to communicate and solve a problem.


    When we define a language, we define a set of rules we can use to define our own
    language structure. This can be used to solve some specific problems.


    We use language every day of our lives when we talk in English or Italian or French.
    We use a set of words connected to respect a specific grammar to build a phrase
    understandable by every person who knows our same syntax and grammar.


    What we write is a programming language. By the term programming language, we
    define a formal language used to define a set of instructions to produce an output.
    Every programming language is normally defined by two components.


    - **Syntax**: How to write the language, what words are basic to the language,
    such as `if… then`, `for loop`, etc.

    - **Semantics**: What the language means, for example, when we write `for` or
    `if then`


    Every programming language is used to solve an algorithm. When we use the language,
    we use the syntax to define a semantic specific to solving a particular algorithm.


    The first step we must take to define our own language is to define the syntax
    we want our language to use. By syntax, we mean all the words and the rules we
    combine to design the semantics of the language.


    For example, we must define reserved words, the words we use specifically for
    the language, for example, to identify the end of the line or if we have an `if`…`else`.


    # Patterns for Designing a Language


    When we design a language, we must consider many of its aspects. We must define
    the grammar, the syntax, and think about how we can translate the input into instructions.


    There are some specific phases we must initiate to correctly translate an input
    into a language.


    1. Recognize the syntax and build the IR, intermediate representation. This is
    done by a reader.

    2. Execute the semantic analysis. This is done through an interpreter.

    3. Generate the language. This uses a translator.

    4. Produce the output.


    All these phases are important when we want to build our own language. As you
    can see, we have essentially three macro components in every phase. This component
    is basic to every language parser. Now, we can try to describe the components.


    - **Reader**: The reader is responsible for building a data structure from the
    input. Essentially, the reader is where the input is translated into a data structure.

    - **Interpreter**: The interpreter walks through the structure created by the
    reader and executes the operation.

    - **Translator**: The translator is a combination of the reader and interpreter.
    Basically, it receives an input and produces an output.


    To implement all the phases, we can use different patterns. The principal pattern
    we can use are recursive descent recognizers. These are used to translate phrases
    and sentences into the basic grammar of the language.


    The most basic and used reader component is the recursive descent lexer. This
    pattern creates a set of tokens from a character that is used to recognize the
    words of the language. This pattern is normally used with the recursive descent
    recognizers to create the parser. Suppose we want to parse an expression. We can
    design the parser in the following way (Figure [7-1](#A443229_1_En_7_Chapter.html#Fig1)).


    ![A443229_1_En_7_Fig1_HTML.jpg](A443229_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. A tree syntax grammar


    Now, we can see that we start from the basic expression `1+4`. This is the first
    input. Next, the expression goes through another step and is split into individual
    parts. At this point, every single character is split into parts, such as operators
    and numbers.


    This pattern is basic to most language parsers, but the starting point of every
    parser is to define the three components of the syntax. The common pattern for
    doing that is called an abstract syntax tree (AST). With an AST, we create a node
    for every important token used in the grammar. The AST is built using the classic
    three-node structure. To create the AST, we can use two different patterns.


    - We can use the parse tree pattern. This pattern describes how to recognize the
    input sentence and parse it. The following diagram (Figure [7-2](#A443229_1_En_7_Chapter.html#Fig2))
    illustrates this. Now you can see how we check the operator. As the numbers descend,
    the parser terminates the start of the operation and applies the operation to
    the number.


    ![A443229_1_En_7_Fig2_HTML.jpg](A443229_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. The parser applied to a specific function, in this case the function
    `+` with the two parameters


    - Another pattern we can use is the homogenous AST. This kind of pattern has a
    simpler implementation than the previous one. In this pattern, we implement an
