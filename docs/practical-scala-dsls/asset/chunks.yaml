    reply in JSON . In our case, we have applied a filter to the microservice. If,
    for example, we were to ask for all languages, all languages would appear in the
    list. Starting from that we can format the response, but that is not within the
    purview of this book. The response can be read by mobile phone or any UI software.


    Now, we can start to design our controller to use the DSL technique. Of course,
    the data source can be a database, for example. The scope of this chapter has
    been to show how we can use DSLs to write our controller, and how this can help
    us to instruct the controller output to read like plain English. This improves
    productivity and, of course, clarifies what the controller does.


    ## Conclusion


    We just created our first simple microservice. Essentially, we built a simple
    service, and we initiated a JSON response to our web service. We used simple method
    chaining to filter results.


    This microservice is just a basic example of what we can do with Play, using only
    a few DSLs. Analyzing the code, we can see external DSLs. This is particularly
    so, because we use a configuration file to define the list of languages that we
    must process.


    We saw how simple it is to create a DSL using the normal development process.
    Basically, we didn’t have to consider using great complexity but only the host
    language, for building the most simple functionality required for the DSL. Creating
    a DSL should not be daunting. DSLs allow us to focus on business and communication,
    so simple functionality can help us to solve domain problems.


    In the following chapters, we will increase the complexity of our DSL. This means
    that we will begin to use more complex patterns and design more complex functionality.


    # 6. User Recognition System


    A common problem in building IT systems is recognizing the user and assigning
    to him or her the correct role. Every system has this kind of functionality, and,
    usually, we use a database to store the data connected to the user.


    What we normally do is connect to a database, execute some query, and, with the
    result of the query, create a parser for understanding the role of the user.


    What we want to do in this chapter is create a free grammar parser for establishing
    our own rules for recognizing the user. This requires that we define our set of
    rules and apply these to the result of the data we’ve gathered. This parse can
    be easily applied to any source, meaning that we can detach the user from a database
    and use a JSON or XML file for storing the user’s data.


    We use the Scala Parser Library to create this parser. This library is perfect
    for a domain specific language, so the best way to master it is to review the
    basics of parsers and begin to write some code.'
