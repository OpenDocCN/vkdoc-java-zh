    object that we can “specialize” for use in the creation of the currency pair.


    The next code we must write is that necessary for defining the currency pair .


    ```

    class CurrencyPair(val accountType:String) extends CurrencyType{

    override def pair(currency_name:String):String ={ currency_name }

    def PIP(): Double={

    val first_currency=pair("USD")

    val second_currency=pair("EUR")

    var returnPIP:Double=0.0

    if (secondary.toString.equalsIgnoreCase("USD")){

    if (accountType.equalsIgnoreCase("MICRO")){

    returnPIP=0.10

    }

    else if (accountType.equalsIgnoreCase("MINI")){

    returnPIP=1

    }

    else if (accountType.equalsIgnoreCase("STANDARD")){

    returnPIP=10

    }

    }

    return returnPIP

    }

    }

    ```


    The preceding code shows how we can define a `CurrencyPair` and define the PIP
    we gain, depending on the account. Now you can see that we use the trait class
    to define the kind of currency pair we want to use in the system.


    The `CurrencyPair` class allows us to create the currency pair and to show some
    features of Scala. The line of code `class CurrencyPair (val accountType:String)
    extends CurrencyType` shows how trait is used. We can see that this simply extends
    the class and overrides the method of the trait. This creates the concrete method
    based on the interface.


    The class then takes care of calculating the value of the PIP of each account,
    depending on the type. By definition, when the secondary currency is the US dollar
    (USD), we can define the default values of the three types of accounts—micro,
    mini, and standard—which are $0.10, $1, and $10.


    This results from the `PIP` method, which does nothing but confirm the type of
    object and then return the value of the PIP.


    ### Improving the Basic Class


    Based on the previous code, we can make some improvements. For example, we can
    create a new class, `Account` , to remove the `if then` and create a better code,
    as follows:


    ```

    trait AccountType{

    def account:Double

    }

    ```


    The first improvement we make is to create another trait to define the account
    type . The account can be of three types: `MICRO`, `MINI`, or `STANDARD`. We can
    use the new trait extending the class that was written previously. In Scala, it
    is possible to have multiple inheritance using the word `with`. Here is the new
    code.


    ```

    class CurrencyPair(accountType:String) extends CurrencyType with AccountType{

    override def pair(currency_name:String):String ={ currency_name }

    override def account(account_type:String):Double={

    if (account_type.equalsIgnoreCase("MICRO")){

    return 0.1

    }else if(account_type.equalsIgnoreCase("MINI")){

    return 1

    }else if(account_type.equalsIgnoreCase("STANDARD")){

    return 10

    }

    }

    def PIP(): Double={

    val first_currency=pair("EUR")

    val second_currency=pair("USD")

    val pip=new account("MINI")

    return pip

    }

    }

    ```


    ### Creating the Order


    The next step is to create an order. This is essentially the basic operation of
    the trading system. The system should be able to create an order using the basic
    parameter, so let’s now create the class.


    ```

    class Order(val pair: CurrencyPair){

    def ask(profit:Int,loss:Int ):Unit={

    println("Profit:"+profit)

    println("Loss:"+loss)

    println("PIP:"+pair.PIP)

    }

    def bid(profit:Int,loss:Int):Uint={

    println("Profit:"+profit)

    println("Loss:"+loss)

    println("PIP:"+pair.PIP)

    }

    }

    ```


    The class is very simple. It has only two methods: one to buy, `ask()`, and one
    to sell, `bind()`. Both methods accept two parameters, `profit` and `loss`.


    Now we can see that the name of the method uses the name defined in the dictionary.
    This is because we want to define a software that can be read like plain English.
    The next step is to create the code for placing an order. To do this, we have
    only to create a variable called `_order`, with a syntax like the following:


    ```

    val _order = new Order(new CurrencyPair("MICRO","EUR","USD")).ask(10,10)

    ```


    The call uses the fluent style. This is essentially a DSL call, but its syntax
    is not exactly good for defining that, because one of the core elements of DSLs
    is how we define the API. The code until now is very basic and somewhat confusing.
    The API is not very clear, and creating a call with it is not as smooth as we
    would like. Of course, we can read it like English, but a good DSL should be very
    simple to read and understand.


    So, what we need to do to have a good DSL is first to design a good API. This
    is not an easy job but is the crucial difference in having a good DSL or not.
    If we see to the actual DSL, for example, the HTML, or the RubyDSL used in Chef,
    we can see a clear and simple definition of some APIs. An API with a clear name
    and documentation helps a developer to write the code. What we need to identify
    now is why and how to write a good API.'
  trans: '

    ### 设计 DSL 系统


    定义了通用字典后，我们就可以开始设计系统，并了解实现它需要什么。设计系统的第一步是确定我们想要使用的规则。我们知道，DSL 可以用来实现一个使用调用的系统，类似于自然语言，我们现在要做的就是定义这些规则并实现它们。


    首先，要设计系统，我们必须了解外汇交易市场是如何运作的。外汇交易市场主要是买卖货币。这是通过特定的平台完成的，这些平台允许客户买卖货币对，例如 EUR/USD（欧元/美元）。盈利或亏损是我们开始持有头寸到平仓时点差（PIP）数量的差值。


    我们可以定义止损或止盈，以便在盈利或亏损一定数量的点差时平仓。当我们在外汇交易系统中下单时，它看起来像下面这样：


    *   以 10 倍**杠杆**买入 1,000 美元 EUR/USD，设置 10 个点的**止盈**和 10 个点的**止损**


    有了可以用来描述我们系统的规则，我们就可以下单买入货币对，定义杠杆、止损和止盈。使用一个命令，我们可以定义系统规则，并基于此定义我们的系统。


    我们想要在系统中实现的规则很简单。


    *   系统必须允许买入货币。

    *   系统必须允许卖出货币。

    *   系统必须能够设置止损。

    *   系统必须能够设置止盈。

    *   系统必须能够定义货币对。

    *   系统必须能够定义杠杆。


    这些定义的规则允许系统精确地创建我们之前定义的那一行代码。我们现在需要做的是定义 DSL 中涉及的对象。


    我们现在可以开始编写定义系统所需的代码。我们需要的第一段代码是用来实现规则的。我们需要一组对象。这些对象可以组合在一起来执行规则。


    ### 实现系统


    第一步是设计定义货币对所需的对象。我们可以定义的第一个对象是货币。货币的代码如下：


    ```

    trait CurrencyType{

    def pair: String

    }

    ```


    我们用上述代码定义的本质上是定义系统中使用的货币的通用方式。这个 trait 的作用域由一个通用对象定义，我们可以“特化”该对象以用于创建货币对。


    接下来我们必须编写的代码是定义货币对所需的代码。


    ```

    class CurrencyPair(val accountType:String) extends CurrencyType{

    override def pair(currency_name:String):String ={ currency_name }

    def PIP(): Double={

    val first_currency=pair("USD")

    val second_currency=pair("EUR")

    var returnPIP:Double=0.0

    if (secondary.toString.equalsIgnoreCase("USD")){

    if (accountType.equalsIgnoreCase("MICRO")){

    returnPIP=0.10

    }

    else if (accountType.equalsIgnoreCase("MINI")){

    returnPIP=1

    }

    else if (accountType.equalsIgnoreCase("STANDARD")){

    returnPIP=10

    }

    }

    return returnPIP

    }

    }

    ```


    上述代码展示了我们如何定义一个 `CurrencyPair`，并根据账户类型定义我们获得的点差。现在你可以看到，我们使用 trait 类来定义我们想在系统中使用的货币对类型。


    `CurrencyPair` 类允许我们创建货币对，并展示 Scala 的一些特性。代码行 `class CurrencyPair (val accountType:String)
    extends CurrencyType` 展示了 trait 是如何使用的。我们可以看到，这简单地扩展了类并覆盖了 trait 的方法。这基于接口创建了具体的方法。


    然后，该类负责根据账户类型计算每个账户的点差值。根据定义，当次要货币是美元（USD）时，我们可以定义三种账户类型的默认值——微型账户、迷你账户和标准账户——分别是
    0.10 美元、1 美元和 10 美元。


    这是 `PIP` 方法的结果，它除了确认对象类型并返回点差值之外，不做其他事情。


    ### 改进基础类


    基于之前的代码，我们可以做一些改进。例如，我们可以创建一个新类 `Account` 来移除 `if then` 语句，并编写更好的代码，如下所示：


    ```

    trait AccountType{

    def account:Double

    }

    ```


    我们做的第一个改进是创建另一个 trait 来定义账户类型。账户可以是三种类型：`MICRO`、`MINI` 或 `STANDARD`。我们可以使用新的 trait
    来扩展之前编写的类。在 Scala 中，可以使用关键字 `with` 实现多重继承。这是新的代码。


    ```

    class CurrencyPair(accountType:String) extends CurrencyType with AccountType{

    override def pair(currency_name:String):String ={ currency_name }

    override def account(account_type:String):Double={

    if (account_type.equalsIgnoreCase("MICRO")){

    return 0.1

    }else if(account_type.equalsIgnoreCase("MINI")){

    return 1

    }else if(account_type.equalsIgnoreCase("STANDARD")){

    return 10

    }

    }

    def PIP(): Double={

    val first_currency=pair("EUR")

    val second_currency=pair("USD")

    val pip=new account("MINI")

    return pip

    }

    }

    ```


    ### 创建订单


    下一步是创建一个订单。这本质上是交易系统的基本操作。系统应该能够使用基本参数创建订单，所以我们现在来创建这个类。


    ```

    class Order(val pair: CurrencyPair){

    def ask(profit:Int,loss:Int ):Unit={

    println("Profit:"+profit)

    println("Loss:"+loss)

    println("PIP:"+pair.PIP)

    }

    def bid(profit:Int,loss:Int):Uint={

    println("Profit:"+profit)

    println("Loss:"+loss)

    println("PIP:"+pair.PIP)

    }

    }

    ```


    这个类非常简单。它只有两个方法：一个用于买入，`ask()`，一个用于卖出，`bind()`。两个方法都接受两个参数，`profit` 和 `loss`。


    现在我们可以看到，方法的名字使用了字典中定义的名字。这是因为我们想要定义一个可以像自然语言一样阅读的软件。下一步是创建用于下单的代码。为此，我们只需要创建一个名为
    `_order` 的变量，语法如下：


    ```

    val _order = new Order(new CurrencyPair("MICRO","EUR","USD")).ask(10,10)

    ```


    这个调用使用了流畅风格。这本质上是一个 DSL 调用，但其语法并不完全适合定义它，因为 DSL 的核心要素之一是我们如何定义 API。到目前为止的代码非常基础，而且有些令人困惑。API
    不是很清晰，用它来创建调用也不像我们期望的那样流畅。当然，我们可以像读英语一样阅读它，但一个好的 DSL 应该非常易于阅读和理解。


    因此，要拥有一个好的 DSL，我们首先需要设计一个好的 API。这不是一件容易的事，但却是决定是否拥有一个好的 DSL 的关键区别。如果我们看看实际的 DSL，例如
    HTML，或者 Chef 中使用的 RubyDSL，我们可以看到一些 API 的清晰而简单的定义。一个具有清晰名称和文档的 API 有助于开发者编写代码。我们现在需要确定的是为什么以及如何编写一个好的
    API。

    '
- fmt: '### Why It Is Important to Design a Good API


    The API is essentially the interface used by the software to communicate with
    the outside world. Designing a good API is the key to having successful software.


    If we design a good API, the API “talks” by itself. If we use a good name to define
    it, or a good interface, it’s easily understandable and simple to use. Designing
    a good API requires rules and experience, so let’s identify some rules that we
    can use when we have to design our API.


    - Use a simple and clear name. The name must be understandable to the people using
    the API. So, if the API is for Forex, the name of the method must be something
    related.

    - Every API must have a specific version. Versioning is the developers’ check
    if the software is compatible or not. Versioning the API can better communicate
    to the developer which features are available and which are not.

    - The API must have good documentation. Good documentation creates good APIs.
    Having good documentation allows the developer who consumes the API to understand
    clearly what the API can or can’t do. Spending time to create good documentation
    is a wise investment.


    These three pillars are essentially the basics for designing and maintaining a
    good API. When we write a DSL, we essentially create a set of APIs to solve a
    specific problem. By adhering to these three pillars, we can rewrite the software
    we have created until now and make it more readable and more DSL-efficient.


    The way to use these three pillars is connected to the user experience and having
    a good plan. The first step we can take to implement the pillars is planning the
    API. Using the common dictionary provides a good start for planning the name of
    the API. Essentially, every API must be one functionality of the system. In our
    case, we must have an API like `PIP`, `BID`, `ASK`, etc.


    Using these names helps us to respect another pillar: the documentation. We can
    use the common dictionary for documentation. Because we have the same name for
    the API we use in the common dictionary, we can use it for documenting the API.
    In essence, the system must respond with a specific functionality described in
    the common dictionary, and to use the API, this is enough.


    The last consideration we must keep in mind is versioning. When we create an API,
    we must understand that we can have different versions of the same API. This can
    be managed, for example, by creating a different end point or by slightly changing
    a name, for example, change that of the package.


    Based on my experience, the best approach is to use the package to manage the
    versioning. This is because every developer can easily identify what he/she needs
    and then import the correct package for the software. Versioning allows us to
    have different versions of the software but one common response. Versioning is
    normally used to resolve an issue or make improvements to software.


    Based on that, we can identify the next steps to improve our code. What we have
    to do is create a version of our API and, of course, improve the interface for
    it, because we want to upgrade our DSL to the next level. When we version an API,
    we essentially create a different end point for it. To do this, we create a new
    package. For example, if we create a structure `practicalscaladsl/v1/api`, a second
    version would be `practicalscaladsl/v2/api`.


    Because we change the package, we create two different versions for the code.
    This is used, for example, when we must update the version of the software, such
    as by adding some functionality, but we want to maintain the old API.


    ## Designing the New DSL API


    To improve the quality of the first version of the DSL code that we started with,
    and respecting the design pillars we just defined, we must update the code. We
    define a version of the code. This helps to manage the improvement and creates
    the API to respect the common dictionary we have defined.


    The first step in creating a good API is to define a package. So, the first modification
    that we make to the code is the definition of the package. In Scala, we can define
    a package with the following code:


    ```

    package com{

    package practicalscala{

    package v1{

    class TradingSystem{

    ......

    }

    }

    }

    }

    ```


    In Scala, we define a package simply by using the reserved word `package`, followed
    by the name of package. In our code, for example, we defined a package `com.practicalscala.v1`.
    When we create a package in Scala, it is not mandatory for the language to create
    the folder structure of the package. In Java, for example, it is mandatory to
    create the same package structure.


    We can now start to rewrite the class `TradingSystem`. What we want to do first
    is define the pair of currencies, so let’s start to create the method `pair` to
    do that.


    ```

    package com {

    package practicalscala {

    package v1 {

    class TradingSystem {

    protected var _pair: String = ""

    def pair(first: String, second: String): this.type  = {

    this._pair = s"$first/$second"

    this

    }

    def execute() ={

    println(_pair)

    }

    }

    }

    }

    }

    ```


    You can see that the method `pair` has been added to the class `TradingSystem`.
    The method only creates the pair and nothing more, but this gives us an idea of
    how we can use the package for versioning. To call the class, we must first import
    the class `TradingSystem`. Of course, because we still use the fluent API, we
    must execute a method to return the value calculated by the class. An interesting
    feature of the preceding code is the string interpolation. In Scala, the char
    `s` before a string tells the interpreter to interpolate it. This is a new feature
    added in Scala 2.10. With the string interpolation, the developer can use variables
    processed by Scala, and their result, to build a string. This is useful when,
    for example, we want the string to change according to the value of some variable’s
    or operation’s result. We can also use operations, in this case the syntax `${
    }`, to define the operation. In our case, we use this functionality to create
    the currency pair. The code `s"$first/$second"` interpolates the string at runtime
    and changes the variables `first` and `second` with the parameter for the method.


    The `_pair` variable is shared in the class. Using a class variable, in this case,
    is `protected`. This means that no method outside the package can be used by the
    variable. This is fine for us, because the package essentially contains only the
    method we want to expose for our DSL. So, let’s consume this first version of
    the API and see the result.


    ### Consuming the First API


    Having written the first API, it is now time to consume it. The main method is


    ```

    import com.practicalscala.v1._

    object TestMain{

    def main(args:Array[String]):Unit ={

    val _pair = new TradingSystem()

    println(_pair.pair("USD","EUR").execute())

    }

    }

    ```


    The code is quite simple. To import the API, we use this line of code: `import
    com.practicalscala.v1._`. There is no significant difference in the Java syntax,
    only that when we want to import all classes of a package in Java, we use the
    `*` (asterisk). In Scala, we use the `_` (underscore). The rest is very simple.
    We create the class `TradingSystem` and call the `pair` method. This returns to
    us the value of the currency pair. If we execute the code, we have a result like
    the following:


    ```

    USD/EUR

    ```


    The next step that we need to take is to improve the API and define the function
    for the Forex trading system. We continue to improve the API with the other method
    and create the method chain we must use to place an order in bid or ask.'
