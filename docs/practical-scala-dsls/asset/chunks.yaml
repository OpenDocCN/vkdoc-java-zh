  trans: '

    ### 改进 JSON 解析器


    为了让解析器的结果更易于人类阅读，我们需要对解析器的结果稍作修改。我们可以使用的最有用的结构是简单的 Scala Map，其中键是 JSON 属性的名称，值是关联的值。


    解析器的第一步现在是在解析整个 JSON 对象时创建一个 Map。该函数的新代码如下所示：


    ```

    def objson: Parser[Map[String, Any]] =

    "{"~> repsep(member, ",") <~"}" ^^ (Map() ++ _)

    ```


    你可以看到我们修改了方法的签名。首先，我们使用了值 `Any`。这意味着我们从解析器返回任意值。在这种情况下，解析器返回一个 `Map[String, Any]`
    类型的值。这告诉解析器将结果转换为一个键为 `string`、值为 `any` 的映射。


    为了实现这种转换，我们使用了一个新的解析器操作符：`^^`。这个操作符转换解析操作的结果。要使用这个操作符，解析器必须具有 `P ^^ r` 的语法。在我们的例子中，我们对
    member 使用了重复控制，这意味着我们有一个在 case class 中转换的结果，并且这启动了转换。


    同时，我们修改了另一个方法来改进解析器。我们修改了 member，如下所示：


    ```

    def member: Parser[(String, Any)] =

    stringLiteral~":"~value ^^

    { case Name~":"~value => (Name, value) }

    ```


    对于另一个方法，我们使用操作符 `^^` 来转换操作的结果。在这种情况下，我们使用模式匹配来选择值 `Name`。整个解析器代码现在看起来像这样：


    ```

    import scala.util.parsing.combinator._

    class ImprovedJsonParser extends JavaTokenParsers {

    def obj: Parser[Map[String, Any]] =

    "{"~> repsep(member, ",")  repsep(value, ",")  (name, value) }

    def value: Parser[Any] = (

    obj

    | array

    | stringLiteral

    | floatingPointNumber ^^ (_.toDouble)

    )

    }

    object ImprovedJsonParserTest extends ImprovedJsonParser {

    def main(args: Array[String]) {

    val reader = "{\n\t\"Username\" : " +

    "[{\"Name\"  : \"Pierluigi Riti\"," +

    "\"Roles\" : [\"Administrator\", \"User\"]," +

    "\"Groups\" : [\"Test1\",\"Test2\"]," +

    "\"Permissions\": [\"All\", \"Read\"]" +

    "}," +

    "{\"Name\" : \"John Smyth\"," +

    "\"Roles\" : [\"User\"]," +

    "\"Groups\" : [\"Test1\"]," +

    "\"Permissions\": [\"Read\"]}]} "

    println(parseAll(value, reader))

    }

    }

    ```


    如果我们执行这段代码，实际上会得到如下结果：


    ```

    Map(

    "Username" -> List(

    Map(

    "Name" -> "Pierluigi Riti", "Roles" -> List("Administrator", "User"),

    "Groups" -> List("Test1", "Test2"),

    "Permissions" -> List("All", "Read")

    ),

    Map(

    "Name" -> "John Smyth",

    "Roles" -> List("User"),

    "Groups" -> List("Test1"),

    "Permissions" -> List("Read")

    )

    )

    )

    ```


    我们可以看到，结果现在比以前的结果更易于人类阅读。我们最终意识到，我们自己的解析器正在使用外部 DSL 来定义它。当我们创建外部 DSL 时，我们有一组可用于生成解析器的模式。例如，我们有一个解析器生成器模式，这正是我们在这里使用的。这种模式使用外部语法来生成语言。外部
    DSL 本质上生成用作外部源的代码。在这种情况下，我们使用一个 JSON 文件。JSON 文件为我们提供了读取和解析以生成代码所需的语法。


    我们可以使用不同的技术来解析文件。在这种情况下，我使用了简短的介绍和一个 JSON，但我们可以使用 DSL 创建更复杂的解析器。例如，我们可以创建一个语法导向的翻译。这种模式通过定义语法，然后使用该语法创建结构化的翻译来翻译源（通常是文本）。例如，当我们将
    EBNF 翻译成软件时，我们就看到了这种模式的使用。我们采用一种语法（EBNF），然后基于该语法生成输入。软件获取语法，然后将源翻译成软件。


    这种解析使用 JSON 格式表示法，这允许我们创建自己的语法。这是因为很容易解析并为我们想要定义的软件创建自己的语法。


    到目前为止，我们学到的知识足以开始创建我们自己的简单解析器，但我们需要知道我们使用了哪些元素来创建解析器（见表 6-2）。


    表 6-2


    用于创建简单 JSON 解析器的解析器操作符


    | 操作符 | 描述 |

    | --- | --- |

    | … | 字面量 |

    | “…”.r | 正则表达式 |

    | P~Q | 组合序列 |

    | P<~Q , P~>Q | 组合序列：仅向左/右移动 |

    | P &#124; Q | 选择：结果为 P 或 Q |

    | opt(P) | 可选：成功时返回 P |

    | rep(P) | 对 P 重复解析 |

    | repsep(P,Q) | 交错重复 |

    | P ^^ f | 结果转换 |


    在上表中，我们看到许多组合子解析器使用符号名称来描述操作，例如 `<~` 或 `^^`。


    这种表示法的巨大优点是编写紧凑，但另一方面，它难以记忆，并且对于经验不足的人来说可能非常晦涩。使用符号名称的一大优点是代码简短，并且可以在解析器本身中实现正确的优先级。


    到目前为止，我们创建的是一个内存解析器。我们可以使用这个解析器来开发一系列方法调用，以在系统上执行操作。例如，我们可以创建该函数并使用它来更新数据库或文件系统中的表。


    ## 结论


    在本章中，你简要了解了 Scala 的解析器组合子库。这个库非常强大，可用于创建同样强大的代码。


    我们仅仅触及了解析器组合子库的表面，但尽管如此，我们仍然能够创建一个强大的解析器，用于读取并在内存中创建另外三个具有代码结构的解析器。


    在下一章中，当我介绍 Scala 解析组合子库的其余部分时，你将看到如何创建更复杂的解析器。


    # 7. 创建自定义语言


    到目前为止，我们已经逐步深入了解了 DSL。在这个阶段，我们能够创建外部和内部 DSL。在本章中，我们将更深入地研究外部 DSL，并开始开发一种自定义语言。


    许多软件都有内部语言。一个例子是 Chef 中用于生成 cookbook 的 RubyDSL。这种语言始于一种 GPL 语言，并通过 DSL 实现成为一种新语言。该语言通常用于解决特定问题。在
    Chef 或 Puppet 的情况下，我们使用一种“新语言”来自动在系统中安装补丁和软件。


    我们创建的语言可以具有我们想到的任何范围。例如，我们可以创建一种专门用于数学的语言，或者用于“复制”另一种语言。在我们的例子中，我们想要创建一种类似于旧版
    BASIC 的语言。


    在本章中，我将讨论创建我们自己的语言的一般规则。当然，我们没有编译器，所以它不会是一种真正的新 GPL 语言。我们想要的是创建一种基于 Scala 的新语言。为此，我们必须学习编写
    AST（抽象语法树），以便在内存中解析命令，然后执行函数。但是，首先，为了开始实现，最好先介绍一点理论。

