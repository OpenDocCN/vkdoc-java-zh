- fmt: '# Deployment and Build in AWS


    As stated, the essence of DevOps is to reduce time to market. So far, you’ve learned
    how to use DSLs and Scala to build and deploy a new service. For doing that now,
    we use AWS CodeBuild.


    `AWS CodeBuild` is a fully built manager in the cloud. With this AWS service,
    it is possible to build our code directly in the cloud. The process follows all
    the CI and CD practices. First, we execute the test, and when the test is passed,
    we compile and release the code. When a company adopts CI and CD for development,
    this reduces and speeds up the release process. This is because, as I’ve noted,
    component is built and tested immediately. One of the best tools for these is
    `Jenkins`. With `Jenkins`, we can create a set build that allows us to run and
    check the status of every single build. Every build is made at the same time we
    release the code, and this helps us to uncover any errors at the time of the build.


    The service is very useful when we have to create a microservice and release it
    in a fast and reliable way. Now, what we want to do is prepare some code and see
    how to use DSL techniques for this.


    Because we are executing the code for the cloud, I suggest using a docker image
    for `sbt`. This is because it is easy to set up and use. Following is the command
    to download the docker image I used:


    ```

    docker pull hseeberger/scala-sbt

    ```


    This has all we need to start our project.


    With the image downloaded, we can start to write some code. In our case, the directory
    structure is very important. The final directory will be like Figure [11-3](#A443229_1_En_11_Chapter.html#Fig3).


    ![A443229_1_En_11_Fig3_HTML.jpg](A443229_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    AWS Scala macro package structure


    This is the structure we use for our first sample code. Now, it is time to start
    to write some code.


    ## Creating the Project in AWS


    First, to create the AWS for the project, we must use the AWS CLI. The code for
    this follows:


    ```

    {

    "name": "chapt_11_practicalscala",

    "source": {

    "type": "S3",

    "location": "codebuild-region-ID-account-ID-input-bucket/PracticalScalaDSL.zip"

    },

    "artifacts": {

    "type": "S3",

    "location": "codebuild-region-ID-account-ID-output-bucket",

    "packaging": "ZIP",

    "name": "PracticalScalaDSLOutput.zip"

    },

    "environment": {

    "type": "LINUX_CONTAINER",

    "image": "scala-image-ID",

    "computeType": "BUILD_GENERAL1_SMALL"

    },

    "serviceRole": "arn:aws:iam::account-ID:role/role-name",

    "encryptionKey": "arn:aws:kms:region-ID:account-ID:key/key-ID"

    }

    ```


    The code can be executed using the following command:


    ```

    aws create-project aws_project.json

    ```


    This creates in our AWS instance the structure of the code.


    Note


    In the code, some data should be added by the user, particularly the `account-id`
    and the `region-id`. All this data can be received when the user creates his or
    her own AWS account.


    This code creates the basic artifact for our code. Now, we can start to create
    the other file necessary for our project.


    ## Creating the Basic Files


    The first file we create is `buildspec.yml`. This file is used to define all the
    commands we use to build our software. For example, we may have a file such as
    the following:


    ```

    version: 0.2

    phases:

    build:

    commands:

    - echo Build started on `date`

    - echo Run the test and package the code...

    - sbt run

    post_build:

    commands:

    - echo Build completed on `date`

    - sbt package

    artifacts:

    files:

    - core/target/scala-2.11/core_2.11-1.0.0.jar

    ```


    We can see that this file uses a DSL, a specific language for defining every state
    of the build. This file is used to build our project. You can see that we are
    using the `sbt` command to build our Scala project.


    In DevOps, it is necessary to write tests, so the next file we create is a simple
    test file.


    ```

    object PracticalScalaDSLTest extends App {

    PracticalScalaDSL.sayHello

    }

    ```


    This code is very simple and calls the method `sayHello` from another object.
    This Scala file is what we execute when we build our code.


    What we want now is to write the code to pass the test. The code for that is


    ```

    import scala.language.experimental.macros

    import scala.reflect.macros.Context

    object PracticalScalaDSL {

    def impl(c: Context) = {

    import c.universe._

    c.Expr[Unit](q"""println("Hello Scala AWS")""")

    }

    def sayHello: Unit = macro impl

    }

    ```


    This code uses Scala macros. Macros, a new way to define code, were introduced
    in Scala version 2.10 and are very useful for defining DSL code. Macros are essentially
    a function called by the compiler during the compilation. In our case, the function
    `impl` is called and created during the compilation. This is another use for the
    DSL. We can define different functions and don’t use them until we compile. This
    technique is called metaprogramming.


    You’ve now seen how to call the macro in the function `sayHello`. The line `macro
    impl` essentially calls the execution of our macro. The function doesn’t know
    what the macro does, only to take care to call the implementation of the macro.
    This can be used to define different functions in different contexts, and this
    flexibility is the essence of DSLs.


    ## Creating the Build File


    What we must do now is create the Scala build file for the project. The file is


    ```

    import sbt._

    import Keys._

    object BuildSettings {

    val buildSettings = Defaults.defaultSettings ++ Seq(

    organization := "practical.scaladsl",

    version := "1.0.0",

    scalaVersion := "2.11.8",

    crossScalaVersions := Seq("2.10.2", "2.10.3", "2.10.4", "2.10.5", "2.10.6", "2.11.0",
    "2.11.1", "2.11.2", "2.11.3", "2.11.4", "2.11.5", "2.11.6", "2.11.7", "2.11.8"),

    resolvers += Resolver.sonatypeRepo("snapshots"),

    resolvers += Resolver.sonatypeRepo("releases"),

    scalacOptions ++= Seq()

    )

    }

    object PracticalScalaDSLBuuld extends Build {

    import BuildSettings._

    lazy val root: Project = Project(

    "root",

    file("."),

    settings = buildSettings ++ Seq(

    run = 11 =>

    libraryDependencies.value

    // in Scala 2.10, quasiquotes are provided by macro paradise

    case Some((2, 10)) =>

    libraryDependencies.value ++ Seq(

    compilerPlugin("org.scalamacros" % "paradise" % "2.1.0-M5" cross CrossVersion.full),

    "org.scalamacros" %% "quasiquotes" % "2.1.0-M5" cross CrossVersion.binary)

    }

    }

    )

    )

    lazy val core: Project = Project(

    "core",

    file("core"),

    settings = buildSettings

    ) dependsOn(macros)

    }

    ```


    This code essentially creates our build process and defines all we need to install
    our service in the cloud. The code is essentially a big DSL specific to the build.


    ## Final Conclusion


    You have seen how to create and use DSLs across different platforms and requirements.
    This chapter showed how to build software made in the cloud. This can be used
    in tandem with the microservice to deploy our architecture and release it in the
    cloud. I defined some DevOps practices and showed, as well, how these can be used
    with a DSL. This concludes our journey, and I hope you have enjoyed it.


    Now you understand that DSLs are not only a programming technique but, essentially,
    a way of developing better code.'
  raw: '## Deployment and Build in AWS


    As stated, the essence of DevOps is to reduce time to market. So far, you’ve learned
    how to use DSLs and Scala to build and deploy a new service. For doing that now,
    we use AWS CodeBuild.


    AWS CodeBuild is a fully built manager in the cloud. With this AWS service, it
    is possible to build our code directly in the cloud. The process follows all the
    CI and CD practices. First, we execute the test, and when the test is passed,
    we compile and release the code. When a company adopts CI and CD for development,
    this reduces and speeds up the release process. This is because, as I’ve noted,
    component is built and tested immediately. One of the best tools for these is
    Jenkins. With Jenkins, we can create a set build that allows us to run and check
    the status of every single build. Every build is made at the same time we release
    the code, and this helps us to uncover any errors at the time of the build.


    The service is very useful when we have to create a microservice and release it
    in a fast and reliable way. Now, what we want to do is prepare some code and see
    how to use DSL techniques for this.


    Because we are executing the code for the cloud, I suggest using a docker image
    for `sbt`. This is because it is easy to set up and use. Following is the command
    to download the docker image I used:


    ```

    docker pull hseeberger/scala-sbt

    ```


    This has all we need to start our project.


    With the image downloaded, we can start to write some code. In our case, the directory
    structure is very important. The final directory will be like Figure [11-3](#A443229_1_En_11_Chapter.html#Fig3).


    ![A443229_1_En_11_Fig3_HTML.jpg](A443229_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    AWS Scala macro package structure


    This is the structure we use for our first sample code. Now, it is time to start
    to write some code.


    ### Creating the Project in AWS


    First, to create the AWS for the project, we must use the AWS CLI. The code for
    this follows:


    ```

    {

    "name": "chapt_11_practicalscala",

    "source": {

    "type": "S3",

    "location": "codebuild-region-ID-account-ID-input-bucket/PracticalScalaDSL.zip"

    },

    "artifacts": {

    "type": "S3",

    "location": "codebuild-region-ID-account-ID-output-bucket",

    "packaging": "ZIP",

    "name": "PracticalScalaDSLOutput.zip"

    },

    "environment": {

    "type": "LINUX_CONTAINER",

    "image": "scala-image-ID",

    "computeType": "BUILD_GENERAL1_SMALL"

    },

    "serviceRole": "arn:aws:iam::account-ID:role/role-name",

    "encryptionKey": "arn:aws:kms:region-ID:account-ID:key/key-ID"

    }

    ```


    The code can be executed using the following command:


    ```

    aws create-project aws_project.json

    ```


    This creates in our AWS instance the structure of the code.


    Note


    In the code, some data should be added by the user, particularly the account-id
    and the region-id. All this data can be received when the user creates his or
    her own AWS account.


    This code creates the basic artifact for our code. Now, we can start to create
    the other file necessary for our project .


    ### Creating the Basic Files


    The first file we create is `buildspec.yml`. This file is used to define all the
    commands we use to build our software. For example, we may have a file such as
    the following:


    ```

    version: 0.2

    phases:

    build:

    commands:

    - echo Build started on `date`

    - echo Run the test and package the code...

    - sbt run

    post_build:

    commands:

    - echo Build completed on `date`

    - sbt package

    artifacts:

    files:

    - core/target/scala-2.11/core_2.11-1.0.0.jar

    ```


    We can see that this file uses a DSL, a specific language for defining every state
    of the build. This file is used to build our project. You can see that we are
    using the `sbt` command to build our Scala project.


    In DevOps, it is necessary to write tests, so the next file we create is a simple
    test file.


    ```

    object PracticalScalaDSLTest extends App {

    PracticalScalaDSL.sayHello

    }

    ```


    This code is very simple and calls the method `sayHello` from another object.
    This Scala file is what we execute when we build our code.


    What we want now is to write the code to pass the test. The code for that is


    ```

    import scala.language.experimental.macros

    import scala.reflect.macros.Context

    object PracticalScalaDSL {

    def impl(c: Context) = {

    import c.universe._

    c.Expr[Unit](q"""println("Hello Scala AWS")""")

    }

    def sayHello: Unit = macro impl

    }

    ```


    This code uses Scala macros. Macros, a new way to define code, were introduced
    in Scala version 2.10 and are very useful for defining DSL code. Macros are essentially
    a function called by the compiler during the compilation. In our case, the function
    `impl` is called and created during the compilation. This is another use for the
    DSL. We can define different functions and don’t use them until we compile. This
    technique is called metaprogramming .


    You’ve now seen how to call the macro in the function `sayHello`. The line `macro
    impl` essentially calls the execution of our macro. The function doesn’t know
    what the macro does, only to take care to call the implementation of the macro.
    This can be used to define different functions in different contexts, and this
    flexibility is the essence of DSLs.


    ### Creating the Build File


    What we must do now is create the Scala build file for the project. The file is


    ```

    import sbt._

    import Keys._

    object BuildSettings {

    val buildSettings = Defaults.defaultSettings ++ Seq(

    organization := "practical.scaladsl",

    version := "1.0.0",

    scalaVersion := "2.11.8",

    crossScalaVersions := Seq("2.10.2", "2.10.3", "2.10.4", "2.10.5", "2.10.6", "2.11.0",
    "2.11.1", "2.11.2", "2.11.3", "2.11.4", "2.11.5", "2.11.6", "2.11.7", "2.11.8"),

    resolvers += Resolver.sonatypeRepo("snapshots"),

    resolvers += Resolver.sonatypeRepo("releases"),

    scalacOptions ++= Seq()

    )

    }

    object PracticalScalaDSLBuuld extends Build {

    import BuildSettings._

    lazy val root: Project = Project(

    "root",

    file("."),

    settings = buildSettings ++ Seq(

    run = 11 =>

    libraryDependencies.value

    // in Scala 2.10, quasiquotes are provided by macro paradise

    case Some((2, 10)) =>

    libraryDependencies.value ++ Seq(

    compilerPlugin("org.scalamacros" % "paradise" % "2.1.0-M5" cross CrossVersion.full),

    "org.scalamacros" %% "quasiquotes" % "2.1.0-M5" cross CrossVersion.binary)

    }

    }

    )

    )

    lazy val core: Project = Project(

    "core",

    file("core"),

    settings = buildSettings

    ) dependsOn(macros)

    }

    ```


    This code essentially creates our build process and defines all we need to install
    our service in the cloud. The code is essentially a big DSL specific to the build.


    ## Final Conclusion


    You have seen how to create and use DSLs across different platforms and requirements.
    This chapter showed how to build software made in the cloud. This can be used
    in tandem with the microservice to deploy our architecture and release it in the
    cloud. I defined some DevOps practices and showed, as well, how these can be used
    with a DSL. This concludes our journey, and I hope you have enjoyed it.


    Now you understand that DSLs are not only a programming technique but, essentially,
    a way of developing better code.'
