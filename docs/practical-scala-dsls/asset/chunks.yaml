    the output of the reader. This code solves the first step of our parser and addresses
    the first requirement of the creation of our own language. The next step is to
    create the translator. This is not a simple class but a branch of the class used
    to translate the language. First, to describe the translator, we must define how
    the code builds the AST.


    ## Defining the Token


    For building the AST in memory, we must define the token used to create the AST.
    This is the first step to translate our code into something else.


    These classes are used to define every single operation we have in our language.
    To build our AST, we start to create the basic class `Expr` and the trait `Statement`,
    as follows:


    ```scala

    import scala.util.parsing.input.Positional

    trait Statement extends Positional

    ```


    The preceding code shows the trait `Statement`. This class is used by the other
    class to generate the token. We thus create a set of classes we can use to parse
    every single operation in the language. A trait in Scala is similar to an interface
    in Java or other languages. In this case, the trait defines an interface we can
    use to define the parser. In this case, we extend a `Positional` method. This
    specific trait is used when we want to define a specific position for an element
    of the language. Imagine, for example, that we want to define an `If`. We must
    have in an exact position the element we want to check. In this case, the trait
    `Positional` helps us to define exactly that.


    We generate a class for every command, for example, the `If` statement is defined
    in this class, as follows:


    ```scala

    package practical.dsl.parsers.model

    case class IfStatement(condition: Condition, trueBranch: List[Statement], falseBranch:
    List[Statement]) extends Statement

    ```


    We can see that the class extends the `Statement` trait and uses a `case` class
    to define the functionality. Using this kind of technique to create the parser
    allows us to create an AST in a simple way. The only class that doesn’t use the
    `Statement` trait is the `Expr` class.


    ```scala

