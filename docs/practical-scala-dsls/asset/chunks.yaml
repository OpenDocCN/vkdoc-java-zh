  trans: '

    ### 数组


    数组是一个可变集合，能够保持元素插入时的顺序。数组中的数据必须属于同一类型。数据不会自动排序，这意味着如果我们创建一个值为 (2,1,3) 的数组，其中的元素将保持该顺序。数组也可以包含重复的值。


    ```

    scala> val myArray:Array[String] = new ArrayString

    myArray: Array[String] = Array(null, null, null, null, null, null, null, null,
    null, null)

    ```


    在上述代码中，定义了一个包含十个字符串元素的空数组。由于我们没有指定具体值，Scala 会用字符串的默认值填充数组，在本例中，该默认值为 `null`。


    我们可以通过数组的索引来访问数组，以读取或修改其中的值。例如，假设我们想要修改数组第一个元素的值，代码如下所示：


    ```

    scala> myArray(0) = "test"

    scala> myArray

    res7: Array[String] = Array(test, null, null, null, null, null, null, null, null,
    null)

    ```


    我们也可以直接通过定义数组元素的方式来创建数组。


    ```

    scala> val myArray_new = Array(1,2,3,4,5,6,5)

    myArray_new: Array[Int] = Array(1, 2, 3, 4, 5, 6, 5)

    ```


    ### 列表


    列表是一个不可变集合。列表会保持元素插入时的顺序，并且与数组类似，只存储同一类型的数据，不过它可以包含重复的值。


    ```

    scala> val myList = List("a","b","c","b")

    myList: List[String] = List(a, b, c, b)

    ```


    列表是一个不可变集合，这意味着无法更新其中的值。事实上，也无法创建一个带有默认值的列表。如果我们尝试更新列表中的某个值，Scala 会返回一个异常。


    ```

    scala> myList(3) = 10

    :13: error: value update is not a member of List[String]

    myList(3) = 10

    ```


    ### 集合


    集合是一个无序的不可变序列。集合不保持元素的插入顺序，并且无法向集合中添加重复元素。如果我们添加了重复元素，集合会自动删除这些重复项。


    ```

    scala> val numbers = Set(1,2,3,4,4,5,3,3,2,1)

    numbers: scala.collection.immutable.Set[Int] = Set(5, 1, 2, 3, 4)

    ```


    ### 元组


    元组是一个简单的逻辑数据集合。我们可以在其中存储数据，例如用户数据，而无需定义类。


    ```

    scala> val servers=("localhost", 80)

    servers: (String, Int) = (localhost,80)

    ```


    可以通过位置索引来访问元组中的元素。元组是一个基于 1 的容器。


    ```

    scala> servers._1

    res0: String = localhost

    ```


    元组可以与模式匹配结合使用，作为 `case` 的条件。如果我们需要创建一个仅包含两个元素的元组，可以使用语法糖 `->`，如下所示：


    ```

    scala> 1 -> 2

    res1: (Int, Int) = (1,2)

    ```


    以下展示了如何在元组中添加两个以上的元素：


    ```

    scala> val users=("Pierluigi","Riti",15,9,1975)

    users: (String, String, Int, Int, Int) = (Pierluigi,Riti,15,9,1975)

    ```


    ### 映射


    映射是一个可迭代的、不可变的键/值对集合。创建映射时，我们使用与创建元组相同的语法。每个元组都是一个键/值对：


    ```

    scala> Map("one" -> 1, "two" -> 2)

    res1: scala.collection.immutable.Map[String,Int] = Map(one -> 1, two -> 2)

    ```


    也可以将一个映射与另一个键关联起来。


    ```

    scala> Map("one" ->Map("one" ->1))

    res2: scala.collection.immutable.Map[String,scala.collection.immutable.Map[String,Int]]
    = Map(one -> Map(one -> 1))

    ```


    ## 总结


    在本章中，我介绍了 Scala 的基本语法。我解释了 Scala 的基础语法，并未深入探讨，只是为了让读者了解如何使用 Scala。在下一章中，我们将更深入地探讨这些基本概念，并且我会介绍与
    DSL 设计和实现相关的其他 Scala 概念。正如我所建议的，学习 Scala 并释放这门语言潜力的最佳方式就是亲自动手使用 REPL。


    # 2. DSL 简介


    DSL（领域特定语言）无处不在。例如，当我们去吃披萨或汉堡时，我们会使用一种“特定”的语言来点餐。DSL 是一种用于特定领域以解决特定问题的语言。


    DSL 与通用语言（例如英语或意大利语）相反。当我们使用 DSL 时，我们实际上是在使用一种通用语言（GPL）。当我们去咖啡店点饮料时，我们使用通用语言（英语）来解决一个领域问题——点单，例如，点一大杯冰镇法布奇诺。而“一大杯冰镇法布奇诺”本质上就是一种
    DSL。


    在本章中，我将阐述 DSL 的关键概念，并提供一些现有 DSL 的示例。


    ## DSL 的定义


    DSL 是一种专门针对特定领域的计算机语言。DSL 本质上与 GPL 相反。我所说的 GPL，是指所有可用于开发软件的语言。例如，Java、C# 和 Scala
    都是 GPL 语言。使用 DSL，我们只想解决特定的领域问题，因此我们专门为这个领域设计语言。DSL 不能在领域之外使用，因为它并非为灵活性而设计。


    在 IT 领域，存在大量的 DSL。一个例子是超文本标记语言（HTML）。这种语言仅在我们设计网页时有效，但如果我们想设计一个图形界面，它就完全无用了。


    我们可以识别出两种 DSL：内部 DSL（或嵌入式 DSL）和外部 DSL。这两种类型的区别在于它们的创建方式。


    ### 内部 DSL 与外部 DSL 的区别


    内部 DSL（或嵌入式 DSL）是在 GPL 内部创建的 DSL，例如，当我们使用 Java 创建一组类来解决一个领域问题时。内部 DSL 对于创建应用程序编程接口（API）非常有用。


    当我们使用嵌入式 DSL 时，我们实际上是在使用 GPL 的一个子集来创建我们的语言，因此，我们失去了与 GPL 相关的所有灵活性。但另一方面，我们可以构建领域专家更易读的软件。这意味着开发者可以更快地解决问题或更改功能。例如，如果我们想解析一个
    Excel 文件，我们可以编写如下代码：


    ```

    LoadFile("C:\file.xls")

    .read_column("A1")

    .read_column("A2")

    .save_CSV("file.csv")

    ```


    这段代码本质上使用了一种 DSL 来从 Excel 文件中读取两列，并将其保存为逗号分隔值（CSV）文件。我们可以使用任何语言来创建这个调用链。如果我们需要更改
    Excel 列，只需使用不同的列值来创建调用链即可。


    外部 DSL 是一种与特定语言无关的 DSL。CSS 或正则表达式就是外部 DSL 的典型例子。


    DSL 的区别不仅在于它们的定义，还在于它们的实现方式。例如，当我们创建外部 DSL 时，我们必须定义一种语言并解析它。相反，当我们创建内部 DSL 时，我们可以创建一个流畅的
    API。这意味着我们可以定义一个特定的模式，该模式可以像流畅接口一样被调用。这个术语由 Eric Evans 和 Martin Fowler 创造，反映了这样一个事实：当我们使用这种模式时，我们实际上是在创建像普通英语一样可读的
    API。


    我们可以将这种模式用于我们的语言，因为它提高了代码的可读性，并有助于实现 DSL 的目标。

