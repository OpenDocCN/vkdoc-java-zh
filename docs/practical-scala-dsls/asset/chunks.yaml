    ### 创建流畅接口


    马丁·福勒（Martin Fowler）描述了一种用于创建 API 调用链的流畅接口，它本质上是一种改变对象调用方式的方法。传统上，在面向对象编程中，如果我们想调用一个对象，会使用如下语法：


    ```

    Student s = new Student("Pierluigi Ri", 2);

    Course c1 = new Course("Programming");

    Course c2 = new Course("Mathematics");

    return new Year(s, c1, c2);

    ```


    可以看到，我们通过一组调用来创建程序，最后将最终对象传入先前创建的对象中。这是每个开发者几乎每天都会用来创建对象的经典技术。


    如果在这个例子中使用方法链，我们可以创建一系列函数。每个函数都会返回对象本身。最终，我们会得到一个完整的对象，其语法如下：


    ```

    Years()

    .student()

    .name("Pierluigi Riti")

    .class(2)

    .course("Programming")

    .course("Mathematics")

    .create()

    ```


    现在这段代码读起来更像普通英语，领域专家也更容易理解。别忘了：DSL 的目标是促进开发者和领域专家之间的沟通。使用 Scala 这样的语言，我们可以用函数代替对象，从而使用福勒所说的函数序列。我们不再使用对象和方法，而只使用函数。借助
    Scala，我们可以运用这种模式，构建出解决实际问题的英语短语。


    ```

    Years()

    Student()

    name("Pierluigi Riti")

    class(2)

    course("Programming")

    course("Mathematics")

    create

    ```


    上述字符串对于领域专家来说简单易读且易于理解。这减少了开发者和领域专家之间产生误解的可能性，当然也提高了软件质量。


    流畅接口的本质在于我们如何思考和设计一个对象。通常，当我们想到一个像盒子一样的对象时，我们只考虑如何与之交互。我们可能会定义一个方法，然后访问该方法，所有这一切都是为了创建一个盒子来解决问题。如果我们使用流畅接口来思考软件，我们就会以不同的方式对待对象。在这种情况下，对象不仅仅是一个黑盒。我们必须思考一种与之交互的新方式。我们必须考虑一组命令和查询。每个命令执行一个动作，在我们的例子中是
    `create`，而每个查询选择一组数据，在我们的例子中是其他函数。以这种方式思考对象，不仅反映了一种定义对象的新方法，更是一种思维转变，尤其能使开发者在内部或外部
    DSL 时以不同的方式思考。


    将对象设计的方法分离为查询和命令并不是定义软件的新方法；它是一种命令式编程的方法论，由伯特兰·迈耶（Bertrand Meyer）详细阐述，并被称为命令-查询分离。命令和查询的分离基于一个简单的想法。


    *   **查询**：返回一个值，但不改变系统状态。它没有副作用，因此非常适合函数式编程。

    *   **命令**：改变系统状态，但不返回任何值。


    这种范式背后的理念是，在改变系统值的函数和仅读取系统状态的方法之间进行清晰划分。由于系统只读取系统的不可变状态，这种范式与流畅接口紧密相关。通过这种模式，我们可以创建一个命令来改变系统状态，最后通过一个查询来检索系统状态，从而遵循流畅
    API 的调用。由于查询本质上没有副作用，因此非常适合函数式编程。命令-查询分离的本质是，每个方法必须返回一个查询或一个命令，并且如果我们不改变初始值，结果永远不会改变。基本上，方法或函数不能有副作用。


    > **注意**

    >

    > 无副作用是每种函数式语言的原则之一。由于 Scala 是一种函数式语言，使用命令-查询分离并不违反这一原则，反而有助于开发者遵守它。


    在设计内部 DSL 时，我们必须考虑使用这一原则，以便更好地隔离函数或方法，并避免副作用。当然，流畅接口和命令-查询分离并不相同。具体来说，流畅接口用于处理对象。相反，命令-查询分离更适合函数。由于
    Scala 同时支持这两种范式，最好定义并阐明如何使用其中一种。在任何情况下，最好使用领域专家能理解的名称来定义函数或方法。

