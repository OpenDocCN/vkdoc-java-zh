    \   Expression\n|      ( Expression )\nCommand ::=    REM string\n|      GOTO\
    \ integer\n|      SUB MAIN block\n|      DIM variable = Expression\n|      PRINT\
    \ Expression\n|      INPUT variable\n|      IF Expression THEN integer\nLine \
    \   ::=    integer Command\nProgram ::=    Line\n|      Line Program\nPhrase \
    \ ::=    Line | RUN | LIST | END\n```\n\nHere, we define every single element\
    \ of our language . Remember: We want to try to re-create a BASIC language, so\
    \ we use the syntax of the elder BASIC. Essentially, we define every single part\
    \ of the language. This definition gives to us the model to create the basis of\
    \ the language.\n\nUsing the grammar described previously, we can write a program\
    \ such as this:\n\n```\nPRINT \"Table of Squares\"\nPRINT\nPRINT \"How many values\
    \ would you like?\"\nINPUT num\n```\n\n## Creating the Language\n\nWith the grammar\
    \ defined, we can start to create our language. First, starting with our language,\
    \ we can identify three major components for our parser.\n\n*   The reader : Essentially,\
    \ the parser in which we define all grammar and reserved words. This creates an\
    \ AST.\n*   The interpreter : This walks the AST created in the reader.\n*   The\
    \ translator : Some Scala classes use this to translate the result of the interpreter\
    \ in an output.\n\nWhen we define the parser, we must use the reserved words of\
    \ the language, so let’s start to create the `Reader` class.\n\n### Creating the\
    \ Reader Class\n\nThe core of our parser is the `Reader` class. This class extends\
    \ the `StandardTokenParsers` of Scala. This is the backbone for our parser. We\
    \ start by creating the reserved words used by the language, as follows:\n\n```\n\
    class Reader extends StandardTokenParsers {\nlexical.reserved += (\"DIM\", \"\
    PRINT\", \"IF\", \"SUB\", \"THEN\", \"FUNCTION\", \"SUB\", \"MAIN\", \"RETURN\"\
    , \"END FUNCTION\")\nlexical.delimiters += (\"*\", \"/\", \"%\", \"+\", \"-\"\
    , \"(\", \")\", \"=\", \"\", \"==\", \"!=\", \"=\", \",\", \":\")\n```\n\nYou\
    \ can see that we first define all the reserved words and delimiters that will\
    \ be used by the Scala parser. These are the words we can use to tokenize our\
    \ language.\n\nAs noted earlier, we can use different techniques to create our\
    \ AST, so we have to define the rules we must apply to our language. These rules\
    \ are used to create the tree we can use later to translate the language. To compile\
    \ the rules, what we need to do is translate the EBFN that we have defined in\
    \ Scala syntax.\n\nThe first rule we want to establish is the entry point for\
    \ our program. In BASIC, this is usually the `SUB MAIN`. The code for this is\
    \ as follows:\n\n```\ndef mainPoint: Parser[Program] = (rep(function)  new Program(f,\
    \ c)\n}\n```\n\nWe can stop for a moment to analyze this first function. We can\
    \ see that this function uses the element that I introduced in Chapter [6](#A443229_1_En_6_Chapter.html).\n\
    \n```\n(rep(function) <~ (\"SUB\" ~ \"MAIN\")) ~ block\n```\n\nThe program has\
    \ a number of functions that can be repeated. After the word `SUB MAIN`, we find\
    \ a block. This is essentially another part of the rules, and it identifies the\
    \ block of code we can write inside the main function. We can now continue to\
    \ write other simple rules for defining the language."
  trans: "\n我们可以使用标准化的异构 AST 来规范化节点。这适用于具有多种节点类型的树，或者当我们希望开发具有多种节点数据类型的同构 AST 时。但所有子节点都可以被规范化。例如，当我们处理更复杂的语言时，会使用同构\
    \ AST。所有解析器都有一个共同点，即我们可以将其定义为 AST。AST 本质上是一棵树——这在编程中并不新鲜。我们如何构建和创建这棵树，就定义了解析器。对于同构\
    \ AST，我们有以下类似的结构：\n\n```\nclass HomogenousAST()\n{\nvar token:ParserToken = null\n\
    var children:List[ParserToken] = null\ndef this(token: ParserToken) {\nthis()\n\
    this.token = token\n}\ndef apply(tokenType: Int) {\nthis.token = new AST(tokenType)\n\
    }\ndef getNodeType: Int = token.`type`\ndef addChild(t: AST): Unit = {\nif (children\
    \ == null) children = new util.ArrayList[AST]\nchildren.add(t)\n}\n}\n```\n\n\
    另一种可用于创建 AST 的模式是不规则异构 AST。这种模式是三种模式中最复杂的，因为它使用了多个节点。这些节点并非都是规则的，并且具有不同的子节点表示形式。这种模式与同构\
    \ AST 的不同之处在于，节点具有名称。通常，这种模式是一个链表。我们可以这样定义该模式：\n\n```\nvar previous:ParserNode\n\
    var next:ParserNode\ndef addingNode(previous:ParserNode, next:ParserNode):Unit\
    \ = {\nthis.next = next\nthis.previous = previous\n}\n```\n\n所有这些模式都可以用来创建我们的\
    \ AST。它们是创建一棵树的基础，我们可以遍历这棵树来创建我们的语言。为了遍历树，我们可以使用另一种特定的模式。每种模式都有不同的用途。以下是这些模式的简要列表：\n\
    \n*   **嵌入式异构树遍历器**：此模式使用递归函数遍历异构 AST。该解析器的伪代码如下所示。在这里，我们可以看到实际节点是从根节点派生出来的，然后我们识别实际节点的操作并执行该操作。之后，我们开始读取实际节点的其他子节点。\n\
    \n```\n    class  extends \n    {\n    def ():Unit = {\n\n}\n    }\n    ```\n\n\
    *   **外部树访问者**：此模式创建一个访问者类，用于遍历树节点。此模式遵循与嵌入式版本相同的逻辑。唯一的区别是代码是外部的，因此我们调用另一个类来执行遍历。我们可以这样定义伪代码：\n\
    \n```\n    trait \n    {\n    def operationNode()\n    def numberNode\n    }\n\
    \    ```\n\n现在我们看到的是一个接口，其中每个部分都定义了一种读取节点的方式。\n*   **树语法**：此模式用于创建外部访问者。此模式本质上定义了外部访问者必须使用的语法。这通常使用\
    \ ANTLR 完成。定义操作的语法示例如下：\n\n```\n    match(operation);\n    match(number);\n  \
    \  match(operation);\n    ```\n\n此语法用于标识解析器所使用的树语法片段。\n*   **树模式匹配器**：此模式用于在找到与模式相关的某个术语时触发一个动作。此模式没有实际的实现，而是一种以图形方式翻译解析器工作方式的方法。当我们为不同的解析器设计语法时，可以看到此模式的一个示例，如图\
    \ 7-4 所示。\n\n![A443229_1_En_7_Fig4_HTML.jpg](img/A443229_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4.\n\n树模式匹配器生成器\n\n当我们想要构建外部 DSL 时，会用到所有这些模式。最终，当我们创建自己的语言时，仍然需要创建一个外部 DSL。我们接收输入并解析它，以生成特定的输出。\n\
    \n## 设计语言\n\n到目前为止，我们已经定义了可用于解析语言的不同模式，但在设计新语言时，我们还需要定义另一个步骤。首先要做出的决定是语言的语法。为了定义语法，我们使用\
    \ EBNF 语言。我们想要设计的语言类似于 BASIC 语言，因此 EBNF 如下所示：\n\n```\nUnary_Op       ::=     -\
    \    |    !\nBinary_Op      ::=     +    |    -    |    *    |    /    |    %\n\
    |      =    |        |    =    |    \n|      &    |    ' | '\nExpression     ::=\
    \     integer\n|      variable\n|      \"string\"\n|      Unary_Op   Expression\n\
    |      Expression   Binary_Op   Expression\n|      ( Expression )\nCommand ::=\
    \    REM string\n|      GOTO integer\n|      SUB MAIN block\n|      DIM variable\
    \ = Expression\n|      PRINT Expression\n|      INPUT variable\n|      IF Expression\
    \ THEN integer\nLine    ::=    integer Command\nProgram ::=    Line\n|      Line\
    \ Program\nPhrase  ::=    Line | RUN | LIST | END\n```\n\n在这里，我们定义了语言的每一个元素。请记住：我们想要尝试重新创建一种\
    \ BASIC 语言，因此我们使用了早期 BASIC 的语法。本质上，我们定义了语言的每一个部分。这个定义为我们提供了创建语言基础模型。\n\n使用前面描述的语法，我们可以编写如下程序：\n\
    \n```\nPRINT \"Table of Squares\"\nPRINT\nPRINT \"How many values would you like?\"\
    \nINPUT num\n```\n\n## 创建语言\n\n定义了语法之后，我们就可以开始创建我们的语言了。首先，从我们的语言开始，我们可以为解析器识别出三个主要组件。\n\
    \n*   **读取器**：本质上，这是定义所有语法和保留字的解析器。它会创建一个 AST。\n*   **解释器**：它遍历在读取器中创建的 AST。\n\
    *   **翻译器**：一些 Scala 类使用它将解释器的结果翻译成输出。\n\n当我们定义解析器时，必须使用语言的保留字，那么让我们开始创建`Reader`类。\n\
    \n### 创建 Reader 类\n\n我们解析器的核心是`Reader`类。这个类继承了 Scala 的`StandardTokenParsers`。这是我们解析器的基础。我们首先创建语言使用的保留字，如下所示：\n\
    \n```\nclass Reader extends StandardTokenParsers {\nlexical.reserved += (\"DIM\"\
