  trans: '

    REST Web 服务天生就是相互独立的。当我们构思和设计服务时，我们只考虑服务本身。我们定义一个或多个与服务通信的动作，并暴露一些端点。这种设计允许开发者无需真正了解其实现细节即可使用
    Web 服务。这样一来，就很容易在不同的上下文中构建和重用 Web 服务。


    REST 架构在设计时考虑了一些约束条件。


    *   **关注点分离**：当我们定义微服务架构时，仍然必须定义客户端-服务器架构。我们必须在应用程序的每一个独立部分之间明确划分职责。

    *   **必须无缓存**：微服务通常构建在 Web 服务器中。这意味着信息可以被缓存以供下次使用，但当我们使用微服务时，必须确保从服务器中移除上一次的信息。

    *   **必须无状态**：当我们设计微服务时，必须确保它是无状态的。这意味着我们不记忆服务的状态。每次调用时，服务都处于一个新的状态。

    *   **服务必须通过统一接口访问**：微服务基于使用 URI（统一资源标识符）的 Web。例如，当我们为端点创建资源时，我们会使用类似 `<server>/user/1`
    这样的方式来标识服务。这为我们架构开启了另一个要点。

    *   **资源应在请求中指明**：例如，当我们请求 `/user` 时，我们指明了必须使用哪个资源以及想要操作哪个资源。

    *   **微服务必须使用超媒体作为应用状态引擎（HATEOAS）**：这个约束是 REST 架构特有的。它意味着客户端只能通过超媒体与服务器交互。客户端无需了解服务器的任何信息。与其他服务器应用程序（如
    SOA 或 CORBA（公共对象请求代理架构））不同，在那些架构中，客户端必须知道使用什么协议与服务器通信，以及需要发送什么类型的信息来启动通信；而在 REST
    中，只有信息对客户端是重要的。客户端通过超媒体发送请求，并请求获得典型的响应结果。这是通过在请求中使用 `content-type` 规范来完成的。


    使用这些约束有助于设计出良好的微服务。如果我们想找出微服务背后的哲学，可以参考 Unix 哲学：“编写只做一件事并且把它做好的程序。”


    ## 使用 Scala 设计微服务


    至此，我已经介绍了一些微服务背后的基本理论，但本书的目标是如何使用 Scala 编写 DSL。所以，现在是时候动手写一些代码了。我们的指导原则是微服务必须允许更好的透明度和通信。DSL
    帮助微服务的消费者增强通信。我们教授 DSL 的方式不仅是一种编写代码的技术，更是一种编写可读性如同纯英文代码的技术。DSL 用于定义微服务的资源，特别是
    DSL 背后的原则，以及在内部编写可读性如同纯英文的代码。


    Scala 有一个用于编写 Web 应用程序的出色框架。我指的是 Play。Play 是一个 MVC 框架，可以在 Java 或 Scala 中使用，因此我们首先要做的就是在我们的机器上安装
    Play。


    ### 安装 Play 框架


    要安装 Play 框架，我们首先必须下载它。要下载该软件，请访问以下网址：[`www.playframework.com/download`](http://www.playframework.com/download)
    。


    开始使用 Play 的最佳方式是下载一个“入门项目”。下载 Scala 项目的 zip 文件（图 5-3）。


    ![A443229_1_En_5_Fig3_HTML.jpg](img/A443229_1_En_5_Fig3_HTML.jpg)


    图 5-3


    从 Play 中选择一个入门项目


    解压文件并打开文件夹。其结构应类似于图 5-4。


    ![A443229_1_En_5_Fig4_HTML.jpg](img/A443229_1_En_5_Fig4_HTML.jpg)


    图 5-4


    Play 模板结构


    要启动一个新的 Play 项目，如果我们处于 Linux 环境中，可以执行以下简单命令：


    ```

    ./sbt run

    ```


    如果我们使用的是 Windows，命令是：


    ```

    sbt.bat run

    ```


    该命令会启动 `sbt` 构建，并下载执行 Play 项目所需的所有文件。


    注意


    SBT（简单构建工具）是一个开源软件，类似于 Maven，用于在 Scala 和 Java 中构建项目。SBT 在 Scala 中被广泛使用，并提供对构建
    Scala 代码的原生支持。这使得它在构建我们的 Scala 项目时成为首选。构建描述符是使用特定的 DSL 用 Scala 编写的。另一个重要特性是与 Scala
    解释器的完全集成，以实现更快的调试。


    当 `sbt` 完成 Scala 项目的构建后，我们可以看到服务器已启动并正在运行。


    ![A443229_1_En_5_Fig5_HTML.jpg](img/A443229_1_En_5_Fig5_HTML.jpg)


    图 5-5


    Play 服务器已启动并正在运行


    ```

    [info] Done updating.

    --- (Running the application, auto-reloading is enabled) ---

    [info] p.c.s.NettyServer - Listening for HTTP on /0:0:0:0:0:0:0:0:9000

    (Server started, use Ctrl+D to stop and go back to the console...)

    ```


    要查看 Play，请打开浏览器并访问网址 `http://localhost:9000`。图 5-6 显示了 Play 站点。


    ![A443229_1_En_5_Fig6_HTML.jpg](img/A443229_1_En_5_Fig6_HTML.jpg)


    图 5-6


    Play 站点已启动并正在运行


    您可以看到 Play 现在已经启动并运行。下一步是创建我们自己的 Web 应用和微服务站点。这个操作非常简单，只需要几个命令。


    首先，我们必须创建要运行项目的文件夹。


    ```

    media practicalscala_dsl

    cd practicalscala_dsl

    ```


    创建文件夹后，我们可以将之前下载的 Play 文件夹中的代码复制到新文件夹中。我们可以使用以下命令运行应用程序：


    ```

    sbt run

    ```


    这将运行我们的站点，我们可以检查一切是否正常工作。


    ### 设计 REST 微服务


    第一步是实现 REST 微服务，当然还有 Web API，以设计每个 HTTP 方法的响应。这有助于定义微服务的资源以及如何与之通信。


    同时，我们创建一个通用字典。这个通用字典不仅可以用于定义资源，还可以同时用于建立开发者和业务之间的通用语言。


    那么，让我们开始为项目定义一些资源。在这种情况下，我们想定义一个用于管理系统持续集成的站点，因此我们需要定义一些基本资源（见表 5-1）。


    表 5-1


    一个简单的资源表，可用于指示系统中的资源


    | 资源 | HTTP 方法 | 响应 |

    | --- | --- | --- |

    | `\Language` | GET | 所有语言的列表 |


    使用 Scala 和 Play 实现这些资源非常容易，因此第一步是打开您偏好的 Scala 编辑器并创建我们的 Play 项目。

