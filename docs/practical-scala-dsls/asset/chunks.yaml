    into an executable software for solving our problem.


    External DSLs are the most powerful of the two types of DSLs. This is because
    they are not restricted by the limitations of the GPL language but can have their
    own grammar and rules for the syntax defined by the developer.


    # 5. Web API and μService


    To this point, I have presented the theory behind DSLs. In this chapter, I discuss
    real use cases for DSLs, starting with the realization of some web APIs and microservices.


    A microservice (μservice) is the new paradigm used in web/cloud development. The
    reason for this lies in the nature of the microservice itself. In this chapter,
    I will show you how to create a microservice with Scala, using DSLs. At the same
    time, you will learn about microservices and how to develop and use them in Scala.'
  trans: '

    ### 什么是解析器？


    要翻译外部领域特定语言（DSL），我们需要在代码中编写一个解析器，但这意味着什么？什么是解析器？通过“解析器”这个术语，我们定义了一种用于将输入翻译成可执行代码的软件。


    当我们创建解析器时，本质上是在两个不同阶段翻译输入：


    *   识别词法分析

    *   应用语法规则


    解析器首先需要识别待解析行的词汇结构。之后，我们必须应用为 DSL 定义的语法规则，并根据语法生成输出。


    为了分离词法分析，我们使用“模式-分隔符-翻译”这一模式。通过这种模式，我们本质上识别出语法中的每一个单词。例如，在前面的代码中，我们有类似这样的内容：


    ```

    ["event" , "code-commit" , "example.cs"]

    ```


    本质上，我们使用输入文件中的单词创建了一些标记，这意味着我们隔离了词法分析器。词法分析器本质上是一种用于执行词法分析的软件，用于从字符串创建标记。标记本质上是字符串或字母的一部分。当我们分割字符串后，可用于隔离词法分析器的模式被称为正则表达式表词法分析器。顾名思义，我们使用一系列正则表达式来创建一个词法分析器。通过这种方式，我们可以轻松地分割字符串并识别输入中的单个单词。


    当我们识别出每一个单词后，就可以开始构建树并应用该语言的语法规则。


    接下来的步骤是检查该行是否符合我们 DSL 的语法。正则语法对我们很重要，因为它定义了翻译的规则。如果我们定义了良好的语法，就可以轻松地使用有限状态机来解析语法。


    使用有限状态机是可行的，因为本质上，有了良好的语法，我们可以根据当前单词识别机器的下一个状态。解析是外部 DSL 的基础。一个好的解析器能让软件具有高度的可维护性。例如，想象一下我们要解析以下状态：


    ```

    event code-commit example.cs

    event code-compile start

    event code-compile end

    command build code

    ```


    解析器的基本函数可以是这样的：


    ```

    def event : Parser[Any] = """CODE-"""".r

    def commit : Parser[Any] = "COMMIT"~string

    def compile : Parser[Any] = "COMPILE"~string

    ```


    这个函数本质上是在 Scala 中定义解析器的基础。状态机本质上是一组在需要翻译代码时被调用的函数。


    对于上下文无关文法（例如我们 DSL 所使用的），翻译和创建状态机的最佳方法是实现一个下推自动机。为了创建这种状态机，我们本质上创建了一个带有内部栈的简单状态机。在第
    6 章中，你将看到如何创建一个完整的解析器。


    ### 使用哪种风格的 DSL


    到目前为止，我们已经了解了两种风格的 DSL。我强调了如何创建其中一种风格，但我们在实现 DSL 时必须做出的最重要决定是选择哪种类型的 DSL。


    做出选择的难点在于信息不足。许多项目在启动时缺乏足够的信息，这会在你需要思考必须选择哪种 DSL 风格时造成问题。


    做出选择时另一个必须考虑的因素是团队技能。如果团队不擅长使用 DSL，那么在这种情况下我们必须考虑学习曲线。乍一看，内部 DSL 比外部 DSL 更容易学习，这是因为编写内部
    DSL 不需要语法，只需定义一组用于解决业务问题的 API。


    另一方面，创建外部 DSL 时，我们必须实现所有用于处理输入并生成输出的解析器。当然，解析器的能力与内部 DSL 不可同日而语，但同时，成本也完全不同。


    最佳方法是循序渐进。如果我们在敏捷环境中工作，可以探索两种方法之间的差异，找出最适合自己的那一种。这可以推动决策，例如，展示什么对你的工作最有利。请记住，一种风格并不排斥另一种。你总是可以混合使用两种风格来解决问题。唯一的限制是你对不同风格的了解程度。


    ## 结论


    通过本章，我结束了对 DSL 理论部分的讨论。本章有意写得简短，因为我不想用更多理论让读者感到不知所措（或厌烦）。从下一章开始，你将看到如何实际创建 DSL。我们将创建一些不同的项目，并利用这些项目来学习如何更有效地创建和使用
    DSL。


    外部 DSL 是 DSL 中最复杂的类型。要创建外部 DSL，我们必须实现自己的语法。这意味着我们必须定义语言的每一个部分。之后，我们必须创建解析器，将我们的语法翻译成可执行的软件来解决我们的问题。


    外部 DSL 是两种 DSL 类型中最强大的。这是因为它们不受通用编程语言（GPL）限制的约束，而是可以拥有由开发者定义的自己的语法和句法规则。


    # 5. Web API 与微服务


    到目前为止，我已经介绍了 DSL 背后的理论。在本章中，我将讨论 DSL 的实际用例，从实现一些 Web API 和微服务开始。


    微服务是 Web/云开发中使用的新范式。其原因在于微服务本身的特性。在本章中，我将向你展示如何使用 DSL 在 Scala 中创建微服务。同时，你将了解微服务以及如何在
    Scala 中开发和运用它们。

    '
- fmt: '# What Is a μService


    The first iteration of a service architecture was service-oriented architecture
    (SOA). When an architect designs an SOA, he or she essentially thinks of the software
    as a service, from which every small part will be combined to build a bigger service.


    When a service in an SOA is defined, normally the architect determines the level
    of granularity of the service. This means how big and how detailed the information
    granted by the service is. The granularity of a service in an SOA defines how
    many entities it involves to return the desired information. To better explain
    this concept, see the following graph (Figure [5-1](#A443229_1_En_5_Chapter.html#Fig1)).


    ![A443229_1_En_5_Fig1_HTML.jpg](A443229_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Dissection of a service


    We can see that to maintain a balance, we must call different entities. The number
    of entities we call defines the kind of granularity the service has. Having a
    small service means having to compose more of that service to obtain the necessary
    information, and this is not always ideal. We create a lot of call in the back
    end to receive the information we need. On the other hand, having different services
    helps when we have to upgrade or change one of the services. If we don’t change
    the interface, the other services basically don’t care about the internal implementation
    of the service.


    When we define a microservice, we still define a service that is loosely coupled.
    This means that the service has less interdependency, less information flow, and
    less coordination.


    Defining a loosely coupled service system has some advantages over a system with
    high dependencies. First, the service has a limited knowledge of the data and
    low interdependency. This means that every service can be developed and used without
    having a big knowledge of the other service, that is, only a basic knowledge of
    the interface of the service we need to use. Having a loose coupling means the
    other service can change internally but doesn’t affect our software.


    A microservice is essentially just an evolution of the SOA. To design a microservice,
    essentially we design a service that is locally coupled. This means that we try
    to reduce the external dependencies on the system to improve the maintenance of
    the system, in case of failure. With a microservice, the system has hundreds of
    small services working together to solve a problem.


    A microservice is a fine-grained service. Every service specializes in one specific
    aspect of the business, as the nature of the service microservice is best for
    designing large systems. The reason is the nature of the service itself: a microservice
    is intended to be small. We can think of it like a piece of Lego. Every service
    is a piece, and together they build a big architecture.


    When we create a microservice, we must design it with three pillars in mind.


    * Communication

    * The team

    * Innovation


    When we design a microservice architecture, it can be represented graphically
    like in Figure [5-2](#A443229_1_En_5_Chapter.html#Fig2).


    ![A443229_1_En_5_Fig2_HTML.jpg](A443229_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Representation of a microservice


    Essentially, when we design the service, we define every single server. Every
    server is isolated and can be connected to a table or another service. The service
    is isolated, like a mini application. Now we can see how to use HTTP to establish
    a connection between the service and the external word.


    ## Communication


    When we design a microservice, we must make sure to have in place the correct
    communication practice—with the team and with other teams—because a microservice
    is a highly specialized service. We must be sure to have the correct communication
    across the team.


    One of the most important principles for ensuring efficient communication is called
    Conway’s Law. This study was presented for the first time in an article by Mel
    Conway, entitled “How Do Committees Invent?” in the Harvard Business Review in
    1967. The most important takeaway from that study is the following:


    > Any organization that designs a system will produce a design whose structure
    is a copy of the organization’s communication structure.


    Reading this simple sentence, we can understand how communication is important
    for design of a quality microservice. If we don’t have good communication across
    the company, it is impossible to design a good service. It is equally true that
    bad communication means bad information sharing and, of course, a bad understanding
    of requirements.


    If in practice we have bad communication, we might have some hidden dependency.
    This is because during meetings to discuss the service, other departments within
    a company can’t reliably explain what they really need from the service. This
    can raise unexpected responses when we start to test the service, which, in turn,
    can translate into more time spent debugging and fixing the issue and, potentially,
    failure of the project.


    We can take the following steps to improve communication:


    * We must understand that it is normal to have separation across the teams. We
    don’t have to fight with that, but we must spend some time working together. We
    must understand the natural difference and leave it at that, but at the same time,
    we must have a common way of communicating and resolving an issue. For example,
    when we design the software, we must discuss with the people responsible for maintaining
    the software in production what they require to solve problems efficiently.

    * Use some communication tools to help improve the way we communicate with each
    other. For example, use tools like Slash or Skype to create virtual meetings,
    when is necessary. These tools reduce barriers and improve communication.

    * Change the decision-making process. When we design and make a decision about
    the software, we must involve all company departments. This means that we must
    take a global decision and change what we think we know about the business. All
    company departments must have in mind the same idea about the business and what
    the final goal is.


    Implementing the correct communication is one of the pillars of designing a good
    microservice.


    ## The Team


    The team is the second pillar for designing a good microservice. If we have a
    big team, for example, 20 or 30 people, it can be difficult to manage and ensure
    good communication in situ. On the other hand, we can really implement a system
    with only five or ten people.


    The best solution, in the latter case, is to use Agile. Every team works with
    a specific microservice and, after that, uses a communication tool to share the
    knowledge. Having a small team work together to share information can yield faster
    releases and better communication across the team. In addition to that, work can
    be managed better, because we can understand daily how the team is doing.


    ## Innovation


    The most important reason for having good communication and a good team structure
    is innovation. A microservice is very good for improving a company’s innovation
    because the nature of a microservice allows a business to have faster improvement
    and to reach its goals more quickly.


    But how do teams and communication help? The answer is simple. Imagine that the
    business has a new idea, born of a new necessity resulting, in turn, from a new
    user requirement. If we have good communication procedures, we can easily design
    a new service, based on the new market requirements.


    Once the proper communication is in place, and the design is complete, it is important
    to have an agile team that can implement the new microservice. With a small team,
    it is easier to distribute work and check improvements daily.


    At the same time, innovation drives knowledge sharing. If a company has made innovations,
    usually the developer and every person involved must increase their knowledge
    about the service. This is positive for the company, because it improves the value
    of the company itself.'
