- fmt: '### Designing a Good DSL


    When we design a DSL, it doesn’t matter if it’s an internal DSL or an external
    DSL. We just have to follow some basic rules to achieve a good result.


    - **Encapsulation**: A good DSL must hide the implementation details of the problem
    by exposing only what is necessary to solve the problem.

    - **Efficiency**: Because the implementation details are hidden, the developer
    should have less work to do when changing the use of the DSL. Of course, to do
    that, the engineer responsible for the creation of the DSL must be careful to
    create the APIs in a good and simple way. To do that, extra care must be given
    to the design of the API and the DSL. Better API design translates into better
    use of the same and reduced work when, for example, a consumer requires an update.
    When a developer uses our DSL, the important thing is for it to have the same
    functionality. This means that when we have to change the API, for example, to
    improve new functionality, we must be careful not to break the actual functionality
    we have implemented. This can be done using the correct level of interface and
    design.

    - **Communication**: Because the DSL is designed for fixing a specific domain
    problem, methods must be given a name that is understandable to the domain expert.
    This means, for a domain expert, that it’s easier to identify a problem in the
    creation of the software.


    Of course, creating a good DSL isn’t easy. To respect all rules, we must write
    code that is well-documented and essentially self-explanatory when we configure,
    for example, the API for the internal DSL. We must be sure to have a good level
    of abstraction, and we must design a good API.


    When we create the DSL, we must identify the domain of the problem and, based
    on that, define a common dictionary capable of solving the problem. What we have
    to do is define the model domain. In this way, it is easier to define a dictionary
    and share this dictionary with the developer. In DSLs, it is essentially the domain
    that drives the definition of the language. Some examples follow:


    - `RubyDSL`, used in Puppet to define the manifest for the configuration

    - `SQL`

    - `HTML`


    These languages are all essentially DSL languages, because they are specific to
    solving one problem and can’t be used to create a general-purpose program.


    ### Analyze the Domain


    When designing DSLs, we must identify the model for the domain we have to use
    for work. Defining the model domain is the basis for defining a correct DSL. When
    we analyze the model domain, essentially, we identify all entities and relations
    connected to the domain. When we have designed and identified the correct entity
    domain, we can start to define a common dictionary for our DSL. A common dictionary
    is necessary to improve the communication and, of course, gain one of the pillars
    for designing a good DSL. The problem domain is the process whereby we identify
    entities and constraints. Identifying these is an exercise we must perform to
    better understand a problem with the domain. When we do this exercise, we figure
    out the common language of the domain, that is, the language we must use for communicating
    with the expert of the domain.


    When we have identified the problem domain, we can define the solution domain.
    The solution domain provides all the tools we can use to solve the problem. After
    the problem is identified and the solution domain established, we can start to
    model the domain.


    Imagine, for example, that we want to identify and model a continuous integration
    system. First, we must identify all the entities and, after that, begin to design
    our system (see Figure [2-1](#A443229_1_En_2_Chapter.html#Fig1)).


    ![A443229_1_En_2_Fig1_HTML.jpg](A443229_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Translating the problem domain into a solution domain


    When we identify the problem domain, we can design the solution domain. The solution
    domain is the architecture of the system. Here, we identify the major components
    we must implement to solve the problem. Based on this, we can design a common
    dictionary for defining a common language for the DSL.


    ### Creating a Common Dictionary


    When we design the solution domain, we essentially identify all entities involved
    in the DSL. The common dictionary is important for identifying the language used
    to talk about the system, like when we go to our favorite coffee shop and ask
    for a cold frappuccino. This is necessary for a mutual understanding of the problem
    by an engineer and businesspeople. This is also important for improving the quality
    of the communication and the quality of the system. It is possible to identify
    some advantages related to the creation of the common dictionary.


    - The common dictionary can be easily used for testing and is the basis for describing
    the test plan. Based on that, we can easily identify the process of the software.

    - The common dictionary is useful for describing the process in plain English
    and, starting with that, the design of the solution domain.

    - The common dictionary can be used by the developer to design software. In the
    common dictionary, we not only define the term but, at the same time, some phrases
    for describing the use of the term.


    When we define a common dictionary, we identify and describe every single entity
    involved in the system. This exercise is useful for helping the developer to understand
    the domain and start the development. Imagine, for example, describing some action
    that must be done from the Continuous Integration (CI) system we want to define.
    The phrase might be: “The Continuous Integration system must connect on Git, download
    the source code for a specific language, and compile it.”


    When we define this phrase, we essentially use a common dictionary and create
    a use case for the software, starting to design our DSL for solving the problem.


    ## Sample DSLs


    Imagine now that we want to write a simple code sample of the DSL to describe
    a Continuous Integration system. The code would look like the following:


    ```

    object ContinousIntegration {

    object Connect { def git = (x: source.type) => x }

    object source { def control = (x: language.type) => x }

    object language { def kind = (x: language.type ) => x}

    object compile { def scala = (x: language.type ) => x }

    implicit def string(s : String) : language.type = language

    def main(args: Array[String]): Unit = {

    Connect git source control language kind "Scala"

    }

    }

    ```


    In this brief short example, a functionality for Continuous Integration is described.
    We have essentially created a set object, then used this object to write a phrase
    that we can read in plain English. In this case, we write “`Connect Git source
    control language kind "Scala"`.” This is essentially the business functionality,
    and it makes it easy to understand whether we’ve made a mistake.


    Scala is fantastic for this, and writing code in this way gives users very clear
    and compact code that is simple to read and maintain.


    Note


    In Scala, the “dot notation” is not mandatory. In the preceding code, we call
    the function without using the dot to call the method. This allows the developer
    to create code that can be read like plain English.


    In the case of a business, an expert can easily read the code we wrote and tell
    where there is an error. In case, there is—in the business logic. This is the
    true power of a DSL. By allowing a business to understand the code, communication
    between the business and engineering teams is greatly improved.


    In this case, we have created an internal DSL. This is because we used a GPL,
    Scala, to define a specific subset of the language, in this case, a representation
    of a CI process. We can see that we wrote an internal DSL to match the defined
    use case story. This is the real power of the DSL. We can easily create a bond
    between the user story and the language we develop, which allows everyone to validate
    our story from the start, with the test case. This reduces bugs and improves the
    quality of the software.'
