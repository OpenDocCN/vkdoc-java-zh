    it is easier to distribute work and check improvements daily.


    At the same time, innovation drives knowledge sharing. If a company has made innovations,
    usually the developer and every person involved must increase their knowledge
    about the service. This is positive for the company, because it improves the value
    of the company itself.'
  trans: '

    ## 什么是微服务


    服务架构的首次迭代是面向服务的架构（SOA）。当架构师设计 SOA 时，他/她本质上将软件视为一项服务，其中的每个小部分都将被组合起来构建一个更大的服务。


    在 SOA 中定义服务时，架构师通常会确定服务的粒度级别。这指的是服务所提供信息的规模和详细程度。SOA 中服务的粒度定义了返回所需信息需要涉及多少个实体。为了更好地解释这个概念，请参见下图（图
    5-1）。


    ![A443229_1_En_5_Fig1_HTML.jpg](img/A443229_1_En_5_Fig1_HTML.jpg)


    图 5-1


    服务的剖析


    我们可以看到，为了保持平衡，我们必须调用不同的实体。我们调用的实体数量定义了服务的粒度类型。服务规模小意味着需要组合更多这样的服务才能获取必要信息，而这并不总是理想的。我们在后端创建了大量调用来获取所需信息。另一方面，当我们需要升级或更改其中一个服务时，拥有不同的服务会有所帮助。如果我们不更改接口，其他服务基本上不关心该服务的内部实现。


    当我们定义微服务时，我们定义的仍然是一个松耦合的服务。这意味着该服务具有更少的相互依赖性、更少的信息流和更少的协调性。


    与高度依赖的系统相比，定义松耦合的服务系统具有一些优势。首先，服务对数据的了解有限，且相互依赖性低。这意味着每个服务都可以在无需深入了解其他服务的情况下进行开发和部署，即只需要了解我们需要使用的服务接口的基本知识。松耦合意味着其他服务可以在内部进行更改，但不会影响我们的软件。


    微服务本质上只是 SOA 的演进。要设计微服务，我们本质上是在设计一个本地耦合的服务。这意味着我们试图减少系统对外部的依赖，以便在发生故障时提高系统的可维护性。使用微服务，系统由数百个小型服务协同工作来解决一个问题。


    微服务是一种细粒度的服务。每个服务专注于业务的某一个特定方面，因为微服务本身的性质最适合设计大型系统。原因在于服务本身的特性：微服务旨在保持小巧。我们可以把它想象成一块乐高积木。每个服务都是一块积木，它们共同构建了一个庞大的架构。


    当我们创建微服务时，必须牢记三个支柱来设计它。


    *   沟通

    *   团队

    *   创新


    当我们设计微服务架构时，可以用图形表示，如图 5-2 所示。


    ![A443229_1_En_5_Fig2_HTML.jpg](img/A443229_1_En_5_Fig2_HTML.jpg)


    图 5-2


    微服务的表示


    本质上，当我们设计服务时，我们定义了每一个独立的服务器。每个服务器都是隔离的，可以连接到一个数据表或另一个服务。该服务是隔离的，就像一个迷你应用程序。现在我们可以看到如何使用
    HTTP 在服务与外部世界之间建立连接。


    ### 沟通


    当我们设计微服务时，必须确保建立正确的沟通实践——无论是在团队内部还是与其他团队之间——因为微服务是一种高度专业化的服务。我们必须确保团队之间沟通顺畅。


    确保高效沟通的最重要原则之一被称为康威定律。这项研究首次出现在梅尔·康威于 1967 年在《哈佛商业评论》上发表的文章《委员会如何发明？》中。该研究最重要的启示如下：


    > 任何设计系统的组织，最终产生的设计方案都将是该组织沟通结构的复制。


    阅读这句简单的话，我们可以理解沟通对于设计高质量微服务的重要性。如果整个公司内部没有良好的沟通，就不可能设计出好的服务。同样，糟糕的沟通意味着糟糕的信息共享，当然也意味着对需求的理解不到位。


    如果在实践中沟通不畅，我们可能会遇到一些隐藏的依赖关系。这是因为在讨论服务的会议中，公司内的其他部门无法可靠地解释他们真正需要从该服务中获得什么。这可能会在我们开始测试服务时引发意想不到的反应，进而转化为花费更多时间调试和修复问题，并可能导致项目失败。


    我们可以采取以下步骤来改善沟通：


    *   我们必须认识到团队之间存在隔阂是正常的。我们不必与之对抗，但必须花一些时间共同协作。我们必须理解这种天然的差异并接受它，但同时，我们必须有一种共同的沟通和解决问题的方式。例如，在设计软件时，我们必须与负责在生产环境中维护软件的人员讨论他们需要什么才能高效地解决问题。

    *   使用一些沟通工具来帮助我们改善彼此之间的沟通方式。例如，在必要时使用像 Slack 或 Skype 这样的工具来创建虚拟会议。这些工具可以减少障碍并改善沟通。

    *   改变决策过程。当我们设计软件并做出决策时，必须让公司所有部门都参与进来。这意味着我们必须做出全局性的决策，并改变我们对业务的既有认知。公司所有部门必须对业务以及最终目标有相同的理解。


    实施正确的沟通是设计优秀微服务的支柱之一。


    ### 团队


    团队是设计优秀微服务的第二个支柱。如果我们有一个大团队，例如 20 或 30 人，那么在现场管理和确保良好沟通可能会很困难。另一方面，我们实际上可以用只有五到十个人的团队来实现一个系统。


    在后一种情况下，最好的解决方案是使用敏捷方法。每个团队负责一个特定的微服务，然后使用沟通工具来分享知识。让一个小团队协作共享信息可以带来更快的发布速度和更好的团队内部沟通。除此之外，工作也能得到更好的管理，因为我们可以每天了解团队的进展。


    ### 创新


    拥有良好的沟通和良好的团队结构，最重要的原因是为了创新。微服务非常有利于提升公司的创新能力，因为微服务的本质允许业务更快地改进并更迅速地达成目标。


    但是团队和沟通如何帮助实现创新呢？答案很简单。想象一下，业务有了一个新想法，这个想法源于新的用户需求所催生的新必要性。如果我们有良好的沟通流程，就可以根据新的市场需求轻松设计出一个新服务。


    一旦建立了适当的沟通，并且设计完成，拥有一个能够实施新微服务的敏捷团队就很重要了。有了小团队，更容易分配工作并每日检查改进情况。


    同时，创新也驱动着知识共享。如果一家公司进行了创新，通常开发人员和每个相关人员都必须增加他们对服务的了解。这对公司来说是积极的，因为它提升了公司自身的价值。

    '
- fmt: '# When to Use Microservices


    The most important decision we must make regarding a microservice is when to use
    it. Microservices are particularly useful when we have to design large systems.
    This is because we can distribute work more efficiently while at the same time
    improving the different areas of the software. This reduces the time it takes
    to release the software to production.


    Microservices are inherently goal-oriented. This means that when we create a microservice,
    we are thinking about solving a specific problem. Every service usually solves
    a specific problem, and these solutions can be combined to solve bigger ones.


    One idea behind a microservice is its replaceability. Because a microservice is
    a very small service, if we have to improve or add some feature to it, it is best
    to replace the entire service rather than maintain or improve the existing one.


    Microservices have some unique features that can help businesses to make better
    decisions.


    - Microservices are small in size.

    - Microservices work with messages.

    - Every microservice is specific for a domain context.

    - Every microservice develops work independently.

    - Microservices can be deployed automatically and released.


    Now, we can see that microservices implement some big things. To some architects,
    a microservice is simply a utopia, allowing many practices to be implemented at
    the same time. In actuality, if we see that these practices are what DevOps solve,
    a company will adopt the DevOps to more easily implement the microservice.


    Another big advantage of adopting a microservice is the scalability of the system.
    This means that the system can grow without issue. What we require, in this case,
    is only to build more microservices. This characteristic of microservices makes
    this kind of architecture ideal when we consider large companies or any company
    that wants to stay aligned with the market.


    # REST Architecture


    Microservices use REST (representational state transfer) architecture to allow
    communication with other services. This means that REST is the basis for designing
    and implementing a good microservice architecture. This is because the client
    doesn’t have to know anything about the structure of the API, only how to communicate
    with it.


    When we create a REST architecture, we think in terms of a “resource.” This means
    that we don’t have to think only of how to use the server and how to respond to
    the service. We don’t really care about how the API is building and what the structure
    is. We just think about how to call the API.


    When we use a REST API, we use four HTTP methods: `GET`, `PUT`, `POST`, and `DELETE`.
    Every REST API uses these methods to activate the API on the server. The client
    makes a call for this HTTP method and sends it back as an HTTP status code. A
    microservice is normally built to be smaller, meaning that when we build, we design
    with the idea of composition and reusability in mind. Because the architecture
    promotes the use of a small service, a microservice is normally used with REST.
    This is the opposite of a SOAP (Simple Object Access Protocol) service. When we
    have an XML-based service, a major difference, in particular, is related to the
    user of the service. With a microservice, the end point is more simple to read
    and call. The other big difference is that building REST architecture requires
    fewer technology resources. Usually, when we use a SOAP, we must have a service
    discovery service, used to get the end point. After, we must translate the WSDL
    (Web Services Description Language) to an interface, and with the interface, the
    method for reading the data.


    The REST API normally uses JSON (JavaScript Object Notation) for communicating.
    Of course, some services use XML, but in general, the system technology is associated
    with JSON. When using a REST service, we call the API, using a JSON structure,
    and process the response. For example, if we must get information about a user,
    we use the HTTP method `GET` to ask for the resource information and get back
    the result. If, for example, we wanted to interrogate a service using CURL, we
    would write the following:


    ```

    CURL -X GET http://myservice/user/1

    ```


    You can see that we use an HTTP method for calling the site. The response from
    the API will be something like this:


    ```

    {

    "id":1

    "name":"Pierluigi"

    "surname":"Riti"

    }

    ```


    This is a simple JSON structure and is the only response the REST API sends to
    the client. We can see that the JSON is a simple text file, in a structure that
    is readable by humans. The REST architecture is the backbone of microservices
    architecture.


    When we talk about a REST architecture, we are referring to an architecture with
    some properties. The features can be summarized as follows:


    - Performance: We design the architecture to be faster and easier to connect to.
    Because we use the status of the HTTP, we can immediately understand the status
    of the response, rather than parsing a WSDL.

    - Scalability: Because the service is designed to be small, we can afford the
    horizontal or vertical scalability, which adds more to the server and deploys
    the service in the server.

    - Simplicity of maintenance: Most REST web services are generally deployed in
    the cloud. This means that in the event of a problem, it is easy to replace the
    broken microservice. In the meantime, because the area of the microservice is
    really restricted, it is easy to isolate and fix the broken code.

    - Portability: Because a microservice is designed to be small and usually is deployed
    in the cloud, data is detached from the service. This means that we can easily
    deploy the service in another server without losing data.'
