- fmt: '# Our First Scala-Android Application


    As of now, to create our Scala Android application, we can call the application
    `PracticalScalaDSL`. This is because the previous project cannot be an empty project.
    For a better understanding of the process, it is preferable to start from an empty
    project. To do that, we start Android Studio and begin a new empty project (Figure
    [8-8](#A443229_1_En_8_Chapter.html#Fig8)).


    ![A443229_1_En_8_Fig8_HTML.jpg](A443229_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Creating a new project with no activity


    Having created an empty Android project, we can use this project to start to add
    our Scala class and develop our Scala Android application.


    What we need to do first is create a Main window to show a simple “Hello World.”
    In this way, we can see how to use Scala to write our Android application. To
    do this, we right-click the folder `practicalscaladsl.com.practicalscaladsl` and
    select the new file, as shown in Figure [8-9](#A443229_1_En_8_Chapter.html#Fig9).


    ![A443229_1_En_8_Fig9_HTML.jpg](A443229_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Creating a new file


    We call the file `MainActivity.scala`, because there is no Scala SDK set up. The
    editor asks us to set up one, as shown in Figure [8-10](#A443229_1_En_8_Chapter.html#Fig10).


    ![A443229_1_En_8_Fig10_HTML.jpg](A443229_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    We are asked to set up the Scala SDK


    Clicking the link Setup Scala SDK ➤ AndroidStudio shows us all the Scala editors.
    Select one for our project, as shown in Figure [8-11](#A443229_1_En_8_Chapter.html#Fig11).


    ![A443229_1_En_8_Fig11_HTML.jpg](A443229_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Adding Scala support


    The first code we wrote is the code to create the main windows. The code is very
    simple and looks like the following:


    ```

    package practicalscaladsl.com.chapter_8

    import android.app.Activity

    import android.os.Bundle

    class MainActivity extends Activity {

    override def onCreate(savedInstanceState: Bundle) {

    super.onCreate(savedInstanceState)

    setContentView(R.layout.main_layout)

    }

    }

    ```


    The code is very simple and easy. We extend the `Activity` class and override
    the function `onCreate`. With this method, we call our layout, in our case, `activity_main.xml`.


    The layout is essentially a resource in Android. We can define the layout in the
    `res` package. It is a simple `.xml` file. This file is created in the folder
    `res`, under the folder layout, as shown in Figure [8-12](#A443229_1_En_8_Chapter.html#Fig12).


    ![A443229_1_En_8_Fig12_HTML.jpg](A443229_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    The folder layout


    The content of this file is very simple.


    ```

    //This code is used to define a TextView, is essentially a view with a text the
    resource we define is basically the kind of layout, how we want the text and the
    text itself

    ```


    This simple file creates the layout. In our case, we add a simple `TextView`,
    an Android component to show text, and define some property of that.


    An Android application defines the `Context` for calling the other resources,
    so we must create another resource file to define that. In this case, in the same
    folder, we create another file, called `content_main`. The content of the file
    follows:


    This file defines the resources we can use in our Android app. These are the basics
    for starting the application. What we want to do now is start the code. To do
