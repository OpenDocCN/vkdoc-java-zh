    of the code itself. It is always easier to maintain a small function than one
    with more than one hundred lines of code.


    In this chapter, you discovered additional Scala functionality, such as the `switch`
    notation and `this.type`, both of which allow us to write simple and efficient
    code, which, of course, is crucial when we want write a good DSL.


    In the next chapter, I will discuss another important topic: games. You will see
    how to build a video game using a DSL.'
  trans: '

    ### 改进 API


    我们为交易系统设计的 API 非常基础。必须向系统添加更多操作。首先要做的调整是定义我们想要的账户类型。这用于计算点值（PIP）。相关代码如下：


    ```

    def account(_type:String):this.type = {

    this._account_value = (_type: @switch) match {

    case "MICRO" => 0.1

    case "MINI" => 1

    case "STANDARD" => 10

    }

    this

    }

    ```


    这段代码设置了 `_account_value` 的值。这是通过使用 `@switch` 注解实现的。这改变了我们使用模式匹配的方式。为此，我们必须导入包
    `scala.annotation.switch`。该注解会将代码编译成 `tableswitch` 或 `lookupswitch`。这提供了更好的性能，因为编译器会在内部将
    switch 语句转换为分支表，而不是决策树。


    从代码中可以看出，`@switch` 注解允许我们创建非常紧凑的决策代码，并将其与变量关联。我们的目标是匹配账户类型与点值（PIP）的任何差异。点值用于计算每笔交易产生的盈亏。


    现在，我们可以按如下方式重写 `main` 方法：


    ```

    object TestMain{

    def main(args:Array[String]):Unit ={

    val _pair = new TradingSystem()

    println(_pair.pair("USD","EUR").account("MINI").execute())

    }

    }

    ```


    我们可以看到，目前 API 的流畅性更好了。接下来，我们定义一个账户、一个货币对，最后执行。如果现在执行，我们会得到以下结果：


    ```

    USD/EUR

    PIP Value:1.0

    ```


    执行结果返回了货币对和点值。现在是时候为我们的系统增加更多复杂性了。


    ### 添加最后的功能


    外汇交易系统需要额外的功能才能完整，所以让我们开始添加更多功能。首先要添加的功能，例如止损或止盈，定义了要投资的资本。


    我们添加的第一个功能是止盈。相关代码如下：


    ```

    def take_profit(pip:Int):this.type ={

    this._pip_profit = pip

    this._max_capital_profit =(this._capital+(this._pip_value * pip))

    this

    }

    ```


    `take_profit` 函数有一个参数 `pip`。这表示在平仓前我们可以接受亏损的点数。在内部，该函数定义了值 `max_capital_profit`。这用于计算新资本并平仓。


    注意


    该函数使用 `this.type` 来定义返回类型。这在 Scala 中用于返回方法的类型。因为我们仍然采用流畅的 API 模式，所以必须明确要返回的类型。使用
    `this.type` 允许函数在运行时返回类型，而无需预先指定返回类型。这在构建 DSL 时非常有用，特别是当我们想要具有多种返回类型的功能时。


    我们可以添加的另一个函数是 `stop_loss`。这用于在亏损过多点数时平仓。该函数如下所示：


    ```

    def stop_loss(pip:Int):this.type  ={

    this._pip_lost = pip

    this._max_capital_lost = (this._capital-(this._pip_value * pip))

    this

    }

    ```


    我们可以看到，该函数与 `take_profit` 类似。最终，两者功能相同：它们都继续为系统添加功能。代码的最终版本如下所示：


    ```

    import scala.annotation.switch

    import scala.math.BigDecimal

    package com {

    package practicalscala {

    package v1 {

    class TradingSystem {

    protected var _pair: String = ""

    protected var _pip_value: BigDecimal = 0.0

    protected var _pip_profit:Int = 0

    protected var _pip_lost:Int = 0

    protected var _start_position:BigDecimal =0.0

    protected var _actual_value:BigDecimal = 0.0

    protected var _capital:BigDecimal = 0

    protected var _max_capital_lost:BigDecimal = 0

    protected var _max_capital_profit:BigDecimal =0

    def pair(first: String, second: String): this.type  = {

    this._pair = s"$first/$second"

    this

    }

    def account(_type:String):this.type = {

    this._pip_value = (_type: @switch) match {

    case "MICRO" => 0.1

    case "MINI" => 1

    case "STANDARD" => 10

    }

    this

    }

    def take_profit(pip:Int):this.type ={

    this._pip_profit = pip

    this._max_capital_profit =(this._capital+(this._pip_value * pip))

    this

    }

    def stop_loss(pip:Int):this.type  ={

    this._pip_lost = pip

    this._max_capital_lost = (this._capital-(this._pip_value * pip))

    this

    }

    def start_position(start_value:Double):this.type ={

    this._start_position=start_value

    this

    }

    def actual_position(actual_value:Double):this.type ={

    this._actual_value=actual_value

    this

    }

    def capital(investment:Int):this.type ={

    this._capital=investment

    this

    }

    def execute() ={

    val _gain=(this._actual_value - this._start_position)

    val _check_profit =((_gain * this._pip_value) + _capital)

    if(_check_profit > _max_capital_profit){

    println("Max Profit gain")

    }else if(_check_profit > _max_capital_lost){

    println("Stop loss gain")

    }

    println("PIP gained:"+_gain)

    println("Actual Capital:"+_check_profit)

    }

    }

    }

    }

    }

    ```


    可以看到，已经导入了 `BigDecimal`。这在 Scala 中用于定义货币类型。由于货币可以有更多小数位数，`BigDecimal` 有助于定义这一点。变化最大的函数是
    `execute`。这本质上是系统的核心。它计算收益并检查利润。如果值符合指定条件，我们就平仓，无论结果是盈利还是亏损。


    现在，让我们看看如何使用外汇交易系统来设置一个同时包含止盈和止损的头寸。


    ```

    import com.practicalscala.v1._

    object TestMain{

    def main(args:Array[String]):Unit ={

    val _pair = new TradingSystem()

    println(_pair.pair("USD","EUR")

    .account("MINI")

    .start_position(1.0455)

    .actual_position(1.0554)

    .stop_loss(10)

    .take_profit(10)

    .capital(10000)

    .execute())

    println(_pair.pair("USD","EUR")

    .account("MINI")

    .start_position(1.0455)

    .actual_position(1.0354)

    .stop_loss(10)

    .take_profit(10)

    .capital(10000)

    .execute())

    }

    }

    ```


    我们创建了一个链式调用来调用方法。我们指定了货币对、账户类型、起始价格（买入货币的价格）、当前价格（更新后的价格）、止损和止盈，最后是资本。


    最后，我们调用 `execute` 来确定头寸的结果是盈利还是亏损。当然，最好是将系统连接到实时外汇市场，让它改变价格。在这种情况下，我们就可以实时使用该系统。


    当我们执行系统时，会得到如下结果：


    ```

    Max Profit gain

    PIP gained:0.0099

    Actual Capital:10000.0099

    Stop loss gain

    PIP gained:-0.0101

    Actual Capital:9999.9899

    ```


    系统计算赚取或亏损的点数，并更新资本。然后，根据点数决定需要做什么来平仓。


    ## 结论


    现在你已经了解了如何使用 DSL 来创建交易系统。这并不复杂；我们只需要重新思考日常工作方式。


    使用 DSL 的一大优势在于代码的可读性极强，并且非常易于理解。另一个小优势在于函数的复杂性。因为我们定义了方法链，所以可以编写非常简单的函数，并将它们连接起来。这使我们能够编写简单的功能，并与其他功能连接来解决大问题，编写简单的函数，并简化代码本身的维护。维护一个小函数总是比维护一个超过一百行代码的函数更容易。


    在本章中，你发现了 Scala 的额外功能，例如 `switch` 注解和 `this.type`，这两者都允许我们编写简单高效的代码，这当然对于编写一个好的
    DSL 至关重要。


    在下一章中，我将讨论另一个重要主题：游戏。你将看到如何使用 DSL 构建一个视频游戏。

    '
- fmt: '# 10. Game Development


    Games are as old as humankind and continue to be important in contemporary societies.
    The first electronic game was `Pong`. A two-dimensional sports game, it essentially
    involved only a ball moving from the left side of the screen and two bars trying
    to stop the ball from scoring points. The first iteration of an electronic game
    dates from 1966.


    Since 1966, the game industry has evolved, and now we can find games with sophisticated
    graphics and gameplay. Now, it is possible even to find games with 3D graphics
    on a mobile phone. In this chapter, you will see how to begin to create a simple
    game engine with Scala. We will create a set of APIs using a DSL. In this way,
    we can create a call for our game in a simple, understandable way.


    ## Game Team Structure


    Working with a DSL means that we create software that can be “read” and understood
    not only by technical folks. To do that, we must know the domain of the problem.


    The first step in understanding a domain is to know the structure and the actor
    involved in our software development. So, in our case, the first step is to understand
    a team game structure. This is important when it comes to designing and defining
    our DSL. We try now to define the different teams and see how they interact with
    each other.


    ### Engineering Team


    The engineering team is responsible for all the engineering work. This means developing
    the game, designing the tools necessary for the game, and maintaining the build.


    Engineers can be divided into two basic categories: runtime engineers, or game
    engineers, the people responsible for developing the game engine itself, and tools
    engineers, those responsible for developing the sets of tools to be used in the
    engine, or by other engineers, to develop the game.


    Generally, these engineering categories also have subcategories. For example,
    there are also AI engineers, who specialize in defining artificial intelligence
    (AI), or graphic engineers, specialists in the graphic interfaces. In recent years,
    other engineering specialties related to games have emerged, such as server engineers.
    These engineers specialize in developing the server side of the game. For more
    and more games, particularly mobile games, the server is a big part of the engine
    driving the game. It is used in cooperation with the client to manage the game.


    All the engineers mentioned work together to build a game. Of course, every type
    of engineer talks a specific language directly connected to the type of job he
    or she does. In the games field creating a good DSL can be crucial for defining
    and promoting good communication across a team. Some companies employ a technical
    director, who is responsible for managing one or more projects, coordinating the
    development, and, sometimes, managing communication across the team. In this context,
    having a good common dictionary for designing the DSL can help the technical director
    to manage that communication and do a better job.


    Like any other software company, some studios have a chief technical officer (CTO).
    This is a higher-level engineer and is essentially an executive position. The
    CTO provides technical direction to all the engineers in a company.


    ### Artist Team


    The artist is another important person necessary for building a good video game.
    Artists, like the engineers, can be divided into several different categories.
    The basic divisions are as follows:


    *   3D artists: These artists work exclusively with 3D, for example, modeling
    the environment and characters in a game.

    *   Environment artists: The artists are responsible for designing the environment
    of the game.

    *   Light artists: Artists specializing in the lighting design for a game

    *   Concept artists: These artists are responsible for designing new games or
    developing new concepts for older ones.

    *   Animators: Artists responsible for animating 3D models and giving “life” to
    game characters

    *   Texture artists: In game design, a model should be very easy, with a very
    low poly (having the fewest possible polygons in a polygon mesh). Improvement
    of the texture in the final design is accomplished by texture artists. These artists
    design textures for the entire game.


    These are only a few varieties of artists. Although there are a lot of different
    artists, generally one works with one of those mentioned. Some other artists are
    relegated to only one phase of the development of a game and are never in direct
    contact with an engineer. However, to talk to each other, roles and responsibilities
    must be defined.


    ### Other Actors Involved


    Realizing a video game requires teamwork. Figures assuming roles other than the
    technical ones I have described are also essential to managing the development
    life cycle.


    #### Producer


    The producer is the person responsible for managing the nontechnical aspects of
    the development, managing tasks, human resources, and helping to remove obstacles
    in the development.


    #### Marketing and Customer Service


    Crucial aspects of a game’s release are marketing and customer service, particularly
    for modern game development for mobile or MMOs (massively multiplayer online games)
    to maintain a correct approach to users, and to help the team driving changes
    in a game to execute their goals. At the same time, marketing is responsible for
    the advertising campaign and promoting the sale of a game.


    #### Game Designer


    The game designer is responsible for the design of the game. Every game has one
    or more game designers responsible for defining all the logic and the story for
    the game. This is an artist role and is crucial for defining a good story. A good
    game design is like a good direction in a film. A good director makes a good film.
    The same is true for a game.


    ## Definition of a Game Engine


    A “game engine” is software used to create a video game. The first time the term
    was used was for the game `Doom`, in the mid-1990s. The game is a first-person
    shooter, or FPS, type, wherein the hero must shoot everything that moves around
    the screen.


    The novelty of `Doom` is the perfect division of the different areas of the game.
    The AI is defined in one part and the 3D graphic programming in another. This
    separation between areas allowed the developer to create an “engine,” part of
    the software that could be reused for another game.


    For example, the area of the code to calculate the physics can be reused. This
    separation created the first game engine. Through the years, many other engines
    were born; for example, `Unity 3D` and `Unreal`. All these engines have in common
    the possibility of creating a game using the common library of the engine. For
    example, the AI has some specific paradigm ready to define the objects and the
    interactions among them.


    Over the years, game engines have evolved and are now used for specific game genres.
    Newer engines for FPS, such as `Unreal`, or for generic 3D purposes, such as `Unity
    3D`, have specific characteristics and, sometimes, a specific language. This means
    that a developer must change engines frequently, making it necessary to re-learn
    the basic syntax.


    The specific game engines for platform or racing games, for example, define some
    specific rules for the physics and interaction between the different objects in
    the game. This creates the need for different libraries. Of course, all the engines
    have some specific characteristics in common, such as the control, but each engine
    is essentially different.


    We can summarize the basic functionality of a game engine as follows:


    *   Renders the object on the screen; can be 2D or 3D

    *   Manages the AI for interactions between objects

    *   Allows use of the control to move the object(s)

    *   Includes some basic physics laws for the game


    These are some generic and minimal guidelines. Every game engine starts with these
    simple rules, with which we can define our game engine.'
