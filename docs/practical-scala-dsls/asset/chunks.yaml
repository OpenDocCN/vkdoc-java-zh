- fmt: '# 1. Introduction to Scala


    Scala has grown in popularity in the last years. Some describe the Scala language
    as the new “golden boy” of programming languages. More large companies have begun
    to adopt Scala for their core business needs, thus improving the popularity of
    the language and, of course, the market for it.


    The popularity of the language is connected to the nature of the language itself.
    Scala borrows more of its syntax from other popular languages. For example, the
    method is declared like C but with optional braces.


    At first glance, Scala looks like a dynamic language, such as Ruby or Python,
    but it is a strong static-type language, with all the advantages of this type.


    Adding to all this, Scala has such features as `for` statement expressions, infix/suffix,
    and local type inference notation.


    The nature of the language is perfect for domain specific languages (DSLs). Scala
    combines functional programming with object-oriented programming. Therefore, with
    Scala, when we must create a DSL, we can rely on a functional language to help
    us to develop an immutable function. On the one hand, this helps to ensure consistent
    results. On the other, most of the patterns used to create a DSL employ an object-oriented
    paradigm, which means that with Scala, we can also have the paradigm for creating
    the DSL.


    In this chapter, I provide a brief introduction to the Scala language and highlight
    the main features of the language. The rest of the book is devoted to improving
    the reader’s knowledge of the language, to create some DSL projects.


    I suggest using the REPL (Read-Evaluate-Print Loop) for use in the sample code
    for this chapter, because it provides immediate feedback about the operation we
    want to execute.


    **Note**


    Since Scala 2.11, the syntax to exit from the REPL has changed. If you have used
    the command `exit()` previously, you will realize that this command is no longer
    valid. Now, to exit, users must employ the `sys.exit()` command.


    ## Basic Syntax


    Scala is basically a strongly typed language, this means that we can annotate
    types for the following:


    * Variable and value

    * Method and function argument

    * Method and function return type


    For many programmers, this is nothing new. Languages such as Java or C# use the
    same kind of syntax. The best way of seeing how to use the syntax is to “get your
    hands dirty.” Therefore, open the REPL and try some basic Scala commands.


    **Note**


    Scala runs on a JVM, but a big difference with Java is how Scala de-allocates
    unused memory. Scala automatically frees memory when data is no longer used.


    To open the REPL, go to the command line and insert the command `scala`. This
    will open the Scala interpreter, as follows:


    ```

    $ scala

    Welcome to Scala 2.12.2 (Java HotSpot(TM) 64-Bit Server VM, Java 1.8.0_131).

    Type in expressions for evaluation. Or try :help.

    scala>

    ```


    At first glance, the REPL looks like the interpreter of the interpreted language,
    such as Ruby or Python, but there is a big difference. Scala is a compiled language,
    which means that the REPL compiles the code and executes first to present the
    result.


    Start writing some code to see how Scala works, such as


    ```

    scala> 2+2

    res0: Int = 4

    ```


    Now, we can see Scala execute the code and create a temporary variable to assign
    the result. However, because Scala is typed, it defines the type of variable,
    in this case `Int`.


    In Scala, the operators `+`, `-`, etc., are a simple function. In this case, writing
    `2 + 2` is equal to having a method with the left operand. The REPL is very useful
    in learning Scala, because it provides immediate feedback regarding the operation.


    ## Variable and Value in Scala


    With Scala, we can define two kinds of variables:


    * A mutable variable, which is created with the reserved word `var`

    * An immutable value, created with the reserved word `val`


    This is probably the biggest difference from other languages. In Scala, it is
    highly advisable to use the immutable variable `val`, because this doesn’t break
    the rule of functional programming. I will discuss this rule later in the chapter.


    The syntax for creating a variable or a value is the same: `<kind> <name> : <type>
    = <value>`. Now try the variable with the REPL and note the difference between
    a mutable and immutable variable. The first type of variable we declare is the
    mutable variable, declared with `var`.


    ```

    scala> var num:Int = 4

    num: Int = 4

    scala> num = 8

    num: Int = 8

    ```


    Here, as you can see, we create a variable and assign the value of the variable.
    In this case, we define the type of the variable. We can change the value simply
    by calling the variable and assigning the new value. There is no difference in
    how this is done in other languages.


    ```

    scala> num * 2

    res0: Int = 8

    scala> res0 + 2

    res1: Int = 10

    ```


    The statement that follows is perfectly valid. In the event that we have not assigned
    the name of the variable, Scala creates a temporary variable and associates the
    result with this variable. In this way, we can easily use the temporary variable
    to execute some other operations. Try to see now how an immutable variable works.


    ```

    scala> val new_num = 4

    new_num: Int = 4

    scala> new_num = 8

    <console>:12: error: reassignment to val

    new_num = 8

    ```


    In this case, we created a variable `new_num`, but we haven’t explicitly specified
    a type. Scala inspects and assigns the correct type. The process for creating
    the `val` is exactly the same as for creating a `var`. The only difference is
    that if we try to reassign the value, we obtain an error. For many developers,
    it can be strange to use an immutable variable instead of a mutable variable,
    but if you look at your code, you can see how simple it is to replace the mutable
    variable with an immutable one.


    ## Naming in Scala


    Scala allows you to name a variable with any letter, number, or some special operator
    characters. According to the following from the Scala Language Specification,
    we learn how to define these operator characters:


    > …all other characters in \u0020-007F and Unicode categories Sm [Symbol/Math]…except
    parentheses ([]) and periods.


    Following are some rules for combining letters, numbers, and characters when naming
    identifiers in Scala:


    * A letter followed by zero or more letters or digits, for example, `var a`, `var
    AabcdA`, `var a1b`

    * A letter followed by zero or more digits, underscores (`_`), or letters, for
    example, `var a_b` or `val a_ = 10`

    * An underscore (`_`) followed by zero or more letters or digits, for example,
    `var _abcd_`


    ### First Example in Scala


    Now try to write a simple bubble sort algorithm in Scala.


    ```

    def bubbleSort(arr_input: Array[Int]): Array[Int] = {

    val size = arr_input.size - 1

    for (a <- 1 to size) {

    for (b <- size to a by -1) {

    if (arr_input(b) < arr_input(b - 1)) {

    val x = arr_input(b)

    arr_input(b) = arr_input(b - 1)

    arr_input(b - 1) = x

    }

    }

    }

    arr_input

    }

    ```


    This simple example shows some Scala functionality. First, we see how to use an
    immutable variable instead of a mutable one. Starting with this simple example,
    we can define the principal Scala syntax.'
