    import scala.util.parsing.input.Positional

    class Expr extends Positional

    case class Number(value: Int) extends Expr

    case class Operator(op: String, var left: Expr, var right: Expr) extends Expr

    case class Identifier(name: String) extends Expr

    ```


    This class is used to define every operation in the language. We define the `Number`,
    the `Operator`, and the `Identifier`. The `Expr` class extends the `Positional`
    trait. This trait gives the position of the object. Essentially, we can identify
    the object of every single object in the code. This is useful if we want to translate
    the software in an operation.'
