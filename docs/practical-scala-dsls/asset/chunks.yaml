- fmt: "### Creating a Fluent Interface\n\nA fluent interface for creating a chain\
    \ of API calls was described by Martin Fowler and is essentially a way to change\
    \ how to call an object. Traditionally, in object-oriented programming, if we\
    \ want to call an object, we use a syntax such as the following:\n\n```\nStudent\
    \ s = new Student(\"Pierluigi Ri\", 2);\nCourse c1 = new Course(\"Programming\"\
    );\nCourse c2 = new Course(\"Mathematics\");\nreturn new Year(s, c1, c2);\n```\n\
    \nYou can see that we create the program using a set of calls, and, at the end,\
    \ the final object is passed in the previously created objects. This is the classic\
    \ technique every developer uses essentially every day to create objects.\n\n\
    If we were to use method chaining for this example, we could create a series of\
    \ functions. Every function would return the object itself. In the end, we would\
    \ have one complete object, the syntax of which would be the following:\n\n```\n\
    Years()\n.student()\n.name(\"Pierluigi Riti\")\n.class(2)\n.course(\"Programming\"\
    )\n.course(\"Mathematics\")\n.create()\n```\n\nThe code now can be read more like\
    \ plain English and is much easier to understand by a domain expert. Don’t forget:\
    \ The aim of a DSL is to allow the communication between a developer and domain\
    \ expert. With a language such as Scala, we can use a function instead of an object,\
    \ so we can use what Fowler defines as a function sequence. We don’t use an object\
    \ and a method, but only a function. With Scala, we can use this pattern and essentially\
    \ build an English phrase for solving the problem.\n\n```\nYears()\nStudent()\n\
    name(\"Pierluigi Riti\")\nclass(2)\ncourse(\"Programming\")\ncourse(\"Mathematics\"\
    )\ncreate\n```\n\nThe preceding string is simple to read and understand by a domain\
    \ expert. This reduces the possibility of misunderstanding between the developer\
    \ and domain expert and, of course, improves the quality of the software.\n\n\
    The essence of the fluent interface concerns how we think about and design an\
    \ object. Normally, when we think of an object such as a box, we think only about\
    \ how to interact with it. We may define a method and then access the method,\
    \ all to create a box to solve the problem. If we think about software using a\
    \ fluent interface, we approach the object differently. In this case, the object\
    \ is not merely a black box. We must contemplate a new way of interacting with\
    \ it. We must consider a set of commands and queries. Every command executes an\
    \ action, in our example, `create`, and every query selects a set of data, in\
    \ our case, the other functions. Thinking about the object in this way reflects\
    \ not only a new way of defining an object but a mind switch that, in particular,\
    \ enables a developer to think differently when using an internal or external\
    \ DSL.\n\nSeparating the method of the object design into queries and commands\
    \ is not a new way of defining software; it is a methodology of imperative programming,\
    \ as elaborated by Bertrand Meyer, and takes the name command-query separation.\
    \ The separation of command and query is based on a simple idea.\n\n*   **Query**:\
    \ This returns a value but does not change the status of the system. It doesn’t\
    \ have side effects, thus is ideal for functional programming.\n*   **Command**:\
    \ This changes the status of the system but doesn’t return any value.\n\nThe idea\
    \ behind this paradigm is to have a clear division between the function that changes\
    \ the value of the system and the method reading only the state of the system.\
    \ Because the system reads only an immutable state of the system, this paradigm\
    \ is strictly connected with a fluent interface. With this kind of pattern, we\
    \ can create a command to change the status of the system and, at the end, have\
    \ a query for retrieving the status of the system following the fluent API call.\
    \ Because the query is essentially without side effects, this is ideal for functional\
    \ programming. The essence of the command-query separation is that every method\
    \ must return a query or a command, and the result never changes, if we don’t\
    \ change the initial value. Basically, the method or function can’t have side\
    \ effects.\n\n> **Note**  \n> The absence of side effects is one of the principles\
    \ of every functional language. As Scala is a functional language, using the command-query\
    \ separation doesn’t violate this principle but helps the developer to respect\
    \ it.\n\nWhen we design internal DSLs, we must think of using this principle in\
    \ order to better isolate the function or method and avoid side effects. Of course,\
    \ fluent interface and command-query separation are not the same. Specifically,\
    \ a fluent interface is used when dealing with objects. Conversely, a command-query\
    \ separation is better for functions. Because Scala has both paradigms, it is\
    \ better to define and clarify how to use one or the other. In each case, it is\
    \ better to define the function or method with a name understandable to the domain\
    \ expert."
  raw: '### Creating a Fluent Interface


    A fluent interface for creating a chain of API calls was described by Martin Fowler
    and is essentially a way to change how to call an object. Traditionally, in object-oriented
    programming , if we want to call an object, we use a syntax such as the following:


    ```

    Student s = new Student("Pierluigi Ri", 2);

    Course c1 = new Course("Programming");

    Course c2 = new Course("Mathematics");

    return new Year(s, c1, c2);

    ```


    You can see that we create the program using a set of calls, and, at the end,
    the final object is passed in the previously created objects. This is the classic
    technique every developer uses essentially every day to create objects.


    If we were to use method chaining for this example, we could create a series of
    functions. Every function would return the object itself. In the end, we would
    have one complete object, the syntax of which would be the following:


    ```

    Years()

    .student()

    .name("Pierluigi Riti")

    .class(2)

    .course("Programming")

    .course("Mathematics")

    .create()

    ```


    The code now can be read more like plain English and is much easier to understand
    by a domain expert. Don’t forget: The aim of a DSL is to allow the communication
    between a developer and domain expert. With a language such as Scala, we can use
    a function instead of an object, so we can use what Fowler defines as a function
    sequence . We don’t use an object and a method, but only a function. With Scala,
    we can use this pattern and essentially build an English phrase for solving the
    problem.


    ```

    Years()

    Student()

    name("Pierluigi Riti")

    class(2)

    course("Programming")

    course("Mathematics")

    create

    ```


    The preceding string is simple to read and understand by a domain expert. This
    reduces the possibility of misunderstanding between the developer and domain expert
    and, of course, improves the quality of the software.


    The essence of the fluent interface concerns how we think about and design an
    object. Normally, when we think of an object such as a box, we think only about
    how to interact with it. We may define a method and then access the method, all
    to create a box to solve the problem. If we think about software using a fluent
    interface, we approach the object differently. In this case, the object is not
    merely a black box. We must contemplate a new way of interacting with it. We must
    consider a set of commands and queries. Every command executes an action, in our
    example, `create`, and every query selects a set of data, in our case, the other
    functions. Thinking about the object in this way reflects not only a new way of
    defining an object but a mind switch that, in particular, enables a developer
    to think differently when using an internal or external DSL.


    Separating the method of the object design into queries and commands is not a
    new way of defining software; it is a methodology of imperative programming, as
    elaborated by Bertrand Meyer, and takes the name command-query separation . The
    separation of command and query is based on a simple idea.


    *   Query: This returns a value but does not change the status of the system.
    It doesn’t have side effects, thus is ideal for functional programming.

    *   Command : This changes the status of the system but doesn’t return any value.


    The idea behind this paradigm is to have a clear division between the function
    that changes the value of the system and the method reading only the state of
    the system. Because the system reads only an immutable state of the system, this
    paradigm is strictly connected with a fluent interface. With this kind of pattern,
    we can create a command to change the status of the system and, at the end, have
    a query for retrieving the status of the system following the fluent API call.
    Because the query is essentially without side effects , this is ideal for functional
    programming. The essence of the command-query separation is that every method
    must return a query or a command, and the result never changes, if we don’t change
    the initial value. Basically, the method or function can’t have side effects.


    Note


    The absence of side effects is one of the principles of every functional language.
    As Scala is a functional language, using the command-query separation doesn’t
    violate this principle but helps the developer to respect it.


    When we design internal DSLs, we must think of using this principle in order to
    better isolate the function or method and avoid side effects . Of course, fluent
    interface and command-query separation are not the same. Specifically, a fluent
    interface is used when dealing with objects. Conversely, a command-query separation
    is better for functions. Because Scala has both paradigms, it is better to define
    and clarify how to use one or the other. In each case, it is better to define
    the function or method with a name understandable to the domain expert.'
