- fmt: '### Designing the DSL System


    With the common dictionary defined, we can begin to design the system and see
    what we need to implement it. The first step in designing the system is to identify
    the rules we want to use for it. As we know that a DSL can be used to implement
    a system using calls, similar to plain English, what we do now is define these
    rules and implement them.


    First, to design the system, we must understand how the Forex trading market works.
    The Forex trading market primarily buys and sells currency. This is done using
    specific platforms that allows clients to buy currency pairs, for example `EUR/USD`
    (euros/US dollars). A gain or loss is the difference in the number of PIP from
    when we started to hold a position and when we closed that position.


    We can define a stop loss or take a profit to close the position when we have
    gained or lost a certain number of PIP. When we place an order in a Forex trading
    system, it looks like the following:


    - `BUY EUR/USD $1,000` with a `LEVERAGE` of 10, with a `TAKE PROFIT` of 10 PIP
    and a `STOP LOSS` of 10 PIP


    With the rules we can use to describe our system in place, we can place an order
    to buy a currency pair, define a leverage and a stop loss, and the take a profit.
    Using a command, we can define our system rules and, based on that, define our
    system.


    The rules we want to implement in our system are simple.


    - The system must be allowed to buy currency.

    - The system must be allowed to sell currency.

    - The system must be able to set a stop loss.

    - The system must be able to set a profit.

    - The system must be able to define the currency pair.

    - The system must be able to define a leverage.


    These defined rules allow the system to create exactly the same line we defined
    previously. What we need to do now is define the object involved in the DSL.


    We can start now to write the code we need to define the system. The first piece
    of code we need is for implementing the rules. What we require is a set of objects.
    These objects can be brought together to carry out the rules.


    ### Implementing the System


    The first step is to design the object necessary for defining our currency pairs.
    The first object we can define is the currency. The code for the currency is as
    follows:


    ```

    trait CurrencyType{

    def pair: String

    }

    ```


    What we define with the preceding code is essentially the generic way of defining
    the currency we use in the system. The scope of the trait is defined by a generic
    object that we can “specialize” for use in the creation of the currency pair.


    The next code we must write is that necessary for defining the currency pair.


    ```

    class CurrencyPair(val accountType:String) extends CurrencyType{

    override def pair(currency_name:String):String ={ currency_name }

    def PIP(): Double={

    val first_currency=pair("USD")

    val second_currency=pair("EUR")

    var returnPIP:Double=0.0

    if (secondary.toString.equalsIgnoreCase("USD")){

    if (accountType.equalsIgnoreCase("MICRO")){

    returnPIP=0.10

    }

    else if (accountType.equalsIgnoreCase("MINI")){

    returnPIP=1

    }

    else if (accountType.equalsIgnoreCase("STANDARD")){

    returnPIP=10

    }

    }

    return returnPIP

    }

    }

    ```


    The preceding code shows how we can define a `CurrencyPair` and define the PIP
    we gain, depending on the account. Now you can see that we use the trait class
    to define the kind of currency pair we want to use in the system.


    The `CurrencyPair` class allows us to create the currency pair and to show some
    features of Scala. The line of code `class CurrencyPair (val accountType:String)
    extends CurrencyType` shows how trait is used. We can see that this simply extends
    the class and overrides the method of the trait. This creates the concrete method
    based on the interface.


    The class then takes care of calculating the value of the PIP of each account,
    depending on the type. By definition, when the secondary currency is the US dollar
    (USD), we can define the default values of the three types of accounts—micro,
    mini, and standard—which are $0.10, $1, and $10.


    This results from the `PIP` method, which does nothing but confirm the type of
    object and then return the value of the PIP.


    ### Improving the Basic Class


    Based on the previous code, we can make some improvements. For example, we can
    create a new class, `Account`, to remove the `if then` and create a better code,
    as follows:


    ```

    trait AccountType{

    def account:Double

    }

    ```


    The first improvement we make is to create another trait to define the account
    type. The account can be of three types: `MICRO`, `MINI`, or `STANDARD`. We can
    use the new trait extending the class that was written previously. In Scala, it
    is possible to have multiple inheritance using the word `with`. Here is the new
    code.


    ```

    class CurrencyPair(accountType:String) extends CurrencyType with AccountType{

    override def pair(currency_name:String):String ={ currency_name }

    override def account(account_type:String):Double={

    if (account_type.equalsIgnoreCase("MICRO")){

    return 0.1

    }else if(account_type.equalsIgnoreCase("MINI")){

    return 1

    }else if(account_type.equalsIgnoreCase("STANDARD")){

    return 10

    }

    }

    def PIP(): Double={

    val first_currency=pair("EUR")

    val second_currency=pair("USD")

    val pip=new account("MINI")

    return pip

    }

    }

    ```


    ### Creating the Order


    The next step is to create an order. This is essentially the basic operation of
    the trading system. The system should be able to create an order using the basic
    parameter, so let’s now create the class.


    ```

    class Order(val pair: CurrencyPair){

    def ask(profit:Int,loss:Int ):Unit={

    println("Profit:"+profit)

    println("Loss:"+loss)

    println("PIP:"+pair.PIP)

    }

    def bid(profit:Int,loss:Int):Uint={

    println("Profit:"+profit)

    println("Loss:"+loss)

    println("PIP:"+pair.PIP)

    }

    }

    ```


    The class is very simple. It has only two methods: one to buy, `ask()`, and one
    to sell, `bind()`. Both methods accept two parameters, `profit` and `loss`.


    Now we can see that the name of the method uses the name defined in the dictionary.
    This is because we want to define a software that can be read like plain English.
    The next step is to create the code for placing an order. To do this, we have
    only to create a variable called `_order`, with a syntax like the following:


    ```

    val _order = new Order(new CurrencyPair("MICRO","EUR","USD")).ask(10,10)

    ```


    The call uses the fluent style. This is essentially a DSL call, but its syntax
    is not exactly good for defining that, because one of the core elements of DSLs
    is how we define the API. The code until now is very basic and somewhat confusing.
    The API is not very clear, and creating a call with it is not as smooth as we
    would like. Of course, we can read it like English, but a good DSL should be very
    simple to read and understand.


    So, what we need to do to have a good DSL is first to design a good API. This
    is not an easy job but is the crucial difference in having a good DSL or not.
    If we see to the actual DSL, for example, the HTML, or the RubyDSL used in Chef,
    we can see a clear and simple definition of some APIs. An API with a clear name
    and documentation helps a developer to write the code. What we need to identify
    now is why and how to write a good API.'
