    to parse every element of the language, and we introduce the concept we used to
    create the parser. Essentially, we split every single command, for example, the
    `if` or the function, in a piece of code used to create a token. We essentially
    tokenize the element. With this element, we can create the AST. We can now define
    the last function for the language and close the reader. We must implement the
    function `parseAll` from the trait we have extended for starting the parser, as
    follows:


    ```scala

    def parseAll[T](p: Parser[T], in: String): ParseResult[T] = {

    phrase(p)(new lexical.Scanner(in))

    }

    ```


    The function `parseAll` calls the `lexical.Scanner` and creates the parser for
    our language. This function creates the token for every element of the language.


