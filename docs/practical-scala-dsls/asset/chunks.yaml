    \  \n美国国会图书馆控制号：2017962308  \n© 皮耶路易吉·里蒂 2018  \n本作品受版权保护。出版商保留所有权利，包括全部或部分材料的翻译、重印、插图复用、朗诵、广播、微缩胶片或其他物理形式的复制、信息存储与检索的传输与电子化改编、计算机软件，以及目前已知或未来开发的任何类似或不同方法的权利。\
