- fmt: '# DSL Goals


    When you create a DSL language, you must have a clear objective in your mind.
    The DSLs should be understandable and verifiable to the business user. To design
    a good DSL, some specific rules must be followed.


    - DSLs design a “language.” This means that the user doesn’t have to know the
    details about the implementation. The developer only needs to use the common dictionary
    to define the business and then shift the focus to the correct implementation
    of the method.

    - DSLs define a very small language. We define restricted sets of words that we
    can use to implement the solution for the business domain. Because of this, it
    is possible for a developer to learn the terms easily and improve his/her knowledge.

    - DSLs are born of the idea of mapping a business domain in a common language.
    To allow this, we define a common dictionary, in which we define the word and
    the functionality, after the developer translates the word into a function. Imagine,
    for example, that we want to create a DSL for a financial application. We have
    a specific term to define. This is because the developer doesn’t have knowledge
    of, for example, the terms `bid` or `ask`, or any other financial term. Creating
    the common dictionary helps to define the term and, therefore, the developer,
    to understand the scope of the DSL.


    Realizing all three of the preceding goals in designing a DSL requires that the
    software we design with also be of good quality. Today, there is a great variety
    of languages, and some, like Scala, allow developers to write very good DSLs.


    When we want to implement a DSL for our project, we start from day zero of the
    project. In terms of the software and solution architecture, this means that we
    begin to design the software by adhering to the following rules: the function
    should be internally well-documented and, at the same time, the name should be
    a valid name for the business. A correct DSL implementation uses some defined
    architectural pattern. For example, in Martin Fowler’s *Domain-Specific Languages*,
    it is possible to find a good description of all the patterns that can be used
    for design and implementation of our DSL.


    Another big benefit associated with the use of DSLs is removal of the communication
    barriers between a business user and developer. When we design and implement a
    DSL, a developer must understand the business domain. For this reason, we define
    a common dictionary, but the exercise connected with the “design” of the common
    dictionary improves the business knowledge of the developer. We use DSL languages
    nearly every day, but without realizing this. Some common DSL languages are:


    - SQL

    - RSpec

    - Cucumber

    - SBT

    - ANT

    - HTML

    - CSS

    - ANTLR


    These languages represent only a fraction of DSLs. Everyone has likely used one
    of these languages at one time or another in their lives without being aware of
    it. All these languages, however, are designed to solve a specific business domain
    issue.


    # Implementing a DSL


    We now move on to how we can implement a DSL. Until now, I presented only the
    processes that we can follow to design a DSL. Our focus can now shift to what
    we can do, from a developer’s point of view, to implement the language.


    The first decision we must make is how to structure the language. This means that,
    first, we must decide whether we want to use an internal or external DSL. This
    is not an easy decision, because using one or the other technique drives the architecture
    definition and essentially defines how the developer and the business transform
    the business solution into a software.


    To define the DSL, the first decisions we must make are to:


    - Define the grammar of the language for both kinds of DSLs (internal and external)
    and define a specific grammar for defining the business. This means that we must
    define a complete grammar for creating the “language.”

    - Create the parser necessary for defining the semantic model of the language.
    When we have the grammar, we must also create the parser, to “translate” the language
    into the software.


    How to implement these steps defines the difference between an external and internal
    DSL. A common point among DSLs is their grammar. The differences occur when we
    have to parse the DSLs. In the case of internal DSLs, essentially for parsing
    the grammar, we define some API, using, for example, the Expression Builder pattern,
    for creating our final phrase. For an external DSL, the parser normally reads
    the text, from an external file, for example, parsing all files and then creating
    the call for the proper API, to meet the business requirements.


    In the end, both techniques solve the same problem. The only difference is how
    to parse the grammar. For an internal DSL, the grammar is solved using a set of
    the call to an internal API. The sequence of the call for the API defines the
    business requirements and, in the end, achieves the business requirements.


    One example of a fluent API for parsing a grammar is JMock. In JMock, for example,
    we can write something like the following:


    ```

    mock.expects(once()).method("my_method").with(or(stringContains("hello"),stringContains("howyourday"))
    );

    ```


    This code essentially parses a grammar, in this case, the method for checking
    if the name of the method contains the word we have to test.


    In the case of an external DSL, for example, we use the grammar for creating an
    external file. This file is called by the program and put in a three-part syntax.
    When we have the three parts, we start to call the API and use the results to
    define an action or call another API.


    ## Grammar and Data Parsing


    When we define the DSL, one of the most important aspects of this is the grammar.
    The grammar is retrieved from the common dictionary and should be used to define
    the business solution.


    By the term grammar, we are referring to a set of rules that we can use to stream
    text and turn it into software. Every developer uses a grammar every day. For
    example, when creating a variable in Scala, we use a specific grammar. Imagine,
    for example, that we want to define a new grammar for executing a sum of two numbers.
    The syntax might be `sum:= number ''+'' number`. This would tell us how to execute
    an operation, and in case we found the expression `2 + 2`, this would be valid
    for the system. The grammar doesn’t tell us how we must resolve the expression,
    only that the expression is valid.


    Who tells us what kind of operation to execute provides the context. For example,
    we can define a two-sum operation, one by a number, the other by a string. In
    the case of a number, we can execute the sum, so that the operation `2 + 2` returns
    `4`. In the case of two strings, the result of `2 + 2` is `22`. The context of
    the operation is driven by the semantics of the operation we want to define. In
    the previous example, we used a number or string.


    After we have defined the grammar for the language, the other important step involves
    parsing the data. The parser must read the language, using the grammar we have
    defined and according to how we have instructed this grammar to be used. This
    step is crucial for the efficiency of the DSL. When we parse the data, we probably
    have to store more information in memory. To speed the process, we can create
    a symbolic table. This is nothing more than a dictionary. The key is the grammar
    word we require to parse, for example, the `+`, and the value that is the object
    of the operation we must call with the parameter. The symbolic table is the core
    of our parser. This keeps in the memory all words and functions, thus helping
    the developer to translate the language into code. The parser uses the symbolic
    table for creating the call function that translates the syntax into code.'
