    \  \n本书采用无酸纸印刷  \n全球图书贸易由施普林格科学与商业媒体纽约公司发行，地址：233 Spring Street, 6th Floor, New\
    \ York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：orders-ny@springer-sbm.com，或访问\
    \ www.springeronline.com。  \nApress Media, LLC 是一家加利福尼亚有限责任公司，其唯一成员（所有者）是施普林格科学与商业媒体金融公司（SSBM\
    \ Finance Inc）。SSBM Finance Inc 是一家特拉华州公司。  \n献给我的妻子玛拉·埃斯特，她带给我任何人所能收到的最珍贵的礼物：我的两个孩子，妮可尔和马蒂亚。我爱你们。\
    \  \n引言\n\n你好，欢迎阅读《实用 Scala DSL》。Scala 已经变得非常流行，随着越来越多的公司每天采用这门语言，其受欢迎程度和增长势头日益高涨。\n\
    \nDSL 是一种利用其固有技术设计软件的方式，本质上是一组能够用“通俗英语”描述软件的模式。本书并不试图涵盖 DSL 背后的所有理论。马丁·福勒的精彩著作《领域特定语言》（Addison-Wesley\
    \ Professional, 2010）为此提供了基础理解。\n\n通过本书，我希望描述如何在日常项目中使用 DSL。本书的目标是让读者了解如何在工作中运用\
    \ DSL，并在阅读结束时看到 DSL 如何应用于不同的项目。我意在展示如何从实践角度处理 DSL，并教会读者思考如何将 DSL 融入日常工作生活。\n\n\
    为了更好地理解本书，读者需要熟悉 Scala，能够用 Scala 编写简单程序，并对其架构有所了解。理想情况下，读者还应具备一些 Java 编程经验。这是因为\
    \ Scala 和 Java 都使用 Java 虚拟机（JVM），文中讨论的一些示例会突出 Scala 与 Java 的差异。最后，读者应熟悉一种编辑器。我使用\
    \ IntelliJ，但任何编辑器都可以。"
