  trans: '

    ### 在 Play 中创建微服务


    创建微服务本质上就是构建一个细粒度的 Web API。使用 Play 可以轻松实现这一点。在 `conf` 文件夹中，有一个名为 `routes` 的文件。该文件负责识别应用程序中的资源。


    ```

    # 路由

    # 此文件定义了所有应用程序路由（优先级高的路由在前）

    # ~~~~

    # 一个示例控制器，展示一个示例主页

    GET     /                           controllers.HomeController.index

    # 一个示例控制器，展示如何使用依赖注入

    GET     /count                      controllers.CountController.count

    # 一个示例控制器，展示如何编写异步代码

    GET     /message                    controllers.AsyncController.message

    # 将 /public 文件夹中的静态资源映射到 /assets URL 路径

    GET     /assets/*file               controllers.Assets.versioned(path="/public",
    file: Asset)

    ```


    你可以看到，我们使用 HTTP 方法和用于响应调用的控制器方法定义了所有资源。


    为了创建我们的系统，我们只需在 `routes` 文件中添加资源，然后在控制器类中添加相应的方法。我们想要做的是使用 DSL 来创建我们的微服务。这意味着我们必须从资源入手。资源名称应该能被领域专家理解。我们必须以
    DSL 的方式编写所有代码，那么让我们开始编写第一个资源。要在 Play 中创建微服务，我们本质上必须构建一个控制器来响应我们在路由中定义的端点。


    每个控制器都必须响应一个特定的端点，因为微服务是独立开发的，但我们可以让一个“服务”使用多个控制器来构建新的端点。例如，假设我们想创建一个计费服务。我们可以为用户定义端点，用于创建、更新和删除用户。


    另一个微服务可以为该用户创建新订单。该微服务可以创建订单，并使用用户微服务来组合调用。该微服务在路由文件中指示的所有内容，都被定义并迁移到了控制器部分。现在，我们可以看到路由文件定义了一个由三部分组成的
    API：


    *   HTTP 动作：`GET`、`POST` 等，在我们的例子中都是 `GET`。

    *   端点的路径：例如，`/count` 或 `/message`。

    *   用于响应端点的控制器：例如，`controllers.Assets.versioned(path="/public", file: Asset)`。


    控制器是管理我们端点的核心，因为它也是微服务的核心。现在，我们通过一个真实的示例场景来看看如何开发我们的微服务。


    ### 我们自己的 DSL 微服务


    创建我们自己的微服务的第一步是将资源插入到 `routes` 文件中。为此，我们在文件中添加资源名称。假设，例如，我们想使用 `GET` HTTP 方法语言。第一步是添加路由，如下所示：


    ```

    GET     /Language                   controllers.LanguageController.language

    ```


    这一行定义了 HTTP 方法 `GET` 以及解析该方法的动作。因此，要运行该软件，我们必须定义控制器来启动该动作。


    我们定义了一个名为 `LanguageController` 的新控制器，其代码如下：


    ```

    package controllers

    import javax.inject.Inject

    import play.api.mvc.{Action, Controller}

    /**

    * 由用户于 2017 年 5 月 29 日创建

    */

    class LanguageController @Inject() extends Controller{

    def language = Action{

    Ok(views.html.language("language."))

    }

    }

    ```


    这个简单的方法响应 `GET` HTTP 方法并返回一个页面。最后一步是定义显示结果的页面。


    在 Play 中，我们可以创建一个模板来定义页面。模板使用 Scala 和 HTML 定义。控制器发送应在页面中渲染的值。对于我们的简单页面，模板如下所示：


    ```

    @(message: String)

    @main("语言渲染") {

    @message

    }

    ```


    我们可以运行我们的应用程序并导航到语言页面以查看结果（图 5-7）。


    ![A443229_1_En_5_Fig7_HTML.jpg](img/A443229_1_En_5_Fig7_HTML.jpg)


    图 5-7


    语言页面


    现在，我们将从头到尾定义我们所有的 MVC（模型-视图-控制器）路由。这是一个简单的页面，所以我们想使用 DSL。通常，控制器并不这么简单，因此我们更倾向于使用
    DSL 来设计业务逻辑，而控制器仅用于发送需要渲染的数据。


    因此，这个特定功能的业务逻辑很简单。我们必须读取一个配置文件，并在表格中显示所有语言：活跃的和非活跃的。文件结构非常简单。我们可以这样定义它：


    ```

    language.list = "Scala,Java,C"

    language.status = "active,active,inactive"

    ```


    我们在 `conf` 文件夹中创建一个名为 `language.conf` 的文件，其中包含语言配置。我们现在想要做的是读取该文件并在我们的控制器中使用它。


    我们可以使用 DSL 创建一个文本解析器来读取文件并形成内存结构。我们可以使用这个结构来响应控制器，然后设计页面。该类的代码如下：


    ```

    package utils

    import com.typesafe.config.ConfigFactory

    final class ConfigurationReader {

    // 创建用于解析器的全局变量，这本质上用于定义全局变量

    private var language_list = Map[String,String]()

    private var language_status = Map[String,String]()

    var result = Map[String,String]()

    // 此方法读取文件并获取语言，我们可以看到如何创建语言和状态映射

    def language() = {

    val language = ConfigFactory.load("language.conf").getString("language.list").split(",")

    val status = ConfigFactory.load("language.conf").getString("language.status").split(",")

    for(i <- 0 until language.length){

    language_list += (language(i) -> status(i))

    }

    this

    }

    // 此方法用于读取文件的状态

    def status(status:String) = {

    if (status == "all"){

    for((_key,_value) <- language_list){

    language_status += (_key -> _value)

    }

    }

    else{

    for((_key,_value) <- language_list){

    if(_value == status) language_status += (_key -> _value)

    }

    }

    this

    }

    // 根据语言状态创建过滤器，如果没有过滤器，函数将输出所有活跃状态

    def filter():Map[String, String] = {

    this.language_status

    }

    }

    ```


    这段代码使用 Scala 创建了方法链。对于 Scala 中的方法链模式，我们只需要在方法末尾使用 `this` 关键字。

    '
- fmt: '`this`告诉 Scala 返回方法本身，本质上，每次我们返回方法的值时都是如此。通过这样做，我们可以串联方法并创建方法链。我们使用全局变量技术让代码能够操作同一个变量。基本上，我们只需定义一个全局私有变量，并在方法内部定义其值。这样，对象始终填充着之前的值，对象在方法间传递时被逐步处理。


    要使用该方法，我们必须修改为设计语言视图而创建的默认控制器。控制器的代码如下：


    ```

    package controllers

    import javax.inject.Inject

    import play.api.mvc.{Action, Controller}

    import utils._

    import play.api.libs.json.Json

    import play.api.libs.json._

    class LanguageController @Inject() extends Controller{

    def language = Action{

    val configurationReader=new ConfigurationReader()

    val filter_language = configurationReader

    .language()

    .status("active")

    .filter()

    Ok(views.html.language(filter_language.toString()))

    }

    }

    ```


    方法链的核心是这段代码。这段代码是控制器中用于定义语言控制器的部分。现在，我们可以在端点中定义它。该控制器用于响应浏览器调用：`http://localhost:9000/Language`。DSL
    部分是我们为读取结果而创建的“链”。


    ```

    val configurationReader=new ConfigurationReader()

    val filter_language = configurationReader

    .language()

    .status("active")

    .filter()

    ```


    这段代码展示了如何在控制器中使用方法链来调用方法。我们可以看到，过滤响应的状态会在`status`函数上设置一个值。在我们的例子中，我们只想要活跃的语言。如果现在运行
    Play，我们可以看到带有过滤后语言的视图（图 [5-8](#A443229_1_En_5_Chapter.html#Fig8)）。


    ![A443229_1_En_5_Fig8_HTML.jpg](A443229_1_En_5_Fig8_HTML.jpg)


    图 5-8 过滤后的语言列表


    我们可以看到该方法返回了一个按活跃状态过滤的所有语言的列表。这正是我们要求代码做的事情。


    我们可以看到创建 DSL 代码很简单。在我们的例子中，我们使用了内部 DSL 模式来组合代码。使用 DSL 的优势在于能够改善我们与领域专家的沟通。方法链允许用户像阅读普通英语一样阅读过滤语言的调用。


    微服务使用 JSON，因此我们必须修改控制器处理 JSON 响应的工作方式。我们可以指示控制器这样做。


    ```

    def language = Action{

    val configurationReader=new ConfigurationReader()

    val filter_language = configurationReader

    .language()

    .status("active")

    .filter()

    Ok(Json.toJson(filter_language))

    }

    ```


    我们修改了响应并移除了视图。我们使用 JSON Play 库以 JSON 格式返回响应。现在，如果运行代码，我们可以在页面上看到新的响应（图 [5-9](#A443229_1_En_5_Chapter.html#Fig9)）。


    ![A443229_1_En_5_Fig9_HTML.jpg](A443229_1_En_5_Fig9_HTML.jpg)


    图 5-9 来自微服务的 JSON 响应


    我们已经了解了如何创建一个简单的微服务，以及如何以 JSON 格式查看该服务的回复。在我们的例子中，我们对微服务应用了一个过滤器。例如，如果我们请求所有语言，所有语言都会出现在列表中。基于此，我们可以格式化响应，但这不在本书的讨论范围内。该响应可以被手机或任何
    UI 软件读取。


    现在，我们可以开始设计我们的控制器以使用 DSL 技术。当然，数据源可以是数据库，例如。本章的范围是展示如何使用 DSL 编写控制器，以及这如何帮助我们让控制器的输出像普通英语一样易于阅读。这提高了生产力，当然，也明确了控制器的功能。


    ## 结论


    我们刚刚创建了第一个简单的微服务。本质上，我们构建了一个简单的服务，并为我们的 Web 服务初始化了一个 JSON 响应。我们使用了简单的方法链来过滤结果。


    这个微服务只是一个基本示例，展示了我们可以用 Play 做什么，仅使用少量 DSL。分析代码，我们可以看到外部 DSL。这尤其如此，因为我们使用配置文件来定义必须处理的语言列表。


    我们看到了使用正常开发流程创建 DSL 是多么简单。基本上，我们不需要考虑使用巨大的复杂性，只需要使用宿主语言来构建 DSL 所需的最简单功能。创建 DSL
    不应该令人望而生畏。DSL 让我们能够专注于业务和沟通，因此简单的功能可以帮助我们解决领域问题。


    在接下来的章节中，我们将增加 DSL 的复杂性。这意味着我们将开始使用更复杂的模式并设计更复杂的功能。


    # 6. 用户识别系统


    构建 IT 系统时一个常见的问题是识别用户并为其分配正确的角色。每个系统都有这种功能，通常，我们使用数据库来存储与用户相关的数据。


    我们通常做的是连接到数据库，执行一些查询，然后根据查询结果创建一个解析器来理解用户的角色。


    本章要做的是创建一个自由语法解析器，用于建立我们自己的用户识别规则。这要求我们定义自己的规则集，并将其应用于收集到的数据结果。这个解析器可以轻松应用于任何数据源，这意味着我们可以将用户与数据库解耦，并使用
    JSON 或 XML 文件来存储用户数据。


    我们使用 Scala 解析器库来创建这个解析器。这个库非常适合领域特定语言，因此掌握它的最佳方式是回顾解析器的基础知识并开始编写一些代码。'
