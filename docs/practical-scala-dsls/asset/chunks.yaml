  trans: '

    ## 定义领域问题与语法


    众所周知，DSL 的存在是为了解决特定的领域问题。在我们的案例中，我们希望定义一种语言，用于描述如何创建或维护现有用户。


    我们可以定义一些简单的规则来创建我们的语言。


    *   管理员可以创建、删除和更新用户。

    *   管理员可以为一个或多个用户分配和/或移除角色。

    *   用户可以根据规则中定义的限制来使用系统。

    *   规则是“读取”和“写入”。

    *   我们想要使用的语法应类似于 JSON。


    基于这些规则，我们可以定义如下的 EBNF：


    ```

    value ::= objson | array | string | floatingPointNumber.

    object ::= "{" | members | "}".

    array ::= "[" | values | "]".

    members ::= member {","  member }.

    member ::= stringLitteral ":" value.

    values ::= value {"," value}.

    ```


    该语法展示了在系统中定义新用户的规则。我们使用简单的 JSON 来定义用户。这是因为 JSON 对人类更易读，并且便于定义更复杂的规则。基于此语法，我们现在为解析器定义一个简单的输入。


    ```

    {

    "Username" : [

    {

    "Name"  : "Pierluigi Riti",

    "Roles" : ["Administrator", "User"],

    "Groups" : ["Test1","Test2"],

    "Permissions": ["All", "Read"]

    },

    {

    "name" : "John Smyth",

    "Roles" : ["User"],

    "Groups" : ["Test1"],

    "Permissions": ["Read"]

    }

    ]

    }

    ```


    使用上述规则，我们定义了两个新用户。可以看到，我们简单地定义了角色，并使用语法定义了用户的每个方面。


    ### 准备解析器


    创建解析器的第一步，本质上是识别工作输入。为此，我们可以创建一个简单的词法解析器。


    词法解析器是一种专门用于识别输入词法结构的解析器。在我们的案例中，我们使用此解析器来识别单词，按分隔符拆分，并创建解析树，以便在软件功能中发起调用。那么，开始创建词法解析器的第一个版本，如下所示：


    ```

    import scala.util.parsing.combinator._

    class ParserJson extends JavaTokenParsers {

    def value : Parser[Any] = obj | array |

    stringLiteral |

    floatingPointNumber

    def objson: Parser[Any] = "{" ~repsep(member, ",")~"}"

    def array : Parser[Any] = "[" ~repsep(value, ",")~"]"

    def member: Parser[Any] = stringLiteral~":"~value

    }

    ```


    我们可以执行解析器并查看软件的响应。然后，我们为调用创建软件，并使用我们的 JSON 输入文件。


    这是我们使用的文件：


    ```

    {

    "Username" : [

    {

    "Name"  : "Pierluigi Riti",

    "Roles" : ["Administrator", "User"],

    "Groups" : ["Test1","Test2"],

    "Permissions": ["All", "Read"]

    },

    {

    "Name" : "John Smyth",

    "Roles" : ["User"],

    "Groups" : ["Test1"],

    "Permissions": ["Read"]

    }

    ]

    }

    ```


    这是调用解析器的代码：


    ```

    object SimpleJSONParser extends ParserJson {

    def main(args: Array[String]): Unit ={

    val reader = Source.fromFile(args[0]).getLines.mkString

    println(parseAll(value, reader))

    }

    ```


    如果我们执行代码，会看到解析器的结果。


    ```

    parsed: (({~List((("Username"~:)~(([~List((({~List((("Name"~:)~"Pierluigi Riti"),
    (("Roles"~:)~(([~List("Administrator", "User"))~])), (("Groups"~:)~(([~List("Test1",
    "Test2"))~])), (("Permissions"~:)~(([~List("All", "Read"))~]))))~}), (({~List((("Name"~:)~"John
    Smyth"), (("Roles"~:)~(([~List("User"))~])), (("Groups"~:)~(([~List("Test1"))~])),
    (("Permissions"~:)~(([~List("Read"))~]))))~})))~]))))~})

    ```


    ### 描述解析器


    我们现在要做的是描述解析器，并看看它的作用。乍一看，解析结果对人类阅读来说并不是很有用。它本质上只是一系列列表和 `~` 符号的序列。这并非人类可读，但无疑对计算机来说更易读。


    Scala 解析器有一些规则，我们需要先了解这些规则，才能将输出转换为对计算机更有用的内容。这些规则是：


    *   每个写成字符串的解析器都会返回解析后的字符串。

    *   正则表达式也返回一个字符串。

    *   当我们有顺序组合 P~Q 时，它会返回 P 和 Q 两者的结果。这些结果会以 case class 实例的形式返回。

    *   当我们有选择组合 P|Q 时，解析器会返回 P 或 Q 中成功匹配的那个元素的结果。

    *   当解析器使用重复 rep(P) 或 repsep(P, separator) 时，它会返回一个列表，其中包含 P 的所有运行结果。

    *   当解析器运行可选 opt(P) 时，它会返回一个 Scala 的 Option 类型实例。如果成功，返回 Some(P)；如果 P 失败，则返回 None。


    使用这些规则，我们现在可以理解为什么解析器的结果是我们看到的样子了。无论如何，这个输出并不是很有用。下一步是改进解析器，以获得一个我们可以用来构建自己调用的结构。

    '
- fmt: '### Improving the JSON Parser


    To make the result of the parser more humanly readable, we have to change the
    result of the parser a little. The most useful structure we can use is a simple
    Scala `Map`, in which the key is the name of the JSON property, and the value
    is the associated value.


    The first step of the parser is now to create a `Map` when we parse the entire
    JSON object. The new code for the function looks like the following:


    ```

    def objson: Parser[Map[String, Any]] =

    "{"~> repsep(member, ",") <~"}" ^^ (Map() ++ _)

    ```


    You can see that we’ve changed the signature of the method. First, we use the
    value `Any`. This means that we return any value from our parser. In this case,
    the parser returns a value `Map[String, Any]`. This tells the parser to cast the
    result into a map of value `string` and `any`.


    To make this transformation, we use a new parser operator: `^^`. This operator
    transforms the result of the parser operation. To use this operator, the parser
    must have the syntax `P ^^ r`. In our case, we use a repetition control on the
    `member`, which means that we have a result transformed in a case class, and this
    initiates the transformation.


    At the same time, we change another method to improve the parser. We change the
    `member`, as follows:


    ```

    def member: Parser[(String, Any)] =

    stringLiteral~":"~value ^^

    { case Name~":"~value => (Name, value) }

    ```


    For the other method, we use the operator `^^` to transform the result of the
    operation. In this case, we use a pattern matching to select the value `Name`.
    The entire parser code now looks like this:


    ```

    import scala.util.parsing.combinator._

    class ImprovedJsonParser extends JavaTokenParsers {

    def obj: Parser[Map[String, Any]] =

    "{"~> repsep(member, ",")  repsep(value, ",")  (name, value) }

    def value: Parser[Any] = (

    obj

    | array

    | stringLiteral

    | floatingPointNumber ^^ (_.toDouble)

    )

    }

    object ImprovedJsonParserTest extends ImprovedJsonParser {

    def main(args: Array[String]) {

    val reader = "{\n\t\"Username\" : " +

    "[{\"Name\"  : \"Pierluigi Riti\"," +

    "\"Roles\" : [\"Administrator\", \"User\"]," +

    "\"Groups\" : [\"Test1\",\"Test2\"]," +

    "\"Permissions\": [\"All\", \"Read\"]" +

    "}," +

    "{\"Name\" : \"John Smyth\"," +

    "\"Roles\" : [\"User\"]," +

    "\"Groups\" : [\"Test1\"]," +

    "\"Permissions\": [\"Read\"]}]} "

    println(parseAll(value, reader))

    }

    }

    ```


    If we execute the code, we actually have a result like the following:


    ```

    Map(

    "Username" -> List(

    Map(

    "Name" -> "Pierluigi Riti", "Roles" -> List("Administrator", "User"),

    "Groups" -> List("Test1", "Test2"),

    "Permissions" -> List("All", "Read")

    ),

    Map(

    "Name" -> "John Smyth",

    "Roles" -> List("User"),

    "Groups" -> List("Test1"),

    "Permissions" -> List("Read")

    )

    )

    )

    ```


    We can see the result is now more readable to humans than the previous result.
    We finally realize that our own parser is using an external DSL to define it.
    When we create an external DSL, we have a set of patterns that we can use to generate
    a parser. We have, for example, a parser generator pattern, and this is exactly
    what we use here. This pattern uses an external grammar to generate the language.
    An external DSL essentially generates a code used as an external source. In this
    case, we use a JSON file. A JSON file offers us the grammar we need to read and
    parse to generate the code.


    We can use different techniques for parsing the file. In this case, I used a short
    introduction and a JSON, but we can create more complex parsers using DSLs. For
    example, we can create a syntax-directed translation. This pattern translates
    a source, normally a text, by defining a grammar and then using this grammar to
    create a structured translation. We see the use of this pattern, for example,
    when we translate the EBNF into a software. We take a grammar, the EBNF, and then
    generate an input, based on the grammar. The software gets the grammar and then
    translates the source into software.


    This parse uses a JSON format notation, which allows us to create our grammar.
    This is because it is easy to parse and create our own syntax for the software
    we want define.


    What we have learned until now is sufficient to start to create our own simple
    parser, but we need to know what element we used to create the parser (see Table
    [6-2](#A443229_1_En_6_Chapter.html#Tab2)).


    **Table 6-2** Parser Operator Used to Create Our Simple JSON Parser


    | Operator | Description |

    | --- | --- |

    | `…` | Literal |

    | `"...".r` | Regular expression |

    | `P~Q` | Sequence of composition |

    | `P<~Q` , `P~>Q` | Sequence of composition: follow only move left/right |

    | `P \| Q` | Alternative: the result is P or Q |

    | `opt(P)` | Optional: in case of success P |

    | `rep(P)` | Repeat the parser on P |

    | `repsep(P,Q)` | Interleaved repetition |

    | `P ^^ f` | Result of the conversion |


    In the preceding table, we see how many combinator parsers use symbolic names
    to describe an operation, for example, `<~` or `^^`.


    This notation has the big advantage of being compact to write but, on the other
    hand, is difficult to remember and can be very cryptic for people with little
    experience. The big advantage of using a symbolic name is the short length of
    the code and the possibility of implementing the correct precedence in the parser
    itself.


    What we have created until now is an in-memory parser. We can use this parser
    to develop a sequence call of methods to execute operations on the system. For
    example, we can create the function and use it to update a table in a database
    or file system.


    ## Conclusion


    In this chapter, you received a brief introduction to the Scala’s Parser Combinator
    Library. This library is very powerful and can be used to create equally powerful
    code.


    We scratched only the surface of the Parser Combinator Library, but in spite of
    that, we were able to create a powerful parser to read and create in memory three
    others with the structure of the code.


    In the next chapter, you will see how to create a more complex parser, when I
    cover the rest of Scala’s Parsing Combinator Library.


    # 7. Creating a Custom Language


    So far, we have gone little by little deep inside the DSL. At this stage, we are
    able to create external and internal DSLs. In this chapter, we go deeper into
    external DSLs and begin to develop a custom language.


    A lot of software has an internal language. An example is RubyDSL used in Chef
    to produce cookbooks. This language started from a GPL language and, with a DSL
    implementation, became a new language. The language is normally used to solve
    a specific issue. In the case of Chef or Puppet, we use a “new language” to automatically
    install patches and software in the system.


    The language we create can be of any scope we have in mind. We can create, for
    example, a language exclusively for math or to “copy” another language. In our
    case, we want to create a language similar to the old BASIC.


    In this chapter, I will discuss the general rules for creating our own language.
    Of course, we don’t have a compiler, so it will not be an actual new GPL language.
    What we want is to create a new language based on Scala. For doing this, we must
    learn to write an AST, Abstract Syntax Tree, to parse in memory the command and
    then execute the function. But, first, to start with the implementation, it is
    best to cover a little bit of theory.'
