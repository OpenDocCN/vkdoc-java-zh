- fmt: '# Creating an External DSL


    With a BNF, we can easily define our grammar, but this is not enough to create
    an external DSL. An external DSL requires some specific steps and components to
    be effective.


    The BNF is used to define the grammar and write down all syntax we can use for
    defining our program, but we need something to translate this syntax into instructions.
    For doing that, we must create some layers for processing our file in an efficient
    way.


    First, we must define a layer for a syntactic analysis. This translates our text
    and breaks down in an in-memory structure. The syntactic analysis parses the file
    and uses the BNF to identify every line. What is normally done is to parse the
    file and identify the end of the line. The first layer is responsible for creating
    in memory all lines required to process the execution of the program.


    The first pattern we can apply to the syntactic analysis is called delimiter-direct
    transaction. Using this pattern, we split the input into chunks, usually lines,
    and then parse the line. The delimiter-direct transaction reads every line of
    the input, which can be a stream or a file in which we have defined our external
    DSL. Breaking this down into small chunks with the delimiter, normally, at the
    end of the line, or another specific character, then creates a semantic model
    of the DSL.


    Imagine, for example, that we want to describe some action for building a continuous
    integration system. The code can be like this:


    ```

    event code-commit example.cs

    event code-compile start

    event code-compile end

    command build code

    ```


    In this case, the parser must recognize the end of the file, to identify every
    single event we want to process. The parser uses the newline to identify every
    line. This is common to many languages and is easy for a developer to implement.


    When we split the input into chunks, we have in memory every line, with enough
    information to define the functionality of our DSLs. For example, in the line
    `event code-commit example.cs`, we have a set of information for executing an
    action.


    The next step for parsing our DSL is to split the line in a single command and
    execute it. For doing that we use a pattern called syntax-direct translation.
    What this pattern does is apply the rules of the grammar and create a syntax tree.
    In our case, we have created a BNF, and it is now the moment to apply the rules
    of the BNF for validating our input and recognize the different parts of the DSL.
    The syntax-direct translation doesn’t define the parser but only how to apply
    the rules for the BNF. So, how we can translate the syntax in a parser? We can
    use another pattern called recursive descent parser. In the example of the postal
    address grammar, imagine that we want to parse this line: `<language> ::= "Java"
    | "C#" | "Ruby"`. With this pattern, we create a top-down parser to translate
    the input syntax. So, imagine that we want to write a meta code for that. We can
    write something like the following:


    ```

    boolean Language()

    if(Java())

    then true

    else if (CSharp())

    then true

    else if(Ruby())

    then true

    else

    false

    ```


    Essentially, we create a recursive function for recognizing the nonterminal values
    of the syntax. Sometimes, this is enough for parsing a DSL, but if we want something
    more complex, we can use another pattern called parser generator. This pattern
    builds a parser driven by the grammar file defined for our DSL. This is the most
    complex but, at the same time, more satisfactory task when we build our DSL. Fortunately,
    now we have a large part of the library and software to perform this task for
    us, for example, ANTLR (ANother Tool for Language Recognition). With ANTLR, we
    can easily “design” our language graphically. The software generates the grammar
    for us, and what we must do after is only to parse the grammar.


    Unfortunately, not all libraries are available for our language. In Scala, for
    example, we have an ANTLR port, but it does not have full functionality. In this
    case, we can use a recursive descent parser to generate our parser, without using
    a parser generator.


    All the preceding patterns covered are used to produce the output of the DSL.
    We can now learn some patterns for producing the output. These patterns will help
    us to identify the correct strategy for the generation of our DSL.


    ## Producing the Output


    Until now, we created the parser and the parsing used for the syntax generating
    the DSLs, but what we can do with the result of the parser?


    The result of the parser is the basis for the next step in the process. In reality,
    we introduce a solution when we mention the semantic model. With the sematic model,
    we translate the input, file, or stream, and we can use this as input for code
    generation.


    For generating a semantic model when we parse the document, it is possible to
    take two different approaches to the problem.


    - A single-step approach: This means that we parse and directly generate the semantic
    model.

    - A two-step approach: First, we parse the input. We then create a tree and, after
    parsing the tree, produce the semantic model.


    If we want to use the single-step approach, we can use a pattern called embedded
    translation. Using embedded translation, we create the code directly, starting
    from the parser. In one call, we gradually create the semantic model, parsing
    every single line of the input.


    We can use this approach, because the embedded translation provides a simple way
    of handling the syntax analysis and the model population.


    The big problem with the embedded translation, however, is that using the embedded
    translation can create a complex grammar file, because we use only one command
    to translate, without using a tree to parse the file. On the one hand, we might
    think that this is a good thing, but that is not really true. The first problem
    involves the maintenance of the grammar. If we have a very complex grammar, it
    can be difficult to maintain, especially if we want to expand our DSL.


    Another issue is related to the variable we need to memorize all the information.
    Because we use a single step for parsing the grammar, we must create some context
    variable to manage that, and this can complicate the parsing. Having only one
    step for parsing all the grammar complicates the code that we need to generate.
    This is because the code needs to have in memory all the variables required for
    the parsing. Taking care with the parsing and being mindful of the three guidelines
    for creating the parser reduces the flexibility of the code. If we want to change
    something, we must review the entire code.


    The other approach we can take is two-step parsing. In this case, we use a pattern
    called tree construction. By this approach, the parser first parses the input
    and produces a syntax tree. After, we parse the syntax tree and populate the semantic
    model.


    When we create a syntax tree, we create a simple tree we can manipulate and traverse
    after creating the semantic model. This approach is simpler than the single step.
    This is because we don’t use one single action to create the semantic model. Using
    a tree gives the developer the possibility to read the tree in a second pass and
    optimize the code for parsing.


    Using two simple steps is better, because we can create a better test plan and,
    with that, a better check of the results of our parser.


    In addition to that, creating two simple steps instead of one bigger one can allow
    for better management by the developer, and this can help to reduce time and errors.'
