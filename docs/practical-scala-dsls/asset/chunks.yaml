  trans: '

    ## 我们的第一个 Scala-Android 应用


    目前，要创建我们的 Scala Android 应用，我们可以将其命名为 `PracticalScalaDSL`。这是因为之前的项目不能是空项目。为了更好地理解整个过程，最好从一个空项目开始。为此，我们启动
    Android Studio 并创建一个新的空项目（图 8-8）。


    ![A443229_1_En_8_Fig8_HTML.jpg](img/A443229_1_En_8_Fig8_HTML.jpg)


    图 8-8


    创建一个无活动的新项目


    创建好一个空的 Android 项目后，我们可以利用这个项目开始添加 Scala 类，并开发我们的 Scala Android 应用。


    我们首先需要创建一个主窗口来显示简单的“Hello World”。这样，我们就能了解如何使用 Scala 编写 Android 应用。为此，我们右键点击文件夹
    `practicalscaladsl.com.practicalscaladsl`，然后选择新建文件，如图 8-9 所示。


    ![A443229_1_En_8_Fig9_HTML.jpg](img/A443229_1_En_8_Fig9_HTML.jpg)


    图 8-9


    创建一个新文件


    我们将文件命名为 `MainActivity.scala`，由于尚未设置 Scala SDK，编辑器会提示我们进行设置，如图 8-10 所示。


    ![A443229_1_En_8_Fig10_HTML.jpg](img/A443229_1_En_8_Fig10_HTML.jpg)


    图 8-10


    系统提示我们设置 Scala SDK


    点击链接“Setup Scala SDK ➤ AndroidStudio”，会显示所有可用的 Scala 编辑器。为我们的项目选择一个，如图 8-11 所示。


    ![A443229_1_En_8_Fig11_HTML.jpg](img/A443229_1_En_8_Fig11_HTML.jpg)


    图 8-11


    添加 Scala 支持


    我们编写的第一个代码是用于创建主窗口的。代码非常简单，如下所示：


    ```

    package practicalscaladsl.com.chapter_8

    import android.app.Activity

    import android.os.Bundle

    class MainActivity extends Activity {

    override def onCreate(savedInstanceState: Bundle) {

    super.onCreate(savedInstanceState)

    setContentView(R.layout.main_layout)

    }

    }

    ```


    这段代码非常简单易懂。我们继承了 `Activity` 类并重写了 `onCreate` 函数。通过这个方法，我们调用了布局文件，在本例中是 `activity_main.xml`。


    布局本质上是 Android 中的一种资源。我们可以在 `res` 包中定义布局。它是一个简单的 `.xml` 文件。该文件创建在 `res` 文件夹下的
    `layout` 子文件夹中，如图 8-12 所示。


    ![A443229_1_En_8_Fig12_HTML.jpg](img/A443229_1_En_8_Fig12_HTML.jpg)


    图 8-12


    layout 文件夹


    这个文件的内容非常简单。


    ```


    //这段代码用于定义一个 TextView，本质上是一个带有文本的视图。我们定义的资源主要涉及布局类型、文本的显示方式以及文本内容本身。


    ```


    这个简单的文件创建了布局。在我们的例子中，我们添加了一个简单的 `TextView`（一个用于显示文本的 Android 组件），并定义了一些属性。


    Android 应用需要定义 `Context` 来调用其他资源，因此我们必须创建另一个资源文件来定义它。在这种情况下，我们在同一个文件夹中创建了另一个名为
    `content_main` 的文件。文件内容如下：


    该文件定义了我们在 Android 应用中可使用的资源。这些是启动应用的基础。我们现在要做的是启动代码。为此，我们只需点击 Android Studio 中的“运行”按钮，如图
    8-13 所示。


    ![A443229_1_En_8_Fig13_HTML.jpg](img/A443229_1_En_8_Fig13_HTML.jpg)


    图 8-13


    运行应用


    选择我们已有的设备，然后启动代码。你将看到类似图 8-14 的画面。


    ![A443229_1_En_8_Fig14_HTML.jpg](img/A443229_1_En_8_Fig14_HTML.jpg)


    图 8-14


    Scala Android 应用


    现在我们已经定义了布局，并且可以看到 Android 如何使用外部 DSL 来定义资源。但现在是时候创建我们自己的 DSL 了。我们的 DSL 将用于创建一个服务应用，这是一种后端类型的应用，用于连接
    Web 服务并获取数据。在我们的例子中，我们创建一个内部 DSL，用于创建一个服务，即我们可以在 Android 应用中定义的另一个软件组件。


    ### 在 Android 中创建服务


    Android 应用不仅仅由用户界面构成。服务是应用的一个重要组成部分。Android 服务类似于 Web 应用的后端组件。它没有任何界面，在后台运行，并且与用户没有特定的交互。


    我们可以定义不同类型的服务。例如，我们可以定义以下服务：


    *   **检查邮件**：我们可以有一个在后台运行的服务，用于检查新收到的邮件并在界面上显示。

    *   **检查社交网络**：我们可以有一个专门用于检查社交网络（例如 Facebook、Twitter、LinkedIn）的服务，并在界面上显示通知。


    这只是我们每天在手机上使用的两个服务示例。我们的服务只需要检查一个 Web 服务并显示一些更新。目前，我们将专注于创建连接该服务所需的 DSL。


    从开发者的角度来看，创建服务相对简单。我们继承 `android.app.Service` 类，然后编写服务的代码。在我们的例子中，服务通过流畅的 API
    调用我们的 DSL，从组件部分构建我们的操作。我们本质上所做的就是调用一个外部 Web 服务来获取一些结果，并将其绘制到 Android 应用中。


    ```

    package practicalscaladsl.com.chapter_8

    import android.app.{Activity, Service}

    import android.content.Intent

    import android.os.{Bundle, IBinder}

    class WebServiceExample extends Service {

    val mStartMode:Int

    var mBinder:IBinder

    val mAllowRebind:Boolean

    override def onCreate():Unit

    override def onStartCommand(intent:Intent, flags:Int, startId:Int):Int = return
    mStartMode

    override def onBind(intent:Intent):IBinder = return mBinder

    override def onUnbind(intent:Intent):Boolean = return mAllowRebind

    override def onRebind(intent:Intent)

    override def onDestroy():Unit

    }

    ```


    我们的代码继承了 `Service` 类。这个类定义了一些我们在创建方法时需要重写的接口。在集成代码时，你将了解更多关于这些方法的信息。我们现在开始创建用于调用服务的
    DSL。服务是在 Android 应用后台启动的一个组件。例如，当应用需要连接网络或执行某些后台操作时，就会使用这个类。当应用调用 `serviceStart`
    操作时，服务启动。一旦启动，服务就在后台运行并持续工作，即使应用被销毁也不会停止。要停止服务，我们必须通过代码关闭它。要停止代码，我们必须调用 `stopService`
    方法。

    '
- fmt: '### Defining Our DSLs


    As we know, a DSL is used to improve communication and allow a developer to better
    define the interface and the method used to create an API. So, we start with some
    method we can use for the fluent API. The first step is to define the common dictionary
    and the action we want solve (Table [8-1](#A443229_1_En_8_Chapter.html#Tab1)).


    **Table 8-1** The Basic Definition of Our DSL


    | Method | Definition |

    | --- | --- |

    | `Connect` | Execute the connection on the web service |

    | `Find(string Name)` | Find a user using the web service |

    | `Add(string Name)` | Add a new user to the system |


    We define three simple actions for our service. We don’t really need to add more
    action to show how to create the DSL. Our goal is to show how we can integrate
    the DSL in Android development.


    We start now to create our DSL, using the fluent API interface. This kind of method
    is used to create a chain of calls that we can read like English. So, we now create
    the code for the interface and see that it looks like the following:


    ```

    package practicalscaladsl.com.chapter_8.util

    import java.util

    import sun.net.www.http.HttpClient

    class WebFluentInterface {

    private var entity=""

    private var httpResponse= ""

    private var httpClient=""

    private var webService = ""

    case class Username(username:String)

    def Connect(webservice:String):Unit ={

    this.webService= webservice

    this

    }

    def Find(username:String):Unit ={

    httpClient = new DefaultHttpClient()

    httpResponse = httpClient.execute(new HttpGet(webservice))

    entity = httpResponse.getEntity()

    this

    }

    def add(username:String):Unit = {

    val user = new Username(username)

    val userJson = new Gson().toJson(user)

    val post = new HttpPost(this.webService)

    val nameValuePairs = new util.ArrayList[NameValuePair]()

    nameValuePairs.add(new BasicNameValuePair("JSON", userJson))

    post.setEntity(new UrlEncodedFormEntity(nameValuePairs))

    val client = new DefaultHttpClient

    val response = client.execute(post)

    println("--- HEADERS ---")

    response.getAllHeaders.foreach(arg => println(arg))

    this

    }

    }

    ```


    The code is a simple fluent API call. We have the three methods we can use to
    call the web service and post the data. The important part of the code is how
    we can use it in Android.


    We can do that by improving the `Service` class we just wrote, as follows:


    ```

    package practicalscaladsl.com.chapter_8

    import android.app.{Activity, Service}

    import android.content.Intent

    import android.os.{Bundle, IBinder}

    import practicalscaladsl.com.chapter_8.util.WebFluentInterface

    class WebServiceExample extends Service {

    val mStartMode:Int

    var mBinder:IBinder

    val mAllowRebind:Boolean

    val webFluentInterface:WebFluentInterface

    override def onCreate():Unit

    override def onStartCommand(itent:Intent, flags:Int, startId:Int):Int = {

    webFluentInterface.

    Connect("http://localhost:8080/add").

    Add("Test")

    return mStartMode

    }

    override def onBind(intent:Intent):IBinder = return mBinder

    override def onUnbind(intent:Intent):Boolean = return mAllowRebind

    override def onRebind(intent:Intent)

    override def onDestroy():Unit

    }

    ```


    You can see that we created the call for the method in the method `onStartCommand`.
    This creates the call necessary to add a new user in the web service. This is
    the simplest way to create a connection from the Android app and our DSL.


    ## Conclusion


    Mobile development is a hot prospect at the moment. In this chapter, we’ve just
    scratched its surface. You’ve seen how to create an Android project and learned
    the basics of Android development. Of course, this is merely a start.


    For a good description of mobile development, another book is probably required.
    We will now use Scala instead of Java and, at the same time, see how we can use
    DSLs to define some utility class for the service. Using a DSL in our development
    is just a new way of working. We don’t need to think of the DSL as some strange
    technique, but only as a simple way of writing our code.


    In the next chapter, we see other uses of DSLs and how simply they can be used
    in our daily work.


    # Forex Trading System


    So far, we’ve used DSLs in different areas. What you’ll see now is how to create
    a Forex (foreign-exchange) trading system. Today, more and more people are interested
    in investment, and an increasing number of developers work in finance.


    In this chapter, you will see how to use Scala and DSLs to create a complete library
    for Forex trading. You will also see how DSLs make using the system simple.


    ## What Is a Forex Trading System?


    A Forex trading system is a tool created to buy and sell in the Forex market.
    The system is based on a set of rules used to buy and sell currency. A Forex trading
    system usually is based on a set of signals. By signal is meant some specific
    indicator and value we identify and use that is derived from technical analysis.


    Every system can be configured to better manage the system. We can tell the system
    how to open and close a position and define the kinds of instruments we want to
    use for technical analysis.


    In Forex, there are some specific terms used commonly to define a position and
    identify a gain or loss in the market. To start to create our system, we must
    define the words and their meanings. This becomes our new common dictionary for
    defining the method and syntax of our DSL (Table [9-1](#A443229_1_En_9_Chapter.html#Tab1)).


    **Table 9-1** Dictionary of Items Used in Our Forex Trading System


    | Term | Description |

    | --- | --- |

    | PIP | Price interest point. This is indicated by the last digit in the rate,
    which represents the cost of every point that changes in value. For example, EUR/USD
    1 point = 0.0001 is used to calculate the standard rate, which rises or falls
    with the change in the value of 1 point. A PIP measures the amount of change in
    the exchange rate for a currency pair. For currency pairs displayed to four decimal
    places, one pip is equal to 0.0001. Yen-based currency pairs are an exception
    and are displayed to only two decimal places (0.01). |

    | BID | Price of the demand; the price you sell for |

    | ASK | Price of the offer; the price you buy for |

    | CARRY TRADE | Holding a position with a positive overnight interest return,
    in hope of gaining profits, without closing the position; just for the central
    banks’ interest rate differences |

    | BANK RATE | The percentage rate at which the central bank of a country lends
    money to the country’s commercial banks |

    | COMMISSION | Broker commissions for operation handling |

    | CURRENCY PAIRS | The duo of currencies to buy/sell, for example, EUR/USD (euro/US
    dollar) or EUR/GBP (euro/Great British pound) |

    | RATE | The agreed exchange rate between two currencies. For example, the value
    of the EUR/USD for a specific day being 1.500 |

    | PRINCIPAL AMOUNT | Called sometimes “face” or “nominal,” the amount of currency
    involved in the deal |

    | TIME FRAME | The time of a current operation |

    | DAY TRADING | Position on trading open and close on the same day |

    | LEVERAGE | The money invested when starting a new position. For example, a leverage
    with a value of 1,000 with 100 dollars invested translates into a real investment
    of 1000 × 100 = 1,000,000 dollars. Leverage is important for ascribing a value
    to a PIP. |

    | PROFIT | Positive amount of money gained after closing the position |

    | LOSS | The money lost in an already closed position |

    | STOP LOSS | The amount of PIP or money lost at the close of a position |

    | TAKE PROFIT | The amount of PIP or money gained at the close of a position |

    | STANDARD ACCOUNT | Account position with $100,000 |

    | MINI ACCOUNT | Account position with $10,000 |

    | MICRO ACCOUNT | Account position with $1,000 |


    Using this table, we can now define the problem and design our DSL.'
  raw: '### Defining Our DSLs


    As we know, a DSL is used to improve communication and allow a developer to better
    define the interface and the method used to create an API. So, we start with some
    method we can use for the fluent API. The first step is to define the common dictionary
    and the action we want solve (Table [8-1](#A443229_1_En_8_Chapter.html#Tab1)).


    Table 8-1


    The Basic Definition of Our DSL


    | Method | Definition |

    | --- | --- |

    | `Connect` | Execute the connection on the web service |

    | `Find(string Name)` | Find a user using the web service |

    | `Add(string Name)` | Add a new user to the system |


    We define three simple actions for our service. We don’t really need to add more
    action to show how to create the DSL. Our goal is to show how we can integrate
    the DSL in Android development.


    We start now to create our DSL, using the fluent API interface. This kind of method
    is used to create a chain of calls that we can read like English. So, we now create
    the code for the interface and see that it looks like the following:


    ```

    package practicalscaladsl.com.chapter_8.util

    import java.util

    import sun.net.www.http.HttpClient

    class WebFluentInterface {

    private var entity=""

    private var httpResponse= ""

    private var httpClient=""

    private var webService = ""

    case class Username(username:String)

    def Connect(webservice:String):Unit ={

    this.webService= webservice

    this

    }

    def Find(username:String):Unit ={

    httpClient = new DefaultHttpClient()

    httpResponse = httpClient.execute(new HttpGet(webservice))

    entity = httpResponse.getEntity()

    this

    }

    def add(username:String):Unit = {

    val user = new Username(username)

    val userJson = new Gson().toJson(user)

    val post = new HttpPost(this.webService)

    val nameValuePairs = new util.ArrayList[NameValuePair]()

    nameValuePairs.add(new BasicNameValuePair("JSON", userJson))

    post.setEntity(new UrlEncodedFormEntity(nameValuePairs))

    val client = new DefaultHttpClient

    val response = client.execute(post)

    println("--- HEADERS ---")

    response.getAllHeaders.foreach(arg => println(arg))

    this

    }

    }

    ```


    The code is a simple fluent API call. We have the three methods we can use to
    call the web service and post the data. The important part of the code is how
    we can use it in Android.


    We can do that by improving the `Service` class we just wrote, as follows:


    ```

    package practicalscaladsl.com.chapter_8

    import android.app.{Activity, Service}

    import android.content.Intent

    import android.os.{Bundle, IBinder}

    import practicalscaladsl.com.chapter_8.util.WebFluentInterface

    class WebServiceExample extends Service {

    val mStartMode:Int

    var mBinder:IBinder

    val mAllowRebind:Boolean

    val webFluentInterface:WebFluentInterface

    override def onCreate():Unit

    override def onStartCommand(itent:Intent, flags:Int, startId:Int):Int = {

    webFluentInterface.

    Connect("http://localhost:8080/add").

    Add("Test")

    return mStartMode

    }

    override def onBind(intent:Intent):IBinder = return mBinder

    override def onUnbind(intent:Intent):Boolean = return mAllowRebind

    override def onRebind(intent:Intent)

    override def onDestroy():Unit

    }

    ```


    You can see that we created the call for the method in the method `onStartCommand`
    `.` This creates the call necessary to add a new user in the web service. This
    is the simplest way to create a connection from the Android app and our DSL.


    ## Conclusion


    Mobile development is a hot prospect at the moment. In this chapter, we’ve just
    scratched its surface. You’ve seen how to create an Android project and learned
    the basics of Android development. Of course, this is merely a start.


    For a good description of mobile development, another book is probably required.
    We will now use Scala instead of Java and, at the same time, see how we can use
    DSLs to define some utility class for the service. Using a DSL in our development
    is just a new way of working. We don’t need to think of the DSL as some strange
    technique, but only as a simple way of writing our code.


    In the next chapter, we see other uses of DSLs and how simply they can be used
    in our daily work.


    # 9. Forex Trading System


    So far, we’ve used DSLs in different areas. What you’ll see now is how to create
    a Forex (foreign-exchange) trading system. Today, more and more people are interested
    in investment, and an increasing number of developers work in finance.


    In this chapter, you will see how to use Scala and DSLs to create a complete library
    for Forex trading. You will also see how DSLs make using the system simple.


    ## What Is a Forex Trading System?


    A Forex trading system is a tool created to buy and sell in the Forex market.
    The system is based on a set of rules used to buy and sell currency. A Forex trading
    system usually is based on a set of signals. By signal is meant some specific
    indicator and value we identify and use that is derived from technical analysis.


    Every system can be configured to better manage the system. We can tell the system
    how to open and close a position and define the kinds of instruments we want to
    use for technical analysis.


    In Forex, there are some specific terms used commonly to define a position and
    identify a gain or loss in the market. To start to create our system, we must
    define the words and their meanings. This becomes our new common dictionary for
    defining the method and syntax of our DSL (Table [9-1](#A443229_1_En_9_Chapter.html#Tab1)).


    Table 9-1


    Dictionary of Items Used in Our Forex Trading System


    | Term | Description |

    | --- | --- |

    | PIP | Price interest point. This is indicated by the last digit in the rate,
    which represents the cost of every point that changes in value. For example, EUR/USD
    1 point = 0.0001 is used to calculate the standard rate, which rises or falls
    with the change in the value of 1 point. A PIP measures the amount of change in
    the exchange rate for a currency pair. For currency pairs displayed to four decimal
    places, one pip is equal to 0.0001\. Yen-based currency pairs are an exception
    and are displayed to only two decimal places (0.01). |

    | BID | Price of the demand; the price you sell for |

    | ASK | Price of the offer; the price you buy for |

    | CARRY TRADE | Holding a position with a positive overnight interest return,
    in hope of gaining profits, without closing the position; just for the central
    banks’ interest rate differences |

    | BANK RATE | The percentage rate at which the central bank of a country lends
    money to the country’s commercial banks |

    | COMMISSION | Broker commissions for operation handling |

    | CURRENCY PAIRS | The duo of currencies to buy/sell, for example, EUR/USD (euro/US
    dollar) or EUR/GBP (euro/Great British pound) |

    | RATE | The agreed exchange rate between two currencies. For example, the value
    of the EUR/USD for a specific day being 1.500 |

    | PRINCIPAL AMOUNT | Called sometimes “face” or “nominal,” the amount of currency
    involved in the deal |

    | TIME FRAME | The time of a current operation |

    | DAY TRADING | Position on trading open and close on the same day |

    | LEVERAGE | The money invested when starting a new position. For example, a leverage
    with a value of 1,000 with 100 dollars invested translates into a real investment
    of 1000 × 100 = 1,000,000 dollars. Leverage is important for ascribing a value
    to a PIP. |

    | PROFIT | Positive amount of money gained after closing the position |

    | LOSS | The money lost in an already closed position |

    | STOP LOSS | The amount of PIP or money lost at the close of a position |

    | TAKE PROFIT | The amount of PIP or money gained at the close of a position |

    | STANDARD ACCOUNT | Account position with $100,000 |

    | MINI ACCOUNT | Account position with $10,000 |

    | MICRO ACCOUNT | Account position with $1,000 |


    Using this table, we can now define the problem and design our DSL.'
