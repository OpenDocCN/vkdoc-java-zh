    We now have defined our layout, and we can see how Android uses an external DSL
    to define the resources. But now it’s time to create our DSL. Our DSL will be
    used to create a service application, a back-end type of application used to connect
    with a web service, and get some data. In our case, we create an internal DSL,
    to create a service, another piece of software that we can define in our Android
    app.


    ## Creating Services in Android


    An Android app is not created only with a user interface. An important part of
    the application is defined by the service. An Android service is like a back-end
    component for a web application. It doesn’t have any interface; it works in the
    background; and it doesn’t have any particular interaction with the user.


    We can define different kinds of services. For example, we can define services
    for the following:


    - Check mail: We can have a service working in the background to check new mail
    received and show that in the interface.

    - Check our social network: We can have a service dedicated to checking our social
    networks, for example, Facebook, Twitter, LinkedIn, and show a notification in
    our interface.


    These are just two examples of services we can use every day in our mobile phones.
    Our service need only check a web service and show some updates. For now, we will
    concentrate on creating the DSL necessary to connect to that.


    From a developer’s point of view, the creation of a service is relatively simple.
    We extend the class `android.app.Service` and then write the code for the service.
    In our case, the service calls our DSL, via a fluent API, to build our action
    from component parts. What we do is essentially make a call to an external web
    service to get some result and draw it to the Android application.


    ```

    package practicalscaladsl.com.chapter_8

    import android.app.{Activity, Service}

    import android.content.Intent

    import android.os.{Bundle, IBinder}

    class WebServiceExample extends Service {

    val mStartMode:Int

    var mBinder:IBinder

    val mAllowRebind:Boolean

    override def onCreate():Unit

    override def onStartCommand(intent:Intent, flags:Int, startId:Int):Int = return
    mStartMode

    override def onBind(intent:Intent):IBinder = return mBinder

    override def onUnbind(intent:Intent):Boolean = return mAllowRebind

    override def onRebind(intent:Intent)

    override def onDestroy():Unit

    }

    ```


    Our code extends the class `Service`. This class defines some interface we need
    to override when we create our method. You’ll see more about the method when we
    integrate our code. We start now to create our DSL to call the service. A service
    is a component started in the background of our Android application. This class
    is used when, for example, the application must connect to a network or must execute
    some background operations. The service starts when an application calls the operation
    `serviceStart`. When this is started, the service works in the background and
    continues to work, even if the application is destroyed. To stop the service,
    we must close it via the code. To stop the code, we must call the `stopService`
    method.'
