  trans: '

    ## DSL 目标


    在创建一门 DSL 语言时，你必须在脑海中有一个清晰的目标。DSL 应当对业务用户来说是可理解且可验证的。为了设计出优秀的 DSL，必须遵循一些特定的规则。


    *   DSL 设计了一门“语言”。这意味着用户无需了解实现的细节。开发者只需使用通用词典来定义业务，然后将重点转移到方法的正确实现上。

    *   DSL 定义了一种非常小的语言。我们定义了有限的词汇集，用于实现业务领域的解决方案。正因如此，开发者能够轻松掌握这些术语并提升其知识水平。

    *   DSL 源于将业务领域映射为通用语言的想法。为了实现这一点，我们定义了一个通用词典，在其中定义词汇及其功能，然后由开发者将词汇翻译成函数。例如，假设我们想为金融应用创建一个
    DSL。我们需要定义一个特定的术语。这是因为开发者可能不了解诸如“买价”或“卖价”等金融术语。创建通用词典有助于定义术语，从而帮助开发者理解 DSL 的范围。


    在设计 DSL 时实现上述三个目标，要求我们设计的软件也必须具备良好的质量。如今，语言种类繁多，有些语言（如 Scala）允许开发者编写非常优秀的 DSL。


    当我们想为项目实现 DSL 时，应从项目的第一天就开始。就软件和解决方案架构而言，这意味着我们开始设计软件时要遵循以下规则：函数内部应有良好的文档记录，同时函数名应是业务中有效的名称。正确的
    DSL 实现会使用一些已定义的架构模式。例如，在 Martin Fowler 的《领域特定语言》一书中，可以找到可用于设计和实现 DSL 的所有模式的详细描述。


    使用 DSL 的另一个巨大好处是消除了业务用户与开发者之间的沟通障碍。当我们设计和实现 DSL 时，开发者必须理解业务领域。为此，我们定义了一个通用词典，但围绕“设计”通用词典的实践也提升了开发者的业务知识。我们几乎每天都在使用
    DSL 语言，但并未意识到这一点。一些常见的 DSL 语言包括：


    *   SQL

    *   RSpec

    *   Cucumber

    *   SBT

    *   ANT

    *   HTML

    *   CSS

    *   ANTLR


    这些语言仅代表了 DSL 的一小部分。每个人可能都在生活中的某个时刻使用过其中一种语言，而自己并未察觉。然而，所有这些语言都是为了解决特定的业务领域问题而设计的。


    ## 实现 DSL


    现在我们继续讨论如何实现 DSL。到目前为止，我只介绍了设计 DSL 时可以遵循的流程。现在，我们的重点可以转移到从开发者的角度来看，我们可以做些什么来实现这门语言。


    我们必须做出的第一个决定是如何构建语言的结构。这意味着，首先我们必须决定是使用内部 DSL 还是外部 DSL。这不是一个容易的决定，因为使用其中一种技术会驱动架构的定义，并从根本上决定开发者和业务人员如何将业务解决方案转化为软件。


    为了定义 DSL，我们必须做出的首要决定是：


    *   为两种 DSL（内部和外部）定义语言的语法，并定义用于描述业务的特定语法。这意味着我们必须定义一个完整的语法来创建这门“语言”。

    *   创建必要的解析器来定义语言的语义模型。当我们有了语法后，还必须创建解析器，将语言“翻译”成软件。


    如何实现这些步骤定义了外部 DSL 和内部 DSL 之间的区别。DSL 的一个共同点是它们的语法。区别在于我们需要解析 DSL 的时候。对于内部 DSL，为了解析语法，我们通常会定义一些
    API，例如使用表达式构建器模式来创建最终的语句。对于外部 DSL，解析器通常从外部文件（例如）读取文本，解析所有文件，然后调用相应的 API 以满足业务需求。


    最终，这两种技术解决了相同的问题。唯一的区别在于如何解析语法。对于内部 DSL，语法是通过调用内部 API 的一组序列来解决的。API 调用的顺序定义了业务需求，并最终实现业务需求。


    一个用于解析语法的流畅 API 示例是 JMock。例如，在 JMock 中，我们可以编写如下代码：


    ```

    mock.expects(once()).method("my_method").with(or(stringContains("hello"),stringContains("howyourday"))
    );

    ```


    这段代码本质上解析了一个语法，在本例中，是检查方法名是否包含我们要测试的单词的方法。


    对于外部 DSL，例如，我们使用语法来创建一个外部文件。程序调用该文件，并将其放入三部分语法中。当我们有了这三个部分，就开始调用 API，并使用结果来定义一个动作或调用另一个
    API。


    ### 语法与数据解析


    当我们定义 DSL 时，最重要的方面之一就是语法。语法来源于通用词典，应用于定义业务解决方案。


    “语法”一词指的是我们可以用来将文本流转化为软件的一组规则。每个开发者每天都在使用语法。例如，在 Scala 中创建变量时，我们使用特定的语法。想象一下，我们想定义一个新的语法来执行两个数字的求和。语法可能是
    `sum:= number ''+'' number`。这告诉我们如何执行一个操作，如果我们找到表达式 2 + 2，那么这对系统来说是有效的。语法并没有告诉我们如何解析表达式，只说明该表达式是有效的。


    告诉我们执行何种操作的是上下文。例如，我们可以定义一个两数求和操作，一个针对数字，另一个针对字符串。对于数字，我们可以执行求和，因此操作 2 + 2 返回
    4。对于两个字符串，2 + 2 的结果是 22。操作的上下文由我们想要定义的语义驱动。在前面的例子中，我们使用了数字或字符串。


    在定义了语言的语法之后，另一个重要的步骤是解析数据。解析器必须根据我们定义的语法以及我们指示如何使用该语法的方式，来读取语言。这一步对于 DSL 的效率至关重要。当我们解析数据时，可能需要在内存中存储更多信息。为了加快处理速度，我们可以创建一个符号表。这不过是一个字典。键是我们需要解析的语法词汇，例如
    `+`，值是我们必须用参数调用的操作对象。符号表是我们解析器的核心。它将所有词汇和函数保存在内存中，从而帮助开发者将语言翻译成代码。解析器使用符号表来创建调用函数，该函数将语法翻译成代码。

    '
- fmt: "### First DSL Implementation\n\nUntil now, the discussion has centered more\
    \ on the theory behind DSLs. Now I present a very short piece of code to show\
    \ what a DSL looks like. It’s time now to present some examples of real implementation,\
    \ to see how to create an actual DSL.\n\nThe first step in defining a DSL is to\
    \ design the common dictionary. Let’s see now how to define a common dictionary.\
    \ I will use the example of a CI system (see Table [2-1](#A443229_1_En_2_Chapter.html#Tab1)).\n\
    \n**Table 2-1** A Sample Common Dictionary\n\n| Word | Definition |\n| --- | ---\
    \ |\n| Repository | A place where software is stored. To connect to the repository,\
    \ we must know the URL, the user, and the password. We can specify the kind of\
    \ repository, for example, Git. Every repository can have a different parameter.\
    \ |\n| Compile | To build a specific software language, when we compile, we must\
    \ define the language to be used. This requires a different tool with which to\
    \ execute the action. The result is always a message indicating if the compilation\
    \ is doing well or not. |\n| Connect | The basic operation for executing and downloading\
    \ the software from a repository. When the connection is made, it is possible\
    \ to download the software and then compile it. |\n\nThis is a brief example of\
    \ a common dictionary. According to what we see in the common dictionary, we define\
    \ the term and a brief description of it. This description is useful, because\
    \ it tells the developer exactly what the word means and what meaning is for the\
    \ business.\n\nThis knowledge is necessary in order to create good software. It\
    \ allows the developer to write a good test case, which is necessary to ensure\
    \ the quality required for a DSL.\n\n### Common DSL Patterns\n\nTo translate a\
    \ DSL into another language, we normally use some specific design pattern. The\
    \ most common patterns are:\n\n- **Fluent interface**: The fluent interface allows\
    \ the user to call a chain of connected APIs. We use this technique, for example,\
    \ when we call our CI process, as follows: `Connect git source control language\
    \ kind \"Scala\"` — with this call we essentially create a Fluent interface for\
    \ our software.\n- **Semantic model**: In DSLs, a semantic model is a representation\
    \ of the structure we must parse in memory. The semantic model is essentially\
    \ the connection between the object created from the grammar.\n- **Parser generator**:\
    \ The parser generator is used for generating the parser starting from the grammar\
    \ of the DSL. The result of the parse is essentially the semantic model.\n\nThe\
    \ preceding offered a brief description of some common patterns. In the next chapter,\
