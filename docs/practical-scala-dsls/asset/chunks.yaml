    a diagram similar to the following (Figure [7-3](#A443229_1_En_7_Chapter.html#Fig3)).


    ![A443229_1_En_7_Fig3_HTML.jpg](A443229_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Homogenous AST tree parser


    This pattern splits the first node directly into a subset of children. Every child
