- fmt: '### Creating a Microservice in Play


    Creating a microservice is essentially building a web API with fine granularity.
    This can be done easily with Play. In the `conf` folder, there is a file called
    `routes`. This file is responsible for identifying the resource in the application.


    ```

    # Routes

    # This file defines all application routes (Higher priority routes first)

    # ~~~~

    # An example controller showing a sample home page

    GET     /                           controllers.HomeController.index

    # An example controller showing how to use dependency injection

    GET     /count                      controllers.CountController.count

    # An example controller showing how to write asynchronous code

    GET     /message                    controllers.AsyncController.message

    # Map static resources from the /public folder to the /assets URL path

    GET     /assets/*file               controllers.Assets.versioned(path="/public",
    file: Asset)

    ```


    You can see that we define all resources with the HTTP method and the controller
    method for a response to the call.


    For creating our system, we have only to add the resource on the `routes` files
    and then the method on the controller class. What we want to do is use the DSLs
    to create our microservice. This means that we must start from the resource. The
    name of the resource should be understandable by the domain experts. What we must
    do is write all the code in a DSL way, so let’s start to write our first resource
    in as such. To create a microservice in Play, we essentially must build a controller
    to respond to the end point we have defined in the routes.


    Every controller must reply to a specific end point, because the microservice
    is developed to be independent, but we can have a “service” use more than one
    controller to build the new end point. Imagine, for example, that we want to create
    a billing service. We can define the end point for the user, to create, update,
    and delete the user.


    Another microservice can create a new order for the user. The microservice can
    create an order and use the microservice user to compose a call. All that this
    microservice has indicated in the route file and defined is moved to the controller
    part. Now, we can see that the route files have an API defined in three parts:


    - The HTTP action: `GET`, `POST`, etc., is all `GET` in our case.

    - The path of the end point: For example, `/count` or `/message`

    - The controller for responding to the endpoint: For example, `controllers.Assets.versioned(path="/public",
    file: Asset)`


    The controller is the central point for managing our end point, as it is the central
    core of the microservice. We see now how we can develop our microservice, using
    a real sample scenario.


    ### Our Own DSL Microservice


    The first step in creating our own microservice is to insert resources into the
    `routes` file. To do this, we add the resource name in the file. Suppose, for
    example, that we want to work with the language `GET` HTTP method. The first step
    is to add the route, as follows:


    ```

    GET     /Language                   controllers.LanguageController.language

    ```


    This line defines the HTTP method `GET` and the action to resolve the method.
    So, to run the software, we must define the controller to initiate the action.


    We have defined a new controller called `LanguageController`, which has the following
    code:


    ```

    package controllers

    import javax.inject.Inject

    import play.api.mvc.{Action, Controller}

    /**

    * Created by User on 29/05/2017.

    */

    class LanguageController @Inject() extends Controller{

    def language = Action{

    Ok(views.html.language("language."))

    }

    }

    ```


    This simple method responds to the `GET` HTTP method and returns a page. The last
    step, then, is to define the page that shows the result.


    In Play, we can create a template to define the page. A template is defined using
    Scala and HTML. The controller sends the value that should be rendered in the
    page. For our simple page, the template looks like this:


    ```

    @(message: String)

    @main("Language Render") {

    @message

    }

    ```


    We can run our application and navigate to the language to see the result (Figure
    [5-7](#A443229_1_En_5_Chapter.html#Fig7)).


    ![A443229_1_En_5_Fig7_HTML.jpg](A443229_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    The language page


    We will now define all our MVC (model–view–controller) routes, from start to finish.
    This is a simple page, so we want to use the DSL. Normally, the controller is
    not so simple, so we prefer to use DSLs to design the business logic and the controller
    only to send data that is to be rendered.


    So, the business logic for this specific function is easy. We must read a configuration
    file and show in a table all language: active and inactive. The structure of the
    file is very simple. We can define it like this:


    ```

    language.list = "Scala,Java,C"

