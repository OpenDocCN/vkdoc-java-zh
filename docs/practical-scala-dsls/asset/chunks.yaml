    def run() {

    walk(program.statements)

    }

    private def getVariable(ident: Identifier): Expr = {

    var s: Scope = currentScope

    while ((!s.name.equals("global")) && !s.variables.contains(ident.name)) s = s.parentScope

    if (s.variables.contains(ident.name)) s.variables(ident.name)

    else {

    sys.error("Error: Undefined variable " + ident.name )

    }

    }

    //通过此方法，我们想要识别可以对数字应用哪些操作

    private def calculateExpr(e: Expr): Int = {

    e match {

    case Number(value) => value

    case Identifier(name) => {

    calculateExpr(getVariable(e.asInstanceOf[Identifier]))

    }

    case Operator(op, left, right) => {

    op match {

    case "*" => calculateExpr(left) * calculateExpr(right)

    case "/" => calculateExpr(left) / calculateExpr(right)

    case "%" => calculateExpr(left) % calculateExpr(right)

    case "+" => calculateExpr(left) + calculateExpr(right)

    case "-" => calculateExpr(left) - calculateExpr(right)

    }

    }

    }

    }

    private def isConditionTrue(condition: Condition): Boolean = {

    val a = calculateExpr(condition.left)

    val b = calculateExpr(condition.right)

    condition.op match {

    case "==" => (a == b)

    case "!=" => (a != b)

    case " (a  (a =" => (a >= b)

    case ">" => (a > b)

    }

    }

    private def executeFunction(f: Function, arguments: Map[String, Expr]) {

    currentScope = new Scope(f.name, currentScope)

    for (v  {

    val f = program.functions.filter(x => x.name == name)

    if (f.size  {

    if (value.isInstanceOf[FunctionCall]) {

    val functionCall = value.asInstanceOf[FunctionCall]

    val function = program.functions.filter(x => x.name == functionCall.name)

    if (function.size  {

    println(calculateExpr(value))

    walk(tree.tail)

    }

    case IfStatement(condition, trueBranch, falseBranch) => {

    if (isConditionTrue(condition)) walk(trueBranch) else walk(falseBranch)

    currentScope = currentScope.parentScope

    walk(tree.tail)

    }

    case _ => ()

    }

    }

    }

    }

    ```


    翻译器使用 AST 创建的标记来遍历树。对于翻译器，我们本质上采用了树遍历模式。不同的标记由 AST 创建，并在模型中定义。模型本质上是用于创建语法的普通类。


    解释器基本上实现了一种外部树访问者模式。我们使用在模型中创建的类来读取 AST 并将其翻译成一种语言。涉及的类是一个普通的 Scala 类，它们共同设计用于将输入翻译为输出。


    所有翻译器的核心是 `walk` 函数。它实现了该模式。该函数获取树（一个语句列表），检查每条语句，并调用相应的类将 AST 翻译成一种语言。


    ## 执行语言


    最后一步是创建执行语言的代码。一个对象负责读取输入文件并调用解析器。相关代码如下：


    ```

    object Language {

    def main(args: Array[String]) {

    val inputFile = Source.fromFile("source/practical.bascala")

    val inputSource = inputFile.mkString

    val parser = new SmallLanguageParser

    parser.parseAll(parser.program, inputSource) match {

    case parser.Success(r, n) => {

    val interpreter = new Interpreter(r)

    try {

    interpreter.run

    } catch {

    case e: RuntimeException => println(e.getMessage)

    }

    }

    case parser.Error(msg, n) => println("Error: " + msg)

    case parser.Failure(msg, n) => println("Error: " + msg)

    case _ =>

    }

    }

    }

    ```


    代码非常简单。它调用输入文件 `practical.bascala` 并执行它以获得结果。输入文件内容如下：


    ```

    FUNCTION printVoid()

    PRINT "Hello World"

    END FUNCTION

    SUB MAIN

    printVoid()

    END SUB

    ```


    ## 结论


    在本章中，我们进一步深入探讨了外部 DSL。我们使用外部 DSL 创建了一种新语言，您可以看到，即使并非总是容易，这也可以很有趣。


    您了解了实现语言的不同模式以及涉及的三个主要对象。最后，我们创建了自己的解析器和语言。


    当然，这只是一个简单的语言示例，但我们发现了与外部 DSL 以及使用 Scala 语言的解析器组合器相关的更有趣的技术。您现在可以轻松创建自己的语言，并将其用于我们的项目。


    # 8. 移动开发


    移动开发在日常开发中变得越来越重要。越来越多的公司现在拥有移动开发团队。在本章中，您将学习移动开发的基础知识，以及如何使用 Scala 和 DSL 创建自己的应用程序。


    ## Android 移动开发简介


    Android 是由 Android 公司（后来成为 Google 的子公司）开发的开源操作系统。Android 的特性允许开发者为不同的设备（例如台式计算机或手机）使用相同的源代码。


    Android 不仅仅是一个操作系统，更是一个生态系统。社区为您提供了完整的开发工具。Android 是移动社区的游戏规则改变者。要理解为什么 Android
    对技术社区变得如此重要，有必要了解移动软件发展的历史。


    最初的移动开发基本上基于专有操作系统。在开发方面，所有移动公司都定义并发布了 WAP（无线应用协议），这是一种用于定义网页导航的技术标准。借助 WAP，可以启动移动网页开发。每家公司都发布了
    WAP 浏览器，使开发者能够创建第一个移动网站。诺基亚是第一个改进开发的公司。从诺基亚开始，我们拥有了自己的框架，这使开发者能够创建自己的游戏。继诺基亚之后，其他公司也开发了自己的移动开发库。当然，这些软件是专有的，只能用于相应品牌的手机。


    当 Android 诞生时，它允许开发者在不大量修改代码的情况下，为大量设备创建更好的应用程序。对于 Android 开发，Google 发布了 Android
    Studio，这是一个可以简单方式开发 Android 应用程序的工具。我们将使用此工具来开发我们的 Scala 应用程序，因此，首先我们必须安装 Android
    Studio。

    '
- fmt: '### Starting with Android Development


    To begin Android development, the first step is to download the SDK (Software
    Development Kit). The new version of Android SDK is connected to Android Studio.
    This is an editor based on JetBrains IntelliJ. The link for downloading the SDK
    is [`https://developer.android.com/studio/index.html`](https://developer.android.com/studio/index.html).


    Download the software for the correct operating system and follow the instructions
    for installing Android Studio. When Android Studio is installed and started, you
    will see something similar to Figure [8-1](#A443229_1_En_8_Chapter.html#Fig1).


    ![A443229_1_En_8_Fig1_HTML.jpg](A443229_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    The Android Studio start page


    To begin our Scala Android project, we must install Scala Plugin, by selecting
    `Plugins` from the `Configure` menu (Figure [8-2](#A443229_1_En_8_Chapter.html#Fig2)).


    ![A443229_1_En_8_Fig2_HTML.jpg](A443229_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    The Configure menu


    From the `Plugins` menu, select `Browse From Repository`, and then, in the new
    menu, write `Scala`. This will show all plug-ins in Scala. Select the plug-in
    `Android Scala`, as shown in Figure [8-3](#A443229_1_En_8_Chapter.html#Fig3).


    ![A443229_1_En_8_Fig3_HTML.jpg](A443229_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Selection of the Android Scala plug-in


    Install the plug-in and then restart the program. This installs Scala Plugin on
    Android Studio. We are now ready to create our first Android project.


    To create an application, from the start page, select the link `Start new Android
    Studio Project`. This shows the steps involved in creating the project. First,
    we must indicate the name of the project and the package (Figure [8-4](#A443229_1_En_8_Chapter.html#Fig4)).


    ![A443229_1_En_8_Fig4_HTML.jpg](A443229_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Create the new Android Project


    Click `Next` and select the target Android Device. Select the device and click
    `Next`. The following screen shows the kind of basic project we want create. Select
    `Basic Activity` (Figure [8-5](#A443229_1_En_8_Chapter.html#Fig5)).


    ![A443229_1_En_8_Fig5_HTML.jpg](A443229_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Activity mobile selection


    The next step is to customize Main Activity. For the main activity of our application,
    we can leave the default details and click `Next`. Finally, the project is ready,
    and, if you follow all the steps, you will see something like Figure [8-6](#A443229_1_En_8_Chapter.html#Fig6).


    ![A443229_1_En_8_Fig6_HTML.jpg](A443229_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    The Android project is ready


    ### Anatomy of an Android Application


    First, to write our code, we must understand how an Android application is structured.
    We can see the structure on the left side of our Android Studio project (Figure
    [8-7](#A443229_1_En_8_Chapter.html#Fig7)).


    ![A443229_1_En_8_Fig7_HTML.jpg](A443229_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    The Android application anatomy


    We can identify three main folders.


    *   `manifests`: This folder contains `AndroidManifest.xml`. This file provides
    the essential information about the application.

    *   `java`: This folder contains all Java code. Android is primarily developed
    in Java. In our case, the Scala files are as well.

    *   `res`: This folder contains all no-code files necessary for the application.
    Here we can find XML files, UI, graphics files, etc.


    `AndroidManifest.xml` is mandatory for every Android application and is used to
    define the resource used in our application. Android uses `Activity` to define
    a set of tasks to be executed by our App. For example, in our basic program, you
    can find the main activity defined, as follows:


    You can see that, essentially, Android uses its own external DSL. To define the
    activity, when we read the XML, we see some specific work and action used to define
    that. This is essentially a definition for a grammar with which to parse an external
    DSL. Every activity of each application is unique to the purpose of the task.
    All activity extends the `Activity` class. This is a building block for every
    Android application.


    The `Activity` class derives from the `Context` class. In Android, an activity
    is essentially a window. From what we see in the application, `Context` is the
    central command center for an Android application. Most application functionality
    can be accessed directly using the `Context` class. This is essentially an abstract
    class. This class allows access to all the resources for the application, for
    example, configuration files, etc. From this class, we can derive all other classes
    for the operating system.'
