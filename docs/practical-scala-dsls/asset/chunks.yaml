  trans: '

    ## 创建外部 DSL


    借助 BNF，我们可以轻松定义语法，但这还不足以创建外部 DSL。一个外部 DSL 需要一些特定的步骤和组件才能发挥作用。


    BNF 用于定义语法并记录所有可用于定义程序的语法，但我们还需要一些东西来将这些语法转换为指令。为此，我们必须创建一些层，以便高效地处理我们的文件。


    首先，我们必须定义一个用于**语法分析**的层。这一层负责翻译我们的文本，并将其分解为内存中的结构。语法分析会解析文件，并使用 BNF 来识别每一行。通常的做法是解析文件并识别行尾。第一层负责在内存中创建执行程序所需的所有行。


    我们可以应用于语法分析的第一种模式称为**分隔符直接事务**。使用这种模式，我们将输入分割成块（通常是行），然后解析每一行。分隔符直接事务会读取输入的每一行，输入可以是一个流或一个定义了外部
    DSL 的文件。通过分隔符（通常是行尾或其他特定字符）将其分解成小块，然后创建 DSL 的语义模型。


    例如，假设我们想要描述一些用于构建持续集成系统的操作。代码可能如下所示：


    ```

    event code-commit example.cs

    event code-compile start

    event code-compile end

    command build code

    ```


    在这种情况下，解析器必须识别文件结尾，以识别我们想要处理的每一个事件。解析器使用换行符来识别每一行。这对许多语言来说都很常见，并且对开发者来说易于实现。


    当我们把输入分割成块后，内存中就拥有了每一行，其中包含了定义 DSL 功能的足够信息。例如，在 `event code-commit example.cs`
    这一行中，我们拥有一组用于执行某个动作的信息。


    解析 DSL 的下一步是将每一行分割成单个命令并执行它。为此，我们使用一种称为**语法直接翻译**的模式。这种模式的作用是应用语法规则并创建一棵语法树。在我们的例子中，我们已经创建了一个
    BNF，现在是时候应用 BNF 的规则来验证我们的输入并识别 DSL 的不同部分了。语法直接翻译并不定义解析器，而只定义如何应用 BNF 的规则。那么，我们如何将语法翻译成解析器呢？我们可以使用另一种称为**递归下降解析器**的模式。在之前邮寄地址语法的例子中，假设我们要解析这一行：`<language>
    ::= "Java" | "C#" | "Ruby"`。使用这种模式，我们创建一个自顶向下的解析器来翻译输入的语法。那么，假设我们想为此编写一个元代码。我们可以编写如下内容：


    ```

    boolean Language()

    if(Java())

    then true

    else if (CSharp())

    then true

    else if(Ruby())

    then true

    else

    false

    ```


    本质上，我们创建了一个递归函数来识别语法中的非终结符值。有时，这对于解析 DSL 来说已经足够了，但如果我们想要更复杂的功能，我们可以使用另一种称为**解析器生成器**的模式。这种模式构建一个由为我们的
    DSL 定义的语法文件驱动的解析器。这是构建 DSL 时最复杂，但同时也是最令人满意的任务。幸运的是，现在我们有大量的库和软件可以为我们执行此任务，例如，ANTLR（另一种语言识别工具）。使用
    ANTLR，我们可以轻松地以图形方式“设计”我们的语言。该软件会为我们生成语法，之后我们只需解析该语法即可。


    不幸的是，并非所有库都适用于我们的语言。例如，在 Scala 中，我们有一个 ANTLR 的移植版本，但它并不具备完整功能。在这种情况下，我们可以使用递归下降解析器来生成我们的解析器，而无需使用解析器生成器。


    前面介绍的所有模式都用于生成 DSL 的输出。现在我们可以学习一些用于生成输出的模式。这些模式将帮助我们确定生成 DSL 的正确策略。


    ### 生成输出


    到目前为止，我们已经创建了解析器以及用于生成 DSL 语法的解析过程，但解析器的结果能用来做什么呢？


    解析器的结果是流程下一步的基础。实际上，我们在提到**语义模型**时就已经引入了一个解决方案。通过语义模型，我们翻译输入（文件或流），并将其用作代码生成的输入。


    为了在解析文档时生成语义模型，可以采用两种不同的方法来解决这个问题。


    *   **单步方法**：这意味着我们解析并直接生成语义模型。

    *   **两步方法**：首先，我们解析输入。然后，我们创建一棵树，并在解析完这棵树后，生成语义模型。


    如果我们想使用单步方法，可以使用一种称为**嵌入式翻译**的模式。使用嵌入式翻译，我们直接从解析器开始创建代码。在一次调用中，我们逐步创建语义模型，解析输入的每一行。


    我们可以使用这种方法，因为嵌入式翻译提供了一种处理语法分析和模型填充的简单方式。


    然而，嵌入式翻译的一个大问题是，使用嵌入式翻译可能会创建复杂的语法文件，因为我们只使用一个命令进行翻译，而没有使用树来解析文件。一方面，我们可能认为这是一件好事，但事实并非如此。第一个问题涉及语法的维护。如果我们有一个非常复杂的语法，维护起来可能会很困难，尤其是当我们想要扩展
    DSL 时。


    另一个问题与我们需要存储所有信息的变量有关。因为我们使用单步来解析语法，所以必须创建一些上下文变量来管理它，这会使解析复杂化。只用一步来解析所有语法会使我们需要生成的代码变得复杂。这是因为代码需要在内存中保存解析所需的所有变量。在解析时小心翼翼并牢记创建解析器的三条准则会降低代码的灵活性。如果我们想改变某些东西，就必须审查整个代码。


    我们可以采用的另一种方法是两步解析。在这种情况下，我们使用一种称为**树构建**的模式。通过这种方法，解析器首先解析输入并生成一棵语法树。之后，我们解析这棵语法树并填充语义模型。


    当我们创建语法树时，我们创建了一棵简单的树，可以在创建语义模型后对其进行操作和遍历。这种方法比单步方法更简单。这是因为我们不是通过单个动作来创建语义模型。使用树让开发者有机会在第二次遍历中读取树，并优化解析代码。


    使用两个简单的步骤更好，因为我们可以制定更好的测试计划，从而更好地检查解析器的结果。


    除此之外，创建两个简单的步骤而不是一个更大的步骤，可以让开发者更好地进行管理，这有助于减少时间和错误。

    '
- fmt: '### What Is a Parser?


    To translate an external DSL, we need to write a parser into the code, but what
    does this mean? What is a parser? By the term `parser`, we define a piece of software
    used to translate input into executable code.


    When we create our `parser`, we essentially translate the input in two different
    stages:


    - Identify the lexing

    - Apply the grammar


    The `parser` first needs to identify the lexical structure of the line we have
    to parse. After that, we must apply the rules of the grammar defined for the DSLs
    and, with the grammar, create our output.


    To separate the lexing, we use the pattern `syntax-delimiter translation`. With
    this pattern, we essentially identify every single word from our syntax. For example,
    in the preceding code, we have something like this:


    ```

    ["event" , "code-commit" , "example.cs"]

    ```


    Essentially, we create some tokens with the words of the input files, meaning
    that we isolate the `lexer`. A `lexer` is essentially software for performing
    the lexical analysis, used to create a token starting from a string. A token is
    essentially a part of a string or letter. When we have split our string, the pattern
    we can use to isolate the `lexer` is called `regex table lexer`. As the name suggests,
    we create a lexical analyzer, using a list of regular expressions. In this way,
    we can easily split the string and identify the single word of the input.


    When we have identified every single word, we can begin to create the tree and
    apply the rules of the grammar for the language.


    The next steps are checked, if the line respects the grammar of our DSL. A regular
    grammar is important to us, because it defines the rules for translation. If we
    define a good grammar, we can easily use a finite state machine to parse the grammar.


    It is possible to use a finite state machine, because, essentially, with a good
    grammar, we can identify what is the next state of the machine, based on the actual
    word. Parsing is the basis of an external DSL. A good parser allows you to have
    a high level of maintainability of the software. Imagine, for example, we want
    to parse this state:


    ```

    event code-commit example.cs

    event code-compile start

    event code-compile end

    command build code

    ```


    The basic function for the parser can be something like this:


    ```

    def event : Parser[Any] = """CODE-"""".r

    def commit : Parser[Any] = "COMMIT"~string

    def compile : Parser[Any] = "COMPILE"~string

    ```


    This function is essentially the base for defining a parser in Scala. The state
    machine is essentially a set of functions called when we must translate the code.


    For context-free grammar, such as that of our DSL, the best approach to translate
    and create the state machine is to implement a push-down machine. For creating
    this kind of state machine, we essentially create a simple state machine with
    an internal stack. In Chapter [6](#A443229_1_En_6_Chapter.html), you will see
    how to create a complete parser.


    ### What Style of DSL to Use


    Until now, we’ve seen two styles of DSLs. I highlighted how to create one style
    or the other, but the most important decision we must make when we implement a
    DSL is what kind of DSL to choose.


    The difficult part in making the choice is inadequate information. More projects
    start without the correct level of information, and this can create problems when
    you need to think about what style of DSLs you must choose.


    Another factor that must be considered when we make the choice is the skill of
    the team. If the team is not skilled at working with DSLs, what we must consider
    in this case is the learning curve. At first glance, an internal DSL is simpler
    to learn compared to an external DSL. This is because for writing an internal
    DSL, we don’t require a grammar, but only to define a set of API for solving the
    business problem.


    On the other hand, for creating an external DSL, we have to implement all parsers
    for processing the input and creating the output. Of course, the power of a parser
    is not comparable to that of an internal DSL, but at the same time, the cost is
    completely different.


    The best approach is to use one step or two. If we work in an Agile environment,
    explore the difference between the two approaches and figure out what the best
    one is for you. This can drive the decision and, for example, show what is the
    best for your work. Keep in mind that one style doesn’t exclude another. You can
