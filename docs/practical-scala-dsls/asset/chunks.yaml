- fmt: '## Conclusion


    So far, you have seen DSL used in different fields. The last I discussed is the
    video game. In this chapter, I have highlighted how a DSL can be used in everyday
    development, not only to define a specific pattern or use a specific technique,
    but, for example, to define a name for a method and variable that can be used
    in plain English. The DSL can be integrated in everyday development, starting
    with simple steps. The most important change we can make with the DSL is to begin
    to think about the method and the variable in plain English. After that, we can
    start to improve the method and the pattern involved in that.


    # 11. Cloud and DevOps


    Cloud and DevOps are currently the hot tickets for many organizations. Increasingly,
    businesses are migrating to the cloud and adopting DevOps to meet their everyday
    requirements.


    DevOps helps organizations to reduce the time to market of their products and/or
    services, and cloud computing helps to reduce infrastructure costs. By freeing
    a business from having to maintain its own servers, and by helping to solve problems
    faster, costs are reduced. For example, if there is a problem with a server, if
    it is in the cloud, a new server can be created, instead of spending resources
    to repair the broken one.


    In particular, DevOps and cloud are used for microservices, as discussed in Chapter
    [5](#A443229_1_En_5_Chapter.html). In this chapter, I introduce some DevOps practices
    and describe how to use Scala and DSLs to create and deploy services in the cloud.


    ## What Is DevOps?


    DevOps is a portmanteau word formed from the union of “dev,” for developer, and
    “ops,” for operational. These two words encompass the entire software life cycle
    and represent a set of practices born of the idea of removing every friction during
    the development life cycle. The growth of DevOps coincided with that of the cloud.
    It is not unusual to see cloud companies adopt DevOps for managing their development
    life cycles.


    DevOps was described as “on the rise” by Gartner in 2013. That description was
    characterizing what was then an emerging technology. In the last four years, DevOps
    has become the latest sensation at many companies.


    If we wanted to define DevOps, we could say that it is a set of practices across
    a company, with the goal of reducing the time to market of every initiative and
    improving the quality of the product releases.


    This simple definition is at the core of DevOps.


    - **Quality**: The goal of DevOps is to improve and guarantee the quality of the
    software in every single deployment. This is done to put in practice some common
    procedures during development and deployment.

    - **Reduce the time to market**: It is important to reduce the time from the release
    of the code in the repo to the final build. To do that, DevOps adopts continuous
    integration (CI). Every component of the code is built and tested immediately.

    - **Improve the communication across the company**: The purpose of DevOps is to
    reduce friction across the company. To accomplish that, it shares common practices
    company-wide.


    Of course, the successful adoption of DevOps requires some common practices. These
    help to introduce them across the company and ensure the success of their implementation.


    ## Common DevOps Practice


    To be successful, DevOps introduces some practices that help make operations smoother
    and more efficient. These practices can be summarized as follows:


    - Ops professionals should be the leading citizens of the software architecture.
    They are the people responsible for maintaining the code. Involving them in the
    design of the architecture helps to create better logs, and this translates into
    less downgrade time in case of error.

    - Developers should be responsible for breaking the code in production. Usually,
    after developers complete a job, their involvement ends. This creates a mentality
    by which the developer doesn’t really care about what happens in production. Allowing
    developers to be responsible when there is a problem in production has two significant
    benefits. First, the developer can help to fix the issue faster, and second, the
    developer is able to know what happens when the code is broken.

    - The company should ensure that all its employees use the same build process.
    Having a clear build and deployment process across the company helps to improve
    quality and reduce time to market.

    - Continuous deployment (CD) and CI should be adopted for a better build process
    and better release. Both practices ensure a smoother and faster build. These processes
    involve only the new part of the code and not all the code, which reduces build
    time and helps to identify errors more quickly.

    - The infrastructure-as-code design should be implemented, which ensures better
    and more reliable infrastructure, particularly in the cloud.


    All these practices should be taken together to help to initiate good DevOps procedures
    and reduce the time to market. They should be approved and sponsored by management.
    It is important for management to understand the value of these procedures and
    help to put them in place in the correct manner. DevOps is important for every
    company to be successful in business right now.


    At this point, what we want to do is begin to create some code that can be used
    to design our infrastructure. The software we use to do this is Scala and AWS.
    These will support the CI and CD in every project. Of course, we must have some
    basic methodologies that allow, in particular, test-driven development (TDD).
    With this kind of software development, using XP programming, a developer writes
    the test for the code first. The test is based on user input, and then the code
    for passing the test is written. This is basically what takes place in the practice
    of CI and CD.


    ## Start with AWS


    The first step in AWS development is to create a free AWS account. To create a
    free one-year account, go to [`https://aws.amazon.com/`](https://aws.amazon.com/).
    Remember: You must enter a valid credit card credential to begin the trial. When
    you have logged in to the new account, you will see something like Figure [11-1](#A443229_1_En_11_Chapter.html#Fig1).


    ![A443229_1_En_11_Fig1_HTML.jpg](A443229_1_En_11_Fig1_HTML.jpg)


    Figure 11-1 The AWS console


    We can see that a lot of different services are at our disposal. What we want
    to concentrate on in this chapter is EC2 and Lambda.


    To begin to develop, we must install an SDK. Unfortunately, Amazon doesn’t produce
    an SDK for Scala, but we can use the Java version, so the next step is to install
    the SDK from Java. To download the SDK, go to [`https://aws.amazon.com/sdk-for-java/`](https://aws.amazon.com/sdk-for-java/)
    and install it. Try via the console to see if the SDK has been correctly installed.
    For this, just write `aws` in the console. If all is working correctly, you will
    see something like Figure [11-2](#A443229_1_En_11_Chapter.html#Fig2).


    ![A443229_1_En_11_Fig2_HTML.jpg](A443229_1_En_11_Fig2_HTML.jpg)


    Figure 11-2 The AWS command line interface


    This shows that the AWS is installed. Now we can start to write our code.'
