  raw: '### First DSL Implementation


    Until now, the discussion has centered more on the theory behind DSLs. Now I present
    a very short piece of code to show what a DSL looks like. It’s time now to present
    some examples of real implementation, to see how to create an actual DSL.


    The first step in defining a DSL is to design the common dictionary. Let’s see
    now how to define a common dictionary. I will use the example of a CI) system
    (see Table [2-1](#A443229_1_En_2_Chapter.html#Tab1)).


    Table 2-1


    A Sample Common Dictionary


    | Word | Definition |

    | --- | --- |

    | Repository | A place where software is stored. To connect to the repository,
    we must know the URL, the user, and the password. We can specify the kind of repository,
    for example, Git. Every repository can have a different parameter. |

    | Compile | To build a specific software language, when we compile, we must define
    the language to be used. This requires a different tool with which to execute
    the action. The result is always a message indicating if the compilation is doing
    well or not. |

    | Connect | The basic operation for executing and downloading the software from
    a repository. When the connection is made, it is possible to download the software
    and then compile it. |


    This is a brief example of a common dictionary. According to what we see in the
    common dictionary, we define the term and a brief description of it. This description
    is useful, because it tells the developer exactly what the word means and what
    meaning is for the business.


    This knowledge is necessary in order to create good software. It allows the developer
    to write a good test case, which is necessary to ensure the quality required for
    a DSL.


    ### Common DSL Patterns


    To translate a DSL into another language, we normally, use some specific design
    pattern. The most common patterns are


    *   Fluent interface : The fluent interface allows the user to call a chain of
    connected APIs We use this technique, for example, when we call our CI process,
    as follows: `Connect git source control language kind "Scala"` with this call
    we essentially create a Fluent interface for our software.

    *   Semantic model : In DSLs, a semantic model is a representation of the structure
    we must parse in memory. The semantic model is essentially the connection between
    the object created from the grammar.

    *   Parser generator : The parser generator is used for generating the parser
    starting from the grammar of the DSL. The result of the parse is essentially the
    semantic model.


    The preceding offered a brief description of some common patterns . In the next
    chapter, we delve deeper and try to isolate and describe the patterns that we
    can use for both internal and external DSLs.


    ## Conclusion


    In this chapter, I discussed the basic theory behind DSLs The two types of DSLs,
    internal and external, were defined, and a simple sample DSL was provided. Of
    course, the theory behind DSLs is very extensive, and we will go deeper into this
    in the following chapters. For now, some basic patterns for designing our DSL
    have been identified. In the next chapters, I will describe in greater detail
    what internal and external DSLs are and identify common patterns we can use for
    design.


    # 3. Internal DSL


    In the previous chapter, you received a brief introduction to the different kinds
    of DSLs. In this chapter, you will see how to build an internal DSL. Some languages
    use the acronym DSL to indicate a subset of a language used in everyday life.
    As an example, we can think of software such as Chef or Puppet, in which it is
    possible to use “RubyDSL” to write the configuration files.


    ## Creating an Internal DSL


    Until now, I discussed DSLs mostly in terms of theory and presented some issues
    and benefits to consider when adopting DSLs. When we create an internal DSL, we
    have some limitations connected with the language. This means that all the expressions
    we create must be valid for the host language. We shouldn’t forget that when we
    created an internal DSL, we created a subset of new instructions inside a GPL
    . When you think of a DSL, you must think of it as a language for creating another
    language.


    The Ruby community uses and generates a lot of DSLs. This is because, with the
    metaprogramming technique, it is easy to create good DSLs. Of course, using the
    same techniques with another language can’t yield the same results. Scala by nature
    has a very nifty syntax, and this allows it to create very good and clear DSLs.
    When we have to create an internal DSL, we normally use some specific pattern
    to help in the process. One of the techniques used to define an internal DSL is
    a fluent interface . We can think of a fluent interface as a synonym for internal
    DSL.


    When we consider a fluent interface , we can contemplate building a set of API
    functions for constructing the call in plain English. We can use some different
    patterns to implement this technique. The most common is method chaining. With
    this pattern, we create a “chain” of methods for calling the object.


    ### Method Chaining


    With method chaining , a set of methods is called in a chain to create an object,
    which is typical of object-oriented programming . Imagine, for example, that we
    want to create an object `Student` using method chaining.


    ```

    case class Student(private val name: String = null , private val year: Int = 0
    ) {

    def setName(newName: String) = Student( newName, this.year )

    def setYear(newYear: Int) = Student( this.name, newYear )

    def introduce { println( s"Hello, my name is $name and I am on the $year ." )
    }

    }

    object App {

    def main(args: Array[String]) {

    Student().setName("Peter").setYear(2).introduce

    }

    }

    ```


    Now we can see that we’ve established a chain of methods for creating an object.
    So, method chaining is a sequence of methods called to set the data on the object
    we want to create.


    Note


    In the preceding code, we used a case class to define our object. A case class
    is immutable by default and can be used in pattern matching. It’s compared by
    structural equality, not by reference. The instantiation of a case class doesn’t
    require the `new` keyword, and we can see that the definition is very succinct
    and simple to use.


    A case class is very useful when we want to define immutable data. We can use
    the following syntax: `case class User( name :String)`. This syntax creates a
    case class called `User`. To use the class, we can simply call and assign a value.


    ```

    scala> case class User(name :String)

    defined class User

    scala> val user=User("Pierluigi Riti")

    user: User = User(Pierluigi Riti)

    ```


    The case class doesn’t require the keyword `new` to be instantiated. This is because
    we have a method, `apply`, by default, and this takes care of the instantiation
    of the class.


    The function `Apply` in mathematics and computer science is one that applies functions
    to arguments. In Scala, it is used to fill the gap between object-oriented and
    functional programming. For example, the function a`pply` can override a value,
    as in the following:


    ```

    scala> class TestApply {

    |     def apply() = "Hello World"

    | }

    defined class TestApply

    scala> val test= new TestApply()

    test: TestApply = TestApply@3b42121d

    scala> test()

    res0: String = Hello World

    ```


    Here we can see that the function `apply` is being called when we create the instance
    of the class, and this `Apply` is the function of the class.


    With method chaining, the construction of the object is easier than with the classic
    construction method. Remember the term fluent interface? It is another name we
    can use for method chaining. These techniques create a cascade of methods with
    which to build the final object. The cascading of the object is made by each method
    returning an object with its parameters set. In this way, when we build the chain,
    we add a value to the object, and at the end, we have created a complete object.'
  trans: '

    ### 首次实现 DSL


    到目前为止，讨论主要集中在 DSL 背后的理论上。现在，我将展示一段非常简短的代码，来说明 DSL 是什么样子。是时候展示一些实际实现的例子，看看如何创建一个真正的
    DSL 了。


    定义 DSL 的第一步是设计通用词典。现在让我们看看如何定义通用词典。我将以 CI 系统为例（见表 2-1）。


    表 2-1


    一个通用词典示例


    | 词语 | 定义 |

    | --- | --- |

    | 仓库 | 存储软件的地方。要连接到仓库，我们必须知道 URL、用户名和密码。我们可以指定仓库的类型，例如 Git。每个仓库可能有不同的参数。 |

    | 编译 | 构建特定的软件语言，编译时，我们必须定义要使用的语言。这需要不同的工具来执行操作。结果总是一条消息，指示编译是否成功。 |

    | 连接 | 从仓库执行和下载软件的基本操作。建立连接后，可以下载软件，然后进行编译。 |


    这是一个通用词典的简要示例。根据我们在通用词典中看到的内容，我们定义了术语及其简要描述。这个描述很有用，因为它准确地告诉开发者这个词的含义以及它在业务中的意义。


    这些知识对于创建良好的软件是必要的。它使开发者能够编写良好的测试用例，这对于确保 DSL 所需的质量是必要的。


    ### 常见 DSL 模式


    要将 DSL 翻译成另一种语言，我们通常会使用一些特定的设计模式。最常见的模式有：


    *   **流畅接口**：流畅接口允许用户调用一系列连接的 API。例如，当我们调用 CI 流程时，会使用这种技术，如下所示：`Connect git source
    control language kind "Scala"`，通过这个调用，我们实际上为软件创建了一个流畅接口。

    *   **语义模型**：在 DSL 中，语义模型是我们在内存中必须解析的结构的一种表示。语义模型本质上是语法创建的对象之间的连接。

    *   **解析器生成器**：解析器生成器用于从 DSL 的语法生成解析器。解析的结果本质上就是语义模型。


    以上是对一些常见模式的简要描述。在下一章中，我们将深入探讨，并尝试分离和描述可用于内部和外部 DSL 的模式。


    ## 结论


    在本章中，我讨论了 DSL 背后的基本理论。定义了内部和外部两种 DSL 类型，并提供了一个简单的 DSL 示例。当然，DSL 背后的理论非常广泛，我们将在后续章节中深入探讨。目前，我们已经确定了一些设计
    DSL 的基本模式。在接下来的章节中，我将更详细地描述什么是内部和外部 DSL，并确定我们可以用于设计的常见模式。


    # 3. 内部 DSL


    在上一章中，您对不同类型的 DSL 有了简要的了解。在本章中，您将看到如何构建内部 DSL。有些语言使用缩写 DSL 来表示日常生活中使用的语言子集。例如，我们可以想到
    Chef 或 Puppet 这样的软件，在这些软件中，可以使用“RubyDSL”来编写配置文件。


    ## 创建内部 DSL


    到目前为止，我主要从理论角度讨论了 DSL，并介绍了采用 DSL 时需要考虑的一些问题和好处。当我们创建内部 DSL 时，会面临一些与语言相关的限制。这意味着我们创建的所有表达式对于宿主语言来说都必须是有效的。我们不应忘记，在创建内部
    DSL 时，我们是在通用编程语言内部创建了一个新的指令子集。当你想到 DSL 时，必须将其视为一种用于创建另一种语言的语言。


    Ruby 社区使用并生成了大量 DSL。这是因为借助元编程技术，很容易创建出优秀的 DSL。当然，使用相同的技术在其他语言中可能无法获得相同的结果。Scala
    天生具有非常简洁的语法，这使得它能够创建出非常出色且清晰的 DSL。当我们需要创建内部 DSL 时，通常会使用一些特定的模式来辅助这一过程。用于定义内部 DSL
    的技术之一是流畅接口。我们可以将流畅接口视为内部 DSL 的同义词。


    当我们考虑流畅接口时，可以考虑构建一组 API 函数，用于以通俗易懂的英语构建调用。我们可以使用一些不同的模式来实现这种技术。最常见的是方法链。使用这种模式，我们创建一系列方法来调用对象。


    ### 方法链


    使用方法链时，会以链式方式调用一组方法来创建一个对象，这是面向对象编程的典型特征。例如，假设我们想使用方法链创建一个 `Student` 对象。


    ```

    case class Student(private val name: String = null , private val year: Int = 0
    ) {

    def setName(newName: String) = Student( newName, this.year )

    def setYear(newYear: Int) = Student( this.name, newYear )

    def introduce { println( s"Hello, my name is $name and I am on the $year ." )
    }

    }

    object App {

    def main(args: Array[String]) {

    Student().setName("Peter").setYear(2).introduce

    }

    }

    ```


    现在我们可以看到，我们已经建立了一个用于创建对象的方法链。因此，方法链是一系列被调用的方法，用于设置我们想要创建的对象上的数据。


    注意


    在上述代码中，我们使用了一个 case 类来定义我们的对象。case 类默认是不可变的，并且可以用于模式匹配。它通过结构相等性进行比较，而不是通过引用。实例化
    case 类不需要 `new` 关键字，我们可以看到定义非常简洁且易于使用。


    当我们想要定义不可变数据时，case 类非常有用。我们可以使用以下语法：`case class User( name :String)`。此语法创建了一个名为
    `User` 的 case 类。要使用该类，我们可以简单地调用并赋值。


    ```

    scala> case class User(name :String)

    defined class User

    scala> val user=User("Pierluigi Riti")

    user: User = User(Pierluigi Riti)

    ```


    case 类不需要关键字 `new` 来实例化。这是因为默认情况下，我们有一个 `apply` 方法，它负责类的实例化。


    在数学和计算机科学中，`Apply` 函数是将函数应用于参数的函数。在 Scala 中，它用于填补面向对象编程和函数式编程之间的空白。例如，`apply`
    函数可以覆盖一个值，如下所示：


    ```

    scala> class TestApply {

    |     def apply() = "Hello World"

    | }

    defined class TestApply

    scala> val test= new TestApply()

    test: TestApply = TestApply@3b42121d

    scala> test()

    res0: String = Hello World

    ```


    这里我们可以看到，当我们创建类的实例时，`apply` 函数被调用了，而这个 `Apply` 就是类的函数。


    使用方法链，对象的构建比经典的构建方法更容易。还记得“流畅接口”这个术语吗？它是我们可以用来指代方法链的另一个名称。这些技术创建了一系列方法，用于构建最终对象。对象的级联是通过每个方法返回一个设置了其参数的对象来实现的。这样，当我们构建链时，我们向对象添加一个值，最终我们就创建了一个完整的对象。

