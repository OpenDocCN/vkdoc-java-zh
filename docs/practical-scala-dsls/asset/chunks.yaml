  trans: '

    ## 何时使用微服务


    关于微服务，我们必须做出的最重要决定是何时使用它。当我们必须设计大型系统时，微服务通常特别有用。这是因为我们可以更高效地分配工作，同时改进软件的不同领域。这缩短了软件发布到生产环境所需的时间。


    微服务本质上是目标导向的。这意味着当我们创建微服务时，我们是在思考解决一个特定的问题。每个服务通常解决一个特定的问题，而这些解决方案可以组合起来解决更大的问题。


    微服务背后的一个理念是其可替换性。由于微服务是一个非常小的服务，如果我们需要改进或为其添加某些功能，最好的做法是替换整个服务，而不是维护或改进现有的服务。


    微服务具有一些独特的特性，可以帮助企业做出更好的决策。


    *   微服务体积小。

    *   微服务通过消息进行工作。

    *   每个微服务都针对特定的领域上下文。

    *   每个微服务独立开发工作。

    *   微服务可以自动部署和发布。


    现在，我们可以看到微服务实现了一些重要的功能。对一些架构师来说，微服务就像一个乌托邦，允许同时实施许多实践。实际上，如果我们看到这些实践正是 DevOps
    所解决的问题，那么公司会采用 DevOps 来更轻松地实现微服务。


    采用微服务的另一个巨大优势是系统的可扩展性。这意味着系统可以毫无问题地增长。在这种情况下，我们只需要构建更多的微服务。微服务的这一特性使得这种架构在考虑大型公司或任何希望与市场保持同步的公司时成为理想选择。


    ## REST 架构


    微服务使用 REST（表述性状态转移）架构来允许与其他服务通信。这意味着 REST 是设计和实现良好微服务架构的基础。这是因为客户端无需了解 API 的任何结构，只需知道如何与之通信。


    当我们创建 REST 架构时，我们是从“资源”的角度思考。这意味着我们不必只考虑如何使用服务器以及如何响应服务。我们并不真正关心 API 是如何构建的以及它的结构是什么。我们只考虑如何调用
    API。


    当我们使用 REST API 时，我们使用四种 HTTP 方法：`GET`、`PUT`、`POST` 和 `DELETE`。每个 REST API 都使用这些方法来激活服务器上的
    API。客户端调用此 HTTP 方法，并将其作为 HTTP 状态码发送回来。微服务通常被构建得较小，这意味着在构建时，我们设计时心中要想着组合和可重用性。由于该架构提倡使用小型服务，微服务通常与
    REST 一起使用。这与 SOAP（简单对象访问协议）服务相反。当我们有一个基于 XML 的服务时，一个主要的区别尤其与服务的使用者有关。对于微服务，端点更易于读取和调用。另一个主要区别是构建
    REST 架构需要更少的技术资源。通常，当我们使用 SOAP 时，我们必须有一个服务发现服务，用于获取端点。之后，我们必须将 WSDL（Web 服务描述语言）转换为接口，并通过接口来读取数据的方法。


    REST API 通常使用 JSON（JavaScript 对象表示法）进行通信。当然，有些服务使用 XML，但通常，系统技术与 JSON 相关联。当使用
    REST 服务时，我们使用 JSON 结构调用 API，并处理响应。例如，如果我们需要获取用户信息，我们使用 HTTP 方法 `GET` 来请求资源信息并返回结果。例如，如果我们想使用
    CURL 查询服务，我们会编写以下内容：


    ```

    CURL -X GET http://myservice/user/1

    ```


    你可以看到我们使用 HTTP 方法来调用站点。API 的响应将如下所示：


    ```

    {

    "id":1

    "name":"Pierluigi"

    "surname":"Riti"

    }

    ```


    这是一个简单的 JSON 结构，是 REST API 发送给客户端的唯一响应。我们可以看到 JSON 是一个简单的文本文件，其结构是人类可读的。REST 架构是微服务架构的支柱。


    当我们谈论 REST 架构时，我们指的是具有某些属性的架构。这些特性可以总结如下：


    *   **性能**：我们将架构设计得更快、更易于连接。因为我们使用 HTTP 的状态，我们可以立即理解响应的状态，而不是解析 WSDL。

    *   **可扩展性**：由于服务被设计得很小，我们可以实现水平或垂直扩展，这可以为服务器增加更多资源并在服务器上部署服务。

    *   **易于维护**：大多数 REST Web 服务通常部署在云端。这意味着在出现问题时，很容易替换出故障的微服务。同时，由于微服务的范围非常有限，因此很容易隔离和修复有问题的代码。

    *   **可移植性**：由于微服务被设计得很小并且通常部署在云端，数据与服务是分离的。这意味着我们可以轻松地将服务部署到另一台服务器上而不会丢失数据。

    '
- fmt: '# REST Web Services and Microservices


    REST web services are born to be independent of one another. When we contemplate
    and design the service, we consider the service itself. We define one or more
    actions to communicate with the service, and we expose some end point. This kind
    of design allows the developer to use the web service without really having to
    know the details of its implementation. In this way, it is easy to build and reuse
    the web service in different contexts.


    REST architecture is designed with some constraints in mind.


    * **Separation of concerns**: When we define a microservice architecture, we must
    still define a client-server architecture. We must have a clear separation of
    responsibility between every single piece of the application.

    * **Must be cache-free**: A microservice is normally built into a web server.
    This means that the information can be cached for use the next time, but when
    we use the microservice, we must be sure to remove the last information from the
    server.

    * **Must be stateless**: When we design a microservice, we must be sure that it
    is stateless. This means that we don’t memorize the state of the service. Every
    time we call, we have a new state for the service.

    * **The service must be reach by a uniform interface**: The microservice is based
    on the Web using URIs (Uniform Resource Identifiers). To identify the service,
    for example, when we create a resource for an end point, we use something such
    as the following: `<server>/user/1`. This opens another point of our architecture.

    * **The resource should be indicated in the request**: For example, when we ask
    for `/user`, we identify what resource we must use and what resource we want to
    manipulate.

    * **The microservice must use the Hypermedia as the Engine of Application State
    (HATEOAS)**: This constriction is specific to REST architecture. It means that
    the client can interact with the server only via hypermedia. The client doesn’t
    have to know anything about the server. Unlike other server applications, such
    as SOA or CORBA (Common Object Request Broker), in which the client must know
    what protocol to use to talk with the server and what kind of information is required
    to send for initiating the communication, in REST, only the information matters
    to the client. The client sends a request via hypermedia and asks for the typical
    kind of result for a response. This is done by using the `content-type` specification
    in the request.


    Using this constriction helps to design a good microservice. If we want to identify
    a philosophy behind the microservice, we can consider the Unix philosophy: “Write
    programs that do one thing and do it well.”


    ## Designing Microservices in Scala


    To this point, I have presented some basic theory behind microservices, but the
    goal of the book is how to write DSLs using Scala. So, it is now time to dirty
    our hands with some code. Our guiding principal is that the microservice must
    allow for better transparency and communication. DSLs help the consumer of the
    microservice to enhance communication. How we teach the DSL is not only a technique
    for writing code but one for writing code that can be read like plain English.
    The DSLs are used to define the resource of the microservice, in particular, the
    principle behind the DSLs, and, internally, to write code that reads like plain
    English.


    Scala has a fantastic framework for writing web applications. I’m referring to
    Play. Play is an MVC framework and can be used in Java or Scala, so the first
    step we must take is to install Play on our machine.


    ### Installing the Play Framework


    For installing the Play framework, we first must download it. To download the
    software, go to the following web address: [`www.playframework.com/download`](http://www.playframework.com/download).


    The best point from which to start to use Play is to download a “Starter Project.”
    Download the zip file of the Scala project (Figure 5-3).


    ![A443229_1_En_5_Fig3_HTML.jpg](A443229_1_En_5_Fig3_HTML.jpg)


    **Figure 5-3** Selecting a Starter Project from Play


    Unzip the file and open the folder. The structure should be something like Figure
    5-4.


    ![A443229_1_En_5_Fig4_HTML.jpg](A443229_1_En_5_Fig4_HTML.jpg)


    **Figure 5-4** The Play template structure


    To start a new Play project, we can execute the following simple command, if we
    are in a Linux environment:


    ```

    ./sbt run

    ```


    If we are using Windows, the command is:


    ```

    sbt.bat run

    ```


    The command starts the `sbt` build, and this downloads all the necessary files
    for executing the Play project.


    > **Note**: SBT (Simple Build Tool) is an open source software similar to Maven
    for building projects in Scala and Java. SBT is widely used in Scala and offers
    native support to build Scala code. This makes it the preferred choice when it
    comes to building our Scala project. The build descriptor is written in Scala
    using a specific DSL. Another important feature is the full integration with the
    Scala interpreter for faster debugging.


    When `sbt` has finished to build the Scala project, we can see that the server
    is up and running.


    ![A443229_1_En_5_Fig5_HTML.jpg](A443229_1_En_5_Fig5_HTML.jpg)


    **Figure 5-5** The Play server up and running


    ```

    [info] Done updating.

    --- (Running the application, auto-reloading is enabled) ---

    [info] p.c.s.NettyServer - Listening for HTTP on /0:0:0:0:0:0:0:0:9000

    (Server started, use Ctrl+D to stop and go back to the console...)

    ```


    To see the Play, open the browser and call the web address `http://localhost:9000`.
    Figure 5-6 shows the Play site.


    ![A443229_1_En_5_Fig6_HTML.jpg](A443229_1_En_5_Fig6_HTML.jpg)


    **Figure 5-6** The Play site up and running


    You can see that Play is now up and running. The next step is to create our own
    site for the web app and microservice. This operation is really simple and requires
    only a couple of commands.


    First, we must create the folder from which we want to run our project.


    ```

    media practicalscala_dsl

    cd practicalscala_dsl

    ```


    When the folder is created, we can copy into our new folder the code present in
    the Play folder we downloaded previously. We can run the application using the
    following command:


    ```

    sbt run

    ```


    This runs our site, and we can see if all is working.


    ### Designing the REST Microservice


    The first step is to implement the REST microservice and, of course, the web API,
    to design the response for every HTTP method. This helps to define the resource
    of the microservice and how to communicate with it.


    At the same time, we create a common dictionary. That common dictionary can be
    used as well, not only for defining the resource, but, at the same time, to establish
    the common language from the developer and the business.


    So, let’s start to define some resources for the project. In this case, we want
    to define a site for managing the continuous integration of the system, so we
    have some basic resources to define (see Table 5-1).


    **Table 5-1** A Simple Resource Table That Can Be Used to Indicate the Resources
    in the System


    | Resource | HTTP Method | Response |

    | --- | --- | --- |

    | `\Language` | GET | List of all languages |


    With Scala and Play, it’s very easy to implement these resources, so the first
    step is to open your preferred Scala editor and create our Play project.'
