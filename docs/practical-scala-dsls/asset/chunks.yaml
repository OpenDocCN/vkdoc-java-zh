- fmt: '### Designing Our New DSL Game Engine


    So far, I have described what a game engine is and what common functionalities
    it must have. First, we want a game engine with a good UI, so we must define this
    feature. Second, we want to define the control necessary to move the object(s)
    around the screen. Finally, we want to have some generic feature connected to
    the AI of the game. With these requirements in mind, let’s start to define some
    code.


    The first functionality we must define is the game life cycle. This is essentially
    the entire cycle of a game. It can vary, depending on the game, but generally,
    there are some steps to be taken in every single game.


    The life cycle is independent of the story. For example, a game can have a total
    gameplay of 20 hours. The gameplay is the total time required to finish the game,
    and this is strictly connected to the story. The life cycle indicates the state
    in which the player(s) can be during the execution of the gameplay.


    Normally, we have a status `start`, which indicates when the game begins; `pause`,
    used when we include a pause in the action of the game; `resume`, used when we
    want to resume a game, for example, after when we have paused the game; and `end`,
    for example, when a player is dead.


    By adding these basic statuses, we can include other statuses specific to the
    game. For example, we can have a status “menu”, which can be used in some games
    to enter a status when the game menu is shown. For now, we take care only of the
    basic status.


    To define the status, we create a specific class. This class is used to define
    all the statuses in the game. When we think about software for a game, essentially,
    we consider a complex state machine. Every state of the machine can have within
    it more complex states. This is basically the core of our game. We can define
    some basic states, as follows:


    *   Start

    *   Pause

    *   Resume

    *   End


    All these states are basically conditions for managing the game. Every game has
    a starting point, used to manage the other interactions in the game. The first
    class we must write is the game core to manage status.


    ```

    package ch10

    trait StateMachine {

    def start(): Unit

    def resume(): Unit

    def pause(): Unit

    def end(): Unit

    }

    ```


    `StateMachine` is a Scala trait. A trait is a kind of interface in Scala. A trait
    is similar to the Java interface. The main difference between a trait and a Java
    interface is that the trait can be initialized and doesn’t accept parameters.


    Classes can extend the trait and use it to define the common method defined in
    the trait. In our case, this trait defines the basics of our game engine. This
    trait defines the basic action of our state machine.


    A game has an interface and sound, so we must define five macro areas for building
    our engine, as follows:


    *   Graphic

    *   Audio

    *   System

    *   Windows

    *   Input


    We must define all these classes for use in the game engine. For example, the
    graphics class can be used to define a 2D or 3D game. In our case, we will use
    a 2D graphic engine. The next step is to define the main class for the game.


    ### Defining the Generic Component


    What we must do now is define the basic component for the game engine. First,
    we define the audio.


    ```

    package ch10

    trait Audio {

    abstract class Sound {

    type PlaySound

    def play(volume: Float): PlaySound

    def play(): PlaySound = play(1f)

    def loop(volume: Float): PlaySound

    def loop(): PlaySound = loop(1f)

    def pause(id: PlaySound): Unit

    def resume(id: PlaySound): Unit

    def stop(id: PlaySound): Unit

    def dispose(): Unit

    }

    type SoundType <: Sound

    def loadSoundFromSource(path: String): SoundType

    abstract class Music {

    def play(): Unit

    def pause(): Unit

    def stop(): Unit

    def setVolume(volume: Float): Unit

    def setLooping(isLooping: Boolean): Unit

    def dispose(): Unit

    }

    type MusicType <: Music

    def loadMusicFromSource(path: String): MusicType

    }

    ```


    The `Audio` file contains some traits, used to define the method and the functionality
    used for managing the music. We can see that the methods are self-explanatory.
    We can simply read and understand what the method does.


    Another class we must define is the class connected with the graphics. To define
    the graphic component, we add a helper. This is used to maintain some general
    methods of the class. The code is the following:


    ```

    package ch10

    trait GraphicHelper {

    this: Graphic =>

    implicit class UpdateCanvas(canvas: Canvas) {

    def RepeatBitmap(bitmap: Bitmap, x: Int, y: Int, width: Int, height: Int): Unit
    = {

    val imageWidth = bitmap.width

    val imageHeight = bitmap.height

    val columns: Int = width/imageWidth

    val rows: Int = height/imageHeight

    for(i  0) {

    for(i  0) {

    for(i  0 && missingHeight > 0) {

    canvas.drawBitmap(bitmap, columns*imageWidth, rows*imageHeight, 0, 0, missingWidth,
    missingHeight)

    }

    }

    def drawBitmap(region: ImageRegion, x: Int, y: Int): Unit = {

    canvas.drawBitmap(region.bitmap, x, y, region.x, region.y, region.width, region.height)

    }

    }

    case class ImageRegion(

    val bitmap: Bitmap, val x: Int, val y: Int,

    val width: Int, val height: Int) {

    def this(bitmap: Bitmap) = this(bitmap, 0, 0, bitmap.width, bitmap.height)

    }

    class Animation(

    var frameDuration: Long,

    frames: Array[ImageRegion],

    var playMode: Animation.PlayMode = Animation.Normal

    )

    {

    def currentFrame(time: Long): ImageRegion = {

    val frameNumber: Int = ((time/frameDuration) % Int.MaxValue).toInt

    val frameIndex = playMode match {

    case Animation.Normal =>

    math.min(frames.size - 1, frameNumber)

    case Animation.Reversed =>

    math.max(frames.size - frameNumber - 1, 0)

    case Animation.Loop =>

    frameNumber % frames.size

    case Animation.LoopReversed =>

    frames.length - (frameNumber % frames.size) - 1

    frames(frameIndex)

    }

    def isCompleted(time: Long): Boolean = time > animationDuration

    def animationDuration: Long = frames.size*frameDuration

    }

    object Animation {

    sealed trait Play

    case object Normal extends Play

    case object Reversed extends Play

    case object Loop extends Play

    case object LoopReversed extends Play

    }

    }

    ```


    This code is a little complex, but inside it, we find every single piece of interface
    we require to manage the graphics of the game. The trait `GraphicHelper` introduces
    a new functionality of Scala 2.10, the implicit class.


    This feature is very helpful, because it helps to define that a class can have
    a primary constructor available when we create it. This means, for example, that
    we can use this class to create different types of game objects using different
    constructors, but we call all with the same type of call.


    **Note**


    An implicit class is a new type of class introduced in Scala 2.10. An implicit
    class is a normal Scala class created with the word `implicit` ahead of the word
    class. An implicit class follows the same rules of every other class. The `implicit`
    makes the class the primary constructor available when we require an implicit
    conversion with the class in the scope. An implicit class can be defined only
    inside an object, trait, or class.'
