    The translator uses the token created by the AST to walk through the tree. For
    the translator, we essentially use a walk tree pattern. The different tokens are
    created with the AST and are defined in the model. The model is essentially the
    plain class used to create the syntax.


    The interpreter basically implements an external tree visitor pattern. We use
    the class to create in the model a package to read AST and translate it into a
    language. The class involved is a plain Scala class, and taken together, they
    are designed for translating the input as an output.


    At the core of all the translators is the `walk` function. This implements the
    pattern. The function gets the tree, a list of statements, and checks every statement
    and calls the class for translating the AST into a language.


    ## Executing the Language


    The last step we must take is to create the code to execute the language. An object
    is responsible for reading the input file and calling the parser. The relevant
    code follows:


    ```

    object Language {

    def main(args: Array[String]) {

    val inputFile = Source.fromFile("source/practical.bascala")

    val inputSource = inputFile.mkString

    val parser = new SmallLanguageParser

    parser.parseAll(parser.program, inputSource) match {

    case parser.Success(r, n) => {

    val interpreter = new Interpreter(r)

    try {

    interpreter.run

    } catch {

    case e: RuntimeException => println(e.getMessage)

    }

    }

    case parser.Error(msg, n) => println("Error: " + msg)

    case parser.Failure(msg, n) => println("Error: " + msg)

    case _ =>

    }

    }

    }

    ```


    The code is very simple. It calls the input file, `practical.bascala`, and executes
    it to get the result. The file input is the following:


    ```

    FUNCTION printVoid()

    PRINT "Hello World"

    END FUNCTION

    SUB MAIN

    printVoid()

    END SUB

    ```


    ## Conclusion


    In this chapter, we delved further into external DSLs. We created a new language
    using an external DSL, and you saw that this can be fun if not always easy.


    You learned about the different kinds of patterns for implementing the language
    and the three main objects involved. Finally, we created our own parser and language.


    Of course, this is only a simple example of a language, but we discovered more
    interesting techniques related to external DSLs and using the Parser Combinator
    of the Scala language. You can now easily create your own language, and this can
    be used for our project.


    # Mobile Development


    Mobile development has taken on more importance in everyday development. An ever-increasing
    number of companies now has mobile development teams. In this chapter, you will
    learn the basics of mobile development and how to use Scala and DSLs to create
    your own applications.


    ## Introduction to Mobile Development in Android


    Android is an open source operating system developed by Android, Inc., later a
    subsidiary of Google. The nature of Android allows a developer to use the same
    source code for different devices, for example, a desktop computer or mobile phone.


    Android is not just an operating system but an ecosystem. The community offers
    you tools for total development. Android is a game-changer in the mobile community.
    To understand why Android is becoming so important to the technology community,
    it is necessary to understand the history of mobile software development.


    The first mobile development was essentially based on a proprietary operating
    system. For development, all the mobile companies defined and released WAP, the
    Wireless Application Protocol, a technical standard used to define web navigation.
    With WAP, it was possible to initiate web development for mobile. Every company
    released a WAP browser, which allowed developers to create the first mobile site.
    Nokia was the first to improve the development. With Nokia, we begin to have our
    own framework, and this allowed developers to create their own games. Following
    Nokia, other companies developed their own libraries for mobile development. Of
    course, the software was proprietary and could only be used in phones made by
    the corresponding brand.


    When Android was born, it allowed developers to create better applications for
    a large number of devices, without much change to the code. For Android development,
    Google released Android Studio, a tool to develop Android applications in a simple
    way. We will use this tool to develop our Scala application, so first, we must
    install Android Studio.'
