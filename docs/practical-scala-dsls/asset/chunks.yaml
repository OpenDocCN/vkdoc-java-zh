- fmt: '### String in Scala


    A string in Scala is based on the same kind of string in the JVM. Scala adds some
    unique features, such as multiline and interpolation.


    For creating a `String` in Scala, we can use double quotes. Inside the double
    quotes we can write our string.


    ```

    scala> val theGuide = "don''t panic"

    theGuide: String = don''t panic

    ```


    From the previous example, you can see that a string is very easy to create. You
    can create a string with special characters using the backslash (`\`).


    ```

    scala> val theQuestion= "the Answer to the Ultimate Question of life, \nthe Universe,\nand
    Everything"

    theQuestion: String =

    the Answer to the Ultimate Question of life,

    the Universe,

    and Everything

    ```


    In this case, Scala creates the string with a new line character. This creates
    the string in multiple lines. It is possible to concatenate the string with the
    plus sign (`+`), as follows:


    ```

    scala> val sayHello = "Hello"+" reader"

    sayHello: String = Hello reader

    ```


    In this case, we can see Scala concatenate the string into one single string.
    It is possible to compare the equality of a string by using the operator `==`.
    Scala differs from Java in that in Scala, we don’t check the equality of the object
    but the equality of the string values, as follows:


    ```

    scala> val string_compare_1 = "String 1"

    string_compare_1: String = String 1

    scala> val string_compare_2 = "String 1"

    string_compare_2: String = String 1

    scala> val compare = string_compare_1==string_compare_2

    compare: Boolean = true

    ```


    We can see that the two strings have the same value, which, in Scala, are the
    same. If we try to compare the strings, the value `true` is returned.


    #### Multiline String


    To create a multiline string in Scala, we use three double quotes after the start
    of a string.


    ```

    scala> val theFinalAnswer = """ Six by nine. Forty-two.

    | That''s it. That''s all there is.

    | I always thought something was fundamentally wrong with the universe """

    theFinalAnswer: String =

    " Six by nine. Forty-two.

    That''s it. That''s all there is.

    I always thought something was fundamentally wrong with the universe"

    ```


    Multiline strings follow the same rules as other strings. This means that we can
    use special characters and comparisons as in a normal string.


    A multistring is very useful when we want to add specifically formatted string
    in a code. For example, if we want to have a JSON string in the code, to prepare
    a return for an output or simply for a test, we can write the string as follows:


    ```

    scala> val jsonString: String =

    |     """

    |       |{

    |       |"name":"PracticalScalaDSL",

    |       |"author":"Pierluigi Riti",

    |       |"publisher":"Apress"

    |       |}

    |       """

    jsonString: String =

    "

    {

    "name":"PracticalScalaDSL",

    "author":"Pierluigi Riti",

    "publisher":"Apress"

    }

    "

    ```


    #### String Interpolation


    In Scala, it is easy to concatenate a string by using the plus sign (`+`), but
    there is a niftier way of doing this: string interpolation. With this interpolation,
    Scala replaces the variable with the string value. To use a variable to interpolate
    a string, the dollar sign (`$`) is used.


    ```

    scala> val hello = "world"

    hello: String = world

    scala> println(s"Hello $hello")

    Hello world

    ```


    We can see from the preceding sample code that we can create a variable and then
    substitute it when we print out the string. This technique allows us to maintain
    clear and compact code that is easy to read and, of course, maintain. We can interpolate
    a string when assigning another variable too. In this case, we must use the syntax
    `${<variable name>}`.


    ```

    scala> val sayHello= s"Hello ${hello}"

    sayHello: String = Hello world

    ```


    To use the interpolation, we must use the char `s`, which tells Scala to create
    a string with the variable we write, and Scala then interpolates the string with
    the variable.


    **Note**


    From a memory perspective, it is better to interpolate a string, because a string,
    as a JVM/Java object, is immutable. This means that when we use the plus sign
    (`+`) to create a string, we create three string objects when we concatenate only
    two strings. This is because, first, Scala allocates memory to the first string,
    then the second string, and, finally, the third string, as a concatenation of
    the previous strings. When we interpolate, we have only two strings, because the
    second is created based on the substitution of the variable.


    ## Expressions in Scala


    Scala is a functional language and, as such, functional programming was the primary
    intent of the inventor of the language. Given this context, I want to describe
    what an expression means in Scala.


    An expression in Scala is a single line of code that returns a value. This is
    very important for reducing side effects, because they always have the same response
    to an operation. The scope of functional programming is to define the function
    in a mathematical way. This means that every function must always return the same
    value, if it is always sent the same parameter.


    This occurs because the function is essentially immutable and isn’t influenced
    by changes occurring outside the function. This is done to reduce or further eliminate
    side effects. Side effects are essentially the result of a change to a variable
    or an expression that changes a value. When the variable outside changes, this
    violates the functional programming itself.


    We can define different types of expressions in Scala:


    - A simple string, int, or any other

    - A variable

    - A value

    - A function


    An expression is very useful for moving from object-oriented programming to functional
    programming. Expressions are used in everyday programming, but you may not have
    been aware of this. For example, the syntax


    ```

    var variable:String = "value"

    ```


    defines an expression. Using a variable, of course, we can use the same syntax
    to define a value, as follows:


    ```

    val variable:String = "value"

    ```


    In the preceding, an expression has been created with a function, but suppose,
    for example, you want to define a function for calculating the area of a square.


    ```

    val square=(x: Int) => x*x

    ```


    The preceding code indicates how to use a function to create an expression.


    ### Conditional Expression


    The conditional expression `if..else` is the core construction of all programming
    languages. Scala uses the same logical base of other languages for the `if..else`
    conditional expression.


    The syntax of the `if..else` is


    ```

    if()

    ```


    If the Boolean condition is `True`, `expression` executes.


    ```

    scala> if (10 % 3 > 0) println("Not a multiple")

    Not a multiple

    ```


    In this example, we use an expression for checking the Boolean value. If `10`
    is not divisible by 3 it prints `"Not a Multiple"`, so we can see the use of an
    `if..else` in Scala is the same of other languages.


    In case we want to define an `else` condition, we can use this syntax:


    ```

    if(boolean) expression  else expression

    ```


    We can now write a more complex `if..else` condition:


    ```

    scala> if (10 % 2 > 0) println("Not a multiple") else ("Multiple")

    res2: Any = Multiple

    ```


    ### Pattern Matching Expression


    Scala doesn’t have a `switch` command like Java or C#. In Scala, we have the command
    `match`, which is more flexible than `switch`.


    The syntax for the pattern matching is:


    ```

    match{

    Case  =>

    }

    ```


    The pattern match can be a value or a regular expression; for example, a simple
    pattern matching can be


    ```

    scala> val number1 = 10

    number1: Int = 10

    scala> val number2 = 20

    number2: Int = 20

    scala> val max = number1 > number2 match{

    | case true => number1

    | case false => number2

    | }

    max: Int = 20

    ```


    Here we can see that we have created two values and that the expression is essentially
    a simple check of these two values. When we identify the bigger, we write out
    the number.'
