    在接下来的章节中，我们将增加 DSL 的复杂性。这意味着我们将开始使用更复杂的模式，并设计更复杂的功能。


    # 6. 用户识别系统


    构建 IT 系统时的一个常见问题是识别用户并为其分配正确的角色。每个系统都有这类功能，通常，我们使用数据库来存储与用户相关的数据。


    我们通常的做法是连接到数据库，执行一些查询，然后根据查询结果创建一个解析器来理解用户的角色。


    本章的目标是创建一个自由语法解析器，用于建立我们自己的用户识别规则。这需要我们定义一组规则，并将其应用于我们收集到的数据结果。这个解析器可以轻松应用于任何数据源，这意味着我们可以将用户与数据库解耦，并使用
    JSON 或 XML 文件来存储用户数据。


    我们使用 Scala 解析器库来创建这个解析器。这个库非常适合领域特定语言，因此掌握它的最佳方法是回顾解析器的基础知识，并开始编写一些代码。

