- fmt: "# Designing the Parsing Layer\n\nWriting a good DSL requires a parsing layer.\
    \ This layer is necessary to translate the formal syntax into instructions for\
    \ the GPL, the general-purpose language, used to build the DSL. It doesn’t matter\
    \ whether we’re talking about internal or external DSLs. In each case, we must\
    \ create the layer.\n\nIn terms of an internal DSL, the parsing layer is strictly\
    \ connected to the functions we offer for creating the DSL. When we create the\
    \ parsing layer, we must think of a specific pattern. We can use expression builders\
    \ to create the correct method for our fluent interface. An expression builder\
    \ is essentially an object whose sole task is to build a model of normal objects.\
    \ With expression builders, we can easily create a fluent interface.\n\nWe use\
    \ expression builders because when we define our DSLs, we can have a different\
    \ interface, and in such a case, it is not always easy to design a correct and\
    \ fluent interface. The expression builder is our friend. Imagine that we want\
    \ to create a code to save or update a new user on the system. The condition is\
    \ the presence or absence of the user in the system. The code can be like this:\n\
    \n```\nclass InsertUser {\n  private val user = new User()\n  def add(name: String,\
    \ surname: String): User = {\n    actualUser = new User(name, surname)\n    user.addUser(actualUser)\n\
    \    this\n  }\n  def setLevel(level: String): User = {\n    user.level(level)\n\
    \    this\n  }\n  def getUser: User = user\n}\n```\n\nThe class `InsertUser` defines\
    \ the object and the method. We can use the class in the following way:\n\n```\n\
    val user = new InsertUser().add(\"Pierluigi\",\"Riti\").setLevel(\"admin\")\n\
    ```\n\nNow we can see that the call for creating the user can be read like plain\
    \ English, and the user we created essentially is different every time we call\
    \ it.\n\nWhen we define an expression builder, every method returns an object,\
    \ populated with the value of the method. This allows the user to create the correct\
    \ fluent interface.\n\nAnother important piece of the parser is the semantic model.\
    \ This is used to translate the grammar and the syntax defined in the DSL. This\
    \ pattern creates an object in memory with all data and translates it for DSL\
    \ generation. This pattern normally is used with the symbol table, another pattern\
    \ used for defining DSLs. With the symbol table, we basically store a link between\
    \ the object and each task. This is used for populating the semantic model, which\
    \ is a set comprising a model and class, used for translating an input in a class.\
    \ Graphically, we can imagine it to be something like that shown in Figure [3-1](#A443229_1_En_3_Chapter.html#Fig1).\n\
    \n![A443229_1_En_3_Fig1_HTML.jpg](A443229_1_En_3_Fig1_HTML.jpg)\n\nFigure 3-1\n\
    \nDiagram of a semantic model\n\nThe code to populate the model can be something\
    \ like the following:\n\n```\nevents\ncreateUser\nend\nstate create\ncreateUser\
    \ create\nend\n```\n\nThis code creates the code that can be used to represent\
    \ the model we just created. Now, we can see that what we have to do is translate\
    \ the code. Normally, to do that, we use a parser combinator. Later in the book,\
    \ you will see how to write one.\n\nThe idea behind using three different patterns—semantic\
    \ model, expression builder, and symbol table—is that we can test each separately\
    \ and, of course, reduce the possibility of error. All these patterns are used\
    \ to construct an expression builder for creating our DSL.\n\n## Design the Parsing\
    \ Layer Using Functions\n\nUntil now, I’ve discussed only the patterns for building\
    \ an internal DSL using an object, but we can also employ a function to build\
    \ it. For doing this, we must use different patterns.\n\nWhat we must do, obviously,\
    \ is create the same results, and to do that, we have to create a good expression\
    \ builder, but with functions. We have to replicate what we did with the object,\
    \ which means we must create some common variable that can be shared from one\
    \ function to another. Normally, we do this with global variables and global functions,\
    \ but this is not the best way of solving the problem. Because with global functions,\
    \ we can change the final result, another process can erroneously change the value\
    \ of the variable, and this can change the result of our process. Imagine, for\
    \ example, working in a multi-thread environment.\n\nThe best way of solving this\
    \ problem is to use the pattern called context variable. A context variable is\
    \ used to capture a value in a variable when parsing and after assigning a new\
    \ one when we parse. Consider, for example, that we call a function called `Course`.\
    \ This function must know what course `Student` is taking. With the context variable,\
    \ we can save this value and change it when we parse the new value. Suppose, for\
    \ example, that we wanted to write a class `User`. The class would look like the\
    \ following:\n\n```\nclass User() {\n  var name = \"\"\n  var surname = \"\"\n\
    \  var username = \"\"\n  def saveUser(): Unit = {\n    println(username)\n  }\n\
    }\n```\n\nNow, we can see that the variable defined in the context can be used\
    \ as the method. This is done, for example, when we want to define some specific\
    \ value to send to the parser when we initialize the class. We can set the value\
    \ of the variable in following way:\n\n```\nscala> val user = new User()\nuser:\
    \ User = User@2001e48c\nscala> user.username = \"Pippo\"\nuser.username: String\
    \ = Pippo\nscala> user.saveName()\nPippo\n```\n\nOf course, the variable is still\
    \ global in some respects. If we want to remove the global variable completely,\
    \ we can use another pattern, called object scoping. Every time we try to create\
    \ a fluent interface, we must memorize a set of variables, to allow the fluent\
    \ interface to create our final call to create the final object. We can avoid\
    \ that with object scoping. With object scoping, we create a common object used\
    \ to store the data. In other words, all variables are stored in a common area,\
    \ and in this way, we can use them to create our final call. This means that we\
    \ don’t have to memorize the value in a global variable, and we can better isolate\
    \ the scope of every variable. We use this technique when we create an expression\
    \ builder. The method is as follows:\n\n```\ndef add(name: String, surname: String):\
    \ User = {\n  actualUser = new User(name, surname)\n  user.addUser(actualUser)\n\
    \  this\n}\n```\n\nThis is essentially a way to isolate the variable. By doing\
    \ so, there is no global variable, which reduces side effects.\n\nThe last pattern\
    \ we can use for creating a fluent interface using functions is called a nested\
    \ function. With a nested function, we build a function that can accept other\
    \ functions, such as a variable. In functional programming, these kinds of functions\
    \ are called higher-order functions. With a nested function, we can completely\
    \ avoid the global variable and can reduce to zero any possible side effects.\
    \ This way, we don’t break any rules of functional programming and can improve\
    \ the quality and reduce errors that can be raised by the program itself. An example\
    \ of a nested function can be written as follows:\n\n```\nobject NestedFactorial\
    \ {\n  def factorial(i: Int): Int = {\n    def nestedfactorial(i: Int, accumulator:\
    \ Int): Int = {\n      if (i <= 1)\n        accumulator\n      else\n        nestedfactorial(i\
    \ - 1, i * accumulator)\n    }\n    nestedfactorial(i, 1)\n  }\n}\n```\n\nIn this\
    \ example, we define a function `factorial` and also that we have another function\
    \ `nestedfactorial`. The function, in this case, executes the factorial and returned\
    \ the value to the previous one. Of course, the nested function can execute completely\
    \ different operations and completely change the scope. Depending on the case\
    \ we execute, this technique completely isolates the core function from the outside\
    \ word and essentially eliminates side effects."
  raw: '## Designing the Parsing Layer


    Writing a good DSL requires a parsing layer. This layer is necessary to translate
    the formal syntax into instructions for the GPL , the general-purpose language,
    used to build the DSL. It doesn’t matter whether we’re talking about internal
    or external DSLs. In each case, we must create the layer.


    In terms of an internal DSL, the parsing layer is strictly connected to the functions
    we offer for creating the DSL. When we create the parsing layer, we must think
    of a specific pattern. We can use expression builders to create the correct method
    for our fluent interface. An expression builder is essentially an object whose
    sole task is to build a model of normal objects. With expression builders, we
    can easily create a fluent interface.


    We use expression builders because when we define our DSLs, we can have a different
    interface, and in such a case, it is not always easy to design a correct and fluent
    interface . The expression builder is our friend. Imagine that we want to create
    a code to save or update a new user on the system. The condition is the presence
    or absence of the user in the system. The code can be like this:


    ```

    class InsertUser {

    private val user = new User()

    def add(name: String, surname: String): User = {

    actualUser = new User(name, surname)

    user.addUser(actualUser)

    this

    }

    def setLevel(level:String): User = {

    user.level(level)

    this

    }

    def getUser: User = user

    }

    ```


    The class `InsertUser` defines the object and the method. We can use the class
    in the following way:


    ```

    val user = new InsertUser().add("Pierluigi","Riti").setLevel("admin")

    ```


    Now we can see that the call for creating the user can be read like plain English,
    and the user we created essentially is different every time we call it.


    When we define an expression builder , every method returns an object, populated
    with the value of the method. This allows the user to create the correct fluent
    interface .


    Another important piece of the parser is the semantic model. This is used to translate
    the grammar and the syntax defined in the DSL. This pattern creates an object
    in memory with all data and translates it for DSL generation. This pattern normally
    is used with the symbol table, another pattern used for defining DSLs. With the
    symbol table , we basically store a link between the object and each task. This
    is used for populating the semantic model , which is a set comprising a model
    and class, used for translating an input in a class. Graphically, we can imagine
    it to be something like that shown in Figure [3-1](#A443229_1_En_3_Chapter.html#Fig1).


    ![A443229_1_En_3_Fig1_HTML.jpg](A443229_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Diagram of a semantic model


    The code to populate the model can be something like the following:


    ```

    events

    createUser

    end

    state create

    createUser create

    end

    ```


    This code creates the code that can be used to represent the model we just created.
    Now, we can see that what we have to do is translate the code. Normally, to do
    that, we use a parser combinator . Later in the book, you will see how to write
    one.


    The idea behind using three different patterns—semantic model, expression builder,
    and symbol table —is that we can test each separately and, of course, reduce the
    possibility of error. All these patterns are used to construct an expression builder
    for creating our DSL.


    ## Design the Parsing Layer Using Functions


    Until now, I’ve discussed only the patterns for building an internal DSL using
    an object, but we can also employ a function to build it. For doing this, we must
    use different patterns.


    What we must do, obviously, is create the same results, and to do that, we have
    to create a good expression builder, but with functions. We have to replicate
    what we did with the object, which means we must create some common variable that
    can be shared from one function to another. Normally, we do this with global variables
    and global functions, but this is not the best way of solving the problem. Because
    with global functions, we can change the final result, another process can erroneously
    change the value of the variable, and this can change the result of our process.
    Imagine, for example, working in a multi-thread environment.


    The best way of solving this problem is to use the pattern called context variable.
    A context variable is used to capture a value in a variable when parsing and after
    assigning a new one when we parse. Consider, for example, that we call a function
    called `Course`. This function must know what course `Student` is taking. With
    the context variable , we can save this value and change it when we parse the
    new value. Suppose, for example, that we wanted to write a class `User`. The class
    would look like the following:


    ```

    class User() {

    var name = ""

    var surname = ""

    var username = ""

    def saveUser():Unit ={

    println(username)

    }

    }

    ```


    Now, we can see that the variable defined in the context can be used as the method.
    This is done, for example, when we want to define some specific value to send
    to the parser when we initialize the class. We can set the value of the variable
    in following way:


    ```

    scala> val user=new User()

    user: User = User@2001e48c

    scala> user.username = "Pippo"

    user.username: String = Pippo

    scala> user.saveName()

    Pippo

    ```


    Of course, the variable is still global in some respects. If we want to remove
    the global variable completely, we can use another pattern, called object scoping
    . Every time we try to create a fluent interface , we must memorize a set of variables,
    to allow the fluent interface to create our final call to create the final object.
    We can avoid that with object scoping. With object scoping, we create a common
    object used to store the data. In other words, all variables are stored in a common
    area, and in this way, we can use them to create our final call. This means that
    we don’t have to memorize the value in a global variable, and we can better isolate
    the scope of every variable. We use this technique when we create an expression
    builder . The method is as follows:


    ```

    def add(name: String, surname: String): User = {

    actualUser = new User(name, surname)

    user.addUser(actualUser)

    this

    }

    ```


    This is essentially a way to isolate the variable. By doing so, there is no global
    variable, which reduces side effects.


    The last pattern we can use for creating a fluent interface using functions is
    called a nested function . With a nested function, we build a function that can
    accept other functions, such as a variable. In functional programming, these kinds
    of functions are called higher-order functions. With a nested function, we can
    completely avoid the global variable and can reduce to zero any possible side
    effects. This way, we don’t break any rules of functional programming and can
    improve the quality and reduce errors that can be raised by the program itself.
    An example of a nested function can be written as follows:


    ```

    object NestedFactorial {

    def factorial(i: Int): Int = {

    def nestedfactorial(i: Int, accumulator: Int): Int = {

    if (i <= 1)

    accumulator

    else

    nestedfactorial(i - 1, i * accumulator)

    }

    nestedfactorial(i, 1)

    }

    }

    ```


    In this example, we define a function factorial and also that we have another
    function `nestedfactorial`. The function, in this case, executes the factorial
    and returned the value to the previous one. Of course, the nested function can
    execute completely different operations and completely change the scope. Depending
    on the case we execute, this technique completely isolates the core function from
    the outside word and essentially eliminates side effects.'
