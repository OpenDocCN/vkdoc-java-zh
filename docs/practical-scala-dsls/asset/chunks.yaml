- fmt: "We can normalize the node using a normalized heterogeneous AST. This is used\
    \ for trees having a multitude of node types and/or when we want to develop a\
    \ homogenous AST with more than a single-node data type. But all children can\
    \ be normalized. A homogenous AST is used when we have more complex languages,\
    \ for example. All the parsers have in common what we can define as an AST. An\
    \ AST is essentially a tree—nothing new in programming. How we build and create\
    \ the tree is how we define the parser. In the case of a homogenous AST, we have\
    \ something like the following:\n\n```\nclass HomogenousAST()\n{\nvar token:ParserToken\
    \ = null\nvar children:List[ParserToken] = null\ndef this(token: ParserToken)\
    \ {\nthis()\nthis.token = token\n}\ndef apply(tokenType: Int) {\nthis.token =\
    \ new AST(tokenType)\n}\ndef getNodeType: Int = token.`type`\ndef addChild(t:\
    \ AST): Unit = {\nif (children == null) children = new util.ArrayList[AST]\nchildren.add(t)\n\
    }\n}\n```\n\nAnother pattern we can use to create an AST is the irregular heterogeneous\
    \ AST. This pattern is the most complex of the three, as it uses more than one\
    \ node. These nodes are not all regular and have different child representation.\
    \ This pattern differs from the homogenous AST in that names have a name. Usually,\
    \ the pattern is a linked list. We can define the pattern this way:\n\n```\nvar\
    \ previous:ParserNode\nvar next:ParserNode\ndef addingNode(previous:ParserNode,\
    \ next:ParserNode):Unit = {\nthis.next = next\nthis.previous = previous\n}\n```\n\
    \nAll these patterns can be used to create our AST. They are the basis for creating\
    \ a tree that we can walk to create our language. To walk a tree, we can use another\
    \ specific pattern for doing so. Every pattern has a different use. Following\
    \ is a brief list of these:\n\n*   **Embedded heterogeneous tree walker**: This\
    \ pattern walks through a heterogeneous AST using a recursive function. A pseudo\
    \ code for this parser follows. Here we can see that the actual node is derived\
    \ from the root, then we identify the operation of the actual node and execute\
    \ the operation. After that, we begin to read the other children of the actual\
    \ node.\n\n```\n    class  extends \n    {\n    def ():Unit = {\n\n}\n    }\n\
    \    ```\n\n*   **External tree visitor**: This pattern creates a visitor class,\
    \ used to walk through the tree nodes. This pattern follows the same logic as\
    \ the embedded version. The only difference is that the code is external, so we\
    \ call another class to do the walking. We can define a pseudo code like this:\n\
    \n```\n    trait \n    {\n    def operationNode()\n    def numberNode\n    }\n\
    \    ```\n\nNow what we see is essentially an interface in which every part defines\
    \ a way to read the node.\n\n*   **Tree grammar**: This pattern is used to create\
    \ the external visitor. This pattern essentially defines the grammar we must use\
    \ for the external visitor. This is normally done with ANTLR. An example of the\
    \ grammar to define an operation could be as follows:\n\n```\n    match(operation);\n\
    \    match(number);\n    match(operation);\n    ```\n\nThis grammar is used to\
    \ identify the piece of the tree grammar used for the parser.\n\n*   **Tree pattern\
    \ matcher**: This pattern is used to trigger an action when it finds some term\
    \ relevant to the pattern. This pattern doesn’t have a real implementation but\
    \ is a way of translating graphically how the parser is working. We can see an\
    \ example of this pattern when we design the grammar for the different parser,\
    \ as shown in Figure [7-4](#A443229_1_En_7_Chapter.html#Fig4).\n\n![A443229_1_En_7_Fig4_HTML.jpg](A443229_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4.\n\nA tree pattern matcher generator\n\nAll these patterns are used\
    \ when we want to build our external DSL. In the end, when we create our own language,\
    \ we must still create an external DSL. We take an input and parse it to create\
    \ a specific output.\n\n## Designing the Language\n\nSo far, we have defined the\
    \ different patterns we can use for parsing the language, but there is another\
    \ step we must define when we design a new language. The first decision must make\
    \ is the syntax for the language. To define the syntax and the grammar, we use\
    \ the EBNF language. The language we want to design is similar to the BASIC language,\
    \ so the EBNF is like this:\n\n```\nUnary_Op       ::=     -    |    !\nBinary_Op\
    \      ::=     +    |    -    |    *    |    /    |    %\n|      =    |      \
    \  |    =    |    \n|      &    |    ' | '\nExpression     ::=     integer\n|\
    \      variable\n|      \"string\"\n|      Unary_Op   Expression\n|      Expression\
    \   Binary_Op   Expression\n|      ( Expression )\nCommand ::=    REM string\n\
    |      GOTO integer\n|      SUB MAIN block\n|      DIM variable = Expression\n\
    |      PRINT Expression\n|      INPUT variable\n|      IF Expression THEN integer\n\
    Line    ::=    integer Command\nProgram ::=    Line\n|      Line Program\nPhrase\
    \  ::=    Line | RUN | LIST | END\n```\n\nHere, we define every single element\
    \ of our language. Remember: We want to try to re-create a BASIC language, so\
    \ we use the syntax of the elder BASIC. Essentially, we define every single part\
    \ of the language. This definition gives to us the model to create the basis of\
    \ the language.\n\nUsing the grammar described previously, we can write a program\
    \ such as this:\n\n```\nPRINT \"Table of Squares\"\nPRINT\nPRINT \"How many values\
    \ would you like?\"\nINPUT num\n```\n\n## Creating the Language\n\nWith the grammar\
    \ defined, we can start to create our language. First, starting with our language,\
    \ we can identify three major components for our parser.\n\n*   **The reader**:\
    \ Essentially, the parser in which we define all grammar and reserved words. This\
    \ creates an AST.\n*   **The interpreter**: This walks the AST created in the\
    \ reader.\n*   **The translator**: Some Scala classes use this to translate the\
    \ result of the interpreter in an output.\n\nWhen we define the parser, we must\
    \ use the reserved words of the language, so let’s start to create the `Reader`\
    \ class.\n\n### Creating the Reader Class\n\nThe core of our parser is the `Reader`\
    \ class. This class extends the `StandardTokenParsers` of Scala. This is the backbone\
    \ for our parser. We start by creating the reserved words used by the language,\
    \ as follows:\n\n```\nclass Reader extends StandardTokenParsers {\nlexical.reserved\
    \ += (\"DIM\", \"PRINT\", \"IF\", \"SUB\", \"THEN\", \"FUNCTION\", \"SUB\", \"\
    MAIN\", \"RETURN\", \"END FUNCTION\")\nlexical.delimiters += (\"*\", \"/\", \"\
    %\", \"+\", \"-\", \"(\", \")\", \"=\", \"\", \"==\", \"!=\", \"=\", \",\", \"\
    :\")\n```\n\nYou can see that we first define all the reserved words and delimiters\
    \ that will be used by the Scala parser. These are the words we can use to tokenize\
    \ our language.\n\nAs noted earlier, we can use different techniques to create\
    \ our AST, so we have to define the rules we must apply to our language. These\
    \ rules are used to create the tree we can use later to translate the language.\
    \ To compile the rules, what we need to do is translate the EBFN that we have\
    \ defined in Scala syntax.\n\nThe first rule we want to establish is the entry\
    \ point for our program. In BASIC, this is usually the `SUB MAIN`. The code for\
    \ this is as follows:\n\n```\ndef mainPoint: Parser[Program] = (rep(function)\
    \  new Program(f, c)\n}\n```\n\nWe can stop for a moment to analyze this first\
    \ function. We can see that this function uses the element that I introduced in\
    \ Chapter [6](#A443229_1_En_6_Chapter.html).\n\n```\n(rep(function) <~ (\"SUB\"\
    \ ~ \"MAIN\")) ~ block\n```\n\nThe program has a number of functions that can\
    \ be repeated. After the word `SUB MAIN`, we find a block. This is essentially\
    \ another part of the rules, and it identifies the block of code we can write\
    \ inside the main function. We can now continue to write other simple rules for\
    \ defining the language."
