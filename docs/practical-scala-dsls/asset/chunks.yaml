    ### 开始 Android 开发


    要开始 Android 开发，第一步是下载 SDK（软件开发工具包）。新版 Android SDK 与 Android Studio 相关联。Android
    Studio 是一款基于 JetBrains IntelliJ 的编辑器。SDK 的下载链接是 [`https://developer.android.com/studio/index.html`](https://developer.android.com/studio/index.html)。


    请为正确的操作系统下载软件，并按照说明安装 Android Studio。当 Android Studio 安装并启动后，您将看到类似图 8-1 的界面。


    ![A443229_1_En_8_Fig1_HTML.jpg](img/A443229_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Android Studio 启动页面


    要开始我们的 Scala Android 项目，我们必须安装 Scala 插件，方法是从“配置”菜单中选择“插件”（图 8-2）。


    ![A443229_1_En_8_Fig2_HTML.jpg](img/A443229_1_En_8_Fig2_HTML.jpg)


    图 8-2


    “配置”菜单


    在“插件”菜单中，选择“从仓库浏览”，然后在新菜单中输入 Scala。这将显示所有 Scala 插件。选择 Android Scala 插件，如图 8-3
    所示。


    ![A443229_1_En_8_Fig3_HTML.jpg](img/A443229_1_En_8_Fig3_HTML.jpg)


    图 8-3


    选择 Android Scala 插件


    安装该插件，然后重启程序。这将在 Android Studio 上安装 Scala 插件。现在，我们已经准备好创建第一个 Android 项目了。


    要创建一个应用程序，请从启动页面选择“开始新的 Android Studio 项目”链接。这将显示创建项目所涉及的步骤。首先，我们必须指定项目名称和包名（图
    8-4）。


