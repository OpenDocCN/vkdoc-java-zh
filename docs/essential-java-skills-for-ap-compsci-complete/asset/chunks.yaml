    29. 简单条件语句


    布尔值为我们提供了根据其真或假结果执行不同操作的基础。基于这些值所选择的执行路径被称为条件语句。这些语句根据布尔变量、布尔表达式或方法返回值的真假来引导代码的流程。

    基本的条件语句包括 `if`、`else if` 和 `else` 语句。


    if 语句


    `if` 语句与一个用括号包裹的值配对，该值要么是 `true`，要么是 `false`。如果条件为 `true`，则执行其后代码块中的代码。如果条件为 `false`，则跳过该代码块，程序流程继续执行。


    ```

    if (条件) {

    // 代码写在这里

    }

    ```


    else 语句


    如果希望在原始条件评估为 `false` 时执行替代操作，可以在 `if` 语句的代码块之后添加一个 `else` 语句及其对应的代码块：


    ```

    if (条件) {

    // 如果条件为 true，则运行此代码

    } else {

    // 如果条件为 false，则运行此代码

    }

    ```


    else if 语句


    你还可以使用 `else if` 语句将条件语句串联起来，提供多个条件测试。这些测试会按顺序执行。如果链中的某个条件为 true，则运行匹配的代码块，然后完全忽略链中的其余部分。你可以在链中放置任意数量的
    `else if` 语句，但只能有一个 `if` 语句，而 `else` 语句是可选的（取决于你要处理的逻辑）：


    ```

    if (条件) {

    // 如果条件为 true，则运行此代码

    } else if (条件) {

    // 如果第二个条件为 true，则运行此代码

    } else {

    // 如果两个条件都为 false，则运行此代码

    }

    ```


    理解条件流程


    根据你构建条件链的方式，程序的流程会发生变化。如果你创建了一个由 `if` 语句组成的链，那么无论其中是否有条件为 false，所有 `if` 语句都会被测试。如果你有一个单独的
    `if` 语句，其余的都是 `else if` 语句，那么一旦某个条件为 true，链中该条件之后的所有内容都会被跳过。


    你可以使用代码块的花括号将条件语句嵌套在一起：


    ```

    if (x == 1) {

    if (y == 1) {

    // x 和 y 都等于 1

    } else if (y == 2) {

    // x 等于 1，y 等于 2

    } else {

    // x 等于 1，y 不等于 1 或 2

    } else if (x == 2) {

    if (y == 1) {

    // x 等于 2，y 等于 1

    } else if (y == 2) {

    // x 等于 2，y 等于 2

    } else {

    // x 等于 2，y 不等于 1 或 2

    } else {

    // x 不等于 1 或 2，y 可以是任何值

    }

    ```


