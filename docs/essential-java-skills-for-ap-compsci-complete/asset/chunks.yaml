- fmt: '# Java Beginnings


    Java got its start at Sun Microsystems and was first released to the public in
    1995. The development of the language started in 1991 by James Gosling, Mike Sheridan,
    and Patrick Naughton and was designed to be similar to C and C++ to help developers
    use their existing programming skills for the new language. Sun Microsystems was
    acquired by Oracle in 2009.


    During development, Java was originally called Oak, then renamed Green, and finally
    released as Java from Java coffee, which is why the logo for Java is of a steaming
    coffee cup.


    *Write once, run anywhere*


    When it was launched, it promised “write once, run anywhere,” meaning that programs
    you created in Java only needed to be coded once, and they could run on any platform
    that supported Java.


    ## Java’s Primary Goals


    From the very beginning, there were five primary goals in the creation of the
    Java language:


    1. It must be “simple, object-oriented, and familiar.”

    2. It must be “robust and secure.”

    3. It must be “architecture-neutral and portable.”

    4. It must execute with “high performance.”

    5. It must be “interpreted, threaded, and dynamic.”


    Today, Java is one of the most popular languages in use. Java’s heavy use in web
    applications, enterprise desktop applications with technologies like JavaFX, and
    the Android ecosystem makes it a great language to learn with many flexible ways
    to use it.


    ## Uses of Java


    Since Java was first released, it has grown to power many large-scale web applications
    for ecommerce, finance, and other industries. Java applications are built on the
    server side and connect to web servers to handle the business logic of applications.


    Java is also the core language of Android, and native applications created using
    Google’s Android Studio tools are built using the Java language. In addition,
    you’ll find Java embedded in many devices, like televisions and other consumer
    electronics.


    Many frameworks have been created based on the Java programming language to accelerate
    the development of applications across many platforms and devices.


    For web applications, frameworks like Struts, JSF, Grails, Spring, and others
    are used individually or in combination with each other to provide scalable web
    apps that can support millions of customers.


    For desktop applications, frameworks like JavaFX allow developers to create user
    interfaces using FXML, an XML-based markup language, and meld that with Java code.


    For mobile, the Android SDK from Google contains a tool for developing Android
    apps and an emulator to deploy and run your app on a virtual device for testing.


    As a developer, there are many coding tools available to you for Java. Integrated
    development environments, or IDEs, help combine many of the tasks you need to
    perform like coding, code management, debugging, working with code repositories,
    and creating documentation. Some of the more popular IDEs are IntelliJ IDEA, Eclipse,
    and NetBeans. The one we will be using in this course is from IntelliJ.


    Java opens up almost unlimited opportunities for you as a developer, and the best
    thing is that Java is not complicated to learn or understand once you get past
    the basics. Using your new Java skills, you can build apps for almost anything.


    # How Java Works


    Java is a unique programming language due to the “write once, run anywhere” mantra
    that was part of the original vision. How it makes this vision come to life is
    important to understanding how you work as a programmer.


    ## The Problem with Compiled Languages


    Compiled programming languages generally have a big limitation. When you convert
    your code to an executable program, the compiler reads the code and creates a
    binary file that is specific to a processor architecture.


    So, if I used a language like C or C++ to compile a program on my 32-bit Windows
    PC, that program can’t run on a Mac, nor can it run on a 64-bit Windows PC natively
    without added technologies to bridge the gap. It can only run on a 32-bit Windows
    PC.


    Every processor and operating system is expecting a program to meet extremely
    specific requirements. The way the program accesses the hardware is vastly different
    between Intel processors, ARM-based processors (like those found on phones and
    tablets), and other processor types like RISC architectures. (Older Macs used
    this type of architecture using chips called PowerPC chips like the G5 or G4.)


    Even 32-bit Intel processors and 64-bit Intel processors operate completely differently.
    So 64-bit programs can’t run on 32-bit computers, and 32-bit programs can’t run
    natively on 64-bit computers without additional software to make it compatible.


    When you expand to other types of computers like servers, the number of processor
    types and architectures can get even more complex.


    Web and application servers can use vastly different architecture types like Sparc,
    Xeon, Itanium, and other types over the last couple of decades.


    So, the folks at Sun Microsystems, when they designed Java, wanted to get past
    this limitation, so they created an innovative way to get around it.


    ## The JVM and JRE


    When you run a Java program, you aren’t just running the program, you are running
    a few things at the same time.


    For multiple platforms, Oracle has created a set of technologies called the Java
    Runtime Environment and the Java Virtual Machine. These are built so that the
    specific architectures of the hardware including Intel, ARM, 64-bit, 32-bit, and
    more can run Java programs.


    These runtimes are installed on the system and stay resident, waiting for a Java
    program to be executed.


    When a Java program is called to run, the Java Runtime Environment, or JRE, kicks
    in and opens the compiled program. The runtime environment then captures the instructions
    of the program and converts them to native executions on the computer.


    ![../images/499634_1_En_6_Chapter/499634_1_En_6_Figa_HTML.png](images/499634_1_En_6_Chapter/499634_1_En_6_Figa_HTML.png)


    This is what has made Java so universal. Wherever Oracle has created a JRE, you
    can run Java programs.


    ## Compiling Java Bytecode


    When you create your Java program, there are a few things in play when you create
    your code, called source code or source.


    ![../images/499634_1_En_6_Chapter/499634_1_En_6_Figb_HTML.png](images/499634_1_En_6_Chapter/499634_1_En_6_Figb_HTML.png)


    First, when you create your program, you are writing a plain text file. There
    are no formatting, special characters, graphics, or anything other than letters
    and numbers. When you save this file to your computer, it is a `.java` file, meaning
    that the file extension is `.java`.


    When you are finished coding your program, you take the file and send it to the
    compiler. The compiler takes the instructions you created and converts them to
    Java Bytecode, which the JRE can read and understand. The Java Bytecode (sometimes
    referred to as JBC) is a concise and compressed file that isn’t human readable
    but is designed to be understood and executed quickly by the JRE.


    The JRE then takes those bytecode instructions and sends them to the native hardware
    to execute the program on the machine.


    When you compile your program, you are creating these Java Bytecode files, called
    `.class` files, and they will run in the JRE against the native hardware of the
    architecture.'
