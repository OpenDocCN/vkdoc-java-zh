- fmt: '# Spacing and Alignment Formatters


    Often for text, you want to align or create a fixed amount of space for certain
    values or strings. You can use a string formatter to do exactly that by using
    the character `s` in your formatter code.


    Check out this example.


    ```

    System.out.println("Hello!");

    System.out.printf("|%20s|", "Hello!");

    System.out.println();

    System.out.printf("|%-20s|", "Hello!");

    System.out.println();

    System.out.printf("|%-20s|", "Hello, this is a long sentence.!");

    System.out.println();

    System.out.printf("|%-20.20s|", "Hello, this is a long sentence.!");

    System.out.println();

    Listing 12-4

    Spacing and alignment formatters

    ```


    The output for this is


    ```

    Hello!

    |              Hello!|

    |Hello!              |

    |Hello, this is a long sentence.!|

    |Hello, this is a lon|

    ```


    The pipes (the vertical lines) are added to make it clearer on what is going on
    here.


    When you use a string formatter, the whole number value represents the minimum
    amount of characters the phrase is allowed to take up on the screen. So `%20s`
    will take up 20 characters of space on the screen.


    If you add a minus sign to it, it will adjust the alignment, so it is on the other
    side. In this case, left aligned.


    If you have a long string, it will print it out in its entirety, unless you add
    a decimal portion to the formatter. In this case, it will cut off any text that
    is longer than the maximum string length allowed by the formatter.


    ## Multiple Items in Formatters


    You can add as many codes in your formatter string as you want; you just need
    to make sure you have a matching value to place inside of it. Each of these values
    is separated by commas.


    ```

    System.out.printf("%10s $%.2f\n","Apples",1.4f);

    System.out.printf("%10s $%.2f\n","Brownies",0.8f);

    Listing 12-5

    Multiple items in a formatter

    ```


    The output for this one is


    ```

    Apples $1.40

    Brownies $0.80

    ```


    Again, you can insert as many formatting codes as you want, but each value needs
    to be separated by a comma after it.


    ```

