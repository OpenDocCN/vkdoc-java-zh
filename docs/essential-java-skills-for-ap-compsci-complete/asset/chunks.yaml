- fmt: '# 1. Introduction


    Computer science has become a basic life skill that everyone is going to need
    to learn. Whether you are going into a career or side hustle in business, technology,
    creativity, architecture, or almost any other field, you will find programming,
    coding, and computer science play a role.


    In fact, if you look at the top skills on LinkedIn for the United States, in the
    last year all ten of the top were programming, computer science, or code related.
    These include cloud and distributed computing, statistical analysis, data mining,
    mobile development, storage systems management, user interface design, network
    and information security, middleware and integration software, web architecture
    and development frameworks, algorithm design, and Java development.^([¹](#fn1))


    What is unique about computer science is how it has become a skill, and not just
    a career. While there are jobs and titles of "Computer Scientist," the skill of
    computer science, and specifically coding and programming, is almost everywhere.


    In marketing, you need to analyze and sift through tons of user data and metrics
    on how people use your products, website, apps, or services. In medicine, doctors
    and researchers need to gather and analyze data gathered from clinical studies
    or to find new breakthroughs. In agriculture and farming, thousands of IoT devices
    need to be deployed and managed to gather data on soil conditions, humidity, and
    crop health. In architecture and construction, mapping out and analyzing how people
    use elevators, building infrastructure, or public spaces can help design better
    buildings for people to work and live in. Even when building a side business,
    or "hustle," entrepreneurs may need to perform research, build a website, program
    a mobile app or game, or perform tons of different activities involving code,
    logic, automation, and programming.


    When people create projects based on code, they organize their work into multiple
    chunks or segments of development. They call these "sprints." So, we will learn
    Java in the same way, using multiple sprints that will teach a single topic to
    help us keep pace with things along the way. Part of what makes learning coding
    difficult is it can be difficult to find real-world examples to draw parallels
    from. If you are planning on taking the AP Exam in Computer Science, many of the
    questions will not have any real-world context and will require you to understand
    and follow code without that as a reference.


    For you, this can make it confusing, but just remember: there are two sides to
    programming—what is being done and how it happens.


    The "what" is pretty easy, and this gives the code context, like parsing transit
    data, rolling a virtual die, or adding sales data for a quarter together.


    "How" it happens is a completely different story however. This is where you need
    to break things down into individual steps and start to think like a computer.
    A computer is going to think only about one single step at a time. It has no concept
    of what comes next or what came before it. It only is concerned with the present.
    So, if it can''t find something—you get an error. If it tries to do something
    that doesn''t exist—you get an error. If you try doing something out of order—you
    guessed it, you get an error.


    In fact, the computer is pretty dumb. I mean, like really dumb. What makes it
    smart is how we are able to string multiple actions together to make something
    work. And with growing advances in artificial intelligence, the computer itself
    can start making adjustments. And then Skynet activates, and we all know what
    happens after that.


    So when we learn programming, we are going to focus on three things:


    *   What is the process

    *   What is the syntax

    *   What is the flow


    The process is represented as a flowchart. We will learn how to make these to
    help you plan out what you are going to do before you write a line of code. At
    first, the flowcharts will be pretty simple, but then they will get more complex.
    And yep, you will get pretty annoyed with flowcharts before the year is over,
    but trust me…they help.


    The syntax is the code; this is what you write that translates the process you
    create in a flowchart to the instructions that the computer can understand.


    Finally, there is the flow. This is where you trace through the code and see how
    the data and information it stores along the way changes, and you can see how
    the operation of the program cascades from line to line. You will be building
    charts that will capture the programming flow so you can better understand how
    the computer processes code to make your next program easier to conceive and code.


    ## What You Need


    You will need a Windows or macOS computer to complete the projects in this book.
    You will need to install and configure the Java JDK (Java Development Kit) and
    IntelliJ from JetBrains (our IDE or code editor for the class). If you are on
    macOS, it is suggested that you uninstall the built-in Java JRE (Java Runtime
    Environment) and use the one included in the Oracle Java JDK. This will avoid
    warnings that appear when you build your projects.


    Footnotes [1](#499634_1_En_1_Chapter.xhtml#Fn1_source)


    # 2. Setting Up the Java JDK and IntelliJ


    To get started with our exercises, we need to set up our computers to work with
    Java code and run it. This is called creating a development environment.


    As you learn more about coding and programming, you will encounter many different
    tools to help you do your job. There are so many in fact, that you might find
    that one fits better than another. While they all essentially do the same thing,
    there are features and options in different tools that mesh better with different
    types of coders.'
