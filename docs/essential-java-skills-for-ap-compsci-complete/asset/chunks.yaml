    # 27. Methods and Scope


    Variable scope defines where in your program a variable exists for statements
    and other variables to have access to it to work.


    ## Variable Scope Errors


    Where variables are defined can affect what can access the values stored inside
    of them. This is defined by the variable''s scope. In the following code, `myMainValue`
    is not accessible from `myMethod()` because its scope is restricted to `main()`.


    ```

    public static void main(String[] args) {

    // This variable exists only in the main() method of the program

    int myMainValue = 10;

    }

    public static void myMethod() {

    System.out.println(myMainValue);

    }

    Listing 27-1

    Variable out of scope

    ```


    ## Defining Class-Scoped Variables


    You can define a variable to be scoped to a class, meaning that any method that
    is within that class can access it without any issues.


    To define a class-scoped variable, define it before the `main` method declaration.
    Often, you might want to define the variable at first and not give it a value
    until the `main` method executes.


    ```

    public static int myMainValue;

    public static void main(String[] args) {

    myMainValue = 10;

    }

    public static void myMethod() {

    System.out.println(myMainValue);

    }

    Listing 27-2

    Defining a class-scoped variable

    ```


    ## Class Conflicts


    You can sometimes create conflicts between scopes based on the design of your
    methods.'
