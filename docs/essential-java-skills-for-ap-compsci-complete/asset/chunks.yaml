    # 9. 简单的 Java 程序结构


    在我们的第一个程序中，我们在计算机上显示了一条简单的消息。我们使用 `System.out.println()` 方法完成了这一点。这是 Java 中的一个命令，我们可以用它来执行某些操作。


    嗯，实际上，`println()` 才是真正的方法。`System.out` 是包含我们运行的 `println()` 方法的类。并且 Java 中的每条语句都以分号结尾。每一条。它就像句子中的句号。


    你看，Java 中几乎所有内容都保存在一个叫做类的东西中。类定义了程序各部分如何工作的规则。稍后，你将学习如何更多地使用类，甚至如何创建自己的类。目前，我们只需要使用我们已经拥有的类。


    当我们运行之前的代码时


    ```

    System.out.println("Hello, world!");

    ```


    有几件事情正在发生。


    首先，这行代码周围的一切都在 Java 中设置我们的项目。让我们简要地看一下。


    ```

    public class Main {

    public static void main(String[] args) {

    System.out.println("Hello, World");

    }

    }

    代码清单 9-1

    基本程序结构

    ```


    在这个示例代码中，我们的 `Hello, World` 语句位于两个特定的代码块内。代码块使用一对花括号 `{ }` 来定义。它们将内部的内容分组到一个块中。


    代码块有一些规则，但我们稍后会介绍。现在，只需知道你可以将块相互嵌套。因此，在这个示例中，我们有一个 `public class Main` 代码块，从第
    1 行开始，到第 6 行结束。然后我们有一个 `public static void main` 代码块，从第 3 行开始，到第 5 行结束。


    我们的代码位于这个内部代码块中。


    外部代码块定义了程序的整体包装器。Java 在构建和运行程序时会寻找要执行的 `main()` 方法。


    所以，Java 寻找一个类。它找到了。


    然后它寻找 `main()` 方法，它也找到了。


    然后它运行该方法内的代码。这就是我们创建并添加到项目中的代码。


    在我们学习面向对象编程之前，你所有的代码都将放在 Main.java 文件中。很快，我们也会在构造器之外创建代码。


    那些 `public`、`class`、`static`、`void` 之类的词？暂时忽略它们，专注于我们放入 `main()` 方法中的内容。一切都会随着时间的推移而变得清晰。


    # 10. 文本字面量与输出


    计算机是字面理解事物的。真的，是字面理解。以至于实际上存在一些被称为字面量的东西。


    字面意思。


    “Hello, World” 就是一个字面量。准确地说，是一个文本字面量。


    文本字面量包含字母、符号、标点符号和数字，并由一对引号表示。双引号标记了字面量的开始和结束。


    ## 文本输出


    当你运行像 `println()` 这样的方法时，它会寻找一个叫做字符串的东西。字符串是文本的另一种说法。可以把它想象成串在绳子上的字母珠子序列。


    当你向一个使用字符串的方法提供一个字符串时，它会对其进行处理。对于 `println()`，它会将其打印到屏幕上，然后换行。


    所以，如果你有以下语句：


    ```

    System.out.println("Hello");

    System.out.println("World");

    ```


    这将输出为


    ```

    Hello

    World

    ```


    两者显示在两行上。


    但还有另一个你可以使用的方法，`print()`。它的工作方式相同，但在文本显示后不会换行。


    所以，如果你有以下语句：


    ```

    System.out.print("Hello");

    System.out.print("World");

    ```


    这将输出为


    ```

    HelloWorld

    ```


    将两个字符放在同一行。


    ## 转义序列


    文本字面量也可以包含特殊字符。以之前的例子为例：


    ```

    System.out.print("Hello");

    System.out.print("World");

    ```


    如果你想在文本字面量本身中包含一个新行，你可以使用两个字符的序列 `\n` 来添加它。


    这被称为换行符。它会在你的文本中创建一个换行：


    ```

    System.out.print("Hello\n");

    System.out.print("World");

    ```


    这本质上等同于


    ```

    System.out.print("Hello\nWorld");

    ```


    并且在屏幕上显示为：


    ```

    Hello

    World

    ```


    那这个呢？


    如果你想显示下面这一行，你会怎么做？


    ```

    Mike said, "Hey!"

    ```


    这行文本中包含一个引号，所以如果我们用它创建一个文本字面量，我们会得到


    ```

    "Mike said, "Hey!""

    ```


    但是计算机，再次强调，很笨。所以，它会认为 Hey 中 H 前面的引号是字面量的结束。


    这不是我们想要的。


    为了解决这个问题，我们可以使用一个转义序列来告诉程序，Hey 周围的引号是字面量的一部分，而不是它的边界：


    ```

    "Mike said, \"Hey\""

    ```


    现在，反斜杠加引号的两个字符序列允许字面量包含引号。


    你还可以使用其他转义序列，包括制表符空格序列。


    制表符序列 `\t` 会在你的文本中添加一个制表符空格。如果你设置好正确的序列，这有时有助于将内容对齐成列。


    就像这样：


    ```

    "First\tMiddle\tLast"

    "R.\tDouglas\tWinnie"

    ```


    这将显示为


    ```

    First        Middle            Last

    R.           Douglas          Winnie

    ```


    当你将语句上下堆叠时，制表符空格会进行偏移以帮助对齐。

