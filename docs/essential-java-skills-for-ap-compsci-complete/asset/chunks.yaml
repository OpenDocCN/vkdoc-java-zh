- fmt: '# Filling Out Our Character Sheet with Data


    With the basic `Mage` blueprint, we only know we want to store these attributes
    and skills, but we haven’t said how we want to store them. Just like with everything
    we do in programming, we need to explicitly define the type of value that is stored
    in each variable or object. For a role-playing game, we typically use integers
    or whole numbers to represent the various values in our player character.


    There are also rules that define what the initial values of these attributes and
    skills are at the beginning of the game. Often these start with some sort of threshold,
    and then a form of random chance, like a die, is used to add to that threshold.
    This is called “rolling a character” in role-playing game jargon.


    We can create a rule for how each of these is calculated. For every `Mage` character
    that is created, the rules are immediately put into action to help build the skills
    of the character.


    Let’s define the rules like this:


    - Strength is 7, plus the value of a six-sided die is added.

    - Intelligence is 15, plus the value of a six-sided die is added.

    - Agility is 8, plus the value of a six-sided die is added.

    - Wisdom is 10, plus the value of a six-sided die is added.


    With these rules, we now have everything we need to calculate the skill stats
    for our player. To finish out our character, we need to add two more things. In
    most role-playing games, characters have two expendable assets. The first are
    called hit points or health. These show how healthy or how injured a player is.
    There is typically a maximum number that is calculated based on skills or abilities
    of the character, and then the current points, which creates a ratio showing the
    relative health of the player.


    The second expendable asset is mana, or magic points. Mana is consumed when casting
    spells. The more advanced the spell is, the more mana points are consumed. Like
    with hit points, there is a maximum mana and current mana value, represented as
    a ratio to show the relative magical strength of a character. The maximum mana
    value is calculated based on the player’s abilities.


    For the mage, let’s establish the hit point ceiling to be equal to the strength
    of the character. Let’s also set the mana ceiling to be equal to the intelligence
    and two times the wisdom of the character.


    Now that these are finished, the character is ready to use. Following these rules
    was required for getting our character set up and all of the attributes and assets
    defined.


    # Classes, Instantiation, and Construction


    With our mage character sheet, we have the rules and framework for what defines
    a mage character. Whenever we create a new mage, we can use this sheet to help
    create a new one. You could create a large stack of empty sheets and create additional
    mages by taking a sheet off the top and completing the steps required to create
    the mage.


    This process is a key part of object-oriented design. When we define the attributes,
    rules, and assets of the mage, we define the blueprint for every mage that can
    be created. This, in programming, is referred to as the class, or class design.
    In Java, we define what every mage would contain and the rules that apply, inside
    of a unique file that defines the class.


    Every time we take a sheet off the stack and go through the rules to set up the
    player, we are instantiating the class. We are creating a unique instance of the
    class, based on the blueprint defined in the class, and customize it for that
    specific instance.


    The steps we take when we create the class, from defining the initial attribute
    values by rolling a die to calculating the hit points and mana based on these
    attributes, are part of the construction of the class instance. These must happen
    before the class is able to be used, and this process is managed by the constructor,
    a special set of rules that kick off when you create a new instance of a class.


    So, each character we make is a unique instance of a class, built using a set
    of rules contained in the constructor. This arrangement is the core part of object-oriented
    programming.


    # Player Character Sheets


    Each of these character sheets represents one of the following classes:


    - Mage

    - Paladin

    - Fighter

    - Priest


    ## Fighter


    | Hit Points | Mana |

    |---|---|

    | Current | Current |

    | Maximum | Maximum |

    | 2(STR) + 2(CON) | 0 |


    | Strength (STR) | Intelligence (INT) | Agility (AGI) | Constitution (CON) |

    |---|---|---|---|

    | 15 + 6D | 7 + 6D | 8 + 6D | 10 + 6D |


    | **Name** | **Tank** |

    |---|---|


    ## Mage


    | Hit Points | Mana |

    |---|---|

    | Current | Current |

    | Maximum | Maximum |

    | (STR) | (INT) + 2(WIS) |


    | Strength (STR) | Intelligence (INT) | Agility (AGI) | Wisdom (WIS) |

    |---|---|---|---|

    | 7 + 6D | 15 + 6D | 8 + 6D | 10 + 6D |


    | **Name** | **Range** |

    |---|---|


    ## Paladin


    | Hit Points | Mana |

    |---|---|

    | Current | Current |

    | Maximum | Maximum |

    | (STR) + 2(CON) | (INT) + 2(WIS) |


    | Strength (STR) | Intelligence (INT) | Agility (AGI) | Wisdom (WIS) | Constitution
    (CON) |

    |---|---|---|---|---|

    | 10 + 6D | 15 + 6D | 5 + 6D | 10 + 6D | 10 + 6D |


    | **Name** | | **Tank** | **Healer** |

    |---|---|---|---|


    ## Priest


    | Hit Points | Mana |

    |---|---|

    | Current | Current |

    | Maximum | Maximum |

    | (STR) | (INT) + 2(CHA) |


    | Strength (STR) | Intelligence (INT) | Agility (AGI) | Charisma (CHA) |

    |---|---|---|---|

    | 7 + 6D | 15 + 6D | 8 + 6D | 10 + 6D |


    | **Name** | | **Healer** |

    |---|---|---|


    # Polymorphism


    When we work as individuals, we can only do so much. When we work together as
    a party, we can accomplish much more and use the unique talents that every member
    of the party has. While this is true in many life situations, it is especially
    true with role-playing games, and when you understand how to build a party using
    unique roles, you are applying object-oriented programming principles without
    even realizing it.'
