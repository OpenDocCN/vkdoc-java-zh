    37. while 循环

    '
- fmt: '# Loops


    Loops allow blocks of code to run repeatedly based on a condition. The most basic
    loop is called the `while` loop. The loop starts with the `while` statement and
    is followed by a condition, defined using an evaluation or expression that results
    in a Boolean answer of `true` or `false`. If the result of the condition is `true`,
    the code within the loop executes, and the flow of the program returns to the
    top where it tests the condition again.


    One issue with the `while` loop to consider is creating an infinite loop. This
    is when a loop will run forever because the condition at the top is always `true`.
    These will cause a runtime error and will cause your program to crash.


    ## Create a while Loop


    In the following code, a `while` loop is created using the `while` statement and
    is followed by a conditional evaluation. The evaluation tests if the variable
    `val` is less than `10`. The variable is initialized with the integer literal
    value, `0`.


    ```java

    public class Main {

    public static void main(String[] args) {

    // This loop will run as long as the condition at the top

    // is always true

    int val = 0;

    while (val < 10) {

    System.out.println(String.format("val = %d",val));

    val++;

    }

    /* Output

    val = 0

    val = 1

    val = 2

    val = 3

    val = 4

    val = 5

    val = 6

    val = 7

    val = 8

    val = 9

    */

    }

    }

    ```


    The loop first tests the condition, which is true, because 0 is less than 10.
    Since the condition is true, it runs all of the code within the code block after
    the `while` statement. At the end of the block, it increases the value stored
    in `val`, which is now 1, and repeats the loop. Since the value stored in `val`
    is still less than 10, the loop runs again. This continues until `val` is equal
    to 9. At the end of that execution of the loop, `val` is increased by 1 to equal
    10. When the loop repeats this time, the condition at the top is now false, since
    10 is not less than 10. With the condition now false, the loop ends, and the code
    block is skipped and the flow of the program continues.


    ### Code Examples


    The preceding code is also available in the following GitHub repo: [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    # 38. Automatic Program Loops


    Sometimes, you need to have a program loop continuously to complete certain tasks.
    You need to end the loop based on some condition, even if that condition is for
    the user to simply say to end the program using a command or action. This is very
    common for games, where games will run and process logic, scenarios, and turns
    until a player wins, loses, or the user opts to end the game.


    ## Creating a Program Loop


    In the following example, a Boolean value called `loopProgram` is used to store
    a `true` or `false` value. The `while` loop runs until the Boolean is equal to
    `false`, which happens when the user enters the command `"exit"`. When that happens,
    the Boolean variable `loopProgram` is set to `false`, and the `while` loop then
    ends, and the program terminates.


    ```java

    import java.util.Scanner;

    public class Main {

    public static Scanner sc;

    public static boolean loopProgram;

    public static void main(String[] args) {

    sc = new Scanner(System.in);

    loopProgram = true;

    displayMenu();

    while (loopProgram) {

    System.out.print("Command? ");

    String cmd = sc.next();

    parseCmd(cmd);

    }

    }

    public static void displayMenu() {

    System.out.println("Menu: ");

    System.out.println("north: move north ");

    System.out.println("south: move south ");

    System.out.println(" east: move east ");

    System.out.println(" west: move west ");

    System.out.println(" exit: quit program ");

    }

    public static void parseCmd(String cmd) {

    switch (cmd) {

    case "north":

    System.out.println("You move north.");

    break;

    case "south":

    System.out.println("You move south.");

    break;

    case "east":

    System.out.println("You move east.");

    break;

    case "west":

    System.out.println("You move west.");

    break;

    case "exit":

    System.out.println("Goodbye");

    loopProgram = false;

    break;

    default:

    System.out.println("Unrecognized command!");

    break;

    }

    }

    }

    ```


    **Listing 38-1** Automatic program loop


