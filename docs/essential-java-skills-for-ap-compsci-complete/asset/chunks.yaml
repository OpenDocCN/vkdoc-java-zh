- fmt: '# 11. Value Literals


    Computers store, process, and access data and information. In a computer program,
    a programmer does this with variables. Variables have two sides to them. For the
    programmer, it is a name that you use to refer to a value throughout your program.
    The computer then reserves an amount of space in memory to store that value and
    make it available to you as a programmer.


    The easiest value to think of is a number. Like the number three. Three is a number
    of things, like three paperclips. The number three is called an integer. An integer
    is a whole number that counts the number of objects or things. With an integer,
    I can add to it or subtract from it.


    There are two types of integers however: unsigned and signed. When you think of
    three paperclips, you don’t think in terms of positive or negative. You just simply
    have three paperclips. But if I used to have five paperclips and now have three,
    how would I represent the change in value? I would use a negative number to indicate
    that I have a difference of –2.


    Negative numbers can be plotted on a number line along with other numbers that
    can be either positive or negative. To represent these values, you need a sign
    before them to show positive or negative value. Even though the positive sign
    is assumed most of the time, in a signed number it is still there. This sign needs
    to be saved by the computer, so space needs to be reserved for it.


    If we were selling the paperclips, we would need to represent the price. Currency
    is measured as a decimal, or fractions of a whole number. So, the paperclip could
    be $0.25 or €0,25 or £0.25. Decimals might be less than one, but the details of
    the fraction need to be captured in data in some form. It doesn’t matter to the
    computer if a number is a million or a millionth. It all needs to store the details
    of the value the same way in memory.


    ## Literal Formatting


    While we can look at these numbers and tell the difference, the computer—you guessed
    it—is dumb. It can’t tell the difference between number formats unless to specifically
    tell it what they are.


    Literals are source code representation of a fixed value. They are represented
    directly in code without any computation.


    The format we provide these values defines their types.


    We already encountered a string literal. It is defined by characters that are
    placed within a set of quotation marks.


    There is another related letter type, called a character. It is simply a single
    character wrapped in single quotes:


    Character: `''A''`, `''g''`, `''&''`


    String literals: `"Hello, world"`, `"Mr. Winnie"`, `"47"`


    The escape sequences we learned are converted to individual characters that perform
    unique output operations like tab spaces, line returns, and others. So we can
    add these to string literals:


    Strings containing quotes:


    ```

    "Janet said, \"Hello!\""

    ```


    Strings containing new lines:


    ```

    "Line one\nLine two"

    ```


    For numbers, things are a bit different. There are two basic types of numbers:
    integers and decimals.


    Integers are whole numbers and can never hold any fractional value less than one.
    Decimals can hold fractions of a whole number. Typically, we represent these as
    either a number without a decimal point or a number with one:


    Integer: `23`, `55`, `1701`


    Decimal: `23.0`, `3.14`, `47.001`


    There are two types of decimal numbers though. (Nothing is easy with computers,
    is it?) And it all comes down to memory.


    Imagine you have a decimal number that measures the distance between two chairs.
    Probably, you could measure that in whole numbers, like 15 inches.


    Imagine if you needed to measure the distance between two wires on a circuit board.
    You would need a lot more precision there, probably 0.0005 inches.


    Now, what if you needed to measure the distance between two atoms in a molecule?
    Take carbon monoxide. The distance between a carbon atom and an oxygen atom is
    1.13×10^(10) m or .000000000113 m. That is going to require a lot more precision
    to be accurate.


    Precision is the mirror of quantity. The more of something you have, the more
    memory you need. In that same vein, the more precise you need to be, the more
    memory you need.


    But sometimes, you don’t need the precision right away. So how do we represent
    that as a value literal?


    We add suffixes to the numbers.


    There are two basic precisions for decimal numbers: float and double. To tell
    the difference between them, you add a suffix at the end. For float, you add an
    `f`. For double, you add a `d`:


    Float decimal number literals: `65.4f`


    Double number literals: `65.4d`


    This will allow these literals to be managed with different levels of precision.
    Typically, you won’t need to worry about these for most applications, unless you
    work in the medical or scientific fields. In addition, a number that is missing
    a suffix is considered a double number.


    # 12. Output Formatting


    What a value is and how we display it are two different things. We can adapt how
    we display various value literals through formatters that convert and display
    values in different ways.


    To do this, we will use the `printf()` method that will contain the information
    we want to display, but includes special codes that change the way the values
    are shown on the screen.


    ## Decimal Formatters


    The most basic is when we work with decimals. Sometimes, we need to display more
    digits in a number than are needed.


    Here’s the code for how this works.


    ```

    System.out.println(2.3f);

    System.out.printf("%.2f",2.3f);

    System.out.println();

    System.out.printf("%.4f",2.3f);

    System.out.println();

    Listing 12-1

    Decimal formatters

    ```


    Here’s how it works. You start with the `println()` statement, and then you create
    a string literal that holds the text you want to display.


    Then, you use the percent sign to create a marker in the literal. Immediately
    following, you add the formatting code.


    After the formatter string literal, you follow with a comma and the value you
    want to insert into the first place. You can insert more than one value in a string
    formatter, just separate them with commas.


    The example in Listing [12-1](#499634_1_En_12_Chapter.xhtml#PC1) outputs the following:


    ```

    2.3

    2.30

    2.3000

    ```


    The `%.2f` code means that we are providing a floating-point number (a number
    with a decimal) with two digits in the decimal. This is defined using the `f`
    character in the code.


    The last example uses `%.4f` that provides four digits in the output.


    ## Thousands Formatters


    For a larger number, it is easier to read it if you use commas to separate each
    level of thousand in the number (or a period if you are in other parts of the
    world).


    To do that, you add a comma in the formatter code. Also, if you are working with
    integers, or numbers without fractions, you use the character `d` in the formatter
    instead of `f`.


    ```

    System.out.println(1000000);

    System.out.printf("%,d",1000000);

    System.out.println();

    Listing 12-2

    Thousands formatter

    ```


    The output in this example is


    ```

    1,000,000

    ```


    ## Currency Formatters


    We can combine other text in with the formatter string and combine multiple formatters
    together. For example, what if we wanted to show a price? We should show that
    with two decimal places and with a thousands separator in the number.


    ```

    System.out.println(1000.2f);

    System.out.printf("$%.2f", 1000.2f);

    System.out.println();

    System.out.printf("$%,.2f", 1000.2f);

    System.out.println();

    Listing 12-3

    Currency formatter

    ```


    We are combining multiple formatters here, but we are also prefixing the formatter
    with a dollar sign. You can add your formatter codes in any string literal when
    you use the `printf()` statement.


    This example outputs the following:


    ```

    1000.2

    $1000.20

    $1,000.20

    ```'
