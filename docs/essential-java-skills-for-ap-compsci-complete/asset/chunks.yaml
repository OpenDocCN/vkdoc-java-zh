- fmt: 'If you run the program again, the code in the `PlayerCharacter` `showStats()`
    method is never displayed. When you build on top of a class and want to run code
    from a method it is built on top of, you need to specifically state you want to
    run it. A constructor will automatically run the code in the base class without
    you needing to do anything.


    To call the code in a base class’ matching method, you need to use the `super`
    statement. Let’s update the `Mage` class to see how this works:


    ```

    public class Mage extends PlayerCharacter {

    // Skill attributes

    public int wisdom;

    Mage(String newName) {

    // Constructor

    name = newName;

    strength = 7;

    intelligence = 15;

    agility = 8;

    wisdom = 10;

    strength += (int) (Math.random() * 6 + 1);

    intelligence += (int) (Math.random() * 6 + 1);

    agility += (int) (Math.random() * 6 + 1);

    wisdom += (int) (Math.random() * 6 + 1);

    maxHitPoints = hitPoints = strength;

    maxMana = mana = intelligence + (wisdom * 2);

    System.out.println("A new mage named " + name + " has been created!");

    }

    public void showStats() {

    super.showStats();

    System.out.println("””””””””””””””””””””””””””””””””””");

    System.out.println(name + ", a mage:");

    System.out.println("    Strength: " + strength);

    System.out.println("Intelligence: " + intelligence);

    System.out.println("     Agility: " + agility);

    System.out.println("      Wisdom: " + wisdom);

    System.out.println("  Hit Points: " + hitPoints + " / " + maxHitPoints);

    System.out.println("        Mana: " + mana + " / " + maxMana);

    System.out.println();

    }

    }

    ```


    You’ll see that the `showStats()` method has a call at the beginning:


    ```

    super.showStats();

    ```


    This will go to the class that this class extends and execute the method. If we
    run this program, we can see how this works:


