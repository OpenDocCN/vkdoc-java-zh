    ## 44. Make Collections


    ### Using Arrays


    Arrays are collections of identically typed objects that you can refer to as a
    single name. You can also access the individual items within them using bracket
    notation and using index numbers.


    ### Creating an Array with Values


    Arrays are defined just like any other variable. You need to define the type of
    values that will be contained within the array and use a pair of brackets to indicate
    that you are creating an array instead of a single value. There are two ways you
    can create an array. You can create an array from a set of values, or you can
    define an empty array by declaring how many elements will be contained inside
    of it. The key thing to know is that an array must be defined with a specific
    number of items in order to create it. You cannot change the number of items in
    the array after it is created.


    To create an array from a set of values, start with the type of value that will
    be stored in the array, followed by a pair of square brackets. Then use the assignment
    operator and create a new array using the `new` statement, followed by the array
    value type and another pair of square brackets. Then follow with a set of values
    that match the array type, encapsulated in braces and separated by commas:


    ```java

    // Creating an array from values

    int[] a = new int[] {1,2,3,4,5};

    ```


    This array, called `a`, can only contain integers since it is typed as an `int`.
    Since we provided a value immediately, the array will contain five values, and
    they are initially 1, 2, 3, 4, and 5.


    ### Getting a Value from an Array


    To access a value in an array, you need to use the brackets to indicate which
    element you want to get, using an index number. Remember, the first element in
    an array is index number 0:


    ```java

    // Accessing values in an array

    System.out.println(a[0]); // Outputs 1

    ```


    ### Creating an Array by Size


    Alternatively, you can create an array by defining the size of it and provide
    the values later. The structure is generally the same, but you provide the size
    inside the square brackets and omit the list of values:


    ```java

    // Creating an array by size

    int[] b = new int[5];

    ```


    This array is empty but can contain five values inside of it. To add values to
    these five slots, you can access the array, specify an index element, and then
    assign a value into it using the assignment operator:


    ```java

    // Assigning values to an array

    b[0] = 5;

    ```


    ### Things to Avoid with Arrays


    There are a few potential pitfalls you should know when you work with arrays.
    The first is when you define an empty array by defining the size, Java automatically
    assigns a value to each element, even if you don''t provide one. This can lead
    to unexpected results, so it is recommended that you don''t keep an array empty
    for long. Another common error is to access elements of an array that don''t exist
    by providing an invalid index number. Finally, since arrays are typed to a value,
    all of the elements of the array must match the value defined when it was first
    created:


    ```java

    // Errors with arrays

    // System.out.println(b[1]); // Returns a 0 since no value was assigned

    // b[5] = 9; // No index 5 exists

    // int[] c = new int[] {1.2,3.4,5.6}; // Doesn''t match type

    // int[] d = new int[] {1,2,3,4.5}; // Mixed types

    ```


    ### Getting the Number of Values in an Array


    Just like with strings, you can find out the number of items within the array.
    With a string, you could find the number of characters. With arrays, you can find
    the number of elements. The difference is that you access the length using a property,
    not a method, so you need to omit the pair of parentheses at the end:


    ```java

    // Getting the array length

    int len = a.length;

    System.out.println(len); // Returns 5

    ```


    ### Looping Through an Array


    Finally, you can loop through the elements of an array, just like the characters
    of a string. By using the element index number, bracket notation, and the length
    property, you can loop through all the elements.


    The following code shows how you can create an array based on several elements
    defined by the user and then populate those values using a loop:


    ```java

    // Defining an array using input

    Scanner sc = new Scanner(System.in);

    System.out.print("How many numbers do you want to add? ");

    int count = sc.nextInt();

    int[] values = new int[count];

    for (int i = 0; i < values.length; i++)

    {

    System.out.printf("Value %d: ", i);

    int num = sc.nextInt();

    values[i] = num;

    }

    int sum = 0;

    for (int i = 0; i < values.length; i++)

    {

    sum += values[i];

    }

    System.out.printf("Sum: %d\n", sum);

    ```


