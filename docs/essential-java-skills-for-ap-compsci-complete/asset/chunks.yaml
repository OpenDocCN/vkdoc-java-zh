- fmt: '# Precompiled Files


    Sometimes, you will want to have files that you use repeatedly in your program.
    These generally are sections of code that will never change but contain prebuilt
    actions that you can execute and use in your own custom code.


    Maintaining these files can be extensive, and when you make improvements to this
    code, you want to find a way to make it easy to take those improvements and bring
    them to other programs.


    To make this easier, Java supports combining precompiled code into `.jar` files.
    JAR, or Java Archive, is a single module that you can then bring into any program
    and access the actions and methods within it just as if they were part of your
    code.


    If you ever want to update or change the JAR, you can just change that single
    reference or overwrite the JAR file that your program points to and the updates
    are made.


    ## OpenJRE


    Java is an open source language, meaning that the community can build, change,
    and improve the language and the compiler.


    As part of this, Oracle has created the OpenJRE and OpenJDK for the community
    to build and enhance. Oracle can then take contributions made by the open source
    community and bring them into the official Oracle Java JDK and JRE.


    Oracle then adds additional security and other protections to ensure the applications
    that run on it are safe and secure. Because it is a packaged platform, this security
    is applied to any hardware, server, or cloud infrastructures.


    Android is largely built on Java, and starting with Android N, or Android Nougat,
    Google switched to the OpenJDK due to litigation with Oracle.


    In the end, to you, it doesn’t matter which version of Java you are running. When
    you install any JDK and JRE, the source code, compiled files, and execution of
    the programs are essentially the same.


    # 7. Flowcharting


    Programming and coding are just as much about thinking and planning as it is about
    sitting in front of a keyboard. Often, a developer needs to plot out in their
    mind or on paper how a program is going to work. This can make the coding process
    much easier, especially if you are working together with others on a project.


    A flowchart is a common way to sketch out your program. It is exactly as it sounds:
    a chart that visually shows the flow of a program. In a flowchart, you connect
    various steps, decisions, and actions together into a string that follows the
    flow of how the program will operate.


    Because the computer is so literal with how it processes your actions and code,
    a flowchart makes it easier to code more accurately the first time vs. having
    to debug and thrash your way through code. Trust me, it is tempting to ditch the
    flowchart and go straight to the code, but if you are new, or relatively new to
    coding, it will save you a ton of time and force you to stop, pause, and sketch
    things out before you go to the keyboard.


    ## Flowcharting Tools


    There are a bunch of flowcharting tools you can use; some are pen and paper, and
    some are online.


    ### Paper


    Just like how a writer journals in a notebook, or a designer sketches in a sketchbook,
    a developer can often sketch a flowchart using pen and paper. Sometimes making
    things tangible and tactile helps slow your brain down and be more thoughtful
    with your code and program.


    If you want to go with the paper approach, you can get a stencil to help with
    your work. It helps make things a bit cleaner.


    ### Tablet and Stylus


    If you have a tablet or laptop that supports a stylus like an iPad, Surface, or
    2-in-1 laptop, there are lots of sketching apps that you can use for your flowcharting
    including OneNote, Adobe Illustrator Draw, Autodesk SketchBook, and more. Some
    specialized tablet apps can even detect the shapes you draw and convert them to
    template shapes.


    ### Apps


    Apps like OmniGraffle, Sketch, Adobe XD, Visio, PowerPoint, and Illustrator are
    examples of apps you can download or purchase and use to build your flowcharts.
    These apps vary in what they can do, but they all can work for building a flowchart.


    I use Visio a lot, and it has a cool feature where you can create the steps for
    your flowchart in Excel and then import them into Visio to automatically create
    the flowchart. You can then resync the chart if you make changes in Excel.


    ## Flowcharting Basics


    Flowcharts use different shapes to represent unique types of steps in the program
    or process flow. These shapes then determine what steps are being taken and can
    also affect the direction the program flow can take.


    ### Terminus


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figa_HTML.jpg](images/499634_1_En_7_Chapter/499634_1_En_7_Figa_HTML.jpg)


    A basic flowchart starts with the pill shape; this is called a terminus shape
    and is used when you start and end your flowchart. Inside, you write in either
    "Start" or "Stop" and can optionally define how the program does this in the shape.


    Then you draw a line, with an arrow, pointing to the next step in the flowchart.


    ### Process/Action


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figb_HTML.jpg](images/499634_1_En_7_Chapter/499634_1_En_7_Figb_HTML.jpg)


    An action, sometimes called a process, is represented by a simple rectangle. You
    create a single rectangle for every individual step that needs to be part of your
    program. We often combine multiple steps in our mind and think of them as a single
    action. So, something simple might seem like a single step, but it involves multiple
    actions.


    You then create more steps in your flowchart and connect them using lines with
    arrows. They can turn and twist. They can be vertical or horizontal. It is entirely
    up to you.


    ### Input and Output


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figc_HTML.jpg](images/499634_1_En_7_Chapter/499634_1_En_7_Figc_HTML.jpg)


    In your program, you will often need to get input from the user or display output
    to them. These steps are represented by a parallelogram to distinguish them from
    other steps, and you describe it like any other action.


    ### Decisions


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figd_HTML.jpg](images/499634_1_En_7_Chapter/499634_1_En_7_Figd_HTML.jpg)


    Decisions branch the flow of a program based on the results of a question. The
    question must be answered with a "Yes" or "No" response. (You''ll find out why
    later in the class).


    A decision step uses a diamond shape and has two paths that come off of it. One
    for "Yes"; one for "No." You then connect these paths to different actions based
    on the results of the question.


    These separate paths may reconnect at a later point, but that is all based on
    your program and when you want to make that happen.


    ### Annotations


    Sometimes you can''t fit everything into a shape, so it is fine to add annotations
    or notes to the flowchart. These can either be added descriptions or details about
    the step or programming and coding notes for you or others when the coding starts.


    ### Other Shapes


    There are other shapes for working with data, creating subprocesses, and other
    actions, but we will cover those later when we need them. For now, we will stick
    with these four basic shapes.


    ## Take Out the Trash


    Let''s take a look at an example flowchart, and you can see how this all comes
    together.


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Fige_HTML.png](images/499634_1_En_7_Chapter/499634_1_En_7_Fige_HTML.png)


    The flowchart starts with a terminus, or terminal shape, labeled start.


    Then an action is performed, "Open trash can."


    Next, we reach a decision. The answer to the question needs to be yes or no. "Is
    the trash full?" If it is, you follow the yes path. If it isn''t, you follow the
    no path.


    Depending on the path you take, you will continue from step to step following
    each action.


    This chart has the decision paths meet back up to a single point, which is totally
    fine with a flowchart.


    It then ends with the stop terminus.'
