    `Fighter` 类中添加。当你像这样创建继承其他类的类时，你就是在创建一个类层次结构。基类被称为超类。你创建的继承超类的类被称为子类。


    所以，在我们的例子中，`PlayerCharacter` 是超类。`Mage` 和 `Fighter` 是 `PlayerCharacter` 超类的子类。


    当我们使用 `super` 语句时，我们是在请求超类做一些事情，在这个例子中，就是请求 `PlayerCharacter` 类。


    你可以根据需要创建任意多个超类的子类，并且可以继续按需扩展类。


    56. 我不收集那些；太抽象了


    当你玩角色扮演游戏时，你会和其他人组成一个团队一起行动。这可能是与现实中同一房间的其他玩家，或者是电脑游戏中的模拟角色。一个队伍就是一个集合，一群有共同点的人。


    在 Java 中，我们可以使用数组或 `ArrayList` 来创建集合。这些集合可以包含任何东西，我们可以用它们来创建我们自己通过类定义的事物的集合。Java
    集合并不局限于核心语言中的事物——它们可以是我们自己自定义类中创建的对象的实例。


    这里有一个例子，在我们的程序中，我们可以创建一个游戏角色集合，称为 party：


    ```

    import java.util.ArrayList;

    public class Main {

    public static ArrayList party;

    public static void main(String[] args) {

    party = new ArrayList();

    party.add(new Mage("Jaana"));

    party.add(new Mage("Antos"));

    }

    }

    ```


    在这个例子中，我们现在有了一个名为 party 的集合，它包含了两个 `Mage` 类的实例。派对开始！嗯——还不完全是。


    当我们创建一个没有泛型的 `ArrayList` 时，我们是将集合类型指定为 `Object`，这意味着任何东西都可以添加到其中，包括数字、字符串或 Java
    中的任何对象。这也意味着我们无法访问 `Mage` 类特有的方法，比如 `showStats()`。所以如果我们尝试添加这一行：


    ```

    party.get(0).showStats();

    ```


    我们会得到一个错误，因为它在定义集合的类（即 `Object` 类）中找不到该方法。


    但是，我们可以解决这个问题。使用泛型，我们可以将 `ArrayList` 集合的类型指定为 `Mage` 类型，这样我们就可以访问 `Mage` 的方法了。我们可以将代码更新为如下所示：


    ```

    import java.util.ArrayList;

    public class Main {

    public static ArrayList party;

    public static void main(String[] args) {

    party = new ArrayList();

    party.add(new Mage("Jaana"));

    party.add(new Mage("Antos"));

    }

    }

    ```


    现在我们可以使用 `Mage` 类中的方法了，我们甚至可以使用 `for...each` 循环来遍历集合中的每个对象：


    ```

    import java.util.ArrayList;

    public class Main {

    public static ArrayList party;

    public static void main(String[] args) {

    party = new ArrayList();

    party.add(new Mage("Jaana"));

    party.add(new Mage("Antos"));

    for (Mage pc : party)

    pc.showStats();

    }

    }

    ```


    当我运行这段代码时，我可以得到集合中两个 `Mage` 类实例各自的输出：


    ```

    一个新的玩家角色已被创建！

    一个名为 Jaana 的新法师已被创建！

    一个新的玩家角色已被创建！

    一个名为 Antos 的新法师已被创建！

    以下是 Jaana 的属性：


    Jaana，一位法师：

    力量: 13

    智力: 21

    敏捷: 10

    智慧: 14

    生命值: 13 / 13

    法力值: 49 / 49

    以下是 Antos 的属性：


    Antos，一位法师：

    力量: 9

    智力: 20

    敏捷: 13

    智慧: 15

    生命值: 9 / 9

    法力值: 50 / 50

    进程已结束，退出代码 0

    ```


    但我们仍然有一个问题。其他类怎么办？如果我想要创建一个 `Fighter` 并将其添加到集合中，我做不到：


    ```

    party.add(new Fighter("Sentri"));

    ```


    下面的代码会给我一个错误，因为 `ArrayList` 集合被明确指定为 `Mage` 类型。那么我们该如何解决这个问题呢？


    我们需要回想一下我们是如何构建 `Mage`、`Fighter` 以及其他潜在类的。我们构建它们是为了继承 `PlayerCharacter` 类，那么，考虑到这一点，`Mage`
    和 `Fighter` 是什么？它们是 `PlayerCharacters`！我们可以使用超类作为工具，将任何集合或对象的类型指定为接受继承它的任何子类。我们还需要更新我们的
    `for...each` 循环，因为它需要在集合中查找 `PlayerCharacters`，而不是像 `Mage` 类这样的特定类。

