    35. 使用 JavaDoc 编写文档


    作为软件开发人员或工程师，工作的一部分不仅仅是编写代码。你的职责中很大一部分是编写文档，以支持其他开发人员以及可能使用你代码的外部开发人员正确使用它。

    为了协助完成这项任务，一个名为 JavaDoc 的工具允许你作为开发人员创建特殊编码的注释，以保存关于代码特定方法和组件的文档。


    使用 JavaDoc 语法


    JavaDoc 使用独特的代码来标记代码的各个部分，这些部分会被 JavaDoc 构建器解析，从而为你的代码创建 HTML 文档。当你更新代码时，应重新运行
    JavaDoc 以确保文档是最新的。以下是使用 JavaDoc 的代码示例：


    ```

    /** Main 类定义了整个项目

    *

    * @author Doug Winnie

    * @version 1.0

    */

    public class Main {

    /** 用于计算的整型变量 **/

    public static int val;

    /**

    * main 方法在程序启动时自动执行

    * @param args [未使用] 保存程序的启动参数

    */

    public static void main(String[] args) {

