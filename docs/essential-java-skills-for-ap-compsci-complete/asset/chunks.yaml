    **38. 自动程序循环**


    有时，你需要让程序持续循环以完成某些任务。你需要根据某个条件结束循环，即使该条件只是用户通过命令或操作简单地表示要结束程序。这在游戏中非常常见，游戏会运行并处理逻辑、场景和回合，直到玩家获胜、失败或用户选择结束游戏。


    **创建程序循环**

    在以下示例中，使用一个名为 `loopProgram` 的布尔值来存储 `true` 或 `false` 值。`while` 循环一直运行，直到该布尔值等于
    `false`，这发生在用户输入命令“`exit`”时。当这种情况发生时，布尔变量 `loopProgram` 被设置为 `false`，然后 `while`
    循环结束，程序终止。


    ```

    import java.util.Scanner;

    public class Main {

    public static Scanner sc;

    public static boolean loopProgram;

    public static void main(String[] args) {

    sc = new Scanner(System.in);

    loopProgram = true;

    displayMenu();

    while (loopProgram) {

    System.out.print("Command? ");

    String cmd = sc.next();

    parseCmd(cmd);

    }

    }

