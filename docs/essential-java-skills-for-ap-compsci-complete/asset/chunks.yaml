- fmt: "When you look at these two, there is a lot that is in common between them.\
    \ They both contain a name, strength, intelligence, agility, hit points, and mana\
    \ fields. They also both have a `showStats()` method that displays the instance’s\
    \ attribute values.\n\nWhen you create classes, you can take things that are common\
    \ for multiple classes and create superclasses. It works like this. If we create\
    \ a class that has everything that is in common, we can then build what is unique\
    \ for a `Mage` and a `Fighter` on top of what is common for both. When you create\
    \ classes in this way, you can build on top of and include or extend the contents\
    \ of these classes.\n\nSo, if we had a new class called `PlayerCharacter`, we\
    \ can define that to include everything that is in common between `Fighter` and\
    \ `Mage`:\n\n```\npublic class PlayerCharacter {\n    // Name\n    public String\
    \ name;\n    // Skill attributes\n    public int strength;\n    public int intelligence;\n\
    \    public int agility;\n    // Health and magic\n    public int maxHitPoints;\n\
    \    public int hitPoints;\n    public int maxMana;\n    public int mana;\n  \
    \  PlayerCharacter() {\n        System.out.println(\"A new player character has\
    \ been created!\");\n    }\n    public void showStats() {\n    }\n}\n```\n\nAs\
    \ you can see, only the things that are common across `Mage` and `Fighter` are\
    \ included here. We define strength, intelligence, agility, hit points, and mana\
    \ fields, and we have a constructor for the `PlayerCharacter` class, and we have\
    \ a method for `showStats()` which doesn’t do anything yet.\n\nNow we can use\
    \ this class as the foundation for other classes, including `Mage` and `Fighter`.\
    \ We can strip out the items that are already in the `PlayerCharacter` class in\
    \ each of these two classes. First, we can do that with the `Mage` class by removing\
    \ the definitions for name, strength, intelligence, agility, hit points, and mana:\n\
    \n```\npublic class Mage {\n    // Skill attributes\n    public int wisdom;\n\
