    \ These include the name; the attributes for strength,\nintelligence, and agility;\
    \ and the maximum and current hit points and\nmana. It is important to call out\
    \ though that the presence of these\nacross all of the classes is what is consistent.\
    \ The rules that define\nthe minimum values and the ways they are calculated are\
    \ not the\nsame—only the fact that they all exist.\nBut although these are all\
    \ consistent in each player class, if we\never change the rules of our role-playing\
    \ game and, say, add another\ncommon component, like experience or character level,\
    \ we would need to\nadd it to each player class and update each sheet.\nInstead,\
    \ we could take all of the common items and create a player\nsheet that contains\
    \ just them, but doesn’t include the rules for\nconstructing the player character\
    \ instance. Then, for each unique class,\nwe can extend or build on the basic\
    \ blueprint and add the unique rules\nthat govern each one, as well as the unique\
    \ attributes that are part of\nthose specific classes.\nThis is called a class\n\
    hierarchy. We have a generic player character class, and then add\nor extend that\
    \ class, adding all of the unique elements that are part of\nthe class we build\
    \ on top. You can visualize this by creating a sheet\nwith the common items that\
    \ are part of the generic player class. Then\nusing clear transparencies, add\
    \ in the unique items on top of the paper,\nbuilding out the class.\nThe paper\
    \ underneath is called the superclass. It has a\nhigher hierarchy. The transparency\
    \ that extends the superclass is called\nthe subclass. You can show them like\
    \ an org chart, showing which\nsubclasses extend from a superclass.\nIf we look\
    \ at our five players, we have a collection of items, or\nobjects. But what is\
    \ common for all of the items in our collection? They\nall are instances of subclasses\
    \ of a common superclass: the generic\nplayer class. So, you can say that all\
    \ items in this collection must be\ninstances of a subclass of the generic player\
    \ character class.\nBut we have a problem. We now have a player character sheet\
    \ that we\ncan’t use as a character instance. We can’t take the generic player\n\
    character and use it. It doesn’t have any rules that define how it is\ncreated,\
    \ so it is useless. In this case, we want the class only to be\nused a superclass\
    \ to extend from, but we don’t want to create instances\nof that class. To do\
    \ that, we would call this class an abstract class.\nAbstract classes can’t be\
    \ instantiated, since they would be useless.\n\nParty Up—All the Same—but All\
    \ Different at the Same\nTime\nWith five instances of four different classes,\
    \ we can start to play\nour role-playing game. But this game requires that we\
    \ form a\nthree-person party that are the active players in the game. Players\
    \ can\nbe substituted for one of the three players in the party, but only the\n\
    players in the party are active in the game.\nThe rules for a party state that\
    \ we need to have one tank, or a\ncharacter that is designed to take extensive\
    \ damage and use short-range\nmelee style attacks; one range, or a character that\
    \ attacks over a long\nrange; and one healer, or a character that has a weak attack,\
    \ but can\nheal other players in the party.\nSo, in order for us to put our player\
    \ instances in the right\nposition, we need a way to characterize them. These\
    \ categories indicate\nthat an instance from a class contains specific actions\
    \ or values that\nare the same, making the class an implementer of the category,\
    \ and that\nit contains all of the actions that are part of that category.\nThe\
    \ category is called the interface, and it\ndefines a unique set of requirements\
    \ for a class to conform to the\ninterface and that an instance can be used in\
    \ a situation that requires\na specific interface.\nA class can implement one\
    \ or many interfaces, like the paladin class.\nThat implements two: tank and healer.\
    \ So any player that is an instance\nof a paladin can be placed in either the\
    \ tank or healer slot in the\nthree-person party.\nBut we should call out something\
    \ important here. For the healer or\ntank slots in the party, they are requiring\
    \ the category or interface,\nnot a specific class type. So more than one class\
    \ can be put into that\nslot—it just needs to implement the interface that is\
    \ required. This is\ncalled polymorphism, where we\nare using an interface as\
    \ a way to support completely different classes,\nand we are restricting the slot\
    \ to an interface, not to a specific\nclass.\n\nThe Essential Tool: The Die\n\
    There is one last thing that we have used but haven’t really called\nout. The\
    \ die used\nto help construct our characters. The die was required to determine\
    \ the\nvalues of each of the attributes of our player character instances.\nBut\
    \ we didn’t need to create an instance of a die; we just need to\nuse it. We just\
    \ want to take the die and roll it. We would call this\naction, of rolling the\
    \ die, as a static action. We don’t need to create\na unique instance of the die\
    \ in order to roll it. We can simply just\nroll it.\n\nClass Hierarchy, Polymorphism,\
    \ Abstract, and\nStatic\nBuilding off our basic object-oriented programming concepts\
    \ of classes,\ninstantiation, and construction, we can add more structure and\n\
    flexibility. We can define classes, even classes that we can’t create\ninstances\
    \ of, to serve as a superclass that other subclasses can extend\nand inherit the\
    \ blueprint of the original class. We can also categorize\nclasses using interfaces\
    \ and use polymorphism to restrict\nobjects based on interfaces instead of classes.\
    \ Finally, we can create\nclasses that have static actions that can\nbe called\
    \ without the need to create an instance of a class.\nNext, we will put away the\
    \ paper and pencil and dive into exactly how\nwe would implement this in Java,\
    \ rebuilding our role-playing game\nexample, but this time in code.\n\n54. Make\
    \ All the Things…Classes\n\nNow that we have a basic character class and our character\
    \ sheets, we\ncan start to learn how these can be created in Java as object-oriented\n\
    classes.\n\nClasses in Java  define four main\nthings:\n\n1.  What is the name\
    \ of the class and how does it fit within the\n    hierarchy and how is it classified\
    \ using an interface\n\n2.  What are the values that are stored and used within\
    \ each unique\n    instance of the class\n\n3.  What are the actions that each\
    \ unique instance of the class can\n    perform\n\n4.  What rules govern how each\
    \ unique instance is created during\n    construction"
