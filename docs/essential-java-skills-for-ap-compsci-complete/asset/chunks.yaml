    If you notice, only the mages that are created display the “Here are the stats
    for…” line. That is because we haven’t added the `super.showStats()` call to the
    `Fighter` class, only to the `Mage` class. When you create classes like this that
    extend other classes, you are creating a class hierarchy. The base class is called
    the superclass. The class that you create that extends the superclass is called
    the subclass. So, in our example, `PlayerCharacter` is the superclass. `Mage`
    and `Fighter` are subclasses of the `PlayerCharacter` superclass. When we use
    the `super` statement, we are asking the superclass to do something, in this case,
    the `PlayerCharacter` class. You can create as many subclasses of a superclass
    as you want, and you can continue to extend classes as far as you need to.


    ## I Don’t Collect Those; Too Abstract


    When you play a role-playing game, you work together as a team with other people.
    This could be with other players in the same room in real life or simulated characters
    in a computer game. A party is a collection, a group of people who have something
    in common. In Java, we can create collections using arrays or `ArrayList`s. These
    collections can be of everything, and we can use them to create collections of
    things that we define ourselves using classes. Java collections aren’t limited
    to things that are just in the core language—they can be instances of objects
    that we create in our own custom classes.


    Here is an example, in our program, we can create a collection of characters in
    our game, called party:


    ```

    import java.util.ArrayList;

    public class Main {

    public static ArrayList party;

    public static void main(String[] args) {

    party = new ArrayList();

    party.add(new Mage("Jaana"));

    party.add(new Mage("Antos"));

