    49. 引入泛型


    ArrayList 相对于数组的灵活性使其成为创建集合的有吸引力的选择，但在某些情况下，集合中缺乏类型限制可能会成为问题。例如，如果你正在处理一组整数，无法阻止字符串进入集合这一事实可能会使你的代码意外地复杂并导致错误。此外，因为所有内容都被类型化为通用的
    Object 类，你需要强制转换或解析所有内容才能使用它：


    ```

    ArrayList values = new ArrayList();

    values.add(1);

    values.add(2);

    values.add("3"); // 完全合法，但不希望出现

    values.add(4);

    System.out.println(values);

    int x = ((int) values.get(2)) / 2; // 因为 get(2) 返回一个 Object

    ```


    相反，你可以使用泛型的概念，它可以限制 ArrayList 实例仅包含某些类型，并为你提供一种方法来为你的集合构建严格的类型化，并将类型化与 ArrayList
    的灵活性结合起来。


    使用泛型创建 ArrayList


    泛型通过标识你想要使用的类型并将其包裹在尖括号中来定义。然后，在创建和初始化你的 `ArrayList` 实例时，将这些附加到 `ArrayList` 类定义的末尾。请注意，你需要使用值类型的完整类名。你不能使用原始类型，例如
    `int`、`boolean`、`double` 等：


    ```

    ArrayList numbers = new ArrayList();

    ```


    现在，当你使用 `add()` 方法向 `ArrayList` 添加类型时，你可以放入的类型会受到限制：


    ```

    numbers.add(1);

    numbers.add(2);

    numbers.add("3"); // 生成一个错误

    numbers.add(4);

    ```


    但是，你仍然需要强制转换或解析值，因为该类的方法仍然返回 `Object` 类型：


    ```

    int y = ((int) values.get(2)) / 2;

    ```


    但是，你现在至少可以确信存储在集合中的值被限制为特定类型。


    使用泛型进行类型化


    使用泛型进行类型化定义了对象的基础类型。因此，就像你对数组或任何其他类型所做的那样，你可以使用泛型来类型化作为方法定义一部分的集合，方法是通过使用带有泛型的
    ArrayList 来设置参数或返回类型。


    例如，以下方法接受一个整数数组作为参数，但其返回类型被类型化为 `Integer` 类型的 `ArrayList`：'
