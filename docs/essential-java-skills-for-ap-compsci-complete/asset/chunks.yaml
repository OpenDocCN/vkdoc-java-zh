    ## 36. Formatted Strings


    Previously, we have used the `printf()` method to create and output strings using
    formatters. Sometimes, you want to simply store the formatted string and not display
    it using a `String` variable. You can do that using the `format()` method of the
    `String` class.


    ### Creating a Formatted String Literal


    To create a string literal, use the `String.format()` method. Inside, you place
    the string template along with the insertion codes and follow it with a comma-delimited
    list of the respective values to insert into the template. It is the same code
    you would use for the `printf()` method, but the result is a complete string:


    ```java

    String x = String.format("a: %s, b: %d, c: %.3f", a, b, c);

    ```


    The result is the following string, assigned to `x`:


    ```

    "a: foo, b: 5, c: 1.250"

    ```


