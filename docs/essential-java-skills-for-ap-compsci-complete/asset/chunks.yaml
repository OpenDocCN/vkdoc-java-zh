- fmt: '# 20. Managing Type


    When you work with variables and methods, you need to juggle different value types.
    Sometimes, you need to work with an integer, but you have a float. Or you have
    a double that needs to be an integer. How you manage types and force them to be
    other things is a common part of working with programming languages.


    ## Mixing Types in Evaluations


    When you mix types, all values in a mixed evaluation are converted to double before
    any operations are performed.


    Take this, for example:


    ```

    int a = 11;

    int b = 4;

    double x = 11;

    double y = 4;

    System.out.print(a / b);

    System.out.print(", ");

    System.out.print(x / y);

    System.out.print(", ");

    System.out.print(a / y);

    ```


    The result of this code snippet is


    ```

    2, 2.75, 2.75

    ```


    That is because for the third evaluation, we are combining an integer and a double.
    When Java sees the mixed types, it converts the integer into a double and completes
    the operation.


    ## Numbers to Strings


    Most numeric values when you concatenate within a string will convert to a string
    without any special treatment. Just “add” them together to another string literal,
    and the values will concatenate. It is preferable to use the `printf()` method
    though so you can control and adjust how those values are shown on screen.


    ```

    String a = "Value: " + b;

    ```


    You can’t however take a numeric value and simply assign that to a string variable.
    That’s not allowed. Instead, you will need to access a method that is unique for
    each value type.


    For example:


    ```

    Double.toString(value);

    Float.toString(value);

    Integer.toString(value);

    ```


    When you pass in a value into each of these methods, it will return a string version
    of that value that you can assign to a string variable.


    You’ll notice that the value types in these statements are capitalized. There
    are reasons for this, but we will cover those when we get to classes.


    ## Strings to Numbers


    Going the other way is called parsing. You will need to have a method read, or
    parse, a string and try to see if there is a number value inside of it.


    There are limitations though. For instance, the string can only contain decimal
    points. It cannot contain currency symbols or thousands separators.


    Parsing is done with a method that is also attached to a value type name:


    ```

    Double.parseDouble(string);

    Float.parseFloat(string);

    Integer.parseInt(string);

    ```


    Note the differences between the method names.


    ## Casts


    Voila! The rabbit has become a bouquet of flowers!


    Casting a spell isn’t all that mysterious in Java. In fact, it is a core part
    of it. Casts are when you treat a value like it is another.


    You essentially are trying to force a value to fit a different container. Sometimes,
    casts won’t work however, so be careful when you use them.


    Take this example:


    ```

    double foo = 3.00;

    int bar = foo;

    ```


    The second line generates an error. Even though the value of `foo` is, technically,
    an integer since it has no decimal value, it isn’t “strictly” an integer. So the
    assignment fails.


    We can force this by placing a cast before the value we want to treat as a different
    type. Simply surround a value type in parentheses and put it before the value:


    ```

    int baz = (int) foo;

    ```


    This works with no issues, because the cast is treating `foo` like an integer
    so it matches the type.


    ## Cast Errors


    There are some pitfalls with casts however. You need to be careful with where
    you place them, because it can totally change the result of an evaluation:


    ```

    int value1 = 2, value2 = 5;

    float q;

    q = value2 / value1;

    System.out.println(q); // 2.0

    ```


    This example takes two values that are integers and attempts to divide them and
    assign them to a float variable.


    Because they are integers, when they are divided, any decimal is simply thrown
    away. So the result, `2`, is converted into a float (which doesn’t require any
    special handling) and becomes `2.0`.


    But if we wrap these in a set of parentheses and cast, what should we get?


    ```

    q = (float)(value2 / value1);

    System.out.println(q); // 2.0

    ```


    We get the same answer because the integer division is still happening. The two
    numbers are divided, throwing away the decimal, and then *that* value is cast
    as a float.


    Not very helpful, right?


    So, to fix this, we need to cast each value *before* the division happens:


    ```

    q = (float)value2 / (float)value1;

    System.out.println(q); // 2.5

    ```


    ## Code Examples


    The next page shows examples of value manipulation and casting that you can use
    in your programs.


    This code is also available in the following GitHub repo:


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```

    public class Main {

    public static void main(String[] args) {

    // NOTE: This code has errors in it and WILL NOT COMPILE

    // Setting variables for examples

    int a = 5;

    double b = 3.14;

    String x = "3.95";

    String y = "185";

    // I: Numbers in string concatenation

    String text = "The value of a is " + a;

    System.out.println(text);

    // II: Error in direct type conversion

    String val = b; // Can''t convert types

    // III: Convert using the base value type''s toString() method

    String rate = Double.toString(b);

    System.out.println(rate);

    // IV: Parse (Convert) a string to a number

    double piValue = Double.parseDouble(x);

    int qty = Integer.parseInt(y);

    double price = Double.parseDouble("$2.50"); // Generates an error

    // V: Casting values

    double foo = 3.00;

    int bar = foo;          // No cast, generates an error

    int baz = (int) foo;    // With cast

    // VI: Casting issues

    int value1 = 2, value2 = 5;

    float quotient;

    //// without casting:

    quotient = value2 / value1;

    System.out.println(quotient); // 2.0

    //// with improper casting:

    quotient = (float)(value2 / value1);

    System.out.println(quotient); // 2.0

    //// with proper casting:

    quotient = (float)value2 / (float)value1;

    System.out.println(quotient); // 2.5

    }

    }

