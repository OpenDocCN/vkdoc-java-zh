- fmt: '# Why This All Matters


    So why is this all important? Because what is stored in a variable for a value
    on the stack is the value itself, like the value of an integer. The value for
    a variable on the heap is only the reference to where the value is stored. When
    you access a variable, like a `String`, it is performing two actions: finding
    the memory address for a value and then accessing what is stored at that address.
    So what happens when you compare values from the heap? There is a distinct possibility
    that even though two heap-stored values contain the same values, the fact that
    they are at different memory addresses means that the variable values themselves
    aren’t equal to each other.


    ## Testing Equality with Strings


    When comparing strings together, there are some issues that can come up. When
    you work with primitive local value types like `int`, `float`, etc., these are
    stored as values on the stack that have unique memory addresses from each other.
    When you work with class types, like `String`, they refer to memory locations
    on the heap. When you use the equality operator, `==`, it looks and returns `true`
    if the reference is equal between the two items. Sometimes, when you use class
    types, the references can be different, so this returns `false`, even if the values
    in the strings are identical. Alternatively, you can use the `equals()` method
    to compare two items entirely based on value and ignore if their references are
    different.


    ### When the Heap Throws Equality


    Take this example, which returns `true` using the simple equality operator:


    ```

    String a = "CompSci";

    String b = "CompSci";

    // Result is true, because the references are identical

    boolean result = (a == b);

    System.out.println("The result of a == b is " + result);

    ```


    The strings `a` and `b` have the same reference because the memory for the String
    literal `"CompSci"` is created first and both strings refer to the same memory
    address that holds the literal value.


    If we create unique instances of the `String` class using the `new` statement,
    we can see where the problems come up. The following example returns `false`:


    ```

    String c = new String("CompSci");

    String d = new String("CompSci");

    // Result is false, because the references are different

    result = (c == d);

    System.out.println("The result of c == d is " + result);

    ```


    The result is `false`, because we create the strings first using the `new` statement,
    which creates two completely different references. Since the equality operator
    in this case is looking for identical references, the result is `false` since
    they are both different.


    ### How to Better Compare String Values


    Confusing, I know. But there is an easy way to clean this up. We can use the `equals()`
    method on the `String` variable we want to compare and provide the variable or
    literal we want to compare the value to:


    ```

    String c = new String("CompSci");

    String d = new String("CompSci");

    // Result is true, because the values are identical

    result = c.equals(d);

    System.out.println("The result of c.equals(d) is " + result);

    ```


    You can also use a literal in this example:


    ```

    // Result is true, because the values are identical

    result = c.equals("CompSci");

    System.out.println("The result of c.equals(\"CompSci\") is " + result);

    ```


    When comparing two strings together, it is usually safe if you are comparing a
    string variable and a string literal using the equality operator, `==`. However,
    if you are comparing two string variables together, it can often be better to
    use the `equals()` method to compare them to avoid reference confusion and odd
    results in your code.


    ### Code Examples


    The next page shows examples of capturing input from the user. This code is also
    available in the following GitHub repo:


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```

    public class Main {

    public static void main(String[] args) {

    // Issue with == and strings

    // New strings that are built using literals

    String a = "CompSci";

    String b = "CompSci";

    // Result is true, because the references are identical

    boolean result = (a == b);

    System.out.println("The result of a == b is " + result);

    // New strings that are built as instances of a class

    String c = new String("CompSci");

    String d = new String("CompSci");

    // Result is false, because the the references are different

    result = (c == d);

    System.out.println("The result of c == d is " + result);

    // Result is true, because the values are identical

    result = c.equals(d);

    System.out.println("The result of c.equals(d) is " + result);

    // Result is true, because the values are identical

    result = c.equals("CompSci");

    System.out.println("The result of c.equals(\"CompSci\") is " + result);

    }

    }

    /* Output

    The result of a == b is true

    The result of c == d is false

    The result of c.equals(d) is true

    The result of c.equals("CompSci") is true

    */

    Listing 33-1

    Comparing strings

    ```


    ## Dealing with Errors


    When you introduce input from users, they won’t always provide input that is going
    to work for your program. When that happens, you need a way to have the program
    recognize that something is wrong and address it, without completely crashing.
    When a program encounters an error, it “throws” it. You can then “catch” the error
    and do something with it, usually to provide some feedback for the user to know
    what they did wrong.


    ### Coding to Catch Errors


    To start, you need to wrap the code you think could cause an error. Begin with
    the `try` statement and create a code block, putting your code inside of it:


    ```

    try {

    // your code goes here

    }

    ```


    Then, when your code runs, if it encounters an error, it is “thrown” as an exception.
    An exception is another name for an error. But instead of the program crashing,
    it will look for a `catch` clause to “catch” the exception. Start with the `catch`
    statement and another code block. After the `catch` statement, you need to indicate
    which type of exception it is looking to catch. The generic type is simply called
    `Exception`. Like a method, you need to give it a name you can refer to in the
    code block:


    ```

    try {

    // your code goes here

    } catch (Exception e) {

    // this code will run if an exception is caught

    }

    ```


    In the `catch` code block, you can then do things if an exception is thrown. For
    example, you can take the exception and display it on the screen as a string:


    ```

    try {

    // your code goes here

    } catch (Exception e) {

    String error = e.toString();

    System.out.println(error);

    }

    ```


    ### “Catching” Specific Errors


    You can also catch specific types of exceptions using a chain of `catch` statements.
    When the exception type matches a `catch` statement, it runs the code in the `catch`
    code block and skips the rest of them. In this example, if the type of exception
    is an `InputMismatchException`, the first catch block runs, but the second is
    skipped. When you add in the code for the specific type of exception, the IDE
    will automatically import it at the top of your code so you can work with it.


    ```

    // at the top of the code

    import java.util.InputMismatchException;

    try {

    // your code goes here

    } catch (InputMismatchException e) {

    System.out.println("You input the wrong type.");

    } catch (Exception e) {

    String error = e.toString();

    System.out.println(error);

    }

    ```


    If you want to run something every time after a `try` block, regardless if an
    exception is thrown and caught, you can add a `finally` code block at the end
    that will run after a `catch` code block runs.


    ```

    try {

    // your code goes here

    } catch (InputMismatchException e) {

    System.out.println("You input the wrong type.");

    } catch (Exception e) {

    String error = e.toString();

    System.out.println(error);

    } finally {

    System.out.println("Thank you!");

    }

    ```


    ### Code Examples


    The next page shows examples of capturing input from the user. This code is also
    available in the following GitHub repo:'
