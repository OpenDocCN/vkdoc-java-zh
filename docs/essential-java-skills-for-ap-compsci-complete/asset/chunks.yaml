    51. 使用 for…each 循环


    当你有一个集合时，你拥有了一组东西。当你整理这些项目并需要遍历它们时，最终，无论有多少个项目，你仍然需要遍历所有项目。

    你看着这堆东西，拿起一个，对它进行操作，然后继续处理下一项。你关心它是第几个吗？不关心。你关心总共有多少个吗？也许关心，但你知道你只需要全部遍历一遍。

    当你确切知道需要处理多少个项目时，for 循环是一种很好的循环方式。使用 `ArrayList` 的 `size()` 方法或数组的 `length` 属性，你可以知道需要处理多少个项目，然后可以逐个按数字顺序遍历它们。

    但还有另一种方法，而且简单得多，你不需要同时跟踪那么多事情。


    for…each 循环的机制

    `for...each` 循环在名称上相似，但结构不同。可以这样理解。你有一堆需要折叠的衬衫。这堆衣服叫做 laundry。当你需要折叠一件衬衫时，你找到一件衬衫，它就在你手中。它在这堆
    laundry 中是哪一件并不重要，但你知道它是一件衬衫，你称它为 foldMe。

    你按自己的方式折叠衬衫，就像你折叠所有衬衫那样，然后把它放好。然后你回到 laundry 堆，再拿另一件衬衫，这次是另一件不同的衬衫，但你仍然称它为 foldMe，因为你正在遍历所有衬衫，并且在循环遍历它们时，你需要给它一个名字。

    for…each 循环类似于 for 循环，但在处理对象集合的方式上有所不同。可以把它想象成一堆 laundry。使用 for 循环，这堆 laundry
    需要被整理好，这样每件衬衫、袜子和裤子都有特定的顺序。然后你逐个处理它们，执行一个操作，比如折叠它们，然后遍历所有衣物。

    但说到 laundry，处理顺序其实并不重要。你只需要折叠所有衣服。将它们排列成特定顺序并没有特别的价值。这就是 for…each 循环的不同之处。在前面的例子中，for…each
    循环看着这堆 laundry。它不要求物品按顺序排列；它只是从堆中拿起一个物品，当它在你手中时，你可以执行一个特定任务，比如折叠它，然后回到堆中再拿另一个。它会一直这样做，直到堆中的物品被取完。在这种情况下，哪个是第一个或最后一个并不重要。


    这就是 for…each 循环的机制


    如果我们有一个 `Strings` 集合，我们可以使用 `for...each` 循环来遍历它们。让我们从一个新的名字集合开始：


    ```

    ArrayList names = new ArrayList();

    names.add("Doug");

    names.add("Mike");

    ```


    这个集合包含两个名字，都以 `Strings` 形式存储。然后我们可以创建 `for...each` 循环来遍历集合中的每个项目：


    ```

    for (String name : names) {

    System.out.println(name);

    }

    ```

