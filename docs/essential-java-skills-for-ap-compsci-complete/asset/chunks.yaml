    When you place a reference to a method within itself, you can cause an infinite
    recursion. Recursion means that you are finding a solution to a problem by solving
    smaller instances of the same problem. We will learn more about recursion later
    in this course, but recursion always requires a way for the solution to end.


    ```

    public static void infiniteMethod() {

    System.out.println("This goes on forever!");

    infiniteMethod();

    }

