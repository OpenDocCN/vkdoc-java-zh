- fmt: 'When you look at this, read it this way: for each `String` in the collection
    `names`, perform these actions, referring to the current item as `name`. Reading
    it this way, the section inside of the parentheses makes sense. You define the
    type of value you will be looping through in the collection. This is important
    so your program knows how to deal with different value types since integers, decimals,
    strings, and other types have different properties and methods. The colon is new
    and means that we are working with an item inside a collection. The colon defines
    which is the item and which is the collection. Item on the left, collection on
    the right.


    Then, for the loop body, we refer to the item we are using from the collection
    by the name we defined at the top. In this case, by the identifier `name`. We
    can then work with that object just like any other value of that value type, and
    if we change or update that value using the identifier, the change happens to
    the object in the collection, even after the loop is finished.


    Often, you will work with data that has been formatted or analyzed before you
    use it in your program. One of the common ways to send and transmit information
    is using a delimited list. In the preceding example, the program outputs each
    name on a different line.


    ## ArrayLists Without Generics


    One of the most flexible parts of `ArrayList`s is that they don’t have to be typed.
    Each collection can contain a variety of different types. So, with a `for...each`
    loop, how do you go through them?


    We have to remember that an untyped `ArrayList` is still typed, but it is typed
    with the most basic item in Java: the `Object` class. Using the `Object` class
    type, we can loop through all the items in the collection:


    ```

    ArrayList values = new ArrayList();

    values.add(5);

    values.add(3.14159);

    values.add(''a'');

    values.add("Hello!");

    for (Object item : values) {

    System.out.println(item);

    }

    ```


    In this example, the collection `values` have all kinds of different types, but
    because we create our `for...each` loop using the `Object` type, we can still
    work with each one, but only as `Object` instances.


    ## Yep, Arrays Work Too


    Using the `for...each` loop doesn’t just stop with `ArrayList` collections, you
    can also use them with regular arrays. Just type the loop to the array type, and
    you can work with all the items using a more concise format:


    ```

    int[] nums = new int[] {1,2,3,4,5,6};

    for (int a : nums) {

    a *= a;

    System.out.println(a);

    }

    ```


    Again, the most flexible part of the `for...each` loop is that you don’t need
    to worry about how many items are in the collection or set, or work with each
    item by number, so if you are going through all of the items in a set, the `for...each`
    loop is a great option.


    ## Code Examples


    This code is also available on GitHub at the following location:


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```

    import java.util.ArrayList;

    public class Main {

    public static void main(String[] args) {

    ArrayList names = new ArrayList();

    names.add("Doug");

    names.add("Mike");

    for (String name : names) {

    System.out.println(name);

    }

    ArrayList values = new ArrayList();

    values.add(5);

    values.add(3.14159);

    values.add(''a'');

    values.add("Hello!");

    for (Object item : values) {

    System.out.println(item);

    }

    int[] nums = new int[] {1,2,3,4,5,6};

    for (int a : nums) {

    a *= a;

    System.out.println(a);

    }

    }

    }

    /* Output

    Doug

    Mike


    3.14159

    a

    Hello!


