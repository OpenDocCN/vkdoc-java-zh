    public class Main {

    public static void main(String[] args) {

    // 基本的 if 示例

    if (true) {

    // 这里的代码将始终运行

    }

    if (false) {

    // 这里的代码永远不会运行

    }

    // 基本的 if...else 示例

    if (true) {

    // 这里的代码将始终运行

    } else {

    // 这里的代码永远不会运行

    }

    if (false) {

    // 这里的代码永远不会运行

    } else {

    // 这里的代码将始终运行

    }

    // 基本的 if, else if, else 示例

    int a = 5;

    if (a == 5) {

    // 如果条件为 true，则运行此代码

    // 然后整个 if/else if/else 块结束

    } else if (a == 4) {

    // 如果第二个条件为 true，则运行此代码

    // 然后整个 if/else if/else 块的其余部分结束

    } else {

    // 如果前面的条件都不为 true，则运行此代码

    }

