    创建类层次结构

    在上一轮迭代中，我们探讨了玩家角色（即 PC）如何通过类来定义。该类为每个可创建的类实例提供了蓝图。但当我们并排观察多个类时，会发现它们之间存在一些共同点。


    例如，观察所有这些类，我们可以提取出所有共同元素。这些元素包括：名称；力量、智力和敏捷属性；以及最大和当前生命值与法力值。需要特别指出的是，这些元素在所有类中的存在是一致的。但定义最小值的规则和计算方式并不相同——唯一相同的是它们都存在。


    然而，尽管这些元素在每个玩家类中都是一致的，但如果我们改变角色扮演游戏的规则，比如增加一个通用组件（如经验值或角色等级），我们就需要将其添加到每个玩家类中并更新每个角色表。


    相反，我们可以提取所有通用元素，创建一个仅包含这些元素的玩家角色表，但不包含构建玩家角色实例的规则。然后，对于每个独特的类，我们可以扩展或构建于这个基础蓝图之上，添加控制每个类的独特规则，以及属于这些特定类的独特属性。


    这被称为类层次结构。我们有一个通用的玩家角色类，然后添加或扩展该类，加入所有属于我们构建的类的独特元素。你可以通过创建一个包含通用玩家类通用元素的表格来形象化这个过程。然后，使用透明胶片在纸张上添加独特元素，逐步构建出类。


    底层的纸张被称为超类。它具有更高的层次结构。扩展超类的透明胶片被称为子类。你可以像组织结构图一样展示它们，显示哪些子类从超类扩展而来。


    观察我们的五个玩家，我们有一组项目或对象。但集合中所有项目的共同点是什么？它们都是同一个超类（通用玩家类）的子类实例。因此，可以说该集合中的所有项目都必须是通用玩家角色类的子类实例。


    但我们遇到了一个问题。现在我们有一个无法用作角色实例的玩家角色表。我们不能直接使用通用玩家角色。它没有任何定义如何创建的规则，因此毫无用处。在这种情况下，我们希望该类仅作为超类被扩展，而不希望创建该类的实例。为此，我们将此类称为抽象类。抽象类不能被实例化，因为它们毫无用处。


    组队——全都相同——却又各不相同


    有了四个不同类的五个实例，我们就可以开始玩角色扮演游戏了。但游戏要求我们组成一个三人队伍，作为游戏中的活跃玩家。玩家可以替换队伍中的三人之一，但只有队伍中的玩家才能在游戏中活跃。


    队伍的规则规定，我们需要一个坦克（即设计用于承受大量伤害并使用近战攻击的角色）、一个远程（即进行远程攻击的角色）和一个治疗者（即攻击力较弱但能治疗队伍中其他玩家的角色）。


    因此，为了将我们的玩家实例放在正确的位置，我们需要一种方法来描述它们。这些类别表明，某个类的实例包含特定的动作或值，这些动作或值相同，使得该类成为该类别的实现者，并且它包含属于该类别的所有动作。


    该类别被称为接口，它定义了一组独特的要求，类必须符合这些要求才能实现该接口，并且实例可以在需要特定接口的情况下使用。


    一个类可以实现一个或多个接口，例如圣骑士类。它实现了两个接口：坦克和治疗者。因此，任何圣骑士类的实例都可以被放置在三人队伍中的坦克或治疗者位置。


    但这里有一点很重要。对于队伍中的治疗者或坦克位置，它们要求的是类别或接口，而不是特定的类类型。因此，多个类都可以放入该位置——只需实现所需的接口即可。这被称为多态性，我们使用接口来支持完全不同的类，并将位置限制为接口，而不是特定的类。


    必备工具：骰子


    还有一件事我们一直在使用但尚未明确指出。骰子用于帮助构建我们的角色。需要骰子来确定玩家角色实例每个属性的值。


    但我们不需要创建骰子的实例；我们只需要使用它。我们只想拿起骰子并投掷它。我们将投掷骰子的这个动作称为静态动作。我们不需要为了投掷骰子而创建它的独特实例。我们只需直接投掷即可。


    类层次结构、多态性、抽象和静态


    基于类、实例化和构造这些基本的面向对象编程概念，我们可以增加更多的结构和灵活性。我们可以定义类，甚至定义那些无法创建实例的类，作为超类供其他子类扩展并继承原始类的蓝图。我们还可以使用接口对类进行分类，并利用多态性基于接口而非类来限制对象。最后，我们可以创建具有静态动作的类，这些动作无需创建类的实例即可调用。


    接下来，我们将收起纸笔，深入探讨如何在 Java 中实现这些概念，重新构建我们的角色扮演游戏示例，但这次是用代码实现。


    54. 让所有事物……都成为类


    现在我们有了基本的角色类和角色表，我们可以开始学习如何在 Java 中将这些创建为面向对象的类。


    Java 中的类定义了四个主要内容：


    1.  类的名称是什么，它如何适应层次结构，以及如何使用接口进行分类

    2.  在类的每个独特实例中存储和使用的值是什么

    3.  类的每个独特实例可以执行的动作是什么

    4.  在构造过程中，每个独特实例的创建规则是什么

    '
- fmt: '# Creating Some Class


    We can start with the first, naming the class. In Java, we do that using the term
    `class` statement. Each unique class is typically stored as a specific file, generally
    with the same name as the class. If we look at our mage character sheet, this
    gives us a good reference to use as we create the class. In our IDE, we will need
    to create our project and then create a file for the class. This file would be
    called `Mage.java`.


    When we create the file, we then need to populate the class name and then use
    the `class` statement. A code block, using braces, then surrounds the code that
    defines the blueprint for our class:


    ```

    public class Mage {

    }

    ```


    We start with the `public` clause, since we want the class to be available within
    the program to use and create instances—we will cover more about the `public`
    clause in a bit. Then we follow with the `class` clause, and then the name of
    the class. Classes are usually capitalized, and each word is capitalized with
    no spaces. This is generally referred to as Pascal case.


    Now that we have defined the basics of the class, we can start adding properties,
    or fields as they are sometimes called, to the class. These are essentially variables
    that will be unique for each instance of the class. Just like any other variable
    in Java, we need to type them to a primitive or class type and then give them
    a valid variable name. We define these at the top of our class, within the class
    code block. If we look at our character sheet, we have nine items we need to add
    to our `Mage` class. These include the name of the character, the skill attributes,
    and the expendable assets for health and magic, remembering that health and magic
    each are two individual values, the maximum possible value and the current value
    for the instance.


    To define these, we need to declare their access level, which in this case would
    be `public`. If you have worked previously with basic Java apps without classes,
    you might have had to use `public static`. For this class, we only need to use
    `public`:


    ```

    public class Mage {

    // Name

    public String name;

    // Skill attributes

    public int strength;

    public int intelligence;

    public int agility;

    public int wisdom;

    // Health and magic

    public int maxHitPoints;

    public int hitPoints;

    public int maxMana;

    public int mana;

    }

    ```


    Now, for each instance of our class, we will have nine unique fields that we can
    use and store values. These are unique and exclusive to each instance, but each
    instance will have all nine of these fields.


    Now, we need to tell our class how to build each instance or construct each instance.
    We do that with a special method called the constructor. The constructor method
    is the same name as the class and has a code block to contain all of the rules
    for how we construct each instance, just like a regular method. The constructor
    is usually placed after the fields have been defined at the top of the class:


    ```

    public class Mage {

    // Name

    public String name;

    // Skill attributes

    public int strength;

    public int intelligence;

    public int agility;

    public int wisdom;

    // Health and magic

    public int maxHitPoints;

    public int hitPoints;

    public int maxMana;

    public int mana;

    Mage() {

    // Constructor

    }

    }

    ```


    Inside the constructor, we can then create the specific rules for how we create
    each class instance. For example, the skill attributes are calculated based on
    a specific number and the value of a six-sided die. The hit points and mana are
    calculated based on the values of the skill attributes. If code in your class
    or constructor needs to work with classes outside of a basic program, you can
    include them in the project using the `import` statement at the top, just like
    with any other program. This program doesn’t require it, but it is managed the
    same as we have seen before:


    ```

    public class Mage {

    // Name

    public String name;

    // Skill attributes

    public int strength;

    public int intelligence;

    public int agility;

    public int wisdom;

    // Health and magic

    public int maxHitPoints;

    public int hitPoints;

    public int maxMana;

    public int mana;

    Mage() {

    // Constructor

    strength = 7;

    intelligence = 15;

    agility = 8;

    wisdom = 10;

    strength += (int) (Math.random() * 6 + 1);

    intelligence += (int) (Math.random() * 6 + 1);

    agility += (int) (Math.random() * 6 + 1);

    wisdom += (int) (Math.random() * 6 + 1);

    maxHitPoints = hitPoints = strength;

    maxMana = mana = intelligence + (wisdom * 2);

    }

    }

    ```


    The last item we need to populate is the name. The name is something that we need
    to get more information on in order to create it. To do that, we can require that
    each time you create a mage, you need to provide a name, then that name is saved
    in the `name` field for the class instance. We can pass in a value into the constructor
    just like any Java method:


    ```

    public class Mage {

    // Name

    public String name;

    // Skill attributes

    public int strength;

    public int intelligence;

    public int agility;

    public int wisdom;

    // Health and magic

    public int maxHitPoints;

    public int hitPoints;

    public int maxMana;

    public int mana;

    Mage(String newName) {

    // Constructor

    name = newName;

    strength = 7;

    intelligence = 15;

    agility = 8;

    wisdom = 10;

    strength += (int) (Math.random() * 6 + 1);

    intelligence += (int) (Math.random() * 6 + 1);

    agility += (int) (Math.random() * 6 + 1);

    wisdom += (int) (Math.random() * 6 + 1);

    maxHitPoints = hitPoints = strength;

    maxMana = mana = intelligence + (wisdom * 2);

    }

    }

    ```


    Finally, we need our mage to be able to do something. We can create a method that
    will display the stats of our mage, so we can see the attributes and health information
    for our instance. We would create that as a regular method, providing a return
    type (which in this case is `void`), and then wrap everything in a code block.
    We can then refer to the values, or fields, in our class by their variable names:


    ```

    public class Mage {

    // Name

    public String name;

    // Skill attributes

    public int strength;

    public int intelligence;

    public int agility;

    public int wisdom;

    // Health and magic

    public int maxHitPoints;

    public int hitPoints;

    public int maxMana;

    public int mana;

    Mage(String newName) {

    // Constructor

    name = newName;

    strength = 7;

    intelligence = 15;

    agility = 8;

    wisdom = 10;

    strength += (int) (Math.random() * 6 + 1);

    intelligence += (int) (Math.random() * 6 + 1);

    agility += (int) (Math.random() * 6 + 1);

    wisdom += (int) (Math.random() * 6 + 1);

    maxHitPoints = hitPoints = strength;

    maxMana = mana = intelligence + (wisdom * 2);

    }

    public void showStats() {

    System.out.println("””””””””””””””””””””””””””””””””””");

    System.out.println(name + ", a mage:");

    System.out.println("    Strength: " + strength);

    System.out.println("Intelligence: " + intelligence);

    System.out.println("     Agility: " + agility);

    System.out.println("      Wisdom: " + wisdom);

    System.out.println("  Hit Points: " + hitPoints + " / " + maxHitPoints);

    System.out.println("        Mana: " + mana + " / " + maxMana);

    System.out.println();

    }

    }

    ```


    We now have a complete class. We have defined the class name, identified the fields
    in the class, specified the rules that govern how each class instance is created,
    and have given the class an action to perform.


    # Instantiate Thyself, Class!


    To create an instance of our class, we need to then go back to where our `main()`
    method is in our program. In the past, we have always used the `main()` method
    to start our program, and generally in Java, the `main()` method is the consistent
    starting point for every program.


    In another class file, in this case, I called mine `Main.java`, I have a standard
    `main()` method that will start the program. You’ll notice this is not capitalized
    like the class name. This is unique to the `main()` method:


    ```

    public class Main {

    public static void main(String[] args) {

    }

    }

    ```'
