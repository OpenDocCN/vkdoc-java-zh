    # 26. Methods and Values


    Methods serve as engines that can process things for you and give you results
    that you can work with. Like any engine, you need to provide it something to work
    with. Methods provide input and output capabilities. Input values are defined
    in the method definition, and output values are sent out using the `return` statement.


    ## Accepting Values in Methods


    A method can accept values to use within the method. To define a method to accept
    values, you need to state what type the values coming into it are and what variable
    name is used for the values in the method.


    ```

    public static void average(float val1, float val2, float val3)

    {

    float avg = val1 + val2 + val3;

    avg = avg / 3;

    System.out.println(avg);

    }

    Listing 26-1

    Accepting values in methods

    ```


    In this example, the `average()` method is expecting three values, each of which
    is defined as a `float`.


    To call this method, you would pass in the values in the method call:


    ```

    average(10,15,12);

    ```


    The flow of the program then goes into the `average()` method and pulls in the
    values that are passed in. The variables defined in the method definition are
    then used to temporarily store the values of the passed in values until the method
    is finished. The variables are then discarded at that point.


    ## Returning a Value


    A method can also return a value from where it was originally called. This will
    take the functional call statement and replace it with the value that is returned
    from the method when it is completed.


    To create a method with a returned value, you need to define the return value
    type and then use the `return` statement and send the value you want to return
    from the method.


    ```

    public static float avgValue(float val1, float val2, float val3)

    {

    float avg = val1 + val2 + val3;

    avg = avg / 3;

    return avg;

    }

    Listing 26-2

    Returning a value

    ```


    In this case, the method doesn''t display anything, but it returns a value after
    processing it. The returned value essentially replaces the method call itself
    in the original code, and you can place it wherever you can supply a variable
    or literal. It just needs to match the expected type which is defined by the return
    type in the method definition.


    ## Overloading a Method


    If you have multiple numbers of values you need to accept, but need to use the
    same method name, you can overload it by providing multiple definitions for the
    same method name with different incoming value types or number of incoming value
    types.


    ```

    public static float avgValue(float val1, float val2, float val3)

    {

    float avg = val1 + val2 + val3;

    avg = avg / 3;

    return avg;

    }

    public static float avgValue(float val1, float val2)

    {

    float avg = val1 + val2;

    avg = avg / 2;

    return avg;

    }

    Listing 26-3

    Overloading a method

    ```


    In this case, if I executed


    ```

    System.out.println(avgValue(10,15,12));

    ```


    the first method would run, since it accepts three values.


    If I executed


    ```

    System.out.println(avgValue(10,15));

    ```


    the second method would run.


    You can overload methods with different quantities of method parameters or with
    different value types of parameters to accommodate multiple types of values. Your
    value types don''t need to be the same, and the incoming and outgoing value types
    can be different.


    ```

    public static float intDiv(int val1, int val2)

    {

    float quot = (float)val1 / (float)val2;

    return quot;

    }

    Listing 26-4

    Different parameter and return types

    ```


