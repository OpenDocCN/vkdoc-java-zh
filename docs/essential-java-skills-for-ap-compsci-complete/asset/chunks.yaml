- fmt: 'Often, you will work with data that has been formatted or analyzed before
    you use it in your program. One of the common ways to send and transmit information
    is using a delimited list. A delimited list is a simple list of items that are
    separated by a delimiter. This could be a comma, a pipe (or vertical bar), a semicolon,
    tab, space, or any character that you see fit. In Java, you can work with delimited
    lists that are stored as `Strings` and then parse them into `Arrays` using the
    `split()` method.


    ## Delimited Strings


    To start, you need to have a string that contains a delimited list. The delimiter
    needs to be the same throughout the string and needs to be unique and only used
    as a delimiter. Here is an example:


    ```

    String list = "Doug,Mike,Janet,Matt,Tim,Doris";

    ```


    This string will work because the comma is the delimiter. This list contains six
    unique items that are names, but are stored in a string, with the comma indicating
    when one item ends and another begins.


    We might have an issue though if the string looked like this:


    ```

    String list = "Doug, Mike, Janet, Matt, Tim, Doris";

    ```


    The difference is subtle, but between the names isn’t only a comma, but a comma
    and a space. If we break these up into multiple items based on the comma, we would
    have five items that would have a space before them.


    ## Splitting It Up


    To create an array using a delimited list, we need to use the `split()` method
    and provide the delimiter that is used in the string. The result will be a string-typed
    array containing all the items in the string within unique elements:


    ```

    String list = "Doug,Mike,Janet,Matt,Tim,Doris";

    String[] names = list.split(",");

    ```


    When this code runs, the string with the names will be parsed using the `split()`
    method and will split it whenever it finds a comma. The collection of split strings
    is then sequentially added to the string-typed array `names`. The original list
    remains unchanged.


    We can then display the individual names using element index numbers or loop through
    the collection to see all the values that were parsed:


    ```

    System.out.printf("List: %s\n\n", list);

    System.out.printf("Item 2: %s\n\n",names[2]);

    for (var i = 0; i < names.length; i++)

    System.out.printf("Name %d: %s\n",i,names[i]);

    ```


    The preceding code will display the original list, a single item from the new
    array that was created, and then loop through and display all the names in the
    list:


    ```

    List: Doug,Mike,Janet,Matt,Tim,Doris

    Item 2: Janet

    Name 0: Doug

    Name 1: Mike

    Name 2: Janet

    Name 3: Matt

    Name 4: Tim

    Name 5: Doris

    ```


    ## What About Numbers?


    This works great with strings, but if we have numbers, what do we do? We need
    to create the array of strings first and then create a new array and convert those
    values to numbers.


    ```

    String nums = "3,6,9,12,15,18,21";

    String strValues[] = nums.split(",");

    int[] values = new int[strValues.length];

    for (int i = 0; i < strValues.length; i++)

    values[i] = Integer.parseInt(strValues[i]);

    ```


    Here, we have a string of integers, separated by commas. When we split these,
    the values are still strings, so we need to store them in a string-typed array.
    Then, an empty integer-typed array is created with the same number of elements
    as the string-typed array. A `for` loop then loops through the string-typed array
    and parses each element string value into an integer and assigns it to the same
    element in the integer-typed array.


    When this is finished, we now have a new integer array with the parsed values
    inside. We can display them using a `for` loop:


    ```

    for (int i = 0; i < values.length; i++)

    System.out.printf("Value %d: %d\n",i,values[i]);

    ```


    This will loop through all the values of the integer array, and we can work with
    them as integers in our program. The output for this is as follows:


    ```

    Value 0: 3

    Value 1: 6

    Value 2: 9

    Value 3: 12

    Value 4: 15

    Value 5: 18

    Value 6: 21

    ```


    ## Code Examples


    This code is also available on GitHub at the following location:


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```

    public class Main {

    public static void main(String[] args) {

    // Splitting a delimited string into an array

    String list = "Doug,Mike,Janet,Matt,Tim,Doris";

    String[] names = list.split(",");

    System.out.printf("List: %s\n\n", list);

    System.out.printf("Item 2: %s\n\n",names[2]);

    for (var i = 0; i < names.length; i++)

    System.out.printf("Name %d: %s\n",i,names[i]);

    // Splitting a delimited string into an integer array

    String nums = "3,6,9,12,15,18,21";

    String strValues[] = nums.split(",");

    int[] values = new int[strValues.length];

    for (int i = 0; i < strValues.length; i++)

    values[i] = Integer.parseInt(strValues[i]);

    for (int i = 0; i < values.length; i++)

    System.out.printf("Value %d: %d\n",i,values[i]);

    }

    }

