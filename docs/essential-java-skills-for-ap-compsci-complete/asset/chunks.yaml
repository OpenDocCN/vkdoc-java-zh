- fmt: '# Upload Your Code to GitHub


    Now that you have your repo created, you can upload your code and keep it online
    to share and track changes and versions.


    First, make sure you are at the main landing page for your repo. On this page,
    click the **Upload files** button.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig16_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig16_HTML.jpg)


    Figure 8-16


    Upload files button


    Now, you can drag and drop files to the area on the page, or click the **Choose
    your files** link and browse using the Explorer or Finder dialog box.


    One trick to find your code file is to go back to IntelliJ.


    From there, go to your Project panel and right-click the code file you want to
    upload. Select the **Show in Explorer** or **Show in Finder** option.


