  trans: '

    ## Java 的起源


    Java 始于 Sun Microsystems 公司，并于 1995 年首次向公众发布。该语言的开发始于 1991 年，由 James Gosling、Mike
    Sheridan 和 Patrick Naughton 主导，其设计目标是与 C 和 C++ 相似，以帮助开发者将他们现有的编程技能应用于这门新语言。Sun
    Microsystems 于 2009 年被 Oracle 收购。


    在开发过程中，Java 最初被称为 Oak，后更名为 Green，最终以 Java 咖啡的名字发布为 Java，这也是为什么 Java 的 logo 是一个冒着热气的咖啡杯。


    *一次编写，到处运行*


    在发布时，它承诺“一次编写，到处运行”，这意味着你用 Java 创建的程序只需编码一次，就可以在任何支持 Java 的平台上运行。


    ## Java 的主要目标


    从一开始，创建 Java 语言就有五个主要目标：


    1.  它必须“简单、面向对象且熟悉”。

    2.  它必须“健壮且安全”。

    3.  它必须“架构中立且可移植”。

    4.  它必须具有“高性能”的执行能力。

    5.  它必须是“解释型、多线程且动态的”。


    如今，Java 是使用最广泛的语言之一。Java 在 Web 应用程序、使用 JavaFX 等技术的企业桌面应用程序以及 Android 生态系统中的大量应用，使其成为一门值得学习的优秀语言，并且拥有多种灵活的使用方式。


    ## Java 的用途


    自 Java 首次发布以来，它已为电子商务、金融及其他行业的许多大型 Web 应用程序提供了强大支持。Java 应用程序构建在服务器端，并连接到 Web 服务器以处理应用程序的业务逻辑。


    Java 也是 Android 的核心语言，使用 Google 的 Android Studio 工具创建的原生应用程序都是用 Java 语言构建的。此外，你还会发现
    Java 嵌入在许多设备中，例如电视和其他消费电子产品。


    基于 Java 编程语言已经创建了许多框架，以加速跨多个平台和设备的应用程序开发。


    对于 Web 应用程序，Struts、JSF、Grails、Spring 等框架可以单独使用或相互组合，以提供可支持数百万用户的可扩展 Web 应用程序。


    对于桌面应用程序，JavaFX 等框架允许开发者使用 FXML（一种基于 XML 的标记语言）创建用户界面，并将其与 Java 代码融合。


    对于移动端，Google 的 Android SDK 包含一个用于开发 Android 应用程序的工具，以及一个用于在虚拟设备上部署和运行应用程序以进行测试的模拟器。


    作为开发者，有许多可用的编码工具供你用于 Java。集成开发环境（IDE）有助于整合你需要执行的许多任务，如编码、代码管理、调试、处理代码仓库以及创建文档。一些比较流行的
    IDE 有 IntelliJ IDEA、Eclipse 和 NetBeans。本课程将使用的是 IntelliJ 的 IDE。


    Java 为你作为开发者打开了几乎无限的机会，最棒的是，一旦你掌握了基础知识，Java 并不难学或理解。利用你新掌握的 Java 技能，你几乎可以为任何东西构建应用程序。


    # 6. Java 的工作原理


    Java 是一种独特的编程语言，这得益于其最初愿景中的“一次编写，到处运行”的口号。理解它如何实现这一愿景，对于理解你作为程序员的工作方式至关重要。


    ## 编译型语言的问题


    编译型编程语言通常有一个很大的局限性。当你将代码转换为可执行程序时，编译器会读取代码并创建一个特定于处理器架构的二进制文件。


    因此，如果我在我的 32 位 Windows PC 上使用 C 或 C++ 这样的语言编译一个程序，该程序无法在 Mac 上运行，也无法在没有额外技术桥接的情况下在
    64 位 Windows PC 上原生运行。它只能在 32 位 Windows PC 上运行。


    每个处理器和操作系统都期望程序满足极其特定的要求。程序访问硬件的方式在 Intel 处理器、基于 ARM 的处理器（如手机和平板电脑中的处理器）以及其他处理器类型（如
    RISC 架构）之间差异巨大。（较旧的 Mac 使用这种架构，采用称为 PowerPC 的芯片，如 G5 或 G4。）


    即使是 32 位 Intel 处理器和 64 位 Intel 处理器的运行方式也完全不同。因此，64 位程序无法在 32 位计算机上运行，而 32 位程序也无法在没有额外软件使其兼容的情况下在
    64 位计算机上原生运行。


    当你扩展到其他类型的计算机（如服务器）时，处理器类型和架构的数量可能会变得更加复杂。


    在过去的几十年里，Web 和应用服务器可能使用截然不同的架构类型，如 Sparc、Xeon、Itanium 等。


    因此，Sun Microsystems 的人员在设计 Java 时，希望克服这一限制，于是他们创建了一种创新的方法来解决这个问题。


    ## JVM 和 JRE


    当你运行一个 Java 程序时，你不仅仅是在运行这个程序，你同时还在运行其他几个东西。


    针对多个平台，Oracle 创建了一套名为 Java 运行时环境（JRE）和 Java 虚拟机（JVM）的技术。这些技术的构建是为了让包括 Intel、ARM、64
    位、32 位等在内的特定硬件架构能够运行 Java 程序。


    这些运行时环境安装在系统上并常驻内存，等待 Java 程序被执行。


    当调用运行一个 Java 程序时，Java 运行时环境（JRE）会启动并打开编译后的程序。然后，运行时环境会捕获程序的指令，并将其转换为计算机上的原生执行指令。


    ![../images/499634_1_En_6_Chapter/499634_1_En_6_Figa_HTML.png](img/499634_1_En_6_Figa_HTML.png)


    这就是 Java 如此通用的原因。只要 Oracle 创建了 JRE 的地方，你就可以运行 Java 程序。


    ## 编译 Java 字节码


    当你创建 Java 程序时，在创建代码（称为源代码或源文件）的过程中，有几个环节在起作用。


    ![../images/499634_1_En_6_Chapter/499634_1_En_6_Figb_HTML.png](img/499634_1_En_6_Figb_HTML.png)


    首先，当你创建程序时，你是在编写一个纯文本文件。其中除了字母和数字之外，没有任何格式、特殊字符、图形或其他内容。当你将此文件保存到计算机时，它是一个 `.java`
    文件，意味着文件扩展名是 `.java`。


    当你完成程序编码后，你将文件发送给编译器。编译器读取你创建的指令，并将其转换为 Java 字节码，JRE 可以读取和理解这种字节码。Java 字节码（有时称为
    JBC）是一个简洁且压缩的文件，人类不可读，但设计目的是让 JRE 能够快速理解和执行。


    然后，JRE 获取这些字节码指令，并将其发送到原生硬件，以在机器上执行程序。


    当你编译程序时，你创建了这些 Java 字节码文件，称为 `.class` 文件，它们将在 JRE 中针对该架构的原生硬件运行。

