    ## 50. Looping with `ArrayList`s


    Using a `for` loop with an `ArrayList` is pretty straightforward, but you need
    to work with two particular methods of the `ArrayList` class in order to loop
    through all of the elements.


    ### Working with `size()` and `get()` Methods


    `ArrayList`s, unlike arrays, use methods of the class instead of properties and
    bracket notation. When we work with an array, to get the size, we use the `length`
    property of the array. For `ArrayList` objects, we use the `size()` method, which
    returns an integer containing the number of items that are in the collection:


    ```java

    ArrayList values = new ArrayList();

    values.add(5);

    values.add(20);

    values.add(75);

    values.add(32);

    System.out.println(values.size()); // 4

    ```


    We can use the `size()` method to create the condition that controls how we loop
    through the collection.


    With arrays, we have used bracket notation to access elements within the set;
    however, we don’t have that option with the `ArrayList`. Instead, we need to work
    with the `get()` method and provide an integer to get a specific item from the
    set at that index number. With both of these methods, we can create our `for`
    loop to go through the items stored in the `values` collection from before:


    ```java

    for (int i = 0; i < values.size(); i++) {

    System.out.printf("Value: %d\n",values.get(i));

    }

    ```


    With both of these methods, we can now loop through the items using the `for`
    loop.


