    # Introducing Generics


    The flexibility of `ArrayLists` over arrays makes it an attractive option for
    creating collections, but there are instances where the lack of type restrictions
    in a collection could be a problem. For instance, if you were working with a set
    of integer numbers, the fact that you can''t prevent a string from entering the
    collection could make your code unintentionally complex and lead to bugs. In addition,
    because everything is typed as a generic `Object` class, you need to cast or parse
    everything in order to work with it:


    ```

    ArrayList values = new ArrayList();

    values.add(1);

    values.add(2);

    values.add("3"); // Perfectly legal, but undesired

    values.add(4);

    System.out.println(values);

    int x = ((int) values.get(2)) / 2; // Because get(2) returns an Object

    ```


    Instead, you can use the concept of generics, which can restrict an `ArrayList`
    instance to only contain certain types and provide a way for you to build strict
    typing to your collections and combine typing with the flexibility of the `ArrayList`.


    ## Create an ArrayList with Generics


    Generics are defined by identifying the type you want to work with and wrapping
    them in pointed brackets. Then you append these to the end of the `ArrayList`
    class definition when you create and initialize your `ArrayList` instance. Note
    that you need to use the full class name of the value type. You cannot use primitive
    types such as `int`, `boolean`, `double`, etc.:


    ```

    ArrayList<Integer> numbers = new ArrayList<Integer>();

    ```


    Now, when you add a type into the `ArrayList` using the `add()` method, you are
    restricted on the type you can put in:


    ```

    numbers.add(1);

    numbers.add(2);

    numbers.add("3"); // Generates an error

    numbers.add(4);

    ```


    You still need to cast or parse values however, because the methods of the class
    still return `Object` types:


    ```

    int y = ((int) values.get(2)) / 2;

    ```


    But, you are now at least confident that the values that are stored in the collection
    are restricted to a specific type.


    ## Typing Using Generics


    Typing using generics defined the base type of the object. So, just like you would
    do with an array, or any other type, you can use generics to type collections
    that are part of a method definition by setting the parameters or return type
    using an `ArrayList` with generics.


