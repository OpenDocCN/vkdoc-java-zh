    27. 方法与作用域


    变量作用域定义了程序中变量在何处存在，以便语句和其他变量可以访问它并进行操作。


    变量作用域错误


    变量的定义位置会影响哪些内容可以访问其中存储的值。这由变量的作用域定义。在以下代码中，`myMainValue` 无法从 `myMethod()` 访问，因为其作用域仅限于
    `main()`。


    ```

    public static void main(String[] args) {

    // 此变量仅存在于程序的 main() 方法中

    int myMainValue = 10;

    }

    public static void myMethod() {

    System.out.println(myMainValue);

    }

    清单 27-1

    变量超出作用域

