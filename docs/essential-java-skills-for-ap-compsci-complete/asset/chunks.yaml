    30. 使用 switch 语句匹配条件


    `switch` 语句是一种替代性的条件结构，它在一系列选项中查找匹配的 case，并为匹配的 case 语句执行一组代码。如果没有 case 与 `case`
    语句中定义的条件匹配，用户还可以定义一个默认 case（`default`）。与使用逻辑运算符来确定 true 或 false 结果不同，`switch`
    语句将一个特定的值（或返回值）与 case 列表进行比较。如果找到匹配项，则运行关联的代码。该段代码需要以 `break` 语句结尾，以结束该段代码的执行。


    创建 switch 语句代码块


    `switch` 语句将变量、表达式或返回值放在一对括号中。其后紧跟一个单独的代码块：


    ```

    switch (变量) {

    //

    }

    ```


    在代码块内部，使用 `case` 语句创建一个 case，后跟匹配的值，并以冒号结尾，然后是代码行。然后以 `break` 语句结束该段：


    ```

    switch (变量) {

    case 1:

    // 如果变量等于 1，则执行此代码

    break;

    }

    ```


    你可以为单段代码添加多个 `case` 语句：


    ```

    switch (变量) {

    case ''A'':

    case ''a'':

    // 如果变量等于 A 或 a，则执行此代码

    break;

    }

    ```


    在每个 case 的 break 语句之后，可以添加更多的 case：


    ```

    switch (变量) {

    case ''A'':

    case ''a'':

    // 如果变量等于 A 或 a，则执行此代码

    break;

    case ''B'':

    case ''b'':

    // 如果变量等于 B 或 b，则执行此代码

    break;

    }

    ```


    如果没有 case 匹配，你可以使用 `default` 语句来捕获任何与前面 case 不匹配的情况：


    ```

    switch (变量) {

    case ''A'':

    case ''a'':

    // 如果变量等于 A 或 a，则执行此代码

    break;

    case ''B'':

    case ''b'':

    // 如果变量等于 B 或 b，则执行此代码

    break;

    default:

    // 如果没有 case 匹配，则执行此代码

    break;

    }

    ```


    使用 switch 语句时需要注意的事项


    `switch` 语句的常见问题包括：


    *   忘记在与 `case` 语句关联的代码末尾添加 `break` 语句。

    *   在 `switch` 语句中放入逻辑运算符，使其评估为布尔值，而不是简单地包含你想要测试的变量。

    *   如果你需要从用户那里获取输入以进行选择（例如从选项菜单中），`switch` 语句是一个不错的选择。

