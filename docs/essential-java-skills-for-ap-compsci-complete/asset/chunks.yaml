    ## 预编译文件


    有时，你需要在程序中反复使用某些文件。这些通常是一些永远不会改变的代码段，但其中包含了你可以在自定义代码中执行和使用的预构建操作。


    维护这些文件的工作量可能很大，当你对这些代码进行改进时，你会希望找到一种方法，能够轻松地将这些改进应用到其他程序中。


    为了简化这一过程，Java 支持将预编译代码组合成 `.jar` 文件。JAR（Java 归档文件）是一个独立的模块，你可以将其引入任何程序，并像访问自己代码中的方法和操作一样访问其中的内容。


    如果你需要更新或更改 JAR 文件，只需更改该引用或覆盖程序指向的 JAR 文件即可完成更新。


    ## OpenJRE


    Java 是一种开源语言，这意味着社区可以构建、更改和改进该语言及其编译器。


    作为其中的一部分，Oracle 创建了 OpenJRE 和 OpenJDK，供社区构建和增强。然后，Oracle 可以将开源社区的贡献整合到官方的 Oracle
    Java JDK 和 JRE 中。


    Oracle 还会添加额外的安全和其他保护措施，以确保在其上运行的应用程序安全可靠。由于它是一个打包的平台，这种安全性适用于任何硬件、服务器或云基础设施。


    Android 在很大程度上是基于 Java 构建的，从 Android N（即 Android Nougat）开始，由于与 Oracle 的诉讼，Google
    转而使用 OpenJDK。


    最终，对你而言，运行哪个版本的 Java 并不重要。当你安装任何 JDK 和 JRE 时，源代码、编译文件和程序的执行方式本质上是相同的。


    # 7. 流程图绘制


    编程和编码既关乎坐在键盘前敲代码，也同样关乎思考和规划。通常，开发者需要在脑海中或纸上规划出程序将如何运行。这可以使编码过程变得容易得多，尤其是在与他人合作开发项目时。


    流程图是勾勒程序的一种常见方式。顾名思义，它是一种直观展示程序流程的图表。在流程图中，你将各种步骤、决策和操作连接成一个遵循程序运行流程的链条。


    由于计算机在处理你的操作和代码时非常字面化，流程图有助于你第一次就编写出更准确的代码，而不是在代码中反复调试和折腾。相信我，放弃流程图直接写代码的诱惑很大，但如果你是编程新手或相对较新，流程图将为你节省大量时间，并迫使你在坐到键盘前停下来、暂停并先勾勒出思路。


    ## 流程图绘制工具


    有许多流程图绘制工具可供使用；有些是纸笔，有些是在线的。


    ### 纸张


    就像作家在笔记本上写日记，设计师在速写本上画草图一样，开发者通常可以用纸笔来绘制流程图。有时，让事物变得有形和可触摸有助于放慢你的思维，让你对代码和程序更加深思熟虑。


    如果你想采用纸质方法，可以买一个模板来辅助工作。这有助于让事情变得更整洁。


    ### 平板电脑和触控笔


    如果你有支持触控笔的平板电脑或笔记本电脑，例如 iPad、Surface 或二合一笔记本电脑，有很多绘图应用可用于绘制流程图，包括 OneNote、Adobe
    Illustrator Draw、Autodesk SketchBook 等。一些专门的平板应用甚至可以检测你绘制的形状并将其转换为模板形状。


    ### 应用


    像 OmniGraffle、Sketch、Adobe XD、Visio、PowerPoint 和 Illustrator 等应用，都是你可以下载或购买并用于构建流程图的例子。这些应用的功能各不相同，但它们都可以用来构建流程图。


    我经常使用 Visio，它有一个很酷的功能：你可以在 Excel 中创建流程图的步骤，然后将它们导入 Visio 以自动创建流程图。如果你在 Excel 中进行了更改，还可以重新同步图表。


    ## 流程图基础


    流程图使用不同的形状来表示程序或流程中不同类型的步骤。这些形状决定了正在执行哪些步骤，并且还可以影响程序流程的方向。


    ### 端点


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figa_HTML.jpg](img/499634_1_En_7_Figa_HTML.jpg)一个基本的流程图以药丸形状开始；这被称为端点形状，用于流程图的开始和结束。在其中，你写入“开始”或“停止”，并且可以选择在形状中定义程序如何执行此操作。


    然后，你画一条带箭头的线，指向流程图中的下一步。


    ### 处理/操作


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figb_HTML.jpg](img/499634_1_En_7_Figb_HTML.jpg)一个操作，有时称为处理，用一个简单的矩形表示。你需要为程序中每个单独的步骤创建一个矩形。我们经常在脑海中将多个步骤组合起来，并将它们视为一个单一操作。因此，一些看似简单的步骤可能涉及多个操作。


    然后，你在流程图中创建更多步骤，并使用带箭头的线将它们连接起来。这些线可以转弯和扭曲。它们可以是垂直的或水平的。这完全取决于你。


    ### 输入和输出


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figc_HTML.jpg](img/499634_1_En_7_Figc_HTML.jpg)在你的程序中，你经常需要从用户那里获取输入或向用户显示输出。这些步骤用平行四边形表示，以区别于其他步骤，并且你像描述其他操作一样描述它。


    ### 决策


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figd_HTML.jpg](img/499634_1_En_7_Figd_HTML.jpg)决策根据问题的结果来分支程序的流程。问题的答案必须是“是”或“否”。（你会在课程后面发现原因）。


    决策步骤使用菱形形状，并有两个分支路径。一个用于“是”；一个用于“否”。然后，你根据问题的结果将这些路径连接到不同的操作。


    这些分开的路径可能在稍后某个点重新汇合，但这完全取决于你的程序以及你希望何时实现这一点。


    ### 注释


    有时你无法将所有内容都放入一个形状中，因此向流程图添加注释或备注是可以的。这些可以是关于步骤的附加描述或细节，也可以是开始编码时为你或他人提供的编程和编码注释。


    ### 其他形状


    还有其他用于处理数据、创建子流程和其他操作的形状，但我们将在需要时再介绍它们。目前，我们将坚持使用这四种基本形状。


    ## 倒垃圾


    让我们看一个示例流程图，你可以看到这一切是如何结合在一起的。


    ![../images/499634_1_En_7_Chapter/499634_1_En_7_Fige_HTML.png](img/499634_1_En_7_Fige_HTML.png)


    流程图以一个标记为“开始”的端点（或终端）形状开始。


    然后执行一个操作：“打开垃圾桶盖”。


    接下来，我们到达一个决策点。问题的答案必须是“是”或“否”。“垃圾桶满了吗？”如果是，则走“是”路径。如果不是，则走“否”路径。


    根据你选择的路径，你将按照每个操作依次进行。


    此图表中，决策路径最终汇合到一个点，这在流程图中是完全允许的。


    然后，它以“停止”端点结束。

    '
- fmt: '### But Is It Really That Simple?


    No. It isn’t. Because we make assumptions all the time, and often those assumptions
    lead us into problems.


    Part of a programmer’s job is to take complicated tasks and break them down into
    individual steps that can’t be broken down any further.


    It is like looking at water and drilling down to the molecules and then the atoms
    that form it. You dive down to the smallest element that forms the basis of the
    object. Now take that principle and apply it to an action. We take for granted
    many steps that are part of a group of actions.


    Let’s look at our previous example. Let’s take out the trash.


    The phrase “take out the trash” probably conjures up a few things in your mind.
    If someone tells me, “Hey Doug, can you take out the trash please?”, there are
    certain steps that already form in my head around what I have to do.


    For my home, these are the steps I need to do.


    First, I need to go to the kitchen and grab the full garbage bag out of the trash
    can, then I take it around the house and empty the smaller trash cans in the bedroom
    and bathroom into it. Then I take it to the curbside can and put it inside.


    That’s it! I took out the trash.


    But are those all of the steps? Did I break down everything enough to make sure
    that everything happens that needs to happen? What if I took the steps I mentioned
    and wrote them down and had someone follow them to the letter? Would they do what
    I expected?


    No, they probably wouldn’t, because even with those steps there are some assumptions
    that I didn’t think of. For instance, if it is the day before trash pickup, I
    need to put the curbside can on the street. When I say “trash,” I see it as trash
    and recycling, but someone who would take me literally might not see that.


    As a programmer, you need to be as accurate and literal as possible with your
    code. Breaking down actions into smaller actions is critical to being successful.
    With each line of code that you write, like “take out the trash,” you need to
    define each statement or action that needs to happen within that to fulfill everything
    that you expect and for the action to be executed correctly.


    So, when you break down a process or a task, put yourself in someone else’s shoes
    to see if the steps you outlined would make sense. If not, add the clarity and
    details you need to make it foolproof to get the desired results.


    # 8. Hello, World


    Coding requires knowing what to code, but also how to combine the tools you use
    together to make the project work and share with others.


    Before we start getting into some heavy coding, we should work on exactly how
    you should use the tools together.


    ## Create Your IntelliJ Java Project


    First, we need to create the basic structure for our project. To do that, we need
    to go into IntelliJ and create a new Java project using specific project templates.


    ### IntelliJ IDEA


    When you launch IntelliJ for the first time, you will see the welcome screen.
    You can also open this screen from the **File** ➤ **Open** menu item.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig1_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig1_HTML.jpg)


    Figure 8-1 IntelliJ welcome window


    From here, we need to create a new project, so select, you guessed it, “**Create
    New Project**” from the window.


    You will then see the New Project window. From here, you will define the parameters
    for your project and set up the initial folder structure and starter code to begin
    coding and building your project.


    ### First Time Only: Configure the JDK


    One important component of your project is connecting it to the JDK. This isn’t
    done automatically and needs to be done the first time you create a project and
    may need to be repeated each time you update the JDK on your machine.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig2_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig2_HTML.jpg)


    Figure 8-2 New Project window


    The process is pretty simple.


    At the top of the New Project window, click the “**New…**” button.


    When you click the “**New…**” button, you need to tell IntelliJ where the JDK
    is installed. On a Windows machine, it is usually located in the “**Program Files**”
    folder; on macOS, it is usually in the “**Library**” folder.


    Select the location of the JDK and the main folder of the JDK, and then select
    **OK**.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig3_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig3_HTML.jpg)


    Figure 8-3 Select the JDK folder


    You’ll then see the version of the JDK appear at the top of the New Project window.


    ### Create Project


    When you have the JDK configured, get started by having Java selected on the left
    and keep the library and framework options unchecked.


    Click **Next** to continue from the New Project window.


    On the next screen, you will configure the project template.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig4_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig4_HTML.jpg)


    Figure 8-4 Project templates


    Check “Create project from template” and then select “Command Line App.”


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig5_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig5_HTML.jpg)


    Figure 8-5 Template selections


    Click **Next** to continue.


    Now you need to give your project a name. It is highly recommended to not have
    any special characters or spaces in your project name. Usually for homework, you
    can use the name that was part of the assignment. For now, we will use “**HelloWorld**”.


    Then you need to select where to save your project. You can choose the default
    folder, and when you create the project name, it will create a subfolder for you.
    If you don’t see it, create one under the `IdeaProjects` folder.


    The third option is for the base package. The default package is called `com.company`,
    but we aren’t going to use that so remove that and make sure the field is blank.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig7_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig7_HTML.jpg)


    Figure 8-7 New Project name and location


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig6_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig6_HTML.jpg)


    Figure 8-6 Empty project


    When you are done, you should see this:


    Click **Finish** when you are ready.


    IntelliJ will come to life and create the project structure and a stub code file
    to help you get started.'
