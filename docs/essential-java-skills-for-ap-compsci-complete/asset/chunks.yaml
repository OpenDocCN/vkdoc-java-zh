- fmt: "# Text Encoding\n\nMaybe you have used a decoder ring. Using a decoder ring,\
    \ you can take a message that contains letters and, using it, find the corresponding\
    \ number or symbol that is used for that letter. You could take a phrase like\
    \ this one, and for each unique letter, you have a symbol that represents it.\
    \ Using this, you can convert each letter to the new code. This is called encoding.\
    \ You are taking the original text and are converting it to a unique code.\n\n\
    On the other side, if I get a message that uses these symbols, I can take each\
    \ symbol, and using the same decoder ring, I can match the symbol to the letter\
    \ and decode the message back into its original format.\n\nBoth the encoding and\
    \ decoding processes need to be identical and agreed upon at both ends. If one\
    \ end has a different decoder ring than the other, we can’t communicate. This\
    \ agreed-upon method is called a protocol, and it is used at both ends of the\
    \ communication.\n\nNow, instead of symbols, we can use numbers to represent our\
    \ protocol. These numbers match uniquely to each character we want to communicate\
    \ with.\n\nBut that is just the simple alphabet. We can represent that as uppercase\
    \ characters and lowercase characters. Then there is punctuation, common international\
    \ characters, Greek, special symbols, and block building symbols to draw boxes\
    \ and lines on the screen.\n\nPlus there are some nonprinted characters like a\
    \ space, line return, backspace, and others.\n\nYou now have a set of unique characters,\
    \ each with a corresponding number. But remember, computers need to store numbers\
    \ in binary format, so each of these numbers is converted to a binary, and in\
    \ this case, we have 256 characters, which are stored in a single byte, or with\
    \ 8 bits.\n\n## ASCII + Unicode\n\nThis single byte encoding system is called\
    \ ASCII or American Standard Code for Information Interchange and was first developed\
    \ in the early 1960s. Over time, the system expanded to include more characters.\
    \ But at a certain point, there were too many symbols or glyphs in the world to\
    \ represent that ASCII wasn’t going to cut it anymore.\n\nA new standard called\
    \ Unicode uses multiple bytes to represent thousands and thousands of symbols\
    \ from languages all around the world and even ancient symbols and languages from\
    \ lost civilizations (and even some from science fiction!). The more common characters\
    \ require fewer bits to store them, which saves space and time when storing or\
    \ sending them. The lesser or more complex characters require more.\n\nThe web\
    \ is standardized on the UTF-8 format or 8-bit Unicode Transformation Format.\
    \ It is backward compatible with ASCII. Each character is represented using the\
    \ prefix `U+` and then is followed by a four-digit hexadecimal number. So the\
    \ letter “D” is `U+0044`. Four hexadecimal numbers require 2 bytes to store them,\
    \ or 16 bits. So using just 2 bytes, over 65,000 symbols can be encoded and decoded.\
    \ This is called Plane 0 of Unicode. For more characters, additional bits are\
    \ added creating new Planes. Currently, there are three that are mainly used,\
    \ Plane 0, Plane 1, and Plane 2. There are others that aren’t used or can be customized,\
    \ going up to Plane 16. All in all, the entire breadth of Unicode can store 1,114,112\
    \ symbols, called “code points.” That’s a lot of letters!\n\n## Emoji\n\nYou use\
    \ Unicode every day. All of the emoji you use on your phones and devices are symbols\
    \ in Unicode.\n\nThat is why, generally, when emoji are added to one platform,\
    \ they are added to the other. This is how standards work. In order for a technology\
    \ to align to a standard, it needs to keep its support for it updated. This includes\
    \ if it changes and adapts over time.\n\n# Variables\n\nComputers have all of\
    \ the memory, so we have to be able to store something. Right?\n\nTo do that in\
    \ our program, we use variables, but each variable can only handle certain types\
    \ of values, or literals.\n\nWorking with a variable requires we define three\
    \ things (eventually).\n\n## Essentials of Variables\n\nFirst, we need to determine\
    \ the type of value we are going to want to store. This is the value type, and\
    \ we already have encountered a few, like integer, float, string, and more.\n\n\
    Second, we need to give each variable a unique name. Now, variable names have\
    \ a few rules to them. They must begin with a letter or the `$` or `_` characters.\
    \ They are case sensitive. They cannot be a reserved word in Java.\n\nWhile those\
    \ are the rules, there are a few recommendations that go along with them. First,\
    \ you should use camelCase convention, meaning that you concatenate words together,\
    \ and the first letter is lowercase and each subsequent letter is capitalized.\
    \ So my name, `Doug Winnie`, would become `dougWinnie`.\n\nThird, we need to assign\
    \ a value to a variable. That value needs to match the type of the variable, so,\
    \ for instance, an integer value to an integer variable. We assign that value\
    \ using the assignment operator, which is the equal sign: `=`.\n\nAssignment always\
    \ operates from right to left. Whatever value is on the right is assigned to the\
    \ variable container we define on the left.\n\nOnce we have a variable with a\
    \ value, we can use it like any literal.\n\n## Code Examples\n\nThe code on the\
    \ next page shows examples of working with multiple types of variables in a variety\
    \ of situations.\n\nThis code is also available at the following GitHub repo:\n\
    \n[`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)\n\
    \n```\npublic class Main {\npublic static void main(String[] args) {\n// I: Define\
    \ a variable\nint quantity;\ndouble price;\nString name;\nchar initial;\n// II:\
    \ Assign a value to a variable using the assignment operator\nquantity = 5;\n\
    price = 2.50;\nname = \"Doug\";\ninitial = 'W';\n// III: Output a variable\nSystem.out.printf(\"\
    %s %s. bought %d items priced at %f each\\n\",name,initial,quantity,price);\n\
    /* Output\nDoug W. bought 5 items priced at 2.500000 each\n*/\n// IV: Update value\
    \ of a variable\nquantity = 10;\nprice = 1.99;\nname = \"Mike\";\ninitial = 'J';\n\
    // V: Output updated variables\nSystem.out.printf(\"%s %s. bought %d items priced\
    \ at $%.2f each\\n\",name,initial,quantity,price);\n/* Output\nMike J. bought\
    \ 10 items priced at $1.99 each\n*/\n// VI: Initialize and assign on one line\n\
    int myNumber = 5;\n// VII: Assign one variable to another\nint myValue = myNumber;\n\
    }\n}\nListing 17-1\nWorking with variables\n```\n\n# Math!\n\nWhile there are\
    \ tons of things that you can do with math in programming and in Java, we are\
    \ going to cover the essentials here, starting with basic arithmetic operators.\n\
    \n## Basic Operators\n\nThe basic operators used in Java are for addition, subtraction,\
    \ multiplication, division, and modulo.\n\nThese are all pretty self-explanatory,\
    \ except for modulo. This essentially is the remainder after division. When you\
    \ divide two numbers, the remainder is the result of modulo.\n\n## Order of Operations\n\
    \nCalculations are based on the algebraic order of operations:\n\n*   Groupings\
    \ are completed first (based on parentheses).\n*   Multiplicative functions:\n\
    \    *   Multiplication\n    *   Division\n    *   Modulo\n*   Additive functions:\n\
    \    *   Addition\n    *   Subtraction\n\nCalculations are completed from left\
    \ to right.\n\n## String Concatenation\n\nWhile you can’t “add” strings together,\
    \ you can combine them to each other. This is called concatenation, and you use\
    \ the addition symbol.\n\nYou can concatenate multiple literal and variable types\
    \ together. They will all be converted to strings when you do."
