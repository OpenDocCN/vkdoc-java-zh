    ## 51. Using `for…each` Loops


    When you have a collection, you have a group of stuff. When you sort through those
    items and need to go through them, ultimately, it doesn’t matter how many there
    are, you still need to go through all of them. You look at the pile of stuff,
    pick one up, do things with it, and then move on to the next item on the pile.
    Do you care which ordinal number it is? No. Do you care how many there are in
    total? Maybe, but you know that you just have to go through them all.


    The `for` loop is a great type of loop for when you know precisely how many items
    you need to work with. Using the `size()` method of `ArrayList`s or the `length`
    property with arrays, you know how many you need to work with and can then numerically
    go through them all one by one.


    But there is another way, and it is way simpler, and you don’t need to keep track
    of so many things at once.


    ### Mechanics of a `for…each` Loop


    The `for...each` loop is similar in name, but different in structure. Think of
    it this way. You have a pile of shirts that you need to fold. That pile is called
    `laundry`. When you need to fold a shirt, you find a shirt, and it is in your
    hand. It doesn’t matter which shirt in the laundry pile it is, but you know it’s
    a shirt, and you call it `foldMe`. You do your thing, folding your shirt the way
    you fold all of your shirts, and then put it away. You then go back to the laundry
    pile and get another shirt, this time a different shirt, but you still call it
    `foldMe`, because you are going through all of the shirts, and as you loop through
    all of them, you need to give it some sort of name.


    A `for…each` loop is similar to a `for` loop, but different in terms of how it
    works through a collection of objects. Think of it like a pile of laundry. With
    a `for` loop, that pile of laundry needs to be arranged, so each shirt, sock,
    and pair of pants is in a specific order. You then go to each one, one by one,
    and perform an action, like folding them, and then go through them all.


    But when it comes to laundry, it doesn’t really matter what order you do them
    in. You just need to fold all the clothes. Arranging them into a specific order
    isn’t particularly valuable. That is the difference of a `for…each` loop. In the
    preceding example, the `for…each` loop looks at the pile of laundry. It doesn’t
    require that things be in a sequential order; it just picks up an item off the
    pile, and while it is in your hands, you can perform a specific task, like fold
    it, and then go back to the pile and grab another one. It does this until the
    pile is exhausted of items. In this case, it doesn’t matter which one is first
    or last.


    #### This Is the Mechanics of the `for…each` Loop


    If we have a collection of `String`s, we can loop through them using a `for...each`
    loop. Let’s start with a new collection of names:


    ```java

    ArrayList names = new ArrayList();

    names.add("Doug");

    names.add("Mike");

    ```


    This collection contains two names, both stored as `String`s. We can then create
    our `for...each` loop to go through each item in the collection:


    ```java

    for (String name : names) {

    System.out.println(name);

    }

    ```'
