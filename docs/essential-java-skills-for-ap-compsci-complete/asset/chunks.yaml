    ## 52. The Role-Playing Game Character


    When we program multiple lines of code in a process, we refer to this as the program
    flow. As we run through our program, there is a flow, like the flow of a river
    that carries water from the origin to the river’s end. A flow is how the program
    operates and what happens with values throughout our code.


    But as we look at object-oriented programming, the approach is much different.
    We focus on the objects that we have in our program and how they work together
    to make our program work. The flow is still there, but it is encapsulated within
    each of the objects we work with. Each object has abilities that we can use with
    other objects.


    But instead of getting bogged down in the specifics of object-oriented programming
    and become mired in jargon and terminology, let’s build a model for how we can
    think about objects. A great example is building a role-playing game character.


    ### What Is a Role-Playing Game Character?


    When you play a role-playing game like *Dungeons & Dragons* or a computer game
    like *Warcraft* or *Elder Scrolls*, you create a “PC” or player character that
    will define your abilities and capabilities throughout the game. Typically, a
    role-playing character has several attributes or skills that have points associated
    with them. These points define how much of a skill that character has. When you
    play with one of these characters, you need to have enough points for various
    attributes or skills to perform certain actions. The chances of success for spells
    and actions are calculated based on the amount of skill points you have in your
    various attributes.


    Player characters also are aligned under a player type, like a mage or a fighter.
    These types, or classes, define the initial strength and weakness of the skills
    for a character right from the beginning and define the type of actions that the
    player can do.


    Let’s start with something simple. Let’s start with a simple mage.


    A mage is a character that can cast magical spells across a wide range. A mage
    has a number of abilities that are unique from other classes like fighters. Let’s
    say that a mage can have the following attributes:


    *   A mage has intelligence, required to be able to perform certain actions.

    *   A mage has strength; this determines how much the character can carry and
    how long they can survive in a fight.

    *   A mage has agility, which is used to calculate how quick they are able to
    move and potentially avoid attacks from enemies.

    *   A mage has wisdom, which is required to cast magical spells.


    When you create a role-playing game character, you typically have a character
    sheet. This is where you keep track of all the stats for your player, the skills
    you have, the inventory of items you own, and other information. An example character
    sheet for a mage is at the end of this sprint section.


    For the mage, we know we have five pieces of information we can keep track of.
    The first is the name of our mage. Then we will need to hold values for the intelligence,
    strength, agility, and wisdom skills. With that, we have a basic framework for
    our character, or in this case a mage.


    What we are building is a blueprint for not just a single mage, but for any mage
    that someone wants to play in the role-playing game. As we continue to build out
    this blueprint, we can add more information that would be part of every mage that
    is created through this template.'
