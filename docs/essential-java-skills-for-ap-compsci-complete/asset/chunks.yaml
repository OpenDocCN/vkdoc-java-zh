    ## Binary Numbers


    Binary states are the basis of how computers store, process, and share information
    using states of on or off. Using the binary number system, we can represent these
    states using a base 2 system with two digits: zero and one.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig2_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig2_HTML.png)


    Figure 15-2


    Decimal vs. binary


    Using the rules of number systems, we can create a system for what a binary digit
    looks like. We have a maximum of two possible digits: zero and one. We then also
    have multiple columns that exponentially increase in value from right to left
    based on two, the base number of the system. If we count up from zero, we can
    see how binary begins to work. First, I start with zero, then I add one, making
    it one. If I add another one, I have maxed out the possible number of digits in
    the first column, so I then carry that over to the next column, and return back
    to zero in the first.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig3_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig3_HTML.png)


    Figure 15-3


    Counting to “10” in binary


    We continue to add one, adding digits to the number, and eventually get one that
    is several digits consisting of multiple ones and zeros. Using the formula we
    can apply to each column, we can take each column and multiply the digit by the
    base number raised to the power of the column. Let’s walk through that column
    by column.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig4_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig4_HTML.png)


    Figure 15-4


    Converting binary to decimal


    We have the number 10011\. Starting from the right, we take the column which is
    2 to the 0 power which is 1 and multiply it by the digit, which makes 1.


    The next column is 2 to the 1st power, which is 2; multiply it by 1 which is 2.


    Next we have 2 to the 2nd power, which is 4, times 0 is 0.


    Next is 2 to the 3rd power, which is 8, times 0 is 0.


    And last, we have 2 to the 4th power, which is 16, times 1 is 16.


    Then we add all of those together: 16, plus 0, plus 0, plus 2, plus 1, totaling
    19.


    We can also do this in the other direction. Let’s take the number 23.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig5_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig5_HTML.png)


    Figure 15-5


    Converting decimal to binary


    We can use the formulas for the binary digit columns to convert the decimal number
    to binary.


    We would need to find the largest power of 2 that is less than 23, which is 16\.
    We would then put a 1 in that column and subtract 16 from 23, leaving 7.


    The next column is 2 to the power of 4, or 8\. The number we are carrying over
    is too small, so we put a 0 and move on.


    The largest power of 2 in 7 is 4, so we put a 1 in that column and subtract from
    7, leaving 3.


    The next largest power in 3 is 2, so we put a 1 in that column and subtract from
    3, leaving 1, which is equal to the next largest power which is 1\. The result
    is 10111.


    So using this algorithm, a computer can take a value that we would represent as
    a decimal number and can convert it into a format that can be natively stored
    and transmitted, using ones and zeros. This conversion process is the basis of
    all encoding and decoding of digital information we work with every day.'
  trans: '

    # 15. 二进制


    我们可以将“开”和“关”的二进制状态表示为数字。二进制数字系统仅基于两个数字：1 和 0。对于“开”的二进制状态，用 1 表示；对于“关”的二进制状态，用
    0 表示。


    但单独存储一个值本身意义不大。你可能希望连续存储多个值。为此，你需要创建一串这样的值，由于它们都是数字，你实际上是在创建一个由多个数字或比特组成的更大的数字。


    八个二进制位组成的一组称为一个字节（byte，拼写为 y）。字节是我们日常使用的常见数据度量单位。1 千字节等于 1024 字节。1 兆字节等于 1024
    千字节。1 吉字节等于 1024 兆字节，1 太字节等于 1024 吉字节。


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig1_HTML.png](img/499634_1_En_15_Fig1_HTML.png)


    图 15-1


    内存与存储容量


    在计算机上，你可能有一个能存储 1 太字节数据的硬盘。1 太字节大约包含近九万亿个比特。这相当于超过九万亿个独立的“开”或“关”状态。


    但我们用所有这些比特做什么呢？


    每个比特都保存着一个“开”或“关”的状态，它代表更大信息片段的一小部分，无论这个信息片段是一个数字、一段称为字符串的文本、一份文档、一张照片、一首歌、一部电影还是一个计算机程序。我们日常使用的所有这些事物，都会被转换成比特，由计算机和网络进行存储、传输和转换。


    将我们今天所识别的信息（例如一段文本）转换为二进制的过程称为编码。你是在将某种以人类可理解方式表示的事物，通过特定过程转换成可由计算机或网络传输、处理和存储的二进制数字串。


    使用相同的过程，但反向操作，这些单独的二进制数字就可以被转换回我们日常使用的信息。这称为解码。它重构了被传输或访问的文件，并以我们可识别的格式呈现给我们。


    但为了使编码和解码过程能够工作，包含这些值的比特需要被存储、访问或传输。实现这一点的方法是制定一个协议（即一套规则），规定比特如何传输，并定义所有计算机通信工作的基础。


    ## 二进制数


    二进制状态是计算机使用“开”或“关”状态来存储、处理和共享信息的基础。利用二进制数字系统，我们可以使用基数为 2 的系统（包含两个数字：0 和 1）来表示这些状态。


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig2_HTML.png](img/499634_1_En_15_Fig2_HTML.png)


    图 15-2


    十进制与二进制


    利用数字系统的规则，我们可以为二进制数字的表示方式创建一个系统。我们最多有两个可能的数字：0 和 1。此外，我们还有多个数位，这些数位从右到左基于系统的基数
    2 呈指数级增长。如果我们从零开始向上计数，就能看到二进制是如何工作的。首先，我从 0 开始，然后加 1，得到 1。如果我再加 1，第一个数位的可能数字就达到了最大值，所以我将其进位到下一列，并将第一个数位归零。


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig3_HTML.png](img/499634_1_En_15_Fig3_HTML.png)


    图 15-3


    二进制计数到“10”


    我们继续加 1，为数字增加数位，最终得到一个由多个 1 和 0 组成的多位数。利用我们可以应用于每个数位的公式，我们可以将每个数位的数字乘以基数（2）的该数位次幂。让我们逐列进行说明。


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig4_HTML.png](img/499634_1_En_15_Fig4_HTML.png)


    图 15-4


    二进制转换为十进制


    我们有数字 10011。从最右边开始，该数位是 2 的 0 次方（即 1），乘以该数位的数字 1，得到 1。


    下一列是 2 的 1 次方（即 2），乘以数字 1，得到 2。


    接下来是 2 的 2 次方（即 4），乘以 0，得到 0。


    再下一列是 2 的 3 次方（即 8），乘以 0，得到 0。


    最后，我们有 2 的 4 次方（即 16），乘以 1，得到 16。


    然后我们将所有这些结果相加：16 加 0 加 0 加 2 加 1，总和为 19。


    我们也可以反向操作。以数字 23 为例。


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig5_HTML.png](img/499634_1_En_15_Fig5_HTML.png)


    图 15-5


    十进制转换为二进制


    我们可以利用二进制数位的公式将十进制数转换为二进制。


    我们需要找到小于 23 的 2 的最大幂，即 16。然后我们在该数位放一个 1，并从 23 中减去 16，剩下 7。


    下一列是 2 的 4 次方，即 8。我们当前剩余的数太小，所以放一个 0 并继续。


    7 中 2 的最大幂是 4，所以我们在该数位放一个 1，并从 7 中减去 4，剩下 3。


    3 中下一个最大的 2 的幂是 2，所以我们在该数位放一个 1，并从 3 中减去 2，剩下 1，它等于下一个最大的 2 的幂（即 1）。结果是 10111。


    因此，使用这种算法，计算机可以获取我们通常表示为十进制数的值，并将其转换为一种可以使用 1 和 0 进行本地存储和传输的格式。这个转换过程是我们日常使用的所有数字信息编码和解码的基础。

