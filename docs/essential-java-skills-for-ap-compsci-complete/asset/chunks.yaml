    # 39. The do/while Loop


    The `while` loop runs if the condition at the top is `true`, but you might have
    a case when you need to run the code in the loop at least once, or you need to
    test the condition at the end of the loop. The solution to this is the `do...while`
    loop. The `do...while` loop is identical to the `while` loop, except the condition
    statement is tested at the end. As a result, the loop will always run at least
    one time, and if the condition at the end of the loop is `true`, the loop will
    repeat. If the condition at the end is `false`, it will not repeat the loop, and
    the flow of the program will continue with the next statement.


    ## Creating a do…while Loop


    A `do...while` loop starts with the `do` clause and then a code block, defined
    by braces. After the code block, the `while` clause is added with the conditional
    statement:


    ```java

    int a = 5;

    do {

    System.out.println(a);

    a--;

    } while (a > 0);

    ```


    In this example, the loop will run five times, starting with the value 5 and then
    decrement that by 1 with each execution of the loop.


    ## Run at Least Once


    In the following example, the loop will run once, because the condition is tested
    at the end:


    ```java

    boolean loop = false;

    do {

    System.out.println("Run this loop!");

    } while (loop);

    ```


    # 40. Simplified Assignment Operators


    There are a number of shortcuts you can use to manipulate the value of a variable
    to save time. These are called combined assignment operators, where they perform
    a mathematical evaluation on the existing value of a variable and assign the result
    back to the same variable.


    ## Combined Assignment


    Take this code, for instance:


    ```java

    int a = 2;

    System.out.println(a);

    a = a + 2;

    System.out.println(a);

    ```


    In this example, we have an integer variable called `a` that is set to the literal
    value `2`. Then we take the value stored in the variable, and we perform addition
    to increase the value by `2`. We take that new result, `4`, and assign this back
    to `a`.


    We can simplify this using the following statement:


    ```java

    a += 2;

    ```


    This performs the same action as the previous statement but does so more concisely.


    You can use this combined assignment operator with all basic arithmetic operators
    including addition, subtraction, multiplication, division, and modulo:


    ```java

    a += 2;

    a -= 2;

    a *= 2;

    a /= 2;

    a %= 2;

    ```


    ## Increment and Decrement


    If you only want to add or subtract one, there are two additional shortcuts. The
    first is the increment operator. To add one to any variable, add a double plus
    at the end of the variable:


    ```java

    a = a + 1;

    a += 1;

    a++;

    ```


    All three of these statements do the same thing: add one to the value stored in
    the variable `a`. The last one uses the increment operator.


    To subtract one, just replace the plus signs with minus signs:


    ```java

    a = a - 1;

    a -= 1;

    a--;

    ```'
