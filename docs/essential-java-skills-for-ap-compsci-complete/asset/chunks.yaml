  raw: '## Coding Tools and IDEs


    Coding tools, and their more sophisticated brothers, the integrated development
    environment, or IDE, can sometimes spark passionate debate on which one is considered
    “the best,” but ultimately it comes down to you, the coder, to decide what is
    best for you.


    To help make this course and the tools we use easy to understand and the same
    across Windows and macOS, the tool we will use is **IntelliJ IDEA** . IDEA is
    a free coding tool from JetBrains that is easy to use, not very complicated, and
    it is the same across platforms.


    There are others that you can use for this course as well. Some examples are Eclipse
    or NetBeans. These tools provide the same features, but I wouldn’t recommend using
    them to help us all be consistent with our tools when working together.


    The other key tool you will need is the **Java Development Kit** or JDK. In order
    for the IDE to work, it needs to have the Java compiler to create your Java bytecode
    and then use the Java Runtime Environment or JRE to run your program in a virtual
    machine, called the JVM.


    The version that you will use is the Java SE or Standard Edition that you can
    download for free from Oracle. Regardless if you use IDEA, or another IDE, you
    will need to install the JDK in order to compile and build your programs.


    ## Installation and Setup


    If you want to follow along with the same tools that I’ll be using, you will need
    to install the JDK and IntelliJ IDEA.


    To install the tools I’m using, you will need a PC with Windows 7, 8, 8.1, or
    10 already installed.


    For a macOS computer, you will need Yosemite, High Sierra, or Mojave. It is recommended
    that you uninstall the version that Apple installs by default (called OpenJDK).
    Refer to instructions online for how to do this.


    ### Install the JDK


    First, we need to install the JDK.


    With your browser, go to the Oracle website:


    ```

    www.oracle.com/technetwork/java/javase/downloads/index.html

    ```


    From here, click the Java JDK download button.


    Then accept the license agreement, and then select Windows which must be installed
    on a 64-bit computer and operating system or for macOS.


    Your browser will prompt you to save the installer to your computer. Save and
    run the installer using the defaults for the configuration.


    Remember the location of where the JDK is installed; you will need this later
    on to connect IntelliJ IDEA to the JDK.


    ### Install IntelliJ


    Now we need to install IntelliJ IDEA.


    With your browser, go to the JetBrains website:


    ```

    www.jetbrains.com

    ```


    Under Tools, look for the column IDEs, and select IntelliJ IDEA. We will use the
    Community Edition, which is free.


    Your browser will prompt you to save the installer to your computer. Click Save
    to continue and download.


    Run the installer and accept the defaults for all the settings.


    That’s it! IntelliJ IDEA and the Java Development Kit are successfully installed!


    # 3. Setting Up GitHub


    When you code, you need to have a location to store it and share that code with
    others to work with it and review it. Tools called code repositories are ideal
    ways to do this, and there are several different types that are available for
    developers to use; one of the most popular is GitHub, and we will explore it here.
    GitHub, in the context of this book, is a tool that you can use on your own. I’m
    introducing it here, because as you get more familiar with programming, you’ll
    find it to be an indispensable tool.


    ![../images/499634_1_En_3_Chapter/499634_1_En_3_Fig1_HTML.png](images/499634_1_En_3_Chapter/499634_1_En_3_Fig1_HTML.png)


    Figure 3-1


    Repository lifecycle


    ## GitHub


    The one that we will use is called GitHub. GitHub is a free public code platform
    that developers use to build, archive, and manage coding projects for individual
    or group collaboration. It is built on the Git technology that is ordinarily used
    for private, internal projects, but GitHub builds their public platform on Git
    to make it available to anyone.


    To create a GitHub account is simple. Go to [`www.github.com/`](http://www.github.com/)
    and create an account there. For our use in class, please create your account
    as your Serra email address so I can easily identify your account.


    When you create your account, be sure to go to GitHub Desktop to download the
    desktop client for Windows or macOS. You can download the installer here: [`https://desktop.github.com/`](https://desktop.github.com/).


    Install the client and sign in to your account. You can then create a repository
    to keep track of the changes you make in your classwork projects. You can create
    a single project to capture all of your homework assignments, or you can create
    an individual repository for each project. Whichever you choose is up to you.


    ## How GitHub Works


    GitHub and Git create a special directory that it uses to keep track of all changes
    that you make to the files inside of it. When you make a change to a file, it
    tracks what the change was and notes that.


    This is different than a backup. A backup creates a copy of everything that is
    in a folder. A change in Git and GitHub only records what changed, which can save
    a lot of space and is much faster to process.


    There are many advanced workflows and automations that you can tie into Git and
    GitHub, but we will only be using the platform to store and share projects and
    homework assignments.


    There are ways to tie in GitHub directly into the IntelliJ IDEA IDE, but for simplicity,
    we can use the GitHub Desktop client to make, track, commit, and sync changes
    to our GitHub account.


    ## Lifecycle of a Repository


    A repository, or repo, starts with the master branch, sometimes known as a trunk.
    For individual developers, or small teams, projects might only use a master branch
    and never create alternate versions of it.


    As the program evolves and new changes are made, they are saved to the repository
    by making a commit. A commit contains the changes to the code and a brief comment
    and description made by the developer on what changed for future reference. Over
    time, there will be dozens or hundreds of commits on a repository.


    At some point, a repository will need to split in some way. Either there needs
    to be simultaneous work and they don’t want to have code conflict with others,
    or a project needs to maintain an existing version and they want to do something
    else with it. In that case, a branch is created from the main trunk, and development
    can happen in parallel with the original code.


    At some point, a branch will need to rejoin the main development, and this is
    done by merging that branch back into the master trunk.


    For open source repositories, it is common for a developer to find a helpful framework
    and want to add it to their own development environment. To do that, they would
    fork the repository, creating a copy in their own environment to work with and
    potentially make changes.


    When a developer makes changes or improvements to a forked repository, they might
    want to contribute those changes back to the main repository they forked from.
    To do that, they submit a pull request back to the original repository. As part
    of this pull request, the developer outlines the changes that were made, and the
    person who receives the requests can compare the proposed changes to the repo
    by performing a diff that shows the changes side by side from one another.


    Repositories can vary in complexity from something very simple with a single or
    a handful of developers to a large open source project with tens of thousands
    of developers. Code repos are the core of how software developers work together
    on projects of any size.'
  trans: '

    ## 编码工具与集成开发环境


    编码工具及其更高级的兄弟——集成开发环境（IDE），有时会引发关于哪个才是“最佳”的热烈讨论，但最终，决定权在于你，也就是编码者本人，来选择最适合自己的工具。


    为了让本课程以及我们使用的工具易于理解，并在 Windows 和 macOS 系统上保持一致，我们将使用的工具是 **IntelliJ IDEA**。IDEA
    是 JetBrains 提供的一款免费编码工具，易于使用，不复杂，并且跨平台体验一致。


    本课程中你也可以使用其他工具，例如 Eclipse 或 NetBeans。这些工具提供相同的功能，但为了大家在协作时工具保持一致，我不建议使用它们。


    你需要的另一个关键工具是 **Java 开发工具包**（JDK）。为了让 IDE 正常工作，它需要 Java 编译器来生成你的 Java 字节码，然后使用
    Java 运行时环境（JRE）在名为 JVM 的虚拟机中运行你的程序。


    你将使用的版本是 Java SE（标准版），可以从 Oracle 免费下载。无论你使用 IDEA 还是其他 IDE，都需要安装 JDK 才能编译和构建你的程序。


    ## 安装与设置


    如果你想和我使用相同的工具，你需要安装 JDK 和 IntelliJ IDEA。


    要安装我正在使用的工具，你需要一台已安装 Windows 7、8、8.1 或 10 的 PC。


    对于 macOS 电脑，你需要 Yosemite、High Sierra 或 Mojave 系统。建议卸载 Apple 默认安装的版本（称为 OpenJDK）。请参考在线说明了解如何操作。


    ### 安装 JDK


    首先，我们需要安装 JDK。


    打开浏览器，访问 Oracle 网站：


    ```

    www.oracle.com/technetwork/java/javase/downloads/index.html

    ```


    在此页面，点击 Java JDK 下载按钮。


    然后接受许可协议，并选择 Windows（必须安装在 64 位电脑和操作系统上）或 macOS 版本。


    浏览器会提示你将安装程序保存到电脑。保存并运行安装程序，使用默认配置。


    记住 JDK 的安装位置；稍后你需要用它来将 IntelliJ IDEA 连接到 JDK。


    ### 安装 IntelliJ


    现在我们需要安装 IntelliJ IDEA。


    打开浏览器，访问 JetBrains 网站：


    ```

    www.jetbrains.com

    ```


    在“工具”下，找到“IDE”列，选择 IntelliJ IDEA。我们将使用免费的社区版。


    浏览器会提示你将安装程序保存到电脑。点击“保存”继续下载。


    运行安装程序，接受所有设置的默认值。


    大功告成！IntelliJ IDEA 和 Java 开发工具包已成功安装！


    # 3. 设置 GitHub


    当你编写代码时，需要一个地方来存储代码，并与他人共享以便协作和审查。称为代码仓库的工具是实现这一目标的理想方式，开发者可以使用多种不同类型的仓库；其中最流行的一种是
    GitHub，我们将在此进行探索。在本书的语境下，GitHub 是一个你可以自行使用的工具。我在这里介绍它，是因为随着你对编程越来越熟悉，你会发现它是一个不可或缺的工具。


    ![../images/499634_1_En_3_Chapter/499634_1_En_3_Fig1_HTML.png](img/499634_1_En_3_Fig1_HTML.png)


    图 3-1


    仓库生命周期


    ## GitHub


    我们将使用的工具叫做 GitHub。GitHub 是一个免费的公共代码平台，开发者用它来构建、归档和管理个人或团队协作的编码项目。它基于通常用于私有内部项目的
    Git 技术构建，但 GitHub 在其公共平台上基于 Git 构建，使其对任何人都可用。


    创建 GitHub 账户很简单。访问 [`www.github.com/`](http://www.github.com/) 并在那里创建一个账户。为了在课堂上使用，请使用你的
    Serra 邮箱地址创建账户，这样我就能轻松识别你的账户。


    创建账户后，请务必访问 GitHub Desktop 下载适用于 Windows 或 macOS 的桌面客户端。你可以在此处下载安装程序：[`https://desktop.github.com/`](https://desktop.github.com/)。


    安装客户端并登录你的账户。然后你可以创建一个仓库来跟踪你在课堂作业项目中所做的更改。你可以创建一个单一项目来包含所有家庭作业，也可以为每个项目创建单独的仓库。选择权在你手中。


    ## GitHub 的工作原理


    GitHub 和 Git 会创建一个特殊目录，用于跟踪你对其中文件所做的所有更改。当你对文件进行更改时，它会记录更改的内容并加以标记。


    这与备份不同。备份会创建文件夹中所有内容的副本。而 Git 和 GitHub 中的更改仅记录发生了什么变化，这可以节省大量空间，并且处理速度更快。


    你可以将许多高级工作流程和自动化功能与 Git 和 GitHub 集成，但我们只会使用该平台来存储和共享项目及家庭作业。


    有一些方法可以将 GitHub 直接集成到 IntelliJ IDEA IDE 中，但为了简单起见，我们可以使用 GitHub Desktop 客户端来创建、跟踪、提交更改，并将更改同步到我们的
    GitHub 账户。


    ## 仓库的生命周期


    一个仓库（repo）始于主分支（master branch），有时也称为主干。对于个人开发者或小型团队，项目可能只使用主分支，而从不创建其替代版本。


    随着程序的演进和新的更改，通过提交（commit）将更改保存到仓库。一次提交包含代码的更改以及开发者对更改内容的简要注释和描述，以供将来参考。随着时间的推移，一个仓库上会有数十次甚至数百次提交。


    在某些时候，仓库需要以某种方式进行拆分。要么是需要同时进行工作，并且不希望代码与他人冲突；要么是一个项目需要维护现有版本，同时又想对其进行其他操作。在这种情况下，会从主干创建一个分支（branch），开发可以与原始代码并行进行。


    在某些时候，分支需要重新合并到主开发线中，这通过将该分支合并（merge）回主干来实现。


    对于开源仓库，开发者通常会找到一个有用的框架，并希望将其添加到自己的开发环境中。为此，他们会复刻（fork）该仓库，在自己的环境中创建一个副本进行工作，并可能进行更改。


    当开发者对复刻的仓库进行更改或改进时，他们可能希望将这些更改贡献回他们复刻的原始仓库。为此，他们向原始仓库提交一个拉取请求（pull request）。作为此拉取请求的一部分，开发者概述了所做的更改，接收请求的人可以通过执行差异比较（diff）来对比提议的更改与仓库的差异，差异比较会并排显示更改内容。


    仓库的复杂程度各不相同，从只有一两个开发者的简单项目，到拥有数万名开发者的大型开源项目。代码仓库是软件开发人员在任何规模的项目上进行协作的核心。

    '
- fmt: '# 4. Programming Languages


    Programming languages started as an abstract concept and then adapted and changed
    over time. From the origins of machine language, switch input, extending into
    the early days of simple line-by-line coding like `COBOL` or `BASIC` to object-oriented
    languages like `Java` and `C#`, to quantum computer languages like `Q#`, the evolution
    of programming languages has developed over the course of many decades.


    ## Origin of Programming


    In the early 1840s, Charles Babbage proposed a machine called the Analytical Engine.
    It was only a proposal—no actual machine was built, but one inventive woman by
    the name of Ada Lovelace decided to write an article that provided detailed instructions
    on how to represent Bernoulli [ber-noo-li] numbers, a recursive equation based
    on number theory, on the Analytical Engine. This article is considered to be the
    very first computer program.


    Since then the devices that can be programmed went from theoretical to physical,
    manual to automatic, analog to digital. With each evolutionary step, the way we
    program computers needed to evolve as well.


    With the birth of mainframe computers, data processing required instructions to
    be sent to the machine to process and interpret the instructions from the programmer.
    This was then applied to data to organize and analyze the data. Instructions were
    entered through a keyboard, but without the benefit of a monitor, so everything
    was done through printouts on paper or storing data in the form of punched holes
    on cards that were stored in stacks. If you look carefully at text encodings and
    at some programming languages, you’ll see things like “carriage return” or “print”
    that are carryovers from those printer days from decades ago.


    As computers got smaller and more powerful, more languages were created. Languages
    also were created to serve specific types of projects and industries like mathematics
    and science, data storage, and graphics.


    Today, we work with programming languages that can serve many different purposes.
    In fact, a programmer often needs to use multiple programming languages to get
    a project completed. As languages have evolved, they have become specialized to
    complete specific tasks. As a programmer, you will use the best languages for
    specific tasks and combine them together to create your project.


    The programming languages you learn today will continue to evolve and change in
    the future. With future waves of new technology, new languages will be developed
    to allow programmers to drive even more innovation.


    ## Forms of Programming


    As programming has evolved over the decades, the types of programming you can
    do have changed as well. Depending on what you want to do, there are different
    types or forms of programming languages that work in different ways. As a programmer,
    some forms of programming give you direct access to the computer processor, while
    others abstract the hardware into more human language that needs to be translated
    or converted into the native language of the hardware. Here are some example forms
    of programming that you might encounter.


    ### Machine Language


    Machine languages allow programmers to code instructions directly to the processor
    or hardware. Processors can be programmed by sending sequences and patterns of
    ones and zeros through the processor to enable actions to take place. As a result,
    the code that is entered by the programmer is almost natively written. Assembly
    language, which is an abstraction of machine language, uses special codes to modify
    processor registers and perform functions.


    ### Interpreted


    Interpreted languages are readable by humans more easily than assembly or machine
    languages. The programmer writes the code and then runs it. A component called
    an interpreter reads each line of code and then “interprets” it into native instructions
    for the computer. The process is much slower than machine language since the interpreter
    needs to convert each instruction provided by the programmer, even if it repeats
    a line of code multiple times—it needs to interpret it each time. `JavaScript`
    is an example of an interpreted language. A programmer can stop the execution
    of the program, make a change to a line, and then run it again without any other
    steps.


    ### Compiled


    A compiled language takes instructions written by a human and sends that code
    to something called a compiler. A compiler takes the program instructions and
    converts it to binary bytecode or native code for the hardware and creates a program
    called an executable. This program is native to the hardware and operating system
    and can’t easily be converted back to the original programmed instructions. With
    the code now in the native computer format, it runs much faster than interpreted
    code, but if you need to make a change, you need to adjust the original program
    instructions and recompile it to create a new executable. If you are creating
    programs for multiple types of processors, you need to compile unique versions
    for each native instruction code for the target platforms. `C` is an example of
    a compiled language.


    ### Object-Oriented


    Object-oriented programming, or OOP, treats everything as an object. An object
    can store values; perform actions, called methods; and accept and return values.
    An object is defined using a template, called a class, that defines what an object
    can do. A programmer can then create an instance of that class that has all of
    the capabilities defined by the class. `Java` and `C#` are examples of object-oriented
    languages.


    ### Data


    There are languages that are specifically designed at working with data. One example
    is `SQL`, pronounced as see-quel, which is a language designed for working with
    databases. This is a query language, where you ask a database a question and it
    gives you a set of data as a result. You can use `SQL` to combine multiple databases
    together to create combinations that you can then analyze. `R` is another example
    of a data language. `R` is designed for statistical computing and graphing.


    ### Functional


    Functional programming approaches programming in a much different way. Think of
    it like this: In a traditional programming language, which is called imperative,
    you are defining the state of a value, object, or component. You create and define
    tasks to complete, called an algorithm, that go from beginning to end. Functional
    programming isn’t bound by an algorithm. In a functional language, you perform
    transformations on values, like a function in mathematics. You take a value or
    object and modify it, with the ability to string multiple transformations together
    using functions. Functional languages focus on what needs to be done, without
    much care for how it is performed. Examples of functional languages include `Haskell`,
    `Scala`, and `F#`.


    ### Scripting


    Operating systems regularly need to execute commands to configure servers, install
    software, or perform maintenance. To automate that process, there are scripting
    languages that allow systems like Windows, Linux, and macOS to save common commands
    as a script that can be run multiple times or distributed to multiple computers.
    `PowerShell`, `perl`, and `bash` are examples of scripting languages.


    As you can see, there are multiple types of programming languages that you can
    work with to perform different types of tasks. This course will focus on concepts
    found in object-oriented, compiled, and interpreted languages like `JavaScript`,
    `Java`, `C#`, and `Swift`.


    # 5. History and Uses of Java


    Java started off with lofty goals, and today it is one of the most popular and
    widely used languages throughout the world.'
