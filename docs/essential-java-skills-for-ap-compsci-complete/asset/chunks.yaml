    # 48. 超越数组：ArrayList


    数组在存储值集合方面非常出色，但它们有很多局限性。首先，它们只能容纳相同类型的元素。其次，它们必须在创建时显式定义。最后，创建后无法调整大小。


    为了克服这些限制，有一种更灵活的集合格式，称为`ArrayList`。这种集合可以处理不同类型，并且你可以在创建后更改其值和大小。


    代价是`ArrayList`的语法更复杂。`ArrayList`是一个 Java 类，因此我们需要使用方法来处理其中的属性和值。


    ## 创建 ArrayList


    `ArrayList`类不是基本程序的一部分的默认类，因此我们需要在使用它之前将类导入程序。在代码顶部，你需要添加这一行：


    ```

    import java.util.ArrayList;

    ```


    然后，你可以通过将其类型化到类来创建一个`ArrayList`。在构造函数的括号内，你可以选择定义`ArrayList`中有多少个值，但这不是必需的：


    ```

    ArrayList names = new ArrayList();

    ```


