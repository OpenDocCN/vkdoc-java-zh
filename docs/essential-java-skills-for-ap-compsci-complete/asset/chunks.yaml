    # Simple Java Program Structure


    In our first program, we displayed a single message on the computer. We did this
    using the `System.out.println()` method. This is a command in Java that we can
    use to perform certain actions.


    Well, actually, `println()` is the method really. `System.out` is the class that
    contains the `println()` method we run. And every statement in Java ends with
    a semicolon. Every. One. It is like the period for a sentence.


    You see, almost everything in Java is saved in something called a class. A class
    defines the rules for how parts of our program work. Later, you will learn how
    to work with classes more and even how to make your own. For now, we will need
    to just work with the ones that we already have available to us.


    When we run our code from before


    ```

    System.out.println("Hello, world!");

    ```


    there are a few things that are going on.


    First, everything around this line of code sets up our project in Java. Let’s
    look at it briefly.


    ```

    public class Main {

    public static void main(String[] args) {

    System.out.println("Hello, World");

    }

    }

    Listing 9-1

    Basic program structure

    ```


    In this example code, our `Hello, World` statement is within two specific code
    blocks. A code block is defined using a pair of curly braces, or `{ }`. These
    group the contents within them into a block.


    Blocks have some rules around them, but we’ll cover those later. For now, just
    know that you can take blocks and put them inside of one another. So, in this
    example, we have a `public class Main` code block that starts on line 1 and ends
    on 6. We then have `public static void main` code block that starts on 3 and ends
    on 5.


    Our code is within this inner code block.


    The outer block defines the overall wrapper for our program. Java looks for a
    `main()` method to execute when it builds and runs the program.


    So, Java looks for a class. It finds it.


    Then it looks for the `main()` method, which it also finds.


    Then it runs the code within the method. That’s the code we created and added
    to the project.


    Until we get to object-oriented programming, all of your code will be in the `Main.java`
    file. Soon, we will also create code outside of the constructor.


    Those `public`, `class`, `static`, `void` phrases? Just ignore them for now and
    focus on what we put into the `main()` method. Everything will make sense in time.


    # Text Literals and Output


    Computers take things literally. Like, literally. So much that there are things
    actually called literals.


    Literally.


    “Hello, World” is a literal. A text literal to be precise.


    A text literal contains letters, symbols, punctuation, and numbers and is denoted
    by a pair of quotation marks. The double quotes mark the beginning and the end
    of the literal.


    ## Text Output


    When you run a method like `println()`, it is looking for something called a string.
    A string is another word for text. Think of it like a sequence of letter beads
    on a string.


    When you provide a string to a method that uses a string, it will do something
    with it. In the case of `println()`, it will print it to the screen and then move
    to the next line.


    So, if you have the following statements:


    ```

    System.out.println("Hello");

    System.out.println("World");

    ```


    this would output as


    ```

    Hello

    World

    ```


    Displaying both on two lines.


    But there is another method you can use, `print()`. This works the same way, but
    you don’t move to the next line after the text displays.


    So, if you have these statements:


    ```

    System.out.print("Hello");

    System.out.print("World");

    ```


    this would output as


    ```

    HelloWorld

    ```


    Putting both characters on the same line.


    ## Escape Sequences


    Text literals can contain special characters as well. Take the previous example:


    ```

    System.out.print("Hello");

    System.out.print("World");

    ```


    If you wanted to include a new line in the text literal itself, you can add it
    using the two-letter sequence `\n`.


    This is called the newline character. And it will create a line break in your
    text:


    ```

    System.out.print("Hello\n");

    System.out.print("World");

    ```


    It is essentially the same as


    ```

    System.out.print("Hello\nWorld");

    ```


    And it displays this on the screen:


    ```

    Hello

    World

    ```


    How about this one?


    If you wanted to display the following line, how would you do it?


    ```

    Mike said, "Hey!"

    ```


    This line of text has a quote in it, so if we created a text literal with it,
    we would have


    ```

    "Mike said, "Hey!""

    ```


    But the computer, again, is dumb. So, it will think that the quote before the
    H in Hey is the end of the literal.


    Not what we wanted.


    To get around this, we can use an escape sequence to tell the program that the
    quotes around Hey are part of the literal, not the boundaries of it:


    ```

    "Mike said, \"Hey\""

    ```


    Now the slash quote two-character sequence can allow the literal to include the
    quote.


    There are others you can use too, including the tab space sequence.


    The tab sequence, `\t`, adds a tab space in your text. This is sometimes helpful
    to align things into columns if you get the right sequence setup.


    Like this one:


    ```

    "First\tMiddle\tLast"

    "R.\tDouglas\tWinnie"

    ```


    This would display as


    ```

    First        Middle            Last

    R.           Douglas          Winnie

    ```


    The tab space shifts over to help line things up when you stack statements on
    top of one another.'
