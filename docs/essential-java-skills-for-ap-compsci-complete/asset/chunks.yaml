    \ <= 5); // 小于或等于，结果为 true\n```\n\n### 改变布尔值\n\n你可以通过使用“非”运算符（由一个感叹号表示，作为值、变量或表达式的前缀）来反转任何布尔求值或变量的值。只需将其紧放在求值或变量之前：\n\
