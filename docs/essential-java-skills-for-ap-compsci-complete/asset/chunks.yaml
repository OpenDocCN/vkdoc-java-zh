    我们从 `public` 子句开始，因为我们希望该类在程序中可用，以便使用和创建实例——稍后我们会详细介绍 `public` 子句。然后我们跟上 `class`
    子句，接着是类的名称。类名通常首字母大写，每个单词的首字母也大写且没有空格。这通常被称为帕斯卡命名法。


    现在我们已经定义了类的基本结构，可以开始向类中添加属性，有时也称为字段。这些本质上是变量，对于类的每个实例都是唯一的。就像 Java 中的任何其他变量一样，我们需要将它们声明为基本类型或类类型，然后为它们指定一个有效的变量名。


    我们在类的顶部，类代码块内部定义这些属性。查看我们的角色表，我们需要向法师类添加九个项目。这些包括角色名称、技能属性，以及生命值和魔法值的可消耗资源，请记住生命值和魔法值各有两个独立的值：实例的最大可能值和当前值。


    要定义这些，我们需要声明它们的访问级别，在本例中为 `public`。如果你之前使用过没有类的基本 Java 应用程序，你可能不得不使用 `public static`。对于这个类，我们只需要使用
    `public`：


