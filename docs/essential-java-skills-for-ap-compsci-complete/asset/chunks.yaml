  trans: '

    ## 但事情真的这么简单吗？


    不，并非如此。因为我们总是在做各种假设，而这些假设常常会给我们带来麻烦。


    程序员的部分工作，就是接手复杂的任务，并将其分解为无法再进一步拆解的独立步骤。


    这就像观察水，然后深入探究构成水的分子，再进一步到构成分子的原子。你一直下探到构成该物体基础的最小单元。现在，将这个原理应用到一项行动上。我们常常想当然地认为许多步骤是某个行动集合的一部分。


    让我们看看之前的例子：倒垃圾。


    “倒垃圾”这个短语，可能在你脑海中唤起一些具体的事情。如果有人对我说：“嘿，道格，你能去倒一下垃圾吗？”，我脑海里就会立刻浮现出需要完成的几个步骤。


    以我家为例，我需要完成以下步骤：


    首先，我需要去厨房，从垃圾桶里拿出装满的垃圾袋，然后提着它绕屋子走一圈，把卧室和卫生间里的小垃圾桶清空，倒进这个大垃圾袋里。接着，我把它拿到路边的垃圾桶，放进去。


    就这样！我倒了垃圾。


    但是，这些就是全部步骤了吗？我是否已经足够细致地分解了所有步骤，以确保所有需要发生的事情都发生了？如果我把我提到的这些步骤写下来，让某人严格按照步骤执行，他们会按照我的预期去做吗？


    不，他们很可能不会，因为即使有了这些步骤，我仍然遗漏了一些假设。例如，如果第二天是垃圾回收日，我需要把路边的垃圾桶推到街上。当我说“垃圾”时，我指的是生活垃圾和可回收物，但一个按字面意思理解我的人可能不会这么认为。


    作为一名程序员，你需要让你的代码尽可能精确和字面化。将行动分解成更小的行动，是成功的关键。对于你写的每一行代码，就像“倒垃圾”这个动作一样，你需要定义其中需要发生的每一个语句或动作，以满足你的所有期望，并确保该动作被正确执行。


    所以，当你分解一个流程或任务时，要站在别人的角度思考，看看你列出的步骤是否合理。如果不行，就增加必要的清晰度和细节，使其万无一失，从而获得预期的结果。


    # 8. Hello, World


    编程不仅要知道编写什么代码，还要知道如何将你使用的工具组合在一起，使项目能够运行并与他人分享。


    在我们开始深入编写一些复杂的代码之前，我们应该先弄清楚如何将这些工具组合在一起使用。


    ## 创建你的 IntelliJ Java 项目


    首先，我们需要为项目创建基本结构。为此，我们需要进入 IntelliJ，并使用特定的项目模板创建一个新的 Java 项目。


    ### IntelliJ IDEA


    当你首次启动 IntelliJ 时，你会看到欢迎界面。你也可以通过 **文件** ➤ **打开** 菜单项打开此界面。


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig1_HTML.jpg](img/499634_1_En_8_Fig1_HTML.jpg)


    图 8-1


    IntelliJ 欢迎窗口


    从这里开始，我们需要创建一个新项目，所以，你猜对了，从窗口中选择“**创建新项目**”。


    然后你会看到“新建项目”窗口。在这里，你将定义项目的参数，并设置初始文件夹结构和起始代码，以便开始编码和构建你的项目。


    ### 仅首次：配置 JDK


    项目的一个重要组成部分是将其连接到 JDK。这不会自动完成，需要在首次创建项目时进行配置，并且每次在你的机器上更新 JDK 时，可能需要重复此操作。


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig2_HTML.jpg](img/499634_1_En_8_Fig2_HTML.jpg)


    图 8-2


    新建项目窗口


    这个过程非常简单。


    在“新建项目”窗口的顶部，点击“**新建…**”按钮。


    当你点击“**新建…**”按钮后，你需要告诉 IntelliJ JDK 的安装位置。在 Windows 机器上，它通常位于“**Program Files**”文件夹中；在
    macOS 上，它通常位于“**Library**”文件夹中。


    选择 JDK 的位置以及 JDK 的主文件夹，然后点击 **确定**。


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig3_HTML.jpg](img/499634_1_En_8_Fig3_HTML.jpg)


    图 8-3


    选择 JDK 文件夹


    然后你会看到 JDK 的版本号出现在“新建项目”窗口的顶部。


    ### 创建项目


    配置好 JDK 后，开始操作：在左侧选中 Java，并保持库和框架选项不被勾选。


    点击 **下一步** 继续，离开“新建项目”窗口。


    在下一个屏幕上，你将配置项目模板。


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig4_HTML.jpg](img/499634_1_En_8_Fig4_HTML.jpg)


    图 8-4


    项目模板


    勾选“从模板创建项目”，然后选择“命令行应用程序”。


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig5_HTML.jpg](img/499634_1_En_8_Fig5_HTML.jpg)


    图 8-5


    模板选择


    点击 **下一步** 继续。


    现在你需要给你的项目起个名字。强烈建议项目名称中不要包含任何特殊字符或空格。通常对于作业，你可以使用作业中指定的名称。现在，我们将使用“**HelloWorld**”。


    然后你需要选择项目的保存位置。你可以选择默认文件夹，当你创建项目名称时，它会为你创建一个子文件夹。如果你没看到，可以在 `IdeaProjects` 文件夹下手动创建一个。


    第三个选项是基础包。默认包名为 `com.company`，但我们不会使用它，所以将其删除，并确保该字段为空。


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig7_HTML.jpg](img/499634_1_En_8_Fig7_HTML.jpg)


    图 8-7


    新项目名称和位置


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig6_HTML.jpg](img/499634_1_En_8_Fig6_HTML.jpg)


    图 8-6


    空项目


    完成上述操作后，你应该会看到这个界面：


    当你准备好后，点击 **完成**。


    IntelliJ 将开始工作，创建项目结构和一个存根代码文件，以帮助你入门。

