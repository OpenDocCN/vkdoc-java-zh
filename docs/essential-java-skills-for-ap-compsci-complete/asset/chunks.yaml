- fmt: '# Creating a Class Hierarchy


    In the previous sprint, we explored how a player character, or PC, is defined
    by a class. That class defines the blueprint for every instance of that class
    that can be created. But if we look at multiple classes side by side, we start
    to see some common things between them.


    For instance, if we look at all of these, we can pull out all of the common elements.
    These include the `name`; the attributes for `strength`, `intelligence`, and `agility`;
    and the maximum and current hit points and mana. It is important to call out though
    that the presence of these across all of the classes is what is consistent. The
    rules that define the minimum values and the ways they are calculated are not
    the same—only the fact that they all exist.


    But although these are all consistent in each player class, if we ever change
    the rules of our role-playing game and, say, add another common component, like
    experience or character level, we would need to add it to each player class and
    update each sheet.


    Instead, we could take all of the common items and create a player sheet that
    contains just them, but doesn’t include the rules for constructing the player
    character instance. Then, for each unique class, we can extend or build on the
    basic blueprint and add the unique rules that govern each one, as well as the
    unique attributes that are part of those specific classes.


    This is called a class hierarchy. We have a generic player character class, and
    then add or extend that class, adding all of the unique elements that are part
    of the class we build on top. You can visualize this by creating a sheet with
    the common items that are part of the generic player class. Then using clear transparencies,
    add in the unique items on top of the paper, building out the class.


    The paper underneath is called the superclass. It has a higher hierarchy. The
    transparency that extends the superclass is called the subclass. You can show
    them like an org chart, showing which subclasses extend from a superclass.


    If we look at our five players, we have a collection of items, or objects. But
    what is common for all of the items in our collection? They all are instances
    of subclasses of a common superclass: the generic player class. So, you can say
    that all items in this collection must be instances of a subclass of the generic
    player character class.


    But we have a problem. We now have a player character sheet that we can’t use
    as a character instance. We can’t take the generic player character and use it.
    It doesn’t have any rules that define how it is created, so it is useless. In
    this case, we want the class only to be used a superclass to extend from, but
    we don’t want to create instances of that class. To do that, we would call this
    class an abstract class. Abstract classes can’t be instantiated, since they would
    be useless.


    ## Party Up—All the Same—but All Different at the Same Time


    With five instances of four different classes, we can start to play our role-playing
    game. But this game requires that we form a three-person party that are the active
    players in the game. Players can be substituted for one of the three players in
    the party, but only the players in the party are active in the game.


    The rules for a party state that we need to have one tank, or a character that
    is designed to take extensive damage and use short-range melee style attacks;
    one range, or a character that attacks over a long range; and one healer, or a
    character that has a weak attack, but can heal other players in the party.


    So, in order for us to put our player instances in the right position, we need
    a way to characterize them. These categories indicate that an instance from a
    class contains specific actions or values that are the same, making the class
    an implementer of the category, and that it contains all of the actions that are
    part of that category.


    The category is called the interface, and it defines a unique set of requirements
    for a class to conform to the interface and that an instance can be used in a
    situation that requires a specific interface.


    A class can implement one or many interfaces, like the paladin class. That implements
    two: tank and healer. So any player that is an instance of a paladin can be placed
    in either the tank or healer slot in the three-person party.


    But we should call out something important here. For the healer or tank slots
    in the party, they are requiring the category or interface, not a specific class
    type. So more than one class can be put into that slot—it just needs to implement
    the interface that is required. This is called polymorphism, where we are using
    an interface as a way to support completely different classes, and we are restricting
    the slot to an interface, not to a specific class.


    ## The Essential Tool: The Die


    There is one last thing that we have used but haven’t really called out. The die
    used to help construct our characters. The die was required to determine the values
    of each of the attributes of our player character instances.


    But we didn’t need to create an instance of a die; we just need to use it. We
    just want to take the die and roll it. We would call this action, of rolling the
    die, as a static action. We don’t need to create a unique instance of the die
    in order to roll it. We can simply just roll it.


    ## Class Hierarchy, Polymorphism, Abstract, and Static


    Building off our basic object-oriented programming concepts of classes, instantiation,
    and construction, we can add more structure and flexibility. We can define classes,
    even classes that we can’t create instances of, to serve as a superclass that
    other subclasses can extend and inherit the blueprint of the original class. We
    can also categorize classes using interfaces and use polymorphism to restrict
    objects based on interfaces instead of classes. Finally, we can create classes
    that have static actions that can be called without the need to create an instance
    of a class.


    Next, we will put away the paper and pencil and dive into exactly how we would
    implement this in Java, rebuilding our role-playing game example, but this time
    in code.


    ## 54. Make All the Things…Classes


    Now that we have a basic character class and our character sheets, we can start
    to learn how these can be created in Java as object-oriented classes.


    Classes in Java define four main things:


    1.  What is the name of the class and how does it fit within the hierarchy and
    how is it classified using an interface

    2.  What are the values that are stored and used within each unique instance of
    the class

    3.  What are the actions that each unique instance of the class can perform

    4.  What rules govern how each unique instance is created during construction'
