- fmt: '# Bit Size and Values


    With binary numbers, we can store values that we would ordinarily represent in
    decimal in a format that the computer can store and send or receive. But as we
    think about values, the more digits that are in a number, the larger the value
    can be.


    Let’s take this binary number: `10`. This is a two-bit digit, meaning that it
    contains two digits, each one being a bit, a one or a zero. This two-bit number
    can store four different values and has a maximum value of three. As we add additional
    digits, we increase the maximum value we can store in that binary number.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig6_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig6_HTML.png)


    Figure 15-6


    Binary number bit sizes


    Have you heard the term 8-bit? 8-bit, 16-bit, 32-bit, 64-bit, and higher, these
    are all representations of the number of digits that are available to store in
    a binary number. If we look at an 8-bit number, we have eight columns or eight
    possible digits. If we do the math for each column, we can store a maximum value
    of 255. If we add 0 which is a value of nothing, we can store a total of 256 values,
    from 0 to 255. And what is 2 to the 8th power? It’s 256.


    But 256 is not a very high number. So if we need to store a larger number, we
    need more bits. If we add more to make a 16-bit number, we can store up to a value
    of 65,535 or 65,536 values including 0.


    Need more? Let’s double it to 32-bit. Now we can store 4,294,967,296 values.


    64-bit can store over 18 quintillion values, and the number gets larger and larger
    the more bits we add.


    Using these bits, a computer program can store values in memory. A programmer
    needs to balance the storage requirements of their applications to the amount
    that is available for the program. To help manage that, developers have different
    sizes and types of containers, called variables, that they can use to store information.
    Each variable type has different bit size requirements, meaning that the variable
    has a limited size that the programmer can store values into.


    For example, a programmer might use a variable type that requires a single byte.
    That byte contains 8 bits, so we can store values from 0 to 255. It can only contain
    those values, and it can only contain whole numbers, meaning it can’t carry a
    decimal.


    But 255 isn’t that much, so there are larger and larger types that programmers
    can use to store values. Each larger type reserves a number of bits in the computer’s
    memory. A larger container that uses 32 bits can store a bigger number. In this
    case, a number as high as 4,294,967,295.


    But what about negative numbers? When we write a negative number, like –5, we
    need to put a minus sign before the number. This sign needs to be captured as
    data for the computer to understand. So to store that sign, a bit is reserved
    for whether the number is positive or negative. This creates a “signed” number.
    But, in a 32-bit value, since we lose 1 bit for the sign, we can only use 31 bits
    to store the number. So the range we can store is smaller. As a result, with 31
    bits, we can only store a value up to 2,147,483,647, but with the bit used for
    the positive or negative sign, we have the same range as a number without a sign.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig7_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig7_HTML.png)


    Figure 15-7


    Unsigned and signed numbers


    A programmer can easily store one or a few of these values without worrying about
    numbers. But what about something like a spreadsheet? Let’s assume a single cell
    can store a value using 64 bits. That’s a number that can hold a lot of information
    and can easily store positive, negative, and even decimal numbers for us to do
    calculations with. 64 bits is equal to 8 bytes. So that seems harmless enough.


    But a spreadsheet can contain tons of data in it. In fact, Excel spreadsheets
    can contain 1,048,576 rows and 16,384 columns. That’s 17,179,869,184 cells of
    data! With each one requiring 8 bytes, that’s 137,438,953,472 bytes or 128 gigabytes
    of storage. Yikes! Luckily, programmers and computers have ways to compress and
    reduce the amount of space that files like spreadsheets have to take. But you
    can see how you can quickly take up a lot of room.


    So while it might seem like a computer can handle all the data you can throw at
    it, it isn’t quite that simple. When a developer has to limit themselves to the
    available memory on a phone, which could have only one or two gigabytes of memory,
    with a lot of that already used by the operating system, a lot of care needs to
    be taken in how to use the memory that is available and to avoid slowing down
    the system by taking up too much space.


    ## Overflow


    What happens when we run out of room to store a value? We have a situation called
    overflow.


    Let’s take an 8-bit value. In this number, we have eight bits to store a value.
    We keep flipping the bits to add more and more to the value that can be stored,
    but then we hit a situation where we have to add a ninth bit to the value. But
    since the amount of space reserved won’t fit that, we get an overflow.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig8_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig8_HTML.png)


    Figure 15-8


    Adding 1 to a maximum value


    Some overflows happen, and you get an error. Like when you take a calculator and
    try to get a number larger than the digits that can be displayed on the screen.
    But sometimes, there is no error, and you get something weird. What can happen
    is that the computer just throws away any digits beyond 8. So if I take a number
    like 255, and I add 1 to it, instead of getting 256, I get 0. Because the last
    bit is just…well…thrown away. So what seems like simple math like 186 plus 92
    can yield the impossible answer of 22, not 278.


    Back in the 1990s, computers and programmers had a similar issue when for the
    entire century, years were entered into computers using two digits. So 1985 was
    entered as 85, 1999 as 99. The 19 part was just assumed. So what happened when
    2000 hit? Only the last two digits were stored, so it would be 00, which a computer
    would translate as 1900.


    This problem, called the Y2K bug, or Year 2000 bug, was fixed by having programs
    changed to store years with the full four digits (or more) instead of just the
    last two. So we should be just fine until we hit the year 9999.


    But how are dates stored in the computer anyway? You guessed it, using binary!
    In fact, a common way to store dates is to count the number of seconds since a
    specific date. For many systems and programming languages, dates are stored as
    the number of seconds after midnight, January 1, 1970. This is stored in a signed
    32-bit binary number. It is signed, because computers needed to store dates before
    1970, so it used negative numbers to store it. The first digit in a 32-bit number
    stores the “sign” of the number. Zero for positive, one for negative.


    So for years, 32-bit dates have worked out perfectly fine. Each second another
    bit flips, adding one to the number of seconds that have passed since the start
    of the decade of disco.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig9_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig9_HTML.png)


    Figure 15-9


    Year 2038 bug


    # Unicode


    Using binary, we can represent values of different types in a format that is native
    to a computer. We can do the same with text; we just have to be a little more
    creative about how we do it.'
