    循环允许根据条件重复执行代码块。最基本的循环称为 `while` 循环。该循环以 `while` 语句开头，后跟一个条件，该条件通过求值或表达式定义，其结果是一个布尔值
    `true` 或 `false`。如果条件结果为 `true`，则执行循环内的代码，程序流程返回到顶部并再次测试条件。


    使用 `while` 循环时需要考虑的一个问题是创建无限循环。当顶部的条件始终为 `true` 时，循环将永远运行。这会导致运行时错误，并使程序崩溃。


    **创建 while 循环**


    在以下代码中，使用 `while` 语句创建了一个 `while` 循环，后跟一个条件求值。该求值测试变量 `val` 是否小于 `10`。该变量使用整数字面量值
    `0` 进行初始化。


    ```

    public class Main {

    public static void main(String[] args) {

    // 只要顶部的条件始终为 true，此循环就会运行

    int val = 0;

    while (val < 10) {

    System.out.println(String.format("val = %d",val));

    val++;

    }

    /* 输出

    val = 0

    val = 1

    val = 2

    val = 3

    val = 4

    val = 5

    val = 6

    val = 7

    val = 8

    val = 9

    */

    }

    }

    ```


    循环首先测试条件，该条件为 true，因为 0 小于 10。由于条件为 true，它会运行 while 语句后代码块内的所有代码。在代码块末尾，它会增加存储在
    `val` 中的值（现在为 1），并重复循环。由于存储在 `val` 中的值仍然小于 10，循环再次运行。这一过程持续到 `val` 等于 9。在该次循环执行结束时，`val`
    增加 1 变为 10。当这次循环重复时，顶部的条件现在为 false，因为 10 不小于 10。由于条件现在为 false，循环结束，跳过代码块，程序流程继续。


