    **39. do/while 循环**


    `while` 循环在顶部条件为 `true` 时运行，但你可能遇到需要至少运行一次循环内代码的情况，或者需要在循环末尾测试条件。解决方案是 `do...while`
    循环。`do...while` 循环与 `while` 循环相同，只是条件语句在末尾测试。因此，循环至少会运行一次，如果循环末尾的条件为 `true`，循环将重复。如果末尾的条件为
    `false`，则不会重复循环，程序流程将继续执行下一条语句。


    **创建 do…while 循环**


    `do...while` 循环以 `do` 子句开头，后跟一个由花括号定义的代码块。在代码块之后，添加带有条件语句的 `while` 子句：


    ```

    int a = 5;

    do {

    System.out.println(a);

    a--;

    } while (a > 0);

    ```


    在此示例中，循环将运行五次，从值 5 开始，然后每次循环执行时将其减 1。


    **至少运行一次**


    在以下示例中，循环将运行一次，因为条件在末尾测试：


    ```

    boolean loop = false;

    do {

    System.out.println("Run this loop!");

    } while (loop);

    ```


    **40. 简化赋值运算符**


    有许多快捷方式可用于操作变量的值以节省时间。这些被称为复合赋值运算符，它们对变量的现有值执行数学求值，并将结果分配回同一变量。


    **复合赋值**


    以这段代码为例：


    ```

    int a = 2;

    System.out.println(a);

    a = a + 2;

    System.out.println(a);

    ```


    在此示例中，我们有一个名为 `a` 的整数变量，设置为字面量值 `2`。然后我们获取存储在变量中的值，并执行加法将值增加 `2`。我们将这个新结果 `4`
    分配回 `a`。


    我们可以使用以下语句简化此操作：


    ```

    a += 2;

    ```


    这执行与前一语句相同的操作，但更简洁。


    你可以将这种复合赋值运算符与所有基本算术运算符一起使用，包括加法、减法、乘法、除法和取模：


    ```

    a += 2;

    a -= 2;

    a *= 2;

    a /= 2;

    a %= 2;

    ```


    **递增和递减**


    如果你只想加 1 或减 1，还有两个额外的快捷方式。第一个是递增运算符。要对任何变量加 1，在变量末尾添加两个加号：


    ```

    a = a + 1;

    a += 1;

    a++;

    ```


    这三个语句都做同样的事情：将存储在变量 `a` 中的值加 1。最后一个使用了递增运算符。


    要减 1，只需将加号替换为减号：


    ```

    a = a - 1;

    a -= 1;

    a--;

    ```

