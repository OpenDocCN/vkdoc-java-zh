- fmt: '# Placement and Program Flow


    When you use operators like these, you can use them to change values and display
    values at the same time.


    Let’s look at this example:


    ```

    int a = 1;

    System.out.println(a);      // 1

    System.out.println(a += 1); // 2

    System.out.println(a);      // 2

    ```


    When we use the combined assignment operator in this scenario, we are using it
    to display the value of `a`, while at the same time alter the value. The math
    is performed first, and then the value is displayed.


    Let’s change this to use the increment operator:


    ```

    int b = 1;

    System.out.println(b);      // 1

    System.out.println(b++);    // 1

    System.out.println(b);      // 2

    ```


    When we run this one, something unexpected happens. Even though we are adding
    one to the value using the increment operator, it isn’t displaying it. When we
    redisplay the value, the new increased value displays. So, the value is being
    increased, but it is happening after the value is displayed. That is the order
    the code runs when the increment operator is placed after the variable name.


    We can resolve this by placing the operator before the variable name as a prefix:


    ```

    int c = 1;

    System.out.println(c);      // 1

    System.out.println(++c);    // 2

    System.out.println(c);      // 2

    ```


    Depending on the needs of your program, you may need to place the operator before
    or after the variable. Most scenarios will have you place it after it, but using
    it as a prefix can be valuable in some circumstances.


    ## Code Examples


    The next page shows examples of simplified assignment operators. This code is
    also available in the following GitHub repo:


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```

    public class Main {

    public static void main(String[] args) {

    int x = 10;

    System.out.println("Combined assignment");

    x += 5;     // 15

    System.out.println(x);

    x -= 5;     // 10

    System.out.println(x);

    x *= 2;     // 20

    System.out.println(x);

    x /= 4;     // 5

    System.out.println(x);

    x %= 2;     // 1

    System.out.println(x);

    System.out.println("\nInline combined assignment");

    int a = 1;

    System.out.println(a);      // 1

    System.out.println(a += 1); // 2

    System.out.println(a);      // 2

    System.out.println("\nPost increment");

    int b = 1;

    System.out.println(b);      // 1

    System.out.println(b++);    // 1

    System.out.println(b);      // 2

    System.out.println("\nPre increment");

    int c = 1;

    System.out.println(c);      // 1

    System.out.println(++c);    // 2

    System.out.println(c);      // 2

    }

    }

    ```


