- fmt: '### About Your Project


    When the project is ready, you will see the IntelliJ interface display your main
    project code file, named `Main.java`. This file is where you will be building
    most of your project code in class assignments and homework.


    On the right is the main coding area. This is where you will type your code in
    and you can see syntax errors and get contextual help with the features built-in
    to IntelliJ.


    On the left is the project explorer. You can open and close this using the `Alt-1`
    or `Cmd-1` keyboard shortcuts.


    The Project panel displays all the files that are in your project. The top-level
    folder is called the same name as the project you created. Inside, you will see
    a `src` folder. This contains the source code for your project. If you expand
    this, you will see more details of the files that are in your project, including
    the `Main.java` file that is already open on the right.


    You will see other items here as well. The `.idea` folder contains project settings
    for IntelliJ that help reconfigure the IDE to your previous settings when you
    open the project again.


    The External Libraries section displays all the Java archive files or JARs that
    are part of your project. Remember that the Java JDK includes all the tools for
    Java in JAR files. If you expand this disclosure triangle, you can see all of
    them.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig8_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    The Project panel


    With the initial framework of the project created, we can now write the code for
    our program and work with our local development environment that we have created
    in IntelliJ.


    ## Coding Your Project


    In IntelliJ, you will write all your project code in the code panel. Each code
    file is opened in a tab. Double-clicking a file in the Project panel will open
    it up as a new tab.


    When you create a new project, you will already have a tab open for the `Main.java`
    file.


    ### Writing Your First Program


    I know, I know. So much talking/writing/reading, and not enough coding. Let’s
    put that frustration to rest by writing our first program.


    Now, this program isn’t going to do much. But that’s ok. Keep it simple for now,
    and we will get more complex in time. Trust me.


    In your code panel, you will see a line that says:


    ```

    // write your code here

    ```


    Well, guess what? That’s where your code goes!


    Place your cursor at the end of that line of text and press `Enter` or `Return`.


    Now, write the following line of code, making sure it is spelled, capitalized,
    and punctuated exactly as it is displayed:


    ```

    System.out.println("Hello, World!");

    ```


    When you are finished writing that line of code, the code panel should look like
    what is shown in Figure [8-9](#499634_1_En_8_Chapter.xhtml#Fig9).


    With the program code complete, we can now compile, build, and run the program
    right inside of IntelliJ.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig9_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Finished `Main.java` file


    #### Compile and Run Your First Program


    Open **Run** ➤ **Run ‘Main’** from the menu. This will compile your program into
    Java Bytecode, building a `.class` file that will be added to your Project panel.


    You will see the program begin to compile and a new panel will open at the bottom,
    the Run panel. This will display the results of the compilation. If there are
    any errors, it will list them out. In this case, there are no errors and the program
    runs, displaying the text “Hello, World!” on the screen.


    Congrats! You have built and run your first Java program.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig10_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Displaying program output


    There are some things we should look at in the Project panel however. You’ll see
    a new folder called `out`. This folder contains the compiled bytecode for your
    project.


    You will see a file called `Main.class`. If you remember, this file is the compiled
    Java bytecode that runs in the JRE. This is stored here in your project to then
    run on the computer. The output of the program is directed to the Run (sometimes
    called the Output) panel.


    Now that we have a successfully running project, we should save the code to GitHub
    if we ever need to go back to this point later if we make changes.


    ## Create Your Repo in GitHub


    With our code saved on our local computer, we need to create a repo in GitHub
    for us to work with changes to our code and share it with other people.


    First, open a browser and go to [`www.github.com`](http://www.github.com). From
    there, we will create a new repo and upload our code.


    Log in to your account, and you should see the dashboard, like the one that is
    shown in Figure [8-11](#499634_1_En_8_Chapter.xhtml#Fig11).


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig11_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    GitHub.com dashboard


    From here, click the green **New** button on the left, or click the plus button
    next to your account gravatar and select **New repository**.


    Give your repository a name, usually defined in the homework or assignment. For
    this example, we will use **HelloWorld**.


    Give your repo a description, like “**First project in GitHub**.”


    Keep the project Public and check the **Initialize this repository with a README**
    option. We will be using the README to share information about our project.


    You can leave all of the other options as is. Your page should look like the one
    in Figure [8-12](#499634_1_En_8_Chapter.xhtml#Fig12).


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig12_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    New repository settings


    Click the **Create repository** button at the bottom of the page.


    You will now see the repository landing page, and you will see a single file,
    `README.md`, has been created and added to your repository.


    We can edit this file directly in GitHub. Click the pencil icon in the right side
    of the title bar where the `README.md` section starts.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig13_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Editing `README.md`


    This is in a special format called Markdown. Markdown is a special language for
    writing formatted text. There are special extensions of the language that are
    specific to GitHub to help build documentation and other features for other developers
    to use.


    I’m going to use this for my class at school, so I’ll add “**Serra High School,
    AP CompSci**.”


    At the bottom, you can now save this change or commit it to the repository. Add
    a summary of the change, and then add an optional description like the one in
    Figure [8-14](#499634_1_En_8_Chapter.xhtml#Fig14).


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig14_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig14_HTML.jpg)


    Figure 8-14


    Commit change information


    Then click the **Commit changes** button at the bottom.


    You will now see the changes shown on the page.


    ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig15_HTML.jpg](images/499634_1_En_8_Chapter/499634_1_En_8_Fig15_HTML.jpg)


    Figure 8-15


    Seeing changes made to `README.md`


    You have just created your first commit. Commits are changes that you wish to
    add to your project and track changes over time.'
