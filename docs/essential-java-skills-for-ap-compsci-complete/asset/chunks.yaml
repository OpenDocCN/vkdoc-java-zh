    ## 35. Documenting with JavaDoc


    Only part of being a software developer or engineer is about building code. A
    large portion of your role is to build documentation to support your other developers
    and potentially external developers who use your code to use it correctly. To
    assist with this task, a tool called JavaDoc allows you as a developer to create
    specially coded comments to hold documentation around specific methods and components
    of your code.


    ### Using JavaDoc Syntax


    JavaDoc uses unique codes to denote sections of code that are parsed by the JavaDoc
    builder to create HTML documents for your code. When you update your code, you
    should rerun JavaDoc to ensure that your documentation is up to date. The following
    is an example of code that uses JavaDoc:


    ```java

    /** The Main class defines the entire project

    *

    * @author Doug Winnie

    * @version 1.0

    */

    public class Main {

    /** integer variable that is used for calculations **/

    public static int val;

    /**

    * The main method executes automatically when the program launches

    * @param args [Not used] Holds launch arguments for the program

    */

    public static void main(String[] args) {

    val = 5;

    multiply(347, val);

    }

    /**

    * Calculates the product of two integers

    * @param a Integer for the first multiplier

    * @param b Integer for the second multiplyer

    * @return Integer value of the product of a and b

    */

    public static int multiply(int a, int b)

    {

    return a*b;

    }

    }

    ```


    At the top is the documentation for your class, in this case, the `Main` class.
    A JavaDoc comment starts with `/**` vs. the normal `/*`. The `@author` and `@version`
    tags are used to define the coder and version number of the program. In the `Main`
    class, you create a description for each value member of the class using a `/**
    */` comment before each member. For a method, you create a `/** */` comment, and
    the first line is the description of the method. Then each parameter is denoted
    using the `@param` tag, followed by the parameter name and then the description.
    If a method returns a value, use the `@return` tag and then provide a description
    of what it returns. IntelliJ will assist with the completion of JavaDoc comments
    after you complete the method. To do this, create your method, and then before
    it, start with the `/**` comment starting tag and press enter. It will create
    the comment framework, and then you can complete all of the sections.


    ### Generating Documentation


    When you create your code with JavaDoc, IntelliJ will highlight several of the
    items in your code and will also autocomplete some sections when you begin typing
    them.


