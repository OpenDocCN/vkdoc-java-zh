  trans: "\n## 文本编码\n\n也许你曾使用过解码环。借助解码环，你可以将包含字母的消息，通过它找到每个字母对应的数字或符号。你可以拿这样一句话为例，为每个独特的字母分配一个代表它的符号。利用这种方法，你可以将每个字母转换成新的代码。这被称为**编码**。你正在将原始文本转换为一套独特的代码。\n\
    \n在另一端，如果我收到一条使用这些符号的消息，我可以取出每个符号，并使用相同的解码环，将符号与字母匹配，从而将消息**解码**回其原始格式。\n\n编码和解码过程必须在两端保持一致并达成共识。如果一端使用的解码环与另一端不同，我们就无法通信。这种达成共识的方法被称为**协议**，它在通信的两端都会被使用。\n\
    \n现在，我们可以用数字来代替符号来表示我们的协议。这些数字与我们想要通信的每个字符唯一对应。\n\n但这仅仅是简单的字母表。我们可以将其表示为大写字母和小写字母。此外还有标点符号、常见的国际字符、希腊字母、特殊符号，以及用于在屏幕上绘制方框和线条的块状构建符号。\n\
    \n另外还有一些非打印字符，比如空格、换行、退格等。\n\n现在你拥有了一套独特的字符集，每个字符都有一个对应的数字。但请记住，计算机需要以二进制格式存储数字，因此每个数字都会被转换成二进制。在这种情况下，我们有\
    \ 256 个字符，它们存储在一个字节（即 8 位）中。\n\n## ASCII + Unicode\n\n这种单字节编码系统被称为 **ASCII**（美国信息交换标准代码），最早开发于\
    \ 20 世纪 60 年代初。随着时间的推移，该系统不断扩展以包含更多字符。但在某个节点，世界上需要表示的符号或字形实在太多，ASCII 已经无法满足需求了。\n\
    \n一种名为 **Unicode** 的新标准使用多个字节来表示来自世界各地语言的成千上万个符号，甚至包括失落文明的古老符号和语言（甚至还有一些来自科幻小说！）。更常见的字符需要更少的位来存储，这可以在存储或传输时节省空间和时间。较不常见或更复杂的字符则需要更多位。\n\
    \n网络标准化采用了 **UTF-8** 格式，即 8 位 Unicode 转换格式。它向后兼容 ASCII。每个字符使用前缀 `U+` 后跟一个四位十六进制数来表示。因此，字母“D”表示为\
    \ `U+0044`。四位十六进制数需要 2 个字节（即 16 位）来存储。因此，仅使用 2 个字节，就可以编码和解码超过 65,000 个符号。这被称为\
    \ Unicode 的**平面 0**。对于更多字符，会添加额外的位来创建新的平面。目前，主要使用的是三个平面：平面 0、平面 1 和平面 2。还有其他未使用或可自定义的平面，最高可达平面\
    \ 16。总的来说，整个 Unicode 范围可以存储 1,114,112 个符号，这些符号被称为“码点”。这可是非常多的字母！\n\n## 表情符号\n\n\
    你每天都在使用 Unicode。你在手机和设备上使用的所有表情符号都是 Unicode 中的符号。\n\n这就是为什么通常情况下，当表情符号被添加到一个平台时，它们也会被添加到其他平台。这就是标准的工作方式。为了使一项技术符合标准，它需要保持对其支持的更新。这包括标准随时间变化和适应的情况。\n\
    \n# 17. 变量\n\n计算机拥有所有的内存，所以我们得能够存储一些东西，对吧？\n\n要在我们的程序中做到这一点，我们使用**变量**，但每个变量只能处理特定类型的值，即**字面量**。\n\
    \n使用变量需要我们（最终）定义三件事。\n\n## 变量的基本要素\n\n首先，我们需要确定要存储的值的类型。这就是**值类型**，我们已经遇到过几种，比如整数、浮点数、字符串等等。\n\
    \n其次，我们需要为每个变量赋予一个唯一的**名称**。变量名有一些规则。它们必须以字母、`$` 或 `_` 字符开头。它们区分大小写。它们不能是 Java\
    \ 中的**保留字**。\n\n除了这些规则，还有一些建议。首先，你应该使用**驼峰命名法**，这意味着你将单词连接起来，第一个单词的首字母小写，后续每个单词的首字母大写。所以，我的名字\
    \ `Doug Winnie` 会变成 `dougWinnie`。\n\n第三，我们需要为变量**赋值**。该值必须与变量的类型匹配，例如，将一个整数值赋给一个整数变量。我们使用赋值运算符（即等号\
    \ `=`）来赋值。\n\n赋值总是从右向左进行。右边的任何值都会被赋给我们左边定义的变量容器。\n\n一旦我们有了一个带有值的变量，我们就可以像使用任何字面量一样使用它。\n\
    \n## 代码示例\n\n下一页的代码展示了在多种情况下使用多种类型变量的示例。\n\n该代码也可在以下 GitHub 仓库中找到：\n\n[`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)\n\
    \n```\npublic class Main {\npublic static void main(String[] args) {\n// I: 定义一个变量\n\
    int quantity;\ndouble price;\nString name;\nchar initial;\n// II: 使用赋值运算符为变量赋值\n\
    quantity = 5;\nprice = 2.50;\nname = \"Doug\";\ninitial = 'W';\n// III: 输出变量\n\
    System.out.printf(\"%s %s. bought %d items priced at %f each\\n\",name,initial,quantity,price);\n\
    /* 输出\nDoug W. bought 5 items priced at 2.500000 each\n*/\n// IV: 更新变量的值\nquantity\
    \ = 10;\nprice = 1.99;\nname = \"Mike\";\ninitial = 'J';\n// V: 输出更新后的变量\nSystem.out.printf(\"\
    %s %s. bought %d items priced at $%.2f each\\n\",name,initial,quantity,price);\n\
    /* 输出\nMike J. bought 10 items priced at $1.99 each\n*/\n// VI: 在一行内初始化并赋值\nint\
    \ myNumber = 5;\n// VII: 将一个变量赋值给另一个变量\nint myValue = myNumber;\n}\n}\n列表 17-1\n\
    使用变量\n```\n\n# 18. 数学运算！\n\n虽然在编程和 Java 中你可以用数学做很多事情，但我们将在这里介绍基本内容，从基本的算术运算符开始。\n\
    \n## 基本运算符\n\nJava 中使用的基本运算符包括加法、减法、乘法、除法和取模。\n\n除了取模之外，这些运算符都相当不言自明。取模本质上是除法后的余数。当你将两个数相除时，余数就是取模的结果。\n\
    \n## 运算顺序\n\n计算基于代数的运算顺序：\n\n*   首先完成分组（基于括号）。\n\n*   乘法类函数：\n    *   乘法\n\n \
    \   *   除法\n\n    *   取模\n\n*   加法类函数：\n    *   加法\n\n    *   减法\n\n计算从左到右进行。\n\
    \n## 字符串拼接\n\n虽然你不能“相加”字符串，但你可以将它们彼此组合。这被称为**拼接**，你使用加法符号来实现。\n\n你可以将多个字面量和变量类型拼接在一起。当你这样做时，它们都会被转换为字符串。\n"
- fmt: '# Code Examples


    The next page shows examples of basic operators for both integer and decimal type
    values, order of operations, and string concatenation.


    This code is also available in the following GitHub repo:


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```

    public class Main {

    public static void main(String[] args) {

    // I: Define and set values for examples

    int a = 2, b = 5, c = 100;

    float foo = 3.0f, bar = 10.5f, baz = 85.25f;

    // Integer Examples

    //

    // II: Addition

    int z = a + b; // 2 + 5 = 7

    System.out.printf("The sum is: %d\n",z);

    // Output: The sum is: 7

    // III: Subtraction

    int y = b - c; // 5 - 100 = -95

    System.out.printf("The difference is: %d\n",y);

    // Output: The difference is: -95

    // IV: Multiplication

    int w = a * c; // 2 * 100 = 200

    System.out.printf("The product is: %d\n", w);

    // Output: The product is: 200

    // V: Division

    int v = c / b; // 100 / 5 = 20

    System.out.printf("The quotient is: %d\n", v);

    // Output: The quotient is: 20

    // VI: Modulo

    int u = b % a; // 5 % 2 = 1

    System.out.printf("The remainder is: %d\n", u);

    // Output: The remainder is: 1

    // VII: Integer division

    int t = b / a; // (int)5 / 2 = 2

    System.out.printf("The integer quotient is: %d\n", t);

    // Output: The integer quotient is: 2

    // Float Examples

    //

    // VIII: Float Multiplication

    float qux = foo * bar; // 3.0f * 10.5f = 31.5f

    System.out.printf("The float product is: %f\n", qux);

    // Output: The float product is: 31.500000

    // IX: Float Division

    float quux = baz / bar; // 85.25f / 10.5f = 8.119047f

    System.out.printf("The float quotient is: %f\n", quux);

    // Output: The float quotient is: 8.119047

    // X: Integer to Float Division

    float quuz = b / a;

    System.out.printf("The quotient is: %f\n", quuz);

    // Generates a float, but based on the integer quotient

    // Output: The quotient is: 2.000000

    // XI: Order of operations

    int corge = 2 + 5 * 12 + 6 / 2;

    System.out.printf("The result is: %d\n", corge);

    // 2 + 60 + 6 / 2

    // 2 + 60 + 3

    // 62 + 3

    // 65

    // Output: The result is: 65

    int grault = (2 + 5) * (12 + 6) / 2;

    System.out.printf("The result is: %d\n", grault);

    // 7 * (12 + 6) / 2

    // 7 * 18 / 2

    // 126 / 2

    // 63

    // Output: The result is: 63

    // XII: String concatenation

    String garply = "Doug" + "Winnie";

    System.out.println(garply);

    // Output: DougWinnie

    garply = "Doug" + '' '' + "Winnie";

    System.out.println(garply);

    // Output: Doug Winnie

    // XIII: Concatenation literal

    System.out.println("The product of " + a + " and " + b + " is " + a*b + ".");

    // Output: The product of 2 and 5 is 10.

