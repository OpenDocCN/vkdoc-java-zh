    ## 创建随机数生成器


    处理随机数需要使用一个名为 Random 的特殊类。


    在使用某些类（如 `Math`）时，我们只需使用类名及其后的方法名即可。这被称为静态类。我们无需对其进行任何特殊处理。`Math` 类中有一个我们可以使用的方法，但我们将学习一些新知识。


    在使用某些类时，我们不能直接使用它们；我们需要创建它的一个实例，这类似于根据蓝图建造一所房子，然后才能使用它。`Random` 类就是这种情况。


    其工作原理如下：


    ```

    Random rand = new Random();

    ```


    这和我们之前做的有些不同。从技术上讲，这被称为实例化。我们将在课程后面更深入地了解它的含义。但要点是：我们有一个名为 `Random` 的类，我们正在创建它的一个新副本，并将该副本赋值给一个名为
    `rand` 的变量容器。


    你会注意到，在你的代码顶部，IntelliJ 会添加一行称为 `import` 语句的代码。如果没有，则需要将其添加到代码的第一行：


    ```

    import java.util.Random;

    ```


    现在，我们可以使用名称 `rand`（或你在程序中给它起的任何名称）来引用属于 `Random` 类的所有方法。


    这样，我们现在就有了一个随机数生成器，它可以在我们的程序中生成我们想要的任何随机整数或小数。


    ```


    随机整数


    创建随机整数需要使用 `Random` 类的 `nextInt()` 方法。


    ```

    Random rand = new Random();

    int digit = rand.nextInt(10);

    ```


    在这个例子中，`digit` 将包含一个*小于* `10` 的随机整数。它永远不会等于 `10`。这意味着它可以是 `0`、`1`、`2`、`3`、`4`、`5`、`6`、`7`、`8`
    或 `9`。


    如果我们想模拟掷骰子，我们需要调整代码，确保数字能输出正确的可能值。


    ![../images/499634_1_En_21_Chapter/499634_1_En_21_Fig1_HTML.png](img/499634_1_En_21_Fig1_HTML.png)


    图 21-1

    操作数字范围


    如果我们像这样创建一个简单的随机数生成器：


    ```

    int die = rand.nextInt(6);

    ```


    我们将生成数字 `0`、`1`、`2`、`3`、`4` 和 `5`。然而，骰子上没有 0（至少我见过的没有），而且最大数字是 6。


    所以我们可以通过向可能的数字范围添加 `1` 来解决这个问题：


    ```

    int die = rand.nextInt(6) + 1;

    ```


    现在，我们骰子的可能值是 `1`、`2`、`3`、`4`、`5` 和 `6`。


    随机小数

    我们也可以生成随机小数，但过程略有不同。有 `nextFloat()` 和 `nextDouble()` 方法，但我们不能定义最大值。


    当你运行这些方法时，你将生成一个介于 `0` 和 `1` 之间的随机小数：


    ```

    double decimal = rand.nextDouble();

    ```


    小数的值将在 `0` 和 `1` 之间，但永远不会等于 `0` 或 `1`。


    如果我们需要调整这个范围，我们需要再次操作数字范围。我们通过乘法（或除法）来扩展它，并通过加法（或减法）来移动它。


    ![../images/499634_1_En_21_Chapter/499634_1_En_21_Fig2_HTML.png](img/499634_1_En_21_Fig2_HTML.png)


    图 21-2

    操作小数范围


    如果我们知道自然范围在 `0` 和 `1` 之间，我们需要确定我们需要生成的数字的总范围。我们可以通过最大值和最小值的差来确定范围。然后我们将范围乘以该值。

    所以现在范围在 `0` 和 `10` 之间。我们快完成了。


    接下来，我们需要调整以达到所需的最小值。然后我们将最小值加到范围上。所以加上 `-5` 会将范围进一步向左移动。现在范围在 `-5` 和 `5` 之间。


    ```

    double max = 5;

    double min = -5;

    double decimal = rand.nextDouble() * (max - min) + min;

    ```


    代码示例

    下一页展示了创建随机整数和小数值的示例。

    此代码也可在以下 GitHub 仓库中找到：


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```

    import java.util.Random;

    public class Main {

    public static void main(String[] args) {

    // I: 创建随机数生成器

    Random rand = new Random();

    // II: 生成一个从 0 到 9 的数字

    int digit = rand.nextInt(10);

    System.out.printf("随机数 x < 5: %f \n", decimal);

    // V: 快艇骰子

    int die1 = rand.nextInt(6) + 1;

    int die2 = rand.nextInt(6) + 1;

    int die3 = rand.nextInt(6) + 1;

    int die4 = rand.nextInt(6) + 1;

    int die5 = rand.nextInt(6) + 1;

    System.out.printf("骰子 1: %d\t 骰子 2: %d\t 骰子 3: %d\t 骰子 4: %d\t 骰子 5: %d", die1,
    die2, die3, die4, die5);

    }

    }

    清单 21-1

    随机数生成

    ```


    22. 捕获输入


    到目前为止，我们的程序都是单向的。有点枯燥。

    为了让它们更具交互性，我们需要一种方法来捕获用户的输入。最基本的方法是使用键盘，让用户通过键入来输入信息。任何编程语言最基本的功能之一就是能够与系统进行标准输入和输出，有时称为
    I/O。到目前为止，我们只使用 `System.out` 执行了单向操作；现在我们可以学习 I/O 的另一面，即使用 `System.in`。


    你好，Scanner

    为了捕获输入，我们使用 `Scanner` 类。`Scanner` 的功能远不止处理键盘输入，但我们稍后会讲到。就像 `Random` 类一样，我们需要创建它的一个命名实例，记得在代码顶部导入它，然后就可以使用它了。


    这次，我们需要指定 `Scanner` 类将使用什么作为输入。我们使用 `System.out` 将输出发送到屏幕；那么，很自然地，我们会使用 `System.in`。这将我们连接到系统的输入流，我们可以使用
    `Scanner` 来捕获它：


    ```

    Scanner s = new Scanner(System.in);

    ```


    在我们的代码顶部应该有一个像这样的 import 语句：


    ```

    import java.util.Scanner;

    ```


    现在我们可以使用变量 `s` 来触发 `Scanner` 捕获用户的输入。


    捕获字符串

    要使用 `Scanner` 类，我们用一个变量来接收 `Scanner` 类实例捕获的输入。当程序遇到这行代码时，它会暂停并等待用户使用键盘输入内容。


    然后它会获取该输入，进行一些处理，然后将其赋值给该变量：


    ```

    System.out.print("你叫什么名字？ ");

    String name = s.next();

    System.out.printf("你好，%s！ \n", name);

    ```


    在前面的例子中，我们在屏幕上显示了一个简单的字符串。注意我们使用的是 `print()` 而不是 `println()`。这会将光标放在行尾，这样看起来就像我们直接回应了问题。

    第二行创建了一个名为 name 的变量，类型为 `String`。然后它访问 `Scanner` 实例 `s`，并触发 `next()` 方法。这将捕获键盘输入的任何内容，直到用户按下
    Enter 或 Return 键，然后将这些字符作为字符串发送给变量 name。

    然后我们可以将其发送到屏幕。


    捕获整数

    对于整数，过程基本相同，但由于使用 `next()` 捕获时所有内容都被视为字符串，我们需要使用一个名为 `nextInt()` 的特殊方法。


    这会将输入解析为整数，使其成为正确的值类型：


    ```

    System.out.print("你想买多少个？ ");

    int qty = s.nextInt();

    System.out.printf("购买 %d 件物品 \n", qty);

    ```


    捕获小数


    同样的事情——一个不同的方法，但它会使用 `nextDouble()` 或 `nextFloat()` 转换为正确的格式：


    ```

    System.out.print("价格是多少？ ");

    double price = s.nextDouble();

    System.out.printf("该物品价格为 $%.2f。 \n", price);

    ```


    代码示例

    下一页展示了从用户捕获输入的示例。

    '
- fmt: '```java

    import java.util.Scanner;

    public class Main {

    public static void main(String[] args) {

    // I: Create a scanner, point to the system input

    Scanner s = new Scanner(System.in);

    // II: Capture a string

    System.out.print("What''s your name? ");

    String name = s.next();

    System.out.printf("Hey there, %s! \n", name);

    // III: Capture an integer

    System.out.print("How many do you wish to buy? ");

    int qty = s.nextInt();

    System.out.printf("Buying %d items \n", qty);

    // IV: Capture a decimal

    System.out.print("What is the price? ");

    double price = s.nextDouble();

    System.out.printf("The item costs $%.2f. \n", price);

    // Wrap up

    System.out.printf("%s bought %d items for $%.2f each, totaling $%.2f \n", name,
    qty, price, qty * price);

    }

    }

    ```


    ## 23. Creating Trace Tables


    Part of programming is thinking like a computer. We already have covered how flowcharts
    are a big part of programming and planning out what your program will do step
    by step before you write a line of code. But you also need to know how your code
    flows and works as it executes. To do that, we can create a trace table that runs
    through our code step by step, so we can understand the flow of the code.


    ### It’s a Spreadsheet


    A trace table is essentially a spreadsheet. You have a minimum of four columns.
    The first is a numbered index of all the steps your program runs through.


    ![../images/499634_1_En_23_Chapter/499634_1_En_23_Fig1_HTML.jpg](images/499634_1_En_23_Chapter/499634_1_En_23_Fig1_HTML.jpg)


    **Figure 23-1** Example trace table


    The second is the code itself that runs on that line. The third is the input,
    if any, that the user puts into the program at that point. The fourth is the output
    on the screen or the details of any evaluation that is calculated on that line,
    for instance, a mathematical formula. The rest of the columns represent all of
    the variables that you create in the project, with the first row defining the
    value type of the variable.


    ### Um. Why?


    So, why do this? Well, when you take the AP test, you will have *nothing* to help
    you. Normally, when you program, you will be able to run and pause your program
    using a procedure called debugging. Or if there is a problem, the program will
    end, and you will get some sort of error. But when you are sitting in the chair,
    staring at code on the AP test, you won’t have any of those to benefit you. So,
    building your skills to understand program flow completely on your own will be
    an incredible asset for you as you prep for the exam.


    For a while, all of our program assignments will now require creating a trace
    table. As the projects get more and more complex, we won’t do them as much. But
    for now, most assignments will require you to create a flowchart, the code for
    the project, and a trace table that will step through all of the code in your
    project. Whenever you encounter a situation where you need to input values, you
    will input them on paper. Random numbers you will generate on your own. But in
    the end, you will step through every line of code from beginning to end.


    ## 24. Methods


    Methods are named sections of code that you can use to repeat actions multiple
    times by referring to the method name. Methods have similar rules to variable
    names where you can’t start them with numbers or special characters. Methods are
    named using camelCase just like variables.


    ### Method Basics


    When you call a method, you provide the method name followed by a pair of parentheses.
    Later, we will learn how to use these parentheses to provide values to work with
    inside the method. You can think of calling a method as replacing that method
    name with the lines of code within it from where it was called. This will come
    in handy when we talk about methods that can return values later on.


    ```java

    public static void main(String[] args) {

    displayMsg();

    }

    ```


    ### Writing a Method


    We define a method outside of the `main()` method in our program code. It is important
    to place it outside of the `main()` method, but still keep it within the `Main`
    program class. A method needs to define what type of method it is; you define
    that at the beginning of the method declaration.


    ```java

    public static void displayMsg() {

    System.out.println("This is within the method");

    }

    ```


    In the preceding method definition, you start with a reserved word like `private`
    and `static`. This determines the amount of access that a user has to a method
    call. Right now, all of our code is in the same file, or class, but later when
    we define our own custom classes, we will change how this works. Notice that it
    matches the reserved words before the `main()` class listed earlier.


    The next word, `void`, defines what type of value the method returns when it is
    finished. Our method doesn’t return a value, so we state that using the `void`
    statement. Later, we will change this with the value type that is returned by
    the method. Finally, we create a matching pair of braces and place the code that
    will run when the method calls inside it.


    ### Call a Method


    In the `main()` method, we can call the method in our project by entering just
    the method name followed by a pair of parentheses. Make sure there is no space
    between the method name and the parentheses.


    ### Method Flow


    When you build and run the program, the contents of the `main()` method will run
    as usual. When it encounters the method call, it diverts the flow of the execution
    of code to within the code in the method. In the method, it then executes the
    code inside of it, in this case display a statement on the screen.


    ### Code Guide


    The following code guide shows you an example method and how to create and call
    it.


    ![../images/499634_1_En_24_Chapter/499634_1_En_24_Fig1_HTML.png](images/499634_1_En_24_Chapter/499634_1_En_24_Fig1_HTML.png)


    **Figure 24-1** Main class method: no inputs, no return value


    ### Code Examples


    The next page shows examples of capturing input from the user. This code is also
    available in the following GitHub repo:


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```java

    public class Main {

    public static void main(String[] args) {

    displayMsg();

    }

    public static void displayMsg() {

    System.out.println("This is within the method");

    }

    }

    ```


    ## 25. Calling Methods Within Methods


    Methods can be called within each other as well. When you enter a method within
    another method, you are digging deeper into the code, and when that inner method
    ends, you return to the method that called it. Be careful not to have infinite
    recursion, where you call a method within itself!


    ### Methods Within Methods


    When you call methods within methods, you are going deeper into the operation
    of the program. At each level, when you go deeper, you need to step out of it
    in the order you step in.


    Like this code:


    ```java

    public static void main(String[] args) {

    outMethod();

    System.out.println();

    inMethod();

    }

    public static void outMethod() {

    System.out.println("Outer Method");

    inMethod();

    }

    public static void inMethod() {

    System.out.println("Inner Method");

    }

    ```


    The code starts in the `main()` method. When it encounters the `outMethod()` call,
    it steps into the `outMethod()` and displays the message “Outer Method”. Inside
    of that method, it encounters the call for `inMethod()`. It then steps deeper
    into the program and executes the content of the `inMethod()`. When that method
    ends, it returns to where the program previously was, which was in the `outMethod()`.
    Then that method ends, and it returns to the `main()` method. There, it prints
    a blank line on the screen and executes the `inMethod()` again. This time, when
    it executes it, it brings the program flow back to the `main()` method when it
    is finished. Then the program ends.


