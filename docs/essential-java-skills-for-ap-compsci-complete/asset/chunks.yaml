- fmt: '# 15. Binary


    We can represent the binary states of “on” and “off” as numbers. The binary number
    system is based on only two digits: one and zero. For a binary state of on, that’s
    represented by a one. For a binary state of off, that’s represented by a zero.


    But storing a single value doesn’t make much sense on its own. You would want
    to store multiple values in a row. To do that, you would create a string of them,
    and since they are all numbers, you are just creating a larger number with multiple
    digits or bits.


    A grouping of eight binary digits is called a byte, spelled with a y. A byte is
    a common measure of data that we use every day. A kilobyte is 1024 bytes. A megabyte
    is 1024 kilobytes. A gigabyte is 1024 megabytes, and a terabyte is 1024 gigabytes.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig1_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig1_HTML.png)


    Figure 15-1


    Memory and storage sizes


    On a computer, you might have a drive that can store a terabyte of data. A terabyte
    can contain almost nine trillion bits. That’s over nine trillion individual states
    of on or off.


    But what do we do with all of these bits?


    Each of these bits holds an on or off state that represents a tiny part of a larger
    piece of information, whether it is a single number, a piece of text called a
    string, a document, a photo, a song, a movie, or a computer program. All of these
    things we work with every day are translated to bits that are stored, transmitted,
    and translated by computers and networks.


    The process of taking information that we recognize today, like a string of text,
    and converting it to binary is called encoding. You are taking something that
    we represent in a way humans can understand it and are finding a way to convert
    it using a specific process into a string of binary digits that can be transmitted,
    processed, and stored by a computer or network.


    Using that same process, but in reverse, those individual binary digits can be
    converted back to the information we work with every day. This is called decoding.
    It reconstitutes the files that are transmitted or accessed and presents them
    to us in a format we can recognize.


    But in order for the encoding and decoding process to work, the bits that contain
    these values need to be stored, accessed, or transmitted. The way this is done
    is by developing a protocol, or set of rules, for how bits are transmitted and
    defines the basis for how all computer communications work.


    ## Binary Numbers


    Binary states are the basis of how computers store, process, and share information
    using states of on or off. Using the binary number system, we can represent these
    states using a base 2 system with two digits: zero and one.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig2_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig2_HTML.png)


    Figure 15-2


    Decimal vs. binary


    Using the rules of number systems, we can create a system for what a binary digit
    looks like. We have a maximum of two possible digits: zero and one. We then also
    have multiple columns that exponentially increase in value from right to left
    based on two, the base number of the system. If we count up from zero, we can
    see how binary begins to work. First, I start with zero, then I add one, making
    it one. If I add another one, I have maxed out the possible number of digits in
    the first column, so I then carry that over to the next column, and return back
    to zero in the first.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig3_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig3_HTML.png)


    Figure 15-3


    Counting to “10” in binary


    We continue to add one, adding digits to the number, and eventually get one that
    is several digits consisting of multiple ones and zeros. Using the formula we
    can apply to each column, we can take each column and multiply the digit by the
    base number raised to the power of the column. Let’s walk through that column
    by column.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig4_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig4_HTML.png)


    Figure 15-4


    Converting binary to decimal


    We have the number `10011`. Starting from the right, we take the column which
    is `2` to the `0` power which is `1` and multiply it by the digit, which makes
    `1`.


    The next column is `2` to the `1st` power, which is `2`; multiply it by `1` which
    is `2`.


    Next we have `2` to the `2nd` power, which is `4`, times `0` is `0`.


    Next is `2` to the `3rd` power, which is `8`, times `0` is `0`.


    And last, we have `2` to the `4th` power, which is `16`, times `1` is `16`.


    Then we add all of those together: `16`, plus `0`, plus `0`, plus `2`, plus `1`,
    totaling `19`.


    We can also do this in the other direction. Let’s take the number `23`.


    ![../images/499634_1_En_15_Chapter/499634_1_En_15_Fig5_HTML.png](images/499634_1_En_15_Chapter/499634_1_En_15_Fig5_HTML.png)


    Figure 15-5


    Converting decimal to binary


    We can use the formulas for the binary digit columns to convert the decimal number
    to binary.


    We would need to find the largest power of `2` that is less than `23`, which is
    `16`. We would then put a `1` in that column and subtract `16` from `23`, leaving
    `7`.


    The next column is `2` to the power of `4`, or `8`. The number we are carrying
    over is too small, so we put a `0` and move on.


    The largest power of `2` in `7` is `4`, so we put a `1` in that column and subtract
    from `7`, leaving `3`.


    The next largest power in `3` is `2`, so we put a `1` in that column and subtract
    from `3`, leaving `1`, which is equal to the next largest power which is `1`.
    The result is `10111`.


    So using this algorithm, a computer can take a value that we would represent as
    a decimal number and can convert it into a format that can be natively stored
    and transmitted, using ones and zeros. This conversion process is the basis of
    all encoding and decoding of digital information we work with every day.'
