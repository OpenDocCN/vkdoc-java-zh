    # 32. The Stack and the Heap


    When we work with memory and values in computers, we have to distinguish between
    two ways the computer stores values and how variables keep track of them. One
    way is using the stack, which is an orderly way to organize data that is a consistent
    size. The second way is using the heap, which can handle data and values of variable
    size and provide pointers to where to get the values.


    ## Understanding the Stack


    Picture a distribution center. There is a giant room filled with rows and rows
    of products that are organized for workers and automated drones to acquire items
    and prepare them to ship to customers. Each item occupies a specific amount of
    space on the shelf. This predictable size allows the center managers to know how
    much can be stored on each shelf and row.


    Computer memory can work in the same way. When we create a variable, we are reserving
    space in memory for the value. The type of value we create defines how much space
    in memory we need to reserve for the value. This is why we need to provide the
    type of value when we define a variable. The computer needs to know how much memory
    to save for the value we are about to store.


    Take, for instance, an integer value. An integer is a 32-bit value. It occupies
    32 bits or 4 bytes of memory to store the value. That amount of space never changes.
    It will never be more or less than 32 bits in size.


    When we organize multiple values in memory, we create an organized arrangement
    of all of the reserved space allocated for each value. The variable value is equal
    to the value stored in that location in memory.


    When a value is no longer needed, there is a process called "garbage collection"
    that goes through memory and removes values that aren''t needed anymore, making
    it available for future variables that are created.


    ## Understanding the Heap


    The heap, however, is a completely different way to store values in the computer.
    Instead of an orderly stack, with direct access to values and variables, the heap
    needs to work with values that will vary in size and length. Take a string, for
    example. A string can contain a single letter, or it can contain a complete novel
    if you wanted it to. Because of this variability of length, a different type of
    system needs to be created to store this type of value.


    The heap is exactly like it sounds. Values of varying lengths and sizes are thrown
    onto a pile. Each item on the pile has an identifier. This is a memory address
    that the program stores in the variable for the value. For a value stored on the
    heap, there are actually two values. The first is the value of where in memory
    the data is stored. The second is the actual data, stored at the location in memory
    that is indicated.'
