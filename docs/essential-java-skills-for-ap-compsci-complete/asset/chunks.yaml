    同样，你可以组合方法，所以如果你不知道元素的编号，你可以使用 `indexOf()` 方法：


    ```

    names.set(names.indexOf("Matt"),"Sarah");

    ```


    获取 ArrayList 的大小


    `size()` 方法返回 `ArrayList` 中值的数量，类型为整数。它相当于数组的 `length` 属性：


    ```

    names.size();

    ```


    将元素复制到新的 ArrayList


    `addAll()` 方法会将一个列表中的所有元素添加到新列表中：


    ```

    ArrayList newNames = new ArrayList();

    newNames.addAll(names);

    ```


    新的集合 newNames 开始时是一个空的 ArrayList，但在调用 `addAll()` 方法后，它现在是 names 集合的一个副本。不过这些值并没有关联。如果对
    names 进行了更改，它不会反映在 newNames 中。它们是完全独立的。


    清空 ArrayList


    要移除所有元素（而不仅仅是值），你可以使用 `clear()` 方法：


    ```

    names.clear();

    ```


    这段代码执行后，集合将完全为空。


