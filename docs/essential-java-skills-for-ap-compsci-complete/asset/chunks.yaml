    48. 超越数组：使用 ArrayList


    数组在存储值集合方面非常出色，但它们有很多局限性。首先，它们只能容纳相同类型的元素。其次，它们在创建时必须被显式定义。最后，它们在创建后无法调整大小。

    为了克服这些限制，有一种更灵活的集合格式，称为 `ArrayList`。这种集合类型可以处理不同类型，并且你可以在创建后更改其中的值和大小。

    其代价是 `ArrayList` 的语法更复杂。`ArrayList` 是一个 Java 类，因此我们需要使用方法来处理其中的属性和值。


    创建 ArrayList


    `ArrayList` 类不是基本程序的一部分的默认类，因此我们需要在使用它之前将其导入到程序中。在你的代码顶部，需要添加这一行：


    ```

    import java.util.ArrayList;

    ```


    然后，你可以通过将其类型化到类中来创建一个 `ArrayList`。在构造函数的括号内，你可以选择性地定义 `ArrayList` 中有多少个值，但这不是必需的：


    ```

    ArrayList names = new ArrayList();

    ```


    向 ArrayList 添加元素

    '
- fmt: '# Adding Elements to an ArrayList


    Adding an element into an `ArrayList` is done using the `add()` method:


    ```

    names.add("Doug");

    names.add("Mike");

    names.add("Janet");

    names.add("Matt");

    ```


    You need to use the `add()` method for each value. Adding a value will append
    it to the end of the collection. So, in the case of the preceding code, `"Doug"`
    is the first element, and `"Matt"` is the last. With `ArrayLists`, you can''t
    use object notation using braces to add multiple items at once.


    # Get Elements in ArrayLists


    To get an element, you use the `get()` method and pass in the integer of the element
    id number:


    ```

    System.out.println(names.get(1)); // Outputs "Mike"

    ```


    The preceding code takes the value at location 1 and then displays it on the screen.
    There is one catch however:


    ```

    String myName = names.get(0);

    ```


    The preceding code generates an error. The reason is because the values that are
    used with the `ArrayList` names are typed as `Object`. `Object` is the most basic
    class in Java; it defines everything else in the language, so in a way, everything
    in Java is an `Object`. Because the string `myName` is typed as `String`, there
    is a mismatch.


    To get around this, we need to parse or convert the value to a `String` so it
    will be accepted. For `Strings`, we do this by chaining the `toString()` method;
    for numbers, we use their class'' parse method:


    ```

    String myName = names.get(0).toString();

    System.out.println(myName);

    ```


    This code takes the first value, element zero, and converts it to a `String` and
    then assigns it to the `myName` variable. The next line displays the value, `"Doug"`.


    Finally, unlike with arrays, you can display the contents of an `ArrayList` directly
    to the screen:


    ```

    System.out.println(names);

    ```


    This code will take all the values and display them on the screen like this:


    ```

    [Doug, Mike, Janet, Matt]

    ```


    # Remove Elements from ArrayLists


    Removing an element requires the `remove()` method, passing in the element number
    you want to remove:


    ```

    names.remove(2);

    ```


    In this case, the third (element number 2) value is removed from the `ArrayList`.


    # Find Items in ArrayLists


    Unique to `ArrayLists`, you can search for items inside of it. It will go through
    the collection and return the element number of the first value that matches the
    search term you provide:


    ```

    names.indexOf("Mike");

    ```


    This will return an integer displaying the location of the value in the array.


    Since these are all method calls, we can combine them together and nest their
    execution within other methods. So, if we wanted to find and remove an item based
    on the value, we can do that:


    ```

    names.remove(names.indexOf("Mike"));

    ```


    This code will first find the index number of `"Mike"` in the collection and then
    pass that value to the `remove()` method and take it out of the collection.


    # Replace Items in ArrayLists


    You can use the `set()` method to replace items in an `ArrayList` by element index
    number:


    ```

    names.set(1,"Sarah");

    ```


    Again, you can combine methods together, so if you don''t know the number of the
    element, you can use the `indexOf()` method:


    ```

    names.set(names.indexOf("Matt"),"Sarah");

    ```


    # Get the Size of an ArrayList


    The `size()` method returns the number of values in an `ArrayList` as an integer.
    It is the equivalent of the `length` property for an array:


    ```

    names.size();

    ```


    # Copy Elements to a New ArrayList


    The `addAll()` method will take all of the elements of one list and add them to
    a new list:


    ```

    ArrayList newNames = new ArrayList();

    newNames.addAll(names);

    ```


    The new collection, `newNames`, starts off as an empty `ArrayList`, but after
    the `addAll()` method is called, it is now a copy of the `names` collection. The
    values aren''t linked though. If a change is made to `names`, it isn''t reflected
    in `newNames`. They are completely separate.


    # Clear an ArrayList


    To remove all of the elements, not just values, you can use the `clear()` method:


    ```

    names.clear();

    ```


    After this code executes, the collection will be completely empty.


    # Code Examples


    This code is also available on GitHub at the following location:


    [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


    ```

    import java.util.ArrayList;

    public class Main {

    public static void main(String[] args) {

    // Define an ArrayList

    ArrayList names = new ArrayList();

    // Add items

    names.add("Doug");

    names.add("Mike");

    names.add("Janet");

    names.add("Matt");

    // Get items

    System.out.println(names.get(1)); // Outputs "Mike"

    // Error due to type mismatch

    //String myName = names.get(0);

    // Working around the Object type with ArrayLists

    String myName = names.get(0).toString();

    System.out.println(myName);

    // Display all items

    System.out.println(names);

    // Remove item

    names.remove(2);

    System.out.println(names);

    // Find index of item by value

    System.out.println(names.indexOf("Mike"));

    // Combine multiple methods together

    names.remove(names.indexOf("Mike"));

    System.out.println(names);

    // Replacing an item

    //names.set(1,"Sarah");

    names.set(names.indexOf("Matt"),"Sarah");

    System.out.println(names);

    // Get size, or number of items

    System.out.println(names.size());

    // Copy all values to new list

    ArrayList newNames = new ArrayList();

    newNames.addAll(names);

    System.out.println(names);

    System.out.println(newNames);

    // Clear all items

    names.clear();

    System.out.println(names.size());

    }

    }

