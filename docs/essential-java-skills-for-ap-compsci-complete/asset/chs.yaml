- '# 14. 数字的抽象


  当我们想到数字时，我们想到的，嗯，就是数字。任何包含从 0 到 9 的数字的东西。例如，我们有一个像 723 这样的数字。这个数字 723 代表一个数值，或者某个东西的数量。它可以是
  723 美元、723 码的纱线，或者 723 加仑的牛奶。这个数字告诉你某样东西有多少。


  但是，如果我向你展示这三个数字呢？723、723 和 723。如果我告诉你，这些数字中的每一个实际上都代表着不同的数量呢？通过使用不同的数字系统，这完全是可能的。


  让我们暂时抛开我们所熟知的数字，来看一堆东西。在这种情况下，我有五个回形针。现在我们可以把它表示为数字 5，但如果我说我有 V 个回形针，这表示同样的意思吗？是的。如果你懂罗马数字，那它就是一样的。罗马数字是表示我们拥有多少东西的另一种方式。它遵循一套不同的规则，使用像
  I、V、X、L、C 和 M 这样的符号。罗马数字基于基本的计数。从 1 开始，我添加符号，然后在某个点，我使用下一个最大的符号，并基于该值进行加法或减法，前提是同一类型的符号不能连续出现三个以上。


  令人困惑吗？有点。但几个世纪以来，从罗马时代作为所有价值表示的基本形式，到如今用于计算年度体育赛事或电影续集，罗马数字一直被使用。但这表明，同一个数值可以有不止一种表示方式。


  我们通常使用十进制数字来表示数字。十进制使用 10 作为数字系统的基数。这就是为什么我们使用十个数字：0、1、2、3、4、5、6、7、8 和 9。数字系统的另一个关键部分是你可以有多个数位。例如，我们取数字
  5，我们可以用单个数字来表示它。但数字 15 我们需要两个数字。右边的数字代表“个位”；再往左的数字代表“十位”。


  ![../images/499634_1_En_14_Chapter/499634_1_En_14_Fig1_HTML.png](img/499634_1_En_14_Fig1_HTML.png)


  图 14-1


  数字数位


