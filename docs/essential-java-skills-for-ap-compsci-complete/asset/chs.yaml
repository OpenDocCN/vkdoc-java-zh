  这些列背后有一些很酷的数学原理。还记得我说过十进制是基于 10 的吗？嗯，你可以将第一列表示为取其个位数字乘以 10 的 0 次方，即 1。当你向左移动时，你可以根据需要将指数增加
  1。所以下一列是 10 的 1 次方，即 10，乘以该列中的数字。


  ![../images/499634_1_En_14_Chapter/499634_1_En_14_Fig3_HTML.png](img/499634_1_En_14_Fig3_HTML.png)


