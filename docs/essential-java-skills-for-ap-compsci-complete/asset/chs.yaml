- '# 4. 编程语言


  编程语言最初是一个抽象概念，随后随着时间的推移不断适应和演变。从机器语言的起源、开关输入，延伸到早期像 COBOL 或 BASIC 这样简单的逐行编码，再到 Java
  和 C# 等面向对象语言，以及 Q# 等量子计算机语言，编程语言的进化已经历经数十年。


  ## 编程的起源


  19 世纪 40 年代初，查尔斯·巴贝奇提出了一种名为分析机的机器。这仅仅是一个提案——并没有制造出实际的机器，但一位名叫阿达·洛芙莱斯的富有创造力的女性决定撰写一篇文章，详细描述了如何在分析机上表示伯努利数（一种基于数论的递归方程）。这篇文章被认为是世界上第一个计算机程序。


  自那时起，可编程设备从理论走向物理，从手动走向自动，从模拟走向数字。随着每一步的进化，我们编程的方式也需要随之演变。


  随着大型主机的诞生，数据处理需要向机器发送指令，以处理和解释来自程序员的指令。随后，这些指令被应用于数据，以组织和分析数据。指令通过键盘输入，但由于没有显示器的便利，所有操作都依赖于纸张打印输出，或者以穿孔卡片的形式将数据存储在叠放的卡片组中。如果你仔细观察文本编码和一些编程语言，你会看到诸如“回车”或“打印”之类的术语，这些都是几十年前打印机时代的遗留物。


  随着计算机变得更小、更强大，更多的语言被创造出来。语言也被创造出来服务于特定类型的项目和行业，例如数学与科学、数据存储以及图形学。


  如今，我们使用的编程语言可以服务于多种不同的目的。事实上，程序员通常需要使用多种编程语言才能完成一个项目。随着语言的演变，它们已经变得专门化，以完成特定的任务。作为一名程序员，你会针对特定任务使用最佳的语言，并将它们组合在一起来创建你的项目。


  你今天学习的编程语言在未来将继续演变和变化。随着未来新技术的浪潮，新的语言将被开发出来，让程序员能够推动更多的创新。


  ## 编程的形式


  随着编程在数十年间的演变，你可以进行的编程类型也发生了变化。根据你想要实现的目标，存在不同类型或形式的编程语言，它们以不同的方式工作。作为一名程序员，某些编程形式让你可以直接访问计算机处理器，而另一些则将硬件抽象为更接近人类语言的形式，这种语言需要被翻译或转换成硬件的原生语言。以下是一些你可能遇到的编程形式示例。


  ### 机器语言


  机器语言允许程序员直接向处理器或硬件编写指令。通过向处理器发送由 0 和 1 组成的序列和模式，可以触发操作。因此，程序员输入的代码几乎是原生编写的。汇编语言是机器语言的一种抽象，它使用特殊代码来修改处理器寄存器并执行功能。


  ### 解释型语言


  解释型语言比汇编语言或机器语言更容易被人类阅读。程序员编写代码然后运行它。一个称为解释器的组件会读取每一行代码，然后将其“解释”为计算机的原生指令。这个过程比机器语言慢得多，因为解释器需要转换程序员提供的每一条指令，即使它重复执行同一行代码多次——每次都需要重新解释。JavaScript
  就是一种解释型语言的例子。程序员可以停止程序的执行，修改一行代码，然后无需任何其他步骤即可再次运行。


  ### 编译型语言


  编译型语言会获取人类编写的指令，并将该代码发送给一个称为编译器的组件。编译器获取程序指令，将其转换为硬件的二进制字节码或原生代码，并创建一个称为可执行文件的程序。这个程序是硬件和操作系统原生的，并且不容易被转换回原始的编程指令。由于代码现在是计算机的原生格式，它的运行速度比解释型代码快得多，但如果你需要做出更改，就必须调整原始的程序指令并重新编译以创建新的可执行文件。如果你要为多种类型的处理器创建程序，则需要为目标平台编译针对每种原生指令代码的独特版本。C
  语言就是一种编译型语言的例子。


  ### 面向对象语言


  面向对象编程（OOP）将一切视为对象。对象可以存储值；执行称为方法的操作；以及接受和返回值。对象使用一个称为类的模板来定义，该类定义了对象可以做什么。然后，程序员可以创建该类的一个实例，该实例拥有该类定义的所有能力。Java
  和 C# 就是面向对象语言的例子。


  ### 数据语言


  有些语言是专门为处理数据而设计的。一个例子是 SQL（发音为 see-quel），它是一种为处理数据库而设计的语言。这是一种查询语言，你向数据库提出一个问题，它会返回一组数据作为结果。你可以使用
  SQL 将多个数据库组合在一起，创建出可以进行分析的组合。R 是另一种数据语言的例子。R 是为统计计算和图形绘制而设计的。


  ### 函数式语言


  函数式编程以一种非常不同的方式处理编程。可以这样理解：在传统的编程语言（称为命令式语言）中，你是在定义值、对象或组件的状态。你创建并定义要完成的任务（称为算法），这些任务从头到尾执行。函数式编程不受算法的约束。在函数式语言中，你对值执行转换，就像数学中的函数一样。你获取一个值或对象并对其进行修改，并且能够使用函数将多个转换串联起来。函数式语言关注需要做什么，而不太关心如何执行。函数式语言的例子包括
  Haskell、Scala 和 F#。


  ### 脚本语言


  操作系统经常需要执行命令来配置服务器、安装软件或执行维护。为了自动化这个过程，存在一些脚本语言，允许像 Windows、Linux 和 macOS 这样的系统将常用命令保存为脚本，该脚本可以多次运行或分发到多台计算机。PowerShell、perl
  和 bash 就是脚本语言的例子。


  正如你所见，有多种类型的编程语言可以用来执行不同类型的任务。本课程将重点介绍面向对象语言、编译型语言和解释型语言（如 JavaScript、Java、C# 和
  Swift）中的概念。


  '
- '# 5. Java 的历史与用途


  Java 起步时便怀有远大的目标，而如今，它是全球最流行、使用最广泛的语言之一。




  ## Java 的起源


  Java 始于 Sun Microsystems 公司，并于 1995 年首次向公众发布。该语言的开发始于 1991 年，由 James Gosling、Mike
  Sheridan 和 Patrick Naughton 主导，其设计目标是与 C 和 C++ 相似，以帮助开发者将他们现有的编程技能应用于这门新语言。Sun Microsystems
  于 2009 年被 Oracle 收购。


  在开发过程中，Java 最初被称为 Oak，后更名为 Green，最终以 Java 咖啡的名字发布为 Java，这也是为什么 Java 的 logo 是一个冒着热气的咖啡杯。


  *一次编写，到处运行*


  在发布时，它承诺“一次编写，到处运行”，这意味着你用 Java 创建的程序只需编码一次，就可以在任何支持 Java 的平台上运行。


  ## Java 的主要目标


  从一开始，创建 Java 语言就有五个主要目标：


  1.  它必须“简单、面向对象且熟悉”。

  2.  它必须“健壮且安全”。

  3.  它必须“架构中立且可移植”。

  4.  它必须具有“高性能”的执行能力。

  5.  它必须是“解释型、多线程且动态的”。


  如今，Java 是使用最广泛的语言之一。Java 在 Web 应用程序、使用 JavaFX 等技术的企业桌面应用程序以及 Android 生态系统中的大量应用，使其成为一门值得学习的优秀语言，并且拥有多种灵活的使用方式。


  ## Java 的用途


  自 Java 首次发布以来，它已为电子商务、金融及其他行业的许多大型 Web 应用程序提供了强大支持。Java 应用程序构建在服务器端，并连接到 Web 服务器以处理应用程序的业务逻辑。


  Java 也是 Android 的核心语言，使用 Google 的 Android Studio 工具创建的原生应用程序都是用 Java 语言构建的。此外，你还会发现
  Java 嵌入在许多设备中，例如电视和其他消费电子产品。


  基于 Java 编程语言已经创建了许多框架，以加速跨多个平台和设备的应用程序开发。


  对于 Web 应用程序，Struts、JSF、Grails、Spring 等框架可以单独使用或相互组合，以提供可支持数百万用户的可扩展 Web 应用程序。


  对于桌面应用程序，JavaFX 等框架允许开发者使用 FXML（一种基于 XML 的标记语言）创建用户界面，并将其与 Java 代码融合。


  对于移动端，Google 的 Android SDK 包含一个用于开发 Android 应用程序的工具，以及一个用于在虚拟设备上部署和运行应用程序以进行测试的模拟器。


  作为开发者，有许多可用的编码工具供你用于 Java。集成开发环境（IDE）有助于整合你需要执行的许多任务，如编码、代码管理、调试、处理代码仓库以及创建文档。一些比较流行的
  IDE 有 IntelliJ IDEA、Eclipse 和 NetBeans。本课程将使用的是 IntelliJ 的 IDE。


  Java 为你作为开发者打开了几乎无限的机会，最棒的是，一旦你掌握了基础知识，Java 并不难学或理解。利用你新掌握的 Java 技能，你几乎可以为任何东西构建应用程序。


  '
- '# 6. Java 的工作原理


  Java 是一种独特的编程语言，这得益于其最初愿景中的“一次编写，到处运行”的口号。理解它如何实现这一愿景，对于理解你作为程序员的工作方式至关重要。


  ## 编译型语言的问题


  编译型编程语言通常有一个很大的局限性。当你将代码转换为可执行程序时，编译器会读取代码并创建一个特定于处理器架构的二进制文件。


  因此，如果我在我的 32 位 Windows PC 上使用 C 或 C++ 这样的语言编译一个程序，该程序无法在 Mac 上运行，也无法在没有额外技术桥接的情况下在
  64 位 Windows PC 上原生运行。它只能在 32 位 Windows PC 上运行。


  每个处理器和操作系统都期望程序满足极其特定的要求。程序访问硬件的方式在 Intel 处理器、基于 ARM 的处理器（如手机和平板电脑中的处理器）以及其他处理器类型（如
  RISC 架构）之间差异巨大。（较旧的 Mac 使用这种架构，采用称为 PowerPC 的芯片，如 G5 或 G4。）


  即使是 32 位 Intel 处理器和 64 位 Intel 处理器的运行方式也完全不同。因此，64 位程序无法在 32 位计算机上运行，而 32 位程序也无法在没有额外软件使其兼容的情况下在
  64 位计算机上原生运行。


  当你扩展到其他类型的计算机（如服务器）时，处理器类型和架构的数量可能会变得更加复杂。


  在过去的几十年里，Web 和应用服务器可能使用截然不同的架构类型，如 Sparc、Xeon、Itanium 等。


  因此，Sun Microsystems 的人员在设计 Java 时，希望克服这一限制，于是他们创建了一种创新的方法来解决这个问题。


  ## JVM 和 JRE


  当你运行一个 Java 程序时，你不仅仅是在运行这个程序，你同时还在运行其他几个东西。


  针对多个平台，Oracle 创建了一套名为 Java 运行时环境（JRE）和 Java 虚拟机（JVM）的技术。这些技术的构建是为了让包括 Intel、ARM、64
  位、32 位等在内的特定硬件架构能够运行 Java 程序。


  这些运行时环境安装在系统上并常驻内存，等待 Java 程序被执行。


  当调用运行一个 Java 程序时，Java 运行时环境（JRE）会启动并打开编译后的程序。然后，运行时环境会捕获程序的指令，并将其转换为计算机上的原生执行指令。


  ![../images/499634_1_En_6_Chapter/499634_1_En_6_Figa_HTML.png](img/499634_1_En_6_Figa_HTML.png)


  这就是 Java 如此通用的原因。只要 Oracle 创建了 JRE 的地方，你就可以运行 Java 程序。


  ## 编译 Java 字节码


  当你创建 Java 程序时，在创建代码（称为源代码或源文件）的过程中，有几个环节在起作用。


  ![../images/499634_1_En_6_Chapter/499634_1_En_6_Figb_HTML.png](img/499634_1_En_6_Figb_HTML.png)


  首先，当你创建程序时，你是在编写一个纯文本文件。其中除了字母和数字之外，没有任何格式、特殊字符、图形或其他内容。当你将此文件保存到计算机时，它是一个 `.java`
  文件，意味着文件扩展名是 `.java`。


  当你完成程序编码后，你将文件发送给编译器。编译器读取你创建的指令，并将其转换为 Java 字节码，JRE 可以读取和理解这种字节码。Java 字节码（有时称为
  JBC）是一个简洁且压缩的文件，人类不可读，但设计目的是让 JRE 能够快速理解和执行。


  然后，JRE 获取这些字节码指令，并将其发送到原生硬件，以在机器上执行程序。


  当你编译程序时，你创建了这些 Java 字节码文件，称为 `.class` 文件，它们将在 JRE 中针对该架构的原生硬件运行。




  ## 预编译文件


  有时，你需要在程序中反复使用某些文件。这些通常是一些永远不会改变的代码段，但其中包含了你可以在自定义代码中执行和使用的预构建操作。


  维护这些文件的工作量可能很大，当你对这些代码进行改进时，你会希望找到一种方法，能够轻松地将这些改进应用到其他程序中。


  为了简化这一过程，Java 支持将预编译代码组合成 `.jar` 文件。JAR（Java 归档文件）是一个独立的模块，你可以将其引入任何程序，并像访问自己代码中的方法和操作一样访问其中的内容。


  如果你需要更新或更改 JAR 文件，只需更改该引用或覆盖程序指向的 JAR 文件即可完成更新。


  ## OpenJRE


  Java 是一种开源语言，这意味着社区可以构建、更改和改进该语言及其编译器。


  作为其中的一部分，Oracle 创建了 OpenJRE 和 OpenJDK，供社区构建和增强。然后，Oracle 可以将开源社区的贡献整合到官方的 Oracle
  Java JDK 和 JRE 中。


  Oracle 还会添加额外的安全和其他保护措施，以确保在其上运行的应用程序安全可靠。由于它是一个打包的平台，这种安全性适用于任何硬件、服务器或云基础设施。


  Android 在很大程度上是基于 Java 构建的，从 Android N（即 Android Nougat）开始，由于与 Oracle 的诉讼，Google
  转而使用 OpenJDK。


  最终，对你而言，运行哪个版本的 Java 并不重要。当你安装任何 JDK 和 JRE 时，源代码、编译文件和程序的执行方式本质上是相同的。


  '
- '# 7. 流程图绘制


  编程和编码既关乎坐在键盘前敲代码，也同样关乎思考和规划。通常，开发者需要在脑海中或纸上规划出程序将如何运行。这可以使编码过程变得容易得多，尤其是在与他人合作开发项目时。


  流程图是勾勒程序的一种常见方式。顾名思义，它是一种直观展示程序流程的图表。在流程图中，你将各种步骤、决策和操作连接成一个遵循程序运行流程的链条。


  由于计算机在处理你的操作和代码时非常字面化，流程图有助于你第一次就编写出更准确的代码，而不是在代码中反复调试和折腾。相信我，放弃流程图直接写代码的诱惑很大，但如果你是编程新手或相对较新，流程图将为你节省大量时间，并迫使你在坐到键盘前停下来、暂停并先勾勒出思路。


  ## 流程图绘制工具


  有许多流程图绘制工具可供使用；有些是纸笔，有些是在线的。


  ### 纸张


  就像作家在笔记本上写日记，设计师在速写本上画草图一样，开发者通常可以用纸笔来绘制流程图。有时，让事物变得有形和可触摸有助于放慢你的思维，让你对代码和程序更加深思熟虑。


  如果你想采用纸质方法，可以买一个模板来辅助工作。这有助于让事情变得更整洁。


  ### 平板电脑和触控笔


  如果你有支持触控笔的平板电脑或笔记本电脑，例如 iPad、Surface 或二合一笔记本电脑，有很多绘图应用可用于绘制流程图，包括 OneNote、Adobe
  Illustrator Draw、Autodesk SketchBook 等。一些专门的平板应用甚至可以检测你绘制的形状并将其转换为模板形状。


  ### 应用


  像 OmniGraffle、Sketch、Adobe XD、Visio、PowerPoint 和 Illustrator 等应用，都是你可以下载或购买并用于构建流程图的例子。这些应用的功能各不相同，但它们都可以用来构建流程图。


  我经常使用 Visio，它有一个很酷的功能：你可以在 Excel 中创建流程图的步骤，然后将它们导入 Visio 以自动创建流程图。如果你在 Excel 中进行了更改，还可以重新同步图表。


  ## 流程图基础


  流程图使用不同的形状来表示程序或流程中不同类型的步骤。这些形状决定了正在执行哪些步骤，并且还可以影响程序流程的方向。


  ### 端点


  ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figa_HTML.jpg](img/499634_1_En_7_Figa_HTML.jpg)一个基本的流程图以药丸形状开始；这被称为端点形状，用于流程图的开始和结束。在其中，你写入“开始”或“停止”，并且可以选择在形状中定义程序如何执行此操作。


  然后，你画一条带箭头的线，指向流程图中的下一步。


  ### 处理/操作


  ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figb_HTML.jpg](img/499634_1_En_7_Figb_HTML.jpg)一个操作，有时称为处理，用一个简单的矩形表示。你需要为程序中每个单独的步骤创建一个矩形。我们经常在脑海中将多个步骤组合起来，并将它们视为一个单一操作。因此，一些看似简单的步骤可能涉及多个操作。


  然后，你在流程图中创建更多步骤，并使用带箭头的线将它们连接起来。这些线可以转弯和扭曲。它们可以是垂直的或水平的。这完全取决于你。


  ### 输入和输出


  ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figc_HTML.jpg](img/499634_1_En_7_Figc_HTML.jpg)在你的程序中，你经常需要从用户那里获取输入或向用户显示输出。这些步骤用平行四边形表示，以区别于其他步骤，并且你像描述其他操作一样描述它。


  ### 决策


  ![../images/499634_1_En_7_Chapter/499634_1_En_7_Figd_HTML.jpg](img/499634_1_En_7_Figd_HTML.jpg)决策根据问题的结果来分支程序的流程。问题的答案必须是“是”或“否”。（你会在课程后面发现原因）。


  决策步骤使用菱形形状，并有两个分支路径。一个用于“是”；一个用于“否”。然后，你根据问题的结果将这些路径连接到不同的操作。


  这些分开的路径可能在稍后某个点重新汇合，但这完全取决于你的程序以及你希望何时实现这一点。


  ### 注释


  有时你无法将所有内容都放入一个形状中，因此向流程图添加注释或备注是可以的。这些可以是关于步骤的附加描述或细节，也可以是开始编码时为你或他人提供的编程和编码注释。


  ### 其他形状


  还有其他用于处理数据、创建子流程和其他操作的形状，但我们将在需要时再介绍它们。目前，我们将坚持使用这四种基本形状。


  ## 倒垃圾


  让我们看一个示例流程图，你可以看到这一切是如何结合在一起的。


  ![../images/499634_1_En_7_Chapter/499634_1_En_7_Fige_HTML.png](img/499634_1_En_7_Fige_HTML.png)


  流程图以一个标记为“开始”的端点（或终端）形状开始。


  然后执行一个操作：“打开垃圾桶盖”。


  接下来，我们到达一个决策点。问题的答案必须是“是”或“否”。“垃圾桶满了吗？”如果是，则走“是”路径。如果不是，则走“否”路径。


  根据你选择的路径，你将按照每个操作依次进行。


  此图表中，决策路径最终汇合到一个点，这在流程图中是完全允许的。


  然后，它以“停止”端点结束。




  ## 但事情真的这么简单吗？


  不，并非如此。因为我们总是在做各种假设，而这些假设常常会给我们带来麻烦。


  程序员的部分工作，就是接手复杂的任务，并将其分解为无法再进一步拆解的独立步骤。


  这就像观察水，然后深入探究构成水的分子，再进一步到构成分子的原子。你一直下探到构成该物体基础的最小单元。现在，将这个原理应用到一项行动上。我们常常想当然地认为许多步骤是某个行动集合的一部分。


  让我们看看之前的例子：倒垃圾。


  “倒垃圾”这个短语，可能在你脑海中唤起一些具体的事情。如果有人对我说：“嘿，道格，你能去倒一下垃圾吗？”，我脑海里就会立刻浮现出需要完成的几个步骤。


  以我家为例，我需要完成以下步骤：


  首先，我需要去厨房，从垃圾桶里拿出装满的垃圾袋，然后提着它绕屋子走一圈，把卧室和卫生间里的小垃圾桶清空，倒进这个大垃圾袋里。接着，我把它拿到路边的垃圾桶，放进去。


  就这样！我倒了垃圾。


  但是，这些就是全部步骤了吗？我是否已经足够细致地分解了所有步骤，以确保所有需要发生的事情都发生了？如果我把我提到的这些步骤写下来，让某人严格按照步骤执行，他们会按照我的预期去做吗？


  不，他们很可能不会，因为即使有了这些步骤，我仍然遗漏了一些假设。例如，如果第二天是垃圾回收日，我需要把路边的垃圾桶推到街上。当我说“垃圾”时，我指的是生活垃圾和可回收物，但一个按字面意思理解我的人可能不会这么认为。


  作为一名程序员，你需要让你的代码尽可能精确和字面化。将行动分解成更小的行动，是成功的关键。对于你写的每一行代码，就像“倒垃圾”这个动作一样，你需要定义其中需要发生的每一个语句或动作，以满足你的所有期望，并确保该动作被正确执行。


  所以，当你分解一个流程或任务时，要站在别人的角度思考，看看你列出的步骤是否合理。如果不行，就增加必要的清晰度和细节，使其万无一失，从而获得预期的结果。


  '
- '# 8. Hello, World


  编程不仅要知道编写什么代码，还要知道如何将你使用的工具组合在一起，使项目能够运行并与他人分享。


  在我们开始深入编写一些复杂的代码之前，我们应该先弄清楚如何将这些工具组合在一起使用。


  ## 创建你的 IntelliJ Java 项目


  首先，我们需要为项目创建基本结构。为此，我们需要进入 IntelliJ，并使用特定的项目模板创建一个新的 Java 项目。


  ### IntelliJ IDEA


  当你首次启动 IntelliJ 时，你会看到欢迎界面。你也可以通过 **文件** ➤ **打开** 菜单项打开此界面。


  ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig1_HTML.jpg](img/499634_1_En_8_Fig1_HTML.jpg)


  图 8-1


  IntelliJ 欢迎窗口


  从这里开始，我们需要创建一个新项目，所以，你猜对了，从窗口中选择“**创建新项目**”。


  然后你会看到“新建项目”窗口。在这里，你将定义项目的参数，并设置初始文件夹结构和起始代码，以便开始编码和构建你的项目。


  ### 仅首次：配置 JDK


  项目的一个重要组成部分是将其连接到 JDK。这不会自动完成，需要在首次创建项目时进行配置，并且每次在你的机器上更新 JDK 时，可能需要重复此操作。


  ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig2_HTML.jpg](img/499634_1_En_8_Fig2_HTML.jpg)


  图 8-2


  新建项目窗口


  这个过程非常简单。


  在“新建项目”窗口的顶部，点击“**新建…**”按钮。


  当你点击“**新建…**”按钮后，你需要告诉 IntelliJ JDK 的安装位置。在 Windows 机器上，它通常位于“**Program Files**”文件夹中；在
  macOS 上，它通常位于“**Library**”文件夹中。


  选择 JDK 的位置以及 JDK 的主文件夹，然后点击 **确定**。


  ![../images/499634_1_En_8_Chapter/499634_1_En_8_Fig3_HTML.jpg](img/499634_1_En_8_Fig3_HTML.jpg)


  图 8-3


  选择 JDK 文件夹


