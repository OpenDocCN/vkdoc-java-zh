  我现在需要更改各列的计算方式，不再使用 10，而是使用 8。所以现在，如果我使用相同的格式来计算每一列，八进制数 723 实际上等于十进制数 467。


  ![../images/499634_1_En_14_Chapter/499634_1_En_14_Fig6_HTML.png](img/499634_1_En_14_Fig6_HTML.png)


