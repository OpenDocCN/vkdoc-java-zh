- '# 16. Unicode


  使用二进制，我们可以以计算机原生的格式来表示不同类型的值。对于文本，我们也可以这样做；只是我们需要在实现方式上更具创造性一些。




  ## 文本编码


  也许你曾使用过解码环。借助解码环，你可以将包含字母的消息，通过它找到每个字母对应的数字或符号。你可以拿这样一句话为例，为每个独特的字母分配一个代表它的符号。利用这种方法，你可以将每个字母转换成新的代码。这被称为**编码**。你正在将原始文本转换为一套独特的代码。


  在另一端，如果我收到一条使用这些符号的消息，我可以取出每个符号，并使用相同的解码环，将符号与字母匹配，从而将消息**解码**回其原始格式。


  编码和解码过程必须在两端保持一致并达成共识。如果一端使用的解码环与另一端不同，我们就无法通信。这种达成共识的方法被称为**协议**，它在通信的两端都会被使用。


  现在，我们可以用数字来代替符号来表示我们的协议。这些数字与我们想要通信的每个字符唯一对应。


  但这仅仅是简单的字母表。我们可以将其表示为大写字母和小写字母。此外还有标点符号、常见的国际字符、希腊字母、特殊符号，以及用于在屏幕上绘制方框和线条的块状构建符号。


  另外还有一些非打印字符，比如空格、换行、退格等。


  现在你拥有了一套独特的字符集，每个字符都有一个对应的数字。但请记住，计算机需要以二进制格式存储数字，因此每个数字都会被转换成二进制。在这种情况下，我们有 256
  个字符，它们存储在一个字节（即 8 位）中。


  ## ASCII + Unicode


  这种单字节编码系统被称为 **ASCII**（美国信息交换标准代码），最早开发于 20 世纪 60 年代初。随着时间的推移，该系统不断扩展以包含更多字符。但在某个节点，世界上需要表示的符号或字形实在太多，ASCII
  已经无法满足需求了。


  一种名为 **Unicode** 的新标准使用多个字节来表示来自世界各地语言的成千上万个符号，甚至包括失落文明的古老符号和语言（甚至还有一些来自科幻小说！）。更常见的字符需要更少的位来存储，这可以在存储或传输时节省空间和时间。较不常见或更复杂的字符则需要更多位。


  网络标准化采用了 **UTF-8** 格式，即 8 位 Unicode 转换格式。它向后兼容 ASCII。每个字符使用前缀 `U+` 后跟一个四位十六进制数来表示。因此，字母“D”表示为
  `U+0044`。四位十六进制数需要 2 个字节（即 16 位）来存储。因此，仅使用 2 个字节，就可以编码和解码超过 65,000 个符号。这被称为 Unicode
  的**平面 0**。对于更多字符，会添加额外的位来创建新的平面。目前，主要使用的是三个平面：平面 0、平面 1 和平面 2。还有其他未使用或可自定义的平面，最高可达平面
  16。总的来说，整个 Unicode 范围可以存储 1,114,112 个符号，这些符号被称为“码点”。这可是非常多的字母！


  ## 表情符号


  你每天都在使用 Unicode。你在手机和设备上使用的所有表情符号都是 Unicode 中的符号。


  这就是为什么通常情况下，当表情符号被添加到一个平台时，它们也会被添加到其他平台。这就是标准的工作方式。为了使一项技术符合标准，它需要保持对其支持的更新。这包括标准随时间变化和适应的情况。


  '
- '# 17. 变量


  计算机拥有所有的内存，所以我们得能够存储一些东西，对吧？


  要在我们的程序中做到这一点，我们使用**变量**，但每个变量只能处理特定类型的值，即**字面量**。


  使用变量需要我们（最终）定义三件事。


  ## 变量的基本要素


  首先，我们需要确定要存储的值的类型。这就是**值类型**，我们已经遇到过几种，比如整数、浮点数、字符串等等。


  其次，我们需要为每个变量赋予一个唯一的**名称**。变量名有一些规则。它们必须以字母、`$` 或 `_` 字符开头。它们区分大小写。它们不能是 Java 中的**保留字**。


  除了这些规则，还有一些建议。首先，你应该使用**驼峰命名法**，这意味着你将单词连接起来，第一个单词的首字母小写，后续每个单词的首字母大写。所以，我的名字 `Doug
  Winnie` 会变成 `dougWinnie`。


  第三，我们需要为变量**赋值**。该值必须与变量的类型匹配，例如，将一个整数值赋给一个整数变量。我们使用赋值运算符（即等号 `=`）来赋值。


  赋值总是从右向左进行。右边的任何值都会被赋给我们左边定义的变量容器。


  一旦我们有了一个带有值的变量，我们就可以像使用任何字面量一样使用它。


  ## 代码示例


  下一页的代码展示了在多种情况下使用多种类型变量的示例。


  该代码也可在以下 GitHub 仓库中找到：


  [`https://github.com/Apress/essential-java-AP-CompSci`](https://github.com/Apress/essential-java-AP-CompSci)


  ```

  public class Main {

  public static void main(String[] args) {

  // I: 定义一个变量

  int quantity;

  double price;

  String name;

  char initial;

  // II: 使用赋值运算符为变量赋值

  quantity = 5;

  price = 2.50;

  name = "Doug";

  initial = ''W'';

  // III: 输出变量

  System.out.printf("%s %s. bought %d items priced at %f each\n",name,initial,quantity,price);

  /* 输出

  Doug W. bought 5 items priced at 2.500000 each

  */

  // IV: 更新变量的值

  quantity = 10;

  price = 1.99;

  name = "Mike";

  initial = ''J'';

  // V: 输出更新后的变量

  System.out.printf("%s %s. bought %d items priced at $%.2f each\n",name,initial,quantity,price);

  /* 输出

  Mike J. bought 10 items priced at $1.99 each

  */

  // VI: 在一行内初始化并赋值

  int myNumber = 5;

  // VII: 将一个变量赋值给另一个变量

  int myValue = myNumber;

  }

  }

