  \n你听说过计算机的一切都归结为二进制，即“是”或“否”的答案。这是真的，你可以通过使用布尔值和逻辑运算符在程序中运用这一点。布尔变量包含且仅包含 `true`\
  \ 或 `false` 这两个值。为了确定真或假的响应，有许多称为逻辑运算符的运算符，它们将表达式评估为 `true` 或 `false`。然后你可以获取该值并对其进行操作，或将其赋值给一个布尔变量。\n\
  \n创建布尔变量\n\n布尔变量只能包含两个值：`true` 或 `false`。要创建一个布尔变量，你需要使用 `Boolean` 值类型来初始化变量，如下所示：\n\
  \n```\nBoolean a;\n```\n\n然后你可以将 `true` 或 `false` 的值赋给该变量：\n\n```\na = true;\n```\n\
  \n使用字面量设置布尔变量只是赋值的一种方式，但它并不是最灵活的方式。相反，使用逻辑运算符可以测试多种场景，以确定一个测试或条件是真还是假，然后将该测试的结果作为\
  \ `true` 或 `false` 值赋给布尔变量。\n\n布尔逻辑运算符\n\n主要的布尔逻辑运算符基于数学原理运作。基本运算符比较两个（且仅两个）值彼此之间的关系。然后确定这些值是相等、不相等、大于、小于，还是这些关系的组合。\n\
  \n```\nint a = 5;\nBoolean result;\nresult = (a == 5); // 相等，结果为 true\nresult =\
  \ (a != 5); // 不相等，结果为 false\nresult = (a > 5);  // 大于，结果为 false\nresult = (a <=\
  \ 5); // 小于或等于，结果为 true\n```\n\n改变布尔值\n\n你可以通过使用“非”运算符来反转任何布尔评估或变量的值，该运算符由一个感叹号表示，作为值、变量或评估的前缀。只需将其紧放在评估或变量之前：\n\
  \n```\nint a = 5;\nBoolean result;\nresult = (a == 5);  // 结果为 true\nresult = !result;\
  \   // 结果为 false\nresult = !(a == 5); // 结果为 false\n```\n\n将逻辑与评估结合\n\n除了字面量和变量，你还可以使用评估来确定布尔值。逻辑运算符在运算顺序中总是最后执行（在赋值运算符之前），因此你可以使用括号创建评估分组，以构建更复杂的场景，包括使用方法返回的值。\n\
  \n```\nint a = 5;\nBoolean result;\nresult = (5 + 5) > 10; // false\n```\n\n复合逻辑运算符\n\
  \n为了创建更复杂的评估，你可以使用逻辑“与”和“或”运算符。对于“或”，只要其中一个值为真，整个评估结果就为真。对于“与”，所有值都必须为真，整个评估结果才为真。\n\
  \n```\nint a = 5;\nBoolean result;\nresult = (a < 5) || (a / 2 < 5); // 或：true\n\
  result = (a < 5) && (a / 2 < 5); // 与：false\n```\n\n代码示例\n下一页展示了从用户处捕获输入的示例。\n该代码也可在以下\
