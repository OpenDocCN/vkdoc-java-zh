  \n\n\n```\npublic class Main {\npublic static void main(String[] args) {\nint a\
  \ = 5;\nBoolean result;\nSystem.out.println(\"基本运算符\");\nresult = (a == 5); // 相等，结果为\
  \ true\ndisplay(result);\nresult = (a != 5); // 不相等，结果为 false\ndisplay(result);\n\
  result = (a > 5);  // 大于，结果为 false\ndisplay(result);\nresult = (a = 5); // 大于等于，结果为\
  \ true\ndisplay(result);\nresult = (a  10; // false\ndisplay(result);\nresult =\
  \ getNumber() < .5; // true 或 false，取决于返回的值\ndisplay(result);\nSystem.out.println(\"\
  OR（或）\");\nresult = true || true;   // true\ndisplay(result);\nresult = true ||\
  \ false;  // true\ndisplay(result);\nresult = false || true;  // true\ndisplay(result);\n\
  result = false || false; // false\ndisplay(result);\nresult = (a < 5) || (a / 2\
  \ < 5); // true\ndisplay(result);\nSystem.out.println(\"AND（与）\");\nresult = true\
