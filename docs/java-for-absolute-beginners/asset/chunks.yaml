    \ - dest25Img width x height :  1008 x 277\n```\n\n## Using JavaFX Image Classes\n\
    \nAside from the Java Media API, which is centered on components of the `java.awt`\
    \ package, another way to display and edit images is provided by JavaFX. The core\
    \ class for the `javafx.scene.image` package is called `Image`, which handles\
    \ images in a few common formats: PNG, JPEG, BMP, and GIF. JavaFX applications\
    \ can display images using an instance of `javafx.scene.image.ImageView`. The\
    \ part that I like most about this class is that the images can be also displayed\
    \ scaled, without the original image being modified.\n\nTo create a `javafx.scene.image.Image`\
    \ instance, all we need is a `FileInputStream` instance to read the image from\
    \ the user-provided location, or a URL location given as `String`. The following\
    \ code snippet creates a JavaFX application that displays an image with its original\
    \ width and height, which can be accessed using methods in the `javafx.scene.image.Image`\
    \ class.\n\n```java\npackage com.apress.bgn.ch11;\nimport javafx.application.Application;\n\
    import javafx.scene.Scene;\nimport javafx.scene.image.Image;\nimport javafx.scene.image.ImageView;\n\
    import javafx.scene.layout.StackPane;\nimport javafx.stage.Stage;\nimport java.io.File;\n\
    import java.io.FileInputStream;\npublic class JavaFxMediaDemo extends Application\
    \ {\npublic static void main(String... args) {\nApplication.launch(args);\n}\n\
    @Override\npublic void start(Stage primaryStage) throws Exception {\nprimaryStage.setTitle(\"\
    JavaFX Image Demo\");\nFile src = new File(\"chapter11/media-handling/src/main/resources/cover.png\"\
    );\nImage image = new Image(new FileInputStream(src));\nImageView imageView =\
    \ new ImageView(image);\nimageView.setFitHeight(image.getHeight());\nimageView.setFitWidth(image.getWidth());\n\
    imageView.setPreserveRatio(true);\n//Creating a Group object\nStackPane root =\
    \ new StackPane();\nroot.getChildren().add(imageView);\nprimaryStage.setScene(new\
    \ Scene(root,\nimage.getWidth()+10,\nimage.getHeight()+10));\nprimaryStage.show();\n\
    }\n}\n```\n\nThe `Image` instance cannot be added to the `Scene` of the JavaFX\
    \ instance directly as it does not implement the `Node` interface, which is required\
    \ to be implemented by all JavaFX elements that make a JavaFX application. That\
    \ is why this instance must be wrapped in a `javafx.scene.image.ImageView` instance\
    \ that is a class implementing node, which is a specialized class for painting\
    \ images loaded with `Image` class. This class resizes the displayed image with\
    \ or without preserving the original aspect ratio by calling the `setPreserveRatio(..)`\
    \ method with the appropriate argument: `true` to keep the original aspect ratio;\
    \ `false` otherwise.\n\nIn the previous code, we use the values retuned by `image.getWidth()`\
    \ and `image.getHeight()` to set the size of the `ImageView` object and the size\
    \ of the `Scene` instance. But let’s get creative and display the scaled image,\
    \ still preserving the aspect ratio and also using a better-quality filtering\
    \ algorithm when scaling the image using the `smooth(..)` method.\n\n```java\n\
    ...\nImageView imageView = new ImageView(image);\nimageView.setFitWidth(100);\n\
    imageView.setPreserveRatio(true);\nimageView.setSmooth(true);\n...\n```\n\nThe\
    \ `ImageView` class also supports a `Rectangle2D` viewport that rotates the image.\n\
    \n```java\nimport javafx.geometry.Rectangle2D;\n...\nImageView imageView = new\
    \ ImageView(image);\nRectangle2D viewportRect = new Rectangle2D(2, 2, 600, 600);\n\
    imageView.setViewport(viewportRect);\nimageView.setRotate(90);\n...\n```\n\nBeing\
    \ an implementation of `Node`, `ImageView` supports clicking events, and it is\
    \ easy to write some code to resize an image on click. Just take a look.\n\n```java\n\
    ...\nImageView imageView = new ImageView(image);\nimageView.setFitHeight(image.getHeight());\n\
    imageView.setFitWidth(image.getWidth());\nimageView.setPreserveRatio(true);\n\
    root.getChildren().add(imageView);\nimageView.setPickOnBounds(true);\nimageView.setOnMouseClicked(mouseEvent\
    \ -> {\nif(imageView.getFitWidth() > 100) {\nimageView.setFitWidth(100);\nimageView.setPreserveRatio(true);\n\
    imageView.setSmooth(true);\n} else {\nimageView.setFitHeight(image.getHeight());\n\
    imageView.setFitWidth(image.getWidth());\nimageView.setPreserveRatio(true);\n\
    }\n});\n...\n```\n\nBy calling `onMouseClicked`, we attached an `EventHandler<?\
    \ super MouseEvent>` instance to the mouse-clicking event on `imageView`. The\
    \ `EventHandler<T extends Event>` is a functional interface containing a single\
    \ method named `handle`, and its concrete implementation is the body of the lambda\
    \ expression in the previous code listing.\n\nSince JavaFX was taken out of JDK\
    \ 11, there is no real value in going over more image processing classes in this\
    \ section. But if you are interested in learning more about this subject, this\
    \ tutorial from Oracle should do the job: [`https://docs.oracle.com/javafx/2/image_ops/jfxpub-image_ops.htm`](https://docs.oracle.com/javafx/2/image_ops/jfxpub-image_ops.htm).\
    \ Also, as practice, you can try writing your own code, based on the code in the\
    \ book, to add a mouse event that rotates the image.\n\nAnd this is all the space\
    \ that I can dedicate to playing with images in the Java. I hope you found this\
    \ section useful and might get the chance to test your Java Media API skills in\
    \ the future, if not for anything else, at least for cleaning EXIF data from your\
    \ images.\n\n## Summary\n\nThis chapter has covered most of the information that\
    \ you need to know to work with various types of files, and to serialize Java\
    \ objects, save them to a file, and then recover them through deserialization.\
    \ When writing Java applications, you typically need to save data to files or\
    \ read data from files and this chapter provides a wide list of components to\
    \ do so. The following is a short summary of this chapter.\n\n*   how to use `File`\
    \ and `Path` instances\n*   how to use utility methods in `Files` and `Paths`\n\
    *   how to serialize/deserialize Java objects to/from binary, XML and JSON\n*\
    \   how to resize and modify images using the Java Media API\n*   how to use images\
    \ in JavaFX applications\n\n## Footnotes"
