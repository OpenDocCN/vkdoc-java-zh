  raw: 'Of course, only one `genSinger()` call was

    represented and only one `Singer` instance. When

    the `main(..)`

    method is called, references to the static instances are created, which

    will be relevant to the program until the end of its execution. Then,

    `genSinger()`

    methods  is

    called repeatedly. Each of these methods has its own stack where it

    saves references to the objects created within the context of that

    method, in this case the `Singer` instance. This

    reference is used to print the name of the Singer instance that was

    created in the body of this method. Then the method terminates without

    returning the reference. This means that the instance that was created

    is no longer necessary, as it was created to be used only in the context

    of this method. When the execution of the `genSinger()` method

    ends, the reference to the `Singer` instance is

    discarded from the stack. The `Singer` instance still

    exists, in the heap memory, but can no longer be accessed from the

    program, thus it is no longer necessary to it. It now keeps a memory

    block occupied with its own contents, its references to other instances,

    in this case, a `String`, a `Double` and a `LocalDate`.

    Considering that the `genString()` method is

    called an infinite number of times (in Figure [13-4](#463938_1_En_13_Chapter.xhtml#Fig4)
    this is

    represented with the `(*n))`, more `Singer` instances are

    created, which keep the memory occupied. At some point, the program

    becomes unable to create others because there is no memory

    available.


    This is where the garbage collector comes into the picture. The `Singer` instances
    that

    are no longer being referenced from the program (and thus unreachable)

    are considered garbage. Now you know where the name came from. These

    instances are no longer necessary and the memory can be safely cleaned

    up. The garbage collector is a cleanup thread that runs in parallel with

    the main execution thread. It occasionally deletes the unreferenced

    objects from the heap memory. And because the `finalize()`

    method  is still

    available for use, we overwrite it for the `Singer` type to print

    a log message so that we can see when the garbage collector is

    destroying an instance, because before deleting an object from the heap

    memory the `finalize()` method of

    the object is called. The following code snippet depicts the `Singer` instance.


    ```

    package com.apress.bgn.ch13;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.*;

    import java.time.LocalDate;

    import java.util.Objects;

    public class Singer implements Serializable {

    private static final Logger log = LoggerFactory.getLogger(Singer.class);

    private final long birthtime;

    private String name;

    private Double rating;

    private LocalDate birthDate;

    public Singer(String name, Double rating, LocalDate birthDate) {

    this.name = name;

    this.rating = rating;

    this.birthDate = birthDate;

    this.birthtime = System.nanoTime();

    }

    public String getName() {

    return name;

    }

    @Override

    protected void finalize() throws Throwable {

    try {

    long deathtime = System.nanoTime();

    long lifespan =  (deathtime - birthtime) / 1_000_000_000;

    log.info("GC Destroyed: {} after {} seconds",  name, lifespan);

    } finally {

    super.finalize();

    }

    }

    }

    ```


    The **birthtime** field was added to calculate the time

    that passes between when an instance constructor is called and the time

    that the garbage collector calls the `finalize()`

    method ;

    basically we are calculating the lifespan of the instance. As the time

    is counted in nanoseconds, we are dividing the difference by

    10⁹ to get the time in seconds.

    The code sample used in this section gives the garbage collector a

    lot of work to do, as every `Singer` instance being

    created is being used very little before being discarded. If you run the

    code you will see a lot of log messages in the console, first a lot of

    messages about objects being created, but if you wait, messages about

    objects being discarded will appear as well. All output is directed to a

    file, because the IntelliJ IDEA console is based on a buffer that resets

    from time to time to prevent the editor from crashing. You have to stop

    the program manually, because the `while(true)` loop

    never ends, because its condition never evaluates to `false`. After you

    stopped the program, you notice a log file at the following location:

    `/chapter13/out/gc.log`.

    If you don’t, modify the IntelliJ IDEA launcher

    for this class, add the `-Dlogback.configurationFile=chapter13/src/main/resources/logback.xml`

    VM option, and run it again.


    The `gc.log`

    contents should look a lot like the snippet depicted next.


    ```

    INFO  c.a.b.c.Main - JVM created: Ngvuamtkrfeavt

    INFO  c.a.b.c.Main - JVM created: Weeqhwssuddcatm

    INFO  c.a.b.c.Main - JVM created: Zrtfrjsjwhwlzh

    INFO  c.a.b.c.Main - JVM created: Ymsdzcpkatryscf

    INFO  c.a.b.c.Main - JVM created: T dkqgjujyz moj

    INFO  c.a.b.c.Main - JVM created: Jjqzzetnwzi itu

    INFO  c.a.b.c.Main - JVM created: Iuivwasfailc fi

    INFO  c.a.b.c.Singer - GC Destroyed: Qtzr gwe ifujbn after 1 seconds

    INFO  c.a.b.c.Main - JVM created: Djlui rbftvepf

    INFO  c.a.b.c.Singer - GC Destroyed: Wzdwcc cqhisbbq after 0 seconds

    INFO  c.a.b.c.Main - JVM created: Caqw iddgborajm

