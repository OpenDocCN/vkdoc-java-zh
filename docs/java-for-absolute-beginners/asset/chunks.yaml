    该示例使用一个无限的 `IntStream` 来生成待发布、处理和消费的元素。这会导致程序永远运行下去，因此你必须手动停止它。另一个后果是 `onComplete()`
    方法永远不会被调用。如果我们想使用它们，就必须确保发布的项目数量是有限的。


    JDK 对响应式流的支持很薄弱，即使在 2018 年 9 月 23 日发布的版本 11 中也是如此。原本期望在 Java 9 之后的版本中会添加更多有用的类，但显然
    Oracle 专注于其他方面，例如重组模块结构以及决定如何更好地通过 JDK 的使用获利，因为两个版本之后，响应式方面仍然没有任何新内容。这就是为什么下一节将介绍一个使用
    Project Reactor 库进行响应式编程的简短示例。


    **响应式流技术兼容性工具包**


    在构建使用响应式流的应用程序时，很多事情都可能出错。为了确保你构建的是正确的响应式应用程序，你可以使用 **响应式流技术兼容性工具包** 项目（也称为 **TCK**）来编写测试。该库包含的类可以针对响应式流规范测试响应式实现。TCK
    旨在验证 Java 9 中包含的接口（位于 `java.util.concurrent.Flow.*` 下），并且出于某种原因，创建该库的团队决定使用 TestNG
    作为测试库。项目源码可在 GitHub 上的 [`https://github.com/reactive-streams/reactive-streams-jvm/tree/master/tck-flow`](https://github.com/reactive-streams/reactive-streams-jvm/tree/master/tck-flow)
    获取，其中包含四个必须实现的类，以便为测试工具提供它们的 `Flow.Publisher`、`Flow.Subscriber`、`Flow.Processor`
    实现进行验证。这四个类是：


    *   `FlowPublisherVerification` 测试 `Publisher` 实现。

    *   `FlowSubscriberWhiteboxVerification` 用于白盒测试 `Subscriber` 实现和 `Subscription`
    实例。

    *   `FlowSubscriberBlackboxVerification` 用于黑盒测试 `Subscriber` 实现和 `Subscription`
    实例。

    *   `IdentityFlowProcessorVerification` 测试 `Processor` 实现。


    为了使每个测试的目的清晰明了，库的测试方法名称遵循以下模式：`TYPE_spec####_DESC`，其中 `TYPE` 是 *required、optional、stochastic
    或 untested* 之一，表示被测试规则的重要性；`spec####` 中的数字符号代表规则编号，第一个 `1` 用于 `Publisher` 实例，`2`
    用于 `Subscribers`；`DESC` 是对测试目的的简短说明。


    让我们看看如何测试我们之前定义的 `IntPublisher`。为此，我们将修改此类，使其能够使用有限的 `IntStream` 作为源。


    ```

    package com.apress.bgn.ch12.jdkstreams;

    import java.util.Random;

    import java.util.concurrent.Flow;

    import java.util.concurrent.SubmissionPublisher;

    import java.util.stream.IntStream;

    public class IntPublisher implements Flow.Publisher {

    private static final Random random = new Random();

    protected final IntStream intStream;

    public IntPublisher(int limit) {

    intStream = limit == 0 ? IntStream.generate(() -> random.nextInt(150)) :

    IntStream.generate(() -> random.nextInt(150)).limit(30);

    }

    ...

    }

    ```


    我们还需要提供对 `IntStream` 流源的访问，以便在测试中使用它。现在，让我们通过实现 `FlowPublisherVerification<Integer>`
    来测试我们的发布者。


    ```

    package com.apress.bgn.ch12.jdkstreams;

    import org.reactivestreams.tck.TestEnvironment;

    import org.reactivestreams.tck.flow.FlowPublisherVerification;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.util.concurrent.Flow;

    public class IntPublisherTest extends FlowPublisherVerification {

    private static final Logger log =

    LoggerFactory.getLogger(FilterCharProcessor.class);

    public IntPublisherTest() {

    super(new TestEnvironment(300));

    }

    @Override

    public Flow.Publisher createFlowPublisher(final long elements) {

    return new IntPublisher(30) {

    @Override

    public void subscribe(Flow.Subscriber subscriber) {

    intStream.forEach(subscriber::onNext);

    subscriber.onComplete();

    }

    };

    }

    @Override

    public Flow.Publisher createFailedFlowPublisher() {

    return new IntPublisher(0) {

    @Override

    public void subscribe(Flow.Subscriber subscriber) {

    subscriber.onError(new RuntimeException(

    "There be dragons!"));

    }

    };

    }

    }

    ```

