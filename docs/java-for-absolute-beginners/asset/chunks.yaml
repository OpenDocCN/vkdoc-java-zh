- fmt: "### Escaping Characters\n\nThere are special characters that cannot be part\
    \ of a `String` value. As you have probably noticed, `String` values are defined\
    \ between double quotes (`\"sample\"`) and this makes the `\"` (double quote)\
    \ character unusable as a value. To use it as a `String` value, it has to be *escaped*.\
    \ Aside from this character there is also the `\\` (backslash) and the `\\a` (alert).\
    \ Figure [5-16](#463938_1_En_5_Chapter.xhtml#Fig16) shows how IntelliJ IDEA tries\
    \ to tell you that you cannot use those characters in the content of a `String`\
    \ value.\n\n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig16_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig16_HTML.jpg)\n\
    \nFigure 5-16\n\nCode samples with special characters\n\nTo escape those characters,\
    \ a backslash must be inserted before them. The `'` (single quote) must be escaped\
    \ as well when used as a character value.\n\n```\nchar quote = '\\\"';\n```\n\n\
    There are some other Java escape sequences that can be used in `String` values\
    \ to get a certain effect, which are listed in Table [5-1](#463938_1_En_5_Chapter.xhtml#Tab1).\n\
    \nTable 5-1\n\nJava Escape Sequences\n\n| **Escape Sequence** | **Effect** |\n\
    | --- | --- |\n| `\\n` | Create a new line (often called the newline character)\
    \ |\n| `\\t` | Create a tab |\n| `\\b` | Create a backspace character (which might\
