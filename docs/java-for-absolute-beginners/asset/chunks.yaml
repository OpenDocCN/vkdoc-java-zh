    ##### `Using` Stubs


    A **stub** is an object that holds predefined data and uses it to answer test
    calls. An instance of `AccountServiceImpl` uses an instance of `AccountRepo` to
    retrieve data from the database or save data to a database. Considering we are
    writing unit tests, we want to cover the functionality of the service class, so
    we can write a **stub** class to simulate the behavior of `AccountRepo`. For the
    `AccountServiceImpl` instance to use it the stub must implement `AccountRepo`.
    In this section the tests cover the method `createAccount(...)` because there
    are multiple points of failure and we can write a lot of different tests for it.
