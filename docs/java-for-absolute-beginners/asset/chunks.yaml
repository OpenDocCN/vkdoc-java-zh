- fmt: '### Binary Operators


    Let’s start with the ones you probably know from math.


    - `+` adds two variables


    ```

    [jshell> int i = 4

    i ==> 4

    |  created variable i : int

    [jshell> int j = 6

    j ==> 6

    |  created variable j : int

    [jshell> int k = i + j

    k ==> 10

    |  created variable k : int

    [jshell> int i = i + 2

    i ==> 6

    |  modified variable i : int

    |    update overwrote variable i : int

    ```


    The last statement `int i = i + 2` has the effect of incrementing the value of
    `i` with 2 and there is a little redundancy there. That statement can be written
    without mentioning `i` twice, because its effect is to increase the value of `i`
    with 2. This can be done by using the `+=` operator, which is composed of the
    assignment and the addition operator. The optimal statement is `i += 2`.


    The `+` operator can also be used to concatenate `String` instances, or `String`
    instances with other types. The JVM decides how to use the `+` operator depending
    on the context. Let’s look at the following example.


    ```

    package com.apress.bgn.ch6;

    public class ConcatenationDemo {

    public static void main(String... args) {

    int i1 = 0;

    int i2 = 1;

    int i3 = 2;

    System.out.println(i1 + i2 + i3);

    System.out.println("Result1 = " + (i1 + i2) + i3);

    System.out.println("Result2 = " + i1 + i2 + i3);

    System.out.println("Result3 = " + (i1 + i2 + i3));

    }

    }

    ```


    If the preceding code executed the following is displayed in the console.


    ```

    1\.   3

    2\.   Result1 = 12

    3\.   Result2 = 012

    4\.   Result3 = 3

    ```


    I’ll explain.


    - The result in line 1 can be explained as follows: because all operands are of
    type `int` JVM adds the terms as normal and the `println` function prints this
    result.

    - The result in line 2 can be explained as follows: parentheses were added to
    isolate the addition of two terms `(i1+i2)`. Because of this, the JVM executes
    the addition between the parentheses as a normal addition between to `int` terms.
    But after that, what we are left with is `"Result1 = " + 1 + i3`, and this operation
    includes a `String` operand, which means the `+` operator must be used as a concatenation
    operator, because adding a number with a text value does not work otherwise.

    - The result in line 3 should be obvious at this time; we have three `int` operands,
    and a `String` operand, and thus the JVM decides that the context of the operation
    cannot be numeric, so concatenation is required.

    - The result in line 4 can be explained in a similar way as line 2; the parentheses
    are used to ensure that the context of the operation is numeric, and thus the
    three operands are added.


    This is a typical example to show how JVM decides the context for operations involving
    the `+` operator that you might find in other Java tutorials as well. But the
    `int` variables can be replaced with `float` or `double` variables and the behavior
    is similar.


    - `-` subtracts two variables, or subtracts a value from a variable. The following
    shows how this operator and the `-=` operator, which is composed of the assignment
    and the subtraction operator, are used.

    - `*` multiplies two variables, or multiplies a value with a variable. It is used
    in similar statements as `+` and `-`, and there is a composed operator `*=` that
    can be used to multiply the value of a variable and assign it on the spot.


    ```

    [jshell> int i = 4;

    i ==> 4

    |  created variable i : int

    [jshell> int j = 2;

    j ==> 2

    |  created variable j : int

    [jshell> int k = i – j

    k ==> 2

    |  created variable k : int

    [jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> i = i - 3;

    i ==> 1

    |  assigned to i : int

    [jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> i -= 3

    $9 ==> 1

    |  created scratch variable $9 : int

    ```


    - `/` divides two variables, or divides a value by a variable. It is used in similar
    statements as `+` and `-`, and there is a composed operator `/=` that can be used
    to divide the value of a variable and assign it on the spot. The result of a division
    is named *quotient* and it is assigned to the variable on the left side of the
    assignment sign (`"="`). When the operands are integers, the result is an integer
    too, and the *remainder* is discarded.


    ```

    [jshell> int i = 4

    i ==> 4

    |  created variable i : int

    [jshell> int j = 2

    j ==> 2

    |  created variable j : int

    [jshell> int k =    i * j

    k ==> 8

    |  created variable k : int

    [jshell> int i = 4;

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> i = i * 3

    i ==> 12

    |  assigned to i : int

    [jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> i *= 3

    $7 ==> 12

    |  created scratch variable $7 : int

    ```


    - `%` is also called the *modulus* operator divides two variables, but the result
    is the remainder of the division. The operation is called *modularization* and
    there is also a composed operator `%=` that is used to divide the value of a variable
    and assign the remainder on the spot.


    ```

    [jshell> int i = 4

    i ==> 4

    |  created variable i : int

    [jshell> int j = 2

    j ==> 2

    |  created variable j : int

    [jshell> int k = i / j

    k ==> 2

    |  created variable k : int

    [jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> int i = i / 3

    i ==> 1

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> i /= 3

    $7 ==> 1

    |  created scratch variable $7 : int

    ```


    ```

    [jshell> int i = 4

    i ==> 4

    |  created variable i : int

    [jshell> int j = 3

    j ==> 3

    |  created variable j : int

    [jshell> int k = i % j

    k ==> 1

    |  created variable k : int

    [jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> i = i % 3

    i ==> 1

    |  assigned to i : int

    [jshell> int i = 4

    i ==> 4

    |  modified variable i : int

    |    update overwrote variable i : int

    [jshell> i %= 3

    $7 ==> 1

    |  created scratch variable $7 : int

    ```


    The modulus operator returns the remainder, but, what happens when the operands
    are real numbers? And what if the remainder is a real number with an infinite
    numbers of decimals after the decimal point?


    ```

    package com.apress.bgn.ch6;

    public class ModulusDemo {

    public static void main(String... args) {

    float f = 1.9f;

    float g = 0.4f;

    float h = f % g;

    System.out.println("remainder = " + h);

    }

    }

    ```


    Well, some rounding is done. The text printed in the console is `remainder = 0.29999995`
    which can be rounded to 0.3, for some cases. But rounding can be dangerous when
    the data is used for sensitive operations, like determining the volume of a tumor
    for a robot to operate on, or determining the perfect trajectory for a rocket
    to be sent to Mars. So, rounding can be problematic, because it causes a loss
    of precision.'
