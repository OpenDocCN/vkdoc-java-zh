    作为根，它是所有其他窗口的父窗口，因为窗口也可以使用 `JDialog` 类来创建。`JDialog` 是创建对话框窗口的主要类，这是一种特殊类型的窗口，主要包含消息和用于选择选项的按钮。开发者可以使用这个类创建自定义对话框，或者使用
