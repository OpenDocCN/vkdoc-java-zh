    \ the design to decide if it represents a proper solution for the problem and\
    \ if it is realizable. When the code is written, it has to be tested to make sure\
    \ the application does not crash and behaves as expected. Before delivery, there\
    \ is a phase named acceptance testing when client representatives test the application\
    \ in a controlled environment so every action is logged and problems identified.\
