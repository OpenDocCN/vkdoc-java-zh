    ### **！**


    `"\"` 是 macOS/Linux 的分隔符。在 Windows 上，要么将整个命令写在一行，要么将 `"\"` 替换为 `"^"`。


    让我解释一下我做了什么。编译模块的语法如下：


    ```

    javac -d [目标位置]/[模块名称] \

    [源位置]/module-info.java  \

    [java 文件...]

    ```


    执行该命令的结果是，在 `out` 目录下创建了一个名为 `com.sandbox` 的目录——即模块名称。在此目录下，我们拥有 `com.sandbox`
    包的标准结构。`out` 目录的内容如图 3-22 所示。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig22_HTML.jpg](img/463938_1_En_3_Fig22_HTML.jpg)


    图 3-22


    手动编译的 Java 模块 com.sandbox


    正如你在本例中注意到的，模块实际上直到我们编译源代码时才真正存在，因为 Java 模块更像是一种由 `module-info.class` 描述符描述的封装包的逻辑模式。创建
    `com.sandbox` 目录的唯一原因是我们将其作为参数指定在了 `javac -d` 命令中。


    现在我们有了一个编译好的模块，该怎么处理它呢？显然，我们要尝试运行这个应用程序。


    ```

    sandbox/: $ java --module-path out \

    --module   com.sandbox/com.sandbox.HelloWorld

    Hello  World!

    ```


    执行模块化应用程序的语法如下：


    ```

    java --module-path [目标位置] \

    --module [模块名称] /[包名].HelloWorld

    Hello  World!

    ```


    关于模块名称，是不是感觉有点冗余？对我来说确实如此，这就是为什么我倾向于不为模块创建目录，除非我在 `src` 目录下有多个模块。而且我们必须讨论模块的标准命名约定。如果开发人员想为模块创建目录，这可能是另一个让他们头疼的问题。在多篇博客文章和
    *Oracle Magazine*（2017 年 9 月）中，都推荐这样做。^(⁴⁹) 但现在不必担心；本书的源代码包含名称简单的模块，并且模块配置已经为你准备好了。


    #### 使用构建工具（主要是 Gradle）的 Java 项目


    Maven 是一种主要用于 Java 项目的构建自动化工具。尽管 Gradle 正在崛起，但 Maven 仍然是使用最广泛的构建工具之一。像 Gradle
    和 Maven 这样的工具用于将应用程序的源代码组织成相互依赖的项目模块，并配置一种自动编译、验证、生成源代码、测试和生成工件的方法。工件是一个文件，通常是
    JAR，会被部署到 Maven 仓库。Maven 仓库是硬盘上的一个位置，JAR 文件按照特殊的目录结构保存在那里。


    关于构建工具的讨论必须从 Maven 开始，因为这个构建工具标准化了我们今天开发中使用的许多术语。Gradle 尊重许多 Maven 标准规则，并被选为本书附带源代码的首选构建工具，因为它更易于配置，且配置文件体积更小。一个拆分为多个子项目的项目可以从
    GitHub 下载，并在命令行中构建或导入到 IntelliJ 中。这种方法确保你获得可以一次性编译的高质量源代码。这也很实用，因为我想你不想每次开始阅读新章节时都在
    IntelliJ IDEA 中加载一个新项目。此外，这让我更容易维护源代码并使其适应新的 JDK，而且由于 Oracle 发布如此频繁，我需要能够快速做到这一点。


    用于测试本书代码以及（如果你想的话）编写自己代码的项目名为 `java-for-absolute-beginners`。它是一个多模块的 Gradle 项目。项目的第一级是
    `java-for-absolute-beginners` 项目，它有一个名为 `build.gradle` 的配置文件。在这个文件中，列出了所有依赖项及其版本。子项目，即第二级的项目，是这个项目的模块。我们称它们为*子*项目，因为它们从父项目继承了那些依赖项和模块。在它们的配置文件中，我们可以指定需要父项目中定义的依赖项列表中的哪些依赖项。这些模块是一种为每一章封装源代码的方法，这就是为什么这些模块被命名为
    `chapter00`、`chapter01` 等等。如果一个项目很大，需要编写大量代码，代码会再次拆分到另一级模块中。`chapter05` 模块就是这种情况，它被配置为其下项目的父项目。在图
    3-23 中，你可以看到这个项目在 IntelliJ IDEA 中加载的样子，并且 `chapter05` 模块已展开，以便你可以看到第三级模块。每一级都用相应的数字标记。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig23_HTML.jpg](img/463938_1_En_3_Fig23_HTML.jpg)


    图 3-23


    Gradle 多模块层级结构


    在附录中，你可以阅读关于此 Gradle 项目配置的详细说明。现在，如果你已经按照**第 2 章** 2 中的指导将其加载到 IntelliJ IDEA 中，你可以通过构建它来确保一切正常工作。操作方法如下。


    你可以使用 IntelliJ IDEA 编辑器来完成，在右上角应该有一个名为 **Gradle projects** 的选项卡。


    如果项目如图 3-24 所示加载，则项目加载正确。如果 **Gradle projects** 选项卡不可见，请查找像 (1) 标记的标签，并点击它。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig24_HTML.jpg](img/463938_1_En_3_Fig24_HTML.jpg)


    图 3-24


    Gradle 多模块层级结构


    展开 `java-for-absolute-beginners(root)` 节点，直到找到标记为 (2) 的 `build` 任务。如果你双击它，并且在编辑器底部的视图中没有看到任何错误，那么你所有的项目都已成功构建。


    确保 Gradle 项目按预期工作的第二种方法是从命令行构建它。打开一个 IntelliJ IDEA 终端，如果你已经按照**第 2 章** 2 中的说明将
    Gradle 安装到了系统路径中，输入 **gradle clean build** 并按下 **Enter** 键。在命令行中，你可能会看到一些警告（如果支持
    Java 模块的 Gradle 插件在你拿到本书时仍不稳定），但只要执行以 `BUILD SUCCESSFUL` 结束，一切就都没问题。


    除了 `sandbox` 项目之外，本节中提到的所有类、模块和包都是此项目的一部分。`chapter00` 和 `chapter01` 实际上并不包含特定于这些章节的类。我需要它们来构建
    Java 模块示例。IntelliJ IDEA 按字母顺序对模块进行排序，因此章节模块的命名方式就是这样选择的。它们按照你应该使用的顺序列出。到目前为止，本章的重点是
    Java 应用程序的构建块，你按照说明创建了一个打印 *Hello World!* 的类，但细节并未真正涉及。现在让我们来做这件事，并用新的细节来丰富这个类。

