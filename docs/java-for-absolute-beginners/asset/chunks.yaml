    `javadoc`任务会识别已弃用的元素，并打印警告信息供开发者查看。该任务成功执行后，可以在`logging-jul`目录下找到`build`目录。所有从
    IntelliJ IDEA 运行的 Gradle 任务的结果都存储在此处。在此目录中，应该有一个 **docs ➤ javadoc** 目录层级。如果展开
    **javadoc** 层级，应该能看到构成我们模块 Javadoc 站点的所有文件。期待的输出如图 [9-18](#463938_1_En_9_Chapter.xhtml#Fig18)
    所示。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig18_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig18_HTML.jpg)


    图 9-18 通过执行 Gradle javadoc 任务生成的 Javadoc 站点


    任何站点都有一个起始页面，默认的是`index.html`。右键单击该文件，从弹出的上下文菜单中选择 **Open in Browser**，然后选择你偏好的浏览器。如果你觉得这个页面与
    JDK 官方 Javadoc 页面相似，那并非错觉；官方页面也是使用相同的 Doclet API 生成的。要查看模块（项目）中所有文档的详细视图，请点击 **FRAMES**
    链接。这会重定向到一个页面，该页面左侧有两个框架：一个包含项目的包，另一个包含类/接口/枚举；右侧的框架则显示在左侧框架中点击的每个项目的信息。你应该会看到类似于图
    [9-19](#463938_1_En_9_Chapter.xhtml#Fig19) 所示的页面。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig19_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig19_HTML.jpg)


    图 9-19 在浏览器中打开的、通过执行 Gradle javadoc 任务生成的 Javadoc 站点


    Javadoc 文档会被 IntelliJ IDEA 和其他智能编辑器识别，并在开发者在代码中使用已文档化的组件时即时显示。当选中一个类、方法名、接口方法等时，大多数智能编辑器都提供某种包含
    F1 的组合键，开发者按下该键后，文档会弹窗显示。在 IntelliJ IDEA 中，点击一个元素并按 F1，Javadoc 文档就会在一个弹出窗口中显示，并格式良好，如图
    [9-20](#463938_1_En_9_Chapter.xhtml#Fig20) 所示。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig20_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig20_HTML.jpg)


    图 9-20 在 IntelliJ IDEA 中显示的 Javadoc 信息


    只要代码是开源的并且模块导出了相应的包，你就可以在任何智能编辑器中查看项目任何依赖项（包括 JDK 类）的 Javadoc 信息。


    在 Java 9 中，用于生成 Javadoc 的 Doclet API 得到了升级和改头换面。在 Java 9 之前，开发者抱怨旧版本存在性能问题、API
    晦涩难懂、缺乏支持以及整体功能浅薄。在 Java 9 中，大部分问题都得到了解决。详细的改进描述位于[`http://openjdk.java.net/jeps/221`](http://openjdk.java.net/jeps/221)。


    文档非常有价值，当它做得非常好时，可以使开发变得实用且愉快。因此，在编写代码时，要像你期望项目依赖项有文档那样去记录它。


    你可能听说过 **RTFM** 这个表达，它是 **Read The F***ing Manual!** 的缩写。这个表达在软件开发中经常被经验丰富的开发者用于与新手开发者合作时。问题是，当没有手册时该怎么办？大多数面临截止日期的公司可能倾向于分配很少或根本不分配时间来记录项目。因此，本节被添加到本书中，是为了强调文档在软件开发中的重要性，并教你如何在编写代码的同时编写文档，因为你之后可能没有时间去做。


    ## 总结


    本章涵盖了重要的开发工具和技术、JDK 中为它们提供支持的类，以及能够使你的开发工作更实用、更愉快的重要 Java 库。以下是完整的主题列表。


