- fmt: '### Streams of Primitives and Streams of Strings


    When we first created a stream of primitives, we used an `int[]` array as a source.
    But streams of primitives can be created in a different way, because the *Stream
    API* contains more interfaces with default methods to make programming with streams
    practical. Figure [8-1](#463938_1_En_8_Chapter.xhtml#Fig1) shows the `Stream`
    hierarchy. The `IntStream` interface can be used to create primitive streams of
    integers. This interface exposes many methods to do so, some of them inherited
    from `BaseStream`. An `IntStream` instance can be created from a few values specified
    on the spot, either by using the `builder()`, `generate()`, or `iterate()` methods
    or by using the `of` method, as depicted next.


    ![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig1_HTML.jpg](images/463938_1_En_8_Chapter/463938_1_En_8_Fig1_HTML.jpg)


    **Figure 8-1** Stream API interfaces


    ```

    IntStream intStream0 = IntStream.builder().add(0).add(1).add(2).add(5).build();

    IntStream intStream1 = IntStream.of(0,1,2,3,4,5);

    ```


    An `IntStream` instance can be created by giving the start and end of an interval
    as arguments to the `range()` and `rangeClosed()`. Both of them generate elements
    for the stream, with a step of 1, only the last one includes the upper range of
    the interval as a value.


    ```

    intStream2 = IntStream.range(0, 10);

    intStream3 = IntStream.rangeClosed(0, 10);

    ```


    Also, in Java 1.8 the `java.util.Random` class was enriched with a method named
    `ints` that generates a stream of random integers. It declares a single argument
    that represents the number of elements to be generated and put in the stream,
    but there is a form of this method without the argument that generates an infinite
    stream.


    ```

    Random random = new Random();

    intStream = random.ints(5);

    ```


    All the methods mentioned for `IntStream` can generate `LongStream` instances,
    because equivalent methods are defined in this interface. There are no range methods
    for `DoubleStream`, but there is the `of()` method, `builder()`, `generate()`
    and so on. Also, the `java.util.Random` class was enriched in Java 1.8 with the
    `doubles()` method that generates a stream of random double values. It declares
    a single argument that represents the number of elements to be generated and put
    in the stream, but there is a form of this method without the argument that generates
    an infinite stream. In the following code snippet, a few ways of creating streams
    of doubles are depicted.


    ```

    DoubleStream doubleStream0 = DoubleStream.of(1, 2 , 2.3, 3.4, 4.5, 6);

    Random random = new Random();

    DoubleStream doubleStream1 = random.doubles(3);

    DoubleStream doubleStream2 = DoubleStream.iterate(2.5, d -> d = d + 0.2).limit(10);

    ```


    For streams of `char` values there is no special interface, but `IntStream` can
    be used just fine.


    ```

    IntStream intStream = IntStream.of(''a'',''b'',''c'',''d'');

    intStream.forEach(c -> System.out.println((char) c));

    ```


    Another way to create a stream of `char` values is to use a `String` instance
    as a stream source.


    ```

    IntStream charStream = "sample".chars();

    charStream.forEach(c -> System.out.println((char) c));

    ```


    In Java 8, the `java.util.regex.Pattern` was enriched with stream specific methods
    too; as a class used to process `String` instances, it is the proper place to
    add these methods after all. A `Pattern` instance can be used to split an existing
    `String` instance and return the pieces as a stream using the `splitAsStream(..)`
    method.


    ```

    Stream stringStream = Pattern.compile(" ")

    .splitAsStream("live your life");

    ```


    The contents of a file can also be returned as a stream of strings using the `Files.lines(..)`
    utility method.


    ```

    String inputPath = "chapter08/src/main/resources/songs.csv";

    Stream stringStream = Files.lines(Path.of(inputPath));

    ```


    The sections so far have shown you how to create all types of streams; the next
    sections show you how to use them to process data.


    ### !


    If you feel the need to associate stream instances with real objects to make sense
    of them, I recommend the following: imagine a finite stream (like one created
    from a collection) as the water dripping from a mug when inclined. The water in
    the mug will end eventually, but while the water drips, it forms a stream. An
    infinite stream is like a river that has a fountain head, it flows continuously.
    (well, unless a serious drought dries the river, of course)'
