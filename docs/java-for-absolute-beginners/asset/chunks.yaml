    #### IntelliJ IDEA 中的 HelloWorld! 项目


    顺便提一下，你甚至不需要创建项目，因为你有 JShell。打开终端（Windows 上是命令提示符）和 JShell，然后输入 `System.out.print("Hello
    World!")` 语句。


    ```

    $  jshell

    |   Welcome to JShell -- Version 11-ea

    |   For an introduction type: /help intro

    jshell> System.out.print("Hello World!")

    Hello World!

    ```


    既然你已经安装了 IntelliJ IDEA，那我们就创建一个 Java 项目，看看编辑器会为我们选择什么样的项目结构。首先启动 IntelliJ IDEA，点击
    **Create New Project** 选项。随后会弹出一个二级对话框窗口，左侧列出了你可以创建的项目类型。这里提到的两个对话框窗口如图 3-9 所示。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig9_HTML.jpg](img/463938_1_En_3_Fig9_HTML.jpg)


    图 3-9


    创建一个 IntelliJ IDEA 项目


    从左侧选择 Java 项目类型，然后点击 **Next**。（不要选择任何额外的库和框架，我们实际上是在创建尽可能最小的 Java 项目。）在下一个对话框窗口中，可以输入项目名称和位置。由于我们创建的是
    Java 11 项目，你可以注意到底部有一个用于配置 Java 模块的区域。这个配置窗口如图 3-10 所示。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig10_HTML.jpg](img/463938_1_En_3_Fig10_HTML.jpg)


    图 3-10


    IntelliJ IDEA 项目配置对话框窗口


    输入项目名称和模块名称后——我们将项目名称和模块名称都设为 `sandbox`——点击 **Finish**，下一个窗口应该是编辑器窗口，你可以在其中开始编写代码。如果你展开左侧的
    `sandbox` 节点（该部分称为*项目视图*），可以看到项目是使用你已安装的 JDK（此处为 11）构建的，并且为你创建了一个 `src` 目录。你的项目应该与图
    3-11 所示非常相似。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig11_HTML.jpg](img/463938_1_En_3_Fig11_HTML.jpg)


