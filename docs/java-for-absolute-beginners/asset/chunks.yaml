- fmt: "# 1. An Introduction to Java and Its History\n\nJava is currently one of the\
    \ most influential programming languages. It all started in 1990, when an American\
    \ company that was leading the revolution in the computer industry decided to\
    \ gather its best engineers together to design and develop a product that would\
    \ allow them to become an important player in the new emerging Internet world.\
    \ Among those engineers was James Arthur Gosling, a Canadian computer scientist\
    \ who is recognized as the “father” of the Java programming language. It would\
    \ take five years of design, programming, and one rename (from Oak to Java because\
    \ of trademark issues), but finally in 1996, Java 1.0 was released for Linux,\
    \ Solaris, Mac, and Windows.\n\nYou might have the tendency to skip this chapter\
    \ altogether. But I think it would be a mistake. I was never much interested in\
    \ the history of Java. I was using it for work. I knew that James Gosling was\
    \ the creator and that Oracle bought Sun, and that was pretty much it. I never\
    \ cared much about how the language evolved, where the inspiration came from,\
    \ or how one version was different from another. I started learning Java at version\
    \ 1.5, and I took a lot of things in the language for granted. So, when I was\
    \ assigned to a project running on Java 1.4, I was quite confused, because I did\
    \ not know why some of the code I wrote was not compiling. Although the IT industry\
    \ is moving very fast, there will always be that one client that has a legacy\
    \ application. And knowing the peculiarities of each Java version is an advantage,\
    \ because you know the issues when performing a migration.\n\nWhen I started doing\
    \ research for this book, I was mesmerized. The history of Java is interesting\
    \ because it is a tale of incredible growth, success of a technology, and how\
    \ a clash of egos in management almost killed the company that created it. Because\
    \ even if Java is the most used technology in software development, it is simply\
    \ paradoxical that the company that gave birth to it no longer exists.\n\nThis\
    \ chapter covers each version of Java to track the evolution of the language and\
    \ the Java virtual machine. You can find a timeline for versions 1.0 to 1.8 on\
    \ the Oracle official site at [`http://oracle.com/edgesuite.net/timeline/java./`](http://oracle.com/edgesuite.net/timeline/java./).\
    \ But first, I’ll introduce the book.\n\n## Who This Book Is For\n\nMost Java\
    \ books for beginners start with the typical *Hello World!* example depicted here:\n\
    \n```\npublic class HelloWorld {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    Hello  World!\");\n}\n}\n```\n\nThis code, when executed, prints *Hello World!*\
    \ in the console. But if you have bought this book, it is assumed that you want\
    \ to develop real applications in Java, and get a real chance when applying for\
    \ a position as a Java developer. If this is what you want, if this is who you\
    \ are, a beginner with the wits and the desire to make full use of this language’s\
    \ power, then this book is for you. And that is why to start this book, a complex\
    \ example is used. We go over it in almost every section, when some part of it\
    \ is clarified.\n\nJava is a language with a syntax that is readable and based\
    \ on the English language. So, if you have a logical thinking and a little knowledge\
    \ of the English language, it should be obvious to you what the following code\
    \ does without even executing it.\n\n```\npackage com.apress.ch.one.hw;\nimport\
    \ java.util.List;\npublic class Example01 {\npublic static void main(String[]\
    \ args) {\nList items = List.of(\"1\", \"a\", \"2\", \"a\", \"3\", \"a\");\nitems.forEach(item\
    \ -> {\nif (item.equals(\"a\")) {\nSystem.out.println(\"A\");\n} else {\nSystem.out.println(\"\
    Not A\");\n}\n});\n}\n}\n```\n\nIn this code example, a list of text values is\
    \ declared; then the list is traversed, and when a text is equal to `\"a\"`, the\
    \ letter `\"A\"` is printed in the console; otherwise, `\"Not A\"` is printed.\n\
    \nIf you are an absolute beginner to programming, this book is for you, especially\
    \ because the sources attached to this book make use of algorithms and design\
    \ patterns commonly used in programming. So, if your plan is to get into programming\
    \ and learn a high-level programming language, read the book, run the examples,\
    \ write your own code, and you should have a good head start.\n\nIf you already\
    \ know Java, you can use this book too because it covers the specifics of Java\
    \ versions 9, 10, and 11 (the EAP^([¹](#fn1)) release).\n\n## How This Book Is\
    \ Structured\n\nThe chapter you are reading is an introductory one that covers\
    \ a little bit of Java history, showing you how the language has evolved and a\
    \ glimpse into its future. Also, the mechanics of executing a Java application\
    \ are covered, so that you are prepared for Chapter [2](#463938_1_En_2_Chapter.xhtml).\
    \ The next chapter shows you how to set up a development environment and introduces\
    \ you to a simple application. In Chapters [3](#463938_1_En_3_Chapter.xhtml) to\
    \ [7](#463938_1_En_7_Chapter.xhtml), the fundamental parts of the language are\
    \ covered: packages, modules, classes, objects, operators, data types, statements,\
    \ streams, lambda expressions, and so forth. Starting with Chapter [8](#463938_1_En_8_Chapter.xhtml)\
    \ more advanced features are covered such as: interactions with external data\
    \ sources: reading writing files, serializing/deserializing objects, testing and\
    \ creating an interface. Chapter [12](#463938_1_En_12_Chapter.xhtml) is dedicated\
    \ fully to the publish-subscribe framework introduced in Java 9. Chapter [13](#463938_1_En_13_Chapter.xhtml)\
    \ covers the garbage collector.\n\nThe book is completed by the `java-for-absolute-beginners`\
    \ project. This project is organized in modules (thus it is a multimodule project)\
    \ that are linked to each other and must be managed by `Gradle`. `Gradle` is something\
    \ we developers call a *build tool*, which is used to build projects. To build\
    \ a project means transforming the code into something that can be executed. I\
    \ chose to use multimodule projects for the books I write because it is easier\
    \ to build them, and common elements can be grouped together, keeping the configuration\
    \ of the project simple and non-repetitive. Also, by having all the sources organized\
    \ in one multimodule project, you get the feedback on whether the sources are\
    \ working or not as soon as possible, and you can contact the author and ask him\
    \ or her to update them.\n\n## Conventions\n\nThis book uses a number of formatting\
    \ conventions that should make it easier to read. To that end, the following conventions\
    \ are used within the book:\n\n*   code or concept names in paragraphs appear\
    \ as follows:\n\n    `import java.util.List;`\n\n*   code listings appear as follows:\n\
    \n    ```\n    public static void main(String[] args) {\n    System.out.println(\"\
    Hello there young developer!\");\n    }\n    ```\n\n*   logs in console outputs\
    \ appear as follows:\n\n    ```\n    01:24:07.809 [main] INFO  c.a.Application\
    \ - Starting Application\n    01:24:07.814 [main] DEBUG c.a.p.c.Application -\
    \ Running in debug mode\n    ...\n    ```\n\n*   ! This symbol appears in front\
    \ of paragraphs that you should pay specific attention to.\n\n*   *Italic* font\
    \ is used for metaphors, jocular terms and technical terms that the reader should\
    \ pay special attention to because they are not explained in the current context,\
    \ but they are covered in the book. Examples: “This was mentioned before at the\
    \ end of Chapter [4](#463938_1_En_4_Chapter.xhtml) when *generics* were introduced.”\
    \ “The **stack** memory is used during execution (also referred to as at *runtime*)”\
    \ or “Let’s see how this is being done *under the hood*”.\n\n*   **Bold** font\
    \ is used for chapter references and important terms.\n\nAs for my style of writing,\
    \ I like to write my books in the same way I have technical conversations with\
    \ colleagues and friends: sprinkling jokes, giving production examples, and making\
    \ analogies to non-programming situations. Because programming is just another\
    \ way to model the real world."
  raw: "# 1. An Introduction to Java and Its History\n\nJava is currently one of the\
    \ most influential programming languages. It all started in 1990, when an American\
    \ company that was leading the revolution in the computer industry decided to\
    \ gather its best engineers together to design and develop a product that would\
    \ allow them to become an important player in the new emerging Internet world.\
    \ Among those engineers was James Arthur Gosling, a Canadian computer scientist\
    \ who is recognized as the “father” of the Java programming language. It would\
    \ take five years of design, programming, and one rename (from Oak to Java because\
    \ of trademark issues), but finally in 1996, Java 1.0 was released for Linux,\
    \ Solaris, Mac, and Windows.\n\nYou might have the tendency to skip this chapter\
    \ altogether. But I think it would be a mistake. I was never much interested in\
    \ the history of Java. I was using it for work. I knew that James Gosling was\
    \ the creator and that Oracle bought Sun, and that was pretty much it. I never\
    \ cared much about how the language evolved, where the inspiration came from,\
    \ or how one version was different from another. I started learning Java at version\
    \ 1.5, and I took a lot of things in the language for granted. So, when I was\
    \ assigned to a project running on Java 1.4, I was quite confused, because I did\
    \ not know why some of the code I wrote was not compiling. Although the IT industry\
    \ is moving very fast, there will always be that one client that has a legacy\
    \ application. And knowing the peculiarities of each Java version is an advantage,\
    \ because you know the issues when performing a migration.\n\nWhen I started doing\
    \ research for this book, I was mesmerized. The history of Java is interesting\
    \ because it is a tale of incredible growth, success of a technology, and how\
    \ a clash of egos in management almost killed the company that created it. Because\
    \ even if Java is the most used technology in software development, it is simply\
    \ paradoxical that the company that gave birth to it no longer exists.\n\nThis\
    \ chapter covers each version of Java to track the evolution of the language and\
    \ the Java virtual machine. You can find a timeline for versions 1.0 to 1.8 on\
    \ the Oracle official site at [`http://oracle.com/edgesuite.net/timeline/java./`](http://oracle.com/edgesuite.net/timeline/java./)\
    \ . But first, I’ll introduce the book.\n\n## Who This Book Is For\n\nMost Java\
    \ books for beginners start with the typical *Hello World!* example depicted here:\n\
    \n```\npublic class HelloWorld {\npublic static void main(String[] args) {\nSystem.out.println(\"\
    Hello  World!\");\n}\n}\n```\n\nThis code, when executed, prints *Hello World!*\
    \ in the console. But if you have bought this book, it is assumed that you want\
    \ to develop real applications in Java, and get a real chance when applying for\
    \ a position as a Java developer. If this is what you want, if this is who you\
    \ are, a beginner with the wits and the desire to make full use of this language’s\
    \ power, then this book is for you. And that is why to start this book, a complex\
    \ example is used. We go over it in almost every section, when some part of it\
    \ is clarified.\n\nJava is a language with a syntax that is readable and based\
    \ on the English language. So, if you have a logical thinking and a little knowledge\
    \ of the English language, it should be obvious to you what the following code\
    \ does without even executing it.\n\n```\npackage com.apress.ch.one.hw;\nimport\
    \ java.util.List;\npublic class Example01 {\npublic static void main(String[]\
    \ args) {\nList items = List.of(\"1\", \"a\", \"2\", \"a\", \"3\", \"a\");\nitems.forEach(item\
    \ -> {\nif (item.equals(\"a\")) {\nSystem.out.println(\"A\");\n} else {\nSystem.out.println(\"\
    Not A\");\n}\n});\n}\n}\n```\n\nIn this code example, a list of text values is\
    \ declared; then the list is traversed, and when a text is equal to `\"a\"`, the\
    \ letter `\"A\"` is printed in the console; otherwise, `\"Not A\"` is printed.\n\
    \nIf you are an absolute beginner to programming, this book is for you, especially\
    \ because the sources attached to this book make use of algorithms and design\
    \ patterns commonly used in programming. So, if your plan is to get into programming\
    \ and learn a high-level programming language, read the book, run the examples,\
    \ write your own code, and you should have a good head start.\n\nIf you already\
    \ know Java, you can use this book too because it covers the specifics of Java\
    \ versions 9, 10, and 11 (the EAP^([¹](#fn1)) release).\n\n## How This Book Is\
    \ Structured\n\nThe chapter you are reading is an introductory one that covers\
    \ a little bit of Java history, showing you how the language has evolved and a\
    \ glimpse into its future. Also, the mechanics of executing a Java application\
    \ are covered, so that you are prepared for **Chapter** [2](#463938_1_En_2_Chapter.xhtml).\
    \ The next chapter shows you how to set up a development environment and introduces\
    \ you to a simple application. In Chapters [3](#463938_1_En_3_Chapter.xhtml) to\
    \ [7](#463938_1_En_7_Chapter.xhtml), the fundamental parts of the language are\
    \ covered: packages, modules, classes, objects, operators, data types, statements,\
    \ streams, lambda expressions, and so forth. Starting with Chapter [8](#463938_1_En_8_Chapter.xhtml)\
    \ more advanced features are covered such as: interactions with external data\
    \ sources: reading writing files, serializing/deserializing objects, testing and\
    \ creating an interface. Chapter [12](#463938_1_En_12_Chapter.xhtml) is dedicated\
    \ fully to the publish-subscribe framework introduced in Java 9\\. Chapter [13](#463938_1_En_13_Chapter.xhtml)\
    \ covers the garbage collector.\n\nThe book is completed by the `java-for-absolute-beginners`\
    \ project. This project is organized in modules (thus it is a multimodule project)\
    \ that are linked to each other and must be managed by **Gradle**. Gradle is something\
    \ we developers call a *build tool* , which is used to build projects. To build\
    \ a project means transforming the code into something that can be executed. I\
    \ chose to use multimodule projects for the books I write because it is easier\
    \ to build them, and common elements can be grouped together, keeping the configuration\
    \ of the project simple and non-repetitive. Also, by having all the sources organized\
    \ in one multimodule project, you get the feedback on whether the sources are\
    \ working or not as soon as possible, and you can contact the author and ask him\
    \ or her to update them.\n\n## Conventions\n\nThis book uses a number of formatting\
    \ conventions that should make it easier to read. To that end, the following conventions\
    \ are used within the book:\n\n*   code or concept names in paragraphs appear\
    \ as follows:\n\n    `import java.util.List;`\n\n*   code listings appear as follows:\n\
    \n    ```\n    public static void main(String[] args) {\n    System.out.println(\"\
    Hello there young developer!\");\n    }\n    ```\n\n*   logs in console outputs\
    \ appear as follows:\n\n    ```\n    01:24:07.809 [main] INFO  c.a.Application\
    \ - Starting Application\n    01:24:07.814 [main] DEBUG c.a.p.c.Application -\
    \ Running in debug mode\n    ...\n    ```\n\n*   ! This symbol appears in front\
    \ of paragraphs that you should pay specific attention to.\n\n*   *Italic* font\
    \ is used for metaphors, jocular terms and technical terms that the reader should\
    \ pay special attention to because they are not explained in the current context,\
    \ but they are covered in the book. Examples: “This was mentioned before at the\
    \ end of Chapter [4](#463938_1_En_4_Chapter.xhtml) when *generics* were introduced.”\
    \ “The **stack** memory is used during execution (also referred to as at *runtime*)”\
    \ or “Let’s see how this is being done *under the hood*”.\n\n*   **Bold** font\
    \ is used for chapter references and important terms.\n\nAs for my style of writing,\
    \ I like to write my books in the same way I have technical conversations with\
    \ colleagues and friends: sprinkling jokes, giving production examples, and making\
    \ analogies to non-programming situations. Because programming is just another\
    \ way to model the real world."
  trans: "\n# 1. Java 简介及其历史\n\nJava 是目前最具影响力的编程语言之一。这一切始于 1990 年，当时一家引领计算机行业革命的美国公司决定召集其最优秀的工程师，共同设计和开发一款产品，以便在新兴的互联网世界中占据重要地位。在这些工程师中，有一位加拿大计算机科学家詹姆斯·阿瑟·高斯林，他被公认为\
    \ Java 编程语言的“之父”。经过五年的设计、编程以及一次更名（由于商标问题，从 Oak 更名为 Java），Java 1.0 最终于 1996 年在\
    \ Linux、Solaris、Mac 和 Windows 平台上发布。\n\n你可能会倾向于跳过这一章。但我认为这将是一个错误。我以前对 Java 的历史并不太感兴趣。我只是用它来工作。我知道詹姆斯·高斯林是创造者，Oracle\
    \ 收购了 Sun，仅此而已。我从未过多关心这门语言是如何演变的，它的灵感来自哪里，或者一个版本与另一个版本有何不同。我从 1.5 版本开始学习 Java，并且对语言中的许多特性习以为常。因此，当我被分配到一个运行在\
    \ Java 1.4 上的项目时，我感到非常困惑，因为我不知道为什么我写的一些代码无法编译。尽管 IT 行业发展迅速，但总会有某个客户拥有遗留应用程序。了解每个\
    \ Java 版本的特性是一个优势，因为你在执行迁移时会知道可能遇到的问题。\n\n当我开始为这本书做研究时，我完全被迷住了。Java 的历史之所以有趣，是因为它讲述了一个关于技术惊人成长和成功的故事，以及管理层之间的自负冲突如何几乎摧毁了创造它的公司。因为即使\
    \ Java 是软件开发中使用最广泛的技术，但创造它的公司已不复存在，这本身就是一个悖论。\n\n本章将涵盖 Java 的每个版本，以追踪该语言和 Java\
    \ 虚拟机的演变。你可以在 Oracle 官方网站 [`http://oracle.com/edgesuite.net/timeline/java./`](http://oracle.com/edgesuite.net/timeline/java./)\
    \ 上找到版本 1.0 到 1.8 的时间线。但首先，我将介绍这本书。\n\n## 本书的读者对象\n\n大多数面向初学者的 Java 书籍都以典型的 *Hello\
    \ World!* 示例开始，如下所示：\n\n```\npublic class HelloWorld {\npublic static void main(String[]\
    \ args) {\nSystem.out.println(\"Hello  World!\");\n}\n}\n```\n\n这段代码执行时，会在控制台打印\
    \ *Hello World!*。但是，如果你购买了这本书，那么假设你希望用 Java 开发真正的应用程序，并在申请 Java 开发人员职位时获得真正的机会。如果这是你想要的，如果这就是你——一个渴望并希望充分利用这门语言力量的初学者，那么这本书就是为你准备的。这就是为什么本书以一个复杂的示例开始。我们几乎在每个章节中都会回顾这个示例，当其中的某些部分得到解释时。\n\
    \nJava 是一种语法可读且基于英语的语言。因此，如果你具有逻辑思维并掌握一点英语知识，即使不执行以下代码，也应该能明白它的作用。\n\n```\npackage\
    \ com.apress.ch.one.hw;\nimport java.util.List;\npublic class Example01 {\npublic\
    \ static void main(String[] args) {\nList items = List.of(\"1\", \"a\", \"2\"\
    , \"a\", \"3\", \"a\");\nitems.forEach(item -> {\nif (item.equals(\"a\")) {\n\
    System.out.println(\"A\");\n} else {\nSystem.out.println(\"Not A\");\n}\n});\n\
    }\n}\n```\n\n在这个代码示例中，声明了一个文本值列表；然后遍历该列表，当某个文本等于 `\"a\"` 时，在控制台打印字母 `\"A\"`；否则，打印\
    \ `\"Not A\"`。\n\n如果你是一个绝对的编程初学者，这本书非常适合你，特别是因为本书附带的源代码使用了编程中常用的算法和设计模式。因此，如果你的计划是进入编程领域并学习一门高级编程语言，那么阅读本书，运行示例，编写你自己的代码，你将拥有一个良好的开端。\n\
    \n如果你已经了解 Java，你也可以使用这本书，因为它涵盖了 Java 9、10 和 11（EAP^(¹) 版本）的具体特性。\n\n## 本书的结构\n\
    \n你正在阅读的这一章是介绍性的，涵盖了一些 Java 历史，向你展示了这门语言是如何演变的，并展望了它的未来。此外，还涵盖了执行 Java 应用程序的机制，以便你为**第**\
    \ 2 章做好准备。下一章将向你展示如何设置开发环境，并介绍一个简单的应用程序。在第 3 章到第 7 章中，涵盖了语言的基本部分：包、模块、类、对象、运算符、数据类型、语句、流、Lambda\
    \ 表达式等。从第 8 章开始，涵盖了更高级的特性，例如：与外部数据源的交互：读写文件、序列化/反序列化对象、测试和创建接口。第 12 章完全致力于介绍 Java\
    \ 9 中引入的发布-订阅框架。第 13 章涵盖了垃圾回收器。\n\n本书由 `java-for-absolute-beginners` 项目完成。该项目按模块组织（因此它是一个多模块项目），这些模块相互链接，并且必须由\
    \ **Gradle** 管理。Gradle 是我们开发人员称之为*构建工具*的东西，用于构建项目。构建项目意味着将代码转换为可执行的内容。我选择为我写的书使用多模块项目，因为这样更容易构建它们，并且可以将公共元素分组在一起，使项目配置保持简单且不重复。此外，通过将所有源代码组织在一个多模块项目中，你可以尽快获得源代码是否正常工作的反馈，并且可以联系作者并要求他或她进行更新。\n\
    \n## 排版约定\n\n本书使用了一些排版约定，以便于阅读。为此，书中使用了以下约定：\n\n*   段落中的代码或概念名称显示如下：\n\n    `import\
    \ java.util.List;`\n\n*   代码清单显示如下：\n\n    ```\n    public static void main(String[]\
    \ args) {\n    System.out.println(\"Hello there young developer!\");\n    }\n\
    \    ```\n\n*   控制台输出中的日志显示如下：\n\n    ```\n    01:24:07.809 [main] INFO  c.a.Application\
    \ - Starting Application\n    01:24:07.814 [main] DEBUG c.a.p.c.Application -\
    \ Running in debug mode\n    ...\n    ```\n\n*   ! 此符号出现在需要特别注意的段落前面。\n\n*   *斜体*\
    \ 字体用于比喻、诙谐的术语以及读者应特别注意的技术术语，因为它们不在当前上下文中解释，但会在本书中涵盖。例如：“这在第 4 章末尾介绍*泛型*时提到过。”\
    \ “**栈**内存在执行期间使用（也称为在*运行时*）”或“让我们看看这在*幕后*是如何完成的”。\n\n*   **粗体** 字体用于章节引用和重要术语。\n\
    \n至于我的写作风格，我喜欢以与同事和朋友进行技术对话的方式写书：穿插笑话，提供生产示例，并与非编程场景进行类比。因为编程只是模拟现实世界的另一种方式。\n"
- fmt: '# When Java Was Owned by Sun Microsystems


    The first version of Java was released in 1996. Up until that point, there was
    a small team named the **Green Team** that worked on a prototype language named
    Oak, which was introduced to the world with a working demo—an interactive handheld
    home entertainment controller called the Star7. The star of the animated touch-screen
    user interface was a cartoon character named **Duke**, created by one of the team’s
    graphic artists, Joe Palrang. Over the years, Duke has become the official Java
    technology mascot, and every JavaOne conference has its own Duke mascot personality
    and the most simple version is depicted in Figure [1-1](#463938_1_En_1_Chapter.xhtml#Fig1).


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig1_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    The Duke mascot (image source: [`http://oracle.com`](http://oracle.com))


    The **Green Team** released it to the world via the Internet, because that was
    the fastest way to create widespread adoptions. You can imagine that they jumped
    for joy every time somebody downloaded it, because it meant people were interested
    in it. And there are a few other advantages making software open source, like
    the fact that contributions and feedback come from a bigger and diverse number
    of people from all over the world. Thus, for Java, this was the best decision,
    as it shaped the language a lot of developers are using today. Even after 22 years,
    Java is still among the top-three most used programming languages.


    The American company that started all of this was Sun Microsystems, founded in
    1982. It guided the computer revolution by selling computers, computer parts,
    and software. Among their greatest achievements is the Java programming language.
    In Figure [1-2](#463938_1_En_1_Chapter.xhtml#Fig2),^([²](#fn2)) you can see the
    company logo that was used since Java’s birth year until it was acquired by Oracle
    in 2010.


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig2_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    The Sun Microsystems logo (image source: [`https://en.wikipedia.org/wiki/Sun_Microsystems`](https://en.wikipedia.org/wiki/Sun_Microsystems))


    It is quite difficult to find information about the first version of Java, but
    dedicated developers that witnessed the birth of Java—when the web was way smaller
    and full of static pages—did create blogs and shared their experience with the
    world. It was quite easy for Java to shine with its applets that displayed dynamic
    content and interacted with the user. But because the development team thought
    bigger, Java became much more than a web programming language. Because in trying
    to make applets run in any browser, the team found a solution to a common problem:
    portability.


    Nowadays, developers face a lot of headaches when developing software that should
    run on any operating system. And with the mobile revolution, things have become
    really tricky. In Figure [1-3](#463938_1_En_1_Chapter.xhtml#Fig3), you see an
    abstract drawing of what is believed to be the first Java logo.


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig3_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The first Java logo, 1996–2003 (image source: [`http://xahlee.info/`](http://xahlee.info/))


    Java 1.0 was released at the first JavaOne conference—with over 6000 attendees.
    It started out as a language named Oak^([³](#fn3)) that was really similar to
    C++ and was designed for handheld devices and set-top boxes. It evolved into the
    first version of Java, which provided developers some advantages that C++ did
    not.


    * **security**: In Java, there is no danger of reading bogus data when accidentally
    going over the size of an array.

    * **automatic memory management**: A Java developer does not have to check if
    there is enough memory to allocate for an object and then deallocate it explicitly;
    the operations are automatically handled by the garbage collector. This also means
    that pointers are not necessary.

    * **simplicity**: There are no pointers, unions, templates, structures. Mostly
    anything in Java can be declared as a class. Also, confusion when using multiple
    inheritance is avoided by modifying the inheritance model and not allowing multiple
    class inheritance.

    * **support for multithreaded execution**: Java was designed from the start to
    support development of multithreaded software.

    * **portability**: A Java motto is *Write it once, run it everywhere.* This is
    made possible by the Java virtual machine, which is covered shortly.


    All this made Java appealing for developers, and by 1997, when Java 1.1 was released,
    there were already approximatively 400,000 Java developers in the world. JavaOne
    had 10,000 attendees that year. The path to greatness was set. Before going further
    in our analysis of each Java version, let’s clarify a few things.


    ## Why Is Java Portable?


    I mentioned a few times that Java is portable and that Java programs can run on
    any operating system. It is time to explain how this is possible. Let’s start
    with a simple drawing, like the one in Figure [1-4](#463938_1_En_1_Chapter.xhtml#Fig4).


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig4_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    What makes Java portable


    Java is what we call a high-level programming language that allows a developer
    to write programs that are independent of a particular type of computer. High-level
    languages are easier to read, write, and maintain. But their code must be translated
    by a compiler or interpreted into machine language (unreadable by humans because
    is it made up of numbers) to be executed, because that is the only language that
    computers understand.


    In Figure [1-4](#463938_1_En_1_Chapter.xhtml#Fig4), notice that on top of the
    operating systems, a JVM is needed to execute a Java program. JVM stands for Java
    virtual machine, which is an abstract computing machine that enables a computer
    to run a Java program. It is a platform-independent execution environment that
    converts Java code into machine language and executes it.


    So, what is the difference between Java and other high-level languages? Well,
    other high-level languages compile source code directly into machine code that
    is designed to run on a specific microprocessor architecture or operating system,
    such as Windows or UNIX. What JVM does, it that is mimics a Java processor making
    it possible for a Java program to be interpreted as a sequence of actions or operating
    system calls on any processor regardless of the operating system.


    And because the Java compiler was mentioned, we have to get back to Java 1.1,
    which was widely used, even as new versions were released. It came with an improved
    Abstract Window Toolkit (AWT) graphical API (collections of components used for
    building applets), inner classes, database connectivity classes (JDBC model),
    classes for remote calls (RMI), a special compiler for Microsoft platforms named
    JIT,^([⁴](#fn4)) support for internationalization, and Unicode. Also, what made
    it so widely embraced is that shortly after Java was released, Microsoft licensed
    it and started creating applications using it. The feedback helped further development
    of Java, thus Java 1.1 was supported on all browsers of the time, which is why
    it was so widely deployed.'
  raw: '## When Java Was Owned by Sun Microsystems


    The first version of Java was released in 1996\. Up until that point, there was
    a small team named the **Green Team** that worked on a prototype language named
    Oak, which was introduced to the world with a working demo—an interactive handheld
    home entertainment controller called the Star7\. The star of the animated touch-screen
    user interface was a cartoon character named **Duke** , created by one of the
    team’s graphic artists, Joe Palrang. Over the years, Duke has become the official
    Java technology mascot, and every JavaOne conference has its own Duke mascot personality
    and the most simple version is depicted in Figure [1-1](#463938_1_En_1_Chapter.xhtml#Fig1).


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig1_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    The Duke mascot (image source: [`http://oracle.com`](http://oracle.com) )


    The **Green Team** released it to the world via the Internet, because that was
    the fastest way to create widespread adoptions. You can imagine that they jumped
    for joy every time somebody downloaded it, because it meant people were interested
    in it. And there are a few other advantages making software open source, like
    the fact that contributions and feedback come from a bigger and diverse number
    of people from all over the world. Thus, for Java, this was the best decision,
    as it shaped the language a lot of developers are using today. Even after 22 years,
    Java is still among the top-three most used programming languages.


    The American company that started all of this was Sun Microsystems, founded in
    1982\. It guided the computer revolution by selling computers, computer parts,
    and software. Among their greatest achievements is the Java programming language.
    In Figure [1-2](#463938_1_En_1_Chapter.xhtml#Fig2),^([²](#fn2)) you can see the
    company logo that was used since Java’s birth year until it was acquired by Oracle
    in 2010.


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig2_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    The Sun Microsystems logo (image source: [`https://en.wikipedia.org/wiki/Sun_Microsystems`](https://en.wikipedia.org/wiki/Sun_Microsystems)
    )


    It is quite difficult to find information about the first version of Java, but
    dedicated developers that witnessed the birth of Java—when the web was way smaller
    and full of static pages—did create blogs and shared their experience with the
    world. It was quite easy for Java to shine with its applets that displayed dynamic
    content and interacted with the user. But because the development team thought
    bigger, Java became much more than a web programming language. Because in trying
    to make applets run in any browser, the team found a solution to a common problem:
    portability.


    Nowadays, developers face a lot of headaches when developing software that should
    run on any operating system. And with the mobile revolution, things have become
    really tricky. In Figure [1-3](#463938_1_En_1_Chapter.xhtml#Fig3), you see an
    abstract drawing of what is believed to be the first Java logo.


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig3_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The first Java logo, 1996–2003 (image source: [`http://xahlee.info/`](http://xahlee.info/)
    )


    Java 1.0 was released at the first JavaOne conference—with over 6000 attendees.
    It started out as a language named Oak^([³](#fn3)) that was really similar to
    C++ and was designed for handheld devices and set-top boxes. It evolved into the
    first version of Java, which provided developers some advantages that C++ did
    not.


    *   **security** : In Java, there is no danger of reading bogus data when accidentally
    going over the size of an array.


    *   **automatic memory management** : A Java developer does not have to check
    if there is enough memory to allocate for an object and then deallocate it explicitly;
    the operations are automatically handled by the garbage collector. This also means
    that pointers are not necessary.


    *   **simplicity** : There are no pointers, unions, templates, structures. Mostly
    anything in Java can be declared as a class. Also, confusion when using multiple
    inheritance is avoided by modifying the inheritance model and not allowing multiple
    class inheritance.


    *   **support for** **multithreaded execution** : Java was designed from the start
    to support development of multithreaded software.


    *   **portability** : A Java motto is *Write it once, run it everywhere.* This
    is made possible by the Java virtual machine, which is covered shortly.


    All this made Java appealing for developers, and by 1997, when Java 1.1 was released,
    there were already approximatively 400,000 Java developers in the world. JavaOne
    had 10,000 attendees that year. The path to greatness was set. Before going further
    in our analysis of each Java version, let’s clarify a few things.


    ### Why Is Java Portable?


    I mentioned a few times that Java is portable and that Java programs can run on
    any operating system. It is time to explain how this is possible. Let’s start
    with a simple drawing, like the one in Figure [1-4](#463938_1_En_1_Chapter.xhtml#Fig4).


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig4_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    What makes Java portable


    Java is what we call a high-level programming language that allows a developer
    to write programs that are independent of a particular type of computer. High-level
    languages are easier to read, write, and maintain. But their code must be translated
    by a compiler or interpreted into machine language (unreadable by humans because
    is it made up of numbers) to be executed, because that is the only language that
    computers understand.


    In Figure [1-4](#463938_1_En_1_Chapter.xhtml#Fig4), notice that on top of the
    operating systems, a JVM is needed to execute a Java program. JVM stands for Java
    virtual machine, which is an abstract computing machine that enables a computer
    to run a Java program. It is a platform-independent execution environment that
    converts Java code into machine language and executes it.


    So, what is the difference between Java and other high-level languages? Well,
    other high-level languages compile source code directly into machine code that
    is designed to run on a specific microprocessor architecture or operating system,
    such as Windows or UNIX. What JVM does, it that is mimics a Java processor making
    it possible for a Java program to be interpreted as a sequence of actions or operating
    system calls on any processor regardless of the operating system.


    And because the Java compiler was mentioned, we have to get back to Java 1.1,
    which was widely used, even as new versions were released. It came with an improved
    Abstract Window Toolkit (AWT) graphical API (collections of components used for
    building applets), inner classes, database connectivity classes (JDBC model),
    classes for remote calls (RMI), a special compiler for Microsoft platforms named
    JIT,^([⁴](#fn4)) support for internationalization, and Unicode. Also, what made
    it so widely embraced is that shortly after Java was released, Microsoft licensed
    it and started creating applications using it. The feedback helped further development
    of Java, thus Java 1.1 was supported on all browsers of the time, which is why
    it was so widely deployed.'
  trans: '

    ## 当 Java 属于 Sun Microsystems 时


    Java 的第一个版本于 1996 年发布。在此之前，有一个名为**绿色团队**的小团队致力于开发一个名为 Oak 的原型语言，该语言通过一个可工作的演示——一个名为
    Star7 的交互式手持家庭娱乐控制器——向世界展示。动画触摸屏用户界面的主角是一个名为**杜克**的卡通角色，由团队中的一位图形艺术家 Joe Palrang
    创作。多年来，杜克已成为 Java 技术的官方吉祥物，每届 JavaOne 大会都有其独特的杜克吉祥物形象，而最简单的版本如图 1-1 所示。


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig1_HTML.jpg](img/463938_1_En_1_Fig1_HTML.jpg)


    图 1-1


    杜克吉祥物（图片来源：[`http://oracle.com`](http://oracle.com)）


    **绿色团队**通过互联网将其发布到全世界，因为这是实现广泛采用的最快方式。你可以想象，每当有人下载它时，他们都会欢呼雀跃，因为这意味着人们对它感兴趣。将软件开源还有其他一些优势，例如，来自世界各地更多样化人群的贡献和反馈。因此，对于
    Java 来说，这是最好的决定，因为它塑造了如今众多开发者所使用的语言。即使在 22 年后，Java 仍然是最常用的三种编程语言之一。


    这一切的始作俑者是美国公司 Sun Microsystems，成立于 1982 年。该公司通过销售计算机、计算机部件和软件引领了计算机革命。其最伟大的成就之一就是
    Java 编程语言。在图 1-2² 中，你可以看到从 Java 诞生之年到 2010 年被 Oracle 收购期间所使用的公司标志。


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig2_HTML.jpg](img/463938_1_En_1_Fig2_HTML.jpg)


    图 1-2


    Sun Microsystems 标志（图片来源：[`https://en.wikipedia.org/wiki/Sun_Microsystems`](https://en.wikipedia.org/wiki/Sun_Microsystems)）


    找到关于 Java 第一个版本的信息相当困难，但那些见证了 Java 诞生——当时网络规模小得多且充满静态页面——的资深开发者们确实创建了博客，并与世界分享了他们的经验。Java
    凭借其显示动态内容并与用户交互的小程序很容易大放异彩。但由于开发团队志向远大，Java 远不止是一种网络编程语言。因为在试图让小程序在任何浏览器中运行时，团队找到了一个常见问题的解决方案：可移植性。


    如今，开发者在开发应在任何操作系统上运行的软件时面临许多难题。而随着移动革命，情况变得非常棘手。在图 1-3 中，你看到的是被认为是第一个 Java 标志的抽象图。


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig3_HTML.jpg](img/463938_1_En_1_Fig3_HTML.jpg)


    图 1-3


    第一个 Java 标志，1996–2003（图片来源：[`http://xahlee.info/`](http://xahlee.info/)）


    Java 1.0 在首届 JavaOne 大会上发布——与会者超过 6000 人。它最初是一种名为 Oak³ 的语言，与 C++ 非常相似，专为手持设备和机顶盒设计。它演变成了
    Java 的第一个版本，为开发者提供了 C++ 所不具备的一些优势。


    *   **安全性**：在 Java 中，意外超出数组大小而读取虚假数据没有危险。

    *   **自动内存管理**：Java 开发者无需检查是否有足够内存为对象分配，然后显式释放它；这些操作由垃圾收集器自动处理。这也意味着不需要指针。

    *   **简单性**：没有指针、联合体、模板、结构体。Java 中几乎所有内容都可以声明为类。此外，通过修改继承模型且不允许多重类继承，避免了使用多重继承时的混淆。

    *   **支持多线程执行**：Java 从一开始就被设计为支持多线程软件的开发。

    *   **可移植性**：Java 的座右铭是*一次编写，到处运行。*这得益于 Java 虚拟机，稍后将介绍。


    所有这些都使 Java 对开发者具有吸引力，到 1997 年 Java 1.1 发布时，全球已有大约 40 万 Java 开发者。那年的 JavaOne 大会有
    10,000 名与会者。通往伟大的道路已经铺就。在进一步分析每个 Java 版本之前，让我们先澄清一些事情。


    ### 为什么 Java 是可移植的？


    我多次提到 Java 是可移植的，并且 Java 程序可以在任何操作系统上运行。现在是时候解释这是如何实现的了。让我们从一个简单的图开始，如图 1-4 所示。


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig4_HTML.jpg](img/463938_1_En_1_Fig4_HTML.jpg)


    图 1-4


    是什么让 Java 可移植


    Java 是我们所谓的高级编程语言，允许开发者编写独立于特定类型计算机的程序。高级语言更易于阅读、编写和维护。但它们的代码必须由编译器翻译或由解释器解释为机器语言（由数字组成，人类无法阅读）才能执行，因为这是计算机唯一理解的语言。


    在图 1-4 中，请注意，在操作系统之上，需要 JVM 来执行 Java 程序。JVM 代表 Java 虚拟机，它是一种抽象的计算设备，使计算机能够运行 Java
    程序。它是一个独立于平台的执行环境，将 Java 代码转换为机器语言并执行。


    那么，Java 和其他高级语言有什么区别呢？嗯，其他高级语言将源代码直接编译为机器代码，这些机器代码旨在特定的微处理器架构或操作系统（如 Windows 或
    UNIX）上运行。JVM 所做的是模拟一个 Java 处理器，使得 Java 程序可以在任何处理器上被解释为一系列操作或操作系统调用，而不管操作系统是什么。


    由于提到了 Java 编译器，我们必须回到 Java 1.1，即使新版本发布，它也被广泛使用。它带来了改进的抽象窗口工具包（AWT）图形 API（用于构建小程序的组件集合）、内部类、数据库连接类（JDBC
    模型）、远程调用类（RMI）、一个名为 JIT⁴ 的针对微软平台的专用编译器、对国际化和 Unicode 的支持。此外，它被如此广泛接受的原因是，在 Java
    发布后不久，微软就获得了许可并开始使用它创建应用程序。这些反馈有助于 Java 的进一步发展，因此 Java 1.1 得到了当时所有浏览器的支持，这就是它被如此广泛部署的原因。

    '
- fmt: '### !


    A lot of terms used in the introduction of the book might seem foreign to you
    now, but as you read the book, more information is presented and these words will
    start to make more sense. For now, just keep in mind, that every new Java version,
    has something more than the previous version, and at that time, every new component
    is a novelty.


    So, what exactly happens to developer-written Java code until the actual execution?
    The process is depicted in Figure [1-5](#463938_1_En_1_Chapter.xhtml#Fig5).


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig5_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    From Java code to machine code


    In Figure [1-5](#463938_1_En_1_Chapter.xhtml#Fig5), you see that Java code is
    compiled and transformed to bytecode that is then interpreted and executed by
    the Java virtual machine on the underlying operating system. This is what Java
    is: a compiled and interpreted general-purpose programming language with a large
    number of features that make it well suited for the web. And now that we’ve covered
    how Java code is executed, let’s go back to some more history.


    ### Sun Microsystem’s Java Versions


    The first stable Java version released by Sun Microsystems could be downloaded
    from the website as an archive named `JDK 1.0.2`. `JDK` is an acronym for **J**ava
    **D**evelopment **K**it. This is the software development environment used for
    developing Java applications and applets. It includes the **J**ava **R**untime
    **E**nvironment (`JRE`), an interpreter (loader), a compiler, an archiver, a documentation
    generator, and other tools needed for Java development. We will get into this
    more when I cover how to install the `JDK` on your computer.


    Starting with version 1.2, released in 1998, Java versions were given codenames.^([⁵](#fn5))
    The Java version 1.2 codename was **Playground**. It was a massive release and
    this was the moment when people started talking about **the Java 2 Platform**.
    Starting with this version, the releases up to `J2SE 5.0` were renamed, and `J2SE`
    replaced `JDK` because the Java platform was now composed of three parts:


    *   `J2SE` (Java 2 Platform, Standard Edition), which later became `JSE`, a computing
    platform for the development and deployment of portable code for desktop and server
    environments

    *   `J2EE` (Java 2 Platform, Enterprise Edition), which later became `JEE`, a
    set of specifications extending Java SE with specifications for enterprise features
    such as distributed computing and web services

    *   `J2ME` (Java 2 Platform, Micro Edition), which later became `JME`, a computing
    platform for development and deployment of portable code for embedded and mobile
    devices


    With this release, the `JIT` compiler became part of Sun Microsystem’s `JVM` (which
    basically means turning code into executable code became a faster operation and
    the generated executable code was optimized), the Swing graphical API was introduced
    as a fancy alternative to `AWT` (new components to create fancy desktop applications
    were introduced), and the Java collections framework (for working with sets of
    data) was introduced.


    `J2SE 1.3` was released in 2000 with the codename **Kestrel** (maybe as a reference
    to the newly introduced Java sound classes). This release also contained Java
    XML APIs.


    `J2SE 1.4` was released in 2002 with the codename **Merlin**. This is the first
    year that the **J**ava **C**ommunity **P**rocess members were involved in deciding
    which features the release should contain, and thus, the release was quite consistent.
    This is the first release of the Java platform developed under the Java Community
    Process as `JSR 59`.^([⁶](#fn6)) The following features are among those worth
    mentioning.


    *   Support for `IPv6` (basically applications that run over a network can now
    be written to work using networking protocol `IPv6`).

    *   Non-blocking IO (`IO` is an acronym for input-output, which refers to reading
    and writing data— a very slow operation. Making `IO` non-blocking means to optimize
    these operations to increase speed of the running application.)

    *   Logging API (Operations that get executed need to be reported to a file or
    a resource, which can be read in case of failure to determine the cause and find
    a solution. This process is called logging and apparently only in this version
    components to support this operation were introduced.)

    *   Image processing API (Components developers can use this to manipulate images
    with Java code.)


    Java’s coffee cup logo made its entrance in 2003 (between releases 1.4 and 5.0)
    at the JavaOne conference. You can see it in Figure [1-6](#463938_1_En_1_Chapter.xhtml#Fig6).^([⁷](#fn7))


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig6_HTML.jpg](images/463938_1_En_1_Chapter/463938_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Java official logo 2003-2006 (image source: [`http://oracle.com`](http://oracle.com)
    )'
