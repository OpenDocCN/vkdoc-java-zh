    ## Working with GC from the Code


    For most applications garbage collection is not something a developer must really
    take into account. The JVM starts a GC thread that does its job without hindering
    the execution of the application (usually). But for developers who want to have
    more than Java basic skills, understanding how the Java garbage collection works
    and how can it be tuned is a must. The first thing that a developer must accept
    about Java garbage collection is that it cannot be controlled at runtime. As you
    see in the next section, there is a way to suggest the JVM that some memory cleaning
    is necessary, but there is no guarantee that a memory cleaning be performed. The
    only thing that can be done is specify some code to be run when an object is discarded.


    ### Using the `finalize()` Method


    Every Java class is automatically a subclass of the JDK `java.lang.Object` class.
    This class is at the root of the JDK hierarchy and is the root of all classes
    in an application. It provides a few useful methods that can be extended or overwritten
    to implement behavior specific to the subclass. The `equals()`, `hashcode()` and
    `toString()` were already mentioned. The `finalize()` method was deprecated in
    Java 9, but it was not removed from the JDK. This method is called by the garbage
    collector when there are no longer any references to that object in the code.
    Before we move forward, let’s look at the following piece of code.


    ```

    package com.apress.bgn.ch13;

    import com.apress.bgn.ch13.util.NameGenerator;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.time.LocalDate;

    import java.util.Random;

    public class Main {

    private static final Logger log = LoggerFactory.getLogger(Main.class);

    private static NameGenerator nameGenerator = new NameGenerator();

    private static final Random rnd = new Random();

    public static void main(String... args) {

    while (true) {

    genSinger();

    }

    }

    private static void genSinger() {

    Singer s = new Singer(nameGenerator.genName(),

    rnd.nextDouble(), LocalDate.now());

    log.info("JVM created: {}", s.getName());

    }

    }

    ```


    The action performed by the code should be clear, even without knowing how the
    what the `NameGenerator` or the `Singer` class look like. The main method calls
    the `genSinger()` method in an infinite loop. This means that an infinite number
    of `Singer` instances is created. So, what happens? Will the code run? For how
    long? If you were able to reply these questions in your mind, my work here is
