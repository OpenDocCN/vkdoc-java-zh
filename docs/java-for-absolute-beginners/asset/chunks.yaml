    既然我们已经了解了基本的标签类别，那么你认为我们需要使用哪些标签来重新设计我们的 `index.jsp` 页面？如果你想到了 **FMT** 和 **Core**，那就对了。此外，使用标签库的
    JSP 页面总是由一个 Servlet 支持，该 Servlet 会在请求中设置 JSP 页面内使用的适当属性。因此，让我们修改 `index.jsp` 页面，如下所示。


    ```


    Web Application Demo JSP Page


    Today is


    ```


    同时，我们给它重命名，使其用途一目了然，就叫它 `date.jsp`，并编写一个名为 `DateServlet` 的 Servlet 类，将 `today`
    属性添加到请求中，该属性由 `<fmt:formatDate>` 标签格式化。结果保存到 `todayFormatted` 变量中，随后由 `<c:out>`
    标签打印输出。


    ```

    package com.apress.bgn.ch10;

    import javax.servlet.RequestDispatcher;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import java.io.IOException;

    import java.util.Date;

    @WebServlet(

    name = "dateServlet",

    urlPatterns = {"/"}

    )

    public class DateServlet extends HttpServlet {

    @Override

    protected void doGet(HttpServletRequest request, HttpServletResponse response)

    throws IOException, ServletException {

    System.out.println(" ->>> Getting date ");

    request.setAttribute("today", new Date());

    RequestDispatcher rd = getServletContext().getRequestDispatcher("/date.jsp");

    rd.forward(request, response);

    }

    }

    ```


    仅此而已。现在，我们重新启动应用程序，首页将显示：`"Today is 20/08/2018"`。当你在自己的机器上运行代码时，显然会看到你系统上的日期。

    如果你认为编写 Java Web 应用程序很繁琐，那你是对的。对于这类任务，纯 Java 确实很乏味。专业的 Java Web 应用程序通常使用框架编写，这些框架可以轻松地创建页面并将其与后端连接起来。更进一步，如今的趋势是使用
    JavaScript（也使用高级 CSS4，现在许多 UI 设计也可以 100% 用 CSS3 或 CSS4 完成）创建界面，并通过 Web 服务调用（通常是
    REST）与托管在企业服务器上的 Java 后端应用程序通信。无论如何，如果你好奇的话可以去查查，这个主题很广泛，但像 Spring 这样的框架可以让你轻松地搭建环境并开始开发。


    总结


    本章涵盖了重要的开发工具和技术、JDK 中提供支持的类，以及能够让你的开发工作更实用、更愉快的 Java 重要库。JDK 在 GUI 支持方面从未表现出色，但
    JavaFX 是 AWT 和 Swing 的演进，它或许有未来。以下是本章内容的完整列表。


    *   如何编写交互式控制台应用程序

    *   如何编写具有 Swing 界面的交互式应用程序

    *   JavaFX 架构的基础知识

    *   如何编写具有 JavaFX 界面的交互式应用程序

    *   如何国际化你的应用程序

    *   如何使用嵌入式服务器编写 Web 应用程序

    *   什么是 Servlet

    *   什么是 JSP 脚本元素

    *   如何使用标签库编写 JSP 页面


