    页面在首次被访问时，会由 Web 容器编译成一个 Servlet。本质上，*Servlet* 是 Java Web 应用的核心元素。此外，服务器必须知道 Servlet
    的存在以及如何识别它，这就是调用 `tomcat.addServlet(contextPath, servlet.getServletName(), servlet);`
    的作用所在：它基本上是说：将名为 `servlet.getServletName()` 的 `servlet` 添加到具有 `contextPath` 值的应用上下文中。然后，为了将
    URL 模式与 Servlet 关联起来，会调用 `context.addServletMapping(servlet.getUrlPattern(), servlet.getServletName());`。

    '
- fmt: '当 Java Web 应用程序运行时，其所有 Servlet 和 JSP 都在其上下文中运行，但它们必须在代码中被添加到上下文中，并映射到一个 URL
    模式。匹配该 URL 模式的请求 URL 将访问该 Servlet。在前面的代码示例中，您可以看到创建了一个`SampleServlet`实例。它是一个自定义类，继承自`javax.servlet.http.HttpServlet`，并重写了`doGet(..)`方法，以针对`http://localhost:8080/demo/`的
    GET 请求向客户端返回响应。该类的代码如下所示。


    ```

    package com.apress.bgn.ch10;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import java.io.BufferedReader;

    import java.io.FileReader;

    import java.io.IOException;

    import java.io.PrintWriter;

    public class SampleServlet extends HttpServlet {

    private final String servletName = "sampleServlet";

    private final String urlPattern = "/";

    @Override

    protected void doGet(HttpServletRequest request, HttpServletResponse response)

    throws IOException {

    PrintWriter writer = response.getWriter();

    try (BufferedReader reader = new BufferedReader(

    new FileReader("chapter10/web-app/src/main/resources/static/index.html"))) {

    String line = "";

    while ((line = reader.readLine()) != null) {

    writer.println(line);

    }

    }

    }

    @Override

    public String getServletName() {

    return servletName;

    }

    public String getUrlPattern() {    }

    return urlPattern;

    }

    ```


    `urlPattern`属性被添加到该类中，是出于实际原因，以便将所有与此 Servlet 相关的内容集中在一处。`servletName`也是如此。如果意图是多次实例化此类以创建多个
    Servlet，则应将这两个属性提取到该类外部。在`doGet(..)`方法内部，我们仅读取`index.html`文件的内容，并使用响应`PrintWriter`将它们写入响应对象。


    如您所见，`doGet(..)`方法接收两个对象作为参数：`HttpServletRequest`实例用于读取，并且可以使用适当的方法访问从客户端发送的请求的所有内容；`HttpServletResponse`实例用于向响应添加信息。在前面的代码示例中，我们只是写入从另一个文件读取的
    HTML 代码，但我们也可以通过调用`response.setStatus(HttpServletResponse.SC_OK);`来设置状态。除了`doGet(..)`方法之外，还有与每个
    HTTP 方法匹配的`do*(..)`方法，它们声明了相同类型的参数。


    另一种编写该类的方式（从 Servlet 3.0 开始）如下面的代码片段所示：


    ```

    package com.apress.bgn.ch10;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import java.io.BufferedReader;

    import java.io.FileReader;

    import java.io.IOException;

    import java.io.PrintWriter;

    @WebServlet(

    name = "sampleServlet",

    urlPatterns = {"/"}

    )

    public class IndexServlet extends HttpServlet {

    @Override

    protected void doGet(HttpServletRequest request, HttpServletResponse response)

    throws IOException {

    PrintWriter writer = response.getWriter();

    response.setStatus(HttpServletResponse.SC_OK);

    try (BufferedReader reader = new BufferedReader(

    new FileReader("chapter10/web-app/src/main/resources/static/index.html"))) {

    String line = "";

    while ((line = reader.readLine()) != null) {

    writer.println(line);

    }

    }

    writer.flush();

    writer.close();

    }

    }

    ```


    使用`@WebServlet`注解后，我们不再需要存储 Servlet 名称和 URL 模式的属性，但需要稍微修改 Tomcat 上下文，以告知它扫描带有`@WebServlet`注解的类。因此，不再需要显式实例化
    Servlet。也不再需要调用`tomcat.addServlet(..)`和`context.addServletMapping(..)`，因为将 Servlet
    添加到应用程序上下文并进行映射是使用`@WebServlet`注解提供的信息自动完成的。但是，我们必须通过声明一个`WebResourceSet`实例并将其添加到上下文资源中，来定义编译后的
    Servlet 类所在的位置。


    ```

    import org.apache.catalina.Context;

    import org.apache.catalina.WebResourceRoot;

    import org.apache.catalina.startup.Tomcat;

    import org.apache.catalina.webresources.DirResourceSet;

    import org.apache.catalina.webresources.StandardRoot;

    import java.io.File;

    public class WebDemo {

    public static void main(String... args) throws Exception {

    Tomcat tomcat = new Tomcat();

    tomcat.setBaseDir("chapter10/web-app/out");

    tomcat.setPort(8080);

    String contextPath = "/demo";

    String docBase = new File(".").getAbsolutePath();

    Context context = tomcat.addContext(contextPath, docBase);

    File webInfClasses = new File(root.getAbsolutePath(), "production/classes");

    WebResourceRoot resources = new StandardRoot(context);

    WebResourceSet resourceSet;

    if (webInfClasses.exists()) {

    resourceSet = new DirResourceSet(resources,

    "/WEB-INF/classes", webInfClasses.getAbsolutePath(), "/");

    System.out.println("loading WEB-INF resources from as ''"

    + webInfClasses.getAbsolutePath() + "''");

    } else {

    resourceSet = new EmptyResourceSet(resources);

    }

    resources.addPreResources(resourceSet);

    context.setResources(resources);

    tomcat.start();

    tomcat.getServer().await();

    }

    }

    ```


    这就是我们处理 Servlet 的方式，但是如何使用嵌入式服务器处理 JSP 页面呢？首先，我们必须创建一个存放 JSP 页面的目录。因此，我们项目的结构必须如图
    [10-14](#463938_1_En_10_Chapter.xhtml#Fig14) 所示进行更改。


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig14_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig14_HTML.jpg)


    图 10-14


    Web 应用程序结构变更


    如您所见，添加了`resource/dynamic`目录来存放 JSP 页面。随着我们的应用程序变得越来越复杂，是时候对其进行一些清理，并使路径相对于应用程序的执行路径（即`out`目录）了。因此，我们引入了以下类。


    ```

    package com.apress.bgn.ch10;

    import java.io.File;

    public class LocationUtility {

    public static File getRootFolder() throws Exception {

    String executionPath = WebDemo.class.getProtectionDomain()

    .getCodeSource().getLocation().toURI().getPath().replaceAll("\\\\", "/");

    int lastIndexOf = executionPath.lastIndexOf("/production/");

    return lastIndexOf < 0 ? new File("") :

    new File(executionPath.substring(0, lastIndexOf));

    }

    }

    ```


    我们现在知道，当 IntelliJ IDEA 编译 Gradle 应用程序时，它会在`out`目录下创建一个名为`production`的目录，其中包含编译后的
    Java 类和资源，并各自组织在自己的目录中。这就是为什么我们应用程序执行的根目录是相对于该目录计算的。由于我们添加了一个`index.jsp`页面，我们必须为`SampleServlet`添加一个不同的
    URL 模式，并且由于我们还添加了相对路径，类代码会稍有变化。'
