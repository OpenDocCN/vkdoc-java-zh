- fmt: '#### Default Methods


    One problem with interfaces is that if you modify their bodies to add new methods,
    most likely, the code stops compiling because the classes implementing the interfaces
    do not provide concrete implementations for the new methods declared in the interfaces.
    Sure, a solution would be to declare the new methods in a new interface and then
    creating new classes that implement both new and old interfaces.


    The methods interfaces expose make up an API (application programming interface)
    and when developing applications, the aim is to design applications and their
    components to have a stable API. This rule is described in the **open closed principle**,
    which is one of the five SOLID programming principles.^([^(55)](#fn55)) This principle
    states that you should be able to extend a class without modifying it. Thus, modifying
    the interface a class implements, extends the class behavior, but only if the
    class is modified to provide a concrete implementation for the new methods. So,
    implementing interfaces, tends to lead to breaking this principle. So, how can
    we avoid this in Java?


    In Java 8, a solution for this was finally introduced: **default methods**. Starting
    with Java 8, methods with a full implementation can be declared in interfaces
    as long as they are declared using the `default` keyword.


    Let’s consider the previous example: the `Artist` interface. Any artist should
    be able to create something, right? So, he or she should have a creative nature.
    Given the world we are living in, I won’t mention names, but some of our artists
    are actually products of the industry, so they are not creative themselves. So,
    the realization that we should have a method that tells us if an artist has a
    creative nature or not, came way after we decided our hierarchy, which is depicted
    in Figure [4-9](#463938_1_En_4_Chapter.xhtml#Fig9).


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig9_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Java hierarchy with more interfaces for `Performer` class


    If we add a new method template to the `Artist` interface, the `Performer` class
    causes a compile error. IntelliJ IDEA makes it clear that our application does
    not work anymore by showing a lot of things in red, as depicted in Figure [4-10](#463938_1_En_4_Chapter.xhtml#Fig10).


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig10_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Java broken hierarchy


    The compiler errors that we see are caused by our decision to add a new method,
    named `isCreative`, to the `Artist` interface. It is underlined in the following
    code snippet.


    ```

    package com.apress.bgn.ch4.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    boolean isCreative();

    }

    ```


    To get rid of the compiling errors we’ll transform the `isCreative` method into
    a default method that returns `true`, because every artist should be creative.


    ```

    package com.apress.bgn.ch4.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    default boolean isCreative(){

    return true;

    }

    }

    ```


    Now, the code should compile again. If we need to add more than one default method
    to an interface and the methods have some implementation in common, that code
    can be isolated starting with Java 9 into a private method that can be called
    from the default methods. So basically, starting from Java 9, full blown methods
    can be part of an interface, as long as they are declared private.


    #### Annotation Types


    An annotation is defined in a similar way to an interface; the difference is that
    the `interface` keyword is preceded by the *at* sign (`@`). Annotation types are
    a form of interfaces, and most times, they are used as markers. For example, you’ve
    probably noticed the `@Override` annotation. This annotation is automatically
    placed by intelligent IDEs when classes extending or implementing interfaces are
    generated automatically. Its declaration in the JDK is depicted in the following
    code snippet.


    ```

    package java.lang;

    import  java.lang.annotation.*;

    @Target(ElementType.METHOD)

    @Retention(RetentionPolicy.SOURCE)

    public @interface Override {}

    ```


    Annotations that do not declare any property are called **marker** or **informative**
    annotations. They are needed only to inform other classes in the application,
    or developers of the purpose of the components they are placed on. They are not
    mandatory and the code compiles without them.


    In Java 8, an annotation named `@FunctionalInterface` was introduced. This annotation
    was placed on all Java interfaces that can be used in **lambda expressions**.


    ```

    package java.lang;

    import java.lang.annotation.*;

    @Documented

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface FunctionalInterface {}

    ```


    Lambda expressions were also introduced in Java 8 and they represent a compact
    and practical way of writing code that was borrowed from languages like Groovy
    and Ruby.


    **Functional Interfaces** are interfaces that declare a single abstract method.
    Because of this, the implementation of that method can be provided on the spot,
    without the need to create a class to define a concrete implementation.


    Let’s imagine the following scenario: we create an interface named `Operation`
    that contains a single method.


    ```

    package com.apress.bgn.ch4.lambda;

    @FunctionalInterface

    public interface Operation {

    float execute(int a, int b);

    }

    ```


    We’ll next create a class named `Addition`.


    ```

    package com.apress.bgn.ch4.lambda;

    public class Addition implements Operation {

    @Override

    public float execute(int a, int b) {

    return a + b;

    }

    }

    ```


    And if we want to test it, we need yet another class.


    ```

    package com.apress.bgn.ch4.lambda;

    public class OperationDemo {

    public static void main(String... args) {

    Addition addition = new Addition();

    float  result = addition.execute(2,5);

    System.out.println("Result is " + result);

    }

    }

    ```


    Using lambda, the `Addition` class is no longer needed, and the instantiation
    and the method call can be replaced with


    ```

    package com.apress.bgn.ch4.lambda;

    public class OperationDemo {

    public static void main(String... args) {

    Operation addition2 = (a, b) -> a + b;

    float result2 = addition2.execute(2, 5);

    System.out.println("Lambda Result is " + result2);

    }

    }

    ```


    Lambda expressions can be used for a lot of things. I’ll cover them throughout
    the book, whenever code can be written in a more practical way using them.'
  raw: '#### Default Methods


    One problem with interfaces is that if you modify their bodies to add new methods,
    most likely, the code stops compiling because the classes implementing the interfaces
    do not provide concrete implementations for the new methods declared in the interfaces.
    Sure, a solution would be to declare the new methods in a new interface and then
    creating new classes that implement both new and old interfaces.


    The methods interfaces expose make up an API (application programming interface)
    and when developing applications, the aim is to design applications and their
    components to have a stable API. This rule is described in the **open closed principle**,
    which is one of the five SOLID programming principles.^([^(55)](#fn55)) This principle
    states that you should be able to extend a class without modifying it. Thus, modifying
    the interface a class implements, extends the class behavior, but only if the
    class is modified to provide a concrete implementation for the new methods. So,
    implementing interfaces, tends to lead to breaking this principle. So, how can
    we avoid this in Java?


    In Java 8, a solution for this was finally introduced: **default methods** . Starting
    with Java 8, methods with a full implementation can be declared in interfaces
    as long as they are declared using the `default` keyword.


    Let’s consider the previous example: the `Artist` interface . Any artist should
    be able to create something, right? So, he or she should have a creative nature.
    Given the world we are living in, I won’t mention names, but some of our artists
    are actually products of the industry, so they are not creative themselves. So,
    the realization that we should have a method that tells us if an artist has a
    creative nature or not, came way after we decided our hierarchy, which is depicted
    in Figure [4-9](#463938_1_En_4_Chapter.xhtml#Fig9).


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig9_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Java hierarchy with more interfaces for Performer class


    If we add a new method template to the `Artist` interface, the `Performer` class
    causes a compile error. IntelliJ IDEA makes it clear that our application does
    not work anymore by showing a lot of things in red, as depicted in Figure [4-10](#463938_1_En_4_Chapter.xhtml#Fig10)
    .


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig10_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Java broken hierarchy


    The compiler errors that we see are caused by our decision to add a new method,
    named `isCreative`, to the `Artist` interface. It is underlined in the following
    code snippet.


    ```

    package com.apress.bgn.ch4.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    boolean isCreative();

    }

    ```


    To get rid of the compiling errors we’ll transform the `isCreative` method into
    a default method that returns `true`, because every artist should be creative.


    ```

    package com.apress.bgn.ch4.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    default boolean isCreative(){

    return true;

    }

    }

    ```


    Now, the code should compile again. If we need to add more than one default method
    to an interface and the methods have some implementation in common,  that code
    can be isolated starting with Java 9 into a private method that can be called
    from the default methods.  So basically, starting from Java 9, full blown methods
    can be part of an interface, as long as they are declared private.


    #### Annotation Types


    An annotation is defined in a similar way to an interface; the difference is that
    the `interface` keyword is preceded by the *at* sign (`@`). Annotation types are
    a form of interfaces, and most times, they are used as markers. For example, you’ve
    probably noticed the `@Override` annotation. This annotation is automatically
    placed by intelligent IDEs when classes extending or implementing interfaces are
    generated automatically. It’s declaration in the JDK is depicted in the following
    code snippet.


    ```

    package java.lang;

    import  java.lang.annotation.*;

    @Target(ElementType.METHOD)

    @Retention(RetentionPolicy.SOURCE)

    public @interface Override {}

    ```


    Annotations that do not declare any property are called **marker** or **informative**
    annotations. They are needed only to inform other classes in the application,
    or developers of the purpose of the components they are placed on. They are not
    mandatory and the code compiles without them.


    In Java 8, an annotation named `@FunctionalInterface` was introduced. This annotation
    was placed on all Java interfaces that can be used in **lambda expressions**.


    ```

    package java.lang;

    import java.lang.annotation.*;

    @Documented

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface FunctionalInterface {}

    ```


    Lambda expressions were also introduced in Java 8 and they represent a compact
    and practical way of writing code that was borrowed from languages like Groovy
    and Ruby.


    **Functional Interfaces** are interfaces that declare a single abstract method.
    Because of this, the implementation of that method can be provided on the spot,
    without the need to create a class to define a concrete implementation.


    Let’s imagine the following scenario: we create an interface named `Operation`
    that contains a single method.


    ```

    package com.apress.bgn.ch4.lambda;

    @FunctionalInterface

    public interface Operation {

    float execute(int a, int b);

    }

    ```


    We’ll next create a class named `Addition`.


    ```

    package com.apress.bgn.ch4.lambda;

    public class Addition implements Operation {

    @Override

    public float execute(int a, int b) {

    return a + b;

    }

    }

    ```


    And if we want to test it, we need yet another class.


    ```

    package com.apress.bgn.ch4.lambda;

    public class OperationDemo {

    public static void main(String... args) {

    Addition addition = new Addition();

    float  result = addition.execute(2,5);

    System.out.println("Result is " + result);

    }

    }

    ```


    Using lambda, the `Addition` class is no longer needed, and the instantiation
    and the method call can be replaced with


    ```

    package com.apress.bgn.ch4.lambda;

    public class OperationDemo {

    public static void main(String... args) {

    Operation addition2 = (a, b) -> a + b;

    float result2 = addition2.execute(2, 5);

    System.out.println("Lambda Result is " + result2);

    }

    }

    ```


    Lambda expressions can be used for a lot of things. I’ll cover them throughout
    the book, whenever code can be written in a more practical way using them.'
  trans: '

    #### 默认方法


    接口的一个问题是，如果你修改其主体来添加新方法，大多数情况下，代码会停止编译，因为实现该接口的类没有为接口中声明的新方法提供具体实现。当然，一种解决方案是在新接口中声明这些新方法，然后创建同时实现新旧接口的新类。


    接口暴露的方法构成了 API（应用程序编程接口），在开发应用程序时，目标是设计应用程序及其组件，使其拥有稳定的 API。这一规则在**开闭原则**中有所描述，它是
    SOLID 五大编程原则之一^(⁵⁵)。该原则指出，你应该能够在不修改类的情况下扩展它。因此，修改类所实现的接口会扩展类的行为，但这仅当该类被修改以提供新方法的具体实现时才成立。所以，实现接口往往会导致违反这一原则。那么，在
    Java 中我们该如何避免这种情况呢？


    在 Java 8 中，终于引入了针对此问题的解决方案：**默认方法**。从 Java 8 开始，只要使用 `default` 关键字声明，就可以在接口中声明具有完整实现的方法。


    让我们考虑之前的例子：`Artist` 接口。任何艺术家都应该能够创造一些东西，对吧？所以，他或她应该具有创造性。鉴于我们所处的世界，我不会提及具体名字，但我们的一些艺术家实际上是产业的产物，因此他们本身并不具有创造性。所以，当我们意识到应该有一个方法来判断艺术家是否具有创造性时，这已经是在我们确定了层次结构之后很久了，如图
    4-9 所示。


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig9_HTML.jpg](img/463938_1_En_4_Fig9_HTML.jpg)


    图 4-9


    为 Performer 类添加了更多接口的 Java 层次结构


    如果我们向 `Artist` 接口添加一个新的方法模板，`Performer` 类会导致编译错误。IntelliJ IDEA 通过显示大量红色内容，清晰地表明我们的应用程序不再工作，如图
    4-10 所示。


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig10_HTML.jpg](img/463938_1_En_4_Fig10_HTML.jpg)


    图 4-10


    损坏的 Java 层次结构


    我们看到的编译器错误是由于我们决定向 `Artist` 接口添加一个名为 `isCreative` 的新方法造成的。它在以下代码片段中被标出。


    ```

    package com.apress.bgn.ch4.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    boolean isCreative();

    }

    ```


    为了消除编译错误，我们将 `isCreative` 方法转换为一个返回 `true` 的默认方法，因为每个艺术家都应该是具有创造性的。


    ```

    package com.apress.bgn.ch4.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String school);

    default boolean isCreative(){

    return true;

    }

    }

    ```


    现在，代码应该可以再次编译了。如果我们需要向一个接口添加多个默认方法，并且这些方法有一些共同的实现，那么从 Java 9 开始，可以将这些代码隔离到一个私有方法中，该方法可以从默认方法中调用。所以基本上，从
    Java 9 开始，只要声明为私有，完整的方法就可以成为接口的一部分。


    #### 注解类型


    注解的定义方式与接口类似；区别在于 `interface` 关键字前面有一个 *at* 符号（`@`）。注解类型是接口的一种形式，大多数情况下，它们被用作标记。例如，你可能已经注意到了
    `@Override` 注解。当扩展类或实现接口的类被自动生成时，智能 IDE 会自动放置此注解。它在 JDK 中的声明如下代码片段所示。


    ```

    package java.lang;

    import  java.lang.annotation.*;

    @Target(ElementType.METHOD)

    @Retention(RetentionPolicy.SOURCE)

    public @interface Override {}

    ```


    不声明任何属性的注解被称为**标记**或**信息性**注解。它们仅用于通知应用程序中的其他类，或开发者其所放置组件的用途。它们不是强制性的，没有它们代码也能编译。


    在 Java 8 中，引入了一个名为 `@FunctionalInterface` 的注解。此注解被放置在所有可用于**lambda 表达式**的 Java
    接口上。


    ```

    package java.lang;

    import java.lang.annotation.*;

    @Documented

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface FunctionalInterface {}

    ```


    Lambda 表达式也是在 Java 8 中引入的，它们代表了一种从 Groovy 和 Ruby 等语言借鉴而来的、编写代码的紧凑且实用的方式。


    **函数式接口**是声明了单个抽象方法的接口。正因为如此，该方法的实现可以当场提供，而无需创建一个类来定义具体实现。


    让我们想象以下场景：我们创建一个名为 `Operation` 的接口，其中包含一个方法。


    ```

    package com.apress.bgn.ch4.lambda;

    @FunctionalInterface

    public interface Operation {

    float execute(int a, int b);

    }

    ```


    接下来，我们将创建一个名为 `Addition` 的类。


    ```

    package com.apress.bgn.ch4.lambda;

    public class Addition implements Operation {

    @Override

    public float execute(int a, int b) {

    return a + b;

    }

    }

    ```


    如果我们想测试它，还需要另一个类。


    ```

    package com.apress.bgn.ch4.lambda;

    public class OperationDemo {

    public static void main(String... args) {

    Addition addition = new Addition();

    float  result = addition.execute(2,5);

    System.out.println("Result is " + result);

    }

    }

    ```


    使用 lambda，`Addition` 类不再需要，实例化和方法调用可以替换为：


    ```

    package com.apress.bgn.ch4.lambda;

    public class OperationDemo {

    public static void main(String... args) {

    Operation addition2 = (a, b) -> a + b;

    float result2 = addition2.execute(2, 5);

    System.out.println("Lambda Result is " + result2);

    }

    }

    ```


    Lambda 表达式可用于很多场景。在本书中，只要代码可以使用它们以更实用的方式编写，我都会进行介绍。

