    ### 导入部分


    **导入部分**位于包声明之后。该部分包含了文件中使用的所有类、接口和枚举的完整限定名。请看以下代码示例。


    ```

    package java.lang;

    import java.io.Serializable;

    import java.io.ObjectStreamField;

    import java.io.UnsupportedEncodingException;

    import java.lang.annotation.Native;

    import java.nio.charset.Charset;

    import java.util.ArrayList;

    import java.util.Arrays;

    import java.util.Comparator;

    import java.util.Formatter;

    import java.util.Locale;

    ...

    public final class String

    implements Serializable, Comparable, CharSequence {

    private  static  final  ObjectStreamField  serialPersistentFields  =

    new ObjectStreamField0;

    ...

    }

    ```


    这是官方 Java `String` 类的一个片段。每条 import 语句都引用了 `String` 类主体中使用的某个类所在的包及其名称。


    特殊的 import 语句用于导入静态变量和静态方法。静态变量和方法无需实例化类即可使用。在 JDK 中，有一个用于数学运算的类。它包含开发者可以用来实现解决数学问题的代码的静态变量和方法。请看以下代码。


    ```

    package com.apress.bgn.ch4.basic;

    import static java.lang.Math.PI;

    import static java.lang.Math.sqrt;

    public class Sample extends Object {

    public static void main(String... args) {

    System.out.println("PI value =" + PI);

    double result = sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    ```


    通过将 `import` 和 `static` 放在一起，我们可以声明一个类的完整限定名以及我们希望在代码中使用的方法或变量。这允许我们直接使用该变量或方法，而无需使用其声明所在的类名。如果没有静态导入，代码必须重写为：


    ```

    package com.apress.bgn.ch4.basic;

    import  java.lang.Math;

    public class Sample extends Object {

    public static void main(String... args)  {

    System.out.println("PI value =" + Math.PI);

    double result = Math.sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    ```


    编写 Java 代码时，你可能还会做另一件事，那就是**精简** import 语句。当使用同一个包中的多个类来编写代码，或者使用同一个类中的多个静态变量和方法时，建议精简导入。如果不这样做，文件的导入部分会变得非常庞大且难以阅读。这时精简就派上了用场。精简导入意味着用通配符替换来自同一个包的所有类或来自同一个类的所有变量和方法，这样只需要一条
    import 语句。因此，`Sample` 类变成了


    ```

    package com.apress.bgn.ch4.basic;

    import static java.lang.Math.*;

    public class Sample extends Object {

    public static void main(String... args) {

    System.out.println("PI value  =" + PI);

    double result = sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    ```


    ### Java “语法”


    **Java 是区分大小写的**，这意味着你可以编写如下代码。


    ```

    public class Sample {

    public static void main(String... args) {

    int mynumber = 0;

    int myNumber = 1;

    int Mynumber = 2;

    int MYNUMBER = 3;

    System.out.println(mynumber);

    System.out.println(myNumber);

    System.out.println(Mynumber);

    System.out.println(MYNUMBER);

    }

    }

    ```


    所有四个变量都是不同的，最后几行打印的数字是：`0 1 2 3`。你不能在同一个上下文（例如，在方法体内）中声明两个同名的变量，因为这基本上是在重新声明同一个变量，而
    Java 编译器不允许这样做。如果你尝试这样做，你的代码将无法编译，甚至 IntelliJ IDEA 也会尝试通过用红色下划线标出代码并显示相关消息来让你看到错误所在，如图
    4-1 所示，其中 `mynumber` 变量被声明了两次。


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig1_HTML.jpg](img/463938_1_En_4_Fig1_HTML.jpg)


    图 4-1


    包含错误的相同语句示例


    有一组 **Java 关键字**，它们在 Java 代码中只能用于固定的、预定义的目的。其中一些已经介绍过：`import`、`package`、`public`、`class`。其余的关键字将在本章末尾进行介绍，并附有简短说明（见表
    4-2 和 4-3）。


    除了 `import`、`package`、`interface`（或 `@interface`）、`enum` 和 `class` 声明之外，Java 源文件中的所有其他内容都必须声明在**花括号**（`{}`）内。这些被称为**块分隔符**。请看第
    4.1 节的开头部分。那里的花括号用于包裹以下内容。


    *   类的内容，也称为类的`主体`（第 08 行和第 23 行的花括号）


    *   方法的内容，也称为方法的`主体`（第 09 行和第 22 行的花括号）


    *   一组要一起执行的指令（第 12 行和第 21 行的花括号）


    **行终止符**：在 Java 中，代码行通常以分号（;）符号或 ASCII 字符 CR、LF 或 CR LF 结束。冒号用于终止功能完整的语句，例如第 11
    行的列表声明。如果我们有一个非常小的显示器，并且被迫将该语句拆分成两行以保持代码可读性，那么其末尾的冒号告诉编译器，这个语句只有放在一起才是正确的。请看图
    4-2。


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig2_HTML.jpg](img/463938_1_En_4_Fig2_HTML.jpg)


    图 4-2


    不同语句示例


    第 8 行的列表声明等同于第 10 行和第 11 行的声明。第 13 行和第 14 行的声明是故意写错的——在第 13 行添加了一个冒号，该语句在此处结束；但该语句无效，当你尝试编译该类时，编译器会打印一个异常来报错，提示：`"Error:(13,
    32) java: illegal start of expression"`。如果这个错误消息看起来与示例不符，可以这样理解：对于编译器来说，问题不在于语句的错误终止，而在于
    `=` 符号之后，编译器期望找到某种表达式来为 `badList` 变量生成值，但它却什么也没找到。

