    Since no formatting is done when the variables are printed, the values depicted
    in the console are in the decimal system.


    For now, this is all that can be said about the primitive types. Each of the primitive
    types has a matching reference type defined within the JDK, and converting a primitive
    value to its equivalent reference is called `boxing` and the reverse process is
    called `unboxing` . In certain situation those processes are done explicitly,
    but more about that later.


    ## Java Reference Types


    Java Reference Types were described earlier to highlight the differences between
    primitive and reference types. It is now time to expand that description and give
    some examples of the most used JDK reference types when programming.


    *Objects* or *instances* are created using the `new` keyword followed by the call
    of a constructor. The constructor is a special member of a class, used to create
    an object by initializing all fields of the class with their default values, or
    values received as arguments. A class instance is created by calling the class
    constructor (one of them, because there might be more than one defined within
    the class). So, considering the example that we had in **Chapter** [4](#463938_1_En_4_Chapter.xhtml),
    the `Performer` class, to declare a reference to an object of type `Performer`
    the following expression is used.


    ```

    Performer human = new Performer("John", 40, 1.91f, Gender.MALE);

    ```


    The interface reference types cannot be instantiated, but objects of class types
    that extend that interface can be assigned to references of that interface type.
    The hierarchy used in **Chapter** [4](#463938_1_En_4_Chapter.xhtml) is depicted
    in Figure [5-10](#463938_1_En_5_Chapter.xhtml#Fig10).


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig10_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Class and interface hierarchy


    Based on this hierarchy, the following four statements are valid and they compile.


    ```

    package com.apress.bgn.ch5;

    import com.apress.bgn.ch4.hierarchy.*;

    public class ReferencesDemo {

    public static void main(String... args) {

    Performer performer = new Performer("John", 40, 1.91f, Gender.MALE);

    Human human = new Performer("Jack", 40, 1.91f, Gender.MALE);

    Actor actor = new Performer("Jean", 40, 1.91f, Gender.MALE);

    Musician musician = new Performer("Jodie", 40, 1.71f, Gender.FEMALE);

    }

    }

    ```


    In the example, we created four objects of type `Performer` and assigned them
    to different reference types, including two interface reference types. If we were
    to inspect the stack and heap contents for the preceding method, Figure [5-11](#463938_1_En_5_Chapter.xhtml#Fig11)
    shows what we would find. (Figure [5-11](#463938_1_En_5_Chapter.xhtml#Fig11))


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig11_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Multiple reference types


    All the references in the previous example point to different objects in the heap,
    but the following code is possible as well.


    ```

    package com.apress.bgn.ch5;

    import com.apress.bgn.ch4.hierarchy.*;

    public class ReferencesDemo {

    public static void main(String... args) {

    Performer performer = new Performer("John", 40, 1.91f, Gender.MALE);

    Human human = performer;

    Actor actor = performer;

    Musician musician = performer;

    }

    }

    ```


    In the code snippet, we’ve created only one object, but multiple references to
    it, of different types. If we were to inspect the stack and heap contents for
    the preceding method, Figure [5-12](#463938_1_En_5_Chapter.xhtml#Fig12) shows
    what we would find.


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig12_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Multiple reference types, second example


    References can only be of the super-type of an assigned object, so the assignments
    in the following code snippet will not compile.


    ```

    package com.apress.bgn.ch5;

    import com.apress.bgn.ch4.hierarchy.*;

    public class ReferencesDemo {

    public static void main(String... args) {

    Performer performer = new Performer("John", 40, 1.91f, Gender.MALE);

    Human human = performer;

    Actor actor = performer;

    Musician musician = performer;

    //these will not compile!!!

    performer = musician;

    //or

    performer = human;

    //or

    performer = actor;

    }

    }

    ```


    The reason for that is that the methods are called on the reference, so the object
    the reference is pointing to must have those methods. So, if a reference is of
    type `Performer` and `getSongs()` gets called on it, an object of type actor,
    like in the last line of code will not have that method. That is why the Java
    compiler complains, and that is why smart editors notify you by underlining the
    statement with a red line.


    Sure, an explicit conversion can be made: `performer = (Performer) actor;`, and
    this convinces the compiler that all is well, but this only causes an exception
    at runtime.'
