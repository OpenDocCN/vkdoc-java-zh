- fmt: '# Introduction to Streams


    Consider a really big collection of songs that we want to analyze. We want to
    find all songs with duration of at least 300 seconds. We want to save the names
    of these songs in a list and sort them by decreasing order of their duration.
    Assuming we already have the songs in a list, the code looks like this:


    ```

    List songList = ...

    List resultedSongs = new ArrayList();

    for (Song song: songList) {

    if (song.getDuration() >= 300) {

    resultedSongs.add(song);

    }

    }

    Collections.sort(resultedSongs, new Comparator(){

    public int compare(Song s1, Song s2){

    return s2.getDuration().compareTo(s1.getDuration());

    }

    });

    System.out.println(resultedSongs);

    List finalList = new ArrayList();

    for (Song song: resultedSongs) {

    finalList.add(song.getTitle());

    }

    System.out.println(finalList);

    ```


    One of the problems with this code is that processing large collections is not
    really efficient. Also, we are traversing lists over and over again and performing
    checks to get to a final result. Wouldn’t it be nice if we could just link all
    of those operations together and execute them on the initial list?


    Enter Java 8 and the new `Stream` abstraction that represents a sequence of elements
    that can be processed sequentially or in parallel and supports aggregate operations.
    Because of the latest evolutions in hardware development, CPUs have become more
    powerful and more complex, containing multiple cores that can process information
    in parallel. To make use of these hardware capabilities in Java the Fork Join
    Framework was introduced. And in Java 8, the `Stream API` was introduced to support
    parallel data processing, without the boiler-code of defining and synchronizing
    threads. The central interface of the `Stream API` is the `java.util.stream.BaseStream`.
    Any object with stream capabilities is of a type that extends it. A stream does
    not store elements itself, it is not a data structure, it is used to compute elements
    and serve them on-demand to a function or a set of aggregate functions. Serving
    the elements in a sequence involves an internal automatic iteration. Functions
    that return a stream can be chained in a *pipeline*, and are called *intermediate
    operations*. They are used to process elements of a stream and return the result
    as a stream to the next function in the pipeline. Functions that return a result
    that is not a stream are called *terminal operations* and are obviously present
    at the end of a pipeline. As a quick example before getting deeper, the previous
    code can be written like this using streams:


    ```

    List finalList = songList.stream().filter(s -> s.getDuration()>= 300)

    .sorted(Comparator.comparing(Song::getDuration).reversed())

    .map(Song::getTitle)

    .collect(Collectors.toList());

    System.out.println(finalList);

    ```


    Yup, programming with streams is awesome. The `Stream API` concept allows developers
    to transform collections into streams, and write code to process the data in parallel
    and then getting the results into a collection.


    Because working with streams is a sensitive way of programming; I recommend designing
    the code by taking every possibility in mind. `NullPointerException` is one of
    the most common exceptions to be thrown in Java. In Java 8, the class `Optional<T>`
    was introduced to avoid this type of exceptions. `Stream<T>` instances are used
    to store an infinite instances of type `T`, while `Optional<T>` is an instance
    that might or might not contain an instance of type `T`. Because both of these
    implementations are basically wrappers for other types, they are covered together.


    ### !


    For practical reasons, `Stream` instances are referred in this chapter as *streams*,
    in a similar manner as `List` instances are referred as *lists* and `collection`
    instances as *collections*, and many more.


    ### !


    You might notice that the term *function* was introduced and refers to the methods
    called on streams or their arguments. This is because working with streams allows
    for Java code to be written in *functional programming* style. Java is an *object-oriented
    programming* language, and the *object* is its core term. In functional programming,
    the core term is *pure function*. Code is written by composing pure functions,
    which avoids shared states, takes advantage of immutable data, and avoids the
    side effects of processing contamination.^([^(62)](#fn62))


    ## Creating Streams


    Before having fun and optimizing our code using streams let’s see how we can create
    them. To create a stream, we need a source. That source can be anything: a collection
    (list, set or map), an array, I/O resources used as input (such as files, databases,
    or anything that can be transformed into a sequence of instances).


    **A stream does not modify its source, so multiple stream instances can be created
    from the same source and used for different operations.**


    ### Creating Streams from Collections


    In the introduction of the chapter, in the last snippet of code we were introduced
    to one method of creating a stream from a list. Starting with Java 8, all collection
    interfaces and classes were enriched with default methods that return streams.
    In the following code sample, we take a list of integers and transform it into
    a stream by calling its `stream()` method. After having a stream, we traverse
    it using the `forEach` method to print the values in the stream and the name of
    the execution thread this code is executed on. Why, the thread name you ask? You
    see shortly.


    ```

    package com.apress.bgn.ch8;

    import java.util.List;

    public class StreamsDemo {

    public static void main(String... args) {

    List bigList = List.of( 50, 10, 250, 100 ...);

    bigList.stream()

    .forEach(i ->

    System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    The previous code creates a stream of integer elements. The `Stream` interface
    exposes a set of methods that each `Stream` implementation provides a concrete
    implementation for. The most used is the `forEach` method that iterates over the
    elements in the stream. The `forEach` method requires a parameter of type `java.util.function.Consumer<T>`.


    ### !


    A *consumer* is what we call in this book an inline implementation of the `java.util.function.Consumer<T>`
    functional interface. This means it has only has one method that a class implementing
    it has to provide a concrete implementation for. The method named `accept(T t)`,
    takes a stream element of type `T` as argument, processes it and returns nothing.


    This method is called for each element in the stream, and the `T` is the type
    of the elements in the stream. The implementing class is basically declared inline
    by only mentioning the body of the method. The JVM does the rest, because of the
    magic of lambda expressions. Without them, you would have to write something like
    this:


    ```

    import java.util.function.Consumer;

    ...

    bigList.stream()

    .forEach(new Consumer() {

    @Override

    public void accept(Integer i) {

    System.out.println(Thread.currentThread().getName() + ": " + i);

    }

    });

    ```


    Actually, this was the way you would write code before lambda expressions were
    introduced in Java 8. If you needed to create a single object of a class type
    implementing a specific interface, in a singular place in the application, you
    could choose to write a contraption like that, which looks like you are instantiating
    the interface; the result of that code is called an *anonymous class*. Lambda
    expressions simplified this process a lot, but only for a category of interfaces
    named *functional interfaces*, which define a single method and are annotated
    with the `@FunctionalInterface` annotation (starting in Java 8).


    In the previous example, the implementation prints the thread name and the value
    of the element. The following is the result is of running that code.


    ```

    main: 50

    main: 10

    main: 250

    main: 100

    ...

    ```


    The fact that each number is prefixed with `main` means that all integers in the
    stream are processed sequentially by the same thread, and is the main thread of
    the application.'
  raw: '## Introduction to Streams


    Consider a really big collection of songs that we want to analyze. We want to
    find all songs with duration of at least 300 seconds. We want to save the names
    of these songs in a list and sort them by decreasing order of their duration.
    Assuming we already have the songs in a list, the code looks like this:


    ```

    List songList = ...

    List resultedSongs = new ArrayList();

    for (Song song: songList) {

    if (song.getDuration() >= 300) {

    resultedSongs.add(song);

    }

    }

    Collections.sort(resultedSongs, new Comparator(){

    public int compare(Song s1, Song s2){

    return s2.getDuration().compareTo(s1.getDuration());

    }

    });

    System.out.println(resultedSongs);

    List finalList = new ArrayList();

    for (Song song: resultedSongs) {

    finalList.add(song.getTitle());

    }

    System.out.println(finalList);

    ```


    One of the problems with this code is that processing large collections is not
    really efficient. Also, we are traversing lists over and over again and performing
    checks to get to a final result. Wouldn’t it be nice if we could just link all
    of those operations together and execute them on the initial list?


    Enter Java 8 and the new **Stream** abstraction that represents a sequence of
    elements that can be processed sequentially or in parallel and supports aggregate
    operations. Because of the latest evolutions in hardware development, CPUs have
    become more powerful and more complex, containing multiple cores that can process
    information in parallel. To make use of these hardware capabilities in Java the
    Fork Join Framework was introduced. And in Java 8, the *Stream API* was introduced
    to support parallel data processing, without the boiler-code of defining and synchronizing
    threads. The central interface of the *Stream API* is the `java.util.stream.BaseStream`
    . Any object with stream capabilities is of a type that extends it. A stream does
    not store elements itself, it is not a data structure, it is used to compute elements
    and serve them on-demand to a function or a set of aggregate functions. Serving
    the elements in a sequence involves an internal automatic iteration. Functions
    that return a stream can be chained in a *pipeline*, and are called *intermediate
    operations* . They are used to process elements of a stream and return the result
    as a stream to the next function in the pipeline. Functions that return a result
    that is not a stream are called *terminal operations* and are obviously present
    at the end of a pipeline. As a quick example before getting deeper, the previous
    code can be written like this using streams:


    ```

    List finalList = songList.stream().filter(s -> s.getDuration()>= 300)

    .sorted(Comparator.comparing(Song::getDuration).reversed())

    .map(Song::getTitle)

    .collect(Collectors.toList());

    System.out.println(finalList);

    ```


    Yup, programming with streams is awesome. The *Stream API* concept allows developers
    to transform collections into streams, and write code to process the data in parallel
    and then getting the results into a collection.


    Because working with streams is a sensitive way of programming; I recommend designing
    the code by taking every possibility in mind. `NullPointerException` is one of
    the most common exceptions to be thrown in Java. In Java 8, the class `Optional<T>`
    was introduced to avoid this type of exceptions. `Stream<T>` instances are used
    to store an infinite instances of type T, while `Optional<T>` is an instance that
    might or might not contain an instance of type T. Because both of these implementations
    are basically wrappers for other types, they are covered together.


    ### !


    For practical reasons, `Stream` instances are referred in this chapter as *streams*,
    in a similar manner as `List` instances are referred as *lists* and `collection`
    instances as *collections*, and many more.


    ### !


    You might notice that the term *function* was introduced and refers to the methods
    called on streams or their arguments. This is because working with streams allows
    for Java code to be written in **functional programming** style. Java is an **object-oriented
    programming** language, and the **object** is its core term. In functional programming,
    the core term is *pure function*. Code is written by composing pure functions,
    which avoids shared states, takes advantage of immutable data, and avoids the
    side effects of processing contamination.^([^(62)](#fn62))


    ## Creating Streams


    Before having fun and optimizing our code using streams let’s see how we can create
    them. To create a stream, we need a source. That source can be anything: a collection
    (list, set or map), an array, I/O resources used as input (such as files, databases,
    or anything that can be transformed into a sequence of instances).


    **A stream does not modify its source, so multiple stream instances can be created
    from the same source and used for different operations.**


    ### Creating Streams from Collections


    In the introduction of the chapter, in the last snippet of code we were introduced
    to one method of creating a stream from a list. Starting with Java 8, all collection
    interfaces and classes were enriched with default methods that return streams.
    In the following code sample, we take a list of integers and transform it into
    a stream by calling its `stream()` method. After having a stream, we traverse
    it using the `forEach` method to print the values in the stream and the name of
    the execution thread this code is executed on. Why, the thread name you ask? You
    see shortly.


    ```

    package com.apress.bgn.ch8;

    import java.util.List;

    public class StreamsDemo {

    public static void main(String... args) {

    List bigList = List.of( 50, 10, 250, 100 ...);

    bigList.stream()

    .forEach(i ->

    System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    The previous code creates a stream of integer elements. The `Stream` interface
    exposes a set of methods that each `Stream` implementation provides a concrete
    implementation for. The most used is the `forEach` method that iterates over the
    elements in the stream. The `forEach` method requires a parameter of type `java.util.function.Consumer<T>`.


    ### !


    A *consumer* is what we call in this book an inline implementation of the `java.util.function.Consumer<T>`
    functional interface. This means it has only has one method that a class implementing
    it has to provide a concrete implementation for. The method named `accept(T t)`,
    takes a stream element of type `T` as argument, processes it and returns nothing.


    This method is called for each element in the stream, and the `T` is the type
    of the elements in the stream. The implementing class is basically declared inline
    by only mentioning the body of the method. The JVM does the rest, because of the
    magic of lambda expressions. Without them, you would have to write something like
    this:


    ```

    import java.util.function.Consumer;

    ...

    bigList.stream()

    .forEach(new Consumer() {

    @Override

    public void accept(Integer i) {

    System.out.println(Thread.currentThread().getName() + ": " + i);

    }

    });

    ```


    Actually, this was the way you would write code before lambda expressions were
    introduced in Java 8\. If you needed to create a single object of a class type
    implementing a specific interface, in a singular place in the application, you
    could choose to write a contraption like that, which looks like you are instantiating
    the interface; the result of that code is called an **anonymous class** . Lambda
    expressions simplified this process a lot, but only for a category of interfaces
    named *functional interfaces,* which define a single method and are annotated
    with the `@FunctionalInterface` annotation (starting in Java 8).


    In the previous example, the implementation prints the thread name and the value
    of the element. The following is the result is of running that code.


    ```

    main: 50

    main: 10

    main: 250

    main: 100

    ...

    ```


    The fact that each number is prefixed with `main` means that all integers in the
    stream are processed sequentially by the same thread, and is the main thread of
    the application.'
  trans: '

    ## Streams 简介


    假设我们有一个非常大的歌曲集合需要分析。我们要找出所有时长至少为 300 秒的歌曲，将这些歌曲的名称保存到一个列表中，并按时长降序排序。假设我们已经将歌曲存放在一个列表中，代码看起来是这样的：


    ```

    List songList = ...

    List resultedSongs = new ArrayList();

    for (Song song: songList) {

    if (song.getDuration() >= 300) {

    resultedSongs.add(song);

    }

    }

    Collections.sort(resultedSongs, new Comparator(){

    public int compare(Song s1, Song s2){

    return s2.getDuration().compareTo(s1.getDuration());

    }

    });

    System.out.println(resultedSongs);

    List finalList = new ArrayList();

    for (Song song: resultedSongs) {

    finalList.add(song.getTitle());

    }

    System.out.println(finalList);

    ```


    这段代码的一个问题是处理大型集合的效率并不高。此外，我们反复遍历列表并执行检查才能得到最终结果。如果我们能将所有这些操作链接起来，并在初始列表上执行，那该多好啊？


    于是 Java 8 引入了新的 **Stream** 抽象，它表示一个元素序列，可以顺序或并行处理，并支持聚合操作。由于硬件发展的最新演进，CPU 变得更强大、更复杂，包含多个可以并行处理信息的内核。为了在
    Java 中利用这些硬件能力，引入了 Fork Join 框架。而在 Java 8 中，*Stream API* 被引入以支持并行数据处理，无需定义和同步线程的样板代码。*Stream
    API* 的核心接口是 `java.util.stream.BaseStream`。任何具有流能力的对象都是扩展该接口的类型。流本身不存储元素，它不是数据结构，而是用于计算元素并按需提供给某个函数或一组聚合函数。按顺序提供元素涉及内部自动迭代。返回流的函数可以链接成一个
    *管道*，这些函数被称为 *中间操作*。它们用于处理流中的元素，并将结果作为流返回给管道中的下一个函数。返回非流结果的函数被称为 *终端操作*，显然位于管道的末尾。在深入探讨之前，先举一个快速示例，之前的代码使用流可以这样写：


    ```

    List finalList = songList.stream().filter(s -> s.getDuration()>= 300)

    .sorted(Comparator.comparing(Song::getDuration).reversed())

    .map(Song::getTitle)

    .collect(Collectors.toList());

    System.out.println(finalList);

    ```


    没错，使用流编程真是太棒了。*Stream API* 的概念允许开发者将集合转换为流，编写代码并行处理数据，然后将结果收集到集合中。


    由于使用流是一种敏感的编程方式；我建议在设计代码时考虑所有可能性。`NullPointerException` 是 Java 中最常抛出的异常之一。在 Java
    8 中，引入了 `Optional<T>` 类来避免此类异常。`Stream<T>` 实例用于存储类型 T 的无限实例，而 `Optional<T>` 是一个可能包含也可能不包含类型
    T 实例的实例。由于这两种实现本质上都是其他类型的包装器，因此将它们放在一起讨论。


    ### ！


    出于实际原因，本章中将 `Stream` 实例称为 *流*，类似于将 `List` 实例称为 *列表*，将 `collection` 实例称为 *集合*，等等。


    ### ！


    你可能会注意到引入了术语 *函数*，它指的是在流或其参数上调用的方法。这是因为使用流允许以 **函数式编程** 风格编写 Java 代码。Java 是一种
    **面向对象编程** 语言，**对象** 是其核心术语。在函数式编程中，核心术语是 *纯函数*。代码通过组合纯函数来编写，这避免了共享状态，利用了不可变数据，并避免了处理污染的副作用。^(⁶²)


    ## 创建流


    在享受使用流优化代码的乐趣之前，我们先来看看如何创建它们。要创建流，我们需要一个源。这个源可以是任何东西：集合（列表、集合或映射）、数组、用作输入的 I/O
    资源（如文件、数据库或任何可以转换为实例序列的东西）。


    **流不会修改其源，因此可以从同一源创建多个流实例，并用于不同的操作。**


    ### 从集合创建流


    在本章引言部分的最后一个代码片段中，我们了解了一种从列表创建流的方法。从 Java 8 开始，所有集合接口和类都增加了返回流的默认方法。在以下代码示例中，我们获取一个整数列表，并通过调用其
    `stream()` 方法将其转换为流。获得流后，我们使用 `forEach` 方法遍历它，以打印流中的值以及执行此代码的线程名称。你可能会问，为什么要打印线程名称？你很快就会明白。


    ```

    package com.apress.bgn.ch8;

    import java.util.List;

    public class StreamsDemo {

    public static void main(String... args) {

    List bigList = List.of( 50, 10, 250, 100 ...);

    bigList.stream()

    .forEach(i ->

    System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    上述代码创建了一个整数元素的流。`Stream` 接口公开了一组方法，每个 `Stream` 实现都为其提供了具体实现。最常用的是 `forEach` 方法，它遍历流中的元素。`forEach`
    方法需要一个 `java.util.function.Consumer<T>` 类型的参数。


    ### ！


    *消费者* 在本书中指的是 `java.util.function.Consumer<T>` 函数式接口的内联实现。这意味着它只有一个方法，实现它的类必须为该接口提供具体实现。该方法名为
    `accept(T t)`，接受一个类型为 `T` 的流元素作为参数，处理它，但不返回任何内容。


    该方法为流中的每个元素调用，`T` 是流中元素的类型。实现类基本上是通过仅提及方法体来内联声明的。由于 lambda 表达式的魔力，JVM 会处理其余部分。如果没有它们，你将不得不编写如下代码：


    ```

    import java.util.function.Consumer;

    ...

    bigList.stream()

    .forEach(new Consumer() {

    @Override

    public void accept(Integer i) {

    System.out.println(Thread.currentThread().getName() + ": " + i);

    }

    });

    ```


    实际上，这是在 Java 8 引入 lambda 表达式之前编写代码的方式。如果你需要在应用程序的某个特定位置创建实现特定接口的类类型的单个对象，你可以选择编写这样一个看起来像是在实例化接口的复杂结构；该代码的结果被称为
    **匿名类**。Lambda 表达式极大地简化了这一过程，但仅适用于一类名为 *函数式接口* 的接口，这些接口定义了一个单一方法，并带有 `@FunctionalInterface`
    注解（从 Java 8 开始）。


    在前面的示例中，实现打印了线程名称和元素的值。以下是运行该代码的结果。


    ```

    main: 50

    main: 10

    main: 250

    main: 100

    ...

    ```


    每个数字前面都带有 `main`，这意味着流中的所有整数都由同一个线程顺序处理，并且该线程是应用程序的主线程。

    '
- fmt: '### ！


    出于实际考虑，当仅需要顺序流进行遍历时，无需对集合调用`stream()`，因为集合中定义的`forEach`方法已经能很好地完成这项工作。因此，前面的代码可以简化为：


    ```

    bigList.forEach(i ->

    System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    ```


    打印线程名称是因为还有另一种创建流的方式：调用`parallelStream()`方法。唯一的区别在于，返回的流是一个并行流。这意味着流中的每个元素都在不同的线程上处理。当然，这也意味着`Consumer`的实现必须是线程安全的，并且不能包含涉及不应在线程间共享的实例的代码。打印流元素值的代码既不影响流返回的元素值，也不影响其他外部对象，因此并行化是安全的。所以，让我们使用`parallelStream()`代替`stream`来创建流，并使用相同的`Consumer`实现打印流中的元素。


    ```

    package com.apress.bgn.ch8;

    import java.util.List;

    import java.util.function.Consumer;

    public class StreamsDemo {

    public static void main(String... args) {

    List bigList = List.of( 50, 10, 250, 100 ...);

    bigList.parallelStream()

    .forEach(i ->

    System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    如果在控制台中执行这段代码，我们会看到类似如下的输出，但可能略有不同。


    ```

    ForkJoinPool.commonPool-worker-9: 94

    ForkJoinPool.commonPool-worker-7: 10

    ForkJoinPool.commonPool-worker-5: 40052

    ForkJoinPool.commonPool-worker-3: 50

    ForkJoinPool.commonPool-worker-13: 74

    ForkJoinPool.commonPool-worker-9: 200

    ForkJoinPool.commonPool-worker-11: 250

    ForkJoinPool.commonPool-worker-7: 83

    ForkJoinPool.commonPool-worker-3: 23

    ...

    ```


    你首先会注意到线程名称，我们不再只有一个线程，而是有很多线程，它们都命名为`ForkJoinPool.commonPool-worker-**`。这告诉我们，所有流元素都在不同的线程上处理，但它们都属于同一个*池*。在这种情况下，JVM
    创建了一个线程池来容纳几个线程实例，用于并行处理流中的所有元素。使用线程池的好处是线程可以被重用，因此无需创建新的线程实例，这在一定程度上优化了执行时间，但只有在更复杂的解决方案中才能明显看到。如果你查看每个线程关联的数字（线程名称末尾的数字），你会发现这些数字有时会重复。这基本上意味着同一个线程被重用来处理另一个流元素。


    ### 从数组创建流


    到目前为止，我们使用的流都是从`List`实例创建的。同样的语法也适用于`Set`实例。


    但流也可以从数组创建。请看下面的代码片段。


    ```

    package com.apress.bgn.ch8;

    import java.util.Arrays;

    public class ArrayStreamDemo {

    public static void main(String... args) {

    int[] arr = { 50, 10, 250, 100 ...};

    Arrays.stream(arr).forEach(

    i -> System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    工具类`Arrays`中的静态方法`stream(int[] array)`创建了一个基本类型流。对于包含对象的数组，调用的方法是`stream(T[] array)`（其中`T`是泛型类型），它会被替换为数组中元素的类型。从数组生成的流可以通过调用`parallel`方法实现并行化，该方法同样适用于并行流。因此，以下代码可以并行化，如下所示。


    ```

    package com.apress.bgn.ch8;

    import java.util.Arrays;

    public class ArrayStreamDemo {

    public static void main(String... args) {

    int[] arr = { 50, 10, 250, 100 ...};

    Arrays.stream(arr).parallel().forEach(

    i -> System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    对于这两种情况，输出与前面的示例相同，因此无需再次展示。


    数组的新特性在于，可以通过指定数组块的起始和结束索引，从数组的一部分创建流。


    ```

    Arrays.stream(arr, 3,6).forEach(

    i -> System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    ```


    ### 创建空流


    在编写 Java 代码时，一个好的实践是编写返回对象的方法时避免返回`null`，以减少抛出`NullPointerException`的可能性。当方法返回流时，首选方式是返回一个空流。这可以通过调用`Stream`接口的静态方法`Stream.empty()`来实现。以下方法接收一个`Song`实例列表作为参数，并使用它作为源返回一个流。如果列表为`null`或为空，则返回一个空流。


    ```

    public static Stream asStream(List inputList) {

    if (inputList == null || inputList.isEmpty()) {

    return Stream.empty();

    } else {

    return inputList.stream();

    }

    }

    ```


    ### 创建有限流


    除了从实际源创建流之外，还可以通过调用流工具方法（如`Stream.generate()`或`Stream.builder()`）即时创建流。


    当我们想要构建一个具有固定已知值集合的有限流时，应使用`builder()`方法。该方法返回一个`java.util.stream.Stream.Builder<T>`实例，这是一个内部接口，声明了一个名为`add(..)`的默认方法，需要调用该方法来添加流的元素。要创建`Stream`实例，最后必须调用其`build`方法。`add(..)`方法返回对`Builder`实例的引用，因此它可以与该类的任何其他方法链式调用。以下代码示例展示了如何使用`builder()`方法创建一个`Integer`值的有限流。


    ```

    Stream built = Stream.builder()

    .add(50).add(10).add(250).build();

    ```


    由于`Builder`接口是泛型接口，因此必须指定一个类型参数，作为流中元素的类型。此外，`builder()`方法也是泛型的，需要在调用之前在其前面提供类型作为参数。如果未指定类型，则默认使用`Object`。


    要创建流，也可以使用`generate(..)`方法。该方法接收一个`java.util.function.Supplier<T>`类型的实例作为参数。'
  raw: '### !


    For practical reasons, there is no need to call `stream()`for collections when
    a sequential stream is needed only for traversal, because the `forEach` method
    defined for them does the job well. So the preceding code can be reduced to


    `bigList.forEach(i ->`


    `System.out.println(Thread.currentThread().getName() + ": " + i)`


    `);`


    The name of the thread was printed because there is another way to create a stream
    by calling the `parallelStream()` method . The only difference is that the returned
    stream is a parallel stream. This means that each element of the stream is processed
    on a different thread. Of course, this means the implementation of the `Consumer`
    must be thread-safe and not contain code that involves instances that are not
    meant to be shared amongst threads. The code to print the value of a stream element,
    does not affect the value of the element returned by the stream, not other external
    object, so it is safe to parallelize. So let’s use `parallelStream()` instead
    of `stream` to create a stream and print the elements of the stream using the
    same `Consumer` implementation.


    ```

    package com.apress.bgn.ch8;

    import java.util.List;

    import java.util.function.Consumer;

    public class StreamsDemo {

    public static void main(String... args) {

    List bigList = List.of( 50, 10, 250, 100 ...);

    bigList.parallelStream()

    .forEach(i ->

    System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    If we execute the code in the console, we see something similar to the output,
    but slightly different.


    ```

    ForkJoinPool.commonPool-worker-9: 94

    ForkJoinPool.commonPool-worker-7: 10

    ForkJoinPool.commonPool-worker-5: 40052

    ForkJoinPool.commonPool-worker-3: 50

    ForkJoinPool.commonPool-worker-13: 74

    ForkJoinPool.commonPool-worker-9: 200

    ForkJoinPool.commonPool-worker-11: 250

    ForkJoinPool.commonPool-worker-7: 83

    ForkJoinPool.commonPool-worker-3: 23

    ...

    ```


    The first thing you notice is the thread name, we no longer have one, but a lot
    of them all named `ForkJoinPool.commonPool-worker-**`. This tells us that all
    stream elements are processed on different threads, but all of them are part of
    the same *pool*. A thread pool is created by the JVM in this case to contain a
    few thread instances, used to process all elements in the stream in parallel.
    The advantage of using a thread pool is that the threads can be reused, so no
    new thread instances need to be created and this optimizes the execution time
    a little, but it is visible only in more complex solutions. If you look at the
    number associated to each thread, the number at the end of the thread name, you
    can see that the numbers sometimes repeat. This basically means the same thread
    was reused to process another stream element.


    ### Creating Streams from Arrays


    The streams we have used so far, were created from a `List` instance. The same
    syntax can be used for `Set` instances as well.


    But streams can be created from arrays as well. Look at the following piece of
    code.


    ```

    package com.apress.bgn.ch8;

    import java.util.Arrays;

    public class ArrayStreamDemo {

    public static void main(String... args) {

    int[] arr = { 50, 10, 250, 100 ...};

    Arrays.stream(arr).forEach(

    i -> System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    The static method `stream(int[] array)` from the utility class `Arrays` creates
    a stream of primitives. For arrays that contain objects, the method called is
    `stream(T[] array)` (where `T` is a generic type) that is replaced with the type
    of the elements in the array. Streams generated from arrays can be parallelized
    by calling the `parallel` methods, which exist for parallel streams as well. So,
    the following code can be parallelized, as shown.


    ```

    package com.apress.bgn.ch8;

    import java.util.Arrays;

    public class ArrayStreamDemo {

    public static void main(String... args) {

    int[] arr = { 50, 10, 250, 100 ...};

    Arrays.stream(arr).parallel().forEach(

    i -> System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    }

    }

    ```


    For both cases, the output is the same as in the previous examples, so there is
    no need to depict it again.


    The novelty with arrays is that a stream can be created form a part of the array
    by specifying the start and the end indexes for the array chunk.


    ```

    Arrays.stream(arr, 3,6).forEach(

    i -> System.out.println(Thread.currentThread().getName() + ": " + i)

    );

    ```


    ### Creating Empty Streams


    When writing Java code, a good practice is to write methods that return objects
    by avoiding returning `null` to reduce the possibility of `NullPointerExceptions`
    being thrown. When methods return streams, the preferred way is to return an empty
    stream. This can be done by calling the static `Stream.empty()` method of the
    `Stream` interface. The following method, receives a list of `Song` instances
    as a parameter and returns a stream using it as a source. If the list is `null`
    or empty, an empty stream is returned.


    ```

    public static Stream asStream(List inputList) {

    if (inputList == null || inputList.isEmpty()) {

    return Stream.empty();

    } else {

    return inputList.stream();

    }

    }

    ```


    ### Creating Finite Streams


    Aside from creating streams from actual sources, streams can be created on the
    spot by calling stream utility methods like `Stream.generate()` or `Stream.builder()`.


    The `builder()` method should be used when we want to build a limited stream with
    a fixed sets of known values. This method returns an instance of `java.util.stream.Stream.Builder<T>`
    , an internal interface that declare a default method named `add(..)` that needs
    to be called to add the elements of the stream. To create the `Stream` instance,
    its `build` method must be finally called. The `add(..)` method returns a reference
    to the `Builder` instance so it can be chained with any other methods of this
    class. The following code is a sample of how the `builder()` method can be used
    to create a finite stream of `Integer` values.


    ```

    Stream built = Stream.builder()

    .add(50).add(10).add(250).build();

    ```


    As the `Builder` interface is a generic one, it is mandatory to specify a type
    argument, as the type of the elements in the stream. Also, the `builder()` method
    is generic and requires the type to be provided as a parameter in front of it,
    right before being called. If no type is specified the default `Object` is used.


    To create a stream, the `generate(..)` method can also be used. This method receives
    as a parameter an instance of type `java.util.function.Supplier<T>` instance.'
