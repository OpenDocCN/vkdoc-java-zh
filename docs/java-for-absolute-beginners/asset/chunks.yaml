    their scope. A package is a hierarchy of directories, with the Java object types
    on the last level (usually, but now always).


    Package names must be unique and their name should follow a certain template.
    Good practices say that to ensure unicity and meaning, you typically begin the
    name with your organization’s Internet domain name in reverse order, then add
    various grouping criteria. In this project, package names follow the template
    depicted here:


    ```

    com.apress.bgn.ch[*]+

    ```


    This template begins with the reversed domain name for Apress publisher ( [`www.apress.com`](http://www.apress.com)
    ), then a term identifying the book is added (`bgn` is a shortcut for *beginner*)
    and at last the `ch` plus the number of the package the source (usually) matches.


    Starting with Java 5, each package can contain a file named `package-info.java`
    that contains a package declaration, package annotations, package comments, and
    Javadoc tags. The comments are exported to the Javadoc for that package and you
    learn how to generate that with Gradle later. The `package-info.java` must reside
    under the last directory in the package. So, if we define a `com.apress.bgn.ch3`
    package, the overall structure and contents of the Java project looks like Figure
    [3-2](#463938_1_En_3_Chapter.xhtml#Fig2).^([^(34)](#fn34))


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig2_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Java package contents


    The `package-info.java` contents could be similar to this:


    ```

    /**

    * Contains classes used for reading information from various sources.

    * @since 1.0-SNAPSHOT

    * @author iuliana.cosmina

    * @version 1.0-SNAPSHOT

    */

    @Deprecated

    package com.apress.bgn.ch3;

    ```


    The files with `*.java` extension containing the object types definitions are
    compiled into files with `*.class` that are organized according to the package
    structure and packaged into one or more **JARs** (**J**ava **Ar**chives ).^([^(35)](#fn35))
    For the previous example, if we were to unpack the JAR resulted after the compilation
    and linkage, you would see what’s shown in Figure [3-3](#463938_1_En_3_Chapter.xhtml#Fig3).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig3_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Contents of a sample JAR


    ### !


    `package-info.java` files are not mandatory, packages can be defined without them.
    They are useful mostly for documentation purposes.


    The code in one package might span multiple JARs, meaning if you have more than
    one subproject^([^(36)](#fn36)) in your project you can have the same package
    name in more than once, containing different classes. A symbolic representation
    of all the preceding is depicted in Figure [3-4](#463938_1_En_3_Chapter.xhtml#Fig4).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig4_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Java building blocks


    A **library** groups one or more JARs.^([^(37)](#fn37))


    A Java application can make use of one or more libraries, and in order to be run,
    needs all of its dependencies (all the JARs) on the classpath. What does this
    mean? It means that to run a Java application, the JDK is needed, the dependencies
    (external JARs) and the application jars. Figure [3-5](#463938_1_En_3_Chapter.xhtml#Fig5)
    depicts this quite clearly.


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig5_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Classpath of an application


    The JARs that make up an application classpath are (obviously) not always independent
    of each other. For 21 years this organization style was enough, but in complex
    applications there were a lot of complications caused by: packages scattered in
    multiple jars, transitive dependencies between jars, which sometimes leads to
    different versions of the same class on the classpath, missing transitive dependencies
    and accessibility problems. All these problems are grouped under one name **The**
    **Jar Hell** .^([^(38)](#fn38)) This problem was resolved in Java 9 by introducing
    another level to group packages, but we should expect that there is **The** **Module
    Hell** at some point in the future.


    Before introducing modules, **access modifiers** should be mentioned because Java
    object types and members can declared with certain access rights within packages,
    and that is something important to understand before jumping into coding.


    ### Access Modifiers


    When you declare an object type in Java (let’s stick to class because it is the
    only one mentioned so far), you can configure who should be able to use it. Access
    modifiers specify access to classes, and in this case, we say that they are used
    at the **top-level** . They can also specify access to class members, and in this
    case, they are used at **member-level** .^([^(39)](#fn39))


    At top-level only two access modifiers can be used: public and none.


    A `top-level` class that is declared `public` must be defined in a Java file with
    the same name. So, the following class is defined in a file named `Base.java`
    stored under the `com.apress.bgn.ch0` package.


    ```

    package com.apress.bgn.ch0;

    //top-level access modifier

    public class Base {

    ...

    }

    ```


    The contents of the class are not depicted for the moment and replaced with `...`
    to stop you from losing focus. A public class is visible to all classes anywhere.
    So, a different class, in a different package can create an object of this type,
    like in the following sample code:


    ```

    package com.apress.bgn.ch3;

    import com.apress.bgn.ch0.Base;

    import  org.apache.logging.log4j.LogManager;

    import org.apache.logging.log4j.Logger;

    public class Main {

    public static void main(String... args) {

    // creating an object of type Base

    Base base = new Base();

    }

    }

    ```'
