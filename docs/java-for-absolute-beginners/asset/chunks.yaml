    序列化与反序列化


    **序列化** 是指将对象的状态转换为字节流的操作，以便可以通过网络发送或写入文件，然后再还原为该对象的副本。将字节流转换回对象的操作称为 **反序列化**。Java
    序列化一直是一个有争议的话题，Java 平台首席架构师 Mark Reinhold 将其描述为 1997 年犯下的一个 *可怕的错误*。显然，大多数 Java
    漏洞都与 Java 中序列化的方式有关，并且有一个名为 **Amber**^(⁸⁵) 的项目致力于完全移除 Java 序列化，并允许开发人员选择他们喜欢的序列化格式。目前，Java
    中的情况不稳定；在短时间内引入了许多变化，以至于一个依赖向后兼容性的行业无法适应。下一节中的资料可能不稳定，但我会尽最大努力确保它们在本书出版时至少是可编译的，并且我会维护代码仓库并尽可能多地回答问题。


    二进制序列化


    `java.io.Serializable` 接口没有方法或字段，仅用于将类标记为可序列化。当对象被序列化时，标识对象类型的信息也会被序列化。大多数 Java
    类都是可序列化的。可序列化类的任何子类默认被视为可序列化，但如果任何新字段不可序列化，则会抛出 `NotSerializableException` 类型的异常。由开发人员编写的包含不可序列化字段的类必须实现
    `Serializable` 接口，并为以下方法提供具体实现：


    ```

    private void writeObject(java.io.ObjectOutputStream out)

    throws IOException;

    private void readObject(java.io.ObjectInputStream in)

    throws IOException, ClassNotFoundException;

    private void readObjectNoData()

    throws ObjectStreamException;

    ```

    '
- fmt: '`writeObject`方法用于写入对象的状态，以便`readObject`方法可以恢复它。`readObjectNoData`方法在反序列化操作因某些原因失败时初始化对象的状态，因此该方法提供了一个默认状态，尽管存在问题（例如，流不完整、客户端应用程序无法识别重新序列化的类等）。如果你是一个乐观主义者，这个方法并不是必须的。


    此外，在使类可序列化时，必须添加一个`long`类型的静态字段作为类的唯一标识符，以确保发送对象字节流的应用程序和接收它的客户端应用程序具有相同的已加载类。如果接收字节流的应用程序具有不同标识符的类，则会抛出`java.io.InvalidClassException`。当这种情况发生时，意味着应用程序未更新，或者你甚至可以怀疑黑客的恶意行为。该字段必须命名为`serialVersionUID`，如果开发者没有显式添加，序列化运行时将自动生成。以下代码片段展示了一个名为`Singer`的类，其中包含序列化和反序列化方法。


    ```

    package com.apress.bgn.ch11;

    import java.io.*;

    import java.time.LocalDate;

    import java.util.Objects;

    public class Singer implements Serializable {

    private static final long serialVersionUID = 42L;

    private String name;

    private Double rating;

    private LocalDate birthDate;

    public Singer() {

    /* required for deserialization */

    }

    public Singer(String name, Double rating, LocalDate birthDate) {

    this.name = name;

    this.rating = rating;

    this.birthDate = birthDate;

    }

    private void writeObject(ObjectOutputStream out)

    throws IOException {

    out.defaultWriteObject();

    }

    private void readObject(ObjectInputStream in)

    throws IOException, ClassNotFoundException {

    in.defaultReadObject();

    }

    private void readObjectNoData()

    throws ObjectStreamException {

    this.name = "undefined";

    this.rating = 0.0;

    this.birthDate = LocalDate.now();

    }

    @Override

    public String toString() {

    return "Singer{" +

    "name=''" + name + ''\” +

    ", rating=" + rating +

    ", birthDate=" + birthDate +

    ''}'';

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o == null || getClass() != o.getClass()) return false;

    Singer singer = (Singer) o;

    return Objects.equals(name, singer.name) &&

    Objects.equals(rating, singer.rating) &&

    Objects.equals(birthDate, singer.birthDate);

    }

    @Override

    public int hashCode() {

    return Objects.hash(name, rating, birthDate);

    }

    }

    ```


    现在我们有了这个类，让我们实例化它，序列化它，将其保存到文件中，然后将文件内容反序列化为另一个对象，并与初始对象进行比较。


    ```

    package com.apress.bgn.ch11;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.*;

    import java.time.LocalDate;

    import java.time.Month;

    public class SerializationDemo {

    private static final Logger log =

    LoggerFactory.getLogger(SerializationDemo.class);

    public static void main(String... args) throws ClassNotFoundException {

    LocalDate johnBd = LocalDate.of(1977, Month.OCTOBER, 16);

    Singer john = new Singer("John Mayer", 5.0, johnBd);

    File file = new File(

    "chapter11/serialization/src/main/resources/output/john.txt");

    try (ObjectOutputStream out =

    new ObjectOutputStream(new FileOutputStream(file))){

    out.writeObject(john);

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    try(ObjectInputStream in =

    new ObjectInputStream(new FileInputStream(file))){

    Singer copyOfJohn = (Singer) in.readObject();

    log.info("Are objects equal? {}", copyOfJohn.equals(john));

    log.info("--> {}", copyOfJohn.toString());

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    }

    }

    ```


    当代码运行时，一切按预期工作；`writeObject`和`readObject`分别由`ObjectOutputStream`和`ObjectInputStream`调用。如果你想测试它们是否被调用，可以添加日志记录，或者在它们内部设置断点并以调试模式运行程序。如果你打开`john.txt`文件，你将无法理解太多内容。其中写入的文本意义不大，因为它是二进制原始数据。如果你打开该文件，可能会看到类似图[11-6](#463938_1_En_11_Chapter.xhtml#Fig6)所示的内容。


