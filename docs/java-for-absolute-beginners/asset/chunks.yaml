    ### 引用数据类型


    Java 中有四种**引用类型**：


    *   类类型

    *   接口类型

    *   枚举类型

    *   数组类型


    引用类型与基本类型不同，因为这些类型是可实例化的（接口除外）。这些类型的对象通过调用构造器创建，而这类类型的变量是对存储在堆中的对象的引用。由于引用也存储在栈上，即使我们修改之前的代码来使用引用，其行为也是相同的。让我们引入一个名为
    `IntContainer` 的类，其唯一目的是将基本类型值包装成对象。


    ```

    package com.apress.bgn.ch5;

    public class IntContainer {

    private int value;

    public IntContainer(int value) {

    this.value = value;

    }

    public int getValue() {

    return value;

    }

    public void setValue(int value) {

    this.value  =  value;

    }

    }

    ```


    现在，我们创建两个此类型的对象以及它们的两个引用，并重写 `swap` 方法。


    ```

    package com.apress.bgn.ch5;

    public class ReferencesDemo {

    public static void main(String... args) {

    IntContainer k = new IntContainer(42);

    IntContainer q = new IntContainer(44);

    swap(k,q);

    System.out.println("k = " + k.getValue());

    System.out.println("q = " + q.getValue());

    }

    static void swap(IntContainer a, IntContainer b) {

    IntContainer temp = a;

    a = b;

    b = temp;

    }

    }

    ```


    如果我们运行 `main(..)` 方法，你会注意到我们仍然得到


    ```

    k = 42

    q = 44

    ```


    这该如何解释？同样地，Java 仍然使用相同的按值传递参数的方式，只是这次传递的是引用的值。图 5-6 描述了在执行上述代码时，JVM 管理的内存中发生的情况。


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig6_HTML.jpg](img/463938_1_En_5_Fig6_HTML.jpg)


    图 5-6


    Java 按值传递引用参数


    类似地，在 `swap(..)` 方法体内，对象的引用被互换，但这不会影响 `k` 和 `q` 引用，也不会影响它们在堆中指向的对象。要真正交换值，我们需要通过使用一个新对象来交换对象的内容。请看下面
    `swap(..)` 方法的新版本。


    ```

    package com.apress.bgn.ch5;

    public class ReferencesDemo {

    public static void main(String... args) {

    IntContainer k = new IntContainer(42);

    IntContainer q = new IntContainer(44);

    swap(k,q);

    System.out.println("k = " + k.getValue());

    System.out.println("q = " + q.getValue());

    }

    static void swap(IntContainer a, IntContainer b) {

    IntContainer temp = new IntContainer(a.getValue());

    a.setValue(b.getValue());

    b.setValue(temp.getValue());

    }

    }

    ```


    通过使用 setter 和 getter，我们交换了对象的值，因为方法体内从未修改过引用。图 5-7 描述了在执行上述代码片段期间内存中发生的情况。


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig7_HTML.jpg](img/463938_1_En_5_Fig7_HTML.jpg)


    图 5-7


    Java 按值传递引用参数，交换对象内容


    也许这个例子引入得太早了，但它是必要的，这样你就能尽早目睹基本类型和引用类型之间的主要区别。我们将在总结中列出所有区别，在此之前，让我们先介绍 Java 中最常用的数据类型。


    ## Java 基本类型


    基本类型是 Java 中的基本数据类型。这种类型的变量可以通过直接赋值该类型的值来创建，因此它们不需要实例化。（由于这些类型没有类作为支撑，这样做会相当困难）Java
    中有 8 种基本类型，其中六种用于表示数字，一种用于表示字符，一种用于表示布尔值。基本类型是 Java 语言预定义的，并且它们的名称是保留关键字。基本变量只能具有为该类型预定义的区间或数据集内的值。当在实例化时声明为类的字段时，会为该字段分配一个特定于该类型的默认值。基本值不与其他基本值共享状态。


    大多数 Java 教程会首先介绍数值类型，但本书从非数值类型开始。


    ### 布尔类型


    此类型的变量只能具有两个可接受值之一：`true` 和 `false`。这种类型的变量用于条件判断中，以决定操作流程。值 `true` 和 `false`
    本身就是保留关键字。布尔变量的**默认值**是 `false`。


    另一个观察点：当一个字段是 `boolean` 类型时，它的 getter 方法具有不同的语法。它不以 `get` 开头，而是以 `is` 开头。考虑到布尔值的用途，这是有道理的。它们对只有两个值的属性进行建模。例如，假设我们正在编写一个类来对转换过程进行建模。一个布尔字段将过程状态标记为已完成或仍在进行中。如果字段名是
    `done`，那么名为 `getDone()` 的 getter 方法会非常不直观且愚蠢，但名为 `isDone()` 的 getter 方法则恰恰相反。让我们编写这个类，并添加一个
    main 方法来测试 `done` 字段的默认值。


    ```

    package com.apress.bgn.ch5;

    public class ConvertProcess {

    /* 其他字段和方法 */

    private boolean done;

    public boolean isDone() {

    return done;

    }

    public void setDone(boolean done) {

    this.done = done;

    }

    public static void main(String... args) {

    ConvertProcess cp = new ConvertProcess();

    System.out.println("默认值 = " + cp.isDone());

    }

    }

    ```


    正如预期的那样，输出的结果是


    ```

    默认值 = false

    ```


    布尔类型与任何其他基本类型都不兼容，通过简单赋值（使用 =）将 `boolean` 值赋给 `int` 变量是不可能的。显式转换也是不可能的。因此，编写类似下面的代码会导致编译错误。


    ```

    boolean f = false;

    int fi = (int) f;

    ```


    我们将在**第** 6 章中添加更多关于此类型的信息。


    ### char 类型


    char 类型表示字符。其值是表示 UTF-16 代码单元的 16 位无符号整数。char 变量可能值的区间是：从 `''\u0000''` 到 `''\uffff''`（包含两端），作为数字这意味着：从
    0 到 65535。这意味着我们可以尝试打印所有值的集合。由于字符的表示是数字化的，这意味着我们可以将区间内的 `int` 值转换为 `char` 值。以下代码片段打印了
    `char` 区间的所有数值及其对应的字符。


    ```

    package com.apress.bgn.ch5;

    public class CharLister {

    public static void main(String... args) {

    for (int i = 0; i < 65536; ++i ) {

    char c = (char) i;

    System.out.println("c[" + i + "]=" + c);

    }

    }

    }

    ```


    ### ！


    `for` 循环语句打印的最后一个 `char` 值是 65535。值 65536 被用作上限最大值。所以，如果 `i=65536`，则不会打印任何内容，并且语句的执行结束。`for`
    循环将在第 8 章：控制流程中详细讨论。


    根据操作系统的不同，某些字符可能不受支持，因此它们不会显示，或者被替换为无效字符。空白字符也是如此。


    如果你认为用于表示字符的区间太大，滚动控制台你就会明白为什么。UTF-16 字符集包含所有数字字符、所有分隔符、中文、阿拉伯语字符以及更多符号。^(⁵⁸)

