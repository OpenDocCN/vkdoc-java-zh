    is not possible, because this class is in a different package.


    ```

    package com.apress.bgn.ch0;

    public class Base {

    ...

    }

    class HiddenBase{

    // you cannot see me outside the package

    }

    ```


    Sure, you can write the code, but the Java compiler will not compile it, and there
    is no bytecode to execute. Also, smart Java editors very clearly show you the
    error of your ways, by making your code red and refusing to provide any code assistance
    when writing it. Figure [3-6](#463938_1_En_3_Chapter.xhtml#Fig6) depicts how IntelliJ
    IDEA tries to tell me that I’m doing something wrong in trying to access a `package-private`
    class.


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig6_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    IntelliJ IDEA hinting that access to a package-private class leads to a compilation
    error


    In the same figure, the file containing the two classes is depicted in a rectangle
    to attract your attention on how the editor is making it obvious that the two
    classes are defined in the same Java file.


    ### !


    For now, take this affirmation and let it sink in: **a class with no access modifier
    is visible to all classes in the same package**.


    Inside a class, the class members are defined: fields and methods.^([^(41)](#fn41))
    Access modifiers can be applied to the class members as well, and at member-level,
    two more modifiers can be applied: `private` and `protected`. At member-level,
    the access modifiers have the following affects.


    *   `public`: The same as at top level, the member can be accessed from everywhere.


    *   `private`: The member can only be accessed from within its own class.


    *   `protected`: The member can only be accessed from within its own package or
    by any subclass^([^(42)](#fn42)) of its class in another package.


    *   `none`: The member can only be accessed from within its own package.


    If it seems complicated, it’s only until you begin writing code and getting used
    to it. On the official Oracle documentation page, there is a table with the visibility
    of members, depicted here in this book as Table [3-1](#463938_1_En_3_Chapter.xhtml#Tab1).^([^(43)](#fn43))


    Table 3-1


    Member-Level Accessors


    | Modifier | Class | Package | Subclass | World |

    | --- | --- | --- | --- | --- |

    | public | Yes | Yes | Yes | Yes |

    | protected | Yes | Yes | Yes | No |

    | none (also referred to as default/package-private) | Yes | Yes | No | No |

    | private | Yes | No | No | No |


    You will probably come back to this table once or twice after you start writing
    Java code. Everything in this table is still valid after the introduction of modules,
    but only once you properly configure module access, of course.![../images/463938_1_En_3_Chapter/463938_1_En_3_Figa_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Figa_HTML.jpg)


    ### Introducing Modules


    Starting with Java 9, a new concept was introduced: **modules**. They are used
    to group and encapsulate packages. Implementation of this new concept took more
    than ten years. The discussion about modules started in 2005, and it was proposed
    to be implemented for Java 7\. Under the name **Project Jigsaw** an exploratory
    phase started in 2008\. Java developers hoped a modular JDK would be available
    with Java 8, but it was made possible in Java 9, after three years of work (and
    almost seven year of analysis). Apparently, this is why the official release date
    for Java 9 was postponed to September 2017.^([^(44)](#fn44))


    Modules represent a new way to aggregate packages. A **module** is a way to group
    them and configure more granulated access to package contents.


    A **module** is a uniquely named, reusable group of packages and resources (XML
    files) described by a file named `module-info.java` . This file contains the following
    information:


    *   the module’s name


    *   the module’s dependencies (that is, other modules this module depends on)


    *   the packages it explicitly makes available to other modules (all other packages
    in the module are implicitly unavailable to other modules)


    *   the services it offers


    *   the services it consumes


    *   to what other modules it allows reflection


    *   native code


    *   resources


    *   configuration data


    In theory, module naming resembles package naming and follows the reversed-domain-name
    convention. In practice, make sure that the module name does not contain any numbers
    and that it reveals clearly what its purpose is. The `module-info.java` file is
    compiled into a **module descriptor** , which is a file named `module-info.class`
    that is packed with classes into a plain old JAR file. The location of the file
    is in the root sources directory, outside of any package. For the example introduced
    earlier, a `module-info.java` was added and the new project structure is depicted
    in Figure [3-7](#463938_1_En_3_Chapter.xhtml#Fig7).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig7_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Structure of a Java 9 project


    As any file with the `*.java` extension, the `module-info.java` gets compiled
    into a `*.class` file. As the module declaration is not a part of Java object
    types declaration, `module` is not a Java keyword, so it can still be used when
    writing code for Java object types. For `package`, the situation is different,
    as every Java object type declaration must start with a package declaration. Take
    a look at the `SimpleReader` class , declared as follows.


    ```

    package com.apress.bgn.ch3;

    public class SimpleReader {

    private String source;

    ...

    }

    ```


    So, what does this actually mean? Where is the module and what is it? Well, in
    simple projects that are made of one root directory with sources, modules do not
    have to physically delimit or organize sources. ^([^(45)](#fn45)) They are defined
    by the contents of the `module-info.java` file. So, starting with Java 9, what
    is shown in Figure [3-4](#463938_1_En_3_Chapter.xhtml#Fig4) evolves into Figure
    [3-8](#463938_1_En_3_Chapter.xhtml#Fig8).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig8_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Java building blocks, starting with Java 9


    In Figure [3-8](#463938_1_En_3_Chapter.xhtml#Fig8), there is no need to create
    a directory for the module in JAR1 and JAR2\. For JAR3, there are two modules
    archived in the same JAR; in this case, we need to explicitly separate their sources.
    The reason for this is the need to have two `module-info.java` files, and obviously
    no operating system allows two files in the same directory to have the same name.
    An example of such a project is covered in the **Appendix** , which is available
    as part of the book’s source code download ([https://​github.​com/​apress/​java-for-absolute-beginners](https://github.com/apress/java-for-absolute-beginners)).'
