    Most functions that you remember from the `Stream` API have been implemented for
    a reactive usage in Project Reactor, so if this code seems familiar, this is the
    reason why. As proven with the code samples in this section, programming using
    reactive streams is way more practical using the Project Reactor API, so if you
    are ever in need of a reactive library you could consider this one first. You
    can find the official documentation at [`http://projectreactor.io/docs/core/milestone/reference/`](http://projectreactor.io/docs/core/milestone/reference/),
    it’s good and full of examples. If ever Oracle decides to provide their own rich
    API for programming reactive applications using reactive streams, they will probably
    be too late to the table.


    ## Summary


    Reactive programming is not an easy topic, but it does seem to be the future of
    programming. What you have to keep in mind is that reactive implementations are
    quite useless with implementations that are not reactive. I mean, there is no
    use to design and use reactive components with non-reactive components, because
    you might introduce failure points and slow things down. For example, if you are
    using an Oracle database, there is no point in defining a repository class that
    returns elements using reactive streams, because an Oracle database does not support
    reactive access. So you add a reactive layer that provides extra implementation,
    because there are no real benefits in this case. But if your database of choice
    is MongoDB, you can use reactive programming confidently, because MongoDB databases
    support reactive access. Also, if you are building a web application with a ReactJS
    or angular interface, you can design your controller classes to provide data reactively
    to be displayed by the interface.


    This chapter covered


    *   reactive programming

    *   the behavior of reactive streams

    *   JDK reactive streams support

    *   the Reactive Streams Technology Compatibility Kit

    *   Project Reactor components


    ## Footnotes


    13. Garbage Collection


    When executing Java code, objects are created, used and discarded repeatedly from
    memory. The process through which unused Java objects are discarded is called
    **memory management**, but is most commonly known as **garbage collection (GC)**.
    garbage collection was mentioned in **Chapter** [ **5** ](#463938_1_En_5_Chapter.xhtml)
    as it was needed for explaining the difference between primitive and reference
    types, but in this chapter we go deep *under the hood* of the JVM to resolve yet
    another mystery of a running Java application. When the Java garbage collector
    does its job properly, the memory is cleaned up, before new objects are created
    and it does not fill up, so you could say that the memory allocated to a program
    is *recycled*. Programs of low complexity, like the ones we’ve been writing so
    far do not require that much memory to function, but depending on their design
    (remember recursivity?) they could end up using more memory than it is available
    to them. In Java, the garbage collector runs automatically. In more low level
    languages, like **C** there is no automatic memory management, and the developer
    is responsible for writing the code to allocate memory as needed, and deallocate
    it when it is no longer needed. Although it seems practical to have automatic
    memory management, the garbage collector can be a problem if managed incorrectly.
    So this chapter provides enough information about the garbage collector to make
    sure it is used wisely, and when problems arise, at least you have a good place
    to start solving them. Although some ways to tune the garbage collector will be
    covered in this chapter introduced, keep in mind that garbage collection tuning
    should not be necessary, a program should be written in such a way that creates
    only objects that are needed to perform its function and references are managed
    correctly, estimations should be done before the application is put into production
    and the maximum amount of memory needed by it should be known and configured before
    that. If the memory allocated to a Java program is not enough, there is usually
    something rotten in the implementation.


    ### Garbage Collection Basics


    The Java automatic garbage collection is one of the major features of the of the
    Java Programming language. The JVM is a virtual machine used to execute Java programs.
    As the Java programs uses resources of the system the JVM is running on top of,
    it has to have a way to release those resources safely. This job is done by the
    garbage collector. To understand the garbage collector, we have to take a look
    at the JVM architecture.'
