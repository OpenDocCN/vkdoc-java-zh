    ```


    Using the `@WebServlet` annotation , we no longer need to have properties where
    we store the servlet name and URL pattern, but the Tomcat context needs to be
    modified a little to tell it to scan for classes annotated with `@WebServlet`.
    So, instantiating the servlet explicitly is no longer necessary. Neither is calling
    `tomcat.addServlet(..)` and `context.addServletMapping(..)`, because adding the
    servlet to the application context and mapping it is done automatically using
    the information provided by the `@WebServlet` annotation. But we do have to define
    where the compiled servlet classes are by declaring an `WebResourceSet` instance
    and adding it to the context resources.


    ```

    import org.apache.catalina.Context;

    import org.apache.catalina.WebResourceRoot;

    import org.apache.catalina.startup.Tomcat;

    import org.apache.catalina.webresources.DirResourceSet;

    import org.apache.catalina.webresources.StandardRoot;

    import java.io.File;

    public class WebDemo {

    public static void main(String... args) throws Exception {

    Tomcat tomcat = new Tomcat();

    tomcat.setBaseDir("chapter10/web-app/out");

    tomcat.setPort(8080);

    String contextPath = "/demo";

    String docBase = new File(".").getAbsolutePath();

    Context context = tomcat.addContext(contextPath, docBase);

    File webInfClasses = new File(root.getAbsolutePath(), "production/classes");

    WebResourceRoot resources = new StandardRoot(context);

    WebResourceSet resourceSet;

    if (webInfClasses.exists()) {

    resourceSet = new DirResourceSet(resources,

    "/WEB-INF/classes", webInfClasses.getAbsolutePath(), "/");

    System.out.println("loading WEB-INF resources from as ''"

    + webInfClasses.getAbsolutePath() + "''");

    } else {

    resourceSet = new EmptyResourceSet(resources);

    }

    resources.addPreResources(resourceSet);

    context.setResources(resources);

    tomcat.start();

    tomcat.getServer().await();

    }

    }

    ```


    So this is how we handle servlets, but how do we handle JSP pages using an embedded
    server? First we have to create a directory where the JSP pages are. So the structure
    of our project must change as depicted in Figure [10-14](#463938_1_En_10_Chapter.xhtml#Fig14).


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig14_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Web application structure change


    As you can see, the `resource/dynamic` directory was added to place the JSP pages
    in. As our application is getting complicated it is time to clean it up a little
    and make paths relative to the execution path of the application, which is the
    `out` directory. So, we introduce the following class.


    ```

    package com.apress.bgn.ch10;

    import java.io.File;

    public class LocationUtility {

    public static File getRootFolder() throws Exception {

    String executionPath = WebDemo.class.getProtectionDomain()

    .getCodeSource().getLocation().toURI().getPath().replaceAll("\\\\", "/");

    int lastIndexOf = executionPath.lastIndexOf("/production/");

    return lastIndexOf < 0 ? new File("") :

    new File(executionPath.substring(0, lastIndexOf));

    }

    }

    ```


    We now know that when IntelliJ IDEA compiles Gradle applications it creates under
    the `out` directory a directory named `production` containing compiled Java classes
    and resources, properly organized each in their own directory. So that is why,
    the root directory of the execution of our application is computed relative to
    that directory. As we’ve added an `index.jsp` page, we have to add a different
    URL pattern for `SampleServlet` and since we also added relative paths, the class
    code changes a little.'
