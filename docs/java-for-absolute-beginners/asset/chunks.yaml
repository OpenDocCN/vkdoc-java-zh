- fmt: '### Constructors


    Now we’ve done it. We can no longer use `human.name` without the compiler complaining
    about it. But still, it is annoying to call all of those setters to set the properties;
    something should be done about that. Remember the implicit constructor? Well,
    let’s create an explicit one that has parameters for each of the fields we are
    interested in.


    ```

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public Human(String name, int age, float height) {

    this.name = name;

    this.age =  age;

    this.height   =   height;

    }

    ...

    }

    ```


    In the preceding example, you can see that the constructor does not include a
    `return` statement, even if the result of calling a constructor is the creation
    of an object. Constructors are different from methods in that way. By declaring
    an explicit constructor, the default constructor is no longer generated. So, creating
    a `Human` instance by calling the default constructor does not work anymore; the
    code no longer compiles because the default constructor is no longer generated.


    ```

    Human human = new Human();

    ```


    To create a `Human` instance, we now have to call the new constructor and provide
    proper arguments in place of the parameters, having the same types as declared.


    ```

    Human human = new Human("John", 40, 1.91f);

    ```


    But what if we do not want to be forced to set all fields using this constructor?
    It’s simple, we define another with only the parameters that we are interested
    in. Let’s define a constructor that only sets the name and the age for a `Human`
    instance.


    ```

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public Human(String name, int age) {

    this.name = name;

    this.age = age;

    }

    public Human(String name, int age, float height) {

    this.name = name;

    this.age = age;

    this.height = height;

    }

    ...

    }

    ```


    And this is where we stumble upon an OOP principle called **polymorphism**. The
    term is Greek and translates to *one name, many forms*. Polymorphism manifests
    itself by having multiple methods all with the same name, but slightly different
    functionality. There are two basic types of polymorphism: **overriding**, also
    called **run-time polymorphism**, and **overloading**, which is referred to as
    **compile-time polymorphism**. The second type of polymorphism applies to the
    preceding constructors, because we have two of them, one with a different set
    of parameters that looks like it is an extension of the simpler one.


    So, we have some code duplication in the previous example, and there is a common
    sense programming principle called **DRY** (Don’t Repeat Yourself!) that the following
    example clearly defies. So, let’s fix that by using the `this` keyword.


    ```

    public class Human {

    static final int LIFESPAN = 100;

    private  String  name;

    private int age;

    private float height;

    public Human(String name, int age) {

    this.name = name;

    this.age  =  age;

    }

    public Human(String name, int age, float height) {

    this(name, age);

    this.height  =  height;

    }

    ...

    }

    ```


    Yes, constructors can call each other by using `this(...)`. So now, we can use
    both constructors to create `Human` instances. If we use the one that does not
    set the height, the `height` field is implicitly initialized with the default
    value for type `float`.


    Now, our class is generic; we could even say that it models a `Human` class in
    an abstract way. If we were to try to model humans with certain skill sets or
    abilities, we must enrich this class. Let’s say we want to model musicians and
    actors. This means we need to create two new classes. The `Musician` class is
    depicted in the following; getters and setters for the fields are skipped.


    ```

    public class Musician {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    private String musicSchool;

    private  String  genre;

    private List songs;

    ...

    }

    ```


    The `Actor` class is depicted next; getters and setters for the fields are also
    skipped.


    ```

    public class Actor {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    private  String  actingSchool;

    private List films;

    ...

    }

    ```


    There are more than a few common elements between the two classes. One of the
    clean coding principles requires developers to avoid code redundancy. This can
    be done by designing the classes by following two OOP principles: **inheritance**
    and **abstraction**.'
  raw: '#### Constructors


    Now we’ve done it. We can no longer use `human.name` without the compiler complaining
    about it. But still, it is annoying to call all of those setters to set the properties;
    something should be done about that. Remember the implicit constructor? Well,
    let’s create an explicit one that has parameters for each of the fields we are
    interested in.


    ```

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public Human(String name, int age, float height) {

    this.name = name;

    this.age =  age;

    this.height   =   height;

    }

    ...

    }

    ```


    In the preceding example, you can see that the constructor does not include a
    `return` statement , even if the result of calling a constructor is the creation
    of an object. Constructors are different from methods in that way. By declaring
    an explicit constructor, the default constructor is no longer generated. So, creating
    a `Human` instance by calling the default constructor does not work anymore; the
    code no longer compiles because the default constructor is no longer generated.


    ```

    Human human = new Human();

    ```


    To create a `Human` instance , we now have to call the new constructor and provide
    proper arguments in place of the parameters, having the same types as declared.


    ```

    Human human = new Human("John", 40, 1.91f);

    ```


    But what if we do not want to be forced to set all fields using this constructor?
    It’s simple, we define another with only the parameters that we are interested
    in. Let’s define a constructor that only sets the name and the age for a `Human`
    instance .


    ```

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public Human(String name, int age) {

    this.name = name;

    this.age = age;

    }

    public Human(String name, int age, float height) {

    this.name = name;

    this.age = age;

    this.height = height;

    }

    ...

    }

    ```


