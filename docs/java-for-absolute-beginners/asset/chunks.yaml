- fmt: '### Reference Data Types


    There are four **reference types** in Java:


    - class types

    - interface types

    - enums

    - array types


    Reference types are different from primitive types as these types are instantiable
    (except interfaces). Objects of these types are created by calling constructors,
    and variables of these types are references to objects stored in the heap. Because
    the references are stored on the stack as well, even if we modify the previous
    code to use references, the behavior is the same. Let’s introduce a class named
    `IntContainer`, whose only purpose is to wrap primitive values into objects.


    ```

    package com.apress.bgn.ch5;

    public class IntContainer {

    private int value;

    public IntContainer(int value) {

    this.value = value;

    }

    public int getValue() {

    return value;

    }

    public void setValue(int value) {

    this.value  =  value;

    }

    }

    ```


    And now we create two objects of this type and two references for them and rewrite
    the `swap` method.


    ```

    package com.apress.bgn.ch5;

    public class ReferencesDemo {

    public static void main(String... args) {

    IntContainer k = new IntContainer(42);

    IntContainer q = new IntContainer(44);

    swap(k,q);

    System.out.println("k = " + k.getValue());

    System.out.println("q = " + q.getValue());

    }

    static void swap(IntContainer a, IntContainer b) {

    IntContainer temp = a;

    a = b;

    b = temp;

    }

    }

    ```


    If we run the `main(..)` method, you notice that we still get


    ```

    k = 42

    q = 44

    ```


    How can this be explained? In the same manner, Java still uses the same style
    of arguments passing by value, only this time, the value of the reference is the
    one passed. Figure [5-6](#463938_1_En_5_Chapter.xhtml#Fig6) depicts what is going
    on in the memory managed by the JVM for the execution of the previous code.


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig6_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Java passing reference arguments by value


    In a similar manner, the references to the objects are interchanged in the body
    of the `swap(..)` method, but they have no effect on the `k` and `q` references,
    and neither on the objects they point to in the heap. To really exchange the values,
    we need to exchange the content of the objects by using a new object. Look at
    the following new version of the `swap(..)` method.


    ```

    package com.apress.bgn.ch5;

    public class ReferencesDemo {

    public static void main(String... args) {

    IntContainer k = new IntContainer(42);

    IntContainer q = new IntContainer(44);

    swap(k,q);

    System.out.println("k = " + k.getValue());

    System.out.println("q = " + q.getValue());

    }

    static void swap(IntContainer a, IntContainer b) {

    IntContainer temp = new IntContainer(a.getValue());

    a.setValue(b.getValue());

    b.setValue(temp.getValue());

    }

    }

    ```


    By making use of setters and getters, we exchange the values of the objects, because
    the references are never modified inside the body of the method. Figure [5-7](#463938_1_En_5_Chapter.xhtml#Fig7)
    depicts what happens within the memory during execution of the previous piece
    of code.


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig7_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Java passing reference arguments by value, swapping object contents


    Maybe this example was introduced too early, but it was needed so you could witness
    as early as possible the major differences between primitive and reference types.
    We’ll list all the differences in the summary, until then, let’s introduce the
    most used data types in Java.


    ## Java Primitive Types


    Primitive types are the basic types of data in Java. Variables of this type can
    be created by directly assigning values of that type, so they are not instantiated.
    (That would be pretty difficult to do since these types are not backed up by a
    class) In Java there are 8 types of primitive types, six of them used to represent
    numbers, one to represent characters and one to represent boolean values. Primitive
    types are predefined into the Java language and they have names that are reserved
    keywords. Primitive variables can have values only in the interval or dataset
    that is predefined for that type. When declared as fields of a class at instantiation
    time, a default value specific to the type is assigned to the field. Primitive
    values do not share state with other primitive values.


    Most Java tutorials introduce the numeric types first, but this book starts with
    the non-numerics.


    ### The Boolean Type


    Variables of this type can have only one of the two accepted values: `true` and
    `false`. This type of variable is used in conditions to decide a course of action.
    The values `true` and `false` are themselves reserved keywords. **Default value**
    for a boolean variable is `false`.


    Another observation: when a field is of type `boolean` the getter for it has a
    different syntax. It is not prefixed with `get` but with `is`. This makes sense
    because of what boolean values are used for. They model properties with only two
    values. For example, let’s say we are writing a class to model a conversion process.
    A boolean field marks the process state as done or still in process. If the name
    of the field is `done`, a getter named `getDone()` would be pretty unintuitive
    and stupid, but one named `isDone()` would be quite the opposite. Let’s write
    that class and also add a main method to test the default value of the `done`
    field.


    ```

    package com.apress.bgn.ch5;

    public class ConvertProcess {

    /* other fields and methods */

    private boolean done;

    public boolean isDone() {

    return done;

    }

    public void setDone(boolean done) {

    this.done = done;

    }

    public static void main(String... args) {

    ConvertProcess cp = new ConvertProcess();

    System.out.println("Default value = " + cp.isDone());

    }

    }

    ```


    And as expected, the output printed is


    ```

    Default value = false

    ```


    The boolean type is not compatible with any other primitive type, assigning a
    `boolean` value to an `int` variable by simple assignment (using `=`) is not possible.
    Explicit conversion is not possible either. So, writing something like the following
    causes a compilation error.


    ```

    boolean f = false;

    int fi = (int) f;

    ```


    We’ll be adding more information about this type in **Chapter** [6](#463938_1_En_6_Chapter.xhtml).


    ### The char Type


    The `char` type represents characters. The values are 16-bit unsigned integers
    representing UTF-16 code units. The interval of the possible values for `char`
    variables is: from `''\u0000''` to `''\uffff''` inclusive, as numbers this means:
    from 0 to 65535. This means that we can try to print the full set of values. As
    the representation of the characters is numeric, this means we can convert `int`
    values from interval to `char` values. The following code snippet, prints all
    the numeric values of the `char` interval and their matching characters.


    ```

    package com.apress.bgn.ch5;

    public class CharLister {

    public static void main(String... args) {

    for (int i = 0; i < 65536; ++i ) {

    char c = (char) i;

    System.out.println("c[" + i + "]=" + c);

    }

    }

    }

    ```


    ### !


    The last `char` value the `for` loop statement prints is 65535. The 65536 value
    is used as an upper maximum value. So, if `i = 65336`, then nothing gets printed
    and the execution of the statement ends. The `for` loop is covered in detail in
    Chapter [8](#463938_1_En_8_Chapter.xhtml): Controlling the flow.


    Depending on the operating system, some of the characters might not be supported,
    so they won’t be displayed, or they are replaced with a bogus character. The same
    goes for whitespace characters.


    If you think the interval dedicated to represent characters is too big, scroll
    the console and you will understand why. The UTF-16 character set contains all
    numbers as characters, all separators, characters from Chinese, Arabic and a lot
    more symbols.^([^(58)](#fn58))'
