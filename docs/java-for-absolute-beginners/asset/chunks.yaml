    本示例使用的日志具体实现称为 Logback^(⁶⁸)，之所以选择它，是因为在 Java 9 引入模块后，它是唯一能与 SLF4J 配合使用的库。Logback
    被视为另一种流行的日志实现 Log4j 的继任者，这很合理，因为创建它的团队也曾参与 Log4j 的开发^(⁶⁹)。Logback 原生实现了 SLF4J，因此无需再添加额外的桥接库。而且它的速度更快，因为
    Logback 的内部实现已被重写，以便在关键执行点上性能更优。在修改我们的类以使用 SLF4J 后，我们只需将 Logback 添加为应用程序的依赖项，并在
    `resources` 目录下添加一个配置文件即可。该配置文件可以用 XML 或 Groovy 编写。标准要求其命名为 `logback.xml`。下面的代码清单展示了本节示例中该文件的内容。


    ```

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n

    ```


    `ch.qos.logback.core.ConsoleAppender` 类用于在控制台写入日志消息，`<pattern>` 元素定义了日志消息的格式。Logback
    可以通过将包名缩写为首字母来格式化完全限定的类名，从而在不丢失信息的情况下实现紧凑的日志记录。这使得 Logback 成为当前 Java 开发世界中最受欢迎的日志实现之一。


    `MergeSort` 类中的日志调用全部被替换为 `log.debug(..)`，因为这些消息是中间过程信息，并非真正的通知性信息，只是应用程序在执行过程中所用对象状态的示例。应用程序的通用日志级别可以通过
    `<root>` 元素设置为所需级别，但也可以使用 `<logger>` 元素为特定类或包设置不同的日志级别。


    因此，如果我们使用之前的配置在类路径上运行 `SortingSlf4jDemo` 类，将会打印出以下内容：


    ```

    19:38:57.950 WARN  c.a.b.c.SortingSlf4jDemo -

    元素 a 不是整数，无法添加到数组中！

    19:38:57.951 WARN  c.a.b.c.SortingSlf4jDemo -

    元素 b 不是整数，无法添加到数组中！

    19:38:57.951 WARN  c.a.b.c.SortingSlf4jDemo -

    元素 ds 不是整数，无法添加到数组中！

    19:38:57.953 DEBUG c.a.b.c.SortingSlf4jDemo - 使用归并排序对数组进行排序：5 3 2 1 4

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[0 4] 5 3 2 1 4

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[0 2] 5 3 2

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[0 1] 5 3

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[0 0] 5

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[1 1] 3

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用合并：[0 1 0],) 3 5

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[2 2] 2

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用合并：[0 2 1],) 2 3 5

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[3 4] 1 4

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[3 3] 1

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[4 4] 4

    19:38:57.954 DEBUG c.a.b.c.a.MergeSort - 调用合并：[3 4 3],) 1 4

    19:38:57.954 DEBUG c.a.b.c.a.MergeSort - 调用合并：[0 4 2],) 1 2 3 4 5

    19:38:57.954 INFO  c.a.b.c.SortingSlf4jDemo - 排序后：1 2 3 4 5

    ```


    完全限定的类名 `com.apress.bgn.ch9.SortingSlf4jDemo` 被缩短为 `c.a.b.c.SortingSlf4jDemo`。


    配置文件可以作为 VM 参数提供给程序，这意味着日志格式可以在外部配置。启动该类时，使用 `-Dlogback.configurationFile=\temp\ext-logback.xml`
    作为 VM 参数。


    Logback 也可以将输出定向到文件；我们只需使用 `ch.qos.logback.core.FileAppender` 类添加配置，并通过在 `<root>`
    配置中添加一个 `<appender>` 元素将输出定向到文件即可。


    ```

    chapter09/logging-slf4j/out/output.log

    true

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n

    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n

    ```


    在这个例子中，我们保留了原始配置，因为我希望向你展示一个同时将日志消息写入两个目标的可行示例。但如果日志文件变得太大而无法打开怎么办？嗯，有一种方法可以解决这个问题。我们可以使用另一个类，它可以配置为在达到设定大小限制时写入一个文件，然后开始写入另一个文件。这个类名为
    `ch.qos.logback.core.rolling.RollingFileAppender`，它需要两个参数：一个实现了 `ch.qos.logback.core.rolling.RollingPolicy`
    类型的实例，它提供写入新日志文件（也称为*滚动*）的功能；以及一个实现了 `ch.qos.logback.core.rolling.TriggeringPolicy`
    类型的实例，它配置触发滚动的条件。


    此外，一个同时实现了这两个接口的类型的单个实例也可以配置日志记录器。滚动日志文件意味着日志文件会根据配置重命名；通常，文件最后访问的日期会被添加到其名称中，然后创建一个新的日志文件，其名称与配置的日志文件名相同（不带任何日期信息）。


    ```

    chapter09/logging-slf4j/out/output.log

    chapter09/logging-slf4j/out/output_%d{yyyy-MM-dd}.%i.log

    10MB

    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n

    ```


    因此，`<file>` 元素配置日志文件的位置和名称。`<rollingPolicy>` 元素使用 `<fileNamePattern>` 配置当日志消息不再写入时日志文件接收的名称。例如，在上面的配置中，`output.log`
    文件会被重命名为 `output_2018-07-22.log`，然后每天创建一个新的 `output.log` 文件。`<timeBasedFileNamingAndTriggeringPolicy>`
    配置在写入新文件之前，`output.log` 文件应该有多大。上面示例中配置的大小是 10 MB。如果日志文件在一天结束前增长到超过 10 MB，该文件会被重命名为
    `output_2018-07-22.1.log`，名称中添加一个索引，并创建一个新的 `output.log`。`<maxHistory>` 设置日志文件的生命周期，在我们的例子中是
    30 天。


    日志记录是一个强大的工具；请确保不要滥用它，因为它可能导致性能问题以及产生大量难以分析有用信息的数据。另一件值得注意的事情是在之前的代码中。`StringBuilder`
    实例被用来构建大的日志消息，这些消息在特定级别打印。如果通过配置禁用了该级别的日志记录会发生什么？如果你猜测即使这些消息没有被记录，创建它们也会消耗时间和内存，那么你是对的。那么，我们该怎么办？SLF4J
    的创建者也考虑到了这一点，并添加了方法来测试某个日志级别是否启用，这些方法可以在包装性能敏感代码的 `if` 语句中使用。这样一来，`SortingSlf4jDemo.main(..)`
    方法就变成了：


    ```

    public static void main(String... args) {

    if (args.length == 0) {

    log.error("没有数据可排序！");

    return;

    }

    int[] arr = getInts(args);

    if (log.isDebugEnabled()) {

    final StringBuilder sb = new StringBuilder(

    "使用归并排序对数组进行排序：");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    final StringBuilder sb2 = new StringBuilder("排序后：");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    ```

