- fmt: '# Java File I/O Improvements


    In Java 1.7, a lot of things were introduced to reduce the boilerplate needed
    to manage files and file contents. One of those things was that all classes used
    to access file contents and that could keep a lock on the file were enriched by
    being declared to implement the `java.io.Closeable` interface that marked resources
    of these types as closable, and a `close()` method is invoked to release resources
    transparently by the JVM before execution ends. Also, in Java 7, *try-with-resources*
    was introduced.


    Making use of all these features, the code can be written like this:


    ```java

    import java.io.BufferedReader;

    import java.io.File;

    import java.io.FileReader;

    ...

    try (BufferedReader reader = new BufferedReader(new FileReader(

    new File("chapter11/read-write-file/src/main/resources/input/vultures.txt")))){

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = reader.readLine()) != null) {

    if(!line.contains("Ooh")) {

    sb.append(line).append("\n");

    }

    }

    log.info("Read with BufferedReader --> {}", sb.toString() );

    } catch (Exception e) {

    log.info("Something went wrong! ", e);

    }

    ```


    Still we have that ugly constructor within constructor thing that is quite ugly.
    Well, Java 8 comes to the rescue by introducing the `Files.newBufferedReader(Path)`
    method. So, the previous code becomes:


    ```java

    import java.io.BufferedReader;

    import java.io.File;

    import java.io.FileReader;

    ...

    File file = new File(

    "chapter11/read-write-file/src/main/resources/input/vultures.txt");

    Path sourceFile = Paths.get(file.toURI());

    try (BufferedReader reader = Files.newBufferedReader(sourceFile)){

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = reader.readLine()) != null) {

    if(!line.contains("Ooh")) {

    sb.append(line).append("\n");

    }

    }

    log.info("Read with BufferedReader --> {}", sb.toString() );

    } catch (Exception e) {

    log.info("Something went wrong! ", e);

    }

    ```


    But still, by using a combination of lambda expressions, we could get a similar
    behavior when reading the file line by line:


    ```java

    List lyricList = Files.readAllLines(Paths.get(file.toURI()),

    StandardCharsets.UTF_8)

    .stream()

    .filter(line -> !line.contains("Ooh"))

    .collect(Collectors.toList());

    ```


    All we would have to do is traverse the lines and add everything to a `StringBuilder`
    and *voila!*, same result, less boilerplate. Or we can write it this way, using
    the `Files.lines(..)` introduced in Java 1.8 and get all contents as a stream:


    ```java

    Stream lyricStream = Files.lines(file.toPath())

    .filter(s -> !s.contains("Ooh"));

    lyricStream.forEach(System.out::println);

    ```


    The `BufferedReader` class is a member of a class group that extends the `Reader`
    class. It is an abstract class used for reading characters streams. The full hierarchy
    is depicted in Figure [11-1](#463938_1_En_11_Chapter.xhtml#Fig1).


    ![../images/463938_1_En_11_Chapter/463938_1_En_11_Fig1_HTML.jpg](images/463938_1_En_11_Chapter/463938_1_En_11_Fig1_HTML.jpg)


    **Figure 11-1** Reader class hierarchy


    Character streams can have different sources, files being the most common. They
    provide sequential access to data stored in the file. The `BufferedReader` does
    not provide support for character encoding, but a `BufferedReader` can be based
    on another `Reader` instance, and the one that provides reading character streams
    and taking encoding into account is `InputStreamReader`. So, we can replace


    ```java

    try (BufferedReader reader = new BufferedReader(new FileReader(

    new File("chapter11/read-write-file/src/main/resources/input/vultures.txt")))){

    ...

    }

    ```


    with


    ```java

    import java.nio.charset.StandardCharsets;

    import java.io.FileInputStream;

    ...

    try (BufferedReader reader = new BufferedReader(new InputStreamReader(

    new FileInputStream(

    "chapter11/read-write-file/src/main/resources/input/vultures.txt"),

    StandardCharsets.UTF_8))){

    ...

    }

    ```


    But starting with Java 1.7, we don’t have to do that anymore because there is
    a version of the `Files.newBufferedReader` that accepts a `Charset` instance as
    argument as well. So, the code can be safely replaced with the following:


    ```java

    try (BufferedReader reader = Files.newBufferedReader(sourceFile,

    StandardCharsets.UTF_8)){

    ...

    }

    ```


    In Java 11, the `Reader` was enriched with the `nullReader()` method, which returns
    a `Reader` instance that does nothing. This was requested by developers for testing
    purposes.


    ## Using InputStream to Read Files


    Classes in the `Reader` family are advanced classes for reading data as text.
    Files are a sequence of bytes, so classes are wrappers around classes in a family
    of classes used for reading byte streams. This becomes clear when trying to use
    the proper character encoding when reading text using the `BufferedReader`, as
    the `InputStreamReader` instance given as argument is based on a `java.io.FileInputStream`
    instance, a type that is a subclass of `java.io.InputStream`.


    The root class of this hierarchy is `java.io.InputStream`, which is depicted in
    Figure [11-2](#463938_1_En_11_Chapter.xhtml#Fig2).


    ![../images/463938_1_En_11_Chapter/463938_1_En_11_Fig2_HTML.jpg](images/463938_1_En_11_Chapter/463938_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2** InputStream class hierarchy


    The `BufferedInputStream` class is equivalent to `BufferedReader` for reading
    streams of bytes. The `System.in` that we used to read user data from the console
    is of this type, and the `Scanner` instance converts the bytes from its buffer
    into user understandable data. When the data we are interested in is not text
    that was stored using Unicode conventions, but raw numeric data (binary files
    such as images, media files, PDF’s, etc.) classes for using streams of bytes are
    more suitable. Just for the purpose of showing you how it’s done, we’ll read the
    contents of the `vultures.txt` file using `FileInputStream`.


    ```java

    package com.apress.bgn.ch11.reading;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    import java.io.FileInputStream;

    import java.io.IOException;

    public class FileInputStreamReadingDemo {

    private static final Logger log =

    LoggerFactory.getLogger(FileInputStreamReadingDemo.class);

    public static void main(String... args) {

    File file = new File(

    "chapter11/read-write-file/src/main/resources/input/vultures.txt");

    try {

    FileInputStream fis = new FileInputStream(file);

    byte[] buffer = new byte[1024];

    StringBuilder sb = new StringBuilder();

    while (fis.read(buffer) != -1) {

    sb.append(new String(buffer));

    buffer = new byte[1024];

    }

    fis.close();

    log.info("Read with FileInputStream --> {}", sb.toString() );

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    }

    }

    ```


    If you run the code, you notice that the expected output is printed in the console;
    but after the text is printed a set of strange characters are printed too. On
    a macOS system, they look like what’s shown in Figure [11-3](#463938_1_En_11_Chapter.xhtml#Fig3).


