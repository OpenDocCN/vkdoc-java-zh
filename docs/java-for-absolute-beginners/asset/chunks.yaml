    ### 使用 Scanner


    `System.in` 变量的类型是 `java.io.InputStream`，这是一个 JDK 特殊类型，所有表示字节输入流的类都扩展了它。这意味着 `System.in`
    可以被包装在任何 `java.io.Reader` 扩展类中，从而将字节读取为可读数据。但真正重要的是一个名为 `Scanner` 的类，它位于 `java.util`
    包中。可以通过调用其构造函数并将 `System.in` 作为参数来创建该类型的实例。`Scanner` 类提供了许多 `next..()` 方法，可用于从控制台读取几乎任何类型。在图
    10-1 中，你可以看到 `next..()` 方法的列表。


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig1_HTML.jpg](img/463938_1_En_10_Fig1_HTML.jpg)


    图 10-1


    用于读取各种数据类型的 Scanner 方法


    使用 `Scanner` 从控制台读取数据的优势在于，读取的值会在可能的情况下自动转换为正确的类型。如果无法转换，则会抛出 `java.util.InputMismatchException`。以下代码的设计目的是让你可以通过输入文本然后输入值来选择要读取的值类型。在代码中，会调用
    `Scanner` 实例的相应方法来读取该值。


    ```

    package com.apress.bgn.ch10;

    import java.io.IOException;

    import java.math.BigInteger;

    import java.util.Scanner;

    public class ReadingFormStdinDemo {

    public static final String EXIT = "exit";

    public static final String HELP = "help";

    public static final String BYTE = "byte";

    public static final String SHORT = "short";

    public static final String INT = "int";

    public static final String BOOLEAN = "bool";

    public static final String DOUBLE = "double";

    public static final String LINE = "line";

    public static final String BIGINT = "bigint";

    public static final String TEXT = "text";

    public static void main(String... args) throws IOException {

    Scanner sc = new Scanner(System.in);

    String help = getHelpString();

    System.out.println(help);

    String input;

    do {

    System.out.print("Enter option: ");

    input = sc.nextLine();

    switch (input) {

    case HELP:

    System.out.println(help);

    break;

    case EXIT:

    System.out.println("Hope you had fun. Buh-bye!");

    break;

    case BYTE:

    byte b = sc.nextByte();

    System.out.println("Nice byte there: " + b);

    sc.nextLine();

    break;

    case SHORT:

    short s = sc.nextShort();

    System.out.println("Nice short there: " + s);

    sc.nextLine();

    break;

    case INT:

    int i = sc.nextInt();

    System.out.println("Nice int there: " + i);

    sc.nextLine();

    break;

    case BOOLEAN:

    boolean bool = sc.nextBoolean();

    System.out.println("Nice boolean there: " + bool);

    sc.nextLine();

    break;

    case DOUBLE:

    double d = sc.nextDouble();

    System.out.println("Nice double there: " + d);

    sc.nextLine();

    break;

    case LINE:

    String line = sc.nextLine();

    System.out.println("Nice line of text there: " + line);

    break;

    case BIGINT:

    BigInteger bi = sc.nextBigInteger();

    System.out.println("Nice big integer there: " + bi);

    sc.nextLine();

    break;

    case TEXT:

    String text = sc.next();

    System.out.println("Nice text there: " + text);

    sc.nextLine();

    break;

    default:

    System.out.println("No idea what you want bruh!");

    }

    } while (!input.equalsIgnoreCase(EXIT));

    }

    private static String getHelpString() {

    return new StringBuilder("This application helps you test various usage of Scanner.
    Enter type to be read next:")

    .append("\n\t help >  displays this help")

    .append("\n\t exit >  leave the application")

    .append("\n\t byte > read a byte")

    .append("\n\t short > read a short")

    .append("\n\t int > read an int")

    .append("\n\t bool > read a boolean")

    .append("\n\t double > read a double")

    .append("\n\t line > read a line of text")

    .append("\n\t bigint > read a BigInteger")

    .append("\n\t text > read a text value").toString();

    }

    }

    ```


    你可能已经注意到，在代码示例中，大多数 scanner 方法都与 `nextLine()` 一起调用，这是因为你提供的每个输入都由实际的标记和一个换行符（你按下
    <enter> 结束输入时产生的字符）组成，在输入下一个值之前，你需要将该字符也从流中取出。</enter>


    让我们稍微测试一下前面的代码。


    ```

    This application helps you test various usage of Scanner. Enter type to be read
    next:

    help >  displays this help

    exit >  leave the application

    byte > read a byte

    short > read a short

    int > read an int

    bool > read a boolean

    double > read a double

    line > read a line of text

    bigint > read a BigInteger

    text > read a text value

    Enter option: byte


    Nice byte there: 12

    Enter option: bool

    true

    Nice boolean there: true

    Enter option: line

    some of us are hardly ever here

    Nice line of text there: some of us are hardly ever here

    Enter option: text

    john

    Nice text there: john

    Enter option: text

    the rest of us are made to disappear...

    Nice text there: the

    Enter option: double

    4.2

    Nice double there: 4.2

    Enter option: int

    AAAA

    Exception in thread "main" java.util.InputMismatchException

    at java.base/java.util.Scanner.throwFor(Scanner.java:939)

    at java.base/java.util.Scanner.next(Scanner.java:1594)

    at java.base/java.util.Scanner.nextInt(Scanner.java:2258)

    at java.base/java.util.Scanner.nextInt(Scanner.java:2212)

    at chapter.ten/com.apress.bgn.ch10.ReadingFormStdinDemo.main(

    ReadingFormStdinDemo.java:78)

    ```


    列表中带下划线的输出代表 `next()` 方法的测试用例。此方法应用于读取单个 `String` 标记。下一个标记会被转换为 `String` 实例，并且该标记在遇到空白字符时结束。这就是为什么在前面的示例中，唯一读取到的文本是
    *the*。


    在最后一种情况下，预期的选项是一个整数值，但输入了 *AAAA*，因此抛出了异常。


    当你需要从控制台重复读取相同类型的值时，可以先预览要读取的值，并在读取之前进行检查，以避免抛出 `InputMismatchException`。针对这种特定场景，每个
    `next..()` 方法都有一个名为 `hasNext...()` 的配对方法。为了演示如何使用这些方法，让我们在前面的代码中添加一个选项来读取一个长整型值列表。


    ```

    ...

    public static final String LONGS = "longs";

    ...

    String input;

    do {

    System.out.print("Enter option: ");

    input = sc.nextLine();

    switch (input) {

    case LONGS:

    List longList = new ArrayList();

    while (sc.hasNextLong()) {

    longList.add(sc.nextLong());

    }

    System.out.println("Nice long list there: " + longList);

    // else all done

    sc.nextLine();

    sc.nextLine();

    break;

    default:

    System.out.println("No idea what you want bruh!");

    }

    } while (!input.equalsIgnoreCase(EXIT));

    ...

    ```


    虽然看起来有点奇怪，但我们需要调用 `nextLine()` 方法两次。一次用于处理无法转换为 `long` 的字符，以便 `while` 循环结束；另一次用于处理行尾字符，以便下一次
    `read..()` 读取的是下一个值的类型。


    `Scanner` 类中还有其他一些方法可用于过滤输入并仅读取所需的标记，但本节列出的方法是你最可能经常使用的。'
- fmt: '### Reading User Data with `java.io.Console`


    The `java.io.Console` class was introduced in Java version 1.6, one version later
    than `Scanner`; it provides methods to access the character-based console device,
    if any, associated with the current Java virtual machine. The methods of class
    `java.io.Console` can thus be also used to write to the console, not only read
    user input. If the JVM is started from a background process or a Java editor,
    the console will not be available, as the editor redirects the standard input
    and output streams to its own window. That is why if we were to write code using
    `Console` we can only test it by running the class or jar from a terminal by calling
    `java ReadingUsingConsoleDemo.class` or `java -jar using-console-1.0-SNAPSHOT.jar`.
    The console of a JVM, if available, is represented in the code by a single instance
    of the `Console` class, which can be obtained by calling `System.console()`.


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig2_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig2_HTML.jpg)


    Figure 10.2


    Console methods


    Figure [10-2](#463938_1_En_10_Chapter.xhtml#Fig2) shows the methods that can be
    called on the `console` instance.


    The `read*(..)` methods are used to read user input from the console and `printf(..)`
    and `format(..)` are used to print text in the console. The special cases here
    are the two `readPassword(..)` methods that allow text to be read from the console,
    but not depicted while it is being written. This means that a Java application
    supporting authentication can be written without any actual user interface. Let’s
    write a sample code to see all that in action.


    ```

    package com.apress.bgn.ch10;

    import java.io.Console;

    import java.util.Calendar;

    import java.util.GregorianCalendar;

    public class ReadingUsingConsoleDemo {

    public static void main(String... args) {

    Console console = System.console();

    if (console == null) {

    System.err.println("No console found.");

    return;

    } else {

    console.writer().print("Hello there! (reply to salute)\n");

    console.flush();

    String hello = console.readLine();

    console.printf("You replied with: ''" + hello + "''\n");

    Calendar calendar = new GregorianCalendar();

    console.format("Today is : %1$tm %1$te,%1$tY\n", calendar);

    char[] passwordChar =

    console.readPassword("Please provide password: ");

    String password =  new String(passwordChar);

    console.printf("Your password starts with ''"

    + password.charAt(0) + "'' and ends with ''"

    + password.charAt(password.length()-1) + "''\n");

    }

    }

    }

    ```


    In the code sample, various methods to read and write data using the console were
    used to show you how they should be used.


    The `console.writer()` returns an instance of `java.io.PrintWriter` that can be
    used to print messages to the console. The catch is that the messages are not
    printed until `console.flush()` is called. This means that more messages can be
    queued up by the `java.io.PrintWriter` instance and printed only when `flush()`
    is called or when its internal buffer is full.


    The `console.format(..)` is called to print a formatted message, in this case
    a `Calendar` instance extracts the current date and print it according to the
    following template: `dd mm,yyyy`. Templates accepted by the `console` methods
    that use formatters are defined in the `java.util.Formatter` class.


    And now the good part: running this code in IntelliJ is not possible, so we have
    to either execute the class or the jar in a terminal. The easiest way is to create
    an executable jar, Gradle creates one when `gradle clean build is executed`, because
    the configuration was setup for the generated jar to be executable and for the
    main class to be `ReadingUsingConsoleDemo`. The jar produced by Gradle can be
    found at `/chapter10/using-console/build/libs/using-console-1.0-SNAPSHOT.jar`.
    Open a terminal in IntelliJ IDEA if you want to by clicking the **Terminal** button,
    and go to the `libs` directory. Once there, execute `java -jar using-console-1.0-SNAPSHOT.jar`
    and have fun. In the following code listing, you can see the entries I used to
    test the program.


    ```

    $ cd chapter10/using-console/build/libs/

    $ java -jar using-console-1.0-SNAPSHOT.jar

    Hello there! (reply to salute)

    Salut!

    You replayed with: ''Salut!''

    Today is : 08 9,2018

    Please provide password:

    Your password starts with ''a'' and ends with ''e''

    ```


    And this is all you need to know about using the console, although once working
    on a real production-ready project, you might rarely need it.


    ## Build Applications Using Swing


    Swing is a GUI widget toolkit for Java. It is part of the JDK starting with version
    1.2 and was developed to provide more pleasant looking and practical components
    for building user applications with complex interfaces with all types of buttons,
    progress bars, selectable lists, and so forth. Swing is based on an early version
    of something called **AWT** short for **Abstract Window Toolkit**, which is the
    original Java user-interface widget toolkit. AWT was pretty basic, and had a set
    of graphical interface components that were available on any platform, this means
    AWT was portable, but this did not imply that AWT code written on one platform
    would work on another, because of the platform specific limitations. AWT components
    depend on the native equivalent components, which is why they were called *heavyweight*
    components. Figure [10-3](#463938_1_En_10_Chapter.xhtml#Fig3) shows a simple Java
    AWT application.


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig3_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Simple Java AWT application


    It’s a simple window that contains a list, a text area and a button. The theme,
    also called the look-and-feel of the application, is the same as the operating
    system it was built on—macOS in the examples in this chapter— and it cannot be
    changed, AWT taps into the OS native graphical interface. If you run the same
    code on a Windows machine, the window will look different, because it will use
    the Windows theme.


    Swing components are built in Java, follow the AWT model, but provide a pluggable
    look-and-feel. Swing is implemented entirely in Java and includes all features
    of AWT, but they are no longer depending on the native GUI, this is why Swing
    components are called *lightweight* components. Swing provides everything AWT
    does and also extends the set of components with higher-level ones such as tree
    view, list box, and tabbed panes. Also, the theme is pluggable and can be easily
    changed. This implies a much better portability than AWT applications, a possibility
    to write more complex application design with components that are not platform
    specific, and because Swing is an alternative to AWT, there was a lot more development
    done.


    When web applications took flight, they were really ugly, because browsers had
    limited capabilities. AWT was introduced to build Java web applications called
    applets. Java applets were small applications that were launched from the browser
    and then executed within the JVM installed on the user’s operating system in a
    process separate from the browser itself. That is why an applet can be run in
    a frame of the web page, a new application window, or standalone tools designed
    for testing applets. Java applets were using the GUI from the operating system,
    which made them prettier than the bulky initial look of HTML at the time. They
    are now deprecated and are scheduled to be removed in Java 11.'
