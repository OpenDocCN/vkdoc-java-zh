    ## Preventing GC from Deleting an Object


    In the two previous sections, we focused on objects that are eligible for garbage
    collection. But in an application, there are objects that should not be discarded
    while the program runs, because they are needed. The most obvious references in
    our classes that were discarded only at the end of the execution were the static
    fields, and they are final, so they cannot be reinitialized.


    ```

    private static final Logger log = LoggerFactory.getLogger(CleanerDemo.class);

    public static final Cleaner cleaner = Cleaner.create();

    private static NameGenerator nameGenerator = new NameGenerator();

    private static final Random random = new Random();

    ```


    The problem with these static values is that they occupy the memory. What if you
    need a big `Map` that contains a dictionary that is not needed when the application
    starts? To solve this, enter the `Singleton` design pattern. The `Singleton` pattern
    is a specific design of a class that ensures the class can only be instantiated
    once during the execution of the program. This is done by hiding the constructor
    (declare it `private`), and declaring a private static reference of the class
    type and a static method to return it. There is more than one way to write a class
    according to the `Singleton` pattern, but the most common way is depicted in the
    next code listing.


    ```

    package com.apress.bgn.ch13.util;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.util.HashMap;

    import java.util.Map;

    public final class SingletonDictionary {

    private static final Logger log =

    LoggerFactory.getLogger(SingletonDictionary.class);

    private static SingletonDictionary instance = new SingletonDictionary();

    private Map  dictionary = new HashMap();

    private SingletonDictionary(){

    // init dictionary

    log.info("Starting to create dictionary: {}", System.currentTimeMillis());

    final NameGenerator keyGen = new NameGenerator(20);

    final NameGenerator valGen = new NameGenerator(200);

    for (int i = 0; i < 100_000; ++i) {

    dictionary.put(keyGen.genName(), valGen.genName());

    }

    log.info("Done creating dictionary: {}", System.currentTimeMillis());

    }

    public synchronized static SingletonDictionary getInstance(){

    return instance;

    }

    }

    ```


    In the code, we simulated a dictionary with 100,000 entries, all generated by
    a modified version of the `NameGenerator` class. Log messages were printed in
    its constructor to be really obvious when the instance is created. There are four
    things you have to remember about the `Singleton` pattern.


    *   The constructor must be `private`, as it should not be called outside the
    class.

    *   The class must contain a static reference to an object of its type that can
    be initialized in place by calling the private constructor.

    *   A method to retrieve this instance must be defined, so it has to be `static`.

    *   The method to retrieve the static instance also has to be `synchronized` so
    no two threads can call it at the same and gain access to the instance, because
    the core idea of the `Singleton` pattern is to allow the class to be instantiated
    only once during the duration of the execution of the program and ensure that
    no concurrent access is allowed, as it might lead to unexpected behavior. Also,
    there is an implementation version that initializes the instance in the method
    that retrieves it, so concurrent access might lead to more than one instance being
    created.


    In a singleton class, a static reference to an instance is created and this static
    reference prevents the garbage collector from cleaning up this instance during
    the execution of the program. To test this, we’ll write a main class that declares
    a `Cleaner` instance, and register a `Cleanable` for the `SingletonDictionary`
    instance. The main method creates a lot of `String` arrays to fill up the memory
    to convince the GC to delete the `SingletonDictionary` instance, and we’ll even
    set its own reference to it to `null`.'
