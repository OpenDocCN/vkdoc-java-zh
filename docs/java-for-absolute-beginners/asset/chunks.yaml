    ### **！**


    在 Linux 上使用 PPA（软件源）安装程序^((19))，JDK 文件会被自动放置到 Linux 系统中应有的位置，并且当新版本发布时，会通过 Linux（全局）更新工具自动更新。但如果你熟练使用
    Linux，可能已经知道这一点了。


    如果你进入该位置，可以查看 JDK 的内容。在图 2-3 中，左侧是 JDK 10 的内容，右侧是 JDK 8 的内容。


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig3_HTML.png](img/463938_1_En_2_Fig3_HTML.png)


    图 2-3


    JDK 8 与 JDK 10 内容对比


    我选择进行这种对比，是因为从 Java 9 开始，JDK 的内容组织方式发生了变化。直到 Java 8，JDK 都包含一个名为 `jre` 的目录，其中包含
    JDK 使用的 Java 运行时环境（JRE）。`lib` 目录包含开发工具所需的 Java 库和支持文件。


    `bin` 目录包含一组用于运行 Java 应用程序的 Java 可执行文件。


    从 Java 9 开始，JRE 不再独立存在于自己的目录中。在图 2-4 中，左侧是 JDK 10 的内容，右侧是 JRE 10 的内容。^((20))


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig4_HTML.png](img/463938_1_En_2_Fig4_HTML.png)


    图 2-4


    JDK 10 与 JRE 内容对比


    所示的目录结构是在 Java 9 发布时引入的。你可以在 Oracle 官方网站上阅读更多相关信息。^((21))


    关于 JDK，你需要了解的最重要的一点是，`bin` 目录包含由链接到镜像的模块定义的可执行文件和命令行启动器，因此 JDK 比 JRE 多出一些这样的文件。其他目录包括
    `jmods` 目录（包含编译后的模块定义）和 `include` 目录（包含 C 语言头文件，用于支持通过 Java 本地接口（JNI）和 Java 虚拟机（JVM）调试接口进行本地代码编程）。


    ## JAVA_HOME 环境变量


    JDK 中最重要的目录是 `bin` 目录，因为必须将该目录添加到系统路径中，这样你才能从任何位置调用 Java 可执行文件。这也使得其他应用程序无需额外配置步骤即可调用它们。大多数用于处理^((22))
    Java 代码的 IDE 都是用 Java 编写的，它们需要知道 JDK 的安装位置才能运行。这通过声明一个名为 `JAVA_HOME` 的环境变量来实现，该变量指向
    JDK 目录的位置。要使 Java 可执行文件能从系统中的任何位置被调用，你必须将 `bin` 目录添加到系统路径中。接下来的三节将解释如何在三种最常见的操作系统上完成此操作。


    ### Windows 上的 JAVA_HOME


    要在 Windows 系统上声明 `JAVA_HOME` 环境变量，你需要打开设置系统变量的对话框。在 Windows 系统中，点击“开始”按钮；在菜单中有一个搜索框（或右键点击“开始”按钮弹出上下文菜单并选择“搜索”）。在其中输入单词
    **environment**（前三个字母就足够了），应该会出现可点击的选项。这些步骤如图 2-5 所示。


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig5_HTML.jpg](img/463938_1_En_2_Fig5_HTML.jpg)


    图 2-5


    用于配置环境变量的 Windows 菜单项


    点击该菜单项后，应会打开一个如图 2-6 所示的窗口。


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig6_HTML.jpg](img/463938_1_En_2_Fig6_HTML.jpg)


    图 2-6


    在 Windows 上设置环境变量的第一个对话框


    点击 **环境变量** 按钮。会打开另一个对话框，分为两个部分：用户变量和系统变量。你关注的是 **系统变量**，因为我们要在那里声明 `JAVA_HOME`。只需点击
    **新建...** 按钮，就会出现一个带有两个文本字段的小对话框；一个要求你输入变量名称——此处为 `JAVA_HOME`，另一个要求你输入路径——此处为
    JDK 的路径。第二个窗口和变量信息弹出对话框如图 2-7 所示。


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig7_HTML.jpg](img/463938_1_En_2_Fig7_HTML.jpg)


    图 2-7


    在 Windows 上将 JAVA_HOME 声明为系统变量


    定义 `JAVA_HOME` 变量后，你需要将可执行文件添加到系统路径中。这可以通过编辑 `Path` 变量来完成。只需从 **系统变量** 列表中选择它，然后点击
    **编辑...** 按钮。从 Windows 10 开始，`Path` 变量的每个部分都显示在不同的行上，因此你可以添加一行，并在其中添加 `%JAVA_HOME%\bin`。这种语法很实用，因为它会从
    `JAVA_HOME` 变量包含的任何位置获取 `bin` 目录的位置。该对话框如图 2-8 所示。


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig8_HTML.jpg](img/463938_1_En_2_Fig8_HTML.jpg)


    图 2-8


    在 Windows 10 上将 JDK 可执行文件目录声明为系统 Path 变量的一部分


    在较旧的 Windows 系统上，`Path` 变量的内容显示在图 2-7 所示的对话框中，因此你必须在 **变量值** 文本字段中添加 `%JAVA_HOME%\bin`
    文本，并使用分号 (;) 将其与现有内容分隔开。


    无论你使用哪种 Windows 系统，都可以通过打开 **命令提示符** 并执行 `set` 命令来检查是否一切设置正确。这会列出所有系统变量及其值。`JAVA_HOME`
    和 `Path` 应该出现在其中，并带有期望的值。对于本节提出的设置，执行 **set** 时的输出如图 2-9 所示。


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig9_HTML.jpg](img/463938_1_En_2_Fig9_HTML.jpg)


    图 2-9


    使用 **set** 命令列出的 Windows 系统变量


    如果你执行上述命令并看到预期的输出，然后在 **命令提示符** 中执行 `java -version`，它会打印出预期的结果。一切就绪。


    ```

    ...> java -version

    java version "10-ea" 2018-03-20

    Java(TM) SE Runtime Environment 18.3 (build 10-ea+42)

    Java HotSpot(TM) 64-Bit Server VM 18.3 (build 10-ea+42, mixed mode)

    ```

    '
- fmt: '### `JAVA_HOME` on macOS


    The location in which JDK is installed is `/Library/Java/JavaVirtualMachines/jdk-10.jdk/Contents/Home`.
    Your `JAVA_HOME` should point to this location. To do this for the current user,
    you can do the following:


    1. In the `/Users/your.user` directory, create a file named `.bash_profile`.

    2. In this file, write the following:


    ```

    export JAVA_HOME=$(/usr/libexec/java_home -v10)

    export PATH=$JAVA_HOME/bin:$PATH

    ```


    On macOS, you can simultaneously install multiple Java versions. You can set which
    version is the one currently used on the system by obtaining the JDK location
    for the desired version by calling the `/usr/libexec/java_home` command and giving
    the Java version you are interested in as the argument. The result of executing
    the command is stored as a value for the `JAVA_HOME` variable.


    On my system, I have JDK 8, 9, 10, and 11 installed. If I execute the command,
    giving an argument to each of the Java versions, look at what happens:


    ```

    $ /usr/libexec/java_home -v11

    /Library/Java/JavaVirtualMachines/jdk-11.jdk/Contents/Home

    $ /usr/libexec/java_home -v10

    /Library/Java/JavaVirtualMachines/jdk-10.jdk/Contents/Home

    $ /usr/libexec/java_home -v9

    /Library/Java/JavaVirtualMachines/jdk-9.0.4.jdk/Contents/Home

    $ /usr/libexec/java_home -v1.8

    /Library/Java/JavaVirtualMachines/jdk1.8.0_162.jdk/Contents/Home

    ```


    Depending of the version given as argument, a different JDK location is returned.
    If you want to test the value of the `JAVA_HOME`, the `echo` command can help
    with that.


    ```

    $ echo $JAVA_HOME

    /Library/Java/JavaVirtualMachines/jdk-10.jdk/Contents/Home

    ```


    The line `export PATH=$JAVA_HOME/bin:$PATH` adds the contents of the `bin` directory
    from the JDK location to the system patch. This means that I could open a terminal
    and execute any of the Java executables under it. For example, I could verify
    that the Java version set as default for my user is the expected one by executing
    `java –version`.


    ```

    $ java -version

    java version "10-ea" 2018-03-20

    Java(TM) SE Runtime Environment 18.3 (build 10-ea+42)

    Java HotSpot(TM) 64-Bit Server VM 18.3 (build 10-ea+42, mixed mode)

    ```


    If you do all of this and `java -version` prints the expected result, you are
    all set.


    ### `JAVA_HOME` on Linux


    **!**


    If you are using Linux proficiently, you probably are using a PPA, so you can
    skip this section. But if you like to control where the JDK is and define your
    own environment variables, keep reading.


    Linux systems are Unix-like operating systems. This is similar to macOS, which
    is based on Unix. Depending on your Linux distribution, installing Java can be
    done via the specific package manager or by directly downloading the JDK as a
    `*.tar.gz` archive from the official Oracle site.


    If Java is installed using a package manager, the necessary executables are usually
    automatically placed in the system path at installation time. That is why in this
    book, we cover only the cases where you do everything manually, and choose to
    install Java only for the current user in a location such as `/home/your.user/tools/jdk-10.jdk`,^([^(23)](#fn23))
    because covering package managers is not the object of the book after all.^([^(24)](#fn24))


    So, after downloading the JDK archive from the Oracle site and unpacking it at
    `/home/your.user/tools/jdk-10.jdk`, you need to create a file named either `.bashrc`
    or `.bash_profile`^([^(25)](#fn25)) in your user home directory and add the following
    to it.


    ```

    export JAVA_HOME=/home/your.user/tools/jdk-10.jdk

    export PATH=$JAVA_HOME/bin:$PATH

    ```


    As you can see, the syntax is similar to macOS. To check the location of the JDK
    and the Java version, same commands mentioned in the macOS section can be used.


    ## Installing Gradle


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Figa_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Figa_HTML.jpg)
    **Gradle 5.x** The sources attached to this book can be compiled and executed
    using the Gradle wrapper, which is a batch script on Windows and a shell script
    for other operating systems. When you start a Gradle build via the wrapper, Gradle
    automatically downloads and runs the build; thus you do not to really need to
    install Gradle. Instructions on how to do this can be found by reading the public
    documentation at [`www.gradle.org/docs/current/userguide/gradle_wrapper.html`](http://www.gradle.org/docs/current/userguide/gradle_wrapper.html).


    A good practice is to keep code and build tools separate, and for the project
    attached to this book this is the recommended way to go.


    If you decide to use Gradle outside the editor, you can download the binaries
    only (or if you are curious, you can download the full package, which contains
    binaries, sources, and documentation) from the official site ([`www.gradle.org`](http://www.gradle.org)),
    unpack them, and copy the contents somewhere on the hard drive. Create a `GRADLE_HOME`
    environment variable and point it to the location where you have unpacked Gradle.
    Also, add `%GRADLE_HOME%\bin` for Windows, or `$GRADLE_HOME/bin` for Unix-based
    operating systems, to the general path of the system.


    Gradle was chosen as a build tool for the sources of this book because of the
    easy setup, small configuration files, flexibility in defining execution tasks,
    and because it is practical to learn a build tool—because for medium-sized and
    large projects, they are a must-have.


    **!**


    Verify that the version of Gradle the operating system sees is the one you just
    installed by opening a terminal (**Command Prompt** in Windows, and any type of
    terminal you have installed on macOS and Linux) and entering `gradle -version`.


    You should see something similar to this:


    ```

    ------------------------------------------------------------

    Gradle 5.0-20180826235923+0000

    ------------------------------------------------------------

    Build time:   2018-08-26 23:59:23 UTC

    Revision:     c2edb259761ee18f9a14e271f24ef58530b1300f

    Kotlin DSL:   1.0-rc-3

    Kotlin:       1.2.60

    Groovy:       2.4.15

    Ant:          Apache Ant (TM) version 1.9.11 compiled on March 23 2018

    JVM:          10 (Oracle Corporation 10+46)

    OS:           -- whatever operating system you have --

    ```


    The preceding text is confirmation that Gradle commands can be executed in your
    terminal; thus, Gradle was installed successfully.


    ## Installing Git


    This is an optional section, but as a developer, being familiar with a versioning
    system is important, so here it is. To install Git on your system, just go to
    the official page at [`https://git-scm.com/downloads`](https://git-scm.com/downloads)
    and download the installer. Open the installer and click **Next** until done.
    This works for Windows and macOS.^([^(26)](#fn26)) Yes, it is this easy. You do
    not need to do anything else.^([^(27)](#fn27)) For Linux, you can use your package
    manager or PPA to install Git.


    To test that Git installed successfully on your system, open a terminal (**Command
    Prompt** in Windows, and any type of terminal you have installed on macOS and
    Linux) and run `git --version` to see the result that it is printed. It should
    be the version of Git that you just installed.


    ```

    $ git –version

    git version 2.15.1

    ```


    Now that you have Git installed, you can get the sources for this book by cloning
    the official Git repository in a terminal or directly from the IDE. But more about
    this a little bit later.'
