- fmt: '# Looping Statements


    Sometimes in programming, we need repetitive steps that involve the same variables.
    To write the same statement over and over again to get the job done would be ridiculous.
    Let''s take the example of sorting an array of integer values. The most known
    algorithm to do this and the one that is taught first in programming courses because
    it is simple is called *bubble sort*. The algorithm compares the elements of an
    array, two by two and if they are not in the correct order it swaps them. It goes
    over the array again and again until no more swaps are needed. The effects of
    the algorithm are depicted in Figure [7-7](#463938_1_En_7_Chapter.xhtml#Fig7).


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig7_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Bubble sort phases and effect


    This algorithm performs two types of loops; one iterates each element of the array
    using indexes. And this traversal is repeated until no swaps are necessary. In
    Java this algorithm can be written in more than one way using different looping
    statements. But we''ll get there, let''s take it slow.


    There are three types of looping statements in Java.


    *   `for` statement

    *   `while` statement

    *   `do-while` statement


    The `for` looping statement is the most used, but `while` and `do-while` have
    their uses as well.


    ## for Statements


    `for` is recommended for iterating on objects like arrays and lists that can be
    counted. For example, traversing an array and printing each one of its values
    is as simple as depicted in the following code sample.


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    for (int i = 0; i < arr.length; ++i) {

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    }

    }

    ```


    Based on the previous example, a flowchart for the `for` statement can be drawn
    and it is depicted in Figure [7-8](#463938_1_En_7_Chapter.xhtml#Fig8). The following
    code snippet depicts the `for` loop template.


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig8_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    The for statement flowchart


    ```

    for ([int_expr]; [condition];[step]){

    [code_block]

    }

    ```


    Each of the terms between square brackets have a specific purpose that is explained
    next.


    *   **[init_expr]** is an initialization expression that sets the initial value
    of the counter used by this loop. It ends with `;` and is not mandatory, as the
    initialization can be done outside the statement, especially if we are interested
    in using the counter variable later in the code and outside the statement. The
    preceding code can be written like this:


    *   **[condition]** is the termination condition of the loop, as long as this
    condition is evaluated to `true`, the loop will continue executing. The condition
    ends with `;` and funny enough, it is not mandatory either, as the termination
    condition can be placed inside the code to be executed repeatedly by the loop.
    So, the preceding code can be modified further and written like this:


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int i = 0;

    for (; i < arr.length; ++i) {

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    System.out.println("Loop exited with index: " + i);

    }

    }

    ```


    *   **[step]** is the step expression or increment that increases the counter
    on every step of the loop. It should end in `;`, but it is often dropped, and
    as you probably already expected, it is not mandatory either, as nothing stops
    the developer from manipulating the counter inside the code block. So, the preceding
    code can also be written like this:


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int i = 0;

    for (; ; ++i) {

    if (i >= arr.length) {

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    System.out.println("Loop exited with index: " + i);

    }

    }

    ```


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int i = 0;

    for (; ;) {

    if (i >= arr.length) {

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    ++i;

    }

    System.out.println("Loop exited with index: " + i);

    }

    }

    ```


    The modification of the counter does not have to be done inside the code; it can
    be done in the termination condition, but the initialization expression and the
    termination condition must be modified accordingly to fit the purpose. The code
    depicted next has the same effect as all the samples before it.


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    for (int i = -1; i++ < arr.length -1;) {

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    System.out.println("Loop exited with index: " + i);

    }

    }

    ```


    The `step` expression does not have to be an incrementation. It can be any expression
    that modifies the value of the counter. Instead of `++i` or `i++`, you can use
    `i = i + 1`, or `i = i + 3`, or even decrementation if the array of list is traversed
    starting with a bigger index. Any mathematical operations that keep the counter
    in the boundaries of the type it was declared and within the indexes range can
    be used safely.'
