    还有更多布局可供使用，但让我们通过添加一个包含多个条目的列表并为其添加监听器来完成应用程序，这样当您单击某个元素时，它会被添加到框架中央的文本区域中。可以通过实例化`JList<T>`类来创建Swing列表。这会创建一个显示对象列表并允许用户选择一个或多个项目的对象。Swing的`JList<T>`类包含一个`ListModel<T>`类型的字段，用于管理列表显示的数据内容。创建并添加元素后，每个对象都会关联一个索引，当用户选择某个对象时，该索引也可用于处理。在下一个代码片段中，声明并初始化了`JList`对象，并为其关联了一个`ListSelectionListener`，以定义从列表中选择元素时要执行的操作。在我们的例子中，元素值必须添加到`JTextArea`中，因此代码中描绘了该对象。


    ```

    private static  String[] data = {"John Mayer", "Frank Sinatra",

    "Seth MacFarlane", "Nina Simone", "BB King", "Peggy Lee"};

