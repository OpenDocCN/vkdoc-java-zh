    we are allowed to compare an `int` value to a `float` value, and if we compare
    `0` and `0.0`, the result is that they are equal. Also positive zero and negative
    zero are considered equal; thus the result of the comparison `0.0==-0.0` is `true`.


    Developers cannot define a primitive type by defining it from scratch or by extending
    an existing primitive type. Type names are **reserved Java keywords**, which cannot
    be redefined by a developer. It is prohibited to declare fields, methods, or class
    names that are named as those types.


    A variable that we intend to use must be declared first. When it is declared,
    a value can be associated as well. For primitive values, a number can be written
    in many ways. The following shows a few samples of how numeric values can be written
    when variables are initialized or assigned afterward.


