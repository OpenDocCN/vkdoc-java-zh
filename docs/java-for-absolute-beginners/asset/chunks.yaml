  trans: '

    ### **！**


    本书引言中使用的许多术语，现在对你来说可能看起来很陌生，但随着你阅读本书，会接触到更多信息，这些词汇的含义也会逐渐清晰。目前只需记住，每一个新的 Java
    版本，都比前一个版本有所增加，而当时，每一个新组件都是一种创新。


    那么，开发者编写的 Java 代码在真正执行之前，究竟经历了什么过程？这个过程如图 1-5 所示。


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig5_HTML.jpg](img/463938_1_En_1_Fig5_HTML.jpg)


    图 1-5


    从 Java 代码到机器码


    在图 1-5 中，你可以看到 Java 代码被编译并转换为字节码，然后由 Java 虚拟机在底层操作系统上进行解释和执行。这就是 Java 的本质：一种编译型与解释型相结合的通用编程语言，拥有大量特性，使其非常适合用于
    Web 开发。现在我们已经了解了 Java 代码是如何执行的，让我们再回顾一些历史。


    ### Sun Microsystems 的 Java 版本


    Sun Microsystems 发布的第一个稳定 Java 版本，可以从网站上下载，其归档文件名为 JDK 1.0.2。JDK 是 **J**ava **D**evelopment
    **K**it（Java 开发工具包）的缩写。这是用于开发 Java 应用程序和小程序的软件开发环境。它包含 **J**ava **R**untime **E**nvironment（JRE，Java
    运行时环境）、解释器（加载器）、编译器、归档器、文档生成器以及 Java 开发所需的其他工具。在我介绍如何在你的计算机上安装 JDK 时，我们会更详细地讨论这些内容。


    从 1998 年发布的 1.2 版本开始，Java 版本开始拥有代号。^(⁵) Java 1.2 版本的代号是 **Playground**。这是一个重大的版本发布，也正是从这时起，人们开始谈论
    **Java 2 平台**。从这个版本开始，直到 J2SE 5.0 的版本都进行了重命名，J2SE 取代了 JDK，因为 Java 平台现在由三部分组成：


    *   J2SE（Java 2 平台，标准版），后来成为 JSE，是一个用于开发和部署桌面及服务器环境可移植代码的计算平台。

    *   J2EE（Java 2 平台，企业版），后来成为 JEE，是一组规范，通过分布式计算和 Web 服务等企业特性扩展了 Java SE。

    *   J2ME（Java 2 平台，微型版），后来成为 JME，是一个用于开发和部署嵌入式及移动设备可移植代码的计算平台。


    在此版本中，JIT 编译器成为 Sun Microsystems JVM 的一部分（这基本上意味着将代码转换为可执行代码的操作变得更快，并且生成的可执行代码得到了优化），Swing
    图形 API 作为 AWT 的华丽替代品被引入（引入了用于创建精美桌面应用程序的新组件），并且引入了 Java 集合框架（用于处理数据集）。


    J2SE 1.3 于 2000 年发布，代号为 **Kestrel**（可能指的是新引入的 Java 声音类）。此版本还包含了 Java XML API。


    J2SE 1.4 于 2002 年发布，代号为 **Merlin**。这是 **J**ava **C**ommunity **P**rocess（Java
    社区流程）成员首次参与决定版本应包含哪些功能的一年，因此，该版本的发布相当稳定。这是作为 JSR 59^(⁶) 在 Java 社区流程下开发的第一个 Java
    平台版本。以下是一些值得一提的特性。


    *   支持 IPv6（基本上，现在可以编写运行在网络上的应用程序，使其使用 IPv6 网络协议工作）。

    *   非阻塞 IO（IO 是输入-输出的缩写，指的是读取和写入数据——一种非常慢的操作。使 IO 非阻塞意味着优化这些操作以提高运行应用程序的速度）。

    *   日志记录 API（执行的操作需要报告到文件或资源中，以便在发生故障时可以读取这些记录来确定原因并找到解决方案。这个过程称为日志记录，显然只有在这个版本中才引入了支持此操作的组件）。

    *   图像处理 API（开发者可以使用此 API 通过 Java 代码操作图像）。


    Java 的咖啡杯标志于 2003 年（在 1.4 和 5.0 版本之间）在 JavaOne 大会上首次亮相。你可以在图 1-6 中看到它。^(⁷)


    ![../images/463938_1_En_1_Chapter/463938_1_En_1_Fig6_HTML.jpg](img/463938_1_En_1_Fig6_HTML.jpg)


    图 1-6


    Java 官方标志 2003-2006（图片来源：[`http://oracle.com`](http://oracle.com)）

    '
- fmt: 'J2SE 5.0 was released in 2004 with the codename **Tiger**. Initially, it followed
    the typical versioning, and was named 1.5, but because this was a major release
    with a significant number of new features that proved a serious improvement of
    maturity, stability, scalability, and security of the J2SE, the version was labeled
    5.0 and presented like that to the public, even if internally 1.5 was still used.
    For this version and the next two, it was considered that `1.x = x.0`. Let’s list
    those features because most of them are covered in the book.


    *   **Generics** provide compile-time (static) type safety for collections and
    eliminates the need for most type conversions (which means the type used in a
    certain context is decided while the application is running, we have a full section
    about this in **Chapter** [5](#463938_1_En_5_Chapter.xhtml)).

    *   **Annotations**, also known as **metadata**, are used to tag classes and methods
    to allow metadata-aware utilities to process them (which means a component is
    labeled as something another component recognizes and does specific operations
    with it).

    *   **Autoboxing/unboxing** are automatic conversion between primitive types and
    matching object types (wrappers), also covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml).

    *   **Enumerations** define static final ordered sets of values using the `enum`
    keyword; covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml).

    *   **Varargs** are the last parameter of a method is declared using a type name
    followed by three dots (`String...`), which implies that any number of arguments
    of that type can be provided and is placed into an array; covered in **Chapter**
    [3](#463938_1_En_3_Chapter.xhtml).

    *   **Enhanced for each loop** is used to iterate over collections and arrays
    too; covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml).

    *   Improved semantics for multithreaded Java programs, covered in **Chapter**
    [7](#463938_1_En_7_Chapter.xhtml).

    *   **Static imports** are covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml).

    *   Improvements for RMI (not covered in the book), Swing (**Chapter** [10](#463938_1_En_10_Chapter.xhtml)),
    concurrency utilities (**Chapter** [7](#463938_1_En_7_Chapter.xhtml)), and introduction
    to the `Scanner` class; covered in **Chapter** [11](#463938_1_En_11_Chapter.xhtml).


    Java 5 was the first available for Mac OS X (version 10.4) and the default version
    installed on Mac OS X (version 10.5). There were a lot of updates^([⁸](#fn8))
    released for this version to fix issues related to security and performance. It
    was a pretty buggy release, which is understandable since quite a lot of features
    were developed in only two years.


    In 2006, Java SE 6 was released with a little delay, with the codename **Mustang**.
    Yes, yet another rename. And yes, yet again a serious number of features were
    implemented in a short period of time and a lot of updates followed. This was
    the last major Java release by Sun Microsystems. Oracle acquired the company in
    January 2010. Let’s take a look at the most important features in this release:


    *   Dramatic performance improvements for the core platform (applications run
    faster, need less memory or CPU to execute)

    *   Improved web service support (optimized components that are required for development
    of web applications)

    *   JDBC 4.0 (optimized components that are required for development of applications
    using databases)

    *   Java Compiler API (basically, from your code you can components that are used
    to compile code)

    *   Many GUI improvements, such as integration of `SwingWorker` in the API, table
    sorting and filtering, and true Swing double-buffering (eliminating the gray-area
    effect); basically, improvement of components used to create interfaces for desktop
    applications


    In December 2008, Java FX 1.0 SDK was released. JavaFX is used to create graphical
    user interfaces for any platform, and the initial version was a scripting language.
    Until 2008, there were two ways to create a user interface in Java:


    *   **AWT** (Abstract Window Toolkit) components, which are rendered and controlled
    by a native peer component specific to the underlying operating system; that is
    why AWT components are also called *heavyweight components*.

    *   **Swing** components, which are called *lightweight* because they do not require
    allocation of native resources in the operating system’s windowing toolkit. The
    Swing API is a complimentary extension of AWT.


    In the first versions, it was never really clear if JavaFX would actually have
    a future and grow up to replace Swing. The management turmoil inside Sun did not
    help in defining a clear path for the project either.'
