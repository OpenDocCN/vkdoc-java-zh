    #### 使用 JUL 进行日志记录


    JDK 提供了自己的日志类，这些类位于 `java.util.logging` 包下，因此 JDK 提供的日志模块也被称为 **JUL**。`Logger`
    类实例用于记录日志消息。创建日志记录器实例时应为其指定一个名称，并通过调用专门的方法来打印不同级别的日志消息。对于 JUL 模块，其级别及范围如下所列，但其他日志库也有类似的日志级别。


    *   OFF - 应用于关闭所有日志记录

    *   SEVERE – 最高级别，消息表示严重故障

    *   WARNING - 表示由于潜在问题而打印此消息

    *   INFO - 表示这是一条信息性消息

    *   CONFIG - 表示这是一条包含配置信息的消息

    *   FINE - 表示这是一条提供跟踪信息的消息

    *   FINER - 表示这是一条相当详细的跟踪消息

    *   FINEST - 表示这是一条非常详细的跟踪消息

    *   ALL - 应打印所有日志消息


    日志记录器可以使用 XML 或属性文件进行配置，其输出可以定向到外部文件。对于之前介绍的代码示例，让我们将所有 `System.out.print` 方法调用替换为日志记录器调用。我们从
