- fmt: '# 模块化简介


    模块的引入意味着 JDK 现在也被划分为多个模块。这意味着 Java 平台不再是一个由大量包组成的庞然大物，使得开发、维护和演进变得困难。该平台现在被拆分为
    95 个模块，可以通过执行`java --list-modules`来查看（在后续 Java 版本中，数量可能会有所不同）。


    ```

    $ java --list-modules

    java.base@10

    java.compiler@10

    java.datatransfer@10

    java.desktop@10

    ...

    ```


    每个模块名称后面都跟着一个版本字符串`@10`，这意味着该模块属于 Java 10。


    因此，如果 Java 应用程序不需要所有模块，则可以仅使用其所需的模块创建运行时，从而减小运行时的大小。用于构建满足应用程序需求的更小运行时的工具称为`jlink`，它是
    JDK 可执行文件的一部分。它允许更大程度的可扩展性和更高的性能。^([^(46)](#fn46))


    引入模块有多个好处，经验丰富的开发人员多年来一直期待利用这些好处。但是，为更大、更复杂的项目配置模块并非易事，因此目前只介绍包含一个包的模块的简单配置。在完成本书后，欢迎阅读**附录**，其中介绍了更高级的模块配置，并提供了每种可能模块配置的示例。


    `module-info.java`的内容可以简单到只有模块名称和两个大括号。


    ```

    module chapter.three {

    }

    ```


    ## 配置模块


    在这些大括号内，可以使用以下关键字之一声明不同的模块`directives`：


    *   `requires`

    *   `exports`

    *   `module`

    *   `open`

    *   `opens... to`

    *   `provides ... with`

    *   `transitive`


    每个关键字都涵盖特定的行为，但对于初学者来说，最重要的两个是`requires`和`exports`。


    **模块可以相互依赖**。在我们的示例中，`chapter.three`模块内部的类需要访问`chapter.zero`模块中的包和类。声明模块依赖关系是通过使用`requires`关键字完成的。


    ```

    module chapter.three {

    requires chapter.zero;

    }

    ```


    上述依赖关系是**显式**的。但也存在隐式依赖关系。例如，开发人员声明的任何模块都**隐式地**需要 JDK 的`java.base`模块。该模块定义了 Java
    SE 平台的基础 API，没有它，任何 Java 应用程序都无法编写。


    将模块声明为必需的，意味着该模块在编译时和运行时都是必需的。如果某个模块仅在运行时需要，则使用`requires static`关键字来声明依赖关系。请暂时记住这一点；当我谈到
    Web 应用程序时，它会变得有意义。


    **但是，将我们的模块声明为依赖于另一个模块就足够了吗？** 这是否意味着依赖模块可以访问所有`public`类型（以及它们的嵌套`public`和`protected`类型）？如果你认为不能，那么你是对的。仅仅因为一个模块依赖于另一个模块，并不意味着它可以访问它所需的包和类。这是因为它所依赖的模块必须配置为暴露其内部内容。如何做到这一点？在我们的例子中，我们需要确保`chapter.zero`模块授予对所需包的访问权限。这是通过为该模块定制`module-info.java`，添加`exports`指令，后跟必要的包名来实现的。


    ```

    module chapter.zero {

    exports com.apress.bgn.ch0;

    }

    ```


    通过这样做，我们授予了对`com.apress.bgn.ch0`包的访问权限，任何需要此包作为依赖项的模块都可以访问它。如果我们不希望这样呢？


    ## 安全性！


    如果你很好奇并阅读了推荐的**Jar Hell**文章，你会注意到使用打包在 Jar 中的 Java 源代码的一个问题是安全性。因为即使没有 Java 源代码的访问权限，通过将
    Jar 作为依赖项添加到应用程序中，也可以访问、扩展和实例化对象。因此，除了提供可靠的配置、更好的扩展性、平台的完整性和改进的性能之外，引入模块的目标是更好的安全性。


    如果我们只想**将对模块内容的访问限制**在`chapter.three`模块呢？这可以通过在`exports`指令中添加`to`关键字，后跟模块名称来实现。


    ```

    module chapter.zero {

    exports com.apress.bgn.ch0 to chapter.three;

    }

    ```


    可以通过列出所需的模块（用逗号分隔）来指定多个模块具有访问权限。


    ```

    module chapter.zero {

    exports  com.apress.bgn.ch0  to  chapter.three,  chapter.two;

    }

    ```


    关于模块，目前你需要了解的就是这些。


    ## 确定结构：一个 Java 项目


    ## 关于 Java 版本


    当本章编写时，JDK 11 EAP 刚刚发布。不久之后，Gradle 4.9 版本和 IntelliJ IDEA 2018.2 版本发布，它们完全支持使用
    JDK 11 进行开发。因此，从本节开始，本书的其余部分将引用 Java 11。


    Java 项目的结构有几种方式。这取决于项目的范围和所使用的构建工具。


    你可能想知道为什么项目范围会影响其结构，因为你期望对此应该有一个标准，对吧？嗯，有不止一个标准，这取决于项目范围，因为项目范围（即创建 Java 项目的原因）会影响其规模。如果项目很小，可能不需要将源代码拆分为子项目，也不需要构建工具，而构建工具有自己组织项目的标准方式。让我们从最小的
    Java 项目开始，它应该向控制台打印 Hello World!。'
  raw: 'The introduction of modules means the JDK is now divided into modules as well.
    This means that the Java platform is no longer a monolith that consists of a massive
    number of packages and making it challenging to develop, maintain, and evolve.
    The platform is now split into 95 modules that can be viewed by executing `java
    --list-modules` (the number might vary in Java later versions).


    ```

    $ java --list-modules

    java.base@10

    java.compiler@10

    java.datatransfer@10

    java.desktop@10

    ...

    ```


    Each module name is followed by a version string, `@10`, which means that the
    module belongs to Java 10.


    So, if a Java application does not require all modules, a runtime can be created
    only with the modules that it needs, which reduces the runtime’s size. The tool
    to build a smaller runtime customized to an application needs is called `jlink`
    , which is part of the JDK executables. It allows larger levels of scalability
    and increased performance.^([^(46)](#fn46))


    There are multiple benefits of introducing modules, that more experienced developers
    have been waiting for years to take advantage of. But configuring modules for
    bigger and more complex projects is no walk in the park, so for the time being,
    a simple configuration for a module containing one package is covered. After finishing
    this book, you are welcome to read the **Appendix**, where a more advanced module
    configuration is covered, with examples for each of the possible module configuration
    is presented.


    The contents of the `module-info.java` can be as simple as the name of the module
    and two brackets.


    ```

    module chapter.three {

    }

    ```


    ### Configuring Modules


    Within those brackets, different module `directives` may be declared, using one
    of the following keywords :


    *   `requires`


    *   `exports`


    *   `module`


    *   `open`


    *   `opens... to`


    *   `provides ... with`


    *   `transitive`


    Each of them covers a specific behavior, but for a beginner, the most important
    two are `requires` and `exports`.


    **Modules can depend on one another**. For our example, classes inside the `chapter.three`
    module need access to packages, and classes in the `chapter.zero` module. Declaring
    a module dependency is done my using the `requires` keyword .


    ```

    module chapter.three {

    requires chapter.zero;

    }

    ```


    The preceding dependency is an **explicit** one. But there are also implicit dependencies.
    For example, any module declared by a developer **implicitly** requires the JDK
    `java.base` module. This module defines the foundational APIs of the Java SE Platform,
    and no Java application could be written without it.


    Declaring a module as required, means that that module is required at compile
    time and runtime. If a module is required only at runtime, the `requires static`
    keywords are used to declare the dependency. Keep that in mind for now; it will
    make sense when I talk about web applications.


    **But is it enough to declare our module as dependent of another?** Does this
    mean that the dependent module can access all `public` types (and their nested
    `public` and `protected` types)? If you are thinking not, you are right. Just
    because a module depends on another, it does not mean it has access to the packages
    and classes that it needs to. This is because the module it depends on must be
    configured to expose its *insides*. How can that be done? In our case, we need
    to make sure module `chapter.zero` gives access to the required packages. This
    is done by customizing the `module-info.java` for this module by adding the `exports`
    directive, followed by the necessary package names.


    ```

    module chapter.zero {

    exports com.apress.bgn.ch0;

    }

    ```


    By doing this we have given access to the `com.apress.bgn.ch0` package to any
    module that requires this package as a dependency. What if we do not want that?


    ### !


    If you were curious and read the recommended **Jar Hell** article, you noticed
    that one of the concerns of working with Java sources packed in Jars, was security.
    Because even without access to Java sources, objects could be accessed, extended,
    and instantiated by adding a Jar as a dependency to an application. So, aside
    from providing a reliable configuration, better scaling, integrity for the platform,
    and improved performance, the goal for introduction of modules was better security.


    What if we want to **limit** **the access to module contents** only to the `chapter.three`
    module? This can be done by adding the to keyword followed by the module name
    to the `exports` directive.


    ```

    module chapter.zero {

    exports com.apress.bgn.ch0 to chapter.three;

    }

    ```


    More than one module can be specified to have access by listing the desired modules,
    separated by comma.


    ```

    module chapter.zero {

    exports  com.apress.bgn.ch0  to  chapter.three,  chapter.two;

    }

    ```


    And that’s about all you need to know about modules for the moment.


    ### Determining the Structure: A Java Project


    ### !


    When this chapter was written, JDK 11 EAP has just been released. Shortly after,
    Gradle version 4.9 and IntelliJ IDEA version 2018.2 were released and they fully
    supported development using JDK 11\. So, from this section onward Java 11 will
    be referred in the rest of the book.


    There are a few ways Java projects can be structured. It depends on the project’s
    scope and the build tool used.


    You might wonder why does the project scope influence its structure because you
    expect there should be a standard for this, right? Well, there is more than one
    standard, and that is dependent on the project scope, because the scope, the reason
    for creating a Java project influences its size. And if a project is small, it
    might not require you to split the sources into subprojects, and you do not need
    a build tool either, and build tools come with their own standard way of organizing
    a project. Let’s start with the smallest Java project ever, which should print
    Hello World! to the console.'
  trans: '

    模块的引入意味着 JDK 现在也被划分为多个模块。这意味着 Java 平台不再是一个由大量包组成的庞然大物，从而使其开发、维护和演进变得困难。该平台现在被拆分为
    95 个模块，可以通过执行 `java --list-modules` 来查看（在 Java 后续版本中，数量可能会有所不同）。


    ```

    $ java --list-modules

    java.base@10

    java.compiler@10

    java.datatransfer@10

    java.desktop@10

    ...

    ```


    每个模块名称后面都跟着一个版本字符串 `@10`，表示该模块属于 Java 10。


    因此，如果某个 Java 应用程序不需要所有模块，则可以仅使用其所需的模块来创建运行时，从而减小运行时的体积。用于构建满足应用程序需求的、更小运行时的工具称为
    `jlink`，它是 JDK 可执行文件的一部分。它允许实现更大程度的可扩展性和更高的性能。^(⁴⁶)


    引入模块有诸多好处，经验丰富的开发者们多年来一直期待能利用这些优势。但是，为更大、更复杂的项目配置模块并非易事，因此目前只介绍包含一个包的模块的简单配置。在读完本书后，欢迎阅读**附录**，其中涵盖了更高级的模块配置，并针对每种可能的模块配置给出了示例。


    `module-info.java` 的内容可以简单到只有模块名称和两个大括号。


    ```

    module chapter.three {

    }

    ```


    ### 配置模块


    在这些大括号内，可以使用以下关键字之一来声明不同的模块 `指令`：


    *   `requires`


    *   `exports`


    *   `module`


    *   `open`


    *   `opens... to`


    *   `provides ... with`


    *   `transitive`


    每个关键字都涵盖特定的行为，但对于初学者来说，最重要的两个是 `requires` 和 `exports`。


    **模块可以相互依赖**。在我们的示例中，`chapter.three` 模块内的类需要访问 `chapter.zero` 模块中的包和类。声明模块依赖关系是通过使用
    `requires` 关键字来完成的。


    ```

    module chapter.three {

    requires chapter.zero;

    }

    ```


    上述依赖关系是**显式**的。但也存在隐式依赖关系。例如，开发者声明的任何模块都**隐式地**依赖于 JDK 的 `java.base` 模块。该模块定义了
    Java SE 平台的基础 API，没有它，任何 Java 应用程序都无法编写。


    将某个模块声明为必需的，意味着该模块在编译时和运行时都是必需的。如果某个模块仅在运行时需要，则使用 `requires static` 关键字来声明依赖关系。请暂时记住这一点；当我谈到
    Web 应用程序时，你就会明白它的意义。


    **但是，仅仅将我们的模块声明为依赖于另一个模块就足够了吗？** 这是否意味着依赖模块可以访问所有 `public` 类型（以及它们的嵌套 `public`
    和 `protected` 类型）？如果你认为不能，那你是对的。仅仅因为一个模块依赖于另一个模块，并不意味着它可以访问它所需的包和类。这是因为它所依赖的模块必须配置为暴露其*内部*。这该怎么做呢？在我们的例子中，我们需要确保
    `chapter.zero` 模块能够访问所需的包。这可以通过为该模块定制 `module-info.java`，添加 `exports` 指令，后跟必要的包名来实现。


    ```

    module chapter.zero {

    exports com.apress.bgn.ch0;

    }

    ```


    通过这样做，我们向任何需要将此包作为依赖项的模块授予了对 `com.apress.bgn.ch0` 包的访问权限。如果我们不希望这样呢？


    ### ！


    如果你很好奇并阅读了推荐的 **Jar Hell** 文章，你会注意到，使用打包在 Jar 中的 Java 源代码时，其中一个问题是安全性。因为即使没有 Java
    源代码的访问权限，通过将 Jar 作为依赖项添加到应用程序中，也可以访问、扩展和实例化对象。因此，除了提供可靠的配置、更好的可扩展性、平台的完整性以及更高的性能之外，引入模块的目标是为了更好的安全性。


    如果我们想**将对模块内容的访问限制**仅限 `chapter.three` 模块，该怎么办？这可以通过在 `exports` 指令中添加 `to` 关键字，后跟模块名称来实现。


    ```

    module chapter.zero {

    exports com.apress.bgn.ch0 to chapter.three;

    }

    ```


    可以通过列出所需的模块（用逗号分隔）来指定多个模块具有访问权限。


    ```

    module chapter.zero {

    exports  com.apress.bgn.ch0  to  chapter.three,  chapter.two;

    }

    ```


    关于模块，目前你需要了解的大致就是这些。


    ### 确定结构：一个 Java 项目


    ### ！


    在编写本章时，JDK 11 EAP 刚刚发布。不久之后，Gradle 4.9 版本和 IntelliJ IDEA 2018.2 版本发布，它们完全支持使用
    JDK 11 进行开发。因此，从本节开始，本书的其余部分将提及 Java 11。


    Java 项目的结构有几种方式。这取决于项目的范围以及所使用的构建工具。


    你可能会想，为什么项目范围会影响其结构，因为你认为应该有一个标准，对吧？嗯，标准不止一个，这取决于项目范围，因为创建 Java 项目的范围（即原因）会影响其规模。如果项目很小，可能不需要将源代码拆分成子项目，也不需要构建工具，而构建工具有自己组织项目的标准方式。让我们从有史以来最小的
    Java 项目开始，它应该向控制台打印 Hello World!。

