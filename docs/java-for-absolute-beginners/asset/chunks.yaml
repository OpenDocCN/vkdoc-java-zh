  trans: '

    #### jmc


    JMC 是 **Oracle Java Mission Control** 的缩写。`jmc` 命令用于启动一个高级 Oracle 应用程序，用于调试和分析正在运行的应用程序的
    JVM 统计数据。根据其官方描述：*JMC 是一个用于管理、监控、性能分析和故障排查 Java 应用程序的工具套件*，从 JDK 7 开始，它成为了 JDK
    实用工具家族的一员。


    与其他工具类似，该实用程序可以识别当前正在运行的 Java 进程，并提供检查以下信息的功能：它们在执行过程中特定时间点所需的内存量、在给定时刻并行运行的线程数、JVM
    加载的类，以及运行 Java 应用程序所需的处理能力。JMC 拥有更友好的界面，其最重要的组件之一是 **Java Flight Recorder**，它可以在应用程序运行时记录所有
    JVM 活动，在此期间收集的所有数据随后用于诊断和分析应用程序。


    为了在应用程序运行时进行检查，我们通过在命令行中运行 `jmc` 来打开 JMC，然后根据与之前相同的规则，选择我们识别为运行 `SortingSlf4jDemo`
    主类的进程。当我们找到它时，我们查找一个包含模块名称和完全限定类名的进程名称。右键单击它，然后选择 **Start JMX console**。你应该会看到类似于图
    9-10 所示的图像。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig10_HTML.jpg](img/463938_1_En_9_Fig10_HTML.jpg)


    图 9-10


    JMX 控制台


    正如你可能注意到的，界面确实更友好，提供的统计数据也更详细。使用 JMC，可以记录应用程序和 JVM 在运行期间发生的一切，并可以在之后进行分析，即使应用程序此后已停止运行。**Memory**
    选项卡提供了大量关于应用程序所用内存的信息，包括哪些类型的对象占用了内存。`SortingSlf4jDemo` 在运行期间占用的内存信息如图 9-11 所示。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig11_HTML.jpg](img/463938_1_En_9_Fig11_HTML.jpg)


    图 9-11


    JMX 控制台 ➤ Memory 选项卡


    为了在应用程序运行期间或在一段有限的时间内记录此信息，请在 **JVM Browser** 中展开进程节点，然后选择 **Start Flight Recording**。将打开一个窗口，要求你选择保存记录的路径和记录的持续时间。该文件具有
    `.jfr` 扩展名，可以使用 JMC 打开进行检查。飞行记录器菜单和开始记录数据的对话框如图 9-12 所示。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig12_HTML.jpg](img/463938_1_En_9_Fig12_HTML.jpg)


    图 9-12


    JMC 飞行记录器菜单和对话框窗口


    JMC 这个主题对于本节来说过于高级和广泛，可能整本书都用来介绍它的用法以及如何解释统计数据。所以，我将在此打住，如果你想深入了解，推荐阅读这篇 Oracle
    文章：[`www.oracle.com/technetwork/java/javaseproducts/mission-control/java-mission-control-1998576.html`](http://www.oracle.com/technetwork/java/javaseproducts/mission-control/java-mission-control-1998576.html)。


    ## 访问 Java 进程 API


    Java 9 除了 Jigsaw 模块之外，还带来了许多其他改进，其中之一就是全新且改进的 Process API。Java Process API 允许你启动、检索信息和管理本地操作系统进程。在早期版本的
    Java 中也有操作进程的能力，但非常简陋。请注意在 Java 5 之前是如何创建进程的。


    ```

    package com.apress.bgn.ch9;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.BufferedReader;

    import java.io.InputStream;

    import java.io.InputStreamReader;

    import java.io.Reader;

    import java.nio.charset.Charset;

    import java.nio.charset.StandardCharsets;

    public class ProcessCreationDemo {

    private static final Logger log =

    LoggerFactory.getLogger(ProcessCreationDemo.class);

    public static void main(String... args) {

    try {

    Process exec = Runtime.getRuntime()

    .exec(new String[] { "/bin/sh", "-c", "echo Java home:  $JAVA_HOME" });

    exec.waitFor();

    InputStream is = exec.getInputStream();

    StringBuilder textBuilder = new StringBuilder();

    try (Reader reader = new BufferedReader(new InputStreamReader

    (is, Charset.forName(StandardCharsets.UTF_8.name())))) {

    int c = 0;

    while ((c = reader.read()) != -1) {

    textBuilder.append((char) c);

    }

    }

    log.info("Process output -> {}", textBuilder.toString());

    log.info("process result: {}", exec.exitValue());

    } catch (Exception e) {

    e.printStackTrace();

    }

    }

    }

    ```


    拦截已启动进程的输出是一件很痛苦的事情。我们需要将一个 `BufferedReader` 实例包装在连接到进程正常输出的 `InputStream` 实例周围。


    Process API 使事情变得稍微实用一些。它的核心是一些类和接口，它们的名称都以 `"Process"` 开头。我们之前用 Java 可执行文件做的事情，现在可以直接通过编写
    Java 代码来完成。提供访问本地进程 API 的接口名为 `ProcessHandle`，它是核心 Java 包 `java.lang` 的一部分。与 `Thread`
    类类似，该接口上有一个名为 `current` 的静态方法，用于检索当前运行进程的 `ProcessHandle` 实例。一旦我们有了这个实例，就可以使用它的方法来访问更多进程信息。`ProcessHandle`
    提供了几个静态实用方法来访问本地进程。可以编写 Java 代码来列出计算机上运行的所有进程，并且可以根据某些条件对它们进行排序。以下代码片段列出了通过运行
    `java` 命令创建的所有进程。


    ```

    package com.apress.bgn.ch9;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.util.Arrays;

    import java.util.Optional;

    public class ProcessListingDemo {

    private static final Logger log = LoggerFactory.getLogger(ProcessDemo.class);

    public static void main(String... args) {

    Optional currUser = ProcessHandle.current().info().user();

    ProcessHandle.allProcesses()

    .filter(ph -> ph.info().user().equals(currUser)

    && ph.info().commandLine().get().contains("java"))

    .forEach(p ->  log.info("PID: " + p.pid());

    p.info() .arguments()

    .ifPresent(s -> Arrays.stream(s)

    .forEach(a -> log.info("\t {}", a)));

    p.info().command()

    .ifPresent(c -> log.info("\t Command: {}", c));

    });

    }

    }

    ```


    这段代码通过获取当前运行进程的句柄并调用 `info()` 来获取 `ProcessHandle.Info` 实例，从而提取当前运行进程的用户。`ProcessHandle.Info`
    是一个接口，提供了一组方法来访问关于进程的快照信息，例如用于创建进程的命令和参数。前面代码的输出会打印在控制台中。它应该类似于下面的列表。

    '
