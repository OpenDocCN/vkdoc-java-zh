- fmt: '图像文件是一种复杂的文件，除了图片本身，还包含大量附加信息，其中最重要的当属图片的创建位置。如果你曾好奇社交网络如何为你发布的图片推荐签到位置，答案就在这里。这看似无关紧要，但如果你在家中拍摄了一张猫咪照片并发布，就等于向全世界暴露了你的位置。我不确定你怎么想，但对我来说这很可怕。我曾在我个人博客上发布过猫咪舒适地坐在我现在写这本书所用的电脑旁的照片。这基本上向全世界暴露了我的位置和一台昂贵笔记本电脑的位置。当然，大多数人并不关心我的猫或那台笔记本电脑，但那些想轻松捞一笔的人可能会在意。因此，在一位友好且知识渊博的读者给我发了一封私人邮件，告诉我关于一种叫做`EXIF`数据的东西，并解释了他如何通过我博客上发布的最后一张照片知道我的住址后，我对此进行了研究。照片的`EXIF`数据包含大量关于相机以及拍摄地点（GPS坐标）的信息。大多数智能手机都会将`EXIF`数据嵌入到用其相机拍摄的照片中。图[11-8](#463938_1_En_11_Chapter.xhtml#Fig8)展示了macOS的**预览**应用中显示的`EXIF`信息。


    ![../images/463938_1_En_11_Chapter/463938_1_En_11_Fig8_HTML.jpg](images/463938_1_En_11_Chapter/463938_1_En_11_Fig8_HTML.jpg)


    图11-8 JPG图片上的`EXIF`信息


    `EXIF`信息包含拍摄照片的确切位置（包括纬度和经度）。`EXIF`代表可交换图像文件格式（Exchangeable Image File Format）。有一些工具可以移除它，但当你在博客上发布大量图片时（像我一样），逐一清理会花费太多时间。这时Java就派上了用场，我将与大家分享一段我用来清理图片中`EXIF`数据的代码片段。


    ```

    package com.apress.bgn.ch11;

    import org.apache.commons.imaging.formats.jpeg.exif.ExifRewriter;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import javax.imageio.ImageIO;

    import java.awt.*;

    import java.awt.image.BaseMultiResolutionImage;

    import java.awt.image.BufferedImage;

    import java.io.*;

    import java.util.List;

    public class MediaDemo {

    private static final Logger log = LoggerFactory.getLogger(MediaDemo.class);

    public static void main(String... args) {

    File src = new File(

    "chapter11/media-handling/src/main/resources/scottish_sky.jpg");

    try {

    log.info(" --- Removing EXIF info ---");

    File destNoExif = new File(

    "chapter11/media-handling/src/main/resources/scottish_sky_noexif.jpg");

    removeExifTag(destNoExif, src);

    } catch (Exception e) {

    log.error("Something bad happened.", e);

    }

    }

    private static void removeExifTag(final File dest, final File src)

    throws Exception {

    new ExifRewriter().removeExifMetadata(src, new FileOutputStream(dest));

    }

    }

    ```


    为了轻松移除`EXIF`数据，我们使用了一个名为`ExifRewriter`的工具类。它属于Apache创建的一个名为Sanselan的库。这个库已不再维护，但由于它没有任何依赖项，使用JDK
    11编译它完全没有问题。我已fork了该GitHub仓库，并创建了自己的分支，名为`feature/jdk11-gradle-build`，地址为[`https://github.com/iuliana/sanselan`](https://github.com/iuliana/sanselan)。构建该分支产生的工件已作为依赖项添加到项目中。这就是为什么可以使用`ExifRewriter.removeExifMetadata()`方法。该方法接受图片源和一个`OutputStream`作为参数，后者指向新图片应保存的位置。要测试生成的图片是否没有`EXIF`数据，可以在图片查看器中打开它，任何显示`EXIF`的选项要么应被禁用，要么应显示为空。在macOS的预览图片查看器中，该选项是灰色的。


    现在我们已经解决了这个问题，接下来调整生成的图片大小。要调整图片大小，我们需要从原始图片创建一个`BufferedImage`实例，以获取图片尺寸。之后，我们修改尺寸，并将其作为参数来创建一个新的`BufferedImage`，该对象由`java.awt.Graphics2D`实例填充数据，这是一种专门渲染2D形状、文本和图片的特殊类。代码如下一个清单所示。该方法被调用来创建缩小25%、缩小50%和缩小75%的图片。


    ```

