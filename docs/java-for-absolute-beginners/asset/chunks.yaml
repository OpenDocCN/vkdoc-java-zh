- fmt: '# Generics


    Until now we talked only of object types and java templates used for creating
    objects. But what if we would need to design a class with functionality that applies
    to multiple types of objects? Since every class in Java extends the `Object` class,
    we can create a class with a method that receives a parameter of type `Object`,
    and in the method we can test the object type. Take this for granted; it is covered
    later.


    In Java 5, the possibility to use a type as parameter when creating an object
    was introduced. The classes that are developed to process other classes are called
    **generics**.


    When writing Java applications, you most likely need at some point to pair up
    values of different types. The simplest version of a `Pair` class that can hold
    a pair of instances of any type is listed in the following code snippet.


    ```

    package com.apress.bgn.ch4.gen;

    public class Pair {

    protected X  x;

    protected Y  y;

    private Pair(X x, Y y) {

    this.x = x;

    this.y = y;

    }

    public X x() {

    return x;

    }

    public Y y() {

    return y;

    }

    public void x(X x) {

    this.x = x;

    }

    public void y(Y y) {

    this.y = y;

    }

    ...

    public static  Pair of(X x, Y y) {

    return new Pair(x, y);

    }

    @Override public String toString() {

    return "Pair{" + x.toString() +", " + y.toString() + ’}’;

    }

    }

    ```


    Let’s test it! Let’s create a pair of `Performer` instances, a pair of a `String`
    and a `Performer` instance, and a pair of `Strings` to check if this is possible.
    The `toString()` method is inherited from the `Object` class and overridden in
    the `Pair` class to print the values of the fields.


    ```

    package com.apress.bgn.ch4.gen;

    import com.apress.bgn.ch4.hierarchy.Gender;

    import com.apress.bgn.ch4.hierarchy.Performer;

    public class GenericsDemo {

    public static void main(String... args) {

    Performer john = new Performer("John", 40, 1.91f, Gender.MALE);

    Performer jane = new Performer("Jane", 34, 1.591f, Gender.FEMALE);

    Pair performerPair = Pair.of(john, jane);

    System.out.println(performerPair);

    Pair stringPair = Pair.of("John", "Jane");

    System.out.println(stringPair);

    Pair spPair = Pair.of("John", john);

    System.out.println(spPair);

    System.out.println("all good.");

    }

    }

    ```


    If you execute the preceding class, you see something like the log depicted, as
    follows.


    ```

    Pair{com.apress.bgn.ch4.hierarchy.Performer@1d057a39com.apress.bgn.ch4.

    hierarchy.Performer@26be92ad}

    Pair{JohnJane}

    Pair{Johncom.apress.bgn.ch4.hierarchy.Performer@1d057a39}

    all good.

    ```


    The `println` method expects its argument to be a `String` instance, the `toString()`
    method is called on the object given if argument if the type is not `String`.
    If the `toString` method was not overridden, the one from the `Object` class is
    called that returns the fully qualified name of the object type and something
    called a **hashcode**, which is a numerical representation of the object.


    ## Java Reserved Words


    Table [4-2](#463938_1_En_4_Chapter.xhtml#Tab2) and Table [4-3](#463938_1_En_4_Chapter.xhtml#Tab3)
    list Java keywords that can be used only for their fixed and predefined purposes
    in the language. This means they cannot be used as identifiers; you cannot use
    them as names for variables, classes, interfaces, enums, or methods.


    Table 4-3


    Java Keywords (part 2)


    | Method | Description |

    | --- | --- |

    | `do` `while` `for` | Keywords to create loops: `do{..} while(condition)`, `while(condition){..}`,
    `for(initialisation;condition;incrementation){..}` |

    | `goto` | Another keyword borrowed from C, but that is currently not used in
    Java, because it can be replaced by labeled `break` and `continue` statements
    |

    | `if` `else` | Creates conditional statements: `if(condition) {..}` `else {..}`
    `else if (condition ) {..}` |

    | `import` | Makes classes and interfaces available in the current source code.
    |

    | `instanceof` | Tests instance types in conditional expressions. |

    | `native` | This modifier indicates that a method is implemented in native code
    using JNI (Java Native Interface). |

    | `new` | Creates java instances. |

    | `package` | Declares the package the class/interface/enum/annotation is part
    of and it should be the first Java statement line. |

    | `public` `private` `protected` | Access-level modifiers for Java items (templates,
    fields, or methods). |

    | `return` | Keyword used within a method to return to the code that invoked it.
    The method can also return a value to the calling code. |

    | `static` | This modifier can be applied to variables, methods, blocks, and nested
    classes. It declares an item that is shared between all instances of the class
    where declared. |

    | `stricfp` | Used to restrict floating-point calculations to ensure portability.
    Added in Java 1.2. |

    | `super` | Keyword used inside a class to access members of the super class.
    |

    | `this` | Keyword used to access members of the current object. |

    | `synchronized` | Ensures that only one thread executes a block of code at any
    given time. This avoids a problem cause “race-condition”[3](#463938_1_En_4_Chapter.xhtml#Par200).
    |

    | `transient` | Marks data that should not be serialized. |

    | `volatile` | Ensures that changes done to a variable value are accessible to
    all threads accessing it. |

    | `void` | Used when declaring methods as a return type to indicate that the method
    does not return a value. |

    | `_(underscore)` | Cannot be used as an identifier starting with Java 9. |


    Table 4-2


    Java Keywords (part 1)


    | Method | Description |

    | --- | --- |

    | `abstract` | Declares a class or method as abstract—as in any extending or implementing
    class, must provide a concrete implementation. |

    | `assert` | Test an assumption about your code. Introduced in Java 1.4, it is
    ignored by the JVM, unless the program is run with `"-ea"` option. |

    | `boolean` `byte` `char` `short` `int` `long` `float` `double` | Primitive type
    names |

    | `break` | Statement used inside loops to terminate them immediately. |

    | `continue` | Statement used inside loops to jump to the next iteration immediately.
    |

    | `switch` | Statement name to test equality against a set of values known as
    cases. |

    | `case` | Statement to define case values in a `switch` statement. |

    | `default` | Declares a default case within a `switch` statement. Also used to
    declare default values in interfaces. And starting with Java 8, it can be used
    to declare default methods in interfaces, methods that have a default implementation.
    |

    | `try` `catch` `finally` `throw` `throws` | Keywords used in exception handling.
    |

    | `class` `interface` | Keywords used in classes and interfaces declarations.
    |

    | `extends` `implements` | Keywords used in extending classes and implementing
    interfaces. |

    | `enum` | Keyword introduced in Java 5.0 to declare a special type of class that
    defines a fixed set of instances. |

    | `const` | Not used in Java; a keyword borrowed from C where it declares constants,
    variables that are assigned a value, which cannot be changed during the execution
    of the program. |

    | `final` | The equivalent of the `const` keyword in Java. Anything defined with
    this modifier, cannot change after a final initialization. A final class cannot
    be extended. A final method cannot be overridden. A final variable has the same
    value that was initialized with throughout the execution of the program. Any code
    written to modify final items, lead to a compiler error. |'
