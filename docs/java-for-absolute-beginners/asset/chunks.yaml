    ## 循环语句


    在编程中，有时我们需要重复执行涉及相同变量的步骤。为了完成任务而一遍又一遍地编写相同的语句是荒谬的。让我们以对整型数组进行排序为例。实现这一目标最著名的算法，也是编程课程中首先教授的算法，因为它简单，被称为*冒泡排序*。该算法将数组中的元素两两比较，如果顺序不对就交换它们。它会一遍又一遍地遍历数组，直到不再需要交换为止。该算法的效果如图
    7-7 所示。


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig7_HTML.jpg](img/463938_1_En_7_Fig7_HTML.jpg)


    图 7-7


    冒泡排序的阶段与效果


    该算法执行两种类型的循环：一种使用索引遍历数组的每个元素。并且这种遍历会重复进行，直到不需要交换为止。在 Java 中，可以使用不同的循环语句以多种方式编写此算法。但我们稍后会讲到，让我们慢慢来。


    Java 中有三种类型的循环语句。


    *   `for` 语句


    *   `while` 语句


    *   `do-while` 语句


    `for` 循环语句是最常用的，但 `while` 和 `do-while` 也有其用途。


    ### for 语句


    `for` 语句推荐用于遍历可计数的对象，如数组和列表。例如，遍历数组并打印其每个值，就像以下代码示例所示的那样简单。


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    for (int i = 0; i < arr.length; ++i) {

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    }

    }

    ```


    基于前面的示例，可以绘制出 `for` 语句的流程图，如图 7-8 所示。以下代码片段展示了 `for` 循环的模板。


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig8_HTML.jpg](img/463938_1_En_7_Fig8_HTML.jpg)


    图 7-8


    for 语句流程图


    ```

    for ([int_expr]; [condition];[step]){

    [code_block]

    }

    ```


    方括号中的每个术语都有特定的用途，下面将进行解释。


    *   **[init_expr]** 是一个初始化表达式，用于设置此循环使用的计数器的初始值。它以 `;` 结尾，并且不是强制性的，因为初始化可以在语句外部完成，特别是当我们稍后在代码中且在语句外部使用计数器变量时。前面的代码可以这样写：


    *   **[condition]** 是循环的终止条件，只要此条件求值为 `true`，循环就会继续执行。该条件以 `;` 结尾，有趣的是，它也不是强制性的，因为终止条件可以放在循环重复执行的代码内部。因此，前面的代码可以进一步修改，写成这样：


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int i = 0;

    for (; i < arr.length; ++i) {

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    System.out.println("Loop exited with index: " + i);

    }

    }

    ```


    *   **[step]** 是步进表达式或增量，用于在循环的每一步增加计数器的值。它应以 `;` 结尾，但通常被省略，并且正如你可能已经预料到的，它也不是强制性的，因为没有什么能阻止开发者在代码块内部操作计数器。因此，前面的代码也可以这样写：


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int i = 0;

    for (; ; ++i) {

    if (i >= arr.length) {

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    System.out.println("Loop exited with index: " + i);

    }

    }

    ```


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int i = 0;

    for (; ;) {

    if (i >= arr.length) {

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    ++i;

    }

    System.out.println("Loop exited with index: " + i);

    }

    }

    ```


    计数器的修改不一定非要在代码内部完成；也可以在终止条件中完成，但初始化表达式和终止条件必须相应地进行修改以适应目的。接下来展示的代码与之前所有示例具有相同的效果。


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    for (int i = -1; i++ < arr.length -1;) {

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    System.out.println("Loop exited with index: " + i);

    }

    }

    ```


    `step` 表达式不一定非得是递增操作。它可以是任何修改计数器值的表达式。除了 `++i` 或 `i++`，你可以使用 `i = i + 1`，或 `i
    = i + 3`，甚至如果从较大的索引开始遍历数组或列表，也可以使用递减操作。任何能够将计数器保持在其声明类型的边界内以及索引范围内的数学运算都可以安全使用。

    '
- fmt: '`[code_block]`是一个代码块，在循环的每一步中重复执行。如果这段代码中没有退出条件，那么该代码块将根据计数器通过终止条件的次数来执行。


    这是`for`循环语句的基本形式，但在Java中还有其他遍历一组值的方法。假设我们不是遍历数组，而是遍历一个列表。


    ```

    package com.apress.bgn.ch7;

    import java.util.List;

    public class ForLoopDemo {

    public static void main(String... args) {

    List list = List.of(5, 1, 4, 2, 3);

    for (int j = 0; j < list.size(); ++j) {

    System.out.println("list[" + j + "] = " + list.get(j));

    }

    }

    }

    ```


    这段代码看起来有些笨拙，这就是为什么`List<>`实例可以用另一种`for`语句来遍历，这种语句在Java 8之前被称为`forEach`。你马上就会明白原因，但首先让我们看看`forEach`。


    ```

    package com.apress.bgn.ch7;

    import java.util.List;

    public class ForLoopDemo {

    public static void main(String... args) {

    List list = List.of(5, 1, 4, 2, 3);

    for (Integer item : list) {

    System.out.println(item);

    }

    }

    }

    ```


    这种`for`语句也被称为具有增强语法，它基本上对其表达式中使用的集合中的每个项目执行代码块。这意味着它适用于任何`Collection`接口的实现，也适用于数组。因此，示例代码可以这样写：


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    for (int item : arr) {

    System.out.println(item);

    }

    }

    }

    ```


    显然，在这种情况下，最好的部分是我们不再需要终止条件或计数器。从Java 8开始，名称`forEach`不再需要用于具有增强语法的`for`语句，因为`forEach`默认方法被添加到了所有`Collection`扩展中。将其与lambda表达式结合，打印列表元素的代码变成了：


    ```

    package com.apress.bgn.ch7;

    import java.util.List;

    public class ForLoopDemo {

    public static void main(String... args) {

    List list = List.of(5, 1, 4, 2, 3);

    list.forEach(item -> System.out.println(item));

    //or

    list.forEach(System.out::println);

    }

    }

    ```


    很简洁，对吧？但等等，还有更多，它也适用于数组，但首先需要将其转换为合适的`BaseStream`实现。这由`Arrays`工具类提供，该类在Java 8中得到了丰富，增加了支持lambda表达式的方法。所以，是的，使用`arr`数组的代码可以（从Java
    8开始）这样写：


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    Arrays.stream(arr).forEach(System.out::println);

    }

    }

    ```


    在Java 11中，前面所有的示例都能正常编译和执行，所以在编写解决方案时，请使用你最偏好的语法。


    ### while 语句


    `while`语句与`for`语句的不同之处在于，它没有必须执行的固定步数，因此并不总是需要计数器。`while`语句执行的重复次数仅取决于控制该次数的继续条件被评估为`true`的次数。因此，该语句的通用模板如下所示：


    ```

    while ([eval(condition)] == true) {

    [code_block]

    }

    ```


    `while`语句实际上也不需要初始化语句，因为它可以在代码块内部，也可以在语句外部。`while`语句可以替代`for`语句，但`for`语句的优势在于它将初始化、终止条件和计数器的修改封装在一个单独的块中，因此更加简洁。数组遍历代码示例可以使用`while`语句重写；代码如下所示。


    ```

    package com.apress.bgn.ch7;

    public class WhileLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int  i=0;

    while(i < arr.length){

    System.out.println("arr[" + i + "] = " + arr[i]);

    ++i;

    }

    }

    }

    ```


    如你所见，计数器变量`int i=0;`的声明和初始化是在语句外部完成的，而计数器的递增是在要重复的代码块内部完成的。基本上，此时如果我们为此场景设计流程图，它将与图[7-9](#463938_1_En_7_Chapter.xhtml#Fig9)中描绘的`for`语句相同。


    而且听起来令人难以置信的是，`[condition]`也不是强制性的，因为它可以直接被`true`替换。但在这种情况下，你必须确保在某个时刻执行的代码块内部有一个退出条件；否则，执行很可能会以错误结束。并且这个条件必须放在代码块的开头，以防止在不应该执行的情况下执行有用的逻辑。对于我们的简单示例，我们不希望对索引超出数组范围的元素调用`System.out.println`。


    ```

    package com.apress.bgn.ch7;

    public class WhileLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int  i=0;

    while(true){

    if (i >= arr.length) {

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    ++i;

    }

    }

    }

    ```


    `while`语句最适合用于处理并非始终在线的资源。假设我们正在为一个应用程序使用一个位于不稳定网络中的远程数据库。与其在第一次超时后就放弃保存数据，我们可以一直尝试直到成功，对吧？这是通过使用一个`while`语句来实现的，该语句在其代码块中尝试初始化一个连接对象。代码大致如下：


    ```

    package com.apress.bgn.ch7;

    import java.sql.*;

    public class ConnectionTester {

    public static void main(String... args) throws Exception {

    Connection con = null;

    while (con == null) {

    try {

    Class.forName("com.mysql.cj.jdbc.Driver");

    con = DriverManager.getConnection(

    "jdbc:mysql://localhost:3306/sample", "root", "pass");

    } catch (Exception e) {

    System.out.println("Connection refused. Retrying in 5 seconds ...");

    Thread.sleep(5000);

    }

    }

    // con != null, do something

    Statement stmt = con.createStatement();

    ResultSet rs = stmt.executeQuery("select * from test");

    while (rs.next()) {

    System.out.println(rs.getInt(1) + "  " + rs.getString(2));

    }

    con.close();

    }

    }

    ```


    这段代码的问题在于它会永远运行；如果我们想在一定时间后放弃尝试，必须引入一个变量来记录尝试次数，然后使用`break`语句退出循环。'
  raw: '*   `[code_block]` is a block of code executed repeatedly, in every step of
    the loop. If there is no exit condition within this code, this block of code is
    executed by as many times as the counter passes the termination condition.


    This is the basic form of the `for` looping statement, but in Java there are other
    ways to iterate a group of values. Let’s say that instead of an array, we have
    to iterate over a list.


    ```

    package com.apress.bgn.ch7;

    import java.util.List;

    public class ForLoopDemo {

    public static void main(String... args) {

    List list = List.of(5, 1, 4, 2, 3);

    for (int j = 0; j < list.size(); ++j) {

    System.out.println("list[" + j + "] = " + list.get(j));

    }

    }

    }

    ```


    The code seems somehow impractical and that is why `List<>` instances can be traversed
    with a different type of `for` statement that was known as `forEach` until Java
    8. You will see immediately why, but first let’s look at `forEach`*.*


    ```

    package com.apress.bgn.ch7;

    import java.util.List;

    public class ForLoopDemo {

    public static void main(String... args) {

    List list = List.of(5, 1, 4, 2, 3);

    for (Integer item : list) {

    System.out.println(item);

    }

    }

    }

    ```


    This type of `for` statement is also called as having *enhanced syntax* and basically
    executes the code block for each item in the collection used in its expression.
    This means it works on any implementation of `Collection` interface and it works
    on arrays too. So, the example code is written like this:


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    for (int item : arr) {

    System.out.println(item);

    }

    }

    }

    ```


    Clearly the best part in this case is that we no longer need a termination condition,
    or counter at all. Starting with Java 8, the name *forEach* is no longer needed
    for the `for` statement with enhanced syntax, because the `forEach` default method
    was added to all `Collection` extensions. Combine that with lambda expressions
    and the code to print the elements of a list becomes


    ```

    package com.apress.bgn.ch7;

    import java.util.List;

    public class ForLoopDemo {

    public static void main(String... args) {

    List list = List.of(5, 1, 4, 2, 3);

    list.forEach(item -> System.out.println(item));

    //or

    list.forEach(System.out::println);

    }

    }

    ```


    Pretty neat, ha? But wait, there’s more, it works on arrays too, but a small conversion
    to suitable implementation `BaseStream` is necessary first. But it is provided
    by the `Arrays` utility class that was enriched in Java 8 with methods to support
    lambda expressions. So yeah, the code with the `arr` array can be written (starting
    in Java) 8 like this:


    ```

    package com.apress.bgn.ch7;

    public class ForLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    Arrays.stream(arr).forEach(System.out::println);

    }

    }

    ```


    In Java 11, all the preceding examples compile and execute just fine, so use whatever
    syntax you prefer most when writing your solutions.


    ### while Statement


    The `while` statement is different from the `for` statement in that there is not
    a fixed number of steps that have to be executed, so a counter is not always needed.
    The number of repetitions of a `while` statement executes depends only on how
    many times the continuation condition that controls this number is evaluated to
    `true`. So, the generic template for this statement is depicted in the following
    listing:


    ```

    while ([eval(condition)] == true) {

    [code_block]

    }

    ```


    A `while` statement does not really require an initialization statement either,
    as it can be inside the code block, or outside the statement. The `while` statement
    can replace the `for` statement, but the advantage of the `for` statement is that
    it encapsulates the initialization, the termination condition and the modification
    of the counter in a single block, so it’s more concise. The array traversal code
    sample can be rewritten using the `while` statement; the code is listed next.


    ```

    package com.apress.bgn.ch7;

    public class WhileLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int  i=0;

    while(i < arr.length){

    System.out.println("arr[" + i + "] = " + arr[i]);

    ++i;

    }

    }

    }

    ```


    As you can see, the declaration and initialization of the counter variable, `int
    i=0;` is done outside the statement and the incrementation of the counter is done
    inside the code block to be repeated. Basically at this point, if we design the
    flowchart for this scenario, it will look the same as the `for` statement depicted
    in Figure [7-9](#463938_1_En_7_Chapter.xhtml#Fig9).


    And as incredible as it sounds, the `[condition]` is not mandatory either, as
    it can be replaced directly with `true`. But in this case, you have to make sure
    that there is an exit condition inside the block of code that executes at some
    point; otherwise, the execution will most likely end with an error. And this condition
    must be placed at the beginning of the block of code to prevent the execution
    of the useful logic in a situation where it shouldn’t be. For our simple example,
    we do not want to call `System.out.println` for an element with an index outside
    the array range.


    ```

    package com.apress.bgn.ch7;

    public class WhileLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int  i=0;

    while(true){

    if (i >= arr.length) {

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    ++i;

    }

    }

    }

    ```


    The `while` statement is best used when we are working with a resource that is
    not always online. Let’s say we are using a remote database for our application
    that is in a network that is unstable. Instead of giving up trying to save our
    data after the first timeout, we could try until we succeed, right? This is done
    by using a `while` statement that tries to initialize a connection object in its
    code block. And the code looks roughly like this:


    ```

    package com.apress.bgn.ch7;

    import java.sql.*;

    public class ConnectionTester {

    public static void main(String... args) throws Exception {

    Connection con = null;

    while (con == null) {

    try {

    Class.forName("com.mysql.cj.jdbc.Driver");

    con = DriverManager.getConnection(

    "jdbc:mysql://localhost:3306/sample", "root", "pass");

    } catch (Exception e) {

    System.out.println("Connection refused. Retrying in 5 seconds ...");

    Thread.sleep(5000);

    }

    }

    // con != null, do something

    Statement stmt = con.createStatement();

    ResultSet rs = stmt.executeQuery("select * from test");

    while (rs.next()) {

    System.out.println(rs.getInt(1) + "  " + rs.getString(2));

    }

    con.close();

    }

    }

    ```


    The problem with this code is that it runs forever; if we want to give up trying
    after a certain time, we must introduce a variable that counts the number of tries
    and then exits the loop using a `break` statement.'
