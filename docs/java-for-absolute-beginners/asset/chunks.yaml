    ### ！


    这对 Java 世界来说是一个重大变化；它不是语法上的改变，也不是什么新特性。而是平台设计上的改变。我认识一些经验丰富的开发者，他们从 Java 诞生之初就开始使用它，至今仍难以适应这种变化。这一变化旨在修复
    Java 多年来一直存在的一些严重问题（详见**第** 3 章）。你很幸运，因为作为初学者，你是从零开始，所以无需改变开发应用程序的方式。


    以下是除引入 Java 模块之外最重要的特性。^(¹⁰)


    *   Java Shell 工具，一个用于评估用 Java 编写的声明、语句和表达式的交互式命令行界面（详见**第** 3 章）


    *   相当多的安全更新


    *   改进的 `try-with-resources`：现在可以将最终变量用作资源（详见**第** 5 章）


    *   从合法标识符名称集合中移除了 `"_"`（详见**第** 4 章）


    *   支持私有接口方法（详见**第** 5 章）


    *   对 G1 垃圾回收器的增强；它成为默认的垃圾回收器（详见**第** 13 章）


    *   内部使用了更紧凑的新字符串表示形式（详见**第** 5 章）


    *   并发更新（与并行执行相关，在**第** 5 章中提及）


    *   集合的工厂方法（详见**第** 5 章）


    *   图像处理 API 的更新，优化了用于编写图像处理代码的组件


    Java 9 沿用了与 Java 8 相同的版本命名方案，但略有改动。JDK 名称中包含的 Java 版本号最终成为了版本方案中的 `$MAJOR` 数字。因此，如果你安装了
    Java 9，在终端中执行 `java -version` 时，会看到类似如下的日志。


    ```

    $ java  -version

    java version "9.0.4"

    JavaTM SE Runtime Environment build 9.0.4+11

    Java HotSpotTM 64-Bit Server VM build 9.0.4+11, mixed mode

    ```


    Java SE 10（又名 Java 18.3）于 2018 年 3 月 20 日发布。Oracle 改变了 Java 的发布风格，因此每六个月发布一个新版本。此外，Java
    10 采用了 Oracle 设定的新版本命名约定：版本号遵循 `$YEAR.$MONTH` 格式。^(¹¹) 显然，这种发布版本命名风格旨在让开发者或最终用户更容易了解版本的发布时间，以便他们判断是否要升级到包含最新安全修复和附加功能的新版本。


    以下是 Java 10 的一些特性。^(¹²)


    *   局部变量类型推断，用于增强语言能力，将类型推断扩展到局部变量（这是最受期待的特性，详见**第** 5 章）


    *   更多垃圾回收优化（详见**第** 13 章）


    *   应用程序类数据共享，通过跨进程共享通用类元数据来减少内存占用（这是一个高级特性，本书不会涉及）


    *   更多并发更新（与并行执行相关，在**第** 5 章中提及）


    *   在替代内存设备上进行堆分配（JVM 运行 Java 程序所需的内存——称为*堆内存*——可以在替代内存设备上分配，因此堆也可以在易失性和非易失性 RAM
    之间分配。有关 Java 应用程序使用内存的更多信息，请参阅**第** 5 章。）


    既然我们之前已经做过，那么让我们看看在终端中运行 `java -version` 对于这个 Java 版本会显示什么。


    ```

    $ java -version

    java version "10" 2018-03-20

    JavaTM SE Runtime Environment 18.3 build 10+46

    Java HotSpotTM 64-Bit Server VM 18.3 build 10+46, mixed mode

    ```


    Java SE 11（又名 Java 18.9）^(¹³)（于 2018 年 9 月 25 日发布）包含以下特性：


    *   移除了用于构建企业级 Java 应用程序的 JEE 高级组件以及 Corba（一种非常古老的远程调用技术，允许你的应用程序与安装在另一台计算机上的应用程序进行通信）模块


    *   Lambda 参数的局部变量语法，允许在声明隐式类型 Lambda 表达式的形式参数时使用 `var` 关键字


    *   Epsilon，一种低开销的垃圾回收器（是一种无 GC 回收器，因此基本上你可以在没有 GC 的情况下运行应用程序），基本上是对垃圾回收的更多优化（详见**第**
    13 章）


    *   更多并发更新（与并行执行相关，在**第** 5 章中提及）


    除了这些变化之外，还有人推测应该引入一个新的版本命名变更，因为 `$YEAR.$MONTH` 格式在开发者中反响不佳。（为什么有这么多版本命名变更，对吧？这真的那么重要吗？显然是的。）提议的版本命名变更与
    Java 9 中引入的类似，如果你好奇，可以在 [`http://openjdk.java.net/jeps/322`](http://openjdk.java.net/jeps/322)
    阅读其详细规范。


    在撰写本章时，JDK 11 仅通过早期访问计划提供，这就是版本名称中出现 `"ea"` 字符串的原因；它表示*早期访问*。使用它相当困难，因为任何编辑器或其他构建工具尚不支持它。到本书发布时，Java
    11 将稳定并可供使用，本书的源代码也将在 GitHub 仓库中相应更新。


    ```

    $ java -version

    java version "11-ea" 2018-09-18

    JavaTM SE Runtime Environment 18.9 build 11-ea+2

    Java HotSpotTM 64-Bit Server VM 18.9 build 11-ea+2, mixed mode

    ```


    细节就到此为止。如果你想了解更多关于 Java 诞生头 20 年的信息，可以在 Oracle 的网站上找到。^(¹⁴)


    ## 未来展望


    Java 主导行业已超过 20 年。它并非始终位居最常用开发技术的榜首，但自诞生以来从未跌出前五。即使有像 Node.js 这样的服务端 JavaScript
    智能框架，繁重的工作仍然留给了 Java。像 Scala 和 Kotlin 这样的新兴编程语言运行在 JVM 上，因此 Java 编程语言或许会经历一次重大的蜕变以保持竞争力，但它仍将存在。


    第 9 版引入的模块化可能性为 Java 应用程序安装在更小的设备上打开了大门，因为要运行 Java 应用程序，我们不再需要整个运行时环境——只需要其核心以及应用程序构建时所用的模块。


    此外，有大量用 Java 编写的应用程序，尤其是在金融领域，因此由于遗留原因，以及将这些庞大的应用程序迁移到其他技术是一项不可能完成的任务，Java 仍将存在。


    Java 很可能会在未来 10 到 15 年内继续生存并保持领先地位。它是一项非常成熟的技术，拥有庞大的社区支持，这确实有所帮助。而且它易于学习且对开发者友好，这使其仍然是大多数公司的首选。因此，你现在可以得出结论：学习
    Java 并购买这本书是一项不错的投资。

