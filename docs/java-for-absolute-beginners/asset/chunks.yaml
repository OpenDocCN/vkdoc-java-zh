    |  var j;

    |  ^----^

    [jshell> var j = 5;

    j ==> 5

    |  已创建变量 j : int

    [jshell> var sample2 = "bubulina"

    sample2 ==> "bubulina"

    |  已创建变量 sample2 : String

    // 是的，这实际上有效！

