    \ - dest25Img width x height :  1008 x 277\n```\n\nUsing JavaFX Image Classes\n\
    Aside from the Java Media API, which is centered on components of the\n`java.awt`\n\
    package, another way to display and edit images is provided by JavaFX.\nThe core\
    \ class for the `javafx.scene.image`\npackage is called `Image`, which handles\n\
    images in a few common formats: PNG, JPEG, BMP, and GIF. JavaFX\napplications\
    \ can display images using an instance of `javafx.scene.image.ImageView`.\nThe\
    \ part that I like most about this class is that the images can be\nalso displayed\
    \ scaled, without the original image being modified.\n\nTo create a `javafx.scene.image.Image`\n\
    instance, all we need is a `FileInputStream`\ninstance to read the image from\
    \ the user-provided location, or a URL\nlocation given as `String`. The following\n\
    code snippet creates a JavaFX application that\ndisplays an image with its original\
    \ width and height, which can be\naccessed using methods in the `javafx.scene.image.Image`\n\
    class.\n\n```\npackage com.apress.bgn.ch11;\nimport javafx.application.Application;\n\
    import javafx.scene.Scene;\nimport javafx.scene.image.Image;\nimport javafx.scene.image.ImageView;\n\
    import javafx.scene.layout.StackPane;\nimport javafx.stage.Stage;\nimport java.io.File;\n\
    import java.io.FileInputStream;\npublic class JavaFxMediaDemo extends Application\
    \ {\npublic static void main(String... args) {\nApplication.launch(args);\n}\n\
    @Override\npublic void start(Stage primaryStage) throws Exception {\nprimaryStage.setTitle(\"\
    JavaFX Image Demo\");\nFile src = new File(\"chapter11/media-handling/src/main/resources/cover.png\"\
    );\nImage image = new Image(new FileInputStream(src));\nImageView imageView =\
    \ new ImageView(image);\nimageView.setFitHeight(image.getHeight());\nimageView.setFitWidth(image.getWidth());\n\
    imageView.setPreserveRatio(true);\n//Creating a Group object\nStackPane root =\
    \ new StackPane();\nroot.getChildren().add(imageView);\nprimaryStage.setScene(new\
    \ Scene(root,\nimage.getWidth()+10,\nimage.getHeight()+10));\nprimaryStage.show();\n\
    }\n}\n```\n\nThe `Image`\ninstance cannot be added to the `Scene` of the JavaFX\n\
    instance directly as it does not implement the `Node` interface, which\nis required\
    \ to be implemented by all JavaFX elements that make a JavaFX\napplication. That\
    \ is why this instance must be wrapped in a `javafx.scene.image.ImageView`\ninstance\
    \ that is a class implementing node, which is a specialized class\nfor painting\
    \ images loaded with `Image` class.\nThis class resizes the displayed image with\
    \ or without preserving the\noriginal aspect ratio by calling the `setPreserveRatio(..)`\n\
    method with the appropriate argument: `true` to keep the\noriginal aspect ratio;\
    \ `false` otherwise.\n\nIn the previous code, we use the values retuned by `image.getWidth()`\
    \ and\n`image.getHeight()` to\nset the size of the `ImageView` object and\nthe\
    \ size of the `Scene` instance. But\nlet’s get creative and display the scaled\n\
    image, still preserving the aspect ratio and also using a better-quality\nfiltering\
    \ algorithm when scaling the image using the `smooth(..)` method.\n\n```\n...\n\
    ImageView imageView = new ImageView(image);\nimageView.setFitWidth(100);\nimageView.setPreserveRatio(true);\n\
    imageView.setSmooth(true);\n...\n```\n\nThe `ImageView`\nclass  also\nsupports\
    \ a `Rectangle2D` viewport\nthat rotates the image.\n\n```\nimport javafx.geometry.Rectangle2D;\n\
    ...\nImageView imageView = new ImageView(image);\nRectangle2D viewportRect = new\
    \ Rectangle2D(2, 2, 600, 600);\nimageView.setViewport(viewportRect);\nimageView.setRotate(90);\n\
    ...\n```\n\nBeing an implementation of Node, `ImageView` supports\nclicking events,\
    \ and it is easy to write some code to resize an image on click. Just\ntake a\
    \ look.\n\n```\n...\nImageView imageView = new ImageView(image);\nimageView.setFitHeight(image.getHeight());\n\
    imageView.setFitWidth(image.getWidth());\nimageView.setPreserveRatio(true);\n\
    root.getChildren().add(imageView);\nimageView.setPickOnBounds(true);\nimageView.setOnMouseClicked(mouseEvent\
    \ -> {\nif(imageView.getFitWidth() > 100) {\nimageView.setFitWidth(100);\nimageView.setPreserveRatio(true);\n\
    imageView.setSmooth(true);\n} else {\nimageView.setFitHeight(image.getHeight());\n\
    imageView.setFitWidth(image.getWidth());\nimageView.setPreserveRatio(true);\n\
    }\n});\n...\n```\n\nBy calling `onMouseClicked`, we\nattached an `EventHandler<?\
    \ super MouseEvent>` instance to the mouse-clicking event on `imageView`. The\
    \ `EventHandler<T extends Event>` is a functional interface containing a single\
    \ method\nnamed `handle`,\nand its concrete implementation is the body of the\
    \ lambda expression in\nthe previous code listing.\nSince JavaFX was taken out\
    \ of JDK 11, there is no real value in going\nover more image processing classes\
    \ in this section. But if you are\ninterested in learning more about this subject,\
    \ this tutorial from\nOracle should do the job: [`https://docs.oracle.com/javafx/2/image_ops/jfxpub-image_ops.htm`](https://docs.oracle.com/javafx/2/image_ops/jfxpub-image_ops.htm)\
    \ . Also, as practice, you can try writing your own\ncode, based on\nthe code\
    \ in the book, to add a mouse event that rotates the image.\nAnd this is all the\
    \ space that I can dedicate to playing with images\nin the Java. I hope you found\
    \ this section useful and might get the\nchance to test your Java Media API skills\
    \ in the future, if not for\nanything else, at least for cleaning EXIF data from\
