    ### do-while 语句


    `do-while` 语句与 `while` 类似，但有一个区别：继续条件是在执行代码块之后才进行求值。这会导致代码块至少被执行一次，除非其中嵌入了退出条件。该语句的通用模板如下所示：


    ```

    do {

    [代码块]

    } while ([eval(条件)] == true)

    ```


    大多数情况下，`while` 和 `do-while` 语句可以轻松互换，有时只需对代码块的逻辑进行微小改动。例如，遍历数组并打印其元素值也可以使用 `do-while`
    实现，而无需更改代码块。图 7-9 展示了两种实现方式的对比：左侧为 `while`，右侧为 `do-while`。


