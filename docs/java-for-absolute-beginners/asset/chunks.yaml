    ## Java 数据类型简介


    前面的例子表明，Java 中的数据类型可以根据执行时的存储位置分为两大类：原始类型和引用类型。我将简要介绍它们，并在后面解释其最重要的成员。


    ### 原始数据类型


    **原始类型**由 Java 编程语言定义为特殊类型，它们没有对应的支持类，并通过保留关键字来命名。这些类型的变量保存在栈内存中，当使用 `= (等号)`
    运算符为其赋值时，值实际上是被复制的。因此，如果我们像下面的代码清单那样声明两个 `int` 类型的原始变量，最终会得到两个变量 `k` 和 `q`，它们都具有相同的值：`42`。


    ```

    package com.apress.bgn.ch5;

    public class PrimitivesDemo {

    public static void main(String... args) {

    int k = 42;

    int q = k;

    System.out.println("k = " + k);

    System.out.println("q = " + q);

    }

    }

    ```


    当作为参数传递给其他方法时，原始变量的值会被复制并使用，而原始变量本身不会被修改。这可以通过创建一个交换两个 `int` 变量值的方法来证明。以下是该方法的代码。


    ```

    package com.apress.bgn.ch5;

    public class PrimitivesDemo {

    public static void main(String... args) {

    int k = 42;

    int q = 44;

    swap(k, q);

    System.out.println("k = " + k);

    System.out.println("q = " + q);

    }

    static void swap(int a, int b) {

    int temp = a;

    a = b;

    b  =  temp;

    }

    }

    ```


    那么，你认为 `k` 和 `q` 打印出的值是什么？如果你认为输出结果与下面相同，那么你是正确的。


    ```

    k = 42

    q = 44

    ```


    这是因为在 Java 中，向方法传递参数是通过值传递的方式进行的，这意味着对于原始类型，改变形式参数的值不会影响实际参数的值。如果你阅读了上一节，你已经可以想象栈上发生了什么。当
    `swap()` 方法被调用时，会创建一个新的栈内存块来保存该方法使用的值。在方法执行期间，这些值可能会改变，但如果它们没有被返回并赋值给调用方法中的变量，那么当方法执行结束时，这些值就会丢失。图
    5-5 描述了前面列出的代码执行期间栈上发生的变化。正如你明显注意到的，堆内存完全没有被使用。


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig5_HTML.jpg](img/463938_1_En_5_Fig5_HTML.jpg)


    图 5-5


    Java 按值传递原始参数

