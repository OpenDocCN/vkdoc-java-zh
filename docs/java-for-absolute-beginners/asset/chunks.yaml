- fmt: '# Summary


    In this chapter, you did the following tasks:


    - Learned how to use `JShell`

    - Learned about Java packages and actually created one

    - Learned about Java accessors

    - Learned about modules

    - Created our first Java project with IntelliJ IDEA

    - Wrote the code for our first program within IntelliJ IDEA

    - ... that we later compiled manually too

    - Ran our first program (Hello World!)

    - Added packages to it

    - Configured a module for it

    - ... and compiled and executed it manually too

    - Learned about Gradle and how it can make a developer’s life easy


    Many of the things you did in this chapter, you will probably do daily after getting
    a job as a Java developer—except for the time you’ll spend hunting and fixing
    bugs in existing code. You will probably spend a lot of time reading documentation
    too, because the JDK has a lot of classes, fields, and methods that you can use
    to write an application. And with each released version, things change and you
    must keep yourself up-to-date. Brains have limited capacity, so no employer should
    ever expect you to know every JDK class and method; but work smart and keep the
    webpage at `https://docs.oracle.com/javase/10/docs/api/` open in your browser.
    And when you have doubts about a JDK class or method, you can read about it on
    the spot.


    # 4. Java Syntax


    Languages are means of communication—verbal or written—between people. Whether
    they are natural or artificial, they are made of terms and have rules on how to
    use them to perform the task of communication. Programming languages are means
    of communicating with a computer. The communication with a computer is a written
    communication; basically, the developer defines some instructions to be executed,
    communicates them through an intermediary to the computer, and if the computer
    understands them, performs the set of actions, and depending on the application
    type, some sort of reply is returned to the developer.


    In the Java language, communication is done through an intermediary—the Java virtual
    machine. The set of programming rules that define how terms should be connected
    to produce an understandable unit of communication is called **syntax**. Java
    borrowed most of its syntax from a programming language called C++, which has
    a syntax based on the C language. C syntax borrows elements and rules from languages
    that preceded it, but in essence, all of these languages are based on the natural
    English language.


    Maybe Java got a little cryptic in version 8 because of the introduction of lambda
    expressions, but when writing a Java program, if you are naming your terms properly
    in the English language, the result should be code that is easily readable, like
    a story.


    A few details were covered in Chapter 3; packages and modules were covered enough
    to give you a solid understanding of their purpose to avoid confusion with the
    organization of the project and aimless fumbling through the code. But as expected
    when it comes to actual code writing, the surface has been barely scratched. Thus,
    let’s begin our deep dive into Java.


    ## Base Rules of Writing Java Code


    Before writing Java code, let’s go over a few rules that you should follow to
    make sure your code actually works. Let’s depict the class we ended Chapter 3
    with by adding a few details.


    ```

    01.  package com.apress.bgn.ch3.helloworld;

    02.

    03.  import java.util.List;

    04.

    05.  /**

    06.  * this is a JavaDoc comment

    07.  */

    08.  public class HelloWorld {

    09.     public static void main(String... args) {

    10.          //this is a one-line comment

    11.          List items = List.of("1", "a", "2", "a", "3", "a");

    12.         items.forEach(item -> {

    13.          /* this is a

    14.                  multi-line

    15.             comment */

    16.              if (item.equals("a")) {

    17.                 System.out.println("A");

    18.              } else {

    19.                 System.out.println("Not A");

    20.              }

    21.         });

    22.     }

    23.  }

    ```


    Next, I’ll cover each rule in its own section.


    ### Package Declaration


    A Java file always starts with the **package declaration**. The package name can
    contain letters and numbers, separated by dots. Each part matches a directory
    in the path to the classes contained in it. The package declaration should reveal
    the name of the application and the purpose of the classes in the package. Let’s
    take the package naming used for the sources of this book: `com.apress.bgn.ch4.basic`.
    If we split the package name in pieces, the meaning of each piece is described
    as follows.


    - `com.apress` is the domain of the application, or who owns the application in
    this case

    - `bgn` is the scope of the code, in this case the book it is written for (Java
    for Absolute Beginners)

    - `ch4` is the purpose of the classes in Chapter 4

    - `basic` is a more refined level of the purpose for the classes, these classes
    are simple, used to depict basic Java notions'
