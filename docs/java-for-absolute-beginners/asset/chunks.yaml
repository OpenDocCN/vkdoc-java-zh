- fmt: '### Terminal Operations `sum` and `reduce`


    Let’s consider the scenario: we have a finite stream of `Song` values and we want
    to calculate the sum of their durations. The code to do this is depicted in the
    following listing, and the use of another stream terminal function that can be
    used only on numeric streams.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    Integer totalDuration = songs

    .mapToInt(Song::getDuration)

    .sum();

    ```


    The same result can be obtained using the `reduce(..)` function.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    Integer totalDuration = songs

    .mapToInt(Song::getDuration)

    .reduce(0, (a, b) -> a + b);

    ```


    The `reduce` function takes two arguments.


    - The `identity` argument represents the initial version of the reduction and
    the default result if there are no elements in the stream.

    - The `accumulator` function takes two parameters; the operation is applied on
    to get a partial result (in this case is the addition of those two elements).


    So basically, every time an element of the stream is processed, the `accumulator`
    returns a new value that is the result of adding the processed element with the
    previous partial result. So, if the result of the process is a collection, the
    `accumulator`’s result is a collection, so every time a stream element is processed
    a new collection would be created. This is pretty inefficient, so in scenarios
    like this the `collect` function is more suitable.


    ### Intermediate Operation `peek`


    This function is special because it really doesn’t affect the stream results in
    any way. The `peek` function returns a stream consisting of the elements of the
    stream it is called on while also performing for each element the operation specified
    by its `Consumer<T>` argument. This means that this function can be used to debug
    stream operations.


    Let’s take our stream of `Song` instances and filter them by their duration. Select
    all the ones with a duration >300 seconds, and then get their titles and collect
    them in a list. The following code shows how to do this.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    List result = songs.filter(s -> s.getDuration() > 300)

    .map(Song::getTitle)

    .collect(Collectors.toList());

    ```


    Before the `map` call, a `peek` call can be introduced to check if the filtered
    elements are the ones you expect. Another `peek` call can be introduced after
    to inspect the mapped value.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    List result = songs.filter(s -> s.getDuration() > 300)

    .peek(e -> System.out.println("\t Filtered value: " + e))

    .map(Song::getTitle)

    .peek(e -> System.out.println("\t Mapped value: " + e))

    .collect(Collectors.toList());

    ```


    ### Intermediate Operation `skip` and Terminal Operations `findAny`, `anyMatch`,
    `allMatch`, and `noneMatch`


    These are the last operations discussed in this chapter, so they are coupled together
    because the `skip` operation might affect the result of the others.


    The `findAny()` returns an `Optional<T>` instance that contains the first element
    of the stream or an empty `Optional<T>` instance when the stream is empty. When
    the stream is parallel, the function returns a random element of the stream wrapped
    into an `Optional<T>`. Because the stream of songs we’ve been using so far is
    not a parallel one, we create a parallel stream by calling the intermediate function
    `parallel()`.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    Optional optSong = songs.parallel().findAny();

    optSong.ifPresent(System.out::println);

    ```


    The `anyMatch(..)` method receives an argument of type `Predicate<T>` and returns
    a boolean `true` value if there is any elements in the stream that match the predicate,
    and `false` otherwise. It works on parallel streams as well. The scenario the
    next code covers is to return `true` if any of the songs in our stream has a title
    containing the word *Paper*.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    boolean b = songs

    .anyMatch(s -> s.getTitle().contains("Paper"));

    System.out.println("Are there songs with title containing ''Paper''? " + b);

    ```


    The code prints `true` because there is a song on the list called *Paper Dolls*.
    But, if we want to change that result, all we have to do is skip processing the
    first six elements in the original stream by calling `skip(6)`. Yes, this method
    works on parallel streams as well.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    boolean b = songs.parallel()

    .skip(6)

    .anyMatch(s -> s.getTitle().contains("Paper"));

    System.out.println("Are there songs with title containing \"Paper\"? " + b);

    ```


    And so, if the first six elements in the original stream were not processed, now
    the previous code returns `false`. There is another function that analyses all
    elements of a stream checking if they all match a single predicate, and that method
    is called `allMatch(..)`. In the next code sample, we check if all `Song` instances
    have duration bigger than 300. The function returns a boolean, and the value is
    `true` if all `Song` instances match the predicate and `false` otherwise. For
    our example, we are obviously expecting a `false` value, because not all of our
    `Song` instances have the `duration` field value bigger than 300.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    boolean b = songs.allMatch(s -> s.getDuration() > 300);

    System.out.println("Are all songs longer than 5 minutes? " + b);

    ```


    The pair of this function is a function named `noneMatch` and does exactly the
    opposite thing: takes a predicate as an argument and returns a boolean. The value
    of this boolean is `true` if none of the stream elements match the predicate provided
    as argument, and `false` otherwise. In the next code sample, we check using the
    `noneMatch` if there is no `Song` instance with duration > 300 and we expect the
    result to be `false`.


    ```

    Stream songs = StreamMediaLoader.loadSongs();

    boolean b = songs.noneMatch(s -> s.getDuration() > 300);

    System.out.println("Are all songs shorter than 5 minutes? " + b);

    ```'
