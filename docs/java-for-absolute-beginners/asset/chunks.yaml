    The previous code sample showed you roughly how to access native processes and
    print information about them. But, using the improved Java process API, new processes
    can be created, and commands of the underlying operation system can be started.
    For example, we can create a process that prints the value of the `JAVA_HOME`
    environment variable, and capture the output to display it in the IntelliJ console.


    ```

    package com.apress.bgn.ch9;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    public class ProcessCreationDemo {

    private static final Logger log =

    LoggerFactory.getLogger(ProcessCreationDemo.class);

    public static void main(String... args) {

    try {

    ProcessBuilder pb = new

    ProcessBuilder("/bin/sh", "-c", "echo Java home:  $JAVA_HOME")

    .inheritIO();

    Process p = pb.start();

    p.onExit();

    CompletableFuture future =  p.onExit();

    int result = future.get().exitValue();

    log.info("Process result: {}", result);

    } catch (Exception e) {

    e.printStackTrace();

    }

    }

    }

    ```


    New processes can be created by using instances of `ProcessBuilder` that can receive
    as arguments a list of commands and values to use as arguments for them. The class
    has many constructors and methods with different signatures that can be used to
    create and start processes easily. The `inheritIO()` method sets the source and
    destination for the subprocess standard I/O to be the same as the current process.
    The `onExit()` method returns an `CompletableFuture<Process>` that can be used
    to access the process at the end of its execution to retrieve the exit value of
    the process. For a process terminating normally, the value should be 0 (zero).


    When a Java program creates a process, it becomes a child of the process that
    created it. To list all child processes, we need to make sure that they last a
    while, because once terminated, they obviously no longer exist. The following
    code sample creates three identical processes, each of them executing three Linux
    shell commands: the first is `echo "start"` to notify that the process has started
    execution, the second is `sleep 3` that pauses the process for 3 seconds, and
    the last one (`echo "done."`) is executed right before the process finishes its
    execution. Once the process has started, it can no longer be controlled, so to
    make sure that the child processes finish their execution, we’ll ask the user
    to press a key to decide when the current process finishes execution by calling
    `System.in.read();`.


    ```

    package com.apress.bgn.ch9;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    public class ProcessCreationDemo {

    private static final Logger log =

    LoggerFactory.getLogger(ProcessCreationDemo.class);

    public static void main(String... args) {

    try {

    List builders = List.of(

    new ProcessBuilder("/bin/sh", "-c",

    "echo \"start...\" ; sleep 3; echo \"done.\"").inheritIO(),

    new ProcessBuilder("/bin/sh", "-c",

    "echo \"start...\" ; sleep 3; echo \"done.\"").inheritIO(),

    new ProcessBuilder("/bin/sh", "-c",

    "echo \"start...\" ; sleep 3; echo \"done.\"").inheritIO()

    );

    builders.parallelStream().forEach(pbs -> {

    try {

    pbs.start();

    } catch (Exception e) {

    log.error("Oops, could not start process!", e);

    }

    });

    ProcessHandle ph = ProcessHandle.current();

    ph.children().forEach(pc -> {

    log.info("Child PID: {}", pc.pid());

    pc.parent().ifPresent(parent ->

    log.info(" Parent PID: {}", parent.pid()));

    });

    System.out.println("Press any key to exit!");

    System.in.read();

    } catch (Exception e) {

    e.printStackTrace();

    }

    }

    }

    ```


    We have grouped the `ProcessBuilders` in a list and processed the instances using
    a parallel stream to make sure that all processes were started almost at the same
    time. We printed the results of each of them after termination to make sure all
    were executed correctly.


    The `children()` method returns a stream containing `ProcessHandle` instances
    corresponding to the processes started by the current Java process.


    The `parent()` method was called for each child `ProcessHandle` instance to obtain
    the `ProcessHandle` corresponding to the process that created it.


