    where a *logging facade* proves useful. And the next section shows you how to
    use the most renowned Java logging facade: SLF4J.


    ## Logging with SLF4J and Logback


    The most renowned Java logging facade is SLF4J^([^(67)](#fn67)) that serves as
    a logging abstraction for various logging frameworks. This means that you use
    the SLF4J classes, and behind the scenes all the work is done by a logging concrete
    implementation found in the classpath. The best part? You can change the logging
    implementation anytime, and your code still compiles and executes correctly, and
    there is no need to change anything in it.


    In the code samples covered until now in this chapter, the code is seriously tied
    to JUL, if we want for some reason to change the logging library, we need to change
    the existing code as well. The first step is to change our code to use the SLF4J
    classes. Another advantage of using SLF4J is that the configuration is automatically
    read if the logging configuration file is on the classpath. So, the `LogManager`
    initialization block that we needed for JUL is not needed anymore, as long as
    the configuration file is named according to the standard of the concrete logging
    implementation used. So, let’s see the code first.


    ```

    package com.apress.bgn.ch9;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.util.Arrays;

    import java.util.logging.Logger;

    public class SortingJulDemo {

    private static final Logger log =

    LoggerFactory.getLogger(SortingSlf4jDemo.class);

    public static void main(String... args) {

    if (args.length == 0) {

    log.error ("No data to sort!");

    return;

    }

    int[] arr = getInts(args);

    final StringBuilder sb = new StringBuilder

    ("Sorting  an array with merge sort: ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug (sb.toString());

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append( " "));

    log.info (sb2.toString());

    }

    }

    ```


    As you’ve probably noticed, the methods we are calling are a little bit different,
    which is because SLF4J defines an API that maps to the concrete implementation,
    but the methods depending on their names they are used to print log messages with
    specific purposes and at specific levels. I’ll list them and provide a short explanation
    for each.


    *   `info.error(..)` logs messages at the ERROR level; usually these are messages
    that are used when there is a critical failure of the application and normal execution
    cannot continue. There is more than one form for this method, and exceptions and
    objects can be passed as arguments to it so that the state of the application
    at the moment of the failure can be assessed.


    *   `info.warn(..)` logs messages at the WARN level; usually these messages are
    printed to notify that the application is not functioning normally and there might
    be reason to worry, in the same way as the previous method, there is more than
    one form of for it, and exceptions and objects can be passed as arguments to better
    assess the current state of the application.


    *   `log.info(..)` logs messages at the INFO level; this type of messages is informational
    to let the user know that everything is OK.


    *   `info.debug(..)` logs messages at the DEBUG level; usually these messages
    are used to print intermediary states of the application and to check that things
    are going as expected; and in case of a failure, you can trace the evolution of
    the application objects.


    *   `log.trace(..)` logs messages at the TRACE level; this type of messages is
    informational of a very low importance.'
