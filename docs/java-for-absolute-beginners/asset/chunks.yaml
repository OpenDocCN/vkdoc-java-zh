    ### ！


    Java 的构建块被称为**类**，它们是模拟现实世界对象和事件的代码片段。类包含两种类型的**成员**：一种用于模拟状态，即类变量，也称为**字段**或**属性**；另一种用于模拟行为，称为**方法**。JDK
    提供了许多类，用于模拟创建大多数应用程序所需的基础组件。下一章将更详细地介绍类，在阅读本书的过程中，你也会创建大量类。即使这些术语和概念现在看起来有些陌生，请耐心等待，让它们逐渐积累；稍后它们会变得更有意义。


    在 JShell 中，JDK 类可以像 `java.lang.String`（你将在**第** 4 章中进一步了解的程序组件）一样使用，它是 Java 中表示文本对象的类。并且可以调用它们的方法。让我们声明第一个
    `String` 变量。


    ```

    jshell> String text = "this is a text";

    text ==> "this is a text"

    |  created variable text : String

    ```


    我们刚刚声明了一个类型为 `String` 的变量，名为 `text`，其值为 `"this is a text"`。`String` 类有许多方法可以调用来修改文本，让我们调用一个效果明显的方法。输入
    `text.toUpperCase()`。


    ```

    jshell> text.toUpperCase()

    $6 ==> "THIS  IS  A  TEXT"

    |  created scratch variable $6 : String

    ```


    最后一条语句调用了 `String` 方法，该方法将变量内容转换为大写。但让我们看看当引入一些不符合 Java 语法的内容时会发生什么。让我们调用一个对 `String`
    类型不存在的方法。


    ```

    jshell> text.toAnotherUniverse()

    |  Error:

    |  cannot find symbol

    |    symbol:   method toAnotherUniverse()

    |  text.toAnotherUniverse()

    |  ^--------------------^

    ```


    JShell 非常清楚地告诉我们，它不知道 `toAnotherUniverse()` 是什么。让我们直接输入纯文本。下面，我尝试了 `"what is this?"`。


    ```

    jshell> what is this?

    |  Error:

    |  '';'' expected

    |  what is this?

    |         ^

    ```


    在第一条语句中，我们尝试调用一个未在 `String` 类中定义的方法，错误消息与我们做错的地方非常相关。


    我们甚至可以创建自己的方法。


    ```

    jshell> String createHello(String s){

    ...> return "Hello " + s;

    ...> }

    |  created method createHello(String)

    jshell> createHello(text)

    $8 ==> "Hello this is a text"

    |  created scratch variable $8 : String

    ```


    JShell 也支持代码补全^(³¹)。以我们之前定义的 `text` 变量为例；如果我们输入 **text**，然后在后面加上一个“.”（点），再按 Tab
    键，就会列出可用的方法列表，如图 3-1 所示。如果你输入方法名称的几个字母，就会应用过滤。JShell 只建议以该字母组合开头的方法名称。非常有用，对吧？


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig1_HTML.jpg](img/463938_1_En_3_Fig1_HTML.jpg)


    图 3-1


    JShell 列出可在 String 变量上调用的方法


