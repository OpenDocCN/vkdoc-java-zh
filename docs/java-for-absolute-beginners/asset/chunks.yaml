    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Figg_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Figg_HTML.jpg)
    | On-page Connector | This element is usually labeled and indicates the continuation
    of the flow on the same page. |

    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Figh_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Figh_HTML.jpg)
    | Off-page Connector | This element is usually labeled and indicates the continuation
    of the flow on a different page. |

    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Figi_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Figi_HTML.jpg)
    | Comment (Or annotation) | When a flow or an element requires extra explanation
    it is introduced using this type of element. |


    The flowchart elements presented in this table are pretty standard; you will probably
    find very similar elements used in any programming course or tutorial. After this
    consistent introduction, it is only fit to get into it.


    ## if-else Statement


    The most simple decisional flow statement in Java is the `if-else` statement (probably
    in other languages too). You’ve probably seen the `if-else` statement in code
    samples in the previous chapters. There was no way to avoid it, because providing
    runnable code that encourages you to write your own is important. But in this
    section the focus is strictly on this type of statement.


    Let’s imagine this scenario: we run a Java program with a numeric argument provided
    by the user. If the number is even, we print `EVEN` in the console; else, we print
    `ODD`. The flowchart matching this scenario is depicted in Figure 7-2.


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig2_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2** if-else flowchart sample


    The condition is evaluated to a `boolean` value, if the result is `true` the statement
    corresponding to the `if` branch is executed, if the result is `false`, the statement
    corresponding to the `else` branch is executed.


    The Java code that implements the process described by this flowchart is depicted
    in the following code snippet.


    ```

    package com.apress.bgn.ch7;

    public class IfFlowDemo {

    public static void main(String... args) {

    //Read a

    int a = Integer.parseInt(args0);

    if (a % 2 == 0) { // is even

    //Display EVEN

    System.out.println("EVEN");

    } else {

    //Display ODD

    System.out.println("ODD");

    }

    }

    }

    ```


    To run this class with different arguments, you must create an IntelliJ IDEA launcher
    and add your argument in the **Program arguments** text field, as explained at
    the beginning of this book. Each Java statement in the previous code snippet was
    paired with a comment matching the flowchart element to make the implementation
    clear. The fun thing is that not both branches of an `if` statement are mandatory.
    Sometimes you want to print something if a value matches a condition, but you
    are not interested in what happens otherwise. For example, given a user provided
    argument, we want to print a message if the number is negative, but we are not
    interested in printing or doing anything else if the number is positive. The flowchart
    for that is depicted in Figure 7-3.


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig3_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fig3_HTML.jpg)


    **Figure 7-3** if flowchart sample, missing the else branch


    And the Java code looks like this:


    ```

    package com.apress.bgn.ch7;

    public class IfFlowDemo {

    public static void main(String... args) {

    //Read a

    int a = Integer.parseInt(args0);

    if (a < 0) {

    System.out.println("Negative");

    }

    }

    }

    ```


    And in the same way that the statement can be made simple, in the same way, if
    we need it, we can link more `if-else` statements together. Let’s consider the
    following example: the user inserts a number from 1 to 12, and we have to print
    the season the month with that number corresponds to. How would the flowchart
    look like? Do you think Figure 7-4 fits the scenario?


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig4_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fig4_HTML.jpg)


    **Figure 7-4** Complex if-else flowchart sample


    Looks complicated, right? Wait until you see the code matching that diagram, that
    is depicted in this next code snippet.


    ```

    package com.apress.bgn.ch7;

    public class SeasonDemo {

    public static void main(String... args) {

    //Read a

    int a = Integer.parseInt(args[0]);

    if(a == 12 || (a>=1 && a2 && a 5 && a 8 && a <= 11 ) {

    System.out.println("Autumn");

    } else {

    System.out.println("Error");

    }

    }

    }

    }

    }

    }

    ```


    Looks ugly, right? But, fortunately, Java provides a way to simplify it, especially
    because it makes no sense having so many `else` blocks that only contain another
    `if` statement. The simplified code connects the `else` statements with the contained
    `if(s)` statements. And the code ends up looking like the following code snippet.'
