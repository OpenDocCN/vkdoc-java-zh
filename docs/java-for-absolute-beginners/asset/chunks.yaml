    If you click a list element, two things happen: the previous element is deselected,
    and one that was clicked the most recently is selected, so the selected element
    changes. The `getValueIsAdjusting()` method returns whether or not this is one
    in a series of multiple events, where changes are still being made, and we test
    if this method returns `false` to check that the selection has been already made,
    so we can get the value of the current selected element and add it to the text
    area.


    Regarding the `JTextArea` instance, this one is added to a `JScrollPane` instance,
    which allows for the `textArea` contents to still be visible as it fills with
    text by providing a scrollbar or two, depending on the configuration. The `JScrollPane`
    can also be wrapped around a list with too many items to make sure all of them
    are accessible. Also, as we are not interested in user provided input via the
    text area, the `setEditable(false);` method is called.


    Now that we have a more complex application, it is time to play with the look-and-feel
    of the application. Until now, we’ve used the default one, the one provided by
    the underlying Operation System. But with Swing, the look-and-feel can be configured
    as one of the defaults supported by the JDK or extra custom ones can be used,
    which are provided as dependencies in the project class path, or developers can
    create their own. To specify a look-and-feel explicitly, the following line of
    code must be added in the main method, before any swing component is created:
    `UIManager.setLookAndFeel(..)`. This method receives as parameter a `String` value
    representing the fully qualified name of the appropriate subclass of look-and-feel.
    Although not necessary, you could specify explicitly that you want to use the
    native GUI by calling: `UIManager.setLookAndFeel(UIManager.getCrossPlatformLookAndFeelClassName());`.
    Knowing this, let’s do something interesting. The `UIManager` class contains utility
    methods and nested classes used to manage look-and-feel for swing applications.
    One of this methods is `getInstalledLookAndFeels()` , which extracts the list
    of supported look-and-feels and returns them as a `LookAndFeelInfo[]`. Knowing
    this, let’s list all the supported themes, add them to our list, and when the
    user selects one of them, let’s apply them. Unfortunately, as swing is rarely
    used these days, there are not that many custom look-and-feels that we could use
    in our application. So, the only thing to do is to work with what JDK has. First,
    let’s initialize the `data` array with the fully qualified class names.


