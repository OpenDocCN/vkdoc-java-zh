    *   如何在控制台中记录消息

    *   如何将消息记录到文件

    *   如何使用 Java 日志记录

    *   什么是日志门面以及为什么推荐使用它

    *   配置 SLF4J 与 Logback 一起使用

    *   如何使用断言进行编程

    *   如何使用 IntelliJ IDEA 进行调试

    *   如何在应用程序运行时使用各种 JDK 工具（`jps`、`jcmd`、`jconsole` 和 `jmc`）监控和检查 JVM 统计信息

    *   如何使用 Process API

    *   如何使用 JUnit 测试应用程序

    *   如何使用假对象编写测试

    *   如何使用模拟对象编写测试

    *   如何使用桩对象编写测试

    *   如何记录 Java 应用程序并以 HTML 格式生成文档


