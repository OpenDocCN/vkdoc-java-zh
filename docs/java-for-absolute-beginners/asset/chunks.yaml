    ## Build a Web Application


    Here we are. Things are getting serious. We are building a web application. A
    web application is an application that runs on a server and can be accessed using
    a browser. Until recently most Java applications needed web servers like Apache
    Tomcat, Glassfish, or Enterprise, and servers like JBoss (currently known as WildFly)
    or TomEE to be hosted on, so they could be accessed. You would write the web application,
    with the classes and HTML or JSP files, pack it in a `WAR` (Web ARchive) or an
    `EAR` (Enterprise ARchive), deploy it to a server, and start the server. The server
    would provide the context of the application and map requests to classes that
    would provide the answer to be served as responses. Assuming the application would
    be deployed on a Tomcat server, Figure [10-12](#463938_1_En_10_Chapter.xhtml#Fig12)
    shows an abstract schema of the deployed application functionality.


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig12_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Web application deployed on an Apache Tomcat server


    Requests to a web application can come from other clients than browsers, but because
    this section covers web applications, we’ll assume all requests to our application
    come from a browser. Let me explain the Internet a little first.


    The Internet is an information system made up of a lot of computers linked together.
    Some computers host application servers that provide access to applications, some
    computers access these applications and some do both. The communication between
    these computers is done over a network through a list of protocols: HTTP, FTP,
    SMTP, POP, and so forth. The most popular protocol is HTTP, which stands for Hypertext
    Transfer Protocol and it is an asymmetric request-response client-server protocol,
    this means that the client makes a request to the server and then the server sends
    a response. Subsequent requests have no knowledge of one another and they do not
    share any state, thus they are stateless. HTTP requests can be of different types,
    being categorized by the action they require the application on the server to
    perform, but there are four types that are more commonly used by developers (the
    ones listed in Figure [10-12](#463938_1_En_10_Chapter.xhtml#Fig12) in the request
    arrow). I won’t go into the details of request components because it is not really
    related to Java; I’ll cover enough information to understand how a web application
    works. The following list contains the four most common request types and the
    responses a server generates for them:


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig13_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Network debugger view in Firefox


    *   `GET`: Whenever a user enters a URL in the browser (e.g., `http://my-site.com/index.html`),
    the browser transforms the address into a request message and sends it to the
    web server. What the browser does can be easily viewed by opening the debugger
    view in Firefox. Click the **Network** tab, and access `www.google.com`. Figure
    [10-13](#463938_1_En_10_Chapter.xhtml#Fig13) shows the Firefox debugger view showing
    the URL being requested and the contents of the Request message.'
