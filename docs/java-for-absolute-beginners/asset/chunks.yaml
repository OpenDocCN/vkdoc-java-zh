    ## Internationalization


    Interactive applications are usually created to be deployed on more than one server
    and available 24/7 and in multiple locations. As not all of us speak the same
    language, the key to convince people to become your clients and use your application
    is to build it in multiple languages. The process of designing an application
    so that it meets user needs in multiple countries and easily adapts to satisfy
    those needs is called *internationalization*. For example we can take the initial
    Google page. Depending on the location where it is accessed, it changes language
    according to that area. When you create an account, you can select the language
    you prefer. This does not mean that Google has built a web application for each
    region, it’s a single web application that displays text in different languages
    depending on the location. Internationalization should always be taken into consideration
    in the design phase of an application, because adding it later is difficult. We
    do not have a web application, but we are internationalizing a JavaFX application
    in this section.


    When you start reading about internationalization you might notice that files
    or directories containing the internationalization property files are named `i18n`,
    which is because there are 18 letters between *i* and *n* in this word.


    Internationalization is based on locale. **Locale** is the term given to a combination
    of language and region. The application locale is the one that decides which internationalization
    file customizes the application. The locale concept is implemented in Java by
    the `java.util.Locale` class and a `Locale` instance represents a geographical,
    political or cultural region. When an application depends on the locale we say
    that it is locale-sensitive, as most applications are nowadays. But selecting
    a locale can be something a user has to do as well. Each `Locale` can select the
    corresponding *locale resources*, these are files containing locale specific configurations.
    These files are grouped per locale and can usually be found under the `resources`
    directory. These resources are used to configure an instance of `java.util.ResourceBundle`
    that can manage locale-specific resources.


    To build a proper use case for localization, the previous JavaFX application is
    modified; instead of singer names, the list contains a list of pet names with
    labels that can be translated in various languages. A list with the available
    languages is added, and when a language is selected from this list, a `Locale`
    static variable is set with the corresponding locale and the window is reinitialized
    so that all labels can be translated to the new language. Let’s start by creating
    the *resource files*.


    Resource files have the `properties` extension that contain a list of properties
    and values. Each line respects the following pattern: `property_name=property_value`,
    if it doesn’t, it is not read. Each property name must be unique in the file,
    if there is a duplicate it is ignored and IntelliJ IDEA complains by underlining
    the property with red. For every language that needs to be supported, we need
    to create one property file that contains the same property names, but different
    values, as the values represent the translation of that value in each language.
    All files must have names that contain a common suffix and end with the language
    name and the country, separated by underscores, because these are the two elements
    needed to create a `Locale` instance. For our JavaFX application, we have three
    files, which are depicted in Figure [10-10](#463938_1_En_10_Chapter.xhtml#Fig10).


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig10_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Resource Bundle with three resource files'
