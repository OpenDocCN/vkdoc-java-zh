  raw: 'As for Java desktop applications written in Swing or AWT, they are rarely
    used anymore, and you might learn to build one during school, but are otherwise
    … they are considered antique. Nevertheless, there are legacy applications used
    by certain institutions and companies that have had a long run in their business,
    which are built with Swing. I’ve seen Swing applications used by restaurants to
    manage tables and orders and I think most supermarkets use Swing applications
    to manage shopping items. And this is why this section exists in this book, because
    you might end up working on maintaining such application and it is good to know
    the basics, because Swing is still a part of the JDK. All Swing components (AWT
    too) are part of the `java.desktop` module so if you want to use Swing components
    you have to declare a dependence on this module. In the following configuration
    snippet, you can see that the module of our project that uses Swing declares its
    dependency on the `java.desktop` module by using the `requires` directive, in
    its `module-info.java`.


    ```

    module chapter.ten.swing {

    requires java.desktop;

    }

    ```


    The application depicted in Figure [10-3](#463938_1_En_10_Chapter.xhtml#Fig3)
    was build using AWT , this section covers building something similar in Swing
    and adding more components to it. The core class of any Swing application is named
    `JFrame` and instances of this type are used to create windows with border and
    title. So let’s write some code to do just that.


    ```

    package com.apress.bgn.ch10;

    import javax.swing.*;

    import java.awt.*;

    public class SwingDemo extends JFrame {

    public static void main(String... args) {

    SwingDemo swingDemo = new SwingDemo();

    swingDemo.setTitle("Swing Demo Window");

    swingDemo.setSize(new Dimension(500,500));

    swingDemo.setVisible(true);

    }

    }

    ```


    In the code, an instance of `javax.swing.JFrame` is created, a title is set for
    it and we also set a size so when the window is created we can see something.
    To display the window, the `setVisible(true)` must be called on the `JFrame` instance.
    When you run the previous code, a window like the one depicted in Figure [10-4](#463938_1_En_10_Chapter.xhtml#Fig4)
    is displayed. By default the window is positioned in the upper left corner of
    your main monitor, but that can be changed by using some Swing components to compute
    a position relative to the screen size. Determining size and position of a Swing
    window relative to screen size is only limited by the amount of math you are willing
    to get into. Figure [10-4](#463938_1_En_10_Chapter.xhtml#Fig4) shows a simple
    Java Swing Window.


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig4_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Simple Java Swing application


    At this moment, if we close the displayed window, the application keeps running.
    Because by default, closing the window makes it invisible by calling `setVisible(false)`.
    If we want to change the default behavior to exiting the application we have to
    change the default operation performed when closing the window. This can be easily
    done by adding the following line of code after creating the `JFrame` instance.


    ```

    swingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    ```


    The `JFrame.EXIT_ON_CLOSE` constant is part of a set of constants that define
    application behavior when the window is closed. This one declares that the application
    should exit when the window is closed. The other available options are depicted
    in the following list:


    *   `DO_NOTHING_ON_CLOSE` - does nothing, including closing the window.


    *   `HIDE_ON_CLOSE` - the default option, which causes `setVisible(false)` to
    be called.


    *   `DISPOSE_ON_CLOSE` - an application can have more than one window, this option
    exits the application when the last displayable window is closed.


    Most Swing applications are written by extending the `JFrame` class to gain more
    control over its component, so the preceding code can also be written like this:


    ```

    package com.apress.bgn.ch10;

    import javax.swing.*;

    import java.awt.*;

    public class SwingDemo extends JFrame {

    public static void main(String... args) {

    SwingDemo swingDemo = new SwingDemo();

    swingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    swingDemo.setTitle("Swing Demo Window");

    swingDemo.setSize(new Dimension(500,500));

    swingDemo.setVisible(true);

    }

    }

    ```


    And now that we have a window, let’s start adding components, because changing
    the look-and-feel is pointless if we do not have more components so we can notice
    the change. Each Swing application has at least one `JFrame` that is the root,
    the parent of all other windows, because windows can be created by using the `JDialog`
    class as well. The `JDialog` is the main class for creating a dialog window, a
    special type of window that contains mostly a message and buttons to select options.
    Developers can use this class to create a custom dialogs or use `JOptionPane`
    class methods to create a variety of dialog windows.


    Back to adding components to a `JFrame` instance; components are added to a `JFrame`
    by adding them to its container. A reference to the `JFrame` container can be
    retrieved by calling `getContentPane()`. The default content pane is a simple
    intermediate container that inherits from `JComponent` , which extends `java.awt.Container`
    (Swing being an extension of AWT, most of its components are AWT extensions).
    For `JFrame`, the default content pane is an instance of `JPane`. This class has
    a field of type `java.awt.LayoutManager` that defines how other components are
    arranged in a `JPane`. The default content pane of a `JFrame` instance, uses a
    `java.awt.BorderLayout` as its layout manager, which splits a pane into five regions:
    EAST, WEST, NORTH, SOUTH, and CENTER. Each of the zones can be referred by a constant
    with a matching name defined in the `BorderLayout` . So if we would like to add
    an exit button to our application, we could add it to the south region by writing
    the following code.


    ```

    package com.apress.bgn.ch10;

    import javax.swing.*;

    import java.awt.*;

    import java.awt.event.ActionEvent;

    import java.awt.event.ActionListener;

    public class SwingDemo extends JFrame {

    private JPanel mainPanel;

    private JButton exitButton;

    public SwingDemo(String title) {

    super(title);

    mainPanel = (JPanel) this.getContentPane();

    exitButton = new JButton("Bye Bye!");

    exitButton.addActionListener(new ActionListener() {

    @Override

    public void actionPerformed(ActionEvent e) {

    System.exit(0);

    }

    });

    mainPanel.add(exitButton, BorderLayout.SOUTH);

    }

    public static void main(String... args) {

    SwingDemo swingDemo = new SwingDemo("Swing Demo Window");

    swingDemo.setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

    swingDemo.setSize(new Dimension(500, 500));

    swingDemo.setVisible(true);

    }

    }

    ```


    Figure [10-5](#463938_1_En_10_Chapter.xhtml#Fig5) shows the modified application.
    We’ve added an exit button in the SOUTH area of the content pane and underlined
    the overall region arrangement of the `BorderLayout`.


    Also, because the new button has to be the only way to exit our application, the
    `setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);` was replaced with `setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);`
    and an `java.awt.event.ActionListener` instance was attached to the button, so
    it could record the event of the button being clicked and react accordingly, in
    this case exiting the application. Most Swing components support listeners that
    can be defined to capture events that are performed on the object by the user
    and react in a certain way.


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig5_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Border layout zones'
