    ### The `String` Type


    The next special Java type on our list is `String`. You’ve seen it being used
    quite often until now, without a detailed explanation. Together with the primitive
    `int`, this is one of the most used types in Java. `String` instances model texts
    and perform all kinds of operations on them. The `String` type is a special type,
    because objects of this type are given special treatment by the JVM. If you remember
    the first image with memory contents, `String` objects are allocated in the heap
    in a special place called the `String Pool`. This section is dedicated to it;
    the `String` type is covered in detail, and a lot of your questions you might
    have about this type should get answered.


    Until now `String` variables were declared in this book like this:


    ```java

    String name= "John";

    ```


    But the `String` class has many constructors to initialize `String` variables.
    The following is a set of `String` variables being declared and initialized.


    ```java

    package com.apress.bgn.ch5.refs;

    public class StringDemo {

    public static void main(String... args) {

    1\.      String  text1 = null;

    2.

    3\.      String text21 = "two";

    4\.      String text22 = "two";

    5\.      String text23 = new String ("two");

    6.

    7\.      String piece1 = "t";

    8\.      String piece2  = "wo";

    9\.      String text24 = piece1 + piece2;

    10.

    11\.     char[] twoCh = {''t'', ''w'', ''o''};

    12\.     String text25 = new String(twoCh);

    }

    }

    ```


    Lines 3, 4, 5, 9, and 11 all define a `String` object with the same content *two*.
    We intentionally did that, creating multiple `String` objects with the same value.
    In real life applications, especially in this big data hype period, applications
    handle a lot of data, most of it text form. So, being able to compress the data
    and reuse it would reduce the memory consumption, also reducing memory access
    attempts also increases speed by reducing processing, which in turn reduces costs.


    Before continuing this section, I have to discuss what object equality means in
    Java. Objects are handled in Java using references to them. The `==` operator
    compares references; but if we want to compare the objects, we must use the `equals()`
    method. This is a special method inherited from the `Object` class.


    In Java `String` instances are immutable, which means they cannot be changed once
    created. This means that the JVM can reuse existing values to form new string
    values, without consuming additional memory. This process is called *interning*.
    One copy of each text value (literal) is saved to a special memory region called
    `String Pool`. When a new `String` variable is created and a value is assigned
    to it, the JVM first searches the pool for a string of equal value. If found,
    a reference to this memory address is returned, without allocating additional
    memory. If not found, it’ll be added to the pool and its reference is returned.


    This being said, considering the preceding sample code, we expect for `text21`
    and `text22` variable to point to the same `String` object in the pool, which
    means references are equal too. Let’s test that.


    ```java

    package com.apress.bgn.ch5.refs;

    public class StringDemo {

    public static void main(String... args) {

    String text21 = "two";

    String text22 = "two";

    if (text21 == text22) {

    System.out.println("Equal References");

    } else {

    System.out.println("Different References");

    }

    if (text21.equals(text22)) {

    System.out.println("Equal Objects");

    } else {

    System.out.println("Different Objects");

    }

    }

    }

    ```


    When running the preceding code, the following is printed in the console, proving
    the previous affirmations and the existence of the `String pool`.


    ```

    Equal References

    Equal Objects

    ```


    Figure [5-15](#463938_1_En_5_Chapter.xhtml#Fig15) shows an abstract representation
    of the memory contents when the code is executed.


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig15_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    String Pool example


    When a new `String` object is created using the new operator, the JVM allocate
    new memory for a new object and store it in the heap, so the `String pool` won’t
    be used. This results in every `String` object created like this having its own
    memory region with its own address. That is why if we were to compare variable
    `text22` and variable `text23`, from the initial code sample, we would expect
    their references to be different, but the objects should be equal. Let’s test
    that.


    ```java

    package com.apress.bgn.ch5.refs;

    public class StringDemo {

    public static void main(String... args) {

    String text22 = "two";

    String text23 = new String ("two");

    if (text22 == text23) {

    System.out.println("Equal References");

    } else {

    System.out.println("Different References");

    }

    if (text22.equals(text23)) {

    System.out.println("Equal Objects");

    } else {

    System.out.println("Different Objects");

    }

    }

    }

    ```


    When running the preceding code, the following is printed in the console, proving
    everything that was mentioned before.


    ```

    Different References

    Equal Objects

    ```


    I leave it up to you to imagine what the stack and heap memory look like in the
    previous example.^([^(59)](#fn59))


    The `String Pool` has a default size of 1009. Starting with Java 6, its size can
    be modified using the `-XX:StringTableSize`.


