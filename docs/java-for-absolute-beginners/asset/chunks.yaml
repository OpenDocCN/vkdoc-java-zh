    To make it clear, a `Publisher` implementation might not pass all the tests, because
    of design decisions that are specific to the application you are building. In
    our case, the `IntPublisher` is simplistic; and when running the `createFlowPublisher`
    method of all the executed tests, not many of them pass and most are ignored,
    as depicted in Figure [12-5](#463938_1_En_12_Chapter.xhtml#Fig5).


    ![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig5_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig5_HTML.jpg)


    Figure 12-5 Test NG Reactive Publisher


    The reason tests do not pass or are ignored is that the purpose of our implementation
    does not match those specific tests (e.g., `maySupportMultiSubscribe`, `maySignalLessThanRequestedAndTerminateSubscription`,
    and `mustSignalOnMethodsSequentially`). We can test the processor and subscriber
    that we defined in the previous section by extending the testing classes, but
    I’ll leave that as an exercise to you, because there is one more interesting thing
    I would like to cover in this chapter.


    ## Using Project Reactor


    As I’ve mentioned, the JDK support for reactive programming is scarce. Publishers,
    processors, and subscribers should function asynchronously and all that behavior
    must be implemented by the developer, which can be a bit of a pain. The only thing
    that the JDK is suitable for at the moment is providing a common interface between
    all the other already existing implementations. And there are a lot of them, providing
    a lot more useful classes for more specialized reactive components and utility
    methods to create and connect them easier. The one I personally fancy the most
    as a Spring aficionado is **Project Reactor**, the same one favored by the Spring
    development team.


    Project Reactor is one of the first libraries for reactive programming and its
    classes provide a non-blocking stable foundation with efficient demand management
    for building reactive applications. It works with Java 8, but does provide adapter
    classes for JDK9 reactive streams classes that can be used within a JDK 11 project
    as well. Project Reactor is suitable for microservices applications and provides
    a lot more classes designed to make programming reactive application more practical
    than the JDK does. Project Reactor provides two main publisher implementations:
    `reactor.core.publisher.Mono<T>` which is a reactive stream publisher limited
    to publishing zero or one element and `reactor.core.publisher.Flux<T>`, which
    is a reactive stream publisher with basic flow operators.


    The advantage of using Project Reactor is that we have a lot more classes and
    methods to work with. There are static factories that can create publishers and
    methods that allow operations to be chained way more easily. The Project Reactor
    team did not like the name `Processor`, so the intermediary components are called
    **operators**.


    If you look in the official documentation, you will most likely encounter the
    schema in Figure [12-6](#463938_1_En_12_Chapter.xhtml#Fig6).^([^(90)](#fn90))


    ![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig6_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig6_HTML.jpg)


    Figure 12-6 Project Reactor Flux Publisher implementation


    Figure [12-6](#463938_1_En_12_Chapter.xhtml#Fig6) is an abstract schema of how
    the `Flux` publisher works. It emits elements, throws exceptions, and completes
    when there are no more elements to publish. The Project Reactor team found a prettier
    way to draw it. The drawing for the `Mono` implementation is similar (see [`http://projectreactor.io/docs/core/release/api/reactor/core/publisher/Mono.html`](http://projectreactor.io/docs/core/release/api/reactor/core/publisher/Mono.html)
    ).


    But let’s put that aside and look at a few code samples. Creating `Flux` instances
    is very easy using the multiple utility methods in this class. But before starting
    to publish elements, let’s design a general subscriber that does nothing else
    than print values, because we need it to make sure our `Flux` publisher actually
    works.


    To write a subscriber using Project Reactor API, you have multiple options. You
    can implement the `org.reactivestreams.Subscriber<T>` directly.


    ```

    package com.apress.bgn.ch12.reactor;

    import org.reactivestreams.Subscriber;

    import org.reactivestreams.Subscription;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    public class GenericSubscriber implements Subscriber {

    private static final Logger log =

    LoggerFactory.getLogger(GenericSubscriber.class);

    private Subscription subscription;

    @Override

    public void onSubscribe(Subscription subscription) {

    if (this.subscription == null) {

    this.subscription = subscription;

    this.subscription.request(1);

    } else {

    subscription.cancel();

    }

    }

    @Override

    public void onNext(T element) {

    log.info("consumed {} ", element);

    subscription.request(1);

    }

    @Override

    public void onError(Throwable t) {

    log.error("Unexpected issue!", t);

    }

    @Override

    public void onComplete() {

    log.info("All done!");

    }

    }

    ```


    But, this can be avoided by either implementing `reactor.core.CoreSubscriber<T>`,
    the reactor base interface for subscribers, or even better, by extending `BaseSubscriber<T>`
    class, which provides basic subscriber functionality. The behavior of subscriber
    typical methods can be modified by overriding methods with then same name, but
    prefixed with `hook`. In the next code snippet, you can see how easy it is to
    write a subscriber using Project Reactor.


    ```

    package com.apress.bgn.ch12.reactor;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import reactor.core.publisher.BaseSubscriber;

    public class GenericSubscriber extends BaseSubscriber {

    private static final Logger log =

    LoggerFactory.getLogger(GenericSubscriber.class);

    @Override

    protected void hookOnNext(T value) {

    log.info("consumed {} ", value);

    super.hookOnNext(value);

    }

    }

    ```


    Ta, da! Now we have a subscriber class, let’s create a reactive publisher that
    serves integers from an infinite integer stream to use an instance of this class.


    ```

    package com.apress.bgn.ch12.reactor;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import reactor.core.publisher.Flux;

    import java.util.Random;

    import java.util.stream.Stream;

    public class ReactorDemo {

    private static final Logger log = LoggerFactory.getLogger(ReactorDemo.class);

    private static final Random random = new Random();

    public static void main(String... args) {

    Flux intFlux = Flux.fromStream(

    Stream.generate(() -> random.nextInt(150))

    );

    intFlux.subscribe(new GenericSubscriber());

    }

    }

    ```


    If you run the code, you see that all the generated integer values are printed.
    A `Flux` can be created from a multiple of sources, including arrays and other
    publishers. And for special situations, to avoid returning a `null` value, an
    empty `Flux` can be created by calling the `empty()` method.


    ```

    String[] names = {"Joy", "John", "Anemona", "Takeshi"};

    Flux.fromArray(names).subscribe(new GenericSubscriber());

    Flux intFlux = Flux.empty();

    intFlux.subscribe(new GenericSubscriber());

    ```


    But the most awesome method is named `just(..)` and it is provided for `Flux`
    and `Mono` both. It takes one or more values and returns a publisher, a `Flux`
    or a `Mono`, depending on the type being called on.'
