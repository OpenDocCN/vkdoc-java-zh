- fmt: '### Shift Operators


    The shift operators are operators working at bit level. Because moving bits around
    is a sensitive operation, the only requirement of these operands is for arguments
    to be integers. The operand to the left of the operator is the number that is
    shifted, and the operand to the right of the operator is the number of bits that
    is shifted. There are three shift operators in Java, and each of them can be composed
    with the assignment operator to do the shifting and assign the result to the original
    variable on the spot. Let’s analyze each of them separately.


    - `<<` shift left. Given a number represented in binary, this operator shifts
    bits to the left. Let’s look at the following piece of code.


    ```

    public class ShiftDemo {

    public static void main(String... args) {

    byte b1 = 12; // 00001100

    byte result = (byte) (b1 << 3);

    str = String.format("%8s",  Integer.toBinaryString(result & 0xFF))

    .replace('' '', ''0'');

    System.out.println("result: " + result); // 01100000

    }

    }

    ```


    When bits are shifted to the left, the remaining positions are filled with `0`.
    Also, the number becomes bigger, and the new value is its old value multiplied
    with *−*2^(*N*), where `N` is the second operand. When the preceding code is executed,
    the following output is printed in the console.


    ```

    b1: 12

    binary result: 00001100

    result:  96

    binary result: 01100000

    ```


    The preceding code can be written like this: `b <<= 3`, using the composed operators,
    without the need to declare another variable.


    So, the result is 12 * 2³. The way that the bits shifted is shown in Figure [6-6](#463938_1_En_6_Chapter.xhtml#Fig6).


    ![../images/463938_1_En_6_Chapter/463938_1_En_6_Fig6_HTML.jpg](images/463938_1_En_6_Chapter/463938_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    The effect of the `<<` operator


    - `>>` shift right. Given a number represented in binary, this operator shifts
    bits to the right. Let’s look at the following piece of code.


    ```

    public class ShiftDemo {

    public static void main(String... args) {

    byte b1 = 96; // 01100000

    byte result = (byte) (b1 >> 3);

    str = String.format("%8s", Integer.toBinaryString(result & 0xFF))

    .replace('' '', ''0'');

    System.out.println("result: " + result); // 00001100

    }

    }

    ```


    When bits are shifted to the right, the remaining positions are filled with `0`
    if the number is positive. If the number is negative, the remaining positions
    are replaced with 1. This is done to preserve the sign of the number. Also, the
    number becomes smaller, and the new value is its old value divided by *−*2^(*N*),
    where `N` is the second operand. When the preceding code is executed, the following
    output is printed in the console.


    ```

    b1: 96

    binary result: 01100000

    result: 12

    binary result: 00001100

    ```


    The preceding code can be written like this: `b >>= 3`, using the composed operators,
    without the need to declare another variable.


    So, the result is 96 / 2³. And the way that the bits shifted for a positive number
    and a negative number is displayed in Figure [6-7](#463938_1_En_6_Chapter.xhtml#Fig7).


    ![../images/463938_1_En_6_Chapter/463938_1_En_6_Fig7_HTML.jpg](images/463938_1_En_6_Chapter/463938_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    The effect of the `>>` operator


    - `>>>` unsigned shift right. Also called logical shift. Given a number represented
    in binary, this operator shifts bits to the right, together with the sign bit,
    and the remaining positions are replaced with zero. This is why, the result is
    always a positive number. Let’s look at the following piece of code.


    ```

    public class ShiftDemo {

    public static void main(String... args) {

    byte b1 = -16; // 11110000

    byte result = (byte) (b1 >>> 3);

    str = String.format("%8s", Integer.toBinaryString(result & 0xFF))

    .replace('' '', ''0'');

    System.out.println("result: " + result); // 00011110

    }

    }

    ```


    When the preceding code is executed, the following output is printed in the console.


    ```

    b1: -16

    binary result: 11110000

    result:  30

    binary result: 00011110

    ```


    The preceding code can be written like this: `b >>>= 3`, using the composed operators,
    without the need to declare another variable.


    And the way that the bits shifted is displayed in Figure [6-8](#463938_1_En_6_Chapter.xhtml#Fig8).


    ![../images/463938_1_En_6_Chapter/463938_1_En_6_Fig8_HTML.jpg](images/463938_1_En_6_Chapter/463938_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    The effect of the `>>>` operator


    As all bitwise operators, shifting operators promote `char`, `byte`, or `short`
    type variables to `int`, which is why an explicit conversion is necessary. As
    you have probably noticed, shifting bits on negative numbers is tricky, it is
    easy for the resulted number to be outside the interval of allowed values for
    a type, and an explicit conversion can lead to loss of precision or serious anomalies.
    So, why use them? Because they are fast. Make sure to test intensively when using
    shifting operators.


    ### The Elvis Operator


    The Elvis operator is the only ternary operator in Java. Its function is equivalent
    to a java method that tests a condition and depending of the outcome, returns
    a value. The following is a template for the Elvis operator.


    ```

    variable = (condition) ? val1 : val2

    ```


    The following `if` statement is equivalent.


    ```

    variable = methodName(..)

    type methodName(..) {

    if (condition) {

    return val1;

    } else {

    return val2;

    }

    }

    ```


    The reason this operator is called the Elvis operator is because the question
    mark resembles Elvis Presley’s hair, and the column resembles the eyes. Let’s
    see it in action.


    ```

    [jshell> int a = 4

    a ==> 4

    |  created variable a : int

    [jshell> int result = a > 4 ? 3 : 1;

    result ==> 1

    |  created variable result : int

    [jshell> String a2 = "test"

    a2 ==> "test"

    |  created variable a2 : String

    [jshell> var a3 = a2.length() > 3 ? "hello": "bye-bye"

    a3 ==> "hello"

    |  created variable a3 : String

    ```


    This operator is practical when you have a simple `if` statement that contains
    only one expression per branch, because using this operator you can compact the
    whole thing in one expression, one line of code. Make sure that when using it,
    the readability of the code is improved, because from a performance point of view,
    there is no difference between an `if` statement and the equivalent Elvis operator
    expression. Another advantage of using the Elvis operator is that the expression
    can initialize a variable in a single in-line statement.


    ## Summary


    In this chapter, you learned that


    - Java has a lot of operators, simple and composed.

    - Bitwise operators are fast, but dangerous.

    - The `+` operator does different things in different contexts.

    - Java has a ternary operator that accepts three operands: a boolean expression
    and two objects of the same type. The result of the evaluation of the boolean
    expression decides which operand is the result of the statement.


    The purpose of this chapter is to make you familiar with all the operators that
    are used throughout the book, to help you understand the provided solutions, and
    even to design and write your own.


