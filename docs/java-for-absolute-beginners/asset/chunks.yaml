- fmt: '# Concurrency Specific Types


    A Java program can have more than one execution thread. By default, when a Java
    program is executed, a thread is created for the code that is called from the
    `main` method and a few other utility threads are created and executed in parallel
    for JVM related things. These threads can easily be accessed using static utility
    methods defined in the `java.lang.Thread` class. The following code sample does
    just that: extracts the references to the `Thread` instances and prints their
    name in the console.


    ```

    package com.apress.bgn.ch5;

    public class ListJvmThreads {

    public static void main(String... args) {

    var threadSet = Thread.getAllStackTraces().keySet();

    var threadArray = threadSet.toArray(new Thread[threadSet.size()]);

    for (int i = 0; i < threadArray.length; ++i) {

    System.out.println("thread name: " + threadArray[i].getName());

    }

    }

    }

    ```


    The output produced by running the code in JDK 11 prints the following.


    ```

    thread name: Reference Handler

    thread name: Monitor Ctrl-Break

    thread name: Finalizer

    thread name: main

    thread name: Signal Dispatcher

    thread name: Common-Cleaner

    ```


    The thread named `main` is the thread that executes the developer written code.
    The developer can write code to start its own threads from the main thread. The
    simplest way to create a custom thread is to create a class that extends the `Thread`
    class. The `Thread` class implements an interface named `Runnable` that declares
    a single method named `run()`. The `Thread` class declares a method named `start()`.
    When this method is called, the body of the `run()` method is executed in a separate
    execution thread.^([^(60)](#fn60)) Thus, when extending the `Thread` class, the
    `run()` method must be overridden.


    The following example depicts a class named `CounterThread`. The contents of the
    `run()` method is designed to pause the execution from time to time by calling
    the `Thread.sleep(..)` utility method. The body of the method is wrapped in two
    lines of code that print the name of the thread and a starting message and the
    name of the thread and an ending message. This is necessary to slow down the execution
    of this type of thread, so that we can clearly see they are executed in parallel.


    ```

    package com.apress.bgn.ch5;

    public class CounterThread extends Thread {

    @Override

    public void run() {

    System.out.println(this.getName() + " started...");

    for (int i = 0; i < 10; ++i) {

    try {

    Thread.sleep(i * 10);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    System.out.println(this.getName() + " ended.");

    }

    }

    ```


    To test our thread class is as simple as instantiating it a few times and calling
    the `start()` method.


    ```

    package com.apress.bgn.ch5;

    public class ThreadDemo {

    public static void main(String... args) {

    for (int i = 0; i < 10; ++i) {

    new CounterThread().start();

    }

    }

    }

    ```


    In the example, ten instances of class `CounterThread` were created and the `start()`
    method was called for each of them. When the previous code is executed, a log
    similar to the following should print in the console.


    ```

    Thread-0 started...

    Thread-3 started...

    Thread-8 started...

    Thread-9 started...

    Thread-7 started...

    Thread-6 started...

    Thread-1 started...

    Thread-2 started...

    Thread-4 started...

    Thread-5 started...

    Thread-4 ended.

    Thread-1 ended.

    Thread-9 ended.

    Thread-7 ended.

    Thread-5 ended.

    Thread-8 ended.

    Thread-0 ended.

    Thread-6 ended.

    Thread-2 ended.

    Thread-3 ended.

    ```


    Another way to create threads is by creating a class that implements the `Runnable`
    interface. This is useful when we want to customize the execution in the `run`
    method a little more and maybe extend another class. Or, considering that the
    `Runnable` declares one method, lambda expressions can be used too. Let’s declare
    the equivalent `Runnable` implementation.


    ```

    package com.apress.bgn.ch5;

    import  static  java.lang.Thread.*;

    public class CounterRunnable implements Runnable {

    @Override

    public void run() {

    System.out.println(Thread.currentThread().getName() + " started...");

    for (int i = 0; i < 10; ++i) {

    try {

    Thread.sleep(i * 10);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    System.out.println(Thread.currentThread().getName() + " ended.");

    }

    }

    ```


    Because we no longer have access to the name of the thread, to print it we must
    use another utility method `Thread.currentThread()` to retrieve a reference to
    the current thread in execution. The `Thread` class provides a constructor with
    a parameter of type `Runnable`, this means it can be called with any argument
    of a type that implements `Runnable`. And thus, to create threads using `CounterRunnable`,
    code similar to the following example can be written.


    ```

    package com.apress.bgn.ch5;

    public class LambdaRunnableDemo {

    public static void main(String... args) {

    for (int i = 0; i < 10; ++i) {

    new Thread(new CounterRunnable()).start();

    }

    }

    }

    ```


    If this code is run, we’ll get a similar output.


    This is a good candidate for using lambda expressions, because `Runnable` can
    be implemented on the spot. So, the previous code can also be written as follows.


    ```

    for (int i = 0; i  {

    System.out.println(currentThread().getName() + " started...");

    for (int j = 0; j < 10; ++j) {

    try {

    sleep(j * 10);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    System.out.println(currentThread().getName() + " ended.");

    }).start();

    }

    ```


    Java provides thread management classes that can create and manage threads, so
    the developer mustn’t declare the threads explicitly. The concurrency framework
    is a subject too advanced for this book, but if this section has made you curious,
    the Oracle Concurrency tutorial is at [`https://docs.oracle.com/javase/tutorial/essential/concurrency/index.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/index.html).


    ## Summary


    In this chapter, you learned how memory for a Java program is administered by
    the JVM and the basics of the most used Java data types. We discussed the following.


    * how the memory is managed during the execution of a Java program

    * the differences between primitive and reference types

    * how many primitive types are defined in Java

    * why the `String` type is special

    * how to work with calendar dates

    * how arrays are declared and used

    * how `null` is used

    * how to declare and use collection implementations


    If some of the examples in this chapter seem complicated, do not be discouraged.
    It is difficult to explain certain concepts without providing working code that
    you can execute, test, and even modify yourself. Unfortunately, this requires
    the use of concepts introduced in later chapters (e.g., `for` and `if` statements).
    Make a note of every concept that it is not clear now, and the page number, and
    return to this chapter after you read about the concept in more detail later in
    the book.


