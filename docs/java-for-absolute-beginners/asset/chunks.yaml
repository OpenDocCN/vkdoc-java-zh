    初始代码示例中的第 11 和 12 行展示了如何从 `char[3]` 数组创建 `String` 实例。直到 Java 8，这内部就是 String 的初始表示形式：字符数组。一个字符占用
    2 个字节，这意味着 *Strings* 会消耗大量内存。在 Java 9 中，引入了一种称为**紧凑字符串（Compact String）** 的新表示形式，它根据内容使用
    `byte[]` 或 `char[]`。这意味着从 Java 9 开始，你的字符串处理应用程序消耗的内存会显著降低。

