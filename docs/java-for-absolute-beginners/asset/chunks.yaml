- fmt: "# 让类打印“Hello World!”\n\n是时候让我们的类打印“Hello World!”了。为此，我们需要向类中添加一个特殊方法。任何Java桌面应用程序都有一个名为`main`的特殊方法，它必须在顶级类中声明。JRE会调用此方法来运行Java程序/应用程序，我将其称为**入口点**。如果没有这样的方法，Java项目就只是一堆类的集合，这些类不可运行、无法执行，也无法执行某些功能。可以这样想象：这就像你有一辆车，但无法启动它，因为点火锁芯不见了。从各方面来看，它确实是一辆车，但它无法实现汽车的主要目的——带你去某个地方。你可以将`main`方法想象成点火锁芯，JRE将钥匙插入其中来启动你的应用程序。让我们将该方法添加到`HelloWorld`类中。^([^(47)](#fn47))\n\
    \n```\n/**\n* Created on 3/3/18.\n*/\npublic class HelloWorld {\npublic static\
    \ void main(String... args) {\nSystem.out.println(\"Hello  World!\");\n}\n}\n\
    ```\n\n现在，让我们运行这个类。在IntelliJ IDEA中，你也有两个选项：从“Run”菜单中选择**Run '[ClassName]'**选项，或者右键单击类主体，然后从出现的菜单中选择**Run\
    \ '[ClassName]'.main()**。^([^(48)](#fn48))\n\n图[3-17](#463938_1_En_3_Chapter.xhtml#Fig17)展示了可用于执行类的菜单项以及执行结果。\n\
    \n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig17_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig17_HTML.jpg)\n\
    \n**图 3-17** IntelliJ IDEA——如何执行一个Java类\n\n所以，这是Java项目最基本的结构。这个项目非常简单，甚至可以从命令行手动编译。那么，让我们来试试。\n\
    \n## HelloWorld! 项目的手动编译与执行\n\n你可能已经注意到IntelliJ IDEA中的**Terminal**按钮。点击该按钮后，编辑器内会打开一个终端窗口。对于Windows系统，它是一个命令提示符实例；对于Linux和macOS系统，则是默认的shell。IntelliJ会在你的项目根目录中打开终端。下面说明你需要执行的操作。\n\
    \n1.  通过执行以下命令进入`src`目录：\n\n    ```\n    cd src\n    ```\n\n    `cd`是一个在Windows和Unix系统中都能工作的命令，是*change\
    \ directory*（更改目录）的缩写。\n\n2.  通过执行以下命令编译`HelloWorld.java`文件：\n\n    ```\n    javac\
    \ HelloWorld.java\n    ```\n\n    `javac`是一个JDK可执行文件，用于编译Java文件，IntelliJ IDEA在后台会调用它。\n\
    \n3.  通过执行以下命令运行`HelloWorld.class`文件生成的字节码：\n\n    ```\n    java HelloWorld\n\
    \    ```\n\n图[3-18](#463938_1_En_3_Chapter.xhtml#Fig18)展示了在IntelliJ IDEA的终端中执行这些命令的过程。\n\
    \n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig18_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig18_HTML.jpg)\n\
    \n**图 3-18** 在IntelliJ IDEA的终端中手动编译并运行HelloWorld类\n\n看起来很简单，对吧？实际上确实很简单，因为没有定义任何包或Java模块。但是，等等，这可行吗？嗯，是的。如果你没有定义包，该类仍然属于一个未命名的默认包，该包由JSE平台默认提供，用于开发小型、临时性和教育性的应用程序，就像你正在构建的这个一样。那么，让我们让项目稍微复杂一点，为我们的类添加一个命名包。\n\
    \n## 将HelloWorld类放入包中\n\n在图[3-14](#463938_1_En_3_Chapter.xhtml#Fig14)中，菜单里有一个**Package**选项。因此，右键单击`src`目录并选择它。会出现一个对话框窗口，你需要在其中输入包名。输入**com.sandbox**。图[3-19](#463938_1_En_3_Chapter.xhtml#Fig19)显示了该对话框窗口。即使包已经创建好了，我还是输入了相同的名称，以展示IDE如何警告你正在尝试创建同名的包。\n\
    \n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig19_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig19_HTML.jpg)\n\
    \n**图 3-19** 在IntelliJ IDEA中创建包\n\n所以，我们创建了包，但类并不在其中。嗯，要把它放进去的方法是，选中它并将其拖入包中。会出现一个用于移动类的对话框窗口，因为编辑器必须修改该类，通过添加`package`语句使其属于该包。并且它需要你的批准才能执行此操作。图[3-20](#463938_1_En_3_Chapter.xhtml#Fig20)展示了这个对话框窗口。\n\
    \n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig20_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig20_HTML.jpg)\n\
    \n**图 3-20** 在IntelliJ IDEA中将类移动到包中\n\n点击**Refactor**按钮，看看类发生了什么变化。该类现在应该以`package\
    \ com.sandbox;`声明开头。如果你重新构建项目，然后查看目录结构，你会看到类似于图[3-21](#463938_1_En_3_Chapter.xhtml#Fig21)所示的内容。\n\
    \n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig21_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig21_HTML.jpg)\n\
    \n**图 3-21** 添加`com.sandbox`包后的新目录结构\n\n如果你手动编译和执行该类，现在必须考虑包，因此你的命令变为：\n\n```\n\
    ~/sandbox/src:  $ javac com/sandbox/HelloWorld.java\n~/sandbox/src:  $ java com/sandbox/HelloWorld\n\
    Hello World!\n```\n\n但事情并没有就此结束，因为我们还有Java模块。那么，这又是怎么回事呢？我们的代码在没有`module-info.java`文件的情况下是如何运行的呢？嗯，有一个默认的未命名模块，所有JAR（无论是否模块化）以及类路径上的类都包含在其中。这个默认的未命名模块导出所有包并读取所有其他模块。因为它没有名称，所以不能被命名的应用程序模块所要求和读取。因此，即使你的小项目似乎能在JDK\
    \ 9及更高版本上工作，它也无法被其他模块访问；但它能工作是因为它可以访问其他模块。（这确保了与旧版本JDK的向后兼容性，但根据项目的复杂性，兼容性并不总是能得到保证。）话虽如此，让我们为项目添加一个模块。\n\
    \n## 配置`com.sandbox`模块\n\n配置模块就像在`src`目录下添加一个`module-info.java`文件一样简单。在图[3-14](#463938_1_En_3_Chapter.xhtml#Fig14)中，列出的菜单里有一个`module-info.java`选项，如果你选择它，IDE会为你生成该文件。一切都很顺利，如果你不喜欢为你生成的模块名称，你可以更改它。我将其更改为`com.sandbox`，以遵守Oracle开发者建立的模块命名约定。\n\
    \n```\n/**\n* Created on 3/3/18.\n*/\nmodule com.sandbox {\n}\n```\n\n现在我们有了一个模块，会发生什么？从IDE的角度来看，变化不大。但是，如果你想手动编译一个模块，你需要了解一些事情。我使用以下命令编译了我们的模块：\n\
    \n```\n~/sandbox/src/: $ javac -d ../out/com.sandbox \\\nmodule-info.java    \\\
    \ncom/sandbox/HelloWorld.java\n```"
  raw: "It is time we make the class print *Hello World!*. For that we need to add\
    \ a special method to the class. Any Java desktop application has a special method\
    \ named `main` that has to be declared in a top-level class. This method is called\
    \ by the JRE to run the Java program/application and I call it the **entry point**.\
    \ Without such a method, a Java project is a collection of classes that are not\
    \ runnable, cannot be executed, and cannot perform certain functions. Imagine\
    \ it this way: it’s like having a car, but you have no way of starting it, because\
    \ the ignition lock cylinder is missing. By for all intents and purposes, it is\
    \ a car, but it cannot perform the main purpose of a car, which is to take you\
    \ somewhere. You can imagine the main method as the ignition lock cylinder, where\
    \ the JRE inserts the key to get your application running. Let’s add that method\
    \ to the `HelloWorld` class.^([^(47)](#fn47))\n\n```\n/**\n* Created on 3/3/18.\n\
    */\npublic class HelloWorld {\npublic static void main(String... args) {\nSystem.out.println(\"\
    Hello  World!\");\n}\n}\n```\n\nNow, let’s run this class. In IntelliJ IDEA, you\
    \ have also two options: from the Run menu choose the **Run '[ClassName]'** option\
    \ , or right-click the class body and select **Run '[ClassName]'.main()** from\
    \ the menu that appears.^([^(48)](#fn48))\n\nFigure [3-17](#463938_1_En_3_Chapter.xhtml#Fig17),\
    \ depicts the menu items that you can use to execute the class, as well as the\
    \ result of the execution.\n\n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig17_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig17_HTML.jpg)\n\
    \nFigure 3-17\n\nIntelliJ IDEA—how to execute a Java class\n\nSo, this is the\
    \ most basic structure for a Java Project. This project is so simple that it can\
    \ also be compiled manually from the command line. So, let’s do that.\n\n####\
    \ The HelloWorld! Project Compiled and Executed Manually\n\nYou’ve probably noticed\
    \ the **Terminal** button in your IntelliJ IDEA. If you click that button, inside\
    \ the editor a terminal window will be opened. For Windows it is a Command Prompt\
    \ instance, for Linux and macOS are the default shell. And IntelliJ open your\
    \ terminal right into your project root. The following explains what you have\
    \ to do.\n\n1.  Enter the `src` directory by executing the following command:\n\
    \n    ```\n    cd src\n    ```\n\n    `cd` is a command that works in Windows\
    \ and Unix systems and is short for *change directory* .\n\n2.  Compile the `HelloWorld.java`\
    \ file by executing:\n\n    ```\n    javac HelloWorld.java\n    ```\n\n    `javac`\
    \ is a JDK executable used to compile Java files that IntelliJ IDEA calls in the\
    \ background.\n\n3.  Run the resulting bytecode from the `HelloWorld.class` file\
    \ by executing:\n\n    ```\n    java HelloWorld\n    ```\n\nFigure [3-18](#463938_1_En_3_Chapter.xhtml#Fig18)\
    \ depicts the execution of those commands in a terminal in IntelliJ IDEA.\n\n\
    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig18_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig18_HTML.jpg)\n\
    \nFigure 3-18\n\nManually compile and run the HelloWorld class in a terminal inside\
    \ IntelliJ IDEA\n\nLooks simple, right? And it actually is simple, because no\
    \ packages or Java modules were defined. But wait, is that possible? Well, yes.\
    \ If you did not define a package, the class is still part of an unnamed default\
    \ package that is provided by default by the JSE platform for the development\
    \ of small, temporary, and educational applications like the one you are building.\
    \ So, let’s make our project a little bit more complicated and add a named package\
    \ for our class to be in.\n\n#### Putting the HelloWorld Class in a Package\n\n\
    In Figure [3-14](#463938_1_En_3_Chapter.xhtml#Fig14), there is a **Package** option\
    \ in the menu. So right-click the `src` directory and select it. A dialog window\
    \ appears where you must enter the package name. Enter **com.sandbox** . Figure\
    \ [3-19](#463938_1_En_3_Chapter.xhtml#Fig19) shows the dialog windows. Even though\
    \ the package was already created, I introduced the same name again to show how\
    \ the IDE warns that you are trying to create a package with the same name.\n\n\
    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig19_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig19_HTML.jpg)\n\
    \nFigure 3-19\n\nCreate package in IntelliJ IDEA\n\nSo, we created the package,\
    \ but the class is not in it. Well, the way to get it there, is to select it and\
    \ drag it into it. A dialog window for moving the class appear, because the editor\
    \ must modify the class to make it to belong to the package by adding a `package`\
    \ statement. And it requires your approval for the operation. Figure [3-20](#463938_1_En_3_Chapter.xhtml#Fig20)\
    \ depicts this dialog window.\n\n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig20_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig20_HTML.jpg)\n\
    \nFigure 3-20\n\nMoving a class into a package in IntelliJ IDEA\n\nClick the **Refactor**\
    \ button and look at what happens to the class. The class should now start with\
    \ a `package com.sandbox;` declaration. If you rebuild your project, and then\
    \ look at the directory structure, you see something similar to what is depicted\
    \ in Figure [3-21](#463938_1_En_3_Chapter.xhtml#Fig21).\n\n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig21_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig21_HTML.jpg)\n\
    \nFigure 3-21\n\nNew directory structure after adding the com.sandbox package\n\
    \nIf you compile and execute the class manually, you must consider the package\
    \ now, so your commands change to\n\n```\n~/sandbox/src:  $ javac com/sandbox/HelloWorld.java\n\
    ~/sandbox/src:  $ java com/sandbox/HelloWorld\nHello World!\n```\n\nBut things\
    \ do not end here, because we still have Java modules. So, what about that? How\
    \ is our code running without a `module-info.java` file? Well, there is a default\
    \ unnamed module, and all JARs, modular or not, and classes on the classpath are\
    \ contained in it. This default and unnamed module exports all packages and reads\
    \ all other modules. Because it does not have a name it cannot be required and\
    \ read by named application modules. Thus, even if your small project seems to\
    \ work with JDKs in versions 9 and higher, it cannot be accessed by other modules;\
    \ but it works because it can access others. (This ensures backward compatibility\
    \ with older versions of the JDK, but depending on the complexity of the project,\
    \ compatibility is not always ensured.) This being said, let’s add a module to\
    \ our project.\n\n#### Configuring the com.sandbox Module\n\nConfiguring a module\
    \ is as easy as adding a `module-info.java` file under the `src` directory. In\
    \ Figure [3-14](#463938_1_En_3_Chapter.xhtml#Fig14), in the menu listed there\
    \ is a `module-info.java` option and if you select that, the IDE generates the\
    \ file for you. All is well and fine, and if you do not like the module name that\
    \ was generated for you, you can change it. I changed it to `com.sandbox` to respect\
    \ the module naming convention established by Oracle developers.\n\n```\n/**\n\
    * Created on 3/3/18.\n*/\nmodule com.sandbox {\n}\n```\n\nWhat happens now that\
    \ we have a module? Not much from the IDEs point of view. But if you want to compile\
    \ a module manually, you have to know a few things. I compiled our module using\
    \ the following command:\n\n```\n~/sandbox/src/: $ javac -d ../out/com.sandbox\
    \ \\\nmodule-info.java    \\\ncom/sandbox/HelloWorld.java\n```"
  trans: "\n是时候让这个类打印 *Hello World!* 了。为此，我们需要给这个类添加一个特殊的方法。任何 Java 桌面应用程序都有一个名为 `main`\
    \ 的特殊方法，它必须在顶层类中声明。JRE 会调用这个方法来运行 Java 程序/应用程序，我将其称为**入口点**。如果没有这个方法，一个 Java 项目就只是一堆类的集合，这些类不可运行、无法执行，也无法执行某些功能。可以这样想象：这就像你有一辆车，但无法启动它，因为点火锁芯不见了。从各方面来看，它确实是一辆车，但它无法实现汽车的主要目的——带你去某个地方。你可以把\
    \ main 方法想象成点火锁芯，JRE 将钥匙插入其中，让你的应用程序运行起来。让我们把这个方法添加到 `HelloWorld` 类中。^(⁴⁷)\n\n\
    ```\n/**\n* Created on 3/3/18.\n*/\npublic class HelloWorld {\npublic static void\
    \ main(String... args) {\nSystem.out.println(\"Hello  World!\");\n}\n}\n```\n\n\
    现在，让我们运行这个类。在 IntelliJ IDEA 中，你也有两个选项：从“运行”菜单中选择**运行 '[ClassName]'** 选项，或者右键单击类主体，然后从出现的菜单中选择**运行\
    \ '[ClassName]'.main()**。^(⁴⁸)\n\n图 3-17 展示了可用于执行该类的菜单项以及执行结果。\n\n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig17_HTML.jpg](img/463938_1_En_3_Fig17_HTML.jpg)\n\
    \n图 3-17\n\nIntelliJ IDEA——如何执行一个 Java 类\n\n所以，这就是 Java 项目最基本的结构。这个项目非常简单，甚至可以从命令行手动编译。那么，让我们来试试。\n\
    \n#### 手动编译和执行 HelloWorld! 项目\n\n你可能已经注意到了 IntelliJ IDEA 中的**终端**按钮。点击该按钮，编辑器内会打开一个终端窗口。在\
    \ Windows 上是命令提示符实例，在 Linux 和 macOS 上是默认的 shell。IntelliJ 会在你的项目根目录下打开终端。下面说明你需要做什么。\n\
    \n1.  执行以下命令进入 `src` 目录：\n\n    ```\n    cd src\n    ```\n\n    `cd` 是一个在 Windows\
    \ 和 Unix 系统中都适用的命令，是 *change directory*（更改目录）的缩写。\n\n2.  执行以下命令编译 `HelloWorld.java`\
    \ 文件：\n\n    ```\n    javac HelloWorld.java\n    ```\n\n    `javac` 是一个 JDK 可执行文件，用于编译\
    \ Java 文件，IntelliJ IDEA 在后台会调用它。\n\n3.  执行以下命令运行 `HelloWorld.class` 文件生成的字节码：\n\
    \n    ```\n    java HelloWorld\n    ```\n\n图 3-18 展示了在 IntelliJ IDEA 的终端中执行这些命令的过程。\n\
    \n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig18_HTML.jpg](img/463938_1_En_3_Fig18_HTML.jpg)\n\
    \n图 3-18\n\n在 IntelliJ IDEA 内部的终端中手动编译并运行 HelloWorld 类\n\n看起来很简单，对吧？实际上也确实很简单，因为没有定义任何包或\
    \ Java 模块。但是，等等，这有可能吗？嗯，是的。如果你没有定义包，该类仍然属于一个未命名的默认包，这是 JSE 平台默认提供的，用于开发小型、临时性和教学性的应用程序，就像你正在构建的这个一样。那么，让我们让项目稍微复杂一点，为我们的类添加一个命名包。\n\
    \n#### 将 HelloWorld 类放入一个包中\n\n在图 3-14 中，菜单里有一个**包**选项。因此，右键单击 `src` 目录并选择它。会出现一个对话框窗口，你必须在其中输入包名。输入\
    \ **com.sandbox**。图 3-19 显示了该对话框窗口。即使包已经创建好了，我还是再次输入了相同的名称，以展示 IDE 如何警告你正在尝试创建同名的包。\n\
    \n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig19_HTML.jpg](img/463938_1_En_3_Fig19_HTML.jpg)\n\
    \n图 3-19\n\n在 IntelliJ IDEA 中创建包\n\n所以，我们创建了包，但类并不在其中。嗯，把它放进去的方法是，选中它并将其拖入包中。会出现一个用于移动类的对话框窗口，因为编辑器必须修改该类，通过添加一个\
    \ `package` 语句使其属于该包。并且需要你批准该操作。图 3-20 展示了这个对话框窗口。\n\n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig20_HTML.jpg](img/463938_1_En_3_Fig20_HTML.jpg)\n\
    \n图 3-20\n\n在 IntelliJ IDEA 中将类移入包中\n\n点击**重构**按钮，看看类发生了什么变化。该类现在应该以 `package\
    \ com.sandbox;` 声明开头。如果你重新构建项目，然后查看目录结构，你会看到类似于图 3-21 所示的内容。\n\n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig21_HTML.jpg](img/463938_1_En_3_Fig21_HTML.jpg)\n\
    \n图 3-21\n\n添加 com.sandbox 包后的新目录结构\n\n如果你手动编译和执行该类，现在必须考虑包，因此你的命令变为\n\n```\n\
    ~/sandbox/src:  $ javac com/sandbox/HelloWorld.java\n~/sandbox/src:  $ java com/sandbox/HelloWorld\n\
    Hello World!\n```\n\n但事情并没有到此结束，因为我们还有 Java 模块。那么，这又是怎么回事呢？没有 `module-info.java`\
    \ 文件，我们的代码是如何运行的呢？嗯，有一个默认的未命名模块，所有 JAR 文件（无论是否模块化）以及类路径上的类都包含在其中。这个默认的未命名模块会导出所有包并读取所有其他模块。因为它没有名称，所以不能被命名的应用程序模块所要求和读取。因此，即使你的小项目似乎能在\
    \ JDK 9 及更高版本上运行，它也无法被其他模块访问；但它能工作，因为它可以访问其他模块。（这确保了与旧版本 JDK 的向后兼容性，但根据项目的复杂性，兼容性并不总是能得到保证。）话虽如此，让我们为项目添加一个模块。\n\
    \n#### 配置 com.sandbox 模块\n\n配置模块就像在 `src` 目录下添加一个 `module-info.java` 文件一样简单。在图\
    \ 3-14 中，列出的菜单里有一个 `module-info.java` 选项，如果你选择它，IDE 会为你生成该文件。一切都很顺利，如果你不喜欢为你生成的模块名称，可以更改它。我将其更改为\
    \ `com.sandbox`，以遵循 Oracle 开发者建立的模块命名约定。\n\n```\n/**\n* Created on 3/3/18.\n*/\n\
    module com.sandbox {\n}\n```\n\n现在我们有了一个模块，会发生什么？从 IDE 的角度来看，变化不大。但是，如果你想手动编译一个模块，你需要了解一些事情。我使用以下命令编译了我们的模块：\n\
    \n```\n~/sandbox/src/: $ javac -d ../out/com.sandbox \\\nmodule-info.java    \\\
    \ncom/sandbox/HelloWorld.java\n```\n"
- fmt: '### `!`


    `\` is a macOS/Linux separator. On Windows, either write the whole command on
    a single line or replace `\` with `^`.


    Let me explain what I did there. The syntax to compile a module is this:


    ```

    javac -d [destination location]/[module name] \

    [source  location]/module-info.java  \

    [java files...]

    ```


    The result of executing that command is that a directory named `com.sandbox` in
    the `out` directory is created—the module name. Under this directory, we have
    the normal structure of the `com.sandbox` package. The contents of the `out` directory
    are depicted in Figure [3-22](#463938_1_En_3_Chapter.xhtml#Fig22).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig22_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig22_HTML.jpg)


    Figure 3-22


    Java module `com.sandbox` compiled manually


    As you have noticed in this example, the module does not really exist until we
    compile the sources, because a Java module is more of a logical mode of encapsulating
    packages described by the `module-info.class` descriptor. The only reason the
    `com.sandbox` directory was created is that we specified it as argument in the
    `javac -d` command.


    We have a compiled module, what do we do with it? We try to run the application
    obviously.


    ```

    sandbox/: $ java --module-path out \

    --module   com.sandbox/com.sandbox.HelloWorld

    Hello  World!

    ```


    The syntax to execute a modular application is this:


    ```

    java --module-path [destination location] \

    --module [module name] /[package name].HelloWorld

    Hello  World!

    ```


    Regarding the module name, doesn’t it seem a little redundant? To me it sure looks
    like it, which is why I prefer not to create directories for modules unless I
    have more of them under the `src` directory. And we must talk about the standard
    naming conventions for modules. That is also another thing that might give developer
    headaches if they want to create directories for modules. In multiple blog articles
    and *Oracle Magazine* (September 2017), this is recommended.^([^(49)](#fn49))
    But do not worry about it for now; the book’s sources contain modules with simple
    names, and the module configuration is already in place for you.


    ### Java Projects Using Build Tools (Mostly Gradle)


    Maven is a build automation tool used primarily for Java projects. Although Gradle
    is gaining ground, Maven is still one of the most used build tools. Tools like
    Gradle and Maven are used to organize the source code of an application in interdependent
    project modules and configure a way to compile, validate, generate sources, test,
    and generate artifacts automatically. An artifact is a file, usually a JAR, that
    gets deployed to a Maven repository. A Maven repository is a location on an HDD
    where JARs are saved in a special directory structure.


    The discussion about build tools must start with Maven, because this build tool
    standardized a lot of the terms we used in development today. Gradle respects
    a lot of Maven standard rules was chosen as the go-to build tool for the sources
    attached to this book, because it is easier to configure and the configuration
    files are reduced in size. A project split into multiple subprojects can be downloaded
    from GitHub, and built in the command line or imported into IntelliJ. This approach
    makes sure that you get quality sources that can be compiled at once. It is also
    practical, because I imagine you do not want to load a new project in IntelliJ
    IDEA every time you start reading a new chapter. Also, it makes it easier for
    me to maintain the sources and adapt them to a new JDK, and with Oracle releasing
    so often, I need to be able to do this quickly.


    The project you use to test the code written in this book and write your own code
    if you want to, is called `java-for-absolute-beginners`. It is a multimodule Gradle
    project. The first level of the project is the `java-for-absolute-beginners` project,
    that has a configuration file named `build.gradle`. In this file, all dependencies
    and their versions are listed. The child projects, the ones on the second level,
    are the modules of this project. And we call them *child* projects because they
    inherit those dependencies and modules from the parent project. In their configuration
    files, we can specify which dependencies are needed from the list defined in the
    parent. And these modules are a method of wrapping up sources for each chapter
    and that is why these modules are named `chapter00`, `chapter01`, and so forth.
    If a project is big and needs a lot of code to be written, the code is split again
    in another level of modules. Module `chapter05` is such a case, and is configured
    as a parent for the projects underneath it. In Figure [3-23](#463938_1_En_3_Chapter.xhtml#Fig23),
    you see what this project looks like loaded in IntelliJ IDEA, and module `chapter05`
    is expanded so you can see the third level of modules. Each level is marked with
    the corresponding number.


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig23_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Gradle multimodule-level structure


    In the Appendix you can read a detailed explanation for the configuration of this
    Gradle project. For now, if you have loaded it into IntelliJ IDEA as you were
    taught in Chapter [2](#463938_1_En_2_Chapter.xhtml), you can make sure everything
    is working correctly by building it. Here’s how you do it.


    You can do it by using the IntelliJ IDEA editor, in the upper right side you should
    have a tab called **Gradle projects**.


    If the projects are loaded as they are depicted in Figure [3-24](#463938_1_En_3_Chapter.xhtml#Fig24),
    the project was loaded correctly. If the **Gradle projects** tab is not visible,
    look for a label like the one marked with (1), and click it.


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig24_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig24_HTML.jpg)


    Figure 3-24


    Gradle multimodule-level structure


    Expand the `java-for-absolute-beginners(root)` node until you find the `build`
    task, marked with (2). If you double click it and in the view at the bottom of
    the editor you do not see any error, all your projects were built successfully.


    The second way to make sure the Gradle project is working as expected is to build
    it from the command line. Open an IntelliJ IDEA terminal, and if you installed
    Gradle on the system path as explained in Chapter [2](#463938_1_En_2_Chapter.xhtml),
    enter `gradle clean build` and hit the **Enter** key. In the command line, you
    might see some warnings, if the Gradle plugin for supporting Java modules is still
    unstable when this book reaches you, but as long as the execution ends with `BUILD
    SUCCESSFUL`, everything is alright.


    Aside from the `sandbox` project, all the classes, modules, and packages mentioned
    in this section are part of this project. `chapter00` and `chapter01` do not really
    contain classes specific to those chapters. I needed them to construct the Java
    module examples. IntelliJ IDEA sorts modules in alphabetical order, so the naming
    of the chapter modules was chosen this way. They are listed in the order that
    you should work with them. Until now, this chapter was focused on the building
    blocks of Java applications, and you created a class that prints *Hello World!*
    by following the instructions, but the details were not really covered. Let’s
    do that now and enrich the class with new details.'
