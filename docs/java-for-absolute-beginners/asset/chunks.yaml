    at chapter.eight/com.apress.bgn.ch8.StreamDebuggerDemo.mainStreamDebuggerDemo.java:45\n\
    ```\n\n## 总结\n\n阅读本章并运行提供的代码示例后，应该清楚为什么 Stream API 如此出色。我最喜欢三点：可以编写更紧凑、更简单的代码来解决问题，同时不丧失可读性（可以避免使用\
    \ `if` 和循环）；可以在没有 Java 8 之前所需的样板代码的情况下进行数据的并行处理；以及代码可以以函数式编程风格编写。此外，Stream API\
    \ 更像是一种声明式编程方式，因为大多数流方法都接受 `Consumer<T>`、`Predicate<T>` 或 `Function<T>` 类型的参数，这些参数声明了应该对每个流元素执行什么操作，但这些方法并非由开发人员编写的代码显式调用。\n\
    \n本章还介绍了如何使用 `Optional<T>` 实例来避免 `NullPointerExceptions` 和编写 `if` 语句。\n\n阅读完本章后，你应该对以下内容有相当清晰的理解。\n\
    \n*   如何从集合创建顺序流和并行流\n\n*   空流的用途\n\n*   关于流需要记住的术语：\n    *   元素序列\n\n    *  \
    \ 谓词\n\n    *   消费者\n\n    *   供应者\n\n    *   方法引用\n\n    *   数据源\n\n    *   聚合操作\n\
    \n    *   中间操作\n\n    *   终端操作\n\n    *   流水线\n\n    *   内部自动迭代\n\n*   如何创建和使用\
    \ `Optional` 实例\n\n脚注 1   2   3   4\n\n# 9. 调试、测试与文档编写\n\n开发工作不仅要求你为问题设计解决方案并编写代码。为了确保你的解决方案能解决问题，你必须对其进行测试。**测试**涉及确保构成解决方案的每个组件在预期和非预期情况下都能按预期运行。\n\
    \n测试代码最实用的方法是通过**记录**中间变量的值来检查它们；仅在特定情况下将它们打印到控制台。\n\n当解决方案复杂时，**调试**提供了暂停执行并检查变量状态的机会。调试有时涉及**断点**，并且需要\
    \ IDE。断点是应用程序暂停执行的点，可以在这些点检查变量。\n\n在确保你的解决方案符合要求后，你必须为其编写文档，特别是当所解决的问题需要复杂代码来解决时。或者，如果你的解决方案可能是其他应用程序的先决条件，你有责任向其他开发人员解释如何使用它。\n\
    \n本章介绍了几种实现所有这些目标的方法，因为这些是开发人员的关键技能。\n\n## 调试\n\n调试是查找和解决计算机程序中的缺陷或问题的过程。有更多的调试策略，根据应用程序的复杂性，可以使用一种或多种策略。以下是这些技术的列表。\n\
    \n*   记录过程中涉及对象的中间状态并分析日志文件\n\n*   使用断点进行交互式调试，以暂停程序的执行并检查过程中涉及对象的中间状态\n\n*  \
    \ 测试\n\n*   在应用程序或系统级别进行监控\n\n*   分析内存转储项分析，这是一种动态程序分析形式，用于测量程序占用的内存、使用的 CPU、方法调用的持续时间等。\n\
    \n让我们从最简单的调试方式开始：日志记录。\n"
- fmt: '### Logging


    In the real world, logging is a destructive process; it is the cutting and processing
    of trees to produce timber. In software programming, logging means writing log
    files that can be later used to identify problems in code. The simplest way to
    log information is to use the `System.out.print` method family, as depicted in
    Figure [9-1](#463938_1_En_9_Chapter.xhtml#Fig1).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig1_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    `System.out.print` class family


    For the examples in this chapter, we use a hierarchy of classes that provide methods
    to sort integer arrays. The class hierarchy is depicted in Figure [9-2](#463938_1_En_9_Chapter.xhtml#Fig2).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig2_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Sorting class hierarchy


    We’ll take first the `MergeSort` class and add `System.out.print` statements to
    log the steps of the algorithm. Merge sort is the name of a sorting algorithm
    with a better performance than bubble sort, and it works by splitting the array
    into two halves, then into smaller pieces, until it gets to the arrays of two
    elements that can be easily sorted. Then it starts merging the array pieces. This
    approach, of splitting the array repeatedly until sorting becomes a manageable
    operation is called **Divide et Impera** also known as **divide and conquer**.
    There are more algorithms that follow the same approach for solving a problem
    and merge sort is only the first of them that is covered in this book. Figure
    [9-3](#463938_1_En_9_Chapter.xhtml#Fig3), shows what happens in every step of
    the merge-sort algorithm that we are going to implement.


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig3_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Merge sort


    In each step of the algorithm the middle of the array is identified, and as long
    as the start index of the array the `low` value is smaller than the end index
    of the array to sort, the `high` value, we further split the array by calling
    the `sort(..)` method until we get to an array with one element. That is when
    the `merge(..)` method is called, aside from merging pieces of the array, it also
    sorts them during the merging. To write the code, we need to implement the two
    methods.


    ```

    package com.apress.bgn.ch9.algs;

    public class MergeSort implements IntSorter {

    public void sort(int[] arr, int low, int high) {

    if (low < high) {

    int middle = (low + high) / 2;

    sort(arr, low, middle);

    sort(arr, middle + 1, high);

    merge(arr, low, middle, high);

    }

    }

    private void merge(int arr[], int low, int middle, int high) {

    int leftLength = middle - low + 1;

    int rightLength = high - middle;

    int left[] = new int[leftLength];

    int right[] = new int[rightLength];

    for (int i = 0; i < leftLength; ++i) {

    left[i] = arr[low + i];

    }

    for (int i = 0; i < rightLength; ++i) {

    right[i] = arr[middle + 1 + i];

    }

    int i = 0, j = 0;

    int k = low;

    while (i < leftLength && j < rightLength) {

    if (left[i] <= right[j]) {

    arr[k] = left[i];

    i++;

    } else {

    arr[k] = right[j];

    j++;

    }

    k++;

    }

    while (i < leftLength) {

    arr[k] = left[i];

    i++;

    k++;

    }

    while (j < rightLength) {

    arr[k] = right[j];

    j++;

    k++;

    }

    }

    }

    Listing 9-1

    Logging with System.out.print

    ```


    This code might look scary, but it does exactly what is depicted in Figure [9-3](#463938_1_En_9_Chapter.xhtml#Fig3);
    we just need a lot of variables to refer all the indexes we are using to arrange
    our elements in the proper order. To make sure our solution is properly implemented,
    it would be useful to see the values each method is called with and the array
    pieces that are being handled. We can do this by simply modifying our methods
    and adding a few `System.out.print` method calls.


    ```

    package com.apress.bgn.ch9.algs;

    public class MergeSort implements IntSorter {

    public void sort(int[] arr, int low, int high) {

    System.out.print("Call sort of " + ": [" + low + " " + high + "] ");

    for (int i = low; i <= high; ++i) {

    System.out.print(arr[i] + " ");

    }

    System.out.println();

    if (low < high) {

    int middle = (low + high) / 2;

    sort(arr, low, middle);

    sort(arr, middle + 1, high);

    merge(arr, low, middle, high);

    }

    }

    private void merge(int arr[], int low, int middle, int high) {

    int leftLength = middle - low + 1;

    int rightLength = high - middle;

    int left[] = new int[leftLength];

    int right[] = new int[rightLength];

    for (int i = 0; i < leftLength; ++i) {

    left[i] = arr[low + i];

    }

    for (int i = 0; i < rightLength; ++i) {

    right[i] = arr[middle + 1 + i];

    }

    int i = 0, j = 0;

    int k = low;

    while (i < leftLength && j < rightLength) {

    if (left[i] <= right[j]) {

    arr[k] = left[i];

    i++;

    } else {

    arr[k] = right[j];

    j++;

    }

    k++;

    }

    while (i < leftLength) {

    arr[k] = left[i];

    i++;

    k++;

    }

    while (j < rightLength) {

    arr[k] = right[j];

    j++;

    k++;

    }

    System.out.print("Called merge of: [" + low

    + " " + high + " " + middle + "], ");

    for (int z = low; z <= high; ++z) {

    System.out.print(arr[z] + " ");

    }

    System.out.println();

    }

    }

    ```


    To test the output we need a class containing a `main(..)` method to execute the
    algorithm.


    ```

    package com.apress.bgn.ch9;

    import com.apress.bgn.ch9.algs.IntSorter;

    import com.apress.bgn.ch9.algs.MergeSort;

    import java.util.Arrays;

    public class SortingDemo {

    public static void main(String... args) {

    int arr[] = {5,1,4,2,3};

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length-1);

    System.out.print("Sorted: ");

    Arrays.stream(arr).forEach(i -> System.out.print(i+ " "));

    }

    }

    ```


    If we run the preceding class, the intermediary values handled by `sort(..)` and
    `merge(..)` calls are printed in the console.


    ```

    Call sort of : [0 4] 5 1 4 2 3

    Call sort of : [0 2] 5 1 4

    Call sort of : [0 1] 5 1

    Call sort of : [0 0] 5

    Call sort of : [1 1] 1

    Called merge of: [0 1 0], 1 5

    Call sort of : [2 2] 4

    Called merge of: [0 2 1], 1 4 5

    Call sort of : [3 4] 2 3

    Call sort of : [3 3] 2

    Call sort of : [4 4] 3

    Called merge of: [3 4 3], 2 3

    Called merge of: [0 4 2], 1 2 3 4 5

    Sorted: 1 2 3 4 5

    ```


    You can see that the console output matches the algorithm steps depicted in Figure
    [9-3](#463938_1_En_9_Chapter.xhtml#Fig3); that output is clearly proof that the
    solution works as expected. But, there is a problem with the code now. Every time
    the `sort(..)` method is called, the output is printed, and if the sorting is
    only one step in a more complex solution, the output is not really necessary.
    It can even pollute the output of the bigger solution. Also, if the array is big,
    printing that output could affect the performance of the overall solution. So,
    a different approach should be considered, one that could be customized and decision
    made if the output should be printed or not. This is where logging libraries come
    in.'
