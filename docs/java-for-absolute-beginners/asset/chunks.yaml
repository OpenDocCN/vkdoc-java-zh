    Now that you understand how `switch` works, let’s look at how we can reduce the
    previous statement. The month example is suitable here, because it can further
    be modified to show how the `switch` statement can be simplified, when a single
    statement should be executed for multiple cases. In our code, writing each assignment
    statement three times is a little redundant. `switch` can be written in a different
    way to avoid that by grouping the cases. The code is depicted next.


    ```

    package com.apress.bgn.ch7;

    public class SeasonSwitchDemo {

    public static void main(String... args) {

    //Read a

    int a = Integer.parseInt(args0);

    var season = "";

    switch (a) {

    case 1:

    case 2:

    case 12:

    season = "winter";

    break;

    case 3:

    case 4:

    case 5:

    season = "Spring";

    break;

    case 6:

    case 7:

    case 8:

    season = "Summer";

    break;

    case 9:

    case 10:

    case 11:

    season = "Autumn";

    break;

    default:

    System.out.println("Error");

    }

    System.out.println(season);

    }

    }

    ```


    The grouping in this case represents the alignment of the cases that require the
    same statement to be executed, and writing it only once in the last one. This
    still looks a little weird, but this is the only way to reduce the statement repetition.
    The behavior in the previous case is possible because each case without a `break`
    statement is followed by the next case statement.


    In Java 7, the `switch` statement started supporting `String` values. The main
    problems with `switch` supporting `String` values is that there is always a risk
    of `NullPointerException`s being thrown, because the `equals` method is used to
    test matching of the items, and the variable used in the switch statement can
    be null. Also, because equals is used, the comparison is case sensitive. If we
    modify the previous example and ask the user for a text representing the month,
    and use `switch` to decide the season to print, unless we use the exact text in
    case options that the user will use when writing the argument, we won’t get the
    expected result.


    The code changes to


    ```

    package com.apress.bgn.ch7;

    public class StringSwitchSeasonDemo {

    public static void main(String... args) {

    //Read a

    String a = args0;

    var season = "";

    switch (a) {

    case "january":

    case "february":

    case "december":

    season = "winter";

    break;

    case "march":

    case "april":

    case "may":

    season = "Spring";

    break;

    case "june":

    case "july":

    case "august":

    season = "Summer";

    break;

    case "september":

    case "october":

    case "november":

    season = "Autumn";

    break;

    default:

    System.out.println("Error");

    }

    System.out.println(season);

    }

    }

    ```


    If we run the previous program with the `"january"` argument, the text `"winter"`
    is printed in the console. If we run it with argument `"january"`, the text `"Error"`
    is printed in the console. And if we run it with `null`, a `NullPointerException`
    is thrown in the line where the `switch` statement begins.


    And this is all that can be said about the `switch` statement. In practice, depending
    on the solution you are trying to develop, you might decide to use a combination
    of `if` and `switch` statements.


    Unfortunately because of its peculiar logic and its flexible number of options,
    it is difficult to draw a flowchart for the `switch` statement, but nevertheless
    I’ve tried and it’s depicted in Figure [7-6](#463938_1_En_7_Chapter.xhtml#Fig6).


