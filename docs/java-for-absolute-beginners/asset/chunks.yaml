  trans: '

    ### macOS 上的 JAVA_HOME


    JDK 的安装位置是 `/Library/Java/JavaVirtualMachines/jdk-10.jdk/Contents/Home`。你的 `JAVA_HOME`
    环境变量应指向此位置。要为当前用户设置，可以执行以下操作：


    1.  在 `/Users/your.user` 目录下，创建一个名为 `.bash_profile` 的文件。


    2.  在该文件中，写入以下内容：


    ```

    export JAVA_HOME=$(/usr/libexec/java_home -v10)

    export PATH=$JAVA_HOME/bin:$PATH

    ```


    在 macOS 上，你可以同时安装多个 Java 版本。你可以通过调用 `/usr/libexec/java_home` 命令并将你感兴趣的 Java 版本作为参数传入，来获取所需版本的
    JDK 位置，从而设置系统当前使用的版本。命令执行的结果会作为 `JAVA_HOME` 变量的值存储。


    在我的系统上，安装了 JDK 8、9、10 和 11。如果我执行该命令，并为每个 Java 版本传入参数，看看会发生什么：


    ```

    $ /usr/libexec/java_home -v11

    /Library/Java/JavaVirtualMachines/jdk-11.jdk/Contents/Home

    $ /usr/libexec/java_home -v10

    /Library/Java/JavaVirtualMachines/jdk-10.jdk/Contents/Home

    $ /usr/libexec/java_home -v9

    /Library/Java/JavaVirtualMachines/jdk-9.0.4.jdk/Contents/Home

    $ /usr/libexec/java_home -v1.8

    /Library/Java/JavaVirtualMachines/jdk1.8.0_162.jdk/Contents/Home

    ```


    根据作为参数传入的版本不同，会返回不同的 JDK 位置。如果你想测试 `JAVA_HOME` 的值，可以使用 `echo` 命令。


    ```

    $ echo $JAVA_HOME

    /Library/Java/JavaVirtualMachines/jdk-10.jdk/Contents/Home

    ```


    `export PATH=$JAVA_HOME/bin:$PATH` 这行代码将 JDK 位置下的 `bin` 目录内容添加到系统路径中。这意味着我可以打开终端并执行该目录下的任何
    Java 可执行文件。例如，我可以执行 `java –version` 来验证为我的用户设置的默认 Java 版本是否符合预期。


    ```

    $ java -version

    java version "10-ea" 2018-03-20

    Java(TM) SE Runtime Environment 18.3 (build 10-ea+42)

    Java HotSpot(TM) 64-Bit Server VM 18.3 (build 10-ea+42, mixed mode)

    ```


    如果你完成了所有这些步骤，并且 `java -version` 打印出了预期的结果，那么你就设置好了。


    ### Linux 上的 JAVA_HOME


    ### **！**


    如果你熟练使用 Linux，你可能正在使用 PPA，因此可以跳过本节。但如果你喜欢控制 JDK 的位置并定义自己的环境变量，请继续阅读。


    Linux 系统是类 Unix 操作系统。这与基于 Unix 的 macOS 类似。根据你的 Linux 发行版，可以通过特定的包管理器安装 Java，或者直接从
    Oracle 官方网站下载 `*.tar.gz` 格式的 JDK 归档文件。


    如果使用包管理器安装 Java，必要的可执行文件通常会在安装时自动放置在系统路径中。这就是为什么在本书中，我们只介绍手动完成所有操作的情况，并选择将 Java
    仅为当前用户安装到诸如 `/home/your.user/tools/jdk-10.jdk`^(²³) 这样的位置，因为介绍包管理器毕竟不是本书的目的。^(²⁴)


    因此，从 Oracle 网站下载 JDK 归档文件并将其解压到 `/home/your.user/tools/jdk-10.jdk` 后，你需要在你的用户主目录下创建一个名为
    `.bashrc` 或 `.bash_profile`^(²⁵) 的文件，并向其中添加以下内容。


    ```

    export JAVA_HOME=/home/your.user/tools/jdk-10.jdk

    export PATH=$JAVA_HOME/bin:$PATH

    ```


    如你所见，语法与 macOS 类似。要检查 JDK 的位置和 Java 版本，可以使用 macOS 部分提到的相同命令。


    ## 安装 Gradle


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Figa_HTML.jpg](img/463938_1_En_2_Figa_HTML.jpg)
    **Gradle 5.x **** 本书附带的源代码可以使用 Gradle 包装器进行编译和执行，该包装器在 Windows 上是一个批处理脚本，在其他操作系统上是一个
    shell 脚本。当你通过包装器启动 Gradle 构建时，Gradle 会自动下载并运行构建；因此你实际上并不需要安装 Gradle。如何执行此操作的说明可以在
    [`www.gradle.org/docs/current/userguide/gradle_wrapper.html`](http://www.gradle.org/docs/current/userguide/gradle_wrapper.html)
    的公开文档中找到。


    一个好的做法是将代码和构建工具分开，对于本书附带的项目，这是推荐的方式。


    如果你决定在编辑器之外使用 Gradle，你可以从官方网站（ [`www.gradle.org`](http://www.gradle.org) ）仅下载二进制文件（或者如果你好奇，可以下载包含二进制文件、源代码和文档的完整包），解压它们，并将内容复制到硬盘上的某个位置。创建一个
    `GRADLE_HOME` 环境变量，并将其指向你解压 Gradle 的位置。此外，对于 Windows，将 `%GRADLE_HOME%\bin` 添加到系统的一般路径中；对于基于
    Unix 的操作系统，则添加 `$GRADLE_HOME/bin`。


    选择 Gradle 作为本书源代码的构建工具，是因为它设置简单、配置文件小巧、定义执行任务灵活，并且学习一个构建工具很实用——因为对于中型和大型项目，构建工具是必不可少的。


    ### **！**


    通过打开终端（Windows 上的**命令提示符**，以及你在 macOS 和 Linux 上安装的任何类型的终端）并输入以下命令，验证操作系统看到的 Gradle
    版本是否是你刚刚安装的版本：


    `gradle -version`


    你应该会看到类似如下的输出：


    `------------------------------------------------------------`


    `Gradle 5.0-20180826235923+0000`


    `------------------------------------------------------------`


    `Build time:   2018-08-26 23:59:23 UTC`


    `Revision:     c2edb259761ee18f9a14e271f24ef58530b1300f`


    `Kotlin DSL:   1.0-rc-3`


    `Kotlin:       1.2.60`


    `Groovy:       2.4.15`


    `Ant:          Apache Ant (TM) version 1.9.11 compiled on March 23 2018`


    `JVM:          10 (Oracle Corporation 10+46)`


    `OS:           -- 你使用的任何操作系统 --`


    上述文本确认了 Gradle 命令可以在你的终端中执行；因此，Gradle 已成功安装。


    ## 安装 Git


    这是一个可选部分，但作为开发者，熟悉版本控制系统很重要，所以这里介绍一下。要在你的系统上安装 Git，只需访问官方页面 [`https://git-scm.com/downloads`](https://git-scm.com/downloads)
    并下载安装程序。打开安装程序并点击**下一步**直到完成。这适用于 Windows 和 macOS。^(²⁶) 是的，就这么简单。你不需要做其他任何事情。^(²⁷)
    对于 Linux，你可以使用你的包管理器或 PPA 来安装 Git。


    要测试 Git 是否成功安装到你的系统上，打开一个终端（Windows 上的**命令提示符**，以及你在 macOS 和 Linux 上安装的任何类型的终端）并运行
    `git --version` 来查看打印的结果。它应该显示你刚刚安装的 Git 版本。


    ```

    $ git –version

    git version 2.15.1

    ```


    现在你已经安装了 Git，你可以通过在终端中或直接从 IDE 克隆官方 Git 仓库来获取本书的源代码。但关于这一点，稍后会详细介绍。

    '
- fmt: '# Installing a Java IDE


    The editor that I recommend, based on my experience of more than ten years, is
    `IntelliJ IDEA`. It is produced by a company called `JetBrains`. You can download
    this IDE from their official site at [`www.jetbrains.com`](http://www.jetbrains.com).
    There is an Ultimate Edition available that you can use for free for 30 days;
    after that, you need to acquire a license. That is why I recommend you download
    and use the Community Edition, because for the simple development involved in
    learning Java, this version suffices.


    After you download the `IntelliJ IDEA` archive, double-click it to install it.
    After that, start it to do a couple of configurations. Just click the **Next**
    button until you get to the plugin selection step, which should be very similar
    to the one depicted in Figure 2-10.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig10_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig10_HTML.jpg)


    Figure 2-10: IntelliJ IDEA Community Edition configure plugins dialog section


    In the previous image, two sections were underlined. The first section configures
    build tools. If you click the **Customize...** button, the window should change
    to show you the plugins that are available for build tools. Make sure that the
    option for `Gradle` is checked, as depicted in Figure 2-11, then click the **Save
    Changes and Go Back** button.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig11_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig11_HTML.jpg)


    Figure 2-11: IntelliJ IDEA Community Edition configure Gradle plugin


    The second section configures support for versioning control systems. If you click
    the **Customize...** button, the window should show you which plugins are available
    for versioning systems. Make sure that the options for `Git` and `GitHub` are
    checked, as depicted in Figure 2-12, and then click the **Save Changes and Go
    Back** button. If you go another step forward, you get to another plugin screen
    that offers you the possibility to install a plugin called **IDE Feature Trainer**.
    I think if you are a beginner, a plugin might be very useful. The window is depicted
    in Figure 2-13.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig12_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig12_HTML.jpg)


    Figure 2-12: IntelliJ IDEA Community Edition configure Git plugin


    For the final step, click the **Install** button, and then **Start using IntelliJ
    IDEA**, and you are all set up and good to go. Your development environment is
    fully configured and ready for you to write your first Java program.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig13_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig13_HTML.jpg)


    Figure 2-13: IntelliJ IDEA Community Edition configure IDE Feature Trainer plugin


    But before doing that, let’s also cover how to retrieve the sources for the book.


    There are three ways to get the sources for the book:


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig15_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig15_HTML.jpg)


    Figure 2-15: IntelliJ IDEA second dialog window to clone the `java-for-absolute-beginners`
    project


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig14_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig14_HTML.jpg)


    Figure 2-14: IntelliJ IDEA first dialog window to clone the `java-for-absolute-beginners`
    project


    - Download the zipped package directly from GitHub.

    - Clone the repository using a terminal (or Git Bash Shell in Windows) using the
    following command:


    ```

    git clone git@github.com:Apress/java-for-absolute-beginners.git

    ```


    - Clone the project using `IntelliJ IDEA`. For this and cloning from the command
    line, you need a GitHub user. The following images show all the dialog windows
    that you see when cloning the project with `IntelliJ IDEA`. Figure 2-14 shows
    the window that you see after you start an `IntelliJ IDEA` instance that was never
    used. The project is hosted on GitHub, so from the **Check out from Version Control**
    menu, select **GitHub**. At this point, you go to the next dialog window, depicted
    in Figure 2-15.


    This requires you to insert your GitHub username and password (Auth Type: **Password**).
    If you do not have a GitHub username, go to [`https://github.com`](https://github.com)
    to create one. After clicking the **Login** button, the window depicted in Figure
    2-16 is shown.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig16_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig16_HTML.jpg)


    Figure 2-16: IntelliJ IDEA third dialog window to clone the `java-for-absolute-beginners`
    project


    Click the **Clone** button and move on to the window depicted in Figure 2-17.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig17_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig17_HTML.jpg)


    Figure 2-17: IntelliJ IDEA fourth dialog window to clone the `java-for-absolute-beginners`
    project


    Click **Yes** because you definitely need an `IntelliJ IDEA` project for the sources.
    In Figure 2-18, `IntelliJ IDEA` has identified that the project might be configured
    with `Gradle` and recommends to **Import project from External model** and select
    `Gradle`. Do so and click **Next**.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig18_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig18_HTML.jpg)


    Figure 2-18: IntelliJ IDEA fifth dialog window to clone the `java-for-absolute-beginners`
    project


    The window depicted in Figure 2-19 is the last image before having a full-blown
    local `Gradle` project. If you configured `JAVA` and `Gradle` properly, `IntelliJ
    IDEA` finds and selects them automatically for you.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig19_HTML.png](images/463938_1_En_2_Chapter/463938_1_En_2_Fig19_HTML.png)


    Figure 2-19: IntelliJ IDEA last window to clone the `java-for-absolute-beginners`
    project


    And this is it. Starting in the next chapter, some code snippets are presented;
    so go ahead and build the project. You can do this by executing the `build` task
    from `Gradle` project view. Figure 2-20 shows the `IntelliJ IDEA` editor with
    the project loaded and the `Gradle` view opened.


    ![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig20_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig20_HTML.jpg)


    Figure 2-20: IntelliJ IDEA Gradle project view with Tasks node expanded'
