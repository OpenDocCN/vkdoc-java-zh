- fmt: '# Relational Operators


    In certain cases, when designing the solution for a problem, you need to introduce
    conditions to drive and control the execution flow. Conditions require the evaluation
    of a comparison between two terms using a comparison operator. In this section
    all comparison operators used in Java is described and code samples is provided.
    Let’s proceed.


    - `==` tests equality of terms. Because in Java a single equals (`=`) sign assigns
    values, a solution needed to be find to test equality, so the developers just
    duplicated the “=” operator. We have used `for` loops before to depict how to
    use certain types or statements, even if they are to be covered only in the next
    chapter, because the code samples presented to you should be compliable and runnable.
    In the following code sample, you see an example of testing the `==` comparator
    in searching for value 2 in an array. If the value is found, the index is printed
    in the console.


    ```

    package com.apress.bgn.ch6;

    public class ComparisonOperatorsDemo {

    public static void main(String... args) {

    int[] values = {1, 7, 9, 2, 6,};

    for (int i = 0; i < values.length; ++i) {

    if (values[i] == 2) { \\(*)

    System.out.println("Fount 2 at index: " + i);

    }

    }

    }

    }

    ```


    The condition in the line marked with (`*`) is evaluated and the result is a boolean
    value. When the result is `false`, nothing is done, but if the result is `true`
    the index is printed. Because the result is of type boolean, if you make a mistake
    and instead you use `=` instead of `==`, the code will not compile. You have to
    be extra careful when comparing boolean values though.


    The `==` sign works just fine for primitives; for reference types, you need to
    use the `equals()` method that was covered in **Chapter** [**5**](#463938_1_En_5_Chapter.xhtml).


    - `!=` tests inequality of terms. It is the opposite of the `==` operator. As
    an exercise, modify the previous example to print a message when the array value
    is not 2. This operator also works on reference types. But if you want to test
    inequality of references values you have to use an expression similar to: `!a.equals(b)`


    - `<` and `<=` have the same purpose as the one you probably learned in math class.
    The first one (`<`) tests if the item on the left of the operator is less than
    the one on the right. The next one (`<=`) tests if the item on the left of the
    operator is less or equal to the one on the right. This operator cannot be used
    on reference types.


    - `>` and `>=` have the same purpose as the one you probably learned in math class.
    The first one (`>`) tests if the item on the left of the operator is greater than
    the one on the right. The next one (`>=`) tests if the item on the left of the
    operator is greater or equal to the one on the right. This operator cannot be
    used on reference types.


    Almost all numeric operators can be used on variables of different primitive (and
    wrapper) types, as they are automatically converted to type that has a wider interval
    representation or unboxed to the appropriate type in the case of wrapper types.
    The following code reflects a few situations, but in practice, you might need
    to make even more extreme decisions that do not always abide to the common-sense
    rules of programming or follow good practices.


    ```

    package com.apress.bgn.ch6;

    public class MixedOperationsDemo {

    public static void main(String... args) {

    byte b = 1;

    short s = 2;

    int i = 3;

    long l = 4;

    float f = 5;

    double d = 6;

    int ii = 6;

    double resd = l + d;

    long  resl = s + 3;

    //etc

    if (b = b) {

    System.out.println("int val >= byte val");

    }

    if (l > b) {

    System.out.println("long val > byte val");

    }

    if(d > i) {

    System.out.println("double val > byte val");

    }

    if(i == i) {

    System.out.println("double val == int val");

    }

    }

    }

    ```


    Make sure that if you are ever in a situation where you need to make shady things
    (non-optimal code constructs) like these to test a lot, and think about your conversions
    well, especially when floating-point types are involved, because, for example,
    the following piece of code can have unexpected results.


    ```

    package com.apress.bgn.ch6;

    public class DecimalPointDemo {

    public static void main(String... args) {

    float f1 = 2.2f;

    float f2 = 2.0f;

    float f3 = f1 * f2;

    if (f3 == 4.4) {

    System.out.println("expected float value of 4.4");

    } else {

    System.out.println("unexpected value of " + f3);

    }

    }

    }

    ```


    If you expect the message *expected float value of 4.4* to be printed in the console,
    you will be surprised. Any IEEE 754 floating-point number representation presents
    issues because some numbers that appear to have a fixed number of decimals in
    the decimal system actually have an infinite number of decimals in the binary
    system. So, we cannot compare floats and doubles using `==`. One of the solutions
    that is easiest to implement is to use the `compare` method provided by the wrapper
    class; in this case, `Float.compare`.


    ```

    package com.apress.bgn.ch6;

    public class DecimalPointDemo {

    public static void main(String... args) {

    float f1 = 2.2f;

    float f2 = 2.0f;

    float f3 = f1 * f2;

    if (Float.compare(f3,4.4f) == 0) {

    System.out.println("expected float value of 4.4");

    } else {

    System.out.println("unexpected value of " + f3);

    }

    }

    }

    ```


    Using the previous example, the expected message is now printed in the console:
    *expected float value of 4.4.*


    # Bitwise Operators


    In Java there are a few operators that are used at bit level to manipulate variables
    of numerical types. Bitwise operators are used to change individual bits in an
    operand. Bitwise operations are faster and usually use less power because of the
    reduced use of resources. They are most useful in programming visual applications,
    games, where color, mouse clicks, and movements can be quickly determined using
    bitwise applications.


    ## Bitwise NOT


    The `~` operator is sort of a binary negator. It performs a bit-by-bit reversal
    of an integer value. Of course, this affects all bits used to represent the value.
    So, if we declare


    ```

    byte b1 = 10;

    ```


    the binary representation is 00001010. The `Integer` class provides a method named
    `toBinaryString` that can print the binary representation of the previously defined
    variable, but it won’t print all the bits, because the method doesn’t know on
    how many bits we want the representation on. So, we need to use a special `String`
    function to format the output. The following code snippet prints the b value in
    binary on 8 bits.


    ```

    System.out.println("decimal:" + b1);

    String str = String.format("%8s", Integer.toBinaryString(b1 & 0xFF))

    .replace('' '', ''0'');

    System.out.println("binary:" + str);

    ```


    If we apply the `~` operator on the b value, the binary value resulted is 11110101.
    The fist bit is the sign bit, and value one corresponds to `-`. So, the number
    is –11, as displayed in the following code.


    ```

    byte b2 = (byte) ~b1;

    System.out.println("decimal:" + b2);

    String str2 = String.format("%8s", Integer.toBinaryString(b2 & 0xFF))

    .replace('' '', ''0'');

    System.out.println("binary:" + str2);

    ```


    In the previous example, you probably noticed this statement:


    ```

    byte b2 = (byte) ~b1

    ```


    You are expecting an explanation. The bitwise complement expression operator requires
    an operand that is convertible to a primitive integral type, or a compile time
    error occurs. Internally, Java uses one or more bytes to represent values. The
    `~` operator converts its operand to the `int` type, so it can use 32-bits when
    doing the complement operation; this is needed to avoid loss of precision. That
    is why an explicit cast to `byte` is needed in the previous example.


    And because everything is clearer with images, Figure [6-2](#463938_1_En_6_Chapter.xhtml#Fig2)
    shows the effect of the `~` on the bits of the `b1` variable in parallel with
    its value.


    ![../images/463938_1_En_6_Chapter/463938_1_En_6_Fig2_HTML.jpg](images/463938_1_En_6_Chapter/463938_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    The effect of the operator on every bit'
