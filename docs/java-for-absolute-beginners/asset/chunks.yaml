    The `createAccount(..)` method takes as parameters the holder name, the number
    of the account to be created and the initial amount. All of them are provided
    as `String` instances intentionally, so that the method body contains a little
    bit of logic that would require serious testing. Let’s analyze the behavior of
    the previous method and make a list with all possible returned values and returned
    exceptions.


    *   If the amount is not a number, an `InvalidDataException` is thrown.


    *   If the `accountNumber` argument is empty, an `InvalidDataException` is thrown.


    *   If the `accountNumber` argument is null, an `InvalidDataException` is thrown.


    *   If the `accountNumber` argument has less than five characters, an `InvalidDataException`
    is thrown.


    *   If the `amount` argument converted to a number is negative, an `InvalidDataException`
    is thrown.


    *   If there is an account for the `holder` argument already an `AccountCreationException`
    is thrown.


    *   If all the inputs are valid and there is no account for the `holder` argument,
    an `Account` instance is created, saved to the database, and the result is returned.


    So, if we were to be really obsessive about testing, we would have to write a
    test scenario for all of these cases. In the software world, there is something
    called *test coverage* , which is a process that determines whether test cases
    cover application code and how much of it. The result is a percentage value and
    companies usually define a test coverage percent^([^(75)](#fn75)) that represents
    a warranty of quality for the application. So, let’s write all those tests methods,
    just for the practice. But before that, let’s see what the repo stub looks like.'
