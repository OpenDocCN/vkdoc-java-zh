    *This book is dedicated to all men that told me software engineering is not for
    women.*


    *And to that one professor that told me I’m not PhD material.*


    *How do ya’ like them apples?*


    ## Introduction


    Even though I have been writing Java Applications since 2002 I don’t think I’ve
    ever dived so deeply into the JVM as I did while writing this book. Most companies
    I’ve worked for had their own code base when I joined them, and my work was mostly
    related to designing, improving or maintaining one that already existed. It’s
    like making brownies when you already have brownie mix. Writing this book has
    given me the opportunity to get down to basics and work with basic ingredients—so,
    making brownies using eggs, flower, cocoa, milk, and butter.


    Java began in 1982 and was created by a handful of people. The most renowned name
    linked to the beginning of Java is James Gosling, also known as the father of
    Java, the language that is now used on over three billion devices. When Oracle
    bought Sun Microsystems, developers were worried about Java’s future, especially
    since its main creator quit the company and went on to create what was thought
    to be Java’s replacement: Scala. That will probably never happen. Java is still
    here.


    Most banking applications are written in Java and because it is definitely dangerous
    and costly to migrate these applications, Java will be here in 50 years, if not
    more. Java began by making websites more dynamic and more entertaining, and ended
    up being the basis for applications run on ATMs, cashier machines, computers,
    and mobile devices. Sure, this would have been more difficult if Java wasn’t cross-platform.


    The first Java version was officially released in 1996\. Since then, ten more
    versions have been released, with the latest one, Java 11, being released on 25th
    September 2018\. The work on Java 12 has already begun and the early access build
    is already available.


    This book was written with the intention to cover the fundamental elements of
    the language and of the JVM, especially the ones introduced in versions 9, 10,
    and 11\. The book provides a complete overview of the most important Java classes
    in the JVM, all wrapped up in a multimodule project that compiles with Java 11
    and Gradle 5\. A group of reviewers has gone over the book, but if you notice
    any inconsistencies, please send an email to `editorial@apress.com`, or directly
    to the author, and corrections will be made and published in an erratum that will
    be uploaded to the official GitHub repository for the book. The example source
    code for this book can be found on GitHub or downloaded from the official book’s
    product page, located at [`www.apress.com/in/book/9781484237779`](http://www.apress.com/in/book/9781484237779).


    I truly hope you will enjoy using this book to learn Java as much as I enjoyed
    writing it.


    ## Acknowledgments


    Here I am again, the main author of a technical book for the third time.


    This book was quite challenging to write, because I had to quickly adapt to changes
    made to the Java ecosystem. With the new six months interval release system, modules
    being introduced, and backward compatibility thrown out the window, I found myself
    with a project that stopped compiling and had to invest precious time into fixing
    it, understand why it broke in the first place, and eventually adapt the book.


    Writing books for beginners is tricky, because as an experienced developer, it
    might be difficult to find the right examples and explain them in such a way that
    even a non-technical person would easily understand them. That is why I am profoundly
    grateful to Matthew Moodie and Mark Powers for all the support and advice they
    provided to keep this book at beginner level. We have been working together for
    four years and it has been a fruitful collaboration so far.


    I would like to thank Wallace Jackson; his recommendations and corrections were
    crucial for the final form of the book.


    Apress has published many of the books that I have read and used to improve myself
    professionally. It is a great honor to publish my fourth book with Apress, and
    it gives me enormous satisfaction to be able to contribute to the “making” of
    a new generation of Java developers.


    I am grateful to all my friends who had the patience to listen to me complain
    about sleepless nights and writer’s block. Thank you all for being supportive
    and making sure I still had some fun while writing this book. You have no idea
    how dear you are to me.


    I am thankful to John Mayer still, as his music provided yet again, a great environment
    for my working nights.


    A special thank you to Achim Wagner, whom I consider both a mentor and a dear
    friend. He provided me with an environment and support to grow as a professional
    and as a person, and I will miss working with him.


    A special thank you to the Bogza-Vlad family: Monica, Tinel, Cristina, and Stefan.
    You are all close to my heart and this book might have been released later without
    your support when I moved to Edinburgh.


    And a very special thank-you in advance to all the passionate Java developers
    who will find mistakes in the book and be so kind to write me about them so I
    can provide an erratum and make this book even better.


    ### About the Author and About the Technical Reviewer


    ### About the Author


