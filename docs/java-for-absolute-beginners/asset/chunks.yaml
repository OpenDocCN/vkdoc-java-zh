    ```


    When you have the file, you can open it and start analyzing its

    contents. But because IntelliJ might not open such a big file, try to

    open it with a specialized text editor like Notepad++ or Sublime. Or, if

    you use a Unix/Linux operating system, open your console and use the

    `grep`

    command  like

    this:


    ```

    grep -a ''seconds'' gc.log

    ```


    This displays all log entries printed when the `finalize()` method is

    called. Then, you can select the name of an instance can do something

    like this:


    ```

    $ grep -a ''Lybhpococssuoz'' gc.log

    INFO c.a.b.c.Main - JVM created: Lybhpococssuoz

    INFO c.a.b.c.Singer - GC Destroyed: Lybhpococssuoz after 7 seconds

    ```


    The time it takes for a `Singer` instance to be

    deleted from the heap varies, and this is because the GC is called

    randomly, the developer has no control over it. There is a way to

    explicitly request garbage collection to be done, well two ways. You can

    call the following.


    ```

    System.gc() or

    Runtime.getRuntime().gc();

    ```'
