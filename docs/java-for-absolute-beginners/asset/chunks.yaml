- fmt: "# The Publish/Subscribe Framework\n\nAll the programming concepts explained\
    \ so far involved data that needed to be processed. Regardless of the form in\
    \ which data is provided, the Java programs we’ve written so far took that data,\
    \ modified it, and printed the results, whether to the console, to files, or to\
    \ another software component. You could say that all of these components were\
    \ communicating with each other and passing processed data from one to another.\
    \ Figure [12-1](#463938_1_En_12_Chapter.xhtml#Fig1) abstractly describes interactions\
    \ among Java components in a program.\n\n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig1_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1 Interactions between Java components within a program\n\nEach of\
    \ the arrows is marked with the type of information being passed from one component\
    \ to another. In Figure [12-1](#463938_1_En_12_Chapter.xhtml#Fig1), you can identify\
    \ a starting point where information enters the program (by being read by the\
    \ `Reader`), and an end point where the information is printed to some output\
    \ component by the `Printer`. So, you could say that the `Reader` provides the\
    \ data, the `Filter` and the `DocumentCreator` are some internal processor, processing\
    \ the data and the `Printer` is the consumer of the data.\n\nWhat was described\
    \ so far resembles a **point-to-point (p2p) messaging model**, which describes\
    \ a concept of one message being send to one consumer. The p2p model is specific\
    \ to an Java API called Java Message Service (JMS) that supports the formal communication\
    \ known as *messaging* between computers in a network. In the example that begins\
    \ this chapter an analogy was made to show that communication between components\
    \ of a Java Program works in a similar manner. And so, the design of a solution\
    \ to implement a process as described in Figure [12-1](#463938_1_En_12_Chapter.xhtml#Fig1)\
    \ could be created by considering all components linked into a messaging style\
    \ communication model. There is more than one communication model—Producer/Consumer,\
    \ Publish/Subscribe, Sender/Receiver, each with its own specifics,^([^(88)](#fn88))\
    \ but this chapter is focused on **Publish/Subscribe** because it is the model\
    \ that reactive programming is based on.\n\n## Reactive Programming and the Reactive\
    \ Manifesto\n\n**Reactive programming** is a declarative programming style that\
    \ involves using data streams and propagation of change. You learned how to use\
    \ streams in **Chapter** [**8**](#463938_1_En_8_Chapter.xhtml), so we’re one step\
    \ closer. Now all we must do is learn how to use reactive streams. Reactive programming\
    \ involves using asynchronous data streams or event streams. Using reactive streams\
    \ is not a new idea.\n\nThe Reactive Manifesto was first made public in 2014.^([^(89)](#fn89))\
    \ It made a request for software to be developed in such a way that *systems are\
    \ responsive, resilient, elastic, and message driven*, in short they should be\
    \ *reactive*. The following explains each of the four terms.\n\n* **Responsive**\
    \ should provide fast and consistent response times.\n* **Resilient** should remain\
    \ responsive in case of failure and be able to recover.\n* **Elastic** should\
    \ remain responsive and be able to handle various workloads.\n* **Message driven**\
    \ should communicate using asynchronous messages, avoid blocking and applying\
    \ *back pressure* when necessary.\n\nSystems designed this way are supposed to\
    \ be more flexible, loosely coupled, and scalable, but at the same time they should\
    \ be easier to develop, amendable to change and more tolerant of failure. But\
    \ to accomplish all that, the systems need a common API for communication. Reactive\
    \ Streams is an initiative to provide such a standard API for asynchronous, non-blocking\
    \ stream processing that also supports back-pressure. We’ll explain what *back-pressure*\
    \ means in a moment. Let’s start with the basics of reactive stream processing.\n\
    \nAny type of stream processing involves a producer of data, a consumer of data,\
    \ and components in the middle between them that process the data. The direction\
    \ of the data flow is from the producer to the consumer. The abstract schema of\
    \ a system is depicted in Figure [12-2](#463938_1_En_12_Chapter.xhtml#Fig2).\n\
    \n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig2_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2 Producer/Consumer system\n\nThe system might end up in a pickle\
    \ when the producer is faster than the consumer. So the extra data that cannot\
    \ be processed must be dealt with. There is more than one way of doing that.\n\
    \n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig3_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3 Reactive Producer/Consumer system\n\n* The extra data is discarded\
    \ (this is done in network hardware).\n* The producer is blocked so the consumer\
    \ has time to catch up.\n* The data is buffered, but buffers are limited and if\
    \ we have a fast producer and a slow consumer there is a danger of the buffer\
    \ overflowing.\n* By applying *back pressure*, which involves giving the consumer\
    \ the power to regulate the producer and control how much data is produced. Back\
    \ pressure can be viewed as a message being sent from the consumer to the producer\
    \ to let it know it has to slow its data production rate. With this in mind, we\
    \ can complete the design in Figure [12-2](#463938_1_En_12_Chapter.xhtml#Fig2),\
    \ which results in Figure [12-3](#463938_1_En_12_Chapter.xhtml#Fig3).\n\nIf producer,\
    \ processors, and consumer are not synchronized, solving the problem of too much\
    \ data by blocking until each one is ready to process it is not an option, as\
    \ it would transform the system into a synchronous one. Discarding it is not an\
    \ option either, and buffering is, well, unpredictable, so all we’re left with\
    \ for a reactive system is applying **non-blocking back-pressure**.\n\nWriting\
    \ applications that can be aggregated in reactive systems was not possible in\
    \ Java before version 9, so developers had to make do with external libraries.\
    \ A reactive application must be designed according to principle of reactive programming\
    \ and use reactive streams for handling the data. The standard API for reactive\
    \ programming was first described by the `reactive-streams` library that could\
    \ be used with Java 8 as well. But in Java 9, the standard API was added to the\
    \ JDK. Figure [12-4](#463938_1_En_12_Chapter.xhtml#Fig4) shows the interfaces\
    \ that are meant to be implemented by components with the roles defined previously.\
    \ The reactive streams API is made of four very simple interfaces.\n\n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig4_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4 Reactive Streams interfaces\n\n* Interface `Publisher<T>` exposes\
    \ one method named `subscribe(Subscriber<? extends T>)` that is called to add\
    \ a `Subscriber` instance and produces elements of type `T`, which are consumed\
    \ by the `Subscriber`.\n* Interface `Subscriber<R>` consumes elements from the\
    \ `Publisher` and exposes four methods that must be implemented to define concrete\
    \ behavior of the instance depending on the event type received by the `Publisher`\
    \ instance.\n  * `void onSubscribe(Subscription)` is the first method called on\
    \ a subscriber and this is the method that links the `Publisher` to the `Subscriber`\
    \ instance using the `Subscription` argument, if this method throws an exception\
    \ the following behavior is not guaranteed.\n  * `void onNext(T)` is the method\
    \ invoked with a `Subscription`’s next item to receive the data, if it throws\
    \ an exception, the `Subscription` might be cancelled.\n  * `void onError(Throwable)`\
    \ is the method invoked upon an unrecoverable error encountered by a `Publisher`\
    \ or `Subscription`."
  raw: "12. The Publish/Subscribe\nFramework\n\nAll the programming concepts explained\
    \ so far involved data that needed\nto be processed. Regardless of the form in\
    \ which data is provided, the\nJava programs we’ve written so far took that data,\
    \ modified it, and\nprinted the results, whether to the console, to files, or\
    \ to another\nsoftware component. You could say that all of these components were\n\
    communicating with each other and passing processed data from one to\nanother.\
    \ Figure [12-1](#463938_1_En_12_Chapter.xhtml#Fig1) abstractly\ndescribes interactions\
    \ among Java components in a program.\n\n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig1_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1\nInteractions between Java components within a program\n\nEach of\
    \ the arrows is marked with the type of information being\npassed from one component\
    \ to another. In Figure [12-1](#463938_1_En_12_Chapter.xhtml#Fig1), you can\n\
    identify a starting point where information enters the program (by being\nread\
    \ by the `Reader`), and an end\npoint where the information is printed to some\
    \ output component by the\n`Printer`. So,\nyou could say that the `Reader` provides\
    \ the\ndata, the `Filter` and the `DocumentCreator` are\nsome internal processor,\
    \ processing the data and the `Printer` is the\nconsumer of the data.\nWhat was\
    \ described so far is resembles a  **point-to-point (p2p)\nmessaging model** ,\
    \ which describes a concept of one\nmessage being send to one consumer. The p2p\
    \ model is specific to an Java\nAPI called Java Message\nService (JMS) that supports\
    \ the formal communication known as\n*messaging* between computers in a network.\
    \ In the example that\nbegins this chapter an analogy was made to show that communication\n\
    between components of a Java Program works in a similar manner. And so,\nthe design\
    \ of a solution to implement a process as described in Figure\n[12-1](#463938_1_En_12_Chapter.xhtml#Fig1)\
    \ could be\ncreated by considering all components linked into a messaging style\n\
    communication model. There is more than one communication\nmodel—Producer/Consumer,\
    \ Publish/Subscribe, Sender/Receiver, each with\nits own specifics,^([^(88)](#fn88))\
    \ but this chapter is focused\non **Publish/Subscribe** because it is the model\
    \ that\nreactive programming is based on.\n\nReactive Programming and the Reactive\
    \ Manifesto\n**Reactive programming** is a declarative programming\nstyle that\
    \ involves using data streams and propagation of change. You\nlearned how to use\
    \ streams in **Chapter** [**8**](#463938_1_En_8_Chapter.xhtml) , so we’re one\n\
    step closer. Now all we must do is learn how to use reactive streams.\nReactive\
    \ programming involves using asynchronous data streams or event\nstreams. Using\
    \ reactive streams is not a new idea.\n\nThe Reactive\nManifesto was first made\
    \ public in 2014.^([^(89)](#fn89)) It made a request for\nsoftware to be developed\
    \ in such a way that *systems are responsive,\nresilient, elastic, and message\
    \ driven*, in short they should be\n*reactive*. The following explains each of\
    \ the four terms.\n\n*   **Responsive** should provide fast and consistent\n \
    \   response times.\n\n*   **Resilient** should remain responsive in case of\n\
    \    failure and be able to recover.\n\n*   **Elastic** should remain responsive\
    \ and be able to\n    handle various workloads.\n\n*   **Message driven** should\
    \ communicate using\n    asynchronous messages, avoid blocking and applying *back\n\
    \    pressure* when necessary.\n\nSystems designed this way are supposed to be\
    \ more flexible, loosely\ncoupled, and scalable, but at the same time they should\
    \ be easier to\ndevelop, amendable to change and more tolerant of failure. But\
    \ to\naccomplish all that, the systems need a common API for communication.\n\
    Reactive Streams is an initiative to provide such a standard API for\nasynchronous,\
    \ non-blocking stream processing that also supports\nback-pressure. We’ll explain\
    \ what *back-pressure* means in a\nmoment. Let’s start with the basics of reactive\
    \ stream processing.\n\nAny type of stream processing involves a producer of data,\
    \ a consumer of\ndata, and components in the middle between them that process\
    \ the data.\nThe direction of the data flow is from the producer to the consumer.\
    \ The\nabstract schema of a system is depicted in Figure [12-2](#463938_1_En_12_Chapter.xhtml#Fig2).\n\
    \n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig2_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2\nProducer/Consumer\nsystem\n\nThe system might end up in a pickle\
    \ when the producer is faster than the\nconsumer. So the extra data that cannot\
    \ be processed must be dealt with.\nThere is more than one way of doing that.\n\
    \n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig3_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3\nReactive\nProducer/Consumer system\n\n*   The extra data is discarded\
    \ (this is done in network\n    hardware).\n\n*   The producer is blocked so the\
    \ consumer has time to catch\n    up.\n\n*   The data is buffered, but buffers\
    \ are limited and if we have a\n    fast producer and a slow consumer there is\
    \ a danger of the buffer\n    overflowing.\n\n*   By applying *back pressure*,\
    \ which involves giving the\n    consumer the power to regulate the producer and\
    \ control how much data is\n    produced. Back pressure can be viewed as a message\
    \ being sent from the\n    consumer to the producer to let it know it has to slow\
    \ its data\n    production rate. With this in mind, we can complete the design\
    \ in Figure\n    [12-2](#463938_1_En_12_Chapter.xhtml#Fig2), which results\n \
    \   in Figure [12-3](#463938_1_En_12_Chapter.xhtml#Fig3).\n\nIf producer, processors,\
    \ and consumer are not synchronized, solving\nthe problem of too much data by\
    \ blocking until each one is ready to\nprocess it is not an option, as it would\
    \ transform the system into a\nsynchronous one. Discarding it is not an option\
    \ either, and buffering\nis, well, unpredictable, so all we’re left with for a\
    \ reactive system is\napplying \n**non-blocking back-pressure** .\n\nWriting applications\
    \ that can be aggregated in reactive systems was not\npossible in Java before\
    \ version 9, so developers had to make do with\nexternal libraries. A reactive\
    \ application must be designed according to\nprinciple of reactive programming\
    \ and use reactive streams for handling\nthe data. The standard\nAPI for reactive\
    \ programming was first described by the `reactive-streams`\nlibrary that could\
    \ be used with Java 8 as well. But in Java 9, the\nstandard API was added to the\
    \ JDK. Figure [12-4](#463938_1_En_12_Chapter.xhtml#Fig4) shows the\ninterfaces\
    \ that are meant to be implemented by components with the roles\ndefined previously.\
    \ The reactive streams API is\nmade of four very simple interfaces.\n\n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig4_HTML.jpg](images/463938_1_En_12_Chapter/463938_1_En_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4\nReactive Streams\ninterfaces\n\n*   interface `Publisher<T>`  exposes\
    \ one method\n    named `subscribe(Subscriber<? extendsT>)` that is called to\
    \ add a `Subscriber` instance\n    and produces elements of type `T`, which are\
    \ consumed\n    by the `Subscriber`.\n\n*   interface `Subscriber<R>` , consumes\
    \ elements\n    from the `Publisher` and exposes\n    four methods that must be\
    \ implemented to define concrete behavior of the\n    instance depending on the\
    \ event type received by the `Publisher` instance.\n\n*   `void onSubscribe(Subscription)`\
    \ is the first method called on a\n        subscriber and this is the method that\
    \ links the `Publisher` to the\n        `Subscriber`\n        instance using the\
    \ `Subscription`\n        argument, if this method throws an exception the following\
    \ behavior is\n        not guaranteed.\n\n*   `void onNext(T)` is the method invoked\
    \ with a `Subscription`’s next\n        item to receive the data, if it throws\
    \ an exception, the `Subscription` might be\n        cancelled.\n\n*   `void onError(Throwable)`\
    \ is the method invoked upon an unrecoverable\n        error encountered by a\
    \ `Publisher` or `Subscription`."
  trans: "\n12. 发布/订阅\n框架\n\n到目前为止，所有解释的编程概念都涉及需要处理的数据。无论数据以何种形式提供，我们迄今编写的 Java 程序都会获取这些数据，对其进行修改，并打印结果，无论是输出到控制台、文件还是其他软件组件。可以说，所有这些组件都在相互通信，并将处理后的数据从一个组件传递到另一个组件。图\
    \ 12-1 抽象地描述了程序中 Java 组件之间的交互。\n\n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig1_HTML.jpg](img/463938_1_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1\n程序内 Java 组件之间的交互\n\n每个箭头都标有从一个组件传递到另一个组件的信息类型。在图 12-1 中，你可以识别出一个起点，信息在此处进入程序（由\
    \ `Reader` 读取），以及一个终点，信息在此处由 `Printer` 打印到某个输出组件。因此，可以说 `Reader` 提供数据，`Filter`\
    \ 和 `DocumentCreator` 是某种内部处理器，负责处理数据，而 `Printer` 是数据的消费者。\n\n到目前为止所描述的内容类似于一种\
    \ **点对点（p2p）消息传递模型**，该模型描述了一个消息发送给一个消费者的概念。p2p 模型是 Java 消息服务（JMS）这一 Java API 特有的，它支持网络中计算机之间被称为\
    \ *消息传递* 的正式通信。在本章开头的示例中，我们做了一个类比，以说明 Java 程序组件之间的通信以类似的方式工作。因此，可以通过将所有组件视为链接到消息传递风格的通信模型中，来设计实现图\
    \ 12-1 所述流程的解决方案。通信模型不止一种——生产者/消费者、发布/订阅、发送者/接收者，每种都有其特定之处^(⁸⁸)，但本章重点介绍 **发布/订阅**，因为它是响应式编程所基于的模型。\n\
    \n响应式编程与响应式宣言\n**响应式编程** 是一种声明式编程风格，涉及使用数据流和变更传播。你在**第 8 章**学习了如何使用流，所以我们离目标更近了一步。现在我们只需要学习如何使用响应式流。响应式编程涉及使用异步数据流或事件流。使用响应式流并非新概念。\n\
    \n响应式宣言于 2014 年首次公开发布。^(⁸⁹) 它要求软件以这样的方式开发：*系统应是响应式、有韧性、弹性且消息驱动的*，简而言之，它们应该是 *响应式*\
    \ 的。以下解释这四个术语。\n\n*   **响应式** 应提供快速且一致的响应时间。\n*   **有韧性** 应在发生故障时保持响应并能够恢复。\n\
    *   **弹性** 应保持响应并能够处理各种工作负载。\n*   **消息驱动** 应使用异步消息进行通信，避免阻塞并在必要时应用 *背压*。\n\n以这种方式设计的系统应该更灵活、松耦合且可扩展，但同时它们应该更易于开发、易于变更且更能容忍故障。但要实现所有这些，系统需要一个通用的通信\
    \ API。响应式流是一项倡议，旨在为异步、非阻塞的流处理提供这样一个标准 API，该 API 也支持背压。我们稍后将解释 *背压* 的含义。让我们从响应式流处理的基础知识开始。\n\
    \n任何类型的流处理都涉及数据生产者、数据消费者以及它们之间处理数据的组件。数据流的方向是从生产者到消费者。系统的抽象模式如图 12-2 所示。\n\n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig2_HTML.jpg](img/463938_1_En_12_Fig2_HTML.jpg)\n\
    \n图 12-2\n生产者/消费者系统\n\n当生产者比消费者快时，系统可能会陷入困境。因此，必须处理无法处理的额外数据。有多种方法可以做到这一点。\n\n\
    ![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig3_HTML.jpg](img/463938_1_En_12_Fig3_HTML.jpg)\n\
    \n图 12-3\n响应式生产者/消费者系统\n\n*   丢弃额外数据（这在网络硬件中完成）。\n*   阻塞生产者，以便消费者有时间赶上。\n*   缓冲数据，但缓冲区是有限的，如果我们有快速的生产者和慢速的消费者，则存在缓冲区溢出的危险。\n\
    *   通过应用 *背压*，这涉及赋予消费者调节生产者的能力，并控制生产多少数据。背压可以看作是从消费者发送给生产者的消息，让其知道必须降低数据生产速率。考虑到这一点，我们可以完善图\
    \ 12-2 中的设计，从而得到图 12-3。\n\n如果生产者、处理器和消费者不同步，那么通过阻塞直到每个组件准备好处理数据来解决数据过多的问题并不是一个选项，因为这会系统变成同步系统。丢弃数据也不是选项，而缓冲则是不确定的，因此对于响应式系统，我们唯一剩下的选择就是应用\
    \ **非阻塞背压**。\n\n在 Java 9 之前，无法编写可以聚合到响应式系统中的应用程序，因此开发人员不得不使用外部库。响应式应用程序必须根据响应式编程的原则进行设计，并使用响应式流来处理数据。响应式编程的标准\
    \ API 最初由 `reactive-streams` 库描述，该库也可用于 Java 8。但在 Java 9 中，该标准 API 被添加到 JDK 中。图\
    \ 12-4 显示了应由具有先前定义角色的组件实现的接口。响应式流 API 由四个非常简单的接口组成。\n\n![../images/463938_1_En_12_Chapter/463938_1_En_12_Fig4_HTML.jpg](img/463938_1_En_12_Fig4_HTML.jpg)\n\
    \n图 12-4\n响应式流接口\n\n*   接口 `Publisher<T>` 公开了一个名为 `subscribe(Subscriber<? extends\
    \ T>)` 的方法，该方法被调用来添加一个 `Subscriber` 实例，并生成类型为 `T` 的元素，这些元素由 `Subscriber` 消费。\n\
    *   接口 `Subscriber<R>` 消费来自 `Publisher` 的元素，并公开了四个必须实现的方法，以根据 `Publisher` 实例接收的事件类型来定义实例的具体行为。\n\
    \    *   `void onSubscribe(Subscription)` 是在订阅者上调用的第一个方法，该方法使用 `Subscription`\
    \ 参数将 `Publisher` 链接到 `Subscriber` 实例，如果此方法抛出异常，则后续行为无法保证。\n    *   `void onNext(T)`\
    \ 是使用 `Subscription` 的下一个项目来接收数据时调用的方法，如果它抛出异常，`Subscription` 可能会被取消。\n    * \
    \  `void onError(Throwable)` 是在 `Publisher` 或 `Subscription` 遇到不可恢复错误时调用的方法。\n"
- fmt: "- `void onComplete()` 是当没有更多数据可消费时调用的方法，因此不会发生额外的 `Subscriber` 方法调用。\n- 接口\
    \ `Processor<T,R>` 同时扩展了 `Publisher<T>` 和 `Subscriber<R>`，因为它需要消费数据并生成数据以进一步向上游发送。\n\
    - 接口 `Subscription` 的实现应连接 `Publisher` 和 `Subscriber`，并可通过调用 `request(long)` 来设置要生成并发送给消费者的项目数量，从而应用背压。它还允许通过调用\
    \ `cancel()` 方法取消数据流，以通知 `Subscriber` 停止接收消息。\n\n在 JDK 中，上述所有接口都定义在 `java.util.concurrent.Flow`\
    \ 类中。该类名称显而易见，因为这些接口用于创建可链接在一起的流控制组件，以构建响应式应用程序。除了这四个接口外，还有一个 JDK 实现：`java.util.concurrent.SubmissionPublisher<T>`\
    \ 类实现了 `Publisher<T>`，它是生成项目并使用此类中的方法发布项目的子类的便捷基类。\n\n`Flow` 接口是基础的，可用于编写响应式应用程序，但这需要大量工作。目前，多个团队提供了多种实现，为开发响应式应用程序提供了更实用的方式。使用这些接口的实现，您可以编写响应式应用程序，而无需编写处理数据的线程同步逻辑。\n\
    \n以下是最著名的响应式流 API 实现列表：\n\n- Project Reactor（[https://projectreactor.io/](https://projectreactor.io/)），被\
    \ Spring 用于其 Web Reactive 框架\n- Akka Streams（[https://doc.akka.io/docs/akka/current/stream/stream-flows-and-basics.html](https://doc.akka.io/docs/akka/current/stream/stream-flows-and-basics.html)）\n\
    - MongoDB Reactive Streams Java Driver（[http://mongodb.github.io/mongo-java-driver-reactivestreams/1.9/](http://mongodb.github.io/mongo-java-driver-reactivestreams/1.9/)）\n\
    - Ratpack（[https://ratpack.io/](https://ratpack.io/)）\n- RxJava（[http://reactivex.io/](http://reactivex.io/)）\n\
    \n还有更多，因为在大数据世界中，响应式数据处理不再是奢侈品，而是必需品。至此，我们完成了对响应式编程和响应式流的介绍。是时候进入代码部分了。\n\n##\
    \ 使用 JDK 响应式流 API\n\n由于 JDK 为响应式编程提供的接口非常基础，实现它们来构建真正有用的东西相当繁琐，但我们仍将尝试。在本节中，我们将构建一个应用程序，该应用程序生成无限数量的整数值，过滤这些值，并选择小于\
    \ 127 的值。对于偶数且在 98 到 122 之间的值，我们减去 32（基本上是将小写字母转换为大写）。然后将其转换为字符并打印。\n\n显然，最基本的解决方案是：\n\
    \n```java\nprivate static final Logger log = LoggerFactory.getLogger(ReactiveMain.class);\n\
    private static final Random random = new Random();\npublic static void main(String...\
    \ args) {\n    while (true) {\n        int rndNo = random.nextInt(150);\n    \
    \    if (rndNo >= 0 && rndNo < 127) {\n            if (rndNo >= 98 && rndNo <=\
    \ 122) {\n                rndNo -= 32;\n            }\n            char res =\
    \ (char) rndNo;\n            log.info(\"Result: {}\", res);\n        } else {\n\
    \            log.debug(\"Number {} discarded.\", rndNo);\n        }\n    }\n}\n\
    ```\n\n上述代码清单中的每一行代码都有其目的和期望的结果。这种方法称为**命令式编程**，因为它顺序执行一系列语句以产生期望的输出。\n\n但这并不是我们的目标。在本节中，我们将使用\
    \ JDK 响应式接口的实现来实现一个响应式解决方案。因此，我们需要以下组件：\n\n- 一个发布者组件，利用无限流生成随机整数值。该类应实现 `Flow.Publisher<Integer>`\
    \ 接口。\n- 一个处理器，仅选择可转换为可见字符的整数值，假设所有代码在 [0,127) 范围内的字符。该类应实现 `Flow.Processor<Integer,\
    \ Integer>`。\n- 一个处理器，修改接收到的元素，对于偶数且在 98 到 122 之间的元素，减去 32。该类也应实现 `Flow.Processor<Integer,\
    \ Integer>`。\n- 一个处理器，将整型元素转换为等效的字符。这是一种特殊类型的处理器，将一个值映射为另一个类型的值，应实现 `Flow.Processor<Integer,\
    \ Character>`。\n- 一个订阅者，打印链中最后一个处理器接收到的元素。该类实现 `Flow.Subscriber<Character>` 接口。\n\
    \n让我们从声明 `Publisher` 开始，它包装了一个无限流以生成要消费的值。我们实现了 `Flow.Publisher<Integer>` 接口，但提供了完整的具体实现来异步提交元素。在需要时缓冲它们有点麻烦，因此我们将在类中使用\
    \ `SubmissionPublisher<Integer>`。发布者的代码如下所示：\n\n```java\npackage com.apress.bgn.ch12.jdkstreams;\n\
    \nimport java.util.Random;\nimport java.util.concurrent.Flow;\nimport java.util.concurrent.SubmissionPublisher;\n\
    import java.util.stream.IntStream;\n\npublic class IntPublisher implements Flow.Publisher\
    \ {\n    private static final Random random = new Random();\n    private final\
    \ IntStream intStream = IntStream.generate(() -> random.nextInt(150));\n    private\
    \ final SubmissionPublisher submissionPublisher = new SubmissionPublisher();\n\
    \n    @Override\n    public void subscribe(Flow.Subscriber subscriber) {\n   \
    \     submissionPublisher.subscribe(subscriber);\n    }\n\n    public void start()\
    \ {\n        intStream.forEach(element -> {\n            submissionPublisher.submit(element);\n\
