- fmt: '### Import Section


    The `import` section follows the package declaration. This section contains the
    fully qualified names of all classes, interfaces, and enums used within the file.
    Look at the following code sample.


    ```

    package java.lang;

    import java.io.Serializable;

    import java.io.ObjectStreamField;

    import java.io.UnsupportedEncodingException;

    import java.lang.annotation.Native;

    import java.nio.charset.Charset;

    import java.util.ArrayList;

    import java.util.Arrays;

    import java.util.Comparator;

    import java.util.Formatter;

    import java.util.Locale;

    ...

    public final class String

    implements Serializable, Comparable, CharSequence {

    private  static  final  ObjectStreamField  serialPersistentFields  =

    new ObjectStreamField0;

    ...

    }

    ```


    It is a snippet from the official Java `String` class. Every `import` statement
    makes reference to the package and the name of a class used within the `String`
    class body.


    Special `import` statements import static variables and static methods. Static
    variables and methods can be used without the need to instantiate a class. In
    the JDK, there is a class used for mathematical processes. It contains static
    variables and methods that can be used by developers to implement code that solves
    mathematical problems. Look at the following code.


    ```

    package com.apress.bgn.ch4.basic;

    import static java.lang.Math.PI;

    import static java.lang.Math.sqrt;

    public class Sample extends Object {

    public static void main(String... args) {

    System.out.println("PI value =" + PI);

    double result = sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    ```


    By putting `import` and `static` together, we can declare a fully qualified name
    of a class and the method or the variable we are interested in using in the code.
    This allows us to use the variable or method directly, without the name of the
    class it is declared in. Without the static imports, the code has to be rewritten
    like this:


    ```

    package com.apress.bgn.ch4.basic;

    import  java.lang.Math;

    public class Sample extends Object {

    public static void main(String... args)  {

    System.out.println("PI value =" + Math.PI);

    double result = Math.sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    ```


    Another thing that you probably do when writing Java code is to compact import
    statements. Compacting imports is recommended when using multiple classes from
    the same package to write code, or multiple static variables and methods from
    the same class. When doing so, the import section of a file becomes really big
    and difficult to read. This is where compacting comes to help. Compacting imports
    means replacing all classes from the same package or variables and methods from
    the same class with a wildcard so only one import statement is needed. So, the
    `Sample` class becomes


    ```

    package com.apress.bgn.ch4.basic;

    import static java.lang.Math.*;

    public class Sample extends Object {

    public static void main(String... args) {

    System.out.println("PI value  =" + PI);

    double result = sqrt(5.0);

    System.out.println("SQRT value =" + result);

    }

    }

    ```


    ### Java “Grammar”


    Java is case sensitive, which means that you can write a piece of code as follows.


    ```

    public class Sample {

    public static void main(String... args) {

    int mynumber = 0;

    int myNumber = 1;

    int Mynumber = 2;

    int MYNUMBER = 3;

    System.out.println(mynumber);

    System.out.println(myNumber);

    System.out.println(Mynumber);

    System.out.println(MYNUMBER);

    }

    }

    ```


    All four variables are different and the last lines print numbers: `0 1 2 3`.
    You cannot declare two variables sharing the same name, in the same context (e.g.,
    in the body of a method), because you would be basically redeclaring the same
    variable and the Java compiler does not allow this. If you try to do this, your
    code will not compile, and even IntelliJ IDEA will try to make you see the error
    of your ways by underlining the code in red and showing you a relevant message,
    like in Figure [4-1](#463938_1_En_4_Chapter.xhtml#Fig1), where the `mynumber`
    variable is declared twice.


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig1_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Same statements example with error


    There is a set of Java keywords that can be used only for a fixed and predefined
    purpose in the Java code. A few of them have already been introduced: `import`,
    `package`, `public`, `class`. The rest of them are covered at the end of the chapter
    with a short explanation for each (see Tables [4-2](#463938_1_En_4_Chapter.xhtml#Tab2)
    and [4-3](#463938_1_En_4_Chapter.xhtml#Tab3)).


    Except for `import`, `package`, `interface` (or `@interface`), `enum` and `class`
    declarations, everything else in a Java source file must be declared between curly
    brackets (`{}`). These are called block delimiters. Take a look at the beginning
    of section 4.1. The brackets are used there to wrap up the following.


    *   contents of a class, also called the `body` of the class (brackets in lines
    08 and 23)

    *   contents of a method, also called the `body` of a method (brackets in lines
    09 and 22)

    *   a set of instructions to be executed together (brackets in lines 12 and 21)


    Line terminators: code lines are usually ended in Java by the semicolon (`;`)
    symbol or by the ASCII characters CR, LF, or CR LF. Colons are used to terminate
    fully functioning statements, like the list declaration in line 11. If we have
    a really little monitor, and we are forced to split that statement on two subsequent
    lines to keep the code readable, the colon at its end tells the compiler that
    this statement that is correct only when taken together. Take a look at Figure
    [4-2](#463938_1_En_4_Chapter.xhtml#Fig2).


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig2_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Different statements samples


    The declaration of a list in line 8 is equivalent to the one in lines 10 and 11.
    The declaration in line 13 and 14 is intentionally written wrong—a colon is added
    in line 13, which ends the statement there; but that statement is not valid and
    the compiler complains about it when you try to compile that class by printing
    an exception saying: `"Error:(13, 32) java: illegal start of expression"`. If
    the error message does not seem to fit the example, think about it like this:
    the problem for the compiler is not the wrongful termination of the statement,
    but that after the `=` symbol, the compiler expects to find some sort of expression
    that produces the value for the `badList` variable, but instead it finds nothing.'
