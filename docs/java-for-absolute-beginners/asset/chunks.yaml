- fmt: '# Controlling the Flow Using `try-catch` Constructions


    Exceptions and `try-catch` statements were already mentioned in this book, but
    not as tools to control flow execution. Before we skip to explanations and examples,
    let’s first discuss the general template of a `try-catch-finally` statement.


    ```

    try {

    [code_block]

    } catch ([exception_block]} {

    [handling_code_block]

    } finally {

    [cleanup_code_block]

    }

    ```


    I’ll explain each of these components.


    - `[code_block]` is the code block to execute.

    - `[exception_block]` is a declaration or more of an exception type that can be
    thrown by the `[code_block]`.

    - `[handling_code_block]` - an exception being thrown marks an unexpected situation,
    which must be handled, once the exception is being caught, this piece of code
    is executed to *treat it*, whether by trying to return the system to a normal
    state or by logging details about the cause of the exception.

    - `[clean_up_code]` is a block of code releases resources or sets objects to null
    so that they are eligible for collection.


    Now that you know how a `try-catch-finally` works, you can probably imagine how
    to use it to control the execution flow. Basically, within the `[code_block]`,
    you can explicitly throw exceptions and decide how they are treated.


    Considering the array that we have been using until now, we’ll design our piece
    of code based on it again. First, let’s write a piece of code that throws an exception
    when an even value is found.


    ```

    package com.apress.bgn.ch7.ex;

    public class ExceptionFlowDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    try {

    checkNotEven(arr);

    System.out.println("Not found, all good!");

    } catch (EvenException e) {

    System.out.println(e.getMessage());

    } finally {

    System.out.println("Cleaning up arr");

    for (int i = 0; i < arr.length; ++i) {

    arr[i] = 0;

    }

    }

    }

    public static int checkNotEven(int... arr) throws EvenException {

    for (int i = 0; i < arr.length; ++i) {

    if (arr[i] % 2 == 0) {

    throw new EvenException("Did not expect an even number at " + i);

    }

    }

    return -1;

    }

    }

    ```


    The `EvenException` type is a custom exception type written for this specific
    example and its implementation is not relevant here. If we execute this piece
    of code the following is printed.


    ```

    Did not expect an even number at 2

    Cleaning up arr

    ```


    By throwing an exception, we’ve directed the execution to the handling code, so
    *Not found, all good!* was not printed, and because we have a `finally` block
    that was executed as well.


    So, yeah, you can mix-and-match: use different types of exceptions, have multiple
    `catch` blocks—whatever you need to solve your problem. At a previous company
    that I worked for, I stumbled upon a piece of code that was validating a document
    and throwing different types of exceptions depending on the validation check that
    was not passed and in the `finally` block we had a code that was converting the
    error object to PDF. The code looks similar to this:


    ```

    ...

    ErrorContainter errorContainer = new ErrorContainter();

    try {

    validate(report);

    } catch (FileNotFoundException | NotParsable e) {

    errorContainer.addBadFileError(e);

    } catch (InvestmentMaxException e) {

    errorContainer.addInvestmentError(e);

    } catch (CreditIncompatibilityException e) {

    errorContainer.addIncompatibilityError(e);

    } finally {

    if (errorContainer.isEmpty()) {

    printValidationPassedDocument();

    } else {

    printValidationFailedDocument(errorContainer);

    }

    }

    ...

    ```


    The code in the `finally` code block was complex and totally not recommended to
    be in there. But sometimes in the real world, the solutions do not always respect
    best practices, or even common sense practices. And when dealing with legacy code,
    you might find yourself in the position to write crappy but functional code that
    must be delivered fast. Because, sure programming is awesome, but in the eyes
    of some managers, results are more important. If you are lucky enough to get a
    job at a company that is looking to build on the code in the future or hand it
    to other team members, you might actually end up with a manager that favors best
    practices. Just remember to do your best, and document everything properly and
    you’ll be fine.


    ## Summary


    This chapter covered one of the most important things in development: how to design
    your solutions, the logic of it. You’ve also been introduced to what flowcharts
    are and their components, as tools for deciding how to write your code and how
    to control execution paths. And finally, you’ve learned which statements to use
    and when. A few Java best practices were discussed, so that you are able to design
    the most suitable solutions to your problems.


    Java provides:


    - simple and more complex ways to write `if` statements

    - a `switch` statement that works with any primitive type, enumerations and starting
    with Java 7, `String` instances

    - a few ways to write `for` statements

    - how to use `forEach` methods and streams to traverse a collection of values

    - `while` statement, used when a step must be repeated until a condition is met

    - `do-while` statement, used when a step must be repeated until a condition is
    met, but the step is repeated at least once, because the continuation condition
    is evaluated after it

    - how to manipulate loop behavior by using statements like `break`, `continue`,
    and `return`

    - how to control the execution flow by using `try-catch-finally` constructions


    # The Stream API


    The term *stream* has more than one meaning, as explained on Dictionary.com.


    - a body of water flowing in a channel or watercourse, as a river, rivulet, or
    brook

    - a steady current in water, as in a river or the ocean

    - any flow of water or other liquid or fluid

    - a current or flow of air, gas, or the like

    - **a continuous flow or succession of anything**

    - prevailing direction; drift

    - *In digital technology* - **a flow of data**, as an audio broadcast, a movie,
    or live video, transmitted smoothly and continuously from a source to a computer,
    mobile device, and so forth.


    In the software development context the definitions that are closest to a stream
    are the fifth and part of the seventh (highlighted in bold). In software development
    a *stream* is a sequence of objects from a source that supports aggregate operations.
    In your mind, you would be saying right now: so, is it similar to a collection?
    Well... not quite.'
