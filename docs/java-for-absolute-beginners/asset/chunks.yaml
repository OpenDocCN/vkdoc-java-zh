    array[0]= 0\narray[1]= 0\n```\n\n要向数组中放入值，我们有以下几种选择。\n\n*   直接访问元素并设置值。\n\n```\n\
    \    array[0] = 5;\n    array[1] = 7;\n    //或者\n    for (int i = 0; i < array.length;\
    \ ++i) {\n    array[i] = i;\n    }\n    ```\n\n*   使用我们打算存储的值显式初始化数组。\n\n```\n\
    \    int another[] = {1,4,3,2};\n    ```\n\n数组也可以包含引用。下面的代码示例演示了如何使用 `Performer`\
    \ 数组。\n\n```\npackage com.apress.bgn.ch5;\nimport com.apress.bgn.ch4.hierarchy.*;\n\
    public class PerformerArrayDemo {\npublic static void main(String... args) {\n\
