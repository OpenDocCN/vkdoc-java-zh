- fmt: '### Abstraction


    **Abstraction** is an OOP principle that manages complexity. Abstraction decomposes
    complex implementations and defines core parts that can be reused. In our case,
    common fields of the `Musician` and `Actor` classes can be grouped in the `Human`
    class that we defined earlier in the chapter. The `Human` class can be viewed
    as an abstraction, because any human in this world is more than his name, age,
    and height. So, there is no need to create `Human` instances, because a human
    is represented by something else, like passion, purpose, and skill. A class that
    does not need to be instantiated, but groups together fields and methods for other
    classes to inherit, or provide a concrete implementation for is modelled in Java
    by an abstract class. Thus, we modify the `Human` class to make it `abstract`
    first. And since we are abstracting this class, let’s make the `LIFESPAN` constant
    public so we can access it from anywhere and make the `getTimeToLive` method abstract.


    ```

    package com.apress.bgn.ch4.basic;

    public abstract class Human {

    public static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public Human(String name, int age) {

    this.name = name;

    this.age  =  age;

    }

    public Human(String name, int age, float height) {

    this(name, age);

    this.height  =  height;

    }

    /**

    * @return time to live

    */

    public abstract int getTimeToLive();

    ...

    // setters & getters for fields in this class

    }

    ```


    An abstract method like `getTimeToLive()` is declared in the example; it is a
    method missing the body. This means that within the `Human` class, there is no
    concrete implementation for this method, only a skeleton—a template that extending
    classes must provide a concrete implementation for.


    Oh, but wait, we kept the constructors! Why did we do that if we are not allowed
    to use them anymore? And we aren’t, because Figure [4-5](#463938_1_En_4_Chapter.xhtml#Fig5)
    shows what IntelliJ IDEA does with the `BasicHumanDemo` class Figure [4-5](#463938_1_En_4_Chapter.xhtml#Fig5).


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig5_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Java compiler error when trying to instantiate an abstract class


    We kept the constructors because they can help further abstracting behavior. The
    `Musician` and `Actor` classes must be rewritten to extend the `Human` class.
    This is done by using the `extends` keyword when declaring the class and specifying
    the class to be extended, also called the **parent class** or **superclass**.
    The resulting class is called a **subclass**. When extending a non-abstract class,
    the subclass **inherits** all the fields and concrete methods declared in the
    superclass.


    When extending an abstract class, the subclass must provide a concrete implementation
    for all abstract methods, and must declare their own constructors, which eventually
    make use of the constructors declared in the abstract class. These constructors
    can be called by using the keyword `super`. The same goes for methods, but not
    for fields, unless they have the proper access modifier.


    Let’s see what the `Musician` class looks like when making use of abstraction
    and inheritance.


    ```

    package com.apress.bgn.ch4.basic;

    import java.util.List;

    public class Musician extends Human {

    private String musicSchool;

    private String genre;

    private List songs;

    public Musician(String name, int age, float height,

    String musicSchool, String genre) {

    super(name, age, height);

    this.musicSchool = musicSchool;

    this.genre = genre;

    }

    public int getTimeToLive() {

    return (LIFESPAN - getAge()) / 2;

    }

    ...

    // setters & getters for fields in this class

    }

    ```


    The `songs` field was not used as a parameter in the constructor for simplicity
    reasons here.


    The `Musician` constructor calls the constructor in the superclass to set the
    properties defined there. Also, notice the full implementation provided for the
    `getTimeToLive()` method.


    The `Actor` class is rewritten in a similar manner. You find a proposal implementation
    in the sources for the book, but try to write your own before looking in the `com.apress.bgn.ch4.basic`
    package.


    Figure [4-6](#463938_1_En_4_Chapter.xhtml#Fig6) shows the `Human` class hierarchy,
    as generated by IntelliJ IDEA.


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig6_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    UML diagram generated by IntelliJ IDEA


    The UML diagram clearly shows the members of each class and the arrows point to
    the superclass. UML diagrams are useful tools in designing class hierarchies and
    defining logic of applications. If you want to read more about them and the many
    types of UML diagrams that there are, you can do so at [`www.uml-diagrams.org`](http://www.uml-diagrams.org).


    After covering so much about classes and how to create objects, we need to cover
    other Java important components that create even more detailed objects, which
    can then be used to implement more complex applications. Our `Human` class is
    missing quite a few attributes, like `gender` for example. A field that models
    the gender of a person can only have values from a fixed set of values. It used
    to be two, but because we are living in a brave new world that is fond of political
    correctness, we cannot limit the set of values for genders to two; so we introduce
    a third, called *UNDEFINED*. This means that we must introduce a new class to
    represent a gender that is limited to being instantiated three times. This would
    be tricky to do with a typical class. So, in Java version 1.5, **enums** were
    introduced.'
