    ### do-while Statement


    The `do-while` statement is similar to the `while`, with one difference, the continuation
    condition is evaluated after executing the code block. This causes for the code
    block to be executed at least once, unless there is a an exit condition embedded
    in it. The generic template for this statement is depicted in the following listing:


    ```java

    do {

    [code_block]

    } while ([eval(condition)] == true)

    ```


    Most times statements `while` and `do-while` can be easily interchanged, and sometimes
    a minimum change of the logic of the code block is needed. For example, traversing
    an array and printing the values of its elements can be written using `do-while`
    as well, without changing the code block. Figure [7-9](#463938_1_En_7_Chapter.xhtml#Fig9)
    shows the two implementations side by side: the `while` on the left and `do-while`
    on the right.


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig9_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fig9_HTML.jpg)


    Figure 7-9: while and do-while implementation for printing elements of an array


    The flowchart for these two examples (see Figure [7-10](#463938_1_En_7_Chapter.xhtml#Fig10))
    reveals the different logic between the two statements.


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig10_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fig10_HTML.jpg)


    Figure 7-10: Comparison between while and do-while statements flowcharts


    The `do-while` statement works best when the code block must be executed at least
