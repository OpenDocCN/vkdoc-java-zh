- fmt: '# The HelloWorld! Project in IntelliJ IDEA


    As a side note, you do not even need a project because you have JShell. Open a
    terminal (Command Prompt for Windows) and JShell, and enter the `System.out.print("Hello
    World!")` statement.


    ```

    $  jshell

    |   Welcome to JShell -- Version 11-ea

    |   For an introduction type: /help intro

    jshell> System.out.print("Hello World!")

    Hello World!

    ```


    Since you installed IntelliJ IDEA, let’s create a Java project and check what
    project structure the editor chooses for us. Start with the first IntelliJ IDEA
    and click the **Create New Project** option. A second dialog window appears on
    top with the types of projects that you can create listed on the left. The two
    dialog windows mentioned here are depicted in Figure [3-9](#463938_1_En_3_Chapter.xhtml#Fig9).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig9_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Create an IntelliJ IDEA project


    Select Java project type from the left and click **Next**. (Do not select any
    of the additional libraries and frameworks, we are actually creating the smallest
    Java project possible.) In the next dialog window, the project name and location
    can be introduced. As we are creating a Java 11 project, you can notice at the
    bottom a section used to configure the Java module. This configuration window
    is depicted in Figure [3-10](#463938_1_En_3_Chapter.xhtml#Fig10).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig10_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    IntelliJ IDEA project configuration dialog window


    After inserting the project and module name—we used `sandbox` for both project
    name and module name—click **Finish** and the next window should be the editor
    window, in which you can start writing code. If you expand the `sandbox` node
    on the left (that section is called *the* *project view*), you can see that the
    project is built using the JDK you have installed (in this case 11) and a `src`
    directory was created for you. Your project should look a lot like the one depicted
    in Figure [3-11](#463938_1_En_3_Chapter.xhtml#Fig11).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig11_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig11_HTML.jpg)


    Figure 3-11


    *IntelliJ IDEA* *project view*


    Before writing code, let’s check out what other project settings are available.
    IntelliJ IDEA provides you access to view and edit project properties through
    the **File ➤ Project Structure...** menu item. If you click it, a dialog window
    opens, similar to the one depicted in Figure [3-12](#463938_1_En_3_Chapter.xhtml#Fig12).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig12_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig12_HTML.jpg)


    Figure 3-12


    IntelliJ IDEA project settings tab


    By default, the **Project** settings tab is opened. In Figure [3-12](#463938_1_En_3_Chapter.xhtml#Fig12),
    there are two arrows attracting your attention to the **Project SDK:** section,
    which is depicting the JDK version for a Java project, and the **Project language
    level:** section. At the time this chapter was written, JDK 11 EA was the most
    recent version. The most recent version of IntelliJ IDEA supports syntax and code
    completion for Java 11, which is why it is depicted here. This is the meaning
    of the project language level setting.


    If you switch to the tab named **Modules** you see the information depicted in
    Figure [3-13](#463938_1_En_3_Chapter.xhtml#Fig13).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig13_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig13_HTML.jpg)


    Figure 3-13


    IntelliJ IDEA modules settings tab


    ## Let’s clarify something first


    The Modules tab does not show information about Java modules in your project.
    Aside from Java modules, that wrap packages together; a module is also a way to
    wrap up Java sources and resource files with a common purpose within a project.
    That is why, before Oracle introduced the `module` concept to modularize Java
    applications, the code making up these applications was already modularized by
    developers that needed to structure big projects in some practical way.


    In the Modules tab, you can see the number of parts (modules) that a project has
    and the settings for each part. The `sandbox` has one part: one module named also
    `sandbox` and the source for this module is contained in the `src` directory.
    So, if we want to write a class that prints *Hello World!*, the file called `HelloWorld.java`
    must be placed under it. If you right-click the `src` directory, the menu depicted
    in Figure [3-14](#463938_1_En_3_Chapter.xhtml#Fig14) appears.


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig14_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig14_HTML.jpg)


    Figure 3-14


    IntelliJ IDEA menu listing which Java objects can be created in the `src` directory


    Aside from the Java Class option, there are a few red arrows showing you what
    other components can be in the `src` directory. Let’s go ahead and create our
    class. Click the **Java Class** menu option, and after introducing the class name,
    expand the **Kind:** drop-down list. Figure [3-15](#463938_1_En_3_Chapter.xhtml#Fig15)
    shows the expanded list.


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig15_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    IntelliJ IDEA dialog windows to create a Java data type


    The core building block of a Java application is the Java class, but there are
    other object types in Java. In the **Kind:** list, the four Java object types
    are listed. Each of them is explained in detail later; for now, select **Class**
    and click the **OK** button. You notice that a file named `HelloWorld.java` was
    created under the `src` directory and the contents of that file are quite simple.


    ```

    /**

    * Created on 3/3/18.

    */

    public class HelloWorld {

    }

    ```


    You have created your first Java class in your first simple Java project. It does
    nothing yet. But it can be compiled by selecting from the IntelliJ IDEA **Build**
    menu, the **Build Project** option, or by pressing a combination of keys, that
    is different for each operation system. Compiling the Build Project option produce
    the `HelloWorld.class` file, containing the bytecode. By default, IntelliJ IDEA
    stores compilation results into a directory named `out\production`. The menu option
    for compiling your project and the result are depicted in Figure [3-16](#463938_1_En_3_Chapter.xhtml#Fig16).
    The menu option is marked with (`1`).


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig16_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    IntelliJ IDEA—how to compile a Java project


    When you have more classes in your project, you can compile the one you modify
    by right-clicking the class body and choosing **Recompile [ClassName].java**,
    marked with (2) in Figure [3-16](#463938_1_En_3_Chapter.xhtml#Fig16).'
