    如果您单击一个列表元素，会发生两件事：前一个元素被取消选择，最近单击的元素被选中，因此所选元素会发生变化。`getValueIsAdjusting()`方法返回当前事件是否属于一系列仍在进行更改的多个事件之一，我们测试此方法是否返回`false`以检查选择是否已经完成，这样我们就可以获取当前所选元素的值并将其添加到文本区域。


    关于`JTextArea`实例，它被添加到一个`JScrollPane`实例中，这使得当`textArea`内容随着文本填充而仍然可见，通过提供一个或两个滚动条（取决于配置）来实现。`JScrollPane`也可以包裹在包含太多项目的列表周围，以确保所有项目都可访问。此外，由于我们对用户通过文本区域提供的输入不感兴趣，因此调用了`setEditable(false);`方法。


    现在我们有了一个更复杂的应用程序，是时候调整应用程序的外观和感觉了。到目前为止，我们一直使用默认的外观和感觉，即底层操作系统提供的外观和感觉。但是使用Swing，外观和感觉可以配置为JDK支持的默认外观之一，也可以使用额外的自定义外观，这些外观作为依赖项提供在项目类路径中，或者开发人员可以创建自己的外观。要显式指定外观和感觉，必须在`main`方法中、在任何Swing组件创建之前添加以下代码行：`UIManager.setLookAndFeel(..)`。此方法接收一个`String`值作为参数，该值表示外观和感觉的适当子类的完全限定名称。虽然不是必需的，但您可以通过调用`UIManager.setLookAndFeel(UIManager.getCrossPlatformLookAndFeelClassName());`来显式指定要使用原生GUI。知道了这一点，让我们做一些有趣的事情。`UIManager`类包含用于管理Swing应用程序外观和感觉的实用方法和嵌套类。其中一种方法是`getInstalledLookAndFeels()`，它提取支持的外观和感觉列表，并将其作为`LookAndFeelInfo[]`返回。知道了这一点，让我们列出所有支持的主题，将它们添加到我们的列表中，当用户选择其中一个时，让我们应用它们。不幸的是，由于Swing如今很少使用，我们可以在应用程序中使用的自定义外观和感觉并不多。所以，唯一能做的就是使用JDK提供的内容。首先，让我们用完全限定的类名初始化`data`数组。


    ```

    private static  String[] data;

    ...

    public static void main(String... args) throws Exception {

    UIManager.setLookAndFeel(UIManager.getCrossPlatformLookAndFeelClassName());

    UIManager.LookAndFeelInfo[] looks = UIManager.getInstalledLookAndFeels();

    data = new String[looks.length];

    int i =0;

    for (UIManager.LookAndFeelInfo look : looks) {

    data[i++] = look.getClassName();

    }

    SwingDemo swingDemo = new SwingDemo("Swing Demo Window");

    swingDemo.setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

    swingDemo.setSize(new Dimension(500, 500));

    swingDemo.setVisible(true);

    }

    ...

    ```


    现在，`ListSelectionListener`的实现变得有点复杂，因为在选择新的外观和感觉类之后，我们必须调用`JFrame`实例上的`repaint()`来应用新的外观和感觉，因此我们将声明提取到它自己的类中，并提供`SwingDemo`对象作为参数，以便可以在`valueChanged(..)`方法内部对其调用`repaint()`。


    ```

    private class LFListener implements ListSelectionListener {

    private JFrame parent;

    public LFListener(JFrame swingDemo) {

    parent = swingDemo;

    }

    @Override

    public void valueChanged(ListSelectionEvent e) {

    if (!e.getValueIsAdjusting()) {

    textArea.append(list.getSelectedValue() + "\n");

    try {

    UIManager.setLookAndFeel(list.getSelectedValue());

    Thread.sleep(1000);

    parent.repaint();

    } catch (Exception ee) {

    System.err.println(" Could not set look and feel! ");

    }

    }

    }

    }

    ```


