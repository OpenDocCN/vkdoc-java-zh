    一个**库**由一个或多个 JAR 文件组成。^(³⁷)


    一个 Java 应用程序可以使用一个或多个库，并且为了能够运行，它需要其所有依赖项（所有 JAR 文件）都在类路径上。这意味着什么？这意味着要运行一个 Java
    应用程序，需要 JDK、依赖项（外部 JAR 文件）以及应用程序的 JAR 文件。图 3-5 清晰地展示了这一点。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig5_HTML.jpg](img/463938_1_En_3_Fig5_HTML.jpg)


