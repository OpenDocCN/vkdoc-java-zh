    ### break 语句


    `break` 语句只能用在 `switch`、`for`、`while` 和 `do-while` 语句中。你已经看到它如何在 `switch` 语句中使用；现在我们来看看它在其他语句中的用法。


    使用 `break` 语句可以跳出 `for`、`while` 或 `do-while` 循环，但它必须由一个退出条件来控制；否则，不会执行任何步骤。在下面的代码示例中，即使
    `for` 循环本应遍历所有元素，我们也只打印前三个元素。如果索引等于 3，我们就退出循环。


    ```

    package com.apress.bgn.ch7;

    public class ManipulationDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    for (int i = 0; i < arr.length ; ++i) {

    if  (i == 3) {

    System.out.println("Bye bye!");

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    }

    }

    ```


    如果遇到嵌套循环的情况，可以使用标签来决定要跳出哪个循环语句。例如，在下面的代码中，我们有三个嵌套的 `for` 循环，当所有索引都相等时，我们退出中间的循环。


    ```

    package com.apress.bgn.ch7;

    public class ManipulationDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    for (int i = 0; i < 2; ++i) {

    HERE: for (int j = 0; j < 2; ++j) {

    for (int k = 0; k < 2; ++k) {

    System.out.println("(i, j, k) = (" + i + "," + j + "," + k + ")");

    if (i == j && j == k) {

    break HERE;

    }

    }

    }

    }

    }

    }

    ```


    代码示例中使用的标签名为 `HERE`，它位于满足条件时被退出的 `for` 语句之前，并跟在 `break` 语句之后。在开发中，将标签名全部大写被认为是一种最佳实践，因为这可以避免在阅读代码时将标签与变量或类名混淆。


    为了确保其正常工作，你可以查看控制台，看看是否所有 `(i,j,k)` 的组合（包括 `i = j = k` 及其之后的所有组合）都不再打印。在这种情况下，所有以
    0 开头的组合都被跳过了，这就是控制台中显示的内容。


    ```

    (i, j, k) = (1,0,0)

    (i, j, k) = (1,0,1)

    (i, j, k) = (1,1,0)

    ```


    ### continue 语句


    `continue` 语句不会中断循环，但可以根据条件跳过某些步骤。所以，它基本上会停止循环的当前步骤并进入下一步，因此你可以说这个语句是让循环继续。让我们继续用数组遍历的例子进行实验，这次我们使用
    `continue` 语句跳过打印奇数索引的元素。


    ```

    package com.apress.bgn.ch7;

    public class ManipulationDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    for (int i = 0; i < arr.length; ++i) {

    if (i % 2  != 0) {

    continue;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    }

    }

    ```


    这个语句必须有条件；否则，循环将进行无用的迭代。`continue` 语句也可以与标签一起使用。让我们采用一个与之前三个嵌套 `for` 循环类似的例子，但这次，当
    `k` 索引等于 1 时，不打印任何内容，并跳到包含 `k` 循环的下一轮迭代。


    ```

    package com.apress.bgn.ch7;

    public class ManipulationDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    for (int i = 0; i < 3; ++i) {

    HERE:

    for (int j = 0; j < 3; ++j) {

    for (int k = 0; k < 3; ++k) {

    if (k == 1) {

    continue HERE;

    }

    System.out.println("(i, j, k) = (" + i + "," + j + "," + k + ")");

    }

    }

    }

    }

    }

    ```


    为了确保其正常工作，你可以查看控制台，看看打印出了哪些组合。我们可以清楚地注意到，没有打印出任何包含 `k=1` 或 `k=2` 的组合。


    ```

    (i, j, k) = (0,0,0)

    (i, j, k) = (0,1,0)

    (i, j, k) = (0,2,0)

    (i, j, k) = (1,0,0)

    (i, j, k) = (1,1,0)

    (i, j, k) = (1,2,0)

    (i, j, k) = (2,0,0)

    (i, j, k) = (2,1,0)

    (i, j, k) = (2,2,0)

    ```


    ### ！


    在 Java 社区中，使用标签跳出循环的做法是不被提倡的，因为跳转到标签类似于 `goto` 语句，而 `goto` 语句在某些老式编程语言中仍然可以找到。`goto`
    是 Java 的一个保留关键字，因为该语句曾存在于 JVM 的第一个版本中，但后来被移除了。使用跳转会降低代码的可读性、可测试性，并助长不良设计。这就是为什么
    `goto` 在后续版本中被移除，但任何此类操作的需求都可以通过 `break` 和 `continue` 语句来实现。


    ### return 语句


    return 语句很简单。它用于退出方法体的执行。如果方法返回一个值，`return` 语句会附带返回的值。`return` 语句可用于退出本节中提到的任何语句。它可以作为一种巧妙的方法来缩短方法的执行，因为当前方法的执行会停止，并从调用该方法的代码点继续处理。


    让我们看几个例子。首先，我们编写一个方法，在数组中查找第一个偶数元素；如果找到，该方法返回其索引；否则，返回 -1。


    ```

    package com.apress.bgn.ch7;

    public class ReturnDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    int foundIdx = findEven(arr);

    if (foundIdx != -1) {

    System.out.println("First even is at: " + foundIdx);

    }

    }

    public static int findEven(int ... arr) {

    for (int i = 0; i < arr.length; ++i) {

    if (arr[i] %2 == 0) {

    return i;

    }

    }

    return -1;

    }

    }

    ```


    让我们用 `while` 语句编写同样的方法。


    ```

    package com.apress.bgn.ch7;

    public class ReturnDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    int foundIdx = findEven(arr);

    if (foundIdx != -1) {

    System.out.println("First even is at: " + foundIdx);

    }

    }

    public static int findEven(int ... arr) {

    int i = 0;

    while (i < arr.length) {

    if (arr[i] % 2 == 0) {

    return i;

    }

    ++i;

    }

    return -1;

    }

    }

    ```


    `return` 语句可以在任何我们想要在满足条件时终止方法执行的情况下使用。

