    *对象*或*实例*是使用`new`关键字后跟构造函数调用来创建的。构造函数是类的一个特殊成员，用于通过使用类的所有字段的默认值或作为参数接收的值来初始化它们，从而创建对象。通过调用类构造函数（其中之一，因为类中可能定义了多个）来创建类实例。因此，考虑我们在**第**
    [4](#463938_1_En_4_Chapter.xhtml) 章中的示例，`Performer`类，要声明对`Performer`类型对象的引用，使用以下表达式。


