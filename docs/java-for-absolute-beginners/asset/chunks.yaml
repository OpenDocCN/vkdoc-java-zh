- fmt: "## Prerequisites\n\nBefore ending this chapter, it is only fair to tell you\
    \ that to learn Java, you need to know or have a few things…\n\n- Your way around\
    \ an operating system, such as Windows, Linux or macOS\n- How to refine your search\
    \ criteria, because information related to your operating systems is not covered\
    \ in the book; if you have issues, you must fix them yourself\n- An Internet connection\n\
    \nIf you already know Java, and you just bought this book out of curiosity or\
    \ for the modules chapter, knowing about a build tool like Maven or Gradle is\
    \ helpful, because the source code is organized in a multimodule project that\
    \ can be fully built with one simple command. I’ve chosen to use a build tool\
    \ because in this day and age, learning Java without one makes no sense; any company\
    \ you apply to most definitely uses one.\n\nAside from the prerequisites that\
    \ I listed, nothing else is needed. You do not need to know math, algorithms,\
    \ or design patterns. Actually, you might end up knowing a few after you read\
    \ this book.\n\nThis being said, let’s dig in.\n\nFootnotes [1](#463938_1_En_1_Chapter.xhtml#Fn1_source)\
    \ [2](#463938_1_En_1_Chapter.xhtml#Fn2_source) [3](#463938_1_En_1_Chapter.xhtml#Fn3_source)\
    \ [4](#463938_1_En_1_Chapter.xhtml#Fn4_source) [5](#463938_1_En_1_Chapter.xhtml#Fn5_source)\
    \ [6](#463938_1_En_1_Chapter.xhtml#Fn6_source) [7](#463938_1_En_1_Chapter.xhtml#Fn7_source)\
    \ [8](#463938_1_En_1_Chapter.xhtml#Fn8_source) [9](#463938_1_En_1_Chapter.xhtml#Fn9_source)\
    \ [10](#463938_1_En_1_Chapter.xhtml#Fn10_source) [11](#463938_1_En_1_Chapter.xhtml#Fn11_source)\
    \ [12](#463938_1_En_1_Chapter.xhtml#Fn12_source) [13](#463938_1_En_1_Chapter.xhtml#Fn13_source)\
    \ [14](#463938_1_En_1_Chapter.xhtml#Fn14_source)\n\n# 2. Preparing Your Development\
    \ Environment\n\nTo start learning Java, you need a few things installed on your\
    \ computer. The following are the requirements:\n\n- **Java** support on your\
    \ computer (kinda’ mandatory).\n- An integrated development environment, also\
    \ known as **IDE**, which is basically an application in which you write your\
    \ code and that you use to compile and execute it.\n  - The recommended IDE for\
    \ this book is IntelliJ IDEA. You can go to their website to get the free community\
    \ edition; for the purposes of the book, it will do.\n  - Or, you can choose the\
    \ most popular free IDE for Java development: Eclipse.\n  - Or, you can try NetBeans,^([(15)](#fn15))\
    \ which is the default choice for most beginners because it was bundled with the\
    \ JDK until version 8.^([(16)](#fn16)),^([(17)](#fn17))\n- **Gradle** is a build\
    \ tool used to organize projects, to easily handle dependencies, and make your\
    \ work easier as your projects get bigger. (It is mandatory because the projects\
    \ in this book are organized and built on a Gradle setup.)\n- **Git** is a versioning\
    \ system that you can use to get the sources for the book, and you can experiment\
    \ with it and create your own version. It is optional because GitHub, which is\
    \ where the sources for this chapter are hosted, supports direct download.^([(18)](#fn18))\n\
    \nTo write and execute Java programs/applications, you only need the Java Development\
    \ Kit installed. All other tools that I’ve listed here are only needed to make\
    \ your job easier and to familiarize you with a real development job.\n\n### **!**\n\
    \nYou probably need administrative rights if you install these applications for\
    \ all users. For Windows 10, you might even need a special application to give\
    \ your user administrative rights so you can install the necessary tools. This\
    \ book provides instructions on how to install everything—assuming your user has\
    \ the necessary rights. If you need more information, the Internet is there to\
    \ help.\n\nIf it seems like a lot, do not get discouraged; this chapter contains\
    \ instructions on how to install and verify that each of tool is working accordingly.\
    \ Let’s start by making sure your computer supports Java.\n\n## Installing Java\n\
    \nHere you are with your computer and you can’t wait to start writing Java applications.\
    \ But first, you need to get yourself a JDK and install it. For this, you need\
    \ an Internet connection to open [https://developer.oracle.com/java](https://developer.oracle.com/java).\n\
    \nScroll down until you see the **Downloads** section. Click the Java SE link.\
    \ The two links and their contents are depicted in Figure [2-1](#463938_1_En_2_Chapter.xhtml#Fig1).\n\
    \n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig1_HTML.png](images/463938_1_En_2_Chapter/463938_1_En_2_Fig1_HTML.png)\n\
    \nFigure 2-1 Navigating the Oracle site to find the desired product, JDK in this\
    \ case\n\nOn the Oracle site, you find the latest stable Java version. Click the\
    \ **Download JDK** button. You should be redirected to the page depicted in Figure\
    \ [2-2](#463938_1_En_2_Chapter.xhtml#Fig2).\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig2_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2 The Oracle page where you can download the desired JDK\n\nAs you\
    \ can see, JDK is available for a few operating systems. You should download the\
    \ one matching yours. For writing this book and the source code, I used a macOS\
    \ computer, which means I download the JDK with the `.dmg` extension.\n\nYou need\
    \ to accept the license agreement before being allowed to download the desired\
    \ JDK. You can read it if you are curious, but basically, it tells you that you\
    \ are allowed to use Java as long as you do not modify its original components.\
    \ It also tells you that you are responsible for how you use it, so if you use\
    \ it to write or execute dangerous applications, you are legally responsible.\n\
    \nIf you want to get your hands on an early version of JDK that is not officially\
    \ released yet, go to [`http://openjdk.java.net/projects/jdk/`](http://openjdk.java.net/projects/jdk/).\
    \ Under **Releases**, versions 10 and 11, an early access (unstable) JDK 11 is\
    \ available for download.\n\n### **!**\n\nThis book covers Java specifics until\
    \ Java 11, but that version was eight months away when this chapter was written,\
    \ so some images and details might seem deprecated. Keep in mind that there are\
    \ common details that remain the same from one version to the next, and those\
    \ won’t be reviewed and changed, as the only thing that is different is the version\
    \ number. Since this book was planned to be released after Java 11 was released,\
    \ it is recommended to download that version of the JDK to have full compatibility\
    \ of the sources.\n\nAfter you download the JDK, the next step is to install it.\
    \ Just double-click it and click **Next** until finished. This works for Windows\
    \ and macOS. The JDK is installed in a specific location.\n\nIn Windows, it is\
    \ `C:\\ProgramFiles\\Java\\jdk-10`.\n\nIn macOS, it is `/Library/Java/JavaVirtualMachines/jdk-10.jdk/Contents/Home`.\n\
    \nOn Linux systems, depending on the distribution, the JDK install location varies.\
    \ My preferred way is to get the `*.tar.gz` from the Oracle site that contains\
    \ the full content of the JDK, unpack it, and copy it to a specific location.\
    \ Also, my preferred location on Linux is `/home/iuliana.cosmina/tools/jdk-10.jdk`."
