  trans: '

    J2SE 5.0 于 2004 年发布，代号为 **Tiger**。最初，它遵循典型的版本命名方式，被命名为 1.5，但由于这是一个重大版本，包含大量新特性，显著提升了
    J2SE 的成熟度、稳定性、可扩展性和安全性，因此该版本被标记为 5.0 并向公众如此呈现，尽管内部仍沿用 1.5。对于此版本及后续两个版本，遵循 `1.x
    = x.0` 的规则。让我们列出这些特性，因为本书大部分内容都涉及它们。


    *   **泛型**为集合提供了编译时（静态）类型安全，并消除了大多数类型转换的需求（这意味着在特定上下文中使用的类型是在应用程序运行时决定的，我们将在**第**
    5 章中详细讨论）。

    *   **注解**，也称为**元数据**，用于标记类和方法，以便支持元数据的工具对其进行处理（这意味着一个组件被标记为另一个组件能够识别并对其执行特定操作的内容）。

    *   **自动装箱/拆箱**是基本类型与对应对象类型（包装器）之间的自动转换，同样在**第** 5 章中讨论。

    *   **枚举**使用 `enum` 关键字定义静态的、final 的有序值集合；在**第** 5 章中讨论。

    *   **可变参数**是指方法的最后一个参数使用类型名后跟三个点（`String...`）声明，这意味着可以提供该类型的任意数量的参数，并放入一个数组中；在**第**
    3 章中讨论。

    *   **增强的 for each 循环**也用于遍历集合和数组；在**第** 5 章中讨论。

    *   改进了多线程 Java 程序的语义，在**第** 7 章中讨论。

    *   **静态导入**在**第** 5 章中讨论。

    *   对 RMI（本书未涉及）、Swing（**第** 10 章）、并发工具（**第** 7 章）的改进，以及引入了 `Scanner` 类；在**第**
    11 章中讨论。


    Java 5 是首个可用于 Mac OS X（版本 10.4）的版本，也是 Mac OS X（版本 10.5）上默认安装的版本。此版本发布了大量更新^(⁸)，以修复与安全性和性能相关的问题。这是一个错误较多的版本，考虑到在短短两年内开发了相当多的特性，这也是可以理解的。


    2006 年，Java SE 6 略有延迟地发布，代号为 **Mustang**。是的，又一次更名。是的，同样在短时间内实现了大量新特性，随后也发布了大量更新。这是
    Sun Microsystems 发布的最后一个主要 Java 版本。Oracle 于 2010 年 1 月收购了该公司。让我们看看此版本中最重要的特性：


    *   核心平台的性能显著提升（应用程序运行更快，执行所需的内存或 CPU 更少）

    *   改进了 Web 服务支持（优化了开发 Web 应用程序所需的组件）

    *   JDBC 4.0（优化了开发使用数据库的应用程序所需的组件）

    *   Java 编译器 API（基本上，你可以从代码中使用用于编译代码的组件）

    *   许多 GUI 改进，例如将 SwingWorker 集成到 API 中、表格排序和过滤，以及真正的 Swing 双缓冲（消除了灰色区域效应）；基本上，改进了用于创建桌面应用程序界面的组件


    2008 年 12 月，Java FX 1.0 SDK 发布。JavaFX 用于为任何平台创建图形用户界面，其初始版本是一种脚本语言。直到 2008 年，在
    Java 中创建用户界面有两种方式：


    *   **AWT**（抽象窗口工具包）组件，由底层操作系统特定的原生对等组件渲染和控制；这就是为什么 AWT 组件也被称为*重量级组件*。

    *   **Swing** 组件，被称为*轻量级*组件，因为它们不需要在操作系统的窗口工具包中分配原生资源。Swing API 是 AWT 的补充扩展。


    在最初几个版本中，JavaFX 是否真的会有未来并发展壮大以取代 Swing，这一点从未明确过。Sun 内部的管理动荡也无助于为该项目规划一条清晰的路径。

    '
- fmt: "# Oracle Takes Over\n\nAlthough Sun Microsystems won a lawsuit against Microsoft,\
    \ in which they agreed to pay $20 million for not implementing the Java 1.1 standard\
    \ completely, in 2008, the company was in such poor shape that negotiations for\
    \ a merger with IBM and Hewlett-Packard began. In 2009, Oracle and Sun announced\
    \ that they agreed on the price: Oracle would acquire Sun for $9.50 a share in\
    \ cash; this amounted to a $5.6 billion offer. The impact was massive. A lot of\
    \ engineers quit, including James Gosling, the father of Java, which made a lot\
    \ of developers question the future of the Java platform.\n\nJava SE 7, codename\
    \ **Dolphin**, was the first Java version released by Oracle in 2011. It was the\
    \ result of an extensive collaboration between Oracle engineers and members of\
    \ the worldwide Java communities, like the OpenJDK Community and the Java Community\
    \ Process (JCP). It contained a lot of changes, but still, a lot fewer than developers\
    \ expected. Considering the long period between the releases, the expectations\
    \ were pretty high. Project **Lambda**, which was supposed to allow usage of lambda\
    \ expressions in Java (this leads to considerable syntax simplification in certain\
    \ cases), and **Jigsaw** (making JVM and the Java application modular; there is\
    \ a section in Chapter [3](#463938_1_En_3_Chapter.xhtml) about them) were dropped.\
    \ Both were released in future versions. The following are the most notable features\
    \ in Java 7.\n\n- JVM support for dynamic languages with the new `invokedynamic`\
    \ bytecode (basically, Java code can use code implemented in non-Java languages,\
    \ such as C)\n- Compressed 64-bit pointers (internal optimization of the JVM,\
    \ so less memory is consumed)\n- Small language changes grouped under project\
    \ **Coin**\n  - strings in `switch` (covered in Chapter [7](#463938_1_En_7_Chapter.xhtml))\n\
    - automatic resource management in try-statement (covered in Chapter [5](#463938_1_En_5_Chapter.xhtml))\n\
    - improved type inference for generics—the diamond `<>` operator (covered in Chapter\
    \ [5](#463938_1_En_5_Chapter.xhtml))\n- binary integer literals (covered in Chapter\
    \ [5](#463938_1_En_5_Chapter.xhtml))\n- multiple exceptions handling improvements\
    \ (covered in Chapter [5](#463938_1_En_5_Chapter.xhtml))\n- Concurrency improvements\n\
    - New I/O library (new classes added to read/write data to/from files, covered\
    \ in Chapter [8](#463938_1_En_8_Chapter.xhtml))\n- `Timsort` to sort collections\
    \ and arrays of objects instead of `merge sort` (Sets of data that are ordered\
    \ need to be sorted using an algorithm, basically, in this version, the algorithm\
    \ was replaced with one that has better performance. Better performance usually\
    \ means reducing of consumed resources: memory and/or CPU, or reducing the time\
    \ needed for execution.)\n\nIt must have been difficult to pick up a project and\
    \ update it with almost none of the original development team involved. That can\
    \ be seen in the 161 updates that followed; most of them needed to fix security\
    \ issues and vulnerabilities.\n\nJavaFX 2.0 was released with Java 7. This confirmed\
    \ that the JavaFX project had a future with Oracle. As a major change, JavaFX\
    \ stopped being a scripting language and became a Java API. This meant that knowledge\
    \ of the Java language syntax would be enough to start building user graphical\
    \ interfaces with it. JavaFX started gaining ground over Swing because of its\
    \ hardware-accelerated graphical engine called **Prism** that did a better job\
    \ at rendering.\n\nJava SE 8, codename **Spider**, was released in 2014, and included\
    \ features that were initially intended to be part of Java 7. But, better late\
    \ than never, right? Three years in the making, Java 8 contained the following\
    \ key features.\n\n- Language syntax changes\n  - Language-level support for lambda\
    \ expressions (functional programming features)\n- Support for default methods\
    \ in interfaces (covered in Chapter [4](#463938_1_En_4_Chapter.xhtml))\n- New\
    \ date and time API (covered in Chapter [5](#463938_1_En_5_Chapter.xhtml))\n-\
    \ New way to do parallel processing by using streams (covered in Chapter [8](#463938_1_En_8_Chapter.xhtml))\n\
    - Improved integration with JavaScript (the Nashorn project). JavaScript is a\
    \ web scripting language that is quite loved in the development community, so\
    \ providing support for it in Java probably won Oracle a few new supporters.\n\
    - Improvements of the garbage collection process\n\nStarting with Java 8, codenames\
    \ were dropped to avoid any trademark-law hassles; instead, a semantic versioning\
    \ that easily distinguishes major, minor, and security-update releases was adopted.^([⁹](#fn9))\
    \ The version number matches the following pattern:\n\n`$MAJOR.$MINOR.$SECURITY`\n\
    \nWhen executing `java -version` in a terminal (if you have Java 8 installed),\
    \ you see something similar to the following log.\n\n```\n$ java -version\njava\
    \ version \"1.8.0_162\"\nJavaTM SE Runtime Environment build 1.8.0_162-b12\nJava\
    \ HotSpotTM 64-Bit Server VM build 25.162-b12, mixed mode\n```\n\nIn this log,\
    \ the version numbers have the following meaning:\n\n- The `1` represents the\
    \ major version number, incremented for a major release that contains significant\
    \ new features as specified in a new edition of the Java SE Platform Specification.\n\
    - The `8` represents the minor version number, incremented for a minor update\
    \ release that may contain compatible bug fixes, revisions to standard APIs and\
    \ other small features.\n- The `0` represents the security level that is incremented\
    \ for a security-update release that contains critical fixes, including those\
    \ necessary to improve security. `$SECURITY` is not reset to zero when `$MINOR`\
    \ is incremented, which lets the users know that this version is a more secure\
    \ one.\n- `162` is the build number.\n- `b12` represents additional build information.\n\
    \nThis versioning style is quite common for Java applications, thus this versioning\
    \ style was adopted to align with the general industry practices.\n\nJava SE 9\
    \ was released in September 2017. The long-awaited **Jigsaw** project was finally\
    \ here. The Java platform is finally modular."
