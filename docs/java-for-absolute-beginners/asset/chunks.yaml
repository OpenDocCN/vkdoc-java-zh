    在这个例子中，我们保留了原始配置，因为我想给你一个将日志消息同时写入两个目标的工作示例。但如果日志文件变得太大而无法打开怎么办？有一种方法可以解决这个问题。我们可以使用另一个类，它可以配置为在达到设定大小限制时写入一个文件，然后开始写入另一个文件。这个类名为`ch.qos.logback.core.rolling.RollingFileAppender`，它需要两个参数：一个实现了`ch.qos.logback.core.rolling.RollingPolicy`类型的实例，它提供写入新日志文件（也称为滚动）的功能；以及一个实现了`ch.qos.logback.core.rolling.TriggeringPolicy`类型的实例，它配置触发滚动的条件。


    此外，一个同时实现了这两个接口的类型的单个实例也可以配置日志记录器。滚动日志文件意味着日志文件会根据配置重命名；通常，文件最后访问的日期会被添加到其名称中，然后创建一个新的日志文件，其名称按配置设定（不带任何日期信息）。


    ```

    chapter09/logging-slf4j/out/output.log

    chapter09/logging-slf4j/out/output_%d{yyyy-MM-dd}.%i.log

    10MB

    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n

    ```


    因此，`<file>`元素配置日志文件的位置和名称。`<rollingPolicy>`元素使用`<fileNamePattern>`配置当日志消息不再写入时日志文件接收的名称。在前面的配置中，`output.log`文件会被重命名为例如`output_2018-07-22.log`，然后每天创建一个新的`output.log`文件。`<timeBasedFileNamingAndTriggeringPolicy>`配置`output.log`文件在写入新文件之前应该有多大。前面示例中配置的大小是
    10 MB。如果日志文件在一天结束前增长到超过 10 MB，该文件会被重命名为`output_2018-07-22.1.log`，名称中会添加一个索引，并创建一个新的`output.log`文件。`<maxHistory>`设置日志文件的生命周期，在我们的例子中是
    30 天。


    日志记录是一个强大的工具；请确保不要滥用它，因为它可能导致性能问题以及大量难以分析出有用信息的数据。另一件值得注意的事情在前面的代码中。`StringBuilder`实例被用来构建大的日志消息，这些消息在特定级别被打印。如果通过配置禁用了该级别的日志记录，会发生什么？如果你猜到了即使这些消息没有被记录，创建它们也会消耗时间和内存，那么你是对的。那么，我们该怎么办？SLF4J
    的创建者也考虑到了这一点，并添加了方法来测试某个日志级别是否启用，这些方法可以在包裹性能敏感代码的`if`语句中使用。话虽如此，`SortingSlf4jDemo.main(..)`方法变成了：


    ```

    public static void main(String... args) {

    if (args.length == 0) {

    log.error("No data to sort!");

    return;

    }

    int[] arr = getInts(args);

    if (log.isDebugEnabled()) {

    final StringBuilder sb = new StringBuilder(

    "Sorting  an array with merge sort: ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    ```'
  raw: 'The logging concrete implementation used for this example is called Logback,^([^(68)](#fn68))
    which was chosen because it is the only library that works with SLF4J after the
    modules were introduced in Java 9\. Logback is viewed as the successor of Log4j,
    another popular logging implementation, and it makes sense since the team that
    created it also worked on Log4j.^([^(69)](#fn69)) Logback implements SLF4J natively,
    so there is no need to add another bridge library. And it is faster because the
    Logback internals have been rewritten to perform faster on critical execution
    points. After modifying our classes to use SLF4J, all we have to do is add Logback
    as a dependency of our application and add a configuration file under the `resources`
    directory. The configuration file can be written in XML or Groovy. The standard
    requires for it to be named `logback.xml`. The next listing depicts the contents
    of this file for this sections’ example.


    ```


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    ```


    The `ch.qos.logback.core.ConsoleAppender` class is used for writing log messages
    in the console and the `<pattern>` element defines the format of the log messages.
    Logback can format fully qualified class names by shortening package names to
    their initials thus, it allows for a compact logging without losing information.
    This makes Logback one of the favorite logging implementation of the Java development
    world at the moment.


    The logging calls in the `MergeSort` class were all replaced with `log.debug(..)`
    because these messages are intermediary and not really informational, just samples
    of the state of the objects used by the application during the execution of the
    process. The general logging level of the application can be set using a `<root>`
    element to the desired level, but different logging levels can be set for classes
    or packages using `<logger>` elements.


    So, if we run the `SortingSlf4jDemo` class with the previous configuration on
    the classpath, this is what is printed:


    ```

    19:38:57.950 WARN  c.a.b.c.SortingSlf4jDemo -

    Element a is not an integer and cannot be added to the array!

    19:38:57.951 WARN  c.a.b.c.SortingSlf4jDemo -

    Element b is not an integer and cannot be added to the array!

    19:38:57.951 WARN  c.a.b.c.SortingSlf4jDemo -

    Element ds is not an integer and cannot be added to the array!

    19:38:57.953 DEBUG c.a.b.c.SortingSlf4jDemo - Sorting  an array with merge sort:
    5 3 2 1 4

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [0 4] 5 3 2 1 4

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [0 2] 5 3 2

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [0 1] 5 3

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [0 0] 5

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [1 1] 3

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Called merge of: [0 1 0],) 3 5

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [2 2] 2

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Called merge of: [0 2 1],) 2 3 5

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [3 4] 1 4

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [3 3] 1

    19:38:57.953 DEBUG c.a.b.c.a.MergeSort - Call sort of : [4 4] 4

    19:38:57.954 DEBUG c.a.b.c.a.MergeSort - Called merge of: [3 4 3],) 1 4

    19:38:57.954 DEBUG c.a.b.c.a.MergeSort - Called merge of: [0 4 2],) 1 2 3 4 5

    19:38:57.954 INFO  c.a.b.c.SortingSlf4jDemo - Sorted: 1 2 3 4 5

    ```


    The fully qualified class name `com.apress.bgn.ch9.SortingSlf4jDemo` was shortened
    to `c.a.b.c.SortingSlf4jDemo`.


    The configuration file can be provided to the program as a VM argument, which
    means logging format can be configured externally. When launching the class, use
    `-Dlogback.configurationFile=\temp\ext-logback.xml` as a VM argument.


    Logback can direct output to a file as well; all we have to do is add a configuration
    using the `ch.qos.logback.core.FileAppender` class and direct the output to the
    file by adding an `<appender>` element in the `<root>` configuration.


    ```


    chapter09/logging-slf4j/out/output.log

    true


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    ```


    In this example, we kept the original configuration because I wanted to give you
    a working example of log messages written to two destinations at once. But what
    if the log file becomes too big to open? Well, there’s an approach for that. We
    can use a different class, which can be configured to write a file to a configured
    limit in size and then start another file. This class is named `ch.qos.logback.core.rolling.RollingFileAppender`
    and requires two arguments: an instance of a type that implements `ch.qos.logback.core.rolling.RollingPolicy`
    , which provides functionality to write a new log file (also called a *rollover*)
    and an instance of a type that implements `ch.qos.logback.core.rolling.TriggeringPolicy`
    that configures the conditions under which the rollover happens.


    Also, a single instance of a type that implements both of the interfaces can configure
    the logger. Rolling over a log file means that the log file is renamed according
    to the configuration; usually, the last date that the file was accessed is added
    to its name, and a new log file is created, with the log file named configured
    ( without any date information).


    ```


    chapter09/logging-slf4j/out/output.log


    chapter09/logging-slf4j/out/output_%d{yyyy-MM-dd}.%i.log


    10MB


    UTF-8

    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    %d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n


    ```


    So, the `<file>` element configures the location and the name of the log file.
    The `<rollingPolicy>` element configures the name the log file receive when log
    messages no longer be written in it using the `<fileNamePattern>`. In the previous
    configuration, the `output.log` file is renamed to `output_2018-07-22.log`, for
    example, and then a new `output.log` file is created daily. The `<timeBasedFileNamingAndTriggeringPolicy>`
    configures how big the `output.log` file should be before a new file is written.
    The configured size in the previous example is 10 MB. And if a log file grows
    bigger than 10 MB before the end of the day, the file is renamed to `output_2018-07-22.1.log`,
    an index is added to the name, and a new `output.log` is created. The `<maxHistory>`
    sets the lifespan of a log file, and in our case, it is 30 days.


    Logging is a powerful tool; make sure not to abuse it because it can lead to performance
    problems and a lot of data that is difficult to analyze for useful information.
    Another thing worth noticing is in the previous code. `StringBuilder` instances
    are used to construct big log messages, which are printed at a certain level.
    What happens if logging for that level is disabled via configuration? If you guessed
    that time and memory are consumed by creating those messages, even if they are
    not logged, you are right. So, what do we do? The creators of SLF4J have thought
    of this as well and added methods to test if a certain logging level is enabled
    and those methods can be used in an `if` statement that wrap around the performance
    sensitive code. This being said the `SortingSlf4jDemo.main(..)` method becomes


    ```

    public static void main(String... args) {

    if (args.length == 0) {

    log.error("No data to sort!");

    return;

    }

    int[] arr = getInts(args);

    if (log.isDebugEnabled()) {

    final StringBuilder sb = new StringBuilder(

    "Sorting  an array with merge sort: ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    ```'
