- fmt: '### Logical Operators


    When designing conditions for controlling the flow of the execution of a program,
    sometimes there is need for complex conditions to be written, composed conditions
    constructed from multiple expressions. There are four operators that are used
    to construct complex conditions; two of them are bitwise operations that can be
    reused: `&(AND)` and `|(OR)`; but they require evaluation of all the parts of
    the condition. The operators `&&(AND)` and `||(OR)` have the same effect as the
    other ones, but the difference is they do not require evaluation of all the expression,
    which is why they are also called **shortcut** operators. To explain the difficult
    behavior of these operators, there is a typical example. Basically, we declare
    a list of ten terms (some of them `null`) and a method to generate a random index,
    used to select an item from the list. Then we test the selected element from the
    list to see if it is not `null` and equal to an expected value. If both conditions
    are true, then a message is printed in the console. Let’s start with the first
    example.


    ```

    package com.apress.bgn.ch6;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.Random;

    public class LogicalDemo {

    static List terms = new ArrayList() {{

    add("Rose");

    add(null);

    add("River");

    add("Clara");

    add("Vastra");

    add("Psi");

    add("Cas");

    add(null);

    add("Nardhole");

    add("Strax");

    }};

    public static void main(String... args) {

    for (int i = 0; i < 20; ++i) {

    int rnd = getRandomNumber();

    String term = terms.get(rnd);

    System.out.println("Generated index: " + rnd);

    if (term != null & term.equals("Rose")) { \\(*)

    System.out.println("Rose  was  found");

    }

    }

    }

    private static int getRandomNumber() {

    Random r = new Random();

    return r.nextInt(10);

    }

    }

    ```


    To make sure we get the expected result, we repeat the operation of selecting
    a random term 20 times. In the line marked with `(*)`, the `&` composes the two
    expressions. So, the text `"Rose was found"` should be printed in the console
    only if the value of the `term` variable is not `null` and equal to *Rose*. So,
    when the preceding code is run, expect to see something like this in the console.


    ```

    Generated index: 8

    Exception in thread "main" java.lang.NullPointerException

    Generated index: 4

    at chapter.six/com.apress.bgn.ch6.LogicalDemo.mainLogicalDemo.java:57

    Generated index: 7

    ```


    But, think about it like this: if the `term` is `null`, should we even evaluate
    the equality to *“Rose”*, especially since calling a method on a `null` object
    causes a runtime error? Obviously not, which is why the `&` is not suitable for
    this case. If the `term` is `null`, it fails the first condition; there is no
    point in evaluating the second. And so, enter the `&&` shortcut operator that
    does exactly this. This works because when using the logical `AND` operator, if
    the first term is `false`, it does not really matter what the second term is equal
    to, the result is always `false`. So, we can correct the previous code sample
    as follows.


    ```

    package com.apress.bgn.ch6;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.Random;

    public class LogicalDemo {

    static List terms = new ArrayList() {{

    add("Rose");

    add(null);

    ..

    }};

    public static void main(String... args) {

    for (int i = 0; i < 20; ++i) {

    int rnd = getRandomNumber();

    String term = terms.get(rnd);

    System.out.println("Generated index: " + rnd);

    if (term != null && term.equals("Rose")) { \\(*)

    System.out.println("Rose  was  found");

    }

    }

    }

    private static int getRandomNumber() {

    Random r = new Random();

    return r.nextInt(10);

    }

    }

    ```


    So, when the preceding code is executed, no exception is thrown, because if the
    `term` is `null`, the second condition is not evaluated.


    Let’s modify the previous code sample, but this time, let’s print the message
    if we find a `null` or if we find *“Rose”*.


    ```

    package com.apress.bgn.ch6;

    import java.util.ArrayList;

    import java.util.List;

    import java.util.Random;

    public class LogicalDemo {

    static List terms = new ArrayList() {{

    add("Rose");

    add(null);

    ..

    }};

    public static void main(String... args) {

    for (int i = 0; i < 20; ++i) {

    int rnd = getRandomNumber();

    String term = terms.get(rnd);

    System.out.println("Generated index: " + rnd);

    if (term == null | term.equals("Rose")) { \\(*)

    System.out.println("Rose  was  found");

    }

    }

    }

    private static int getRandomNumber() {

    Random r = new Random();

    return r.nextInt(10);

    }

    }

    ```


    If we run the previous code, the use of `|` throws a `NullPointerException` because
    this operator requires both expressions to be evaluated. So, if `term` is `null`,
    calling `.equals(...)` causes the exception to be thrown. So, to make sure that
    the code works as expected, the `|` must be replaced with `||`, which shortcuts
    the condition and does not evaluate the second expression. This works because
    when using the logical `OR` operator, if the first term is `true`, it does not
    really matter what the second term is equal to; the result is always `true`. We’ll
    leave that as an exercise for you.


    Of course, conditions can be made up from more than one expression and more than
    one operator, whether it is `&&` or `||`. Take a look at the following examples.


