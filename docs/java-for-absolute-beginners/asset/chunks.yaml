- fmt: '### Supplier


    一个*供应商*（supplier）是我们在本书中称之为`java.util.function.Supplier<T>`函数式接口的内联实现。该接口要求为其名为`get()`的单一方法提供具体实现。此方法应返回要添加到流中的元素。


    因此，如果我们想生成一个整数流，`get()`的适当实现应返回一个随机整数。扩展后的代码如下所示；未使用 lambda 表达式，以明确`get(..)`接收一个当场创建的`Supplier<Integer>`实例作为参数。


    ```

    Stream generated = Stream.generate(

    new Supplier() {

    @Override

    public Integer get() {

    Random rand = new Random();

    return rand.nextInt(300) + 1;

    }

    }

    ).limit(15);

    ```


    `limit`方法将供应商生成的元素数量限制为 15；否则，生成的流将是无限的。如果使用 lambda 表达式，上述代码可简化为：


    ```

    Stream generated = Stream.generate(

    () -> new Random().nextInt(300) + 1

    ).limit(15);

    ```


    但这还不是全部；如果`Supplier<Integer>.get()`始终返回相同的数字，无论多么无用，这也是可行的，上述代码将变为：


    ```

    Stream generated = Stream.generate( () -> 5).limit(15);

    ```


    如果需要对流中的元素进行更多控制，可以使用`iterate(..)`方法。该方法在 Java 9 中引入，使用它就像使用`for`语句生成流的条目。该方法接收一个称为“种子”（seed）的初始值、一个决定迭代何时停止的*谓词*（predicate）以及一个迭代步长作为参数。


    ### 谓词


    一个*谓词*是函数式接口`java.util.function.Predicate<T>`的内联实现，该接口声明了一个返回布尔值的单一方法。此方法的实现应针对条件测试其单一类型为`T`的参数，如果条件满足则返回`true`，否则返回`false`。


    在以下示例中，流元素从 0 开始生成，步长为 5，并且只要值小于 50（由谓词定义）就持续生成。


    ```

    Stream iterated = Stream.iterate(0, i -> i < 50, i -> i + 5);

    ```


    与`for`语句一样，终止条件并非强制性的，存在一个不需要谓词的`iterate(...)`方法版本，但此时必须使用`limit(...)`方法来确保流是有限的。


    ```

    Stream iterated = Stream.iterate(0, i -> i + 5).limit(15);

    ```


    流的第一个元素就是种子值。


    在 Java 9 中，除了`limit()`之外，还有另一种控制流中值数量的方法：`takeWhile(..)`操作。此方法从原始流中获取与作为参数接收的谓词匹配的最长元素集，从第一个元素开始。这对于有序流效果良好，但如果流是无序的，结果则是与谓词匹配的任意元素集（可能包括空集）。让我们看看它的实际效果！第一个代码示例在整数流上使用`takeWhile(..)`，并返回一个包含能被
    3 整除的元素的流。


    ```

    Stream forTaking = Stream.of( 3, 6, 9, 11, 12, 13, 15);

    forTaking.takeWhile(s -> s % 3 == 0)

    .forEach(s -> System.out.print(s + " "));

    ```


    代码打印出 *3 6 9*，因为这是与给定谓词匹配的第一个元素集。如果在无序流上调用`takeWhile(..)`，结果将是不可预测的。结果可能是 *3 6
    9* 或 *12 36 18 42*，因为结果是任何匹配谓词元素的子集。因此，在无序流上`takeWhile(..)`的结果是非确定性的。


    ```

    Stream forTaking = Stream.of( 3, 6, 9, 2, 4, 8, 12, 36, 18, 42, 11, 13);

    forTaking.parallel().takeWhile(s -> s % 3 == 0)

    .forEach(s -> System.out.print(s + " "));

    ```


    `takeWhile(..)`操作是`dropWhile(..)`的“姐妹”操作，其作用与`takeWhile(..)`完全相反：对于有序流，它返回一个流，该流包含丢弃与谓词匹配的最长元素集之后的元素。因此，在以下示例中，我们期望在控制台中打印出以下元素：*11
    12 13 15*


    ```

    Stream forDropping = Stream.of( 3, 6, 9, 11, 12, 13, 15);

    forDropping.dropWhile(s -> s % 3 == 0 )

    .forEach(s -> System.out.print(s + " "));

    ```


    对于无序流，此操作的结果也是非确定性的，因为该操作可以丢弃任意集合（包括空集）。


    如果这两个操作在并行流上执行，唯一改变的是元素打印的顺序，但结果集包含相同的元素。'
  raw: '### !


    A *supplier* is what we call in this book an inline implementation of the `java.util.function.Supplier<T>`
    functional interface. This interface requires a concrete implementation to be
    provided for its single method named `get()`. This method should return the element
    to be added to the stream.


    So, if we want to generate a stream of integers, a proper implementation for `get()`
    should return a random integer. The expanded code is depicted next; no lambda
    expressions are used to make it clear that the `get(..)` receives as a parameter
    a `Supplier<Integer>` instance created on the spot.


    ```

    Stream generated = Stream.generate(

    new Supplier() {

    @Override

    public Integer get() {

    Random rand = new Random();

    return rand.nextInt(300) + 1;

    }

    }

    ).limit(15);

    ```


    The `limit` method limits the number of elements generated by the supplier to
    15; otherwise, the generated stream is infinite. If we make use of lambda expressions,
    the previous code reduces to


    ```

    Stream generated = Stream.generate(

    () -> new Random().nextInt(300) + 1

    ).limit(15);

    ```


    But this is not all; if `Supplier<Integer>.get()` always returns the same number,
    no matter how useless it is, it can be done and the previous code becomes


    ```

    Stream generated = Stream.generate( () -> 5).limit(15);

    ```


    If more control is needed over the elements in the stream, the `iterate(..)` method
    can be used. It was introduced in Java 9 and using this method is like having
    a `for` statement generate the entries for the stream. The method receives as
    arguments an initial value called a `seed`, a *predicate* that determines when
    the iteration should stop, and an iteration step.


    ### !


    A *predicate* is an inline implementation of the functional interface `java.util.function.Predicate<T>`
    that declares a single method that returns a boolean value. The implementation
    of this method should test its single argument of type `T` against a condition
    and return `true` if the condition is `fulfilled` and `false` if not.


    In the following example, stream elements are generated, starting from 0, using
    a step of 5 and they are generated as long as the values are lesser than 50, as
    defined by the predicate.


    ```

    Stream iterated = Stream.iterate(0, i -> i  i + 5);

    ```


    As with the `for` statement, the termination condition is not mandatory and there
    is an `iterate(...)` method version that does not require a predicate, but in
    this case the `limit(...)` method must be used to make sure the stream is finite.


    ```

    Stream iterated = Stream.iterate(0,    i -> i + 5).limit(15);

    ```


    The first element of the stream is the seed value.


    In Java 9 aside from `limit()` there is another way to control the numbers of
    values in a stream: the `takeWhile(..)` operation. This method takes the longest
    set of elements from the original stream that matches the predicate received as
    argument, starting with the first element. This works fine for ordered streams,
    but if the stream is unordered the result is, any set of elements that match the
    predicate, including an empty one. Let’s see it in action! The first code sample
    uses `takeWhile(..)` on a stream of integers and returns a stream with elements
    that divide by 3.


    ```

    Stream forTaking = Stream.of( 3, 6, 9, 11, 12, 13, 15);

    forTaking.takeWhile(s -> s % 3 == 0)

    .forEach(s -> System.out.print(s + " "));

    ```


    The code prints *3 6 9* because this is the first set of elements that match the
    given predicate. If `takeWhile(..)` is called on an unordered stream, the result
    is unpredictable. The result might be *3 6 9* or *12 36 18 42*, as the result
    is a subset of any elements matching the predicate. So the result of `takeWhile(..)`
    on an unordered stream is non-deterministic.


    ```

    Stream forTaking = Stream.of( 3, 6, 9, 2, 4, 8, 12, 36, 18, 42, 11, 13);

    forTaking.parallel().takeWhile(s -> s % 3 == 0)

    .forEach(s -> System.out.print(s + " "));

    ```


    The `takeWhile(..)` operation is the "sister" of the `dropWhile(..);` and does
    exactly the reverse of what `takeWhile(..)` does: it returns, for an ordered stream,
    a stream consisting elements after dropping the longest set of elements that match
    the predicate. So in the following example, we expect the following elements to
    be printed in the console: *11 12 13 15*


    ```

    Stream forDropping = Stream.of( 3, 6, 9, 11, 12, 13, 15);

    forDropping.dropWhile(s -> s % 3 == 0 )

    .forEach(s -> System.out.print(s + " "));

    ```


    The result of this operation for unordered streams is also non-deterministic,
    as the operation can drop any set, including the empty one.


    If these two operations are executed on parallel streams, the only thing that
    changes is the order in which the elements are printed, but the result sets contain
    the same elements.'
