  raw: '### !


    Arrays are accessed using indexes of their elements, and the counting starts in
    Java from 0\. Consequently, the first member of an array can be found at 0, the
    second at 1 and so on. But arrays can be empty, so in the previous code snippet,
    if no argument is specified, the execution of the program crash and in the console
    an explicit message are printed in red.


    `Exception in thread "main" java.lang.ArrayIndexOutOfBoundsException: 0`


    `at chapter.three/com.apress.bgn.ch3.helloworld.HelloWorld.main(HelloWorld.java:5)`


    When we try to access an empty array, or an element of an array that does not
    exist, Java programs crash and the JVM throws an object of type `ArrayIndexOutOfBoundsException`
    containing the line where the failure happened and the index of the element we
    were trying to access. Exception objects are used by the JVM to notify developers
    of exceptional situations when a Java execution does not work as expected and
    these objects contain information on where in the code it happened and what caused
    the problem.


    The modification we did in the previous code snippet prints the text value provided
    as argument when executing the class. Let’s modify the run configuration for this
    class and add an argument. If you click the small gray arrow next to the Run configuration
    name, a menu appears. Click **Edit Configurations...** and inspect the dialog
    window shown in Figure [3-26](#463938_1_En_3_Chapter.xhtml#Fig26) .


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig26_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig26_HTML.jpg)


    Figure 3-26


    Customizing a Run configuration


    In the image, the key elements were circled (well, enclosed in a rectangle actually,
    but you get the idea!). As you can see in the run configurations list in Figure
    [3-26](#463938_1_En_3_Chapter.xhtml#Fig26), IntelliJ IDEA saves a few of your
    previous executions, including the Gradle `build` task, that you executed earlier
    in this chapter. In the left of the **Run/Debug Configurations** dialog windows,
    you can see the IntelliJ IDEA run configurations grouped by type. By default,
    the last run configuration is opened on the right of the window, in this case
    it should be the run configuration for the `HelloWorld` class. There are a lot
    of options you can configure for an execution and most of them have been automatically
    decided by the IDE. The **Program arguments:** text field is where your arguments
    for the `main()` method are introduced. In Figure [3-26](#463938_1_En_3_Chapter.xhtml#Fig26),
    I introduced `Developer`. So, if you click the **Apply** button and then the **OK**
    button, and then execute the class, instead of *Hello World!* you should see now
    *Hello Developer!* in the console.


    So what else can we do with our class? Remember the code the book started with?
    Let’s put it in the main `main()` method .


    ```

    package com.apress.bgn.ch3.helloworld;

    import   java.util.List;

    public class HelloWorld {

    public static void main(String... args) {

    List items = List.of("1", "a", "2", "a", "3", "a");

    items.forEach(item -> {

    if (item.equals("a")) {

    System.out.println("A");

    } else {

    System.out.println("Not A");

    }

    });

    }

    }

    ```


    The `import` `java.util.List` ; statement is the only type of statement that can
    exist between a package and a class declaration. This statement is telling the
    Java compiler that object type `java.util.List` is used in the program. The `import`
    keyword is followed by the fully qualified name of the data type. A fully qualified
    name of a data type is made of the package name(`java.util`), a dot(.) and the
    simple name of the class(`List`). Without it, the class will not compile. Try
    it; just put `//` in front of the statement, which turns the line into a comment
    that is ignored by the compiler. You will see the editor complaining by making
    any piece of code related to that list bright red.


    The statement `List<String> items = List.of("1", "a", "2", "a", "3", "a");` creates
    a list of text values^([^(50)](#fn50),[^(51)](#fn51)) that are then traversed,
    one by one, by the `forEach` method, and each of them are tested to see if they
    are equal to the `"a"` character.^([^(52)](#fn52))


    If you run the class now, you should see a sequence of `A` and `Not A` in the
    console, each on its own line.


    ```

    Not  A

    A

    Not  A

    A

    Not  A

    A

    ```


    The code we have written until now uses a few types of objects to print a simple
    message in the console. The `List` object is used to hold a few `String` objects.
    The messages are printed using the `println()` method , that is called on the
    `out` object, that is a static field in the `System` class. And these are just
    the objects that are visible to you in the code. Under the hood, the `List` objects
    are processed by a `Consumer` object created on the spot that the lambda expression
    hides for simplicity.


    ```

    package com.apress.bgn.ch3.helloworld;

    import java.util.List;

    [import  java.util.function.Consumer;]

    public class HelloWorld {

    public static void main(String... args) {

    List items = List.of("1", "a", "2", "a", "3", "a");

    items.forEach(new Consumer() {

    @Override

    public void accept(String item) {

    if (item.equals("a")) {

    System.out.println("A");

    } else {

    System.out.println("Not A");

    }

    }

    });

    }

    }

    ```


    It might look scary now, but I promise that this book introduces each concept
    in a clear context and compared with real life objects and events so you can understand
    it easily. And if that does not work, there are always more books, more blogs,
    and the official Oracle webpage for each JDK, which have good tutorials. Where
    there’s a will, there’s a way.


