  raw: "If objects cannot be discarded from the memory, an exception of type\n`OutOfMemoryError`\
    \ is\nthrown. I’m not\nsure if you noticed, but this is not actually an exception.\
    \ The\nexception class hierarchy was mentioned in **Chapter**\n [**5**](#463938_1_En_5_Chapter.xhtml)\
    \ . If you\nremember, in that hierarchy there was a class named `java.lang.Error`\
    \ that\nimplements `java.lang.Throwable`.\nThese types of objects are thrown by\
    \ a program when there is a critical\nissue that the program cannot recover from.\
    \ The following is the full\nhierarchy of the `java.lang.OutOfMemoryError`.\n\n\
    ```\njava.lang.Object\njava.lang.Throwable\njava.lang.Error\njava.lang.VirtualMachineError\n\
    java.lang.OutOfMemoryError\n```\n\nSo, `OutOfMemoryError` is\none of those ugly\
    \ things you do not want thrown when your program is\nrunning, because this means\
    \ your program is no longer running. In this\ncase, it is not running because\
    \ it has no memory left to store new\nobjects being created.\nThis error is being\
    \ thrown by the JVM when anything goes\nwrong when doing memory management. Although,\
    \ the most common cause is\nthat the heap memory is depleted, there are other\
    \ causes.\n\nWhen heap memory allocated to the JVM is depleted, the error has\
    \ the\nfollowing message:\n\n```\nException in thread \"main\" java.lang.OutOfMemoryError:\
    \ Java heap space\n```\n\nBut there is another message that you might see.\n\n\
    ```\nException in thread \"main\" java.lang.OutOfMemoryError: GC Overhead Limit\
    \ Exceeded\n```\n\nThis message is still related to the heap size. The error is\
    \ thrown\nwith this message when the data for the program barely fits the size\
    \ of\nthe heap, so the heap is almost full, which allows the GC to run, but\n\
    because it cannot redeem any memory, the GC keeps running, and it is\nhindering\
    \ the normal execution of the application. This\nmessage is added to the error\
    \ when the GC spends 98% of execution time\nand the application spends the other\
    \ 2%.\nThese two are the most common error messages you see when GC cannot\ndo\
    \ its job properly for whatever reason. A complete list can be found at\n [`https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html)\
    \ , but since most GC issues relate to the heap size,\nG1GC mostly throws errors\
    \ with the *Java heap space* message.\n\nSummary\nThis section ends this book.\
    \ When it comes to the Java ecosystem,\nthere are a lot of books and tutorials\
    \ on the Internet. This book only\nscratches the surface to give you a good starting\
    \ point as a Java\ndeveloper. The whole team that worked on it hopes it satisfies\
    \ your\nneeds and sparks your curiosity to find out more. Just keep in mind that\n\
    there is no panacea solution to make sure the memory is always managed\nright\
    \ regardless of the application scope. If you get in trouble,\nexperimentation\
    \ is always a step in determining the right collector for\nyour JVM.\n\nThis chapter\
    \ has covered the following topics.\n\n*   what garbage collection is and the\
    \ steps involved\n\n*   how the heap memory is structured\n\n*   how many types\
    \ of garbage collectors there are in the Oracle\n    HotSpot JVM and how can we\
    \ switch between them\n\n*   how to view a garbage collector configurations and\
    \ statistics\n    using VM options\n\n*   how to view the garbage collection in\
    \ action using `finalize` and `Cleaner`\n\n*   how to stop the garbage collector\
    \ from collecting important\n    objects\n\n*   how to create objects that are\
    \ easily collected using soft\n    references\n\nFootnotes\n\nIndex\n\nA\n\nAbstract\
    \ Window Toolkit (AWT)\n\nAccess modifiers\n\ncompilation error\n\nmember-level\
    \ accessors\n\npackage-private modifier\n\npublic class\n\ntop-level\n\nanonymous\
    \ class\n\nanyMatch(..) method\n\nApache Tomcat\n\nArrays\n\nAssignment operator\
    \ (=)\n\nAudioType\n\nB\n\nBinary operators\n\nBinary representation\n\nBinary\
    \ serialization\n\nBitwise operators\n\nAND\n\nNOT\n\nOR\n\nXOR\n\nBoxing\n\n\
    Bubble sort algorithm\n\nBuilding blocks\n\naccess modifiers\n\nclass\n\nfields\n\
    \nJAR\n\nlibrary\n\nmethods\n\nmodules\n\npackage-info.java\n\nC\n\nChecked exceptions\n\
    \nClasses\n\nabstraction\n\nActor class\n\nHuman class\n\nJava compiler error\n\
    \nMusician class\n\nparent class/superclass\n\nsubclass"
  trans: '

    如果对象无法从内存中丢弃，则会抛出类型为 `OutOfMemoryError` 的异常。我不确定你是否注意到，但这实际上并不是一个异常。异常类层次结构曾在**第**
    **5** **章**中提到过。如果你还记得，在那个层次结构中，有一个名为 `java.lang.Error` 的类，它实现了 `java.lang.Throwable`。当程序遇到无法恢复的严重问题时，会抛出这些类型的对象。以下是
    `java.lang.OutOfMemoryError` 的完整层次结构。


    ```

    java.lang.Object

    java.lang.Throwable

    java.lang.Error

    java.lang.VirtualMachineError

    java.lang.OutOfMemoryError

    ```


    因此，`OutOfMemoryError` 是你在程序运行时最不希望抛出的那些讨厌东西之一，因为这意味着你的程序已停止运行。在这种情况下，程序停止运行是因为没有剩余内存来存储正在创建的新对象。当
    JVM 在执行内存管理时出现任何问题时，就会抛出此错误。虽然最常见的原因是堆内存耗尽，但也存在其他原因。


    当分配给 JVM 的堆内存耗尽时，错误会显示以下消息：


    ```

    Exception in thread "main" java.lang.OutOfMemoryError: Java heap space

    ```


    但你可能还会看到另一条消息。


    ```

    Exception in thread "main" java.lang.OutOfMemoryError: GC Overhead Limit Exceeded

    ```


    这条消息仍然与堆大小有关。当程序的数据勉强适合堆的大小时，会抛出带有此消息的错误，因此堆几乎已满，这允许 GC 运行，但由于它无法回收任何内存，GC 会持续运行，从而阻碍应用程序的正常执行。当
    GC 花费了 98% 的执行时间，而应用程序只花费了另外 2% 时，错误中会添加此消息。无论出于何种原因，当 GC 无法正常工作时，这两个是你最常见的错误消息。完整列表可在
    [`https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html)
    找到，但由于大多数 GC 问题都与堆大小有关，G1GC 大多会抛出带有 *Java heap space* 消息的错误。


    总结

    本节结束了本书。关于 Java 生态系统，互联网上有大量的书籍和教程。本书只是浅尝辄止，为你作为 Java 开发者提供一个良好的起点。参与本书的整个团队希望它能满足你的需求，并激发你的好奇心去探索更多。请记住，没有万能的解决方案可以确保无论应用程序范围如何，内存始终得到正确管理。如果你遇到问题，尝试总是确定
    JVM 正确收集器的一步。


    本章涵盖了以下主题。


    *   什么是垃圾回收及其涉及的步骤


    *   堆内存是如何结构的


    *   Oracle HotSpot JVM 中有多少种垃圾回收器，以及我们如何在它们之间切换


    *   如何使用 VM 选项查看垃圾回收器的配置和统计信息


    *   如何使用 `finalize` 和 `Cleaner` 查看垃圾回收的实际运行情况


    *   如何阻止垃圾回收器回收重要对象


    *   如何使用软引用创建易于回收的对象


