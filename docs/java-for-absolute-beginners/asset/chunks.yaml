    *   **G1（垃圾优先）**：在 Oracle JDK 7 Update 4 中引入，旨在永久取代 CMS 垃圾回收器，适用于能够与 CMS 回收器并发运行、需要内存压缩、需要更可预测的
    GC 暂停时间，且不需要更大堆内存的应用程序。G1 回收器是一种服务器风格的垃圾回收器，针对具有大内存的多处理器机器设计，考虑到现在大多数笔记本电脑至少拥有八核和
    16 GB 内存，它同样适用于这些设备。G1 既有并发阶段（与应用程序线程同时运行——例如，优化、标记、清理），也有并行阶段（多线程——例如，停止世界）。完全垃圾回收仍然是单线程的，但如果调整得当，你的应用程序应能避免完全垃圾回收。


    *   **Epsilon 无操作回收器**：在 Java 11 中引入，这种回收器是一种虚拟 GC，不回收或清理内存。当堆内存满时，JVM 会关闭。这种回收器可用于性能测试、内存分配分析、虚拟机接口测试，以及生命周期极短的任务，以及那些内存使用非常有限、开发者必须尽可能精确估算应用程序内存占用量的应用程序。


