    ### while 语句


    `while` 语句与 `for` 语句的不同之处在于，它没有固定数量的执行步骤，因此并不总是需要计数器。`while` 语句执行的重复次数仅取决于控制该次数的继续条件被评估为
    `true` 的次数。因此，该语句的通用模板如下所示：


    ```

    while ([eval(condition)] == true) {

    [code_block]

    }

    ```


    `while` 语句实际上也不需要初始化语句，因为它可以放在代码块内部或语句外部。`while` 语句可以替代 `for` 语句，但 `for` 语句的优势在于它将初始化、终止条件和计数器的修改封装在一个单独的块中，因此更加简洁。数组遍历的代码示例可以使用
    `while` 语句重写；代码如下所示。


    ```

    package com.apress.bgn.ch7;

    public class WhileLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int  i=0;

    while(i < arr.length){

    System.out.println("arr[" + i + "] = " + arr[i]);

    ++i;

    }

    }

    }

    ```


    如你所见，计数器变量 `int i=0;` 的声明和初始化是在语句外部完成的，而计数器的递增是在要重复的代码块内部完成的。基本上，此时如果我们为此场景设计流程图，它将与图
    7-9 中描绘的 `for` 语句相同。


    听起来可能难以置信，但 `[condition]` 也不是强制性的，因为它可以直接替换为 `true`。但在这种情况下，你必须确保在某个时刻执行的代码块中存在一个退出条件；否则，执行很可能会以错误结束。并且这个条件必须放在代码块的开头，以防止在不应该执行的情况下执行有用的逻辑。对于我们的简单示例，我们不希望对索引超出数组范围的元素调用
    `System.out.println`。


    ```

    package com.apress.bgn.ch7;

    public class WhileLoopDemo {

    public static void main(String... args) {

    int arr[] = {5, 1, 4, 2, 3};

    int  i=0;

    while(true){

    if (i >= arr.length) {

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    ++i;

    }

    }

    }

    ```


    `while` 语句最适合用于处理并非始终在线的资源。假设我们为应用程序使用了一个位于不稳定网络中的远程数据库。与其在第一次超时后就放弃保存数据，我们可以不断尝试直到成功，对吧？这可以通过使用一个在其代码块中尝试初始化连接对象的
    `while` 语句来实现。代码大致如下：


