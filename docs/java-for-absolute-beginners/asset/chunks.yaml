  raw: '### Interfaces


    One of the most common Java interview questions is, “What is the difference between
    an interface and an abstract class?” This section provides you the most detailed
    answer to that question. An **interface** is not a class, but it does help create
    classes. An interface is fully abstract; it has no fields, only method definitions
    (skeletons). A class can implement an interface, and unless the class is abstract,
    it is forced to provide concrete implementations for them. Each method declared
    inside an interface is implicitly public and abstract, because methods need to
    be abstract to force implementing classes to provide implementations and are public,
    so classes have access to do so.


    The only methods with concrete bodies in an interface are static methods and starting
    with Java 8, **default** methods. The interfaces cannot be instantiated, they
    do not have constructors.


    Interfaces that declare no method definitions are called **marker** interfaces
    and have the purpose to mark classes for specific purposes. The most renowned
    Java marker interface is `java.io.Serializable`, which marks objects that can
    be serialized(their state can be saved to a binary file).


    An interface can be declared in its own file as a top-level component, or nested
    inside another component. There are two types of interfaces: normal interfaces
    and annotations.


    The difference between abstract classes and interfaces, and when one or the other
    should be used, becomes relevant in the context of **inheritance**. Java supports
    only single inheritance. This means a class can only have one superclass. This
    might seem like a limitation, but let’s consider a simple example. Let’s modify
    the previous hierarchy and imagine a class called `Performer` that should extend
    the `Musician` and `Actor` classes . If you need a real human that can be modelled
    by this class, think of David Duchovny, an actor who recently got into music.


    Figure [4-7](#463938_1_En_4_Chapter.xhtml#Fig7) shows the class hierarchy.


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig7_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Diamond class hierarchy


    The hierarchy in Figure [4-7](#463938_1_En_4_Chapter.xhtml#Fig7) introduces something
    called **the diamond problem**, and the name is inspired by the shape formed by
    the relationships between classes. What is actually wrong with the design? If
    both `Musician` and `Actor` extend `Human`, and inherit all members from it, which
    member does `Performer` inherit and from where? Because it cannot inherit members
    of the `Human` class twice - this would make this class useless and invalid. So,
    what is the solution? As you probably imagine, given the title of this section:
    **interfaces**.


    What has to be done is to turn methods in classes `Musician` and `Actor` into
    method skeletons and transform those classes into interfaces. The behavior from
    the `Musician` is moved to a class called, let’s say `Guitarist`, which extends
    the `Human` class and implement the `Musician` interface. For the `Actor` class,
    something similar can be done, but I’ll leave that as an exercise for you. Some
    help is provided by the hierarchy shown in Figure [4-8](#463938_1_En_4_Chapter.xhtml#Fig8).


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig8_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Java hierarchy with interfaces for Performer class


    The `Musician` interface contains only method templates mapping what a musician
    does. It does not go into detail to model how. The same goes for the `Actor` interface.
    In the following code snippet, you can see the bodies of the two interfaces.


    ```

    // Musician.java

    package com.apress.bgn.ch4.hierarchy;

    import java.util.List;

    public interface Musician {

    String getMusicSchool();

    void setMusicSchool(String musicSchool);

    List getSongs();

    void setSongs(List songs);

    String getGenre();

    void setGenre(String genre);

    }

    // Actor

    package com.apress.bgn.ch4.hierarchy;

    import java.util.List;

    public interface Actor {

    String getActingSchool();

    void setActingSchool(String actingSchool);

    List getFilms();

    void setFilms(List films);

    void addFilm(String filmName);

    }

    ```


    The fields have been removed because they cannot be part of the interfaces; all
    that is left are the method templates. The `Performer` class is depicted in the
    next code snippet.


    ```

    package com.apress.bgn.ch4.hierarchy;

    import java.util.List;

    public class Performer extends Human

    implements Musician, Actor {

    private String musicSchool;

    private String genre;

    private List songs;

    private String actingSchool;

    private List films;

    public Performer(String name, int age, float height, Gender gender) {

    super(name, age, height, gender);

    }

    @Override

    public int getTimeToLive() {

    return (LIFESPAN - getAge()) / 2;

    }

    public String getMusicSchool() {

    return musicSchool;

    }

    public void setMusicSchool(String musicSchool) {

    this.musicSchool = musicSchool;

    }

    public List getSongs() {

    return songs;

    }

    public void setSongs(List songs) {

    this.songs = songs;

    }

    public void addSong(String song) {

    this.songs.add(song);

    }

    public String getGenre() {

    return genre;

    }

    public void setGenre(String genre) {

    this.genre = genre;

    }

    public String getActingSchool() {

    return actingSchool;

    }

    public void setActingSchool(String actingSchool) {

    this.actingSchool = actingSchool;

    }

    public List getFilms() {

    return films;

    }

    public void setFilms(List films) {

    this.films = films;

    }

    public void addFilm(String filmName) {

    this.films.add(filmName);

    }

    }

    ```


    What you are left with from this example is that using interfaces **multiple inheritance**
    is possible in Java, and that classes extend classes and implement interfaces.
    But inheritance applies to interfaces too. For example, both `Musician` and `Actor`
    interface can extend an interface named `Artist` that contains template for behavior
    common to both. For example, we can combine the music school and acting school
    into a generic school and define the setters and getters for it as method templates.
    The `Artist` interface is depicted as follows with `Musician`.


    ```

    // Artist.java

    package com.apress.bgn.ch4.hierarchy;

    public interface Artist {

    String getSchool();

    void setSchool(String chool);

    }

    // Musician.java

    package com.apress.bgn.ch4.hierarchy;

    import java.util.List;

    public interface Musician extends Artist {

    List getSongs();

    void setSongs(List songs);

    String getGenre();

    void setGenre(String genre);

    }

    ```


    Hopefully, you understood the idea of multiple inheritance, when it is appropriate
    to use classes, and when to use interfaces in designing your applications. It
    is time to fulfill the promise made in the beginning of this section and list
    the differences between abstract classes and interfaces. You can find them in
    Table [4-1](#463938_1_En_4_Chapter.xhtml#Tab1).


    Table 4-1


    Differences Between Abstract Classes and Interfaces in Java


    | Abstract Class | Interface |

    | --- | --- |

    | Can have non-abstract methods | Can only have abstract and (since Java 8 default
    methods, since Java 9 private methods) |

    | Single inheritance: a class can only extend one class | Multiple inheritance:
    a class can implement more than one interface. |

    | Can have final, non-final, static and non-static variables | Can only have static
    and final fields. |

    | Declared with **abstract class** | Declared with **interface**. |

    | Can extend another class using keyword **extends** and implement interfaces
    with keyword **implements** | Can only extend other interfaces (one or more) using
    key-word **extends**. |

    | Can have non-abstract, protected or private members | All members are method
    definitions and are by default abstract and public. (Except default methods, starting
    with Java 8 and private methods, starting with Java 9.) |

    | If a class has an abstract method, it must be declared itself abstract | (No
    correspondence) |'
