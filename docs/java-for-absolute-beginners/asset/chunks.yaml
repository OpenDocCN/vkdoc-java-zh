    ## switch Statement


    When a value requires different actions for a fixed set of values, the `if` might
    get more complex, the more the set of values increases. In this case the more
    suitable statement is the `switch` statement. Let’s look at the code first, and
    then check what more can be improved.


    ```java

    package com.apress.bgn.ch7;

    public class SeasonSwitchDemo {

    public static void main(String... args) {

    //Read a

    int a = Integer.parseInt(args[0]);

    var season = "";

    switch (a) {

    case 1:

    season = "Winter";

    break;

    case 2:

    season = "Winter";

    break;

    case 3:

    season = "Spring";

    break;

    case 4:

    season = "Spring";

    break;

    case 5:

    season = "Spring";

    break;

    case 6:

    season = "Summer";

    break;

    case 7:

    season = "Summer";

    break;

    case 8:

    season = "Summer";

    break;

    case 9:

    season = "Autumn";

    break;

    case 10:

    season = "Autumn";

    break;

    case 11:

    season = "Autumn";

    break;

    case 12:

    season = "winter";

    break;

    default:

    System.out.println("Error");

    }

    System.out.println(season);

    }

    }

    ```


    Hm... that does not look very practical, at least not for this scenario. Before
    showing how the `switch` statement can be written differently, let’s explain the
    structure and logic of it first. The general template of a switch statement is


    ```java

    switch ([onvar]) {

    case [option]:

    [statement;]

    break;

    ...

    default:

    [statement;]

    }

    ```


    The terms in square brackets are detailed in the following list.


    *   `[onvar]` is the variable that is tested against the `case` statements to
    select a statement. It can be of any primitive type, enumerations and starting
    with Java 7, `String`. Clearly the `switch` statement is not limited by conditions
    evaluated to `boolean` results, which allows for a lot of flexibility.


    *   `case [option]` is a value the variable is matched upon to make a decision
    regarding the statement to execute. A `case` as the keyword states.


    *   `[statement]` is a statement or a groups of statements to execute when `[onvar]
    == [option]`. Considering that there is no `else` branch, we have to make sure
    that only the statement(s) corresponding to the first match is executed, which
    is where the `break;` statement comes in. The `break` statement stops the current
    execution path and moves the execution point to the next statement outside the
    statement that contains it. I’ll cover it later in the chapter. Without it, after
    the first match, all subsequent cases are traversed, and statements corresponding
    to them are executed.


    So, if we execute the preceding program and we provide number 7 as an argument,
    the text *Summer* is printed. But if the `break` statements for case 7 and 8 are
    commented, the output changes to *Autumn*.


    *   `default [statement;]` is a statement that is executed when no match on a
    `case` has been found, the `default` case does not need a `break` statement. If
    the previous program is run with any number outside the `[1-12]` interval, `Error`
    is printed because the default statement is executed.


    Now that you understand how `switch` works, let’s look at how we can reduce the
    previous statement. The month example is suitable here, because it can further
    be modified to show how the `switch` statement can be simplified, when a single
    statement should be executed for multiple cases. In our code, writing each assignment
    statement three times is a little redundant. `switch` can be written in a different
    way to avoid that by grouping the cases. The code is depicted next.


    ```java

    package com.apress.bgn.ch7;

    public class SeasonSwitchDemo {

    public static void main(String... args) {

    //Read a

    int a = Integer.parseInt(args0);

    var season = "";

    switch (a) {

    case 1:

    case 2:

    case 12:

    season = "winter";

    break;

    case 3:

    case 4:

    case 5:

    season = "Spring";

    break;

    case 6:

    case 7:

    case 8:

    season = "Summer";

    break;

    case 9:

    case 10:

    case 11:

    season = "Autumn";

    break;

    default:

    System.out.println("Error");

    }

    System.out.println(season);

    }

    }

    ```


    The grouping in this case represents the alignment of the cases that require the
    same statement to be executed, and writing it only once in the last one. This
    still looks a little weird, but this is the only way to reduce the statement repetition.
    The behavior in the previous case is possible because each case without a `break`
    statement is followed by the next case statement.


    In Java 7, the `switch` statement started supporting `String` values. The main
    problems with `switch` supporting `String` values is that there is always a risk
    of `NullPointerException`s being thrown, because the `equals` method is used to
    test matching of the items, and the variable used in the switch statement can
    be null. Also, because equals is used, the comparison is case sensitive. If we
    modify the previous example and ask the user for a text representing the month,
    and use `switch` to decide the season to print, unless we use the exact text in
    case options that the user will use when writing the argument, we won’t get the
    expected result.


    The code changes to


    ```java

    package com.apress.bgn.ch7;

    public class StringSwitchSeasonDemo {

    public static void main(String... args) {

    //Read a

    String a = args0;

    var season = "";

    switch (a) {

    case "january":

    case "february":

    case "december":

    season = "winter";

    break;

    case "march":

    case "april":

    case "may":

    season = "Spring";

    break;

    case "june":

    case "july":

    case "august":

    season = "Summer";

    break;

    case "september":

    case "october":

    case "november":

    season = "Autumn";

    break;

    default:

    System.out.println("Error");

    }

    System.out.println(season);

    }

    }

    ```


    If we run the previous program with the `"january"` argument, the text `"winter"`
    is printed in the console. If we run it with argument `"january"`, the text `"Error"`
    is printed in the console. And if we run it with `null`, a `NullPointerException`
    is thrown in the line where the `switch` statement begins.


    And this is all that can be said about the `switch` statement. In practice, depending
    on the solution you are trying to develop, you might decide to use a combination
    of `if` and `switch` statements.


