    For now, let this affirmation sink in: **a** **public class** **is visible to
    all classes everywhere**.


    The option to not use an access modifier it is called using the `default` or `package-private`
    modifier .^([^(40)](#fn40)) This means if a class has no access modifier, the
    class is only visible to classes defined in the same package. A class without
    an access modifier can be defined in any Java file, one that has the same name,
    or right next to the class that gives the file its name. So, if we were to declare
    a class named `HiddenBase` in the `Base.java` file as depicted in the following
