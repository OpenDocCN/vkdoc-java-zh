    Button btn = new Button();

    btn.setText("Bye bye! ");

    btn.setOnAction(new EventHandler() {

    @Override

    public void handle(ActionEvent event) {

    Platform.exit();

    }

    });

    StackPane root = new StackPane();

    root.getChildren().add(btn);

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    ...

    ```


