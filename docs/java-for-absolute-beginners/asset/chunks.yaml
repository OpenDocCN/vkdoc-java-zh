  trans: "\n## 测试\n\n调试是软件流程中称为**测试**的一部分，涉及识别和纠正代码错误。但仅仅避免技术错误是不够的，测试应用程序的意义远不止于此。有一个组织为软件测试人员提供非常优质的培训和认证材料。**国际软件测试资格认证委员会**（ISTQB）是一个国际性的软件测试资格认证组织。它制定了软件测试的教学大纲、资格等级和指南。^(⁷¹)\
    \ 如果你认为自己更倾向于软件测试领域，那么你应该考虑获取 ISTQB 认证。\n\nISTQB 将测试定义为：“由所有生命周期活动（包括静态和动态）组成的过程，涉及对软件及相关工作产品的规划、准备和评估，以确定它们满足规定的要求，证明它们适合其用途，并检测缺陷。”\n\
    \n这是一个技术性和学术性的定义。我提出的定义是：“验证一个实现是否在预期的时间内，以可接受的资源消耗完成了它应该完成的任务，并且在执行过程中没有破坏任何东西的过程。”\n\
    \n### 测试小引\n\n*我想成为一名开发者。为什么我需要了解所有这些关于测试的细节？* 简单的答案是，因为测试是一项持续的活动，在软件应用程序生命周期的每个阶段都会进行。在设计阶段，会进行模拟，并由经验丰富的人员审查设计，以判断它是否代表了问题的合适解决方案以及是否可实现。在编写代码时，必须对其进行测试，以确保应用程序不会崩溃并按预期运行。在交付之前，有一个名为验收测试的阶段，客户代表会在受控环境中测试应用程序，以便记录每个操作并识别问题。测试可以通过调试来完成，使用到目前为止介绍的所有方法，但调试的缺点是它是手动且重复的。因此，让我们介绍一种更自动化的应用程序测试方法。\n\
    \n### ！\n\n测试是开发过程中必不可少的一部分，应尽早开始，因为修复缺陷的工作量会随着其被发现的时间呈指数级增长。^(⁷²)\n\n在开发阶段，除了编写实际的解决方案外，你还可以编写代码来测试你的解决方案。这些测试可以手动运行，也可以在构建项目时由构建工具运行。在编写代码时，除了思考解决问题的方案外，你还应该思考如何测试该方案。这种方法被称为**TDD**，即**测试驱动开发**的缩写，这是一种编程范式，它指出你应该在实现解决方案之前思考如何测试它，因为如果它难以测试，那么它很可能难以实现、长期维护以及扩展以解决相关问题。\n\
    \n最简单的测试称为**单元测试**，它测试功能的小单元。如果单元测试无法轻松编写，你的设计可能存在问题。单元测试是抵御失败的第一道防线。如果单元测试失败，那么你的解决方案的基础就是糟糕的。\n\
    \n跨越多个组件，测试功能单元之间的通信以及它们交互的结果与预期结果是否一致的测试，称为**集成测试**。\n\n开发人员应该编写的最后一种测试是**回归测试**，即定期运行的测试，以确保之前测试过的代码在更改后仍然能正确执行。这类测试对于由大量开发人员编写代码的大型项目至关重要，因为有时组件之间的依赖关系并不明显，一个开发人员编写的代码可能会破坏另一个开发人员的代码。\n\
    \n本节仅向你展示如何使用名为 JUnit 的 Java 库编写单元测试。它描述了一些典型的测试组件，开发人员可以构建这些组件来为单元测试设置上下文。因此，正如我的苏格兰同事所说，*让我们开始吧！*\n\
    \n### 测试代码位置\n\n你可能还记得，在**第** 3 章中，我们解释了 `java-for-absolute-beginners` 项目结构。关于测试的讨论必须从项目最低层级模块的结构开始，这些模块包含源代码和测试。图\
    \ 9-13 显示了本节所用模块的源代码和测试代码的模块结构。\n\n图 9-13 所示的结构可以解释如下。\n\n*   `src` 目录包含项目的所有代码和资源。其内容分为\
    \ `main` 和 `test` 两个目录。\n    *   `main` 目录包含源代码和应用程序配置文件，分为两个子目录。`java` 目录包含 Java\
    \ 源代码，`resources` 目录包含配置文件、非可执行文本文件（可以根据各种格式编写：XML、SQL、CSV 等）、媒体文件、PDF 等。当应用程序被构建并打包成\
    \ jar（或 war 或 ear）时，只有 `java` 目录中的文件会被考虑，`*.class` 文件与配置文件一起被打包。\n\n    *   `test`\
    \ 目录包含用于测试 `src` 目录中源代码的代码。Java 文件保存在 `java` 目录下，`resources` 目录中包含构建测试上下文所需的配置文件。`test`\
    \ 目录的内容不属于交付给客户的项目的一部分。它们的存在是为了在开发过程中帮助测试应用程序。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig13_HTML.jpg](img/463938_1_En_9_Fig13_HTML.jpg)\n\
    \n图 9-13\n\nGradle 模块结构\n"
- fmt: '### Application to Test


    For the examples in this section we build a simple application that uses an embedded
    Derby^([^(73)](#fn73)) database to store data. This is the production database.
    For the test environment the database is replaced with various pseudo-constructions
    that mimic the database behavior. The application is rudimentary. An `AccountService`
    implementation takes data from the input and uses it to manage `Account` instances.
    The `Account` class is a very abstract an unrealistic implementation of a banking
    account. It has a `holder` field, which is the account owner, an `accountNumber`
    field, and an `amount` field. The `AccountService` implementation uses an `AccountRepo`
    implementation to perform all related database operations with `Account` instances
    using an implementation of `DBConnection`. The classes and interfaces that are
    making up this simple application and relationships between them are depicted
    in Figure [9-14](#463938_1_En_9_Chapter.xhtml#Fig14).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig14_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig14_HTML.jpg)


    Figure 9-14


    Simple Account management application components


    The implementation of these classes is not relevant for this section, but if you
    are curious, you can find the full code on this book’s official repository. So,
    let’s start testing. The easiest way would be to write a main class and perform
    some account operations. But, we do not want that, once the application is in
    production we can no longer test new features on it, because there are risks of
    data corruption. Also, production databases are usually hosted on costly products,
    such as Oracle RDBMS (Oracle Relational Database Management System) or Microsoft
    SQL Server. They are not really appropriate for development, or testing. Also,
    the intention is to run tests automatically, so in-memory or implementations that
    can be instantiated are more suitable. So, let’s start by testing our `AccountRepoImpl`.


    ### Introducing JUnit


    JUnit is undoubtedly the most used testing framework in the Java development world.
    At the end of 2017, JUnit 5^([^(74)](#fn74)) was released that is the next generation
    of this framework. It comes with a new engine, is compatible with Java 9+, and
    comes with a lot of lambda-based functionalities. JUnit provides annotations to
    mark test methods for automated execution, annotations for initialization and
    destruction of a test context and utility methods to practically implement test
    methods. There are multiple JUnit annotations that you can use. Five of them (and
    a utility class) represent the core of the JUnit framework, which is the best
    place to learn testing. Below each of them are a short description that builds
    a general picture of how JUnit can be used to test your application.


    *   `@BeforeAll` from package `org.junit.jupiter.api` is used on a `non-private
    static` method that returns `void` used to initialize objects and variables to
    be used by all test methods in the current class. This method is called only once,
    before all test methods in the class, so test methods should not modify these
    objects, because their state is shared and it might affect the test results. Eventually,
    the static fields to be initialized by the annotated method, can be `declared
    final`, so once initialized, they can no longer be changed. More than one method
    annotated with `@BeforeAll` can be declared in a test class, but what would be
    the point?


    *   `@AfterAll` from package `org.junit.jupiter.api` is the counterpart of `@BeforeAll`.
    It is also used to annotate `non-private static` methods that return `void`, but
    their purpose is to destroy the context the test methods were run in and perform
    cleanup actions.


    *   `@BeforeEach` from package `org.junit.jupiter.api` is used on `non-private
    non-static` methods that return `void` and as its name says, methods annotated
    with it are executed before every method annotated with `@Test`. These methods
    can be used to further customize the test context to populate objects with values
    that tests assertions in the test methods.


    *   `@AfterEach` from package `org.junit.jupiter.api` is used on `public non-static`
    methods that return `void` and as its name says, methods annotated with it are
    executed after every method annotated with `@Test`.


    *   `@Test` from package `org.junit.jupiter.api` is used on `non-private non-static`
    methods that return `void` and as its name says, the method annotated with it
    is a test method. A test class can have one or more, depending on the class that
    is being tested.


    *   Utility class `org.junit.jupiter.api.Assertions` provides a set of methods
    that support asserting conditions in tests.


    Another annotation that you might be interested to know it exists is `@DisplayName`.
    It is declared in the same package as all the others and receives a text argument
    that represents the test display name, which is displayed by the editor and in
    the resulting reports created by the build tool. Let’s write a pseudo test class
    so you can get an idea of how test classes look.


    ```

    package com.apress.bgn.ch9.pseudo;

    import org.junit.jupiter.api.*;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class PseudoTest {

    private static final Logger log =

    LoggerFactory.getLogger(PseudoTest.class);

    @BeforeAll

    public static void loadCtx() {

    log.info("Loading general test context.");

    }

    @BeforeEach

    public  void setUp(){

    log.info("Prepare  single test context.");

    }

    @Test

    @DisplayName("test one")

    public void testOne() {

    log.info("Executing test one.");

    assertTrue(true);

    }

    @Test

    @DisplayName("test two")

    public void testTwo() {

    log.info("Executing test two.");

    assertFalse(false);

    }

    @AfterEach

    public void tearDown(){

    log.info("Destroy  single test context.");

    }

    @AfterAll

    public static void unloadCtx(){

    log.info("UnLoading general test context.");

    }

    }

    ```'
