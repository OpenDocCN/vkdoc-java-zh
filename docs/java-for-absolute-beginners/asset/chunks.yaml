- fmt: '### Logging with JUL


    The JDK provides its own logger classes that are hosted under package `java.util.logging`,
    which is why the logging module provided by the JDK is also called **JUL**. A
    `Logger` class instance is used to log messages. The logger instance should be
    provided a name when created, and log messages are printed by calling specialized
    methods that print messages at different levels. For the JUL module, the levels
    and their scope are listed next, but other logging libraries have similar logging
    levels.


    - `OFF` - should be used to turn off all logging

    - `SEVERE` – is the highest level, message indicates a serious failure

    - `WARNING` - indicates that this message is being printed because of a potential
    problem

    - `INFO` - indicates that this is an informational message

    - `CONFIG` - indicates that this is a message containing configuration information

    - `FINE` - indicates that this is a message providing tracing information

    - `FINER` - indicates that this is a fairly detailed tracing message

    - `FINEST` - indicates that this is a very detailed tracing message

    - `ALL` - all log messages should be printed


    Loggers can be configured using XML or properties files, and their output can
    be directed to external files. For the code sample introduced previously, let’s
    replace all `System.out.print` method calls with logger calls. Let’s start with
    the `SorterJulDemo` class.


    ```

    package com.apress.bgn.ch9;

    import com.apress.bgn.ch9.algs.IntSorter;

    import com.apress.bgn.ch9.algs.MergeSort;

    import java.util.Arrays;

    import java.util.logging.Logger;

    public class SortingJulDemo {

    private static final Logger log =

    Logger.getLogger(SortingJulDemo.class.getName());

    public static void main(String... args) {

    int arr[] = {5,1,4,2,3};

    log.info("Sorting  an array with merge sort");

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length-1);

    StringBuilder sb = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.info(sb.toString());

    }

    }

    ```


