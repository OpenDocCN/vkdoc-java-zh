- fmt: "# Debugging Stream Code\n\nThe `peek()` method can be used for a light debugging,\
    \ more like logging the changes that happen on stream elements between one stream\
    \ method call and another. A more advanced way to debug streams is provided by\
    \ the IntelliJ IDEA editor; starting on May 11, 2017, this editor includes a specialized\
    \ plugin, called the Java Stream Debugger, for stream debugging.\n\nI am assuming\
    \ that you already have a version of IntelliJ IDEA that is more recent than 2017,\
    \ so you should already have this plugin. To use it, you have to place a breakpoint\
    \ on the line where a stream processing chain is defined. Figure 8-2 shows a piece\
    \ of code representing the processing of a stream of `Song` instances executed\
    \ in debug and a breakpoint paused the execution in line 44. When the execution\
    \ is paused the Stream debugger view can be opened by clicking the button that\
    \ is surrounded in the red rectangle.\n\n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig2_HTML.jpg](images/463938_1_En_8_Chapter/463938_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2 Debugging\n\nIf you click the debugger button shown in Figure 8-2,\
    \ a pop-up window appears; it has a tab for each operation of the stream processing.\
    \ Figure 8-3 shows the tabs and their methods underlined and linked to each other.\n\
    \n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig3_HTML.jpg](images/463938_1_En_8_Chapter/463938_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3 The Java Stream Debugger window\n\nIn each of the tabs, the text\
    \ box on the left contains the elements on the original stream and on the text\
    \ box on the right contains the resulting stream with its elements. For operations\
    \ that reduce the number of elements or change their order there are lines from\
    \ one set of elements to the other. The first `map` method transforms the song\
    \ titles to their uppercase versions. The second `map` method transforms the duration\
    \ of the songs in minutes and returns a stream of integers. The `distinct` method\
    \ produces a new stream that contains only the distinct elements, and this operation’s\
    \ effect is depicted nicely in Figure 8-4.\n\n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig4_HTML.jpg](images/463938_1_En_8_Chapter/463938_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4 The `distinct()` operation in the IntelliJ IDEA stream debugger\n\
    \nThe next operation is `sorted()` that sort the entries on the stream returned\
    \ by the `distinct()` operation. The reordering of the elements and adding them\
    \ to a new stream is depicted in the debugger also and in Figure 8-5.\n\n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig5_HTML.jpg](images/463938_1_En_8_Chapter/463938_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5 The `sorted()` operation in the IntelliJ IDEA stream debugger\n\n\
    Of course, after inspecting the results in the debugger, even if you want to continue\
    \ the execution, this won’t be possible, because all elements in the original\
    \ stream and the resulting ones were consumed by the debugger, so the following\
    \ exception is printed in the console.\n\n```\nConnected to the target VM, address:\
    \ '127.0.0.1:64083', transport: 'socket'\nException in thread \"main\" java.lang.IllegalStateException:\n\
    stream has already been operated upon or closed\nDisconnected from the target\
    \ VM, address: '127.0.0.1:64083', transport: 'socket'\nat java.base/java.util.stream.AbstractPipeline.AbstractPipeline.java:203\n\
    at java.base/java.util.stream.ReferencePipeline.ReferencePipeline.java:94\nat\
    \ java.base/java.util.stream.ReferencePipeline$StatelessOp.\nReferencePipeline.java:696\n\
    at java.base/java.util.stream.ReferencePipeline$3.ReferencePipeline.java:189\n\
    at java.base/java.util.stream.ReferencePipeline.mapReferencePipeline.java:188\n\
    at chapter.eight/com.apress.bgn.ch8.StreamDebuggerDemo.mainStreamDebuggerDemo.java:45\n\
    ```\n\n## Summary\n\nAfter reading this chapter and running the provided code\
    \ samples, it should be clear why the Stream API is so awesome. I like three things\
    \ best: more compact and simple code can be written to solve problems without\
    \ losing readability (`if`s and loops can be avoided), parallel processing of\
    \ data is possible without the boilerplate code required before Java 8 and the\
    \ fact that code can be written in Functional Programming style. Also, the Stream\
    \ API is more a declarative way of programming as most stream methods take arguments\
    \ of type `Consumer<T>`, `Predicate<T>`, or `Function<T>`, which declare what\
    \ should be done for each stream element, but the methods are not explicitly called\
    \ from the developer written code.\n\nThis chapter also covered how to use `Optional<T>`\
    \ instances to avoid `NullPointerExceptions` and writing `if` statements.\n\n\
    After you finished reading this chapter, you should have a pretty good idea about\
    \ the following.\n\n*   how to create sequential and parallel streams from collections\n\
    *   what empty streams are useful for\n*   terms to remember about streams:\n\
    \    *   sequence of elements\n    *   predicate\n    *   consumer\n    *   supplier\n\
    \    *   method reference\n    *   source\n    *   aggregate operations\n    *\
    \   intermediate operation\n    *   terminal operation\n    *   pipelining\n \
    \   *   internal automatic iterations\n*   how to create and use `Optional` instances\n\
    \n# 9. Debugging, Testing, and Documenting\n\nDevelopment work does not only require\
    \ you to write design the solution for a problem and write the code for it. To\
    \ make sure your solution solves the problem, you have to test it. Testing involves\
    \ making sure every component making up your solution behaves as expected in expected\
    \ and unexpected situations.\n\nThe most practical way to test code is to inspect\
    \ values of intermediary variables by logging them; print them in the console\
    \ only in specific situations.\n\nWhen a solution is complex, debugging provides\
    \ the opportunity to pause the execution and inspect state of the variables. Debugging\
    \ sometimes involves breakpoints and requires an IDE. Breakpoints are points where\
    \ the application pauses its execution, and the inspection of variables can be\
    \ performed.\n\nAfter making sure your solution fits the requirements, you have\
    \ to document it, especially if the problem that is being solved is one that requires\
    \ complex code to solve it. Or if your solution might be a prerequisite for other\
    \ applications, it is your responsibility to explain other developers how to use\
    \ it.\n\nThis chapter covers a few ways to do all these, because these are key\
    \ talents for a developer.\n\n## Debugging\n\nDebugging is a process of finding\
    \ and resolving defects or problems within a computer program. There are more\
    \ debugging tactics, and depending of the complexity of an application, one or\
    \ more can be used. The following is a list of those techniques.\n\n*   logging\
    \ intermediary states of objects involved in the process and analyzing log files\n\
    *   interactive debugging using breakpoints to pause the execution of the program\
    \ and inspect intermediary states of objects involved in the process\n*   testing\n\
    *   monitoring at the application or system level\n*   analysis of memory dumps\
    \ item profiling, a form of dynamic program analysis that measures the memory\
    \ occupied by a program, or CPU used, duration of method calls, and so forth.\n\
    \nLet’s start with the simplest way of debugging: logging."
