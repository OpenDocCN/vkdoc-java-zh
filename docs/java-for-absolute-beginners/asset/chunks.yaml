    XML 序列化


    但是，Java 序列化并不一定非要产生难以理解的文件，对象可以序列化为可读的格式。最常用的序列化格式之一是 XML，JDK 提供了将对象转换为 XML 以及从
    XML 转换回原始对象的类。**Java 架构用于 XML 绑定 (JAXB)** 提供了一种快速便捷的方式来绑定 XML 模式和 Java 表示，使 Java
    开发者能够轻松地在 Java 应用程序中整合 XML 数据和数据处理功能。将对象序列化为 XML 的操作称为 *编组 (marshalling)*。从 XML
    反序列化对象的操作称为 *反编组 (unmarshalling)*。要使一个类可序列化为 XML，必须使用 JAXB 特定的注解进行修饰。


    *   `@XmlRootElement(name = "...")` 是一个顶层注解，放置在类级别，用于告诉 JAXB 在序列化时类名将成为一个 XML
    元素；如果需要为 XML 元素指定不同的名称，可以通过 `name` 属性来指定。

    *   `@XmlElement(name = "..")` 是一个方法或字段级别的注解，用于告诉 JAXB 在序列化时字段名或方法名将成为一个 XML 元素；如果需要为
    XML 元素指定不同的名称，可以通过 `name` 属性来指定。

    *   `@XmlAttribute(name = "..")` 是一个方法或字段级别的注解，用于告诉 JAXB 在序列化时字段名或方法名将成为一个 XML
    属性；如果需要为 XML 属性指定不同的名称，可以通过 `name` 属性来指定。


    JAXB 已从 JDK 11 中移除，因此如果你想使用它，必须添加外部依赖。在编写本章时，它也有些不太稳定，类 `com.sun.xml.internal.bind.v2.ContextFactory`
    是 `jaxb-impl` 库的一部分，该库目前在任何公共仓库中都找不到，至少没有用 Java 11 编译的版本。以下是使 `Singer` 类可通过 JAXB
    序列化的代码。


    ```

    package com.apress.bgn.ch11.xml;

    import javax.xml.bind.annotation.XmlAttribute;

    import javax.xml.bind.annotation.XmlElement;

    import javax.xml.bind.annotation.XmlRootElement;

    import java.io.Serializable;

    import java.time.LocalDate;

    import java.util.Objects;

    @XmlRootElement(name = “singer”)

    public class Singer implements Serializable {

    private static final long serialVersionUID = 42L;

    private String name;

    private Double rating;

    private LocalDate birthDate;

    public Singer() {

    /* required for deserialization */

    }

    public Singer(String name, Double rating, LocalDate birthDate) {

    this.name = name;

    this.rating = rating;

    this.birthDate = birthDate;

    }

    @XmlAttribute(name = “name”)

    public String getName() {

    return name;

    }

    @XmlAttribute(name = “rating”)

    public Double getRating() {

    return rating;

    }

    @XmlElement(name = “birthdate”)

    public LocalDate getBirthDate() {

    return birthDate;

    }

    ...

    }

    ```


    注意注解放置的位置。根据代码中注解的放置位置，当 `john` 对象被序列化时，你在 `john.xml` 文件中会看到以下内容。


    ```


    1977-10-16T00:00:00Z


    ```

