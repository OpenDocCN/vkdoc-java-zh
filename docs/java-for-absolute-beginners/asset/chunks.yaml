- fmt: '`@deprecated`标签添加了文本，用于解释弃用的原因、版本以及应使用的替代项。Javadoc 生成工具会获取此文本，以斜体格式呈现，并将其添加到方法的主要描述中。


    至此，我们已经涵盖了编写 Javadoc 注释时最常用的标签。如果你想查看完整列表，可以在[`https://docs.oracle.com/javase/7/docs/technotes/tools/windows/javadoc.html#javadoctags`](https://docs.oracle.com/javase/7/docs/technotes/tools/windows/javadoc.html%2523javadoctags)找到。Javadoc
    文档是一个广泛的主题，足以写成一整本书。本节只是浅尝辄止，涵盖了基础知识，以便你有一个良好的开端。


    要为`logging-jul`模块生成 HTML 站点，最简单的方法是打开 Gradle 项目视图，展开 **chapter09:logging-jul ➤
    Tasks ➤ Documentation** 节点，在其下找到`javadoc`任务，如图 [9-17](#463938_1_En_9_Chapter.xhtml#Fig17)
    所示。要执行该任务，需要双击它。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig17_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig17_HTML.jpg)


