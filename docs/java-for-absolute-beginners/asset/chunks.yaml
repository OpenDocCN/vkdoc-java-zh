  raw: '##### **Using** Mocks


    Mocks are objects that register calls they receive. During execution of a test,
    using assert utility methods, the assumption that all expected actions were performed
    on mocks are tested. Thankfully, code for mocks does not have to be written by
    the developer, there are three well-known libraries that provide the type of classes
    needed to test using mocks: Mockito,^([^(76)](#fn76)) JMock,^([^(77)](#fn77))
    and EasyMock.^([^(78)](#fn78)) Also, if you are ever in need to mock static methods,
    the most common reason being bad design, there is PowerMock.^([^(79)](#fn79))


    Using mocks, you can jump directly to writing the tests. So, let’s write two tests
    for the `createAccount(..)` method that focus on the repository class calling
    its methods, because the repository class is being replaced by a mock.


    ```

    package com.apress.bgn.ch9.mock;

    import com.apress.bgn.ch9.Account;

    import com.apress.bgn.ch9.repo.AccountRepo;

    import com.apress.bgn.ch9.service.AccountCreationException;

    import com.apress.bgn.ch9.service.AccountServiceImpl;

    import com.apress.bgn.ch9.service.InvalidDataException;

    import org.junit.jupiter.api.BeforeEach;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.mockito.InjectMocks;

    import org.mockito.Mock;

    import org.mockito.junit.jupiter.MockitoExtension;

    import java.util.Optional;

    import static org.junit.jupiter.api.Assertions.*;

    import static org.mockito.ArgumentMatchers.any;

    import static org.mockito.Mockito.when;

    @ExtendWith(MockitoExtension.class)

    public class AccountServiceTest {

    @InjectMocks

    private AccountServiceImpl service;

    @Mock

    private AccountRepo mockRepo;

    @BeforeEach

    public void checkMocks() {

    assertNotNull(service);

    assertNotNull(mockRepo);

    }

    @Test

    public void testCreateAccount() {

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.empty());

    when(mockRepo.save(any(Account.class))).thenReturn(expected);

    Account result = service.createAccount("Gigi", "223311", "2100");

    assertEquals(expected, result);

    }

    @Test

    public void testCreateAccountAlreadyExists() {

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.of(expected));

    assertThrows(AccountCreationException.class,

    () -> {

    service.createAccount("Gigi", "223311", "2100");

    });

    }

    }

    ```


    The tests are self-explanatory; the Mockito utility methods names make it easy
    to understand what is happening during a test execution. But how the mocks are
    created and injected, needs to be explained. So, let’s do that! the `@ExtendWith(MockitoExtension.class)`
    is necessary for JUnit 5 tests to support Mockito annotations. Without it annotations
    like `@InjectMocks` and `@Mock` have no effect on the code.


    The `@Mock` annotation is to be used on references to mocks created by Mockito.
    The preferred way to work with mocks is to specify a reference of an interface
    type that is implemented by the real object type and the mock that is created
    for the test scenario. But `@Mock` can be placed on a concrete type reference
    as well, and the created mock is a subclass of that class.


    The `@InjectMocks` annotation is used on the object to be tested, so that Mockito
    knows to create this object and inject mocks instead of the dependencies.


    So, this is basically all you need to know to start using Mockito mocks in your
    test. Declaring the objects to be mocked and the object to be injected in is the
    only setup a class containing unit tests using mocks needs.


    The body of test methods using mocks have a typical structure. The first lines
    must declare objects and variables passed as arguments to the method called on
    the object being tested or passed as arguments to Mockito utility methods that
    declare what mocks take as arguments and what they return. The next lines establish
    the behavior of the mock when its methods are called by the object to be tested.
    The following two lines depict this for the `findOne(..)` method . The first line
    creates an account object. The second lines define the behavior of the mock. When
    `mockRepo.findOne`("`Gigi`") is called, the previously created account instance
    is returned wrapped in an `Optional<T>` instance.


    ```

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.of(expected));

    ```


    There are many other libraries to make writing tests effortless for developers.
    Big frameworks like Spring provide their own testing library to help developers
    write tests for applications. Build tools like Ant, Maven, and Gradle can automatically
    run tests when the project is built, and generate useful reports related to the
    failures. Using Gradle, the project can be built by calling `gradle clean build`
    in the console. All test classes declared in the test module, are picked up automatically
    if they are named `*Test.java`. When writing tests, and not changing application
    code, you can run the tests only by calling `gradle test`. This is a configuration
    that can be changed by overloading the Gradle `test` task; you can look into that
    if you are curious.


    The Gradle reports are in HTML format so they can be opened in the browser, and
    they look amazing. The reports are generated as a site with an `index.html` stat
    page, which are located at `java-bgn/chapter09/testing/build/reports/tests/test/index.html`.


    I’ve chosen to fail a test intentionally so that you can see how that report looks
    like (see Figure [9-16](#463938_1_En_9_Chapter.xhtml#Fig16)).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig16_HTML.png](images/463938_1_En_9_Chapter/463938_1_En_9_Fig16_HTML.png)


    Figure 9-16


    The Gradle test reports


    To conclude this section, remember this: no matter how good a development team
    is, without a great testing team, the resulting application might actually be
    far away from an acceptable quality standard. So, if you ever come across companies
    that do not have a dedicated testing team, or at least a company culture that
    does not compromise in techniques such as code review and writing tests, think
    twice before accepting that job.


    ## Documenting


    In the software world, there is a joke about documentation that might not be to
    everybody’s liking, but it is worth a mention.'
  trans: '

    ##### **使用** Mock


    Mock 是用于记录其所接收调用的对象。在测试执行期间，通过使用断言工具方法，可以验证所有预期操作是否已在 Mock 上执行。幸运的是，开发者无需手动编写
    Mock 代码，有三个广为人知的库提供了使用 Mock 进行测试所需的类类型：Mockito^(⁷⁶)、JMock^(⁷⁷) 和 EasyMock^(⁷⁸)。此外，如果你需要
    Mock 静态方法（最常见的原因是设计不佳），还有 PowerMock^(⁷⁹) 可供使用。


    使用 Mock，你可以直接跳转到编写测试。因此，让我们为 `createAccount(..)` 方法编写两个测试，重点关注仓库类调用其方法的情况，因为仓库类将被
    Mock 替代。


    ```

    package com.apress.bgn.ch9.mock;

    import com.apress.bgn.ch9.Account;

    import com.apress.bgn.ch9.repo.AccountRepo;

    import com.apress.bgn.ch9.service.AccountCreationException;

    import com.apress.bgn.ch9.service.AccountServiceImpl;

    import com.apress.bgn.ch9.service.InvalidDataException;

    import org.junit.jupiter.api.BeforeEach;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.mockito.InjectMocks;

    import org.mockito.Mock;

    import org.mockito.junit.jupiter.MockitoExtension;

    import java.util.Optional;

    import static org.junit.jupiter.api.Assertions.*;

    import static org.mockito.ArgumentMatchers.any;

    import static org.mockito.Mockito.when;

    @ExtendWith(MockitoExtension.class)

    public class AccountServiceTest {

    @InjectMocks

    private AccountServiceImpl service;

    @Mock

    private AccountRepo mockRepo;

    @BeforeEach

    public void checkMocks() {

    assertNotNull(service);

    assertNotNull(mockRepo);

    }

    @Test

    public void testCreateAccount() {

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.empty());

    when(mockRepo.save(any(Account.class))).thenReturn(expected);

    Account result = service.createAccount("Gigi", "223311", "2100");

    assertEquals(expected, result);

    }

    @Test

    public void testCreateAccountAlreadyExists() {

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.of(expected));

    assertThrows(AccountCreationException.class,

    () -> {

    service.createAccount("Gigi", "223311", "2100");

    });

    }

    }

    ```


    这些测试不言自明；Mockito 工具方法的命名使其易于理解测试执行过程中发生的情况。但 Mock 是如何创建和注入的，则需要解释一下。那么，让我们来讲解！`@ExtendWith(MockitoExtension.class)`
    对于 JUnit 5 测试支持 Mockito 注解是必需的。没有它，像 `@InjectMocks` 和 `@Mock` 这样的注解对代码将不起作用。


    `@Mock` 注解用于由 Mockito 创建的 Mock 引用。使用 Mock 的首选方式是指定一个接口类型的引用，该接口由真实对象类型和针对测试场景创建的
    Mock 共同实现。但 `@Mock` 也可以放在具体类型引用上，此时创建的 Mock 是该类的子类。


    `@InjectMocks` 注解用于待测试的对象，以便 Mockito 知道创建该对象并注入 Mock 以替代依赖项。


    因此，这基本上就是你在测试中开始使用 Mockito Mock 所需了解的全部内容。声明要 Mock 的对象和要注入的对象，是包含使用 Mock 的单元测试的类所需的唯一设置。


    使用 Mock 的测试方法主体具有典型的结构。前几行必须声明作为参数传递给被测对象方法或传递给 Mockito 工具方法（用于声明 Mock 接受什么参数以及返回什么）的对象和变量。接下来的几行建立了当被测对象调用
    Mock 方法时 Mock 的行为。以下两行展示了 `findOne(..)` 方法的这一过程。第一行创建了一个账户对象。第二行定义了 Mock 的行为。当调用
    `mockRepo.findOne("Gigi")` 时，先前创建的账户实例被包装在 `Optional<T>` 实例中返回。


    ```

    Account expected = new Account("Gigi", 2100, "223311");

    when(mockRepo.findOne("Gigi")).thenReturn(Optional.of(expected));

    ```


    还有许多其他库可以让开发者轻松编写测试。像 Spring 这样的大型框架提供了自己的测试库，帮助开发者编写应用程序测试。像 Ant、Maven 和 Gradle
    这样的构建工具可以在项目构建时自动运行测试，并生成与失败相关的有用报告。使用 Gradle，可以通过在控制台中调用 `gradle clean build`
    来构建项目。测试模块中声明的所有测试类，如果命名为 `*Test.java`，都会被自动识别。在编写测试且不更改应用程序代码时，你可以仅通过调用 `gradle
    test` 来运行测试。这是一个可以通过重载 Gradle `test` 任务来更改的配置；如果你好奇，可以深入研究一下。


    Gradle 报告采用 HTML 格式，因此可以在浏览器中打开，并且看起来非常棒。这些报告生成为一个包含 `index.html` 静态页面的站点，位于 `java-bgn/chapter09/testing/build/reports/tests/test/index.html`。


    我故意让一个测试失败，以便你能看到报告的样子（见图 9-16）。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig16_HTML.png](img/463938_1_En_9_Fig16_HTML.png)


    图 9-16


    Gradle 测试报告


    总结本节，请记住：无论一个开发团队多么优秀，如果没有一个出色的测试团队，最终的应用可能远未达到可接受的质量标准。因此，如果你遇到没有专门测试团队的公司，或者至少没有一种在代码审查和编写测试等技术上不妥协的公司文化，在接受那份工作之前请三思。


    ## 文档编写


    在软件领域，有一个关于文档的笑话可能并非所有人都喜欢，但它值得一提。

    '
- fmt: "# Documentation\n\nDocumentation is like sex: when it’s good, it is really,\
    \ really good. And when it’s bad, it’s still better than nothing.\n\nA common-sense\
    \ rule and best practice of programming is to write code that is self-explanatory,\
    \ so you won’t need to write documentation. Basically, if you need to write too\
    \ much documentation, you’re doing it wrong. There are a lot of things you can\
    \ do to avoid writing documentation, like using meaningful names for classes and\
    \ variables, respect the language code conventions and many others. But when you\
    \ are building a set of classes that is used by other developers, you need to\
    \ provide a little documentation for the main APIs. Of course, if your solution\
    \ requires a very complicated algorithm to be written, you might want to add comments\
    \ here and there; although in this case, proper technical documentation with schemas\
    \ and diagrams should be written too.\n\nThe Javadoc block comments are associated\
    \ with a public class, interface, method body, or public field; sometimes even\
    \ protected, if necessary. The Javadoc comments contain special tags that link\
    \ documented elements together, or mark the different type of information. The\
    \ Javadoc comments and their associated code can be processed by Javadoc tools,\
    \ extracted, and wrapped into an HTML site that is called the Javadoc API of the\
    \ project. The Gradle build tool that is used by this project exposes a task named\
    \ `javadoc` that can be executed to generate the Javadoc API site for a module.\
    \ To compact the documentation of a project with multiple modules a special plugin\
    \ is needed.^([^(80)](#fn80)) Also, smart editors can access the documentation\
    \ and display it when the developer tries to write code using the documented components.\n\
    \nLet’s start with a few examples of Javadoc comments to explain the most important\
    \ tags used.\n\n## Javadoc for Classes and Interfaces\n\nWhenever we create a\
    \ class or interface, we should add Javadoc comments to explain their purpose,\
    \ add the version of the application, and link existing resources. `IntSorter`\
    \ is a hierarchy of classes implementing the `IntSorter` interface that provides\
    \ implementations of different sorting algorithms. If these classes are used by\
    \ other developers, one of them might want to add a customized algorithm to our\
    \ hierarchy and a little information about the `IntSorter` interface would go\
    \ a long way. In the following code snippet, a Javadoc comment was added to the\
    \ `IntSorter` interface.\n\n```\npackage com.apress.bgn.ch9.algs;\n/**\n* Interface\
    \ {@code IntSorter} is an interface that needs to be implemented\n* by classes\
    \ that provide a method to sort an array of {@code int} values. \n*\n* {@code\
    \ int[]} was chosen as a type because this type\n* of values are always sortable.({@link\
    \ Comparable})\n*\n* @author Iuliana Cosmina\n* @since 1.0\n*/\npublic interface\
    \ IntSorter {\n...\n}\n```\n\nIn the Javadoc comments, HTML tags can be used to\
    \ format information. In the previous code, `<p>` elements were used to make sure\
    \ the comment is made of multiple paragraphs. The `@author` tag was introduced\
    \ in JDK 1.0. It is useful when the development team is large, because if you\
    \ end up working with somebody else’s code, you know who to look for if issues\
    \ appear. The `@since` tag provides the version of the application in which this\
    \ interface was added. For an application that has had a long development and\
    \ release cycle, this tag can be used to mark the elements of a specific version,\
    \ so that a developer using the codebase of your application knows when elements\
    \ were added; and in a rollback to a former version, knows where compile-time\
    \ errors appear in the application.\n\nThe best example here is the Java official\
    \ Javadoc; let’s take the `Optional<T>` interface, which was introduced in version\
    \ 8. But more methods were added to it in versions 9, 10, and 11, and each of\
    \ them are marked with the specific versions.\n\n```\npackage java.util;\n...\n\
    /**\n...\n* @param  the type of value\n* @since 1.8\n*/\npublic final class Optional\
    \ {\n...\n/**\n...\n* @since 9\n*/\npublic void ifPresentOrElse(Consumer action,\
    \ Runnable emptyAction) {\nif (value != null) {\naction.accept(value);\n} else\
    \ {\nemptyAction.run();\n}\n}\n/**\n...\n* @since 10\n*/\npublic T orElseThrow()\
    \ {\nif (value == null) {\nthrow new NoSuchElementException(\"No value present\"\
    );\n}\nreturn value;\n}\n/**\n* If a value is  not present, returns {@code true},\
    \ otherwise\n* {@code false}.\n*\n* @return  {@code true} if a value is not present,\
    \ otherwise {@code false}\n* @since   11\n*/\npublic boolean isEmpty() {\nreturn\
    \ value == null;\n}\n..\n}\n```\n\nIn the `IntSorter` example, you see the `@code`\
    \ tag that was introduced in Java 1.5. It displays text in code form, using a\
    \ special font and escaping symbols that might break the HTML syntax (ex: `< or\
    \ >`). The `@link` tag was added in Java 1.2 and inserts a navigable link to relevant\
    \ documentation.\n\n## Javadoc for Methods\n\nNow, let’s document the method declarations\
    \ to let the developer know what they should be used for.\n\n```\npackage com.apress.bgn.ch9.algs;\n\
    /**\n* Interface {@code IntSorter} is an interface that needs to be implemented\n\
    * by classes that provide a method to sort an array of {@code int} values. \n\
    *\n* {@code int[]} was chosen as a type because this type\n* of values are always\
    \ sortable.({@link Comparable})\n*\n* @author Iuliana Cosmina\n* @since 1.0\n\
    */\npublic interface IntSorter {\n/**\n* Sorts {@code arr}\n*\n* @param arr int\
    \ array to be sorted\n* @param low lower limit of the interval to be sorted\n\
    * @param high higher limit of the interval to be sorted\n*/\nvoid sort(int[] arr,\
    \ int low, int high);\n/**\n* This method was used to sort arrays using BubbleSort\n\
    * @deprecated As of version 0.1, because the\n*             {@link #sort(int[],\
    \ int, int) ()} should be used instead.\n* To be removed in version 1.1\n* @param\
    \ arr int array to be sorted\n*/\n@Deprecated (since= \"0.1\", forRemoval = true)\n\
    default void sort(int[] arr) {\nSystem.out.println(\"Do not use this! This is\
    \ deprecated!!\");\n}\n}\n```\n\nThe IntelliJ IDEA editor (and other smart editors)\
    \ generate small pieces of Javadoc for you. Once you have declared a class or\
    \ method body that you want to document, type `/**` and press Enter. The generated\
    \ block of comment contains the following:\n\n- One or more `@param` tags with\
    \ the parameter names; all is left for the developer to do is to add extra documentation\
    \ to explain their purpose.\n- If the method returns a value of a type different\
    \ than `void`, a `@return` tag is added; documentation must be provided by the\
    \ developer to explain what the result represents and if there are special cases\
    \ when a certain value is returned. And since we started using `Optional<T>` as\
    \ a study case, here is the Javadoc of the `isPresent(..)` method.\n- If the methods\
    \ declare an exception to be thrown, a `@throws` tag is generated together with\
    \ the exception type; the developer’s job is to explain when and why that type\
    \ of exception is thrown.\n\n```\n/**\n...\n* @param predicate the predicate to\
    \ apply to a value, if present\n* @return an {@code Optional} describing the value\
    \ of this\n*         {@code Optional}, if a value is present and the value matches\
    \ the\n*         given predicate, otherwise an empty {@code Optional}\n* @throws\
    \ NullPointerException if the predicate is {@code null}\n*/\npublic Optional filter(Predicate\
    \ predicate) {\nObjects.requireNonNull(predicate);\nif (!isPresent()) {\nreturn\
    \ this;\n} else {\nreturn predicate.test(value) ? this : empty();\n}\n}\n```\n\
    \n```\n/**\n...\n* @param action the action to be performed, if a value is present\n\
    * @throws NullPointerException if value is present and the given action is\n*\
    \         {@code null}\n*/\npublic void ifPresent(Consumer action) {\nif (value\
    \ != null) {\naction.accept(value);\n}\n}\n```\n\nThe `@link` creates a documentation\
    \ link to a class page, a method documentation section, or a field. In the previous\
    \ `sort` method declaration example, we created a link to the other method in\
    \ the interface."
