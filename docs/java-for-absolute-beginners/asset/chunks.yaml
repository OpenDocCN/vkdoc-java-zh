  trans: "\n```\npackage com.apress.bgn.ch13;\nimport com.apress.bgn.ch13.util.SingletonDictionary;\n\
    import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport java.lang.ref.Cleaner;\n\
    public class SingletonDictionaryDemo {\npublic static final Cleaner cleaner =\
    \ Cleaner.create();\nprivate static final Logger log =\nLoggerFactory.getLogger(SingletonDictionaryDemo.class);\n\
    public static void main(String... args) {\nlog.info(\"Testing SingletonDictionary...\"\
    );\n//filling memory with arrays of String to force GC\nfor (int i = 1; i  {\n\
    log.info(\"Cleaned up the dictionary!\");\n});\n// we delete the reference\nsingletonDictionary\
    \ = null;\n//filling memory with arrays of String to force GC\nfor (int i = 1;\
    \ i <= 10_000; i++) {\nString[] s = new String[10_000];\ntry {\nThread.sleep(1);\n\
    } catch (InterruptedException e) {\n}\n}\nlog.info(\"DONE.\");\n}\n}\n```\n\n\
    如果我们运行这段代码，期望在控制台中看到 `\"Cleaned up the dictionary!\"` 消息，那将是徒劳的。\n`SingletonDictionary`\
    \ 中的那个静态引用\n在程序结束之前，不会允许 GC 触及该对象。我们在 `SingletonDictionary` 类中拥有的静态引用\n也被称为**强**引用，因为它阻止了\n\
    对象从内存中被丢弃。\n\n**使用弱引用**\n既然有强引用，那么对于我们希望清理的对象，也应该能够使用弱引用，对吧？\n没错。在 Java 中，有三个类可用于创建\n\
    一个对象的引用，这种引用不会保护该对象免受垃圾回收的影响。这对于那些体积过大的对象非常有用，将它们保留在内存中会降低效率。对于这类对象，重新初始化所消耗的时间成本是值得的，因为将它们保留在内存中会拖慢应用程序的整体性能。\n\
    \n这三个类是：\n\n*   `java.lang.ref.SoftReference<T>`：\n    由这类引用所引用的对象，垃圾回收器会根据内存需求自行决定是否清除。软引用最常用于实现内存敏感的缓存。\n\
    \n*   `java.lang.ref.WeakReference<T>`：\n    由这类引用所引用的对象，不会阻止其引用对象被终结、完成终结然后被回收。弱引用最常用于实现规范化映射。规范化映射指的是这样一种容器：弱引用可以保存在其中，并且可以被其他对象访问，但它们与容器的链接并不会阻止自身被回收。\n\
    \n*   `java.lang.ref.PhantomReference<T>`：\n    由这类引用所引用的对象，在回收器确定其引用对象可能被回收后，会被放入队列。虚引用最常用于安排对象销毁后的清理操作。\n\
    \n我们的 `SingletonDictionary`\n包含一个 `Map<>`，它是存储在内存中的大对象。这个 map 可以被包装在一个 `WeakReference`\
    \ 中，并且我们可以编写一些逻辑：当访问时如果它不存在，就应该重新初始化它。因为我们需要访问这个 map，所以除了将 `Map` 包装到 `WeakReference`\
    \ 中之外，实现方式也略有变化。这个名为 `WeakDictionary` 的新类，如以下代码清单所示。\n\n```\npackage com.apress.bgn.ch13.util;\n\
    import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport java.lang.ref.WeakReference;\n\
    import java.util.HashMap;\nimport java.util.Map;\npublic class WeakDictionary\
    \ {\nprivate static final Logger log =\nLoggerFactory.getLogger(WeakDictionary.class);\n\
    private static WeakDictionary instance = new WeakDictionary();\nprivate WeakReference>\
    \ dictionary;\nprivate static Cleaner cleaner;\nprivate WeakDictionary() {\ncleaner\
    \ = Cleaner.create();\ndictionary = new WeakReference(initDictionary());\n}\n\
    public synchronized String getExplanationFor(Integer key) {\nMap dict = dictionary.get();\n\
    if (dict == null) {\ndict = initDictionary();\ndictionary = new WeakReference(dict);\n\
    return dict.get(key);\n} else {\nreturn dict.get(key);\n}\n}\npublic synchronized\
    \ static WeakDictionary getInstance() {\nreturn instance;\n}\nprivate Map initDictionary()\
    \ {\nMap dict = new HashMap();\nlog.info(\"Starting to create dictionary: {}\"\
    , System.currentTimeMillis());\nfinal NameGenerator keyGen = new NameGenerator(20);\n\
    final NameGenerator valGen = new NameGenerator(200);\nfor (int i = 0; i  log.info(\"\
    Cleaned up the dictionary!\"));\nreturn dict;\n}\n}\n```\n\n`getExplanationFor`\
    \ 方法\n访问 map 并获取与键对应的值。但在执行此操作之前，我们必须检查 `Map` 是否仍然存在。这是通过调用 `dictionary` 引用上的\
    \ `get()` 方法来完成的，该引用的类型是 `WeakReference<Map<Integer, String>>`。如果 map 没有被 GC 回收，则提取并返回键对应的值；否则，重新初始化\
    \ `Map` 并重新创建弱引用。\n\n`Cleaner` 实例被移到了 `WeakDictionary` 类中，并为 `Map` 注册了一个 `Cleanable`，这样我们就可以看到\
    \ map 被回收。那么，我们如何测试这个呢？测试方式与我们测试 `SingletonDictionary` 类似。\n\n```\npackage com.apress.bgn.ch13;\n\
    import com.apress.bgn.ch13.util.WeakDictionary;\nimport org.slf4j.Logger;\nimport\
    \ org.slf4j.LoggerFactory;\npublic class WeakDictionaryDemo {\nprivate static\
    \ final Logger log =\nLoggerFactory.getLogger(WeakDictionaryDemo.class);\npublic\
    \ static void main(String... args) {\nlog.info(\"Testing WeakDictionaryDemo...\"\
    );\n//filling memory with arrays of String to force GC\nfor (int i = 1; i <= 10_000;\
    \ i++) {\nString[] s = new String[10_000];\ntry {\nThread.sleep(1);\n} catch (InterruptedException\
    \ e) {\n}\n}\nWeakDictionary weakDictionary = WeakDictionary.getInstance();\n\
    //filling memory with arrays of String to force GC\nfor (int i = 1; i <= 10_000;\
    \ i++) {\nString[] s = new String[10_000];\ntry {\nThread.sleep(1);\n} catch (InterruptedException\
    \ e) {\n}\n}\nlog.info(\"Getting val for 3 =  {}\", weakDictionary.getExplanationFor(3));\n\
    log.info(\"DONE.\");\n}\n}\n```\n\n因此，在获取到 `WeakDictionary` 引用之后，创建了大量 `String`\
    \ 数组来强制 GC 从内存中删除该 map。之后，我们尝试访问那个有问题的 map。它能工作吗？\n\n```\nINFO  c.a.b.c.WeakDictionaryDemo\
    \ - Testing WeakDictionaryDemo...\nINFO  c.a.b.c.u.WeakDictionary - Starting to\
    \ create dictionary: 1536633126455\nINFO  c.a.b.c.u.WeakDictionary - Done creating\
    \ dictionary: 1536633126701\nINFO  c.a.b.c.u.WeakDictionary - Cleaned up the dictionary!\n\
    INFO  c.a.b.c.u.WeakDictionary - Starting to create dictionary: 1536633139512\n\
    INFO  c.a.b.c.u.WeakDictionary - Done creating dictionary: 1536633139742\nINFO\
    \  c.a.b.c.WeakDictionaryDemo - Getting val for 3 =  Ingermy...\nINFO  c.a.b.c.WeakDictionaryDemo\
    \ - DONE.\n```\n\n日志证明这是可行的。不仅如此，我们还可以看到 map 被 GC 丢弃，然后在需要时重新初始化。这就是软引用的力量。\n\
    尽管垃圾回收过程是不确定的，因为无法从代码中对其进行太多控制，Java 程序无法命令它启动、暂停或停止，但通过使用适当的 VM 选项，我们可以控制它所拥有的资源，并且通过使用正确的实现方式，我们可以从代码中告诉它要回收什么或不回收什么，大多数情况下这已经足够了。^(⁹²)\n\
    \n**垃圾回收的异常与原因**\n"
- fmt: '如果对象无法从内存中丢弃，则会抛出`OutOfMemoryError`类型的异常。你可能没有注意到，但这实际上并不是一个异常。异常类层次结构曾在**第**
    [**5**](#463938_1_En_5_Chapter.xhtml) **章**中提到过。如果你还记得，在那个层次结构中有一个名为`java.lang.Error`的类，它实现了`java.lang.Throwable`。当程序遇到无法恢复的严重问题时，会抛出这些类型的对象。以下是`java.lang.OutOfMemoryError`的完整层次结构。


    ```

    java.lang.Object

    java.lang.Throwable

    java.lang.Error

    java.lang.VirtualMachineError

    java.lang.OutOfMemoryError

    ```


    因此，`OutOfMemoryError`是那些你不希望在程序运行时遇到的讨厌东西之一，因为这意味着你的程序不再运行。在这种情况下，程序无法运行是因为没有足够的内存来存储正在创建的新对象。当JVM在进行内存管理时出现任何问题，就会抛出此错误。虽然最常见的原因是堆内存耗尽，但也存在其他原因。


    当分配给JVM的堆内存耗尽时，错误会显示以下消息：


    ```

    Exception in thread "main" java.lang.OutOfMemoryError: Java heap space

    ```


    但你可能还会看到另一条消息。


    ```

    Exception in thread "main" java.lang.OutOfMemoryError: GC Overhead Limit Exceeded

    ```


    这条消息仍然与堆大小有关。当程序的数据勉强适合堆的大小时，会抛出带有此消息的错误，因此堆几乎已满，这允许GC运行，但由于无法回收任何内存，GC持续运行，从而阻碍了应用程序的正常执行。当GC花费98%的执行时间，而应用程序仅花费另外2%的时间时，错误会添加此消息。无论出于何种原因，当GC无法正常工作时，这两个是最常见的错误消息。完整列表可在[`https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/memleaks002.html)找到，但由于大多数GC问题与堆大小有关，`G1GC`大多会抛出带有*Java
    heap space*消息的错误。


    ## 总结


    本节结束了本书。关于Java生态系统，互联网上有大量的书籍和教程。本书仅触及表面，为你作为Java开发者提供一个良好的起点。参与本书的整个团队希望它能满足你的需求，并激发你进一步探索的好奇心。请记住，没有万能解决方案可以确保无论应用程序范围如何，内存始终得到正确管理。如果遇到问题，实验始终是确定为你的JVM选择正确收集器的一步。


    本章涵盖了以下主题。


    *   什么是垃圾收集以及涉及的步骤

    *   堆内存是如何结构的

    *   Oracle HotSpot JVM中有多少种垃圾收集器，以及如何在它们之间切换

    *   如何使用VM选项查看垃圾收集器配置和统计信息

    *   如何使用`finalize`和`Cleaner`查看垃圾收集的实际运行情况

    *   如何阻止垃圾收集器收集重要对象

    *   如何使用软引用创建易于收集的对象


