  trans: '

    #### 类变量


    除了每个人类个体特有的属性外，所有人类都有一些共同点：一个假设为 100 年的寿命。声明一个名为 *lifespan* 的字段会是冗余的，因为它必须与所有人类实例关联相同的值。因此，我们在
    `Human` 类中使用 `static` 关键字声明了一个字段，该字段对所有 `Human` 实例都具有相同的值，并且只初始化一次。我们还可以更进一步，通过在其声明前添加
    `final` 修饰符，确保该值在程序执行期间永远不会改变。这样，我们就创建了一种特殊类型的变量，称为**常量**。新的 `Human` 类如下所示：


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    static final int LIFESPAN = 100;

    String name;

    int age;

    float height;

    }

    ```


    `LIFESPAN` 变量也被称为**类变量**，因为它不与实例关联，而是与类关联。这在下面的示例中很清楚。


    ```

    package com.apress.bgn.ch4.basic;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human john = new Human();

    john.name = "John";

    Human jane = new Human();

    jane.name = "Jane";

    System.out.println("John’s lifespan = " + john.LIFESPAN);

    System.out.println("Jane’s lifespan = " + jane.LIFESPAN);

    System.out.println("Human lifespan = " + Human.LIFESPAN);

    }

    }

    ```


    当执行上述类的 `main()` 方法时，会打印以下内容，这证明了之前提到的所有内容。


    ```

    John''s lifespan = 100

    Jane''s lifespan = 100

    Human lifespan = 100

    ```


    #### 封装数据


    我们定义的类没有对字段使用访问修饰符，这是不可接受的。Java 被称为面向对象编程语言（OOP），因此，用 Java 编写的代码必须尊重 **OOP 的原则**。遵守这些编码原则可以确保编写的代码质量良好，并完全符合
    Java 的基本风格。OOP 的原则之一是**封装**。封装原则指的是通过使用称为**访问器（getters）**和**修改器（setters）**的特殊方法来限制对数据的访问，从而隐藏数据实现。


    基本上，类的任何字段都应具有私有访问权限，并且对其访问应由可以被拦截、测试和跟踪以查看其调用位置的方法来控制。Getters 和 setters 是处理对象时的常见做法，以至于大多数
    IDE 都有生成它们的默认选项，包括 IntelliJ IDEA。在类体内右键单击，选择 **Generate** 选项查看所有可能性，然后选择 **Getters
    and Setters** 来为你生成这些方法。菜单如图 4-3 所示。


    将字段设为私有并生成 getters 和 setters 后，`Human` 类现在如下所示：


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public int getAge() {

    return age;

    }

    public void setAge(int age) {

    this.age = age;

    }

    public float getHeight() {

    return height;

    }

    public void setHeight(float height) {

    this.height = height;

    }

    }

    ```


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig3_HTML.jpg](img/463938_1_En_4_Fig3_HTML.jpg)


    图 4-3


    IntelliJ IDEA 代码生成菜单。Generate... ➤ Getter and Setter 子菜单


    那么，你可能想知道 `this` 是什么。顾名思义，它是对当前对象的引用。因此，`this.name` 是当前对象字段 `name` 的值。在类体内，当方法中的参数与字段同名时，`this`
    用于访问当前对象的字段。正如你所见，IntelliJ IDEA 生成的 setters 和 getters 的参数与字段同名。


    Getters 是最简单的方法，声明时没有任何**参数**。它们返回与其关联的字段的值。它们的命名约定使用 `get` 前缀和它们访问的字段名，并将首字母大写。


    Setters 是不返回任何内容的方法。它们声明一个与字段类型相同的变量作为参数。它们的名称由 *set* 前缀和它们访问的字段名组成，并将首字母大写。图
    4-4 展示了 **name** 字段的 setter 和 getter。


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig4_HTML.jpg](img/463938_1_En_4_Fig4_HTML.jpg)


    图 4-4


    用于 name 字段的 setter 和 getter 方法


    这意味着在实例化 `Human` 类时，我们必须使用 setters 来设置字段值，并使用 getters 来访问这些值。因此，我们的类 `BasicHumanDemo`
    变为：


    ```

    package  com.apress.bgn.ch4.basic;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human human = new Human();

    human.setName("John");

    human.setAge(40);

    human.setHeight(1.91f);

    System.out.println("name: " + human.getName());

    System.out.println("age: " + human.getAge());

    System.out.println("height: " + human.getHeight());

    }

    ```


    #### 方法


    既然 getters 和 setters 是方法，那么是时候开始讨论方法了。方法是一个代码块，由返回类型、名称和参数来表征，它描述了由对象执行或对对象执行的操作，该操作利用了其字段和/或提供的参数的值。Java
    方法的抽象模板如下所示。


    ```

    [访问修饰符] [返回类型] [名称] 类型 1 参数 1, 类型 2 参数 2, ... {

    // 代码

    [ [可能] return 值]

    }

    ```


    让我们为 `Human` 类创建一个方法，该方法利用其年龄和 `LIFESPAN` 常量来计算并打印一个人还有多少时间可活。由于该方法不返回任何内容，因此使用的返回类型是
    `void`，这是一种特殊类型，告诉编译器该方法不返回任何内容，并且方法体中没有 return 语句。


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    /**

    * 计算并打印剩余寿命

    */

    public void computeAndPrintTtl(){

    int ttl = LIFESPAN - this.age;

    System.out.println("剩余寿命: " + ttl);

    }

    ...

    }

    ```


    ### **!**


    Java 中常量的命名约定建议仅使用大写字母、下划线和数字。


    上述方法定义没有声明任何参数，因此，假设我们有一个 `Human` 实例，我们可以这样调用该方法：


    ```

    Human human = new Human();

    human.setName("John");

    human.setAge(40);

    human.setHeight(1.91f);

    human.computeAndPrintTtl();

    ```


    我们期望它打印 `剩余寿命: 60`，这确实发生了。现在，让我们修改该方法，使其返回值而不是打印它。


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    /**

    * @return 剩余寿命

    */

    public int getTimeToLive(){

    int ttl = LIFESPAN - this.age;

    return ttl;

    }

    ...

    }

    ```


    在这种情况下，调用该方法不会做任何事情，我们必须修改代码以保存返回的值并打印它。


    ```

    Human human = new Human();

    human.setName("John");

    human.setAge(40);

    human.setHeight(1.91f);

    int timeToLive = getTimeToLive();

    System.out.println("剩余寿命: " + timeToLive);

    ```


    这里介绍的两种方法都没有声明参数，因此调用它们时无需提供任何参数。我们不会介绍带参数的方法，因为 setters 已经足够明显了。我们继续往下看。

