    `AccountRepoImpl` 开始。


    #### 介绍 JUnit


    JUnit 无疑是 Java 开发世界中使用最广泛的测试框架。2017 年底，JUnit 5^(⁷⁴) 发布，这是该框架的下一代版本。它配备了一个新引擎，兼容
    Java 9+，并提供了大量基于 lambda 的功能。JUnit 提供了用于标记测试方法以自动执行的注解、用于初始化和销毁测试上下文的注解，以及用于实际实现测试方法的实用方法。你可以使用多种
    JUnit 注解。其中五个（以及一个实用类）构成了 JUnit 框架的核心，这也是学习测试的最佳起点。下面是对每个注解的简短描述，它们共同勾勒出如何使用 JUnit
    测试应用程序的总体图景。


    *   `@BeforeAll` 来自 `org.junit.jupiter.api` 包，用于返回 `void` 的 `非私有静态` 方法，用于初始化当前类中所有测试方法将使用的对象和变量。此方法仅被调用一次，在类中所有测试方法之前执行，因此测试方法不应修改这些对象，因为它们的状态是共享的，可能会影响测试结果。最终，由该注解方法初始化的静态字段可以声明为
    `final`，这样一旦初始化，就无法再更改。一个测试类中可以声明多个带有 `@BeforeAll` 注解的方法，但这有什么意义呢？


    *   `@AfterAll` 来自 `org.junit.jupiter.api` 包，是 `@BeforeAll` 的对应注解。它也用于注解返回 `void`
    的 `非私有静态` 方法，但其目的是销毁测试方法运行的上下文并执行清理操作。


    *   `@BeforeEach` 来自 `org.junit.jupiter.api` 包，用于返回 `void` 的 `非私有非静态` 方法，顾名思义，带有此注解的方法会在每个带有
    `@Test` 注解的方法之前执行。这些方法可用于进一步定制测试上下文，为对象填充值，以便在测试方法中进行断言测试。


    *   `@AfterEach` 来自 `org.junit.jupiter.api` 包，用于返回 `void` 的 `公共非静态` 方法，顾名思义，带有此注解的方法会在每个带有
    `@Test` 注解的方法之后执行。


    *   `@Test` 来自 `org.junit.jupiter.api` 包，用于返回 `void` 的 `非私有非静态` 方法，顾名思义，带有此注解的方法是一个测试方法。一个测试类可以有一个或多个测试方法，具体取决于被测试的类。


    *   实用类 `org.junit.jupiter.api.Assertions` 提供了一组支持在测试中断言条件的方法。


    你可能还想了解另一个注解 `@DisplayName`。它与所有其他注解声明在同一个包中，并接收一个文本参数，该参数代表测试显示名称，会显示在编辑器中以及构建工具创建的报告中。让我们编写一个伪测试类，以便你了解测试类的外观。


    ```

    package com.apress.bgn.ch9.pseudo;

    import org.junit.jupiter.api.*;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class PseudoTest {

    private static final Logger log =

    LoggerFactory.getLogger(PseudoTest.class);

    @BeforeAll

    public static void loadCtx() {

    log.info("加载通用测试上下文。");

    }

    @BeforeEach

    public  void setUp(){

    log.info("准备单个测试上下文。");

    }

    @Test

    @DisplayName("测试一")

    public void testOne() {

    log.info("执行测试一。");

    assertTrue(true);

    }

    @Test

    @DisplayName("测试二")

    public void testTwo() {

    log.info("执行测试二。");

    assertFalse(false);

    }

    @AfterEach

    public void tearDown(){

    log.info("销毁单个测试上下文。");

    }

    @AfterAll

    public static void unloadCtx(){

    log.info("卸载通用测试上下文。");

    }

    }

    ```

