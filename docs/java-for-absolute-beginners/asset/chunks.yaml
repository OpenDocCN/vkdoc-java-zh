  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    你知道这些字符可能是什么吗？

    不知道也没关系，我第一次使用 `FileInputStream` 读取文件时也不知道。

    这些字符之所以会出现，是因为文件大小不是 1024 的倍数，所以 `FileInputReader` 最终会用零填充最后一个缓冲区的剩余部分。

    一个解决方案是计算文件的字节大小，并确保我们相应地调整 `byte[] buffer` 的大小。如果你有心情写点代码，可以尝试将其作为练习。

    现在我们已经向你展示了多种读取文件的方法，接下来我们将继续向你展示如何写入文件，因为你已经知道如何创建它们了。

    在 Java 11 中，`InputStream` 还增加了一个方法，该方法返回一个什么都不做的 `InputStream`，名为 `nullInputStream()`
    方法，用于测试目的。


    写入文件

    在 Java 中写入文件与读取文件类似，只是需要使用不同的类，因为流是单向的，这意味着用于读取数据的流不能同时用于写入数据。几乎对于每个读取文件的类或方法，都有一个对应的写入文件的类或方法。闲话少说，让我们开始吧。


    使用 Files 工具方法写入文件


    对于较小的文件，当我们只需要写入一些字节时，`Files.write(Path, byte[])` 方法就很好用。


    ```

    package com.apress.bgn.ch11.writing;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    import java.io.IOException;

    import java.nio.file.Files;

    import java.nio.file.Path;

    public class FilesWritingDemo {

    private static final Logger log =

    LoggerFactory.getLogger(FilesWritingDemo.class);

    public static void main(String... args) {

    File file = new File(

    "chapter11/read-write-file/src/main/resources/output/vultures.txt");

    byte[] data = "Some of us, we''re hardly ever here".getBytes();

    try {

    Path dataPath = Files.write(file.toPath(), data);

    log.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    如果文件已存在，其内容将被直接覆盖。


    在 Java 11 中，引入了 `Files.writeString(..)` 方法，它允许在将 `String` 实例写入文件时指定一个 `Charset`；也无需转换为字节。


    ```

    try {

    Path dataPath = Files.writeString(file.toPath(),

    "Some of us, we''re hardly ever here",

    StandardCharsets.UTF_8);

    log.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    ```


    `Files` 类中有三个 `Files.write(..)` 方法：一个是前面代码片段中使用的方法，另外两个可以写入由任何扩展了 `CharSequence`
    类型的实例所表示的文本值集合。这两个方法之间的唯一区别是，其中一个还将 `Charset` 作为参数。


    ```

    package com.apress.bgn.ch11.writing;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    import java.io.IOException;

    import java.nio.charset.StandardCharsets;

    import java.nio.file.Files;

    import java.nio.file.Path;

    import java.util.List;

    public class FilesWritingDemo {

    private static final Logger log =

    LoggerFactory.getLogger(FilesWritingDemo.class);

    public static void main(String... args) {

    List dataList =  List.of("Some of us, we''re hardly ever here",

    "The rest of us, we''re born to disappear",

    "How do I stop myself from",

    "Being just a number?");

    try {

    File file2 = new File(

    "chapter11/read-write-file/src/main/resources/output/vultures2.txt");

    Path dataPath = Files.write(file2.toPath(),  dataList,

    StandardCharsets.UTF_8);

    log.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    以上就是 `Files` 类中所有用于写入文件的方法。接下来，我们将研究如何使用 `Writer` 层次结构中的类来写入文件。


    使用 Writer 写入文件


    与用于读取文件的 `Reader` 层次结构类似，有一个名为 `Writer` 的抽象类，但在我们讨论它之前，先介绍一下 `BufferedWriter`，它是用于写入文件的
    `BufferedReader` 对应类。这个类也有一个内部缓冲区，当调用写入方法时，参数会被存储到缓冲区中，当缓冲区满时，其内容会被写入文件。可以通过调用
    `flush()` 方法提前清空缓冲区。我强烈建议在调用 `close()` 之前显式调用此方法，以确保所有输出都已写入文件。下一个代码片段演示了如何将 `String`
    实例列表写入文件。


    ```

    package com.apress.bgn.ch11.writing;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.BufferedWriter;

    import java.io.File;

    import java.io.FileWriter;

    import java.io.IOException;

    import java.util.List;

    public class FilesWritingDemo {

    private static final Logger log =

    LoggerFactory.getLogger(FilesWritingDemo.class);

    public static void main(String... args) {

    File file = new File(

    "chapter11/read-write-file/src/main/resources/output/vultures.txt");

    List lyricList =  List.of("Some of us, we''re hardly ever here",

    "The rest of us, we''re born to disappear",

    "How do I stop myself from",

    "Being just a number?");

    BufferedWriter writer = null;

    try {

    writer = new BufferedWriter(new FileWriter(file));

    for (String lyric : lyricList) {

    writer.write(lyric);

    writer.newLine();

    }

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    } finally {

    if(writer!= null) {

    try {

    writer.flush();

    writer.close();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    }

    }

    }

    }

    ```


    写入文件是一个敏感的操作，前面介绍的代码结构可能因多种原因而失败。这种代码是你在 Java 1.7 之前会写的，那时 `try-with-resources`
    减少了样板代码。


    ```

    try (final BufferedWriter wr = new BufferedWriter(new FileWriter(file))){

    lyricList.forEach(lyric -> {

    try {

    wr.write(lyric);

    log.info("Something went wrong! ", e);wr.newLine();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    });

    wr.flush();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    唯一可以做的真正简化是调用 `Files.newBufferedWriter(..)` 来避免显式实例化 `BufferedWriter`。这还带来了决定要写入文件的字符集的优势。


    ```

    try (final BufferedWriter wr = Files.newBufferedWriter(file.toPath(),

    StandardCharsets.UTF_8)){

    lyricList.forEach(lyric -> {

    try {

    wr.write(lyric);

    wr.newLine();

    } catch (IOException e) {

    e.printStackTrace();

    }

    });

    wr.flush();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    如果没有 `Files.newBufferedWriter(..)` 方法，使用给定字符集写入文本值只能通过使用另一个 `Writer` 类 `OutputStreamWriter`
    来实现。


    ```

    try (final OutputStreamWriter wr = new OutputStreamWriter(

    new FileOutputStream(file), StandardCharsets.UTF_8)){

    lyricList.forEach(lyric -> {

    try {

    wr.write(lyric);

    wr.write("\n");

    } catch (IOException e) {

    e.printStackTrace();

    }

    });

    wr.flush();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    如果文件已存在，调用 `write(..)` 方法会覆盖文件的内容。但这并非总是必需的，有时我们只需要将新文本追加到现有文件中。`BufferedWriter`
    提供了 `append()` 方法来实现这一点。


    ```

    try (final BufferedWriter wr = Files.newBufferedWriter(file.toPath(),

    StandardCharsets.UTF_8)){

    lyricList.forEach(lyric -> {

    try {

    wr.append(lyric);

    wr.append("\n");

    } catch (IOException e) {

    e.printStackTrace();

    }

    });

    wr.flush();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```

    '
- fmt: '# Now that the basics of using `BufferedWriter` have been covered, it’s time
    to meet the `Writer` family, which is depicted in Figure [11-4](#463938_1_En_11_Chapter.xhtml#Fig4).


    ![../images/463938_1_En_11_Chapter/463938_1_En_11_Fig4_HTML.jpg](images/463938_1_En_11_Chapter/463938_1_En_11_Fig4_HTML.jpg)


    **Figure 11-4** The `Writer` class hierarchy


    The `Writer` class is abstract so it cannot be used directly; the appending API
    comes from the `java.io.Appendable` interface, which `Writer` implements. The
    other `Writer` classes are used for different purposes. As we’ve already seen,
    the `OutputStreamWriter` writes text using a special character set. The `PrintWriter`
    writes formatted representations of objects to a text-output stream. (We used
    it to write HTML code in Chapter [10](#463938_1_En_10_Chapter.xhtml)). The `StringWriter`
    collects output into its internal buffer and writes it to a `String` instance.
    In Java 11, the `Writer` was enriched with the `nullWriter()` method, which returns
    a `Writer` instance that does nothing. This was requested by developers for testing
    purposes.


    ## Using `OutputStream` to Write Files


    Classes in the `Writer` family are advanced classes for writing data as text using
    character streams; but essentially, before data is written, it is turned into
    bytes. This means that files can be written by using streams of bytes as well.
    This probably became clear when trying to use the proper character encoding when
    writing text using the `OutputStreamWriter`, as the `OutputStreamWriter` instance
    given as argument is based on a `FileOutputStream` instance, a type that writes
    byte streams to a file.


    The root class of this hierarchy is `java.io.OutputStream`, which is depicted
    in Figure [11-5](#463938_1_En_11_Chapter.xhtml#Fig5).


    ![../images/463938_1_En_11_Chapter/463938_1_En_11_Fig5_HTML.jpg](images/463938_1_En_11_Chapter/463938_1_En_11_Fig5_HTML.jpg)


    **Figure 11-5** `OutputStream` class hierarchy


    And since I mentioned `FileOutputStream`, let’s see how we could use it to write
    the same list of entries that we have used before. The code is depicted in the
    following listing.


    ```

    package com.apress.bgn.ch11.writing;

    import com.apress.bgn.ch11.reading.FileInputStreamReadingDemo;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    import java.io.FileNotFoundException;

    import java.io.FileOutputStream;

    import java.io.IOException;

    import java.util.List;

    public class FileOutputStreamWritingDemo {

    private static final Logger log =

    LoggerFactory.getLogger(FileOutputStreamWritingDemo.class);

    public static void main(String... args) {

    File file = new File(

    "chapter11/read-write-file/src/main/resources/output/vultures3.txt");

    List lyricList =  List.of("Some of us, we''re hardly ever here",

    "The rest of us, we''re born to disappear",

    "How do I stop myself from",

    "Being just a number?");

    try (FileOutputStream output = new FileOutputStream(file)){

    lyricList.forEach(lyric -> {

    try {

    output.write(lyric.getBytes());

    output.write("\n".getBytes());

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    });

    output.flush();

    } catch (FileNotFoundException e) {

    log.info("Something went wrong! ", e);

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    The `OutputStream` family class is used for writing streams of bytes that represent
    raw data, unreadable by users directly, such as the one contained in binary files
    like images, media, PDFs, and so forth. For example, the next piece of code makes
    a copy of an image using `FileInputStream` to read it and `FileOutputStream` to
    write it.


    ```

    package com.apress.bgn.ch11;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.*;

    import java.nio.file.Files;

    public class DuplicateImageDemo {

    private static final Logger log =

    LoggerFactory.getLogger(DuplicateImageDemo.class);

    public static void main(String... args) {

    File src = new File(

    "chapter11/read-write-file/src/main/resources/input/cat.jpg");

    File dest = new File(

    "chapter11/read-write-file/src/main/resources/output/cat1.jpg");

    try(FileInputStream fis = new FileInputStream(src);

    FileOutputStream fos = new FileOutputStream(dest)) {

    int content;

    while ((content = fis.read()) != -1) {

    fos.write(content);

    }

    } catch (FileNotFoundException e) {

    log.error("Something bad happened.", e);

    } catch (IOException e) {

    log.error("Something bad happened.", e);

    }

    }

    }

    ```


    But writing code like this is no longer necessary, thanks to the introduction
    of the `Files.copy(src.toPath(), dest.toPath())` method in Java 1.7. In Java 11,
    the `OutputStream` was enriched with the `nullOutputStream()` method, which returns
    an `OutputStream` instance that does nothing. This was requested by developers
    for testing purposes.


    And that’s about all the space that I can allocate in this book for writing files
    using byte streams. Since there is a lot more to cover, two things before moving
    on…


    * When working with multiple files, do not open too many at the same time, because
    some operating systems have a limit of how many files a process can open at the
    same time. If you end up going over that limit, an `IOException` with a *Too many
    open files* message is thrown.

    * We did not cover this in the book, but take extra care when working with threads
    and files, because a file can be read by more than one thread simultaneously,
    but more threads writing to the same file can lead to unexpected results.


    ## Serialization and Deserialization


    **Serialization** is the name given to the operation of converting the state of
    an object to a byte stream so it can be sent over a network or written to a file
    and reverted back into a copy of that object. The operation to convert the byte
    stream back to an object is called **deserialization**. Java Serialization has
    been a controversial topic; Java Platform Chief Architect Mark Reinhold described
    it as a *horrible mistake* done in 1997. Apparently most Java vulnerabilities
    are somehow related to the way serialization is done in Java, and there is a project
    named **Amber**^([^(85)](#fn85)) that is dedicated to removing Java serialization
    completely and allowing developers to choose the serialization in a format of
    their choice. Currently, things are unstable in Java; there were a lot of changes
    introduced in a short time that an industry addicted to backward compatibility
    was unable to adapt to. Sources in the next section might be unstable, but I will
    do my best to keep them at least compilable by the time the book is published,
    and I will maintain the repository and answer questions as much as possible.


    ### Binary Serialization


    The `java.io.Serializable` interface has no methods or fields and serves only
    to mark classes as being serializable. When an object is serialized, the information
    that identifies the object type is serialized as well. Most Java classes are serializable.
    Any subclass of a serializable class is by default considered serializable, but
    if any new fields are non-serializable, an exception of type `NotSerializableException`
    is thrown. Classes written by developers that contain non-serializable fields
    must implement the `Serializable` interface and provide a concrete implementation
    for the following methods:


    ```

    private void writeObject(java.io.ObjectOutputStream out)

    throws IOException;

    private void readObject(java.io.ObjectInputStream in)

    throws IOException, ClassNotFoundException;

    private void readObjectNoData()

    throws ObjectStreamException;

