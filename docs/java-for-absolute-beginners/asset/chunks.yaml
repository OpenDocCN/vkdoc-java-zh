    ## Breaking Loops and Skipping Steps


    In the previous examples, I mentioned that exiting a loop using the `break` statement.
    There are three ways to manipulate the behavior of a loop:


    *   The `break` statement exits the loop, and if accompanied by a label, it breaks
    the loop that is labeled with it; this is useful when we have more nested loops,
    because we can break form any of the nested loops, not just the one containing
    the statement.

    *   The `continue` statement skips the execution of any code after it and continues
    with the next step.

    *   The `return` statement is used to exit a method, so if the loop, or `if` or
    `switch` statement is within the body of a method, it is used to exit the loop
    as well. In regards to best practices, usage of `return` statements to exit a
    method should not be abused as they might make the execution flow difficult to
    follow.'
