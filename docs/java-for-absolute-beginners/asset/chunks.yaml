    log.error("Creation failed!", e);

    } catch (IOException e) {

    log.error("Something unexpected happened!", e);

    }

    ```


    如您所见，`Files`类在处理文件时提供了更多功能。此外，根据操作的不同，会抛出更具体的异常（类型扩展自`IOException`），因此失败原因显而易见。例如，`createFile(...)`在文件已存在时会抛出`java.nio.file.FileAlreadyExistsException`，而不会返回与之关联的`Path`实例。`createDirectory(..)`具有相同的行为，`move(..)`也是如此。此处未使用的`delete(..)`方法在要删除的文件不存在时会抛出`java.nio.file.NoSuchFileException`。为避免代码示例中抛出异常，使用了`deleteIfExists(..)`。方法列表甚至更长，但由于本章篇幅有限，您可以自行查看官方Javadoc
    API：[`https://docs.oracle.com/javase/10/docs/api/java/nio/file/Files.html`](https://docs.oracle.com/javase/10/docs/api/java/nio/file/Files.html)。


    ## 读取文件


    文件是硬盘上的一系列比特。`File`处理程序不提供读取文件内容的方法，但可以使用其他一组类来完成此操作。根据需要对文件内容进行的操作，Java中有多种读取文件内容的方式。实际上，有很多方法，本节将介绍最常用的几种。


    ### 使用Scanner读取文件


    `Scanner`类曾用于从命令行读取输入，但可以将`System.in`替换为`File`和`Scanner`方法来读取文件内容。


    ```

    package com.apress.bgn.ch11;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    import java.io.IOException;

    import java.util.Scanner;

    public class ReadingFilesDemo {

    private static final Logger log =

    LoggerFactory.getLogger(ReadingFilesDemo.class);

    public static void main(String... args) {

    File file = new File(

    "chapter11/read-write-file/src/main/resources/input/vultures.txt");

    String content = "";

    Scanner scanner;

    try {

    scanner = new Scanner(file);

    while (scanner.hasNextLine()) {

    content += scanner.nextLine() + "\n";

    }

    scanner.close();

    log.info("Read with Scanner--> {}", content);

    scanner.close();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    }

    }

    ```


    也可以使用`Path`实例代替。


    ```

    scanner = new Scanner(Paths.get(file.toURI()), StandardCharsets.UTF_8.name());

    ```


    ### 使用Files工具方法读取文件


    另一种读取文件的方式是，当文件大小可以预估，并且将其内容存储到`String`对象中（有足够内存）不成问题时，可以使用`Files`类的适当方法。


    ```

    try {

    content = new String(Files.readAllBytes(Paths.get(file.toURI())));

    log.info("Read with Files.readAllBytes --> {}", content);

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    使用`Files.readAllBytes(..)`的优点是不需要循环，也无需逐行构建`String`值，因为此方法读取文件中的所有字节，这些字节可以作为参数传递给`String`构造函数。缺点是没有使用`Charset`，因此文本值可能不是我们期望的。但有一种方法可以克服这一点：调用`Files.readAllLines(..)`。它返回文件内容作为`String`值的列表，并且有两种形式，其中一种将`Charset`声明为参数。


    ```

    try {

    List lyricList = Files.readAllLines(Paths.get(file.toURI()),

    StandardCharsets.UTF_8);

    lyricList.forEach(System.out::println);

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    但如果我们不需要`List<String>`，而只需要一个`String`实例呢？在Java 11中，有一个方法可以做到这一点，叫做`readString`。


    ```

    try {

    content = Files.readString(Paths.get(file.toURI()), StandardCharsets.UTF_8)

    log.info("Read with Files.readAllBytes --> {}", content);

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    ### 使用Reader读取文件


    在`Files`类提供这些花哨的方法之前，还有其他方式，当您并不真正关心保存从文件读取的所有内容时，可能会用到它们。让我们从一个在Java 1.6之前编写的、用于逐行读取文件的复杂代码开始。


    ```

    import java.io.BufferedReader;

    import java.io.File;

    import java.io.FileReader;

    ...

    BufferedReader reader = null;

    try {

    reader = new BufferedReader(new FileReader(

    new File("chapter11/read-write-file/src/main/resources/input/vultures.txt")));

    StringBuilder sb = new StringBuilder();

    String line;

    while ((line = reader.readLine()) != null) {

    if(!line.contains("Ooh")) {

    sb.append(line).append("\n");

    }

    }

    log.info("Read with BufferedReader --> {}", sb.toString() );

    } catch (Exception e) {

    log.info("Something went wrong! ", e);

    } finally {

    if(reader != null) {

    try {

    reader.close();

    } catch (IOException e1) {

    e1.printStackTrace();

    }

    }

    }

    ```


    哇，这是什么，对吧？在Java 1.7之前，如果您想逐行读取文件，这就是必须编写的代码。您必须创建一个`File`处理程序。然后需要将文件处理程序包装到`FileReader`中。这种类型的实例可以完成读取工作，但只能以`char[]`块的形式读取，这在需要实际文本时不太有用。因此，需要将此实例包装到`BufferedReader`实例中，该实例通过将字符读入内部缓冲区来提供此功能。所以，它的工作方式是，调用`reader.readLine()`直到没有更多内容可读——到达文件末尾，然后我们需要调用`reader.close()`；否则，可能会在文件上保持锁定，使其在重启之前无法读取。'
