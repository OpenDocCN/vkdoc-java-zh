- fmt: "### Arrays\n\n`new`关键字也可用于创建数组。其创建方式与创建对象类似。**数组**是一种将多个变量组合在一起的数据结构。数组的大小在创建时确定，且之后无法更改。\n\
    \n每个变量可通过索引访问，索引从0开始，最大值为数组长度减1。数组可以存储基本类型值和引用类型值。下面声明几个数组，以展示其灵活性和实用性。首先声明一个数组字段，并观察创建对象时该字段的状态。\n\
    \n```\npackage com.apress.bgn.ch5;\npublic class ArraysDemo {\n    int array[];\n\
    \    public static void main(String... args) {\n        ArraysDemo ad = new ArraysDemo();\n\
    \        System.out.println(\"array was initialized with \" + ad.array);\n   \
    \ }\n}\n```\n\n执行上述代码后，控制台会打印什么？如果你认为`ad.array`字段被初始化为`null`，那么你是正确的。\n\n数组是引用类型，因此当交由JVM初始化此类类型的字段时，会使用默认值`null`，因为这是引用类型的典型默认值。\n\
    \n`null`关键字表示一个不存在的值。被赋予此值的引用没有具体的对象与之关联；它不指向堆中的任何对象。这就是为什么在编写代码时，如果在对象初始化之前就使用它（当然是通过其引用），会抛出`NullPointerException`。因此，开发人员在使用对象（或数组）之前，通常会检查其是否为`null`。让我们修改前面的示例来演示这一点。\n\
    \n```\npackage com.apress.bgn.ch5;\npublic class ArraysDemo {\n    int array[];\n\
    \    public static void main(String... args) {\n        ArraysDemo ad = new ArraysDemo();\n\
    \        if (ad.array == null) {\n            System.out.println(\"array unusable\"\
    );\n        }\n    }\n}\n```\n\n为什么我们需要`null`关键字来标记尚不存在的东西？因为在编程中，先声明一个引用，仅在首次使用时才进行初始化，这是一种常见做法。这对于那些体积较大的对象尤其有用，这个过程称为**懒加载**。\n\
    \n回到数组。让我们正确初始化之前声明的数组字段，并指定其大小，看看会发生什么。\n\n```\n1.   package com.apress.bgn.ch5;\n\
    2.\n3.   public class ArraysDemo {\n4.\n5.       public static void main(String...\
    \ args) {\n6.           int[] array =  new int[2];\n7.          for (int i = 0;\
    \ i <  array.length; ++i) {\n8.               System.out.println(\"array[\"+ i\
    \ +\"]= \" + array[i]);\n9.           }\n10.       }\n11.   }\n```\n\n数组的初始化发生在第6行，数组大小为2。数组的大小作为参数传递给一个看似构造函数的调用，但这里使用的是方括号而不是圆括号。通过将数组维度设置为2，我们告诉JVM必须为此对象预留两个相邻的内存位置，用于存储两个`int`值。由于没有指定数组内容的值，你认为数组创建时这些位置会被填充什么？这个问题很简单：前面的数组被定义为包含两个`int`值，因此当数组初始化时，会使用`int`类型的默认值。图[5-13](#463938_1_En_5_Chapter.xhtml#Fig13)描述了执行上述代码时栈和堆内存中发生的情况。\n\
    \n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig13_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig13_HTML.jpg)\n\
    \n图5-13 声明一个大小为2的int数组\n\n在第7到9行，一个`for`循环打印数组的值。变量`int i`就是我们所说的索引变量，它在循环的每一步中以1为增量遍历数组的所有值。`array.length`是包含数组大小的属性，即数组包含的元素个数。正如你可能预料的那样，控制台打印的输出是：\n\
    \n```\narray[0]= 0\narray[1]= 0\n```\n\n要向数组中放入值，我们有以下几种选择。\n\n*   直接访问元素并设置值。\n\
    \n```\n    array[0] = 5;\n    array[1] = 7;\n    //或者\n    for (int i = 0; i <\
    \ array.length; ++i) {\n        array[i] = i;\n    }\n```\n\n*   在初始化数组时显式指定要存储的值。\n\
    \n```\n    int another[] = {1,4,3,2};\n```\n\n数组也可以包含引用。下面的代码示例展示了如何使用`Performer`数组。\n\
    \n```\npackage com.apress.bgn.ch5;\nimport com.apress.bgn.ch4.hierarchy.*;\npublic\
    \ class PerformerArrayDemo {\n    public static void main(String... args) {\n\
    \        Performer[] array = new Performer[2];\n        for (int i = 0; i < array.length;\
    \ ++i) {\n            System.out.println(\"performer[\" + i + \"]= \" + array[i]\
    \ );\n        }\n        array[0] = new Performer(\"John\", 40, 1.91f, Gender.MALE);\n\
    \        array[1] = new Performer(\"Julianna\", 35, 1.61f, Gender.FEMALE);\n \
    \       for (int i = 0; i < array.length; ++i) {\n            System.out.println(\"\
    performer[\" + i + \"]= \" + array[i].getName() );\n        }\n    }\n}\n```\n\
    \n为了更清晰地展示数组和对象在内存中的情况，请参见图[5-14](#463938_1_En_5_Chapter.xhtml#Fig14)。\n\n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig14_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig14_HTML.jpg)\n\
    \n图5-14 声明一个大小为2的Performer数组\n\n所以，我们有一个引用数组，它们指向的对象可以在程序运行期间更改。\n\n数组可以是多维的。如果你学过高等数学，可能还记得**矩阵**的概念，它是一个按行和列排列的矩形数组。在Java中，你可以使用数组来模拟矩阵。如果你想要一个简单的包含行和列的矩阵，可以定义一个二维数组。\n\
    \n```\npackage com.apress.bgn.ch5;\npublic class MatricesDemo {\n    public static\
    \ void main(String... args) {\n        // 二维数组：2行，2列\n        int[][] intMatrix\
    \ = {{1, 0}, {0, 1}};\n        int[][] intMatrix2 = new int[2][2];\n        for\
    \ (int i = 0; i < intMatrix2.length; ++i) {\n            for (int j = 0; j < intMatrix2[i].length;\
    \ ++j) {\n                intMatrix2[i][j] = i + j;\n                System.out.print(intMatrix[i][j]\
    \ + \" \");\n            }\n            System.out.println();\n        }\n   \
    \ }\n}\n```\n\n但你也可以定义更多维度，根据需要指定任意数量的坐标。下面的代码片段定义了三维数组。\n\n```\npackage com.apress.bgn.ch5;\n\
    public class MatricesDemo {\n    public static void main(String... args) {\n \
    \       // 立方体矩阵，三个坐标\n        int[][][] intMatrix3 = new int[2][2][2];\n    \
    \    for (int i = 0; i < intMatrix3.length; ++i) {\n            for (int j = 0;\
    \ j < intMatrix3[i].length; ++j) {\n                for (int k = 0; k < intMatrix3[i][j].length;\
    \ ++k) {\n                    intMatrix3[i][j][k] = i + j + k;\n             \
    \       System.out.print(\"[\"+i+\", \"+j+\", \" + k + \"]\");\n             \
    \   }\n                System.out.println();\n            }\n            System.out.println();\n\
    \        }\n    }\n}\n```\n\n对于数组，请根据你的需要和内存容量来定义其大小，但务必确保初始化数组，并在代码中避免尝试访问允许范围之外的索引。如果数组的大小是`N`，那么它的最后一个索引是`N-1`，第一个索引是`0`。尝试访问该范围之外的任何索引，都会在运行时抛出`java.lang.ArrayIndexOutOfBoundsException`类型的异常。因此，编写如下代码：\n\
    \n```\nint array = new int[2];\narray[5] = 7;\n```\n\n会导致程序在运行时崩溃，并在控制台打印以下信息：\n\
    \n```\nException in thread \"main\" java.lang.ArrayIndexOutOfBoundsException:\n\
    Index 5 out of bounds for length 2\n    at chapter.five.collections/com.apress.bgn.ch5.ArraysDemo.main(ArraysDemo.java:56)\n\
    ```\n\n为了更方便地处理Java中的数组，有一个专门的类：`java.util.Arrays`。这个类提供了用于排序和比较数组、搜索元素以及将其内容转换为文本或流的实用方法，这样无需编写繁琐的`for`循环即可打印数组内容。"
  raw: "### Arrays\n\nThe `new` keyword can also be used to create arrays. In a similar\
    \ manner, it creates objects. An **array** is a data structure that holds a group\
    \ of variables together. Its size is defined when it is created, and it cannot\
    \ be changed.\n\nEach variable can be accessed using an index that starts at 0\
    \ and goes up to the length of the array to –1\\. Arrays can hold primitive and\
    \ reference values. Let’s declare a few arrays to show you how versatile and useful\
    \ they are. Let’s declare first an array field and check what is happening with\
    \ it when an object is created.\n\n```\npackage com.apress.bgn.ch5;\npublic class\
    \ ArraysDemo {\nint array[];\npublic static void main(String... args) {\nArraysDemo\
    \ ad = new ArraysDemo();\nSystem.out.println(\"array was initialized with \" +\
    \ ad.array);\n}\n}\n```\n\nWhat do you think is printed in the console when the\
    \ preceding code is executed? If you assumed that the `ad.array` field is initialed\
    \ with `null` , you were right.\n\nArrays are reference types, and thus when left\
    \ to the JVM to initialize fields of this type with a default value, `null` is\
    \ used, as this is the typical default value for reference types.\n\nThe `null`\
    \ keyword represents a non-existing value. A reference that is assigned this value\
    \ does not have a concrete object assigned to it; it does not point to an object\
    \ in the heap. That is why when writing code, if an object is used (through its\
    \ reference, of course) before being initialized, a `NullPointerException` is\
    \ thrown. This is why developers test equality to `null` before using the object\
    \ (or array). Let’s modify the previous example to do that.\n\n```\npackage com.apress.bgn.ch5;\n\
    public class ArraysDemo {\nint array[];\npublic static void main(String... args)\
    \ {\nArraysDemo ad = new ArraysDemo();\nif (ad.array == null) {\nSystem.out.println(\"\
    array unusable\");\n}\n}\n}\n```\n\nWhy do we need the `null` keyword to mark\
    \ something that does not exist yet? Because it is common practice in programming\
    \ to declare a reference first and initialize it only when first time used. This\
    \ is useful, especially for objects that tend to be large in size, and the process\
    \ is called **lazy loading** .\n\nBack to arrays. Let’s properly initialize the\
    \ array field previously declared and give it a size to see what happens.\n\n\
    ```\n1\\.   package com.apress.bgn.ch5;\n2.\n3\\.   public class ArraysDemo {\n\
    4.\n5\\.       public static void main(String... args) {\n6\\.           int[]\
    \ array =  new int[2];\n7\\.          for (int i = 0; i <  array.length; ++i)\
    \ {\n8\\.               System.out.println(\"array[\"+ i +\"]= \" + array[i]);\n\
    9\\.           }\n10\\.       }\n11\\.   }\n```\n\nThe initialization of the Array\
    \ takes place in line 6 and the size of the array is 2\\. The size of the array\
    \ is given as a parameter to what it looks like a constructor call, only instead\
    \ of parentheses, square brackets are used. By setting the dimension of the array\
    \ to 2, we are telling the JVM that two adjacent memory locations must be put\
    \ aside for this object to store two `int` values in. And because, no values were\
    \ specified as the array contents, what do you think they are filled with when\
    \ the array is created? Well, this is a simple one: the previous array is defined\
    \ to be made of two `int` values, so when the array is initialized, the default\
    \ value for the `int` type is used. Figure [5-13](#463938_1_En_5_Chapter.xhtml#Fig13)\
    \ depicts what happens in the stack and heap memory when the previous code is\
    \ executed.\n\n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig13_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13\n\nDeclaring an int array of size 2\n\nIn lines 7 to 9, a `for`\
    \ loop prints the values of the array. The `int i` variable is what we call an\
    \ index variable and traverses all values of the array in increments of 1 in each\
    \ step of the loop. The `array.length` is the property containing the size of\
    \ the array, how many elements the array contains. As you probably expected, the\
    \ output printed in the console is\n\n```\narray[0]= 0\narray[1]= 0\n```\n\nTo\
    \ put values in an array, we have the following choices.\n\n*   We access the\
    \ element directly and we set the value.\n\n```\n    array[0] = 5;\n    array[1]\
    \ = 7;\n    //or\n    for (int i = 0; i < array.length; ++i) {\n    array[i] =\
    \ i;\n    }\n    ```\n\n*   We initialize the array explicitly with the values\
    \ we intend to store.\n\n```\n    int another[] = {1,4,3,2};\n    ```\n\nArrays\
    \ can contain references as well. The following code sample depicts how a `Performer`\
    \ array can be used.\n\n```\npackage com.apress.bgn.ch5;\nimport com.apress.bgn.ch4.hierarchy.*;\n\
    public class PerformerArrayDemo {\npublic static void main(String... args) {\n\
    Performer[] array = new Performer[2];\nfor (int i = 0; i < array.length; ++i)\
    \ {\nSystem.out.println(\"performer[\" + i + \"]= \" + array[i] );\n}\narray[0]\
    \ = new Performer(\"John\", 40, 1.91f, Gender.MALE);\narray[1] = new Performer(\"\
    Julianna\", 35, 1.61f, Gender.FEMALE);\nfor (int i = 0; i < array.length; ++i)\
    \ {\nSystem.out.println(\"performer[\" + i + \"]= \" + array[i].getName() );\n\
    }\n}\n}\n```\n\nAnd because depicting the memory contents makes it more clear\
    \ what happens with our array and objects, I give to you Figure [5-14](#463938_1_En_5_Chapter.xhtml#Fig14).\n\
    \n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig14_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig14_HTML.jpg)\n\
    \nFigure 5-14\n\nDeclaring an array of Performers with size 2\n\nSo yeah, we have\
    \ an array of references, and the object they point to can be changed during the\
    \ program.\n\nArrays can be multidimensional. If you studied advanced math, you\
    \ probably remember the *matrix* concept, which was a rectangular array arranged\
    \ in rows and columns. In Java, you can model matrices by using arrays. If you\
    \ want a simple matrix with rows and columns, you define an array with two dimensions.\n\
    \n```\npackage com.apress.bgn.ch5;\npublic class MatricesDemo {\npublic static\
    \ void main(String... args) {\n// bi-dimensional array: 2 rows, 2 columns\nint[][]\
    \ intMatrix = {{1, 0}, {0, 1}};\nint[][] intMatrix2 = new int[2][2];\nfor (int\
    \ i = 0; i < intMatrix2.length; ++i) {\nfor (int j = 0; j < intMatrix2[i].length;\
    \ ++j) {\nintMatrix2[i][j] = i + j;\nSystem.out.print(intMatrix[i][j] + \" \"\
    );\n}\nSystem.out.println();\n}\n}\n}\n```\n\nBut you can get multidimensional\
    \ and define as many coordinates as you want. The next code snippet defines only\
    \ three of them.\n\n```\npackage com.apress.bgn.ch5;\npublic class MatricesDemo\
    \ {\npublic static void main(String... args) {\n// cubical matrix, with three\
    \ coordinates\nint[][][] intMatrix3 = new int[2][2][2];\nfor (int i = 0; i < intMatrix3.length;\
    \ ++i) {\nfor (int j = 0; j < intMatrix3[i].length; ++j) {\nfor (int k = 0; k\
    \ < intMatrix3[i][j].length; ++k) {\nintMatrix3[i][j][k] = i + j + k;\nSystem.out.print(\"\
    [\"+i+\", \"+j+\", \" + k + \"]\");\n}\nSystem.out.println();\n}\nSystem.out.println();\n\
    }\n}\n}\n```\n\nWhen it comes to arrays, make them as big as you need them and\
    \ your memory allows, but make sure to initialize them and make sure in your code\
    \ that you do not try to access indexes outside the allowed range. If the size\
    \ of an array is **N**, then its last index is **N-1** and its first is **0**.\
    \ Try to access any index outside that range and an exception of type `java.lang.ArrayIndexOutOfBoundsException`\
    \ is thrown at runtime. So writing code like this\n\n```\nint array = new int[2];\n\
    array[5] =7;\n```\n\ncauses your program to crash at runtime, and the following\
    \ is printed in the console.\n\n```\nException in thread \"main\" java.lang.ArrayIndexOutOfBoundsException:\n\
    Index 5 out of bounds for length 2\nat chapter.five.collections/com.apress.bgn.ch5.ArraysDemo.main(ArraysDemo.java:56)\n\
    ```\n\nFor easier handling of arrays in Java, there is a special class: `java.util.Arrays`.\
    \ This class provides utility methods to sort and compare arrays, search elements,\
    \ and convert their content to text or a stream, so that they can print without\
    \ writing the tedious `for` loop."
  trans: "\n### 数组\n\n`new` 关键字也可用于创建数组，其创建方式与创建对象类似。**数组**是一种将一组变量聚合在一起的数据结构。它的大小在创建时确定，且之后无法更改。\n\
