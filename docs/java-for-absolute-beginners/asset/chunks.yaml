- fmt: "# Java Swing 桌面应用\n\n对于使用 Swing 或 AWT 编写的 Java 桌面应用程序，它们现在已经很少被使用了。你可能会在学校里学习如何构建一个，但除此之外……它们被认为是过时的技术。尽管如此，某些机构和公司仍在使用一些长期运行的遗留应用程序，这些程序是用\
    \ Swing 构建的。我曾见过餐厅使用 Swing 应用程序来管理餐桌和订单，而且我认为大多数超市也使用 Swing 应用程序来管理商品。这就是本书中这一节存在的原因，因为你最终可能会从事维护这类应用程序的工作，并且了解其基础知识是很好的，因为\
    \ Swing 仍然是 JDK 的一部分。\n\n所有 Swing 组件（AWT 组件也是）都属于 `java.desktop` 模块，因此如果你想使用 Swing\
    \ 组件，你必须声明对该模块的依赖。在下面的配置片段中，你可以看到我们使用 Swing 的项目的模块在其 `module-info.java` 中通过 `requires`\
    \ 指令声明了对 `java.desktop` 模块的依赖。\n\n```\nmodule chapter.ten.swing {\n    requires\
    \ java.desktop;\n}\n```\n\n图 [10-3](#463938_1_En_10_Chapter.xhtml#Fig3) 中展示的应用程序是使用\
    \ AWT 构建的，本节将介绍如何使用 Swing 构建类似的东西，并添加更多组件。任何 Swing 应用程序的核心类都叫做 `JFrame`，该类型的实例用于创建带有边框和标题的窗口。那么，让我们编写一些代码来实现这一点。\n\
    \n```\npackage com.apress.bgn.ch10;\nimport javax.swing.*;\nimport java.awt.*;\n\
    public class SwingDemo extends JFrame {\n    public static void main(String...\
    \ args) {\n        SwingDemo swingDemo = new SwingDemo();\n        swingDemo.setTitle(\"\
    Swing Demo Window\");\n        swingDemo.setSize(new Dimension(500,500));\n  \
    \      swingDemo.setVisible(true);\n    }\n}\n```\n\n在代码中，创建了一个 `javax.swing.JFrame`\
    \ 的实例，为其设置了标题，并且我们还设置了大小，以便在创建窗口时能看到一些内容。要显示窗口，必须在 `JFrame` 实例上调用 `setVisible(true)`。当你运行上述代码时，会显示一个如图\
    \ [10-4](#463938_1_En_10_Chapter.xhtml#Fig4) 所示的窗口。默认情况下，窗口位于主显示器的左上角，但这可以通过使用一些\
    \ Swing 组件来计算相对于屏幕大小的位置来改变。确定 Swing 窗口相对于屏幕大小的大小和位置，仅受你愿意投入的数学计算量的限制。图 [10-4](#463938_1_En_10_Chapter.xhtml#Fig4)\
    \ 展示了一个简单的 Java Swing 窗口。\n\n![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig4_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig4_HTML.jpg)\n\
    \n**图 10-4** 简单的 Java Swing 应用程序\n\n此时，如果我们关闭显示的窗口，应用程序会继续运行。因为默认情况下，关闭窗口会通过调用\
    \ `setVisible(false)` 使其不可见。如果我们想将默认行为改为退出应用程序，我们必须更改关闭窗口时执行的默认操作。这可以通过在创建 `JFrame`\
    \ 实例后添加以下代码行轻松实现。\n\n```\nswingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
    ```\n\n`JFrame.EXIT_ON_CLOSE` 常量是一组定义窗口关闭时应用程序行为的常量之一。这个常量声明应用程序应在窗口关闭时退出。其他可用的选项如下列表所示：\n\
    \n*   `DO_NOTHING_ON_CLOSE` - 不执行任何操作，包括不关闭窗口。\n*   `HIDE_ON_CLOSE` - 默认选项，会导致调用\
    \ `setVisible(false)`。\n*   `DISPOSE_ON_CLOSE` - 一个应用程序可以有多个窗口，此选项会在最后一个可显示的窗口关闭时退出应用程序。\n\
    \n大多数 Swing 应用程序是通过扩展 `JFrame` 类来编写的，以便对其组件获得更多控制权，因此上述代码也可以这样编写：\n\n```\npackage\
    \ com.apress.bgn.ch10;\nimport javax.swing.*;\nimport java.awt.*;\npublic class\
    \ SwingDemo extends JFrame {\n    public static void main(String... args) {\n\
    \        SwingDemo swingDemo = new SwingDemo();\n        swingDemo.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
    \        swingDemo.setTitle(\"Swing Demo Window\");\n        swingDemo.setSize(new\
    \ Dimension(500,500));\n        swingDemo.setVisible(true);\n    }\n}\n```\n\n\
    现在我们已经有了一个窗口，让我们开始添加组件，因为如果我们没有更多的组件来注意到变化，改变外观和感觉是毫无意义的。每个 Swing 应用程序至少有一个 `JFrame`，它是所有其他窗口的根和父级，因为窗口也可以使用\
    \ `JDialog` 类来创建。`JDialog` 是创建对话框窗口的主要类，这是一种特殊类型的窗口，主要包含消息和用于选择选项的按钮。开发者可以使用这个类创建自定义对话框，或者使用\
    \ `JOptionPane` 类的方法来创建各种对话框窗口。\n\n回到向 `JFrame` 实例添加组件的问题：组件是通过添加到其容器中来添加到 `JFrame`\
    \ 的。可以通过调用 `getContentPane()` 来获取对 `JFrame` 容器的引用。默认的内容面板是一个简单的中间容器，它继承自 `JComponent`，而\
    \ `JComponent` 又扩展了 `java.awt.Container`（Swing 是 AWT 的扩展，其大多数组件都是 AWT 的扩展）。对于\
    \ `JFrame`，默认的内容面板是 `JPane` 的一个实例。这个类有一个类型为 `java.awt.LayoutManager` 的字段，它定义了其他组件在\
    \ `JPane` 中的排列方式。`JFrame` 实例的默认内容面板使用 `java.awt.BorderLayout` 作为其布局管理器，它将面板分为五个区域：EAST、WEST、NORTH、SOUTH\
    \ 和 CENTER。每个区域都可以通过 `BorderLayout` 中定义的名称匹配的常量来引用。因此，如果我们想为应用程序添加一个退出按钮，我们可以通过编写以下代码将其添加到\
    \ SOUTH 区域。\n\n```\npackage com.apress.bgn.ch10;\nimport javax.swing.*;\nimport\
    \ java.awt.*;\nimport java.awt.event.ActionEvent;\nimport java.awt.event.ActionListener;\n\
    public class SwingDemo extends JFrame {\n    private JPanel mainPanel;\n    private\
    \ JButton exitButton;\n    public SwingDemo(String title) {\n        super(title);\n\
    \        mainPanel = (JPanel) this.getContentPane();\n        exitButton = new\
    \ JButton(\"Bye Bye!\");\n        exitButton.addActionListener(new ActionListener()\
    \ {\n            @Override\n            public void actionPerformed(ActionEvent\
    \ e) {\n                System.exit(0);\n            }\n        });\n        mainPanel.add(exitButton,\
    \ BorderLayout.SOUTH);\n    }\n    public static void main(String... args) {\n\
    \        SwingDemo swingDemo = new SwingDemo(\"Swing Demo Window\");\n       \
    \ swingDemo.setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);\n        swingDemo.setSize(new\
    \ Dimension(500, 500));\n        swingDemo.setVisible(true);\n    }\n}\n```\n\n\
    图 [10-5](#463938_1_En_10_Chapter.xhtml#Fig5) 展示了修改后的应用程序。我们在内容面板的 SOUTH 区域添加了一个退出按钮，并标明了\
    \ `BorderLayout` 的整体区域划分。\n\n此外，由于新按钮必须是退出我们应用程序的唯一方式，`setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);`\
    \ 被替换为 `setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);`，并且一个 `java.awt.event.ActionListener`\
    \ 实例被附加到按钮上，以便它可以记录按钮被点击的事件并做出相应反应，在本例中是退出应用程序。大多数 Swing 组件都支持监听器，这些监听器可以被定义来捕获用户对对象执行的事件，并以某种方式做出反应。\n\
