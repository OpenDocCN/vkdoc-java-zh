    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    /**

    * compute and prints time to live

    */

    public void computeAndPrintTtl(){

    int ttl = LIFESPAN - this.age;

    System.out.println("Time to live: " + ttl);

    }

    ...

    }

    ```


    **!** There is a Java coding convention in the naming of constants that recommends
    using only uppercase letters, underscores, and numbers.


    The preceding method definition does not declare any parameters, so considering
    we have a `Human` instance we can call the method like this:


    ```

    Human human = new Human();

    human.setName("John");

    human.setAge(40);

    human.setHeight(1.91f);

    human.computeAndPrintTtl();

    ```


    And we expect it to print `Time to live: 60`, which actually happened. Now, let’s
    modify the method to return the value instead of printing it.


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    /**

    * @return time to live

    */

    public int getTimeToLive(){

    int ttl = LIFESPAN - this.age;

    return ttl;

    }

    ...

    }

    ```


    Calling the method do nothing in this case, we have to modify the code to save
    the returned value and print it.


    ```

    Human human = new Human();

    human.setName("John");

    human.setAge(40);

    human.setHeight(1.91f);

    int timeToLive = getTimeToLive();

    System.out.println("Time  to  live: " + timeToLive);

    ```


    Both methods introduced here declare no parameters, so they are called without
    providing any arguments. We won’t cover methods with parameters, as the setters
    are more than obvious. Let’s skip ahead.'
