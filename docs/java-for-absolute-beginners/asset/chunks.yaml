    方法。


    ```

    package com.apress.bgn.ch9.service;

    import com.apress.bgn.ch9.Account;

    import com.apress.bgn.ch9.repo.AccountRepo;

    import java.util.Optional;

    /**

    * @author Iuliana Cosmina

    * @since 1.0

    */

    public class AccountServiceImpl implements AccountService {

    AccountRepo repo;

    public AccountServiceImpl(AccountRepo repo) {

    this.repo = repo;

    }

    @Override

    public Account createAccount(String holder, String accountNumber,

    String amount) {

    int intAmount;

    try {

    intAmount = Integer.parseInt(amount);

    } catch (NumberFormatException nfe) {

    throw new InvalidDataException(

    "Could not create account with invalid amount!");

    }

    if (accountNumber == null ||

    accountNumber.isEmpty() || accountNumber.length() < 5) {

    throw new InvalidDataException(

    "Could not create account with invalid account number!");

    }

    if (intAmount < 0) {

    throw new InvalidDataException(

    "Could not create account with negative amount!");

    }

    Optional<Account> existing = repo.findOne(holder);

    if (existing.isPresent()) {

    throw new AccountCreationException(

    "Account already exists for holder " + holder);

    }

    Account acc = new Account(holder, intAmount, accountNumber);

    return repo.save(acc);

    }

    ...

    }

    ```


    `createAccount(..)` 方法接受持有者名称、要创建的账户编号以及初始金额作为参数。所有这些参数都特意以 `String` 实例的形式提供，以便方法体包含一些需要认真测试的逻辑。让我们分析一下上述方法的行为，并列出所有可能的返回值和抛出的异常。


    *   如果金额不是数字，则抛出 `InvalidDataException`。

    *   如果 `accountNumber` 参数为空，则抛出 `InvalidDataException`。

    *   如果 `accountNumber` 参数为 null，则抛出 `InvalidDataException`。

    *   如果 `accountNumber` 参数少于五个字符，则抛出 `InvalidDataException`。

    *   如果转换为数字的 `amount` 参数为负数，则抛出 `InvalidDataException`。

    *   如果 `holder` 参数对应的账户已存在，则抛出 `AccountCreationException`。

    *   如果所有输入都有效且 `holder` 参数对应的账户不存在，则创建一个 `Account` 实例，保存到数据库，并返回结果。


    因此，如果我们真的对测试有执念，就需要为所有这些情况编写测试场景。在软件领域，有一个叫做**测试覆盖率**的概念，这是一个确定测试用例是否覆盖应用程序代码以及覆盖多少的过程。结果是一个百分比值，公司通常会定义一个测试覆盖率百分比^(75)，作为应用程序质量的保证。那么，让我们为了练习而编写所有这些测试方法。但在此之前，先看看仓库桩是什么样的。'
