  raw: "## Testing\n\nDebugging is a part of a software process called **testing**\
    \ and involves identifying and correcting code errors. But avoiding technical\
    \ errors is not enough, testing an application means much more than that. There\
    \ is an organization providing very good materials for training and certifications\
    \ for software testers. The **International Software Testing Qualifications Board**\
    \ (ISTQB) is a software testing qualification certification organization that\
    \ operates internationally. It established a syllabus and a hierarchy of qualifications\
    \ and guidelines for software testing.^([^(71)](#fn71)) If you think you are more\
    \ interested in software testing then you should look into getting an ISTQB certification.\n\
    \nThe ISTQB defines testing as “the process consisting of all lifecycle activities,\
    \ both static and dynamic, concerned with planning, preparation and evaluation\
    \ of software and related work products to determine that they satisfy specified\
    \ requirements to demonstrate that they are fit for purpose and to detect defects.”\n\
    \nThis is a technical and academic definition. The definition that I propose is\
    \ “the process of verifying that an implementation does what it is supposed to\
    \ in the amount of time it is expected to, with an acceptable resources consumption\
    \ and it does not break anything while doing so.”\n\n### A Small Introduction\
    \ to Testing\n\n*I want to be a developer. Why do I need to know all of these\
    \ details about testing?* The simple answer is because testing is a constant activity\
