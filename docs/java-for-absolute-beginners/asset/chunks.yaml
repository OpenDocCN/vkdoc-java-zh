    to use to redesign our `index.jsp` page? If you thought about FMT and Core, you
    are right. Also, JSP pages that use taglibs are always backed up by a servlet
    that sets the proper attributes on the request that is used within the JSP page.
    So, let’s modify the `index.jsp` page, as depicted next.


    ```

    Web Application Demo JSP Page


    Today is


    ```


    And while we are at it, let’s rename it to make it obvious what it is used for,
    let’s call it `date.jsp` and write a servlet class named `DateServlet` to add
    the `today` attribute to the request, which is formatted by the `<fmt:formatDate>`
    tag. The result is saved into the `todayFormatted` variable, which is later printed
    by the `<c:out>` tag.


    ```

    package com.apress.bgn.ch10;

    import javax.servlet.RequestDispatcher;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import java.io.IOException;

    import java.util.Date;

    @WebServlet(

    name = "dateServlet",

    urlPatterns = {"/"}

    )

    public class DateServlet extends HttpServlet {

    @Override

    protected void doGet(HttpServletRequest request, HttpServletResponse response)

    throws IOException, ServletException {

    System.out.println(" ->>> Getting date ");

    request.setAttribute("today", new Date());

    RequestDispatcher rd = getServletContext().getRequestDispatcher("/date.jsp");

    rd.forward(request, response);

    }

    }

    ```


    This is all. Now, we restart the application and the first page now displays:
    `"Today is 20/08/2018"`. You will obviously see the date on your system when the
    code is run on your machine.


    If you think writing Java Web applications is cumbersome you are right. Pure Java
    is tedious for such a task. Professional Java Web applications are usually written
    by using frameworks that make the job of creating pages and linking them to the
    backend easily. Even more, nowadays the tendency is to create interfaces in JavaScript
    (also using advanced CSS4, now many UI Designs can also be done 100% in CSS3 or
    CSS4) and communicate to a Java backend application hosted on an enterprise server
    using Web Service calls, usually REST. Anyway, look it up if you are curious,
    the subject is vast, but frameworks such as Spring make it easy to set up your
    environment and start developing.


    ## Summary


    This chapter covered important development tools and techniques, the classes in
    JDK that provide support, and important Java libraries that could make your development
    job more practical and pleasant. The JDK has never shined when it comes to GUI
    support, but JavaFX is an evolution from AWT and Swing, and it just might have
    a future. The following is a complete list of the topics.


    *   how to write an interactive console application

    *   how to write an interactive application with a Swing interface

    *   the basics of JavaFX architecture

    *   how to write an interactive application with a JavaFX interface

    *   how to internationalize your application

    *   how to write a web application using an embedded server

    *   what a servlet is

    *   what a JSP scriptlet is

    *   how to use taglibs to write JSP pages


    ## Footnotes


    ### 11. Working with Files


    One of the most important functions in software is information organizing and
    storage, with the goal of using it and sharing it. Before computers were invented
    information was written on paper and stored in organized cabinets where it could
    be retrieved from manually. Software applications that run on computers do something
    similar. Information is written in files, files are organized in directories and
    in even more complex structures named databases. Java provides classes to read
    information from files and databases and classes to write files and write information
    to databases. In **Chapter** [**9**](#463938_1_En_9_Chapter.xhtml), a simple example
    using a Derby in-memory database was introduced to show you how heavy dependencies
    like databases can be mocked to allow faster unit testing. This chapter is not
    focused on using Java to perform database operations, but on how Java can be used
    to manipulate files.


    ### File Handlers


    Before showing you how to read or write files, I need to show you how to access
    them from the code, to check if they exist, to check their size and list their
    properties, and so forth. Enough with the literature—let’s get cracking!


    When working with files in Java, the most important class is the `java.io.File`
    class. This class is an abstract representation of a file and directory pathname.
    Instances of this class are called *file handlers* because they allow developers
    to handle files and directories in the Java code using references of this type,
    instead of complete pathnames. A `File` instance can be created by using different
    arguments.


    The simplest way is to use the constructor that receives as an argument a `String`
    value containing the absolute file pathname. In the following code sample, the
    `printStats(..)` method prints file information. We use it a lot in this section,
    but the code won’t be depicted again.


    ```

    package com.apress.bgn.ch11;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    public class Demo {

    private static final Logger log = LoggerFactory.getLogger(Demo.class);

    public static void main(String... args) {

    File file = new File("/Users/iulianacosmina/apress/vultures.txt");

    printFileStats(file);

    }

    private static void printFileStats(File f) { if (f.exists()) {

    log.info("File Details:");

    log.info("Type : {}", f.isFile() ? "file" : "directory or symlink");

    log.info("Location :{}", f.getAbsolutePath());

    log.info("Parent :{}", f.getParent());

    log.info("Name : {}", f.getName());

    double kilobytes = f.length() / 1024; log.info("Size : {} ", kilobytes);

    log.info("Is Hidden : {}", f.isHidden());

    log.info("Is Readable? : {}", f.canRead());

    log.info("Is Writable? : {}", f.canWrite());

    }

    }

    }

    ```


