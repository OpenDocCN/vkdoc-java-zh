    ## Introduction to Java Data Types


    The previous example showed that data types in Java can be split into two big
    groups based on where they are stored during execution: primitive types and reference
    types. I’ll introduce them briefly and explain their most important members later.


    ### Primitive Data Types


    **Primitive types** are defined by the Java programming language as special types
    that do not have a supporting class and are named by their reserved keyword. Variables
    of these types are saved on the stack memory and when values are assigned to them
    using the `= (equals)` operator , the value is actually copied. So, if we declare
    two primitive variables of type `int`, as in the following code listing, we end
    up with two variables, `k` and `q`, both having the same value: `42`.


    ```

    package com.apress.bgn.ch5;

    public class PrimitivesDemo {

    public static void main(String... args) {

    int k = 42;

    int q = k;

    System.out.println("k = " + k);

    System.out.println("q = " + q);

    }

    }

    ```


    When passed as arguments to other methods, the values of primitive values are
    copied and used without the initial variables being modified. This can be proved
    by creating a method to swap the values of two `int` variables. The following
    is the code for the method.


    ```

    package com.apress.bgn.ch5;

    public class PrimitivesDemo {

    public static void main(String... args) {

    int k = 42;

    int q = 44;

    swap(k, q);

    System.out.println("k = " + k);

    System.out.println("q = " + q);

    }

    static void swap(int a, int b) {

    int temp = a;

    a = b;

    b  =  temp;

    }

    }

    ```


    So, what do you think is printed as values for `k` and `q?` If you thought the
    output is the same as the following, you are correct.


    ```

    k = 42

    q = 44

    ```


    This happens because in Java passing arguments to a method is done through their
    value, which means for primitives, changing the formal parameter’s value doesn’t
    affect the actual parameter’s value. If you read the previous section, you can
    already imagine what happens on the stack. When the `swap()` method is called
    a new stack memory block is created to save the values used by this method. During
    the execution of the method, the values might change, but if they are not returned
    and assigned to variables in the calling method, the values are lost when the
    method execution ends. Figure [5-5](#463938_1_En_5_Chapter.xhtml#Fig5) depicts
    the changes that take place on the stack during the execution of the code previously
    listed. As you can obviously notice, the heap memory is not used at all.


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig5_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Java passing primitive arguments by value'
