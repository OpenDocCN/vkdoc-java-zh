    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Figd_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Figd_HTML.jpg)
    | Process | Simple process statement: assignment, change of values, and so forth.
    |

    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fige_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fige_HTML.jpg)
    | Decision | Shows a conditional operation that decides a certain path of execution.
    |

    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Figf_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Figf_HTML.jpg)
