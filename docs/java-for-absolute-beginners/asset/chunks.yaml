    \ tag that was introduced in Java 1.5\\. It displays text in code form, using\
    \ a special font and escaping symbols that might break the HTML syntax.(ex: `<\
    \ or >`). The `@link` tag was added in Java 1.2 and inserts a navigable link to\
    \ relevant documentation.\n\nNow, let’s document the method declarations to let\
    \ the developer know what they should be used for.\n\n```\npackage com.apress.bgn.ch9.algs;\n\
    /**\n* Interface {@code IntSorter} is an interface that needs to be implemented\n\
