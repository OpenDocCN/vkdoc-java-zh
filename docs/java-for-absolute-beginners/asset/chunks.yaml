    The approach to decide where our button should be located is similar to Swing,
    with a few differences. The `BorderPane` has 5 regions named: Top, Bottom, Center,
    Left and Right. To place a node in each of those regions a `set*(..)` method for
    each of them has been defined: `setTop(..)`, `setBottom(..)`, `setCenter(..)`,
    `setLeft(..)` and `setRight(..)`. To further customize the position of the node,
    it should be placed in a `HBox` node, another JavaFX element that can be customized
    extensively. As you can see from the code, we are setting the background using
    CSS style elements, we customize the space between nodes in it and borders of
    the containing node by using an instance of class `Insets` and we customize the
    alignment of the contained nodes by calling `box.setAlignment(Pos.BASELINE_RIGHT)`.
    And there are a lot more things that `HBox` supports, so what you can do with
    a box is limited (mostly) only by your imagination.


    So aside from all *making pretty* code in the preceding code sample, this was
    done: the *root* node became parent to a `BorderPane` node, in the bottom region
    of the `BorderPane`, a `HBox` was added, and this `HBox` instance became parent
    for a `Button`. This organization is hierarchic, with the button being the last
    node in the hierarchy.


    Also, we avoided using a layer pane by styling the `HBox` node properly.


    It is time to add the last functionality to our application: the text area and
    a list with selectable elements to add values to the text area. To create a text
    area in JavaFX is simple. The class is named in an clear manner: `TextArea`. We
    can directly add the node in the center region of the `BorderPane` because the
    JavaFX text area is scrollable by default. So there is no need to put it in a
    `ScrollPane`, although the class does exist in the `javafx.scene.control` package
    and is useful to display nodes inside it that make a form that is bigger than
    the window size. The following three lines of code create a node of type `TextArea`,
    declare it to not be editable, and add it to the center region of the `BorderPane`.


    ```

    TextArea textArea = new TextArea();

    textArea.setEditable(false);

    borderPane.setCenter(textArea);

    ```


    Next one is the list. The list is a little more complicated, but also a lot more
    fun to work with, because using JavaFX there is a lot you can do with a list.
    The class that needs to be instantiated to create a list object is named `ComboBox`.
    This class is just one of a bigger family of classes used to create lists, the
    root class being the abstract class `ComboBoxBase`. Depending on the desired behavior
    of the list, if we want support for single or multiple selection, if we want the
    list to be editable or not, the proper implementation should be chosen. In our
    case, the `ComboBox` class matches the requirements: we need a non-editable list,
    which supports single element section. A `ComboBox` has a `valueProperty()` method
    that returns the current user input. The user input can be based on a selection
    from a drop-down list or the input manually provided by the user when the list
    is editable. Let’s see the code to add a list to the top section of the `BorderPane`
    and add a listener to record the selected value in the `TextArea` that we previously
    declared.


    ```

    private static String[] data = {"John Mayer", "Frank Sinatra",

    "Seth MacFarlane", "Nina Simone", "BB King", "Peggy Lee"};

    ...

    ComboBox comboBox = new ComboBox();

    comboBox.getItems().addAll(data);

    borderPane.setTop(comboBox);

    comboBox.valueProperty().addListener(

    new ChangeListener() {

    @Override

    public void changed(ObservableValue observable,

    String oldValue, String newValue) {

    textArea.appendText(newValue + "\n");

    }

    });

    ```


    The `ComboBox` `value` field (accessed by calling `comboBox.valueProperty()`)
    is an `ObservableValue<T>` instance. The listener is an instance of type `ChangeListener<String>`
    is added to this instance by calling the `addListener(..)` method. Anytime the
    `comboBox` value field changes, the `changed(..)` method of the listener is called.
    The `changed(..)` method receives as argument the previous list selected value
    as well as the currently selected value, because who knows, maybe we have some
    logic that requires both.


    In AWT and Swing, there was not much that you could do with a list visually. You
    had the look and feel and that was that. JavaFX supports more visual customization
    for nodes because it even supports CSS. That is why in the next section we’ll
    make our `ComboBox` list interesting. In JavaFX each entry in a list is a cell
    that can be drawn differently. To do that, we have to add a `CellFactory` to this
    class, which creates an instance of `ListCell` for each item in a list. If a `CellFactory`
    is not specified the cells is created with the default style. Let’s see the code
    first and explain more after.


    ```

    comboBox.setCellFactory(

    new Callback() {

    @Override

    public ListCell call(ListView param) {

    return new ListCell() {

    {

    super.setPrefWidth(200);

    }

    @Override

    public void updateItem(String item, boolean empty) {

    super.updateItem(item, empty);

    if (item != null) {

    setText(item);

    if (item.contains("John") || item.contains("BB")) {

    setTextFill(Color.RED);

    } else if (item.contains("Frank") || item.contains("Peggy")) {

    setTextFill(Color.GREEN);

    } else if (item.contains("Seth")) {

    setTextFill(Color.BLUE);

    } else {

    setTextFill(Color.BLACK);

    }

    } else {

    setText(null);

    }

    }

    };

    }

    });

    ```


    The `javafx.util.Callback` interface is a practical interface that can be used
    to declare a subsequent action for a certain action, if a callback is needed.
    In this case the subsequent action is doing the following: after a `String` value
    is added to the `ListView` of the `ComboBox` node (`ListView` is the visual, the
    interface type of a `ComboBox` that displays a horizontal or vertical list of
    items), a cell is being created and some piece of logic was inserted there to
    decide the color of the text depicted in the cell based on its value.


    Inside the `ListCell` declaration there is a block of code that seems out of place.


    ```

    {

    super.setPrefWidth(200);

    }

    ```

