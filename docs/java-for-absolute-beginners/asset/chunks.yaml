    ### 并发特定类型


    一个 Java 程序可以拥有多个执行线程。默认情况下，当 Java 程序执行时，会为从 `main` 方法调用的代码创建一个线程，同时还会为 JVM 相关任务创建并并行执行一些其他实用线程。这些线程可以轻松地通过
    `java.lang.Thread` 类中定义的静态实用方法进行访问。以下代码示例正是如此：提取对 `Thread` 实例的引用，并在控制台中打印它们的名称。


    ```

    package com.apress.bgn.ch5;

    public class ListJvmThreads {

    public static void main(String... args) {

    var threadSet = Thread.getAllStackTraces().keySet();

    var threadArray = threadSet.toArray(new Thread[threadSet.size()]);

    for (int i = 0; i < threadArray.length; ++i) {

    System.out.println("thread name: " + threadArray[i].getName());

    }

    }

    }

    ```


    在 JDK 11 中运行上述代码产生的输出如下。


    ```

    thread name: Reference Handler

    thread name: Monitor Ctrl-Break

    thread name: Finalizer

    thread name: main

    thread name: Signal Dispatcher

    thread name: Common-Cleaner

    ```


    名为 `main` 的线程是执行开发者编写代码的线程。开发者可以编写代码，从主线程启动自己的线程。创建自定义线程最简单的方法是创建一个继承 `Thread`
    类的类。`Thread` 类实现了一个名为 `Runnable` 的接口，该接口声明了一个名为 `run()` 的单一方法。`Thread` 类声明了一个名为
    `start()` 的方法。当调用此方法时，`run()` 方法的主体将在另一个执行线程中执行。^(⁶⁰) 因此，在继承 `Thread` 类时，必须重写
    `run()` 方法。


    以下示例展示了一个名为 `CounterThread` 的类。`run()` 方法的内容旨在通过调用 `Thread.sleep(..)` 实用方法，不时地暂停执行。方法主体被包裹在两行代码中，这两行代码分别打印线程名称及开始消息，以及线程名称及结束消息。这对于减慢此类线程的执行速度是必要的，以便我们能清晰地看到它们是并行执行的。


    ```

    package com.apress.bgn.ch5;

    public class CounterThread extends Thread {

    @Override

    public void run() {

    System.out.println(this.getName() + " started...");

    for (int i = 0; i < 10; ++i) {

    try {

    Thread.sleep(i * 10);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    System.out.println(this.getName() + " ended.");

    }

    }

    ```


    测试我们的线程类很简单，只需实例化它几次并调用 `start()` 方法即可。


    ```

    package com.apress.bgn.ch5;

    public class ThreadDemo {

    public static void main(String... args) {

    for (int i = 0; i < 10; ++i) {

    new CounterThread().start();

    }

    }

    }

    ```


    在示例中，创建了 `CounterThread` 类的十个实例，并对每个实例调用了 `start()` 方法。执行上述代码时，控制台应打印出类似如下的日志。


    ```

    Thread-0 started...

    Thread-3 started...

    Thread-8 started...

    Thread-9 started...

    Thread-7 started...

    Thread-6 started...

    Thread-1 started...

    Thread-2 started...

    Thread-4 started...

    Thread-5 started...

    Thread-4 ended.

    Thread-1 ended.

    Thread-9 ended.

    Thread-7 ended.

    Thread-5 ended.

    Thread-8 ended.

    Thread-0 ended.

    Thread-6 ended.

    Thread-2 ended.

    Thread-3 ended.

    ```


    另一种创建线程的方式是创建一个实现 `Runnable` 接口的类。当我们想对 `run` 方法中的执行进行更多自定义，或者可能需要继承另一个类时，这很有用。或者，考虑到
    `Runnable` 只声明了一个方法，也可以使用 lambda 表达式。让我们声明一个等效的 `Runnable` 实现。


    ```

    package com.apress.bgn.ch5;

    import  static  java.lang.Thread.*;

    public class CounterRunnable implements Runnable {

    @Override

    public void run() {

    System.out.println(Thread.currentThread().getName() + " started...");

    for (int i = 0; i < 10; ++i) {

    try {

    Thread.sleep(i * 10);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    System.out.println(Thread.currentThread().getName() + " ended.");

    }

    }

    ```


    由于我们不再能直接访问线程的名称，为了打印它，我们必须使用另一个实用方法 `Thread.currentThread()` 来获取对当前正在执行的线程的引用。`Thread`
    类提供了一个参数类型为 `Runnable` 的构造器，这意味着它可以接受任何实现了 `Runnable` 的类型的参数。因此，要使用 `CounterRunnable`
    创建线程，可以编写类似以下示例的代码。


    ```

    package com.apress.bgn.ch5;

    public class LambdaRunnableDemo {

    public static void main(String... args) {

    for (int i = 0; i < 10; ++i) {

    new Thread(new CounterRunnable()).start();

    }

    }

    }

    ```


    如果运行这段代码，我们会得到类似的输出。


    这是使用 lambda 表达式的一个好场景，因为 `Runnable` 可以当场实现。因此，前面的代码也可以写成如下形式。


    ```

    for (int i = 0; i  {

    System.out.println(currentThread().getName() + " started...");

    for (int j = 0; j < 10; ++j) {

    try {

    sleep(j * 10);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    System.out.println(currentThread().getName() + " ended.");

    }).start();

    }

    ```


    Java 提供了可以创建和管理线程的线程管理类，因此开发者不必显式声明线程。并发框架对于本书来说是一个过于高级的主题，但如果本节内容引起了你的好奇心，Oracle
    的并发教程位于 [`https://docs.oracle.com/javase/tutorial/essential/concurrency/index.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/index.html)
    。


    ## 总结


    在本章中，你学习了 JVM 如何管理 Java 程序的内存，以及最常用的 Java 数据类型的基础知识。我们讨论了以下内容。


    *   在 Java 程序执行期间内存是如何管理的

    *   原始类型和引用类型之间的区别

    *   Java 中定义了多少种原始类型

    *   String 类型为何特殊

    *   如何处理日历日期

    *   如何声明和使用数组

    *   如何使用 null

    *   如何声明和使用集合实现


    如果本章中的某些示例看起来很复杂，请不要气馁。如果不提供你可以执行、测试甚至自行修改的工作代码，就很难解释某些概念。不幸的是，这需要使用后续章节中介绍的概念（例如，`for`
    和 `if` 语句）。请记下每个现在不清楚的概念及其页码，并在你稍后阅读本书中关于该概念的更详细内容后，再回到本章。


