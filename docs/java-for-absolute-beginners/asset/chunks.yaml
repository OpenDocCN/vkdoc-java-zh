  raw: 'The `@deprecated` tag adds text explaining the reasons for deprecation, the
    version, and what to use instead. Javadoc generation tools take this text format
    it with italic and add it to the main description of the method.


    And with this we have covered the most used tags when writing Javadoc comments.
    If you want to check out the complete list, you can find it at [`https://docs.oracle.com/javase/7/docs/technotes/tools/windows/javadoc.html#javadoctags`](https://docs.oracle.com/javase/7/docs/technotes/tools/windows/javadoc.html%2523javadoctags)
    . Javadoc documentation is a wide subject that could provide material for an entire
    book. We are just scratching the surface in this section and covering the basics
    so you have a good start.


    To generate the HTML site for the `logging-jul` module, the easiest way to do
    it, is to open the Gradle project view, expand the **chapter09:logging-jul ➤ Tasks
    ➤ Documentation** node and under it we find the `javadoc` task, as depicted in
    Figure [9-17](#463938_1_En_9_Chapter.xhtml#Fig17). To execute the task, we have
    to double-click it.


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig17_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig17_HTML.jpg)


    Figure 9-17


    The Gradle javadoc task


    ```

    00:22:17: Executing task ''javadoc''...

    > Task :chapter09:logging-jul:compileJava

    /Users/iulianacosmina/apress/workspace/java-bgn/chapter09/logging-jul/

    src/main/java/com/apress/bgn/ch9/algs/InsertionSort.java:59:

    warning: [removal] sort(int[]) in IntSorter has been deprecated and marked for
    removal

    public void sort(int[] arr) {

    ^

    /Users/iulianacosmina/apress/workspace/java-bgn/chapter09/logging-jul/

    src/main/java/com/apress/bgn/ch9/algs/HeapSort.java:55:

    warning: [removal] sort(int[]) in IntSorter has been deprecated and marked for
    removal

    public void sort(int[] arr) {

    ^

    2 warnings

    > Task :chapter09:logging-jul:processResources

    > Task :chapter09:logging-jul:classes

    > Task :chapter09:logging-jul:javadoc

    BUILD SUCCESSFUL in 2s

    3 actionable tasks: 3 executed

    00:22:19: Task execution finished ''javadoc''.

    ```


    The `javadoc` task identifies the deprecated elements and prints a warning for
    the developer to see. After the successful execution of that task, `build` directory
    can be found under the `logging-jul` directory. That is where all Gradle tasks
    ran from IntelliJ IDEA store their results. In this directory there should be
    a **docs ➤ javadoc** directory hierarchy. And if we expand the **javadoc** hierarchy
    we should see all the files making up the Javadoc site of our module. The output
    to look forward to is depicted in Figure [9-18](#463938_1_En_9_Chapter.xhtml#Fig18).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig18_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig18_HTML.jpg)


    Figure 9-18


    Javadoc site generated by execution of the Gradle javadoc task


    Any site has a starting page and the default one is `index.html`. Right-click
    that file, and from the context sensitive menu that appears, select **Open in
    Browser** and select your preferred browser. If you think the page resembles the
    JDK official Javadoc page, you are not imagining it; the same Doclet API was used
    to generate that official one. For a detailed view of all the documentation in
    the module(project), click the **FRAMES** link. This redirects to a page that
    on the left; it has two frames: one with the packages of the project and one with
    the classes/interfaces/enums and the frame on the right, which displays information
    about every item clicked in frames on the left. You should be seeing something
    similar to the page depicted in Figure [9-19](#463938_1_En_9_Chapter.xhtml#Fig19).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig19_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig19_HTML.jpg)


    Figure 9-19


    Javadoc site generated by execution of the Gradle javadoc task, opened in the
    browser


    Javadoc documentation is picked up by IntelliJ IDEA and other smart editors, and
    depicted on the spot when the developer uses the documented components in the
    code. When selecting a class, method name, interface method, and so forth, most
    smart editors provide some kind of combination of keys that include F1, which
    the developer must press so that the documentation is depicted in a pop-up window.
    In IntelliJ IDEA, click an element and press F1, and the Javadoc documentation
    is shown in a pop-up window and formatted nicely, as depicted in Figure [9-20](#463938_1_En_9_Chapter.xhtml#Fig20).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig20_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig20_HTML.jpg)


    Figure 9-20


    Javadoc information depicted in IntelliJ IDEA


    You can view Javadoc information in a smart editor for any dependency of your
    project (including JDK classes) as long as the code is open source and the module
    exports the appropriate packages.


    In Java 9, the Doclet API for generating Javadoc received an upgrade and a facelift.
    Before Java 9, developers complained about the performance issues of the old version,
    the cryptic API, the lack of support and the shallowness of it over all. In Java
    9, most of the problems were resolved. A detailed description of improvements
    is at [`http://openjdk.java.net/jeps/221`](http://openjdk.java.net/jeps/221) .


    Documentation is really valuable and can make development practical and pleasant
    when it is really, really good. So, when writing code, document it as you expect
    the dependencies of your project to be.


    You might probably have heard of the expression **RTFM** , which is an abbreviation
    for **Read The F***ing Manual!**. That expression is used a lot in software by
    experienced developers when working with newbie developers. Problem is, what should
    you do when there is no manual? Most companies on a deadline might have the tendency
    to allocate little or no time to documenting a project. So, this section was added
    to this book to emphasize the importance of documentation in software development,
    and teaching you how to write your documentation while you write your code, because
    you might not have time to do it afterwards.


    ## Summary


    This chapter covered important development tools and techniques, the classes in
    JDK that provide support for them, and important Java libraries that could make
    your development job more practical and pleasant. The following is the complete
    list of topics.


    *   how to configure and use logging in a Java application


    *   how to log messages in the console


    *   how to log messages to a file


    *   how to use Java logging


    *   what a logging facade is and why it is recommended


    *   configuring and using SLF4J with Logback


    *   how to program using assertions


    *   how to debug using IntelliJ IDEA


    *   how to monitor and inspect JVM statistics while an application is running
    using various JDK tools: `jps`, `jcmd`, `jconsole`, and `jmc`


    *   how to use the Process API


    *   how to test an application using JUnit


    *   how to write tests using fakes


    *   how to write tests using mocks


    *   how to write tests using stubs


    *   how to document a Java application and generate documentation in HTML format


