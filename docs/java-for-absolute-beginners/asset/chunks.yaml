    11. 处理文件


    软件最重要的功能之一是信息的组织和存储，目的是使用和共享信息。在计算机发明之前，信息写在纸上，存放在有组织的文件柜中，可以手动检索。在计算机上运行的软件应用程序也做着类似的事情。信息写入文件，文件组织在目录中，甚至组织在更复杂的名为数据库的结构中。Java
    提供了从文件和数据库中读取信息的类，以及写入文件和将信息写入数据库的类。在**第 9 章**中，介绍了一个使用 Derby 内存数据库的简单示例，向你展示如何模拟像数据库这样重量级的依赖项，以实现更快的单元测试。本章的重点不是使用
    Java 执行数据库操作，而是如何使用 Java 操作文件。


    文件处理器

    在向你展示如何读取或写入文件之前，我需要向你展示如何从代码中访问它们，检查它们是否存在，检查它们的大小并列出它们的属性，等等。不再赘述——让我们开始吧！

    在 Java 中处理文件时，最重要的类是 `java.io.File` 类。这个类是文件和目录路径名的抽象表示。此类的实例被称为 *文件处理器*，因为它们允许开发人员使用这种类型的引用（而不是完整的路径名）在
    Java 代码中处理文件和目录。可以使用不同的参数创建 `File` 实例。


    最简单的方法是使用接收一个包含绝对文件路径名的 `String` 值作为参数的构造函数。在下面的代码示例中，`printStats(..)` 方法打印文件信息。我们在本节中会大量使用它，但不会再次展示代码。


    ```

    package com.apress.bgn.ch11;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    public class Demo {

    private static final Logger log = LoggerFactory.getLogger(Demo.class);

    public static void main(String... args) {

    File file = new File("/Users/iulianacosmina/apress/vultures.txt");

    printFileStats(file);

    }

    private static void printFileStats(File f) { if (f.exists()) {

    log.info("File Details:");

    log.info("Type : {}", f.isFile() ? "file" : "directory or symlink");

    log.info("Location :{}", f.getAbsolutePath());

    log.info("Parent :{}", f.getParent());

    log.info("Name : {}", f.getName());

    double kilobytes = f.length() / 1024; log.info("Size : {} ", kilobytes);

    log.info("Is Hidden : {}", f.isHidden());

    log.info("Is Readable? : {}", f.canRead());

    log.info("Is Writable? : {}", f.canWrite());

    }

    }

    }

    ```


    在上面的代码片段中，文件处理器实例是通过提供我电脑上的绝对文件路径名创建的。如果你想在自己的电脑上运行代码，必须提供一个指向你电脑上某个文件的路径名。如果你使用的是
    Windows，请记住路径名包含 `"\"` 字符，该字符在 Java 中是一个特殊字符，必须通过双写来转义。


    `printStats(..)` 方法使用了大量可以在文件处理器上调用的方法。你可以调用的完整方法列表更大。该列表位于官方 API 文档 [`https://docs.oracle.com/javase/10/docs/api/java/io/File.html`](https://docs.oracle.com/javase/10/docs/api/java/io/File.html)
    中。所有文件处理器方法都在以下链接中解释：[`https://docs.oracle.com/javase/10/docs/api/java/io/File.html`](https://docs.oracle.com/javase/10/docs/api/java/io/File.html)。

    '
- fmt: '`isFile()` 返回 `true` 如果路径名指向一个文件，返回 `false` 如果路径名指向一个目录或符号链接（一种特殊类型的文件，用于链接到另一个文件，当你想缩短文件的路径名时非常有用，并且在路径名长度限制为
    256 个字符的 Windows 上非常有用）。在前面的代码示例中，该方法返回 `true`，日志打印：


    ```

    [main] INFO com.apress.bgn.ch11.Demo - Type : file

    ```


    如果我们想查看该方法是否适用于目录，我们从路径名中删除文件名。


    ```

    File file = new File("/Users/iulianacosmina/apress");

    ```


    然后日志打印：


    `getAbsolutePath()` 返回文件或目录的绝对路径名。创建文件处理器时，并不总是需要绝对路径名，但如果你以后需要使用它，或者想确保相对路径被正确解析，这个方法正是你所需要的。以下代码片段通过使用相对于根项目目录（在我们的例子中是
    `java-for-absolute-beginners` 目录）的路径，在 `resources` 目录中创建了一个文件的处理器。


    ```

    [main] INFO com.apress.bgn.ch11.Demo - Type : directory or symlink

    ```


    ```

    File d = new File("chapter11/read-write-file/src/main/resources/input/");

    ```


    现在 `getAbsolutePath()` 方法打印完整的路径名。


    ```

    [main] INFO com.apress.bgn.ch11.Demo - Location :/Users/iulianacosmina/

    java-for-absolute-beginners/chapter11/read-write-file/src/main/resources/input/vultures.txt

    ```


    Java 的 `File` 类非常强大；它也可以用来指向另一台计算机上的共享文件。有一个特殊的构造函数用于此目的，它接收一个 `java.net.URI`
    类型的参数，其中 `URI` 代表*统一资源标识符*。要测试这个构造函数，请在你的计算机上选择一个文件，并在浏览器中打开它，这样你就可以从浏览器地址栏获取它的
    `URI`。


    ```

    try {

    URI uri = new URI("file:///Users/iulianacosmina/java-for-absolute-beginners/chapter11/"

    + "read-write-file/src/main/resources/input/vultures.txt"); f = new File(uri);

    printFileStats(f);

    } catch (URISyntaxException use) {

    log.error("Malformed URI, no file there", use);

    }

    ```


    因为 `URI` 可能有错误的前缀或没有精确指向文件，`URI` 构造函数被声明为抛出 `java.net.URISyntaxException`，这就是为什么在代码中你也必须处理这个异常。如果使用
    `URI` 创建文件处理器，`getAbsolutePath()` 方法会返回文件在计算机和驱动器上的绝对路径名。


    `getParent()` 返回包含该文件的目录的绝对路径，因为在层次结构上，文件不能有另一个文件作为父级。


    `getName()` 返回文件名。文件名包含*扩展名*，即 `"."` 之后的后缀，它表示文件的类型以及预期用途。


    `length()` 返回文件的字节长度。此方法不适用于目录，因为目录可能包含对执行程序的用户受限的文件，并且可能会抛出异常。因此，如果你需要目录的大小，你必须自己编写代码。


    `isHidden()` 如果文件对当前用户不可见，则返回 `true`；否则返回 `false`。在 macOS/Linux 系统上，以 `"."` 开头的文件是隐藏的，所以如果我们想看到该方法返回
    `true`，我们必须创建一个指向系统配置文件（例如 `.bash_profile`）的处理器。因此，在使用指向隐藏文件的路径名创建的文件处理器上调用 `printStats(..)`
    会产生类似于以下的输出：


    `canRead()` 和 `canWrite()` 可以保护普通用户对文件的访问。当用户对文件具有特定权限时，这两个方法都返回 `true`，否则返回 `false`。


    ```

    [main] INFO com.apress.bgn.ch11.Demo - File Details: [main] INFO com.apress.bgn.ch11.Demo
    - Type : file

    [main] INFO com.apress.bgn.ch11.Demo - Location :/Users/iulianacosmina/.viminfo
    [main] INFO com.apress.bgn.ch11.Demo - Parent :/Users/iulianacosmina

    [main] INFO com.apress.bgn.ch11.Demo - Name : .viminfo [main] INFO com.apress.bgn.ch11.Demo
    - Size : 13.0 [main] INFO com.apress.bgn.ch11.Demo - Is Hidden : true

    [main] INFO com.apress.bgn.ch11.Demo - Is Readable? : true [main] INFO com.apress.bgn.ch11.Demo
    - Is Writable? : true

    ```


    可以为指向目录的路径名创建文件处理器，这意味着有一些可用的方法仅特定于目录。对目录最常做的事情是列出其内容。`list()` 方法返回一个 `String`
    数组，包含此目录下的文件（和目录）的名称。我们可以使用 lambda 表达式来打印数组中的条目。


    ```

    Arrays.stream(d.list()).forEach(ff -> log.info("\t File Name : {}", ff));

    ```


    但在大多数情况下，文件名并不是很有用，拥有一个包含每个文件处理器的 `File` 数组会更好。这就是为什么在 1.2 版本中添加了 `listFiles()`
    方法。


    ```

    Arrays.stream(d.listFiles()).forEach(ff ->

    log.info("\t File Name : {}", ff.getName()));

    ```


    并且这个方法有不止一种形式，因为当使用 `FileFilter` 实例调用时，它会过滤文件并仅返回符合特定要求的文件的处理器。


    ```

    Arrays.stream(d.listFiles(new FileFilter() {    @Override

    public boolean accept(File pathname) {

    return pathname.getAbsolutePath().endsWith("yml")

    || pathname.getAbsolutePath().endsWith("properties");

    }

    })).forEach(ff -> log.info("\t YML/Properties file : {}", ff.getName()));

    ```


    前面的代码示例以展开形式编写，以明确你应该为 `accept(..)` 方法提供具体的实现。使用 lambda 表达式，代码可以简化，并且更不容易抛出异常。


    ```

    Arrays.stream(Objects.requireNonNull(

    d.listFiles(pathname -> pathname.getAbsolutePath()

    .endsWith("yml") || pathname.getAbsolutePath().endsWith("properties"))))

    .forEach(ff -> log.info("\t YML/Properties file : {}", ff.getName()));

    ```


    在前面的示例中，我们实现了 `accept(..)` 来按扩展名过滤，但过滤器实际上可以涉及任何内容。但是，当你需要的过滤器严格涉及文件名时，你可以通过使用该方法的另一个版本来减少样板代码，该版本接收一个
    `FilenameFilter` 实例作为参数。


    ```

    Arrays.stream(d.listFiles(new FilenameFilter() {

    @Override

    public boolean accept(File dir, String name) {

    return name.contains("son");

    }

    })).forEach(ff -> log.info("\t Namesakes : {}", ff.getName()));

    ```


    除了列出文件的属性外，文件处理器还可以用于创建文件。要创建文件，必须在创建具有特定路径名的文件处理器后调用 `createNewFile()` 方法。


    ```

    File created = new File(

