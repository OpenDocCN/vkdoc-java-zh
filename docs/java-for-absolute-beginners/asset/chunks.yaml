- fmt: 'This doesn’t mean that the GC immediately start cleaning up the memory; it
    is more like a suggestion to the JVM that it should make an effort to recycle
    unused objects and reclaim unused memory, because it is needed.


    Now, back to the `finalize()` method. It was marked as deprecated in Java 9. This
    method is meant to be overridden by classes that handle resources that are stored
    outside of the heap. The example is the I/O handling classes used to read resources
    as files or URLs and databases. The `finalize()` would be called by the JVM when
    an object can no longer be accessed by any alive thread of the running application
    to make sure that those resources were released and available for other external
    and unrelated programs to use.


    In older versions of Apache Tomcat (a Java based web server), there was a bug
    on Windows related to release of resources. When the server crashed or stopped,
    it couldn’t be restarted because some of its log files were not released properly,
    and the new server instance could not get access to them to start writing the
    new log entries.


    With the introduction of the `java.lang.AutoCloseable` interface in JDK 1.7, the
    `finalize()` method became less and less used. Also, another problem with this
    method is that the JVM cannot guarantee which thread call this method for any
    given object. So any thread that has access to it can call it, and we might end
    up with resources being released while the object is still needed. Also, what
    happens if the custom implementation is not correct, throws exceptions or does
    not releases resources properly? The `finalize()` method should be called only
    once by the JVM, but this cannot be guaranteed. Another downside is that `finalize()`
    calls are not automatically chained, so an implementation of a `finalize()` method
    must always explicitly call the `finalize()` method of the superclass. And another
    one for you: once `finalize()` was called, there is no way to stop the method
    from executing or undo its effect, so you are basically left with a reference
    to an object that no longer has access to its resources. As you probably figured
    out by now, there is a lot of freedom given to the developer when it comes to
    implementing this method, and this means there is a lot of room for errors to
    happen.


    This is why the finalization mechanism in Java is flawed and was deprecated in
    JDK 9 to discourage its use. Improper `finalize()` implementations could lead
    to: memory leaks (memory contents are not discarded), deadlocks (resource is blocked
    by two processes) and hangs (process is in a waiting state it cannot go out of).
    But, in order to help with memory management the `java.lang.ref.Cleaner` class
    was introduced. But before getting into that, I must show you how to check out
    the status of your memory programmatically.


    ## Heap Memory Statistics


    The `Runtime` class is useful when trying to interact with the internals of the
    JVM while a program is running. Its `gc()` method can be called to suggest to
    the JVM that the memory should be cleaned. A few chapters ago we used methods
    in this class to start processes from the Java code. There are three methods in
    this class that are useful to see the status of the memory assigned to a Java
    program.


    - `runtime.maxMemory()` returns the maximum amount of memory the JVM attempts
    to use for its heap, if needed. The value returned by this method varies from
    machine to machine and is being set implicitly to a quarter of the total existing
    RAM memory on the machine, unless it is set explicitly by using the JVM option
    `-Xmx` followed by the amount of memory, (e.g., `-Xmx8G` allows the JVM to use
    a maximum of 8 GB of memory).

    - `runtime.totalMemory()` returns the total amount of memory of the JVM. The value
    returned by this method varies from machine to machine too and is implementation-dependent,
    unless explicitly set by using the JVM option `-Xms` followed by the amount of
    memory (e.g., `-Xms1G` tells the JVM that the initial size of its heap memory
    should be 1 GB of memory).

    - `runtime.freeMemory()` returns an approximation of the amount of free memory
    for the Java virtual machine.


    Using the `runtime.totalMemory()` and the `runtime.freeMemory()` methods, we can
    write some code to check how much of our memory is occupied at various times during
    the execution of the program. For this we create a class named `MemAudit` that
    uses the current logger to print memory values.


    ```

    package com.apress.bgn.ch13.util;

    import org.slf4j.Logger;

    public class MemAudit {

    private static final long MEGABYTE = 1024L * 1024L;

    private static final Runtime runtime = Runtime.getRuntime();

    public static void printBusyMemory(Logger log) {

    long memory = runtime.totalMemory() - runtime.freeMemory();

    log.info("Occupied memory: {} MB", (memory / MEGABYTE));

    }

    public static void printTotalMemory(Logger log) {

    log.info("Total Program memory: {} MB", (runtime.totalMemory()/MEGABYTE));

    log.info("Max Program memory: {} MB", (runtime.maxMemory()/MEGABYTE));

    }

    }

    ```


    And the methods in this class are called during the execution of our program as
    it follows.


    ```

    package com.apress.bgn.ch13;

    import com.apress.bgn.ch13.util.NameGenerator;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.time.LocalDate;

    import java.util.Random;

    import static com.apress.bgn.ch13.util.MemAudit.printTotalMemory;

    import static com.apress.bgn.ch13.util.MemAudit.printBusyMemory;

    public class Main {

    private static final Logger log = LoggerFactory.getLogger(Main.class);

    private static NameGenerator nameGenerator = new NameGenerator();

    private static final Random random = new Random();

    public static void main(String... args) {

    printTotalMemory(log);

    int count =0;

    while (true) {

    genSinger();

    count++;

    if (count % 1000 == 0) {

    printBusyMemory(log);

    }

    }

    }

    private static void genSinger() {

    Singer s = new Singer(nameGenerator.genName(),

    random.nextDouble(), LocalDate.now());

    log.info("JVM created: {}", s.getName());

    }

    }

    ```


    Now, after we delete the old log file, we should run it again, and leave it for
    a little while. And because it is impossible again to see the output, we’ll use
    the `grep` method to extract all lines containing the `memory` word, and the result
    should look quite similar to the next listing.


    ```

    $ grep -a ''memory'' gc.log

    INFO  c.a.b.c.Main - Total Program memory: 256 MB

    INFO  c.a.b.c.Main - Max Program memory: 4096 MB

    INFO  c.a.b.c.Main - Occupied memory: 5 MB

    INFO  c.a.b.c.Main - Occupied memory: 3 MB

    INFO  c.a.b.c.Main - Occupied memory: 4 MB

    INFO  c.a.b.c.Main - Occupied memory: 5 MB

    INFO  c.a.b.c.Main - Occupied memory: 5 MB

    INFO  c.a.b.c.Main - Occupied memory: 4 MB

    INFO  c.a.b.c.Main - Occupied memory: 4 MB

    INFO  c.a.b.c.Main - Occupied memory: 7 MB

    INFO  c.a.b.c.Main - Occupied memory: 8 MB

    INFO  c.a.b.c.Main - Occupied memory: 8 MB

    INFO  c.a.b.c.Main - Occupied memory: 9 MB

    INFO  c.a.b.c.Main - Occupied memory: 7 MB

    INFO  c.a.b.c.Main - Occupied memory: 3 MB

    INFO  c.a.b.c.Main - Occupied memory: 15 MB

    INFO  c.a.b.c.Main - Occupied memory: 7 MB

    ...

    ```


    The max memory is 4096MB, which means my machine has a total of 16 GB of RAM,
    and the occupied memory is very little, not even close to the initial 256MB the
    JVM is given to use. If we want to see real memory being occupied we can modify
    the `genSinger()` method to return the created references and add them to a list.'
