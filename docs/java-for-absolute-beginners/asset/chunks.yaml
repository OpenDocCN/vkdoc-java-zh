    #### `jconsole`


    `jconsole`是一个JDK工具，可用于检查各种JVM统计信息。要使用它，你需要从命令行启动它，并将其连接到一个已经运行的Java应用程序。这个工具非常有用，因为它还可以连接到在不同机器上运行的应用程序，只要这些应用程序在服务器上以调试模式运行并暴露一个端口用于连接。要以调试模式启动Java应用程序并暴露一个端口供外部应用程序连接，你需要使用以下VM参数启动应用程序。


    ```

    -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=1044

    ```


    只要端口号大于1024（因为这些端口受操作系统限制），任何端口都可以使用。`transport=dt_socket`指示JVM调试器连接通过套接字进行，`address=1044`参数告知JVM端口号为1044。`suspend=y`指示JVM在调试器连接之前暂停执行。要避免这种情况，应使用`suspend=n`。


    对于我们的简单示例，考虑到我们使用`jconsole`在同一台机器上调试Java应用程序，我们不需要所有这些设置。我们需要从命令行启动`jconsole`，然后在**本地进程：**部分查找并识别我们感兴趣的Java进程。图9-8显示了JConsole的第一个对话框窗口。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig8_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig8_HTML.jpg)


    图9-8


    JConsole第一个对话框窗口


    当进程在本地运行时，很容易识别，因为它使用模块和完全限定的主类名来命名。当我们使用`jconsole`进行本地调试时，应用程序不必以调试模式运行，但对于像我们这样简单的应用程序，我们需要做一些调整，以确保在应用程序运行期间可以通过`jconsole`看到一些统计信息。我们添加了几个`Thread.sleep(..)`语句，以便暂停执行足够长的时间让`jconsole`连接。此外，我们将使用一个大型数据数组，以确保统计信息具有参考价值。


    ```

    public class SortingSlf4jDemo {

    private static final Logger log =

    LoggerFactory.getLogger(SortingSlf4jDemo.class);

    public static void main(String... args) throws Exception {

    Thread.sleep(3000);

    Random random = new Random(5);

    IntStream intStream = random.ints(100_000_000,0,350);

    int[] arr =  intStream.toArray();

    if (log.isDebugEnabled()) {

    final StringBuilder sb =

    new StringBuilder("Sorting  an array with merge sort: ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    Thread.sleep(3000);

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    ...

    }

    ```


    完成修改后，我们将正常启动应用程序，并将`jconsole`连接到它。成功连接后，会打开一个如图9-9所示的窗口，并显示JVM内存消耗、线程数、已加载类数和CPU使用率的图表。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig9_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig9_HTML.jpg)


    图9-9


    JConsole统计信息窗口


    每个统计信息都有一个选项卡提供更多详细信息，在更复杂的应用程序中，这些信息可用于提高性能、识别潜在问题，甚至评估应用程序在期望场景下的行为。对于我们的小型应用程序，`jconsole`图表并没有揭示太多信息，但如果你真的想看到有价值的统计信息，可以安装一个像`mucommander`这样的应用程序，在不关闭它的情况下使用一段时间，然后连接`jconsole`到它并尽情探索。'
