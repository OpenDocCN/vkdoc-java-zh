- fmt: '### jmc


    JMC is short for **Oracle Java Mission Control**. The `jmc` command starts an
    advanced Oracle application for debugging and analyzing JVM statistics for a running
    application. From its official description: *JMC is a tool suite for managing,
    monitoring, profiling, and troubleshooting your Java applications* that became
    part of the JDK utility tools family starting with version 7.


    Similar to other tools, this utility identifies the Java processes currently running
    and provides the possibility to check out how much memory they require at specific
    times during execution, how many threads are running in parallel at a given moment
    in time, the classes loaded by the JVM, and how much processing power is required
    to run a Java application. The JMC has a friendlier interface and one of its most
    important components is the **Java Flight Recorder** that can be used to record
    all JVM activity while the application is running, all that data collected during
    this time being is then used to diagnose and profile the application.


    To inspect the application while it is running, we open the JMC by running `jmc`
    from the command line, and then select the process that we recognize as the one
    running the `SortingSlf4jDemo` main class based on the same rule as before. We
    look for a process name containing the module name and the fully classified class
    name when we found it. We right-click it and select **Start JMX console**. You
    should see something similar to the image depicted in Figure [9-10](#463938_1_En_9_Chapter.xhtml#Fig10).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig10_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    JMX console


    As you probably noticed, the interface is definitely friendlier and the provided
    statistics are more detailed. Using JMC, everything that happens with the application
    and JVM during a run can be recorded and analyzed later, even if the application
    has stopped running since. The **Memory** tab provides a lot of information regarding
    the memory used by the application, including what types of objects are occupying
    it. The information for the memory occupied by `SortingSlf4jDemo` during its run
    is depicted in Figure [9-11](#463938_1_En_9_Chapter.xhtml#Fig11).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig11_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig11_HTML.jpg)


    Figure 9-11


    JMX console ➤ the Memory tab


    To record this information during the application run, or for a limited period
    of time, in the **JVM Browser** expand the process node and select **Start Flight
    Recording**. A window is opened asking you to select a path where the recording
    is saved and the duration of the recording. The file has a `.jfr` extension and
    can be opened with the JMC for inspection. The flight recorder menu and the dialog
    to start recording data are depicted in Figure [9-12](#463938_1_En_9_Chapter.xhtml#Fig12).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig12_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig12_HTML.jpg)


    Figure 9-12


    JMC Flight Recording menu and dialog window


    The JMC subject is too advanced and broad for this section, an entire book could
    probably be written about its usage and how to interpret the statistics. So, I’ll
    stop here and recommend this Oracle article if you want to dig deeper: [`www.oracle.com/technetwork/java/javaseproducts/mission-control/java-mission-control-1998576.html`](http://www.oracle.com/technetwork/java/javaseproducts/mission-control/java-mission-control-1998576.html).


    ## Accessing the Java Process API


    Java 9 came with a lot of other improvements aside the Jigsaw modules, one of
    them being a new and improved Process API. The Java Process API allows you to
    start, retrieve information, and manage native operating system processes. The
    ability to manipulate processes was in former versions of Java, but it was rudimentary.
    Note how a process was created before Java 5.


    ```

    package com.apress.bgn.ch9;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.BufferedReader;

    import java.io.InputStream;

    import java.io.InputStreamReader;

    import java.io.Reader;

    import java.nio.charset.Charset;

    import java.nio.charset.StandardCharsets;

    public class ProcessCreationDemo {

    private static final Logger log =

    LoggerFactory.getLogger(ProcessCreationDemo.class);

    public static void main(String... args) {

    try {

    Process exec = Runtime.getRuntime()

    .exec(new String[] { "/bin/sh", "-c", "echo Java home:  $JAVA_HOME" });

    exec.waitFor();

    InputStream is = exec.getInputStream();

    StringBuilder textBuilder = new StringBuilder();

    try (Reader reader = new BufferedReader(new InputStreamReader

    (is, Charset.forName(StandardCharsets.UTF_8.name())))) {

    int c = 0;

    while ((c = reader.read()) != -1) {

    textBuilder.append((char) c);

    }

    }

    log.info("Process output -> {}", textBuilder.toString());

    log.info("process result: {}", exec.exitValue());

    } catch (Exception e) {

    e.printStackTrace();

    }

    }

    }

    ```


    Intercepting the output of a process that has started is a pain. We need to wrap
    a `BufferedReader` instance around the `InputStream` instance connected to the
    normal output of the process.


    The process API made things a little more practical. It has at its core a few
    classes and interfaces, all with names that start with the `"Process"` term. What
    we’ve done so far with Java executables, can be directly done by writing Java
    code. The interface that provides an API to access native processes is named `ProcessHandle`
    and is part of the core Java package `java.lang`. In a similar manner to the `Thread`
    class, there is a static method named `current` to call on this interface to retrieve
    the `ProcessHandle` instance of the current running process. Once we have this,
    we can use its methods to access more process information. The `ProcessHandle`
    provides several static utility methods to access native processes. Java code
    can be written to list all processes running on a computer and they can be sorted
    based on certain criteria. The following piece of code lists all the processes
    that were created by running the `java` command.


    ```

    package com.apress.bgn.ch9;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.util.Arrays;

    import java.util.Optional;

    public class ProcessListingDemo {

    private static final Logger log = LoggerFactory.getLogger(ProcessDemo.class);

    public static void main(String... args) {

    Optional currUser = ProcessHandle.current().info().user();

    ProcessHandle.allProcesses()

    .filter(ph -> ph.info().user().equals(currUser)

    && ph.info().commandLine().get().contains("java"))

    .forEach(p ->  log.info("PID: " + p.pid());

    p.info() .arguments()

    .ifPresent(s -> Arrays.stream(s)

    .forEach(a -> log.info("\t {}", a)));

    p.info().command()

    .ifPresent(c -> log.info("\t Command: {}", c));

    });

    }

    }

    ```


    This code extracts the user from the current running process by obtaining its
    handle and calling `info()` to obtain an instance of `ProcessHandle.Info`, an
    interface that provides a set of methods to access snapshot information about
    the process as the command and arguments that were used to create the process.
    The output of the previous code is printed in the console. It should look similar
    to the following listing.'
