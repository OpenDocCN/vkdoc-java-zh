    ```


    To clearly show which image is selected, the resolution of each image has a comment
    next to it. The `BaseMultiResolutionImage` instance is created from an array of
    `Image` instances. When `getResolutionVariant(..)` is called, the arguments are
    compared to the corresponding image properties, and if both are less than equal
    to the values of one of the images, that image is returned. In the next code snippet,
    the code of the `BaseMultiResolutionImage.getResolutionVariant(..)` is depicted.


    ```java

    @Override

    public Image getResolutionVariant(double destImageWidth,

    double destImageHeight) {

    checkSize(destImageWidth, destImageHeight);

    for (Image rvImage : resolutionVariants) {

    if (destImageWidth <= rvImage.getWidth(null)

    && destImageHeight <= rvImage.getHeight(null)) {

    return rvImage;

    }

    }

    return resolutionVariants[resolutionVariants.length - 1];

    }

    ```


    The previous code leads to two conclusions.


    *   Both the desired width and height that are given as arguments must be less
    or equal to the properties of one of the images the multiresolution image was
    created from; otherwise, the default image is returned—the one with the index
    given as argument for the base image index in the `BaseMultiResolutionImage` constructor.
    This means that `getResolutionVariant(700, 250)` returns image `dest25` because
    `700 <= 1008 && 250 <= 277` and (1008 x 277) is the (width x height) of this image.
    The call `getResolutionVariant(700, 300)` leads to image `src` being returned,
    because the previous condition is no longer evaluated to true while iterating
    the list, so the last image in the list is returned, because the method exits
    through `return resolutionVariants[resolutionVariants.length - 1];`


    *   The array the `BaseMultiResolutionImage` instance is created from must be
    sorted in ascending order of the width and height of the images; otherwise, an
    image with the wrong dimensions is returned, because the decision algorithm is
    not that efficient.


    So, if the algorithm is not efficient what can be done? It’s simple: we can create
    our own `MultiResolutionImage` implementation that extends `BaseMultiResolutionImage`
    and overrides the `getResolutionVariant()` method. Since we know that all images
    are resized copies of the same image, this means width and height are proportional.
    So, an algorithm that always returns the variant of the image that is most suitable
    to the desired resolution can be written that does not really care about the order
    of the images in the array, and that it returns the image that fits most. So,
    the implementation might look similar to the following class.


    ```java

    package com.apress.bgn.ch11;

    import java.awt.*;

    import java.awt.image.BaseMultiResolutionImage;

    import java.util.ArrayList;

    import java.util.HashMap;

    import java.util.Map;

    public class SmartMultiResolutionImage

    extends BaseMultiResolutionImage {

    public SmartMultiResolutionImage(int baseImageIndex,

    Image... resolutionVariants) {

    super(baseImageIndex, resolutionVariants);

    }

    @Override

    public Image getResolutionVariant(double destImageWidth,

    double destImageHeight) {

    checkSize(destImageWidth, destImageHeight);

