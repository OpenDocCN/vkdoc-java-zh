- fmt: '当然，只有一次`genSinger()`调用被表示，并且只有一个`Singer`实例。当`main(..)`方法被调用时，会创建对静态实例的引用，这些引用在程序执行结束前都有效。然后，`genSinger()`方法被重复调用。这些方法中的每一个都有自己的栈，用于保存在该方法上下文中创建的对象的引用，在本例中是`Singer`实例。此引用用于打印在该方法主体中创建的`Singer`实例的名称。然后该方法终止，但不返回引用。这意味着创建的实例不再需要，因为它仅在此方法的上下文中使用。当`genSinger()`方法执行结束时，对`Singer`实例的引用从栈中丢弃。`Singer`实例仍然存在于堆内存中，但无法再从程序访问，因此它不再需要。它现在占用一个内存块，其中包含其自身内容、对其他实例的引用，在本例中是一个`String`、一个`Double`和一个`LocalDate`。考虑到`genString()`方法被无限次调用（在图[13-4](#463938_1_En_13_Chapter.xhtml#Fig4)中用`(*n))`表示），会创建更多的`Singer`实例，这些实例会占用内存。在某个时刻，程序将无法创建其他实例，因为没有可用内存。


    这就是垃圾回收器发挥作用的地方。不再被程序引用（因此不可达）的`Singer`实例被视为垃圾。现在你知道这个名字的由来了。这些实例不再需要，内存可以被安全地清理。垃圾回收器是一个与主执行线程并行运行的清理线程。它偶尔会从堆内存中删除未引用的对象。并且由于`finalize()`方法仍然可用，我们为`Singer`类型重写它以打印一条日志消息，以便我们可以看到垃圾回收器何时销毁一个实例，因为在从堆内存中删除对象之前，会调用该对象的`finalize()`方法。以下代码片段描述了`Singer`实例。


    ```

    package com.apress.bgn.ch13;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.*;

    import java.time.LocalDate;

    import java.util.Objects;

    public class Singer implements Serializable {

    private static final Logger log = LoggerFactory.getLogger(Singer.class);

    private final long birthtime;

    private String name;

    private Double rating;

    private LocalDate birthDate;

    public Singer(String name, Double rating, LocalDate birthDate) {

    this.name = name;

    this.rating = rating;

    this.birthDate = birthDate;

    this.birthtime = System.nanoTime();

    }

    public String getName() {

    return name;

    }

    @Override

    protected void finalize() throws Throwable {

    try {

    long deathtime = System.nanoTime();

    long lifespan =  (deathtime - birthtime) / 1_000_000_000;

    log.info("GC Destroyed: {} after {} seconds",  name, lifespan);

    } finally {

    super.finalize();

    }

    }

    }

    ```


    添加了`birthtime`字段，用于计算从调用实例构造函数到垃圾回收器调用`finalize()`方法之间经过的时间；基本上我们是在计算实例的生命周期。由于时间以纳秒为单位，我们将差值除以10⁹以获得以秒为单位的时间。本节中使用的代码示例给垃圾回收器带来了大量工作，因为每个创建的`Singer`实例在被丢弃之前都很少被使用。如果你运行代码，你会在控制台中看到大量日志消息，首先是大量关于对象被创建的消息，但如果你等待，关于对象被丢弃的消息也会出现。所有输出都定向到一个文件，因为IntelliJ
