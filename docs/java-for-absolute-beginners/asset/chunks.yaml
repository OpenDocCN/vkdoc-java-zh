    But the button was just thrown in the window and put in the center by default
    because no code was written to position it. JavaFX supports arranging nodes^([^(84)](#fn84))
    in a window in a manner similar to Swing, but JavaFX provides layout panes that
    support several different styles of layouts. The equivalent of a `JPane` with
    `BorderLayout` manager in JavaFX is a built-in layout named `BorderPane`. The
    `BorderPane` provides five regions where to place your nodes, with distribution
    similar to `BorderLayout`, but different names. Let’s write the code to place
    our button in the bottom region in the right corner and then discuss more about
    it.


    ```

    ...

    public void start(Stage primaryStage) {

    primaryStage.setTitle("JavaFX Demo Window!");

    Button exitButton = new Button();

    exitButton.setText("Bye bye! ");

    exitButton.setOnAction(event -> Platform.exit());

    BorderPane borderPane = new BorderPane();

    HBox box = new HBox();

    box.setPadding(new Insets(10, 12, 10, 12));

    box.setSpacing(10);

    box.setAlignment(Pos.BASELINE_RIGHT);

    box.setStyle("-fx-background-color: #85929e;");

    box.getChildren().add(exitButton);

    borderPane.setBottom(box);

    StackPane root = new StackPane();

    root.getChildren().add(borderPane);

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    ...

    ```


