- fmt: '*   **G1 (garbage first)**: Introduced in Oracle JDK 7, update 4, was designed
    to permanently replace the CMS GC and is suitable for applications that can operate
    concurrently with CMS collector, need memory compaction, need more predictable
    GC pause durations, and do not require a much larger heap. The G1 collector is
