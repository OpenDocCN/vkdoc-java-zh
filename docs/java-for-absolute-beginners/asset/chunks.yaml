    `Logger.getLogger(..)`. The recommended practice is for the logger to be named
    as the class it is logging messages for. Without any additional configuration,
    every message printed with `log.info(..)` is printed prefixed with the full system
    date, class name, and method name in front of it. Let’s replace all `System.out.print`
