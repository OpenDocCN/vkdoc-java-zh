    ```

    INFO com.apress.bgn.ch11.MediaDemo -  --- 创建多分辨率图像 ---

    INFO com.apress.bgn.ch11.MediaDemo - BufferedImage@3c9d0b9d: type = 5 ColorModel:

    #... ByteInterleavedRaster: width = 4032 height = 1108 #numDataElements 3 dataOff[0]
