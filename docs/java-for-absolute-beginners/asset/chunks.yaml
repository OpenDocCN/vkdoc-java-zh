    ### String 类型


    接下来要介绍的特殊 Java 类型是 `String`。到目前为止，你已经频繁看到它的使用，但尚未得到详细解释。与基本类型 `int` 一样，它是 Java
    中最常用的类型之一。`String` 实例用于建模文本并对其执行各种操作。`String` 类型是一种特殊类型，因为**该类型的对象会得到 JVM 的特殊处理**。如果你还记得第一张包含内存内容的图片，`String`
    对象被分配在堆中一个名为 `String Pool` 的特殊区域。本节将专门讨论它；我们会详细讲解 `String` 类型，你关于此类型的许多疑问应该都能得到解答。


    到目前为止，本书中声明 `String` 变量的方式如下：


    ```

    String name= "John";

    ```


    但 `String` 类有许多构造函数可用于初始化 `String` 变量。以下是一组声明并初始化的 `String` 变量。


    ```

    package com.apress.bgn.ch5.refs;

    public class StringDemo {

    public static void main(String... args) {

    1\.      String  text1 = null;

    2.

    3\.      String text21 = "two";

    4\.      String text22 = "two";

    5\.      String text23 = new String ("two");

    6.

    7\.      String piece1 = "t";

    8\.      String piece2  = "wo";

    9\.      String text24 = piece1 + piece2;

    10.

    11\.     char[] twoCh = {''t'', ''w'', ''o''};

    12\.     String text25 = new String(twoCh);

    }

    }

    ```


    第 3、4、5、9 和 11 行都定义了一个内容为 *two* 的 `String` 对象。我们特意这样做，创建了多个具有相同值的 `String` 对象。在实际应用中，尤其是在当前大数据热潮时期，应用程序处理大量数据，其中大部分是文本形式。因此，能够压缩数据并重复使用，可以减少内存消耗，同时减少内存访问尝试，通过减少处理来提升速度，进而降低成本。


    在继续本节之前，我必须讨论一下 Java 中**对象相等**的含义。Java 中通过引用来处理对象。`==` 运算符比较引用；但如果要比较对象，我们必须使用
    `equals()` 方法。这是一个从 `Object` 类继承的特殊方法。


    在 Java 中，`String` 实例是不可变的，这意味着它们一旦创建就无法更改。这意味着 JVM 可以重用现有值来形成新的字符串值，而无需消耗额外内存。这个过程称为*驻留（interning）*。每个文本值（字面量）的一份副本被保存到一个名为
    `String Pool` 的特殊内存区域。当创建一个新的 `String` 变量并为其赋值时，JVM 首先在池中搜索相等值的字符串。如果找到，则返回该内存地址的引用，无需分配额外内存。如果未找到，则将其添加到池中并返回其引用。


    话虽如此，考虑到前面的示例代码，我们期望 `text21` 和 `text22` 变量指向池中同一个 `String` 对象，这意味着它们的引用也是相等的。让我们来测试一下。


    ```

    package com.apress.bgn.ch5.refs;

    public class StringDemo {

    public static void main(String... args) {

    String text21 = "two";

    String text22 = "two";

    if (text21 == text22) {

    System.out.println("引用相等");

    } else {

    System.out.println("引用不同");

    }

    if (text21.equals(text22)) {

    System.out.println("对象相等");

    } else {

    System.out.println("对象不同");

    }

    }

    }

    ```


    运行上述代码时，控制台会打印以下内容，证明了之前的论断以及 `String pool` 的存在。


    ```

    引用相等

    对象相等

    ```


    图 5-15 展示了代码执行时内存内容的抽象表示。


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig15_HTML.jpg](img/463938_1_En_5_Fig15_HTML.jpg)


    图 5-15


    String Pool 示例


    当使用 new 运算符创建新的 `String` 对象时，JVM 会为新对象分配新内存并将其存储在堆中，因此不会使用 `String pool`。这导致每个以这种方式创建的
    `String` 对象都有自己独立的内存区域和地址。这就是为什么如果我们要比较初始代码示例中的变量 `text22` 和变量 `text23`，我们会预期它们的引用不同，但对象应该相等。让我们来测试一下。


    ```

