- fmt: '# Explicit Type Conversion (`type`) and `instanceof`


    We coupled these two operators in the same section, because it is easier to provide
    code samples that are identical to what you use frequently in your job as a developer
    (should you decide to go in this direction).


    It is better to keep the reference type as generic as possible to allow changing
    of the concrete implementation without breaking the code, but sometimes, we might
    need to group objects together, but execute different code depending of their
    types. Remember the `Performer` hierarchy mentioned in the previous chapter? We’re
    going to make use of these types here to show you how to use these operators.
    In case you do not want to go back to the previous chapter to see the hierarchy,
    here it is again in Figure 6-1, but with a twist: we added an extra class named
    `Graphician`, which implements the `Artist` interface and extends the `Human`
    class.


    ![../images/463938_1_En_6_Chapter/463938_1_En_6_Fig1_HTML.jpg](images/463938_1_En_6_Chapter/463938_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** The `Performer` hierarchy


    In the following code sample, an object of type `Musician` and one of type `Graphician`
    are created and both are added into a list containing references of type `Artist`.
    We can do this because both types implement the interface `Artist`.


    ```

    package com.apress.bgn.ch6;

    import com.apress.bgn.ch4.hierarchy.*;

    import java.util.ArrayList;

    import java.util.List;

    public class OperatorDemo {

    public static void main(String... args) {

    List artists = new ArrayList();

    Musician john = new Performer("John", 40, 1.91f, Gender.MALE);

    List songs = List.of("Gravity");

    john.setSongs(songs);

    artists.add(john);

    Graphician diana = new Graphician("Diana", 23, 1.62f, Gender.FEMALE, "macOs");
    artists.add(diana);

    for (Artist artist : artists) {

    if (artist instanceof Musician) { \\ (*)

    Musician musician = (Musician) artist; \\(**)

    System.out.println("Songs: " + musician.getSongs());

    } else {

    System.out.println("Other Type: " + artist.getClass());

    }

    }

    }

    }

    ```


    The line marked with `(*)` shows how to use the `instanceof` operator. This operator
    tests whether the object is an instance of the specified type (class, subclass
    or interface). It is used in writing conditions to decide which code block should
    be executed.


    The line marked with `(**)` does an explicit conversion of a reference. Since
    the `instanceof` operator helped figure out that the object the reference points
    to is of type `Musician`, we can now convert the reference to the proper type
    so methods of class `Musician` can be called.


    But what happens if an explicit conversion fails? For this we try to convert the
    previously declared `Graphician` reference to `Musician`. So, we’ll add the following
    line.


    ```

    Musician fake = (Musician) diana;

    ```


    The compiler won’t complain, but this does not change the fact that `Graphician`
    has no relation to the `Musician` type, so the code will not run, and a special
    exception is thrown in the console to tell you what went wrong. The error message
    printed in the console is explicit and is depicted in the next log snippet.


    ```

    Exception in thread "main" java.lang.ClassCastException:

    chapter.six/com.apress.bgn.ch6.Graphician cannot be cast to

    chapter.four/com.apress.bgn.ch4.hierarchy.Musician

    at chapter.six/com.apress.bgn.ch6.OperatorDemo.mainOperatorDemo.java:24

    ```


    The message clearly states that the two types are not compatible and the package
    and module names are included.


    But explicit conversion is not limited to reference types, it works for primitives
    too. Any variable of a type with values in a smaller interval can be converted
    to a type of a bigger interval, without explicit conversion. But the reverse is
    possible too by using explicit conversion, but if the value is too big, bits are
    lost and the value is... unexpected. Look at the following examples of conversions
    between `byte` and `int`.


    ```

    [jshell> byte b = 2;

    b ==> 2

    |  created variable b : byte

    [jshell> int i = 10;

    i ==> 10

    |  created variable i : int

    [jshell> i = b

    i ==> 2

    |  assigned to i : int

    [jshell> b = i

    |  Error:

    |  incompatible types: possible lossy conversion from int to byte

    |  b = i

    |      ^

    [jshell> b = (byte) i

    b ==> 2 // all good, because value is in byte interval

    |  assigned to b : byte

    [jshell> i = 300000

    i ==> 300000

    |  assigned to i : int

    [jshell> b = (byte) i

    b ==> -32  // oops! value outside byte interval

    |  assigned to b : byte

    ```


    So, as a general rule, use explicit conversion to widen the scope of a variable,
    not to narrow it, as narrowing it can lead to unexpected results.


    ## Numerical Operators


    This section groups all operators that are mostly used on numerical types. The
    numerical operators you know from math: `+`, `-`, `/`. Comparators are found in
    programming too, but they can be combined to obtain different effects.


    ### Unary Operators


    Unary operators require only one operand, and they affect the variable they are
    applied to.


    #### Incrementors and Decrementors


    In Java (and some other programming languages) there are unary operators called
    *incrementors* (`++`) and *decrementors* (`--`). These operators are placed before
    or after a variable to increase or decrease its value by 1. They are usually used
    in loops as counters to condition the termination of the loop. When they are placed
    before the variable, they are called `prefixed` and when placed after it they
    are called `postfixed`.


    When they are prefixed, the operation is executed on the variable, before the
    variable is used in the next statement. The following code sample tests this affirmation.


    ```

    package com.apress.bgn.ch6;

    public class UnaryOperatorsDemo {

    public static void main(String... args) {

    int i  = 1;

    int j = ++i;

    System.out.println("j is " + j + ", i is " + i);

    }

    }

    ```


    The expected result of the preceding code is that `j=2`, because the value of
    the `i` variable is modified to 2, before it is assigned to `j`. Thus, the expected
    output is `j is 2, i is 2`.


    When they are postfixed, the operation is executed on the variable, after the
    variable is used in the next statement. The following code sample tests this affirmation.


    ```

    package com.apress.bgn.ch6;

    public class UnaryOperatorsDemo {

    public static void main(String... args) {

    i = 1;

    j = i++;

    System.out.println("j is " + j + ", i is " + i);

    }

    }

    ```


    The expected result of the preceding code is that `j=1`, because the value of
    the `i` variable is modified to 2, after it is assigned to `j`. Thus, the expected
    output is `j is 1, i is 2`.


    The decrementor operator can be used in a similar manner, the only effect is that
    the variable is decreased by 1. Try to modify the `UnaryOperatorsDemo` to use
    the `--` operator instead.


    #### Sign Operators


    Mathematical operator `+` is used on a single operand to indicate that a number
    is positive (redundant and mostly never used). So basically,


    ```

    int i = 3;

    ```


    Is the same as


    ```

    int i = +3;

    ```


    Mathematical operator `-` declares negative numbers.


    ```

    [jshell> int i = -3

    i ==> -3

    |  created variable i : int

    ```


    Or it negates an expression.


    ```

    [jshell> int i = -3

    i ==> -3

    |  created variable i : int

    [jshell> int j = - ( i + 4 )

    j ==> -1

    |  created variable j : int

    ```


    As you can see in the example, the result of `( i + 4 )` is 1, because `i = -3`,
    but because of the `-` in front of the parentheses, the final result that is assigned
    to the `j` variable is `-1`.


    #### Negation Operator


    There are two more unary operators, and their role is to negate variables. Operator
    `!` applies to boolean variables, and it is used to negate them. So, `true` becomes
    `false` and `false` becomes `true`.


    ```

    [jshell> boolean t = true

    t ==> true

    |  created variable t : boolean

    [jshell> boolean f = !t

    f ==> false

    |  created variable f : boolean

    [jshell> boolean t2 = !f

    t2 ==> true

    |  created variable t2 : boolean

    ```'
