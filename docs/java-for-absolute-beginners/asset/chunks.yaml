    ### Using Fakes


    A **fake** object is an object that has working implementations, but not the same
    as the production object. The code written to implement such an object has simplified
    functionality of the one deployed in production.


    To test the `AccountRepoImpl` class, we have to replace the `DerbyDBConnection`
    with a `FakeDBConnection` that is not backed up by a database, but by something
    simpler, more accessible like a `Map`. The `DerbyDBConnection` uses a `java.sql.Connection`
    and other classes in that package to perform data operations on the Derby database.


    The `FakeDBConnection` implements the `DBConnection` interface, so it can be passed
    to an `AccountRepoImpl` and all its methods are called on it.


    The rule of thumb when writing tests and test supporting classes is to put them
    in the same packages with the objects tested or replaced, but in the `test/java`
    directory. But because we show you more than one approach of testing, each package
    is named accordingly. The package to test the application classes using fakes
    is named `com.apress.bgn.ch9.fake`.


    Another rule of thumb when writing tests is to write a method to test the correct
    outcome of the method being tested, and one to test the incorrect behavior. In
    unexpected cases with unexpected data, your application behaves in unexpected
    ways, so although this seems paradoxical, you have to expect the unexpected and
    write tests for it.


    The `AccountRepoImpl` class implements the basic methods to persist or delete
    an `Account` instance to/from the database. The implementation is depicted next.


    ```

    package com.apress.bgn.ch9.repo;

    import com.apress.bgn.ch9.Account;

    import com.apress.bgn.ch9.db.DbConnection;

    import java.util.List;

    import java.util.Optional;

    public class AccountRepoImpl implements AccountRepo {

    private DbConnection conn;

    public AccountRepoImpl(DbConnection conn) {

    this.conn = conn;

    }

    @Override

    public Account save(Account account) {

    Account dbAcc = conn.findByHolder(account.getHolder());

    if(dbAcc == null) {

    return conn.insert(account);

    }

    return conn.update(account);

    }

    @Override

    public Optional findOne(String holder) {

    Account acc = conn.findByHolder(holder);

    if(acc != null) {

    return Optional.of(acc);

    }

    return Optional.empty();

    }

    @Override

    public List findAll() {

    return conn.findAll();

    }

    @Override

    public int deleteByHolder(String holder) {

    Account acc = conn.findByHolder(holder);

    conn.delete(holder);

    if(acc != null) {

    return 0;

    }

    return 1;

    }

    }

    ```


    To test this method we need to provide a `DbConnection` implementation that simulates
    a connection to a database. This is where `FakeDBConnection` comes in.


    ```

    package com.apress.bgn.ch9.fake.db;

    import com.apress.bgn.ch9.Account;

    import com.apress.bgn.ch9.db.DBException;

    import com.apress.bgn.ch9.db.DbConnection;

    import java.util.ArrayList;

    import java.util.HashMap;

    import java.util.List;

    import java.util.Map;

    public class FakeDBConnection implements DbConnection {

    /**

    * pseudo-database {@code Map}

    */

    Map database = new HashMap();

    @Override

    public void connect() {

    // no implementation needed

    }

    @Override

    public Account insert(Account account) {

    if (database.containsKey(account.getHolder())) {

    throw new DBException("Could not insert " + account);

    }

    database.put(account.getHolder(), account);

    return account;

    }

    @Override

    public Account findByHolder(String holder) {

    return database.get(holder);

    }

    @Override

    public List findAll() {

    List result = new ArrayList();

    result.addAll(database.values());

    return result;

    }

    @Override

    public Account update(Account account) {

    if (!database.containsKey(account.getHolder())) {

    throw new DBException("Could not find account for " + account.getHolder());

    }

    database.put(account.getHolder(), account);

    return account;

    }

    @Override

    public void delete(String holder) {

    database.remove(holder);

    }

    @Override

    public void disconnect() {

    // no implementation needed

    }

    }

