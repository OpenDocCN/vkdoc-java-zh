    If you remember, in **Chapter** [5](#463938_1_En_5_Chapter.xhtml) the different
    types of memory used by the JVM were discussed, and heap was the memory where
    all the objects used by an application were stored. This command prints the heap
    details: the amount that was used and reserved, the size of a region, and so forth.
    These details are covered more in detail in **Chapter** [**13**](#463938_1_En_13_Chapter.xhtml)
    .


    #### jconsole


    `jconsole` is JDK utility that can be used to inspect various JVM statistics.
    To use it, you have to start it from the command line and connect it to a Java
    application that is already running. This application is quite useful, as it can
    connect to applications running on different machines also, as long as they are
    running in debug mode on a server and expose a port to connect to. To start a
    Java application in debug mode and expose a port for an external application,
    you have to start the application with the following VM parameters.


    ```

    -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=1044

    ```


    The port can be any port really as long as it is bigger than 1024, because those
    are restricted by the operating system. The `transport=dt_socket` instructs the
    JVM that the debugger connections is made through a socket, the `address=1044`
    parameter informs it that the port number is 1044\. The `suspend=y` instructs
    the JVM to suspend execution until a debugger is connected to it. To avoid that
    `suspend=n` should be used.


    For our simple example and considering we use `jconsole` to debug a Java application
    on the same machine , we do not need all that. We need to start `jconsole` from
    the command line and look in the **Local Processes:** section and identify the
    Java process we are interested in debugging. Figure [9-8](#463938_1_En_9_Chapter.xhtml#Fig8)
    shows the first JConsole dialog window.


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig8_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    JConsole first dialog window


    When the process is running locally it can be easily identified because it is
    named using the module and the fully qualified main class name. When we use `jconsole`
    to debug locally, the application does not have to run in debug mode, but for
    an application as simple as ours we need to make a few tweaks to make sure that
    we can see a few statistics with `jconsole`, during the run of the application.
    A few `Thread.sleep(..)` statements were added to pause the execution enough for
    `jconsole` to connect. Also, we’ll use a large array of data to make sure that
    the statistics are relevant.


    ```

    public class SortingSlf4jDemo {

    private static final Logger log =

    LoggerFactory.getLogger(SortingSlf4jDemo.class);

    public static void main(String... args) throws Exception {

    Thread.sleep(3000);

    Random random = new Random(5);

    IntStream intStream = random.ints(100_000_000,0,350);

    int[] arr =  intStream.toArray();

    if (log.isDebugEnabled()) {

    final StringBuilder sb =

    new StringBuilder("Sorting  an array with merge sort: ");

    Arrays.stream(arr).forEach(i -> sb.append(i).append(" "));

    log.debug(sb.toString());

    }

    Thread.sleep(3000);

    IntSorter mergeSort = new MergeSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    if (log.isInfoEnabled()) {

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    log.info(sb2.toString());

    }

    }

    ...

    }

    ```


    After doing the modifications, we’ll start the application normally and connect
    `jconsole` to it. After a successful connection, a window like the one shown in
    Figure [9-9](#463938_1_En_9_Chapter.xhtml#Fig9) is opens, and graphs of the JVM
    memory consumption , number of threads, of classes loaded and CPU usage are displayed.


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig9_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    JConsole statistics window


    There is a tab for each of these statistics that provides more information, and
    in a more complex application, this information can be used to improve performance,
    identify potential problems , or even estimate application behavior for desired
    cases. For our small application, the `jconsole` graphs do not reveal much, but
    if you really want to see valuable statistics, install an application like `mucommander`^([^(70)](#fn70))
    use it for a while without closing it and then connect `jconsole` to it and have
    fun.'
