- fmt: '### `break` Statement


    The `break` statement can only be used within `switch`, `for`, `while`, and `do-while`
    statements. You have already seen how it can be used within the `switch` statement;
    let’s look at how to use it in all the others.


    Breaking out of a `for`, `while` or `do-while` loop can be done using the `break`
    statement, but it must be controlled by an exit condition; otherwise, no step
    is executed. In the following code sample, we print only the first three elements,
    even if the `for` loop should traverse all of them. If we get to the index equal
    to 3, we exit the loop.


    ```

    package com.apress.bgn.ch7;

    public class ManipulationDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    for (int i = 0; i < arr.length ; ++i) {

    if  (i == 3) {

    System.out.println("Bye bye!");

    break;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    }

    }

    ```


    If we have a case of nested loops, a label can be used to decide the looping statement
    to break out of. As an example, in the following code we have three nested `for`
    loops, and we exit the middle loop when all indexes are equal.


    ```

    package com.apress.bgn.ch7;

    public class ManipulationDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    for (int i = 0; i < 2; ++i) {

    HERE: for (int j = 0; j < 2; ++j) {

    for (int k = 0; k < 2; ++k) {

    System.out.println("(i, j, k) = (" + i + "," + j + "," + k + ")");

    if (i == j && j == k) {

    break HERE;

    }

    }

    }

    }

    }

    }

    ```


    The label used in the code sample is named `HERE`, and it precedes the `for` statement
    that is exited when the condition is fulfilled and follows the `break` statement.
    Writing label names in all-caps letters is considered a best practice in development
    as it avoids confusing labels with variables or class names when reading the code.


    To make sure this works, you can take a look in the console to see that all combinations
    of `(i,j,k)`, including the ones with `i = j = k` and all after it, are no longer
    printed. In this case, all sets beginning with 0 are skipped, which is what is
    in the console.


    ```

    (i, j, k) = (1,0,0)

    (i, j, k) = (1,0,1)

    (i, j, k) = (1,1,0)

    ```


    ### `continue` Statement


    The `continue` statement does not break a loop, but can be used to skip certain
    steps based on a condition. So it basically stops the current step of the loop
    and moves to the next one, so you could say that this statement continues the
    loop. Let’s continue experimenting with the array traversal example, and this
    time, let’s skip printing the elements with odd indexes by using the `continue`
    statement.


    ```

    package com.apress.bgn.ch7;

    public class ManipulationDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    for (int i = 0; i < arr.length; ++i) {

    if (i % 2  != 0) {

    continue;

    }

    System.out.println("arr[" + i + "] = " + arr[i]);

    }

    }

    }

    ```


    This statement must be conditioned; otherwise, the loop will iterate uselessly.
    The `continue` statement can be used with labels too. Let’s take a similar example
    to the three nested `for` loops used earlier, but this time, when the `k` index
    is equal to 1, nothing is printed and we skip to the next step of the loop enclosing
    the `k` loop.


    ```

    package com.apress.bgn.ch7;

    public class ManipulationDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    for (int i = 0; i < 3; ++i) {

    HERE:

    for (int j = 0; j < 3; ++j) {

    for (int k = 0; k < 3; ++k) {

    if (k == 1) {

    continue HERE;

    }

    System.out.println("(i, j, k) = (" + i + "," + j + "," + k + ")");

    }

    }

    }

    }

    }

    ```


    To make sure this works, you can take a look in the console to see what combinations
    are printed. We clearly notice that no combination with `k=1` or `k=2` has printed.


    ```

    (i, j, k) = (0,0,0)

    (i, j, k) = (0,1,0)

    (i, j, k) = (0,2,0)

    (i, j, k) = (1,0,0)

    (i, j, k) = (1,1,0)

    (i, j, k) = (1,2,0)

    (i, j, k) = (2,0,0)

    (i, j, k) = (2,1,0)

    (i, j, k) = (2,2,0)

    ```


    ### Label Usage and `goto`


    The usage of labels to break out of loops is frowned upon in the Java community,
    because jumping to a label resembles the `goto` statement that still can be found
    in certain old school programming languages. `goto` is a Java reserved keyword,
    because this statement used to exist in the first version of the JVM, but it was
    later removed. Using jumping makes code less readable, less testable and promotes
    bad design. That is why `goto` was removed in later versions, but any need for
    such operation can be implemented with `break` and `continue` statements.


    ### `return` Statement


    The `return` statement is an easy one. It can be used to exit the execution of
    a method body. If the method returns a value, the `return` statement is accompanied
    by the value returned. The `return` statement can be used to exit any of the statements
    mentioned in this section. It can represent a smart way to shortcut the execution
    of a method, as the execution of the current method stops and processing continues
    from the point in the code that called the method.


    Let’s look at a few examples. First let’s write a method that finds the first
    even element in an array; if found, the method returns its index; otherwise, it
    returns -1.


    ```

    package com.apress.bgn.ch7;

    public class ReturnDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    int foundIdx = findEven(arr);

    if (foundIdx != -1) {

    System.out.println("First even is at: " + foundIdx);

    }

    }

    public static int findEven(int ... arr) {

    for (int i = 0; i < arr.length; ++i) {

    if (arr[i] %2 == 0) {

    return i;

    }

    }

    return -1;

    }

    }

    ```


    Let’s write the same method but using a `while` statement.


    ```

    package com.apress.bgn.ch7;

    public class ReturnDemo {

    public static final int arr[] = {5, 1, 4, 2, 3};

    public static void main(String... args) {

    int foundIdx = findEven(arr);

    if (foundIdx != -1) {

    System.out.println("First even is at: " + foundIdx);

    }

    }

    public static int findEven(int ... arr) {

    int i = 0;

    while (i < arr.length) {

    if (arr[i] % 2 == 0) {

    return i;

    }

    ++i;

    }

    return -1;

    }

    }

    ```


    The `return` statement can be used in any situation where we want to terminate
    the execution of a method if a condition is met.'
