- fmt: '在图片的右侧，你可以看到正在请求的`URL`、请求类型（也称为**请求方法**，此处为`GET`）以及请求发送到的服务器的**远程地址**。还有一个**原始标头**按钮，点击后会以文本形式展示请求和响应的内容。`GET`请求用于从服务器检索某些内容，在此示例中，检索的是一个网页。如果网页可以被找到，服务器会发送响应，其中包含供浏览器显示的页面以及其他属性（例如状态码），以表明一切正常。HTTP状态码有一系列，其中最重要的是`200`码，它表示一切正常。在图[10-13](#463938_1_En_10_Chapter.xhtml#Fig13)中，你可以看到，为了显示该页面，在初始请求得到回复后，会发出大量额外的请求，并且所有后续请求都成功了，因为服务器返回的状态码显示在表格的第一列，且始终是`200`。


    *   `PUT`：当数据被发送到服务器进行存储时，使用此类型的请求。在企业应用中，`PUT`请求被解释为更新现有对象的请求，并且请求中包含该对象的更新版本以及用于标识它的信息。


    *   `POST`：当需要指示服务器保存数据进行存储时，也使用此类型的请求。与`PUT`请求的区别在于，这些数据在服务器上尚不存在。在企业应用中，`POST`请求用于发送凭据以便对用户进行身份验证，或发送用于创建新对象的数据。当`POST`请求发送凭据时，如果用户通过身份验证，响应状态码为`200`；如果用户凭据无效，则状态码为`401`（未授权）。当`POST`请求发送要保存的数据时，如果对象创建成功，则返回`201`状态码。


    *   `DELETE`：当要求服务器删除数据时，使用此类型的请求。如果数据删除成功，响应码为`200`；否则，返回与失败原因相关的其他错误码。


    还有其他一些HTTP方法用于更复杂的应用程序。如果你对请求方法、状态码和HTTP基础知识感到好奇，我强烈推荐[`www.ntu.edu.sg/home/ehchua/programming/webprogramming/http_basics.html`](http://www.ntu.edu.sg/home/ehchua/programming/webprogramming/http_basics.html)上的教程。现在，让我们回到编写Java
    Web应用程序上来。


    直到不久前，我们还需要一个服务器来托管Web应用程序，但现在情况已不再如此。就像数据库被替换为用于测试目的且功能最少的嵌入式数据库一样，Web服务器也发生了同样的情况。如果你想快速编写一个简单的Web应用程序，现在可以选择使用嵌入式服务器，例如`Jetty`或`Tomcat`（嵌入式版本）。在本章的这一部分，我们将使用嵌入式`Tomcat`服务器，并创建一个显示简单HTML页面小型Web应用程序。代码如以下清单所示。


    ```

    package com.apress.bgn.ch10;

    import org.apache.catalina.Context;

    import org.apache.catalina.LifecycleException;

    import org.apache.catalina.startup.Tomcat;

    import java.io.File;

    public class WebDemo {

    public static void main(String... args) throws LifecycleException {

    Tomcat tomcat = new Tomcat();

    tomcat.setBaseDir("chapter10/web-app/out");

    tomcat.setPort(8080);

    String contextPath = "/demo";

    String docBase = new File(".").getAbsolutePath();

    Context context = tomcat.addContext(contextPath, docBase);

    SampleServlet servlet = new SampleServlet();

    tomcat.addServlet(contextPath, servlet.getServletName(), servlet);

    context.addServletMapping(servlet.getUrlPattern(),

    servlet.getServletName());

    tomcat.start();

    tomcat.getServer().await();

    }

    }

    ```


    如果你觉得这很简单，那确实如此。启动嵌入式服务器所需做的全部工作就是创建一个`Tomcat`实例，选择我们希望暴露它的端口（在本例中为`8080`），并指定`Tomcat`临时文件的位置。由于我们是从`IntelliJ`运行`main(..)`方法，应用程序的上下文是相对于项目目录的，因此`Tomcat`的基础目录被设置为`out`目录，`IntelliJ
    IDEA`会在此目录中存储此项目的编译类和其他临时文件。一个Java Web应用程序需要一个上下文路径。上下文路径值是访问应用程序的`URL`的一部分。一个`URL`由四个部分组成。


    *   `protocol`：客户端和服务器用于通信的应用层协议（例如，`http`、`https`、`ftp`等）。


    *   `hostname`：DNS域名（例如，[`www.google.com`](http://www.google.com)）或IP地址（例如，`192.168.0.255`）或网络中可识别的任何别名。例如，当从安装服务器的同一台计算机访问应用程序时，可以使用`127.0.0.1`或`localhost`。


    *   `port`：服务器监听来自客户端传入请求的TCP端口号。对于Web应用程序，它通常是`8080`，但大多数`URL`不包含此端口，因为有路由机制将其隐藏。


    *   `path and filename`：资源在服务器文档基础目录下的名称和位置。用户通常请求查看服务器上托管的特定页面，这就是`URL`看起来像[`https://docs.oracle.com/index.html`](https://docs.oracle.com/index.html)的原因。但出于安全原因，一种非常常见的做法是通过使用内部映射（称为URL重定向）来隐藏路径和文件名。


    那么，上下文路径值在哪里发挥作用呢？嗯，当我们像前面的代码示例那样声明一个嵌入式服务器时，它托管的任何文件都可以通过`http://localhost:8080/`访问，但由于一个服务器可以托管多个应用程序，因此必须有一种方法来区分它们，对吧？这就是上下文路径值派上用场的地方。因为通过将上下文路径设置为`/demo`，`WebDemo`应用程序及其提供给用户的资源可以通过`http://localhost:8080/demo/`访问。


    Java Web应用程序是动态的，页面是通过使用*Servlets*和*JSP（Java Server Pages）*页面从Java代码生成的。因此，Java
    Web应用程序并非直接在服务器上运行，而是在服务器上的Web容器内运行。Web容器为Java Web应用程序提供Java运行时环境。Apache Tomcat就是这样一个运行在JVM中的容器；它支持执行`servlet`和`JSP`页面。一个**servlet**是一个Java类，它是`javax.servlet.http.HttpServlet`的子类。此类型的实例在Web容器内响应HTTP请求。一个JSP页面是一个扩展名为`.jsp`的文件，其中包含HTML和Java代码。JSP页面在首次被访问时，会由Web容器编译成一个`servlet`。本质上，*servlet*是Java
    Web应用程序的核心元素。此外，服务器必须知道`servlet`存在以及如何识别它，这就是调用`tomcat.addServlet(contextPath,
    servlet.getServletName(), servlet);`的作用，它基本上是说：将名为`servlet.getServletName()`的`servlet`添加到上下文路径值为`contextPath`的应用程序上下文中。然后，为了将URL模式与`servlet`关联起来，会调用`context.addServletMapping(servlet.getUrlPattern(),
    servlet.getServletName());`。'
  raw: 'In the right part of the image, you can see the URL being requested, the type
    of request, also called a **request method** , which is GET in this case, and
    the **remote address** of the server where the request was sent to. There is also
    a **Raw headers** button that opens a view depicting the contents of the request
    and response as text. GET requests are used to retrieve something from the server,
    in this example, a web page. If the web page can be found, the response is sent
    with the page to be displayed by the browser and other attributes, such a status
    code, to communicate that all went fine. There is a list of HTTP status codes,
    the most important one is the 200 code, which means all went OK. In Figure [10-13](#463938_1_En_10_Chapter.xhtml#Fig13),
    you can see that to display the page a lot of additional requests are done, after
    the initial request is replied, and all subsequent requests are successful, because
    the status returned by the server is put in the first column in the table and
    it’s always 200.


    *   `PUT`: This type of request is used when data is sent to the server for storage.
    In enterprise applications, a PUT requests is interpreted as a request to update
    an existing object, and the request contains the updated version of the object
    and means to identify it.


    *   `POST`: This type of request is used when the server needs to be instructed
    to save data for storage as well. The difference from PUT request is that this
    data does not exist on the server yet. In enterprise applications a POST request
    is used to send credentials so the user can be authenticated, or to send data
    that creates a new object. When a POST request sends credentials the response
    status code is 200 when the user is authenticated and 401(Unauthorized) when the
    user credentials are not good, when a POST request sends data to be saved, the
    201 status code is returned if the object was created.


    *   `DELETE`: This type of request is used when the server is asked to delete
    data. The response code is 200 when the deleting the data was successful, and
    any other error code related to the cause why it did not, otherwise.


    There are a few other HTTP methods that are used in more complex applications.
    If you are curious about request methods, status codes, and HTTP basics, I confidently
    recommend the tutorial at [`www.ntu.edu.sg/home/ehchua/programming/webprogramming/http_basics.html`](http://www.ntu.edu.sg/home/ehchua/programming/webprogramming/http_basics.html)
    . Now let’s get back to writing Java web applications.


    Until a while ago, we needed a server to host a web application but this is no
    longer the case. As databases were replaced for testing purposes and applications
    with minimum functionality with embedded databases, the same happened to web servers.
    If you want to quickly write a simple web application you have now the option
    of using an embedded server, like Jetty or Tomcat (the embedded version). For
    this section of the chapter, we’ll use an embedded Tomcat server and we’ll create
    a small web application that displays a simple HTML page. The code is depicted
    in the next listing.


    ```

    package com.apress.bgn.ch10;

    import org.apache.catalina.Context;

    import org.apache.catalina.LifecycleException;

    import org.apache.catalina.startup.Tomcat;

    import java.io.File;

    public class WebDemo {

    public static void main(String... args) throws LifecycleException {

    Tomcat tomcat = new Tomcat();

    tomcat.setBaseDir("chapter10/web-app/out");

    tomcat.setPort(8080);

    String contextPath = "/demo";

    String docBase = new File(".").getAbsolutePath();

    Context context = tomcat.addContext(contextPath, docBase);

    SampleServlet servlet = new SampleServlet();

    tomcat.addServlet(contextPath, servlet.getServletName(), servlet);

    context.addServletMapping(servlet.getUrlPattern(),

    servlet.getServletName());

    tomcat.start();

    tomcat.getServer().await();

    }

    }

    ```


    If you think it is simple, it really is. All we have to do to start an embedded
    server is to create a `Tomcat` instance and select the port we want to expose
    it on(in this case `8080`) and specify a location for the Tomcat temp files. As
    we are running our `main(..)` method from IntelliJ, the context of the application
    is relative to the project directory, so the base directory for Tomcat is set
    as the `out` directory where IntelliJ IDEA stores compiled classes and other temporary
    files for this project. A Java web application needs a context path. The context
    path value is a part of the URL to access the application. An URL is made up of
    four parts.


    *   `protocol`: The application-level protocol used by client and server to communicate,
    (e.g., http, https, ftp, etc.).


    *   `hostname`: The DNS domain name (e.g., [`www.google.com`](http://www.google.com)
    ) or IP address (e.g., 192.168.0.255) or any alias recognized in a network. For
    example when an application is accessed from the same computer the server is installed
    on either 127.0.0.1 can be used or *localhost.*


    *   `port`: The TCP port number the server is listening for incoming requests
    from clients. For web applications it usually is 8080, but most URLs do not contain
    this port as there are routing mechanisms in place to hide it.


    *   `path and filename`: The name and location of the resource, under the server
    document base directory. Users usually request to view specific pages hosted on
    servers, which is why URLs look like this: [`https://docs.oracle.com/index.html`](https://docs.oracle.com/index.html)
    . But a very used practice is to hide the paths and file names by using internal
    mappings (called URL redirection) because of security reasons.


    So where does the context path value come in? Well, when we have an embedded server
    declared like in the previous code sample, any files that are hosted by it can
    be accessed by using the `http://localhost:8080/`, but because a server can host
    more than one application, they must be a way to separate them, right? Here is
    where the context path value comes in handy. Because by setting the context path
    to `/demo`, the `WebDemo` application and the resources it provides to the users
    can be accessed at `http://localhost:8080/demo/`.


    Java Web Applications are dynamic, the pages are generated from Java code using
    *Servlets* and *JSP(Java Server Pages)* pages . Because of that, Java Web Applications
    are not running on a server but inside a web container on the server. The web
    container provides a Java runtime environment for Java Web applications. Apache
    Tomcat is such a container running in the JVM; it supports execution of servlets
    and JSP pages. A **servlet** is a Java class that is a subclass of `javax.servlet.http.HttpServlet`.
    Instances of this type answer HTTP Requests within a web container. A JSP page
    is a file with `.jsp` extension that contains HTML and Java code. A JSP page gets
    compiled into a servlet by the web container the first time the page is accessed.
    In essence the *servlet* is the core element of a Java Web application. Also,
    the server must know that the servlet exists and how to identify it, this where
    the call `tomcat.addServlet(contextPath, servlet.getServletName(), servlet);`
    comes in, it basically says: add the `servlet` with name `servlet.getServletName()`
    to the application context with the `contextPath` value context path. Then, to
    associate an URL pattern to the servlet, the `context.addServletMapping(servlet.getUrlPattern(),
    servlet.getServletName());` is called.'
