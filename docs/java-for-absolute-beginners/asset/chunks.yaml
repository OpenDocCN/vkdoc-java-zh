  trans: '

    ### Optional 简介


    `java.util.Optional<T>` 实例就像是 Java 语言中的薛定谔^(⁶³)盒子。它们非常有用，因为可以作为方法的返回类型，从而避免返回
    `null` 值，并防止可能抛出的 `NullPointerException`，或者迫使使用该方法的开发者编写额外代码来处理可能抛出的异常。`Optional<T>`
    实例的创建方式与流类似。


    有一个 `empty()` 方法，用于创建不包含任何内容的任意类型的可选值。


    ```

    Optional empty = Optional.empty();

    ```


    还有一个 `of()` 方法，用于将现有对象包装到 `Optional<T>` 中。


    ```

    Optional value = Optional.of(5L);

    ```


    考虑到这类实例的设计初衷是不允许 `null` 值，以及之前创建 `Optional<T>` 实例的方式，是什么阻止我们编写如下代码呢？


    ```

    Song song = null;

    Optional nullable = Optional.of(song);

    ```


    编译器不会阻止，但当代码在运行时执行时，会抛出 `NullPointerException`。不过，如果我们确实需要一个允许 `null` 值的 `Optional<T>`
    实例，也是可以的；Java 9 中引入了一个实用方法专门用于此目的。


    ```

    Song song = null;

    Optional  nullable = Optional.ofNullable(song);

    ```


    现在我们有了 `Optional<T>` 实例，能用它们做什么呢？当然是使用它们。让我们看看下面的代码。


    ```

    package com.apress.bgn.ch8;

    import com.apress.bgn.ch8.util.MediaLoader;

    import com.apress.bgn.ch8.util.Song;

    import java.util.List;

    public class OptionalDemo {

    public static void main(String... args) {

    List songs = MediaLoader.loadSongs();

    song = findFirst(songs, "B.B. King");

    if(song != null && song.getSinger().equals("The Thrill Is Gone")) {

    System.out.println("好东西！");

    } else {

    System.out.println("未找到！");

    }

    }

    public static Song findFirst(List songs, String singer) {

    for (Song song: songs) {

    if (singer.equals(song.getSinger())) {

    return song;

    }

    }

    return null;

    }

    }

    ```


    `findFirst(..)` 方法在列表中查找第一个歌手为“B.B. King”的歌曲，如果找到则返回并打印一条消息，否则打印另一条消息。你可以注意到其中的空值检查和列表迭代。在
    Java 8 中，这两者都不再必要。


    ```

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    opt.ifPresent(r -> System.out.println(r.getTitle()));

    ```


    如果 `Optional<T>` 实例不为空，则打印歌曲标题；否则，不打印任何内容，代码从该点继续执行，不会抛出异常。但是，如果我们想在 `Optional<T>`
    实例为空时打印一些内容呢？在 Java 11 中，我们可以对此进行处理，因为引入了一个名为 `isEmpty()` 的方法来测试 `Optional<T>`
    实例的内容。


    ```

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    if(opt.isEmpty()) {

    System.out.println("未找到！");

    }

    ```


    但是等等，这有点……不太对劲。难道我们不能在 `Optional<T>` 上调用一个方法，使其行为完全像 `if-else` 语句一样吗？嗯，从 Java
    9 开始就可以做到了；`ifPresentOrElse(..)` 方法接受两个参数：一个消费者，用于在 `Optional<T>` 实例不为空时处理其内容；以及一个
    `Runner` 实例，用于在 `Optional<T>` 实例为空时执行。


    ```

    Optional opt = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger())).findFirst();

    opt.ifPresentOrElse(

    r -> System.out.println(r.getTitle()),

    () -> System.out.println("未找到！")) ;

    ```


    如果 `Optional<T>` 实例不为空，可以通过调用 `get()` 方法提取其内容。


    ```

    Optional opt2 = songs.stream()

    .filter(ss -> "Rob Thomas".equals(ss.getSinger()))

    .findFirst();

    System.out.println("找到歌曲 " + opt2.get());

    ```


    当未找到所需对象时，代码不会打印任何内容。但如果我们想打印一个默认值，也可以使用名为 `orElse()` 的方法来实现。


    ```

    Optional opt = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger()))

    .findFirst();

    opt.ifPresent(r -> System.out.println(r.getTitle()));

    Song defaultSong = new Song();

    defaultSong.setTitle("无标题");

    Song s = opt.orElse (defaultSong);

    System.out.println("找到: " + s.getTitle());

    ```


    如果我们想在 `Optional<T>` 为空时抛出一个特定的异常，也有一个方法可以实现，名为 `orElseThrow(..)`。


    ```

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    Song song = opt.orElseThrow(IllegalArgumentException::new);

    ```


    正如你可能在代码示例中注意到的，`Optional<T>` 和 `Stream<T>` 可以结合使用，编写实用的代码来解决复杂问题。由于有许多方法也可以应用于
    `Optional<T>` 和 `Stream<T>` 实例，接下来的章节将针对流介绍这些方法，并随机引用 `Optional<T>`。

    '
- fmt: '# How to Use Streams


    After creating a stream, the next thing is to process the data on the stream.
    The result of that processing is another stream that can be further processed
    as many times as needed. There are a few methods to use to process a stream and
    return the result as another stream. These methods are called *intermediate operations*.
    The methods that do not return a stream but actual data structures, or nothing,
    are named *terminal operations*. All these are defined in the `Stream` interface.
    The key feature of streams is that the processing of data using streams is only
    done when the *terminal operation* is initiated and elements from source are consumed
    only as needed. So you could say that the whole stream process is well, lazy.
    Lazy loading of source elements and processing them when needed allows significant
    optimizations.


    After the previous affirmations, you probably realized that the `forEach` method
    that was used to print values from the streams is a terminal operation. But there
    are a few that you’ll likely need for the most common implementations.


    This chapter started with an example of `Song` instances, but the `Song` class
    was not listed yet. You can see its contents in the following code listing.


    ```

    package com.apress.bgn.ch8.util;

    public class Song {

    private Long id;

    private String singer;

    private String title;

    private Integer duration;

    private AudioType audioType;

    ... //getters and setters

    ... // toString

    }

    ```


    The `AudioType` is an enum containing the types of audio files and is depicted
    in the following code snippet.


    ```

    package com.apress.bgn.ch8.util;

    public enum AudioType {

    MP3,

    FLAC,

    OGG,

    AAC,

    M4A,

    WMA

    }

    ```


    And now that the data type that is used on the following stream examples is depicted,
    the data should be depicted as well. In the example in the book, the data is contained
    into a file named `songs.csv`. The CSV extension denotes a *comma separated file*,
    and each `Song` instance matches a line in the file. Each line contains all the
    property values of each `Song` instance, separated by columns. Other separators
    can be used, semi-colons were used here for practical reasons (that is the default
    supported by the library reading the data). The contents of the file are depicted
    next.


    ```

    ID;SINGER;TITLE;DURATION;AUDIOTYPE

    01;John Mayer;New Light;206;FLAC

    02;John Mayer;My Stupid Mouth;225;M4A

    03;John Mayer;Vultures;247;FLAC

    04;John Mayer;Edge of Desire;333;MP3

    05;John Mayer;In Repair;372;MP3

    05;Rob Thomas;Paper Dolls;185;MP3

    07;The Script;Mad Love;207;MP3

    08;Seth MacFarlane;No One Ever Tells You;244;MP3

    09;Nat King Cole;Orange Colored Sky;154;MP3

    10;Vertical Horizon;Forever;246;MP3

    11;Mario Lanza;Temptation;141;M4A

    12;Jack Radics;No Matter;235;MP3

    13;George Michael;Fastlove;306;MP3

    14;Childish Gambino;Freaks And Geeks;227;M4A

    15;Bill Evans;Lover Man;304;MP3

    16;Darren Hayes;Like It Or Not;381;MP3

    17;Stevie Wonder;Superstition;284;MP3

    18;Tony Bennett;It Had To Be You;196;MP3

    19;Tarja Turunen;An Empty Dream;322;MP3

    20;Lykke Li;Little bit;231;M4A

    ```


    Each line in the file is transformed into a `Song` instance by using classes in
    a library named `Josefa`. This library is not the topic of this book, but if you
    are interested, you can use the link in the footnote to get more information from
    the official site.


    ## Terminal Functions: `forEach` and `forEachOrdered`


    And now we are ready to start playing with streams. Assuming the `songs` stream
    provides all instances declared, let’s first print all the elements on the stream.


    ```

    package com.apress.bgn.ch8;

    import com.apress.bgn.ch8.util.Song;

    import com.apress.bgn.ch8.util.StreamMediaLoader;

    import java.util.List;

    import java.util.stream.Stream;

    public class MediaStreamTester {

    public static void main(String... args) {

    Stream songs = StreamMediaLoader.loadSongs();

    songs.forEach(song -> System.out.println(song));

    }

    }

    ```


    Because we are using Java 11 by now, we can make use of method references introduced
    in Java 8. Method references are a shortcut for cases when a lambda expression
    does nothing else than call a method, so the method can be referred by name directly.
    So this line


    ```

    songs.forEach(song -> System.out.println(song));

    ```


    becomes


    ```

    songs.forEach(System.out::println);

    ```


    The `forEach(..)` method receives an instance of `Consumer<T>` as an argument.
    In the two previous examples, the implementation of the `accept()` method contained
    only a call to `System.out.println(song)` and that is why the code is so compact,
    but if the implementation of this method would contain more statements then the
    compact code previously written would not be possible.


    Instead of printing the songs directly, let’s first uppercase the singer name.
    The code would look like this:


    ```

    songs.forEach(new Consumer() {

    @Override

    public void accept(Song song) {

    song.setSinger(song.getSinger().toUpperCase());

    System.out.println(song);

    }

    });

    ```


    Of course, it can be simplified using lambda expressions.


    ```

    songs.forEach(song -> {

    song.setSinger(song.getSinger().toUpperCase());

    System.out.println(song);

    });

    ```


    The sister function, `forEachOrdered(..)`, does the same thing as `forEach(..)`,
    with one little difference, ensure that the elements on the stream is processed
    element is processed in encounter order, if such order is defined, even if the
    stream is a parallel one. So basically the following two lines, print the songs
    in the same order.


    ```

    songs.forEach(System.out::println);

    songs.parallel().forEachOrdered(System.out::println);

    ```


    ## Intermediate Operation `filter` and Terminal Operation `toArray`


    In the following example, we select all MP3 songs and save them to an array. Selecting
    all MP3 songs is done using the `filter(..)` method. This method receives an argument
    of type `Predicate<? super T>` that defines a condition that the elements of the
    stream must pass to be put into the array that results by calling the terminal
    method named `toArray(..)`.


    The `toArray(..)` receives an argument of type `IntFunction<A[]>`. This type of
    function takes an integer as argument and generates an array of that size, which
    is populated by the `toArray()` method.


    The code to filter the MP3 entries and put them into an array of type `Song[]`
    is depicted next.


    ```

    Song sarray = songs.filter(s -> s.getAudioType() == AudioType.MP3)

    .toArray(Song::new);

    ```'
