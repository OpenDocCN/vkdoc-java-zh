- fmt: '### Intermediate Operations `map` and `flatMap` and Terminal Operation `collect`


    In the following example we process all the songs and calculate the duration in
    minutes. To do this, we use the `map` method to associate each song with the method
    processing it. This result is a stream of `Integer` values. All of its elements
    are added to a `List<Integer>` using the `collect(..)` method. This method accumulates
    the elements as they are processed into a `Collection` instance.


    ```

    package com.apress.bgn.ch8.util;

    public class SongTransformer {

    public static int processDuration(Song song) {

    int secs = song.getDuration();

    return secs/60;

    }

    }

    ...

    List durationAsMinutes =  songs

    .map(SongTransformer::processDuration)

    .collect(Collectors.toList());

    ```


    The `map(..)` method receives an argument of type `Function<T,R>` which is basically
    a reference to a function to apply on each element of the stream. The function
    we applied in the previous example takes a song element from the stream, gets
    its duration and transforms it into minutes and returns it.


    The reference to it can be written as


    ```

    Function fct = SongTransformer::processDuration;

    ```


    The first generic type is the type of the element processed and the second is
    the type of the result returned.


    A version of the `filter` method is defined for the `Optional` type and can be
    used to avoid writing complicated `if` statements, together with the `map` method.
    Let’s assume we have a `Song` instance and we want to check if it is more than
    three minutes and less than 10 minutes long. Instead of writing an `if` statement
    with two conditions connected by an AND operator, we can use an `Optional<Song>`
    and those two methods to do the same.


    ```

    public static boolean isMoreThan3Mins(Song song) {

    return Optional.ofNullable(song)

    .map(SongTransformer::processDuration)

    .filter(d -> d >= 3)

    .filter(d -> d <= 10)

    .isPresent();

    }

    ```


    So, the `map(..)` is quite powerful, but it has a small flaw. If we take a look
    at its signature in the `Stream.java` file, this is what we see:


    ```

    Stream map(Function mapper);

    ```


    So, if the `map` function is applied to each element in the stream and returns
    a stream with the result, which is placed into another stream that contains all
    results, the `collect(...)` method is called on a `Stream<Stream<Integer>>`. The
    same goes for `Optional<T>`, the terminal method is called on a `<Optional<Optional<T>>>`.
    When the objects are simple, like we have here `Song` instances, the `map(..)`
    method works quite well, but if the objects in the original stream are more complex,
    let’s say a `List<List<Integer>>`, things get complicated. In a case like this
    the `map` method should be replaced with `flatMap`. The easiest way to show the
    effects of the `flatMap(..)` is to apply it exactly on a `List<List<Integer>>`.
    Let’s take a look at the following example.


    ```

    List> testList = List.of (List.of(2,3), List.of(4,5), List.of(6,7));

    System.out.println(processList(testList));

    ...

    public static List processList( List> list) {

    List result = list

    .stream()

    .flatMap(Collection::stream)

    .collect(Collectors.toList());

    return result;

    }

    ```


    The `flatMap(..)` method receives as argument a reference to a method that takes
    a collection and transforms it into a stream, the most simple way to create a
    `Stream<Stream<Integer>>`. The `flatMap(..)` does its magic and the result is
    transformed into `<Stream<Integer>>` and the elements are then collected by the
    `collect` method into a `List<String>`. The operation of removing the useless
    stream wrapper is called *flattening*.


    Another way to see the effect of the `flatMap(..)` method is to write a simpler
    example with `Optional`. Let’s say we need a function that transforms a string
    into an integer and if the string is not a valid number we want to avoid returning
    null. This means that our function must take a string and return `Optional<Integer>`.


    ```

    Function> toIntOpt = OptionalDemo::toIntOpt;

    ...

    public static Optional toIntOpt(String string) {

    try {

    return Optional.of(Integer.parseInt(string));

    } catch (NumberFormatException e) {

    return Optional.empty();

    }

    }

    ```


    Now that we have our function, let’s use it.


    ```

    Optional str = Optional.of("42");

    Optional> resInt = str.map(toIntOpt);

    // flatten it

    Optional desiredRes = resInt.orElse(Optional.empty());

    System.out.println("finally: " + desiredRes.get());

    ```


    If we want to get to the `Optional` instance that we are really interested in,
    we have to get rid of the external `Optional` wrapper. If we use `flatMap(..)`,
    we do not need to do that.


    ```

    Optional str = Optional.of("42");

    Optional desiredRes = str.flatMap(toIntOpt);

    System.out.println("boom: " + desiredRes.get());

    ```


    So yeah, there is a slight difference between these two methods, which you probably
    would have never investigated; as in most cases when working with streams the
    `map()` method is usually terminated with `collect(..)`.


    ### Intermediate Operation `sorted` and Terminal Operation `findFirst`


    As the name says the `sorted()` method has something to do with sorting. When
    called on a stream, it creates another stream with all the elements of the initial
    stream, but sorted in their natural order. If the type of elements on the stream
    is not comparable (the type does not implement `java.lang.Comparable`, a `java.lang.ClassCastException`
    is thrown). And since we are going to use this method to get a stream of sorted
    elements, we use `findFirst()` to get the first element in the stream. This method
    returns an `Optional<T>`, because the stream might be empty.


    ```

    List pieces = List.of("some","of", "us", "we’re", "hardly", "ever", "here");

    String first = pieces.stream().sorted().findFirst().get();

    System.out.println("First from sorted list: " + first);

    ```


    This code prints `ever` because that is the first element in the sorted stream.


    ### Intermediate Operation `distinct` and Terminal Operation `count`


    The `distinct()` method takes a stream and generates a stream with all the distinct
    elements of the original stream. And because we need a terminal function, let’s
    use `count()`; as the name says, this function counts the elements of the stream.


    ```

    List pieces = List.of("as","long", "as", "there", "is",

    "you", "there", "is", "me");

    long count = pieces.stream().distinct().count();

    System.out.println("Elements in the stream: " + count);

    ```


    If the code is run, the number printed is `6`, because after removing the duplicate
    terms (`as`, `there`, `is`), we are left with six terms.


    ### Intermediate Operation `limit` and Terminal Operations `min` and `max`


    The `limit(..)` method was used in this chapter before to transform a infinite
    stream into a finite one. As it transforms a stream into another stream, clearly
    this is an intermediate function. To see it in action, we will use a stream of
    integers and we’ll use as terminal methods two mathematical functions: to calculate
    the minimum of the elements in the stream - `min()` and to calculate the maximum
    of the elements in the stream - `max()`. How to use these functions together is
    depicted in the following code snippet.


    ```

    Stream ints = Stream.of(5,2,7,9,8,1,12,7,2);

    ints.limit(4).min(Integer::compareTo)

    .ifPresent(min -> System.out.println("Min is: " + min));

    // Prints "Min is: 2"

    Stream ints = Stream.of(5,2,7,9,8,1,12,7,2);

    ints.limit(4).max(Integer::compareTo)

    .ifPresent(max -> System.out.println("Max is: " + max));

    // Prints "Max is: 9"

    ```'
