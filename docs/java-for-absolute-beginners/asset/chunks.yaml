    ```


    Another method that you might find useful is `concat()`, which allows us to concatenate
    two `Flux` instances.


    ```java

    String[] names = {"Joy", "John", "Anemona", "Takeshi"};

    Flux namesFlux = Flux.fromArray(names);

    String[] names2 = {"Hanna", "Eugen", "Anthony", "David"};

    Flux names2Flux = Flux.fromArray(names2);

    Flux combined = Flux.concat(namesFlux, names2Flux);

    combined.subscribe(new GenericSubscriber());

    ```


    And another thing that you might like, remember how the `IntPublisher` class had
    to be slowed down using a `Thread.sleep(1000)` call? With `Flux` you do not need
    to do that, because there are two utility methods that combined lead to the same
    behavior.


    ```java

    Flux infiniteFlux = Flux.fromStream(

    Stream.generate(() -> random.nextInt(150))

    );

    Flux delay = Flux.interval(Duration.ofSeconds(1));

    Flux delayedInfiniteFlux = infiniteFlux.zipWith(delay, (s,l) -> s);

    delayedInfiniteFlux.subscribe(new GenericSubscriber());

    ```


    The `interval(..)` method creates a publisher that emits long values starting
    with 0 incrementing at specified time intervals on the global timer. It receives
    an argument of type `Duration`. In the previous example, seconds were used. The
    `zipWith(..)` method zips the `Flux` instance received as a parameter. The *zip*
    operation is a specific stream operation that translates as both publishers emitting
    one element and combining these elements using a `java.util.function.BiFunction<T,
    U, R>`. In our case, the function discards the seconds element, and returns the
    elements of the calling stream slowed down by the generated seconds of the stream
    given as an argument.


