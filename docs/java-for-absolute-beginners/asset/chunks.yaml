    但按钮只是被扔进窗口并默认居中放置，因为没有编写代码来定位它。JavaFX 支持以类似于 Swing 的方式在窗口中排列节点^(⁸⁴)，但 JavaFX 提供了支持多种不同布局样式的布局面板。JavaFX
    中与带有 `BorderLayout` 管理器的 `JPane` 等价的内置布局名为 `BorderPane`。`BorderPane` 提供了五个区域来放置节点，其分布方式与
    `BorderLayout` 类似，但名称不同。让我们编写代码将按钮放置在底部区域的右角，然后进一步讨论。


    ```

