- fmt: 'Do you have any idea what those characters might be? It’s ok if you have no
    idea, I did not either the first time I had to use `FileInputStream` to read a
    file. Those characters appear there because the file size is not a multiple of
    1024, so the `FileInputReader` ends up filling the rest of the last buffer with
    zeroes. A fix for this involves computing the size of the file in bytes and making
    sure we adapt the `byte[] buffer` size accordingly. You can try doing that as
    an exercise if you are in the mood for some coding. And now that we’ve shown you
    how to read file in a lot of ways, we can continue by showing you how to write
    files, since you already know how to create them.


    In Java 11, the `InputStream` was also enriched with a method that returns an
    `InputStream` that does nothing named `nullInputStream()` method, for testing
    purposes.


    ## Writing Files


    Writing files in Java is similar to reading them, only different classes have
    to be used because streams are unidirectional, which means that a stream that
    is used for reading data cannot be used for writing data as well. Almost for any
    class or method of reading files there is one for writing files. Without further
    ado, let’s start.


    ### Writing Files Using `Files` Utility Methods


    For smaller files, when we just need to write a bunch of bytes, the `Files.write(Path,
    byte[])` works fine.


    ```

    package com.apress.bgn.ch11.writing;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    import java.io.IOException;

    import java.nio.file.Files;

    import java.nio.file.Path;

    public class FilesWritingDemo {

    private static final Logger log =

    LoggerFactory.getLogger(FilesWritingDemo.class);

    public static void main(String... args) {

    File file = new File(

    "chapter11/read-write-file/src/main/resources/output/vultures.txt");

    byte[] data = "Some of us, we''re hardly ever here".getBytes();

    try {

    Path dataPath = Files.write(file.toPath(), data);

    log.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    If the file already exists, the contents are simply overwritten.


    In Java 11, the `Files.writeString(..)` method was introduced, which allows specifying
    a `Charset` when writing a `String` instance to a file; no conversion to bytes
    needed either.


    ```

    try {

    Path dataPath = Files.writeString(file.toPath(),

    "Some of us, we''re hardly ever here",

    StandardCharsets.UTF_8);

    log.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    ```


    There are three `Files.write(..)` methods in the `Files` class: the one used in
    the previous code snippet and two that can write collections of text values represented
    by any instance of type that extends `CharSequence`. The only difference between
    the two is that one of them also takes `Charset` as an argument.


    ```

    package com.apress.bgn.ch11.writing;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.File;

    import java.io.IOException;

    import java.nio.charset.StandardCharsets;

    import java.nio.file.Files;

    import java.nio.file.Path;

    import java.util.List;

    public class FilesWritingDemo {

    private static final Logger log =

    LoggerFactory.getLogger(FilesWritingDemo.class);

    public static void main(String... args) {

    List dataList =  List.of("Some of us, we''re hardly ever here",

    "The rest of us, we''re born to disappear",

    "How do I stop myself from",

    "Being just a number?");

    try {

    File file2 = new File(

    "chapter11/read-write-file/src/main/resources/output/vultures2.txt");

    Path dataPath = Files.write(file2.toPath(),  dataList,

    StandardCharsets.UTF_8);

    log.info("String written to {}", dataPath.toAbsolutePath());

    } catch (IOException e) {

    e.printStackTrace();

    }

    }

    }

    ```


    And those are all the methods in the `Files` class that are used for writing files
    available in the `Files` class. Next, we look into writing files using classes
    in the `Writer` hierarchy.


    ### Using Writers to Write Files


    Similar to the `Reader` hierarchy for reading files, there is an abstract class
    named `Writer`, but before we get to that let’s introduce the `BufferedWriter`,
    the correspondent of `BufferedReader` for writing files. This class too has an
    internal buffer, and when write methods are called, the arguments are stored into
    the buffer, and when the buffer is full, its contents are written to the file.
    The buffer can be emptied earlier by calling the `flush()` method. I definitely
    recommend calling this method explicitly before calling `close()` to make sure
    all output was written to the file. The next code snippet depicts how a list of
    `String` instances is written to a file.


    ```

    package com.apress.bgn.ch11.writing;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.BufferedWriter;

    import java.io.File;

    import java.io.FileWriter;

    import java.io.IOException;

    import java.util.List;

    public class FilesWritingDemo {

    private static final Logger log =

    LoggerFactory.getLogger(FilesWritingDemo.class);

    public static void main(String... args) {

    File file = new File(

    "chapter11/read-write-file/src/main/resources/output/vultures.txt");

    List lyricList =  List.of("Some of us, we''re hardly ever here",

    "The rest of us, we''re born to disappear",

    "How do I stop myself from",

    "Being just a number?");

    BufferedWriter writer = null;

    try {

    writer = new BufferedWriter(new FileWriter(file));

    for (String lyric : lyricList) {

    writer.write(lyric);

    writer.newLine();

    }

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    } finally {

    if(writer!= null) {

    try {

    writer.flush();

    writer.close();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    }

    }

    }

    }

    ```


    Writing files is a sensitive operation, and the code contraption introduced earlier
    can fail for many reasons. That type of code is what you would write before Java
    1.7, when `try-with-resources` reduced the boilerplate.


    ```

    try (final BufferedWriter wr = new BufferedWriter(new FileWriter(file))){

    lyricList.forEach(lyric -> {

    try {

    wr.write(lyric);

    log.info("Something went wrong! ", e);wr.newLine();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    });

    wr.flush();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    The only real simplification that can be done is by calling `Files.newBufferedWriter(..)`
    to avoid instantiating the `BufferedWriter` explicitly. This also adds in the
    advantage of deciding the charset of the file to be written.


    ```

    try (final BufferedWriter wr = Files.newBufferedWriter(file.toPath(),

    StandardCharsets.UTF_8)){

    lyricList.forEach(lyric -> {

    try {

    wr.write(lyric);

    wr.newLine();

    } catch (IOException e) {

    e.printStackTrace();

    }

    });

    wr.flush();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    If we did not have the `Files.newBufferedWriter(..)` method, writing text values
    using a given charset would only be possible by using a different `Writer` class,
    the `OutputStreamWriter`.


    ```

    try (final OutputStreamWriter wr = new OutputStreamWriter(

    new FileOutputStream(file), StandardCharsets.UTF_8)){

    lyricList.forEach(lyric -> {

    try {

    wr.write(lyric);

    wr.write("\n");

    } catch (IOException e) {

    e.printStackTrace();

    }

    });

    wr.flush();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```


    If the file already exists, calling the `write(..)` method overrides the contents
    of the file. But this is not always needed, sometimes we just need to append new
    text to an existing file. `BufferedWriter` provides the `append()` method to do
    that.


    ```

    try (final BufferedWriter wr = Files.newBufferedWriter(file.toPath(),

    StandardCharsets.UTF_8)){

    lyricList.forEach(lyric -> {

    try {

    wr.append(lyric);

    wr.append("\n");

    } catch (IOException e) {

    e.printStackTrace();

    }

    });

    wr.flush();

    } catch (IOException e) {

    log.info("Something went wrong! ", e);

    }

    ```'
