  trans: '

    ### 原始类型流与字符串流


    当我们首次创建原始类型流时，我们使用了一个 `int[]` 数组作为数据源。但原始类型流也可以通过其他方式创建，因为 *Stream API* 包含了更多带有默认方法的接口，使得流式编程更加实用。图
    8-1 展示了 `Stream` 的层级结构。`IntStream` 接口可用于创建整数的原始类型流。该接口提供了多种方法来实现这一点，其中一些方法继承自
    `BaseStream`。可以通过现场指定几个值来创建 `IntStream` 实例，例如使用 `builder()`、`generate()` 或 `iterate()`
    方法，或者使用 `of` 方法，如下所示。


    ![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig1_HTML.jpg](img/463938_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Stream API 接口


    ```

    IntStream intStream0 = IntStream.builder().add(0).add(1).add(2).add(5).build();

    IntStream intStream1 = IntStream.of(0,1,2,3,4,5);

    ```


    可以通过将区间的起始和结束值作为参数传递给 `range()` 和 `rangeClosed()` 方法来创建 `IntStream` 实例。这两种方法都会以步长
    1 生成流中的元素，只有 `rangeClosed()` 方法会包含区间的上限值。


    ```

    intStream2 = IntStream.range(0, 10);

    intStream3 = IntStream.rangeClosed(0, 10);

    ```


    此外，在 Java 1.8 中，`java.util.Random` 类新增了一个名为 `ints` 的方法，用于生成随机整数的流。该方法声明了一个参数，表示要生成并放入流中的元素数量，但该方法还有一种不带参数的形式，用于生成无限流。


    ```

    Random random = new Random();

    intStream = random.ints(5);

    ```


    所有为 `IntStream` 提及的方法都可以生成 `LongStream` 实例，因为该接口中定义了等效的方法。`DoubleStream` 没有区间方法，但提供了
    `of()` 方法、`builder()`、`generate()` 等。同样，在 Java 1.8 中，`java.util.Random` 类新增了 `doubles()`
    方法，用于生成随机双精度浮点数的流。该方法声明了一个参数，表示要生成并放入流中的元素数量，但该方法还有一种不带参数的形式，用于生成无限流。以下代码片段展示了创建双精度浮点数流的几种方式。


    ```

    DoubleStream doubleStream0 = DoubleStream.of(1, 2 , 2.3, 3.4, 4.5, 6);

    Random random = new Random();

    DoubleStream doubleStream1 = random.doubles(3);

    DoubleStream doubleStream2 = DoubleStream.iterate(2.5, d -> d = d + 0.2).limit(10);

    ```


    对于 `char` 值的流，没有专门的接口，但使用 `IntStream` 完全可以胜任。


    ```

    IntStream intStream = IntStream.of(''a'',''b'',''c'',''d'');

    intStream.forEach(c -> System.out.println((char) c));

    ```


    另一种创建 `char` 值流的方法是使用 `String` 实例作为流数据源。


    ```

    IntStream charStream = "sample".chars();

    charStream.forEach(c -> System.out.println((char) c));

    ```


    在 Java 8 中，`java.util.regex.Pattern` 也新增了流相关的方法；作为一个用于处理 `String` 实例的类，它自然是添加这些方法的合适位置。可以使用
    `Pattern` 实例来拆分现有的 `String` 实例，并通过 `splitAsStream(..)` 方法将拆分后的片段作为流返回。


    ```

    Stream stringStream = Pattern.compile(" ")

    .splitAsStream("live your life");

    ```


    文件的内容也可以使用 `Files.lines(..)` 工具方法作为字符串流返回。


    ```

    String inputPath = "chapter08/src/main/resources/songs.csv";

    Stream stringStream = Files.lines(Path.of(inputPath));

    ```


    到目前为止，这些章节已经向你展示了如何创建所有类型的流；接下来的章节将向你展示如何使用它们来处理数据。


    ### ！


    如果你觉得需要将流实例与真实对象关联起来才能更好地理解它们，我建议如下：将有限流（例如从集合创建的流）想象成倾斜杯子时滴落的水滴。杯子里的水最终会流尽，但在水滴落的过程中，它们形成了一股水流。无限流则像一条有源头的小河，它源源不断地流淌。（当然，除非严重的干旱使河流干涸）

    '
- fmt: '### A Short Introduction to Optional


    The `java.util.Optional<T>` instances are the Schrödinger^([^(63)](#fn63)) boxes
    of the Java Language. They are very useful because they can be used as a return
    type for methods to avoid returning a `null` value, and cause either a possible
    `NullPointerException` to be thrown, or the developer using the method to write
    extra code to treat the possibility of an exception being thrown. `Optional<T>`
    instances can be created in similar way to streams.


    There is an `empty()` method for creating an optional value of any type that does
    not contain anything.


    ```

    Optional empty = Optional.empty();

    ```


    There is an `of()` method used to wrap an existing object into an `Optional<T>`.


    ```

    Optional value = Optional.of(5L);

    ```


    Considering that these type of instances were designed to not allow `null` values
    and the way the `Optional<T>` instance was created previously, what would stop
    us to write something like the following?


    ```

    Song song = null;

    Optional nullable = Optional.of(song);

    ```


    The compiler wouldn’t, but when the code is executed at runtime, a `NullPointerException`
    is thrown. Still, if we really need an `Optional<T>` instance to permit `null`
    values, it is possible, there’s an utility method was introduced in Java 9 just
    for that.


    ```

    Song song = null;

    Optional  nullable = Optional.ofNullable(song);

    ```


    Now that we have `Optional<T>` instances, what can we do with them? We use them.
    Let’s take a look at the following code.


    ```

    package com.apress.bgn.ch8;

    import com.apress.bgn.ch8.util.MediaLoader;

    import com.apress.bgn.ch8.util.Song;

    import java.util.List;

    public class OptionalDemo {

    public static void main(String... args) {

    List songs = MediaLoader.loadSongs();

    song = findFirst(songs, "B.B. King");

    if(song != null && song.getSinger().equals("The Thrill Is Gone")) {

    System.out.println("Good stuff!");

    } else {

    System.out.println("not found!");

    }

    }

    public static Song findFirst(List songs, String singer) {

    for (Song song: songs) {

    if (singer.equals(song.getSinger())) {

    return song;

    }

    }

    return null;

    }

    }

    ```


    The `findFirst(..)` method looks for the first song in the list that has the singer
    equal to “B.B. King”, returns it and prints a message if found, and another if
    not. You can notice the nullability test and iteration of the list. In Java 8,
    both of them are no longer necessary.


    ```

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    opt.ifPresent(r -> System.out.println(r.getTitle()));

    ```


    If the `Optional<T>` instance is not empty, the song title is printed, otherwise,
    nothing is printed, and the code continues from that point on without an exception
    being thrown. But what if we want to print something when the `Optional<T>` instance
    is empty? In Java 11, we can do something about that, because a method named `isEmpty()`
    was introduced to test the `Optional<T>` instance contents.


    ```

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    if(opt.isEmpty()) {

    System.out.println("Not found!");

    }

    ```


    But wait, this is a little bit... not right. Can’t we have a method to call on
    an `Optional<T>` to get the exact behavior as an `if-else` statement? Well, that
    was possible starting with Java 9; the `ifPresentOrElse(..)` that takes as arguments
    a consumer to process the contents of the `Optional<T>` instance when is not empty
    and a `Runner` instance to execute when the `Optional<T>` instance is empty.


    ```

    Optional opt = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger())).findFirst();

    opt.ifPresentOrElse(

    r -> System.out.println(r.getTitle()),

    () -> System.out.println("Not found!")) ;

    ```


    If the `Optional<T>` instance is not empty, its contents can be extracted by calling
    the `get()` method.


    ```

    Optional opt2 = songs.stream()

    .filter(ss -> "Rob Thomas".equals(ss.getSinger()))

    .findFirst();

    System.out.println("Found Song " + opt2.get());

    ```


    The code does not print anything when the desired object is not found. But if
    we want to print a default value for example, we can do that as well using a method
    named `orElse()`.


    ```

    Optional opt = songs.stream()

    .filter(ss -> "B.B. King".equals(ss.getSinger()))

    .findFirst();

    opt.ifPresent(r -> System.out.println(r.getTitle()));

    Song defaultSong = new Song();

    defaultSong.setTitle("Untitled");

    Song s = opt.orElse (defaultSong);

    System.out.println("Found: " + s.getTitle());

    ```


    If we were interested to throw a specific exception when the `Optional<T>` is
    empty, there is a method for that as well, named `orElseThrow(..)`


    ```

    Optional opt = songs.stream()

    .filter(s -> "B.B. King".equals(s.getSinger()))

    .findFirst();

    Song song = opt.orElseThrow(IllegalArgumentException::new);

    ```


    As you probably noticed in the code samples, `Optional<T>` and `Stream<T>` can
    be combined to write practical code to solve complex solutions. As there are a
    lot of methods that can be applied to `Optional<T>` and `Stream<T>` instances
    as well, the next sections introduce them for streams and randomly make reference
    to `Optional<T>` as well.'
