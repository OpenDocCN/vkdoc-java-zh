    方法被重复调用。每个方法都有自己的栈，用于保存在该方法上下文中创建的对象的引用，在本例中就是 `Singer` 实例。这个引用被用来打印在该方法体内创建的
    `Singer` 实例的名称。然后方法结束，但并未返回该引用。这意味着创建的实例不再需要，因为它仅在此方法的上下文中使用。当 `genSinger()` 方法执行结束时，对
    `Singer` 实例的引用会从栈中丢弃。`Singer` 实例仍然存在于堆内存中，但程序已无法再访问它，因此它对程序来说也不再必要。它现在占据着一个内存块，其中包含其自身内容以及指向其他实例的引用，在本例中，这些引用指向一个
