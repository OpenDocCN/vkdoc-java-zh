    ### ！


    现在，请先让这句话深入脑海：**一个** **public 类** **对所有类在任何位置都是可见的**。


    不使用访问修饰符的选项被称为使用 `default` 或 `package-private` 修饰符。^((40)) 这意味着，如果一个类没有访问修饰符，那么该类仅对定义在同一个包中的类可见。没有访问修饰符的类可以定义在任何
    Java 文件中，可以是与文件名同名的文件，也可以紧邻着为文件命名的那个类。因此，如果我们像下面的代码片段所示，在 `Base.java` 文件中声明一个名为
    `HiddenBase` 的类，那么在 `Main` 类中尝试创建此类型的对象是不可能的，因为该类位于不同的包中。


    ```

    package com.apress.bgn.ch0;

    public class Base {

    ...

    }

    class HiddenBase{

    // 在包外部你看不到我

    }

    ```


    当然，你可以编写代码，但 Java 编译器不会编译它，因此也没有字节码可以执行。此外，智能的 Java 编辑器会通过将你的代码标红，并在你编写时拒绝提供任何代码辅助，来非常清晰地指出你的错误。图
    3-6 展示了 IntelliJ IDEA 如何试图告诉我，我在尝试访问一个 `package-private` 类时做错了。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig6_HTML.jpg](img/463938_1_En_3_Fig6_HTML.jpg)


    图 3-6


    IntelliJ IDEA 提示访问 package-private 类会导致编译错误


    在同一张图中，包含这两个类的文件被一个矩形框出，以吸引你注意编辑器是如何清晰地表明这两个类定义在同一个 Java 文件中。


    ### ！


    现在，请先接受这个说法并让它深入脑海：**一个没有访问修饰符的类，对同一个包中的所有类都是可见的**。


    在类内部，定义了类的成员：字段和方法。^((41)) 访问修饰符也可以应用于类成员，并且在成员级别，还可以应用另外两个修饰符：`private` 和 `protected`。在成员级别，访问修饰符具有以下影响。


    *   `public`：与顶层相同，该成员可以从任何位置访问。


    *   `private`：该成员只能从其自身的类内部访问。


    *   `protected`：该成员只能从其自身的包内部，或者由另一个包中该类的任何子类^((42))访问。


    *   `none`：该成员只能从其自身的包内部访问。


    如果这看起来很复杂，那只是在你开始编写代码并习惯它之前的感觉。在 Oracle 官方文档页面上，有一个成员可见性的表格，本书在此将其展示为表 3-1。^((43))


    表 3-1


    成员级别访问器


    | 修饰符 | 类 | 包 | 子类 | 全局 |

    | --- | --- | --- | --- | --- |

    | public | 是 | 是 | 是 | 是 |

    | protected | 是 | 是 | 是 | 否 |

    | none（也称为 default/package-private） | 是 | 是 | 否 | 否 |

    | private | 是 | 否 | 否 | 否 |


    在你开始编写 Java 代码后，你可能会回过头来查看这个表格一两次。在引入模块之后，此表格中的所有内容仍然有效，当然，前提是你正确配置了模块访问。![../images/463938_1_En_3_Chapter/463938_1_En_3_Figa_HTML.jpg](img/463938_1_En_3_Figa_HTML.jpg)


    ### 引入模块


    从 Java 9 开始，引入了一个新概念：**模块**。它们用于对包进行分组和封装。这个新概念的实施耗时超过十年。关于模块的讨论始于 2005 年，并提议在
    Java 7 中实现。在 **Project Jigsaw** 的名称下，探索阶段于 2008 年开始。Java 开发者曾希望模块化 JDK 能在 Java
    8 中可用，但最终在 Java 9 中才得以实现，这经过了三年工作（以及近七年的分析）。显然，这就是 Java 9 的官方发布日期推迟到 2017 年 9
    月的原因。^((44))


    模块代表了一种聚合包的新方式。**模块**是一种对包进行分组并配置对包内容更细粒度访问的方法。


    **模块**是一个唯一命名的、可重用的包和资源（XML 文件）组，由一个名为 `module-info.java` 的文件描述。该文件包含以下信息：


    *   模块的名称

    *   模块的依赖项（即，此模块依赖的其他模块）

    *   它明确提供给其他模块的包（模块中所有其他包隐式地不对其他模块可用）

    *   它提供的服务

    *   它消费的服务

    *   允许哪些其他模块进行反射

    *   本地代码

    *   资源

    *   配置数据


    理论上，模块命名类似于包命名，并遵循反向域名约定。实践中，请确保模块名称不包含任何数字，并且能清晰表明其用途。`module-info.java` 文件被编译成一个**模块描述符**，这是一个名为
    `module-info.class` 的文件，它与类一起被打包到一个普通的旧 JAR 文件中。该文件位于根源码目录中，在任何包之外。对于前面介绍的示例，添加了一个
    `module-info.java`，新的项目结构如图 3-7 所示。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig7_HTML.jpg](img/463938_1_En_3_Fig7_HTML.jpg)


    图 3-7


    Java 9 项目的结构


    与任何扩展名为 `*.java` 的文件一样，`module-info.java` 会被编译成一个 `*.class` 文件。由于模块声明不是 Java 对象类型声明的一部分，`module`
    不是一个 Java 关键字，因此在为 Java 对象类型编写代码时仍然可以使用它。对于 `package`，情况则不同，因为每个 Java 对象类型声明都必须以包声明开头。看一下
    `SimpleReader` 类，声明如下。


    ```

    package com.apress.bgn.ch3;

    public class SimpleReader {

    private String source;

    ...

    }

    ```


    那么，这实际上意味着什么？模块在哪里，它是什么？嗯，在由单个包含源码的根目录组成的简单项目中，模块不必在物理上划分或组织源码。^((45)) 它们由 `module-info.java`
    文件的内容定义。因此，从 Java 9 开始，图 3-4 中所示的内容演变为图 3-8。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig8_HTML.jpg](img/463938_1_En_3_Fig8_HTML.jpg)


    图 3-8


    从 Java 9 开始的 Java 构建块


    在图 3-8 中，无需为 JAR1 和 JAR2 中的模块创建目录。对于 JAR3，同一个 JAR 中归档了两个模块；在这种情况下，我们需要显式地分离它们的源码。这样做的原因是需要有两个
    `module-info.java` 文件，而显然没有操作系统允许同一个目录中有两个同名文件。此类项目的一个示例在**附录**中介绍，该附录作为本书源代码下载的一部分提供（[`​github.​com/​apress/​java-for-absolute-beginners`](https://github.com/apress/java-for-absolute-beginners)）。

