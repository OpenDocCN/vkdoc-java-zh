  trans: '

    ### Java 标识符


    **标识符**是你为 Java 中的项目（如类、变量、方法等）所起的名称。标识符必须遵守一些规则才能让代码通过编译，同时也要遵循称为 **Java 编码规范**
    的常识性编程规则。以下列出其中几条：


    *   标识符不能是 Java 的保留字，否则代码将无法编译

    *   标识符不能是布尔字面量（`true, false`）或 `null` 字面量，否则代码将无法编译

    *   标识符可以由字母、数字以及 `_`、`$` 组成

    *   开发者应遵循驼峰命名法来声明标识符，这是一种编写复合词或短语的实践，使得短语中间每个单词或缩写都以大写字母开头，中间没有空格或标点，确保标识符名称中间每个单词或缩写都以大写字母开头（例如，`StringBuilder`、`isAdult`）


    **变量**是一组可以与值相关联的字符。它有一个类型。可以赋给它的值被限制在某个特定的值区间或必须遵循该类型定义的特定形式。例如，第 11 行声明的 `items`
    是一个类型为 `List` 的变量。


    在 Java 中，有三种类型的变量。


    *   **字段** 是在类体中、方法体外定义的变量，并且它们前面没有关键字 `static`

    *   **局部变量** 是在方法体内声明的变量，它们仅在该上下文中有效

    *   **静态变量** 是在类体内声明的变量，并且它们前面有关键字 `static`。如果它们被声明为 public，则可以在全局范围内访问。


    ### Java 注释


    Java 注释指的是解释性文本片段，它们不是所执行代码的一部分，并且会被编译器忽略。在 Java 中，根据用于声明注释的字符不同，有三种在代码中添加注释的方式。


    *   `//` 用于单行注释（第 10 行）

    *   `/** ... */` Javadoc 注释，是一种特殊的注释，可以使用特殊工具将其导出到名为 Javadoc API 的项目文档中（第 05 到
    07 行）

    *   `/* ... */` 用于多行注释（第 13 到 15 行）


    ## Java 对象类型


    在**第** 3 章介绍 Java 构建块时，为了简单起见，只提到了类。当时提到 Java 中还有其他对象类型。**对象类型** 这个表述实际上并不准确，在本节中，事情会变得更清晰。


    类是创建对象的模板。基于类创建对象的过程称为**实例化**，生成的对象被称为**该类的一个实例**。实例之所以被称为**对象**，是因为默认情况下，如果开发者编写的类没有声明其他超类，它会隐式地继承类
    `java.lang.Object`。因此，下面的类声明


    ```

    package com.apress.bgn.ch4.basic;

    public class Sample {

    }

    ```


    等价于


    ```

    package com.apress.bgn.ch4.basic;

    public class Sample extends Object {

    }

    ```


    另外，请注意，不需要导入 `java.lang` 包，因为 `Object` 类是 Java 层次结构的根类，所有类（包括数组）都必须能够继承它。因此，`java.lang`
    包也是隐式导入的。


    但是，除了类之外，Java 中还有其他可用于创建对象的模板类型。以下各节将介绍它们并解释它们的用途。不过，让我们在上下文中进行说明。


    让我们创建一组用于定义人类的模板。大多数 Java 教程都使用车辆或几何形状的模板。我想建模一些任何人都能轻松理解和关联的东西。以下各节的目标是开发用于建模不同类型人群的
    Java 模板。到目前为止，我解释过的唯一 Java 模板是类，那么我们就从它继续。


    ### 类


    创建实例的操作称为**实例化**。因此，要设计一个建模通用人类的类，我们应该考虑两件事：人类特征和人类行为。那么，所有人类有什么共同点呢？嗯，有很多，但就本节而言，让我们选择三个通用属性：姓名、年龄和身高。这些属性在
    Java 类中映射为称为**字段**或**属性**的变量。


    #### 字段


    所以，我们的类看起来像这样（初始版本）：


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    String name;

    int age;

    float height;

    }

    ```


    在代码示例中，**字段**具有不同的类型，具体取决于应该与它们关联的值。例如，`name` 可以与文本值（如 "John"）关联，而文本在 Java 中用
    `String` 类型表示。`age` 可以与数字整数值关联，因此类型为 `int`。就本节而言，我们假设一个人的身高是一个有理数，例如 1.9，因此我们使用了用于此类值的特殊
    Java 类型：`float`。


    所以，现在我们有了一个对人类的一些基本属性进行建模的类。我们如何使用它？我们需要一个 `main()` 方法，并且需要实例化该类。在下一个代码片段中，创建了一个名为
    John 的人类。


    ```

    package com.apress.bgn.ch4.basic;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human human = new Human();

    human.name = "John";

    human.age = 40;

    human.height  =  1.91f;

    }

    }

    ```


    要创建一个 `Human` 实例，我们使用 `new` 关键字。接下来，我们调用一个称为 `构造器` 的特殊方法。我之前介绍过方法，但这个很特殊。（有些程序员甚至不认为它是一个方法。）最明显的原因是它没有在
    `Human` 类的任何地方定义。那么，它是从哪里来的呢？嗯，它是一个默认构造器，由编译器自动生成，除非显式声明了一个。一个类不能没有构造器；否则，它无法被实例化。这就是为什么如果没有显式声明构造器，编译器会生成一个。默认构造器调用
    `super()`，它会调用 `Object` 的无参构造器，该构造器将所有字段初始化为默认值。这可以通过以下示例进行测试。


    ```

    package com.apress.bgn.ch4.basic;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human human = new Human();

    System.out.println("name: " + human.name);

    System.out.println("age:  " +  human.age);

    System.out.println("height: " + human.height);

    }

    }

    ```


    你认为运行上述代码会发生什么？如果你认为会打印出一些默认值（中性值），那么你完全正确。以下是上述代码的输出。


    ```

    name: null

    age: 0

    height: 0.0

    ```


    数值变量被初始化为 0，`String` 值被初始化为 `null`。原因是数值类型是原始数据类型，而 `String` 是对象数据类型。`String`
    类是 `java.lang` 包的一部分，它是预定义的 Java 类之一，用于创建 `String` 类型的对象。它是一种表示文本对象的特殊数据类型。我们将在下一章更深入地探讨数据类型。

    '
- fmt: '### Class Variables


    Aside attributes that are specific to each human in particular, all humans have
    something in common: a lifespan, which is assumed to be 100 years. It would be
    redundant to declare a field called `lifespan`, because it has to be associated
    with the same value for all human instances. So, we declare a field using the
    `static` keyword in the `Human` class, which has the same value for all `Human`
    instances and that is initialized only once. And we can go one step further and
    make sure that value never changes during the execution of the program by adding
    the `final` modifier in front of its declaration as well. This way we created
    a special type of variable called a **constant**. The new `Human` class looks
    like this:


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    static final int LIFESPAN = 100;

    String name;

    int age;

    float height;

    }

    ```


    The `LIFESPAN` variable is also called a **class variable**, because it is not
    associated with instances but with the class. This is clear in the following example.


    ```

    package com.apress.bgn.ch4.basic;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human john = new Human();

    john.name = "John";

    Human jane = new Human();

    jane.name = "Jane";

    System.out.println("John’s lifespan = " + john.LIFESPAN);

    System.out.println("Jane’s lifespan = " + jane.LIFESPAN);

    System.out.println("Human lifespan = " + Human.LIFESPAN);

    }

    }

    ```


    When the `main()` method of the preceding class is executed, the following is
    printed, which proves everything that was mentioned before.


    ```

    John''s lifespan = 100

    Jane''s lifespan = 100

    Human lifespan = 100

    ```


    ### Encapsulating Data


    The class we defined makes no use of access modifiers on the fields, which is
    not acceptable. Java is known as an object-oriented programming language (OOP),
    and thus, code written in Java must respect **the principles of OOP**. Respecting
    these coding principles ensures that the written code is of good quality and totally
    aligns with the fundamental Java style. One of the OOP principles is **encapsulation**.
    The encapsulation principle refers to hiding of data implementation by restricting
    access to it using special methods called **accessors (getters)** and **mutators
    (setters)**.


    Basically, any field of a class should have private access, and access to it should
    be controlled by methods that can be intercepted, tested, and tracked to see where
    they were called. Getters and setters are a normal practice to have when working
    so objects that most IDEs have a default options to generate them, including IntelliJ
    IDEA. Right-click inside the class body and select the **Generate** option to
    see all possibilities and select **Getters and Setters** to generate the methods
    for you. The menu is depicted in Figure [4-3](#463938_1_En_4_Chapter.xhtml#Fig3).


    After making the fields private, and generating the getters and setter the `Human`
    class now looks like this:


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    static final int LIFESPAN = 100;

    private String name;

    private int age;

    private float height;

    public String getName() {

    return name;

    }

    public void setName(String name) {

    this.name = name;

    }

    public int getAge() {

    return age;

    }

    public void setAge(int age) {

    this.age = age;

    }

    public float getHeight() {

    return height;

    }

    public void setHeight(float height) {

    this.height = height;

    }

    }

    ```


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig3_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    IntelliJ IDEA code generation menu. Generate... ➤ Getter and Setter submenu


    So, you may be wondering what `this` is. As the word says, it is a reference to
    the current object. So, `this.name` is the value of the field `name` of the current
    object. Inside the class body, `this` accesses fields for the current object,
    when there are parameters in methods that have the same name. And as you can see,
    the setters and getters that IntelliJ IDEA generates have parameters that are
    named the same as the fields.


    Getters are the simplest methods declared without any **parameter**. They return
    the value of the field they are associated with. Their naming convention uses
    the `get` prefix and the name of the field they access, with the first letter
    uppercased.


    Setters are methods that return nothing. They declare as a parameter a variable
    with the same type that needs to be associated to the field. Their names are made
    of the `set` prefix and the name of the field they access, with its first letter
    uppercased. Figure [4-4](#463938_1_En_4_Chapter.xhtml#Fig4) depicts the setter
    and getter for the `name` field.


