    public class Base {

    ...

    }

    class HiddenBase{

    // you cannot see me outside the package

    }

    ```


    当然，你可以编写代码，但 Java 编译器不会编译它，因此也没有字节码可执行。此外，智能的 Java 编辑器会通过将代码标红并拒绝在编写时提供任何代码辅助，非常清晰地指出你的错误。图
