- fmt: '### Java Identifiers


    An **identifier** is the name you give to an item in Java: a class, variable,
    method, and so forth. Identifiers must respect a few rules to allow the code to
    compile and also common-sense programming rules, called **Java coding conventions**.
    A few of them are listed below:


    - an identifier cannot be one of the Java reserved words, or the code will not
    compile

    - an identifier cannot be a boolean literal (`true`, `false`) or the `null` literal,
    or the code will not compile

    - an identifier can be made of letters, numbers and any of `_`, `$`

    - developers should declare their identifiers following the Camel case writing
    style, the practice of writing compound words or phrases such that each word or
    abbreviation in the middle of the phrase begins with a capital letter, with no
    intervening spaces or punctuation, making sure each word or abbreviation in the
    middle of the identifier name begins with a capital letter (e.g., `StringBuilder`,
    `isAdult`)


    A **variable** is a set of characters that can be associated with a value. It
    has a type. The set of values that can be assigned to it are restricted to a certain
    interval group of values or must follow a certain form defined by that type. For
    example, `items` declared in line 11 is a variable of type `List`.


    In Java, there are three types of variables.


    - **fields** are variables defined in class bodies, outside of method bodies and
    that do not have the keyword `static` in front of them

    - **local variables** are variables declared inside method bodies, they are relevant
    only in that context

    - **static variables** are variables declared inside class bodies with the keyword
    `static` in front of them. If they are declared as public they are accessible
    globally.


    ### Java Comments


    Java comments refer to pieces of explanatory text that are not part of the code
    executed and are ignored by the compiler. There are three ways to add comments
    within the code in Java, depending on the characters used to declare them.


    - `//` is used for single line comments (line 10)

    - `/** ... */` Javadoc comments, special comments that are exported using special
    tools into the documentation of a project called Javadoc API (lines 05 to 07)

    - `/* ... */` used for multiline comments (lines 13 to 15)


    ## Java Object Types


    When introducing the Java building blocks in **Chapter** [3](#463938_1_En_3_Chapter.xhtml),
    only class was mentioned to keep things simple. It was mentioned that there are
    other object types in Java. The expression **object type** is not really accurate
    and in this section, things become clearer.


    Classes are templates for creating objects. Creating an object based on a class
    is called **instantiation** and the resulted object is referred to as **an instance
    of that class**. Instances are called **objects** because by default any class
    written by a developer implicitly extends class `java.lang.Object` if no other
    superclass is declared. So, the following class declaration


    ```

    package com.apress.bgn.ch4.basic;

    public class Sample {

    }

    ```


    is equivalent to


    ```

    package com.apress.bgn.ch4.basic;

    public class Sample extends Object {

    }

    ```


    Also, notice how importing the `java.lang` package is not necessary, because the
    `Object` class is the root class of the Java hierarchy, all classes (including
    arrays) must have access to extend it. And thus, the `java.lang` package is implicitly
    imported as well.


    But aside from classes, there are other template types that can be used for creating
    objects in Java. The following sections introduce them and explain what they are
    used for. But let’s do so in context.


    Let’s create a family of templates for defining humans. Most Java tutorials use
    templates for vehicles or geometrical shapes. I want to model something that anybody
    can easily understand and relate to. The purpose of the following sections is
    to develop Java templates that model different types of people. The only Java
    template that I’ve explained so far is the class, so let’s continue with that.


    ### Classes


    The operation through which instances are created is called **instantiation**.
    So, to design a class that models a generic human, we should think about two things:
    human characteristics and human actions. So, what do all humans have in common?
    Well, a lot, but for the purpose of this section, let’s choose three generic attributes:
    a name, age, and height. These attributes map in a Java class to variables called
    **fields** or **properties**.


    #### Fields


    So, our class looks like this (initially):


    ```

    package com.apress.bgn.ch4.basic;

    public class Human {

    String name;

    int age;

    float height;

    }

    ```


    In the code sample, the **fields** have different types, depending on which values
    should be associated with them. For example, `name` can be associated with a text
    value, like "John", and text is represented in Java by the `String` type. The
    `age` can be associated with numeric integer values, so is of type `int`. And
    for the purpose of this section, we’ve considered that the height of a person
    is a rational number like 1.9, so we used the special Java type for this kind
    of value: `float`.


    So, now we have a class modelling some basic attributes of a human. How do we
    use it? We need a `main()` method and we need to instantiate the class. In the
    next code snippet, a human named John is created.


    ```

    package com.apress.bgn.ch4.basic;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human human = new Human();

    human.name = "John";

    human.age = 40;

    human.height  =  1.91f;

    }

    }

    ```


    To create a `Human` instance, we use the `new` keyword. Next, we call a special
    method called a `constructor`. I’ve covered methods before, but this one is special.
    (Some programmers do not even consider it a method.) The most obvious reason for
    that is it wasn’t defined anywhere in the body of the `Human` class. So, where
    is it coming from? Well, it’s a default constructor that is automatically generated
    by the compiler unless an explicit one is declared. A class cannot exist without
    a constructor; otherwise, it cannot be instantiated. That is why the compiler
    generates one if none was explicitly declared. The default constructor, calls
    `super()` that invokes the `Object` no argument constructor that initializes all
    fields with default values. This can be tested by the following example.


    ```

    package com.apress.bgn.ch4.basic;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human human = new Human();

    System.out.println("name: " + human.name);

    System.out.println("age:  " +  human.age);

    System.out.println("height: " + human.height);

    }

    }

    ```


    What do you think will happen when you run the previous code? If you think that
    some default values (neutral) printed, you are absolutely right. The following
    is the output of the previous code.


    ```

    name: null

    age: 0

    height: 0.0

    ```


    The numeric variables were initialized with 0, and the `String` value was initialized
    with `null`. The reason for that is that the numeric types are primitive data
    types and `String` is an object data type. The `String` class is part of the `java.lang`
    package, which is one of the predefined Java classes that creates objects of type
    `String`. It is a special data type that represents text objects. We’ll go deeper
    into data types in the following chapter.'
