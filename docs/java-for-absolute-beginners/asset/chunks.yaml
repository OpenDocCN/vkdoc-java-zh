    配置文件可以作为 VM 参数提供给程序，这意味着日志格式可以在外部配置。启动该类时，使用`-Dlogback.configurationFile=\temp\ext-logback.xml`作为
    VM 参数。


    Logback 也可以将输出定向到文件；我们只需使用`ch.qos.logback.core.FileAppender`类添加配置，并通过在`<root>`配置中添加`<appender>`元素将输出定向到文件即可。


