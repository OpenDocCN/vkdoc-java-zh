- fmt: '### Enums


    `enum`类型是一种特殊的类类型。它定义了一种只能被实例化固定次数的特殊类。枚举声明将所有该枚举的实例分组。它们都是常量。因此，`Gender`枚举可以如下面的代码所示进行定义。


    ```

    package com.apress.bgn.ch4.basic;

    public enum Gender {

    FEMALE,

    MALE,

    UNDEFINED

    }

    ```


    枚举不能在外部实例化。枚举默认是`final`的，因此不能被继承。还记得默认情况下Java中的每个类都隐式地继承`Object`类吗？Java中的每个枚举都隐式地继承`java.lang.Enum<E>`类，因此每个枚举实例都继承了在处理枚举时非常有用的特殊方法。


    由于枚举是一种特殊的类，它可以拥有字段和一个只能为`private`的构造方法，因为枚举实例不能在外部创建。`private`修饰符不需要显式声明，因为编译器知道该怎么做。让我们修改`Gender`枚举，添加一个表示每种性别数值的整数字段和一个表示文本描述的`String`字段。


    ```

    package com.apress.bgn.ch4.basic;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m") ,

    UNDEFINED(3, "u");

    private int repr;

    private String descr;

    Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    }

    ```


    但是等等，有什么能阻止我们声明setter并修改字段值呢？嗯，没什么。如果这正是你需要做的，你可以这样做。但**这不是一个好做法**。枚举实例应该是常量。因此，我们可以不创建setter，并通过将字段声明为`final`来确保它们的值永远不会改变。当我们这样做时，字段初始化的唯一方式就是通过调用构造方法，并且由于构造方法不能在外部调用，我们数据的完整性就得到了保证。因此，我们的`enum`变成了：


    ```

    package com.apress.bgn.ch4.basic;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m") ,

    UNDEFINED(3, "u");

    private final int repr;

    private final String descr;

    Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    }

    ```


    方法可以添加到枚举中，并且每个实例都可以重写它们。因此，如果我们向`Gender`枚举添加一个名为`getComment()`的方法，每个实例都会继承它。但实例可以重写它。让我们看看是什么样子。


    ```

    package com.apress.bgn.ch4.basic;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m") ,

    UNDEFINED(3, "u"){

    @Override

    public String comment() {

    return "to be decided later: " + getRepr() + ", " + getDescr();

    }

    };

    private final int repr;

    private final String descr;

    Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    public String comment() {

    return repr + ": " + descr;

    }

    }

    ```


    如果我们打印每个实例的`comment()`方法返回的值，我们会看到以下内容。


    ```

    package com.apress.bgn.ch4.basic;

    public class Sample extends Object {

    public static void main(String... args) {

    System.out.println(Gender.FEMALE.comment());

    // prints ''1: f''

    System.out.println(Gender.MALE.comment());

    // prints ''2: m''

    System.out.println(Gender.UNDEFINED.comment());

    //prints ''to be decided later: 3, u''

    }

    }

    ```


    我们将在未来的示例中继续使用枚举。只需记住，每当你需要将一个类的实现限制为固定数量的实例时，`enums`就是你的工具。现在，因为我们引入了枚举，我们的`Human`类也可以有一个`Gender`类型的字段。


    ```

    package com.apress.bgn.ch4.basic;

    public abstract class Human {

    public static final int LIFESPAN = 100;

    protected String name;

    protected int age;

    protected float height;

    private Gender gender;

    public Human(String name, int age, Gender gender) {

    this.name = name;

    this.age = age;

    this.gender = gender;

    }

    public Human(String name, int age, float height, Gender gender) {

    this(name, age, gender);

    this.height = height;

    }

    ...

    }

    ```


    在前面的章节中，**接口**被提及为用于创建对象的Java工具之一。现在是时候展开这个话题了。'
  raw: '### Enums


    The `enum` type is a special class type. It defines a special type of class that
    can only be instantiated a fixed number of times. An enum declaration, groups
    all instances of that enum. All of them are constants. So, the `Gender` enum can
    be defined as shown in the following piece of code.


    ```

    package com.apress.bgn.ch4.basic;

    public enum Gender {

    FEMALE,

    MALE,

    UNDEFINED

    }

    ```


    An enum cannot be instantiated externally. An enum is by default final, thus it
    cannot be extended. Remember how by default every class in Java implicitly extends
    class `Object`? Every enum in Java implicitly extends class `java.lang.Enum<E>`
    and in doing so, every enum instance inherits special methods that are useful
    when handling enums.


    As an enum is a special type of class, it can have fields and a constructor that
    can only be private, as enum instances cannot be created externally. The `private`
    modifier is not needed explicitly, as the compiler knows what to do. Let’s modify
    our `Gender` enum to add an integer field that is the numerical representation
    of each gender and a `String` field that is the text representation.


    ```

    package com.apress.bgn.ch4.basic;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m") ,

    UNDEFINED(3, "u");

    private int repr;

    private String descr;

    Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    }

    ```


    But wait, what would stop us from declaring setters and modifying the field values?
    Well, nothing. If that is what you need to do you can do it. But **this is not
    a good practice**. Enum instances, should be constant. So, what we can do is to
    not create setters, and make sure the values of the fields never change by declaring
    them `final`. When we do so, the only way the fields can be initialized is by
    calling the constructor, and since the constructor cannot be called externally,
    the integrity of our data is ensured. So, our `enum` becomes


    ```

    package com.apress.bgn.ch4.basic;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m") ,

    UNDEFINED(3, "u");

    private final int repr;

    private final String descr;

    Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    }

    ```


    Methods can be added to enums, and each instance can override them. So, if we
    add a method called `getComment()` to the `Gender` enum, every instance inherits
    it. But the instance can override it. Let’s see what that looks like.


    ```

    package com.apress.bgn.ch4.basic;

    public enum Gender {

    FEMALE(1, "f"),

    MALE(2, "m") ,

    UNDEFINED(3, "u"){

    @Override

    public String comment() {

    return "to be decided later: " + getRepr() + ", " + getDescr();

    }

    };

    private final int repr;

    private final String descr;

    Gender(int repr, String descr) {

    this.repr = repr;

    this.descr = descr;

    }

    public int getRepr() {

    return repr;

    }

    public String getDescr() {

    return descr;

    }

    public String comment() {

    return repr + ": " + descr;

    }

    }

    ```


    If we were to print the values returned by the `comment()` method for each instance,
    we would see the following.


    ```

    package com.apress.bgn.ch4.basic;

    public class Sample extends Object {

    public static void main(String... args) {

    System.out.println(Gender.FEMALE.comment());

    // prints ''1: f''

    System.out.println(Gender.MALE.comment());

    // prints ''2: m''

    System.out.println(Gender.UNDEFINED.comment());

    //prints ''to be decided later: 3, u''

    }

    }

    ```


    We’re going to be playing with enums in future examples as well. Just remember
    that whenever you need to limit the implementation of a class to a fixed number
    of instances, `enums` are the tools for you. And now because we introduced enums,
    our `Human` class can also have a field of type `Gender`.


    ```

    package com.apress.bgn.ch4.basic;

    public abstract class Human {

    public static final int LIFESPAN = 100;

    protected String name;

    protected int age;

    protected float height;

    private Gender gender;

    public Human(String name, int age, Gender gender) {

    this.name = name;

    this.age = age;

    this.gender = gender;

    }

    public Human(String name, int age, float height, Gender gender) {

    this(name, age, gender);

    this.height = height;

    }

    ...

    }

    ```


    In previous sections, **interfaces** were mentioned as one of the Java tools used
    to create objects. It is high time I expand the subject.'
