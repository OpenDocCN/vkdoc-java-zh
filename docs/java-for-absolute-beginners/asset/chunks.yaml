  trans: '

    在此代码示例中，如果将 `com.apress.bgn.ch9` 包的 SLF4J 配置设为 info，那么以 *Sorting an array with
    merge sort: ...* 开头的消息将不再生成或打印，因为 `log.isDebugEnabled()` 返回 `false`，因此 `if` 语句中的代码不再执行。`Logger`
    类针对所有日志级别都包含 `if..Enabled()` 方法。


    本节关于日志记录的内容就到此为止。请记住要适度使用日志，在循环中记录日志时要格外小心，对于大型应用，始终使用日志门面，即 SLF4J。


    ### 使用断言进行调试


    调试代码的另一种工具是使用断言。如果你还记得关于 Java 关键字的章节，可能还记得 `assert` 关键字。`assert` 关键字编写一条 `assertion`
    语句，用于测试你对程序执行的假设。在之前的示例中，我们让用户为排序程序提供输入，因此为了让程序正确运行，我们假设用户提供了正确的输入，即数组大小大于 1，因为对单个数字运行算法没有意义。那么，断言在代码中是什么样子的呢？答案在以下代码示例中。


    ```

    package com.apress.bgn.ch9;

    import com.apress.bgn.ch9.algs.IntSorter;

    import com.apress.bgn.ch9.algs.QuickSort;

    import java.util.Arrays;

    import static com.apress.bgn.ch9.SortingSlf4jDemo.getInts;

    public class AssertionDemo {

    public static void main(String... args) {

    int[] arr = getInts(args);

    assert arr.length > 1;

    IntSorter mergeSort = new QuickSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    System.out.println(sb2.toString());

    }

    }

    ```


    如果你在未向程序提供任何参数的情况下运行此代码，即使其中包含 `assertion` 语句，也不会发生任何事情。原因是断言需要使用 VM 参数 `-ea`
    来启用。要指定此参数，你可以在命令行执行时将其添加到命令中；但由于我们一直使用编辑器，你可以将其添加到 IntelliJ IDEA 启动器的 **VM options**
    文本框中，如图 9-5 所示。


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig5_HTML.jpg](img/463938_1_En_9_Fig5_HTML.jpg)


    图 9-5


    *设置了 -ea VM 参数的 AssertionDemo 类的 IntelliJ IDEA 启动器*


    启用断言后，运行上述代码会抛出 `java.lang.AssertionError`，因为断言的表达式计算结果为 `false`——当未提供参数时，`arr.length`
    显然不大于 1。断言有两种形式。在简单形式中，它们只有要计算的表达式，即要测试的假设。


    ```

    assertion expression;

    ```


    在这种情况下，会抛出 `java.lang.AssertionError`。它会打印做出假设的行，该假设对于程序的当前运行显然是错误的，同时还会显示模块和完整的类名。


    ```

    Exception in thread "main" java.lang.AssertionError

    at chapter.nine.slf4j/com.apress.bgn.ch9.AssertionDemo.main(AssertionDemo.java:48)

    ```


    断言的复杂版本添加了另一个要计算的表达式，或者堆栈中的一个值，用于告知用户假设是错误的。


    ```

    assertion expression1 : expression 2;

    ```


    因此，如果我们把


    ```

    assert arr.length > 1;

    ```


    替换为


    ```

    assert arr.length > 1 : "Not enough data to sort!";

    ```


    当抛出 `java.lang.AssertionError` 时，它会显示 *Not enough data to sort!* 消息，这清楚地说明了为什么断言语句阻止了其余代码的执行。


    ```

    Exception in thread "main" java.lang.AssertionError: Not enough data to sort!

    at chapter.nine.slf4j/com.apress.bgn.ch9.AssertionDemo.main(AssertionDemo.java:48)

    ```


    或者我们也可以直接打印数组的大小。


    ```

    assert arr.length > 1 : arr.length;

    ```


    或者两者都打印。


    ```

    assert arr.length > 1 :

    "Not enough data to sort! Number of values: " + arr.length;

    ```


    断言可以在需要调试的代码片段之前和之后使用。在本例中，断言被用作执行的前置条件，因为断言的失败阻止了代码的执行。但断言也可以用作后置条件，用于测试执行一段代码的结果。


    在前面的代码片段中，断言用于测试用户提供输入的正确性。在这种情况下，无论断言是否启用，都应遵守有效输入的限制。当然，如果我们的数组为空或只包含一个元素，这不是问题，因为算法不会执行，也不会导致技术故障。在使用断言编写代码时，有一些规则需要遵守，或者需要注意的事项。


    *   **不应使用断言来检查公共方法参数的正确性。** 参数的正确性应在代码中进行测试，并应抛出适当的 `RuntimeException`，且不应是可避免的。


    *   **不应使用断言来完成应用程序正常运行所需的工作。** 主要原因是**断言默认是禁用的**，禁用断言会导致该代码不被执行，因此应用程序的其余部分会因缺少代码而无法正常运行。


    *   **出于性能原因，不要在断言中使用计算开销大的表达式。** 这条规则无需解释，即使断言默认是禁用的，想象一下有人在生产应用程序中错误地启用了它们。那将很不幸，不是吗？


    如果你有兴趣使用断言，请记住这三条规则，这样应该就没问题了。

    '
- fmt: '### Step-by-Step Debugging


    If you do not want to write log messages, or use assertions, but you still want
    to inspect values of variables during the execution of a program, there is a way
    to do that using an IDE: pausing the execution using breakpoints and using the
    IDE to inspect variable contents or execute simple methods to check if your program
    is performing as expected.


    A breakpoint is a mark set on an executable line of code (not a comment line,
    not an empty line and not a declaration). In IntelliJ IDEA, to set a breakpoint,
    you have to click the gutter area on the line you are interested in. Or select
    the line and from the **Run** menu select **Toggle Line Breakpoint**. When a breakpoint
    is in place, a red bubble appears on the line in the gutter section. Figure [9-6](#463938_1_En_9_Chapter.xhtml#Fig6)
    shows a few breakpoints in IntelliJ IDEA.


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig6_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    IntelliJ IDEA breakpoints


    Once the breakpoints are in place, when the application is executed in debug mode,
    it pauses on each of the lines. You can decide if you want to continue the step-by-step
    execution and inspect the values of the variables. IntelliJ IDEA is very helpful
    with this because it shows you the contents of every variable in each line of
    the code being executed. In Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7), the
    `SortingSlf4jDemo` class is running in debug mode and is paused during execution
    using breakpoints.


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig7_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    IntelliJ IDEA `SortingSlf4jDemo` class paused during execution


    To run an application in debug mode, instead of starting the launcher normally,
    you can start it by clicking the green bug-shaped button (marked 1 in Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7))
    that is right next to the green triangle-shaped button that is normally used to
    run the application. The application runs and stops at the first line marked with
    a breakpoint. From that point on the developer can do the following things.


    - Inspect values of the variables used on the line with the breakpoint by reading
    the values depicted by the editor there.

    - Continue the execution until the next breakpoint by clicking the green triangle
    in the **Debug** section, marked 2 in Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7).

    - Stop the execution by clicking the red square-shaped button in the **Debug**
    section, marked 2 in Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7).

    - Disable all breakpoints by clicking red bubble cut diagonally shaped button
    in the **Debug** section, marked 2 in Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7).

    - Continue execution to the next line of code by clicking the button with a 90-degree
    angle in the **Debugger** section, marked 3 in Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7).

    - Continue execution by entering the method in the current line of code by clicking
    the button with a blue arrow oriented down, in the **Debugger** section, marked
    3 in Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7).

    - Continue execution by stepping out of the current method by clicking the button
    with a blue arrow oriented up, in the **Debugger** section, marked 3 in Figure
    [9-7](#463938_1_En_9_Chapter.xhtml#Fig7).

    - Continue the execution to the line pointed at by the cursor by clicking the
    button with a diagonal arrow pointing to a cursor sign in the **Debugger** section,
    marked 3 in Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7).

    - Evaluate your own expressions by adding them to the **Watches** section marked
    4 in Figure [9-7](#463938_1_En_9_Chapter.xhtml#Fig7). The only condition is that
    the expressions only use variables that are accessible in the context of the breakpoint
    line.


    Most Java smart editors provide the means to run a Java application in debug mode;
    just make sure that you don’t forget to clean up your **Watches** section from
    time to time, because if you add expressions that are expensive to evaluate there,
    it might affect the performance of the application. Also, be aware that expressions
    that use streams might make the application fail, as proven in Chapter [8](#463938_1_En_8_Chapter.xhtml).


    ### Inspect Running Application Using Java Tools


    Aside from the executables to compile Java code and execute or packaging of Java
    bytecode, the JDK provides a set of utility executables that can be used to debug
    and inspect the state of a running Java application. This section covers the most
    useful of them. Without further ado, let’s cover the most important ones.


    #### jps


    A Java application is assigned a process ID when it is running. This is how an
    operating system keeps track of all applications running in parallel at the same
    time. You can see the process IDs in utilities, such as Process Explorer in Windows
    and Activity Monitor in macOS. But if you are comfortable with working in the
    console, you might prefer using the `jps` executable provided by the JDK because
    it only focuses on Java processes. When calling `jps` from the console, all Java
    process IDs are listed with the main class name or some details that are exposed
    by the application API that help you identify the application running. This is
    useful when an application crashes, but the process remains in a hanging state.
    This can be painful when the application uses resources such as files or network
    ports, because it might block them and prevent you from using them. When executing
    `jps` on my computer (I have a Mac) these are the Java processes I see running.


    ```

    $ jps

    21234 Launcher

    21235 SortingSlf4jDemo

    3155 muCommander

    21236 Jps

    ```


    As you can see in the listing, `jps` does include itself in the output, because
    it is a Java process. The process with `21235` is the execution of the `SortingSlf4jDemo`
    class. The `21234` process is a launcher application that IntelliJ IDEA uses to
    start the execution of the `SortingSlf4jDemo` class. The process with ID `3155`
    is a Java application that is an alternative to Total Commander (a Windows file
    manager application). The `18562` process does not have any description, but at
    this point I can identify the process myself, because I know I have IntelliJ IDEA
    opened, which is itself a Java application.


    The advantage of knowing the process IDs is that you can kill them when they hang
    and block resources. Let’s assume that the process started by the execution of
    `SortingSlf4jDemo` ended up hanging. To kill a process, all operating systems
    provide a version of the `kill` command. For macOS and Linux, you should execute
    `kill -9 [process_id]`. For the preceding example, if I call `kill -9 21235` and
    then call `jps`, I can see that that `SortingSlf4jDemo` process is no longer listed.


    ```

    $ jps

    21234 Launcher

    3155 muCommander

    21257 Jps

    ```


    I do still have the `Launcher` process, but that is a child process of IntelliJ
    IDEA so there is no point in killing it, because next time I run a `main(..)`
    in the IDE, the process is started again.


    `jps` is a simple tool for this specific purpose, but sometimes when applications
    are installed on servers with minimal setup, it might be all you have. So, it’s
    good to know it exists.'
