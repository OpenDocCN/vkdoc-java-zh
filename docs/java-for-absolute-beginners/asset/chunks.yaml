    | `do``while``for` | Keywords to create loops:`do{..} while(condition),``while(condition){..},``for(initialisation;condition;incrementation){..}`
    |

    | `goto` | Another keyword borrowed from C, but that is currently not used in
    Java, because it can be replaced by labeled `break` and `continue` statements
    |

    | `if``else` | Creates conditional statements:`if(condition) {..}``else {..}``else
    if (condition ) {..}` |

    | `import` | Makes classes and interfaces available in the current source code.
    |

    | `instanceof` | Tests instance types in conditional expressions. |

    | `native` | This modifier indicates that a method is implemented in native code
    using JNI (Java Native Interface). |

    | `new` | Creates java instances. |

    | `package` | Declares the package the class/interface/enum/annotation is part
    of and it should be the first Java statement line. |

    | `public``private``protected` | Access-level modifiers for Java items (templates,
    fields, or methods). |

    | `return` | Keyword used within a method to return to the code that invoked it.
    The method can also return a value to the calling code. |

    | `static` | This modifier can be applied to variables, methods, blocks, and nested
    classes. It declares an item that is shared between all instances of the class
    where declared. |

    | `stricfp` | Used to restrict floating-point calculations to ensure portability.
    Added in Java 1.2. |

    | `super` | Keyword used inside a class to access members of the super class.
    |

    | `this` | Keyword used to access members of the current object. |

    | `synchronized` | Ensures that only one thread executes a block of code at any
    given time. This avoids a problem cause “race-condition”[3](#463938_1_En_4_Chapter.xhtml#Par200).
    |

    | `transient` | Marks data that should not be serialized. |

    | `volatile` | Ensures that changes done to a variable value are accessible to
    all threads accessing it. |

    | `void` | Used when declaring methods as a return type to indicate that the method
    does not return a value. |

    | `_(underscore)` | Cannot be used as an identifier starting with Java 9. |


    Table 4-2


    Java Keywords (part 1)


    | Method | Description |

    | --- | --- |

    | `abstract` | Declares a class or method as abstract—as in any extending or implementing
    class, must provide a concrete implementation. |

    | `assert` | Test an assumption about your code. Introduced in Java 1.4, it is
    ignored by the JVM, unless the program is run with `"-ea`" option. |

    | `boolean``byte``char``short``int``long``float``double` | Primitive type names
    |

    | `break` | Statement used inside loops to terminate them immediately. |

    | `continue` | Statement used inside loops to jump to the next iteration immediately.
    |

    | `switch` | Statement name to test equality against a set of values known as
    cases. |

    | `case` | Statement to define case values in a `switch` statement. |

    | `default` | Declares a default case within a `switch` statement. Also used to
    declare default values in interfaces. And starting with Java 8, it can be used
    to declare default methods in interfaces, methods that have a default implementation.
    |

    | `try``catch``finally``throw``throws` | Keywords used in exception handling.
    |

    | `class interface` | Keywords used in classes and interfaces declarations. |

    | `extends implements` | Keywords used in extending classes and implementing interfaces.
    |

    | `enum` | Keyword introduced in Java 5.0 to declare a special type of class that
    defines a fixed set of instances. |

    | `const` | Not used in Java; a keyword borrowed from C where it declares constants,
    variables that are assigned a value, which cannot be changed during the execution
    of the program. |

    | `final` | The equivalent of the `const` keyword in Java. Anything defined with
    this modifier, cannot change after a final initialization. A final class cannot
    be extended. A final method cannot be overridden. A final variable has the same
    value that was initialized with throughout the execution of the program. Any code
    written to modify final items, lead to a compiler error. |'
