- fmt: '# Exceptions


    Exceptions are special Java classes that are used to intercept special unexpected
    situations during the execution of a program so that the developer can implement
    the proper course of action. These classes are organized in a hierarchy that is
    depicted in Figure [4-11](#463938_1_En_4_Chapter.xhtml#Fig11).


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig11_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Java Exception hierarchy


    `Throwable` is the superclass of all errors that can be thrown in a Java application.
    The exceptional situations can be caused by hardware failures (e.g., trying to
    read a protected file), by missing resources (e.g., trying to read a file that
    does not exist), or by bad code. Bad developers tend to do this: when in doubt,
    catch a throwable. You should definitely try to avoid this because the `Error`
    class that notifies the developer about a situation that the system cannot recover
    from is a subclass of it. Let’s start with a simple example. We define a method
    that calls itself (its technical name is recursive), but we’ll design it badly
    to call itself forever and cause the JVM to run out of memory.


    ```

    package com.apress.bgn.ch4.ex;

    public class ExceptionsDemo {

    // bad method

    static int rec(int i){

    return rec(i*i);

    }

    public static void main(String... args) {

    rec(1000);

    System.out.println("An error happened.");

    }

    }

    ```


    If we run the class, *An error happened* is not printed. Instead, the program
    ends abnormally by throwing a `StackOverFlowError` and states the line where the
    problem is (in our case, the line where the recursive method calls itself).


    ```

    Exception in thread "main" java.lang.StackOverflowError

    at chapter.four/com.apress.bgn.ch4.ex.ExceptionsDemo.recExceptionsDemo.java:7

    at chapter.four/com.apress.bgn.ch4.ex.ExceptionsDemo.recExceptionsDemo.java:7

    ...

    ```


    `StackOverFlowError` is a subclass of `Error`, and is caused by the defective
    recursive method that was called. Sure, we could modify the code, treat this exceptional
    situation, and execute whatever has to be executed next.


    ```

    package com.apress.bgn.ch4.ex;

    public class ExceptionsDemo {

    ...

    public static void main(String... args) {

    try {

    rec(1000);

    } catch (Throwable r) {

    }

    System.out.println("An error happened.");

    }

    }

    ```


    In the console, you see only the *An error happened* text, but no trace of the
    error, which is why we caught it and decided not to print any information about
    it. This is also a bad practice called exception swallowing, never do this! Also,
    the system should not recover from this, as the result of any operation after
    an error is thrown is unreliable. That is why, as a rule of thumb, **never catch
    a throwable!!**


    The `Exception` class is the superclass of all exceptions that can be caught and
    treated, and the system can recover from them. The `RuntimeException` class is
    the superclass of exceptions that are thrown during the execution of the program,
    so the possibility of them being thrown is not known when the code is written.
    Let’s consider the following code sample.


    ```

    package com.apress.bgn.ch4.ex;

    import com.apress.bgn.ch4.hierarchy.Performer;

    public class ExceptionsDemo {

    public static void  main(String... args) {

    Performer p = PerformerGenerator.get("John");

    System.out.println("TTL: " + p.getTimeToLive());

    }

    }

    ```


    Let’s suppose we do not have access to the code of the `PerformerGenerator` class.
    We know that if we call the `get(..)` method with a name, it returns a `Performer`
    instance. So, we write the preceding code and try to print the performer time
    to live. What happens if the performer is not initialized with a proper object,
    because the `get("John")` method call returns null? The outcome is depicted in
    the next code snippet.


    ```

    Exception in thread "main" java.lang.NullPointerException

    at chapter.four/com.apress.bgn.ch4.ex.ExceptionsDemo.mainExceptionsDemo.java:10

    ```


    But if we are smart developers, or a little paranoid, we can prepare for this
    case, catch the exception and throw an appropriate message or perform there a
    dummy initialization, in case the performer instance is used in some other way
    later in the code.


    ```

    package com.apress.bgn.ch4.ex;

    import com.apress.bgn.ch4.hierarchy.Performer;

    public class ExceptionsDemo {

    public static void main(String... args) {

    Performer p = null;//PerformerGenerator.get("John");

    try {

    System.out.println("TTL: " + p.getTimeToLive());

    } catch (Exception e) {

    System.out.println("The performer was not initialised properly

    because of: " + e.getMessage() );

    }

    }

    }

    ```


    The exception that was thrown is of type `NullPointerException`, a class that
    extends `RuntimeException`, so a `try/catch` block is not mandatory. This type
    of exceptions are called unchecked exceptions, because the developer is not obligated
    to check for them. The `NullPointerException` is the exception type Java beginner
    developers get a lot because they do not have the "paranoia sense" developed enough
    to always test objects with unknown origin before using them.


    There is another type of exceptions that are called checked exceptions. This is
    any type of exception that extends `Exception`—including custom exception classes
    declared by the developer—that are declared as explicitly thrown by a method.
    In this case, when invoking that method, the compiler forces the developer to
    treat that exception or throws it forward. Let’s use a mock implementation for
    `PerformerGenerator`.


    ```

    package com.apress.bgn.ch4.ex;

    import com.apress.bgn.ch4.hierarchy.Gender;

    import com.apress.bgn.ch4.hierarchy.Performer;

    public class PerformerGenerator {

    public static Performer get(String name)

    throws EmptyPerformerException {

    return new Performer(name,40, 1.91f, Gender.MALE);

    }

    }

    ```


    The `EmptyPerformerException` is a simple custom exception class that extends
    the `java.lang.exception` class.


    ```

    package com.apress.bgn.ch4.ex;

    public class EmptyPerformerException extends Exception {

    public EmptyPerformerException(String message) {

    super(message);

    }

    }

    ```


    We declared that the `get(..)` method might throw `EmptyPerformerException`; and
    without a `try/catch` block wrapping that method call a compiler error is thrown,
    as depicted in Figure [4-12](#463938_1_En_4_Chapter.xhtml#Fig12).


    ![../images/463938_1_En_4_Chapter/463938_1_En_4_Fig12_HTML.jpg](images/463938_1_En_4_Chapter/463938_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Java compiler error caused by checked exception


    How do we fix it? Well, we write the code to catch it and print a relevant message.


    ```

    package com.apress.bgn.ch4.ex;

    import com.apress.bgn.ch4.hierarchy.Performer;

    public class ExceptionsDemo {

    public static void main(String... args) {

    try {

    Performer p = PerformerGenerator.get("John");

    System.out.println("TTL: " + p.getTimeToLive());

    } catch (EmptyPerformerException e) {

    System.out.println("Cannot use an empty performer

    because of " + e.getMessage());

    }

    }

    }

    ```


    And since we are talking about exceptions, the `try/catch` block can be completed
    with a `finally` block. The contents of the `finally` block are executed if the
    exception is thrown further, or if the method returns normally. The only situation
    in which the `finally` block is not executed is when the program ends in an error.


    ```

    package com.apress.bgn.ch4.ex;

    import com.apress.bgn.ch4.hierarchy.Performer;

    public class ExceptionsDemo {

    public static void main(String... args) {

    try {

    Performer p = PerformerGenerator.get("John");

    System.out.println("TTL: " +  p.getTimeToLive());

    } catch (EmptyPerformerException e) {

    System.out.println("Cannot use an empty performer!");

    } finally {

    System.out.println("All went as expected!");

    }

    }

    }

    ```


    During this book, we write code that ends in exceptional situations, so we’ll
    have the opportunity to expand the subject when your knowledge is a little more
    advanced.'
