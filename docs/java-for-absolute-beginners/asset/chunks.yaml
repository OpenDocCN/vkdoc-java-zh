- fmt: '# 6. Operators


    The previous chapters covered the basic concepts of Java programming. You were
    taught how to organize your code, how your files should be named, and which data
    types you can use, depending on the problem you are trying to solve. You were
    taught how to declare fields, variables, and methods and how they were stored
    in memory to help you design your solutions so that resource consumption is optimal.


    In this chapter, you learn to combine declared variables using *operators*. Most
    Java operators are the ones you know from math, but because programming involves
    types other than numeric, extra operators with specific purposes were added. Table
    [6-1](#463938_1_En_6_Chapter.xhtml#Tab1) lists all Java operators with their category
    and scope.


    Table 6-1


    Java Operators


    | Category | Operator | Scope |

    | --- | --- | --- |

    | casting | `(type)` | explicit type conversion |

    | unary, postfix | `expr++`, `expr--` | post increment/decrement |

    | unary, prefix | `++expr`, `--expr` | pre increment/decrement |

    | unary, logical | `!` | negation |

    | unary, bitwise | `~` | bitwise complement performs a bit-by-bit reversal of
    an integer value |

    | multiplicative, binary | `*`, `/`, `%` | for numeric types: multiply, divide,
    and return remainder |

    | additive, binary | `+`, `-` | for numeric types: addition, subtraction; `+`
    also used for `String` concatenation |

    | bit shifting, binary | `>>`, `<<`, `>>>` | for numeric types: move bits to the
    right, left, and right ignoring the sign |

    | conditional, relational | `instanceof` | tests whether the object is an instance
    of the specified type (class or subclass or interface) |

    | conditional, relational | `==`, `!=`, `<`, `>`, `<=`, `>=` | equals differs
    from, lesser than, greater than, less than or equals, greater than or equals |

    | AND, binary | `&` | bitwise logical AND |

    | exclusive OR, binary | `^` | bitwise logical XOR |

    | inclusive OR, binary | `&#124;` | bitwise logical OR |

    | conditional, logical AND | `&&` | |

    | conditional, logical OR | `&#124;&#124;` | |

    | conditional, ternary | `? :` | also called *the Elvis operator* |

    | assignment | `=`, `+=`, `-=`, `*=`, `/=`, `%=`, `&=`, `^=`, `<<=`, `>>=`, `>>>=`,
    `&#124;=` | simple assignment, combined assignments |


    Let’s start this chapter with the most common operator in programming: the assignment
    operator (`=`).


    ## The Assignment Operator (`=`)


    This operator is the most used in programming, as nothing can be done without
    it. Any variable that you create, regardless of the type, primitive or reference
    has to be given a value at some point in the program. Setting of a value using
    the assignment operator is quite simple: on the left side of the operator you
    have the variable name and on the right it is a value. The only condition for
    an assignment to work is that the value matches the type of the variable.


    To test this operator, you can play a little using `jshell`; make sure that you
    start it in `verbose` mode so you can see the effect of your assignments.


    ```

    $ jshell -v

    |  Welcome to JShell -- Version 11-ea

    |  For an introduction type: /help intro

    jshell> int i = 0;

    i  ==> 0

    | created variable i : int

    jshell> i = -4;

    i ==> -4

    |  assigned to i : int

    jshell> String sample = "text"

    sample ==> "text"

    |  created variable sample : String

    jshell> List list = new ArrayList()

    list ==> []

    |  created variable list : List

    jshell> list = new LinkedList();

    list ==> []

    |  assigned to list : List

    ```


    In the previous example, we declared primitive and reference values and assigned
    and reassigned values to them. Assignment of values with types that mismatch the
    initial type is not permitted. In the following code sample, we are trying to
    assign a text value to a variable that was previously declared as having the `int`
    type.


    ```

    jshell> int i = 0;

    i ==> 0

    |  created variable i : int

    jshell> i = -4;

    i ==> -4

    |  assigned to i : int

    jshell> i = "gigi pedala"

    |  Error:

    |  incompatible types: java.lang.String cannot be converted to int

    |  i = "gigi pedala"

    |      ^-----------^

    ```


    Introduction of type inference in JDK 10 does not affect this, and the type of
    the variable is inferred depending on the type of the first value assigned. This
    means that you cannot declare a variable using the `var` keyword without specifying
    an initial value. This excludes the `null` value, as it cannot be used to declare
    a type. This can be forced though by casting the `null` value to the type we are
    interested in.


    ```

    jshell> var j;

    |  Error:

    |  cannot infer type for local variable j

    |    (cannot use ''var'' on variable without initializer)

    |  var j;

    |  ^----^

    jshell> var j = 5;

    j ==> 5

    |  created variable j : int

    jshell> var sample2 = "bubulina"

    sample2 ==> "bubulina"

    |  created variable sample2 : String

    // yes, this actually works !

    jshell> var funny = (Integer) null;

    funny ==> null

    |  created variable funny : Integer

    ```


    This is all that can be said about the assignment operator. Other details are
    covered later with the composed assignment operators.'
