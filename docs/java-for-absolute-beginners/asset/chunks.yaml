    The example uses an infinite `IntStream` to generate elements to be published,
    processed, and consumed. This leads to the execution program running forever,
    so you have to stop it manually. Another consequence of this is that the `onComplete()`
    methods will never be called. If we want to use them, we have to make sure the
    number of items being published is a finite one. The support for reactive streams
    is thin in the JDK, even in version 11, released September 23, 2018. It was expected
    that more useful classes would be added in versions following Java 9, but apparently
    Oracle is focused on other aspects, such as reorganizing the module structure
    and deciding how to better monetize usage of the JDK, because two releases after
    there’s still nothing new on the reactive front. That is why the next section
    covers a short example of reactive programming done with the Project Reactor library.


    ## Reactive Streams Technology Compatibility Kit


    When building applications that use reactive streams a lot of things can go wrong.
    To make sure that you are building a proper reactive application, you can use
    the **Reactive Streams Technology Compatibility Kit** project (also known as **TCK**)
    to write tests. This library contains classes that can test reactive implementations
    against the reactive streams specifications. TCK is intended to verify the interfaces
    contained in Java 9 (under `java.util.concurrent.Flow.*`) and for some reason
    the team that created the library decided to use TestNG as a testing library.
    The project sources are available on GitHub at [`https://github.com/reactive-streams/reactive-streams-jvm/tree/master/tck-flow`](https://github.com/reactive-streams/reactive-streams-jvm/tree/master/tck-flow),
    which contains four classes that have to be implemented to provide their `Flow.Publisher`,
    `Flow.Subscriber`, `Flow.Processor` implementations for the test harness to validate.
    The four classes are:


    *   `FlowPublisherVerification` tests `Publisher` implementations.

    *   `FlowSubscriberWhiteboxVerification` is used for whitebox testing `Subscriber`
    implementations and `Subscription` instances.

    *   `FlowSubscriberBlackboxVerification` is used for blackbox testing `Subscriber`
    implementations and `Subscription` instances.

    *   `IdentityFlowProcessorVerification` tests `Processor` implementations.


    To make the purpose of each test clear, the library test methods names follow
    this pattern: `TYPE_spec####_DESC` where `TYPE` is one of *required, optional,
    stochastic, or untested*, which refers to the importance of the rule being tested,
    the number signs in `spec####` represent the rule number with the first one being
    `1` for `Publisher` instances and the `2` for `Subscribers` and the `DESC` is
    a short explanation of the test purpose.


    Let’s see how we could test the `IntPublisher` that we defined previously. For
    this, we’ll modify this class to allow the class to use a limited `IntStream`
    as a source.


