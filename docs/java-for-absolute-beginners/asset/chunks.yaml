    # 10. 让应用程序具备交互能力


    到目前为止，本书中 Java 程序的数据输入都是通过数组或代码内部初始化的变量，或是通过程序参数提供的。但如今大多数应用程序都需要与用户进行交互。用户可以通过输入用户名和密码来获得访问权限；有时用户需要输入信息来确认身份，或指示应用程序执行相应操作。Java
    支持多种读取用户输入的方法。本章将介绍几种构建交互式 Java 应用程序的方式。交互式 Java 应用程序可以从控制台、Java 内置界面（无论是桌面端还是
    Web 端）获取输入。


    JShell 是一个命令行界面，开发者可以在其中输入变量声明和单行语句，按下回车键后即可执行。像 `bash` 这样的命令行界面 shell，以及 Windows
    的命令提示符等终端，都可以通过连续的文本行向程序发出命令。本书开头介绍 JShell 的原因很简单，因为它是 Java 9 的新特性。接下来的几节将介绍如何使用命令行界面读取用户提供的数据和指令。后续章节则重点介绍如何构建带有桌面/Web
    界面的 Java 应用程序。


    ## 从命令行读取数据


    本节专门介绍如何从命令行读取用户输入，无论是 IntelliJ IDEA 的控制台，还是从可执行 jar 包在特定操作系统的终端中运行程序。在 JDK 中，有两个类可用于从命令行读取用户数据：`java.util.Scanner`
    和 `java.io.Console`，本节将详细讲解这两个类。闲话少叙，我们直接开始吧。


    ### 使用 System.in 读取用户数据


    在介绍**第 9 章**的日志记录（用于在控制台打印数据）之前，我们一直使用 `System.out` 下的方法。此外，还有一个对应的工具对象 `System.in`，用于从控制台读取数据，即程序用户为控制应用程序流程而输入的数据。你可能已经注意到，到目前为止，所有
    Java 程序在执行时都会启动、处理数据、执行声明的语句，然后终止——要么正常退出，要么在出现问题时抛出异常。将终止决策权交给用户的最简单、最常见的方法是在
    main 方法末尾调用 `System.in.read()`。该方法从输入流中读取下一个字节数据，程序会暂停，直到用户输入一个值；由于该值会被返回，我们甚至可以保存并打印它。


    ```

    import java.io.IOException;

    public class ReadingFormStdinDemo {

    public static void main(String... args) throws IOException {

    System.out.print("按任意键终止:");

    int read = System.in.read();

    System.out.println("按下的键: " + read);

    }

    ```


    如果你在 IntelliJ 中运行这个类，你会看到 *按任意键终止:* 这条消息被打印出来，然后应用程序就挂起了。如果你点击显示该消息的窗口并按下任意键，按下的键的字节值就会被打印出来，然后应用程序终止。因此，如果你执行上述代码并按下回车键，控制台中会显示以下内容。^(⁸¹)


    ```

    按任意键终止:

    按下的键: 10

    ```


    但是，仅从控制台读取单个字节并没有太大用处，对吧？幸运的是，`read(..)` 方法还有另一种形式，可以将用户输入保存到字节数组中。但由于数组大小是固定的，无论用户输入多长，只有数组能容纳的部分才会被保存。结束输入的最终
    <enter> 会作为一个等于 3 的 `int` 值返回，3 是*文本结束*的代码。因此，之前的代码变为：


    ```

    package com.apress.bgn.ch10;

    import java.io.IOException;

    public class ReadingFormStdinDemo {

    public static void main(String... args) throws IOException {

    System.out.print("按任意键终止:");

    byte[] b = new byte[3];

    int read = System.in.read(b);

    for (int i = 0; i < b.length; ++i) {

    System.out.println(b[i]);

    }

    System.out.println("按下的键: " + read);

    }

    }

    ```


    现在，用户输入被保存在 `byte[] b` 数组中。但是，仅仅读取字节并没有太大用处，对吧？那么，让我们来看看如何从用户那里读取完整的文本和数值：这就轮到
    `java.util.Scanner` 类登场了。

    '
- fmt: '### Using Scanner


    The `System.in` variable is of type `java.io.InputStream`, which is a JDK special
    type extended by all classes representing an input stream of bytes. This means
    that `System.in` can be wrapped in any `java.io.Reader` extension so bytes can
    be read as readable data. But, the one that is really important is a class named
    `Scanner` from package `java.util`. An instance of this type can be created by
    calling its constructor and providing `System.in` as an argument. The `Scanner`
    class provides a lot of `next..()` methods that can be used to read almost any
    type from the console. In Figure [10-1](#463938_1_En_10_Chapter.xhtml#Fig1), you
    can see the `next..()` methods list.


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig1_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Scanner methods for reading various types of data


    The advantage of using `Scanner` to read data from the console is that the values
    read are automatically converted to the proper types, when possible. When it is
    not possible, a `java.util.InputMismatchException` is thrown. The following piece
    of code was designed so you can select the type of value you want to read by inserting
    a text and then the value. In the code, the appropriate method of the `Scanner`
    instance is called to read the value.


    ```

    package com.apress.bgn.ch10;

    import java.io.IOException;

    import java.math.BigInteger;

    import java.util.Scanner;

    public class ReadingFormStdinDemo {

    public static final String EXIT = "exit";

    public static final String HELP = "help";

    public static final String BYTE = "byte";

    public static final String SHORT = "short";

    public static final String INT = "int";

    public static final String BOOLEAN = "bool";

    public static final String DOUBLE = "double";

    public static final String LINE = "line";

    public static final String BIGINT = "bigint";

    public static final String TEXT = "text";

    public static void main(String... args) throws IOException {

    Scanner sc = new Scanner(System.in);

    String help = getHelpString();

    System.out.println(help);

    String input;

    do {

    System.out.print("Enter option: ");

    input = sc.nextLine();

    switch (input) {

    case HELP:

    System.out.println(help);

    break;

    case EXIT:

    System.out.println("Hope you had fun. Buh-bye!");

    break;

    case BYTE:

    byte b = sc.nextByte();

    System.out.println("Nice byte there: " + b);

    sc.nextLine();

    break;

    case SHORT:

    short s = sc.nextShort();

    System.out.println("Nice short there: " + s);

    sc.nextLine();

    break;

    case INT:

    int i = sc.nextInt();

    System.out.println("Nice int there: " + i);

    sc.nextLine();

    break;

    case BOOLEAN:

    boolean bool = sc.nextBoolean();

    System.out.println("Nice boolean there: " + bool);

    sc.nextLine();

    break;

    case DOUBLE:

    double d = sc.nextDouble();

    System.out.println("Nice double there: " + d);

    sc.nextLine();

    break;

    case LINE:

    String line = sc.nextLine();

    System.out.println("Nice line of text there: " + line);

    break;

    case BIGINT:

    BigInteger bi = sc.nextBigInteger();

    System.out.println("Nice big integer there: " + bi);

    sc.nextLine();

    break;

    case TEXT:

    String text = sc.next();

    System.out.println("Nice text there: " + text);

    sc.nextLine();

    break;

    default:

    System.out.println("No idea what you want bruh!");

    }

    } while (!input.equalsIgnoreCase(EXIT));

    }

    private static String getHelpString() {

    return new StringBuilder("This application helps you test various usage of Scanner.
    Enter type to be read next:")

    .append("\n\t help >  displays this help")

    .append("\n\t exit >  leave the application")

    .append("\n\t byte > read a byte")

    .append("\n\t short > read a short")

    .append("\n\t int > read an int")

    .append("\n\t bool > read a boolean")

    .append("\n\t double > read a double")

    .append("\n\t line > read a line of text")

    .append("\n\t bigint > read a BigInteger")

    .append("\n\t text > read a text value").toString();

    }

    }

    ```


    As you probably noticed in the code sample, most scanner methods are called together
    with a `nextLine()`, this is because every input you provide is made of the actual
    token and a new line character (the <enter> pressed to end your input), and before
    you can enter your next value, you need to take that character from the stream
    as well.


    Let’s test the previous code a little.


    ```

    This application helps you test various usage of Scanner. Enter type to be read
    next:

    help >  displays this help

    exit >  leave the application

    byte > read a byte

    short > read a short

    int > read an int

    bool > read a boolean

    double > read a double

    line > read a line of text

    bigint > read a BigInteger

    text > read a text value

    Enter option: byte


    Nice byte there: 12

    Enter option: bool

    true

    Nice boolean there: true

    Enter option: line

    some of us are hardly ever here

    Nice line of text there: some of us are hardly ever here

    Enter option: text

    john

    Nice text there: john

    Enter option: text

    the rest of us are made to disappear...

    Nice text there: the

    Enter option: double

    4.2

    Nice double there: 4.2

    Enter option: int

    AAAA

    Exception in thread "main" java.util.InputMismatchException

    at java.base/java.util.Scanner.throwFor(Scanner.java:939)

    at java.base/java.util.Scanner.next(Scanner.java:1594)

    at java.base/java.util.Scanner.nextInt(Scanner.java:2258)

    at java.base/java.util.Scanner.nextInt(Scanner.java:2212)

    at chapter.ten/com.apress.bgn.ch10.ReadingFormStdinDemo.main(

    ReadingFormStdinDemo.java:78)

    ```


    The output that is underlined in the listing, represents the test case for the
    `next()` method. This method should be used to read a single `String` token. The
    next token gets converted to a `String` instance, and the token ends when a whitespace
    is encountered. That is why, in the previous example the only read text ends up
    being *the*.


    In the last case, the expected option is an integer value, but *AAAA* is entered,
    and that is why the exception is thrown.


    When you need to repeatedly read the same type of values from the console you
    can peek at the value you want to read, and check it before reading it to avoid
    the `InputMismatchException` being thrown. For this particular scenario, each
    of the `next..()` methods has a pair method named `hasNext...()`. To show an example
    of how these methods can be used, let’s add an option to the previous code to
    read a list of long values.


    ```

    ...

    public static final String LONGS = "longs";

    ...

    String input;

    do {

    System.out.print("Enter option: ");

    input = sc.nextLine();

    switch (input) {

    case LONGS:

    List longList = new ArrayList();

    while (sc.hasNextLong()) {

    longList.add(sc.nextLong());

    }

    System.out.println("Nice long list there: " + longList);

    // else all done

    sc.nextLine();

    sc.nextLine();

    break;

    default:

    System.out.println("No idea what you want bruh!");

    }

    } while (!input.equalsIgnoreCase(EXIT));

    ...

    ```


    Although seems weird, we need to call the `nextLine()` method twice. Once for
    the character that cannot be converted to `long`, so the `while` loop ends and
    once for the end of the line character, so the next `read..()` is the type of
    the following read value.


    There are a few other methods in the `Scanner` class that can be used to filter
    the input and read only desired tokens, but the methods listed in this section
    are the ones you will probably use the most.'
