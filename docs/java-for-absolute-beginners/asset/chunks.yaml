    \ `NullPointerException` 异常。因此，开发人员在使用对象（或数组）之前，通常会检查其是否为 `null`。让我们修改前面的示例来演示这一点。\n\
    \n```\npackage com.apress.bgn.ch5;\npublic class ArraysDemo {\nint array[];\n\
