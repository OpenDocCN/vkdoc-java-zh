    ```

    package com.apress.bgn.ch5;

    import java.util.*;

    public class CollectionsDemo {

    public static void main(String... args) {

    List stringList = new ArrayList();

    stringList.add("one");

    stringList.add("two");

    stringList.add("three");

    for (String s : stringList) {

    System.out.println(s);

    }

    }

    }

    ```


    A `List` contains an unsorted collection of non-unique data, null elements included.
    In the example, we declared a reference of type `List<T>` and an object of type
    `ArrayList<T>`. We did this because as all implementations have the same API,
    we could easily switch `ArrayList<T>` with `LinkedList<T>` and the code still
    works. **Declaring abstract references is a good programming practice**.


    ```

    List stringList = new ArrayList();

    stringList = new LinkedList();

    ```


    The syntax in the previous examples are pre-Java 1.7, when the **<> (diamond operator)**
    was introduced. This allowed more simplification of collections initializations,
    because it only required declaring the type of the elements in the list only in
    the reference declaration. So, the two lines in the previous code snippet became


    ```

    List stringList = new ArrayList();

    stringList = new LinkedList();

    ```


    Every new Java version has added changes to the collection framework starting
    with Java 1.5\. In Java 1.8, support for lambda expressions was added with a default
    method named `forEach` in the `java.lang.Iterable<T>` interface, which is extended
    by the `java.lang.Collection<T>`. So, the code to print all the values in the
    list, as we did previously using a `for` loop, can be replaced with


    ```

    stringList.forEach(element -> System.out.println(element));

    ```


    In Java 9, yet another improvement was introduced: factory methods for collections.
    Our collection was populated with elements by repeatedly calling `add(..)`, which
    is a little redundant, especially since we have the full collection of elements
    we want to put in the list. That is why in Java 9 methods to create collection
    objects in one line of code were introduced; for example,


    ```

    List stringList = List.of("one", "two", "three");

    ```


    The resulting `List<T>` is an immutable collection; it can no longer be modified,
    and elements cannot be added or removed from it.


    Moving closer to the present, in Java 10, support for **local variable type inference**
    was added, which means that we no longer have to explicitly specify the reference
    type, because it is automatically be inferred based on the object type, so the
    following declaration


    ```

    List stringList = List.of("one", "two", "three");

    ```


    becomes


    ```

    var stringList = List.of("one", "two", "three");

    ```


    Similar code can be written with `Set<T>`, `HashSet<T>`, and `TreeSet<T>`, and
    similar methods exist for the `Set<T>` classes.


    Map implementations come with a few differences because they model collections
    of key-value pairs; so this case is treated separately. The following code snippet
    depicts the creation, initialization of a map that uses keys of type `String`
    and values of type `Integer`. The syntax is Java 6.


    ```

    package com.apress.bgn.ch5;

    import java.util.*;

    public class CollectionsDemo {

    public static void main(String... args) {

    Map stringMap = new HashMap();

    stringMap.put("one", 1);

    stringMap.put("two", 2);

    stringMap.put("three", 3);

    for (Map.Entry entry : stringMap.entrySet()) {

    System.out.println(entry.getKey() + ":  " + entry.getValue());

    }

    }

    }

    ```


    From the `for` loop, you can infer that a map is a collection of `Map.Entry<K,
    V>` elements. If we were to move ahead to the Java 1.7 syntax, the declaration
    of the map changes to


    ```

    Map stringMap = new HashMap();

    ```


    In Java 1.8, traversal and printing values in maps became more practical.


    ```

    stringMap.forEach((k,v) -> System.out.println(k + ": " + v));

    ```


    And in Java 9, declaring and populating a map became easier.


    ```

    Map stringMap = Map.of("one", 1,"two", 2, "three", 3);

    ```


    And local variable type inference works for maps too.


    ```

    var stringMap = new HashMap();

    ```


    The JDK classes for working with collections, cover a wide range of functionality,
    such as sorting, searching, merging collections, intersections, and so on. As
    the book advances, the context of the code samples widen, and we are able to use
    collections to solve real-life problems. So, other methods are covered and working
    code samples are provided.'
