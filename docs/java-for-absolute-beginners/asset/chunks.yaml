  raw: '### Escaping Characters


    There are special characters that cannot be part of a `String` value . As you
    have probably noticed, `String` values are defined between double quotes ("`sample`")
    and this makes the "(`double quote`) character unusable as a value. To use it
    as a `String` value, it has to be *escaped*. Aside from this character there is
    also the `\(backslash)` and the `\a(alert)`. Figure [5-16](#463938_1_En_5_Chapter.xhtml#Fig16)
    shows how IntelliJ IDEA tries to tell you that you cannot use those characters
    in the content of a `String` value.


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig16_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Code samples with special characters


    To escape those characters, a backlash must be inserted before them. The `''(single
    quote)` must be escaped as well when used as a character value.


    ```

    char quote = ''\";

    ```


    There are some other Java escape sequences that can be used in `String` values
    to get a certain effect, which are listed in Table [5-1](#463938_1_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    Java Escape Sequences


    | **Escape Sequence** | **Effect** |

    | --- | --- |

    | `\n` | Create a new line (often called the newline character) |

    | `\t` | Create a tab |

    | `\b` | Create a backspace character (which might delete the preceding character,
    depending on the output device) |

    | `\r` | Return to the start of the line (but do not make a new line, the equivalent
    of the `Home` key on the keyboard) |

    | `\f` | Form feed (move to the top of the next page for printers) |


    The newline `\n` and the tab `\t` character are used often in programming to properly
    format console output. If we define a `String` instance like the following,


    ```

    String perf = "The singers performing tonight are: \n\t Paolo Nutini \n\t Seth
    MacFarlane

    \n\t John Mayer";

    ```


    When printed in the console, the text is formatted to look like this:


    ```

    The singers performing tonight are:

    Paolo Nutini

    Seth MacFarlane

    John Mayer

    ```


    ### Wrapper Classes


    Each primitive type has a corresponding reference type. Before covering each of
    them and explaining why they are needed, please take a look at Table [5-2](#463938_1_En_5_Chapter.xhtml#Tab2).
    The Java wrapper classes wrap a value of the primitive type with the same name.


    Table 5-2


    Java Primitive and Equivalent Reference Types


    | **Primitive** | **Class** |

    | --- | --- |

    | byte | `java.lang.Byte` |

    | short | `java.lang.Short` |

    | int | `java.lang.Integer` |

    | long | `java.lang.Long` |

    | float | `java.lang.Float` |

    | double | `java.lang.Double` |

    | boolean | `java.lang.Boolean` |

    | char | `java.lang.Char` |


    In addition, these classes provide methods for converting primitive values to
    `String` and vice versa, as well as constants and methods useful when dealing
    with primitive types that need to be treated as objects. The numeric wrapper classes
    are related, all of them extend the `Number` class, as depicted in Figure [5-17](#463938_1_En_5_Chapter.xhtml#Fig17).


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig17_HTML.jpg](images/463938_1_En_5_Chapter/463938_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Wrapper classes hierarchy


    The following code samples mostly use the `Integer` class, but the other numeric
    wrapper classes can be used in a similar way. The JVM knows how to convert a primitive
    `int` into an `Integer` object automatically when needed, operation that is called
    **boxing** and from an `Integer` object to a primitive `int`, operation that is
    called **unboxing** . The following code sample contains a few operations with
    `Integer` and `int` values.


    ```

    package com.apress.bgn.ch5.refs;

    public class WrapperDemo {

    public static void main(String... args) {

    // upper interval boundary for int

    Integer max =  Integer.MAX_VALUE;

    System.out.println(max);

    //unboxing

    int pmax =  max;

    //boxing

    Integer io = 10;

    //creating primitive utility method

    //exception is thrown, if string is not a number

    int i1 = Integer.parseInt("11");

    //constructor deprecated in Java 9

    //exception is thrown, if string is not a number

    Integer i2 = new Integer("12");

    //exception is thrown, if string is not a number

    Integer i3 = Integer.valueOf("12");

    //convert int into to String

    String s0 = Integer.toString(13);

    //convert int to float

    float f0 = Integer.valueOf(14).floatValue();

    //creating string with binary representation of number 9 (1001)

    String  s1  =  Integer.toBinaryString(9);

    //introduced in Java 1.8

    Integer i4 = Integer.parseUnsignedInt("+15");

    //method to add to integers

    int sum = Integer.sum(2, 3);

    //method to get the bigger value

    int maximum = Integer.max(2, 7);

    }

    }

    ```


    The `Character` and `Boolean` types are a little bit different, because these
    types are not numeric, so they cannot be converted to any numeric value. They
    cannot be converted one to another either. Oracle provides really good documentation
    for its classes, so if you are curious about using these two types, check out
    the official JDK API documentation at [`https://docs.oracle.com/javase/10/docs/api/index.html?overview-summary.html`](https://docs.oracle.com/javase/10/docs/api/index.html%253Foverview-summary.html)
    `.`'
  trans: '

    ### 转义字符


    有些特殊字符不能作为`String`值的一部分。你可能已经注意到，`String`值是在双引号（"`sample`"）之间定义的，这使得"（`双引号`）字符无法作为值使用。要将其用作`String`值，必须进行*转义*。除了这个字符之外，还有`\(反斜杠)`和`\a(警报)`。图
    5-16 展示了 IntelliJ IDEA 如何提示你这些字符不能用在`String`值的内容中。


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig16_HTML.jpg](img/463938_1_En_5_Fig16_HTML.jpg)


    图 5-16


    包含特殊字符的代码示例


    要转义这些字符，必须在它们前面插入一个反斜杠。`''(单引号)`在用作字符值时也必须进行转义。


    ```

    char quote = ''\"'';

    ```


    还有一些其他的 Java 转义序列可以在`String`值中使用以达到特定效果，这些序列列在表 5-1 中。


    表 5-1


    Java 转义序列


    | **转义序列** | **效果** |

    | --- | --- |

    | `\n` | 创建新行（通常称为换行符） |

    | `\t` | 创建制表符 |

    | `\b` | 创建退格字符（可能会删除前一个字符，具体取决于输出设备） |

    | `\r` | 返回到行首（但不换行，相当于键盘上的`Home`键） |

    | `\f` | 换页（对于打印机，移动到下一页的顶部） |


    换行符`\n`和制表符`\t`在编程中经常用于格式化控制台输出。如果我们像下面这样定义一个`String`实例，


    ```

    String perf = "今晚表演的歌手是: \n\t Paolo Nutini \n\t Seth MacFarlane

    \n\t John Mayer";

    ```


    当在控制台打印时，文本会被格式化成如下所示：


    ```

    今晚表演的歌手是:

    Paolo Nutini

    Seth MacFarlane

    John Mayer

    ```


    ### 包装类


    每种基本类型都有一个对应的引用类型。在逐一介绍它们并解释为什么需要它们之前，请先查看表 5-2。Java 包装类将同名的基本类型的值包装起来。


    表 5-2


    Java 基本类型及其对应的引用类型


    | **基本类型** | **类** |

    | --- | --- |

    | byte | `java.lang.Byte` |

    | short | `java.lang.Short` |

    | int | `java.lang.Integer` |

    | long | `java.lang.Long` |

    | float | `java.lang.Float` |

    | double | `java.lang.Double` |

    | boolean | `java.lang.Boolean` |

    | char | `java.lang.Char` |


    此外，这些类提供了将基本类型值转换为`String`以及反向转换的方法，还提供了在处理需要被视为对象的基本类型时有用的常量和工具方法。数值包装类是相关的，它们都扩展了`Number`类，如图
    5-17 所示。


    ![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig17_HTML.jpg](img/463938_1_En_5_Fig17_HTML.jpg)


    图 5-17


    包装类层次结构


    以下代码示例主要使用`Integer`类，但其他数值包装类也可以类似地使用。JVM 知道如何在需要时自动将基本类型`int`转换为`Integer`对象，这个操作称为**装箱**；以及将`Integer`对象转换为基本类型`int`，这个操作称为**拆箱**。下面的代码示例包含了一些对`Integer`和`int`值的操作。


    ```

    package com.apress.bgn.ch5.refs;

    public class WrapperDemo {

    public static void main(String... args) {

    // int 的上限区间

    Integer max =  Integer.MAX_VALUE;

    System.out.println(max);

    //拆箱

    int pmax =  max;

    //装箱

    Integer io = 10;

    //创建基本类型的工具方法

    //如果字符串不是数字，则会抛出异常

    int i1 = Integer.parseInt("11");

    //构造函数在 Java 9 中已弃用

    //如果字符串不是数字，则会抛出异常

    Integer i2 = new Integer("12");

    //如果字符串不是数字，则会抛出异常

    Integer i3 = Integer.valueOf("12");

    //将 int 转换为 String

    String s0 = Integer.toString(13);

    //将 int 转换为 float

    float f0 = Integer.valueOf(14).floatValue();

    //创建数字 9 的二进制表示字符串 (1001)

    String  s1  =  Integer.toBinaryString(9);

    //在 Java 1.8 中引入

    Integer i4 = Integer.parseUnsignedInt("+15");

    //两个整数相加的方法

    int sum = Integer.sum(2, 3);

    //获取较大值的方法

    int maximum = Integer.max(2, 7);

    }

    }

    ```


    `Character`和`Boolean`类型略有不同，因为这些类型不是数值型的，所以它们不能转换为任何数值。它们之间也不能相互转换。Oracle 为其类提供了非常好的文档，所以如果你对使用这两种类型感到好奇，请查看官方
    JDK API 文档，网址为 [`https://docs.oracle.com/javase/10/docs/api/index.html?overview-summary.html`](https://docs.oracle.com/javase/10/docs/api/index.html%253Foverview-summary.html)
    `.`

    '
- fmt: '### Date Time API


    许多应用程序使用日历日期类型来打印当前日期、截止日期和生日。无论你决定构建什么应用程序，很可能都需要使用日历日期。在 Java 8 之前，用于建模日历日期的主要类是`java.util.Date`。这个类以及其他处理日历日期的类存在一些问题。但在我们深入探讨之前，先来看看如何获取当前日期、创建自定义日期以及打印特定细节。


    ```

    package com.apress.bgn.ch5;

    import java.util.Date;

    import java.text.SimpleDateFormat;

    public class CalendarDateDemo {

    public static void main(String... args) {

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    Date currentDate = new Date();

    System.out.println("Today: " + sdf.format(currentDate));

    //deprecated since 1.1

    Date johnBirthday = new Date(77, 9, 16);

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    int day = johnBirthday.getDay();

    System.out.println("Day: " + day);

    int month = johnBirthday.getMonth() + 1;

    System.out.println("Month: " + month);

    int year = johnBirthday.getYear();

    System.out.println("Year: " + year);

    }

    }

    ```


    获取当前日期很简单；只需调用`Date`类的默认构造函数即可。


    ```

    Date currentDate = new Date();

    ```


    `currentDate`的内容可以直接显示，但通常使用`java.text.SimpleDateFormat`的实例将日期格式化为特定于国家/地区的模式。格式化器也可以用于将具有该特定格式的`String`转换为`Date`实例。当然，如果文本与格式化器的模式不匹配，则会抛出特定异常（类型：`java.text.ParseException`）。


    ```

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    System.out.println(currentDate);

    System.out.println("Today: " + sdf.format(currentDate));

    Date johnBirthday = sdf.parse("16-10-1977");

    ```


    要从表示日期的数字（年、月、日）创建`Date`实例，可以使用接受这些值作为参数的构造函数，尽管该构造函数自 Java 1.1 起已被弃用，推荐的方式是使用`sdf.parse(..)`方法。该构造函数在其参数方面有一些特殊性。


    *   年参数必须是目标年份值减去 1900

    *   月份从 0 开始计数，因此作为参数给出的月份必须是目标月份减 1


    从年、月、日的数值构造`Date`的代码如下所示。


    ```

    //deprecated since 1.1

    Date johnBirthday = new Date(77, 9, 16);

    System.out.println("John''s Birthday: " + sdf.format(johnBirthday));

    //it prints: John''s Birthday: 16-10-1977

    ```


    如果我们想从日期中提取年、月和日，有一些方法可以实现：提取月份中日期的`getDate()`方法。


    ```

    try {

    johnBirthday = sdf.parse("16-10-1977");

    } catch (ParseException e) {

    e.printStackTrace();

    }

    System.out.println("John''s Birthday: " + sdf.format(johnBirthday));

    //day of the month

    int day = johnBirthday.getDate();

    System.out.println("Day: " + day);

    int month = johnBirthday.getMonth() + 1;

    System.out.println("Month:  "  +  month);

    int year = johnBirthday.getYear();

    System.out.println("Year: " + year);

    ```


    如果你在 IntelliJ IDEA 编辑器中检查`CalendarDateDemo`类，你会注意到一些构造函数和方法带有删除线字体。这意味着它们已被弃用，可能会在未来的
    Java 版本中被移除，因此不应再使用。这就是为什么有另一种方法来完成所有这些操作：使用`java.util.Calendar`类。使用`Calendar`类完成相同操作的代码如下所示。


    ```

    package com.apress.bgn.ch5;

    import java.util.Calendar;

    import java.util.Date;

    import java.util.GregorianCalendar;

    import java.text.SimpleDateFormat;

    public class CalendarDateDemo {

    public static void main(String... args) {

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    Calendar calendar = new GregorianCalendar();

    Date currentDate = calendar.getTime();

    System.out.println("Today: " + sdf.format(currentDate));

    calendar.set(1977, 9, 16);

    Date johnBirthday = calendar.getTime();

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    int day = calendar.get(Calendar.DAY_OF_MONTH);

    System.out.println("Day: " + day);

    int month = calendar.get(Calendar.MONTH);

    System.out.println("Month: " + month);

    in year = calendar.get(Calendar.YEAR);

    System.out.println("Year: " + year);

    }

    }

    ```


    不幸的是，一些特殊性仍然存在，因为表示日期的核心类仍然是`java.util.Date`，但至少我们不再使用任何已弃用的东西。


    `java.util.Date`类和`java.text.SimpleDateFormat`类不是线程安全的，因此在具有多个执行线程的复杂应用程序中，开发人员必须显式同步对这些类型对象的访问。这些类型的对象不是不可变的，并且处理时区非常麻烦。这就是为什么在
    Java 8 中引入了一个新的 API 来建模日历日期操作。它设计得更好，并且日期实例是线程安全且不可变的。该 API 的核心类是`java.time.LocalDate`和`java.time.LocalDateTime`，用于建模日历日期以及带时间的日历日期。让我们看看使用新
    API 获取当前日期和创建自定义日期的代码。


    ```

    package com.apress.bgn.ch5;

    import java.time.LocalDate;

    import java.time.LocalDateTime;

    import java.time.Month;

    public class CalendarDateDemo {

    public static void main(String... args) {

    LocalDateTime currentTime = LocalDateTime.now();

    System.out.println("Current DateTime: " + currentTime);

    LocalDate today = currentTime.toLocalDate();

    System.out.println("Today: " + today);

    LocalDate johnBd = LocalDate.of(1977, Month.OCTOBER, 16);

    System.out.println("John’s Birthday: " + johnBd);

    int day = johnBd.getDayOfMonth();

    System.out.println("Day: " + day + ", " + johnBd.getDayOfWeek());

    int month = johnBd.getMonthValue();

    System.out.println("Month: " + month + ", " + johnBd.getMonth());

    int year = johnBd.getYear();

    System.out.println("Year: " + year);

    }

    }

    ```


    要获取当前日期和时间，调用名为`now()`的静态方法，该方法返回一个`LocalDateTime`类型的实例。此实例可以通过调用`toLocalDate()`获取当前日期。


    要创建自定义日期，可以使用实际的年和月中的日作为参数，并且可以使用`java.time.Month`枚举的值之一来指定月份。


    提取日期信息可以通过调用具有直观名称的方法轻松完成。查看前面代码片段中的`getDayOfMonth()`和`getDayOfWeek()`方法。它们的名称准确地反映了它们返回的数据。


    `LocalDate`和`LocalDateTime`类简化了不需要时区的开发。处理时区是一个高级主题，因此本书不会涉及。'
  raw: '### Date Time API


    A lot of applications make use of calendar date types to print the current date,
    deadlines, and birthdays. No matter what application you decide to build you most
    likely need to use calendar dates. Until Java 8, the main class to model a calendar
    date was `java.util.Date`. There are a few problems with this class and others
    involved in handling calendar dates. But before we get into that, let’s see how
    we can get the current date, create a custom date, and print certain details.


    ```

    package com.apress.bgn.ch5;

    import java.util.Date;

    import java.text.SimpleDateFormat;

    public class CalendarDateDemo {

    public static void main(String... args) {

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    Date currentDate = new Date();

    System.out.println("Today: " + sdf.format(currentDate));

    //deprecated since 1.1

    Date johnBirthday = new Date(77, 9, 16);

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    int day = johnBirthday.getDay();

    System.out.println("Day: " + day);

    int month = johnBirthday.getMonth() + 1;

    System.out.println("Month: " + month);

    int year = johnBirthday.getYear();

    System.out.println("Year: " + year);

    }

    }

    ```


    Getting the current date is simple; just call the default constructor of the `Date`
    class.


    ```

    Date currentDate = new Date();

    ```


    The contents of the `currentDate` can be displayed directly, but usually an instance
    of `java.text.SimpleDateFormat` is used to format the date to a pattern that is
    country specific. The formatter can also be used to convert a `String` with that
    specific format intro a `Date` instance. Of course, if the text does not match
    the pattern of the formatter, a specific exception is thrown (type: `java.text.ParseException`)


    ```

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    System.out.println(currentDate);

    System.out.println("Today: " + sdf.format(currentDate));

    Date johnBirthday = sdf.parse("16-10-1977");

    ```


    To create a `Date` instance from the numbers representing a date: year, month
    and day, a constructor that takes those values as arguments can be used, although
    that constructor has been deprecated since Java 1.1, and the recommended way is
    to use the `sdf.parse(..)` method. The constructor has a few particularities regarding
    its arguments.


    *   changes the technical meaning again the year argument must be the intended
    year value from which 1900 is subtracted


    *   the months are counted from 0, so the month to give as an argument, must be
    the month we want –1


    The code to construct a `Date` from the numeric values for the year, month, and
    day is depicted as follows.


    ```

    //deprecated since 1.1

    Date johnBirthday = new Date(77, 9, 16);

    System.out.println("John''s Birthday: " + sdf.format(johnBirthday));

    //it prints: John''s Birthday: 16-10-1977

    ```


    If we want to extract the year, month, and day of the month from the date, there
    are methods for that: the method to extract the day of the month is named `getDate()`.


    ```

    try {

    johnBirthday = sdf.parse("16-10-1977");

    } catch (ParseException e) {

    e.printStackTrace();

    }

    System.out.println("John''s Birthday: " + sdf.format(johnBirthday));

    //day of the month

    int day = johnBirthday.getDate();

    System.out.println("Day: " + day);

    int month = johnBirthday.getMonth() + 1;

    System.out.println("Month:  "  +  month);

    int year = johnBirthday.getYear();

    System.out.println("Year: " + year);

    ```


    If you inspect the `CalendarDateDemo` class in the IntelliJ IDEA editor, you notice
    that some constructors and methods are written with a strikethrough font. This
    means that they are deprecated and might be removed in future versions of Java
    and thus they should not be used. That is why there is another way to do all of
    that: use the `java.util.Calendar` class. The code to do the same as before, but
    using the `Calendar` class is listed next.


    ```

    package com.apress.bgn.ch5;

    import java.util.Calendar;

    import java.util.Date;

    import java.util.GregorianCalendar;

    import java.text.SimpleDateFormat;

    public class CalendarDateDemo {

    public static void main(String... args) {

    SimpleDateFormat sdf = new SimpleDateFormat("dd-MM-yyyy");

    Calendar calendar = new GregorianCalendar();

    Date currentDate = calendar.getTime();

    System.out.println("Today: " + sdf.format(currentDate));

    calendar.set(1977, 9, 16);

    Date johnBirthday = calendar.getTime();

    System.out.println("John’s Birthday: " + sdf.format(johnBirthday));

    int day = calendar.get(Calendar.DAY_OF_MONTH);

    System.out.println("Day: " + day);

    int month = calendar.get(Calendar.MONTH);

    System.out.println("Month: " + month);

    in year = calendar.get(Calendar.YEAR);

    System.out.println("Year: " + year);

    }

    }

    ```


    Unfortunately some of the peculiarities remain, as the central class for representing
    dates is still the `java.util.Date`, but at least we are not using anything deprecated
    anymore.


    The `java.util.Date` class and the `java.text.SimpleDateFormat` class are not
    thread safe, so in complex applications with multiple execution threads, developers
    must synchronize access to those type of objects explicitly. Objects of those
    types are not immutable, and working with time zones is a pain. That is why in
    Java 8, a new API to model calendar-date operations was introduced. It is better
    designed, and date instances are thread-safe and immutable. The central classes
    for the API are `java.time.LocalDate` and `java.time.LocalDateTime`, used to model
    calendar dates and calendar dates with time. Let’s see how the code to get the
    current date and to create a custom date looks with the new API.


    ```

    package com.apress.bgn.ch5;

    import java.time.LocalDate;

    import java.time.LocalDateTime;

    import java.time.Month;

    public class CalendarDateDemo {

    public static void main(String... args) {

    LocalDateTime currentTime = LocalDateTime.now();

    System.out.println("Current DateTime: " + currentTime);

    LocalDate today = currentTime.toLocalDate();

    System.out.println("Today: " + today);

    LocalDate johnBd = LocalDate.of(1977, Month.OCTOBER, 16);

    System.out.println("John’s Birthday: " + johnBd);

    int day = johnBd.getDayOfMonth();

    System.out.println("Day: " + day + ", " + johnBd.getDayOfWeek());

    int month = johnBd.getMonthValue();

    System.out.println("Month: " + month + ", " + johnBd.getMonth());

    int year = johnBd.getYear();

    System.out.println("Year: " + year);

    }

    }

    ```


    To get the current date and time a static method named `now()` is called, which
    returns an instance of type `LocalDateTime`. This instance can get the current
    date by calling `toLocalDate()`.


    To create a custom date, the actual year and day of month can be used as parameters
    and the month can be specified using one of the values of the `java.time.Month`
    enum.


    Extracting information regarding a date can be done easily by calling methods
    with intuitive names. Look at the `getDayOfMonth()` and `getDayOfWeek()` methods
    in the previous snippet. Their name reflects exactly what data they are returning.


    The `LocalDate` and `LocalDateTime` classes simplify the development where time
    zones are not required. Working with time zones is an advanced subject, so it
    won’t be covered in this book.'
