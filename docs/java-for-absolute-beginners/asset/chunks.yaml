    for (int j = 0; j < 10; ++j) {

    try {

    sleep(j * 10);

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    }

    System.out.println(currentThread().getName() + " ended.");

    }).start();

    }

    ```


    Java provides thread management classes that can create and manage threads, so
    the developer mustn’t declare the threads explicitly. The concurrency framework
    is a subject too advanced for this book, but if this section has made you curious,
    the Oracle Concurrency tutorial is at [`https://docs.oracle.com/javase/tutorial/essential/concurrency/index.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/index.html)
    .


    ## Summary


    In this chapter, you learned how memory for a Java program is administered by
    the JVM and the basics of the most used Java data types. We discussed the following.


    *   how the memory is managed during the execution of a Java program


    *   the differences between primitive and reference types


    *   how many primitive types are defined in Java


    *   why the String type is special


    *   how to work with calendar dates


    *   how arrays are declared and used


    *   how null is used


    *   how to declare and use collection implementations


    If some of the examples in this chapter seem complicated, do not be discouraged.
    It is difficult to explain certain concepts without providing working code that
    you can execute, test, and even modify yourself. Unfortunately, this requires
    the use of concepts introduced in later chapters (e.g., `for` and `if` statements).
    Make a note of every concept that it is not clear now, and the page number, and
    return to this chapter after you read about the concept in more detail later in
    the book.


