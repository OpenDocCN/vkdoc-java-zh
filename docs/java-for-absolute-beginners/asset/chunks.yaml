    决定按钮位置的方法与 Swing 类似，但有一些不同。`BorderPane` 有 5 个区域，分别命名为：Top、Bottom、Center、Left 和
    Right。为了将节点放置在这些区域中的每一个，为每个区域定义了 `set*(..)` 方法：`setTop(..)`、`setBottom(..)`、`setCenter(..)`、`setLeft(..)`
    和 `setRight(..)`。为了进一步自定义节点的位置，应将其放置在一个 `HBox` 节点中，这是另一个可以广泛自定义的 JavaFX 元素。从代码中可以看到，我们使用
    CSS 样式元素设置背景，通过使用 `Insets` 类的实例自定义节点之间的间距以及包含节点的边框，并通过调用 `box.setAlignment(Pos.BASELINE_RIGHT)`
    自定义包含节点的对齐方式。`HBox` 还支持更多功能，因此使用一个盒子能做的事情（主要）只受限于你的想象力。


    因此，除了前面代码示例中所有*美化代码*的工作外，还完成了以下操作：*根*节点成为 `BorderPane` 节点的父节点，在 `BorderPane` 的底部区域添加了一个
    `HBox`，并且这个 `HBox` 实例成为了一个 `Button` 的父节点。这种组织方式是分层的，按钮是层次结构中的最后一个节点。


    此外，我们通过正确设置 `HBox` 节点的样式，避免了使用层叠面板。


    现在是时候为我们的应用程序添加最后一个功能了：文本区域和一个包含可选元素以向文本区域添加值的列表。在 JavaFX 中创建文本区域很简单。该类命名清晰：`TextArea`。我们可以直接将节点添加到
    `BorderPane` 的中心区域，因为 JavaFX 文本区域默认是可滚动的。因此无需将其放入 `ScrollPane` 中，尽管该类确实存在于 `javafx.scene.control`
    包中，并且对于在其中显示比窗口尺寸大的表单节点很有用。以下三行代码创建了一个 `TextArea` 类型的节点，将其声明为不可编辑，并将其添加到 `BorderPane`
    的中心区域。


    ```

    TextArea textArea = new TextArea();

    textArea.setEditable(false);

    borderPane.setCenter(textArea);

    ```


    接下来是列表。列表稍微复杂一些，但操作起来也更有趣，因为使用 JavaFX 可以对列表做很多事情。需要实例化以创建列表对象的类名为 `ComboBox`。这个类只是用于创建列表的更大类族中的一个，其根类是抽象类
    `ComboBoxBase`。根据列表所需的行为，例如是否需要支持单选或多选，列表是否可编辑，应选择适当的实现。在我们的例子中，`ComboBox` 类符合要求：我们需要一个不可编辑的列表，支持单选。`ComboBox`
    有一个 `valueProperty()` 方法，返回当前用户输入。用户输入可以基于下拉列表的选择，或者当列表可编辑时用户手动提供的输入。让我们看看将列表添加到
    `BorderPane` 顶部区域，并添加一个监听器以将所选值记录到我们之前声明的 `TextArea` 中的代码。


    ```

    private static String[] data = {"John Mayer", "Frank Sinatra",

    "Seth MacFarlane", "Nina Simone", "BB King", "Peggy Lee"};

    ...

    ComboBox comboBox = new ComboBox();

    comboBox.getItems().addAll(data);

    borderPane.setTop(comboBox);

    comboBox.valueProperty().addListener(

    new ChangeListener() {

    @Override

    public void changed(ObservableValue observable,

    String oldValue, String newValue) {

    textArea.appendText(newValue + "\n");

    }

    });

    ```


    `ComboBox` 的 `value` 字段（通过调用 `comboBox.valueProperty()` 访问）是一个 `ObservableValue<T>`
    实例。通过调用 `addListener(..)` 方法，将一个 `ChangeListener<String>` 类型的监听器添加到此实例。每当 `comboBox`
    的 value 字段发生变化时，监听器的 `changed(..)` 方法就会被调用。`changed(..)` 方法接收列表先前选中的值和当前选中的值作为参数，因为谁知道呢，也许我们的某些逻辑需要同时用到这两个值。


    在 AWT 和 Swing 中，对列表的视觉处理能力有限。你只能使用外观和感觉，仅此而已。JavaFX 支持更多的节点视觉自定义，因为它甚至支持 CSS。这就是为什么在下一节中，我们将让
    `ComboBox` 列表变得有趣。在 JavaFX 中，列表中的每个条目都是一个可以不同方式绘制的单元格。为此，我们必须向此类添加一个 `CellFactory`，它为列表中的每个项目创建一个
    `ListCell` 实例。如果未指定 `CellFactory`，则单元格将以默认样式创建。让我们先看代码，然后再做进一步解释。


    ```

