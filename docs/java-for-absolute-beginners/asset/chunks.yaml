- fmt: "# Testing\n\nDebugging is a part of a software process called **testing**\
    \ and involves identifying and correcting code errors. But avoiding technical\
    \ errors is not enough, testing an application means much more than that. There\
    \ is an organization providing very good materials for training and certifications\
    \ for software testers. The **International Software Testing Qualifications Board**\
    \ (ISTQB) is a software testing qualification certification organization that\
    \ operates internationally. It established a syllabus and a hierarchy of qualifications\
    \ and guidelines for software testing.^([^(71)](#fn71)) If you think you are more\
    \ interested in software testing then you should look into getting an ISTQB certification.\n\
    \nThe ISTQB defines testing as “the process consisting of all lifecycle activities,\
    \ both static and dynamic, concerned with planning, preparation and evaluation\
    \ of software and related work products to determine that they satisfy specified\
    \ requirements to demonstrate that they are fit for purpose and to detect defects.”\n\
    \nThis is a technical and academic definition. The definition that I propose is\
    \ “the process of verifying that an implementation does what it is supposed to\
    \ in the amount of time it is expected to, with an acceptable resources consumption\
    \ and it does not break anything while doing so.”\n\n## A Small Introduction to\
    \ Testing\n\n*I want to be a developer. Why do I need to know all of these details\
    \ about testing?* The simple answer is because testing is a constant activity\
    \ that is performed during every phase of the lifecycle of a software application.\
    \ When the design is made, simulations are done and experienced people review\
    \ the design to decide if it represents a proper solution for the problem and\
    \ if it is realizable. When the code is written, it has to be tested to make sure\
    \ the application does not crash and behaves as expected. Before delivery, there\
    \ is a phase named acceptance testing when client representatives test the application\
    \ in a controlled environment so every action is logged and problems identified.\
    \ Testing can be done using debugging, using all the methods presented until now,\
    \ but the disadvantage of debugging is that it is manual and repetitive. So, let’s\
    \ introduce a way to test the application that is a little bit more automated.\n\
    \n## !\n\nTesting is an essential part of the development process and should start\
    \ as early as possible, because the effort of fixing a defect grows exponentially\
    \ with the time it takes to be discovered.^([^(72)](#fn72))\n\nDuring the development\
    \ phase, aside from writing the actual solution, you can also write code to test\
