    \n* **The class declaration:** This is the line where we declare our class; it\
    \ is `public` so it can be seen from everywhere; it is a `class` named `HelloWorld`.\
    \ The body of a class is enclosed between curly brackets, and the opening bracket\
    \ is on this line as well.\n\n* **The `main()` method declaration:** In Java,\
    \ a method signature is the method name and the number, type, and order of its\
    \ parameters. A method also has a return type, as in the type of result it returns.\
    \ But there is also a special type that can declare methods that do not return\
    \ anything. In order of appearance, the following explains what every term of\
    \ the `main()` method represents.\n    * **`public`:** A method accessor; the\
    \ main method must be `public`; otherwise, JRE can’t access it and call it.\n\
    \    * **`static`:** When an object of that class type is created, it has the\
    \ fields and methods as declared by the class. The class is a template for creating\
    \ objects. Because of the `static` keyword, the main method is not associated\
    \ with an object of a class type, but with the class itself. More information\
    \ about this in **Chapter** [4](#463938_1_En_4_Chapter.xhtml).\n    * **`void`:**\
    \ This keyword is used here to tell us that the main method does not return anything,\
    \ so it’s like a replacement for \"no type\", because if nothing is returned there\
    \ is no need for a type.\n    * **`String[] args`:** Methods are sometimes declared\
    \ as receiving some input data, `String[] args` represents an array of text values.\
    \ (Arrays are sets of data of fixed length; in mathematics they are known as a\
    \ **one-dimension matrix** or **vector**.) `String` is the class representing\
    \ text objects in Java. The `[]` means array and `args` is its name. But wait,\
    \ we’ve run this method before and we did not need to provide anything! Well,\
    \ it is not mandatory, but you’ll see how you can give it arguments (values provided\
    \ to the method, which are used by the code in its body) after this list.\n\n\
    ### **!**\n\nIn previous code samples, you might have noticed that the main method\
    \ was written like this:\n\n```\npublic class HelloWorld {\n    public static\
    \ void main(String... args) {\n        System.out.println(\"Hello World!\");\n\
    \    }\n}\n```\n\nThe three dots are referred to as `varargs` and allow you to\
    \ pass more than one string to the method. It’s an alternative way of writing\
    \ this method and it is used in the book when the sources require some special\
    \ formatting that involves `[]`.\n\n* **`{`:** The starting bracket of the `main()`\
    \ method body.\n\n* <empty for convenience> (left empty so the picture looks nicer).\n\
    \n* **`System.out.println(\"Hello World!\");`:** A statement used for writing\
    \ *Hello World* in the console.\n\n* **`}`:** The closing bracket of the `main()`\
    \ method body.\n\n* **`}`:** The closing bracket for the class body.\n\nIf we\
    \ execute this class, *Hello World!* gets printed in the console. Figure [3-17](#463938_1_En_3_Chapter.xhtml#Fig17)\
    \ shows how to execute a class with a `main()` method in it. After executing a\
    \ class that way, IntelliJ IDEA automatically saves the configuration for that\
    \ execution in a run configuration and displays it in a drop-down list next to\
    \ a triangular green button that executes that class by clicking it. Both are\
    \ placed on the IDE header and ostentatiously pointed to you in Figure [3-25](#463938_1_En_3_Chapter.xhtml#Fig25).\
    \ Those two elements are really important because a run configuration can be edited\
    \ and added arguments for the JVM and the `main()` method. Let’s first modify\
    \ the `main()` method to do something with the arguments.\n\n```\npackage com.apress.bgn.ch3.helloworld;\n\
    public class HelloWorld {\n    public static void main(String[] args) {\n    \
    \    System.out.println(\"Hello \" + args[0] + \"!\");\n    }\n}\n```"
