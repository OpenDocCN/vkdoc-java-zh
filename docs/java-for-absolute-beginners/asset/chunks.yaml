    \ engineers quit, including James Gosling, *the father of Java*, which made a\
    \ lot of developers question the future of the Java platform.\n\nJava SE 7, codename\
    \ **Dolphin**, was the first Java version released by Oracle in 2011\\. It was\
    \ the result of an extensive collaboration between Oracle engineers and members\
    \ of the worldwide Java communities, like the OpenJDK Community and the Java Community\
    \ Process (JCP). It contained a lot of changes, but still, a lot fewer than developers\
    \ expected. Considering the long period between the releases, the expectations\
    \ were pretty high. Project **Lambda**, which was supposed to allow usage of lambda\
    \ expressions in Java (this leads to considerable syntax simplification in certain\
    \ cases), and **Jigsaw** (making JVM and the Java application modular; there is\
    \ a section in **Chapter** [3](#463938_1_En_3_Chapter.xhtml) about them) were\
    \ dropped. Both were released in future versions. The following are the most notable\
    \ features in Java 7.\n\n*   JVM support for dynamic languages with the new `invokedynamic`\
    \ bytecode (basically, Java code can use code implemented in non-Java languages,\
    \ such as C)\n\n*   Compressed 64-bit pointers (internal optimization of the JVM,\
    \ so less memory is consumed)\n\n*   Small language changes grouped under project\
    \ **Coin**\n    *   strings in `switch` (covered in **Chapter** [7](#463938_1_En_7_Chapter.xhtml))\n\
    \n*   automatic resource management in try-statement (covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml))\n\
    \n*   improved type inference for generics—the diamond `<>` operator (covered\
    \ in **Chapter** [5](#463938_1_En_5_Chapter.xhtml))\n\n*   binary integer literals\
    \ (covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml))\n\n*   multiple exceptions\
    \ handling improvements (covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml))\n\
    \n*   Concurrency improvements\n\n*   New I/O library (new classes added to read/write\
    \ data to/from files, covered in **Chapter** [8](#463938_1_En_8_Chapter.xhtml))\n\
    \n*   `Timsort` to sort collections and arrays of objects instead of `merge sort`\
    \ (Sets of data that are ordered need to be sorted using an algorithm, basically,\
    \ in this version, the algorithm was replaced with one that has better performance.\
    \ Better performance usually means reducing of consumed resources: memory and/or\
    \ CPU, or reducing the time needed for execution.)\n\nIt must have been difficult\
    \ to pick up a project and update it with almost none of the original development\
    \ team involved. That can be seen in the 161 updates that followed; most of them\
    \ needed to fix security issues and vulnerabilities.\n\nJavaFX 2.0 was released\
    \ with Java 7\\. This confirmed that the JavaFX project had a future with Oracle.\
    \ As a major change, JavaFX stopped being a scripting language and became a Java\
    \ API. This meant that knowledge of the Java language syntax would be enough to\
    \ start building user graphical interfaces with it. JavaFX started gaining ground\
    \ over Swing because of its hardware-accelerated graphical engine called **Prism**\
    \ that did a better job at rendering.\n\nJava SE 8, codename **Spider**, was released\
    \ in 2014, and included features that were initially intended to be part of Java\
    \ 7\\. But, better late than never, right? Three years in the making, Java 8 contained\
    \ the following key features.\n\n*   Language syntax changes\n    *   Language-level\
    \ support for lambda expressions (functional programming features)\n\n*   Support\
    \ for default methods in interfaces (covered in **Chapter** [4](#463938_1_En_4_Chapter.xhtml))\n\
    \n*   New date and time API (covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml))\n\
    \n*   New way to do parallel processing by using streams (covered in **Chapter**\
    \ [8](#463938_1_En_8_Chapter.xhtml))\n\n*   Improved integration with JavaScript\
    \ (the Nashorn project). JavaScript is a web scripting language that is quite\
    \ loved in the development community, so providing support for it in Java probably\
    \ won Oracle a few new supporters.\n\n*   Improvements of the garbage collection\
    \ process\n\nStarting with Java 8, codenames were dropped to avoid any trademark-law\
    \ hassles; instead, a semantic versioning that easily distinguishes major, minor,\
    \ and security-update releases was adopted.^([⁹](#fn9)) The version number matches\
    \ the following pattern:\n\n`$MAJOR.$MINOR.$SECURITY`\n\nWhen executing `java\
    \ -version` in a terminal (if you have Java 8 installed), you see something similar\
    \ to the following log.\n\n```\n$ java -version\njava version \"1.8.0_162\"\n\
    JavaTM SE Runtime Environment build 1.8.0_162-b12\nJava HotSpotTM 64-Bit Server\
    \ VM build 25.162-b12, mixed mode\n```\n\nIn this log, the version numbers have\
    \ the following meaning:\n\n*   The `1` represents the major version number, incremented\
    \ for a major release that contains significant new features as specified in a\
    \ new edition of the Java SE Platform Specification.\n\n*   The `8` represents\
    \ the minor version number, incremented for a minor update release that may contain\
    \ compatible bug fixes, revisions to standard APIs and other small features.\n\
    \n*   The `0` represents the security level that is incremented for a security-update\
    \ release that contains critical fixes, including those necessary to improve security.\
    \ `$SECURITY` is not reset to zero when `$MINOR` is incremented, which lets the\
    \ users know that this version is a more secure one.\n\n*   `162` is the build\
    \ number.\n\n*   `b12` represents additional build information.\n\nThis versioning\
    \ style is quite common for Java applications, thus this versioning style was\
    \ adopted to align with the general industry practices.\n\nJava SE 9 was released\
    \ in September 2017\\. The long-awaited **Jigsaw** project was finally here. The\
    \ Java platform is finally modular."
  trans: "\n## Oracle 接管\n\n尽管太阳微系统公司在针对微软的诉讼中胜诉，微软因未完全实现 Java 1.1 标准而同意支付 2000 万美元，但到了\
    \ 2008 年，该公司状况已非常糟糕，开始与 IBM 和惠普洽谈合并事宜。2009 年，甲骨文与太阳微系统公司宣布就收购价格达成一致：甲骨文将以每股 9.50\
    \ 美元现金收购太阳微系统公司；这相当于 56 亿美元的报价。此举影响巨大。许多工程师离职，包括 *Java 之父* 詹姆斯·高斯林，这让许多开发者对 Java\
    \ 平台的未来产生了质疑。\n\nJava SE 7，代号 **Dolphin**，是甲骨文于 2011 年发布的第一个 Java 版本。它是甲骨文工程师与全球\
    \ Java 社区成员（如 OpenJDK 社区和 Java 社区流程）广泛合作的成果。它包含了许多变化，但仍远少于开发者的预期。考虑到版本发布间隔时间较长，大家的期望值相当高。原本计划允许在\
    \ Java 中使用 lambda 表达式（这能在某些情况下显著简化语法）的 **Lambda** 项目，以及 **Jigsaw**（使 JVM 和 Java\
    \ 应用程序模块化；**第** 3 章有一节专门介绍它们）都被推迟了。两者都在后续版本中发布。以下是 Java 7 中最值得注意的特性。\n\n*   JVM\
    \ 通过新的 `invokedynamic` 字节码支持动态语言（基本上，Java 代码可以使用非 Java 语言（如 C 语言）实现的代码）\n*   压缩的\
    \ 64 位指针（JVM 的内部优化，从而消耗更少的内存）\n*   归入 **Coin** 项目的小型语言变更\n    *   `switch` 中的字符串（**第**\
    \ 7 章介绍）\n*   try 语句中的自动资源管理（**第** 5 章介绍）\n*   改进的泛型类型推断——菱形 `<>` 运算符（**第** 5\
    \ 章介绍）\n*   二进制整数字面量（**第** 5 章介绍）\n*   多重异常处理改进（**第** 5 章介绍）\n*   并发性改进\n*   新的\
    \ I/O 库（新增了用于从文件读写数据的类，**第** 8 章介绍）\n*   使用 `Timsort` 替代 `merge sort` 对集合和对象数组进行排序（有序的数据集需要使用算法进行排序，基本上，在此版本中，该算法被替换为性能更好的算法。更好的性能通常意味着减少资源消耗：内存和/或\
    \ CPU，或减少执行所需的时间。）\n\n在几乎没有原始开发团队参与的情况下接手一个项目并对其进行更新，这一定非常困难。从后续的 161 次更新中可见一斑；其中大部分更新都是为了修复安全问题和漏洞。\n\
    \nJavaFX 2.0 与 Java 7 一同发布。这证实了 JavaFX 项目在甲骨文旗下仍有未来。作为一项重大变化，JavaFX 不再是一种脚本语言，而是变成了一个\
    \ Java API。这意味着掌握 Java 语言语法就足以开始用它构建用户图形界面。JavaFX 开始超越 Swing，因为它拥有名为 **Prism**\
    \ 的硬件加速图形引擎，该引擎在渲染方面表现更佳。\n\nJava SE 8，代号 **Spider**，于 2014 年发布，包含了最初计划作为 Java\
    \ 7 一部分的功能。但，迟做总比不做好，对吧？经过三年的开发，Java 8 包含了以下关键特性。\n\n*   语言语法变更\n    *   对 lambda\
    \ 表达式的语言级支持（函数式编程特性）\n*   接口中的默认方法支持（**第** 4 章介绍）\n*   新的日期和时间 API（**第** 5 章介绍）\n\
    *   使用流进行并行处理的新方法（**第** 8 章介绍）\n*   与 JavaScript 的集成改进（Nashorn 项目）。JavaScript\
    \ 是一种在开发社区中颇受欢迎的 Web 脚本语言，因此在 Java 中为其提供支持可能为甲骨文赢得了一些新的支持者。\n*   垃圾回收过程的改进\n\n\
    从 Java 8 开始，为了规避任何商标法方面的麻烦，代号被弃用；取而代之的是采用一种能够轻松区分主版本、次版本和安全更新版本的语义化版本控制方案。^(⁹)\
    \ 版本号遵循以下模式：\n\n`$MAJOR.$MINOR.$SECURITY`\n\n在终端中执行 `java -version`（如果你安装了 Java\
    \ 8），你会看到类似下面的日志。\n\n```\n$ java -version\njava version \"1.8.0_162\"\nJavaTM\
    \ SE Runtime Environment build 1.8.0_162-b12\nJava HotSpotTM 64-Bit Server VM\
    \ build 25.162-b12, mixed mode\n```\n\n在此日志中，版本号具有以下含义：\n\n*   `1` 代表主版本号，当发布包含\
    \ Java SE 平台规范新版本中规定的重要新功能的主版本时递增。\n*   `8` 代表次版本号，当发布可能包含兼容性错误修复、标准 API 修订和其他小功能的次更新版本时递增。\n\
    *   `0` 代表安全级别，当发布包含关键修复（包括提高安全性所必需的修复）的安全更新版本时递增。当 `$MINOR` 递增时，`$SECURITY` 不会重置为零，这使用户知道此版本是更安全的版本。\n\
    *   `162` 是构建编号。\n*   `b12` 代表额外的构建信息。\n\n这种版本控制风格在 Java 应用程序中相当常见，因此采用这种版本控制风格是为了与通用行业实践保持一致。\n\
    \nJava SE 9 于 2017 年 9 月发布。期待已久的 **Jigsaw** 项目终于到来。Java 平台终于实现了模块化。\n"
- fmt: '### !


    这对 Java 世界来说是一个重大变化；它不是语法上的改变，也不是什么新特性。而是平台设计上的改变。我认识的一些经验丰富的开发者，他们从 Java 诞生之初就开始使用它，至今仍难以适应。这个变化旨在修复
    Java 多年来一直存在的一些严重问题（详见**第** [3](#463938_1_En_3_Chapter.xhtml) 章）。你很幸运，因为作为初学者，你从零开始，所以不需要改变你开发应用程序的方式。


    以下是除引入 Java 模块之外最重要的特性。^([^(10)](#fn10))


    *   Java Shell 工具，一个用于评估用 Java 编写的声明、语句和表达式的交互式命令行界面（详见**第** [3](#463938_1_En_3_Chapter.xhtml)
    章）

    *   相当多的安全更新

    *   改进的`try-with-resources`：现在可以将最终变量用作资源（详见**第** [5](#463938_1_En_5_Chapter.xhtml)
    章）

    *   `"_"`已从合法标识符名称集合中移除（详见**第** [4](#463938_1_En_4_Chapter.xhtml) 章）

    *   支持私有接口方法（详见**第** [5](#463938_1_En_5_Chapter.xhtml) 章）

    *   对 Garbage-First (G1) 垃圾收集器的增强；这成为默认的垃圾收集器（详见**第** [13](#463938_1_En_13_Chapter.xhtml)
    章）

    *   内部使用了更紧凑的新字符串表示形式（详见**第** [5](#463938_1_En_5_Chapter.xhtml) 章）

    *   并发更新（与并行执行相关，在**第** [5](#463938_1_En_5_Chapter.xhtml) 章中提及）

    *   集合的工厂方法（详见**第** [5](#463938_1_En_5_Chapter.xhtml) 章）

    *   图像处理 API 的更新，优化了用于编写图像处理代码的组件


    Java 9 遵循与 Java 8 相同的版本控制方案，但有一个小改动。JDK 名称中包含的 Java 版本号最终成为版本方案中的`$MAJOR`编号。因此，如果你安装了
    Java 9，在终端中执行`java -version`时，你会看到类似下面的日志。


    ```

    $ java -version

    java version "9.0.4"

    JavaTM SE Runtime Environment build 9.0.4+11

    Java HotSpotTM 64-Bit Server VM build 9.0.4+11, mixed mode

    ```


    Java SE 10（又名 Java 18.3）于 2018 年 3 月 20 日发布。Oracle 更改了 Java 发布风格，因此每六个月发布一个新版本。此外，Java
    10 使用了 Oracle 设定的新版本控制约定：版本号遵循`$YEAR.$MONTH`格式。^([^(11)](#fn11)) 显然，这种发布版本风格旨在让开发者或最终用户更容易了解版本的发布时间，以便他们判断是否应升级到具有最新安全修复和附加功能的较新版本。


    以下是 Java 10 的一些特性。^([^(12)](#fn12))


    *   局部变量类型推断，以增强语言能力，将类型推断扩展到局部变量（这是最受期待的特性，详见**第** [5](#463938_1_En_5_Chapter.xhtml)
    章）

    *   更多垃圾收集优化（详见**第** [13](#463938_1_En_13_Chapter.xhtml) 章）

    *   应用程序类数据共享，通过跨进程共享公共类元数据来减少内存占用（这是一个高级特性，本书不会涉及）

    *   更多并发更新（与并行执行相关，在**第** [5](#463938_1_En_5_Chapter.xhtml) 章中提及）

    *   在替代内存设备上进行堆分配（JVM 运行 Java 程序所需的内存——称为*堆内存*——可以分配在替代内存设备上，因此堆也可以在易失性和非易失性 RAM
    之间分配。有关 Java 应用程序使用内存的更多信息，请阅读**第** [5](#463938_1_En_5_Chapter.xhtml) 章。）


    既然我们之前已经做过，让我们看看在终端中运行`java -version`对此 Java 版本显示什么。


    ```

    $ java -version

    java version "10" 2018-03-20

    JavaTM SE Runtime Environment 18.3 build 10+46

    Java HotSpotTM 64-Bit Server VM 18.3 build 10+46, mixed mode

    ```


    Java SE 11（又名 Java 18.9）^([^(13)](#fn13))（于 2018 年 9 月 25 日发布）包含以下特性：


    *   移除用于构建企业 Java 应用程序的 JEE 高级组件以及 Corba（一种非常古老的远程调用技术，允许你的应用程序与安装在另一台计算机上的应用程序通信）模块

    *   Lambda 参数的局部变量语法，允许在声明隐式类型 Lambda 表达式的形式参数时使用`var`关键字

    *   Epsilon，一种低开销的垃圾收集器（是一个无 GC 收集器，因此基本上你可以在没有 GC 的情况下运行应用程序），基本上是对垃圾收集的更多优化（详见**第**
    [13](#463938_1_En_13_Chapter.xhtml) 章）

    *   更多并发更新（与并行执行相关，在**第** [5](#463938_1_En_5_Chapter.xhtml) 章中提及）


    除了这些变化之外，还推测应该引入一个新的版本控制变更，因为`$YEAR.$MONTH`格式在开发者中反响不佳。（为什么有这么多版本命名变更，对吧？这真的那么重要吗？显然是的。）提议的版本控制变更类似于
    Java 9 中引入的变更，如果你好奇，可以在[`http://openjdk.java.net/jeps/322`](http://openjdk.java.net/jeps/322)阅读其详细规范。


    在撰写本章时，JDK 11 仅可通过早期访问计划获得，这就是版本名称中存在`"ea"`字符串的原因；它表示*早期访问*。使用它相当困难，因为它尚未得到任何编辑器或其他构建工具的支持。到本书发布时，Java
    11 将稳定并可供使用，本书的源代码将在 GitHub 仓库中相应更新。


    ```

    $ java -version

    java version "11-ea" 2018-09-18

    JavaTM SE Runtime Environment 18.9 build 11-ea+2

    Java HotSpotTM 64-Bit Server VM 18.9 build 11-ea+2, mixed mode

    ```


    细节到此为止。如果你想了解 Java 诞生头 20 年的更多信息，可以在 Oracle 的网站上找到。^([^(14)](#fn14))


    ## 未来展望


    Java 主导该行业已超过 20 年。它并非总是处于最常用开发技术的顶端，但自诞生以来从未跌出前五。即使有像 Node.js 这样的服务器端 JavaScript
    智能框架，繁重的工作仍然留给 Java 处理。像 Scala 和 Kotlin 这样的新兴编程语言运行在 JVM 上，因此 Java 编程语言可能会经历一次重大的蜕变以保持竞争力，但它仍将存在。


    版本 9 中引入的模块化可能性为 Java 应用程序安装到更小的设备上打开了大门，因为要运行 Java 应用程序，我们不再需要整个运行时——只需要其核心以及应用程序构建所用的模块。


    此外，有很多用 Java 编写的应用程序，尤其是在金融领域，因此由于遗留原因以及将这些庞大的应用程序迁移到其他技术是一项不可能完成的任务，Java 仍将存在。


    Java 很可能会在未来 10 到 15 年内生存下来并保持领先地位。它是一项非常成熟的技术，拥有庞大的社区，这确实有所帮助。而且它易于学习且对开发者友好，这使其仍然是大多数公司的首选。因此，你现在可以得出结论，学习
    Java 并购买这本书是一项不错的投资。'
  raw: '### !


    This is a big change for the Java world; it’s not a change in syntax and it’s
    not some new feature. It’s a change in the design of the platform. Some experienced
    developers I know, who have used Java since its first years have difficulties
    adapting. It is supposed to fix some serious problems that Java has been living
    with for years (covered in **Chapter** [3](#463938_1_En_3_Chapter.xhtml)). You
    are lucky because, as a beginner, you start from scratch, so you do not need to
    change the way you develop your applications.


    The following are the most important features, aside the introduction of Java
    modules.^([^(10)](#fn10))


    *   The Java Shell tool, an interactive command-line interface for evaluation
    declarations, statements, and expressions written in Java (covered in **Chapter**
    [3](#463938_1_En_3_Chapter.xhtml))


    *   Quite a few security updates


    *   Improved `try-with-resources`: final variables can now be used as resources
    (covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml))


    *   `"_"` is removed from the set of legal identifier names (covered in **Chapter**
    [4](#463938_1_En_4_Chapter.xhtml))


    *   Support for private interface methods (covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml))


    *   Enhancements for the Garbage-First (G1) garbage collector; this becomes the
    default garbage collector (covered in **Chapter** [13](#463938_1_En_13_Chapter.xhtml))


    *   Internally, a new more compact String representation is used (covered in **Chapter**
    [5](#463938_1_En_5_Chapter.xhtml))


    *   Concurrency updates (related to parallel execution, mentioned in **Chapter**
    [5](#463938_1_En_5_Chapter.xhtml))


    *   Factory methods for collections (covered in **Chapter** [5](#463938_1_En_5_Chapter.xhtml))


    *   Updates of the image processing API optimization of components used to write
    code that processes images


    Java 9 followed the same versioning scheme as Java 8, with a small change. The
    Java version number contained in the name of the JDK finally became the `$MAJOR`
    number in the version scheme. So, if you have Java 9 installed, when executing
    `java -version` in a terminal, you see something similar to the following log.


    ```

    $ java  -version

    java version "9.0.4"

    JavaTM SE Runtime Environment build 9.0.4+11

    Java HotSpotTM 64-Bit Server VM build 9.0.4+11, mixed mode

    ```


    Java SE 10 (AKA Java 18.3) was released on March 20, 2018\. Oracle changed the
    Java release style, so a new version is released every six months. Also, Java
    10 uses the new versioning convention set up by Oracle: the version numbers follow
    a `$YEAR.$MONTH` format.^([^(11)](#fn11)) Apparently, this release versioning
    style is supposed to make it easier for developers or end users to figure out
    the age of a release so that they can judge whether to upgrade it to a newer release
    with the latest security fixes and additional features.


    The following are a few features of Java 10.^([^(12)](#fn12))


    *   A local-variable type inference to enhance the language to extend type inference
    to local variables (this is the most expected feature and is covered in **Chapter**
    [5](#463938_1_En_5_Chapter.xhtml))


    *   More optimizations for garbage collection (covered in **Chapter** [13](#463938_1_En_13_Chapter.xhtml))


    *   Application Class-Data Sharing to reduce the footprint by sharing common class
    metadata across processes (this is an advanced feature that won’t be covered in
    the book)


    *   More concurrency updates (related to parallel execution, mentioned in **Chapter**
    [5](#463938_1_En_5_Chapter.xhtml))


    *   Heap allocation on alternative memory devices (The memory needed by JVM to
    run a Java program—called *heap memory*—can be allocated on an alternative memory
    device, so the heap can also be split between volatile and non-volatile RAM. More
    about memory used by Java applications can be read in **Chapter** [5](#463938_1_En_5_Chapter.xhtml).)


    And since we’ve done this before, let’s see what running `java -version` in a
    terminal shows for this Java version.


    ```

    $ java -version

    java version "10" 2018-03-20

    JavaTM SE Runtime Environment 18.3 build 10+46

    Java HotSpotTM 64-Bit Server VM 18.3 build 10+46, mixed mode

    ```


    Java SE 11 (AKA Java 18.9)^([^(13)](#fn13)) (released on 25 September 2018) contains
    the following features:


    *   Removal of JEE advanced components used to build enterprise Java applications
    and Corba (really old technology for remote invocation, allowing your application
    to communicate with applications installed on a different computer) modules


    *   Local-variable syntax for lambda parameters allow the `var` keyword to be
    used when declaring the formal parameters of implicitly typed lambda expressions


    *   Epsilon, a low-overhead garbage collector (is a no-GC, so basically you can
    run an application without a GC), basically more optimizations to the garbage
    collection (covered in **Chapter** [13](#463938_1_En_13_Chapter.xhtml))


    *   More concurrency updates (related to parallel execution, mentioned in **Chapter**
    [5](#463938_1_En_5_Chapter.xhtml))


    Aside from these changes, it was also speculated that a new versioning change
    should be introduced because the `$YEAR.$MONTH` format did not go so well with
    developers. (Why so many versioning naming changes, right? Is this really so important?
    Apparently, it is.) The proposed versioning change is similar to the one introduced
    in Java 9, and if you are curious, you can read a detailed specification for it
    at [`http://openjdk.java.net/jeps/322`](http://openjdk.java.net/jeps/322) .


    When this chapter was written, JDK 11 was available only via the early access
    program, which is why the `"ea"` string is present in the version name; it means
    *early access*. It is quite difficult to use it, as it is not supported by any
    editors or other build tools yet. By the time this book is released, Java 11 will
    be stable and ready to use and the sources for the book are updated accordingly
    on the GitHub repository.


    ```

    $ java -version

    java version "11-ea" 2018-09-18

    JavaTM SE Runtime Environment 18.9 build 11-ea+2

    Java HotSpotTM 64-Bit Server VM 18.9 build 11-ea+2, mixed mode

    ```


    And this is where the details end. If you want more information on the first 20
    years of Java’s life, you can find it on Oracle’s website.^([^(14)](#fn14))


    ## What the Future Holds


    Java has dominated the industry for more than 20 years. It wasn’t always at the
    top of the most-used development technologies, but it never left the top five
    since its existence. Even with server-side JavaScript smart frameworks, like Node.js,
    the heavy-lifting is still left to Java. Emerging programming languages like Scala
    and Kotlin run on the JVM, so maybe the Java programming language will suffer
    a serious metamorphosis in order to compete, but it will still be here.


    The modularization possibility introduced in version 9 opens the gates for Java
    applications to be installed on smaller devices, because to run a Java application,
    we no longer need the whole runtime—only its core plus the modules the application
    was built with.


    Also, there are a lot of applications written in Java, especially in the financial
    domain, so Java will still be here, because of legacy reasons and because migrating
    these titan applications to another technology is an impossible mission.


    Java will probably survive and be on top for the next 10 to 15 years. It does
    help that it is a very mature technology with a huge community built around it.
    And the fact that is easy to learn and developer-friendly makes it remain the
    first choice for most companies. So, you might conclude at this point that learning
    Java and buying this book is a good investment.'
