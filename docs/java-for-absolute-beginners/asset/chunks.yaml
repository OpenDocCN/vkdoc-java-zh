    默认情况下，会打开 **Project** 设置选项卡。在图 3-12 中，有两个箭头吸引你的注意，分别指向 **Project SDK** **:** 部分（显示
    Java 项目的 JDK 版本）和 **Project** **language level** **:** 部分。在撰写本章时，JDK 11 EA 是最新版本。最新版本的
    IntelliJ IDEA 支持 Java 11 的语法和代码补全，这就是此处显示它的原因。这就是项目语言级别设置的含义。


    如果你切换到名为 **Modules** 的选项卡，你会看到如图 3-13 所示的信息。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig13_HTML.jpg](img/463938_1_En_3_Fig13_HTML.jpg)


    图 3-13


    IntelliJ IDEA 模块设置选项卡


    ### !


    让我们先澄清一点。Modules 选项卡并不显示项目中 Java 模块的信息。除了将包组合在一起的 Java 模块之外，模块也是一种将项目中具有共同目的的
    Java 源文件和资源文件打包在一起的方式。这就是为什么在 Oracle 引入 `module` 概念来模块化 Java 应用程序之前，构成这些应用程序的代码就已经被那些需要以某种实用方式组织大型项目的开发者模块化了。


    在 Modules 选项卡中，你可以看到项目包含的部分（模块）数量以及每个部分的设置。`sandbox` 有一个部分：一个同样名为 `sandbox` 的模块，该模块的源文件包含在
    `src` 目录中。因此，如果我们想编写一个打印 *Hello World!* 的类，名为 `HelloWorld.java` 的文件必须放在该目录下。如果你右键单击
    `src` 目录，会出现如图 3-14 所示的菜单。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig14_HTML.jpg](img/463938_1_En_3_Fig14_HTML.jpg)


    图 3-14


    IntelliJ IDEA 菜单，列出了可以在 **src** 目录中创建的 Java 对象


    除了 Java Class 选项外，还有一些红色箭头向你展示 `src` 目录中还可以包含哪些其他组件。让我们继续创建我们的类。点击 **Java Class**
    菜单选项，输入类名后，展开 **Kind:** 下拉列表。图 3-15 显示了展开后的列表。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig15_HTML.jpg](img/463938_1_En_3_Fig15_HTML.jpg)


    图 3-15


    IntelliJ IDEA 创建 Java 数据类型的对话框窗口


    Java 应用程序的核心构建块是 Java 类，但 Java 中还有其他对象类型。在 **Kind:** 列表中，列出了四种 Java 对象类型。每种类型稍后都会详细解释；现在，选择
    **Class** 并点击 **OK** 按钮。你会注意到，在 `src` 目录下创建了一个名为 `HelloWorld.java` 的文件，该文件的内容非常简单。


    ```

    /**

    * Created on 3/3/18.

    */

    public class HelloWorld {

    }

    ```


    你已经在你第一个简单的 Java 项目中创建了第一个 Java 类。它目前还什么也不做。但可以通过从 IntelliJ IDEA 的 **Build** 菜单中选择
    **Build Project** 选项，或按组合键（每个操作系统不同）来编译它。编译 Build Project 选项会生成包含字节码的 `HelloWorld.class`
    文件。默认情况下，IntelliJ IDEA 将编译结果存储到名为 `out\production` 的目录中。编译项目的菜单选项和结果如图 3-16 所示。菜单选项用
    (`1`) 标记。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig16_HTML.jpg](img/463938_1_En_3_Fig16_HTML.jpg)


    图 3-16


    IntelliJ IDEA——如何编译 Java 项目


    当你的项目中有多个类时，你可以通过右键单击类体并选择 **Recompile [ClassName].java**（在图 3-16 中用 (2) 标记）来编译你修改的那个类。

