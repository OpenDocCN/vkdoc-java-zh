    你从 `Stream` API 中记得的大部分函数都已在 Project Reactor 中为响应式使用而实现了，所以如果这段代码看起来很熟悉，原因就在于此。

    正如本节中的代码示例所证明的那样，使用 Project Reactor API 进行响应式流编程要实用得多，所以如果你需要一个响应式库，可以优先考虑这个。你可以在
    [`http://projectreactor.io/docs/core/milestone/reference/`](http://projectreactor.io/docs/core/milestone/reference/)
    找到官方文档，它内容很好且充满了示例。如果 Oracle 决定提供他们自己的用于使用响应式流编程响应式应用程序的丰富 API，他们可能已经为时已晚了。


    总结

    响应式编程不是一个简单的话题，但它似乎是编程的未来。你要记住的是，响应式实现对于非响应式的实现来说几乎毫无用处。我的意思是，将响应式组件与非响应式组件一起设计和使用是没有意义的，因为你可能会引入故障点并拖慢速度。例如，如果你使用的是
    Oracle 数据库，那么定义一个使用响应式流返回元素的仓库类是没有意义的，因为 Oracle 数据库不支持响应式访问。所以你添加了一个提供额外实现的响应式层，但在这种情况下并没有真正的好处。但是，如果你选择的数据库是
    MongoDB，你可以放心地使用响应式编程，因为 MongoDB 数据库支持响应式访问。此外，如果你正在构建一个带有 ReactJS 或 Angular 界面的
    Web 应用程序，你可以设计你的控制器类来响应式地提供数据以供界面显示。


    本章涵盖内容


    *   响应式编程


    *   响应式流的行为


    *   JDK 响应式流支持


    *   响应式流技术兼容性工具包


    *   Project Reactor 组件


    脚注


    13. 垃圾回收


    在执行 Java 代码时，对象会反复地从内存中被创建、使用和丢弃。丢弃未使用的 Java 对象的过程称为**内存管理**，但最常被称为**垃圾回收 (GC)**。在**第**  **5**  **章**中提到了垃圾回收，因为它是解释原始类型和引用类型之间区别所必需的，但在本章中，我们将深入
    JVM 的*内部机制*，以解决运行中的 Java 应用程序的另一个谜团。

    当 Java 垃圾回收器正常工作，在创建新对象之前清理内存并且内存不会填满时，你可以说分配给程序的内存被*回收*了。像我们到目前为止编写的那些低复杂度的程序，运行时不需要那么多内存，但根据它们的设计（还记得递归吗？），它们最终可能会使用比可用内存更多的内存。在
    Java 中，垃圾回收器会自动运行。在更底层的语言中，比如 **C**，没有自动内存管理，开发人员负责编写代码根据需要分配内存，并在不再需要时释放它。虽然自动内存管理看起来很实用，但如果管理不当，垃圾回收器可能会成为一个问题。因此，本章提供了关于垃圾回收器的足够信息，以确保它被明智地使用，并且当问题出现时，至少你有一个解决问题的良好起点。

    尽管本章将介绍一些调整垃圾回收器的方法，但请记住，垃圾回收调整不应该是必需的，程序应该以这样一种方式编写：只创建执行其功能所需的对象，并正确管理引用，在应用程序投入生产之前应该进行估算，并且在此之前应该知道并配置其所需的最大内存量。如果分配给
    Java 程序的内存不足，通常意味着实现中存在某些问题。


    垃圾回收基础

    Java 自动垃圾回收是 Java 编程语言的主要特性之一。JVM 是用于执行 Java 程序的虚拟机。由于 Java 程序使用了 JVM 所运行系统的资源，它必须有一种方法来安全地释放这些资源。这项工作由垃圾回收器完成。要理解垃圾回收器，我们必须先看看
    JVM 的架构。

    '
- fmt: '# Oracle Hotspot JVM Architecture


    Over the years, some big companies have produced their own variations of the JVM
    (e.g., IBM) and now that Java is moving into the module age and rapid delivery
    style, more and more companies appear that maintain a specific version of the
    JDK/JVM (e.g., Azul), because migration to 9+ is difficult for big applications
    with legacy dependencies. Also, another important economic factor here is that
    Java is paid software as of January 1, 2019, and developers have to pay for the
    software they have developed, which many are going to call *bait and switch* as
    Oracle first said, *Here it is free now use it,* and then, *Now that you have
    developed your Java apps, you have to pay us*. If you think about it, it is the
    same thing as buying the ground your house is built on, and the bricks, and everything
    else. Because the only thing that is yours when building a Java application is
    the application purpose and the design; everything you are using to build it is
    part of the JDK, which belongs to Oracle.


    Still, Oracle’s HotSpot is by far the most commonly used JVM when it comes to
    garbage collection. This JVM provides a mature set of garbage collection options.
    Its architecture is depicted in Figure [13-1](#463938_1_En_13_Chapter.xhtml#Fig1).


    ![../images/463938_1_En_13_Chapter/463938_1_En_13_Fig1_HTML.jpg](images/463938_1_En_13_Chapter/463938_1_En_13_Fig1_HTML.jpg)


    Figure 13-1 Oracle HotSpot JVM Architecture


    The *heap* memory area is managed by the garbage collector, and is split into
    multiple zones. Objects are moved between these zones until being discarded. The
    zones are depicted in Figure [13-2](#463938_1_En_13_Chapter.xhtml#Fig2) for old-fashioned
    garbage collector and the new style of garbage collector that follows the model
    of the current default garbage collector used by the JDK, the G1GC, introduced
    in JDK 8.


    ![../images/463938_1_En_13_Chapter/463938_1_En_13_Fig2_HTML.jpg](images/463938_1_En_13_Chapter/463938_1_En_13_Fig2_HTML.jpg)


    Figure 13-2 The heap structure


    The G1GC is a next-generation garbage collector designed for machines with a lot
    of resources, which is why its approach to the partitioning of the heap is different.
    Its heap is partitioned into a set of equal-sized heap regions, each a contiguous
    range of virtual memory. Certain region sets are assigned the same roles (Eden,
    survivor, old) as in the older collectors, but there is not a fixed size for them.
    This provides greater flexibility in memory usage. You can read more about the
    different types of garbage collectors in the next section, for now the focus remain
    on the *heap* memory and its zones that are called *generations*.


    When an application is running, objects created by it are stored in the **young
    generation** area. When an object is created it starts its life in a subdivision
    of this generation called **the Eden space**. When the Eden space is filled, this
    triggers a **minor garbage collection (minor GC run)** that cleans up this area
    of unreferenced objects, and moves referenced objects to the first survivor space
    (S0). The next time the Eden space is filled, another minor GC run is triggered,
    which again deletes unreferenced objects, and referenced objects are moved to
    the next survivor space (S1). The objects in S0 have been there for a minor GC
    run, so their age is incremented and they are moved to S1, so S0 and the Eden
    can be cleaned up. At the next minor GC run, the operation is repeated again,
    but this time referenced objects are saved into the empty S0 and the older objects
    form S1, have their age incremented and moved here as well, so the S1 and Eden
    can be cleaned up. After the objects in survivor space reach a certain age, they
    are moved to the **old generation** space during minor GC runs.


    The previous steps are depicted in Figure [13-3](#463938_1_En_13_Chapter.xhtml#Fig3),
    and the `o1` and `o2` objects age until they are moved to the old generation area.


    ![../images/463938_1_En_13_Chapter/463938_1_En_13_Fig3_HTML.jpg](images/463938_1_En_13_Chapter/463938_1_En_13_Fig3_HTML.jpg)


    Figure 13-3 Minor GC runs in the young generation space


    Minor GC collections happen until the old generation space is filled, which is
    when a **major garbage collection (major GC run)** is triggered. That deletes
    unreferenced objects, compacts the memory, and moves objects around so that the
    empty memory left is one big compact space. The *minor garbage collection* event
    is a *stop the world* event, this process basically takes over the run of the
    application and pauses its execution so it can free the memory. As the young generation
    space is small in size (as you see in the next section), the application pause
    is usually negligible. If no memory can be reclaimed from the young generation
    area after a minor GC run takes place, a major GC run is triggered.


    The **permanent generation** area is reserved for JVM metadata such as classes
    and methods. This area is cleaned too from time to time to remove classes that
    are no longer used in the application. The cleanup of this area is triggered when
    there is no more available memory left in the heap.


    The garbage collection process described up to this paragraph is specific to generational
    garbage collectors, such as the G1GC; but before JDK 8, garbage collection was
    done using an older garbage collector that uses an algorithm called **Concurrent
    Mark Sweep**. This type of garbage collector runs in parallel with the application
    marking used and unused zones of memory. Then it would delete unreferenced objects
    and would compact the memory into a contiguous zone by moving objects around.
    This process is inefficient and time consuming. Because as more and more objects
    were created, the garbage collection takes more and more time to be performed.
    But as most objects are short-lived, this is not really a problem. So the CMS
    garbage collector was OK for a while.


    The G1GC has a similar approach, but after the mark phase is finished, G1 focuses
    on regions that are mostly empty to recover as much unused memory as possible.
    That is why this garbage collector is also called *garbage-first*. G1 also uses
    a pause prediction model to decide how many memory regions can be processed based
    on the pause time set for the application. Objects from the processed region are
    copied to a single region of the heap, thus realizing a memory compaction at the
    same time. Also G1GC does not have a fixed size for the eden and survivor spaces,
    it decides their size after every minor GC run.


    ## How Many Garbage Collectors Are There?


    The Oracle HotSpot JVM provides the following types of garbage collectors:


    *   **serial collector**: All garbage collection events are conducted serially
    in one thread. Memory compaction happens after each garbage collection.

    *   **parallel collector**: Multiple threads are used for minor garbage collection.
    A single thread is used for a major garbage collection and Old Generation compaction.

    *   **CMS (Concurrent Mark Sweep)**: Multiple threads are used for minor garbage
    collection using the same algorithm as the parallel GC. Major garbage collection
    is multithreaded, but CMS runs concurrently alongside application processes to
    minimize *stop the world* events. No memory compaction is done. This type of garbage
    collector is suitable for applications requiring shorter garbage collection pauses
    and that can afford to share processor resources with the garbage collector while
    the application is running. This was the default garbage collector until Java
    8, when G1 was introduced officially as default.'
