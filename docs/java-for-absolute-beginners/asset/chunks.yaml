- fmt: "# Introducing JavaFX\n\nJavaFX Script was a scripting language designed by\
    \ Sun Microsystems, forming part of the JavaFX family of technologies on the Java\
    \ Platform. It was released shortly after JDK 6 in December 2008 and for a while\
    \ developers expected it to be dropped because it really did not catch on that\
    \ much, being a totally different language and all. But after acquiring Sun Microsystems,\
    \ Oracle decided to keep it and they transformed it into the JavaFX library, which\
    \ is a set of graphics and media packages that can be used by developers to design,\
    \ create, test, debug, and deploy rich client applications that operate consistently\
    \ across diverse platforms. And yes, mobile ones too. JavaFX is intended to replace\
    \ Swing as the main GUI library of the JDK, but so far, both Swing and JavaFX\
    \ have been part of all JDK versions until 10. That changed in JDK 11. Starting\
    \ with JDK 11, JavaFX is available as a separate module, decoupled from the JDK.\
    \ JavaFX is still not used as much as Oracle hoped, and separating it from the\
    \ JDK might encourage the OpenJFX community to contribute with some innovative\
    \ ideas, which might transform this library into an actual competitor for the\
    \ other existing GUI toolkits on the market (e.g., Eclipse SWT^([^(83)](#fn83))).\
    \ So let’s waste no time and start writing code to create an application similar\
    \ to the previous one using JavaFX.\n\nBeing part of the JDK now, and having classes\
    \ and other components, JavaFX code is currently normal Java code, so no more\
    \ scripting. JavaFX components are defined under a list of `java.fx.*` modules.\
    \ The following configuration snippet, shows that the module of our project that\
    \ uses JavaFX declares its dependency on a few `java.fx` modules by using the\
    \ `requires` directive, in its `module-info.java`.\n\n```\nmodule chapter.ten.javafx\
    \ {\n    requires javafx.base;\n    requires javafx.graphics;\n    requires javafx.controls;\n\
    \    opens com.apress.bgn.ch10 to javafx.graphics;\n}\n```\n\nAnd because the\
    \ JavaFX application launcher uses reflection to launch an application, you need\
    \ to open the package containing the implementation; otherwise, an `java.lang.IllegalAccessException`\
    \ is thrown, so that is why in the previous configuration the `opens com.apress.bgn.ch10;`\
    \ exists.\n\nLet’s start with a simple window that has a closing option. I’ll\
    \ explain how it is executed because JavaFX is a little different from Swing and\
    \ AWT. The code to display a plain square window is depicted next.\n\n```\npackage\
    \ com.apress.bgn.ch10;\nimport javafx.application.Application;\nimport javafx.scene.Scene;\n\
    import javafx.scene.layout.StackPane;\nimport javafx.stage.Stage;\npublic class\
    \ JavaFxDemo extends Application {\n    public static void main(String... args)\
    \ {\n        launch(args);\n    }\n    @Override\n    public void start(Stage\
    \ primaryStage) {\n        primaryStage.setTitle(\"JavaFX Demo Window!\");\n \
    \       StackPane root = new StackPane();\n        primaryStage.setScene(new Scene(root,\
    \ 500, 500));\n        primaryStage.show();\n    }\n}\n```\n\nThe first thing\
    \ you need to know is that the main class of the application must extend the `javafx.application.Application`\
    \ class, because this is the entry point for a JavaFX application. This is required\
    \ because JAVA FX applications are run by a new performance graphics engine named\
    \ **Prism** that sits on top of the JVM. Aside from Prism, the graphic engine,\
    \ JavaFX comes with its own windowing system named Glass, a media engine and a\
    \ web engine. They are not exposed publicly, the only thing available to developers\
    \ is the JavaFX API that provides access to any components you might need to build\
    \ application with fancy interfaces. All of these engines are tied together by\
    \ the **Quantum toolkit**, which is the interface between these engines and the\
    \ layer above in the stack. The Quantum toolkit manages execution threads and\
    \ rendering.\n\nThe `launch(...)` method is a static method in the `Application`\
    \ class that launches a standalone application. It is usually called from the\
    \ main method and can only be called once; otherwise, a `java.lang.IllegalStateException`\
    \ is thrown. The `launch` method does not return until the application is exited\
    \ by closing all windows or calling `Platform.exit()`. The `launch` method creates\
    \ an `JavaFxDemo` instance, calls the `init()` method on it and then calls `start(..)`.\
    \ The `start(..)` method is declared `abstract` in the `Application` class, so\
    \ the developer is forced to provide a concrete implementation.\n\nA JavaFX application\
    \ is built using components defined under the `javafx.scene` and has a hierarchical\
    \ organization. The core class of the `javafx.scene` package is the `javafx.scene.Node`\
    \ that is the root of the Scene hierarchy. Classes in this hierarchy provide implementations\
    \ for all of the visual elements of the application’s user interface. Because\
    \ all of them have `Node` as a root class, visual elements are called **nodes**,\
    \ which makes an application *a scene graph of nodes* and the initial node of\
    \ this graph is called a *root*. Each node has an unique identifier, a style class\
    \ and a bounding volume, and with the exception of the root node, each node in\
    \ the graph has a single parent and zero or more children. Aside from that a node\
    \ has the following properties.\n\n- effects, such as blurs and shadow - useful\
    \ when you hover with your mouse over the interface to make sure you click the\
    \ right component\n- opacity\n- transformations - changing visual state or position\n\
    - event handlers - similar to listeners in Swing, used to define reaction on mouse,\
    \ key and input method\n- application specific state\n\nThe scene graph simplifies\
    \ building rich interfaces a lot and, because it also includes graphics primitives\
    \ as rectangles, text, images and media and also, animating various graphics can\
    \ be accomplished by the animation APIs for package `javax.animation`. If you\
    \ are interested in finding out more on what’s under the hood of JavaFX, read\
    \ the article at [`https://docs.oracle.com/javafx/2/architecture/jfxpub-architecture.htm`](https://docs.oracle.com/javafx/2/architecture/jfxpub-architecture.htm),\
    \ because the focus of this book is on how to do things rather than how they work,\
    \ unless it really influences the design of your future solutions.\n\nWe’ve started\
    \ again with a simple window. The first step is to add a button to quit the application.\
    \ As rendering a JavaFX application involves a rendering engine, this means it\
    \ has to shutdown gracefully, so calling `System.exit(0)` is no longer a preferred\
    \ option. So the contents of the `start(..)` methods become the following.\n\n\
    ```\n...\npublic void start(Stage primaryStage) {\n    primaryStage.setTitle(\"\
    JavaFX Demo Window!\");\n    Button btn = new Button();\n    btn.setText(\"Bye\
    \ bye! \");\n    btn.setOnAction(new EventHandler() {\n        @Override\n   \
    \     public void handle(ActionEvent event) {\n            Platform.exit();\n\
    \        }\n    });\n    StackPane root = new StackPane();\n    root.getChildren().add(btn);\n\
    \    primaryStage.setScene(new Scene(root, 500, 500));\n    primaryStage.show();\n\
    }\n...\n```\n\nIf we run the `JavaFxDemo` class, the window depicted in Figure\
    \ [10-7](#463938_1_En_10_Chapter.xhtml#Fig7) pops up on your screen, and if you\
    \ click the **Bye bye!** Button, the application is gracefully closed because\
    \ of the `Platform.exit();` call.\n\n![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig7_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7\n\nJavaFX Window Demo"
  raw: '## Introducing JavaFX


    JavaFX Script was a scripting language designed by Sun Microsystems, forming part
    of the JavaFX family of technologies on the Java Platform. It was released shortly
    after JDK 6 in December 2008 and for a while developers expected it to be dropped
    because it really did not catch on that much, being a totally different language
    and all. But after acquiring Sun Microsystems, Oracle decided to keep it and they
    transformed it into the JavaFX library, which is a set of graphics and media packages
    that can be used by developers to design, create, test, debug, and deploy rich
    client applications that operate consistently across diverse platforms. And yes,
    mobile ones too. JavaFX is intended to replace Swing as the main GUI library of
    the JDK, but so far, both Swing and JavaFX have been part of all JDK versions
    until 10\. That changed in JDK 11\. Starting with JDK 11, JavaFX is available
    as a separate module, decoupled from the JDK. JavaFX is still not used as much
    as Oracle hoped, and separating it from the JDK might encourage the OpenJFX community
    to contribute with some innovative ideas, which might transform this library into
    an actual competitor for the other existing GUI toolkits on the market (e.g.,
    Eclipse SWT^([^(83)](#fn83))). So let’s waste no time and start writing code to
    create an application similar to the previous one using JavaFX.


    Being part of the JDK now, and having classes and other components, JavaFX code
    is currently normal Java code, so no more scripting. JavaFX components are defined
    under a list of `java.fx.*` modules. The following configuration snippet, shows
    that the module of our project that uses JavaFX declares its dependency on a few
    `java.fx` modules by using the `requires` directive, in its `module-info.java`.


    ```

    module chapter.ten.javafx {

    requires javafx.base;

    requires javafx.graphics;

    requires javafx.controls;

    opens com.apress.bgn.ch10 to javafx.graphics;

    }

    ```


    And because the JavaFX application launcher uses reflection to launch an application,
    you need to open the package containing the implementation; otherwise, an `java.lang.IllegalAccessException`
    is thrown, so that is why in the previous configuration the `opens com.apress.bgn.ch10;`
    exists.


    Let’s start with a simple window that has a closing option. I’ll explain how it
    is executed because JavaFX is a little different from Swing and AWT. The code
    to display a plain square window is depicted next.


    ```

    package com.apress.bgn.ch10;

    import javafx.application.Application;

    import javafx.scene.Scene;

    import javafx.scene.layout.StackPane;

    import javafx.stage.Stage;

    public class JavaFxDemo extends Application {

    public static void main(String... args) {

    launch(args);

    }

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("JavaFX Demo Window!");

    StackPane root = new StackPane();

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    }

    ```


    The first thing you need to know is that the main class of the application must
    extend the `javafx.application.Application` class, because this is the entry point
    for a JavaFX application. This is required because JAVA FX applications are run
    by a new performance graphics engine named **Prism** that sits on top of the JVM.
    Aside from Prism, the graphic engine, JavaFX comes with its own windowing system
    named Glass, a media engine and a web engine. They are not exposed publicly, the
    only thing available to developers is the JavaFX API that provides access to any
    components you might need to build application with fancy interfaces. All of these
    engines are tied together by the **Quantum toolkit** , which is the interface
    between these engines and the layer above in the stack. The Quantum toolkit manages
    execution threads and rendering.


    The `launch(...)` method is a static method in the `Application` class that launches
    a standalone application. It is usually called from the main method and can only
    be called once; otherwise, a `java.lang.IllegalStateException` is thrown. The
    `launch` method does not return until the application is exited by closing all
    windows or calling `Platform.exit()`. The `launch` method creates an `JavaFxDemo`
    instance, calls the `init()` method on it and then calls `start(..)`. The `start(..)`
    method is declared `abstract` in the `Application` class, so the developer is
    forced to provide a concrete implementation.


    A JavaFX application is built using components defined under the `javafx.scene`
    and has a hierarchical organization. The core class of the `javafx.scene` package
    is the `javafx.scene.Node` that is the root of the Scene hierarchy. Classes in
    this hierarchy provide implementations for all of the visual elements of the application’s
    user interface. Because all of them have `Node` as a root class, visual elements
    are called **nodes** , which makes an application *a scene graph of nodes* and
    the initial node of this graph is called a *root*. Each node has an unique identifier,
    a style class and a bounding volume, and with the exception of the root node,
    each node in the graph has a single parent and zero or more children. Aside from
    that a node has the following properties.


    *   effects, such as blurs and shadow - useful when you hover with your mouse
    over the interface to make sure you click the right component


    *   opacity


    *   transformations - changing visual state or position


    *   event handlers - similar to listeners in Swing, used to define reaction on
    mouse, key and input method


    *   application specific state


    The scene graph simplifies building rich interfaces a lot and, because it also
    includes graphics primitives as rectangles, text, images and media and also, animating
    various graphics can be accomplished by the animation APIs for package `javax.animation`.
    If you are interested in finding out more on what’s under the hood of JavaFX,
    read the article at [`https://docs.oracle.com/javafx/2/architecture/jfxpub-architecture.htm`](https://docs.oracle.com/javafx/2/architecture/jfxpub-architecture.htm)
    , because the focus of this book is on how to do things rather than how they work,
    unless it really influences the design of your future solutions.


    We’ve started again with a simple window. The first step is to add a button to
    quit the application. As rendering a JavaFX application involves a rendering engine,
    this means it has to shutdown gracefully, so calling `System.exit(0)` is no longer
    a preferred option. So the contents of the `start(..)` methods become the following.


    ```

    ...

    public void start(Stage primaryStage) {

    primaryStage.setTitle("JavaFX Demo Window!");

    Button btn = new Button();

    btn.setText("Bye bye! ");

    btn.setOnAction(new EventHandler() {

    @Override

    public void handle(ActionEvent event) {

    Platform.exit();

    }

    });

    StackPane root = new StackPane();

    root.getChildren().add(btn);

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    ...

    ```


    If we run the `JavaFxDemo` class, the window depicted in Figure [10-7](#463938_1_En_10_Chapter.xhtml#Fig7)
    pops up on your screen, and if you click the **Bye bye!** Button, the application
    is gracefully closed because of the `Platform.exit();` call.


    ![../images/463938_1_En_10_Chapter/463938_1_En_10_Fig7_HTML.jpg](images/463938_1_En_10_Chapter/463938_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    JavaFX Window Demo'
  trans: '

    ## 介绍 JavaFX


    JavaFX Script 是 Sun Microsystems 设计的一种脚本语言，是 Java 平台上 JavaFX 技术家族的一部分。它于 2008
    年 12 月 JDK 6 发布后不久推出，曾一度被开发者认为会被弃用，因为它作为一种完全不同的语言，并未真正流行起来。但在收购 Sun Microsystems
    后，Oracle 决定保留它，并将其转变为 JavaFX 库。这是一组图形和媒体包，开发者可以使用它们来设计、创建、测试、调试和部署能够在不同平台上一致运行的富客户端应用程序。没错，也包括移动平台。JavaFX
    旨在取代 Swing 成为 JDK 的主要 GUI 库，但到目前为止，Swing 和 JavaFX 一直是 JDK 10 之前所有版本的一部分。这种情况在
    JDK 11 中发生了变化。从 JDK 11 开始，JavaFX 作为一个独立的模块提供，与 JDK 解耦。JavaFX 的使用率仍未达到 Oracle 的预期，将其与
    JDK 分离可能会鼓励 OpenJFX 社区贡献一些创新想法，从而将这个库转变为市场上其他现有 GUI 工具包（例如 Eclipse SWT^(⁸³)）的真正竞争对手。所以，让我们不要浪费时间，开始编写代码，使用
    JavaFX 创建一个类似于之前示例的应用程序。


    作为 JDK 的一部分，并且拥有类和其他组件，JavaFX 代码现在就是普通的 Java 代码，因此不再需要脚本。JavaFX 组件定义在 `java.fx.*`
    模块列表下。以下配置片段显示，我们使用 JavaFX 的项目模块在其 `module-info.java` 中通过 `requires` 指令声明了对几个
    `java.fx` 模块的依赖。


    ```

    module chapter.ten.javafx {

    requires javafx.base;

    requires javafx.graphics;

    requires javafx.controls;

    opens com.apress.bgn.ch10 to javafx.graphics;

    }

    ```


    由于 JavaFX 应用程序启动器使用反射来启动应用程序，因此你需要开放包含实现的包；否则会抛出 `java.lang.IllegalAccessException`，这就是为什么在之前的配置中存在
    `opens com.apress.bgn.ch10;` 的原因。


    让我们从一个带有关闭选项的简单窗口开始。我将解释它的执行方式，因为 JavaFX 与 Swing 和 AWT 略有不同。显示一个普通方形窗口的代码如下所示。


    ```

    package com.apress.bgn.ch10;

    import javafx.application.Application;

    import javafx.scene.Scene;

    import javafx.scene.layout.StackPane;

    import javafx.stage.Stage;

    public class JavaFxDemo extends Application {

    public static void main(String... args) {

    launch(args);

    }

    @Override

    public void start(Stage primaryStage) {

    primaryStage.setTitle("JavaFX Demo Window!");

    StackPane root = new StackPane();

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    }

    ```


    首先需要知道的是，应用程序的主类必须继承 `javafx.application.Application` 类，因为这是 JavaFX 应用程序的入口点。这是必需的，因为
    JavaFX 应用程序由一个名为 **Prism** 的新性能图形引擎运行，该引擎位于 JVM 之上。除了图形引擎 Prism 之外，JavaFX 还自带了自己的窗口系统
    Glass、一个媒体引擎和一个 Web 引擎。它们不对外公开，开发者唯一能使用的是 JavaFX API，它提供了构建具有精美界面的应用程序所需的任何组件。所有这些引擎都由
    **Quantum 工具包** 连接在一起，它是这些引擎与堆栈中上层之间的接口。Quantum 工具包管理执行线程和渲染。


    `launch(...)` 方法是 `Application` 类中的一个静态方法，用于启动一个独立的应用程序。它通常从 main 方法中调用，并且只能调用一次；否则会抛出
    `java.lang.IllegalStateException`。`launch` 方法在通过关闭所有窗口或调用 `Platform.exit()` 退出应用程序之前不会返回。`launch`
    方法创建一个 `JavaFxDemo` 实例，在其上调用 `init()` 方法，然后调用 `start(..)`。`start(..)` 方法在 `Application`
    类中被声明为 `abstract`，因此开发者必须提供具体的实现。


    JavaFX 应用程序是使用 `javafx.scene` 下定义的组件构建的，并具有层次结构。`javafx.scene` 包的核心类是 `javafx.scene.Node`，它是场景层次结构的根。此层次结构中的类为应用程序用户界面的所有可视元素提供实现。因为它们都以
    `Node` 作为根类，所以可视元素被称为**节点**，这使得应用程序成为*节点的场景图*，而该图的初始节点称为*根*。每个节点都有一个唯一的标识符、一个样式类和一个包围体，并且除了根节点之外，图中的每个节点都有一个父节点和零个或多个子节点。除此之外，节点还具有以下属性。


    *   效果，例如模糊和阴影 - 当您将鼠标悬停在界面上以确保单击正确的组件时非常有用

    *   不透明度

    *   变换 - 改变视觉状态或位置

    *   事件处理程序 - 类似于 Swing 中的监听器，用于定义对鼠标、按键和输入法的反应

    *   应用程序特定状态


    场景图极大地简化了丰富界面的构建，并且因为它还包括图形基元，如矩形、文本、图像和媒体，此外，还可以通过 `javax.animation` 包的动画 API
    来实现各种图形的动画。如果您有兴趣了解更多关于 JavaFX 底层机制的信息，请阅读 [`https://docs.oracle.com/javafx/2/architecture/jfxpub-architecture.htm`](https://docs.oracle.com/javafx/2/architecture/jfxpub-architecture.htm)
    上的文章，因为本书的重点是如何做事，而不是它们如何工作，除非它确实影响您未来解决方案的设计。


