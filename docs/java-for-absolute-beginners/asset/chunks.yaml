    Lines 11 and 12 in the initial code sample depict how a `String` instance is created
    from a `char[3]` array. Until Java 8, internally that was the initial representation
    for String: arrays of characters. A character is represented on 2 bytes, which
    means a lot of memory was consumed for Strings. In Java 9, a new representation
    was introduced called **Compact String**, which uses `byte[]` or `char[]` depending
    on the content. This means that the memory consumed by your `String` processing
    application is significantly lower starting with Java 9.'
