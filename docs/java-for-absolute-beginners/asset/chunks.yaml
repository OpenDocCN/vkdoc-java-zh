- fmt: '# Summary


    The most often used elements of the Java language were introduced in this chapter,
    so that nothing you find in future code samples should surprise you, and you can
    focus on learning the language properly.


    - Syntax mistakes prevent Java code from being transformed into executable code.
    This means the code is not compiling.

    - Static variables can be used directly when declaring classes if static import
    statements are used.

    - Java identifiers must respect naming rules.

    - Comments are ignored by the compiler and there are three types of comments in
    Java.

    - Classes, interfaces, and enums are Java components used to create objects.

    - Abstract classes cannot be instantiated, even if they can have constructors.

    - Interfaces could only contain method templates until Java version 8, when default
    methods were introduced. And starting with Java 9 they can contain full implemented
    methods as long as they are declared private and are being called only from default
    methods.

    - Enums are special types of classes that can only be instantiated a fixed number
    of times.

    - In Java, there is no multiple inheritance using classes.

    - Interfaces can extend other interfaces.

    - Java defines a fixed number of keywords, called reserved keywords, which can
    be used only for specific purposes. They are covered in the previous section.


    A detailed article describing this problem and ways to avoid it can be found here:
    [`https://devopedia.org/race/-condition/-software`](https://devopedia.org/race/-condition/-software)


    Footnotes [1](#463938_1_En_4_Chapter.xhtml#Fn1_source) [2](#463938_1_En_4_Chapter.xhtml#Fn2_source)


    # 5. Data Types


    In Chapter [4](#463938_1_En_4_Chapter.xhtml), a lot of Java code was written,
    but when designing classes, only the most simple data types were used: a few numeric
    ones and text. In the JDK, a lot of data types are declared for a multitude of
    purposes: for modelling calendar dates, for representing multiple types of numeric,
    for manipulating texts, collections, files, database connections, and so forth.
    Aside from JDK, there are libraries created by other parties that provide even
    more functionality. But the data types provided by the JDK are fundamental ones,
    the bricks every Java application is built from. Of course, depending on the type
    of application you are building, you might not need all of them. For example,
    I’ve never had the occasion to use the `java.util.logging.Logger` class. Most
    applications that I’ve worked on were already set up by a different team when
    I came along, and they were using external libraries like Log4j or Logback, or
    logging abstractions like Slf4j.


    This section covers the basic Java data types that you need to write about 80%
    of any Java application.


    ## Stack and Heap Memory


    Java types can be split in two main categories: primitive and reference types.
    Java code files are stored on the HDD, Java bytecode files as well. Java programs
    run on the JVM, which is launched as a process by executing the `java` executable.
    During execution, all data is stored in two different types of memory named: `stack`
    and `heap` that are allocated for a program’s execution by the operating system.


    The **stack** memory is used during execution (also referred to as *at runtime*)
    to store method primitive local variables and references to objects stored in
    the heap. A **stack** is also a data-structure represented by a list of values
    that can only be accessed at one end, also called a **LIFO** order, which is an
    acronym for **L**ast **I**n, **F**irst **O**ut. The name fits, because every time
    a method gets called, a new block is created in the stack memory to hold local
    variables of the method: primitives and references to other objects in the method.^([^(56)](#fn56))


    Each JVM execution thread has its own stack memory, and its size can be specified
    using JVM parameter `-Xss`. If too many variables are allocated, or the method
    being called is recursive and badly designed, the condition to return is never
    fulfilled, and thus keeps calling itself forever. You run into a `java.lang.StackOverFlowError`,
    which means there is no stack memory left, because every method call causes a
    new block to be created on the stack.


    The **heap** memory is used at runtime to allocate memory for objects and JRE
    classes. Objects are instances of JDK classes or developer defined classes. Any
    object created with `new` is stored inside the heap memory. Objects created inside
    the heap memory can be accessed by all threads of the application. Access and
    management of the heap memory are a little more complex and is covered more in
    **Chapter** [**13**](#463938_1_En_13_Chapter.xhtml). The `-Xms` and `-Xmx` JVM
    parameters set the initial and maximum size of the heap memory for a Java program
    during execution. The heap size may vary, depending on the number of objects created
    by the program, and if all heap memory allocated to a Java program is full, then
    a `java.lang.OutOfMemoryError` is thrown.


    The JVM parameters are useful because during development, you might have to write
    code that solves complex problems and that needs a bigger than usual stack or
    heap memory, so instead of relying on the default sizes, you can set your own.
    Stack and heap default values are platform-specific. If you are interested in
    these values, check out the official documentation at [`https://docs.oracle.com/cd/E13150_01/jrockit_jvm/jrockit/jrdocs/refman/optionX.html`](https://docs.oracle.com/cd/E13150_01/jrockit_jvm/jrockit/jrdocs/refman/optionX.html),
    which covers all JVM parameters and default values. You can open the link in your
    browser and search for `-Xss`, `-Xms`, or `-Xmx`.


    The `java.lang.String` class is the most used class in the Java programming language.
    Because text values within an application might have the same value, for efficiency
    reasons this type of objects are managed a little different within the heap. In
    the heap there is a special memory region called the **StringPool** where all
    the `String` instances are stored by the JVM. This had to be mentioned here because
    the following piece of code that is analyzed to explain how memory is managed
    in Java contains a definition of a `String` instance, but the String Pool and
    other details about the `String` data type is covered in detail in its own section
    later in the chapter.


    Let’s consider the following executable class, and imagine how the memory is organized
    during the execution of this program.'
