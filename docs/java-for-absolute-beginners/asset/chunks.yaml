    ### 使用桩


    **桩**是一个包含预定义数据的对象，它使用这些数据来回答测试调用。`AccountServiceImpl` 的实例使用 `AccountRepo` 的实例从数据库检索数据或将数据保存到数据库。考虑到我们在编写单元测试，我们希望覆盖服务类的功能，因此可以编写一个**桩**类来模拟
