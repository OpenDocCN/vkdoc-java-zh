    The previous chapters covered ways to create statements and which operators to
    use. Sometimes, elements of logic were added to make the code runnable for you.
    This chapter is dedicated to explain how to manipulate the execution of your code
    using fundamental programming—conditional and repetitive statements.


    A solution and an algorithm can be represented using flowcharts. Most of the programming
    that we’ve done until this chapter contained declaration and printing statements—simple
    one-step statements. Take the following piece of code.


    ```

    package com.apress.bgn.ch7;

    public class Main {

    public static void main(String... args) {

    String text = "sample";

    System.out.println(text);

    }

    }

    ```


    If we were to design a flowchart for it, the schema would be simple and linear,
    no decision and no repetition, as depicted in Figure 7-1.


    ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig1_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1** Simple flowchart sample


    But resolving real-life problems requires often a more complicated logic than
    that, so more complicated statements are necessary. Before getting into that,
    let’s describe the components of a flowchart, because they will be used a lot
    during this chapter. Table 7-1 lists flowchart elements.


    **Table 7-1** Flowchart Elements


    | Shape | Name | Scope |

    | --- | --- | --- |

    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Figa_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Figa_HTML.jpg)
    | Terminal | Indicates beginning or end of a program, and contains a text relevant
    to its scope. |

    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Figb_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Figb_HTML.jpg)
    | Flowline | Indicates the flow of the program, the order of operations. |

    | ![../images/463938_1_En_7_Chapter/463938_1_En_7_Figc_HTML.jpg](images/463938_1_En_7_Chapter/463938_1_En_7_Figc_HTML.jpg)
