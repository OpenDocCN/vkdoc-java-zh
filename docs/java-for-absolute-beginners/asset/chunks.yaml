    ## XML 序列化


    但是，Java 序列化不一定会产生难以理解的文件，对象可以序列化为可读的格式。最常用的序列化格式之一是 XML，JDK 提供了将对象转换为 XML 以及从
    XML 转换回原始对象的类。**Java Architecture for XML Binding (JAXB)** 提供了一种快速便捷的方式来绑定 XML
    模式和 Java 表示，使 Java 开发者能够轻松地在 Java 应用程序中集成 XML 数据和处理功能。将对象序列化为 XML 的操作称为 *marshalling*。从
    XML 反序列化对象的操作称为 *unmarshalling*。要使一个类可序列化为 XML，必须使用 JAXB 特定的注解进行装饰。


    - `@XmlRootElement(name = "...")` 是一个顶级注解，放置在类级别，告诉 JAXB 在序列化时类名成为 XML 元素；如果需要为
    XML 元素指定不同的名称，可以通过`name`属性指定。

    - `@XmlElement(name = "..")` 是一个方法或字段级别的注解，告诉 JAXB 在序列化时字段或方法名成为 XML 元素；如果需要为
    XML 元素指定不同的名称，可以通过`name`属性指定。

    - `@XmlAttribute(name = "..")` 是一个方法或字段级别的注解，告诉 JAXB 在序列化时字段或方法名成为 XML 属性；如果需要为
    XML 属性指定不同的名称，可以通过`name`属性指定。


    JAXB 已从 JDK 11 中移除，因此如果你想使用它，必须添加外部依赖。在编写本章时，它也有点不稳定，类`com.sun.xml.internal.bind.v2.ContextFactory`是`jaxb-impl`库的一部分，目前在任何公共仓库中都找不到，至少没有找到用
