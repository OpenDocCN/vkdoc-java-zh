    The `urlPattern` property was added to this class for practical reasons to keep
    everything related to this servlet in one place. The same goes for `servletName`.
    If the intention was to instantiate this class multiple times to create multiple
    servlets, these two properties should be taken outside of it. Inside the `doGet(..)`
    method we only read the contents of the `index.html` file and we write them in
    the response object using the response `PrintWriter`.


    As you can see, the `doGet(..)` method receives as arguments two objects: the
    `HttpServletRequest` instance is read and all contents of the request sent from
    the client can be accessed using appropriate methods, and the `HttpServletResponse`
    instance, that is used to add information to the response. In the previous code
    sample, we are just writing HTML code read from another file, but we can set the
    status also by calling `response.setStatus(HttpServletResponse.SC_OK);` Aside
    from the `doGet(..)` method there are `do*(..)` methods matching each HTTP method
    that declare the same type of parameters.


    Another way to write the class (starting with Servlet 3.0) is depicted in the
    following code snippet:


    ```

    package com.apress.bgn.ch10;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import java.io.BufferedReader;

    import java.io.FileReader;

    import java.io.IOException;

    import java.io.PrintWriter;

    @WebServlet(

    name = "sampleServlet",

    urlPatterns = {"/"}

    )

    public class IndexServlet extends HttpServlet {

    @Override

    protected void doGet(HttpServletRequest request, HttpServletResponse response)

    throws IOException {

    PrintWriter writer = response.getWriter();

    response.setStatus(HttpServletResponse.SC_OK);

    try (BufferedReader reader = new BufferedReader(

    new FileReader("chapter10/web-app/src/main/resources/static/index.html"))) {

