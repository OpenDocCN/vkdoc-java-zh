    only have so little of them. In bigger applications, property names usually contain
    a prefix that is relevant to their purpose, for example if the property value
    is a title the name is prefixed with `title`. For example, the property names
    in our files could be changed to the following:


    ```

    English --> label.lang.english

    French --> label.lang.french

    Italian --> label.lang.italian

    Cat --> label.pet.cat

    Dog --> label.pet.dog

    Parrot --> label.pet.parrot

    Mouse --> label.pet.mouse

    Cow --> label.pet.cow

    Pig --> label.pet.pig

    WindowTitle --> title.window

    Byebye --> label.button.byebye

    ChoosePet --> label.choose.pet

    ChooseLanguage --> label.choose.language

    ```


    Now that we have covered how the resource files should be written, let’s see how
    they are used. To create a `ResourceBundle` instance, we first need a locale.
    Applications have a default locale that can be obtained by calling `Locale.getDefault()`,
    and a `ResourceBundle` instance can be obtained by using a bundle name and a locale
    instance, as depicted in the following code snippet.


    ```

    Locale locale = Locale.getDefault();

    ResourceBundle labels = ResourceBundle.getBundle("global", locale);

    ```


    When a valid `ResourceBundle` is obtained, it can replace all hard-coded `String`
    instances with calls to return text values from the resource file matching the
    selected locale. So, every time we need to set a label for a node, instead of
    using the actual text, we use a call to `resourceBundle.getString("[property_name]")`
    to get the localized text.


    When a JavaFX window is reloaded, all its nodes are re-created. To influence how,
    we need to add a couple of static properties to keep the selected locale set.
    So, for the application that we’ve build so far, after internationalizing it,
    the code looks like the one in the next listing.


    ```

    package com.apress.bgn.ch10;

    import javafx.*;

    import java.io.File;

    import java.net.URL;

    import java.net.URLClassLoader;

    import java.util.Locale;

    import java.util.ResourceBundle;

    public class JavaFxDemo extends Application {

    private static final String BUNDLE_LOCATION =

    "chapter10/using-javafx/src/main/resources";

    private static ResourceBundle resourceBundle = null;

    private static Locale locale = new Locale("en", "GB");

    private static int selectedLang = 0;

    public static void main(String... args) {

    Application.launch(args);

    }

    @Override

    public void start(Stage primaryStage) throws Exception {

    loadLocale(locale);

    primaryStage.setTitle(resourceBundle.getString("WindowTitle"));

    String[] data = {resourceBundle.getString("Cat"),

    resourceBundle.getString("Dog"),

    resourceBundle.getString("Parrot"),

    resourceBundle.getString("Mouse"),

    resourceBundle.getString("Cow"),

    resourceBundle.getString("Pig")};

    BorderPane borderPane = new BorderPane();

    //Top

    final ComboBox comboBox = new ComboBox();

    comboBox.getItems().addAll(data);

    final ComboBox langList = new ComboBox();

    String[] languages = {

    resourceBundle.getString("English"),

    resourceBundle.getString("French"),

    resourceBundle.getString("Italian")};

    langList.getItems().addAll(languages);

    langList.getSelectionModel().select(selectedLang);

    GridPane gridPane = new GridPane();

    gridPane.setHgap(10);

    gridPane.setVgap(10);

    Label labelLang = new Label(resourceBundle.getString("ChooseLanguage"));

    gridPane.add(labelLang, 0, 0);

    gridPane.add(langList, 1, 0);

    Label labelPet = new Label(resourceBundle.getString("ChoosePet"));

    gridPane.add(labelPet, 0, 1);

    gridPane.add(comboBox, 1, 1);

    borderPane.setTop(gridPane);

    //Center

    final TextArea textArea = new TextArea();

    textArea.setEditable(false);

    borderPane.setCenter(textArea);

    comboBox.valueProperty().addListener((observable, oldValue, newValue)

    -> textArea.appendText(newValue + "\n"));

    langList.valueProperty().addListener((observable, oldValue, newValue)

    -> {

    int idx = langList.getSelectionModel().getSelectedIndex();

    selectedLang = idx;

    if (idx == 0) {

    //locale = Locale.getDefault();

    new Locale("en", "GB");

    } else if (idx == 1) {

    locale = new Locale("fr", "FR");

    } else {

    locale = new Locale("it", "IT");

    }

    primaryStage.close();

    Platform.runLater(() -> {

    try {

    new JavaFxDemo().start(new Stage());

    } catch (Exception e) {

    System.err.println("Could not reload application!");

    }

    });

    });

    HBox box = new HBox();

    box.setPadding(new Insets(10, 12, 10, 12));

    box.setSpacing(10);

    box.setAlignment(Pos.BASELINE_RIGHT);

    box.setStyle("-fx-background-color: #85929e;");

    Button exitButton = new Button();

    exitButton.setText(resourceBundle.getString("Byebye"));

    exitButton.setOnAction(event -> Platform.exit());

    box.getChildren().add(exitButton);

    borderPane.setBottom(box);

    //Bottom

    StackPane root = new StackPane();

    root.getChildren().add(borderPane);

    primaryStage.setScene(new Scene(root, 500, 500));

    primaryStage.show();

    }

    private void loadLocale(Locale locale) throws Exception {

    File file = new File(BUNDLE_LOCATION);

    URL[] url = {file.toURI().toURL()};

    ClassLoader loader = new URLClassLoader(url);

    resourceBundle = ResourceBundle.getBundle("global", locale, loader);

    }

    }

    ```


    You might be wondering why we used another way of loading the resource bundle
    and why the full relative path to the bundle location was used. Well, if we want
    the application to be runnable from the IntelliJ Interface, we have to provide
    a path relative to the execution context of the application. When the application
    is built and packed in a runnable Java archive, the resource files are part of
    it and in the classpath. But we run the application by executing the `main()`
    method in an Java IDE, the classpath is relative to the actual location of the
    project.'
