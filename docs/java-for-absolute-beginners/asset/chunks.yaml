  trans: "\n## 安装 Java 集成开发环境\n\n根据我十多年的经验，我推荐的编辑器是 IntelliJ IDEA。它由一家名为 JetBrains\
    \ 的公司开发。你可以从他们的官方网站 [`www.jetbrains.com`](http://www.jetbrains.com) 下载此 IDE。有一个终极版可供你免费使用\
    \ 30 天；之后，你需要获取许可证。这就是为什么我建议你下载并使用社区版，^(²⁸) 因为对于学习 Java 所涉及的简单开发来说，这个版本已经足够了。\n\
    \n下载 IntelliJ IDEA 压缩包后，双击进行安装。之后，启动它并进行一些配置。只需点击**下一步**按钮，直到进入插件选择步骤，该步骤应与图 2-10\
    \ 中所示的非常相似。\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig10_HTML.jpg](img/463938_1_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10\n\nIntelliJ IDEA 社区版配置插件对话框部分\n\n在上图中，有两个部分被划了线。第一部分配置构建工具。如果你点击**自定义...**按钮，窗口应会切换显示可用于构建工具的插件。确保\
    \ Gradle 的选项被勾选，如图 2-11 所示，然后点击**保存更改并返回**按钮。\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig11_HTML.jpg](img/463938_1_En_2_Fig11_HTML.jpg)\n\
    \n图 2-11\n\nIntelliJ IDEA 社区版配置 Gradle 插件\n\n第二部分配置版本控制系统的支持。如果你点击**自定义...**按钮，窗口应会显示可用于版本控制系统的插件。确保\
    \ Git 和 GitHub 的选项被勾选，如图 2-12 所示，然后点击**保存更改并返回**按钮。如果你再继续下一步，你会进入另一个插件屏幕，该屏幕提供安装一个名为\
    \ **IDE Feature Trainer** 的插件的选项。我认为如果你是初学者，这个插件可能非常有用。该窗口如图 2-13 所示。\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig12_HTML.jpg](img/463938_1_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12\n\nIntelliJ IDEA 社区版配置 Git 插件\n\n最后一步，点击**安装**按钮，然后点击**开始使用 IntelliJ\
    \ IDEA**，这样你就全部设置好，可以开始使用了。你的开发环境已完全配置好，可以编写你的第一个 Java 程序了。\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig13_HTML.jpg](img/463938_1_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13\n\nIntelliJ IDEA 社区版配置 IDE Feature Trainer 插件\n\n但在那之前，让我们也介绍一下如何获取本书的源代码。\n\
    \n有三种方法可以获取本书的源代码：\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig15_HTML.jpg](img/463938_1_En_2_Fig15_HTML.jpg)\n\
    \n图 2-15\n\nIntelliJ IDEA 克隆 java-for-absolute-beginners 项目的第二个对话框窗口\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig14_HTML.jpg](img/463938_1_En_2_Fig14_HTML.jpg)\n\
    \n图 2-14\n\nIntelliJ IDEA 克隆 java-for-absolute-beginners 项目的第一个对话框窗口\n\n*   直接从\
    \ GitHub 下载压缩包。\n\n*   使用终端（或在 Windows 中使用 Git Bash Shell）通过以下命令克隆仓库：\n\n```\n\
    \    git clone git@github.com:Apress/java-for-absolute-beginners.git\n    ```\n\
    \n*   使用 IntelliJ IDEA 克隆项目。对于此方法以及从命令行克隆，你需要一个 GitHub 用户。以下图片展示了使用 IntelliJ IDEA\
    \ 克隆项目时看到的所有对话框窗口。图 2-14 显示了在启动一个从未使用过的 IntelliJ IDEA 实例后看到的窗口。该项目托管在 GitHub 上，因此从**从版本控制检出**菜单中，选择\
    \ **GitHub**。此时，你会进入下一个对话框窗口，如图 2-15 所示。\n\n这需要你输入你的 GitHub 用户名和密码（认证类型：**密码**）。如果你没有\
    \ GitHub 用户名，请访问 [`https://github.com`](https://github.com) 创建一个。点击**登录**按钮后，会显示如图\
    \ 2-16 所示的窗口。\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig16_HTML.jpg](img/463938_1_En_2_Fig16_HTML.jpg)\n\
    \n图 2-16\n\nIntelliJ IDEA 克隆 java-for-absolute-beginners 项目的第三个对话框窗口\n\n点击**克隆**按钮，然后进入如图\
    \ 2-17 所示的窗口。\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig17_HTML.jpg](img/463938_1_En_2_Fig17_HTML.jpg)\n\
    \n图 2-17\n\nIntelliJ IDEA 克隆 java-for-absolute-beginners 项目的第四个对话框窗口\n\n点击**是**，因为你绝对需要为源代码创建一个\
    \ IntelliJ IDEA 项目。在图 2-18 中，IntelliJ IDEA 已识别出该项目可能使用 Gradle 配置，并建议**从外部模型导入项目**并选择\
    \ Gradle。照做并点击**下一步**。\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig18_HTML.jpg](img/463938_1_En_2_Fig18_HTML.jpg)\n\
    \n图 2-18\n\nIntelliJ IDEA 克隆 java-for-absolute-beginners 项目的第五个对话框窗口\n\n图 2-19\
    \ 所示的窗口是在拥有一个完整的本地 Gradle 项目之前的最后一张图片。如果你正确配置了 JAVA 和 Gradle，IntelliJ IDEA 会自动为你找到并选择它们。\n\
    \n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig19_HTML.png](img/463938_1_En_2_Fig19_HTML.png)\n\
    \n图 2-19\n\nIntelliJ IDEA 克隆 java-for-absolute-beginners 项目的最后一个窗口\n\n就是这样。从下一章开始，将展示一些代码片段；所以请继续构建项目。你可以通过从\
    \ Gradle 项目视图中执行 `build` 任务来完成此操作。图 2-20 显示了加载了项目并打开了 Gradle 视图的 IntelliJ IDEA\
    \ 编辑器。\n\n![../images/463938_1_En_2_Chapter/463938_1_En_2_Fig20_HTML.jpg](img/463938_1_En_2_Fig20_HTML.jpg)\n\
    \n图 2-20\n\nIntelliJ IDEA Gradle 项目视图，其中 Tasks 节点已展开\n"
- fmt: "# Summary\n\nIf any of instructions are unclear to you (or I missed something),\
    \ do not hesitate to use the World Wide Web to search for answers. All the software\
    \ technologies introduced in this chapter are backed up by documented and comprehensive\
    \ official websites and by huge communities of developers eager to help. And in\
    \ the worst-case scenario, you can always create an issue on the Apress GitHub\
    \ official repository for this book, or drop me an email. I’ll do my best to support\
    \ you if need be.\n\nBut I think you will be fine. Java is hardly rocket-science.^([^(29)](#fn29))![../images/463938_1_En_2_Chapter/463938_1_En_2_Figb_HTML.jpg](images/463938_1_En_2_Chapter/463938_1_En_2_Figb_HTML.jpg)\n\
    \nFootnotes [1](#463938_1_En_2_Chapter.xhtml#Fn1_source) [2](#463938_1_En_2_Chapter.xhtml#Fn2_source)\
    \ [3](#463938_1_En_2_Chapter.xhtml#Fn3_source) [4](#463938_1_En_2_Chapter.xhtml#Fn4_source)\
    \ [5](#463938_1_En_2_Chapter.xhtml#Fn5_source) [6](#463938_1_En_2_Chapter.xhtml#Fn6_source)\
    \ [7](#463938_1_En_2_Chapter.xhtml#Fn7_source) [8](#463938_1_En_2_Chapter.xhtml#Fn8_source)\
    \ [9](#463938_1_En_2_Chapter.xhtml#Fn9_source) [10](#463938_1_En_2_Chapter.xhtml#Fn10_source)\
    \ [11](#463938_1_En_2_Chapter.xhtml#Fn11_source) [12](#463938_1_En_2_Chapter.xhtml#Fn12_source)\
    \ [13](#463938_1_En_2_Chapter.xhtml#Fn13_source) [14](#463938_1_En_2_Chapter.xhtml#Fn14_source)\
    \ [15](#463938_1_En_2_Chapter.xhtml#Fn15_source)\n\n# 3. Getting Your Feet Wet\n\
    \nThis is the last introductory chapter in the book. After this one, we get to\
    \ the serious business. The previous chapter left you with a complete development\
    \ environment configured for writing Java code. It is time to make use of it.\
    \ The following topics are covered in this chapter:\n\n- Using JShell\n- Java\
    \ fundamental building blocks: packages, modules, and classes\n- Creating a Java\
    \ project with IntelliJ IDEA\n- Compiling and executing Java classes\n- Packing\
    \ a Java application into an executable jar\n- Using Gradle to automate compiling\
    \ and test execution\n\n## Using JShell\n\nIntroduced in Java 9, the Java Shell\
    \ tool (JShell) is an interactive tool for learning the Java programming language\
    \ and prototyping Java code. This means that you can write Java code and execute\
    \ it in the console, without the need to save it to a file, which is later compiled\
    \ into bytecode and then interpreted by the underlying OS as a sequence of instructions\
    \ to run to execute it. JShell is quite late to the party, as scripting languages\
    \ like Python and Node introduced similar utilities years ago, and JVM languages\
    \ like Scala, Clojure, and Groovy adopted it some time ago. But, better late than\
    \ never is still acceptable.\n\nJShell is a Read-Eval-Print Loop (REPL), which\
    \ evaluates declarations, statements, and expressions as they are entered, and\
    \ then it immediately shows the results. It is practical to try new ideas and\
    \ techniques quickly and without the need to have a complete development environment\
    \ or an entire context for the code to be executed in.\n\nJShell is a standard\
    \ component of the JDK and the executable to start it, is in the `bin` directory\
    \ located in the JDK installation directory. This means that all you have to do\
    \ is open a terminal (Command Prompt in `Windows`, and any type of terminal you\
    \ have installed on `macOS` and `Linux`) and type `jshell`. You should see something\
    \ like this:^([^(30)](#fn30))\n\n```\n$ jshell\n|  Welcome to JShell -- Version\
    \ 10\n|  For an introduction type: /help intro\n```\n\nGo ahead and enter `/help`\
    \ to view a list of all the available actions and commands.\n\n```\njshell> /help\n\
    |  Type a Java language expression, statement, or declaration.\n|  Or type one\
    \ of the following commands:\n|  /list |-all|-start\n|          list the source\
    \ you have typed\n|  /edit \n|          edit a source entry\n|  /drop \n|    \
    \      delete a source entry\n...\n|  /exit \n|          exit the jshell tool\n\
    ...\n```\n\nTo see exactly what JShell is doing, we can start it in verbose mode\
    \ by adding `-v` as an argument when starting it. Let’s play with a few numbers\
    \ and see what happens. First, let’s start the JShell in a verbose mode, so we’ll\
    \ have a report log of everything that JShell does when we insert statements.\
    \ In your terminal, of enter `java -v`.\n\n```\n$ jshell -v\n|  Welcome to JShell\
    \ -- Version 10-ea\n|  For an introduction type: /help intro\n```\n\nIn Java,\
    \ values are assigned to sequences of characters named **variables**. (More about\
    \ how to name them and use them in **Chapter** [4](#463938_1_En_4_Chapter.xhtml).)\
    \ Next, let’s create a variable of type integer (`int` in Java) and give it the\
    \ value of 42. To do this, enter `int i=42`.\n\n```\njshell> int i = 42\ni ==>\
    \ 42\n|  created variable i : int\n```\n\nAs you can see, the log message is clear\
    \ and tells us that our command was executed successfully and the variable of\
    \ type `int` was created. The line `i ==> 42` lets us know that value 42 was assigned\
    \ to the variable that we just created.\n\nLet’s declare another one named `j`.\
    \ In the code snippet, below 35 is the value that we assign to it. But you can\
    \ try different numbers if you want to.\n\n```\njshell> int j = 35\nj ==> 35\n\
    |  created variable j : int\n```\n\nAs long as the JShell session is not closed,\
    \ the two previous variables still exist, because we can further use them. Let’s\
    \ add them together. The `+` operator sums two integer variables in Java, just\
    \ like in plain mathematics. Enter `i + j`.\n\n```\njshell> i + j\n$3 ==> 77\n\
    |  created scratch variable $3 : int\n```\n\nAs you can see, we added two variables\
    \ but we did not store the result in a third, thus JShell creates a **scratch\
    \ variable** to store the result and print it in the log; but that variable cannot\
    \ be used in later statements, because it does not have a name.\n\nAll seems fine:\
    \ variables are created and operations are executed correctly. Anything that could\
    \ be written in Java can be written in the JShell and executed."
