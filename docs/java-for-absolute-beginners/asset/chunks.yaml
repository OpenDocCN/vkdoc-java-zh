    ## Using Weak References


    If there are strong references, we should be able to use weak references for objects
    that we want cleaned, right? Right. In Java, there are three classes that can
    be used to create a reference to an object that does not protect that object from
    garbage collection. This is useful for objects that are too big, and it makes
    it inefficient to keep them in memory. With this kind of objects it is worth the
    cost of time consumed to be reinitialized, because keeping them in memory would
    slow down the overall performance of the application.


    The three classes are:


    *   `java.lang.ref.SoftReference<T>`: objects referred by these type of references
    are cleared at the discretion of the garbage collector in response to memory demand.
    Soft references are most often used to implement memory-sensitive caches.


    *   `java.lang.ref.WeakReference<T>`: objects referred by these type of references
    do not prevent their referents from being made finalizable, finalized, and then
    reclaimed. Weak references are most often used to implement canonicalizing mappings.
    Canonicalizing mapping refers to containers where weak references can be kept
    in and can be accessed by other objects, but their link to the container does
    not prevent them from being collected.


    *   `java.lang.ref.PhantomReference<T>`: objects referred by these type of references
    are enqueued after the collector determines that their referents may otherwise
    be reclaimed. Phantom references are most often used to schedule post-mortem cleanup
    actions.


    Our `SingletonDictionary` contains a `Map<>` that is the big object stored in
    memory. This map can be wrapped in a `WeakReference`, and we can write some logic
    that it should be reinitialized if it is not there when accessed. Because we need
    to access the map, the implementation changes a little, aside from wrapping the
    `Map` into a `WeakReference`. The new class, named `WeakDictionary`, is depicted
    in the following code listing.


    ```java

    package com.apress.bgn.ch13.util;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.lang.ref.WeakReference;

    import java.util.HashMap;

    import java.util.Map;

    public class WeakDictionary {

    private static final Logger log =

    LoggerFactory.getLogger(WeakDictionary.class);

    private static WeakDictionary instance = new WeakDictionary();

    private WeakReference> dictionary;

    private static Cleaner cleaner;

    private WeakDictionary() {

    cleaner = Cleaner.create();

    dictionary = new WeakReference(initDictionary());

    }

    public synchronized String getExplanationFor(Integer key) {

    Map dict = dictionary.get();

    if (dict == null) {

    dict = initDictionary();

    dictionary = new WeakReference(dict);

    return dict.get(key);

    } else {

    return dict.get(key);

    }

    }

    public synchronized static WeakDictionary getInstance() {

    return instance;

    }

    private Map initDictionary() {

    Map dict = new HashMap();

    log.info("Starting to create dictionary: {}", System.currentTimeMillis());

    final NameGenerator keyGen = new NameGenerator(20);

    final NameGenerator valGen = new NameGenerator(200);

    for (int i = 0; i  log.info("Cleaned up the dictionary!"));

    return dict;

    }

    }

    ```


    The `getExplanationFor()` accesses the map and gets the value corresponding to
    a key. But before doing that, we have to check if the `Map` is still there. This
    is done by calling the `get()` method on the `dictionary` reference that is of
    type `WeakReference<Map<Integer, String>>`. If the map was not collected by the
    GC, the key is extracted and returned; otherwise, the `Map` is reinitialized and
    the weak reference is re-created.


    The `Cleaner` instance was moved in the `WeakDictionary` class, and registered
    a `Cleanable` for the `Map` so we can see the map being collected. So, how do
    we test this? In a similar way we tested `SingletonDictionary`.


