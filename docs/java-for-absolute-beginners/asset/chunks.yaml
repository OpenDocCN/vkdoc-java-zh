    And since we might get the path to `index.html` wrong, we made sure to display
    a proper message in the page. Next is to create a JSP page. There are two ways
    of writing JSP pages. *JSP scriptlets* are the simplest ones to use. They are
    pieces of Java code embedded in HTML code using *directive tags*. There are three
    type of directive tags.


    *   `<%@ page ... %>` directive used to provide instructions to the container.
    Instructions declared using this directive belong to the current page and can
    be used anywhere in the page. Such a directive can import Java types or define
    page properties; for example,

    *   `<%@ include ... %>` directive includes a file during translation phase. Thus
    the current JSP file where this directive is used, is a composition of its content
    and the content of the file that is declared using this directive.

    *   `<%@ taglib ... %>` directive declares a tag library with elements that are
    used in the JSP page. This directive is important because it imports a library
    with custom tags and element that writes the JSP page. These tags provide dynamic
    functionality without the need for scriptlets.


    The `index.jsp` page that we are using in this application is quite simple.


    ```jsp

    Web Application Demo JSP Page

    Today is

    ```


    The page displays today’s date, and this is done by calling `new Date()`. We are
    using Java code in what it looks like an HTML page. Because those directives are
    in there at the top of the page and the extension is `.jsp`, the container knows
    this file must be compiled into a servlet. The default page a web application
    opens with when its root domain is accessed, if nothing was mapped to the default
    URL pattern `"/"` is a file named `index.html` or `index.htm` or `index.jsp` in
    this case. So, aside from adding the file named `index.jsp` in the proper directory
    and then making sure the container can find the said application directory, there
    is nothing more to do so that when we access `http://localhost:8080/demo/` our
    page is displayed.


    So let’s see how the `WebDemo` class changes to make sure the `index.jsp` file
    is found and displayed properly.


    ```java

    package com.apress.bgn.ch10;

    import org.apache.catalina.WebResourceRoot;

    import org.apache.catalina.WebResourceSet;

    import org.apache.catalina.core.StandardContext;

    import org.apache.catalina.startup.Tomcat;

    import org.apache.catalina.webresources.DirResourceSet;

    import org.apache.catalina.webresources.EmptyResourceSet;

    import org.apache.catalina.webresources.StandardRoot;

    import java.io.File;

    import java.nio.file.Files;

    import static com.apress.bgn.ch10.LocationUtility.getRootFolder;

    public class WebDemo {

    public static void main(String... args) throws Exception {

    File root = getRootFolder();

    Tomcat tomcat = new Tomcat();

    tomcat.setPort(8080);

    tomcat.setBaseDir(root.getAbsolutePath());

    File webAppFolder = new File(root.getAbsolutePath(),

    "production/resources/dynamic");

    if (!webAppFolder.exists()) {

    System.err.println("Could not find JSP pages directory!");

    }

    StandardContext context = (StandardContext) tomcat.

    addWebapp("/demo", webAppFolder.getAbsolutePath());

    context.setParentClassLoader(WebDemo.class.getClassLoader());

    File webInfClasses = new File(root.getAbsolutePath(), "production/classes");

    WebResourceRoot resources = new StandardRoot(context);

    WebResourceSet resourceSet;

    if (webInfClasses.exists()) {

    resourceSet = new DirResourceSet(resources, "/WEB-INF/classes",

    webInfClasses.getAbsolutePath(), "/");

    } else {

    resourceSet = new EmptyResourceSet(resources);

    }

    resources.addPreResources(resourceSet);

    context.setResources(resources);

    tomcat.start();

    tomcat.getServer().await();

    }

    }

    ```


    So now when we open `http://localhost:8080/demo/` URL in the browser, you should
    see a simple message like the following.


    ```

    Today is Mon Aug 20 01:41:29 BST 2018

    ```


    Of course, the date is the one on your system.


    As an exercise for you, imagine how the Java servlet class would look like if
    you had to write it.


    Since taglibs were mentioned, let’s talk a little about them. The most basic tag
    library is the JSTL, which stands for **JSP Standard Tag Library**. Other more
    evolved tag libraries are provided by JSF (JavaServerFaces), Thymeleaf, or Spring.
    Tags defined in this library can be used to write JSP pages that change behavior.
    Depending on request attributes, they can be used to iterate, to test values,
    and for internationalization and formatting. Based on the JSTL functions provided,
    the tags are grouped into five categories. They can be used in a JSP page only
    after specifying the appropriate directives. Next, the five directives are listed
    with the overall topic the tags cover.


    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>` JSTL Core
    tags provide support for displaying values, iteration, conditional logic, catch
    exceptions, URL, and forward or redirect response.

    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/fmt" prefix="fmt" %>` JSTL Formatting
    tags are provided for formatting of numbers, dates, and i18n support through locales
    and resource bundles.

    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/sql" prefix="sql" %>` JSTL SQL
    tags provide support for interaction with relational databases, but never do this,
    never use SQL in a web page because it is very easily hackable (look up *SQL Injection*
    on Google).

    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/xml" prefix="x" %>` JSTL XML
    tags provide support for handling XML documents, parsing, transformations and
    XPath expressions evaluation.

    *   `<%@ taglib uri="http://java.sun.com/jsp/jstl/functions" prefix="fn" %>` JSTL
    Function tags provide a number of functions that can be used to perform common
    operations such as text manipulations.'
