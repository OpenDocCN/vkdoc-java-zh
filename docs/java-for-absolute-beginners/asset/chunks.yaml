    This means that when instantiating the `Human` class, we have to use the setters
    to set the field values and the getters to access those values. Thus, our class
    `BasicHumanDemo` becomes:


    ```

    package  com.apress.bgn.ch4.basic;

    public class BasicHumanDemo {

    public static void main(String... args) {

    Human human = new Human();

    human.setName("John");

    human.setAge(40);

    human.setHeight(1.91f);

    System.out.println("name: " + human.getName());

    System.out.println("age: " + human.getAge());

    System.out.println("height: " + human.getHeight());

    }

    ```


    ### Methods


    Since getters and setters are methods it is time to start the discussions about
    methods too. A method is a block of code characterized by returned type, name,
    and parameters that describes an action done by or on the object that makes use
    of the values of its fields and/or arguments provided. An abstract template of
    a Java method is depicted as follows.


    ```

    [accessor] [returned type] [name] type1 param1, type2 param2, ... {

    // code

    [ [maybe] return val]

    }

    ```


    Let’s create a method for the `Human` class that computes and prints how much
    time a human still has to live by making use of his age and the `LIFESPAN` constant.
    Because the method does not return anything, the return type used is `void`, a
    special type that tells the compiler that the method does not return anything
    and we have no return statement in the method body.


    ```

