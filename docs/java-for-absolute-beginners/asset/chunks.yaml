    ### 成员访问修饰符


    暂时请接受这个论断：**一个没有访问修饰符的类对同一包中的所有类可见**。


    在类内部，定义了类的成员：字段和方法。访问修饰符也可以应用于类成员，并且在成员级别，可以应用另外两个修饰符：`private` 和 `protected`。在成员级别，访问修饰符具有以下影响。


    *   `public`：与顶层相同，该成员可以从任何地方访问。

    *   `private`：该成员只能从其自身的类内部访问。

    *   `protected`：该成员只能从其自身的包内部或由另一个包中其类的任何子类访问。

    *   `none`（无修饰符）：该成员只能从其自身的包内部访问。


    如果这看起来很复杂，那只是在你开始编写代码并习惯它之前。在 Oracle 官方文档页面上，有一个成员可见性表格，本书在此将其展示为表 3-1。


    **表 3-1** 成员级别访问器


    | 修饰符 | 类 | 包 | 子类 | 全局 |

    | --- | --- | --- | --- | --- |

    | `public` | 是 | 是 | 是 | 是 |

    | `protected` | 是 | 是 | 是 | 否 |

    | `none`（也称为 `default`/`package-private`） | 是 | 是 | 否 | 否 |

    | `private` | 是 | 否 | 否 | 否 |


    在你开始编写 Java 代码后，可能会回过头来查看这个表格一两次。在引入模块之后，该表格中的所有内容仍然有效，但前提是你正确配置了模块访问。


    ### 引入模块


    从 Java 9 开始，引入了一个新概念：**模块**。它们用于对包进行分组和封装。这一新概念的实现耗时超过十年。关于模块的讨论始于 2005 年，并提议在
    Java 7 中实现。在 **Project Jigsaw** 的名称下，探索阶段于 2008 年开始。Java 开发者曾希望模块化 JDK 能在 Java
    8 中可用，但最终在 Java 9 中才得以实现，历时三年（以及近七年的分析）。显然，这也是 Java 9 的官方发布日期推迟到 2017 年 9 月的原因。


    模块代表了一种聚合包的新方式。**模块**是一种对包进行分组并配置对包内容更细粒度访问的方法。


    **模块**是一个唯一命名的、可重用的包和资源（XML 文件）组，由一个名为 `module-info.java` 的文件描述。该文件包含以下信息：


    *   模块的名称

    *   模块的依赖项（即此模块依赖的其他模块）

    *   它显式提供给其他模块的包（模块中的所有其他包隐式地对其他模块不可用）

    *   它提供的服务

    *   它消费的服务

    *   允许哪些其他模块进行反射

    *   本地代码

    *   资源

    *   配置数据


    理论上，模块命名类似于包命名，并遵循反向域名约定。在实践中，请确保模块名称不包含任何数字，并且能清晰表明其用途。`module-info.java` 文件被编译成一个**模块描述符**，这是一个名为
    `module-info.class` 的文件，它与类一起打包到一个普通的 JAR 文件中。该文件位于根源码目录中，在任何包之外。对于前面介绍的示例，添加了一个
    `module-info.java`，新的项目结构如图 3-7 所示。


    ![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig7_HTML.jpg](images/463938_1_En_3_Chapter/463938_1_En_3_Fig7_HTML.jpg)


    **图 3-7** Java 9 项目的结构


