    The `jcmd` is another JDK utility that can be useful. It sends diagnostic command
    requests to the JVM, which can help troubleshoot and diagnose JVM and running
    Java applications. It must be used on the same machine where the JVM is running
    and the result of calling it without any commands is that it shows all Java processes
    currently running on the machine; it displays the process Ids and the command
    used to start their execution.


    ```

    $ jcmd

    3155 com.mucommander.muCommander

