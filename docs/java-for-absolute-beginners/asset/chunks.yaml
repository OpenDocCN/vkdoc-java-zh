    package is set to info, the message starting with *Sorting an array with merge
    sort: ...* is no longer created nor printed, because the `log.isDebugEnabled()`
    returns `false`, so the code enclosed in the `if` statement is no longer executed.
    The `Logger` class contains `if..Enabled()` for any logger level.


    And this is all that can be said in this section about logging. Remember to use
    it moderately, pay very much attention when you decide to log messages in loops
    and for big application always use a logging facade, meaning SLF4J.


    ## Debug Using Assertions


    Another tool to debug your code is using assertions. If you remember the section
    about Java keywords, you probably remember the `assert` keyword. The `assert`
    keyword writes an `assertion` statement that is a test of your assumptions on
    the program execution. In the previous examples, we had the user provide the input
    for our sorting program, so for our program to do the right thing, it is assumed
    that the user provide the proper input, this means, an array with size bigger
    than 1, because there is no point to run the algorithm for a single number. So,
    how does this assertion looks like in the code? The answer to this question is
    in the following code sample.


    ```

    package com.apress.bgn.ch9;

    import com.apress.bgn.ch9.algs.IntSorter;

    import com.apress.bgn.ch9.algs.QuickSort;

    import java.util.Arrays;

    import static com.apress.bgn.ch9.SortingSlf4jDemo.getInts;

    public class AssertionDemo {

    public static void main(String... args) {

    int[] arr = getInts(args);

    assert arr.length > 1;

    IntSorter mergeSort = new QuickSort();

    mergeSort.sort(arr, 0, arr.length - 1);

    final StringBuilder sb2 = new StringBuilder("Sorted: ");

    Arrays.stream(arr).forEach(i -> sb2.append(i).append(" "));

    System.out.println(sb2.toString());

    }

    }

    ```


    If you run this code without providing any arguments to the program, nothing happens,
    even if we have an `assertion` statement in it. The reason for this is that assertions
    need to be enabled using a VM argument: `-ea`. To specify this argument, you can
    add it to the command when executing from the command line; but since we’ve used
    the editor until now, you can add it in the **VM options** text box of the IntelliJ
    IDEA launcher, as depicted in Figure [9-5](#463938_1_En_9_Chapter.xhtml#Fig5).


    ![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig5_HTML.jpg](images/463938_1_En_9_Chapter/463938_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    *IntelliJ IDEA launcher for the `AssertionDemo` class with the `-ea` VM argument
    set*


    When assertions are enabled, running the previous code ends with an `java.lang.AssertionError`
    being thrown, because the expression of the assertions is evaluated to `false`
    because the `arr.length` is clearly not bigger than 1 when no argument is provided.
    Assertions have two forms. In the simple form, they only have the expression to
    evaluate; the assumption to test


    ```

    assertion expression;

    ```


    In this case, `java.lang.AssertionError` is being thrown. It prints the line of
    the assumption being made, which is clearly the wrong assumption for the current
    run of the program, with the module and the full classname.


    ```

    Exception in thread "main" java.lang.AssertionError

    at chapter.nine.slf4j/com.apress.bgn.ch9.AssertionDemo.main(AssertionDemo.java:48)

    ```


    The complex version of the assertion adds another expression to be evaluated,
    or a value in the stack to tell the user that the assumption was wrong.


    ```

    assertion expression1 : expression 2;

    ```


    So, if we replace


    ```

    assert arr.length > 1;

    ```


    with


    ```

    assert arr.length > 1 : "Not enough data to sort!";

    ```


    when `java.lang.AssertionError` is thrown, it depicts the *Not enough data to
    sort!* message, which makes it clear why the assertion statement is preventing
    the rest of the code from being executed.


    ```

    Exception in thread "main" java.lang.AssertionError: Not enough data to sort!

    at chapter.nine.slf4j/com.apress.bgn.ch9.AssertionDemo.main(AssertionDemo.java:48)

    ```


    Or we could just print the size of the array.


    ```

    assert arr.length > 1 : arr.length;

    ```


    Or both.


    ```

    assert arr.length > 1 :

    "Not enough data to sort! Number of values: " + arr.length;

    ```


    Assertions can be used before and after the piece of code that needs to be debugged.
    In the this case, the assertion was used as a precondition of the execution, because
    the failure of the assertion prevents code from being executed. But assertions
    can be used as post-conditions also to test the outcome of executing a piece of
    code.


    In the previous code snippet, the assertion was used to test the correctness of
    the user provided input. In situations like this, the restriction of a valid input
    should be obeyed, whether assertions are enabled or not. Sure, if our array is
    empty or contains a single element, this is not a problem, as the algorithm is
    not executed, and this does not lead to a technical failure. There are a few rules
    to obey, or things to look for when writing code using assertions.


    * **Assertions should not be used to check the correctness of arguments provided
    to public methods.** Correctness of arguments should be something tested in the
    code and a proper `RuntimeException` should be thrown and should not be avoidable.


    * **Assertions should not be used to do work that is required for your application
    to run properly.** The main reason for this is that **assertions are disabled
    by default** and having them disabled leads to that code not being executed, so
    the rest of the application does not function properly because of the missing
    code.


    * **For performance reasons, do not use expressions that are expensive to evaluate
    in assertions.** This rule requires no explanation, even if assertions are disabled
    by default, imagine that somebody enables them by mistake on a production application.
    That would be unfortunate, wouldn’t it?


    If you are interested in using assertions, keep in mind those three rules, and
    you should be fine.'
