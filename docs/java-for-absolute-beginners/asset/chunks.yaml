    log.info("Type: {}", Files.isSymbolicLink(newFilePath) ? "yes" : "no");

    log.info("Is Hidden: {}", Files.isHidden(newFilePath) ? "yes" : "no");

    log.info("Is Readable: {}", Files.isReadable(newFilePath) ? "yes" : "no");

