  \ 栈内存与堆内存\n\nJava 类型可以分为两大类：**基本类型**和**引用类型**。Java 代码文件存储在硬盘上，Java 字节码文件也是如此。Java\
  \ 程序在 JVM 上运行，JVM 通过执行 `java` 可执行文件作为一个进程启动。在执行过程中，所有数据都存储在两种不同类型的内存中，分别称为：`栈`和`堆`，它们由操作系统为程序的执行分配。\n\
  \n**栈**内存在执行期间（也称为*运行时*）用于存储方法的原始类型局部变量以及指向堆中存储的对象的引用。**栈**也是一种数据结构，由一个只能在一端访问的值列表表示，也称为\
  \ **LIFO** 顺序，这是 **L**ast **I**n, **F**irst **O**ut（后进先出）的缩写。这个名称很贴切，因为每次调用方法时，都会在栈内存中创建一个新的块来保存该方法的局部变量：原始类型和对方法中其他对象的引用。^(⁵⁶)\n\
  \n每个 JVM 执行线程都有自己的栈内存，其大小可以使用 JVM 参数 `-Xss` 指定。如果分配了太多变量，或者被调用的方法是递归的且设计不良，导致返回条件永远无法满足，从而无限地调用自身，你就会遇到\
  \ `java.lang.StackOverFlowError`，这意味着没有剩余的栈内存了，因为每次方法调用都会在栈上创建一个新的块。\n\n**堆**内存在运行时用于为对象和\
  \ JRE 类分配内存。对象是 JDK 类或开发者定义的类的实例。任何使用 `new` 创建的对象都存储在堆内存中。在堆内存中创建的对象可以被应用程序的所有线程访问。堆内存的访问和管理稍微复杂一些，将在**第**\
  \ **13** **章**中详细介绍。`-Xms` 和 `-Xmx` JVM 参数设置了 Java 程序在执行期间堆内存的初始大小和最大大小。堆大小可能会根据程序创建的对象数量而变化，如果分配给\
  \ Java 程序的所有堆内存都已满，则会抛出 `java.lang.OutOfMemoryError`。\n\nJVM 参数很有用，因为在开发过程中，你可能需要编写解决复杂问题的代码，这些代码需要比默认大小更大的栈或堆内存，因此你可以设置自己的大小，而不是依赖默认大小。栈和堆的默认值是平台相关的。如果你对这些值感兴趣，可以查看官方文档\
  \ [`https://docs.oracle.com/cd/E13150_01/jrockit_jvm/jrockit/jrdocs/refman/optionX.html`](https://docs.oracle.com/cd/E13150_01/jrockit_jvm/jrockit/jrdocs/refman/optionX.html)\
  \ ，其中涵盖了所有 JVM 参数和默认值。你可以在浏览器中打开该链接并搜索 `-Xss`、`-Xms` 或 `-Xmx`。\n\n`java.lang.String`\
  \ 类是 Java 编程语言中最常用的类。由于应用程序中的文本值可能具有相同的值，出于效率原因，此类对象在堆中的管理方式略有不同。在堆中有一个特殊的内存区域，称为**字符串池**，JVM\
  \ 将所有 `String` 实例存储在其中。这里必须提到这一点，因为接下来分析用于解释 Java 中内存管理方式的代码片段包含一个 `String` 实例的定义，但关于字符串池和\
  \ `String` 数据类型的其他细节将在本章后面的专门章节中详细介绍。\n\n让我们考虑以下可执行类，并想象在此程序执行期间内存是如何组织的。\n\n\n\n\
