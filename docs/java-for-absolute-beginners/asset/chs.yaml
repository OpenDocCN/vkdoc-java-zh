  \ JDK 类）的 Javadoc 信息。\n\n在 Java 9 中，用于生成 Javadoc 的 Doclet API 得到了升级和改头换面。在 Java\
  \ 9 之前，开发者抱怨旧版本存在性能问题、API 晦涩难懂、缺乏支持以及整体功能浅薄。在 Java 9 中，大部分问题都得到了解决。详细的改进描述位于 [`http://openjdk.java.net/jeps/221`](http://openjdk.java.net/jeps/221)\
  \ 。\n\n文档非常有价值，当它做得非常好时，可以使开发变得实用且愉快。因此，在编写代码时，要像你期望项目依赖项有文档那样去记录它。\n\n你可能听说过 **RTFM**\
  \ 这个表达，它是 **Read The F***ing Manual!**（读那该死的说明书！）的缩写。在软件开发中，有经验的开发者与新手开发者一起工作时，经常使用这个表达。问题是，当没有说明书时该怎么办？大多数面临截止日期的公司可能倾向于分配很少或根本不分配时间来记录项目。因此，本书加入本节是为了强调文档在软件开发中的重要性，并教你如何在编写代码的同时编写文档，因为你之后可能没有时间去做这件事。\n\
