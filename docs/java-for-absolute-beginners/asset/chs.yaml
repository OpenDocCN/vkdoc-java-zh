- "# 8. 流 API\n\n根据 Dictionary.com 的解释，*stream* 一词有不止一种含义。\n\n*   在河道或水道中流动的水体，如河流、小溪或溪流\n\
  *   水中的稳定水流，如河流或海洋中\n*   水或其他液体或流体的任何流动\n*   空气、气体等的电流或流动\n*   **任何事物的连续流动或接续**\n\
  *   主导方向；趋势\n*   *在数字技术中* - **数据流**，如音频广播、电影或实时视频，从源端平稳连续地传输到计算机、移动设备等。\n\n在软件开发语境中，最接近流（stream）的定义是第五个和第七个定义的一部分（以粗体突出显示）。在软件开发中，*流*\
  \ 是一个来自支持聚合操作的数据源的对象序列。此刻，你心里可能会想：那么，它和集合类似吗？嗯……并不完全一样。\n\n\n\n## Streams 简介\n\n\
  假设我们有一个非常大的歌曲集合需要分析。我们要找出所有时长至少为 300 秒的歌曲，将这些歌曲的名称保存到一个列表中，并按时长降序排序。假设我们已经将歌曲存放在一个列表中，代码看起来是这样的：\n\
  \n```\nList songList = ...\nList resultedSongs = new ArrayList();\nfor (Song song:\
  \ songList) {\nif (song.getDuration() >= 300) {\nresultedSongs.add(song);\n}\n}\n\
  Collections.sort(resultedSongs, new Comparator(){\npublic int compare(Song s1, Song\
  \ s2){\nreturn s2.getDuration().compareTo(s1.getDuration());\n}\n});\nSystem.out.println(resultedSongs);\n\
  List finalList = new ArrayList();\nfor (Song song: resultedSongs) {\nfinalList.add(song.getTitle());\n\
  }\nSystem.out.println(finalList);\n```\n\n这段代码的一个问题是处理大型集合的效率并不高。此外，我们反复遍历列表并执行检查才能得到最终结果。如果我们能将所有这些操作链接起来，并在初始列表上执行，那该多好啊？\n\
  \n于是 Java 8 引入了新的 **Stream** 抽象，它表示一个元素序列，可以顺序或并行处理，并支持聚合操作。由于硬件发展的最新演进，CPU 变得更强大、更复杂，包含多个可以并行处理信息的内核。为了在\
  \ Java 中利用这些硬件能力，引入了 Fork Join 框架。而在 Java 8 中，*Stream API* 被引入以支持并行数据处理，无需定义和同步线程的样板代码。*Stream\
  \ API* 的核心接口是 `java.util.stream.BaseStream`。任何具有流能力的对象都是扩展该接口的类型。流本身不存储元素，它不是数据结构，而是用于计算元素并按需提供给某个函数或一组聚合函数。按顺序提供元素涉及内部自动迭代。返回流的函数可以链接成一个\
  \ *管道*，这些函数被称为 *中间操作*。它们用于处理流中的元素，并将结果作为流返回给管道中的下一个函数。返回非流结果的函数被称为 *终端操作*，显然位于管道的末尾。在深入探讨之前，先举一个快速示例，之前的代码使用流可以这样写：\n\
  \n```\nList finalList = songList.stream().filter(s -> s.getDuration()>= 300)\n.sorted(Comparator.comparing(Song::getDuration).reversed())\n\
  .map(Song::getTitle)\n.collect(Collectors.toList());\nSystem.out.println(finalList);\n\
  ```\n\n没错，使用流编程真是太棒了。*Stream API* 的概念允许开发者将集合转换为流，编写代码并行处理数据，然后将结果收集到集合中。\n\n由于使用流是一种敏感的编程方式；我建议在设计代码时考虑所有可能性。`NullPointerException`\
  \ 是 Java 中最常抛出的异常之一。在 Java 8 中，引入了 `Optional<T>` 类来避免此类异常。`Stream<T>` 实例用于存储类型 T\
  \ 的无限实例，而 `Optional<T>` 是一个可能包含也可能不包含类型 T 实例的实例。由于这两种实现本质上都是其他类型的包装器，因此将它们放在一起讨论。\n\
  \n### ！\n\n出于实际原因，本章中将 `Stream` 实例称为 *流*，类似于将 `List` 实例称为 *列表*，将 `collection` 实例称为\
  \ *集合*，等等。\n\n### ！\n\n你可能会注意到引入了术语 *函数*，它指的是在流或其参数上调用的方法。这是因为使用流允许以 **函数式编程** 风格编写\
  \ Java 代码。Java 是一种 **面向对象编程** 语言，**对象** 是其核心术语。在函数式编程中，核心术语是 *纯函数*。代码通过组合纯函数来编写，这避免了共享状态，利用了不可变数据，并避免了处理污染的副作用。^(⁶²)\n\
  \n## 创建流\n\n在享受使用流优化代码的乐趣之前，我们先来看看如何创建它们。要创建流，我们需要一个源。这个源可以是任何东西：集合（列表、集合或映射）、数组、用作输入的\
  \ I/O 资源（如文件、数据库或任何可以转换为实例序列的东西）。\n\n**流不会修改其源，因此可以从同一源创建多个流实例，并用于不同的操作。**\n\n###\
  \ 从集合创建流\n\n在本章引言部分的最后一个代码片段中，我们了解了一种从列表创建流的方法。从 Java 8 开始，所有集合接口和类都增加了返回流的默认方法。在以下代码示例中，我们获取一个整数列表，并通过调用其\
  \ `stream()` 方法将其转换为流。获得流后，我们使用 `forEach` 方法遍历它，以打印流中的值以及执行此代码的线程名称。你可能会问，为什么要打印线程名称？你很快就会明白。\n\
  \n```\npackage com.apress.bgn.ch8;\nimport java.util.List;\npublic class StreamsDemo\
  \ {\npublic static void main(String... args) {\nList bigList = List.of( 50, 10,\
  \ 250, 100 ...);\nbigList.stream()\n.forEach(i ->\nSystem.out.println(Thread.currentThread().getName()\
  \ + \": \" + i)\n);\n}\n}\n```\n\n上述代码创建了一个整数元素的流。`Stream` 接口公开了一组方法，每个 `Stream`\
  \ 实现都为其提供了具体实现。最常用的是 `forEach` 方法，它遍历流中的元素。`forEach` 方法需要一个 `java.util.function.Consumer<T>`\
  \ 类型的参数。\n\n### ！\n\n*消费者* 在本书中指的是 `java.util.function.Consumer<T>` 函数式接口的内联实现。这意味着它只有一个方法，实现它的类必须为该接口提供具体实现。该方法名为\
  \ `accept(T t)`，接受一个类型为 `T` 的流元素作为参数，处理它，但不返回任何内容。\n\n该方法为流中的每个元素调用，`T` 是流中元素的类型。实现类基本上是通过仅提及方法体来内联声明的。由于\
  \ lambda 表达式的魔力，JVM 会处理其余部分。如果没有它们，你将不得不编写如下代码：\n\n```\nimport java.util.function.Consumer;\n\
  ...\nbigList.stream()\n.forEach(new Consumer() {\n@Override\npublic void accept(Integer\
  \ i) {\nSystem.out.println(Thread.currentThread().getName() + \": \" + i);\n}\n\
  });\n```\n\n实际上，这是在 Java 8 引入 lambda 表达式之前编写代码的方式。如果你需要在应用程序的某个特定位置创建实现特定接口的类类型的单个对象，你可以选择编写这样一个看起来像是在实例化接口的复杂结构；该代码的结果被称为\
  \ **匿名类**。Lambda 表达式极大地简化了这一过程，但仅适用于一类名为 *函数式接口* 的接口，这些接口定义了一个单一方法，并带有 `@FunctionalInterface`\
  \ 注解（从 Java 8 开始）。\n\n在前面的示例中，实现打印了线程名称和元素的值。以下是运行该代码的结果。\n\n```\nmain: 50\nmain:\
  \ 10\nmain: 250\nmain: 100\n...\n```\n\n每个数字前面都带有 `main`，这意味着流中的所有整数都由同一个线程顺序处理，并且该线程是应用程序的主线程。\n\
  \n\n\n### ！\n\n出于实际考虑，当仅需要顺序流进行遍历时，无需为集合调用 `stream()` 方法，因为集合中定义的 `forEach` 方法已能很好地完成此任务。因此，上述代码可以简化为：\n\
  \n`bigList.forEach(i ->`\n\n`System.out.println(Thread.currentThread().getName()\
  \ + \": \" + i)`\n\n`);`\n\n之所以打印线程名称，是因为还有另一种通过调用 `parallelStream()` 方法来创建流的方式。唯一的区别在于，返回的流是一个并行流。这意味着流中的每个元素都在不同的线程上处理。当然，这也意味着\
  \ `Consumer` 的实现必须是线程安全的，并且不能包含涉及不应在线程间共享的实例的代码。打印流元素值的代码既不影响流返回的元素值，也不影响其他外部对象，因此并行化是安全的。那么，让我们使用\
  \ `parallelStream()` 代替 `stream` 来创建流，并使用相同的 `Consumer` 实现来打印流中的元素。\n\n```\npackage\
  \ com.apress.bgn.ch8;\nimport java.util.List;\nimport java.util.function.Consumer;\n\
  public class StreamsDemo {\npublic static void main(String... args) {\nList bigList\
  \ = List.of( 50, 10, 250, 100 ...);\nbigList.parallelStream()\n.forEach(i ->\nSystem.out.println(Thread.currentThread().getName()\
  \ + \": \" + i)\n);\n}\n}\n```\n\n如果我们在控制台中执行这段代码，会看到与下面输出类似但略有不同的结果。\n\n```\nForkJoinPool.commonPool-worker-9:\
  \ 94\nForkJoinPool.commonPool-worker-7: 10\nForkJoinPool.commonPool-worker-5: 40052\n\
  ForkJoinPool.commonPool-worker-3: 50\nForkJoinPool.commonPool-worker-13: 74\nForkJoinPool.commonPool-worker-9:\
  \ 200\nForkJoinPool.commonPool-worker-11: 250\nForkJoinPool.commonPool-worker-7:\
  \ 83\nForkJoinPool.commonPool-worker-3: 23\n...\n```\n\n你首先注意到的是线程名称，我们不再只有一个线程，而是有很多个，它们都命名为\
  \ `ForkJoinPool.commonPool-worker-**`。这告诉我们，所有流元素都在不同的线程上处理，但它们都属于同一个*池*。在这种情况下，JVM\
  \ 会创建一个线程池来容纳几个线程实例，用于并行处理流中的所有元素。使用线程池的好处是线程可以被重用，因此无需创建新的线程实例，这在一定程度上优化了执行时间，但只有在更复杂的解决方案中才能明显体现。如果你查看每个线程关联的数字（线程名称末尾的数字），会发现这些数字有时会重复。这基本上意味着同一个线程被重用来处理另一个流元素。\n\
  \n### 从数组创建流\n\n到目前为止，我们使用的流都是从 `List` 实例创建的。同样的语法也适用于 `Set` 实例。\n\n但流也可以从数组创建。请看下面的代码片段。\n\
  \n```\npackage com.apress.bgn.ch8;\nimport java.util.Arrays;\npublic class ArrayStreamDemo\
  \ {\npublic static void main(String... args) {\nint[] arr = { 50, 10, 250, 100 ...};\n\
  Arrays.stream(arr).forEach(\ni -> System.out.println(Thread.currentThread().getName()\
  \ + \": \" + i)\n);\n}\n}\n```\n\n工具类 `Arrays` 中的静态方法 `stream(int[] array)` 创建了一个基本类型流。对于包含对象的数组，调用的方法是\
  \ `stream(T[] array)`（其中 `T` 是泛型类型），它会被替换为数组中元素的类型。从数组生成的流可以通过调用 `parallel` 方法实现并行化，该方法同样适用于并行流。因此，如下代码可以并行化。\n\
  \n```\npackage com.apress.bgn.ch8;\nimport java.util.Arrays;\npublic class ArrayStreamDemo\
  \ {\npublic static void main(String... args) {\nint[] arr = { 50, 10, 250, 100 ...};\n\
  Arrays.stream(arr).parallel().forEach(\ni -> System.out.println(Thread.currentThread().getName()\
  \ + \": \" + i)\n);\n}\n}\n```\n\n对于这两种情况，输出结果与之前的示例相同，因此无需再次展示。\n\n数组的新颖之处在于，可以通过指定数组块的起始和结束索引，从数组的一部分创建流。\n\
  \n```\nArrays.stream(arr, 3,6).forEach(\ni -> System.out.println(Thread.currentThread().getName()\
  \ + \": \" + i)\n);\n```\n\n### 创建空流\n\n在编写 Java 代码时，一个好的实践是编写返回对象的方法时避免返回 `null`，以减少抛出\
  \ `NullPointerException` 的可能性。当方法返回流时，首选方式是返回一个空流。这可以通过调用 `Stream` 接口的静态方法 `Stream.empty()`\
  \ 来实现。下面的方法接收一个 `Song` 实例列表作为参数，并使用它作为源返回一个流。如果列表为 `null` 或为空，则返回一个空流。\n\n```\n\
  public static Stream asStream(List inputList) {\nif (inputList == null || inputList.isEmpty())\
  \ {\nreturn Stream.empty();\n} else {\nreturn inputList.stream();\n}\n}\n```\n\n\
  ### 创建有限流\n\n除了从实际源创建流之外，还可以通过调用流工具方法（如 `Stream.generate()` 或 `Stream.builder()`）即时创建流。\n\
  \n当我们想要构建一个包含固定已知值集合的有限流时，应使用 `builder()` 方法。该方法返回一个 `java.util.stream.Stream.Builder<T>`\
  \ 实例，这是一个内部接口，声明了一个名为 `add(..)` 的默认方法，需要调用该方法来添加流的元素。要创建 `Stream` 实例，最后必须调用其 `build`\
  \ 方法。`add(..)` 方法返回对 `Builder` 实例的引用，因此它可以与该类的任何其他方法链式调用。以下代码示例展示了如何使用 `builder()`\
  \ 方法创建一个包含 `Integer` 值的有限流。\n\n```\nStream built = Stream.builder()\n.add(50).add(10).add(250).build();\n\
  ```\n\n由于 `Builder` 接口是泛型接口，因此必须指定一个类型参数，作为流中元素的类型。此外，`builder()` 方法也是泛型方法，需要在调用之前在其前面提供类型作为参数。如果未指定类型，则默认使用\
  \ `Object`。\n\n要创建流，也可以使用 `generate(..)` 方法。该方法接收一个 `java.util.function.Supplier<T>`\
  \ 类型的实例作为参数。\n\n\n\n### !\n\n*供应商*（Supplier）是本书中对 `java.util.function.Supplier<T>`\
  \ 函数式接口的一种内联实现。该接口要求为其唯一名为 `get()` 的方法提供具体实现。此方法应返回要添加到流中的元素。\n\n因此，如果我们想生成一个整数流，`get()`\
  \ 的适当实现应返回一个随机整数。展开后的代码如下所示；此处未使用 lambda 表达式，以明确 `get(..)` 接收的是一个即时创建的 `Supplier<Integer>`\
  \ 实例作为参数。\n\n```\nStream generated = Stream.generate(\nnew Supplier() {\n@Override\n\
  public Integer get() {\nRandom rand = new Random();\nreturn rand.nextInt(300) +\
  \ 1;\n}\n}\n).limit(15);\n```\n\n`limit` 方法将供应商生成的元素数量限制为 15 个；否则，生成的流将是无限的。如果使用\
  \ lambda 表达式，上述代码可简化为：\n\n```\nStream generated = Stream.generate(\n() -> new Random().nextInt(300)\
  \ + 1\n).limit(15);\n```\n\n但这还不是全部；如果 `Supplier<Integer>.get()` 始终返回相同的数字，无论这多么无用，也是可行的，上述代码将变为：\n\
  \n```\nStream generated = Stream.generate( () -> 5).limit(15);\n```\n\n如果需要对流中的元素进行更多控制，可以使用\
  \ `iterate(..)` 方法。该方法在 Java 9 中引入，使用它就像用 `for` 语句生成流的条目。该方法接收一个称为“种子”（seed）的初始值、一个*谓词*（predicate）用于确定迭代何时停止，以及一个迭代步长作为参数。\n\
  \n### !\n\n*谓词*（Predicate）是对函数式接口 `java.util.function.Predicate<T>` 的一种内联实现，该接口声明了一个返回布尔值的单一方法。此方法的实现应针对某个条件测试其\
  \ `T` 类型的单一参数，如果条件满足则返回 `true`，否则返回 `false`。\n\n在以下示例中，流元素从 0 开始生成，步长为 5，并且只要值小于\
  \ 50（由谓词定义）就会持续生成。\n\n```\nStream iterated = Stream.iterate(0, i -> i < 50, i ->\
  \ i + 5);\n```\n\n与 `for` 语句一样，终止条件并非强制要求，存在一个不需要谓词的 `iterate(...)` 方法版本，但此时必须使用\
  \ `limit(...)` 方法来确保流是有限的。\n\n```\nStream iterated = Stream.iterate(0, i -> i +\
  \ 5).limit(15);\n```\n\n流的第一个元素就是种子值。\n\n在 Java 9 中，除了 `limit()` 之外，还有另一种控制流中值数量的方法：`takeWhile(..)`\
  \ 操作。此方法从原始流中获取与作为参数传入的谓词相匹配的最长元素集，从第一个元素开始。这对于有序流效果很好，但如果流是无序的，结果则是与谓词匹配的任意元素集（可能为空）。让我们看看实际效果！第一个代码示例在整数流上使用\
  \ `takeWhile(..)`，并返回一个包含能被 3 整除的元素的流。\n\n```\nStream forTaking = Stream.of( 3,\
  \ 6, 9, 11, 12, 13, 15);\nforTaking.takeWhile(s -> s % 3 == 0)\n.forEach(s -> System.out.print(s\
  \ + \" \"));\n```\n\n代码输出 *3 6 9*，因为这是与给定谓词匹配的第一个元素集。如果在无序流上调用 `takeWhile(..)`，结果将不可预测。结果可能是\
  \ *3 6 9* 或 *12 36 18 42*，因为结果是匹配谓词的任意元素子集。因此，在无序流上使用 `takeWhile(..)` 的结果是非确定性的。\n\
  \n```\nStream forTaking = Stream.of( 3, 6, 9, 2, 4, 8, 12, 36, 18, 42, 11, 13);\n\
  forTaking.parallel().takeWhile(s -> s % 3 == 0)\n.forEach(s -> System.out.print(s\
  \ + \" \"));\n```\n\n`takeWhile(..)` 操作是 `dropWhile(..)` 的“姊妹”操作；它执行与 `takeWhile(..)`\
  \ 完全相反的操作：对于有序流，它返回一个流，其中包含丢弃与谓词匹配的最长元素集之后的元素。因此，在以下示例中，我们期望在控制台中打印以下元素：*11 12 13\
  \ 15*\n\n```\nStream forDropping = Stream.of( 3, 6, 9, 11, 12, 13, 15);\nforDropping.dropWhile(s\
  \ -> s % 3 == 0 )\n.forEach(s -> System.out.print(s + \" \"));\n```\n\n对于无序流，此操作的结果也是非确定性的，因为该操作可以丢弃任意元素集，包括空集。\n\
  \n如果这两个操作在并行流上执行，唯一改变的是元素打印的顺序，但结果集包含的元素相同。\n\n\n\n### 原始类型流与字符串流\n\n当我们首次创建原始类型流时，我们使用了一个\
  \ `int[]` 数组作为数据源。但原始类型流也可以通过其他方式创建，因为 *Stream API* 包含了更多带有默认方法的接口，使得流式编程更加实用。图\
  \ 8-1 展示了 `Stream` 的层级结构。`IntStream` 接口可用于创建整数的原始类型流。该接口提供了多种方法来实现这一点，其中一些方法继承自\
  \ `BaseStream`。可以通过现场指定几个值来创建 `IntStream` 实例，例如使用 `builder()`、`generate()` 或 `iterate()`\
  \ 方法，或者使用 `of` 方法，如下所示。\n\n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig1_HTML.jpg](img/463938_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\nStream API 接口\n\n```\nIntStream intStream0 = IntStream.builder().add(0).add(1).add(2).add(5).build();\n\
  IntStream intStream1 = IntStream.of(0,1,2,3,4,5);\n```\n\n可以通过将区间的起始和结束值作为参数传递给\
  \ `range()` 和 `rangeClosed()` 方法来创建 `IntStream` 实例。这两种方法都会以步长 1 生成流中的元素，只有 `rangeClosed()`\
  \ 方法会包含区间的上限值。\n\n```\nintStream2 = IntStream.range(0, 10);\nintStream3 = IntStream.rangeClosed(0,\
  \ 10);\n```\n\n此外，在 Java 1.8 中，`java.util.Random` 类新增了一个名为 `ints` 的方法，用于生成随机整数的流。该方法声明了一个参数，表示要生成并放入流中的元素数量，但该方法还有一种不带参数的形式，用于生成无限流。\n\
  \n```\nRandom random = new Random();\nintStream = random.ints(5);\n```\n\n所有为 `IntStream`\
  \ 提及的方法都可以生成 `LongStream` 实例，因为该接口中定义了等效的方法。`DoubleStream` 没有区间方法，但提供了 `of()` 方法、`builder()`、`generate()`\
  \ 等。同样，在 Java 1.8 中，`java.util.Random` 类新增了 `doubles()` 方法，用于生成随机双精度浮点数的流。该方法声明了一个参数，表示要生成并放入流中的元素数量，但该方法还有一种不带参数的形式，用于生成无限流。以下代码片段展示了创建双精度浮点数流的几种方式。\n\
  \n```\nDoubleStream doubleStream0 = DoubleStream.of(1, 2 , 2.3, 3.4, 4.5, 6);\n\
  Random random = new Random();\nDoubleStream doubleStream1 = random.doubles(3);\n\
  DoubleStream doubleStream2 = DoubleStream.iterate(2.5, d -> d = d + 0.2).limit(10);\n\
  ```\n\n对于 `char` 值的流，没有专门的接口，但使用 `IntStream` 完全可以胜任。\n\n```\nIntStream intStream\
  \ = IntStream.of('a','b','c','d');\nintStream.forEach(c -> System.out.println((char)\
  \ c));\n```\n\n另一种创建 `char` 值流的方法是使用 `String` 实例作为流数据源。\n\n```\nIntStream charStream\
  \ = \"sample\".chars();\ncharStream.forEach(c -> System.out.println((char) c));\n\
  ```\n\n在 Java 8 中，`java.util.regex.Pattern` 也新增了流相关的方法；作为一个用于处理 `String` 实例的类，它自然是添加这些方法的合适位置。可以使用\
  \ `Pattern` 实例来拆分现有的 `String` 实例，并通过 `splitAsStream(..)` 方法将拆分后的片段作为流返回。\n\n```\n\
  Stream stringStream = Pattern.compile(\" \")\n.splitAsStream(\"live your life\"\
  );\n```\n\n文件的内容也可以使用 `Files.lines(..)` 工具方法作为字符串流返回。\n\n```\nString inputPath =\
  \ \"chapter08/src/main/resources/songs.csv\";\nStream stringStream = Files.lines(Path.of(inputPath));\n\
  ```\n\n到目前为止，这些章节已经向你展示了如何创建所有类型的流；接下来的章节将向你展示如何使用它们来处理数据。\n\n### ！\n\n如果你觉得需要将流实例与真实对象关联起来才能更好地理解它们，我建议如下：将有限流（例如从集合创建的流）想象成倾斜杯子时滴落的水滴。杯子里的水最终会流尽，但在水滴落的过程中，它们形成了一股水流。无限流则像一条有源头的小河，它源源不断地流淌。（当然，除非严重的干旱使河流干涸）\n\
  \n\n\n### Optional 简介\n\n`java.util.Optional<T>` 实例就像是 Java 语言中的薛定谔^(⁶³)盒子。它们非常有用，因为可以作为方法的返回类型，从而避免返回\
  \ `null` 值，并防止可能抛出的 `NullPointerException`，或者迫使使用该方法的开发者编写额外代码来处理可能抛出的异常。`Optional<T>`\
  \ 实例的创建方式与流类似。\n\n有一个 `empty()` 方法，用于创建不包含任何内容的任意类型的可选值。\n\n```\nOptional empty\
  \ = Optional.empty();\n```\n\n还有一个 `of()` 方法，用于将现有对象包装到 `Optional<T>` 中。\n\n```\n\
  Optional value = Optional.of(5L);\n```\n\n考虑到这类实例的设计初衷是不允许 `null` 值，以及之前创建 `Optional<T>`\
  \ 实例的方式，是什么阻止我们编写如下代码呢？\n\n```\nSong song = null;\nOptional nullable = Optional.of(song);\n\
  ```\n\n编译器不会阻止，但当代码在运行时执行时，会抛出 `NullPointerException`。不过，如果我们确实需要一个允许 `null` 值的\
  \ `Optional<T>` 实例，也是可以的；Java 9 中引入了一个实用方法专门用于此目的。\n\n```\nSong song = null;\nOptional\
  \  nullable = Optional.ofNullable(song);\n```\n\n现在我们有了 `Optional<T>` 实例，能用它们做什么呢？当然是使用它们。让我们看看下面的代码。\n\
  \n```\npackage com.apress.bgn.ch8;\nimport com.apress.bgn.ch8.util.MediaLoader;\n\
  import com.apress.bgn.ch8.util.Song;\nimport java.util.List;\npublic class OptionalDemo\
  \ {\npublic static void main(String... args) {\nList songs = MediaLoader.loadSongs();\n\
  song = findFirst(songs, \"B.B. King\");\nif(song != null && song.getSinger().equals(\"\
  The Thrill Is Gone\")) {\nSystem.out.println(\"好东西！\");\n} else {\nSystem.out.println(\"\
  未找到！\");\n}\n}\npublic static Song findFirst(List songs, String singer) {\nfor (Song\
  \ song: songs) {\nif (singer.equals(song.getSinger())) {\nreturn song;\n}\n}\nreturn\
  \ null;\n}\n}\n```\n\n`findFirst(..)` 方法在列表中查找第一个歌手为“B.B. King”的歌曲，如果找到则返回并打印一条消息，否则打印另一条消息。你可以注意到其中的空值检查和列表迭代。在\
  \ Java 8 中，这两者都不再必要。\n\n```\nOptional opt = songs.stream()\n.filter(s -> \"B.B.\
  \ King\".equals(s.getSinger()))\n.findFirst();\nopt.ifPresent(r -> System.out.println(r.getTitle()));\n\
  ```\n\n如果 `Optional<T>` 实例不为空，则打印歌曲标题；否则，不打印任何内容，代码从该点继续执行，不会抛出异常。但是，如果我们想在 `Optional<T>`\
  \ 实例为空时打印一些内容呢？在 Java 11 中，我们可以对此进行处理，因为引入了一个名为 `isEmpty()` 的方法来测试 `Optional<T>`\
  \ 实例的内容。\n\n```\nOptional opt = songs.stream()\n.filter(s -> \"B.B. King\".equals(s.getSinger()))\n\
  .findFirst();\nif(opt.isEmpty()) {\nSystem.out.println(\"未找到！\");\n}\n```\n\n但是等等，这有点……不太对劲。难道我们不能在\
  \ `Optional<T>` 上调用一个方法，使其行为完全像 `if-else` 语句一样吗？嗯，从 Java 9 开始就可以做到了；`ifPresentOrElse(..)`\
  \ 方法接受两个参数：一个消费者，用于在 `Optional<T>` 实例不为空时处理其内容；以及一个 `Runner` 实例，用于在 `Optional<T>`\
  \ 实例为空时执行。\n\n```\nOptional opt = songs.stream()\n.filter(ss -> \"B.B. King\".equals(ss.getSinger())).findFirst();\n\
  opt.ifPresentOrElse(\nr -> System.out.println(r.getTitle()),\n() -> System.out.println(\"\
  未找到！\")) ;\n```\n\n如果 `Optional<T>` 实例不为空，可以通过调用 `get()` 方法提取其内容。\n\n```\nOptional\
  \ opt2 = songs.stream()\n.filter(ss -> \"Rob Thomas\".equals(ss.getSinger()))\n\
  .findFirst();\nSystem.out.println(\"找到歌曲 \" + opt2.get());\n```\n\n当未找到所需对象时，代码不会打印任何内容。但如果我们想打印一个默认值，也可以使用名为\
  \ `orElse()` 的方法来实现。\n\n```\nOptional opt = songs.stream()\n.filter(ss -> \"B.B.\
  \ King\".equals(ss.getSinger()))\n.findFirst();\nopt.ifPresent(r -> System.out.println(r.getTitle()));\n\
  Song defaultSong = new Song();\ndefaultSong.setTitle(\"无标题\");\nSong s = opt.orElse\
  \ (defaultSong);\nSystem.out.println(\"找到: \" + s.getTitle());\n```\n\n如果我们想在 `Optional<T>`\
  \ 为空时抛出一个特定的异常，也有一个方法可以实现，名为 `orElseThrow(..)`。\n\n```\nOptional opt = songs.stream()\n\
  .filter(s -> \"B.B. King\".equals(s.getSinger()))\n.findFirst();\nSong song = opt.orElseThrow(IllegalArgumentException::new);\n\
  ```\n\n正如你可能在代码示例中注意到的，`Optional<T>` 和 `Stream<T>` 可以结合使用，编写实用的代码来解决复杂问题。由于有许多方法也可以应用于\
  \ `Optional<T>` 和 `Stream<T>` 实例，接下来的章节将针对流介绍这些方法，并随机引用 `Optional<T>`。\n\n\n\n##\
  \ 如何使用流\n\n创建流之后，下一步就是处理流上的数据。处理的结果会生成另一个流，可以根据需要多次进一步处理。有几种方法可用于处理流并将结果作为另一个流返回。这些方法被称为*中间操作*。那些不返回流，而是返回实际数据结构或不返回任何内容的方法，被称为*终端操作*。所有这些方法都在`Stream`接口中定义。流的关键特性在于，只有当*终端操作*被启动时，才会进行数据处理，并且源中的元素仅在需要时被消费。因此，可以说整个流处理过程是惰性的。对源元素进行惰性加载并在需要时处理，可以实现显著的优化。\n\
  \n经过前面的阐述，你可能已经意识到，用于打印流中值的`forEach`方法是一个终端操作。但在最常见的实现中，你可能会用到另外几个方法。\n\n本章以一个`Song`实例的示例开始，但`Song`类尚未列出。你可以在下面的代码清单中看到其内容。\n\
  \n```\npackage com.apress.bgn.ch8.util;\npublic class Song {\nprivate Long id;\n\
  private String singer;\nprivate String title;\nprivate Integer duration;\nprivate\
  \ AudioType audioType;\n... //getters and setters\n... // toString\n}\n```\n\n`AudioType`是一个枚举，包含音频文件的类型，如下面的代码片段所示。\n\
  \n```\npackage com.apress.bgn.ch8.util;\npublic enum AudioType {\nMP3,\nFLAC,\n\
  OGG,\nAAC,\nM4A,\nWMA\n}\n```\n\n现在，既然已经描述了后续流示例中使用的数据类型，那么数据本身也应该被描述出来。在本书的示例中，数据包含在一个名为`songs.csv`的文件中。CSV\
  \ 扩展名表示*逗号分隔文件*，每个`Song`实例对应文件中的一行。每一行包含每个`Song`实例的所有属性值，由逗号分隔。也可以使用其他分隔符，这里出于实际原因使用了分号（这是读取数据的库默认支持的分隔符）。文件内容如下所示。\n\
  \n```\nID;SINGER;TITLE;DURATION;AUDIOTYPE\n01;John Mayer;New Light;206;FLAC\n02;John\
  \ Mayer;My Stupid Mouth;225;M4A\n03;John Mayer;Vultures;247;FLAC\n04;John Mayer;Edge\
  \ of Desire;333;MP3\n05;John Mayer;In Repair;372;MP3\n05;Rob Thomas;Paper Dolls;185;MP3\n\
  07;The Script;Mad Love;207;MP3\n08;Seth MacFarlane;No One Ever Tells You;244;MP3\n\
  09;Nat King Cole;Orange Colored Sky;154;MP3\n10;Vertical Horizon;Forever;246;MP3\n\
  11;Mario Lanza;Temptation;141;M4A\n12;Jack Radics;No Matter;235;MP3\n13;George Michael;Fastlove;306;MP3\n\
  14;Childish Gambino;Freaks And Geeks;227;M4A\n15;Bill Evans;Lover Man;304;MP3\n\
  16;Darren Hayes;Like It Or Not;381;MP3\n17;Stevie Wonder;Superstition;284;MP3\n\
  18;Tony Bennett;It Had To Be You;196;MP3\n19;Tarja Turunen;An Empty Dream;322;MP3\n\
  20;Lykke Li;Little bit;231;M4A\n```\n\n文件中的每一行都通过一个名为`Josefa`的库中的类转换为一个`Song`实例。^(⁶⁴)\
  \ 这个库不是本书的主题，但如果你感兴趣，可以通过脚注中的链接从官方网站获取更多信息。\n\n### 终端函数：forEach 和 forEachOrdered\n\
  \n现在，我们准备开始使用流。假设`songs`流提供了所有声明的实例，让我们首先打印流中的所有元素。\n\n```\npackage com.apress.bgn.ch8;\n\
  import com.apress.bgn.ch8.util.Song;\nimport com.apress.bgn.ch8.util.StreamMediaLoader;\n\
  import java.util.List;\nimport java.util.stream.Stream;\npublic class MediaStreamTester\
  \ {\npublic static void main(String... args) {\nStream songs = StreamMediaLoader.loadSongs();\n\
  songs.forEach(song -> System.out.println(song));\n}\n}\n```\n\n由于我们现在使用的是 Java 11，我们可以利用\
  \ Java 8 中引入的方法引用。方法引用是一种快捷方式，适用于 lambda 表达式除了调用一个方法之外不做任何其他事情的情况，因此可以直接通过方法名来引用该方法。所以这一行\n\
  \n```\nsongs.forEach(song -> System.out.println(song));\n```\n\n变成了\n\n```\nsongs.forEach(System.out::println);\n\
  ```\n\n`forEach(..)`方法接收一个`Consumer<T>`类型的实例作为参数。在前两个示例中，`accept()`方法的实现只包含了对`System.out.println(song)`的调用，这就是代码如此简洁的原因。但如果这个方法的实现包含更多语句，那么之前编写的简洁代码就不可能实现了。\n\
  \n与其直接打印歌曲，不如先将歌手名字转换为大写。代码如下所示：\n\n```\nsongs.forEach(new Consumer() {\n@Override\n\
  public void accept(Song song) {\nsong.setSinger(song.getSinger().toUpperCase());\n\
  System.out.println(song);\n}\n});\n```\n\n当然，可以使用 lambda 表达式来简化它。\n\n```\nsongs.forEach(song\
  \ -> {\nsong.setSinger(song.getSinger().toUpperCase());\nSystem.out.println(song);\n\
  });\n```\n\n其姊妹函数`forEachOrdered(..)`与`forEach(..)`功能相同，但有一个细微差别：它确保流中的元素按照遭遇顺序进行处理（如果定义了该顺序），即使流是并行流也是如此。所以基本上，以下两行代码会以相同的顺序打印歌曲。\n\
  \n```\nsongs.forEach(System.out::println);\nsongs.parallel().forEachOrdered(System.out::println);\n\
  ```\n\n### 中间操作 filter 和终端操作 toArray\n\n在下面的示例中，我们选择所有 MP3 歌曲并将它们保存到一个数组中。选择所有 MP3\
  \ 歌曲是通过`filter(..)`方法完成的。该方法接收一个`Predicate<? super T>`类型的参数，该参数定义了一个条件，流中的元素必须满足该条件才能被放入通过调用名为`toArray(..)`的终端方法生成的数组中。\n\
  \n`toArray(..)`接收一个`IntFunction<A[]>`类型的参数。这种类型的函数接受一个整数作为参数，并生成一个该大小的数组，然后由`toArray()`方法填充该数组。\n\
  \n过滤 MP3 条目并将它们放入`Song[]`类型数组的代码如下所示。\n\n```\nSong sarray = songs.filter(s -> s.getAudioType()\
  \ == AudioType.MP3)\n.toArray(Song::new);\n```\n\n\n\n### 中间操作 map 和 flatMap 以及终端操作\
  \ collect\n\n在下面的示例中，我们处理所有歌曲并计算以分钟为单位的时长。为此，我们使用 `map` 方法将每首歌曲与处理它的方法关联起来。结果是一个\
  \ `Integer` 值的流。其所有元素都通过 `collect(..)` 方法被添加到一个 `List<Integer>` 中。该方法在处理元素时将它们累积到一个\
  \ `Collection` 实例中。\n\n```\npackage com.apress.bgn.ch8.util;\npublic class SongTransformer\
  \ {\npublic static int processDuration(Song song) {\nint secs = song.getDuration();\n\
  return secs/60;\n}\n}\n...\nList durationAsMinutes =  songs\n.map(SongTransformer::processDuration)\n\
  .collect(Collectors.toList());\n```\n\n`map(..)` 方法接收一个类型为 `Function<T,R>` 的参数，这基本上是对一个函数的引用，该函数应用于流中的每个元素。我们在上一个示例中应用的函数从流中获取一个歌曲元素，获取其时长，将其转换为分钟并返回。\n\
  \n对该函数的引用可以写成：\n\n```\nFunction fct = SongTransformer::processDuration;\n```\n\n\
  第一个泛型类型是被处理元素的类型，第二个是返回结果的类型。\n\n`filter` 方法的一个版本是为 `Optional` 类型定义的，它可以与 `map`\
  \ 方法一起使用，以避免编写复杂的 `if` 语句。假设我们有一个 `Song` 实例，想要检查它的时长是否大于三分钟且小于十分钟。我们可以使用 `Optional<Song>`\
  \ 和这两个方法来实现相同的功能，而无需编写一个包含两个由 AND 运算符连接的条件 `if` 语句。\n\n```\npublic static boolean\
  \ isMoreThan3Mins(Song song) {\nreturn Optional.ofNullable(song)\n.map(SongTransformer::processDuration)\n\
  .filter(d -> d >= 3)\n.filter(d -> d <= 10)\n.isPresent();\n}\n```\n\n所以，`map(..)`\
  \ 非常强大，但它有一个小缺陷。如果我们查看它在 `Stream.java` 文件中的签名，会看到如下内容：\n\n```\nStream map(Function\
  \ mapper);\n```\n\n因此，如果 `map` 函数应用于流中的每个元素，并返回一个包含结果的新流，该结果被放入另一个包含所有结果的流中，那么 `collect(...)`\
  \ 方法将在 `Stream<Stream<Integer>>` 上被调用。`Optional<T>` 也是如此，终端方法将在 `<Optional<Optional<T>>>`\
  \ 上被调用。当对象很简单时，比如我们这里的 `Song` 实例，`map(..)` 方法工作得很好，但如果原始流中的对象更复杂，比如一个 `List<List<Integer>>`，事情就变得复杂了。在这种情况下，应该用\
  \ `flatMap` 替换 `map` 方法。展示 `flatMap(..)` 效果的最简单方法是将其直接应用于 `List<List<Integer>>`。让我们看看下面的例子。\n\
  \n```\nList> testList = List.of (List.of(2,3), List.of(4,5), List.of(6,7));\nSystem.out.println(processList(testList));\n\
  ...\npublic static List processList( List> list) {\nList result = list\n.stream()\n\
  .flatMap(Collection::stream)\n.collect(Collectors.toList());\nreturn result;\n}\n\
  ```\n\n`flatMap(..)` 方法接收一个方法引用作为参数，该方法接受一个集合并将其转换为流，这是创建 `Stream<Stream<Integer>>`\
  \ 的最简单方式。`flatMap(..)` 施展其魔法，结果被转换为 `<Stream<Integer>>`，然后元素被 `collect` 方法收集到 `List<String>`\
  \ 中。移除无用流包装器的操作称为*扁平化*。\n\n另一种查看 `flatMap(..)` 方法效果的方法是编写一个使用 `Optional` 的更简单示例。假设我们需要一个函数，将字符串转换为整数，并且如果字符串不是有效数字，我们希望避免返回\
  \ null。这意味着我们的函数必须接受一个字符串并返回 `Optional<Integer>`。\n\n```\nFunction> toIntOpt = OptionalDemo::toIntOpt;\n\
  ...\npublic static Optional toIntOpt(String string) {\ntry {\nreturn Optional.of(Integer.parseInt(string));\n\
  } catch (NumberFormatException e) {\nreturn Optional.empty();\n}\n}\n```\n\n现在我们有了函数，让我们使用它。\n\
  \n```\nOptional str = Optional.of(\"42\");\nOptional> resInt = str.map(toIntOpt);\n\
  // 扁平化处理\nOptional desiredRes = resInt.orElse(Optional.empty());\nSystem.out.println(\"\
  最终结果: \" + desiredRes.get());\n```\n\n如果我们想得到真正感兴趣的 `Optional` 实例，就必须去掉外层的 `Optional`\
  \ 包装器。如果我们使用 `flatMap(..)`，就不需要这样做了。\n\n```\nOptional str = Optional.of(\"42\");\n\
  Optional desiredRes = str.flatMap(toIntOpt);\nSystem.out.println(\"嘭: \" + desiredRes.get());\n\
  ```\n\n所以，是的，这两种方法之间有一个细微的差别，你可能从未探究过；因为在大多数使用流的情况下，`map()` 方法通常以 `collect(..)`\
  \ 结束。\n\n### 中间操作 sorted 和终端操作 findFirst\n\n顾名思义，`sorted()` 方法与排序有关。当在流上调用时，它会创建另一个流，其中包含初始流的所有元素，但按自然顺序排序。如果流中元素的类型不可比较（该类型未实现\
  \ `java.lang.Comparable`，则会抛出 `java.lang.ClassCastException`）。由于我们将使用此方法获取排序后的元素流，因此我们使用\
  \ `findFirst()` 来获取流中的第一个元素。此方法返回一个 `Optional<T>`，因为流可能为空。\n\n```\nList pieces =\
  \ List.of(\"some\",\"of\", \"us\", \"we’re\", \"hardly\", \"ever\", \"here\");\n\
  String first = pieces.stream().sorted().findFirst().get();\nSystem.out.println(\"\
  排序列表中的第一个元素: \" + first);\n```\n\n这段代码打印 `ever`，因为这是排序后流中的第一个元素。\n\n### 中间操作 distinct\
  \ 和终端操作 count\n\n`distinct()` 方法接受一个流，并生成一个包含原始流中所有不同元素的流。由于我们需要一个终端函数，让我们使用 `count()`；顾名思义，此函数对流中的元素进行计数。\n\
  \n```\nList pieces = List.of(\"as\",\"long\", \"as\", \"there\", \"is\",\n\"you\"\
  , \"there\", \"is\", \"me\");\nlong count = pieces.stream().distinct().count();\n\
  System.out.println(\"流中的元素数量: \" + count);\n```\n\n如果运行代码，打印的数字是 `6`，因为移除重复项（`as`、`there`、`is`）后，我们剩下六个词。\n\
  \n### 中间操作 limit 和终端操作 min 与 max\n\n本章前面曾使用 `limit(..)` 方法将无限流转换为有限流。由于它将一个流转换为另一个流，显然这是一个中间函数。为了演示其用法，我们将使用一个整数流，并使用两个数学函数作为终端方法：计算流中元素的最小值\
  \ - `min()` 和计算流中元素的最大值 - `max()`。如何在代码片段中一起使用这些函数如下所示。\n\n```\nStream ints = Stream.of(5,2,7,9,8,1,12,7,2);\n\
  ints.limit(4).min(Integer::compareTo)\n.ifPresent(min -> System.out.println(\"最小值是:\
  \ \" + min));\n// 打印 \"最小值是: 2\"\nStream ints = Stream.of(5,2,7,9,8,1,12,7,2);\n\
  ints.limit(4).max(Integer::compareTo)\n.ifPresent(max -> System.out.println(\"最大值是:\
  \ \" + max));\n// 打印 \"最大值是: 9\"\n```\n\n\n\n### 终端操作 sum 与 reduce\n\n让我们考虑这样一个场景：我们有一个有限的\
  \ `Song` 值流，想要计算它们时长的总和。实现此功能的代码如下所示，其中使用了另一个只能用于数值流的终端函数。\n\n```\nStream songs\
  \ = StreamMediaLoader.loadSongs();\nInteger totalDuration = songs\n.mapToInt(Song::getDuration)\n\
  .sum();\n```\n\n使用 `reduce(..)` 函数也能获得相同的结果。\n\n```\nStream songs = StreamMediaLoader.loadSongs();\n\
  Integer totalDuration = songs\n.mapToInt(Song::getDuration)\n.reduce(0, (a, b) ->\
  \ a + b);\n```\n\n`reduce` 函数接受两个参数。\n\n*   `identity` 参数代表归约的初始值，以及当流中没有元素时的默认结果。\n\
  *   `accumulator` 函数接受两个参数；对这两个参数执行操作以得到部分结果（在此例中为两个元素相加）。\n\n因此，基本上每次处理流中的一个元素时，`accumulator`\
  \ 都会返回一个新值，该值是已处理元素与之前部分结果相加的结果。所以，如果处理过程的结果是一个集合，那么 `accumulator` 的结果也是一个集合，这意味着每次处理一个流元素时都会创建一个新集合。这效率相当低下，因此在这种场景下，`collect`\
  \ 函数更为合适。\n\n### 中间操作 peek\n\n这个函数很特殊，因为它实际上不会以任何方式影响流的结果。`peek` 函数返回一个由调用它的流的元素组成的流，同时还会对其每个元素执行由其\
  \ `Consumer<T>` 参数指定的操作。这意味着此函数可用于调试流操作。\n\n让我们以 `Song` 实例流为例，根据它们的时长进行过滤。选择所有时长\
  \ >300 秒的歌曲，然后获取它们的标题并收集到一个列表中。以下代码展示了如何实现。\n\n```\nStream songs = StreamMediaLoader.loadSongs();\n\
  List result = songs.filter(s -> s.getDuration() > 300)\n.map(Song::getTitle)\n.collect(Collectors.toList());\n\
  ```\n\n在 `map` 调用之前，可以插入一个 `peek` 调用来检查过滤后的元素是否是你期望的。之后可以再插入另一个 `peek` 调用来检查映射后的值。\n\
  \n```\nStream songs = StreamMediaLoader.loadSongs();\nList result = songs.filter(s\
  \ -> s.getDuration() > 300)\n.peek(e -> System.out.println(\"\\t 过滤后的值: \" + e))\n\
  .map(Song::getTitle)\n.peek(e -> System.out.println(\"\\t 映射后的值: \" + e))\n.collect(Collectors.toList());\n\
  ```\n\n### 中间操作 skip 与终端操作 findAny、anyMatch、allMatch 和 noneMatch\n\n这些是本章讨论的最后几个操作，将它们放在一起是因为\
  \ `skip` 操作可能会影响其他操作的结果。\n\n`findAny()` 返回一个 `Optional<T>` 实例，该实例包含流的第一个元素，如果流为空，则返回一个空的\
  \ `Optional<T>` 实例。当流是并行流时，该函数返回流中一个随机元素，并包装在 `Optional<T>` 中。由于我们到目前为止使用的歌曲流不是并行流，我们通过调用中间函数\
  \ `parallel()` 来创建一个并行流。\n\n```\nStream songs = StreamMediaLoader.loadSongs();\n\
  Optional optSong = songs.parallel().findAny();\noptSong.ifPresent(System.out::println);\n\
  ```\n\n`anyMatch(..)` 方法接收一个 `Predicate<T>` 类型的参数，如果流中有任何元素匹配该谓词，则返回布尔值 `true`，否则返回\
  \ `false`。它同样适用于并行流。以下代码覆盖的场景是：如果我们的流中任何歌曲的标题包含单词 *Paper*，则返回 `true`。\n\n```\nStream\
  \ songs = StreamMediaLoader.loadSongs();\nboolean b = songs\n.anyMatch(s -> s.getTitle().contains(\"\
  Paper\"));\nSystem.out.println(\"是否有歌曲标题包含 'Paper'？ \" + b);\n```\n\n代码打印 `true`，因为列表中有一首名为\
  \ *Paper Dolls* 的歌曲。但是，如果我们想改变这个结果，我们只需通过调用 `skip(6)` 跳过原始流中的前六个元素。是的，这个方法也适用于并行流。\n\
  \n```\nStream songs = StreamMediaLoader.loadSongs();\nboolean b = songs.parallel()\n\
  .skip(6)\n.anyMatch(s -> s.getTitle().contains(\"Paper\"));\nSystem.out.println(\"\
  是否有歌曲标题包含 \\\"Paper\\\"？ \" + b);\n```\n\n因此，如果原始流中的前六个元素未被处理，那么前面的代码现在返回 `false`。还有另一个函数用于分析流中的所有元素，检查它们是否都匹配同一个谓词，该方法名为\
  \ `allMatch(..)`。在下一个代码示例中，我们检查所有 `Song` 实例的时长是否都大于 300。该函数返回一个布尔值，如果所有 `Song` 实例都匹配谓词，则值为\
  \ `true`，否则为 `false`。对于我们的示例，我们显然期望得到 `false` 值，因为并非所有 `Song` 实例的 `duration` 字段值都大于\
  \ 300。\n\n```\nStream songs = StreamMediaLoader.loadSongs();\nboolean b = songs.allMatch(s\
  \ -> s.getDuration() > 300);\nSystem.out.println(\"所有歌曲时长是否都超过 5 分钟？ \" + b);\n\
  ```\n\n与此函数成对的是名为 `noneMatch` 的函数，它做的事情正好相反：接受一个谓词作为参数并返回一个布尔值。如果流中没有元素匹配所提供的谓词，则该布尔值为\
  \ `true`，否则为 `false`。在下一个代码示例中，我们使用 `noneMatch` 检查是否没有 `Song` 实例的时长 > 300，并且我们期望结果为\
  \ `false`。\n\n```\nStream songs = StreamMediaLoader.loadSongs();\nboolean b = songs.noneMatch(s\
  \ -> s.getDuration() > 300);\nSystem.out.println(\"所有歌曲时长是否都短于 5 分钟？ \" + b);\n\
  ```\n\n\n\n## 调试流式代码\n\n`peek(..)` 方法可用于轻度调试，更类似于记录流元素在一次流方法调用与另一次调用之间发生的变化。IntelliJ\
  \ IDEA 编辑器提供了一种更高级的调试流的方式；自 2017 年 5 月 11 日起，该编辑器包含一个名为 Java Stream Debugger 的专用插件，用于流调试。^(⁶⁵)\n\
  \n我假设你已经拥有一个比 2017 年更新的 IntelliJ IDEA 版本，因此你应该已经拥有此插件。要使用它，你需要在定义流处理链的那一行设置一个断点。图\
  \ 8-2 展示了一段代码，该代码表示在调试模式下执行的对 `Song` 实例流的处理，并且一个断点在第 44 行暂停了执行。当执行暂停时，可以通过单击红色矩形框内的按钮来打开\
  \ Stream 调试器视图。\n\n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig2_HTML.jpg](img/463938_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\n调试\n\n如果你单击图 8-2 中所示的调试器按钮，将出现一个弹出窗口；它为流处理的每个操作都提供了一个选项卡。图 8-3 显示了这些选项卡及其方法，它们带有下划线并相互链接。\n\
  \n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig3_HTML.jpg](img/463938_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\nJava Stream Debugger 窗口\n\n在每个选项卡中，左侧的文本框包含原始流中的元素，右侧的文本框包含结果流及其元素。对于减少元素数量或改变其顺序的操作，会有一组元素到另一组元素的连线。第一个\
  \ `map` 方法将歌曲标题转换为其大写版本。第二个 `map` 方法将歌曲的时长转换为分钟，并返回一个整数流。`distinct` 方法生成一个仅包含不重复元素的新流，此操作的效果在图\
  \ 8-4 中得到了很好的展示。\n\n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig4_HTML.jpg](img/463938_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\nIntelliJ IDEA 流调试器中的 distinct() 操作\n\n下一个操作是 `sorted()`，它对由 `distinct()`\
  \ 操作返回的流中的条目进行排序。元素的重新排序以及将它们添加到新流的过程也在调试器中有所展示，如图 8-5 所示。\n\n![../images/463938_1_En_8_Chapter/463938_1_En_8_Fig5_HTML.jpg](img/463938_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n\nIntelliJ IDEA 流调试器中的 sorted() 操作\n\n当然，在调试器中检查结果后，即使你想继续执行，这也是不可能的，因为原始流和结果流中的所有元素都已被调试器消耗，因此控制台中会打印以下异常。\n\
  \n```\nConnected to the target VM, address: '127.0.0.1:64083', transport: 'socket'\n\
  Exception in thread \"main\" java.lang.IllegalStateException:\nstream has already\
  \ been operated upon or closed\nDisconnected from the target VM, address: '127.0.0.1:64083',\
  \ transport: 'socket'\nat java.base/java.util.stream.AbstractPipeline.AbstractPipeline.java:203\n\
  at java.base/java.util.stream.ReferencePipeline.ReferencePipeline.java:94\nat java.base/java.util.stream.ReferencePipeline$StatelessOp.\n\
  ReferencePipeline.java:696\nat java.base/java.util.stream.ReferencePipeline$3.ReferencePipeline.java:189\n\
  at java.base/java.util.stream.ReferencePipeline.mapReferencePipeline.java:188\n\
  at chapter.eight/com.apress.bgn.ch8.StreamDebuggerDemo.mainStreamDebuggerDemo.java:45\n\
  ```\n\n## 总结\n\n阅读本章并运行提供的代码示例后，应该清楚为什么 Stream API 如此出色。我最喜欢三点：可以编写更紧凑、更简单的代码来解决问题，同时不丧失可读性（可以避免使用\
  \ `if` 和循环）；可以在没有 Java 8 之前所需的样板代码的情况下进行数据的并行处理；以及代码可以以函数式编程风格编写。此外，Stream API 更像是一种声明式编程方式，因为大多数流方法都接受\
  \ `Consumer<T>`、`Predicate<T>` 或 `Function<T>` 类型的参数，这些参数声明了应该对每个流元素执行什么操作，但这些方法并非由开发人员编写的代码显式调用。\n\
  \n本章还介绍了如何使用 `Optional<T>` 实例来避免 `NullPointerExceptions` 和编写 `if` 语句。\n\n阅读完本章后，你应该对以下内容有相当清晰的理解。\n\
  \n*   如何从集合创建顺序流和并行流\n\n*   空流的用途\n\n*   关于流需要记住的术语：\n    *   元素序列\n\n    *   谓词\n\
  \n    *   消费者\n\n    *   供应者\n\n    *   方法引用\n\n    *   数据源\n\n    *   聚合操作\n\n\
  \    *   中间操作\n\n    *   终端操作\n\n    *   流水线\n\n    *   内部自动迭代\n\n*   如何创建和使用 `Optional`\
  \ 实例\n\n脚注 1   2   3   4\n\n"
- "# 9. 调试、测试与文档编写\n\n开发工作不仅要求你为问题设计解决方案并编写代码。为了确保你的解决方案能解决问题，你必须对其进行测试。**测试**涉及确保构成解决方案的每个组件在预期和非预期情况下都能按预期运行。\n\
  \n测试代码最实用的方法是通过**记录**中间变量的值来检查它们；仅在特定情况下将它们打印到控制台。\n\n当解决方案复杂时，**调试**提供了暂停执行并检查变量状态的机会。调试有时涉及**断点**，并且需要\
  \ IDE。断点是应用程序暂停执行的点，可以在这些点检查变量。\n\n在确保你的解决方案符合要求后，你必须为其编写文档，特别是当所解决的问题需要复杂代码来解决时。或者，如果你的解决方案可能是其他应用程序的先决条件，你有责任向其他开发人员解释如何使用它。\n\
  \n本章介绍了几种实现所有这些目标的方法，因为这些是开发人员的关键技能。\n\n## 调试\n\n调试是查找和解决计算机程序中的缺陷或问题的过程。有更多的调试策略，根据应用程序的复杂性，可以使用一种或多种策略。以下是这些技术的列表。\n\
  \n*   记录过程中涉及对象的中间状态并分析日志文件\n\n*   使用断点进行交互式调试，以暂停程序的执行并检查过程中涉及对象的中间状态\n\n*   测试\n\
  \n*   在应用程序或系统级别进行监控\n\n*   分析内存转储项分析，这是一种动态程序分析形式，用于测量程序占用的内存、使用的 CPU、方法调用的持续时间等。\n\
  \n让我们从最简单的调试方式开始：日志记录。\n\n\n\n### 日志记录\n\n在现实世界中，伐木是一个破坏性的过程：砍伐和加工树木以生产木材。在软件编程中，**日志记录**意味着编写日志文件，这些文件日后可用于识别代码中的问题。记录信息最简单的方法是使用\
  \ `System.out.print` 方法族，如图 9-1 所示。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig1_HTML.jpg](img/463938_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\nSystem.out.print 类族\n\n在本章的示例中，我们使用一个提供整数数组排序方法的类层次结构。该类层次结构如图 9-2 所示。\n\
  \n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig2_HTML.jpg](img/463938_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n排序类层次结构\n\n我们首先以 `MergeSort` 类为例，添加 `System.out.print` 语句来记录算法的步骤。归并排序是一种排序算法的名称，其性能优于冒泡排序。它的工作原理是将数组分成两半，然后分成更小的片段，直到得到可以轻松排序的两个元素的数组。然后开始合并数组片段。这种反复拆分数组直到排序成为可管理操作的方法称为\
  \ **Divide et Impera**，也称为**分治法**。还有更多算法采用相同的方法来解决问题，而归并排序只是本书中介绍的第一种。图 9-3 展示了我们将要实现的归并排序算法每一步所发生的情况。\n\
  \n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig3_HTML.jpg](img/463938_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n归并排序\n\n在算法的每一步中，都会确定数组的中间位置。只要数组的起始索引 `low` 值小于待排序数组的结束索引 `high` 值，我们就通过调用\
  \ `sort(..)` 方法进一步拆分数组，直到得到一个只有一个元素的数组。此时会调用 `merge(..)` 方法，除了合并数组片段外，还会在合并过程中对它们进行排序。要编写代码，我们需要实现这两个方法。\n\
  \n```\npackage com.apress.bgn.ch9.algs;\npublic class MergeSort implements IntSorter\
  \ {\npublic void sort(int[] arr, int low, int high) {\nif (low < high) {\nint middle\
  \ = (low + high) / 2;\nsort(arr, low, middle);\nsort(arr, middle + 1, high);\nmerge(arr,\
  \ low, middle, high);\n}\n}\nprivate void merge(int arr[], int low, int middle,\
  \ int high) {\nint leftLength = middle - low + 1;\nint rightLength = high - middle;\n\
  int left[] = new int[leftLength];\nint right[] = new int[rightLength];\nfor (int\
  \ i = 0; i < leftLength; ++i) {\nleft[i] = arr[low + i];\n}\nfor (int i = 0; i <\
  \ rightLength; ++i) {\nright[i] = arr[middle + 1 + i];\n}\nint i = 0, j = 0;\nint\
  \ k = low;\nwhile (i < leftLength && j < rightLength) {\nif (left[i] <= right[j])\
  \ {\narr[k] = left[i];\ni++;\n} else {\narr[k] = right[j];\nj++;\n}\nk++;\n}\nwhile\
  \ (i < leftLength) {\narr[k] = left[i];\ni++;\nk++;\n}\nwhile (j < rightLength)\
  \ {\narr[k] = right[j];\nj++;\nk++;\n}\n}\n}\n清单 9-1\n使用 System.out.print 进行日志记录\n\
  ```\n\n这段代码可能看起来令人望而生畏，但它完全按照图 9-3 所示的方式工作；我们只是需要很多变量来引用所有用于将元素按正确顺序排列的索引。为了确保我们的解决方案正确实现，查看每个方法被调用时的值以及正在处理的数组片段会很有帮助。我们可以通过简单地修改我们的方法并添加一些\
  \ `System.out.print` 方法调用来实现这一点。\n\n```\npackage com.apress.bgn.ch9.algs;\npublic\
  \ class MergeSort implements IntSorter {\npublic void sort(int[] arr, int low, int\
  \ high) {\nSystem.out.print(\"Call sort of \" + \": [\" + low + \" \" + high + \"\
  ] \");\nfor (int i = low; i <= high; ++i) {\nSystem.out.print(arr[i] + \" \");\n\
  }\nSystem.out.println();\nif (low < high) {\nint middle = (low + high) / 2;\nsort(arr,\
  \ low, middle);\nsort(arr, middle + 1, high);\nmerge(arr, low, middle, high);\n\
  }\n}\nprivate void merge(int arr[], int low, int middle, int high) {\nint leftLength\
  \ = middle - low + 1;\nint rightLength = high - middle;\nint left[] = new int[leftLength];\n\
  int right[] = new int[rightLength];\nfor (int i = 0; i < leftLength; ++i) {\nleft[i]\
  \ = arr[low + i];\n}\nfor (int i = 0; i < rightLength; ++i) {\nright[i] = arr[middle\
  \ + 1 + i];\n}\nint i = 0, j = 0;\nint k = low;\nwhile (i < leftLength && j < rightLength)\
  \ {\nif (left[i] <= right[j]) {\narr[k] = left[i];\ni++;\n} else {\narr[k] = right[j];\n\
  j++;\n}\nk++;\n}\nwhile (i < leftLength) {\narr[k] = left[i];\ni++;\nk++;\n}\nwhile\
  \ (j < rightLength) {\narr[k] = right[j];\nj++;\nk++;\n}\nSystem.out.print(\"Called\
  \ merge of: [\" + low\n+ \" \" + high + \" \" + middle + \"], \");\nfor (int z =\
  \ low; z <= high; ++z) {\nSystem.out.print(arr[z] + \" \");\n}\nSystem.out.println();\n\
  }\n}\n```\n\n为了测试输出，我们需要一个包含 `main(..)` 方法的类来执行算法。\n\n```\npackage com.apress.bgn.ch9;\n\
  import com.apress.bgn.ch9.algs.IntSorter;\nimport com.apress.bgn.ch9.algs.MergeSort;\n\
  import java.util.Arrays;\npublic class SortingDemo {\npublic static void main(String...\
  \ args) {\nint arr[] = {5,1,4,2,3};\nIntSorter mergeSort = new MergeSort();\nmergeSort.sort(arr,\
  \ 0, arr.length-1);\nSystem.out.print(\"Sorted: \");\nArrays.stream(arr).forEach(i\
  \ -> System.out.print(i+ \" \"));\n}\n}\n```\n\n如果我们运行上述类，`sort(..)` 和 `merge(..)`\
  \ 调用处理的中间值将打印在控制台中。\n\n```\nCall sort of : [0 4] 5 1 4 2 3\nCall sort of : [0 2]\
  \ 5 1 4\nCall sort of : [0 1] 5 1\nCall sort of : [0 0] 5\nCall sort of : [1 1]\
  \ 1\nCalled merge of: [0 1 0], 1 5\nCall sort of : [2 2] 4\nCalled merge of: [0\
  \ 2 1], 1 4 5\nCall sort of : [3 4] 2 3\nCall sort of : [3 3] 2\nCall sort of :\
  \ [4 4] 3\nCalled merge of: [3 4 3], 2 3\nCalled merge of: [0 4 2], 1 2 3 4 5\n\
  Sorted: 1 2 3 4 5\n```\n\n你可以看到控制台输出与图 9-3 中描述的算法步骤相匹配；该输出清楚地证明了解决方案按预期工作。但是，现在的代码存在一个问题。每次调用\
  \ `sort(..)` 方法时，都会打印输出，如果排序只是更复杂解决方案中的一个步骤，那么该输出并不是真正必要的。它甚至可能污染更大解决方案的输出。此外，如果数组很大，打印该输出可能会影响整体解决方案的性能。因此，应该考虑一种不同的方法，一种可以自定义并决定是否应该打印输出的方法。这就是日志库发挥作用的地方。\n\
  \n\n\n#### 使用 JUL 进行日志记录\n\nJDK 提供了自己的日志类，这些类位于 `java.util.logging` 包下，因此 JDK 提供的日志模块也被称为\
  \ **JUL**。`Logger` 类实例用于记录日志消息。创建日志记录器实例时应为其指定一个名称，并通过调用专门的方法来打印不同级别的日志消息。对于 JUL\
  \ 模块，其级别及范围如下所列，但其他日志库也有类似的日志级别。\n\n*   OFF - 应用于关闭所有日志记录\n*   SEVERE – 最高级别，消息表示严重故障\n\
  *   WARNING - 表示由于潜在问题而打印此消息\n*   INFO - 表示这是一条信息性消息\n*   CONFIG - 表示这是一条包含配置信息的消息\n\
  *   FINE - 表示这是一条提供跟踪信息的消息\n*   FINER - 表示这是一条相当详细的跟踪消息\n*   FINEST - 表示这是一条非常详细的跟踪消息\n\
  *   ALL - 应打印所有日志消息\n\n日志记录器可以使用 XML 或属性文件进行配置，其输出可以定向到外部文件。对于之前介绍的代码示例，让我们将所有 `System.out.print`\
  \ 方法调用替换为日志记录器调用。我们从 `SorterJulDemo` 类开始。\n\n```\npackage com.apress.bgn.ch9;\n\
  import com.apress.bgn.ch9.algs.IntSorter;\nimport com.apress.bgn.ch9.algs.MergeSort;\n\
  import java.util.Arrays;\nimport java.util.logging.Logger;\npublic class SortingJulDemo\
  \ {\nprivate static final Logger log =\nLogger.getLogger(SortingJulDemo.class.getName());\n\
  public static void main(String... args) {\nint arr[] = {5,1,4,2,3};\nlog.info(\"\
  Sorting  an array with merge sort\");\nIntSorter mergeSort = new MergeSort();\n\
  mergeSort.sort(arr, 0, arr.length-1);\nStringBuilder sb = new StringBuilder(\"Sorted:\
  \ \");\nArrays.stream(arr).forEach(i -> sb.append(i).append(\" \"));\nlog.info(sb.toString());\n\
  }\n}\n```\n\n在代码示例中，通过调用静态方法 `Logger.getLogger(..)` 创建了一个 `Logger` 实例。推荐的做法是将日志记录器命名为其正在记录消息的类名。在没有任何额外配置的情况下，使用\
  \ `log.info(..)` 打印的每条消息都会在其前面加上完整的系统日期、类名和方法名。现在，让我们在 `MergeSort` 类中将所有 `System.out.print`\
  \ 方法调用替换为日志记录器调用，并引入一个 `StringBuilder` 来构建更长的消息，然后再通过 `log.info(..)` 写入。\n\n```\n\
  package com.apress.bgn.ch9.algs;\nimport java.util.logging.Logger;\npublic class\
  \ MergeSort implements IntSorter {\nprivate static final Logger log =\nLogger.getLogger(SortingJulDemo.class.getName());\n\
  public void sort(int[] arr, int low, int high) {\nStringBuilder sb = new StringBuilder(\"\
  Call sort of \")\n.append(\": [\")\n.append(low).append(\" \").append(high)\n.append(\"\
  ] \");\nfor (int i = low; i <= high; ++i) {\nsb.append(arr[i]).append(\" \");\n\
  }\nlog.info(sb.toString());\nif (low < high) {\nint middle = (low + high) / 2;\n\
  //sort lower half of the interval\nsort(arr, low, middle);\n//sort upper half of\
  \ the interval\nsort(arr, middle + 1, high);\n// merge the two intervals\nmerge(arr,\
  \ low, middle, high);\n}\n}\nprivate void merge(int arr[], int low, int middle,\
  \ int high) {\n...\nStringBuilder sb = new StringBuilder(\"Called merge of: [\"\
  )\n.append(low).append(\" \").append(high).append(\" \").append(middle)\n.append(\"\
  ],) \");\nfor (int z = low; z <= high; ++z) {\nsb.append(arr[z]).append(\" \");\n\
  }\nlog.info(sb.toString());\n}\n}\n```\n\n现在让我们运行代码并分析控制台输出。\n\n```\nJul 21, 2018\
  \ 11:17:30 PM com.apress.bgn.ch9.SortingJulDemo main\nINFO: Sorting  an array with\
  \ merge sort\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort sort\n\
  INFO: Call sort of : [0 4] 5 1 4 2 3\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ sort\nINFO: Call sort of : [0 2] 5 1 4\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ sort\nINFO: Call sort of : [0 1] 5 1\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ sort\nINFO: Call sort of : [0 0] 5\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ sort\nINFO: Call sort of : [1 1] 1\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ merge\nINFO: Called merge of: [0 1 0],) 1 5\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ sort\nINFO: Call sort of : [2 2] 4\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ merge\nINFO: Called merge of: [0 2 1],) 1 4 5\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ sort\nINFO: Call sort of : [3 4] 2 3\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ sort\nINFO: Call sort of : [3 3] 2\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ sort\nINFO: Call sort of : [4 4] 3\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ merge\nINFO: Called merge of: [3 4 3],) 2 3\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.algs.MergeSort\
  \ merge\nINFO: Called merge of: [0 4 2],) 1 2 3 4 5\nJul 21, 2018 11:17:30 PM com.apress.bgn.ch9.SortingJulDemo\
  \ main\nINFO: Sorted: 1 2 3 4 5\n```\n\n日志消息的写入方式由一个称为格式化器的特殊类决定。当没有显式配置时，默认使用的格式化器是\
  \ `java.util.logging.SimpleFormatter`，它会像前面列表所示那样精确地打印日志消息。默认情况下，消息会打印到控制台，用于此目的的类称为处理器，在本例中是\
  \ `java.util.logging.ConsoleHandler`。这两者都是可配置的，并且可以通过配置文件替换为更高级的类或自定义类。\n\n前面的日志看起来有点拥挤，而且不够清晰。因此，我们需要通过添加适当的配置来优化它。`StreamFormatter`\
  \ 类包含一个名为 `format` 的字段，可以用一个模板来初始化，该模板定义了日志消息的写入方式。那么，让我们完全去掉类名和方法名，因为我们已经有非常具体的消息了。以下代码清单包含了\
  \ JUL 的一个简单配置。\n\n```\nhandlers=java.util.logging.ConsoleHandler\n.level=ALL\njava.util.logging.ConsoleHandler.level=ALL\n\
  java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter\njava.util.logging.SimpleFormatter.format=[%1$tF\
  \ %1$tT] [%4$-4s] %5$s %n\n```\n\n该文件应在执行开始时通过 `java.util.logging.LogManager` 实例加载，并调用\
  \ `readConfiguration(..)` 方法，因此 `SortingJulDemo` 类修改如下。\n\n```\npublic class SortingJulDemo\
  \ {\nprivate static final Logger log =\nLogger.getLogger(SortingJulDemo.class.getName());\n\
  static{\ntry {\nLogManager logManager = LogManager.getLogManager();\nlogManager.readConfiguration\
  \ (\nnew FileInputStream(\"./chapter09/src/main/resources/logging.properties\"));\n\
  } catch (IOException exception) {\nlog.log(Level.SEVERE, \"Error in loading configuration\"\
  ,exception);\n}\n}\npublic static void main(String... args) {\n// same code as before\n\
  ...\n}\n}\n```\n\n如果我们再次运行示例，输出将变为\n\n\n\n```\n[2018-07-21 23:58:29] [INFO] 使用归并排序对数组进行排序\n\
  [2018-07-21 23:58:29] [INFO] 调用排序：[0 4] 5 1 4 2 3\n[2018-07-21 23:58:29] [INFO]\
  \ 调用排序：[0 2] 5 1 4\n[2018-07-21 23:58:29] [INFO] 调用排序：[0 1] 5 1\n[2018-07-21 23:58:29]\
  \ [INFO] 调用排序：[0 0] 5\n[2018-07-21 23:58:29] [INFO] 调用排序：[1 1] 1\n[2018-07-21 23:58:29]\
  \ [INFO] 调用合并：[0 1 0],) 1 5\n[2018-07-21 23:58:29] [INFO] 调用排序：[2 2] 4\n[2018-07-21\
  \ 23:58:29] [INFO] 调用合并：[0 2 1],) 1 4 5\n[2018-07-21 23:58:29] [INFO] 调用排序：[3 4]\
  \ 2 3\n[2018-07-21 23:58:29] [INFO] 调用排序：[3 3] 2\n[2018-07-21 23:58:29] [INFO] 调用排序：[4\
  \ 4] 3\n[2018-07-21 23:58:29] [INFO] 调用合并：[3 4 3],) 2 3\n[2018-07-21 23:58:29] [INFO]\
  \ 调用合并：[0 4 2],) 1 2 3 4 5\n[2018-07-21 23:58:29] [INFO] 排序完成：1 2 3 4 5\n```\n\n\
  除了 `SimpleFormatter` 之外，还有另一个可用于格式化日志消息的类，名为 `XMLFormatter`，它可以将消息格式化为 XML（可扩展标记语言）。XML\
  \ 格式的数据写入规则由一组编码规则定义，这些规则使数据既便于人类阅读，也便于机器读取。此外，这组规则还使得验证和查找错误变得容易。^(⁶⁶) 由于 XML 不适合在控制台中输出，因此我们使用\
  \ `FileHandler` 类将日志保存到文件中。接下来展示的是需要添加到配置文件中的修改内容。\n\n```\nhandlers=java.util.logging.FileHandler\n\
  java.util.logging.FileHandler.pattern=chapter09/out/chapter09-log.xml\n.level=ALL\n\
  java.util.logging.ConsoleHandler.level=ALL\njava.util.logging.ConsoleHandler.formatter=java.util.logging.XMLFormatter\n\
  ```\n\n使用该配置运行代码后，会在 `chapter09/out` 目录下生成一个 `chapter09-log.xml` 文件，其中包含类似下面展示的条目。\n\
  \n```\n\n2018-07-21T23:50:52.905961Z\n\ncom.apress.bgn.ch9.SortingJulDemo\nINFO\n\
  com.apress.bgn.ch9.SortingJulDemo\nmain\n\n使用归并排序对数组进行排序\n\n...\n\n```\n\n日志输出也可以通过提供自定义类进行定制，唯一的要求是该类必须继承\
  \ `java.util.logging.Formatter` 类或其任何 JDK 子类。\n\n在前面的示例中，我们只使用了 `log.info` 调用，因为代码很简单，没有出错的空间；但现在让我们修改代码，允许用户输入数组元素。这需要编写代码来处理用户未输入正确数据的情况。应在类中添加处理用户未提供任何数据的情况的代码，以及处理用户输入错误数据的情况的代码。如果用户未提供任何数据，应打印一条\
  \ SEVERE 级别的日志消息，并终止应用程序。如果用户输入了无效数据，则应使用有效数据，并对非整数元素打印警告信息。\n\n这意味着 `SortingJulDemo`\
  \ 类将变为：\n\n```\npackage com.apress.bgn.ch9;\nimport com.apress.bgn.ch9.algs.IntSorter;\n\
  import com.apress.bgn.ch9.algs.MergeSort;\nimport java.io.FileInputStream;\nimport\
  \ java.io.IOException;\nimport java.util.ArrayList;\nimport java.util.Arrays;\n\
  import java.util.List;\nimport java.util.logging.Level;\nimport java.util.logging.LogManager;\n\
  import java.util.logging.Logger;\npublic class SortingJulDemo {\nprivate static\
  \ final Logger log =\nLogger.getLogger(SortingJulDemo.class.getName());\nstatic\
  \ {\ntry {\nLogManager logManager = LogManager.getLogManager();\nlogManager.readConfiguration(new\
  \ FileInputStream\n(\"./chapter09/logging-jul/src/main/resources/logging.properties\"\
  ));\n} catch (IOException exception) {\nlog.log(Level.SEVERE, \"加载配置时出错\", exception);\n\
  }\n}\npublic static void main(String... args) {\nif (args.length == 0) {\nlog.severe\
  \ (\"没有要排序的数据！\");\nreturn;\n}\nint[] arr = getInts(args);\nfinal StringBuilder\
  \ sb = new\nStringBuilder(\"使用归并排序对数组进行排序：\");\nArrays.stream(arr).forEach(i ->\
  \ sb.append(i).append(\" \"));\nlog.info(sb.toString());\nIntSorter mergeSort =\
  \ new MergeSort();\nmergeSort.sort(arr, 0, arr.length - 1);\nfinal StringBuilder\
  \ sb2 = new StringBuilder(\"排序完成：\");\nArrays.stream(arr).forEach(i -> sb2.append(i).append(\
  \ \" \"));\nlog.info(sb2.toString());\n}\nprivate static int[] getInts(String[]\
  \ args) {\nList list = new ArrayList();\nfor (String arg : args) {\ntry {\nint toInt\
  \ = Integer.parseInt(arg);\nlist.add(toInt);\n} catch (NumberFormatException nfe)\
  \ {\nlog.warning (\"元素 \" + arg + \" 不是整数，无法添加到数组中！\");\n}\n}\nint[] arr = new int[list.size()];\n\
  int j = 0;\nfor (Integer elem : list) {\narr[j++] = elem;\n}\nreturn arr;\n}\n}\n\
  ```\n\n`arr` 数组不再硬编码在 `main(..)` 方法中，而是将方法接收的参数值作为待排序数组，并通过 `toInts(..)` 方法将 `String`\
  \ 值转换为 `int` 值。执行此程序的人可以从命令行提供参数，但由于我们使用的是 IntelliJ IDEA，有一种更简单的方法。如果现在不提供任何参数运行程序，控制台将输出以下内容：\n\
  \n```\n[2018-07-22 01:34:37] [SEVERE] 没有要排序的数据！\n```\n\n执行在此处停止，因为没有要排序的数据。由于您可能已经运行过这个类几次，IntelliJ\
  \ 可能已经创建了一个启动配置，您可以自定义该配置并为执行提供参数。如图 9-4 所示，编辑您的配置，将推荐值作为程序参数添加进去。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig4_HTML.jpg](img/463938_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n\nSortingJulDemo 类的 IntelliJ IDEA 启动器\n\n然后运行程序并检查控制台日志。您会看到一些额外的日志消息，其严重级别为\
  \ WARNING，这些消息针对无法转换为 `int` 的参数值打印。\n\n\n\n```\n[2018-07-22 01:43:35] [WARNING]\
  \ 元素 a 不是整数，无法添加到数组中！\n[2018-07-22 01:43:35] [WARNING] 元素 b 不是整数，无法添加到数组中！\n[2018-07-22\
  \ 01:43:35] [WARNING] 元素 ds 不是整数，无法添加到数组中！\n[2018-07-22 01:43:35] [INFO] 使用归并排序对数组进行排序：5\
  \ 3 2 1 4\n[2018-07-22 01:43:35] [INFO] 调用排序：[0 4] 5 3 2 1 4\n[2018-07-22 01:43:35]\
  \ [INFO] 调用排序：[0 2] 5 3 2\n[2018-07-22 01:43:35] [INFO] 调用排序：[0 1] 5 3\n[2018-07-22\
  \ 01:43:35] [INFO] 调用排序：[0 0] 5\n[2018-07-22 01:43:35] [INFO] 调用排序：[1 1] 3\n[2018-07-22\
  \ 01:43:35] [INFO] 调用合并：[0 1 0],) 3 5\n[2018-07-22 01:43:35] [INFO] 调用排序：[2 2] 2\n\
  [2018-07-22 01:43:35] [INFO] 调用合并：[0 2 1],) 2 3 5\n[2018-07-22 01:43:35] [INFO]\
  \ 调用排序：[3 4] 1 4\n[2018-07-22 01:43:35] [INFO] 调用排序：[3 3] 1\n[2018-07-22 01:43:35]\
  \ [INFO] 调用排序：[4 4] 4\n[2018-07-22 01:43:35] [INFO] 调用合并：[3 4 3],) 1 4\n[2018-07-22\
  \ 01:43:35] [INFO] 调用合并：[0 4 2],) 1 2 3 4 5\n[2018-07-22 01:43:35] [INFO] 排序完成：1\
  \ 2 3 4 5\n```\n\n写入日志会影响性能，在某些情况下，例如当应用程序在生产系统中运行时，我们可能希望优化日志配置，只记录那些能提示问题风险的重要日志消息，并跳过信息性消息。在之前的配置示例中，有一行配置启用了所有日志消息的打印。\n\
  \n```\nhandlers=java.util.logging.ConsoleHandler\n.level=ALL\njava.util.logging.ConsoleHandler.level=ALL\n\
  java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter\njava.util.logging.SimpleFormatter.format=[%1$tF\
  \ %1$tT] [%4$-4s] %5$s %n\n```\n\n如果我们将该属性的值改为 OFF，则不会打印任何内容。日志级别都有对应的整数值，这些值可用于比较消息的严重程度。通常，如果你配置了某个级别的消息，那么更严重的消息也会被打印出来。因此，如果我们将该属性设置为\
  \ INFO，警告消息也会被打印出来。消息严重级别的值定义在 `java.util.logging.Level` 类中，如果你在编辑器中打开该类，就能看到分配给每个级别的整数值。\n\
  \n```\n...\npublic static final Level OFF = new Level(\"OFF\",Integer.MAX_VALUE,\
  \ defaultBundle);\npublic static final Level SEVERE = new Level(\"SEVERE\",1000,\
  \ defaultBundle);\npublic static final Level WARNING = new Level(\"WARNING\", 900,\
  \ defaultBundle);\npublic static final Level INFO = new Level(\"INFO\", 800, defaultBundle);\n\
  public static final Level CONFIG = new Level(\"CONFIG\", 700, defaultBundle);\n\
  public static final Level FINE = new Level(\"FINE\", 500, defaultBundle);\npublic\
  \ static final Level FINER = new Level(\"FINER\", 400, defaultBundle);\npublic static\
  \ final Level FINEST = new Level(\"FINEST\", 300, defaultBundle);\n...\n```\n\n\
  因此，在之前的配置中，如果我们将 `.level=ALL` 改为 `.level=WARNING`，那么我们应该能看到所有级别为 `WARNING` 和 `SEVERE`\
  \ 的日志消息。如果我们使用之前的参数运行 `SortingJulDemo` 类，应该只会看到 `WARNING` 级别的消息。\n\n```\n[2018-07-22\
  \ 15:46:19] [WARNING] 元素 a 不是整数，无法添加到数组中！\n[2018-07-22 15:46:19] [WARNING] 元素 b\
  \ 不是整数，无法添加到数组中！\n[2018-07-22 15:46:19] [WARNING] 元素 ds 不是整数，无法添加到数组中！\n```\n\n\
  定义日志消息格式还有更多方法：可以使用系统属性，也可以通过编程方式实例化一个格式化器并将其设置到日志记录器实例上。这实际上取决于应用程序的具体情况，但你可能需要考虑其他日志记录方案，因为\
  \ JUL 在多线程环境中性能较弱，大多数生产应用程序都使用其他库。不过，当 Java 7 发布时，其中一项宣布的特性就是对 JUL 模块的改进，因此如今它或许值得一试。\n\
  \n你还需要考虑的另一件事是，如果你正在构建的应用程序很复杂，且具有大量依赖项，这些依赖项可能使用不同的日志记录库，那么你该如何配置并使用它们呢？这时，*日志门面*就派上用场了。下一节将向你展示如何使用最著名的\
  \ Java 日志门面：SLF4J。\n\n### 使用 SLF4J 和 Logback 进行日志记录\n\n最著名的 Java 日志门面是 SLF4J^(⁶⁷)，它作为各种日志框架的日志抽象层。这意味着你使用\
  \ SLF4J 的类，而所有实际工作则由类路径中找到的具体日志实现来完成。最棒的是？你可以随时更换日志实现，你的代码仍然可以正确编译和执行，并且无需对其做任何更改。\n\
  \n在本章迄今为止介绍的代码示例中，代码与 JUL 紧密耦合，如果我们出于某种原因想要更换日志库，也需要修改现有代码。第一步是将我们的代码改为使用 SLF4J\
  \ 的类。使用 SLF4J 的另一个优点是，如果日志配置文件位于类路径中，配置会被自动读取。因此，只要配置文件的命名符合所使用的具体日志实现的标准，我们之前为\
  \ JUL 所需的 `LogManager` 初始化块就不再需要了。那么，我们先来看一下代码。\n\n```\npackage com.apress.bgn.ch9;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport java.util.Arrays;\n\
  import java.util.logging.Logger;\npublic class SortingJulDemo {\nprivate static\
  \ final Logger log =\nLoggerFactory.getLogger(SortingSlf4jDemo.class);\npublic static\
  \ void main(String... args) {\nif (args.length == 0) {\nlog.error (\"没有数据需要排序！\"\
  );\nreturn;\n}\nint[] arr = getInts(args);\nfinal StringBuilder sb = new StringBuilder\n\
  (\"使用归并排序对数组进行排序：\");\nArrays.stream(arr).forEach(i -> sb.append(i).append(\" \"\
  ));\nlog.debug (sb.toString());\nIntSorter mergeSort = new MergeSort();\nmergeSort.sort(arr,\
  \ 0, arr.length - 1);\nfinal StringBuilder sb2 = new StringBuilder(\"排序完成：\");\n\
  Arrays.stream(arr).forEach(i -> sb2.append(i).append( \" \"));\nlog.info (sb2.toString());\n\
  }\n}\n```\n\n你可能已经注意到，我们调用的方法略有不同，这是因为 SLF4J 定义了一个映射到具体实现的 API，但这些方法根据其名称，用于打印具有特定目的和特定级别的日志消息。我将列出它们并逐一进行简要说明。\n\
  \n*   `info.error(..)` 在 ERROR 级别记录消息；通常这些消息用于应用程序发生严重故障且无法继续正常执行时。此方法有不止一种形式，异常和对象可以作为参数传递给它，以便评估故障发生时应用程序的状态。\n\
  \n*   `info.warn(..)` 在 WARN 级别记录消息；通常打印这些消息是为了通知应用程序运行不正常，可能存在需要担忧的原因。与上一个方法类似，它也有不止一种形式，异常和对象可以作为参数传递，以便更好地评估应用程序的当前状态。\n\
  \n*   `log.info(..)` 在 INFO 级别记录消息；这类消息是信息性的，用于让用户知道一切正常。\n\n*   `info.debug(..)`\
  \ 在 DEBUG 级别记录消息；通常这些消息用于打印应用程序的中间状态，并检查事情是否按预期进行；在发生故障时，你可以追踪应用程序对象的演变过程。\n\n*\
  \   `log.trace(..)` 在 TRACE 级别记录消息；这类消息是信息性的，重要性非常低。\n\n\n\n本示例使用的日志具体实现称为 Logback^(⁶⁸)，之所以选择它，是因为在\
  \ Java 9 引入模块后，它是唯一能与 SLF4J 配合使用的库。Logback 被视为另一种流行的日志实现 Log4j 的继任者，这很合理，因为创建它的团队也曾参与\
  \ Log4j 的开发^(⁶⁹)。Logback 原生实现了 SLF4J，因此无需再添加额外的桥接库。而且它的速度更快，因为 Logback 的内部实现已被重写，以便在关键执行点上性能更优。在修改我们的类以使用\
  \ SLF4J 后，我们只需将 Logback 添加为应用程序的依赖项，并在 `resources` 目录下添加一个配置文件即可。该配置文件可以用 XML 或\
  \ Groovy 编写。标准要求其命名为 `logback.xml`。下面的代码清单展示了本节示例中该文件的内容。\n\n```\n%d{HH:mm:ss.SSS}\
  \ %-5level %logger{5} - %msg%n\n```\n\n`ch.qos.logback.core.ConsoleAppender` 类用于在控制台写入日志消息，`<pattern>`\
  \ 元素定义了日志消息的格式。Logback 可以通过将包名缩写为首字母来格式化完全限定的类名，从而在不丢失信息的情况下实现紧凑的日志记录。这使得 Logback\
  \ 成为当前 Java 开发世界中最受欢迎的日志实现之一。\n\n`MergeSort` 类中的日志调用全部被替换为 `log.debug(..)`，因为这些消息是中间过程信息，并非真正的通知性信息，只是应用程序在执行过程中所用对象状态的示例。应用程序的通用日志级别可以通过\
  \ `<root>` 元素设置为所需级别，但也可以使用 `<logger>` 元素为特定类或包设置不同的日志级别。\n\n因此，如果我们使用之前的配置在类路径上运行\
  \ `SortingSlf4jDemo` 类，将会打印出以下内容：\n\n```\n19:38:57.950 WARN  c.a.b.c.SortingSlf4jDemo\
  \ -\n元素 a 不是整数，无法添加到数组中！\n19:38:57.951 WARN  c.a.b.c.SortingSlf4jDemo -\n元素 b 不是整数，无法添加到数组中！\n\
  19:38:57.951 WARN  c.a.b.c.SortingSlf4jDemo -\n元素 ds 不是整数，无法添加到数组中！\n19:38:57.953\
  \ DEBUG c.a.b.c.SortingSlf4jDemo - 使用归并排序对数组进行排序：5 3 2 1 4\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort\
  \ - 调用排序：[0 4] 5 3 2 1 4\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[0 2] 5\
  \ 3 2\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[0 1] 5 3\n19:38:57.953 DEBUG\
  \ c.a.b.c.a.MergeSort - 调用排序：[0 0] 5\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[1\
  \ 1] 3\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用合并：[0 1 0],) 3 5\n19:38:57.953\
  \ DEBUG c.a.b.c.a.MergeSort - 调用排序：[2 2] 2\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort\
  \ - 调用合并：[0 2 1],) 2 3 5\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[3 4] 1\
  \ 4\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort - 调用排序：[3 3] 1\n19:38:57.953 DEBUG c.a.b.c.a.MergeSort\
  \ - 调用排序：[4 4] 4\n19:38:57.954 DEBUG c.a.b.c.a.MergeSort - 调用合并：[3 4 3],) 1 4\n\
  19:38:57.954 DEBUG c.a.b.c.a.MergeSort - 调用合并：[0 4 2],) 1 2 3 4 5\n19:38:57.954\
  \ INFO  c.a.b.c.SortingSlf4jDemo - 排序后：1 2 3 4 5\n```\n\n完全限定的类名 `com.apress.bgn.ch9.SortingSlf4jDemo`\
  \ 被缩短为 `c.a.b.c.SortingSlf4jDemo`。\n\n配置文件可以作为 VM 参数提供给程序，这意味着日志格式可以在外部配置。启动该类时，使用\
  \ `-Dlogback.configurationFile=\\temp\\ext-logback.xml` 作为 VM 参数。\n\nLogback 也可以将输出定向到文件；我们只需使用\
  \ `ch.qos.logback.core.FileAppender` 类添加配置，并通过在 `<root>` 配置中添加一个 `<appender>` 元素将输出定向到文件即可。\n\
  \n```\nchapter09/logging-slf4j/out/output.log\ntrue\n%d{HH:mm:ss.SSS} %-5level %logger{5}\
  \ - %msg%n\nUTF-8\n%d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n\n```\n\n在这个例子中，我们保留了原始配置，因为我希望向你展示一个同时将日志消息写入两个目标的可行示例。但如果日志文件变得太大而无法打开怎么办？嗯，有一种方法可以解决这个问题。我们可以使用另一个类，它可以配置为在达到设定大小限制时写入一个文件，然后开始写入另一个文件。这个类名为\
  \ `ch.qos.logback.core.rolling.RollingFileAppender`，它需要两个参数：一个实现了 `ch.qos.logback.core.rolling.RollingPolicy`\
  \ 类型的实例，它提供写入新日志文件（也称为*滚动*）的功能；以及一个实现了 `ch.qos.logback.core.rolling.TriggeringPolicy`\
  \ 类型的实例，它配置触发滚动的条件。\n\n此外，一个同时实现了这两个接口的类型的单个实例也可以配置日志记录器。滚动日志文件意味着日志文件会根据配置重命名；通常，文件最后访问的日期会被添加到其名称中，然后创建一个新的日志文件，其名称与配置的日志文件名相同（不带任何日期信息）。\n\
  \n```\nchapter09/logging-slf4j/out/output.log\nchapter09/logging-slf4j/out/output_%d{yyyy-MM-dd}.%i.log\n\
  10MB\nUTF-8\n%d{HH:mm:ss.SSS} %-5level %logger{5} - %msg%n\n%d{HH:mm:ss.SSS} %-5level\
  \ %logger{5} - %msg%n\n```\n\n因此，`<file>` 元素配置日志文件的位置和名称。`<rollingPolicy>` 元素使用\
  \ `<fileNamePattern>` 配置当日志消息不再写入时日志文件接收的名称。例如，在上面的配置中，`output.log` 文件会被重命名为 `output_2018-07-22.log`，然后每天创建一个新的\
  \ `output.log` 文件。`<timeBasedFileNamingAndTriggeringPolicy>` 配置在写入新文件之前，`output.log`\
  \ 文件应该有多大。上面示例中配置的大小是 10 MB。如果日志文件在一天结束前增长到超过 10 MB，该文件会被重命名为 `output_2018-07-22.1.log`，名称中添加一个索引，并创建一个新的\
  \ `output.log`。`<maxHistory>` 设置日志文件的生命周期，在我们的例子中是 30 天。\n\n日志记录是一个强大的工具；请确保不要滥用它，因为它可能导致性能问题以及产生大量难以分析有用信息的数据。另一件值得注意的事情是在之前的代码中。`StringBuilder`\
  \ 实例被用来构建大的日志消息，这些消息在特定级别打印。如果通过配置禁用了该级别的日志记录会发生什么？如果你猜测即使这些消息没有被记录，创建它们也会消耗时间和内存，那么你是对的。那么，我们该怎么办？SLF4J\
  \ 的创建者也考虑到了这一点，并添加了方法来测试某个日志级别是否启用，这些方法可以在包装性能敏感代码的 `if` 语句中使用。这样一来，`SortingSlf4jDemo.main(..)`\
  \ 方法就变成了：\n\n```\npublic static void main(String... args) {\nif (args.length ==\
  \ 0) {\nlog.error(\"没有数据可排序！\");\nreturn;\n}\nint[] arr = getInts(args);\nif (log.isDebugEnabled())\
  \ {\nfinal StringBuilder sb = new StringBuilder(\n\"使用归并排序对数组进行排序：\");\nArrays.stream(arr).forEach(i\
  \ -> sb.append(i).append(\" \"));\nlog.debug(sb.toString());\n}\nIntSorter mergeSort\
  \ = new MergeSort();\nmergeSort.sort(arr, 0, arr.length - 1);\nif (log.isInfoEnabled())\
  \ {\nfinal StringBuilder sb2 = new StringBuilder(\"排序后：\");\nArrays.stream(arr).forEach(i\
  \ -> sb2.append(i).append(\" \"));\nlog.info(sb2.toString());\n}\n}\n```\n\n\n\n\
  在此代码示例中，如果将 `com.apress.bgn.ch9` 包的 SLF4J 配置设为 info，那么以 *Sorting an array with merge\
  \ sort: ...* 开头的消息将不再生成或打印，因为 `log.isDebugEnabled()` 返回 `false`，因此 `if` 语句中的代码不再执行。`Logger`\
  \ 类针对所有日志级别都包含 `if..Enabled()` 方法。\n\n本节关于日志记录的内容就到此为止。请记住要适度使用日志，在循环中记录日志时要格外小心，对于大型应用，始终使用日志门面，即\
  \ SLF4J。\n\n### 使用断言进行调试\n\n调试代码的另一种工具是使用断言。如果你还记得关于 Java 关键字的章节，可能还记得 `assert`\
  \ 关键字。`assert` 关键字编写一条 `assertion` 语句，用于测试你对程序执行的假设。在之前的示例中，我们让用户为排序程序提供输入，因此为了让程序正确运行，我们假设用户提供了正确的输入，即数组大小大于\
  \ 1，因为对单个数字运行算法没有意义。那么，断言在代码中是什么样子的呢？答案在以下代码示例中。\n\n```\npackage com.apress.bgn.ch9;\n\
  import com.apress.bgn.ch9.algs.IntSorter;\nimport com.apress.bgn.ch9.algs.QuickSort;\n\
  import java.util.Arrays;\nimport static com.apress.bgn.ch9.SortingSlf4jDemo.getInts;\n\
  public class AssertionDemo {\npublic static void main(String... args) {\nint[] arr\
  \ = getInts(args);\nassert arr.length > 1;\nIntSorter mergeSort = new QuickSort();\n\
  mergeSort.sort(arr, 0, arr.length - 1);\nfinal StringBuilder sb2 = new StringBuilder(\"\
  Sorted: \");\nArrays.stream(arr).forEach(i -> sb2.append(i).append(\" \"));\nSystem.out.println(sb2.toString());\n\
  }\n}\n```\n\n如果你在未向程序提供任何参数的情况下运行此代码，即使其中包含 `assertion` 语句，也不会发生任何事情。原因是断言需要使用 VM\
  \ 参数 `-ea` 来启用。要指定此参数，你可以在命令行执行时将其添加到命令中；但由于我们一直使用编辑器，你可以将其添加到 IntelliJ IDEA 启动器的\
  \ **VM options** 文本框中，如图 9-5 所示。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig5_HTML.jpg](img/463938_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5\n\n*设置了 -ea VM 参数的 AssertionDemo 类的 IntelliJ IDEA 启动器*\n\n启用断言后，运行上述代码会抛出\
  \ `java.lang.AssertionError`，因为断言的表达式计算结果为 `false`——当未提供参数时，`arr.length` 显然不大于 1。断言有两种形式。在简单形式中，它们只有要计算的表达式，即要测试的假设。\n\
  \n```\nassertion expression;\n```\n\n在这种情况下，会抛出 `java.lang.AssertionError`。它会打印做出假设的行，该假设对于程序的当前运行显然是错误的，同时还会显示模块和完整的类名。\n\
  \n```\nException in thread \"main\" java.lang.AssertionError\nat chapter.nine.slf4j/com.apress.bgn.ch9.AssertionDemo.main(AssertionDemo.java:48)\n\
  ```\n\n断言的复杂版本添加了另一个要计算的表达式，或者堆栈中的一个值，用于告知用户假设是错误的。\n\n```\nassertion expression1\
  \ : expression 2;\n```\n\n因此，如果我们把\n\n```\nassert arr.length > 1;\n```\n\n替换为\n\n\
  ```\nassert arr.length > 1 : \"Not enough data to sort!\";\n```\n\n当抛出 `java.lang.AssertionError`\
  \ 时，它会显示 *Not enough data to sort!* 消息，这清楚地说明了为什么断言语句阻止了其余代码的执行。\n\n```\nException\
  \ in thread \"main\" java.lang.AssertionError: Not enough data to sort!\nat chapter.nine.slf4j/com.apress.bgn.ch9.AssertionDemo.main(AssertionDemo.java:48)\n\
  ```\n\n或者我们也可以直接打印数组的大小。\n\n```\nassert arr.length > 1 : arr.length;\n```\n\n或者两者都打印。\n\
  \n```\nassert arr.length > 1 :\n\"Not enough data to sort! Number of values: \"\
  \ + arr.length;\n```\n\n断言可以在需要调试的代码片段之前和之后使用。在本例中，断言被用作执行的前置条件，因为断言的失败阻止了代码的执行。但断言也可以用作后置条件，用于测试执行一段代码的结果。\n\
  \n在前面的代码片段中，断言用于测试用户提供输入的正确性。在这种情况下，无论断言是否启用，都应遵守有效输入的限制。当然，如果我们的数组为空或只包含一个元素，这不是问题，因为算法不会执行，也不会导致技术故障。在使用断言编写代码时，有一些规则需要遵守，或者需要注意的事项。\n\
  \n*   **不应使用断言来检查公共方法参数的正确性。** 参数的正确性应在代码中进行测试，并应抛出适当的 `RuntimeException`，且不应是可避免的。\n\
  \n*   **不应使用断言来完成应用程序正常运行所需的工作。** 主要原因是**断言默认是禁用的**，禁用断言会导致该代码不被执行，因此应用程序的其余部分会因缺少代码而无法正常运行。\n\
  \n*   **出于性能原因，不要在断言中使用计算开销大的表达式。** 这条规则无需解释，即使断言默认是禁用的，想象一下有人在生产应用程序中错误地启用了它们。那将很不幸，不是吗？\n\
  \n如果你有兴趣使用断言，请记住这三条规则，这样应该就没问题了。\n\n\n\n### 逐步调试\n\n如果你不想编写日志消息或使用断言，但仍希望在程序执行期间检查变量的值，有一种方法可以通过\
  \ IDE 实现：使用断点暂停执行，并借助 IDE 检查变量内容或执行简单方法，以验证程序是否按预期运行。\n\n断点是在可执行的代码行（而非注释行、空行或声明行）上设置的一个标记。在\
  \ IntelliJ IDEA 中，要设置断点，你需要点击感兴趣行左侧的装订线区域，或者选中该行后，从**运行**菜单中选择**切换行断点**。当断点设置成功后，该行左侧的装订线区域会出现一个红色圆点。图\
  \ 9-6 展示了 IntelliJ IDEA 中的几个断点。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig6_HTML.jpg](img/463938_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\nIntelliJ IDEA 断点\n\n一旦断点设置完毕，当应用程序以调试模式运行时，它会在每个断点行暂停。你可以决定是否继续逐步执行并检查变量的值。IntelliJ\
  \ IDEA 在这方面非常有用，因为它会显示正在执行的每一行代码中每个变量的内容。在图 9-7 中，`SortingSlf4jDemo`类正在以调试模式运行，并通过断点在执行过程中暂停。\n\
  \n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig7_HTML.jpg](img/463938_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\nIntelliJ IDEA 中 SortingSlf4jDemo 类在执行过程中暂停\n\n要以调试模式运行应用程序，而不是正常启动启动器，你可以点击绿色的虫子形状按钮（图\
  \ 9-7 中标记为 1 的按钮）来启动它，该按钮紧挨着通常用于运行应用程序的绿色三角形按钮。应用程序运行并在第一个标记了断点的行处停止。从那时起，开发者可以执行以下操作。\n\
  \n*   通过读取编辑器在该行显示的变量值，来检查断点行所用变量的值。\n\n*   点击**调试**部分（图 9-7 中标记为 2 的按钮）中的绿色三角形，继续执行直到下一个断点。\n\
  \n*   点击**调试**部分（图 9-7 中标记为 2 的按钮）中的红色方形按钮，停止执行。\n\n*   点击**调试**部分（图 9-7 中标记为 2\
  \ 的按钮）中的对角线切割的红色圆点按钮，禁用所有断点。\n\n*   点击**调试器**部分（图 9-7 中标记为 3 的按钮）中的 90 度角按钮，继续执行到下一行代码。\n\
  \n*   点击**调试器**部分（图 9-7 中标记为 3 的按钮）中的蓝色向下箭头按钮，进入当前代码行的方法内部继续执行。\n\n*   点击**调试器**部分（图\
  \ 9-7 中标记为 3 的按钮）中的蓝色向上箭头按钮，跳出当前方法继续执行。\n\n*   点击**调试器**部分（图 9-7 中标记为 3 的按钮）中的指向光标符号的对角线箭头按钮，继续执行到光标所在的行。\n\
  \n*   通过将表达式添加到**监视**部分（图 9-7 中标记为 4 的区域）来评估你自己的表达式。唯一的条件是这些表达式只能使用在断点行上下文中可访问的变量。\n\
  \n大多数 Java 智能编辑器都提供了以调试模式运行 Java 应用程序的方法；只需确保你记得定期清理**监视**部分，因为如果你添加了评估成本高昂的表达式，可能会影响应用程序的性能。此外，请注意，使用流的表达式可能会导致应用程序失败，正如第\
  \ 8 章所证明的那样。\n\n### 使用 Java 工具检查运行中的应用程序\n\n除了用于编译 Java 代码、执行或打包 Java 字节码的可执行文件外，JDK\
  \ 还提供了一组实用可执行文件，可用于调试和检查正在运行的 Java 应用程序的状态。本节将介绍其中最有用的几个。闲话少叙，让我们来看看最重要的几个。\n\n\
  #### jps\n\nJava 应用程序在运行时会被分配一个进程 ID。操作系统通过这种方式来跟踪所有同时并行运行的应用程序。你可以在诸如 Windows 的\
  \ Process Explorer 和 macOS 的活动监视器等工具中查看进程 ID。但如果你习惯在控制台中工作，你可能会更喜欢使用 JDK 提供的`jps`可执行文件，因为它只关注\
  \ Java 进程。当从控制台调用`jps`时，所有 Java 进程 ID 都会列出，并附带主类名或应用程序 API 暴露的一些有助于你识别正在运行的应用程序的详细信息。当应用程序崩溃但进程仍处于挂起状态时，这非常有用。当应用程序使用文件或网络端口等资源时，这种情况可能很麻烦，因为它可能会阻塞这些资源，阻止你使用它们。在我的电脑（我使用的是\
  \ Mac）上执行`jps`时，我看到正在运行的 Java 进程如下。\n\n```\n$ jps\n21234 Launcher\n\n21235 SortingSlf4jDemo\n\
  3155 muCommander\n21236 Jps\n```\n\n如列表所示，`jps` 在输出中包含了自身，因为它本身也是一个 Java 进程。ID 为`21235`的进程是`SortingSlf4jDemo`类的执行实例。ID\
  \ 为`21234`的进程是 IntelliJ IDEA 用于启动`SortingSlf4jDemo`类执行的启动器应用程序。ID 为`3155`的进程是一个\
  \ Java 应用程序，它是 Total Commander（一个 Windows 文件管理器应用程序）的替代品。ID 为`18562`的进程没有任何描述，但此时我可以自己识别这个进程，因为我知道我打开了\
  \ IntelliJ IDEA，它本身就是一个 Java 应用程序。\n\n了解进程 ID 的好处在于，当它们挂起并阻塞资源时，你可以终止它们。假设由`SortingSlf4jDemo`执行启动的进程最终挂起了。要终止一个进程，所有操作系统都提供了`kill`命令的某个版本。对于\
  \ macOS 和 Linux，你应该执行`kill -9 [进程 ID]`。对于前面的例子，如果我调用`kill -9 21235`，然后再次调用`jps`，我可以看到`SortingSlf4jDemo`进程不再被列出。\n\
  \n```\n$ jps\n21234 Launcher\n\n3155 muCommander\n21257 Jps\n```\n\n我仍然有`Launcher`进程，但它是\
  \ IntelliJ IDEA 的子进程，所以终止它没有意义，因为下次我在 IDE 中运行`main(..)`方法时，该进程会再次启动。\n\n`jps` 是一个用于此特定目的的简单工具，但有时当应用程序安装在配置极简的服务器上时，它可能是你唯一拥有的工具。所以，知道它的存在是件好事。\n\
  \n\n\n#### jcmd\n\n`jcmd` 是另一个有用的 JDK 工具。它向 JVM 发送诊断命令请求，有助于排查和诊断 JVM 及正在运行的 Java\
  \ 应用程序。它必须在运行 JVM 的同一台机器上使用，并且在不带任何命令调用时，会显示当前机器上运行的所有 Java 进程；它会显示进程 ID 以及用于启动这些进程的命令。\n\
  \n```\n$ jcmd\n3155 com.mucommander.muCommander\n21369 jdk.jcmd/sun.tools.jcmd.JCmd\n\
  21355 org.jetbrains.jps.cmdline.Launcher /Applications/IntelliJ IDEA 2018.2 EAP\n\
  .app/Contents/lib/platform-api.jar:/Applications/IntelliJ IDEA 2018.2 EAP\n.app/Contents/lib/jps-builders-6.jar:/Applications/IntelliJ\
  \ IDEA 2018.2 EAP\n...\n.app/Contents/lib/netty-transport-4.1.25.Final.jar:/Applications/IntelliJ\
  \ IDEA 21356 chapter.nine.slf4j/com.apress.bgn.ch9.SortingSlf4jDemo 5 a 3 2 b 1\
  \ ds 4\n21326 org.jetbrains.idea.maven.server.RemoteMavenServer\n```\n\n你可以对正在运行的进程使用\
  \ `jcmd` 运行的最简单命令是 `help`，它会列出你可以在该进程上使用的所有附加命令。这仅在应用程序当前正在运行且未因断点而暂停时有效。由于我在撰写本文时\
  \ `SortingSlf4jDemo` 已暂停，因此我以 `muCommander` 进程为例。\n\n如果我调用 `jcmd 3155 help`，会看到以下内容：\n\
  \n```\n$ jcmd 3155 help\n3155:\n可用的命令如下：\nJFR.configure\nJFR.stop\nJFR.start\nJFR.dump\n\
  JFR.check\nVM.log\nVM.native_memory\nVM.check_commercial_features\nVM.unlock_commercial_features\n\
  ManagementAgent.status\nManagementAgent.stop\nManagementAgent.start_local\nManagementAgent.start\n\
  Compiler.directives_clear\nCompiler.directives_remove\nCompiler.directives_add\n\
  Compiler.directives_print\nVM.print_touched_methods\nCompiler.codecache\nCompiler.codelist\n\
  Compiler.queue\nVM.classloader_stats\nThread.print\nJVMTI.data_dump\nJVMTI.agent_load\n\
  VM.stringtable\nVM.symboltable\nVM.class_hierarchy\nVM.systemdictionary\nGC.class_stats\n\
  GC.class_histogram\nGC.heap_dump\nGC.finalizer_info\nGC.heap_info\nGC.run_finalization\n\
  GC.run\nVM.info\nVM.uptime\nVM.dynlibs\nVM.set_flag\nVM.flags\nVM.system_properties\n\
  VM.command_line\nVM.version\nhelp\n```\n\n本书的目标并非涵盖所有这些命令，因为它们是 Java 的高级特性，但你可能对每个命令的适用范围有基本了解。例如，以下内容展示了调用\
  \ `jcmd 3155 GC.heap_info` 的输出。\n\n```\n$ jcmd 3155 GC.heap_info\n3155:\ngarbage-first\
  \ heap   total 48128K, used 11698K 0x00000006c0000000, 0x00000007c0000000)\nregion\
  \ size 1024K, 1 young (1024K), 0 survivors (0K)\nMetaspace     used 35414K, capacity\
  \ 35923K, committed 36864K, reserved 1081344K\nclass space  used 4588K, capacity\
  \ 4835K, committed 5120K, reserved 1048576K\n```\n\n如果你还记得，在**第** [5 章中讨论了 JVM 使用的不同类型的内存，而堆是存储应用程序使用的所有对象的内存区域。此命令打印堆的详细信息：已使用和已保留的内存量、区域大小等。这些细节将在**第**\
  \ **13** 章中更详细地介绍。\n\n#### jconsole\n\n`jconsole` 是一个 JDK 工具，可用于检查各种 JVM 统计信息。要使用它，你需要从命令行启动它，并将其连接到一个已经运行的\
  \ Java 应用程序。这个工具非常有用，因为它还可以连接到在不同机器上运行的应用程序，只要这些应用程序在服务器上以调试模式运行并暴露一个用于连接的端口。要以调试模式启动\
  \ Java 应用程序并暴露一个端口供外部应用程序连接，你需要使用以下 VM 参数启动应用程序。\n\n```\n-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=1044\n\
  ```\n\n实际上，只要端口号大于 1024，任何端口都可以使用，因为小于 1024 的端口受操作系统限制。`transport=dt_socket` 指示\
  \ JVM 调试器连接通过套接字进行，`address=1044` 参数告知端口号为 1044。`suspend=y` 指示 JVM 暂停执行，直到有调试器连接到它。要避免这种情况，应使用\
  \ `suspend=n`。\n\n对于我们的简单示例，考虑到我们使用 `jconsole` 在同一台机器上调试 Java 应用程序，我们不需要所有这些设置。我们需要从命令行启动\
  \ `jconsole`，然后在 **本地进程：** 部分查找并识别我们感兴趣的 Java 进程。图 9-8 显示了 JConsole 的第一个对话框窗口。\n\
  \n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig8_HTML.jpg](img/463938_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\nJConsole 第一个对话框窗口\n\n当进程在本地运行时，很容易识别，因为它使用模块和完全限定的主类名来命名。当我们使用 `jconsole`\
  \ 进行本地调试时，应用程序不必以调试模式运行，但对于像我们这样简单的应用程序，我们需要做一些调整，以确保在应用程序运行期间可以通过 `jconsole` 看到一些统计信息。我们添加了一些\
  \ `Thread.sleep(..)` 语句，以便暂停执行足够长的时间让 `jconsole` 连接。此外，我们将使用一个大型数据数组，以确保统计信息具有参考价值。\n\
  \n```\npublic class SortingSlf4jDemo {\nprivate static final Logger log =\nLoggerFactory.getLogger(SortingSlf4jDemo.class);\n\
  public static void main(String... args) throws Exception {\nThread.sleep(3000);\n\
  Random random = new Random(5);\nIntStream intStream = random.ints(100_000_000,0,350);\n\
  int[] arr =  intStream.toArray();\nif (log.isDebugEnabled()) {\nfinal StringBuilder\
  \ sb =\nnew StringBuilder(\"使用归并排序对数组进行排序: \");\nArrays.stream(arr).forEach(i ->\
  \ sb.append(i).append(\" \"));\nlog.debug(sb.toString());\n}\nThread.sleep(3000);\n\
  IntSorter mergeSort = new MergeSort();\nmergeSort.sort(arr, 0, arr.length - 1);\n\
  if (log.isInfoEnabled()) {\nfinal StringBuilder sb2 = new StringBuilder(\"排序后: \"\
  );\nArrays.stream(arr).forEach(i -> sb2.append(i).append(\" \"));\nlog.info(sb2.toString());\n\
  }\n}\n...\n}\n```\n\n完成修改后，我们将正常启动应用程序，并将 `jconsole` 连接到它。成功连接后，会打开一个如图 9-9 所示的窗口，并显示\
  \ JVM 内存消耗、线程数、已加载类数和 CPU 使用率的图表。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig9_HTML.jpg](img/463938_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\nJConsole 统计信息窗口\n\n每个统计信息都有一个选项卡提供更多详细信息，在更复杂的应用程序中，这些信息可用于提高性能、识别潜在问题，甚至预测应用程序在所需场景下的行为。对于我们这个小型应用程序，`jconsole`\
  \ 的图表并没有揭示太多信息，但如果你真的想看到有价值的统计信息，可以安装一个像 `mucommander`^(⁷⁰) 这样的应用程序，在不关闭它的情况下使用一段时间，然后将\
  \ `jconsole` 连接到它，尽情探索吧。\n\n\n\n#### jmc\n\nJMC 是 **Oracle Java Mission Control**\
  \ 的缩写。`jmc` 命令用于启动一个高级 Oracle 应用程序，用于调试和分析正在运行的应用程序的 JVM 统计数据。根据其官方描述：*JMC 是一个用于管理、监控、性能分析和故障排查\
  \ Java 应用程序的工具套件*，从 JDK 7 开始，它成为了 JDK 实用工具家族的一员。\n\n与其他工具类似，该实用程序可以识别当前正在运行的 Java\
  \ 进程，并提供检查以下信息的功能：它们在执行过程中特定时间点所需的内存量、在给定时刻并行运行的线程数、JVM 加载的类，以及运行 Java 应用程序所需的处理能力。JMC\
  \ 拥有更友好的界面，其最重要的组件之一是 **Java Flight Recorder**，它可以在应用程序运行时记录所有 JVM 活动，在此期间收集的所有数据随后用于诊断和分析应用程序。\n\
  \n为了在应用程序运行时进行检查，我们通过在命令行中运行 `jmc` 来打开 JMC，然后根据与之前相同的规则，选择我们识别为运行 `SortingSlf4jDemo`\
  \ 主类的进程。当我们找到它时，我们查找一个包含模块名称和完全限定类名的进程名称。右键单击它，然后选择 **Start JMX console**。你应该会看到类似于图\
  \ 9-10 所示的图像。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig10_HTML.jpg](img/463938_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\nJMX 控制台\n\n正如你可能注意到的，界面确实更友好，提供的统计数据也更详细。使用 JMC，可以记录应用程序和 JVM 在运行期间发生的一切，并可以在之后进行分析，即使应用程序此后已停止运行。**Memory**\
  \ 选项卡提供了大量关于应用程序所用内存的信息，包括哪些类型的对象占用了内存。`SortingSlf4jDemo` 在运行期间占用的内存信息如图 9-11 所示。\n\
  \n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig11_HTML.jpg](img/463938_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\nJMX 控制台 ➤ Memory 选项卡\n\n为了在应用程序运行期间或在一段有限的时间内记录此信息，请在 **JVM Browser**\
  \ 中展开进程节点，然后选择 **Start Flight Recording**。将打开一个窗口，要求你选择保存记录的路径和记录的持续时间。该文件具有 `.jfr`\
  \ 扩展名，可以使用 JMC 打开进行检查。飞行记录器菜单和开始记录数据的对话框如图 9-12 所示。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig12_HTML.jpg](img/463938_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n\nJMC 飞行记录器菜单和对话框窗口\n\nJMC 这个主题对于本节来说过于高级和广泛，可能整本书都用来介绍它的用法以及如何解释统计数据。所以，我将在此打住，如果你想深入了解，推荐阅读这篇\
  \ Oracle 文章：[`www.oracle.com/technetwork/java/javaseproducts/mission-control/java-mission-control-1998576.html`](http://www.oracle.com/technetwork/java/javaseproducts/mission-control/java-mission-control-1998576.html)。\n\
  \n## 访问 Java 进程 API\n\nJava 9 除了 Jigsaw 模块之外，还带来了许多其他改进，其中之一就是全新且改进的 Process API。Java\
  \ Process API 允许你启动、检索信息和管理本地操作系统进程。在早期版本的 Java 中也有操作进程的能力，但非常简陋。请注意在 Java 5 之前是如何创建进程的。\n\
  \n```\npackage com.apress.bgn.ch9;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
  import java.io.BufferedReader;\nimport java.io.InputStream;\nimport java.io.InputStreamReader;\n\
  import java.io.Reader;\nimport java.nio.charset.Charset;\nimport java.nio.charset.StandardCharsets;\n\
  public class ProcessCreationDemo {\nprivate static final Logger log =\nLoggerFactory.getLogger(ProcessCreationDemo.class);\n\
  public static void main(String... args) {\ntry {\nProcess exec = Runtime.getRuntime()\n\
  .exec(new String[] { \"/bin/sh\", \"-c\", \"echo Java home:  $JAVA_HOME\" });\n\
  exec.waitFor();\nInputStream is = exec.getInputStream();\nStringBuilder textBuilder\
  \ = new StringBuilder();\ntry (Reader reader = new BufferedReader(new InputStreamReader\n\
  (is, Charset.forName(StandardCharsets.UTF_8.name())))) {\nint c = 0;\nwhile ((c\
  \ = reader.read()) != -1) {\ntextBuilder.append((char) c);\n}\n}\nlog.info(\"Process\
  \ output -> {}\", textBuilder.toString());\nlog.info(\"process result: {}\", exec.exitValue());\n\
  } catch (Exception e) {\ne.printStackTrace();\n}\n}\n}\n```\n\n拦截已启动进程的输出是一件很痛苦的事情。我们需要将一个\
  \ `BufferedReader` 实例包装在连接到进程正常输出的 `InputStream` 实例周围。\n\nProcess API 使事情变得稍微实用一些。它的核心是一些类和接口，它们的名称都以\
  \ `\"Process\"` 开头。我们之前用 Java 可执行文件做的事情，现在可以直接通过编写 Java 代码来完成。提供访问本地进程 API 的接口名为\
  \ `ProcessHandle`，它是核心 Java 包 `java.lang` 的一部分。与 `Thread` 类类似，该接口上有一个名为 `current`\
  \ 的静态方法，用于检索当前运行进程的 `ProcessHandle` 实例。一旦我们有了这个实例，就可以使用它的方法来访问更多进程信息。`ProcessHandle`\
  \ 提供了几个静态实用方法来访问本地进程。可以编写 Java 代码来列出计算机上运行的所有进程，并且可以根据某些条件对它们进行排序。以下代码片段列出了通过运行\
  \ `java` 命令创建的所有进程。\n\n```\npackage com.apress.bgn.ch9;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport java.util.Arrays;\nimport java.util.Optional;\n\
  public class ProcessListingDemo {\nprivate static final Logger log = LoggerFactory.getLogger(ProcessDemo.class);\n\
  public static void main(String... args) {\nOptional currUser = ProcessHandle.current().info().user();\n\
  ProcessHandle.allProcesses()\n.filter(ph -> ph.info().user().equals(currUser)\n\
  && ph.info().commandLine().get().contains(\"java\"))\n.forEach(p ->  log.info(\"\
  PID: \" + p.pid());\np.info() .arguments()\n.ifPresent(s -> Arrays.stream(s)\n.forEach(a\
  \ -> log.info(\"\\t {}\", a)));\np.info().command()\n.ifPresent(c -> log.info(\"\
  \\t Command: {}\", c));\n});\n}\n}\n```\n\n这段代码通过获取当前运行进程的句柄并调用 `info()` 来获取 `ProcessHandle.Info`\
  \ 实例，从而提取当前运行进程的用户。`ProcessHandle.Info` 是一个接口，提供了一组方法来访问关于进程的快照信息，例如用于创建进程的命令和参数。前面代码的输出会打印在控制台中。它应该类似于下面的列表。\n\
  \n\n\n```\nINFO  c.a.b.c.ProcessDemo - PID: 3077\nINFO  c.a.b.c.ProcessDemo -  \
  \  -Dlogback.configurationFile=\nchapter09/processapi/src/main/resources/logback.xml\n\
  INFO  c.a.b.c.ProcessDemo -    -javaagent:/Applications/IntelliJ IDEA 2018.2 EAP\n\
  .app/Contents/lib/idea_rt.jar=57554:\n/Applications/IntelliJ IDEA 2018.2 EAP.app/Contents/bin\n\
  INFO  c.a.b.c.ProcessDemo -    -Dfile.encoding=UTF-8\nINFO  c.a.b.c.ProcessDemo\
  \ -    -p\nINFO  c.a.b.c.ProcessDemo -    /Users/iulianacosmina/apress/workspace/\n\
  java-bgn/chapter09/processapi/out/production/classes ...*.jar\nINFO  c.a.b.c.ProcessDemo\
  \ -    -m\nINFO  c.a.b.c.ProcessDemo -    chapter.nine.processapi/com.apress.bgn.ch9.ProcessDemo\n\
  INFO  c.a.b.c.ProcessDemo -          Command:\n/Library/Java/JavaVirtualMachines/jdk-10.0.1.jdk/Contents/Home/bin/java\n\
  INFO  c.a.b.c.ProcessDemo - PID: 3076\nINFO  c.a.b.c.ProcessDemo -    -Xmx700m\n\
  INFO  c.a.b.c.ProcessDemo -    -Djava.awt.headless=true\nINFO  c.a.b.c.ProcessDemo\
  \ -    -Djdt.compiler.useSingleThread=true\n...\nINFO  c.a.b.c.ProcessDemo -   \
  \ org.jetbrains.jps.cmdline.Launcher\nINFO  c.a.b.c.ProcessDemo -    /Applications/IntelliJ\
  \ IDEA 2018.2 EAP.app/Contents/lib/...*.jar\nINFO  c.a.b.c.ProcessDemo -    org.jetbrains.jps.cmdline.BuildMain\n\
  INFO  c.a.b.c.ProcessDemo -    127.0.0.1\nINFO  c.a.b.c.ProcessDemo -    51833\n\
  INFO  c.a.b.c.ProcessDemo -    47353a1a-570c-4f45-85f9-91abcbb66e9a\nINFO  c.a.b.c.ProcessDemo\
  \ -\n/Users/iulianacosmina/Library/Caches/IntelliJIdea2018.2/compile-server\nINFO\
  \  c.a.b.c.ProcessDemo -          Command:\n/Library/Java/JavaVirtualMachines/jdk-10.0.1.jdk/Contents/Home/bin/java\n\
  ```\n\n在此日志中，仅展示了用于运行`ProcessDemo`类的 IntelliJ IDEA 启动器及其衍生出的进程，但实际输出可能要大得多。此外，部分参数已被缩短，因为用日志浪费书籍页面毫无意义。不过，为了以防你从未亲自运行过代码，还是有必要对日志格式进行一些描述。\n\
  \n前面的代码示例大致展示了如何访问原生进程并打印其相关信息。但是，借助改进后的 Java 进程 API，可以创建新进程，并启动底层操作系统的命令。例如，我们可以创建一个进程来打印`JAVA_HOME`环境变量的值，并捕获输出以显示在\
  \ IntelliJ 控制台中。\n\n```\npackage com.apress.bgn.ch9;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\npublic class ProcessCreationDemo {\nprivate static\
  \ final Logger log =\nLoggerFactory.getLogger(ProcessCreationDemo.class);\npublic\
  \ static void main(String... args) {\ntry {\nProcessBuilder pb = new\nProcessBuilder(\"\
  /bin/sh\", \"-c\", \"echo Java home:  $JAVA_HOME\")\n.inheritIO();\nProcess p =\
  \ pb.start();\np.onExit();\nCompletableFuture future =  p.onExit();\nint result\
  \ = future.get().exitValue();\nlog.info(\"Process result: {}\", result);\n} catch\
  \ (Exception e) {\ne.printStackTrace();\n}\n}\n}\n```\n\n可以通过使用`ProcessBuilder`的实例来创建新进程，这些实例可以接收命令列表及其参数值作为参数。该类拥有许多构造函数和不同签名的方法，可用于轻松创建和启动进程。`inheritIO()`方法将子进程标准\
  \ I/O 的源和目标设置为与当前进程相同。`onExit()`方法返回一个`CompletableFuture<Process>`，可用于在进程执行结束时访问该进程，以检索进程的退出值。对于正常终止的进程，该值应为\
  \ 0（零）。\n\n当 Java 程序创建一个进程时，该进程会成为创建它的进程的子进程。要列出所有子进程，我们需要确保它们持续一段时间，因为一旦终止，它们显然就不复存在了。以下代码示例创建了三个相同的进程，每个进程执行三个\
  \ Linux shell 命令：第一个是`echo \"start\"`，用于通知进程已开始执行；第二个是`sleep 3`，使进程暂停 3 秒；最后一个（`echo\
  \ \"done.\"`）在进程即将结束执行时执行。进程启动后便无法再控制，因此为了确保子进程完成执行，我们将要求用户按下一个键，通过调用`System.in.read();`来决定当前进程何时结束执行。\n\
  \n```\npackage com.apress.bgn.ch9;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
  public class ProcessCreationDemo {\nprivate static final Logger log =\nLoggerFactory.getLogger(ProcessCreationDemo.class);\n\
  public static void main(String... args) {\ntry {\nList builders = List.of(\nnew\
  \ ProcessBuilder(\"/bin/sh\", \"-c\",\n\"echo \\\"start...\\\" ; sleep 3; echo \\\
  \"done.\\\"\").inheritIO(),\nnew ProcessBuilder(\"/bin/sh\", \"-c\",\n\"echo \\\"\
  start...\\\" ; sleep 3; echo \\\"done.\\\"\").inheritIO(),\nnew ProcessBuilder(\"\
  /bin/sh\", \"-c\",\n\"echo \\\"start...\\\" ; sleep 3; echo \\\"done.\\\"\").inheritIO()\n\
  );\nbuilders.parallelStream().forEach(pbs -> {\ntry {\npbs.start();\n} catch (Exception\
  \ e) {\nlog.error(\"Oops, could not start process!\", e);\n}\n});\nProcessHandle\
  \ ph = ProcessHandle.current();\nph.children().forEach(pc -> {\nlog.info(\"Child\
  \ PID: {}\", pc.pid());\npc.parent().ifPresent(parent ->\nlog.info(\" Parent PID:\
  \ {}\", parent.pid()));\n});\nSystem.out.println(\"Press any key to exit!\");\n\
  System.in.read();\n} catch (Exception e) {\ne.printStackTrace();\n}\n}\n}\n```\n\
  \n我们将`ProcessBuilders`分组到一个列表中，并使用并行流处理这些实例，以确保所有进程几乎同时启动。我们在每个进程终止后打印其结果，以确保所有进程都正确执行。\n\
  \n`children()`方法返回一个包含`ProcessHandle`实例的流，这些实例对应于当前 Java 进程启动的进程。\n\n对于每个子`ProcessHandle`实例，都调用了`parent()`方法，以获取对应于创建它的进程的`ProcessHandle`。\n\
  \n运行上述代码时，控制台中应会看到类似于下一个清单所示的输出。\n\n```\nstart...\nstart...\nstart...\n22:29:04.593\
  \ [main] INFO com.apress.bgn.ch9.ProcessCreationDemo - Child PID: 3966\n22:29:04.594\
  \ [main] INFO com.apress.bgn.ch9.ProcessCreationDemo -   Parent PID: 3962\n22:29:04.594\
  \ [main] INFO com.apress.bgn.ch9.ProcessCreationDemo - Child PID: 3965\n22:29:04.594\
  \ [main] INFO com.apress.bgn.ch9.ProcessCreationDemo -   Parent PID: 3962\n22:29:04.594\
  \ [main] INFO com.apress.bgn.ch9.ProcessCreationDemo - Child PID: 3964\n22:29:04.594\
  \ [main] INFO com.apress.bgn.ch9.ProcessCreationDemo -   Parent PID: 3962\nPress\
  \ any key to exit!\ndone.\ndone.\ndone.\n```\n\n改进后的 Java 进程 API 以更实用的方式，对运行中和已衍生的进程提供了更强的控制。过去，需要在更高级别上处理进程的开发者会求助于原生代码。Java\
  \ 9 中新增的 Java 进程 API 改进的完整列表，可在[`https://docs.oracle.com/javase/9/core/process-api1.htm#JSCOR-GUID-6FAB2491-FD4E-42B4-A883-DCD181A1CE3E`](https://docs.oracle.com/javase/9/core/process-api1.htm%2523JSCOR-GUID-6FAB2491-FD4E-42B4-A883-DCD181A1CE3E)找到。\n\
  \n\n\n## 测试\n\n调试是软件流程中称为**测试**的一部分，涉及识别和纠正代码错误。但仅仅避免技术错误是不够的，测试应用程序的意义远不止于此。有一个组织为软件测试人员提供非常优质的培训和认证材料。**国际软件测试资格认证委员会**（ISTQB）是一个国际性的软件测试资格认证组织。它制定了软件测试的教学大纲、资格等级和指南。^(⁷¹)\
  \ 如果你认为自己更倾向于软件测试领域，那么你应该考虑获取 ISTQB 认证。\n\nISTQB 将测试定义为：“由所有生命周期活动（包括静态和动态）组成的过程，涉及对软件及相关工作产品的规划、准备和评估，以确定它们满足规定的要求，证明它们适合其用途，并检测缺陷。”\n\
  \n这是一个技术性和学术性的定义。我提出的定义是：“验证一个实现是否在预期的时间内，以可接受的资源消耗完成了它应该完成的任务，并且在执行过程中没有破坏任何东西的过程。”\n\
  \n### 测试小引\n\n*我想成为一名开发者。为什么我需要了解所有这些关于测试的细节？* 简单的答案是，因为测试是一项持续的活动，在软件应用程序生命周期的每个阶段都会进行。在设计阶段，会进行模拟，并由经验丰富的人员审查设计，以判断它是否代表了问题的合适解决方案以及是否可实现。在编写代码时，必须对其进行测试，以确保应用程序不会崩溃并按预期运行。在交付之前，有一个名为验收测试的阶段，客户代表会在受控环境中测试应用程序，以便记录每个操作并识别问题。测试可以通过调试来完成，使用到目前为止介绍的所有方法，但调试的缺点是它是手动且重复的。因此，让我们介绍一种更自动化的应用程序测试方法。\n\
  \n### ！\n\n测试是开发过程中必不可少的一部分，应尽早开始，因为修复缺陷的工作量会随着其被发现的时间呈指数级增长。^(⁷²)\n\n在开发阶段，除了编写实际的解决方案外，你还可以编写代码来测试你的解决方案。这些测试可以手动运行，也可以在构建项目时由构建工具运行。在编写代码时，除了思考解决问题的方案外，你还应该思考如何测试该方案。这种方法被称为**TDD**，即**测试驱动开发**的缩写，这是一种编程范式，它指出你应该在实现解决方案之前思考如何测试它，因为如果它难以测试，那么它很可能难以实现、长期维护以及扩展以解决相关问题。\n\
  \n最简单的测试称为**单元测试**，它测试功能的小单元。如果单元测试无法轻松编写，你的设计可能存在问题。单元测试是抵御失败的第一道防线。如果单元测试失败，那么你的解决方案的基础就是糟糕的。\n\
  \n跨越多个组件，测试功能单元之间的通信以及它们交互的结果与预期结果是否一致的测试，称为**集成测试**。\n\n开发人员应该编写的最后一种测试是**回归测试**，即定期运行的测试，以确保之前测试过的代码在更改后仍然能正确执行。这类测试对于由大量开发人员编写代码的大型项目至关重要，因为有时组件之间的依赖关系并不明显，一个开发人员编写的代码可能会破坏另一个开发人员的代码。\n\
  \n本节仅向你展示如何使用名为 JUnit 的 Java 库编写单元测试。它描述了一些典型的测试组件，开发人员可以构建这些组件来为单元测试设置上下文。因此，正如我的苏格兰同事所说，*让我们开始吧！*\n\
  \n### 测试代码位置\n\n你可能还记得，在**第** 3 章中，我们解释了 `java-for-absolute-beginners` 项目结构。关于测试的讨论必须从项目最低层级模块的结构开始，这些模块包含源代码和测试。图\
  \ 9-13 显示了本节所用模块的源代码和测试代码的模块结构。\n\n图 9-13 所示的结构可以解释如下。\n\n*   `src` 目录包含项目的所有代码和资源。其内容分为\
  \ `main` 和 `test` 两个目录。\n    *   `main` 目录包含源代码和应用程序配置文件，分为两个子目录。`java` 目录包含 Java\
  \ 源代码，`resources` 目录包含配置文件、非可执行文本文件（可以根据各种格式编写：XML、SQL、CSV 等）、媒体文件、PDF 等。当应用程序被构建并打包成\
  \ jar（或 war 或 ear）时，只有 `java` 目录中的文件会被考虑，`*.class` 文件与配置文件一起被打包。\n\n    *   `test`\
  \ 目录包含用于测试 `src` 目录中源代码的代码。Java 文件保存在 `java` 目录下，`resources` 目录中包含构建测试上下文所需的配置文件。`test`\
  \ 目录的内容不属于交付给客户的项目的一部分。它们的存在是为了在开发过程中帮助测试应用程序。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig13_HTML.jpg](img/463938_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\nGradle 模块结构\n\n\n\n### 测试应用\n\n在本节的示例中，我们将构建一个简单的应用程序，该程序使用嵌入式 Derby^(⁷³)\
  \ 数据库来存储数据。这是生产数据库。在测试环境中，该数据库被替换为各种模拟数据库行为的伪构造。该应用程序是基础性的。一个 `AccountService` 实现从输入中获取数据，并使用这些数据来管理\
  \ `Account` 实例。`Account` 类是一个非常抽象且不切实际的银行账户实现。它包含一个 `holder` 字段（账户所有者）、一个 `accountNumber`\
  \ 字段和一个 `amount` 字段。`AccountService` 实现使用一个 `AccountRepo` 实现，通过 `DBConnection` 的实现来执行所有与\
  \ `Account` 实例相关的数据库操作。构成这个简单应用程序的类、接口以及它们之间的关系如图 9-14 所示。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig14_HTML.jpg](img/463938_1_En_9_Fig14_HTML.jpg)\n\
  \n图 9-14\n\n简单的账户管理应用程序组件\n\n这些类的实现与本节的讨论无关，但如果你好奇，可以在本书的官方仓库中找到完整代码。那么，让我们开始测试吧。最简单的方法是编写一个主类并执行一些账户操作。但我们不希望这样做，因为一旦应用程序投入生产，我们就无法再测试新功能，否则存在数据损坏的风险。此外，生产数据库通常托管在昂贵的产品上，例如\
  \ Oracle RDBMS（Oracle 关系数据库管理系统）或 Microsoft SQL Server。它们并不真正适合开发或测试。而且，我们的目标是自动运行测试，因此内存数据库或可实例化的实现更为合适。那么，让我们从测试\
  \ `AccountRepoImpl` 开始。\n\n#### 介绍 JUnit\n\nJUnit 无疑是 Java 开发世界中使用最广泛的测试框架。2017\
  \ 年底，JUnit 5^(⁷⁴) 发布，这是该框架的下一代版本。它配备了一个新引擎，兼容 Java 9+，并提供了大量基于 lambda 的功能。JUnit\
  \ 提供了用于标记测试方法以自动执行的注解、用于初始化和销毁测试上下文的注解，以及用于实际实现测试方法的实用方法。你可以使用多种 JUnit 注解。其中五个（以及一个实用类）构成了\
  \ JUnit 框架的核心，这也是学习测试的最佳起点。下面是对每个注解的简短描述，它们共同勾勒出如何使用 JUnit 测试应用程序的总体图景。\n\n*   `@BeforeAll`\
  \ 来自 `org.junit.jupiter.api` 包，用于返回 `void` 的 `非私有静态` 方法，用于初始化当前类中所有测试方法将使用的对象和变量。此方法仅被调用一次，在类中所有测试方法之前执行，因此测试方法不应修改这些对象，因为它们的状态是共享的，可能会影响测试结果。最终，由该注解方法初始化的静态字段可以声明为\
  \ `final`，这样一旦初始化，就无法再更改。一个测试类中可以声明多个带有 `@BeforeAll` 注解的方法，但这有什么意义呢？\n\n*   `@AfterAll`\
  \ 来自 `org.junit.jupiter.api` 包，是 `@BeforeAll` 的对应注解。它也用于注解返回 `void` 的 `非私有静态` 方法，但其目的是销毁测试方法运行的上下文并执行清理操作。\n\
  \n*   `@BeforeEach` 来自 `org.junit.jupiter.api` 包，用于返回 `void` 的 `非私有非静态` 方法，顾名思义，带有此注解的方法会在每个带有\
  \ `@Test` 注解的方法之前执行。这些方法可用于进一步定制测试上下文，为对象填充值，以便在测试方法中进行断言测试。\n\n*   `@AfterEach`\
  \ 来自 `org.junit.jupiter.api` 包，用于返回 `void` 的 `公共非静态` 方法，顾名思义，带有此注解的方法会在每个带有 `@Test`\
  \ 注解的方法之后执行。\n\n*   `@Test` 来自 `org.junit.jupiter.api` 包，用于返回 `void` 的 `非私有非静态`\
  \ 方法，顾名思义，带有此注解的方法是一个测试方法。一个测试类可以有一个或多个测试方法，具体取决于被测试的类。\n\n*   实用类 `org.junit.jupiter.api.Assertions`\
  \ 提供了一组支持在测试中断言条件的方法。\n\n你可能还想了解另一个注解 `@DisplayName`。它与所有其他注解声明在同一个包中，并接收一个文本参数，该参数代表测试显示名称，会显示在编辑器中以及构建工具创建的报告中。让我们编写一个伪测试类，以便你了解测试类的外观。\n\
  \n```\npackage com.apress.bgn.ch9.pseudo;\nimport org.junit.jupiter.api.*;\nimport\
  \ org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport static org.junit.jupiter.api.Assertions.assertFalse;\n\
  import static org.junit.jupiter.api.Assertions.assertTrue;\npublic class PseudoTest\
  \ {\nprivate static final Logger log =\nLoggerFactory.getLogger(PseudoTest.class);\n\
  @BeforeAll\npublic static void loadCtx() {\nlog.info(\"加载通用测试上下文。\");\n}\n@BeforeEach\n\
  public  void setUp(){\nlog.info(\"准备单个测试上下文。\");\n}\n@Test\n@DisplayName(\"测试一\"\
  )\npublic void testOne() {\nlog.info(\"执行测试一。\");\nassertTrue(true);\n}\n@Test\n\
  @DisplayName(\"测试二\")\npublic void testTwo() {\nlog.info(\"执行测试二。\");\nassertFalse(false);\n\
  }\n@AfterEach\npublic void tearDown(){\nlog.info(\"销毁单个测试上下文。\");\n}\n@AfterAll\n\
  public static void unloadCtx(){\nlog.info(\"卸载通用测试上下文。\");\n}\n}\n```\n\n\n\n结合目前对这些注解的了解，在运行此类时，我们期望每个方法打印的日志消息严格按照我们定义的顺序出现，因为这些方法已策略性地放置在前面的代码中，从而保证了\
  \ JUnit 的执行顺序。唯一无法保证的是测试的执行顺序。此外，可以通过在 `test\\resources` 目录下添加一个名为 `junit-platform.properties`\
  \ 的文件来实现测试的并行执行，该文件需包含以下属性及其与硬件配置匹配的值。\n\n```\njunit.jupiter.execution.parallel.enabled=true\n\
  junit.jupiter.execution.parallel.config.strategy=fixed\njunit.jupiter.execution.parallel.config.fixed.parallelism=8\n\
  ```\n\n大多数 Java 智能编辑器（如 IntelliJ IDEA）都提供了右键单击类时的相应选项。图 9-15 展示了在 IntelliJ IDEA\
  \ 中执行测试类的菜单选项。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig15_HTML.jpg](img/463938_1_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15\n\n在 IntelliJ IDEA 中执行测试类的菜单选项\n\n右键单击该类后，从出现的菜单中选择 **Run ‘PseudoTest.java’**。测试类即开始执行。此时会创建一个启动器。测试类可以在调试模式下执行，并且可以使用断点。执行上述类时，即使测试方法并行运行，输出结果也与注解规范所对应的方法顺序一致。为了确保测试方法并行执行，日志记录器被配置为打印线程\
  \ ID。以下是示例输出。\n\n```\n[1-worker-9] INFO  c.a.b.c.p.PseudoTest - Loading general\
  \ test context.\n[1-worker-9] INFO  c.a.b.c.p.PseudoTest - Prepare  single test\
  \ context.\n[1-worker-2] INFO  c.a.b.c.p.PseudoTest - Prepare  single test context.\n\
  [1-worker-2] INFO  c.a.b.c.p.PseudoTest - Executing test one.\n[1-worker-9] INFO\
  \  c.a.b.c.p.PseudoTest - Executing test two.\n[1-worker-2] INFO  c.a.b.c.p.PseudoTest\
  \ - Destroy  single test context.\n[1-worker-9] INFO  c.a.b.c.p.PseudoTest - Destroy\
  \  single test context.\n[1-worker-9] INFO  c.a.b.c.p.PseudoTest - UnLoading general\
  \ test context.\n```\n\n`testOne()` 方法包含这一行：`assertTrue(true);`，此处添加它只是为了展示断言方法的样子。在实际测试中，`true`\
  \ 值会被替换为一个条件。`textTwo()` 方法中的 `assertFalse(false);` 断言也是如此。\n\n这就是本书中我们能够专门用于 JUnit\
  \ 的全部篇幅。但我真诚地建议你进一步深入研究它，因为开发者可以编写代码，但优秀的开发者知道如何确保代码正常工作。\n\n##### `使用` Fakes（伪造对象）\n\
  \n**fake** 对象是一个具有工作实现的对象，但与生产环境中的对象不同。编写此类对象所实现的代码，其功能是对生产环境中部署的功能的简化。\n\n为了测试\
  \ `AccountRepoImpl` 类，我们必须用 `FakeDBConnection` 替换 `DerbyDBConnection`，后者不依赖数据库，而是依赖更简单、更易访问的东西，比如\
  \ `Map`。`DerbyDBConnection` 使用 `java.sql.Connection` 及该包中的其他类来对 Derby 数据库执行数据操作。\n\
  \n`FakeDBConnection` 实现了 `DBConnection` 接口，因此它可以被传递给 `AccountRepoImpl`，并且其所有方法都可以在该对象上调用。\n\
  \n编写测试及测试支持类时的经验法则是：将它们放在与被测试或被替换对象相同的包中，但位于 `test/java` 目录下。但由于我们向你展示了不止一种测试方法，因此每个包都相应地命名。使用\
  \ fake 对象测试应用程序类的包名为 `com.apress.bgn.ch9.fake`。\n\n编写测试时的另一个经验法则是：编写一个方法来测试被测试方法的正确结果，再编写一个方法来测试错误行为。在意外情况下，使用意外数据时，你的应用程序会以意外方式运行，因此尽管这看起来有些矛盾，但你必须预料到意外情况并为其编写测试。\n\
  \n`AccountRepoImpl` 类实现了将 `Account` 实例持久化到数据库或从数据库中删除的基本方法。其实现如下所示。\n\n```\npackage\
  \ com.apress.bgn.ch9.repo;\nimport com.apress.bgn.ch9.Account;\nimport com.apress.bgn.ch9.db.DbConnection;\n\
  import java.util.List;\nimport java.util.Optional;\npublic class AccountRepoImpl\
  \ implements AccountRepo {\nprivate DbConnection conn;\npublic AccountRepoImpl(DbConnection\
  \ conn) {\nthis.conn = conn;\n}\n@Override\npublic Account save(Account account)\
  \ {\nAccount dbAcc = conn.findByHolder(account.getHolder());\nif(dbAcc == null)\
  \ {\nreturn conn.insert(account);\n}\nreturn conn.update(account);\n}\n@Override\n\
  public Optional findOne(String holder) {\nAccount acc = conn.findByHolder(holder);\n\
  if(acc != null) {\nreturn Optional.of(acc);\n}\nreturn Optional.empty();\n}\n@Override\n\
  public List findAll() {\nreturn conn.findAll();\n}\n@Override\npublic int deleteByHolder(String\
  \ holder) {\nAccount acc = conn.findByHolder(holder);\nconn.delete(holder);\nif(acc\
  \ != null) {\nreturn 0;\n}\nreturn 1;\n}\n}\n```\n\n为了测试此方法，我们需要提供一个模拟数据库连接的 `DbConnection`\
  \ 实现。这就是 `FakeDBConnection` 发挥作用的地方。\n\n```\npackage com.apress.bgn.ch9.fake.db;\n\
  import com.apress.bgn.ch9.Account;\nimport com.apress.bgn.ch9.db.DBException;\n\
  import com.apress.bgn.ch9.db.DbConnection;\nimport java.util.ArrayList;\nimport\
  \ java.util.HashMap;\nimport java.util.List;\nimport java.util.Map;\npublic class\
  \ FakeDBConnection implements DbConnection {\n/**\n* 伪数据库 {@code Map}\n*/\nMap database\
  \ = new HashMap();\n@Override\npublic void connect() {\n// 无需实现\n}\n@Override\n\
  public Account insert(Account account) {\nif (database.containsKey(account.getHolder()))\
  \ {\nthrow new DBException(\"无法插入 \" + account);\n}\ndatabase.put(account.getHolder(),\
  \ account);\nreturn account;\n}\n@Override\npublic Account findByHolder(String holder)\
  \ {\nreturn database.get(holder);\n}\n@Override\npublic List findAll() {\nList result\
  \ = new ArrayList();\nresult.addAll(database.values());\nreturn result;\n}\n@Override\n\
  public Account update(Account account) {\nif (!database.containsKey(account.getHolder()))\
  \ {\nthrow new DBException(\"找不到账户 \" + account.getHolder());\n}\ndatabase.put(account.getHolder(),\
  \ account);\nreturn account;\n}\n@Override\npublic void delete(String holder) {\n\
  database.remove(holder);\n}\n@Override\npublic void disconnect() {\n// 无需实现\n}\n\
  }\n```\n\n\n\n`FakeDBConnection` 的行为与一个连接对象完全相同，可用于将条目保存到数据库、搜索或删除它们，只不过它并非由真实数据库支持，而是由一个\
  \ `Map<String, Account>` 备份。该映射的键是持有者姓名，因为在我们的数据库中，持有者姓名被用作表中 `Account` 条目的唯一标识符。现在，有了这个伪造对象，我们就可以测试\
  \ `AccountRepoImpl` 是否按预期运行。出于实际原因，本节仅测试一个方法，但完整代码可在本书的官方 GitHub 仓库中找到。\n\n`AccountRepoImpl`\
  \ 中的 `deleteByHolder` 方法用于删除一个账户。如果该条目存在，则将其删除并返回 0；否则返回 1。`deleteByHolder` 方法如下代码片段所示。\n\
  \n```\npackage com.apress.bgn.ch9.repo;\nimport com.apress.bgn.ch9.Account;\nimport\
  \ com.apress.bgn.ch9.db.DbConnection;\nimport java.util.List;\nimport java.util.Optional;\n\
  public class AccountRepoImpl implements AccountRepo {\nprivate DbConnection conn;\n\
  public AccountRepoImpl(DbConnection conn) {\nthis.conn = conn;\n}\n@Override\npublic\
  \ int deleteByHolder(String holder) {\nAccount acc = conn.findByHolder(holder);\n\
  conn.delete(holder);\nif(acc != null) {\nreturn 0;\n}\nreturn 1;\n}\n...\n}\n```\n\
  \n测试类如下所示，涵盖了两种情况（存在要删除的条目和不存在要删除的条目）。\n\n```\npackage com.apress.bgn.ch9.fake;\n\
  import com.apress.bgn.ch9.Account;\nimport com.apress.bgn.ch9.db.DbConnection;\n\
  import com.apress.bgn.ch9.fake.db.FakeDBConnection;\nimport com.apress.bgn.ch9.repo.AccountRepo;\n\
  import com.apress.bgn.ch9.repo.AccountRepoImpl;\nimport org.junit.jupiter.api.*;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport static org.junit.jupiter.api.Assertions.assertEquals;\n\
  import static org.junit.jupiter.api.Assertions.assertTrue;\npublic class AccountRepoTest\
  \ {\nprivate static final Logger log =\nLoggerFactory.getLogger(AccountRepoTest.class);\n\
  private static DbConnection conn;\nprivate AccountRepo repo;\n@BeforeAll\npublic\
  \ static void prepare() {\nconn = new FakeDBConnection();\n}\n@BeforeEach\npublic\
  \ void setUp(){\nrepo = new AccountRepoImpl(conn);\n// 插入一个条目以便测试更新\nrepo.save(new\
  \ Account(\"Pedala\", 200, \"2345\"));\n}\n@Test\npublic void testFindOneExisting\
  \ (){\nOptional expected = repo.findOne(\"Pedala\");\nassertTrue(expected.isPresent());\n\
  }\n@Test\npublic void testFindOneNonExisting(){\nOptional expected = repo.findOne(\"\
  Dorel\");\nassertFalse(expected.isPresent());\n}\n@AfterEach\npublic void tearDown(){\n\
  // 删除该条目\nrepo.deleteByHolder(\"Pedala\");\n}\n@AfterAll\npublic static void cleanUp(){\n\
  conn = null;\nlog.info(\"全部完成！\");\n}\n}\n```\n\n请注意，我们是如何在测试方法执行之前恰好创建一个条目添加到伪造数据库中，并在之后将其删除的。\n\
  \n现在，我们确信仓库类能正常工作，接下来要测试的是 `AccountServiceImpl`。为了测试这个类，我们采用一种不同的方法。伪造对象很有用，但对于功能复杂的类来说，编写一个伪造对象在开发时间上可能成本过高。在下一节中，我们将探讨*桩*。\n\
  \n##### `使用` 桩\n\n**桩**是一个包含预定义数据的对象，它利用这些数据来响应测试调用。`AccountServiceImpl` 的实例使用 `AccountRepo`\
  \ 的实例从数据库检索数据或将数据保存到数据库。考虑到我们正在编写单元测试，我们希望覆盖服务类的功能，因此我们可以编写一个**桩**类来模拟 `AccountRepo`\
  \ 的行为。为了让 `AccountServiceImpl` 实例使用它，该桩必须实现 `AccountRepo`。在本节中，测试涵盖了 `createAccount(...)`\
  \ 方法，因为该方法存在多个失败点，我们可以为其编写大量不同的测试。以下代码片段展示了 `createAccount(...)` 方法。\n\n```\npackage\
  \ com.apress.bgn.ch9.service;\nimport com.apress.bgn.ch9.Account;\nimport com.apress.bgn.ch9.repo.AccountRepo;\n\
  import java.util.Optional;\n/**\n* @author Iuliana Cosmina\n* @since 1.0\n*/\npublic\
  \ class AccountServiceImpl implements AccountService {\nAccountRepo repo;\npublic\
  \ AccountServiceImpl(AccountRepo repo) {\nthis.repo = repo;\n}\n@Override\npublic\
  \ Account createAccount(String holder, String accountNumber,\nString amount) {\n\
  int intAmount;\ntry {\nintAmount = Integer.parseInt(amount);\n} catch (NumberFormatException\
  \ nfe) {\nthrow new InvalidDataException(\n\"无法使用无效金额创建账户！\");\n}\nif (accountNumber\
  \ == null ||\naccountNumber.isEmpty() || accountNumber.length()  existing = repo.findOne(holder);\n\
  if (existing.isPresent()) {\nthrow new AccountCreationException(\n\"持有者 \" + holder\
  \ + \" 的账户已存在\");\n}\nAccount acc = new Account(holder, intAmount, accountNumber);\n\
  return repo.save(acc);\n}\n...\n}\n```\n\n`createAccount(..)` 方法将持有者姓名、要创建的账户编号以及初始金额作为参数。所有这些参数都特意以\
  \ `String` 实例的形式提供，以便方法体包含一些需要认真测试的逻辑。让我们分析一下前面方法的行为，并列出所有可能的返回值以及可能抛出的异常。\n\n*\
  \   如果金额不是数字，则抛出 `InvalidDataException`。\n*   如果 `accountNumber` 参数为空，则抛出 `InvalidDataException`。\n\
  *   如果 `accountNumber` 参数为 null，则抛出 `InvalidDataException`。\n*   如果 `accountNumber`\
  \ 参数少于五个字符，则抛出 `InvalidDataException`。\n*   如果转换为数字的 `amount` 参数为负数，则抛出 `InvalidDataException`。\n\
  *   如果 `holder` 参数对应的账户已存在，则抛出 `AccountCreationException`。\n*   如果所有输入都有效且 `holder`\
  \ 参数没有对应的账户，则创建一个 `Account` 实例，保存到数据库，并返回结果。\n\n因此，如果我们真的对测试有执念，就需要为所有这些情况编写测试场景。在软件领域，有一种叫做*测试覆盖率*的东西，这是一个确定测试用例是否覆盖应用程序代码以及覆盖多少的过程。结果是一个百分比值，公司通常会定义一个测试覆盖率百分比^(⁷⁵)，作为应用程序质量的保证。那么，让我们为了练习而编写所有这些测试方法吧。但在此之前，我们先看看仓库桩是什么样的。\n\
  \n\n\n```\npackage com.apress.bgn.ch9.stub;\nimport com.apress.bgn.ch9.Account;\n\
  import com.apress.bgn.ch9.repo.AccountRepo;\nimport java.util.List;\nimport java.util.Optional;\n\
  public class AccountRepoStub implements AccountRepo {\nprivate  Integer option =\
  \ 0;\npublic synchronized void set(int val) {\noption = val;\n}\n@Override\npublic\
  \ Account save(Account account) {\nreturn account;\n}\n@Override\npublic Optional\
  \ findOne(String holder) {\nif(option == 0) {\nreturn Optional.of(new Account(holder,\
  \ 100 ,\"22446677\"));\n}\nreturn Optional.empty();\n}\n@Override\npublic List findAll()\
  \ {\nreturn List.of(new Account(\"sample\", 100, \"22446677\"));\n}\n@Override\n\
  public int deleteByHolder(String holder) {\nreturn option;\n}\n}\n```\n\n`option`\
  \ 字段可用于改变桩的行为，以覆盖更多测试用例。这在测试方法不并行执行时非常有用。当时间紧迫时，测试会并行执行，如果使用桩，每个方法应实例化并使用自己的桩，以避免与其他方法发生冲突，否则很可能导致测试失败。\n\
  \n使用 JUnit 可以编写两种方式的负面测试，用于处理输入为无效金额的情况。这两种方式的区别仅在于 lambda 表达式的使用方式。\n\n```\npackage\
  \ com.apress.bgn.ch9.service;\nimport com.apress.bgn.ch9.Account;\nimport com.apress.bgn.ch9.service.stub.AccountRepoStub;\n\
  import org.junit.jupiter.api.*;\nimport static org.junit.jupiter.api.Assertions.assertEquals;\n\
  import static org.junit.jupiter.api.Assertions.assertThrows;\npublic class AccountServiceTest\
  \ {\nprivate static AccountRepoStub repo;\nprivate AccountService service;\n@BeforeAll\n\
  public static void prepare() {\nrepo = new AccountRepoStub();\n}\n@BeforeEach\n\
  public void setUp() {\nservice = new AccountServiceImpl(repo);\n}\n@Test\npublic\
  \ void testNonNumericAmountVersionOne() {\nassertThrows(InvalidDataException.class,\n\
  () -> {\nservice.createAccount(\"Gigi\", \"223311\", \"2I00\");\n});\n}\n@Test\n\
  public void testNonNumericAmountVersionTwo() {\nInvalidDataException expected =\
  \ assertThrows(\nInvalidDataException.class, () -> {\nservice.createAccount(\"Gigi\"\
  , \"223311\", \"2I00\");\n}\n);\nassertEquals(\"Could not create account with invalid\
  \ amount!\"\n, expected.getMessage());\n}\n@AfterEach\npublic void tearDown() {\n\
  repo.set(0);\n}\n@AfterAll\npublic static void destroy() {\nrepo = null;\n}\n}\n\
  ```\n\n`testNonNumericAmountVersionOne()` 方法使用了 `assertThrows`，它接收两个参数：第二个参数（类型为\
  \ `Executable`）在执行时预期抛出的异常类型。`Executable` 是定义在 `org.junit.jupiter.api.function`\
  \ 中的一个函数式接口，可以在 lambda 表达式中使用，从而得到你所见的简洁测试。\n\n`testNonNumericAmountVersionTwo()`\
  \ 方法保存了 `assertThrows(..)` 调用的结果，这样可以测试异常的消息，并确保执行流程完全符合预期。\n\n其他测试如下面的代码片段所示。\n\
  \n```\npackage com.apress.bgn.ch9.service;\nimport com.apress.bgn.ch9.Account;\n\
  import com.apress.bgn.ch9.service.stub.AccountRepoStub;\nimport org.junit.jupiter.api.*;\n\
  import static org.junit.jupiter.api.Assertions.assertEquals;\nimport static org.junit.jupiter.api.Assertions.assertThrows;\n\
  public class AccountServiceTest {\nprivate static AccountRepoStub repo;\nprivate\
  \ AccountService service;\n@BeforeAll\npublic static void prepare() {\nrepo = new\
  \ AccountRepoStub();\n}\n@BeforeEach\npublic void setUp() {\nservice = new AccountServiceImpl(repo);\n\
  }\n@Test\npublic void testEmptyAccountNumber() {\nInvalidDataException expected\
  \ = assertThrows(\nInvalidDataException.class, () -> {\nservice.createAccount(\"\
  Gigi\", \"\", \"2100\");\n}\n);\nassertEquals(\"Could not create account with invalid\
  \ account number!\",\nexpected.getMessage());\n}\n@Test\npublic void testNullAccountNumber()\
  \ {\nInvalidDataException expected = assertThrows(\nInvalidDataException.class,\
  \ () -> {\nservice.createAccount(\"Gigi\", null, \"2100\");\n}\n);\nassertEquals(\"\
  Could not create account with invalid account number!\",\nexpected.getMessage());\n\
  }\n@Test\npublic void testInvalidAccountNumber() {\nInvalidDataException expected\
  \ = assertThrows(\nInvalidDataException.class, () -> {\nservice.createAccount(\"\
  Gigi\", \"11\", \"2100\");\n}\n);\nassertEquals(\"Could not create account with\
  \ invalid account number!\",\nexpected.getMessage());\n}\n@Test\npublic void testNegativeIntAmount()\
  \ {\nInvalidDataException expected = assertThrows(\nInvalidDataException.class,\
  \ () -> {\nservice.createAccount(\"Gigi\", \"112233\", \"-2100\");\n}\n);\nassertEquals(\"\
  Could not create account with invalid account number!\",\nexpected.getMessage());\n\
  }\n@Test\npublic void testCreateAccount() {\nrepo.set(1);\nAccount expected = service.createAccount(\"\
  Gigi\", \"112233\", \"2100\");\nassertEquals(\"Gigi\", expected.getHolder());\n\
  assertEquals(\"112233\", expected.getNumber());\nassertEquals(2100, expected.getSum());\n\
  }\n@Test\npublic void testCreateAccountAlreadyExists() {\nAccountCreationException\
  \ expected = assertThrows(\nAccountCreationException.class, () -> {\nservice.createAccount(\"\
  Gigi\", \"112233\", \"2100\");\n}\n);\nassertEquals(\"Account already exists for\
  \ holder Gigi\",\nexpected.getMessage());\n}\n@AfterEach\npublic void tearDown()\
  \ {\nrepo.set(0);\n}\n@AfterAll\npublic static void destroy() {\nrepo = null;\n\
  }\n}\n```\n\n可以编写类似的方法来测试所有其他服务方法。这留作练习供你完成。因为本章还需要介绍另一种测试技术：使用模拟对象。\n\n\n\n#####\
  \ **使用** Mock\n\nMock 是用于记录其所接收调用的对象。在测试执行期间，通过使用断言工具方法，可以验证所有预期操作是否已在 Mock 上执行。幸运的是，开发者无需手动编写\
  \ Mock 代码，有三个广为人知的库提供了使用 Mock 进行测试所需的类类型：Mockito^(⁷⁶)、JMock^(⁷⁷) 和 EasyMock^(⁷⁸)。此外，如果你需要\
  \ Mock 静态方法（最常见的原因是设计不佳），还有 PowerMock^(⁷⁹) 可供使用。\n\n使用 Mock，你可以直接跳转到编写测试。因此，让我们为\
  \ `createAccount(..)` 方法编写两个测试，重点关注仓库类调用其方法的情况，因为仓库类将被 Mock 替代。\n\n```\npackage\
  \ com.apress.bgn.ch9.mock;\nimport com.apress.bgn.ch9.Account;\nimport com.apress.bgn.ch9.repo.AccountRepo;\n\
  import com.apress.bgn.ch9.service.AccountCreationException;\nimport com.apress.bgn.ch9.service.AccountServiceImpl;\n\
  import com.apress.bgn.ch9.service.InvalidDataException;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.api.Test;\nimport org.junit.jupiter.api.extension.ExtendWith;\n\
  import org.mockito.InjectMocks;\nimport org.mockito.Mock;\nimport org.mockito.junit.jupiter.MockitoExtension;\n\
  import java.util.Optional;\nimport static org.junit.jupiter.api.Assertions.*;\n\
  import static org.mockito.ArgumentMatchers.any;\nimport static org.mockito.Mockito.when;\n\
  @ExtendWith(MockitoExtension.class)\npublic class AccountServiceTest {\n@InjectMocks\n\
  private AccountServiceImpl service;\n@Mock\nprivate AccountRepo mockRepo;\n@BeforeEach\n\
  public void checkMocks() {\nassertNotNull(service);\nassertNotNull(mockRepo);\n\
  }\n@Test\npublic void testCreateAccount() {\nAccount expected = new Account(\"Gigi\"\
  , 2100, \"223311\");\nwhen(mockRepo.findOne(\"Gigi\")).thenReturn(Optional.empty());\n\
  when(mockRepo.save(any(Account.class))).thenReturn(expected);\nAccount result =\
  \ service.createAccount(\"Gigi\", \"223311\", \"2100\");\nassertEquals(expected,\
  \ result);\n}\n@Test\npublic void testCreateAccountAlreadyExists() {\nAccount expected\
  \ = new Account(\"Gigi\", 2100, \"223311\");\nwhen(mockRepo.findOne(\"Gigi\")).thenReturn(Optional.of(expected));\n\
  assertThrows(AccountCreationException.class,\n() -> {\nservice.createAccount(\"\
  Gigi\", \"223311\", \"2100\");\n});\n}\n}\n```\n\n这些测试不言自明；Mockito 工具方法的命名使其易于理解测试执行过程中发生的情况。但\
  \ Mock 是如何创建和注入的，则需要解释一下。那么，让我们来讲解！`@ExtendWith(MockitoExtension.class)` 对于 JUnit\
  \ 5 测试支持 Mockito 注解是必需的。没有它，像 `@InjectMocks` 和 `@Mock` 这样的注解对代码将不起作用。\n\n`@Mock`\
  \ 注解用于由 Mockito 创建的 Mock 引用。使用 Mock 的首选方式是指定一个接口类型的引用，该接口由真实对象类型和针对测试场景创建的 Mock\
  \ 共同实现。但 `@Mock` 也可以放在具体类型引用上，此时创建的 Mock 是该类的子类。\n\n`@InjectMocks` 注解用于待测试的对象，以便\
  \ Mockito 知道创建该对象并注入 Mock 以替代依赖项。\n\n因此，这基本上就是你在测试中开始使用 Mockito Mock 所需了解的全部内容。声明要\
  \ Mock 的对象和要注入的对象，是包含使用 Mock 的单元测试的类所需的唯一设置。\n\n使用 Mock 的测试方法主体具有典型的结构。前几行必须声明作为参数传递给被测对象方法或传递给\
  \ Mockito 工具方法（用于声明 Mock 接受什么参数以及返回什么）的对象和变量。接下来的几行建立了当被测对象调用 Mock 方法时 Mock 的行为。以下两行展示了\
  \ `findOne(..)` 方法的这一过程。第一行创建了一个账户对象。第二行定义了 Mock 的行为。当调用 `mockRepo.findOne(\"Gigi\"\
  )` 时，先前创建的账户实例被包装在 `Optional<T>` 实例中返回。\n\n```\nAccount expected = new Account(\"\
  Gigi\", 2100, \"223311\");\nwhen(mockRepo.findOne(\"Gigi\")).thenReturn(Optional.of(expected));\n\
  ```\n\n还有许多其他库可以让开发者轻松编写测试。像 Spring 这样的大型框架提供了自己的测试库，帮助开发者编写应用程序测试。像 Ant、Maven 和\
  \ Gradle 这样的构建工具可以在项目构建时自动运行测试，并生成与失败相关的有用报告。使用 Gradle，可以通过在控制台中调用 `gradle clean\
  \ build` 来构建项目。测试模块中声明的所有测试类，如果命名为 `*Test.java`，都会被自动识别。在编写测试且不更改应用程序代码时，你可以仅通过调用\
  \ `gradle test` 来运行测试。这是一个可以通过重载 Gradle `test` 任务来更改的配置；如果你好奇，可以深入研究一下。\n\nGradle\
  \ 报告采用 HTML 格式，因此可以在浏览器中打开，并且看起来非常棒。这些报告生成为一个包含 `index.html` 静态页面的站点，位于 `java-bgn/chapter09/testing/build/reports/tests/test/index.html`。\n\
  \n我故意让一个测试失败，以便你能看到报告的样子（见图 9-16）。\n\n![../images/463938_1_En_9_Chapter/463938_1_En_9_Fig16_HTML.png](img/463938_1_En_9_Fig16_HTML.png)\n\
  \n图 9-16\n\nGradle 测试报告\n\n总结本节，请记住：无论一个开发团队多么优秀，如果没有一个出色的测试团队，最终的应用可能远未达到可接受的质量标准。因此，如果你遇到没有专门测试团队的公司，或者至少没有一种在代码审查和编写测试等技术上不妥协的公司文化，在接受那份工作之前请三思。\n\
  \n## 文档编写\n\n在软件领域，有一个关于文档的笑话可能并非所有人都喜欢，但它值得一提。\n\n\n\n### ！\n\n文档就像性爱：当它好的时候，真的非常非常好。而当它糟糕的时候，也总比没有强。\n\
  \n编程的一个常识和最佳实践是编写不言自明的代码，这样你就不需要编写文档了。基本上，如果你需要写太多文档，那说明你做错了。有很多方法可以避免编写文档，比如为类和变量使用有意义的名称、遵循语言的代码规范等等。但是，当你构建一组供其他开发者使用的类时，你需要为主要\
  \ API 提供一些文档。当然，如果你的解决方案需要编写非常复杂的算法，你可能需要在各处添加注释；不过在这种情况下，也应该编写包含架构图和示意图的适当技术文档。\n\
  \nJavadoc 块注释与公共类、接口、方法体或公共字段相关联；必要时，有时也会与受保护的元素关联。Javadoc 注释包含特殊的标签，用于链接已文档化的元素，或标记不同类型的信息。Javadoc\
  \ 注释及其关联的代码可以被 Javadoc 工具处理、提取，并封装成一个 HTML 站点，这个站点被称为项目的 Javadoc API。本项目使用的 Gradle\
  \ 构建工具暴露了一个名为 `javadoc` 的任务，可以执行该任务来为某个模块生成 Javadoc API 站点。要整合包含多个模块的项目的文档，需要一个特殊的插件。^(⁸⁰)\
  \ 此外，智能编辑器可以访问这些文档，并在开发者尝试使用已文档化的组件编写代码时显示它们。\n\n让我们从几个 Javadoc 注释的例子开始，解释最常用的标签。\n\
  \n每当我们创建一个类或接口时，都应该添加 Javadoc 注释来解释其用途、添加应用程序的版本号，并链接现有资源。`IntSorter` 是一个实现 `IntSorter`\
  \ 接口的类层次结构，提供了不同排序算法的实现。如果这些类被其他开发者使用，其中某人可能想要向我们的层次结构中添加一个自定义算法，那么关于 `IntSorter`\
  \ 接口的一点信息就会大有帮助。在下面的代码片段中，为 `IntSorter` 接口添加了一个 Javadoc 注释。\n\n```\npackage com.apress.bgn.ch9.algs;\n\
  /**\n* 接口 {@code IntSorter} 是一个需要由提供对 {@code int} 值数组进行排序方法的类来实现的接口。\n*\n* 选择 {@code\
  \ int[]} 作为类型是因为这种类型的值总是可排序的。({@link Comparable})\n*\n* @author Iuliana Cosmina\n\
  * @since 1.0\n*/\npublic interface IntSorter {\n...\n}\n```\n\n在 Javadoc 注释中，可以使用\
  \ HTML 标签来格式化信息。在前面的代码中，使用了 `<p>` 元素来确保注释由多个段落组成。`@author` 标签是在 JDK 1.0 中引入的。当开发团队规模较大时，这个标签很有用，因为如果你最终使用别人的代码，当出现问题时，你知道该找谁。`@since`\
  \ 标签提供了添加此接口的应用程序版本。对于一个经历了长期开发和发布周期的应用程序，这个标签可以用来标记特定版本的元素，这样使用你应用程序代码库的开发者就能知道元素是何时添加的；并且在回滚到旧版本时，知道应用程序中哪些地方会出现编译时错误。\n\
  \n这里最好的例子是 Java 官方 Javadoc；让我们以 `Optional<T>` 接口为例，它是在版本 8 中引入的。但在版本 9、10 和 11 中又为其添加了更多方法，并且每个方法都标记了特定的版本。\n\
  \n```\npackage java.util;\n...\n/**\n...\n* @param <T> 值的类型\n* @since 1.8\n*/\n\
  public final class Optional<T> {\n...\n/**\n...\n* @since 9\n*/\npublic void ifPresentOrElse(Consumer<?\
  \ super T> action, Runnable emptyAction) {\nif (value != null) {\naction.accept(value);\n\
  } else {\nemptyAction.run();\n}\n}\n/**\n...\n* @since 10\n*/\npublic T orElseThrow()\
  \ {\nif (value == null) {\nthrow new NoSuchElementException(\"No value present\"\
  );\n}\nreturn value;\n}\n/**\n* 如果值不存在，则返回 {@code true}，否则返回 {@code false}。\n*\n\
  * @return 如果值不存在则返回 {@code true}，否则返回 {@code false}\n* @since   11\n*/\npublic boolean\
  \ isEmpty() {\nreturn value == null;\n}\n..\n}\n```\n\n在 `IntSorter` 示例中，你看到了在 Java\
  \ 1.5 中引入的 `@code` 标签。它以代码形式显示文本，使用特殊字体并转义可能破坏 HTML 语法的符号（例如 `< 或 >`）。`@link` 标签是在\
  \ Java 1.2 中添加的，用于插入指向相关文档的可导航链接。\n\n现在，让我们为方法声明添加文档，让开发者知道这些方法应该用于什么目的。\n\n```\n\
  package com.apress.bgn.ch9.algs;\n/**\n* 接口 {@code IntSorter} 是一个需要由提供对 {@code int}\
  \ 值数组进行排序方法的类来实现的接口。\n*\n* 选择 {@code int[]} 作为类型是因为这种类型的值总是可排序的。({@link Comparable})\n\
  *\n* @author Iuliana Cosmina\n* @since 1.0\n*/\npublic interface IntSorter {\n/**\n\
  * 对 {@code arr} 进行排序\n*\n* @param arr 要排序的整数数组\n* @param low 要排序区间的下限\n* @param\
  \ high 要排序区间的上限\n*/\nvoid sort(int[] arr, int low, int high);\n/**\n* 此方法用于使用冒泡排序对数组进行排序\n\
  * @deprecated 自版本 0.1 起已弃用，因为应改用 {@link #sort(int[], int, int) ()} 方法。\n* 将在版本 1.1\
  \ 中移除\n* @param arr 要排序的整数数组\n*/\n@Deprecated (since= \"0.1\", forRemoval = true)\n\
  default void sort(int[] arr) {\nSystem.out.println(\"不要使用这个！此方法已弃用！！\");\n}\n}\n\
  ```\n\nIntelliJ IDEA 编辑器（以及其他智能编辑器）会为你生成小段的 Javadoc。一旦你声明了想要文档化的类或方法体，输入 **/****，然后按\
  \ Enter 键。生成的注释块包含以下内容。\n\n*   一个或多个带有参数名称的 `@param` 标签，开发者需要做的只是添加额外的文档来解释它们的用途。\n\
  \n*   如果方法返回的值类型不是 `void`，则会添加 `@return`，开发者必须提供文档来解释结果代表什么，以及在哪些特殊情况下会返回某个特定值。既然我们开始使用\
  \ `Optional<T>` 作为研究案例，下面是 `isPresent(..)` 方法的 Javadoc。\n\n*   如果方法声明要抛出异常，则会生成一个\
  \ `@throws` 标签以及异常类型，开发者的工作是解释何时以及为何会抛出该类型的异常。\n\n```\n/**\n...\n* @param predicate\
  \ 要应用于值的谓词（如果值存在）\n* @return 一个 {@code Optional}，描述此 {@code Optional} 的值（如果值存在且与给定谓词匹配），否则返回一个空的\
  \ {@code Optional}\n* @throws NullPointerException 如果谓词为 {@code null}\n*/\npublic\
  \ Optional<T> filter(Predicate<? super T> predicate) {\nObjects.requireNonNull(predicate);\n\
  if (!isPresent()) {\nreturn this;\n} else {\nreturn predicate.test(value) ? this\
  \ : empty();\n}\n}\n```\n\n```\n/**\n...\n* @param action 要执行的操作（如果值存在）\n* @throws\
  \ NullPointerException 如果值存在且给定的操作为 {@code null}\n*/\npublic void ifPresent(Consumer<?\
  \ super T> action) {\nif (value != null) {\naction.accept(value);\n}\n}\n```\n\n\
  `@link` 创建一个指向类页面、方法文档部分或字段的文档链接。在前面的 `sort` 方法声明示例中，我们创建了一个指向接口中另一个方法的链接。\n\n\n\
  \n`@deprecated` 标签用于添加文本，说明弃用的原因、版本以及应使用的替代项。Javadoc 生成工具会获取此文本，以斜体格式呈现，并将其添加到方法的主要描述中。\n\
  \n至此，我们已经涵盖了编写 Javadoc 注释时最常用的标签。如果你想查看完整列表，可以在 [`https://docs.oracle.com/javase/7/docs/technotes/tools/windows/javadoc.html#javadoctags`](https://docs.oracle.com/javase/7/docs/technotes/tools/windows/javadoc.html%2523javadoctags)\
  \ 找到。Javadoc 文档是一个广泛的主题，足以写成一整本书。本节只是浅尝辄止，涵盖了基础知识，以便你有一个良好的开端。\n\n要为 `logging-jul`\
