  出于实用考虑，Java 提供了复合运算符 `^=`，这样按位异或 `OR` 操作可以在结果赋值的同一个变量上完成。


  ```

  [jshell> byte b1 = 10

  b1 ==> 10

  |  created variable b1 : byte

