  .replace(''  '', ''0'');

  System.out.println("result: " + result);

  System.out.println("binary result: " + str);

  }

  }

  ```


  我们使用相同的 `String.format(..)` 方法来显示对 `b1` 和 `b2` 运算符应用 `^` 后结果的位表示。上述代码输出如下内容。


  ```

  b1:117

  b2:95


  result:  42

  binary result: 00101010

