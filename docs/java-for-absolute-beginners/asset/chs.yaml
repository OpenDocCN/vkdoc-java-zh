  \ Javadoc 文档，并在开发者在代码中使用已文档化的组件时即时显示。当选择一个类、方法名、接口方法等时，大多数智能编辑器都提供某种包含 F1 的组合键，开发者必须按下该键，文档才会在弹出窗口中显示。在\
