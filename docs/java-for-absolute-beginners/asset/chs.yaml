  ## switch 语句


  当某个值需要针对一组固定值执行不同操作时，随着这组值的数量增加，`if` 语句可能会变得愈发复杂。在这种情况下，更合适的语句是 `switch` 语句。我们先看代码，再探讨可以改进的地方。


  ```

  package com.apress.bgn.ch7;

  public class SeasonSwitchDemo {

  public static void main(String... args) {

  //读取 a

  int a = Integer.parseInt(args[0]);

  var season = "";

  switch (a) {

  case 1:

  season = "冬季";

  break;

  case 2:

  season = "冬季";

  break;

  case 3:

  season = "春季";

  break;

  case 4:

  season = "春季";

  break;

  case 5:

  season = "春季";

  break;

  case 6:

  season = "夏季";

  break;

  case 7:

  season = "夏季";

  break;

  case 8:

  season = "夏季";

  break;

  case 9:

  season = "秋季";

  break;

  case 10:

  season = "秋季";

  break;

  case 11:

  season = "秋季";

  break;

  case 12:

  season = "冬季";

  break;

  default:

  System.out.println("错误");

  }

  System.out.println(season);

  }

  }

  ```


  嗯……这看起来不太实用，至少对于这个场景来说是这样。在展示 `switch` 语句的不同写法之前，我们先解释一下它的结构和逻辑。`switch` 语句的通用模板如下：


  ```

  switch ([onvar]) {

  case [option]:

  [statement;]

  break;

  ...

  default:

  [statement;]

  }

  ```


  方括号中的术语在以下列表中详细说明。


  *   `[onvar]` 是与 `case` 语句进行匹配以选择执行语句的变量。它可以是任何基本类型、枚举类型，以及从 Java 7 开始支持的 `String`
  类型。显然，`switch` 语句不受限于结果为 `boolean` 的条件，这提供了很大的灵活性。


  *   `case [option]` 是一个值，用于与变量进行匹配，以决定要执行的语句。正如关键字所示，它是一个 `case`。


  *   `[statement]` 是当 `[onvar] == [option]` 时要执行的一条语句或一组语句。考虑到没有 `else` 分支，我们必须确保只执行与第一个匹配项对应的语句，这就是
  `break;` 语句的作用。`break` 语句会停止当前执行路径，并将执行点移动到包含它的语句之外的下一条语句。我将在本章后面介绍它。如果没有 `break`，在第一次匹配之后，会遍历所有后续的
  `case`，并执行它们对应的语句。


  因此，如果我们执行上述程序并提供数字 7 作为参数，将会输出文本 *夏季*。但如果注释掉 case 7 和 case 8 的 `break` 语句，输出将变为
  *秋季*。


  *   `default [statement;]` 是当没有找到匹配的 `case` 时执行的语句，`default` 分支不需要 `break` 语句。如果使用
  `[1-12]` 区间之外的任何数字运行上述程序，将会输出 `Error`，因为会执行默认语句。


  现在你已经了解了 `switch` 的工作原理，让我们看看如何简化之前的语句。月份示例很适合这里，因为它可以进一步修改，以展示当多个 case 需要执行同一条语句时，如何简化
  `switch` 语句。在我们的代码中，每个赋值语句都写了三次，这有点冗余。`switch` 可以通过分组 case 来避免这种情况。代码如下所示。


  ```

  package com.apress.bgn.ch7;

  public class SeasonSwitchDemo {

  public static void main(String... args) {

  //读取 a

  int a = Integer.parseInt(args0);

  var season = "";

  switch (a) {

  case 1:

  case 2:

  case 12:

  season = "冬季";

  break;

  case 3:

  case 4:

  case 5:

  season = "春季";

  break;

  case 6:

  case 7:

  case 8:

  season = "夏季";

  break;

  case 9:

  case 10:

  case 11:

  season = "秋季";

  break;

  default:

  System.out.println("错误");

  }

  System.out.println(season);

  }

  }

  ```


  这种情况下的分组代表将需要执行相同语句的 case 对齐，并且只在最后一个 case 中编写该语句一次。这看起来仍然有点奇怪，但这是减少语句重复的唯一方法。之前案例中的行为之所以可能，是因为每个没有
  `break` 语句的 case 后面都会跟着下一个 case 语句。


  在 Java 7 中，`switch` 语句开始支持 `String` 值。`switch` 支持 `String` 值的主要问题是始终存在抛出 `NullPointerException`
  的风险，因为使用 `equals` 方法来测试项的匹配，而 `switch` 语句中使用的变量可能为 null。此外，由于使用了 `equals`，比较是区分大小写的。如果我们修改前面的示例，要求用户输入代表月份的文本，并使用
  `switch` 来决定输出哪个季节，除非我们在 case 选项中使用与用户编写参数时完全相同的文本，否则将无法获得预期结果。


  代码修改为：


  ```

  package com.apress.bgn.ch7;

  public class StringSwitchSeasonDemo {

  public static void main(String... args) {

  //读取 a

  String a = args0;

  var season = "";

  switch (a) {

  case "january":

  case "february":

  case "december":

  season = "冬季";

  break;

  case "march":

  case "april":

  case "may":

  season = "春季";

  break;

  case "june":

  case "july":

  case "august":

  season = "夏季";

  break;

  case "september":

  case "october":

  case "november":

  season = "秋季";

  break;

  default:

  System.out.println("错误");

  }

  System.out.println(season);

  }

  }

  ```


  如果我们使用 `"january"` 参数运行上述程序，控制台将输出文本 `"冬季"`。如果我们使用 `"january"` 参数运行它，控制台将输出文本 `"错误"`。而如果我们使用
  `null` 运行它，则会在 `switch` 语句开始的行抛出 `NullPointerException`。


  关于 `switch` 语句，这就是所有需要说明的内容。在实践中，根据你尝试开发的解决方案，你可能会决定结合使用 `if` 和 `switch` 语句。


  不幸的是，由于其独特的逻辑和灵活的可选数量，很难为 `switch` 语句绘制流程图，但我还是尝试了一下，如图 7-6 所示。


