  \n\n\n## 解释并丰富 Hello World! 类\n\n我们在沙盒项目中编写了一个名为 `HelloWorld` 的类。我建议你将该类添加到 chapter03\
  \ 模块中。只需将其复制或创建在 `com.apress.bgn.ch3.helloworld` 包下，然后我们先分析它，再看看还能用它做些什么。在图 3-25\
  \ 中，该类显示在 IntelliJ IDEA 编辑器中，并且 IDE 的一些细节被加了下划线。我们先来谈谈这个类。\n\n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig25_HTML.jpg](img/463938_1_En_3_Fig25_HTML.jpg)\n\
  \n图 3-25\n\n将 HelloWorld 添加到 java-for-absolute-beginners 项目\n\n下面解释包含不同语句的行。\n\n\
  *   **包声明：** 当类属于某个包时，其代码必须以声明该类所属包的行开头。`package` 是 Java 中的保留关键字，除了声明包之外不能用于其他任何用途。\n\
  \n*   <为方便起见留空>（留空以使图片看起来更美观）\n\n*   **类声明：** 这是我们声明类的行；它是 `public` 的，因此可以从任何地方访问；它是一个名为\
  \ `HelloWorld` 的 `class`。类的主体用花括号括起来，左花括号也在这一行。\n\n*   **main() 方法声明：** 在 Java 中，方法签名由方法名称以及其参数的数量、类型和顺序组成。方法还有一个返回类型，即它返回的结果的类型。但还有一种特殊类型可以声明不返回任何内容的方法。按出现顺序，以下内容解释了\
  \ `main()` 方法中每个术语的含义。\n    *   **public：** 方法访问修饰符；main 方法必须是 `public` 的；否则，JRE\
  \ 无法访问并调用它。\n\n    *   **static：** 当创建该类的对象时，该对象拥有类声明的字段和方法。类是创建对象的模板。由于 `static`\
  \ 关键字，main 方法不与类的对象关联，而是与类本身关联。更多信息请参见**第 4 章**。\n\n    *   **void：** 此关键字在此处用于告知我们\
  \ main 方法不返回任何内容，因此它类似于“无类型”的替代品，因为如果不返回任何内容，则不需要类型。\n\n    *   **String[] args：**\
  \ 方法有时被声明为接收一些输入数据，`String[] args` 表示一个文本值数组。（数组是固定长度的数据集；在数学中，它们被称为**一维矩阵**或**向量**。）`String`\
  \ 是 Java 中表示文本对象的类。`[]` 表示数组，`args` 是其名称。但是等等，我们之前运行过这个方法，并没有提供任何参数！嗯，这不是强制性的，但在此列表之后，你将看到如何为其提供参数（提供给方法的值，由方法体中的代码使用）。\n\
  \n### **！**\n\n在前面的代码示例中，你可能已经注意到 main 方法是这样写的：\n\n`public class HelloWorld {`\n\
  \n`public static void main(String... args) {`\n\n`System.out.println(\"Hello World!\"\
  );`\n\n`}`\n\n`}`\n\n这三个点被称为 `varargs`，允许你向方法传递多个字符串。这是编写此方法的另一种方式，当源代码需要涉及 `[]`\
  \ 的特殊格式时，本书会使用这种方式。\n\n*   **{**：`main()` 方法体的起始花括号。\n\n*   <为方便起见留空>（留空以使图片看起来更美观）。\n\
  \n*   **System.out.println(\"Hello World!\");**：用于在控制台输出 *Hello World* 的语句。\n\n\
  *   **}**：`main()` 方法体的结束花括号。\n\n*   **}**：类体的结束花括号。\n\n如果我们执行这个类，*Hello World!*\
  \ 将被打印到控制台。图 3-17 展示了如何执行一个包含 `main()` 方法的类。通过这种方式执行类后，IntelliJ IDEA 会自动将该执行的配置保存在运行配置中，并显示在一个下拉列表中，该列表旁边有一个绿色的三角形按钮，点击即可执行该类。这两个元素都位于\
  \ IDE 的标题栏上，并在图 3-25 中醒目地指向你。这两个元素非常重要，因为可以编辑运行配置并为 JVM 和 `main()` 方法添加参数。让我们先修改\
  \ `main()` 方法，使其对参数进行一些处理。\n\n```\npackage com.apress.bgn.ch3.helloworld;\npublic\
  \ class HelloWorld {\npublic  static  void  main(String[]  args)  {\nSystem.out.println(\"\
  Hello  \" +  args[0]  +  \"!\");\n}\n}\n```\n\n\n\n### ！\n\n数组通过元素的索引进行访问，在 Java\
  \ 中计数从 0 开始。因此，数组的第一个成员位于索引 0，第二个位于索引 1，以此类推。但数组可能为空，所以在之前的代码片段中，如果未指定任何参数，程序执行会崩溃，并在控制台中以红色打印一条明确的消息。\n\
  \n`Exception in thread \"main\" java.lang.ArrayIndexOutOfBoundsException: 0`\n\n\
  `at chapter.three/com.apress.bgn.ch3.helloworld.HelloWorld.main(HelloWorld.java:5)`\n\
  \n当我们尝试访问一个空数组，或数组中不存在的元素时，Java 程序会崩溃，JVM 会抛出一个类型为 `ArrayIndexOutOfBoundsException`\
  \ 的对象，其中包含发生故障的行号以及我们试图访问的元素的索引。JVM 使用异常对象来通知开发者 Java 执行未按预期进行时的异常情况，这些对象包含代码中发生问题的位置以及导致问题的原因。\n\
  \n我们在之前代码片段中所做的修改，会在执行类时打印作为参数提供的文本值。让我们修改此类的运行配置并添加一个参数。如果单击运行配置名称旁边的小灰色箭头，会弹出一个菜单。点击\
  \ **Edit Configurations...** 并检查图 3-26 中显示的对话框窗口。\n\n![../images/463938_1_En_3_Chapter/463938_1_En_3_Fig26_HTML.jpg](img/463938_1_En_3_Fig26_HTML.jpg)\n\
  \n图 3-26\n\n自定义运行配置\n\n在图中，关键元素已被圈出（实际上是用矩形框起来的，但你明白意思！）。如图 3-26 的运行配置列表所示，IntelliJ\
  \ IDEA 保存了你之前的一些执行记录，包括你在本章前面执行的 Gradle `build` 任务。在 **Run/Debug Configurations**\
  \ 对话框窗口的左侧，你可以看到按类型分组的 IntelliJ IDEA 运行配置。默认情况下，最后一个运行配置会在窗口右侧打开，在本例中应该是 `HelloWorld`\
  \ 类的运行配置。你可以为一次执行配置很多选项，其中大部分已由 IDE 自动决定。**Program arguments:** 文本字段是用于输入 `main()`\
  \ 方法参数的地方。在图 3-26 中，我输入了 `Developer`。因此，如果你点击 **Apply** 按钮，然后点击 **OK** 按钮，再执行该类，控制台中应该会看到\
  \ *Hello Developer!* 而不是 *Hello World!*。\n\n那么，我们还能用这个类做什么呢？还记得本书开头的那段代码吗？让我们把它放到\
  \ `main()` 方法中。\n\n```\npackage com.apress.bgn.ch3.helloworld;\nimport   java.util.List;\n\
  public class HelloWorld {\npublic static void main(String... args) {\nList items\
  \ = List.of(\"1\", \"a\", \"2\", \"a\", \"3\", \"a\");\nitems.forEach(item -> {\n\
  if (item.equals(\"a\")) {\nSystem.out.println(\"A\");\n} else {\nSystem.out.println(\"\
  Not A\");\n}\n});\n}\n}\n```\n\n`import java.util.List;` 语句是唯一可以存在于包声明和类声明之间的语句类型。这条语句告诉\
  \ Java 编译器，程序中使用了对象类型 `java.util.List`。`import` 关键字后面跟着数据类型的完全限定名。数据类型的完全限定名由包名（`java.util`）、一个点（.）和类的简单名称（`List`）组成。没有它，类将无法编译。你可以试试：只需在该语句前面加上\
  \ `//`，这会将这一行变成注释，被编译器忽略。你会看到编辑器报错，任何与该列表相关的代码都会变成亮红色。\n\n语句 `List<String> items\
  \ = List.of(\"1\", \"a\", \"2\", \"a\", \"3\", \"a\");` 创建了一个文本值列表^(⁵⁰,⁵¹)，然后由 `forEach`\
  \ 方法逐个遍历，并测试每个值是否等于字符 `\"a\"`。^(⁵²)\n\n如果你现在运行这个类，应该在控制台中看到一系列 `A` 和 `Not A`，每个占一行。\n\
  \n```\nNot  A\nA\nNot  A\nA\nNot  A\nA\n```\n\n到目前为止，我们编写的代码使用了少数几种对象类型在控制台中打印一条简单的消息。`List`\
  \ 对象用于保存几个 `String` 对象。消息通过 `println()` 方法打印，该方法在 `out` 对象上调用，而 `out` 是 `System`\
  \ 类中的一个静态字段。而这些只是你在代码中可见的对象。在底层，`List` 对象由一个 `Consumer` 对象处理，该对象是在 lambda 表达式为了简化而隐藏的地方即时创建的。\n\
  \n```\npackage com.apress.bgn.ch3.helloworld;\nimport java.util.List;\n[import \
  \ java.util.function.Consumer;]\npublic class HelloWorld {\npublic static void main(String...\
  \ args) {\nList items = List.of(\"1\", \"a\", \"2\", \"a\", \"3\", \"a\");\nitems.forEach(new\
  \ Consumer() {\n@Override\npublic void accept(String item) {\nif (item.equals(\"\
  a\")) {\nSystem.out.println(\"A\");\n} else {\nSystem.out.println(\"Not A\");\n\
  }\n}\n});\n}\n}\n```\n\n现在看起来可能有点吓人，但我保证本书会在清晰的上下文中介绍每个概念，并与现实生活中的对象和事件进行对比，以便你轻松理解。如果这还不够，还有更多的书籍、博客以及每个\
  \ JDK 的官方 Oracle 网页，它们都有很好的教程。有志者，事竟成。\n\n### **！**\n\n另外，请使用你的 IDE！在按住 Control/Command\
  \ 键的同时点击代码中的任何对象类型，对象类的代码就会打开，你可以看到该类是如何编写的，并直接在编辑器中阅读其文档。作为练习，请对 `forEach` 方法和\
  \ `System` 类执行此操作。\n\n\n\n## 总结\n\n在本章中，你完成了以下任务：\n\n*   学习了如何使用 JShell\n*   了解了\
  \ Java 包，并实际创建了一个\n*   学习了 Java 访问修饰符\n*   了解了模块\n*   使用 IntelliJ IDEA 创建了第一个 Java\
  \ 项目\n*   在 IntelliJ IDEA 中编写了第一个程序的代码\n*   ……随后我们也手动编译了它\n*   运行了第一个程序（Hello World!）\n\
  *   为其添加了包\n*   为其配置了模块\n*   ……并手动编译和执行了它\n*   了解了 Gradle 以及它如何让开发者的生活更轻松\n\n本章中你完成的许多任务，在成为\
  \ Java 开发者后，很可能每天都会做——除了花在现有代码中查找和修复 Bug 的时间。你可能还会花大量时间阅读文档，因为 JDK 提供了大量类、字段和方法供你编写应用程序。而且随着每个版本的发布，情况会发生变化，你必须让自己保持更新。大脑容量有限，所以任何雇主都不应期望你记住每一个\
  \ JDK 类和方法；但请聪明地工作，并在浏览器中保持打开网页^(⁵³) [`https://docs.oracle.com/javase/10/docs/api/`](https://docs.oracle.com/javase/10/docs/api/)。当你对某个\
