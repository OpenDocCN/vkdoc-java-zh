  ## if-else 语句


  Java 中最简单的判断流程语句是 `if-else` 语句（可能在其他语言中也是如此）。在前几章的代码示例中，你可能已经见过 `if-else` 语句。这是无法避免的，因为提供可运行的代码来鼓励你动手编写自己的代码非常重要。但在本节中，我们将严格聚焦于这类语句。


  让我们设想这样一个场景：我们运行一个 Java 程序，用户提供一个数值参数。如果该数字是偶数，我们在控制台打印 `EVEN`；否则，打印 `ODD`。与此场景匹配的流程图如图
  7-2 所示。


  ![../images/463938_1_En_7_Chapter/463938_1_En_7_Fig2_HTML.jpg](img/463938_1_En_7_Fig2_HTML.jpg)


  图 7-2


  if-else 流程图示例


  条件被求值为一个 `boolean` 值，如果结果为 `true`，则执行 `if` 分支对应的语句；如果结果为 `false`，则执行 `else` 分支对应的语句。


  实现此流程图所描述过程的 Java 代码如下所示。


  ```

  package com.apress.bgn.ch7;

  public class IfFlowDemo {

  public static void main(String... args) {

  //读取 a

  int a = Integer.parseInt(args0);

  if (a % 2 == 0) { // 是否为偶数

  //显示 EVEN

  System.out.println("EVEN");

  } else {

  //显示 ODD

  System.out.println("ODD");

  }

  }

  }

  ```


  要使用不同的参数运行此类，你必须创建一个 IntelliJ IDEA 启动器，并在**程序参数**文本字段中添加你的参数，正如本书开头所解释的那样。上面代码片段中的每条
  Java 语句都配有一个与流程图元素对应的注释，以使实现更加清晰。有趣的是，`if` 语句的两个分支并非都是必需的。有时，如果某个值满足条件，你想打印一些内容，但你对其他情况不感兴趣。例如，给定一个用户提供的参数，如果数字为负数，我们想打印一条消息，但如果数字为正数，我们则不想打印或执行任何其他操作。对应的流程图如图
  7-3 所示。


