  performer[\" + i + \"]= \" + array[i] );\n}\narray[0] = new Performer(\"John\",\
  \ 40, 1.91f, Gender.MALE);\narray[1] = new Performer(\"Julianna\", 35, 1.61f, Gender.FEMALE);\n\
  for (int i = 0; i < array.length; ++i) {\nSystem.out.println(\"performer[\" + i\
  \ + \"]= \" + array[i].getName() );\n}\n}\n}\n```\n\n并且，由于描绘内存内容能更清晰地展示数组和对象发生了什么，我为你提供了图\
  \ 5-14。\n\n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig14_HTML.jpg](img/463938_1_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14\n\n声明一个大小为 2 的 Performer 数组\n\n所以，是的，我们有一个引用数组，它们所指向的对象可以在程序运行期间更改。\n\n\
  数组可以是多维的。如果你学过高等数学，可能还记得*矩阵*的概念，它是一个按行和列排列的矩形数组。在 Java 中，你可以使用数组来模拟矩阵。如果你想要一个简单的包含行和列的矩阵，你可以定义一个二维数组。\n\
  \n```\npackage com.apress.bgn.ch5;\npublic class MatricesDemo {\npublic static void\
  \ main(String... args) {\n// 二维数组：2 行，2 列\nint[][] intMatrix = {{1, 0}, {0, 1}};\n\
  int[][] intMatrix2 = new int[2][2];\nfor (int i = 0; i < intMatrix2.length; ++i)\
  \ {\nfor (int j = 0; j < intMatrix2[i].length; ++j) {\nintMatrix2[i][j] = i + j;\n\
  System.out.print(intMatrix[i][j] + \" \");\n}\nSystem.out.println();\n}\n}\n}\n\
  ```\n\n但你也可以创建多维数组，并根据需要定义任意数量的坐标。下面的代码片段定义了三个坐标。\n\n```\npackage com.apress.bgn.ch5;\n\
  public class MatricesDemo {\npublic static void main(String... args) {\n// 立方体矩阵，有三个坐标\n\
  int[][][] intMatrix3 = new int[2][2][2];\nfor (int i = 0; i < intMatrix3.length;\
  \ ++i) {\nfor (int j = 0; j < intMatrix3[i].length; ++j) {\nfor (int k = 0; k <\
  \ intMatrix3[i][j].length; ++k) {\nintMatrix3[i][j][k] = i + j + k;\nSystem.out.print(\"\
  [\"+i+\", \"+j+\", \" + k + \"]\");\n}\nSystem.out.println();\n}\nSystem.out.println();\n\
  }\n}\n}\n```\n\n对于数组，请根据你的需要和内存允许的范围来创建，但务必确保初始化它们，并在代码中确保不会尝试访问允许范围之外的索引。如果数组的大小是\
  \ **N**，那么它的最后一个索引是 **N-1**，第一个索引是 **0**。尝试访问该范围之外的任何索引，都会在运行时抛出 `java.lang.ArrayIndexOutOfBoundsException`\
  \ 类型的异常。因此，编写如下代码：\n\n```\nint array = new int[2];\narray[5] =7;\n```\n\n会导致程序在运行时崩溃，并在控制台打印以下内容：\n\
  \n```\nException in thread \"main\" java.lang.ArrayIndexOutOfBoundsException:\n\
  Index 5 out of bounds for length 2\nat chapter.five.collections/com.apress.bgn.ch5.ArraysDemo.main(ArraysDemo.java:56)\n\
  ```\n\n为了更方便地处理 Java 中的数组，有一个专门的类：`java.util.Arrays`。这个类提供了用于排序和比较数组、搜索元素以及将其内容转换为文本或流的实用方法，这样无需编写繁琐的\
  \ `for` 循环就能打印它们。\n\n\n\n```\nint array = new int2;\nSystem.out.println(Arrays.toString(ad.array));\n\
  //或\nArrays.stream(array).forEach(ai -> System.out.println(ai));\n//或使用方法引用 Arrays.stream(array).forEach(System.out::println);\n\
  //排序\nArrays.sort(another);\n```\n\n请随意修改本章提供的代码，尝试其中一些方法。\n\n### String 类型\n\n\
  接下来要介绍的特殊 Java 类型是 `String`。到目前为止，你已经频繁看到它的使用，但尚未得到详细解释。与基本类型 `int` 一样，它是 Java 中最常用的类型之一。`String`\
  \ 实例用于建模文本并对其执行各种操作。`String` 类型是一种特殊类型，因为**该类型的对象会得到 JVM 的特殊处理**。如果你还记得第一张包含内存内容的图片，`String`\
  \ 对象被分配在堆中一个名为 `String Pool` 的特殊区域。本节将专门讨论它；我们会详细讲解 `String` 类型，你关于此类型的许多疑问应该都能得到解答。\n\
  \n到目前为止，本书中声明 `String` 变量的方式如下：\n\n```\nString name= \"John\";\n```\n\n但 `String`\
  \ 类有许多构造函数可用于初始化 `String` 变量。以下是一组声明并初始化的 `String` 变量。\n\n```\npackage com.apress.bgn.ch5.refs;\n\
  public class StringDemo {\npublic static void main(String... args) {\n1\\.     \
  \ String  text1 = null;\n2.\n3\\.      String text21 = \"two\";\n4\\.      String\
  \ text22 = \"two\";\n5\\.      String text23 = new String (\"two\");\n6.\n7\\. \
  \     String piece1 = \"t\";\n8\\.      String piece2  = \"wo\";\n9\\.      String\
  \ text24 = piece1 + piece2;\n10.\n11\\.     char[] twoCh = {'t', 'w', 'o'};\n12\\\
  .     String text25 = new String(twoCh);\n}\n}\n```\n\n第 3、4、5、9 和 11 行都定义了一个内容为\
  \ *two* 的 `String` 对象。我们特意这样做，创建了多个具有相同值的 `String` 对象。在实际应用中，尤其是在当前大数据热潮时期，应用程序处理大量数据，其中大部分是文本形式。因此，能够压缩数据并重复使用，可以减少内存消耗，同时减少内存访问尝试，通过减少处理来提升速度，进而降低成本。\n\
  \n在继续本节之前，我必须讨论一下 Java 中**对象相等**的含义。Java 中通过引用来处理对象。`==` 运算符比较引用；但如果要比较对象，我们必须使用\
  \ `equals()` 方法。这是一个从 `Object` 类继承的特殊方法。\n\n在 Java 中，`String` 实例是不可变的，这意味着它们一旦创建就无法更改。这意味着\
  \ JVM 可以重用现有值来形成新的字符串值，而无需消耗额外内存。这个过程称为*驻留（interning）*。每个文本值（字面量）的一份副本被保存到一个名为 `String\
  \ Pool` 的特殊内存区域。当创建一个新的 `String` 变量并为其赋值时，JVM 首先在池中搜索相等值的字符串。如果找到，则返回该内存地址的引用，无需分配额外内存。如果未找到，则将其添加到池中并返回其引用。\n\
  \n话虽如此，考虑到前面的示例代码，我们期望 `text21` 和 `text22` 变量指向池中同一个 `String` 对象，这意味着它们的引用也是相等的。让我们来测试一下。\n\
  \n```\npackage com.apress.bgn.ch5.refs;\npublic class StringDemo {\npublic static\
  \ void main(String... args) {\nString text21 = \"two\";\nString text22 = \"two\"\
  ;\nif (text21 == text22) {\nSystem.out.println(\"引用相等\");\n} else {\nSystem.out.println(\"\
  引用不同\");\n}\nif (text21.equals(text22)) {\nSystem.out.println(\"对象相等\");\n} else\
  \ {\nSystem.out.println(\"对象不同\");\n}\n}\n}\n```\n\n运行上述代码时，控制台会打印以下内容，证明了之前的论断以及\
  \ `String pool` 的存在。\n\n```\n引用相等\n对象相等\n```\n\n图 5-15 展示了代码执行时内存内容的抽象表示。\n\n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig15_HTML.jpg](img/463938_1_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15\n\nString Pool 示例\n\n当使用 new 运算符创建新的 `String` 对象时，JVM 会为新对象分配新内存并将其存储在堆中，因此不会使用\
  \ `String pool`。这导致每个以这种方式创建的 `String` 对象都有自己独立的内存区域和地址。这就是为什么如果我们要比较初始代码示例中的变量\
  \ `text22` 和变量 `text23`，我们会预期它们的引用不同，但对象应该相等。让我们来测试一下。\n\n```\npackage com.apress.bgn.ch5.refs;\n\
  public class StringDemo {\npublic static void main(String... args) {\nString text22\
  \ = \"two\";\nString text23 = new String (\"two\");\nif (text22 == text23) {\nSystem.out.println(\"\
  引用相等\");\n} else {\nSystem.out.println(\"引用不同\");\n}\nif (text22.equals(text23))\
  \ {\nSystem.out.println(\"对象相等\");\n} else {\nSystem.out.println(\"对象不同\");\n}\n\
  }\n}\n```\n\n运行上述代码时，控制台会打印以下内容，证明了之前提到的所有内容。\n\n```\n引用不同\n对象相等\n```\n\n我将留给你去想象上一个例子中栈和堆内存的样子。^(⁵⁹)\n\
  \n`String Pool` 的默认大小为 1009。从 Java 6 开始，可以使用 `-XX:StringTableSize` 修改其大小。\n\n###\
  \ ******\n\n初始代码示例中的第 11 和 12 行展示了如何从 `char[3]` 数组创建 `String` 实例。直到 Java 8，这内部就是\
  \ String 的初始表示形式：字符数组。一个字符占用 2 个字节，这意味着 *Strings* 会消耗大量内存。在 Java 9 中，引入了一种称为**紧凑字符串（Compact\
  \ String）** 的新表示形式，它根据内容使用 `byte[]` 或 `char[]`。这意味着从 Java 9 开始，你的字符串处理应用程序消耗的内存会显著降低。\n\
  \n\n\n### 转义字符\n\n有些特殊字符不能作为`String`值的一部分。你可能已经注意到，`String`值是在双引号（\"`sample`\"）之间定义的，这使得\"\
  （`双引号`）字符无法作为值使用。要将其用作`String`值，必须进行*转义*。除了这个字符之外，还有`\\(反斜杠)`和`\\a(警报)`。图 5-16 展示了\
  \ IntelliJ IDEA 如何提示你这些字符不能用在`String`值的内容中。\n\n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig16_HTML.jpg](img/463938_1_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16\n\n包含特殊字符的代码示例\n\n要转义这些字符，必须在它们前面插入一个反斜杠。`'(单引号)`在用作字符值时也必须进行转义。\n\n```\n\
  char quote = '\\\"';\n```\n\n还有一些其他的 Java 转义序列可以在`String`值中使用以达到特定效果，这些序列列在表 5-1\
  \ 中。\n\n表 5-1\n\nJava 转义序列\n\n| **转义序列** | **效果** |\n| --- | --- |\n| `\\n` | 创建新行（通常称为换行符）\
  \ |\n| `\\t` | 创建制表符 |\n| `\\b` | 创建退格字符（可能会删除前一个字符，具体取决于输出设备） |\n| `\\r` | 返回到行首（但不换行，相当于键盘上的`Home`键）\
  \ |\n| `\\f` | 换页（对于打印机，移动到下一页的顶部） |\n\n换行符`\\n`和制表符`\\t`在编程中经常用于格式化控制台输出。如果我们像下面这样定义一个`String`实例，\n\
  \n```\nString perf = \"今晚表演的歌手是: \\n\\t Paolo Nutini \\n\\t Seth MacFarlane\n\\\
  n\\t John Mayer\";\n```\n\n当在控制台打印时，文本会被格式化成如下所示：\n\n```\n今晚表演的歌手是:\nPaolo Nutini\n\
  Seth MacFarlane\nJohn Mayer\n```\n\n### 包装类\n\n每种基本类型都有一个对应的引用类型。在逐一介绍它们并解释为什么需要它们之前，请先查看表\
  \ 5-2。Java 包装类将同名的基本类型的值包装起来。\n\n表 5-2\n\nJava 基本类型及其对应的引用类型\n\n| **基本类型** | **类**\
  \ |\n| --- | --- |\n| byte | `java.lang.Byte` |\n| short | `java.lang.Short` |\n\
  | int | `java.lang.Integer` |\n| long | `java.lang.Long` |\n| float | `java.lang.Float`\
  \ |\n| double | `java.lang.Double` |\n| boolean | `java.lang.Boolean` |\n| char\
  \ | `java.lang.Char` |\n\n此外，这些类提供了将基本类型值转换为`String`以及反向转换的方法，还提供了在处理需要被视为对象的基本类型时有用的常量和工具方法。数值包装类是相关的，它们都扩展了`Number`类，如图\
  \ 5-17 所示。\n\n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig17_HTML.jpg](img/463938_1_En_5_Fig17_HTML.jpg)\n\
  \n图 5-17\n\n包装类层次结构\n\n以下代码示例主要使用`Integer`类，但其他数值包装类也可以类似地使用。JVM 知道如何在需要时自动将基本类型`int`转换为`Integer`对象，这个操作称为**装箱**；以及将`Integer`对象转换为基本类型`int`，这个操作称为**拆箱**。下面的代码示例包含了一些对`Integer`和`int`值的操作。\n\
  \n```\npackage com.apress.bgn.ch5.refs;\npublic class WrapperDemo {\npublic static\
  \ void main(String... args) {\n// int 的上限区间\nInteger max =  Integer.MAX_VALUE;\n\
  System.out.println(max);\n//拆箱\nint pmax =  max;\n//装箱\nInteger io = 10;\n//创建基本类型的工具方法\n\
  //如果字符串不是数字，则会抛出异常\nint i1 = Integer.parseInt(\"11\");\n//构造函数在 Java 9 中已弃用\n//如果字符串不是数字，则会抛出异常\n\
  Integer i2 = new Integer(\"12\");\n//如果字符串不是数字，则会抛出异常\nInteger i3 = Integer.valueOf(\"\
  12\");\n//将 int 转换为 String\nString s0 = Integer.toString(13);\n//将 int 转换为 float\n\
  float f0 = Integer.valueOf(14).floatValue();\n//创建数字 9 的二进制表示字符串 (1001)\nString\
  \  s1  =  Integer.toBinaryString(9);\n//在 Java 1.8 中引入\nInteger i4 = Integer.parseUnsignedInt(\"\
  +15\");\n//两个整数相加的方法\nint sum = Integer.sum(2, 3);\n//获取较大值的方法\nint maximum = Integer.max(2,\
  \ 7);\n}\n}\n```\n\n`Character`和`Boolean`类型略有不同，因为这些类型不是数值型的，所以它们不能转换为任何数值。它们之间也不能相互转换。Oracle\
  \ 为其类提供了非常好的文档，所以如果你对使用这两种类型感到好奇，请查看官方 JDK API 文档，网址为 [`https://docs.oracle.com/javase/10/docs/api/index.html?overview-summary.html`](https://docs.oracle.com/javase/10/docs/api/index.html%253Foverview-summary.html)\
  \ `.`\n\n\n\n### 日期时间 API\n\n许多应用程序都使用日历日期类型来打印当前日期、截止日期和生日。无论你决定构建什么应用程序，很可能都需要使用日历日期。在\
  \ Java 8 之前，用于建模日历日期的主要类是 `java.util.Date`。这个类以及处理日历日期的其他类存在一些问题。但在深入探讨之前，我们先看看如何获取当前日期、创建自定义日期以及打印特定细节。\n\
  \n```\npackage com.apress.bgn.ch5;\nimport java.util.Date;\nimport java.text.SimpleDateFormat;\n\
  public class CalendarDateDemo {\npublic static void main(String... args) {\nSimpleDateFormat\
  \ sdf = new SimpleDateFormat(\"dd-MM-yyyy\");\nDate currentDate = new Date();\n\
  System.out.println(\"Today: \" + sdf.format(currentDate));\n//自 1.1 版本起已弃用\nDate\
  \ johnBirthday = new Date(77, 9, 16);\nSystem.out.println(\"John’s Birthday: \"\
  \ + sdf.format(johnBirthday));\nint day = johnBirthday.getDay();\nSystem.out.println(\"\
  Day: \" + day);\nint month = johnBirthday.getMonth() + 1;\nSystem.out.println(\"\
  Month: \" + month);\nint year = johnBirthday.getYear();\nSystem.out.println(\"Year:\
  \ \" + year);\n}\n}\n```\n\n获取当前日期很简单；只需调用 `Date` 类的默认构造函数即可。\n\n```\nDate currentDate\
  \ = new Date();\n```\n\n`currentDate` 的内容可以直接显示，但通常使用 `java.text.SimpleDateFormat`\
  \ 的实例将日期格式化为特定于国家/地区的模式。格式化程序也可用于将具有该特定格式的 `String` 转换为 `Date` 实例。当然，如果文本与格式化程序的模式不匹配，则会抛出特定异常（类型：`java.text.ParseException`）。\n\
  \n```\nSimpleDateFormat sdf = new SimpleDateFormat(\"dd-MM-yyyy\");\nSystem.out.println(currentDate);\n\
  System.out.println(\"Today: \" + sdf.format(currentDate));\nDate johnBirthday =\
  \ sdf.parse(\"16-10-1977\");\n```\n\n要从表示日期的数字（年、月、日）创建 `Date` 实例，可以使用接受这些值作为参数的构造函数，尽管该构造函数自\
  \ Java 1.1 起已被弃用，推荐的方法是使用 `sdf.parse(..)` 方法。该构造函数在其参数方面有一些特殊性。\n\n*   再次改变技术含义：年份参数必须是目标年份值减去\
  \ 1900。\n*   月份从 0 开始计数，因此作为参数给出的月份必须是目标月份减 1。\n\n从年、月、日的数值构造 `Date` 的代码如下所示。\n\n\
  ```\n//自 1.1 版本起已弃用\nDate johnBirthday = new Date(77, 9, 16);\nSystem.out.println(\"\
  John's Birthday: \" + sdf.format(johnBirthday));\n//输出：John's Birthday: 16-10-1977\n\
  ```\n\n如果我们想从日期中提取年、月、日，有相应的方法：提取月份中日期的方法名为 `getDate()`。\n\n```\ntry {\njohnBirthday\
  \ = sdf.parse(\"16-10-1977\");\n} catch (ParseException e) {\ne.printStackTrace();\n\
  }\nSystem.out.println(\"John's Birthday: \" + sdf.format(johnBirthday));\n//月份中的日期\n\
  int day = johnBirthday.getDate();\nSystem.out.println(\"Day: \" + day);\nint month\
  \ = johnBirthday.getMonth() + 1;\nSystem.out.println(\"Month:  \"  +  month);\n\
  int year = johnBirthday.getYear();\nSystem.out.println(\"Year: \" + year);\n```\n\
  \n如果你在 IntelliJ IDEA 编辑器中检查 `CalendarDateDemo` 类，你会注意到一些构造函数和方法以删除线字体显示。这意味着它们已被弃用，可能会在未来的\
  \ Java 版本中被移除，因此不应再使用。这就是为什么还有另一种方法来完成所有这些操作：使用 `java.util.Calendar` 类。下面列出了使用 `Calendar`\
  \ 类执行相同操作的代码。\n\n```\npackage com.apress.bgn.ch5;\nimport java.util.Calendar;\n\
  import java.util.Date;\nimport java.util.GregorianCalendar;\nimport java.text.SimpleDateFormat;\n\
  public class CalendarDateDemo {\npublic static void main(String... args) {\nSimpleDateFormat\
  \ sdf = new SimpleDateFormat(\"dd-MM-yyyy\");\nCalendar calendar = new GregorianCalendar();\n\
  Date currentDate = calendar.getTime();\nSystem.out.println(\"Today: \" + sdf.format(currentDate));\n\
  calendar.set(1977, 9, 16);\nDate johnBirthday = calendar.getTime();\nSystem.out.println(\"\
  John’s Birthday: \" + sdf.format(johnBirthday));\nint day = calendar.get(Calendar.DAY_OF_MONTH);\n\
  System.out.println(\"Day: \" + day);\nint month = calendar.get(Calendar.MONTH);\n\
  System.out.println(\"Month: \" + month);\nin year = calendar.get(Calendar.YEAR);\n\
  System.out.println(\"Year: \" + year);\n}\n}\n```\n\n不幸的是，一些特殊性仍然存在，因为表示日期的核心类仍然是\
  \ `java.util.Date`，但至少我们不再使用任何已弃用的内容。\n\n`java.util.Date` 类和 `java.text.SimpleDateFormat`\
  \ 类不是线程安全的，因此在具有多个执行线程的复杂应用程序中，开发人员必须显式同步对这些类型对象的访问。这些类型的对象不是不可变的，并且处理时区非常麻烦。这就是为什么在\
  \ Java 8 中引入了一个新的 API 来建模日历日期操作。它的设计更好，并且日期实例是线程安全且不可变的。该 API 的核心类是 `java.time.LocalDate`\
  \ 和 `java.time.LocalDateTime`，用于建模日历日期以及带时间的日历日期。让我们看看使用新 API 获取当前日期和创建自定义日期的代码是什么样的。\n\
  \n```\npackage com.apress.bgn.ch5;\nimport java.time.LocalDate;\nimport java.time.LocalDateTime;\n\
  import java.time.Month;\npublic class CalendarDateDemo {\npublic static void main(String...\
  \ args) {\nLocalDateTime currentTime = LocalDateTime.now();\nSystem.out.println(\"\
  Current DateTime: \" + currentTime);\nLocalDate today = currentTime.toLocalDate();\n\
  System.out.println(\"Today: \" + today);\nLocalDate johnBd = LocalDate.of(1977,\
  \ Month.OCTOBER, 16);\nSystem.out.println(\"John’s Birthday: \" + johnBd);\nint\
  \ day = johnBd.getDayOfMonth();\nSystem.out.println(\"Day: \" + day + \", \" + johnBd.getDayOfWeek());\n\
  int month = johnBd.getMonthValue();\nSystem.out.println(\"Month: \" + month + \"\
  , \" + johnBd.getMonth());\nint year = johnBd.getYear();\nSystem.out.println(\"\
  Year: \" + year);\n}\n}\n```\n\n要获取当前日期和时间，调用名为 `now()` 的静态方法，该方法返回一个 `LocalDateTime`\
  \ 类型的实例。此实例可以通过调用 `toLocalDate()` 获取当前日期。\n\n要创建自定义日期，可以使用实际的年份和月份中的日期作为参数，并且可以使用\
  \ `java.time.Month` 枚举中的某个值来指定月份。\n\n通过调用名称直观的方法，可以轻松提取有关日期的信息。查看前面代码片段中的 `getDayOfMonth()`\
  \ 和 `getDayOfWeek()` 方法。它们的名称准确地反映了它们返回的数据。\n\n`LocalDate` 和 `LocalDateTime` 类简化了不需要时区的开发。处理时区是一个高级主题，因此本书不会涉及。\n\
  \n\n\n### 集合\n\nJDK 中最重要的家族类型之一是集合。集合家族中的类和接口对常见的数据集合（如集、列表和映射）进行建模。所有类都存储在 `java.util`\
  \ 包下，可分为两类：元组和键值对集合。元组是一维数据集：如果值是唯一的，则应使用任何实现 `java.util.Set` 接口的类来建模；如果不是，则应使用任何实现\
  \ `java.util.List` 接口的类。对于键值对集合类，应使用 `java.util.Map` 的实现。\n\n从 Java 1.5 开始，集合变得泛型化，这使得开发人员在使用它们时更加精确和安全。在\
  \ Java 1.5 之前，集合可以包含任何类型的对象。开发人员仍然可以编写如下代码：\n\n```\npackage com.apress.bgn.ch5;\n\
  import com.apress.bgn.ch4.hierarchy.Gender;\nimport com.apress.bgn.ch4.hierarchy.Performer;\n\
  import java.util.*;\npublic class CollectionsDemo {\npublic static void main(String...\
  \ args) {\nList objList = new ArrayList();\nobjList.add(\"temp\");\nobjList.add(Integer.valueOf(5));\n\
  objList.add(new Performer(\"John\", 40, 1.91f, Gender.MALE));\n}\n}\n```\n\n当你遍历这个列表时，如果没有复杂的代码来分析每个对象的类型，就很难确定你在处理哪些对象。这在**第**\
  \ 4 章介绍*泛型*时提到过。下面展示了遍历列表并处理元素的代码，以说明为什么在当今的 Java 时代，这是一个糟糕的想法和不良实践。\n\n```\npackage\
  \ com.apress.bgn.ch5;\nimport com.apress.bgn.ch4.hierarchy.Gender;\nimport com.apress.bgn.ch4.hierarchy.Performer;\n\
  import java.util.*;\npublic class CollectionsDemo {\npublic static void main(String...\
  \ args) {\nList objList = new ArrayList();\nobjList.add(\"temp\");\nobjList.add(Integer.valueOf(5));\n\
  objList.add(new Performer(\"John\", 40, 1.91f, Gender.MALE));\nfor (Object obj :\
  \ objList) {\nif (obj instanceof String) {\nSystem.out.println(\"String object =\
  \ \" + obj.toString());\n} else if (obj instanceof Integer) {\nInteger i = (Integer)obj;\n\
  System.out.println(\"Integer object = \" + obj.toString());\n} else {\nPerformer\
  \ p = (Performer) obj;\nSystem.out.println(\"Performer object = \" +  p.getName());\n\
  }\n}\n}\n}\n```\n\n也许你现在还不清楚，但要使用列表的内容，你必须知道列表中所有对象的类型。在小型项目中这可能可行，但在涉及多个开发人员的大型项目中，这会很快变得混乱不堪。\n\
  \n这时*泛型*就派上用场了。泛型有助于在编译时定义哪些类型的对象应放入集合中，因此，如果将错误的对象类型添加到集合中，代码将无法编译。列表和集都实现了相同的接口：`java.util.Collection<T>`，这意味着它们的\
  \ API 几乎相同。图 5-18 展示了集合的简化层次结构，其中包含了编程中最常用的类和接口。\n\n![../images/463938_1_En_5_Chapter/463938_1_En_5_Fig18_HTML.jpg](img/463938_1_En_5_Fig18_HTML.jpg)\n\
  \n图 5-18\n\n集合层次结构\n\n让我们从一个列表示例开始。\n\n```\npackage com.apress.bgn.ch5;\nimport\
  \ java.util.*;\npublic class CollectionsDemo {\npublic static void main(String...\
  \ args) {\nList stringList = new ArrayList();\nstringList.add(\"one\");\nstringList.add(\"\
  two\");\nstringList.add(\"three\");\nfor (String s : stringList) {\nSystem.out.println(s);\n\
  }\n}\n}\n```\n\n`List` 包含一个未排序的非唯一数据集合，包括 null 元素。在示例中，我们声明了一个 `List<T>` 类型的引用和一个\
  \ `ArrayList<T>` 类型的对象。我们这样做是因为所有实现都具有相同的 API，我们可以轻松地将 `ArrayList<T>` 替换为 `LinkedList<T>`，代码仍然可以工作。**声明抽象引用是一种良好的编程实践**。\n\
  \n```\nList stringList = new ArrayList();\nstringList = new LinkedList();\n```\n\
  \n前面示例中的语法是 Java 1.7 之前的，当时引入了 **<>（菱形运算符）**。这进一步简化了集合的初始化，因为它只需要在引用声明中声明列表中元素的类型。因此，前面代码片段中的两行变成了：\n\
  \n```\nList stringList = new ArrayList();\nstringList = new LinkedList();\n```\n\
  \n从 Java 1.5 开始，每个新的 Java 版本都对集合框架进行了更改。在 Java 1.8 中，通过 `java.lang.Iterable<T>`\
  \ 接口（`java.lang.Collection<T>` 扩展了该接口）中一个名为 `forEach` 的默认方法，添加了对 lambda 表达式的支持。因此，我们之前使用\
  \ `for` 循环打印列表中所有值的代码可以替换为：\n\n```\nstringList.forEach(element -> System.out.println(element));\n\
  ```\n\n在 Java 9 中，又引入了一项改进：集合的工厂方法。我们的集合是通过重复调用 `add(..)` 来填充元素的，这有点冗余，尤其是当我们已经拥有要放入列表的完整元素集合时。因此，在\
  \ Java 9 中引入了用一行代码创建集合对象的方法；例如：\n\n```\nList stringList = List.of(\"one\", \"two\"\
  , \"three\");\n```\n\n生成的 `List<T>` 是一个不可变集合；它不能再被修改，也不能从中添加或删除元素。\n\n再近一些，在 Java\
  \ 10 中，添加了对**局部变量类型推断**的支持，这意味着我们不再需要显式指定引用类型，因为它会根据对象类型自动推断出来，因此以下声明：\n\n```\n\
  List stringList = List.of(\"one\", \"two\", \"three\");\n```\n\n变成了：\n\n```\nvar\
  \ stringList = List.of(\"one\", \"two\", \"three\");\n```\n\n类似的代码可以用 `Set<T>`、`HashSet<T>`\
  \ 和 `TreeSet<T>` 编写，并且 `Set<T>` 类也存在类似的方法。\n\nMap 实现有一些不同，因为它们对键值对集合进行建模；因此这种情况需要单独处理。以下代码片段展示了创建和初始化一个使用\
  \ `String` 类型键和 `Integer` 类型值的映射。语法是 Java 6 的。\n\n```\npackage com.apress.bgn.ch5;\n\
  import java.util.*;\npublic class CollectionsDemo {\npublic static void main(String...\
  \ args) {\nMap stringMap = new HashMap();\nstringMap.put(\"one\", 1);\nstringMap.put(\"\
  two\", 2);\nstringMap.put(\"three\", 3);\nfor (Map.Entry entry : stringMap.entrySet())\
  \ {\nSystem.out.println(entry.getKey() + \":  \" + entry.getValue());\n}\n}\n}\n\
  ```\n\n从 `for` 循环中，你可以推断出映射是 `Map.Entry<K, V>` 元素的集合。如果我们向前推进到 Java 1.7 语法，映射的声明变为：\n\
  \n```\nMap stringMap = new HashMap();\n```\n\n在 Java 1.8 中，遍历和打印映射中的值变得更加实用。\n\n\
  ```\nstringMap.forEach((k,v) -> System.out.println(k + \": \" + v));\n```\n\n在 Java\
  \ 9 中，声明和填充映射变得更加容易。\n\n```\nMap stringMap = Map.of(\"one\", 1,\"two\", 2, \"three\"\
  , 3);\n```\n\n局部变量类型推断也适用于映射。\n\n```\nvar stringMap = new HashMap();\n```\n\n用于处理集合的\
  \ JDK 类涵盖了广泛的功能，例如排序、搜索、合并集合、交集等。随着本书的深入，代码示例的上下文会越来越广泛，我们将能够使用集合来解决实际问题。因此，其他方法也会被介绍，并提供可运行的代码示例。\n\
  \n\n\n### 并发特定类型\n\n一个 Java 程序可以拥有多个执行线程。默认情况下，当 Java 程序执行时，会为从 `main` 方法调用的代码创建一个线程，同时还会为\
  \ JVM 相关任务创建并并行执行一些其他实用线程。这些线程可以轻松地通过 `java.lang.Thread` 类中定义的静态实用方法进行访问。以下代码示例正是如此：提取对\
  \ `Thread` 实例的引用，并在控制台中打印它们的名称。\n\n```\npackage com.apress.bgn.ch5;\npublic class\
  \ ListJvmThreads {\npublic static void main(String... args) {\nvar threadSet = Thread.getAllStackTraces().keySet();\n\
  var threadArray = threadSet.toArray(new Thread[threadSet.size()]);\nfor (int i =\
  \ 0; i < threadArray.length; ++i) {\nSystem.out.println(\"thread name: \" + threadArray[i].getName());\n\
  }\n}\n}\n```\n\n在 JDK 11 中运行上述代码产生的输出如下。\n\n```\nthread name: Reference Handler\n\
  thread name: Monitor Ctrl-Break\nthread name: Finalizer\nthread name: main\nthread\
  \ name: Signal Dispatcher\nthread name: Common-Cleaner\n```\n\n名为 `main` 的线程是执行开发者编写代码的线程。开发者可以编写代码，从主线程启动自己的线程。创建自定义线程最简单的方法是创建一个继承\
  \ `Thread` 类的类。`Thread` 类实现了一个名为 `Runnable` 的接口，该接口声明了一个名为 `run()` 的单一方法。`Thread`\
  \ 类声明了一个名为 `start()` 的方法。当调用此方法时，`run()` 方法的主体将在另一个执行线程中执行。^(⁶⁰) 因此，在继承 `Thread`\
  \ 类时，必须重写 `run()` 方法。\n\n以下示例展示了一个名为 `CounterThread` 的类。`run()` 方法的内容旨在通过调用 `Thread.sleep(..)`\
  \ 实用方法，不时地暂停执行。方法主体被包裹在两行代码中，这两行代码分别打印线程名称及开始消息，以及线程名称及结束消息。这对于减慢此类线程的执行速度是必要的，以便我们能清晰地看到它们是并行执行的。\n\
  \n```\npackage com.apress.bgn.ch5;\npublic class CounterThread extends Thread {\n\
  @Override\npublic void run() {\nSystem.out.println(this.getName() + \" started...\"\
  );\nfor (int i = 0; i < 10; ++i) {\ntry {\nThread.sleep(i * 10);\n} catch (InterruptedException\
  \ e) {\ne.printStackTrace();\n}\n}\nSystem.out.println(this.getName() + \" ended.\"\
  );\n}\n}\n```\n\n测试我们的线程类很简单，只需实例化它几次并调用 `start()` 方法即可。\n\n```\npackage com.apress.bgn.ch5;\n\
  public class ThreadDemo {\npublic static void main(String... args) {\nfor (int i\
  \ = 0; i < 10; ++i) {\nnew CounterThread().start();\n}\n}\n}\n```\n\n在示例中，创建了 `CounterThread`\
  \ 类的十个实例，并对每个实例调用了 `start()` 方法。执行上述代码时，控制台应打印出类似如下的日志。\n\n```\nThread-0 started...\n\
  Thread-3 started...\nThread-8 started...\nThread-9 started...\nThread-7 started...\n\
  Thread-6 started...\nThread-1 started...\nThread-2 started...\nThread-4 started...\n\
  Thread-5 started...\nThread-4 ended.\nThread-1 ended.\nThread-9 ended.\nThread-7\
  \ ended.\nThread-5 ended.\nThread-8 ended.\nThread-0 ended.\nThread-6 ended.\nThread-2\
  \ ended.\nThread-3 ended.\n```\n\n另一种创建线程的方式是创建一个实现 `Runnable` 接口的类。当我们想对 `run`\
  \ 方法中的执行进行更多自定义，或者可能需要继承另一个类时，这很有用。或者，考虑到 `Runnable` 只声明了一个方法，也可以使用 lambda 表达式。让我们声明一个等效的\
  \ `Runnable` 实现。\n\n```\npackage com.apress.bgn.ch5;\nimport  static  java.lang.Thread.*;\n\
  public class CounterRunnable implements Runnable {\n@Override\npublic void run()\
  \ {\nSystem.out.println(Thread.currentThread().getName() + \" started...\");\nfor\
  \ (int i = 0; i < 10; ++i) {\ntry {\nThread.sleep(i * 10);\n} catch (InterruptedException\
  \ e) {\ne.printStackTrace();\n}\n}\nSystem.out.println(Thread.currentThread().getName()\
  \ + \" ended.\");\n}\n}\n```\n\n由于我们不再能直接访问线程的名称，为了打印它，我们必须使用另一个实用方法 `Thread.currentThread()`\
  \ 来获取对当前正在执行的线程的引用。`Thread` 类提供了一个参数类型为 `Runnable` 的构造器，这意味着它可以接受任何实现了 `Runnable`\
  \ 的类型的参数。因此，要使用 `CounterRunnable` 创建线程，可以编写类似以下示例的代码。\n\n```\npackage com.apress.bgn.ch5;\n\
  public class LambdaRunnableDemo {\npublic static void main(String... args) {\nfor\
  \ (int i = 0; i < 10; ++i) {\nnew Thread(new CounterRunnable()).start();\n}\n}\n\
  }\n```\n\n如果运行这段代码，我们会得到类似的输出。\n\n这是使用 lambda 表达式的一个好场景，因为 `Runnable` 可以当场实现。因此，前面的代码也可以写成如下形式。\n\
  \n```\nfor (int i = 0; i  {\nSystem.out.println(currentThread().getName() + \" started...\"\
  );\nfor (int j = 0; j < 10; ++j) {\ntry {\nsleep(j * 10);\n} catch (InterruptedException\
  \ e) {\ne.printStackTrace();\n}\n}\nSystem.out.println(currentThread().getName()\
  \ + \" ended.\");\n}).start();\n}\n```\n\nJava 提供了可以创建和管理线程的线程管理类，因此开发者不必显式声明线程。并发框架对于本书来说是一个过于高级的主题，但如果本节内容引起了你的好奇心，Oracle\
  \ 的并发教程位于 [`https://docs.oracle.com/javase/tutorial/essential/concurrency/index.html`](https://docs.oracle.com/javase/tutorial/essential/concurrency/index.html)\
  \ 。\n\n## 总结\n\n在本章中，你学习了 JVM 如何管理 Java 程序的内存，以及最常用的 Java 数据类型的基础知识。我们讨论了以下内容。\n\
  \n*   在 Java 程序执行期间内存是如何管理的\n*   原始类型和引用类型之间的区别\n*   Java 中定义了多少种原始类型\n*   String\
  \ 类型为何特殊\n*   如何处理日历日期\n*   如何声明和使用数组\n*   如何使用 null\n*   如何声明和使用集合实现\n\n如果本章中的某些示例看起来很复杂，请不要气馁。如果不提供你可以执行、测试甚至自行修改的工作代码，就很难解释某些概念。不幸的是，这需要使用后续章节中介绍的概念（例如，`for`\
  \ 和 `if` 语句）。请记下每个现在不清楚的概念及其页码，并在你稍后阅读本书中关于该概念的更详细内容后，再回到本章。\n\n脚注 1   2   3   4\
  \   5\n\n\n\n"
- '# 6. 运算符


  前几章介绍了 Java 编程的基本概念。你学习了如何组织代码、如何命名文件，以及根据要解决的问题可以使用哪些数据类型。你还学习了如何声明字段、变量和方法，以及它们如何在内存中存储，从而帮助你设计解决方案，使资源消耗达到最优。


  在本章中，你将学习使用*运算符*组合已声明的变量。大多数 Java 运算符都是你在数学中熟悉的，但由于编程涉及的类型不仅仅是数值型，因此还添加了具有特定用途的额外运算符。表
  6-1 列出了所有 Java 运算符及其类别和适用范围。


  表 6-1


  Java 运算符


  | 类别 | 运算符 | 适用范围 |

  | --- | --- | --- |

  | 类型转换 | *(类型)* | 显式类型转换 |

  | 一元，后缀 | expr++, expr– | 后置自增/自减 |

  | 一元，前缀 | ++expr, –expr | 前置自增/自减 |

  | 一元，逻辑 | `!` | 逻辑非 |

  | 一元，按位 | `~` | 按位取反，对整数值逐位取反 |

  | 乘法，二元 | `*, /, %` | 用于数值类型：乘法、除法、取余 |

  | 加法，二元 | `+, -` | 用于数值类型：加法、减法；“+”也用于`String`拼接 |

  | 位移，二元 | `>>, <<, >>>` | 用于数值类型：右移、左移、无符号右移 |

  | 条件，关系 | `instanceof` | 测试对象是否为指定类型（类、子类或接口）的实例 |

  | 条件，关系 | `==, !=, <, >, <=, >=` | 等于、不等于、小于、大于、小于等于、大于等于 |

  | 与，二元 | `&` | 按位逻辑与 |

  | 异或，二元 | `^` | 按位逻辑异或 |

  | 或，二元 | `&#124;` | 按位逻辑或 |

  | 条件，逻辑与 | `&&` |   |

  | 条件，逻辑或 | `&#124;&#124;` |   |

  | 条件，三元 | `? :` | 也称为*猫王运算符* |

  | 赋值 | `=, +=, -=, *=, /= %=, &=, ^=, <<= >>=,  >>>= , &#124;=` | 简单赋值、复合赋值 |


  让我们从编程中最常见的运算符开始本章：赋值运算符（=）。


  ## 赋值运算符（=）


  这个运算符在编程中使用最广泛，因为没有它什么都做不了。你创建的任何变量，无论类型是基本类型还是引用类型，在程序的某个时刻都必须被赋予一个值。使用赋值运算符设置值非常简单：运算符左侧是变量名，右侧是一个值。赋值能够生效的唯一条件是值的类型与变量的类型匹配。


  要测试这个运算符，你可以用 `jshell` 稍微玩一下；确保以 `verbose` 模式启动它，这样你就能看到赋值的效果。


  ```

  $ jshell -v

  |  欢迎使用 JShell -- 版本 11-ea

  |  如需介绍，请输入：/help intro

  [jshell> int i = 0;

  i  ==> 0

  |  已创建变量 i : int

  [jshell> i = -4;

  i ==> -4

  |  已为 i 赋值 : int

  jshell> String sample = "text"

  [sample ==> "text"

  |  已创建变量 sample : String

  [jshell> List list = new ArrayList()

  list ==> []

  |  已创建变量 list : List

  [jshell> list = new LinkedList();

  list ==> []

  |  已为 list 赋值 : List

  ```


  在前面的例子中，我们声明了基本类型和引用类型的值，并对它们进行了赋值和重新赋值。不允许将类型与初始类型不匹配的值进行赋值。在下面的代码示例中，我们试图将一个文本值赋给一个先前声明为
  `int` 类型的变量。


  ```

  [jshell> int i = 0;

  i ==> 0

  |  已创建变量 i : int

  [jshell> i = -4;

  i ==> -4

  |  已为 i 赋值 : int

  [jshell> i = "gigi pedala"

  |  错误：

  |  类型不兼容：java.lang.String 无法转换为 int

  |  i = "gigi pedala"

  |      ^-----------^

  ```


  JDK 10 中引入的类型推断并不影响这一点，变量的类型是根据第一个赋值的类型推断出来的。这意味着你不能使用 `var` 关键字声明一个变量而不指定初始值。这排除了
  `null` 值，因为它不能用于声明类型。不过，可以通过将 `null` 值强制转换为我们感兴趣的类型来强制实现这一点。


  ```

  [jshell> var j;

  |  错误：

  |  无法推断局部变量 j 的类型

  |    (不能在未初始化的变量上使用 ''var'')

  |  var j;

  |  ^----^

  [jshell> var j = 5;

  j ==> 5

  |  已创建变量 j : int

  [jshell> var sample2 = "bubulina"

  sample2 ==> "bubulina"

  |  已创建变量 sample2 : String

  // 是的，这实际上有效！

  [jshell> var funny = (Integer) null;

  funny ==> null

  |  已创建变量 funny : Integer

  ```


  关于赋值运算符，能说的就是这些了。其他细节将在后面介绍复合赋值运算符时涉及。




  ## 显式类型转换（type）与 instanceof


  我们将这两个运算符放在同一节中讲解，因为这样更容易提供与你作为开发者日常工作中频繁使用的代码示例（如果你选择这个方向的话）。


  最好让引用类型尽可能通用，以便在不破坏代码的情况下更改具体实现。但有时，我们可能需要将对象分组，并根据其类型执行不同的代码。还记得上一章提到的 `Performer`
  层级结构吗？我们将在此处利用这些类型来演示如何使用这些运算符。如果你不想返回上一章查看层级结构，图 6-1 再次展示了它，但做了一点改动：我们添加了一个名为 `Graphician`
  的额外类，它实现了 `Artist` 接口并继承了 `Human` 类。^(⁶¹)


  ![../images/463938_1_En_6_Chapter/463938_1_En_6_Fig1_HTML.jpg](img/463938_1_En_6_Fig1_HTML.jpg)


  图 6-1


  Performer 层级结构


  在以下代码示例中，创建了一个 `Musician` 类型的对象和一个 `Graphician` 类型的对象，并将两者都添加到一个包含 `Artist` 类型引用的列表中。我们可以这样做，因为这两种类型都实现了
  `Artist` 接口。


  ```

  package com.apress.bgn.ch6;

  import com.apress.bgn.ch4.hierarchy.*;

  import java.util.ArrayList;

  import java.util.List;

  public class OperatorDemo {

  public static void main(String... args) {

  List artists = new ArrayList();

  Musician john = new Performer("John", 40, 1.91f, Gender.MALE);

  List songs = List.of("Gravity");

  john.setSongs(songs);

  artists.add(john);

  Graphician diana = new Graphician("Diana", 23, 1.62f, Gender.FEMALE, "macOs"); artists.add(diana);

  for (Artist artist : artists) {

  if (artist instanceof Musician) { \\ (*)

  Musician musician = (Musician) artist; \\(**)

  System.out.println("Songs: " + musician.getSongs());

  } else {

  System.out.println("Other Type: " + artist.getClass());

  }

  }

  }

  }

  ```


  标记为 `(*)` 的行展示了如何使用 `instanceof` 运算符。此运算符测试对象是否为指定类型（类、子类或接口）的实例。它用于编写条件，以决定应执行哪个代码块。


  标记为 `(**)` 的行对引用进行了显式转换。由于 `instanceof` 运算符帮助确定了引用指向的对象是 `Musician` 类型，我们现在可以将引用转换为正确的类型，以便调用
  `Musician` 类的方法。


  但如果显式转换失败会发生什么？为此，我们尝试将之前声明的 `Graphician` 引用转换为 `Musician`。因此，我们将添加以下代码行。


  ```

  Musician fake = (Musician) diana;

  ```


  编译器不会报错，但这并不能改变 `Graphician` 与 `Musician` 类型无关的事实，因此代码将无法运行，并且控制台会抛出一个特殊异常来告诉你哪里出了问题。控制台打印的错误信息很明确，如下面的日志片段所示。


  ```

  Exception in thread "main" java.lang.ClassCastException:

  chapter.six/com.apress.bgn.ch6.Graphician cannot be cast to

  chapter.four/com.apress.bgn.ch4.hierarchy.Musician

  at chapter.six/com.apress.bgn.ch6.OperatorDemo.mainOperatorDemo.java:24

  ```


  该消息明确指出这两种类型不兼容，并包含了包名和模块名。


  但显式转换不仅限于引用类型，它也适用于基本类型。任何值范围较小的类型的变量都可以转换为值范围较大的类型，而无需显式转换。但反过来也可以通过显式转换实现，但如果值太大，会丢失位，结果将……出乎意料。请看以下
  `byte` 和 `int` 之间转换的示例。


  ```

  [jshell> byte b = 2;

  b ==> 2

  |  created variable b : byte

  [jshell> int i = 10;

  i ==> 10

  |  created variable i : int

  [jshell> i = b

  i ==> 2

  |  assigned to i : int

  [jshell> b = i

  |  Error:

  |  incompatible types: possible lossy conversion from int to byte

  |  b = i

  |      ^

  [jshell> b = (byte) i

  b ==> 2 // 一切正常，因为值在 byte 范围内

  |  assigned to b : byte

  [jshell> i = 300000

  i ==> 300000

  |  assigned to i : int

  [jshell> b = (byte) i

  b ==> -32  // 哎呀！值超出了 byte 范围

  |  assigned to b : byte

  ```


  因此，作为一般规则，使用显式转换来扩大变量的范围，而不是缩小它，因为缩小范围可能导致意外结果。


  ## 数值运算符


  本节汇总了主要用于数值类型的运算符。你从数学中了解的数值运算符有：`+`、`-`、`/`。比较运算符在编程中也能找到，但它们可以组合使用以获得不同效果。


  ### 一元运算符


  一元运算符只需要一个操作数，并且会影响它们所应用的变量。


  #### 自增与自减运算符


  在 Java（以及其他一些编程语言）中，有一元运算符称为*自增运算符*（`++`）和*自减运算符*（`--`）。这些运算符放在变量之前或之后，以将其值增加或减少
  1。它们通常用作循环中的计数器，以控制循环的终止条件。当它们放在变量之前时，称为*前缀*形式；当放在变量之后时，称为*后缀*形式。


  当使用前缀形式时，操作在变量用于下一条语句之前执行。以下代码示例验证了这一说法。


  ```

  package com.apress.bgn.ch6;

  public class UnaryOperatorsDemo {

  public static void main(String... args) {

  int i  = 1;

  int j = ++i;

  System.out.println("j is " + j + ", i is " + i);

  }

  }

  ```


  上述代码的预期结果是 `j=2`，因为 `i` 变量的值在赋值给 `j` 之前被修改为 2。因此，预期输出是 `j is 2, i is 2`。


  当使用后缀形式时，操作在变量用于下一条语句之后执行。以下代码示例验证了这一说法。


  ```

  package com.apress.bgn.ch6;

  public class UnaryOperatorsDemo {

  public static void main(String... args) {

  i = 1;

  j = i++;

  System.out.println("j is " + j + ", i is " + i);

  }

  }

  ```


  上述代码的预期结果是 `j=1`，因为 `i` 变量的值在赋值给 `j` 之后被修改为 2。因此，预期输出是 `j is 1, i is 2`。


  自减运算符可以类似的方式使用，唯一的效果是变量值减少 1。尝试修改 `UnaryOperatorsDemo` 以使用 `--` 运算符。


  #### 符号运算符


  数学运算符 `+` 用于单个操作数以表示数字为正数（冗余且几乎从不使用）。因此，基本上，


  ```

  int i = 3;

  ```


  等同于


  ```

  int i = +3;

  ```


  数学运算符 `-` 用于声明负数。


  ```

  [jshell> int i = -3

  i ==> -3

  |  created variable i : int

  ```


  或者它用于否定一个表达式。


  ```

  [jshell> int i = -3

  i ==> -3

  |  created variable i : int

  [jshell> int j = - ( i + 4 )

  j ==> -1

  |  created variable j : int

  ```


  如示例所示，`( i + 4 )` 的结果是 1，因为 `i = -3`，但由于括号前的 `-`，最终赋值给 `j` 变量的结果是 `-1`。


  #### 取反运算符


  还有两个一元运算符，它们的作用是对变量取反。运算符 `!` 应用于布尔变量，用于对其取反。因此，`true` 变为 `false`，`false` 变为 `true`。


  ```

  [jshell> boolean t = true

  t ==> true

  |  created variable t : boolean

  [jshell> boolean f = !t

  f ==> false

  |  created variable f : boolean

  [jshell> boolean t2 = !f

  t2 ==> true

  |  created variable t2 : boolean

  ```




  ### 二元运算符


  让我们从你可能在数学中已经了解的运算符开始。


  *   `+` 将两个变量相加


  ```

  [jshell> int i = 4

  i ==> 4

  |  created variable i : int

  [jshell> int j = 6

  j ==> 6

  |  created variable j : int

  [jshell> int k = i + j

  k ==> 10

  |  created variable k : int

  [jshell> int i = i + 2

  i ==> 6

  |  modified variable i : int

  |    update overwrote variable i : int

  ```


  最后一条语句 `int i = i + 2` 的作用是将变量 `i` 的值增加 2，但这里存在一点冗余。这条语句可以不用重复提及 `i` 两次来编写，因为它的效果就是将
  `i` 的值增加 2。这可以通过使用 `+=` 运算符来实现，该运算符由赋值运算符和加法运算符组合而成。最优的写法是 `i += 2`。


  `+` 运算符也可以用于连接 `String` 实例，或者将 `String` 实例与其他类型连接。JVM 会根据上下文决定如何使用 `+` 运算符。让我们看下面的例子。


  ```

  package com.apress.bgn.ch6;

  public class ConcatenationDemo {

  public static void main(String... args) {

  int i1 = 0;

  int i2 = 1;

  int i3 = 2;

  System.out.println(i1 + i2 + i3);

  System.out.println("Result1 = " + (i1 + i2) + i3);

  System.out.println("Result2 = " + i1 + i2 + i3);

  System.out.println("Result3 = " + (i1 + i2 + i3));

  }

  }

  ```


  如果执行上述代码，控制台将显示以下内容。


  ```

  1\.   3

  2\.   Result1 = 12

  3\.   Result2 = 012

  4\.   Result3 = 3

  ```


  我来解释一下。


  *   第 1 行的结果可以解释如下：因为所有操作数都是 `int` 类型，JVM 会正常进行加法运算，然后 `println` 函数打印出这个结果。


  *   第 2 行的结果可以解释如下：添加了括号来隔离两个项 `(i1+i2)` 的加法。因此，JVM 将括号内的加法作为两个 `int` 项之间的正常加法执行。但在此之后，我们得到的是
  `"Result1 = " + 1 + i3`，这个操作包含一个 `String` 操作数，这意味着 `+` 运算符必须用作连接运算符，因为将一个数字与文本值相加在其他情况下是行不通的。


  *   第 3 行的结果此时应该很明显了；我们有三个 `int` 操作数和一个 `String` 操作数，因此 JVM 判定该操作的上下文不能是数值运算，所以需要进行连接。


  *   第 4 行的结果可以用与第 2 行类似的方式解释；使用括号是为了确保操作的上下文是数值运算，因此三个操作数被相加。


  这是一个典型的例子，展示了 JVM 如何决定涉及 `+` 运算符的操作上下文，你可能在其他 Java 教程中也能看到。但 `int` 变量可以替换为 `float`
  或 `double` 变量，其行为是类似的。


  *   **-** 将两个变量相减，或从变量中减去一个值。下面展示了该运算符以及 `-=` 运算符（由赋值运算符和减法运算符组合而成）的用法。


  *   `*` 将两个变量相乘，或将一个值与变量相乘。它的使用方式与 `+` 和 `-` 类似，并且有一个组合运算符 `*=` 可用于将变量的值相乘并立即赋值。


  ```

  [jshell> int i = 4;

  i ==> 4

  |  created variable i : int

  [jshell> int j = 2;

  j ==> 2

  |  created variable j : int

  [jshell> int k = i – j

  k ==> 2

  |  created variable k : int

  [jshell> int i = 4

  i ==> 4

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> i = i - 3;

  i ==> 1

  |  assigned to i : int

  [jshell> int i = 4

  i ==> 4

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> i -= 3

  $9 ==> 1

  |  created scratch variable $9 : int

  ```


  *   `/` 将两个变量相除，或将一个值除以一个变量。它的使用方式与 `+` 和 `-` 类似，并且有一个组合运算符 `/=` 可用于将变量的值相除并立即赋值。除法的结果称为*商*，它被赋值给赋值符号（`"="`）左侧的变量。当操作数为整数时，结果也是整数，并且*余数*会被丢弃。


  ```

  [jshell> int i = 4

  i ==> 4

  |  created variable i : int

  [jshell> int j = 2

  j ==> 2

  |  created variable j : int

  [jshell> int k =    i * j

  k ==> 8

  |  created variable k : int

  [jshell> int i = 4;

  i ==> 4

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> i = i * 3

  i ==> 12

  |  assigned to i : int

  [jshell> int i = 4

  i ==> 4

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> i *= 3

  $7 ==> 12

  |  created scratch variable $7 : int

  ```


  *   `%` 也称为*取模*运算符，它将两个变量相除，但结果是除法的余数。该操作称为*取模运算*，并且还有一个组合运算符 `%=` 可用于将变量的值相除并立即将余数赋值。


  ```

  [jshell> int i = 4

  i ==> 4

  |  created variable i : int

  [jshell> int j = 2

  j ==> 2

  |  created variable j : int

  [jshell> int k = i / j

  k ==> 2

  |  created variable k : int

  [jshell> int i = 4

  i ==> 4

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> int i = i / 3

  i ==> 1

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> int i = 4

  i ==> 4

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> i /= 3

  $7 ==> 1

  |  created scratch variable $7 : int

  ```


  ```

  [jshell> int i = 4

  i ==> 4

  |  created variable i : int

  [jshell> int j = 3

  j ==> 3

  |  created variable j : int

  [jshell> int k = i % j

  k ==> 1

  |  created variable k : int

  [jshell> int i = 4

  i ==> 4

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> i = i % 3

  i ==> 1

  |  assigned to i : int

  [jshell> int i = 4

  i ==> 4

  |  modified variable i : int

  |    update overwrote variable i : int

  [jshell> i %= 3

  $7 ==> 1

  |  created scratch variable $7 : int

  ```


  取模运算符返回余数，但是，当操作数是实数时会发生什么？如果余数是一个小数点后有无限多位小数的实数呢？


  ```

  package com.apress.bgn.ch6;

  public class ModulusDemo {

  public static void main(String... args) {

  float f = 1.9f;

  float g = 0.4f;

  float h = f % g;

  System.out.println("remainder = " + h);

  }

  }

  ```


  嗯，会进行一些舍入。控制台打印的文本是 `remainder = 0.29999995`，在某些情况下可以四舍五入为 0.3。但是，当数据用于敏感操作时，舍入可能会很危险，例如确定机器人手术的肿瘤体积，或确定发送火箭到火星的完美轨迹。因此，舍入可能会带来问题，因为它会导致精度损失。




  ### 关系运算符


  在某些情况下，设计问题解决方案时，需要引入条件来驱动和控制执行流程。条件要求使用比较运算符对两个项进行比较评估。本节将介绍 Java 中使用的所有比较运算符，并提供代码示例。让我们开始吧。


  *   `==` 用于测试项是否相等。由于在 Java 中，单个等号（`=`）用于赋值，因此需要找到一种方法来测试相等性，于是开发者将“=”运算符重复了一次。我们之前使用过
  `for` 循环来演示如何使用某些类型或语句，即使它们将在下一章才详细介绍，因为向您展示的代码示例应该是可编译和可运行的。在以下代码示例中，您将看到在数组中搜索值
  2 时测试 `==` 比较器的示例。如果找到该值，则会在控制台中打印索引。


  ```

  package com.apress.bgn.ch6;

  public class ComparisonOperatorsDemo {

  public static void main(String... args) {

  int[] values = {1, 7, 9, 2, 6,};

  for (int i = 0; i < values.length; ++i) {

  if (values[i] == 2) { \\(*)

  System.out.println("Fount 2 at index: " + i);

  }

  }

  }

  }

  ```


  标记为（`*`）的行中的条件会被评估，结果是一个布尔值。当结果为 `false` 时，不执行任何操作；但如果结果为 `true`，则会打印索引。由于结果是布尔类型，如果您误用了
  `=` 而不是 `==`，代码将无法编译。不过，在比较布尔值时需要格外小心。


  `==` 符号对于基本类型完全适用；对于引用类型，则需要使用**第** **5** 章中介绍的 `equals()` 方法。


  *   **!=** 用于测试项是否不相等。它是 `==` 运算符的相反操作。作为练习，请修改前面的示例，当数组值不为 2 时打印一条消息。此运算符也适用于引用类型。但如果您想测试引用值是否不相等，则必须使用类似这样的表达式：!a.equals(b)


  *   **<** 和 **<=** 的用途与您在数学课上学到的可能相同。第一个（`<`）测试运算符左侧的项是否小于右侧的项。下一个（`<=`）测试运算符左侧的项是否小于或等于右侧的项。此运算符不能用于引用类型。


  *   **>** 和 **>=** 的用途与您在数学课上学到的可能相同。第一个（`>`）测试运算符左侧的项是否大于右侧的项。下一个（`>=`）测试运算符左侧的项是否大于或等于右侧的项。此运算符不能用于引用类型。


  几乎所有数值运算符都可以用于不同基本类型（和包装类型）的变量，因为它们会自动转换为具有更宽区间表示的类型，或者在包装类型的情况下拆箱为适当的类型。以下代码反映了几种情况，但在实践中，您可能需要做出更极端的决策，这些决策并不总是符合编程的常识规则或遵循良好实践。


  ```

  package com.apress.bgn.ch6;

  public class MixedOperationsDemo {

  public static void main(String... args) {

  byte b = 1;

  short s = 2;

  int i = 3;

  long l = 4;

  float f = 5;

  double d = 6;

  int ii = 6;

  double resd = l + d;

  long  resl = s + 3;

  //等等

  if (b = b) {

  System.out.println("int val >= byte val");

  }

  if (l > b) {

  System.out.println("long val > byte val");

  }

  if(d > i) {

  System.out.println("double val > byte val");

  }

  if(i == i) {

  System.out.println("double val == int val");

  }

  }

  }

  ```


  请确保，如果您遇到需要编写此类不规范的代码（非最优代码结构）的情况，一定要进行大量测试，并仔细考虑您的转换，尤其是在涉及浮点类型时，因为例如以下代码片段可能会产生意外结果。


  ```

  package com.apress.bgn.ch6;

  public class DecimalPointDemo {

  public static void main(String... args) {

  float f1 = 2.2f;

  float f2 = 2.0f;

  float f3 = f1 * f2;

  if (f3 == 4.4) {

  System.out.println("expected float value of 4.4");

  } else {

  System.out.println("unexpected value of " + f3);

  }

  }

  }

  ```


  如果您期望在控制台中打印消息 *expected float value of 4.4*，您会感到惊讶。任何 IEEE 754 浮点数表示都会出现问题，因为一些在十进制系统中看起来具有固定小数位数的数字，在二进制系统中实际上具有无限小数位数。因此，我们不能使用
  `==` 来比较浮点数和双精度数。最容易实现的解决方案之一是使用包装类提供的 `compare` 方法；在本例中，是 `Float.compare`。


  ```

  package com.apress.bgn.ch6;

  public class DecimalPointDemo {

  public static void main(String... args) {

  float f1 = 2.2f;

  float f2 = 2.0f;

  float f3 = f1 * f2;

  if (Float.compare(f3,4.4f) == 0) {

  System.out.println("expected float value of 4.4");

  } else {

  System.out.println("unexpected value of " + f3);

  }

  }

  }

  ```


  使用前面的示例，现在控制台中会打印预期的消息：*expected float value of 4.4.*


  ### 位运算符


  在 Java 中，有一些运算符用于在位级别操作数值类型的变量。位运算符用于更改操作数中的单个位。位运算速度更快，并且由于资源使用减少，通常功耗更低。它们在编程可视化应用程序、游戏中最有用，在这些应用中，可以使用位运算快速确定颜色、鼠标点击和移动。


  ### 按位非


  `~` 运算符有点像二进制取反器。它对整数值逐位进行反转。当然，这会影响用于表示该值的所有位。因此，如果我们声明


  ```

  byte b1 = 10;

  ```


  其二进制表示为 00001010。`Integer` 类提供了一个名为 `toBinaryString` 的方法，可以打印之前定义的变量的二进制表示，但它不会打印所有位，因为该方法不知道我们希望在多少位上表示该值。因此，我们需要使用一个特殊的
  `String` 函数来格式化输出。以下代码片段在 8 位上打印 b 值的二进制形式。


  ```

  System.out.println("decimal:" + b1);

  String str = String.format("%8s", Integer.toBinaryString(b1 & 0xFF))

  .replace('' '', ''0'');

  System.out.println("binary:" + str);

  ```


  如果我们在 b 值上应用 `~` 运算符，得到的二进制值为 11110101。第一位是符号位，值为 1 对应 `-`。因此，该数字是 –11，如下代码所示。


  ```

  byte b2 = (byte) ~b1;

  System.out.println("decimal:" + b2);

  String str2 = String.format("%8s", Integer.toBinaryString(b2 & 0xFF))

  .replace('' '', ''0'');

  System.out.println("binary:" + str2);

  ```


  在前面的示例中，您可能注意到了这条语句：


  ```

  byte b2 = (byte) ~b1

  ```


  您期待一个解释。按位补码表达式运算符要求操作数可转换为基本整数类型，否则会发生编译时错误。在内部，Java 使用一个或多个字节来表示值。`~` 运算符将其操作数转换为
  `int` 类型，因此在进行补码运算时可以使用 32 位；这是为了避免精度损失所必需的。这就是为什么在前面的示例中需要显式转换为 `byte` 的原因。


  并且由于图像能让一切更清晰，图 6-2 展示了 `~` 对 `b1` 变量各位的影响，并与其值进行了对比。


