  ## 游戏项目：太空岩石


  在启动新游戏项目时，在编写任何代码之前，详细规划功能至关重要。游戏设计文档是创建游戏的蓝图或总体规划：它描述了游戏的总体愿景，提供了清晰度和重点，并作为游戏开发人员的指南和参考。本书附录中更详细地描述了游戏设计文档。随着本书中每个新游戏的引入，将按照此类文档的指导方针给出详细描述；以下是对《太空岩石》游戏的描述。


  《太空岩石》是一款太空主题的射击游戏。玩家控制一艘宇宙飞船，其目标是发射激光并摧毁在屏幕上飞行的岩石。游戏世界采用俯视视角，并具有环绕功能：当物体移出屏幕边缘时，它会从对侧边缘重新出现。


  宇宙飞船可以向左和向右旋转，并朝其面对的方向加速。减速效果非常小。飞船能够发射激光，激光沿直线飞行一秒钟，如果未与岩石碰撞，则会逐渐淡出并从游戏中消失。如果激光击中岩石，则激光和岩石都会被摧毁。飞船被护盾包围。如果护盾激活时飞船被岩石击中，岩石会被摧毁，护盾会失去能量。当护盾能量降至
  0 后，护盾消失，此时被岩石击中会摧毁飞船并结束游戏。飞船还具有瞬间随机传送到屏幕上新位置的能力。


  玩家使用方向键控制飞船左右旋转和向前加速。由于减速效果很小，为了突然停止，玩家必须掉头并向相反方向加速。使用空格键发射激光，玩家可以随心所欲地快速发射。使用 X
  键激活传送。虽然这可用于快速躲避即将发生的碰撞，但也有可能传送到岩石上，因此玩家可能会谨慎使用此能力。


  本游戏所需的图形包括用于背景的星空图，以及用于飞船、激光和岩石的图像。将使用特效来提供视觉用户反馈。当岩石或飞船被摧毁时，会有爆炸动画；当玩家加速时，会出现火箭推进器火焰图像；当使用传送能力时，会出现一个虫洞效果动画，该动画会出现在飞船的原始位置和新位置。如果玩家获胜，将显示“恭喜”消息；如果玩家失败，将显示“游戏结束”消息。


  首先，在 BlueJ 中创建一个名为 `Space Rocks` 的新项目。从本书网站下载本章的源代码文件。在 BlueJ 创建的项目目录中，创建一个名为 `assets`
  的新文件夹。将下载项目 `assets` 文件夹中的所有图像文件复制到新项目的 `assets` 文件夹中。接下来（如果您尚未设置 BlueJ 的 `userlibs`
  文件夹），在您的项目目录中，创建一个名为 `+libs` 的新文件夹。将下载项目 `+libs` 文件夹中的 JAR 文件复制到新项目的 `+libs` 文件夹中。从您之前的
  BlueJ 项目（Starfish Collector Ch 3）中，将 `BaseGame.java`、`BaseScreen.java` 和 `BaseActor.java`
  文件复制到 Space Rocks 项目目录中。重新启动 BlueJ，以便 BlueJ 能正确识别新添加到 `+libs` 文件夹中的 Java 源代码和 JAR
  文件。


  ## 离散输入


  在上一章的《海星收集者》游戏中，乌龟执行的唯一动作是移动。您通过在每个可能的时刻（在 `act` 方法中，该方法每秒运行 60 次）检查某些键是否被按住，如果是，则让乌龟向相应方向加速来处理此问题。这是一个连续动作的示例：一个在一段时间间隔内发生的动作。连续动作的其他示例包括行走、旋转或睡眠。相比之下，离散动作发生在单个时间瞬间。示例包括跳跃、击中物体或发射抛射物。对于键盘，连续动作通常涉及按住一个键一段时间，而离散动作则在按下键的瞬间触发。基于鼠标的动作也可以归入这两类：点击按钮是离散动作，而拖动滑块是连续动作。


  将添加到自定义框架类的主要新功能是处理离散输入的能力。到目前为止，您一直在使用一种称为输入轮询的技术：反复检查输入设备（例如键盘）的状态。具体来说，您一直在 `act`
  或 `update` 方法（通常每秒运行 60 次）中检查特定键是否被按住。这是处理连续动作的好方法，但这种方法不适用于离散动作。


  幸运的是，LibGDX 库也提供了处理离散事件的框架。这涉及编写在特定事件发生时（例如，首次按下或释放键，或点击鼠标按钮）自动调用的函数。任何对象都可以被分配响应离散输入事件的责任，但为了正确执行此操作，它必须包含一组特定的方法：即
  `InputProcessor` 接口指定的方法。该接口总共需要八个方法：


  *   `keyDown`、`keyUp` 和 `keyTyped` 用于处理键盘事件

  *   `touchDown`、`touchUp` 和 `touchDragged` 用于处理鼠标和触摸屏事件

  *   `mouseMoved` 和 `scrolled` 用于处理鼠标事件


  本节中我们需要解决的最后一个问题是：哪个对象应该承担响应输入事件的责任？一方面，`Stage` 类已经实现了 `InputProcessor` 接口；这对于包含用户界面元素的
  `Stage` 特别有用，因为它使类似按钮的对象在被点击时能够激活方法。另一方面，如果 `BaseScreen` 类实现了 `InputProcessor` 接口，那么当您编写一个扩展
  `BaseScreen` 的类时，您的类就可以包含处理离散键盘输入的方法，这将非常方便。那么，应该由 `Stage` 类还是 `BaseScreen` 类来负责响应输入事件呢？在实践中，您希望两个对象都有机会这样做。在您的代码中，这种安排将通过
  `InputMultiplexer` 类来实现。一个 `InputMultiplexer` 对象本身就是一个 `InputProcessor`，它包含一个其他
  `InputProcessor` 的列表。您可以将 `Stage` 和 `BaseScreen` 对象添加到一个 `InputMultiplexer` 中，当输入事件发生时，`InputMultiplexer`
  会将输入数据转发给这些对象中的每一个，并让它们有机会做出相应的响应。


  首先，您将修改 `BaseGame` 类。添加以下 `import` 语句：


  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.InputMultiplexer;

  ```


  接下来，您将向 `BaseGame` 类添加一个 `create` 方法，该方法由 LibGDX 自动调用，并将用于初始化 `InputMultiplexer`
  对象。（添加 `InputProcessors` 将在稍后由 `BaseScreen` 类处理。）



  ```content

  ```

  public void create()

  {

  // 准备让多个类/阶段接收离散输入

  InputMultiplexer im = new InputMultiplexer();

  Gdx.input.setInputProcessor( im );

  }

  ```


  现在，请将注意力转向 `BaseScreen` 类。首先，添加以下 `import` 语句：


  ```

  import com.badlogic.gdx.InputProcessor;

  import com.badlogic.gdx.InputMultiplexer;

  ```


  接下来，你需要修改类的声明，以表明 `InputProcessor` 的方法将由该类实现。你可以通过在关键字 `implements` 后列出多个接口，并用逗号分隔来声明实现多个接口¹，如下所示：


  ```

  public abstract class BaseScreen implements Screen, InputProcessor

  ```


  你需要为 `InputProcessor` 接口要求的所有方法添加空方法；任何你实际计划使用的方法，都可以在 `BaseScreen` 类的扩展中重写。你会注意到这些方法都返回一个布尔值。该值表示此输入数据是否已由该
  `InputProcessor` 完全处理；如果设置为 `true`，则输入数据将不会发送到存储在 `InputMultiplexer` 中的任何其他 `InputProcessor`。所有默认值都设置为
  `false`，以便每个 `InputProcessor` 都有机会处理数据。你需要添加的方法如下：


  ```

  // InputProcessor 接口要求的方法

  public boolean keyDown(int keycode)

  {  return false;  }

  public boolean keyUp(int keycode)

  {  return false;  }

  public boolean keyTyped(char c)

  {  return false;  }

  public boolean mouseMoved(int screenX, int screenY)

  {  return false;  }

  public boolean scrolled(int amount)

  {  return false;  }

  public boolean touchDown(int screenX, int screenY, int pointer, int button)

  {  return false;  }

  public boolean touchDragged(int screenX, int screenY, int pointer)

  {  return false;  }

  public boolean touchUp(int screenX, int screenY, int pointer, int button)

  {  return false;  }

  ```


  最后，当此屏幕显示时，应将两个 `Stage` 对象和 `BaseScreen` 类本身添加到游戏的 `InputMultiplexer` 中，并在设置新屏幕时从
  `InputMultiplexer` 中移除。添加此代码的最佳位置是在 `show` 和 `hide` 方法中（之前由 `Screen` 接口要求），这两个方法分别在屏幕在游戏中出现和消失时被调用。首先，按如下方式修改
  `show` 方法：


  ```

  public void show()

  {

  InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();

  im.addProcessor(this);

  im.addProcessor(uiStage);

  im.addProcessor(mainStage);

  }

  ```


  然后，按如下方式修改 `hide` 方法：


  ```

  public void hide()

  {

  InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();

  im.removeProcessor(this);

  im.removeProcessor(uiStage);

  im.removeProcessor(mainStage);

  }

  ```


  至此，你已经准备好处理离散输入，并且可以为 Space Rocks 游戏中的游戏实体创建自定义类。


  ## 飞船设置


  在本节中，你将添加飞船及其相关功能和能力的代码：环绕屏幕、飞船加速时出现的推进器、环绕飞船并多次保护其免受岩石碰撞的护盾，以及将飞船移动到屏幕上随机位置的传送能力。


  首先，使用以下代码创建一个名为 `Spaceship` 的新类：


  ```

  import com.badlogic.gdx.scenes.scene2d.Stage;

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.Input.Keys;

  public class Spaceship extends BaseActor

  {

  public Spaceship(float x, float y, Stage s)

  {

  super(x,y,s);

  loadTexture( "assets/spaceship.png" );

  setBoundaryPolygon(8);

  setAcceleration(200);

  setMaxSpeed(100);

  setDeceleration(10);

  }

  public void act(float dt)

  {

  super.act( dt );

  float degreesPerSecond = 120; // 旋转速度

  if (Gdx.input.isKeyPressed(Keys.LEFT))

  rotateBy(degreesPerSecond * dt);

  if (Gdx.input.isKeyPressed(Keys.RIGHT))

  rotateBy(-degreesPerSecond * dt);

  if (Gdx.input.isKeyPressed(Keys.UP))

  accelerateAtAngle( getRotation() );

  applyPhysics(dt);

  }

  }

  ```


  该类处理加载图像、设置碰撞多边形以及指定物理设置的标准任务。请注意，减速度值接近于零；这是为了模拟外太空中使物体减速的摩擦力或空气阻力的缺失。还要注意在 `act`
  方法中，左右箭头键用于向左和向右旋转飞船（与 Starfish Collector 游戏中将物体向左和向右移动屏幕不同），而上箭头键则使飞船向前加速；即朝其当前面对的方向加速。


  下一个特征运动功能是环绕屏幕。由于 Space Rocks 游戏中的许多对象都共享此功能，你将通过在 `BaseActor` 类中添加以下方法来实现此功能：


  ```

  public void wrapAroundWorld()

  {

  if (getX() + getWidth() < 0)

  setX( worldBounds.width );

  if (getX() > worldBounds.width)

  setX( -getWidth());

  if (getY() + getHeight() < 0)

  setY( worldBounds.height );

  if (getY() > worldBounds.height)

  setY( -getHeight() );

  }

  ```


  请注意，此方法需要设置 `worldBounds` 对象才能正常工作。有了这个方法后，在 `Spaceship` 类的 `act` 方法末尾添加以下代码行：


  ```

  wrapAroundWorld();

  ```


  接下来，你将开始编写屏幕类，这将使你能够测试移动和环绕功能。创建一个名为 `LevelScreen` 的新类，其中包含以下代码：


