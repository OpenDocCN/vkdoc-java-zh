- "# 14. 迷宫游戏\n\n在本章中，你将学习如何创建基于迷宫的 Maze Runman 游戏，如图 14-1 所示，其灵感来源于诸如《吃豆人》等街机游戏以及\
  \ Atari 2600 主机游戏《迷宫狂热：警察与强盗》。本章的主要新概念是用于生成和解决迷宫的算法。\n\n![A352797_2_En_14_Fig1_HTML.jpg](img/A352797_2_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1.\n\nMaze Runman 游戏\n\n\n\n## 游戏项目：迷宫跑者\n\n迷宫跑者是一款动作游戏，主角（称为英雄）在迷宫中竞速，试图在被幽灵抓住前收集所有金币。幽灵的速度比英雄稍慢，但始终沿着最短路径追击玩家，即使这意味着当英雄在迷宫中移动时，幽灵需要突然改变方向。每次玩家开始游戏时，都会生成一个新的迷宫，有些迷宫布局可能比其他布局更难：可能存在英雄需要穿行的长死胡同。应对这种情况的一种策略是，让英雄将幽灵引到迷宫的另一端，为自己争取足够的时间进出走廊，以免被幽灵困住或逼入死角。如果幽灵与英雄接触，玩家立即失败；但如果英雄收集了所有金币，幽灵就会消失，玩家获胜。\n\
  \n游戏采用俯视视角，玩家使用方向键控制英雄向北、南、东、西移动。通过同时按住多个方向键，英雄可以斜向移动，这可能会根据迷宫布局提供一些微小的优势。用户界面包括屏幕顶部（迷宫区域上方）的一个标签，显示剩余金币数量，以及游戏结束时屏幕中央出现的大段文字信息，显示玩家获胜或失败的结果。\n\
  \n游戏世界使用简单的图形，英雄有四方向行走动画（类似于第 12 章《寻宝任务》游戏中使用的动画），幽灵则使用半透明动画。收集金币时会播放音效。此外，背景中会播放安静的环境风声，随着幽灵接近英雄，风声会逐渐变大。\n\
  \n开始此项目需要与之前项目类似的步骤。在 BlueJ 中，创建一个名为 `Maze Runman` 的新项目。在项目文件夹中，创建一个 `assets` 文件夹和一个包含\
  \ LibGDX JAR 文件的 `+libs` 文件夹（如果你已经设置了 `userlib` 目录，则后者不是必需的）。添加你在本书第一部分创建的自定义框架文件（`BaseGame.java`、`BaseScreen.java`、`BaseActor.java`）。此外，你应该下载本章的源文件，并将下载的\
  \ `assets` 文件夹中的内容复制到项目的 `assets` 文件夹中。\n\n## 迷宫生成\n\n本项目首要且最重要的任务是创建英雄和幽灵将要穿行的迷宫。虽然理论上你可以使用\
  \ Tiled 地图编辑器等关卡设计软件来创建迷宫，但在本章中，你将编写一个算法，每次玩家开始游戏时都会生成一个新的迷宫。这种方法的一个好处是大大增加了游戏的重玩价值；每次新的游戏会话都将是一次全新的体验。此类技术属于程序化内容生成的范畴：即使用算法创建结构化的游戏内容。它还可以包含诸如从代码创建整个纹理（而不是从图像文件加载）等技术，但通常不包括随机初始化游戏角色参数（如敌人大小或速度）或对游戏玩法没有影响的背景场景元素等技术。\n\
  \n你将用于迷宫生成的总体流程如下：首先，创建一个由房间组成的矩形网格（每个房间大小为 64x64 像素），并在每条边上放置墙壁。其次，以创建迷宫的方式移除房间之间的墙壁：从迷宫中的任意房间出发，玩家应该能够找到一条路径到达任何其他房间。第三，随机移除一些额外的墙壁，以在房间之间创建多条路径。\n\
  \n要实现此过程的第一步，你将创建一个 `Wall` 类，然后创建一个 `Room` 类（该类将包含四个 `Wall` 对象，并存储对相邻 `Room` 对象的引用），最后创建一个\
  \ `Maze` 类，该类将创建房间网格。为了进行测试，你将创建一个扩展 `BaseScreen` 的 `LevelScreen` 类、一个扩展 `BaseGame`\
  \ 的 `MazeGame` 类，以及一个用于运行游戏的 `Launcher` 类。\n\n首先，使用以下代码创建一个名为 `Wall` 的新类。请注意，构造函数还接受墙壁的宽度和高度作为参数；这将非常有用，因为在每个房间中，北墙和南墙的宽度更大，而东墙和西墙的高度更大。\n\
  \n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class Wall extends\
  \ BaseActor\n{\npublic Wall(float x, float y, float w, float h, Stage s)\n{\nsuper(x,y,s);\n\
  loadTexture(\"assets/square.jpg\");\nsetSize(w,h);\nsetBoundaryRectangle();\n}\n\
  }\n```\n\n接下来，按如下方式创建一个名为 `Room` 的类。请注意，其中有用于存储墙壁和相邻房间（称为邻居）引用的数组，以及一组命名常量，以便更轻松地识别每个数组索引代表的方向。此外，还有用于访问和修改这些数组中数据的方法。\n\
  \n\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport java.util.ArrayList;\n\
  public class Room extends BaseActor\n{\npublic static final int NORTH = 0;\npublic\
  \ static final int SOUTH = 1;\npublic static final int EAST  = 2;\npublic static\
  \ final int WEST  = 3;\npublic static int[] directionArray = {NORTH, SOUTH, EAST,\
  \ WEST};\nprivate Wall[] wallArray;\nprivate Room[] neighborArray;\npublic Room(float\
  \ x, float y, Stage s)\n{\nsuper(x,y,s);\nloadTexture(\"assets/dirt.png\");\nfloat\
  \ w = getWidth();\nfloat h = getHeight();\n// t = 墙壁厚度（像素）\nfloat t = 6;\nwallArray\
  \ = new Wall[4];\nwallArray[SOUTH] = new Wall(x,y, w,t, s);\nwallArray[WEST]  =\
  \ new Wall(x,y, t,h, s);\nwallArray[NORTH] = new Wall(x,y+h-t, w,t, s);\nwallArray[EAST]\
  \  = new Wall(x+w-t,y, t,h, s);\nneighborArray = new Room[4];\n// 该数组的内容将由 Maze\
  \ 类初始化\n}\npublic void setNeighbor(int direction, Room neighbor)\n{  neighborArray[direction]\
  \ = neighbor;  }\npublic boolean hasNeighbor(int direction)\n{  return neighborArray[direction]\
  \ != null;  }\npublic Room getNeighbor(int direction)\n{  return neighborArray[direction];\
  \  }\n// 检查该方向的墙壁是否仍然存在（尚未从舞台中移除）\npublic boolean hasWall(int direction)\n{  return\
  \ wallArray[direction].getStage() != null;  }\npublic void removeWalls(int direction)\n\
  {  removeWallsBetween(neighborArray[direction]);  }\npublic void removeWallsBetween(Room\
  \ other)\n{\nif (other == neighborArray[NORTH])\n{\nthis.wallArray[NORTH].remove();\n\
  other.wallArray[SOUTH].remove();\n}\nelse if (other == neighborArray[SOUTH])\n{\n\
  this.wallArray[SOUTH].remove();\nother.wallArray[NORTH].remove();\n}\nelse if (other\
  \ == neighborArray[EAST])\n{\nthis.wallArray[EAST].remove();\nother.wallArray[WEST].remove();\n\
  }\nelse // (other == neighborArray[WEST])\n{\nthis.wallArray[WEST].remove();\nother.wallArray[EAST].remove();\n\
  }\n}\n}\n```\n\n接下来，你将创建一个用于构建迷宫的类，尽管此时它只会设置房间网格，并为每个房间的每个方向（如果存在相邻房间）设置邻居数据（网格边缘的房间只有三个邻居，而网格角落的房间只有两个邻居）。使用以下代码创建一个名为\
  \ `Maze` 的新类：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport java.util.ArrayList;\n\
  public class Maze\n{\nprivate Room[][] roomGrid;\n// 迷宫尺寸常量\nprivate final int roomCountX\
  \ = 12;\nprivate final int roomCountY = 10;\nprivate final int roomWidth  = 64;\n\
  private final int roomHeight = 64;\npublic Maze(Stage s)\n{\nroomGrid = new Room[roomCountX][roomCountY];\n\
  for (int gridY = 0; gridY < roomCountY; gridY++)\n{\nfor (int gridX = 0; gridX <\
  \ roomCountX; gridX++)\n{\nRoom room = new Room(gridX * roomWidth, gridY * roomHeight,\
  \ s);\nroomGrid[gridX][gridY] = room;\nif (gridY > 0)\nroom.setNeighbor( Room.SOUTH,\
  \ roomGrid[gridX][gridY-1] );\nif (gridY < roomCountY - 1)\nroom.setNeighbor( Room.NORTH,\
  \ roomGrid[gridX][gridY+1] );\nif (gridX > 0)\nroom.setNeighbor( Room.WEST, roomGrid[gridX-1][gridY]\
  \ );\nif (gridX < roomCountX - 1)\nroom.setNeighbor( Room.EAST, roomGrid[gridX+1][gridY]\
  \ );\n}\n}\n}\npublic Room getRoom(int gridX, int gridY)\n{  return roomGrid[gridX][gridY];\
  \  }\n}\n```\n\n接下来，你将扩展 `BaseScreen` 类来设置显示游戏的屏幕。背景图像的大小由迷宫的大小决定，顶部还会预留一个区域用于显示剩余金币数量。由于每个房间是\
  \ 64x64 像素，迷宫横向有 12 个房间、纵向有 10 个房间，因此区域大小为 768x640 像素；另外还会额外保留 60 像素的高度用于用户界面。此外，你还需要添加玩家重新开始游戏的功能（按\
  \ R 键），这在玩家想要生成新迷宫，或者游戏结束想要重试时会很有用。按如下方式创建一个名为 `LevelScreen` 的类：\n\n```\nimport\
  \ com.badlogic.gdx.graphics.Color;\nimport com.badlogic.gdx.Input.Keys;\npublic\
  \ class LevelScreen extends BaseScreen\n{\nMaze maze;\npublic void initialize()\n\
  {\nBaseActor background = new BaseActor(0,0,mainStage);\nbackground.loadTexture(\"\
  assets/white.png\");\nbackground.setColor(Color.GRAY);\nbackground.setSize(768,\
  \ 700);\nmaze = new Maze(mainStage);\n}\npublic void update(float dt)\n{    }\n\
  public boolean keyDown(int keyCode)\n{\nif ( keyCode == Keys.R )\nBaseGame.setActiveScreen(\
  \ new LevelScreen() );\nreturn false;\n}\n}\n```\n\n接下来，你需要扩展 `BaseGame` 类来加载这个屏幕。按如下方式创建一个名为\
  \ `MazeGame` 的新类：\n\n```\npublic class MazeGame extends BaseGame\n{\npublic void\
  \ create()\n{\nsuper.create();\nsetActiveScreen( new LevelScreen() );\n}\n}\n```\n\
  \n最后，要运行游戏，你需要一个启动器风格的类。回顾 `LevelScreen` 类中背景对象的大小，使用以下代码创建一个名为 `Launcher` 的新类：\n\
  \n```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
  public class Launcher\n{\npublic static void main (String[] args)\n{\nGame myGame\
  \ = new MazeGame();\nLwjglApplication launcher = new LwjglApplication( myGame, \"\
  Maze Runman\", 768, 700 );\n}\n}\n```\n\n至此，你的项目已经可以测试了。运行 `Launcher` 类中的 `main`\
  \ 函数，你应该会看到如图 14-2 所示的屏幕。\n\n![A352797_2_En_14_Fig2_HTML.jpg](img/A352797_2_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2.\n\n初始化带有墙壁的房间网格\n\n第二步是移除一系列墙壁，以便你可以从任意房间到达其他任意房间。一种可用的算法称为深度优先搜索。在该算法中，选择一个房间作为起始位置，当某个房间存在从起始位置到该房间的路径时，则称该房间为已连接。该算法还会维护一个已连接房间的列表，这些房间拥有尚未连接的邻居房间。该算法的伪代码如下：\n\
  \n*   选择一个房间作为起始位置；将其标记为已连接并添加到列表中。\n*   当列表中仍有房间时：\n    *   将 `currentRoom` 设为列表中最晚添加的房间。\n\
  \    *   如果 `currentRoom` 有任何未连接的邻居，\n        *   将 `nextRoom` 设为 `currentRoom`\
  \ 的一个随机未连接邻居；\n        *   移除 `currentRoom` 和 `nextRoom` 之间的墙壁；\n        *   将 `nextRoom`\
  \ 标记为已连接；并且\n        *   将 `nextRoom` 添加到列表末尾。\n*   如果 `currentRoom` 没有任何未连接的邻居，则将其从列表中移除。\n\
  \n当该算法完成时，不再有已连接且拥有未连接邻居的房间；所有房间都已连接！该算法生成的迷宫如图 14-3 所示。\n\n![A352797_2_En_14_Fig3_HTML.jpg](img/A352797_2_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3.\n\n使用深度优先算法生成的示例迷宫\n\n顾名思义，深度优先算法会创建在网格中随机移动的路径，尽可能长（或深）地延伸，直到路径到达死胡同（一个没有相邻未连接房间的房间）。此时，将生成另一条路径，从列表中最晚添加的房间分支出去。从图\
  \ 14-3 的示例迷宫可以看出，这通常会生成只包含少数几条非常长且分支点很少的路径的迷宫。为了创建更多的分支点，你可以将 `while` 循环中的第一行改为\
  \ `将 currentRoom 设为列表中的一个随机房间`。这将产生相反的效果：迷宫将不再只有少数几条长路径，而是会产生大量短路径和许多死胡同；图 14-4\
  \ 展示了一些示例。\n\n![A352797_2_En_14_Fig4_HTML.jpg](img/A352797_2_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4.\n\n\n\n通过始终随机选择房间来生成分支路径的示例迷宫\n\n本章将采用的方法是这两种方法的混合：以 0.50 的概率，算法会返回列表中一个较早的随机房间。这种方法生成的迷宫走廊长度适中，且分支路径比深度优先算法更多。图\
  \ 14-5 展示了使用该技术生成的一些示例迷宫。\n\n![A352797_2_En_14_Fig5_HTML.jpg](img/A352797_2_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5.\n\n使用混合方法生成的示例迷宫\n\n为实现该算法，在`Room`类中添加以下变量声明：\n\n```\nprivate boolean\
  \ connected;\n```\n\n在构造函数中，将该变量初始化为 false：\n\n```\nconnected = false;\n```\n\n\
  然后，添加以下方法，用于设置和检查`connected`的值、判断是否有相邻房间已连接，并随机选择一个未连接的相邻房间：\n\n```\npublic void\
  \ setConnected(boolean b)\n{  connected = b;  }\npublic boolean isConnected()\n\
  {  return connected;  }\npublic boolean hasUnconnectedNeighbor()\n{\nfor (int direction\
  \ : directionArray)\n{\nif ( hasNeighbor(direction) && !getNeighbor(direction).isConnected()\
  \ )\nreturn true;\n}\nreturn false;\n}\npublic Room getRandomUnconnectedNeighbor()\n\
  {\nArrayList directionList = new ArrayList();\nfor (int direction : directionArray)\n\
  {\nif ( hasNeighbor(direction) && !getNeighbor(direction).isConnected() )\ndirectionList.add(direction);\n\
  }\nint directionIndex = (int)Math.floor( Math.random() * directionList.size() );\n\
  int direction = directionList.get(directionIndex);\nreturn getNeighbor(direction);\n\
  }\n```\n\n接下来，在创建迷宫时将使用这些方法。在`Maze`类的构造函数中，在设置每个房间相邻数据的代码之后，添加以下内容：\n\n```\nArrayList\
  \ activeRoomList = new ArrayList();\nRoom currentRoom = roomGrid[0][0];\ncurrentRoom.setConnected(true);\n\
  activeRoomList.add(0, currentRoom);\n// 返回随机已连接房间的概率\n// 以从该房间创建分支路径\nfloat branchProbability\
  \ = 0.5f;\nwhile (activeRoomList.size() > 0)\n{\nif (Math.random() < branchProbability)\n\
  {\n// 获取随机先前访问过的房间\nint roomIndex = (int)(Math.random() * activeRoomList.size());\n\
  currentRoom = activeRoomList.get(roomIndex);\n}\nelse\n{\n// 获取最近访问过的房间\ncurrentRoom\
  \ = activeRoomList.get(activeRoomList.size() - 1);\n}\nif ( currentRoom.hasUnconnectedNeighbor()\
  \ )\n{\nRoom nextRoom = currentRoom.getRandomUnconnectedNeighbor();\ncurrentRoom.removeWallsBetween(nextRoom);\n\
  nextRoom.setConnected( true );\nactiveRoomList.add(0, nextRoom);\n}\nelse\n{\n//\
  \ 该房间没有更多相邻的未连接房间\n// 因此无需将其保留在列表中\nactiveRoomList.remove( currentRoom );\n}\n}\n\
  ```\n\n对迷宫生成算法的最后一项改进是移除随机数量的墙壁。这对于创建循环路径至关重要，这将为玩家提供多种选择，让英雄在迷宫中灵活移动，并避开不断逼近的幽灵。结果将类似于图\
  \ 14-6 中所示的迷宫。\n\n![A352797_2_En_14_Fig6_HTML.jpg](img/A352797_2_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6.\n\n随机移除额外墙壁后生成的迷宫，在不同位置之间创建了多条路径\n\n为实现此目标，在`Maze`类的`constructor`方法末尾添加以下代码。`wallsToRemove`的值可根据需要调整。\n\
  \n```\nint wallsToRemove = 24;\nwhile (wallsToRemove > 0)\n{\nint gridX = (int)Math.floor(\
  \ Math.random() * roomCountX );\nint gridY = (int)Math.floor( Math.random() * roomCountY\
  \ );\nint direction = (int)Math.floor( Math.random() * 4 );\nRoom room = roomGrid[gridX][gridY];\n\
  if ( room.hasNeighbor(direction) && room.hasWall(direction) )\n{\nroom.removeWalls(direction);\n\
  wallsToRemove--;\n}\n}\n```\n\n至此，迷宫生成已完成，接下来可以添加英雄：由玩家控制的角色。\n\n## 英雄\n\n接下来为 Maze\
  \ Runman 游戏添加英雄角色，他将负责在迷宫中导航。该角色将包含四个基本方向（北、南、东、西）的行走动画，如图 14-7 所示的精灵表。¹\n\n![A352797_2_En_14_Fig7_HTML.jpg](img/A352797_2_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7.\n\n用于四方向英雄动画的精灵表\n\n设置动画的代码以及根据运动角度确定使用哪个动画的逻辑，与第 12 章 Treasure Quest\
  \ 游戏中的代码完全相同。有关更多详细信息，可查阅相应章节的说明。按如下方式创建一个名为`Hero`的新类：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
  import com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\nimport com.badlogic.gdx.graphics.Texture;\n\
  import com.badlogic.gdx.graphics.g2d.TextureRegion;\nimport com.badlogic.gdx.graphics.g2d.Animation;\n\
  import com.badlogic.gdx.utils.Array;\npublic class Hero extends BaseActor\n{\nAnimation\
  \ north;\nAnimation south;\nAnimation east;\nAnimation west;\npublic Hero(float\
  \ x, float y, Stage s)\n{\nsuper(x,y,s);\nString fileName = \"assets/hero.png\"\
  ;\nint rows = 4;\nint cols = 3;\nTexture texture = new Texture(Gdx.files.internal(fileName),\
  \ true);\nint frameWidth = texture.getWidth() / cols;\nint frameHeight = texture.getHeight()\
  \ / rows;\nfloat frameDuration = 0.2f;\nTextureRegion[][] temp = TextureRegion.split(texture,\
  \ frameWidth, frameHeight);\nArray textureArray = new Array();\nfor (int c = 0;\
  \ c = 45 && angle  135 && angle = 225 && angle <= 315)\nsetAnimation(south);\nelse\n\
  setAnimation(east);\n}\napplyPhysics(dt);\n}\n}\n```\n\n然后，要将英雄整合到游戏中，在`LevelScreen`类中添加以下变量声明：\n\
  \n```\nHero hero;\n```\n\n要在迷宫左下角设置并放置英雄，请在`initialize`方法中添加以下内容：\n\n```\nhero =\
  \ new Hero(0,0,mainStage);\nhero.centerAtActor( maze.getRoom(0,0) );\n```\n\n最后，要添加英雄与墙壁之间的碰撞检测，请在`update`方法中添加以下内容：\n\
  \n```\nfor (BaseActor wall : BaseActor.getList(mainStage, \"Wall\"))\n{\nhero.preventOverlap(wall);\n\
  }\n```\n\n至此，你可以测试程序，并按方向键让英雄在迷宫中移动。\n\n\n\n## 幽灵\n\n接下来，你将创建一个幽灵角色，它会在迷宫中追逐英雄。用于确定幽灵行进路径的算法，其关键特征是：该路径是幽灵所在房间（称为\
  \ `startRoom`）与英雄所在房间（称为 `targetRoom`）之间的最短路径。在此算法中，房间被访问的顺序非常重要：距离 `startRoom`\
  \ 较近的房间应优先于距离较远的房间被考虑。所有距离 `startRoom` 一格远的房间会首先被检查，接着是距离两格远的房间，然后是三格远的，以此类推。按此顺序考虑房间的算法称为**广度优先搜索算法**，这与最初生成迷宫时使用的深度优先算法形成对比。在搜索路径时，还有两个实际注意事项需要考虑。首先，由于迷宫中存在循环路径，你需要跟踪哪些房间已被算法考虑过，以避免重复考虑它们。这将通过一个名为\
  \ `visited` 的布尔变量来跟踪。其次，在搜索路径时，你需要跟踪房间被考虑的序列：每个距离 `startRoom` 为 n+1 格的房间，都是在考虑了某个距离\
  \ `startRoom` 为 n 格的房间后到达的。此信息将存储在一个名为 `previousRoom` 的 `Room` 变量中。该算法的伪代码如下：\n\n\
  *   确定 `startRoom` 和 `targetRoom`。\n*   将 `currentRoom` 设置为 `startRoom`。\n*   将\
  \ `currentRoom` 标记为已访问，将其前一个房间设置为 `null`，并将 `currentRoom` 添加到一个列表中。\n*   当列表不为空时，执行以下操作：\n\
  \    *   将 `currentRoom` 设置为列表中的第一个元素，并将其从列表中移除。\n    *   对于 `currentRoom` 的每个未访问的邻居（称为\
  \ `nextRoom`），\n        *   将 `nextRoom` 的前一个房间设置为 `currentRoom`；\n        *   如果\
  \ `nextRoom` 是 `targetRoom`，则结束`算法`；`并且`\n        *   如果 `nextRoom` 不是 `targetRoom`，则将\
  \ `nextRoom` 标记为已访问，并将 `nextRoom` 添加到列表末尾。\n\n一旦此算法完成，可以按如下方式检索路径：将 `currentRoom`\
  \ 设置为 `targetRoom`，并将其添加到一个新的房间列表中。然后，将 `currentRoom` 设置为其前一个房间，并将其添加到列表的前面。重复此过程，直到\
  \ `currentRoom` 没有前一个房间（`previousRoom` 为 `null`；这仅对 `startRoom` 成立）。此时，该列表包含一系列房间，这些房间构成了从\
  \ `startRoom` 到 `targetRoom` 的最短路径。\n\n该算法的一个实际示例如图 14-8 所示。右上角的房间（由幽灵占据）是 `startRoom`，靠近左下角的房间（由英雄占据）是\
  \ `targetRoom`。房间用数字标记，表示算法访问它们的顺序，并用箭头指示每个房间的前一个房间。在图中，房间 1 和 2 距离幽灵一格远，房间 3 和\
  \ 4 距离两格远，5 和 6 距离三格远，7 和 8 距离四格远，9、10、11 和 12 距离五格远，13、14 和 `targetRoom` 距离六格远。一旦找到目标房间，沿着前一个房间的序列即可得到路径，该路径由\
  \ `startRoom`、1、3、5、7、10、`targetRoom` 组成——这是通往英雄的最短路径之一。\n\n![A352797_2_En_14_Fig8_HTML.jpg](img/A352797_2_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8.\n\n为找到从幽灵到英雄的最短路径而访问房间的顺序\n\n为了实现此算法，每个房间需要跟踪它在算法中是否已被访问，以及之前访问的房间是哪个。为此，在\
  \ `Room` 类中添加以下变量：\n\n```\nprivate boolean visited;\nprivate Room previousRoom;\n\
  ```\n\n在`构造函数`方法中将 `visited` 初始化为 false：\n\n```\nvisited = false;\n```\n\n接下来，你需要一些方法来获取和设置这些新变量，以及检索一个房间所有尚未被访问的相邻邻居。这可以通过以下代码实现，这些代码也应添加到\
  \ `Room` 类中：\n\n```\npublic void setVisited(boolean b)\n{  visited = b;  }\npublic\
  \ boolean isVisited()\n{  return visited;  }\npublic void setPreviousRoom(Room r)\n\
  {  previousRoom = r;  }\npublic Room getPreviousRoom()\n{  return previousRoom;\
  \  }\n// 用于路径查找：定位尚未被访问的可达邻居\npublic ArrayList unvisitedPathList()\n{\nArrayList\
  \ list = new ArrayList();\nfor (int direction : directionArray)\n{\nif ( hasNeighbor(direction)\
  \ && !hasWall(direction) &&\n!getNeighbor(direction).isVisited() )\nlist.add( getNeighbor(direction)\
  \ );\n}\nreturn list;\n}\n```\n\n拥有一个能够识别幽灵和英雄所在房间，并重置每个房间的 `visited` 和 `previousRoom`\
  \ 变量的方法会很有帮助，这在搜索新路径之前是必需的。在 `Maze` 类中，添加以下方法来执行这些任务：\n\n```\npublic Room getRoom(BaseActor\
  \ actor)\n{\nint gridX = (int)Math.round(actor.getX() / roomWidth);\nint gridY =\
  \ (int)Math.round(actor.getY() / roomHeight);\nreturn getRoom(gridX, gridY);\n}\n\
  public void resetRooms()\n{\nfor (int gridY = 0; gridY < roomCountY; gridY++)\n\
  {\nfor (int gridX = 0; gridX < roomCountX; gridX++)\n{\nroomGrid[gridX][gridY].setVisited(\
  \ false );\nroomGrid[gridX][gridY].setPreviousRoom( null );\n}\n}\n}\n```\n\n接下来，你将创建\
  \ `Ghost` 类，其中包含一个名为 `findPath` 的方法，该方法实现了前面描述的广度优先搜索算法。该方法会向角色添加一系列动作，使其沿着路径的前几个房间移动。幽灵不会一直沿着路径走到终点，因为到那时英雄可能已经移动到了不同的位置。相反，每次幽灵完成其当前的一组移动动作后，到英雄的路径会被重新计算，并沿着这条新路径向幽灵添加一组新的移动动作。创建一个名为\
  \ `Ghost` 的新类，代码如下：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport\
  \ com.badlogic.gdx.scenes.scene2d.Action;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
  import java.util.ArrayList;\npublic class Ghost extends BaseActor\n{\npublic float\
  \ speed = 60; // 像素每秒\npublic Ghost(float x, float y, Stage s)\n{\nsuper(x,y,s);\n\
  loadAnimationFromSheet(\"assets/ghost.png\", 1,3, 0.2f, true);\nsetOpacity(0.8f);\n\
  }\npublic void findPath(Room startRoom, Room targetRoom)\n{\nRoom currentRoom =\
  \ startRoom;\nArrayList roomList = new ArrayList();\ncurrentRoom.setPreviousRoom(\
  \ null );\ncurrentRoom.setVisited( true );\nroomList.add(currentRoom);\nwhile (roomList.size()\
  \ > 0)\n{\ncurrentRoom = roomList.remove(0);\nfor (Room nextRoom : currentRoom.unvisitedPathList())\n\
  {\nnextRoom.setPreviousRoom( currentRoom );\nif (nextRoom == targetRoom)\n{\n//\
  \ 找到目标！\nroomList.clear();\nbreak;\n}\nelse\n{\nnextRoom.setVisited( true );\nroomList.add(nextRoom);\n\
  }\n}\n}\n// 创建对应最短路径的房间列表\nArrayList pathRoomList = new ArrayList();\ncurrentRoom\
  \ = targetRoom;\nwhile (currentRoom != null)\n{\n// 将当前房间添加到列表开头\npathRoomList.add(\
  \ 0, currentRoom );\ncurrentRoom = currentRoom.getPreviousRoom();\n}\n// 仅沿路径移动几步；\n\
  //   当这些动作完成时，路径将被重新计算。\nint maxStepCount = 2;\n// 要消除步骤之间的停顿，请将循环索引从 1 开始\n// \
  \  但相应地降低幽灵速度以作补偿\nfor (int i = 0; i < pathRoomList.size(); i++)\n{\nif (i == maxStepCount)\n\
  break;\nRoom nextRoom = pathRoomList.get(i);\nAction move = Actions.moveTo( nextRoom.getX(),\
  \ nextRoom.getY(), 64/speed );\naddAction( move );\n}\n}\n}\n```\n\n\n\n要将幽灵整合到游戏中，请在\
  \ `LevelScreen` 类中添加以下变量声明：\n\n```\nGhost ghost;\n```\n\n通过将以下代码添加到 `initialize`\
