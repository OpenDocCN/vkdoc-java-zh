  \ 随后会将源代码文件重命名为`JumpingJackGame.java`）。\n*   在`Launcher`类中，将`main`方法的内容修改为：\n\n\
  \    ```\n    Game my Game = new JumpingJackGame ();\n    LwjglApplication launcher\
  \ = new LwjglApplication(\n    myGame, \"Jumping Jack\", 800, 640 )\n    ```\n\n\
  ## 开始关卡\n\n首先，启动 Tiled 地图编辑器软件。创建新地图，地图尺寸设置为宽度 50 个瓦片、高度 20 个瓦片，瓦片尺寸宽度和高度均设为 32\
  \ 像素。生成的地图尺寸将为 1600 像素×640 像素。点击\"另存为...\"按钮，将文件以文件名`map.tmx`保存到`assets`目录。\n\n\
  接下来，为地图添加一个图像层和一个对象层，并重新排列图层顺序，使瓦片层位于列表中间。在\"图层\"面板中选择\"图像层 1\"，在\"属性\"面板中将图像设置为`background.png`（其尺寸与瓦片地图大小匹配）。然后，在\"\
  图块集\"面板中，使用图像`platform-tileset.png`（如图 11-2 左侧所示）添加新图块集，设置瓦片尺寸为 32×32，并勾选将图块集嵌入地图的复选框。以相同方式为地图添加另一个新图块集，这次使用图像`object-tileset.png`（如图\
  \ 11-2 右侧所示）。由于对象瓦片将用于指示游戏世界对象的生成位置，你需要指定对应的 Java 类（稍后创建）。在\"图块集\"面板中，选择`object-tileset`并点击编辑图块集的图标。在出现的选项卡中，你需要逐个点击每个瓦片，并为每个瓦片添加新的自定义属性。该属性应命名为`name`；各瓦片（从左到右）对应的值分别为`Coin`、`Flag`、`Timer`、`Springboard`、`Platform`、`Key`和`Lock`。此外，对于钥匙和锁对象瓦片，添加第二个名为`color`的自定义属性，值为`red`。（此默认颜色可在后续瓦片地图编辑器中为特定实例覆盖）。\n\
  \n![A352797_2_En_11_Fig2_HTML.jpg](img/A352797_2_En_11_Fig2_HTML.jpg)\n\n图 11-2.\n\
  \n瓦片层（左）和对象层（右）的图块集\n\n返回显示瓦片地图的选项卡。在\"图层\"面板中选择\"瓦片层 1\"。在\"图块集\"面板中选择`platform-tileset`，然后按\
  \ B 键激活图章刷工具。在地图底部行添加瓦片，同时添加一些代表可跳跃实体的瓦片以及一些场景装饰。注意云朵图形占用两个瓦片，因此应以相邻成对的方式添加这些瓦片。图\
  \ 11-3 展示了一种可能的布局（为清晰起见仅显示地图部分区域）。\n\n![A352797_2_En_11_Fig3_HTML.jpg](img/A352797_2_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3.\n\n瓦片层的添加内容\n\n\n\n需要注意的是，图块层仅用于简化从图块集创建图像的过程；使用 `TilemapActor` 类中的 `getTileList`\
  \ 方法时，不会返回这些图块中的任何一个。相反，对于由代表实心物体（与代表场景的图块相对）的图块所覆盖的区域，你需要在对象层中添加矩形，以存储对应这些区域的数据。在图层面板中，选择对象层\
  \ 1，然后按 R 键激活矩形工具。在所有包含实心图块的区域周围绘制矩形；为简单起见，可以绘制一次包围多个图块的矩形。为了使矩形与网格对齐，如果“视图”菜单中的“对齐到网格”设置尚未激活，你可能需要将其激活。对于图\
  \ 11-3 所示的设计，你需要在地面、浮动平台以及由箱子组成的楼梯周围添加矩形，但不要为那两块带有草地图片的图块添加。每次添加这些矩形时，还必须添加一个名为\
  \ `name`、值为 `Solid` 的自定义属性（稍后将用于初始化相应的角色），或者你可以先创建所有矩形，然后使用选择工具一次性为它们赋予相同的属性。最后，在考拉应该开始关卡的位置添加一个矩形，并添加一个名为\
  \ `name`、值为 `Start` 的自定义属性。将这一过程应用于图 11-3 所示的设计，会得到图 11-4 所示的结果，其中矩形以灰色边框绘制。现在也是保存你的图块地图文件的好时机！\n\
  \n![A352797_2_En_11_Fig4_HTML.jpg](img/A352797_2_En_11_Fig4_HTML.jpg)\n\n图 11-4.\n\
  \n添加矩形对象以指示实心物体\n\n接下来，在 BlueJ 中打开 `Jumping Jack` 项目。你需要一种方式来表示与实心物体对应的区域。为此，创建一个名为\
  \ `Solid` 的新类，其中包含以下代码。由于此对象不使用图形（图块地图决定了这些区域将显示的图形），因此必须直接设置这些对象的大小和边界形状，宽度和高度值通过构造函数传入。请注意，此类还包含启用和禁用对象实心状态的功能；本章稍后介绍的平台和锁对象将需要此功能。\n\
  \n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class Solid extends\
  \ BaseActor\n{\nprivate boolean enabled;\npublic Solid(float x, float y, float width,\
  \ float height, Stage s)\n{\nsuper(x,y,s);\nsetSize(width,height);\nsetBoundaryRectangle();\n\
  enabled = true;\n}\npublic void setEnabled(boolean b)\n{\nenabled = b;\n}\npublic\
  \ boolean isEnabled()\n{\nreturn enabled;\n}\n}\n```\n\n接着，在 `LevelScreen` 类中，添加以下\
  \ `import` 语句：\n\n```\nimport com.badlogic.gdx.maps.MapObject;\nimport com.badlogic.gdx.maps.MapProperties;\n\
  ```\n\n然后，在 `initialize` 方法中添加以下代码，以加载图块地图并生成与图块地图中矩形对应的 `Solid` 对象：\n\n```\nTilemapActor\
  \ tma = new TilemapActor(\"assets/map.tmx\", mainStage);\nfor (MapObject obj : tma.getRectangleList(\"\
  Solid\") )\n{\nMapProperties props = obj.getProperties();\nnew Solid( (float)props.get(\"\
  x\"),     (float)props.get(\"y\"),\n(float)props.get(\"width\"), (float)props.get(\"\
  height\"),\nmainStage );\n}\n```\n\n此时，你可以测试项目，尽管你只会看到关卡的最左侧部分。在下一节中，你将添加玩家角色（考拉杰克），这将使你能够四处移动并查看关卡的其余部分。\n\
  \n## 平台角色设置\n\n在本节中，你将创建一个由玩家控制的主角色（考拉）的类。该类的一个新特性是它将包含对应不同移动类型（站立、行走和跳跃）的多个动画。由于平台角色移动的复杂性，`BaseActor`\
  \ 类中的物理相关方法对于此类游戏来说是不够的。例如，平台角色在水平移动（行走）和垂直移动（跳跃/下落）时通常具有不同的最大速度。因此，角色的 `act` 方法将包含用于实现基于物理的移动的自定义代码。在继续之前，你可能需要回顾第\
  \ 3 章中的“物理与移动”部分，其中包含对物理相关概念和计算的广泛讨论，这些内容在此处将再次涉及。\n\n首先，创建一个名为 `Koala` 的新类，其中包含以下代码，该代码初始化两个动画：`stand`（由单个图像组成）和\
  \ `walk`（包含多个图像）。\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport\
  \ com.badlogic.gdx.graphics.g2d.Animation;\npublic class Koala extends BaseActor\n\
  {\nprivate Animation stand;\nprivate Animation walk;\npublic Koala(float x, float\
  \ y, Stage s)\n{\nsuper(x,y,s);\nstand = loadTexture( \"assets/koala/stand.png\"\
  \ );\nString[] walkFileNames =\n{\"assets/koala/walk-1.png\", \"assets/koala/walk-2.png\"\
  ,\n\"assets/koala/walk-3.png\", \"assets/koala/walk-2.png\"};\nwalk = loadAnimationFromFiles(walkFileNames,\
  \ 0.2f, true);\n}\n}\n```\n\n接下来，你将开始实现自定义物理。首先，在 `BaseActor` 类中，将变量 `accelerationVec`\
  \ 和 `velocityVec` 的访问修饰符从 `private` 改为 `protected`，以便 `Koala` 类可以直接访问这些变量。返回 `Koala`\
  \ 类并添加以下 `import` 语句：\n\n```\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\n\
  import com.badlogic.gdx.math.MathUtils;\nimport com.badlogic.gdx.math.Vector2;\n\
  ```\n\n接着，你需要添加变量来存储物理相关常量：行走的加速度和减速率、最大水平（行走）速度、将角色向下拉的重力大小，以及最大可能的垂直（跳跃/下落）速度。为此，在\
  \ `Koala` 类中添加以下变量声明：\n\n```\nprivate float walkAcceleration;\nprivate float walkDeceleration;\n\
  private float maxHorizontalSpeed;\nprivate float gravity;\nprivate float maxVerticalSpeed;\n\
  ```\n\n在 `constructor` 方法中，添加以下代码来设置这些变量的值：\n\n```\nmaxHorizontalSpeed = 100;\n\
  walkAcceleration   = 200;\nwalkDeceleration   = 200;\ngravity            = 700;\n\
  maxVerticalSpeed   = 1000;\n```\n\n现在，你将把注意力转向实现平台游戏的物理。首先，在 `Koala` 类中添加以下方法：\n\
  \n```\npublic void act(float dt)\n{\nsuper.act( dt );\n}\n```\n\n除非另有说明，以下所有代码都将添加到\
  \ `act` 方法中。首先要做的是检查键盘输入。如果玩家正在按下左箭头键或右箭头键，则更新加速度向量。然后，考虑重力的影响，并使用加速度向量来更新速度向量。为此，添加以下代码：\n\
  \n```\nif (Gdx.input.isKeyPressed(Keys.LEFT))\naccelerationVec.add( -walkAcceleration,\
  \ 0 );\nif (Gdx.input.isKeyPressed(Keys.RIGHT))\naccelerationVec.add( walkAcceleration,\
  \ 0 );\naccelerationVec.add(0, -gravity);\nvelocityVec.add( accelerationVec.x *\
  \ dt, accelerationVec.y * dt );\n```\n\n\n\n接下来，如果角色没有加速（即玩家没有按下左或右键），则会进行减速。首先计算减速量（取决于经过的时间\
  \ `dt`）。行走方向（正数表示向右，负数表示向左）和行走速度（速度的绝对值）被存储在变量中。行走速度减去减速量，如果结果变为负数，则将其设为 0。完成这些调整后，根据行走速度和方向重新计算\
  \ x 轴速度值。请参考以下代码：\n\n```\nif ( !Gdx.input.isKeyPressed(Keys.RIGHT) && !Gdx.input.isKeyPressed(Keys.LEFT)\
  \ )\n{\nfloat decelerationAmount = walkDeceleration * dt;\nfloat walkDirection;\n\
  if ( velocityVec.x > 0 )\nwalkDirection = 1;\nelse\nwalkDirection = -1;\nfloat walkSpeed\
  \ = Math.abs( velocityVec.x );\nwalkSpeed -= decelerationAmount;\nif (walkSpeed\
  \ < 0)\nwalkSpeed = 0;\nvelocityVec.x = walkSpeed * walkDirection;\n}\n```\n\n除了减速效果外，x\
  \ 和 y 方向的速度也需要保持在存储最大速度的变量所设定的范围内。这可以通过使用 `MathUtils` 类的 `clamp` 方法来实现，如下所示：\n\n\
  ```\nvelocityVec.x = MathUtils.clamp( velocityVec.x, -maxHorizontalSpeed, maxHorizontalSpeed\
  \ );\nvelocityVec.y = MathUtils.clamp( velocityVec.y, -maxVerticalSpeed,   maxVerticalSpeed\
  \ );\n```\n\n现在，对速度进行最终调整后，使用速度值来调整位置，并将加速度向量重置为 (0,0)，通过以下代码实现：\n\n```\nmoveBy(\
  \ velocityVec.x * dt, velocityVec.y * dt );\naccelerationVec.set(0,0);\n```\n\n\
  你还需要确保摄像机始终跟随考拉，并且考拉始终保持在屏幕上。为此，添加以下代码行：\n\n```\nalignCamera();\nboundToWorld();\n\
  ```\n\n最后，你需要根据 x 方向的速度在动画之间切换；速度为 0 表示考拉静止不动，应使用相应的动画。此外，如果考拉向左移动，你需要使用纹理的镜像，使考拉看起来面向左侧。通过将\
  \ x 方向的比例设置为 -1 可以轻松实现图像翻转，将比例设置回 1 即可恢复图像。为此，添加以下代码：\n\n```\nif ( velocityVec.x\
  \ == 0 )\nsetAnimation(stand);\nelse\nsetAnimation(walk);\nif ( velocityVec.x >\
  \ 0 ) // 面向右\nsetScaleX(1);\nif ( velocityVec.x < 0 ) // 面向左\nsetScaleX(-1);\n```\n\
  \n至此，`Koala` 类中已添加了足够多的功能，你可以准备将考拉添加到游戏中了。在 `LevelScreen` 类中，添加以下 `import` 语句：\n\
  \n```\nimport com.badlogic.gdx.math.Vector2;\n```\n\n同时，在类中添加以下变量声明：\n\n```\nKoala\
  \ jack;\n```\n\n在 `initialize` 方法中，添加以下代码以获取瓦片地图中指定的起始位置，然后在该位置初始化 `Koala` 对象。\n\
  \n```\nMapObject startPoint = tma.getRectangleList(\"start\").get(0);\nMapProperties\
  \ startProps = startPoint.getProperties();\njack = new Koala( (float)startProps.get(\"\
  x\"), (float)startProps.get(\"y\"), mainStage);\n```\n\n接下来，处理与固体对象（由 `Solid` 类表示）的碰撞。使用\
  \ `preventOverlap` 方法来阻止考拉穿过任何固体对象。一个需要解决的微妙问题是，当发生碰撞时，应如何调整考拉的速度。完全不调整速度会导致异常行为；例如，如果考拉下落并与地面碰撞，而垂直速度未设为零，那么重力会导致速度累积，最终考拉会在单帧内穿过固体对象，使其似乎从游戏中消失。然而，如果在所有碰撞中都将速度向量设为\
  \ (0,0)，也会导致问题：例如，如果考拉在下落时撞到墙壁侧面，考拉会瞬间停止；如果玩家在下落时按住一个使考拉紧贴固体（如墙壁）的方向键，考拉会看起来沿着墙壁缓慢飘落。为了避免此类问题，必须考虑碰撞的方向。你在第\
  \ 8 章创建“矩形破坏者”游戏时遇到过类似问题，当时需要知道被击中物体的侧面。和之前一样，你可以通过分析 `preventOverlap` 方法返回的位移向量来确定碰撞发生的方向，然后将该方向上的速度设为\
  \ 0 来解决此问题。为了实现这一切，在 `update` 方法中添加以下代码：\n\n```\nfor (BaseActor actor : BaseActor.getList(mainStage,\
  \ \"Solid\"))\n{\nSolid solid = (Solid)actor;\nif ( jack.overlaps(solid) && solid.isEnabled()\
  \ )\n{\nVector2 offset = jack.preventOverlap(solid);\nif (offset != null)\n{\n//\
  \ 在 X 方向发生碰撞\nif ( Math.abs(offset.x) > Math.abs(offset.y) )\njack.velocityVec.x\
  \ = 0;\nelse // 在 Y 方向发生碰撞\njack.velocityVec.y = 0;\n}\n}\n}\n```\n\n最后，你将向 `Koala`\
  \ 类添加跳跃功能。此过程中最困难的部分是确定考拉何时在地面上，从而能够跳跃。仅检查 y 方向速度是否等于 0 是不够的，因为考拉在跳跃最高点时也是如此。这里采用的方法是创建一个始终位于考拉正下方的小型辅助对象（名为\
  \ `belowSensor`），如图 11-5 所示。如果此对象与固体对象重叠，则考拉可以跳跃。在游戏的最终版本中，此传感器将是不可见的，但为了测试目的，该方框将根据考拉是否站在固体上而显示为绿色或红色。\n\
  \n![A352797_2_En_11_Fig5_HTML.jpg](img/A352797_2_En_11_Fig5_HTML.jpg)\n\n图 11-5.\n\
  \n考拉及其下方的传感器方框，用于检测考拉是否站在固体对象上\n\n首先，在 `Koala` 类中添加以下 `import` 语句：\n\n```\nimport\
  \ com.badlogic.gdx.graphics.Color;\n```\n\n接下来，在类中添加以下变量：\n\n```\nprivate Animation\
  \ jump;\nprivate float jumpSpeed;\nprivate BaseActor belowSensor;\n```\n\n这些对象在构造函数中（以及碰撞多边形一起）通过添加以下代码进行设置。请注意，`belowSensor`\
  \ 的宽度略小于考拉，以匹配所使用的碰撞多边形：\n\n```\njump = loadTexture( \"assets/koala/jump.png\");\n\
  jumpSpeed = 450;\nsetBoundaryPolygon(6);\nbelowSensor = new BaseActor(0,0, s);\n\
  belowSensor.loadTexture(\"assets/white.png\");\nbelowSensor.setSize( this.getWidth()\
  \ - 8, 8 );\nbelowSensor.setBoundaryRectangle();\nbelowSensor.setVisible(true);\n\
  ```\n\n为了保持 `belowSensor` 处于正确位置，在 `act` 方法中，在加速度重置之后添加以下代码：\n\n```\nbelowSensor.setPosition(\
  \ getX() + 4, getY() - 8 );\n```\n\n\n\n要检测考拉是否站在固体物体上，请在 `Koala` 类中添加以下两个方法：\n\n\
  ```\npublic boolean belowOverlaps(BaseActor actor)\n{\nreturn belowSensor.overlaps(actor);\n\
  }\npublic boolean isOnSolid()\n{\nfor (BaseActor actor : BaseActor.getList( getStage(),\
  \ \"Solid\" ))\n{\nSolid solid = (Solid)actor;\nif ( belowOverlaps(solid) && solid.isEnabled()\
  \ )\nreturn true;\n}\nreturn false;\n}\n```\n\n跳跃功能将由以下方法处理，该方法也应添加到 `Koala` 类中：\n\
  \n```\npublic void jump()\n{\nvelocityVec.y = jumpSpeed;\n}\n```\n\n由于跳跃是一个离散动作，它将从\
  \ `LevelScreen` 类中调用（类似于 Space Rocks 游戏中的射击动作）。为此，请在 `LevelScreen` 类中添加以下 `import`\
  \ 语句：\n\n```\nimport com.badlogic.gdx.Input.Keys;\n```\n\n然后，在 `LevelScreen` 类中添加以下方法：\n\
  \n```\npublic boolean keyDown(int keyCode)\n{\nif (keyCode == Keys.SPACE)\n{\nif\
  \ ( jack.isOnSolid() )\n{\njack.jump();\n}\n}\nreturn false;\n}\n```\n\n最后，回到 `Koala`\
  \ 类，在 `act` 方法中，将用于设置动画的 `if-else` 语句替换为以下改进后的代码，该代码会决定使用三种动画（`stand`、`walk` 或 `jump`）中的哪一种，并设置\
  \ `belowSensor` 的颜色，以便进行测试和可视化：\n\n```\nif ( this.isOnSolid() )\n{\nbelowSensor.setColor(\
  \ Color.GREEN );\nif ( velocityVec.x == 0 )\nsetAnimation(stand);\nelse\nsetAnimation(walk);\n\
  }\nelse\n{\nbelowSensor.setColor( Color.RED );\nsetAnimation(jump);\n}\n```\n\n\
  现在你可以再次测试游戏了。按下空格键（当考拉在地面上时）使其跳跃，并观察 `belowSensor` 矩形的颜色相应变化。尝试在考拉处于空中时按下空格键，以验证考拉在这种情况下无法跳跃。根据你在\
  \ Tiled 地图编辑器中设计关卡的方式，你可能会发现需要调整考拉的跳跃力度或修改关卡设计。至此，你已经实现了平台游戏中最困难的部分。测试完成后，在 `Koala`\
  \ 类中将 `belowSensor` 的可见性设置为 false。在下一节中，你将添加各种供考拉交互的对象（除了地面之外）。\n\n## 游戏世界对象\n\n\
  现在，你将把注意力转向关卡设计。在 Tiled 地图编辑器程序中打开你的 `map.tmx` 文件。在图层面板中，选择对象图层 1，并在图块集面板中选择对象图块集选项卡。按\
  \ T 键激活插入图块工具。图 11-6 展示了一个包含所有不同对象图块的最小关卡；图 11-7 显示了你的程序将如何渲染该特定地图。在描绘的关卡中，目标旗帜被红色锁块包围，玩家需要获得红色钥匙才能通过。玩家可以通过跳到左侧的跳板上，或者跳到草地砖块上再穿过平台来获取钥匙。沿途有供玩家收集的金币，以及一个可以收集的计时器，用于增加到达目标的时间。请注意，跳板和旗帜对象将大于单个图块，因此对象图块指示了对象出现位置的左下角。别忘了定期保存你的图块地图文件，以便你所做的更改能整合到游戏项目中。\n\
  \n![A352797_2_En_11_Fig7_HTML.jpg](img/A352797_2_En_11_Fig7_HTML.jpg)\n\n图 11-7.\n\
  \n图 11-6 中的图块地图在游戏过程中的渲染效果\n\n![A352797_2_En_11_Fig6_HTML.jpg](img/A352797_2_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6.\n\n在 Tiled 地图编辑器中的关卡设计\n\n### 用户界面\n\n在添加游戏特定对象的代码之前，你需要先设置用户界面。如本章开头所述，屏幕顶部将有一个显示已收集金币数量的标签、一个包含已收集钥匙图像的表格，以及一个显示剩余时间的标签。屏幕中央将有一个在游戏结束时出现的标签，其中包含一条取决于玩家输赢的消息。首先，在\
  \ `LevelScreen` 类中添加以下 `import` 语句：\n\n```\nimport com.badlogic.gdx.graphics.Color;\n\
  import com.badlogic.gdx.scenes.scene2d.ui.Label;\nimport com.badlogic.gdx.scenes.scene2d.ui.Table;\n\
  ```\n\n接下来，在类中添加以下变量声明：\n\n```\nboolean gameOver;\nint coins;\nfloat time;\nLabel\
  \ coinLabel;\nTable keyTable;\nLabel timeLabel;\nLabel messageLabel;\n```\n\n为了设置所有这些变量，请在\
  \ `initialize` 方法中添加以下代码：\n\n```\ngameOver = false;\ncoins = 0;\ntime = 60;\ncoinLabel\
  \ = new Label(\"Coins: \" + coins, BaseGame.labelStyle);\ncoinLabel.setColor(Color.GOLD);\n\
  keyTable = new Table();\ntimeLabel = new Label(\"Time: \" + (int)time, BaseGame.labelStyle);\n\
  timeLabel.setColor(Color.LIGHT_GRAY);\nmessageLabel = new Label(\"Message\", BaseGame.labelStyle);\n\
  messageLabel.setVisible(false);\n```\n\n为了在用户界面表格中排列这些显示元素，请在 `initialize` 方法的末尾添加以下代码：\n\
  \n```\nuiTable.pad(20);\nuiTable.add(coinLabel);\nuiTable.add(keyTable).expandX();\n\
  uiTable.add(timeLabel);\nuiTable.row();\nuiTable.add(messageLabel).colspan(3).expandY();\n\
  ```\n\n### 目标：到达旗帜\n\n你要添加的第一个代码对应的是旗帜，它对游戏玩法至关重要，因为它为玩家提供了一个目标：关卡中考拉必须到达的一个位置。首先，创建一个名为\
  \ `Flag` 的新类，其中包含以下代码：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic\
  \ class Flag extends BaseActor\n{\npublic Flag(float x, float y, Stage s)\n{\nsuper(x,y,s);\n\
  loadAnimationFromSheet(\"assets/items/flag.png\", 1, 2, 0.2f, true);\n}\n}\n```\n\
  \n接下来，为了基于图块地图数据创建旗帜的实例，请在 `LevelScreen` 类的 `initialize` 方法中添加以下代码：\n\n```\nfor\
  \ (MapObject obj : tma.getTileList(\"Flag\") )\n{\nMapProperties props = obj.getProperties();\n\
  new Flag( (float)props.get(\"x\"), (float)props.get(\"y\"), mainStage );\n}\n```\n\
  \n最后，为了处理考拉杰克到达旗帜时的情况（结束游戏、显示消息并移除考拉），请在 `update` 方法的开头添加以下代码：\n\n```\nif ( gameOver\
  \ )\nreturn;\nfor (BaseActor flag : BaseActor.getList(mainStage, \"Flag\"))\n{\n\
  if ( jack.overlaps(flag) )\n{\nmessageLabel.setText(\"You Win!\");\nmessageLabel.setColor(Color.LIME);\n\
  messageLabel.setVisible(true);\njack.remove();\ngameOver = true;\n}\n}\n```\n\n\
  此时，即使你像图 11-6 中那样用锁块包围了目标旗帜，你也可以测试目标旗帜的机制，因为锁块尚未实现。\n\n\n\n### 金币\n\n接下来，你将实现金币的代码。金币能为玩家提供即时的成就感，并衡量其进度；许多玩家还会自发设定一个次要目标：尽可能多地收集金币（最好能集齐所有金币）。首先，创建一个名为\
  \ `Coin` 的新类，包含以下代码：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic\
  \ class Coin extends BaseActor\n{\npublic Coin(float x, float y, Stage s)\n{\nsuper(x,y,s);\n\
  loadAnimationFromSheet(\"assets/items/coin.png\", 1, 6, 0.1f, true);\n}\n}\n```\n\
  \n接着，为了根据瓦片地图数据创建金币实例，在 `LevelScreen` 类的 `initialize` 方法中添加以下代码：\n\n```\nfor (MapObject\
  \ obj : tma.getTileList(\"Coin\") )\n{\nMapProperties props = obj.getProperties();\n\
  new Coin( (float)props.get(\"x\"), (float)props.get(\"y\"), mainStage );\n}\n```\n\
  \n最后，处理考拉杰克收集金币时发生的事件（增加金币变量、更新显示、从关卡中移除金币）。在 `update` 方法中（位于检查游戏是否结束的条件语句之后），添加以下代码：\n\
  \n```\nfor (BaseActor coin : BaseActor.getList(mainStage, \"Coin\"))\n{\nif ( jack.overlaps(coin)\
  \ )\n{\ncoins++;\ncoinLabel.setText(\"Coins: \" + coins);\ncoin.remove();\n}\n}\n\
  ```\n\n此时，你可以测试游戏，验证金币收集功能是否按预期工作——不过，根据你的关卡设计，考拉可能暂时还无法够到某些金币。\n\n### 时间与计时器\n\n\
  接下来，你将添加基于时间的功能。根据玩家可用的时间量，这能为游戏带来紧迫感和紧张感。计时器对象则能通过增加可用时间，给玩家带来一丝宽慰。计时器对象还可用于创建一组强制检查点：如果玩家在初始给定时间内无法到达终点旗帜，他们就必须沿途收集计时器对象。如果你选择这种设计，别忘了测试关卡，确保玩家确实有可能到达终点！首先，创建一个名为\
  \ `Timer` 的新类，代码如下。注意，由于没有基于图像的动画，这里添加了一个基于数值的动画（脉冲动作），以吸引玩家注意力，并表明该对象是可交互的。\n\n\
  ```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport com.badlogic.gdx.scenes.scene2d.Action;\n\
  import com.badlogic.gdx.scenes.scene2d.actions.Actions;\npublic class Timer extends\
  \ BaseActor\n{\npublic Timer(float x, float y, Stage s)\n{\nsuper(x,y,s);\nloadTexture(\"\
  assets/items/timer.png\");\nAction pulse = Actions.sequence(\nActions.scaleTo(1.1f,\
  \ 1.1f, 0.5f),\nActions.scaleTo(1.0f, 1.0f, 0.5f) );\naddAction( Actions.forever(pulse)\
  \ );\n}\n}\n```\n\n接着，为了根据瓦片地图数据创建计时器实例，在 `LevelScreen` 类的 `initialize` 方法中添加以下代码：\n\
  \n```\nfor (MapObject obj : tma.getTileList(\"Timer\") )\n{\nMapProperties props\
  \ = obj.getProperties();\nnew Timer( (float)props.get(\"x\"), (float)props.get(\"\
  y\"), mainStage );\n}\n```\n\n最后，你需要自动减少 `time` 变量、更新显示、在收集计时器时增加剩余时间，并在时间耗尽时结束游戏。为此，在\
  \ `update` 方法中添加以下代码：\n\n```\ntime -= dt;\ntimeLabel.setText(\"Time: \" + (int)time);\n\
  for (BaseActor timer : BaseActor.getList(mainStage, \"Timer\"))\n{\nif ( jack.overlaps(timer)\
  \ )\n{\ntime += 20;\ntimer.remove();\n}\n}\nif (time <= 0)\n{\nmessageLabel.setText(\"\
  Time Up - Game Over\");\nmessageLabel.setColor(Color.RED);\nmessageLabel.setVisible(true);\n\
  jack.remove();\ngameOver = true;\n}\n```\n\n同样，你可以自由测试代码，验证时间相关功能是否按预期工作。\n\n###\
  \ 弹跳板\n\n跳跃是任何平台游戏不可或缺的一部分。然而，玩家角色通常无法从屏幕底部一次跳跃就到达顶部。要到达这些更高的位置，你可以添加一系列类似楼梯的实心瓦片，或者另一种选择：添加一个能将角色弹射到高空（高于普通跳跃高度）的对象。基于此，本游戏引入了弹跳板对象，玩家看到的是有弹性的平台。如果考拉落在上面，他就会被高高弹起。（单纯从旁边走过不会触发此效果，这样玩家就能更自主地决定是否要使用弹跳板。）首先，你需要创建一个类来表示这个对象。创建一个名为\
  \ `Springboard` 的新类，代码如下：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
  public class Springboard extends BaseActor\n{\npublic Springboard(float x, float\
  \ y, Stage s)\n{\nsuper(x,y,s);\nloadAnimationFromSheet(\"assets/items/springboard.png\"\
  , 1, 3, 0.2f, true);\n}\n}\n```\n\n接着，在 `Koala` 类中添加以下方法，这些方法将用于判断考拉是否正在下落，如果是，则将其弹射到空中（类似于\
  \ `jump` 方法）：\n\n```\npublic boolean isFalling()\n{\nreturn (velocityVec.y < 0);\n\
  }\npublic void spring()\n{\nvelocityVec.y = 1.5f * jumpSpeed;\n}\n```\n\n然后，为了设置弹跳板，在\
  \ `LevelScreen` 类的 `initialize` 方法中添加以下代码。同时注意 `toFront` 方法的使用，这会使考拉在走过弹跳板时显示在其前方（而非后方）。\n\
  \n```\nfor (MapObject obj : tma.getTileList(\"Springboard\") )\n{\nMapProperties\
  \ props = obj.getProperties();\nnew Springboard( (float)props.get(\"x\"), (float)props.get(\"\
  y\"), mainStage );\n}\njack.toFront();\n```\n\n最后，像往常一样，你需要指定杰克与弹跳板交互时发生的事件，这也包括刚才描述的额外条件。在\
  \ `update` 方法中添加以下代码：\n\n```\nfor (BaseActor springboard : BaseActor.getList(mainStage,\
  \ \"Springboard\"))\n{\nif ( jack.belowOverlaps(springboard) && jack.isFalling()\
  \ )\n{\njack.spring();\n}\n}\n```\n\n你可以自由测试项目，观看考拉高高飞向空中！\n\n\n\n### 平台\n\n接下来，你将添加可穿越的平台。这些平台为玩家提供了一种到达关卡更高处的方法（除了跳上跳板或跳上一系列实心砖块之外）。垂直排列的平台对象可以提供类似梯子的功能。`Platform`\
  \ 类将是继承 `Solid` 类的两个类之一，而可穿越功能正是 `Solid` 类设计时内置 `enabled` 属性的原因之一。首先，使用以下代码创建一个名为\
  \ `Platform` 的新类：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic\
  \ class Platform extends Solid\n{\npublic Platform(float x, float y, Stage s)\n\
  {\nsuper(x,y,32,16,s);\nloadTexture(\"assets/items/platform.png\");\n}\n}\n```\n\
  \n接下来，在 `Koala` 类中，添加以下方法，该方法将用于判断考拉是否在跳跃：\n\n```\npublic boolean isJumping()\n\
  {\nreturn (velocityVec.y > 0);\n}\n```\n\n创建平台对象是一个直接的过程。和之前一样，在 `LevelScreen` 类的\
  \ `initialize` 方法中，添加以下代码：\n\n```\nfor (MapObject obj : tma.getTileList(\"Platform\"\
  ) )\n{\nMapProperties props = obj.getProperties();\nnew Platform( (float)props.get(\"\
  x\"), (float)props.get(\"y\"), mainStage );\n}\n```\n\n通常，平台的功能与实心物体相同，但有两个例外：当从下方跳起穿过平台时，或者当从上方跳下穿过平台时，实心功能会被禁用。在这两种情况下，在考拉穿过平台后，必须重新启用该平台的实心功能。首先，在\
  \ `update` 方法中，找到遍历 `Solid` 对象列表的代码块。由于 `Platform` 类继承自 `Solid` 类，平台对象也包含在该列表中。在将演员转换为\
  \ `Solid` 类的代码行之后，直接添加以下代码，该代码完全处理了考拉向上跳起穿过平台的情况：\n\n```\nif ( solid instanceof\
  \ Platform )\n{\nif ( jack.isJumping() && jack.overlaps(solid) )\nsolid.setEnabled(false);\n\
  if ( jack.isJumping() && !jack.overlaps(solid) )\nsolid.setEnabled(true);\n}\n```\n\
  \n向下跳穿过实心物体稍微复杂一些。思路是这样的：当玩家按下空格键跳跃时（由 `keyDown` 方法处理），如果玩家同时按下了向下箭头键，那么考拉下方的任何平台（即与下方传感器重叠的平台）的实心功能都应被禁用。然后，一旦考拉完全掉下平台（可以在\
  \ `update` 方法中检查），实心功能将被重新启用。为此，在 `LevelScreen` 类中，添加以下 `import` 语句：\n\n```\nimport\
  \ com.badlogic.gdx.Gdx;\n```\n\n然后，将 `keyDown` 方法修改为以下内容：\n\n```\npublic boolean\
  \ keyDown(int keyCode)\n{\nif (gameOver)\nreturn false;\nif (keyCode == Keys.SPACE)\n\
  {\nif ( Gdx.input.isKeyPressed(Keys.DOWN) )\n{\nfor (BaseActor actor : BaseActor.getList(mainStage,\
  \ \"Platform\"))\n{\nPlatform platform = (Platform)actor;\nif ( jack.belowOverlaps(platform)\
  \ )\n{\nplatform.setEnabled(false);\n}\n}\n}\nelse if ( jack.isOnSolid() )\n{\n\
  jack.jump();\n}\n}\nreturn false;\n}\n```\n\n此修改负责处理向下跳跃时禁用实心功能。要重新启用它，在 `update`\
  \ 方法中，在你刚刚添加的代码块（用于检查平台实例）内，添加以下代码：\n\n```\nif ( jack.isFalling() && !jack.overlaps(solid)\
  \ && !jack.belowOverlaps(solid) )\nsolid.setEnabled(true);\n```\n\n完成这些添加后，可穿越功能就实现了。\n\
  \n### 钥匙与锁\n\nJumping Jack 游戏的最后一项添加涉及钥匙和锁对象。锁是实心方块，考拉在收集到相同颜色的钥匙之前无法通过。锁可以用来包围目标旗帜、封锁金币堆，或者阻挡通往捷径或关卡更深处的前进道路。钥匙、锁以及类似谜题的元素可以用来鼓励玩家回溯和探索关卡。在瓦片地图中，代表钥匙和锁的对象瓦片有一个名为\
  \ `color` 的自定义属性，可以设置为任何想要的值；在从瓦片地图读取数据时，可以使用这些数据并相应地设置演员的颜色。\n\n首先，使用以下代码创建一个名为\
  \ `Key` 的新类。由于没有基于图像的动画（`Timer` 对象也是如此），因此为此对象添加了一个基于数值的动画，使钥匙小幅来回旋转。\n\n```\nimport\
  \ com.badlogic.gdx.scenes.scene2d.Stage;\nimport com.badlogic.gdx.scenes.scene2d.Action;\n\
  import com.badlogic.gdx.scenes.scene2d.actions.Actions;\npublic class Key extends\
  \ BaseActor\n{\npublic Key(float x, float y, Stage s)\n{\nsuper(x,y,s);\nloadTexture(\"\
  assets/items/key.png\");\nrotateBy(10);\nAction tilt = Actions.sequence(\nActions.rotateBy(-20,\
  \ 0.5f),\nActions.rotateBy(20, 0.5f) );\naddAction( Actions.forever(tilt) );\n}\n\
  }\n```\n\n接下来，使用以下代码创建一个名为 `Lock` 的新类。由于锁是实心的，因此该类继承自 `Solid` 类（与 `Platform` 类相同）。\n\
  \n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class Lock extends\
  \ Solid\n{\npublic Lock(float x, float y, Stage s)\n{\nsuper(x,y,32,32,s);\nloadTexture(\"\
  assets/items/lock.png\");\n}\n}\n```\n\n每当收集到一把钥匙时，会通过在用户界面上添加一个对应颜色的钥匙图标来表示。为了跟踪数据（已收集钥匙的颜色），将使用一个\
  \ `ArrayList`。当考拉接触到锁并且已经收集了对应颜色的钥匙时，锁会淡出并从游戏中移除。首先，在 `LevelScreen` 类中，添加以下 `import`\
  \ 语句：\n\n```\nimport java.util.ArrayList;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
  ```\n\n然后，向该类添加以下变量声明：\n\n```\nArrayList keyList;\n```\n\n在 `initialize` 方法中，按如下方式初始化列表：\n\
  \n```\nkeyList = new ArrayList();\n```\n\n为了根据瓦片地图数据设置钥匙和锁，请添加以下代码。请注意，在这两种情况下，都需要确定名为\
  \ `color` 的自定义属性的值，并根据该值设置演员的颜色。\n\n```\nfor (MapObject obj : tma.getTileList(\"\
  Key\") )\n{\nMapProperties props = obj.getProperties();\nKey key = new Key( (float)props.get(\"\
  x\"), (float)props.get(\"y\"), mainStage );\nString color = (String)props.get(\"\
  color\");\nif ( color.equals(\"red\") )\nkey.setColor(Color.RED);\nelse // 默认颜色\n\
  key.setColor(Color.WHITE);\n}\nfor (MapObject obj : tma.getTileList(\"Lock\") )\n\
  {\nMapProperties props = obj.getProperties();\nLock lock = new Lock( (float)props.get(\"\
  x\"), (float)props.get(\"y\"), mainStage );\nString color = (String)props.get(\"\
  color\");\nif ( color.equals(\"red\") )\nlock.setColor(Color.RED);\nelse // 默认颜色\n\
  lock.setColor(Color.WHITE);\n}\n```\n\n然后，在 `update` 方法中，为了处理钥匙的收集，添加以下代码：\n\n```\n\
  for (BaseActor key : BaseActor.getList(mainStage, \"Key\"))\n{\nif ( jack.overlaps(key)\
  \ )\n{\nColor keyColor = key.getColor();\nkey.remove();\nBaseActor keyIcon =  new\
  \ BaseActor(0,0,uiStage);\nkeyIcon.loadTexture(\"assets/key-icon.png\");\nkeyIcon.setColor(keyColor);\n\
  keyTable.add(keyIcon);\nkeyList.add(keyColor);\n}\n}\n```\n\n\n\n同样在 `update` 方法中，找到遍历\
  \ `Solid` 对象列表的 `for` 循环。由于 `Lock` 类继承自 `Solid` 类，因此锁也包含在此列表中。紧跟在检查固体是否为 `Platform`\
  \ 类实例的条件语句对应的代码块之后，添加以下代码。这段代码会检查固体是否为 `Lock` 类的实例，如果是，并且其颜色之前已被添加到 `keyList` 中，则禁用并移除该锁。\n\
  \n```\nif ( solid instanceof Lock && jack.overlaps(solid) )\n{\nColor lockColor\
  \ = solid.getColor();\nif ( keyList.contains(lockColor) )\n{\nsolid.setEnabled(false);\n\
  solid.addAction( Actions.fadeOut(0.5f) );\nsolid.addAction( Actions.after( Actions.removeActor()\
  \ ) );\n}\n}\n```\n\n添加此代码后，钥匙与锁的游戏机制就完成了。测试你的项目，验证锁最初是实心的。然后，收集对应的钥匙，检查用户界面中是否出现钥匙图标，接着确保之后当你与锁接触时，锁会消失。\n\
  \n至此，你已经完成了本章开头描述的所有游戏机制的实现。恭喜你，尽情享受你的游戏吧！\n\n## 总结与下一步\n\n在本章中，你学习了如何创建一个平台游戏，包括一个具有各种动作动画（站立、行走、跳跃）的主角、自定义物理系统，以及一个用于判断角色是否站在固体物体上从而能够跳跃的“传感器”。你创建了多种供角色交互的对象，包括代表目标的旗帜、可收集的金币、用于增加关卡剩余时间的计时器、能将角色弹向空中的跳板、可穿越的平台，以及用于移除阻挡前进道路的锁的钥匙。\n\
  \n和往常一样，游戏中还应添加更多功能。最大的缺失是标题画面和说明画面，以及音频。应包含背景音乐来营造氛围。应添加与玩家输入（如跳跃）以及游戏对象交互（如收集物品、从跳板弹起、锁消失时，或游戏结束——无论是到达目标旗帜还是时间耗尽）相对应的音效。你可能还想添加一个次要障碍物，例如尖刺，当玩家接触时会受到惩罚。惩罚可以是玩家失去一条命（或许从三条命开始）并需要重新开始关卡，当所有命都失去后游戏结束。或者，玩家可以失去一个“生命值”并从该点继续，当所有生命值耗尽后游戏结束。然而，后一种方法可能更复杂，因为你需要在角色受伤后添加一个“无敌”阶段，让他们有机会远离并逃离危险，否则角色的所有生命值会立即耗尽。\n\
  \n在下一章中，你将通过创建一个名为《寻宝记》的俯视角剑斗冒险游戏，继续运用你基于瓦片地图的设计技能。\n\n"
- "# 12. 冒险游戏\n\n本章包含了整本书中最具雄心的游戏项目：一款名为《寻宝记》的基于战斗的冒险游戏，其灵感来源于《塞尔达传说》等经典主机游戏。该游戏使用了新特性，例如使用两种不同类型武器（剑和箭）与敌人战斗、根据游戏状态（例如剩余敌人数量）显示不同信息的非玩家角色（NPC），以及物品商店机制。图\
  \ 12-1 和 12-2 分别展示了游戏内战斗和物品商店的截图。\n\n![A352797_2_En_12_Fig2_HTML.jpg](img/A352797_2_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2.\n\n在物品商店购买物品（心心和箭）\n\n![A352797_2_En_12_Fig1_HTML.jpg](img/A352797_2_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1.\n\n与飞行敌人进行剑斗\n\n\n\n## 游戏项目：寻宝探险\n\n《寻宝探险》是一款冒险游戏，主角被称为英雄，受命消灭陆地上像蝙蝠一样飞行的生物（称为飞行怪），并承诺以宝箱作为奖励。英雄有两种攻击并摧毁飞行怪的方法：挥剑和射箭（英雄初始拥有三支箭）。与这两种武器中的任何一种接触，都能一击摧毁飞行怪。英雄初始拥有三点生命值。与飞行怪相撞会使英雄生命值减少一点，如果英雄生命值降至零，则英雄被摧毁，游戏结束。每只飞行怪被摧毁时，会掉落一枚金币，英雄可以收集金币，并在物品商店中购买额外的生命值或箭矢。游戏中有两个非玩家角色：店主，他会告知你商店中物品的价格和数量（3\
  \ 枚金币换 1 点生命值，4 枚金币换 3 支箭）；以及守门人，他守护着宝藏，并告诉你还有多少只飞行怪需要击败。\n\n玩家使用方向键移动英雄，使用 S 键和\
  \ A 键分别挥剑和射箭。箭矢会沿着玩家面对的方向直线飞行。生命值、金币数量和箭矢数量显示在屏幕顶部。当玩家获胜或失败时，屏幕中央会显示一条大消息。当英雄距离非玩家角色四个像素以内时，非玩家角色的消息会自动显示在屏幕底部（如图\
  \ 12-2 所示），当英雄离开时，消息会自动消失。\n\n本游戏的图形色彩丰富且具有卡通风格。本项目仅实现了少量动画：英雄行走、挥剑、敌人飞行，以及敌人被摧毁时出现的渐隐烟雾。添加额外的动画和音效以增强与游戏世界对象的互动，将是本项目一个重要且有价值的补充。\n\
  \n本章假设你已经熟悉第 10 章和第 11 章中关于瓦片地图的内容，并且已经安装了 Tiled 地图编辑器软件。此外，你还需要熟悉第 5 章中关于对话框和标志机制的内容，这是设置与非玩家角色交互所必需的。\n\
  \n开始本项目所需的步骤与之前项目相同：创建一个新项目，创建一个`assets`文件夹和一个`+libs`文件夹（如果你已经设置了`userlib`目录，则后者不是必需的），复制你在本书第一部分创建的自定义框架文件（`BaseGame.java`、`BaseScreen.java`、`BaseActor.java`），以及你在第\
  \ 10 章开发的`TilemapActor.java`类和你在第 5 章开发的`DialogBox.java`类，并将本项目的图形和音频文件复制到你的`assets`文件夹中。如前所述，为了方便起见，已创建了一个名为`Framework`的\
  \ BlueJ 项目，其中包含必要的源代码文件，以提供一个便捷的起点。要开始第一个项目：\n\n*   下载本章的源代码文件。\n*   复制下载的`Framework`文件夹（及其内容），并将其重命名为`Treasure\
  \ Quest`。\n*   将下载的`Treasure Quest`项目 assets 文件夹中的所有内容复制到你新创建的`Treasure Quest assets`文件夹中。\n\
  *   打开你`Treasure Quest`文件夹中的 BlueJ 项目。\n*   在`CustomGame`类中，将类名改为`TreasureQuestGame`（BlueJ\
  \ 随后会将源代码文件重命名为`TreasureQuestGame.java`）。\n*   在`Launcher`类中，将`main`方法的内容改为以下内容：\n\
  \n```\n    Game myGame = new TreasureQuestGame ();\n    LwjglApplication launcher\
  \ = new LwjglApplication(\n    myGame, \"Treasure Quest\", 800, 600 );\n    ```\n\
  \n## 关卡设置\n\n首先，启动 Tiled 地图编辑器软件。创建一个新地图，地图尺寸宽度为 40 个瓦片，高度为 40 个瓦片，瓦片尺寸宽度和高度均设置为\
  \ 32 像素。生成的地图将为 1280 x 1280 像素。点击“另存为...”按钮，将文件以文件名`map.tmx`保存到你的`assets`目录中。\n\n\
  接下来，为你的地图添加一个对象层。然后，在“图块集”面板中，使用图像`adventure-tiles.png`（如图 12-3 左侧所示）添加一个新图块集，将瓦片尺寸设置为\
  \ 32 x 32，并勾选将图块集嵌入地图的复选框。以相同方式，这次使用图像`object-tiles.png`（如图 12-3 右侧所示）为地图添加另一个新图块集。由于对象瓦片将用于指示游戏世界对象应生成的位置，你需要指定相应的\
  \ Java 类（稍后你将创建这些类）。在图块集面板中，选择 object-tiles，并点击编辑图块集的图标。在出现的选项卡中，你需要逐个点击每个瓦片，并为每个瓦片添加一个新的自定义属性。该属性应命名为`name`；这些瓦片对应的值（从左到右）分别为`Bush`、`Rock`、`Coin`、`Treasure`、`Flyer`、`NPC`、`ShopHeart`和`ShopArrow`。此外，对于\
  \ NPC 瓦片，添加第二个名为`id`的自定义属性，值为`default`，以及第三个名为`text`的自定义属性，值为`Hello, World!`。（这些默认值稍后将在瓦片地图编辑器中针对特定实例被覆盖。）\n\
  \n![A352797_2_En_12_Fig3_HTML.jpg](img/A352797_2_En_12_Fig3_HTML.jpg)\n\n图 12-3.\n\
  \n瓦片层（左）和对象层（右）的图块集\n\n返回到显示瓦片地图的选项卡。在“图层”面板中，选择“Tile Layer 1”。在图块集面板中，选择 adventure-tiles，然后按\
  \ B 键激活“印章画笔”工具。在整个地图上添加草地瓦片（使用“桶填充”工具可以大大加快速度），然后沿边缘添加木栅栏瓦片。此外，在地图中心附近添加两个大型围栏区域，每个区域都有一个两瓦片宽的入口，以便英雄通过；瓦片地图的下半部分如图\
  \ 12-4 所示。\n\n![A352797_2_En_12_Fig4_HTML.jpg](img/A352797_2_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4.\n\n在瓦片层添加草地和栅栏瓦片\n\n正如前一章所述，瓦片层仅用于简化从图块集创建图像的过程。在实际游戏中，栅栏瓦片应为实心障碍物，因此你需要在对象层中添加矩形来存储对应区域的数据。在“图层”面板中，选择“Object\
  \ Layer 1”，然后按 R 键激活“矩形”工具。在所有包含实心瓦片的区域周围绘制矩形；为简化操作，可以绘制同时包围多个瓦片的矩形。每次添加这些矩形时，你还必须添加一个名为`name`的自定义属性，值为`Solid`（稍后将用于初始化对应的角色）。为加速此过程，当选中一个矩形且“选择对象”工具处于活动状态时，你可以使用快捷键组合`Ctrl+D`来复制对象（包括自定义属性），然后只需重新定位和调整新对象的大小（新对象会直接出现在原始对象上方）。一旦你为所有包含实心瓦片的区域添加了对应的矩形，在地图底部中央添加最后一个矩形，以指示英雄的起始位置；添加自定义属性`name`，值为`Start`。\n\
  \n\n\n接下来，你将添加游戏对象，目标是实现与图 12-5 类似的设计。按下 T 键激活“插入图块”工具。从对象图块集中添加灌木和岩石图块，围出一块包含英雄起始位置以及你之前创建的两个围栏区域入口的区域；这将用于阻挡敌人接近英雄，直到玩家做好准备，用剑清除灌木。在左侧围栏区域中央放置一个宝藏图块，并在入口中间放置一个\
  \ NPC 图块。在此过程中，按住 `Ctrl` 键定位图块可能会很有用，这允许将图块放置在网格方格之间。对于那个 NPC 图块，暂时切换到选择工具，并将自定义属性\
  \ `id` 的值更改为 `Gatekeeper`。（该 NPC 将显示的文本稍后通过代码设置，因此你无需更改此属性。）在右侧围栏区域，在顶部中央添加一个 NPC\
  \ 图块，将 `id` 更改为 `Shopkeeper`，并将 `text` 更改为 `1 heart for 3 coins! 3 arrows for 4\
  \ coins!`（这将产生图 12-2 中所示的消息。）此外，在中间添加一个 ShopHeart 图块和一个 ShopArrow 图块，两者之间至少相隔一个网格方格。在此区域某处添加一个金币图块，以便后续测试。最后，在你创建的封闭区域之外，添加一堆飞行器图块以及更多散落的灌木和岩石图块。\n\
  \n![A352797_2_En_12_Fig5_HTML.jpg](img/A352797_2_En_12_Fig5_HTML.jpg)\n\n图 12-5.\n\
  向对象层添加对象图块\n\n完成后，保存图块地图，如果愿意可以关闭 Tiled 地图编辑器，然后在 BlueJ 中打开 `Treasure Quest` 项目（如果尚未打开）。首先，为了表示英雄和其他游戏实体将与之碰撞的固体对象，类似于第\
  \ 11 章的过程，创建一个名为 `Solid` 的类，包含以下代码：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
  public class Solid extends BaseActor\n{\npublic Solid(float x, float y, float width,\
  \ float height, Stage s)\n{\nsuper(x,y,s);\nsetSize(width, height);\nsetBoundaryRectangle();\n\
  }\n}\n```\n\n接下来，在 `LevelScreen` 类中，添加以下 `import` 语句：\n\n```\nimport com.badlogic.gdx.maps.MapObject;\n\
  import com.badlogic.gdx.maps.MapProperties;\n```\n\n然后，在 `initialize` 方法中添加以下代码，以加载图块地图并生成与图块地图中矩形对应的\
  \ `Solid` 对象：\n\n```\nTilemapActor tma = new TilemapActor(\"assets/map.tmx\", mainStage);\n\
  for (MapObject obj : tma.getRectangleList(\"Solid\") )\n{\nMapProperties props =\
  \ obj.getProperties();\nnew Solid( (float)props.get(\"x\"),     (float)props.get(\"\
  y\"),\n(float)props.get(\"width\"), (float)props.get(\"height\"),\nmainStage );\n\
  }\n```\n\n此时，你可以测试项目，尽管你只会看到关卡的一小部分，并且尚未编写创建对象图块所表示的游戏实体的代码。你的第一个任务是添加英雄角色，这将在下一节中说明。\n\
  \n## 英雄\n\n在本节中，你将创建英雄角色的代码。由于这款游戏采用俯视视角，英雄将拥有四种不同的动画，分别对应四个基本方向（北、南、东、西）的行走。该类的主要职责是初始化动画，并根据实际运动角度显示正确的动画。此外，该类能够确定角色当前面对的角度（将是\
  \ 90 度的倍数）也很重要。\n\n对于冒险游戏或角色扮演游戏，许多包含俯视角色行走动画的精灵表通常会将所有四个方向的动画帧放在一个精灵表中，每个方向一行，如图\
  \ 12-6 所示。这种布局标准尤其因游戏引擎软件 RPG Maker 而普及。要从各行中提取动画帧并创建相应的动画，需要使用 `TextureRegion`\
  \ 类的 `split` 方法，你将会看到这一点。\n\n![A352797_2_En_12_Fig6_HTML.jpg](img/A352797_2_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6.\n包含四个方向行走动画的单个精灵表\n\n首先，创建一个名为 `Hero` 的类，包含以下代码：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
  import com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.Texture;\nimport\
  \ com.badlogic.gdx.graphics.g2d.TextureRegion;\nimport com.badlogic.gdx.graphics.g2d.Animation;\n\
  import com.badlogic.gdx.utils.Array;\npublic class Hero extends BaseActor\n{\nAnimation\
  \ north;\nAnimation south;\nAnimation east;\nAnimation west;\nfloat facingAngle;\n\
  public Hero(float x, float y, Stage s)\n{\nsuper(x,y,s);\nString fileName = \"assets/hero.png\"\
  ;\nint rows = 4;\nint cols = 4;\nTexture texture = new Texture(Gdx.files.internal(fileName),\
  \ true);\nint frameWidth  = texture.getWidth()  / cols;\nint frameHeight = texture.getHeight()\
  \ / rows;\nfloat frameDuration = 0.2f;\nTextureRegion[][] temp = TextureRegion.split(texture,\
  \ frameWidth, frameHeight);\nArray textureArray = new Array();\nfor (int c = 0;\
  \ c < cols; c++)\ntextureArray.add( temp[0][c] );\nsouth = new Animation(frameDuration,\
  \ textureArray, Animation.PlayMode.LOOP_PINGPONG);\ntextureArray.clear();\nfor (int\
  \ c = 0; c < cols; c++)\ntextureArray.add( temp[1][c] );\nwest = new Animation(frameDuration,\
  \ textureArray, Animation.PlayMode.LOOP_PINGPONG);\ntextureArray.clear();\nfor (int\
  \ c = 0; c < cols; c++)\ntextureArray.add( temp[2][c] );\neast = new Animation(frameDuration,\
  \ textureArray, Animation.PlayMode.LOOP_PINGPONG);\ntextureArray.clear();\nfor (int\
  \ c = 0; c < cols; c++)\ntextureArray.add( temp[3][c] );\nnorth = new Animation(frameDuration,\
  \ textureArray, Animation.PlayMode.LOOP_PINGPONG);\nsetAnimation(south);\nfacingAngle\
  \ = 270;\nsetBoundaryPolygon(8);\nsetAcceleration(400);\nsetMaxSpeed(100);\nsetDeceleration(400);\n\
  }\n}\n```\n\n接下来，你需要根据移动方向选择正确的动画。这是一个直接的计算，如图 12-7 所示。例如，如果运动角度在 45 到 135 度之间，那么玩家的移动主要是向北，英雄面向\
  \ 90 度方向。东方方向稍微复杂一些，因为它对应的角度要么在 0 到 45 度之间，要么在 315 到 360 度之间，因此这种情况在相应的 `if-else`\
  \ 语句集中被放在最后处理。\n\n![A352797_2_En_12_Fig7_HTML.jpg](img/A352797_2_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7.\n运动角度范围及对应的动画\n\n为了实现此功能——即根据移动方向激活正确的动画，以及设置和获取英雄当前面对的角度——请向 `Hero` 类添加以下两个方法：\n\
  \n\n\n```\npublic void act(float dt)\n{\nsuper.act(dt);\n// 当角色不移动时暂停动画\nif ( getSpeed()\
  \ == 0 )\nsetAnimationPaused(true);\nelse\n{\nsetAnimationPaused(false);\n// 设置方向动画\n\
  float angle = getMotionAngle();\nif (angle >= 45 && angle < 135)\n{\nfacingAngle\
  \ = 90;\nsetAnimation(north);\n}\nelse if (angle >= 135 && angle < 225)\n{\nfacingAngle\
  \ = 180;\nsetAnimation(west);\n}\nelse if (angle >= 225 && angle <= 315)\n{\nfacingAngle\
  \ = 270;\nsetAnimation(south);\n}\nelse\n{\nfacingAngle = 0;\nsetAnimation(east);\n\
  }\n}\nalignCamera();\nboundToWorld();\napplyPhysics(dt);\n}\npublic float getFacingAngle()\n\
  {\nreturn facingAngle;\n}\n```\n\n接下来，你将把英雄添加到游戏中，并添加用于移动英雄的键盘控制。\n\n在 `LevelScreen`\
  \ 类中，添加以下 `import` 语句：\n\n```\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\n\
  ```\n\n然后，添加以下变量声明：\n\n```\nHero hero;\n```\n\n在 `initialize` 方法中，添加以下代码，该代码从瓦片地图数据中确定英雄的起始位置并初始化对象：\n\
  \n```\nMapObject startPoint = tma.getRectangleList(\"start\").get(0);\nMapProperties\
  \ startProps = startPoint.getProperties();\nhero = new Hero( (float)startProps.get(\"\
  x\"), (float)startProps.get(\"y\"), mainStage);\n```\n\n最后，在 `update` 方法中，为了使用方向键移动英雄并阻止英雄穿过固体对象，添加以下代码：\n\
  \n```\n// 英雄移动控制\nif (Gdx.input.isKeyPressed(Keys.LEFT))\nhero.accelerateAtAngle(180);\n\
  if (Gdx.input.isKeyPressed(Keys.RIGHT))\nhero.accelerateAtAngle(0);\nif (Gdx.input.isKeyPressed(Keys.UP))\n\
  hero.accelerateAtAngle(90);\nif (Gdx.input.isKeyPressed(Keys.DOWN))\nhero.accelerateAtAngle(270);\n\
  for (BaseActor solid : BaseActor.getList(mainStage, \"Solid\"))\n{\nhero.preventOverlap(solid);\n\
  }\n```\n\n现在是测试项目的好时机，以确保英雄按预期移动。\n\n## 剑\n\n接下来，你将向游戏中添加一把剑；按下 `S` 键将使剑出现。英雄将做出挥剑弧线动作，然后剑会消失。此过程中的第一个挑战是让剑出现在正确的位置，并与当前显示的动画保持一致。在本游戏中，你将假设英雄是右撇子，因此剑柄应出现在英雄右手的位置，如图\
  \ 12-8 所示。该位置相对于英雄图像的左下角，将存储为英雄图形宽度和高度的百分比。\n\n![A352797_2_En_12_Fig8_HTML.jpg](img/A352797_2_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8.\n\n每个方向图像中英雄右手的位置（用 X 标记）\n\n此外，一旦剑被正确放置，它将挥动一个 90 度的弧线，如图 12-9 所示。这可以通过将初始旋转设置为比英雄面向角度小\
  \ 45 度，然后使用一个动作将剑旋转 90 度（逆时针）来实现。由于剑应围绕其剑柄（而非中心）旋转，因此原点的 x 坐标应设置为 0。\n\n![A352797_2_En_12_Fig9_HTML.jpg](img/A352797_2_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9.\n\n挥剑时使用的旋转弧线\n\n最后，每次玩家按下 S 键时，不会生成一个新的剑对象，而是只有一个剑对象实例，仅在英雄挥剑时可见。此外，在挥剑过程中，英雄将停止移动，并且在第一次挥剑完成之前（以剑再次变为不可见为标志），剑不能第二次挥动。为了实现所有这些功能，首先创建一个名为\
  \ `Sword` 的新类，代码如下：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic\
  \ class Sword extends BaseActor\n{\npublic Sword(float x, float y, Stage s)\n{\n\
  super(x,y,s);\nloadTexture(\"assets/sword.png\");\n}\n}\n```\n\n接下来，在 `LevelScreen`\
  \ 类中，添加以下 `import` 语句：\n\n```\nimport com.badlogic.gdx.math.Vector2;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
  ```\n\n然后，添加以下变量声明：\n\n```\nSword sword;\n```\n\n在 `initialize` 方法中，按如下方式设置剑：\n\n\
  ```\nsword = new Sword(0,0, mainStage);\nsword.setVisible(false);\n```\n\n在 `update`\
  \ 方法中，为了在挥剑期间阻止英雄移动，找到与英雄加速对应的 `if` 语句，并将它们包含在一个条件语句中，如下所示：\n\n```\nif ( !sword.isVisible()\
  \ )\n{\n// 英雄移动控制\n// （以下代码省略）\n}\n```\n\n为了处理实际的挥剑动作，将以下方法添加到 `LevelScreen` 类中：\n\
  \n```\npublic void swingSword()\n{\n// 可见性决定剑是否正在挥动\nif ( sword.isVisible() )\n\
  return;\nhero.setSpeed(0);\nfloat facingAngle = hero.getFacingAngle();\nVector2\
  \ offset = new Vector2();\nif (facingAngle == 0)\noffset.set( 0.50f, 0.20f );\n\
  else if (facingAngle == 90)\noffset.set( 0.65f, 0.50f );\nelse if (facingAngle ==\
  \ 180)\noffset.set( 0.40f, 0.20f );\nelse // facingAngle == 270\noffset.set( 0.25f,\
  \ 0.20f );\nsword.setPosition( hero.getX(), hero.getY() );\nsword.moveBy( offset.x\
  \ * hero.getWidth(), offset.y * hero.getHeight() );\nfloat swordArc = 90;\nsword.setRotation(facingAngle\
  \ - swordArc/2);\nsword.setOriginX(0);\nsword.setVisible(true);\nsword.addAction(\
  \ Actions.rotateBy(swordArc, 0.25f) );\nsword.addAction( Actions.after( Actions.visible(false)\
  \ ) );\n// 当英雄面向北方或西方时，英雄应显示在剑的前面\nif (facingAngle == 90 || facingAngle == 180)\n\
  hero.toFront();\nelse\nsword.toFront();\n}\n```\n\n最后，为了让玩家能够挥剑，由于这是一个离散动作，你需要在\
  \ `LevelScreen` 类中添加一个 `keyDown` 方法：\n\n```\npublic boolean keyDown(int keycode)\n\
  {\nif (keycode == Keys.S)\nswingSword();\nreturn false;\n}\n```\n\n此时，你的代码已准备好再次测试。在屏幕上四处走动，并尝试在每个方向挥剑。不过，目前还没有可以挥砍的目标；这将在下一节中得到解决。\n\
  \n\n\n## 灌木与岩石\n\n现在，你将添加代码来创建之前在地图编辑器中放置的灌木和岩石对象。灌木和岩石将是实体对象，因此它们的类将继承 `Solid`\
  \ 类。灌木被剑击中时会消失，而岩石则不会。岩石被实现为独立对象（而非地图块），以便可以设置非正方形的边界多边形。\n\n首先，使用以下代码创建一个名为 `Bush`\
  \ 的类：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class Bush extends\
  \ Solid\n{\npublic Bush(float x, float y, Stage s)\n{\nsuper(x,y,32,32,s);\nloadTexture(\"\
  assets/bush.png\");\nsetBoundaryPolygon(8);\n}\n}\n```\n\n然后，使用以下代码创建一个名为 `Rock`\
  \ 的类：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class Rock extends\
  \ Solid\n{\npublic Rock(float x, float y, Stage s)\n{\nsuper(x,y,32,32,s);\nloadTexture(\"\
  assets/rock.png\");\nsetBoundaryPolygon(8);\n}\n}\n```\n\n为了从地图数据中创建这些对象，在 `LevelScreen`\
  \ 类的 `initialize` 方法中添加以下代码：\n\n```\nfor (MapObject obj : tma.getTileList(\"Bush\"\
  ) )\n{\nMapProperties props = obj.getProperties();\nnew Bush( (float)props.get(\"\
  x\"), (float)props.get(\"y\"), mainStage );\n}\nfor (MapObject obj : tma.getTileList(\"\
  Rock\") )\n{\nMapProperties props = obj.getProperties();\nnew Rock( (float)props.get(\"\
  x\"), (float)props.get(\"y\"), mainStage );\n}\n```\n\n由于 `Bush` 和 `Rock` 类继承自 `Solid`\
  \ 类，在 `update` 方法中，通过遍历 `Solid` 对象列表的 `for` 循环，已经防止了与这些对象的重叠。为了让剑能够摧毁灌木，在 `update`\
  \ 方法中添加以下代码：\n\n```\nif ( sword.isVisible() )\n{\nfor (BaseActor bush : BaseActor.getList(mainStage,\
  \ \"Bush\"))\n{\nif (sword.overlaps(bush))\nbush.remove();\n}\n}\n```\n\n现在，你可以再次测试代码，用英雄的剑尽情砍伐灌木。\n\
  \n## 用户界面\n\n接下来，你将设置用户界面，用于显示剩余生命值以及玩家当前持有的金币和箭矢数量。为了保持界面简洁，将使用图像而非文字，如图 12-10\
  \ 所示。用户界面还将包含一个标签，用于在适当时显示“游戏结束”消息，以及一个用于与 NPC 对话的对话框（不过这个功能将在后续使用）。\n\n![A352797_2_En_12_Fig10_HTML.jpg](img/A352797_2_En_12_Fig10_HTML.jpg)\n\
  \n图 12-10.\n\n用户界面中用于表示生命值、金币和箭矢的图像\n\n首先，在 `LevelScreen` 类中添加以下 `import` 语句：\n\n\
  ```\nimport com.badlogic.gdx.graphics.Color;\nimport com.badlogic.gdx.scenes.scene2d.ui.Label;\n\
