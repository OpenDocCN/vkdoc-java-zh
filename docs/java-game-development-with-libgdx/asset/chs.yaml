  ## 管理演员对象集合


  对《海星收集者》游戏的下一项改进，将是向游戏中添加多个海星和岩石对象。你当然不想为每个单独的实例都创建一个新变量，因此需要一种方法来管理所有这些对象。你可以创建一个数组来存储这些数据，但这对于海星来说并不适用，因为海星的数量会随着被收集而减少，而数组用于存储固定数量的对象。在这种情况下，更好的数据结构是使用列表。


  ### 列表


  数据结构是用于存储、组织和访问数据的专用格式。在 Java 编程中，最先遇到的数据结构通常是数组，它可以存储固定数量的单一类型对象；存储在数组中的值之后可以通过一个表示数组内位置索引的整数来访问。虽然数组易于理解，但它也有一些缺点，例如在创建时大小固定，并且需要通过索引号来访问元素。Java
  提供了多种替代的数据结构，其中之一就是列表。


  列表是一种用于存储元素集合的数据结构。在 Java 编程语言中有多种类型的列表，每种列表都实现了由 `List` 接口定义的方法。这些方法包括：


  *   `add`，用于向列表末尾添加一个元素

  *   `remove`，用于从列表中移除一个元素（如果该元素在列表中的话）

  *   `size`，用于返回列表中的元素数量

  *   `contains`，如果列表包含指定元素则返回 true


  有许多类实现了 `List` 接口；在本书中，通常会使用 `ArrayList` 类。在初始化一个 `ArrayList`（或任何其他类型的列表）时，不需要指定列表的大小。然而，`ArrayList`
  是一个泛型类，你应该（使用尖括号）指定列表中存储的数据类型。例如，考虑以下代码，它创建了一个用于存储 `String` 数据的 `ArrayList`，并添加和移除了一些名字：


  ```

  // 初始化 ArrayList 以存储 String 数据

  ArrayList names = new ArrayList();

  // 向列表添加数据

  names.add("Lee");

  names.add("Dan");

  names.add("Chris");

  // names.size() 返回 3

  // names.contains("Lee") 返回 true

  // 从列表中移除 "Lee"

  names.remove("Lee");

  // names.size() 现在返回 2

  // names.contains("Lee") 现在返回 false

  ```


  使用 `ArrayList` 的另一个优点是，如果你想使用循环对每个元素执行某些操作，可以使用 `for-each` 循环（如下代码所示），它允许你创建一个索引变量来遍历存储在
  `ArrayList` 中的对象；这与遍历标准数组形成对比，在标准数组中，你的索引变量必须是一个 `int`，用于遍历数组中存储对象的位置，并且检索对象本身需要额外的代码行。例如，考虑基于数组的循环遍历代码：


  ```

  String[] nameArray;

  // 省略：将值存储到数组中的代码

  for (int n = 0; n < nameArray.length; n++)

  {

  String name = nameArray[n];

  // 此处为其他代码

  }

  ```


  这等同于以下基于列表的循环遍历代码：


  ```

  ArrayList nameList;

  // 省略：将值存储到列表中的代码

  for (Sting name : nameList)

  {

  // 此处为其他代码

  }

  ```


  在许多情况下，前面代码的 `ArrayList` 版本更直观且更易于维护。但是，如果你以这种方式遍历列表，则不能在循环内添加或移除列表中的元素，因为这将导致异常（具体来说是
  `ConcurrentModification` 异常）。


  在本书中，你将使用 `ArrayList` 类来管理演员对象的集合。理论上，在 `game` 类中，你可以为每种类型的演员（例如 `Starfish` 和 `Rock`）创建自己的列表。然而，为了提高开发效率，你将在
  `BaseActor` 类中编写一个方法来为你处理这个任务。你可能还记得，每个舞台都存储了一个演员列表。总体思路是编写一个静态⁴方法，该方法接收一个 `Stage`
  和一个类名作为参数，从舞台中提取演员列表，并创建一个新的列表，其中包含那些属于给定名称的类（或该类的扩展）的实例的演员。要完成此任务，请将以下 `import`
  语句添加到 `BaseActor` 类中：


  ```

  import java.util.ArrayList;

  ```


  接下来，将以下方法添加到 `BaseActor` 类中：


  ```

  public static ArrayList getList(Stage stage, String className)

  {

  ArrayList list = new ArrayList();

  Class theClass = null;

  try

  {  theClass = Class.forName(className);  }

  catch (Exception error)

  {  error.printStackTrace();  }

  for (Actor a : stage.getActors())

  {

  if ( theClass.isInstance( a ) )

  list.add( (BaseActor)a );

  }

  return list;

  }

  ```


  在上述代码中，`try`-`catch` 块是必需的，以防 `forName` 方法无法返回一个类（如果输入的名称与项目中的类不对应，则可能发生这种情况）。`isInstance`
  方法检查特定对象是否是给定类（`theClass`）或扩展了给定类的类的实例。


  在某些情况下，了解在特定时间点特定类型的对象还剩下多少个实例也会很方便。借助前面的方法可以轻松计算出这一点。将以下方法添加到 `BaseActor` 类中，该方法检索相应的对象列表，并且不将其赋值给变量（这没有必要，因为在此方法中不需要再次引用它），而是立即调用列表的
  `size` 方法并返回此值。


  ```

  public static int count(Stage stage, String className)

  {

  return getList(stage, className).size();

  }

  ```


  接下来，你将重写 `StarfishCollector` 类的大部分内容，以整合多个海星和岩石。你将能够移除 `Starfish` 和 `Rock` 变量，因为实例将通过新添加的
  `getList` 方法访问。重复调用构造函数而不将结果存储在变量中可能看起来很奇怪，但请记住，`BaseActor` 类的构造函数会将它们添加到 `Stage`
  中，因此实例不会丢失。这些更改主要涉及引入 `for` 循环以及重新排列先前版本中的代码，尽管胜利条件的处理方式有所不同。请按如下方式重写 `StarfishCollector`
  类：




  ```

  // 与之前相同的导入语句

  public class StarfishCollector extends GameBeta

  {

  private Turtle turtle;

  private boolean win;

  public void initialize()

  {

  BaseActor ocean = new BaseActor(0,0, mainStage);

  ocean.loadTexture( "assets/water.jpg" );

  ocean.setSize(800,600);

  new Starfish(400,400, mainStage);

  new Starfish(500,100, mainStage);

  new Starfish(100,450, mainStage);

  new Starfish(200,250, mainStage);

  new Rock(200,150, mainStage);

  new Rock(100,300, mainStage);

  new Rock(300,350, mainStage);

  new Rock(450,200, mainStage);

  turtle = new Turtle(20,20, mainStage);

  win = false;

  }

  public void update(float dt)

  {

  for (BaseActor rockActor : BaseActor.getList(mainStage, "Rock"))

  turtle.preventOverlap(rockActor);

  for (BaseActor starfishActor : BaseActor.getList(mainStage, "Starfish"))

  {

  Starfish starfish = (Starfish)starfishActor;

  if ( turtle.overlaps(starfish) && !starfish.collected )

  {

  starfish.collected = true;

  starfish.clearActions();

  starfish.addAction( Actions.fadeOut(1) );

  starfish.addAction( Actions.after( Actions.removeActor() ) );

  Whirlpool whirl = new Whirlpool(0,0, mainStage);

  whirl.centerAtActor( starfish );

  whirl.setOpacity(0.25f);

  }

  }

  if ( BaseActor.count(mainStage, "Starfish") == 0 && !win )

  {

  win = true;

  BaseActor youWinMessage = new BaseActor(0,0,mainStage);

  youWinMessage.loadTexture("assets/you-win.png");

  youWinMessage.centerAtPosition(400,300);

  youWinMessage.setOpacity(0);

  youWinMessage.addAction( Actions.delay(1) );

  youWinMessage.addAction( Actions.after( Actions.fadeIn(1) ) );

  }

  }

  }

