  \n至此，你已经准备好开始为游戏特定对象创建类，并编写游戏玩法本身的代码。\n\n## 创建游戏对象\n\n在本节中，你将为主要游戏对象创建四个类：挡板、墙壁、砖块和球。创建每个类后，你将在`screen`类中添加代码，将这些对象添加到游戏中，并使它们能够相互交互。\n\
  \n\n\n### 挡板\n\n首先，你需要创建一个代表玩家控制的挡板对象的类，这将是最容易设置的对象。创建一个名为 `Paddle` 的新类，包含以下代码：\n\
