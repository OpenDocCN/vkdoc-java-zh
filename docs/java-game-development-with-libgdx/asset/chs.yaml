  ## 世界边界


  海星收集者游戏的下一个改进点与世界本身有关。首先，我们希望将海龟限制在游戏世界的边界内——玩家应该始终能够看到他们控制的角色！游戏世界将被假定为矩形形状。合理的做法是，所有角色都应遵循相同的边界，因此这些数据将存储在一个静态的`Rectangle`变量中。在`BaseActor`类中，添加以下`import`语句：


  ```

  import com.badlogic.gdx.math.Rectangle;

  ```


  然后，添加以下字段：


  ```

  private static Rectangle worldBounds;

  ```


  接下来，添加以下方法，这些方法允许你通过数值或基于某个角色（例如显示背景图像的角色）来存储游戏世界的大小：


  ```

  public static void setWorldBounds(float width, float height)

  {

  worldBounds = new Rectangle( 0,0, width, height );

  }

  public static void setWorldBounds(BaseActor ba)

  {

  setWorldBounds( ba.getWidth(), ba.getHeight() );

  }

  ```


  要将角色保持在由世界边界定义的矩形区域内，你需要进行四次比较，以检查角色的任何边缘（左、右、上、下）是否超出了屏幕的对应边缘，如果是，则设置相应的坐标（x 或
  y）以将角色保持在屏幕上。这通过以下方法实现：


  ```

  public void boundToWorld()

  {

  // 检查左边缘

  if (getX() < 0)

  setX(0);

  // 检查右边缘

  if (getX() + getWidth() > worldBounds.width)

  setX(worldBounds.width - getWidth());

  // 检查下边缘

  if (getY() < 0)

  setY(0);

  // 检查上边缘

  if (getY() + getHeight() > worldBounds.height)

  setY(worldBounds.height - getHeight());

  }

  ```


  现在，为了在海星收集者游戏中建立游戏世界的大小，在`StarfishCollector`类的`initialize`方法中，在设置`ocean`大小之后，添加以下代码行：


  ```

  BaseActor.setWorldBounds(ocean);

  ```


  为了将海龟保持在世界边界内，在`Turtle`类的`act`方法末尾添加以下代码行：


  ```

  boundToWorld();

  ```


  这是另一个运行程序并验证边界功能是否按预期工作的好时机——海龟应该无法移动到屏幕边缘之外。


  在讨论游戏世界边界的话题时，下一个要实现的功能是增加游戏世界的大小，使其大于窗口的大小。在这种情况下，玩家在任何时候都只能看到游戏世界的一部分——一个与窗口大小相同且以玩家角色为中心的区域。游戏世界中可见的区域由`Camera`对象控制，该对象由`Stage`类自动设置（这就是为什么你之前不需要考虑它）。这个过程的主要步骤是不断更新相机的位置，使其与角色对齐。然而，当角色接近游戏世界边缘时，必须小心处理。如果即使在这种情况下相机仍以角色为中心，相机将显示游戏世界之外的部分区域，这些区域通常会渲染为纯黑色（或`render`方法中初始化的任何颜色），如图
  3-12 所示。


  ![A352797_2_En_3_Fig12_HTML.jpg](img/A352797_2_En_3_Fig12_HTML.jpg)


  图 3-12.


  不正确的相机定位导致游戏世界之外的区域渲染为黑色


  为避免此问题，在将相机对准角色后，你可能需要调整相机位置，使其 x 坐标始终至少距离游戏世界左右边缘半个视图区域的宽度（y 坐标同理）。相机位置应被限制的区域由图
  3-13 中虚线包围的区域表示。只要相机保持在该区域内，其视图区域将完全包含在游戏世界内。




  ![A352797_2_En_3_Fig13_HTML.jpg](img/A352797_2_En_3_Fig13_HTML.jpg)


  图 3-13.


  用于将可视区域保持在游戏世界范围内的摄像机边界


  接下来，在 `BaseActor` 类中添加以下 `import` 语句：


  ```

  import com.badlogic.gdx.graphics.Camera;

  import com.badlogic.gdx.utils.viewport.Viewport;

  ```


  前面描述的摄像机移动功能通过以下方法实现，该方法应添加到 `BaseActor` 类中：


  ```

  public void alignCamera()

  {

  Camera cam = this.getStage().getCamera();

  Viewport v = this.getStage().getViewport();

  // 将摄像机居中于角色

  cam.position.set( this.getX() + this.getOriginX(), this.getY() + this.getOriginY(),
  0 );

  // 将摄像机限制在布局范围内

  cam.position.x = MathUtils.clamp(cam.position.x,

  cam.viewportWidth/2,  worldBounds.width -  cam.viewportWidth/2);

  cam.position.y = MathUtils.clamp(cam.position.y,

  cam.viewportHeight/2, worldBounds.height - cam.viewportHeight/2);

  cam.update();

  }

  ```


  为了扩大游戏世界，在 `StarfishCollector` 类中，不要将海洋的大小设置为 800×600 像素，而应将这两个数值改为 1200 和 900，这比
  800×600 的窗口尺寸要大得多。此外，你可能希望将海洋的纹理设置为图像文件 `water-border.jpg` 而不是 `water.jpg`。这个新纹理在边缘处带有类似沙地的边框，游戏开始时屏幕上只有两个边缘会显示该边框，从而给玩家一个视觉提示：游戏世界在其他方向还有延伸。最后，在
  `Turtle` 类的 `act` 方法末尾，添加以下这一行代码：


  ```

  alignCamera();

  ```


  完成这些更改后，你就可以再次测试项目，验证摄像机滚动功能是否按预期工作。


  然而，如果你玩到游戏结束，会发现一个问题：“You Win”消息并未固定在屏幕中央。这是因为该消息属于 `mainStage` 舞台，而该舞台的摄像机正在根据海龟的位置进行调整。这使得消息看起来像是游戏世界中的一个实体对象，而不是用户界面的一部分（用户界面应渲染在游戏世界之上，保持固定位置，并且始终对玩家可见）。解决方法是向框架中添加第二个
  `Stage` 对象，命名为 `uiStage`（用户界面舞台的缩写），它在包含游戏世界实体的舞台之后渲染（因此显示在其上方），并且其绑定的 `Camera`
  位置从不改变。实现这第二个舞台主要需要修改 `GameBeta` 类。在该类中添加以下变量声明：


  ```

  protected Stage uiStage ;

  ```


  在 `create` 方法中，在 `mainStage` 对象对应的代码行之后添加以下代码行：


  ```

  uiStage = new Stage();

  ```


  最后，在 `render` 方法中，在 `mainStage` 对象对应的代码行之后立即添加以下代码行：


  ```

  uiStage.act(dt);

  uiStage.draw();

  ```


  现在，回到 `StarfishCollector` 类。唯一需要做的更改是在创建 `youWinMessage` 对象时，将 `mainStage` 替换为 `uiStage`。这样就完成了所有必要的修改；如果你运行程序并收集所有海星，将会看到无论海龟游到游戏世界的哪个位置，“You
  Win”消息都始终保持在屏幕中央。


  ## 多屏幕


  本章将为 Starfish Collector 添加的最后一个功能是支持游戏中的多屏幕，可用于菜单和额外关卡。到目前为止，所有与游戏相关的代码都包含在 `Game`
  类的扩展中。对于需要多个屏幕的项目，`Game` 类还可以将程序的控制权传递给 `Screen` 对象，每个 `Screen` 对象都有自己的 `render`
  方法，能够处理游戏循环的功能。在本节中，你将把 `GameBeta` 类中的代码重构为两个新的抽象类 `BaseGame` 和 `BaseScreen`，以支持此功能；这些类（连同
  `BaseActor`）将成为本书后续所有游戏项目的基础。`BaseGame` 类主要负责存储由 `Launcher` 类初始化的 `Game` 对象的静态引用，以便派生自
  `Screen` 的类能够轻松访问和切换当前活动的屏幕。`BaseScreen` 类将包含 `GameBeta` 类中的大部分代码，以及 `Screen` 接口要求的一些额外（空）方法声明。`Launcher`
  类将初始化一个扩展 `BaseGame` 的类，而该类又会初始化要显示的第一个屏幕，并将其设置为当前活动屏幕。游戏所需的不同屏幕将扩展 `BaseScreen`
  类；在本节中，这将是菜单屏幕（命名为 `MenuScreen`）和游戏玩法发生的屏幕（命名为 `LevelScreen`）。


  首先是新的 `BaseGame` 类的代码：


  ```

  import com.badlogic.gdx.Game;

  public abstract class BaseGame extends Game

  {

  private static BaseGame game;

  public BaseGame()

  {

  game = this;

  }

  public static void setActiveScreen(BaseScreen s)

  {

  game.setScreen(s);

  }

  }

  ```


  此时，在创建 `BaseScreen` 类之前，`BaseGame` 类会显示错误。接下来是新的 `BaseScreen` 类的代码（其中大部分内容应该看起来很熟悉）：


  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.graphics.GL20;

  import com.badlogic.gdx.scenes.scene2d.Stage;

  import com.badlogic.gdx.Screen;

  public abstract class BaseScreen implements Screen

  {

  protected Stage mainStage;

  protected Stage uiStage;

  public BaseScreen()

  {

  mainStage = new Stage();

  uiStage = new Stage();

  initialize();

  }

  public abstract void initialize();

  public abstract void update(float dt);

  public void render(float dt)

  {

  uiStage.act(dt);

  mainStage.act(dt);

  update(dt);

  Gdx.gl.glClearColor(0,0,0,1);

  Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

  mainStage.draw();

  uiStage.draw();

  }

  // Screen 接口要求的方法

  public void resize(int width, int height) {  }

  public void pause()   {  }

  public void resume()  {  }

  public void dispose() {  }

  public void show()    {  }

  public void hide()    {  }

  }

  ```


  现在，创建一个名为 `LevelScreen` 的新类；除了类声明之外，它与之前的 `StarfishCollector` 类完全相同，因此你只需将该类中的代码复制到这个新类中，如下所示：


  ```

  import com.badlogic.gdx.scenes.scene2d.Action;

  import com.badlogic.gdx.scenes.scene2d.actions.Actions;

  public class LevelScreen extends BaseScreen

  {

  private Turtle turtle;

  private boolean win;

  public void initialize()

  {

  // 代码与 StarfishCollector 的 initialize 方法相同

  }

  public void update(float dt)

  {

  // 代码与 StarfishCollector 的 update 方法相同

  }

  }

  ```


  现在，创建一个名为 `MenuScreen` 的类，其中包含全新的代码。此屏幕将显示游戏标题和一条消息，内容为“按 ''S'' 开始”。当玩家按下 `S` 键时（在
  `update` 方法中检测到），游戏会创建一个 `LevelScreen` 实例，并将控制权转移给该实例。




  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.Input.Keys;

  public class MenuScreen extends BaseScreen

  {

  public void initialize()

  {

  BaseActor ocean = new BaseActor(0,0, mainStage);

  ocean.loadTexture( "assets/water.jpg" );

  ocean.setSize(800,600);

  BaseActor title = new BaseActor(0,0, mainStage);

  title.loadTexture( "assets/starfish-collector.png" );

  title.centerAtPosition(400,300);

  title.moveBy(0,100);

  BaseActor start = new BaseActor(0,0, mainStage);

  start.loadTexture( "assets/message-start.png" );

  start.centerAtPosition(400,300);

  start.moveBy(0,-100);

  }

  public void update(float dt)

  {

  if (Gdx.input.isKeyPressed(Keys.S))

  StarfishGame.setActiveScreen( new LevelScreen() );

  }

  }

  ```


  与之前一样，在引用的类（本例中为 `StarfishGame` 类）被创建之前，此类会显示错误且无法编译；此问题将很快得到解决。


