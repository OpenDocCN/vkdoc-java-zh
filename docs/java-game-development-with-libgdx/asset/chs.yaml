  \ / 2;\nfloat marginY = (600 - totalRows * brickHeight) - 120;\nfor (int rowNum\
  \ = 0; rowNum < totalRows; rowNum++)\n{\nfor (int colNum = 0; colNum < totalCols;\
  \ colNum++)\n{\nfloat x = marginX + brickWidth  * colNum;\nfloat y = marginY + brickHeight\
  \ * rowNum;\nnew Brick( x, y, mainStage );\n}\n}\n```\n\n此时，你可以再次测试项目，以验证砖块是否按预期显示。上述代码产生了如图\
  \ 8-3 所示的排列；如果需要，你可以通过更改 `totalRows` 和 `totalCols` 的值来调整每行和每列的砖块数量，甚至可以通过向 `brickHeight`\
