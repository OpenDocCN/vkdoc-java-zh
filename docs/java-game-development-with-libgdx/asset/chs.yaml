  最后，需要考虑 `update` 方法，它处理大量潜在的玩家输入。玩家使用键盘上的 W/A/S/D 键进行控制，这些键分别对应向前/向左/向后/向右移动，这是许多电脑游戏中的标准配置。在此标准基础上，你还添加了
  R 和 F 键用于向上和向下移动（我们将其视为上升和下降方向）。你还使用 Q 和 E 键来向左和向右旋转（这似乎也容易记忆，因为这些键位于左右移动键的上方）。当同时按下
  Shift 键时，可以使用相同的键以相同方式控制相机。还可以使用 T 和 G 键（你可以用助记词 Top 和 Ground 来记忆）向上和向下倾斜相机。以下是实现所有这些功能的代码，如前所述，应将其包含在
  `update` 方法中：


  ```

  float speed = 3.0f;

  float rotateSpeed = 45.0f;

  if ( !(Gdx.input.isKeyPressed(Keys.SHIFT_LEFT)

  || Gdx.input.isKeyPressed(Keys.SHIFT_RIGHT)) )

  {

  if ( Gdx.input.isKeyPressed(Keys.W) )

  player.moveForward( speed * dt );

  if ( Gdx.input.isKeyPressed(Keys.S) )

  player.moveForward( -speed * dt );

  if ( Gdx.input.isKeyPressed(Keys.A) )

  player.moveRight( -speed * dt );

  if ( Gdx.input.isKeyPressed(Keys.D) )

  player.moveRight( speed * dt );

  if ( Gdx.input.isKeyPressed(Keys.Q) )

  player.turn( -rotateSpeed * dt );

  if ( Gdx.input.isKeyPressed(Keys.E) )

  player.turn( rotateSpeed * dt );

  if ( Gdx.input.isKeyPressed(Keys.R) )

  player.moveUp( speed * dt );

  if ( Gdx.input.isKeyPressed(Keys.F) )

  player.moveUp( -speed * dt );

  }

  if ( Gdx.input.isKeyPressed(Keys.SHIFT_LEFT)

  || Gdx.input.isKeyPressed(Keys.SHIFT_RIGHT) )

  {

  if (Gdx.input.isKeyPressed(Keys.W))

  mainStage3D.moveCameraForward( speed * dt );

  if (Gdx.input.isKeyPressed(Keys.S))

  mainStage3D.moveCameraForward( -speed * dt );

  if (Gdx.input.isKeyPressed(Keys.A))

  mainStage3D.moveCameraRight( -speed * dt );

  if (Gdx.input.isKeyPressed(Keys.D))

  mainStage3D.moveCameraRight( speed * dt );

  if (Gdx.input.isKeyPressed(Keys.R))

  mainStage3D.moveCameraUp( speed * dt );

  if (Gdx.input.isKeyPressed(Keys.F))

  mainStage3D.moveCameraUp( -speed * dt );

  if (Gdx.input.isKeyPressed(Keys.Q))

  mainStage3D.turnCamera(-rotateSpeed * dt);

  if (Gdx.input.isKeyPressed(Keys.E))

  mainStage3D.turnCamera(rotateSpeed * dt);

  if (Gdx.input.isKeyPressed(Keys.T))

  mainStage3D.tiltCamera(rotateSpeed * dt);

  if (Gdx.input.isKeyPressed(Keys.G))

  mainStage3D.tiltCamera(-rotateSpeed * dt);

  }

