  此时，你可以通过右键单击标记为 `Launcher` 的矩形，在出现的弹出菜单中选择 `void main(String[] args)` 方法，然后点击随后出现的窗口中的“确定”按钮来测试你的游戏。游戏将如图
  3-5 所示；海龟看起来像是在游泳，而海星则在缓慢旋转。你还无法移动海龟；这一功能将在下一节中添加。


  ![A352797_2_En_3_Fig5_HTML.jpg](img/A352797_2_En_3_Fig5_HTML.jpg)


  图 3-5.


  海星收集者游戏


  ## 物理与运动


  本章开头提出的问题之一是，在上一章的《海星收集者》版本中，移动并不“平滑”：海龟的速度会瞬间从 0 变为每秒 60 像素。在现实中，速度是随时间变化的；物体会加速和减速。在本节中，你将学习一些物理学中的技术术语和概念，以及如何在
  `BaseActor` 类中实现它们，这将使你能够为游戏添加移动功能。虽然你无需掌握底层数学概念也能创建本书中的游戏，但书中仍会提供详细解释，以便你理解所编写的代码。


  ### 速度


  物体的速度表示其位置随时间变化的快慢，包括移动的速率和方向。正如位置使用两个值¹——x 和 y 坐标——来指定一样，速度也有两个分量，分别表示每个坐标的变化情况。如果位置的度量单位是像素，时间的单位是秒，那么速度的度量单位就是像素每秒，通常写作
  pixels/second。在数学中，速度通常使用向量符号表示：分量 a 和 b 的向量用尖括号写作 < a , b >。相比之下，坐标为 x 和 y 的位置通常用圆括号写作
  ( x , y )。向量在视觉上用箭头表示；向量 < a , b > 的绘制方式是从起点开始，终点位于水平方向 a 个单位、垂直方向 b 个单位处，如图 3-6
  所示。速率可以视为该向量的长度（也称为模），图中用 S 表示。向量的方向由向量与水平向右（沿 x 轴正方向）的向量之间的夹角量化，图中用 A 表示。给定 a 和
  b 的值，可以使用数学方法（分别利用勾股定理和三角函数）计算长度和方向角，但得益于 LibGDX 的 `Vector2` 类提供的方法（分别使用 `len` 和
  `angle` 方法），你无需自行编写这些公式。


  ![A352797_2_En_3_Fig6_HTML.jpg](img/A352797_2_En_3_Fig6_HTML.jpg)


  图 3-6.


  向量 < a , b > 的可视化表示，长度为 S，方向角为 A


  涉及位置和速度的计算相对简单。例如，如果一个物体的初始位置为 ( 7 , 5 )，速度为 < 2 , 3 >，那么：


  *   经过一秒后，位置变为 ( 7 + 2 , 5 + 3 ) = ( 9 , 8 )。

  *   经过两秒后，位置变为 ( 9 + 2 , 8 + 3 ) = ( 11 , 11 )。

  *   经过三秒后，位置变为 ( 11 + 2, 11 + 3 ) = ( 13 , 14 )。


  一般来说，如果初始位置为 ( x , y )，速度为 < a , b >，那么经过 t 秒后，位置的公式为 ( x + t*a , y + t*b )。该公式同样适用于
  t 为分数的情况。


  为了将速度数据整合到 `BaseActor` 类中，请添加以下 `import` 语句：


  ```

  import com.badlogic.gdx.math.Vector2;

  import com.badlogic.gdx.math.MathUtils;

  ```


  然后，在类中添加以下字段：


  ```

  private Vector2 velocityVec ;

  ```


  通过在 `constructor` 方法中添加以下语句来初始化该变量：


  ```

  velocityVec = new Vector2(0,0);

  ```


  接下来，你将添加方法来设置和获取 `Actor` 对象的移动速率和角度。需要考虑的一个微妙问题是，当速度向量为 < 0 , 0 >（对应速率为 0 且移动角度未定义）时，应如何设置速率或角度。在这种情况下，设置速率会使移动角度变为零度（沿
  x 轴正方向），而设置角度则不会产生任何效果（因为如果物体速率为 0，那么谈论其朝任何方向移动都没有意义）。这些方法的代码如下：


  ```

  public void setSpeed(float speed)

  {

  // 如果长度为零，则假定移动角度为零度

  if (velocityVec.len() == 0)

  velocityVec.set(speed, 0);

  else

  velocityVec.setLength(speed);

  }

  public float getSpeed()

  {

  return velocityVec.len();

  }

  public void setMotionAngle(float angle)

  {

  velocityVec.setAngle(angle);

  }

  public float getMotionAngle()

  {

  return velocityVec.angle();

  }

  ```


  `getMotionAngle` 方法特别方便，可用于使物体面向其移动方向，这可以通过在 `Actor` 的 `act` 方法中添加代码 `setRotation(
  getMotionAngle() )` 来实现。在某些游戏中，你可能需要知道 `Actor` 是否在移动（或静止）；为此，请在 `BaseActor` 类中同时包含以下方法：


  ```

  public boolean isMoving()

  {

  return (getSpeed() > 0);

  }

  ```




  ### 加速度


  在扎实掌握了速度的概念与术语之后，接下来我们转向加速度。正如速度表示位置的变化，加速度则表示速度的变化。在后续内容中，牢记这一类比将大有裨益：加速度之于速度，正如速度之于位置。


  若速度的单位是像素/秒，那么由于加速度衡量的是速度随时间的变化量，其单位即为像素/秒每秒，也可写作(像素/秒)/秒，或像素/秒²。加速度同样采用向量符号表示。基于加速度调整速度的计算，在代数上与基于速度调整位置的计算完全相同。具体而言，若物体的初始速度为
  < a , b >，且存在恒定加速度 < c , d >，则经过 t 秒后，该时刻的速度公式为 < a + t*c , b + t*d >。这些随时间更新的速度值将依次用于更新物体的位置。


  在 `BaseActor` 类中，为方便起见，您将通过设置加速度大小（通过名为 `setAcceleration` 的方法），然后沿指定方向加速（通过名为 `accelerateAtAngle`
  的方法，该方法以方向角为参数）来处理加速度向量。为实现此功能，请添加以下字段：


  ```

  private Vector2 accelerationVec;

  private float acceleration ;

  ```


  在 `constructor` 方法中使用以下语句初始化这些变量：


  ```

  accelerationVec = new Vector2(0,0);

  acceleration = 0;

  ```


  接下来，按前述说明添加以下方法：


  ```

  public void setAcceleration(float acc)

  {

  acceleration = acc;

  }

  public void accelerateAtAngle(float angle)

  {

  accelerationVec.add( new Vector2(acceleration, 0).setAngle(angle) );

  }

  ```


  为方便后续项目，现在正是添加以下方法的好时机，该方法可使物体沿其当前朝向方向加速：


  ```

  public void accelerateForward()

  {

  accelerateAtAngle( getRotation() );

  }

  ```


  最后，还有一些细微的行为需要讨论和实现。当按住方向键时，玩家控制的角色通常应朝该方向加速。然而，大多数物体无法无限加速或提速——它们的移动速度存在上限，即最大速度，该值因物体而异。此外，当松开方向键时，移动的角色通常会减速并最终停止。物体减速的速率（即减速度）可能因情境而异。例如，汽车在沥青路面上比在冰面上减速更快。但有些物体似乎完全不会减速，例如子弹或激光束；它们的减速度为零。这些数值（最大速度和减速度）需要存储起来，并在后续步骤中加以考虑。为此，请在
  `BaseActor` 类中添加以下字段：


  ```

  private float maxSpeed ;

  private float deceleration;

  ```


  在 `constructor` 中按如下方式初始化：


  ```

  maxSpeed = 1000;

  deceleration = 0;

  ```


  同时添加以下用于设置这些值的方法：


  ```

  public void setMaxSpeed(float ms)

  {

  maxSpeed = ms;

  }

  public void setDeceleration(float dec)

  {

  deceleration = dec;

  }

  ```


  ### 移动


  有了这些变量（`velocityVec`、`accelerationVec`、`acceleration`、`maxSpeed` 和 `deceleration`）及其配套方法，您就可以编写执行本节所述计算并相应更新
  `Actor` 对象位置的方法了。该方法将命名为 `applyPhysics`，并需要将自上次更新以来经过的时间量作为参数。该方法将处理以下任务：


  *   根据加速度向量调整速度向量。

  *   如果物体未加速，则必须对当前速度应用减速度值。

  *   确保速度不超过最大速度值。

  *   根据速度向量调整 `Actor` 对象的位置。

  *   重置加速度向量。


  该方法的代码如下：


  ```

  public void applyPhysics(float dt)

  {

  // 应用加速度

  velocityVec.add( accelerationVec.x * dt, accelerationVec.y * dt );

  float speed = getSpeed();

  // 未加速时降低速度（减速）

  if (accelerationVec.len() == 0)

  speed -= deceleration * dt;

  // 将速度保持在设定范围内

  speed = MathUtils.clamp(speed, 0, maxSpeed);

  // 更新速度

  setSpeed(speed);

  // 应用速度

  moveBy( velocityVec.x * dt, velocityVec.y * dt );

  // 重置加速度

  accelerationVec.set(0,0);

  }

  ```


  现在，将这些方法添加到 `BaseActor` 类后，您就可以在“海星收集者”游戏中实现移动了。唯一需要修改的是 `Turtle` 类，因为海龟是唯一会移动的对象。首先，在
  `Turtle` 类中添加以下 `import` 语句：


  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.Input.Keys;

  ```


  然后，您需要通过向 `constructor` 方法添加以下代码来初始化一些物理相关参数：


  ```

  setAcceleration(400);

  setMaxSpeed(100);

  setDeceleration(400);

  ```


  从这段代码可以清楚地看出，海龟的最大速度将为 100 像素/秒。加速度值 400 意味着速度每秒会增加 400 像素/秒，但由于最大速度为 100 像素/秒，海龟将在
  100/400 = 0.25 秒内达到此速度（从静止开始）。


  最后，您将添加 `act` 方法，该方法将检查方向键是否被按下，如果是，则使海龟朝相应方向加速。要实际更新海龟的位置，必须调用 `applyPhysics` 方法。此外，您还将在海龟未移动时暂停动画（并在海龟移动时恢复动画），以及旋转海龟图像使其与运动角度对齐。以下代码实现了这些任务：


  ```

  public void act(float dt)

  {

  super.act( dt );

  if (Gdx.input.isKeyPressed(Keys.LEFT))

  accelerateAtAngle(180);

  if (Gdx.input.isKeyPressed(Keys.RIGHT))

  accelerateAtAngle(0);

  if (Gdx.input.isKeyPressed(Keys.UP))

  accelerateAtAngle(90);

  if (Gdx.input.isKeyPressed(Keys.DOWN))

  accelerateAtAngle(270);

  applyPhysics(dt);

  setAnimationPaused( !isMoving() );

  if ( getSpeed() > 0 )

  setRotation( getMotionAngle() );

  }

  ```


  现在是一个很好的时机来测试代码，验证海龟是否按预期在屏幕上移动。如果您愿意，可以尝试调整加速度、减速度和最大速度的值，观察它们在游戏中的效果。


  目前，当海龟与海星重叠时，不会发生任何事情。这将在下一节中解决，届时将引入碰撞多边形，使您能够判断两个对象何时重叠。


  ## 碰撞多边形


  在上一章创建的“海星收集者”版本中，海龟与海星之间的碰撞对玩家来说并不精确。这是因为使用矩形来近似物体的形状，而每个图像角落附近都包含大片透明像素区域。为了改进游戏的这一方面，在本节中，您将添加使用多边形而非矩形来近似非矩形形状边界的选项。您还将学习如何使用
  `Intersector` 类检测多边形形状的碰撞，以及如何在游戏中模拟实体对象。




  ### 多边形与矩形


  `Polygon`（多边形）是一种数据结构，通过其顶点（角）的坐标来定义形状；它使用一个`float`值数组进行初始化，该数组依次定义各个顶点的坐标。（相比之下，`Rectangle`类除了宽度和高度外，只需要一个顶点——左下角。）例如，如果一个多边形的顶点为
  (x0,y0), (x1,y1), ... , (xN,yN)，那么对应的`Polygon`对象将使用数组`{x0, y0, x1, y1, ... , xN,
  yN}`进行初始化。例如，要创建一个与矩形形状相同的多边形，该矩形左下角顶点为 (0,0)，宽度为 w，高度为 h（如图 3-7 所示），其顶点（按逆时针顺序）为
  (0,0)、(w,0)、(w,h) 和 (0,h)，则应使用数组`{0, 0, w, 0, w, h, 0, h}`。


  ![A352797_2_En_3_Fig7_HTML.jpg](img/A352797_2_En_3_Fig7_HTML.jpg)


  图 3-7.


  宽度为 w、高度为 h 的矩形的顶点


  实际上，矩形多边形将被用作所有游戏对象的默认形状（第二种选项将在后面讨论）。使用`Polygon`类而非`Rectangle`类的一个重要原因是，`Polygon`对象还可以旋转，这对于也会旋转的游戏实体（例如《海星收集者》中的乌龟）非常有用。


  首先，在`BaseActor`类中添加以下`import`语句：


  ```

  import com.badlogic.gdx.math.Polygon;

  ```


  在类中添加以下字段变量：


  ```

  private Polygon boundaryPolygon;

  ```


  接下来，添加以下方法，该方法按上述方式创建一个矩形多边形：


  ```

  public void setBoundaryRectangle()

  {

  float w = getWidth();

  float h = getHeight();

  float[] vertices = {0,0, w,0, w,h, 0,h};

  boundaryPolygon = new Polygon(vertices);

  }

  ```


  调用此方法的最佳时机是在设置宽度和高度之后，以便自动将此形状设为默认形状，这通常发生在`setAnimation`方法中。在该方法的末尾，添加以下代码：


  ```

  if (boundaryPolygon == null)

  setBoundaryRectangle();

  ```


  下一个（也是最复杂的）任务是编写一个方法，用于初始化一个比矩形“更圆”的多边形形状（以避免仅包含透明像素的角部重叠问题）。为此，你将创建一个多边形，近似于图 3-8
  所示矩形区域内包含的椭圆形状²。此方法涉及一些数学方程来计算顶点坐标。三角函数正弦和余弦可用于参数化圆或椭圆，这意味着你可以根据另一个变量 t 来编写 x 和
  y 坐标的函数。例如，如果我们设 x = cos(t) 且 y = sin(t)，那么当变量 t 的取值范围从 0 到 2 × pi（约 6.28）³时，对应的
  (x,y) 点将描绘出半径为 1 的圆的形状。你可以调整这些方程来生成一个恰好适合给定矩形区域的椭圆，如图 3-8 所示。首先，必须将 x 乘以 w/2，y 乘以
  h/2，以使椭圆具有正确的大小。然而，这样得到的椭圆以原点为中心，而你需要椭圆以 (w/2, h/2) 为中心；因此，将这些值分别加到 x 和 y 方程中。方程的最终形式如下：


  ![A352797_2_En_3_Fig8_HTML.jpg](img/A352797_2_En_3_Fig8_HTML.jpg)


  图 3-8.


  包含在矩形内的椭圆


  ```

  x = w/2 * cos(t) + w/2

  y = h/2 * sin(t) + h/2

  ```


  `setBoundaryPolygon`方法包含一个循环，用于在区间 [0, 6.28] 内生成一组 n 个等间距的 t 值，然后计算对应的 x 和 y 坐标，并将它们存储在一个数组中，该数组将用于初始化多边形。如果
  n = 4，多边形将是菱形；如果 n = 8，多边形将是八边形，依此类推。n 的值越大，形状就越平滑。然而，这需要权衡：通用多边形的碰撞检测计算量很大；n 值过大会显著降低程序运行速度。对于本书中创建的游戏，n
  = 8 的值应该足够精确。图 3-9 展示了一个椭圆及其 n = 8 的多边形近似。


  ![A352797_2_En_3_Fig9_HTML.jpg](img/A352797_2_En_3_Fig9_HTML.jpg)


  图 3-9.


  一个椭圆及其八边形近似


  `setBoundaryPolygon`的代码如下所示。请务必记住，在设置`Actor`对象的大小（无论是通过`setSize`方法手动设置，还是通过`setAnimation`方法自动设置）之前，不要调用此方法，因为此方法需要设置宽度和高度值才能正常工作。


  ```

  public void setBoundaryPolygon(int numSides)

  {

  float w = getWidth();

  float h = getHeight();

  float[] vertices = new float[2*numSides];

  for (int i = 0; i < numSides; i++)

  {

  float angle = i * 6.28f / numSides;

  // x 坐标

  vertices[2*i] = w/2 * MathUtils.cos(angle) + w/2;

  // y 坐标

  vertices[2*i+1] = h/2 * MathUtils.sin(angle) + h/2;

  }

  boundaryPolygon = new Polygon(vertices);

  }

  ```


  接下来是一个名为`getBoundaryPolygon`的方法，它返回此`Actor`的碰撞多边形，并根据`Actor`对象的当前参数（例如位置和旋转）进行调整。


  ```

  public Polygon getBoundaryPolygon()

  {

  boundaryPolygon.setPosition( getX(), getY() );

  boundaryPolygon.setOrigin( getOriginX(), getOriginY() );

  boundaryPolygon.setRotation ( getRotation() );

  boundaryPolygon.setScale( getScaleX(), getScaleY() );

  return boundaryPolygon;

  }

  ```




  ### 检测碰撞


  现在你已为 `BaseActor` 类定义了碰撞多边形，但还需要检测两个多边形何时重叠。与拥有自身 `overlaps` 方法的 `Rectangle` 类不同，`Polygon`
  类并没有该方法。幸运的是，LibGDX 提供的另一个名为 `Intersector` 的工具类拥有这样的方法。你将利用这一点为 `BaseActor` 类创建一个
  `overlaps` 方法。首先，你需要通过以下语句导入前述类：


  ```

  import com.badlogic.gdx.math.Intersector;

  ```


  接下来，将以下方法添加到 `BaseActor` 类中：


  ```

  public boolean overlaps(BaseActor other)

  {

  Polygon poly1 = this.getBoundaryPolygon();

  Polygon poly2 = other.getBoundaryPolygon();

  // 初步测试以提高性能

  if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

  return false;

  return Intersector.overlapConvexPolygons( poly1, poly2 );

  }

  ```


  检查两个多边形是否重叠需要大量计算。因此，为了提高性能，该方法包含一个初步检查，用于判断包围多边形的矩形是否相交（这是一个简单得多的计算）。如果这些更大的矩形不相交，那么多边形就不可能相交，因此该方法可以立即返回
  `false`。否则，多边形有可能相交，此时该方法将返回更精确测试的结果，该结果由 `Intersector` 类的静态方法 `overlapConvexPolygons`
  执行。


  有了这个方法，你就可以为海星收集者游戏添加交互性了。在 `Turtle` 和 `Starfish` 类的 `constructor` 方法中，添加以下代码行（在图像加载之后），以便每个对象使用八边形碰撞多边形来提高精度：


  ```

  setBoundaryPolygon(8);

  ```


  接下来，当海龟与海星重叠时，应发生以下事件：


  *   海星应淡出，然后从舞台上移除。

  *   应创建一个以海星为中心的漩涡效果，并渲染为半透明，以便可以看到其下方的海星。

  *   海星淡出后，屏幕中央应出现一条“你赢了”的消息，初始为透明，然后缓慢淡入。


  回想一下，`Actor` 的 `setPosition` 方法实际上是将 `Actor` 对象的左下角设置到给定位置。为了将 `Actor` 居中于给定位置，你需要将其沿
