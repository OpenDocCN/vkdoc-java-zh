  ### 模拟固体对象


  游戏之所以有趣，部分原因在于玩家在努力达成目标时，必须穿越或克服障碍所带来的挑战。目前，《海星收集者》中没有任何障碍；要赢得游戏，你只需让海龟沿直线游向海星即可。你的下一个任务是为游戏添加最基本的障碍：一个固体对象（一块岩石），海龟需要绕过它才能到达海星。诚然，单独一块岩石算不上什么挑战，但一旦你学会本节中如何模拟固体对象，并将其与下一节（管理对象集合）中将获得的知识相结合，一个全新的可能性世界将向你敞开（例如，创建迷宫）。再次强调，LibGDX
  框架极大地简化了开发过程。


  此前，你已经了解到 `Intersector` 类具备判断两个多边形是否重叠的功能。此外，你很快将看到，这个类还可用于处理碰撞响应。在某些情况下，游戏对象应允许重叠——例如，玩家控制的角色通常就是这样收集物品的。然而，在其他情况下，游戏对象之间应不可能重叠，比如当其中一个代表固体对象（如墙壁）时。在游戏循环的每次迭代中，在计算出角色的新位置（通过诸如
  `applyPhysics` 之类的方法）后，你需要检查角色是否与任何固体对象重叠。如果是，则需要调整其位置，使其不再与固体对象重叠。实现这种调整的方法有很多种，例如：


  *   将角色返回到其先前的位置（在运行 `applyPhysics` 方法之前的位置）。

  *   沿着从当前位置到先前位置的连线，以非常小的增量移动角色，并在不再重叠的第一个点停止。

  *   计算角色需要移动的最小距离所对应的方向，以消除重叠，并据此移动。


  在这三种方法中，你将使用最后一种，因为使用 `Intersector` 类来实现它特别简单。在 `Intersector` 类中，有一个 `overlapConvexPolygons`
  方法的变体，它接受三个参数。前两个参数是正在检查是否重叠的多边形。第三个参数是一个 `MinimumTranslationVector` 对象，用于存储重新定位多边形所需的最小距离和方向，分别存储为一个名为
  `depth` 的 `float` 和一个名为 `normal` 的 `Vector2`。如果多边形之间存在重叠，那么调用该方法的 `Actor` 将根据最小平移向量进行移动，并且两个
  `Actor` 对象之间将不再有重叠。首先，在 `BaseActor` 类中添加以下 `import` 语句：


  ```

  import com.badlogic.gdx.math.Intersector.MinimumTranslationVector;

  ```


  这个名为 `preventOverlap` 的方法如下所示：


  ```

  public Vector2 preventOverlap(BaseActor other)

  {

  Polygon poly1 = this.getBoundaryPolygon();

  Polygon poly2 = other.getBoundaryPolygon();

  // 初始测试以提高性能

  if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

  return null;

  MinimumTranslationVector mtv = new MinimumTranslationVector();

  boolean polygonOverlap = Intersector.overlapConvexPolygons(poly1, poly2, mtv);

  if ( !polygonOverlap )

  return null;

  this.moveBy( mtv.normal.x * mtv.depth, mtv.normal.y * mtv.depth );

  return mtv.normal;

  }

  ```


  此方法还会返回 `Actor` 被移动的方向（当存在重叠时）。虽然你不会在本游戏中使用此信息，但它对未来项目会很有帮助。


  要在你的游戏中添加一块岩石作为固体障碍物，首先使用以下代码创建一个名为 `Rock` 的新类：


