  \ myGame, \"Starfish Collector\", 800, 600 );\n}\n}\n```\n\n在本章的剩余部分，你将按照编程设计原则重新组织这段代码。\n\
  \n## 重新组织游戏流程\n\n一项重要的编程设计实践是：每个方法应只对应一个任务。如果单个方法处理了多个任务，则应将其拆分为多个方法。在本章的第一节讨论视频游戏生命周期时，你了解到在\
  \ LibGDX 中，`render` 方法是游戏运行时被反复调用的方法，因此所有与游戏循环相关的代码都包含在该方法中。然而，游戏循环包含多个任务：处理输入、更新游戏世界的状态（例如确定两个对象重叠时会发生什么），以及将图形绘制到屏幕上。如果可能，这些任务应被分离到不同的方法中。使用\
  \ `Actor` 类的 `act` 方法来处理影响每个角色的输入，是朝着正确方向迈出的一步。\n\n下一步是将用于更新和用于渲染的代码分离到不同的方法中。同时，你还可以通过将常用代码包含在一个基类中（必要时可继承该基类），来简化未来的开发项目，就像之前对\
  \ `Actor` 派生类所做的那样。具体来说，所有未来的游戏项目都需要声明并初始化一个 `Stage` 对象，并运行其 `act` 和 `draw` 方法。你可以使用\
  \ `getDeltaTime` 方法来确定自游戏循环上一次迭代以来经过的时间（通常为 1/60 秒，如前所述，但可能因所用计算机和程序复杂度而波动）。此外，在游戏循环的每次迭代中，你通常会在重新绘制图形之前清屏。⁵\n\
  \n为了实现这些任务，创建一个名为 `GameBeta` 的新类，如下所示。不过，本章稍后会对该类进行一些修改，原因将在后续解释。\n\n```\nimport\
  \ com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.GL20;\n\
  import com.badlogic.gdx.scenes.scene2d.Stage;\npublic class GameBeta extends Game\n\
  {\nprotected Stage mainStage;\npublic void create()\n{\nmainStage = new Stage();\n\
  initialize();\n}\npublic void initialize() {  }\npublic void render()\n{\nfloat\
  \ dt = Gdx.graphics.getDeltaTime();\n// act 方法\nmainStage.act(dt);\n// 由用户定义\nupdate(dt);\n\
  // 清屏\nGdx.gl.glClearColor(0,0,0,1);\nGdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\
  // 绘制图形\nmainStage.draw();\n}\npublic void update(float dt) {  }\n}\n```\n\n有了这段代码后，`StarfishCollectorBeta`\
  \ 类可以改为继承 `GameBeta` 类。在 `StarfishCollectorBeta` 类中，`create` 和 `render` 方法将改为 `initialize`\
  \ 和 `update`（覆盖 `GameBeta` 类中的对应方法），并且 `StarfishCollectorBeta` 类中的冗余代码行（即那些也出现在\
  \ `GameBeta` 类中的代码）将被移除。\n\n然而，在继续之前，还有一个最终主题需要讨论，以使这段代码更加健壮。在实践中，任何以此类为基础的程序都应被要求提供自己的\
  \ `initialize` 和 `update` 方法实现。这让人联想到接口的概念（本章前面讨论过），但接口在这种情况下并不适用，因为接口只能声明所需的方法，而不包含任何实际代码。而在这种情况下，有一些代码是值得复用的。你需要的是一个结合了接口和可继承标准类元素的结构。Java\
  \ 恰好提供了这种情况所需的工具：抽象类。\n\n抽象类\n\n\n\n在编程中，你常常会希望通过将重复的功能重构到基类中，然后用专门的子类扩展该类，来减少冗余代码。在某些情况下，你还会知道所有扩展类都需要实现某个特定方法——但它们会以不同的方式实现，因此代码无法提前在基类中编写，尽管该方法需要在基类中声明。\n\
  \n例如，考虑一个奇幻风格的角色扮演游戏。假设玩家角色的基类名为 `Person`。这个类很可能包含所有 `Person` 对象都应具备的一些标准字段和方法，例如一个名为\
  \ `name` 的 `String` 类型字段，用于存储角色名称，以及用于访问该信息的 get 和 set 方法。你可能想创建两个类，`Wizard` 和 `Warrior`，它们都扩展了\
  \ `Person` 类。假设该游戏的用户界面对所有类型的角色都是一致的，并且包含一个剑按钮（激活名为 `useSword` 的方法）和一个法术按钮（激活名为\
  \ `useSpell` 的方法）。\n\n尽管 `Person` 类会声明这些方法，但它们的实现在 `Wizard` 和 `Warrior` 类中会大相径庭。传统上，战士使用剑，而巫师不使用；巫师施放魔法，而战士不施放。还可以想象其他类型的角色，既能用剑也能施法，或者两者都不能。无论如何，如果玩家点击了对应角色无法执行的动作按钮，屏幕上应显示一条消息解释这一点；否则，该动作应正常执行。\n\
  \n在这种情况下，你会希望要求 `Person` 类的扩展类提供自定义代码来实现 `useSword` 和 `useSpell` 方法，就像接口所做的那样；然而，`Person`\
  \ 不能是一个接口，因为它为某些方法提供了代码，例如获取和设置 `name` 字段。在接口中，方法只被声明，而不被编写。\n\n解决这种情况的方法是创建一个抽象类。你使用额外的关键字\
  \ `abstract` 将类声明为抽象类（类似于使用关键字 `interface` 声明接口的方式），这表示某些方法可能只声明而不提供代码，并且扩展该类的其他类必须为这些方法提供代码。任何此类方法也使用修饰符\
  \ `abstract` 进行声明，如下面的示例代码所示。请注意，由于该类的代码并未全部提供，因此你无法创建该类的实例（同样，类似于接口）。\n\n```\n\
  public abstract class Person\n{\nprivate String name;\npublic void setName(String\
  \ n)  { name = n; }\npublic String getName()  { return name; }\npublic abstract\
  \ void useSword();\npublic abstract void useSpell();\n}\n```\n\n任何扩展 `Person` 的类都必须为每个先前声明为抽象的方法提供实现。例如：\n\
  \n```\npublic class Wizard extends Person\n{\npublic void useSword()\n{\nSystem.out.print(\"\
  巫师无法挥舞剑...\");\n}\npublic void useSpell()\n{\n// 在此处插入选择法术及其目标的代码\n}\n}\npublic\
  \ class Warrior extends Person\n{\npublic void useSword()\n{\n// 在此处插入攻击敌人的代码\n\
  }\npublic void useSpell()\n{\nSystem.out.print(\"战士无法使用魔法...\");\n}\n}\n```\n\n\
  通过这种方式，抽象类结合了标准类和接口的优点。\n\n使用抽象类将要求任何扩展 `GameBeta` 的类提供初始化及更新游戏世界的方法实现。这也有助于开发者避免潜在错误，例如拼错他们应该重写的方法名称。\n\
  \n需要对之前展示的 `GameBeta` 类进行的更改如下。特别注意，`initialize` 和 `update` 方法的方法体已被移除，并且在声明这些方法的行末尾添加了分号。\n\
  \n```\n// import 语句保持不变\npublic abstract class GameBeta extends Game\n{\nprotected\
  \ Stage mainStage;\n// create 方法保持不变\npublic abstract void initialize();\n// render\
  \ 方法保持不变\npublic abstract void update(float dt);\n}\n```\n\n以 `GameBeta` 类作为基类，`StarfishCollectorBeta`\
  \ 类可以大大简化，如前所述。对该类的更改在下面的注释代码中进行了解释。请注意，当你更改一个类中的代码时，其他依赖它的类会显示错误，直到更改完成。\n\n```\n\
  // import 语句保持不变\n// 此类现在扩展 GameBeta 而非 Game\npublic class StarfishCollectorBeta\
  \ extends GameBeta\n{\n// 移除了 mainStage 的声明\nprivate Turtle turtle;\nprivate ActorBeta\
  \ starfish;\nprivate ActorBeta ocean;\nprivate ActorBeta winMessage;\nprivate boolean\
  \ win;\n// create 方法重命名为 initialize\npublic void initialize()\n{\n// 移除了 mainStage\
  \ 的初始化\n// 方法的其余部分保持不变\n}\n// render 方法重命名为 update；需要 float 类型参数 dt\npublic void\
  \ update(float dt)\n{\n// 移除了 render 方法的大部分代码\n// 检查获胜条件：海龟必须与海星重叠\nif (turtle.overlaps(starfish))\n\
  {\nstarfish.remove();\nwinMessage.setVisible(true);\n}\n}\n}\n```\n\n如你所见，这个类现在专注于游戏本身（游戏对象及其相互交互），而不是框架问题（例如设置和使用舞台）。你现在可以像之前一样，通过运行相应启动器类中的\
  \ `main` 方法来游玩该游戏。\n\n恭喜你在 LibGDX 中创建了你的第一个游戏！\n\n\n\n## 总结与后续步骤\n\n本章介绍了 LibGDX\
  \ 库的许多特性。你首先了解了游戏程序的生命周期概览，并学习了生命周期各阶段如何通过遵循特定命名约定的方法（由接口强制执行）来执行。你学习了如何使用 `Gdx`\
  \ 类处理键盘输入，以及如何使用 `Actor` 类封装游戏实体数据。你学习了如何使用 `Stage` 类管理 `Actor` 实例，以及如何扩展 `Actor`\
  \ 类以获得更强大的功能。你还学习了如何通过扩展 `Game` 类来重组游戏流程并简化未来的游戏开发项目。\n\n为了练习本章所学的技能，你可以尝试在游戏中添加另一个对象：一只海龟必须避开的鲨鱼；如果海龟与鲨鱼重叠，则应将海龟从舞台上移除，并在屏幕上显示“Game\
  \ Over”消息。此添加项所需的图形资源已提供在本项目的 `assets` 文件夹中。\n\n在下一章中，你将创建一个更精致的 Starfish Collector\
  \ 游戏版本，该版本由 `Actor` 类的一个新扩展（将取代 `ActorBeta`）驱动，支持动画、基于物理的运动、改进的碰撞检测以及使用列表管理多个 Actor\
  \ 实例的能力。\n\n脚注 1\n\n通常无需以高于此速度运行，因为大多数计算机显示硬件无法以高于此速率显示图像。\n\n  2\n\n本章稍后部分将演示如何更直观地组织代码，以便更新和渲染阶段由单独的方法处理。\n\
