  ## 声音与音乐


  得益于 LibGDX 库的内置功能，为游戏添加音频是一个直接了当的过程。支持的文件类型包括 MP3、OGG 和 WAV。LibGDX 为此提供了两个接口：`Sound`
  和 `Music`，每个接口都可以通过 `Gdx` 类的 `audio` 对象创建。实现这些接口的类取决于所使用的平台；方便的是，这些细节已由 LibGDX 为您处理。


  `Sound` 接口用于音效：当离散的游戏事件发生时播放的小型音频文件，例如收集物品、角色跳跃或两个物体碰撞时。音效通常很短（几秒或更短），对应的文件不应大于
  1 MB。（对于较大的音频片段，您应该使用接下来要解释的 `Music` 接口。）例如，要从名为 `beep.wav` 的音频文件创建一个 `Sound` 对象，您可以编写以下代码：


  ```

  Sound effect = Gdx.audio.newSound( Gdx.files.internal("beep.wav") );

  ```


  创建声音后，使用 `play` 方法播放，该方法可选地接受一个浮点参数，用于确定声音播放的音量（0 为静音，1 为最大音量）。单个音效可以快速连续播放多次；在这种情况下，声音会简单地相互重叠。


  `Music` 接口用于较长的音频序列，例如背景音乐或环境音。`Music` 对象是从文件中流式传输的，而不是完全加载到内存中（后者是 `Sound` 对象的情况），这就是为什么在这种情况下可以使用大于
  1 MB 的文件。例如，要从名为 `song.mp3` 的音频文件创建一个 `Music` 对象，您可以编写以下代码：


  ```

  Music song = Gdx.audio.newSound( Gdx.files.internal("song.mp3") );

  ```


  `Music` 对象的音量可以随时使用 `setVolume` 方法设置，该方法接受一个浮点值，就像 `Sound` 对象一样。如果您希望音频循环播放，请使用
  `setLooping(true)` 方法。要控制播放，有 `play`、`pause` 和 `stop` 方法。要获取有关当前播放状态的信息，您可以使用 `isPlaying`、`isLooping`
  和 `getPosition` 方法，后者返回以秒为单位的当前位置。


  接下来，您将看到如何向上一章创建的 Starfish Collector 游戏中添加音乐和音效，以及一个可用于静音和取消静音的按钮，如图 6-2 所示。


