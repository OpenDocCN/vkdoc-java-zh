  你需要一个位置来保存最终的效果文件，因此，现在请复制第 4 章中的 `Space Rocks` 项目，并将副本重命名为 `Space Rocks Particles`。你将把使用
  LibGDX 粒子编辑器创建的效果文件存储在此目录的 `assets` 文件夹中。同时，下载本章的源文件，并从下载的 `Space Rocks Particles`
  项目的 `assets` 文件夹中，将图像文件 `particle.png` 复制到你自己的 `Space Rocks Particles` 项目的 `assets`
  文件夹中。


  ### 火箭推进器效果


  你的第一个目标是创建一个火箭推进器效果，如图 15-5 所示。


  ![A352797_2_En_15_Fig5_HTML.jpg](img/A352797_2_En_15_Fig5_HTML.jpg)


  图 15-5.


  火箭推进器粒子效果


  启动粒子编辑器程序后，在左下角的“效果发射器”面板中，点击“新建”按钮，并将新创建的列表条目重命名为 `thruster`（双击其名称即可重命名）。点击名为 `Untitled`
  的列表项（它对应默认的类似火焰的示例），然后点击“删除”按钮将其移除。


  在“发射器属性”面板底部的一组选项中，取消选中“叠加”复选框，并选中“连续”复选框。现在你应该会在预览面板中央看到一个红色圆点。


  首先，你将调整任意时刻活跃的粒子数量。将“计数”属性的“最大值”改为 100。要达到这个数量，你还必须将“发射”属性的“高值”改为 200。（将此值改为 100
  是不够的，因为每个粒子只持续 0.5 秒，而 500 毫秒是“生命”属性的默认值。100 的发射速率在任何给定时刻只会产生 50 个活跃粒子。）


  接下来，点击“速度”和“角度”属性旁边的“激活”按钮。对于“速度”，点击“高值”旁边的 `>` 按钮，并输入数值 300 和 400。对于“角度”，再次点击“高值”旁边的
  `>` 按钮，并输入数值 70 和 110。现在你应该会看到红色粒子以摇摆的锥形图案向上喷射。


  现在，修改“色调”参数图，使色调颜色从起始的红色变为中间的橙色，再到末尾的黄色。完成此步骤后，预览面板中的粒子在发射器底部应显示为红色，并逐渐变色，直到顶部变为黄色。


  最后，粒子应在生命周期结束时缩小并淡出消失。为此，修改“大小”和“透明度”的参数变化图，使它们都类似于图 15-3 中的“突然减少”图。


  完成此步骤后，点击“保存”按钮，将文件保存到你的项目 `assets` 目录中，文件名为 `thruster.pfx`。尽管粒子效果数据存储在文本文件中，但你会使用扩展名
  `pfx` 作为助记符，以指示文件中的数据类型。此外，如果之前没有做过，你还需要将 `particle.png` 图像文件从 `Particle Editor`
  目录复制到你本地项目的 `assets` 目录中，以便效果能在 LibGDX 中正确加载。




  ### 爆炸效果


  接下来要创建的是一个经典效果——爆炸，如图 15-6 所示。该效果由两个发射器组成：一个控制初始出现的火焰，另一个控制随后产生的烟雾。


  ![A352797_2_En_15_Fig6_HTML.jpg](img/A352797_2_En_15_Fig6_HTML.jpg)


  图 15-6.


  爆炸粒子效果


  重新启动粒子编辑器。像之前一样，创建一个新的发射器。将其命名为 `fire`，然后删除默认发射器。保留默认选项设置：勾选“Additive”复选框，不勾选“Continuous”复选框。


  将 Count 属性的 Max 值调整为 100。将 Duration 值改为 250。为了达到最大粒子数量，将 Emission 属性的 High 值设为 400。将
  Size 属性的 High 值范围设为 0 到 100，并修改其曲线图，使其类似于“逐渐减小”曲线。将 Velocity 属性设为 Active，将其 High
  值范围设为 0 到 160，并修改其曲线图，使其类似于“突然减小”曲线。将 Angle 属性设为 Active，并将其 High 值范围设为 0 到 360。最后，设置
  Tint 属性，使粒子颜色在其生命周期内从红色渐变为橙色。


  此时，预览面板应反复显示以下效果：出现一个球状物，边缘为红色，中心为黄色，随后喷射出碎片，这些碎片在远离中心时逐渐缩小。


  当您对这个效果满意后，创建另一个发射器并将其命名为 `smoke`。（不要删除 fire 发射器！）从列表中选择 smoke 发射器，然后点击“Up”按钮；这会将其在渲染顺序中上移。确保发射器旁边的复选框已勾选，以便其可见。这一点很重要，因为您希望烟雾粒子出现在火焰粒子之后，因此烟雾粒子必须首先渲染。在继续之前，请确保在发射器列表中，smoke
  发射器既已勾选（可见）又处于高亮状态（以便接下来修改的是 smoke 发射器的参数）。


  下一步是修改烟雾发射器的属性。将 Count Max 值设为 20，Duration 值设为 200，Emission High 值设为 100。将 Delay
  属性设为 Active，并将其值设为 400；这将使烟雾发射器在火焰发射器启动 400 毫秒后开始工作。接下来，将 Size High 值改为 64。激活 Velocity
  属性，将 High 值设为 100，并修改其曲线图，使其逐渐减小。同时，激活 Angle 属性，将 High 值范围设为 0 到 360。通过将左下角颜色滑块上的旋钮一直拖到右侧，然后将右下角颜色滑块上的旋钮拖到中间，将
  Tint 颜色改为中灰色。修改 Transparency 曲线图，使其缓慢减小。最后，取消勾选“Additive”选项。


  至此，爆炸效果就完成了！将文件保存到 `assets` 目录，文件名为 `explosion.pfx`。


  ### ParticleActor 类


  现在，您可以将粒子效果集成到 Space Rocks 游戏中。首先，创建一个 `Actor` 类的扩展，命名为 `ParticleActor`。该类存储一个 `ParticleEffect`
  对象，用于更新和绘制效果。该类中的大多数方法只是以更直观的名称激活相应 `ParticleEffect` 对象的方法。然而，`ParticleEffect` 类缺少的一个功能是，其
  `draw` 方法并未设计为考虑旋转或缩放因子。为了解决这个问题，您将创建一个名为 `ParticleRenderer` 的内部类来渲染粒子效果，让 `ParticleActor`
  类继承 `Group` 类而非 `Actor` 类，并将 `ParticleRenderer` 的实例添加到 `ParticleActor` 中。这样，调用 `ParticleActor`
  的 `draw` 方法时，会在绘制前将几何变换数据应用于附加的对象，这正是期望的结果。


  `ParticleEffect` 类的 `update` 和 `draw` 方法将通过所有 `Actor` 对象共有的标准 `act` 和 `draw` 方法来激活，并且为了方便，还将包含一个
  `clone` 方法。打开 BlueJ，然后打开您之前创建的 `Space Rocks Particles` 项目。`ParticleActor` 类的代码如下：


  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.scenes.scene2d.Actor;

  import com.badlogic.gdx.scenes.scene2d.Group;

  import com.badlogic.gdx.graphics.g2d.Batch;

  import com.badlogic.gdx.graphics.g2d.ParticleEffect;

  import com.badlogic.gdx.graphics.g2d.ParticleEmitter;

  public class ParticleActor extends Group

  {

  private ParticleEffect   effect;

  private ParticleRenderer renderingActor;

  private class ParticleRenderer extends Actor

  {

  private ParticleEffect effect;

  ParticleRenderer(ParticleEffect e)

  {  effect = e;  }

  public void draw(Batch batch, float parentAlpha)

  {  effect.draw(batch);  }

  }

  public ParticleActor(String pfxFile, String imageDirectory)

  {

  super();

  effect = new ParticleEffect();

  effect.load(Gdx.files.internal(pfxFile), Gdx.files.internal(imageDirectory));

  renderingActor = new ParticleRenderer(effect);

  this.addActor( renderingActor );

  }

  public void start()

  {  effect.start();  }

  // 暂停连续发射器

  public void stop()

  {  effect.allowCompletion();  }

  public boolean isRunning()

  {  return !effect.isComplete();  }

  public void centerAtActor(Actor other)

  {

  setPosition( other.getX() + other.getWidth()/2 , other.getY() + other.getHeight()/2
  );

  }

  public void act(float dt)

  {

  super.act( dt );

  effect.update( dt );

  if ( effect.isComplete() && !effect.getEmitters().first().isContinuous() )

  {

  effect.dispose();

  this.remove();

  }

  }

  public void draw(Batch batch, float parentAlpha)

  {

  super.draw( batch, parentAlpha );

  }

  }

  ```


  有了这个可用的类，您就可以将其与您刚刚生成的粒子效果一起，在 Space Rocks 游戏中使用。




