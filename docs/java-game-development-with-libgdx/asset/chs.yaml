  继续 `Project3D` 项目，你首先应该下载本章的源代码文件，并将 `assets` 文件夹复制到你的项目中，因为它包含了本项目所需的所有图片。然后，你将创建一个简化版的
  `BaseGame` 类，类似于你在前几章中使用过的。创建一个名为 `BaseGame` 的新类，代码如下：


  ```

  import com.badlogic.gdx.Game;

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.InputMultiplexer;

  public abstract class BaseGame extends Game

  {

  private static BaseGame game;

  public BaseGame()

  {

  game = this;

  }

  public void create()

  {

  InputMultiplexer im = new InputMultiplexer();

  Gdx.input.setInputProcessor( im );

  }

  public static void setActiveScreen(BaseScreen s)

  {

  game.setScreen(s);

  }

  }

  ```


  接下来，你需要一个新版本的 `BaseScreen` 类，它使用 `Stage3D` 来包含游戏实体，而不是普通的 `Stage` 对象。然而，一个标准的 `Stage`
  对象对于用户界面来说仍然足够，并且这个类的大部分内容应该与本书前面代码开发中的内容相似，例如实现 `Screen` 和 `InputProcessor` 接口。创建一个名为
  `BaseScreen` 的新类，代码如下：


  ```

  import com.badlogic.gdx.Screen;

  import com.badlogic.gdx.InputProcessor;

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.graphics.GL20;

  import com.badlogic.gdx.scenes.scene2d.Stage;

  import com.badlogic.gdx.InputMultiplexer;

  import com.badlogic.gdx.scenes.scene2d.ui.Table;

  public abstract class BaseScreen implements Screen, InputProcessor

  {

  protected Stage3D mainStage3D;

  protected Stage uiStage;

  protected Table uiTable;

  public BaseScreen()

  {

  mainStage3D = new Stage3D();

  uiStage   = new Stage();

  uiTable = new Table();

  uiTable.setFillParent(true);

  uiStage.addActor(uiTable);

  initialize();

  }

  public abstract void initialize();

  public abstract void update(float dt);

  // 游戏循环方法

  public void render(float dt)

  {

  // 限制窗口被拖动时可能经过的时间量

  dt = Math.min(dt, 1/30f);

  // act 方法

  uiStage.act(dt);

  mainStage3D.act(dt);

  // 由特定游戏类定义

  update(dt);

  // 渲染

  Gdx.gl.glClearColor(0.5f,0.5f,0.5f,1);

  Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT + GL20.GL_DEPTH_BUFFER_BIT);

  // 绘制图形

  mainStage3D.draw();

  uiStage.draw();

  }

  // Screen 接口要求的方法

  public void resize(int width, int height)

  {   uiStage.getViewport().update(width, height, true);  }

  public void pause()   {  }

  public void resume()  {  }

  public void dispose() {  }

  public void show()

  {

  InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();

  im.addProcessor(this);

  im.addProcessor(uiStage);

  }

  public void hide()

  {

  InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();

  im.removeProcessor(this);

  im.removeProcessor(uiStage);

  }

  // InputProcessor 接口要求的方法

  public boolean keyDown(int keycode)

  {  return false;  }

  public boolean keyUp(int keycode)

  {  return false;  }

  public boolean keyTyped(char c)

  {  return false;  }

  public boolean mouseMoved(int screenX, int screenY)

  {  return false;  }

  public boolean scrolled(int amount)

  {  return false;  }

  public boolean touchDown(int screenX, int screenY, int pointer, int button)

  {  return false;  }

  public boolean touchDragged(int screenX, int screenY, int pointer)

  {  return false;  }

  public boolean touchUp(int screenX, int screenY, int pointer, int button)

  {  return false;  }

  }

  ```


  由于这个程序（以及可能的其他程序）会使用盒子和球体形状，接下来你将创建一些扩展 `BaseActor3D` 类的类，利用之前介绍的 `ModelBuilder`
  类的功能为你创建这些形状。首先，创建一个名为 `Box` 的新类，代码如下：


  ```

  import com.badlogic.gdx.graphics.g3d.utils.ModelBuilder;

  import com.badlogic.gdx.graphics.g3d.Material;

  import com.badlogic.gdx.graphics.VertexAttributes.Usage;

  import com.badlogic.gdx.graphics.g3d.Model;

  import com.badlogic.gdx.graphics.g3d.ModelInstance;

  import com.badlogic.gdx.math.Vector3;

  public class Box extends BaseActor3D

  {

  public Box(float x, float y, float z, Stage3D s)

  {

  super(x,y,z,s);

  ModelBuilder modelBuilder = new ModelBuilder();

  Material boxMaterial = new Material();

  int usageCode = Usage.Position + Usage.ColorPacked

  + Usage.Normal   + Usage.TextureCoordinates;

  Model boxModel = modelBuilder.createBox(1,1,1, boxMaterial, usageCode);

  Vector3 position = new Vector3(0,0,0);

  setModelInstance( new ModelInstance(boxModel, position) );

  }

  }

  ```


  接下来，你还需要一个用于创建球体的类。`ModelBuilder` 类包含一个名为 `createSphere` 的方法，类似于 `createBox`，它允许你指定球体在
  x、y、z 方向上的半径⁵、球体在纬度和经度方向上的细分数量（为了获得光滑的球体，你可以将两者都设置为 32），以及相关的 `Material` 和用法代码值。创建一个名为
  `Sphere` 的新类，包含以下代码：




  ```

  import com.badlogic.gdx.graphics.g3d.utils.ModelBuilder;

  import com.badlogic.gdx.graphics.g3d.Material;

  import com.badlogic.gdx.graphics.VertexAttributes.Usage;

