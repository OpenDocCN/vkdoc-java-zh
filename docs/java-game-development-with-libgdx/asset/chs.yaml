  ## 游戏项目：视觉小说


  在本节中，你将基于用户界面类（如`TextButton`和`Table`）以及过场动画框架，创建一个名为《失踪的作业》的新游戏，如图 5-17 所示。这款游戏属于视觉小说类游戏，完全由故事驱动，并向玩家呈现一系列影响故事进程的选择。虽然这是一个练习和提升你创建用户界面元素技能的好机会，但后续章节并不需要这些内容，因此如果你对这种游戏风格不感兴趣，可以跳过此项目。


