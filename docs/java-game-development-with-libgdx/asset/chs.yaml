  在游戏《失踪的作业》中，一名叫凯尔索·基斯梅特的学生把作业忘在了学校的某个地方。玩家需要选择凯尔索将要搜索的地点，直到他找到作业所在的位置。游戏中共有四个地点，如图
  5-18 所示。


