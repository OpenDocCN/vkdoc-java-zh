  \ 值向下增加。\n\n  5\n\n从技术上讲，如果你的程序包含覆盖整个屏幕区域的背景图形，则此步骤并非必需。\n\n"
- '# 3. 扩展框架


  在上一章中，你了解了 LibGDX 中可用的一些基本特性和类，并创建了一个名为 Starfish Collector 的游戏。你还通过将支持常用功能的代码收集到一个名为
  `ActorBeta`（它扩展了 LibGDX 的 `Actor` 类）的类中，实践了良好的软件开发习惯。然而，Starfish Collector 游戏仍然“略显粗糙”；上一章版本的一些不足之处包括：


  *   缺乏动画。

  *   移动不平滑：速度要么为零，要么为恒定值。

  *   碰撞检测不精确。

  *   没有障碍物或阻挡物。

  *   只有一个可收集的对象。

  *   游戏世界仅限于窗口大小，海龟可以移动到窗口边缘之外。

  *   程序运行时，游戏立即开始。


  为了解决这些不足，你将在本章中实现以下改进：


  *   将添加动画：海龟在移动时会呈现游泳姿态（并且会面向移动方向），海星会缓慢旋转（以吸引玩家注意），当海龟收集到海星时会出现类似水花飞溅的特殊效果。

  *   将通过添加加速度和减速度来实现逼真的运动。

  *   将通过用更精确的多边形形状替换矩形来提高碰撞检测的精度。

  *   将添加固体障碍物（岩石）。

  *   将创建多个对象实例。

  *   游戏世界将扩大到超出窗口大小。

  *   游戏开始前将显示一个开始菜单屏幕。


  添加了这些改进后的 Starfish Collector 游戏截图如图 3-1 所示。


