  首先，在 BlueJ 中创建一个名为`The Missing Homework`的新项目。从本书网站下载此项目的文件，并将下载项目中的`assets`文件夹和`+libs`文件夹复制到你的本地项目中。此外，在你的本地项目文件夹中，从你的`Starfish
  Collector Ch 5`项目中复制以下 Java 文件：`BaseGame.java`、`BaseScreen.java`和`BaseActor.java`，以及与过场动画相关的
  Java 文件`DialogBox.java`、`Scene.java`、`SceneSegment.java`、`SetTextAction.java`和`SceneActions.java`。之后需要在
  BlueJ 中重新打开该项目才能看到添加的类。


  在开始编写更多代码之前，确立此项目的结构非常重要。首先，和往常一样，需要有一个自定义的`launcher`类和一个`BaseGame`类的扩展。与添加了过场动画的《海星收集者》游戏类似，这里将有两个`BaseScreen`类的扩展：一个包含菜单，另一个包含显示故事的代码。后者将是一个名为`StoryScreen`的类，它将包含四个方法，用于初始化与前述每个地点相对应的场景片段。（请注意，在创建完所有类之前，以下类将无法编译。）首先，创建一个名为`Launcher`的类，代码如下：


