- "# 1. Java 与 LibGDX 入门\n\n本章将解释如何设置 Java 开发环境，并将其配置为与 LibGDX 游戏开发框架一起运行。你将看到一个简单的“Hello,\
  \ World!”程序示例，并对其进行足够详细的探索，以理解其不同部分。最后，你将了解使用 LibGDX 库所能获得的一些优势。\n\n## 选择开发环境\n\n\
  在深入 Java 编程之前，你需要设置一个集成开发环境（IDE）——你将用于编写、调试和编译代码的软件。有许多用于编写 Java 程序的编辑器，每个都针对不同的技能水平进行了定制。BlueJ（[`www.bluej.org`](http://www.bluej.org)）和\
  \ DrJava（[`www.drjava.org`](http://www.drjava.org)）专为初学者和教育用途设计，常用于学校和大学的编程入门课程。IntelliJ\
  \ IDEA（[`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/)）、NetBeans（`netbeans.org`）和\
  \ Eclipse（`eclipse.org`）是高级编辑器，受到从业专业人士的青睐。要编译和运行 Java 代码，你需要 Java 开发工具包（JDK），它可以直接从\
  \ Oracle 公司获得，或者直接与上面列出的一些编辑器捆绑在一起。\n\n每个编辑器都有优点和缺点。BlueJ 和 DrJava 用户友好，具有简单、极简的用户界面，但缺乏一些高级编辑器的功能，例如字段、方法和导入语句的自动补全。高级编辑器速度更快、功能丰富、更强大、高度可定制，并且拥有各种插件，但它们也有陡峭的学习曲线，并且其用户界面可能对初学者来说更令人生畏。图\
  \ 1-1 通过并排比较 Eclipse 和 BlueJ 的界面说明了这一点。本章中 BlueJ 软件的截图和描述来自 BlueJ 4.1.0 版本。\n\n\
  ![A352797_2_En_1_Fig1_HTML.jpg](img/A352797_2_En_1_Fig1_HTML.jpg)\n\n图 1-1.\n\n\
  Eclipse（左）和 BlueJ（右）的用户界面\n\n本章将介绍如何设置 BlueJ。我选择这个特定的 IDE，是因为它设置和配置起来快速且简单，这将使你能够更快地开始编写游戏程序。但是，如果你已经熟悉并习惯使用更高级的编辑器之一，当然可以随意使用它而不是\
  \ BlueJ。在 LibGDX 维基（[`https://github.com/libgdx/libgdx/wiki`](https://github.com/libgdx/libgdx/wiki)）上有大量关于使用\
  \ LibGDX 设置 Eclipse、NetBeans 和 IntelliJ IDEA 的信息资料。如果你选择使用这些程序之一，那么在 IDE 设置完成后，请跳到下一节“为\
  \ LibGDX 创建‘Hello, World!’程序”。\n\n## 设置 BlueJ\n\n本节将介绍如何设置 BlueJ IDE。由于它是为初学者设计的，步骤数量很少，过程也很直接，正如你将看到的那样。\n\
  \n### 下载与安装\n\nBlueJ 可以从 [`www.bluej.org`](http://www.bluej.org) 下载。\n\n有多种适用于不同操作系统的下载选项。此外，其中一些下载与\
  \ JDK 捆绑在一起，而另一些则没有。JDK 包含用于开发和调试 Java 应用程序的工具；特别是，它对于编译你的代码是必需的。如果你以前使用过你的计算机来开发\
  \ Java 应用程序，那么你可能已经安装了 JDK，并且只需选择独立的 BlueJ 安装程序即可。如果你不确定，你应该下载并运行 BlueJ 组合安装程序。\n\
  \n\n\n### 使用 BlueJ\n\n在学习一门新的编程语言或库时，编写一个“Hello, World!”应用程序作为第一个程序是计算机科学中一个悠久的传统。本节将介绍使用\
  \ BlueJ 编写此程序的基础知识：\n\n1.  启动 BlueJ 软件。（首次运行时，它可能会提示你输入 JDK 存储目录的位置，也可能询问你是否愿意通过提供信息来帮助改进软件。）\n\
  2.  当主窗口出现时，在菜单栏中选择“项目”，然后选择“新建项目”。BlueJ 将你的工作组织成项目，这些项目以目录形式存储；所有 Java 源代码和编译后的类文件都存储在项目目录中。\n\
  3.  当提示输入项目名称时，导航到你想要存储文件的文件夹，输入 `MyProject`，然后点击“确定”按钮。这会在所选位置创建一个同名文件夹。完成第 3 步后，你的屏幕应类似于图\
  \ 1-2。\n\n![A352797_2_En_1_Fig2_HTML.jpg](img/A352797_2_En_1_Fig2_HTML.jpg)\n\n\
  图 1-2.\n\nBlueJ 项目窗口\n4.  创建一个新类，可以通过点击“新建类”按钮，或者从菜单栏中选择“编辑”，然后选择“新建类”。\n5.  当提示你输入类名时，输入\
  \ `HelloWorld` 并按回车键，或点击“确定”按钮。会出现一个橙色矩形，其顶部显示你的类名。灰色的对角线表示代码尚未编译。\n6.  双击该矩形，或右键单击并选择“打开编辑器”来编辑文件。你会看到已经添加了一些模板代码。你应该先删除这些代码；最简单的方法是按\
  \ Ctrl-A 选中所有代码，然后按 Delete 键。接着，在原来的位置输入以下代码：\n\n```\n    public class HelloWorld\n\
  \    {\n    public static void main()\n    {\n    System.out.print(\"Hello, World!\"\
  );\n    }\n    }\n    ```\n\n在 BlueJ 中输入这段代码后，它应该看起来类似于图 1-3 中的截图。暂时不必担心这段代码的作用。如果代码中有任何错误，相应的行号会以红色标记，并且错误的语法会被下划线标出。如果将鼠标指针悬停在错误上，会弹出一个窗口，提供错误的描述，有时还会给出如何修复的建议。图\
  \ 1-4 展示了如果你在前面的源代码中不小心将 `print` 打成了 `pint` 会发生什么。\n\n![A352797_2_En_1_Fig4_HTML.jpg](img/A352797_2_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4.\n\nBlueJ 代码编辑器捕获的语法错误\n\n![A352797_2_En_1_Fig3_HTML.jpg](img/A352797_2_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3.\n\n在 BlueJ 代码编辑器中显示的“Hello, World!”程序\n7.  点击“编译”按钮来编译你的代码。（此操作也会自动保存你的代码。）你应该会在窗口底部的状态栏中看到消息“类已编译\
  \ – 无语法错误”。\n8.  返回 BlueJ 主窗口。右键单击代表该类的橙色矩形（其顶部包含类名 `HelloWorld`），然后从出现的列表中选择方法\
  \ `void main()`。这会运行你刚刚编写的方法。会出现一个终端窗口，其中包含文本 Hello, World!，如图 1-5 所示。\n\n![A352797_2_En_1_Fig5_HTML.jpg](img/A352797_2_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5.\n\n“Hello, World!”程序显示的文本\n\n恭喜你使用 BlueJ 运行了你的第一个程序！\n\nBlueJ 有许多使编程更简单的功能。在输入上述代码时，你可能已经注意到了语法高亮（Java\
  \ 关键字和字符串以不同颜色显示），以及类和方法周围显示的不同背景色，这使得视觉检查代码更加容易。（稍后，你会注意到条件语句和循环也以类似的背景色区分。）BlueJ\
  \ 还包含其他你可能觉得有用的功能，例如：\n\n*   **自动代码格式化**。在源代码编辑窗口的“编辑”菜单中选择“自动布局”，将调整代码中的空白，使嵌套语句对齐一致。\n\
  *   **列出可用的方法名**。在输入类或对象的名称后，接着输入一个句点，然后按 Ctrl+Space 将显示可用方法名的列表。\n*   **用于缩进/取消缩进和注释/取消注释代码块的快捷键**。这些在“编辑”菜单中列出。\n\
  *   **用于添加断点的简单界面**，这会激活一个调试器，允许你逐行执行代码并轻松检查对象。\n\n有关这些功能及其他功能的完整信息，请参阅 [`www.bluej.org/doc/bluej-ref-manual.pdf`](http://www.bluej.org/doc/bluej-ref-manual.pdf)\
  \ 上的 BlueJ 参考手册。此时，你可以关闭代码编辑器窗口和终端窗口。\n\n\n\n### 设置 LibGDX\n\n在本节中，你将配置 BlueJ，使其能够使用\
  \ LibGDX 软件库。软件库是可供其他程序使用的预编写代码和方法的集合。其价值在于可重用性——当它们实现频繁需要的流程时，能够加速并简化开发过程，使程序员无需在每次编写程序时都“重新发明轮子”。例如，LibGDX\
  \ 库包含了用于显示图形、播放声音以及获取用户输入的方法。（此外还提供高级功能，本章稍后将进行讨论。）\n\n在 Java 中，库存储在 Java 归档（JAR）文件中。一个\
  \ JAR 文件包含许多已编译的 Java 文件（类似于 ZIP 文件），并以 JDK 能够导航的标准目录结构进行存储。你的第一步是获取项目所需的 LibGDX\
  \ JAR 文件。获取这些文件的最新官方信息位于 [`https://github.com/libgdx/libgdx/wiki/Updating-LibGDX`](https://github.com/libgdx/libgdx/wiki/Updating-LibGDX)，这对初学者来说可能有些令人困惑。另一种更简单的选择是使用本书下载网站\
  \ `apress.com` 上包含的这些文件版本。¹ 本书所有项目所需的五个 JAR 文件是 `gdx.jar`、`gdx-sources.jar`、`gdx-natives.jar`、`gdx-backend-lwjgl.jar`\
  \ 和 `gdx-backend-lwjgl-natives.jar`；它们包含了 LibGDX 库的核心代码。\n\n获取这四个 JAR 文件后，需要配置 BlueJ，使其能够识别并使用这些文件的内容。主要有两种方法：\n\
  \n*   让 BlueJ 识别 JAR 文件的最简单方法是在项目目录中创建一个名为 `+libs` 的目录，将 JAR 文件复制到此目录中，然后重新启动 BlueJ\
  \ 软件。默认情况下，当在 BlueJ 中打开一个项目时，它会自动扫描是否存在名为 `+libs` 的文件夹，并在编译新代码时将其内容纳入考虑。虽然这是最简单的方法，但你需要为每个新项目重新创建此目录并复制\
  \ JAR 文件，这并非最高效的方法。\n*   当存在可能用于多个项目的 JAR 文件时，与其为每个项目在 `+libs` 目录中创建这些文件的冗余副本，不如将它们复制到\
  \ BlueJ 软件安装文件夹中一个名为 `userlib` 的特殊子目录中。该目录的完整路径应类似于 `C:\\Program Files\\BlueJ\\\
  lib\\userlib\\`；具体名称可以通过选择菜单选项“工具 ➤ 首选项”（Windows 系统）或“BlueJ ➤ 首选项”（OS X 系统），然后点击“库”选项卡来查看。\n\
  \n完成这些步骤后，需要重新启动 BlueJ，然后你就可以准备编写第一个 LibGDX 程序了。\n\n## 使用 LibGDX 创建“Hello, World!”程序\n\
  \n传统上，“Hello, World!”程序会在屏幕上显示一条文本消息。由于我们的最终目标是创建电子游戏——主要是可视化程序——因此你的第一个 LibGDX\
  \ 程序将在窗口中绘制一幅世界图片，如图 1-6 所示。\n\n![A352797_2_En_1_Fig6_HTML.jpg](img/A352797_2_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6.\n\n使用 LibGDX 创建的“Hello, World!”程序\n\n在这里，你将开始看到一些优势，并开始理解在 LibGDX 库提供的类基础上进行构建的含义。我们的第一个项目包含两个类。第一个类名为\
  \ `HelloWorldImage`，它通过扩展 LibGDX 中名为 `Game` 的类来利用其功能。\n\n扩展类\n\n软件工程的核心原则之一是设计能够通过创建可重用代码来避免冗余的程序。实现这一目标的一种方法是利用面向对象的继承概念：基于现有类创建新类。\n\
  \n例如，如果我们正在设计一个角色扮演游戏，它可能包含多种可玩角色类型，例如战士、忍者、盗贼和巫师。如果我们设计类来表示每个角色，它们将具有某些共同特征：每个角色都有一个名字、一定数量的生命值（HP），以及一个可能在模拟战斗时使用的名为\
  \ `attack` 的方法。\n\n某些特征也可能对每个角色来说是独一无二的；例如，也许巫师还有一定数量的魔法值（MP），以及一个在使用魔法时调用的名为 `castSpell`\
  \ 的方法。由于这些角色之间的差异，我们无法创建一个能代表所有角色的单一类；同时，在每个单独的类中反复输入相同的字段又显得冗余。针对这种情况，一种优雅的方法是创建一个包含这些角色所有共同特征的基类，然后创建其他类来扩展这个基类。扩展类可以访问基类的所有字段和方法，并且也可以像往常一样包含自己的字段和方法。我们可以用以下代码实现这个场景：\n\
  \n```\npublic class Person\n{\nString name;\nint HP;\npublic void attack(Person\
  \ other)\n{\n// 在此处插入代码...\n}\n}\n```\n\n然后我们可以按如下方式扩展 `Person` 类：\n\n```\npublic\
  \ class Wizard extends Person\n{\nint MP;\npublic void castSpell( String spellName\
  \ )\n{\n// 在此处插入代码...\n}\n}\n```\n\n接着，如果我们创建这些类的实例：\n\n```\nPerson percy = new\
  \ Person();\nWizard merlin = new Wizard();\n```\n\n那么，诸如 `merlin.MP += 10` 和 `merlin.castSpell(\"\
  fireball\")` 这样的命令是有效的，涉及基类字段和方法的命令，如 `merlin.HP -= 3` 和 `merlin.attack( percy )`，也同样有效。然而，名为\
  \ `percy` 的对象只能使用 `Person` 类的字段和方法；像 `percy.HP += 5` 这样的代码可以编译，但 `percy.castSpell(\"\
  lightning\")` 在编译文件时会导致错误。\n\n扩展类的概念不仅对游戏内实体有用，对类似框架的元素也同样有用。例如，拥有一个包含所有类型菜单通用功能（如打开和关闭菜单）的\
  \ `Menu` 类会很有用。然后，可以创建其他类来扩展这个类；例如，可以创建一个名为 `SelectionMenu` 的类，它是一个专门用于显示某种信息并要求玩家从一组选项中进行选择的\
  \ `Menu`。而 `InformationMenu` 类可能是一个显示基于文本的信息，并在玩家阅读完毕后直接关闭的菜单。\n\n\n\n在 BlueJ 中，名为\
  \ MyProject 的项目应仍处于打开状态；如果没有，请打开该项目。在此项目中创建一个新类，命名为 `HelloWorldImage`，并输入以下源代码。请注意，在类本身之前，有一些\
  \ import 语句，用于指明你将在本程序中使用的 LibGDX 类（来自你之前设置的 JAR 文件）。另请注意，本程序使用了一个名为 `world.png`\
  \ 的图像文件；该图像包含在本章的源代码中，位于 `MyProject` 文件夹内（源代码可从 `apress.com` 获取）。你应该将此图像复制到你的 `MyProject`\
  \ 文件夹中。或者，你也可以使用自己选择的图像；建议本程序使用 256×256 像素的尺寸，如果更换图像，请不要忘记相应修改以下代码中的文件名。\n\n```\n\
  import com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.files.FileHandle;\n\
  import com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.graphics.g2d.SpriteBatch;\n\
  import com.badlogic.gdx.graphics.Texture;\npublic class HelloWorldImage extends\
  \ Game\n{\nprivate Texture texture;\nprivate SpriteBatch batch;\npublic void create()\n\
  {\nFileHandle worldFile = Gdx.files.internal(\"world.png\");\ntexture = new Texture(worldFile);\n\
  batch = new SpriteBatch();\n}\npublic void render()\n{\nGdx.gl.glClearColor(1, 1,\
  \ 1, 1);\nGdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\nbatch.begin();\nbatch.draw(\
  \ texture, 192, 112 );\nbatch.end();\n}\n}\n```\n\n`HelloWorldImage` 类包含两个对象：一个\
  \ `Texture` 和一个 `SpriteBatch`。`Texture` 是一个存储图像相关数据的对象：图像的尺寸（宽度和高度）以及每个像素的颜色。`SpriteBatch`\
  \ 是一个将图像绘制到屏幕上的对象。\n\n`HelloWorldImage` 类还包含两个方法：`create` 和 `render`。\n\n`create`\
  \ 方法初始化 `Texture` 和 `SpriteBatch` 对象。具体来说，`Texture` 对象需要一个图像文件，它将从中获取图像数据。为此，你需要创建一个\
  \ `FileHandle`：这是一个用于访问计算机上存储文件的 LibGDX 对象。`Gdx` 类包含许多有用的静态对象和方法（类似于 Java 的 `Math`\
  \ 类）；在这里，你使用一个名为 `internal` 的方法来生成一个 `FileHandle` 对象，该对象将被 `Texture` 对象使用。`internal`\
  \ 方法将在 BlueJ 项目目录中搜索该文件，该目录与编译后的类文件存储位置相同。\n\n`create` 方法执行完毕后，LibGDX 将大约每秒调用 `render`\
  \ 方法 60 次（因为这是 `Game` 类的默认行为）。² 该方法包含一对静态方法调用：一个用于选择特定的背景颜色（本例中的值对应白色），另一个用于使用该颜色清除窗口。之后，`SpriteBatch`\
  \ 对象被用于定位纹理并将其绘制到窗口上。\n\n接下来，你将创建第二个类，用于启动程序；它创建 `HelloWorldImage` 类的一个实例并激活其方法。这样的类通常被称为驱动类，并且需要你编写一个静态方法。\n\
  \n静态方法与驱动类\n\n默认情况下，类的方法由该类的实例调用。然而，方法也可以声明为静态的，这意味着它直接从类本身调用（而不是通过实例）。方法是应该基于实例还是基于类（静态）取决于该方法的使用方式及其所需的数据。\n\
  \n基于实例的方法通常依赖于该实例特有的内部数据。例如，每个 `String` 对象都有一个名为 `charAt` 的方法，它接受一个整数作为输入，并返回 `String`\
  \ 中该位置存储的字符。如果我们按如下方式创建两个 `String` 对象：\n\n```\nString player1 = \"Lee\";\nString\
  \ player2 = \"Dan\";\n```\n\n那么表达式 `player1.charAt(1)` 返回字符 `'e'`，而 `player2.charAt(1)`\
  \ 返回字符 `'a'`。该方法返回的值取决于该实例中存储的数据，因此 `charAt` 无疑是一个基于实例的方法。\n\n在面向对象的编程语言中，一个类的大部分方法都是基于实例的，因为它们要么依赖于实例变量的值，要么可能改变这些值。当然，也存在静态方法更自然的情况。一般来说，任何不涉及对象内部状态的方法都可以声明为静态的（例如数学公式——Java\
  \ 的 `Math` 类的所有方法都是静态的）。\n\n驱动类（有时也称为主类、入口点类、启动类或发射器类）是一个其目的是驱动另一个类执行的类，这通常涉及创建该类的实例并调用其一个或多个方法。驱动类通常只需要一个方法来完成此任务；这个方法传统上被称为\
  \ `main`。由于它是程序调用的第一个方法，`main` 方法必须声明为静态的，因为当程序启动时，没有可用的实例来运行基于实例的方法。如果 main 方法不是静态的，我们就会遇到类似于哲学难题的问题：先有鸡还是先有蛋？必须有某种东西能够在不被实例化的情况下实例化一个类，而这正是驱动类的静态\
  \ `main` 方法所做的事情。\n\n一个标准的“Hello, World!”程序可以使用驱动类重写如下：\n\n```\npublic class Greeter\n\
  {\npublic void sayHello()\n{\nSystem.out.print(\"Hello!\");\n}\n}\npublic class\
  \ Launcher\n{\npublic static void main()\n{\nGreeter greta = new Greeter();\ngreta.sayHello();\n\
  }\n}\n```\n\n接下来，在同一个项目中，创建一个名为 `HelloLauncher` 的类，其中包含以下代码：\n\n```\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
  public class HelloLauncher\n{\npublic static void main (String[] args)\n{\nHelloWorldImage\
  \ myProgram = new HelloWorldImage();\nLwjglApplication launcher = new LwjglApplication(\
  \ myProgram );\n}\n}\n```\n\n正如前面“静态方法与驱动类”边栏中提到的，该类首先创建了一个 `HelloWorldImage` 类的实例，名为\
  \ `myProgram`。然后，`main` 方法不是直接运行 `myProgram` 的方法，而是创建一个 `LwjglApplication` 对象，该对象会设置一个窗口并管理图形和音频、键盘和鼠标输入以及文件访问。`LwjglApplication`\
  \ 对象将 `myProgram` 作为输入，然后按照之前讨论的方式运行 `myProgram` 的 `create` 和 `render` 方法。\n\n缩写\
  \ LWJGL 代表轻量级 Java 游戏库（Lightweight Java Game Library），这是一个最初由 Caspian Rychlik-Prince\
  \ 创建的开源 Java 库，旨在简化游戏开发中访问台式计算机硬件资源的过程。在 LibGDX 中，LWJGL 被用作桌面后端，以支持所有主要的桌面操作系统，例如\
  \ Windows、Linux 和 Mac OS X。\n\n将驱动类与包含游戏功能的类分开的另一个好处是，有可能为其他平台（例如 LibGDX 也支持的 Android）创建驱动类。\n\
  \n当你为两个类都输入完所有代码后，返回 BlueJ 的主窗口并单击“编译”按钮。然后，右键单击 `HelloLauncher` 类的橙色矩形，在出现的方法列表中，选择列出的\
  \ `void main(String[] args)` 方法。此时会弹出一个窗口，如果需要，你可以在其中输入一个字符串数组作为输入——但这里不需要。单击“确定”按钮，你应该会看到一个窗口，如图\
  \ 1-6 所示。\n\n恭喜你完成了第一个使用 LibGDX 的应用程序！\n\n注意\n\n\n\n有时，你的程序会包含运行时错误，通常由诸如输入错误的文件名（编译时无法检测到）等问题引起。在这种情况下，修复错误并重新运行程序后，你可能会遇到另一个错误，其中包含消息“No\
  \ OpenGL context found in the current thread.”。这是由于应用程序之前意外关闭造成的，通常可以通过在 BlueJ 中重置\
  \ Java 虚拟机来解决，这可以通过“工具”菜单或快捷键组合（在 Windows 上是 Ctrl-Shift-R）完成。\n\n## 使用 LibGDX 的优势\n\
  \n除了能够编译游戏使其在多个平台上运行之外，使用 LibGDX 游戏开发框架还有许多其他优势。LibGDX 使得完成以下任务变得简单：\n\n*   渲染 2D\
  \ 图形、动画、基于位图的字体和粒子效果\n*   流式播放音乐和播放音效\n*   处理来自键盘、鼠标、触摸屏、加速度计或游戏手柄的输入\n*   使用场景图和完全可换肤的\
  \ UI 控件库组织用户界面\n*   集成第三方插件，例如 Box2D 物理引擎（`box2d.org`）、Tiled 地图编辑器文件格式（`mapeditor.org`）和\
  \ Spine 2D 动画软件（`esotericsoftware.com`）\n*   使用材质和光照效果渲染 3D 图形，并从常见文件格式（如 OBJ 和\
  \ FBX）加载 3D 模型\n\nLibGDX 的完整功能列表可在以下网站找到：[`http://libgdx.badlogicgames.com/features.html`](http://libgdx.badlogicgames.com/features.html)。\n\
  \n## 总结\n\n在本章中，你设置了 BlueJ（一个用于 Java 编程的集成开发环境），并配置 BlueJ 以使用 LibGDX 游戏开发框架。然后，你使用\
  \ LibGDX 创建了第一个应用程序：一个“Hello, World!”程序，该程序在一个窗口中显示世界图像。这个程序涉及扩展 LibGDX 的 `Game`\
  \ 类，并创建一个在桌面上运行程序的 `driver` 类。在此过程中，你了解到了该程序中涉及的其他一些类。最后，你了解到了 LibGDX 库的一些其他功能，其中许多将在后续章节中详细讨论。\n\
  \n脚注 1\n\n这些文件的更新版本可以从网站 [`https://libgdx.badlogicgames.com/nightlies/dist/`](https://libgdx.badlogicgames.com/nightlies/dist/)\
  \ 获取。这些是 LibGDX 库的每日构建版本，包含最新的代码，但它们仍在开发中，因此可能包含一些错误或故障。\n\n  2\n\n由于在此示例中纹理和坐标都没有变化，因此\
  \ `render` 方法被重复调用的事实与此无关。但是，如果你定期更改图像，则可以生成动画；如果你逐渐更改坐标，则可以模拟运动。你将在下一章中了解如何实现这两种变化。\n\
  \n"
- "# 2. LibGDX 框架\n\n本章将介绍 LibGDX 库的许多主要功能。它将说明如何在创建名为“海星收集者”的游戏过程中使用它们，在该游戏中，你帮助玩家角色（一只海龟）在海底游动寻找海星。该游戏运行时的截图如图\
  \ 2-1 所示。首先，你将创建一个基本的、功能性的游戏。在关于面向对象设计原则的激励性讨论之后，你将使用一些 LibGDX 类重写此项目的部分内容，以改进代码的组织结构。后续章节将重新审视此示例，并将其作为引入新的游戏设计原则和\
  \ LibGDX 功能的基础。\n\n![A352797_2_En_2_Fig1_HTML.jpg](img/A352797_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1.\n\n游戏“海星收集者”的主屏幕\n\n## 视频游戏的生命周期\n\n在进入游戏开发的编程方面之前，理解游戏程序的整体结构非常重要：游戏程序经历的主要阶段以及游戏程序在每个阶段必须执行的任务。这些阶段如下：\n\
  \n*   **启动**：在此阶段，加载所需的任何文件（例如图像或声音），创建游戏对象，并初始化值。\n*   **游戏循环**：在游戏运行时持续重复的阶段，由以下三个子阶段组成：\n\
  \    *   **处理输入**：程序检查用户是否执行了任何向计算机发送数据的操作：按下键盘按键、移动鼠标或点击鼠标按钮、触摸或滑动触摸屏、或按下游戏手柄上的摇杆或按钮。\n\
  \    *   **更新**：执行涉及游戏世界状态及其内部实体的任务。这可能包括根据用户输入或物理模拟更改实体的位置、执行碰撞检测以确定两个实体何时相互接触以及响应执行什么操作、或为非玩家角色选择动作。\n\
  \    *   **渲染**：在屏幕上绘制所有图形，例如背景图像、游戏世界实体和用户界面（通常覆盖在游戏世界之上）。\n*   **关闭**：当玩家向计算机提供输入表明他已完成使用软件时（例如，通过点击“退出”按钮），此阶段开始，可能涉及从内存中移除图像或数据、保存玩家数据或游戏状态、指示计算机停止监控硬件设备的用户输入，以及关闭游戏创建的任何窗口。\n\
  \n图 2-2 中的流程图说明了这些阶段发生的顺序。\n\n![A352797_2_En_2_Fig2_HTML.jpg](img/A352797_2_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2.\n\n游戏程序的阶段\n\n一些游戏开发者可能会在游戏循环中包含额外的阶段，例如：\n\n*   **休眠阶段**：暂停程序执行一段给定的时间。许多游戏开发者旨在编写能够以每秒\
  \ 60 帧（FPS）运行的程序，这意味着游戏循环每 16.67 毫秒运行一次。¹ 如果游戏循环可以比这运行得更快，则可以指示程序在 16.67 毫秒间隔内剩余的任何时间内暂停，从而为可能在后台运行的任何其他应用程序释放\
  \ CPU。LibGDX 会自动为我们处理这个问题，因此我们无需担心在此处包含它。\n*   **音频阶段**：在此阶段流式播放背景音乐或播放音效。在本书中，我们将播放音频视为更新阶段的一部分，并将在后续章节中讨论如何实现这一点。\n\
  \n这些阶段中的大多数由 LibGDX 中的相应方法处理。例如，启动阶段由名为 `create` 的方法执行，更新和渲染阶段都由 `render` 方法处理，²\
  \ 任何关闭操作都由名为 `dispose` 的方法执行。\n\n事实上，当你的驱动类创建任何类型的应用程序（例如 `LwjglApplication`）时，只有当提供给该应用程序的对象包含一组特定的方法（包括\
  \ `create`、`render` 和 `dispose`）时，该应用程序才能正常工作；这是一个必要的约定，以便应用程序知道在游戏程序生命周期的每个阶段该做什么。你可以通过使用接口在\
  \ Java 程序中强制执行此类要求。\n\n接口\n\n\n\n非正式地说，你可以将接口视为一种其他类可以承诺履行的契约。举个简单的例子，假设你编写了一个 `Player`\
  \ 类，其中包含一个名为 `talkTo` 的方法，用于与环境中的对象进行交互。`talkTo` 方法接收一个名为 `creature` 的输入参数，在后续的代码中，你会看到：\n\
  \n```\ncreature.speak();\n```\n\n为了让 `talkTo` 方法正常工作，无论 `creature` 是哪个类的实例，它都必须有一个名为\
  \ `speak` 的方法。也许有时 `creature` 是 `Person` 类的实例，而其他时候 `creature` 是 `Monster` 类的实例。通常，你希望\
  \ `talkTo` 方法尽可能包容——任何拥有 `speak` 方法的对象都应被允许作为输入。你可以通过使用接口来指定这种行为。\n\n首先，按如下方式创建一个接口：\n\
  \n```\npublic interface Speaker\n{\npublic void speak();\n}\n```\n\n乍一看，接口与类相似，只是方法仅被声明，不包含任何实际代码。所需的一切只是方法的签名：名称、输出类型、输入类型（如果有）以及任何修饰符（如\
  \ `public`）。这些信息后面跟着一个分号，而不是我们熟悉的包含代码的花括号。实现该接口的类将为其版本的 `speak` 函数提供代码。需要强调的是，由于\
  \ `Speaker` 不是一个类，你不能创建 `Speaker` 对象的实例；相反，你需要编写其他类，这些类包含 `Speaker` 接口中指定的方法。\n\n\
  一个类通过在类名后添加关键字 `implements` 并跟上接口名称，来表示它满足该接口的要求（即包含所有指定的字段和方法）。任何实现 `Speaker` 接口的类都必须为其版本的\
  \ `speak` 函数提供代码。下面通过一个名为 `Person` 的类和一个名为 `Monster` 的类来演示：\n\n```\npublic class\
  \ Person implements Speaker\n{\n// 上方其他代码\npublic void speak()\n{   System.out.println(\
  \ \"你好。\" );  }\n// 下方其他代码\n}\npublic class Monster implements Speaker\n{\n// 上方其他代码\n\
  public void speak()\n{  System.out.println(\"嗷呜！\");  }\n// 下方其他代码\n}\n```\n\n永远记住：在实现接口时，你必须为接口中声明的所有内容编写方法；否则，会出现编译时错误。你甚至可以编写一个花括号内不包含任何代码的方法，如下所示（针对一个代表特别沉默的家具的类）。当你只需要使用接口的部分功能时，这会很方便。\n\
  \n```\npublic class Chair implements Speaker\n{\n// 上方其他代码\npublic void speak()\
  \  { }\n// 下方其他代码\n}\n```\n\n最后，你编写 `talkTo` 方法，使其接收一个 `Speaker` 作为输入：\n\n```\n\
  public class Player\n{\n// 上方其他代码\npublic void talkTo(Speaker creature)\n{\ncreature.speak();\n\
  }\n// 下方其他代码\n}\n```\n\n任何实现了 `Speaker` 接口的类都可以作为 `Player` 对象的 `talkTo` 方法的输入。例如，我们展示一些代码，这些代码创建了每个类的实例，然后在随附的注释中描述结果：\n\
  \n```\nPlayer dan = new Player();\nPerson chris = new Person();\nMonster grez =\
  \ new Monster();\nChair footstool = new Chair();\ndan.talkTo(chris); // 输出 \"你好。\"\
  \ndan.talkTo(grez); // 输出 \"嗷呜！\"\ndan.talkTo(footstool); // 不输出任何内容\n```\n\n在 LibGDX\
  \ 中，应用程序要求用户创建的类实现 `ApplicationListener` 接口，以便它能处理游戏程序生命周期的所有阶段。然而，你可能还记得，在第 1 章的示例中，`HelloWorldImage`\
  \ 类并没有实现 `ApplicationListener` 类；它只是继承了 `Game` 类。为什么在编译该类时没有报错呢？如果你深入“引擎盖下”看看（在计算机编程语境中，通常指检查源代码³），你会注意到\
  \ `Game` 类本身实现了 `ApplicationListener` 类，并包含了函数的“空”版本；定义每个函数体的花括号之间没有代码。这使你只需编写在继承\
  \ `Game` 类的类中需要使用的接口方法变体，这些变体将覆盖 `Game` 类中的版本；任何你没有编写的接口方法将默认使用 `Game` 类中的空版本。（实际上，`ApplicationListener`\
  \ 接口总共需要六个方法：`create`、`render`、`resize`、`pause`、`resume` 和 `dispose`；在我们的示例中，你只编写了其中两个。）\n\
  \n\n\n## 游戏项目：海星收集者\n\n本节将介绍游戏《海星收集者》，该游戏此前已在图 2-1 中展示。在开始编写此游戏的代码之前，精确描述其特性会很有帮助：游戏机制与规则、玩家与软件的交互方式、所需的图形等。这样的描述被称为游戏设计文档，本书附录\
  \ A 对此有更详细的说明。由于这是你将使用 LibGDX 创建的第一个游戏，因此只需实现以下最精简的功能集：\n\n*   玩家将控制一只海龟，其目标是收集一颗海星。\n\
  *   通过方向键控制移动。上箭头键将海龟移向屏幕顶部，右箭头键将海龟移向屏幕右侧，依此类推。可以同时按下多个方向键，使海龟沿对角线方向移动。移动速度是恒定的。\n\
  *   海龟通过接触海星（当它们的图形重叠时）来收集海星。发生这种情况时，海星消失，并出现一条显示“你赢了”的消息。\n*   此游戏所需的图形包括海龟、海星、水的图像，以及包含“你赢了”文本的消息。\n\
  \n接下来展示的是实现这些任务的一个代码版本。部分代码和概念与`HelloWorldImage`示例类似，例如`Texture`和`SpriteBatch`类、`create`和`render`方法的作用，以及驱动类的角色。同时也有一些新增内容。由于海龟的坐标可能会变化，你需要使用变量来存储这些值。最重要的是，你引入了一些使程序具有交互性的代码——你将处理来自用户的键盘输入。最后，你将包含一个布尔变量，用于跟踪玩家是否获胜，当海龟到达海星时该变量变为真，并影响“你赢了”消息在屏幕上显示的时间。\n\
  \n在本节以及后续章节中，建议你在 BlueJ 中创建一个新项目（通过从 BlueJ 的项目菜单中选择“关闭”来关闭上一个项目），然后输入所提供的代码；或者，你也可以直接从本书网站下载源代码，并通过附带的\
  \ BlueJ 项目文件运行代码。在线源代码还包含你所需的所有图像，这些图像存储在每个项目的`assets`文件夹中，并在以下代码中被引用。\n\n首先，从本书网站下载本章的源代码文件。在\
  \ BlueJ 中创建一个名为`Starfish Collector Ch2`的新项目（因为本书后续会创建该项目的多个版本）。在 BlueJ 创建的项目目录中，新建一个名为`assets`的文件夹。将下载项目`assets`文件夹中的图像文件复制到你新项目的`assets`文件夹中；以这种方式将源代码与图像分开存放，有助于保持文件的有序性。接下来，在你的项目目录中，新建一个名为`+libs`的文件夹。将下载项目`+libs`文件夹中的\
  \ JAR 文件复制到你新项目的`+libs`文件夹中。重启 BlueJ，以便 BlueJ 能正确识别新添加到`+libs`文件夹中的 JAR 文件。\n\n\
  在你的 BlueJ 项目中，创建一个名为`StarfishCollectorAlpha`的新类。该类的源代码如下所示。其中包含一些新的`import`语句，使你能够创建各种新对象，这些对象将在后续进行说明：\n\
  \n```\nimport com.badlogic.gdx.ApplicationListener;\nimport com.badlogic.gdx.Gdx;\n\
  import com.badlogic.gdx.Input.Keys;\nimport com.badlogic.gdx.graphics.GL20;\nimport\
  \ com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.g2d.SpriteBatch;\n\
  import com.badlogic.gdx.math.Rectangle;\nimport com.badlogic.gdx.Game;\npublic class\
  \ StarfishCollectorAlpha extends Game\n{\nprivate SpriteBatch batch;\nprivate Texture\
  \ turtleTexture;\nprivate float turtleX;\nprivate float turtleY;\nprivate Rectangle\
  \ turtleRectangle;\nprivate Texture starfishTexture;\nprivate float starfishX;\n\
  private float starfishY;\nprivate Rectangle starfishRectangle;\nprivate Texture\
  \ oceanTexture;\nprivate Texture winMessageTexture;\nprivate boolean win;\npublic\
  \ void create()\n{\nbatch = new SpriteBatch();\nturtleTexture = new Texture( Gdx.files.internal(\"\
  assets/turtle-1.png\") );\nturtleX = 20;\nturtleY = 20;\nturtleRectangle = new Rectangle(\
  \ turtleX, turtleY,\nturtleTexture.getWidth(), turtleTexture.getHeight() );\nstarfishTexture\
  \ = new Texture( Gdx.files.internal(\"assets/starfish.png\") );\nstarfishX = 380;\n\
  starfishY = 380;\nstarfishRectangle = new Rectangle( starfishX, starfishY,\nstarfishTexture.getWidth(),\
  \ starfishTexture.getHeight() );\noceanTexture = new Texture( Gdx.files.internal(\"\
  assets/water.jpg\") );\nwinMessageTexture = new Texture( Gdx.files.internal(\"assets/you-win.png\"\
  ) );\nwin = false;\n}\npublic void render()\n{\n// 检查用户输入\nif (Gdx.input.isKeyPressed(Keys.LEFT))\n\
  turtleX--;\nif (Gdx.input.isKeyPressed(Keys.RIGHT))\nturtleX++;\nif (Gdx.input.isKeyPressed(Keys.UP))\n\
  turtleY++;\nif (Gdx.input.isKeyPressed(Keys.DOWN))\nturtleY--;\n// 更新海龟矩形位置\nturtleRectangle.setPosition(turtleX,\
  \ turtleY);\n// 检查获胜条件：海龟必须与海星重叠\nif (turtleRectangle.overlaps(starfishRectangle))\n\
  win = true;\n// 清除屏幕\nGdx.gl.glClearColor(0,0,0, 1);\nGdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\
  // 绘制图形\nbatch.begin();\nbatch.draw( oceanTexture, 0, 0 );\nif (!win)\nbatch.draw(\
  \ starfishTexture, starfishX, starfishY );\nbatch.draw( turtleTexture, turtleX,\
  \ turtleY );\nif (win)\nbatch.draw( winMessageTexture, 180, 180 );\nbatch.end();\n\
  }\n}\n```\n\n此时，你可以编译代码；如果出现任何错误消息，请仔细检查你输入的代码是否与上述代码完全一致。你还需要一个启动器类来创建此类的实例并运行它。为此，创建一个名为`LauncherAlpha`的新类，并输入如下代码。请注意，`LwglApplication`构造函数中已包含额外参数，用于设置显示的标题以及窗口的大小（宽度和高度，以像素为单位）。\n\
  \n```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
  public class LauncherAlpha\n{\npublic static void main (String[] args)\n{\nGame\
  \ myGame = new StarfishCollectorAlpha();\nLwjglApplication launcher =\nnew LwjglApplication(\
  \ myGame, \"Starfish Collector\", 800, 600 );\n}\n}\n```\n\n此时，代码可以编译，之后便可在 BlueJ\
  \ 主窗口中，通过右键单击标有`LauncherAlpha`的橙色矩形，选择`main`方法，然后在出现的窗口中单击“确定”按钮来运行游戏（类似于运行第 1 章“Hello,\
  \ World!”程序的过程）。\n\n注意\n\n编写代码时，如果出现运行时错误（例如，由于文件名拼写错误导致图像文件加载失败，即使在修复错误并重新运行程序后），BlueJ\
  \ 可能会报告另一个错误，其中包含诸如“在当前线程中未找到 OpenGL 上下文”之类的消息。这是一个技术性很强的错误，但修复方法很简单：在 BlueJ 主窗口的“工具”菜单中，选择“重置\
  \ Java 虚拟机”选项，然后再次尝试运行`main`方法。只要没有其他运行时错误，你的程序就应该能按预期加载。\n\n\n\n在 `StarfishCollectorAlpha`\
  \ 类中，`create` 方法用于初始化变量并加载纹理。该程序包含四张图片，它们以 `Texture` 对象的形式存储：海龟、海星、海洋，以及一张包含“你赢了”字样的图片。为简洁起见，你无需为\
  \ `internal` 方法创建的每个 `FileHandle` 对象新建变量，而是在构造每个新的 `Texture` 对象的同一行中直接初始化它们。海龟位置的坐标使用浮点数存储，因为你需要存储小数值，而\
  \ LibGDX 游戏开发框架在其类中使用 `float` 而非 `double` 变量，以略微提升程序效率。尽管海星纹理的坐标不会改变，你仍然使用变量来存储它们，以便未来涉及这些值的代码更具可读性。`oceanTexture`\
  \ 和 `winMessageTexture` 对象不需要变量来存储其坐标，因为它们的位置不会改变，并且其位置将在 `render` 方法中指定（本节稍后讨论）。此外，还创建了与海龟和海星对应的\
  \ `Rectangle` 对象；这些对象存储矩形区域的位置和大小，之所以使用它们，是因为 `Rectangle` 类包含一个名为 `overlap` 的方法，可用于检测海龟何时到达海星。布尔变量\
  \ `win` 指示玩家是否已赢得游戏，并初始化为 `false`。\n\n`render` 方法包含三个主要代码块，大致对应游戏循环的子阶段：处理输入、更新和渲染。\n\
  \n首先，一系列命令使用属于 `Gdx` 类（的一个对象）的名为 `isKeyPressed` 的方法，该方法用于判断键盘上的某个键当前是否被按下。每个键的名称使用\
  \ `Keys` 类中的常量值表示。当按下某个箭头键时，海龟对应的 x 或 y 坐标会相应调整；x 值向右增加，y 值向上增加。⁴ 请注意，如果用户同时按下左箭头键和右箭头键，加法和减法的效果会相互抵消，海龟的位置将不会改变；当用户同时按下上箭头键和下箭头键时，情况类似。另外请注意，这里使用了一系列\
  \ `if` 语句，而非 `if`-`else if` 语句，这使得程序能够在同时按下两个键时做出正确响应。\n\n第二组命令执行碰撞检测，判断与 `turtleTexture`\
  \ 图像对应的矩形区域是否与包含 `starfishTexture` 的矩形区域重叠。海龟的矩形必须更新（使用 `setPosition` 方法），因为海龟的位置可能已改变。如果两个矩形重叠，则布尔变量\
  \ `win` 被设置为 `true`，这进而会影响哪些纹理被绘制到屏幕上。在测试此游戏时，你可能会注意到海星似乎在海龟实际到达之前就消失了。这是因为使用了矩形形状来检测重叠；图像的一些透明部分可能发生了重叠，如图\
  \ 2-3 所示。（这种情况将在下一章中得到解决和改进。）\n\n![A352797_2_En_2_Fig3_HTML.jpg](img/A352797_2_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3.\n\n透明区域中的重叠矩形\n\n最后，`render` 方法中的第三组命令是实际渲染发生的地方。`glClear` 方法使用 `glClearColor`\
  \ 方法中指定的颜色（以红/绿/蓝/Alpha 值表示）在屏幕上绘制一个纯色矩形。每次渲染过程都必须以这种方式清除屏幕，即有效地“擦除”屏幕，否则之前渲染调用中的图像可能会可见。`draw`\
  \ 方法调用的顺序尤为重要：后渲染的纹理将覆盖在先渲染的纹理之上。因此，通常应先绘制背景元素，然后是游戏中的主要实体，最后是用户界面元素。用于绘制的 `Batch`\
  \ 类通过一次将多个图像发送到计算机的图形处理单元（GPU）来优化图形操作。\n\n\n\n## 使用演员与舞台管理游戏实体\n\n在之前的示例中——即《海星收集者》游戏的首个迭代版本——你已看到每个游戏实体（如海龟和海星）都包含大量需要追踪的相关信息，例如纹理和\
  \ (x,y) 坐标。在 Java 这类面向对象编程语言中，一个核心设计原则是将相关信息封装在单个类中。虽然你可以创建 `Turtle` 类、`Starfish`\
  \ 类等来管理这些信息，但这种方法会导致程序中存在大量冗余，既低效又难以管理。由于软件工程的另一个指导原则是编写可复用代码，因此你需要实现一个包含所有游戏实体共有基本信息的单一类，并在必要时对其进行扩展。\n\
  \nLibGDX 库提供了几个可用于管理游戏对象相关数据的类；你将使用 LibGDX 的 `Actor` 类作为基础。该类存储位置、尺寸（宽度和高度）、旋转角度、缩放因子等数据。然而，它并不包含用于存储图像的变量。这种看似“遗漏”的设计实际上赋予了更大的灵活性，让你能够自行指定对象的呈现方式。你可以扩展\
  \ `Actor` 类，并包含游戏中所需的任何额外信息，例如碰撞形状、一个或多个图像或动画、自定义渲染方法等。此类对象的构造函数应调用其所扩展类的构造函数；这通过包含\
  \ `super()` 语句来实现。例如，一个仅需单个 `Texture` 的游戏对象可使用以下代码：\n\n```\npublic class TexturedActor\
  \ extends Actor\n{\nprivate Texture image;\n// 构造函数\npublic TexturedActor()\n{ \
  \ super();  }\npublic void setTexture(Texture t)\n{  image = t;  }\npublic Texture\
  \ getTexture()\n{  return image;  }\npublic void draw(Batch b)\n{\nb.draw( getTexture(),\
  \ getX(), getY() );\n}\n}\n```\n\n举一个更复杂的例子，你的游戏可能包含一个具有生命值的角色，并且你可能希望根据角色剩余生命值使用不同的纹理。此类对象可通过以下代码创建：\n\
  \n```\npublic class HealthyActor extends Actor\n{\nprivate int HP;\nprivate Texture\
  \ healthyImage;\nprivate Texture damagedImage;\nprivate Texture deceasedImage;\n\
  // 省略：构造函数\n// 省略：获取/设置前述字段的方法\npublic void draw(Batch b)\n{\nif (HP > 50)\nb.draw(\
  \ healthyImage, getX(), getY() );\nelse if (HP > 0 && HP <= 50)\nb.draw( damagedImage,\
  \ getX(), getY() );\nelse    // 此情况下 HP <= 0\nb.draw( deceasedImage, getX(), getY()\
  \ );\n}\n}\n```\n\n这里还需要提及默认 `Actor` 类的几个额外特性。首先，除了 `draw` 方法外，`Actor` 类还有一个 `act`\
  \ 方法，可用于更新或修改 `Actor` 的状态。其次，`Actor` 类被设计为与名为 `Stage` 的类协同使用（你将在不久后用到它）。`Stage`\
  \ 类的主要作用是存储一个 `Actor` 实例列表；它还包含名为 `act` 和 `draw` 的方法，这些方法会调用已添加到舞台中的每个 `Actor` 的\
  \ `act` 和 `draw` 方法，从而免去你自行记住绘制每个 `Actor` 实例的麻烦。`Stage` 类还会创建并管理一个 `Batch` 对象，这减少了你需要编写的代码量。\n\
  \n下一个目标是编写 `Actor` 类的扩展；这需要访问并重写 `Actor` 类中已有的方法。\n\n重写方法与访问超类方法\n\n在 Java 中扩展类时，你可能需要用新版本的方法替换基类中的方法。例如，考虑一个表示人的类，其中包含一个模拟人打招呼的方法：\n\
  \n```\npublic class Person\n{\npublic void sayHello()\n{  System.out.print(\"你好。\"\
  );  }\n// 其他方法省略\n}\n```\n\n在你的项目中，你可能希望创建此类的扩展，保留 `sayHello` 方法，但更改打印的消息。为此，你只需编写一个具有相同签名的方法：相同的方法名、参数和输出类型。例如，你可以编写：\n\
  \n```\npublic class Shopkeeper extends Person\n{\npublic void sayHello()\n{  System.out.print(\"\
  各位旅人，欢迎光临。需要什么补给吗？\");  }\n}\n```\n\n如果你创建了一个 `Shopkeeper` 实例，它将可以访问 `Person` 类中的所有字段和方法（因为\
  \ `Shopkeeper` 扩展了 `Person` 类），但如果 `Shopkeeper` 实例调用了 `sayHello` 方法，则 `Shopkeeper`\
  \ 类中的版本优先，并会被调用。这种技术称为重写方法。\n\n然而，在某些情况下，你希望基于被扩展类（有时称为超类）的代码进行构建（而非替换）。例如，再次假设你有一个表示人的类，它存储一个对应其生命值的值\
  \ (HP)，以及一个将其恢复至最大值的方法，如下所示：\n\n```\npublic class Person\n{\nint HP;\nint maxHP;\n\
  public void restore()\n{\nHP = maxHP;\n}\n}\n```\n\n你可能还有一个表示巫师的类，巫师是一种拥有魔法能力的人，因此有一个对应其可用魔法值\
  \ (MP) 的值。自然地，你会扩展 `Person` 类，而对于巫师来说，`restore` 方法应将 HP 和 MP 都设置为其最大值。在这种情况下，你需要\
  \ `Wizard` 类重写 `Person` 类的 `restore` 方法，以添加与魔法相关的功能，同时你又希望 `Wizard` 类也能运行 `Person`\
  \ 类中的 `restore` 方法，以避免重新输入相应代码。实现这一目标的方法是使用关键字 `super`，它指向超类。在 `Wizard` 类的上下文中，表达式\
  \ `restore()` 会激活 `Wizard` 类中的方法，而表达式 `super.restore()` 则会按预期激活 `Person` 类中的方法。\n\
  \n利用 `super`，`Wizard` 类可以编写如下：\n\n```\npublic class Wizard extends Person\n{\nint\
  \ MP;\nint maxMP;\npublic void restore()\n{\nsuper.restore();\nMP = maxMP;\n}\n\
  }\n```\n\n当你编写新类来扩展并构建其他类的功能和方法时，你将有机会反复使用这种技术。\n\n本章将创建的 `Actor` 类的扩展名为 `ActorBeta`。它将用于存储一个\
  \ `TextureRegion`（它构建于 `Texture` 类的功能之上）和一个 `Rectangle`（用于检测两个对象之间的重叠）。在同一个 BlueJ\
  \ 项目中，使用以下代码创建一个名为 `ActorBeta` 的新类：\n\n\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Actor;\n\
  import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.g2d.Batch;\n\
  import com.badlogic.gdx.graphics.g2d.TextureRegion;\nimport com.badlogic.gdx.graphics.Color;\n\
  import com.badlogic.gdx.math.Rectangle;\n/**\n*  扩展 Actor 类以包含图形和碰撞检测功能。\n*  Actor\
  \ 类存储位置和旋转等数据。\n*/\npublic class ActorBeta extends Actor\n{\nprivate TextureRegion\
  \ textureRegion;\nprivate Rectangle rectangle;\npublic ActorBeta()\n{\nsuper();\n\
  textureRegion = new TextureRegion();\nrectangle = new Rectangle();\n}\npublic void\
  \ setTexture(Texture t)\n{\ntextureRegion.setRegion(t);\nsetSize( t.getWidth(),\
  \ t.getHeight() );\nrectangle.setSize( t.getWidth(), t.getHeight() );\n}\npublic\
  \ Rectangle getRectangle()\n{\nrectangle.setPosition( getX(), getY() );\nreturn\
  \ rectangle;\n}\npublic boolean overlaps(ActorBeta other)\n{\nreturn this.getRectangle().overlaps(\
  \ other.getRectangle() );\n}\npublic void act(float dt)\n{\nsuper.act(dt);\n}\n\
  public void draw(Batch batch, float parentAlpha)\n{\nsuper.draw( batch, parentAlpha\
  \ );\nColor c = getColor(); // 用于应用色调效果\nbatch.setColor(c.r, c.g, c.b, c.a);\nif\
  \ ( isVisible() )\nbatch.draw( textureRegion,\ngetX(), getY(), getOriginX(), getOriginY(),\n\
  getWidth(), getHeight(), getScaleX(), getScaleY(), getRotation() );\n}\n}\n```\n\
  \n以下是关于此代码的一些观察：\n\n*   你使用的是 `TextureRegion` 而非 `Texture` 来存储图像，这将在渲染图像时提供更大的灵活性。这两个类的主要区别在于，`TextureRegion`\
  \ 可用于存储包含多张图像或动画帧的 `Texture`，并且 `TextureRegion` 还存储了称为 (u,v) 坐标的坐标，用于确定要使用 `Texture`\
  \ 的哪个矩形子区域。\n*   在 `ActorBeta` 类的构造函数中，语句 `super()` 激活了超类（`Actor`）的构造函数，该构造函数初始化了该类使用的数据结构。\n\
  *   在 `setTexture` 方法中，还需要（根据纹理的宽度和高度）设置 actor 和矩形的大小，以便 `draw` 和 `overlaps` 方法能正常工作。\n\
  *   在 `overlaps` 方法中，关键字 `this` 用于指示调用该方法的对象实例。在此处，使用它是为了清晰起见（以区别于作为方法参数的名为 `other`\
  \ 的实例）；严格来说并非必须使用 `this`，如果需要可以省略。\n*   `act` 和 `draw` 方法都以调用相应的超类方法（`super.act`\
  \ 和 `super.draw`）开头，这样即使这些方法在此类中被重写，其功能也不会丢失。\n*   在 `draw` 方法中，如果已（通过 `setColor`\
  \ 方法）设置了颜色，则可以在渲染图像时使用该颜色为其着色，并且必须将其传递给负责实际渲染的 `Batch` 对象。（默认颜色为白色，对图像没有影响。）此外，`Batch`\
  \ 对象在渲染图像时可以利用 `actor` 对象中存储的数据（如位置、旋转和缩放因子），尽管本项目并未使用这些功能中的大部分。\n*   有时，你可能希望编写这些类的更专门的扩展。对于本项目，海龟需要比\
  \ `ActorBeta` 类提供的更多功能。具体来说，海龟应根据当前按下的箭头键移动。为了遵循良好的面向对象设计实践（特别是封装），`StarfishCollectorAlpha`\
  \ 类的 `update` 方法中的相应代码将被移动到新的 `Turtle` 类的 `act` 方法中。另外，请注意 `moveBy` 方法（继承自 `Actor`\
  \ 类）的使用，它按照与之前相同的方式，根据 x 和 y 坐标调整海龟的位置。\n\n接下来，你将在 `ActorBeta` 类功能的基础上进行构建。创建一个名为\
  \ `Turtle` 的新类，代码如下：\n\n*   输入此代码后，你可以编译它以检查所有内容是否正确输入。接下来，你将创建海星收集器游戏源代码的新版本。创建一个名为\
  \ `StarfishCollectorBeta` 的新类；它将全程使用新的 `ActorBeta` 类。与 alpha 版本的类相比，有一些变化。具体来说：\n\
  \    *   将创建一个 `Stage` 对象，并将 `Actor` 对象添加到其中。此外，必须调用 `Stage` 的 `act` 和 `draw` 方法（回想一下，在\
  \ `Stage` 上调用 `act` 和 `draw` 方法会导致 `Stage` 对象调用已添加到其中的所有 `Actor` 对象的 `act` 和 `draw`\
  \ 方法）。\n*   将 actor 添加到 `Stage` 的顺序很重要，就像在此程序的 alpha 版本中使用 `Batch` 对象时 `draw` 语句的顺序很重要一样。首先添加到\
  \ `Stage` 的 `Actor` 对象将首先被绘制，因此会出现在后添加的对象下方。出于这个原因，背景应该首先添加，而用户界面元素（如文本显示）应该最后添加。\n\
  *   `winMessage` 的初始可见性设置为 `false`，因为玩家在赢得游戏之前不应该看到该特定图像。\n*   `act` 方法需要一个输入：自游戏循环上一次迭代以来经过的时间（以秒为单位）。由于\
  \ LibGDX 中的游戏在默认情况下尽可能以每秒 60 帧的速度运行，我们为此值使用了 1/60。（实际上，游戏循环每次迭代所需的时间可能会波动，并且有方法可以获得精确值，但此处不需要。）\n\
  *   当海龟与海星重叠时，会在海星上调用 `remove` 方法。这会将海星从之前添加到的 `Stage` 对象中移除。结果，`starfish` 对象的 `act`\
  \ 和 `draw` 方法此时不再被调用，导致海星图形从屏幕上消失。（但是，即使它不再可见，`starfish` 对象仍保留在计算机内存中。）\n\n```\n\
  import com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\npublic class\
  \ Turtle extends ActorBeta\n{\npublic Turtle()\n{\nsuper();\n}\npublic void act(float\
  \ dt)\n{\nsuper.act(dt);\nif (Gdx.input.isKeyPressed(Keys.LEFT))\nthis.moveBy(-1,0);\n\
  if (Gdx.input.isKeyPressed(Keys.RIGHT))\nthis.moveBy(1,0);\nif (Gdx.input.isKeyPressed(Keys.UP))\n\
  this.moveBy(0,1);\nif (Gdx.input.isKeyPressed(Keys.DOWN))\nthis.moveBy(0,-1);\n\
  }\n}\n```\n\n`StarfishCollectorBeta` 类的代码如下：\n\n\n\n```\nimport com.badlogic.gdx.ApplicationListener;\n\
  import com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.GL20;\n\
  import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.math.Rectangle;\n\
  import com.badlogic.gdx.scenes.scene2d.Stage;\npublic class StarfishCollectorBeta\
