  ## 着色器编程


  在本节中，你将学习着色器：一种设计用于在图形处理单元（GPU）上运行的程序，可用于创建复杂的视觉效果。与计算机中的中央处理单元类似，GPU 是一种专门用于加速图像处理和渲染的电路。所有现代视频游戏和多媒体软件都使用着色器来利用
  GPU 的强大功能，GPU 采用并行架构，拥有数千个核心同时运行任务。LibGDX（更具体地说，`SpriteBatch` 类）在后台创建并使用着色器程序来高效渲染图形。着色器程序使用
  OpenGL（开放图形库），这是一个用于绘制 2D 和 3D 图形的跨平台应用程序编程接口，其语法类似于 C 编程语言。


  渲染图形涉及处理大量数据，这些数据被分组到一种称为顶点的数据结构中。通俗地说，你可以将顶点视为空间中带有一些关联信息的点。顶点存储其位置的坐标以及根据需要存储的附加数据，例如关联的颜色或纹理坐标，这些坐标用于确定图像上的对应位置。当渲染一个对象（例如显示图像的方形）时，顶点数据被发送到
  GPU 上的缓冲区以实现高速访问，然后通过以下一系列阶段（称为图形管线）进行处理：²


  *   **顶点处理**：运行一个称为顶点着色器的程序，该程序可以对每个顶点执行几何变换（平移、旋转和缩放）（通常使用矩阵乘法），并将任何需要的数据沿管线传递。

  *   **光栅化**：将顶点分组为集合（例如三角形），并将相应区域转换为片段，这些片段是与显示器上的像素对应的数据结构。每个片段对来自顶点着色器的数据进行插值和存储。例如，与三角形正中心点对应的片段中存储的颜色将是三角形三个顶点存储颜色的平均值。所有片段都被发送到管线的下一阶段。

  *   **片段处理**：运行一个称为片段着色器的程序，以确定将要显示的关联像素的颜色。这可以考虑关联的颜色、纹理和透明度。可以在此处创建图像滤镜和效果，例如颜色着色、模糊或发光效果。


  这些阶段完成后，最终的图像数据即可用于显示。在接下来的章节中，你将了解 LibGDX 提供的默认着色器程序，以及如何创建自己的片段着色器并将其集成到《海星收集者》游戏中。具体来说，你将创建一个灰度滤镜、一个图像周围的彩色边框、模糊图像、发光效果以及一个动画波浪状扭曲效果。




  ### 默认着色器


  在深入探讨 LibGDX 使用的默认顶点和片段着色器的实际代码之前，先简要概述一下相关的语法和语言。这绝不是一个全面的介绍；如此浩大的工程本身足以写成一整本书！


  OpenGL 中可用的许多变量类型在 Java 中都有对应的类型：


  *   `float`、`int` 和 `bool` 分别指代浮点数、整数和布尔值（一位整数）。

  *   `vec2`、`vec3` 和 `vec4` 指代具有两个、三个和四个分量的向量。这些通常用于存储位置坐标，尽管 `vec4` 也用于存储颜色值（红色、绿色、蓝色和
  Alpha/透明度）。此外，算术运算符（`+`、`-`、`*`、`/`）都可以用于这些类型的实例。

  *   `mat4` 指代一个 4x4 矩阵，通常编码几何变换（由 LibGDX 库自动为您生成）。

  *   `sampler2D` 指代一个二维数值网格，通常是图像关联的颜色数据。


  许多关键字和命令也在 OpenGL 中使用，例如 `if`-`else` 语句、`for` 和 `while` 循环以及逻辑运算符（`&&` 表示“与”，`||`
  表示“或”，`!` 表示“非”）。还有许多可用的数学函数，例如 `sqrt`、`pow`、`sin`、`cos`、`abs`、`round`、`floor`、`max`
  和 `min`，每个函数都直接对应于 Java `Math` 类中的一个函数。您会反复看到的一个特殊的 OpenGL 函数叫做 `texture2D`，它接收一个
  `sampler2D` 和一个 `vec2` 作为输入，并返回向量指定位置处的样本数据（图像中的颜色）；如果该向量不对应于图像中的精确像素，则颜色将从附近像素的颜色中插值得到。


  顶点着色器和片段着色器都必须包含一个名为 `main` 且返回类型为 `void` 的函数。（如果您愿意，可以编写返回非 `void` 值的额外“辅助”函数，但此处不讨论该主题。）顶点着色器必须为变量
  `gl_Position` 赋值一个 `vec4` 值，该值表示顶点的最终位置。片段着色器必须为变量 `gl_FragColor` 赋值一个 `vec4` 值，该值表示关联像素的最终颜色。


  您还会看到在 `main` 函数外部声明的变量，除了具有特定的数据类型外，它们还具有三个额外限定符之一：


  *   `attribute`：指单个顶点的属性，并且只能出现在顶点着色器程序中。例如，顶点的位置必须限定为 attribute，因为每个顶点的该数据都不同。

  *   `varying`：用于从顶点着色器发送到片段着色器的数据。顶点着色器中的任何 varying 变量声明也应出现在关联的片段着色器中。必须在顶点着色器中为这些变量赋值，并且这些变量在片段着色器中是只读的（不可修改）。片段着色器将根据分配给顶点的值对这些变量的值进行插值。

  *   `uniform`：指对象每个顶点都相同的全局值。例如，与对象关联的纹理数据应限定为 uniform，因为对象的所有顶点的该数据都相同。类似地，几何变换矩阵是
  uniform 变量，因为对象中的所有顶点将以相同方式或相同量进行平移、旋转或缩放。Uniform 变量可以根据需要出现在顶点着色器或片段着色器中。


  有了这些背景知识，您就可以开始研究 LibGDX 提供的默认着色器了。首先是默认顶点着色器的代码。在此代码中，设置了三个 attribute 向量来访问每个顶点的位置、颜色和纹理坐标。一个
  uniform 矩阵存储几何变换数据，因为所有顶点都相同。创建了两个 varying 变量，用于将特定数据（颜色和纹理坐标）转发到片段着色器，片段着色器需要这些数据来确定像素颜色。请注意
  LibGDX 使用的变量命名约定：attribute 变量以 `a_` 为前缀，uniform 变量以 `u_` 为前缀，varying 变量以 `v_` 为前缀。（本章将始终使用此约定。）最后，请注意
  `main` 函数为 varying 变量赋值，并通过将变换矩阵乘以顶点的原始位置来计算 `gl_Position`。


  ```

  attribute vec4 a_position;

  attribute vec4 a_color;

  attribute vec2 a_texCoord0;

  uniform mat4 u_projTrans;

  varying vec4 v_color;

  varying vec2 v_texCoords;

  void main()

  {

  v_color = a_color;

  v_texCoords = a_texCoord0;

  gl_Position = u_projTrans * a_position;

  }

  ```


  接下来是默认片段着色器的代码。在此代码中，有两个 varying 变量，它们对应于顶点着色器中的 varying 变量。还有一个 uniform 变量用于存储纹理数据。在
  `main` 函数中，使用 `texture2D` 函数（前面描述过）从关联的纹理中获取颜色数据。然后将其与从顶点着色器传递过来的颜色相乘，其效果是使用通过 `setColor`
  方法分配给角色的任何颜色对图像进行着色。（与角色关联的默认颜色是白色，由于白色的红色、绿色和蓝色分量都等于 1.0，因此乘以该颜色不会改变原始图像。）结果被赋值给
  `gl_FragColor` 变量，该变量将是关联像素的最终颜色。


  ```

  varying vec4 v_color;

  varying vec2 v_texCoords;

  uniform sampler2D u_texture;

  void main()

  {

  gl_FragColor = v_color * texture2D(u_texture, v_texCoords);

  }

  ```


  现在您已经了解了默认着色器程序是什么，接下来将看到如何将它们整合到您的游戏项目中。




  ### 在 LibGDX 中使用着色器


  在本节中，你将学习如何为 Starfish Collector 游戏中的演员添加着色器。首先，复制第 5 章的 `Starfish Collector` 项目，并将副本重命名为
  `Starfish Collector Shaders`。在该项目的 `assets` 文件夹中，新建一个名为 `shaders` 的文件夹；你将在此处添加包含顶点和片段着色器程序代码的文本文件。使用你选择的文本编辑器程序，创建一个包含前述默认顶点着色器代码的新文本文件；将该文件保存在
  `shaders` 文件夹中，文件名为 `default.vs`（扩展名 `vs` 是顶点着色器的助记符）。类似地，创建一个包含默认片段着色器代码的文本文件，并将其保存到
  `shaders` 文件夹中，文件名为 `default.fs`（`fs` 代表片段着色器）。接下来，在创建着色器程序的过程中，你将把这些文件的内容读取到 `String`
  中。


  打开 `Starfish Collector Shaders` 项目。首先，在 `Turtle` 类中添加以下 `import` 语句：


  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.graphics.glutils.ShaderProgram;

  import com.badlogic.gdx.graphics.g2d.Batch;

  ```


  然后，在同一个类中添加以下变量声明：


  ```

  String vertexShaderCode;

  String fragmentShaderCode;

  ShaderProgram shaderProgram;

  ```


  要初始化着色器程序，你需要顶点着色器和片段着色器的代码。这可以通过 `FileHandle` 类的 `readString` 方法获得，该方法将文本文件的全部内容作为单个
  `String` 返回。使用这些代码，你可以初始化 `ShaderProgram` 对象，该对象会自动将代码发送到 GPU 并进行编译。你还需要在编译着色器程序后手动检查错误。为了完成这些任务，请在
  `Turtle` 类的 `constructor` 方法中添加以下代码：


  ```

  vertexShaderCode   = Gdx.files.internal("assets/shaders/default.vs").readString();

  fragmentShaderCode = Gdx.files.internal("assets/shaders/default.fs").readString();

  shaderProgram = new ShaderProgram(vertexShaderCode, fragmentShaderCode);

  if (!shaderProgram.isCompiled())

  System.out.println( "Shader compile error: " + shaderProgram.getLog() );

  ```


  最后，要使用自定义的 `ShaderProgram` 对象（而非默认对象）实际渲染海龟，你需要重写 `BaseActor` 类中的 `draw` 方法，并使用
  `Batch` 类的 `setShader` 方法设置着色器。当完成海龟的渲染后，将 `null` 作为参数传递给 `setShader` 方法会使 `Batch`
  类恢复使用 LibGDX 提供的内置默认着色器。在 `Turtle` 类中添加以下方法：


  ```

  public void draw(Batch batch, float parentAlpha)

  {

  batch.setShader(shaderProgram);

  super.draw( batch, parentAlpha );

  batch.setShader(null);

  }

  ```


  此时，你可以测试程序了。它应该看起来与添加着色器之前完全一样，这是意料之中的，因为你所做的只是重建了默认着色器。然而，你建立的框架将非常有用，因为你将能够快速测试你在后续章节中编写的一系列着色器。


  ### 灰度着色器


  在这里，你将编写一个以灰度渲染纹理的片段着色器。当颜色的红色、绿色和蓝色分量都相等时，结果颜色就是灰色调。因此，要将颜色转换为灰色，你可以计算其红色、绿色和蓝色值的平均值，并将新颜色的所有分量设置为该平均值。然而，alpha
  值应保持不变。颜色 `c`（存储为 `vec4`）的红色、绿色、蓝色和 alpha 值可以分别通过 `c.r`、`c.g`、`c.b` 和 `c.a` 访问。在文本编辑器程序中，创建一个名为
  `grayscale.fs` 的文件（同样放在 `shaders` 目录中），包含以下代码：


  ```

  varying vec4 v_color;

  varying vec2 v_texCoords;

  uniform sampler2D u_texture;

  void main()

  {

  vec4 color = texture2D(u_texture, v_texCoords);

  float average = (color.r + color.g + color.b) / 3.0;

  gl_FragColor = vec4(average, average, average, color.a);

  }

  ```


  在你的 BlueJ 项目中，在 `Turtle` 类的 `constructor` 方法中找到设置 `fragmentShaderCode` 的那行代码，并将其更改为以下内容：


  ```

  fragmentShaderCode = Gdx.files.internal("assets/shaders/grayscale.fs").readString();

  ```


  仅此而已；运行你的项目，海龟应该会以灰度显示！


  ### 自定义统一变量


  接下来，你将编写一个着色器，使图像的外观随时间变化。具体来说，你的下一个片段着色器将使海龟在其原始颜色和灰度之间平滑切换。要做到这一点，需要使用一个随时间振荡的值。为此，你将创建一个包含新统一变量
  `u_time` 的片段着色器。`Turtle` 类将包含一个名为 `time` 的对应变量，在其 `act` 方法中更新，并且 `time` 的值将被发送到着色器并存储在变量
  `u_time` 中。第一步是使用你的文本编辑器程序在 `shaders` 文件夹中创建一个名为 `grayscale-pulse.fs` 的文件，内容如下：


  ```

  varying vec4 v_color;

  varying vec2 v_texCoords;

  uniform sampler2D u_texture;

  uniform float u_time;

  void main()

  {

  vec4 color = texture2D(u_texture, v_texCoords);

  float average = (color.r + color.g + color.b) / 3.0;

  vec4 grayscale = vec4(average, average, average, color.a);

  float value = (sin(6.28 * u_time) + 1.0) * 0.5;

  gl_FragColor = value * color + (1.0 - value) * grayscale;

  }

  ```


  请注意，变量 `value` 基于正弦函数，它将每秒在 0 和 1 之间振荡一次。相应地，当 `value` 等于 `0` 时，`gl_FragColor` 被设置为
  `grayscale`；当 `value` 等于 `1` 时，`gl_FragColor` 被设置为 `color`；当 `value` 在 `0` 和 `1`
  之间时，`gl_FragColor` 是中间颜色。


  接下来，在 BlueJ 的 `Turtle` 类中，添加以下变量声明：


  ```

  float time;

  ```


  在 `constructor` 方法中，将 `time` 的初始值设置为 0：


  ```

  time = 0;

  ```


  同时，将设置 `fragmentShaderCode` 的那行代码更改为以下内容：


  ```

  fragmentShaderCode = Gdx.files.internal("assets/shaders/grayscale-pulse.fs").readString();

  ```


  在 `act` 方法中，将 `time` 增加经过的时间 `dt`：


  ```

  time += dt;

  ```


  最后，修改 `draw` 方法，使其包含以下代码：


  ```

  batch.setShader(shaderProgram);

  shaderProgram.setUniformf("u_time", time);

  super.draw( batch, parentAlpha );

  batch.setShader(null);

  ```


  请注意，前面新增的那行代码将 `time` 的值发送给名为字符串 `"u_time"` 的着色器变量，并且它必须包含在设置着色器程序之后，但在调用 `super.draw`
  之前。（每当你需要设置统一变量的值时，情况都是如此。）至此，你可以测试程序，并观察海龟图像从全彩色到灰度再返回的切换过程。




  ### 边框着色器


  接下来，你将创建一个能在乌龟周围绘制边框的着色器，如图 15-8 所示。边框的颜色和粗细可以通过统一变量轻松设置。


  ![A352797_2_En_15_Fig8_HTML.jpg](img/A352797_2_En_15_Fig8_HTML.jpg)


  图 15-8.


  使用默认着色器（左）和边框着色器（右）渲染的乌龟


  从概念上讲，编写此着色器最棘手的部分是确定哪些像素对应于图像可见部分的边框。这里采用的方法如下：对于任何像素，检查所有“附近”的像素（由边框大小参数指定）。如果所有这些像素的
  alpha 值都大于 0.5，那么原始像素位于一个基本不透明的区域，将被视为内部点。如果所有附近像素的 alpha 值都小于 0.5，那么原始像素位于一个基本透明的区域，将被视为外部点。如果原始像素既不是内部点也不是外部点，那么附近像素既有不透明的也有透明的，因此原始像素将被视为“在边框上”。半透明区域上的边框像素将使用指定的边框颜色渲染；所有其他像素将使用纹理指定的原始颜色渲染。请注意，如果不透明区域与纹理边缘相邻，那么边框在该点可能会显得被截断，如图
  15-8 中带边框图像的右侧所示。


  编写此着色器还有第二个微妙的复杂性：纹理坐标以百分比形式指定；x 和 y 纹理坐标的范围都是从 0 到 1。由于边框大小是以像素为单位指定的，你需要将纹理单位转换为像素单位，然后再转换回来。纹理坐标
  `(1,1)` 对应于像素坐标 `(w,h)`，其中 `w` 和 `h` 是图像的宽度和高度。因此，纹理坐标 `(tx, ty)` 和像素坐标 `(px, py)`
  之间的关系可以表示为 `(px, py) = (tx * w, ty * h)` 或 `(tx, ty) = (px / w, py / h)`。


  理解了这一点，你就可以开始编写着色器了。在你的文本编辑器中，在 `shaders` 文件夹中创建一个名为 `border.fs` 的文件，内容如下：


  ```

  varying vec4 v_color;

  varying vec2 v_texCoords;

  uniform sampler2D u_texture;

  uniform vec2  u_imageSize;

  uniform vec4  u_borderColor;

  uniform float u_borderSize;

  void main()

  {

  vec4 color = texture2D(u_texture, v_texCoords);

  vec2 pixelToTextureCoords = 1 / u_imageSize;

  bool isInteriorPoint = true;

  bool isExteriorPoint = true;

  for (float dx = -u_borderSize; dx  0.5 )

  isExteriorPoint = false;

  }

  }

  if (!isInteriorPoint && !isExteriorPoint && color.a < 0.5)

  gl_FragColor = u_borderColor;

  else

  gl_FragColor = v_color * color;

  }

  ```


  接下来，在 `Turtle` 类中，添加以下 `import` 语句，这些语句对应于你将传递给着色器的数据类型：


  ```

  import com.badlogic.gdx.graphics.Color;

  import com.badlogic.gdx.math.Vector2;

  ```


  将设置 `fragmentShaderCode` 的代码行更改为以下内容：


  ```

  fragmentShaderCode = Gdx.files.internal("assets/shaders/border.fs").readString();

  ```


  最后，修改 `draw` 方法，使其包含以下代码。请注意，上一个示例中设置 `"u_time"` 值的代码行已被移除，因为此着色器未使用它。


  ```

  batch.setShader(shaderProgram);

  shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight()) );

  shaderProgram.setUniformf( "u_borderColor", Color.BLACK );

  shaderProgram.setUniformf( "u_borderSize", 3 );

  super.draw( batch, parentAlpha );

  batch.setShader(null);

  ```


  完成这些更改后，边框着色器就完成了。测试程序并验证边框是否按预期显示。


  ### 模糊着色器


  接下来，你将创建一个能模糊乌龟图像的着色器，如图 15-9 所示。模糊程度将通过一个统一变量设置。


  ![A352797_2_En_15_Fig9_HTML.jpg](img/A352797_2_En_15_Fig9_HTML.jpg)


  图 15-9.


  使用默认着色器（左）和模糊着色器（右）渲染的乌龟


  模糊着色器的结构与上一个示例中的边框着色器类似。对于每个像素，使用一个嵌套的 `for` 循环来遍历以原始像素为中心的正方形像素区域。通过将每个像素的颜色向量相加，再除以正方形区域中的像素总数，计算出该区域像素的平均颜色；³
  这就是用于 `gl_FragColor` 的最终值。在你的文本编辑器中，在 `shaders` 文件夹中创建一个名为 `blur.fs` 的文件，内容如下：


  ```

  varying vec4 v_color;

  varying vec2 v_texCoords;

  uniform sampler2D u_texture;

  uniform vec2  u_imageSize;

  uniform int   u_blurRadius;

  void main()

  {

  vec4 color = texture2D(u_texture, v_texCoords);

  vec2 pixelToTextureCoords = 1 / u_imageSize;

  vec4 averageColor = vec4(0.0, 0.0, 0.0, 0.0);

  for (int dx = -u_blurRadius; dx <= u_blurRadius; dx++)

  {

  for (int dy = -u_blurRadius; dy <= u_blurRadius; dy++)

  {

  vec2 point = v_texCoords + vec2(dx,dy) * pixelToTextureCoords;

  averageColor += texture2D(u_texture, point);

  }

  }

  averageColor /= pow(2.0 * u_blurRadius + 1.0, 2.0);

  gl_FragColor = v_color * averageColor;

  }

  ```


  接下来，在 `Turtle` 类中，将设置 `fragmentShaderCode` 的代码行更改为以下内容：


  ```

  fragmentShaderCode = Gdx.files.internal("assets/shaders/blur.fs").readString();

  ```


  最后，修改 `draw` 方法，使其包含以下代码：


  ```

  batch.setShader(shaderProgram);

  shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight()) );

  shaderProgram.setUniformf( "u_blurRadius", 5 );

  super.draw( batch, parentAlpha );

  batch.setShader(null);

  ```


  完成这些更改后，模糊着色器就完成了。测试程序并验证模糊效果是否按预期显示。




  ### 发光着色器


  理解了模糊着色器的工作原理后，你可以通过将每个像素的原始图像颜色与模糊颜色相加来创建发光效果，这会使图像变亮并轻微混合颜色。为了获得炫酷的视觉效果，在此着色器中你还会添加一个脉冲效果（类似于之前处理灰度着色器时的工作），使海龟在其原始颜色和发光效果之间平滑切换，从而让海龟看起来像从内部发出脉动的光芒。在你的文本编辑器中，在
  `shaders` 文件夹内创建一个名为 `glow-pulse.fs` 的文件，内容如下：


  ```

  varying vec4 v_color;

  varying vec2 v_texCoords;

  uniform sampler2D u_texture;

  uniform float u_time;

  uniform vec2  u_imageSize;

  uniform int   u_glowRadius;

  void main()

  {

  vec4 color = texture2D(u_texture, v_texCoords);

  vec2 pixelToTextureCoords = 1 / u_imageSize;

  vec4 averageColor = vec4(0.0, 0.0, 0.0, 0.0);

  for (int dx = -u_glowRadius; dx <= u_glowRadius; dx++)

  {

  for (int dy = -u_glowRadius; dy <= u_glowRadius; dy++)

  {

  vec2 point = v_texCoords + vec2(dx,dy) * pixelToTextureCoords;

  averageColor += texture2D(u_texture, point);

  }

  }

  averageColor /= pow(2.0 * u_glowRadius + 1.0, 2.0);

  float amount = (sin(6.0 * u_time) + 1.0) * 0.5;

  // 额外乘以 2.0 的因子用于增强发光效果

  vec4 glowFactor = vec4( 2.0 * averageColor.rgb, averageColor.a );

  gl_FragColor = v_color * (color + amount * glowFactor);

  }

  ```


  接下来，在 `Turtle` 类中，将设置 `fragmentShaderCode` 的代码行修改为以下内容：


  ```

  fragmentShaderCode = Gdx.files.internal("assets/shaders/glow-pulse.fs").readString();

  ```


  最后，修改 `draw` 方法，使其包含以下代码：


  ```

  batch.setShader(shaderProgram);

  shaderProgram.setUniformf( "u_time", time );

  shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight()) );

  shaderProgram.setUniformf( "u_glowRadius", 5 );

  super.draw( batch, parentAlpha );

  batch.setShader(null);

  ```


  完成这些修改后，脉冲发光着色器就完成了。测试程序并验证效果是否符合预期。


  ### 波浪扭曲着色器


  作为本章的最后一个着色器，你将不再修改像素颜色，而是使用正弦函数以波浪模式扭曲图像本身，图 15-10 展示了一些示例。如果需要，还可以对扭曲进行动画处理，以产生涟漪效果。


  ![A352797_2_En_15_Fig10_HTML.jpg](img/A352797_2_En_15_Fig10_HTML.jpg)


  图 15-10.


  使用默认着色器、水平波浪扭曲、垂直波浪扭曲以及双向波浪扭曲渲染的海龟


  要创建此效果，你需要为纹理坐标添加一个偏移量；该偏移量使用正弦函数计算得出。为了按需自定义效果，你将包含用于调整正弦波波长和振幅的 uniform 参数，这些量在图
  15-11 中进行了说明。你还可以设置正弦波的速度，即扭曲在纹理上移动的速率（以像素/秒为单位）；将此值设置为 0 将使扭曲保持静止。由于将同时存在水平和垂直方向的正弦波来扭曲纹理，因此每个参数都将成对出现，每个方向（沿
  x 轴和 y 轴）各有一个值。在某个方向上将正弦波的振幅设置为 0 将导致该方向完全没有扭曲。


  ![A352797_2_En_15_Fig11_HTML.jpg](img/A352797_2_En_15_Fig11_HTML.jpg)


  图 15-11.


  正弦波的波长和振幅。


  产生沿 x 轴方向、振幅为 A、波长为 W、速度为 V 的正弦波的公式为 y = A * sin( 6.283/W * (x + t * V) )，而沿 y 轴方向的正弦波公式为
  x = A * sin( 6.28/W * (y + t * V) )。在着色器中实现这些公式非常简单。你还必须记得将纹理坐标转换为像素坐标，然后再转换回来，因为计算中使用的振幅、波长和速度都是以像素为单位表示的。在你的文本编辑器中，在
  `shaders` 文件夹内创建一个名为 `wave.fs` 的文件，内容如下：


  ```

  varying vec4 v_color;

  varying vec2 v_texCoords;

  uniform float u_time;

  uniform vec2 u_imageSize;

  uniform vec2 u_amplitude;

  uniform vec2 u_wavelength;

  uniform vec2 u_velocity;

  uniform sampler2D u_texture;

  void main()

  {

  vec2 pixelCoords = v_texCoords * u_imageSize;

  vec2 offset = u_amplitude * sin(6.283/u_wavelength * (pixelCoords.yx - u_velocity
  * u_time));

  vec2 texCoords = v_texCoords + offset / u_imageSize;

  gl_FragColor = v_color * texture2D(u_texture, texCoords);

  }

  ```


  接下来，在 `Turtle` 类中，将设置 `fragmentShaderCode` 的代码行修改为以下内容：


  ```

  fragmentShaderCode = Gdx.files.internal("assets/shaders/wave.fs").readString();

  ```


  最后，修改 `draw` 方法，使其包含以下代码：


  ```

  batch.setShader(shaderProgram);

  shaderProgram.setUniformf( "u_time", time );

  shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight()) );

  shaderProgram.setUniformf("u_amplitude",  new Vector2( 2,  3) );

  shaderProgram.setUniformf("u_wavelength", new Vector2(17, 19) );

  shaderProgram.setUniformf("u_velocity",   new Vector2(10, 11) );

  super.draw( batch, parentAlpha );

  batch.setShader(null);

  ```


  完成这些修改后，波浪扭曲着色器就完成了。测试程序并验证效果是否符合预期，然后尝试调整 uniform 值，以了解其可能的范围。




  ## 总结与下一步


  在本章中，你学习了两种用于提升游戏开发项目图形效果的高级且强大的方法。首先，你学会了如何使用 LibGDX 粒子编辑器创建粒子系统，该系统可用于模拟多种效果，例如你创建的推进器和爆炸效果。接着，你设计了一个名为
  `ParticleActor` 的类，使你能够将这些效果集成到 Space Rocks 游戏中。其次，你学习了如何编写着色器程序，这些程序利用 GPU 的强大功能来创建模糊、发光和扭曲等效果。然后，你学习了如何使用
  `ShaderProgram` 类，在 Starfish Collector 游戏中绘制角色时应用这些着色器程序。


  至此，你可以通过在游戏中加入更多特效来巩固所学知识。例如，尝试创建一个看起来像水珠从水坑中溅出的粒子效果，并在 Starfish Collector 游戏中使用该效果来替换
  `Whirlpool` 对象。你也可以为 Starfish Collector 中除了海龟之外的其他对象添加着色器程序；例如，你可以为 `Starfish` 类添加发光脉冲效果。你甚至可以创建一个名为
  `Water` 的新类来替换包含背景图片的 `BaseActor`，并在其 `draw` 方法中应用波浪扭曲着色器。或者，在 Space Rocks 游戏中，你可以为
  `Laser` 类添加发光脉冲效果，并为 `Warp` 类添加波浪扭曲效果。


  在下一章中，你将继续学习高级图形技术，但这次是在 3D 游戏的背景下，最后将以本书最初开始的游戏——Starfish Collector 的 3D 版本作为结尾。


