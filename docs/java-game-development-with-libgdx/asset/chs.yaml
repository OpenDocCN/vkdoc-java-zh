  ## 重访矩形破坏者


  为了练习你在重新设计海星收集者关卡中学到的技能和实现方法，你还将重新设计矩形破坏者游戏中砖块对象的布局并为其添加颜色。使用瓦片地图还将简化墙壁的放置和尺寸以及挡板的起始位置。


  首先，复制第 8 章的 `Rectangle Destroyer` 项目，并将文件夹（以及项目）名称改为 `Rectangle Destroyer Ch 10`。此外，将
  `Starfish Collector Ch 10` 项目文件夹中的 `TilemapActor.java` 文件复制到该文件夹中。下载本章的源代码文件，并将下载项目中
  `assets` 文件夹的内容复制到新项目的 `assets` 文件夹中；新文件包括：一个更大版本的背景图片，名为 `large-space.png`，尺寸为
  832 x 640 像素；一个名为 `wall-square.png` 的图片，尺寸为 32 x 32 像素；以及一个名为 `brick-colors.png`
  的精灵表，它是一个 2 行 4 列的彩色砖块网格，每个砖块尺寸为 64 x 32 像素（最终生成的图片整体尺寸为 128 x 128 像素）。与之前一样，这些尺寸的选择是为了与将要创建的瓦片地图对齐。




  ### 创建瓦片地图


  首先，运行 Tiled 地图编辑器程序。启动后，从“文件”菜单中选择“新建”，然后选择“新建地图”，将出现通用地图设置窗口。在标记为“地图大小”的区域中，将“宽度”改为
  26 个瓦片，“高度”改为 20 个瓦片，并将“瓦片大小”的“宽度”和“高度”设置改为 32 像素。这将创建一个 832 x 640 像素的瓦片地图；稍后，您将更改窗口大小以匹配。点击标记为“另存为...”的按钮，导航到您项目的
  `assets` 目录；将文件保存为 `map.tmx`。瓦片地图将被初始化，屏幕中央会出现一个空白的方格网格，左侧是“属性”面板，右上方是“图层”面板，右下方是“图块集”面板。


  从“图层”菜单中，添加一个新的图像图层，然后添加一个新的对象图层。对于此项目，默认的瓦片图层不需要，因此您可以右键单击图层列表中的“瓦片图层 1”，然后选择“移除图层”。


  要添加背景图像，请在图层列表中选择“图像图层 1”。在“属性”面板中，找到属性名为“图像”的行，单击值列右侧的区域，会出现一个标记为“`...`”的按钮。单击此按钮，并从您的
  `assets` 目录中选择 `large-space.png` 图像。完成后，图像将显示在中央区域。但是，由于背景图像是暗色的，很难看清方格网格。为了提高网格方格的可见性，您可以使用“图层”面板顶部附近的滑块来降低图像的透明度。（但是，这也会影响图像在实际游戏中的显示效果，因此在完成瓦片地图后，您需要将透明度调回
  100%。）


  接下来，您需要创建两个图块集（一个用于墙壁，一个用于砖块），以便在对象图层中使用。在图块集面板区域，单击图标以创建新的图块集。在出现的“新建图块集”窗口中，单击“浏览”，从
  `assets` 目录中选择 `wall-square.png` 图像，将瓦片宽度和瓦片高度值都改为 32 像素，勾选“嵌入到地图中”复选框，然后单击“确定”按钮。然后，在图块集面板中，单击图标以编辑图块集属性。在出现的新选项卡中，单击灰色方块以选中它。在“属性”面板底部，单击加号图标以添加新的自定义属性；输入
  `name` 作为属性名称，并在值列中输入 `Wall`。完成后，单击标记为 `map.tmx` 的选项卡以返回瓦片地图。


  接下来，您将创建砖块图块集，这稍微复杂一些，因为瓦片包含额外的数据。像之前一样创建一个新的图块集，这次使用图像文件 `brick-colors.png`，并将瓦片宽度改为
  64 像素，瓦片高度改为 32 像素。单击图标以编辑图块集属性。单击其中一个砖块瓦片以选中它，然后按住 Ctrl 键并单击其余每个砖块瓦片，以便将它们全部选中，从而可以一次性为它们输入属性。单击加号图标以添加新的自定义属性；输入
  `name` 作为属性名称，并在值列中输入 `Brick`。然后，再次单击加号图标以添加一个名为 `color` 的新自定义属性；暂时不要输入任何值。相反，单击红色砖块瓦片，使其成为唯一选中的瓦片，然后在
  `color` 旁边的值列中输入 `red`。重复此过程，为其余每个砖块输入值；下一节中的代码假定您将为相应颜色的砖块分配值 `orange`、`yellow`、`green`、`blue`、`purple`、`white`
  和 `gray`。


  现在，您可以返回瓦片地图了。首先，确保在“图层”面板中选中了“对象图层 1”。选择 wall-square 图块集，然后单击该图块集中的单个瓦片。按 `T` 键激活“插入瓦片”工具，然后单击瓦片地图区域左上角的网格方格。要更改此对象的大小，请按
  S 键激活“选择对象”工具。如果对象瓦片已被选中，瓦片的边缘和角落会出现双箭头；如果对象瓦片未被选中，单击它后这些箭头会出现。单击并拖动箭头将更改对象的大小；调整此瓦片的大小，直到它覆盖瓦片地图的顶部两行。按
  T 键再次切换到“插入瓦片”工具，并在左下角放置一个 wall-square 瓦片。按 S 键切换到“选择对象”工具，并增加该瓦片的高度，直到它到达之前添加的瓦片，从而形成游戏的左侧墙壁。重复此过程以形成游戏的右侧墙壁。完成后，墙壁应类似于图
  10-11。


  ![A352797_2_En_10_Fig11_HTML.jpg](img/A352797_2_En_10_Fig11_HTML.jpg)


  图 10-11.


  向瓦片地图添加墙壁


  接下来，您将设计并排列该关卡的砖块。切换到 brick-colors 图块集，按 T 键激活“插入瓦片”工具，并以您喜欢的任何方式向瓦片地图添加砖块（记住在瓦片地图底部边缘附近为挡板留出空间）。图
  10-12 展示了一种可能的排列方式。


  ![A352797_2_En_10_Fig12_HTML.jpg](img/A352797_2_En_10_Fig12_HTML.jpg)


  图 10-12.


  向瓦片地图添加砖块


  您将使用一个矩形对象来指定挡板的起始位置。按 R 键激活“插入矩形”工具，并在屏幕中央底部附近绘制一个小矩形。在此矩形被选中的情况下，单击“属性”面板中的加号图标，添加一个名为
  `name`、值为 `Start` 的自定义属性。最后，如果您之前更改了图像图层的透明度，请将其改回 100%。保存您的工作并关闭 Tiled 地图编辑器程序。




  ### 项目集成


  将瓦片地图数据集成到“矩形破坏者”游戏中，与之前在“海星收集者”游戏中看到的方法类似。在 BlueJ 中打开 `Rectangle Destroyer Ch 10`
  项目。由于此版本游戏的瓦片地图尺寸比之前略大，需要相应调整窗口大小。在 `Launcher` 类中，将 `main` 方法的最后一行代码修改为：


  ```

  LwjglApplication launcher = new LwjglApplication( myGame, "Rectangle Destroyer",
  832, 640 );

  ```


  在 `LevelScreen` 类中，添加以下两条 `import` 语句：


  ```

  import com.badlogic.gdx.maps.MapObject;

  import com.badlogic.gdx.maps.MapProperties;

  ```


  接下来，在 `initialize` 方法中，删除以下用于初始化背景、墙壁、砖块和挡板的代码：


  ```

  BaseActor background = new BaseActor(0,0, mainStage);

  background.loadTexture("assets/space.png");

  BaseActor.setWorldBounds(background);

  paddle = new Paddle(320, 32, mainStage);

  new Wall(0,0, 20,600, mainStage);

  new Wall(780,0, 20,600, mainStage);

  new Wall(0,550, 800,50, mainStage);

  Brick tempBrick = new Brick(0,0,mainStage);

  float brickWidth = tempBrick.getWidth();

  float brickHeight = tempBrick.getHeight();

  tempBrick.remove();

  int totalRows = 10;

  int totalCols = 10;

  float marginX = (800 - totalCols * brickWidth) / 2;

  float marginY = (600 - totalRows * brickHeight) - 120;

  for (int rowNum = 0; rowNum < totalRows; rowNum++)

  {

  for (int colNum = 0; colNum < totalCols; colNum++)

  {

  float x = marginX + brickWidth  * colNum;

  float y = marginY + brickHeight * rowNum;

  new Brick( x, y, mainStage );

  }

  }

  ```


  然后，在 `initialize` 方法的开头添加以下代码，以创建 `TilemapActor`：


  ```

  TilemapActor tma = new TilemapActor("assets/map.tmx", mainStage);

  ```


  为了创建 `Wall` 对象，你将像本章前面那样使用 `getTileList` 方法。由于 `Wall` 类的构造函数还需要墙壁的宽度和高度，你还需要从地图对象中获取这些属性。在
  `TilemapActor` 初始化之后添加以下代码：


  ```

  for (MapObject obj : tma.getTileList("Wall") )

  {

  MapProperties props = obj.getProperties();

  new Wall( (float)props.get("x"),     (float)props.get("y"),

  (float)props.get("width"), (float)props.get("height"),

  mainStage );

  }

  ```


  为了创建 `Brick` 对象，你将再次使用 `getTileList` 方法。由于在 Tiled 地图编辑器中使用的瓦片尺寸与 `assets` 文件夹中的砖块图像略有不同，你可以检索瓦片对象的宽度和高度属性来调整砖块对象的大小。此外，你还需要从瓦片对象中检索颜色属性，并据此设置砖块的颜色。要完成这些任务，请添加以下代码：


  ```

  for (MapObject obj : tma.getTileList("Brick") )

  {

  MapProperties props = obj.getProperties();

  Brick b = new Brick( (float)props.get("x"), (float)props.get("y"), mainStage );

  b.setSize( (float)props.get("width"), (float)props.get("height") );

  b.setBoundaryRectangle();

  String colorName = (String)props.get("color");

  if ( colorName.equals("red") )

  b.setColor(Color.RED);

  else if ( colorName.equals("orange") )

  b.setColor(Color.ORANGE);

  else if ( colorName.equals("yellow") )

  b.setColor(Color.YELLOW);

  else if ( colorName.equals("green") )

  b.setColor(Color.GREEN);

  else if ( colorName.equals("blue") )

  b.setColor(Color.BLUE);

  else if ( colorName.equals("purple") )

  b.setColor(Color.PURPLE);

  else if ( colorName.equals("white") )

  b.setColor(Color.WHITE);

  else if ( colorName.equals("gray") )

  b.setColor(Color.GRAY);

  }

  ```


  最后，就像你在“海星收集者”中设置海龟的起始位置一样，通过添加以下代码来设置挡板的起始位置：


  ```

  MapObject startPoint = tma.getRectangleList("start").get(0);

  MapProperties props = startPoint.getProperties();

  paddle = new Paddle( (float)props.get("x"), (float)props.get("y"), mainStage);

  ```


  至此，对“矩形破坏者”项目的修改就完成了。测试你的游戏，并享受你新设计的关卡吧！


  ## 总结与后续步骤


  在本章中，你学习了如何使用 Tiled（一个通用的地图编辑程序）来简化关卡开发。你学习了如何设置地图、添加带有自定义属性的瓦片集，以及处理不同类型的地图层（图像层、瓦片层和对象层）。你还学习了如何在创建
  `TiledMapActor` 类的过程中，集成 LibGDX 的内置功能来处理 Tiled 地图数据文件。这些知识被实际应用于改进两个早期游戏项目（“海星收集者”和“矩形破坏者”）的关卡设计。


  在接下来的两章中，你将继续运用新学到的设计技能和 `TilemapActor` 类，来创建一个平台游戏和一个剑术格斗冒险游戏。


