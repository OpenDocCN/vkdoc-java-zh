  \ dialogBox;\n```\n\n接下来，为了初始化所有这些变量，在 `initialize` 方法中添加以下代码：\n\n```\nhealth =\
  \ 3;\ncoins = 5;\narrows = 3;\ngameOver = false;\nhealthLabel = new Label(\" x \"\
  \ + health, BaseGame.labelStyle);\nhealthLabel.setColor(Color.PINK);\ncoinLabel\
  \  = new Label(\" x \" + coins,  BaseGame.labelStyle);\ncoinLabel.setColor(Color.GOLD);\n\
  arrowLabel = new Label(\" x \" + arrows, BaseGame.labelStyle);\narrowLabel.setColor(Color.TAN);\n\
  messageLabel = new Label(\"...\", BaseGame.labelStyle);\nmessageLabel.setVisible(false);\n\
  dialogBox = new DialogBox(0,0, uiStage);\ndialogBox.setBackgroundColor( Color.TAN\
  \ );\ndialogBox.setFontColor( Color.BROWN );\ndialogBox.setDialogSize(600, 100);\n\
  dialogBox.setFontScale(0.80f);\ndialogBox.alignCenter();\ndialogBox.setVisible(false);\n\
  ```\n\n为了创建界面中使用的图标，添加以下语句：\n\n```\nBaseActor healthIcon = new BaseActor(0,0,uiStage);\n\
  healthIcon.loadTexture(\"assets/heart-icon.png\");\nBaseActor coinIcon = new BaseActor(0,0,uiStage);\n\
  coinIcon.loadTexture(\"assets/coin-icon.png\");\nBaseActor arrowIcon = new BaseActor(0,0,uiStage);\n\
  arrowIcon.loadTexture(\"assets/arrow-icon.png\");\n```\n\n为了在 `uiTable` 中排列所有这些元素，还需要添加以下代码：\n\
  \n```\nuiTable.pad(20);\nuiTable.add(healthIcon);\nuiTable.add(healthLabel);\nuiTable.add().expandX();\n\
  uiTable.add(coinIcon);\nuiTable.add(coinLabel);\nuiTable.add().expandX();\nuiTable.add(arrowIcon);\n\
  uiTable.add(arrowLabel);\nuiTable.row();\nuiTable.add(messageLabel).colspan(8).expandX().expandY();\n\
  uiTable.row();\nuiTable.add(dialogBox).colspan(8);\n```\n\n为了保持标签显示正确的变量值，在 `update`\
  \ 方法中添加以下代码：\n\n```\nhealthLabel.setText(\" x \" + health);\ncoinLabel.setText(\"\
  \ x \" + coins);\narrowLabel.setText(\" x \" + arrows);\n```\n\n此外，当游戏结束时，你将不再希望移动玩家或挥剑，因此在\
  \ `update` 方法的开头添加以下代码：\n\n```\nif ( gameOver )\nreturn;\n```\n\n同样，在 `keyDown`\
  \ 方法的开头添加以下内容：\n\n```\nif ( gameOver )\nreturn false;\n```\n\n现在是一个很好的时机来添加更多游戏对象：可以收集的金币以及找到后即可获胜的宝箱。首先，使用以下代码创建一个名为\
  \ `Coin` 的新类：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class\
  \ Coin extends BaseActor\n{\npublic Coin(float x, float y, Stage s)\n{\nsuper(x,y,s);\n\
  loadTexture(\"assets/coin.png\");\n}\n}\n```\n\n然后，使用以下代码创建一个名为 `Treasure` 的类：\n\
  \n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class Treasure extends\
  \ BaseActor\n{\npublic Treasure(float x, float y, Stage s)\n{\nsuper(x,y,s);\nloadTexture(\"\
  assets/treasure-chest.png\");\n}\n}\n```\n\n由于游戏中只会有一个宝箱对象，为了简化后续代码，在 `LevelScreen`\
  \ 类中添加以下变量声明：\n\n```\nTreasure treasure;\n```\n\n为了从地图数据中创建这些对象，在 `initialize` 方法中添加以下内容：\n\
  \n```\nfor (MapObject obj : tma.getTileList(\"Coin\") )\n{\nMapProperties props\
  \ = obj.getProperties();\nnew Coin( (float)props.get(\"x\"), (float)props.get(\"\
  y\"), mainStage );\n}\nMapObject treasureTile = tma.getTileList(\"Treasure\").get(0);\n\
  MapProperties treasureProps = treasureTile.getProperties();\ntreasure = new Treasure(\
  \ (float)treasureProps.get(\"x\"), (float)treasureProps.get(\"y\"),\nmainStage );\n\
  ```\n\n为了处理与这些对象的重叠，在 `update` 方法中添加以下代码：\n\n```\nfor ( BaseActor coin : BaseActor.getList(mainStage,\
  \ \"Coin\") )\n{\nif ( hero.overlaps(coin) )\n{\ncoin.remove();\ncoins++;\n}\n}\n\
  if ( hero.overlaps(treasure) )\n{\nmessageLabel.setText(\"You win!\");\nmessageLabel.setColor(Color.LIME);\n\
  messageLabel.setFontScale(2);\nmessageLabel.setVisible(true);\ntreasure.remove();\n\
  gameOver = true;\n}\n```\n\n此外，现在也是添加处理游戏失败代码的好时机，当英雄生命值耗尽时触发（尽管目前还无法实现），因此也添加以下内容：\n\
  \n```\nif ( health <= 0 )\n{\nmessageLabel.setText(\"Game over...\");\nmessageLabel.setColor(Color.RED);\n\
  messageLabel.setFontScale(2);\nmessageLabel.setVisible(true);\nhero.remove();\n\
  gameOver = true;\n}\n```\n\n再次准备好测试你的游戏。收集金币（如果你添加了的话）并收集宝箱，即可看到屏幕上出现“You win!”消息。\n\
  \n\n\n## 敌人\n\n每款游戏都应有障碍物，使玩家难以抵达或达成目标。在《寻宝任务》中，你必须使用武器摧毁在屏幕上飞行的敌人，它们被称为“飞行者”。飞行者的行为具有一定随机性：每个飞行者拥有随机速度，并会在随机时刻将运动方向改变为随机角度。创建一个名为\
  \ `Flyer` 的新类，包含以下代码：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport\
  \ com.badlogic.gdx.math.MathUtils;\npublic class Flyer extends BaseActor\n{\npublic\
  \ Flyer(float x, float y, Stage s)\n{\nsuper(x,y,s);\nloadAnimationFromSheet( \"\
  assets/enemy-flyer.png\", 1, 4, 0.05f, true);\nsetSize(48,48);\nsetBoundaryPolygon(6);\n\
  setSpeed( MathUtils.random(50,80) );\nsetMotionAngle( MathUtils.random(0,360) );\n\
  }\npublic void act(float dt)\n{\nsuper.act(dt);\nif ( MathUtils.random(1,120) ==\
  \ 1 )\nsetMotionAngle( MathUtils.random(0,360) );\napplyPhysics(dt);\nboundToWorld();\n\
  }\n}\n```\n\n当飞行者被摧毁时，它会化作一团烟雾消失。为此，创建一个名为 `Smoke` 的新类，包含以下代码，用于创建一个逐渐淡出并最终从游戏中移除自身的图像：\n\
  \n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
  public class Smoke extends BaseActor\n{\npublic Smoke(float x, float y, Stage s)\n\
  {\nsuper(x,y,s);\nloadTexture(\"assets/smoke.png\");\naddAction( Actions.fadeOut(0.5f)\
  \ );\naddAction( Actions.after( Actions.removeActor() ) );\n}\n}\n```\n\n像往常一样，你需要在\
  \ `LevelScreen` 类的 `initialize` 方法中创建这些新对象，具体如下：\n\n```\nfor (MapObject obj : tma.getTileList(\"\
  Flyer\") )\n{\nMapProperties props = obj.getProperties();\nnew Flyer( (float)props.get(\"\
  x\"), (float)props.get(\"y\"), mainStage );\n}\n```\n\n飞行者也会被固体物体阻挡，并在碰撞时改变方向。因此，在\
  \ `update` 方法中，找到遍历 `Solid` 对象的 `for` 循环，并在相应的代码块中添加以下内容：\n\n```\nfor (BaseActor\
  \ flyer : BaseActor.getList(mainStage, \"Flyer\"))\n{\nif (flyer.overlaps(solid))\n\
  {\nflyer.preventOverlap(solid);\nflyer.setMotionAngle( flyer.getMotionAngle() +\
  \ 180 );\n}\n}\n```\n\n当剑处于可见状态（表示正在挥动）时，可以摧毁敌人。在这种情况下，如果剑与敌人重叠，将生成烟雾并产生一枚金币（作为对玩家胜利的奖励）。在\
  \ `update` 方法中，找到检查剑是否可见的条件语句，并在相应的代码块中添加以下内容：\n\n```\nfor (BaseActor flyer : BaseActor.getList(mainStage,\
  \ \"Flyer\"))\n{\nif (sword.overlaps(flyer))\n{\nflyer.remove();\nCoin coin = new\
  \ Coin(0,0, mainStage);\ncoin.centerAtActor(flyer);\nSmoke smoke = new Smoke(0,0,\
  \ mainStage);\nsmoke.centerAtActor(flyer);\n}\n}\n```\n\n最后，英雄与飞行者接触时应损失生命值。检测重叠很简单，但有一个细节需要处理：英雄和飞行者应尽可能“被推开”，否则英雄可能会在短时间内多次与飞行者重叠，导致玩家迅速输掉游戏。因此，碰撞发生后，飞行者将开始向相反方向移动，而英雄会被推离敌人，这有时也被称为击退。要计算运动角度，你需要通过减去两者的位置来计算从英雄到飞行者的向量，然后使用\
  \ `Vector2` 类的 `angle` 方法。为实现这些功能，将以下代码添加到 `update` 方法中：\n\n```\nfor (BaseActor\
  \ flyer : BaseActor.getList(mainStage, \"Flyer\"))\n{\nif ( hero.overlaps(flyer)\
  \ )\n{\nhero.preventOverlap(flyer);\nflyer.setMotionAngle( flyer.getMotionAngle()\
  \ + 180 );\nVector2 heroPosition  = new Vector2(  hero.getX(),  hero.getY() );\n\
  Vector2 flyerPosition = new Vector2( flyer.getX(), flyer.getY() );\nVector2 hitVector\
  \ = heroPosition.sub( flyerPosition );\nhero.setMotionAngle( hitVector.angle() );\n\
  hero.setSpeed(100);\nhealth--;\n}\n}\n```\n\n至此，你已经完成了飞行者敌人的实现。测试你的项目，用剑砍杀敌人，并收集它们掉落的金币。\n\
  \n## 箭矢\n\n许多以战斗为核心的游戏都提供多种武器，以迎合不同的游戏风格。现在你将为此游戏添加一种箭矢武器，使你能从远处攻击敌人。为确保玩家不会完全依赖这种武器，箭矢的数量是有限的（不过可以在本章末尾创建的道具商店中购买额外的箭矢）。玩家可以通过按下\
  \ A 键射箭，如果英雄还有剩余箭矢，将生成一支箭矢，并朝英雄面对的方向飞行。如果箭矢击中敌人，敌人将被摧毁；如果箭矢击中固体物体，箭矢将停止移动并淡出。首先，创建一个名为\
  \ `Arrow` 的新类，代码如下：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic\
  \ class Arrow extends BaseActor\n{\npublic Arrow(float x, float y, Stage s)\n{\n\
  super(x,y,s);\nloadTexture(\"assets/arrow.png\");\nsetSpeed(400);\n}\npublic void\
  \ act(float dt)\n{\nsuper.act(dt);\napplyPhysics(dt);\n}\n}\n```\n\n射箭功能将由以下方法处理，该方法应添加到\
  \ `LevelScreen` 类中：\n\n```\npublic void shootArrow()\n{\nif ( arrows <= 0 )\nreturn;\n\
  arrows--;\nArrow arrow = new Arrow(0,0, mainStage);\narrow.centerAtActor(hero);\n\
  arrow.setRotation( hero.getFacingAngle() );\narrow.setMotionAngle( hero.getFacingAngle()\
  \ );\n}\n```\n\n在 `keyDown` 方法中，在导致英雄挥剑的代码之后添加以下代码：\n\n```\nif (keycode == Keys.A)\n\
  shootArrow();\n```\n\n最后，为了指定箭矢如何与飞行者和固体物体交互，将以下代码添加到 `update` 方法中：\n\n```\nfor\
  \ (BaseActor arrow : BaseActor.getList(mainStage, \"Arrow\"))\n{\nfor (BaseActor\
  \ flyer : BaseActor.getList(mainStage, \"Flyer\"))\n{\nif (arrow.overlaps(flyer))\n\
  {\nflyer.remove();\narrow.remove();\nCoin coin = new Coin(0,0, mainStage);\ncoin.centerAtActor(flyer);\n\
  Smoke smoke = new Smoke(0,0, mainStage);\nsmoke.centerAtActor(flyer);\n}\n}\nfor\
  \ (BaseActor solid : BaseActor.getList(mainStage, \"Solid\"))\n{\nif (arrow.overlaps(solid))\n\
  {\narrow.preventOverlap(solid);\narrow.setSpeed(0);\narrow.addAction( Actions.fadeOut(0.5f)\
  \ );\narrow.addAction( Actions.after( Actions.removeActor() ) );\n}\n}\n}\n```\n\
  \n至此，箭矢射击机制已完成。测试你的游戏，确保箭矢能摧毁飞行者敌人，箭矢在碰撞到固体时停止，箭矢数量在射击后减少，并且当箭矢数量归零后，无法再射出箭矢。\n\n\
  \n\n## 非玩家角色\n\n接下来要实现的功能是添加非玩家角色（NPC）。它们与第 5 章中介绍的标志物对象密切相关；建议在继续之前重新阅读相关章节。与标志物类似，靠近\
  \ NPC 时，用户界面中的对话框会显示关联消息。但与标志物不同的是，每个 NPC 都有独特的外观，并使用瓦片地图中设置的标识符（`id`）数据。此外，在显示关联消息之前会检查每个\
  \ NPC 的 ID，这让你有机会根据游戏状态显示不同的消息。具体来说，本章设计的游戏包含两个 NPC，一个叫守门人，另一个叫店主。守门人最初会阻挡通往宝藏的路径，向玩家提供指示（消灭所有飞行器才能获得宝藏！），告知剩余飞行器的数量，并在玩家消灭所有飞行器后逐渐淡出消失，从而让玩家能够收集宝藏。店主则没有动态文本，他们只是告知英雄物品商店中可售物品的价格和数量（商店将在下一节创建）。\n\
  \n首先，使用以下代码创建一个名为`NPC`的新类。请注意，角色的图像不是在构造函数中设置的，而是在设置 ID 时设置的。\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
  public class NPC extends BaseActor\n{\n// 要显示的文本\nprivate String text;\n// 用于判断对话框文本是否正在显示\n\
  private boolean viewing;\n// 用于特定图形和识别具有动态消息的 NPC 的 ID\nprivate String ID;\npublic\
  \ NPC(float x, float y, Stage s)\n{\nsuper(x,y,s);\ntext = \" \";\nviewing = false;\n\
  }\npublic void setText(String t)\n{  text = t;  }\npublic String getText()\n{  return\
  \ text;  }\npublic void setViewing(boolean v)\n{  viewing = v;  }\npublic boolean\
  \ isViewing()\n{  return viewing;  }\npublic void setID(String id)\n{\nID = id;\n\
  if ( ID.equals(\"Gatekeeper\") )\nloadTexture(\"assets/npc-1.png\");\nelse if (ID.equals(\"\
  Shopkeeper\"))\nloadTexture(\"assets/npc-2.png\");\nelse // 默认图像\nloadTexture(\"\
  assets/npc-3.png\");\n}\npublic String getID()\n{  return ID;  }\n}\n```\n\n为了设置\
  \ NPC，在`LevelScreen`类的`initialize`方法中添加以下代码；请注意，你还需要检索在设计瓦片地图时创建的名为`id`和`text`的属性。注意，NPC\
  \ 的位置会与在 Tiled 地图编辑器中放置的位置略有偏移，因为 NPC 的尺寸比瓦片集中用于表示它的图标要大。你可能会发现之后需要在 Tiled 中调整 NPC\
  \ 的位置。\n\n```\nfor (MapObject obj : tma.getTileList(\"NPC\") )\n{\nMapProperties\
  \ props = obj.getProperties();\nNPC s = new NPC( (float)props.get(\"x\"), (float)props.get(\"\
  y\"), mainStage );\ns.setID( (String)props.get(\"id\") );\ns.setText( (String)props.get(\"\
  text\") );\n}\n```\n\n最后，在`update`方法中添加以下代码。如果英雄在 NPC 的四个像素范围内，则认为英雄在附近，并显示相应的消息。一旦英雄不再靠近正在查看消息的\
  \ NPC，对话框就会消失。以下大部分代码用于为守门人 NPC 创建动态消息，这些消息取决于游戏中剩余的飞行器数量。一旦所有飞行器被摧毁，守门人会慢慢淡出并移出屏幕，从而使英雄能够到达宝藏处。\n\
  \n```\nfor ( BaseActor npcActor : BaseActor.getList(mainStage, \"NPC\") )\n{\nNPC\
  \ npc = (NPC)npcActor;\nhero.preventOverlap(npc);\nboolean nearby = hero.isWithinDistance(4,\
  \ npc);\nif ( nearby && !npc.isViewing() )\n{\n// 检查 NPC ID 以获取动态文本\nif ( npc.getID().equals(\"\
  Gatekeeper\") )\n{\nint flyerCount = BaseActor.count(mainStage, \"Flyer\");\nString\
  \ message = \"消灭飞行器，宝藏就是你的了。 \";\nif ( flyerCount > 1 )\nmessage += \"还剩 \" + flyerCount\
  \ + \" 个。\";\nelse if ( flyerCount == 1 )\nmessage += \"还剩 \" + flyerCount + \"\
  \ 个。\";\nelse // flyerCount == 0\n{\nmessage += \"它是你的了！\";\nnpc.addAction( Actions.fadeOut(5.0f)\
  \ );\nnpc.addAction( Actions.after( Actions.moveBy(-10000, -10000) ) );\n}\ndialogBox.setText(message);\n\
  }\nelse\n{\ndialogBox.setText( npc.getText() );\n}\ndialogBox.setVisible( true );\n\
  npc.setViewing( true );\n}\nif (npc.isViewing() && !nearby)\n{\ndialogBox.setText(\
  \ \" \" );\ndialogBox.setVisible( false );\nnpc.setViewing( false );\n}\n}\n```\n\
  \n至此，NPC 功能已完全实现。测试你的游戏并与每个 NPC 对话。尝试消灭飞行器，然后确保守门人按预期消失。\n\n## 物品商店\n\n你将在《寻宝任务》游戏中实现的最后一个机制是物品商店，它由两个英雄可以站立的瓦片组成，如果玩家按下\
  \ B 键（购买）并且有足够的金币，玩家将获得店主所述数量的物品。这赋予了玩家收集的金币实际价值，而不仅仅是抽象的点数或进度衡量标准。首先，使用以下代码创建一个名为`ShopHeart`的新类：\n\
  \n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class ShopHeart extends\
  \ BaseActor\n{\npublic ShopHeart(float x, float y, Stage s)\n{\nsuper(x,y,s);\n\
  loadTexture(\"assets/heart-icon.png\");\n}\n}\n```\n\n同时创建一个名为`ShopArrow`的类，如下所示：\n\
  \n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\npublic class ShopArrow extends\
  \ BaseActor\n{\npublic ShopArrow(float x, float y, Stage s)\n{\nsuper(x,y,s);\n\
  loadTexture(\"assets/arrow-icon.png\");\n}\n}\n```\n\n由于每个对象只会有一个实例，在`LevelScreen`类中添加以下变量：\n\
  \n```\nShopHeart shopHeart;\nShopArrow shopArrow;\n```\n\n为了创建这些对象，在`initialize`方法中添加以下代码：\n\
  \n```\nMapObject shopHeartTile = tma.getTileList(\"ShopHeart\").get(0);\nMapProperties\
  \ shopHeartProps = shopHeartTile.getProperties();\nshopHeart = new ShopHeart( (float)shopHeartProps.get(\"\
  x\"), (float)shopHeartProps.get(\"y\"),\nmainStage );\nMapObject shopArrowTile =\
  \ tma.getTileList(\"ShopArrow\").get(0);\nMapProperties shopArrowProps = shopArrowTile.getProperties();\n\
  shopArrow = new ShopArrow( (float)shopArrowProps.get(\"x\"), (float)shopArrowProps.get(\"\
  y\"),\nmainStage );\n```\n\n由于购买物品是一个离散动作，在`keyDown`方法中激活武器的代码之后添加以下代码：\n\n```\n\
  if (keycode == Keys.B)\n{\nif (hero.overlaps(shopHeart) && coins >= 3)\n{\ncoins\
  \ -= 3;\nhealth += 1;\n}\nif (hero.overlaps(shopArrow) && coins >= 4)\n{\ncoins\
  \ -= 4;\narrows += 3;\n}\n}\n```\n\n就这么简单！再次运行你的游戏，消灭一些飞行器，并花掉你辛苦赚来的金币。\n\n一旦你完成了这一步，值得恭喜，因为你已经完成了本书中最长的项目！\n\
  \n\n\n## 总结与下一步\n\n在本章中，你创建了《寻宝探险》这款基于战斗的冒险游戏，其中包含了多项新功能，例如使用多种类型武器的战斗、带有动态文本的 NPC\
  \ 以及物品商店。在实现这些功能的同时，你还处理了一些细微的细节，例如剑的放置位置、敌人和箭矢与实体的交互，以及英雄与敌人碰撞产生的击退效果。\n\n像往常一样，你应该添加菜单和音效等功能。如果你愿意，还可以增加新类型的武器，例如炸弹，它能产生爆炸，同时摧毁岩石和敌人。炸弹很可能是一种有限资源，类似于箭矢，或许也可以在物品商店购买。此外，你可以创建一种会跟随玩家的新型敌人来增加难度。你也可以改变游戏目标：也许不是摧毁飞行者，而是需要收集一定数量的金币才能继续。你还可以从游戏中移除剑，甚至完全移除武器，让游戏变成躲避和回避敌人。可能性是无限的！\n\
  \n至此，你已经完成了本书的第二部分。本书的最后一部分包含高级技术和算法，讲解如何使用游戏手柄控制器、高级图形等，这些都可以用来改进你到目前为止所制作的所有游戏。\n\
  \n"
