  ## 游戏项目：海星收集者 3D


  在本节中，你将创建游戏《海星收集者 3D》，顾名思义，它是本书开头介绍的《海星收集者》游戏的 3D 版本；图 16-9 展示了这两个游戏的并排对比。正如你所料，这个新游戏的目标是帮助乌龟收集所有海星。你可以使用方向键控制乌龟：按上箭头键让乌龟向前移动，按左、右箭头键让乌龟向左或向右转弯。大部分困难的基础工作已在上一节中完成。剩余的主题包括从外部文件加载复杂模型、显示环绕游戏世界的图像，以及执行简化的碰撞检测。和之前一样，你将继续向
  `Project3D` 中添加代码，因为它已经包含了许多你需要的类（`BaseGame`、`BaseScreen`、`BaseActor3D` 和 `Stage3D`）。


  ![A352797_2_En_16_Fig9_HTML.jpg](img/A352797_2_En_16_Fig9_HTML.jpg)


  图 16-9.


  2D（左）与 3D（右）版本的《海星收集者》


  第一个任务——加载模型——相对简单。为此，你需要使用 `ModelLoader` 类的一个扩展，名为 `ObjLoader`，它可以导入使用 Wavefront（`*.obj`）文件格式的
  3D 模型；然后你需要使用 `ObjLoader` 类的 `loadModel` 方法，该方法接受一个 `FileHandle` 作为输入，并返回一个 `Model`。接着，你可以使用该模型创建一个
  `ModelInstance`，并将其用于 `BaseActor3D` 对象中，就像你对 `Box` 和 `Sphere` 类所做的那样。由于你将在此游戏中导入多个模型，因此创建一个包含此功能的新类是合理的。创建一个名为
  `ObjModel` 的新类，其中包含以下代码：


  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.graphics.g3d.Model;

  import com.badlogic.gdx.graphics.g3d.ModelInstance;

  import com.badlogic.gdx.graphics.g3d.loader.ObjLoader;

  public class ObjModel extends BaseActor3D

  {

  public ObjModel(float x, float y, float z, Stage3D s)

  {

  super(x,y,z,s);

  }

  public void loadObjModel(String fileName)

  {

  ObjLoader loader = new ObjLoader();

  Model objModel = loader.loadModel(Gdx.files.internal(fileName), true);

  setModelInstance( new ModelInstance(objModel) );

  }

  }

  ```


  接下来，你需要用一张图像环绕游戏世界，以营造背景中天空的效果。在本书之前的 2D 游戏中，你创建了一个仅显示天空图像的矩形对象。由于现在处于 3D 环境中，你将创建一个比游戏世界大得多且环绕它的球体对象，然后为其应用纹理，例如图
  16-10 所示的纹理。这通常被称为天空球体或天空穹顶。你可能会注意到，图像在顶部附近看起来略有拉伸（如果底部不是纯灰色，底部也会如此）。这是因为图像经过了球面扭曲：虽然它在矩形中看起来很奇怪，但当图像应用到球体上时，所有内容都会呈现正确的比例。这与尝试制作地球（大致呈球形）的平面矩形地图时发生的现象相同；地图不可避免地会包含与极地附近区域相对应的扭曲区域。在尝试实现天空穹顶时还会出现第二个困难：应用于对象材质的纹理通常只有在从对象外部观察时才可见。（这种约定是为了提高
  3D 程序的效率；无需从用户看不到的角度渲染对象。）幸运的是，你可以通过一个几何技巧来解决这个问题：创建球体后，你将网格在 z 方向上缩放 -1；这将使球体“内外翻转”，从而反转图像显示的面。


  ![A352797_2_En_16_Fig10_HTML.jpg](img/A352797_2_En_16_Fig10_HTML.jpg)


  图 16-10.


  一张经过球面扭曲的天空图像


  第三个也是最后一个要讨论的概念是碰撞检测。为了保持复杂度的可控性，三维物体的运动和位置将被限制在一个二维平面上，从而允许本项目复用原始 `BaseActor`
  类中的碰撞代码。这种技术在游戏开发中广为人知。使用这种方法（即拥有 3D 图形但将游戏玩法限制在 2D 平面上，并限制摄像机移动）的游戏被称为 2.5D 游戏。图
  16-11 展示了游戏在玩家眼中的样子，而在右侧，你可以看到由网格表示的水面，以及对应于图中游戏实体（两块岩石和乌龟）的碰撞多边形。


  ![A352797_2_En_16_Fig11_HTML.jpg](img/A352797_2_En_16_Fig11_HTML.jpg)


  图 16-11.


  以 3D 渲染的游戏世界，以及对应的 2D 碰撞多边形


  为了将碰撞功能整合到你的项目中，你需要对 `BaseActor3D` 类进行一些补充。首先，添加以下 `import` 语句：


  ```

  import com.badlogic.gdx.math.collision.BoundingBox;

  import com.badlogic.gdx.math.Polygon;

  import com.badlogic.gdx.math.Intersector;

  import com.badlogic.gdx.math.Intersector.MinimumTranslationVector;

  ```


  接下来，向该类添加以下变量声明：


  ```

  private Polygon boundingPolygon;

  ```


  然后是用于将多边形设置为矩形或八边形（八边形）形状的一对方法。在这两种情况下，你都需要确定对象在 x 和 z 维度上的尺寸；这些量类似于二维情况下的宽度和高度。这些值可以通过计算与模型关联的
  `BoundingBox` 来确定，`BoundingBox` 是包含整个模型的最小盒子。边界框使用两个 `Vector3` 对象 `min` 和 `max`
  存储模型的尺寸，它们分别存储模型所包含的最小和最大坐标值。这些值用于创建传递给多边形对象的顶点数组，如下所示：




  ```

  public void setBaseRectangle ()

  {

  BoundingBox modelBounds = modelData.calculateBoundingBox( new BoundingBox() );

  Vector3 max = modelBounds.max;

  Vector3 min = modelBounds.min;

  float[] vertices =

  {max.x, max.z, min.x, max.z, min.x, min.z, max.x, min.z};

  boundingPolygon = new Polygon(vertices);

  boundingPolygon.setOrigin(0,0);

  }

  public void setBasePolygon()

  {

  BoundingBox modelBounds = modelData.calculateBoundingBox( new BoundingBox() );

  Vector3 max = modelBounds.max;

  Vector3 min = modelBounds.min;

  float a = 0.75f; // 偏移量。

  float[] vertices =

  {max.x,0, a*max.x,a*max.z, 0,max.z, a*min.x,a*max.z,

  min.x,0, a*min.x,a*min.z, 0,min.z, a*max.x,a*min.z };

  boundingPolygon = new Polygon(vertices);

  boundingPolygon.setOrigin(0,0);

  }

  ```


  多边形设置完成后，你需要一个方法，用于返回已根据位置、旋转和缩放更新后的边界多边形。回想一下，由于坐标轴的朝向，水平面包含 x 轴和 z 轴，因此在更新多边形的位置和缩放时会用到这些值，而转向角（绕
  y 轴的旋转）则用于设置其旋转。将以下代码添加到 `BaseActor3D` 类中：


  ```

  public Polygon getBoundaryPolygon()

  {

  boundingPolygon.setPosition( position.x, position.z );

  boundingPolygon.setRotation( getTurnAngle() );

  boundingPolygon.setScale( scale.x, scale.z );

  return boundingPolygon;

  }

  ```


  接下来，你需要检测重叠（检查海龟是否收集了海星）和防止重叠（使岩石表现为实体，海龟无法穿过）的方法。这些方法也需要添加到 `BaseActor3D` 类中，与
  `BaseActor` 类中的方法相同，只是参数必须传入一个 `BaseActor3D` 对象。添加以下代码：


  ```

  public boolean overlaps(BaseActor3D other)

  {

  Polygon poly1 = this.getBoundaryPolygon();

  Polygon poly2 = other.getBoundaryPolygon();

  if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

  return false;

  MinimumTranslationVector mtv = new MinimumTranslationVector();

  return Intersector.overlapConvexPolygons(poly1, poly2, mtv);

  }

  public void preventOverlap(BaseActor3D other)

  {

  Polygon poly1 = this.getBoundaryPolygon();

  Polygon poly2 = other.getBoundaryPolygon();

  // 初始测试以提高性能

  if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

  return;

  MinimumTranslationVector mtv = new MinimumTranslationVector();

  boolean polygonOverlap = Intersector.overlapConvexPolygons(poly1, poly2, mtv);

  if ( polygonOverlap )

  this.moveBy( mtv.normal.x * mtv.depth, 0, mtv.normal.y * mtv.depth );

  }

  ```


  最后，你将重新创建 `Actor` 和 `BaseActor` 类中的一些方法，以便处理列表：`getList`、`count` 和 `remove`。首先，将以下
  `import` 语句添加到 `BaseActor3D` 类中：


  ```

  import java.util.ArrayList;

  ```


  然后，将以下代码添加到 `BaseActor3D` 类中：


  ```

  public static ArrayList getList(Stage3D stage, String className)

  {

  ArrayList list = new ArrayList();

  Class theClass = null;

  try

  {  theClass = Class.forName(className);  }

  catch (Exception error)

  {  error.printStackTrace();  }

  for (BaseActor3D ba3d : stage.getActors())

  {

  if ( theClass.isInstance( ba3d ) )

  list.add(ba3d);

  }

  return list;

  }

  public static int count(Stage3D stage, String className)

  {

  return getList(stage, className).size();

  }

  public void remove()

  {

  stage.removeActor(this);

  }

  ```


