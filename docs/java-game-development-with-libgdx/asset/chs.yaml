  Starfish Collector 游戏的背景下进行演示。


  为了整合所有这些更改，你将创建一个名为 `BaseActor` 的新类，它将取代上一章中的 `ActorBeta` 类。`BaseActor` 类将足够健壮且功能丰富，可用于本书剩余部分的所有游戏项目，以及你自己的游戏项目。在本章中，你将逐步重建和改进
  Starfish Collector 游戏，并全程使用新的 `BaseActor` 类。


  注意


  你将在本章中创建的 `BaseActor` 类将包含许多方法和功能，但并非所有游戏对象都需要所有这些功能。例如，并非所有游戏对象都有动画，并非所有游戏对象都会移动，等等。通常，面向对象的设计原则会建议将这些功能拆分到单独的类中。但是，为了简化类依赖关系并减少本书未来项目所需的类总数，我们决定将所有与
  Actor 相关的功能包含在一个单独的类中。


  首先，从本书网站下载本章的源代码文件。在 BlueJ 中创建一个名为 `Starfish Collector Ch3` 的新项目（以区别于上一章的版本）。在 BlueJ
  创建的项目目录中，创建一个名为 `assets` 的新文件夹。将下载项目 `assets` 文件夹中的所有图像文件复制到你新项目的 `assets` 文件夹中。接下来（如果你之前没有将
  LibGDX JAR 文件添加到 BlueJ 的 `userlib` 文件夹中），在你的项目目录中，创建一个名为 `+libs` 的新文件夹。将下载项目 `+libs`
  文件夹中的 JAR 文件复制到你新项目的 `+libs` 文件夹中。重新启动 BlueJ，以便 BlueJ 正确识别新添加到 `+libs` 文件夹中的 JAR
  文件。


  在你的 BlueJ 项目中，创建一个名为 `BaseActor` 的新类。第一步是编写 `constructor` 方法。由于你需要设置 Actor 的位置并将其添加到舞台，你可以通过
  `constructor` 方法提供这些数据，并使用以下代码自动执行这些操作：


  ```

  import com.badlogic.gdx.scenes.scene2d.Actor;

  import com.badlogic.gdx.scenes.scene2d.Stage;

  /**

  * 扩展 LibGDX Actor 类的功能。

  */

  public class BaseActor extends Actor

  {

  public BaseActor(float x, float y, Stage s)

  {

  // 调用 Actor 类的构造函数

  super();

  // 执行额外的初始化任务

  setPosition(x,y);

  s.addActor(this);

  }

  }

  ```


  在接下来的章节中，你将添加对动画、基于物理的运动、改进的碰撞检测与处理以及处理特定对象类型集合的方法的支持。




  ## 动画


  你将在 `BaseActor` 类中实现的第一个改动是动画支持：通过改变正在显示的图像来营造运动或变化的外观。本节将讨论两种类型的动画：基于数值的动画，它使用单张图像并持续改变相关数值（如位置或旋转角度）；以及基于图像的动画，它快速连续显示一系列图像。


  ### 基于数值的动画


  许多视觉效果可以通过持续改变与游戏实体相关的数值来实现，例如：


  *   通过改变位置坐标值可以创建移动效果。

  *   通过改变旋转值可以创建旋转效果。

  *   通过改变缩放因子可以创建放大或缩小效果。

  *   通过改变红/绿/蓝（RGB）颜色分量值可以创建颜色循环效果。

  *   通过改变透明度（alpha）值可以创建淡入/淡出效果。


  通过使用 LibGDX 的 `Action` 类，可以轻松地将这些效果添加到你的游戏中。`Action` 是一个可以添加到 `Actor` 的对象，用于随时间自动改变各种字段（位置、旋转、缩放、颜色）的值。处理动作的代码包含在
  `Actor` 类的 `act` 方法中（这就是为什么在上一章编写 `BaseActor` 类的 `act` 方法时需要调用 `super.act(dt)`——以确保这段代码被执行）。要创建一个
  `Action`，最简单的方法是使用 `Actions` 类中可用的静态方法。该类提供了数十种方法，这里仅讨论其中一部分。


  例如，一个名为 `spin` 的 `Action`，可以在两秒内将演员旋转 180 度，可以通过以下代码创建并附加到一个名为 `starfish` 的 `Actor`
  上：


  ```

  Action spin = Actions.rotateBy( 180, 2 );

  starfish.addAction( spin );

  ```


  类似地，一个名为 `shift` 的 `Action`，可以在 1 秒内将演员水平移动 50 像素（向右）、垂直移动 0 像素，可以通过以下代码创建：


  ```

  Action shift = Actions.moveBy( 50, 0, 1 );

  ```


  你还可以通过组合 `Action` 对象来创建复杂的复合视觉效果。如果你向一个 `Actor` 添加多个动作，它们将同时运行（通常称为并行）。例如，如果你将 `spin`
  和 `shift` 这两个动作都添加到一个 `Actor` 上，那么在第一个秒内，该 `Actor` 将旋转 90 度并向右移动 50 像素；在下一秒内，它将再旋转
  90 度（但不再向右移动，因为该动作此时已经完成）。或者，你可能希望一组动作一个接一个地运行（通常称为顺序执行）。你可以使用 `Actions` 类的 `after`
  方法创建一个动作，该动作仅在所有先前添加的动作完成后才运行。以下示例演示了这一点，其中 `starfish` 演员将先旋转两秒，然后在第三秒内移动：


  ```

  starfish.addAction( spin );

  starfish.addAction( Actions.after( shift ) );

  ```


  最后，你可能希望一个动作重复特定次数或无限重复。这些行为分别通过使用 `Actions` 类的 `repeat` 和 `forever` 方法实现，如下所示：


  ```

  Action spinTwice = Actions.repeat( spin, 2 );

  Action spinForever = Actions.forever( spin );

  ```


  这只是可用方法的一个示例；有关预定义动作类型的完整列表，请参阅 LibGDX `Actions` 类的文档。方便的是，此功能内置于 `Actor` 类中，并且由于
  `BaseActor` 类继承自 `Actor` 类，因此无需对 `BaseActor` 类进行任何添加即可使用 `Action` 对象。


  ### 基于图像的动画


  如前所述，基于图像的动画是由快速连续显示的图像序列创建的，以产生运动的错觉。在 LibGDX 中，这可以通过使用 `Animation` 类来实现。创建动画需要三个信息：


  *   要显示的图像数组（`Array`）

  *   每张图像应显示的时间长度

  *   一个指示帧应如何播放的值——按给定顺序、逆序、从头到尾再从头（乒乓顺序）——以及是否重复（循环）播放动画


  动画可以基于存储图像数据的不同类来创建，例如 `Texture` 和 `TextureRegion`。为了获得最大的灵活性，`Animation` 类是泛型设计的，因此当你声明一个
  `Animation` 对象时，你也可以声明它将存储的数据类型。


  泛型类型和类


  数据结构是计算机编程中的一个基本概念，因为它们允许你高效地组织和利用数据。最基本且广为人知的数据结构类型之一是数组，它允许你存储特定类型的固定数量的值。在 Java
  编程语言中，你通过先输入要存储的数据类型，后跟一组方括号来表示数组；字符串数组用 `String[]` 表示，而浮点小数数组用 `float[]` 表示。通常，给定
  Java 中的任何类，你都可以创建一个元素为该类型的数组。这使得数组成为一种非常灵活且适应性强的数据结构。


  有时，你会设计自己的类来存储特定类型的数据。例如，存储一个人的名和姓需要两个字符串，可以使用以下类来存储：


  ```

  public class StringPair

  {

  private String first;

  private String second;

  // 构造函数

  StringPair(String a, String b)

  {

  first = a;

  second = b;

  }

  // getter/setter 方法

  public void setFirst(String s)  { first = s; }

  public String getFirst()  { return first; }

  public void setSecond(String s) { second = s; }

  public String getSecond()  { return second; }

  // 标准方法

  public String toString()

  {

  return "[" + first + "," + second + "]";

  }

  }

  ```


  类似地，要存储一个点的 x 和 y 坐标，你可以使用以下类：


  ```

  public class FloatPair

  {

  private float first;

  private float second;

  // 构造函数

  FloatPair(float a, float b)

  {

  first = a;

  second = b;

  }

  // getter/setter 方法

  public void setFirst(float x)  { first = x; }

  public float getFirst()  { return first; }

  public void setSecond(float x) { second = x; }

  public float getSecond()  { return second; }

  // 标准方法

  public String toString()

  {

  return "[" + first + "," + second + "]";

  }

  }

  ```


  比较每个类的代码，你会发现它们几乎相同；唯一实质性的区别是存储的数据类型。在软件开发中，减少冗余代码量是非常可取的。理想情况下，应该有一种方法可以编写一个类，在创建对象时指定结构（例如存储的数据量以及用于访问或修改它的方法）和要存储的数据类型，就像数组一样。事实上，Java
  确实具有这样的能力。这是通过泛型编程实现的。


  在泛型编程中，你可以像往常一样编写一个类，但在声明字段或方法参数时，不指定具体类型，而是使用一个类型变量，传统上用单个大写字母（如 `T` 或 `K`）表示。为了在类中指示类型变量的存在，类名后面必须跟有尖括号（`<`
  和 `>`）。例如，一个保留 `StringPair` 和 `FloatPair` 类结构的泛型类可以编写如下：



  ```java

  public class Pair

  {

  private T first;

  private T second;

  // 构造方法

  Pair(T a, T b)

  {

  first = a;

  second = b;

  }

  // getter/setter 方法

  public void setFirst(T s)  { first = s; }

  public T getFirst()  { return first; }

  public void setSecond(T s) { second = s; }

  public T getSecond()  { return second; }

  // 标准方法

  public String toString()

  {

  return "[" + first + "," + second + "]";

  }

  }

  ```


  然后，要创建一个可用于存储字符串的 `Pair` 实例，你可以这样写：


  ```

  Pair personName = new Pair("Kondas", "Kismet");

  ```


  类似地，你可以创建一个 `Pair` 来存储浮点数：


  ```

  Pair coordinates = new Pair( 42.9001f, 337.14f );

  ```


  请注意，在最后一个示例中，必须使用类名 `Float`（大写 `F`），而不是 `float`，因为 `float` 指的是原始数据类型，而 `Float` 指的是对应的类。同样，要存储一对整数值，必须使用
  `Pair<Integer>`，而不是 `Pair<int>`。


  `Animation` 类接受一个泛型类型参数，用于指定存储图像数据的类。你将使用 `TextureRegion` 类，因为它在渲染图像时提供了最多的选项。


  为了支持本节中将编写的与动画相关的方法，请将以下 `import` 语句添加到 `BaseActor` 类中：


  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.utils.Array;

  import com.badlogic.gdx.graphics.Color;

  import com.badlogic.gdx.graphics.Texture;

  import com.badlogic.gdx.graphics.Texture.TextureFilter;

  import com.badlogic.gdx.graphics.g2d.TextureRegion;

  import com.badlogic.gdx.graphics.g2d.Animation;

  import com.badlogic.gdx.graphics.g2d.Animation.PlayMode;

  import com.badlogic.gdx.graphics.g2d.Batch;

  ```


  为了存储动画及相关数据，请在 `BaseActor` 类的开头添加以下字段：


  ```

  private Animation animation;

  private float elapsedTime;

  private boolean animationPaused;

  ```


  为了初始化这些变量，请在 `constructor` 方法的末尾添加以下代码：


  ```

  animation = null;

  elapsedTime = 0;

  animationPaused = false;

  ```


  接下来，你将设置一些方法来为这些变量赋值。第一个方法用于设置动画。一旦设置了动画，就可以设置 Actor 的大小（宽度和高度）以及原点（actor 旋转的中心点，通常是
  actor 的中心）。actor 的宽度和高度将被设置为动画第一张图像的宽度和高度（动画的图像也称为关键帧）。这通过以下方法实现：


  ```

  public void setAnimation(Animation anim)

  {

  animation = anim;

  TextureRegion tr = animation.getKeyFrame(0);

  float w = tr.getRegionWidth();

  float h = tr.getRegionHeight();

  setSize( w, h );

  setOrigin( w/2, h/2 );

  }

  ```


  更改 `animationPaused` 的值通过以下方法实现：


  ```

  public void setAnimationPaused(boolean pause)

  {

  animationPaused = pause;

  }

  ```


  变量 `elapsedTime` 用于跟踪动画已播放的时间，从而确定应显示哪一帧图像，该变量无需直接设置。相反，这个值应该自动更新；正确的更新位置是 `Actor`
  类的 `act` 方法，该方法由 actor 所属的舞台自动调用。只要游戏当前未暂停（由 `animationPaused` 指示），经过的时间就需要增加自上次游戏循环迭代以来经过的时间量（由
  `dt` 表示）。


  ```

  public void act(float dt)

  {

  super.act( dt );

  if (!animationPaused)

  elapsedTime += dt;

  }

  ```


  你还需要重写 `Actor` 类的 `draw` 方法。具体来说，你将确定要绘制的动画的正确图像（再次使用 `getKeyFrame` 方法和 `elapsedTime`
  变量），并考虑 `Actor` 类中存储的各种属性（包括位置、大小、缩放、旋转和原点）来绘制它。你还可以通过设置 actor 存储的颜色来为图像着色（默认颜色为白色；使用白色着色对图像外观没有影响）。


  ```

  public void draw(Batch batch, float parentAlpha)

  {

  super.draw( batch, parentAlpha );

  // 应用颜色着色效果

  Color c = getColor();

  batch.setColor(c.r, c.g, c.b, c.a);

  if ( animation != null && isVisible() )

  batch.draw( animation.getKeyFrame(elapsedTime),

  getX(), getY(), getOriginX(), getOriginY(),

  getWidth(), getHeight(), getScaleX(), getScaleY(), getRotation() );

  }

  ```


  下一个任务是编写加载图像数据并使用它创建 `Animation` 对象的代码。动画图像有两种存储方式。它们可以存储为多个文件（每个文件一个动画帧）；海星收集者游戏中的海龟就是这种情况，其图像位于
  `turtle-1.png` 到 `turtle-6.png` 文件中，如图 3-2 所示。


  ![A352797_2_En_3_Fig2_HTML.jpg](img/A352797_2_En_3_Fig2_HTML.jpg)


  图 3-2.


  用于海龟动画的六个图像文件


  或者，图像可以合并到单个图像中——排列成矩形网格——并存储为单个文件，称为精灵表。海龟收集海星时显示的漩涡效果就是这种情况，如图 3-3 所示，其中包含一个包含十个子图像的单个图像文件，这些子图像排列成网格（两行五列）。


  ![A352797_2_En_3_Fig3_HTML.jpg](img/A352797_2_En_3_Fig3_HTML.jpg)


  图 3-3.


  包含漩涡动画帧的单个图像文件


  为了处理这两种可能性，将有两种从图像文件创建动画的代码变体。此外，由于代码具有高度可重用性，它将作为 `BaseActor` 类中的一对方法编写。


  回想一下，`Animation` 对象所需的数据包括图像数组、每帧显示的持续时间以及指示帧应如何播放的值。如果图像存储在单独的文件中，你将使用字符串数组指定文件名；如果图像存储在精灵表中，你将指定文件名以及网格中的行数和列数。为简单起见，你将假设动画帧要么从头到尾播放一次（由常量值
  `PlayMode.NORMAL` 指示），要么无限循环重复（由 `PlayMode.LOOP` 指示）；这可以通过一个布尔变量来指定，该变量指示动画是否循环。


  接下来提供了一个从单独图像文件创建动画的方法。请注意，如果尚未设置动画（由 `animation` 的值为 `null` 指示），此方法也会设置 actor 的动画。此方法还会返回创建的动画，以防
  actor 需要多个动画（在这种情况下，应创建 `BaseActor` 类的扩展，并将额外的动画存储在额外的变量中）。


  ```

  public Animation loadAnimationFromFiles(String[] fileNames,

  float frameDuration, boolean loop)

  {

  int fileCount = fileNames.length;

  Array textureArray = new Array();

  for (int n = 0; n  anim = new Animation(frameDuration, textureArray);

  if (loop)

  anim.setPlayMode(Animation.PlayMode.LOOP);

  else

  anim.setPlayMode(Animation.PlayMode.NORMAL);

  if (animation == null)

  setAnimation(anim);

  return anim;

  }

  ```



  接下来是一种从精灵表中创建动画的类似方法。方便的是，`TextureRegion` 类有一个名为 `split` 的方法，可用于将图像分割成子图像集合。使用此方法需要知道每个子图像的大小，以下代码根据原始图像的大小以及精灵表中行和列的数量来计算该大小。


  ```

  public Animation loadAnimationFromSheet(String fileName, int rows, int cols,

  float frameDuration, boolean loop)

  {

  Texture texture = new Texture(Gdx.files.internal(fileName), true);

  texture.setFilter(TextureFilter.Linear, TextureFilter.Linear);

  int frameWidth = texture.getWidth() / cols;

  int frameHeight = texture.getHeight() / rows;

  TextureRegion[][] temp = TextureRegion.split(texture, frameWidth, frameHeight);

  Array textureArray = new Array();

  for (int r = 0; r  anim = new Animation(frameDuration, textureArray);

  if (loop)

  anim.setPlayMode(Animation.PlayMode.LOOP);

  else

  anim.setPlayMode(Animation.PlayMode.NORMAL);

  if (animation == null)

  setAnimation(anim);

  return anim ;

  }

  ```


  某些游戏对象可能由单个图像表示，不需要动画。但为了保持一致性，你可以使用单帧动画来显示静态图像；在这种情况下，帧持续时间和播放样式无关紧要。为方便起见，以下方法将用于这种情况。


  ```

  public Animation loadTexture(String fileName)

  {

  String[] fileNames = new String[1];

  fileNames[0] = fileName;

  return loadAnimationFromFiles(fileNames, 1, true);

  }

  ```


  此时你应包含的另一个方法将用于检查动画是否结束，如果动画未循环且经过的时间大于显示动画中所有图像所需的时间（帧数乘以每帧的显示时间），则返回 true。这是使用
  `Animation` 类的方法 `isAnimationFinished` 计算的；你的方法只需在变量 `animation` 上调用此方法，并自动提供值 `elapsedTime`。


  ```

  public boolean isAnimationFinished()

  {

  return animation.isAnimationFinished(elapsedTime);

  }

  ```


  至此，你已经准备好重新创建《海星收集者》游戏的一部分。首先，你将创建一些扩展 `BaseActor` 类的类：`Turtle`、`Starfish` 和 `Whirlpool`。这些类至少需要一个构造函数，该构造函数会将初始位置和舞台的数据传递给
  `BaseActor` 类的构造函数。在扩展类中，你还可以在 `constructor` 方法中设置所使用的纹理或动画。


  首先是 `Turtle` 类的代码，它使用来自多个文件的图像实现动画：


  ```

  import com.badlogic.gdx.scenes.scene2d.Stage;

  public class Turtle extends BaseActor

  {

  public Turtle(float x, float y, Stage s)

  {

  super(x,y,s);

  String[] filenames =

  {"assets/turtle-1.png", "assets/turtle-2.png", "assets/turtle-3.png",

  "assets/turtle-4.png", "assets/turtle-5.png", "assets/turtle-6.png"};

  loadAnimationFromFiles(filenames, 0.1f, true );

  }

  }

  ```


  接下来是 `Whirlpool` 类的代码，它使用基于精灵表的动画。由于此效果应在动画结束时消失，因此应包含一个 `act` 方法，该方法检查动画是否播放完毕，如果是，则调用
  `remove` 方法将其从舞台（以及游戏中）移除。


  ```

  import com.badlogic.gdx.scenes.scene2d.Stage;

  public class Whirlpool extends BaseActor

  {

  public Whirlpool(float x, float y, Stage s)

  {

  super(x,y,s);

  loadAnimationFromSheet("assets/whirlpool.png", 2, 5, 0.1f, false);

  }

  public void act(float dt)

  {

  super.act(dt);

  if ( isAnimationFinished() )

  remove();

  }

  }

  ```


  接下来是 `Starfish` 类的代码。显示此对象仅使用单个图像，因此你将使用之前创建的便捷方法 `loadTexture`。你还会使用 `Action` 类添加一个基于值的动画（每**一**秒缓慢旋转
  30 度），以吸引玩家注意此对象。


  ```

  import com.badlogic.gdx.scenes.scene2d.Stage;

  import com.badlogic.gdx.scenes.scene2d.Action;

  import com.badlogic.gdx.scenes.scene2d.actions.Actions;

  public class Starfish extends BaseActor

  {

  public Starfish(float x, float y, Stage s)

  {

  super(x,y,s);

  loadTexture("assets/starfish.png");

  Action spin = Actions.rotateBy(30, 1);

  this.addAction( Actions.forever(spin) );

  }

  }

  ```


  现在游戏实体的类已经创建完毕，你可以将注意力转向游戏本身。此时，游戏将仅显示对象及其动画；交互性将在下一节中添加。


  首先，通过创建一个新类并从上一个项目复制代码，将上一章的 `GameBeta` 类添加到此项目中；你需要的代码如下：


  ```

  import com.badlogic.gdx.Game;

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.graphics.GL20;

  import com.badlogic.gdx.scenes.scene2d.Stage;

  public abstract class GameBeta extends Game

  {

  protected Stage mainStage;

  public void create()

  {

  mainStage = new Stage();

  initialize();

  }

  public abstract void initialize();

  public void render()

  {

  float dt = Gdx.graphics.getDeltaTime();

  mainStage.act(dt);

  update(dt);

  Gdx.gl.glClearColor(0,0,0,1);

  Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

  mainStage.draw();

  }

  public abstract void update (float dt);

  }

