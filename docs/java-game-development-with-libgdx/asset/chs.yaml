  ## 游戏项目：节奏敲击


  在本章剩余部分，你将创建一个名为“节奏敲击”的游戏，它属于节奏动作类电子游戏，这类游戏包括科乐美街机游戏《热舞革命》、索尼 PlayStation 游戏《啪啦啪啦啪》以及
  Umoni Studio 手机游戏《钢琴块》等经典作品。此类游戏要求玩家在精确的时机执行一系列动作（在本项目中为按下特定按键），且动作需与背景音乐同步。在《节奏敲击》中，玩家需要按下
  F、G、H、J 这四个按键，选择它们是因为它们位于键盘中央且水平相邻，便于玩家同时将不同手指分别置于各按键上方。如本章开头图 6-1 的游戏截图所示，屏幕底部有四个方块（我们称之为**目标框**），每个方块显示一个字母。与这些目标对齐的彩色方块（我们称之为**下落方块**）从屏幕上方生成并以恒定速度下落，通常会在歌曲节拍处与目标框重叠。玩家的目标是在下落方块与目标框完全重叠且居中的精确瞬间按下对应按键。每次按键时，系统会根据两个方块的重合程度给予相应分数（方块完全不重叠时得零分），同时屏幕上会短暂闪烁一条消息，告知玩家表现如何（消息包括“完美”、“很棒”、“不错”、“差一点”和“失误”）。


  用户界面将显示在屏幕顶部边缘。它包含一个“开始”按钮（点击后开始播放歌曲）、一个显示歌曲当前时间和结束时间的标签，以及一个显示玩家当前得分和该歌曲最高可能得分的标签。此外，整个游戏过程中将使用许多微妙的基于数值的动画效果，例如目标框上的轻微脉冲效果，以及按下对应按键时下落方块的淡出效果。在按下“开始”按钮到歌曲开始播放之间，还会有一个三秒倒计时阶段，让玩家有机会准备按键；此倒计时效果将伴随数字出现，并每隔一秒发出类似“哔”的音效。最后，歌曲结束后会显示“恭喜”消息。


  创建这款节奏游戏最困难的部分，是创建一个存储生成下落方块所需时序数据的文件：玩家应按下哪个按键，以及下落方块应与目标框重叠时的歌曲播放时间。因此，在开始游戏应用本身的工作之前，下一节将讨论如何在
  LibGDX 中处理文件、如何打开文件选择对话框（以简化文件选择过程）、存储时序数据的文件格式，以及一个可用于帮助你创建额外时序文件的应用。


  首先，在 BlueJ 中创建一个名为`Rhythm` `Tapper`的新项目。从本书网站下载此项目的文件，并将下载项目中的`assets`文件夹和`+libs`文件夹（如果不使用
  BlueJ 的`userlib`文件夹）复制到你的本地项目中。此外，在你的本地项目文件夹中，从下载项目中复制以下 Java 文件：`BaseGame.java`、`BaseScreen.java`和`BaseActor.java`。为了获得新的视觉风格，你将使用一个新的字体文件（`Kirsty.ttf`）；你可以在`BaseGame.java`文件中更改此字体参数。同时，将字体大小改为
  32。


  ## 处理文件


  Java 应用程序通常使用`File`类来提供对系统文件的访问。LibGDX 为此目的提供了一个替代类，名为`FileHandle`，它处理文件操作中特定于平台的细节，并提供了额外功能，用于：


  *   读取和写入文件；

  *   复制、移动和删除文件；

  *   列出文件和目录；以及

  *   检查文件和目录是否存在。


  你之前已经广泛使用过`FileHandle`对象，通常作为匿名实例作为参数传递给其他方法，使用`Gdx.files`的`internal`方法，例如以下示例：


  ```

  Texture tex = new Texture( Gdx.files.internal("assets/image.png") );

  ```


  `internal`方法假定文件路径相对于应用程序。另一个类似的方法名为`external`，它假定路径相对于应用程序运行所在硬件设备的根文件夹。或者，如果你已经有一个`File`对象，你可以直接使用其构造函数并将`File`对象作为参数来创建`FileHandle`类的实例。


  当使用标准 Java 库处理文本文件时，你可能会使用`Scanner`等类来读取文件内容，并使用`PrintWriter`来写入或追加到现有文件。在你将要构建的应用中，由于你要读取和写入的文件仅包含文本，你将改用`FileHandle`的`readString`和`writeString`方法。`readString`方法将文件的全部内容作为单个字符串返回，你可以使用`String`类的`split`方法，并指定换行符`"\n"`表示下一个数组元素，从而按行将其分割成字符串数组。例如，如果你想将一个名为`handle`的`FileHandle`对象分割成字符串数组，每行对应一个数组元素，你可以使用以下代码行：


  ```

  String[] fileData = handle.readString().split("\n");

  ```


  将字符串数据写入由`FileHandle`对象表示的文件同样简单直接。`writeString`方法接受两个参数：一个字符串（要写入的数据）和一个布尔值，该布尔值指示数据是应追加到文件中（值为`true`时），还是应用于覆盖文件中当前的所有数据（值为`false`时）。




  ### 浏览文件


  在下一小节中你将构建的应用程序里，如果能够通过标准的文件选择器窗口来选择要打开的音乐文件，或指定保存的文件名和位置，而不是直接在代码中输入路径和文件名（这样每次处理新文件时都需要修改代码），那么整个过程将得到简化。Java
  内置了创建此类窗口的功能，而 LibGDX 目前没有，因此你需要使用标准的 Java 类。有两种不同的 Java 框架可用于创建带有图形用户界面的应用程序：Swing
  和 JavaFX。在这两者中，Swing 存在时间更长、更为人所知，但它已不再被积极开发，且用 Swing 制作的应用程序看起来不够现代。在本节中，你将使用 JavaFX
  类。例如，图 6-3 展示了使用 Swing 和 JavaFX 框架保存文件时的标准对话框窗口。


  ![A352797_2_En_6_Fig3_HTML.jpg](img/A352797_2_En_6_Fig3_HTML.jpg)


  图 6-3.


  使用 Swing（左）和 JavaFX（右）框架创建的保存对话框窗口


  接下来，你将创建一个名为 `FileUtils` 的工具类，其中包含一些静态方法，用于简化这些窗口的创建，并将返回的 `File` 对象转换为可在 LibGDX
  中使用的 `FileHandle` 对象。将 JavaFX 类集成到并非完全基于 JavaFX 构建的应用程序中时，一个复杂之处在于，在使用特定的 JavaFX
  类本身之前，必须先初始化许多与框架相关的后台类。（这是常见情况；LibGDX 框架也必须在启动游戏程序之前初始化平台相关的对象，例如 `Gdx.files`、`Gdx.input`
  和 `Gdx.audio`。）有两种方法可以初始化在后台运行的 JavaFX 工具包：要么创建一个 JavaFX `Application` 对象（并运行其 `start`
  方法），要么创建一个 `JFXPanel` 对象。此外，JavaFX 应用程序在其自己的线程上运行：这是一个独立于 CPU 上其他进程运行的独立进程。（当你在电脑或智能手机上运行多个应用程序时，每个应用程序都在不同的线程上运行，所有这些线程都由
  CPU 管理和调度。）因此，JavaFX 类和代码不应在 LibGDX 应用程序运行的线程中执行，而应在 JavaFX 应用程序运行的线程中执行。这可以通过 JavaFX
  的 `Platform` 类来安排，该类可以通过其 `runLater` 方法安排代码在 JavaFX 线程中运行。为了完成这些任务，创建一个名为 `FileUtils`
  的新类，包含以下代码，代码清单之后将进行更详细的解释：


  ```

  import javafx.embed.swing.JFXPanel;

  import javafx.application.Platform;

  import javafx.stage.FileChooser;

  import java.io.File;

  import com.badlogic.gdx.files.FileHandle;

  public class FileUtils

  {

  private static boolean finished;

  private static FileHandle fileHandle;

  private static int openDialog = 1;

  private static int saveDialog = 2;

  public static FileHandle showOpenDialog()

  {

  return showDialog(openDialog);

  }

  public static FileHandle showSaveDialog()

  {

  return showDialog(saveDialog);

  }

  private static FileHandle showDialog(int dialogType)

  {

  new JFXPanel();

  finished = false;

  Platform.runLater(

  () ->

  {

  FileChooser fileChooser = new FileChooser();

  File file;

  if (dialogType == openDialog)

  file = fileChooser.showOpenDialog(null);

  else // dialogType == saveDialog

  file = fileChooser.showSaveDialog(null);

  if (file != null)

  fileHandle = new FileHandle(file);

  else

  fileHandle = null;

  finished = true;

  }

  );

  while ( !finished )

  {

  // 等待 FileChooser 窗口关闭

  }

  return fileHandle;

  }

  }

  ```


  这个类的核心是 `showDialog` 方法，它首先初始化一个 `JFXPanel` 对象，目的仅仅是为了初始化 JavaFX 后台进程；没有使用变量来存储对这个对象的引用，因为你在任何时候都不需要使用它的任何方法。`Platform.runLater`
  方法接收一个 `Runnable` 对象（此处以 lambda 表达式形式编写），其中包含要在 JavaFX 进程线程上运行的代码。这段代码打开一个 `FileChooser`
  窗口，获取一个 `File` 对象，并进而用它来初始化一个 `FileHandle` 对象。然而，需要小心处理：由于这段代码在单独的线程上运行，CPU 可能会在
  JavaFX 代码执行完毕之前返回到 LibGDX 线程并尝试完成 `showDialog` 方法的执行。这就是使用布尔变量 `finished` 的原因：它由
  `showDialog` 方法初始化为 `false`，并且仅在 JavaFX 代码运行完成后才被设置为 `true`。`showDialog` 方法中的 `while`
  循环会阻止该方法继续执行，直到文件选择器窗口关闭。因此，如果用户在文件选择器窗口仍打开时尝试返回 LibGDX 应用程序窗口，LibGDX 窗口的标题栏可能会显示“未响应”，但在选择文件后应用程序将恢复正常。该类中的另外两个方法
  `showOpenDialog` 和 `showSaveDialog` 用于控制 `showDialog` 方法打开哪种类型的文件选择器。


  准备好这个类之后，你就可以将注意力转向用于存储 Rhythm Tapper 游戏中下落方块计时信息的数据结构，以及你将创建的用于记录这些数据以便在游戏中使用的应用程序了。




  ### 录制歌曲数据


  在制作节奏动作游戏时，最困难的部分之一就是确定在音乐播放过程中，哪些按键应该在何时被按下。为了完成这个任务，你将采用一种简单的方法：在音乐播放时录制按键操作。（虽然存在更精确的方法，但这超出了本书的讨论范围。）这种方法的主要缺点是，你必须能够精确地执行按键序列，因为玩家的表现将根据其与你创建的录制内容的匹配程度来评判。


  你将使用一个简单的文本文件来存储这些数据；第一步是确定需要存储哪些数据。基于这些信息，将创建一个类来存储数据，并编写相关方法将数据写入文件以及从文件读取数据。应用程序所需的信息包括：


  *   音乐文件的名称；

  *   音乐文件的时长（将显示在节奏游戏的用户界面中）；

  *   一个键盘按键列表及其对应的按下时间；以及

  *   一个用于跟踪列表当前位置的变量（用于节奏游戏中歌曲播放时）。


  由于按键和时间应成对存储，你的数据结构还将包含一个内部类（在类内部定义的类）来存储这些配对。首先，使用以下代码创建一个名为 `SongData` 的新类。请注意，内部类名为
  `KeyTimePair`，而 `SongData` 类存储了一个包含这些对象的 `ArrayList`。此处将 `KeyTimePair` 声明为内部类，是因为它仅在此类内部使用。


  ```

  import java.util.ArrayList;

  import com.badlogic.gdx.files.FileHandle;

  public class SongData

  {

  private String songName;

  private float songDuration;

  private ArrayList keyTimeList;

  private int keyTimeIndex;

  public class KeyTimePair

  {

  private String key;

  private Float time;

  public KeyTimePair(String k, Float t)

  {

  key = k;

  time = t;

  }

  public String getKey()

  {  return key;  }

  public Float getTime()

  {  return time;  }

  }

  public SongData()

  {

  keyTimeList = new ArrayList();

  }

  }

  ```


  接下来，你需要为 `songName` 和 `songDuration` 变量添加一些标准的 set 和 get 方法。因此，请将以下方法添加到 `SongData`
  类中：


  ```

  public void setSongName(String s)

  {  songName = s;  }

  public String getSongName()

  {  return songName;  }

  public void setSongDuration(float f)

  {  songDuration = f;  }

  public float getSongDuration()

  {  return songDuration;  }

  ```


  接下来，你需要一些方法来创建按键-时间对并将其添加到 `SongData` 类存储的列表中，操作索引列表当前位置的变量，从列表中检索配对，以及判断索引变量是否已到达列表末尾。为了完成这些任务，请将以下方法添加到
  `SongData` 类中：


  ```

  public void addKeyTime(String k, Float t)

  {  keyTimeList.add( new KeyTimePair(k,t) );  }

  public void resetIndex()

  {  keyTimeIndex = 0;  }

  public void advanceIndex()

  {  keyTimeIndex++;  }

  public KeyTimePair getCurrentKeyTime()

  {  return keyTimeList.get(keyTimeIndex);  }

  public int keyTimeCount()

  {  return keyTimeList.size();  }

  public boolean isFinished()

  {  return keyTimeIndex >= keyTimeCount();  }

  ```


  最后，你需要一对方法，用于将这些数据写入文本文件以及从文本文件读取这些数据。文本文件的第一行将存储音乐文件名，第二行将存储时长，其余每一行将存储一个按键-时间数据对，并用逗号分隔。当将文件作为字符串读回时，数值数据将通过
  `Float` 类的 `parseFloat` 方法转换为浮点数。将这些方法添加到 `SongData` 类中：


  ```

  public void writeToFile(FileHandle file)

  {

  file.writeString( getSongName() + "\n", false );

  file.writeString( getSongDuration() + "\n", true );

  for ( KeyTimePair ktp : keyTimeList )

  {

  String data = ktp.getKey() + "," + ktp.getTime() + "\n";

  file.writeString( data, true );

  }

  }

  public void readFromFile(FileHandle file)

  {

  String rawData = file.readString();

  String[] dataArray = rawData.split("\n");

  setSongName( dataArray[0] );

  setSongDuration( Float.parseFloat(dataArray[1]) );

  keyTimeList.clear();

  for (int i = 2; i < dataArray.length; i++)

  {

  String[] keyTimeData = dataArray[i].split(",");

  String key = keyTimeData[0];

  Float time = Float.parseFloat( keyTimeData[1] );

  keyTimeList.add( new KeyTimePair( key, time ) );

  }

  }

  ```


  现在，你可以创建应用程序来录制按键的顺序和时间了。（或者，如果你对生成自己的歌曲数据文件不感兴趣，只想使用提供的示例文件[位于 `assets` 文件夹中，名为
  `FunkyJunky.key`]，则可以跳过本节剩余部分，直接进入下一节。）你将创建的实用程序应用程序将仅包含三个按钮：一个用于选择要播放的音乐文件，一个用于开始录制过程，一个用于创建（或选择）一个文件来保存录制的歌曲数据。这个简单的应用程序如图
  6-4 所示。


  ![A352797_2_En_6_Fig4_HTML.jpg](img/A352797_2_En_6_Fig4_HTML.jpg)


  图 6-4.


  按键录制应用程序的截图


  创建一个名为 `RecorderScreen` 的新类，代码如下：


  ```

  import com.badlogic.gdx.Gdx;

  import com.badlogic.gdx.Input.Keys;

  import com.badlogic.gdx.scenes.scene2d.ui.TextButton;

  import com.badlogic.gdx.scenes.scene2d.Event;

  import com.badlogic.gdx.files.FileHandle;

  import com.badlogic.gdx.audio.Music;

  public class RecorderScreen extends BaseScreen

  {

  Music music;

  SongData songData;

  float lastSongPosition;

  boolean recording;

  TextButton loadButton;

  TextButton recordButton;

  TextButton saveButton;

  public void initialize()

  {

  recording = false;

  loadButton = new TextButton( "加载音乐文件", BaseGame.textButtonStyle );

  loadButton.addListener(

  (Event e) ->

  {

  if ( !isTouchDownEvent(e) )

  return false;

  FileHandle musicFile = FileUtils.showOpenDialog();

  if ( musicFile != null )

  {

  music = Gdx.audio.newMusic(musicFile);

  songData = new SongData();

  songData.setSongName( musicFile.name() );

  }

  return true;

  }

  );

  recordButton = new TextButton( "录制按键", BaseGame.textButtonStyle );

  recordButton.addListener(

  (Event e) ->

  {

  if ( !isTouchDownEvent(e) )

  return false;

  if ( !recording )

  {

  music.play();

  recording = true;

  lastSongPosition = 0;

  }

  return true;

  }

  );

  saveButton = new TextButton( "保存按键文件", BaseGame.textButtonStyle );

  saveButton.addListener(

  (Event e) ->

  {

  if ( !isTouchDownEvent(e) )

  return false;

  FileHandle textFile = FileUtils.showSaveDialog();

  if ( textFile != null )

  songData.writeToFile(textFile);

  return true;

  }

  );

  uiTable.add(loadButton);

  uiTable.row();

  uiTable.add(recordButton);

  uiTable.row();

  uiTable.add(saveButton);

  }

  public void update(float dt)

  {

  if ( recording )

  {

  if ( music.isPlaying() )

  lastSongPosition = music.getPosition();

  else // 歌曲刚播放完毕

  {

  recording = false;

  songData.setSongDuration( lastSongPosition );

  }

  }

  }

  public boolean keyDown(int keycode)

  {

  if ( recording )

  {

  String key = Keys.toString(keycode);

  Float time = music.getPosition();

  songData.addKeyTime(key, time);

  }

  return false;

  }

  }

  ```




  布尔变量 `recording` 将用于跟踪按键数据是否仍应添加到 `SongData` 对象中。令人有些意外的是，使用 Java 很难确定音乐文件的长度，因此
  `lastSongPosition` 变量用于在歌曲播放时跟踪歌曲位置，一旦歌曲播放完毕，`lastSongPosition` 的值就会被写入 `SongData`
  对象，作为歌曲的时长。正如预期的那样，`loadButton` 和 `saveButton` 对象使用了你之前编写的 `FileUtils` 类提供的方法。


  要运行此应用程序，你还需要两个类，和往常一样：一个继承 `BaseGame` 类的类，以及一个 `launcher` 类。为此，首先创建一个名为 `RecorderGame`
  的新类，代码如下：


  ```

  public class RecorderGame extends BaseGame

  {

  public void create()

  {

  super.create();

  setActiveScreen( new RecorderScreen() );

  }

  }

  ```


  接下来，对于 `launcher` 类，创建一个名为 `RecorderLauncher` 的新类，代码如下：


  ```

  import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

  public class RecorderLauncher

  {

  public static void main (String[] args)

  {

  BaseGame myGame = new RecorderGame();

  LwjglApplication launcher = new LwjglApplication( myGame, "Recorder", 800, 600 );

  }

  }

  ```


  要使用此类，请运行 `RecorderLauncher` 的 `main` 方法，然后点击标有“Load Music File”的按钮并选择一首歌曲。`assets`
  文件夹中包含一个示例 MP3 文件，名为 `FunkyJunky.mp3`，由来自 `audionautix.com` 的 Jason Shaw 创建，² 但如果你愿意，也可以随意使用自己的音乐文件。然后，将手指放在
  F、G、H 和 J 键上，点击标有“Record Keystrokes”的按钮。音乐将立即开始播放，此时你需要根据所选音乐的节拍及时按下按键。这可能是整个过程中最困难的部分，因为它要求你熟悉音乐并具备精确的节奏感。歌曲播放完毕后，点击标有“Save
  Keystroke File”的按钮，在出现的文件选择窗口中，选择一个位置并输入文件名以保存文件。你可以为此文件输入任意扩展名。`assets` 文件夹中有一个名为
  `FunkyJunky.key` 的示例文件，你可以在后续的游戏应用程序中使用它；你可能希望为你的数据文件选择一个不同的文件名。完成后，请确保音乐文件和数据文件都位于项目的
  `assets` 文件夹中，以便你接下来开发的游戏应用程序能够轻松访问。


  ## 游戏应用程序


  现在你已经有了一个与音乐文件配套的歌曲数据文件，接下来将专注于创建游戏应用程序。为了高效地编写此游戏，你将使用多个列表，这些列表将存储玩家可能按下的不同按键、屏幕底部附近出现的四个目标框，以及每个目标框上方的一列下落方块（而这些下落方块列表本身将存储在一个列表中）。


  在开始游戏本身之前，你将为目标框和下落方块设置类。首先，创建一个名为 `TargetBox` 的新类，代码如下。请注意，构造函数还需要一个字符串（将显示在方块上的字母）和一个颜色（将由显示字母的标签使用）。


  ```

  import com.badlogic.gdx.scenes.scene2d.Stage;

  import com.badlogic.gdx.graphics.Color;

  import com.badlogic.gdx.scenes.scene2d.ui.Label;

  import com.badlogic.gdx.utils.Align;

  public class TargetBox extends BaseActor

