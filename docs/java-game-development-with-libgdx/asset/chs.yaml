  paddle = new Paddle(320, 32, mainStage);\n```\n\n然后，在 `update` 方法中添加以下代码，这将使挡板在水平方向上与鼠标对齐（通过调整其\
  \ x 坐标），同时确保挡板完全显示在屏幕上。（如果鼠标移出屏幕，此代码将不起作用。）\n\n```\nfloat mouseX = Gdx.input.getX();\n\
  paddle.setX( mouseX - paddle.getWidth()/2 );\npaddle.boundToWorld();\n```\n\n此时是测试游戏的好时机（通过运行\
  \ `Launcher` 类中的 `main` 方法）；你应该能够通过移动鼠标来控制挡板的位置；此时，你的游戏应如图 8-2 所示。\n\n![A352797_2_En_8_Fig2_HTML.jpg](img/A352797_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2.\n\n添加了背景图像和挡板的游戏\n\n### 墙壁\n\n接下来，你需要为墙壁对象创建一个类。墙壁将沿着屏幕的左、右和上边缘放置，球会从它们上面弹开。由于墙壁可能有不同的大小，`Wall`\
