    ## Collectibles and Obstacles


    Next, you will add an objective and an obstacle to the Plane Dodger game. The
    first addition will be collectible stars that spawn regularly past the right side
    of the screen, then move to the left side; if the player collects a star (by colliding
    with it), they earn a point.


    The second addition will be enemy planes , which spawn in a similar fashion. If
    the player’s plane dodges (does not collide with) an enemy plane, they earn a
    point. If the player does collide with an enemy plane, then the game is over,
    and a message to that effect will appear on the screen. Additional variables will
    be used to set the speed and spawn frequency of the enemy planes, and their values
    will be slowly changed over time to gradually increase the difficulty level of
    the game. The score will be simply displayed as a number in the top-center of
    the screen, as illustrated in Figure [7-1](#A352797_2_En_7_Chapter.html#Fig1).


    ### Stars


    The first addition to this project will be the star object. Create a class called
    `Star` that contains the following code. Since there is no image-based animation
    for the star, a value-based animation—a pulsing effect—is applied in the constructor
    for this object. Also note that in the `act` method, the star is removed from
    the game if it passes completely beyond the left edge of the screen; this is to
    reduce the amount of memory used by the game, which improves performance (the
    display rate might be less than 60 frames per second if there were hundreds of
    extra stars floating around off-screen).


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Star extends BaseActor

    {

    public Star(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/star.png");

    Action pulse = Actions.sequence(

    Actions.scaleTo(1.2f,1.2f, 0.5f),

    Actions.scaleTo(1.0f,1.0f, 0.5f) );

    addAction( Actions.forever(pulse) );

    setSpeed(100);

    setMotionAngle(180);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    // remove after moving past left edge of screen

    if ( getX() + getWidth() < 0 )

    remove();

    }

    }

    ```


    Next, you need to set up the spawning mechanic in the code for the game itself.
    This will require the use of a `float` variable (called `starTimer`) to keep track
    of the amount of time that has passed since the previous star was created. For
    readability, there will be a variable (called `starSpawnInterval`) that stores
    how frequently the stars will appear; the value of this variable will not change
    during the course of the game. At the same time, a variable needs to be created
    to store the player’s score, and a label needs to be added to display the score.
    To implement these features, in the `LevelScreen` class , begin by adding the
    following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    import com.badlogic.gdx.math.MathUtils;

    ```


    Next, add the following variable declarations to the class:


    ```

    float starTimer;

    float starSpawnInterval;

    int score;

    Label scoreLabel;

    ```


    Next, to initialize these variables (and in the case of the label, position it
    on the user interface), in the `initialize` method, add the following code:


    ```

    starTimer = 0;

    starSpawnInterval = 4;

    score = 0;

    scoreLabel = new Label( Integer.toString(score), BaseGame.labelStyle );

    uiTable.pad(10);

    uiTable.add(scoreLabel);

    uiTable.row();

    uiTable.add().expandY();

    ```


    Next, in the `update` method, you need to spawn the stars regularly as discussed
    (and reset the value of `starTimer` after each new star is created) and check
    for collisions between the player’s plane and the star objects (updating the score
    and label if that occurs). To accomplish these tasks, in the `update` method,
    add the following code:


    ```

    starTimer += dt;

    if (starTimer > starSpawnInterval)

    {

    new Star( 800, MathUtils.random(100,500), mainStage );

    starTimer = 0;

    }

    for (BaseActor star : BaseActor.getList(mainStage, "Star"))

    {

    if (plane.overlaps(star))

    {

    star.remove();

    score++;

    scoreLabel.setText( Integer.toString(score) );

    }

    }

    ```


    This is another excellent point at which to test your game . Collect stars and
    watch your score increase! However, the player would quickly lose interest without
    any obstacles to provide a challenge, which you will add next.'
