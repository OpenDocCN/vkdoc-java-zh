  raw: 'Next is a similar method for creating an animation from a spritesheet . Conveniently,
    the `TextureRegion` class has a method named `split` that can be used to break
    up an image into a collection of sub-images. Using this method requires knowing
    the size of each sub-image, which is calculated in the following code based on
    the size of the original image and the number of rows and columns present in the
    spritesheet.


    ```

    public Animation loadAnimationFromSheet(String fileName, int rows, int cols,

    float frameDuration, boolean loop)

    {

    Texture texture = new Texture(Gdx.files.internal(fileName), true);

    texture.setFilter(TextureFilter.Linear, TextureFilter.Linear);

    int frameWidth = texture.getWidth() / cols;

    int frameHeight = texture.getHeight() / rows;

    TextureRegion[][] temp = TextureRegion.split(texture, frameWidth, frameHeight);

    Array textureArray = new Array();

    for (int r = 0; r  anim = new Animation(frameDuration, textureArray);

    if (loop)

    anim.setPlayMode(Animation.PlayMode.LOOP);

    else

    anim.setPlayMode(Animation.PlayMode.NORMAL);

    if (animation == null)

    setAnimation(anim);

    return anim ;

    }

    ```


    Some game objects may be represented by a single image and do not require an animation.
    For consistency, however, you can display a still image using a one-frame animation;
    the frame duration and playback style do not matter in this case. For convenience,
    the following method will be used for this situation.


    ```

    public Animation loadTexture(String fileName)

    {

    String[] fileNames = new String[1];

    fileNames[0] = fileName;

    return loadAnimationFromFiles(fileNames, 1, true);

    }

    ```


    One more method you should include at this time will be used to check if the animation
    is finished, which is true if the animation is not looping and the elapsed time
    is greater than the time required to display all the images in the animation (the
    number of frames multiplied by the display time for each frame). This is calculated
    using the `Animation` class method `isAnimationFinished`; your method simply calls
    this method on the variable `animation` and automatically supplies the value `elapsedTime`.


    ```

    public boolean isAnimationFinished()

    {

    return animation.isAnimationFinished(elapsedTime);

    }

    ```


