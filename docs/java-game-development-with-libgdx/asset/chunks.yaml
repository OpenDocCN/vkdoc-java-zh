- fmt: '接下来，你将根据精灵表创建一个图块集。窗口右下角的面板显示图块集。在该区域底部的图标行中，点击第一个图标（看起来像一个带有发光星星的矩形），将出现一个名为“新建图块集”的窗口。点击标有“浏览”的按钮，并从`assets`目录中选择`ocean-plants.png`图像。然后，将图块宽度和图块高度值都改为`64
    px`，因为精灵表中的每个单独图像都是这么大。最后，勾选“嵌入到地图”旁边的复选框；这一点非常重要，因为`LibGDX`目前只能处理单个`tmx`文件。标有“另存为...”的按钮将变为“确定”；窗口将如图[10-7](#A352797_2_En_10_Chapter.html#Fig7)左侧所示。点击“确定”按钮，图块集将出现在`Tiled`窗口的右下角区域，如图[10-7](#A352797_2_En_10_Chapter.html#Fig7)右侧所示。


    ![A352797_2_En_10_Fig7_HTML.jpg](A352797_2_En_10_Fig7_HTML.jpg)


    图 10-7. “新建图块集”窗口的设置（左）及生成的图块集（右）


    接下来，你将设置图块层。在“图层”面板中，选择“Tile Layer 1”；它应显示为蓝色高亮。窗口顶部有一组图标；点击看起来像墨水印章的图标（或按下`B`键）。这将激活“图章刷”工具。在图块集面板中，点击其中一个植物；它应显示为蓝色矩形高亮。然后，将鼠标移动到中央区域，你会看到一个半透明的图像副本，对齐到鼠标下方最近的网格位置。点击鼠标按钮将放置（或“盖章”）该图像的一个副本。根据需要重复此过程，在屏幕周围创建各种植物图像的更多实例；这为关卡增添了多样性和视觉趣味。如果你想从地图中移除一个图块图像，请从顶部图标组中选择“橡皮擦”工具（或按下`E`键），然后点击你想要移除的图像。由于这些图块占据多个网格方块，你需要点击包含要移除图像的最左下角的网格方块。完成后，你的图片可能类似于图[10-8](#A352797_2_En_10_Chapter.html#Fig8)，尽管植物的排列方式可能不同。


    ![A352797_2_En_10_Fig8_HTML.jpg](A352797_2_En_10_Fig8_HTML.jpg)


    图 10-8. 添加了海洋植物图块集的 Starfish Collector 瓦片地图


    最后，你将向此关卡添加一些对象数据，这些数据将用于创建`Rock`、`Starfish`和`Sign`类的实例。第一步是创建一些额外的图块集来表示每种类型的对象，尽管每个图块集只包含单个图像。你将遵循与之前相同的过程：首先，在图块集面板（窗口右下角）中，点击图标以创建一个新的图块集。在出现的“新建图块集”窗口中，点击“浏览”，从`assets`目录中选择`starfish.png`图像，将图块宽度和图块高度值都改为`64
    px`，勾选“嵌入到地图”复选框，然后点击“确定”按钮。对`rock.png`图像重复此过程，再对`sign.png`图像重复一次。完成后，不同图块集的名称（`ocean-plants`、`starfish`、`rock`、`sign`）将出现在图块集面板顶部的选项卡中，然后你可以通过点击选项卡在这些图块集之间切换。


    接下来，你将向这些新图块集添加一些自定义属性。具体来说，你需要存储将为这些对象实例化的 Java 类的名称，以及所需的任何附加数据（对于标志牌，则是要显示的消息）。首先，点击`starfish`图块集的选项卡。在图块集面板底部的图标行中，点击看起来像矩形上的扳手的图标（将鼠标悬停在此图标上会显示工具提示“编辑图块集”）。然后，在主窗口中，会出现一个新选项卡，其中央区域显示该图块集（海星的图像）。新选项卡应包含文本`map.tmx#starfish`，这表明你正在编辑嵌入在瓦片地图文件`map.tmx`中的`starfish`图块集。点击海星的图像，左侧的“属性”面板将如图[10-9](#A352797_2_En_10_Chapter.html#Fig9)所示。


    ![A352797_2_En_10_Fig9_HTML.jpg](A352797_2_En_10_Fig9_HTML.jpg)


    图 10-9. 图块集编辑器


    在“属性”面板的底部，有一个用于显示自定义属性的区域，目前是空的。你将在此处输入游戏所需的自定义数据。点击“属性”面板底部的加号图标以添加新属性。在出现的小窗口中，输入`name`，然后点击“确定”按钮。自定义属性区域将出现一个新行，在值列的文本字段中，输入`Starfish`。这就是你需要为此对象输入的所有数据，因为`Starfish`类不需要其他任何东西。点击窗口顶部标有`map.tmx`的选项卡以返回瓦片地图。


    然后，在图块集面板中，选择`rock`图块集，并点击编辑图块集的图标。将出现一个新选项卡，标有`map.tmx#rock`。在此处，点击岩石的图像，然后在“属性”面板中，点击加号图标创建一个名为`Name`的新自定义属性，但这次输入`Rock`作为值。返回瓦片地图，并像之前一样继续操作，编辑`sign`图块集并创建一个名为`Name`、值为`Sign`的自定义属性。然而，在返回瓦片地图之前，你需要创建第二个自定义属性，用于存储标志牌要显示的文本。此属性应命名为`message`，并应包含值`Hello,
    world!`（这是此属性的默认值，稍后在地图上放置此图块的实例时会更改）。完成后，点击选项卡返回瓦片地图。'
  raw: 'Next, you are going to create a tileset from a spritesheet. The panel in the
    lower-right region of the window displays tilesets. In the row of icons along
    the bottom of this area, click on the first icon (which looks like a rectangle
    with a glowing star), and a window titled New Tileset will appear. Click on the
    button labeled Browse and select the image `ocean-plants.png` from the `assets`
    directory. Then, change both the tile width and tile height values to 64 px, since
    the individual images within the spritesheet are each that large. Finally, check
    the box next to the words “Embed in map”; this is very important, since LibGDX
    currently only has the functionality to process a single tmx file. The button
    labeled Save As . . . will then change to OK; the window will appear as shown
    on the left side of Figure [10-7](#A352797_2_En_10_Chapter.html#Fig7). Click the
    OK button, and the tileset will appear in the lower-right region of the Tiled
    window, as shown on the right side of Figure [10-7](#A352797_2_En_10_Chapter.html#Fig7).


    ![A352797_2_En_10_Fig7_HTML.jpg](A352797_2_En_10_Fig7_HTML.jpg)


    Figure 10-7.


    Settings for the New Tileset window (left), and the resulting tileset (right)


    Next, you will set up the tile layer. In the Layers panel, select Tile Layer 1
    ; it should appear highlighted in blue. Across the top of the window are a set
    of icons; click on the icon that looks like an ink stamp (or press the `B` key).
    This activates the Stamp Brush tool . In the Tileset panel, click on one of the
    plants; it should appear highlighted in a blue rectangle. Then, move your mouse
    to the central area, and you will see a translucent copy of the image aligned
    to the nearest grid location underneath your mouse. Clicking the mouse button
    will place (or “stamp”) a copy of the image at that location. Repeat this process
    as often as you like to create additional instances of various plant images around
    the screen; this adds variety and visual interest to the level. If you wish to
    remove a tile image from the map, select the Eraser tool from the set of icons
    across the top (or press the `E` key) and click on the image you wish to remove.
    Since these tiles occupy multiple grid squares, you need to click on the lower-left
    grid square containing the image you wish to remove. When you are finished, your
    picture may appear similar to Figure [10-8](#A352797_2_En_10_Chapter.html#Fig8),
    although with a different arrangement of plants.


    ![A352797_2_En_10_Fig8_HTML.jpg](A352797_2_En_10_Fig8_HTML.jpg)


    Figure 10-8.


    The Starfish Collector tilemap with additions from the ocean plant tileset


    Finally, you will add some object data to this level that will be used to create
    instances of the `Rock`, `Starfish`, and `Sign` classes. The first step is to
    create some additional tilesets to represent each type of object, although each
    of these will consist only of a single image. You will follow the same process
    as before: to begin, in the Tileset panel (in the lower-right region of the window),
    click on the icon to create a new tileset . In the New Tileset window that appears,
    click Browse, select the image `starfish.png` from the `assets` directory, change
    both the tile width and tile height values to 64 px, check the box for “Embed
    in map,” and click the OK button. Repeat this process for the image `rock.png`
    and again for the image `sign.png`. When you are finished, the names of the different
    tilesets (ocean-plants, starfish, rock, sign) will appear in tabs across the top
    of the Tileset panel, and you can then switch between these tilesets by clicking
    on the tabs.


    Next, you will add some custom properties to these new tilesets. In particular,
    you need to store the name of the Java class that will be instantiated for these
    objects, as well as any additional data required (in the case of the signs, the
    message to be displayed). To begin, click on the tab for the starfish tileset.
    In the row of icons at the bottom of the Tileset panel, click on the image that
    looks like a wrench on top of a rectangle (hovering the mouse over this icon will
    display the tooltip Edit Tileset). Then, in the main window, a new tab will appear
    with the tileset (the image of the starfish) in the central area. The new tab
    should contain the text `map.tmx#starfish`, which indicates that you are editing
    the `starfish` tileset embedded in the tilemap file `map.tmx`. Click on the image
    of the starfish, and the Properties panel on the left will appear as shown in
    Figure [10-9](#A352797_2_En_10_Chapter.html#Fig9).


    ![A352797_2_En_10_Fig9_HTML.jpg](A352797_2_En_10_Fig9_HTML.jpg)


    Figure 10-9.


    The tilesest editor


    At the bottom of the Properties panel is an area to display custom properties,
    which is currently empty. This is where you will enter the custom data needed
    by your game. Click on the plus icon at the bottom of the Properties panel to
    add a new property. In the small window that appears, enter the `name` and then
    press the OK button. A new row will appear in the Custom Properties area, and
    in the text field in the value column, enter `Starfish`. This is all the data
    you need to enter for this object, as the `Starfish` class doesn’t require anything
    further. Click on the tab at the top of the window labeled `map.tmx` to return
    to the tilemap.


    Then, in the Tileset panel, select the rock tileset and click on the icon to edit
    the tileset. A new tab will appear, labeled `map.tmx#rock`. Here, click on the
    image of the rock, and in the Properties panel, click on the plus icon to create
    a new custom property called `Name` , but this time enter `Rock` for the value.
    Return to the tilemap and proceed as before, editing the sign tileset and creating
    a custom property called `Name` with a value of `Sign`. However, before you return
    to the tilemap, you need to create a second custom property that stores the text
    to be displayed by the sign. This property should be called `message` and should
    contain the value `Hello, world!` (This is a default value for this property,
    which will be changed later when placing instances of this tile on the map.) When
    you are finished, click on the tab to return to the tilemap.'
  trans: '

    接下来，你将基于一个精灵表创建图块集。窗口右下角区域的面板用于显示图块集。在该区域底部的一排图标中，点击第一个图标（看起来像一个带有发光星星的矩形），会弹出一个名为“新建图块集”的窗口。点击标有“浏览”的按钮，并从
    `assets` 目录中选择 `ocean-plants.png` 图片。然后，将图块宽度和图块高度都改为 64 像素，因为精灵表中的每个独立图像都是这个尺寸。最后，勾选“嵌入到地图”旁边的复选框；这一点非常重要，因为
    LibGDX 目前只能处理单个 tmx 文件。标有“另存为...”的按钮随后会变为“确定”；窗口将如图 10-7 左侧所示。点击“确定”按钮，图块集就会出现在
    Tiled 窗口的右下角区域，如图 10-7 右侧所示。


    ![A352797_2_En_10_Fig7_HTML.jpg](img/A352797_2_En_10_Fig7_HTML.jpg)


    图 10-7.


    “新建图块集”窗口的设置（左），以及生成的图块集（右）


    接下来，你将设置图块图层。在“图层”面板中，选择“Tile Layer 1”；它应该会以蓝色高亮显示。窗口顶部有一组图标；点击看起来像印章的图标（或按下 `B`
    键）。这将激活**图章笔刷**工具。在图块集面板中，点击其中一种植物；它应该会以蓝色矩形高亮显示。然后，将鼠标移动到中央区域，你会看到一个半透明的图像副本，对齐到鼠标下方最近的网格位置。点击鼠标按钮将放置（或“盖章”）该图像的一个副本。根据需要重复此过程，在屏幕周围创建各种植物图像的更多实例；这能为关卡增加多样性和视觉趣味。如果你想从地图中移除某个图块图像，请从顶部的一组图标中选择**橡皮擦**工具（或按下
    `E` 键），然后点击你想要移除的图像。由于这些图块占据多个网格方格，你需要点击包含要移除图像的那个左下角网格方格。完成后，你的画面可能类似于图 10-8，尽管植物的排列方式可能不同。


    ![A352797_2_En_10_Fig8_HTML.jpg](img/A352797_2_En_10_Fig8_HTML.jpg)


    图 10-8.


    添加了海洋植物图块集的 Starfish Collector 瓦片地图


