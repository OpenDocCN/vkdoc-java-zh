    ## 灌木与岩石


    现在，你将添加代码来创建之前在地图编辑器中放置的灌木和岩石对象。灌木和岩石将是实体对象，因此它们的类将继承 `Solid` 类。灌木被剑击中时会消失，而岩石则不会。岩石被实现为独立对象（而非地图块），以便可以设置非正方形的边界多边形。


    首先，使用以下代码创建一个名为 `Bush` 的类：


    ```

