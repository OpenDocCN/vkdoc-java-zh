  trans: '

    ## 动画


    你将在 `BaseActor` 类中实现的第一个改动是动画支持：通过改变正在显示的图像来营造运动或变化的外观。本节将讨论两种类型的动画：基于数值的动画，它使用单张图像并持续改变相关数值（如位置或旋转角度）；以及基于图像的动画，它快速连续显示一系列图像。


    ### 基于数值的动画


    许多视觉效果可以通过持续改变与游戏实体相关的数值来实现，例如：


    *   通过改变位置坐标值可以创建移动效果。

    *   通过改变旋转值可以创建旋转效果。

    *   通过改变缩放因子可以创建放大或缩小效果。

    *   通过改变红/绿/蓝（RGB）颜色分量值可以创建颜色循环效果。

    *   通过改变透明度（alpha）值可以创建淡入/淡出效果。


    通过使用 LibGDX 的 `Action` 类，可以轻松地将这些效果添加到你的游戏中。`Action` 是一个可以添加到 `Actor` 的对象，用于随时间自动改变各种字段（位置、旋转、缩放、颜色）的值。处理动作的代码包含在
    `Actor` 类的 `act` 方法中（这就是为什么在上一章编写 `BaseActor` 类的 `act` 方法时需要调用 `super.act(dt)`——以确保这段代码被执行）。要创建一个
    `Action`，最简单的方法是使用 `Actions` 类中可用的静态方法。该类提供了数十种方法，这里仅讨论其中一部分。


    例如，一个名为 `spin` 的 `Action`，可以在两秒内将演员旋转 180 度，可以通过以下代码创建并附加到一个名为 `starfish` 的 `Actor`
    上：


    ```

    Action spin = Actions.rotateBy( 180, 2 );

    starfish.addAction( spin );

    ```


    类似地，一个名为 `shift` 的 `Action`，可以在 1 秒内将演员水平移动 50 像素（向右）、垂直移动 0 像素，可以通过以下代码创建：


    ```

    Action shift = Actions.moveBy( 50, 0, 1 );

    ```


    你还可以通过组合 `Action` 对象来创建复杂的复合视觉效果。如果你向一个 `Actor` 添加多个动作，它们将同时运行（通常称为并行）。例如，如果你将
    `spin` 和 `shift` 这两个动作都添加到一个 `Actor` 上，那么在第一个秒内，该 `Actor` 将旋转 90 度并向右移动 50 像素；在下一秒内，它将再旋转
    90 度（但不再向右移动，因为该动作此时已经完成）。或者，你可能希望一组动作一个接一个地运行（通常称为顺序执行）。你可以使用 `Actions` 类的 `after`
    方法创建一个动作，该动作仅在所有先前添加的动作完成后才运行。以下示例演示了这一点，其中 `starfish` 演员将先旋转两秒，然后在第三秒内移动：


    ```

    starfish.addAction( spin );

    starfish.addAction( Actions.after( shift ) );

    ```


    最后，你可能希望一个动作重复特定次数或无限重复。这些行为分别通过使用 `Actions` 类的 `repeat` 和 `forever` 方法实现，如下所示：


    ```

    Action spinTwice = Actions.repeat( spin, 2 );

    Action spinForever = Actions.forever( spin );

    ```


    这只是可用方法的一个示例；有关预定义动作类型的完整列表，请参阅 LibGDX `Actions` 类的文档。方便的是，此功能内置于 `Actor` 类中，并且由于
    `BaseActor` 类继承自 `Actor` 类，因此无需对 `BaseActor` 类进行任何添加即可使用 `Action` 对象。


    ### 基于图像的动画


    如前所述，基于图像的动画是由快速连续显示的图像序列创建的，以产生运动的错觉。在 LibGDX 中，这可以通过使用 `Animation` 类来实现。创建动画需要三个信息：


    *   要显示的图像数组（`Array`）

    *   每张图像应显示的时间长度

    *   一个指示帧应如何播放的值——按给定顺序、逆序、从头到尾再从头（乒乓顺序）——以及是否重复（循环）播放动画


    动画可以基于存储图像数据的不同类来创建，例如 `Texture` 和 `TextureRegion`。为了获得最大的灵活性，`Animation` 类是泛型设计的，因此当你声明一个
    `Animation` 对象时，你也可以声明它将存储的数据类型。


    泛型类型和类


    数据结构是计算机编程中的一个基本概念，因为它们允许你高效地组织和利用数据。最基本且广为人知的数据结构类型之一是数组，它允许你存储特定类型的固定数量的值。在
    Java 编程语言中，你通过先输入要存储的数据类型，后跟一组方括号来表示数组；字符串数组用 `String[]` 表示，而浮点小数数组用 `float[]`
    表示。通常，给定 Java 中的任何类，你都可以创建一个元素为该类型的数组。这使得数组成为一种非常灵活且适应性强的数据结构。


    有时，你会设计自己的类来存储特定类型的数据。例如，存储一个人的名和姓需要两个字符串，可以使用以下类来存储：


    ```

    public class StringPair

    {

    private String first;

    private String second;

    // 构造函数

    StringPair(String a, String b)

    {

    first = a;

    second = b;

    }

    // getter/setter 方法

    public void setFirst(String s)  { first = s; }

    public String getFirst()  { return first; }

    public void setSecond(String s) { second = s; }

    public String getSecond()  { return second; }

    // 标准方法

    public String toString()

    {

    return "[" + first + "," + second + "]";

    }

    }

    ```


    类似地，要存储一个点的 x 和 y 坐标，你可以使用以下类：


    ```

    public class FloatPair

    {

    private float first;

    private float second;

    // 构造函数

    FloatPair(float a, float b)

    {

    first = a;

    second = b;

    }

    // getter/setter 方法

    public void setFirst(float x)  { first = x; }

    public float getFirst()  { return first; }

    public void setSecond(float x) { second = x; }

    public float getSecond()  { return second; }

    // 标准方法

    public String toString()

    {

    return "[" + first + "," + second + "]";

    }

    }

    ```


    比较每个类的代码，你会发现它们几乎相同；唯一实质性的区别是存储的数据类型。在软件开发中，减少冗余代码量是非常可取的。理想情况下，应该有一种方法可以编写一个类，在创建对象时指定结构（例如存储的数据量以及用于访问或修改它的方法）和要存储的数据类型，就像数组一样。事实上，Java
    确实具有这样的能力。这是通过泛型编程实现的。


    在泛型编程中，你可以像往常一样编写一个类，但在声明字段或方法参数时，不指定具体类型，而是使用一个类型变量，传统上用单个大写字母（如 `T` 或 `K`）表示。为了在类中指示类型变量的存在，类名后面必须跟有尖括号（`<`
    和 `>`）。例如，一个保留 `StringPair` 和 `FloatPair` 类结构的泛型类可以编写如下：

    '
- fmt: '```java

    public class Pair

    {

    private T first;

    private T second;

    // constructor

    Pair(T a, T b)

    {

    first = a;

    second = b;

    }

    // getter/setter methods

    public void setFirst(T s)  { first = s; }

    public T getFirst()  { return first; }

    public void setSecond(T s) { second = s; }

    public T getSecond()  { return second; }

    // standard methods

    public String toString()

    {

    return "[" + first + "," + second + "]";

    }

    }

    ```


    Then, to create an instance of a `Pair` that could be used to store strings, for
    example, you would write:


    ```java

    Pair personName = new Pair("Kondas", "Kismet");

    ```


    Similarly, you could create a `Pair` to store float numbers:


    ```java

    Pair coordinates = new Pair( 42.9001f, 337.14f );

    ```


    Note that in the last example, the class name `Float` (with an uppercase `F`)
    must be used, rather than `float`, since `float` refers to a primitive data type,
    while `Float` refers to the corresponding class. Similarly, to store a pair of
    integer values, you must use `Pair<Integer>`, rather than `Pair<int>`.


    The `Animation` class takes a generic type parameter that specifies which class
    is being used to store image data. You will use the `TextureRegion` class, as
    it provides the greatest number of options when rendering an image.


    To support the animation-related methods that will be written in this section,
    add the following `import` statements to the `BaseActor` class:


    ```java

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.utils.Array;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.graphics.g2d.Animation.PlayMode;

    import com.badlogic.gdx.graphics.g2d.Batch;

    ```


    To store the animation and related data, add the following fields at the beginning
    of the `BaseActor` class:


    ```java

    private Animation animation;

    private float elapsedTime;

    private boolean animationPaused;

    ```


    To initialize these variables, add the following code at the end of the `constructor`
    method:


    ```java

    animation = null;

    elapsedTime = 0;

    animationPaused = false;

    ```


    Next, you will set up some methods that set values for these variables. The first
    of these methods is used to set the animation. Once an animation is set, the size
    (width and height) of the Actor will be able to be set, as well as the origin
    (the point around which the actor should be rotated, typically the center of the
    actor). The width and height of the actor will be set to the width and height
    of the first image of the animation (the images of an animation are also called
    keyframes). This is accomplished with the following method:


    ```java

    public void setAnimation(Animation anim)

    {

    animation = anim;

    TextureRegion tr = animation.getKeyFrame(0);

    float w = tr.getRegionWidth();

    float h = tr.getRegionHeight();

    setSize( w, h );

    setOrigin( w/2, h/2 );

    }

    ```


    Changing the value of `animationPaused` is accomplished with the following method:


    ```java

    public void setAnimationPaused(boolean pause)

    {

    animationPaused = pause;

    }

    ```


    The variable `elapsedTime`, which you will use to keep track of how long the animation
    has been playing and therefore which image should be displayed, does not need
    to be set directly. Instead, this value should be automatically updated; the correct
    place to do this is the `act` method of the `Actor` class, which is automatically
    called by the stage to which the actor belongs. The elapsed time needs be incremented
