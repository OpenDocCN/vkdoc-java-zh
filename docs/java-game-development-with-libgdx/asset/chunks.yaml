    ### The BaseActor3D Class


    To begin, recall that the `Actor` class stored transformation data (position,
    rotation, and scale) and methods to get, set, and change these values. All `Actor`
    objects contained an `act` method, which could be used to update their internal
    state, and a `draw` method, which the actor could use to render itself with a
    given `Batch` object. You then wrote an extension of the `Actor` class, called
    the `BaseActor` class, which additionally stored a `Texture`, a `Polygon` for
    collision detection, and related methods. Here, the `BaseActor3D` class will be
    presented, which will provide similar functionality in a 3D setting.


    Some of the most complicated underlying concepts in 3D graphics are the mathematical
    structures used to store the transformation data. The technical details will not
    be covered in depth here,[¹](#A352797_2_En_16_Chapter.html#Fn1) but to understand
    the code for this example, it’s important to know what the objects are and how
    to use their associated methods.


    The transformation data for a `ModelInstance` object is stored in its `transform`
    field as a `Matrix4` object : a four-by-four grid of numbers. From this object,
    you can extract a `Vector3` that contains the position of the object. You can
    also extract another `Vector3` that contains the scaling factor in each direction
    (initialized to 1 in all directions, which results in no change in the default
    size). The transformation also stores the orientation of the model, which cannot
    be stored with a single number (in contrast to the `rotation` value of an `Actor`),
    because an object in three-dimensional space can be rotated any amount around
    any combination of the x, y, and z axes. For many technical reasons (such as computation,
    performance, and avoiding a phenomena known as gimbal lock [²](#A352797_2_En_16_Chapter.html#Fn2)),
    an object called a `Quaternion` (corresponding to a mathematical object of the
    same name) is used to store orientation data. For convenience, rather than work
    with the `Matrix4` directly, you’ll maintain separate objects to store the position,
    rotation, and scale data for each `BaseActor3D` object and combine them into a
    `Matrix4` that will be stored in the `ModelInstance` when needed.


