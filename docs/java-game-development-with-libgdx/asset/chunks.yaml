    ### Creating the TilemapActor Class


    In this section, you will write a class that merges the Tiled map file-parsing
    capabilities provided by LibGDX with the `BaseActor` class framework that you
    developed in the first part of this book. The class you create will be used for
    the games revisited in this chapter, as well as for the games covered in the next
    two chapters (platformer games and adventure games). This class will extend the
    LibGDX `Actor` class, rather than the `BaseActor` class, since it will not make
    use of any of the `BaseActor` functionality. This requires you to write two methods,
    `act` and `draw`. The `draw` method will make use of an `OrthographicCamera` object—which
    will be aligned with the `Camera` from the main stage—to render the image layers
    and tile layers from the map. Object layers are not rendered to the screen; instead,
    you will write methods that extract a list of objects (tiles or rectangles) that
    contain a custom property called `name` with a particular value, very similar
    to the `getList` method of the `BaseActor` class. You can then use that data to
    create instances of the corresponding classes in your game.


