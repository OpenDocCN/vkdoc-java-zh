- fmt: '### Recording Song Data


    When creating a rhythm action game, one of the most difficult parts is to determine
    which keys should be pressed at which times as the music is playing. To accomplish
    this task, you will use a simple approach and record the keystrokes as the music
    is playing. (More precise approaches are possible, but are beyond the scope of
    this book.) The main drawback to this approach is that you must be capable of
    performing the sequence of keystrokes precisely, as the player’s performance will
    be judged according to how closely it matches the recording you create.


    You will use a simple text file to store this data; the first step is to determine
    what data needs to be stored. Based on this information, a class will be created
    to store the data, and associated methods will write the data to a file and read
    the data from a file. The information required for the application includes:


    - the name of the music file;

    - the duration of the music file (which will be displayed in the rhythm game’s
    user interface);

    - a list of keyboard keys and associated times at which they should be pressed;
    and

    - a variable to keep track of the current position in the list (for use when the
    song is playing in the rhythm game).


    Since the keys and times should be stored in pairs, your data structure will also
    contain an inner class (a class defined within a class) to store these pairs.
    To begin, create a new class called `SongData` with the following code. Note that
    the inner class is called `KeyTimePair`, and the `SongData` class stores an `ArrayList`
    of these objects. `KeyTimePair` is declared here as an inner class because it
    will only be used within this class.


    ```java

    import java.util.ArrayList;

    import com.badlogic.gdx.files.FileHandle;

    public class SongData

    {

    private String songName;

    private float songDuration;

    private ArrayList keyTimeList;

    private int keyTimeIndex;

    public class KeyTimePair

    {

    private String key;

    private Float time;

    public KeyTimePair(String k, Float t)

    {

    key = k;

    time = t;

    }

    public String getKey()

    {  return key;  }

    public Float getTime()

    {  return time;  }

    }

    public SongData()

    {

    keyTimeList = new ArrayList();

    }

    }

    ```


    Next, you need some standard set and get methods for the `songName` and `songDuration`
    variables, so add the following methods to the `SongData` class:


    ```java

    public void setSongName(String s)

    {  songName = s;  }

    public String getSongName()

    {  return songName;  }

    public void setSongDuration(float f)

    {  songDuration = f;  }

    public float getSongDuration()

    {  return songDuration;  }

    ```


    Next, you will need some methods to create and add key–time pairs to the list
    stored by the `SongData` class, to manipulate the variable that indexes the current
    position in the list, to retrieve pairs from the list, and to determine if the
    index variable has reached the end of the list. To accomplish these tasks, add
    the following methods to the `SongData` class:


    ```java

    public void addKeyTime(String k, Float t)

    {  keyTimeList.add( new KeyTimePair(k,t) );  }

    public void resetIndex()

    {  keyTimeIndex = 0;  }

    public void advanceIndex()

    {  keyTimeIndex++;  }

    public KeyTimePair getCurrentKeyTime()

    {  return keyTimeList.get(keyTimeIndex);  }

    public int keyTimeCount()

    {  return keyTimeList.size();  }

    public boolean isFinished()

    {  return keyTimeIndex >= keyTimeCount();  }

    ```


    Finally, you need a pair of methods that write this data to and read this data
    from a text file. The first line of the text file will store the music filename,
    the second line will store the duration, and each of the remaining lines will
    store a key–time data pair, separated by a comma. When reading the file back in
    as a string, the numeric data will be converted to a float with the `Float` class
    `parseFloat` method. Add these methods to the `SongData` class:


    ```java

    public void writeToFile(FileHandle file)

    {

    file.writeString( getSongName() + "\n", false );

    file.writeString( getSongDuration() + "\n", true );

    for ( KeyTimePair ktp : keyTimeList )

    {

    String data = ktp.getKey() + "," + ktp.getTime() + "\n";

    file.writeString( data, true );

    }

    }

    public void readFromFile(FileHandle file)

    {

    String rawData = file.readString();

    String[] dataArray = rawData.split("\n");

    setSongName( dataArray[0] );

    setSongDuration( Float.parseFloat(dataArray[1]) );

    keyTimeList.clear();

    for (int i = 2; i < dataArray.length; i++)

    {

    String[] keyTimeData = dataArray[i].split(",");

    String key = keyTimeData[0];

    Float time = Float.parseFloat( keyTimeData[1] );

    keyTimeList.add( new KeyTimePair( key, time ) );

    }

    }

    ```


    Now, you are ready to create the application to record the sequence and timing
    of keypresses. (Alternatively, if you are not interested in producing your own
    song data files and you just want to use the provided example file [in the `assets`
    folder, called `FunkyJunky.key`], you may skip the rest of this section and proceed
    to the next section.) The utility application you will create will simply consist
    of three buttons: one to select the music file to play, one to start the recording
    process, and one to create (or select) a file to which the recorded song data
    should be saved. This simple application is shown in Figure [6-4](#A352797_2_En_6_Chapter.html#Fig4).


    ![A352797_2_En_6_Fig4_HTML.jpg](A352797_2_En_6_Fig4_HTML.jpg)


    **Figure 6-4.** Screenshot of the keystroke-recording application


    Create a new class named `RecorderScreen` with the following code:


    ```java

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.scenes.scene2d.ui.TextButton;

    import com.badlogic.gdx.scenes.scene2d.Event;

    import com.badlogic.gdx.files.FileHandle;

    import com.badlogic.gdx.audio.Music;

    public class RecorderScreen extends BaseScreen

    {

    Music music;

    SongData songData;

    float lastSongPosition;

    boolean recording;

    TextButton loadButton;

    TextButton recordButton;

    TextButton saveButton;

    public void initialize()

    {

    recording = false;

    loadButton = new TextButton( "Load Music File", BaseGame.textButtonStyle );

    loadButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    FileHandle musicFile = FileUtils.showOpenDialog();

    if ( musicFile != null )

    {

    music = Gdx.audio.newMusic(musicFile);

    songData = new SongData();

    songData.setSongName( musicFile.name() );

    }

    return true;

    }

    );

    recordButton = new TextButton( "Record Keystrokes", BaseGame.textButtonStyle );

    recordButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    if ( !recording )

    {

    music.play();

    recording = true;

    lastSongPosition = 0;

    }

    return true;

    }

    );

    saveButton = new TextButton( "Save Keystroke File", BaseGame.textButtonStyle );

    saveButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    FileHandle textFile = FileUtils.showSaveDialog();

    if ( textFile != null )

    songData.writeToFile(textFile);

    return true;

    }

    );

    uiTable.add(loadButton);

    uiTable.row();

    uiTable.add(recordButton);

    uiTable.row();

    uiTable.add(saveButton);

