    in this chapter), but an interface is not suitable in this situation because an
    interface can only declare the required method, and does not include any actual
    code. In this situation, there is code that would be helpful to reuse. What you
    need is a structure that combines elements of both an interface and a standard
    class that can be extended. Java provides exactly what is needed for this situation:
    abstract classes .


