- fmt: '### Project Integration


    Integrating the tilemap data into the Rectangle Destroyer game is similar to what
    you’ve seen before in the Starfish Collector game. Open the `Rectangle Destroyer
    Ch 10` project in BlueJ. Since the size of the tilemap is slightly larger than
    the previous version of this game, the window size needs to be changed to match.
    In the `Launcher` class, change the last line of code in the `main` method to
    the following:


    ```

    LwjglApplication launcher = new LwjglApplication( myGame, "Rectangle Destroyer",
    832, 640 );

    ```


    In the `LevelScreen` class, add the following two `import` statements:


    ```

    import com.badlogic.gdx.maps.MapObject;

    import com.badlogic.gdx.maps.MapProperties;

    ```


    Next, in the `initialize` method, delete the following code that was used to initialize
    the background, walls, bricks, and paddle:


    ```

    BaseActor background = new BaseActor(0,0, mainStage);

    background.loadTexture("assets/space.png");

    BaseActor.setWorldBounds(background);

    paddle = new Paddle(320, 32, mainStage);

    new Wall(0,0, 20,600, mainStage);

    new Wall(780,0, 20,600, mainStage);

    new Wall(0,550, 800,50, mainStage);

    Brick tempBrick = new Brick(0,0,mainStage);

    float brickWidth = tempBrick.getWidth();

    float brickHeight = tempBrick.getHeight();

    tempBrick.remove();

    int totalRows = 10;

    int totalCols = 10;

    float marginX = (800 - totalCols * brickWidth) / 2;

    float marginY = (600 - totalRows * brickHeight) - 120;

    for (int rowNum = 0; rowNum < totalRows; rowNum++)

    {

    for (int colNum = 0; colNum < totalCols; colNum++)

    {

    float x = marginX + brickWidth  * colNum;

    float y = marginY + brickHeight * rowNum;

    new Brick( x, y, mainStage );

    }

    }

    ```


    Next, add the following code at the beginning of the `initialize` method to create
    the `TilemapActor`:


    ```

    TilemapActor tma = new TilemapActor("assets/map.tmx", mainStage);

    ```


    To create the `Wall` objects, you will use the `getTileList` method as you did
    earlier in this chapter. Since the `Wall` class constructor also requires the
    width and height of the wall, you will also get those properties from the map
    object. Add the following code after the `TilemapActor` is initialized:


    ```

    for (MapObject obj : tma.getTileList("Wall") )

    {

    MapProperties props = obj.getProperties();

    new Wall( (float)props.get("x"),     (float)props.get("y"),

    (float)props.get("width"), (float)props.get("height"),

    mainStage );

    }

    ```


    To create the `Brick` objects, once again you will make use of the `getTileList`
    method. Since the tiles you used in the Tiled map editor were a slightly different
    size than the brick image in the `assets` folder, you can retrieve the width and
    height properties of the tile object to resize the brick object. In addition,
    you will retrieve the color property from the tile object, and you will set the
    color of the brick accordingly. To accomplish these tasks, add the following code:


    ```

    for (MapObject obj : tma.getTileList("Brick") )

    {

    MapProperties props = obj.getProperties();

    Brick b = new Brick( (float)props.get("x"), (float)props.get("y"), mainStage );

    b.setSize( (float)props.get("width"), (float)props.get("height") );

    b.setBoundaryRectangle();

    String colorName = (String)props.get("color");

    if ( colorName.equals("red") )

    b.setColor(Color.RED);

    else if ( colorName.equals("orange") )

    b.setColor(Color.ORANGE);

    else if ( colorName.equals("yellow") )

    b.setColor(Color.YELLOW);

    else if ( colorName.equals("green") )

    b.setColor(Color.GREEN);

    else if ( colorName.equals("blue") )

    b.setColor(Color.BLUE);

    else if ( colorName.equals("purple") )

    b.setColor(Color.PURPLE);

    else if ( colorName.equals("white") )

    b.setColor(Color.WHITE);

    else if ( colorName.equals("gray") )

    b.setColor(Color.GRAY);

    }

    ```


    Finally, just as you set the starting position of the turtle in Starfish Collector,
    you set the starting position of the paddle by adding the following code:


    ```

    MapObject startPoint = tma.getRectangleList("start").get(0);

    MapProperties props = startPoint.getProperties();

    paddle = new Paddle( (float)props.get("x"), (float)props.get("y"), mainStage);

    ```


    At this point, the modifications to the Rectangle Destroyer project are complete.
    Test out your game and enjoy your newly designed level!


    ### Summary and Next Steps


    In this chapter, you learned how to use Tiled, a general-purpose map-editing program
    that can be used to streamline level development. You learned how to set up maps,
    add tilesets with custom properties, and work with different types of map layers
    (image, tile, and object). You also learned how to integrate the built-in functionality
    of LibGDX to work with Tiled map data files in the process of creating the `TiledMapActor`
    class. This knowledge was put to practical use to improve the level design of
    two earlier game projects: Starfish Collector and Rectangle Destroyer.


    In the following two chapters, you will continue to use your newly developed design
    skills and the `TilemapActor` class as you create a platformer game and a sword-fighting
    adventure game.


    # 11. Platform Games


    In this chapter, you will learn how to create the platform game Jumping Jack,
    shown in Figure [11-1](#A352797_2_En_11_Chapter.html#Fig1), inspired by arcade
    and console games such as Donkey Kong and Super Mario Bros. New concepts introduced
    in this chapter include actors with multiple animations, platform physics, using
    extra actors as “sensors” to monitor the area around an actor for overlap and
    collision, jump-through platforms, and key-and-lock mechanics.


    ![A352797_2_En_11_Fig1_HTML.jpg](A352797_2_En_11_Fig1_HTML.jpg)


    Figure 11-1. The platform game Jumping Jack'
