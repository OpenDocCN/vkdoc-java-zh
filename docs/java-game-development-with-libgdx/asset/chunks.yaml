- fmt: '# Lasers, Rocks, and Explosions


    Next, you will add a laser that the spaceship will shoot. Similar to the spaceship,
    the laser wraps around the screen, and similar to the warp effect, the laser will
    automatically fade and remove itself from the game after a short delay. (Lasers
    that last forever would be overpowered in this game.) Unlike the spaceship, the
    laser travels at a constant speed, so rather than set an acceleration value, the
    speed of the laser object will be set directly, and the deceleration will be set
    to 0. Create a new class called `Laser` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Laser extends BaseActor

    {

    public Laser(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/laser.png");

    addAction( Actions.delay(1) );

    addAction( Actions.after( Actions.fadeOut(0.5f) ) );

    addAction( Actions.after( Actions.removeActor() ) );

    setSpeed(400);

    setMaxSpeed(400);

    setDeceleration(0);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    wrapAroundWorld();

    }

    }

    ```


    To shoot the lasers, you add the following method to the `Spaceship` class; similar
    to the `warp` method, it will be activated from the `LevelScreen` class in its
    `keyDown` method. In the `Spaceship` class, add the following code:


    ```

    public void shoot()

    {

    if ( getStage() == null )

    return;

    Laser laser = new Laser(0,0, this.getStage());

    laser.centerAtActor(this);

    laser.setRotation( this.getRotation() );

    laser.setMotionAngle( this.getRotation() );

    }

    ```


    In the `keyDown` method of the `LevelScreen` class, add the following code:


    ```

    if ( keycode == Keys.SPACE )

    spaceship.shoot();

    ```


    If you run the game at this point, you will be able to shoot lasers!


    Next, you will add some rock objects to the game, giving you something to shoot
    at. Similar to the laser, they wrap around the screen and travel at a constant
    speed. Each rock will have a value-based animation (rotation) to add visual interest.
    To add some unpredictability to the game, you will randomize the rotation speed
    and movement speed by a small amount, again using the `random` function from the
    LibGDX `MathUtils` class. Create a new class named `Rock` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    import com.badlogic.gdx.math.MathUtils;

    public class Rock extends BaseActor

    {

    public Rock(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/rock.png");

    float random = MathUtils.random(30);

    addAction( Actions.forever( Actions.rotateBy(30 + random, 1) ) );

    setSpeed(50 + random);

    setMaxSpeed(50 + random);

    setDeceleration(0);

    setMotionAngle( MathUtils.random(360) );

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    wrapAroundWorld();

    }

    }

    ```


    In order for the rocks to appear, you will have to create some in the `initialize`
    method of the `LevelScreen` class with the following code. Note that the rocks
    are positioned surrounding the spaceship at a distance. This gives the player
    a fair chance to move the spaceship out of the path of the rocks at the start
    of the game.


    ```

    new Rock(600,500, mainStage);

    new Rock(600,300, mainStage);

    new Rock(600,100, mainStage);

    new Rock(400,100, mainStage);

    new Rock(200,100, mainStage);

    new Rock(200,300, mainStage);

    new Rock(200,500, mainStage);

    new Rock(400,500, mainStage);

    ```


    Before adding the code that governs how the spaceship, rocks, and lasers interact,
    you will add an explosion special effect, featuring an image-based animation,
    that will remove itself from the stage once the animation is finished. Create
    a new class named `Explosion` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Explosion extends BaseActor

    {

    public Explosion(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/explosion.png", 6, 6, 0.03f, false);

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( isAnimationFinished() )

    remove();

    }

    }

    ```


    Finally, you will handle the interaction between the rocks and the spaceship and
    lasers. In the `update` method of the `LevelScreen` class, add the following code:


    ```

    for ( BaseActor rockActor : BaseActor.getList(mainStage, "Rock") )

    {

    if (rockActor.overlaps(spaceship))

    {

    if (spaceship.shieldPower <= 0)

    {

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(spaceship);

    spaceship.remove();

    spaceship.setPosition(-1000,-1000);

    }

    else

    {

    spaceship.shieldPower -= 34;

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(rockActor);

    rockActor.remove();

    }

    }

    for ( BaseActor laserActor : BaseActor.getList(mainStage, "Laser") )

    {

    if (laserActor.overlaps(rockActor))

    {

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(rockActor);

    laserActor.remove();

    rockActor.remove();

    }

    }

    }

    ```


    Note that the shield power is reduced by 34 after each collision, which means
    that the shields can withstand three hits before the spaceship is in danger of
    being destroyed. Also note that even after the ship is removed from the stage,
    it still needs to be moved off-screen. Removing an object from its stage will
    stop its `act` and `draw` methods from being run, but the `Spaceship` object remains
    in the program memory, and collisions can still be detected at its final position
    when checked in the `update` method. (This issue could also be addressed by modifying
    the `BaseActor` method `overlap` to return `false` when either object’s `getStage`
    method returns `null`, but that approach will not be used here.) Once again, you
    may wish to run the game and verify that everything works as expected; your game
    should now appear similar to Figure [4-1](#A352797_2_En_4_Chapter.html#Fig1),
    shown at the beginning of this chapter.


    ## Endgame Conditions


    Determining when the game is over is relatively easy. If the spaceship collides
    with a rock when the shield power is less than or equal to zero, then the player
    loses the game. If there are no rocks remaining, then the player wins the game.
    In either scenario, a message should be displayed to communicate this information
    to the player and provide a sense of closure (otherwise, the player may be left
    wondering if there is something remaining to do). To this end, in the `LevelScreen`
    class, add the following field:


    ```

    private boolean gameOver;

    ```


    Set its value in the `initialize` method as follows:


    ```

    gameOver = false;

    ```


    When the player loses the game, an effect will be created to make the message
    fade in, so you need to add the following `import` statement:


    ```

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    Next, to handle losing the game, add the following code in the `update` method,
    right after the code that removes the spaceship from the game:


    ```

    BaseActor messageLose = new BaseActor(0,0, uiStage);

    messageLose.loadTexture("assets/message-lose.png");

    messageLose.centerAtPosition(400,300);

    messageLose.setOpacity(0);

    messageLose.addAction( Actions.fadeIn(1) );

    gameOver = true;

    ```


    Finally, to handle winning the game, add the following code at the end of the
    `update` method:


    ```

    if ( !gameOver && BaseActor.count(mainStage, "Rock") == 0 )

    {

    BaseActor messageWin = new BaseActor(0,0, uiStage);

    messageWin.loadTexture("assets/message-win.png");

    messageWin.centerAtPosition(400,300);

    messageWin.setOpacity(0);

    messageWin.addAction( Actions.fadeIn(1) );

    gameOver = true;

    }

    ```


    As usual, test your game to verify these changes work as expected. Attempt to
    win the game and then to lose the game to check that the corresponding messages
    appear on the screen.


    Congratulations! You have finished implementing all the core mechanics of the
    Space Rocks game.'
  raw: '## Lasers, Rocks, and Explosions


    Next, you will add a laser that the spaceship will shoot. Similar to the spaceship,
    the laser wraps around the screen, and similar to the warp effect, the laser will
    automatically fade and remove itself from the game after a short delay. (Lasers
    that last forever would be overpowered in this game.) Unlike the spaceship, the
    laser travels at a constant speed, so rather than set an acceleration value, the
    speed of the laser object will be set directly, and the deceleration will be set
    to 0\. Create a new class called `Laser` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Laser extends BaseActor

    {

    public Laser(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/laser.png");

    addAction( Actions.delay(1) );

    addAction( Actions.after( Actions.fadeOut(0.5f) ) );

    addAction( Actions.after( Actions.removeActor() ) );

    setSpeed(400);

    setMaxSpeed(400);

    setDeceleration(0);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    wrapAroundWorld();

    }

    }

    ```


    To shoot the lasers , you add the following method to the `Spaceship` class; similar
    to the `warp` method, it will be activated from the `LevelScreen` class in its
    `keyDown` method. In the `Spaceship` class , add the following code:


    ```

    public void shoot()

    {

    if ( getStage() == null )

    return;

    Laser laser = new Laser(0,0, this.getStage());

    laser.centerAtActor(this);

    laser.setRotation( this.getRotation() );

    laser.setMotionAngle( this.getRotation() );

    }

    ```


    In the `keyDown` method of the `LevelScreen` class, add the following code:


    ```

    if ( keycode == Keys.SPACE )

    spaceship.shoot();

    ```


    If you run the game at this point, you will be able to shoot lasers !


    Next, you will add some rock objects to the game, giving you something to shoot
    at. Similar to the laser, they wrap around the screen and travel at a constant
    speed. Each rock will have a value-based animation (rotation) to add visual interest.
    To add some unpredictability to the game, you will randomize the rotation speed
    and movement speed by a small amount, again using the `random` function from the
    LibGDX `MathUtils` class. Create a new class named `Rock` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    import com.badlogic.gdx.math.MathUtils;

    public class Rock extends BaseActor

    {

    public Rock(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/rock.png");

    float random = MathUtils.random(30);

    addAction( Actions.forever( Actions.rotateBy(30 + random, 1) ) );

    setSpeed(50 + random);

    setMaxSpeed(50 + random);

    setDeceleration(0);

    setMotionAngle( MathUtils.random(360) );

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    wrapAroundWorld();

    }

    }

    ```


    In order for the rocks to appear, you will have to create some in the `initialize`
    method of the `LevelScreen` class with the following code. Note that the rocks
    are positioned surrounding the spaceship at a distance. This gives the player
    a fair chance to move the spaceship out of the path of the rocks at the start
    of the game.


    ```

    new Rock(600,500, mainStage);

    new Rock(600,300, mainStage);

    new Rock(600,100, mainStage);

    new Rock(400,100, mainStage);

    new Rock(200,100, mainStage);

    new Rock(200,300, mainStage);

    new Rock(200,500, mainStage);

    new Rock(400,500, mainStage);

    ```


    Before adding the code that governs how the spaceship, rocks, and lasers interact,
    you will add an explosion special effect, featuring an image-based animation,
    that will remove itself from the stage once the animation is finished. Create
    a new class named `Explosion` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Explosion extends BaseActor

    {

    public Explosion(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/explosion.png", 6, 6, 0.03f, false);

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( isAnimationFinished() )

    remove();

    }

    }

    ```


    Finally, you will handle the interaction between the rocks and the spaceship and
    lasers. In the `update` method of the `LevelScreen` class , add the following
    code:


    ```

    for ( BaseActor rockActor : BaseActor.getList(mainStage, "Rock") )

    {

    if (rockActor.overlaps(spaceship))

    {

    if (spaceship.shieldPower <= 0)

    {

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(spaceship);

    spaceship.remove();

    spaceship.setPosition(-1000,-1000);

    }

    else

    {

    spaceship.shieldPower -= 34;

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(rockActor);

    rockActor.remove();

    }

    }

    for ( BaseActor laserActor : BaseActor.getList(mainStage, "Laser") )

    {

    if (laserActor.overlaps(rockActor))

    {

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(rockActor);

    laserActor.remove();

    rockActor.remove();

    }

    }

    }

    ```


    Note that the shield power is reduced by 34 after each collision , which means
    that the shields can withstand three hits before the spaceship is in danger of
    being destroyed. Also note that even after the ship is removed from the stage,
    it still needs to be moved off-screen. Removing an object from its stage will
    stop its `act` and `draw` methods from being run, but the `Spaceship` object remains
    in the program memory, and collisions can still be detected at its final position
    when checked in the `update` method. (This issue could also be addressed by modifying
    the `BaseActor` method `overlap` to return `false` when either object’s `getStage`
    method returns `null`, but that approach will not be used here.) Once again, you
    may wish to run the game and verify that everything works as expected; your game
    should now appear similar to Figure [4-1](#A352797_2_En_4_Chapter.html#Fig1),
    shown at the beginning of this chapter.


    ## Endgame Conditions


    Determining when the game is over is relatively easy. If the spaceship collides
    with a rock when the shield power is less than or equal to zero, then the player
    loses the game. If there are no rocks remaining, then the player wins the game.
    In either scenario, a message should be displayed to communicate this information
    to the player and provide a sense of closure (otherwise, the player may be left
    wondering if there is something remaining to do). To this end, in the `LevelScreen`
    class , add the following field:


    ```

    private boolean gameOver;

    ```


    Set its value in the `initialize` method as follows:


    ```

    gameOver = false;

    ```


    When the player loses the game, an effect will be created to make the message
