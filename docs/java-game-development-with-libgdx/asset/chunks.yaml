    that store its correct row and column values, there will also be a variable that
    stores the area upon which the piece is currently positioned (if any) and a method
    to check if the piece is currently placed correctly. Create a new class called
    `PuzzlePiece` containing the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class PuzzlePiece extends DragAndDropActor

    {

    private int row;

    private int col;

    private PuzzleArea puzzleArea;

    public PuzzlePiece(float x, float y, Stage s)

    {

    super(x,y,s);

    }

    public void setRow(int r)

    {  row = r;  }

    public void setCol(int c)

    {  col = c;  }

    public int getRow()

    {  return row;  }

    public int getCol()

    {  return col;  }

    public void setPuzzleArea(PuzzleArea pa)

    {  puzzleArea = pa;  }

