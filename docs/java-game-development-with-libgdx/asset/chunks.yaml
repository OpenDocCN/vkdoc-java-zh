    clearPuzzleArea();

    }

    }

    public void onDrop()

    {

    if ( hasDropTarget() )

    {

    PuzzleArea pa = (PuzzleArea)getDropTarget();

    moveToActor(pa);

    setPuzzleArea(pa);

    pa.setTargetable(false);

    }

    }

    ```


