    ### 时间与计时器


    接下来，你将添加基于时间的功能，这能为游戏带来紧迫感和紧张感，具体取决于玩家可用的时间量。计时器对象通过增加可用时间，为玩家带来缓解感。计时器对象还可用于创建一组强制检查点：如果玩家在初始给定时间内无法到达终点旗帜，他们将被迫沿途收集计时器对象。如果选择这种设计，别忘了测试关卡以确保到达终点是可行的！首先，创建一个名为`Timer`的新类，代码如下。注意，由于没有基于图像的动画，这里添加了基于数值的动画（脉冲动作）来吸引玩家注意力，并表明该对象是可交互的。


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Timer extends BaseActor

    {

    public Timer(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/items/timer.png");

    Action pulse = Actions.sequence(

    Actions.scaleTo(1.1f, 1.1f, 0.5f),

    Actions.scaleTo(1.0f, 1.0f, 0.5f) );

    addAction( Actions.forever(pulse) );

    }

    }

    ```


    接着，为了基于瓦片地图数据创建计时器实例，在`LevelScreen`类的`initialize`方法中添加以下代码：


    ```

    for (MapObject obj : tma.getTileList("Timer") )

    {

    MapProperties props = obj.getProperties();

    new Timer( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    ```


    最后，你需要自动递减`time`变量、更新显示、在收集计时器时增加剩余时间，并在时间耗尽时结束游戏。为此，在`update`方法中添加以下代码：


    ```

    time -= dt;

    timeLabel.setText("Time: " + (int)time);

    for (BaseActor timer : BaseActor.getList(mainStage, "Timer"))

    {

    if ( jack.overlaps(timer) )

    {

    time += 20;

    timer.remove();

    }

    }

    if (time <= 0)

    {

    messageLabel.setText("Time Up - Game Over");

    messageLabel.setColor(Color.RED);

    messageLabel.setVisible(true);

    jack.remove();

    gameOver = true;

    }

    ```


    同样，你可以测试代码以验证时间相关功能是否按预期工作。


    ### 弹簧板


    跳跃是任何平台游戏的核心部分。然而，玩家角色通常无法从屏幕底部一次跳跃到达顶部。要到达这些更高的位置，你可以添加一系列类似楼梯的实心瓦片，或者作为替代方案，添加一个能将角色弹射到高空（高于普通跳跃）的对象。基于此，本游戏引入了弹簧板对象，玩家会将其视为弹力平台。如果考拉落在弹簧板顶部，他会被弹射到高空。（单纯从旁边走过不会触发此效果，这样玩家可以自主决定是否使用弹簧板。）首先，你需要创建一个类来表示该对象。创建一个名为`Springboard`的新类，代码如下：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Springboard extends BaseActor

    {

    public Springboard(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/items/springboard.png", 1, 3, 0.2f, true);

    }

    }

    ```


    接着，在`Koala`类中添加以下方法，这些方法将用于判断考拉是否正在下落，如果是，则将考拉弹射到空中（类似于`jump`方法）：


    ```

    public boolean isFalling()

    {

    return (velocityVec.y < 0);

    }

    public void spring()

    {

    velocityVec.y = 1.5f * jumpSpeed;

    }

    ```


    然后，为了设置弹簧板，在`LevelScreen`类的`initialize`方法中添加以下代码。注意`toFront`方法的使用，这会使考拉在走过弹簧板时显示在弹簧板前面（而不是后面）。


    ```

    for (MapObject obj : tma.getTileList("Springboard") )

    {

    MapProperties props = obj.getProperties();

    new Springboard( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    jack.toFront();

    ```


    最后，像往常一样，你需要指定杰克与弹簧板交互时发生的事件，这还包括刚才描述的额外条件。在`update`方法中添加以下代码：


    ```

    for (BaseActor springboard : BaseActor.getList(mainStage, "Springboard"))

    {

    if ( jack.belowOverlaps(springboard) && jack.isFalling() )

    {

    jack.spring();

    }

    }

    ```


    你可以测试项目，观看考拉飞向高空！'
  raw: '### Coins


    Next, you will implement the code for the coins, which provide an immediate sense
    of accomplishment and a measure of progress for the player, and many players will
    self-impose a secondary goal of collecting as many coins as possible (and, preferably,
    all the coins). To begin, create a new class called `Coin` that contains the following
    code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Coin extends BaseActor

    {

    public Coin(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/items/coin.png", 1, 6, 0.1f, true);

    }

    }

    ```


    Next, to create instances of the coin based on the tilemap data, in the `LevelScreen`
    class, add the following code to the `initialize` method:


    ```

    for (MapObject obj : tma.getTileList("Coin") )

    {

    MapProperties props = obj.getProperties();

    new Coin( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    ```


    Finally, to handle what happens when Jack the Koala collects a coin (increasing
    the coin variable, updating the display, and removing the coin from the level),
    in the `update` method (after the conditional statement that checks if the game
    is over), add the following code:


    ```

    for (BaseActor coin : BaseActor.getList(mainStage, "Coin"))

    {

    if ( jack.overlaps(coin) )

    {

    coins++;

    coinLabel.setText("Coins: " + coins);

    coin.remove();

    }

    }

    ```


    At this point, you can test your game and verify that coin collecting works as
    intended, although depending on your level design, the koala might not be able
    to reach some of the coins yet.


    ### Time and Timers


    Next, you will add the time-based functionality, which provides a sense of urgency
    and tension in the game, depending on the amount of time available to the player.
    The timer objects will add a sense of relief to the player by increasing the amount
    of time available. Timer objects can also be used to create a set of forced checkpoints:
    if it is impossible for the player to reach the goal flag in the amount of time
    initially given, they will be forced to collect the timer objects along the way.
    If you opt for this design, don’t forget to test your level to make sure that
    it is possible to reach the goal! To begin, create a new class called `Timer`
    with the following code. Note that since there is no image-based animation, a
    value-based animation (a pulsing action) is added to draw the player’s attention
    and indicate that this object is interactive.


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Timer extends BaseActor

    {

    public Timer(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/items/timer.png");

    Action pulse = Actions.sequence(

    Actions.scaleTo(1.1f, 1.1f, 0.5f),

    Actions.scaleTo(1.0f, 1.0f, 0.5f) );

    addAction( Actions.forever(pulse) );

    }

    }

    ```


    Next, to create instances of timers based on the tilemap data, in the `LevelScreen`
    class, add the following code to the `initialize` method:


    ```

    for (MapObject obj : tma.getTileList("Timer") )

    {

    MapProperties props = obj.getProperties();

    new Timer( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    ```


    Finally, you need to automatically decrement the `time` variable, update the display,
    increase the time remaining when a timer is collected, and end the game when the
    time runs out. To do so, add the following code to the `update` method:


    ```

    time -= dt;

    timeLabel.setText("Time: " + (int)time);

    for (BaseActor timer : BaseActor.getList(mainStage, "Timer"))

    {

    if ( jack.overlaps(timer) )

    {

    time += 20;

    timer.remove();

    }

    }

    if (time <= 0)

    {

    messageLabel.setText("Time Up - Game Over");

    messageLabel.setColor(Color.RED);

    messageLabel.setVisible(true);

    jack.remove();

    gameOver = true;

    }

    ```


    Once again, feel free to test your code to verify that the time-related functionality
    works as expected.


    ### Springboards


    Jumping is an integral part of any platformer game. However, the player’s character
    is typically unable to reach the top of the screen from the bottom with a single
    jump. To reach these higher locations, you could add a staircase-like series of
    solid tiles or, as an alternative, an object that launches the character high
    into the air (higher than a normal jump). In this spirit, this game features springboard
    objects, which appear to the player as bouncy platforms. If the koala lands on
    top of one, he will be launched high into the air. (Simply walking past the object
    will not trigger this effect, so as to give the player more agency in determining
    whether they want to make use of the springboard or not.) First, you need to create
    a class to represent this object. Create a new class called `Springboard` as follows:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Springboard extends BaseActor

    {

    public Springboard(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/items/springboard.png", 1, 3, 0.2f, true);

    }

    }

    ```


    Next, in the `Koala` class, add the following methods, which will be used to determine
    if the koala is falling and then, if so, launch the koala into the air (similar
    to the `jump` method):


    ```

    public boolean isFalling()

    {

    return (velocityVec.y < 0);

    }

    public void spring()

    {

    velocityVec.y = 1.5f * jumpSpeed;

    }

    ```


    Next, to set up the springboards , in the LevelScreen class, add the following
    code to the initialize method. Also note the use of the toFront method, which
    will cause the koala to appear in front of the springboards (rather than behind)
    when walking by them.


    ```

    for (MapObject obj : tma.getTileList("Springboard") )

    {

    MapProperties props = obj.getProperties();

    new Springboard( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    jack.toFront();

    ```


    Finally, as usual, you need specify what happens when Jack interacts with a springboard,
    which also includes the additional conditions just described. In the `update`
    method, add the following code:


    ```

    for (BaseActor springboard : BaseActor.getList(mainStage, "Springboard"))

    {

    if ( jack.belowOverlaps(springboard) && jack.isFalling() )

    {

    jack.spring();

    }

    }

    ```


    Feel free to test your project and watch the koala fly high into the air!'
