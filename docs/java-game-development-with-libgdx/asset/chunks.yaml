- fmt: '# Game Project: Space Rocks


    When starting a new game project, before writing any code, it is important to
    plan out the features in detail. A game design document serves as the blueprint
    or master plan for creating a game: it describes the overall vision of a game,
    provides clarity and focus, and serves as a guide and a reference to the person
    or people working on the game. Game design documents are described in more detail
    in the appendix of this book. As each new game is introduced in this book, a detailed
    description will be given following the guidelines of such a document; what follows
    is the description of the Space Rocks game.


    Space Rocks is a space-themed shoot-em-up game. The player controls a spaceship,
    whose goal is to shoot lasers and destroy rocks that are flying around the screen.
    The game world has a top-down perspective and features wraparound: when an object
    moves past the edge of the screen, it reappears on the opposite edge.


    The spaceship can rotate to its left and right and accelerate in the direction
    it is facing. There is very little deceleration. The spaceship is able to shoot
    lasers, which travel in a straight line for one second, then fade out and disappear
    from the game if they haven’t collided with a rock. If the laser hits a rock,
    then the laser and rock are both destroyed. The spaceship is surrounded by a shield.
    If the spaceship is hit by a rock while the shields are active, the rock is destroyed
    and the shields lose power. After shield power is reduced to 0, the shields disappear,
    and being hit by a rock destroys the spaceship and ends the game. The spaceship
    also has the ability to instantly and randomly teleport to a new location on the
    screen.


    The player rotates left and right and accelerates forward with the arrow keys.
    Due to the small amount of deceleration, in order to stop suddenly the player
    will have to turn around and accelerate in the opposite direction. Lasers are
    fired using the spacebar key and can be fired as quickly as the player wishes.
    Teleportation is activated with the X key. While this can be used for quick escapes
    from an imminent collision, there is the possibility of teleporting onto a rock,
    and so the player may choose to use this ability sparingly.


    The graphics required for this game include a starfield for the background and
    images for the spaceship, laser, and rock. There will be special effects used
    to provide visual user feedback. There will be an animated explosion for when
    rocks or the spaceship are destroyed, a rocket thruster fire image that appears
    when the player is accelerating, and an animated wormhole effect when the teleportation
    ability is used, which will appear at both the original and the new locations
    of the spaceship. If the player wins the game, a “Congratulations” message will
    appear; if the player loses, a “Game Over” message will appear.


    To begin, create a new project in BlueJ named `Space Rocks`. Download the source
    code files for this chapter on the website for this book. In the project directory
    that is created by BlueJ, create a new folder called `assets`. Copy all the image
    files from the downloaded project’s `assets` folder into your new project’s `assets`
    folder. Next (if you haven’t set up the BlueJ `userlibs` folder), in your project
    directory, create a new folder named `+libs`. Copy the JAR files from the downloaded
    project’s `+libs` folder into your new project’s `+libs` folder. From your previous
    BlueJ project, Starfish Collector Ch 3, copy the files `BaseGame.java`, `BaseScreen.java`,
    and `BaseActor.java` into the Space Rocks project directory. Restart BlueJ so
    that the Java source code and JAR files newly added to the `+libs` folder are
    properly recognized by BlueJ.


    ## Discrete Input


    In the game from the previous chapter, Starfish Collector, the only action performed
    by the turtle was movement. You handled this by checking at every possible moment
    (in the `act` method, which runs 60 times per second) if certain keys were being
    held down, and, if so, you accelerated the turtle in the corresponding direction.
    This is an example of a continuous action: an action that takes place over an
    interval of time. Other examples of continuous actions include walking, rotating,
    or sleeping. In contrast, a discrete action happens at a single instant in time.
    Examples include jumping, hitting an object, or shooting a projectile. With the
    keyboard, continuous actions typically involve holding a key down for a period
    of time, whereas discrete actions are triggered the instant a key is pressed.
    Mouse-based actions can also fall into either category: clicking on a button is
    a discrete action, while dragging a slider is a continuous action.


    The main new feature that will be added to your custom framework classes is the
    ability to handle discrete input. Up to this point, you have been using a technique
    called input polling: repeatedly checking the status of an input device (such
    as a keyboard). In particular, you have been checking in the `act` or `update`
    methods (which typically run 60 times per second) whether particular keys were
    being held down or not. This is a fine way to handle continuous actions, but this
    approach will not work for discrete actions.


    Fortunately, the LibGDX library provides a framework to handle discrete events
    as well. This involves writing functions that are automatically called when certain
    events occur (such as the initial press or release of a key or click of a mouse
    button). Any object can be assigned the responsibility of responding to discrete
    input events, but in order to do so correctly, it must contain a particular set
    of methods: those specified by the `InputProcessor` interface. There are a total
    of eight methods required by this interface:


    *   `keyDown`, `keyUp`, and `keyTyped` to handle keyboard events

    *   `touchDown`, `touchUp`, and `touchDragged` to handle both mouse and touchscreen
    events

    *   `mouseMoved` and `scrolled` to handle mouse events


    The final question we need to address in this section is this: which object should
    bear the responsibility of responding to input events? On one hand, the `Stage`
    class already implements the `InputProcessor` interface; this is particularly
    helpful for a `Stage` that contains user-interface elements, because it enables
    button-like objects to activate methods when they are clicked. On the other hand,
    it would be convenient if the `BaseScreen` class implemented the `InputProcessor`
    interface so that when you write a class that extends `BaseScreen`, your class
    can include methods to handle discrete keyboard input. So, should the `Stage`
    class or the `BaseScreen` class be in charge of responding to input events? In
    practice, you want both objects to have the opportunity to do so. The way this
    arrangement will be implemented in your code is via the `InputMultiplexer` class.
    An `InputMultiplexer` object is itself an `InputProcessor` that contains a list
    of other `InputProcessors`. You can add the `Stage` and `BaseScreen` objects to
    an `InputMultiplexer`, and when input events occur, the `InputMultiplexer` will
    forward along the input data to each of these objects and give them the opportunity
    to respond accordingly.


    First, you will modify the `BaseGame` class. Add the following `import` statements:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.InputMultiplexer;

    ```


    Next, you will add a `create` method to the `BaseGame` class, which is automatically
    called by LibGDX and will be used to initialize the `InputMultiplexer` object.
    (Adding `InputProcessors` will be handled later by the `BaseScreen` class.)'
  raw: '## Game Project: Space Rocks


    When starting a new game project, before writing any code, it is important to
