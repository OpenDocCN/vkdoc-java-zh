  trans: '

    ## 游戏项目：太空岩石


    在启动新游戏项目时，在编写任何代码之前，详细规划功能至关重要。游戏设计文档是创建游戏的蓝图或总体规划：它描述了游戏的总体愿景，提供了清晰度和重点，并作为游戏开发人员的指南和参考。本书附录中更详细地描述了游戏设计文档。随着本书中每个新游戏的引入，将按照此类文档的指导方针给出详细描述；以下是对《太空岩石》游戏的描述。


    《太空岩石》是一款太空主题的射击游戏。玩家控制一艘宇宙飞船，其目标是发射激光并摧毁在屏幕上飞行的岩石。游戏世界采用俯视视角，并具有环绕功能：当物体移出屏幕边缘时，它会从对侧边缘重新出现。


    宇宙飞船可以向左和向右旋转，并朝其面对的方向加速。减速效果非常小。飞船能够发射激光，激光沿直线飞行一秒钟，如果未与岩石碰撞，则会逐渐淡出并从游戏中消失。如果激光击中岩石，则激光和岩石都会被摧毁。飞船被护盾包围。如果护盾激活时飞船被岩石击中，岩石会被摧毁，护盾会失去能量。当护盾能量降至
    0 后，护盾消失，此时被岩石击中会摧毁飞船并结束游戏。飞船还具有瞬间随机传送到屏幕上新位置的能力。


    玩家使用方向键控制飞船左右旋转和向前加速。由于减速效果很小，为了突然停止，玩家必须掉头并向相反方向加速。使用空格键发射激光，玩家可以随心所欲地快速发射。使用
    X 键激活传送。虽然这可用于快速躲避即将发生的碰撞，但也有可能传送到岩石上，因此玩家可能会谨慎使用此能力。


    本游戏所需的图形包括用于背景的星空图，以及用于飞船、激光和岩石的图像。将使用特效来提供视觉用户反馈。当岩石或飞船被摧毁时，会有爆炸动画；当玩家加速时，会出现火箭推进器火焰图像；当使用传送能力时，会出现一个虫洞效果动画，该动画会出现在飞船的原始位置和新位置。如果玩家获胜，将显示“恭喜”消息；如果玩家失败，将显示“游戏结束”消息。


    首先，在 BlueJ 中创建一个名为 `Space Rocks` 的新项目。从本书网站下载本章的源代码文件。在 BlueJ 创建的项目目录中，创建一个名为
    `assets` 的新文件夹。将下载项目 `assets` 文件夹中的所有图像文件复制到新项目的 `assets` 文件夹中。接下来（如果您尚未设置 BlueJ
    的 `userlibs` 文件夹），在您的项目目录中，创建一个名为 `+libs` 的新文件夹。将下载项目 `+libs` 文件夹中的 JAR 文件复制到新项目的
    `+libs` 文件夹中。从您之前的 BlueJ 项目（Starfish Collector Ch 3）中，将 `BaseGame.java`、`BaseScreen.java`
    和 `BaseActor.java` 文件复制到 Space Rocks 项目目录中。重新启动 BlueJ，以便 BlueJ 能正确识别新添加到 `+libs`
    文件夹中的 Java 源代码和 JAR 文件。


    ## 离散输入


    在上一章的《海星收集者》游戏中，乌龟执行的唯一动作是移动。您通过在每个可能的时刻（在 `act` 方法中，该方法每秒运行 60 次）检查某些键是否被按住，如果是，则让乌龟向相应方向加速来处理此问题。这是一个连续动作的示例：一个在一段时间间隔内发生的动作。连续动作的其他示例包括行走、旋转或睡眠。相比之下，离散动作发生在单个时间瞬间。示例包括跳跃、击中物体或发射抛射物。对于键盘，连续动作通常涉及按住一个键一段时间，而离散动作则在按下键的瞬间触发。基于鼠标的动作也可以归入这两类：点击按钮是离散动作，而拖动滑块是连续动作。


    将添加到自定义框架类的主要新功能是处理离散输入的能力。到目前为止，您一直在使用一种称为输入轮询的技术：反复检查输入设备（例如键盘）的状态。具体来说，您一直在
    `act` 或 `update` 方法（通常每秒运行 60 次）中检查特定键是否被按住。这是处理连续动作的好方法，但这种方法不适用于离散动作。


    幸运的是，LibGDX 库也提供了处理离散事件的框架。这涉及编写在特定事件发生时（例如，首次按下或释放键，或点击鼠标按钮）自动调用的函数。任何对象都可以被分配响应离散输入事件的责任，但为了正确执行此操作，它必须包含一组特定的方法：即
    `InputProcessor` 接口指定的方法。该接口总共需要八个方法：


    *   `keyDown`、`keyUp` 和 `keyTyped` 用于处理键盘事件

    *   `touchDown`、`touchUp` 和 `touchDragged` 用于处理鼠标和触摸屏事件

    *   `mouseMoved` 和 `scrolled` 用于处理鼠标事件


    本节中我们需要解决的最后一个问题是：哪个对象应该承担响应输入事件的责任？一方面，`Stage` 类已经实现了 `InputProcessor` 接口；这对于包含用户界面元素的
    `Stage` 特别有用，因为它使类似按钮的对象在被点击时能够激活方法。另一方面，如果 `BaseScreen` 类实现了 `InputProcessor`
    接口，那么当您编写一个扩展 `BaseScreen` 的类时，您的类就可以包含处理离散键盘输入的方法，这将非常方便。那么，应该由 `Stage` 类还是 `BaseScreen`
    类来负责响应输入事件呢？在实践中，您希望两个对象都有机会这样做。在您的代码中，这种安排将通过 `InputMultiplexer` 类来实现。一个 `InputMultiplexer`
    对象本身就是一个 `InputProcessor`，它包含一个其他 `InputProcessor` 的列表。您可以将 `Stage` 和 `BaseScreen`
    对象添加到一个 `InputMultiplexer` 中，当输入事件发生时，`InputMultiplexer` 会将输入数据转发给这些对象中的每一个，并让它们有机会做出相应的响应。


    首先，您将修改 `BaseGame` 类。添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.InputMultiplexer;

    ```


    接下来，您将向 `BaseGame` 类添加一个 `create` 方法，该方法由 LibGDX 自动调用，并将用于初始化 `InputMultiplexer`
    对象。（添加 `InputProcessors` 将在稍后由 `BaseScreen` 类处理。）

    '
- fmt: "```java\npublic void create()\n{\n    // prepare for multiple classes/stages\
    \ to receive discrete input\n    InputMultiplexer im = new InputMultiplexer();\n\
    \    Gdx.input.setInputProcessor( im );\n}\n```\n\nNow, you will turn your attention\
    \ to the `BaseScreen` class. First, add the following `import` statements:\n\n\
    ```java\nimport com.badlogic.gdx.InputProcessor;\nimport com.badlogic.gdx.InputMultiplexer;\n\
    ```\n\nNext, you will change the declaration of the class to take into account\
    \ that the `InputProcessor` methods will be implemented by this class. You can\
    \ declare that multiple interfaces will be implemented by listing them after the\
    \ keyword `implements` and separating them with commas, as follows:\n\n```java\n\
    public abstract class BaseScreen implements Screen, InputProcessor\n```\n\nYou\
    \ will add empty methods for everything required by the `InputProcessor` interface;\
    \ any methods that you actually plan to use, you can override in your extension\
    \ of the `BaseScreen` class. You will notice that each of these methods returns\
    \ a Boolean value. This value indicates whether this input data has been completely\
    \ handled by this `InputProcessor`; if set to `true`, the input data will not\
    \ be sent to any of the other `InputProcessors` stored in the `InputMultiplexer`.\
    \ All the default values are set to `false` so that each `InputProcessor` will\
    \ have the opportunity to process the data. The methods you need to add are as\
    \ follows:\n\n```java\n// methods required by InputProcessor interface\npublic\
    \ boolean keyDown(int keycode)\n{  return false;  }\npublic boolean keyUp(int\
    \ keycode)\n{  return false;  }\npublic boolean keyTyped(char c)\n{  return false;\
    \  }\npublic boolean mouseMoved(int screenX, int screenY)\n{  return false;  }\n\
    public boolean scrolled(int amount)\n{  return false;  }\npublic boolean touchDown(int\
    \ screenX, int screenY, int pointer, int button)\n{  return false;  }\npublic\
    \ boolean touchDragged(int screenX, int screenY, int pointer)\n{  return false;\
    \  }\npublic boolean touchUp(int screenX, int screenY, int pointer, int button)\n\
    {  return false;  }\n```\n\nFinally, both of the `Stage` objects and the `BaseScreen`\
    \ class itself should be added to the game’s `InputMultiplexer` when this screen\
    \ is displayed, and removed from the `InputMultiplexer` when a new screen is set.\
    \ The best place to add this code is in the methods `show` and `hide` (previously\
    \ required by the `Screen` interface), which are called when the screen appears\
    \ and disappears in the game, respectively. First, change the `show` method as\
    \ follows:\n\n```java\npublic void show()\n{\n    InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();\n\
    \    im.addProcessor(this);\n    im.addProcessor(uiStage);\n    im.addProcessor(mainStage);\n\
    }\n```\n\nThen, change the `hide` method as follows:\n\n```java\npublic void hide()\n\
    {\n    InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();\n\
    \    im.removeProcessor(this);\n    im.removeProcessor(uiStage);\n    im.removeProcessor(mainStage);\n\
    }\n```\n\nAt this point, you are ready to handle discrete input, and you can create\
    \ the custom classes for the game entities in the Space Rocks game.\n\n## Spaceship\
    \ Setup\n\nIn this section, you will add code for the spaceship and its related\
    \ features and abilities: wrapping around the screen, thrusters that appear when\
    \ the spaceship is accelerating, shields that surround the ship and protect it\
    \ from rock collisions a number of times, and a teleporting ability that moves\
    \ the ship to a random location on the screen.\n\nFirst, create a new class named\
    \ `Spaceship` with the following code:\n\n```java\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
    import com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\npublic class\
    \ Spaceship extends BaseActor\n{\n    public Spaceship(float x, float y, Stage\
    \ s)\n    {\n        super(x,y,s);\n        loadTexture( \"assets/spaceship.png\"\
    \ );\n        setBoundaryPolygon(8);\n        setAcceleration(200);\n        setMaxSpeed(100);\n\
    \        setDeceleration(10);\n    }\n    public void act(float dt)\n    {\n \
    \       super.act( dt );\n        float degreesPerSecond = 120; // rotation speed\n\
    \        if (Gdx.input.isKeyPressed(Keys.LEFT))\n            rotateBy(degreesPerSecond\
    \ * dt);\n        if (Gdx.input.isKeyPressed(Keys.RIGHT))\n            rotateBy(-degreesPerSecond\
    \ * dt);\n        if (Gdx.input.isKeyPressed(Keys.UP))\n            accelerateAtAngle(\
    \ getRotation() );\n        applyPhysics(dt);\n    }\n}\n```\n\nThis class handles\
    \ the standard tasks of loading an image, setting up a collision polygon, and\
    \ specifying the physics setting. Note that the deceleration value is close to\
    \ zero; this is meant to simulate the lack of friction or air resistance that\
    \ slows down objects in outer space. Also notice in the `act` method that the\
    \ left and right arrow keys are used to rotate the spaceship to its left and right\
    \ (in contrast to moving the object to the screen’s left and right, as was the\
    \ case in the Starfish Collector game), and the up arrow key accelerates the spaceship\
    \ forward; that is, in the direction it is currently facing.\n\nThe next characteristic\
    \ movement feature is wrapping around the screen. Since many objects in the Space\
    \ Rocks game share this feature, you will implement this feature by adding the\
    \ following method to the `BaseActor` class:\n\n```java\npublic void wrapAroundWorld()\n\
    {\n    if (getX() + getWidth() < 0)\n        setX( worldBounds.width );\n    if\
    \ (getX() > worldBounds.width)\n        setX( -getWidth());\n    if (getY() +\
