  raw: '### Polygons Versus Rectangles


    A `Polygon` is a data structure that defines a shape in terms of the coordinates
    of its vertices (corners); it is initialized with an array of `float` values that
    define the coordinates of the vertices, one after the other. (In contrast, the
    `Rectangle` class only requires a single vertex—the bottom-left corner—in addition
    to the width and height.) For example, if the vertices of a polygon are (x0,y0),
    (x1,y1), ... , (xN,yN), then the corresponding `Polygon` object would be initialized
    with the array `{x0, y0, x1, y1, ... , xN, yN}`. For instance, to create a polygon
    that is the same shape as a rectangle with bottom-left corner vertex (0,0), width
    w, and height h (as pictured in Figure [3-7](#A352797_2_En_3_Chapter.html#Fig7)),
    the vertices (in counter-clockwise order) are (0,0), (w,0), (w,h), and (0,h),
    and you would use the array `{0, 0, w, 0, w, h, 0, h}`.


    ![A352797_2_En_3_Fig7_HTML.jpg](A352797_2_En_3_Fig7_HTML.jpg)


    Figure 3-7.


    The vertices of a rectangle with width w and height h


    In fact, a rectangular polygon will be used as the default shape for all game
    objects (a second option will be discussed later). An important reason to use
    the `Polygon` class rather than the `Rectangle` class is that a `Polygon` object
    can also rotated, which is useful for game entities that also rotate (such as
    the turtle in Starfish Collector).


    To begin, add the following `import` statement to the `BaseActor` class:


    ```

    import com.badlogic.gdx.math.Polygon;

    ```


    Add the following field variable to the class:


    ```

    private Polygon boundaryPolygon;

    ```


    Next, add the following method, which creates a rectangular polygon as just described:


    ```

    public void setBoundaryRectangle()

    {

    float w = getWidth();

    float h = getHeight();

    float[] vertices = {0,0, w,0, w,h, 0,h};

    boundaryPolygon = new Polygon(vertices);

    }

    ```


    The best place to call this method so that this shape is automatically set as
    the default is as soon as the width and height are set, which typically happens
    in the `setAnimation` method. At the end of this method, add the following code:


    ```

    if (boundaryPolygon == null)

    setBoundaryRectangle();

    ```


    The next (and most complicated) task is to write a method to initialize a polygon
    shape that is “rounder” than a rectangle (to avoid the issue of overlapping corners
    that only contain transparent pixels). For this purpose, you will create a polygon
    that approximates the shape of an ellipse[²](#A352797_2_En_3_Chapter.html#Fn2)
    contained within the rectangular region pictured in Figure [3-8](#A352797_2_En_3_Chapter.html#Fig8).
    This method involves some mathematical equations to calculate the coordinates
    of the vertices. The trigonometric functions sine and cosine can be used to parameterize
    a circle or an ellipse, which means you can write functions for the x and y coordinates
    in terms of another variable, t. For example, if we let x = cos(t) and y = sin(t),
    then as the variable t takes on values ranging from 0 to 2 × pi (approximately
    6.28),[³](#A352797_2_En_3_Chapter.html#Fn3) the corresponding (x,y) points will
    trace out the shape of a circle with radius 1\. You can adapt these equations
    to generate an ellipse that fits snugly within the given rectangular region, as
    illustrated in Figure [3-8](#A352797_2_En_3_Chapter.html#Fig8). First, you must
    scale (multiply) x by w/2, and y by h/2, so the ellipse has the correct size.
    However, the resulting ellipse is centered at the origin, and you want the ellipse
    to be centered at (w/2, h/2); therefore, add these values to the x and y equations,
    respectively. The final form of the equations are as follows:


    ![A352797_2_En_3_Fig8_HTML.jpg](A352797_2_En_3_Fig8_HTML.jpg)


    Figure 3-8.


    Ellipse contained within a rectangle


    ```

    x = w/2 * cos(t) + w/2

    y = h/2 * sin(t) + h/2

    ```


    The `setBoundaryPolygon` method contains a loop to generate a set of n equally
    spaced values for t in the interval [0, 6.28], then calculates the corresponding
    x and y coordinates and stores them in an array that will be used to initialize
    the polygon. If n = 4, the polygon will be a diamond shape; if n = 8, the polygon
    will be an octagon shape, and so forth. The larger the value of n, the smoother
    the shape will be. However, there is a trade-off: collision detection for general
    polygons is computationally intensive; large values of n can drastically slow
    down your program . For the games created in this book, a value of n = 8 should
    be sufficiently accurate. An ellipse alongside a polygon approximation with n
    = 8 is illustrated in Figure [3-9](#A352797_2_En_3_Chapter.html#Fig9).


    ![A352797_2_En_3_Fig9_HTML.jpg](A352797_2_En_3_Fig9_HTML.jpg)


    Figure 3-9.


    An ellipse and an eight-sided polygon approximation of the ellipse


    The code for `setBoundaryPolygon` is provided next. It is important to remember
    to not call this method until after the size of the `Actor` object has been set
    (either manually from the `setSize` method or automatically from the `setAnimation`
    method), since this method requires values for the width and height to be set
    in order to work correctly .


    ```

    public void setBoundaryPolygon(int numSides)

    {

    float w = getWidth();

    float h = getHeight();

    float[] vertices = new float[2*numSides];

    for (int i = 0; i < numSides; i++)

    {

    float angle = i * 6.28f / numSides;

    // x-coordinate

    vertices[2*i] = w/2 * MathUtils.cos(angle) + w/2;

    // y-coordinate

    vertices[2*i+1] = h/2 * MathUtils.sin(angle) + h/2;

    }

    boundaryPolygon = new Polygon(vertices);

    }

    ```


    Next is a method named `getBoundaryPolygon` that returns the collision polygon
    for this `Actor`, adjusting it according to the `Actor` object’s current parameters
    (such as position and rotation).


    ```

    public Polygon getBoundaryPolygon()

    {

    boundaryPolygon.setPosition( getX(), getY() );

    boundaryPolygon.setOrigin( getOriginX(), getOriginY() );

    boundaryPolygon.setRotation ( getRotation() );

    boundaryPolygon.setScale( getScaleX(), getScaleY() );

    return boundaryPolygon;

    }

    ```'
