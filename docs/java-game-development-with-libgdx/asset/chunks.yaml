    ## The Hero


    In this section, you will create the code for the hero character. Since this game
    features a top-down perspective, the hero will have four different animations
    corresponding to walking in each of the four compass directions (north, south,
    east, and west). The main responsibilities of this class are to initialize the
    animations and display the correct animation depending on the actual angle of
    motion. It will also be important for this class to be able to determine the angle
    at which the character is currently facing (which will be a multiple of 90 degrees).


    For adventure games or role-playing games, many spritesheets containing top-down
    character-walking animations typically contain the animation frames for all four
    directions in a single spritesheet, one direction per row, as illustrated in Figure
    [12-6](#A352797_2_En_12_Chapter.html#Fig6). This layout standard has been popularized
    in particular by the game engine software RPG Maker. To extract the animation
    frames from the individual rows and create the corresponding animation will require
    the use of the `TextureRegion` class `split` method, as you will see.


    ![A352797_2_En_12_Fig6_HTML.jpg](A352797_2_En_12_Fig6_HTML.jpg)


    Figure 12-6.


    A single spritesheet containing walking animations for four directions


    To begin, create a class called `Hero` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.utils.Array;

    public class Hero extends BaseActor

    {

    Animation north;

    Animation south;

    Animation east;

    Animation west;

    float facingAngle;

    public Hero(float x, float y, Stage s)

    {

    super(x,y,s);

    String fileName = "assets/hero.png";

    int rows = 4;

    int cols = 4;

    Texture texture = new Texture(Gdx.files.internal(fileName), true);

    int frameWidth  = texture.getWidth()  / cols;

    int frameHeight = texture.getHeight() / rows;

    float frameDuration = 0.2f;

    TextureRegion[][] temp = TextureRegion.split(texture, frameWidth, frameHeight);

    Array textureArray = new Array();

    for (int c = 0; c < cols; c++)

    textureArray.add( temp[0][c] );

    south = new Animation(frameDuration, textureArray, Animation.PlayMode.LOOP_PINGPONG);

    textureArray.clear();

    for (int c = 0; c < cols; c++)

    textureArray.add( temp[1][c] );

    west = new Animation(frameDuration, textureArray, Animation.PlayMode.LOOP_PINGPONG);

    textureArray.clear();

    for (int c = 0; c < cols; c++)

    textureArray.add( temp[2][c] );

    east = new Animation(frameDuration, textureArray, Animation.PlayMode.LOOP_PINGPONG);

    textureArray.clear();

    for (int c = 0; c < cols; c++)

    textureArray.add( temp[3][c] );

    north = new Animation(frameDuration, textureArray, Animation.PlayMode.LOOP_PINGPONG);

    setAnimation(south);

    facingAngle = 270;

    setBoundaryPolygon(8);

    setAcceleration(400);

    setMaxSpeed(100);

    setDeceleration(400);

    }

    }

    ```


