    therefore their classes will extend the `Solid` class. The bushes will be destroyed
    when hit by the sword, while the rocks will not. The rocks are being implemented
    as their own object (rather than as a tile) so that a non-square boundary polygon
    can be set.


    To begin, create a class named `Bush` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Bush extends Solid

    {

    public Bush(float x, float y, Stage s)

    {

    super(x,y,32,32,s);

    loadTexture("assets/bush.png");

    setBoundaryPolygon(8);

    }

    }

    ```


    Then, create a class named `Rock` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Rock extends Solid

    {

    public Rock(float x, float y, Stage s)

    {

    super(x,y,32,32,s);

    loadTexture("assets/rock.png");

    setBoundaryPolygon(8);

    }

    }

    ```


    To create these objects from the tilemap data, in the `LevelScreen` class, add
    the following code to the `initialize` method:


    ```

    for (MapObject obj : tma.getTileList("Bush") )

    {

    MapProperties props = obj.getProperties();

    new Bush( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    for (MapObject obj : tma.getTileList("Rock") )

    {

    MapProperties props = obj.getProperties();

    new Rock( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    ```


    Since the `Bush` and `Rock` classes extend the `Solid` class, overlap with these
    objects is already prevented in the `update` method by the `for` loop that iterates
    over the list of `Solid` objects. For the sword to destroy the bushes, add the
    following code to the `update` method:


    ```

    if ( sword.isVisible() )

    {

    for (BaseActor bush : BaseActor.getList(mainStage, "Bush"))

    {

    if (sword.overlaps(bush))

    bush.remove();

    }

    }

    ```


