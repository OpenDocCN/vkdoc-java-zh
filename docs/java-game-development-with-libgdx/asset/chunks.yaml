  trans: '

    ### 默认着色器


    在深入探讨 LibGDX 使用的默认顶点和片段着色器的实际代码之前，先简要概述一下相关的语法和语言。这绝不是一个全面的介绍；如此浩大的工程本身足以写成一整本书！


    OpenGL 中可用的许多变量类型在 Java 中都有对应的类型：


    *   `float`、`int` 和 `bool` 分别指代浮点数、整数和布尔值（一位整数）。

    *   `vec2`、`vec3` 和 `vec4` 指代具有两个、三个和四个分量的向量。这些通常用于存储位置坐标，尽管 `vec4` 也用于存储颜色值（红色、绿色、蓝色和
    Alpha/透明度）。此外，算术运算符（`+`、`-`、`*`、`/`）都可以用于这些类型的实例。

    *   `mat4` 指代一个 4x4 矩阵，通常编码几何变换（由 LibGDX 库自动为您生成）。

    *   `sampler2D` 指代一个二维数值网格，通常是图像关联的颜色数据。


    许多关键字和命令也在 OpenGL 中使用，例如 `if`-`else` 语句、`for` 和 `while` 循环以及逻辑运算符（`&&` 表示“与”，`||`
    表示“或”，`!` 表示“非”）。还有许多可用的数学函数，例如 `sqrt`、`pow`、`sin`、`cos`、`abs`、`round`、`floor`、`max`
    和 `min`，每个函数都直接对应于 Java `Math` 类中的一个函数。您会反复看到的一个特殊的 OpenGL 函数叫做 `texture2D`，它接收一个
    `sampler2D` 和一个 `vec2` 作为输入，并返回向量指定位置处的样本数据（图像中的颜色）；如果该向量不对应于图像中的精确像素，则颜色将从附近像素的颜色中插值得到。


    顶点着色器和片段着色器都必须包含一个名为 `main` 且返回类型为 `void` 的函数。（如果您愿意，可以编写返回非 `void` 值的额外“辅助”函数，但此处不讨论该主题。）顶点着色器必须为变量
    `gl_Position` 赋值一个 `vec4` 值，该值表示顶点的最终位置。片段着色器必须为变量 `gl_FragColor` 赋值一个 `vec4`
    值，该值表示关联像素的最终颜色。


    您还会看到在 `main` 函数外部声明的变量，除了具有特定的数据类型外，它们还具有三个额外限定符之一：


    *   `attribute`：指单个顶点的属性，并且只能出现在顶点着色器程序中。例如，顶点的位置必须限定为 attribute，因为每个顶点的该数据都不同。

    *   `varying`：用于从顶点着色器发送到片段着色器的数据。顶点着色器中的任何 varying 变量声明也应出现在关联的片段着色器中。必须在顶点着色器中为这些变量赋值，并且这些变量在片段着色器中是只读的（不可修改）。片段着色器将根据分配给顶点的值对这些变量的值进行插值。

    *   `uniform`：指对象每个顶点都相同的全局值。例如，与对象关联的纹理数据应限定为 uniform，因为对象的所有顶点的该数据都相同。类似地，几何变换矩阵是
    uniform 变量，因为对象中的所有顶点将以相同方式或相同量进行平移、旋转或缩放。Uniform 变量可以根据需要出现在顶点着色器或片段着色器中。


    有了这些背景知识，您就可以开始研究 LibGDX 提供的默认着色器了。首先是默认顶点着色器的代码。在此代码中，设置了三个 attribute 向量来访问每个顶点的位置、颜色和纹理坐标。一个
    uniform 矩阵存储几何变换数据，因为所有顶点都相同。创建了两个 varying 变量，用于将特定数据（颜色和纹理坐标）转发到片段着色器，片段着色器需要这些数据来确定像素颜色。请注意
    LibGDX 使用的变量命名约定：attribute 变量以 `a_` 为前缀，uniform 变量以 `u_` 为前缀，varying 变量以 `v_`
    为前缀。（本章将始终使用此约定。）最后，请注意 `main` 函数为 varying 变量赋值，并通过将变换矩阵乘以顶点的原始位置来计算 `gl_Position`。


    ```

    attribute vec4 a_position;

    attribute vec4 a_color;

    attribute vec2 a_texCoord0;

    uniform mat4 u_projTrans;

    varying vec4 v_color;

    varying vec2 v_texCoords;

    void main()

    {

    v_color = a_color;

    v_texCoords = a_texCoord0;

    gl_Position = u_projTrans * a_position;

    }

    ```


    接下来是默认片段着色器的代码。在此代码中，有两个 varying 变量，它们对应于顶点着色器中的 varying 变量。还有一个 uniform 变量用于存储纹理数据。在
    `main` 函数中，使用 `texture2D` 函数（前面描述过）从关联的纹理中获取颜色数据。然后将其与从顶点着色器传递过来的颜色相乘，其效果是使用通过
    `setColor` 方法分配给角色的任何颜色对图像进行着色。（与角色关联的默认颜色是白色，由于白色的红色、绿色和蓝色分量都等于 1.0，因此乘以该颜色不会改变原始图像。）结果被赋值给
    `gl_FragColor` 变量，该变量将是关联像素的最终颜色。


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    void main()

    {

    gl_FragColor = v_color * texture2D(u_texture, v_texCoords);

    }

    ```


    现在您已经了解了默认着色器程序是什么，接下来将看到如何将它们整合到您的游戏项目中。

    '
- fmt: '### Using Shaders in LibGDX


    In this section, you will learn how to add shaders to the actors in the Starfish
    Collector game. To begin, make a copy of the `Starfish Collector` project from
    Chapter [5](#A352797_2_En_5_Chapter.html) and rename the copy to `Starfish Collector
    Shaders`. In the `assets` folder of this project, make a new folder named `shaders`;
    this is where you will add text files containing the code for vertex and fragment
    shader programs. Using a text-editor program of your choice, create a new text
    file containing the code from the default vertex shader previously presented;
    save the file in the `shaders` folder with the filename `default.vs` (the extension
    `vs` is a mnemonic for vertex shader). Similarly, create a text file with the
    default fragment shader code and save it to the `shaders` folder with the filename
    `default.fs` (`fs` for fragment shader). In what follows, you will read the contents
    of these files into a `String` in the process of creating shader programs.


    Open the `Starfish Collector Shaders` project. To begin, in the `Turtle` class,
    add the following `import` statements:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.glutils.ShaderProgram;

    import com.badlogic.gdx.graphics.g2d.Batch;

    ```


    Then, add the following variable declarations to the same class:


    ```

    String vertexShaderCode;

    String fragmentShaderCode;

    ShaderProgram shaderProgram;

    ```


    To initialize the shader program, you need the code for both a vertex shader and
    a fragment shader. This can be obtained via the `FileHandle` class `readString`
    method, which returns the entire contents of a text file as a single `String`.
    With this code, you can initialize the `ShaderProgram` object, which automatically
    sends the code to the GPU and compiles it. You also need to check manually for
    errors after compiling the shader programs. To accomplish these tasks, add the
    following code to the `Turtle` class `constructor` method:


    ```

    vertexShaderCode   = Gdx.files.internal("assets/shaders/default.vs").readString();

    fragmentShaderCode = Gdx.files.internal("assets/shaders/default.fs").readString();

    shaderProgram = new ShaderProgram(vertexShaderCode, fragmentShaderCode);

    if (!shaderProgram.isCompiled())

    System.out.println( "Shader compile error: " + shaderProgram.getLog() );

    ```


    Finally, to actually render the turtle using your custom `ShaderProgram` object
    rather than the default, you need to override the `draw` method from the `BaseActor`
    class and set the shader using the `Batch` class `setShader` method. When you
    are finished rendering the turtle, passing `null` as an argument to the `setShader`
    method causes the `Batch` class to return to using the built-in default shader
    provided by LibGDX. Add the following method to the `Turtle` class:


    ```

    public void draw(Batch batch, float parentAlpha)

    {

    batch.setShader(shaderProgram);

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    }

    ```


    At this point, you can test your program. It should appear exactly as it did before
    you added the shader, which is to be expected, since all you did was reconstruct
    the default shaders. However, the framework you have set up will be quite useful,
    as you will be able to rapidly test out a series of shaders you will write in
    the following sections.


    ### Grayscale Shader


    Here, you will write a fragment shader that renders a texture in grayscale. When
    the red, green, and blue components of a color are all equal, the resulting color
    is a shade of gray. Therefore, to convert a color to gray, you can calculate the
    average of its red, green, and blue values and set all the components of the new
    color equal to this average. The alpha value should remain unchanged, however.
    The red, green, blue, and alpha values of a color `c` (stored as a `vec4`) can
    be accessed via `c.r`, `c.g`, `c.b`, and `c.a`, respectively. In a text-editor
    program, create a file named `grayscale.fs` (in the `shaders` directory, as before)
    with the following code:


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    void main()

    {

    vec4 color = texture2D(u_texture, v_texCoords);

    float average = (color.r + color.g + color.b) / 3.0;

    gl_FragColor = vec4(average, average, average, color.a);

    }

    ```


    In your BlueJ project, in the `Turtle` class, locate the line of code in the `constructor`
    method that sets `fragmentShaderCode` and change it to the following:


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/grayscale.fs").readString();

    ```


    That’s all there is to it; run your project, and the turtle should be displayed
    in grayscale!


    ### Custom Uniform Values


    Next, you will write a shader that causes a change in the appearance of an image
    over time. In particular, your next fragment shader will cause the turtle to smoothly
    change between rendering in its original color and in grayscale. To do this requires
    the use of a value that oscillates over time. To this end, you will create a fragment
    shader that contains a new uniform variable, called `u_time`. The `Turtle` class
    will contain a corresponding variable called `time`, updated in its `act` method,
    and the value of `time` will be sent to the shader and stored in the variable
    `u_time`. The first step is to use your text-editor program to create a file in
    the `shaders` folder named `grayscale-pulse.fs` that contains the following:


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    uniform float u_time;

    void main()

    {

    vec4 color = texture2D(u_texture, v_texCoords);

    float average = (color.r + color.g + color.b) / 3.0;

    vec4 grayscale = vec4(average, average, average, color.a);

    float value = (sin(6.28 * u_time) + 1.0) * 0.5;

    gl_FragColor = value * color + (1.0 - value) * grayscale;

    }

    ```


    Note that the variable `value` is based on a sine function, and it will oscillate
    between 0 and 1 once per second. In turn, `gl_FragColor` is set equal to `grayscale`
    when `value` equals `0`, `gl_FragColor` is set equal to `color` when `value` equals
    `1`, and `gl_FragColor` is an intermediate color when `value` is between `0` and
    `1`.


    Next, in BlueJ, in the `Turtle` class, add the following variable declaration:


    ```

    float time;

    ```


    In the `constructor` method, set the initial value of `time` to 0:


    ```

    time = 0;

    ```


    Also, change the line of code that sets `fragmentShaderCode` to the following:


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/grayscale-pulse.fs").readString();

    ```


    In the `act` method, increment `time` by the elapsed time `dt`:


    ```

    time += dt;

    ```


    Finally, change the `draw` method so that it contains the following code:


    ```

    batch.setShader(shaderProgram);

    shaderProgram.setUniformf("u_time", time);

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    ```


    Note that the preceding new line of code sends the value of `time` to the shader
    variable whose name is the String `"u_time"`, and it must be included after the
    shader program is set, but before the call to `super.draw`. (This will be the
    case whenever you need to set the value of a uniform variable.) At this point,
    you are ready to test your program and watch the turtle image shift from full
    color to grayscale and back.'
