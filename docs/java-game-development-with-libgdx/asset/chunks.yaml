    ### 加速度


    在扎实掌握了速度的概念与术语之后，接下来我们转向加速度。正如速度表示位置的变化，加速度则表示速度的变化。在后续内容中，牢记这一类比将大有裨益：加速度之于速度，正如速度之于位置。


    若速度的单位是像素/秒，那么由于加速度衡量的是速度随时间的变化量，其单位即为像素/秒每秒，也可写作(像素/秒)/秒，或像素/秒²。加速度同样采用向量符号表示。基于加速度调整速度的计算，在代数上与基于速度调整位置的计算完全相同。具体而言，若物体的初始速度为
    < a , b >，且存在恒定加速度 < c , d >，则经过 t 秒后，该时刻的速度公式为 < a + t*c , b + t*d >。这些随时间更新的速度值将依次用于更新物体的位置。


    在 `BaseActor` 类中，为方便起见，您将通过设置加速度大小（通过名为 `setAcceleration` 的方法），然后沿指定方向加速（通过名为
    `accelerateAtAngle` 的方法，该方法以方向角为参数）来处理加速度向量。为实现此功能，请添加以下字段：


    ```

    private Vector2 accelerationVec;

    private float acceleration ;

    ```


    在 `constructor` 方法中使用以下语句初始化这些变量：


    ```

    accelerationVec = new Vector2(0,0);

    acceleration = 0;

    ```


    接下来，按前述说明添加以下方法：


    ```

    public void setAcceleration(float acc)

    {

    acceleration = acc;

    }

    public void accelerateAtAngle(float angle)

    {

    accelerationVec.add( new Vector2(acceleration, 0).setAngle(angle) );

    }

    ```


    为方便后续项目，现在正是添加以下方法的好时机，该方法可使物体沿其当前朝向方向加速：


    ```

    public void accelerateForward()

    {

    accelerateAtAngle( getRotation() );

    }

    ```


    最后，还有一些细微的行为需要讨论和实现。当按住方向键时，玩家控制的角色通常应朝该方向加速。然而，大多数物体无法无限加速或提速——它们的移动速度存在上限，即最大速度，该值因物体而异。此外，当松开方向键时，移动的角色通常会减速并最终停止。物体减速的速率（即减速度）可能因情境而异。例如，汽车在沥青路面上比在冰面上减速更快。但有些物体似乎完全不会减速，例如子弹或激光束；它们的减速度为零。这些数值（最大速度和减速度）需要存储起来，并在后续步骤中加以考虑。为此，请在
    `BaseActor` 类中添加以下字段：


    ```

    private float maxSpeed ;

    private float deceleration;

    ```


    在 `constructor` 中按如下方式初始化：


    ```

    maxSpeed = 1000;

    deceleration = 0;

    ```


    同时添加以下用于设置这些值的方法：


    ```

    public void setMaxSpeed(float ms)

    {

    maxSpeed = ms;

    }

    public void setDeceleration(float dec)

    {

    deceleration = dec;

    }

    ```


    ### 移动


    有了这些变量（`velocityVec`、`accelerationVec`、`acceleration`、`maxSpeed` 和 `deceleration`）及其配套方法，您就可以编写执行本节所述计算并相应更新
    `Actor` 对象位置的方法了。该方法将命名为 `applyPhysics`，并需要将自上次更新以来经过的时间量作为参数。该方法将处理以下任务：


    *   根据加速度向量调整速度向量。

    *   如果物体未加速，则必须对当前速度应用减速度值。

    *   确保速度不超过最大速度值。

    *   根据速度向量调整 `Actor` 对象的位置。

    *   重置加速度向量。


    该方法的代码如下：


    ```

    public void applyPhysics(float dt)

    {

    // 应用加速度

    velocityVec.add( accelerationVec.x * dt, accelerationVec.y * dt );

    float speed = getSpeed();

    // 未加速时降低速度（减速）

    if (accelerationVec.len() == 0)

    speed -= deceleration * dt;

    // 将速度保持在设定范围内

    speed = MathUtils.clamp(speed, 0, maxSpeed);

    // 更新速度

    setSpeed(speed);

    // 应用速度

    moveBy( velocityVec.x * dt, velocityVec.y * dt );

    // 重置加速度

    accelerationVec.set(0,0);

    }

    ```


    现在，将这些方法添加到 `BaseActor` 类后，您就可以在“海星收集者”游戏中实现移动了。唯一需要修改的是 `Turtle` 类，因为海龟是唯一会移动的对象。首先，在
    `Turtle` 类中添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    ```


    然后，您需要通过向 `constructor` 方法添加以下代码来初始化一些物理相关参数：


    ```

    setAcceleration(400);

    setMaxSpeed(100);

    setDeceleration(400);

    ```


    从这段代码可以清楚地看出，海龟的最大速度将为 100 像素/秒。加速度值 400 意味着速度每秒会增加 400 像素/秒，但由于最大速度为 100 像素/秒，海龟将在
    100/400 = 0.25 秒内达到此速度（从静止开始）。


    最后，您将添加 `act` 方法，该方法将检查方向键是否被按下，如果是，则使海龟朝相应方向加速。要实际更新海龟的位置，必须调用 `applyPhysics`
    方法。此外，您还将在海龟未移动时暂停动画（并在海龟移动时恢复动画），以及旋转海龟图像使其与运动角度对齐。以下代码实现了这些任务：


    ```

    public void act(float dt)

    {

    super.act( dt );

    if (Gdx.input.isKeyPressed(Keys.LEFT))

    accelerateAtAngle(180);

    if (Gdx.input.isKeyPressed(Keys.RIGHT))

    accelerateAtAngle(0);

    if (Gdx.input.isKeyPressed(Keys.UP))

    accelerateAtAngle(90);

    if (Gdx.input.isKeyPressed(Keys.DOWN))

    accelerateAtAngle(270);

    applyPhysics(dt);

    setAnimationPaused( !isMoving() );

    if ( getSpeed() > 0 )

    setRotation( getMotionAngle() );

    }

    ```


    现在是一个很好的时机来测试代码，验证海龟是否按预期在屏幕上移动。如果您愿意，可以尝试调整加速度、减速度和最大速度的值，观察它们在游戏中的效果。


    目前，当海龟与海星重叠时，不会发生任何事情。这将在下一节中解决，届时将引入碰撞多边形，使您能够判断两个对象何时重叠。


    ## 碰撞多边形


    在上一章创建的“海星收集者”版本中，海龟与海星之间的碰撞对玩家来说并不精确。这是因为使用矩形来近似物体的形状，而每个图像角落附近都包含大片透明像素区域。为了改进游戏的这一方面，在本节中，您将添加使用多边形而非矩形来近似非矩形形状边界的选项。您还将学习如何使用
    `Intersector` 类检测多边形形状的碰撞，以及如何在游戏中模拟实体对象。

