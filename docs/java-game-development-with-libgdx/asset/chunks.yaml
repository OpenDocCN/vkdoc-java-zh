    ## Spaceship Setup


    In this section, you will add code for the spaceship and its related features
    and abilities: wrapping around the screen, thrusters that appear when the spaceship
    is accelerating, shields that surround the ship and protect it from rock collisions
    a number of times, and a teleporting ability that moves the ship to a random location
    on the screen.


    First, create a new class named `Spaceship` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    public class Spaceship extends BaseActor

    {

    public Spaceship(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture( "assets/spaceship.png" );

    setBoundaryPolygon(8);

    setAcceleration(200);

    setMaxSpeed(100);

    setDeceleration(10);

    }

    public void act(float dt)

    {

    super.act( dt );

    float degreesPerSecond = 120; // rotation speed

    if (Gdx.input.isKeyPressed(Keys.LEFT))

    rotateBy(degreesPerSecond * dt);

    if (Gdx.input.isKeyPressed(Keys.RIGHT))

    rotateBy(-degreesPerSecond * dt);

    if (Gdx.input.isKeyPressed(Keys.UP))

    accelerateAtAngle( getRotation() );

    applyPhysics(dt);

    }

    }

    ```


    This class handles the standard tasks of loading an image , setting up a collision
    polygon, and specifying the physics setting. Note that the deceleration value
    is close to zero; this is meant to simulate the lack of friction or air resistance
    that slows down objects in outer space. Also notice in the `act` method that the
    left and right arrow keys are used to rotate the spaceship to its left and right
    (in contrast to moving the object to the screen’s left and right, as was the case
    in the Starfish Collector game), and the up arrow key accelerates the spaceship
    forward; that is, in the direction it is currently facing.


