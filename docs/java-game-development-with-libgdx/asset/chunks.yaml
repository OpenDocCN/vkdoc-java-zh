  trans: "\n# 9. 拖放游戏\n\n在本章中，你将学习如何为游戏添加拖放功能：即点击一个对象，在按住鼠标按钮的同时，让选中的对象跟随鼠标移动，直到松开按钮。由于此功能在许多场景中都非常实用，你将创建一个名为\
    \ `DragAndDropActor` 的 `BaseActor` 类扩展，其中包含相关代码。为了演示这个新类的灵活性，你将创建两个使用该类的全新游戏。第一个是拼图游戏，如图\
    \ 9-1 所示，它由一张被分割成若干碎片的图像组成，玩家需要将这些碎片在网格上正确排列。第二个是一款名为“52 张牌接龙”的纸牌游戏，如图 9-2 所示，玩家需要将一副标准扑克牌正确排列成一组牌堆。\n\
    \n![A352797_2_En_9_Fig2_HTML.jpg](img/A352797_2_En_9_Fig2_HTML.jpg)\n\n图 9-2.\
    \ 一款纸牌游戏\n\n![A352797_2_En_9_Fig1_HTML.jpg](img/A352797_2_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1. 一款拼图游戏\n\n开始这个项目所需的步骤与之前的项目相同：创建一个新项目，创建 `assets` 文件夹和 `+libs` 文件夹（如果你已经设置了\
    \ `userlib` 目录，则后者不是必需的），复制你在本书第一部分创建的自定义框架文件（`BaseGame.java`、`BaseScreen.java`、`BaseActor.java`），并将此项目的图形和音频文件复制到你的\
    \ `assets` 文件夹中。如前一章所述，为了方便起见，已创建了一个名为 `Framework` 的 BlueJ 项目，其中包含这些文件（项目特定的资源除外），以及一个\
    \ `launcher` 类和 `BaseGame` 与 `BaseScreen` 类的扩展。为了提高效率，这些文件将作为起点。要开始第一个项目：\n\n\
    *   下载本章的源代码文件。\n*   复制下载的 `Framework` 文件夹（及其内容），并将其重命名为 `Jigsaw Puzzle`（像往常一样，如果使用\
    \ `userlibs` 文件夹存储 JAR 文件，则不需要 `+libs` 文件夹）。\n*   将下载的 `Jigsaw Puzzle` 项目 `assets`\
    \ 文件夹中的所有内容复制到你新创建的 `Jigsaw Puzzle assets` 文件夹中。\n*   打开 `Jigsaw Puzzle` 文件夹中的\
    \ BlueJ 项目。\n*   在 `CustomGame` 类中，将类名改为 `JigsawPuzzleGame`（BlueJ 随后会将源代码文件重命名为\
    \ `JigsawPuzzleGame.java`）。\n*   在 `Launcher` 类中，将 `main` 方法的内容修改为以下内容：\n\n  \
    \  ```\n    Game myGame = new JigsawPuzzleGame ();\n    LwjglApplication launcher\
    \ = new LwjglApplication(\n    myGame, \"Jigsaw Puzzle Game\", 800, 600 );\n \
    \   ```\n\n在下一节中，你将创建一些类，这些类将封装此游戏项目以及下一个游戏项目的拖放功能。遗憾的是，在游戏项目本身取得实质性进展之前，你将无法测试拖放角色类的功能。\n\
    \n## 拖放功能\n\n开发新的 `DragAndDropActor` 类的第一步是考虑需要哪些功能。最重要的是，这个类需要能够响应用户输入。在最初创建\
    \ `BaseScreen` 类时，你实现了 `InputProcessor` 接口，这使得游戏能够通过 `touchDown`、`touchDragged`\
    \ 和 `touchUp` 等方法响应鼠标和触摸输入。类似地，`Actor` 类（以及扩展的 `Group` 类，`BaseActor` 类正是基于 `Group`\
    \ 类）包含一个名为 `addListener` 的方法，该方法允许你向角色附加一个 `InputListener` 对象，该对象实现了与 `InputProcessor`\
    \ 类相同的方法。这些触摸方法具有以下方法签名：\n\n```\npublic void touchDown(InputEvent event, float\
    \ x, float y, int pointer, int button)\npublic void touchDragged(InputEvent event,\
    \ float x, float y, int pointer)\npublic void touchUp(InputEvent event, float\
    \ x, float y, int pointer, int button)\n```\n\n关于触摸方法，最重要的一点是，这些方法中的浮点参数 x 和 y\
    \ 存储的是鼠标相对于被点击对象的坐标——它们表示偏移量，而非绝对位置。例如，如果一个对象的宽度为 200 像素，高度为 300 像素，点击该对象的中心会将\
    \ x 的值设为 100，y 的值设为 150，无论该对象在屏幕上的位置如何。因此，为了在 `touchDragged` 方法中计算角色需要移动多少距离，你需要存储从\
    \ `touchDown` 方法接收到的原始 x 和 y 偏移量。\n\n了解了这些之后，你现在可以开始编写一些代码了。首先，创建一个名为 `DragAndDropActor`\
