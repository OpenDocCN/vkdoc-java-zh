- fmt: '# Managing Game Entities with Actors and Stages


    In the previous example—our first iteration of the Starfish Collector game—you
    saw that each game entity (such as the turtle and the starfish) has a lot of related
    information that you need to keep track of, such as textures and (x,y) coordinates.
    A central design principle in an object-oriented programming language like Java
    is to encapsulate related information in a single class. While you could create
    a `Turtle` class, a `Starfish` class, and so forth to manage this information,
    this approach would result in a lot of redundancy in your program, which is both
    inefficient and difficult to manage. Since another guiding principle in software
    engineering is to write reusable code, you want to implement a single class that
    contains the basic information common to all game entities, which you can then
    extend when necessary.


    The LibGDX libraries provide a few different classes that can be used to manage
    the data associated with a game object; you will use the LibGDX class `Actor`
    as a foundation. This class stores data such as position, size (width and height),
    rotation, scaling factors, and more. However, it does not include a variable to
    store an image. This seeming “omission” in fact gives you greater flexibility
    in allowing you to specify how the object will be represented. You can extend
    the `Actor` class and include any additional information you need in your game,
    such as collision shapes, one or more images or animations, custom rendering methods,
    and more. The constructor for such an object should call the constructor of the
    class that it extends; this is accomplished by including the statement `super()`.
    For example, a game object that just requires a single `Texture` could use the
    following code:


    ```

    public class TexturedActor extends Actor

    {

    private Texture image;

    // constructor

    public TexturedActor()

    {  super();  }

    public void setTexture(Texture t)

    {  image = t;  }

    public Texture getTexture()

    {  return image;  }

    public void draw(Batch b)

    {

    b.draw( getTexture(), getX(), getY() );

    }

    }

    ```


    For a more complex example, your game might feature a character that has health
    points, and you might want to use different textures depending on how much health
    the character has. Such an object could be created with the following code:


    ```

    public class HealthyActor extends Actor

    {

    private int HP;

    private Texture healthyImage;

    private Texture damagedImage;

    private Texture deceasedImage;

    // omitted: constructor

    // omitted: methods to get/set preceding fields

    public void draw(Batch b)

    {

    if (HP > 50)

    b.draw( healthyImage, getX(), getY() );

    else if (HP > 0 && HP <= 50)

    b.draw( damagedImage, getX(), getY() );

    else    // in this case, HP <= 0

    b.draw( deceasedImage, getX(), getY() );

    }

    }

    ```


    There are a few additional features of the default `Actor` class that should be
    mentioned here. First, in addition to a `draw` method, the `Actor` class has an
    `act` method that can serve to update or modify the state of an `Actor`. Second,
    the `Actor` class was designed to be used in concert with a class called `Stage`
    (which you will be using in the near future). The main role of the `Stage` class
    is to store a list of `Actor` instances; it also contains methods (named `act`
    and `draw`) that call the `act` and `draw` methods of every `Actor` that has been
    added to it, which frees you from having to remember to draw every individual
    `Actor` instance yourself. The `Stage` class also creates and handles a `Batch`
    object, which reduces the amount of code that you need to write.


    The next goal is to write an extension of the `Actor` class; this will require
    accessing and overriding methods already present in the `Actor` class.


    ## Overriding Methods And Accessing Superclass Methods


    When extending a class in Java, you may want to replace a method of the base class
    with a new version of the method. For example, consider a class that represents
    a person, with a method that simulates the person saying hello:


    ```

    public class Person

    {

    public void sayHello()

    {  System.out.print("Hello.");  }

    // other methods omitted

    }

    ```


    In your project, you may want to create extensions of this class, keeping the
    `sayHello` method, but changing the message that is printed. To do so, you only
    need to write a method with the same signature: the same method name, parameters,
    and output type. For example, you could write:


    ```

    public class Shopkeeper extends Person

    {

    public void sayHello()

    {  System.out.print("Greetings, travelers. Do you need any supplies?");  }

    }

    ```


    If you create an instance of a `Shopkeeper`, it will have access to all the fields
    and methods from the `Person` class (since `Shopkeeper` extends the `Person` class),
    but if a `Shopkeeper` instance calls the `sayHello` method, the version in the
    `Shopkeeper` class takes precedence and will be the one that is called. This technique
    is called overriding a method.


    In some situations, however, you will want to build upon (and not replace) the
    code from the class that is being extended (sometimes called the superclass).
    For example, once again you might have a class that represents a person that stores
    a value (`HP`) corresponding to their health, as well as a method that restores
    it to its maximum value, as follows:


    ```

    public class Person

    {

    int HP;

    int maxHP;

    public void restore()

    {

    HP = maxHP;

    }

    }

    ```


    You might also have a class representing a wizard, which is a person that also
    has magical abilities and thus a value corresponding to the amount of magic (`MP`)
    they have available for use. It is natural to extend the `Person` class, and for
    a wizard the `restore` method should set both `HP` and `MP` to their maximum values.
    In this situation, you need the `Wizard` class to override the `restore` method
    of the `Person` class so as to add the magic-related functionality, while at the
    same time you want the `Wizard` class to be able to also run the `restore` method
    from the `Person` class to avoid your having to re-type the corresponding code.
    The way this is accomplished is by using the keyword `super`, which refers to
    the superclass. Within the context of the `Wizard` class, the expression `restore()`
    activates the method present in the `Wizard` class, while the expression `super.restore()`
    activates the method present in the `Person` class, as desired.


    Making use of `super`, the `Wizard` class can be written as follows:


    ```

    public class Wizard extends Person

    {

    int MP;

    int maxMP;

    public void restore()

    {

    super.restore();

    MP = maxMP;

    }

    }

    ```


    As you write new classes that extend and build upon the functionality and methods
    of other classes, you will have the opportunity to use this technique repeatedly.


    The extension of the `Actor` class that will be created for use in this chapter
    is called `ActorBeta`. It will be used to store a `TextureRegion` (which builds
    upon the functionality of the `Texture` class) and a `Rectangle` (used for detecting
    overlap between two objects). In the same BlueJ project, create a new class called
    `ActorBeta` with the following code:'
  raw: '## Managing Game Entities with Actors and Stages


    In the previous example—our first iteration of the Starfish Collector game—you
    saw that each game entity (such as the turtle and the starfish) has a lot of related
    information that you need to keep track of, such as textures and (x,y) coordinates.
    A central design principle in an object-oriented programming language like Java
    is to encapsulate related information in a single class. While you could create
    a `Turtle` class, a `Starfish` class, and so forth to manage this information,
    this approach would result in a lot of redundancy in your program, which is both
    inefficient and difficult to manage. Since another guiding principle in software
    engineering is to write reusable code, you want to implement a single class that
    contains the basic information common to all game entities, which you can then
    extend when necessary.


    The LibGDX libraries provide a few different classes that can be used to manage
    the data associated with a game object; you will use the LibGDX class `Actor`
    as a foundation. This class stores data such as position, size (width and height),
    rotation, scaling factors, and more. However, it does not include a variable to
    store an image. This seeming “omission” in fact gives you greater flexibility
    in allowing you to specify how the object will be represented. You can extend
    the `Actor` class and include any additional information you need in your game,
    such as collision shapes, one or more images or animations, custom rendering methods,
    and more. The constructor for such an object should call the constructor of the
    class that it extends; this is accomplished by including the statement `super()`.
    For example, a game object that just requires a single `Texture` could use the
    following code:


    ```

    public class TexturedActor extends Actor

    {

    private Texture image;

    // constructor

    public TexturedActor()

    {  super();  }

    public void setTexture(Texture t)

    {  image = t;  }

    public Texture getTexture()

    {  return image;  }

    public void draw(Batch b)

    {

    b.draw( getTexture(), getX(), getY() );

    }

    }

    ```


    For a more complex example, your game might feature a character that has health
    points, and you might want to use different textures depending on how much health
    the character has. Such an object could be created with the following code:


