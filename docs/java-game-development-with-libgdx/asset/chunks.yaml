  trans: "\n### 为其他平台编译\n\n为其他平台（例如 Android、iOS 以及通过 HTML5/JavaScript 运行的网页浏览器）编译项目是\
    \ LibGDX 的主要优势之一。然而，要高效地完成此操作，需要使用高级集成开发环境（IDE）。本节仅非常简要地概述了为 Android Studio IDE\
    \ 设置 LibGDX 项目所需的步骤；此过程所需的时间可能比本节篇幅所显示的要长。有关配置 IDE 设置、编译和导出的更多详细信息，您需要查阅所列出的资源。\n\
    \n1.  Android Studio ³ 是一个基于 IntelliJ 平台的 IDE。下载并安装此软件（与 Android SDK 捆绑的版本）后，安装程序很可能会下载一组更新的软件包。\n\
    2.  此过程完成后，请访问 LibGDX Wiki 项目设置网站⁴，并从 wiki 页面上的链接下载 `gdx-tools.jar`，这是一个可执行的 JAR\
    \ 文件。运行此文件，您将看到一个类似于图 17-1 的屏幕。\n\n    ![A352797_2_En_17_Fig1_HTML.jpg](img/A352797_2_En_17_Fig1_HTML.jpg)\n\
    \n    图 17-1.\n\n    LibGDX 项目设置工具\n3.  在此处，您需要为项目输入一个名称、一个包名（例如 `com.mygdx.spacerocks`）、您的\
    \ `Game` 类名称（或者，在我们的扩展框架中，是继承 `BaseGame` 的类）、您希望存储文件的目录，以及安装 Android Studio 时\
    \ Android SDK 的安装路径。\n4.  在接下来的一系列复选框中，您可以指定将要开发的平台（对于初学者，我建议选择 Android 和 Desktop）。如果您的项目需要任何第三方库或扩展（例如\
    \ Box2D 或游戏手柄控制器扩展），您可以在此处指定。\n5.  然后，点击“Generate”按钮，系统将在您设置时指定的目录中为您创建一组项目文件。首次生成项目时，此过程可能需要一些时间，因为设置文件会下载许多依赖文件。\n\
    6.  全部完成后，重启 Android Studio，选择“Import Project”选项，然后选择名为 `build.gradle` 的文件。\n\n\
    当您的项目打开时，您会注意到已经为您准备了一个目录结构，包括名为 `core`、`android` 和 `desktop` 的目录。后两个目录包含为其对应平台预制的启动器文件。`core`\
    \ 目录是您放置所有其他类的地方。您需要为项目配置许多设置，例如编辑配置以指定游戏资源所在的工作目录。前面提到的 LibGDX wiki 包含您需要通读的详细信息，以帮助您启动并运行项目，如果您决定进一步朝这个方向发展的话。\n\
    \n### 寻找发布渠道\n\n成为一名游戏开发者最大的乐趣之一就是让其他人玩到你的游戏。即使项目尚未完成，让人们试玩你的游戏并提供反馈，也能帮助你的创作达到更高的高度，并吸引更广泛的受众。许多网站支持独立游戏开发者，并提供论坛供你与社区分享你的作品。其中一些网站（例如\
    \ Indie DB 和 Game Jolt）甚至允许你在注册账户后将游戏上传到他们的服务器上。\n\n*   `indiedb.com`\n*   `gamejolt.com`\n\
    *   `itch.io`\n*   `gamedev.net`\n*   `tigsource.com`（独立游戏源）\n*   `forums.indiegamer.com`（独立游戏者论坛）\n\
    \n如果你将游戏发布到这些来源之一，在等待人们对你作品的评价时，你应该努力成为其论坛的活跃参与者。尝试一些游戏，并向你的开发者同行提供反馈。我们都受益于一个充满活力的游戏开发社区，所以一定要加入并成为其中的一部分！\n\
    \n有了这最后的建议，我们共同穿越本书的旅程就到此结束了。然而，希望你作为游戏开发者的旅程能够继续。祝你在未来的所有事业中好运！\n\n脚注 1\n\n如果你的项目在\
    \ BlueJ 中运行正常，但在运行可执行 JAR 文件时遇到困难，BlueJ 网站包含各种建议和有用资源的链接，网址为 [`www.bluej.org/help/ask-help.html`](http://www.bluej.org/help/ask-help.html)\
    \ 。\n\n  2\n\n为了确保在将文件发送给他人时不会遗漏任何文件，你可能需要使用诸如 7-Zip ([`www.7-zip.org`](http://www.7-zip.org))\
    \ 之类的程序来创建一个包含游戏所需所有 JAR 文件的单个文件（称为归档文件或 zip 文件）。\n\n  3\n\n可从以下网址获取：[`http://developer.android.com/sdk/index.html`](http://developer.android.com/sdk/index.html)\
    \ `.`\n\n  4\n\n可从以下网址获取：[`http://github.com/libgdx/libgdx/wiki/Project-Setup-Gradle`](http://github.com/libgdx/libgdx/wiki/Project-Setup-Gradle)\
    \ 。\n"
- fmt: '# Appendix A: Game Design Documentation


    While you will learn many technical and practical aspects of game development
    as you work through the example projects in this book, it is equally important
    to have a solid foundation in the theoretical aspects of game design. The first
    effort to create a framework for these concepts is discussed in a paper published
    by Robin Hunicke, Marc LeBlanc, and Robert Zubek in 2004. [¹](#A352797_2_En_BookBackmatter_OnlinePDF.html#Fn1)
    There, they proposed the Mechanics-Dynamics-Aesthetics (MDA) framework, which
    provides a useful way to categorize the components of a game. They defined Mechanics
    as the formal rules of the game, expressed at the level of data structures and
    algorithms, Dynamics as the interaction between the player and the game mechanics
    while the game is in progress, and Aesthetics as the emotional responses experienced
    by the player as they interact with the game. Since then, other frameworks have
    been proposed, each of which provides a different way of analyzing games. A popular
    example is Jesse Schell’s Elemental Tetrad, [²](#A352797_2_En_BookBackmatter_OnlinePDF.html#Fn2)
    which consists of Mechanics, Story, Aesthetics, and Technology (where aesthetics
    is defined more broadly than in the original MDA framework). Frameworks such as
    these are a valuable tool to help people consistently and fully analyze games.
    Players can use frameworks to better understand and express what they enjoy about
    particular games. Developers can use the formal structure to help them create
    a more cohesive design and to organize and document the development process; explaining
    how to write such documentation is the goal of this appendix.


    A game design document (GDD) serves as the blueprint or master plan for creating
    a game. It describes the overall vision of a game, as well as the details (often
    based on a game design framework such as MDA). Practical aspects are also included,
    such as a schedule that lists when certain features will be completed, a list
    of team members and responsibilities, and plans for testing and releasing the
    game. A GDD can provide clarity and focus while serving as a guide and a reference
    to the person or people working on the game. To be most effective, the GDD should
    be as complete as possible before the development process begins. Depending on
    the flexibility of the developers, a certain amount of modification may be permitted
    over the course of development, and various adjustments may need to be made after
    collecting feedback from gameplay testing.


    There is no one standard format for game design documents; an internet search
    will provide many templates for a variety of development scenarios. GDD templates
    often contain a bulleted list of topics or questions for your consideration (when
    applicable). In this chapter, we present a similar list of questions for you to
    ponder as you design your own games, followed by a sample response for a more
    polished version of the Space Rocks game presented earlier in this book. The scope
    of these questions is particularly good for individuals or small teams working
    on game development projects. By recording detailed responses to the queries that
    follow, you will effectively create your own game design document to help guide
    you through the development process.


    ## Game Design Documentation Questions'
