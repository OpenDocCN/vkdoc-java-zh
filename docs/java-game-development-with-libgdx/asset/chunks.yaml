  raw: '### Working with a Touchpad


    `Touchpad` objects are rendered using two images : one representing the background,
    and the other representing the knob. The user can touch (or click) the knob and
    drag it off-center; its movement is constrained to a circular area contained within
    the rectangular region defined by the background image.


    These objects require two parameters to be initialized. First, you supply a value
    for the deadzone radius —the minimal distance (in pixels) the knob must be dragged
    in order for any change to register. (This is the same deadzone concept as was
    discussed earlier in the gamepad section of this chapter.) This is useful for
    situations when the player wants to leave a finger on the touchpad but also wants
    the character to remain still. Without a deadzone setting , the controls would
    be too sensitive for this to be possible. It is unlikely that the average player
    would have pixel-perfect finger positioning to keep the knob exactly centered,
    and the result would be unwanted (and possibly player-frustrating) drift of the
    character being controlled.


    Second, the images used in a `Touchpad` object are stored in a `TouchpadStyle`
    object, which contains two images, both stored as `Drawable` objects , as is standard
    for UI elements in LibGDX; you encountered this situation before when creating
    the image for the Restart button object. As before, you will load each image into
    a `Texture` object then convert it to a `TextureRegion` and then a `TextureRegionDrawable`.


    To begin these additions, in the `LevelScreen` class, change the class declaration
    so that it extends your newly created `BaseTouchScreen` class instead of `BaseScreen`
    as follows:


    ```

    public class LevelScreen extends BaseTouchScreen

    ```


    Then, add the following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad;

    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad.TouchpadStyle;

    import com.badlogic.gdx.math.Vector2;

    ```


    Also, add the following variable declaration:


    ```

    private Touchpad touchpad;

    ```


    Then, in the `initialize` method , add the following code to change the size of
    the window, activate the function that sets up the control stage and table, and
    add a background image :


    ```

    Gdx.graphics.setWindowedMode(800,800);

    initializeControlArea();

    BaseActor controlBackground = new BaseActor(0,0, controlStage);

    controlBackground.loadTexture("assets/pixels.jpg");

    ```


    After this, add the following code to set up the `Touchpad` object, with a deadzone
    radius of 5 pixels:


    ```

    TouchpadStyle touchStyle = new TouchpadStyle();

    Texture padKnobTex = new Texture(Gdx.files.internal("assets/joystick-knob.png"));

    TextureRegion padKnobReg = new TextureRegion(padKnobTex);

    touchStyle.knob = new TextureRegionDrawable(padKnobReg);

    Texture padBackTex = new Texture(Gdx.files.internal("assets/joystick-background.png"));

    TextureRegion padBackReg = new TextureRegion(padBackTex);

    touchStyle.background = new TextureRegionDrawable(padBackReg);

    touchpad = new Touchpad(5, touchStyle);

    ```


    Next, add the touchpad and the Restart button to `controlTable` as follows. Note
    the addition of an empty row with height 600, which is used to keep the controls
    in the lower 200 pixels of the window (which has height 800).


    ```

    controlTable.toFront();

    controlTable.pad(50);

    controlTable.add().colspan(3).height(600);

    controlTable.row();

    controlTable.add(touchpad);

    controlTable.add().expandX();

    controlTable.add(restartButton);

    ```


    Now, in order to make use of the touchpad data, in the `update` method, add the
    following code, which stores the touchpad knob displacement data in a vector,
    using the length of the vector to set the turtle’s speed to a percentage of its
    maximum speed (100 pixels/second) and the angle of the vector to set the turtle’s
    direction of motion. This code is similar to the code from the earlier section
    on gamepad controllers, except that the `Touchpad` class itself handles the deadzone
    calculation, so it does not appear in the comparison here:


    ```

    Vector2 direction = new Vector2( touchpad.getKnobPercentX(), touchpad.getKnobPercentY()
    );

    float length = direction.len();

    if ( length > 0 )

    {

    turtle.setSpeed( 100 * length );

    turtle.setMotionAngle( direction.angle() );

    }

    ```


    Finally, since you are using the touchpad to control the turtle’s motion, you
    can delete the lines of code in the `Turtle` class `act` method that check for
    keyboard input and set the acceleration of the turtle. At this point, the Starfish
    Collector game should now render as shown in Figure [13-4](#A352797_2_En_13_Chapter.html#Fig4),
    and you are ready to test your program, using the mouse to control the touchpad
    that now moves the turtle.


