    (similar to the process for running the “Hello, World!” program from Chapter [1](#A352797_2_En_1_Chapter.html)).


    Note


    When you are writing code, if there is a runtime error (such as an image file’s
    failing to load due to a misspelled filename, even after fixing the error and
    running the program again), BlueJ may report another error containing a message
    such as “No OpenGL context found in the current thread.” This is a highly technical
    error with a simple fix: in the BlueJ main window Tools menu, select the option
    Reset Java Virtual Machine and try to run the `main` method again. Provided that
    there are no additional runtime errors, your program should load as expected.'
  trans: '

    ## 游戏项目：海星收集者


    本节将介绍游戏《海星收集者》，该游戏此前已在图 2-1 中展示。在开始编写此游戏的代码之前，精确描述其特性会很有帮助：游戏机制与规则、玩家与软件的交互方式、所需的图形等。这样的描述被称为游戏设计文档，本书附录
    A 对此有更详细的说明。由于这是你将使用 LibGDX 创建的第一个游戏，因此只需实现以下最精简的功能集：


    *   玩家将控制一只海龟，其目标是收集一颗海星。

    *   通过方向键控制移动。上箭头键将海龟移向屏幕顶部，右箭头键将海龟移向屏幕右侧，依此类推。可以同时按下多个方向键，使海龟沿对角线方向移动。移动速度是恒定的。

    *   海龟通过接触海星（当它们的图形重叠时）来收集海星。发生这种情况时，海星消失，并出现一条显示“你赢了”的消息。

    *   此游戏所需的图形包括海龟、海星、水的图像，以及包含“你赢了”文本的消息。


    接下来展示的是实现这些任务的一个代码版本。部分代码和概念与`HelloWorldImage`示例类似，例如`Texture`和`SpriteBatch`类、`create`和`render`方法的作用，以及驱动类的角色。同时也有一些新增内容。由于海龟的坐标可能会变化，你需要使用变量来存储这些值。最重要的是，你引入了一些使程序具有交互性的代码——你将处理来自用户的键盘输入。最后，你将包含一个布尔变量，用于跟踪玩家是否获胜，当海龟到达海星时该变量变为真，并影响“你赢了”消息在屏幕上显示的时间。


    在本节以及后续章节中，建议你在 BlueJ 中创建一个新项目（通过从 BlueJ 的项目菜单中选择“关闭”来关闭上一个项目），然后输入所提供的代码；或者，你也可以直接从本书网站下载源代码，并通过附带的
    BlueJ 项目文件运行代码。在线源代码还包含你所需的所有图像，这些图像存储在每个项目的`assets`文件夹中，并在以下代码中被引用。


    首先，从本书网站下载本章的源代码文件。在 BlueJ 中创建一个名为`Starfish Collector Ch2`的新项目（因为本书后续会创建该项目的多个版本）。在
    BlueJ 创建的项目目录中，新建一个名为`assets`的文件夹。将下载项目`assets`文件夹中的图像文件复制到你新项目的`assets`文件夹中；以这种方式将源代码与图像分开存放，有助于保持文件的有序性。接下来，在你的项目目录中，新建一个名为`+libs`的文件夹。将下载项目`+libs`文件夹中的
    JAR 文件复制到你新项目的`+libs`文件夹中。重启 BlueJ，以便 BlueJ 能正确识别新添加到`+libs`文件夹中的 JAR 文件。


    在你的 BlueJ 项目中，创建一个名为`StarfishCollectorAlpha`的新类。该类的源代码如下所示。其中包含一些新的`import`语句，使你能够创建各种新对象，这些对象将在后续进行说明：


    ```

    import com.badlogic.gdx.ApplicationListener;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.math.Rectangle;

    import com.badlogic.gdx.Game;

    public class StarfishCollectorAlpha extends Game

    {

    private SpriteBatch batch;

    private Texture turtleTexture;

    private float turtleX;

    private float turtleY;

    private Rectangle turtleRectangle;

    private Texture starfishTexture;

    private float starfishX;

    private float starfishY;

    private Rectangle starfishRectangle;

    private Texture oceanTexture;

    private Texture winMessageTexture;

    private boolean win;

    public void create()

    {

    batch = new SpriteBatch();

    turtleTexture = new Texture( Gdx.files.internal("assets/turtle-1.png") );

    turtleX = 20;

    turtleY = 20;

    turtleRectangle = new Rectangle( turtleX, turtleY,

    turtleTexture.getWidth(), turtleTexture.getHeight() );

    starfishTexture = new Texture( Gdx.files.internal("assets/starfish.png") );

    starfishX = 380;

    starfishY = 380;

    starfishRectangle = new Rectangle( starfishX, starfishY,

    starfishTexture.getWidth(), starfishTexture.getHeight() );

    oceanTexture = new Texture( Gdx.files.internal("assets/water.jpg") );

    winMessageTexture = new Texture( Gdx.files.internal("assets/you-win.png") );

    win = false;

    }

    public void render()

    {

    // 检查用户输入

    if (Gdx.input.isKeyPressed(Keys.LEFT))

    turtleX--;

    if (Gdx.input.isKeyPressed(Keys.RIGHT))

    turtleX++;

    if (Gdx.input.isKeyPressed(Keys.UP))

    turtleY++;

    if (Gdx.input.isKeyPressed(Keys.DOWN))

    turtleY--;

    // 更新海龟矩形位置

    turtleRectangle.setPosition(turtleX, turtleY);

    // 检查获胜条件：海龟必须与海星重叠

    if (turtleRectangle.overlaps(starfishRectangle))

    win = true;

    // 清除屏幕

    Gdx.gl.glClearColor(0,0,0, 1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    // 绘制图形

    batch.begin();

    batch.draw( oceanTexture, 0, 0 );

    if (!win)

    batch.draw( starfishTexture, starfishX, starfishY );

    batch.draw( turtleTexture, turtleX, turtleY );

    if (win)

    batch.draw( winMessageTexture, 180, 180 );

    batch.end();

    }

    }

    ```


    此时，你可以编译代码；如果出现任何错误消息，请仔细检查你输入的代码是否与上述代码完全一致。你还需要一个启动器类来创建此类的实例并运行它。为此，创建一个名为`LauncherAlpha`的新类，并输入如下代码。请注意，`LwglApplication`构造函数中已包含额外参数，用于设置显示的标题以及窗口的大小（宽度和高度，以像素为单位）。


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class LauncherAlpha

    {

    public static void main (String[] args)

    {

    Game myGame = new StarfishCollectorAlpha();

    LwjglApplication launcher =

    new LwjglApplication( myGame, "Starfish Collector", 800, 600 );

    }

    }

    ```


    此时，代码可以编译，之后便可在 BlueJ 主窗口中，通过右键单击标有`LauncherAlpha`的橙色矩形，选择`main`方法，然后在出现的窗口中单击“确定”按钮来运行游戏（类似于运行第
    1 章“Hello, World!”程序的过程）。


    注意


    编写代码时，如果出现运行时错误（例如，由于文件名拼写错误导致图像文件加载失败，即使在修复错误并重新运行程序后），BlueJ 可能会报告另一个错误，其中包含诸如“在当前线程中未找到
    OpenGL 上下文”之类的消息。这是一个技术性很强的错误，但修复方法很简单：在 BlueJ 主窗口的“工具”菜单中，选择“重置 Java 虚拟机”选项，然后再次尝试运行`main`方法。只要没有其他运行时错误，你的程序就应该能按预期加载。

    '
- fmt: '在类`StarfishCollectorAlpha`中，`create`方法初始化变量并加载纹理。该程序包含四张图像，它们存储为`Texture`对象：海龟、海星、海洋以及一张包含“You
    Win”字样的图像。为简洁起见，您无需为`internal`方法创建的每个`FileHandle`对象创建新变量，而是在构造每个新`Texture`对象的同一行中初始化它们。海龟位置的坐标使用浮点数存储，因为您需要存储小数值，并且LibGDX游戏开发框架在其类中使用`float`而非`double`变量，以略微提升程序效率。尽管海星纹理的坐标不会改变，您仍使用变量存储它们，以便未来涉及这些值的代码更具可读性。`oceanTexture`和`winMessageTexture`对象不需要变量来存储其坐标，因为它们的位置不会改变，并且其位置将在`render`方法中指定（本节稍后讨论）。还创建了与海龟和海星对应的`Rectangle`对象；这些对象存储矩形区域的位置和大小，之所以使用它们，是因为`Rectangle`类包含一个名为`overlap`的方法，可用于检测海龟何时到达海星。布尔变量`win`指示玩家是否已赢得游戏，并初始化为`false`。


    `render`方法包含三个主要代码块，大致对应游戏循环的子阶段：处理输入、更新和渲染。


    首先，一系列命令使用属于`Gdx`类（的一个对象）的名为`isKeyPressed`的方法，该方法确定键盘上的某个键当前是否被按下。每个键的名称使用`Keys`类中的常量值表示。当按下某个箭头键时，海龟对应的x或y坐标会相应调整；x值向窗口右侧增加，y值向窗口顶部增加。[⁴](#A352797_2_En_2_Chapter.html#Fn4)
    请注意，如果用户同时按下左箭头键和右箭头键，加法和减法的效果会相互抵消，海龟的位置不会改变；当用户同时按下上箭头键和下箭头键时，也会出现类似情况。另请注意，这里使用了一系列`if`语句而非`if-else
    if`语句，以便程序能够在同时按下两个键时做出正确响应。


    第二组命令执行碰撞检测，确定与`turtleTexture`图像对应的矩形区域是否与包含`starfishTexture`的矩形区域重叠。必须更新海龟的矩形（使用`setPosition`方法），因为海龟的位置可能已改变。如果两个矩形重叠，则布尔变量`win`被设置为`true`，这进而会影响哪些纹理被绘制到屏幕上。在测试此游戏时，您可能会注意到海星似乎在海龟实际到达之前就消失了。这是因为使用矩形形状来检测重叠；图像的一些透明部分可能重叠，如图[2-3](#A352797_2_En_2_Chapter.html#Fig3)所示。（这种情况将在下一章中解决并改进。）


    ![A352797_2_En_2_Fig3_HTML.jpg](A352797_2_En_2_Fig3_HTML.jpg)


    图2-3. 透明区域中的重叠矩形


    最后，`render`方法中的第三组命令是实际渲染发生的地方。`glClear`方法使用`glClearColor`方法中指定的颜色（以红/绿/蓝/Alpha值表示）在屏幕上绘制一个纯色矩形。必须在每次渲染过程中以这种方式清除屏幕，有效“擦除”屏幕，否则之前渲染调用中的图像可能会可见。`draw`方法调用的顺序尤为重要：后渲染的纹理将出现在先渲染的纹理之上。因此，通常应先绘制背景元素，然后是主要的游戏内实体，最后是用户界面元素。用于绘制的`Batch`类通过一次向计算机的图形处理单元（GPU）发送多张图像来优化图形操作。'
  raw: 'In the class `StarfishCollectorAlpha`, the `create` method initializes variables
    and loads textures. This program contains four images, which are stored as `Texture`
    objects: the turtle, the starfish, the water, and an image containing the words
    You Win. For brevity, instead of creating a new variable to store each of the
    `FileHandle` objects created by the `internal` method, you initialize them in
    the same line where you construct each new `Texture` object. The coordinates of
    the turtle’s position are stored using floating-point numbers since you need to
    store decimal values, and the LibGDX game development framework uses `float` rather
    than `double` variables in its classes for a slight increase in program efficiency.
    Even though the coordinates of the starfish texture will not be changing, you
    still store them using variables so that future code involving these values is
    more readable. The `oceanTexture` and `winMessageTexture` objects do not require
    variables to store their coordinates, as their positions will not be changing,
    and their positions will be specified in the `render` method (discussed later
    in this section). `Rectangle` objects are also created that correspond to the
    turtle and starfish; these store the position and size of a rectangular area and
    are used because the `Rectangle` class contains a method named `overlap` that
    can be used to detect when the turtle has reached the starfish. The Boolean variable
    `win` indicates whether the player has won the game and is initialized to `false`.


    The `render` method contains three main blocks of code that roughly correspond
    to the game loop sub-stages: process input, update, and render.


    First, a sequence of commands use a method named `isKeyPressed`, belonging to
    (an object belonging to) the `Gdx` class, which determines whether a key on the
    keyboard is currently being pressed. The names of each key are represented using
    constant values from the `Keys` class. When one of the arrow keys is pressed,
    the corresponding x or y coordinate of the turtle is adjusted accordingly; x values
    increase toward the right side of the window, while y values increase toward the
    top of the window.[⁴](#A352797_2_En_2_Chapter.html#Fn4) Note that if the user
    presses the left and right arrow keys at the same time, the effects of the addition
    and subtraction cancel each other out, and the position of the turtle will not
    change; a similar situation also applies when the user presses the up and down
    arrow keys at the same time. Also note that a sequence of `if` statements is used
    rather than a sequence of `if`-`else if` statements, enabling the program to respond
    appropriately if two keys are being pressed at the same time.


    The second set of commands performs collision detection, determining whether the
    rectangular region corresponding to the `turtleTexture` image overlaps the rectangular
    region containing `starfishTexture` . The turtle’s rectangle must be updated (using
    the `setPosition` method), since the position of the turtle may have changed.
    If the two rectangles overlap, then the Boolean variable `win` is set to true,
    which in turn affects which textures are drawn to the screen. As you test this
    game, you might notice that the starfish seem to disappear before the turtle actually
    reaches it. This is because rectangular shapes are being used to check for overlap;
    some of the transparent parts of the images may be overlapping, as shown in Figure
    [2-3](#A352797_2_En_2_Chapter.html#Fig3). (This situation will be addressed and
    improved upon in the next chapter.)


    ![A352797_2_En_2_Fig3_HTML.jpg](A352797_2_En_2_Fig3_HTML.jpg)


    Figure 2-3.


    Overlapping rectangles in transparent areas


    Finally, the third set of commands in the `render` method is where the actual
    rendering takes place. The `glClear` method draws a solid-colored rectangle on
    the screen using the color specified in the `glClearColor` method (in terms of
    red/green/blue/alpha values). The screen must be cleared in this manner during
    every rendering pass, effectively “erasing” the screen, because the images from
    previous render calls might be visible otherwise. The order of the `draw` method
    calls is particularly important: textures that are rendered later appear on top
    of those rendered earlier. Thus, you typically want to draw the background elements
    first, followed by the main in-game entities, and then the user interface elements
    last. The `Batch` class, used for drawing, optimizes graphics operations by sending
    multiple images at once to the computer’s graphics processing unit (GPU).'
