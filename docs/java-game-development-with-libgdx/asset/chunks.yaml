  trans: '

    ## 总结与下一步


    在本章中，你开发了一款基于迷宫的《迷宫跑男》游戏，主角需要收集所有金币并躲避幽灵。你学会了如何使用深度优先算法生成迷宫，以及如何使用广度优先算法搜索迷宫中两点之间的最短路径。你再次创建了一个拥有四个方向行走动画的主角。此外，你还添加了特殊的音效，当幽灵接近主角时，音量会逐渐增大。


    除了常规建议（添加标题画面、说明画面以及视觉和音效特效）之外，你还可以对这个项目进行许多改进和扩展。你可以设计更大的迷宫，使其无法完全显示在屏幕上，从而增加挑战性。你可以添加更多幽灵来追逐主角，或者让幽灵随时间推移加快速度（不过幽灵的速度绝不能超过主角的速度）。为了平衡这些额外的挑战，你或许可以引入生命值或额外生命，让玩家能够承受多次攻击。你还可以在用户界面中显示计时器，这样玩家就可以将“在最短时间内收集所有金币”作为次要目标；这为玩家衡量自身技巧和比较表现提供了更精确的方式。


    在下一章中，你将把关注点从用于内容生成的高级算法，转向高级 2D 图形。具体来说，你将添加粒子效果、图像着色器和滤镜，以改善之前某些游戏项目的视觉效果。


    脚注 1


    精灵表角色由 Andrew Viola 创建，经许可使用。


    # 15. 高级 2D 图形


    在本章中，你将学习两种将复杂图形融入项目中的技术，而不是创建新游戏。第一部分将介绍粒子系统，它可以创建爆炸等特效，并将被整合到《太空岩石》游戏中，取代基于精灵表的动画。第二部分将介绍着色器程序，它通过操作渲染图像的像素来创建模糊或发光等效果，并将被整合到《海星收集者》游戏中。


    ## 粒子系统


    粒子系统是由许多小图像组成的集合，可用于创建多种图形特效。该技术可以模拟的效果包括火焰、烟雾、爆炸、烟花、电火花、喷泉、雨、雪和星空。粒子系统中的每个小图像都称为一个**粒子**。每个粒子都有许多属性（如速度、大小、颜色和透明度），这些属性可以初始化为给定范围内的随机值，并且这些属性值可以配置为随时间变化。粒子由一个称为**发射器**的对象以设定的速率产生，发射器可以配置为在有限时间内或持续生成粒子，具体取决于要创建的视觉效果。


    LibGDX 提供了支持粒子系统显示的类。此外，LibGDX 自带的粒子编辑器工具可用于设计和预览粒子效果，然后将其导出为可在 LibGDX 框架内轻松导入的文件格式。


    ### LibGDX 粒子编辑器


    根据 LibGDX 维基百科的说明，可以直接从源代码运行 LibGDX 粒子编辑器。¹ 不过，为简单起见，你可以使用可执行的 JAR 文件 `ParticleEditor.jar`，该文件位于本章源代码目录的
    `Particle Editor` 文件夹中。图 15-1 显示了该程序首次启动时的界面。


    ![A352797_2_En_15_Fig1_HTML.jpg](img/A352797_2_En_15_Fig1_HTML.jpg)


    图 15-1.


    启动时的 LibGDX 粒子编辑器程序


    粒子编辑器窗口左上角面板的预览区域中显示了一个火焰效果。产生该效果的参数显示在占据窗口右侧大部分区域的“发射器属性”面板中。该面板包含众多属性，每个属性都有对应的值和图表，一开始可能会让人有些不知所措。本节将仅讨论对最终视觉效果影响最大的发射器属性；如需更全面的介绍，请查阅
    LibGDX 维基百科（前文已提及）以获取详细信息。


    *   **图像**：在此区域，你可以选择每个粒子使用的图像。粒子通常会被着色；灰度图像最适合此用途。

    *   **数量**：此区域可用于设置屏幕上任意时刻应出现的最小和最大粒子数。

    *   **持续时间**：这是发射器产生粒子的时长。（创建连续效果时，此值将被忽略。）

    *   **发射率**：这是每秒发射的粒子数。

    *   **寿命**：这是每个粒子在粒子系统中保持活跃的时间。

    *   **大小**：这是图像的尺寸，以像素为单位。

    *   **速度**：这是粒子的速度，以像素/秒为单位。

    *   **角度**：这是粒子的方向，以度为单位。

    *   **色调**：显示用于为粒子图像着色的颜色。

    *   **透明度**：控制粒子随时间变化的透明度。

    *   **叠加**：激活时，通过将颜色分量相加来混合颜色，导致存在大量粒子的区域更亮。

    *   **连续**：激活时，会导致发射器持续发射粒子（忽略前面的“持续时间”值）。


    在某些参数旁边，你会看到文本框和一个图表，如图 15-2 所示，可用于微调初始值以及值随时间的变化。（对于某些参数，你需要单击参数名称右侧的“激活”按钮才能使这些元素出现。）


    ![A352797_2_En_15_Fig2_HTML.jpg](img/A352797_2_En_15_Fig2_HTML.jpg)


    图 15-2.


    用于微调参数值的粒子编辑器界面


    标记为“高”和“低”的框中的数值，指的是右侧图表顶部和底部边缘的值。图表上的蓝线表示参数值在粒子生命周期内将如何变化。在图 15-2 所示的图表中，深蓝色线在顶部保持平直，表示参数值将保持在“高”值不变。图
    15-3 展示了另外两种可能的图表；左侧的图表表示从“高”值持续下降到“低”值，而右侧的图表表示参数在粒子生命周期的大部分时间内保持在“高”值，然后突然下降到“低”值。在本节后面，这两个图表将分别被称为“逐渐下降”和“突然下降”图表。


    ![A352797_2_En_15_Fig3_HTML.jpg](img/A352797_2_En_15_Fig3_HTML.jpg)


    图 15-3.


    参数变化图表的变体


    要修改这些图表之一，你可以单击任意位置添加一个点，单击并拖动来移动点，然后双击一个点将其删除。

