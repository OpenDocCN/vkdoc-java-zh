- fmt: "# Game Project: Treasure Quest\n\n`Treasure Quest` is an adventure game where\
    \ the character, called the hero, is called upon to rid the land of flying bat-like\
    \ creatures (called Flyers) and is promised a treasure chest as a reward. The\
    \ hero has two methods of attacking and destroying the Flyers: swinging a sword\
    \ and shooting arrows (the hero begins with three). Contact with either of these\
    \ weapons will destroy a Flyer in a single hit. The hero begins with three health\
    \ points. Colliding with a Flyer reduces the health of the hero by one point,\
    \ and if the hero’s health reaches zero, then the hero is destroyed, and the game\
    \ is over. When each Flyer is destroyed, they drop a coin, which can be collected\
    \ by the hero and used to purchase additional health or arrows from an item shop.\
    \ There are a pair of NPCs in the game: the Shopkeeper, who informs you of the\
    \ prices and quantities of items in the shop (1 health for 3 coins, 3 arrows for\
    \ 4 coins), and the Gatekeeper, who guards the treasure and tells you how many\
    \ Flyers remain to be defeated.\n\nThe player uses the arrow keys to move the\
    \ hero, and the `S` and `A` keys to swing the sword and shoot arrows, respectively.\
    \ Arrows travel in a straight line in whatever direction the player is facing.\
    \ The amount of health and the numbers of coins and arrows are displayed along\
    \ the top of the screen. When the player wins or loses the game, a large message\
    \ will be displayed in the center of the screen. NPC messages are displayed automatically\
    \ on the bottom of the screen (as seen in Figure [12-2](#A352797_2_En_12_Chapter.html#Fig2))\
    \ when the hero is within four pixels of the NPC and automatically disappear when\
    \ the hero moves away.\n\nThe graphics for this game are colorful and cartoonish.\
    \ Only a few animations are implemented in this project: the hero walking, the\
    \ sword swinging, the enemies flying, and fading smoke that appears when an enemy\
    \ is destroyed. Adding additional animations and sound effects to enhance the\
    \ interaction with game-world objects would be an important and worthwhile addition\
    \ to this project.\n\nThis chapter assumes that you are familiar with the material\
    \ on tilemaps from Chapters [10](#A352797_2_En_10_Chapter.html) and [11](#A352797_2_En_11_Chapter.html),\
    \ and that you have installed the Tiled map-editor software. In addition, you\
    \ will need to be familiar with the material on dialog boxes and sign mechanics\
    \ from Chapter [5](#A352797_2_En_5_Chapter.html), which is necessary to set up\
    \ interactions with the NPCs.\n\nBeginning this project requires the same steps\
    \ as in previous projects: creating a new project, creating an `assets` folder\
    \ and a `+libs` folder (the latter not being necessary if you have set up the\
    \ `userlib` directory), copying the custom framework files you created in the\
    \ first part of this book (`BaseGame.java`, `BaseScreen.java`, `BaseActor.java`),\
    \ as well as the `TilemapActor.java` class you developed in Chapter [10](#A352797_2_En_10_Chapter.html)\
    \ and the `DialogBox.java` class you developed in Chapter [5](#A352797_2_En_5_Chapter.html),\
    \ and copying the graphics and audio for this project into your `assets` folder.\
    \ As described previously, a BlueJ project named `Framework` has been created\
    \ for your convenience and contains the necessary source code files to provide\
    \ a convenient starting point. To begin the first project:\n\n*   Download the\
    \ source code files for this chapter.\n*   Make a copy of the downloaded `Framework`\
    \ folder (and its contents) and rename it to `Treasure Quest`.\n*   Copy all the\
    \ contents of the downloaded `Treasure Quest` project assets folder into your\
    \ newly created `Treasure Quest assets` folder.\n*   Open the BlueJ project in\
    \ your `Treasure Quest` folder.\n*   In the `CustomGame` class, change the name\
    \ of the class to `TreasureQuestGame` (BlueJ will then rename the source code\
    \ file to `TreasureQuestGame.java`).\n*   In the `Launcher` class, change the\
    \ contents of the `main` method to the following:\n\n```\n    Game myGame = new\
    \ TreasureQuestGame ();\n    LwjglApplication launcher = new LwjglApplication(\n\
    \    myGame, \"Treasure Quest\", 800, 600 );\n```\n\n## Level Setup\n\nTo begin,\
    \ start the Tiled map-editor software. Create a new map with a map size that has\
    \ a width of 40 tiles and a height of 40 tiles, and a tile size with the width\
    \ and height both set to 32 pixels. The resulting map will be 1280 by 1280 pixels.\
    \ Click the Save As... button and save the file to your `assets` directory with\
    \ the filename `map.tmx`.\n\nNext, add an object layer to your map. Then, in the\
    \ Tileset panel, add a new tileset using the image `adventure-tiles.png` (shown\
    \ on the left side of Figure [12-3](#A352797_2_En_12_Chapter.html#Fig3)), set\
    \ the tile size to 32 by 32, and check the box to embed the tileset in the map.\
    \ Add another new tileset to the map, this time using the image `object-tiles.png`\
    \ (shown on the right side of Figure [12-3](#A352797_2_En_12_Chapter.html#Fig3)),\
    \ in the same way. Since the object tiles will be used to indicate where game-world\
    \ objects should be spawned, you will need to specify the corresponding Java classes\
    \ (which you will create later). In the Tileset panel, select `object-tiles` and\
    \ click on the icon to edit the tileset. In the tab that appears, you will need\
    \ to click on each tile (one at a time) and add a new custom property to each.\
    \ The property should be called `name`; the corresponding values for the tiles\
    \ (from left to right) are `Bush`, `Rock`, `Coin`, `Treasure`, `Flyer`, `NPC`,\
    \ `ShopHeart`, and `ShopArrow`. In addition, for the NPC tile, add a second custom\
    \ property called `id` with a value of `default`, and a third custom property\
    \ called `text` with a value of `Hello, World!`. (These default values will be\
    \ overridden for specific instances later on in the tilemap editor).\n\n![A352797_2_En_12_Fig3_HTML.jpg](A352797_2_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3. Tilesets for the tile layer (left) and object layer (right)\n\n\
    Return to the tab featuring the tilemap. In the Layers panel, select Tile Layer\
    \ 1. In the Tileset panel, select `adventure-tiles`, and then press the `B` key\
    \ to activate the Stamp Brush tool. Add grass tiles across the entire map (which\
    \ can be greatly accelerated using the Bucket Fill tool), then add the wooden\
    \ fence tiles along the edges. Also, add two large fenced-in areas near the center\
    \ of the map, each with a two-tile-wide entrance so that the hero can move through;\
    \ the bottom half of the tilemap is shown in Figure [12-4](#A352797_2_En_12_Chapter.html#Fig4).\n\
    \n![A352797_2_En_12_Fig4_HTML.jpg](A352797_2_En_12_Fig4_HTML.jpg)\n\nFigure 12-4.\
    \ Adding grass and fence tiles to the tile layer\n\nAs was mentioned in the previous\
    \ chapter, the tile layer is being used only to simplify creating an image from\
    \ a tileset. The fence tiles should be solid barriers in the actual game, and\
    \ so you will add rectangles in the object layer to store the data corresponding\
    \ to those regions. In the Layers panel, select Object Layer 1 and press `R` to\
    \ activate the Rectangle tool. Draw rectangles around all the regions containing\
    \ solid tiles; for simplicity, rectangles can be drawn that surround multiple\
    \ tiles at once. Each time you add one of these rectangles, you must also add\
    \ a custom property called `name` with a value of `Solid` (which will be used\
    \ to initialize corresponding actors later). To accelerate this process, when\
    \ a rectangle is selected and the Select Object tool is active, you can use the\
    \ shortcut key combination `Ctrl+D` to duplicate the object (including the custom\
    \ property) and simply reposition and resize the new object (which appears directly\
    \ on top of the original object). Once you have added rectangles corresponding\
    \ to all the regions containing solid tiles, add one final rectangle in the bottom\
    \ center of the map to indicate the starting position of the hero; add the custom\
    \ property `name` with a value of `Start`."
  raw: "## Game Project: Treasure Quest\n\nTreasure Quest is an adventure game where\
    \ the character, called the hero, is called upon to rid the land of flying bat-like\
    \ creatures (called Flyers) and is promised a treasure chest as a reward. The\
    \ hero has two methods of attacking and destroying the Flyers : swinging a sword\
    \ and shooting arrows (the hero begins with three). Contact with either of these\
    \ weapons will destroy a Flyer in a single hit. The hero begins with three health\
    \ points . Colliding with a Flyer reduces the health of the hero by one point,\
    \ and if the hero’s health reaches zero, then the hero is destroyed, and the game\
    \ is over. When each Flyer is destroyed, they drop a coin, which can be collected\
    \ by the hero and used to purchase additional health or arrows from an item shop.\
    \ There are a pair of NPCs in the game: the Shopkeeper, who informs you of the\
    \ prices and quantities of items in the shop (1 health for 3 coins, 3 arrows for\
    \ 4 coins), and the Gatekeeper, who guards the treasure and tells you how many\
    \ Flyers remain to be defeated.\n\nThe player uses the arrow keys to move the\
    \ hero, and the S and A keys to swing the sword and shoot arrows, respectively.\
    \ Arrows travel in a straight line in whatever direction the player is facing.\
    \ The amount of health and the numbers of coins and arrows are displayed along\
    \ the top of the screen. When the player wins or loses the game, a large message\
    \ will be displayed in the center of the screen. NPC messages are displayed automatically\
    \ on the bottom of the screen (as seen in Figure [12-2](#A352797_2_En_12_Chapter.html#Fig2))\
    \ when the hero is within four pixels of the NPC and automatically disappear when\
    \ the hero moves away.\n\nThe graphics for this game are colorful and cartoonish.\
    \ Only a few animations are implemented in this project: the hero walking, the\
    \ sword swinging, the enemies flying, and fading smoke that appears when an enemy\
    \ is destroyed. Adding additional animations and sound effects to enhance the\
    \ interaction with game-world objects would be an important and worthwhile addition\
    \ to this project.\n\nThis chapter assumes that you are familiar with the material\
    \ on tilemaps from Chapters [10](#A352797_2_En_10_Chapter.html) and [11](#A352797_2_En_11_Chapter.html),\
    \ and that you have installed the Tiled map-editor software. In addition, you\
    \ will need to be familiar with the material on dialog boxes and sign mechanics\
    \ from Chapter [5](#A352797_2_En_5_Chapter.html), which is necessary to set up\
    \ interactions with the NPCs.\n\nBeginning this project requires the same steps\
    \ as in previous projects: creating a new project, creating an `assets` folder\
    \ and a `+libs` folder (the latter not being necessary if you have set up the\
    \ `userlib` directory), copying the custom framework files you created in the\
    \ first part of this book (`BaseGame.java`, `BaseScreen.java`, `BaseActor.java`),\
    \ as well as the `TilemapActor.java` class you developed in Chapter [10](#A352797_2_En_10_Chapter.html)\
    \ and the `DialogBox.java` class you developed in Chapter [5](#A352797_2_En_5_Chapter.html),\
    \ and copying the graphics and audio for this project into your `assets` folder.\
    \ As described previously, a BlueJ project named `Framework` has been created\
    \ for your convenience and contains the necessary source code files to provide\
    \ a convenient starting point. To begin the first project:\n\n*   Download the\
    \ source code files for this chapter.\n*   Make a copy of the downloaded `Framework`\
    \ folder (and its contents) and rename it to `Treasure Quest`.\n*   Copy all the\
    \ contents of the downloaded `Treasure Quest` project assets folder into your\
    \ newly created `Treasure Quest assets` folder.\n*   Open the BlueJ project in\
    \ your `Treasure Quest` folder.\n*   In the `CustomGame` class, change the name\
    \ of the class to `TreasureQuestGame` (BlueJ will then rename the source code\
    \ file to `TreasureQuestGame.java`).\n*   In the `Launcher` class, change the\
    \ contents of the `main` method to the following:\n\n```\n    Game myGame = new\
    \ TreasureQuestGame ();\n    LwjglApplication launcher = new LwjglApplication(\n\
    \    myGame, \"Treasure Quest\", 800, 600 );\n    ```\n\n## Level Setup\n\nTo\
    \ begin, start the Tiled map-editor software . Create a new map with a map size\
    \ that has a width of 40 tiles and a height of 40 tiles, and a tile size with\
    \ the width and height both set to 32 pixels. The resulting map will be 1280 by\
    \ 1280 pixels. Click the Save As . . . button and save the file to your `assets`\
    \ directory with the filename `map.tmx`.\n\nNext, add an object layer to your\
    \ map. Then, in the Tileset panel , add a new tileset using the image `adventure-tiles.png`\
    \ (shown on the left side of Figure [12-3](#A352797_2_En_12_Chapter.html#Fig3)),\
    \ set the tile size to 32 by 32, and check the box to embed the tileset in the\
    \ map. Add another new tileset to the map, this time using the image `object-tiles.png`\
    \ (shown on the right side of Figure [12-3](#A352797_2_En_12_Chapter.html#Fig3)),\
    \ in the same way. Since the object tiles will be used to indicate where game-world\
    \ objects should be spawned, you will need to specify the corresponding Java classes\
    \ (which you will create later). In the Tileset panel , select object-tiles and\
    \ click on the icon to edit the tileset. In the tab that appears, you will need\
    \ to click on each tile (one at a time) and add a new custom property to each.\
    \ The property should be called `name`; the corresponding values for the tiles\
    \ (from left to right) are `Bush`, `Rock`, `Coin`, `Treasure`, `Flyer`, `NPC`,\
    \ `ShopHeart`, and `ShopArrow`. In addition, for the NPC tile, add a second custom\
    \ property called `id` with a value of `default`, and a third custom property\
    \ called `text` with a value of `Hello, World!`. (These default values will be\
    \ overridden for specific instances later on in the tilemap editor).\n\n![A352797_2_En_12_Fig3_HTML.jpg](A352797_2_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3.\n\nTilesets for the tile layer (left) and object layer (right)\n\
    \nReturn to the tab featuring the tilemap. In the Layers panel, select Tile Layer\
    \ 1\\. In the Tileset panel, select adventure-tiles , and then press the B key\
    \ to activate the Stamp Brush tool . Add grass tiles across the entire map (which\
    \ can be greatly accelerated using the Bucket Fill tool ), then add the wooden\
    \ fence tiles along the edges. Also, add two large fenced-in areas near the center\
    \ of the map, each with a two-tile-wide entrance so that the hero can move through;\
    \ the bottom half of the tilemap is shown in Figure [12-4](#A352797_2_En_12_Chapter.html#Fig4).\n\
    \n![A352797_2_En_12_Fig4_HTML.jpg](A352797_2_En_12_Fig4_HTML.jpg)\n\nFigure 12-4.\n\
    \nAdding grass and fence tiles to the tile layer\n\nAs was mentioned in the previous\
    \ chapter, the tile layer is being used only to simplify creating an image from\
    \ a tileset. The fence tiles should be solid barriers in the actual game, and\
    \ so you will add rectangles in the object layer to store the data corresponding\
    \ to those regions. In the Layers panel, select Object Layer 1 and press R to\
    \ activate the Rectangle tool . Draw rectangles around all the regions containing\
    \ solid tiles; for simplicity, rectangles can be drawn that surround multiple\
    \ tiles at once. Each time you add one of these rectangles, you must also add\
    \ a custom property called `name` with a value of `Solid` (which will be used\
    \ to initialize corresponding actors later). To accelerate this process, when\
    \ a rectangle is selected and the Select Object tool is active, you can use the\
    \ shortcut key combination `Ctrl+D` to duplicate the object (including the custom\
    \ property) and simply reposition and resize the new object (which appears directly\
    \ on top of the original object). Once you have added rectangles corresponding\
    \ to all the regions containing solid tiles, add one final rectangle in the bottom\
    \ center of the map to indicate the starting position of the hero; add the custom\
    \ property `name` with a value of `Start`."
  trans: "\n## 游戏项目：寻宝探险\n\n《寻宝探险》是一款冒险游戏，主角被称为英雄，受命消灭陆地上像蝙蝠一样飞行的生物（称为飞行怪），并承诺以宝箱作为奖励。英雄有两种攻击并摧毁飞行怪的方法：挥剑和射箭（英雄初始拥有三支箭）。与这两种武器中的任何一种接触，都能一击摧毁飞行怪。英雄初始拥有三点生命值。与飞行怪相撞会使英雄生命值减少一点，如果英雄生命值降至零，则英雄被摧毁，游戏结束。每只飞行怪被摧毁时，会掉落一枚金币，英雄可以收集金币，并在物品商店中购买额外的生命值或箭矢。游戏中有两个非玩家角色：店主，他会告知你商店中物品的价格和数量（3\
    \ 枚金币换 1 点生命值，4 枚金币换 3 支箭）；以及守门人，他守护着宝藏，并告诉你还有多少只飞行怪需要击败。\n\n玩家使用方向键移动英雄，使用 S\
    \ 键和 A 键分别挥剑和射箭。箭矢会沿着玩家面对的方向直线飞行。生命值、金币数量和箭矢数量显示在屏幕顶部。当玩家获胜或失败时，屏幕中央会显示一条大消息。当英雄距离非玩家角色四个像素以内时，非玩家角色的消息会自动显示在屏幕底部（如图\
    \ 12-2 所示），当英雄离开时，消息会自动消失。\n\n本游戏的图形色彩丰富且具有卡通风格。本项目仅实现了少量动画：英雄行走、挥剑、敌人飞行，以及敌人被摧毁时出现的渐隐烟雾。添加额外的动画和音效以增强与游戏世界对象的互动，将是本项目一个重要且有价值的补充。\n\
    \n本章假设你已经熟悉第 10 章和第 11 章中关于瓦片地图的内容，并且已经安装了 Tiled 地图编辑器软件。此外，你还需要熟悉第 5 章中关于对话框和标志机制的内容，这是设置与非玩家角色交互所必需的。\n\
    \n开始本项目所需的步骤与之前项目相同：创建一个新项目，创建一个`assets`文件夹和一个`+libs`文件夹（如果你已经设置了`userlib`目录，则后者不是必需的），复制你在本书第一部分创建的自定义框架文件（`BaseGame.java`、`BaseScreen.java`、`BaseActor.java`），以及你在第\
    \ 10 章开发的`TilemapActor.java`类和你在第 5 章开发的`DialogBox.java`类，并将本项目的图形和音频文件复制到你的`assets`文件夹中。如前所述，为了方便起见，已创建了一个名为`Framework`的\
    \ BlueJ 项目，其中包含必要的源代码文件，以提供一个便捷的起点。要开始第一个项目：\n\n*   下载本章的源代码文件。\n*   复制下载的`Framework`文件夹（及其内容），并将其重命名为`Treasure\
    \ Quest`。\n*   将下载的`Treasure Quest`项目 assets 文件夹中的所有内容复制到你新创建的`Treasure Quest\
    \ assets`文件夹中。\n*   打开你`Treasure Quest`文件夹中的 BlueJ 项目。\n*   在`CustomGame`类中，将类名改为`TreasureQuestGame`（BlueJ\
    \ 随后会将源代码文件重命名为`TreasureQuestGame.java`）。\n*   在`Launcher`类中，将`main`方法的内容改为以下内容：\n\
    \n```\n    Game myGame = new TreasureQuestGame ();\n    LwjglApplication launcher\
    \ = new LwjglApplication(\n    myGame, \"Treasure Quest\", 800, 600 );\n    ```\n\
    \n## 关卡设置\n\n首先，启动 Tiled 地图编辑器软件。创建一个新地图，地图尺寸宽度为 40 个瓦片，高度为 40 个瓦片，瓦片尺寸宽度和高度均设置为\
    \ 32 像素。生成的地图将为 1280 x 1280 像素。点击“另存为...”按钮，将文件以文件名`map.tmx`保存到你的`assets`目录中。\n\
    \n接下来，为你的地图添加一个对象层。然后，在“图块集”面板中，使用图像`adventure-tiles.png`（如图 12-3 左侧所示）添加一个新图块集，将瓦片尺寸设置为\
    \ 32 x 32，并勾选将图块集嵌入地图的复选框。以相同方式，这次使用图像`object-tiles.png`（如图 12-3 右侧所示）为地图添加另一个新图块集。由于对象瓦片将用于指示游戏世界对象应生成的位置，你需要指定相应的\
    \ Java 类（稍后你将创建这些类）。在图块集面板中，选择 object-tiles，并点击编辑图块集的图标。在出现的选项卡中，你需要逐个点击每个瓦片，并为每个瓦片添加一个新的自定义属性。该属性应命名为`name`；这些瓦片对应的值（从左到右）分别为`Bush`、`Rock`、`Coin`、`Treasure`、`Flyer`、`NPC`、`ShopHeart`和`ShopArrow`。此外，对于\
    \ NPC 瓦片，添加第二个名为`id`的自定义属性，值为`default`，以及第三个名为`text`的自定义属性，值为`Hello, World!`。（这些默认值稍后将在瓦片地图编辑器中针对特定实例被覆盖。）\n\
    \n![A352797_2_En_12_Fig3_HTML.jpg](img/A352797_2_En_12_Fig3_HTML.jpg)\n\n图 12-3.\n\
    \n瓦片层（左）和对象层（右）的图块集\n\n返回到显示瓦片地图的选项卡。在“图层”面板中，选择“Tile Layer 1”。在图块集面板中，选择 adventure-tiles，然后按\
    \ B 键激活“印章画笔”工具。在整个地图上添加草地瓦片（使用“桶填充”工具可以大大加快速度），然后沿边缘添加木栅栏瓦片。此外，在地图中心附近添加两个大型围栏区域，每个区域都有一个两瓦片宽的入口，以便英雄通过；瓦片地图的下半部分如图\
    \ 12-4 所示。\n\n![A352797_2_En_12_Fig4_HTML.jpg](img/A352797_2_En_12_Fig4_HTML.jpg)\n\
    \n图 12-4.\n\n在瓦片层添加草地和栅栏瓦片\n\n正如前一章所述，瓦片层仅用于简化从图块集创建图像的过程。在实际游戏中，栅栏瓦片应为实心障碍物，因此你需要在对象层中添加矩形来存储对应区域的数据。在“图层”面板中，选择“Object\
    \ Layer 1”，然后按 R 键激活“矩形”工具。在所有包含实心瓦片的区域周围绘制矩形；为简化操作，可以绘制同时包围多个瓦片的矩形。每次添加这些矩形时，你还必须添加一个名为`name`的自定义属性，值为`Solid`（稍后将用于初始化对应的角色）。为加速此过程，当选中一个矩形且“选择对象”工具处于活动状态时，你可以使用快捷键组合`Ctrl+D`来复制对象（包括自定义属性），然后只需重新定位和调整新对象的大小（新对象会直接出现在原始对象上方）。一旦你为所有包含实心瓦片的区域添加了对应的矩形，在地图底部中央添加最后一个矩形，以指示英雄的起始位置；添加自定义属性`name`，值为`Start`。\n"
- fmt: '接下来，你将添加游戏对象，目标是实现与图[12-5](#A352797_2_En_12_Chapter.html#Fig5)类似的设计。按下`T`键激活“插入图块”工具。从对象图块集（`object-tiles`）中添加`Bush`和`Rock`图块，围出一个包含英雄起始位置以及你之前创建的两个围栏区域入口的区域；这将用于阻挡敌人接近英雄，直到玩家做好准备并使用剑移除灌木丛。在左侧围栏区域中央放置一个`Treasure`图块，并在入口中间放置一个`NPC`图块。在此过程中，按住`Ctrl`键同时定位图块可能会很有用，这允许将图块放置在网格方格之间。对于那个`NPC`图块，暂时切换到选择工具，并将其自定义属性`id`的值改为`Gatekeeper`。（该NPC将显示的文本稍后通过代码设置，因此你无需更改此属性。）在右侧围栏区域，在顶部中央添加一个`NPC`图块，将`id`改为`Shopkeeper`，将`text`改为`1
    heart for 3 coins! 3 arrows for 4 coins!`（这将产生图[12-2](#A352797_2_En_12_Chapter.html#Fig2)中所示的消息。）此外，在中间添加一个`ShopHeart`图块和一个`ShopArrow`图块，两者之间至少相隔一个网格方格。在此区域某处添加一个`Coin`图块，用于后续测试。最后，在你创建的封闭区域之外，添加一堆`Flyer`图块以及一些散落的`Bush`和`Rock`图块。


    ![A352797_2_En_12_Fig5_HTML.jpg](A352797_2_En_12_Fig5_HTML.jpg)


    图12-5. 向对象层添加对象图块


    完成后，保存图块地图，如果愿意可以关闭Tiled地图编辑器，然后在BlueJ中打开`Treasure Quest`项目（如果尚未打开）。首先，为了表示英雄和其他游戏实体将与之碰撞的固体对象，类似于第[11](#A352797_2_En_11_Chapter.html)章的过程，创建一个名为`Solid`的类，包含以下代码：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Solid extends BaseActor

    {

    public Solid(float x, float y, float width, float height, Stage s)

    {

    super(x,y,s);

    setSize(width, height);

    setBoundaryRectangle();

    }

    }

    ```


    接下来，在`LevelScreen`类中添加以下`import`语句：


    ```

    import com.badlogic.gdx.maps.MapObject;

    import com.badlogic.gdx.maps.MapProperties;

    ```


    然后，在`initialize`方法中添加以下代码，以加载图块地图并生成与图块地图中矩形对应的`Solid`对象：


    ```

    TilemapActor tma = new TilemapActor("assets/map.tmx", mainStage);

    for (MapObject obj : tma.getRectangleList("Solid") )

    {

    MapProperties props = obj.getProperties();

    new Solid( (float)props.get("x"),     (float)props.get("y"),

    (float)props.get("width"), (float)props.get("height"),

    mainStage );

    }

    ```


    此时，你可以测试项目，尽管你只能看到关卡的一小部分，并且尚未编写创建由对象图块表示的游戏实体的代码。你的第一个任务是添加英雄角色，这将在下一节中说明。


    ## 英雄


    在本节中，你将创建英雄角色的代码。由于此游戏采用俯视视角，英雄将拥有四种不同的动画，分别对应四个基本方向（北、南、东、西）的行走。该类的主要职责是初始化动画，并根据实际运动角度显示正确的动画。此外，该类能够确定角色当前面对的角度（将是90度的倍数）也很重要。


    对于冒险游戏或角色扮演游戏，许多包含俯视角色行走动画的精灵表通常会将所有四个方向的动画帧放在一个精灵表中，每个方向一行，如图[12-6](#A352797_2_En_12_Chapter.html#Fig6)所示。这种布局标准尤其受到游戏引擎软件RPG
    Maker的推广。要从各行中提取动画帧并创建相应的动画，需要使用`TextureRegion`类的`split`方法，你将会看到这一点。


    ![A352797_2_En_12_Fig6_HTML.jpg](A352797_2_En_12_Fig6_HTML.jpg)


    图12-6. 包含四个方向行走动画的单个精灵表


    首先，创建一个名为`Hero`的类，包含以下代码：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.utils.Array;

    public class Hero extends BaseActor

    {

    Animation north;

    Animation south;

    Animation east;

    Animation west;

    float facingAngle;

    public Hero(float x, float y, Stage s)

    {

    super(x,y,s);

    String fileName = "assets/hero.png";

    int rows = 4;

    int cols = 4;

    Texture texture = new Texture(Gdx.files.internal(fileName), true);

    int frameWidth  = texture.getWidth()  / cols;

    int frameHeight = texture.getHeight() / rows;

    float frameDuration = 0.2f;

    TextureRegion[][] temp = TextureRegion.split(texture, frameWidth, frameHeight);

    Array textureArray = new Array();

    for (int c = 0; c < cols; c++)

    textureArray.add( temp[0][c] );

    south = new Animation(frameDuration, textureArray, Animation.PlayMode.LOOP_PINGPONG);

    textureArray.clear();

    for (int c = 0; c < cols; c++)

    textureArray.add( temp[1][c] );

    west = new Animation(frameDuration, textureArray, Animation.PlayMode.LOOP_PINGPONG);

    textureArray.clear();

    for (int c = 0; c < cols; c++)

    textureArray.add( temp[2][c] );

    east = new Animation(frameDuration, textureArray, Animation.PlayMode.LOOP_PINGPONG);

    textureArray.clear();

    for (int c = 0; c < cols; c++)

    textureArray.add( temp[3][c] );

    north = new Animation(frameDuration, textureArray, Animation.PlayMode.LOOP_PINGPONG);

    setAnimation(south);

    facingAngle = 270;

    setBoundaryPolygon(8);

    setAcceleration(400);

    setMaxSpeed(100);

    setDeceleration(400);

    }

    }

    ```


