- fmt: '# Infinite Scrolling


    First, background elements will be set up to provide an “infinite” scrolling effect.
    This requires a seamless texture, an image that can be placed side by side with
    itself without creating a noticeable boundary. Two copies of such an image will
    be used, each of which is at least as large as the screen. The setup is illustrated
    in Figure [7-2](#A352797_2_En_7_Chapter.html#Fig2); the rectangles with dashed-line
    boundaries contain the seamless texture, while the rectangle with the solid-line
    boundary represents the game screen. The left edge of image 2 is adjacent to the
    right edge of image 1, and they both move to the left at the same rate. When the
    right edge of image 1 moves completely past the left edge of the screen, image
    1 will be repositioned to the opposite side; the left edge of image 1 will become
    adjacent to the right edge of image 2. This process continues indefinitely.


    ![A352797_2_En_7_Fig2_HTML.jpg](A352797_2_En_7_Fig2_HTML.jpg)


    Figure 7-2. Positioning seamless textures to produce an infinite scrolling effect


    First, you will create a sky object, which scrolls slowly to the left. The `act`
    method of this object will check if the right edge of the image has passed beyond
    the left edge of the screen. If so, it will shift the image to the right so that
    its left edge becomes aligned with the right edge of the other image, which requires
    moving in the x-direction by twice the width of the image. To accomplish these
    tasks, create a new class named `Sky` containing the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Sky extends BaseActor

    {

    public Sky(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/sky.png");

    setSpeed(25);

    setMotionAngle(180);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    // if moved completely past left edge of screen:

    //   shift right, past other instance.

    if ( getX() + getWidth() < 0 )

    {

    moveBy( 2 * getWidth(), 0 );

    }

    }

    }

    ```


    Next, you will repeat this process to create a ground object that appears to scroll
    forever in the same way. The code will be nearly identical, except for the image
    used and the speed of the object. The difference in the speeds is motivated by
    the following observation: if you have ever watched the scenery go by while travelling
    in a car or a train, you may have noticed that the more distant objects appear
    to change position more slowly than the closer objects. This effect, called parallax,
    provides an easy way to add an illusion of depth in a 2D game. Since the ground
    should appear closer to the player than the background images of the sky, the
    ground should be moving at a faster rate. To set up the ground object, create
    a new class named `Ground` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Ground extends BaseActor

    {

    public Ground(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/ground.png");

    setSpeed(100);

    setMotionAngle(180);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    // if moved completely past left edge of screen:

    //   shift right, past other instance.

    if ( getX() + getWidth() < 0 )

    {

    moveBy( 2 * getWidth(), 0 );

    }

    }

    }

    ```


    To initialize two instances of each of these objects in the actual game, in the
    `LevelScreen` class, add the following code to the `initialize` method. (Note
    that these objects do not need to be stored in variables, since they can be easily
    accessed by the `getList` method of the `BaseActor` class at a later time.)


    ```

    new Sky(0,0, mainStage);

    new Sky(800,0, mainStage);

    new Ground(0,0, mainStage);

    new Ground(800,0, mainStage);

    ```


    This is a good point at which to test your project and verify that the scrolling
    works as expected; both the sky and the ground should appear to scroll to the
    left forever, and the ground should be moving faster than the sky, creating the
    illusion that the ground is closer to the player than the sky is.


    # The Player Plane and Simulating Gravity


    Next, you will set up the plane that is controlled by the player. The plane will
    use an image-based animation that makes the propeller appear to be spinning. You
    also need to set a maximum speed and a collision polygon that is more accurate
    than the default rectangle. To do so, create a class named `Plane` with the following
    code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Plane extends BaseActor

    {

    public Plane(float x, float y, Stage s)

    {

    super(x,y,s);

    String[] filenames =

    {"assets/planeGreen0.png", "assets/planeGreen1.png",

    "assets/planeGreen2.png", "assets/planeGreen1.png"};

    loadAnimationFromFiles(filenames, 0.1f, true);

    setMaxSpeed(800);

    setBoundaryPolygon(8);

    }

    }

    ```


    No matter what the player does, the force of gravity should always be pulling
    the plane downward. This can be simulated by accelerating the plane at an angle
    of 270 degrees (which points downward). The larger the value used for acceleration,
    the faster the plane will fall, and the “heavier” the plane will appear to be
    to the player. The best place to include this code is in an `act` method for the
    `Plane` class, since it is automatically called in each iteration of the game
    loop. There are a few other tasks that are best handled in the `act` method:


    - The plane should not fall through the ground object. This can be accomplished
    by checking if the plane overlaps with any of the ground objects and, if so, repositioning
    the plane (via the `preventOverlap` method) and setting the plane speed to `0`.
    This last step is necessary, for otherwise the plane would continue to accelerate
    and build up speed, and eventually would build up enough speed that it could pass
    though the ground in a single iteration of the game loop, which would make it
    appear as though the plane had suddenly disappeared, which the player would consider
    to be a glitch (an event that should be impossible according to the mechanics
    of the game world).

    - The plane should not be able to pass beyond the top edge of the screen. This
    can be accomplished by setting the world bounds in the game, and if the top edge
    of the plane passes beyond the top edge of the world bounds, calling the `boundToWorld`
    method and setting the plane speed to `0`. In this case, the speed adjustment
    is necessary, because otherwise the residual speed would make the plane appear
    to float or stick to the top edge of the screen until the simulated gravity pulled
    it downward.


    To handle all of these tasks, in the `Plane` class, add the following `act` method:


    ```

    public void act(float dt)

    {

    super.act(dt);

    // simulate force of gravity

    setAcceleration(800);

    accelerateAtAngle(270);

    applyPhysics(dt);

    // stop plane from passing through the ground

    for (BaseActor g : BaseActor.getList(this.getStage(), "Ground"))

    {

    if ( this.overlaps(g) )

    {

    setSpeed(0);

    preventOverlap(g);

    }

    }

    // stop plane from moving past top of screen

    if ( getY() + getHeight() > getWorldBounds().height )

    {

    setSpeed(0);

    boundToWorld();

    }

    }

    ```


    Finally, you need to add a way for the player to control the vertical movement
    of the plane. As described earlier in the chapter, the plane movement will be
    discrete: with each tap of the spacebar key, the plane will get a little boost
    of speed. Similar to the organization of the code implementing the discrete actions
    in the Space Rocks game, you will create a method in the `Plane` class that gives
    a boost of vertical speed to the plane, and this method will be called by the
    `keyDown` method in the `LevelScreen` class.


    First, in the `Plane` class, add the following method:


    ```

    public void boost()

    {

    setSpeed(300);

    setMotionAngle(90);

    }

    ```'
