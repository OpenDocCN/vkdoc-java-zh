  trans: '

    ## 附录 A：游戏设计文档


    在您通过本书中的示例项目学习游戏开发的众多技术和实践方面的同时，在游戏设计的理论方面打下坚实基础也同样重要。为这些概念创建框架的首次尝试，见于 Robin
    Hunicke、Marc LeBlanc 和 Robert Zubek 于 2004 年发表的一篇论文。¹ 在该论文中，他们提出了机制-动态-美学（MDA）框架，该框架为分类游戏组件提供了一种有用的方法。他们将**机制**定义为游戏的正式规则，体现在数据结构和算法层面；**动态**定义为游戏进行过程中玩家与游戏机制之间的交互；**美学**则定义为玩家在游戏交互过程中所体验到的情感反应。此后，其他框架也被相继提出，每个框架都提供了不同的游戏分析方法。一个广为人知的例子是
    Jesse Schell 的**元素四元组**，² 它由机制、故事、美学和技术组成（其中美学的定义比最初的 MDA 框架更为宽泛）。诸如此类的框架是帮助人们持续且全面地分析游戏的宝贵工具。玩家可以利用框架更好地理解和表达他们对特定游戏的喜爱之处。开发者则可以利用这种形式化的结构来帮助自己创建更具凝聚力的设计，并组织和记录开发过程；而本附录的目标正是解释如何编写此类文档。


    游戏设计文档（GDD）是创建游戏的蓝图或总体规划。它描述了游戏的总体愿景以及细节（通常基于诸如 MDA 之类的游戏设计框架）。其中还包含实践方面的内容，例如列出特定功能完成时间的进度表、团队成员及其职责清单，以及游戏测试和发布计划。GDD
    可以在为游戏开发人员提供指导和参考的同时，带来清晰度和专注度。为了达到最佳效果，GDD 应在开发过程开始前尽可能完整。根据开发者的灵活程度，在开发过程中可能允许一定程度的修改，并且在收集到游戏玩法测试的反馈后，可能需要进行各种调整。


    游戏设计文档没有统一的标准格式；通过互联网搜索可以找到适用于各种开发场景的众多模板。GDD 模板通常包含一个项目符号列表，列出供您考虑的主题或问题（在适用的情况下）。在本章中，我们为您在自行设计游戏时提供了一份类似的问题清单供您思考，随后附上针对本书前面介绍的
    Space Rocks 游戏更完善版本的示例回答。这些问题所涵盖的范围特别适合从事游戏开发项目的个人或小团队。通过记录对以下问题的详细回答，您将有效地创建自己的游戏设计文档，从而指导您完成整个开发过程。


    ### 游戏设计文档问题

    '
- fmt: "# 1. Overall Vision\n\n1. Write a short paragraph (3–6 sentences) explaining\
    \ your game. (This is sometimes called the elevator pitch: a short summary used\
    \ to quickly and simply describe an idea or product during a 30-second elevator\
    \ ride.)\n2. How would you describe the genre(s)? Is it single-player or multi-player\
    \ (and, if the latter, cooperative or competitive)?\n3. What is the target audience?\
    \ Include demographics (the age, interests, and game experience of potential players),\
    \ the game platform (desktop, console, or smartphone), and any special equipment\
    \ required (such as gamepads).\n4. Why will people want to play this game? What\
    \ features distinguish this game from similar titles? What is the hook that will\
    \ get people interested at first, how will the game keep people interested, and\
    \ what makes it fun?\n\n# 2. Mechanics: the rules of the game world\n\n(Note that\
    \ the questions that follow are phrased in terms of the game’s main character,\
    \ as distinguished from the player, since the player is the focus of the section\
    \ on dynamics. However, if no such character exists, the player can be considered\
    \ as the character.)\n\n1. What are the character’s goals? These may be divided\
    \ into short-term, medium-term, and long-term goals.\n2. What abilities does the\
    \ character have? This should include any action the character is capable of performing,\
    \ such as moving, attacking, defending, collecting items, interacting with the\
    \ environment, and so forth. Describe the abilities or actions in detail; for\
    \ example, how high can the character jump? Can the character both walk and run?\n\
    3. What obstacles or difficulties will the character face? Some obstacles are\
    \ active (such as enemies, projectiles, or traps) and should be described in detail\
    \ (how they affect the player, their location, movement patterns, and so forth).\
    \ Other obstacles are passive (such as doors that need to be unlocked, mazes that\
    \ need to be navigated, puzzles that need to be solved, or time limits that need\
    \ to be to beat). How can the character overcome these obstacles (items, weapons,\
    \ spells, quick reflexes)?\n4. What items can the character obtain? What are their\
    \ effects, where are they obtained, and how frequently do they appear?\n5. What\
    \ resources must be managed (such as health, money, energy, and experience)? How\
    \ are these resources obtained and used? Are they limited?\n6. Describe the game-world\
    \ environment. How large is the world (relative to the screen)? Are there multiple\
    \ rooms or regions? Is the gameplay linear or open? In other words, is there a\
    \ strictly linear progression of levels or tasks to complete, or can the character\
    \ select levels, explore the world, and complete quests at will?\n\n# 3. Dynamics:\
    \ the interaction between the player and the game mechanics\n\n1. What hardware\
    \ is required by the game (keyboard, mouse, speakers, gamepad, touchscreen)? Which\
    \ keys/buttons are used, and what are their effects? How is the player informed\
    \ of the control scheme (a separate manual document, game menus, tutorials, or\
    \ in-game signs)?\n2. What type of proficiency will the player need to develop\
    \ to become proficient at the game? Are there any complex actions that can be\
    \ created from combinations of basic game mechanics? Do the game mechanics or\
    \ game-world environment directly or indirectly encourage the player to develop\
    \ or discourage any particular play strategies? Does the player’s performance\
    \ affect the gameplay mechanics (as in feedback loops)?\n3. What gameplay data\
    \ is displayed during the game (such as points, health, items collected, time\
    \ remaining)? Where is this information displayed on the screen? How is the information\
    \ conveyed (text, icons, charts, status bars)?\n4. What menus, screens, or overlays\
    \ will there be (title screen, help/instructions, credits, game over)? How does\
    \ the player switch between screens, and which screens can be accessed from each\
    \ other?\n5. How does the player interact with the game at the software level\
    \ (pause, quit, restart, control volume)?\n\n# 4. Aesthetics: the visual, audio,\
    \ narrative, and psychological aspects of the game\n\nThese are the elements that\
    \ most directly affect the player’s experience.\n\n1. Describe the style and feel\
    \ of the game. Does the game take place in a world that is rural, technological,\
    \ or magical? Does the game world feel cluttered or sparse, ordered or chaotic,\
    \ geometric or organic? Is the mood lighthearted or serious? Is the pace relaxing\
    \ or frenetic? All the aesthetic elements discussed here should work together\
    \ and contribute to create a coherent and cohesive theme.\n2. Does the game use\
    \ pixel art, line art, or realistic graphics? Are the colors bright or dark, varied\
    \ or monochromatic, shiny or dull? Will there be value-based or image-based animations?\
    \ Are there any special effects? Create a list of graphics you will need.\n3.\
    \ What style of background music or ambient sounds will the game use? What sound\
    \ effects will be used for character actions, or for interactions with enemies,\
    \ objects, and the environment? Will there be sound effects corresponding to interactions\
    \ with the user interface? List all the music and sounds you will need.\n4. What\
    \ is the relevant backstory for the game? What is the character’s motivation for\
    \ pursuing their goal? Will there be a plot or storyline that unfolds as the player\
    \ progresses through the game?\n5. What emotional state(s) does the game try to\
    \ provoke: happiness, excitement, calm, surprise, pride, sadness, tension, fear,\
    \ frustration?\n6. What makes the game “fun”? Some players may enjoy the graphics,\
    \ music, story, or emotions evoked by the game. Other features players might enjoy\
    \ include:\n   - fantasy (simulating experiences one doesn’t have in real life)\n\
    \   - role-playing (identifying with a character)\n   - competition (against other\
    \ players or against records previously set by oneself)\n   - cooperation (working\
    \ with others toward a common goal)\n   - compassion (providing assistance or\
    \ rescuing others)\n   - discovery (finding objects or exploring a world)\n  \
    \ - overcoming challenges (such as defeating enemies or solving puzzles)\n   -\
    \ collection (including game items or badges/trophies for achievements)\n   -\
    \ social aspects (both within the game and the communities that form around the\
    \ game).\n\n# 5. Development\n\n1. If working with a group: list the team members\
    \ and their roles (game designer, programmer, illustrator, animator, composer,\
    \ sound editor, writer, manager, etc.), responsibilities, and skills.\n2. What\
    \ equipment will you need for this project? Include both hardware and software\
    \ that will be needed for content creation (graphics and audio), game development,\
    \ and playtesting.\n3. What are the tasks that need to be accomplished to create\
    \ this game? Estimate the time required for each task and note the estimated completion\
    \ date, the team member responsible, and the priority of each feature (in case\
    \ some features need to be eliminated due to time constraints or unexpected circumstances).\n\
    4. What points in the development process are suitable for playtesting? How will\
    \ you find people to playtest your game? What specific kinds of feedback are you\
    \ interested in gathering? (For example, you could ask how clear the goals are,\
    \ how easy or intuitive the controls are, how balanced the difficulty level is,\
    \ and which parts of the game were most or least enjoyable.) Finally, how will\
    \ you collect this information (such as a questionnaire or a brief discussion)?\n\
    5. What are your plans for dissemination? Do you have plans to promote this game\
    \ through social media, forum postings, gameplay videos, or advertisements?"
