- fmt: "### Using BlueJ\n\nWhen learning a new programming language or library, it\
    \ is a well-established tradition in computer science to write a “Hello, World!”\
    \ application as a first program. This section will cover the basics of using\
    \ BlueJ to write this program:\n\n1. Start up the BlueJ software. (The first time\
    \ you run it, it may prompt you for the location of the directory where the JDK\
    \ is stored, and it may also ask if you want to participate in helping to improve\
    \ the software by providing information.)\n2. When the main window appears, in\
    \ the menu bar, select Project, then select New Project. BlueJ organizes your\
    \ work into projects, which are stored as directories; all Java source code and\
    \ compiled class files are stored in the project directory.\n3. When prompted\
    \ for a project name, navigate to a folder where you want to store your files,\
    \ enter `MyProject`, and click the OK button. This creates a folder in the selected\
    \ location with the same name. After Step 3, your screen should look similar to\
    \ Figure [1-2](#A352797_2_En_1_Chapter.html#Fig2).\n\n![A352797_2_En_1_Fig2_HTML.jpg](A352797_2_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2. The BlueJ project window\n\n4. Create a new class, either by clicking\
    \ the New Class button or by selecting Edit and then selecting New Class from\
    \ the menu bar.\n5. When you are prompted to enter a name for the class, type\
    \ `HelloWorld` and press the Enter key, or click the OK button. An orange rectangle\
    \ appears with the name of your class at its top. The gray diagonal lines indicate\
    \ that the code has not yet been compiled.\n6. Either double-click the rectangle\
    \ or right-click and select Open Editor to edit the file. You will see that some\
    \ template code has been added. You should begin by deleting this code; the simplest\
    \ way is to press Ctrl-A to select all the code, then press the Delete key. Then,\
    \ enter the following code in its place:\n\n```\npublic class HelloWorld\n{\n\
    \    public static void main()\n    {\n        System.out.print(\"Hello, World!\"\
    );\n    }\n}\n```\n\nAfter entering this code into BlueJ, it should appear similar\
    \ to the screenshot in Figure [1-3](#A352797_2_En_1_Chapter.html#Fig3). Don’t\
    \ worry about what this code does just yet. If there are any errors in the code,\
    \ then that line number will be marked in red and the incorrect syntax will be\
    \ underlined. If you hover the mouse pointer over the error, a popup will appear\
    \ that provides a description of the error and sometimes a suggestion for how\
    \ to fix it. Figure [1-4](#A352797_2_En_1_Chapter.html#Fig4) illustrates what\
    \ would happen if you accidentally typed `pint` instead of `print` in the preceding\
    \ source code.\n\n![A352797_2_En_1_Fig4_HTML.jpg](A352797_2_En_1_Fig4_HTML.jpg)\n\
    \nFigure 1-4. A syntax error caught by the BlueJ code editor\n\n![A352797_2_En_1_Fig3_HTML.jpg](A352797_2_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3. A “Hello, World!” program displayed in the BlueJ code editor\n\n\
    7. Click the Compile button to compile your code. (This action also automatically\
    \ saves your code.) You should see the message “Class compiled – no syntax errors”\
    \ in the status bar at the bottom of the window.\n8. Return to the main BlueJ\
    \ window. Right-click the orange rectangle representing the class (it contains\
    \ the class name `HelloWorld` across the top), and select the method `void main()`\
    \ from the list that appears. This runs the method that you have just written.\
    \ A terminal window appears containing the text Hello, World!, as shown in Figure\
    \ [1-5](#A352797_2_En_1_Chapter.html#Fig5).\n\n![A352797_2_En_1_Fig5_HTML.jpg](A352797_2_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5. Text displayed by the “Hello, World!” program\n\nCongratulations\
    \ on running your first program using BlueJ!\n\nBlueJ has a number of features\
    \ that make programming easier. While entering the preceding code, you may have\
    \ noticed the syntax highlighting (Java keywords and strings appear in different\
    \ colors) and also that classes and methods appear surrounded by different background\
    \ colors, which makes it easier to visually inspect your code. (Later, you’ll\
    \ notice that conditional statements and loops are similarly distinguished with\
    \ background colors.) BlueJ contains additional features that you may find useful,\
    \ such as the following:\n\n* Automatic code formatting. Selecting Auto-Layout\
    \ from the Edit menu of the source code editing window will adjust the whitespace\
    \ in your code so that nested statements are aligned consistently.\n* Listing\
    \ available method names. After typing the name of a class or object, followed\
    \ by a period, pressing Ctrl+Space will display a list of available method names.\n\
    * Shortcut keys for indenting/un-indenting and commenting/uncommenting blocks\
    \ of code. These are listed in the Edit menu.\n* A simple interface for adding\
    \ breakpoints, which activates a debugger that allows you to step through code\
    \ line by line and easily inspect objects.\n\nFor complete information on these\
    \ and other features, see the BlueJ reference manual at [`www.bluej.org/doc/bluej-ref-manual.pdf`](http://www.bluej.org/doc/bluej-ref-manual.pdf).\
    \ At this point, you can close the code editor window and terminal window."
