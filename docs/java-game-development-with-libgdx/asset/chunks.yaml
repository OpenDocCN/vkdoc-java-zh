    ### 多边形与矩形


    `Polygon`（多边形）是一种数据结构，通过其顶点（角）的坐标来定义形状；它使用一个`float`值数组进行初始化，该数组依次定义各个顶点的坐标。（相比之下，`Rectangle`类除了宽度和高度外，只需要一个顶点——左下角。）例如，如果一个多边形的顶点为
    (x0,y0), (x1,y1), ... , (xN,yN)，那么对应的`Polygon`对象将使用数组`{x0, y0, x1, y1, ... , xN,
    yN}`进行初始化。例如，要创建一个与矩形形状相同的多边形，该矩形左下角顶点为 (0,0)，宽度为 w，高度为 h（如图 3-7 所示），其顶点（按逆时针顺序）为
    (0,0)、(w,0)、(w,h) 和 (0,h)，则应使用数组`{0, 0, w, 0, w, h, 0, h}`。


    ![A352797_2_En_3_Fig7_HTML.jpg](img/A352797_2_En_3_Fig7_HTML.jpg)


    图 3-7.


    宽度为 w、高度为 h 的矩形的顶点


    实际上，矩形多边形将被用作所有游戏对象的默认形状（第二种选项将在后面讨论）。使用`Polygon`类而非`Rectangle`类的一个重要原因是，`Polygon`对象还可以旋转，这对于也会旋转的游戏实体（例如《海星收集者》中的乌龟）非常有用。


    首先，在`BaseActor`类中添加以下`import`语句：


    ```

    import com.badlogic.gdx.math.Polygon;

    ```


    在类中添加以下字段变量：


    ```

    private Polygon boundaryPolygon;

    ```


    接下来，添加以下方法，该方法按上述方式创建一个矩形多边形：


    ```

    public void setBoundaryRectangle()

    {

    float w = getWidth();

    float h = getHeight();

    float[] vertices = {0,0, w,0, w,h, 0,h};

    boundaryPolygon = new Polygon(vertices);

    }

    ```


    调用此方法的最佳时机是在设置宽度和高度之后，以便自动将此形状设为默认形状，这通常发生在`setAnimation`方法中。在该方法的末尾，添加以下代码：


    ```

    if (boundaryPolygon == null)

    setBoundaryRectangle();

    ```


    下一个（也是最复杂的）任务是编写一个方法，用于初始化一个比矩形“更圆”的多边形形状（以避免仅包含透明像素的角部重叠问题）。为此，你将创建一个多边形，近似于图
    3-8 所示矩形区域内包含的椭圆形状²。此方法涉及一些数学方程来计算顶点坐标。三角函数正弦和余弦可用于参数化圆或椭圆，这意味着你可以根据另一个变量 t 来编写
    x 和 y 坐标的函数。例如，如果我们设 x = cos(t) 且 y = sin(t)，那么当变量 t 的取值范围从 0 到 2 × pi（约 6.28）³时，对应的
    (x,y) 点将描绘出半径为 1 的圆的形状。你可以调整这些方程来生成一个恰好适合给定矩形区域的椭圆，如图 3-8 所示。首先，必须将 x 乘以 w/2，y
    乘以 h/2，以使椭圆具有正确的大小。然而，这样得到的椭圆以原点为中心，而你需要椭圆以 (w/2, h/2) 为中心；因此，将这些值分别加到 x 和 y 方程中。方程的最终形式如下：


    ![A352797_2_En_3_Fig8_HTML.jpg](img/A352797_2_En_3_Fig8_HTML.jpg)


    图 3-8.


    包含在矩形内的椭圆


    ```

    x = w/2 * cos(t) + w/2

    y = h/2 * sin(t) + h/2

    ```


    `setBoundaryPolygon`方法包含一个循环，用于在区间 [0, 6.28] 内生成一组 n 个等间距的 t 值，然后计算对应的 x 和 y 坐标，并将它们存储在一个数组中，该数组将用于初始化多边形。如果
    n = 4，多边形将是菱形；如果 n = 8，多边形将是八边形，依此类推。n 的值越大，形状就越平滑。然而，这需要权衡：通用多边形的碰撞检测计算量很大；n
    值过大会显著降低程序运行速度。对于本书中创建的游戏，n = 8 的值应该足够精确。图 3-9 展示了一个椭圆及其 n = 8 的多边形近似。


    ![A352797_2_En_3_Fig9_HTML.jpg](img/A352797_2_En_3_Fig9_HTML.jpg)


    图 3-9.


    一个椭圆及其八边形近似


    `setBoundaryPolygon`的代码如下所示。请务必记住，在设置`Actor`对象的大小（无论是通过`setSize`方法手动设置，还是通过`setAnimation`方法自动设置）之前，不要调用此方法，因为此方法需要设置宽度和高度值才能正常工作。


    ```

    public void setBoundaryPolygon(int numSides)

    {

    float w = getWidth();

    float h = getHeight();

    float[] vertices = new float[2*numSides];

    for (int i = 0; i < numSides; i++)

    {

    float angle = i * 6.28f / numSides;

    // x 坐标

    vertices[2*i] = w/2 * MathUtils.cos(angle) + w/2;

    // y 坐标

    vertices[2*i+1] = h/2 * MathUtils.sin(angle) + h/2;

    }

    boundaryPolygon = new Polygon(vertices);

    }

    ```


    接下来是一个名为`getBoundaryPolygon`的方法，它返回此`Actor`的碰撞多边形，并根据`Actor`对象的当前参数（例如位置和旋转）进行调整。


    ```

    public Polygon getBoundaryPolygon()

    {

    boundaryPolygon.setPosition( getX(), getY() );

    boundaryPolygon.setOrigin( getOriginX(), getOriginY() );

    boundaryPolygon.setRotation ( getRotation() );

    boundaryPolygon.setScale( getScaleX(), getScaleY() );

    return boundaryPolygon;

    }

    ```

