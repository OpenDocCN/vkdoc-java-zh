    ## 声音与音乐


    得益于 LibGDX 库的内置功能，为游戏添加音频是一个直接了当的过程。支持的文件类型包括 MP3、OGG 和 WAV。LibGDX 为此提供了两个接口：`Sound`
    和 `Music`，每个接口都可以通过 `Gdx` 类的 `audio` 对象创建。实现这些接口的类取决于所使用的平台；方便的是，这些细节已由 LibGDX
    为您处理。


    `Sound` 接口用于音效：当离散的游戏事件发生时播放的小型音频文件，例如收集物品、角色跳跃或两个物体碰撞时。音效通常很短（几秒或更短），对应的文件不应大于
    1 MB。（对于较大的音频片段，您应该使用接下来要解释的 `Music` 接口。）例如，要从名为 `beep.wav` 的音频文件创建一个 `Sound`
    对象，您可以编写以下代码：


    ```

    Sound effect = Gdx.audio.newSound( Gdx.files.internal("beep.wav") );

    ```


    创建声音后，使用 `play` 方法播放，该方法可选地接受一个浮点参数，用于确定声音播放的音量（0 为静音，1 为最大音量）。单个音效可以快速连续播放多次；在这种情况下，声音会简单地相互重叠。


    `Music` 接口用于较长的音频序列，例如背景音乐或环境音。`Music` 对象是从文件中流式传输的，而不是完全加载到内存中（后者是 `Sound` 对象的情况），这就是为什么在这种情况下可以使用大于
    1 MB 的文件。例如，要从名为 `song.mp3` 的音频文件创建一个 `Music` 对象，您可以编写以下代码：


    ```

    Music song = Gdx.audio.newSound( Gdx.files.internal("song.mp3") );

    ```


    `Music` 对象的音量可以随时使用 `setVolume` 方法设置，该方法接受一个浮点值，就像 `Sound` 对象一样。如果您希望音频循环播放，请使用
    `setLooping(true)` 方法。要控制播放，有 `play`、`pause` 和 `stop` 方法。要获取有关当前播放状态的信息，您可以使用
    `isPlaying`、`isLooping` 和 `getPosition` 方法，后者返回以秒为单位的当前位置。


    接下来，您将看到如何向上一章创建的 Starfish Collector 游戏中添加音乐和音效，以及一个可用于静音和取消静音的按钮，如图 6-2 所示。


    ![A352797_2_En_6_Fig2_HTML.jpg](img/A352797_2_En_6_Fig2_HTML.jpg)


    图 6-2.


    添加了音频和静音按钮的 Starfish Collector 游戏


    首先，从上一章复制 Starfish Collector 的项目目录，并将文件夹重命名为 `Starfish Collector Ch 6`。从书籍网站下载代码，并将三个音乐文件（扩展名为
    `ogg`）和新的图像文件（`audio.png`）从下载项目的 `assets` 文件夹复制到您本地项目的 `assets` 文件夹中。打开您的 BlueJ
    项目。首先，在 `BaseScreen` 类中，您将添加一个方法来简化检测触摸事件。添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.Event;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    import com.badlogic.gdx.scenes.scene2d.InputEvent.Type;

    ```


    接下来，添加以下方法，该方法将用于检查鼠标事件是否对应于按钮点击（例如，与鼠标移动事件相对）：


    ```

    public boolean isTouchDownEvent(Event e)

    {

    return (e instanceof InputEvent) && ((InputEvent)e).getType().equals(Type.touchDown);

    }

    ```


    本节中的其余代码将添加到 `LevelScreen` 类中。首先，添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.audio.Sound;

    import com.badlogic.gdx.audio.Music;

    ```


    然后，在类中声明以下变量：


    ```

    private float audioVolume;

    private Sound waterDrop;

    private Music instrumental;

    private Music oceanSurf;

    ```


    在 `initialize` 方法的末尾，添加以下代码来初始化这些变量并开始播放背景音乐。此应用程序中使用的歌曲“Master of the Feast”由
    Kevin MacLeod 从 `incompetech.com` 创作。¹


    ```

    waterDrop    = Gdx.audio.newSound(Gdx.files.internal("assets/Water_Drop.ogg"));

    instrumental = Gdx.audio.newMusic(Gdx.files.internal("assets/Master_of_the_Feast.ogg"));

    oceanSurf    = Gdx.audio.newMusic(Gdx.files.internal("assets/Ocean_Waves.ogg"));

    audioVolume = 1.00f;

    instrumental.setLooping(true);

    instrumental.setVolume(audioVolume);

    instrumental.play();

    oceanSurf.setLooping(true);

    oceanSurf.setVolume(audioVolume);

    oceanSurf.play();

    ```


    在 `update` 方法中，每当海龟与海星重叠时，将播放水滴音效。找到读取 `starfish.collected = true` 的代码行，并在此行代码之后添加以下内容：


    ```

    waterDrop.play(audioVolume);

    ```


    根据 LibGDX 文档，当您使用完一个音乐对象后，应调用 `Music` 类的 `dispose` 方法来释放内存（并停止歌曲继续播放）。因此，在 `initialize`
    方法中，将设置“重新开始”按钮监听器的代码块更改为以下内容：


    ```

    restartButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    instrumental.dispose();

    oceanSurf.dispose();

    StarfishGame.setActiveScreen( new LevelScreen() );

    return true;

    }

    );

    ```


    最后，您将向用户界面添加一个按钮，该按钮可通过更改 `audioVolume` 变量的值来静音和取消静音音频。在 `initialize` 方法中，在将监听器添加到
    `restartButton` 的代码之后，添加以下代码。特别注意表达式 `audioVolume = 1 - audioVolume`，它用于在 0 和
    1 之间切换 `audioVolume` 的值。


    ```

    ButtonStyle buttonStyle2 = new ButtonStyle();

    Texture buttonTex2 = new Texture( Gdx.files.internal("assets/audio.png") );

    TextureRegion buttonRegion2 =  new TextureRegion(buttonTex2);

    buttonStyle2.up = new TextureRegionDrawable( buttonRegion2 );

    Button muteButton = new Button( buttonStyle2 );

    muteButton.setColor( Color.CYAN );

    muteButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    audioVolume = 1 - audioVolume;

    instrumental.setVolume( audioVolume );

    oceanSurf.setVolume( audioVolume );

    return true;

    }

    );

    ```


    最后，要将这个新创建的按钮添加到用户界面，在 `initialize` 方法中，找到将 `restartButton` 添加到 `uiTable` 的代码行，并在此行代码之前添加以下内容：


    ```

    uiTable.add(muteButton).top();

    ```


    此外，由于现在 `uiTable` 包含四列，必须再进行一项修改，以便其他用户界面元素保持与之前相同的对齐方式。找到将 `dialogBox` 添加到 `uiTable`
    的代码行，并将其更改为以下内容：


    ```

    uiTable.add(dialogBox).colspan(4);

    ```


    现在，您已成功为游戏添加了音频和音频控制！在本章的这个阶段，您已经学习了音频的基础知识：`Sound` 和 `Music` 类及其方法。本章的其余部分包括高级材料以及创建一个基于音频的游戏，这对于后续章节并非必需。因此，如果您愿意，可以跳过本章的其余部分，直接进入下一章；否则，请随意继续阅读。

