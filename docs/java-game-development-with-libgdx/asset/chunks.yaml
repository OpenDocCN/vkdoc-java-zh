    # 10. 瓦片地图


    在本书之前开发的某些游戏中，一个具有挑战性的方面是物体的放置：计算角色在主舞台上出现的位置。在本章中，你将学习如何使用 Tiled，这是一款通用地图编辑软件，可用于关卡设计过程中的多个方面。具体来说，你将学习如何在改进之前两款游戏（《海星收集者》和《矩形破坏者》）的设计时使用
    Tiled。对于《海星收集者》游戏，你将设计一个迷宫般的关卡（使用岩石作为墙壁）并添加一些场景，如图 10-1 所示。对于《矩形破坏者》游戏，你将设计一个色彩缤纷的砖块布局，如图
    10-2 所示。这两款游戏的玩法与之前完全相同；唯一与代码相关的更改是添加一个类来导入你用 Tiled 创建的地图数据文件，并且这些游戏的 `initialize`
    方法将被简化。


    ![A352797_2_En_10_Fig2_HTML.jpg](img/A352797_2_En_10_Fig2_HTML.jpg)


    图 10-2.

    《矩形破坏者》重新设计的砖块布局


    ![A352797_2_En_10_Fig1_HTML.jpg](img/A352797_2_En_10_Fig1_HTML.jpg)


    图 10-1.

    重新设计的《海星收集者》关卡


    Tiled 由 Thorbjørn Lindeijer 于 2008 年创建，目前仍在积极开发中，并定期添加新功能和改进。该软件是开源且免费的（尽管开发者非常感谢为支持开发而进行的捐赠），适用于
    Windows、MacOS 和 Linux 系统。软件下载链接可在网站 [`http://www.mapeditor.org/`](http://www.mapeditor.org/)
    上找到。


    Tiled 的主要功能之一是获取一个图块集（一个由矩形图像或图块组成的精灵表，代表游戏世界地形的可能特征），并允许用户创建一个瓦片地图（对应于游戏世界图像的一组图块的选择和排列）。此外，Tiled
    还可用于将基于文本的数据与单个图块或几何形状关联起来，这对于实例化游戏世界实体非常有用。可以根据所使用的图像和图块集，为具有俯视视角或侧视视角的游戏设计关卡。Tiled
    使用 XML（可扩展标记语言）存储地图文件，这是一种既适合人类阅读也适合机器读取的基于文本的文件格式；LibGDX 提供了许多类来帮助解析这些数据文件，你将在后续章节中学习。


    ## 重温《海星收集者》游戏


    在本节中，你将学习如何在为《海星收集者》设计和创建瓦片地图的背景下使用 Tiled。首先，复制第 5 章（该章介绍了用户界面并在游戏中包含了 `Sign`
    对象）中的 `Starfish Collector` 项目，并将文件夹（以及项目）的名称更改为 `Starfish Collector Ch 10`。理论上，复制第
    6 章中的 `Starfish Collector` 项目也是可以接受的，尽管你不会用到该章中的任何音频新增内容。下载本章的源代码文件，并将下载项目中的 `assets`
    文件夹内容复制到你新项目的 `assets` 文件夹中；新文件包括一个名为 `large-water.jpg` 的背景图像（1024x1024 像素），一个名为
    `ocean-plants.png` 的精灵表（2x2 网格的海底植物图像，每个 64x64 像素），以及图像 `starfish.png`（已调整为 64x64
    像素，以便与将要创建的瓦片地图轻松对齐）。此外，请从前面提到的网站下载并安装 Tiled 软件。


    ### 创建瓦片地图


    下载并安装 Tiled 后，运行该程序。程序启动后，从“文件”菜单中选择“新建”，然后选择“新建地图”，将出现一个小窗口，如图 10-3 所示，允许你配置常规地图设置。在标记为“地图大小”的区域中，将“宽度”和“高度”设置更改为
    32 个图块，并将“图块大小”的“宽度”和“高度”设置更改为 32 像素。这将创建一个 1024x1024 像素的地图，该信息将显示在地图大小设置下方。其他参数应保留为默认设置，如图
    10-3 所示。单击标记为“另存为...”的按钮，并导航到你的项目的 `assets` 目录。将文件保存为 `map.tmx`（你可以替换文件夹中的现有文件）。将瓦片地图文件保存到包含你所用图像的同一目录中非常重要，因为瓦片地图文件存储的是图像文件相对于瓦片地图文件本身的位置，稍后将瓦片地图文件移动到新文件夹会导致图像文件加载失败。


    ![A352797_2_En_10_Fig3_HTML.jpg](img/A352797_2_En_10_Fig3_HTML.jpg)


    图 10-3.

    用于创建新地图的 Tiled 设置窗口


    此时，主编辑器窗口将出现，如图 10-4 所示。为了看到中央区域完整的方格网格，你可能需要缩小视图（一次或多次），这可以通过“视图”菜单访问。在此窗口的右上角区域，你将看到一个图层列表，其中默认包含一个图块图层（名为
    `Tile Layer 1`），用于从图块集创建图像。


    ![A352797_2_En_10_Fig4_HTML.jpg](img/A352797_2_En_10_Fig4_HTML.jpg)


    图 10-4.

    Tiled 地图编辑器软件的主窗口


    你可以添加的其他类型的图层包括图像图层（用于显示单个背景图像）和对象图层（用于添加具有关联的自定义文本数据的图块或几何对象）。你将在此项目中使用所有这些类型的图层，因此从“图层”菜单中选择“新建”，然后选择“图像图层”，并类似地添加一个新的“对象图层”（你可以保留默认名称）。在右上角的面板中，你将看到一个图层列表，其中
    `Tile Layer 1` 位于底部。图层的顺序很重要；图层按从列表底部到顶部的顺序渲染。你希望 `Image Layer 1` 首先渲染，因为它代表背景。要降低此图层在列表中的位置，请单击
    `Image Layer 1` 使其以蓝色高亮显示，然后在列表下方的图标行中，单击向下箭头图标；图层列表的顺序应如图 10-5 所示。（或者，你也可以选择
    `Tile Layer 1` 并单击向上箭头图标。）


    ![A352797_2_En_10_Fig5_HTML.jpg](img/A352797_2_En_10_Fig5_HTML.jpg)


    图 10-5.

    为《海星收集者》地图重新排序的图层


    接下来，你将添加背景图像。在图层列表中，确保当前选中了 `Image Layer 1`。在窗口左侧是一个标题为“属性”的面板，包含两列数据：左列列出属性名称，右列列出相应的值。在属性名为“图像”的行中，单击右侧的值列区域，将出现一个标记为“`...`”的按钮。单击此按钮，并从你的
    `assets` 目录中选择图像 `large-water.jpg`。完成后，图像文件的名称应出现在值列中，并且图像本身将显示在中央区域，如图 10-6 所示。


    ![A352797_2_En_10_Fig6_HTML.jpg](img/A352797_2_En_10_Fig6_HTML.jpg)


    图 10-6.

    在 Tiled 中加载背景图像

