- fmt: '# Game Project: Rhythm Tapper


    For the remainder of this chapter, you will creating a game called `Rhythm Tapper`,
    which can be classified in the genre of rhythm action video games, which includes
    classics such as the Konami arcade game Dance Dance Revolution, the Sony Playstation
    game PaRappa the Rapper, and the Umoni Studio mobile game Piano Tiles. Games in
    this genre require players to perform a sequence of actions (for this project,
    pressing a set of keys) with precise timing that is synchronized with music playing
    in the background. In `Rhythm Tapper`, the player will press the `F`, `G`, `H`,
    and `J` keys, which were chosen because they are in the center of the keyboard
    and are horizontally adjacent to each other, allowing the player to easily position
    a different finger above each of the keys at the same time. As seen in the game
    screenshot in Figure [6-1](#A352797_2_En_6_Chapter.html#Fig1) at the beginning
    of this chapter, there are four squares (which we will call target boxes) at the
    bottom of the screen, each displaying one of these letters. Colored squares (which
    we will call falling boxes) spawn above the screen in line with these targets
    and fall down at a constant speed, typically overlapping the target box at the
    same time as a beat in the song. The player’s goal is to press the corresponding
    key at the precise moment when the falling box overlaps and is perfectly centered
    on the target box. Each time a key is pressed, a number of points will be awarded
    based on how close the two boxes were (zero points when the boxes do not overlap
    at all), and a message will briefly flash on the screen to inform the player of
    how well they did (messages include “Perfect,” “Great,” “Good,” “Almost,” and
    “Miss”).


    The user interface will be displayed along the top edge of the screen. It will
    consist of a Start button that will begin the song when clicked, a label that
    will display the current time in the song and the ending time, and a label that
    will display the player’s current score and the maximum possible score for this
    song. In addition, there will be many subtle value-based animation effects used
    throughout, such as a small pulse effect on the target boxes and a fading effect
    on the falling boxes when the corresponding key is pressed. There will also be
    a three-second countdown period between the time the Start button is pressed and
    the time the song begins to give the player a chance to get ready to press the
    keys; this countdown effect will be accompanied by numbers that appear and a blip-like
    sound effect that will occur at one-second intervals. Finally, a “Congratulations”
    message will appear after the song is finished.


    The most difficult part of creating this rhythm game will be creating a file that
    stores the timing data required for creating the falling boxes: the key that the
    player should press and the song playback time at which the falling box should
    overlap the target box. Thus, before beginning work on the game application itself,
    the next section will discuss how to work with files in LibGDX, how to open a
    file-chooser dialog (to simplify the process of selecting files), the format of
    the file that stores timing data, and an application that can be used to help
    you create additional timing files.


    To begin, create a new project in BlueJ named `Rhythm Tapper`. Download the files
    for this project from the book website and copy the `assets` folder and the `+libs`
    folder (if not using the BlueJ `userlib` folder) from the downloaded project into
    your local project. Also, in your local project folder, make copies of the following
    Java files from the downloaded project: `BaseGame.java`, `BaseScreen.java`, and
    `BaseActor.java`. For a new visual style, you will be using a new font file (`Kirsty.ttf`);
    you can change this font parameter in the `BaseGame.java` file. Also, change the
    font size to 32.


    ## Working with Files


    Java applications often use the `File` class to provide access to system files.
    LibGDX provides an alternative class for this purpose, called `FileHandle`, which
    handles the platform-specific details of file operations and provides additional
    functionality for


    * reading from and writing to files;

    * copying, moving, and deleting files;

    * listing files and directories; and

    * checking whether files and directories exist.


    You have already been using `FileHandle` objects extensively, typically as anonymous
    instances passed as parameters to other methods, using the `Gdx.files` method
    `internal`, such as in the following example:


    ```

    Texture tex = new Texture( Gdx.files.internal("assets/image.png") );

    ```


    The `internal` method assumes that the file path is relative to the application.
    Another similar method, named `external`, assumes the path is relative to the
    root folder of the hardware device the application is running on. Alternatively,
    if you already have a `File` object, you can create an instance of the `FileHandle`
    class directly by using its constructor and the `File` object as parameters.


    When working with text files using the standard Java libraries, you might use
    classes such as `Scanner` to read the contents of a file and `PrintWriter` to
    write to or append to an existing file. In the application you are going to build,
    since the files you will be reading and writing to only contain text, you will
    instead use the `FileHandle` methods `readString` and `writeString`. The `readString`
    method returns the entire contents of the file as a single string, which you can
    separate by line into an array of strings using the `String` class method `split`
    and indicating that the newline character `"\n"` indicates the next array element.
    As an example, if you wanted to split a `FileHandle` object named `handle` into
    an array of strings, one line per array element, you would use the following line
    of code:


    ```

    String[] fileData = handle.readString().split("\n");

    ```


    Writing string data to a file represented by a `FileHandle` object is similarly
    straightforward. The `writeString` method takes two parameters: a string (the
    data to be written) and a Boolean value that indicates whether the data should
    be appended to the file (when the value is `true`) or should be used to overwrite
    all the data currently in the file (when the value is `false`).'
