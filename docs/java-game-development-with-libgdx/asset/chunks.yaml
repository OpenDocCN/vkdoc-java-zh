    {  return puzzleArea;  }

    public void clearPuzzleArea()

    {  puzzleArea = null;  }

    public boolean hasPuzzleArea()

    {  return puzzleArea != null;  }

    public boolean isCorrectlyPlaced()

    {

    return hasPuzzleArea()

    && this.getRow() == puzzleArea.getRow()

    && this.getCol() == puzzleArea.getCol();

    }

    }

    ```


    In addition, a majority of the game logic will be handled in this class by overriding
    the `onDragStart` and `onDrop` methods from the `DragAndDropActor` class . In
    particular, when the piece is dropped, if there is an available (targetable) puzzle
    area underneath it, the piece will be moved to that area, the piece’s corresponding
    puzzle-area variable will be set, and that particular area will not be targetable.
    Also, when a piece is dragged, if there was a corresponding puzzle area set, that
    area becomes targetable again, and the piece’s corresponding puzzle-area variable
    will be cleared. To accomplish these tasks, add the following two methods to the
    `PuzzlePiece` class:


    ```

    // override methods from DragAndDropActor class

    public void onDragStart()

    {

    if ( hasPuzzleArea() )

    {

    PuzzleArea pa = getPuzzleArea();

