  trans: '

    ### 在 LibGDX 中使用着色器


    在本节中，你将学习如何为 Starfish Collector 游戏中的演员添加着色器。首先，复制第 5 章的 `Starfish Collector` 项目，并将副本重命名为
    `Starfish Collector Shaders`。在该项目的 `assets` 文件夹中，新建一个名为 `shaders` 的文件夹；你将在此处添加包含顶点和片段着色器程序代码的文本文件。使用你选择的文本编辑器程序，创建一个包含前述默认顶点着色器代码的新文本文件；将该文件保存在
    `shaders` 文件夹中，文件名为 `default.vs`（扩展名 `vs` 是顶点着色器的助记符）。类似地，创建一个包含默认片段着色器代码的文本文件，并将其保存到
    `shaders` 文件夹中，文件名为 `default.fs`（`fs` 代表片段着色器）。接下来，在创建着色器程序的过程中，你将把这些文件的内容读取到
    `String` 中。


    打开 `Starfish Collector Shaders` 项目。首先，在 `Turtle` 类中添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.glutils.ShaderProgram;

    import com.badlogic.gdx.graphics.g2d.Batch;

    ```


    然后，在同一个类中添加以下变量声明：


    ```

    String vertexShaderCode;

    String fragmentShaderCode;

    ShaderProgram shaderProgram;

    ```


    要初始化着色器程序，你需要顶点着色器和片段着色器的代码。这可以通过 `FileHandle` 类的 `readString` 方法获得，该方法将文本文件的全部内容作为单个
    `String` 返回。使用这些代码，你可以初始化 `ShaderProgram` 对象，该对象会自动将代码发送到 GPU 并进行编译。你还需要在编译着色器程序后手动检查错误。为了完成这些任务，请在
    `Turtle` 类的 `constructor` 方法中添加以下代码：


    ```

    vertexShaderCode   = Gdx.files.internal("assets/shaders/default.vs").readString();

    fragmentShaderCode = Gdx.files.internal("assets/shaders/default.fs").readString();

    shaderProgram = new ShaderProgram(vertexShaderCode, fragmentShaderCode);

    if (!shaderProgram.isCompiled())

    System.out.println( "Shader compile error: " + shaderProgram.getLog() );

    ```


    最后，要使用自定义的 `ShaderProgram` 对象（而非默认对象）实际渲染海龟，你需要重写 `BaseActor` 类中的 `draw` 方法，并使用
    `Batch` 类的 `setShader` 方法设置着色器。当完成海龟的渲染后，将 `null` 作为参数传递给 `setShader` 方法会使 `Batch`
    类恢复使用 LibGDX 提供的内置默认着色器。在 `Turtle` 类中添加以下方法：


    ```

    public void draw(Batch batch, float parentAlpha)

    {

    batch.setShader(shaderProgram);

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    }

    ```


    此时，你可以测试程序了。它应该看起来与添加着色器之前完全一样，这是意料之中的，因为你所做的只是重建了默认着色器。然而，你建立的框架将非常有用，因为你将能够快速测试你在后续章节中编写的一系列着色器。


    ### 灰度着色器


    在这里，你将编写一个以灰度渲染纹理的片段着色器。当颜色的红色、绿色和蓝色分量都相等时，结果颜色就是灰色调。因此，要将颜色转换为灰色，你可以计算其红色、绿色和蓝色值的平均值，并将新颜色的所有分量设置为该平均值。然而，alpha
    值应保持不变。颜色 `c`（存储为 `vec4`）的红色、绿色、蓝色和 alpha 值可以分别通过 `c.r`、`c.g`、`c.b` 和 `c.a` 访问。在文本编辑器程序中，创建一个名为
    `grayscale.fs` 的文件（同样放在 `shaders` 目录中），包含以下代码：


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    void main()

    {

    vec4 color = texture2D(u_texture, v_texCoords);

    float average = (color.r + color.g + color.b) / 3.0;

    gl_FragColor = vec4(average, average, average, color.a);

    }

    ```


    在你的 BlueJ 项目中，在 `Turtle` 类的 `constructor` 方法中找到设置 `fragmentShaderCode` 的那行代码，并将其更改为以下内容：


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/grayscale.fs").readString();

    ```


    仅此而已；运行你的项目，海龟应该会以灰度显示！


    ### 自定义统一变量


    接下来，你将编写一个着色器，使图像的外观随时间变化。具体来说，你的下一个片段着色器将使海龟在其原始颜色和灰度之间平滑切换。要做到这一点，需要使用一个随时间振荡的值。为此，你将创建一个包含新统一变量
    `u_time` 的片段着色器。`Turtle` 类将包含一个名为 `time` 的对应变量，在其 `act` 方法中更新，并且 `time` 的值将被发送到着色器并存储在变量
    `u_time` 中。第一步是使用你的文本编辑器程序在 `shaders` 文件夹中创建一个名为 `grayscale-pulse.fs` 的文件，内容如下：


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    uniform float u_time;

    void main()

    {

    vec4 color = texture2D(u_texture, v_texCoords);

    float average = (color.r + color.g + color.b) / 3.0;

    vec4 grayscale = vec4(average, average, average, color.a);

    float value = (sin(6.28 * u_time) + 1.0) * 0.5;

    gl_FragColor = value * color + (1.0 - value) * grayscale;

    }

    ```


    请注意，变量 `value` 基于正弦函数，它将每秒在 0 和 1 之间振荡一次。相应地，当 `value` 等于 `0` 时，`gl_FragColor`
    被设置为 `grayscale`；当 `value` 等于 `1` 时，`gl_FragColor` 被设置为 `color`；当 `value` 在 `0`
    和 `1` 之间时，`gl_FragColor` 是中间颜色。


    接下来，在 BlueJ 的 `Turtle` 类中，添加以下变量声明：


    ```

    float time;

    ```


    在 `constructor` 方法中，将 `time` 的初始值设置为 0：


    ```

    time = 0;

    ```


    同时，将设置 `fragmentShaderCode` 的那行代码更改为以下内容：


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/grayscale-pulse.fs").readString();

    ```


    在 `act` 方法中，将 `time` 增加经过的时间 `dt`：


    ```

    time += dt;

    ```


    最后，修改 `draw` 方法，使其包含以下代码：


    ```

    batch.setShader(shaderProgram);

    shaderProgram.setUniformf("u_time", time);

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    ```


    请注意，前面新增的那行代码将 `time` 的值发送给名为字符串 `"u_time"` 的着色器变量，并且它必须包含在设置着色器程序之后，但在调用 `super.draw`
    之前。（每当你需要设置统一变量的值时，情况都是如此。）至此，你可以测试程序，并观察海龟图像从全彩色到灰度再返回的切换过程。

