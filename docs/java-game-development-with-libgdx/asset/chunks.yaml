- fmt: '# 9. Drag-and-Drop Games


    In this chapter, you will learn how to add drag-and-drop functionality to your
    games: the ability to click on an object and, while the mouse button is held down,
    have the selected object move along with the mouse until the button is released.
    Since this functionality is useful in many contexts, you will create an extension
    of the `BaseActor` class, called `DragAndDropActor`, containing the related code.
    To demonstrate the flexibility of this new class, you will create two new games
    that make use of this class. The first will be a jigsaw-puzzle game, shown in
    Figure 9-1, which consists of an image that has been broken into pieces and must
    be rearranged correctly on a grid. The second will be a solitaire card game called
    52 Card Pickup, shown in Figure 9-2, where a standard deck of playing cards must
    be correctly arranged in a set of piles.


    ![A352797_2_En_9_Fig2_HTML.jpg](A352797_2_En_9_Fig2_HTML.jpg)


    Figure 9-2. A solitaire card game


    ![A352797_2_En_9_Fig1_HTML.jpg](A352797_2_En_9_Fig1_HTML.jpg)


    Figure 9-1. A jigsaw-puzzle game


    Beginning this project requires the same steps as in previous projects: creating
    a new project, creating an `assets` folder and a `+libs` folder (the latter not
    being necessary if you have set up the `userlib` directory), copying the custom
    framework files you created in the first part of this book (`BaseGame.java`, `BaseScreen.java`,
    `BaseActor.java`), and copying the graphics and audio for this project into your
    `assets` folder. As described in the previous chapter, a BlueJ project named `Framework`
    has been created for your convenience that contains these items (except for the
    project-specific assets), as well as a `launcher` class and extensions of the
    `BaseGame` and `BaseScreen` classes. For efficiency, these files will be used
    as a starting point. To begin the first project:


    - Download the source code files for this chapter.

    - Make a copy of the downloaded `Framework` folder (and its contents) and rename
    it to `Jigsaw Puzzle` (as usual, you do not need the `+libs` folder if using the
    `userlibs` folder to store JAR files).

    - Copy all the contents of the downloaded `Jigsaw Puzzle` project `assets` folder
    into your newly created `Jigsaw Puzzle assets` folder.

    - Open the BlueJ project in your `Jigsaw Puzzle` folder.

    - In the `CustomGame` class, change the name of the class to `JigsawPuzzleGame`
    (BlueJ will then rename the source code file to `JigsawPuzzleGame.java`).

    - In the `Launcher` class, change the contents of the `main` method to the following:


    ```

    Game myGame = new JigsawPuzzleGame ();

    LwjglApplication launcher = new LwjglApplication(

    myGame, "Jigsaw Puzzle Game", 800, 600 );

    ```


    In the next section, you will create classes that encapsulate the drag-and-drop
    functionality for both this game project and the next. Unfortunately, there will
    be no way to test the functionality of the drag-and-drop actor classes until the
    game projects themselves are well under way.


    ## Drag-and-Drop Functionality


    The first step in developing the new `DragAndDropActor` class is to consider what
    functionality is required. Most importantly, this class will need to be able to
    respond to user input. When originally creating the `BaseScreen` class, you implemented
    the `InputProcessor` interface, which allowed the game to respond to mouse and
    touch input via methods such as `touchDown`, `touchDragged`, and `touchUp`. Similarly,
    the `Actor` class (and, by extension, the `Group` class, which is what the `BaseActor`
    class is based on) contains a method named `addListener`, which allows you to
    attach an `InputListener` object to the actor with implementations of the same
    methods as the `InputProcessor` class. The touch methods have the following method
    signatures:


    ```

    public void touchDown(InputEvent event, float x, float y, int pointer, int button)

    public void touchDragged(InputEvent event, float x, float y, int pointer)

    public void touchUp(InputEvent event, float x, float y, int pointer, int button)

    ```


    The most important point to note regarding the touch methods is that the float
    parameters `x` and `y` of these methods store the coordinates of the mouse relative
    to the object being clicked—they represent offsets, not absolute positions. For
    example, if an object has a width of 200 pixels and a height of 300 pixels, clicking
    in the center of this object would set the value of `x` to 100 and value of `y`
    to 150, regardless of where the object is located on the screen. For this reason,
    to calculate how much to move the actor by in the `touchDragged` method, you need
    to store the original `x` and `y` offsets received from the `touchDown` method.


    With this knowledge, you are now ready to begin writing some code. To begin, create
    a new class named `DragAndDropActor` containing the following code. Note that
    a reference to the actor itself needs to be stored in the variable `self` in order
    to access the class variables `grabOffsetX` and `grabOffsetY` within the context
    of the `InputListener` methods. The keyword `this` is a reference to the object
    whose method is being invoked. In the `InputListener`, `this` would refer to the
    `InputListener` itself, whereas you need to refer to the `DragAndDropActor`, thus
    necessitating the use of the extra variable `self`.


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.InputListener;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    /**

    *  Enables drag-and-drop functionality for actors .

    */

    public class DragAndDropActor extends BaseActor

    {

    private DragAndDropActor self;

    private float grabOffsetX;

    private float grabOffsetY;

    public DragAndDropActor(float x, float y, Stage s)

    {

    super(x,y,s);

    self = this;

    addListener(

    new InputListener()

    {

    public boolean touchDown(InputEvent event, float offsetX, float offsetY,

    int pointer, int button)

    {

    self.grabOffsetX = offsetX;

    self.grabOffsetY = offsetY;

    self.toFront();

    return true;

    }

    public void touchDragged(InputEvent event, float offsetX, float offsetY,

    int pointer)

    {

    float deltaX = offsetX - self.grabOffsetX;

    float deltaY = offsetY - self.grabOffsetY;

    self.moveBy(deltaX, deltaY);

    }

    public void touchUp(InputEvent event, float offsetX, float offsetY,

    int pointer, int button)

    {

    // will add code later

    }

    }

    );

    }

    public void act(float dt)

    {

    super.act(dt);

    }

    }

    ```'
