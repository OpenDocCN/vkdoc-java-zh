    appear to be lifted and dropped, similar to the sound of a piece of paper being
    slid off the top of a pile. You might also consider playing an effect when a puzzle
    piece is dropped onto an available area, making it sound like it has clicked into
    place. Similarly, you might consider a metallic tinging sound when a card is dropped
    onto the correct pile, or in the case of a card dropped onto an incorrect pile,
    a soft whooshing sound to accompany the card’s movement back to its original position.
    Some sample sound files have been included for your convenience in the `Jigsaw
    Puzzle` project `assets` folder. If you choose to implement sound effects, the
    simplest approach is to add the `Sound` objects to the `PuzzlePiece` class and
    play the sounds in the `onDragStart` and `onDrop` methods.


    To give players a measure of their performance in these games, you might want
    to include a label that displays the amount of time the player has spent playing;
    beating one’s own fastest time is a motivating goal for some players. Alternatively,
    to create a sense of tension or urgency, you could instead create a time limit
    and display a timer counting down to 0, at which point the player loses the game.


    You might have observed that the puzzle game is not very challenging as it is.
    An obvious way to increase the difficulty would be to divide the image into more
    pieces. An alternative and potentially more interesting way to increase the difficulty
    would be to add the ability to rotate the individual pieces by increments of 90
    degrees. Pieces could be initialized with a random amount of rotation (0, 90,
    180, or 270 degrees) in addition to having a random initial position on the left
    side of the screen. The `PuzzlePiece` class would need to store the current amount
    of rotation, and when checking whether a piece is placed correctly, you would
    add the condition that the angle of rotation is equal to 0 degrees. The player
    controls for rotating pieces would require a bit of planning. One approach could
    be to consider the index of the mouse button being pressed: the left mouse button
    could be used when dragging pieces, while clicking the right mouse button could
    rotate the piece 90 degrees clockwise. Another approach would be to use a double-click
    to indicate a rotation; this can be accomplished by replacing the `InputListener`
    object with a `ClickListener` object (an extension of the `InputListener` class)
    that contains additional mouse- and touch-related methods, including getTapCount,
    which can be used to check for double-clicks or double taps. If you choose to
    add rotation functionality, you will definitely want to consider adding a menu
    screen with control instructions, since you shouldn’t expect the player to be
    able to guess your control scheme.


    Similarly, the solitaire card game 52 Pickup is not challenging; rather, it is
    mostly an exercise in patience. Using the skills you have developed creating that
    game, a worthwhile project would be to create a similar game that involves more
    player choice and strategy. One recommendation is to create a solitaire version
    of the game Crazy Eights (similar to the commercial game UNO). The setup and rules
    for this game are as follows:


    *   At the beginning of the game, eight random cards are lined up along the bottom
    of the screen. This set of cards is referred to as your hand.

    *   A pile, called the discard pile, containing a single card is placed in the
    center of the screen.

    *   The remaining cards are positioned off-screen (for simplicity) and are referred
    to as the deck.

    *   At any time, a card from your hand may be placed on the discard pile if it
    has the same rank or the same suit. In addition, the cards with rank 8 are called
    wild cards: they can be placed on the discard pile at any time, and when they
    are on top of the discard pile, any card may be placed on it.

    *   When a card from the hand is successfully placed on the discard pile, the
    player earns a point, and a random card is selected from the deck and moved on
    screen to replace the card from the hand.

    *   If all cards from the deck and the hand are placed on the discard pile (or
    in other words, if the player earns 51 points), then the player wins the game.


    In the next chapter, you will revisit some previous projects (Starfish Collector
    and Rectangle Destroyer) and learn how to use some third-party software to simplify
    the level-design process.'
  trans: '

    最后，要判断玩家是否赢得游戏，你需要采用类似拼图游戏的逻辑方法：在 `update` 方法中，首先假设玩家已经获胜，然后检查所有牌堆；如果任何牌堆中的牌少于
    13 张，则说明牌并未全部正确放置。为实现此功能，请在 `update` 方法中添加以下代码：


    ```

    boolean complete = true;

    for (Pile pile : pileList)

    {

    if ( pile.getSize() < 13 )

    complete = false;

    }

    if (complete)

    {

    messageLabel.setText("You win!");

    messageLabel.setVisible(true);

    }

    ```


    添加此代码后，52 张牌拾取游戏就完成了！测试程序，确保将所有牌正确放置到对应牌堆后，会出现“You win!”消息。


    ## 总结与下一步


    在本章中，你创建了一对类：`DragAndDropActor` 和 `DropTargetActor`，它们实现了拖放功能。你通过 `InputListener`
    对象中的 `touchDown`、`touchDragged` 和 `touchUp` 方法实现了相应的方法。随后，你通过创建两个游戏（拼图游戏和纸牌接龙游戏）展示了这些类的灵活性。


    和往常一样，这些游戏可以添加许多潜在功能。两个游戏都可以加入一些微妙的音效，对应拼图块/纸牌被拿起和放下的动作，类似于一张纸从牌堆顶部滑落的声音。你还可以考虑在拼图块放到可用区域时播放一个音效，使其听起来像是卡入到位。同样，当纸牌被放到正确的牌堆上时，可以考虑播放金属叮当声；如果纸牌被放到错误的牌堆上，则伴随纸牌移回原位的过程播放轻柔的嗖嗖声。为了方便起见，`Jigsaw
    Puzzle` 项目的 `assets` 文件夹中包含了一些示例音效文件。如果你选择实现音效，最简单的方法是将 `Sound` 对象添加到 `PuzzlePiece`
    类中，并在 `onDragStart` 和 `onDrop` 方法中播放声音。


    为了让玩家了解自己在这些游戏中的表现，你可以添加一个标签，显示玩家已花费的游戏时间；对于某些玩家来说，打破自己的最快时间是一个有激励性的目标。或者，为了营造紧张或紧迫感，你可以设置一个时间限制，并显示一个倒计时到
    0 的计时器，此时玩家输掉游戏。


    你可能已经注意到，拼图游戏目前并不太具有挑战性。一个明显的增加难度的方法是将图片分成更多块。另一种可能更有趣的增加难度的方法是，增加将单个拼图块按 90 度增量旋转的功能。拼图块除了在屏幕左侧有随机初始位置外，还可以初始化为具有随机旋转角度（0、90、180
    或 270 度）。`PuzzlePiece` 类需要存储当前的旋转角度，并且在检查拼图块是否放置正确时，需要添加旋转角度等于 0 度的条件。玩家控制旋转拼图块的方式需要一些规划。一种方法是考虑按下的鼠标按钮索引：左键可用于拖拽拼图块，而右键单击可将拼图块顺时针旋转
    90 度。另一种方法是使用双击来表示旋转；这可以通过将 `InputListener` 对象替换为 `ClickListener` 对象（`InputListener`
    类的扩展）来实现，该对象包含额外的鼠标和触摸相关方法，包括 `getTapCount`，可用于检测双击或双次点击。如果你选择添加旋转功能，你绝对需要考虑添加一个带有控制说明的菜单屏幕，因为你不应该期望玩家能猜出你的控制方案。


    同样，纸牌接龙游戏“52 张牌拾取”也并不具有挑战性；它更像是一种耐心的练习。利用你在创建该游戏时培养的技能，一个值得尝试的项目是创建一个类似的、涉及更多玩家选择和策略的游戏。一个建议是创建疯狂八人组（类似于商业游戏
    UNO）的纸牌接龙版本。该游戏的设置和规则如下：


    *   游戏开始时，屏幕底部会排列八张随机牌。这组牌被称为你的手牌。

    *   屏幕中央放置一个牌堆，称为弃牌堆，其中包含一张牌。

    *   剩余的牌（为简单起见）放置在屏幕外，称为牌库。

    *   任何时候，如果你的手牌与弃牌堆顶部的牌具有相同的点数或相同的花色，则可以将其放到弃牌堆上。此外，点数为 8 的牌被称为万能牌：它们可以随时放到弃牌堆上，并且当它们位于弃牌堆顶部时，任何牌都可以放到上面。

    *   当手牌成功放到弃牌堆上时，玩家获得一分，并从牌库中随机选择一张牌移到屏幕上，以替换手牌中的那张牌。

    *   如果牌库和手牌中的所有牌都放到了弃牌堆上（换句话说，如果玩家获得 51 分），则玩家赢得游戏。


    在下一章中，你将重新审视之前的一些项目（海星收集者和矩形毁灭者），并学习如何使用一些第三方软件来简化关卡设计过程。

