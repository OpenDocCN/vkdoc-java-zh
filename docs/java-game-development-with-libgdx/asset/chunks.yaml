    当使用三个值来表示物体绕三个轴的旋转时，万向锁指的是当物体处于某几种特定方向，且两个旋转轴对齐时出现的问题，这使得物体在该给定方向上无法以某些方式旋转。


      3


    理论上，选择 y 轴作为“向上”方向有些随意，因为你可以在游戏世界中调整自己的方向，使任何轴对应向上方向。


      4


    绕向上指向轴的旋转量也称为偏航角。类似地，绕侧向指向轴（头部上下倾斜的运动）的旋转称为俯仰角，绕前向指向轴（头部左右倾斜的运动）的旋转称为滚转角。


      5


    严格来说，球体只有一个半径值；由 `createSphere` 方法创建的图形更准确地应称为椭球体。然而，在你创建的类中，所有半径值都将设置为相同的数值，因此它确实是一个球形对象。


    # 17. 旅程继续


    这最后一章将介绍在继续游戏开发过程中需要考虑的各种步骤。其中包括探索其他项目、学习相关领域的技能，以及将你的游戏带给更广泛的受众。在此过程中，本章将提供各种类型的资源列表，以及针对多种情况的通用建议。


    ## 持续开发


    本节将介绍如何完善你当前的项目并开始新项目，无论是独立完成还是作为游戏开发马拉松活动的一部分。本节将提供一个在线资源列表，你可以在其中获取美术资源以帮助你前进，同时还会提供大量建议，帮助你克服不可避免的障碍。'
- fmt: '### Working on Projects


    Hopefully, you’ve been working through all the project examples in this book.
    Many of the projects presented have concluded with a section titled “Summary and
    Next Steps.” You should try to complete as many of the suggestions listed there
    as you can! This is vital because you learn by doing. No matter how much sense
    a topic makes when you read about it, you have truly understood a topic only when
    you can take the next steps of designing and writing code independently. After
    each of the projects is functional, you should always experiment with the code
    and try your own variations.


    Make sure that you understand each program at all levels. At the local level,
    you should understand the effects of each line of code and also the purpose of
    each method and the design considerations that were taken into account when each
    was written. At the global level, you should know how all the classes fit together
    as a unified whole, the reasoning behind structuring the framework as it is, and
    the advantages and disadvantages to modifying the framework in different ways.


    After you’ve extracted as much knowledge and experience from this book as you
    feel is possible, it’s time to strike out on your own and start creating your
    own games. To start, try creating simple, minimalist examples that implement new
    game mechanics (that is, mechanics other than those featured in this book)—perhaps
    a shoot-em-up style game with enemies who periodically fire lasers at you, or
    a collectible card game where you randomly draw cards that represent magic spells
    or creatures that attack the enemy on your behalf, or a role-playing game with
    fetch quests and turn-based combat. In addition to the obvious benefits of knowing
    how to program even more mechanics, the process of figuring out how to do so is
    invaluable. Only by engaging in the acts of pondering, planning, writing code,
    testing, debugging, and rewriting code can you develop skills like inventiveness,
    organization, adaptability, and perseverance.


    Once you become comfortable implementing game mechanics on your own, as a next
    step you could take a “cloning the classics” approach for learning purposes (but
    certainly not for publication!). Take a classic arcade or console game (particularly
    those from the 1980s) and attempt to re-create as many of its features as possible:
    implement the game mechanics, level design, artistic (graphics and audio) style,
    and user interface (menu screens and onscreen data displays).


    In particular, you should create a physical list identifying and prioritizing
    the game-specific features that you’ll be working on within each category, as
    described in Appendix A. Furthermore, you should prioritize the categories of
    the features themselves in the order presented in the previous paragraph. For
    example, if your main character is a winged archer, don’t worry about the color
    of their belt until after the character is able to fly and shoot arrows. (In fact,
    it is common practice for developers to use simple colored polygon shapes during
    the game-mechanics phase of programming.) Don’t worry if you’re not an artist;
    many websites exist with freely available video game graphics, and many artists
    in the community are looking for collaborators. Finally, once you’re comfortable
    with your skills and abilities, it’s time to develop your own game or join a team
    working on a game and lend your programming skills.


    ### Obtaining Art Resources


    The typical reader of this book likely is mainly interested in the programming
    aspects of game development, but even so, every game still benefits from quality
    graphics and audio. I recommend the following websites for obtaining artistic
    resources. Most of these websites have both free and paid options, while others
    are driven by user donations:


    *   Kenney Game Assets: [`kenney.nl`](http://kenney.nl) Created by Kenney Vleugels,
    this site features over 18,000 art assets that can be useful in many genres. In
    this book, assets from this site were featured in Space Rocks, Plane Dodger, 52
    Card Pickup, Treasure Quest, and the Jumping Jack series.

    *   GameArtGuppy: `gameartguppy.com` Created by Vicki Wenderlich, this site contains
    a collection of high-quality art crafted especially for independent game developers.
    In this book, the Koala character from the Jumping Jack games was obtained from
    this site.

    *   OpenGameArt: [`opengameart.org`](http://opengameart.org) A repository for
    all types of media (2D and 3D graphics, as well as sound effects and music). Contributions
    are community driven. Licensing details and conditions are determined by the individual
    creators.

    *   The Spriters Resource: [`www.spriters-resource.com`](http://www.spriters-resource.com)
    Features a nearly comprehensive set of game art assets from many game console
    systems throughout history. Due to copyright restrictions, however, these assets
    cannot be used in published or commercial games.

    *   Cool Text: [`cooltext.com`](http://cooltext.com) A free text art graphics
    generator that can be useful for creating graphics for title screens as well as
    text and buttons for user interfaces.

    *   Textures.com: [`textures.com`](http://textures.com) Offers images of many
    types of materials, both natural and constructed.

    *   Bfxr: `bfxr.net` Randomly generates a wide range of retro-style sound effects
    for use in games.

    *   Freesound: `freesound.org` A collaborative database of Creative Commons–licensed
    sounds, organized into packs and also grouped by tags.

    *   Incompetech: `incompetech.com` Created by Kevin MacLeod, this website features
    a collection of royalty-free original music compositions that can be searched
    by genre, tempo, feel, or instrumentation.

    *   Audionautix: `audionautix.com` Created by Jason Shaw, this website also features
    a collection of royalty-free original music that can be searched by genre, mood,
    or tempo.'
