- fmt: '# 10. Tilemaps


    In some of the games previously developed in this book, one challenging aspect
    has been the placement of objects: calculating the positions where the actors
    will appear on the main stage. In this chapter, you will learn how to use Tiled,
    a general-purpose map-editing software program that can be used for multiple aspects
    of the level-design process. In particular, you will learn how to use Tiled while
    improving the design of two previous games: Starfish Collector and Rectangle Destroyer.
    For the Starfish Collector game, you will design a maze-like level (using rocks
    for walls) and add some scenery, as shown in Figure [10-1](#A352797_2_En_10_Chapter.html#Fig1).
    For the Rectangle Destroyer game, you will design a colorful layout of bricks,
    as shown in Figure [10-2](#A352797_2_En_10_Chapter.html#Fig2). The gameplay for
    both these games remains identical to what it was before; the only code-related
    changes will be the addition of a class to import the map data files you create
    with Tiled, and the `initialize` method for these games will be simplified.


    ![A352797_2_En_10_Fig2_HTML.jpg](A352797_2_En_10_Fig2_HTML.jpg)


    Figure 10-2. The redesigned brick layout for Rectangle Destroyer


    ![A352797_2_En_10_Fig1_HTML.jpg](A352797_2_En_10_Fig1_HTML.jpg)


    Figure 10-1. The redesigned Starfish Collector level


    Tiled was created in 2008 by Thorbjørn Lindeijer and is still under active development,
    with new features and improvements being added regularly. The software is open
    source and free (although donations to support development would be greatly appreciated
    by the developer), and it is available for Windows, MacOS, and Linux systems.
    A link to download the software is provided on the website [`http://www.mapeditor.org/`](http://www.mapeditor.org/).


    One of the primary features of Tiled is to take a tileset (a spritesheet consisting
    of rectangular images, or tiles, that represent possible features of the game-world
    terrain) and enable the user to create a tilemap (a selection and arrangement
    of tiles that corresponds to an image of the game world). In addition, Tiled can
    also be used to associate text-based data with individual tiles or geometric shapes,
    which can be useful for instantiating game-world entities. Levels can be designed
    for games with a top-down perspective or a side-view perspective, depending on
    the images and tilesets being used. Tiled stores map files using XML (eXtensible
    Markup Language), a text-based file format that is both human-readable and machine-readable;
    LibGDX has many classes available to help parse these data files, as you will
    learn in the sections that follow.


    ## Revisiting the Starfish Collector Game


    In this section, you will learn how to use Tiled in the context of designing and
    creating a tilemap for Starfish Collector. To begin, make a copy of the `Starfish
    Collector` project from Chapter [5](#A352797_2_En_5_Chapter.html) (which introduced
    user interfaces and included `Sign` objects in the game) and change the name of
    the folder (and thus the project) to `Starfish Collector Ch 10`. In theory, copying
    your `Starfish Collector` project from Chapter [6](#A352797_2_En_6_Chapter.html)
    is also acceptable, although you won’t make use of any of the audio additions
    from that chapter. Download the source code files for this chapter and copy the
    contents of the `assets` folder from the downloaded project into the `assets`
    folder of your new project; new files include a background image named `large-water.jpg`
    that is 1024 by 1024 pixels, a spritesheet called `ocean-plants.png` that is a
    2 by 2 grid of images of ocean plants, each of which is 64 by 64 pixels, and the
    image `starfish.png`, which has been resized to 64-by-64 pixels to align easily
    with the tilemap that will be created. Also, download and install the Tiled software
    from the website previously mentioned.


    ### Creating the Tilemap


    After downloading and installing Tiled, run the program. When the program starts,
    from the File menu, select New, then New Map, and a small window will appear,
    as shown in Figure [10-3](#A352797_2_En_10_Chapter.html#Fig3), that allows you
    to configure the general map settings. In the area labeled Map size, change the
    Width and Height settings to 32 tiles and change the Tile size Width and Height
    settings to 32 px. This will create a map that is 1024 by 1024 pixels large, which
    will be indicated underneath the map size settings. The other parameters should
    be left at their default settings, as seen in Figure [10-3](#A352797_2_En_10_Chapter.html#Fig3).
    Click on the button labeled Save As... and navigate to your project’s `assets`
    directory. Save the file with the name `map.tmx` (you can replace the existing
    file in the folder). It is very important that your tilemap file is saved to the
    same directory that contains the images you use, because the tilemap file stores
    the location of the image files relative to the tilemap file itself, and moving
    the tilemap file to a new folder later will result in the image files’ failing
    to load.


    ![A352797_2_En_10_Fig3_HTML.jpg](A352797_2_En_10_Fig3_HTML.jpg)


    Figure 10-3. Tiled settings window for creating a new map


    At this point, the main editor window will appear, as shown in Figure [10-4](#A352797_2_En_10_Chapter.html#Fig4).
    In order to see the full grid of squares in the central area, you may need to
    zoom out (one or more times), which can be accessed from the View menu. In the
    top-right region of this window, you will see a list of layers, which includes
    a single Tile Layer (named `Tile Layer 1`) by default, which is used to create
    an image from tilesets.


    ![A352797_2_En_10_Fig4_HTML.jpg](A352797_2_En_10_Fig4_HTML.jpg)


    Figure 10-4. The main window for the Tiled map-editor software


    The other types of layers you can add include an Image layer, which is useful
    for displaying a single background image, and an Object layer, which is useful
    for adding tiles or geometric objects that have custom text-based data associated
    with them. You will use all of these types of layers in this project, so from
    the Layer menu, select New and then Image layer, and, similarly, add a new Object
    layer (you may leave the names set to their defaults). In the top-right panel,
    you will see a list of layers, with `Tile Layer 1` at the bottom. The order of
    the layers is important; the layers are rendered in order from the bottom of the
    list to the top of the list. You will want `Image Layer 1` to render first, since
    it represents the background. To lower the position of this layer in the list,
    click on `Image Layer 1` so that it is highlighted in blue, and then in the row
    of icons underneath the list, click the picture of the arrow pointing down; the
    list of layers should be ordered as shown in Figure [10-5](#A352797_2_En_10_Chapter.html#Fig5).
    (Alternatively, you could have selected `Tile Layer 1` and clicked on the icon
    with the arrow pointing up.)


    ![A352797_2_En_10_Fig5_HTML.jpg](A352797_2_En_10_Fig5_HTML.jpg)


    Figure 10-5. Reordered layers for the Starfish Collector map


    Next, you will add the background image. In the list of layers, make sure that
    `Image Layer 1` is currently selected. On the left region of the window is a panel
    titled Properties containing two columns of data: the left column lists property
    names, while the right column lists the corresponding values. In the row with
    the property named Image, click on the area to the right in the value column,
    and a button labeled “`...`” will appear. Click this button and select the image
    `large-water.jpg` from your `assets` directory. When you are finished, the name
    of the image file should appear in the value column, and the image itself will
    be displayed in the central area, as shown in Figure [10-6](#A352797_2_En_10_Chapter.html#Fig6).


    ![A352797_2_En_10_Fig6_HTML.jpg](A352797_2_En_10_Fig6_HTML.jpg)


    Figure 10-6. Loading the background image in Tiled'
