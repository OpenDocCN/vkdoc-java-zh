    在本章的剩余部分，你将按照编程设计原则重新组织这段代码。


    ## 重新组织游戏流程


    一项重要的编程设计实践是：每个方法应只对应一个任务。如果单个方法处理了多个任务，则应将其拆分为多个方法。在本章的第一节讨论视频游戏生命周期时，你了解到在 LibGDX
    中，`render` 方法是游戏运行时被反复调用的方法，因此所有与游戏循环相关的代码都包含在该方法中。然而，游戏循环包含多个任务：处理输入、更新游戏世界的状态（例如确定两个对象重叠时会发生什么），以及将图形绘制到屏幕上。如果可能，这些任务应被分离到不同的方法中。使用
    `Actor` 类的 `act` 方法来处理影响每个角色的输入，是朝着正确方向迈出的一步。


    下一步是将用于更新和用于渲染的代码分离到不同的方法中。同时，你还可以通过将常用代码包含在一个基类中（必要时可继承该基类），来简化未来的开发项目，就像之前对
    `Actor` 派生类所做的那样。具体来说，所有未来的游戏项目都需要声明并初始化一个 `Stage` 对象，并运行其 `act` 和 `draw` 方法。你可以使用
    `getDeltaTime` 方法来确定自游戏循环上一次迭代以来经过的时间（通常为 1/60 秒，如前所述，但可能因所用计算机和程序复杂度而波动）。此外，在游戏循环的每次迭代中，你通常会在重新绘制图形之前清屏。⁵


    为了实现这些任务，创建一个名为 `GameBeta` 的新类，如下所示。不过，本章稍后会对该类进行一些修改，原因将在后续解释。


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class GameBeta extends Game

    {

    protected Stage mainStage;

    public void create()

    {

    mainStage = new Stage();

    initialize();

    }

    public void initialize() {  }

    public void render()

    {

    float dt = Gdx.graphics.getDeltaTime();

    // act 方法

    mainStage.act(dt);

    // 由用户定义

    update(dt);

    // 清屏

    Gdx.gl.glClearColor(0,0,0,1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    // 绘制图形

    mainStage.draw();

    }

    public void update(float dt) {  }

    }

    ```


    有了这段代码后，`StarfishCollectorBeta` 类可以改为继承 `GameBeta` 类。在 `StarfishCollectorBeta`
    类中，`create` 和 `render` 方法将改为 `initialize` 和 `update`（覆盖 `GameBeta` 类中的对应方法），并且
    `StarfishCollectorBeta` 类中的冗余代码行（即那些也出现在 `GameBeta` 类中的代码）将被移除。


    然而，在继续之前，还有一个最终主题需要讨论，以使这段代码更加健壮。在实践中，任何以此类为基础的程序都应被要求提供自己的 `initialize` 和 `update`
    方法实现。这让人联想到接口的概念（本章前面讨论过），但接口在这种情况下并不适用，因为接口只能声明所需的方法，而不包含任何实际代码。而在这种情况下，有一些代码是值得复用的。你需要的是一个结合了接口和可继承标准类元素的结构。Java
    恰好提供了这种情况所需的工具：抽象类。


    抽象类

