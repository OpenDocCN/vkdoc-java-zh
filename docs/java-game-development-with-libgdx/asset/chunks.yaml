    which includes the core of a 3D application : `import` statements, variable declarations
    (those that are referenced in multiple methods), and the methods required by the
    `ApplicationListener` interface . As was explained in Chapter [2](#A352797_2_En_2_Chapter.html),
    the `create` method is used to initialize objects, while the `render` method handles
    the game loop; the code for each of these methods is presented in detail later.
    (The other methods required by the interface aren’t fundamental to this example
    and so are not discussed later.)


