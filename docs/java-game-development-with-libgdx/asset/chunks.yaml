    folder (if not using the BlueJ `userlib` folder) and its contents from a previous
    project into this new project’s directory, and restart BlueJ so that the JAR files
    are loaded correctly. You don’t need to copy any classes or assets to this project
    at this time. Rather than starting with the `Game` class as usual (which implements
    the `ApplicationListener` interface methods), this example will be self-contained;
    you will implement the interface yourself.


