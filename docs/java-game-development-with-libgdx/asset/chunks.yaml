  raw: '## Gamepad Controllers


    Gamepad controllers are specialized hardware devices that make it easier for the
    player to enter game-related input. They have been in existence as long as game
    consoles have, and have included various configurations of components such as
    joysticks, buttons, directional pads, dials, triggers, and touch pads. With the
    increase in console-style gaming available on desktop computers, many gamepads
    that can be connected via USB ports are now available. In this section, you’ll
    develop controls for an Xbox 360 gamepad, or one of the many alternative products
    that emulate it, such as the Logitech F310 gamepad , shown in Figure [13-1](#A352797_2_En_13_Chapter.html#Fig1).


    ![A352797_2_En_13_Fig1_HTML.jpg](A352797_2_En_13_Fig1_HTML.jpg)


    Figure 13-1.


    Xbox 360 and Logitech F310 gamepad controllers


    Support for gamepad input is provided by the `Controller` and `Controllers` classes.
    These are not part of the core LibGDX libraries , and thus their code is contained
    in different JAR files, which must be included in your project. To begin, make
    a copy of your `Starfish Collector` project from Chapter [5](#A352797_2_En_5_Chapter.html)
    and rename the copied project folder to `Starfish Collector Gamepad`. Download
    the source code for this chapter and copy the contents of the downloaded gamepad
    project’s `+libs` folder into your project’s `+libs` folder (or into the BlueJ
    `userlib` directory if you chose to set it up at the beginning of the book). In
    particular, there are three new JAR files required to integrate gamepad controllers
    in desktop games: `gdx-controllers.jar, gdx-controllers-desktop.jar, and gdx-controllers-desktop-natives.jar`.


    Recall that there are two types of input, continuous and discrete, which are processed
    using different techniques. For continuous input (corresponding to actions such
    as walking), you poll the state of the hardware device in the `update` method,
    which typically runs 60 times per second. Later, you will see that this process
    is analogous to polling for keyboard input : keyboard polling uses methods of
    the `Gdx.input` object, such as `isKeyPressed`, while gamepad polling uses methods
    of a `Controller` object, such as `getAxis` and `getButton`. For discrete input
    (corresponding to actions such as jumping), you previously implemented the methods
    in the `InputProcessor` interface. Those methods are automatically activated when
    certain inputs are received (such as when a key is initially pressed down). Similarly,
    you will implement the methods of an interface named `ControllerListener`, which
    are activated in response to discrete gamepad events, such as when a gamepad button
    is initially pressed down. You will write the code for both continuous and discrete
    gamepad input over the course of the next two sections.


    ### Continuous Input


    In this section, you will modify the `Turtle` class so that the joystick of a
    gamepad can be used to move the turtle. In particular, this will allow you to
    precisely control both the speed and the angle of motion of the turtle, which
    is not possible when using keyboard controls alone. This process will require
    you to retrieve the instance of the active `Controller` object. The `Controllers`
    class provides the static utility method `getControllers`, which will help you
    with this process. Once the `Controller` has been obtained, you can poll for the
    state of joysticks, buttons, directional pads, and trigger buttons by using one
    of four provided `get`-`style` methods . Many of these require a single parameter:
    a constant value that corresponds to a component of the gamepad. These values
    are gamepad specific, and a particular gamepad might even have different values
    for different operating systems. The most robust method for determining these
    values is to allow the player to configure the gamepad mapping at runtime by looping
    through the different actions required by the game, asking the player to press
    the corresponding button, and storing the values for later use. For simplicity,
    you will assume that the player will use an Xbox 360–style controller (which includes
    those such as the Logitech F310 controller mentioned earlier), and you will create
    a class to store the constant values corresponding to the various gamepad components
    for this model. Open the `Starfish Collector Gamepad` project in BlueJ and create
    a new class named `XBoxGamepad` with the following code:


    ```

    import com.badlogic.gdx.controllers.PovDirection;

    public class XBoxGamepad

    {

    /** button codes */

    public static final int BUTTON_A              = 0;

    public static final int BUTTON_B              = 1;

    public static final int BUTTON_X              = 2;

    public static final int BUTTON_Y              = 3;

    public static final int BUTTON_LEFT_SHOULDER  = 4;

    public static final int BUTTON_RIGHT_SHOULDER = 5;

    public static final int BUTTON_BACK           = 6;

    public static final int BUTTON_START          = 7;

    public static final int BUTTON_LEFT_STICK     = 8;

    public static final int BUTTON_RIGHT_STICK    = 9;

    /** directional pad codes */

    public static final PovDirection DPAD_UP    = PovDirection.north;

    public static final PovDirection DPAD_DOWN  = PovDirection.south;

    public static final PovDirection DPAD_RIGHT = PovDirection.east;

    public static final PovDirection DPAD_LEFT  = PovDirection.west;

    /** joystick axis codes */

    // X-axis: -1 = left, +1 = right

    // Y-axis: -1 = up  , +1 = down

    public static final int AXIS_LEFT_X  = 1;

    public static final int AXIS_LEFT_Y  = 0;

    public static final int AXIS_RIGHT_X = 3;

    public static final int AXIS_RIGHT_Y = 2;

    /** trigger codes */

    // Left & Right Trigger buttons treated as a single axis; same ID value

    // Values - Left trigger: 0 to +1\.  Right trigger: 0 to -1.

    // Note: values are additive; they can cancel each other if both are pressed.

    public static final int AXIS_LEFT_TRIGGER  = 4;

    public static final int AXIS_RIGHT_TRIGGER = 4;

    }

    ```


    The following `Controller` class methods are available to poll the state of a
    gamepad component:'
