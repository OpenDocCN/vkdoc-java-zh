- fmt: '### Image-Based Buttons


    First, you will create an image-based button that can be used to restart the level,
    as shown in Figure [5-7](#A352797_2_En_5_Chapter.html#Fig7).


    ![A352797_2_En_5_Fig7_HTML.jpg](A352797_2_En_5_Fig7_HTML.jpg)


    Figure 5-7. Starfish Collector with a level restart button added in the upper-right
    corner


    Analogous to how a label requires a `LabelStyle` object that specifies a bitmap
    font, a button requires a `ButtonStyle` object that specifies a particular type
    of image. To begin, in the `LevelScreen` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Button;

    import com.badlogic.gdx.scenes.scene2d.ui.Button.ButtonStyle;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.scenes.scene2d.utils.TextureRegionDrawable;

    import com.badlogic.gdx.scenes.scene2d.Event;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    import com.badlogic.gdx.scenes.scene2d.InputEvent.Type;

    ```


    Next, you need to create a `ButtonStyle` object, which has a field named `up`
    that is used to store the default image for the button. (Additional images may
    be stored that correspond to when the mouse hovers over the button or when the
    button is pressed; for more details, consult the LibGDX documentation.) LibGDX
    requires that images used in user-interface elements implement the `Drawable`
    interface; standard image-related classes (such as `TextureRegion`) have corresponding
    classes that also implement this interface. The following code creates the `ButtonStyle`
    object, creates and adds a `TextureRegionDrawable` image to it, and uses this
    to create a button, tinted light blue, and positioned in the upper-right corner.
    Add this code to the `initialize` method of the `LevelScreen` class:


    ```

    ButtonStyle buttonStyle = new ButtonStyle();

    Texture buttonTex = new Texture( Gdx.files.internal("assets/undo.png") );

    TextureRegion buttonRegion =  new TextureRegion(buttonTex);

    buttonStyle.up = new TextureRegionDrawable( buttonRegion );

    Button restartButton = new Button( buttonStyle );

    restartButton.setColor( Color.CYAN );

    restartButton.setPosition(720,520);

    uiStage.addActor(restartButton);

    ```


    Finally, you need to add functionality to this button. You will do this using
    a lambda expression, as described at the beginning of this section. The first
    part of this code contains an important condition: you need to make sure that
    the event was an `InputEvent`, and then you need to cast the `Event` object to
    an `InputEvent` object and check the `Type` of the event to make sure it was a
    mouse-button click (rather than, say, a mouse-movement event). LibGDX handles
    mouse and touchscreen events in the same way, and so a mouse-click event is referred
    to as a touchdown event. If either of the conditions are not true, the method
    immediately exits and returns `false`. With this in mind, add the following code
    to the `create` method directly following the code you previously entered:


    ```

    restartButton.addListener(

    (Event e) ->

    {

    if ( !(e instanceof InputEvent) ||

    !((InputEvent)e).getType().equals(Type.touchDown) )

    return false;

    StarfishGame.setActiveScreen( new LevelScreen() );

    return false;

    }

    );

    ```


    At this point, you should test your project to verify that the button works as
    expected.


    ### Text-Based Buttons


    Next, you’ll add some text-based buttons to the menu screen, giving the user the
    ability to start or quit the game, as shown in Figure [5-8](#A352797_2_En_5_Chapter.html#Fig8).


    ![A352797_2_En_5_Fig8_HTML.jpg](A352797_2_En_5_Fig8_HTML.jpg)


    Figure 5-8. Starfish Collector menu screen with buttons added


    Just as was the case with creating labels and image-based buttons, the first step
    in creating a text-based button is to create an associated style object that stores
    visual details. In this case, you need to create a `TextButtonStyle` object, where
    you will specify the bitmap font, font color, and background image.


    The background image for the image-based button was a `TextureRegionDrawable`
    object. However, in a text-based button, one potential complication arises when
    the button’s text is larger than the provided image, in which case the text will
    overflow past the borders of the button. To avoid this issue, you can use a special
    type of image called a nine-patch image, which is an image with nine defined sub-regions.
    When scaling a nine-patch image, the image is stretched along the border regions
    in the direction of its edges. A `NinePatch` object can be initialized using a
    `Texture` followed by four integers, as follows:


    ```

    NinePatch np = new NinePatch( texture, left, right, top, bottom );

    ```


    The integers represent distances, measured in pixels, from the correspondingly
    named edge of the image. They are used to divide the texture into nine regions,
    as illustrated in Figure [5-9](#A352797_2_En_5_Chapter.html#Fig9).


    ![A352797_2_En_5_Fig9_HTML.jpg](A352797_2_En_5_Fig9_HTML.jpg)


    Figure 5-9. Dividing a texture into nine regions


    When converted to a `NinePatch` object, the corners of the image (the regions
    labeled with `a` in Figure [5-9](#A352797_2_En_5_Chapter.html#Fig9)) will never
    be scaled; the `b` regions can scale horizontally, the `c` regions can scale vertically,
    and the central region `d` can scale in both directions. This is particularly
    useful for button-like images, so that the edges of the image do not appear distorted.
    Figure [5-10](#A352797_2_En_5_Chapter.html#Fig10) illustrates a small image that
    is scaled using standard methods, and also scaled using nine-patch methods. Notice
    in particular that when using standard scaling, the border of the enlarged image
    appears thicker, while nine-patch scaling more closely preserves the appearance
    of the original border, as it only scales the border regions along the direction
    of the edges.


    ![A352797_2_En_5_Fig10_HTML.jpg](A352797_2_En_5_Fig10_HTML.jpg)


    Figure 5-10. A button-like image, scaled using standard methods and using nine-patch
    methods


    With this information in mind, you are ready to create a `TextButtonStyle` object.
    In the `BaseGame` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.TextButton.TextButtonStyle;

    import com.badlogic.gdx.graphics.g2d.NinePatch;

    import com.badlogic.gdx.scenes.scene2d.utils.NinePatchDrawable;

    import com.badlogic.gdx.graphics.Texture;

    ```


    Next, add the following variable declaration to the class:


    ```

    public static TextButtonStyle textButtonStyle;

    ```


    In the `create` method, add the following code to initialize and configure the
    `TextButtonStyle` object. Note that `fontColor` is set at this point, because
    calling the `setColor` method on the button itself only affects tint color used
    for the image, not the text.


    ```

    textButtonStyle = new TextButtonStyle();

    Texture   buttonTex   = new Texture( Gdx.files.internal("assets/button.png") );

    NinePatch buttonPatch = new NinePatch(buttonTex, 24,24,24,24);

    textButtonStyle.up    = new NinePatchDrawable( buttonPatch );

    textButtonStyle.font      = customFont;

    textButtonStyle.fontColor = Color.GRAY;

    ```


    With the text button style set up, you are prepared to add text buttons to the
    menu screen. In the `MenuScreen` class, begin by adding the following `import`
    statements:'
