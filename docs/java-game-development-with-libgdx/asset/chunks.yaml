    ## Reorganizing the Game Flow


    An important programming design practice is that each method should correspond
    to a single task. If a single method is handling multiple tasks, then it should
    be broken up into multiple methods. In the first section of this chapter, when
    the life cycle of a video game was discussed, you learned that in LibGDX, the
    `render` method is the method that is called repeatedly as the game is running,
    and therefore all the code related to the game loop is contained in that method.
    However, the game loop has multiple tasks: processing input, updating the state
    of the game world (such as determining what happens when two objects overlap),
    and drawing the graphics to the screen. These tasks should be separated into different
    methods if possible. Using the `act` method of the `Actor` class to process the
    input that affects each actor is a step in the right direction.


    The next step is to separate the code used for updating and the code used for
    rendering into different methods. At the same time, you can also streamline future
    development projects by including commonly used code in a base class that can
    be extended when necessary, as you previously did with the `Actor`-derived classes.
    In particular, all future game projects will need to declare and initialize a
    `Stage` object and run its `act` and `draw` methods. You can use the method `getDeltaTime`
    to determine how much time has elapsed since the previous iteration of the game
    loop (which is typically 1/60 of a second, as discussed previously, but may fluctuate
    depending on the computer being used and the complexity of the program). Also,
    you typically clear the screen before redrawing the graphics in each iteration
    of the game loop.


    To accomplish these tasks, create a new class named `GameBeta` as shown next.
    However, there will be a few modifications made to this class later on in the
    chapter for reasons that will be explained.


    ```java

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class GameBeta extends Game

    {

    protected Stage mainStage;

    public void create()

    {

    mainStage = new Stage();

    initialize();

    }

    public void initialize() {  }

    public void render()

    {

    float dt = Gdx.graphics.getDeltaTime();

    // act method

    mainStage.act(dt);

    // defined by user

    update(dt);

    // clear the screen

    Gdx.gl.glClearColor(0,0,0,1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    // draw the graphics

    mainStage.draw();

    }

    public void update(float dt) {  }

    }

    ```


    With this code in place, the `StarfishCollectorBeta` class could be changed to
    extend the `GameBeta` class. In the `StarfishCollectorBeta` class, the methods
    `create` and `render` would be changed to `initialize` and `update` (overriding
    the corresponding methods from the `GameBeta` class), and the redundant lines
    of code from the `StarfishCollectorBeta` class (those that also appear in the
    `GameBeta` class) would be removed.


    However, before continuing on, there is one final topic that needs to be discussed
    to make this code more robust. In practice, any program that uses this class as
    a basis should be required to provide its own versions of the `initialize` and
    `update` methods. This brings to mind the concept of an interface (discussed earlier
    in this chapter), but an interface is not suitable in this situation because an
    interface can only declare the required method, and does not include any actual
    code. In this situation, there is code that would be helpful to reuse. What you
    need is a structure that combines elements of both an interface and a standard
    class that can be extended. Java provides exactly what is needed for this situation:
    abstract classes.'
