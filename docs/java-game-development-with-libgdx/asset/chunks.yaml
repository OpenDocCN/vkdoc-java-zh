- fmt: '### Discrete Input


    Next, you will write the code necessary to process discrete gamepad input events.
    To avoid modifying your existing `BaseScreen` class, you will create an extension
    of this class that implements the `ControllerListener` interface with default
    versions of all the necessary methods, which can then be overridden as needed.
    (In practice, you will probably only make use of the `buttonDown` method.) Any
    class that uses gamepad input can then extend this new class instead of the original
    `BaseScreen` class. To begin, create a new class named `BaseGamepadScreen` with
    the following code:


    ```

    import com.badlogic.gdx.controllers.ControllerListener;

    import com.badlogic.gdx.controllers.Controller;

    import com.badlogic.gdx.controllers.Controllers;

    import com.badlogic.gdx.controllers.PovDirection;

    import com.badlogic.gdx.math.Vector3;

    public abstract class BaseGamepadScreen extends BaseScreen implements ControllerListener

    {

    public BaseGamepadScreen()

    {

    super();

    Controllers.clearListeners();

    Controllers.addListener(this);

    }

    // methods required by ControllerListener interface

    //  enable discrete input processing

    public void connected(Controller controller)

    {  }

    public void disconnected(Controller controller)

    {  }

    public boolean xSliderMoved(Controller controller, int sliderCode, boolean value)

    {  return false;  }

    public boolean ySliderMoved(Controller controller, int sliderCode, boolean value)

    {  return false;  }

    public boolean accelerometerMoved(Controller controller, int accelerometerCode,

    Vector3 value)

    {  return false;  }

    public boolean povMoved(Controller controller, int povCode, PovDirection value)

    {  return false;  }

    public boolean axisMoved(Controller controller, int axisCode, float value)

    {  return false;  }

    public boolean buttonDown(Controller controller, int buttonCode)

    {  return false;  }

    public boolean buttonUp(Controller controller, int buttonCode)

    {  return false;  }

    }

    ```


    Note that this class must be declared as `abstract` because it does not implement
    the `initialize` or `update` methods from the `BaseScreen` class. Also note that
    the listener is “activated” by adding the currently active `Screen` to the set
    of listeners managed by the `Controllers` class. At the same time, you must also
    remove (via the `clearListeners` method) any previously added `ControllerListener`
    objects; you don’t want other `Screen` objects that may be inactive (but still
    reside in memory) to respond to input, because this could cause unexpected problems.
    (For example, if pressing the Start button on a gamepad were used to begin a new
    game from the menu screen, after switching to the game screen you would no longer
    want this action to occur when pressing the gamepad Start button; therefore, you
    must stop the menu screen from “listening” and responding to these events.)


    Next, you want to modify the `LevelScreen` class so that pressing the Back key
    on the gamepad will restart the level (similar to clicking on the Restart button
    in the top-right corner of the user interface). This requires three steps. First,
    in the `LevelScreen` class, add the following `import` statement:


    ```

    import com.badlogic.gdx.controllers.Controller;

    ```


    Next, change the class declaration so that it extends the `BaseGamepadScreen`
    class rather than the `BaseScreen` class, as follows:


    ```

    public class LevelScreen extends BaseGamepadScreen

    ```


    Finally, you need to add a `buttonDown` method to this class to process discrete
    gamepad button presses (analogous to how the `keyDown` method processes discrete
    keyboard key presses). Add the following method to the `LevelScreen` class:


    ```

    public boolean buttonDown(Controller controller, int buttonCode)

    {

    if (buttonCode == XBoxGamepad.BUTTON_BACK)

    StarfishGame.setActiveScreen( new LevelScreen() );

    return false;

    }

    ```


    That’s all there is to it! Feel free to test out your project once again; move
    the turtle and collect some starfish, and then press the Back button on the gamepad
    to reset the level, thus enabling you to enjoy collecting the starfish all over
    again.


    ## Touchscreen Controls


    In this section, you’ll learn how to implement gamepad-inspired onscreen touch
    controls. Again, as mentioned in the beginning of this chapter, access to a touchscreen
    device is not needed to test the code for this section, as LibGDX handles mouse
    events and touch events with the same methods; single-touch input is simulated
    by the mouse. Since you already learned about the `Button` class in Chapter [5](#A352797_2_En_5_Chapter.html),
    you are well on your way. In what follows, you’ll learn about another user-interface
    control provided by the LibGDX library, the `Touchpad` class, which was created
    to simulate a traditional arcade joystick. Figure [13-2](#A352797_2_En_13_Chapter.html#Fig2)
    shows an example of a traditional arcade-style joystick and a touchpad control
    that can be created with LibGDX, which is rendered in a top-down perspective of
    the arcade-style joystick.


    ![A352797_2_En_13_Fig2_HTML.jpg](A352797_2_En_13_Fig2_HTML.jpg)


    Figure 13-2. A traditional arcade-style joystick and a touchpad control created
    in LibGDX


    The biggest challenge to successfully using these controls is not the creation
    of the object, but rather a design challenge: how should these elements be arranged
    and placed on the screen? One option is to overlay the elements on top of the
    game world itself, as you have with various `Label` objects in previous chapters.
    However, you rapidly discover the problem that the controls—which must typically
    be much larger than labels, for easy operation—can obscure the game world to the
    extent that it interferes with game play. If poorly placed, a touchpad could completely
    obscure the main character. Figure [13-3](#A352797_2_En_13_Chapter.html#Fig3)
    illustrates this possible situation by placing the touchpad in the lower-left
    corner of the game screen. Notice how it could cover the turtle partially, or
    even completely!


    ![A352797_2_En_13_Fig3_HTML.jpg](A352797_2_En_13_Fig3_HTML.jpg)


    Figure 13-3. A poorly placed touchpad control obscuring the turtle


    Some games attempt to address this issue by making the controls on the user interface
    translucent, yet the core difficulty remains because the player’s fingers will
    often be positioned over the region where the controls are, thus still obscuring
    the view of the game world. An alternative approach that you will implement in
    this section is to reserve a particular region of the screen for the controls
    and render the game world in the remaining area, as illustrated in Figure [13-4](#A352797_2_En_13_Chapter.html#Fig4).


    ![A352797_2_En_13_Fig4_HTML.jpg](A352797_2_En_13_Fig4_HTML.jpg)


    Figure 13-4. Placing the game controls in a dedicated region below the game world'
