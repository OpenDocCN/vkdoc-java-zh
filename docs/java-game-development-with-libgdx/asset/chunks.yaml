  raw: '## Summary and Next Steps


    This chapter introduced many features of the LibGDX library. You began with an
    overview of the life cycle of a game program and learned how the stages of the
    life cycle are performed by methods with a particular naming convention, enforced
    by an interface. You learned how to process keyboard input by using the `Gdx`
    class and how to encapsulate game-entity data with the `Actor` class. You learned
    how the `Stage` class can be used to manage `Actor` instances, and how to extend
    the Ac`t`or class for greater functionality. You also learned how to reorganize
    the game flow and simplify future game development projects by extending the `Game`
    class.


    To practice the skills you have developed in this chapter, you could try adding
    another object to the game: a shark that the turtle must avoid; if the turtle
    overlaps the shark, then the turtle should be removed from the stage, and a message
    that reads “Game Over” should be displayed on the screen. Graphics for this addition
    are provided in the `assets` folder for this project.


    In the next chapter, you’ll create a more polished version of the Starfish Collector
    game powered by a new extension of the `Actor` class (which will replace `ActorBeta`)
    that supports animation, physics-based movement, improved collision detection,
    and the ability to manage multiple actor instances with lists.


