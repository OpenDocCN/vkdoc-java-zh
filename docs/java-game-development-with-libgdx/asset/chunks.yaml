- fmt: '# Sounds and Music


    Incorporating audio into your game is a straightforward process, thanks to the
    built-in functionality of the LibGDX libraries. Supported file types include MP3,
    OGG, and WAV. LibGDX provides two interfaces for this purpose, `Sound` and `Music`,
    each of which can be created from the `audio` object of the `Gdx` class. The classes
    that implement the interfaces depend on the platform being used; conveniently,
    these details are handled for you by LibGDX.


    The `Sound` interface is provided for sound effects: small audio files that are
    played when discrete game events occur, such as when an item is collected, a character
    jumps, or two objects collide. Sound effects are typically short (a few seconds
    or less), and the corresponding files should not be larger than 1 MB. (For larger
    audio clips, you should use the `Music` interface, explained next.) To create
    a `Sound` object from an audio file with the filename `beep.wav`, for example,
    you would write the following code:


    ```

    Sound effect = Gdx.audio.newSound( Gdx.files.internal("beep.wav") );

    ```


    After the sound has been created, it is played with the `play` method, which optionally
    takes a float parameter that determines how loudly the sound will be played (0
    is silent, while 1 is full volume). A single sound effect can be played multiple
    times in rapid succession; the sounds will simply overlap each other in this case.


    The `Music` interface is provided for longer audio sequences, such as background
    music or ambient sounds. `Music` objects are streamed from a file rather than
    being completely loaded into memory (the latter being the case with `Sound` objects),
    which is why files larger than 1 MB can be used in this case. To create a `Music`
    object from an audio file with the filename `song.mp3`, for example, you would
    write the following code:


    ```

    Music song = Gdx.audio.newSound( Gdx.files.internal("song.mp3") );

    ```


    The volume of a `Music` object can be set at any time using the `setVolume` method,
    which takes a float value just as `Sound` objects do. If you would like the audio
    to loop, use the method `setLooping(true)`. To control playback, there are `play`,
    `pause`, and `stop` methods. To retrieve information about the current state of
    playback, you use the methods `isPlaying`, `isLooping`, and `getPosition`, the
    latter of which returns the current position in seconds.


    Next, you’ll see how to add music and sound effects to the Starfish Collector
    game created in the previous chapter, along with a button that can be used to
    mute and unmute the audio, as shown in Figure [6-2](#A352797_2_En_6_Chapter.html#Fig2).


    ![A352797_2_En_6_Fig2_HTML.jpg](A352797_2_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    The Starfish Collector game with audio and a mute button added


    To begin, create a copy of the project directory for Starfish Collector from the
    previous chapter and rename the folder to `Starfish Collector Ch 6`. Download
    the code from the book website and copy the three music files (which have the
    `ogg` extension) and the new image file (`audio.png`) from the downloaded project
    `assets` folder into your local project `assets` folder. Open your BlueJ project.
    First, in the `BaseScreen` class, you will add a method to simplify detecting
    touchdown events. Add the following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.Event;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    import com.badlogic.gdx.scenes.scene2d.InputEvent.Type;

    ```


    Next, add the following method, which will be used to check whether a mouse event
    corresponds to a button click (as opposed to a mouse movement event, for example):


    ```

    public boolean isTouchDownEvent(Event e)

    {

    return (e instanceof InputEvent) && ((InputEvent)e).getType().equals(Type.touchDown);

    }

    ```


    The remaining code in this section will be added to the `LevelScreen` class. First,
    add the following `import` statements:


    ```

    import com.badlogic.gdx.audio.Sound;

    import com.badlogic.gdx.audio.Music;

    ```


    Then, in the class, declare the following variables:


    ```

    private float audioVolume;

    private Sound waterDrop;

    private Music instrumental;

    private Music oceanSurf;

    ```


    At the end of the `initialize` method, add the following code to initialize these
    variables and begin the background music. The song “Master of the Feast” used
    in this application was created by Kevin MacLeod from `incompetech.com`.[¹](#A352797_2_En_6_Chapter.html#Fn1)


    ```

    waterDrop    = Gdx.audio.newSound(Gdx.files.internal("assets/Water_Drop.ogg"));

    instrumental = Gdx.audio.newMusic(Gdx.files.internal("assets/Master_of_the_Feast.ogg"));

    oceanSurf    = Gdx.audio.newMusic(Gdx.files.internal("assets/Ocean_Waves.ogg"));

    audioVolume = 1.00f;

    instrumental.setLooping(true);

    instrumental.setVolume(audioVolume);

    instrumental.play();

    oceanSurf.setLooping(true);

    oceanSurf.setVolume(audioVolume);

    oceanSurf.play();

    ```


    In the `update` method, the water-drop sound effect will be played whenever the
    turtle overlaps a starfish. Locate the line of code that reads `starfish.collected
    = true`, and after this line of code, add the following:


    ```

    waterDrop.play(audioVolume);

    ```


    According to the LibGDX documentation, when you are finished with a music object,
    you should call the `Music` class `dispose` method to free up memory (and stop
    the song from continuing to play). Therefore, in the `initialize` method, change
    the block of code that sets the listener for the Restart button to the following:


    ```

    restartButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    instrumental.dispose();

    oceanSurf.dispose();

    StarfishGame.setActiveScreen( new LevelScreen() );

    return true;

    }

    );

    ```


    Finally, you will add a button to the user interface that can be used to mute
    and unmute the audio by changing the value of the `audioVolume` variable. In the
    `initialize` method, after the code that adds the listener to `restartButton`,
    add the following code. Note in particular the expression `audioVolume = 1 - audioVolume`,
    which is used to toggle the value of `audioVolume` between 0 and 1.


    ```

    ButtonStyle buttonStyle2 = new ButtonStyle();

    Texture buttonTex2 = new Texture( Gdx.files.internal("assets/audio.png") );

    TextureRegion buttonRegion2 =  new TextureRegion(buttonTex2);

    buttonStyle2.up = new TextureRegionDrawable( buttonRegion2 );

    Button muteButton = new Button( buttonStyle2 );

    muteButton.setColor( Color.CYAN );

    muteButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    audioVolume = 1 - audioVolume;

    instrumental.setVolume( audioVolume );

    oceanSurf.setVolume( audioVolume );

    return true;

    }

    );

    ```


    Finally, to add this newly created button to the user interface, in the `initialize`
    method, locate the line of code that adds `restartButton` to `uiTable`, and right
    before this line of code, add the following:


    ```

    uiTable.add(muteButton).top();

    ```


    Also, now that `uiTable` contains four columns, one more modification must be
    made so that the other user-interface elements remain aligned as before. Locate
    the line of code that adds `dialogBox` to `uiTable` and change it to the following:


    ```

    uiTable.add(dialogBox).colspan(4);

    ```


    You have now successfully added audio and audio controls to your game! At this
    point in the chapter, you have learned the fundamentals of audio: the `Sound`
    and `Music` classes and their methods. The rest of this chapter includes advanced
    material and the creation of an audio-based game, which is not necessary for the
    chapters that follow. Therefore, you can skip the rest of this chapter and proceed
    to the next, if you wish; otherwise, feel free to continue.'
