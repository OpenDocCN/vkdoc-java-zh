    *   New functionality has been added to the `BaseActor` class to simplify gathering
    instances of a class into lists.

    *   Game entities are now typically written as extensions of the `BaseActor` class
    so as to increase encapsulation and reduce the amount of code required by the
    `BaseScreen` classes.

    *   The content of Chapter [4](#A352797_2_En_4_Chapter.html) (“Adding Polish to
    Your Game”) of the first edition has been separated into Chapters [5](#A352797_2_En_5_Chapter.html)
    and [6](#A352797_2_En_6_Chapter.html) in the second edition, allowing for extended
    treatment of user-interface design and audio support. Each of these topics also
    has its own dedicated example game project.

    *   The material on the bitmap font–generating program Hiero has been replaced
    by bitmap font–generating classes, allowing the developer to more quickly generate
    custom fonts from true-type font (ttf) files in code. This circumvents the need
    to generate bitmap font images ahead of time, which should streamline the development
    process.

    *   The code for detecting the bounce angle for the ball in Rectangle Destroyer
    has been greatly simplified.

    *   The drag-and-drop–related code and tilemap-related code have been refactored
    into their own separate classes for easier reuse in other projects.

    *   Individual games have been reorganized into separate chapters and introduce
    many new game mechanics. In particular, Chapter [6](#A352797_2_En_6_Chapter.html)
    (“Additional Game Case Studies”) of the first edition has been separated into
    Chapters [4](#A352797_2_En_4_Chapter.html) , [7](#A352797_2_En_7_Chapter.html)
    , [8](#A352797_2_En_8_Chapter.html) , and [9](#A352797_2_En_9_Chapter.html) in
    the second edition. The games of Chapter [7](#A352797_2_En_7_Chapter.html) (“Integrating
    Third-Party Software”) of the first edition have been separated into Chapters
    [11](#A352797_2_En_11_Chapter.html) and [12](#A352797_2_En_12_Chapter.html) in
    the second edition.

    *   Because of the importance of tilemaps, the corresponding material has been
    moved into its own chapter (Chapter [10](#A352797_2_En_10_Chapter.html) ) and
    is used to simplify previous game projects ( Starfish Collector and Rectangle
    Destroyer ) before moving on to move advanced games in the following chapters.

    *   The material on the physics engine Box2D has been eliminated to reduce complexity
    and unnecessary overhead in favor of using custom physics code.

    *   Advanced topics have been added (maze generation in Chapter [14](#A352797_2_En_14_Chapter.html)
    and shader programming in Chapter [15](#A352797_2_En_15_Chapter.html) ).

    *   The 3D demo from the first edition (“Pirate Cruiser”) has been replaced by
    the game project Starfish Collector 3D .

    *   New appendices have been added containing advice and examples for game-design
    documentation and a complete JavaDoc-style listing of the extension classes developed
    in the book as a helpful reference.


    Acknowledgments


    I would like to acknowledge the amazing editorial and support staff at Apress,
    for without their talent and dedication this book you are reading would not exist.
    In particular, I’d like to thank Mark Powers for his constant words of support
    and encouragement.


    I’d also like to thank the technical reviewer, Garry Patchett, for his attention
    to both the programming and the pedagogical aspects of this book. From the very
    beginning, he intuitively understood who the target audience was and the level
    of detail and guidance they needed. Garry’s many insightful comments and suggestions
    greatly improved the clarity of this book, and I am grateful for all the time
    and energy he put into helping to make this book the best that it could be.


    Finally, a special thanks to my students, past and present, for their continuous
    and infectious enthusiasm. Your drive and devotion to game development is what
    inspired me to write this book.'
  trans: '

    ## 视频游戏项目


    如前所述，本书在涵盖的游戏数量与种类上独树一帜。具体而言，你将学习如何在本书中创建以下 12 款视频游戏：


    *   **海星收集者**。在这款游戏中，你将引导一只海龟踏上收集海星的旅程。这款简单的游戏用于介绍 LibGDX 的功能以及你将创建的扩展框架，并且在全书介绍新功能（如用户界面、过场动画、音频、瓦片地图和游戏手柄控制）时会频繁回顾。

    *   **太空岩石**。这款太空主题的射击游戏灵感来源于经典街机游戏《小行星》，你将控制一艘宇宙飞船，发射激光摧毁在屏幕中飞行的岩石。

    *   **失踪的作业**。这是一款完全由故事驱动的视觉小说风格游戏。它向玩家呈现一系列影响故事进程的选择。在这款游戏中，你需要帮助一名学生找到他放错地方的作业，作业就在学校的某个地方。

    *   **节奏敲击者**。这是一款基于音乐节奏的游戏，玩家需要按下由下落物体指示的一系列按键，这些物体会与目标重叠；按键序列与背景音乐同步。

    *   **飞机躲避者**。这款无限卷轴的横向动作游戏灵感来源于《Flappy Bird》和《Jetpack Joyride》等现代智能手机游戏。在这款游戏中，你控制一架飞机躲避飞过的敌人，同时尝试收集星星以获得尽可能高的分数。

    *   **矩形毁灭者**。灵感来源于《打砖块》和《Arkanoid》等街机及早期主机游戏，你移动挡板将球弹向一堵砖墙以摧毁它们，在此过程中获得分数和强化道具。

    *   **拼图游戏**。一款拖放游戏，你移动并排列图像的碎片，以重构一幅完整的图片。

    *   **52 张牌接龙**。一款拖放式纸牌接龙游戏，你需要整理一堆散乱的扑克牌，并根据点数和花色将它们排列成有序的牌堆。

    *   **跳跃杰克**。这是一款横向卷轴平台风格游戏，灵感来源于《大金刚》和《超级马里奥兄弟》等街机及主机游戏。在这款游戏中，你帮助考拉杰克收集硬币和钥匙，踏上通往目标的旅程。

    *   **寻宝任务**。这是一款俯视视角的冒险游戏，灵感来源于《塞尔达传说》等经典主机游戏。在这款游戏中，你使用剑和箭击败敌人，收集硬币在道具店使用，并找到通往宝藏的道路。

    *   **迷宫奔跑者**。这款基于迷宫的游戏灵感来源于《吃豆人》等街机游戏以及早期主机游戏《Maze Craze》。在这款游戏中，你试图在被一个不断跟随你的幽灵抓住之前，收集随机生成的迷宫中的所有硬币。

    *   **海星收集者 3D**。这款游戏是本书开头介绍的《海星收集者》游戏的 3D 重制版，并介绍了 3D 游戏编程概念。


    ## 与第一版相比的变化


    根据读者、学生和教师的反馈，本书的内容和组织结构发生了大量变化。主要变化列举如下：


    *   减少了基础示例的数量；特别是，第一版中的《奶酪，拜托》和《气球爆破者》游戏已被移除。

    *   `BaseActor`类新增了功能，以简化将类实例收集到列表中的过程。

    *   游戏实体现在通常作为`BaseActor`类的扩展编写，以增加封装性并减少`BaseScreen`类所需的代码量。

    *   第一版第 4 章（“为游戏增添润色”）的内容在第二版中被拆分到第 5 章和第 6 章，以便更深入地讲解用户界面设计和音频支持。每个主题也都有自己专门的示例游戏项目。

    *   关于位图字体生成程序 Hiero 的内容已被位图字体生成类取代，允许开发者通过代码从 TrueType 字体（ttf）文件更快地生成自定义字体。这避免了预先生成位图字体图像的需要，从而简化了开发流程。

    *   用于检测《矩形毁灭者》中球弹跳角度的代码已大大简化。

    *   与拖放相关的代码和瓦片地图相关的代码已被重构到它们自己的独立类中，以便在其他项目中更容易重用。

    *   各个游戏已被重新组织到单独的章节中，并引入了许多新的游戏机制。特别是，第一版第 6 章（“附加游戏案例研究”）在第二版中被拆分到第 4 章、第 7
    章、第 8 章和第 9 章。第一版第 7 章（“集成第三方软件”）中的游戏在第二版中被拆分到第 11 章和第 12 章。

    *   由于瓦片地图的重要性，相关内容已被移入其专属章节（第 10 章），并用于简化之前的游戏项目（《海星收集者》和《矩形毁灭者》），然后再进入后续章节的更高级游戏。

    *   关于物理引擎 Box2D 的内容已被移除，以减少复杂性和不必要的开销，转而使用自定义物理代码。

    *   新增了高级主题（第 14 章的迷宫生成和第 15 章的着色器编程）。

    *   第一版中的 3D 演示（“海盗巡洋舰”）已被游戏项目《海星收集者 3D》取代。

    *   新增了附录，包含游戏设计文档的建议和示例，以及本书中开发的扩展类的完整 JavaDoc 风格列表，作为有用的参考。


    致谢


    我要感谢 Apress 出版社出色的编辑和支持团队，没有他们的才华和奉献，您正在阅读的这本书将不会存在。特别地，我要感谢 Mark Powers，感谢他不断的支持和鼓励。


    我还要感谢技术审阅者 Garry Patchett，感谢他对本书编程和教学法两方面的关注。从一开始，他就凭直觉理解了目标读者是谁，以及他们所需的细节和指导水平。Garry
    许多富有洞察力的评论和建议极大地提高了本书的清晰度，我感谢他投入所有时间和精力，帮助使这本书达到最佳状态。


    最后，特别感谢我过去和现在的学生们，感谢他们持续且富有感染力的热情。你们对游戏开发的动力和奉献精神是激励我撰写本书的原因。

    '
