- fmt: '# Animation


    The first change you will implement in the `BaseActor` class is support for animation:
    creating the appearance of motion or change by altering an image that is being
    displayed. This section will discuss two types of animation: value-based animation,
    which uses a single image and continuously changes associated values (such as
    position or rotation), and image-based animation, which displays a sequence of
    images in rapid succession.


    ## Value-Based Animations


    Many visual effects can be achieved by continuously changing values associated
    with a game entity, such as the following:


    - A movement effect can be created by changing the position-coordinate values.

    - A spinning effect can be created by changing the rotation value.

    - A growing or shrinking effect can be created by changing the scale factors.

    - A color-cycling effect can be created by changing the color red/green/blue (RGB)
    component values.

    - A fading in/out effect can be created by changing the alpha (transparency) value.


    These effects can easily be added to your game by using LibGDX’s `Action` class.
    An `Action` is an object that can be added to an `Actor` to automatically change
    the values of various fields (position, rotation, scale, color) over time. The
    code that processes actions is contained within the `act` method of the `Actor`
    class (and this is why you needed to call `super.act(dt)` in the previous chapter
    when writing the `act` method of the `BaseActor` class—to make sure that this
    code is executed). To create an `Action`, it is easiest to use the static methods
    available in the `Actions` class. There are dozens of methods available, only
    some of which will be discussed here.


    For example, an `Action` named `spin` that rotates an actor by 180 degrees over
    the course of two seconds can be created and attached to an `Actor` named `starfish`
    with the following code:


    ```

    Action spin = Actions.rotateBy( 180, 2 );

    starfish.addAction( spin );

    ```


    Similarly, an `Action` named `shift` that moves an actor 50 pixels horizontally
    (to the right) and 0 pixels vertically over the course of one second can be created
    with the following code:


    ```

    Action shift = Actions.moveBy( 50, 0, 1 );

    ```


    You can also create complex, compound visual effects by combining `Action` objects.
    If you add multiple actions to an `Actor`, they will run at the same time (often
    called in parallel). For example, if you add both the actions `spin` and `shift`
    to a single `Actor`, then during the first second, the `Actor` will rotate 90
    degrees and move 50 pixels to the right, and during the next second, it will rotate
    an additional 90 degrees (but no longer move to the right, as that action will
    have already finished at that point). Alternatively, you may want a set of actions
    to run one after the other (often called in sequence). You can create an action
    that runs only after all of the previously added actions have completed by using
    the `after` method of the `Actions` class. This is demonstrated by the following
    example, in which the `starfish` actor will first rotate for two seconds and then
    move during the third second:


    ```

    starfish.addAction( spin );

    starfish.addAction( Actions.after( shift ) );

    ```


    Finally, you may want an action to repeat a specific number of times or to repeat
    indefinitely. These behaviors are obtained by using the `Actions` class methods
    `repeat` and `forever`, respectively, as shown here:


    ```

    Action spinTwice = Actions.repeat( spin, 2 );

    Action spinForever = Actions.forever( spin );

    ```


    This is just a sample of the methods available; for a complete listing of the
    types of predefined actions available, see the documentation for the LibGDX `Actions`
    class. Conveniently, this functionality is built into the `Actor` class, and since
    the `BaseActor` class extends the `Actor` class, no additions need to be made
    to the `BaseActor` class to be able to use the `Action` objects.


    ## Image-Based Animations


    As mentioned before, an image-based animation is created from images that are
    rapidly displayed in sequence to create the illusion of movement. In LibGDX, this
    can be accomplished using the `Animation` class. Creating an animation requires
    three pieces of information:


    - An `Array` of images to be displayed

    - The amount of time that each image should be displayed

    - A value that indicates how the frames should be played—in the order given, in
    reverse order, from first to last to first again (ping-pong order)—and whether
    to repeat (loop) the animation


    Animations can be created based on different classes that store image data, such
    as `Texture` and `TextureRegion`. For maximum flexibility, the `Animation` class
    is designed generically so that, when you declare an `Animation` object, you can
    also declare the type of data it will store.


    ### Generic Types and Classes


    Data structures are a fundamental concept in computer programming, as they allow
    you to organize and use data efficiently. One of the most elementary and well-known
    data structure types is the array, which allows you to store a fixed number of
    values of a particular type. In the Java programming language, you indicate an
    array by first entering the data type being stored, followed by a set of square
    brackets; an array of strings is indicated by `String[]`, while an array of floating-point
    decimal numbers is indicated by `float[]`. In general, given any class in Java,
    you can create an array whose elements are of that type. This makes arrays a very
    flexible and adaptable data structure.


    Sometimes, you will design your own class to store a particular type of data.
    For example, storing the given name and family name of a person requires two strings,
    which could be stored using the following class:


    ```

    public class StringPair

    {

    private String first;

    private String second;

    // constructor

    StringPair(String a, String b)

    {

    first = a;

    second = b;

    }

    // getter/setter methods

    public void setFirst(String s)  { first = s; }

    public String getFirst()  { return first; }

    public void setSecond(String s) { second = s; }

    public String getSecond()  { return second; }

    // standard methods

    public String toString()

    {

    return "[" + first + "," + second + "]";

    }

    }

    ```


    Similarly, to store the x and y coordinates of a point, you could use the following
    class:


    ```

    public class FloatPair

    {

    private float first;

    private float second;

    // constructor

    FloatPair(float a, float b)

    {

    first = a;

    second = b;

    }

    // getter/setter methods

    public void setFirst(float x)  { first = x; }

    public float getFirst()  { return first; }

    public void setSecond(float x) { second = x; }

    public float getSecond()  { return second; }

    // standard methods

    public String toString()

    {

    return "[" + first + "," + second + "]";

    }

    }

    ```


    Comparing the code for each class, you will notice that it is nearly identical;
    the only substantial difference is the type of data being stored. In software
    development, it is highly desirable to reduce the amount of redundant code. Ideally,
    there should be a way to write a class that specifies the structure (such as the
    amount of data being stored and the methods used to access or modify it) and the
    type of data being stored when the object is created, just as is the case with
    arrays. As it happens, Java does in fact have such a capability. This is accomplished
    using generic programming.


    In generic programming, you can write a class as usual, but instead of indicating
    specific types when declaring fields or method parameters, you instead use a type
    variable, traditionally indicated by a single uppercase letter (such as `T` or
    `K`). To indicate the presence of a type variable in a class, the name of the
    class must be followed by angle brackets (`<` and `>`). For example, a generic
    class that retains the structure of the `StringPair` and `FloatPair` classes could
    be written as follows:'
