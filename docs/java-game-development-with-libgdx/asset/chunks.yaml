  trans: '

    ### 案例研究：太空岩石


    本节展示了针对第 4 章中更完整版本的《太空岩石》游戏，所提供的一组游戏设计文档问题的示例回答。

    '
- fmt: '# 1. Overall Vision


    `Space Rocks` is a space-themed shoot-em-up game. The player controls a spaceship
    whose goal is to shoot lasers and destroy rocks that are flying around the screen,
    earning points along the way. Once each screen is cleared, the player earns bonus
    points depending on the time needed to complete the level, then moves onto a similar
    but slightly more difficult level. The ultimate goal is to attain the highest
    score possible.


    This is a single-player action game.


    This game is appropriate for all ages and is simple enough to be enjoyed by casual
    gamers. The target platform is desktop computers, and the game is controlled with
    the keyboard; gamepad controller support is also possible (only the directional
    pad and buttons are needed).


    This game is fast-paced, and average gameplay sessions will be only a few minutes
    long, encouraging players to try repeatedly to achieve the highest score they
    can. A variety of background images and special effects will be used for visual
    interest.


    # 2. Mechanics


    The short-term goal is to avoid being hit by rocks in order to survive. The medium-term
    goals are to destroy the rocks flying around the screen and to do so quickly to
    maximize the score for that level. The long-term goal is to earn the highest score
    possible.


    ## 2.1 Abilities


    - The spaceship moves by rotating left and right and accelerating forward in the
    direction it is facing. There is no deceleration; to stop or reverse direction,
    the spaceship must rotate and accelerate in the opposite direction.

    - The spaceship is able to shoot lasers (one per second), which travel in a straight
    line for one second, then fade out and disappear from the game if they haven’t
    collided with a rock. If a laser hits a rock, the rock and the laser are both
    destroyed.

    - The spaceship is surrounded by a shield. If the spaceship is hit by a rock while
    the shields are active, the rock is destroyed and the shields lose power. After
    shield power is reduced to 0, the shields disappear, and being hit by a rock destroys
    the spaceship and ends the game.

    - The spaceship also has the ability to instantly, randomly teleport to a new
    location on the screen. While this can be used for quick escapes from an imminent
    collision, there is the possibility of teleporting onto a rock, and so the player
    may choose to use this ability sparingly (only in case of imminent destruction)
    or perhaps not at all.


    The only active obstacles are the rocks that the spaceship must avoid and shoot;
    they have random initial directions and speeds within a given range. The time
    required to finish each screen affects the player’s score, but does not have a
    direct effect on the spaceship in any way. In each subsequent level, the challenge
    increases by one or more of the following factors: increasing the number of rocks,
    increasing the overall speed of the rocks, or decreasing the size of the rocks.


    When an asteroid is destroyed, there is a 10 percent chance that it will leave
    behind a small energy capsule, which is an item that can be collected by the player
    to recharge the shields to 100 percent. Similarly, there is a 10 percent chance
    that sparkling golden fragments will be left behind, which awards more points
    to the player. Each item vanishes four seconds after appearing, so the player
    must be quick if they wish to collect them. (Thus, there is a 20 percent chance
    overall that a special item will appear, which will be an energy capsule half
    the time, and gold half the time.)


    The number of lasers the player can fire are unlimited; the only resource the
    player needs to be aware of is the remaining shield power, which can be recharged
    by collecting energy capsule items.


    The game world is a single screen, but features wraparound: after an object (spaceship,
    rock, or laser) moves past one edge of the screen, it reappears on the opposite
    edge. This design makes the game world feel larger (by not having a boundary)
    while still allowing the player to see all objects in the game world at the same
    time.


    # 3. Dynamics


    To play this game, a desktop computer is required. Navigating the menus requires
    a mouse to click on various buttons. The spaceship is controlled entirely by the
    keyboard: left/right arrow keys rotate the ship, up arrow activates the thrusters
    and accelerates the ship forward, spacebar shoots lasers, and the `X` key teleports
    the spaceship to a random location. Gamepad controls are provided but are optional:
    directional pad left/right rotates the ship, and three buttons (such as `A`, `B`,
    and `X` on an XBox 360-style gamepad) are used for acceleration, lasers, and teleportation,
    respectively. The controls are listed in an instructions menu.


    To be proficient at this game, the player will need to be able to precisely control
    the movement of the spaceship and predict the position of the rocks to line up
    shots from a distance. Maintaining a large distance between the spaceship and
    the rocks minimizes the chance that the shields will be damaged, but also makes
    it more difficult to obtain the items that can be dropped.


    The amount of power remaining in the shields is indicated visually by the shield
    graphic. A number indicating the points earned by the player is displayed in the
    top-center of the screen; the user interface is kept simple to avoid overlapping
    game-world elements as much as possible. When each level is complete, a congratulations
    message appears on the screen, as well as the number of seconds it took to clear
    the screen and the corresponding point bonus; the player presses a key to continue
    on to the next level.


    The menu system is navigated by using the mouse. There will be a start menu that
    displays a title graphic, the highest score earned, and buttons that allow the
    player to go to an instructions menu or begin the game right away (for experienced
    players). The instructions menu displays the backstory, lists the controls (keyboard
    and gamepad) for the game, and has a button that allows the player to return to
    the main menu. When the player loses the game, a “Game Over” message appears,
    along with another message if the player has earned a high score, followed by
    a button that allows the player to return to the start menu.


    There is no in-game pause or volume-control functionality. The player can quit
    the game at any time by clicking on the standard window controls located in the
    top-right corner of the window.


    # 4. Aesthetics


    The game is set in outer space and has many technological elements. The game world
    feels increasingly cluttered and chaotic due to the increasingly large number
    of rocks drifting around at random angles. As the rocks are destroyed in each
    level, the pace becomes more relaxed.


    The graphics are colorful and cartoonish. There will be a variety of background
    images used to make the levels feel different. The basic graphics required will
    be the spaceship, lasers, and rocks. There will be visual special effects corresponding
    to player actions and interactions between game-world objects:


    - A particle effect simulating thruster fire will appear whenever the player accelerates
    the spaceship.

    - The shields will have a slow rotation and pulse effect to make them appear more
    dynamic, and their opacity will change according to the remaining shield power.

    - Lasers will fade out before they disappear.

    - When teleporting, a wormhole-like animation will appear at the original and
    the new locations of the spaceship.

    - Whenever a rock is destroyed (from laser or shield collision), the rock will
    disappear and an explosion will appear in its place.

    - Items will feature a pulsing effect to draw the player’s attention and will
    fade out before they disappear. If they are collected, a small sparkling effect
    will appear.


    The menus will feature a quiet, ambient technological humming or droning sound,
    as one might imagine in the background of a spaceship. A small beep will play
    when navigation buttons are pressed. The game itself will feature exciting, driving
    background music to reinforce the mood of the game. Analogous to the visual effects
    described previously, there will be sound effects corresponding to player actions
    and interactions between game-world objects:


    - A continuous rocket exhaust sound will play as long as the player is accelerating
    the spaceship.

    - When a rock collides with the shields, an electric shock–like sound will play.

    - A laser fire sound will play when each laser is shot.

    - When teleporting, a deep whoosh-like sound will play.

    - Whenever a rock is destroyed, a rumbling explosion sound will be heard.

    - If an item is collected, a quiet chime sound will play.


    The backstory for the game is: “You are a spaceship pilot tasked with clearing
    out the interstellar debris that makes deep-space voyages dangerous for less-experienced
    pilots. With the aid of your advanced laser, shield, and teleportation technology,
    destroy as many rocks as you can before your own ship is destroyed and you are
    teleported back to your home base.”


    This game creates a feeling of excitement and tension.


    The fun aspect of this game comes from competition with oneself and with others
    to achieve the highest score possible. (Each player will have to keep track of
    their own high scores.)


    # 5. Development


    This project will completed individually; graphics and audio will be obtained
    from third-party websites that make their assets available under the Creative
    Commons license, and so the main task will be programming.


    A desktop computer (with keyboard, mouse, and speakers), a gamepad controller,
    and internet access will be necessary to complete this project. Playtesting can
    be performed on-site or remotely.


    The main sequence of steps to complete this project is as follows:


    1. Obtain graphics.

    2. Program ship movement and abilities (laser fire, teleportation, shields).

    3. Program rock movement and laser-rock interaction.

    4. Implement user interface (point system and high-score storage) and game-over
    screen.

    5. Add items (shield recharge and bonus points).

    6. Add visual effects, music, and sound effects.

    7. Load new level with increased difficulty when screen is cleared.

    8. Menu system (start and instructions screens)

    9. Gamepad support


    The main points for playtesting are after the user interface is finished, after
    the new level feature is added, and after all the preceding steps have been completed.
    The questions that will be asked are:


    - How do the spaceship controls feel: too slow/sluggish, too fast, or just right?

    - Is the gameplay too hard or too easy, too short or too long?

    - Does the difficulty level increase at a slow, moderate, or fast pace?

    - Do you have any suggestions to improve this game?


    This game will be disseminated for free as an executable file through various
    indie game-portal websites, and gameplay images and video will be posted via social
    media.'
