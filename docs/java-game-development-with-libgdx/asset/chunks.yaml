    ## 总结与下一步


    在本章中，你学习了两种用于提升游戏开发项目图形效果的高级且强大的方法。首先，你学会了如何使用 LibGDX 粒子编辑器创建粒子系统，该系统可用于模拟多种效果，例如你创建的推进器和爆炸效果。接着，你设计了一个名为
    `ParticleActor` 的类，使你能够将这些效果集成到 Space Rocks 游戏中。其次，你学习了如何编写着色器程序，这些程序利用 GPU 的强大功能来创建模糊、发光和扭曲等效果。然后，你学习了如何使用
    `ShaderProgram` 类，在 Starfish Collector 游戏中绘制角色时应用这些着色器程序。


    至此，你可以通过在游戏中加入更多特效来巩固所学知识。例如，尝试创建一个看起来像水珠从水坑中溅出的粒子效果，并在 Starfish Collector 游戏中使用该效果来替换
    `Whirlpool` 对象。你也可以为 Starfish Collector 中除了海龟之外的其他对象添加着色器程序；例如，你可以为 `Starfish`
    类添加发光脉冲效果。你甚至可以创建一个名为 `Water` 的新类来替换包含背景图片的 `BaseActor`，并在其 `draw` 方法中应用波浪扭曲着色器。或者，在
    Space Rocks 游戏中，你可以为 `Laser` 类添加发光脉冲效果，并为 `Warp` 类添加波浪扭曲效果。


    在下一章中，你将继续学习高级图形技术，但这次是在 3D 游戏的背景下，最后将以本书最初开始的游戏——Starfish Collector 的 3D 版本作为结尾。


