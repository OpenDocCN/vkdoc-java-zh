    经过这些补充，`DragAndDropActor` 类就完整了，现在可以开始为拼图游戏创建游戏专属对象了。


    ## 游戏项目：拼图游戏


    在拼图游戏中，一张图片会被分割成若干小块，玩家需要将这些小块拖拽到网格中正确的位置上。这些碎片随机分布在屏幕左侧，而它们应被放置的区域则位于屏幕右侧。当一块碎片被放置到某个方格区域时，它会自动对齐到该区域，并且其他碎片不能再放置到该特定区域，不过该碎片可以被重新移动，从而再次释放该区域。


    本项目只需创建两个游戏专属对象：一个名为 `PuzzlePiece` 的类，代表单个碎片，它将继承 `DragAndDropActor`；另一个名为 `PuzzleArea`
    的类，代表碎片将被放置的网格方格，它将继承 `DropTargetActor`。在初始化拼图碎片时，会存储一个行值和列值，用于指示其在原始图片中的位置。拼图区域对象也会存储行值和列值，表示它们在区域对象网格中的位置。当拼图碎片与拼图区域的行列值相等时，该碎片即被视为处于正确位置；当所有碎片都处于正确位置时，玩家获胜，屏幕上会显示“你赢了”的消息。


    首先，创建一个名为 `PuzzleArea` 的新类，包含以下代码，以提供上述功能：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class PuzzleArea extends DropTargetActor

    {

    private int row;

    private int col;

    public PuzzleArea(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/border.jpg");

    }

    public void setRow(int r)

    {  row = r;  }

    public void setCol(int c)

    {  col = c;  }

    public int getRow()

    {  return row;  }

    public int getCol()

    {  return col;  }

    }

    ```


    接下来，你将设置拼图碎片的类。除了存储其正确行列值的变量外，还会有一个变量用于存储该碎片当前所在的区域（如果有的话），以及一个检查碎片当前是否放置正确的方法。创建一个名为
    `PuzzlePiece` 的新类，包含以下代码：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class PuzzlePiece extends DragAndDropActor

    {

    private int row;

    private int col;

    private PuzzleArea puzzleArea;

    public PuzzlePiece(float x, float y, Stage s)

    {

    super(x,y,s);

    }

    public void setRow(int r)

    {  row = r;  }

    public void setCol(int c)

    {  col = c;  }

    public int getRow()

    {  return row;  }

    public int getCol()

    {  return col;  }

    public void setPuzzleArea(PuzzleArea pa)

    {  puzzleArea = pa;  }

    public PuzzleArea getPuzzleArea()

    {  return puzzleArea;  }

    public void clearPuzzleArea()

    {  puzzleArea = null;  }

    public boolean hasPuzzleArea()

    {  return puzzleArea != null;  }

    public boolean isCorrectlyPlaced()

    {

    return hasPuzzleArea()

    && this.getRow() == puzzleArea.getRow()

    && this.getCol() == puzzleArea.getCol();

    }

    }

    ```


    此外，大部分游戏逻辑将通过重写 `DragAndDropActor` 类中的 `onDragStart` 和 `onDrop` 方法在此类中处理。具体来说，当碎片被放下时，如果其下方有一个可用的（可被选中的）拼图区域，该碎片将被移动到该区域，设置碎片对应的拼图区域变量，并且该特定区域将不再可被选中。同时，当碎片被拖拽时，如果已设置了对应的拼图区域，该区域将重新变为可被选中，并且碎片对应的拼图区域变量将被清除。为实现这些功能，请在
    `PuzzlePiece` 类中添加以下两个方法：


    ```

    // 重写 DragAndDropActor 类的方法

    public void onDragStart()

    {

    if ( hasPuzzleArea() )

    {

    PuzzleArea pa = getPuzzleArea();

    pa.setTargetable(true);

    clearPuzzleArea();

    }

    }

    public void onDrop()

    {

    if ( hasDropTarget() )

    {

    PuzzleArea pa = (PuzzleArea)getDropTarget();

    moveToActor(pa);

    setPuzzleArea(pa);

    pa.setTargetable(false);

    }

    }

    ```


    有了这些类之后，你就可以将注意力转向 `LevelScreen` 类了。首先，加载一张图片，将其分割成更小的区域（如图 9-3 所示），并将这些图片加载到随机放置在屏幕左侧的
    `PuzzlePiece` 对象中。


