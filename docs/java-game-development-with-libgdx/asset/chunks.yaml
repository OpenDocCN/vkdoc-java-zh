- fmt: '# Game Project: Plane Dodger


    `Plane Dodger` is an endless side-scrolling action game in which the player controls
    a plane that moves up and down with the goal of dodging enemy planes that fly
    across the screen and, whenever possible, collecting stars that appear. If the
    player’s plane collides with an enemy plane, the game is over. Dodging enemy planes
    and collecting stars both award points to the player, and so the longer the player
    survives, the higher their score will be. Stars appear at regular intervals beyond
    the right edge of the screen at random heights and slowly move from right to left.
    If the player adjusts their plane''s vertical position so that it collides with
    the star, the star disappears and the player earns a point. Enemy planes also
    appear beyond the right edge of the screen at random heights and move from left
    to right. At first, enemy planes appear with the same frequency and travel at
    the same speed as the stars, but as time passes, the enemy planes appear with
    increasing frequency and travel at greater speeds. Every time an enemy plane passes
    beyond the left edge of the screen, the player earns a point. At first, collecting
    stars is an easy source of extra points, but as the enemy planes move faster,
    the risk may no longer be worth the reward.


    The player presses the spacebar key to give their plane a small boost of speed
    upward. This is a discrete action; there is one boost of speed per key press.
    To move upward quickly requires the player to rapidly press the spacebar key.
    The force of gravity is always pulling the plane downward and will eventually
    pull the plane down to the ground. Colliding with the ground or the top edge of
    the screen has no effect on the plane; these only serve as lower and upper boundaries
    for the plane’s vertical position. The player’s plane cannot actually move left
    or right; the appearance of flying to the right is simulated by the scrolling
    background. The user interface contains only a single text display (the total
    number of points) along the top edge in the center of the screen. When the player
    loses the game, a “Game Over” message appears in the center of the screen.


    This game uses a vibrant, colorful, cartoonish art style and has driving, fast-paced
    background music to help establish an energetic, excited mood. The interaction
    of objects is enhanced by visual and audio effects. When the plane collides with
    a star, a sparkling visual effect will appear, accompanied by a light, quiet tinkling
    sound. When the plane collides with an enemy, an explosion will appear, accompanied
    by a deep, rumbling, explosion-like sound.


    Beginning this project requires the same steps as in previous projects: creating
    a new project, creating an `assets` folder and a `+libs` folder (the latter not
    being necessary if you have set up the `userlib` directory), copying the custom
    framework files you created in the first part of this book (`BaseGame.java`, `BaseScreen.java`,
    `BaseActor.java`), and copying the graphics and audio for this project into your
    `assets` folder. To simplify this process, a BlueJ project named `Framework` has
    been created for your convenience, which contains these items (except for the
    project-specific assets) and can be used as a starting point for this project
    and future projects, although using the code you have previously developed is
    perfectly acceptable as well. Therefore, to begin this project:


    *   download the source code files for this chapter;

    *   make a copy of the downloaded `Framework` folder (and its contents) and rename
    it to `Plane Dodger`;

    *   copy all the contents of the downloaded `Plane Dodger` project assets folder
    into your newly created `Plane Dodger assets` folder; and

    *   open the BlueJ project in your `Plane Dodger` folder.


    You will notice that a few additional classes have been provided for your convenience,
    including a `launcher` class, with the following code:


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class Launcher

    {

    public static void main (String[] args)

    {

    Game myGame = new CustomGame();

    LwjglApplication launcher = new LwjglApplication( myGame, "Game Title", 800, 600
    );

    }

    }

    ```


    An extension of the `BaseGame` class, called `CustomGame`, is also included and
    contains the following code:


    ```

    public class CustomGame extends BaseGame

    {

    public void create()

    {

    super.create();

    setActiveScreen( new LevelScreen() );

    }

    }

    ```


    An extension of the `BaseScreen` class, called `LevelScreen`, is also included
    and contains the following code:


    ```

    public class LevelScreen extends BaseScreen

    {

    public void initialize()

    {

    }

    public void update(float dt)

    {

    }

    }

    ```


    This project can be run immediately (by running the `main` method of the `Launcher`
    class, as was the case with previous projects), but all it will display at this
    point is a black screen, since no content has been added.


    To begin your `Plane Dodger` game project, in the `CustomGame` class, change the
    name of the class to `PlaneDodgerGame` (this will also cause BlueJ to rename the
    source code file to `PlaneDodgerGame.java`). Then, in the `Launcher` class, change
    the contents of the `main` method to the following:


    ```

    Game myGame = new PlaneDodgerGame();

    LwjglApplication launcher = new LwjglApplication( myGame, "Plane Dodger", 800,
    600 );

    ```


    At this point, you are ready to begin creating the classes for the game-specific
    objects and the code for the gameplay itself.'
