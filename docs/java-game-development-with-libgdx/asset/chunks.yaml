    \        1.  fantasy (simulating experiences one doesn’t have in real life)  \n\
    \        2.  role-playing (identifying with a character)  \n        3.  competition\
    \ (against other players or against records previously set by oneself)  \n   \
    \     4.  cooperation (working with others toward a common goal)  \n        5.\
    \  compassion (providing assistance or rescuing others)  \n        6.  discovery\
    \ (finding objects or exploring a world)  \n        7.  overcoming challenges\
    \ (such as defeating enemies or solving puzzles)  \n        8.  collection (including\
    \ game items or badges/trophies for achievements)  \n        9.  social aspects\
    \ (both within the game and the communities that form around the game).    \n\
    5.  Development\n    1.  If working with a group: list the team members and their\
    \ roles (game designer, programmer, illustrator, animator, composer, sound editor,\
    \ writer, manager, etc.), responsibilities, and skills.  \n    2.  What equipment\
    \ will you need for this project? Include both hardware and software that will\
    \ be needed for content creation (graphics and audio), game development, and playtesting.\
    \  \n    3.  What are the tasks that need to be accomplished to create this game?\
    \ Estimate the time required for each task and note the estimated completion date,\
    \ the team member responsible, and the priority of each feature (in case some\
    \ features need to be eliminated due to time constraints or unexpected circumstances).\
    \  \n    4.  What points in the development process are suitable for playtesting?\
    \ How will you find people to playtest your game? What specific kinds of feedback\
    \ are you interested in gathering? (For example, you could ask how clear the goals\
    \ are, how easy or intuitive the controls are, how balanced the difficulty level\
    \ is, and which parts of the game were most or least enjoyable.) Finally, how\
    \ will you collect this information (such as a questionnaire or a brief discussion)?\
    \  \n    5.  What are your plans for dissemination? Do you have plans to promote\
    \ this game through social media, forum postings, gameplay videos, or advertisements?"
  trans: "\n1.  总体愿景\n    1.  写一段简短的文字（3-6 句话）来解释你的游戏。（这有时被称为电梯演讲：在 30 秒的电梯行程中，用来快速、简单地描述一个想法或产品的简短摘要。）\n\
    \    2.  你如何描述其游戏类型？它是单人游戏还是多人游戏（如果是后者，是合作还是竞争）？\n    3.  目标受众是谁？包括人口统计学特征（潜在玩家的年龄、兴趣和游戏经验）、游戏平台（桌面端、主机或智能手机）以及任何所需的特殊设备（如游戏手柄）。\n\
    \    4.  人们为什么会想玩这个游戏？哪些特性使这款游戏区别于同类作品？最初吸引玩家兴趣的“钩子”是什么，游戏如何保持玩家的兴趣，以及是什么让它有趣？\n\
    2.  机制：游戏世界的规则。（注意，以下问题是从游戏主角的角度来表述的，以区别于玩家，因为玩家是“动态”部分关注的焦点。然而，如果不存在这样的角色，玩家本身可以被视为角色。）\n\
    \    1.  角色的目标是什么？这些目标可以分为短期、中期和长期目标。\n    2.  角色拥有哪些能力？这应包括角色能够执行的任何动作，例如移动、攻击、防御、收集物品、与环境互动等。详细描述这些能力或动作；例如，角色能跳多高？角色既能行走也能奔跑吗？\n\
    \    3.  角色将面临哪些障碍或困难？有些障碍是主动的（如敌人、抛射物或陷阱），应详细描述（它们如何影响玩家、位置、移动模式等）。其他障碍是被动的（如需要解锁的门、需要穿越的迷宫、需要解决的谜题或需要击败的时间限制）。角色如何克服这些障碍（物品、武器、法术、快速反应）？\n\
    \    4.  角色可以获得哪些物品？它们的效果是什么，在哪里获得，以及出现的频率如何？\n    5.  需要管理哪些资源（如生命值、金钱、能量和经验值）？这些资源如何获得和使用？它们是有限的吗？\n\
    \    6.  描述游戏世界的环境。这个世界有多大（相对于屏幕）？是否有多个房间或区域？游戏玩法是线性的还是开放的？换句话说，是严格按照线性顺序推进关卡或完成任务，还是角色可以自由选择关卡、探索世界并随意完成任务？\n\
    3.  动态：玩家与游戏机制之间的交互。\n    1.  游戏需要哪些硬件（键盘、鼠标、扬声器、游戏手柄、触摸屏）？使用哪些按键/按钮，它们的效果是什么？玩家如何获知控制方案（单独的说明书文档、游戏菜单、教程或游戏内标志）？\n\
    \    2.  玩家需要培养哪种熟练度才能精通游戏？是否存在可以通过基础游戏机制组合而成的复杂操作？游戏机制或游戏世界环境是否直接或间接地鼓励或阻止玩家发展特定的游戏策略？玩家的表现是否会影响游戏机制（如反馈循环）？\n\
    \    3.  游戏过程中会显示哪些游戏数据（如分数、生命值、已收集物品、剩余时间）？这些信息显示在屏幕的什么位置？信息是如何传达的（文本、图标、图表、状态条）？\n\
    \    4.  将有哪些菜单、界面或覆盖层（标题画面、帮助/说明、制作人员名单、游戏结束）？玩家如何在各个界面之间切换，哪些界面可以相互访问？\n   \
    \ 5.  玩家如何在软件层面与游戏交互（暂停、退出、重新开始、控制音量）？\n4.  美学：游戏的视觉、听觉、叙事和心理方面；这些是直接影响玩家体验的元素。\n\
    \    1.  描述游戏的风格和感觉。游戏是发生在乡村、科技还是魔法世界？游戏世界给人的感觉是杂乱还是稀疏，有序还是混乱，几何化还是有机化？情绪基调是轻松还是严肃？节奏是放松还是疯狂？这里讨论的所有美学元素应协同作用，共同营造一个连贯且统一的主题。\n\
    \    2.  游戏使用像素艺术、线条艺术还是写实图形？色彩是明亮还是暗淡，丰富还是单一，有光泽还是暗淡？会有基于数值还是基于图像的动画？是否有任何特效？列出你需要的所有图形资源清单。\n\
    \    3.  游戏将使用什么风格的背景音乐或环境音效？角色动作、与敌人、物体和环境的互动将使用什么音效？是否会有与用户界面交互相对应的音效？列出你需要的所有音乐和音效。\n\
    \    4.  游戏相关的背景故事是什么？角色追求其目标的动机是什么？随着玩家在游戏中的推进，是否会有情节或故事线展开？\n    5.  游戏试图激发哪些情绪状态：快乐、兴奋、平静、惊喜、自豪、悲伤、紧张、恐惧、沮丧？\n\
    \    6.  是什么让游戏“有趣”？一些玩家可能喜欢游戏的图形、音乐、故事或引发的情绪。玩家可能喜欢的其他特性包括：\n        1.  幻想（模拟现实生活中没有的经历）\n\
    \        2.  角色扮演（认同某个角色）\n        3.  竞争（对抗其他玩家或对抗自己先前创下的记录）\n        4.  合作（与他人合作达成共同目标）\n\
    \        5.  同情（提供帮助或拯救他人）\n        6.  探索（寻找物品或探索世界）\n        7.  克服挑战（如击败敌人或解决谜题）\n\
    \        8.  收集（包括游戏物品或成就徽章/奖杯）\n        9.  社交方面（包括游戏内以及围绕游戏形成的社区）。\n5.  开发\n\
    \    1.  如果是团队合作：列出团队成员及其角色（游戏设计师、程序员、插画师、动画师、作曲师、音效编辑师、编剧、经理等）、职责和技能。\n    2.\
    \  这个项目需要哪些设备？包括内容创作（图形和音频）、游戏开发和游戏测试所需的硬件和软件。\n    3.  创建这个游戏需要完成哪些任务？估算每项任务所需的时间，并注明预计完成日期、负责的团队成员以及每个特性的优先级（以防某些特性因时间限制或意外情况需要被砍掉）。\n\
    \    4.  开发过程中的哪些节点适合进行游戏测试？你将如何找到人来测试你的游戏？你对收集哪些类型的反馈感兴趣？（例如，你可以询问目标是否清晰、控制是否简单直观、难度平衡性如何，以及游戏中最喜欢和最不喜欢的部分是什么。）最后，你将如何收集这些信息（例如问卷或简短讨论）？\n\
    \    5.  你的发布计划是什么？你是否计划通过社交媒体、论坛发帖、游戏视频或广告来推广这款游戏？\n"
