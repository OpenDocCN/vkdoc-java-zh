  raw: 'Often in programming you will want to reduce redundant code by refactoring
    repeated features in a base class and then extending that class with specialized
    subclasses. In some situations, you will also know that all of the extending classes
    will need to implement a particular method—but they will all do it in a different
    way, so the code can’t be written ahead of time in the base class, although the
    method needs to be declared in the base class.


    For example, consider a fantasy-style role-playing game. Assume that the base
    class for player characters is named `Person`. This class will likely contain
    some standard fields and methods that all `Person` objects should have, such as
    a `String` called `name` that stores the name of the character, and get and set
    methods to access this information. You might want to create two classes, `Wizard`
    and `Warrior`, which extend the `Person` class. Assume that the user interface
    of this game is consistent for all types of characters and that it contains a
    Sword button that activates a method named `useSword` and a Spell button that
    activates a method named `useSpell`.


    Although the `Person` class will declare these methods, their implementation will
    differ greatly in the `Wizard` and `Warrior` classes. Traditionally, warriors
    wield swords, and wizards do not; wizards cast magic spells, and warriors do not.
    Other types of characters might be imagined that can use both swords and spells,
    or characters that can use neither. Regardless, if the player clicks a button
    corresponding to an action that a character is unable to perform, a message should
    display onscreen explaining this; otherwise, the action should take place as expected.


    In this situation, you will want to require extensions of the `Person` class in
    order to provide customized code to implement the methods `useSword` and `useSpell`,
    as an interface does; however, `Person` cannot be an interface, because it provides
    code for some of its methods, such as getting and setting the `name` field. In
    an interface, methods are only declared, not written.


    The solution to this scenario is to create an abstract class. You declare the
    method as a class with the additional keyword `abstract` (similar to the way an
    interface is declared using the keyword `interface`), which indicates that some
    methods may be declared with the code being provided, and that other classes that
    extend this class must provide the code for such methods. Any such method is also
    declared using the modifier `abstract`, as shown in the example code that follows.
    Note that since not all of the code for this class is provided, you cannot create
    an instance of this class (again, similar to an interface).


    ```

    public abstract class Person

    {

    private String name;

    public void setName(String n)  { name = n; }

    public String getName()  { return name; }

    public abstract void useSword();

    public abstract void useSpell();

    }

    ```


    Any class that extends `Person` must provide an implementation of each method
    that was previously declared as abstract. For example:


    ```

    public class Wizard extends Person

    {

    public void useSword()

    {

    System.out.print("Wizards are unable to wield a sword...");

    }

    public void useSpell()

    {

    // insert code here to select a spell and its target

    }

    }

    public class Warrior extends Person

    {

    public void useSword()

    {

    // insert code here to attack an enemy

    }

    public void useSpell()

    {

    System.out.print("Warriors are unable to use magic...");

    }

    }

    ```


    In this way, an abstract class combines the advantages of a standard class and
    an interface.


    Using an abstract class will require any class that extends `GameBeta` to provide
    implementations of methods to initialize and update the game world. This also
    helps developers avoid potential mistakes such as misspelling the names of the
    methods that they are supposed to be overriding.


    The changes that need to be made to the `GameBeta` class, presented previously,
    are as follows. Note in particular that the bodies of the `initialize` and `update`
    methods are removed, and there are semicolons added to the lines where these methods
    are declared.


    ```

    // import statements remain the same

    public abstract class GameBeta extends Game

    {

    protected Stage mainStage;

    // create method remains the same

    public abstract void initialize();

    // render method remains the same

    public abstract void update(float dt);

    }

    ```


    With the `GameBeta` class serving as a base, the `StarfishCollectorBeta` class
    can be greatly simplified, as previously explained. The changes to the class are
    explained in the commented code that follows. Note that as you change the code
    in one class, other classes that depend on it will appear to have errors until
    the changes have been completed.


    ```

    // import statements remain the same

    // this class now extends GameBeta rather than Game

    public class StarfishCollectorBeta extends GameBeta

    {

    // removed declaration of mainStage

    private Turtle turtle;

    private ActorBeta starfish;

    private ActorBeta ocean;

    private ActorBeta winMessage;

    private boolean win;

    // create method renamed to initialize

    public void initialize()

    {

    // removed initialization of mainStage

    // the rest of the method remains the same

    }

    // render method renamed to update; requires float parameter dt

    public void update(float dt)

    {

    // most code of the render method removed

    // check win condition: turtle must be overlapping starfish

    if (turtle.overlaps(starfish))

    {

    starfish.remove();

    winMessage.setVisible(true);

    }

    }

    }

    ```


    As you can see, this class now focuses on the game itself (the game objects and
    their interaction with each other) rather than framework issues (such as setting
    up and using the stage). You can now play the game by running the `main` method
    in the corresponding launcher class, as before.


