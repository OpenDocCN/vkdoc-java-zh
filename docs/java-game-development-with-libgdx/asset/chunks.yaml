    ## 总结与下一步


    本章可能只是触及了3D游戏编程的表面，但这本身就是一个包含大量内容的主题。你探索了3D场景的组成部分、透视摄像机和光照。你了解到3D模型包含网格和材质，并且模型实例使用矩阵存储变换数据（位置、旋转和缩放）。你改编并扩展了自定义游戏开发框架，加入了3D版本的演员和舞台，并学习了在三维世界中移动对象的多种方法。最后，你通过创建两个交互式演示程序，检验了你的技能（和代码）。


    有了本章奠定的基础，你现在已经准备好创建一些带有3D图形（为简单起见，采用2.5D玩法）的游戏了。一个很好的起点是重新创建本书早期的一些项目。像“矩形毁灭者”这样的游戏可以简单地使用盒子和球体来重新创建。对于其他游戏，你可能会想使用预先创建的模型文件（类似于海龟、海星和岩石）。你可以从以下网站下载模型文件（格式多样）：


    *   OpenGameArt：[`www.opengameart.org`](http://www.opengameart.org)

    *   The Models Resource：[`www.models-resource.com`](http://www.models-resource.com)

    *   TurboSquid：[`www.turbosquid.com`](http://www.turbosquid.com)（他们有许多免费模型；可以在搜索选项中指定。）


    下载3D模型后，在将其加载到LibGDX之前，如果需要，你可以使用3D图形软件（如Blender）查看和修改它，该软件可在[`www.blender.org`](http://www.blender.org)免费获取。或者，对于有艺术天赋的人来说，Blender甚至可以用来从头创建3D模型。


    再次祝贺你完成了本书的最后一个游戏项目！下一章将总结一些通用建议以及游戏开发中可能的后续步骤。


