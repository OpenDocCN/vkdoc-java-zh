  trans: '

    ### 收尾工作


    至此，你还可以添加一些收尾工作来提升玩家的体验。其中最重要的可能是，玩家可能会觉得歌曲开始得有些突然；你可以通过添加一个视觉和听觉上都有提示的倒计时来解决这个问题。此外，当歌曲结束时，最好显示一条游戏结束的消息，给玩家更强的结束感。最后，还会添加一些微妙的视觉效果：当按下对应按键时，目标方块会产生脉冲效果；当落下的方块消失时，会应用一个先变亮再淡出的效果。


    首先，将新的动作添加到游戏对象中。在 `FallingBox` 类中，添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    import com.badlogic.gdx.graphics.Color;

    ```


    接下来，添加以下方法：


    ```

    public void flashOut()

    {

    float duration = 0.25f;

    Action flashOut =

    Actions.parallel(

    Actions.scaleTo(1.5f,1.5f, duration),

    Actions.color(Color.WHITE, duration),

    Actions.fadeOut(duration) );

    addAction( flashOut );

    addAction( Actions.after( Actions.removeActor() ) );

    }

    ```


    在 `TargetBox` 类中，添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    然后，添加以下方法：


    ```

    public void pulse()

    {

    Action pulse =

    Actions.sequence(

    Actions.scaleTo(1.2f,1.2f, 0.05f),

    Actions.scaleTo(1.0f,1.0f, 0.05f) );

    addAction(pulse);

    }

    ```


    接下来，你将在游戏中激活这些方法。在 `RhythmScreen` 类中，有两处代码中落下的方块会消失，由代码 `fb.remove()` 标识：一处靠近
    `update` 方法的末尾，另一处靠近 `keyDown` 方法的末尾。在这两处位置，将代码行 `fb.remove()` 替换为以下两行代码，以应用淡出效果：


    ```

    fb.setSpeed(0);

    fb.flashOut();

    ```


    同样在 `keyDown` 方法中，在从 `targetList` 获取 `TargetBox` 的那行代码之后，添加以下代码行以应用脉冲效果：


    ```

    tb.pulse();

    ```


    接下来，你将在 `Message` 类中实现倒计时和游戏结束消息的功能。首先，在 `Message` 类中添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.audio.Sound;

    ```


    接下来，添加以下变量：


    ```

    private Animation countdown3;

    private Animation countdown2;

    private Animation countdown1;

    private Animation countdownGo;

    private Animation congratulations;

    private Sound blip;

    private Sound tone;

    ```


    在 `Message` 类的 `constructor` 方法中，通过添加以下代码来初始化这些新添加的变量：


    ```

    countdown3 = loadTexture("assets/countdown-3.png");

    countdown2 = loadTexture("assets/countdown-2.png");

    countdown1 = loadTexture("assets/countdown-1.png");

    countdownGo = loadTexture("assets/countdown-go.png");

    congratulations = loadTexture("assets/congratulations.png");

    blip = Gdx.audio.newSound(Gdx.files.internal("assets/blip.wav"));

    tone = Gdx.audio.newSound(Gdx.files.internal("assets/tone.wav"));

    ```


    最后，在 `Message` 类中添加以下两个方法。在 `countdown` 方法中，你会看到大量使用了 `Actions.run` 方法和 lambda
    表达式，以便在精确的时间切换动画和播放声音。


    ```

    public void displayCountdown()

    {

    Action countdown =

    Actions.sequence(

    Actions.run( () -> setAnimation(countdown3) ),

    Actions.run( () -> blip.play() ),

    Actions.alpha(1),

    Actions.scaleTo(1.1f,1.1f, 0.05f), Actions.scaleTo(1.0f,1.0f, 0.05f),

    Actions.delay(0.5f), Actions.fadeOut(0.4f),

    Actions.run( () -> setAnimation(countdown2) ),

    Actions.run( () -> blip.play() ),

    Actions.alpha(1),

    Actions.scaleTo(1.1f,1.1f, 0.05f), Actions.scaleTo(1.0f,1.0f, 0.05f),

    Actions.delay(0.5f), Actions.fadeOut(0.4f),

    Actions.run( () -> setAnimation(countdown1) ),

    Actions.run( () -> blip.play() ),

    Actions.alpha(1),

    Actions.scaleTo(1.1f,1.1f, 0.05f), Actions.scaleTo(1.0f,1.0f, 0.05f),

    Actions.delay(0.5f), Actions.fadeOut(0.4f),

    Actions.run( () -> setAnimation(countdownGo) ),

    Actions.run( () -> tone.play() ),

    Actions.alpha(1),

    Actions.fadeOut(1) );

    addAction(countdown);

    }

    public void displayCongratulations()

    {

    setOpacity(0);

    setAnimation(congratulations);

    setScale(2);

    addAction( Actions.fadeIn(4) );

    }

    ```


    添加完这些方法后，你现在可以在游戏中的适当时机激活它们。在 `RhythmScreen` 类的 `initialize` 方法中，在 Start 按钮的 lambda
    表达式内，直接在 `return` 语句之前添加以下代码：


    ```

    message.displayCountdown();

    ```


    在 `update` 方法的末尾，添加以下代码：


    ```

    if ( songData.isFinished() && !gameMusic.isPlaying() )

    {

    message.displayCongratulations();

    songData = null;

    }

    ```


    一旦你完成了这些步骤，恭喜你完成了 Rhythm Tapper 游戏！


    ## 总结与下一步


    在本章中，你学习了如何为游戏添加音乐和音效。你首先为 Starfish Collector 游戏添加了音频，以及一个用于静音和取消静音的按钮。然后，你创建了一个全新的基于音频的节奏动作类游戏，名为
    Rhythm Tapper。在此过程中，你还学习了如何在 LibGDX 中读写文本文件。


    至此，你还可以为你的项目添加许多基于音频的功能。在 Starfish Collector 中，你可以添加一个音效（例如小号演奏的号角声），在所有海星被收集后播放。你也可以考虑为菜单屏幕或过场动画添加背景音乐。在
    Rhythm Tapper 中，在游戏结束时添加掌声音效会特别合适。此外，你可以考虑在游戏结束时显示额外信息，例如一个表格，显示歌曲期间各种消息（“完美”、“很棒”等）出现的次数，或者显示玩家获得的可能分数百分比（通过将他们的得分除以最高可能得分计算得出）。为了练习你的音频编码技能，你可以为第
    4 章的 Space Rocks 游戏添加音乐和音效，这将大大提升该项目的整体质量。


    完成本章后，你已经学习了 LibGDX 的所有基础知识，并创建了一个强大且通用的自定义框架，可用于创建各种类型的游戏。在接下来的章节中，你将学习如何在涉及横向卷轴游戏、弹跳与碰撞游戏、拖放游戏、平台游戏和冒险游戏等类型的项目中实现新的游戏机制。


    脚注 1


    网站 `incompetech.com` 提供了大量可免费下载的音乐，这些音乐根据知识共享署名 3.0 许可协议发布。


      2


    网站 `audionautix.com` 提供了大量可免费下载的音乐，这些音乐根据知识共享署名 3.0 许可协议发布。

    '
- fmt: '# Part II


    ## Intermediate Examples


    With the solid foundation in the fundamental concepts and classes in LibGDX and
    the custom framework you developed and refined in Part I, you are now prepared
    to create a variety of video games of different genres, each featuring different
    mechanics. The chapters in this part are independent of each other and may be
    read in any order, except for Chapters [11](#A352797_2_En_11_Chapter.html) and
    [12](#A352797_2_En_12_Chapter.html), as they rely on tilemaps, which are introduced
    in Chapter [10](#A352797_2_En_10_Chapter.html).


    ### Chapter [7](#A352797_2_En_7_Chapter.html) : Side-Scrolling Games


    In this chapter, you will create a side-scrolling action game called Plane Dodger
    inspired by modern smartphone games such as Flappy Bird and Jetpack Joyride. Along
    the way, you will learn how to create an endless scrolling background effect,
    simulate gravity using acceleration settings, and implement a difficulty ramp
    that increases the challenge to the player as time passes.


    ### Chapter [8](#A352797_2_En_8_Chapter.html) : Bouncing and Collision Games


    In this chapter, you will create a ball-bouncing, brick-breaking game called Rectangle
    Destroyer inspired by arcade and early console games such as Breakout and Arkanoid.
    New features that will be implemented in this game include moving an object using
    the mouse, simulating objects bouncing off of other objects, and creating power-up
    items that the player can collect.


    ### Chapter [9](#A352797_2_En_9_Chapter.html) : Drag-and-Drop Games


    In this chapter, you will learn how to add drag-and-drop functionality to your
    games; you will then create a new class containing the related code. To demonstrate
    the flexibility of this new class, you will create two new games that make use
    of it. The first will be a jigsaw-puzzle game that consists of an image that has
    been broken into pieces and must be rearranged correctly on a grid. The second
    will be a solitaire card game called 52 Card Pickup where a standard deck of playing
    cards must be organized into piles.


    ### Chapter [10](#A352797_2_En_10_Chapter.html) : Tilemaps


    This chapter will explain how to use Tiled, a general-purpose map-editing software
    program that can be used for multiple aspects of the level design process. Then,
    you will create a class that allows you to import the data from tilemap files
    into the custom framework you have developed. This knowledge will be used to improve
    two previous game projects: for the Starfish Collector game you will design a
    maze-like level (using rocks for walls) and add some scenery, while for the Rectangle
    Destroyer game you will design a colorful layout of bricks. The topics learned
    in this chapter are needed for the following two chapters.


    ### Chapter [11](#A352797_2_En_11_Chapter.html) : Platform Games


    In this chapter, you will learn how to create the platform game Jumping Jack,
    which is inspired by arcade and console games such as Donkey Kong and Super Mario
    Bros. New concepts introduced in this chapter include game entities with multiple
    animations, platform physics, using extra actors as “sensors” to monitor the area
    around an object for overlap and collision, jump-through platforms, and key-and-lock
    mechanics.


    ### Chapter [12](#A352797_2_En_12_Chapter.html) : Adventure Games


    This chapter features the most ambitious game project in the entire book: a combat-based
    adventure game named Treasure Quest inspired by classic console games such as
    The Legend of Zelda. This game uses new features such as enemy combat with two
    different types of weapons (a sword and an arrow), non-player characters (NPCs)
    with messages that depend on the state of the game (such as the number of enemies
    remaining), and an item-shop mechanic.


    # 7. Side-Scrolling Games


    In this chapter, you will create a side-scrolling action game called Plane Dodger,
    shown in Figure [7-1](#A352797_2_En_7_Chapter.html#Fig1), inspired by modern smartphone
    games such as Flappy Bird and Jetpack Joyride. Along the way, you will create
    an endless scrolling background effect, simulate gravity using acceleration settings,
    and implement a difficulty ramp that increases the challenge difficulty as time
    passes.


    ![A352797_2_En_7_Fig1_HTML.jpg](A352797_2_En_7_Fig1_HTML.jpg)


    **Figure 7-1.** The Plane Dodger game'
