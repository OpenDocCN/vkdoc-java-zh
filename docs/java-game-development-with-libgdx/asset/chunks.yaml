  raw: 'Next, you will add a thruster effect to the spaceship, which will appear whenever
    the player is holding down the key to accelerate the spaceship. This is an example
    of providing visual feedback to the player, an important game design principle
    that makes the overall game experience feel more responsive and polished. The
    trickiest aspect to implementing the thruster effect (and the shield effect that
    will be discussed following this) is keeping the position and rotation of the
    thrusters aligned relative to the spaceship. Effectively, you want to attach one
    actor to another and keep their relative positions in sync. Once again, the LibGDX
    framework provides this functionality.


    LibGDX includes a class called `Group` that extends the `Actor` class and provides
    the ability to add additional actors to the group. Furthermore, when rendering
    these additional actors, their positions and rotations are determined with respect
    to the group itself, exactly as desired for this game and others to follow. To
    incorporate this functionality into your custom framework, in the `BaseActor`
    class, add the following `import` statement:


    ```

    import com.badlogic.gdx.scenes.scene2d.Group;

