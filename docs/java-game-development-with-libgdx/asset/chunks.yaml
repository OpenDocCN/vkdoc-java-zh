  trans: '

    ## 使用演员与舞台管理游戏实体


    在之前的示例中——即《海星收集者》游戏的首个迭代版本——你已看到每个游戏实体（如海龟和海星）都包含大量需要追踪的相关信息，例如纹理和 (x,y) 坐标。在
    Java 这类面向对象编程语言中，一个核心设计原则是将相关信息封装在单个类中。虽然你可以创建 `Turtle` 类、`Starfish` 类等来管理这些信息，但这种方法会导致程序中存在大量冗余，既低效又难以管理。由于软件工程的另一个指导原则是编写可复用代码，因此你需要实现一个包含所有游戏实体共有基本信息的单一类，并在必要时对其进行扩展。


    LibGDX 库提供了几个可用于管理游戏对象相关数据的类；你将使用 LibGDX 的 `Actor` 类作为基础。该类存储位置、尺寸（宽度和高度）、旋转角度、缩放因子等数据。然而，它并不包含用于存储图像的变量。这种看似“遗漏”的设计实际上赋予了更大的灵活性，让你能够自行指定对象的呈现方式。你可以扩展
    `Actor` 类，并包含游戏中所需的任何额外信息，例如碰撞形状、一个或多个图像或动画、自定义渲染方法等。此类对象的构造函数应调用其所扩展类的构造函数；这通过包含
    `super()` 语句来实现。例如，一个仅需单个 `Texture` 的游戏对象可使用以下代码：


    ```

    public class TexturedActor extends Actor

    {

    private Texture image;

    // 构造函数

    public TexturedActor()

    {  super();  }

    public void setTexture(Texture t)

    {  image = t;  }

    public Texture getTexture()

    {  return image;  }

    public void draw(Batch b)

    {

    b.draw( getTexture(), getX(), getY() );

    }

    }

    ```


    举一个更复杂的例子，你的游戏可能包含一个具有生命值的角色，并且你可能希望根据角色剩余生命值使用不同的纹理。此类对象可通过以下代码创建：


    ```

    public class HealthyActor extends Actor

    {

    private int HP;

    private Texture healthyImage;

    private Texture damagedImage;

    private Texture deceasedImage;

    // 省略：构造函数

    // 省略：获取/设置前述字段的方法

    public void draw(Batch b)

    {

    if (HP > 50)

    b.draw( healthyImage, getX(), getY() );

    else if (HP > 0 && HP <= 50)

    b.draw( damagedImage, getX(), getY() );

    else    // 此情况下 HP <= 0

    b.draw( deceasedImage, getX(), getY() );

    }

    }

    ```


    这里还需要提及默认 `Actor` 类的几个额外特性。首先，除了 `draw` 方法外，`Actor` 类还有一个 `act` 方法，可用于更新或修改 `Actor`
    的状态。其次，`Actor` 类被设计为与名为 `Stage` 的类协同使用（你将在不久后用到它）。`Stage` 类的主要作用是存储一个 `Actor`
    实例列表；它还包含名为 `act` 和 `draw` 的方法，这些方法会调用已添加到舞台中的每个 `Actor` 的 `act` 和 `draw` 方法，从而免去你自行记住绘制每个
    `Actor` 实例的麻烦。`Stage` 类还会创建并管理一个 `Batch` 对象，这减少了你需要编写的代码量。


    下一个目标是编写 `Actor` 类的扩展；这需要访问并重写 `Actor` 类中已有的方法。


    重写方法与访问超类方法


    在 Java 中扩展类时，你可能需要用新版本的方法替换基类中的方法。例如，考虑一个表示人的类，其中包含一个模拟人打招呼的方法：


    ```

    public class Person

    {

    public void sayHello()

    {  System.out.print("你好。");  }

    // 其他方法省略

    }

    ```


    在你的项目中，你可能希望创建此类的扩展，保留 `sayHello` 方法，但更改打印的消息。为此，你只需编写一个具有相同签名的方法：相同的方法名、参数和输出类型。例如，你可以编写：


    ```

    public class Shopkeeper extends Person

    {

    public void sayHello()

    {  System.out.print("各位旅人，欢迎光临。需要什么补给吗？");  }

    }

    ```


    如果你创建了一个 `Shopkeeper` 实例，它将可以访问 `Person` 类中的所有字段和方法（因为 `Shopkeeper` 扩展了 `Person`
    类），但如果 `Shopkeeper` 实例调用了 `sayHello` 方法，则 `Shopkeeper` 类中的版本优先，并会被调用。这种技术称为重写方法。


    然而，在某些情况下，你希望基于被扩展类（有时称为超类）的代码进行构建（而非替换）。例如，再次假设你有一个表示人的类，它存储一个对应其生命值的值 (HP)，以及一个将其恢复至最大值的方法，如下所示：


    ```

    public class Person

    {

    int HP;

    int maxHP;

    public void restore()

    {

    HP = maxHP;

    }

    }

    ```


    你可能还有一个表示巫师的类，巫师是一种拥有魔法能力的人，因此有一个对应其可用魔法值 (MP) 的值。自然地，你会扩展 `Person` 类，而对于巫师来说，`restore`
    方法应将 HP 和 MP 都设置为其最大值。在这种情况下，你需要 `Wizard` 类重写 `Person` 类的 `restore` 方法，以添加与魔法相关的功能，同时你又希望
    `Wizard` 类也能运行 `Person` 类中的 `restore` 方法，以避免重新输入相应代码。实现这一目标的方法是使用关键字 `super`，它指向超类。在
    `Wizard` 类的上下文中，表达式 `restore()` 会激活 `Wizard` 类中的方法，而表达式 `super.restore()` 则会按预期激活
    `Person` 类中的方法。


    利用 `super`，`Wizard` 类可以编写如下：


    ```

    public class Wizard extends Person

    {

    int MP;

    int maxMP;

    public void restore()

    {

    super.restore();

    MP = maxMP;

    }

    }

    ```


    当你编写新类来扩展并构建其他类的功能和方法时，你将有机会反复使用这种技术。


    本章将创建的 `Actor` 类的扩展名为 `ActorBeta`。它将用于存储一个 `TextureRegion`（它构建于 `Texture` 类的功能之上）和一个
    `Rectangle`（用于检测两个对象之间的重叠）。在同一个 BlueJ 项目中，使用以下代码创建一个名为 `ActorBeta` 的新类：

    '
- fmt: "```java\nimport com.badlogic.gdx.scenes.scene2d.Actor;\nimport com.badlogic.gdx.graphics.Texture;\n\
    import com.badlogic.gdx.graphics.g2d.Batch;\nimport com.badlogic.gdx.graphics.g2d.TextureRegion;\n\
    import com.badlogic.gdx.graphics.Color;\nimport com.badlogic.gdx.math.Rectangle;\n\
    /**\n*  Extend the Actor class to include graphics and collision detection.\n\
    *  Actor class stores data such as position and rotation.\n*/\npublic class ActorBeta\
    \ extends Actor\n{\nprivate TextureRegion textureRegion;\nprivate Rectangle rectangle;\n\
    public ActorBeta()\n{\nsuper();\ntextureRegion = new TextureRegion();\nrectangle\
    \ = new Rectangle();\n}\npublic void setTexture(Texture t)\n{\ntextureRegion.setRegion(t);\n\
    setSize( t.getWidth(), t.getHeight() );\nrectangle.setSize( t.getWidth(), t.getHeight()\
    \ );\n}\npublic Rectangle getRectangle()\n{\nrectangle.setPosition( getX(), getY()\
    \ );\nreturn rectangle;\n}\npublic boolean overlaps(ActorBeta other)\n{\nreturn\
    \ this.getRectangle().overlaps( other.getRectangle() );\n}\npublic void act(float\
    \ dt)\n{\nsuper.act(dt);\n}\npublic void draw(Batch batch, float parentAlpha)\n\
    {\nsuper.draw( batch, parentAlpha );\nColor c = getColor(); // used to apply tint\
    \ color effect\nbatch.setColor(c.r, c.g, c.b, c.a);\nif ( isVisible() )\nbatch.draw(\
    \ textureRegion,\ngetX(), getY(), getOriginX(), getOriginY(),\ngetWidth(), getHeight(),\
    \ getScaleX(), getScaleY(), getRotation() );\n}\n}\n```\n\n以下是对此代码的一些观察：\n\n-\
    \ 你使用的是`TextureRegion`而非`Texture`来存储图像，这将在渲染图像时提供更大的灵活性。这两个类的主要区别在于：`TextureRegion`可用于存储包含多个图像或动画帧的`Texture`，并且`TextureRegion`还存储称为(u,v)坐标的坐标，这些坐标决定了要使用`Texture`的哪个矩形子区域。\n\
    - 在`ActorBeta`类的构造函数中，语句`super()`激活了超类（`Actor`）的构造函数，该构造函数初始化了该类使用的数据结构。\n- 在`setTexture`方法中，还需要设置actor和矩形的大小（基于纹理的宽度和高度），以便`draw`和`overlaps`方法能正常工作。\n\
    - 在`overlaps`方法中，关键字`this`用于指示调用该方法的对象实例。在这种情况下，它是为了清晰起见（以区别于作为方法参数的名为`other`的实例）；使用`this`并非严格必要，如果需要可以省略。\n\
    - `act`和`draw`方法都以调用相应的超类方法（`super.act`和`super.draw`）开头，这样即使这些方法在此类中被重写，其功能也不会丢失。\n\
    - 在`draw`方法中，如果已设置颜色（通过`setColor`方法），则可以在渲染图像时使用该颜色为图像着色，并且必须将其传递给负责实际渲染的`Batch`对象。（默认颜色为白色，对图像没有影响。）此外，`Batch`对象在渲染图像时可以利用`actor`对象中存储的数据（如位置、旋转和缩放因子），尽管此项目未使用大部分此类功能。\n\
    - 有时，你会希望编写这些类的更专门的扩展。对于此项目，turtle需要的功能比`ActorBeta`类提供的更多。特别是，turtle应根据当前按下的箭头键移动。为了遵循良好的面向对象设计实践（特别是封装），`StarfishCollectorAlpha`类的`update`方法中的相应代码将被移动到新的`Turtle`类的`act`方法中。另外，请注意`moveBy`方法（继承自`Actor`类）的使用，它按照与之前相同的方式（基于x和y坐标）调整turtle的位置。\n\
    \n接下来，你将在`ActorBeta`类的功能基础上进行构建。创建一个名为`Turtle`的新类，代码如下：\n\n- 输入此代码后，你可以编译它以检查所有内容是否正确输入。接下来，你将创建Starfish\
    \ Collector游戏源代码的新版本。创建一个名为`StarfishCollectorBeta`的新类；它将全程使用新的`ActorBeta`类。与alpha版本的类相比，有一些变化。特别是：\n\
    \    - 将创建一个`Stage`对象，并将`Actor`对象添加到其中。此外，必须调用`Stage`的`act`和`draw`方法（回想一下，在`Stage`上调用`act`和`draw`方法会导致`Stage`对象调用已添加到其中的所有`Actor`对象的`act`和`draw`方法）。\n\
    - actor添加到`Stage`的顺序很重要，就像在alpha版本的程序中使用`Batch`对象时`draw`语句的顺序很重要一样。首先添加到`Stage`的`Actor`对象将首先被绘制，因此会出现在稍后添加的对象下方。因此，背景应首先添加，而用户界面元素（如文本显示）应最后添加。\n\
    - `winMessage`的初始可见性设置为`false`，因为玩家在赢得游戏之前不应看到该特定图像。\n- `act`方法需要一个输入：自游戏循环上一次迭代以来经过的时间（以秒为单位）。由于LibGDX中的游戏默认情况下尽可能以每秒60帧运行，我们为此值使用了1/60。（实际上，游戏循环每次迭代所需的时间可能会波动，并且有方法可以获得精确值，但此处不需要。）\n\
