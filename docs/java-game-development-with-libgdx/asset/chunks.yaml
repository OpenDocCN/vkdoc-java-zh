- fmt: "### Redesigning the Window Layout\n\nTo begin, make another copy of your `Starfish\
    \ Collector` project from Chapter [5](#A352797_2_En_5_Chapter.html) and rename\
    \ this one to `Starfish Collector Touchscreen`. Download the source code for this\
    \ project from the book’s website and copy the contents of the downloaded project’s\
    \ `assets` folder into your new project’s `assets` folder. In particular, there\
    \ are three new images, corresponding to the additions seen in Figure [13-4](#A352797_2_En_13_Chapter.html#Fig4).\
    \ (You do not need to copy the contents of the `+libs` folder; unlike the gamepad\
    \ project from the first half of this chapter, there are no new JAR files required.)\n\
    \nYour first goal will be to reconfigure where the stages will be displayed on\
    \ the screen and to add a new stage and table to contain the touch controls. You\
    \ will need to resize the `LevelScreen` window to 800 by 800 pixels, reserving\
    \ the lower 800 by 200 pixels for the touch controls, but to minimize the number\
    \ of changes you need to make, you will keep the other screens at their original\
    \ size. In addition, you will want to render the game world in an 800 by 600 region,\
    \ with its lower-left corner starting at the point (0, 200); this rendering area\
    \ can be set using a method called `glViewport`, as you will see later. As a first\
    \ step, in the `BaseScreen` class, you need to set the size of the main and user\
    \ interface stages using a `FitViewport` object, for otherwise they will default\
    \ to the size of the entire window (which has been acceptable for previous projects,\
    \ but will not be for this project). In the `BaseScreen` class, add the following\
    \ `import` statement:\n\n```\nimport com.badlogic.gdx.utils.viewport.FitViewport;\n\
    ```\n\nIn the `BaseScreen` constructor, change the lines of code that initialize\
    \ the `mainStage` and `uiStage` objects to the following:\n\n```\nmainStage =\
    \ new Stage( new FitViewport(800,600) );\nuiStage = new Stage( new FitViewport(800,600)\
    \ );\n```\n\nNext, you need to create the stage and table for the controls and\
    \ determine where everything will be rendered. As in the previous project, you\
    \ will create an extension of the `BaseScreen` class, called `BaseTouchScreen`,\
    \ which incorporates these new elements and overrides the `render` method. Unlike\
    \ the `BaseScreen` class, however, you will not initialize the stage and table\
    \ in the `BaseTouchScreen` constructor method. This is because the `BaseTouchScreen`\
    \ constructor immediately and automatically calls the `BaseScreen` constructor,\
    \ which in turn calls the `initialize` method (which is where you will add components\
    \ to the stage and table), and only after this does the program flow return to\
    \ execute the rest of the code in the `BaseTouchScreen` constructor. Due to this\
    \ unavoidable order of execution, you will create a separate method called `initializeControlArea`\
    \ that sets up the stage and table that will contain the controls, and you will\
    \ call this method from the `initialize` method in the `LevelScreen` class. You\
    \ also need to make sure that the new stage is able to process discrete input\
    \ by adding it to and removing it from the game’s `InputMultiplexer` at the appropriate\
    \ times, which takes place in the `show` and `hide` methods. In addition, to avoid\
    \ the complexity of translating touch/mouse coordinates to viewport coordinates,\
    \ the stage containing the controls will be the same height as the window, even\
    \ though only the lower 200 pixels will be used. To implement these features,\
    \ create a new class called `BaseTouchScreen` with the following code:\n\n```\n\
    import com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
    import com.badlogic.gdx.scenes.scene2d.ui.Table;\nimport com.badlogic.gdx.InputMultiplexer;\n\
    import com.badlogic.gdx.utils.viewport.FitViewport;\npublic abstract class BaseTouchScreen\
    \ extends BaseScreen\n{\n    protected Stage controlStage;\n    protected Table\
    \ controlTable;\n    public BaseTouchScreen()\n    {\n        super();\n    }\n\
    \    // run this method during initialize\n    public void initializeControlArea()\n\
    \    {\n        controlStage = new Stage( new FitViewport(800,800) );\n      \
    \  controlTable = new Table();\n        controlTable.setFillParent(true);\n  \
    \      controlStage.addActor(controlTable);\n    }\n    public void show()\n \
    \   {\n        super.show();\n        InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();\n\
    \        im.addProcessor(controlStage);\n    }\n    public void hide()\n    {\n\
    \        super.hide();\n        InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();\n\
    \        im.removeProcessor(controlStage);\n    }\n    public void render(float\
    \ dt)\n    {\n        // act methods\n        uiStage.act(dt);\n        mainStage.act(dt);\n\
    \        controlStage.act(dt);\n        // defined by user\n        update(dt);\n\
    \        // clear the screen\n        Gdx.gl.glClearColor(0,0,0,1);\n        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\
    \        // set the drawing regions and draw the graphics\n        Gdx.gl.glViewport(0,200,\
    \ 800,600);\n        mainStage.draw();\n        uiStage.draw();\n        Gdx.gl.glViewport(0,0,\
    \ 800,800);\n        controlStage.draw();\n    }\n}\n```\n\nThe next steps are\
    \ to add a joystick-like control, represented by the `Touchpad` class, and move\
    \ the Reset button to `controlStage`, which is covered in the following section."
  raw: '### Redesigning the Window Layout


    To begin, make another copy of your `Starfish Collector` project from Chapter
    [5](#A352797_2_En_5_Chapter.html) and rename this one to `Starfish Collector Touchscreen`.
    Download the source code for this project from the book’s website and copy the
    contents of the downloaded project’s `assets` folder into your new project’s `assets`
    folder. In particular, there are three new images, corresponding to the additions
    seen in Figure [13-4](#A352797_2_En_13_Chapter.html#Fig4). (You do not need to
    copy the contents of the `+libs` folder; unlike the gamepad project from the first
    half of this chapter, there are no new JAR files required.)


    Your first goal will be to reconfigure where the stages will be displayed on the
    screen and to add a new stage and table to contain the touch controls. You will
    need to resize the `LevelScreen` window to 800 by 800 pixels, reserving the lower
    800 by 200 pixels for the touch controls, but to minimize the number of changes
    you need to make, you will keep the other screens at their original size. In addition,
    you will want to render the game world in an 800 by 600 region, with its lower-left
    corner starting at the point (0, 200); this rendering area can be set using a
    method called `glViewport`, as you will see later. As a first step, in the `BaseScreen`
    class, you need to set the size of the main and user interface stages using a
    `FitViewport` object, for otherwise they will default to the size of the entire
    window (which has been acceptable for previous projects, but will not be for this
    project). In the `BaseScreen` class, add the following `import` statement:


    ```

    import com.badlogic.gdx.utils.viewport.FitViewport;

    ```


    In the `BaseScreen` constructor, change the lines of code that initialize the
    `mainStage` and `uiStage` objects to the following:


    ```

    mainStage = new Stage( new FitViewport(800,600) );

    uiStage = new Stage( new FitViewport(800,600) );

    ```


    Next, you need to create the stage and table for the controls and determine where
    everything will be rendered. As in the previous project, you will create an extension
    of the `BaseScreen` class, called `BaseTouchScreen`, which incorporates these
    new elements and overrides the `render` method. Unlike the `BaseScreen` class,
    however, you will not initialize the stage and table in the `BaseTouchScreen constructor`
    method. This is because the `BaseTouchScreen` constructor immediately and automatically
    calls the `BaseScreen` constructor, which in turn calls the `initialize` method
    (which is where you will add components to the stage and table), and only after
    this does the program flow return to execute the rest of the code in the `BaseTouchScreen`
    constructor. Due to this unavoidable order of execution, you will create a separate
    method called `initializeControlArea` that sets up the stage and table that will
    contain the controls, and you will call this method from the `initialize` method
    in the `LevelScreen` class. You also need to make sure that the new stage is able
    to process discrete input by adding it to and removing it from the game’s `InputMultiplexer`
    at the appropriate times, which takes place in the `show` and `hide` methods.
    In addition, to avoid the complexity of translating touch/mouse coordinates to
    viewport coordinates, the stage containing the controls will be the same height
    as the window, even though only the lower 200 pixels will be used. To implement
    these features, create a new class called `BaseTouchScreen` with the following
    code:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.ui.Table;

    import com.badlogic.gdx.InputMultiplexer;

    import com.badlogic.gdx.utils.viewport.FitViewport;

    public abstract class BaseTouchScreen extends BaseScreen

    {

    protected Stage controlStage;

    protected Table controlTable;

    public BaseTouchScreen()

    {

    super();

    }

    // run this method during initialize

    public void initializeControlArea()

    {

    controlStage = new Stage( new FitViewport(800,800) );

    controlTable = new Table();

    controlTable.setFillParent(true);

    controlStage.addActor(controlTable);

    }

    public void show()

    {

    super.show();

    InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();

    im.addProcessor(controlStage);

    }

    public void hide()

    {

    super.hide();

    InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();

    im.removeProcessor(controlStage);

    }

    public void render(float dt)

    {

    // act methods

    uiStage.act(dt);

    mainStage.act(dt);

    controlStage.act(dt);

    // defined by user

    update(dt);

    // clear the screen

    Gdx.gl.glClearColor(0,0,0,1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    // set the drawing regions and draw the graphics

    Gdx.gl.glViewport(0,200, 800,600);

    mainStage.draw();

    uiStage.draw();

    Gdx.gl.glViewport(0,0, 800,800);

    controlStage.draw();

    }

    }

    ```


    The next steps are to add a joystick-like control, represented by the `Touchpad`
    class, and move the Reset button to `controlStage`, which is covered in the following
    section.'
  trans: '

    ### 重新设计窗口布局


    首先，复制一份第 5 章的 `Starfish Collector` 项目，并将其重命名为 `Starfish Collector Touchscreen`。从本书网站下载该项目的源代码，并将下载项目
    `assets` 文件夹中的内容复制到新项目的 `assets` 文件夹中。具体来说，有三个新图像，对应图 13-4 中新增的内容。（你无需复制 `+libs`
    文件夹的内容；与本章前半部分的游戏手柄项目不同，这里不需要新的 JAR 文件。）


    你的首要目标是重新配置舞台在屏幕上的显示位置，并新增一个舞台和表格来容纳触摸控件。你需要将 `LevelScreen` 窗口的大小调整为 800×800 像素，将下方
    800×200 像素的区域保留给触摸控件。但为了尽量减少需要修改的内容，其他屏幕将保持原始尺寸。此外，你还需要在 800×600 的区域中渲染游戏世界，其左下角位于点
    (0, 200)；这个渲染区域可以通过一个名为 `glViewport` 的方法来设置，稍后你将看到具体用法。第一步，在 `BaseScreen` 类中，你需要使用
    `FitViewport` 对象来设置主舞台和用户界面舞台的大小，否则它们将默认为整个窗口的大小（这在之前的项目中是可以接受的，但本项目不行）。在 `BaseScreen`
    类中，添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.utils.viewport.FitViewport;

    ```


    在 `BaseScreen` 构造函数中，将初始化 `mainStage` 和 `uiStage` 对象的代码行修改为以下内容：


    ```

    mainStage = new Stage( new FitViewport(800,600) );

    uiStage = new Stage( new FitViewport(800,600) );

    ```


    接下来，你需要为控件创建舞台和表格，并确定所有内容的渲染位置。与上一个项目类似，你将创建一个 `BaseScreen` 类的扩展，名为 `BaseTouchScreen`，它整合了这些新元素并重写了
    `render` 方法。但与 `BaseScreen` 类不同的是，你不会在 `BaseTouchScreen` 构造函数中初始化舞台和表格。这是因为 `BaseTouchScreen`
    构造函数会立即自动调用 `BaseScreen` 构造函数，而后者又会调用 `initialize` 方法（你将在其中向舞台和表格添加组件），只有在此之后，程序流程才会返回执行
    `BaseTouchScreen` 构造函数中的其余代码。由于这种不可避免的执行顺序，你将创建一个名为 `initializeControlArea` 的独立方法，用于设置包含控件的舞台和表格，并在
    `LevelScreen` 类的 `initialize` 方法中调用此方法。你还需要确保新舞台能够在适当的时候通过游戏中的 `InputMultiplexer`
    添加和移除自身，从而处理离散输入，这将在 `show` 和 `hide` 方法中完成。此外，为了避免将触摸/鼠标坐标转换为视口坐标的复杂性，包含控件的舞台将与窗口高度相同，尽管实际只会使用下方
    200 像素的区域。为了实现这些功能，创建一个名为 `BaseTouchScreen` 的新类，代码如下：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.ui.Table;

    import com.badlogic.gdx.InputMultiplexer;

    import com.badlogic.gdx.utils.viewport.FitViewport;

    public abstract class BaseTouchScreen extends BaseScreen

    {

    protected Stage controlStage;

    protected Table controlTable;

    public BaseTouchScreen()

    {

    super();

    }

    // 在 initialize 期间运行此方法

    public void initializeControlArea()

    {

    controlStage = new Stage( new FitViewport(800,800) );

    controlTable = new Table();

    controlTable.setFillParent(true);

    controlStage.addActor(controlTable);

    }

    public void show()

    {

    super.show();

    InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();

    im.addProcessor(controlStage);

    }

    public void hide()

    {

    super.hide();

    InputMultiplexer im = (InputMultiplexer)Gdx.input.getInputProcessor();

    im.removeProcessor(controlStage);

    }

    public void render(float dt)

    {

    // act 方法

    uiStage.act(dt);

    mainStage.act(dt);

    controlStage.act(dt);

    // 由用户定义

    update(dt);

    // 清除屏幕

    Gdx.gl.glClearColor(0,0,0,1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    // 设置绘制区域并绘制图形

    Gdx.gl.glViewport(0,200, 800,600);

    mainStage.draw();

    uiStage.draw();

    Gdx.gl.glViewport(0,0, 800,800);

    controlStage.draw();

    }

    }

    ```


    接下来的步骤是添加一个类似摇杆的控件（由 `Touchpad` 类表示），并将“重置”按钮移动到 `controlStage` 中，这将在下一节中介绍。

    '
- fmt: '### Working with a Touchpad


    `Touchpad` objects are rendered using two images: one representing the background,
    and the other representing the knob. The user can touch (or click) the knob and
    drag it off-center; its movement is constrained to a circular area contained within
    the rectangular region defined by the background image.


    These objects require two parameters to be initialized. First, you supply a value
    for the deadzone radius — the minimal distance (in pixels) the knob must be dragged
    in order for any change to register. (This is the same deadzone concept as was
    discussed earlier in the gamepad section of this chapter.) This is useful for
    situations when the player wants to leave a finger on the touchpad but also wants
    the character to remain still. Without a deadzone setting, the controls would
    be too sensitive for this to be possible. It is unlikely that the average player
    would have pixel-perfect finger positioning to keep the knob exactly centered,
    and the result would be unwanted (and possibly player-frustrating) drift of the
    character being controlled.


    Second, the images used in a `Touchpad` object are stored in a `TouchpadStyle`
    object, which contains two images, both stored as `Drawable` objects, as is standard
    for UI elements in LibGDX; you encountered this situation before when creating
    the image for the Restart button object. As before, you will load each image into
    a `Texture` object then convert it to a `TextureRegion` and then a `TextureRegionDrawable`.


    To begin these additions, in the `LevelScreen` class, change the class declaration
    so that it extends your newly created `BaseTouchScreen` class instead of `BaseScreen`
    as follows:


    ```

    public class LevelScreen extends BaseTouchScreen

    ```


    Then, add the following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad;

    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad.TouchpadStyle;

    import com.badlogic.gdx.math.Vector2;

    ```


    Also, add the following variable declaration:


    ```

    private Touchpad touchpad;

    ```


    Then, in the `initialize` method, add the following code to change the size of
    the window, activate the function that sets up the control stage and table, and
    add a background image:


    ```

    Gdx.graphics.setWindowedMode(800,800);

    initializeControlArea();

    BaseActor controlBackground = new BaseActor(0,0, controlStage);

    controlBackground.loadTexture("assets/pixels.jpg");

    ```


    After this, add the following code to set up the `Touchpad` object, with a deadzone
    radius of 5 pixels:


    ```

    TouchpadStyle touchStyle = new TouchpadStyle();

    Texture padKnobTex = new Texture(Gdx.files.internal("assets/joystick-knob.png"));

    TextureRegion padKnobReg = new TextureRegion(padKnobTex);

    touchStyle.knob = new TextureRegionDrawable(padKnobReg);

    Texture padBackTex = new Texture(Gdx.files.internal("assets/joystick-background.png"));

    TextureRegion padBackReg = new TextureRegion(padBackTex);

    touchStyle.background = new TextureRegionDrawable(padBackReg);

    touchpad = new Touchpad(5, touchStyle);

    ```


    Next, add the touchpad and the Restart button to `controlTable` as follows. Note
    the addition of an empty row with height 600, which is used to keep the controls
    in the lower 200 pixels of the window (which has height 800).


    ```

    controlTable.toFront();

    controlTable.pad(50);

    controlTable.add().colspan(3).height(600);

    controlTable.row();

    controlTable.add(touchpad);

    controlTable.add().expandX();

    controlTable.add(restartButton);

    ```


    Now, in order to make use of the touchpad data, in the `update` method, add the
    following code, which stores the touchpad knob displacement data in a vector,
    using the length of the vector to set the turtle’s speed to a percentage of its
    maximum speed (100 pixels/second) and the angle of the vector to set the turtle’s
    direction of motion. This code is similar to the code from the earlier section
    on gamepad controllers, except that the `Touchpad` class itself handles the deadzone
    calculation, so it does not appear in the comparison here:


    ```

    Vector2 direction = new Vector2( touchpad.getKnobPercentX(), touchpad.getKnobPercentY()
    );

    float length = direction.len();

    if ( length > 0 )

    {

    turtle.setSpeed( 100 * length );

    turtle.setMotionAngle( direction.angle() );

    }

    ```


