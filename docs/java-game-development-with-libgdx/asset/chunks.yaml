- fmt: '### Synchronizing Game Objects and Audio


    The next goal is to add the ability to play a music file and use the data stored
    in the associated text file to generate a sequence of `FallingBox` objects, which
    will overlap the corresponding `TargetBox` objects at the point in time specified
    by the song. This application will assume a “lead time” of three seconds: the
    song will start playing three seconds after a Start button is clicked, and `FallingBox`
    objects will be created above the top edge of the screen three seconds before
    the time specified by the song data file so that they overlap their target at
    the correct time. To coordinate the timing of these events, a float variable named
    `advanceTimer` will be created and incremented only after the song data is loaded;
    after three seconds have passed, the music will start to play, and from that point
    on, `advanceTimer` will be set to the music position plus three seconds. The `advanceTimer`
    variable will then be used to determine when to create the `FallingBox` objects.


    To begin, add the following `import` statements to the `RhythmScreen` class:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.audio.Music;

    import com.badlogic.gdx.files.FileHandle;

    import com.badlogic.gdx.scenes.scene2d.ui.TextButton;

    import com.badlogic.gdx.scenes.scene2d.Event;

    ```


    Next, add the following variables to the class:


    ```

    private Music gameMusic;

    private SongData songData;

    private final float leadTime = 3;

    private float advanceTimer;

    private float spawnHeight;

    private float noteSpeed;

    ```


    Add the following code to the `initialize` method. Note that `spawnHeight` is
    set to `650` so that the falling boxes start above the top edge of the screen
    (which has a height of 600), and `noteSpeed` is calculated by dividing the total
    distance the falling boxes have to travel to reach the target boxes by the time
    they have to get there (`leadTime`). The following code uses a song data file
    (`FunkyJunky.key`) that has been provided for you, but if you created a different
    song data file, you can feel free to use it instead.


    ```

    advanceTimer = 0;

    spawnHeight = 650;

    noteSpeed = ( spawnHeight - targetList.get(0).getY() ) / leadTime;

    TextButton startButton = new TextButton( "Start", BaseGame.textButtonStyle );

    startButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    FileHandle dataFileHandle = Gdx.files.internal("assets/FunkyJunky.key");

    songData = new SongData();

    songData.readFromFile( dataFileHandle );

    songData.resetIndex();

    FileHandle songFileHandle = Gdx.files.internal("assets/" + songData.getSongName());

    gameMusic = Gdx.audio.newMusic( songFileHandle );

    startButton.setVisible(false);

    return true;

    }

    );

    uiTable.add(startButton);

    ```


    Next, add the following code to the `update` method. Note that if `songData` has
    not yet been loaded, then the `update` method returns right away. Otherwise, the
    value of `advanceTimer` is increased as previously described, and the music is
    played if `advanceTimer` becomes greater than three. If the value of `advanceTimer`
    increases past the next time stored by the `songData` object, then a `FallingBox`
    object is created and configured as necessary, and the internal `songData` index
    is advanced to the next position. A `while` loop is used rather than an `if` statement
    in case multiple `FallingBox` objects need to be created during this call to the
    `update` method.


    ```

    if (songData == null)

    return;

    if (advanceTimer  leadTime)

    gameMusic.play();

    if (advanceTimer = songData.getCurrentKeyTime().getTime() )

    {

    String key = songData.getCurrentKeyTime().getKey();

    int i = keyList.indexOf(key);

    FallingBox fb = new FallingBox(targetList.get(i).getX(), spawnHeight, mainStage);

    fb.setSpeed( noteSpeed );

    fb.setMotionAngle( 270 );

    fb.setColor( colorList.get(i) );

    fallingLists.get(i).add(fb);

    songData.advanceIndex();

    }

    ```


    At this point, if you run the program and click on the Start button, you should
    hear silence for three seconds, during which some falling boxes will appear, and
    then the music will begin and the falling boxes should align with the target boxes
    in time with the music as expected.'
