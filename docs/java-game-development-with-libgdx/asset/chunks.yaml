    ## 物理与运动


    本章开头提出的问题之一是，在上一章的《海星收集者》版本中，移动并不“平滑”：海龟的速度会瞬间从 0 变为每秒 60 像素。在现实中，速度是随时间变化的；物体会加速和减速。在本节中，你将学习一些物理学中的技术术语和概念，以及如何在
    `BaseActor` 类中实现它们，这将使你能够为游戏添加移动功能。虽然你无需掌握底层数学概念也能创建本书中的游戏，但书中仍会提供详细解释，以便你理解所编写的代码。


    ### 速度


    物体的速度表示其位置随时间变化的快慢，包括移动的速率和方向。正如位置使用两个值¹——x 和 y 坐标——来指定一样，速度也有两个分量，分别表示每个坐标的变化情况。如果位置的度量单位是像素，时间的单位是秒，那么速度的度量单位就是像素每秒，通常写作
    pixels/second。在数学中，速度通常使用向量符号表示：分量 a 和 b 的向量用尖括号写作 < a , b >。相比之下，坐标为 x 和 y 的位置通常用圆括号写作
    ( x , y )。向量在视觉上用箭头表示；向量 < a , b > 的绘制方式是从起点开始，终点位于水平方向 a 个单位、垂直方向 b 个单位处，如图 3-6
    所示。速率可以视为该向量的长度（也称为模），图中用 S 表示。向量的方向由向量与水平向右（沿 x 轴正方向）的向量之间的夹角量化，图中用 A 表示。给定 a
    和 b 的值，可以使用数学方法（分别利用勾股定理和三角函数）计算长度和方向角，但得益于 LibGDX 的 `Vector2` 类提供的方法（分别使用 `len`
    和 `angle` 方法），你无需自行编写这些公式。


    ![A352797_2_En_3_Fig6_HTML.jpg](img/A352797_2_En_3_Fig6_HTML.jpg)


    图 3-6.


    向量 < a , b > 的可视化表示，长度为 S，方向角为 A


    涉及位置和速度的计算相对简单。例如，如果一个物体的初始位置为 ( 7 , 5 )，速度为 < 2 , 3 >，那么：


    *   经过一秒后，位置变为 ( 7 + 2 , 5 + 3 ) = ( 9 , 8 )。

    *   经过两秒后，位置变为 ( 9 + 2 , 8 + 3 ) = ( 11 , 11 )。

    *   经过三秒后，位置变为 ( 11 + 2, 11 + 3 ) = ( 13 , 14 )。


    一般来说，如果初始位置为 ( x , y )，速度为 < a , b >，那么经过 t 秒后，位置的公式为 ( x + t*a , y + t*b )。该公式同样适用于
    t 为分数的情况。


    为了将速度数据整合到 `BaseActor` 类中，请添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.math.Vector2;

    import com.badlogic.gdx.math.MathUtils;

    ```


    然后，在类中添加以下字段：


    ```

    private Vector2 velocityVec ;

    ```


    通过在 `constructor` 方法中添加以下语句来初始化该变量：


    ```

    velocityVec = new Vector2(0,0);

    ```


    接下来，你将添加方法来设置和获取 `Actor` 对象的移动速率和角度。需要考虑的一个微妙问题是，当速度向量为 < 0 , 0 >（对应速率为 0 且移动角度未定义）时，应如何设置速率或角度。在这种情况下，设置速率会使移动角度变为零度（沿
    x 轴正方向），而设置角度则不会产生任何效果（因为如果物体速率为 0，那么谈论其朝任何方向移动都没有意义）。这些方法的代码如下：


    ```

    public void setSpeed(float speed)

    {

    // 如果长度为零，则假定移动角度为零度

    if (velocityVec.len() == 0)

    velocityVec.set(speed, 0);

    else

    velocityVec.setLength(speed);

    }

    public float getSpeed()

    {

    return velocityVec.len();

    }

    public void setMotionAngle(float angle)

    {

    velocityVec.setAngle(angle);

    }

    public float getMotionAngle()

    {

    return velocityVec.angle();

    }

    ```


    `getMotionAngle` 方法特别方便，可用于使物体面向其移动方向，这可以通过在 `Actor` 的 `act` 方法中添加代码 `setRotation(
    getMotionAngle() )` 来实现。在某些游戏中，你可能需要知道 `Actor` 是否在移动（或静止）；为此，请在 `BaseActor` 类中同时包含以下方法：


    ```

