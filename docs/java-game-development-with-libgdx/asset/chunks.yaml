    When using three values to represent the rotations of an object around three axes,
    gimbal lock refers to the problem that occurs when an object is in one of a few
    particular orientations and two axes of rotation line up, making it impossible
    for the object to rotate in certain ways while in the given orientation.


      [3](#A352797_2_En_16_Chapter.html#Fn3_source)


    In theory, this choice of the y-axis as the “up” direction is somewhat arbitrary,
    as you could orient yourself in the game world so that any axis corresponds to
    the up direction.


      [4](#A352797_2_En_16_Chapter.html#Fn4_source)


    The amount of rotation around the upward-pointing axis is also called the yaw
    angle . Similarly, the rotation around the sideways-pointing axis (the motion
    from tilting your head up and down) is called the pitch angle , and the rotation
    around the forward-pointing axis (the motion from tilting your head to the left
    and to the right) is called the roll angle .


      [5](#A352797_2_En_16_Chapter.html#Fn5_source)


    Technically, a sphere has only one radius value; the figures created by the `createSphere`
    method are more accurately referred to as ellipsoids . However, in the class you
    are creating, all the radius values will be set to the same number, so it truly
    is a spherical object.


    # 17. The Journey Continues


    This final chapter will present a variety of steps to consider as you continue
    on in game development. Among these, you’ll explore working on additional projects,
    learning skills in related areas, and bringing your games to a wider audience.
    Along the way, the chapter will present lists of resources of all types, as well
    as general advice for many situations.


