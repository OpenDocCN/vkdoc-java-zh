    public void wrapAroundWorld()

    {

    if (getX() + getWidth()  worldBounds.width)

    setX( -getWidth());

    if (getY() + getHeight()  worldBounds.height)

    setY( -getHeight() );

    }

    ```


    Note that this method requires the `worldBounds` object to be set in order to
    work correctly. With this method in place, add the following line of code to the
    `Spaceship` class at the end of the `act` method :


    ```

    wrapAroundWorld();

    ```


