    ## 附录 B：Java 基础回顾


    本附录将简要回顾您应熟悉的 Java 核心概念，以便理解本书所介绍的内容。这并不是一份完整的 Java 编程入门指南，因此，如果您对其中某些主题不熟悉，建议查阅
    Java 教科书或教程系列 ³ 以了解更多相关内容。


    ### 数据类型与运算符


    首先，我们来列举 Java 中可用的一些基本（或称原始）数据类型：


    *   `int`：整数（没有小数部分的数字）

    *   `float`：小数值

    *   `double`：小数值，存储精度为 float 的两倍

    *   `char`：单个字符（字母、数字或符号）

    *   `boolean`：布尔值 true 或 false


    另一种常用的数据类型是 `String`，它表示文本：一组字符。严格来说，这不是一种原始数据类型，但可以用类似的方式进行初始化。


    Java 也使用常见的二元算术运算符：加法、减法、乘法、除法（对于整数而言是求商）和取余，分别由符号 `+`、`-`、`*`、`/` 和 `%` 表示。当与两个相同类型的值一起使用时，结果也将是同一类型。例如，`5.0/2.0`
    的值是 `2.5`，而 `5/2` 的值是 `2`。结果之所以不同，是因为在第一个示例中，值的类型是 `double`，而在第二个示例中，值的类型是 `int`。


    当执行涉及两种类型值的算术运算时，这些值将被转换（或称强制转换）为更复杂的类型。例如，`5.0/2` 的结果是 `2.5`。如果需要，可以通过在值前面加上括号中的目标类型名称，手动将一种类型的数值强制转换为另一种类型。例如，`(double)2`
    产生值 `2.0`，而 `(int)2.5` 产生值 `2`。（当强制转换为 `int` 时，该值总是向下舍入到最接近的整数值。）


    原始变量可以通过一行代码进行声明和初始化，语法如下：


    ```

    variableType variableName = initialValue;

    ```


    或者，这些操作也可以分步执行：


    ```

    variableType variableName;

    variableName = initialValue;

    ```


    除了使用 `=` 为变量赋值外，Java 还提供了赋值运算符（为简洁起见），这些运算符通过一个常量值来修改变量的值。例如，语句 `x = x + 5` 可以替换为语句
    `x += 5`。其他算术运算都有对应的赋值运算符：`-=`、`*=`、`/=` 和 `%=`。


    数值可以使用条件运算符进行比较：`==` 表示等于，`!=` 表示不等于，`<` 表示小于，`<=` 表示小于等于，`>` 表示大于，`>=` 表示大于等于。比较的结果是一个布尔值——`true`
    或 `false`——如果需要，可以将其存储在布尔变量中。布尔值可以使用布尔运算符进行组合：`&&` 表示“与”，`||` 表示“或”，`!` 表示“非”。


    数组是一个包含固定数量相同类型值的对象。数组的长度在创建时设定。数组中的值可以在创建时初始化（并且大小将被推断出来）。例如，以下代码创建了一个包含五个字符的数组：


    ```

    char[] letters = { ''g'' , ''a'' , ''m'' , ''e'' , ''s'' } ;

    ```


    或者，可以仅指定长度来创建数组，如下所示，该数组将包含十个整数（并且可以在稍后设置值）：


    ```

    int[] values = new int[10];

    ```


    数组中的项通过其位置（或称索引）来访问，索引从数字 `0` 开始。例如，对于前面名为 `letters` 的数组，表达式 `letters[0]` 产生值
    `''g''`，`letters[1]` 产生 `''a''`，依此类推，直到 `letters[4]` 产生 `''s''`。请注意，该数组的长度为 5，但位置编号为
    0 到 4。（这通常是成立的；长度为 n 的数组的索引编号为 0 到 n – 1。）请注意，一旦创建了数组，其大小就不能更改；尝试在数组中不存在的索引位置存储值将导致程序运行时出错。


    ### 控制结构


    Java 程序中的语句通常按顺序一条接一条地执行。控制结构可以改变执行顺序，要么仅当满足某些条件时才运行某些语句，要么重复执行一组给定的语句。


    #### 条件语句


    `if` 语句用于指定仅当某个条件（或条件组合，或布尔表达式）求值为 true 时，才应运行特定的一组语句。例如，以下代码仅当 `time` 的值大于 `60`
    时，才会将 `100` 加到变量 `bonus` 上；如果 `time` 的值不大于 `60`，则大括号内的代码将不会执行。


    ```

    if (time > 60)

    {

    bonus += 100;

    }

    ```


    大括号内可以包含任意数量的语句。但是，如果大括号内只包含一条语句，则可以省略大括号，代码将产生相同的结果，如下所示：


    ```

    if (time > 60)

    bonus += 100;

    ```


    当需要提供一组备选语句，在相关条件求值为 `false` 时执行时，可以使用 `if-else` 语句。以下代码基于前面的示例进行了扩展，增加了这样的行为：如果
    `time` 的值不大于 `60`，则 `bonus` 的值将增加 `50`。


    ```

    if (time > 60)

    {

    bonus += 100;

    }

    else

    {

    bonus += 50;

    }

    ```


    有时，您可能希望针对一组值测试变量是否相等，并在每种情况下执行不同的语句集。例如，考虑以下代码，它根据 `itemCount` 的值是等于 `0`、`1`、`2`
    还是其他值来打印一条消息。


    ```

    if (itemCount == 0)

    System.out.print("You have no items.");

    else if (itemCount == 1)

    System.out.print("You have a single item.");

    else if (itemCount == 2)

    System.out.print("You have two items.");

    else

    System.out.print("You have many items!");

    ```


    `switch` 语句提供了编写此类代码的另一种方式（通常更易于阅读）。以下代码包含一个 `switch` 语句，其效果与前面介绍的 `if-else` 语句完全相同。`if-else`
    语句中的每个值比较都对应于 `switch` 代码块中的 `case` 关键字，而最后的 `else` 语句则对应于 `default` 关键字。在列出针对某个
    case 要执行的语句集之后，必须包含一个 `break` 语句（否则，无论变量是否等于所呈现的值，后续 case 对应的语句也会被执行）。


    ```

    switch (itemCount)

    {

    case 0:

    System.out.print("You have no items.");

    break;

    case 1:

    System.out.print("You have a single item.");

    break;

    case 2:

    System.out.print("You have two items.");

    break;

    default:

    System.out.print("You have many items!");

    }

    ```

