    你将实现的第一个方法是 `hallway` 方法。你会注意到，每个特定地点的方法都以设置正确的背景动画、淡入背景、将 Kelsoe 移动到屏幕中央以及使对话框可见开始。此外，这些方法通常以使对话框不可见、将
    Kelsoe 移出屏幕以及淡出背景结束。在此方法的末尾，为了自动推进到下一个区域，你需要调用 `classroom` 方法。这可以通过 `RunnableAction`
    实现，它接受一个 `Runnable` 对象作为参数。由于 `Runnable` 是一个函数式接口，你将为此动作的参数使用 lambda 表达式。具体来说，这个表达式将是
    `() -> { classroom(); }`，表示没有参数，并且应该调用 `classroom` 方法。将以下代码添加到 `hallway` 方法中：


