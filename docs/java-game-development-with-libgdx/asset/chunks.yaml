  raw: "## Game Project: Jumping Jack\n\nJumping Jack is an action game where the\
    \ character, Jack the Koala, jumps around a level collecting as many coins as\
    \ possible; he must reach the goal flag before time runs out. Collecting timer\
    \ objects gives the koala more time to explore. Some of the surfaces in the game\
    \ are jump-through platforms, which behave like solid objects except that the\
    \ koala can jump up through them from below and land on top, or fall down through\
    \ the platforms from above. There are also springboard objects, which launch the\
    \ koala high into the sky if he lands on them from above. Finally, there are lock\
    \ blocks, which may come in many colors and are impassable until the koala collects\
    \ the key of the same color.\n\nThe player uses the left and right arrow keys\
    \ to walk back and forth and the spacebar key to jump (when the koala is standing\
    \ on a solid object). The koala will automatically jump up through a platform\
    \ from below, but to fall down through a platform, the player must hold the down\
    \ arrow key while pressing the key to jump. The user interface displays the number\
    \ of coins collected in the upper-left corner of the screen and the amount of\
    \ time remaining in the upper-right. When any keys are collected, an image of\
    \ a key with the corresponding color will appear in the top-center area of the\
    \ screen. If the player reaches the goal flag or runs out of time, a message will\
    \ appear in the center of the screen stating “You Win!” or “Time Up—Game Over,”\
    \ respectively.\n\nThe game uses a vibrant, colorful, cartoonish art style. Most\
    \ objects with which the player can interact involve either an image-based or\
    \ a value-based animation to draw the player’s attention. Suggestions for additional\
    \ special effects and audio will be discussed in the final section of this chapter\
    \ to help establish the mood, provide player feedback, and enhance the interaction\
    \ of game-world objects.\n\nThe chapter assumes that you are familiar with the\
    \ concepts from Chapter [10](#A352797_2_En_10_Chapter.html), “Tilemaps,” and that\
    \ you have installed the Tiled map-editor software. Beginning this project requires\
    \ the same steps as in previous projects: creating a new project, creating an\
    \ `assets` folder and a `+libs` folder (the latter not being necessary if you\
    \ have set up the `userlib` directory), copying the custom framework files you\
    \ created in the first part of this book (`BaseGame.java`, `BaseScreen.java`,\
    \ `BaseActor.java`) as well as the `TilemapActor.java` class you developed in\
    \ Chapter [10](#A352797_2_En_10_Chapter.html), and copying the graphics and audio\
    \ for this project into your `assets` folder. As described previously, a BlueJ\
    \ project named `Framework` has been created for your convenience and will be\
    \ used as a starting point. To begin the first project:\n\n*   Download the source\
    \ code files for this chapter.\n*   Make a copy of the downloaded `Framework`\
    \ folder (and its contents) and rename it to `Jumping Jack`.\n*   Copy all the\
    \ contents of the downloaded `Jumping Jack` project assets folder into your newly\
    \ created `Jumping Jack assets` folder (and delete the +`libs` folder if you are\
    \ using the BlueJ `userlib` folder).\n*   Open the BlueJ project in your `Jumping\
    \ Jack` folder.\n*   In the `CustomGame` class, change the name of the class to\
    \ `JumpingJackGame` (BlueJ will then rename the source code file to `JumpingJackGame.java`).\n\
    *   In the `Launcher` class, change the contents of the `main` method to the following:\n\
    \n    ```\n    Game my Game = new JumpingJackGame ();\n    LwjglApplication launcher\
    \ = new LwjglApplication(\n    myGame, \"Jumping Jack\", 800, 640 )\n    ```\n\
    \n## Starting the Level\n\nTo begin, start the Tiled map-editor software . Create\
    \ a new map with a map size that has width of 50 tiles and height of 20 tiles,\
    \ and a tile size with the width and height both set to 32 pixels. The resulting\
    \ map will be 1600 pixels by 640 pixels. Click the Save As . . . button and save\
    \ the file to your `assets` directory with the filename `map.tmx`.\n\nNext, add\
    \ an image layer and an object layer to your map and reorder the layers so that\
    \ the tile layer appears in the middle of the list. In the Layers panel, select\
    \ Image Layer 1, and in the Properties panel, set the image to `background.png`\
    \ (whose dimensions match the size of the tilemap). Then, in the Tileset panel\
    \ , add a new tileset using the image `platform-tileset.png` (shown on the left\
    \ side of Figure [11-2](#A352797_2_En_11_Chapter.html#Fig2)), setting the tile\
    \ size to 32 by 32 and checking the box to embed the tileset in the map. Add another\
    \ new tileset to the map, this time using the image `object-tileset.png` (shown\
    \ on the right side of Figure [11-2](#A352797_2_En_11_Chapter.html#Fig2)), in\
    \ the same way. Since the object tiles will be used to indicate where game-world\
    \ objects should be spawned, you will need to specify the corresponding Java classes\
    \ (which you will create later). In the Tileset panel, select object-tileset and\
    \ click on the icon to edit the tileset. In the tab that appears, you will need\
    \ to click on each tile (one at a time) and add a new custom property to each.\
    \ The property should be called `name`; the corresponding values for the tiles\
    \ (from left to right) are `Coin`, `Flag`, `Timer`, `Springboard`, `Platform`,\
    \ `Key`, and `Lock`. In addition, for the key and lock object tiles, add a second\
    \ custom property called `color` with the value `red`. (This default color can\
    \ be overridden for specific instances later on in the tilemap editor).\n\n![A352797_2_En_11_Fig2_HTML.jpg](A352797_2_En_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2.\n\nTilesets for the tile layer (left) and object layer (right)\n\
    \nReturn to the tab featuring the tilemap. In the Layers panel, select Tile Layer\
    \ 1\\. In the Tileset panel, select platform-tileset and then press the B key\
    \ to activate the Stamp Brush tool . Add tiles across the bottom row of the map,\
    \ as well as some tiles representing solids to jump on, as well as some scenery.\
    \ Note that the cloud graphic occupies two tiles, so you should add these tiles\
    \ in adjacent pairs. One possible arrangement is shown in Figure [11-3](#A352797_2_En_11_Chapter.html#Fig3)\
    \ (which only displays part of the map, for clarity).\n\n![A352797_2_En_11_Fig3_HTML.jpg](A352797_2_En_11_Fig3_HTML.jpg)\n\
    \nFigure 11-3.\n\nAdditions to the tile layer"
  trans: "\n## 游戏项目：跳跃杰克\n\n《跳跃杰克》是一款动作游戏，主角考拉杰克在关卡中跳跃，尽可能多地收集金币；他必须在时间耗尽前抵达终点旗帜。收集计时器道具能为考拉争取更多探索时间。游戏中的部分表面为可穿越平台，其行为与实体物体类似，但考拉可以从下方跳穿并落在平台顶部，或从上方坠落穿过平台。此外还有弹跳板道具，若考拉从上方落在弹跳板上，会被弹向高空。最后是锁块，它们可能有多种颜色，在考拉收集到同色钥匙前无法通过。\n\
    \n玩家使用左右方向键控制角色左右移动，按空格键跳跃（当考拉站在实体物体上时）。考拉会自动从下方跳穿平台，但若要向下穿过平台，玩家需在按住下方向键的同时按下跳跃键。用户界面在屏幕左上角显示已收集金币数量，右上角显示剩余时间。收集任何钥匙时，屏幕顶部中央区域会显示对应颜色的钥匙图标。若玩家抵达终点旗帜或时间耗尽，屏幕中央会分别显示\"\
    你赢了！\"或\"时间到——游戏结束\"。\n\n游戏采用鲜艳、多彩的卡通艺术风格。大多数可交互对象都包含基于图像或数值的动画以吸引玩家注意。关于额外特效和音效的建议将在本章最后一节讨论，以帮助营造氛围、提供玩家反馈并增强游戏世界对象的交互性。\n\
    \n本章假设你已熟悉第 10 章\"瓦片地图\"中的概念，并已安装 Tiled 地图编辑器软件。开始本项目需遵循与之前项目相同的步骤：创建新项目，创建`assets`文件夹和`+libs`文件夹（若已设置`userlib`目录则后者非必需），复制本书第一部分创建的自定义框架文件（`BaseGame.java`、`BaseScreen.java`、`BaseActor.java`）以及第\
    \ 10 章开发的`TilemapActor.java`类，并将本项目的图形和音频文件复制到`assets`文件夹中。如前所述，为方便起见已创建名为`Framework`的\
    \ BlueJ 项目，将作为起始点。开始第一个项目：\n\n*   下载本章的源代码文件。\n*   复制下载的`Framework`文件夹（及其内容）并将其重命名为`Jumping\
    \ Jack`。\n*   将下载的`Jumping Jack`项目 assets 文件夹中的所有内容复制到新创建的`Jumping Jack assets`文件夹中（若使用\
    \ BlueJ `userlib`文件夹则删除`+libs`文件夹）。\n*   在`Jumping Jack`文件夹中打开 BlueJ 项目。\n*  \
    \ 在`CustomGame`类中，将类名改为`JumpingJackGame`（BlueJ 随后会将源代码文件重命名为`JumpingJackGame.java`）。\n\
    *   在`Launcher`类中，将`main`方法的内容修改为：\n\n    ```\n    Game my Game = new JumpingJackGame\
    \ ();\n    LwjglApplication launcher = new LwjglApplication(\n    myGame, \"Jumping\
    \ Jack\", 800, 640 )\n    ```\n\n## 开始关卡\n\n首先，启动 Tiled 地图编辑器软件。创建新地图，地图尺寸设置为宽度\
    \ 50 个瓦片、高度 20 个瓦片，瓦片尺寸宽度和高度均设为 32 像素。生成的地图尺寸将为 1600 像素×640 像素。点击\"另存为...\"按钮，将文件以文件名`map.tmx`保存到`assets`目录。\n\
    \n接下来，为地图添加一个图像层和一个对象层，并重新排列图层顺序，使瓦片层位于列表中间。在\"图层\"面板中选择\"图像层 1\"，在\"属性\"面板中将图像设置为`background.png`（其尺寸与瓦片地图大小匹配）。然后，在\"\
    图块集\"面板中，使用图像`platform-tileset.png`（如图 11-2 左侧所示）添加新图块集，设置瓦片尺寸为 32×32，并勾选将图块集嵌入地图的复选框。以相同方式为地图添加另一个新图块集，这次使用图像`object-tileset.png`（如图\
    \ 11-2 右侧所示）。由于对象瓦片将用于指示游戏世界对象的生成位置，你需要指定对应的 Java 类（稍后创建）。在\"图块集\"面板中，选择`object-tileset`并点击编辑图块集的图标。在出现的选项卡中，你需要逐个点击每个瓦片，并为每个瓦片添加新的自定义属性。该属性应命名为`name`；各瓦片（从左到右）对应的值分别为`Coin`、`Flag`、`Timer`、`Springboard`、`Platform`、`Key`和`Lock`。此外，对于钥匙和锁对象瓦片，添加第二个名为`color`的自定义属性，值为`red`。（此默认颜色可在后续瓦片地图编辑器中为特定实例覆盖）。\n\
    \n![A352797_2_En_11_Fig2_HTML.jpg](img/A352797_2_En_11_Fig2_HTML.jpg)\n\n图 11-2.\n\
    \n瓦片层（左）和对象层（右）的图块集\n\n返回显示瓦片地图的选项卡。在\"图层\"面板中选择\"瓦片层 1\"。在\"图块集\"面板中选择`platform-tileset`，然后按\
    \ B 键激活图章刷工具。在地图底部行添加瓦片，同时添加一些代表可跳跃实体的瓦片以及一些场景装饰。注意云朵图形占用两个瓦片，因此应以相邻成对的方式添加这些瓦片。图\
    \ 11-3 展示了一种可能的布局（为清晰起见仅显示地图部分区域）。\n\n![A352797_2_En_11_Fig3_HTML.jpg](img/A352797_2_En_11_Fig3_HTML.jpg)\n\
    \n图 11-3.\n\n瓦片层的添加内容\n"
- fmt: '# 排版后的内容


    It is important to note that the tile layer is being used only to simplify creating
    an image from tilesets; none of these tiles are returned when using the `getTileList`
    method in the `TilemapActor` class. Instead, for the regions covered by tiles
    that represent solid objects (in contrast to the tiles that represent scenery),
    you will add rectangles in the object layer to store the data corresponding to
    those regions. In the Layers panel, select Object Layer 1 and press R to activate
    the Rectangle tool. Draw rectangles around all the regions containing solid tiles;
    for simplicity, rectangles can be drawn that surround multiple tiles at once.
    To align rectangles with the grid, you may want to activate the Snap to Grid setting
    in the View menu if it isn’t already activated. For the design shown in Figure
    [11-3](#A352797_2_En_11_Chapter.html#Fig3), you would add rectangles around the
    ground, the floating platform, and the staircase made out of boxes, but not the
    two tiles with pictures of grass. Each time you add one of these rectangles, you
    must also add a custom property called `name` with the value `Solid` (which will
    be used to initialize corresponding actors later), or you can create them all
    and then use the Select tool to give them all the same property at once. Finally,
    add a rectangle at the position where the koala should start the level and add
    a custom property called `name` with the value `Start`. Applying this process
    to the design shown in Figure [11-3](#A352797_2_En_11_Chapter.html#Fig3) produces
    the result shown in Figure [11-4](#A352797_2_En_11_Chapter.html#Fig4), where the
    rectangles are drawn with a gray border. Now would also be a good time to save
    your tilemap file!


    ![A352797_2_En_11_Fig4_HTML.jpg](A352797_2_En_11_Fig4_HTML.jpg)


    Figure 11-4.


    Adding rectangle objects to indicate solid objects


    Next, open the `Jumping Jack` project in BlueJ. You need a way to represent regions
    corresponding to solid objects. To this end, create a new class named `Solid`
    that contains the following code. Since no graphics are used for this object (the
    tilemap determines the graphics that will be appear in these areas), the size
    and boundary shape for these objects must be set directly, and the width and height
    values are passed in via the constructor. Note that this class also contains functionality
    to enable and disable the solid status of the object; this will be needed by the
    platform and lock objects introduced later on in this chapter.


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Solid extends BaseActor

    {

    private boolean enabled;

    public Solid(float x, float y, float width, float height, Stage s)

    {

    super(x,y,s);

    setSize(width,height);

    setBoundaryRectangle();

    enabled = true;

    }

    public void setEnabled(boolean b)

    {

    enabled = b;

    }

    public boolean isEnabled()

    {

    return enabled;

    }

    }

    ```


    Next, in the `LevelScreen` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.maps.MapObject;

    import com.badlogic.gdx.maps.MapProperties;

    ```


    Then, add the following code to the `initialize` method to load the tilemap and
    generate the `Solid` objects corresponding to the rectangles in the tilemap:


    ```

    TilemapActor tma = new TilemapActor("assets/map.tmx", mainStage);

    for (MapObject obj : tma.getRectangleList("Solid") )

    {

    MapProperties props = obj.getProperties();

    new Solid( (float)props.get("x"),     (float)props.get("y"),

    (float)props.get("width"), (float)props.get("height"),

    mainStage );

    }

    ```


    At this point, you can test your project, although you will only see the leftmost
    part of the level. In the next section, you will add the player’s character (Jack
    the Koala), which will enable you to move around and see the rest of your level.


    ## Platform Character Setup


    In this section, you will create a class for the main character (the koala) that
    is controlled by the player. One new feature of this class is that it will contain
    multiple animations corresponding to different types of movement (standing, walking,
    and jumping). Due to the complexity of platform character movement, the physics-related
    methods in the `BaseActor` class are insufficient for a game of this type. For
    example, platform characters typically have different maximum speeds for horizontal
    movement (walking) and vertical movement (jumping/falling). For this reason, the
    character’s `act` method will contain custom code for implementing physics-based
    movements. Before continuing, you may want to review the “Physics and Movement”
    section from Chapter [3](#A352797_2_En_3_Chapter.html), which contains an extensive
    discussion of physics-related concepts and calculations that will be revisited
    here.


    To begin, create a new class called `Koala` containing the following code, which
    initializes two animations: `stand`, which consists of a single image, and `walk`,
    which contains multiple images.


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.graphics.g2d.Animation;

    public class Koala extends BaseActor

    {

    private Animation stand;

    private Animation walk;

    public Koala(float x, float y, Stage s)

    {

    super(x,y,s);

    stand = loadTexture( "assets/koala/stand.png" );

    String[] walkFileNames =

    {"assets/koala/walk-1.png", "assets/koala/walk-2.png",

    "assets/koala/walk-3.png", "assets/koala/walk-2.png"};

    walk = loadAnimationFromFiles(walkFileNames, 0.2f, true);

    }

    }

    ```


    Next, you will begin to implement the custom physics. First, in the `BaseActor`
    class , change the access modifier of the variables `accelerationVec` and `velocityVec`
    from `private` to `protected` so that the `Koala` class can access these variables
    directly. Return to the `Koala` class and add the following `import` statements:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.math.MathUtils;

    import com.badlogic.gdx.math.Vector2;

    ```


    Next, you need to add variables to store physics-related constants: acceleration
    and deceleration rates for walking, the maximum horizontal (walking) speed, the
    magnitude of the force of gravity that pulls the character downward, and the maximum
    possible vertical (jumping/falling) speed. To this end, add the following variable
    declarations to the `Koala` class:


    ```

    private float walkAcceleration;

    private float walkDeceleration;

    private float maxHorizontalSpeed;

    private float gravity;

    private float maxVerticalSpeed;

    ```


    In the `constructor` method, add the following code to set the values of these
    variables:


    ```

    maxHorizontalSpeed = 100;

    walkAcceleration   = 200;

    walkDeceleration   = 200;

    gravity            = 700;

    maxVerticalSpeed   = 1000;

    ```


    Now, you will turn your attention to implementing platformer physics. First, in
    the `Koala` class, add the following method:


    ```

    public void act(float dt)

    {

    super.act( dt );

    }

    ```


    All the code that follows is to be added to the `act` method until stated otherwise.
    The first order of business is to check for keyboard input. If the player is pressing
    the left arrow key or the right arrow key, then the acceleration vector is updated.
    Then, the effect of gravity is taken into account, and the acceleration vector
    is used to update the velocity vector. To do so, add the following code:


    ```

    if (Gdx.input.isKeyPressed(Keys.LEFT))

    accelerationVec.add( -walkAcceleration, 0 );

    if (Gdx.input.isKeyPressed(Keys.RIGHT))

    accelerationVec.add( walkAcceleration, 0 );

    accelerationVec.add(0, -gravity);

    velocityVec.add( accelerationVec.x * dt, accelerationVec.y * dt );

    ```'
