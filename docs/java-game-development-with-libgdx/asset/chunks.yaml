- fmt: '### The Enemy Planes


    In many ways, the enemy planes are similar to the stars, in that they spawn regularly
    and move similarly, should be removed from the game once they move past the left
    edge, have the power to affect the player’s score, and something happens when
    the player collides with them. To begin, create a new class named `Enemy` with
    the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Enemy extends BaseActor

    {

    public Enemy(float x, float y, Stage s)

    {

    super(x,y,s);

    String[] filenames =

    {"assets/planeRed0.png", "assets/planeRed1.png",

    "assets/planeRed2.png", "assets/planeRed1.png"};

    loadAnimationFromFiles(filenames, 0.1f, true);

    setSpeed(100);

    setMotionAngle(180);

    setBoundaryPolygon(8);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    }

    }

    ```


    One difference you may notice between this class and the `Star` class is that
    in the `Enemy` class the `act` method does not contain code to remove the enemy
    from the game once it moves past the left edge of the screen. This is because
    you also want to increase the player’s score when this happens, which requires
    that this action take place in the `LevelScreen` class. At this point, turn your
    attention to the `LevelScreen` class. First, add the following `import` statement,
    which is needed to load the “Game Over” message image (since it is not important
    enough to warrant its own class):


    ```

    import com.badlogic.gdx.Gdx;

    ```


    Next, add the following variable declarations:


    ```

    float enemyTimer;

    float enemySpawnInterval;

    float enemySpeed;

    boolean gameOver;

    BaseActor gameOverMessage;

    ```


    At the end of the `initialize` method, add the following code to initialize these
    variables:


    ```

    enemyTimer = 0;

    enemySpeed = 100;

    enemySpawnInterval = 3;

    gameOver = false;

    gameOverMessage = new BaseActor(0,0,uiStage);

    gameOverMessage.loadTexture("assets/game-over.png");

    gameOverMessage.setVisible(false);

    ```


    In addition, to place the “Game Over” message into the user interface, locate
    the line of code containing the statement `uiTable.add().expandY()` and change
    it to the following:


    ```

    uiTable.add(gameOverMessage).expandY();

    ```


    Next, at the end of the `update` method, add the following code, which will spawn
    enemy planes and check for collisions and movement off-screen, as previously described.
    Notice that after an enemy spawns, in addition to the value of the `enemyTimer`
    variable resetting, the enemy spawn interval is reduced and the enemy speed is
    increased, which increases the challenge. (Later on, you may wish to adjust the
    amount by which these variables are changed.) Also, a pair of conditional statements
    serves to check that the values of these variables do not get too small or too
    large, which could make the game ridiculously difficult. (For example, if the
    spawn rate were to become less than 0.016, then enemies would spawn every frame,
    resulting in a nearly continuous stream of enemies that would be impossible to
    dodge.)


    ```

    enemyTimer += dt;

    if (enemyTimer > enemySpawnInterval)

    {

    Enemy enemy = new Enemy( 800, MathUtils.random(100,500), mainStage );

    enemy.setSpeed(enemySpeed);

    enemyTimer = 0;

    enemySpawnInterval -= 0.10f;

    enemySpeed += 10;

    if (enemySpawnInterval < 0.5f)

    enemySpawnInterval = 0.5f;

    if (enemySpeed > 400)

    enemySpeed = 400;

    }

    for (BaseActor enemy : BaseActor.getList(mainStage, "Enemy"))

    {

    if (plane.overlaps(enemy))

    {

    plane.remove();

    gameOver = true;

    gameOverMessage.setVisible(true);

    }

    if (enemy.getX() + enemy.getWidth() < 0)

    {

    score++;

    scoreLabel.setText( Integer.toString(score) );

    enemy.remove();

    }

    }

    ```


    Finally, the purpose of the `Boolean` variable `gameOver` is to stop the stars
    and enemy planes from spawning and points from being awarded once the game is
    over. This can be accomplished by skipping the previously written code in the
    `update` method once `gameOver` becomes `true`, which you accomplish by adding
    the following statement to the beginning of the `update` method:


    ```

    if (gameOver)

    return;

    ```


    Once again, you have reached a good point at which to test your game. Make sure
    that you earn a point each time the enemy plane goes off-screen to the left and
    that the “Game Over” message appears (and objects stop spawning) once the player’s
    plane collides with an enemy plane. Before considering this game to be complete,
    you will add a few finishing touches: special effects and audio.


    ## Finishing Touches


    Although the game mechanics have been completely implemented, some additional
    consideration should be paid to aesthetics. In this section, you will add some
    background music to help set the mood of the game, as well as visual and audio
    feedback (special effects and sound effects) when the player’s plane collides
    with another object. When the plane collides with a star, a sparkling visual effect
    will appear, accompanied by a light, quiet tinkling sound. When the plane collides
    with an enemy, an explosion will appear, accompanied by a deep, rumbling, explosion-like
    sound. The background music is a driving instrumental piece named “Prelude and
    Action,”[¹](#A352797_2_En_7_Chapter.html#Fn1) and was selected to add a sense
    of tension and excitement to the game.


    To begin adding these features, you will first create classes for the visual effects.
    First, create a class named `Sparkle` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Sparkle extends BaseActor

    {

    public Sparkle(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/sparkle.png", 8,8, 0.02f, false);

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( isAnimationFinished() )

    remove();

    }

    }

    ```


    Next, create a class named `Explosion` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Explosion extends BaseActor

    {

    public Explosion(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/explosion.png", 6,6, 0.02f, false);

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( isAnimationFinished() )

    remove();

    }

    }

    ```


    Next, in the `LevelScreen` class, add the following two `import` statements to
    enable the use of audio in your game:


    ```

    import com.badlogic.gdx.audio.Sound;

    import com.badlogic.gdx.audio.Music;

    ```


    Next, add the following variable declarations:


    ```

    Music backgroundMusic;

    Sound sparkleSound;

    Sound explosionSound;

    ```


    To initialize these objects, add the following code at the end of the `initialize`
    method:


    ```

    backgroundMusic = Gdx.audio.newMusic(Gdx.files.internal("assets/Prelude-and-Action.mp3"));

    sparkleSound    = Gdx.audio.newSound(Gdx.files.internal("assets/sparkle.mp3"));

    explosionSound  = Gdx.audio.newSound(Gdx.files.internal("assets/explosion.wav"));

    backgroundMusic.setLooping(true);

    backgroundMusic.setVolume(1.00f);

    backgroundMusic.play();

    ```


    To add the new features corresponding to a collision with a star, in the `update`
    method, locate the block of code following the conditional statement `if (plane.overlaps(star))`,
    and add the following:


    ```

    Sparkle sp = new Sparkle(0,0,mainStage);

    sp.centerAtActor(star);

    sparkleSound.play();

    ```


    To add the new features corresponding to a collision with an enemy plane, also
    in the `update` method, locate the block of code following the conditional statement
    `if (plane.overlaps(enemy))`, and add the following:


    ```

    Explosion ex = new Explosion(0,0,mainStage);

    ex.centerAtActor(plane);

    ex.setScale(3);

    explosionSound.play();

    backgroundMusic.stop();

    ```


    With these additions, the new aesthetic features have been completely added. Even
    though the total amount of code required to implement these features is small,
    the impact they have on the player’s experience will be large. Once again, run
    your project to make sure the code works as expected. Enjoy your game!'
