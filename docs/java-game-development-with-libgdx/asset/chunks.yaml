    `create`方法首先初始化`Environment`，并添加一个参数（`Attribute`类的子类），该参数定义了场景中环境光的颜色。通常，灯光使用灰色调（而不是黄色或蓝色等颜色），这样场景就不会被意外的颜色着色。然后，使用更亮的灰色调创建一个`DirectionalLight`实例，并指定其方向（使用`Vector3`对象）主要向左和向下；配置其参数后，将灯光添加到环境中。接着初始化一个`PerspectiveCamera`，视场角为67度，近裁剪面和远裁剪面分别设置为0.1和1000（选择这些值是为了确保视图区域包含你将添加到场景中的对象）。设置相机的位置，并通过`lookAt`方法指定其初始应看向的位置。最后，初始化一个`ModelBatch`对象，该对象将在后续渲染时使用。这些步骤“设置场景”，通过将以下代码添加到`create`方法中来完成：'
  raw: 'The next new class is `ModelBatch` . Just as a `SpriteBatch` object can be
    used to render two-dimensional `Texture` objects, `ModelBatch` is used to render
    three-dimensional objects. The data needed to describe the appearance of a three-dimensional
    object is contained in a `Model` object, which consists of two major components:
    `Mesh` and `Material`. A mesh is a collection of vertices, edges, and triangular
    faces that define the shape of an object . A material contains color or texture
    data that is applied to the mesh; the material defines the appearance of the mesh
    while rendering. Figure [16-5](#A352797_2_En_16_Chapter.html#Fig5) contains two
    images of a teapot: a wireframe representation of the mesh, and its appearance
    after applying a material. This particular teapot is a classic model called the
    Utah teapot , created by the computer scientist Martin Newell in 1975\. Models
    can be loaded from standard 3D object file formats.


    ![A352797_2_En_16_Fig5_HTML.jpg](A352797_2_En_16_Fig5_HTML.jpg)


    Figure 16-5.


    The Utah teapot, rendered in wireframe (left) and with material applied (right)


    Models can be created in two ways in LibGDX. Using the `ModelLoader` class, a
    model can be loaded from standard 3D object file formats (such as the Wavefront
    format, typically indicated by the `.obj` file extension), which may also contain
    references to image files used by the accompanying material. Alternatively, some
    basic shapes (such as spheres and boxes) can be generated at runtime using the
    `ModelBuilder` class. You will see examples of both of these approaches over the
    course of this chapter.


    Finally, in order to give 3D models a realistic appearance, the effects of light
    sources need to be considered. In fact, if lights are not added to a scene, you
    will not be able to see anything at all! Lights are managed by the `Environment`
    class. The two types of lighting effects you will use are ambient light and directional
    light. Ambient light provides overall illumination and shines equally from all
    directions. Typically, it is important to include ambient light in a scene so
    that even the sides facing away from a light source will be somewhat visible (although
    this amount may vary depending on the type of location you are simulating). A
    directional light is used to simulate light shining throughout the scene in a
    particular direction. This helps provide a sense of depth in a scene, in particular
    allowing you to distinguish between different faces when an object’s material
    consists of just a single color. Figure [16-6](#A352797_2_En_16_Chapter.html#Fig6)
    illustrates these effects with two renderings of a cube. In the image on the left,
    the scene contains only ambient light, which makes it difficult to see all the
    edges of the cube. The image on the right has a directional light, primarily aimed
    toward the left (and thus the right side of the cube appears brightest).


    ![A352797_2_En_16_Fig6_HTML.jpg](A352797_2_En_16_Fig6_HTML.jpg)


    Figure 16-6.


    A cube illuminated with ambient light only (left) and directional light added
    (right)


