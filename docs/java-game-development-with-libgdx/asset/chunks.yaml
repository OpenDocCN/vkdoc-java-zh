- fmt: '# Non-Player Characters


    The next feature you will implement is the addition of non-player characters (NPCs).
    They are very closely related to the sign objects introduced in Chapter [5](#A352797_2_En_5_Chapter.html);
    you may want to reread the corresponding section before continuing. Similar to
    signs, approaching an NPC causes the dialog box in the user interface to display
    an associated message. Unlike signs, however, each NPC will have a distinct appearance,
    using the identification (`id`) data set in the tilemap. In addition, each NPC’s
    ID will be checked before displaying the associated message, which gives you the
    opportunity to display different messages depending on the state of the game.
    In particular, the game designed in this chapter features two NPCs, one called
    the Gatekeeper, the other called the Shopkeeper. The Gatekeeper initially blocks
    access to the treasure, provides instructions to the player (destroy all the Flyers
    to get the treasure!), informs you how many Flyers remain, and fades out and disappears
    once you have destroyed them all, thus enabling you to collect the treasure. The
    Shopkeeper does not feature dynamic text; they simply inform the hero of the prices
    and quantities of items available for sale in the item shop (which will be created
    in the next section).


    To begin, create a new class called `NPC` with the following code. Note that the
    image for the character is not set in the constructor; rather, it is set when
    the ID is set.


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class NPC extends BaseActor

    {

    // the text to be displayed

    private String text;

    // used to determine if dialog box text is currently being displayed

    private boolean viewing;

    // ID used for specific graphics

    //   and identifying NPCs with dynamic messages

    private String ID;

    public NPC(float x, float y, Stage s)

    {

    super(x,y,s);

    text = " ";

    viewing = false;

    }

    public void setText(String t)

    {  text = t;  }

    public String getText()

    {  return text;  }

    public void setViewing(boolean v)

    {  viewing = v;  }

    public boolean isViewing()

    {  return viewing;  }

    public void setID(String id)

    {

    ID = id;

    if ( ID.equals("Gatekeeper") )

    loadTexture("assets/npc-1.png");

    else if (ID.equals("Shopkeeper"))

    loadTexture("assets/npc-2.png");

    else // default image

    loadTexture("assets/npc-3.png");

    }

    public String getID()

    {  return ID;  }

    }

    ```


    To set up the NPCs, in the `initialize` method of the `LevelScreen` class, add
    the following code; note that you need to also retrieve the properties named `id`
    and `text` that you created when designing the tilemap. Note that the NPC position
    will be slightly offset from where it was placed in the Tiled map editor, because
    the NPC size is larger than the icon used to represent it in the tileset. You
    may find that you wish to adjust the NPC positions in Tiled later.


    ```

    for (MapObject obj : tma.getTileList("NPC") )

    {

    MapProperties props = obj.getProperties();

    NPC s = new NPC( (float)props.get("x"), (float)props.get("y"), mainStage );

    s.setID( (String)props.get("id") );

    s.setText( (String)props.get("text") );

    }

    ```


    Finally, in the `update` method, add the following code. If the hero is within
    four pixels of an NPC, the hero is considered to be nearby, and the corresponding
    message will be displayed. Once the hero is no longer near the NPC whose message
    is being viewed, the dialog box will disappear. The majority of the following
    code is used to create the dynamic messages for the Gatekeeper NPC, which depend
    on the number of Flyers remaining in the game. Once all the Flyers are destroyed,
    the Gatekeeper will slowly fade out and then move off-screen, thus enabling the
    hero to reach the treasure.


    ```

    for ( BaseActor npcActor : BaseActor.getList(mainStage, "NPC") )

    {

    NPC npc = (NPC)npcActor;

    hero.preventOverlap(npc);

    boolean nearby = hero.isWithinDistance(4, npc);

    if ( nearby && !npc.isViewing() )

    {

    // check NPC ID for dynamic text

    if ( npc.getID().equals("Gatekeeper") )

    {

    int flyerCount = BaseActor.count(mainStage, "Flyer");

    String message = "Destroy the Flyers and you can have the treasure. ";

    if ( flyerCount > 1 )

    message += "There are " + flyerCount + " left.";

    else if ( flyerCount == 1 )

    message += "There is " + flyerCount + " left.";

    else // flyerCount == 0

    {

    message += "It is yours!";

    npc.addAction( Actions.fadeOut(5.0f) );

    npc.addAction( Actions.after( Actions.moveBy(-10000, -10000) ) );

    }

    dialogBox.setText(message);

    }

    else

    {

    dialogBox.setText( npc.getText() );

    }

    dialogBox.setVisible( true );

    npc.setViewing( true );

    }

    if (npc.isViewing() && !nearby)

    {

    dialogBox.setText( " " );

    dialogBox.setVisible( false );

    npc.setViewing( false );

    }

    }

    ```


    At this point, the NPCs are fully functional. Test your game and talk to each
    of the NPCs. Try to destroy the Flyers, and then make sure that the Gatekeeper
    vanishes as expected.


    # Item Shop


    The final mechanic you will implement in the Treasure Quest game is the item shop,
    which consists of two tiles that the hero can stand on, and if the player presses
    the B key (to buy) and has enough coins, the player will receive the quantity
    of items stated by the Shopkeeper. This gives value to the coins collected by
    the player, rather than their just being an abstract number of points or measure
    of progress. To begin, create a new class named `ShopHeart` with the following
    code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class ShopHeart extends BaseActor

    {

    public ShopHeart(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/heart-icon.png");

    }

    }

    ```


    Also create a class named `ShopArrow` as follows:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class ShopArrow extends BaseActor

    {

    public ShopArrow(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/arrow-icon.png");

    }

    }

    ```


    Since there will only be one instance of each of these objects, in the `LevelScreen`
    class, add the following variables:


    ```

    ShopHeart shopHeart;

    ShopArrow shopArrow;

    ```


    To create these objects, add the following to the `initialize` method:


    ```

    MapObject shopHeartTile = tma.getTileList("ShopHeart").get(0);

    MapProperties shopHeartProps = shopHeartTile.getProperties();

    shopHeart = new ShopHeart( (float)shopHeartProps.get("x"), (float)shopHeartProps.get("y"),

    mainStage );

    MapObject shopArrowTile = tma.getTileList("ShopArrow").get(0);

    MapProperties shopArrowProps = shopArrowTile.getProperties();

    shopArrow = new ShopArrow( (float)shopArrowProps.get("x"), (float)shopArrowProps.get("y"),

    mainStage );

    ```


    Since buying items is a discrete action, add the following code to the `keyDown`
    method after the code that activates the weapons:


    ```

    if (keycode == Keys.B)

    {

    if (hero.overlaps(shopHeart) && coins >= 3)

    {

    coins -= 3;

    health += 1;

    }

    if (hero.overlaps(shopArrow) && coins >= 4)

    {

    coins -= 4;

    arrows += 3;

    }

    }

    ```


    That’s all there is to it! Try out your game again, destroy some Flyers, and spend
    your hard-earned coins.


    Once you have reached this point, congratulations are in order, as you have completed
    the longest project in this book!'
