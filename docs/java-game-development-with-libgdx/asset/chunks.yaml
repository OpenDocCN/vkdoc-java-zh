  trans: '

    ## 总结与下一步


    在本章中，你学习了如何创建用户界面对象，例如标签、基于图像的按钮和基于文本的按钮。你创建了自定义的位图字体，用于标签和基于文本的按钮，并向 `BaseGame`
    类添加了一些便捷的默认样式对象。你使用 lambda 表达式指定了按钮的功能，这是一种为函数式接口创建匿名内部类的便捷简写形式。你学习了如何使用表格高效地排列用户界面元素，并向
    `BaseScreen` 类添加了表格支持。


    在《海星收集者》游戏中，你添加了一个标签来显示剩余海星数量，以及一个重置关卡的按钮；在菜单屏幕上，你添加了一些文本按钮，让玩家可以开始或退出游戏。接着，你创建了
    `DialogBox` 类，以便在游戏过程中方便地显示消息，并借助 `BaseActor` 类中的一个新方法实现了一个标志阅读机制，用于判断两个对象是否彼此靠近。然后，你创建了一个完整的过场动画显示框架，包括新类
    `Scene`、`SceneSegment`、`SetTextAction` 和 `SceneActions`。最后，你将过场动画框架发挥到极致，创建了《失踪的作业》，这是一款全新的视觉小说类型游戏。


    至此，你可以对这两款游戏进行许多扩展。在《海星收集者》中，你可以添加新的游戏机制，例如为海龟收集所有海星设置时间限制，在这种情况下，你可能需要在另一个标签中显示剩余时间，甚至可以在游戏中加入一个暂停按钮。如果你喜欢创建过场动画，你还可以添加另一个类，在海龟收集完所有海星后播放一段过场动画。


    在《失踪的作业》中，简单的添加内容可以是更多的对话或地点。作为更实质性的扩展，你可以添加在游戏过程中需要完成的额外目标。例如，也许某个地点包含一把钥匙，如果玩家收集了钥匙，那么另一个地点就会出现一个额外的选项（文本按钮），例如“解锁门”，从而通向一个之前无法进入的地点。


    在下一章中，你将把注意力转向音频——背景音乐和音效——这是你在游戏开发中需要掌握的另一个基本技能。


