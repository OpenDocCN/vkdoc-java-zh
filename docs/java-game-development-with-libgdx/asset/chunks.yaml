- fmt: '### Browsing for Files


    In the application you will build in the next subsection, it will simplify the
    process if you are able to select a music file to open or specify a filename and
    location to save to by using a standard file-chooser window rather than entering
    the path and filenames directly into the code, thus requiring you to change the
    code every time you want to work with a new file. Java has built-in functionality
    for creating such windows, while LibGDX currently does not, so you will need to
    use the standard Java classes. There are two different Java frameworks available
    for creating applications with graphical user interfaces: Swing and JavaFX. Of
    these two, Swing has been around longer and is more well-known, but it is no longer
    being actively developed, and applications made with Swing appear less modern.
    In this section, you will be using the JavaFX classes. For example, Figure [6-3](#A352797_2_En_6_Chapter.html#Fig3)
    shows the standard dialog windows for saving files with the Swing and JavaFX frameworks.


    ![A352797_2_En_6_Fig3_HTML.jpg](A352797_2_En_6_Fig3_HTML.jpg)


    Figure 6-3. Save dialog windows created with Swing (left) and JavaFX (right) frameworks


    In what follows, you will create a utility class called `FileUtils` that contains
    static methods to simplify creating these windows and converting the returned
    `File` object to a `FileHandle` object that can be used in LibGDX. One complication
    with integrating JavaFX classes into an application that is not purely built around
    JavaFX is that a number of background, framework-related classes must be initialized
    before you can use specific JavaFX classes themselves. (This is a common state
    of affairs; the LibGDX framework must also initialize platform-dependent objects,
    such as `Gdx.files`, `Gdx.input`, and `Gdx.audio` before you can start your game
    programs.) There are two ways to initialize the JavaFX toolkit that runs in the
    background: either by creating a JavaFX `Application` object (and running its
    `start` method) or by creating a `JFXPanel` object. In addition, JavaFX applications
    run on their own thread: a separate process that is run independently of others
    on the CPU. (When you run multiple applications on your computer or smartphone,
    each is running on a different thread, all of which are managed and scheduled
    by the CPU.) Therefore, the JavaFX classes and code need to be run not during
    the thread in which the LibGDX application is running, but during the thread in
    which the JavaFX application is running. This can be arranged using the JavaFX
    `Platform` class, which can schedule code to be run during the JavaFX thread via
    its `runLater` method. To accomplish these tasks, create a new class named `FileUtils`
    containing the following code, which will be explained more thoroughly after the
    code listing:


    ```

    import javafx.embed.swing.JFXPanel;

    import javafx.application.Platform;

    import javafx.stage.FileChooser;

    import java.io.File;

    import com.badlogic.gdx.files.FileHandle;

    public class FileUtils

    {

    private static boolean finished;

    private static FileHandle fileHandle;

    private static int openDialog = 1;

    private static int saveDialog = 2;

    public static FileHandle showOpenDialog()

    {

    return showDialog(openDialog);

    }

    public static FileHandle showSaveDialog()

    {

    return showDialog(saveDialog);

    }

    private static FileHandle showDialog(int dialogType)

    {

    new JFXPanel();

    finished = false;

    Platform.runLater(

    () ->

    {

    FileChooser fileChooser = new FileChooser();

    File file;

    if (dialogType == openDialog)

    file = fileChooser.showOpenDialog(null);

    else // dialogType == saveDialog

    file = fileChooser.showSaveDialog(null);

    if (file != null)

    fileHandle = new FileHandle(file);

    else

    fileHandle = null;

    finished = true;

    }

    );

    while ( !finished )

    {

    // waiting for FileChooser window to close

    }

    return fileHandle;

    }

    }

    ```


    The heart of this class is the `showDialog` class, which begins by initializing
    a `JFXPanel` object solely for the purpose of initializing the JavaFX background
    processes; a variable is not used to store a reference to this object, since you
    will not need to use any of its methods at any point. The `Platform.runLater`
    method takes in a `Runnable` object (written here as a lambda expression) that
    contains code to be run on the JavaFX process thread. This code opens a `FileChooser`
    window, retrieves a `File` object, and in turn uses it to initialize a `FileHandle`
    object. However, some care must be taken: since this code is running on a separate
    thread, the CPU could return to the LibGDX thread and attempt to finish executing
    the `showDialog` method before the JavaFX code finishes executing. This is the
    reasoning behind the use of the Boolean variable `finished`: it is initialized
    to `false` by the `showDialog` method and is only set to `true` after the JavaFX
    code has completed running. A `while` loop in the `showDialog` method prevents
    the method from continuing until the file-chooser window is closed. As a result,
    if the user attempts to return to the LibGDX application window while the file-chooser
    window is still open, the LibGDX window title bar may say “not responding,” but
    the application will return to normal after a file is selected. The other two
    methods in this class, `showOpenDialog` and `showSaveDialog`, are used to control
    which type of file chooser is opened by the `showDialog` method.


    With this class prepared, you are ready to turn your attention to the data structure
    that will be used to store timing information for the falling boxes in the Rhythm
    Tapper game, and to the application you will create to record this data for later
    use in the game.'
