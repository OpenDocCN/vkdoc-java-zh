    \n![A352797_2_En_14_Fig2_HTML.jpg](A352797_2_En_14_Fig2_HTML.jpg)\n\nFigure 14-2.\n\
    \nInitializing a grid of rooms with walls\n\nThe second step will be to remove\
    \ a sequence of walls so that you can reach any room from any other room . One\
    \ algorithm that can be used is called depth-first search . In this algorithm,\
    \ one room is chosen as a starting location, and a room is called connected when\
    \ it there is a path from the starting location to that room. The algorithm also\
    \ maintains a list of connected rooms that have neighboring rooms that are not\
    \ connected. The algorithm, in pseudocode , is as follows:\n\n*   Select a room\
    \ as a starting location; mark it as connected and add it to the list.\n*   While\
    \ there are still rooms remaining in the list:\n    *   Let `currentRoom` be the\
    \ most recently added room from the list.\n    *   If `currentRoom` has any unconnected\
    \ neighbors,\n        *   let `nextRoom` be a random unconnected neighbor of `currentRoom`;\n\
    \        *   remove the walls between `currentRoom` and `nextRoom`;\n        *\
    \   mark `nextRoom` as connected; and\n        *   add `nextRoom` to the end of\
    \ the list.\n*   If `currentRoom` does not have any unconnected neighbors, remove\
    \ it from the list.\n\nWhen this algorithm finishes, there are no more connected\
    \ rooms with unconnected neighbors; all the rooms are connected! This algorithm\
    \ produces mazes such as those shown in Figure [14-3](#A352797_2_En_14_Chapter.html#Fig3).\n\
    \n![A352797_2_En_14_Fig3_HTML.jpg](A352797_2_En_14_Fig3_HTML.jpg)\n\nFigure 14-3.\n\
    \nSample mazes generated with a depth-first algorithm\n\nAs the name indicates,\
    \ the depth-first algorithm creates paths that move randomly throughout the grid\
    \ for as long (or as deep) as possible until the path reaches a dead end (a room\
    \ with no adjacent unconnected rooms). At that point, another path will be generated,\
    \ branching off from the room most recently added to the list. As you can see\
    \ from the sample mazes in Figure [14-3](#A352797_2_En_14_Chapter.html#Fig3),\
    \ this typically creates mazes that contain only a few paths that are very long\
    \ and have few branching points. In order to create more branching points , you\
    \ could change the first line in the `while` loop to `let currentRoom be a random\
    \ room in the list`. This will have the opposite effect: instead of only a few\
    \ long paths, mazes will be produced that have very many short paths and lots\
    \ of dead ends; some examples are shown in Figure [14-4](#A352797_2_En_14_Chapter.html#Fig4).\n\
    \n![A352797_2_En_14_Fig4_HTML.jpg](A352797_2_En_14_Fig4_HTML.jpg)\n\nFigure 14-4."
  trans: "\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport java.util.ArrayList;\n\
    public class Room extends BaseActor\n{\npublic static final int NORTH = 0;\npublic\
    \ static final int SOUTH = 1;\npublic static final int EAST  = 2;\npublic static\
    \ final int WEST  = 3;\npublic static int[] directionArray = {NORTH, SOUTH, EAST,\
    \ WEST};\nprivate Wall[] wallArray;\nprivate Room[] neighborArray;\npublic Room(float\
    \ x, float y, Stage s)\n{\nsuper(x,y,s);\nloadTexture(\"assets/dirt.png\");\n\
    float w = getWidth();\nfloat h = getHeight();\n// t = 墙壁厚度（像素）\nfloat t = 6;\n\
    wallArray = new Wall[4];\nwallArray[SOUTH] = new Wall(x,y, w,t, s);\nwallArray[WEST]\
    \  = new Wall(x,y, t,h, s);\nwallArray[NORTH] = new Wall(x,y+h-t, w,t, s);\nwallArray[EAST]\
    \  = new Wall(x+w-t,y, t,h, s);\nneighborArray = new Room[4];\n// 该数组的内容将由 Maze\
    \ 类初始化\n}\npublic void setNeighbor(int direction, Room neighbor)\n{  neighborArray[direction]\
    \ = neighbor;  }\npublic boolean hasNeighbor(int direction)\n{  return neighborArray[direction]\
    \ != null;  }\npublic Room getNeighbor(int direction)\n{  return neighborArray[direction];\
    \  }\n// 检查该方向的墙壁是否仍然存在（尚未从舞台中移除）\npublic boolean hasWall(int direction)\n{  return\
    \ wallArray[direction].getStage() != null;  }\npublic void removeWalls(int direction)\n\
    {  removeWallsBetween(neighborArray[direction]);  }\npublic void removeWallsBetween(Room\
    \ other)\n{\nif (other == neighborArray[NORTH])\n{\nthis.wallArray[NORTH].remove();\n\
    other.wallArray[SOUTH].remove();\n}\nelse if (other == neighborArray[SOUTH])\n\
    {\nthis.wallArray[SOUTH].remove();\nother.wallArray[NORTH].remove();\n}\nelse\
    \ if (other == neighborArray[EAST])\n{\nthis.wallArray[EAST].remove();\nother.wallArray[WEST].remove();\n\
    }\nelse // (other == neighborArray[WEST])\n{\nthis.wallArray[WEST].remove();\n\
    other.wallArray[EAST].remove();\n}\n}\n}\n```\n\n接下来，你将创建一个用于构建迷宫的类，尽管此时它只会设置房间网格，并为每个房间的每个方向（如果存在相邻房间）设置邻居数据（网格边缘的房间只有三个邻居，而网格角落的房间只有两个邻居）。使用以下代码创建一个名为\
    \ `Maze` 的新类：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport java.util.ArrayList;\n\
    public class Maze\n{\nprivate Room[][] roomGrid;\n// 迷宫尺寸常量\nprivate final int\
    \ roomCountX = 12;\nprivate final int roomCountY = 10;\nprivate final int roomWidth\
    \  = 64;\nprivate final int roomHeight = 64;\npublic Maze(Stage s)\n{\nroomGrid\
    \ = new Room[roomCountX][roomCountY];\nfor (int gridY = 0; gridY < roomCountY;\
    \ gridY++)\n{\nfor (int gridX = 0; gridX < roomCountX; gridX++)\n{\nRoom room\
    \ = new Room(gridX * roomWidth, gridY * roomHeight, s);\nroomGrid[gridX][gridY]\
    \ = room;\nif (gridY > 0)\nroom.setNeighbor( Room.SOUTH, roomGrid[gridX][gridY-1]\
    \ );\nif (gridY < roomCountY - 1)\nroom.setNeighbor( Room.NORTH, roomGrid[gridX][gridY+1]\
    \ );\nif (gridX > 0)\nroom.setNeighbor( Room.WEST, roomGrid[gridX-1][gridY] );\n\
    if (gridX < roomCountX - 1)\nroom.setNeighbor( Room.EAST, roomGrid[gridX+1][gridY]\
    \ );\n}\n}\n}\npublic Room getRoom(int gridX, int gridY)\n{  return roomGrid[gridX][gridY];\
    \  }\n}\n```\n\n接下来，你将扩展 `BaseScreen` 类来设置显示游戏的屏幕。背景图像的大小由迷宫的大小决定，顶部还会预留一个区域用于显示剩余金币数量。由于每个房间是\
    \ 64x64 像素，迷宫横向有 12 个房间、纵向有 10 个房间，因此区域大小为 768x640 像素；另外还会额外保留 60 像素的高度用于用户界面。此外，你还需要添加玩家重新开始游戏的功能（按\
    \ R 键），这在玩家想要生成新迷宫，或者游戏结束想要重试时会很有用。按如下方式创建一个名为 `LevelScreen` 的类：\n\n```\nimport\
    \ com.badlogic.gdx.graphics.Color;\nimport com.badlogic.gdx.Input.Keys;\npublic\
    \ class LevelScreen extends BaseScreen\n{\nMaze maze;\npublic void initialize()\n\
    {\nBaseActor background = new BaseActor(0,0,mainStage);\nbackground.loadTexture(\"\
    assets/white.png\");\nbackground.setColor(Color.GRAY);\nbackground.setSize(768,\
    \ 700);\nmaze = new Maze(mainStage);\n}\npublic void update(float dt)\n{    }\n\
    public boolean keyDown(int keyCode)\n{\nif ( keyCode == Keys.R )\nBaseGame.setActiveScreen(\
    \ new LevelScreen() );\nreturn false;\n}\n}\n```\n\n接下来，你需要扩展 `BaseGame` 类来加载这个屏幕。按如下方式创建一个名为\
    \ `MazeGame` 的新类：\n\n```\npublic class MazeGame extends BaseGame\n{\npublic void\
    \ create()\n{\nsuper.create();\nsetActiveScreen( new LevelScreen() );\n}\n}\n\
    ```\n\n最后，要运行游戏，你需要一个启动器风格的类。回顾 `LevelScreen` 类中背景对象的大小，使用以下代码创建一个名为 `Launcher`\
    \ 的新类：\n\n```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
    public class Launcher\n{\npublic static void main (String[] args)\n{\nGame myGame\
    \ = new MazeGame();\nLwjglApplication launcher = new LwjglApplication( myGame,\
    \ \"Maze Runman\", 768, 700 );\n}\n}\n```\n\n至此，你的项目已经可以测试了。运行 `Launcher` 类中的\
    \ `main` 函数，你应该会看到如图 14-2 所示的屏幕。\n\n![A352797_2_En_14_Fig2_HTML.jpg](img/A352797_2_En_14_Fig2_HTML.jpg)\n\
    \n图 14-2.\n\n初始化带有墙壁的房间网格\n\n第二步是移除一系列墙壁，以便你可以从任意房间到达其他任意房间。一种可用的算法称为深度优先搜索。在该算法中，选择一个房间作为起始位置，当某个房间存在从起始位置到该房间的路径时，则称该房间为已连接。该算法还会维护一个已连接房间的列表，这些房间拥有尚未连接的邻居房间。该算法的伪代码如下：\n\
    \n*   选择一个房间作为起始位置；将其标记为已连接并添加到列表中。\n*   当列表中仍有房间时：\n    *   将 `currentRoom` 设为列表中最晚添加的房间。\n\
    \    *   如果 `currentRoom` 有任何未连接的邻居，\n        *   将 `nextRoom` 设为 `currentRoom`\
    \ 的一个随机未连接邻居；\n        *   移除 `currentRoom` 和 `nextRoom` 之间的墙壁；\n        *   将\
    \ `nextRoom` 标记为已连接；并且\n        *   将 `nextRoom` 添加到列表末尾。\n*   如果 `currentRoom`\
    \ 没有任何未连接的邻居，则将其从列表中移除。\n\n当该算法完成时，不再有已连接且拥有未连接邻居的房间；所有房间都已连接！该算法生成的迷宫如图 14-3\
    \ 所示。\n\n![A352797_2_En_14_Fig3_HTML.jpg](img/A352797_2_En_14_Fig3_HTML.jpg)\n\
    \n图 14-3.\n\n使用深度优先算法生成的示例迷宫\n\n顾名思义，深度优先算法会创建在网格中随机移动的路径，尽可能长（或深）地延伸，直到路径到达死胡同（一个没有相邻未连接房间的房间）。此时，将生成另一条路径，从列表中最晚添加的房间分支出去。从图\
    \ 14-3 的示例迷宫可以看出，这通常会生成只包含少数几条非常长且分支点很少的路径的迷宫。为了创建更多的分支点，你可以将 `while` 循环中的第一行改为\
    \ `将 currentRoom 设为列表中的一个随机房间`。这将产生相反的效果：迷宫将不再只有少数几条长路径，而是会产生大量短路径和许多死胡同；图 14-4\
    \ 展示了一些示例。\n\n![A352797_2_En_14_Fig4_HTML.jpg](img/A352797_2_En_14_Fig4_HTML.jpg)\n\
    \n图 14-4.\n"
- fmt: 'Sample mazes generated by always selecting random rooms for branching paths


    The approach you will use in this chapter is a hybrid of these two methods: with
    probability `0.50`, the algorithm will return to a random earlier room in the
    list. This generates mazes with medium-length corridors and more branching paths
    than the depth-first algorithm. Some sample mazes generated using this technique
    are shown in Figure [14-5](#A352797_2_En_14_Chapter.html#Fig5).


    ![A352797_2_En_14_Fig5_HTML.jpg](A352797_2_En_14_Fig5_HTML.jpg)


    Figure 14-5. Sample mazes generated using the hybrid approach


    To implement this algorithm, in the `Room` class, add the following variable declaration:


    ```

    private boolean connected;

    ```


    In the constructor, initialize this variable to `false`:


    ```

    connected = false;

    ```


    Then, add the following methods, which will be used to set and check the value
    of `connected`, determine if any neighboring rooms are connected, and randomly
    select one of the neighboring unconnected rooms:


    ```

    public void setConnected(boolean b)

    {  connected = b;  }

    public boolean isConnected()

    {  return connected;  }

    public boolean hasUnconnectedNeighbor()

    {

    for (int direction : directionArray)

    {

    if ( hasNeighbor(direction) && !getNeighbor(direction).isConnected() )

    return true;

    }

    return false;

    }

    public Room getRandomUnconnectedNeighbor()

    {

    ArrayList directionList = new ArrayList();

    for (int direction : directionArray)

    {

    if ( hasNeighbor(direction) && !getNeighbor(direction).isConnected() )

    directionList.add(direction);

    }

    int directionIndex = (int)Math.floor( Math.random() * directionList.size() );

    int direction = directionList.get(directionIndex);

    return getNeighbor(direction);

    }

    ```


    Next, these methods will be used when creating the maze. In the constructor of
    the `Maze` class, after the code that sets the neighbor data for each room, add
    the following:


    ```

    ArrayList activeRoomList = new ArrayList();

    Room currentRoom = roomGrid[0][0];

    currentRoom.setConnected(true);

    activeRoomList.add(0, currentRoom);

    // chance of returning to a random connected room

    //  to create a branching path from that room

    float branchProbability = 0.5f;

    while (activeRoomList.size() > 0)

    {

    if (Math.random() < branchProbability)

    {

    // get random previously visited room

    int roomIndex = (int)(Math.random() * activeRoomList.size());

    currentRoom = activeRoomList.get(roomIndex);

    }

    else

    {

    // get the most recently visited room

    currentRoom = activeRoomList.get(activeRoomList.size() - 1);

    }

    if ( currentRoom.hasUnconnectedNeighbor() )

    {

    Room nextRoom = currentRoom.getRandomUnconnectedNeighbor();

    currentRoom.removeWallsBetween(nextRoom);

    nextRoom.setConnected( true );

    activeRoomList.add(0, nextRoom);

    }

    else

    {

    // this room has no more adjacent unconnected rooms

    //   so there is no reason to keep it in the list

    activeRoomList.remove( currentRoom );

    }

    }

    ```


    The final addition you will make to the maze-generation algorithm is the removal
    of a random number of walls. This is important to create looping paths, which
    will give the player multiple options to maneuver the hero around the maze and
    avoid the ghost that is constantly approaching. The results will be similar to
    the mazes pictured in Figure [14-6](#A352797_2_En_14_Chapter.html#Fig6).


    ![A352797_2_En_14_Fig6_HTML.jpg](A352797_2_En_14_Fig6_HTML.jpg)


    Figure 14-6. Mazes with additional walls removed at random to create multiple
    paths between locations


    To accomplish this task, at the end of the `constructor` method in the `Maze`
    class, add the following code. The value of `wallsToRemove` may be adjusted as
    you wish.


    ```

    int wallsToRemove = 24;

    while (wallsToRemove > 0)

    {

    int gridX = (int)Math.floor( Math.random() * roomCountX );

    int gridY = (int)Math.floor( Math.random() * roomCountY );

    int direction = (int)Math.floor( Math.random() * 4 );

    Room room = roomGrid[gridX][gridY];

    if ( room.hasNeighbor(direction) && room.hasWall(direction) )

    {

    room.removeWalls(direction);

    wallsToRemove--;

    }

    }

    ```


    At this point, the maze generation is complete, and you are ready to add the hero:
    the character controlled by the player.


    ## The Hero


    The next addition to the Maze Runman game is the hero character, who will navigate
    the maze. The character will feature walking animations in each of the four compass
    directions (north, south, east, and west), seen in the spritesheet shown in Figure
    [14-7](#A352797_2_En_14_Chapter.html#Fig7).[¹](#A352797_2_En_14_Chapter.html#Fn1)


    ![A352797_2_En_14_Fig7_HTML.jpg](A352797_2_En_14_Fig7_HTML.jpg)


    Figure 14-7. Spritesheet used for four-directional hero animation


    The code for setting up the animations and the logic for determining which animation
    should be used (based on the angle of motion) is identical to the code from the
    Treasure Quest game in Chapter [12](#A352797_2_En_12_Chapter.html). For further
    details, you can review the explanations in the corresponding section. Create
    a new class named `Hero` as follows:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.utils.Array;

    public class Hero extends BaseActor

    {

    Animation north;

    Animation south;

    Animation east;

    Animation west;

    public Hero(float x, float y, Stage s)

    {

    super(x,y,s);

    String fileName = "assets/hero.png";

    int rows = 4;

    int cols = 3;

    Texture texture = new Texture(Gdx.files.internal(fileName), true);

    int frameWidth = texture.getWidth() / cols;

    int frameHeight = texture.getHeight() / rows;

    float frameDuration = 0.2f;

    TextureRegion[][] temp = TextureRegion.split(texture, frameWidth, frameHeight);

    Array textureArray = new Array();

    for (int c = 0; c = 45 && angle  135 && angle = 225 && angle <= 315)

    setAnimation(south);

    else

    setAnimation(east);

    }

    applyPhysics(dt);

    }

    }

    ```


    Then, to incorporate the hero into the game, in the `LevelScreen` class, add the
    following variable declaration:


    ```

    Hero hero;

    ```


    To set up and place the hero in the lower-left corner of the maze, add the following
    to the `initialize` method:


    ```

    hero = new Hero(0,0,mainStage);

    hero.centerAtActor( maze.getRoom(0,0) );

    ```


    Finally, to add collision detection between the hero and the walls, in the `update`
    method, add the following:


    ```

    for (BaseActor wall : BaseActor.getList(mainStage, "Wall"))

    {

    hero.preventOverlap(wall);

    }

    ```


    At this point, you can test the program and press the arrow keys to move the hero
    throughout the maze.'
