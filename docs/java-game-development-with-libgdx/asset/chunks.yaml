    \ 初始化带有墙壁的房间网格\n\n第二步将是移除一系列墙壁，以便你可以从任何一个房间到达其他任何房间。一种可用的算法称为深度优先搜索。在该算法中，选择一个房间作为起始位置，当一个房间存在从起始位置到该房间的路径时，称该房间为已连接。该算法还维护一个已连接房间的列表，这些房间拥有未连接的邻居。该算法的伪代码如下：\n\
    \n*   选择一个房间作为起始位置；将其标记为已连接并添加到列表中。\n*   当列表中仍有房间时：\n    *   将`currentRoom`设为列表中最晚添加的房间。\n\
    \    *   如果`currentRoom`有任何未连接的邻居：\n        *   将`nextRoom`设为`currentRoom`的一个随机未连接邻居；\n\
    \        *   移除`currentRoom`和`nextRoom`之间的墙壁；\n        *   将`nextRoom`标记为已连接；并且\n\
    \        *   将`nextRoom`添加到列表末尾。\n    *   如果`currentRoom`没有任何未连接的邻居，则将其从列表中移除。\n\
    \n当此算法完成时，不再有拥有未连接邻居的已连接房间；所有房间都已连接！该算法生成的迷宫如图14-3所示。\n\n![A352797_2_En_14_Fig3_HTML.jpg](A352797_2_En_14_Fig3_HTML.jpg)\n\
