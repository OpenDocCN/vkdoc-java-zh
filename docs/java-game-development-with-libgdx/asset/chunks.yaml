    not keypress data should still be added to the `SongData` object. Somewhat surprisingly,
    it is difficult to determine the length of a music file using Java, and so the
    `lastSongPosition` variable is used to keep track of the song position while the
    song is playing, and as soon as the song is finished playing, the value of `lastSongPosition`
    is written to the `SongData` object as the song’s duration. As expected, the `loadButton`
    and `saveButton` objects make use of the methods provided by the `FileUtils` class
    that you wrote earlier.


    To run this application, you need two more classes, as usual: one that extends
    the `BaseGame` class, and a `launcher` class. To this end, first create a new
    class called `RecorderGame` with the following code:


