    # 17. 旅程继续


    本章将介绍在继续游戏开发过程中需要考虑的各种步骤。其中包括探索其他项目、学习相关领域的技能，以及将你的游戏带给更广泛的受众。在此过程中，本章将提供各类资源列表，以及针对许多情况的通用建议。


