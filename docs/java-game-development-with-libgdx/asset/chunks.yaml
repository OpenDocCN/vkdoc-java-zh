  raw: '### Explosion Effect


    A classic effect that you will now create is an explosion, as illustrated in Figure
    [15-6](#A352797_2_En_15_Chapter.html#Fig6). This effect is composed of two emitters,
    one controlling the fire that appears initially, and the other controlling the
    smoke that appears afterward.


    ![A352797_2_En_15_Fig6_HTML.jpg](A352797_2_En_15_Fig6_HTML.jpg)


    Figure 15-6.


    The explosion particle effect


    Restart the Particle Editor. As before, create a new emitter. Name it `fire` and
    then delete the default emitter. You’ll keep the default option settings: the
    “Additive” checkbox should be selected, and the “Continuous” checkbox should not
    be.


    Adjust the Count property’s Max value to 100\. Change the Duration value to 250\.
    To attain the maximum number of particles, change the Emission property’s High
    value to 400\. Set the Size property’s High value to range from 0 to 100, and
    modify the graph so that it resembles the Gradual Decrease graph. Set the Velocity
    property to Active, set its High value to range from 0 to 160, and modify its
    graph so that it resembles the Sudden Decrease graph. Set the Angle property to
    Active and set its High value to range from 0 to 360\. Finally, set the Tint property
    so that the color changes from red to orange over the course of the particle lifetime.


    At this point, the Preview panel should be displaying the following effect repeatedly:
    a globule shape appears, red at the borders and yellow in the center, which then
    expels fragments that shrink as they move away from the center.


    Once you are pleased with this effect, create another emitter and name it `smoke`.
    (Do not delete the fire emitter!) Select the smoke emitter from the list and click
    the Up button; this moves it higher up in the rendering order. Make sure that
    the checkbox next to the emitter is checked for it to be seen. This is important
    because you want the smoke particles to appear behind the fire particles, and
    so the smoke particles must be rendered first. Before continuing, make sure that
    in the emitter list, the smoke emitter is both checked (so it is visible) and
    highlighted (so that the parameters that will be changed are those of the smoke
    emitter).


    The next step is to change the smoke emitter properties. Set the Count Max value
    to 20, the Duration value to 200, and the Emission High value to 100\. Set the
    Delay property to Active and set its value to 400; this will cause the smoke emitter
    to begin 400 milliseconds after the fire emitter has started. Next, change the
    Size High value to 64\. Activate the Velocity property, set the High value to
    100, and modify the graph so that it is gradually decreasing. Also, activate the
    Angle property and set the High value to range from 0 to 360\. Change the Tint
    color to a medium shade of gray by dragging the knob on the lower-left color slider
    all the way to the right and then dragging the knob on the lower-right color slider
    to the middle. Modify the Transparency graph so that it is slowly decreasing.
    Last of all, uncheck the “Additive” option.


    This completes the explosion effect! Save your file to the `assets` directory
    with the filename `explosion.pfx`.


    ### The ParticleActor Class


    At this point, you are ready to integrate particle effects into the Space Rocks
    game. You will first create an extension of the `Actor` class, called `ParticleActor`.
    This class stores a `ParticleEffect` object, which is used to update and draw
    the effect. Most of the methods in this class simply activate the methods of the
    corresponding `ParticleEffect` object, with somewhat more intuitive names. However,
    one feature missing from the `ParticleEffect` class is that its `draw` method
    is not designed to take into account rotation or scaling factors. To address this
    situation, you will create an inner class called `ParticleRenderer` that renders
    the particle effect, make the `ParticleActor` class extend the `Group` class instead
    of the `Actor` class, and add an instance of the `ParticleRenderer` to the `ParticleActor`.
    In this way, calling the `ParticleActor draw` method will apply the geometric
    transformation data to the attached object before it is drawn, which is the desired
    outcome.


    The `update` and `draw` methods of the `ParticleEffect` class will be activated
    by the standard `act` and `draw` methods common to all `Actor` objects, and a
    `clone` method will be included for convenience. Open BlueJ, then open the `Space
    Rocks Particles` project you created earlier. The code for the `ParticleActor`
    class is as follows:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.scenes.scene2d.Group;

    import com.badlogic.gdx.graphics.g2d.Batch;

    import com.badlogic.gdx.graphics.g2d.ParticleEffect;

    import com.badlogic.gdx.graphics.g2d.ParticleEmitter;

    public class ParticleActor extends Group

    {

    private ParticleEffect   effect;

    private ParticleRenderer renderingActor;

    private class ParticleRenderer extends Actor

    {

    private ParticleEffect effect;

    ParticleRenderer(ParticleEffect e)

    {  effect = e;  }

    public void draw(Batch batch, float parentAlpha)

    {  effect.draw(batch);  }

    }

    public ParticleActor(String pfxFile, String imageDirectory)

    {

    super();

    effect = new ParticleEffect();

    effect.load(Gdx.files.internal(pfxFile), Gdx.files.internal(imageDirectory));

    renderingActor = new ParticleRenderer(effect);

    this.addActor( renderingActor );

    }

    public void start()

    {  effect.start();  }

    // pauses continuous emitters

    public void stop()

    {  effect.allowCompletion();  }

    public boolean isRunning()

    {  return !effect.isComplete();  }

    public void centerAtActor(Actor other)

    {

    setPosition( other.getX() + other.getWidth()/2 , other.getY() + other.getHeight()/2
    );

    }

    public void act(float dt)

    {

    super.act( dt );

    effect.update( dt );

    if ( effect.isComplete() && !effect.getEmitters().first().isContinuous() )

    {

    effect.dispose();

    this.remove();

    }

    }

    public void draw(Batch batch, float parentAlpha)

    {

    super.draw( batch, parentAlpha );

    }

    }

    ```


    With this class ready for action, you can use it, together with the particle effects
    you recently generated, in the Space Rocks game.'
  trans: '

    ### 爆炸效果


    接下来要创建的是一个经典效果——爆炸，如图 15-6 所示。该效果由两个发射器组成：一个控制初始出现的火焰，另一个控制随后产生的烟雾。


    ![A352797_2_En_15_Fig6_HTML.jpg](img/A352797_2_En_15_Fig6_HTML.jpg)


    图 15-6.


    爆炸粒子效果


    重新启动粒子编辑器。像之前一样，创建一个新的发射器。将其命名为 `fire`，然后删除默认发射器。保留默认选项设置：勾选“Additive”复选框，不勾选“Continuous”复选框。


    将 Count 属性的 Max 值调整为 100。将 Duration 值改为 250。为了达到最大粒子数量，将 Emission 属性的 High 值设为
    400。将 Size 属性的 High 值范围设为 0 到 100，并修改其曲线图，使其类似于“逐渐减小”曲线。将 Velocity 属性设为 Active，将其
    High 值范围设为 0 到 160，并修改其曲线图，使其类似于“突然减小”曲线。将 Angle 属性设为 Active，并将其 High 值范围设为 0
    到 360。最后，设置 Tint 属性，使粒子颜色在其生命周期内从红色渐变为橙色。


    此时，预览面板应反复显示以下效果：出现一个球状物，边缘为红色，中心为黄色，随后喷射出碎片，这些碎片在远离中心时逐渐缩小。


    当您对这个效果满意后，创建另一个发射器并将其命名为 `smoke`。（不要删除 fire 发射器！）从列表中选择 smoke 发射器，然后点击“Up”按钮；这会将其在渲染顺序中上移。确保发射器旁边的复选框已勾选，以便其可见。这一点很重要，因为您希望烟雾粒子出现在火焰粒子之后，因此烟雾粒子必须首先渲染。在继续之前，请确保在发射器列表中，smoke
    发射器既已勾选（可见）又处于高亮状态（以便接下来修改的是 smoke 发射器的参数）。


    下一步是修改烟雾发射器的属性。将 Count Max 值设为 20，Duration 值设为 200，Emission High 值设为 100。将 Delay
    属性设为 Active，并将其值设为 400；这将使烟雾发射器在火焰发射器启动 400 毫秒后开始工作。接下来，将 Size High 值改为 64。激活
    Velocity 属性，将 High 值设为 100，并修改其曲线图，使其逐渐减小。同时，激活 Angle 属性，将 High 值范围设为 0 到 360。通过将左下角颜色滑块上的旋钮一直拖到右侧，然后将右下角颜色滑块上的旋钮拖到中间，将
    Tint 颜色改为中灰色。修改 Transparency 曲线图，使其缓慢减小。最后，取消勾选“Additive”选项。


    至此，爆炸效果就完成了！将文件保存到 `assets` 目录，文件名为 `explosion.pfx`。


    ### ParticleActor 类


    现在，您可以将粒子效果集成到 Space Rocks 游戏中。首先，创建一个 `Actor` 类的扩展，命名为 `ParticleActor`。该类存储一个
    `ParticleEffect` 对象，用于更新和绘制效果。该类中的大多数方法只是以更直观的名称激活相应 `ParticleEffect` 对象的方法。然而，`ParticleEffect`
    类缺少的一个功能是，其 `draw` 方法并未设计为考虑旋转或缩放因子。为了解决这个问题，您将创建一个名为 `ParticleRenderer` 的内部类来渲染粒子效果，让
    `ParticleActor` 类继承 `Group` 类而非 `Actor` 类，并将 `ParticleRenderer` 的实例添加到 `ParticleActor`
    中。这样，调用 `ParticleActor` 的 `draw` 方法时，会在绘制前将几何变换数据应用于附加的对象，这正是期望的结果。


    `ParticleEffect` 类的 `update` 和 `draw` 方法将通过所有 `Actor` 对象共有的标准 `act` 和 `draw` 方法来激活，并且为了方便，还将包含一个
    `clone` 方法。打开 BlueJ，然后打开您之前创建的 `Space Rocks Particles` 项目。`ParticleActor` 类的代码如下：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.scenes.scene2d.Group;

    import com.badlogic.gdx.graphics.g2d.Batch;

    import com.badlogic.gdx.graphics.g2d.ParticleEffect;

    import com.badlogic.gdx.graphics.g2d.ParticleEmitter;

    public class ParticleActor extends Group

    {

    private ParticleEffect   effect;

    private ParticleRenderer renderingActor;

    private class ParticleRenderer extends Actor

    {

    private ParticleEffect effect;

    ParticleRenderer(ParticleEffect e)

    {  effect = e;  }

    public void draw(Batch batch, float parentAlpha)

    {  effect.draw(batch);  }

    }

    public ParticleActor(String pfxFile, String imageDirectory)

    {

    super();

    effect = new ParticleEffect();

    effect.load(Gdx.files.internal(pfxFile), Gdx.files.internal(imageDirectory));

    renderingActor = new ParticleRenderer(effect);

    this.addActor( renderingActor );

    }

    public void start()

    {  effect.start();  }

    // 暂停连续发射器

    public void stop()

    {  effect.allowCompletion();  }

    public boolean isRunning()

    {  return !effect.isComplete();  }

    public void centerAtActor(Actor other)

    {

    setPosition( other.getX() + other.getWidth()/2 , other.getY() + other.getHeight()/2
    );

    }

    public void act(float dt)

    {

    super.act( dt );

    effect.update( dt );

    if ( effect.isComplete() && !effect.getEmitters().first().isContinuous() )

    {

    effect.dispose();

    this.remove();

    }

    }

    public void draw(Batch batch, float parentAlpha)

    {

    super.draw( batch, parentAlpha );

    }

    }

    ```


    有了这个可用的类，您就可以将其与您刚刚生成的粒子效果一起，在 Space Rocks 游戏中使用。

