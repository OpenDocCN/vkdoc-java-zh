- fmt: '#### Methods


    *   `void act(float dt)` Automatically called by the `Stage` to which this actor
    is attached.

    *   `void draw(Batch batch, float parentAlpha)` Automatically called by the `Stage`
    to which this actor is attached; keeps the map camera position in sync with the
    stage camera position and renders the map to the screen.

    *   `ArrayList<MapObject> getRectangleList(String propertyName)` Searches the
    map layers for `Rectangle` objects that contain a property (key) called `"name"`
    with associated value `propertyName`; typically used to store non-actor information
    such as spawn-point locations or dimensions of `Solid` objects.

    *   `ArrayList<MapObject> getTileList(String propertyName)` Searches the map layers
    for Tile Objects (tile-like elements of object layers) that contain a property
    (key) called `"name"` with associated value `propertyName`; typically used to
    store actor information and to create instances.'
  raw: '#### Methods


    *   `void act(float dt)` Automatically called by the `Stage` to which this actor
    is attached

    *   `void draw(Batch batch, float parentAlpha)` Automatically called by the `Stage`
    to which this actor is attached; keeps the map camera position in sync with the
    stage camera position and renders the map to the screen.

    *   `ArrayList<MapObject> getRectangleList(String propertyName)` Searches the
    map layers for Rectangle objects that contain a property (key) called "name" with
    associated value `propertyName` ; typically used to store non-actor information
    such as spawn-point locations or dimensions of `Solid` objects.

    *   `ArrayList<MapObject> getTileList(String propertyName)` Searches the map layers
    for Tile Objects (tile-like elements of object layers) that contain a property
    (key) called “name” with associated value `propertyName` ; typically used to store
    actor information and to create instances.'
  trans: '

    #### 方法


    *   `void act(float dt)` 由该演员所附加的`Stage`自动调用

    *   `void draw(Batch batch, float parentAlpha)` 由该演员所附加的`Stage`自动调用；使地图摄像机位置与舞台摄像机位置保持同步，并将地图渲染到屏幕上。

    *   `ArrayList<MapObject> getRectangleList(String propertyName)` 在地图图层中搜索包含名为“name”的属性（键）且关联值为`propertyName`的矩形对象；通常用于存储非演员信息，例如生成点位置或`Solid`对象的尺寸。

    *   `ArrayList<MapObject> getTileList(String propertyName)` 在地图图层中搜索包含名为“name”的属性（键）且关联值为`propertyName`的瓦片对象（对象图层中类似瓦片的元素）；通常用于存储演员信息并创建实例。

    '
