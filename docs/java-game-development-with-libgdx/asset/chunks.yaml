    ## The Sword


    Next, you will add a sword to the game; pressing the `S` key will make the sword
    appear. The hero will appear to swing the sword in an arc, and then the sword
    will disappear. The first challenge in this process is making the sword appear
    in the correct location, consistent with the animation currently being displayed.
    In this game, you will assume the hero is right handed, and so the hilt of the
    sword should appear at the location of the hero’s right hand , as shown in Figure
    [12-8](#A352797_2_En_12_Chapter.html#Fig8). This position, relative to the bottom-left
    corner of the hero image, will be stored as a percentage of the width and height
    of the hero graphic.


    ![A352797_2_En_12_Fig8_HTML.jpg](A352797_2_En_12_Fig8_HTML.jpg)


    Figure 12-8.


    The position of the hero’s right hand , marked with an X, in each directional
    image


    In addition, once the sword has been placed correctly, it will be swung through
    a 90-degree arc, as illustrated in Figure [12-9](#A352797_2_En_12_Chapter.html#Fig9)
    . This can be accomplished by setting the initial rotation to 45 degrees less
    than the angle at which the hero is facing, then using an action to rotate the
    sword by 90 degrees (counter-clockwise). Since the sword should rotate around
    its hilt (not the center), the x-coordinate of the origin should be set to 0.


    ![A352797_2_En_12_Fig9_HTML.jpg](A352797_2_En_12_Fig9_HTML.jpg)


    Figure 12-9.


    Arc of rotation used when swinging the sword


    Finally, instead of spawning a new sword object every time the player presses
    the S key, there will be a single instance of the sword object, visible only when
    the hero is swinging the sword. In addition, while swinging the sword, the hero
    will stop moving, and the sword cannot be swung a second time until the first
    swing is completed (indicated by the sword becoming invisible again). To implement
    all these features, begin by creating a new class named `Sword` with the following
    code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Sword extends BaseActor

    {

    public Sword(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/sword.png");

    }

    }

    ```


    Next, in the `LevelScreen` class , add the following `import` statements:


    ```

    import com.badlogic.gdx.math.Vector2;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    Then, add the following variable declaration:


    ```

    Sword sword;

    ```


    In the `initialize` method , set up the sword as follows:


    ```

    sword = new Sword(0,0, mainStage);

    sword.setVisible(false);

    ```


    In the `update` method , to stop the hero from moving during a sword swing, locate
    the `if` statements corresponding to hero acceleration and enclose them in a conditional
    statement as follows:


    ```

    if ( !sword.isVisible() )

    {

    // hero movement controls

    // (code omitted below)

    }

    ```


    To handle the actual swinging of the sword, add the following method to the `LevelScreen`
    class:


    ```

    public void swingSword()

    {

    // visibility determines if sword is currently swinging

    if ( sword.isVisible() )

    return;

    hero.setSpeed(0);

    float facingAngle = hero.getFacingAngle();

    Vector2 offset = new Vector2();

    if (facingAngle == 0)

    offset.set( 0.50f, 0.20f );

    else if (facingAngle == 90)

    offset.set( 0.65f, 0.50f );

    else if (facingAngle == 180)

    offset.set( 0.40f, 0.20f );

    else // facingAngle == 270

    offset.set( 0.25f, 0.20f );

    sword.setPosition( hero.getX(), hero.getY() );

    sword.moveBy( offset.x * hero.getWidth(), offset.y * hero.getHeight() );

    float swordArc = 90;

    sword.setRotation(facingAngle - swordArc/2);

    sword.setOriginX(0);

    sword.setVisible(true);

    sword.addAction( Actions.rotateBy(swordArc, 0.25f) );

    sword.addAction( Actions.after( Actions.visible(false) ) );

    // hero should appear in front of sword when facing north or west

    if (facingAngle == 90 || facingAngle == 180)

    hero.toFront();

    else

    sword.toFront();

    }

    ```


    Finally, to enable the player to swing the sword, as this is a discrete action,
    you need to add a `keyDown` method to the `LevelScreen` class:


    ```

    public boolean keyDown(int keycode)

    {

    if (keycode == Keys.S)

    swingSword();

    return false;

    }

