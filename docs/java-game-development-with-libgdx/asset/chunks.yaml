    # Signs and Dialog Boxes


    Many games feature signs that the player’s character can read or non-player characters
    (NPCs) with whom the player can have a conversation. These types of game elements
    can serve a variety of purposes, such as:


    - an in-game tutorial or instructions;

    - directions to locations in a large game environment (for example, a sign that
    reads “South - Item Shop”); or

    - hints or guidance (for example, an NPC that says “I’ve heard rumors that there
    is a treasure hidden in the western part of the forest”).


    In this section, you will learn how to create dialog boxes to temporarily display
    the text corresponding to such an interaction, as shown in Figure 5-14.


    ![A352797_2_En_5_Fig14_HTML.jpg](A352797_2_En_5_Fig14_HTML.jpg)


    # Figure 5-14


    Turtle reading a sign in the Starfish Collector game


    In particular, you will eventually create a class called `DialogBox` that stores
    a background image and a label and has a set of methods that can be used to easily
    configure its appearance. You will position the dialog box on the screen using
    the `Table` class functionality you recently added to the `BaseScreen` class.
