  trans: '

    ## 总结与下一步


    在本章中，你扩展了正在构建的自定义框架，使游戏程序能够响应离散输入。利用这一功能，你创建了太空主题的射击游戏《太空岩石》，该游戏引入了新的移动方式以及射击激光和传送等离散动作。创建这第二个游戏也展示了游戏框架的灵活性，并为运用上一章介绍的功能提供了极佳的实践机会。


    此时，你可能想添加一个在游戏开始前显示的启动菜单界面，就像你在上一章所做的那样。你也可能想添加或修改当前游戏中的各种功能。例如，在测试游戏玩法后，你可能会意识到游戏相对简单：通过原地旋转并尽可能快地发射激光，你就能相对快速地获胜。为了解决这个问题，你可以增加岩石数量、让岩石变小、让岩石移动更快，或者结合这些功能。另外（或此外），你可能想限制飞船发射激光的频率。实现这一点的最简单方法是在`Spaceship`类的`shoot`方法中添加另一个条件，检查舞台上激光的数量是否超过某个值，如果是，则立即从该方法返回（在生成新的激光对象之前）。此外，你可以从原版《小行星》游戏中汲取灵感：当岩石与激光碰撞时，让它生成两个更小的岩石；只有当岩石“足够小”（其宽度或高度小于某个特定值）时，它们才会被永久摧毁而不再生成额外的岩石。另外，为了增加挑战性，你可以添加一个新对象：一个
    UFO，它会定期在屏幕外生成，并沿直线移动到对侧，如果与飞船接触，则会摧毁飞船。最后，如果所有这些新增内容使游戏变得过于困难，你可以添加一个“能量增强”功能：一个名为`PowerUp`的新对象，当岩石被摧毁时有一定几率生成，如果玩家收集到（碰撞到）它，飞船的护盾能量将恢复至
    100%。


    在下一章中，你将把注意力转向用户界面设计和文本显示，这是游戏开发中需要掌握的一项基本技能。


    脚注 1


    虽然你可以实现多个接口，但一次只能扩展一个类。


    # 5. 文本与用户界面


    在本章中，你将学习如何显示文本、创建显示图像或文本的按钮，以及使用表格设计用户界面。首先，你将通过将这些功能添加到第 3 章的《海星收集者》游戏中来学习这些技能，如图
    5-1 所示。然后，你将在学习如何创建过场动画（有时称为游戏内动画）的过程中巩固并加强这些技能，过场动画能为你的游戏提供叙事元素；《海星收集者》的一个过场动画如图
    5-2 所示。


    ![A352797_2_En_5_Fig2_HTML.jpg](img/A352797_2_En_5_Fig2_HTML.jpg)


    图 5-2.


    《海星收集者》游戏的过场动画


    ![A352797_2_En_5_Fig1_HTML.jpg](img/A352797_2_En_5_Fig1_HTML.jpg)


    图 5-1.


    具有改进用户界面的《海星收集者》游戏


    在可选的最后一部分中，你将创建一个视觉小说风格的游戏，该游戏侧重于故事，并允许玩家决定故事的发展方向；你将创建的游戏名为《失踪的作业》，如图 5-3 所示。


    ![A352797_2_En_5_Fig3_HTML.jpg](img/A352797_2_En_5_Fig3_HTML.jpg)


    图 5-3.


    视觉小说风格游戏《失踪的作业》的截图


    首先，复制你之前在第 3 章中创建的项目，即修订版的《海星收集者》游戏，并将项目文件夹的副本重命名为`Starfish Collector Ch 5`（以避免与早期版本混淆）。然后，在项目文件夹中，将`BaseGame.java`、`BaseScreen.java`和`BaseActor.java`文件替换为你在第
    4 章中更新了新功能和特性的版本。为了确保第 4 章中引入的`InputMultiplexer`对象被正确初始化，请在`StarfishGame`类的`create`方法开头添加以下代码行：


    ```

    super.create();

    ```


    接下来，从本书网站下载本章的源代码文件，将下载项目`assets`文件夹中的文件复制到你新项目的`assets`文件夹中，并对`+libs`文件夹（或`userlib`文件夹，如果你之前选择了该选项）中的
    JAR 文件执行相同操作。在这两个文件夹中，之前项目中使用的文件没有更改（因此你可以保留旧文件的副本），但已添加了你需要的新文件。如果 BlueJ 正在运行，请关闭并重新启动，以便
    BlueJ 正确识别新添加到`+libs`文件夹中的 JAR 文件。此时，你可以编译并运行项目，以验证一切是否仍像以前一样正常工作。


    ## 显示文本


    在 LibGDX 框架中，文本通过`Label`对象显示。标签使用一个`String`（包含要显示的文本）和一个`LabelStyle`对象进行初始化，该对象决定了文本的渲染方式。创建`LabelStyle`对象又需要一个`BitmapFont`对象。以下部分将向你展示如何创建和使用这些对象。


    为了在游戏中创建一致的设计，你很可能希望创建一个可在多个屏幕间共享的单一样式。因此，初始化这些对象的最佳位置是在某个派生自`Game`的类中，而不是派生自`Screen`的类中。由于每个项目只有一个`Game`对象实例，你可以通过定义公共静态变量来简化对此信息的访问，并且由于这段代码对未来的项目也有用，因此将其添加到`BaseGame`类中（而不是`StarfishGame`类）。为此，在`BaseGame`类中添加以下`import`语句：


    ```

    import com.badlogic.gdx.graphics.g2d.BitmapFont;

    import com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;

    ```


    在类中添加以下变量声明：


    ```

    public static LabelStyle labelStyle;

    ```


    在`create`方法中，添加以下代码来初始化标签样式：


    ```

    labelStyle = new LabelStyle();

    labelStyle.font = new BitmapFont();

    ```


    构造函数创建的默认字体是 LibGDX 库中包含的 15 号 Arial 字体。这对于你的应用程序来说可能太小了，因此以下部分将演示如何在你的应用程序中创建和使用自定义字体。

