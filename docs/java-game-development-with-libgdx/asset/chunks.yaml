  trans: '

    ## 激光、岩石与爆炸


    接下来，你将添加飞船发射的激光。与飞船类似，激光会环绕屏幕；与曲速效果类似，激光会在短暂延迟后自动淡出并从游戏中移除。（如果激光永久存在，游戏就会过于强大。）与飞船不同的是，激光以恒定速度飞行，因此无需设置加速度值，而是直接设定激光对象的速度，并将减速度设为
    0。使用以下代码创建一个名为`Laser`的新类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Laser extends BaseActor

    {

    public Laser(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/laser.png");

    addAction( Actions.delay(1) );

    addAction( Actions.after( Actions.fadeOut(0.5f) ) );

    addAction( Actions.after( Actions.removeActor() ) );

    setSpeed(400);

    setMaxSpeed(400);

    setDeceleration(0);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    wrapAroundWorld();

    }

    }

    ```


    为了发射激光，你需要在`Spaceship`类中添加以下方法；与`warp`方法类似，它将在`LevelScreen`类的`keyDown`方法中被激活。在`Spaceship`类中添加以下代码：


    ```

    public void shoot()

    {

    if ( getStage() == null )

    return;

    Laser laser = new Laser(0,0, this.getStage());

    laser.centerAtActor(this);

    laser.setRotation( this.getRotation() );

    laser.setMotionAngle( this.getRotation() );

    }

    ```


    在`LevelScreen`类的`keyDown`方法中，添加以下代码：


    ```

    if ( keycode == Keys.SPACE )

    spaceship.shoot();

    ```


    此时运行游戏，你就能发射激光了！


    接下来，你将在游戏中添加一些岩石对象，作为射击目标。与激光类似，它们会环绕屏幕并以恒定速度飞行。每块岩石都会有一个基于数值的动画（旋转）来增加视觉趣味。为了增加游戏的不可预测性，你将使用
    LibGDX 的`MathUtils`类中的`random`函数，对旋转速度和移动速度进行小幅随机化。使用以下代码创建一个名为`Rock`的新类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    import com.badlogic.gdx.math.MathUtils;

    public class Rock extends BaseActor

    {

    public Rock(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/rock.png");

    float random = MathUtils.random(30);

    addAction( Actions.forever( Actions.rotateBy(30 + random, 1) ) );

    setSpeed(50 + random);

    setMaxSpeed(50 + random);

    setDeceleration(0);

    setMotionAngle( MathUtils.random(360) );

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    wrapAroundWorld();

    }

    }

    ```


    为了让岩石出现，你需要在`LevelScreen`类的`initialize`方法中使用以下代码创建一些岩石。请注意，岩石被放置在飞船周围一定距离的位置。这给了玩家在游戏开始时公平的机会，让飞船避开岩石的路径。


    ```

    new Rock(600,500, mainStage);

    new Rock(600,300, mainStage);

    new Rock(600,100, mainStage);

    new Rock(400,100, mainStage);

    new Rock(200,100, mainStage);

    new Rock(200,300, mainStage);

    new Rock(200,500, mainStage);

    new Rock(400,500, mainStage);

    ```


    在添加控制飞船、岩石和激光如何交互的代码之前，你将添加一个爆炸特效，它使用基于图像的动画，并在动画完成后从舞台上移除自身。使用以下代码创建一个名为`Explosion`的新类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Explosion extends BaseActor

    {

    public Explosion(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/explosion.png", 6, 6, 0.03f, false);

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( isAnimationFinished() )

    remove();

    }

    }

    ```


    最后，你将处理岩石与飞船及激光之间的交互。在`LevelScreen`类的`update`方法中，添加以下代码：


    ```

    for ( BaseActor rockActor : BaseActor.getList(mainStage, "Rock") )

    {

    if (rockActor.overlaps(spaceship))

    {

    if (spaceship.shieldPower <= 0)

    {

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(spaceship);

    spaceship.remove();

    spaceship.setPosition(-1000,-1000);

    }

    else

    {

    spaceship.shieldPower -= 34;

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(rockActor);

    rockActor.remove();

    }

    }

    for ( BaseActor laserActor : BaseActor.getList(mainStage, "Laser") )

    {

    if (laserActor.overlaps(rockActor))

    {

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(rockActor);

    laserActor.remove();

    rockActor.remove();

    }

    }

    }

    ```


    请注意，每次碰撞后护盾能量减少 34，这意味着护盾可以承受三次撞击，之后飞船才有被摧毁的危险。另外请注意，即使飞船从舞台上移除，它仍然需要被移出屏幕。从舞台上移除对象会停止其`act`和`draw`方法的运行，但`Spaceship`对象仍保留在程序内存中，在`update`方法中检查时，仍能检测到其最终位置上的碰撞。（这个问题也可以通过修改`BaseActor`的`overlap`方法来解决，当任一对象的`getStage`方法返回`null`时，返回`false`，但此处不采用这种方法。）同样，你可能希望运行游戏并验证一切是否按预期工作；你的游戏现在应该看起来类似于本章开头所示的图
    4-1。


    ## 游戏结束条件


    判断游戏何时结束相对容易。如果飞船在护盾能量小于或等于零时与岩石相撞，则玩家输掉游戏。如果没有剩余的岩石，则玩家赢得游戏。无论哪种情况，都应显示一条消息，向玩家传达此信息并提供结束感（否则，玩家可能会疑惑是否还有未完成的事情）。为此，在`LevelScreen`类中添加以下字段：


    ```

    private boolean gameOver;

    ```


    在`initialize`方法中将其值设置如下：


    ```

    gameOver = false;

    ```


    当玩家输掉游戏时，将创建一个效果使消息淡入，因此你需要添加以下`import`语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    接下来，为了处理输掉游戏的情况，在`update`方法中，紧接在移除飞船的代码之后，添加以下代码：


    ```

    BaseActor messageLose = new BaseActor(0,0, uiStage);

    messageLose.loadTexture("assets/message-lose.png");

    messageLose.centerAtPosition(400,300);

    messageLose.setOpacity(0);

    messageLose.addAction( Actions.fadeIn(1) );

    gameOver = true;

    ```


    最后，为了处理赢得游戏的情况，在`update`方法的末尾添加以下代码：


    ```

    if ( !gameOver && BaseActor.count(mainStage, "Rock") == 0 )

    {

    BaseActor messageWin = new BaseActor(0,0, uiStage);

    messageWin.loadTexture("assets/message-win.png");

    messageWin.centerAtPosition(400,300);

    messageWin.setOpacity(0);

    messageWin.addAction( Actions.fadeIn(1) );

    gameOver = true;

    }

    ```


    像往常一样，测试你的游戏以验证这些更改是否按预期工作。尝试赢得游戏，然后输掉游戏，检查屏幕上是否出现相应的消息。


    恭喜！你已经完成了《太空岩石》游戏所有核心机制的实现。

    '
- fmt: '# Summary and Next Steps


    In this chapter, you extended the custom framework you have been creating to enable
    your game programs to respond to discrete inputs. Using this functionality, you
    created the space-themed shoot-em-up game Space Rocks, which featured a new style
    of movement, and discrete actions, such as shooting lasers and teleporting. Creating
    this second game also illustrates the flexibility of your game framework and provides
    excellent practice in using the features introduced in the previous chapter.


    At this point, you may want to add a start menu screen that is displayed before
    the game begins, as you did in the previous chapter. You may also want to add
    or modify various features currently in the game. For example, after testing the
    gameplay, you will likely realize that the game is relatively easy: by spinning
    in place and shooting lasers as fast as you can, you will win relatively quickly.
    To address this issue, you could add more rocks, make the rocks smaller, make
    the rocks faster, or some combination of these features. Alternatively (or additionally),
    you may want to limit the rate at which the spaceship can fire lasers. The simplest
    way to implement this would be to add another condition in the `Spaceship` class
    `shoot` method that checks if the number of lasers on the stage exceeds a certain
    value, in which case it could return from the method immediately (before spawning
    a new laser object). In addition, you could take inspiration from the original
    Asteroids game, and when a rock collides with a laser have it spawn two smaller
    rocks; only if the rocks are “small enough” (if their width or height is less
    than some particular value) do they get destroyed forever without spawning additional
    rocks. In addition, to add to the challenge, you could add a new object: a UFO
    that spawns periodically off-screen and travels in a straight line to the opposite
    side, destroying the spaceship if it comes into contact with it. Finally, if all
    these additions make the game too challenging, you could add a “power-up” feature:
    a new object called `PowerUp` that has a random chance of spawning when a rock
    is destroyed, and if the player collects (collides with) it, the spaceship’s shield
    power is restored to 100 percent.


    In the next chapter, you will turn your attention to user-interface design and
    displaying text, a fundamental skill you will need to master for game development.


    **Footnotes**


    Although you can implement multiple interfaces, you can only extend a single class
    at a time.


    # Text and User Interfaces


    In this chapter, you will learn how to display text, create buttons that display
    an image or text, and design a user interface using tables. First, you will be
    introduced to these skills by adding these features to the Starfish Collector
    game from Chapter 3, as shown in Figure 5-1. Then, you will build on and strengthen
    these skills while learning how to create cutscenes (sometimes called in-game
    cinematics) that provide a narrative element to your games; a cutscene for Starfish
    Collector is shown in Figure 5-2.


    ![A352797_2_En_5_Fig2_HTML.jpg](A352797_2_En_5_Fig2_HTML.jpg)


    **Figure 5-2.** Cutscene for the Starfish Collector game


    ![A352797_2_En_5_Fig1_HTML.jpg](A352797_2_En_5_Fig1_HTML.jpg)


    **Figure 5-1.** The Starfish Collector game with an improved user interface


    In an optional final section, you will create a visual novel–style game, which
    focuses on a story and allows the player to make decisions about how the story
    proceeds; the game you will create is called The Missing Homework and is illustrated
    in Figure 5-3.


    ![A352797_2_En_5_Fig3_HTML.jpg](A352797_2_En_5_Fig3_HTML.jpg)


    **Figure 5-3.** Screenshot of the visual novel–style game The Missing Homework


    To begin, create a copy of your previous project from Chapter 3, the revised Starfish
    Collector game, and rename the copy of the project folder to `Starfish Collector
    Ch 5` (to avoid confusion with the earlier version). Then, in the project folder,
    replace the files `BaseGame.java`, `BaseScreen.java`, and `BaseActor.java` with
    the versions you updated with new features and functionality in Chapter 4. To
    ensure the `InputMultiplexer` object introduced in Chapter 4 is initialized correctly,
    at the beginning of the `StarfishGame` class `create` method, add the following
    line of code:


    ```

    super.create();

    ```


    Next, download the source code files for this chapter on the website for this
    book, copy the files from the downloaded project’s `assets` folder into your new
    project’s `assets` folder, and do the same for the JAR files in the `+libs` folder
    (or the `userlib` folder, if you chose that option earlier). In both of these
    folders, the files used in previous projects have not been changed (so you can
    keep copies of the old files), but new files have been added that you will need.
    If BlueJ is currently running, close and restart so that the JAR files newly added
    to the `+libs` folder are properly recognized by BlueJ. At this point, you can
    compile and run the project to verify that everything is still working as before.


    ## Displaying Text


    In the LibGDX framework, text is displayed using `Label` objects. Labels are initialized
    with a `String` (containing the text to be displayed) and a `LabelStyle` object,
    which determines how the text will be rendered. Creating a `LabelStyle` object,
    in turn, requires a `BitmapFont` object. The sections that follow will show you
    how to create and use these objects.


    To create a consistent design in your game, you will most likely want to create
    a single style that will be shared across multiple screens. For this reason, the
    best place to initialize these objects is in one of the `Game`-derived classes,
    rather than the `Screen`-derived classes. Since there is only one instance of
    a `Game` object for each project, you can simplify accessing this information
    by defining public static variables, and since this code will be useful for future
    projects, it will be added to the `BaseGame` class (rather than the `StarfishGame`
    class). To this end, in the `BaseGame` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.graphics.g2d.BitmapFont;

    import com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;

    ```


    In the class, add the following variable declaration:


    ```

    public static LabelStyle labelStyle;

    ```


    In the `create` method, add the following code to initialize the label style:


    ```

    labelStyle = new LabelStyle();

    labelStyle.font = new BitmapFont();

    ```


    The default font created by the constructor is a size 15 Arial font, included
    in the LibGDX libraries. This will likely be too small for your applications,
    and thus the following sections will demonstrate how to create and incorporate
    custom fonts in your application.'
  raw: '## Summary and Next Steps


    In this chapter, you extended the custom framework you have been creating to enable
    your game programs to respond to discrete inputs. Using this functionality, you
    created the space-themed shoot-em-up game Space Rocks, which featured a new style
    of movement, and discrete actions, such as shooting lasers and teleporting. Creating
    this second game also illustrates the flexibility of your game framework and provides
    excellent practice in using the features introduced in the previous chapter.


    At this point, you may want to add a start menu screen that is displayed before
    the game begins, as you did in the previous chapter. You may also want to add
    or modify various features currently in the game. For example, after testing the
    gameplay, you will likely realize that the game is relatively easy: by spinning
    in place and shooting lasers as fast as you can, you will win relatively quickly.
    To address this issue, you could add more rocks, make the rocks smaller, make
    the rocks faster, or some combination of these features. Alternatively (or additionally),
    you may want to limit the rate at which the spaceship can fire lasers. The simplest
    way to implement this would be to add another condition in the `Spaceship` class
    `shoot` method that checks if the number of lasers on the stage exceeds a certain
    value, in which case it could return from the method immediately (before spawning
    a new laser object). In addition, you could take inspiration from the original
    Asteroids game, and when a rock collides with a laser have it spawn two smaller
    rocks; only if the rocks are “small enough” (if their width or height is less
    than some particular value) do they get destroyed forever without spawning additional
    rocks. In addition, to add to the challenge, you could add a new object: a UFO
    that spawns periodically off-screen and travels in a straight line to the opposite
    side, destroying the spaceship if it comes into contact with it. Finally, if all
    these additions make the game too challenging, you could add a “power-up” feature:
    a new object called `PowerUp` that has a random chance of spawning when a rock
    is destroyed, and if the player collects (collides with) it, the spaceship’s shield
    power is restored to 100 percent.


    In the next chapter, you will turn your attention to user-interface design and
    displaying text, a fundamental skill you will need to master for game development.


