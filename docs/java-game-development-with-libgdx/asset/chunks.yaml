    ## 物理与运动


    本章开头提出的问题之一是，在上一章的`Starfish Collector`版本中，移动并不“平滑”：海龟的速度会瞬间从0变为每秒60像素。在现实中，速度是随时间变化的；物体会加速和减速。在本节中，你将学习一些物理学中的技术术语和概念，以及如何在`BaseActor`类中实现它们，这将使你能够为游戏添加移动功能。虽然你不需要掌握底层的数学概念来创建本书中的游戏，但书中包含了详细的解释，以便你能理解所编写的代码。


    ### 速度


    物体的速度表示物体的位置随时间变化的快慢，包括移动的速度和方向。正如位置使用两个值[¹](#A352797_2_En_3_Chapter.html#Fn1)——`x`和`y`坐标——来指定一样，速度也有两个分量，分别表示这些坐标的变化情况。如果位置的测量单位是像素，时间的单位是秒，那么速度的测量单位就是像素每秒，通常写作像素/秒。在数学中，速度通常使用向量符号表示：分量`a`和`b`的向量用尖括号写成`<
    a , b >`。相比之下，坐标为`x`和`y`的位置通常使用圆括号写成`( x , y )`。向量在视觉上用箭头表示；向量`<a, b>`的绘制方式是，其终点位于起点水平方向`a`个单位、垂直方向`b`个单位处，如图[3-6](#A352797_2_En_3_Chapter.html#Fig6)所示。速率可以看作该向量的长度（也称为模），在图中用`S`表示。向量的方向由向量与水平向右（沿正`x`轴方向）的向量之间的夹角来量化；该角度在图中用`A`表示。给定`a`和`b`的值，可以使用数学方法（分别使用勾股定理和三角函数）计算长度和方向角，但得益于LibGDX的`Vector2`类提供的方法（分别使用`len`和`angle`方法），你无需自行编写这些公式。


    ![A352797_2_En_3_Fig6_HTML.jpg](A352797_2_En_3_Fig6_HTML.jpg)


    图 3-6. 向量`< a , b >`的可视化表示，长度为`S`，方向角为`A`


    涉及位置和速度的计算相对简单。例如，如果一个物体的初始位置是`( 7 , 5 )`，其速度是`< 2 , 3 >`，那么：


    *   经过一秒后，位置将变为`( 7 + 2 , 5 + 3 ) = ( 9 , 8 )`。

    *   经过两秒后，位置将变为`( 9 + 2 , 8 + 3 ) = ( 11 , 11 )`。

    *   经过三秒后，位置将变为`( 11 + 2, 11 + 3 ) = ( 13 , 14 )`。


    一般来说，如果初始位置是`( x , y )`，速度是`< a , b >`，那么经过`t`秒后，位置的公式为`( x + t*a , y + t*b )`。这个公式也适用于`t`为分数的情况。


    为了将速度数据整合到`BaseActor`类中，添加以下`import`语句：


    ```

    import com.badlogic.gdx.math.Vector2;

    import com.badlogic.gdx.math.MathUtils;

    ```


    然后，向该类添加以下字段：


    ```

    private Vector2 velocityVec ;

    ```


    通过在`constructor`方法中添加以下语句来初始化此变量：


    ```

    velocityVec = new Vector2(0,0);

    ```


