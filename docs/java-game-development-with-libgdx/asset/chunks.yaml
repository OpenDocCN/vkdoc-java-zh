- fmt: '### Border Shader


    Here, you will create a shader that draws a border around the turtle, as shown
    in Figure [15-8](#A352797_2_En_15_Chapter.html#Fig8). The color and thickness
    of the border will be easily set using uniform variables.


    ![A352797_2_En_15_Fig8_HTML.jpg](A352797_2_En_15_Fig8_HTML.jpg)


    Figure 15-8. Turtle rendered with default shader (left) and border shader (right)


    Conceptually, the trickiest part of writing this shader is determining which pixels
    correspond to the border of the visible part of the image. The approach used here
    is as follows: for any pixel, check all the pixels that are “nearby” (as specified
    by the border-size parameter). If all of them have alpha values greater than 0.5,
    then the original pixel is in a mostly opaque area and will be considered an interior
    point. If all the nearby pixels have alpha values that are less than 0.5, then
    the original pixel is in a mostly transparent area and will be considered an exterior
    point. If the original pixel is neither an interior point nor an exterior point,
    then the nearby pixels are both opaque and transparent, and so the original pixel
    will be considered as “on the border.” Border pixels on translucent areas will
    be rendered using the specified border color; all other pixels will be rendered
    using the original color specified by the texture. Note that if opaque areas are
    adjacent to the edge of the texture, then the border may appear cut off at that
    point, as seen on the right side of the bordered image in Figure [15-8](#A352797_2_En_15_Chapter.html#Fig8).


    There is a second, subtle complexity in writing this shader: texture coordinates
    are specified as percentages; the x and y texture coordinates each range from
    0 to 1. Since the border size is specified in terms of pixels, you will need to
    convert texture units to pixel units and back. The texture coordinates `(1,1)`
    correspond to pixel coordinates `(w,h)`, where `w` and `h` are the width and height
    of the image. Therefore, the relationship between texture coordinates `(tx, ty)`
    and pixel coordinates `(px, py)` can be expressed as `(px, py) = (tx * w, ty *
    h)` or as `(tx, ty) = (px / w, py / h)`.


    With this understanding, you are ready to write the shader. In your text-editor
    program, create a file in the `shaders` folder named `border.fs` that contains
    the following:


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    uniform vec2  u_imageSize;

    uniform vec4  u_borderColor;

    uniform float u_borderSize;

    void main()

    {

    vec4 color = texture2D(u_texture, v_texCoords);

    vec2 pixelToTextureCoords = 1 / u_imageSize;

    bool isInteriorPoint = true;

    bool isExteriorPoint = true;

    for (float dx = -u_borderSize; dx  0.5 )

    isExteriorPoint = false;

    }

    }

    if (!isInteriorPoint && !isExteriorPoint && color.a < 0.5)

    gl_FragColor = u_borderColor;

    else

    gl_FragColor = v_color * color;

    }

    ```


    Next, in the `Turtle` class, add the following `import` statements, which correspond
    to the data types you will be passing into the shader:


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.math.Vector2;

    ```


    Change the line of code that sets `fragmentShaderCode` to the following:


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/border.fs").readString();

    ```


    Finally, change the `draw` method so that it contains the following code. Note
    that the line of code from the previous example that set the value of `"u_time"`,
    has been removed, as it is not used by this shader.


    ```

    batch.setShader(shaderProgram);

    shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight())
    );

    shaderProgram.setUniformf( "u_borderColor", Color.BLACK );

    shaderProgram.setUniformf( "u_borderSize", 3 );

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    ```


    With these changes, the border shader is complete. Test out the program and verify
    that the border appears as expected.


    ### Blur Shader


    Here, you will create a shader that blurs the turtle image, as shown in Figure
    [15-9](#A352797_2_En_15_Chapter.html#Fig9). The amount of blur will be set using
    a uniform variable.


    ![A352797_2_En_15_Fig9_HTML.jpg](A352797_2_En_15_Fig9_HTML.jpg)


    Figure 15-9. Turtle rendered with default shader (left) and blur shader (right)


    The blur shader has a similar structure to the border shader from the previous
    example. For each pixel, a nested `for` loop is used to iterate over a square
    region of pixels centered on the original pixel. The average color of the pixels
    in this region is calculated by adding together the color vectors for each pixel
    and dividing by the total number of pixels in the square region;[³](#A352797_2_En_15_Chapter.html#Fn3)
    this is the final value used for `gl_FragColor`. In your text-editor program,
    create a file in the `shaders` folder named `blur.fs` that contains the following:


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    uniform vec2  u_imageSize;

    uniform int   u_blurRadius;

    void main()

    {

    vec4 color = texture2D(u_texture, v_texCoords);

    vec2 pixelToTextureCoords = 1 / u_imageSize;

    vec4 averageColor = vec4(0.0, 0.0, 0.0, 0.0);

    for (int dx = -u_blurRadius; dx <= u_blurRadius; dx++)

    {

    for (int dy = -u_blurRadius; dy <= u_blurRadius; dy++)

    {

    vec2 point = v_texCoords + vec2(dx,dy) * pixelToTextureCoords;

    averageColor += texture2D(u_texture, point);

    }

    }

    averageColor /= pow(2.0 * u_blurRadius + 1.0, 2.0);

    gl_FragColor = v_color * averageColor;

    }

    ```


    Next, in the `Turtle` class, change the line of code that sets `fragmentShaderCode`
    to the following:


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/blur.fs").readString();

    ```


    Finally, change the `draw` method so that it contains the following code:


    ```

    batch.setShader(shaderProgram);

    shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight())
    );

    shaderProgram.setUniformf( "u_blurRadius", 5 );

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    ```


    With these changes, the blur shader is complete. Test out the program and verify
    that the blur appears as expected.'
  raw: '### Border Shader


    Here, you will create a shader that draws a border around the turtle, as shown
    in Figure [15-8](#A352797_2_En_15_Chapter.html#Fig8). The color and thickness
    of the border will be easily set using uniform variables.


    ![A352797_2_En_15_Fig8_HTML.jpg](A352797_2_En_15_Fig8_HTML.jpg)


    Figure 15-8.


    Turtle rendered with default shader (left) and border shader (right)


    Conceptually, the trickiest part of writing this shader is determining which pixels
    correspond to the border of the visible part of the image. The approach used here
    is as follows: for any pixel, check all the pixels that are “nearby” (as specified
    by the border-size parameter). If all of them have alpha values greater than 0.5,
    then the original pixel is in a mostly opaque area and will be considered an interior
    point. If all the nearby pixels have alpha values that are less than 0.5, then
    the original pixel is in a mostly transparent area and will be considered an exterior
    point. If the original pixel is neither an interior point nor an exterior point,
    then the nearby pixels are both opaque and transparent, and so the original pixel
    will be considered as “on the border.” Border pixels on translucent areas will
    be rendered using the specified border color; all other pixels will be rendered
    using the original color specified by the texture. Note that if opaque areas are
    adjacent to the edge of the texture, then the border may appear cut off at that
    point, as seen on the right side of the bordered image in Figure [15-8](#A352797_2_En_15_Chapter.html#Fig8).


    There is a second, subtle complexity in writing this shader: texture coordinates
    are specified as percentages; the x and y texture coordinates each range from
    0 to 1\. Since the border size is specified in terms of pixels, you will need
    to convert texture units to pixel units and back. The texture coordinates `(1,1)`
    correspond to pixel coordinates `(w,h)`, where `w` and `h` are the width and height
    of the image. Therefore, the relationship between texture coordinates `(tx, ty)`
    and pixel coordinates `(px, py)` can be expressed as `(px, py) = (tx * w, ty *
    h)` or as `(tx, ty) = (px / w, py / h)`.


    With this understanding, you are ready to write the shader. In your text-editor
    program, create a file in the `shaders` folder named `border.fs` that contains
    the following:


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    uniform vec2  u_imageSize;

    uniform vec4  u_borderColor;

    uniform float u_borderSize;

    void main()

    {

    vec4 color = texture2D(u_texture, v_texCoords);

    vec2 pixelToTextureCoords = 1 / u_imageSize;

    bool isInteriorPoint = true;

    bool isExteriorPoint = true;

    for (float dx = -u_borderSize; dx  0.5 )

    isExteriorPoint = false;

    }

    }

    if (!isInteriorPoint && !isExteriorPoint && color.a < 0.5)

    gl_FragColor = u_borderColor;

    else

    gl_FragColor = v_color * color;

    }

    ```


    Next, in the `Turtle` class, add the following `import` statements, which correspond
    to the data types you will be passing into the shader:


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.math.Vector2;

    ```


    Change the line of code that sets `fragmentShaderCode` to the following:


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/border.fs").readString();

    ```


    Finally, change the `draw` method so that it contains the following code. Note
    that the line of code from the previous example that set the value of `"u_time"`,
    has been removed, as it is not used by this shader.


    ```

    batch.setShader(shaderProgram);

    shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight())
    );

    shaderProgram.setUniformf( "u_borderColor", Color.BLACK );

    shaderProgram.setUniformf( "u_borderSize", 3 );

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    ```


    With these changes, the border shader is complete. Test out the program and verify
    that the border appears as expected.


