- fmt: '# Repetition Statements


    The `while` statement is used to repeat a set of statements as long as a given
    condition is true. For example, the following code will continue to add `5` to
    the variable `score` and subtract `1` from the value of `stars` as long as the
    value of `stars` is greater than `0`:


    ```

    while (stars > 0)

    {

    score += 5;

    stars -= 1;

    }

    ```


    A `while` statement is particularly useful when a set of statements needs to be
    repeated an unknown number of times. You must be careful when using a `while`
    statement, however, because if the associated condition always remains true, then
    the statements will continue to execute forever!


    The `for` statement is used to repeat a set of statements a fixed number of times.
    In typical usage, a variable is set to an initial value, and as long as a condition
    involving the variable is true, a set of statements is executed. Afterward, the
    value of the variable is changed by a given amount, the condition is checked again,
    and so forth, until the given condition evaluates to false. The following example
    initially sets a variable `n` to `1`, and as long as `n` is less than `10`, adds
    `3` to `points`; the value of `n` is increased by `1` with each iteration of the
    loop. Note that the statement `n++` has the same effect as `n += 1`.


    ```

    for (int n = 1; n < 10; n++)

    {

    points += 3;

    }

    ```


    `For` loops are particularly useful in tasks involving arrays. As an example,
    the following code initializes an array named `numbers` to store five integers,
    and the `for` loop stores the value `10*n` at each position `n` in the array.
    Note that the loop variable is initialized to `0` (as this is the first index
    in an array), and the condition is that the variable is less than the length (that
    is, the size or the capacity) of the array. (You must use the less-than comparison
    in the condition, since the largest index in an array is always equal to the length
    of the array minus 1.)


    ```

    int[] numbers = new int[5];

    for (int index = 0; index < numbers.length; index++)

    {

    numbers[index] = 10 * index;

    }

    ```


    A variation on the syntax of the `for` statement, called the enhanced for statement,
    is convenient for accessing the values of an array. As a motivating example, consider
    the following code, which takes each of the values from an array called `grades`
    and adds them all to a variable called `total`:


    ```

    for (int index = 0; index < grades.length; index++)

    {

    int num = grades[index];

    total += num;

    }

    ```


    The exact same result can be achieved with less code using the following code,
    which automatically extracts the elements of an array (in order), and stores them
    into a variable before proceeding to the statements contained within the loop:


    ```

    for (int num : grades)

    {

    total += num;

    }

    ```


    ## Methods


    A method is a set of statements, grouped together, that can be called upon repeatedly
    to perform a task. Every method has an associated name, can take zero or more
    values as input, and may or may not return a value. Each method is contained within
    a structure called a class, which is covered in further detail later. The syntax
    for a method is presented here, and the various components are summarized immediately
    afterward:


    - `modifier` is a keyword (such as `public` or `private`) that indicates where
    this method can be used in the program (see later in the appendix for more information).

    - `returnType` indicates the type of data being returned and can be set to `void`
    if no data is returned by the method.

    - `methodName` is the name of the method.


    ```

    modifer returnType methodName ( variableType variableName , ... )

    {

    // statements

    }

    ```


    Within the parentheses, for each input that is to be provided, you must list the
    type of input (indicated by `variableType`) and the name by which it will be referred
    to in the statements that follow (indicated by `variableName`).


    For example, the following public-access method called `average` takes two `float`
    values as input, calculates their average (which is also a `float`), and returns
    this value:


    ```

    public float average(float x, float y)

    {

    return (x + y) / 2;

    }

    ```


    Methods can be called upon in two ways, depending on how they are written. Some
    methods may be called from the class that contains them. For example, the `Math`
    class contains a method named `sqrt` that calculates the square root of a number;
    to use this method to calculate the square root of 4, you would write `Math.sqrt(4)`.
    Alternatively, some methods are called from a variable. As an example, every `String`
    variable contains a method named `charAt` that returns the character at a given
    position in the string. If you create a `String` named `word` that contains the
    text “`games`,” then `word.charAt(2)` returns the character `''m''`.'
