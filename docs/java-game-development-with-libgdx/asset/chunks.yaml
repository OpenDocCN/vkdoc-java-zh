    With this addition, the key-and-lock game mechanic is complete. Test your project
    to verify that the locks are initially solid. Then, collect the corresponding
    key, check that a key icon appears in the user interface , and then make sure
    that the locks disappear when you come into contact with them thereafter.


    At this point, you have finished implementing all the game mechanics described
    at the beginning of this chapter. Congratulations, and enjoy your game!


    ## Summary and Next Steps


    In this chapter, you learned how to create a platform game, including a main character
    that had animations for each of its actions (standing, walking, jumping), custom
    physics, and a “sensor” to determine when it was standing on a solid object and
    was therefore able to jump. You created a variety of objects for your character
    to interact with, including a flag to represent the goal, coins to collect, a
    timer to increase time remaining to complete the level, a springboard that launches
    the character into the air, platforms to jump through, and keys to remove locks
    that block the path ahead.


    As always, there are more features you should add to the game. The largest omissions
    are a title screen and instructions screen, as well as audio. Background music
    should be included to set the mood. Sound effects should be added that correspond
    with player inputs (such as jumping), as well as game-object interaction (such
    as collecting an object, bouncing off a springboard, when a lock fades away, or
    when the game ends, either by reaching the goal flag or by running out of time).
    You may want to add a secondary obstacle, such as spikes, that penalize the player
    for coming into contact with them. The penalty could be that the player loses
    a life (perhaps starting with three lives) and has to restart the level, losing
    the game after all lives are lost. Alternatively, the player could lose a “health
    point” and continue on from that point, losing the game after all health points
    are lost. This alternative approach can be more complicated, however, as you will
    need to add an “invincibility” period after the character is damaged to give them
    an opportunity to move away from and escape the danger, otherwise all the character’s
    health points will be drained immediately.


    In the next chapter, you will continue using your tilemap-based design skills
    by creating a top-down swordfighting adventure game called Treasure Quest.


    # 12. Adventure Games


    This chapter features the most ambitious game project in the entire book: a combat-based
    adventure game named Treasure Quest , inspired by classic console games such as
