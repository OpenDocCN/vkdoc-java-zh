- fmt: '# Creating Cutscenes


    In-game cinematics, also known as cutscenes, can be used to give your game a background
    story, character and plot development, and a resolution after the player achieves
    their goal. Analogous to a scene in a theatrical play that consists of actors
    performing actions and reciting dialogue, a cutscene will consist of `Actor` objects
    that have attached `Action` objects (displaying text in a `DialogBox` object being
    a special case of this). In this section, you will create the framework for displaying
    a cutscene and use it to create a scene for the Starfish Collector game, which
    will consist of the following parts:


    * A background image of the seashore fades in.

    * A turtle moves from off-stage (from beyond the left edge) to the center of the
    stage.

    * A dialog box becomes visible.

    * The dialog box displays the text “I want to be the very best . . . Starfish
    Collector!”

    * The dialog box displays the text “I’ve got to collect them all!”

    * The dialog box becomes invisible.

    * The turtle moves to the right, beyond the right edge of the screen.

    * The background image fades to black.


    A sample image from this cutscene is shown in Figure [5-15](#A352797_2_En_5_Chapter.html#Fig15).


    ![A352797_2_En_5_Fig15_HTML.jpg](A352797_2_En_5_Fig15_HTML.jpg)


    Figure 5-15. Cutscene for the Starfish Collector game


    Each one of these parts can be expressed with an `Actor` and an `Action`, and
    this information will be encapsulated in a class that you will soon create called
    `SceneSegment`. Another class that you will create, called `Scene`, will manage
    a collection of these objects (using an `ArrayList`). By having the `Scene` class
    extend the `Actor` class, you can write an `act` method that automatically advances
    through the scene segments as the corresponding actions are completed. (This will
    in turn require a method to determine when an `Actor` has completed its attached
    actions.)


    To begin, create a new class called `SceneSegment`, containing the following code.
    This class will contain a method named `start`, which attaches the action to the
    actor. The `isFinished` method checks whether an actor has finished its actions
    by checking if there are zero actions attached to the actor; this works because
    actions are automatically removed from an actor once they have finished. Finally,
    the `finish` method calls the action’s `act` method with a large value to complete
    any in-progress actions and then clears all actions from the actor in case any
    infinitely repeating actions were attached to the actor.


    ```

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.scenes.scene2d.Action;

    public class SceneSegment

    {

    private Actor actor;

    private Action action;

    public SceneSegment(Actor a1, Action a2)

    {

    actor = a1;

    action = a2;

    }

    public void start()

    {

    actor.clearActions();

    actor.addAction(action);

    }

    public boolean isFinished()

    {

    return (actor.getActions().size == 0);

    }

    public void finish()

    {

    // simulate 100000 seconds elapsed time to complete in-progress action

    if ( actor.hasActions() )

    actor.getActions().first().act(100000);

    // remove any remaining actions

    actor.clearActions();

    }

    }

    ```


    Although `DialogBox` is an extension of `BaseActor`, displaying text doesn’t fit
    into this framework until you create a custom `Action` that sets the text of a
    `DialogBox`. To do so, you will need to extend the `Action` class and override
    the `act` method, which is responsible for performing the corresponding action.
    The `Action` class contains a variable named `target`, which is a reference to
    the `Actor` to which the action has been added, which is important to know for
    writing the `act` method. The `act` method returns a Boolean that indicates whether
    or not the action has been completed. With this information, writing the custom
    `Action` class is relatively straightforward: it needs to store the text that
    will be displayed, and the `act` method needs to cast the `Actor` to a `DialogBox`
    so that it can use its `setText` method, at which point the action is complete,
    and so the `act` method should immediately return `true`. To implement this, create
    a class called `SetTextAction` that contains the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    public class SetTextAction extends Action

    {

    protected String textToDisplay;

    public SetTextAction(String t)

    {

    textToDisplay = t;

    }

    public boolean act(float dt)

    {

    DialogBox db = (DialogBox)target;

    db.setText( textToDisplay );

    return true;

    }

    }

    ```


    Next, you need a way to pause the scene after displaying text so as to give the
    player a chance to read the text. You also need an option to continue the scene
    when they are ready (indicated by pressing a key). This can be implemented by
    creating a `DelayAction`, set to repeat forever, and using it as part of a scene
    segment. Pressing a key will call the `finish` method of the segment, causing
    the scene to continue. To simplify creating this action (and others) when needed,
    you will next create a class analogous to the LibGDX `Actions` class, both of
    which contain static methods that create instances of various `Action` objects.
    To this end, create a new class called `SceneActions` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    import com.badlogic.gdx.graphics.g2d.Animation;

    public class SceneActions extends Actions

    {

    public static Action setText(String s)

    {

    return new SetTextAction(s);

    }

    public static Action pause()

    {

    return Actions.forever( Actions.delay(1) );

    }

    }

    ```


    While you’re at it, it would be convenient to have the ability to move an actor
    to a particular area on the screen (left, center, right) or outside of the screen
    (to the left or right), as illustrated by Figure [5-16](#A352797_2_En_5_Chapter.html#Fig16).


    ![A352797_2_En_5_Fig16_HTML.jpg](A352797_2_En_5_Fig16_HTML.jpg)


    Figure 5-16. Turtle positioned at positions (from left to right) outside-left,
    screen-left, screen-center, screen-right, and outside-right


    This can be accomplished in part with the `MoveToAction` and `Align` classes,
    but it also requires access to the size of the screen (or equivalently in this
    case, the size of the game world), which is stored in the `worldBounds` variable
    in the `BaseActor` class. To gain access to this information, add the following
    method to the `BaseActor` class:


    ```

    public static Rectangle getWorldBounds()

    {

    return worldBounds;

    }

    ```


    Next, returning to the `SceneActions` class, add this `import` statement:


    ```

    import com.badlogic.gdx.utils.Align;

    ```


    Then, add the following five static methods, whose functions are fully described
    by their method names:'
