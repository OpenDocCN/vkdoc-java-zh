    ## Organizing Layouts with Tables


    Determining the exact screen coordinates of where user-interface items such as
    labels and buttons should be displayed, taking into account the size of the items
    being placed to align them with each other, can be tedious. Fortunately, the LibGDX
    libraries provide a class named `Table` that greatly simplifies this process by
    automatically positioning and aligning these elements.


    `Table` is a subclass of `Actor`, so it can be added to `Stage` objects; furthermore,
    `Table` is also a subclass of `Group`, so objects can be added to a `Table` as
    well. In particular, a `Table` consists of `Cell` objects, laid out in rows and
    columns, with each `Cell` containing an `Actor`. The `add` method creates a new
    `Cell` (containing an `Actor`, if one is specified) and adds it to the end of
    the current row. All tables contain a single row by default; to create a new row
    in the `Table`, positioned beneath the current row, we call the `row` method.
    For illustration purposes only (this will not be added to your code), to create
    a `Table` containing a two-by-two grid with `Actor` objects `a`, `b`, `c`, and
    `d`, as illustrated in Figure [5-11](#A352797_2_En_5_Chapter.html#Fig11), you
    would write the following code:


    ![A352797_2_En_5_Fig11_HTML.jpg](A352797_2_En_5_Fig11_HTML.jpg)


    Figure 5-11. A simple table with elements arranged as a two-by-two grid


    ```java

    Table t = new Table();

    t.add(a);

    t.add(b);

    t.row();

    t.add(c);

    t.add(d);

    ```


    It is important to remember that, in general, individual table cells have the
    smallest size possible, while still being able to fit their contents. However,
    the width and height of the cells in each row and column will be enlarged to accommodate
    the largest element in that row or column. Furthermore, the `add` method returns
    the `Cell` object that is created, and which can be resized or formatted by calling
    any combination of the following methods on the result:


    *   `width` and `height` to set the size of the `Cell` (which in turn will affect
    the size of any UI components within the `Cell`)

    *   `expandX` and `expandY` to force a `Cell` to increase its size to fill the
    remaining table size in the horizontal or vertical direction, respectively

    *   `padLeft`, `padRight`, `padBottom`, `padTop` to add an amount of padding (in
    pixels) to the contents of the current `Cell`, or the `pad` method to apply padding
    in all directions


    The contents of a table cell that has been enlarged beyond its default size will
    be center-aligned (both horizontally and vertically) within the cell by default,
    in which case you can use the `Cell` class methods `left`, `right`, `bottom`,
    and `top` to align the `Actor` within its cell. In addition, you can declare that
    a single cell span multiple columns using the `Cell` class method `colspan`, which
    takes as its argument the number of columns that the cell should fill.


    With these methods at your disposal, arranging elements in a user interface becomes
    significantly easier and does not require calculating coordinates by hand. To
    begin, you will include some code in your custom framework that adds a table to
    each screen on the stage that you have been using for user-interface elements.
    In the `BaseScreen` class, add the `import` statement:


    ```java

    import com.badlogic.gdx.scenes.scene2d.ui.Table;

    ```


    In the class, add the variable declaration:


    ```java

    protected Table uiTable;

    ```


    In the `BaseScreen` constructor method, add the following code to initialize the
    table:


    ```java

    uiTable = new Table();

    uiTable.setFillParent(true);

    uiStage.addActor(uiTable);

    ```


    Now, you will rewrite some code in the game-specific screen classes to utilize
    this newly added table. For example, consider the layout of the elements on the
    menu screen, represented abstractly on the right side of Figure [5-12](#A352797_2_En_5_Chapter.html#Fig12),
    where the letter `a` represents the title graphic and the letters `b` and `c`
    represent the Start and Quit buttons, respectively.


    ![A352797_2_En_5_Fig12_HTML.jpg](A352797_2_En_5_Fig12_HTML.jpg)'
