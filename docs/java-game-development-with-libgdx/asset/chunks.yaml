- fmt: '# Game Project: Starfish Collector


    This section will introduce the game Starfish Collector, previously shown in Figure
    [2-1](#A352797_2_En_2_Chapter.html#Fig1). Before starting to write the code for
    this game, it is helpful to precisely describe its features: the game mechanics
    and rules, how the player interacts with the software, the graphics that will
    be required, and so forth. Such a description is called a game-design document
    and is explained more fully in Appendix A of this book. Since this is the first
    game you will be creating with LibGDX, only the following minimal set of features
    will be created:


    - The player will control a turtle, whose goal is to collect a single starfish.

    - Movement is controlled by the arrow keys. The up arrow key moves the turtle
    toward the top of the screen, the right arrow key moves the turtle toward the
    right side of the screen, and so on. Multiple arrow keys can be pressed at the
    same time to move the turtle in diagonal directions. Movement speed is constant.

    - The turtle collects the starfish by coming into contact with it (when their
    graphics overlap). When this happens, the starfish disappears, and a message that
    reads “You Win” appears.

    - The graphics required by this game include images of a turtle, a starfish, water,
    and a message that contains the text “You Win.”


    One version of the code that accomplishes these tasks is presented next. Some
    of the code and concepts will be familiar from the `HelloWorldImage` example,
    such as the `Texture` and `SpriteBatch` classes, the purpose of the `create` and
    `render` methods, and the role of the driver class. There are a few new additions
    as well. Since the coordinates of the turtle may change, you use variables to
    store these values. Most significantly, you introduce some code that makes our
    program interactive—you will process keyboard input from the user. Finally, you’ll
    include a Boolean variable that keeps track of whether the player has won, which
    becomes true when the turtle reaches the starfish and affects when the “You Win”
    message is displayed on the screen.


    In this section, as well as the sections that follow, you are invited to create
    a new project in BlueJ (after closing the previous project by selecting Close
    from the BlueJ Project menu) and enter the code that is presented, or, alternatively,
    to simply download the source code from the website for this book and run the
    code via the included BlueJ project files. The online source code also contains
    all the images that you will need, stored in the `assets` folder in each project,
    and referenced in the following code.


    To begin, download the source code files for this chapter on the website for this
    book. Create a new project in BlueJ named `Starfish Collector Ch2` (since there
    will be many versions of this project created throughout this book). In the project
    directory that is created by BlueJ, create a new folder called `assets`. Copy
    the image files from the downloaded project''s `assets` folder into your new project''s
    `assets` folder; keeping the source code separate from the images in this manner
    will help keep your files organized. Next, in your project directory, create a
    new folder named `+libs`. Copy the JAR files from the downloaded project’s `+libs`
    folder into your new project’s `+libs` folder. Restart BlueJ so that the JAR files
    newly added to the `+libs` folder are properly recognized by BlueJ.


    In your BlueJ project, create a new class called `StarfishCollectorAlpha`. The
    source code for this class appears next. There are new `import` statements that
    enable you to create a variety of new objects, which are also explained in what
    follows:


    ```

    import com.badlogic.gdx.ApplicationListener;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.math.Rectangle;

    import com.badlogic.gdx.Game;

    public class StarfishCollectorAlpha extends Game

    {

    private SpriteBatch batch;

    private Texture turtleTexture;

    private float turtleX;

    private float turtleY;

    private Rectangle turtleRectangle;

    private Texture starfishTexture;

    private float starfishX;

    private float starfishY;

    private Rectangle starfishRectangle;

    private Texture oceanTexture;

    private Texture winMessageTexture;

    private boolean win;

    public void create()

    {

    batch = new SpriteBatch();

    turtleTexture = new Texture( Gdx.files.internal("assets/turtle-1.png") );

    turtleX = 20;

    turtleY = 20;

    turtleRectangle = new Rectangle( turtleX, turtleY,

    turtleTexture.getWidth(), turtleTexture.getHeight() );

    starfishTexture = new Texture( Gdx.files.internal("assets/starfish.png") );

    starfishX = 380;

    starfishY = 380;

    starfishRectangle = new Rectangle( starfishX, starfishY,

    starfishTexture.getWidth(), starfishTexture.getHeight() );

    oceanTexture = new Texture( Gdx.files.internal("assets/water.jpg") );

    winMessageTexture = new Texture( Gdx.files.internal("assets/you-win.png") );

    win = false;

    }

    public void render()

    {

    // check user input

    if (Gdx.input.isKeyPressed(Keys.LEFT))

    turtleX--;

    if (Gdx.input.isKeyPressed(Keys.RIGHT))

    turtleX++;

    if (Gdx.input.isKeyPressed(Keys.UP))

    turtleY++;

    if (Gdx.input.isKeyPressed(Keys.DOWN))

    turtleY--;

    // update turtle rectangle location

    turtleRectangle.setPosition(turtleX, turtleY);

    // check win condition: turtle must be overlapping starfish

    if (turtleRectangle.overlaps(starfishRectangle))

    win = true;

    // clear screen

    Gdx.gl.glClearColor(0,0,0, 1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    // draw graphics

    batch.begin();

    batch.draw( oceanTexture, 0, 0 );

    if (!win)

    batch.draw( starfishTexture, starfishX, starfishY );

    batch.draw( turtleTexture, turtleX, turtleY );

    if (win)

    batch.draw( winMessageTexture, 180, 180 );

    batch.end();

    }

    }

    ```


    At this point, you can compile the code; if any error messages appear, double-check
    that the code you entered precisely matches the preceding code. You will also
    need a launcher-style class to create an instance of this class and run it. To
    accomplish this, create a new class named `LauncherAlpha` and enter the code as
    follows. Notice that additional parameters have been included in the `LwglApplication`
    constructor to set the title that is displayed and the size (the width and height,
    in pixels) of the window.


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class LauncherAlpha

    {

    public static void main (String[] args)

    {

    Game myGame = new StarfishCollectorAlpha();

    LwjglApplication launcher =

    new LwjglApplication( myGame, "Starfish Collector", 800, 600 );

    }

    }

    ```


    At this point, the code can be compiled, after which the game can be run from
    the main BlueJ window by right-clicking the orange rectangle labeled `LauncherAlpha`,
    selecting the `main` method, and clicking the OK button in the window that appears
    (similar to the process for running the “Hello, World!” program from Chapter [1](#A352797_2_En_1_Chapter.html)).


    **Note**


    When you are writing code, if there is a runtime error (such as an image file’s
    failing to load due to a misspelled filename, even after fixing the error and
    running the program again), BlueJ may report another error containing a message
    such as “No OpenGL context found in the current thread.” This is a highly technical
    error with a simple fix: in the BlueJ main window Tools menu, select the option
    Reset Java Virtual Machine and try to run the `main` method again. Provided that
    there are no additional runtime errors, your program should load as expected.'
