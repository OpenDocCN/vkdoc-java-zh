    ## Summary and Next Steps


    This chapter may have only scratched the surface of 3D game programming, but it’s
    a topic that entails a lot of material. You explored the components of 3D scenes,
    perspective cameras, and lighting. You learned that 3D models contain meshes and
    materials, and that instances of models store transformation data (position, rotation,
    and scale) using matrices. You adapted and extended your custom game development
    framework to include 3D versions of actors and stages and learned the many ways
    you can move objects around in a three-dimensional world. Finally, you put your
    skills (and your code) to the test by creating a pair of interactive demo programs.


    With the foundation laid in this chapter, you are now ready to create some games
    with 3D graphics (and 2.5D gameplay, for simplicity). A great place to start is
    recreating some of the earlier projects from this book. Games such as Rectangle
    Destroyer can be recreated simply using boxes and spheres. For other games, you
    will likely want to use pre-created model files (similar to the turtle, starfish,
    and rock). Some websites from which you can download model files (in a variety
    of formats) include the following:


    *   OpenGameArt: [`www.opengameart.org`](http://www.opengameart.org)

    *   The Models Resource: [`www.models-resource.com`](http://www.models-resource.com)

    *   TurboSquid: [`www.turbosquid.com`](http://www.turbosquid.com) (They have many
    free models available; this can be specified in their search options.)


    Once you have downloaded a 3D model, and before loading it into LibGDX, you can
    view and modify it if desired using 3D graphics software such as Blender, which
    is freely available at [`www.blender.org`](http://www.blender.org) , or, for the
    artistically inclined, Blender can even be used to create 3D models from scratch.


    Once again, congratulations on finishing the final game project in this book!
    The next chapter concludes with some general advice and possible next steps in
    game development.


