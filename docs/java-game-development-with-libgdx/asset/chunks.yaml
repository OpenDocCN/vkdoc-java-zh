  raw: 'Sometimes, your program will contain a runtime error, often caused by issues
    such as entering a filename incorrectly (which cannot be detected when the program
    is compiled). In this case, after fixing the error and running the program again,
    you may encounter a different error containing the message “No OpenGL context
    found in the current thread.” This is due to the prior unexpected shutdown of
    the application and can usually be fixed in BlueJ by resetting the Java virtual
    machine, which can be done via the Tools menu or with a shortcut key combination
    (Ctrl-Shift-R on Windows).


    ## Advantages to Using LibGDX


    In addition to the ability to compile your game so that it can run on multiple
    platforms, there are many other advantages to using the LibGDX game development
    framework. LibGDX makes it easy to accomplish tasks such as these:


    *   Render 2D graphics, animations, bitmap-based fonts, and particle effects

    *   Stream music and play sound effects

    *   Process input from a keyboard, mouse, touchscreens, accelerometer, or game
    pad

    *   Organize user interfaces using a scene graph and fully skinnable UI control
    library

    *   Integrate third-party plug-ins, such as the Box2D physics engine (`box2d.org`),
    the Tiled map editor file format (`mapeditor.org`), and the Spine 2D animation
    software (`esotericsoftware.com`)

    *   Render 3D graphics with materials and lighting effects and load 3D models
    from common file formats such as OBJ and FBX


    A complete list of LibGDX features can be found at the website: [`http://libgdx.badlogicgames.com/features.html`](http://libgdx.badlogicgames.com/features.html)
    .


    ## Summary


    In this chapter, you’ve set up BlueJ, an integrated development environment for
    Java programming, and configured BlueJ to use the LibGDX game development framework.
    Then, you created your first application with LibGDX: a “Hello, World!” program
    that displays an image of the world in a window. This program involved extending
    LibGDX’s `Game` class and creating a `driver` class that runs the program on the
    desktop. Along the way, you learned about a few of the other classes involved
    in this program. Finally, you learned about some of the additional features of
    the LibGDX library, many of which will be discussed in detail in future chapters.


    Footnotes [1](#A352797_2_En_1_Chapter.html#Fn1_source)


    More recent versions of these files can be obtained from the website [`https://libgdx.badlogicgames.com/nightlies/dist/`](https://libgdx.badlogicgames.com/nightlies/dist/)
    . These are the nightly builds of the LibGDX libraries, which contain the most
    up-to-date code, but they are also under development and thus may contain a few
    bugs or glitches.


      [2](#A352797_2_En_1_Chapter.html#Fn2_source)


    Since neither the texture nor the coordinates are changing in this example, the
    fact that the `render` method is called repeatedly is irrelevant here. However,
    if you were to periodically change the image, you could generate an animation;
    if you were to gradually change the coordinates, you could simulate motion. You
    will see how to accomplish both of these variations in the following chapter.


    # 2. The LibGDX Framework


    This chapter will introduce many of the major features of the LibGDX library .
    It will illustrate how to use them in the process of creating a game called Starfish
    Collector , where you help the player’s character, a turtle, swim around the ocean
    floor while looking for a starfish. A screenshot of this game in action appears
    in Figure [2-1](#A352797_2_En_2_Chapter.html#Fig1). At first, you will create
    a basic, functional game. Following a motivational discussion of object-oriented
    design principles, you will rewrite parts of this project using some of the LibGDX
    classes to improve the organization of the code. Future chapters will revisit
    this example and use it as a basis to introduce new game-design principles and
    features of LibGDX.


    ![A352797_2_En_2_Fig1_HTML.jpg](A352797_2_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    The main screen for the game Starfish Collector


    ## The Life Cycle of a Video Game


    Before jumping into the programming aspect of game development, it is important
    to understand the overall structure of a game program: the major stages that a
    game program progresses through and the tasks that a game program must perform
    in each stage. The stages are as follows:


    *   Startup: During this stage, any files needed (such as images or sounds) are
    loaded, game objects are created, and values are initialized.

    *   The game loop: A stage that repeats continuously while the game is running
    and that consists of the following three sub-stages:

    *   Process input : The program checks to see if the user has performed any action
    that sends data to the computer: pressing keyboard keys, moving the mouse or clicking
    mouse buttons, touching or swiping on a touchscreen, or pressing joysticks or
    buttons on a game pad.

    *   Update : Performs tasks that involve the state of the game world and the entities
    within it. This could include changing the positions of entities based on user
    input or physics simulations, performing collision detection to determine when
    two entities come in contact with each other and what action to perform in response,
    or selecting actions for nonplayer characters.

    *   Render : Draws all graphics on the screen, such as background images, game-world
    entities, and the user interface (which typically overlays the game world).

    *   Shutdown: This stage begins when the player provides input to the computer
    indicating that he is finished using the software (for example, by clicking a
    Quit button) and may involve removing images or data from memory, saving player
    data or the game state, signaling the computer to stop monitoring hardware devices
    for user input, and closing any windows that were created by the game.


    The flowchart in Figure [2-2](#A352797_2_En_2_Chapter.html#Fig2) illustrates the
    order in which these stages occur.


    ![A352797_2_En_2_Fig2_HTML.jpg](A352797_2_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    The stages of a game program


    Some game developers may include additional stages in the game loop, such as the
    following:


    *   A sleep stage that pauses the execution of the program for a given amount
    of time. Many game developers aim to write programs that can run at 60 frames
    per second (FPS), meaning that the game loop will run once every 16.67 milliseconds.[¹](#A352797_2_En_2_Chapter.html#Fn1)
    If the game loop can run faster than this, the program can be instructed to pause
    for whatever amount of time remains in the 16.67-millisecond interval, thus freeing
    up the CPU for any other applications that may be running in the background. LibGDX
    automatically handles this for us, so we won’t worry about including it here.

    *   An audio stage, where any background music is streamed or sound effects are
    played. In this book, we will consider playing audio as part of the update stage,
    and we will discuss how to accomplish this in a later chapter.


    Most of these stages are handled by a corresponding method in LibGDX. For example,
    the startup stage is carried out by a method named `create`, the update and render
    stages are both handled by the `render` method,[²](#A352797_2_En_2_Chapter.html#Fn2)
    and any shutdown actions are performed by a method named `dispose`.


    In fact, when your driver class creates any kind of application (such as a `LwjglApplication`
    ), the application will work correctly only if given an object that contains a
    certain set of methods (including `create`, `render`, and `dispose`); this is
    a necessary convention so that the application knows what to do during each stage
    of the game program’s life cycle. You are able to enforce such requirements in
    Java programs by using interfaces.


