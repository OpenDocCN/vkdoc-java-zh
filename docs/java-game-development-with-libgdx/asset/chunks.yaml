    ```


    有时，在编写类时，你会希望控制对数据的访问，要么限制可以赋值的可能值集合，要么防止程序的其他部分意外更改数据（可能是由于代码中的错误）。在这种情况下会使用访问修饰符；它们可以被包含进来，以指定其他类是否可以使用特定的字段或方法。最常见的两个修饰符是
    `public`（表示任何类都可以访问相应的变量或方法）和 `private`（表示只能在其定义的类内部访问）。还有一个较少使用的修饰符 `protected`，它允许在定义类及其任何子类（即扩展定义类的类）内进行访问。


    作为一个访问修饰符何时有用的实际例子，让我们回到自定义的 `Fraction` 类。分数的分母永远不应设置为零（因为除以零会导致矛盾的数学结果）。你可以通过将类字段设置为
