- fmt: '### Project Integration


    As mentioned at the beginning of this chapter, the gameplay for your projects
    will not be changed at all when adding tilemaps; only a few changes need to be
    made when initializing the screen. To begin, in the `LevelScreen` class, locate
    the `initialize` method and delete the following code that was used to initialize
    the background and all the game entities:


    ```

    BaseActor ocean = new BaseActor(0,0, mainStage);

    ocean.loadTexture( "assets/water-border.jpg" );

    ocean.setSize(1200,900);

    BaseActor.setWorldBounds(ocean);

    new Starfish(400,400, mainStage);

    new Starfish(500,100, mainStage);

    new Starfish(100,450, mainStage);

    new Starfish(200,250, mainStage);

    new Rock(200,150, mainStage);

    new Rock(100,300, mainStage);

    new Rock(300,350, mainStage);

    new Rock(450,200, mainStage);

    turtle = new Turtle(20,20, mainStage);

    Sign sign1 = new Sign(20,400, mainStage);

    sign1.setText("West Starfish Bay");

    Sign sign2 = new Sign(600,300, mainStage);

    sign2.setText("East Starfish Bay");

    ```


    Next, to initialize the tilemap actor, at the beginning of the `initialize` method,
    add the following code:


    ```

    TilemapActor tma = new TilemapActor("assets/map.tmx", mainStage);

    ```


    To initialize the various objects, you will use the methods previously implemented
    to get lists of objects with particular names. When iterating over these lists,
    you will need to get the object’s properties, especially the specific properties
    you need (at a minimum, the x and y coordinates of the object, which are required
    by the `BaseActor` class constructor). To begin, add the following `import` statements
    to the `LevelScreen` class:


    ```

    import com.badlogic.gdx.maps.MapObject;

    import com.badlogic.gdx.maps.MapProperties;

    ```


    Next, in the `initialize` method, after the tilemap actor is initialized, add
    the following code to create the `Starfish`, `Rock`, and `Sign` objects. Note
    that when creating the signs, you also need to get the `message` property (and
    cast it to a `String`).


    ```

    for (MapObject obj : tma.getTileList("Starfish") )

    {

    MapProperties props = obj.getProperties();

    new Starfish( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    for (MapObject obj : tma.getTileList("Rock") )

    {

    MapProperties props = obj.getProperties();

    new Rock( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    for (MapObject obj : tma.getTileList("Sign") )

    {

    MapProperties props = obj.getProperties();

    Sign s = new Sign( (float)props.get("x"), (float)props.get("y"), mainStage );

    s.setText( (String)props.get("message") );

    }

    ```


    Before you initialize the turtle, you need to retrieve the rectangle object named
    `Start` to determine its position. Due to the way the data was stored (using a
    rectangle object), you will use the `getRectangleList` method here. However, since
    this list will only contain one object, you don’t need to use a loop; you can
    simply get the one and only object in the list, which has index 0. To do this,
    add the following code to the `initialize` method:


    ```

    MapObject startPoint = tma.getRectangleList("start").get(0);

    MapProperties props = startPoint.getProperties();

    turtle = new Turtle( (float)props.get("x"), (float)props.get("y"), mainStage);

    ```


    At this point, if you run your game, you should see the tilemap you created displayed
    in your game.


    ## Rectangle Destroyer Revisited


    To practice the skills and implementation you have learned in redesigning the
    Starfish Collector level, you will also redesign the layout of and add colors
    to the Brick objects in the Rectangle Destroyer game. Using a tilemap will also
    simplify the placement and size of the walls and starting position of the paddle.


    To begin, make a copy of the `Rectangle Destroyer` project from Chapter [8](#A352797_2_En_8_Chapter.html)
    and change the name of the folder (and thus the project) to `Rectangle Destroyer
    Ch 10`. In addition, copy the `TilemapActor.java` file from the `Starfish Collector
    Ch 10` project folder into this folder. Download the source code files for this
    chapter and copy the contents of the `assets` folder from the downloaded project
    into the `assets` folder of your new project; new files include a larger version
    of the background image, named `large-space.png`, that is 832 by 640 pixels; an
    image called `wall-square.png` that is 32 by 32 pixels; and a spritesheet called
    `brick-colors.png` that is a 2 by 4 grid of colored bricks, each of which is 64
    by 32 pixels (resulting in an image that is 128 by 128 pixels overall). As before,
    these sizes were chosen to align with the tilemap that will be created.'
