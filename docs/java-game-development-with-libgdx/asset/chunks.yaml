    To create this effect, you will add an offset to the texture coordinates ; this
    offset is calculated using a sine function. In order to customize the effect to
    your liking, you will include uniform parameters that adjust the wavelength and
    amplitude of the sine wave, quantities illustrated in Figure [15-11](#A352797_2_En_15_Chapter.html#Fig11).
    You will also be able to set the velocity of the sine wave, which will be the
    rate (in pixels/second) at which the distortion moves across the texture; setting
    this value to 0 will cause the distortion to be stationary. Since there will be
    both horizontally and vertically oriented sine waves distorting the texture, each
    of these parameters will come in pairs, one value for each of the directions (along
    the x and y axes). Setting the amplitude of the sine wave to 0 in a given direction
    will cause there to be no distortion at all.


    ![A352797_2_En_15_Fig11_HTML.jpg](A352797_2_En_15_Fig11_HTML.jpg)


    Figure 15-11.


    The wavelength and amplitude of a sine wave.


    The formula that produces the sine wave with amplitude A, wavelength W, and moving
    with velocity V along the x-axis is given by the formula y = A * sin( 6.283/W
    * (x + t * V) ), while the sine wave along the y-axis is given by the formula
    x = A * sin( 6.28/W * (y + t * V) ). Implementing these formulas in a shader is
    straightforward. You must also remember to convert texture coordinates to pixel
    coordinates and back, since the amplitude, wavelength, and velocity that are used
    in the calculation are all expressed in terms of pixels. In your text-editor program,
    create a file in the `shaders` folder named `wave.fs` that contains the following:


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform float u_time;

    uniform vec2 u_imageSize;

    uniform vec2 u_amplitude;

    uniform vec2 u_wavelength;

    uniform vec2 u_velocity;

    uniform sampler2D u_texture;

    void main()

    {

    vec2 pixelCoords = v_texCoords * u_imageSize;

    vec2 offset = u_amplitude * sin(6.283/u_wavelength * (pixelCoords.yx - u_velocity
    * u_time));

    vec2 texCoords = v_texCoords + offset / u_imageSize;

    gl_FragColor = v_color * texture2D(u_texture, texCoords);

    }

    ```


    Next, in the `Turtle` class, change the line of code that sets `fragmentShaderCode`
    to the following:


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/wave.fs").readString();

    ```


    Finally, change the `draw` method so that it contains the following code:


    ```

    batch.setShader(shaderProgram);

    shaderProgram.setUniformf( "u_time", time );

    shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight())
    );

    shaderProgram.setUniformf("u_amplitude",  new Vector2( 2,  3) );

    shaderProgram.setUniformf("u_wavelength", new Vector2(17, 19) );

    shaderProgram.setUniformf("u_velocity",   new Vector2(10, 11) );

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    ```


    With these changes, the wave-distortion shader is complete. Test out the program
    and verify that the effect appears as expected, then experiment with the uniform
    values to get a sense of the range of possibilities.'
  trans: '

    ### 发光着色器


    理解了模糊着色器的工作原理后，你可以通过将每个像素的原始图像颜色与模糊颜色相加来创建发光效果，这会使图像变亮并轻微混合颜色。为了获得炫酷的视觉效果，在此着色器中你还会添加一个脉冲效果（类似于之前处理灰度着色器时的工作），使海龟在其原始颜色和发光效果之间平滑切换，从而让海龟看起来像从内部发出脉动的光芒。在你的文本编辑器中，在
    `shaders` 文件夹内创建一个名为 `glow-pulse.fs` 的文件，内容如下：


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    uniform float u_time;

    uniform vec2  u_imageSize;

    uniform int   u_glowRadius;

    void main()

    {

    vec4 color = texture2D(u_texture, v_texCoords);

    vec2 pixelToTextureCoords = 1 / u_imageSize;

    vec4 averageColor = vec4(0.0, 0.0, 0.0, 0.0);

    for (int dx = -u_glowRadius; dx <= u_glowRadius; dx++)

    {

    for (int dy = -u_glowRadius; dy <= u_glowRadius; dy++)

    {

    vec2 point = v_texCoords + vec2(dx,dy) * pixelToTextureCoords;

    averageColor += texture2D(u_texture, point);

    }

    }

    averageColor /= pow(2.0 * u_glowRadius + 1.0, 2.0);

    float amount = (sin(6.0 * u_time) + 1.0) * 0.5;

    // 额外乘以 2.0 的因子用于增强发光效果

    vec4 glowFactor = vec4( 2.0 * averageColor.rgb, averageColor.a );

    gl_FragColor = v_color * (color + amount * glowFactor);

    }

    ```


    接下来，在 `Turtle` 类中，将设置 `fragmentShaderCode` 的代码行修改为以下内容：


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/glow-pulse.fs").readString();

    ```


    最后，修改 `draw` 方法，使其包含以下代码：


    ```

    batch.setShader(shaderProgram);

    shaderProgram.setUniformf( "u_time", time );

    shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight())
    );

    shaderProgram.setUniformf( "u_glowRadius", 5 );

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    ```


    完成这些修改后，脉冲发光着色器就完成了。测试程序并验证效果是否符合预期。


    ### 波浪扭曲着色器


    作为本章的最后一个着色器，你将不再修改像素颜色，而是使用正弦函数以波浪模式扭曲图像本身，图 15-10 展示了一些示例。如果需要，还可以对扭曲进行动画处理，以产生涟漪效果。


    ![A352797_2_En_15_Fig10_HTML.jpg](img/A352797_2_En_15_Fig10_HTML.jpg)


    图 15-10.


    使用默认着色器、水平波浪扭曲、垂直波浪扭曲以及双向波浪扭曲渲染的海龟


    要创建此效果，你需要为纹理坐标添加一个偏移量；该偏移量使用正弦函数计算得出。为了按需自定义效果，你将包含用于调整正弦波波长和振幅的 uniform 参数，这些量在图
    15-11 中进行了说明。你还可以设置正弦波的速度，即扭曲在纹理上移动的速率（以像素/秒为单位）；将此值设置为 0 将使扭曲保持静止。由于将同时存在水平和垂直方向的正弦波来扭曲纹理，因此每个参数都将成对出现，每个方向（沿
    x 轴和 y 轴）各有一个值。在某个方向上将正弦波的振幅设置为 0 将导致该方向完全没有扭曲。


    ![A352797_2_En_15_Fig11_HTML.jpg](img/A352797_2_En_15_Fig11_HTML.jpg)


    图 15-11.


    正弦波的波长和振幅。


    产生沿 x 轴方向、振幅为 A、波长为 W、速度为 V 的正弦波的公式为 y = A * sin( 6.283/W * (x + t * V) )，而沿 y
    轴方向的正弦波公式为 x = A * sin( 6.28/W * (y + t * V) )。在着色器中实现这些公式非常简单。你还必须记得将纹理坐标转换为像素坐标，然后再转换回来，因为计算中使用的振幅、波长和速度都是以像素为单位表示的。在你的文本编辑器中，在
    `shaders` 文件夹内创建一个名为 `wave.fs` 的文件，内容如下：


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform float u_time;

    uniform vec2 u_imageSize;

    uniform vec2 u_amplitude;

    uniform vec2 u_wavelength;

    uniform vec2 u_velocity;

    uniform sampler2D u_texture;

    void main()

    {

    vec2 pixelCoords = v_texCoords * u_imageSize;

    vec2 offset = u_amplitude * sin(6.283/u_wavelength * (pixelCoords.yx - u_velocity
    * u_time));

    vec2 texCoords = v_texCoords + offset / u_imageSize;

    gl_FragColor = v_color * texture2D(u_texture, texCoords);

    }

    ```


    接下来，在 `Turtle` 类中，将设置 `fragmentShaderCode` 的代码行修改为以下内容：


    ```

    fragmentShaderCode = Gdx.files.internal("assets/shaders/wave.fs").readString();

    ```


    最后，修改 `draw` 方法，使其包含以下代码：


    ```

    batch.setShader(shaderProgram);

    shaderProgram.setUniformf( "u_time", time );

    shaderProgram.setUniformf( "u_imageSize", new Vector2(getWidth(), getHeight())
    );

    shaderProgram.setUniformf("u_amplitude",  new Vector2( 2,  3) );

    shaderProgram.setUniformf("u_wavelength", new Vector2(17, 19) );

    shaderProgram.setUniformf("u_velocity",   new Vector2(10, 11) );

    super.draw( batch, parentAlpha );

    batch.setShader(null);

    ```


    完成这些修改后，波浪扭曲着色器就完成了。测试程序并验证效果是否符合预期，然后尝试调整 uniform 值，以了解其可能的范围。

