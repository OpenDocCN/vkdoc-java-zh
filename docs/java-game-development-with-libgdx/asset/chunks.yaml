    \ verify that your `launcher` class contains a `main` method specified as follows\
    \ (adjust the name and parameters of your method to match this if necessary):\n\
    \n    ```\n    public static void main (String[] args)\n    ```\n\n2.  Then, from\
    \ the BlueJ menu bar, choose Project then Create Jar File; a small window appears.\
    \ This window indicates that the JAR file you create will be executable if the\
    \ `main` class is specified. That is exactly what you’re hoping to do! From the\
    \ “Main Class” drop-down list, select the name of your `launcher` class.  \n3.\
    \  In addition, your executable JAR file will require copies of all the LibGDX\
    \ JAR files used by BlueJ when developing your game. If you have been storing\
    \ these files in a `+libs` folder in your project directory, you may skip ahead\
    \ to the next paragraph. If you have been using an alternative approach, such\
    \ as storing the LibGDX JAR files in the BlueJ `userlibs` directory, then the\
    \ section of the window labeled “Include User Libraries” will include a list of\
    \ names of JAR files, including those containing the LibGDX classes. In this case,\
    \ be sure to select the checkboxes next to all of the LibGDX JAR files (the ones\
    \ starting with “gdx”) before continuing.  \n4.  At this point, you can click\
    \ the Continue button. A file directory appears, allowing you to select a folder\
    \ and asking you to specify a name for the JAR file. It is normal to create the\
    \ executable in a different location than the source code.  \n5.  Enter the name\
    \ of your game and then click the Create button. Since additional JAR files are\
    \ required by your application, a directory is created in the location you specified,\
    \ and in that directory you will find a file with the name of your game and the\
    \ `.jar` extension; this directory should also contain all the LibGDX JAR files\
    \ from your BlueJ project’s `+libs` directory (or those from the BlueJ `userlib`\
    \ directory, if you have been using that setup) or those that you selected from\
    \ the Create Jar File window. All of these JAR files must be located in the same\
    \ directory to be able to run your game. All the contents of the other folders\
    \ contained in the BlueJ project directory (such as the `assets` folder) are stored\
    \ within your game’s JAR file.  \n\nTo run your game, all you need to do is to\
    \ double-click your game’s JAR file, and your game will start.[¹](#A352797_2_En_17_Chapter.html#Fn1)\
    \ You can easily share your game with others by sending them the set of files\
    \ in this directory.[²](#A352797_2_En_17_Chapter.html#Fn2) The one caveat is that\
    \ in order to be able to run your game, potential users must have Java installed\
    \ on their computers. For those who don’t, you have two main options :\n\n*  \
    \ You could inform users that they need to install Java and direct them to the\
    \ Java website, [`www.java.com`](http://www.java.com) .\n*   You could use a third-party\
    \ tool to convert your JAR files into native executable files for various operating\
    \ systems; one such tool is called JWrapper and is available from [`www.jwrapper.com`](http://www.jwrapper.com)\
    \ ."
  trans: "\n### 提升你的技能组合\n\n在继续开发游戏的同时，你也应该考虑拓宽自己的整体技能组合。扎实的编程技能固然非常受欢迎，但游戏开发者（尤其是独立开发者或小型工作室成员）往往需要成为多面手，特别是在图形和音频领域。要入门这些领域，我推荐以下软件和教程：\n\
    \n*   Inkscape：`inkscape.org` 用于创建矢量图形的软件，免费提供。该网站包含一系列适合所有技能水平的高质量教程。不过，与我们最相关的是由\
    \ Chris Hildenbrand 编写的一套游戏美术教程，可在此处获取：[`http://2d-game-art-tutorials.zeef.com/chris.hildenbrand`](http://2d-game-art-tutorials.zeef.com/chris.hildenbrand)。\n\
    *   Ocenaudio：`ocenaudio.com` 一款简单、快速且功能强大的音频编辑器，非常适合简单的音频编辑任务。\n*   Audacity：`audacityteam.org`\
    \ 一款多轨音频编辑器和录音机，免费提供。Audacity 手册包含大量教程，将教你各种有用的录音和编辑技巧。\n\n### 推荐阅读\n\n除了拓宽技能组合，扩展知识基础也很有价值。市面上有许多与游戏开发相关的书籍，可以帮助你做到这一点。当然，这里无法一一列举，而且我无疑遗漏了一些高质量的作品。尽管如此，本节列出了来自不同领域的一些代表性样本，涵盖多个主题，以展示现有资源的范围：游戏设计、文学层面、历史和社会影响：\n\
    \n*   《游戏设计基础》（第 3 版），作者：Ernest Adams（2013 年出版；ISBN 0321929675）本书讨论了多种主题：概念开发、玩法设计、核心机制、用户界面、故事叙述和平衡性；还包含练习、工作表和案例研究。\n\
    *   《电子游戏写作与设计终极指南》，作者：Flint Dille 和 John Zuur Platten（2008 年出版；ISBN 9781580650663）涵盖的主题包括将故事元素融入游戏、编写游戏脚本、创建设计文档、创意过程、团队动态以及商业考量。\n\
    *   《复古游戏 2.0：史上最具影响力游戏的内幕观察》，作者：Matt Barton（2016 年出版；ISBN 1138899135）本书探讨了历史上一些最具影响力的电子游戏的发展历程，特别关注其开发过程、评论反响以及对行业的影响。\n\
    *   《游戏改变世界：游戏化如何让现实变得更美好》，作者：Jane McGonigal（2011 年出版；ISBN 9780143120612）在这本书中，作者结合游戏体验，探讨了心理学、认知科学、社会学和哲学的理论，并解释了游戏如何让我们更高效，以及如何让世界变得更美好。\n\
    \n及时了解游戏行业的最新新闻和发展动态，以及听取同行游戏开发者的观点、方法、奋斗历程和成功经验，也很有帮助。为此，关注博客是最好的选择。以下是一些特别重要的网站，它们定期发布博客文章（以及额外的有用信息和资源）：\n\
    \n*   Gamasutra：[`www.gamasutra.com`](http://www.gamasutra.com) 一个致力于游戏制作艺术和商业的网站，除其他资源外，还包含精心整理的博客文章列表，涉及行业的各个方面。\n\
    *   GameDev.net：[`www.gamedev.net`](http://www.gamedev.net) 面向所有领域和专业水平开发者的资源网站，包含关于游戏开发技术、创意和商业方面的文章和教程。\n\
    *   HobbyGameDev：[`www.hobbygamedev.com`](http://www.hobbygamedev.com) 由 Chris\
    \ DeLeon（一位专业的电子游戏开发者、作家和讲师）维护，这个定期更新的网站包含文章、建议、教程、案例研究、访谈等内容。\n\n## 发布你的游戏\n\n\
    一旦你设计并创建了自己的游戏，就应该考虑与他人分享——毕竟，游戏就是用来玩的！这个过程需要你将作品打包成可玩的格式，并找到一群热切的游戏爱好者作为受众。\n\
    \n### 为桌面电脑打包\n\n分享游戏最简单的方法是创建可执行的 JAR 文件。\n\n1.  为此，请确认你的 `launcher` 类包含一个按如下方式指定的\
    \ `main` 方法（如有必要，请调整方法的名称和参数以匹配此格式）：\n\n    ```\n    public static void main (String[]\
    \ args)\n    ```\n\n2.  然后，从 BlueJ 菜单栏中选择“项目”，再选择“创建 Jar 文件”；此时会出现一个小窗口。该窗口提示，如果指定了\
    \ `main` 类，你创建的 JAR 文件将是可执行的。这正是你想要做的！从“主类”下拉列表中，选择你的 `launcher` 类的名称。\n3.  此外，你的可执行\
    \ JAR 文件需要包含 BlueJ 在开发游戏时使用的所有 LibGDX JAR 文件的副本。如果你一直将这些文件存储在项目目录的 `+libs` 文件夹中，可以直接跳到下一段。如果你使用了其他方法，例如将\
    \ LibGDX JAR 文件存储在 BlueJ 的 `userlibs` 目录中，那么窗口中标记为“包含用户库”的部分将列出 JAR 文件的名称，包括包含\
    \ LibGDX 类的那些。在这种情况下，请务必在继续之前选中所有 LibGDX JAR 文件（以“gdx”开头的文件）旁边的复选框。\n4.  此时，你可以单击“继续”按钮。会出现一个文件目录，允许你选择一个文件夹，并要求你为\
    \ JAR 文件指定一个名称。通常将可执行文件创建在与源代码不同的位置。\n5.  输入你的游戏名称，然后单击“创建”按钮。由于你的应用程序需要额外的 JAR\
    \ 文件，因此会在你指定的位置创建一个目录，在该目录中，你会找到一个以你的游戏名称命名的 `.jar` 文件；此目录还应包含来自你的 BlueJ 项目 `+libs`\
    \ 目录（或来自 BlueJ `userlib` 目录，如果你一直使用该设置）的所有 LibGDX JAR 文件，或者你在“创建 Jar 文件”窗口中选择的那些文件。所有这些\
    \ JAR 文件必须位于同一目录中才能运行你的游戏。BlueJ 项目目录中其他文件夹（例如 `assets` 文件夹）的所有内容都存储在你的游戏 JAR 文件中。\n\
    \n要运行你的游戏，你只需双击游戏的 JAR 文件，游戏就会启动。¹ 你可以通过将此目录中的文件集发送给他人，轻松地与他们分享你的游戏。² 唯一需要注意的是，潜在用户必须在其计算机上安装\
    \ Java 才能运行你的游戏。对于没有安装 Java 的用户，你有两个主要选择：\n\n*   你可以告知用户需要安装 Java，并引导他们访问 Java\
    \ 网站 [`www.java.com`](http://www.java.com)。\n*   你可以使用第三方工具将你的 JAR 文件转换为适用于各种操作系统的原生可执行文件；其中一个这样的工具叫做\
    \ JWrapper，可从 [`www.jwrapper.com`](http://www.jwrapper.com) 获取。\n"
- fmt: "### Compiling for Other Platforms\n\nCompiling your project for other platforms\
    \ (such as Android, iOS, and web browsers via HTML5/JavaScript) is one of the\
    \ main strengths of LibGDX. However, to do so effectively requires the use of\
    \ an advanced integrated development environment (IDE). This section only very\
    \ briefly outlines the steps required to set up a LibGDX project for the Android\
    \ Studio IDE; this process will take longer than it may appear from the length\
    \ of this section. For further details concerning configuring the IDE setting,\
    \ compiling, and exporting, you will need to consult the resources listed.\n\n\
    1.  Android Studio [³](#A352797_2_En_17_Chapter.html#Fn3) is an IDE based on the\
    \ IntelliJ platform. After downloading and installing this software (the version\
    \ bundled with the Android SDK), the installer will most likely download an updated\
    \ set of packages.\n2.  After this process is complete, visit the LibGDX Wiki\
    \ project setup site[⁴](#A352797_2_En_17_Chapter.html#Fn4) and download `gdx-tools.jar`,\
    \ which is an executable JAR file, from the link on the wiki page. Run this file,\
    \ and you’ll see a screen similar to Figure [17-1](#A352797_2_En_17_Chapter.html#Fig1).\n\
    \n    ![A352797_2_En_17_Fig1_HTML.jpg](A352797_2_En_17_Fig1_HTML.jpg)\n\n    Figure\
    \ 17-1.\n\n    The LibGDX project setup tool\n3.  Here, you’ll need to enter a\
    \ name for your project, a package name (such as `com.mygdx.spacerocks`), the\
    \ name of your `Game` class (or, in our extended framework, the class that extends\
    \ `BaseGame`), the directory where you’d like to store the files, and the path\
    \ where the Android SDK was installed when you installed Android Studio.\n4. \
    \ In the next series of checkboxes, you can specify which platforms you’ll be\
    \ developing for (for starters, I recommend selecting Android and Desktop). If\
    \ your project requires any third-party libraries or extensions (such as Box2D\
    \ or the game-pad controllers extension), you can specify that here.\n5.  Then,\
    \ click the Generate button, and a set of project files will be created for you\
    \ in the directory you specified during setup. This process can take a while the\
    \ first time a project is generated, as the setup file will download a number\
    \ of dependency files.\n6.  When it is all finished, restart Android Studio, select\
    \ the Import Project option, and choose the file named `build.gradle`.\n\nWhen\
    \ your project opens, you’ll notice a directory structure has been prepared for\
    \ you, including directories named `core`, `android`, and `desktop`. The latter\
    \ two directories contain premade launcher files for their corresponding platforms.\
    \ The `core` directory is where you should place all your other classes. There\
    \ are many settings that you will need to configure for your project, such as\
    \ editing the configuration to specify a working directory where game assets are\
    \ located. The LibGDX wiki, referenced earlier, contains details that you will\
    \ need to read through to help get your project up and running should you decide\
    \ to pursue this direction further.\n\n### Finding Distribution Outlets\n\nOne\
    \ of the greatest joys of being a game developer is having others play your games.\
    \ Even if a project is unfinished, having people play-test your game and provide\
    \ feedback can help your creations reach even greater heights and attract an even\
    \ larger audience. Many websites support independent game developers and provide\
    \ forums for sharing your work with the community. Some of these websites (such\
    \ as Indie DB and Game Jolt) will even provide you with the ability to upload\
    \ your games onto their servers after you register for an account.\n\n*   `indiedb.com`\n\
    *   `gamejolt.com`\n*   `itch.io`\n*   `gamedev.net`\n*   `tigsource.com` (The\
    \ Independent Games Source)\n*   `forums.indiegamer.com` (The Indie Gamer Forums)\n\
    \nIf you post a game to one of these sources, while you’re waiting to hear people’s\
    \ opinions on your work, you should strive to be an active participant in their\
    \ forums. Try out a few games and provide feedback to your fellow developers.\
    \ We all benefit from a vibrant game development community, so be sure to join\
    \ in and be a part of it!\n\nWith that final piece of advice, we come to the end\
    \ of our journey together through this book. Hopefully, however, your journey\
    \ as a game developer will continue. May you have good fortune in all your future\
    \ endeavors!\n\nFootnotes [1](#A352797_2_En_17_Chapter.html#Fn1_source)\n\nIf\
    \ your project runs fine from within BlueJ but you encounter difficulties running\
    \ the executable JAR file, the BlueJ website contains various suggestions and\
    \ links to helpful resources at [`www.bluej.org/help/ask-help.html`](http://www.bluej.org/help/ask-help.html).\n\
    \n[2](#A352797_2_En_17_Chapter.html#Fn2_source)\n\nTo ensure that no files are\
    \ forgotten when sending them to others, you may want to use a program such as\
    \ 7-Zip ([`www.7-zip.org`](http://www.7-zip.org)) to create a single file (called\
    \ an archive or zip file) that contains all the JAR files needed for your game.\n\
    \n[3](#A352797_2_En_17_Chapter.html#Fn3_source)\n\nAvailable at: [`http://developer.android.com/sdk/index.html`](http://developer.android.com/sdk/index.html).\n\
    \n[4](#A352797_2_En_17_Chapter.html#Fn4_source)\n\nAvailable at: [`http://github.com/libgdx/libgdx/wiki/Project-Setup-Gradle`](http://github.com/libgdx/libgdx/wiki/Project-Setup-Gradle)."
