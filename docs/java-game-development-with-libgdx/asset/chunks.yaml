    # 3. Extending the Framework


    In the previous chapter, you learned about some of the basic features and classes
    available in LibGDX and created a game called Starfish Collector. You also practiced
    good software development habits by gathering code that supports commonly needed
    functionality into a class named `ActorBeta` (which extends the LibGDX `Actor`
    class). However, the Starfish Collector game is still “rough around the edges”;
    some of the shortcomings of the version from the previous chapter include:


    *   There is a lack of animation.

    *   Movement is not smooth: speed is either zero or a constant value.

    *   Collisions are not precise.

    *   There are no barriers or obstacles.

    *   There is only a single object to collect.

    *   The game world is limited to the size of the window, and the turtle can move
    beyond the edges of the window.

    *   When the program is run, the game begins immediately.


    To address these shortcomings, you will implement the following improvements in
    this chapter:


    *   Animations will be added: the turtle will appear to be swimming whenever it
    is moving (and it will face the direction of movement), the starfish will slowly
    rotate (to draw the player’s attention), and a splash-like special effect will
    appear when the turtle collects the starfish.

    *   Realistic movement will be implemented by adding acceleration and deceleration.

    *   Collisions will be more precise by replacing rectangles with more precise
    polygon shapes.

    *   Solid-like barriers (rocks) will be added.

    *   Multiple instances of objects will be created.

    *   The game world will be enlarged beyond the size of the window.

    *   A start-menu screen will be displayed before the game begins.


    A screenshot of the improved Starfish Collector game with these improvements added
    is shown in Figure [3-1](#A352797_2_En_3_Chapter.html#Fig1).


    ![A352797_2_En_3_Fig1_HTML.jpg](A352797_2_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    The improved Starfish Collector game


    There are other obvious standard features missing that will be added in subsequent
    chapters, such as text and user interfaces (Chapter [5](#A352797_2_En_5_Chapter.html))
    and music and sound effects (Chapter [6](#A352797_2_En_6_Chapter.html)). In addition,
    when advanced features (such as designing levels with tilemap editors and integrating
    gamepad controller support) are introduced much later on in this book, they will
    first be demonstrated in the context of the Starfish Collector game.


    To incorporate all these changes, you will create a new class called `BaseActor`,
    which replaces the `ActorBeta` class from the previous chapter. The `BaseActor`
    class will be robust and feature-packed enough to be used in every game project
    in the remainder of this book, and for your own game projects as well. Over the
    course of this chapter, you will slowly rebuild and improve the Starfish Collector
    game, making use of the new `BaseActor` class throughout.


    Note


    The `BaseActor` class that you will create in this chapter will contain a lot
    of methods and functionality, not all of which will be needed for every game object.
    For example, not all game objects are animated, not all game objects move, and
    so forth. In general, object-oriented design principles would recommend that this
    functionality be split into separate classes. However, the decision was made to
    include all the actor-related functionality within a single class in order to
    simplify the class-dependency relationships and reduce the total number of classes
    required by future projects in this book.


    To begin, download the source code files for this chapter on the website for this
    book. Create a new project in BlueJ named `Starfish Collector Ch3` (to distinguish
    it from the version in the previous chapter). In the project directory that is
    created by BlueJ, create a new folder called `assets`. Copy all the image files
    from the downloaded project’s `assets` folder into your new project’s `assets`
    folder. Next (if you haven’t previously added the LibGDX JAR files to the BlueJ
    `userlib` folder), in your project directory, create a new folder named `+libs`.
    Copy the JAR files from the downloaded project’s `+libs` folder into your new
    project’s `+libs` folder. Restart BlueJ so that the JAR files newly added to the
    `+libs` folder are properly recognized by BlueJ.


    In your BlueJ project, create a new class named `BaseActor`. The first step is
    to write the `constructor` method. Since you will need to set the position of
    the actor and add it to a stage, you can supply this data via the `constructor`
    method and perform these actions automatically with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.scenes.scene2d.Stage;

    /**

    * Extend functionality of the LibGDX Actor class.

    */

    public class BaseActor extends Actor

    {

    public BaseActor(float x, float y, Stage s)

    {

    // call constructor from Actor class

    super();

    // perform additional initialization tasks

    setPosition(x,y);

    s.addActor(this);

    }

    }

    ```


    In the following sections , you will add support for animations, physics-based
    movement, improved collision detection and handling, and methods for working with
    collections of specific object types.'
