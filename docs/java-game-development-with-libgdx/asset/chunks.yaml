    \ controls are provided but are optional: directional pad left/right rotates the\
    \ ship, and three buttons (such as A, B, and X on an XBox 360-style gamepad) are\
    \ used for acceleration, lasers, and teleportation, respectively. The controls\
    \ are listed in an instructions menu.  \n    2.  To be proficient at this game,\
    \ the player will need to be able to precisely control the movement of the spaceship\
    \ and predict the position of the rocks to line up shots from a distance. Maintaining\
    \ a large distance between the spaceship and the rocks minimizes the chance that\
    \ the shields will be damaged, but also makes it more difficult to obtain the\
    \ items that can be dropped.  \n    3.  The amount of power remaining in the shields\
    \ is indicated visually by the shield graphic. A number indicating the points\
    \ earned by the player is displayed in the top-center of the screen; the user\
    \ interface is kept simple to avoid overlapping game-world elements as much as\
    \ possible. When each level is complete, a congratulations message appears on\
    \ the screen, as well as the number of seconds it took to clear the screen and\
    \ the corresponding point bonus; the player presses a key to continue on to the\
    \ next level.  \n    4.  The menu system is navigated by using the mouse. There\
    \ will be a start menu that displays a title graphic, the highest score earned,\
    \ and buttons that allow the player to go to an instructions menu or begin the\
    \ game right away (for experienced players). The instructions menu displays the\
    \ backstory, lists the controls (keyboard and gamepad) for the game, and has a\
    \ button that allows the player to return to the main menu. When the player loses\
    \ the game, a “Game Over” message appears, along with another message if the player\
    \ has earned a high score, followed by a button that allows the player to return\
    \ to the start menu.  \n    5.  There is no in-game pause or volume-control functionality.\
    \ The player can quit the game at any time by clicking on the standard window\
    \ controls located in the top-right corner of the window.   \n4.  Aesthetics\n\
    \    1.  The game is set in outer space and has many technological elements. The\
    \ game world feels increasingly cluttered and chaotic due to the increasingly\
    \ large number of rocks drifting around at random angles. As the rocks are destroyed\
    \ in each level, the pace becomes more relaxed.  \n    2.  The graphics are colorful\
    \ and cartoonish. There will be a variety of background images used to make the\
    \ levels feel different. The basic graphics required will be the spaceship, lasers,\
    \ and rocks. There will be visual special effects corresponding to player actions\
    \ and interactions between game-world objects:\n        1.  A particle effect\
    \ simulating thruster fire will appear whenever the player accelerates the spaceship.\
    \  \n        2.  The shields will have a slow rotation and pulse effect to make\
    \ them appear more dynamic, and their opacity will change according to the remaining\
    \ shield power.  \n        3.  Lasers will fade out before they disappear.  \n\
    \        4.  When teleporting, a wormhole-like animation will appear at the original\
    \ and the new locations of the spaceship.  \n        5.  Whenever a rock is destroyed\
    \ (from laser or shield collision), the rock will disappear and an explosion will\
    \ appear in its place.  \n        6.  Items will feature a pulsing effect to draw\
    \ the player’s attention and will fade out before they disappear. If they are\
    \ collected, a small sparkling effect will appear.   \n    3.  The menus will\
    \ feature a quiet, ambient technological humming or droning sound, as one might\
    \ imagine in the background of a spaceship. A small beep will play when navigation\
    \ buttons are pressed. The game itself will feature exciting, driving background\
    \ music to reinforce the mood of the game. Analogous to the visual effects described\
    \ previously, there will be sound effects corresponding to player actions and\
    \ interactions between game-world objects:\n        1.  A continuous rocket exhaust\
    \ sound will play as long as the player is accelerating the spaceship.  \n   \
    \     2.  When a rock collides with the shields, an electric shock–like sound\
    \ will play.  \n        3.  A laser fire sound will play when each laser is shot.\
    \  \n        4.  When teleporting, a deep whoosh-like sound will play.  \n   \
    \     5.  Whenever a rock is destroyed, a rumbling explosion sound will be heard.\
    \  \n        6.  If an item is collected, a quiet chime sound will play.   \n\
    \    4.  The backstory for the game is: “You are a spaceship pilot tasked with\
    \ clearing out the interstellar debris that makes deep-space voyages dangerous\
    \ for less-experienced pilots. With the aid of your advanced laser, shield, and\
    \ teleportation technology, destroy as many rocks as you can before your own ship\
    \ is destroyed and you are teleported back to your home base.”  \n    5.  This\
    \ game creates a feeling of excitement and tension.  \n    6.  The fun aspect\
    \ of this game comes from competition with oneself and with others to achieve\
    \ the highest score possible. (Each player will have to keep track of their own\
    \ high scores.)   \n5.  Development\n    1.  This project will completed individually;\
    \ graphics and audio will be obtained from third-party websites that make their\
    \ assets available under the Creative Commons license, and so the main task will\
    \ be programming.  \n    2.  A desktop computer (with keyboard, mouse, and speakers),\
    \ a gamepad controller, and internet access will be necessary to complete this\
    \ project. Playtesting can be performed on-site or remotely.  \n    3.  The main\
    \ sequence of steps to complete this project is as follows:\n        1.  Obtain\
    \ graphics.  \n        2.  Program ship movement and abilities (laser fire, teleportation,\
    \ shields).  \n        3.  Program rock movement and laser-rock interaction.  \n\
    \        4.  Implement user interface (point system and high-score storage) and\
    \ game-over screen.  \n        5.  Add items (shield recharge and bonus points).\
    \  \n        6.  Add visual effects, music, and sound effects.  \n        7. \
    \ Load new level with increased difficulty when screen is cleared.  \n       \
    \ 8.  Menu system (start and instructions screens)  \n        9.  Gamepad support\
    \   \n    4.  The main points for playtesting are after the user interface is\
    \ finished, after the new level feature is added, and after all the preceding\
    \ steps have been completed. The questions that will be asked are:\n        1.\
    \  How do the spaceship controls feel: too slow/sluggish, too fast, or just right?\
    \  \n        2.  Is the gameplay too hard or too easy, too short or too long?\
    \  \n        3.  Does the difficulty level increase at a slow, moderate, or fast\
    \ pace?  \n        4.  Do you have any suggestions to improve this game?   \n\
    \    5.  This game will be disseminated for free as an executable file through\
    \ various indie game-portal websites, and gameplay images and video will be posted\
    \ via social media."
  trans: "\n1.  总体愿景\n    1.  《太空岩石》是一款以太空为主题的射击游戏。玩家控制一艘宇宙飞船，目标是发射激光并摧毁在屏幕上飞行的岩石，沿途赚取积分。每清空一个屏幕，玩家将根据完成该关卡所需的时间获得奖励积分，然后进入一个类似但难度稍高的关卡。最终目标是获得尽可能高的分数。\n\
    \    2.  这是一款单人动作游戏。\n    3.  本游戏适合所有年龄段，并且足够简单，休闲玩家也能享受其中。目标平台是台式电脑，通过键盘控制游戏；也支持游戏手柄控制（仅需方向键和按钮）。\n\
    \    4.  本游戏节奏明快，平均游戏时长只有几分钟，鼓励玩家反复尝试以获得最高分。将使用多种背景图像和特效来增加视觉趣味。\n2.  机制\n   \
    \ 1.  短期目标是避免被岩石击中以求生存。中期目标是摧毁屏幕上飞行的岩石，并尽可能快地完成，以最大化该关卡的得分。长期目标是获得尽可能高的分数。\n \
    \   2.  能力：\n        1.  飞船通过左右旋转和朝其面对的方向加速前进。没有减速功能；要停止或反向，飞船必须旋转并向相反方向加速。\n\
    \        2.  飞船能够发射激光（每秒一发），激光沿直线飞行一秒，如果未与岩石碰撞，则会逐渐淡出并从游戏中消失。如果激光击中岩石，岩石和激光都会消失。\n\
    \        3.  飞船被护盾包围。如果在护盾激活时飞船被岩石击中，岩石会被摧毁，护盾会失去能量。当护盾能量降至 0 后，护盾消失，此时被岩石击中会摧毁飞船并结束游戏。\n\
    \        4.  飞船还具有瞬间随机传送到屏幕上新位置的能力。虽然这可用于快速躲避即将发生的碰撞，但也有可能传送到岩石上，因此玩家可能会谨慎使用此能力（仅在即将被摧毁时使用），或者根本不使用。\n\
    \    3.  唯一的主动障碍是飞船必须躲避和射击的岩石；它们在给定范围内具有随机的初始方向和速度。完成每个屏幕所需的时间会影响玩家的得分，但不会以任何方式直接影响飞船。在随后的每个关卡中，挑战会通过以下一个或多个因素增加：增加岩石数量、提高岩石整体速度或减小岩石尺寸。\n\
    \    4.  当小行星被摧毁时，有 10%的几率会留下一个小能量胶囊，这是一个玩家可以收集的物品，用于将护盾充能至 100%。同样，有 10%的几率会留下闪闪发光的金色碎片，这会给玩家奖励更多积分。每个物品在出现四秒后消失，因此玩家如果想收集它们就必须迅速行动。（因此，总共有\
    \ 20%的几率会出现特殊物品，其中一半是能量胶囊，一半是黄金。）\n    5.  玩家可以发射的激光数量是无限的；玩家唯一需要关注的资源是剩余的护盾能量，可以通过收集能量胶囊物品来充能。\n\
    \    6.  游戏世界是一个单一的屏幕，但具有环绕特性：当一个物体（飞船、岩石或激光）移出屏幕的一侧边缘后，它会从对侧边缘重新出现。这种设计通过消除边界使游戏世界感觉更大，同时仍允许玩家同时看到游戏世界中的所有物体。\n\
    3.  动态\n    1.  玩此游戏需要一台台式电脑。浏览菜单需要使用鼠标点击各个按钮。飞船完全由键盘控制：左/右箭头键旋转飞船，上箭头键启动推进器并加速飞船前进，空格键发射激光，X\
    \ 键将飞船传送到随机位置。提供游戏手柄控制，但为可选：方向键左/右旋转飞船，三个按钮（例如 Xbox 360 风格手柄上的 A、B 和 X）分别用于加速、发射激光和传送。控制方式列在说明菜单中。\n\
    \    2.  要精通此游戏，玩家需要能够精确控制飞船的移动，并预测岩石的位置以便从远处瞄准射击。保持飞船与岩石之间较大的距离可以最大限度地降低护盾受损的几率，但也会增加获取可能掉落的物品的难度。\n\
    \    3.  护盾剩余能量通过护盾图形直观显示。显示玩家获得分数的数字显示在屏幕顶部中央；用户界面保持简洁，以尽可能避免遮挡游戏世界元素。当每个关卡完成时，屏幕上会出现祝贺信息，以及清空屏幕所用的秒数和相应的积分奖励；玩家按一个键继续进入下一关。\n\
    \    4.  菜单系统通过鼠标导航。将有一个开始菜单，显示标题图形、获得的最高分，以及允许玩家进入说明菜单或立即开始游戏（针对有经验的玩家）的按钮。说明菜单显示背景故事，列出游戏的控制方式（键盘和游戏手柄），并有一个按钮允许玩家返回主菜单。当玩家输掉游戏时，会出现“游戏结束”信息，如果玩家获得了高分，还会出现另一条信息，随后是一个允许玩家返回开始菜单的按钮。\n\
    \    5.  游戏内没有暂停或音量控制功能。玩家可以随时通过点击窗口右上角的标准窗口控件退出游戏。\n4.  美学\n    1.  游戏设定在外太空，并包含许多科技元素。由于以随机角度漂浮的岩石数量越来越多，游戏世界感觉越来越拥挤和混乱。随着每个关卡中的岩石被摧毁，节奏会变得更加轻松。\n\
    \    2.  图形色彩丰富且卡通化。将使用多种背景图像来使关卡感觉不同。所需的基本图形包括飞船、激光和岩石。将会有与玩家动作和游戏世界物体之间的互动相对应的视觉特效：\n\
    \        1.  每当玩家加速飞船时，会出现模拟推进器火焰的粒子效果。\n        2.  护盾会有缓慢旋转和脉冲效果，使其看起来更具动感，并且其不透明度会根据剩余护盾能量而变化。\n\
    \        3.  激光在消失前会逐渐淡出。\n        4.  传送时，在飞船的原始位置和新位置会出现类似虫洞的动画。\n        5.\
    \  每当岩石被摧毁时（因激光或护盾碰撞），岩石会消失，并在其位置出现爆炸效果。\n        6.  物品会带有脉冲效果以吸引玩家注意，并在消失前淡出。如果被收集，会出现微小的闪光效果。\n\
    \    3.  菜单将播放安静的环境科技嗡嗡声或低沉的声音，就像人们想象中宇宙飞船的背景音一样。按下导航按钮时会播放一声小哔哔声。游戏本身将播放激动人心、有驱动力的背景音乐，以强化游戏氛围。与之前描述的特效类似，将会有与玩家动作和游戏世界物体之间互动相对应的音效：\n\
    \        1.  只要玩家在加速飞船，就会持续播放火箭尾焰的声音。\n        2.  当岩石与护盾碰撞时，会播放类似电击的声音。\n   \
    \     3.  每次发射激光时，会播放激光射击的声音。\n        4.  传送时，会播放深沉的嗖嗖声。\n        5.  每当岩石被摧毁时，会听到隆隆的爆炸声。\n\
    \        6.  如果收集到物品，会播放轻柔的铃声。\n    4.  游戏的背景故事是：“你是一名飞船飞行员，任务是清除那些使深空航行对经验不足的飞行员构成危险的星际碎片。借助你先进的激光、护盾和传送技术，在你的飞船被摧毁并被传送回基地之前，尽可能多地摧毁岩石。”\n\
    \    5.  这款游戏营造出一种兴奋和紧张的感觉。\n    6.  这款游戏的乐趣在于与自己和他人竞争，以获得尽可能高的分数。（每位玩家需要自己记录自己的最高分。）\n\
    5.  开发\n    1.  本项目将独立完成；图形和音频将从第三方网站获取，这些网站根据知识共享许可协议提供其资源，因此主要任务是编程。\n    2.\
    \  完成本项目需要一台台式电脑（带键盘、鼠标和扬声器）、一个游戏手柄控制器和互联网接入。游戏测试可以在现场或远程进行。\n    3.  完成本项目的主要步骤顺序如下：\n\
    \        1.  获取图形资源。\n        2.  编写飞船移动和能力（激光射击、传送、护盾）的程序。\n        3.  编写岩石移动和激光-岩石互动的程序。\n\
    \        4.  实现用户界面（积分系统和最高分存储）和游戏结束画面。\n        5.  添加物品（护盾充能和奖励积分）。\n      \
    \  6.  添加视觉效果、音乐和音效。\n        7.  屏幕清空后加载难度增加的新关卡。\n        8.  菜单系统（开始和说明画面）。\n\
    \        9.  游戏手柄支持。\n    4.  游戏测试的主要时间点是在用户界面完成后、新关卡功能添加后，以及上述所有步骤完成后。将提出的问题是：\n\
    \        1.  飞船控制感觉如何：太慢/迟钝、太快，还是恰到好处？\n        2.  游戏玩法是太难还是太简单，太短还是太长？\n   \
    \     3.  难度等级是以缓慢、适中还是快速的速度增加？\n        4.  您对改进这款游戏有什么建议吗？\n    5.  本游戏将作为可执行文件通过各种独立游戏门户网站免费传播，游戏截图和视频将通过社交媒体发布。\n"
- fmt: "## Appendix B: Review of Java Fundamentals\n\nThis appendix will briefly review\
    \ the core Java concepts that you should be familiar with to understand the material\
    \ presented in this book. This is not a complete introduction to Java programming,\
    \ so if any of the topics are unfamiliar, you may want to consult a textbook or\
    \ tutorial series on Java to learn more about the corresponding material.\n\n\
    ### Data Types and Operators\n\nLet’s begin by listing some of the basic, or primitive,\
    \ data types available in Java:\n\n- `int`: Integers (numbers with no decimal\
    \ part)\n- `float`: Decimal values\n- `double`: Decimal values, stored with twice\
    \ the precision of a `float`\n- `char`: A single character (a letter, number,\
    \ or symbol)\n- `boolean`: The value `true` or `false`\n\nAnother commonly used\
    \ data type is `String`, which represents text: a set of characters. Technically,\
    \ this is not a primitive data type, but it can be initialized in a similar way.\n\
    \nJava also uses the common binary arithmetic operators: addition, subtraction,\
    \ multiplication, division (or quotient, in the case of integers), and remainder,\
    \ represented by the symbols `+`, `-`, `*`, `/`, and `%`, respectively. When used\
    \ with two values of the same type, the result will also be of the same type.\
    \ For example, the value of `5.0/2.0` is `2.5`, whereas the value of `5/2` is\
    \ `2`. The results are different because in the first example the values have\
    \ type `double`, and in the second example the values have type `int`.\n\nWhen\
    \ performing arithmetic involving two types of values, the values will be converted,\
    \ or cast, to the more complex type. For instance, `5.0/2` yields a value of `2.5`.\
    \ If desired, a numeric value of one type can be manually cast to another type\
    \ by prefacing it with the name of the desired type in parentheses. For example,\
    \ `(double)2` produces a value of `2.0`, whereas `(int)2.5` produces the value\
    \ `2`. (When casting to an `int`, the value is always rounded down to the nearest\
    \ integer value.)\n\nPrimitive variables can be declared and initialized with\
    \ a single line of code, with the following syntax:\n\n```\nvariableType variableName\
    \ = initialValue;\n```\n\nAlternatively, these tasks can be carried out in separate\
    \ statements:\n\n```\nvariableType variableName;\nvariableName = initialValue;\n\
    ```\n\nIn addition to using `=` to assign values to variables, Java provides assignment\
    \ operators (for brevity), which modify the value of a variable by a constant\
    \ amount. For example, the statement `x = x + 5` can be replaced with the statement\
    \ `x += 5`. Each of the other arithmetic operations has a corresponding assignment\
    \ operator: `-=`, `*=`, `/=`, and `%=`.\n\nNumeric values can be compared with\
    \ the conditional operators: `==` for equality, `!=` for inequality, `<` for less\
    \ than, `<=` for less than or equal to, `>` for greater than, and `>=` for greater\
    \ than or equal to. The result of a comparison is a Boolean value—`true` or `false`—and\
    \ can be stored in a Boolean variable if desired. Boolean values can be combined\
    \ with the Boolean operators: `&&` for “and,” `||` for “or,” and `!` for “not.”\n\
    \nAn array is an object that contains a fixed number of values of the same type.\
    \ The length of the array is set when the array is created. The values in an array\
    \ can be initialized when it is created (and the size will be inferred). For example,\
    \ the following creates an array that contains five characters:\n\n```\nchar[]\
    \ letters = { 'g', 'a', 'm', 'e', 's' };\n```\n\nAlternatively, an array can be\
    \ created with only the length specified, shown here for an array that will contain\
    \ ten integers (and the values can be set at a later time):\n\n```\nint[] values\
    \ = new int[10];\n```\n\nThe items in an array are accessed by their position,\
    \ or index, which begins with the number `0`. For example, given the preceding\
    \ array named `letters`, the expression `letters[0]` produces the value `'g'`,\
    \ `letters[1]` produces `'a'`, and so forth, up to `letters[4]`, which produces\
    \ `'s'`. Note that the array has length 5, but the positions are numbered 0 through\
    \ 4. (This is true in general; an array with length `n` will have indices numbered\
    \ 0 through `n – 1`.) Note that once an array is created, its size cannot be changed;\
    \ trying to store a value in an array at a nonexistent index value will result\
    \ in an error when the program is running.\n\n### Control Structures\n\nThe statements\
    \ within a Java program are typically run one after the other in sequence. Control\
    \ structures can change the order of execution, either by running some statements\
    \ only when certain conditions are met or by repeating a given set of statements.\n\
    \n#### Conditional Statements\n\nAn `if` statement is used to specify that a certain\
    \ set of statements should be run only when a certain condition (or combination\
    \ of conditions or a Boolean expression) evaluates to `true`. For example, the\
    \ following code will add `100` to the variable `bonus` only if the value of `time`\
    \ is greater than `60`; if the value of `time` is not greater than `60`, the code\
    \ contained within the braces will not be executed.\n\n```\nif (time > 60)\n{\n\
