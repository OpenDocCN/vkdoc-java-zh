    欢迎阅读《使用 LibGDX 进行 Java 游戏开发》！


    在本书中，你将学习如何使用 LibGDX 游戏开发框架在 Java 中编写游戏程序。LibGDX 库既强大又易于使用，将使你能够快速高效地创建种类繁多的游戏。LibGDX
    是免费且开源的，可用于制作 2D 和 3D 游戏，并能轻松与第三方库集成以支持更多功能。


    我教授 Java 编程和视频游戏开发课程多年，常常难以找到可以毫无保留地推荐给学生的游戏编程书籍，这促使我撰写了你现在正在阅读的这本书。特别地，你会发现本书包含以下独特的组合特点，专为有志于成为游戏开发者的你（就是你！）而设计：


    *   本书推荐并解释了如何使用一个简单的 Java 开发环境，以便你能更快地投入到游戏编程中。

    *   通过使用 LibGDX 框架，你无需为常见的编程任务（如渲染图形和播放音频）而“重新发明轮子”。（从头开始编写此类代码的解释很容易就需要额外五十多页的阅读量。）LibGDX
    简化了开发流程，让你能够专注于游戏机制和设计。

    *   本书包含许多可使用 LibGDX 开发的视频游戏示例。本书的第一部分将向你介绍该框架提供的基本功能。第二部分将涵盖多种游戏，以展示 LibGDX 的强大功能和灵活性。本书的第三部分将介绍一些高级技术，以便整合到之前和新的游戏项目中。我相信，通过大量示例进行实践是学习过程的基础；你将观察到许多游戏共有的编程模式，看到在实践中编写可重用代码的好处，有机会比较和对比不同项目的代码，并通过自行实现额外功能来积累经验。

    *   在本书开头，我假设你仅对 Java 编程有基本的了解。（关于你需要具备哪些背景知识的更多细节，请参阅附录。）在本书的前几章中，高级编程概念将在游戏编程的上下文中自然出现并被需要时，逐步引入和解释。当你读到本书结尾时，你将学到许多高级
    Java 编程主题，这些主题对于一般的软件开发也很有用。


    感谢你允许我作为你的向导，开启你的游戏程序员之旅。我希望你会发现本书既富有知识性又充满乐趣，并且它能让你有能力并受到启发，去创建你自己的视频游戏，与世界分享。'
- fmt: '# Video Game Projects


    As mentioned previously, this book is unique in the number and variety of games
    that are covered. In particular, you will learn how to create the following 12
    video games in this book:


    - **Starfish Collector**. In this game, you guide a turtle who is on a quest to
    collect starfish. This simple game is used to introduce the functionality of LibGDX
    and the extended framework you will create, and is revisited frequently throughout
    the book when introducing new features, such as user interfaces, cutscenes, audio,
    tilemaps, and gamepad controls.

    - **Space Rocks**. This space-themed shoot-em-up game is inspired by the classic
    arcade game Asteroids, in which you control a spaceship and shoot lasers to destroy
    rocks that are flying around the screen.

    - **The Missing Homework**. This is a visual novel–style game that is completely
    story driven. It presents to the player a series of choices that influence the
    progression of the story. In this game, you help a student to locate his misplaced
    homework, which is located somewhere in his school.

    - **Rhythm Tapper**. This is a musical rhythm-based game in which the player presses
    a sequence of keys indicated by falling objects that overlap targets; the sequence
    is synchronized with music playing in the background.

    - **Plane Dodger**. This endless side-scrolling action game is inspired by modern
    smartphone games such as Flappy Bird and Jetpack Joyride. In this game, you control
    a plane that dodges enemies flying past, while at the same time trying to collect
    stars to earn the highest score possible.

    - **Rectangle Destroyer**. Inspired by arcade and early console games such as
    Breakout and Arkanoid, you move a paddle to bounce a ball into a wall of bricks
    to destroy them, earning points and powerups in the process.

    - **Jigsaw Puzzle**. A drag-and-drop game where you move and arrange pieces of
    an image to reconstruct a larger picture.

    - **52 Card Pickup**. A drag-and-drop solitaire card game in which you sort through
    a scattered pile of playing cards and arrange them into organized and ordered
    piles by rank and suit.

    - **Jumping Jack**. This is a side-scrolling platform–style game inspired by arcade
    and console games such as Donkey Kong and Super Mario Bros. In this game, you
    help Jack the Koala collect coins and keys on his quest to reach the goal.

    - **Treasure Quest**. This is a top-view adventure game inspired by classic console
    games such as The Legend of Zelda. In this game, you use your sword and arrows
    to defeat your enemies and collect coins to use at the item shop as you find your
    way to the treasure.

    - **Maze Runman**. This maze-based game is inspired by arcade games such as Pac-Man
    and the early console game Maze Craze. In this game, you attempt to collect all
    the coins before being captured by a ghost that continuously follows you throughout
    a randomly created maze.

    - **Starfish Collector 3D**. This game is a 3D remake of the Starfish Collector
    game introduced in the beginning of the book and introduces 3D game programming
    concepts.


    ## Changes from the First Edition


    There have been a great number of changes to the content and organization of the
    book based on feedback from readers, students, and teachers. The major changes
    are listed here:


    - Reduced number of elementary examples; in particular, the games Cheese Please
    and Balloon Buster from the first edition have been removed.

    - New functionality has been added to the `BaseActor` class to simplify gathering
    instances of a class into lists.

    - Game entities are now typically written as extensions of the `BaseActor` class
    so as to increase encapsulation and reduce the amount of code required by the
    `BaseScreen` classes.

    - The content of Chapter [4](#A352797_2_En_4_Chapter.html) (“Adding Polish to
    Your Game”) of the first edition has been separated into Chapters [5](#A352797_2_En_5_Chapter.html)
    and [6](#A352797_2_En_6_Chapter.html) in the second edition, allowing for extended
    treatment of user-interface design and audio support. Each of these topics also
    has its own dedicated example game project.

    - The material on the bitmap font–generating program Hiero has been replaced by
    bitmap font–generating classes, allowing the developer to more quickly generate
    custom fonts from true-type font (ttf) files in code. This circumvents the need
    to generate bitmap font images ahead of time, which should streamline the development
    process.

    - The code for detecting the bounce angle for the ball in Rectangle Destroyer
    has been greatly simplified.

    - The drag-and-drop–related code and tilemap-related code have been refactored
    into their own separate classes for easier reuse in other projects.

    - Individual games have been reorganized into separate chapters and introduce
    many new game mechanics. In particular, Chapter [6](#A352797_2_En_6_Chapter.html)
    (“Additional Game Case Studies”) of the first edition has been separated into
    Chapters [4](#A352797_2_En_4_Chapter.html), [7](#A352797_2_En_7_Chapter.html),
    [8](#A352797_2_En_8_Chapter.html), and [9](#A352797_2_En_9_Chapter.html) in the
    second edition. The games of Chapter [7](#A352797_2_En_7_Chapter.html) (“Integrating
    Third-Party Software”) of the first edition have been separated into Chapters
    [11](#A352797_2_En_11_Chapter.html) and [12](#A352797_2_En_12_Chapter.html) in
    the second edition.

    - Because of the importance of tilemaps, the corresponding material has been moved
    into its own chapter (Chapter [10](#A352797_2_En_10_Chapter.html)) and is used
    to simplify previous game projects (Starfish Collector and Rectangle Destroyer)
    before moving on to move advanced games in the following chapters.

    - The material on the physics engine Box2D has been eliminated to reduce complexity
    and unnecessary overhead in favor of using custom physics code.

    - Advanced topics have been added (maze generation in Chapter [14](#A352797_2_En_14_Chapter.html)
    and shader programming in Chapter [15](#A352797_2_En_15_Chapter.html)).

    - The 3D demo from the first edition (“Pirate Cruiser”) has been replaced by the
    game project Starfish Collector 3D.

    - New appendices have been added containing advice and examples for game-design
    documentation and a complete JavaDoc-style listing of the extension classes developed
    in the book as a helpful reference.


    ## Acknowledgments


    I would like to acknowledge the amazing editorial and support staff at Apress,
    for without their talent and dedication this book you are reading would not exist.
    In particular, I’d like to thank Mark Powers for his constant words of support
    and encouragement.


    I’d also like to thank the technical reviewer, Garry Patchett, for his attention
    to both the programming and the pedagogical aspects of this book. From the very
    beginning, he intuitively understood who the target audience was and the level
    of detail and guidance they needed. Garry’s many insightful comments and suggestions
    greatly improved the clarity of this book, and I am grateful for all the time
    and energy he put into helping to make this book the best that it could be.


    Finally, a special thanks to my students, past and present, for their continuous
    and infectious enthusiasm. Your drive and devotion to game development is what
    inspired me to write this book.'
