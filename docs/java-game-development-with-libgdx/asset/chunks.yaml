    Welcome to Java Game Development with LibGDX !


    In this book, you’ll learn how to program games in Java using the LibGDX game
    development framework. The LibGDX libraries are both powerful and easy to use,
    and they will enable you to create a great variety of games quickly and efficiently.
    LibGDX is free and open source, can be used to make 2D and 3D games, and integrates
    easily with third-party libraries to support additional features.


    I have taught courses in Java programming and video game development for many
    years, and I’ve often struggled to find game-programming books that I can recommend
    to my students without reservation, which led me to write this book you are currently
    reading. In particular, you will find that this book contains the following unique
    combination of features, chosen with the aspiring game developer (that’s you!)
    in mind:


    *   This book recommends and explains how to use a simple Java development environment
    so that you can move on to programming games more quickly.

    *   By using the LibGDX framework, you won’t have to “reinvent the wheel” for
    common programming tasks such as rendering graphics and playing audio. (An explanation
    of how to write such code from scratch would easily require fifty or more additional
    pages of reading.) LibGDX streamlines the development process and allows you to
    focus on game mechanics and design.

    *   This book contains many examples of video games that can be developed with
    LibGDX. The first part of the book will introduce you to the basic features provided
    by the framework. The second part will cover a variety of games to illustrate
    the power and flexibility of LibGDX. The third part of the book will introduce
    some advanced techniques to incorporate into previous and new game projects. I
    believe that working through many examples is fundamental to the learning process;
    you will observe programming patterns common to many games, see the benefits of
    writing reusable code in practice, have the opportunity to compare and contrast
    code from different projects, and gain experience by implementing additional features
    on your own.

    *   At the beginning of this book, I am assuming that you have only a basic familiarity
    with Java programming. (For more details about what background knowledge you need,
    please consult the appendix.) Throughout the first few chapters of this book,
    advanced programming concepts will be introduced and explained as they arise naturally
    and are needed in the context of game programming. By the time you reach the end
    of this book, you will have learned about many advanced Java programming topics
    that are also useful for software development in general.


    Thank you for allowing me to be your guide as you begin your journey as a game
    programmer. I hope that you will find this book both informative and enjoyable,
    and that it enables and inspires you to create your own video games to share with
    the world.'
