    ## 收集品与障碍物


    接下来，你将为“飞机躲避者”游戏添加一个目标和障碍物。第一个添加的是可收集的星星，它们会定期从屏幕右侧生成，然后向左移动；如果玩家收集到一颗星星（通过与其碰撞），他们将获得一分。


    第二个添加的是敌机，它们以类似的方式生成。如果玩家的飞机躲避（未碰撞）了一架敌机，他们将获得一分。如果玩家确实与敌机相撞，则游戏结束，并且屏幕上会显示相应的消息。将使用额外的变量来设置敌机的速度和生成频率，并且这些值会随时间缓慢变化，以逐渐增加游戏的难度。分数将简单地显示为屏幕顶部中央的一个数字，如图
    [7-1](#A352797_2_En_7_Chapter.html#Fig1) 所示。


    ### 星星


    这个项目的第一个添加物是星星对象。创建一个名为`Star`的类，其中包含以下代码。由于星星没有基于图像的动画，因此在该对象的构造函数中应用了基于值的动画——一种脉冲效果。另请注意，在`act`方法中，如果星星完全移出屏幕左边缘，则会将其从游戏中移除；这是为了减少游戏使用的内存量，从而提高性能（如果屏幕外有数百个额外的星星漂浮，显示帧率可能会低于每秒
    60 帧）。


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Star extends BaseActor

    {

    public Star(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/star.png");

    Action pulse = Actions.sequence(

    Actions.scaleTo(1.2f,1.2f, 0.5f),

    Actions.scaleTo(1.0f,1.0f, 0.5f) );

    addAction( Actions.forever(pulse) );

    setSpeed(100);

    setMotionAngle(180);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    // remove after moving past left edge of screen

    if ( getX() + getWidth() < 0 )

    remove();

    }

    }

    ```


    接下来，你需要在游戏本身的代码中设置生成机制。这将需要使用一个`float`变量（名为`starTimer`）来跟踪自上一个星星创建以来经过的时间。为了可读性，将有一个变量（名为`starSpawnInterval`）来存储星星出现的频率；该变量的值在游戏过程中不会改变。同时，需要创建一个变量来存储玩家的分数，并添加一个标签来显示分数。为了实现这些功能，在`LevelScreen`类中，首先添加以下`import`语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    import com.badlogic.gdx.math.MathUtils;

    ```


    接下来，向该类添加以下变量声明：


    ```

    float starTimer;

    float starSpawnInterval;

    int score;

    Label scoreLabel;

    ```


    接下来，为了初始化这些变量（对于标签，将其定位在用户界面上），在`initialize`方法中添加以下代码：


    ```

    starTimer = 0;

    starSpawnInterval = 4;

    score = 0;

    scoreLabel = new Label( Integer.toString(score), BaseGame.labelStyle );

    uiTable.pad(10);

    uiTable.add(scoreLabel);

    uiTable.row();

    uiTable.add().expandY();

    ```


    接下来，在`update`方法中，你需要按讨论的方式定期生成星星（并在每个新星星创建后重置`starTimer`的值），并检查玩家飞机与星星对象之间的碰撞（如果发生碰撞，则更新分数和标签）。为了完成这些任务，在`update`方法中添加以下代码：


    ```

    starTimer += dt;

    if (starTimer > starSpawnInterval)

    {

    new Star( 800, MathUtils.random(100,500), mainStage );

    starTimer = 0;

    }

    for (BaseActor star : BaseActor.getList(mainStage, "Star"))

    {

    if (plane.overlaps(star))

    {

    star.remove();

    score++;

    scoreLabel.setText( Integer.toString(score) );

    }

    }

    ```


    这是另一个测试游戏的好时机。收集星星，看着你的分数增加！然而，如果没有障碍物提供挑战，玩家很快就会失去兴趣，接下来你将添加这些障碍物。'
