    will be considered to be in the correct position, and when all the pieces are
    in the correct position, the player will have won the game, and a “You win” message
    will appear on the screen.


    To begin, create a new class called `PuzzleArea` that contains the following code,
    which provides the functionality previously described:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class PuzzleArea extends DropTargetActor

    {

    private int row;

    private int col;

    public PuzzleArea(float x, float y, Stage s)

