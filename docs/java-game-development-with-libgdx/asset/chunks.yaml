- fmt: '### The `Stage3D` Class


    Recall that the LibGDX `Stage` object handles rendering tasks (using its internal
    `Camera` and `Batch` objects) and manages a list of `Actor` objects. There are
    also `act` and `draw` methods in the `Stage` class, which call the `act` and `draw`
    methods of all attached actors. You will create similar functionality with the
    `Stage3D` class. To begin, create a new class named `Stage3D` with the following
    code. This includes a set of `import` statements, the variables required for rendering
    (`Environment`, `PerspectiveCamera`, and `ModelBatch`), and an `ArrayList` to
    store the `BaseActor3D` objects. These variables are initialized in the constructor,
    with nearly identical code to the previous example.


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.math.Vector3;

    import com.badlogic.gdx.graphics.PerspectiveCamera;

    import com.badlogic.gdx.graphics.g3d.Environment;

    import com.badlogic.gdx.graphics.g3d.ModelBatch;

    import com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;

    import com.badlogic.gdx.graphics.g3d.environment.DirectionalLight;

    import java.util.ArrayList;

    public class Stage3D

    {

    private Environment environment;

    private PerspectiveCamera camera;

    private final ModelBatch modelBatch;

    private ArrayList actorList;

    public Stage3D()

    {

    environment = new Environment();

    environment.set(new ColorAttribute(ColorAttribute.AmbientLight, 0.7f, 0.7f, 0.7f,
    1));

    DirectionalLight dLight = new DirectionalLight();

    Color lightColor = new Color(0.9f, 0.9f, 0.9f, 1);

    Vector3 lightVector = new Vector3(-1.0f, -0.75f, -0.25f);

    dLight.set( lightColor, lightVector );

    environment.add( dLight ) ;

    camera = new PerspectiveCamera(67, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());

    camera.position.set(10f, 10f, 10f);

    camera.lookAt(0,0,0);

    camera.near = 0.01f;

    camera.far = 1000f;

    camera.update();

    modelBatch = new ModelBatch();

    actorList = new ArrayList();

    }

    }

    ```


    Next, are the `act` and `draw` methods, which invoke the corresponding methods
    on all the `BaseActor3D` objects contained in the `ArrayList`. In addition, the
    camera is updated in the `act` method.


    ```

    public void act(float dt)

    {

    camera.update();

    for (BaseActor3D ba : actorList)

    ba.act(dt);

    }

    public void draw()

    {

    modelBatch.begin(camera);

    for (BaseActor3D ba : actorList)

    ba.draw(modelBatch, environment);

    modelBatch.end();

    }

    ```


    There are methods to add and remove actors and retrieve the list, given by the
    following code:


    ```

    public void addActor(BaseActor3D ba)

    {  actorList.add( ba );  }

    public void removeActor(BaseActor3D ba)

    {  actorList.remove( ba );  }

    public ArrayList getActors()

    {  return actorList;  }

    ```


    The final part of this class is an extensive set of methods to adjust the camera,
    which is a much more involved process than in a 2D game. First are the methods
    to set the camera position and to move the camera by a given amount; these values
    may be specified by either a `Vector3` object or three `float` values:


    ```

    public void setCameraPosition(float x, float y, float z)

    {  camera.position.set(x,y,z);  }

    public void setCameraPosition(Vector3 v)

    {  camera.position.set(v);  }

    public void moveCamera(float x, float y, float z)

    {  camera.position.add(x,y,z);  }

    public void moveCamera(Vector3 v)

    {  camera.position.add(v);  }

    ```


    Next, building on these methods are additional methods that move the camera relative
    to its current position. A `Camera` object stores two internal `Vector3` objects:
    `direction`, which determines where the camera is currently facing, and `up`,
    which determines the direction that should be oriented toward the top of the screen.
    When moving the camera forward and backward in this program, the camera should
    maintain a constant height (even if the camera is tilted at an angle), and so
    the y component of the vector `direction` can be set to 0 in order to yield a
    vector that moves you forward in this way. Once the vector has been determined,
    it needs to be scaled by the distance you want the camera to travel, and then
    the vector should be added to the camera’s current position via the `moveCamera`
    function. For moving to the left and right, you will similarly discard the y component
    of the vector; to transform the `direction` vector into a vector pointing to the
    right, interchange the x and z values and negate the z value, as illustrated by
    the example in Figure [16-7](#A352797_2_En_16_Chapter.html#Fig7). In this picture,
    keep in mind that the values displayed refer to the change in direction represented
    by each of the vectors.


    ![A352797_2_En_16_Fig7_HTML.jpg](A352797_2_En_16_Fig7_HTML.jpg)


    Figure 16-7. Converting a forward-facing vector to a rightward-facing vector


    Moving the camera upward is a straightforward task. In this case, movement will
    always be in the direction of the y-axis and not the camera’s `up` vector, since
    when the camera is tilted, its `up` vector will no longer be pointing in the same
    orientation as the y-axis. The methods for moving the camera in these ways are
    as follows:


    ```

    public void moveCameraForward(float dist)

    {

    Vector3 forward = new Vector3(camera.direction.x, 0, camera.direction.z).nor();

    moveCamera( forward.scl( dist ) );

    }

    public void moveCameraRight(float dist)

    {

    Vector3 right = new Vector3(camera.direction.z, 0, -camera.direction.x).nor();

    moveCamera( right.scl( dist ) );

    }

    public void moveCameraUp(float dist)

    {  moveCamera( 0,dist,0 );  }

    ```


    Functionality should also be provided for rotating the camera, and, once again,
    restricting the types of possible camera movement will make the navigation easier
    for the user to visualize. As with `BaseActor3D` objects, the camera will be able
    to turn to the left and right, which corresponds to rotating it around the y-axis.
    In addition, it would be convenient to be able to tilt the camera up and down
    to look higher and lower. This can be done by determining the vector that points
    to the right, as before, and then rotating the `direction` vector of the camera
    around the vector pointing to the right. These two methods, `turnCamera` and `tiltCamera`,
    are given here:


    ```

    public void turnCamera(float angle)

    {  camera.rotate( Vector3.Y, -angle );  }

    public void tiltCamera(float angle)

    {

    Vector3 right = new Vector3(camera.direction.z, 0, -camera.direction.x);

    camera.direction.rotate(right, angle);

    }

    ```


    Finally, it is important to be able to orient the camera to look at a particular
    position. This is accomplished with a camera method called `lookAt`, but this
    method may have the undesired result of tilting the camera to the left or right,
    making the horizon no longer level, which can be disorienting to the player. So,
    after calling the camera’s `lookAt` method, the camera’s `up` axis needs to be
    reset to the direction of the y-axis to correct this problem; this method will
    be called `setCameraDirection`. As before, this method will be overloaded to take
    either a `Vector3` or three `float` values as input.


    ```

    public void setCameraDirection(Vector3 v)

    {

    camera.lookAt(v);

    camera.up.set(0,1,0);

    }

    public void setCameraDirection(float x, float y, float z)

    {   setCameraDirection( new Vector3(x,y,z) );   }

    ```'
