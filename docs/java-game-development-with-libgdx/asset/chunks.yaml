- fmt: "Sometimes, your program will contain a runtime error, often caused by issues\
    \ such as entering a filename incorrectly (which cannot be detected when the program\
    \ is compiled). In this case, after fixing the error and running the program again,\
    \ you may encounter a different error containing the message “No OpenGL context\
    \ found in the current thread.” This is due to the prior unexpected shutdown of\
    \ the application and can usually be fixed in BlueJ by resetting the Java virtual\
    \ machine, which can be done via the `Tools` menu or with a shortcut key combination\
    \ (`Ctrl-Shift-R` on Windows).\n\n## Advantages to Using LibGDX\n\nIn addition\
    \ to the ability to compile your game so that it can run on multiple platforms,\
    \ there are many other advantages to using the LibGDX game development framework.\
    \ LibGDX makes it easy to accomplish tasks such as these:\n\n*   Render 2D graphics,\
    \ animations, bitmap-based fonts, and particle effects\n*   Stream music and play\
    \ sound effects\n*   Process input from a keyboard, mouse, touchscreens, accelerometer,\
    \ or game pad\n*   Organize user interfaces using a scene graph and fully skinnable\
    \ UI control library\n*   Integrate third-party plug-ins, such as the Box2D physics\
    \ engine (`box2d.org`), the Tiled map editor file format (`mapeditor.org`), and\
    \ the Spine 2D animation software (`esotericsoftware.com`)\n*   Render 3D graphics\
    \ with materials and lighting effects and load 3D models from common file formats\
    \ such as OBJ and FBX\n\nA complete list of LibGDX features can be found at the\
    \ website: [`http://libgdx.badlogicgames.com/features.html`](http://libgdx.badlogicgames.com/features.html).\n\
    \n## Summary\n\nIn this chapter, you’ve set up BlueJ, an integrated development\
    \ environment for Java programming, and configured BlueJ to use the LibGDX game\
    \ development framework. Then, you created your first application with LibGDX:\
    \ a “Hello, World!” program that displays an image of the world in a window. This\
    \ program involved extending LibGDX’s `Game` class and creating a `driver` class\
    \ that runs the program on the desktop. Along the way, you learned about a few\
    \ of the other classes involved in this program. Finally, you learned about some\
