    the piece may be repositioned, thus freeing up the area once again.


    There are only two game-specific objects that need to be created for this project:
    a class named `PuzzlePiece`, which represents the individual pieces and will extend
    `DragAndDropActor`, and a class named `PuzzleArea`, which represents the grid
    squares on which pieces will be dropped and will extend `DropTargetActor`. When
    the puzzle pieces are initialized, a row and column value will be stored that
    indicates its location in the original image. The puzzle-area objects will also
