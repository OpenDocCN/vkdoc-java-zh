- fmt: '### Bitmap Fonts


    The data for a computer-generated font is typically stored in one of two ways:
    either as a set of mathematical curves and formulas (these are called outline
    fonts or vector fonts and include standards such as TrueType font) or as a set
    of images. The latter is referred to as a bitmap font and is the format used by
    the `LabelStyle` class.


    To create a `BitmapFont` object, you need two things: an image that contains all
    the characters you may want to represent in your application (Figure [5-4](#A352797_2_En_5_Chapter.html#Fig4)
    contains an example) and an associated data file that lists the region (position
    and size) corresponding to each character. For example, the region in Figure [5-4](#A352797_2_En_5_Chapter.html#Fig4)
    corresponding to the character A is located at x=319, y=134 and has width of 45
    and a height of 41. When a bitmap font is used to display text, the image region
    corresponding to each character of the text is extracted, and these image regions
    are aligned side by side to produce the result seen onscreen.


    ![A352797_2_En_5_Fig4_HTML.jpg](A352797_2_En_5_Fig4_HTML.jpg)


    Figure 5-4. An image file (512 by 256 pixels) used to create a bitmap font


    There are two approaches that will be discussed for creating a bitmap font: using
    an external application to generate the necessary files prior to running your
    program, or using a special class to generate the required object at runtime.
    Each approach has its advantages and disadvantages. Using an external application
    lets you immediately see and adjust how the letters will appear when rendered,
    but running the application takes additional time and requires you to save additional
    files to your project’s `assets` folder. The class-based approach makes it easier
    to change font parameters (only requiring changes to the code and avoiding having
    to save a new pair of files), but you will not see how the text appears until
    you run the program. Both approaches are fully explained in what follows. In the
    sample code for this chapter, the second of these approaches will ultimately be
    used, but in your own project, the final choice is up to you.


    #### Using Hiero: A Bitmap Font Editor


    An application named Hiero is provided by LibGDX and can be used to generate bitmap
    font data using fonts installed on your computer. The first version of Hiero was
    created by Kevin Glass for use with his Java game development library, Slick2D.
    Since then, Hiero has been ported to LibGDX by Nathan Sweet, one of the major
    contributors to the LibGDX libraries. Hiero is packaged as an executable JAR file;
    the current link to download it is posted on the LibGDX Wiki page,[¹](#A352797_2_En_5_Chapter.html#Fn1)
    as well as on the LibGDX Tools page,[²](#A352797_2_En_5_Chapter.html#Fn2) which
    is accessible from the Downloads page of the main LibGDX website.


    When you start Hiero, a variety of options are presented. Figure [5-5](#A352797_2_En_5_Chapter.html#Fig5)
    contains a screenshot of the program in action. In the upper-left area, you may
    select a locally installed font; in the center region, you can enter the characters
    whose images you wish to generate (although leaving the default character set
    is recommended); in the upper-right area, you can select various effects to apply
    to the image (provided that Rendering: Java has been selected), including solid
    coloring, gradient coloring, outline, and drop shadow. Parameters for effects
    can be altered by clicking their values and entering or selecting a new value.
    The order in which the effects appear is important, as the effects are applied
    from top to bottom. When finished, select Save BMFont files from the File menu,
    and you’ll have an FNT and PNG file ready to be used by the LibGDX `BitmapFont`
    class. The `assets` folder for this project contains the results of saving the
    bitmap font shown in this figure; the corresponding files are named `cooper.fnt`
    and `cooper.png`. To use this font in LibGDX, in the `create` method of the `BaseGame`
    class, you would change the line of code that sets the label-style object’s font
    variable to the following:


    ![A352797_2_En_5_Fig5_HTML.jpg](A352797_2_En_5_Fig5_HTML.jpg)


    Figure 5-5. The Hiero application for generating bitmap font data


    ```

    labelStyle.font = new BitmapFont( Gdx.files.internal("myCustomFont.fnt") );

    ```


    #### Using the FreeType Font Generator


    Rather than create a bitmap font with an application, it is possible to use the
    `FreeTypeFontGenerator` class to create the bitmap font in code, eliminating the
    dependence on the external application. To create the font, you will need to include
    a TrueType Font file (extension TTF) in your `assets` folder as a basis for the
    bitmap font. TrueType fonts can easily be found online with an internet search.[³](#A352797_2_En_5_Chapter.html#Fn3)


    To begin, in the `BaseGame` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g2d.freetype.FreeTypeFontGenerator;

    import com.badlogic.gdx.graphics.g2d.freetype.FreeTypeFontGenerator.FreeTypeFontParameter;

    ```


    Then, in the `create` method, initialize a `FreeTypeFontGenerator` object with
    a reference to the TTF file with the following code:


    ```

    FreeTypeFontGenerator fontGenerator =

    new FreeTypeFontGenerator(Gdx.files.internal("assets/OpenSans.ttf"));

    ```


    Next, to configure the appearance of the font, create a `FreeTypeFontParameter`
    object, which allows you to specify a font size, font color, border width, border
    color, straight or rounded border edges, and so forth. You can also set texture
    filters, which determine how text appears if it is scaled in the application.
    To do so, add the following code to the `create` method:


    ```

    FreeTypeFontParameter fontParameters = new FreeTypeFontParameter();

    fontParameters.size = 48;

    fontParameters.color = Color.WHITE;

    fontParameters.borderWidth = 2;

    fontParameters.borderColor = Color.BLACK;

    fontParameters.borderStraight = true;

    fontParameters.minFilter = TextureFilter.Linear;

    fontParameters.magFilter = TextureFilter.Linear;

    ```


    Once this code is complete, you can generate the bitmap font and assign it by
    changing the line of code that sets the label style’s font to the following:


    ```

    BitmapFont customFont = fontGenerator.generateFont(fontParameters);

    labelStyle.font = customFont;

    ```


    With this task completed, you are ready to turn your attention to creating labels
    and using them to display text in your game.'
