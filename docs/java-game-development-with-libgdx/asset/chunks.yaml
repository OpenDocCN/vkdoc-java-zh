- fmt: '# Summary and Next Steps


    In this chapter, you learned how to create user-interface objects such as labels,
    image-based buttons, and text-based buttons. You created your own customized bitmap
    font for use in labels and text-based buttons and added some convenient default
    style objects to the `BaseGame` class. You specified the functionality of buttons
    using a lambda expression, which is a convenient shorthand notation for creating
    anonymous inner classes for functional interfaces. You learned how to efficiently
    arrange user-interface elements using tables and added table support to the `BaseScreen`
    class.


    In the Starfish Collector game, you added a label to display the number of starfish
    remaining and a button to reset the level, and on the menu screen you added some
    text buttons to let the player start or quit the game. Next, you created the `DialogBox`
    class to conveniently display messages during gameplay, and you implemented a
    sign-reading mechanic with the help of a new method in the `BaseActor` class to
    determine when two objects are close to each other. Then, you created an entire
    framework for displaying cutscenes, including the new classes `Scene`, `SceneSegment`,
    `SetTextAction`, and `SceneActions`. Finally, you pushed the cutscene framework
    to its limits and created The Missing Homework, an entirely new game from the
    visual-novel genre.


    At this point, there are many additions you could make to either game. In Starfish
    Collector, you could add a new game mechanic, such as a time limit for the turtle
    to collect all the starfish, in which case you would want to display the time
    remaining in another label and perhaps include a Pause button in your game. If
    you enjoyed creating the cutscene, you could add another class that plays a cutscene
    after the turtle collects all the starfish.


    In The Missing Homework, simple additions would be more dialogue or locations.
    As a more substantial addition, you could add extra goals to complete during the
    game. For example, perhaps one location contains a key, and if the player collects
    the key, then another location will have an additional option (text button) that
    appears, such as "Unlock the door," leading to a previously inaccessible location.


