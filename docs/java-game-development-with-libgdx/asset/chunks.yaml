    Figure 3-5.


    The Starfish Collector game


    ## Physics and Movement


    One of the issues raised at the beginning of this chapter was that in the version
    of Starfish Collector from the previous chapter, movement was not “smooth”: the
    speed of the turtle changed instantly from 0 to 60 pixels per second. In reality,
    speed changes over time; objects accelerate and decelerate. In this section, you
    will learn about some technical terms and concepts from physics and how to implement
    them in the `BaseActor` class, which will enable you to add movement to your game.
    While you don’t have to master the underlying mathematical concepts to create
    the games in this book, detailed explanations are included so that you can understand
    the code that is written.


    ### Velocity


    The velocity of an object indicates how an object’s position is changing over
    time, including both the speed and direction of movement. Just as position is
    specified using two values[¹](#A352797_2_En_3_Chapter.html#Fn1)—x and y coordinates—velocity
    also has two components, which represent how each of these coordinates is changing.
    If the unit of measurement for position is pixels, and the unit of time is seconds,
    then the unit of measurement for velocity is pixels per second, often written
    as pixels/second. In mathematics, velocity is typically written using vector notion:
    the vector with components a and b is written with angle brackets, as < a , b
    >. In contrast, a position with coordinates x and y is typically written using
    parentheses, as ( x , y ). Vectors are visually represented as arrows; the vector
    <> is drawn with the end point located a units horizontally and b units vertically
    from the start point, as illustrated in Figure [3-6](#A352797_2_En_3_Chapter.html#Fig6).
    The quantity speed can be viewed as the length (also called the magnitude) of
    this vector, denoted by S in the figure. The direction of the vector is quantified
    by the angle between the vector and a horizontal vector pointing to the right
    (along the direction of the positive x-axis); this angle is denoted by A in the
    figure. Given the values of a and b, the length and direction angle can be calculated
    using mathematics (using the Pythagorean Theorem and trigonometric functions,
    respectively), but thanks to the methods provided by the LibGDX `Vector2` class
    (using the methods `len` and `angle`, respectively), you will not need to code
    these formulas yourself .


    ![A352797_2_En_3_Fig6_HTML.jpg](A352797_2_En_3_Fig6_HTML.jpg)


    Figure 3-6.


    Visual representation of the vector < a , b >, with length S and direction angle
    A


    Calculations involving position and velocity are relatively straightforward. For
    example, if an object’s position is initially ( 7 , 5 ), and its velocity is <
    2 , 3 >, then:


    *   After a one-second interval, the position will be ( 7 + 2 , 5 + 3 ) = ( 9
    , 8 ).

    *   After a two-second interval, the position will be ( 9 + 2 , 8 + 3 ) = ( 11
    , 11 ).

    *   After a three-second interval, the position will be ( 11 + 2, 11 + 3 ) = (
    13 , 14 ).


    In general, if the initial position is ( x , y ) and the velocity is < a , b >,
    then after a t-second interval has passed, the formula for the position is ( x
    + t*a , y + t*b ). This formula also works for fractional values of t as well.


    To incorporate velocity data to the `BaseActor` class, add the following `import`
    statements:


    ```

    import com.badlogic.gdx.math.Vector2;

    import com.badlogic.gdx.math.MathUtils;

    ```


    Then, add the following field to the class:


    ```

    private Vector2 velocityVec ;

    ```


    You initialize this variable by adding the following statement to the `constructor`
    method:


    ```

    velocityVec = new Vector2(0,0);

    ```


    Next, you will add methods to set and get the speed and angle of motion of the
    `Actor` object. One subtle problem to consider is how the speed or angle should
    be set when the velocity vector is < 0 , 0 > (which corresponds to a speed of
    0 and an undefined angle of motion). In this situation, setting the speed will
    cause the angle of motion to be zero degrees (along the direction of the positive
    x-axis), while setting the angle will have no effect (since if the speed of an
    object is 0, then it does not make sense to speak of it moving in any direction).
    The code for these methods is as follows:


    ```

    public void setSpeed(float speed)

    {

    // if length is zero, then assume motion angle is zero degrees

    if (velocityVec.len() == 0)

    velocityVec.set(speed, 0);

    else

    velocityVec.setLength(speed);

    }

    public float getSpeed()

    {

    return velocityVec.len();

    }

    public void setMotionAngle(float angle)

    {

    velocityVec.setAngle(angle);

    }

    public float getMotionAngle()

    {

    return velocityVec.angle();

    }

    ```


    The `getMotionAngle` method is particularly convenient for making an object face
    the direction in which it is moving, which can be accomplished with the code `setRotation(
    getMotionAngle() )` in the `act` method of an `Actor`. In some games, you may
    want to know when an `Actor` is moving (or not); for this purpose, include the
    following method in the `BaseActor` class as well:


    ```

    public boolean isMoving()

    {

    return (getSpeed() > 0);

    }

    ```'
