    dialogBox.setFontScale(0.80f);

    dialogBox.alignCenter();

    dialogBox.setVisible(false);

    uiTable.row();

    uiTable.add(dialogBox).colspan(3);

    ```


    Finally, in the `update` method , for each of the signs, you need to make sure
    the turtle does not overlap the signs (as they are solid objects in the game)
    as well as determine if the turtle is sufficiently near a sign (in this case,
    you’ll assume that four pixels is sufficiently close). If the turtle is near a
    sign and the sign is not currently being viewed, then you will set the text of
    the dialog box according to the text stored in the sign, make the dialog box visible,
    and mark the sign as currently being viewed. You also need a way to make the dialog
    box invisible once the turtle has moved away from the sign currently being viewed.
    Therefore, there is a second condition in this loop, which checks if a sign is
    being viewed and the turtle is not nearby, in which case the dialog box becomes
    invisible and the sign is marked as no longer viewed. To implement this, add the
    following code to the `update` method :


    ```

    for ( BaseActor signActor : BaseActor.getList(mainStage, "Sign") )

    {

    Sign sign = (Sign)signActor;

    turtle.preventOverlap(sign);

    boolean nearby = turtle.isWithinDistance(4, sign);

    if ( nearby && !sign.isViewing() )

    {

    dialogBox.setText( sign.getText() );

    dialogBox.setVisible( true );

    sign.setViewing( true );

    }

    if (sign.isViewing() && !nearby)

    {

    dialogBox.setText( " " );

    dialogBox.setVisible( false );

    sign.setViewing( false );

    }

    }

    ```


    At this point, you have finished implementing the sign-reading mechanic ; you
    should test your game to make sure everything works as expected. The same approach
    demonstrated here can be used to implement NPCs as well, just by replacing the
    sign graphic with the image of the character with whom you’d like to be able to
    speak.'
  trans: '

    接下来，你将创建游戏中的标志牌。和往常一样，这些对象将继承 `BaseActor` 类，并且如你所料，它们会存储文本，供 `DialogBox` 对象显示。此外，它们还将包含一个布尔变量，用于跟踪该标志牌的文本当前是否正在被查看。（稍后你会看到，在切换对话框的可见性时，这个信息非常方便。）为此，创建一个名为
    `Sign` 的新类，包含以下代码：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Sign extends BaseActor

    {

    // 要显示的文本

    private String text;

    // 用于判断标志牌文本当前是否正在显示

    private boolean viewing;

    public Sign(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/sign.png");

    text = " ";

    viewing = false;

    }

    public void setText(String t)

    {  text = t;  }

    public String getText()

    {  return text;  }

    public void setViewing(boolean v)

    {  viewing = v;  }

    public boolean isViewing()

    {  return viewing;  }

    }

    ```


    接下来，你需要一种方法来判断两个角色是否“接近”。你将通过临时放大其中一个角色的边界多边形，然后检查是否重叠来实现这一点。最简便的放大多边形方法是设置其缩放比例（在
    x 和 y 两个方向上）⁴；后续的计算假设该角色尚未在任何方向上进行过缩放。例如，如果一个角色的宽度和高度均为 50 像素，而你想判断另一个角色是否进入其
    10 像素范围内，那么你需要将每个维度增加 20 像素（每边 10 像素），这相当于缩放因子为 (50 + 20)/50 = 1.4。这个计算由以下方法完成，你应该将其添加到
    `BaseActor` 类中：


    ```

    public boolean isWithinDistance(float distance, BaseActor other)

    {

    Polygon poly1 = this.getBoundaryPolygon();

    float scaleX = (this.getWidth() + 2 * distance) / this.getWidth();

    float scaleY = (this.getHeight() + 2 * distance) / this.getHeight();

    poly1.setScale(scaleX, scaleY);

    Polygon poly2 = other.getBoundaryPolygon();

    // 初步测试以提高性能

    if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

    return false;

    return Intersector.overlapConvexPolygons( poly1, poly2 );

    }

    ```


    最后，你可以将标志牌和对话框添加到游戏中，并实现阅读标志牌的机制。在 `LevelScreen` 类中，首先添加以下变量声明：


    ```

    private DialogBox dialogBox;

    ```


    接着，在 `initialize` 方法中，添加以下代码来初始化并配置两个标志牌，以及用于显示相应文本的对话框（该对话框通过 `uiTable` 定位在用户界面中）。


    ```

    Sign sign1 = new Sign(20,400, mainStage);

    sign1.setText("西海星湾");

    Sign sign2 = new Sign(600,300, mainStage);

    sign2.setText("东海星湾");

    dialogBox = new DialogBox(0,0, uiStage);

    dialogBox.setBackgroundColor( Color.TAN );

    dialogBox.setFontColor( Color.BROWN );

    dialogBox.setDialogSize(600, 100);

    dialogBox.setFontScale(0.80f);

    dialogBox.alignCenter();

    dialogBox.setVisible(false);

    uiTable.row();

    uiTable.add(dialogBox).colspan(3);

    ```


    最后，在 `update` 方法中，对于每个标志牌，你需要确保乌龟不与标志牌重叠（因为它们在游戏中是实体对象），同时判断乌龟是否足够靠近某个标志牌（在此例中，假设四个像素即为足够接近）。如果乌龟靠近一个标志牌且该标志牌当前未被查看，那么你将根据标志牌中存储的文本设置对话框的文本，使对话框可见，并将该标志牌标记为当前正在被查看。你还需要一种方法，在乌龟离开当前正在查看的标志牌后，使对话框不可见。因此，这个循环中还有第二个条件，用于检查某个标志牌是否正在被查看且乌龟不在附近，在这种情况下，对话框变为不可见，并将该标志牌标记为不再被查看。为了实现这一点，将以下代码添加到
    `update` 方法中：


    ```

    for ( BaseActor signActor : BaseActor.getList(mainStage, "Sign") )

    {

    Sign sign = (Sign)signActor;

    turtle.preventOverlap(sign);

    boolean nearby = turtle.isWithinDistance(4, sign);

    if ( nearby && !sign.isViewing() )

    {

    dialogBox.setText( sign.getText() );

    dialogBox.setVisible( true );

    sign.setViewing( true );

    }

    if (sign.isViewing() && !nearby)

    {

    dialogBox.setText( " " );

    dialogBox.setVisible( false );

    sign.setViewing( false );

    }

    }

    ```


    至此，你已经完成了阅读标志牌机制的实现；你应该测试游戏，确保一切按预期工作。这里演示的相同方法也可以用于实现 NPC，只需将标志牌图形替换为你希望与之对话的角色图像即可。

