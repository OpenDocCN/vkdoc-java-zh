    and `saveButton` objects make use of the methods provided by the `FileUtils` class
    that you wrote earlier.


    To run this application, you need two more classes, as usual: one that extends
    the `BaseGame` class, and a `launcher` class. To this end, first create a new
    class called `RecorderGame` with the following code:


    ```

    public class RecorderGame extends BaseGame

    {

    public void create()

    {

    super.create();

    setActiveScreen( new RecorderScreen() );

    }

    }

    ```


    Next, for the `launcher` class, create a new class called `RecorderLauncher` with
    the following code:


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class RecorderLauncher

    {

    public static void main (String[] args)

    {

    BaseGame myGame = new RecorderGame();

    LwjglApplication launcher = new LwjglApplication( myGame, "Recorder", 800, 600
    );

    }

    }

    ```


    To use this class, run the `main` method of `RecorderLauncher` , then click the
    button labeled “Load Music File” and select a song. A sample MP3 is included in
    the `assets` folder, named `FunkyJunky.mp3`, created by Jason Shaw from `audionautix.com,`
    [²](#A352797_2_En_6_Chapter.html#Fn2) but you can feel free to use your own music
    files if desired. Then, position your fingers over the F, G, H, and J keys and
    click the button labeled “Record Keystrokes.” The music will immediately begin
    playing, at which point you should press the keys in time with the beat of the
    music you selected. This is likely the most difficult part of the process, as
    it requires you to be familiar with the music and have precise timing. When the
    song is finished, click the button labeled “Save Keystroke File,” and in the file-chooser
    window that appears, select a location and enter a filename to save your file.
    You can enter whatever extension you like for this file. There is a sample file
    named `FunkyJunky.key` in the `assets` folder, which you can use later on in the
    game application; you will probably want to choose a different filename for your
    data file. When you are finished, make sure that both the music file and your
    data file are in the `assets` folder for your project for easy access by the game
    application you will develop next.


    ## The Game Application


    Now that you have a song data file to accompany a music file, you will turn your
    attention to creating the game application. To program this game efficiently,
    you will use a number of lists, which will store the different keys the player
    may press, the four target boxes that appear near the bottom of the screen, and
    a list of falling boxes that lie above each target box (and these lists of falling
    boxes will themselves be stored in a list).


    Before starting the game itself, you will set up classes for the target boxes
    and the falling boxes. First, create a new class called `TargetBox` with the following
    code. Notice that the constructor also requires a string (the letter that will
    be displayed on the box) and a color (which will be used by the label displaying
    the letter).


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    import com.badlogic.gdx.utils.Align;

    public class TargetBox extends BaseActor

    {

    public TargetBox(float x, float y, Stage s, String letter, Color color)

    {

    super(x,y,s);

    loadTexture("assets/box.png");

    setSize(64,64);

    // add a centered label containing letter with given color

    Label letterLabel = new Label(letter, BaseGame.labelStyle);

    letterLabel.setSize(64,64);

    letterLabel.setAlignment(Align.center);

    letterLabel.setColor( color );

    this.addActor(letterLabel);

    }

    }

    ```


    Next, create a new class called `FallingBox` with the following code. Note that
    the same image is being used by the `TargetBox` class , but the `FallingBox` class
    scales it down so that it will appear to fit within the `TargetBox` objects. Also
    notice that the `act` method has been implemented and `applyPhysics` has been
    called; this is because the falling boxes will have their speed and angle of motion
    set later so that they do in fact appear to be falling down.


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class FallingBox extends BaseActor

    {

    public FallingBox(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/box.png");

    setScale(0.75f, 0.75f);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    }

    }

    ```


