    button labeled “Load Music File” and select a song. A sample MP3 is included in
    the `assets` folder, named `FunkyJunky.mp3`, created by Jason Shaw from `audionautix.com`,
    but you can feel free to use your own music files if desired. Then, position your
    fingers over the F, G, H, and J keys and click the button labeled “Record Keystrokes.”
    The music will immediately begin playing, at which point you should press the
    keys in time with the beat of the music you selected. This is likely the most
    difficult part of the process, as it requires you to be familiar with the music
