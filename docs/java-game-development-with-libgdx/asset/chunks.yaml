    working with the LibGDX library .


    ## Choosing a Development Environment


    Before diving into Java programming, you will need to set up an integrated development
    environment (IDE)— the software you will use for writing, debugging, and compiling
    code. There are many editors for writing your Java programs, each customized for
    different skill levels. BlueJ ( [`www.bluej.org`](http://www.bluej.org) ) and
    DrJava ( [`www.drjava.org`](http://www.drjava.org) ) are designed for beginners
    and educational use and are frequently used in introductory programming courses
    in schools and colleges. IntelliJ IDEA ( [`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/)
    ), NetBeans (`netbeans.org`), and Eclipse (`eclipse.org`) are advanced editors
    that are preferred by practicing professionals. For compiling and running Java
    code, you’ll need the Java Development Kit (JDK) , which is available directly
    from the Oracle Corporation or is bundled directly with some of the editors just
    listed.


    Each editor has advantages and disadvantages. BlueJ and DrJava are user friendly
    and have simple, minimal user interfaces, but lack some of the advanced editors’
    features, such as autocompletion of fields, methods, and import statements. The
    advanced editors are faster, feature-packed, more powerful, highly customizable,
    and replete with various plug-ins, but they also have a steep learning curve and
    user interfaces that may be more daunting to beginners. Figure [1-1](#A352797_2_En_1_Chapter.html#Fig1)
    illustrates this point with a side-by-side comparison of the Eclipse and BlueJ
    interfaces. The screenshots and descriptions of the BlueJ software in this chapter
    are from BlueJ version 4.1.0.


    ![A352797_2_En_1_Fig1_HTML.jpg](A352797_2_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    User interfaces for Eclipse (left) and BlueJ (right)


    This chapter will cover how to set up BlueJ . I chose this particular IDE because
    it is quick and easy to set up and configure, which will enable you to start programming
    games even faster. However, if you are already familiar and comfortable with one
    of the more advanced editors, of course you should feel free to use it rather
    than BlueJ. A wealth of informational material is available for setting up Eclipse,
    NetBeans, and IntelliJ IDEA with LibGDX at the LibGDX wiki ( [`https://github.com/libgdx/libgdx/wiki`](https://github.com/libgdx/libgdx/wiki)
    ). If you choose to use one of these programs, then after your IDE is set up,
    skip ahead to the upcoming section “Creating a ‘Hello, World!’ Program for LibGDX.”


    ## Setting Up BlueJ


    This section will cover how to set up the BlueJ IDE . Since it was designed for
    beginners, the number of steps is small and the process is straightforward, as
    you will see.


    ### Downloading and Installing


    BlueJ can be downloaded from [`www.bluej.org`](http://www.bluej.org) .


    There are multiple download options available for a variety of operating systems.
    Furthermore, some of these downloads are bundled with the JDK, and some are not.
    The JDK includes tools for developing and debugging Java applications; in particular,
    it is necessary for compiling your code. If you have used your computer to develop
    Java applications before, you likely already have the JDK installed and can just
    select the stand-alone BlueJ installer. If you aren’t sure, you should download
    and run the BlueJ combined installer.'
  trans: '

    # 第一部分

    基本概念


    基本概念


    在接下来的章节中，你将了解 LibGDX 库，并在此库的基础上构建一个自定义框架，以简化各类游戏的创建。这些章节是本书其余部分的基础；后续章节将假定你已经掌握了此处所介绍主题的实用知识。


    第 1 章：Java 与 LibGDX 入门


    本章将解释如何设置 BlueJ，这是一个因其简洁性和用户友好性而被选中的 Java 开发环境。将解释标准的第一个程序（即在文本控制台打印“Hello, World!”）。接着，将给出设置
    LibGDX 软件库的说明，并展示一个可视化的“Hello, World!”程序（该程序在一个窗口中显示一幅世界图像）。最后，将详细解释使用 LibGDX
    进行游戏开发的一些优势。


    第 2 章：LibGDX 框架


    本章将首先讨论视频游戏程序的整体结构，包括游戏程序所经历的阶段以及每个阶段必须完成的任务。在创建一个名为“海星收集者”的基础游戏的过程中，将介绍 LibGDX
    库的许多主要特性和类。这个游戏是贯穿全书的一个反复出现的示例；在介绍新主题时，会向该项目添加新功能。


    第 3 章：扩展框架


    在本章中，你将从一个代表游戏实体的核心 LibGDX 类开始，并创建该类的扩展，以支持动画、基于物理的运动、改进的碰撞检测，以及使用列表管理实体多个实例的能力。


    第 4 章：射击游戏


    本章将展示你所创建框架的强大功能，通过使用该框架制作一个全新的游戏：太空岩石，这是一款受经典街机游戏《小行星》启发的太空主题射击游戏。在此过程中，你将向框架添加功能，加入处理离散动作（如发射激光）输入的能力（与连续动作（如移动）相对）。


    第 5 章：文本与用户界面


    在本章中，你将学习如何显示文本、创建显示图像或文本的按钮，以及使用表格设计用户界面。首先，你将通过向第 3 章的“海星收集者”游戏添加这些功能来学习这些技能。然后，你将在学习如何创建过场动画（有时称为游戏内动画）的过程中巩固并加强这些技能，这些过场动画为你的游戏提供了叙事元素。在可选的最后一节中，你将创建一个名为“失踪的作业”的视觉小说风格游戏，该游戏侧重于一个故事，并允许玩家决定故事如何发展。


    第 6 章：音频


    在本章中，你将学习如何向游戏添加音频元素——音效和背景音乐。首先，你将通过向“海星收集者”添加这些功能来了解这些主题。然后，在可选部分中，你将通过一个名为“节奏敲击者”的音乐节奏游戏来巩固这些技能，在该游戏中，玩家按下视觉上指示的一系列按键，这些按键与背景播放的音乐同步。


    # 1. Java 与 LibGDX 入门


    本章将解释如何设置 Java 开发环境，并将其配置为与 LibGDX 游戏开发框架一起运行。你将看到一个简单的“Hello, World!”程序示例，并对其进行足够详细的探索，以理解其不同部分。最后，你将了解使用
    LibGDX 库所能获得的一些优势。


    ## 选择开发环境


    在深入 Java 编程之前，你需要设置一个集成开发环境（IDE）——你将用于编写、调试和编译代码的软件。有许多用于编写 Java 程序的编辑器，每个都针对不同的技能水平进行了定制。BlueJ（[`www.bluej.org`](http://www.bluej.org)）和
    DrJava（[`www.drjava.org`](http://www.drjava.org)）专为初学者和教育用途设计，常用于学校和大学的编程入门课程。IntelliJ
    IDEA（[`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/)）、NetBeans（`netbeans.org`）和
    Eclipse（`eclipse.org`）是高级编辑器，受到从业专业人士的青睐。要编译和运行 Java 代码，你需要 Java 开发工具包（JDK），它可以直接从
    Oracle 公司获得，或者直接与上面列出的一些编辑器捆绑在一起。


    每个编辑器都有优点和缺点。BlueJ 和 DrJava 用户友好，具有简单、极简的用户界面，但缺乏一些高级编辑器的功能，例如字段、方法和导入语句的自动补全。高级编辑器速度更快、功能丰富、更强大、高度可定制，并且拥有各种插件，但它们也有陡峭的学习曲线，并且其用户界面可能对初学者来说更令人生畏。图
    1-1 通过并排比较 Eclipse 和 BlueJ 的界面说明了这一点。本章中 BlueJ 软件的截图和描述来自 BlueJ 4.1.0 版本。


    ![A352797_2_En_1_Fig1_HTML.jpg](img/A352797_2_En_1_Fig1_HTML.jpg)


    图 1-1.


    Eclipse（左）和 BlueJ（右）的用户界面


    本章将介绍如何设置 BlueJ。我选择这个特定的 IDE，是因为它设置和配置起来快速且简单，这将使你能够更快地开始编写游戏程序。但是，如果你已经熟悉并习惯使用更高级的编辑器之一，当然可以随意使用它而不是
    BlueJ。在 LibGDX 维基（[`https://github.com/libgdx/libgdx/wiki`](https://github.com/libgdx/libgdx/wiki)）上有大量关于使用
    LibGDX 设置 Eclipse、NetBeans 和 IntelliJ IDEA 的信息资料。如果你选择使用这些程序之一，那么在 IDE 设置完成后，请跳到下一节“为
    LibGDX 创建‘Hello, World!’程序”。


    ## 设置 BlueJ


    本节将介绍如何设置 BlueJ IDE。由于它是为初学者设计的，步骤数量很少，过程也很直接，正如你将看到的那样。


    ### 下载与安装


    BlueJ 可以从 [`www.bluej.org`](http://www.bluej.org) 下载。


    有多种适用于不同操作系统的下载选项。此外，其中一些下载与 JDK 捆绑在一起，而另一些则没有。JDK 包含用于开发和调试 Java 应用程序的工具；特别是，它对于编译你的代码是必需的。如果你以前使用过你的计算机来开发
    Java 应用程序，那么你可能已经安装了 JDK，并且只需选择独立的 BlueJ 安装程序即可。如果你不确定，你应该下载并运行 BlueJ 组合安装程序。

