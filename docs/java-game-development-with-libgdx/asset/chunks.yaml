    provides clarity and focus, and serves as a guide and a reference to the person
    or people working on the game. Game design documents are described in more detail
    in the appendix of this book. As each new game is introduced in this book, a detailed
    description will be given following the guidelines of such a document; what follows
    is the description of the Space Rocks game.


    Space Rocks is a space-themed shoot-em-up game . The player controls a spaceship
    , whose goal is to shoot lasers and destroy rocks that are flying around the screen.
    The game world has a top-down perspective and features wraparound: when an object
    moves past the edge of the screen, it reappears on the opposite edge.


    The spaceship can rotate to its left and right and accelerate in the direction
    it is facing. There is very little deceleration. The spaceship is able to shoot
    lasers, which travel in a straight line for one second, then fade out and disappear
    from the game if they haven’t collided with a rock. If the laser hits a rock,
    then the laser and rock are both destroyed. The spaceship is surrounded by a shield.
    If the spaceship is hit by a rock while the shields are active, the rock is destroyed
    and the shields lose power. After shield power is reduced to 0, the shields disappear,
    and being hit by a rock destroys the spaceship and ends the game. The spaceship
    also has the ability to instantly and randomly teleport to a new location on the
    screen.


    The player rotates left and right and accelerates forward with the arrow keys.
    Due to the small amount of deceleration, in order to stop suddenly the player
    will have to turn around and accelerate in the opposite direction. Lasers are
    fired using the spacebar key and can be fired as quickly as the player wishes.
    Teleportation is activated with the X key. While this can be used for quick escapes
    from an imminent collision, there is the possibility of teleporting onto a rock,
