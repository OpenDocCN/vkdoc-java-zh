    ### 同步游戏对象与音频


    下一个目标是添加播放音乐文件的功能，并利用关联文本文件中存储的数据生成一系列 `FallingBox` 对象，这些对象将在歌曲指定的时间点与对应的 `TargetBox`
    对象重叠。此应用程序将假设一个三秒的“提前时间”：点击开始按钮三秒后，歌曲开始播放，而 `FallingBox` 对象将在歌曲数据文件指定时间的三秒前创建于屏幕顶部边缘上方，以便它们能在正确的时间与目标重叠。为了协调这些事件的时机，将创建一个名为
    `advanceTimer` 的浮点变量，该变量仅在歌曲数据加载后开始递增；三秒过后，音乐将开始播放，此后 `advanceTimer` 将被设置为音乐播放位置加上三秒。然后，`advanceTimer`
    变量将用于确定何时创建 `FallingBox` 对象。


    首先，将以下 `import` 语句添加到 `RhythmScreen` 类中：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.audio.Music;

    import com.badlogic.gdx.files.FileHandle;

    import com.badlogic.gdx.scenes.scene2d.ui.TextButton;

    import com.badlogic.gdx.scenes.scene2d.Event;

    ```


    接下来，将以下变量添加到该类中：


    ```

    private Music gameMusic;

    private SongData songData;

    private final float leadTime = 3;

    private float advanceTimer;

    private float spawnHeight;

    private float noteSpeed;

    ```


    将以下代码添加到 `initialize` 方法中。请注意，`spawnHeight` 被设置为 `650`，以便下落方块从屏幕顶部边缘上方开始（屏幕高度为
    600），而 `noteSpeed` 是通过将下落方块到达目标方块所需的总距离除以它们到达那里所需的时间（`leadTime`）计算得出的。以下代码使用了一个为您提供的歌曲数据文件（`FunkyJunky.key`），但如果您创建了不同的歌曲数据文件，也可以随意使用它。


    ```

    advanceTimer = 0;

    spawnHeight = 650;

    noteSpeed = ( spawnHeight - targetList.get(0).getY() ) / leadTime;

    TextButton startButton = new TextButton( "开始", BaseGame.textButtonStyle );

    startButton.addListener(

    (Event e) ->

    {

    if ( !isTouchDownEvent(e) )

    return false;

    FileHandle dataFileHandle = Gdx.files.internal("assets/FunkyJunky.key");

    songData = new SongData();

    songData.readFromFile( dataFileHandle );

    songData.resetIndex();

    FileHandle songFileHandle = Gdx.files.internal("assets/" + songData.getSongName());

    gameMusic = Gdx.audio.newMusic( songFileHandle );

    startButton.setVisible(false);

    return true;

    }

    );

    uiTable.add(startButton);

    ```


    接下来，将以下代码添加到 `update` 方法中。请注意，如果 `songData` 尚未加载，则 `update` 方法会立即返回。否则，`advanceTimer`
    的值会按前述方式增加，并且如果 `advanceTimer` 大于三，则播放音乐。如果 `advanceTimer` 的值超过了 `songData` 对象存储的下一个时间点，则会创建一个
    `FallingBox` 对象并进行必要的配置，同时内部 `songData` 索引会前进到下一个位置。这里使用 `while` 循环而不是 `if` 语句，以防在此次调用
    `update` 方法期间需要创建多个 `FallingBox` 对象。


    ```

    if (songData == null)

    return;

    if (advanceTimer  leadTime)

    gameMusic.play();

    if (advanceTimer = songData.getCurrentKeyTime().getTime() )

    {

    String key = songData.getCurrentKeyTime().getKey();

    int i = keyList.indexOf(key);

    FallingBox fb = new FallingBox(targetList.get(i).getX(), spawnHeight, mainStage);

    fb.setSpeed( noteSpeed );

    fb.setMotionAngle( 270 );

    fb.setColor( colorList.get(i) );

    fallingLists.get(i).add(fb);

    songData.advanceIndex();

    }

    ```


    此时，如果您运行程序并点击开始按钮，您应该会听到三秒钟的静音，期间会出现一些下落方块，然后音乐开始播放，并且下落方块应能按预期与目标方块在时间上对齐。

