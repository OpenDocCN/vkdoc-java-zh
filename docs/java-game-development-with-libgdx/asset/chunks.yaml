    \n```java\npublic void onDrop()\n{\n    if ( hasDropTarget() )\n    {\n      \
    \  Pile pile = (Pile)getDropTarget();\n        Card topCard = pile.getTopCard();\n\
    \        if (this.getRankValue() == topCard.getRankValue() + 1\n             \
    \   && this.getSuitValue() == topCard.getSuitValue() )\n        {\n          \
    \  moveToActor(pile);\n            pile.addCard(this);\n        }\n        else\n\
    \        {\n            // 避免错误时遮挡牌堆视图\n            moveToStart();\n        }\n\
    \    }\n}\n```\n\n至此，`Card`和`Pile`类已完成，现在将注意力转向`LevelScreen`类。首先，你将在屏幕下半部分的随机位置初始化52张牌对象。在`LevelScreen`类中添加以下`import`语句：\n\
