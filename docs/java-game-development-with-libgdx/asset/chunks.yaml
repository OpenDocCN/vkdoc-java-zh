  trans: '

    要将幽灵整合到游戏中，请在 `LevelScreen` 类中添加以下变量声明：


    ```

    Ghost ghost;

    ```


    通过将以下代码添加到 `initialize` 方法中进行设置：


    ```

    ghost = new Ghost(0,0,mainStage);

    ghost.centerAtActor( maze.getRoom(11,9) );

    ```


    在 `update` 方法中，检查幽灵是否已完成移动（当幽灵不再包含任何动作时），此时使用以下代码激活其 `findPath` 方法：


    ```

    if (ghost.getActions().size == 0)

    {

    maze.resetRooms();

    ghost.findPath( maze.getRoom(ghost), maze.getRoom(hero) );

    }

    ```


    此时，你可以再次测试项目，观察幽灵在迷宫中移动，并始终向英雄靠近。


    ## 游戏胜负判定


    现在迷宫已经搭建完成，同时有了玩家控制的角色和智能编程的对手，是时候为玩家添加目标以及胜负条件了。如本章开头所述，迷宫中会有供英雄收集的金币。如果英雄收集了所有金币，玩家获胜；但如果幽灵先追上英雄，玩家则失败。第一步是创建金币。使用以下代码创建一个名为
    `Coin` 的新类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Coin extends BaseActor

    {

    public Coin(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/coin.png");

    setBoundaryPolygon(6);

    }

    }

    ```


    接下来，你需要在关卡中添加金币，在每个房间的中心放置一枚。同时，你将设置一个标签来显示剩余金币数量，并顺便添加一个标签用于在游戏结束时显示消息。标签的位置如图
    14-9 所示，该图展示了玩家失败时的屏幕画面。


    ![A352797_2_En_14_Fig9_HTML.jpg](img/A352797_2_En_14_Fig9_HTML.jpg)


    图 14-9.


    英雄被幽灵抓住后的迷宫奔跑者游戏


    要实现这些添加内容，首先在 `LevelScreen` 类中添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    接下来，添加以下变量声明：


    ```

    Label coinsLabel;

    Label messageLabel;

    ```


    在 `initialize` 方法中，你将在每个 `Room` 对象的中心创建一个 `Coin` 对象，设置标签，并通过添加以下代码将它们排列在用户界面表格中。注意使用了
    `toFront` 方法，以确保幽灵渲染在金币之上，而不是之下。


    ```

    for (BaseActor room : BaseActor.getList(mainStage, "Room"))

    {

    Coin coin = new Coin(0,0,mainStage);

    coin.centerAtActor(room);

    }

    ghost.toFront();

    coinsLabel = new Label("Coins left:", BaseGame.labelStyle);

    coinsLabel.setColor( Color.GOLD );

    messageLabel = new Label("...", BaseGame.labelStyle);

    messageLabel.setFontScale(2);

    messageLabel.setVisible(false);

    uiTable.pad(10);

    uiTable.add(coinsLabel);

    uiTable.row();

    uiTable.add(messageLabel).expandY();

    ```


    接下来，在 `update` 方法中，你需要检查英雄是否与任何金币重叠，并更新显示剩余金币数量的标签。如果幽灵与英雄重叠，则玩家失败；如果没有剩余金币，则玩家获胜。无论哪种情况，都会显示相应的消息。在失败的情况下，英雄将从舞台中移除。在获胜的情况下，幽灵将从舞台中移除，并为其添加一个无限重复的延迟动作，这样它的
    `findPath` 方法就不会被调用。


    ```

    for (BaseActor coin : BaseActor.getList(mainStage, "Coin"))

    {

    if (hero.overlaps(coin))

    {

    coin.remove();

    }

    }

    int coins = BaseActor.count(mainStage, "Coin");

    coinsLabel.setText("Coins left: " + coins);

    if (coins == 0)

    {

    ghost.remove();

    ghost.setPosition(-1000, -1000);

    ghost.clearActions();

    ghost.addAction( Actions.forever( Actions.delay(1) ) );

    messageLabel.setText("You win!");

    messageLabel.setColor(Color.GREEN);

    messageLabel.setVisible(true);

    }

    if (hero.overlaps(ghost))

    {

    hero.remove();

    hero.setPosition(-1000, -1000);

    ghost.clearActions();

    ghost.addAction( Actions.forever( Actions.delay(1) ) );

    messageLabel.setText("Game Over");

    messageLabel.setColor(Color.RED);

    messageLabel.setVisible(true);

    }

    ```


    至此，你已经完成了所有游戏机制的实现。测试游戏，看看你是否能获胜。你可能会发现，为了调整游戏难度，需要调整幽灵的速度，或者改变迷宫生成时移除的额外墙壁数量。


    ## 音频


    在本节中，你将通过添加音效来为游戏增添一些润色。第一个效果是每次收集金币时播放的清脆叮当声。不使用背景音乐，而是播放一阵呼啸的风声作为环境音，并且当幽灵接近英雄时，音量会逐渐增大，以微妙地营造紧张感。首先，在
    `LevelScreen` 类中添加以下 `import` 语句。（导入的数学相关类将用于计算幽灵到英雄的距离。）


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.audio.Sound;

    import com.badlogic.gdx.audio.Music;

    import com.badlogic.gdx.math.MathUtils;

    import com.badlogic.gdx.math.Vector2;

    ```


    接下来，添加以下变量：


    ```

    Sound coinSound;

    Music windMusic;

    ```


    在 `initialize` 方法中，按如下方式加载并启动音频：


    ```

    coinSound  = Gdx.audio.newSound(Gdx.files.internal("assets/coin.wav"));

    windMusic = Gdx.audio.newMusic(Gdx.files.internal("assets/wind.mp3"));

    windMusic.setLooping(true);

    windMusic.setVolume(0.1f);

    windMusic.play();

    ```


    在 `update` 方法中，找到英雄与金币重叠对应的代码块，并在金币被移除后直接添加以下行：


    ```

    coinSound.play(0.10f);

    ```


    同样在 `update` 方法中，你将调整风声的音量。为了计算幽灵到英雄的距离，你需要计算从幽灵坐标到英雄坐标的 `Vector2` 对象的长度。当这个距离为
    64 像素时（这是幽灵在不与英雄重叠的情况下能接近的最短距离），音量应等于 1。当距离为 300 像素时，音量应等于 0。通过一些代数运算，你可以根据这些值计算出一个将距离转换为音量的线性方程，如下面的代码所示。不过，你还需要将音量限制在
    0.10 到 1 之间，这样声音始终能听到一些，并且永远不会超过最大值 1。最后，音频只应在游戏进行时调整，这由消息标签不可见来表示。为了实现这些任务，请添加以下代码：


    ```

    if ( !messageLabel.isVisible() )

    {

    float distance = new Vector2(hero.getX() - ghost.getX(), hero.getY() - ghost.getY()).len();

    float volume = -(distance - 64)/(300 - 64) + 1;

    volume = MathUtils.clamp(volume, 0.10f, 1.00f);

    windMusic.setVolume(volume);

    }

    ```


    添加完这些内容后，你可以再次测试项目，验证音频是否按预期播放。恭喜你完成了这个项目！

    '
- fmt: '# Summary and Next Steps


    In this chapter, you developed the maze-based game, Maze Runman, where the hero
    tries to collect all the coins while avoiding a ghost. You learned how to use
    a depth-first algorithm to generate mazes and a breadth-first algorithm to search
    for the shortest path between two points in a maze. You once again created a main
    character that uses four walking animations, one for each direction. You also
    added a special audio effect that increases in volume as the ghost approaches
    the hero.


    In addition to the usual suggestions (adding a title screen, instructions screen,
    and visual and audio special effects), there are many refinements and additions
    you could make in this project. You could have larger mazes that are not entirely
    visible on screen to add to the challenge. You could add more ghosts to chase
    the hero, or have the ghost increase its speed as time passes (although the ghost
    speed should never be greater than the hero’s speed). To compensate for these
    additional challenges, you might want to introduce health points or extra lives,
    which would allow the player to be hit multiple times. You could also display
    a timer in the user interface so that, as a secondary goal, the player tries to
    collect all the coins in the shortest amount of time; this provides a more exact
    way for players to measure their skill and compare performance.


    In the next chapter, you will shift your focus from advanced algorithms for content
    generation to advanced 2D graphics. In particular, you will add particle effects
    and image shaders and filters to improve the visuals in some of your earlier game
    projects.


    Footnotes [1](#A352797_2_En_14_Chapter.html#Fn1_source)


    Spritesheet character created by Andrew Viola and used with permission.


    # Advanced 2D Graphics


    In this chapter, rather than create a new game, you will learn two techniques
    for incorporating sophisticated graphics into your projects. The first section
    will introduce particle systems, which can create special effects such as explosions,
    which will be incorporated into the Space Rocks game in place of the spritesheet-based
    animation. The second section will introduce shader programs, which manipulate
    the pixels of the rendered image to create effects such as blurring or glowing,
    which will be incorporated into the Starfish Collector game.


    ## Particle Systems


    A particle system is a collection of many small images that can be used to create
    a variety of graphical special effects. Some effects that can be replicated by
    this technique include fire, smoke, explosions, fireworks, electric sparks, water
    fountains, rain, snow, and star fields. Each of the small images in a particle
    system is called a particle. Every particle has many properties (such as velocity,
    size, color, and transparency) that can be initialized to a random value within
    a given range, and these property values may be configured to change over time.
    Particles are produced at a set rate by an object called an emitter, which may
    be configured to spawn particles either for a limited time or continuously, depending
    on the visual effect being created.


    LibGDX provides classes that support the display of particle systems. Furthermore,
    the Particle Editor tool provided with LibGDX can be used to design and preview
    particle effects and then to export them to a file format that can be easily imported
    within the LibGDX framework.


    ### The LibGDX Particle Editor


    The LibGDX Particle Editor can be run directly from the source code, as explained
    on the LibGDX wiki.[¹](#A352797_2_En_15_Chapter.html#Fn1) However, for simplicity,
    you can use the executable JAR file `ParticleEditor.jar`, available in the `Particle
    Editor` folder in the source code directory for this chapter. Figure [15-1](#A352797_2_En_15_Chapter.html#Fig1)
    shows this program when it is first started.


    ![A352797_2_En_15_Fig1_HTML.jpg](A352797_2_En_15_Fig1_HTML.jpg)


    Figure 15-1. The LibGDX Particle Editor program at startup


    A fire effect appears in the preview region in the upper-left panel of the Particle
    Editor window. The parameters that produce this effect are shown in the Emitter
    Properties panel that occupies the majority of the right-hand side of the window.
    This panel has so many properties, each with corresponding values and graphs,
    that it can be somewhat overwhelming at first. This section will discuss only
    the emitter properties that have the greatest impact on the final visual effect;
    for more thorough coverage, please consult the LibGDX wiki (previously referenced)
    for details.


    - **Image**: From this area, you can select the image to use for each particle.
    Particles are often tinted with a color; grayscale images work best for this purpose.

    - **Count**: This area can be used to set the minimum and maximum number of particles
    that should appear onscreen at any time.

    - **Duration**: This is how long the emitter will produce particles. (When creating
    a continuous effect, this value will be ignored.)

    - **Emission**: This is how many particles will be emitted per second.

    - **Life**: This is how long each particle will be active in the particle system.

    - **Size**: This is the size of the image, in pixels.

    - **Velocity**: This is the particle speed, in pixels per second.

    - **Angle**: This is the particle direction, in degrees.

    - **Tint**: This displays the color(s) used to tint the particle image.

    - **Transparency**: This controls the transparency of the particles over time.

    - **Additive**: When active, this blends colors by adding together the color components,
    resulting in brighter areas where many particles are present.

    - **Continuous**: When active, this causes the emitters to continue emitting particles
    (ignoring the preceding Duration value).


    Next to some of the parameters, you’ll see text boxes and a graph, as shown in
    Figure [15-2](#A352797_2_En_15_Chapter.html#Fig2), which can be used for fine-tuning
    the initial values and changes in values over time. (For some parameters, you
    will need to click the Active button to the right of the parameter name to make
    these elements appear.)


    ![A352797_2_En_15_Fig2_HTML.jpg](A352797_2_En_15_Fig2_HTML.jpg)


    Figure 15-2. Particle Editor interface for fine-tuning parameter values


    The numeric values in the boxes labeled High and Low refer to the values of the
    top and bottom edges on the graph to the right. The blue line on the graph indicates
    how the parameter value will change during the lifetime of the particle. In the
    graph pictured in Figure [15-2](#A352797_2_En_15_Chapter.html#Fig2), the dark
    blue line remains straight across the top, indicating that the parameter value
    will remain constant at the High value. Figure [15-3](#A352797_2_En_15_Chapter.html#Fig3)
    illustrates two more possible graphs; the graph on the left represents a continuous
    decrease from the High value to the Low value, while the graph on the right represents
    a parameter that remains at the High value for the majority of the lifetime of
    the particle and then suddenly decreases to the Low value. These two graphs will
    be referred to as the “Gradual Decrease” and the “Sudden Decrease” graphs later
    in this section.


    ![A352797_2_En_15_Fig3_HTML.jpg](A352797_2_En_15_Fig3_HTML.jpg)


    Figure 15-3. Variations on the parameter change graph


    To modify one of these graphs, you can click anywhere to add a point, click and
    drag to move a point around, and double-click a point to remove it.'
