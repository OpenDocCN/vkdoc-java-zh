- fmt: '### Finishing Touches


    At this point, there are a few finishing touches you can add to improve the player’s
    experience. Perhaps most significantly, the player may feel as though the song
    begins rather suddenly; you will address this by adding a countdown that is indicated
    both visually and audibly. Also, when the song is finished, it is a good idea
    to display a message indicating that the game is over to provide the player a
    stronger sense of closure. Finally, some subtle visual effects will be added:
    a pulse effect on the target boxes when the corresponding key is pressed, and
    a brightening and fading effect will be applied to the falling boxes when they
    disappear.


    First, the new actions will be added to the game objects. In the `FallingBox`
    class, add the following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    import com.badlogic.gdx.graphics.Color;

    ```


    Next, add the following method:


    ```

    public void flashOut()

    {

    float duration = 0.25f;

    Action flashOut =

    Actions.parallel(

    Actions.scaleTo(1.5f,1.5f, duration),

    Actions.color(Color.WHITE, duration),

    Actions.fadeOut(duration) );

    addAction( flashOut );

    addAction( Actions.after( Actions.removeActor() ) );

    }

    ```


    In the `TargetBox` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    Then, add the following method:


    ```

    public void pulse()

    {

    Action pulse =

    Actions.sequence(

    Actions.scaleTo(1.2f,1.2f, 0.05f),

    Actions.scaleTo(1.0f,1.0f, 0.05f) );

    addAction(pulse);

    }

    ```


    Next, you will activate these methods in the game. In the `RhythmScreen` class,
    there are two parts of the code where falling boxes disappear, indicated by the
    code `fb.remove()`: one near the end of the `update` method, and one near the
    end of the `keyDown` method. In both of these locations, replace the line of code
    `fb.remove()` with the following two lines of code to apply the fading effect:


    ```

    fb.setSpeed(0);

    fb.flashOut();

    ```


    Also in the `keyDown` method, after the line that gets the `TargetBox` from `targetList`,
    add the following line of code to apply the pulsing effect:


    ```

    tb.pulse();

    ```


    Next, you will implement the countdown and end-of-game message functionality in
    the `Message` class. To begin, in the `Message` class, add the following `import`
    statements:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.audio.Sound;

    ```


    Next, add the following variables:


    ```

    private Animation countdown3;

    private Animation countdown2;

    private Animation countdown1;

    private Animation countdownGo;

    private Animation congratulations;

    private Sound blip;

    private Sound tone;

    ```


    In the `Message` class `constructor` method, you initialize these newly added
    variables by adding the following code:


    ```

    countdown3 = loadTexture("assets/countdown-3.png");

    countdown2 = loadTexture("assets/countdown-2.png");

    countdown1 = loadTexture("assets/countdown-1.png");

    countdownGo = loadTexture("assets/countdown-go.png");

    congratulations = loadTexture("assets/congratulations.png");

    blip = Gdx.audio.newSound(Gdx.files.internal("assets/blip.wav"));

    tone = Gdx.audio.newSound(Gdx.files.internal("assets/tone.wav"));

    ```


    Finally, in the `Message` class, add the following two methods. In the `countdown`
    method, you will see that the `Actions.run` method and lambda expressions are
    used extensively to switch animations and play sounds at precise times.


    ```

    public void displayCountdown()

    {

    Action countdown =

    Actions.sequence(

    Actions.run( () -> setAnimation(countdown3) ),

    Actions.run( () -> blip.play() ),

    Actions.alpha(1),

    Actions.scaleTo(1.1f,1.1f, 0.05f), Actions.scaleTo(1.0f,1.0f, 0.05f),

    Actions.delay(0.5f), Actions.fadeOut(0.4f),

    Actions.run( () -> setAnimation(countdown2) ),

    Actions.run( () -> blip.play() ),

    Actions.alpha(1),

    Actions.scaleTo(1.1f,1.1f, 0.05f), Actions.scaleTo(1.0f,1.0f, 0.05f),

    Actions.delay(0.5f), Actions.fadeOut(0.4f),

    Actions.run( () -> setAnimation(countdown1) ),

    Actions.run( () -> blip.play() ),

    Actions.alpha(1),

    Actions.scaleTo(1.1f,1.1f, 0.05f), Actions.scaleTo(1.0f,1.0f, 0.05f),

    Actions.delay(0.5f), Actions.fadeOut(0.4f),

    Actions.run( () -> setAnimation(countdownGo) ),

    Actions.run( () -> tone.play() ),

    Actions.alpha(1),

    Actions.fadeOut(1) );

    addAction(countdown);

    }

    public void displayCongratulations()

    {

    setOpacity(0);

    setAnimation(congratulations);

    setScale(2);

    addAction( Actions.fadeIn(4) );

    }

    ```


    With these methods added, you can now activate them at the appropriate times during
    the game. In the `RhythmScreen` class `initialize` method, within the lambda expression
    for the Start button, add the following code directly before the `return` statement:


    ```

    message.displayCountdown();

    ```


    At the end of the `update` method, add the following code:


    ```

    if ( songData.isFinished() && !gameMusic.isPlaying() )

    {

    message.displayCongratulations();

    songData = null;

    }

    ```


    Once you have reached this point, congratulations on finishing the Rhythm Tapper
    game!


    ## Summary and Next Steps


    In this chapter, you learned how to add music and sound effects to your games.
    You began by adding audio to the Starfish Collector game, along with a button
    that can be used to mute and unmute the audio. Then, you created an entirely new
    audio-based game called Rhythm Tapper from the rhythm action genre. Along the
    way, you also learned how to write to and read from text files in LibGDX.


    At this point, there are still many audio-based features you could add to your
    projects. In Starfish Collector, you could add a sound effect (such as a trumpet
    fanfare) that plays after all the starfish have been collected. You might also
    consider adding background music to the menu screen or cutscene. In Rhythm Tapper,
    adding an applause sound effect at the end of the game would be particularly appropriate.
    In addition, you could consider displaying additional information at the end of
    the game, such as a table that displays the number of times each of the various
    messages (“Perfect,” “Great,” etc.) appeared during the song, or you could display
    the percentage of possible points the player earned (calculated from their score
    divided by the maximum possible score). To practice your audio coding skills,
    you could add music and sound effects to the Space Rocks game from Chapter [4](#A352797_2_En_4_Chapter.html),
    which would greatly improve the overall quality of that project.


    Having finished this chapter, you have learned all the fundamentals of LibGDX
    and created a powerful and versatile custom framework that can be used to create
    a great variety of games. In the next set of chapters, you will learn how to implement
    new game mechanics while working on projects that feature genres such as side-scrolling
    games, bouncing and collision games, drag-and-drop games, platform games, and
    adventure games.


    Footnotes [1](#A352797_2_En_6_Chapter.html#Fn1_source)


    The website `incompetech.com` has a great selection of music freely available
    to download and released under the Creative Commons Attribution 3.0 license.


    [2](#A352797_2_En_6_Chapter.html#Fn2_source)


    The website `audionautix.com` has a great selection of music freely available
    to download and released under the Creative Commons Attribution 3.0 license.'
