- fmt: '# Managing Collections of Actors


    The next improvement to the Starfish Collector game will be adding multiple starfish
    and rock objects to the game. You certainly don’t want to create a new variable
    for each individual instance, so you need a way to manage all these objects. You
    could create an array to store this data, but this would not work well for the
    starfish, since the number of starfish decreases as they are collected, and an
    array is used to store a fixed number of objects. A better data structure to use
    in this situation is a list.


    ## Lists


    Data structures are specialized formats for storing, organizing, and accessing
    data. The first data structure typically encountered in Java programming is the
    array, which can store a fixed number of objects of a single type; the values
    stored in the array can be later accessed by an integer that refers to the position
    index within the array. While simple to understand, arrays have a few drawbacks,
    such as having a fixed size when they are created and needing to access the elements
    by index numbers. Java provides a number of alternative data structures, one of
    which is a list.


    A list is a data structure used to store a collection of elements. There are many
    types of lists in the Java programming language, each of which implements the
    methods defined by the `List` interface. These methods include:


    * `add`, which adds an element to the end of a list

    * `remove`, which removes an element from a list (if it is in the list)

    * `size`, which returns the number of elements in the list

    * `contains`, which returns true if a list contains a specified element


    There are many classes that implement the `List` interface; in this book, the
    `ArrayList` class will typically be used. When initializing an `ArrayList` (or
    any other type of list), the size of the list does not need to be specified. However,
    `ArrayList` is a generic class, and you should specify the type of data being
    stored in the list (using angle brackets). For example, consider the following
    code that creates an `ArrayList` to store `String` data and adds and removes some
    names:


    ```

    // initialize ArrayList to store String data

    ArrayList names = new ArrayList();

    // add data to list

    names.add("Lee");

    names.add("Dan");

    names.add("Chris");

    // names.size() returns 3

    // names.contains("Lee") returns true

    // remove "Lee" from list

    names.remove("Lee");

    // names.size() now returns 2

    // names.contains("Lee") now returns false

    ```


    Another advantage to using an `ArrayList` is that if you want to use a loop to
    perform some action with each of the elements, you can use a `for-each` loop (illustrated
    in the following code), which allows you to create an index variable that iterates
    through the objects stored in the `ArrayList`; this is in contrast to looping
    through a standard array, where your index variable must be an `int` that iterates
    over the positions of the objects stored in the array, and where retrieving the
    objects themselves requires an extra line of code. For example, consider the array-based
    code for looping through an array:


    ```

    String[] nameArray;

    // omitted: code to store values in array

    for (int n = 0; n < nameArray.length; n++)

    {

    String name = nameArray[n];

    // additional code here

    }

    ```


    This is equivalent to the following list-based code for looping through a list:


    ```

    ArrayList nameList;

    // omitted: code to store values in list

    for (Sting name : nameList)

    {

    // additional code here

    }

    ```


    In many cases, the `ArrayList` version of the preceding code is more intuitive
    and easier to maintain. However, if you are iterating over a list in this way,
    you cannot add to nor remove from the list within the loop, as this will result
    in an exception (specifically, a `ConcurrentModification` exception).


    In this book, you will use the `ArrayList` class to manage collections of actors.
    In theory, in the `game` class, you could create your own list for each type of
    actor (such as `Starfish` and `Rock`). In the interest of development efficiency,
    however, you will instead write a method in the `BaseActor` class to handle this
    task for you. As you may recall, each stage stores a list of actors. The general
    idea is to write a static method that takes a `Stage` and a class name as parameters,
    extracts the list of actors from the stage, and creates a new list containing
    those actors that are instances of the class with the given name (or extensions
    of the class). To accomplish this task, add the following `import` statement to
    the `BaseActor` class:


    ```

    import java.util.ArrayList;

    ```


    Next, add the following method to the `BaseActor` class:


    ```

    public static ArrayList getList(Stage stage, String className)

    {

    ArrayList list = new ArrayList();

    Class theClass = null;

    try

    {  theClass = Class.forName(className);  }

    catch (Exception error)

    {  error.printStackTrace();  }

    for (Actor a : stage.getActors())

    {

    if ( theClass.isInstance( a ) )

    list.add( (BaseActor)a );

    }

    return list;

    }

    ```


    In the preceding code, the `try`-`catch` block is necessary in case the `forName`
    method fails to return a class (which may happen if a name is entered that does
    not correspond to a class in the project). The `isInstance` method checks whether
    a particular object is an instance of the given class (`theClass`) or of a class
    that extends the given class.


    In some situations, it will also be convenient to know how many instances of a
    particular type of object are remaining at a given point in time. This can easily
    be calculated with the help of the previous method. Add the following method to
    the `BaseActor` class, which retrieves the corresponding list of objects and,
    rather than assigning it to a variable (which is unnecessary, as it does not need
    to be referenced again in this method), immediately calls the list’s `size` method
    and returns this value.


    ```

    public static int count(Stage stage, String className)

    {

    return getList(stage, className).size();

    }

    ```


    Next, you will rewrite most of the `StarfishCollector` class to incorporate multiple
    starfish and rocks. You will be able to remove the `Starfish` and `Rock` variables,
    since the instances will be accessible via the newly added `getList` method. It
    may appear strange to simply call the constructor repeatedly and not store the
    results in variables, but remember, the `BaseActor` class constructor adds them
    to a `Stage`, so the instances are not lost. The changes mainly involve the introduction
    of `for` loops and rearranging code from the previous version, although the win
    condition is handled differently. Rewrite the `StarfishCollector` class as follows:'
