  trans: "\n## 幽灵\n\n接下来，你将创建一个幽灵角色，它会在迷宫中追逐英雄。用于确定幽灵行进路径的算法，其关键特征是：该路径是幽灵所在房间（称为\
    \ `startRoom`）与英雄所在房间（称为 `targetRoom`）之间的最短路径。在此算法中，房间被访问的顺序非常重要：距离 `startRoom`\
    \ 较近的房间应优先于距离较远的房间被考虑。所有距离 `startRoom` 一格远的房间会首先被检查，接着是距离两格远的房间，然后是三格远的，以此类推。按此顺序考虑房间的算法称为**广度优先搜索算法**，这与最初生成迷宫时使用的深度优先算法形成对比。在搜索路径时，还有两个实际注意事项需要考虑。首先，由于迷宫中存在循环路径，你需要跟踪哪些房间已被算法考虑过，以避免重复考虑它们。这将通过一个名为\
    \ `visited` 的布尔变量来跟踪。其次，在搜索路径时，你需要跟踪房间被考虑的序列：每个距离 `startRoom` 为 n+1 格的房间，都是在考虑了某个距离\
    \ `startRoom` 为 n 格的房间后到达的。此信息将存储在一个名为 `previousRoom` 的 `Room` 变量中。该算法的伪代码如下：\n\
    \n*   确定 `startRoom` 和 `targetRoom`。\n*   将 `currentRoom` 设置为 `startRoom`。\n*\
    \   将 `currentRoom` 标记为已访问，将其前一个房间设置为 `null`，并将 `currentRoom` 添加到一个列表中。\n*   当列表不为空时，执行以下操作：\n\
    \    *   将 `currentRoom` 设置为列表中的第一个元素，并将其从列表中移除。\n    *   对于 `currentRoom` 的每个未访问的邻居（称为\
    \ `nextRoom`），\n        *   将 `nextRoom` 的前一个房间设置为 `currentRoom`；\n        * \
    \  如果 `nextRoom` 是 `targetRoom`，则结束`算法`；`并且`\n        *   如果 `nextRoom` 不是 `targetRoom`，则将\
    \ `nextRoom` 标记为已访问，并将 `nextRoom` 添加到列表末尾。\n\n一旦此算法完成，可以按如下方式检索路径：将 `currentRoom`\
    \ 设置为 `targetRoom`，并将其添加到一个新的房间列表中。然后，将 `currentRoom` 设置为其前一个房间，并将其添加到列表的前面。重复此过程，直到\
    \ `currentRoom` 没有前一个房间（`previousRoom` 为 `null`；这仅对 `startRoom` 成立）。此时，该列表包含一系列房间，这些房间构成了从\
    \ `startRoom` 到 `targetRoom` 的最短路径。\n\n该算法的一个实际示例如图 14-8 所示。右上角的房间（由幽灵占据）是 `startRoom`，靠近左下角的房间（由英雄占据）是\
    \ `targetRoom`。房间用数字标记，表示算法访问它们的顺序，并用箭头指示每个房间的前一个房间。在图中，房间 1 和 2 距离幽灵一格远，房间 3\
    \ 和 4 距离两格远，5 和 6 距离三格远，7 和 8 距离四格远，9、10、11 和 12 距离五格远，13、14 和 `targetRoom` 距离六格远。一旦找到目标房间，沿着前一个房间的序列即可得到路径，该路径由\
    \ `startRoom`、1、3、5、7、10、`targetRoom` 组成——这是通往英雄的最短路径之一。\n\n![A352797_2_En_14_Fig8_HTML.jpg](img/A352797_2_En_14_Fig8_HTML.jpg)\n\
    \n图 14-8.\n\n为找到从幽灵到英雄的最短路径而访问房间的顺序\n\n为了实现此算法，每个房间需要跟踪它在算法中是否已被访问，以及之前访问的房间是哪个。为此，在\
    \ `Room` 类中添加以下变量：\n\n```\nprivate boolean visited;\nprivate Room previousRoom;\n\
    ```\n\n在`构造函数`方法中将 `visited` 初始化为 false：\n\n```\nvisited = false;\n```\n\n接下来，你需要一些方法来获取和设置这些新变量，以及检索一个房间所有尚未被访问的相邻邻居。这可以通过以下代码实现，这些代码也应添加到\
    \ `Room` 类中：\n\n```\npublic void setVisited(boolean b)\n{  visited = b;  }\npublic\
    \ boolean isVisited()\n{  return visited;  }\npublic void setPreviousRoom(Room\
    \ r)\n{  previousRoom = r;  }\npublic Room getPreviousRoom()\n{  return previousRoom;\
    \  }\n// 用于路径查找：定位尚未被访问的可达邻居\npublic ArrayList unvisitedPathList()\n{\nArrayList\
    \ list = new ArrayList();\nfor (int direction : directionArray)\n{\nif ( hasNeighbor(direction)\
    \ && !hasWall(direction) &&\n!getNeighbor(direction).isVisited() )\nlist.add(\
    \ getNeighbor(direction) );\n}\nreturn list;\n}\n```\n\n拥有一个能够识别幽灵和英雄所在房间，并重置每个房间的\
    \ `visited` 和 `previousRoom` 变量的方法会很有帮助，这在搜索新路径之前是必需的。在 `Maze` 类中，添加以下方法来执行这些任务：\n\
    \n```\npublic Room getRoom(BaseActor actor)\n{\nint gridX = (int)Math.round(actor.getX()\
    \ / roomWidth);\nint gridY = (int)Math.round(actor.getY() / roomHeight);\nreturn\
    \ getRoom(gridX, gridY);\n}\npublic void resetRooms()\n{\nfor (int gridY = 0;\
    \ gridY < roomCountY; gridY++)\n{\nfor (int gridX = 0; gridX < roomCountX; gridX++)\n\
    {\nroomGrid[gridX][gridY].setVisited( false );\nroomGrid[gridX][gridY].setPreviousRoom(\
    \ null );\n}\n}\n}\n```\n\n接下来，你将创建 `Ghost` 类，其中包含一个名为 `findPath` 的方法，该方法实现了前面描述的广度优先搜索算法。该方法会向角色添加一系列动作，使其沿着路径的前几个房间移动。幽灵不会一直沿着路径走到终点，因为到那时英雄可能已经移动到了不同的位置。相反，每次幽灵完成其当前的一组移动动作后，到英雄的路径会被重新计算，并沿着这条新路径向幽灵添加一组新的移动动作。创建一个名为\
    \ `Ghost` 的新类，代码如下：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\nimport\
    \ com.badlogic.gdx.scenes.scene2d.Action;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
    import java.util.ArrayList;\npublic class Ghost extends BaseActor\n{\npublic float\
    \ speed = 60; // 像素每秒\npublic Ghost(float x, float y, Stage s)\n{\nsuper(x,y,s);\n\
    loadAnimationFromSheet(\"assets/ghost.png\", 1,3, 0.2f, true);\nsetOpacity(0.8f);\n\
    }\npublic void findPath(Room startRoom, Room targetRoom)\n{\nRoom currentRoom\
    \ = startRoom;\nArrayList roomList = new ArrayList();\ncurrentRoom.setPreviousRoom(\
    \ null );\ncurrentRoom.setVisited( true );\nroomList.add(currentRoom);\nwhile\
    \ (roomList.size() > 0)\n{\ncurrentRoom = roomList.remove(0);\nfor (Room nextRoom\
    \ : currentRoom.unvisitedPathList())\n{\nnextRoom.setPreviousRoom( currentRoom\
    \ );\nif (nextRoom == targetRoom)\n{\n// 找到目标！\nroomList.clear();\nbreak;\n}\n\
    else\n{\nnextRoom.setVisited( true );\nroomList.add(nextRoom);\n}\n}\n}\n// 创建对应最短路径的房间列表\n\
    ArrayList pathRoomList = new ArrayList();\ncurrentRoom = targetRoom;\nwhile (currentRoom\
    \ != null)\n{\n// 将当前房间添加到列表开头\npathRoomList.add( 0, currentRoom );\ncurrentRoom\
    \ = currentRoom.getPreviousRoom();\n}\n// 仅沿路径移动几步；\n//   当这些动作完成时，路径将被重新计算。\n\
    int maxStepCount = 2;\n// 要消除步骤之间的停顿，请将循环索引从 1 开始\n//   但相应地降低幽灵速度以作补偿\nfor (int\
    \ i = 0; i < pathRoomList.size(); i++)\n{\nif (i == maxStepCount)\nbreak;\nRoom\
    \ nextRoom = pathRoomList.get(i);\nAction move = Actions.moveTo( nextRoom.getX(),\
    \ nextRoom.getY(), 64/speed );\naddAction( move );\n}\n}\n}\n```\n"
- fmt: '# Integrating the Ghost


    To integrate the ghost into the game, in the `LevelScreen` class, add the following
    variable declaration:


    ```

    Ghost ghost;

    ```


    Set it up by adding the following code to the `initialize` method:


    ```

    ghost = new Ghost(0,0,mainStage);

    ghost.centerAtActor( maze.getRoom(11,9) );

    ```


    In the `update` method, check whether the ghost has finished its movements (when
    the ghost contains no more actions), in which case you activate its `findPath`
    method with the following code:


    ```

    if (ghost.getActions().size == 0)

    {

    maze.resetRooms();

    ghost.findPath( maze.getRoom(ghost), maze.getRoom(hero) );

    }

    ```


    At this point, you can once again test your project and watch as the ghost moves
    around the maze, always moving closer to the hero.


    ## Winning and Losing the Game


    Now that the maze is set up, along with a player-controlled character and an intelligently
    programmed adversary, it is time to add a goal for the player, as well as win
    and lose conditions. As described at the beginning of the chapter, there will
    be coins for the hero to collect. If the hero collects them all, the player wins
    the game, but if the ghost reaches the hero first, the player loses the game.
    The first step will be to create the coins. Create a new class called `Coin` with
    the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Coin extends BaseActor

    {

    public Coin(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/coin.png");

    setBoundaryPolygon(6);

    }

    }

    ```


    Next, you will add coins to the level, placing one in the center of each room.
    At the same time, you will set up a label to display the number of coins remaining,
    and while you’re at it, add a label to display a message at the end of the game.
    The positioning of the labels is illustrated in Figure [14-9](#A352797_2_En_14_Chapter.html#Fig9),
    which shows what the screen will look like when the player loses the game.


    ![A352797_2_En_14_Fig9_HTML.jpg](A352797_2_En_14_Fig9_HTML.jpg)


    Figure 14-9. The Maze Runman game after the hero is caught by the ghost


    To implement these additions, first add the following `import` statements to the
    `LevelScreen` class:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    Next, add the following variable declarations:


    ```

    Label coinsLabel;

    Label messageLabel;

    ```


    In the `initialize` method, you will create a `Coin` object centered on each of
    the `Room` objects, set up the labels, and arrange them in the user interface
    table by adding the following code. Note the use of the `toFront` method so that
    the ghost renders above the coins, rather than below.


    ```

    for (BaseActor room : BaseActor.getList(mainStage, "Room"))

    {

    Coin coin = new Coin(0,0,mainStage);

    coin.centerAtActor(room);

    }

    ghost.toFront();

    coinsLabel = new Label("Coins left:", BaseGame.labelStyle);

    coinsLabel.setColor( Color.GOLD );

    messageLabel = new Label("...", BaseGame.labelStyle);

    messageLabel.setFontScale(2);

    messageLabel.setVisible(false);

    uiTable.pad(10);

    uiTable.add(coinsLabel);

    uiTable.row();

    uiTable.add(messageLabel).expandY();

    ```


    Next, in the `update` method, you need to check whether the hero overlaps any
    coins as well as update the label that displays the number of coins remaining.
    If the ghost overlaps the hero, then the player loses the game, and if there are
    no coins remaining, then the player wins the game. In either case, a corresponding
    message will be displayed. In the case of a loss, the player is removed from the
    stage. In the case of a win, the ghost is removed from the stage, and an infinitely-repeating
    delay action is added to the ghost so that its `findPath` method will not be invoked.


    ```

    for (BaseActor coin : BaseActor.getList(mainStage, "Coin"))

    {

    if (hero.overlaps(coin))

    {

    coin.remove();

    }

    }

    int coins = BaseActor.count(mainStage, "Coin");

    coinsLabel.setText("Coins left: " + coins);

    if (coins == 0)

    {

    ghost.remove();

    ghost.setPosition(-1000, -1000);

    ghost.clearActions();

    ghost.addAction( Actions.forever( Actions.delay(1) ) );

    messageLabel.setText("You win!");

    messageLabel.setColor(Color.GREEN);

    messageLabel.setVisible(true);

    }

    if (hero.overlaps(ghost))

    {

    hero.remove();

    hero.setPosition(-1000, -1000);

    ghost.clearActions();

    ghost.addAction( Actions.forever( Actions.delay(1) ) );

    messageLabel.setText("Game Over");

    messageLabel.setColor(Color.RED);

    messageLabel.setVisible(true);

    }

    ```


    At this point, you have finished implementing all the game mechanics. Test out
    the game and see if you are able to win. You may find that you want to adjust
    the speed of the ghost or change the number of extra walls that are removed when
    the maze is generated in order to make the game easier or more difficult.


    ## Audio


    In this section, you will add some polish to your game in the form of sound effects.
    The first effect will be a quiet jingle sound that plays each time a coin is collected.
    Instead of background music, an ambient sound of rushing wind will play, and the
    volume will increase as the ghost approaches the hero to subtly build a sense
    of tension. To begin, in the `LevelScreen` class, add the following `import` statements.
    (The math-related classes being imported will be used when calculating the distance
    from the ghost to the hero.)


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.audio.Sound;

    import com.badlogic.gdx.audio.Music;

    import com.badlogic.gdx.math.MathUtils;

    import com.badlogic.gdx.math.Vector2;

    ```


    Next, add the following variables:


    ```

    Sound coinSound;

    Music windMusic;

    ```


    In the `initialize` method, load and start the audio as follows:


    ```

    coinSound  = Gdx.audio.newSound(Gdx.files.internal("assets/coin.wav"));

    windMusic = Gdx.audio.newMusic(Gdx.files.internal("assets/wind.mp3"));

    windMusic.setLooping(true);

    windMusic.setVolume(0.1f);

    windMusic.play();

    ```


    In the `update` method, locate the block of code corresponding to when the hero
    overlaps a coin and add the following line directly after the coin is removed:


    ```

    coinSound.play(0.10f);

    ```


    Also in the `update` method, you will adjust the volume of the wind sound. To
    calculate the distance from the ghost to the hero, you calculate the length of
    a `Vector2` object from the ghost’s coordinates to the hero’s coordinates. When
    this distance is 64 pixels (which is as close as the ghost can get without overlapping
    the hero), the volume should equal 1. When the distance is 300 pixels, the volume
    should equal 0. Using some algebra, you can calculate a linear equation that converts
    distance to volume based on these values, as you will see in the code that follows.
    However, you also will clamp the volume level to a number between 0.10 and 1 so
    that the sound is always somewhat audible and never goes above the maximum possible
    value of 1. Finally, the audio should only be adjusted while the game is in progress,
    which is indicated when the message label is not visible. To accomplish these
    tasks, add the following code:


    ```

    if ( !messageLabel.isVisible() )

    {

    float distance = new Vector2(hero.getX() - ghost.getX(), hero.getY() - ghost.getY()).len();

    float volume = -(distance - 64)/(300 - 64) + 1;

    volume = MathUtils.clamp(volume, 0.10f, 1.00f);

    windMusic.setVolume(volume);

    }

    ```


    With this addition, you are ready to test the project once more to verify that
    the audio plays as expected. Congratulations on finishing the project!'
