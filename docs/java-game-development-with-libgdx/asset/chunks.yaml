    ## 管理演员对象集合


    对《海星收集者》游戏的下一项改进，将是向游戏中添加多个海星和岩石对象。你当然不想为每个单独的实例都创建一个新变量，因此需要一种方法来管理所有这些对象。你可以创建一个数组来存储这些数据，但这对于海星来说并不适用，因为海星的数量会随着被收集而减少，而数组用于存储固定数量的对象。在这种情况下，更好的数据结构是使用列表。


    ### 列表


    数据结构是用于存储、组织和访问数据的专用格式。在 Java 编程中，最先遇到的数据结构通常是数组，它可以存储固定数量的单一类型对象；存储在数组中的值之后可以通过一个表示数组内位置索引的整数来访问。虽然数组易于理解，但它也有一些缺点，例如在创建时大小固定，并且需要通过索引号来访问元素。Java
    提供了多种替代的数据结构，其中之一就是列表。


    列表是一种用于存储元素集合的数据结构。在 Java 编程语言中有多种类型的列表，每种列表都实现了由 `List` 接口定义的方法。这些方法包括：


    *   `add`，用于向列表末尾添加一个元素

    *   `remove`，用于从列表中移除一个元素（如果该元素在列表中的话）

    *   `size`，用于返回列表中的元素数量

    *   `contains`，如果列表包含指定元素则返回 true


    有许多类实现了 `List` 接口；在本书中，通常会使用 `ArrayList` 类。在初始化一个 `ArrayList`（或任何其他类型的列表）时，不需要指定列表的大小。然而，`ArrayList`
    是一个泛型类，你应该（使用尖括号）指定列表中存储的数据类型。例如，考虑以下代码，它创建了一个用于存储 `String` 数据的 `ArrayList`，并添加和移除了一些名字：


    ```

    // 初始化 ArrayList 以存储 String 数据

    ArrayList names = new ArrayList();

    // 向列表添加数据

    names.add("Lee");

    names.add("Dan");

    names.add("Chris");

    // names.size() 返回 3

    // names.contains("Lee") 返回 true

    // 从列表中移除 "Lee"

    names.remove("Lee");

    // names.size() 现在返回 2

    // names.contains("Lee") 现在返回 false

    ```


    使用 `ArrayList` 的另一个优点是，如果你想使用循环对每个元素执行某些操作，可以使用 `for-each` 循环（如下代码所示），它允许你创建一个索引变量来遍历存储在
    `ArrayList` 中的对象；这与遍历标准数组形成对比，在标准数组中，你的索引变量必须是一个 `int`，用于遍历数组中存储对象的位置，并且检索对象本身需要额外的代码行。例如，考虑基于数组的循环遍历代码：


    ```

    String[] nameArray;

    // 省略：将值存储到数组中的代码

    for (int n = 0; n < nameArray.length; n++)

    {

    String name = nameArray[n];

    // 此处为其他代码

    }

    ```


    这等同于以下基于列表的循环遍历代码：


    ```

    ArrayList nameList;

    // 省略：将值存储到列表中的代码

    for (Sting name : nameList)

    {

    // 此处为其他代码

    }

    ```


    在许多情况下，前面代码的 `ArrayList` 版本更直观且更易于维护。但是，如果你以这种方式遍历列表，则不能在循环内添加或移除列表中的元素，因为这将导致异常（具体来说是
    `ConcurrentModification` 异常）。


    在本书中，你将使用 `ArrayList` 类来管理演员对象的集合。理论上，在 `game` 类中，你可以为每种类型的演员（例如 `Starfish` 和
