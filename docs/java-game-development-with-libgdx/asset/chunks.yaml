  trans: "\n### 使用 BlueJ\n\n在学习一门新的编程语言或库时，编写一个“Hello, World!”应用程序作为第一个程序是计算机科学中一个悠久的传统。本节将介绍使用\
    \ BlueJ 编写此程序的基础知识：\n\n1.  启动 BlueJ 软件。（首次运行时，它可能会提示你输入 JDK 存储目录的位置，也可能询问你是否愿意通过提供信息来帮助改进软件。）\n\
    2.  当主窗口出现时，在菜单栏中选择“项目”，然后选择“新建项目”。BlueJ 将你的工作组织成项目，这些项目以目录形式存储；所有 Java 源代码和编译后的类文件都存储在项目目录中。\n\
    3.  当提示输入项目名称时，导航到你想要存储文件的文件夹，输入 `MyProject`，然后点击“确定”按钮。这会在所选位置创建一个同名文件夹。完成第 3\
    \ 步后，你的屏幕应类似于图 1-2。\n\n![A352797_2_En_1_Fig2_HTML.jpg](img/A352797_2_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2.\n\nBlueJ 项目窗口\n4.  创建一个新类，可以通过点击“新建类”按钮，或者从菜单栏中选择“编辑”，然后选择“新建类”。\n5.\
    \  当提示你输入类名时，输入 `HelloWorld` 并按回车键，或点击“确定”按钮。会出现一个橙色矩形，其顶部显示你的类名。灰色的对角线表示代码尚未编译。\n\
    6.  双击该矩形，或右键单击并选择“打开编辑器”来编辑文件。你会看到已经添加了一些模板代码。你应该先删除这些代码；最简单的方法是按 Ctrl-A 选中所有代码，然后按\
    \ Delete 键。接着，在原来的位置输入以下代码：\n\n```\n    public class HelloWorld\n    {\n    public\
    \ static void main()\n    {\n    System.out.print(\"Hello, World!\");\n    }\n\
    \    }\n    ```\n\n在 BlueJ 中输入这段代码后，它应该看起来类似于图 1-3 中的截图。暂时不必担心这段代码的作用。如果代码中有任何错误，相应的行号会以红色标记，并且错误的语法会被下划线标出。如果将鼠标指针悬停在错误上，会弹出一个窗口，提供错误的描述，有时还会给出如何修复的建议。图\
    \ 1-4 展示了如果你在前面的源代码中不小心将 `print` 打成了 `pint` 会发生什么。\n\n![A352797_2_En_1_Fig4_HTML.jpg](img/A352797_2_En_1_Fig4_HTML.jpg)\n\
    \n图 1-4.\n\nBlueJ 代码编辑器捕获的语法错误\n\n![A352797_2_En_1_Fig3_HTML.jpg](img/A352797_2_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3.\n\n在 BlueJ 代码编辑器中显示的“Hello, World!”程序\n7.  点击“编译”按钮来编译你的代码。（此操作也会自动保存你的代码。）你应该会在窗口底部的状态栏中看到消息“类已编译\
    \ – 无语法错误”。\n8.  返回 BlueJ 主窗口。右键单击代表该类的橙色矩形（其顶部包含类名 `HelloWorld`），然后从出现的列表中选择方法\
    \ `void main()`。这会运行你刚刚编写的方法。会出现一个终端窗口，其中包含文本 Hello, World!，如图 1-5 所示。\n\n![A352797_2_En_1_Fig5_HTML.jpg](img/A352797_2_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5.\n\n“Hello, World!”程序显示的文本\n\n恭喜你使用 BlueJ 运行了你的第一个程序！\n\nBlueJ 有许多使编程更简单的功能。在输入上述代码时，你可能已经注意到了语法高亮（Java\
    \ 关键字和字符串以不同颜色显示），以及类和方法周围显示的不同背景色，这使得视觉检查代码更加容易。（稍后，你会注意到条件语句和循环也以类似的背景色区分。）BlueJ\
    \ 还包含其他你可能觉得有用的功能，例如：\n\n*   **自动代码格式化**。在源代码编辑窗口的“编辑”菜单中选择“自动布局”，将调整代码中的空白，使嵌套语句对齐一致。\n\
    *   **列出可用的方法名**。在输入类或对象的名称后，接着输入一个句点，然后按 Ctrl+Space 将显示可用方法名的列表。\n*   **用于缩进/取消缩进和注释/取消注释代码块的快捷键**。这些在“编辑”菜单中列出。\n\
    *   **用于添加断点的简单界面**，这会激活一个调试器，允许你逐行执行代码并轻松检查对象。\n\n有关这些功能及其他功能的完整信息，请参阅 [`www.bluej.org/doc/bluej-ref-manual.pdf`](http://www.bluej.org/doc/bluej-ref-manual.pdf)\
    \ 上的 BlueJ 参考手册。此时，你可以关闭代码编辑器窗口和终端窗口。\n"
- fmt: '### Setting Up LibGDX


    In this section, you’ll configure BlueJ so that it can use the LibGDX software
    library. Software libraries are collections of prewritten code and methods that
    can be used by other programs. Their value lies in their reusability—they accelerate
    and simplify the development process when they implement frequently needed processes,
    saving programmers from needing to “reinvent the wheel” every time they write
    a program. The LibGDX libraries, for example, contain methods for displaying graphics,
    playing sounds, and getting input from the user. (Advanced functions are available
    as well, which will be discussed later in this chapter.)


    In Java, libraries are stored in Java Archive (JAR) files. A JAR file contains
    many compiled Java files (similar to a ZIP file), stored in a standardized directory
    structure that the JDK can navigate. Your first step is to obtain the LibGDX JAR
    files that you will need for our project. The most up-to-date official information
    on obtaining these files is at [`https://github.com/libgdx/libgdx/wiki/Updating-LibGDX`](https://github.com/libgdx/libgdx/wiki/Updating-LibGDX),
    which may be confusing for beginners. Alternatively, a simpler option is to use
    the versions of these files included on the download website for this book at
    `apress.com`. The five JAR files you will need for all projects in this book are
    `gdx.jar`, `gdx-sources.jar`, `gdx-natives.jar`, `gdx-backend-lwjgl.jar`, and
    `gdx-backend-lwjgl-natives.jar`; they contain the core code for the LibGDX library.


    Once these four JAR files have been obtained, BlueJ needs to be configured so
    that it recognizes and can use the contents of these files. There are two main
    ways to do so:


    - The easiest way to make BlueJ aware of JAR files is to create a directory named
    `+libs` within the project directory, copy the JAR files into this directory,
    and then restart the BlueJ software. By default, when a project is opened in BlueJ,
    it automatically scans for the presence of a folder named `+libs` and takes its
    contents into account when compiling new code. Although this is the easiest method,
    you will need to recreate this directory and make copies of the JAR files for
    every new project, which is not the most efficient method.

    - When there are JAR files that might be used in multiple projects, rather than
    creating redundant copies of these files in `+libs` directories for each of these
    projects, they can be copied to a special subdirectory, named `userlib`, in the
    folder where the BlueJ software is installed. The full path to the directory should
    be something similar to `C:\Program Files\BlueJ\lib\userlib\`; the exact name
    can be checked by selecting the menu option Tools ➤ Preferences in Windows, or
    BlueJ ➤ Preferences in OS X, and clicking the Libraries tab.


    Once these steps are complete, BlueJ needs to be restarted, and then you’ll be
    ready to write your first program in LibGDX.


    ## Creating a “Hello, World!” Program with LibGDX


    Traditionally, a “Hello, World!” program displays a text message on the screen.
    Since our ultimate goal is to create video games—primarily visual programs—your
    first LibGDX program will draw a picture of the world in a window, as shown in
    Figure 1-6.


    ![A352797_2_En_1_Fig6_HTML.jpg](A352797_2_En_1_Fig6_HTML.jpg)


    Figure 1-6. A “Hello, World!” program created using LibGDX


    Here, you will begin to see some of the advantages of and start to understand
    what is meant by building upon the classes provided by the LibGDX libraries. Our
    first project contains two classes. The first class, called `HelloWorldImage`,
    makes use of the functionality of a LibGDX class called `Game` by extending it.


    ### Extending A Class


    One of the central principles of software engineering is to design programs that
    avoid redundancy by creating reusable code. One way to accomplish this is by the
    object-oriented concept of inheritance: the creation of a new class based on an
    existing class.


    For example, if we were designing a role-playing game, it would probably have
    many types of playable characters, such as warriors, ninjas, thieves, and wizards.
    If we were to design classes to represent each of these characters, they would
    have certain features in common: they each have a name, a certain number of health
    points (HP), and perhaps a method named `attack` that can be used when simulating
    combat.


    Some features also may be unique to each character; for example, perhaps wizards
    also have a certain number of magic points (MP), and a method named `castSpell`
    that is called when they use magic. Because of the differences between these characters,
    we can’t create a single class that represents all of them; at the same time,
    it feels redundant to keep entering the same fields over and over again in each
    of their separate classes. An elegant approach to this type of scenario is to
    create a base class that contains all the features common to these characters,
    and create other classes to extend this base class. The extending class has access
    to all the fields and methods of the base class, and can also contain its own
    fields and methods as usual. We could implement this scenario with the following
    code:


    ```

    public class Person

    {

    String name;

    int HP;

    public void attack(Person other)

    {

    // insert code here...

    }

    }

    ```


    And then we can extend the `Person` class as follows:


    ```

    public class Wizard extends Person

    {

    int MP;

    public void castSpell( String spellName )

    {

    // insert code here...

    }

    }

    ```


    Then, if we were to create instances of these classes:


    ```

    Person percy = new Person();

    Wizard merlin = new Wizard();

    ```


    Then, commands such as `merlin.MP += 10` and `merlin.castSpell("fireball")` are
    valid, as well as commands involving fields and methods of the base class, such
    as `merlin.HP -= 3` and `merlin.attack( percy )`. However, the object called `percy`
    can use only the fields and methods of the `Person` class; code such as `percy.HP
    += 5` will compile, but `percy.castSpell("lightning")` will result in an error
    when the file is compiled.


    The concept of extending a class is not only useful for in-game entities, but
    also for framework-like elements. For example, it would be useful to have a `Menu`
    class that contains functionality common to all types of menus, such as opening
    and closing the menu. It might then be useful to create other classes that extend
    this one; for example, a class named `SelectionMenu` could be created, which is
    a `Menu` that specializes in displaying some sort of information and asks the
    player to make a selection from a set of options. An `InformationMenu` class might
    be a menu that displays some text-based information and simply closes when the
    player is finished reading it.'
