- fmt: '### Objects and Classes


    An object is a collection of related data and methods that operate on that data.
    A class is a set of code that is used as a prototype or a blueprint from which
    objects can be created. Some classes are automatically available in Java (such
    as the `String`, `Math`, and `System` classes). To use other classes in your program,
    you must indicate which of the many available classes should be loaded by using
    an `import` statement. For example, to be able to use the `Random` class in your
    program, which is part of the `java.util` package, at the beginning of your program
    you must include this line:


    ```

    import java.util.Random;

    ```


    To create an object from this class (also called an instance of the class), you
    use the `new` operator, followed by a special method of the class called the constructor.
    The name of the constructor method will always be identical to the name of the
    corresponding class, and it may require input values to initialize the data that
    belongs to the class. For example, to create an instance of the `Random` class,
    you would use the following code:


    ```

    Random rand = new Random();

    ```


    Following this, you could then use the methods of the variable `rand`, such as
    `nextInt` (which returns a randomly generated integer), as follows:


    ```

    int secret = rand.nextInt();

    ```


    The previously mentioned `String` class is special in that it may be initialized
    in the same way as a primitive type variable (like `int` or `float`), but it may
    also be initialized using the `new` operator (which requires the text to be stored
    as input):


    ```

    String name = new String("Lee");

    ```


    One of the most powerful features of Java (or any object-oriented programming
    language) is the ability to define your own classes. As an example, the following
    class, called `Fraction`, stores the data used in a fractional number: a numerator
    and a denominator (both integers). There is a constructor to set these values,
    a method to create a `String` representation of the fraction, and a method to
    convert the fraction to a `float` value (by calculating the quotient).


    ```

    class Fraction

    {

    int numerator;

    int denominator;

    // constructor

    Fraction(int n, int d)

    {

    numerator = n;

    denominator = d;

    }

    // creates a String representation

    public String toString()

    {

    return (numerator + "/" + denominator);

    }

    // convert to a float value

    public float convertToFloat()

    {

    return (float)numerator / denominator;

    }

    }

    ```


    Next is a sample class that uses the `Fraction` class as defined previously. In
    particular, it contains a method named `main` that you will run, which creates
    and initializes a `Fraction` object and then uses its methods and prints their
    results to the screen. A technical aside: you must declare the `main` method as
    `static` in order to be able to run the method directly from the class (with the
    code `Sample.main()`) rather than from an instance of the class.


    ```

    class Sample

    {

    public static void main()

    {

    Fraction frac = new Fraction(3,4);

    String fracString = frac.toString();

    float  fracValue  = frac.convertToFloat();

    System.out.println( "The value of " + fracString + " is " + fracValue );

    }

    }

    ```


    Sometimes, when you write a class, you’ll want to control access to data, either
    to restrict the possible set of values that can be assigned or to prevent another
    part of the program from accidentally changing the data (possibly due to a mistake
    in the code). Access modifiers are used in such situations; they can be included
    to specify whether other classes can use a particular field or method. The two
    most common modifiers are `public`, which indicates that any class can access
    the corresponding variable or method, and `private`, which indicates that it may
    be accessed only within the class in which it is defined. There is a less frequently
    used modifier, `protected`, which allows access within the defining class and
    any subclasses of (that is, those that extend) the defining class.


    As a practical example of when access modifiers are useful, let’s return to our
    custom `Fraction` class. The denominator of a fraction should never be set equal
    to zero (because division by zero leads to contradictory mathematical results).
    You prevent this unwanted behavior by setting the class fields to `private` and
    rewriting the constructor (or any other relevant methods) to take action in this
    case, as demonstrated here:


    ```

    class Fraction

    {

    private int numerator;

    private int denominator;

    // constructor

    Fraction(int n, int d)

    {

    numerator = n;

    if (d == 0)

    {

    System.err.println("Invalid denominator; changing value to 1.");

    denominator = 1;

    }

    else

    {

    denominator = d;

    }

    }

    // other methods remain the same as before

    }

    ```


    ### Summary


    These topics—data types, operators, control structures, methods, and classes—are
    the foundations on which you will create your own programs. In real applications,
    your code will typically be much longer than the examples presented; your classes
    will no doubt contain multiple `import` statements, declare many variables of
    various types, and have an assortment of methods, each of which contains a significant
    number of statements. When working on your own projects, in addition to writing
    your own classes, your programs will probably use many predefined classes as well.
    For this reason, it is good to spend some time becoming familiar with the style
    and type of information that is presented in the Java documentation format, whether
    it be the official Java language reference or the documentation for any Java libraries
    you include in your projects.


    ## Appendix C: Extended Framework Class Reference


    In this book, you have developed multiple classes to extend the LibGDX framework.
    Each of these new classes in turn contains many fields and methods. For your convenience,
    this appendix contains a summary of the functionality of the most important classes
    that are used across multiple chapters: `BaseScreen`, `BaseActor`, and `TilemapActor`.


    ### The BaseScreen Class


    The `BaseScreen` class was introduced in Chapter 3 to support games that contain
    multiple screens and to simplify the implementation of the game loop. You extend
    this class in nearly every game project in this book. There are two abstract methods
    that extensions of this class must implement: `initialize`, which is where you
    set up game entities, and `update`, which processes continuous user input (such
    as a character that moves as long as a key is held down) and handles the game
    logic (such as interactions between game entities). This class also implements
    the `InputProcessor` interface, which enables extensions of this class to handle
    discrete input (such as a character that jumps one time when a key is pressed)
    by overriding methods such as `keyDown`.


    #### Constructor


    - `BaseScreen()` Initializes `mainStage`, `uiStage`, and `uiTable`


    #### Fields


    - `protected Stage mainStage` The stage to which all game entities should be added

    - `protected Stage uiStage` The stage that contains the user-interface table

    - `protected Table uiTable` A table used to organize user-interface elements'
