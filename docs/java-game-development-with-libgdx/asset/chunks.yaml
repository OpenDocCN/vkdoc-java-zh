    ### 位图字体


    计算机生成字体的数据通常以两种方式之一存储：要么作为一组数学曲线和公式（这被称为轮廓字体或矢量字体，包括 TrueType 字体等标准），要么作为一组图像。后者被称为位图字体，也是`LabelStyle`类所使用的格式。


    要创建一个`BitmapFont`对象，你需要两样东西：一张包含应用程序中可能用到的所有字符的图像（图 5-4 包含一个示例），以及一个关联的数据文件，该文件列出了每个字符对应的区域（位置和大小）。例如，图
    5-4 中对应字符 A 的区域位于 x=319、y=134 处，宽度为 45，高度为 41。当使用位图字体显示文本时，会提取文本中每个字符对应的图像区域，并将这些图像区域并排对齐，从而产生屏幕上看到的结果。


    ![A352797_2_En_5_Fig4_HTML.jpg](img/A352797_2_En_5_Fig4_HTML.jpg)


    图 5-4.


    用于创建位图字体的图像文件（512×256 像素）


    接下来将讨论创建位图字体的两种方法：在运行程序之前使用外部应用程序生成所需文件，或者使用特殊类在运行时生成所需对象。每种方法都有其优缺点。使用外部应用程序可以让你立即看到并调整字母渲染后的外观，但运行该应用程序需要额外的时间，并且需要将额外的文件保存到项目的`assets`文件夹中。基于类的方法可以更轻松地更改字体参数（只需修改代码，无需保存新的一对文件），但在运行程序之前你无法看到文本的外观。这两种方法将在下文详细说明。在本章的示例代码中，最终将使用第二种方法，但在你自己的项目中，最终选择由你决定。


    #### 使用 Hiero：位图字体编辑器


    LibGDX 提供了一个名为 Hiero 的应用程序，可用于使用计算机上安装的字体生成位图字体数据。Hiero 的第一个版本由 Kevin Glass 创建，用于他的
    Java 游戏开发库 Slick2D。此后，Hiero 由 LibGDX 库的主要贡献者之一 Nathan Sweet 移植到了 LibGDX。Hiero
    被打包成一个可执行的 JAR 文件；当前的下载链接发布在 LibGDX Wiki 页面¹以及 LibGDX 工具页面²上，后者可从 LibGDX 主网站的下载页面访问。


    启动 Hiero 后，会显示各种选项。图 5-5 包含了该程序运行时的截图。在左上角区域，你可以选择本地安装的字体；在中央区域，你可以输入想要生成图像的字符（但建议保留默认字符集）；在右上角区域，你可以选择应用于图像的各种效果（前提是已选择渲染方式：Java），包括纯色着色、渐变着色、轮廓和投影。效果的参数可以通过点击其值并输入或选择新值来更改。效果出现的顺序很重要，因为效果是从上到下依次应用的。完成后，从文件菜单中选择保存
    BMFont 文件，你将获得一个 FNT 文件和一个 PNG 文件，可供 LibGDX 的`BitmapFont`类使用。本项目的`assets`文件夹包含了保存此图中所示位图字体的结果；对应的文件名为`cooper.fnt`和`cooper.png`。要在
    LibGDX 中使用此字体，在`BaseGame`类的`create`方法中，你需要将设置标签样式对象字体变量的代码行更改为以下内容：


    ![A352797_2_En_5_Fig5_HTML.jpg](img/A352797_2_En_5_Fig5_HTML.jpg)


    图 5-5.


    用于生成位图字体数据的 Hiero 应用程序


    ```

    labelStyle.font = new BitmapFont( Gdx.files.internal("myCustomFont.fnt") );

    ```


    #### 使用 FreeType 字体生成器


    除了使用应用程序创建位图字体，还可以使用`FreeTypeFontGenerator`类在代码中创建位图字体，从而消除对外部应用程序的依赖。要创建字体，你需要在`assets`文件夹中包含一个
    TrueType 字体文件（扩展名为 TTF）作为位图字体的基础。通过互联网搜索可以轻松找到 TrueType 字体。³


    首先，在`BaseGame`类中添加以下`import`语句：


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g2d.freetype.FreeTypeFontGenerator;

    import com.badlogic.gdx.graphics.g2d.freetype.FreeTypeFontGenerator.FreeTypeFontParameter;

    ```


    然后，在`create`方法中，使用以下代码初始化一个`FreeTypeFontGenerator`对象，并引用 TTF 文件：


    ```

    FreeTypeFontGenerator fontGenerator =

    new FreeTypeFontGenerator(Gdx.files.internal("assets/OpenSans.ttf"));

    ```


    接下来，要配置字体的外观，创建一个`FreeTypeFontParameter`对象，该对象允许你指定字体大小、字体颜色、边框宽度、边框颜色、直边或圆角边框边缘等。你还可以设置纹理过滤器，这决定了文本在应用程序中缩放时的显示方式。为此，在`create`方法中添加以下代码：


    ```

    FreeTypeFontParameter fontParameters = new FreeTypeFontParameter();

    fontParameters.size = 48;

    fontParameters.color = Color.WHITE;

    fontParameters.borderWidth = 2;

    fontParameters.borderColor = Color.BLACK;

    fontParameters.borderStraight = true;

    fontParameters.minFilter = TextureFilter.Linear;

    fontParameters.magFilter = TextureFilter.Linear;

    ```


    完成此代码后，你可以生成位图字体并通过更改设置标签样式字体的代码行来分配它，如下所示：


    ```

    BitmapFont customFont = fontGenerator.generateFont(fontParameters);

    labelStyle.font = customFont;

    ```


    完成此任务后，你就可以将注意力转向创建标签，并使用它们在游戏中显示文本。

