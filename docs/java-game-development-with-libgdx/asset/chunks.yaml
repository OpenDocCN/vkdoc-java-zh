    \n![A352797_2_En_9_Fig4_HTML.jpg](A352797_2_En_9_Fig4_HTML.jpg)\n\n**图 9-4.**\
    \ 高等级牌出现在低等级牌上方\n\n这是因为高等级牌初始化并添加到舞台的时间较晚，因此它们渲染较晚并出现在“上方”。这会使玩家难以找到所需的牌，可能导致挫败感。为解决此问题，你可以改变牌的渲染顺序（也称为z-order）。每张牌初始化后，将其发送到舞台的背面；这样高等级牌将出现在低等级牌下方。为此，在刚添加的代码的内层`for`循环末尾添加以下代码：\n\
    \n```java\nc.toBack();\n```\n\n然而，如果此时运行程序，所有牌似乎都消失了！原因是牌被指示在所有其他已添加到舞台的角色（包括背景图像）之前渲染！为解决此问题，在`initialize`方法的`for`循环之后添加以下代码：\n\
    \n```java\nbackground.toBack();\n```\n\n现在，如果测试程序，你会看到所有牌按预期显示，低等级牌出现在上方。\n\n\
    接下来，你将设置四个牌堆，用于添加牌。这些牌堆本身将存储在一个`ArrayList`中，以便更简单地将数字（从而将花色）与每个`Pile`对象关联。首先，在`LevelScreen`类中添加以下`import`语句：\n\
