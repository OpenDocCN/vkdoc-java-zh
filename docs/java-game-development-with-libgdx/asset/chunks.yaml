    ## 总结与后续步骤


    本章介绍了 LibGDX 库的许多特性。你首先了解了游戏程序的生命周期概览，并学习了生命周期各阶段如何通过遵循特定命名约定的方法（由接口强制执行）来执行。你学习了如何使用
    `Gdx` 类处理键盘输入，以及如何使用 `Actor` 类封装游戏实体数据。你学习了如何使用 `Stage` 类管理 `Actor` 实例，以及如何扩展
    `Actor` 类以获得更强大的功能。你还学习了如何通过扩展 `Game` 类来重组游戏流程并简化未来的游戏开发项目。


    为了练习本章所学的技能，你可以尝试在游戏中添加另一个对象：一只海龟必须避开的鲨鱼；如果海龟与鲨鱼重叠，则应将海龟从舞台上移除，并在屏幕上显示“Game Over”消息。此添加项所需的图形资源已提供在本项目的
    `assets` 文件夹中。


    在下一章中，你将创建一个更精致的 Starfish Collector 游戏版本，该版本由 `Actor` 类的一个新扩展（将取代 `ActorBeta`）驱动，支持动画、基于物理的运动、改进的碰撞检测以及使用列表管理多个
    Actor 实例的能力。


    脚注 1


    通常无需以高于此速度运行，因为大多数计算机显示硬件无法以高于此速率显示图像。


      2


    本章稍后部分将演示如何更直观地组织代码，以便更新和渲染阶段由单独的方法处理。


      3


    LibGDX 的源代码目前托管在 GitHub 上，地址为 [`https://github.com/libgdx/libgdx`](https://github.com/libgdx/libgdx)
    。


      4


    选择让 y 值向上增加的设计，虽然符合数学惯例，但与大多数计算机科学坐标系惯例相反，后者将原点 (0,0) 置于窗口左上角，使得 y 值向下增加。


      5


    从技术上讲，如果你的程序包含覆盖整个屏幕区域的背景图形，则此步骤并非必需。


    # 3. 扩展框架


    在上一章中，你了解了 LibGDX 中可用的一些基本特性和类，并创建了一个名为 Starfish Collector 的游戏。你还通过将支持常用功能的代码收集到一个名为
    `ActorBeta`（它扩展了 LibGDX 的 `Actor` 类）的类中，实践了良好的软件开发习惯。然而，Starfish Collector 游戏仍然“略显粗糙”；上一章版本的一些不足之处包括：


    *   缺乏动画。

    *   移动不平滑：速度要么为零，要么为恒定值。

    *   碰撞检测不精确。

    *   没有障碍物或阻挡物。

    *   只有一个可收集的对象。

    *   游戏世界仅限于窗口大小，海龟可以移动到窗口边缘之外。

    *   程序运行时，游戏立即开始。


    为了解决这些不足，你将在本章中实现以下改进：


    *   将添加动画：海龟在移动时会呈现游泳姿态（并且会面向移动方向），海星会缓慢旋转（以吸引玩家注意），当海龟收集到海星时会出现类似水花飞溅的特殊效果。

    *   将通过添加加速度和减速度来实现逼真的运动。

    *   将通过用更精确的多边形形状替换矩形来提高碰撞检测的精度。

    *   将添加固体障碍物（岩石）。

    *   将创建多个对象实例。

    *   游戏世界将扩大到超出窗口大小。

    *   游戏开始前将显示一个开始菜单屏幕。


    添加了这些改进后的 Starfish Collector 游戏截图如图 3-1 所示。


    ![A352797_2_En_3_Fig1_HTML.jpg](img/A352797_2_En_3_Fig1_HTML.jpg)


    图 3-1.


    改进后的 Starfish Collector 游戏


    还有其他明显的标准功能缺失，将在后续章节中添加，例如文本和用户界面（第 5 章）以及音乐和音效（第 6 章）。此外，当本书后面介绍高级功能（例如使用瓦片地图编辑器设计关卡和集成游戏手柄控制器支持）时，将首先在
    Starfish Collector 游戏的背景下进行演示。


    为了整合所有这些更改，你将创建一个名为 `BaseActor` 的新类，它将取代上一章中的 `ActorBeta` 类。`BaseActor` 类将足够健壮且功能丰富，可用于本书剩余部分的所有游戏项目，以及你自己的游戏项目。在本章中，你将逐步重建和改进
    Starfish Collector 游戏，并全程使用新的 `BaseActor` 类。


    注意


    你将在本章中创建的 `BaseActor` 类将包含许多方法和功能，但并非所有游戏对象都需要所有这些功能。例如，并非所有游戏对象都有动画，并非所有游戏对象都会移动，等等。通常，面向对象的设计原则会建议将这些功能拆分到单独的类中。但是，为了简化类依赖关系并减少本书未来项目所需的类总数，我们决定将所有与
    Actor 相关的功能包含在一个单独的类中。


    首先，从本书网站下载本章的源代码文件。在 BlueJ 中创建一个名为 `Starfish Collector Ch3` 的新项目（以区别于上一章的版本）。在
    BlueJ 创建的项目目录中，创建一个名为 `assets` 的新文件夹。将下载项目 `assets` 文件夹中的所有图像文件复制到你新项目的 `assets`
    文件夹中。接下来（如果你之前没有将 LibGDX JAR 文件添加到 BlueJ 的 `userlib` 文件夹中），在你的项目目录中，创建一个名为 `+libs`
    的新文件夹。将下载项目 `+libs` 文件夹中的 JAR 文件复制到你新项目的 `+libs` 文件夹中。重新启动 BlueJ，以便 BlueJ 正确识别新添加到
    `+libs` 文件夹中的 JAR 文件。


    在你的 BlueJ 项目中，创建一个名为 `BaseActor` 的新类。第一步是编写 `constructor` 方法。由于你需要设置 Actor 的位置并将其添加到舞台，你可以通过
    `constructor` 方法提供这些数据，并使用以下代码自动执行这些操作：


    ```

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.scenes.scene2d.Stage;

    /**

    * 扩展 LibGDX Actor 类的功能。

    */

    public class BaseActor extends Actor

    {

    public BaseActor(float x, float y, Stage s)

    {

    // 调用 Actor 类的构造函数

    super();

    // 执行额外的初始化任务

    setPosition(x,y);

    s.addActor(this);

    }

    }

    ```


    在接下来的章节中，你将添加对动画、基于物理的运动、改进的碰撞检测与处理以及处理特定对象类型集合的方法的支持。

