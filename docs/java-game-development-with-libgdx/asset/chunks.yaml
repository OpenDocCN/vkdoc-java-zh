  trans: "\n## 总结与后续步骤\n\n在本章中，你创建了横向卷轴动作游戏《飞机闪避者》。通过运用本书第一部分开发的自定义框架类，你学会了如何实现一些新的游戏机制，例如无限滚动背景、视差效果、重力以及难度递增。\n\
    \n你还可以添加许多功能来提升这款游戏的质量。一些较简单的改进包括：添加游戏开始前显示的**开始菜单**，以及游戏结束后出现的**按钮**，让玩家能返回开始菜单。你也可以将玩家获得的最高分存储在变量中，并在开始菜单上显示。一个更具挑战性的改进是，利用你在第\
    \ 6 章学到的技能，将最高分保存到文本文件中，这样即使玩家退出应用后重新启动，最高分也能得以保留。为了增加变化，你还可以考虑改变敌机的移动模式，例如让它们在屏幕上移动时，其\
    \ Y 坐标呈正弦波模式变化。为了改善视觉和听觉反馈，你可以为玩家的飞机添加一个类似排气管的动画视觉效果，每当玩家启动垂直加速时出现（其精神类似于《太空岩石》游戏中推进器的外观），并伴有音效。你还可以为每架经过的敌机添加引擎声效。为了获得完全不同的游戏体验，你可以考虑让玩家的飞机连续移动而非离散移动，方法是移除加速方法的功能，并在`update`方法中检测键盘输入（在这种情况下，使玩家的飞机向上加速）。为了延长游戏时长，你可以允许玩家在被摧毁前承受敌机一定次数的撞击（其精神类似于《太空岩石》游戏中护盾的作用）。\n\
    \n在下一章中，你将再次探索这个自定义框架的可能性，通过创建一个名为《矩形毁灭者》的打砖块游戏，学习如何实现弹跳和道具等新机制。\n\n脚注 1\n\n“Prelude\
    \ and Action”由 Kevin McLeod 创作，来自 [`http://incompetech.com`](http://incompetech.com)，并根据知识共享署名\
    \ 3.0 许可协议发布。\n\n# 8. 弹跳与碰撞游戏\n\n在本章中，你将创建一个名为《矩形毁灭者》的弹球打砖块游戏，如图 8-1 所示，其灵感来源于《打砖块》和《方舟陨石》等街机及早期主机游戏。本游戏将实现的新功能包括物体弹跳和道具物品。\n\
    \n![A352797_2_En_8_Fig1_HTML.jpg](img/A352797_2_En_8_Fig1_HTML.jpg)\n\n图 8-1.\n\
    \n《矩形毁灭者》游戏\n\n## 游戏项目：矩形毁灭者\n\n《矩形毁灭者》是一款动作游戏，玩家控制一个在屏幕底部左右移动的挡板，用它来将球弹向上方的矩形砖块状物体，以摧毁它们。摧毁每个砖块都会为玩家赢得分数，如果所有砖块都被摧毁，玩家就赢得游戏。如果球落至屏幕底部边缘以下，则球会丢失。如果还有备用球（玩家开始时拥有三个备用球），则会在挡板上方生成一个新球。当球与挡板碰撞时，其弹跳角度由碰撞点决定：击中挡板左侧会使球向左弹跳，击中右侧会使球向右弹跳，击中中心则会使球垂直向上弹起。\n\
    \n偶尔，被摧毁的砖块会释放一个道具，该道具会向屏幕底部飘落。道具可能对游戏产生各种影响，例如改变挡板的大小或改变球的速度。道具的效果由其图像指示。如果挡板收集到道具（通过与之碰撞），则道具的效果被激活。有些道具会使游戏变得更难，例如缩小挡板的道具，玩家可能希望避开它。有时，收集有益道具也伴随着球落向屏幕底部时可能错失它的风险；玩家必须谨慎做出决定。\n\
    \n玩家通过左右移动鼠标来控制挡板。在游戏开始时，以及每次球重生时，球会锁定在挡板顶部，当玩家点击鼠标按钮时才会释放。\n\n用户界面包含一些文本显示。在屏幕顶部，显示玩家的分数和备用球数量。在屏幕中央，会出现文本告知玩家应点击鼠标按钮开始游戏，并且当玩家获胜或输掉游戏时，会显示相应消息。\n\
    \n游戏采用简单的线条艺术风格，并配有欢快的背景音乐以配合游戏节奏。当游戏世界中的物体交互时，会播放短促的音效：例如球弹离挡板、砖块或墙壁时，以及道具出现和被收集时。\n\
    \n开始此项目所需的步骤与之前的项目相同：创建一个新项目，创建一个`assets`文件夹和一个`+libs`文件夹（如果你已经设置了`userlib`目录，则后者非必需），复制你在本书第一部分创建的自定义框架文件（`BaseGame.java`、`BaseScreen.java`、`BaseActor.java`），并将此项目的图形和音频文件复制到你的`assets`文件夹中。如前一章所述，为了方便起见，已创建了一个名为`Framework`的\
    \ BlueJ 项目，其中包含这些文件（项目特定的资源除外），以及一个`launcher`类和`BaseGame`与`BaseScreen`类的扩展。为了提高效率，这些文件将作为起点。要开始此项目：\n\
    \n*   下载本章的源代码文件。\n*   复制下载的`Framework`文件夹（及其内容）并将其重命名为`Rectangle Destroyer`。\n\
    *   将下载的`Rectangle Destroyer`项目`assets`文件夹中的所有内容复制到你新创建的`Rectangle Destroyer assets`文件夹中。\n\
    *   在你的`Rectangle Destroyer`文件夹中打开 BlueJ 项目。\n*   在`CustomGame`类中，将类名更改为`RectangleGame`（BlueJ\
    \ 随后会将源代码文件重命名为`RectangleGame.java`）。\n*   在`Launcher`类中，将`main`方法的内容更改为以下内容：\n\
    \n```\n    Game myGame = new RectangleGame();\n    LwjglApplication launcher =\
    \ new LwjglApplication(\n    myGame, \"Rectangle Destroyer\", 800, 600 );\n  \
    \  ```\n\n至此，你已经准备好开始为游戏特定对象创建类，并编写游戏玩法本身的代码。\n\n## 创建游戏对象\n\n在本节中，你将为主要游戏对象创建四个类：挡板、墙壁、砖块和球。创建每个类后，你将在`screen`类中添加代码，将这些对象添加到游戏中，并使它们能够相互交互。\n"
- fmt: '### Paddle


    First, you will create a class that represents the paddle object controlled by
    the player, which will be the simplest object to set up. Create a new class called
    `Paddle` that contains the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Paddle extends BaseActor

    {

    public Paddle(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/paddle.png");

    }

    }

    ```


    Then, in the `LevelScreen` class, add the following `import` statement (which
    will enable you to get the position of the mouse later):


    ```

    import com.badlogic.gdx.Gdx;

    ```


    Then, add the following variable declaration to the class:


    ```

    Paddle paddle;

    ```


    In the `initialize` method, set up a background image and the paddle by adding
    the following code:


    ```

    BaseActor background = new BaseActor(0,0, mainStage);

    background.loadTexture("assets/space.png");

    BaseActor.setWorldBounds(background);

    paddle = new Paddle(320, 32, mainStage);

    ```


    Then, in the `update` method, add the following code, which will keep the paddle
    horizontally aligned with the mouse (by adjusting its x-coordinate), while also
    keeping the paddle completely on the screen. (If the mouse is off-screen, however,
    this code will have no effect.)


    ```

    float mouseX = Gdx.input.getX();

    paddle.setX( mouseX - paddle.getWidth()/2 );

    paddle.boundToWorld();

    ```


    This is a good point at which to test your game (by running the `main` method
    from the `Launcher` class); you should be able to control the position of the
    paddle by moving the mouse; at this point, your game should appear as shown in
    Figure [8-2](#A352797_2_En_8_Chapter.html#Fig2).


    ![A352797_2_En_8_Fig2_HTML.jpg](A352797_2_En_8_Fig2_HTML.jpg)


    Figure 8-2. The game with the background image and paddle added


    ### Walls


    Next, you will create a class for the wall objects. Walls will be positioned along
    the left, right, and top edges of the screen, and the ball will bounce off of
    them. Since walls may have different sizes, the `constructor` of the `Wall` class
    will also take the width and the height of the wall as parameters. To this end,
    create a new class called `Wall` that contains the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.graphics.Color;

    public class Wall extends BaseActor

    {

    public Wall(float x, float y, float width, float height, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/white-square.png");

    setSize(width, height);

    setColor( Color.GRAY );

    setBoundaryRectangle();

    }

    }

    ```


    If desired, the color can be set to something other than `Color.GRAY`. Note that
    since the boundary polygon is set to match the size of the texture that is loaded,
    changing the object size with the `setSize` method should be followed by calling
    the `setBoundaryRectangle` method to update this data as well.


    Next, in the `initialize` method of the `LevelScreen` class, add the following
    code:


    ```

    new Wall(  0,0, 20,600, mainStage); // left wall

    new Wall(780,0, 20,600, mainStage); // right wall

    new Wall(0,550, 800,50, mainStage); // top wall

    ```


    Variables to store the `Wall` objects are not needed, since a list of `Brick`
    objects can be easily obtained later on using the `getList` method of the `BaseActor`
    class. Note in particular that the top wall has a large height; this will be to
    provide space for labels in the user interface, implemented later in this chapter.
    If desired, you can test the program again at this point to visually inspect that
    the walls are placed correctly.


    ### Bricks


    Next, you will add the rectangular bricks to the game. Create a new class called
    `Brick` that contains the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Brick extends BaseActor

    {

    public Brick(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/brick-gray.png");

    }

    }

    ```


    If desired, you can use the `setColor` method in the constructor to tint the bricks
    to a particular color.


    Next, you will set up a rectangular grid of bricks on the main screen. The easiest
    way to do this is with a nested `for` loop. The coordinates of each brick can
    be calculated in terms of the row and column position and width and height of
    each brick. To determine the width and height of the bricks, a single `Brick`
    object is created and removed after its size is stored. To position the grid of
    bricks near the center of the screen, margins are also calculated and taken into
    account. To implement this, in the `initialize` method of the `LevelScreen` class,
    add the following code:


    ```

    Brick tempBrick = new Brick(0,0,mainStage);

    float brickWidth = tempBrick.getWidth();

    float brickHeight = tempBrick.getHeight();

    tempBrick.remove();

    int totalRows = 10;

    int totalCols = 10;

    float marginX = (800 - totalCols * brickWidth) / 2;

    float marginY = (600 - totalRows * brickHeight) - 120;

    for (int rowNum = 0; rowNum < totalRows; rowNum++)

    {

    for (int colNum = 0; colNum < totalCols; colNum++)

    {

    float x = marginX + brickWidth  * colNum;

    float y = marginY + brickHeight * rowNum;

    new Brick( x, y, mainStage );

    }

    }

    ```


    Once again, you can test the project at this point to verify that the bricks appear
    as desired. The preceding code produces the arrangement shown in Figure [8-3](#A352797_2_En_8_Chapter.html#Fig3);
    you can adjust the number of bricks in each row and column if desired by changing
    the values of `totalRows` and `totalCols`, or even add some spacing between the
    bricks by adding a small value to `brickHeight` and `brickWidth`.


    ![A352797_2_En_8_Fig3_HTML.jpg](A352797_2_En_8_Fig3_HTML.jpg)


    Figure 8-3. Adding a rectangular grid of bricks


    Some games in this genre will add visual interest by creating a pixel art–style
    picture out of bricks of different colors. While technically possible at this
    point, it is not really worth the effort involved. Designing and loading a pattern
    of colored bricks with the assistance of a third-party program for tilemap editing
    will be the topic of a future chapter.'
  raw: '### Paddle


    First, you will create a class that represents the paddle object controlled by
    the player, which will be the simplest object to set up. Create a new class called
    `Paddle` that contains the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Paddle extends BaseActor

    {

    public Paddle(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/paddle.png");

    }

    }

    ```


    Then, in the `LevelScreen` class, add the following `import` statement (which
    will enable you to get the position of the mouse later):


    ```

    import com.badlogic.gdx.Gdx;

    ```


    Then, add the following variable declaration to the class:


    ```

    Paddle paddle;

    ```


    In the `initialize` method , set up a background image and the paddle by adding
    the following code:


    ```

    BaseActor background = new BaseActor(0,0, mainStage);

    background.loadTexture("assets/space.png");

    BaseActor.setWorldBounds(background);

    paddle = new Paddle(320, 32, mainStage);

    ```


    Then, in the `update` method, add the following code, which will keep the paddle
    horizontally aligned with the mouse (by adjusting its x-coordinate), while also
    keeping the paddle completely on the screen. (If the mouse is off-screen, however,
    this code will have no effect.)


    ```

    float mouseX = Gdx.input.getX();

    paddle.setX( mouseX - paddle.getWidth()/2 );

    paddle.boundToWorld();

    ```


    This is a good point at which to test your game (by running the `main` method
    from the `Launcher` class); you should be able to control the position of the
    paddle by moving the mouse; at this point, your game should appear as shown in
    Figure [8-2](#A352797_2_En_8_Chapter.html#Fig2).


    ![A352797_2_En_8_Fig2_HTML.jpg](A352797_2_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    The game with the background image and paddle added


    ### Walls


    Next, you will create a class for the wall objects. Walls will be positioned along
    the left, right, and top edges of the screen, and the ball will bounce off of
    them. Since walls may have different sizes, the `constructor` of the `Wall` class
    will also take the width and the height of the wall as parameters. To this end,
    create a new class called `Wall` that contains the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.graphics.Color;

    public class Wall extends BaseActor

    {

    public Wall(float x, float y, float width, float height, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/white-square.png");

    setSize(width, height);

    setColor( Color.GRAY );

    setBoundaryRectangle();

    }

    }

    ```


    If desired, the color can be set to something other than `Color.GRAY`. Note that
    since the boundary polygon is set to match the size of the texture that is loaded,
    changing the object size with the `setSize` method should be followed by calling
    the `setBoundaryRectangle` method to update this data as well.


    Next, in the `initialize` method of the `LevelScreen` class, add the following
    code:


    ```

    new Wall(  0,0, 20,600, mainStage); // left wall

    new Wall(780,0, 20,600, mainStage); // right wall

    new Wall(0,550, 800,50, mainStage); // top wall

    ```


    Variables to store the `Wall` objects are not needed, since a list of `Brick`
    objects can be easily obtained later on using the `getList` method of the `BaseActor`
    class. Note in particular that the top wall has a large height; this will be to
    provide space for labels in the user interface, implemented later in this chapter.
    If desired, you can test the program again at this point to visually inspect that
    the walls are placed correctly.


    ### Bricks


    Next, you will add the rectangular bricks to the game. Create a new class called
    `Brick` that contains the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Brick extends BaseActor

    {

    public Brick(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/brick-gray.png");

    }

    }

    ```


    If desired, you can use the `setColor` method in the constructor to tint the bricks
    to a particular color.


    Next, you will set up a rectangular grid of bricks on the main screen. The easiest
    way to do this is with a nested `for` loop. The coordinates of each brick can
    be calculated in terms of the row and column position and width and height of
    each brick. To determine the width and height of the bricks, a single `Brick`
    object is created and removed after its size is stored. To position the grid of
    bricks near the center of the screen, margins are also calculated and taken into
    account. To implement this, in the `initialize` method of the `LevelScreen` class,
    add the following code:


    ```

    Brick tempBrick = new Brick(0,0,mainStage);

    float brickWidth = tempBrick.getWidth();

    float brickHeight = tempBrick.getHeight();

    tempBrick.remove();

    int totalRows = 10;

    int totalCols = 10;

    float marginX = (800 - totalCols * brickWidth) / 2;

    float marginY = (600 - totalRows * brickHeight) - 120;

    for (int rowNum = 0; rowNum < totalRows; rowNum++)

    {

    for (int colNum = 0; colNum < totalCols; colNum++)

    {

    float x = marginX + brickWidth  * colNum;

    float y = marginY + brickHeight * rowNum;

    new Brick( x, y, mainStage );

    }

    }

    ```


    Once again, you can test the project at this point to verify that the bricks appear
    as desired. The preceding code produces the arrangement shown in Figure [8-3](#A352797_2_En_8_Chapter.html#Fig3);
    you can adjust the number of bricks in each row and column if desired by changing
    the values of `totalRows` and `totalCols`, or even add some spacing between the
    bricks by adding a small value to `brickHeight` and `brickWidth`.


    ![A352797_2_En_8_Fig3_HTML.jpg](A352797_2_En_8_Fig3_HTML.jpg)


    Figure 8-3.


    Adding a rectangular grid of bricks


    Some games in this genre will add visual interest by creating a pixel art–style
    picture out of bricks of different colors. While technically possible at this
    point, it is not really worth the effort involved. Designing and loading a pattern
    of colored bricks with the assistance of a third-party program for tilemap editing
    will be the topic of a future chapter.'
  trans: '

    ### 挡板


    首先，你需要创建一个代表玩家控制的挡板对象的类，这将是最容易设置的对象。创建一个名为 `Paddle` 的新类，包含以下代码：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Paddle extends BaseActor

    {

    public Paddle(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/paddle.png");

    }

    }

    ```


    然后，在 `LevelScreen` 类中添加以下 `import` 语句（这将使你稍后能够获取鼠标位置）：


    ```

    import com.badlogic.gdx.Gdx;

    ```


    接着，在类中添加以下变量声明：


    ```

    Paddle paddle;

    ```


    在 `initialize` 方法中，通过添加以下代码来设置背景图像和挡板：


    ```

    BaseActor background = new BaseActor(0,0, mainStage);

    background.loadTexture("assets/space.png");

    BaseActor.setWorldBounds(background);

    paddle = new Paddle(320, 32, mainStage);

    ```


    然后，在 `update` 方法中添加以下代码，这将使挡板在水平方向上与鼠标对齐（通过调整其 x 坐标），同时确保挡板完全显示在屏幕上。（如果鼠标移出屏幕，此代码将不起作用。）


    ```

    float mouseX = Gdx.input.getX();

    paddle.setX( mouseX - paddle.getWidth()/2 );

    paddle.boundToWorld();

    ```


    此时是测试游戏的好时机（通过运行 `Launcher` 类中的 `main` 方法）；你应该能够通过移动鼠标来控制挡板的位置；此时，你的游戏应如图 8-2
    所示。


    ![A352797_2_En_8_Fig2_HTML.jpg](img/A352797_2_En_8_Fig2_HTML.jpg)


    图 8-2.


    添加了背景图像和挡板的游戏


    ### 墙壁


    接下来，你需要为墙壁对象创建一个类。墙壁将沿着屏幕的左、右和上边缘放置，球会从它们上面弹开。由于墙壁可能有不同的大小，`Wall` 类的 `constructor`
    也将把墙壁的宽度和高度作为参数。为此，创建一个名为 `Wall` 的新类，包含以下代码：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.graphics.Color;

    public class Wall extends BaseActor

    {

    public Wall(float x, float y, float width, float height, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/white-square.png");

    setSize(width, height);

    setColor( Color.GRAY );

    setBoundaryRectangle();

    }

    }

    ```


    如果需要，可以将颜色设置为 `Color.GRAY` 以外的颜色。请注意，由于边界多边形设置为与加载的纹理大小匹配，因此在调用 `setSize` 方法更改对象大小后，应调用
    `setBoundaryRectangle` 方法来更新此数据。


    接下来，在 `LevelScreen` 类的 `initialize` 方法中添加以下代码：


    ```

    new Wall(  0,0, 20,600, mainStage); // 左墙

    new Wall(780,0, 20,600, mainStage); // 右墙

    new Wall(0,550, 800,50, mainStage); // 顶墙

    ```


    不需要存储 `Wall` 对象的变量，因为稍后可以使用 `BaseActor` 类的 `getList` 方法轻松获取 `Brick` 对象的列表。特别要注意的是，顶墙的高度很大；这将为本章稍后实现的用户界面中的标签提供空间。如果需要，此时可以再次测试程序，以目视检查墙壁是否正确放置。


    ### 砖块


    接下来，你需要将矩形砖块添加到游戏中。创建一个名为 `Brick` 的新类，包含以下代码：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Brick extends BaseActor

    {

    public Brick(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/brick-gray.png");

    }

    }

    ```


    如果需要，可以在构造函数中使用 `setColor` 方法为砖块着色。


    接下来，你需要在主屏幕上设置一个矩形砖块网格。最简单的方法是使用嵌套的 `for` 循环。每个砖块的坐标可以根据行和列的位置以及每个砖块的宽度和高度来计算。为了确定砖块的宽度和高度，先创建一个
    `Brick` 对象，在存储其大小后将其移除。为了将砖块网格定位在屏幕中央附近，还需要计算并考虑边距。为此，在 `LevelScreen` 类的 `initialize`
    方法中添加以下代码：


    ```

    Brick tempBrick = new Brick(0,0,mainStage);

    float brickWidth = tempBrick.getWidth();

    float brickHeight = tempBrick.getHeight();

    tempBrick.remove();

    int totalRows = 10;

    int totalCols = 10;

    float marginX = (800 - totalCols * brickWidth) / 2;

    float marginY = (600 - totalRows * brickHeight) - 120;

    for (int rowNum = 0; rowNum < totalRows; rowNum++)

    {

    for (int colNum = 0; colNum < totalCols; colNum++)

    {

    float x = marginX + brickWidth  * colNum;

    float y = marginY + brickHeight * rowNum;

    new Brick( x, y, mainStage );

    }

    }

    ```


    此时，你可以再次测试项目，以验证砖块是否按预期显示。上述代码产生了如图 8-3 所示的排列；如果需要，你可以通过更改 `totalRows` 和 `totalCols`
    的值来调整每行和每列的砖块数量，甚至可以通过向 `brickHeight` 和 `brickWidth` 添加一个小的值来在砖块之间添加一些间距。


    ![A352797_2_En_8_Fig3_HTML.jpg](img/A352797_2_En_8_Fig3_HTML.jpg)


    图 8-3.


    添加矩形砖块网格


    这类游戏中的一些游戏会通过使用不同颜色的砖块创建像素艺术风格的图片来增加视觉趣味。虽然目前技术上可行，但这并不值得投入太多精力。借助第三方程序进行瓦片地图编辑来设计和加载彩色砖块图案将是未来章节的主题。'
- fmt: '### Ball


    接下来，你将实现球对象。球将利用`BaseActor`类中的物理功能：它将保持恒定速度运动。为了模拟少量重力，球永远不会在某个垂直位置“卡住”，而是直接从左墙移动到右墙再返回。游戏开始时，球需要保持静止，直到用户点击鼠标按钮。因此，`Ball`类将包含一个名为`paused`的布尔变量（以及相关方法`setPaused`和`isPaused`），用于控制是否在`act`方法中应用物理效果。首先，使用以下代码创建一个名为`Ball`的新类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.math.Vector2;

    public class Ball extends BaseActor

    {

    public boolean paused;

    public Ball(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/ball.png");

    setSpeed(400);

    setMotionAngle(90);

    setBoundaryPolygon(12);

    setPaused(true);

    }

    public boolean isPaused()

    {

    return paused;

    }

    public void setPaused(boolean b)

    {

    paused = b;

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( !isPaused() )

    {

    // simulate gravity

    setAcceleration(10);

    accelerateAtAngle(270);

    applyPhysics(dt);

    }

    }

    }

    ```


    此外，球需要从砖块和墙壁上“弹回”。这借助`BaseActor`类中`preventOverlap`方法返回的向量实现，该向量表示角色被移动的方向，以使涉及的角色不再重叠。通过比较向量的x和y分量，你可以估计重叠主要发生在x方向（此时球应水平弹回）还是y方向（此时球应垂直弹回）。任一方向的弹回都涉及反转该方向的速度，这通过将对应分量乘以-1实现。因此，将`BaseActor`类中的`velocityVec`字段改为：


    ```

    protected Vector2 velocityVec;

    ```


    进行此更改后，`Ball`类可以访问并修改此变量。为实现此功能，在`Ball`类中添加以下方法：


    ```

    public void bounceOff(BaseActor other)

    {

    Vector2 v = this.preventOverlap(other);

    if ( Math.abs(v.x) >= Math.abs(v.y) ) // horizontal bounce

    this.velocityVec.x *= -1;

    else // vertical bounce

    this.velocityVec.y *= -1;

    }

    ```


    要向游戏中添加球，在`LevelScreen`类中添加以下变量声明：


    ```

    Ball ball;

    ```


    在`initialize`方法中，添加以下代码行：


    ```

    ball = new Ball(0,0, mainStage);

    ```


    为了在球暂停时将其锁定在挡板上方中心位置，在`update`方法中添加以下代码块：


    ```

    if ( ball.isPaused() )

    {

    ball.setX( paddle.getX() + paddle.getWidth()/2  - ball.getWidth()/2 );

    ball.setY( paddle.getY() + paddle.getHeight()/2 + ball.getHeight()/2 );

    }

    ```


    最后，为了在用户点击鼠标按钮时释放球，在`LevelScreen`类中添加以下方法：


    ```

    public boolean touchDown(int screenX, int screenY, int pointer, int button)

    {

    if ( ball.isPaused() )

    {

    ball.setPaused(false);

    }

    return false;

    }

    ```


    此时，你可以再次测试游戏。球应出现在挡板上方中心位置，并随挡板来回移动；如果点击鼠标按钮，球将垂直向上飞向（并越过）屏幕顶部边缘。在下一节中，你将添加代码使球从各种游戏对象上弹回。


    ## 弹跳逻辑


    在本节中，你将添加使球从墙壁、砖块和挡板上弹回的代码。最简单的是从墙壁弹回。在`LevelScreen`类的`update`方法中，添加以下代码：


    ```

    for (BaseActor wall : BaseActor.getList(mainStage, "Wall"))

    {

    if ( ball.overlaps(wall) )

    {

    ball.bounceOff(wall);

    }

    }

    ```


    从砖块弹回稍微复杂一些，因为砖块被击中时也会被销毁。在`LevelScreen`类的`update`方法中，添加以下代码：


    ```

    for (BaseActor brick : BaseActor.getList(mainStage, "Brick"))

    {

    if ( ball.overlaps(brick) )

    {

    ball.bounceOff(brick);

    brick.remove();

    }

    }

    ```


    最后，你将添加使球从挡板上弹回的代码。如本章开头所述，弹回角度取决于被击中的挡板部位，因此这里不会使用`Ball`类的`bounceOff`方法。相反，你需要确定球中心的x坐标，并计算其在挡板上的位置百分比：0.00表示最左端，0.50表示正中心，1.00表示最右端。然后使用`MathUtils`类的`lerp`方法，根据该百分比（线性）插值弹回角度：百分比0.00对应150度角（指向左侧），百分比1.00对应30度角（指向右侧），中间百分比则使用线性函数（连接这两个数据点的直线方程）进行相应插值。为实现此功能，在`LevelScreen`类中添加以下`import`语句：


    ```

    import com.badlogic.gdx.math.MathUtils;

    ```


    然后，在`update`方法中添加以下代码：


    ```

    if ( ball.overlaps(paddle) )

    {

    float ballCenterX = ball.getX() + ball.getWidth()/2;

    float paddlePercentHit = (ballCenterX - paddle.getX()) / paddle.getWidth();

    float bounceAngle = MathUtils.lerp( 150, 30, paddlePercentHit );

    ball.setMotionAngle( bounceAngle );

    }

    ```


    此时，你应该测试游戏，验证球是否按预期从墙壁、砖块和挡板上弹回。需要注意的是，游戏过程中可能出现两种奇怪的行为。首先，如果墙壁太薄且球移动太快，球可能在游戏循环的单个迭代中穿过墙壁。如果在试玩时出现这种情况，你可能需要限制球的速度或增加墙壁的尺寸。其次，球可能看起来穿过砖块而不是从其上弹回；如果球恰好同时与两个砖块重叠，`bounceOff`方法会被调用两次，而两次反转同一方向的速度会导致球继续沿相同方向运动。目前似乎没有简单或优雅的方法来消除这种行为，但在实际游戏中这种情况很少发生，因此这里不做处理。'
  raw: '### Ball


    Next, you will implement the ball object. The ball will make use of the physics
    functionality in the `BaseActor` class: it will travel at a constant velocity.
    A small amount of gravitational force will be simulated so that the ball never
    gets “stuck” at a given vertical position, moving directly from the left wall
    to the right wall and back again. At the beginning of the game, the ball also
    needs to be stationary until the user clicks a mouse button. For this reason,
    the `Ball` class will include a Boolean variable called `paused` (and associated
    methods `setPaused` and `isPaused`) that controls whether the physics will be
    applied in the `act` method. To begin, create a new class called `Ball` with the
    following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.math.Vector2;

    public class Ball extends BaseActor

    {

    public boolean paused;

    public Ball(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/ball.png");

    setSpeed(400);

    setMotionAngle(90);

    setBoundaryPolygon(12);

    setPaused(true);

    }

    public boolean isPaused()

    {

    return paused;

    }

    public void setPaused(boolean b)

    {

    paused = b;

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( !isPaused() )

    {

    // simulate gravity

    setAcceleration(10);

    accelerateAtAngle(270);

    applyPhysics(dt);

    }

    }

    }

    ```


    In addition, the ball needs to “bounce” off of the bricks and the walls. This
    is accomplished with the help of the vector returned by the `preventOverlap` method
    in the `BaseActor` class, which represents the direction in which the actor was
    moved so that the actors involved no longer overlap. By comparing the x and y
    components of the vector, you can estimate whether the overlap was mostly along
    the x-direction (in which case, the ball should bounce horizontally) or the y-direction
    (in which case, the ball should bounce vertically). Bouncing in either direction
    involves reversing the velocity in that direction, which is accomplished by multiplying
    the corresponding component by -1\. For this reason, change the `velocityVec`
    field in the `BaseActor` class to


    ```

    protected Vector2 velocityVec;

    ```


    After making this change, the `Ball` class can access and modify this variable.
    To implement this, in the `Ball` class, add the following method:


    ```

    public void bounceOff(BaseActor other)

    {

    Vector2 v = this.preventOverlap(other);

    if ( Math.abs(v.x) >= Math.abs(v.y) ) // horizontal bounce

    this.velocityVec.x *= -1;

    else // vertical bounce

    this.velocityVec.y *= -1;

    }

    ```


    To add a ball to the game , in the `LevelScreen` class, add the following variable
    declaration:


    ```

    Ball ball;

    ```


    In the `initialize` method, add the following line of code:


    ```

    ball = new Ball(0,0, mainStage);

    ```


    To lock the ball into place above the center of the paddle when the ball is paused,
    add the following block of code to the `update` method:


    ```

    if ( ball.isPaused() )

    {

    ball.setX( paddle.getX() + paddle.getWidth()/2  - ball.getWidth()/2 );

    ball.setY( paddle.getY() + paddle.getHeight()/2 + ball.getHeight()/2 );

    }

    ```


    Finally, to release the ball when the user clicks the mouse button, add the following
    method to the `LevelScreen` class:


    ```

    public boolean touchDown(int screenX, int screenY, int pointer, int button)

    {

    if ( ball.isPaused() )

    {

    ball.setPaused(false);

    }

    return false;

    }

    ```


    At this point, you can test the game once again. The ball should appear centered
    above the paddle as it moves back and forth, and if you click a mouse button,
    the ball will fly straight up toward (and past) the top edge of the screen. In
    the next section, you will add code to make the ball bounce off of the various
    game objects .


    ## Bouncing Around


    In this section, you will add the code that enables the ball to bounce off the
    walls, the bricks, and the paddle. The simplest of these is bouncing off the walls
    . In the `update` method of the `LevelScreen` class, add the following code:


    ```

    for (BaseActor wall : BaseActor.getList(mainStage, "Wall"))

    {

    if ( ball.overlaps(wall) )

    {

    ball.bounceOff(wall);

    }

    }

    ```


    Only slightly more difficult is bouncing off bricks, as these will also be destroyed
    when hit. In the `update` method of the `LevelScreen` class, add the following
    code:


    ```

    for (BaseActor brick : BaseActor.getList(mainStage, "Brick"))

    {

    if ( ball.overlaps(brick) )

    {

    ball.bounceOff(brick);

    brick.remove();

    }

    }

    ```


    Finally, you will add the code that enables the ball to bounce off the paddle.
    As described at the beginning of this chapter, the angle of bounce is dependent
    on the part of the paddle that is hit, and so the `Ball` class `bounceOff` method
    will not be used here. Instead, you determine the x-coordinate of the center of
    the ball and calculate how far along the paddle it lies, as a percentage: 0.00
    represents the leftmost point, 0.50 represents the exact center, and 1.00 represents
    the rightmost point. The percentage is then used to (linearly) interpolate the
    angle of bounce using the `MathUtils` class `lerp` method: a percentage of 0.00
    will correspond to an angle of 150 degrees (which points toward the left), a percentage
    of 1.00 will correspond to an angle of 30 degrees (which points towards the right),
    and percentages in between are interpolated correspondingly using a linear function
    (the equation of the line connecting these two data points). To implement this,
    add the following `import` statement to the `LevelScreen` class:


    ```

    import com.badlogic.gdx.math.MathUtils;

    ```


    Then, in the `update` method, add the following code.


    ```

    if ( ball.overlaps(paddle) )

    {

    float ballCenterX = ball.getX() + ball.getWidth()/2;

    float paddlePercentHit = (ballCenterX - paddle.getX()) / paddle.getWidth();

    float bounceAngle = MathUtils.lerp( 150, 30, paddlePercentHit );

    ball.setMotionAngle( bounceAngle );

    }

    ```


    At this point, you should test the game and verify that the ball bounces off the
    walls, bricks, and paddle as expected. It is important to note that there are
    two possible strange behaviors that may arise in gameplay. First, if the walls
    are too thin and the ball is moving too quickly, it is possible for the ball to
    pass through the wall in a single iteration of the game loop. If this happens
    while you are playtesting, you may want to cap the speed of the ball or increase
    the size of the walls. Also, the ball may appear to pass through bricks instead
    of bouncing off of them; this can happen if the ball happens to overlap two bricks
    at the same time; the `bounceOff` method is called twice, and reversing the velocity
    twice (for the same component) will result in the ball continuing in the same
    direction. There seems to be no simple or elegant approach to eliminating this
    behavior, but it happens infrequently in practice, so it will not be addressed
    here.'
  trans: '

    ### 球体


    接下来，你将实现球体对象。球体将利用`BaseActor`类中的物理功能：它将保持恒定速度运动。同时会模拟少量重力，使球体不会在某个垂直位置“卡住”，而是从左墙到右墙来回移动。游戏开始时，球体需要保持静止，直到用户点击鼠标按钮。因此，`Ball`类将包含一个名为`paused`的布尔变量（以及相关方法`setPaused`和`isPaused`），用于控制是否在`act`方法中应用物理效果。首先，创建一个名为`Ball`的新类，代码如下：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.math.Vector2;

    public class Ball extends BaseActor

    {

    public boolean paused;

    public Ball(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/ball.png");

    setSpeed(400);

    setMotionAngle(90);

    setBoundaryPolygon(12);

    setPaused(true);

    }

    public boolean isPaused()

    {

    return paused;

    }

    public void setPaused(boolean b)

    {

    paused = b;

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( !isPaused() )

    {

    // 模拟重力

    setAcceleration(10);

    accelerateAtAngle(270);

    applyPhysics(dt);

    }

    }

    }

    ```


    此外，球体需要从砖块和墙壁上“弹回”。这借助`BaseActor`类中`preventOverlap`方法返回的向量来实现，该向量表示角色被移动的方向，以使相关角色不再重叠。通过比较向量的
    x 和 y 分量，你可以估算重叠主要发生在 x 方向（此时球体应水平弹回）还是 y 方向（此时球体应垂直弹回）。任一方向的弹回都涉及反转该方向的速度，通过将对应分量乘以-1
    来实现。因此，将`BaseActor`类中的`velocityVec`字段改为：


    ```

    protected Vector2 velocityVec;

    ```


    做出此更改后，`Ball`类可以访问并修改此变量。为实现此功能，在`Ball`类中添加以下方法：


    ```

    public void bounceOff(BaseActor other)

    {

    Vector2 v = this.preventOverlap(other);

    if ( Math.abs(v.x) >= Math.abs(v.y) ) // 水平弹回

    this.velocityVec.x *= -1;

    else // 垂直弹回

    this.velocityVec.y *= -1;

    }

    ```


    要向游戏中添加球体，在`LevelScreen`类中添加以下变量声明：


    ```

    Ball ball;

    ```


    在`initialize`方法中，添加以下代码行：


    ```

    ball = new Ball(0,0, mainStage);

    ```


    为了在球体暂停时将其锁定在挡板上方中央位置，在`update`方法中添加以下代码块：


    ```

    if ( ball.isPaused() )

    {

    ball.setX( paddle.getX() + paddle.getWidth()/2  - ball.getWidth()/2 );

    ball.setY( paddle.getY() + paddle.getHeight()/2 + ball.getHeight()/2 );

    }

    ```


    最后，为了在用户点击鼠标按钮时释放球体，在`LevelScreen`类中添加以下方法：


    ```

    public boolean touchDown(int screenX, int screenY, int pointer, int button)

    {

    if ( ball.isPaused() )

    {

    ball.setPaused(false);

    }

    return false;

    }

    ```


    此时，你可以再次测试游戏。球体应出现在挡板上方中央，并随挡板来回移动；如果点击鼠标按钮，球体将垂直向上飞向（并越过）屏幕顶部边缘。在下一节中，你将添加代码使球体从各种游戏对象上弹回。


    ## 弹跳机制


    在本节中，你将添加代码使球体能够从墙壁、砖块和挡板上弹回。其中最简单的是从墙壁上弹回。在`LevelScreen`类的`update`方法中，添加以下代码：


    ```

    for (BaseActor wall : BaseActor.getList(mainStage, "Wall"))

    {

    if ( ball.overlaps(wall) )

    {

    ball.bounceOff(wall);

    }

    }

    ```


    从砖块上弹回稍微复杂一些，因为砖块被击中后也会被销毁。在`LevelScreen`类的`update`方法中，添加以下代码：


    ```

    for (BaseActor brick : BaseActor.getList(mainStage, "Brick"))

    {

    if ( ball.overlaps(brick) )

    {

    ball.bounceOff(brick);

    brick.remove();

    }

    }

    ```


    最后，你将添加代码使球体能够从挡板上弹回。如本章开头所述，弹回角度取决于被击中的挡板部位，因此这里不会使用`Ball`类的`bounceOff`方法。取而代之，你需要确定球体中心的
    x 坐标，并计算其在挡板上的位置百分比：0.00 表示最左端，0.50 表示正中央，1.00 表示最右端。然后使用该百分比，通过`MathUtils`类的`lerp`方法（线性）插值计算弹回角度：百分比
    0.00 对应 150 度角（指向左侧），百分比 1.00 对应 30 度角（指向右侧），中间百分比则使用线性函数（连接这两个数据点的直线方程）进行相应插值。为实现此功能，在`LevelScreen`类中添加以下`import`语句：


    ```

    import com.badlogic.gdx.math.MathUtils;

    ```


    然后，在`update`方法中添加以下代码：


    ```

    if ( ball.overlaps(paddle) )

    {

    float ballCenterX = ball.getX() + ball.getWidth()/2;

    float paddlePercentHit = (ballCenterX - paddle.getX()) / paddle.getWidth();

    float bounceAngle = MathUtils.lerp( 150, 30, paddlePercentHit );

    ball.setMotionAngle( bounceAngle );

    }

    ```


    此时，你应该测试游戏，验证球体是否能按预期从墙壁、砖块和挡板上弹回。需要注意的是，游戏过程中可能出现两种奇怪的行为。首先，如果墙壁太薄且球体移动过快，球体可能在游戏循环的单个迭代中穿过墙壁。如果在测试时出现这种情况，你可能需要限制球体的速度或增加墙壁的尺寸。此外，球体可能看起来穿过砖块而非弹回；如果球体恰好同时与两块砖重叠，`bounceOff`方法会被调用两次，而两次反转同一方向的速度会导致球体继续沿原方向运动。目前似乎没有简单或优雅的方法来消除这种行为，但在实际游戏中这种情况很少发生，因此这里不做处理。

    '
- fmt: '## User Interface


    Next, you will implement a simple user interface for this game: three labels,
    two of which will appear near the top edge of the screen and display the number
    of points earned and the number of balls in reserve, as shown in Figure [8-1](#A352797_2_En_8_Chapter.html#Fig1).
    A third label will appear in the center of the screen and contain the message
    “Click to start” while the ball is paused, and messages for winning and losing
    the game. To begin, in the `LevelScreen` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    import com.badlogic.gdx.graphics.Color;

    ```


    Add the following variable declarations to the class:


    ```

    int score;

    int balls;

    Label scoreLabel;

    Label ballsLabel;

    Label messageLabel;

    ```


    To set up these variables, in the `initialize` method add the following code:


    ```

    score = 0;

    balls = 3;

    scoreLabel = new Label( "Score: " + score, BaseGame.labelStyle );

    ballsLabel = new Label( "Balls: " + balls, BaseGame.labelStyle );

    messageLabel = new Label("click to start", BaseGame.labelStyle );

    messageLabel.setColor( Color.CYAN );

    ```


    To arrange the labels using `uiTable`, you will create a two-row, three-column
    table, the center column being empty to separate `scoreLabel` and `ballsLabel`.
    The second row will span all three columns and contain `messageLabel` so that
    it appears near the center of the screen. This is accomplished by adding the following
    code to the `initialize` method:


    ```

    uiTable.pad(5);

    uiTable.add(scoreLabel);

    uiTable.add().expandX();

    uiTable.add(ballsLabel);

    uiTable.row();

    uiTable.add(messageLabel).colspan(3).expandY();

    ```


    First of all, the `messageLabel` should disappear when the player clicks a button.
    In the `touchDown` method, in the block of code that checks if the ball is paused,
    add the following line of code at the end of, but inside, the `if` statement:


    ```

    messageLabel.setVisible(false);

    ```


    Next, you will earn points when a brick is destroyed. In the `update` method,
    in the block of code that checks if the ball overlaps a brick (after `brick.remove()`),
    add the following two lines of code:


    ```

    score += 100;

    scoreLabel.setText("Score: " + score);

    ```


    If all the bricks are destroyed, a “You win!” message should be displayed. This
    is accomplished by adding the following code to the `update` method:


    ```

    if ( BaseActor.count(mainStage, "Brick") == 0)

    {

    messageLabel.setText("You win!");

    messageLabel.setColor( Color.LIME );

    messageLabel.setVisible(true);

    }

    ```


    Next, you will set up the reserve ball and respawn mechanic. If the ball moves
    past the bottom edge of the screen, then it should be removed from the game. If
    there are any balls left, a new ball should be spawned, the number of balls should
    be decreased, and the message label should display “Click to start” again. If
    there are not any balls left, then a “Game Over” message should be displayed.
    Note that the condition also checks that there are bricks remaining, because these
    messages should not be displayed if the player has already won the game. Add the
    following code to the `update` method:


    ```

    if ( ball.getY()  0 )

    {

    ball.remove();

    if (balls > 0)

    {

    balls -= 1;

    ballsLabel.setText("Balls: " + balls);

    ball = new Ball(0,0,mainStage);

    messageLabel.setText("Click to start");

    messageLabel.setColor( Color.CYAN );

    messageLabel.setVisible(true);

    }

    else

    {

    messageLabel.setText("Game Over");

    messageLabel.setColor( Color.RED );

    messageLabel.setVisible(true);

    }

    }

    ```


    At this point, your game is ready for testing again! Make sure that the score
    and ball labels change as expected and that the correct text appears in the message
    label at the correct times.


    ## Items


    To add interest and variability to the gameplay, you will next implement items.
    To keep track of the different types of items, you will use an enumerated type.


    ### Enumerated Types


    An enumerated type is a special data type you can define that consists of a set
    of fixed values. This is particularly useful when you want a variable to store
    only a certain set of values.


    For example, if you want to represent a compass direction, you could create an
    integer variable and a set of predefined constants, as follows:


    ```

    final int NORTH = 0;

    final int SOUTH = 1;

    final int EAST = 2;

    final int WEST = 3;

    int direction;

    ```


    Later on, you could write code such as:


    ```

    direction = NORTH;

    ```


    However, this code suffers from the drawback that any integer value could be assigned
    to the `direction` variable, including values that do not make sense, such as:


    ```

    direction = 4;

    ```


    Enumerated types eliminate this problem entirely. The same functionality just
    described could be implemented much more robustly. Using the `enum` keyword, you
    can define an enumerated type (named `Direction`) and corresponding variable as
    follows:


    ```

    enum Direction { NORTH, SOUTH, EAST, WEST };

    Direction direction;

    ```


    In this example, `Direction` is now a user-defined data type, and `direction`
    is a variable of that type. The syntax for using the values of an enumerated type
    is similar to that for accessing static fields defined in a class. For example,
    to set the value of `direction` to the `Direction` value `NORTH`, you would enter:


    ```

    direction = Direction.NORTH;

    ```


    Finally, you can compare the value of an enumerated type variable using `==` or
    the `equals` method, and you can obtain an array containing the values with the
    `values` method.


    In this section, you will create four different types of items: two that affect
    the size of the paddle (one expanding it, the other shrinking it) and two that
    affect the speed of the ball (one increasing it, the other decreasing it). The
    type will be specified with an enum (called `Type`). Each type of item will have
    a corresponding image, as shown in Figure [8-4](#A352797_2_En_8_Chapter.html#Fig4).


    ![A352797_2_En_8_Fig4_HTML.jpg](A352797_2_En_8_Fig4_HTML.jpg)


    Figure 8-4. Item images (paddle expand, paddle shrink, ball speed up, ball speed
    down)


    When items are created, the following will happen:


    - A random type will be selected.

    - There will be an animated effect that causes the item to grow from a point to
    its full size.

    - The item will move toward the bottom of the screen at a constant speed.

    - If the item moves past the bottom edge of the screen, it will be removed from
    the game.


    To implement these features, create a new class named `Item` containing the following
    code. Observe that in the constructor, after changing the size of the image, the
    origin coordinates and the boundary shape need to be updated as well.'
