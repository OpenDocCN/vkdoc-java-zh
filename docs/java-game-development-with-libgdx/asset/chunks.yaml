- fmt: '# Enemies


    Every game should have an obstacle that makes it difficult to reach or achieve
    the goal. In Treasure Quest, you must use your weapons to destroy the enemies
    that fly around the screen, which are named Flyers. Flyers are somewhat random:
    each has a random speed, and at random times they change their direction of motion
    to a random angle. Create a new class called `Flyer` that contains the following
    code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.math.MathUtils;

    public class Flyer extends BaseActor

    {

    public Flyer(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet( "assets/enemy-flyer.png", 1, 4, 0.05f, true);

    setSize(48,48);

    setBoundaryPolygon(6);

    setSpeed( MathUtils.random(50,80) );

    setMotionAngle( MathUtils.random(0,360) );

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( MathUtils.random(1,120) == 1 )

    setMotionAngle( MathUtils.random(0,360) );

    applyPhysics(dt);

    boundToWorld();

    }

    }

    ```


    When a Flyer is destroyed, it will disappear in a puff of smoke. To this end,
    create a new class called `Smoke` that contains the following code, which creates
    an image that fades out and then removes itself from the game:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Smoke extends BaseActor

    {

    public Smoke(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/smoke.png");

    addAction( Actions.fadeOut(0.5f) );

    addAction( Actions.after( Actions.removeActor() ) );

    }

    }

    ```


    As usual, you need to create these new objects in the `LevelScreen` class `initialize`
    method, as follows:


    ```

    for (MapObject obj : tma.getTileList("Flyer") )

    {

    MapProperties props = obj.getProperties();

    new Flyer( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    ```


    Flyers will also be blocked by solid objects and change their direction on collision,
    so in the `update` method, locate the `for` loop that iterates over the `Solid`
    objects and in the corresponding block of code add the following:


    ```

    for (BaseActor flyer : BaseActor.getList(mainStage, "Flyer"))

    {

    if (flyer.overlaps(solid))

    {

    flyer.preventOverlap(solid);

    flyer.setMotionAngle( flyer.getMotionAngle() + 180 );

    }

    }

    ```


    The sword can destroy enemies when it is visible (which indicates it is in the
    process of being swung). In this case, if the sword overlaps an enemy, smoke will
    be created and a coin will be spawned (rewarding the player for their victory).
    In the `update` method, locate the conditional statement that checks if the sword
    is visible, and in the corresponding block of code add the following:


    ```

    for (BaseActor flyer : BaseActor.getList(mainStage, "Flyer"))

    {

    if (sword.overlaps(flyer))

    {

    flyer.remove();

    Coin coin = new Coin(0,0, mainStage);

    coin.centerAtActor(flyer);

    Smoke smoke = new Smoke(0,0, mainStage);

    smoke.centerAtActor(flyer);

    }

    }

    ```


    Finally, the hero should lose health when he comes into contact with a Flyer.
    Checking for overlap is straightforward, but there is a subtle point that needs
    to be addressed: the hero and the Flyer should be “pushed apart” as much as possible
    because otherwise the hero could overlap the Flyer multiple times in rapid succession,
    and the player would quickly lose the game. Therefore, after a collision occurs,
    the Flyer will start moving in the opposite direction, and the hero will be pushed
    away from the enemy, which is also sometimes called knockback. To calculate the
    angle of motion, you calculate the vector from the hero to the Flyer by subtracting
    their positions and then use the `angle` method of the `Vector2` class. To implement
    these features, add the following code to the `update` method:


    ```

    for (BaseActor flyer : BaseActor.getList(mainStage, "Flyer"))

    {

    if ( hero.overlaps(flyer) )

    {

    hero.preventOverlap(flyer);

    flyer.setMotionAngle( flyer.getMotionAngle() + 180 );

    Vector2 heroPosition  = new Vector2(  hero.getX(),  hero.getY() );

    Vector2 flyerPosition = new Vector2( flyer.getX(), flyer.getY() );

    Vector2 hitVector = heroPosition.sub( flyerPosition );

    hero.setMotionAngle( hitVector.angle() );

    hero.setSpeed(100);

    health--;

    }

    }

    ```


    At this point, you have finished implementing the Flyer enemies. Test your project,
    slash the enemies with your sword, and collect the coins they drop.


    # Arrows


    Many combat-centric games feature multiple weapons to appeal to multiple styles
    of gameplay. You will now add an arrow weapon to this game, which allows you to
    attack enemies from a distance. To make sure the player doesn’t rely on this weapon
    exclusively, the number of arrows is limited (although additional arrows may be
    purchased at the item shop that will be created near the end of this chapter).
    The player can shoot an arrow by pressing the `A` key, and if the hero has any
    arrows remaining, an arrow will be spawned and travel in the direction the hero
    is facing. If the arrow hits an enemy, the enemy will be destroyed; if the arrow
    hits a solid object, then the arrow will stop moving and fade out. To begin, create
    a new class called `Arrow` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Arrow extends BaseActor

    {

    public Arrow(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/arrow.png");

    setSpeed(400);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    }

    }

    ```


    Shooting arrows will be handled by the following method, which should be added
    to the `LevelScreen` class:


    ```

    public void shootArrow()

    {

    if ( arrows <= 0 )

    return;

    arrows--;

    Arrow arrow = new Arrow(0,0, mainStage);

    arrow.centerAtActor(hero);

    arrow.setRotation( hero.getFacingAngle() );

    arrow.setMotionAngle( hero.getFacingAngle() );

    }

    ```


    In the `keyDown` method, add the following code after the code that causes the
    hero to swing their sword:


    ```

    if (keycode == Keys.A)

    shootArrow();

    ```


    Finally, to specify how the arrows interact with the Flyers and with solid objects,
    add the following code to the `update` method:


    ```

    for (BaseActor arrow : BaseActor.getList(mainStage, "Arrow"))

    {

    for (BaseActor flyer : BaseActor.getList(mainStage, "Flyer"))

    {

    if (arrow.overlaps(flyer))

    {

    flyer.remove();

    arrow.remove();

    Coin coin = new Coin(0,0, mainStage);

    coin.centerAtActor(flyer);

    Smoke smoke = new Smoke(0,0, mainStage);

    smoke.centerAtActor(flyer);

    }

    }

    for (BaseActor solid : BaseActor.getList(mainStage, "Solid"))

    {

    if (arrow.overlaps(solid))

    {

    arrow.preventOverlap(solid);

    arrow.setSpeed(0);

    arrow.addAction( Actions.fadeOut(0.5f) );

    arrow.addAction( Actions.after( Actions.removeActor() ) );

    }

    }

    }

    ```


    This completes the arrow-shooting mechanic. Test your game and make sure that
    arrows destroy Flyer enemies, arrows stop when colliding with a solid, the number
    of arrows decreases when they are shot, and once the number of arrows reaches
    0, no more arrows can be shot.'
