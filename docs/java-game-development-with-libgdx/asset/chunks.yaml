    and you’ll have an FNT and PNG file ready to be used by the LibGDX `BitmapFont`
    class. The `assets` folder for this project contains the results of saving the
    bitmap font shown in this figure; the corresponding files are named `cooper.fnt`
    and `cooper.png`. To use this font in LibGDX, in the `create` method of the `BaseGame`
    class, you would change the line of code that sets the label-style object’s font
    variable to the following:


    ![A352797_2_En_5_Fig5_HTML.jpg](A352797_2_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    The Hiero application for generating bitmap font data


    ```

    labelStyle.font = new BitmapFont( Gdx.files.internal("myCustomFont.fnt") );

    ```


    #### Using the FreeType Font Generator


    Rather than create a bitmap font with an application, it is possible to use the
    `FreeTypeFontGenerator` class to create the bitmap font in code, eliminating the
    dependence on the external application. To create the font, you will need to include
    a TrueType Font file (extension TTF) in your `assets` folder as a basis for the
    bitmap font. TrueType fonts can easily be found online with an internet search.[³](#A352797_2_En_5_Chapter.html#Fn3)


    To begin, in the `BaseGame` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g2d.freetype.FreeTypeFontGenerator;

    import com.badlogic.gdx.graphics.g2d.freetype.FreeTypeFontGenerator.FreeTypeFontParameter;

    ```


    Then, in the create method, initialize a `FreeTypeFontGenerator` object with a
    reference to the TTF file with the following code :


    ```

    FreeTypeFontGenerator fontGenerator =

    new FreeTypeFontGenerator(Gdx.files.internal("assets/OpenSans.ttf"));

    ```


    Next, to configure the appearance of the font, create a `FreeTypeFontParameter`
    object, which allows you to specify a font size, font color, border width, border
    color, straight or rounded border edges, and so forth. You can also set texture
    filters, which determine how text appears if it is scaled in the application.
    To do so, add the following code to the `create` method:


    ```

    FreeTypeFontParameter fontParameters = new FreeTypeFontParameter();

    fontParameters.size = 48;

    fontParameters.color = Color.WHITE;

    fontParameters.borderWidth = 2;

    fontParameters.borderColor = Color.BLACK;

    fontParameters.borderStraight = true;

    fontParameters.minFilter = TextureFilter.Linear;

    fontParameters.magFilter = TextureFilter.Linear;

    ```


    Once this code is complete, you can generate the bitmap font and assign it by
    changing the line of code that sets the label style’s font to the following:


    ```

    BitmapFont customFont = fontGenerator.generateFont(fontParameters);

    labelStyle.font = customFont;

    ```


    With this task completed, you are ready to turn your attention to creating labels
    and using them to display text in your game.'
