    更复杂的模糊算法会计算像素颜色的加权平均值，其中像素离中心越近，其在计算最终颜色时的影响力就越大。


    # 16. 3D 图形与游戏入门


    本章将介绍 LibGDX 的一些 3D 图形功能。在此过程中，你将学习描述和渲染三维场景所需的概念和类。为了简化和精简此过程，你将既改编一些旧类，也编写一些新类来完成所涉及的各种任务。接下来，为了理解
    3D 移动，你将创建一个简单的交互式演示，使玩家能够控制场景中的对象以及观察场景的摄像机。最后，你将创建游戏 Starfish Collector 3D，如图
    16-1 所示，该游戏再次以一只海龟为主角，任务是收集所有它能找到的海星。为简单起见，该游戏实际上将使用 2.5D 技术：游戏将渲染三维图形，而底层玩法（移动和碰撞）将在二维中进行。


    ![A352797_2_En_16_Fig1_HTML.jpg](img/A352797_2_En_16_Fig1_HTML.jpg)


    图 16-1.


    Starfish Collector 3D 游戏


    ## 探索 3D 概念与类


    事实证明，本书之前创建的所有游戏都存在于一个三维空间中。你可能已经注意到，例如，在设置摄像机对象的位置时（在 `BaseActor` 类的 `alignCamera`
    方法中），你需要设置 x、y 和 z 分量。如果 x 轴和 y 轴分别代表屏幕上的水平和垂直方向，那么 z 轴则对应于一条指向观察者的直线，垂直于 xy 平面——即包含
    x 轴和 y 轴的平面。可以认为摄像机位于 z 轴上，直接指向 xy 平面；所有游戏实体都隐式地将其 z 坐标设置为 0。此配置如图 16-2 所示，该图大致展示了摄像机如何从之前章节中看到
    Starfish Collector 游戏。


    ![A352797_2_En_16_Fig2_HTML.jpg](img/A352797_2_En_16_Fig2_HTML.jpg)


    图 16-2.


    摄像机沿 z 轴向下观察 Starfish Collector 游戏


    你之前的项目严重依赖于 `Stage` 类，该类管理 `Camera` 和 `Batch` 对象（用于渲染目的）。要创建 3D 场景，你需要这些对象的“3D
    版本”，由 `PerspectiveCamera` 和 `ModelBatch` 类提供，接下来将详细介绍它们。然而，并没有一个对应的类似 `stage`
    的对象来管理它们，因此你将在后面的章节中创建自己的管理器类（称为 `Stage3D`）。


    要渲染一个场景，你可以使用两种类型的摄像机之一：正交摄像机或透视摄像机。（`Stage` 类使用 `OrthographicCamera` 对象进行渲染。）这两者的区别在于它们如何将
    3D 场景表示或投影到 2D 表面（如计算机屏幕）上。为了说明区别，考虑一个最简单的 3D 形状：立方体。图 16-3 显示了一个立方体的正交投影和透视投影。在正交投影中，如果物体的边长度相同，那么无论它们与观察者的距离如何，它们在投影中都会被绘制成相同的长度。这与透视投影形成对比，在透视投影中，具有两条相同长度边的物体在投影中可能看起来不同；离观察者较远的边看起来会更短。这还有一个副作用：如果物体的两条边平行，那么它们在正交投影中保持平行，但在透视投影中它们看起来会汇聚。（在透视图中，所有这些边看起来汇聚的点称为消失点。）


    ![A352797_2_En_16_Fig3_HTML.jpg](img/A352797_2_En_16_Fig3_HTML.jpg)


    图 16-3.


    使用正交投影（左）和透视投影（右）绘制的立方体


    在初始化 `PerspectiveCamera` 对象时，你必须定义摄像机可见的区域，该区域呈平截头棱锥体或视锥体形状（如图 16-4 所示）。这由五个参数指定：视野（一个角度，表示摄像机向两侧能看多远）、场景投影到的矩形的宽度和高度（由
    LibGDX 中的 `Viewport` 对象确定），以及近平面和远平面值（表示摄像机在渲染时将包含的最近和最远距离）。


    ![A352797_2_En_16_Fig4_HTML.jpg](img/A352797_2_En_16_Fig4_HTML.jpg)


    图 16-4.


    透视摄像机可见的区域；近平面和远平面距离由阴影平面表示

    '
- fmt: '下一个新类是`ModelBatch`。正如`SpriteBatch`对象可用于渲染二维`Texture`对象一样，`ModelBatch`用于渲染三维对象。描述三维对象外观所需的数据包含在`Model`对象中，该对象由两个主要部分组成：`Mesh`和`Material`。网格是定义对象形状的顶点、边和三角面的集合。材质包含应用于网格的颜色或纹理数据；材质在渲染时定义了网格的外观。图[16-5](#A352797_2_En_16_Chapter.html#Fig5)包含茶壶的两张图片：网格的线框表示，以及应用材质后的外观。这个特定的茶壶是一个名为犹他茶壶的经典模型，由计算机科学家马丁·纽厄尔于1975年创建。模型可以从标准的3D对象文件格式加载。


    ![A352797_2_En_16_Fig5_HTML.jpg](A352797_2_En_16_Fig5_HTML.jpg)


    图16-5. 犹他茶壶，以线框（左）和应用材质（右）渲染


    在LibGDX中，可以通过两种方式创建模型。使用`ModelLoader`类，可以从标准的3D对象文件格式（例如Wavefront格式，通常以`.obj`文件扩展名表示）加载模型，这些文件可能还包含配套材质使用的图像文件的引用。或者，可以使用`ModelBuilder`类在运行时生成一些基本形状（如球体和立方体）。在本章中，你将看到这两种方法的示例。


    最后，为了使3D模型具有逼真的外观，需要考虑光源的效果。事实上，如果场景中没有添加灯光，你将什么也看不见！灯光由`Environment`类管理。你将使用的两种光照效果是环境光和平行光。环境光提供整体照明，并从所有方向均匀照射。通常，在场景中包含环境光很重要，这样即使背对光源的面也会在一定程度上可见（尽管这个量可能因你模拟的位置类型而异）。平行光用于模拟沿特定方向照射整个场景的光线。这有助于在场景中提供深度感，特别是当对象的材质仅由单一颜色组成时，可以让你区分不同的面。图[16-6](#A352797_2_En_16_Chapter.html#Fig6)通过一个立方体的两次渲染说明了这些效果。在左侧图像中，场景仅包含环境光，这使得很难看到立方体的所有边缘。右侧图像添加了平行光，主要朝向左侧（因此立方体的右侧看起来最亮）。


    ![A352797_2_En_16_Fig6_HTML.jpg](A352797_2_En_16_Fig6_HTML.jpg)


    图16-6. 仅用环境光照明的立方体（左）和添加平行光后的立方体（右）


    ## 创建一个最小的3D演示


