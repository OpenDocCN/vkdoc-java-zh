    chance to connect with each other and provide a sense of community. Some events
    may be held at one or more physical locations. Some events may have no central
    location; developers work in areas of their own choosing (but are still held to
    the same time and schedule restrictions). Some notable long-running game jam events
    are as follows:


    *   Global Game Jam : `globalgamejam.org` This is the largest game jam in the
    world—an international event that takes place once each year, typically at the
    end of January. This is not an online event; on-site participation is required,
    so there are typically hundreds of physical locations (jam sites) around the world
    where individuals can attend.

    *   Ludum Dare : `ludumdare.com` Major events are held three times a year, and
    minor (mini) events are held during the months when there is no major event. Some
    participants attend gatherings at various sites, but most developers work from
    their own locations.

    *   One Game a Month : `onegameamonth.com` As the name indicates, these game jams
    are held monthly. The rules are particularly relaxed, and each jam takes place
    over the course of the entire month so as to provide maximum flexibility to participants.
    The organizer is Christer Kaitila, who has also written a book called The Game
    Jam Survival Guide (Packt Publishing, 2012) that discusses these events in great
    detail and provides a plethora of advice on how to have a successful experience
    .


    ### Overcoming Difficulties


    On your journey as a game developer, you will stumble at times. Everyone does.
    Perhaps you can’t figure out how to implement a particular game mechanic. Perhaps
    your program has an error at runtime and you’re just not sure why. Perhaps your
    program compiles and runs, but your game entities are behaving in strange and
    unexpected ways. Whatever your difficulty may be, don’t give up! Spend some time
    wrestling with the problem. Try different approaches—perhaps a different data
    structure, class, or algorithm is called for. Try to reduce the complexity of
    your code, break a problem into simpler steps or methods, or implement a simpler
    version first and incrementally build up to your ultimate goal. Remember that
    the process of overcoming difficulties is part of being—and helps you grow as—a
    game developer.


    However, also remember that balance is key in development (just as it is in games).
    Yes, it is valuable to learn how to debug and correct malfunctioning code, but
    if any particular problem persists for a long time, take a break before you become
    overly frustrated or discouraged. Keep things in perspective: it probably isn’t
    worth spending five straight hours trying to figure out why your platformer character
    can’t walk up a ramp. Spend some time away from your computer; take a walk, think
    about something else, and come back to your problem later with a refreshed outlook.


    After making a sincere effort to resolve any difficulties yourself, if you are
    still stuck, don’t despair: the vibrant and active community of fellow game developers
    and enthusiasts out there may be of assistance. The LibGDX forums ( [`www.badlogicgames.com/forum`](http://www.badlogicgames.com/forum)
    ) and Stack Overflow ( [`www.stackoverflow.com`](http://www.stackoverflow.com)
    ) are two excellent places to ask for help. Start by searching these sites to
    see whether someone has asked the same or a similar question. If not, the next
    step is to read any recommended guidelines for posting questions.


    Typically, you should describe your problem or goal fully and concisely and include
    details about what you have tried, what has worked, and what hasn’t. Sometimes,
    you might even find that the process of phrasing the question carefully to an
    external audience will help clarify the problem and inspire you with a possible
    solution or an alternative approach. If your post includes code, do so in moderation,
    but make sure that all variables are defined or explained to the reader. Most
    of all, be polite and patient. The people who frequent these websites often have
    full-time jobs elsewhere, and voluntarily visit these forums and provide general
    assistance out of a sense of community. It’s perfectly normal that a posted question
    might not generate a response for 48 hours or more. (In the meantime, be active
    in the community and see if anyone has posted any questions that you might be
    able to answer.)


    Whenever someone responds to your question, be sure to acknowledge them; if they
    suggest a course of action, write a follow-up post as to whether it worked. And,
    finally, if you turn out to be the person to resolve your own question, or decide
    to proceed in a completely different direction to circumvent the problem altogether,
    you should post that information as well to provide future readers a sense of
    closure.


    ## Broadening Your Horizons


    In addition to increasing your depth of knowledge and programming proficiency,
    you should devote time to developing a breadth of knowledge in game-related areas,
    as this will have a positive impact on the quality of the games you produce. This
    section will briefly mention a few ways to work toward this goal.


    ### Playing Different Games


    Most game enthusiasts have a favorite genre. Some people spend most of their time
    playing first-person shooters, while others prefer to devote their time to role-playing
    games and so forth. As a game developer, you should consider playing games from
    as wide a range as you can: action, adventure, puzzle, strategy, role-playing,
    sports, simulation, storytelling, and so forth. At the same time, try games from
    various time periods (from classic to modern) and from different-size developers
    (from large professional companies to smaller studios to independent game makers
    and game jam competitors).


    Even if you don’t find a particular game or genre compelling, you will grow as
    a developer if you spend some time playing such games, especially when you do
    so with a developer’s mindset. Try to understand why people like a given game.
    Examine each game’s level progression, gameplay balance, narrative and character
    development, artistic style, and interface design. Keep an eye out for what makes
    each game innovative or unique. Try to mentally place yourself in the role of
    the original game developers who created the game and think about possible reasons
    why they might have made the decisions they did; ponder whether you might have
    done the same or branched out in a different direction.'
  trans: '

    ### 参与游戏开发大赛


    获得宝贵游戏开发经验的一种方式是参与游戏开发大赛（Game Jam）。游戏开发大赛是游戏开发者们聚集在一起，挑战在短时间内（通常约 48 小时）设计和制作一款游戏的活动。参与者可能是程序员、美术师、编剧或其他拥有相关技能的人。由于时间限制，这类活动要求快速原型设计和开发技能，并鼓励参与者专注于创意、核心机制，以及将项目推进到完成（或至少达到可玩状态）。个人参与这些活动通常就是为了提升自己在这些领域的能力。此外，许多游戏开发大赛会选择一个主题，所有在活动中开发的游戏都必须融入该主题。主题通常在活动开始时公布，以防止提前规划并鼓励创意发挥。


    尽管有些游戏开发大赛设有评审团并宣布一名或多名获胜者，但这些活动通常是非正式且友好的，它们为参与者提供了相互联系的机会，并营造出一种社区感。有些活动可能在一个或多个实体地点举行。有些活动则可能没有中心地点；开发者在自己选择的地点工作（但仍需遵守相同的时间和日程限制）。一些著名的长期举办的游戏开发大赛如下：


    *   Global Game Jam：`globalgamejam.org` 这是世界上最大的游戏开发大赛——一项每年举办一次的国际性活动，通常在每年一月底举行。这不是线上活动；需要现场参与，因此全球通常有数百个实体地点（大赛站点）供个人参加。

    *   Ludum Dare：`ludumdare.com` 主要活动每年举办三次，而小型（迷你）活动则在没有主要活动的月份举行。一些参与者会聚集在各个站点，但大多数开发者在自己所在地工作。

    *   One Game a Month：`onegameamonth.com` 顾名思义，这些游戏开发大赛每月举行一次。规则特别宽松，每次大赛持续整个月，以便为参与者提供最大的灵活性。组织者是克里斯特·凯蒂拉，他还写了一本名为《游戏开发大赛生存指南》（Packt
    Publishing, 2012）的书，详细讨论了这些活动，并提供了大量关于如何获得成功体验的建议。


    ### 克服困难


    在你作为游戏开发者的旅程中，你有时会遭遇挫折。每个人都会。也许你想不出如何实现某个特定的游戏机制。也许你的程序在运行时出现错误，而你就是不确定原因。也许你的程序能编译并运行，但你的游戏实体却表现出奇怪且意想不到的行为。无论你的困难是什么，都不要放弃！花些时间与问题搏斗。尝试不同的方法——也许需要不同的数据结构、类或算法。尝试降低代码的复杂性，将问题分解成更简单的步骤或方法，或者先实现一个更简单的版本，然后逐步构建到你的最终目标。请记住，克服困难的过程是成为游戏开发者的一部分——并且能帮助你成长为一名更优秀的游戏开发者。


    然而，也要记住，平衡在开发中至关重要（就像在游戏中一样）。是的，学习调试和修正有问题的代码很有价值，但如果某个特定问题持续很长时间，在你变得过度沮丧或气馁之前，先休息一下。要客观看待问题：连续花五个小时试图弄清楚为什么你的平台跳跃游戏角色无法走上斜坡，可能并不值得。暂时离开电脑；散散步，想想别的事情，然后带着焕然一新的视角回到你的问题上。


    在真诚地努力自行解决困难之后，如果你仍然卡住，不要绝望：活跃且充满热情的同行游戏开发者与爱好者社区可能会提供帮助。LibGDX 论坛（[`www.badlogicgames.com/forum`](http://www.badlogicgames.com/forum)）和
    Stack Overflow（[`www.stackoverflow.com`](http://www.stackoverflow.com)）是两个寻求帮助的绝佳去处。首先搜索这些网站，看看是否有人问过相同或类似的问题。如果没有，下一步是阅读任何推荐的提问指南。


    通常，你应该全面而简洁地描述你的问题或目标，并包含你尝试过什么、哪些有效、哪些无效的细节。有时，你甚至可能会发现，仔细向外部受众阐述问题的过程有助于澄清问题，并激发你找到可能的解决方案或替代方法。如果你的帖子包含代码，要适度，但要确保所有变量都已定义或向读者解释清楚。最重要的是，要有礼貌和耐心。经常访问这些网站的人通常在其他地方有全职工作，他们是出于社区感自愿访问这些论坛并提供一般性帮助。一个帖子在
    48 小时或更长时间内没有收到回复是完全正常的。（在此期间，积极参与社区活动，看看是否有人发布了你能回答的问题。）


    每当有人回复你的问题时，一定要表示感谢；如果他们建议了行动方案，请写一篇后续帖子说明它是否有效。最后，如果你最终自己解决了问题，或者决定完全转向另一个方向来规避问题，你也应该发布这些信息，以便为未来的读者提供一个了结。


    ## 拓宽你的视野


    除了加深你的知识深度和编程熟练度之外，你还应该投入时间来拓展游戏相关领域的知识广度，因为这将对你所制作游戏的质量产生积极影响。本节将简要提及几种实现这一目标的方法。


    ### 玩不同类型的游戏


    大多数游戏爱好者都有自己喜欢的类型。有些人大部分时间都在玩第一人称射击游戏，而另一些人则更喜欢把时间花在角色扮演游戏上，等等。作为一名游戏开发者，你应该考虑尽可能广泛地玩各种类型的游戏：动作、冒险、解谜、策略、角色扮演、体育、模拟、叙事等等。同时，尝试不同时期（从经典到现代）以及不同规模开发者（从大型专业公司到小型工作室，再到独立游戏制作者和游戏开发大赛参赛者）制作的游戏。


    即使你觉得某个特定游戏或类型并不吸引人，但如果你花些时间玩这类游戏，尤其是带着开发者的思维模式去玩，你也会成长为一名更优秀的开发者。试着理解为什么人们喜欢某个游戏。审视每个游戏的关卡推进、游戏平衡性、叙事和角色发展、艺术风格以及界面设计。留意是什么让每个游戏具有创新性或独特性。试着在脑海中将自己置于创造该游戏的原始开发者的角色，思考他们可能做出那些决定的原因；思考你是否会做出同样的选择，还是会另辟蹊径。

