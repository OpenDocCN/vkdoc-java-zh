    ### The BaseActor Class


    The `BaseActor` class was introduced in Chapter [3](#A352797_2_En_3_Chapter.html)
    to support many of the features needed for game entities: creating and rendering
    animations, implementing physics-based movement, and detecting and preventing
    collisions. A few methods were introduced in later chapters as necessary (such
    as `wrapAroundWorld` in Chapter [4](#A352797_2_En_4_Chapter.html) and `isWithinDistance`
    in Chapter [5](#A352797_2_En_5_Chapter.html)). The `BaseActor` class also greatly
    simplifies retrieving lists of instances of a particular class with its `getList`
    method.


    #### Constructor


    - `BaseActor(float x, float y, Stage s)` Sets initial position of actor and adds
    to stage


    #### Methods


    - `void accelerateAtAngle(float angle)` Updates accelerate vector by angle and
    value stored in acceleration field

    - `void accelerateForward()` Updates accelerate vector by current rotation angle
    and value stored in acceleration field

    - `void act(float dt)` Processes all actions and related code for this object;
    automatically called by `act` method in `Stage` class

    - `void alignCamera()` Center camera on this object while keeping camera’s range
    of view (determined by screen size) completely within world bounds.

    - `void applyPhysics(float dt)` Adjust velocity vector based on acceleration,
    deceleration, and maximum speed, then adjust position based on velocity vector.

    - `void boundToWorld()` If an edge of an object moves past the world bounds, this
    adjusts its position to keep it completely on screen.

    - `void centerAtActor(BaseActor other)` Repositions this `BaseActor` so its center
    is aligned with center of other `BaseActor`

    - `void centerAtPosition(float x, float y)` Aligns center of actor at given position
    coordinates

    - `static int count(Stage, String className)` Returns number of instances of a
    given class (that extends `BaseActor`)

    - `void draw(Batch batch, float parentAlpha)` Draws current frame of animation;
    automatically called by `draw` method in `Stage` class

    - `Polygon getBoundaryPolygon()` Returns bounding polygon for this `BaseActor`,
    adjusted by `Actor`’s current position and rotation

    - `static ArrayList<BaseActor> getList(Stage stage, String className)` Retrieves
    a list of all instances of the object from the given stage with the given class
    name or whose class extends the class with the given name

    - `float getMotionAngle()` Gets the angle of motion (in degrees), calculated from
    the velocity vector

    - `float getSpeed()` Calculates the speed of movement (in pixels/second)

    - `static Rectangle getWorldBounds()` Gets world dimensions (width and height)

    - `boolean isAnimationFinished()` Checks if animation is complete: if play mode
    is normal (not looping) and elapsed time is greater than time corresponding to
    last frame

    - `boolean isMoving()` Determines if this object is moving (if speed is greater
    than zero)

    - `boolean isWithinDistance(float distance, BaseActor other)` Determines if this
    `BaseActor` is near other `BaseActor` (according to collision polygons)

    - `Animation<TextureRegion> loadAnimationFromFiles(String[] fileNames, float frameDuration,
    boolean loop)` Creates an animation from images stored in separate files.

    - `Animation<TextureRegion> loadAnimationFromSheet(String fileName, int rows,
    int cols, float frameDuration, boolean loop)` Creates an animation from a spritesheet:
    a rectangular grid of images stored in a single file.

    - `Animation<TextureRegion> loadTexture(String fileName)` Convenience method for
    creating a one-frame animation from a single texture.

    - `boolean overlaps(BaseActor other)` Determine if this `BaseActor` overlaps other
    `BaseActor` (according to collision polygons)

    - `Vector2 preventOverlap(BaseActor other)` Implement a “solid”-like behavior:
    when there is overlap, move this `BaseActor` away from other `BaseActor` along
    minimum translation vector until there is no overlap.

    - `void setAcceleration(float acc)` Set acceleration of this object.

    - `void setAnimation(Animation<TextureRegion> anim)` Sets the animation used when
    rendering this actor; also sets actor size.

    - `void setAnimationPaused(boolean pause)` Sets the pause state of the animation.

    - `void setBoundaryPolygon(int numSides)` Replaces default (rectangle) collision
    polygon with an n-sided polygon

    - `void setBoundaryRectangle()` Sets rectangular-shaped collision polygon

    - `void setDeceleration(float dec)` Sets deceleration of this object

    - `void setMaxSpeed(float ms)` Sets maximum speed of this object

    - `void setMotionAngle(float angle)` Sets the angle of motion (in degrees)

    - `void setOpacity(float opacity)` Sets the opacity of this actor

    - `void setSpeed(float speed)` Sets the speed of movement (in pixels/second) in
    current direction

    - `static void setWorldBounds(BaseActor ba)` Sets world dimensions for use by
    methods `alignCamera()` and `boundToWorld()`

    - `static void setWorldBounds(float width, float height)` Sets world dimensions
    for use by methods `alignCamera()` and `boundToWorld()`

    - `void wrapAroundWorld()` If this object moves completely past the world bounds,
    adjust its position to the opposite side of the world.


