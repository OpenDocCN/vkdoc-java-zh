- fmt: '# Game Project: Jumping Jack


    `Jumping Jack` is an action game where the character, Jack the Koala, jumps around
    a level collecting as many coins as possible; he must reach the goal flag before
    time runs out. Collecting timer objects gives the koala more time to explore.
    Some of the surfaces in the game are jump-through platforms, which behave like
    solid objects except that the koala can jump up through them from below and land
    on top, or fall down through the platforms from above. There are also springboard
    objects, which launch the koala high into the sky if he lands on them from above.
    Finally, there are lock blocks, which may come in many colors and are impassable
    until the koala collects the key of the same color.


    The player uses the left and right arrow keys to walk back and forth and the spacebar
    key to jump (when the koala is standing on a solid object). The koala will automatically
    jump up through a platform from below, but to fall down through a platform, the
    player must hold the down arrow key while pressing the key to jump. The user interface
    displays the number of coins collected in the upper-left corner of the screen
    and the amount of time remaining in the upper-right. When any keys are collected,
    an image of a key with the corresponding color will appear in the top-center area
    of the screen. If the player reaches the goal flag or runs out of time, a message
    will appear in the center of the screen stating “You Win!” or “Time Up—Game Over,”
    respectively.


    The game uses a vibrant, colorful, cartoonish art style. Most objects with which
    the player can interact involve either an image-based or a value-based animation
    to draw the player’s attention. Suggestions for additional special effects and
    audio will be discussed in the final section of this chapter to help establish
    the mood, provide player feedback, and enhance the interaction of game-world objects.


    The chapter assumes that you are familiar with the concepts from Chapter [10](#A352797_2_En_10_Chapter.html),
    “Tilemaps,” and that you have installed the Tiled map-editor software. Beginning
    this project requires the same steps as in previous projects: creating a new project,
    creating an `assets` folder and a `+libs` folder (the latter not being necessary
    if you have set up the `userlib` directory), copying the custom framework files
    you created in the first part of this book (`BaseGame.java`, `BaseScreen.java`,
    `BaseActor.java`) as well as the `TilemapActor.java` class you developed in Chapter
    [10](#A352797_2_En_10_Chapter.html), and copying the graphics and audio for this
    project into your `assets` folder. As described previously, a BlueJ project named
    `Framework` has been created for your convenience and will be used as a starting
    point. To begin the first project:


    *   Download the source code files for this chapter.

    *   Make a copy of the downloaded `Framework` folder (and its contents) and rename
    it to `Jumping Jack`.

    *   Copy all the contents of the downloaded `Jumping Jack` project assets folder
    into your newly created `Jumping Jack assets` folder (and delete the `+libs` folder
    if you are using the BlueJ `userlib` folder).

    *   Open the BlueJ project in your `Jumping Jack` folder.

    *   In the `CustomGame` class, change the name of the class to `JumpingJackGame`
    (BlueJ will then rename the source code file to `JumpingJackGame.java`).

    *   In the `Launcher` class, change the contents of the `main` method to the following:


    ```

    Game my Game = new JumpingJackGame ();

    LwjglApplication launcher = new LwjglApplication(

    myGame, "Jumping Jack", 800, 640 )

    ```


    ## Starting the Level


    To begin, start the Tiled map-editor software. Create a new map with a map size
    that has width of 50 tiles and height of 20 tiles, and a tile size with the width
    and height both set to 32 pixels. The resulting map will be 1600 pixels by 640
    pixels. Click the Save As... button and save the file to your `assets` directory
    with the filename `map.tmx`.


    Next, add an image layer and an object layer to your map and reorder the layers
    so that the tile layer appears in the middle of the list. In the Layers panel,
    select Image Layer 1, and in the Properties panel, set the image to `background.png`
    (whose dimensions match the size of the tilemap). Then, in the Tileset panel,
    add a new tileset using the image `platform-tileset.png` (shown on the left side
    of Figure [11-2](#A352797_2_En_11_Chapter.html#Fig2)), setting the tile size to
    32 by 32 and checking the box to embed the tileset in the map. Add another new
    tileset to the map, this time using the image `object-tileset.png` (shown on the
    right side of Figure [11-2](#A352797_2_En_11_Chapter.html#Fig2)), in the same
    way. Since the object tiles will be used to indicate where game-world objects
    should be spawned, you will need to specify the corresponding Java classes (which
    you will create later). In the Tileset panel, select `object-tileset` and click
    on the icon to edit the tileset. In the tab that appears, you will need to click
    on each tile (one at a time) and add a new custom property to each. The property
    should be called `name`; the corresponding values for the tiles (from left to
    right) are `Coin`, `Flag`, `Timer`, `Springboard`, `Platform`, `Key`, and `Lock`.
    In addition, for the key and lock object tiles, add a second custom property called
    `color` with the value `red`. (This default color can be overridden for specific
    instances later on in the tilemap editor).


    ![A352797_2_En_11_Fig2_HTML.jpg](A352797_2_En_11_Fig2_HTML.jpg)


    Figure 11-2. Tilesets for the tile layer (left) and object layer (right)


    Return to the tab featuring the tilemap. In the Layers panel, select Tile Layer
    1. In the Tileset panel, select `platform-tileset` and then press the B key to
    activate the Stamp Brush tool. Add tiles across the bottom row of the map, as
    well as some tiles representing solids to jump on, as well as some scenery. Note
    that the cloud graphic occupies two tiles, so you should add these tiles in adjacent
    pairs. One possible arrangement is shown in Figure [11-3](#A352797_2_En_11_Chapter.html#Fig3)
    (which only displays part of the map, for clarity).


