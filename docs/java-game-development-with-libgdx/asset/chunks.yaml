- fmt: "# The Ghost\n\nNext, you will create a ghost character that will chase the\
    \ hero around the maze. The key feature of the algorithm used to determine the\
    \ path the ghost will follow is that it is the shortest path between the room\
    \ occupied by the ghost (called `startRoom`) and the room occupied by the hero\
    \ (called `targetRoom`). In this algorithm, the order in which the rooms are visited\
    \ is very important: rooms closer to `startRoom` should be considered before rooms\
    \ that are farther away. All the rooms that are one square away from `startRoom`\
    \ will be checked first, followed by all the rooms that are two squares away from\
    \ `startRoom`, then all those that are three squares away, and so forth. An algorithm\
    \ that considers rooms in this order is called a breadth-first search algorithm,\
    \ in contrast to the approach used for initially generating the maze, which used\
    \ a depth-first algorithm.\n\nThere are two additional practical considerations\
    \ to take into account when searching for the path. First, since there are looping\
    \ paths in the maze, you will need to keep track of which rooms have already been\
    \ considered by the algorithm to avoid needlessly considering them additional\
    \ times. This will be tracked by a Boolean variable called `visited`. Second,\
    \ you will need to keep track of the sequence in which the rooms are considered\
    \ when searching for a path: each of the rooms that are n+1 squares away from\
    \ `startRoom` were arrived at after considering a room that was n squares away\
    \ from `startRoom`. This information will be stored in a `Room` variable named\
    \ `previousRoom`. This algorithm, in pseudocode, is as follows:\n\n- Identify\
    \ `startRoom` and `targetRoom`.\n- Set `currentRoom` equal to `startRoom`.\n-\
    \ Mark `currentRoom` as visited, set its previous room to `null`, and add `currentRoom`\
    \ to a list.\n- While the list is not empty, do the following:\n    - Set `currentRoom`\
    \ to the first element in the list and remove it from the list.\n    - For each\
    \ unvisited neighbor (called `nextRoom`) of `currentRoom`,\n        - set `nextRoom`’s\
    \ previous room to `currentRoom`;\n        - end the `algorithm` if `nextRoom`\
    \ is `targetRoom`; `and`\n        - if `nextRoom` is not `targetRoom`, then mark\
    \ `nextRoom` as visited and add `nextRoom` to the end of the list.\n\nOnce this\
    \ algorithm finishes, the path can be retrieved as follows: set `currentRoom`\
    \ to `targetRoom` and add it to a new list of rooms. Then, set `currentRoom` to\
    \ its previous room and add this to the front of the list. Repeat this process\
    \ until `currentRoom` has no previous room (`previousRoom` is `null`; this will\
    \ only be true for `startRoom`). At this point, the list contains a sequence of\
    \ rooms that form a shortest path from `startRoom` to `targetRoom`.\n\nAn example\
    \ of this algorithm in practice is illustrated in Figure [14-8](#A352797_2_En_14_Chapter.html#Fig8).\
    \ The upper-right corner room, occupied by the ghost, is `startRoom`, and the\
    \ room near the lower-left corner, occupied by the hero, is `targetRoom`. The\
    \ rooms are labeled with numbers indicating the order in which they are visited\
    \ by the algorithm and with arrows illustrating the previous room of each room.\
    \ In the illustration, rooms 1 and 2 are one room away from the ghost, rooms 3\
    \ and 4 are two rooms away, 5 and 6 are three rooms away, 7 and 8 are four rooms\
    \ away, 9, 10, 11, and 12 are five rooms away, and 13, 14, and `targetRoom` are\
    \ six rooms away. Once the target room is located, following the sequence of previous\
    \ rooms yields the path consisting of `startRoom`, 1, 3, 5, 7, 10, `targetRoom`—this\
    \ is one of the shortest possible paths to the hero.\n\n![A352797_2_En_14_Fig8_HTML.jpg](A352797_2_En_14_Fig8_HTML.jpg)\n\
    \nFigure 14-8. Order in which rooms are visited to find the shortest path from\
    \ the ghost to the hero\n\nTo implement this algorithm, each room needs to keep\
    \ track of whether it has been visited in the algorithm and what the previously\
    \ visited room was. To this end, in the `Room` class, add the following variables:\n\
    \n```\nprivate boolean visited;\nprivate Room previousRoom;\n```\n\nInitialize\
    \ `visited` to false in the `constructor` method:\n\n```\nvisited = false;\n```\n\
    \nNext, you need some methods to get and set these new variables, as well as to\
    \ retrieve all the adjacent neighbors of a room that have not yet been visited.\
    \ This is accomplished with the following code, which should also be added to\
    \ the `Room` class:\n\n```\npublic void setVisited(boolean b)\n{  visited = b;\
    \  }\npublic boolean isVisited()\n{  return visited;  }\npublic void setPreviousRoom(Room\
    \ r)\n{  previousRoom = r;  }\npublic Room getPreviousRoom()\n{  return previousRoom;\
    \  }\n// Used in pathfinding: locate accessible neighbors that have not yet been\
    \ visited\npublic ArrayList unvisitedPathList()\n{\nArrayList list = new ArrayList();\n\
    for (int direction : directionArray)\n{\nif ( hasNeighbor(direction) && !hasWall(direction)\
    \ &&\n!getNeighbor(direction).isVisited() )\nlist.add( getNeighbor(direction)\
    \ );\n}\nreturn list;\n}\n```\n\nIt is helpful to have a method that identifies\
    \ the rooms in which the ghost and hero are located and resets the `visited` and\
    \ `previousRoom` variables of each room, which is necessary before searching for\
    \ a new path. In the `Maze` class, add the following methods to perform these\
    \ tasks:\n\n```\npublic Room getRoom(BaseActor actor)\n{\nint gridX = (int)Math.round(actor.getX()\
    \ / roomWidth);\nint gridY = (int)Math.round(actor.getY() / roomHeight);\nreturn\
    \ getRoom(gridX, gridY);\n}\npublic void resetRooms()\n{\nfor (int gridY = 0;\
    \ gridY < roomCountY; gridY++)\n{\nfor (int gridX = 0; gridX < roomCountX; gridX++)\n\
    {\nroomGrid[gridX][gridY].setVisited( false );\nroomGrid[gridX][gridY].setPreviousRoom(\
    \ null );\n}\n}\n}\n```\n\nNext, you will create the `Ghost` class, which includes\
    \ a method named `findPath` that implements the breadth-first search algorithm\
    \ previously described. The method adds a sequence of actions to the actor to\
    \ move it along the first few rooms of the path. The ghost does not follow the\
    \ path all the way to the end, because by then the hero will have moved on to\
    \ a different location. Instead, each time the ghost completes its current set\
    \ of movement actions, the path to the hero is recalculated, and a new set of\
    \ movement actions along this path is added to the ghost. Create a new class called\
    \ `Ghost` with code as follows:\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
    import com.badlogic.gdx.scenes.scene2d.Action;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
    import java.util.ArrayList;\npublic class Ghost extends BaseActor\n{\npublic float\
    \ speed = 60; // pixels per second\npublic Ghost(float x, float y, Stage s)\n\
    {\nsuper(x,y,s);\nloadAnimationFromSheet(\"assets/ghost.png\", 1,3, 0.2f, true);\n\
    setOpacity(0.8f);\n}\npublic void findPath(Room startRoom, Room targetRoom)\n\
    {\nRoom currentRoom = startRoom;\nArrayList roomList = new ArrayList();\ncurrentRoom.setPreviousRoom(\
    \ null );\ncurrentRoom.setVisited( true );\nroomList.add(currentRoom);\nwhile\
    \ (roomList.size() > 0)\n{\ncurrentRoom = roomList.remove(0);\nfor (Room nextRoom\
    \ : currentRoom.unvisitedPathList())\n{\nnextRoom.setPreviousRoom( currentRoom\
    \ );\nif (nextRoom == targetRoom)\n{\n// target found!\nroomList.clear();\nbreak;\n\
    }\nelse\n{\nnextRoom.setVisited( true );\nroomList.add(nextRoom);\n}\n}\n}\n//\
    \ create list of rooms corresponding to shortest path\nArrayList pathRoomList\
    \ = new ArrayList();\ncurrentRoom = targetRoom;\nwhile (currentRoom != null)\n\
    {\n// add current room to beginning of list\npathRoomList.add( 0, currentRoom\
    \ );\ncurrentRoom = currentRoom.getPreviousRoom();\n}\n// only move along a few\
    \ steps of the path;\n//   path will be recalculated when these actions are complete.\n\
    int maxStepCount = 2;\n// to remove the pause between steps, start loop index\
    \ at 1\n//   but make ghost speed slower to compensate\nfor (int i = 0; i < pathRoomList.size();\
    \ i++)\n{\nif (i == maxStepCount)\nbreak;\nRoom nextRoom = pathRoomList.get(i);\n\
    Action move = Actions.moveTo( nextRoom.getX(), nextRoom.getY(), 64/speed );\n\
    addAction( move );\n}\n}\n}\n```"
