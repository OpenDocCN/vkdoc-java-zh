- fmt: 'In addition, next to the `High` and `Low` values are small buttons labeled
    with `>` or `<`; these can be used to toggle between one or two values appearing
    in the corresponding row. When two values are displayed, they represent a range
    of values from which the `High` or `Low` values will be randomly selected for
    each particle. This can be used to great effect, as you will see later.


    Finally, it is useful to understand how to set the parameters for the `Tint` property.
    If desired, the color of a particle can change over time; the progression of the
    color is displayed from the left to the right in the topmost rectangle. For example,
    Figure [15-4](#A352797_2_En_15_Chapter.html#Fig4) represents a particle that will
    begin tinted red, shift to blue, and finally end tinted green. As with the parameter-change
    graphs discussed previously, additional points (represented by triangles) can
    be added by clicking within the rectangle. Triangles can be selected by clicking
    them, and their colors can be adjusted by using the sliders underneath, which
    control the hue, saturation, and brightness of the color. The triangles can be
    moved by clicking and dragging, and they can be deleted by double-clicking.


    ![A352797_2_En_15_Fig4_HTML.jpg](A352797_2_En_15_Fig4_HTML.jpg)


    Figure 15-4. The tint parameter graph


    With this knowledge of the user interface of the Particle Editor, you’ll work
    through examples that show how to create particle-based versions of the effects
    from the game Space Rocks. Creating lots of effects, more than anything, is what
    will ultimately give you a feel for the role each parameter plays in crafting
    a particle-based effect.


    You need a location to save your final effects, so at this time, create a copy
    of your `Space Rocks` project from Chapter [4](#A352797_2_En_4_Chapter.html) and
    rename the copy to `Space Rocks Particles`. You will store the effect files created
    with the LibGDX Particle Editor in the `assets` folder of this directory. Also,
    download the source files for this chapter, and from the `assets` folder of the
    downloaded `Space Rocks Particles` project, copy the image file `particle.png`
    into the `assets` folder of your `Space Rocks Particles` project.


    ### Rocket-Thruster Effect


    Your first goal is to create a rocket-thruster effect, pictured in Figure [15-5](#A352797_2_En_15_Chapter.html#Fig5).


    ![A352797_2_En_15_Fig5_HTML.jpg](A352797_2_En_15_Fig5_HTML.jpg)


    Figure 15-5. The rocket-thruster particle effect


    After starting the Particle Editor program, in the Effect Emitters panel in the
    lower left, click the `New` button and rename the newly created list entry `thruster`
    (double-click its name to rename it). Click the list item named `Untitled` (which
    corresponds to the default fire-like example) and click the `Delete` button to
    remove it.


    In the set of options at the bottom of the Emitter Properties panel, deselect
    the “Additive” checkbox and select the “Continuous” checkbox. You should now see
    a single red dot in the middle of the preview panel.


    First, you will adjust the number of particles that will be active at any given
    moment. Change the `Count` property’s `Max` value to `100`. To achieve this amount,
    you also must change the `Emission` property’s `High` value to `200`. (Changing
    this value to `100` would be insufficient, as each particle lasts for only `0.5`
    seconds, since `500` milliseconds is the default value for the `Life` property.
    An emission rate of `100` would result in only `50` active particles at any given
    time.)


    Next, click the `Active` buttons next to the `Velocity` and `Angle` properties.
    For `Velocity`, click the `>` button next to `High` and enter the values `300`
    and `400`. For `Angle`, again click the `>` button next to `High` and enter the
    values `70` and `110`. You should now see red particles spraying upward in a wobbly,
    cone-shaped pattern.


    Now, change the `Tint` parameter graph so that the tint color changes from red
    at the start to orange in the middle and yellow at the end. After completing this
    step, the particles in the preview panel should appear red at the base of the
    emitter and gradually change colors until they become yellow at the top.


    Finally, the particles should shrink and fade out of existence at the end of their
    lifetime. To accomplish this, modify the parameter-change graphs for both `Size`
    and `Transparency` so that they both resemble the Sudden Decrease graph from Figure
    [15-3](#A352797_2_En_15_Chapter.html#Fig3).


    When this step is finished, click the `Save` button and save your file to your
    project `assets` directory using the filename `thruster.pfx`. Although the particle-effect
    data is stored in a text file, you will use the extension `pfx` as a mnemonic
    to indicate the type of data in the file. In addition, you will need to copy the
    image file `particle.png` from the `Particle Editor` directory to your local project’s
    `assets` directory as well, if you haven’t previously, for the effect to load
    correctly in LibGDX.'
