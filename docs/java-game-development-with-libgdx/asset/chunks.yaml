- fmt: '### Labels


    The next goal is to create a label to display the number of starfish left in the
    game, as shown in Figure [5-6](#A352797_2_En_5_Chapter.html#Fig6). With the `BitmapFont`
    and `LabelStyle` objects you created in the previous section, this is a straightforward
    process.


    ![A352797_2_En_5_Fig6_HTML.jpg](A352797_2_En_5_Fig6_HTML.jpg)


    Figure 5-6. Label displaying the number of starfish left to be collected


    First, in the `LevelScreen` class, add the following `import` statements:


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    ```


    Next, add the following variable declaration to the class:


    ```

    private Label starfishLabel;

    ```


    To initialize the label, add the following code to the `initialize` method, which
    will tint the label text a light blue color (in keeping with the aquatic theme),
    and position it near the upper-left corner of the user interface:


    ```

    starfishLabel = new Label("Starfish Left:", BaseGame.labelStyle);

    starfishLabel.setColor( Color.CYAN );

    starfishLabel.setPosition( 20, 520 );

    uiStage.addActor(starfishLabel);

    ```


    Finally, in the `update` method, add the following code, which will set the label
    text to display the actual number of starfish left:


    ```

    starfishLabel.setText("Starfish Left: " + BaseActor.count(mainStage, "Starfish"));

    ```


    That’s all there is to it! If you want to change the size of the text, you can
    either change the font size when configuring the `FreeTypeFontParameter` object
    in the `BaseGame` class or use the `Label` class method `setFontScale`, which
    applies a scaling factor to the text.


    ## Buttons


    A button is one of the most basic user-interface controls that gets input from
    a user. In this section, you will create two different types of buttons: one that
    only consists of an image to convey its functionality, and one that contains text
    that explains what it does. The most complex step in adding buttons to a project
    is specifying the code that will run when the button is clicked, which will be
    discussed before creating the buttons themselves.


    ### Functional Interfaces And Lambda Expressions


    There are many situations in which it would be convenient to store a method in
    a variable. One common situation is to store the code that should activate when
    a button is clicked within the button object itself. However, in the Java programming
    language, methods cannot be stored in variables. As a substitute for this sort
    of functionality, developers will often create a functional interface: an interface
    that consists of a single method. When one needs to store a method, one implements
    the interface and specifies the function as required.


    For example, consider a hypothetical `Button` class that requires the functionality
    just described. In this case, one could create the following interface:


    ```

    public interface Function

    {

    public void run();

    }

    ```


    Then, the `Button` class could be designed as follows:


    ```

    public class Button

    {

    private Function clickFunction;

    public void setFunction(Function f)

    {

    clickFunction = f;

    }

    public void click()

    {

    clickFunction.run();

    }

    }

    ```


    In theory, setting up the function could require quite a bit of code. One could
    create an entirely new class that implements the interface, then create an instance
    of the class and pass it as an argument to the `Button` class `setFunction` method.
    For example, to configure a button to exit a program, you would create the following
    class:


    ```

    public class QuitFunction implements Function

    {

    public void run()

    {

    System.exit(0);

    }

    }

    ```


    Then, in your application, you would write:


    ```

    Button myButton = new Button();

    myButton.setFunction( new QuitFunction() );

    ```


    Incidentally, the instance of the `QuitFunction` class that is created is called
    an anonymous instance, since it is not assigned to a variable (which is fine,
    since it is stored by the `Button` class and would not be needed in the application
    code that follows).


    An alternative to creating a separate class is to write the code for the `QuitFunction`
    class within the `application` class, since that is the only place it needs to
    be used. When arranging the code in this way, `QuitFunction` would be referred
    to as an inner class (basically, a class defined within another class). To take
    this idea one step further, since you only need to create a single instance of
    the class, you can combine these ideas and create an anonymous inner class by
    writing the class definition as the argument passed to the method, as follows:


    ```

    myButton.setFunction(

    new Function()

    {

    public void run()

    {

    System.exit(0);

    }

    });

    ```


    However, this is still a significant amount of code to write in order to effectively
    pass a method. For this reason, Java 8 introduced a new language feature called
    lambda expressions, which is condensed syntax for creating anonymous inner classes
    for functional interfaces. The arguments for the method are placed within a set
    of parentheses, which are then followed by a dash and greater-than symbol (`->`,
    which is meant to resemble an arrow), followed by a set of braces containing the
    code to be executed. For example, given the following interface:


    ```

    public interface MathFunction

    {

    public double calculate(double x);

    }

    ```


    Consider the lambda expression:


    ```

    (double x) -> { return x*x; }

    ```


    The lambda expression is equivalent to the following anonymous inner class:


    ```

    new MathFunction

    {

    public double calculate(double x)

    {

    return x*x;

    }

    }

    ```


    Note that, in particular, the lambda expression does not require you to specify
    the name of the interface or the function it contains (both of these are inferred
    from the context).


    Returning to the previous button-based example, the quit functionality can be
    added to the button object with the following concise lambda expression:


    ```

    myButton.setFunction(

    () -> { System.exit(0); }

    );

    ```


    Note that the parentheses are empty, as this method requires no parameters.


    As you can see, using lambda expressions when possible will save a great deal
    of time when writing code.


    Clicking a button is an example of a discrete event, and because of the functionality
    you added to the framework in the previous chapter, your program is prepared to
    respond to click events. Since the `Stage` class implements the `InputProcessor`
    interface, it will process mouse events (such as clicks). If the stage contains
    an actor at the position where the event occurs, and if the actor contains an
    `EventListener` object, the method contained in `EventListener` will be run. Since
    `EventListener` is a functional interface, you can (and will) use lambda expressions
    to specify the functionality in what follows.


    With this preliminary material covered, you are now ready to create a button and
    add functionality to it.'
