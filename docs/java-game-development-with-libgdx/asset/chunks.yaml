    Finally, there is the `update` method to consider, which processes lots of potential
    player input. The player is controlled using the keyboard keys W/A/S/D, which
    correspond to moving forward/left/backward/right, a standard configuration in
    many computer games. To this standard, you also add the R and F keys for moving
    up and down (which we think of as the Rise and Fall directions). You also use
    the Q and E keys to turn left and right (which also seems memorable because these
    keys are positioned above the keys for moving left and right). The camera can
    be controlled in the same way, using the same keys, when the Shift key is being
    pressed simultaneously. The camera can also be tilted upward and downward using
    the T and G keys (which you can remember with the mnemonic words Top and Ground).
    The following is the code that accomplishes all of these tasks, which, as mentioned
    previously, should be included in the `update` method:


    ```java

    float speed = 3.0f;

    float rotateSpeed = 45.0f;

    if ( !(Gdx.input.isKeyPressed(Keys.SHIFT_LEFT)

    || Gdx.input.isKeyPressed(Keys.SHIFT_RIGHT)) )

    {

    if ( Gdx.input.isKeyPressed(Keys.W) )

    player.moveForward( speed * dt );

    if ( Gdx.input.isKeyPressed(Keys.S) )

    player.moveForward( -speed * dt );

    if ( Gdx.input.isKeyPressed(Keys.A) )

    player.moveRight( -speed * dt );

    if ( Gdx.input.isKeyPressed(Keys.D) )

    player.moveRight( speed * dt );

    if ( Gdx.input.isKeyPressed(Keys.Q) )

    player.turn( -rotateSpeed * dt );

    if ( Gdx.input.isKeyPressed(Keys.E) )

    player.turn( rotateSpeed * dt );

    if ( Gdx.input.isKeyPressed(Keys.R) )

    player.moveUp( speed * dt );

    if ( Gdx.input.isKeyPressed(Keys.F) )

    player.moveUp( -speed * dt );

    }

    if ( Gdx.input.isKeyPressed(Keys.SHIFT_LEFT)

    || Gdx.input.isKeyPressed(Keys.SHIFT_RIGHT) )

    {

    if (Gdx.input.isKeyPressed(Keys.W))

    mainStage3D.moveCameraForward( speed * dt );

    if (Gdx.input.isKeyPressed(Keys.S))

    mainStage3D.moveCameraForward( -speed * dt );

    if (Gdx.input.isKeyPressed(Keys.A))

    mainStage3D.moveCameraRight( -speed * dt );

    if (Gdx.input.isKeyPressed(Keys.D))

    mainStage3D.moveCameraRight( speed * dt );

    if (Gdx.input.isKeyPressed(Keys.R))

    mainStage3D.moveCameraUp( speed * dt );

    if (Gdx.input.isKeyPressed(Keys.F))

    mainStage3D.moveCameraUp( -speed * dt );

    if (Gdx.input.isKeyPressed(Keys.Q))

    mainStage3D.turnCamera(-rotateSpeed * dt);

    if (Gdx.input.isKeyPressed(Keys.E))

    mainStage3D.turnCamera(rotateSpeed * dt);

    if (Gdx.input.isKeyPressed(Keys.T))

    mainStage3D.tiltCamera(rotateSpeed * dt);

    if (Gdx.input.isKeyPressed(Keys.G))

    mainStage3D.tiltCamera(-rotateSpeed * dt);

    }

    ```


