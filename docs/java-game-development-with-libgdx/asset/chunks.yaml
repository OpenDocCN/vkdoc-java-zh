    ### 基于图像的按钮


    首先，你将创建一个基于图像的按钮，用于重新开始关卡，如图 5-7 所示。


    ![A352797_2_En_5_Fig7_HTML.jpg](img/A352797_2_En_5_Fig7_HTML.jpg)


    图 5-7.


    海星收集器，右上角添加了关卡重启按钮


    类似于标签需要一个指定位图字体的 `LabelStyle` 对象，按钮需要一个指定特定类型图像的 `ButtonStyle` 对象。首先，在 `LevelScreen`
    类中添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Button;

    import com.badlogic.gdx.scenes.scene2d.ui.Button.ButtonStyle;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.scenes.scene2d.utils.TextureRegionDrawable;

    import com.badlogic.gdx.scenes.scene2d.Event;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    import com.badlogic.gdx.scenes.scene2d.InputEvent.Type;

    ```


    接下来，你需要创建一个 `ButtonStyle` 对象，它有一个名为 `up` 的字段，用于存储按钮的默认图像。（还可以存储鼠标悬停在按钮上或按下按钮时对应的其他图像；更多详情请参考
    LibGDX 文档。）LibGDX 要求用户界面元素中使用的图像实现 `Drawable` 接口；标准的图像相关类（如 `TextureRegion`）也有对应的实现了该接口的类。以下代码创建了
    `ButtonStyle` 对象，创建并添加了一个 `TextureRegionDrawable` 图像，并使用它创建了一个按钮，按钮颜色为浅蓝色，并定位在右上角。将此代码添加到
    `LevelScreen` 类的 `initialize` 方法中：


    ```

    ButtonStyle buttonStyle = new ButtonStyle();

    Texture buttonTex = new Texture( Gdx.files.internal("assets/undo.png") );

    TextureRegion buttonRegion =  new TextureRegion(buttonTex);

    buttonStyle.up = new TextureRegionDrawable( buttonRegion );

    Button restartButton = new Button( buttonStyle );

    restartButton.setColor( Color.CYAN );

    restartButton.setPosition(720,520);

    uiStage.addActor(restartButton);

    ```


    最后，你需要为这个按钮添加功能。你将使用本节开头描述的 lambda 表达式来实现。这段代码的第一部分包含一个重要条件：你需要确保事件是一个 `InputEvent`，然后将
    `Event` 对象转换为 `InputEvent` 对象，并检查事件的 `Type`，以确保它是一个鼠标按钮点击事件（而不是鼠标移动事件）。LibGDX
    以相同的方式处理鼠标和触摸屏事件，因此鼠标点击事件被称为触摸按下事件。如果这两个条件中的任何一个不成立，该方法将立即退出并返回 false。考虑到这一点，将以下代码添加到
    `create` 方法中，紧跟在之前输入的代码之后：


    ```

    restartButton.addListener(

    (Event e) ->

    {

    if ( !(e instanceof InputEvent) ||

    !((InputEvent)e).getType().equals(Type.touchDown) )

    return false;

    StarfishGame.setActiveScreen( new LevelScreen() );

    return false;

    }

    );

    ```


    此时，你应该测试你的项目，以验证按钮是否按预期工作。


    ### 基于文本的按钮


    接下来，你将在菜单屏幕上添加一些基于文本的按钮，让用户能够开始或退出游戏，如图 5-8 所示。


    ![A352797_2_En_5_Fig8_HTML.jpg](img/A352797_2_En_5_Fig8_HTML.jpg)


    图 5-8.


    添加了按钮的海星收集器菜单屏幕


    与创建标签和基于图像的按钮一样，创建基于文本的按钮的第一步是创建一个关联的样式对象，用于存储视觉细节。在这种情况下，你需要创建一个 `TextButtonStyle`
    对象，在其中指定位图字体、字体颜色和背景图像。


    基于图像的按钮的背景图像是一个 `TextureRegionDrawable` 对象。然而，在基于文本的按钮中，一个潜在的复杂情况是当按钮的文本大于提供的图像时，文本会溢出按钮的边界。为了避免这个问题，你可以使用一种特殊类型的图像，称为九宫格图像，这是一种定义了九个子区域的图像。在缩放九宫格图像时，图像会沿着其边缘方向在边界区域进行拉伸。`NinePatch`
    对象可以使用一个 `Texture` 后跟四个整数来初始化，如下所示：


    ```

    NinePatch np = new NinePatch( texture, left, right, top, bottom );

    ```


    这些整数表示从图像相应边缘测量的像素距离。它们用于将纹理划分为九个区域，如图 5-9 所示。


    ![A352797_2_En_5_Fig9_HTML.jpg](img/A352797_2_En_5_Fig9_HTML.jpg)


    图 5-9.


    将纹理划分为九个区域


    当转换为 `NinePatch` 对象时，图像的角部（图 5-9 中标记为 `a` 的区域）永远不会被缩放；`b` 区域可以水平缩放，`c` 区域可以垂直缩放，而中心区域
    `d` 可以双向缩放。这对于类似按钮的图像特别有用，这样图像的边缘就不会出现变形。图 5-10 展示了一个小图像分别使用标准方法和九宫格方法进行缩放的效果。特别注意，使用标准缩放时，放大图像的边框看起来更粗，而九宫格缩放则更接近地保留了原始边框的外观，因为它只沿着边缘方向缩放边界区域。


    ![A352797_2_En_5_Fig10_HTML.jpg](img/A352797_2_En_5_Fig10_HTML.jpg)


    图 5-10.


