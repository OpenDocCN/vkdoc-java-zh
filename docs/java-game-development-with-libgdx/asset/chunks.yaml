  trans: "\n有时，你的程序会包含运行时错误，通常由诸如输入错误的文件名（编译时无法检测到）等问题引起。在这种情况下，修复错误并重新运行程序后，你可能会遇到另一个错误，其中包含消息“No\
    \ OpenGL context found in the current thread.”。这是由于应用程序之前意外关闭造成的，通常可以通过在 BlueJ\
    \ 中重置 Java 虚拟机来解决，这可以通过“工具”菜单或快捷键组合（在 Windows 上是 Ctrl-Shift-R）完成。\n\n## 使用 LibGDX\
    \ 的优势\n\n除了能够编译游戏使其在多个平台上运行之外，使用 LibGDX 游戏开发框架还有许多其他优势。LibGDX 使得完成以下任务变得简单：\n\n\
    *   渲染 2D 图形、动画、基于位图的字体和粒子效果\n*   流式播放音乐和播放音效\n*   处理来自键盘、鼠标、触摸屏、加速度计或游戏手柄的输入\n\
    *   使用场景图和完全可换肤的 UI 控件库组织用户界面\n*   集成第三方插件，例如 Box2D 物理引擎（`box2d.org`）、Tiled 地图编辑器文件格式（`mapeditor.org`）和\
    \ Spine 2D 动画软件（`esotericsoftware.com`）\n*   使用材质和光照效果渲染 3D 图形，并从常见文件格式（如 OBJ\
    \ 和 FBX）加载 3D 模型\n\nLibGDX 的完整功能列表可在以下网站找到：[`http://libgdx.badlogicgames.com/features.html`](http://libgdx.badlogicgames.com/features.html)。\n\
    \n## 总结\n\n在本章中，你设置了 BlueJ（一个用于 Java 编程的集成开发环境），并配置 BlueJ 以使用 LibGDX 游戏开发框架。然后，你使用\
    \ LibGDX 创建了第一个应用程序：一个“Hello, World!”程序，该程序在一个窗口中显示世界图像。这个程序涉及扩展 LibGDX 的 `Game`\
    \ 类，并创建一个在桌面上运行程序的 `driver` 类。在此过程中，你了解到了该程序中涉及的其他一些类。最后，你了解到了 LibGDX 库的一些其他功能，其中许多将在后续章节中详细讨论。\n\
    \n脚注 1\n\n这些文件的更新版本可以从网站 [`https://libgdx.badlogicgames.com/nightlies/dist/`](https://libgdx.badlogicgames.com/nightlies/dist/)\
    \ 获取。这些是 LibGDX 库的每日构建版本，包含最新的代码，但它们仍在开发中，因此可能包含一些错误或故障。\n\n  2\n\n由于在此示例中纹理和坐标都没有变化，因此\
    \ `render` 方法被重复调用的事实与此无关。但是，如果你定期更改图像，则可以生成动画；如果你逐渐更改坐标，则可以模拟运动。你将在下一章中了解如何实现这两种变化。\n\
    \n# 2. LibGDX 框架\n\n本章将介绍 LibGDX 库的许多主要功能。它将说明如何在创建名为“海星收集者”的游戏过程中使用它们，在该游戏中，你帮助玩家角色（一只海龟）在海底游动寻找海星。该游戏运行时的截图如图\
    \ 2-1 所示。首先，你将创建一个基本的、功能性的游戏。在关于面向对象设计原则的激励性讨论之后，你将使用一些 LibGDX 类重写此项目的部分内容，以改进代码的组织结构。后续章节将重新审视此示例，并将其作为引入新的游戏设计原则和\
    \ LibGDX 功能的基础。\n\n![A352797_2_En_2_Fig1_HTML.jpg](img/A352797_2_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1.\n\n游戏“海星收集者”的主屏幕\n\n## 视频游戏的生命周期\n\n在进入游戏开发的编程方面之前，理解游戏程序的整体结构非常重要：游戏程序经历的主要阶段以及游戏程序在每个阶段必须执行的任务。这些阶段如下：\n\
    \n*   **启动**：在此阶段，加载所需的任何文件（例如图像或声音），创建游戏对象，并初始化值。\n*   **游戏循环**：在游戏运行时持续重复的阶段，由以下三个子阶段组成：\n\
    \    *   **处理输入**：程序检查用户是否执行了任何向计算机发送数据的操作：按下键盘按键、移动鼠标或点击鼠标按钮、触摸或滑动触摸屏、或按下游戏手柄上的摇杆或按钮。\n\
    \    *   **更新**：执行涉及游戏世界状态及其内部实体的任务。这可能包括根据用户输入或物理模拟更改实体的位置、执行碰撞检测以确定两个实体何时相互接触以及响应执行什么操作、或为非玩家角色选择动作。\n\
    \    *   **渲染**：在屏幕上绘制所有图形，例如背景图像、游戏世界实体和用户界面（通常覆盖在游戏世界之上）。\n*   **关闭**：当玩家向计算机提供输入表明他已完成使用软件时（例如，通过点击“退出”按钮），此阶段开始，可能涉及从内存中移除图像或数据、保存玩家数据或游戏状态、指示计算机停止监控硬件设备的用户输入，以及关闭游戏创建的任何窗口。\n\
    \n图 2-2 中的流程图说明了这些阶段发生的顺序。\n\n![A352797_2_En_2_Fig2_HTML.jpg](img/A352797_2_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2.\n\n游戏程序的阶段\n\n一些游戏开发者可能会在游戏循环中包含额外的阶段，例如：\n\n*   **休眠阶段**：暂停程序执行一段给定的时间。许多游戏开发者旨在编写能够以每秒\
    \ 60 帧（FPS）运行的程序，这意味着游戏循环每 16.67 毫秒运行一次。¹ 如果游戏循环可以比这运行得更快，则可以指示程序在 16.67 毫秒间隔内剩余的任何时间内暂停，从而为可能在后台运行的任何其他应用程序释放\
    \ CPU。LibGDX 会自动为我们处理这个问题，因此我们无需担心在此处包含它。\n*   **音频阶段**：在此阶段流式播放背景音乐或播放音效。在本书中，我们将播放音频视为更新阶段的一部分，并将在后续章节中讨论如何实现这一点。\n\
    \n这些阶段中的大多数由 LibGDX 中的相应方法处理。例如，启动阶段由名为 `create` 的方法执行，更新和渲染阶段都由 `render` 方法处理，²\
    \ 任何关闭操作都由名为 `dispose` 的方法执行。\n\n事实上，当你的驱动类创建任何类型的应用程序（例如 `LwjglApplication`）时，只有当提供给该应用程序的对象包含一组特定的方法（包括\
    \ `create`、`render` 和 `dispose`）时，该应用程序才能正常工作；这是一个必要的约定，以便应用程序知道在游戏程序生命周期的每个阶段该做什么。你可以通过使用接口在\
    \ Java 程序中强制执行此类要求。\n\n接口\n"
- fmt: '非正式地说，你可以将接口视为一种契约，其他类可以承诺履行该契约。作为一个简单的例子，假设你编写了一个`Player`类，其中包含一个名为`talkTo`的方法，用于与环境中的对象进行交互。`talkTo`方法接受一个名为`creature`的单一输入，在后续的代码中，你会有：


    ```

    creature.speak();

    ```


    为了使`talkTo`方法正常工作，无论`creature`是哪个类的实例，它都必须有一个名为`speak`的方法。也许有时`creature`是`Person`类的实例，而其他时候`creature`是`Monster`类的实例。通常，你希望`talkTo`方法尽可能具有包容性——任何拥有`speak`方法的对象都应被允许作为输入。你可以通过使用接口来指定这种行为。


    首先，你按如下方式创建一个接口：


    ```

    public interface Speaker

    {

    public void speak();

    }

    ```


    乍一看，接口看起来类似于类，只是方法仅被声明；它们不包含任何实际代码。所需要的只是方法的签名：名称、输出类型、输入类型（如果有）以及任何修饰符，例如`public`。这些信息后面跟着一个分号，而不是我们熟悉的包含代码的花括号。实现此接口的类将为其版本的`speak`函数提供代码。需要强调的是，由于`Speaker`不是一个类，你不能创建`Speaker`对象的实例；相反，你编写其他类，这些类包含`Speaker`接口中指定的方法。


    一个类通过在类名后包含关键字`implements`，后跟接口名称，来表示它满足接口的要求（即它包含所有指定的字段和方法）。任何实现`Speaker`接口的类都必须为其版本的`speak`函数提供代码。下面通过一个名为`Person`的类和一个名为`Monster`的类进行演示：


    ```

    public class Person implements Speaker

    {

    // additional code above

    public void speak()

    {   System.out.println( "Hello." );  }

    // additional code below

    }

    public class Monster implements Speaker

    {

    // additional code above

    public void speak()

    {  System.out.println("Grrr!");  }

    // additional code below

    }

    ```


    始终记住：在实现接口时，你必须为接口中声明的所有内容编写方法；否则，会出现编译时错误。你甚至可以编写一个在花括号之间不包含任何代码的方法，如下所示（针对一个代表特别沉默的家具的类）。当你只需要使用接口的部分功能时，这可能会很方便。


    ```

    public class Chair implements Speaker

    {

    // additional code above

    public void speak()  { }

    // additional code below

    }

    ```


    最后，你编写`talkTo`方法，使其接受一个`Speaker`作为输入：


    ```

    public class Player

    {

    // additional code above

    public void talkTo(Speaker creature)

    {

    creature.speak();

    }

    // additional code below

    }

    ```


    任何实现了`Speaker`接口的类都可以用作`Player`对象的`talkTo`方法的输入。例如，我们展示一些代码，这些代码创建了每个类的实例，然后在随附的注释中描述结果：


    ```

    Player dan = new Player();

    Person chris = new Person();

    Monster grez = new Monster();

    Chair footstool = new Chair();

    dan.talkTo(chris); // prints "Hello."

    dan.talkTo(grez); // prints "Grrr!"

    dan.talkTo(footstool); // does not print anything

    ```


    LibGDX 中的应用程序要求用户创建的类实现`ApplicationListener`接口，以便它能够处理游戏程序生命周期的所有阶段。然而，你可能还记得，在[第1章](#A352797_2_En_1_Chapter.html)的示例中，`HelloWorldImage`类并没有实现`ApplicationListener`类；它只继承了`Game`类。为什么在编译该类时没有导致错误？如果你“深入探究”（在计算机编程的语境中，这通常意味着检查源代码[³](#A352797_2_En_2_Chapter.html#Fn3)），你会注意到`Game`类本身实现了`ApplicationListener`类，并包含了这些函数的“空”版本；在定义每个函数体的花括号之间没有代码。这使你能够只编写在继承`Game`类的类中需要使用的接口方法的变体，这些变体将覆盖`Game`类中的版本；任何你没有编写的接口方法将默认使用`Game`类中的空版本。（实际上，`ApplicationListener`接口总共需要六个方法：`create`、`render`、`resize`、`pause`、`resume`和`dispose`；在我们的示例中，你只编写了其中两个。）'
  raw: 'Informally, you can think of an interface as a kind of contract that other
    classes can promise to fulfill. As a simple example, let’s say that you write
    a `Player` class, which contains a method named `talkTo` that is used to interact
    with objects in your environment. The `talkTo` method takes a single input, called
    `creature`, and in the code that follows, you have


    ```

    creature.speak();

    ```


    For the `talkTo` method to work correctly, whatever type of object that `creature`
    is an instance of, it must have a method named `speak`. Maybe sometimes `creature`
    is an instance of a `Person` class, while at other times `creature` is an instance
    of a `Monster` class. In general, you would like the `talkTo` method to be as
    inclusive as possible—any object with a `speak` method should be permitted as
    input. You can specify this behavior by using interfaces.


    First, you create an interface as follows:


    ```

    public interface Speaker

    {

    public void speak();

    }

    ```


    At first glance, an interface appears similar to a class, except that the methods
    are only declared; they do not contain any actual code. All that is required is
    the signature of the method: the name, the output type, the input types (if any),
    and any modifiers, such as `public`. This information is followed by a semicolon
    instead of the familiar set of braces that encompass code. The classes that implement
    this interface will provide the code for their version of the `speak` function.
    It is important to emphasize that since `Speaker` is not a class, you cannot create
    an instance of a `Speaker` object; instead, you write other classes that include
    the methods as specified in the `Speaker` interface.


    A class indicates that it meets the requirements of an interface (that it contains
    all the indicated fields and methods) by including the keyword `implements`, followed
    by the name of the interface, after the name of the class. Any class that implements
    the `Speaker` interface must provide the code for its version of the `speak` function.
    The following demonstrates with a class called `Person` and a class called `Monster`:


    ```

    public class Person implements Speaker

    {

    // additional code above

    public void speak()

    {   System.out.println( "Hello." );  }

    // additional code below

    }

    public class Monster implements Speaker

    {

    // additional code above

    public void speak()

    {  System.out.println("Grrr!");  }

    // additional code below

    }

    ```


    Always remember: When implementing an interface, you must write methods for everything
    declared in the interface; otherwise, there will be a compile-time error. You
    could even write a method that contains no code between the braces, as shown next
    (for a class that represents a particularly untalkative piece of furniture). This
    can be convenient when you need to use only part of the functionality of the interface.


    ```

    public class Chair implements Speaker

    {

    // additional code above

    public void speak()  { }

    // additional code below

    }

    ```


    Finally, you write the method `talkTo` so that it takes a `Speaker` as input:


    ```

    public class Player

    {

    // additional code above

    public void talkTo(Speaker creature)

    {

    creature.speak();

    }

    // additional code below

    }

    ```


    Any class that implements the `Speaker` interface may be used as input for a `Player`
    object’s `talkTo` method. For example, we present some code that creates instances
    of each of these classes, and then we describe the results in the accompanying
    comments:


    ```

    Player dan = new Player();

    Person chris = new Person();

    Monster grez = new Monster();

    Chair footstool = new Chair();

    dan.talkTo(chris); // prints "Hello."

    dan.talkTo(grez); // prints "Grrr!"

    dan.talkTo(footstool); // does not print anything

    ```


    An application in LibGDX requires user-created classes to implement the `ApplicationListener`
    interface so that it can handle all stages of a game program’s life cycle. You
    may recall, however, that in our example from Chapter [1](#A352797_2_En_1_Chapter.html),
    the `HelloWorldImage` class did not implement the `ApplicationListener` class;
    it only extended the `Game` class. Why didn’t this result in an error when the
    class was compiled? If you take a look “under the hood” (which, in the context
    of computer programming, typically means to inspect the source code[³](#A352797_2_En_2_Chapter.html#Fn3)),
    you’ll notice that the `Game` class itself implements the `ApplicationListener`
    class and includes “empty” versions of the functions; there is no code between
    the braces that define the body of each function. This enables you to write only
    variations of the interface methods that you need to use in the class that extends
    the `Game` class, which will then override the versions in the `Game` class; any
    interface method that you don’t write will default to the empty version in the
    `Game` class. (In fact, the `ApplicationListener` interface requires a total of
    six methods: `create`, `render`, `resize`, `pause`, `resume`, and `dispose`; in
    our example, you wrote only two of these.)'
