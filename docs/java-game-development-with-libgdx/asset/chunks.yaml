  trans: '

    ### 设置 LibGDX


    在本节中，你将配置 BlueJ，使其能够使用 LibGDX 软件库。软件库是可供其他程序使用的预编写代码和方法的集合。其价值在于可重用性——当它们实现频繁需要的流程时，能够加速并简化开发过程，使程序员无需在每次编写程序时都“重新发明轮子”。例如，LibGDX
    库包含了用于显示图形、播放声音以及获取用户输入的方法。（此外还提供高级功能，本章稍后将进行讨论。）


    在 Java 中，库存储在 Java 归档（JAR）文件中。一个 JAR 文件包含许多已编译的 Java 文件（类似于 ZIP 文件），并以 JDK 能够导航的标准目录结构进行存储。你的第一步是获取项目所需的
    LibGDX JAR 文件。获取这些文件的最新官方信息位于 [`https://github.com/libgdx/libgdx/wiki/Updating-LibGDX`](https://github.com/libgdx/libgdx/wiki/Updating-LibGDX)，这对初学者来说可能有些令人困惑。另一种更简单的选择是使用本书下载网站
    `apress.com` 上包含的这些文件版本。¹ 本书所有项目所需的五个 JAR 文件是 `gdx.jar`、`gdx-sources.jar`、`gdx-natives.jar`、`gdx-backend-lwjgl.jar`
    和 `gdx-backend-lwjgl-natives.jar`；它们包含了 LibGDX 库的核心代码。


    获取这四个 JAR 文件后，需要配置 BlueJ，使其能够识别并使用这些文件的内容。主要有两种方法：


    *   让 BlueJ 识别 JAR 文件的最简单方法是在项目目录中创建一个名为 `+libs` 的目录，将 JAR 文件复制到此目录中，然后重新启动 BlueJ
    软件。默认情况下，当在 BlueJ 中打开一个项目时，它会自动扫描是否存在名为 `+libs` 的文件夹，并在编译新代码时将其内容纳入考虑。虽然这是最简单的方法，但你需要为每个新项目重新创建此目录并复制
    JAR 文件，这并非最高效的方法。

    *   当存在可能用于多个项目的 JAR 文件时，与其为每个项目在 `+libs` 目录中创建这些文件的冗余副本，不如将它们复制到 BlueJ 软件安装文件夹中一个名为
    `userlib` 的特殊子目录中。该目录的完整路径应类似于 `C:\Program Files\BlueJ\lib\userlib\`；具体名称可以通过选择菜单选项“工具
    ➤ 首选项”（Windows 系统）或“BlueJ ➤ 首选项”（OS X 系统），然后点击“库”选项卡来查看。


    完成这些步骤后，需要重新启动 BlueJ，然后你就可以准备编写第一个 LibGDX 程序了。


    ## 使用 LibGDX 创建“Hello, World!”程序


    传统上，“Hello, World!”程序会在屏幕上显示一条文本消息。由于我们的最终目标是创建电子游戏——主要是可视化程序——因此你的第一个 LibGDX
    程序将在窗口中绘制一幅世界图片，如图 1-6 所示。


    ![A352797_2_En_1_Fig6_HTML.jpg](img/A352797_2_En_1_Fig6_HTML.jpg)


    图 1-6.


    使用 LibGDX 创建的“Hello, World!”程序


    在这里，你将开始看到一些优势，并开始理解在 LibGDX 库提供的类基础上进行构建的含义。我们的第一个项目包含两个类。第一个类名为 `HelloWorldImage`，它通过扩展
    LibGDX 中名为 `Game` 的类来利用其功能。


    扩展类


    软件工程的核心原则之一是设计能够通过创建可重用代码来避免冗余的程序。实现这一目标的一种方法是利用面向对象的继承概念：基于现有类创建新类。


    例如，如果我们正在设计一个角色扮演游戏，它可能包含多种可玩角色类型，例如战士、忍者、盗贼和巫师。如果我们设计类来表示每个角色，它们将具有某些共同特征：每个角色都有一个名字、一定数量的生命值（HP），以及一个可能在模拟战斗时使用的名为
    `attack` 的方法。


    某些特征也可能对每个角色来说是独一无二的；例如，也许巫师还有一定数量的魔法值（MP），以及一个在使用魔法时调用的名为 `castSpell` 的方法。由于这些角色之间的差异，我们无法创建一个能代表所有角色的单一类；同时，在每个单独的类中反复输入相同的字段又显得冗余。针对这种情况，一种优雅的方法是创建一个包含这些角色所有共同特征的基类，然后创建其他类来扩展这个基类。扩展类可以访问基类的所有字段和方法，并且也可以像往常一样包含自己的字段和方法。我们可以用以下代码实现这个场景：


    ```

    public class Person

    {

    String name;

    int HP;

    public void attack(Person other)

    {

    // 在此处插入代码...

    }

    }

    ```


    然后我们可以按如下方式扩展 `Person` 类：


    ```

    public class Wizard extends Person

    {

    int MP;

    public void castSpell( String spellName )

    {

    // 在此处插入代码...

    }

    }

    ```


    接着，如果我们创建这些类的实例：


    ```

    Person percy = new Person();

    Wizard merlin = new Wizard();

    ```


    那么，诸如 `merlin.MP += 10` 和 `merlin.castSpell("fireball")` 这样的命令是有效的，涉及基类字段和方法的命令，如
    `merlin.HP -= 3` 和 `merlin.attack( percy )`，也同样有效。然而，名为 `percy` 的对象只能使用 `Person`
    类的字段和方法；像 `percy.HP += 5` 这样的代码可以编译，但 `percy.castSpell("lightning")` 在编译文件时会导致错误。


    扩展类的概念不仅对游戏内实体有用，对类似框架的元素也同样有用。例如，拥有一个包含所有类型菜单通用功能（如打开和关闭菜单）的 `Menu` 类会很有用。然后，可以创建其他类来扩展这个类；例如，可以创建一个名为
    `SelectionMenu` 的类，它是一个专门用于显示某种信息并要求玩家从一组选项中进行选择的 `Menu`。而 `InformationMenu` 类可能是一个显示基于文本的信息，并在玩家阅读完毕后直接关闭的菜单。

    '
- fmt: '在`BlueJ`中，名为`MyProject`的项目应该仍然处于打开状态；如果没有，请打开该项目。在此项目中创建一个新类，命名为`HelloWorldImage`，并输入以下源代码。请注意，在类本身之前，有一些`import`语句，它们指明了你将在本程序中使用的`LibGDX`类（来自你之前设置的`JAR`文件）。另外请注意，本程序使用了一个名为`world.png`的图像文件；该图像包含在本章的源代码中，位于`MyProject`文件夹内（源代码可从`apress.com`获取）。你应该将此图像复制到你的`MyProject`文件夹中。或者，你也可以选择使用自己的图像；建议本程序使用`256`像素乘`256`像素的尺寸，如果你这样做，请不要忘记相应地修改以下代码中的文件名。


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.files.FileHandle;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.graphics.Texture;

    public class HelloWorldImage extends Game

    {

    private Texture texture;

    private SpriteBatch batch;

    public void create()

    {

    FileHandle worldFile = Gdx.files.internal("world.png");

    texture = new Texture(worldFile);

    batch = new SpriteBatch();

    }

    public void render()

    {

    Gdx.gl.glClearColor(1, 1, 1, 1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    batch.begin();

    batch.draw( texture, 192, 112 );

    batch.end();

    }

    }

    ```


    `HelloWorldImage`类包含两个对象：一个`Texture`和一个`SpriteBatch`。`Texture`是一个存储图像相关数据的对象：图像的尺寸（宽度和高度）以及每个像素的颜色。`SpriteBatch`是一个将图像绘制到屏幕上的对象。


    `HelloWorldImage`类还包含两个方法：`create`和`render`。


    `create`方法初始化`Texture`和`SpriteBatch`对象。特别是，`Texture`对象需要一个图像文件，它将从中获取图像数据。为此，你需要创建一个`FileHandle`：这是一个用于访问存储在计算机上的文件的`LibGDX`对象。`Gdx`类包含许多有用的静态对象和方法（类似于Java的`Math`类）；在这里，你使用一个名为`internal`的方法来生成一个`FileHandle`对象，该对象将被`Texture`对象使用。`internal`方法将在`BlueJ`项目目录中搜索该文件，该目录与编译后的类文件存储位置相同。


    在`create`方法执行完毕后，`render`方法将被`LibGDX`大约每秒调用`60`次（因为这是`Game`类的默认行为）。[²](#A352797_2_En_1_Chapter.html#Fn2)
    该方法包含一对静态方法调用：一个用于选择特定的背景颜色（此示例中的值对应白色），另一个用于使用该颜色清除窗口。之后，`SpriteBatch`对象被用于定位纹理并将其绘制到窗口上。


    接下来，你将创建第二个类，用于启动程序；它创建`HelloWorldImage`类的一个实例并激活其方法。这样的类通常被称为驱动类，并且需要你编写一个静态方法。


    ## 静态方法与驱动类


    默认情况下，类的方法由该类的实例调用。然而，方法也可以声明为`static`，这意味着它是直接从类本身调用的（而不是通过实例）。一个方法应该是基于实例的还是基于类的（静态的），取决于该方法的使用方式及其所需的数据。


    基于实例的方法通常依赖于该实例特有的内部数据。例如，每个`String`对象都有一个名为`charAt`的方法，它接受一个整数作为输入，并返回该`String`中该位置存储的字符。如果我们创建两个`String`对象，如下所示：


    ```

    String player1 = "Lee";

    String player2 = "Dan";

    ```


    那么表达式`player1.charAt(1)`返回字符`''e''`，而`player2.charAt(1)`返回字符`''a''`。此方法返回的值取决于该实例中存储的数据，因此`charAt`无疑是一个基于实例的方法。


    在面向对象的编程语言中，一个类的大多数方法都是基于实例的，因为它们要么依赖于实例变量的值，要么可能改变这些值。当然，也存在静态方法更自然的情况。一般来说，任何不涉及对象内部状态的方法都可以声明为静态的（例如数学公式——Java的`Math`类的所有方法都是静态的）。


    驱动类（有时也称为主类、入口点类、启动类或启动器类）是一个其目的是驱动另一个类执行的类，这通常涉及创建该类的实例并调用其一个或多个方法。驱动类通常只需要一个方法来完成此任务；这个方法传统上被称为`main`。由于它是程序调用的第一个方法，`main`方法必须声明为`static`，因为当程序启动时，没有可用的实例来运行基于实例的方法。如果`main`方法不是静态的，我们就会遇到类似于哲学难题的问题：先有鸡还是先有蛋？必须有一些东西能够在不被实例化的情况下实例化一个类，而这正是驱动类的静态`main`方法所做的。


    一个标准的“Hello, World!”程序可以使用驱动类重写如下：


    ```

    public class Greeter

    {

    public void sayHello()

    {

    System.out.print("Hello!");

    }

    }

    public class Launcher

    {

    public static void main()

    {

    Greeter greta = new Greeter();

    greta.sayHello();

    }

    }

    ```


    接下来，在同一个项目中，创建一个名为`HelloLauncher`的类，其中包含以下代码：


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class HelloLauncher

    {

    public static void main (String[] args)

    {

    HelloWorldImage myProgram = new HelloWorldImage();

    LwjglApplication launcher = new LwjglApplication( myProgram );

    }

    }

    ```


    正如前面“静态方法与驱动类”边栏中提到的，该类首先创建了一个`HelloWorldImage`类的实例，名为`myProgram`。然后，`main`方法不是直接运行`myProgram`的方法，而是创建一个`LwjglApplication`对象，该对象会设置一个窗口并管理图形和音频、键盘和鼠标输入以及文件访问。`LwjglApplication`对象将`myProgram`作为输入，然后按照前面讨论的方式运行`myProgram`的`create`和`render`方法。


    缩写`LWJGL`代表轻量级Java游戏库（Lightweight Java Game Library），这是一个最初由Caspian Rychlik-Prince创建的开源Java库，旨在简化游戏开发中访问台式计算机硬件资源的过程。在`LibGDX`中，`LWJGL`被用作桌面后端，以支持所有主要的桌面操作系统，如Windows、Linux和Mac
    OS X。


    拥有一个与包含游戏功能的类分离的驱动类的另一个好处是，有可能为其他平台（例如`LibGDX`也支持的Android）创建驱动类。


    当你为两个类都输入完所有代码后，返回`BlueJ`的主窗口并单击“编译”按钮。然后，右键单击`HelloLauncher`类的橙色矩形，在出现的方法列表中，选择列为`void
    main(String[] args)`的方法。会弹出一个窗口，如果需要，你可以在其中输入一个字符串数组作为输入——但这里不需要。单击“确定”按钮，你应该会看到一个窗口，如图[1-6](#A352797_2_En_1_Chapter.html#Fig6)所示。


    恭喜你完成了第一个使用`LibGDX`的应用程序！


