    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.math.MathUtils;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Item extends BaseActor

    {

    public enum Type { PADDLE_EXPAND, PADDLE_SHRINK,

    BALL_SPEED_UP, BALL_SPEED_DOWN };

    private Type type;

    public Item(float x, float y, Stage s)

    {

    super(x,y,s);

    setRandomType();

    setSpeed(100);

    setMotionAngle(270);

    setSize(50,50);

    setOrigin(25,25);

    setBoundaryRectangle();

    setScale(0,0);

    addAction( Actions.scaleTo(1,1, 0.25f) );

    }

    public void setType(Type t)

    {

    type = t;

    if (t == Type.PADDLE_EXPAND)

    loadTexture("assets/items/paddle-expand.png");

    else if (t == Type.PADDLE_SHRINK)

    loadTexture("assets/items/paddle-shrink.png");

    else if (t == Type.BALL_SPEED_UP)

    loadTexture("assets/items/ball-speed-up.png");

    else if (t == Type.BALL_SPEED_DOWN)

    loadTexture("assets/items/ball-speed-down.png");

    else

    loadTexture("assets/items/item-blank.png");

    }

    public void setRandomType()

    {

    int randomIndex = MathUtils.random(0, Type.values().length - 1);

    Type randomType = Type.values()[randomIndex];

    setType(randomType);

    }

    public Type getType()

    {

    return type;

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    if (getY() < -50)

    remove();

    }

    }

    ```


    Items should be spawned occasionally when bricks are destroyed. To implement this,
    in the `LevelScreen` class `update` method, locate the block of code that is run
    if the ball overlaps a brick and add the following. (You can adjust the value
    of `spawnProbability` as desired to make items appear more or less frequently.)


    ```

    float spawnProbability = 20;

    if ( MathUtils.random(0, 100) < spawnProbability )

    {

    Item i = new Item(0,0,mainStage);

    i.centerAtActor(brick);

    }

    ```


    To implement the item effects when the paddle overlaps the item, add the following
    code to the `update` method. Note that the `BaseActor` objects retrieved by the
    `getList` method must be cast to `Item` objects in order to be able to access
    the `getType` method. Also note that after changing the size of the paddle, its
    boundary shape must be updated as well.


    ```

    for (BaseActor item : BaseActor.getList(mainStage, "Item"))

    {

    if ( paddle.overlaps(item) )

    {

    Item realItem = (Item)item;

    if (realItem.getType() == Item.Type.PADDLE_EXPAND)

    paddle.setWidth( paddle.getWidth() * 1.25f );

    else if (realItem.getType() == Item.Type.PADDLE_SHRINK)

    paddle.setWidth( paddle.getWidth() * 0.80f );

    else if (realItem.getType() == Item.Type.BALL_SPEED_UP)

    ball.setSpeed( ball.getSpeed() * 1.50f );

    else if (realItem.getType() == Item.Type.BALL_SPEED_DOWN)

    ball.setSpeed( ball.getSpeed() * 0.90f );

    paddle.setBoundaryRectangle();

    item.remove();

    }

    }

    ```


    Once again, it is a good opportunity to test your code, this time making sure
    that all the powerups work as expected. For testing purposes, you may want to
    temporarily increase the value of `spawnProbability` so that items spawn more
    frequently, giving you more opportunities to test the items, or you may want to
    set the item type after they are spawned if there is one item type in particular
    you would like to test.


    ## Sounds and Music


    Finally, you will add some sounds and music to the game to help set the mood and
    to accentuate the interactions between the objects. In particular, there will
    be sound effects when the ball hits a wall, when the ball hits a brick, when the
    ball hits the paddle, when an item is spawned, and when an item is collected.
    The background music is called “Rollin at 5”[¹](#A352797_2_En_8_Chapter.html#Fn1)
    and is an upbeat, jazzy piece appropriate to the pacing of this game. To begin,
    add the following `import` statements to the `LevelScreen` class:


    ```

    import com.badlogic.gdx.audio.Sound;

    import com.badlogic.gdx.audio.Music;

    ```


    Next, add the following variable declarations to the same class:


    ```

    Sound bounceSound;

    Sound brickBumpSound;

    Sound wallBumpSound;

    Sound itemAppearSound;

    Sound itemCollectSound;

    Music backgroundMusic;

    ```


    In the `initialize` method, add the following code:


    ```

    bounceSound      = Gdx.audio.newSound(Gdx.files.internal("assets/boing.wav"));

    brickBumpSound   = Gdx.audio.newSound(Gdx.files.internal("assets/bump.wav"));

    wallBumpSound    = Gdx.audio.newSound(Gdx.files.internal("assets/bump-low.wav"));

    itemAppearSound  = Gdx.audio.newSound(Gdx.files.internal("assets/swoosh.wav"));

    itemCollectSound = Gdx.audio.newSound(Gdx.files.internal("assets/pop.wav"));

    backgroundMusic = Gdx.audio.newMusic(Gdx.files.internal("assets/Rollin-at-5.mp3"));

    backgroundMusic.setLooping(true);

    backgroundMusic.setVolume(0.50f);

    backgroundMusic.play();

    ```


    Next, you will add the lines of code that play the sound effects at the appropriate
    moments, all of which occur in the `update` method. In the block of code following
    the conditional statement that checks if the ball overlaps the wall, directly
    after the line of code that makes the ball bounce off the wall, add the code:


    ```

    wallBumpSound.play();

    ```


    In the block of code following the conditional statement that checks if the ball
    overlaps a brick, directly after the line of code that makes the ball bounce off
    the brick, add the code:


    ```

    brickBumpSound.play();

    ```


    After the line of code that spawns a new `Item` object, add the code:


    ```

    itemAppearSound.play();

    ```


    In the block of code following the conditional statement that checks if the ball
    overlaps the paddle, directly after the line of code that sets the angle of motion
    after the ball, add the code:


    ```

    bounceSound.play();

    ```


    Finally, in the block of code following the conditional statement that checks
    if the paddle overlaps an item, directly after the line of code that removes the
    item from the stage, add the code:


    ```

    itemCollectSound.play();

    ```


    Test your project to verify that the music and sounds play as expected.


    Congratulations—you have finished creating the Rectangle Destroyer game!


    ## Summary and Next Steps


    In this chapter, you created the ball-bouncing, brick-breaking action game Rectangle
    Destroyer. You learned how to simulate bouncing and how to use enumerated types
    in the process of creating collectible items that affect the gameplay.


    As always, there are many features you could add to improve the quality of this
    game, such as a start menu that is displayed before the game begins. You could
    add more sounds corresponding to game-object interaction, such as a sound when
    the ball is lost, when the player wins the game, and when the player loses the
    game. You could add some solid, moving objects in the brick area that knock the
    ball around. Most of all, you may want to consider creating some additional powerups.
    Some ideas for extra item effects are:


    *   bonus points added to score

    *   an extra reserve ball

    *   change the size of the ball (smaller or larger)

    *   destroy a random brick

    *   stop the paddle from moving for 1–3 seconds


    In the next chapter, you will learn how to implement a completely different game
    mechanic: drag-and-drop functionality, a key aspect of card-based and puzzle-based
    games.


