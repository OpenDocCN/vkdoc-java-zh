- fmt: '### Adding Interactivity and Creating the User Interface


    Next, you will add interactivity and the user interface. The user interface will
    consist of the Start button, a label showing the current song position and song
    duration, and another label showing the player’s current score and the maximum
    possible score for this song. In addition, you will create an object that displays
    a message rating the player’s performance (in terms of how close the falling box
    was to its target box when the corresponding key was pressed). To begin, create
    a new class called `Message` containing the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Message extends BaseActor

    {

    public Animation perfect;

    public Animation great;

    public Animation good;

    public Animation almost;

    public Animation miss;

    public Message(float x, float y, Stage s)

    {

    super(x,y,s);

    perfect = loadTexture("assets/perfect.png");

    great = loadTexture("assets/great.png");

    good = loadTexture("assets/good.png");

    almost = loadTexture("assets/almost.png");

    miss = loadTexture("assets/miss.png");

    }

    public void pulseFade()

    {

    setOpacity(1);

    clearActions();

    Action pulseFade =

    Actions.sequence(

    Actions.scaleTo(1.1f,1.1f, 0.05f),

    Actions.scaleTo(1.0f,1.0f, 0.05f),

    Actions.delay(1),

    Actions.fadeOut(0.5f) );

    addAction(pulseFade);

    }

    }

    ```


    The method `pulseFade` in the `Message` class is included for multiple reasons.
    The scaling part of the generated action creates a short pulse effect that gets
    the player’s attention, and it also helps the player identify if the same message
    has been displayed twice in a short interval. In addition, the fade part of the
    action makes sure that messages do not remain visible long after the corresponding
    key has been pressed.


    Next, add the following `import` statements to the `RhythmScreen` class:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    import com.badlogic.gdx.utils.Align;

    ```


    Then, add the following variables to this class:


    ```

    private Message message;

    private Label scoreLabel;

    private int score;

    private int maxScore;

    private Label timeLabel;

    private float songDuration;

    ```


    In the `initialize` method, directly before the code involving `uiTable`, add
    the following code, which will initialize the remaining user interface elements:


    ```

    scoreLabel = new Label("Score: 0" + "\n" + "Max: 0", BaseGame.labelStyle);

    scoreLabel.setAlignment(Align.right);

    timeLabel = new Label("Time: 0" + "\n" + "End: 0", BaseGame.labelStyle);

    timeLabel.setAlignment(Align.right);

    message = new Message(0,0,uiStage);

    message.setOpacity(0);

    ```


    Some of the variables you have just added cannot be initialized until after the
    song data has been loaded, such as the maximum possible score. Once the song data
    has been loaded, the maximum score can be calculated by multiplying the number
    of points awarded for a perfect key press (in this game, 100 points) by the total
    number of key presses that will occur. Within the lambda expression for the Start
    button, add the following code directly before the `return` statement:


    ```

    songDuration = songData.getSongDuration();

    score = 0;

    maxScore = 100 * songData.keyTimeCount();

    scoreLabel.setText("Score: " + score + "\n" + "Max: " + maxScore);

    timeLabel.setText("Time: " + 0 + "\n" + "End: " + (int)songDuration);

    ```


    Finally, in the `initialize` method, to add the new labels and message object
    to the user interface, replace the code involving `uiTable` with the following:


    ```

    uiTable.pad(10);

    uiTable.add(startButton).width(200).left();

    uiTable.add(timeLabel).width(150);

    uiTable.add(scoreLabel).width(200).right();

    uiTable.row();

    uiTable.add(message).colspan(3).expandX().expandY();

    ```


    To update the time label according to the current song position, add the following
    code to the `update` method:


    ```

    if ( gameMusic.isPlaying() )

    timeLabel.setText( "Time: " + (int)gameMusic.getPosition() + "\n"

    + "End: " + (int)songDuration );

    ```


    Finally, you will add the interactivity in the `keyDown` method (since pressing
    a key is a discrete event). If `songData` has not been initialized, then this
    method will return immediately. Otherwise, if the key pressed corresponds to one
    of the previously specified keys (F, G, H, and J, stored in `keyList`), then the
    corresponding `TargetBox` and `ArrayList` of `FallingBox` objects will be retrieved.
    If the list of `FallingBox` objects is empty, then this keypress counts as a “miss”
    and the corresponding message will be displayed. Otherwise, the distance between
    the lowest `FallingBox` instance (which is the first in the list) and the `TargetBox`
    will be calculated, and points awarded according to how small the distance is:


    - 0–8 pixels: “Perfect,” worth 100 points

    - 8–16 pixels: “Great,” worth 80 points

    - 16–24 pixels: “Good,” worth 50 points

    - 24–32 pixels: “Almost,” worth 20 points

    - greater than 32 pixels: considered a “Miss” and worth no points


    After setting the correct message to be displayed and incrementing the score,
    the `pulseFade` method is called to animate the message, the text in the label
    displaying the score is updated, and the corresponding `FallingBox` object is
    removed from the list and from the game. All of this is accomplished by adding
    the following code to the `keyDown` method:


    ```

    if (songData == null)

    return false;

    String keyString = Keys.toString(keycode);

    if ( keyList.contains(keyString) )

    {

    int i = keyList.indexOf(keyString);

    TargetBox tb = targetList.get(i);

    ArrayList fallingList = fallingLists.get(i);

    if ( fallingList.size() == 0 )

    {

    message.setAnimation(message.miss);

    message.pulseFade();

    }

    else

    {

    FallingBox fb = fallingList.get(0);

    float distance = Math.abs( fb.getY() - tb.getY() );

    if (distance < 8)

    {

    message.setAnimation(message.perfect);

    score += 100;

    }

    else if (distance < 16)

    {

    message.setAnimation(message.great);

    score += 80;

    }

    else if (distance < 24)

    {

    message.setAnimation(message.good);

    score += 50;

    }

    else if (distance < 32)

    {

    message.setAnimation(message.almost);

    score += 20;

    }

    else

    {

    message.setAnimation(message.miss);

    }

    message.pulseFade();

    scoreLabel.setText("Score: " + score + "\n" + "Max: " + maxScore);

    fallingList.remove(fb);

    fb.remove();

    }

    }

    ```


    One more case must be considered: what if a `FallingBox` passes below its corresponding
    `TargetBox` and the player doesn’t press a key? The `FallingBox` needs to be automatically
    removed from the game at this point, and the “Miss” message should be displayed.
    To do so, add the following code to the end of the `update` method:


    ```

    for (int i = 0; i  fallingList = fallingLists.get(i);

    if ( fallingList.size() > 0 )

    {

    FallingBox fb = fallingList.get(0);

    TargetBox tb = targetList.get(i);

    if ( fb.getY() < tb.getY() && !fb.overlaps(tb) )

    {

    message.setAnimation(message.miss);

    message.pulseFade();

    fallingList.remove(fb);

    fb.remove(); // remove from stage immediately

    }

    }

    }

    ```


    This is another excellent point at which you should test your game. All the core
    mechanics have been implemented; you can play a complete game and see how close
    you can get to the maximum possible score.'
