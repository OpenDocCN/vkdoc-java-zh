  raw: 'In BlueJ, the project named MyProject should still be open; if not, open the
    project. Create a new class in this project, called `HelloWorldImage`, and enter
    the source code that follows. Note that before the class itself, there are a number
    of import statements that indicate which of the LibGDX classes (from the JAR files
    you set up earlier) you’ll be using in this program. Also note that this program
    uses an image with the filename `world.png`; this image is included in the source
    code for this chapter, in the folder `MyProject` (the source code is available
    from `apress.com`). You should copy this image into your `MyProject` folder. Alternatively,
    you could use an image of your own choosing instead; a size of 256 by 256 pixels
    is recommended for this program, and don’t forget to change the filename in the
    following code accordingly if you do.


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.files.FileHandle;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.graphics.Texture;

    public class HelloWorldImage extends Game

    {

    private Texture texture;

    private SpriteBatch batch;

    public void create()

    {

    FileHandle worldFile = Gdx.files.internal("world.png");

    texture = new Texture(worldFile);

    batch = new SpriteBatch();

    }

    public void render()

    {

    Gdx.gl.glClearColor(1, 1, 1, 1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    batch.begin();

    batch.draw( texture, 192, 112 );

    batch.end();

    }

    }

    ```


    The `HelloWorldImage` class contains two objects: a `Texture` and a `SpriteBatch`.
    A `Texture` is an object that stores image-related data: the dimensions (width
    and height) of an image and the color of each pixel. A `SpriteBatch` is an object
    that draws images to the screen.


    The `HelloWorldImage` class also contains two methods: `create` and `render`.


    The `create` method initializes the `Texture` and `SpriteBatch` objects. In particular,
    the `Texture` object requires an image file from which it will get its image data.
    For this purpose, you create a `FileHandle`: a LibGDX object that is used to access
    files stored on the computer. The `Gdx` class contains many useful static objects
    and methods (similar to Java’s `Math` class); here, you use a method named `internal`
    to generate a `FileHandle` object that will be used by the `Texture` object. The
    `internal` method will search for the file in the BlueJ project directory, the
    same location where the compiled class files are stored.


    After the `create` method is finished, the `render` method will be called by LibGDX
    approximately 60 times per second (since this is what the `Game` class does by
    default).[²](#A352797_2_En_1_Chapter.html#Fn2) This method contains a pair of
    static method calls: one to select a particular background color (the values in
    this example correspond to the color white) and another to use that color to clear
    the window. After this, the `SpriteBatch` object is used to position and draw
    the texture to the window.


    Next, you’ll create a second class that is used to start the program; it creates
    an instance of the `HelloWorldImage` class and activates its methods. Such a class
    is often called a driver class and requires you to write a static method.


    Static Methods And Driver Classes


    By default, the methods of a class are called by instances of that class. However,
    a method can also be declared to be static, meaning that it is called from the
    class directly (rather than an instance). Whether a method should be instance-based
    or class-based (static) depends on how the method is used and what data it requires.


    An instance-based method usually depends on the internal data specific to that
    instance. For example, every `String` object has a method called `charAt`, which
    takes an integer as input and returns the character stored at that position in
    the `String`. If we create two `String` objects as follows:


    ```

    String player1 = "Lee";

    String player2 = "Dan";

    ```


    then the expression `player1.charAt(1)` returns the character `''e''`, while `player2.charAt(1)`
    returns the character `''a''`. The value returned by this method depends on the
    data stored in that instance, and thus `charAt` is most assuredly an instance-based
    method.


    In object-oriented programming languages, most of the methods of a class will
    be instance-based because they either depend upon or potentially change the values
    of an instance’s variables. There are, of course, situations where static methods
    are more natural. In general, any method that does not involve the internal state
    of an object could be declared as static (such as mathematical formulas—all the
    methods of Java’s `Math` class are static).


    A driver class (also sometimes referred to as a main, entry point, starter, or
    launcher class) is a class whose purpose is to drive the execution of another
    class, which often involves creating an instance of the class and calling one
    or more of its methods. The driver class typically requires only a single method
    to accomplish this task; this method is traditionally called `main`. Since it
    is the first method called by the program, the `main` method must be declared
    as static, because when a program starts, there are no instances available to
    run instance-based methods. If the main method were not static, we would have
    a problem similar to the philosophical conundrum: which came first, the chicken
    or the egg? Something has to be able to instantiate a class without itself being
    instantiated, and this is exactly what the static `main` method of a driver class
    does.


    A standard “Hello, World!” program could be rewritten using a driver class as
    follows:


    ```

    public class Greeter

    {

    public void sayHello()

    {

    System.out.print("Hello!");

    }

    }

    public class Launcher

    {

    public static void main()

    {

    Greeter greta = new Greeter();

    greta.sayHello();

    }

    }

    ```


    Next, in the same project, create a class called `HelloLauncher` that contains
    the following code:


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class HelloLauncher

    {

    public static void main (String[] args)

    {

    HelloWorldImage myProgram = new HelloWorldImage();

    LwjglApplication launcher = new LwjglApplication( myProgram );

    }

    }

    ```


    As mentioned in the previous “Static Methods and Driver Classes” sidebar, this
    class first creates an instance of the `HelloWorldImage` class, called `myProgram`.
    Then, instead of running the methods of `myProgram` directly, the `main` method
    creates a `LwjglApplication` object, which sets up a window and manages the graphics
    and audio, keyboard and mouse input, and file access. The `LwjglApplication` object
    takes `myProgram` as input and then runs the `create` and `render` methods of
    `myProgram` as discussed previously.


    The acronym LWJGL stands for the Lightweight Java Game Library , an open source
    Java library originally created by Caspian Rychlik-Prince to simplify game development
    in terms of accessing the desktop computer hardware resources. In LibGDX, LWJGL
    is used for the desktop backend to support all the major desktop operating systems,
    such as Windows, Linux, and Mac OS X.


    Another benefit to having a driver class separate from the classes that contain
    the game functionality is the potential to create driver classes for other platforms,
    such as Android, which LibGDX also supports.


    When you’ve entered all the code for both classes, return to the main window in
    BlueJ and click the Compile button. Then, right-click the orange rectangle for
    the `HelloLauncher` class, and in the list of methods that appears, select the
    method listed as `void main(String[] args)`. A pop-up window appears, in which
    you could enter an array of strings as input if you needed to—but you don’t. Click
    the OK button, and you should see a window as shown previously in Figure [1-6](#A352797_2_En_1_Chapter.html#Fig6).


    Congratulations on completing your first application using LibGDX!


