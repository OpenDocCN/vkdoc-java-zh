    语句，声明许多不同类型的变量，并拥有各种方法，每个方法都包含大量语句。在从事自己的项目时，除了编写自己的类之外，你的程序可能还会使用许多预定义的类。因此，花些时间熟悉
    Java 文档格式中呈现的信息风格和类型是很好的，无论是官方的 Java 语言参考 ⁵ 还是你项目中包含的任何 Java 库的文档。


    ## 附录 C：扩展框架类参考


    在本书中，你开发了多个类来扩展 LibGDX 框架。这些新类中的每一个又包含许多字段和方法。为了方便起见，本附录总结了跨多个章节使用的最重要类的功能：`BaseScreen`、`BaseActor`
    和 `TilemapActor`。


    ### BaseScreen 类


    `BaseScreen` 类在第 3 章中引入，用于支持包含多个屏幕的游戏，并简化游戏循环的实现。在本书的几乎每个游戏项目中，你都会扩展这个类。该类的扩展必须实现两个抽象方法：`initialize`（用于设置游戏实体）和
    `update`（用于处理连续的用户输入（例如，只要按住键就会移动的角色）并处理游戏逻辑（例如游戏实体之间的交互））。该类还实现了 `InputProcessor`
    接口，这使得该类的扩展能够通过重写诸如 `keyDown` 之类的方法来处理离散输入（例如，按下键时角色跳跃一次）。


    #### 构造函数


    *   `BaseScreen()` 初始化 `mainStage`、`uiStage` 和 `uiTable`


    #### 字段


    *   `protected Stage mainStage` 所有游戏实体应添加到的舞台

    *   `protected Stage uiStage` 包含用户界面表格的舞台

    *   `protected Table uiTable` 用于组织用户界面元素的表格

