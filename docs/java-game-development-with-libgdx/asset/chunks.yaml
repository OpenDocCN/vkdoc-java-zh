- fmt: '# Summary and Next Steps


    In this chapter, you learned two advanced and powerful approaches to improving
    the graphics in your game-development projects. First, you learned how to create
    particle systems with the LibGDX Particle Editor, which can be used to simulate
    a variety of effects, such as the thruster and explosion effects you created.
    You then designed a class called `ParticleActor`, which enabled you to integrate
    these effects into the Space Rocks game. Second, you learned how to write shader
    programs, which leverage the power of the GPU to create effects such as blur,
    glow, and distortion. You then learned how to use the `ShaderProgram` class to
    use the shader programs when drawing actors in the Starfish Collector game.


    At this point, you can solidify your knowledge by incorporating more special effects
    into your games. For example, try creating a particle effect that looks like water
    droplets splashing out of a puddle, and use this effect in the Starfish Collector
    game to replace the `Whirlpool` object. You could also add shader programs to
    objects other than the turtle in Starfish Collector; for example, you could add
    the glow-pulse effect to the `Starfish` class. You could even create a new class
    called `Water` to replace the `BaseActor` containing the background image and
    apply the wave-distortion shader in its `draw` method. Alternatively, in the Space
    Rocks game, you could add the glow-pulse effect to the `Laser` class and add the
    wave-distortion effect to the `Warp` class.


    In the next chapter, you will continue learning about advanced graphics, but in
    the context of 3D games, concluding with a 3D version of the game that started
    it all in this book: Starfish Collector.


    Footnotes [1](#A352797_2_En_15_Chapter.html#Fn1_source)


    [`https://github.com/libgdx/libgdx/wiki/2D-Particle-Editor`](https://github.com/libgdx/libgdx/wiki/2D-Particle-Editor)


    [2](#A352797_2_En_15_Chapter.html#Fn2_source)


    Technically, there are additional stages available in the graphics pipeline than
    those listed here, but for brevity only the fundamental and required stages are
    described here.


    [3](#A352797_2_En_15_Chapter.html#Fn3_source)


    More sophisticated blur algorithms will instead calculate a weighted average of
    the pixel colors, where the closer a pixel is to the center, the larger the influence
    it has when computing the final color.


    # Introduction to 3D Graphics and Games


    This chapter will introduce some of the 3D graphics capabilities of LibGDX. Along
    the way, you’ll learn about the concepts and classes necessary to describe and
    render a three-dimensional scene. To simplify and streamline this process, you’ll
    both adapt some old classes and write some new classes to accomplish the various
    tasks involved. Next, to understand 3D movement, you’ll create a simple interactive
    demo that enables players to control both an object within the scene and the camera
    viewing the scene. Finally, you’ll create the game Starfish Collector 3D, shown
    in Figure [16-1](#A352797_2_En_16_Chapter.html#Fig1), which once again features
    a turtle on a quest to collect all the starfish that it can. For simplicity, this
    game will actually use 2.5D techniques: the game will render three-dimensional
    graphics, while the underlying gameplay (movement and collisions) will occur in
    two dimensions.


    ![A352797_2_En_16_Fig1_HTML.jpg](A352797_2_En_16_Fig1_HTML.jpg)


    Figure 16-1. The Starfish Collector 3D game


    ## Exploring 3D Concepts and Classes


    As it turns out, all of the previously created games in this book exist in a three-dimensional
    space. You may have noticed that, for example, when setting the position of a
    camera object (in the `alignCamera` method of the `BaseActor` class), you have
    x, y, and z components to set. If the x-axis and the y-axis represent the horizontal
    and vertical directions on the screen, respectively, then the z-axis corresponds
    to a straight line pointing toward the viewer, perpendicular to the xy plane—the
    plane containing the x and y axes. The camera can be thought of as being positioned
    on the z axis, pointing straight toward the xy plane; all of the game entities
    have implicitly had their z coordinate set to 0. This configuration is illustrated
    in Figure [16-2](#A352797_2_En_16_Chapter.html#Fig2), which shows roughly how
    the camera sees the Starfish Collector game from previous chapters.


    ![A352797_2_En_16_Fig2_HTML.jpg](A352797_2_En_16_Fig2_HTML.jpg)


    Figure 16-2. A camera looking down the z axis at the Starfish Collector game


    Your previous projects have relied heavily on the `Stage` class, which manages
    the `Camera` and a `Batch` object (for rendering purposes). To create 3D scenes,
    you need the "3D versions" of these objects, provided by the `PerspectiveCamera`
    and `ModelBatch` classes, which will be covered in detail next. However, there
    is no corresponding `stage`-like object to manage them, and so you will create
    your own manager class (called `Stage3D`) in a later section.


    To render a scene, you can use one of two types of cameras: an orthographic camera
    or a perspective camera. (The `Stage` class uses an `OrthographicCamera` object
    for rendering.) The difference between these two is in how they represent, or
    project, a 3D scene onto a 2D surface such as a computer screen. To illustrate
    the difference, consider one of the simplest 3D shapes: a cube. Figure [16-3](#A352797_2_En_16_Chapter.html#Fig3)
    shows an orthographic projection and a perspective projection of a cube. In an
    orthogonal projection, if the edges of an object have the same length, then they
    will be drawn as having the same length in the projection, regardless of their
    distance from the viewer. This is in contrast to a perspective projection, in
    which objects with two edges of the same length may appear different in the projection;
    an edge that is farther away from the viewer will appear shorter. This also has
    the side effect that, if two edges of an object are parallel, then they remain
    parallel in an orthographic projection, but they appear to converge in a perspective
    projection. (In a perspective drawing, the point at which all such edges appear
    to converge is called the vanishing point.)


    ![A352797_2_En_16_Fig3_HTML.jpg](A352797_2_En_16_Fig3_HTML.jpg)


    Figure 16-3. A cube drawn using orthographic projection (left) and perspective
    projection (right)


    When initializing a `PerspectiveCamera` object, you have to define the region
    visible to the camera, which has the shape of a truncated pyramid, or frustum
    (illustrated in Figure [16-4](#A352797_2_En_16_Chapter.html#Fig4)). This is specified
    by five parameters: the field of view (an angle that represents how far the camera
    can see to either side), the width and height of the rectangle onto which the
    scene is being projected (determined by a `Viewport` object in LibGDX), and the
    near and far values (which represent the closest and farthest distances that the
    camera will include while rendering).


    ![A352797_2_En_16_Fig4_HTML.jpg](A352797_2_En_16_Fig4_HTML.jpg)


    Figure 16-4. A region visible to a perspective camera; near and far distances
    are indicated by shaded planes'
