    # 6. Audio


    In this chapter, you will learn how to add audio elements—sound effects and background
    music—to your game. First, you will be introduced to these topics by adding these
    features to the Starfish Collector game that you have been working on in previous
    chapters. Then, in an optional section, you will build on these skills with a
    musical rhythm-based game, called Rhythm Tapper, in which the player presses a
    sequence of keys indicated by falling objects overlapping targets, all of which
    is synchronized with music playing in the background. A screenshot of Rhythm Tapper
    is shown in Figure [6-1](#A352797_2_En_6_Chapter.html#Fig1).


