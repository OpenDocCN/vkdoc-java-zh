  trans: '

    目前，上述代码允许对象在屏幕上被拖拽。然而，你通常希望此类对象能与它被放置到的另一类对象进行交互。例如，在拼图游戏中，你希望将拼图块放置到特定的棋盘区域；而在纸牌游戏中，你希望将牌放置到特定的牌堆上。为此，你将创建另一个类，用于表示可以被
    `DragAndDropActor` 对象作为目标的对象。你还需要包含一个布尔变量，用于指示该对象是否可以被作为目标。这对于某些游戏可能很重要，因为在这些游戏中，你最终可能需要禁用特定目标的放置功能。例如，在拼图游戏中，一旦你将一个拼图块放置到某个区域，你就不希望再将第二个拼图块放置到同一区域。创建一个名为
    `DropTargetActor` 的新类，包含以下代码：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class DropTargetActor extends BaseActor

    {

    private boolean targetable;

    public DropTargetActor(float x, float y, Stage s)

    {

    super(x,y,s);

    targetable = true;

    }

    public void setTargetable(boolean t)

    {

    targetable = t;

    }

    public boolean isTargetable()

    {

    return targetable;

    }

    }

    ```


    接下来，你将回到 `DragAndDropActor` 类，添加与 `DropTargetActor` 对象交互的功能。在 `InputListener`
    的 `touchUp` 方法中，你将识别出 `DragAndDropActor` 被放置到的 `DropTargetActor`（如果有的话），并将其存储在一个变量中以便后续访问。该方法的主要部分涉及一个
    `for` 循环，遍历附加到舞台上的所有 `DropTargetActor` 对象，这些对象必须既可被作为目标，又与正在被拖拽的演员重叠。然而，还需要一些额外的代码来处理被拖拽的演员与两个或更多放置目标重叠的情况。在这种情况下，你需要选择距离被拖拽演员最近的目标。为此，你将在循环中记录从被拖拽演员到候选放置目标的距离，如果这个距离小于迄今为止遇到的最短距离，则将该候选目标设置为新的放置目标。


    在 `DragAndDropActor` 类中，添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.math.Vector2;

    ```


    在类中添加以下变量声明：


    ```

    private DropTargetActor dropTarget;

    ```


    在 `InputListener` 的 `touchUp` 方法中，添加以下代码：


    ```

    self.setDropTarget(null);

    // 跟踪到最近对象的距离

    float closestDistance = Float.MAX_VALUE;

    for ( BaseActor actor : BaseActor.getList(self.getStage(), "DropTargetActor")
    )

    {

    DropTargetActor target = (DropTargetActor)actor;

    if ( target.isTargetable() && self.overlaps(target) )

    {

    float currentDistance =

    Vector2.dst(self.getX(),self.getY(), target.getX(),target.getY());

    // 检查此目标是否更近

    if (currentDistance < closestDistance)

    {

    self.setDropTarget(target);

    closestDistance = currentDistance;

    }

    }

    }

    ```


    此外，为了配合 `dropTarget` 变量，在 `DragAndDropActor` 类中添加以下方法：


    ```

    public boolean hasDropTarget()

    {  return (dropTarget != null);  }

    public void setDropTarget(DropTargetActor dt)

    {  dropTarget = dt;  }

    public DropTargetActor getDropTarget()

    {  return dropTarget;  }

    ```


    `DragAndDropActor` 类还有几个小的补充。首先，你将添加禁用拖拽功能的能力。如果你想锁定一个对象的位置，这会很有用。例如，在单人纸牌游戏中，一旦一张牌被移动到正确的牌堆上，你就不希望再将它移开。为此，在
    `DragAndDropActor` 类中添加以下变量声明：


    ```

    private boolean draggable;

    ```


    在类构造函数中通过添加以下代码行来初始化该值：


    ```

    draggable = true;

    ```


    添加以下方法来配合 `draggable` 变量：


    ```

    public void setDraggable(boolean d)

    {  draggable = d;  }

    public boolean isDraggable()

    {  return draggable;  }

    ```


    在 `InputListener` 的 `touchDown` 方法开头，添加以下代码。当 `draggable` 被设置为 `false` 时，这段代码将通过返回
    `false` 来取消拖拽动作，并阻止 `touchDragged` 和 `touchUp` 方法被激活。


    ```

    if ( !self.isDraggable() )

    return false;

    ```


    接下来的补充将是一些便捷方法，用于自动将此演员移动到另一个演员的中心，或者将演员移动回其原始位置（在拖拽开始时的位置）。例如，在单人纸牌游戏中，当将一张牌放置到正确的牌堆上时，你希望它在该牌堆上居中。相反，当将一张牌放置到错误的牌堆上时，你希望它返回原始位置，以免遮挡牌堆。为此，首先在
    `DragAndDropActor` 类中添加以下 `import` 语句。`Interpolation` 类用于修改演员的移动，使动作在开始和结束时平滑过渡。


    ```

    import com.badlogic.gdx.math.Interpolation;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    在类中添加以下变量声明：


    ```

    private float startPositionX;

    private float startPositionY;

    ```


    在 `InputListener` 的 `touchDown` 方法中，在设置 `grabOffsetX` 和 `grabOffsetY` 的值之后，添加以下代码：


    ```

    self.startPositionX = self.getX();

    self.startPositionY = self.getY();

    ```


    最后，在类中添加以下方法。`Interpolation` 对象用于在运动开始和结束时减慢移动速度，使其看起来更自然。


    ```

    public void moveToActor(BaseActor other)

    {

    float x = other.getX() + (other.getWidth()  - this.getWidth())  / 2;

    float y = other.getY() + (other.getHeight() - this.getHeight()) / 2;

    addAction( Actions.moveTo(x,y, 0.50f, Interpolation.pow3) );

    }

    public void moveToStart()

    {

    addAction( Actions.moveTo(startPositionX, startPositionY, 0.50f, Interpolation.pow3)
    );

    }

    ```


