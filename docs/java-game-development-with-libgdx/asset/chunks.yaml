- fmt: '### Creating the Tilemap


    To begin, run the Tiled map-editor program. Once it starts, from the File menu,
    select New, then New Map, and the general map settings window will appear. In
    the area labeled Map size, change the Width to 26 tiles and the Height to 20 tiles,
    and change the Tile size Width and Height settings to 32 px. This will create
    a tilemap that is 832 by 640 pixels; later on, you will change the size of the
    window to match. Click on the button labeled Save As . . . and navigate to your
    project’s `assets` directory; save the file with the name `map.tmx`. The tilemap
    will be initialized, and an empty grid of squares will appear in the center of
    the screen, with the Properties panel to the left, the Layers panel to the upper-right,
    and the Tileset panel to the lower-right.


    From the Layer menu, add a new image layer, then add a new object layer. For this
    project, the default tile layer will not be needed, so you can right-click Tile
    Layer 1 in the list of layers and select Remove Layer.


    To add the background image, select Image Layer 1 in the list of layers. In the
    Properties panel, in the row with the property named Image, click on the area
    to the right in the value column, and a button labeled “`...`” will appear. Click
    this button and select the image `large-space.png` from your `assets` directory.
    When you are finished, the image will be displayed in the central area. However,
    since the background image is dark, it is difficult to see the grid of squares.
    To increase the visibility of the grid squares, you can decrease the opacity of
    the image using the slider near the top of the Layers panel. (However, this also
    affects how the image appears in the actual game, so you will want to increase
    the opacity back to 100 percent after you are finished with the tilemap.)


    Next, you will need to create two tilesets (one for walls, one for bricks) for
    use in the object layer. In the Tileset panel area, click on the icon to create
    a new tileset. In the New Tileset window that appears, click Browse, select the
    image `wall-square.png` from the `assets` directory, change both the tile width
    and tile height values to 32 px, check the box for “Embed in map,” and click the
    OK button. Then, in the Tileset panel, click on the icon to edit the tileset properties.
    In the new tab that appears, click on the gray square to select it. At the bottom
    of the Properties panel, click the plus icon to add a new custom property; enter
    `name` for the property name, and enter `Wall` in the value column. When you are
    finished, click on the tab labeled `map.tmx` to return to the tilemap.


    Next, you will create the brick tileset, which is slightly more involved, as the
    tiles contain additional data. Create a new tileset as before, this time using
    the image file `brick-colors.png` and changing the tile width to 64 px and tile
    height to 32 px. Click the icon to edit the tileset properties. Click on one of
    the brick tiles to select it, then hold down the Ctrl key and click on each of
    the remaining brick tiles so that they are all selected, allowing you to enter
    properties for all of them at once. Click on the plus icon to add a new custom
    property; enter `name` for the property name, and enter `Brick` in the value column.
    Then, click on the plus icon again to add a new custom property called `color`;
    do not enter any values yet. Instead, click on the red brick tile so that it is
    the only tile selected, and in the value column next to `color`, enter `red`.
    Repeat this process to enter values for each of the remaining bricks; the code
    that follows in the next section assumes you will assign the values `orange`,
    `yellow`, `green`, `blue`, `purple`, `white`, and `gray` to the bricks of the
    corresponding color.


    Now, you are ready to return to the tilemap. First, make sure that Object Layer
    1 is selected in the Layers panel. Select the wall-square tileset and click on
    the single tile from that set. Press `T` to activate the Insert Tile tool and
    then click on the top-left grid square in the tilemap area. To change the size
    of this object, press the S key to activate the Select Objects tool. If the object
    tile were already selected, double-sided arrows would appear by the edges and
    corners of the tile; if the object tile were not already selected, if you clicked
    on it these arrows would appear. Clicking and dragging an arrow will change the
    size of the object; resize this tile until it covers the top two rows of the tilemap.
    Press T to switch to the Insert Tile tool again and place a wall-square tile in
    the bottom-left corner. Press S to switch to the Select Objects tool and increase
    the height of the tile until it reaches the previously added tile, thus forming
    the left wall for the game. Repeat this process to form the right wall for the
    game. When you are finished, the walls should appear similar to Figure [10-11](#A352797_2_En_10_Chapter.html#Fig11).


    ![A352797_2_En_10_Fig11_HTML.jpg](A352797_2_En_10_Fig11_HTML.jpg)


    Figure 10-11. Adding walls to the tilemap


    Next, you will design and arrange the bricks for the level. Switch to the brick-colors
    tileset, press T to activate the Insert Tile tool, and add bricks to the tilemap
    any way you like (remembering to leave space near the bottom edge of the tilemap
    for the paddle). One possible such arrangement is shown in Figure [10-12](#A352797_2_En_10_Chapter.html#Fig12).


    ![A352797_2_En_10_Fig12_HTML.jpg](A352797_2_En_10_Fig12_HTML.jpg)


    Figure 10-12. Adding bricks to the tilemap


    You will use a rectangle object to specify the starting position of the paddle.
    Press R to activate the Insert Rectangle tool and draw a small rectangle near
    the center-bottom of the screen. While this rectangle is selected, click the plus
    icon in the Properties panel to add a custom property called `name` with value
    `Start`. Finally, if you changed the opacity of the image layer previously, change
    it back to 100 percent. Save your work and close the Tiled map-editor program.'
