    ## Recreating the Actor/Stage Framework


    To facilitate and accelerate the development of future projects, in this section
    you’ll write some classes that function similarly to the `BaseActor` and `Stage`
    classes, but instead store data structures and methods useful for three-dimensional
    graphics. For convenience, you’ll continue adding code to the previously created
