- fmt: "### Increasing Your Skill Set\n\nWhile you continue to develop games, you\
    \ should also consider broadening your overall skill set. A solid set of programming\
    \ skills is highly desirable, but game developers (especially those working independently\
    \ or in small studios) often need to be a jack-of-all-trades, especially in the\
    \ areas of graphics and audio. To get started in these areas, I recommend the\
    \ following software and tutorials:\n\n- **Inkscape**: `inkscape.org` – Software\
    \ for creating vector graphics, freely available. This website contains a list\
    \ of high-quality tutorials for all skill levels. Most relevant to our interests,\
    \ however, is a set of game-art tutorials written by Chris Hildenbrand, available\
    \ here: [`http://2d-game-art-tutorials.zeef.com/chris.hildenbrand`](http://2d-game-art-tutorials.zeef.com/chris.hildenbrand).\n\
    - **Ocenaudio**: `ocenaudio.com` – An easy, fast, and powerful audio editor great\
    \ for simple audio-editing tasks.\n- **Audacity**: `audacityteam.org` – A multitrack\
    \ audio editor and recorder, freely available. The Audacity manual contains an\
    \ extensive list of tutorials that will teach you all sorts of useful recording\
    \ and editing skills.\n\n### Recommended Reading\n\nIn addition to broadening\
    \ your skill set, broadening your knowledge base is also worthwhile. A variety\
    \ of books are available on topics related to game development that will help\
    \ you do exactly that. Of course, there are far too many to list here, and no\
    \ doubt I have omitted some high-quality titles. Nonetheless, this section lists\
    \ a few representative samples from across a range of fields, a cross-section\
    \ of topics, to give an indication of what’s available out there: game design,\
    \ literary aspects, history, and social impact:\n\n- **Fundamentals of Game Design\
    \ (3rd edition)**, by Ernest Adams (published 2013; ISBN 0321929675) – This book\
    \ discusses a variety of topics: concept development, game-play design, core mechanics,\
    \ user interfaces, storytelling, and balancing; exercises, worksheets, and case\
    \ studies are also included.\n- **The Ultimate Guide to Video Game Writing and\
    \ Design** by Flint Dille and John Zuur Platten (published 2008; ISBN 9781580650663)\
    \ – Topics covered include integrating story elements into a game, writing a game\
    \ script, creating design documentation, the creative process, team dynamics,\
    \ and business considerations.\n- **Vintage Games 2.0: An Insider Look at the\
    \ Most Influential Games of All Time**, by Matt Barton (published 2016; ISBN 1138899135)\
    \ – This book explores the history of some of the most influential video games\
    \ of all time, with a particular focus on their development, critical reception,\
    \ and impact on the industry.\n- **Reality Is Broken: Why Games Make Us Better\
    \ and How They Can Change the World** by Jane McGonigal (published 2011; ISBN\
    \ 9780143120612) – In this book, the author discusses theories from psychology,\
    \ cognitive science, sociology, and philosophy in the context of game playing\
    \ and explains how games can make us more productive and change the world for\
    \ the better.\n\nIt is also useful to stay abreast of current news and developments\
    \ in the game industry, as well as to hear the opinions, approaches, struggles,\
    \ and successes of your fellow game developers. For these purposes, there is no\
    \ better alternative to following blogs. The following are some particularly substantial\
    \ sites featuring regular blog postings (as well as additional useful information\
    \ and resources):\n\n- **Gamasutra**: [`www.gamasutra.com`](http://www.gamasutra.com)\
    \ – A website devoted to the art and business of making games that, among other\
    \ resources, contains curated lists of blog postings that touch on all aspects\
    \ of the industry.\n- **GameDev.net**: [`www.gamedev.net`](http://www.gamedev.net)\
    \ – A resource for developers of all fields and expertise, containing articles\
    \ and tutorials on technical, creative, and business aspects of game development.\n\
    - **HobbyGameDev**: [`www.hobbygamedev.com`](http://www.hobbygamedev.com) – Maintained\
    \ by Chris DeLeon (a professional video game developer, author, and instructor),\
    \ this regularly updated website contains articles, advice, tutorials, case studies,\
    \ interviews, and more.\n\n## Disseminating Your Games\n\nOnce you have designed\
    \ and created some games of your own, you should consider sharing them with others—after\
    \ all, games are meant to be played! This process will require you to package\
    \ your work in a playable format and find an audience of eager game enthusiasts.\n\
    \n### Packaging for Desktop Computers\n\nThe simplest way to share your games\
    \ is to create executable JAR files.\n\n1.  To do so, verify that your `launcher`\
    \ class contains a `main` method specified as follows (adjust the name and parameters\
    \ of your method to match this if necessary):\n\n    ```\n    public static void\
    \ main (String[] args)\n    ```\n\n2.  Then, from the BlueJ menu bar, choose **Project**\
    \ then **Create Jar File**; a small window appears. This window indicates that\
    \ the JAR file you create will be executable if the `main` class is specified.\
    \ That is exactly what you’re hoping to do! From the “Main Class” drop-down list,\
    \ select the name of your `launcher` class.\n3.  In addition, your executable\
    \ JAR file will require copies of all the LibGDX JAR files used by BlueJ when\
    \ developing your game. If you have been storing these files in a `+libs` folder\
    \ in your project directory, you may skip ahead to the next paragraph. If you\
    \ have been using an alternative approach, such as storing the LibGDX JAR files\
    \ in the BlueJ `userlibs` directory, then the section of the window labeled “Include\
    \ User Libraries” will include a list of names of JAR files, including those containing\
    \ the LibGDX classes. In this case, be sure to select the checkboxes next to all\
    \ of the LibGDX JAR files (the ones starting with “gdx”) before continuing.\n\
    4.  At this point, you can click the **Continue** button. A file directory appears,\
    \ allowing you to select a folder and asking you to specify a name for the JAR\
    \ file. It is normal to create the executable in a different location than the\
    \ source code.\n5.  Enter the name of your game and then click the **Create**\
    \ button. Since additional JAR files are required by your application, a directory\
    \ is created in the location you specified, and in that directory you will find\
    \ a file with the name of your game and the `.jar` extension; this directory should\
    \ also contain all the LibGDX JAR files from your BlueJ project’s `+libs` directory\
    \ (or those from the BlueJ `userlib` directory, if you have been using that setup)\
    \ or those that you selected from the **Create Jar File** window. All of these\
    \ JAR files must be located in the same directory to be able to run your game.\
    \ All the contents of the other folders contained in the BlueJ project directory\
    \ (such as the `assets` folder) are stored within your game’s JAR file.\n\nTo\
    \ run your game, all you need to do is to double-click your game’s JAR file, and\
    \ your game will start.[¹](#A352797_2_En_17_Chapter.html#Fn1) You can easily share\
    \ your game with others by sending them the set of files in this directory.[²](#A352797_2_En_17_Chapter.html#Fn2)\
    \ The one caveat is that in order to be able to run your game, potential users\
    \ must have Java installed on their computers. For those who don’t, you have two\
    \ main options:\n\n- You could inform users that they need to install Java and\
    \ direct them to the Java website, [`www.java.com`](http://www.java.com).\n- You\
    \ could use a third-party tool to convert your JAR files into native executable\
    \ files for various operating systems; one such tool is called JWrapper and is\
    \ available from [`www.jwrapper.com`](http://www.jwrapper.com)."
