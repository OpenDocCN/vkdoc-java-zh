    return belowSensor.overlaps(actor);

    }

    public boolean isOnSolid()

    {

    for (BaseActor actor : BaseActor.getList( getStage(), "Solid" ))

    {

    Solid solid = (Solid)actor;

    if ( belowOverlaps(solid) && solid.isEnabled() )

    return true;

    }

    return false;

    }

    ```


    跳跃功能将由以下方法处理，该方法也应添加到 `Koala` 类中：


    ```

    public void jump()

    {

    velocityVec.y = jumpSpeed;

    }

    ```


    由于跳跃是一个离散动作，它将从 `LevelScreen` 类中调用（类似于 Space Rocks 游戏中的射击动作）。为此，请在 `LevelScreen`
    类中添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.Input.Keys;

    ```


    然后，在 `LevelScreen` 类中添加以下方法：


    ```

    public boolean keyDown(int keyCode)

    {

    if (keyCode == Keys.SPACE)

    {

    if ( jack.isOnSolid() )

    {

    jack.jump();

    }

    }

    return false;

    }

    ```


    最后，回到 `Koala` 类，在 `act` 方法中，将用于设置动画的 `if-else` 语句替换为以下改进后的代码，该代码会决定使用三种动画（`stand`、`walk`
    或 `jump`）中的哪一种，并设置 `belowSensor` 的颜色，以便进行测试和可视化：


    ```

    if ( this.isOnSolid() )

    {

    belowSensor.setColor( Color.GREEN );

    if ( velocityVec.x == 0 )

    setAnimation(stand);

    else

    setAnimation(walk);

    }

    else

    {

    belowSensor.setColor( Color.RED );

    setAnimation(jump);

    }

    ```


    现在你可以再次测试游戏了。按下空格键（当考拉在地面上时）使其跳跃，并观察 `belowSensor` 矩形的颜色相应变化。尝试在考拉处于空中时按下空格键，以验证考拉在这种情况下无法跳跃。根据你在
    Tiled 地图编辑器中设计关卡的方式，你可能会发现需要调整考拉的跳跃力度或修改关卡设计。至此，你已经实现了平台游戏中最困难的部分。测试完成后，在 `Koala`
    类中将 `belowSensor` 的可见性设置为 false。在下一节中，你将添加各种供考拉交互的对象（除了地面之外）。


    ## 游戏世界对象


    现在，你将把注意力转向关卡设计。在 Tiled 地图编辑器程序中打开你的 `map.tmx` 文件。在图层面板中，选择对象图层 1，并在图块集面板中选择对象图块集选项卡。按
    T 键激活插入图块工具。图 11-6 展示了一个包含所有不同对象图块的最小关卡；图 11-7 显示了你的程序将如何渲染该特定地图。在描绘的关卡中，目标旗帜被红色锁块包围，玩家需要获得红色钥匙才能通过。玩家可以通过跳到左侧的跳板上，或者跳到草地砖块上再穿过平台来获取钥匙。沿途有供玩家收集的金币，以及一个可以收集的计时器，用于增加到达目标的时间。请注意，跳板和旗帜对象将大于单个图块，因此对象图块指示了对象出现位置的左下角。别忘了定期保存你的图块地图文件，以便你所做的更改能整合到游戏项目中。


