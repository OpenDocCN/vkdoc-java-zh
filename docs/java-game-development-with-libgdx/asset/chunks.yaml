    ## Summary and Next Steps


    In this chapter, while improving the quality of the Starfish Collector game, you
    have in fact created a robust foundation that will enable you to rapidly develop
    a variety of games throughout the rest of this book. You implemented value-based
    and image-based animations, the latter from either individual image files or a
    single spritesheet. You simulated realistic motion by writing a set of methods
    to perform physics-based calculations. You improved the accuracy of collision
    detection and learned how to simulate solid objects. You added support for working
    with lists of actors. You wrote methods for working with a bounded, enlarged game
    world. Finally, you refactored the code to enable the addition of multiple screens
    to the game.


    In order to practice your newfound skills and test your understanding of the framework,
    you should consider implementing additional features in the Starfish Collector
    game. For starters, you could add additional starfish and rocks throughout the
    enlarged level, perhaps laying out additional rocks to make collecting all the
    starfish more challenging. You could also consider adding enemies: sharks that
    are positioned around the level and cause the player to lose the game (and the
    turtle to be destroyed) on contact. Images of a shark and a “Game Over” message
    have been included with the assets for this chapter if you wish to try your hand
    at this addition. You may also want to consider adding a second level via a new
    class called `LevelScreen2`. For this addition, you would have to change the code
    in the `LevelScreen` class so that, after the player has collected all the starfish,
    a message appears (such as “Press ''C'' to continue”), and so that, in the `update`
    method, when the C key is pressed, the game sets the active screen to a new instance
    of the `LevelScreen2` class. Again, images that would be useful for this task
    have been included in the assets for this chapter.


    You probably have additional ideas for game features to add, such as a time limit
    to collect all the starfish. Some of these ideas will be easier to implement after
    user interfaces and text displays are covered in more detail in Chapter [5](#A352797_2_En_5_Chapter.html).
