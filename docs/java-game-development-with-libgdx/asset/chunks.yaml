    接下来，处理与固体对象（由 `Solid` 类表示）的碰撞。使用 `preventOverlap` 方法来阻止考拉穿过任何固体对象。一个需要解决的微妙问题是，当发生碰撞时，应如何调整考拉的速度。完全不调整速度会导致异常行为；例如，如果考拉下落并与地面碰撞，而垂直速度未设为零，那么重力会导致速度累积，最终考拉会在单帧内穿过固体对象，使其似乎从游戏中消失。然而，如果在所有碰撞中都将速度向量设为
