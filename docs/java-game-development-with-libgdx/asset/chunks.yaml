- fmt: '### Detecting Collisions


    Now that you’ve defined the collision polygons for the `BaseActor` class, there
    is still the matter of detecting when two polygons overlap. Unlike the `Rectangle`
    class, which has its own `overlaps` method, the `Polygon` class does not. Fortunately,
    another utility class provided by LibGDX, called `Intersector`, does have such
    a method. You will make use of this fact to create an `overlaps` method for the
    `BaseActor` class. First, you need to import the aforementioned class with the
    following statement:


    ```

    import com.badlogic.gdx.math.Intersector;

    ```


    Next, add the following method to the `BaseActor` class:


    ```

    public boolean overlaps(BaseActor other)

    {

    Polygon poly1 = this.getBoundaryPolygon();

    Polygon poly2 = other.getBoundaryPolygon();

    // initial test to improve performance

    if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

    return false;

    return Intersector.overlapConvexPolygons( poly1, poly2 );

    }

    ```


    Checking if two polygons overlap requires a lot of computation. Therefore, to
    improve performance, this method contains a preliminary check to see if the rectangles
    surrounding the polygons intersect (which is a much simpler calculation). If these
    much larger rectangles do not intersect, then it would be impossible for the polygons
    to intersect, and so the method can immediately return `false`. Otherwise, there
    is a possibility that the polygons could intersect, in which case the method returns
    the result of this more precise test, which is performed by the static method
    `overlapConvexPolygons` from the `Intersector` class.


    With this method available, you are ready to add interactivity to the Starfish
    Collector game. In the `constructor` methods of the `Turtle` and `Starfish` classes,
    add the following line of code (after the images have been loaded) so that each
    object uses an eight-sided collision polygon for improved accuracy:


    ```

    setBoundaryPolygon(8);

    ```


    Next, when the turtle overlaps the starfish, the following events should occur:


    - The starfish should fade out and then be removed from the stage.

    - A whirlpool effect should be created, centered on the starfish, and rendered
    semi-transparent so that the starfish can be seen beneath it.

    - After the starfish fades, a “You Win” message should appear in the center of
    the screen, initially transparent and then slowly fading in.


    Recall that the `Actor` method `setPosition` actually sets the bottom-left corner
    of an `Actor` object to a given location. In order to center an `Actor` at a given
    location, you would have shift it from this location by half its width along the
    x direction and half its width along the y direction. Since this calculation will
    be needed frequently in the future, add the following methods to the `BaseActor`
    class:


    ```

    public void centerAtPosition(float x, float y)

    {

    setPosition( x - getWidth()/2 , y - getHeight()/2 );

    }

    public void centerAtActor(BaseActor other)

    {

    centerAtPosition( other.getX() + other.getWidth()/2 , other.getY() + other.getHeight()/2
    );

    }

    ```


    The transparency of an `Actor` object can be changed by altering the alpha value
    of the color associated with it. To simplify this process now and for future projects,
    add the following method to the `BaseActor` class:


    ```

    public void setOpacity(float opacity)

    {

    this.getColor().a = opacity;

    }

    ```


    Using the methods just created together with `Action` objects, you can implement
    the items in the preceding list. To ensure that the starfish can only be “collected”
    once (and also to avoid actions’ being repeatedly added unnecessarily), in the
    `Starfish` class add the following variable declaration:


    ```

    private boolean collected;

    ```


    In the `constructor` method, initialize this variable as follows:


    ```

    collected = false;

    ```


    Next, add the following two methods to the `Starfish` class: `isCollected`, which
    returns the value of the `collected` variable, and `collect`, which sets `isCollected`
    to `true` and applies an animated fading-out effect, after which it is removed
    from the stage.


    ```

    public boolean isCollected()

    {

    return collected;

    }

    public void collect()

    {

    collected = true;

    clearActions();

    addAction( Actions.fadeOut(1) );

    addAction( Actions.after( Actions.removeActor() ) );

    }

    ```


    Next, you will return your attention to the `StarfishCollector` class. First,
    add the following `import` statement:


    ```

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    Next, in the `update` method of the `StarfishCollector` class (which is currently
    empty), add the following code:


    ```

    if (turtle.overlaps(starfish) && !starfish.isCollected() )

    {

    starfish.collect();

    Whirlpool whirl = new Whirlpool(0,0, mainStage);

    whirl.centerAtActor( starfish );

    whirl.setOpacity(0.25f);

    BaseActor youWinMessage = new BaseActor(0,0,mainStage);

    youWinMessage.loadTexture("assets/you-win.png");

    youWinMessage.centerAtPosition(400,300);

    youWinMessage.setOpacity(0);

    youWinMessage.addAction( Actions.delay(1) );

    youWinMessage.addAction( Actions.after( Actions.fadeIn(1) ) );

    }

    ```


    The first part of this block of code deals with the starfish: the `collect` method
    marks the starfish as having been collected and applies the effect previously
    described. The next part of the code creates a `Whirlpool` object, centers it
    at the location of the starfish, and makes it mostly transparent (as is the case
    with real water). Finally, a new `BaseActor` is created that contains an image
    of the text “You Win,” is centered on the screen, and fades in after a delay of
    one second (corresponding to the one second during which the starfish is fading
    out). When you are finished adding this code, this is another good opportunity
    to run the program and verify that everything works as expected.'
