- fmt: '### Integrating Particle Effects into Gameplay


    The next step is to replace the explosion effects and the thruster fire with the
    corresponding particle effects, as seen in Figure [15-7](#A352797_2_En_15_Chapter.html#Fig7).


    ![A352797_2_En_15_Fig7_HTML.jpg](A352797_2_En_15_Fig7_HTML.jpg)


    Figure 15-7. The Space Rocks game with particle effects added


    To begin, you will extend the `ParticleActor` class to create these effects. Create
    a new class called `ExplosionEffect` with the following code:


    ```

    public class ExplosionEffect extends ParticleActor

    {

    public ExplosionEffect()

    {

    super("assets/explosion.pfx", "assets/");

    }

    }

    ```


    There are three times when explosion effects should be created: when a laser collides
    with a rock, when a rock collides with the shields, and when a rock collides with
    the spaceship. First, in the `update` method of the `LevelScreen` class, locate
    the block of code where the spaceship is removed from the game and replace these
    two lines of code


    ```

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(spaceship);

    ```


    with the following:


    ```

    ExplosionEffect boom = new ExplosionEffect();

    boom.centerAtActor( spaceship );

    boom.start();

    mainStage.addActor(boom);

    ```


    Next, locate the two blocks of code where a rock is removed from the game (when
    colliding with the shields or with a laser) and, in both cases, replace these
    two lines of code


    ```

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(rockActor);

    ```


    with the following:


    ```

    ExplosionEffect boom = new ExplosionEffect();

    boom.centerAtActor( rockActor );

    boom.start();

    mainStage.addActor(boom);

    ```


    To integrate the thruster effect, create a new class called `ThrusterEffect` with
    the following code:


    ```

    public class ThrusterEffect extends ParticleActor

    {

    public ThrusterEffect()

    {

    super("assets/thruster.pfx", "assets/");

    }

    }

    ```


    Then, in the `Spaceship` class, remove all code containing a reference to the
    `thrusters` object: the class variable declaration, the code in the constructor
    used to initialize it, and the two lines of code in the `act` method that set
    the visibility of the thrusters. Then, add the following variable declaration:


    ```

    private ThrusterEffect thrusterEffect;

    ```


    In the `constructor` method, add the following code to set up and correctly position
    the effect:


    ```

    thrusterEffect = new ThrusterEffect();

    thrusterEffect.setPosition(0,32);

    thrusterEffect.setRotation(90);

    thrusterEffect.setScale(0.25f);

    addActor(thrusterEffect);

    ```


    Finally, in the `act` method, change the `if`-`else` statement that checks if
    the up arrow key is pressed to the following:


    ```

    if (Gdx.input.isKeyPressed(Keys.UP))

    {

    accelerateAtAngle( getRotation() );

    thrusterEffect.start();

    }

    else

    {

    thrusterEffect.stop();

    }

    ```


    With this addition, the modifications to the Space Rocks game are complete. Test
    out your project; the gameplay should be the same as before, with improved special
    effects! In the next section, you will learn another technique for creating different
    types of special effects and try them out in the Starfish Collector game.


    ## Shader Programming


    In this section, you will learn about shaders: programs designed to run on a graphics
    processing unit (GPU) that can be used to create sophisticated visual effects.
    Similar to the central processing unit in a computer, a GPU is specialized circuitry
    designed for accelerated image processing and rendering. All modern video games
    and multimedia software use shaders to leverage the power of the GPU, which uses
    a parallel architecture with thousands of cores running tasks simultaneously.
    LibGDX (more specifically, the `SpriteBatch` class) creates and uses shader programs
    in the background to render graphics efficiently. Shader programs use OpenGL (Open
    Graphics Library), a cross-platform application-programming interface for drawing
    2D and 3D graphics that uses a syntax similar to the C programming language.


    Rendering graphics involves processing lots of data, which is grouped into a data
    structure called a vertex. Informally, you can think of a vertex as a point in
    space with some associated information. A vertex stores the coordinates of its
    position and additional data as needed, such as an associated color or texture
    coordinates, which are used to determine a corresponding location on an image.
    When rendering an object (such as a square that displays an image), the vertex
    data is sent to buffers on the GPU for high-speed access, which is processed through
    the following set of stages, known as the graphics pipeline: [²](#A352797_2_En_15_Chapter.html#Fn2)


    - **Vertex Processing**: runs a program called the vertex shader, which can perform
    geometric transformations (translation, rotation, and scaling) on each vertex
    (typically using matrix multiplication) and sends any needed data along the pipeline.

    - **Rasterizing**: groups vertices into sets (such as triangles) and converts
    the corresponding area into fragments, data structures that correspond to pixels
    on the display. Each fragment interpolates and stores data from the vertex shader.
    For example, the color stored in a fragment that corresponds to the point in the
    exact center of a triangle will be the average of the colors stored in the three
    vertices of the triangle. All the fragments are sent to the next stage of the
    pipeline.

    - **Fragment Processing**: runs a program called the fragment shader to determine
    the color of the associated pixel that will be displayed. This can take into account
    associated colors, textures, and transparency. Image filters and effects can be
    created here, such as color tinting, blurring, or glowing effects.


    After these stages are complete, the final image data is available for the display.
    In the sections that follow, you will learn about the default shader programs
    provided by LibGDX, and how to create your own fragment shaders and incorporate
    them in the Starfish Collector game. In particular, you will create a grayscale
    filter, a colored border around an image, blurred images, a glowing effect, and
    an animated wave-like distortion.'
