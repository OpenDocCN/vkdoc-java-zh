    ### 将粒子效果融入游戏玩法


    下一步是用相应的粒子效果替换爆炸效果和推进器火焰，如图 15-7 所示。


    ![A352797_2_En_15_Fig7_HTML.jpg](img/A352797_2_En_15_Fig7_HTML.jpg)


    图 15-7.


    添加了粒子效果的《太空岩石》游戏


    首先，你将扩展 `ParticleActor` 类来创建这些效果。创建一个名为 `ExplosionEffect` 的新类，代码如下：


    ```

    public class ExplosionEffect extends ParticleActor

    {

    public ExplosionEffect()

    {

    super("assets/explosion.pfx", "assets/");

    }

    }

    ```


    爆炸效果应在三种情况下创建：激光与岩石碰撞时、岩石与护盾碰撞时、以及岩石与飞船碰撞时。首先，在 `LevelScreen` 类的 `update` 方法中，找到将飞船从游戏中移除的代码块，并将这两行代码


    ```

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(spaceship);

    ```


    替换为以下内容：


    ```

    ExplosionEffect boom = new ExplosionEffect();

    boom.centerAtActor( spaceship );

    boom.start();

    mainStage.addActor(boom);

    ```


    接下来，找到将岩石从游戏中移除的两个代码块（与护盾或激光碰撞时），在这两处都将这两行代码


    ```

    Explosion boom = new Explosion(0,0, mainStage);

    boom.centerAtActor(rockActor);

    ```


    替换为以下内容：


    ```

    ExplosionEffect boom = new ExplosionEffect();

    boom.centerAtActor( rockActor );

    boom.start();

    mainStage.addActor(boom);

    ```


    为了集成推进器效果，创建一个名为 `ThrusterEffect` 的新类，代码如下：


    ```

    public class ThrusterEffect extends ParticleActor

    {

    public ThrusterEffect()

    {

    super("assets/thruster.pfx", "assets/");

    }

    }

    ```


    然后，在 `Spaceship` 类中，删除所有引用 `thrusters` 对象的代码：类变量声明、构造函数中用于初始化它的代码，以及 `act` 方法中设置推进器可见性的两行代码。接着，添加以下变量声明：


    ```

    private ThrusterEffect thrusterEffect;

    ```


    在 `constructor` 方法中，添加以下代码来设置并正确定位该效果：


    ```

    thrusterEffect = new ThrusterEffect();

    thrusterEffect.setPosition(0,32);

    thrusterEffect.setRotation(90);

    thrusterEffect.setScale(0.25f);

    addActor(thrusterEffect);

    ```


    最后，在 `act` 方法中，将检查向上箭头键是否按下的 `if`-`else` 语句修改为以下内容：


    ```

    if (Gdx.input.isKeyPressed(Keys.UP))

    {

    accelerateAtAngle( getRotation() );

    thrusterEffect.start();

    }

    else

    {

    thrusterEffect.stop();

    }

    ```


    添加此内容后，对《太空岩石》游戏的修改就完成了。测试你的项目；游戏玩法应与之前相同，但特效得到了改进！在下一节中，你将学习另一种创建不同类型特效的技术，并在《海星收集者》游戏中尝试它们。


    ## 着色器编程


    在本节中，你将学习着色器：一种设计用于在图形处理单元（GPU）上运行的程序，可用于创建复杂的视觉效果。与计算机中的中央处理单元类似，GPU 是一种专门用于加速图像处理和渲染的电路。所有现代视频游戏和多媒体软件都使用着色器来利用
    GPU 的强大功能，GPU 采用并行架构，拥有数千个核心同时运行任务。LibGDX（更具体地说，`SpriteBatch` 类）在后台创建并使用着色器程序来高效渲染图形。着色器程序使用
    OpenGL（开放图形库），这是一个用于绘制 2D 和 3D 图形的跨平台应用程序编程接口，其语法类似于 C 编程语言。


    渲染图形涉及处理大量数据，这些数据被分组到一种称为顶点的数据结构中。通俗地说，你可以将顶点视为空间中带有一些关联信息的点。顶点存储其位置的坐标以及根据需要存储的附加数据，例如关联的颜色或纹理坐标，这些坐标用于确定图像上的对应位置。当渲染一个对象（例如显示图像的方形）时，顶点数据被发送到
    GPU 上的缓冲区以实现高速访问，然后通过以下一系列阶段（称为图形管线）进行处理：²


    *   **顶点处理**：运行一个称为顶点着色器的程序，该程序可以对每个顶点执行几何变换（平移、旋转和缩放）（通常使用矩阵乘法），并将任何需要的数据沿管线传递。

    *   **光栅化**：将顶点分组为集合（例如三角形），并将相应区域转换为片段，这些片段是与显示器上的像素对应的数据结构。每个片段对来自顶点着色器的数据进行插值和存储。例如，与三角形正中心点对应的片段中存储的颜色将是三角形三个顶点存储颜色的平均值。所有片段都被发送到管线的下一阶段。

    *   **片段处理**：运行一个称为片段着色器的程序，以确定将要显示的关联像素的颜色。这可以考虑关联的颜色、纹理和透明度。可以在此处创建图像滤镜和效果，例如颜色着色、模糊或发光效果。


    这些阶段完成后，最终的图像数据即可用于显示。在接下来的章节中，你将了解 LibGDX 提供的默认着色器程序，以及如何创建自己的片段着色器并将其集成到《海星收集者》游戏中。具体来说，你将创建一个灰度滤镜、一个图像周围的彩色边框、模糊图像、发光效果以及一个动画波浪状扭曲效果。

    '
- fmt: '### Default Shaders


    Before diving into the actual code of the default vertex and fragment shaders
    used by LibGDX, a brief overview of the relevant syntax and language will be provided.
    This is in no way meant to be a comprehensive introduction; such an undertaking
    is worthy of an entire book in its own right!


    Many of the variable types available in OpenGL have similar counterparts in Java:


    - `float`, `int`, and `bool` refer to floating-point numbers, integers, and Boolean
    values (one-bit integers), respectively.

    - `vec2`, `vec3`, and `vec4` refer to vectors with two, three, and four components.
    These are usually used to store position coordinates, although `vec4` is also
    used to store color values (red, green, blue, and alpha/transparency). In addition,
    the arithmetic operators (`+`, `-`, `*`, `/`) can all be used on instances of
    these types.

    - `mat4` refers to a 4-by-4 matrix, which typically encodes geometric transformations
    (which are automatically generated for you by the LibGDX libraries).

    - `sampler2D` refers to a two-dimensional grid of values, usually the color data
    associated with an image.


    Many of the keywords and commands are also used in OpenGL, such as `if`-`else`
    statements, `for` and `while` loops, and logical operators (`&&` for “and,” `||`
    for “or,” `!` for “not”). There are also many mathematical functions available,
    such as `sqrt`, `pow`, `sin`, `cos`, `abs`, `round`, `floor`, `max`, and `min`,
    each of which corresponds directly to a function in the Java `Math` class. One
    special OpenGL function that you will see repeatedly is called `texture2D`, which
    takes a `sampler2D` and a `vec2` as input and returns the data from the sample
    (the color from the image) at the position specified by the vector; if the vector
    does not correspond to an exact pixel from the image, then the color will be interpolated
    from the colors of nearby pixels.


    Both the vertex shader and the fragment shader must contain a single function
    called `main` with a `void` return type. (You can write additional “helper” functions
    with non-`void` return values if you wish, but that topic will not be covered
    here.) The vertex shader must assign a `vec4` value to the variable `gl_Position`,
    which represents the final position of the vertex. The fragment shader must assign
    a `vec4` value to the variable `gl_FragColor`, which represents the final color
    of the associated pixel.


    You will also see variables declared externally to the `main` function that, in
    addition to having a specific data type, have one of three additional qualifiers
    specified:


    - `attribute`: refers to a property of an individual vertex and may only appear
    in a vertex shader program. For example, the position of a vertex must be qualified
    as an attribute, since this data will be different for each vertex.

    - `varying`: used for data that is sent from the vertex shader to the fragment
    shader. Any varying variable declaration in the vertex shader should also appear
    in the associated fragment shader. Values must be assigned to these variables
    in the vertex shader, and these variables are read-only (may not be modified)
    in the fragment shader. The fragment shader will interpolate the values of these
    variables from the values assigned to the vertices.

    - `uniform`: refers to global values that are the same for each vertex of an object.
    For example, the texture data associated with an object should be qualified as
    uniform, since this data is the same for all vertices of an object. Similarly,
    geometric-transformation matrices are uniform variables, as all vertices in an
    object will be translated, rotated, or scaled in the same way or by the same amounts.
    Uniform variables can appear in either the vertex shader or the fragment shader,
    as necessary.


    With this background, you are ready to examine the default shaders provided by
    LibGDX. First is the code for the default vertex shader. In this code, three attribute
    vectors are set up to access the position, color, and texture coordinates of each
    vertex. A uniform matrix stores the geometric transformation data, as this is
    the same for all vertices. Two varying variables are created to forward particular
    data (the color and texture coordinates) along to the fragment shader, where it
    will be needed to determine pixel colors. Note the variable naming convention
    used by LibGDX: attribute variables are prefaced by `a_`, uniform variables by
    `u_`, and varying variables by `v_`. (This convention will be used throughout
    the chapter.) Finally, note that the `main` function assigns values to the varying
    variables and calculates `gl_Position` by multiplying the transformation matrix
    by the original position of the vertex.


    ```

    attribute vec4 a_position;

    attribute vec4 a_color;

    attribute vec2 a_texCoord0;

    uniform mat4 u_projTrans;

    varying vec4 v_color;

    varying vec2 v_texCoords;

    void main()

    {

    v_color = a_color;

    v_texCoords = a_texCoord0;

    gl_Position = u_projTrans * a_position;

    }

    ```


    Next is the code for the default fragment shader. In this code, there are two
    varying variables, which correspond to the varying variables in the vertex shader.
    There is also a uniform variable that stores the texture data. In the `main` function,
    the `texture2D` function (described earlier) is used to obtain color data from
    the associated texture. This is multiplied by the color passed from the vertex
    shader, which has the effect of tinting the image by whatever color was assigned
    to the actor via the `setColor` method. (The default color associated with an
    actor is white, and since the red, green, and blue components of white are all
    equal to 1.0, multiplying by this color results in no change to the original image.)
    The result is assigned to the `gl_FragColor` variable, which will be the final
    color of the associated pixel.


    ```

    varying vec4 v_color;

    varying vec2 v_texCoords;

    uniform sampler2D u_texture;

    void main()

    {

    gl_FragColor = v_color * texture2D(u_texture, v_texCoords);

    }

    ```


    Now that you know what the default shader programs are, you will see how to incorporate
    them into your game projects.'
