- fmt: '`TilemapActor`类的构造函数需要两个输入：要打开的瓦片地图文件名以及该演员应添加到的`Stage`。构造函数首先将瓦片地图文件加载到`TiledMap`对象中。之后，可以访问地图的属性。一旦确定了瓦片数量和瓦片大小，就可以计算游戏世界的尺寸，并使用`BaseActor`的`setWorldBounds`方法设置世界的边界。然后，会初始化更多对象：一个相机和一个渲染器，它们用于绘制瓦片地图。`draw`方法保持瓦片地图的相机与舞台相机位置一致，然后渲染瓦片地图。对`Batch`类方法`end`和`begin`的奇怪调用是必要的，以确保地图在排队渲染其他演员之前立即被渲染，否则地图可能会（错误地）出现在舞台上其他对象的上方。


    接下来，你将编写检索存储在`TiledMap`对象中的对象列表所需的方法。与Tiled地图编辑器程序一样，它包含一个图层列表（由`MapLayer`类表示），每个图层包含一个对象列表（由`MapObject`类表示）。以下每个方法都会遍历这些列表，检查每个对象是否为特定类型（`RectangleMapObject`或`TiledMapTileMapObject`）。如果是，将进一步分析属性集（由`MapProperties`类表示）。你可以通过`containsKey`方法检查此集合中是否存在具有特定名称的自定义属性，并通过`get`方法检索其值（尽管此方法的返回类型为`Object`，结果通常需要强制转换为预期的类）。首先，你将编写两个方法中较简单的一个，即`getRectangleList`，它检查包含名为`name`且具有特定值（存储在变量`propertyName`中）的自定义属性的矩形。在`TilemapActor`类中，添加以下方法：


    ```

    public ArrayList getRectangleList(String propertyName)

    {

    ArrayList list = new ArrayList();

    for ( MapLayer layer : tiledMap.getLayers() )

    {

    for ( MapObject obj : layer.getObjects() )

    {

    if ( !(obj instanceof RectangleMapObject) )

    continue;

    MapProperties props = obj.getProperties();

    if ( props.containsKey("name") && props.get("name").equals(propertyName) )

    list.add(obj);

    }

    }

    return list;

    }

    ```


    接下来，你将编写一个类似的方法`getTileList`，它对瓦片对象执行类似的检查。这个过程稍微复杂一些，因为一个瓦片对象有两个关联的`MapProperty`对象：默认值（在关联的瓦片中指定）和非默认值（通过前面`getRectangleList`方法中看到的方式访问）。要获取包含默认值的属性集，必须将地图对象强制转换为`TiledMapTileMapObject`。然后，可以通过`getTile`方法访问原始瓦片，再通过`getProperties`方法访问其属性。类名存储在瓦片的属性集中。如果`name`字段存在且与`propertyName`变量中的值匹配，则将该对象添加到列表中。然而，还有一个额外的步骤：必须将图块集中存在但地图对象属性集中不存在的任何属性复制过来（这可以通过`while`循环实现）。该方法的代码如下：


    ```

    public ArrayList getTileList(String propertyName)

    {

    ArrayList list = new ArrayList();

    for ( MapLayer layer : tiledMap.getLayers() )

    {

    for ( MapObject obj : layer.getObjects() )

    {

    if ( !(obj instanceof TiledMapTileMapObject) )

    continue;

    MapProperties props = obj.getProperties();

    // Default MapProperties are stored within associated Tile object

    // Instance-specific overrides are stored in MapObject

    TiledMapTileMapObject tmtmo = (TiledMapTileMapObject)obj;

    TiledMapTile t = tmtmo.getTile();

    MapProperties defaultProps = t.getProperties();

    if ( defaultProps.containsKey("name") &&

    defaultProps.get("name").equals(propertyName) )

    list.add(obj);

    // get list of default property keys

    Iterator propertyKeys = defaultProps.getKeys();

    // iterate over keys; copy default values into props if needed

    while ( propertyKeys.hasNext() )

    {

    String key = propertyKeys.next();

    // check if value already exists; if not, create property with default value

    if ( props.containsKey(key) )

    {

    continue;

    }

    else

    {

    Object value = defaultProps.get(key);

    props.put( key, value );

    }

    }

    }

    }

    return list;

    }

    ```


    添加此方法后，`TilemapActor`类就完成了，可以集成到你的项目中！'
  raw: 'The `TilemapActor` class constructor requires two inputs : the name of the
    tilemap file to open and the `Stage` to which this actor should be added. The
    constructor then begins by loading the tilemap file into a `TiledMap` object.
    After this, the properties of the map can be accessed. Once the number of tiles
    and the tile size are determined, the dimensions of the game world can be calculated
    and the boundary of the world is set using the `BaseActor` method `setWorldBounds`.
    Then, a few more objects are initialized: a camera and a renderer, which are used
    when drawing the tilemap. The `draw` method keeps the tilemap’s camera in the
    same position as the stage’s camera and then renders the tilemap. The strange
    calls to the `Batch` class methods `end` and `begin` are necessary to force the
    map to be rendered immediately before queueing additional actors to be rendered,
    otherwise the map may (incorrectly) appear on top of other objects on the stage.


    Next, you will write the methods needed to retrieve the lists of objects stored
    in the `TiledMap` object. Just as is the case with the Tiled map-editor program,
    it contains a list of layers (represented by the `MapLayer` class), each of which
    contains a list of objects (represented by the `MapObject` class). Each of the
    following methods will iterate over these lists, checking whether each object
    is of a certain type (either `RectangleMapObject` or `TiledMapTileMapObject`).
    If so, the set of properties (represented by the `MapProperties` class) will be
    analyzed further. You can check if a custom property with a certain name exists
    in this set via the `containsKey` method, and you can retrieve its value via the
    `get` method (although this method has return type `Object`, and the results will
    often need to be cast to the intended class). To begin, you will write the simpler
    of the two methods, `getRectangleList` , which checks for rectangles that contain
    a custom property called `name` with a particular value (stored in the variable
    `propertyName`). In the `TilemapActor` class, add the following method:


    ```

    public ArrayList getRectangleList(String propertyName)

    {

    ArrayList list = new ArrayList();

    for ( MapLayer layer : tiledMap.getLayers() )

    {

    for ( MapObject obj : layer.getObjects() )

    {

    if ( !(obj instanceof RectangleMapObject) )

    continue;

    MapProperties props = obj.getProperties();

    if ( props.containsKey("name") && props.get("name").equals(propertyName) )

    list.add(obj);

    }

    }

    return list;

    }

    ```


    Next, you will write a similar method, `getTileList` , which performs a similar
    check on tile objects. This process is slightly more complicated, since a tile
    object has two associated `MapProperty` objects : the default values, which are
    specified in the associated tile, and the non-default values, which are accessed
    as seen earlier in the `getRectangleList` method. To get the set of properties
    containing default values, the map object must be cast into a `TiledMapTileMapObject`.
    Then, the original tile can be accessed via the `getTile` method , and then its
    properties can be accessed via the `getProperties` method as seen before. The
    class name is stored in the tile’s property set. If the `name` field exists and
    matches the value in the `propertyName` variable, then the object is added to
    the list. However, one additional step remains: any of the properties in the tileset
    that do not exist in the map object’s property set must be copied over (which
    can be implemented with a `while` loop). The code for this method is as follows:


    ```

    public ArrayList getTileList(String propertyName)

    {

    ArrayList list = new ArrayList();

    for ( MapLayer layer : tiledMap.getLayers() )

    {

    for ( MapObject obj : layer.getObjects() )

    {

    if ( !(obj instanceof TiledMapTileMapObject) )

    continue;

    MapProperties props = obj.getProperties();

    // Default MapProperties are stored within associated Tile object

    // Instance-specific overrides are stored in MapObject

    TiledMapTileMapObject tmtmo = (TiledMapTileMapObject)obj;

    TiledMapTile t = tmtmo.getTile();

    MapProperties defaultProps = t.getProperties();

    if ( defaultProps.containsKey("name") &&

    defaultProps.get("name").equals(propertyName) )

    list.add(obj);

    // get list of default property keys

    Iterator propertyKeys = defaultProps.getKeys();

    // iterate over keys; copy default values into props if needed

    while ( propertyKeys.hasNext() )

    {

    String key = propertyKeys.next();

    // check if value already exists; if not, create property with default value

    if ( props.containsKey(key) )

    {

    continue;

    }

    else

    {

    Object value = defaultProps.get(key);

    props.put( key, value );

    }

    }

    }

    }

    return list;

    }

    ```


    With this addition, the `TilemapActor` class is complete and is ready to be integrated
    into your project!'
