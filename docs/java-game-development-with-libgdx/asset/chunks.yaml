    npc.setViewing( true );

    }

    if (npc.isViewing() && !nearby)

    {

    dialogBox.setText( " " );

    dialogBox.setVisible( false );

    npc.setViewing( false );

    }

    }

    ```


    At this point, the NPCs are fully functional. Test your game and talk to each
    of the NPCs. Try to destroy the Flyers, and then make sure that the Gatekeeper
    vanishes as expected.


    ## Item Shop


    The final mechanic you will implement in the Treasure Quest game is the item shop,
    which consists of two tiles that the hero can stand on, and if the player presses
    the B key (to buy) and has enough coins, the player will receive the quantity
    of items stated by the Shopkeeper. This gives value to the coins collected by
    the player, rather than their just being an abstract number of points or measure
    of progress. To begin, create a new class named `ShopHeart` with the following
    code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class ShopHeart extends BaseActor

    {

    public ShopHeart(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/heart-icon.png");

    }

    }

    ```


    Also create a class named `ShopArrow` as follows:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class ShopArrow extends BaseActor

    {

    public ShopArrow(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/arrow-icon.png");

    }

    }

    ```


    Since there will only be one instance of each of these objects, in the `LevelScreen`
    class, add the following variables:


    ```

    ShopHeart shopHeart;

    ShopArrow shopArrow;

    ```


    To create these objects , add the following to the `initialize` method:


    ```

    MapObject shopHeartTile = tma.getTileList("ShopHeart").get(0);

    MapProperties shopHeartProps = shopHeartTile.getProperties();

    shopHeart = new ShopHeart( (float)shopHeartProps.get("x"), (float)shopHeartProps.get("y"),

    mainStage );

    MapObject shopArrowTile = tma.getTileList("ShopArrow").get(0);

    MapProperties shopArrowProps = shopArrowTile.getProperties();

    shopArrow = new ShopArrow( (float)shopArrowProps.get("x"), (float)shopArrowProps.get("y"),

    mainStage );

    ```


    Since buying items is a discrete action, add the following code to the `keyDown`
    method after the code that activates the weapons:


    ```

    if (keycode == Keys.B)

    {

    if (hero.overlaps(shopHeart) && coins >= 3)

    {

    coins -= 3;

    health += 1;

    }

    if (hero.overlaps(shopArrow) && coins >= 4)

    {

    coins -= 4;

    arrows += 3;

    }

    }

    ```


    That’s all there is to it! Try out your game again, destroy some Flyers , and
    spend your hard-earned coins.


    Once you have reached this point, congratulations are in order, as you have completed
    the longest project in this book!'
  trans: '

    ## 非玩家角色


    接下来要实现的功能是添加非玩家角色（NPC）。它们与第 5 章中介绍的标志物对象密切相关；建议在继续之前重新阅读相关章节。与标志物类似，靠近 NPC 时，用户界面中的对话框会显示关联消息。但与标志物不同的是，每个
    NPC 都有独特的外观，并使用瓦片地图中设置的标识符（`id`）数据。此外，在显示关联消息之前会检查每个 NPC 的 ID，这让你有机会根据游戏状态显示不同的消息。具体来说，本章设计的游戏包含两个
    NPC，一个叫守门人，另一个叫店主。守门人最初会阻挡通往宝藏的路径，向玩家提供指示（消灭所有飞行器才能获得宝藏！），告知剩余飞行器的数量，并在玩家消灭所有飞行器后逐渐淡出消失，从而让玩家能够收集宝藏。店主则没有动态文本，他们只是告知英雄物品商店中可售物品的价格和数量（商店将在下一节创建）。


    首先，使用以下代码创建一个名为`NPC`的新类。请注意，角色的图像不是在构造函数中设置的，而是在设置 ID 时设置的。


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class NPC extends BaseActor

    {

    // 要显示的文本

    private String text;

    // 用于判断对话框文本是否正在显示

    private boolean viewing;

    // 用于特定图形和识别具有动态消息的 NPC 的 ID

    private String ID;

    public NPC(float x, float y, Stage s)

    {

    super(x,y,s);

    text = " ";

    viewing = false;

    }

    public void setText(String t)

    {  text = t;  }

    public String getText()

    {  return text;  }

    public void setViewing(boolean v)

    {  viewing = v;  }

    public boolean isViewing()

    {  return viewing;  }

    public void setID(String id)

    {

    ID = id;

    if ( ID.equals("Gatekeeper") )

    loadTexture("assets/npc-1.png");

    else if (ID.equals("Shopkeeper"))

    loadTexture("assets/npc-2.png");

    else // 默认图像

    loadTexture("assets/npc-3.png");

    }

    public String getID()

    {  return ID;  }

    }

    ```


    为了设置 NPC，在`LevelScreen`类的`initialize`方法中添加以下代码；请注意，你还需要检索在设计瓦片地图时创建的名为`id`和`text`的属性。注意，NPC
    的位置会与在 Tiled 地图编辑器中放置的位置略有偏移，因为 NPC 的尺寸比瓦片集中用于表示它的图标要大。你可能会发现之后需要在 Tiled 中调整 NPC
    的位置。


    ```

    for (MapObject obj : tma.getTileList("NPC") )

    {

    MapProperties props = obj.getProperties();

    NPC s = new NPC( (float)props.get("x"), (float)props.get("y"), mainStage );

    s.setID( (String)props.get("id") );

    s.setText( (String)props.get("text") );

    }

    ```


    最后，在`update`方法中添加以下代码。如果英雄在 NPC 的四个像素范围内，则认为英雄在附近，并显示相应的消息。一旦英雄不再靠近正在查看消息的 NPC，对话框就会消失。以下大部分代码用于为守门人
    NPC 创建动态消息，这些消息取决于游戏中剩余的飞行器数量。一旦所有飞行器被摧毁，守门人会慢慢淡出并移出屏幕，从而使英雄能够到达宝藏处。


    ```

    for ( BaseActor npcActor : BaseActor.getList(mainStage, "NPC") )

    {

    NPC npc = (NPC)npcActor;

    hero.preventOverlap(npc);

    boolean nearby = hero.isWithinDistance(4, npc);

    if ( nearby && !npc.isViewing() )

    {

    // 检查 NPC ID 以获取动态文本

    if ( npc.getID().equals("Gatekeeper") )

    {

    int flyerCount = BaseActor.count(mainStage, "Flyer");

    String message = "消灭飞行器，宝藏就是你的了。 ";

    if ( flyerCount > 1 )

    message += "还剩 " + flyerCount + " 个。";

    else if ( flyerCount == 1 )

    message += "还剩 " + flyerCount + " 个。";

    else // flyerCount == 0

    {

    message += "它是你的了！";

    npc.addAction( Actions.fadeOut(5.0f) );

    npc.addAction( Actions.after( Actions.moveBy(-10000, -10000) ) );

    }

    dialogBox.setText(message);

    }

    else

    {

    dialogBox.setText( npc.getText() );

    }

    dialogBox.setVisible( true );

    npc.setViewing( true );

    }

    if (npc.isViewing() && !nearby)

    {

    dialogBox.setText( " " );

    dialogBox.setVisible( false );

    npc.setViewing( false );

    }

    }

    ```


    至此，NPC 功能已完全实现。测试你的游戏并与每个 NPC 对话。尝试消灭飞行器，然后确保守门人按预期消失。


    ## 物品商店


    你将在《寻宝任务》游戏中实现的最后一个机制是物品商店，它由两个英雄可以站立的瓦片组成，如果玩家按下 B 键（购买）并且有足够的金币，玩家将获得店主所述数量的物品。这赋予了玩家收集的金币实际价值，而不仅仅是抽象的点数或进度衡量标准。首先，使用以下代码创建一个名为`ShopHeart`的新类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class ShopHeart extends BaseActor

    {

    public ShopHeart(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/heart-icon.png");

    }

    }

    ```


    同时创建一个名为`ShopArrow`的类，如下所示：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class ShopArrow extends BaseActor

    {

    public ShopArrow(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/arrow-icon.png");

    }

    }

    ```


    由于每个对象只会有一个实例，在`LevelScreen`类中添加以下变量：


    ```

    ShopHeart shopHeart;

    ShopArrow shopArrow;

    ```


    为了创建这些对象，在`initialize`方法中添加以下代码：


    ```

    MapObject shopHeartTile = tma.getTileList("ShopHeart").get(0);

    MapProperties shopHeartProps = shopHeartTile.getProperties();

    shopHeart = new ShopHeart( (float)shopHeartProps.get("x"), (float)shopHeartProps.get("y"),

    mainStage );

    MapObject shopArrowTile = tma.getTileList("ShopArrow").get(0);

    MapProperties shopArrowProps = shopArrowTile.getProperties();

    shopArrow = new ShopArrow( (float)shopArrowProps.get("x"), (float)shopArrowProps.get("y"),

    mainStage );

    ```


    由于购买物品是一个离散动作，在`keyDown`方法中激活武器的代码之后添加以下代码：


    ```

    if (keycode == Keys.B)

    {

    if (hero.overlaps(shopHeart) && coins >= 3)

    {

    coins -= 3;

    health += 1;

    }

    if (hero.overlaps(shopArrow) && coins >= 4)

    {

    coins -= 4;

    arrows += 3;

    }

    }

    ```


    就这么简单！再次运行你的游戏，消灭一些飞行器，并花掉你辛苦赚来的金币。


    一旦你完成了这一步，值得恭喜，因为你已经完成了本书中最长的项目！

    '
- fmt: "# Summary and Next Steps\n\nIn this chapter, you created the game Treasure\
    \ Quest, a combat-based adventure game, which included new features such as combat\
    \ with multiple types of weapons, NPCs with dynamic text, and an item shop. While\
    \ implementing these features, you also handled subtle details such as sword placement,\
    \ the interaction of enemies and arrows with solid objects, and knockback resulting\
    \ from hero-enemy collisions.\n\nAs always, you should add features such as menus\
    \ and sounds. If you wish, you could add new types of weapons, such as bombs,\
    \ that create explosions that destroy both rocks and enemies. Bombs would likely\
    \ be a limited resource, similar to arrows, and could perhaps be purchased at\
    \ the item shop as well. Additionally, you could create a new kind of enemy that\
    \ follows the player for added difficulty. You could change the goal of the game:\
    \ instead of destroying Flyers, perhaps you have to collect a certain number of\
    \ coins to proceed. You could remove the sword from the game, or even remove weapons\
    \ entirely, making the game about dodging and avoiding enemies. The possibilities\
    \ are endless!\n\nAt this point, you have completed the second part of the book.\
    \ The final part of this book contains advanced techniques and algorithms that\
    \ explain how to use gamepad controllers, advanced graphics, and more, which can\
    \ be used to improve all of the games you have worked on up to this point.\n\n\
    # Part III  \nAdvanced Topics\n\nThis final part of the book contains some additional\
    \ optional features that can be added to many of the previous projects, such as\
    \ gamepad controller input and special effects made with particle systems (an\
    \ efficient method for creating unique, non-repeating animated effects). Some\
    \ game projects involving advanced algorithms and 3D graphics are also included\
    \ in this part.\n\n## Chapter 13: Alternative Sources of User Input\n\nThis chapter\
    \ will explore two alternative sources of user input: gamepad controllers and\
    \ touch-screen controls. In particular, you will add these alternative sources\
    \ of user input to the Starfish Collector game that has been featured in previous\
    \ chapters.\n\n## Chapter 14: Maze Games\n\nIn this chapter, you will learn how\
    \ to create the maze-based game Maze Runman, which is inspired by arcade games\
    \ such as Pac-Man and the early console game Maze Craze. The main new concepts\
    \ in this chapter are algorithms for generating and solving mazes.\n\n## Chapter\
    \ 15: Advanced 2D Graphics\n\nIn this chapter, you will learn two techniques for\
    \ incorporating sophisticated graphics into your projects. The first technique\
    \ is particle systems, which can create special effects such as explosions; this\
    \ will be incorporated into the Space Rocks game in place of spritesheet-based\
    \ animations. The second technique is shader programming, which manipulates the\
    \ pixels of a rendered image to create effects such as blurring or glowing; this\
    \ will be incorporated into the Starfish Collector game.\n\n## Chapter 16: Introduction\
    \ to 3D Graphics and Games\n\nThis chapter will introduce some of the 3D graphics\
    \ capabilities of LibGDX and the concepts and classes necessary to describe and\
    \ render a three-dimensional scene. To simplify and streamline this process, you’ll\
    \ adapt some old classes and write some new classes to accomplish the various\
    \ tasks involved. Finally, you’ll create the game Starfish Collector 3D, a three-dimensional\
    \ version of the Starfish Collector game introduced at the beginning of the book.\n\
    \n## Chapter 17: The Journey Continues\n\nThis final chapter will present a variety\
    \ of steps to consider as you continue on in game development. Among these, you’ll\
    \ explore working on additional projects, learning skills in related areas, and\
    \ bringing your games to a wider audience. Along the way, the chapter will present\
    \ lists of resources of all types, as well as general advice for many situations.\n\
    \n# 13. Alternative Sources of User Input\n\nIn previous chapters, your games\
    \ have been controlled with traditional desktop computer hardware: a keyboard\
    \ and a mouse. In this chapter, you’ll explore two alternative sources of user\
    \ input: gamepad controllers and touchscreen controls. In particular, you will\
    \ add these alternative sources of user input to the Starfish Collector game that\
    \ has been featured in previous chapters. If you do not have access to a gamepad\
    \ with a USB connector (as discussed later in this chapter), you can still follow\
    \ along; the code will still compile, and you’ll leave keyboard controls as a\
    \ fallback (a good practice to consider in general for the convenience of your\
    \ game’s players). Similarly, even if you don’t have access to a device that’s\
    \ touchscreen capable, learning about the associated design considerations is\
    \ still worthwhile. Furthermore, touch events and mouse events are handled by\
    \ the same methods in LibGDX; you can simulate single-touch input (but not multitouch\
    \ input) with the mouse. On the other hand, if neither gamepad nor touch-based\
    \ input is of interest to you, this entire chapter may be omitted without loss\
    \ of continuity."
  raw: '## Summary and Next Steps


    In this chapter, you created the game Treasure Quest, a combat-based adventure
    game, which included new features such as combat with multiple types of weapons,
    NPCs with dynamic text, and an item shop. While implementing these features, you
    also handled subtle details such as sword placement, the interaction of enemies
    and arrows with solid objects, and knockback resulting from hero-enemy collisions.


    As always, you should add features such as menus and sounds. If you wish, you
    could add new types of weapons, such as bombs, that create explosions that destroy
    both rocks and enemies. Bombs would likely be a limited resource, similar to arrows,
    and could perhaps be purchased at the item shop as well. Additionally, you could
    create a new kind of enemy that follows the player for added difficulty. You could
    change the goal of the game: instead of destroying Flyers, perhaps you have to
    collect a certain number of coins to proceed. You could remove the sword from
    the game, or even remove weapons entirely, making the game about dodging and avoiding
    enemies. The possibilities are endless!


    At this point, you have completed the second part of the book. The final part
    of this book contains advanced techniques and algorithms that explain how to use
    gamepad controllers, advanced graphics, and more, which can be used to improve
    all of the games you have worked on up to this point.


    # Part III

    Advanced Topics


    Advanced Topics


    This final part of the book contains some additional optional features that can
    be added to many of the previous projects, such as gamepad controller input and
    special effects made with particle systems (an efficient method for creating unique,
    non-repeating animated effects). Some game projects involving advanced algorithms
    and 3D graphics are also included in this part.


    Chapter [13](#A352797_2_En_13_Chapter.html) : Alternative Sources of User Input


    This chapter will explore two alternative sources of user input: gamepad controllers
    and touch-screen controls. In particular, you will add these alternative sources
    of user input to the Starfish Collector game that has been featured in previous
    chapters.


    Chapter [14](#A352797_2_En_14_Chapter.html) : Maze Games


    In this chapter, you will learn how to create the maze-based game Maze Runman,
    which is inspired by arcade games such as Pac-Man and the early console game Maze
    Craze. The main new concepts in this chapter are algorithms for generating and
    solving mazes.


    Chapter [15](#A352797_2_En_15_Chapter.html) : Advanced 2D Graphics


    In this chapter, you will learn two techniques for incorporating sophisticated
    graphics into your projects. The first technique is particle systems, which can
    create special effects such as explosions; this will be incorporated into the
    Space Rocks game in place of spritesheet-based animations. The second technique
    is shader programming, which manipulates the pixels of a rendered image to create
    effects such as blurring or glowing; this will be incorporated into the Starfish
    Collector game.


    Chapter [16](#A352797_2_En_16_Chapter.html) : Introduction to 3D Graphics and
    Games


    This chapter will introduce some of the 3D graphics capabilities of LibGDX and
    the concepts and classes necessary to describe and render a three-dimensional
    scene. To simplify and streamline this process, you’ll adapt some old classes
    and write some new classes to accomplish the various tasks involved. Finally,
    you’ll create the game Starfish Collector 3D, a three-dimensional version of the
    Starfish Collector game introduced at the beginning of the book.


    Chapter [17](#A352797_2_En_17_Chapter.html) : The Journey Continues


    This final chapter will present a variety of steps to consider as you continue
    on in game development. Among these, you’ll explore working on additional projects,
    learning skills in related areas, and bringing your games to a wider audience.
    Along the way, the chapter will present lists of resources of all types, as well
    as general advice for many situations.


    # 13. Alternative Sources of User Input


    In previous chapters, your games have been controlled with traditional desktop
    computer hardware: a keyboard and a mouse. In this chapter, you’ll explore two
    alternative sources of user input: gamepad controllers and touchscreen controls.
    In particular, you will add these alternative sources of user input to the Starfish
    Collector game that has been featured in previous chapters. If you do not have
    access to a gamepad with a USB connector (as discussed later in this chapter),
    you can still follow along; the code will still compile, and you’ll leave keyboard
    controls as a fallback (a good practice to consider in general for the convenience
    of your game’s players). Similarly, even if you don’t have access to a device
    that’s touchscreen capable, learning about the associated design considerations
    is still worthwhile. Furthermore, touch events and mouse events are handled by
    the same methods in LibGDX; you can simulate single-touch input (but not multitouch
    input) with the mouse. On the other hand, if neither gamepad nor touch-based input
    is of interest to you, this entire chapter may be omitted without loss of continuity.'
  trans: '

    ## 总结与下一步


    在本章中，你创建了《寻宝探险》这款基于战斗的冒险游戏，其中包含了多项新功能，例如使用多种类型武器的战斗、带有动态文本的 NPC 以及物品商店。在实现这些功能的同时，你还处理了一些细微的细节，例如剑的放置位置、敌人和箭矢与实体的交互，以及英雄与敌人碰撞产生的击退效果。


    像往常一样，你应该添加菜单和音效等功能。如果你愿意，还可以增加新类型的武器，例如炸弹，它能产生爆炸，同时摧毁岩石和敌人。炸弹很可能是一种有限资源，类似于箭矢，或许也可以在物品商店购买。此外，你可以创建一种会跟随玩家的新型敌人来增加难度。你也可以改变游戏目标：也许不是摧毁飞行者，而是需要收集一定数量的金币才能继续。你还可以从游戏中移除剑，甚至完全移除武器，让游戏变成躲避和回避敌人。可能性是无限的！


    至此，你已经完成了本书的第二部分。本书的最后一部分包含高级技术和算法，讲解如何使用游戏手柄控制器、高级图形等，这些都可以用来改进你到目前为止所制作的所有游戏。


    # 第三部分

    高级主题


    高级主题


    本书的最后一部分包含一些额外的可选功能，可以添加到之前的许多项目中，例如游戏手柄控制器输入和粒子系统（一种用于创建独特、非重复动画效果的高效方法）制作的特效。本部分还包含一些涉及高级算法和
    3D 图形的游戏项目。


    第 13 章：用户输入的替代来源


    本章将探讨用户输入的两种替代来源：游戏手柄控制器和触摸屏控制。具体来说，你将把这些替代输入源添加到前几章中介绍的《海星收集者》游戏中。


    第 14 章：迷宫游戏


    在本章中，你将学习如何创建基于迷宫的《迷宫奔跑者》游戏，其灵感来源于《吃豆人》等街机游戏以及早期主机游戏《迷宫狂热》。本章的主要新概念是用于生成和解决迷宫的算法。


    第 15 章：高级 2D 图形


    在本章中，你将学习两种将复杂图形融入项目中的技术。第一种技术是粒子系统，它可以创建爆炸等特效；这将被整合到《太空岩石》游戏中，以取代基于精灵表的动画。第二种技术是着色器编程，它通过操作渲染图像的像素来创建模糊或发光等效果；这将被整合到《海星收集者》游戏中。


    第 16 章：3D 图形与游戏入门


    本章将介绍 LibGDX 的一些 3D 图形功能，以及描述和渲染三维场景所需的概念和类。为了简化和精简这一过程，你将改编一些旧类并编写一些新类来完成所涉及的各种任务。最后，你将创建《海星收集者
    3D》游戏，这是本书开头介绍的《海星收集者》游戏的三维版本。


    第 17 章：旅程继续


    这最后一章将介绍在继续游戏开发过程中需要考虑的各种步骤。其中，你将探索开展其他项目、学习相关领域的技能，以及将你的游戏带给更广泛的受众。在此过程中，本章将提供各类资源列表，以及针对多种情况的通用建议。


    # 13. 用户输入的替代来源


    在前面的章节中，你的游戏都是通过传统的台式计算机硬件（键盘和鼠标）进行控制的。在本章中，你将探索用户输入的两种替代来源：游戏手柄控制器和触摸屏控制。具体来说，你将把这些替代输入源添加到前几章中介绍的《海星收集者》游戏中。如果你没有带
    USB 接口的游戏手柄（本章后面会讨论），你仍然可以继续学习；代码仍然可以编译，并且你将保留键盘控制作为备用方案（通常这是一个值得考虑的好做法，以方便你的游戏玩家）。同样，即使你无法使用支持触摸屏的设备，了解相关的设计考量也是值得的。此外，在
    LibGDX 中，触摸事件和鼠标事件由相同的方法处理；你可以用鼠标模拟单点触摸输入（但不能模拟多点触摸输入）。另一方面，如果你对游戏手柄和触摸输入都不感兴趣，可以跳过整章内容，而不会影响学习的连续性。

