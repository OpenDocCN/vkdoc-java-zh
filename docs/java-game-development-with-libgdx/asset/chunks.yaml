    ## 使用表格组织布局


    确定标签和按钮等用户界面项应显示的确切屏幕坐标，同时考虑所放置项的大小以使它们相互对齐，这可能非常繁琐。幸运的是，LibGDX 库提供了一个名为 `Table`
    的类，它通过自动定位和对齐这些元素，极大地简化了这一过程。


    `Table` 是 `Actor` 的子类，因此它可以添加到 `Stage` 对象中；此外，`Table` 也是 `Group` 的子类，因此对象也可以添加到
    `Table` 中。具体来说，一个 `Table` 由 `Cell` 对象组成，这些对象按行和列排列，每个 `Cell` 包含一个 `Actor`。`add`
    方法会创建一个新的 `Cell`（如果指定了 `Actor`，则包含该 `Actor`），并将其添加到当前行的末尾。默认情况下，所有表格都只包含一行；要在
    `Table` 中创建位于当前行下方的新行，我们调用 `row` 方法。仅出于说明目的（这不会添加到您的代码中），要创建一个包含 2x2 网格（包含 Actor
    对象 `a`、`b`、`c` 和 `d`）的表格，如图 5-11 所示，您需要编写以下代码：


    ![A352797_2_En_5_Fig11_HTML.jpg](img/A352797_2_En_5_Fig11_HTML.jpg)


    图 5-11.


    一个简单的表格，元素排列成 2x2 网格


    ```

    Table t = new Table();

    t.add(a);

    t.add(b);

    t.row();

    t.add(c);

    t.add(d);

    ```


    重要的是要记住，通常单个表格单元格的大小会尽可能小，同时仍能容纳其内容。然而，每行和每列中单元格的宽度和高度会扩大，以容纳该行或列中最大的元素。此外，`add`
    方法会返回所创建的 `Cell` 对象，可以通过对结果调用以下任意方法的组合来调整其大小或格式：


    *   `width` 和 `height` 用于设置 `Cell` 的大小（这反过来会影响 `Cell` 内任何 UI 组件的大小）

    *   `expandX` 和 `expandY` 用于强制 `Cell` 增大其大小，以分别填充表格在水平或垂直方向上的剩余空间

    *   `padLeft`、`padRight`、`padBottom`、`padTop` 用于为当前 `Cell` 的内容添加一定量的内边距（以像素为单位），或者使用
    `pad` 方法在所有方向应用内边距


    一个被放大到超出其默认大小的表格单元格，其内容默认会在单元格内居中对齐（水平和垂直方向），在这种情况下，您可以使用 `Cell` 类的方法 `left`、`right`、`bottom`
    和 `top` 来对齐 `Actor` 在其单元格内的位置。此外，您可以使用 `Cell` 类的方法 `colspan` 声明单个单元格跨越多列，该方法接受单元格应填充的列数作为参数。


    有了这些方法，在用户界面中排列元素就变得容易得多，并且无需手动计算坐标。首先，您将在自定义框架中包含一些代码，为每个屏幕添加一个表格到您一直用于用户界面元素的舞台中。在
    `BaseScreen` 类中，添加 `import` 语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Table;

    ```


    在类中，添加变量声明：


    ```

    protected Table uiTable;

    ```


    在 `BaseScreen` 构造函数方法中，添加以下代码来初始化表格：


    ```

    uiTable = new Table();

    uiTable.setFillParent(true);

    uiStage.addActor(uiTable);

    ```


    现在，您将重写游戏特定屏幕类中的一些代码，以利用这个新添加的表格。例如，考虑菜单屏幕上元素的布局，抽象地表示在图 5-12 的右侧，其中字母 `a` 代表标题图形，字母
    `b` 和 `c` 分别代表“开始”和“退出”按钮。


    ![A352797_2_En_5_Fig12_HTML.jpg](img/A352797_2_En_5_Fig12_HTML.jpg)

