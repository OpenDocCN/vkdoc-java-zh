- fmt: '在编程中，你常常希望通过将重复的功能重构到基类中，然后通过专门的子类扩展该基类，来减少冗余代码。在某些情况下，你还会知道所有扩展类都需要实现某个特定方法——但它们会以不同的方式实现，因此代码无法在基类中提前编写，尽管该方法需要在基类中声明。


    例如，考虑一个奇幻风格的角色扮演游戏。假设玩家角色的基类名为`Person`。这个类可能包含所有`Person`对象都应具有的一些标准字段和方法，例如一个名为`name`的`String`，用于存储角色名称，以及用于访问此信息的
    get 和 set 方法。你可能希望创建两个类，`Wizard`和`Warrior`，它们扩展了`Person`类。假设该游戏的用户界面对所有类型的角色都是一致的，并且包含一个剑按钮，用于激活名为`useSword`的方法，以及一个法术按钮，用于激活名为`useSpell`的方法。


    尽管`Person`类会声明这些方法，但它们的实现在`Wizard`和`Warrior`类中会有很大不同。传统上，战士使用剑，而巫师不使用；巫师施放魔法咒语，而战士不施放。还可以想象其他类型的角色，它们既能使用剑也能使用法术，或者两者都不能使用。无论如何，如果玩家点击了与角色无法执行的动作相对应的按钮，屏幕上应显示一条消息解释这一点；否则，该动作应如预期般执行。


    在这种情况下，你会希望要求`Person`类的扩展类提供自定义代码来实现`useSword`和`useSpell`方法，就像接口所做的那样；然而，`Person`不能是一个接口，因为它为其某些方法提供了代码，例如获取和设置`name`字段。在接口中，方法只被声明，而不被编写。


    这种情况的解决方案是创建一个抽象类。你使用额外的关键字`abstract`将类声明为抽象类（类似于使用关键字`interface`声明接口的方式），这表明某些方法可能只被声明而代码由子类提供，并且扩展此类的其他类必须为这些方法提供代码。任何此类方法也使用修饰符`abstract`声明，如下面的示例代码所示。请注意，由于此类的代码并未全部提供，因此你无法创建此类的实例（同样，类似于接口）。


    ```

    public abstract class Person

    {

    private String name;

    public void setName(String n)  { name = n; }

    public String getName()  { return name; }

    public abstract void useSword();

    public abstract void useSpell();

    }

    ```


    任何扩展`Person`的类都必须为之前声明为`abstract`的每个方法提供实现。例如：


    ```

    public class Wizard extends Person

    {

    public void useSword()

    {

    System.out.print("Wizards are unable to wield a sword...");

    }

    public void useSpell()

    {

    // insert code here to select a spell and its target

    }

    }

    public class Warrior extends Person

    {

    public void useSword()

    {

    // insert code here to attack an enemy

    }

    public void useSpell()

    {

    System.out.print("Warriors are unable to use magic...");

    }

    }

    ```


    通过这种方式，抽象类结合了标准类和接口的优点。


    使用抽象类将要求任何扩展`GameBeta`的类提供初始化与更新游戏世界的方法实现。这也有助于开发者避免潜在的错误，例如拼写错误他们应该重写的方法名称。


    需要对之前介绍的`GameBeta`类进行的更改如下。特别注意，`initialize`和`update`方法的方法体已被移除，并且在声明这些方法的行末尾添加了分号。


    ```

    // import statements remain the same

    public abstract class GameBeta extends Game

    {

    protected Stage mainStage;

    // create method remains the same

    public abstract void initialize();

    // render method remains the same

    public abstract void update(float dt);

    }

    ```


    以`GameBeta`类作为基类，`StarfishCollectorBeta`类可以大大简化，如前所述。对该类的更改在下面的注释代码中进行了解释。请注意，当你更改一个类中的代码时，依赖于它的其他类会显示错误，直到更改完成。


    ```

    // import statements remain the same

    // this class now extends GameBeta rather than Game

    public class StarfishCollectorBeta extends GameBeta

    {

    // removed declaration of mainStage

    private Turtle turtle;

    private ActorBeta starfish;

    private ActorBeta ocean;

    private ActorBeta winMessage;

    private boolean win;

    // create method renamed to initialize

    public void initialize()

    {

    // removed initialization of mainStage

    // the rest of the method remains the same

    }

    // render method renamed to update; requires float parameter dt

    public void update(float dt)

    {

    // most code of the render method removed

    // check win condition: turtle must be overlapping starfish

    if (turtle.overlaps(starfish))

    {

    starfish.remove();

    winMessage.setVisible(true);

    }

    }

    }

    ```


    如你所见，这个类现在专注于游戏本身（游戏对象及其相互交互），而不是框架问题（例如设置和使用舞台）。你现在可以像之前一样，通过在相应的启动器类中运行`main`方法来运行游戏。


