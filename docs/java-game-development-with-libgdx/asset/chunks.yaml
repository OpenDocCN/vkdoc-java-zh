- fmt: 'As it stands, the preceding code allows an object to be dragged across the
    screen. However, you will often want such an object to interact with another type
    of object on which it is dropped. For example, in the jigsaw-puzzle game, you
    will want to drop puzzle pieces on particular board areas, while in the card game
    you will want to drop cards on particular piles. To this end, you will create
    another class that represents an object that can be targeted by a `DragAndDropActor`.
    You will also include a Boolean variable that can be used to indicate whether
    the object can be targeted. This can be important for games in which you eventually
    want to disable the drop-target functionality for particular targets. For example,
    in the jigsaw-puzzle game, once you have dropped a puzzle piece on a certain area,
    you will not want to be able to drop a second piece onto the same area. Create
    a new class named `DropTargetActor` containing the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class DropTargetActor extends BaseActor

    {

    private boolean targetable;

    public DropTargetActor(float x, float y, Stage s)

    {

    super(x,y,s);

    targetable = true;

    }

    public void setTargetable(boolean t)

    {

    targetable = t;

    }

    public boolean isTargetable()

    {

    return targetable;

    }

    }

    ```


    Next, you will return to the `DragAndDropActor` class to add functionality for
    interacting with `DropTargetActor` objects. In the `touchUp` method of the `InputListener`,
    you will identify the `DropTargetActor` that the `DragAndDropActor` was dropped
    upon (if any), storing it in a variable for later access. The main part of this
    method involves a `for` loop over the set of `DropTargetActor` objects attached
    to the stage that are both targetable and overlap the actor being dragged. However,
    a bit of extra code is required to handle the case where the dragged actor overlaps
    two or more drop targets. In this case, you will want to select the target that
    is closest to the dragged actor. To do so, in the loop you will keep track of
    the distance from the dragged actor to the candidate drop target, and if this
    distance is smaller than the closest distance encountered thus far, the candidate
    will be set as the new drop target.


    In the `DragAndDropActor` class, add the following `import` statement:


    ```

    import com.badlogic.gdx.math.Vector2;

    ```


    Add the following variable declaration to the class:


    ```

    private DropTargetActor dropTarget;

    ```


    In the `touchUp` method of the `InputListener`, add the following code:


    ```

    self.setDropTarget(null);

    // keep track of distance to closest object

    float closestDistance = Float.MAX_VALUE;

    for ( BaseActor actor : BaseActor.getList(self.getStage(), "DropTargetActor")
    )

    {

    DropTargetActor target = (DropTargetActor)actor;

    if ( target.isTargetable() && self.overlaps(target) )

    {

    float currentDistance =

    Vector2.dst(self.getX(),self.getY(), target.getX(),target.getY());

    // check if this target is even closer

    if (currentDistance < closestDistance)

    {

    self.setDropTarget(target);

    closestDistance = currentDistance;

    }

    }

    }

    ```


    Also, to work with the `dropTarget` variable, add the following methods to the
    `DragAndDropActor` class:


    ```

    public boolean hasDropTarget()

    {  return (dropTarget != null);  }

    public void setDropTarget(DropTargetActor dt)

    {  dropTarget = dt;  }

    public DropTargetActor getDropTarget()

    {  return dropTarget;  }

    ```


    There are a few minor additions left for the `DragAndDropActor` class. First,
    you will add the ability to disable the drag functionality. This is useful if
    you want to lock an object in position. For example, in the solitaire card game,
    once a card is moved to the correct pile, you don’t want to move it off the pile.
    To do this, add the following variable declaration to the `DragAndDropActor` class:


    ```

    private boolean draggable;

    ```


    Initialize this value in the class constructor by adding the following line of
    code:


    ```

    draggable = true;

    ```


    Add the following methods to work with the `draggable` variable:


    ```

    public void setDraggable(boolean d)

    {  draggable = d;  }

    public boolean isDraggable()

    {  return draggable;  }

    ```


    In the beginning of the `touchDown` method of the `InputListener`, add the following
    code, which will cancel the drag action and stop the `touchDragged` and `touchUp`
    methods from being activated by returning `false` when `draggable` has been set
    to `false`.


    ```

    if ( !self.isDraggable() )

    return false;

    ```


    The next additions will be some convenience methods that automatically move this
    actor to the center of another actor, or move the actor to its original position
    (at the moment when the drag began). For example, in the solitaire card game,
    when dropping a card onto the correct pile, you will want to center it on that
    pile. Conversely, when dropping a card onto an incorrect pile, you will want to
    return it to its original position so that the pile is not obscured. To accomplish
    this, begin by adding the following `import` statements to the `DragAndDropActor`
    class. The `Interpolation` class is used to modify the actor movement, smoothing
    out the transition at the beginning and end of the action.


    ```

    import com.badlogic.gdx.math.Interpolation;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    Add the following variable declarations to the class:


    ```

    private float startPositionX;

    private float startPositionY;

    ```


    In the `touchDown` method of the `InputListener`, add the following code after
    the values of `grabOffsetX` and `grabOffsetY` are set:


    ```

    self.startPositionX = self.getX();

    self.startPositionY = self.getY();

    ```


    Finally, add the following methods to the class. The `Interpolation` object is
    used to slow down the movement at the beginning and end of the motion, which makes
    it appear more natural.


    ```

    public void moveToActor(BaseActor other)

    {

    float x = other.getX() + (other.getWidth()  - this.getWidth())  / 2;

    float y = other.getY() + (other.getHeight() - this.getHeight()) / 2;

    addAction( Actions.moveTo(x,y, 0.50f, Interpolation.pow3) );

    }

    public void moveToStart()

    {

    addAction( Actions.moveTo(startPositionX, startPositionY, 0.50f, Interpolation.pow3)
    );

    }

    ```


    The next addition is a subtle visual effect that adds to the sense of immersion.
    When dragging an object, the player often imagines the object being raised above
    the play area, and when dropping the object, the player imagines the object being
    lowered back down to the play area. Objects that are closer to the player should
    appear slightly larger; this can be accomplished by adding an action to scale
    the image to a larger size when the drag begins and then scale the image to its
    original size when the drag ends. To accomplish this, in the `touchDown` method,
    right before the last line of code, add the following:


    ```

    self.addAction( Actions.scaleTo(1.1f, 1.1f, 0.25f) );

    ```


    Then, at the end of the `touchUp` method, add the following:


    ```

    self.addAction( Actions.scaleTo(1.00f, 1.00f, 0.25f) );

    ```


    The final addition will simplify the use of the `DragAndDropActor` class in your
    actual games. In games that make use of the `DragAndDropActor` and the `DropTargetActor`
    classes, you will typically extend these classes with custom classes representing
    the specific entities in your game. To add extra functionality to when the drag
    starts and when the object is dropped, you will add two extra functions to the
    `DragAndDropActor` class, named `onDragStart` and `onDrop`, which are called at
    the end of the `touchDown` and `touchUp` methods, respectively. In this class,
    the methods will contain no code; they are meant to be overridden by the extending
    classes. In the `DragAndDropActor` class, add the following two methods:


    ```

    public void onDragStart()

    {    }

    public void onDrop()

    {    }

    ```


    Then, in the `touchDown` method, right before the last statement, add the following
    line of code:


    ```

    self.onDragStart();

    ```


    Finally, at the end of the `touchUp` method, add the following line of code:


    ```

    self.onDrop();

    ```'
