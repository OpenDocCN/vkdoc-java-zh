  trans: '

    ### 检测碰撞


    现在你已为 `BaseActor` 类定义了碰撞多边形，但还需要检测两个多边形何时重叠。与拥有自身 `overlaps` 方法的 `Rectangle` 类不同，`Polygon`
    类并没有该方法。幸运的是，LibGDX 提供的另一个名为 `Intersector` 的工具类拥有这样的方法。你将利用这一点为 `BaseActor` 类创建一个
    `overlaps` 方法。首先，你需要通过以下语句导入前述类：


    ```

    import com.badlogic.gdx.math.Intersector;

    ```


    接下来，将以下方法添加到 `BaseActor` 类中：


    ```

    public boolean overlaps(BaseActor other)

    {

    Polygon poly1 = this.getBoundaryPolygon();

    Polygon poly2 = other.getBoundaryPolygon();

    // 初步测试以提高性能

    if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

    return false;

    return Intersector.overlapConvexPolygons( poly1, poly2 );

    }

    ```


    检查两个多边形是否重叠需要大量计算。因此，为了提高性能，该方法包含一个初步检查，用于判断包围多边形的矩形是否相交（这是一个简单得多的计算）。如果这些更大的矩形不相交，那么多边形就不可能相交，因此该方法可以立即返回
    `false`。否则，多边形有可能相交，此时该方法将返回更精确测试的结果，该结果由 `Intersector` 类的静态方法 `overlapConvexPolygons`
    执行。


    有了这个方法，你就可以为海星收集者游戏添加交互性了。在 `Turtle` 和 `Starfish` 类的 `constructor` 方法中，添加以下代码行（在图像加载之后），以便每个对象使用八边形碰撞多边形来提高精度：


    ```

    setBoundaryPolygon(8);

    ```


    接下来，当海龟与海星重叠时，应发生以下事件：


    *   海星应淡出，然后从舞台上移除。

    *   应创建一个以海星为中心的漩涡效果，并渲染为半透明，以便可以看到其下方的海星。

    *   海星淡出后，屏幕中央应出现一条“你赢了”的消息，初始为透明，然后缓慢淡入。


    回想一下，`Actor` 的 `setPosition` 方法实际上是将 `Actor` 对象的左下角设置到给定位置。为了将 `Actor` 居中于给定位置，你需要将其沿
    x 方向移动一半宽度，沿 y 方向移动一半高度。由于未来会频繁用到此计算，请将以下方法添加到 `BaseActor` 类中：


    ```

    public void centerAtPosition(float x, float y)

    {

    setPosition( x - getWidth()/2 , y - getHeight()/2 );

    }

    public void centerAtActor(BaseActor other)

    {

    centerAtPosition( other.getX() + other.getWidth()/2 , other.getY() + other.getHeight()/2
    );

    }

    ```


    可以通过更改与 `Actor` 对象关联的颜色的 alpha 值来改变其透明度。为了简化当前及未来项目中的这一过程，请将以下方法添加到 `BaseActor`
    类中：


    ```

    public void setOpacity(float opacity)

    {

    this.getColor().a = opacity;

    }

    ```


    使用刚刚创建的方法以及 `Action` 对象，你可以实现前面列表中的项目。为了确保海星只能被“收集”一次（并且避免不必要地重复添加动作），请在 `Starfish`
    类中添加以下变量声明：


    ```

    private boolean collected;

    ```


    在 `constructor` 方法中，按如下方式初始化该变量：


    ```

    collected = false;

    ```


    接下来，向 `Starfish` 类添加以下两个方法：`isCollected`（返回 `collected` 变量的值）和 `collect`（将 `isCollected`
    设置为 `true` 并应用淡出动画效果，之后将其从舞台上移除）。


    ```

    public boolean isCollected()

    {

    return collected;

    }

    public void collect()

    {

    collected = true;

    clearActions();

    addAction( Actions.fadeOut(1) );

    addAction( Actions.after( Actions.removeActor() ) );

    }

    ```


    接下来，你将把注意力转回 `StarfishCollector` 类。首先，添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    接下来，在 `StarfishCollector` 类的 `update` 方法中（当前为空），添加以下代码：


    ```

    if (turtle.overlaps(starfish) && !starfish.isCollected() )

    {

    starfish.collect();

    Whirlpool whirl = new Whirlpool(0,0, mainStage);

    whirl.centerAtActor( starfish );

    whirl.setOpacity(0.25f);

    BaseActor youWinMessage = new BaseActor(0,0,mainStage);

    youWinMessage.loadTexture("assets/you-win.png");

    youWinMessage.centerAtPosition(400,300);

    youWinMessage.setOpacity(0);

    youWinMessage.addAction( Actions.delay(1) );

    youWinMessage.addAction( Actions.after( Actions.fadeIn(1) ) );

    }

    ```


    这段代码的第一部分处理海星：`collect` 方法将海星标记为已收集，并应用之前描述的效果。代码的下一部分创建一个 `Whirlpool` 对象，将其居中于海星的位置，并使其大部分透明（如同真实水中的情况）。最后，创建一个新的
    `BaseActor`，其中包含“你赢了”文字的图像，居中于屏幕，并在延迟一秒后淡入（对应海星淡出的一秒时间）。完成添加此代码后，这是另一个运行程序并验证一切是否按预期工作的好机会。

    '
- fmt: '### Simulating Solid Objects


    Part of what makes a game fun is the challenge provided by obstacles that must
    be navigated or overcome as you strive to meet a goal. At this time, there are
    no obstacles at all in Starfish Collector; all you need to do to win the game
    is move the turtle in a straight line toward the starfish. Your next task will
    be to add the most basic of obstacles to this game: a solid object (a rock) that
    the turtle needs to swim around to reach the starfish. Granted, one rock by itself
    isn’t much of a challenge, but once you have learned how to simulate solid objects
    in this section, and combine this with the knowledge you will gain in the following
    section (managing collections of objects), a whole new world of possibilities
    will open up (creating mazes, for example). Once again, the LibGDX framework greatly
    simplifies the development process.


    Previously, you have seen that the `Intersector` class has the functionality to
    determine when two polygons overlap. In addition, this class can also be used
    to handle collision response, as you will soon see. In some situations, game objects
    should be permitted to overlap—this is how a player-controlled character typically
    collects items, for example. In other situations, however, it should be impossible
    for game objects to overlap, such as when one of them represents a solid object
    (like a wall). In each iteration of the game loop, after the character’s new position
    is calculated (via a method such as `applyPhysics`), you need to check if the
    character is overlapping any solid objects. If so, you then need to adjust its
    position so that there is no longer any overlap with the solid object. There are
    many ways the adjustment can be implemented, such as the following:


    * Return the character to their previous position (from before the `applyPhysics`
    method was run).

    * Move the character by very small increments along the line from their current
    position to their previous position, stopping at the first point where there is
    no longer an overlap.

    * Calculate the direction corresponding to the minimal distance the character
    needs to be moved so that there is no overlap, and move accordingly.


    Of these three approaches, you will use the last one, because it is particularly
    simple to implement using the `Intersector` class. In the `Intersector` class,
    there is a variation of the `overlapConvexPolygons` method that takes three parameters.
    The first two parameters are the polygons being checked for overlap. The third
    parameter is a `MinimumTranslationVector` object, which is used to store the minimum
    distance and direction required to reposition the polygons as a `float` named
    `depth` and a `Vector2` named `normal`. If there is an overlap between the polygons,
    then the `Actor` calling the method will be moved according to the minimum translation
    vector, and there will no longer be an overlap between the two `Actor` objects.
    First, in the `BaseActor` class, add the following `import` statement:


    ```

    import com.badlogic.gdx.math.Intersector.MinimumTranslationVector;

    ```


    The method, named `preventOverlap`, is as follows:


    ```

    public Vector2 preventOverlap(BaseActor other)

    {

    Polygon poly1 = this.getBoundaryPolygon();

    Polygon poly2 = other.getBoundaryPolygon();

    // initial test to improve performance

    if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

    return null;

    MinimumTranslationVector mtv = new MinimumTranslationVector();

    boolean polygonOverlap = Intersector.overlapConvexPolygons(poly1, poly2, mtv);

    if ( !polygonOverlap )

    return null;

    this.moveBy( mtv.normal.x * mtv.depth, mtv.normal.y * mtv.depth );

    return mtv.normal;

    }

    ```


    This method also returns the direction in which the `Actor` was moved (when an
    overlap exists). Although you will not make use of this information in this game,
    it will be helpful for future projects.


    To add a rock as a solid obstacle in your game, first create a new class named
    `Rock` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Rock extends BaseActor

    {

    public Rock(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/rock.png");

    setBoundaryPolygon(8);

    }

    }

    ```


    Then, in your `StarfishCollector` class, create a new field as follows:


    ```

    private Rock rock;

    ```


    Add the following line of code to the `initialize` method:


    ```

    rock = new Rock(200,200, mainStage);

    ```


    Finally, add the following line of code at the beginning of the `update` method:


    ```

    turtle.preventOverlap(rock);

    ```


    At this point, you can run your program and verify that the rock does indeed behave
    like a solid barrier. The game will currently appear as shown in Figure [3-10](#A352797_2_En_3_Chapter.html#Fig10).
    Notice in particular that if the turtle swims directly at the rock, it will appear
    to slide around it; this is due to the shape of the collision polygons together
    with the use of the minimal translation vector to adjust the positions of the
    `Actor` objects.


    ![A352797_2_En_3_Fig10_HTML.jpg](A352797_2_En_3_Fig10_HTML.jpg)


    Figure 3-10.


    The Starfish Collector game with a rock added


    As an entertaining and useful sidenote, if you switch the order of the objects
    in the `preventOverlap` method, instead writing `rock.preventOverlap(turtle)`,
    then the rock will be the object that moves; it will appear as though the turtle
    is pushing the rock! This has the potential to be a useful game mechanic for a
    future game project.'
