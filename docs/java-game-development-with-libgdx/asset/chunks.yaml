- fmt: '## Game Project: Starfish Collector 3D


    In this section, you’ll create the game Starfish Collector 3D, which, as the name
    suggests, is a 3D version of the Starfish Collector game introduced at the beginning
    of this book; a side-by-side comparison of these games is shown in Figure [16-9](#A352797_2_En_16_Chapter.html#Fig9).
    As you may expect, the goal in this new game will be to help the turtle collect
    all the starfish. You control the turtle using the arrow keys: pressing the up
    arrow key moves the turtle forward, while pressing the left and right arrow keys
    turns the turtle to the left and to the right. Most of the difficult groundwork
    has been laid in the previous section. The remaining topics include loading complex
    models from external files, displaying an image that surrounds the game world,
    and performing simplified collision detection. As before, you will continue adding
    code to `Project3D`, as it already contains many of the classes you will need
    (`BaseGame`, `BaseScreen`, `BaseActor3D`, and `Stage3D`).


    ![A352797_2_En_16_Fig9_HTML.jpg](A352797_2_En_16_Fig9_HTML.jpg)


    Figure 16-9. Starfish Collector in 2D (left) and 3D (right)


    The first task, loading a model, is relatively straightforward. To do so, you
    need to use an extension of the `ModelLoader` class, called `ObjLoader`, which
    can import 3D models from files that use the Wavefront (`*.obj`) file format,
    and then you need to use `ObjLoader` class `loadModel` method, which takes a `FileHandle`
    as input and returns a `Model`. You can then use the model to create a `ModelInstance`
    that you use in a `BaseActor3D` object, as you did for the `Box` and `Sphere`
    classes. Since you will be importing multiple models in this game, it makes sense
    to make a new class that contains this functionality. Create a new class called
    `ObjModel` that contains the following code:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.g3d.Model;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;

    import com.badlogic.gdx.graphics.g3d.loader.ObjLoader;

    public class ObjModel extends BaseActor3D

    {

    public ObjModel(float x, float y, float z, Stage3D s)

    {

    super(x,y,z,s);

    }

    public void loadObjModel(String fileName)

    {

    ObjLoader loader = new ObjLoader();

    Model objModel = loader.loadModel(Gdx.files.internal(fileName), true);

    setModelInstance( new ModelInstance(objModel) );

    }

    }

    ```


    Next, you will need to surround your game world with an image so as to give the
    appearance of a sky in the background. In the previous 2D games in this book,
    you created a rectangular object that simply displayed an image of the sky. Because
    you’re in a 3D environment, here you’ll create a spherical object that is significantly
    larger than and surrounds your game world, and then you will apply a texture to
    it, such as the one shown in Figure [16-10](#A352797_2_En_16_Chapter.html#Fig10).
    This is often referred to as a sky sphere or a sky dome. You may notice that the
    image appears slightly stretched near the top (and it would on the bottom, too,
    were the bottom not simply a gray color). This is because the image has been spherically
    distorted: while it looks strange as a rectangle, when the image is applied to
    a sphere, everything will appear to have the correct proportions. This is the
    same phenomena that occurs when trying to make a flat, rectangular map of the
    Earth, which is roughly spherical; the map will inevitably contain distorted areas
    corresponding to the regions near the poles. There is a second difficulty that
    will arise when trying to implement a sky dome: textures applied to the material
    of an object are typically only visible when viewed from the outside of the object.
    (This convention is to increase the efficiency of 3D programs; there is no need
    to render objects from a perspective that the user will not see.) Fortunately,
    you can perform a geometric trick to resolve this problem: after creating the
    sphere, you will scale the mesh by –1 in the z direction; this will cause the
    sphere to turn itself “inside-out,” reversing the sides on which the image will
    be displayed.


    ![A352797_2_En_16_Fig10_HTML.jpg](A352797_2_En_16_Fig10_HTML.jpg)


    Figure 16-10. A spherically distorted image of the sky


    The third and final concept to discuss is collision detection. To keep the level
    of complexity manageable, the motion and placement of your three-dimensional objects
    will be restricted to a two-dimensional plane, thus allowing this project to reuse
    collision code from the original `BaseActor` class. This technique is well-known
    in game development. Games that use this approach (those that have 3D graphics
    but restrict game play to a 2D plane and have restricted camera movement) are
    called 2.5D games. Figure [16-11](#A352797_2_En_16_Chapter.html#Fig11) illustrates
    how the game will appear to the player, while on the right you can see the water
    represented by a grid and the collision polygons that will correspond to the pictured
    game entities (the two rocks and the turtle).


    ![A352797_2_En_16_Fig11_HTML.jpg](A352797_2_En_16_Fig11_HTML.jpg)


    Figure 16-11. The game world rendered in 3D, and the corresponding 2D collision
    polygons


    To incorporate collision into your project, you need to make some additions to
    the `BaseActor3D` class. First, add the following `import` statements:


    ```

    import com.badlogic.gdx.math.collision.BoundingBox;

    import com.badlogic.gdx.math.Polygon;

    import com.badlogic.gdx.math.Intersector;

    import com.badlogic.gdx.math.Intersector.MinimumTranslationVector;

    ```


    Next, add the following variable declaration to the class:


    ```

    private Polygon boundingPolygon;

    ```


    Next are a pair of methods used to set the polygon to either a rectangular or
    an eight-sided polygon (octagon) shape. In both cases, you need to determine the
    dimensions of the object in the x and z dimensions; these quantities are analogous
    to the width and height in the two-dimensional case. These values can be determined
    by calculating the `BoundingBox` associated with the model, which is the smallest
    box that contains the entire model. A bounding box stores the dimensions of the
    model using two `Vector3` objects, `min` and `max`, which store the values of
    the smallest and largest coordinates contained by the model, respectively. These
    values are used to create the array of vertices that is passed to the polygon
    object, as illustrated here:'
