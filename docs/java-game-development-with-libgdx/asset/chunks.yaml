    ```


    请注意，此类必须声明为 `abstract`，因为它没有实现 `BaseScreen` 类中的 `initialize` 或 `update` 方法。同时注意，监听器是通过将当前活动的
    `Screen` 添加到 `Controllers` 类管理的监听器集合中来“激活”的。同时，你还必须移除（通过 `clearListeners` 方法）任何先前添加的
    `ControllerListener` 对象；你不希望其他可能处于非活动状态（但仍驻留在内存中）的 `Screen` 对象响应输入，因为这可能导致意外问题。（例如，如果按下游戏手柄上的
    Start 按钮用于从菜单屏幕开始新游戏，那么在切换到游戏屏幕后，你不再希望按下游戏手柄 Start 按钮时发生此操作；因此，你必须阻止菜单屏幕“监听”并响应这些事件。）


    接下来，你需要修改 `LevelScreen` 类，使得按下游戏手柄上的 Back 键将重新开始关卡（类似于点击用户界面右上角的 Restart 按钮）。这需要三个步骤。首先，在
    `LevelScreen` 类中添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.controllers.Controller;

    ```


    接着，修改类声明，使其扩展 `BaseGamepadScreen` 类而非 `BaseScreen` 类，如下所示：


    ```

    public class LevelScreen extends BaseGamepadScreen

    ```


    最后，你需要向此类添加一个 `buttonDown` 方法，用于处理离散的游戏手柄按钮按下事件（类似于 `keyDown` 方法处理离散的键盘按键事件）。将以下方法添加到
    `LevelScreen` 类中：


    ```

    public boolean buttonDown(Controller controller, int buttonCode)

    {

    if (buttonCode == XBoxGamepad.BUTTON_BACK)

    StarfishGame.setActiveScreen( new LevelScreen() );

    return false;

    }

    ```


    仅此而已！请随意再次测试你的项目；移动海龟并收集一些海星，然后按下游戏手柄上的 Back 按钮重置关卡，这样你就可以重新享受收集海星的乐趣了。


    ## 触摸屏控制


    在本节中，你将学习如何实现受游戏手柄启发的屏幕触摸控制。同样，如本章开头所述，测试本节代码无需访问触摸屏设备，因为 LibGDX 使用相同的方法处理鼠标事件和触摸事件；单点触摸输入由鼠标模拟。由于你已经学习了第
    5 章中的 `Button` 类，你已经有了良好的基础。接下来，你将了解 LibGDX 库提供的另一个用户界面控件——`Touchpad` 类，该类旨在模拟传统的街机摇杆。图
    13-2 展示了一个传统街机风格摇杆以及一个可使用 LibGDX 创建的触摸板控件示例，该控件以俯视视角呈现街机风格摇杆。


    ![A352797_2_En_13_Fig2_HTML.jpg](img/A352797_2_En_13_Fig2_HTML.jpg)


    图 13-2.


    传统街机风格摇杆与 LibGDX 创建的触摸板控件


    成功使用这些控件的最大挑战并非对象的创建，而是一个设计挑战：这些元素应如何排列并放置在屏幕上？一种选择是将这些元素叠加在游戏世界之上，就像你在前几章中对各种
    `Label` 对象的处理方式一样。然而，你很快会发现一个问题：这些控件——为了便于操作，通常必须比标签大得多——可能会遮挡游戏世界，以至于干扰游戏进行。如果放置不当，触摸板可能会完全遮挡住主要角色。图
    13-3 通过将触摸板放置在游戏屏幕左下角，展示了这种可能的情况。请注意它如何部分甚至完全覆盖海龟！


    ![A352797_2_En_13_Fig3_HTML.jpg](img/A352797_2_En_13_Fig3_HTML.jpg)


    图 13-3.


    放置不当的触摸板控件遮挡了海龟


    一些游戏试图通过使用户界面上的控件半透明来解决这个问题，但核心困难依然存在，因为玩家的手指通常位于控件所在区域的上方，因此仍然会遮挡游戏世界的视野。你在本节中将实现的另一种方法是为控件保留屏幕的特定区域，并在剩余区域渲染游戏世界，如图
    13-4 所示。


    ![A352797_2_En_13_Fig4_HTML.jpg](img/A352797_2_En_13_Fig4_HTML.jpg)


    图 13-4.


    将游戏控件放置在游戏世界下方的专用区域

