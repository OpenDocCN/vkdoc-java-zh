- fmt: '### Acceleration


    With a more formal understanding of the concept and terminology of velocity under
    our belt, it is time to turn to acceleration. Just as velocity represents how
    position is changing, acceleration represents how velocity is changing. It will
    be most helpful to keep this analogy in mind throughout what follows: acceleration
    is to velocity as velocity is to position.


    If the units for velocity are pixels/second, then—since acceleration measures
    the change in this quantity over time—the units for acceleration are pixels/second
    per second, which could also be written as (pixels/second)/second, or pixels/second^2.
    Acceleration is also denoted using vector notion. The calculations for adjusting
    velocity based on acceleration are algebraically identical to the calculations
    for adjusting position based on velocity. In particular, if an object’s initial
    velocity is `<a, b>` and there is a constant acceleration of `<c, d>`, then after
    `t` seconds, the formula for the velocity at that time is `<a + t*c, b + t*d>`.
    These updated velocity values at each point in time will be used in turn to update
    the position of the object.


    In the `BaseActor` class, for convenience, you will work with the acceleration
    vector by setting its magnitude (via a method named `setAcceleration`) and then
    accelerating in a specified direction (via a method named `accelerateAtAngle`
    that takes a direction angle as a parameter). To implement this, add the following
    fields:


    ```

    private Vector2 accelerationVec;

    private float acceleration ;

    ```


    Initialize these variables with the following statements in the `constructor`
    method:


    ```

    accelerationVec = new Vector2(0,0);

    acceleration = 0;

    ```


    Next, add the following methods, as previously described:


    ```

    public void setAcceleration(float acc)

    {

    acceleration = acc;

    }

    public void accelerateAtAngle(float angle)

    {

    accelerationVec.add( new Vector2(acceleration, 0).setAngle(angle) );

    }

    ```


    For convenience in later projects, now is a good time to add the following method,
    which accelerates an object in the direction it is currently facing:


    ```

    public void accelerateForward()

    {

    accelerateAtAngle( getRotation() );

    }

    ```


    Finally, there are some subtle behaviors to discuss and implement. When holding
    down an arrow key, the character that the player is controlling should typically
    accelerate in that direction. However, most objects cannot accelerate or speed
    up forever—there is a limit to how quickly they can move, a maximum speed, which
    will vary by object. Furthermore, when an arrow key is released, the moving character
    typically slows down and eventually stops. The rate at which an object will slow
    down, or decelerate, may vary depending on the context. For example, a car slows
    down more quickly on asphalt than on ice. However, some objects do not appear
    to decelerate at all, such as bullets or laser beams; their deceleration would
    be zero. These values (maximum speed and deceleration) will need to be stored
    and taken into account later. To this end, add the following fields to the `BaseActor`
    class:


    ```

    private float maxSpeed ;

    private float deceleration;

    ```


    Initialize these in the `constructor` as follows:


    ```

    maxSpeed = 1000;

    deceleration = 0;

    ```


    Also add the following methods, used to set these values:


    ```

    public void setMaxSpeed(float ms)

    {

    maxSpeed = ms;

    }

    public void setDeceleration(float dec)

    {

    deceleration = dec;

    }

    ```


    ### Movement


    With these variables in place (`velocityVec`, `accelerationVec`, `acceleration`,
    `maxSpeed`, and `deceleration`) along with their accompanying methods, you are
    ready to write the method that will carry out the computations described throughout
    this section and update the position of the `Actor` object accordingly. This method
    will be called `applyPhysics` and will need to take the amount of elapsed time
    since the last update as a parameter. This method will handle the following tasks:


    - Adjust the velocity vector based on the acceleration vector.

    - If the object is not accelerating, it must apply the deceleration amount to
    the current speed.

    - Make sure that the speed is not greater than the maximum speed value.

    - Adjust the position of the `Actor` object based on the velocity vector.

    - Reset the acceleration vector.


    The code for this method is as follows:


    ```

    public void applyPhysics(float dt)

    {

    // apply acceleration

    velocityVec.add( accelerationVec.x * dt, accelerationVec.y * dt );

    float speed = getSpeed();

    // decrease speed (decelerate) when not accelerating

    if (accelerationVec.len() == 0)

    speed -= deceleration * dt;

    // keep speed within set bounds

    speed = MathUtils.clamp(speed, 0, maxSpeed);

    // update velocity

    setSpeed(speed);

    // apply velocity

    moveBy( velocityVec.x * dt, velocityVec.y * dt );

    // reset acceleration

    accelerationVec.set(0,0);

    }

    ```


    Now, with these methods added to the `BaseActor` class, you are ready to implement
    movement in the Starfish Collector game. The only additions will be to the `Turtle`
    class, since the turtle is the only object that will be moving. First, add the
    following `import` statements to the `Turtle` class:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    ```


    Then, you need to initialize some of the physics-related parameters by adding
    the following code to the `constructor` method:


    ```

    setAcceleration(400);

    setMaxSpeed(100);

    setDeceleration(400);

    ```


    From this code, it is clear that the maximum speed of the turtle will be 100 pixels/second.
    The acceleration value of 400 means that the speed would increase by 400 pixels/second
    each second, but since the maximum speed is 100 pixels/second, the turtle will
    reach this speed in 100/400 = 0.25 seconds (when starting from rest).


    Finally, you will add the `act` method, which will check if arrow keys are being
    pressed and, if so, accelerate the turtle in the corresponding direction. To actually
    update the position of the turtle, the `applyPhysics` method must be called. In
    addition, you will pause the animation whenever the turtle is not moving (and
    resume the animation when the turtle is moving), as well as rotate the turtle
    image to align with the angle of motion. These tasks are accomplished by the following
    code:


    ```

    public void act(float dt)

    {

    super.act( dt );

    if (Gdx.input.isKeyPressed(Keys.LEFT))

    accelerateAtAngle(180);

    if (Gdx.input.isKeyPressed(Keys.RIGHT))

    accelerateAtAngle(0);

    if (Gdx.input.isKeyPressed(Keys.UP))

    accelerateAtAngle(90);

    if (Gdx.input.isKeyPressed(Keys.DOWN))

    accelerateAtAngle(270);

    applyPhysics(dt);

    setAnimationPaused( !isMoving() );

    if ( getSpeed() > 0 )

    setRotation( getMotionAngle() );

    }

    ```


    This is a good point at which to test the code and verify that the turtle moves
    around the screen as expected. If you wish, you can experiment with the values
    set for acceleration, deceleration, and maximum speed and see what their effects
    are in the game.


    At this point, when the turtle overlaps the starfish, nothing happens. This will
    be remedied in the next section, where collision polygons will be introduced,
    which allow you to determine when two objects overlap.


    ## Collision Polygons


    In the version of Starfish Collector created in the previous chapter, collisions
    between the turtle and starfish did not appear precise to the player. This is
    because rectangles were used to approximate the shapes of the objects, which included
    a large region of transparent pixels near the corners of each image. To improve
    this aspect of the game, in this section you will add the option to use a polygon
    instead of a rectangle to approximate the boundary of non-rectangular shapes.
    You will also learn how to check for collisions with polygon shapes using the
    `Intersector` class and how to simulate solid objects in your game.'
