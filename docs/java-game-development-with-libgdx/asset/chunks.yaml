- fmt: '# Game Project: Visual Novels


    In this section, you will build upon the user-interface classes (such as `TextButton`
    and `Table`) and the cutscene framework to create a new game called The Missing
    Homework, as shown in Figure [5-17](#A352797_2_En_5_Chapter.html#Fig17). This
    game can be classified in the genre of visual novel games, which are completely
    story driven and present a series of choices to the player that influence the
    progression of the story. While this is a good opportunity to practice and refine
    your skills at creating user-interface elements, it is not needed in the chapters
    that follow, so this project can be skipped if you are not interested in this
    style of game.


    ![A352797_2_En_5_Fig17_HTML.jpg](A352797_2_En_5_Fig17_HTML.jpg)


    Figure 5-17. Screenshots from the game The Missing Homework


    In the game The Missing Homework, a student named Kelsoe Kismet has misplaced
    his homework somewhere in his school. The player chooses the locations where Kelsoe
    will search until he arrives at the location of the homework. There are a total
    of four locations in the game, shown in Figure [5-18](#A352797_2_En_5_Chapter.html#Fig18).


    ![A352797_2_En_5_Fig18_HTML.jpg](A352797_2_En_5_Fig18_HTML.jpg)


    Figure 5-18. Locations in The Missing Homework: hallway, classroom, science lab,
    and library


    The details of these locations are as follows:


    *   The hallway: This is where the character Kelsoe is introduced and the premise
    of the story is established. After the corresponding scene is finished, Kelsoe
    proceeds to the classroom.

    *   The classroom: After establishing that the homework is not at this location,
    the player may choose to proceed to the science lab or the library.

    *   The science lab: After establishing that the homework is not at this location,
    the player may choose to return to the classroom or proceed to the library.

    *   The library: After a brief search, Kelsoe discovers his missing homework,
    and the game ends.


    The connections between these locations are illustrated by the diagram in Figure
    [5-19](#A352797_2_En_5_Chapter.html#Fig19), where the circles represent branching
    points in the story corresponding to decisions that will be made by the player.


    ![A352797_2_En_5_Fig19_HTML.jpg](A352797_2_En_5_Fig19_HTML.jpg)


    Figure 5-19. Diagram of the locations in The Missing Homework


    To begin, create a new project in BlueJ named `The Missing Homework`. Download
    the files for this project from the book website and copy the `assets` folder
    and the `+libs` folder from the downloaded project into your local project. Also,
    in your local project folder, make copies of the following Java files from your
    `Starfish Collector Ch 5` project: `BaseGame.java`, `BaseScreen.java`, and `BaseActor.java`,
    as well as the cutscene-related Java files `DialogBox.java`, `Scene.java`, `SceneSegment.java`,
    `SetTextAction.java`, and `SceneActions.java`. The project will need to be reopened
    in BlueJ to see the added classes.


    Before starting to write any more code, it is important to establish the structure
    of this project. First, as always, there needs to be a custom `launcher` class
    and an extension of the `BaseGame` class. Similar to the Starfish Collector game
    with the cutscene added, there will be two extensions of the `BaseScreen` class:
    one containing a menu, the other containing the code to display the story. The
    latter will be a class named `StoryScreen`, which will contain four methods for
    initializing the scene segments corresponding to each of the locations described
    previously. (Note that the following classes will not compile until all classes
    have been created.) To begin, create a class named `Launcher` with the following
    code:


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class Launcher

    {

    public static void main (String[] args)

    {

    Game myGame = new HomeworkGame();

    LwjglApplication launcher

    = new LwjglApplication( myGame, "The Missing Homework", 800, 600 );

    }

    }

    ```


    Next, create a class named `HomeworkGame` with the following code:


    ```

    public class HomeworkGame extends BaseGame

    {

    public void create()

    {

    super.create();

    setActiveScreen( new MenuScreen() );

    }

    }

    ```


    To reduce the size of the text in this game, in the `BaseGame` class, change the
    line of code that sets the font size (the variable `fontParameters.size`) so the
    font size is `24`. Next, create a class named `MenuScreen` with the following
    code; it will produce the menu screen shown in Figure [5-20](#A352797_2_En_5_Chapter.html#Fig20):


    ![A352797_2_En_5_Fig20_HTML.jpg](A352797_2_En_5_Fig20_HTML.jpg)


    Figure 5-20. Menu screen for The Missing Homework


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.scenes.scene2d.ui.TextButton;

    import com.badlogic.gdx.scenes.scene2d.Event;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    import com.badlogic.gdx.scenes.scene2d.InputEvent.Type;

    public class MenuScreen extends BaseScreen

    {

    public void initialize()

    {

    BaseActor background = new BaseActor(0,0, mainStage);

    background.loadTexture( "assets/notebook.jpg" );

    background.setSize(800,600);

    BaseActor title = new BaseActor(0,0, mainStage);

    title.loadTexture( "assets/missing-homework.png" );

    TextButton startButton = new TextButton( "Start", BaseGame.textButtonStyle );

    startButton.addListener(

    (Event e) ->

    {

    if ( !(e instanceof InputEvent) ||

    !((InputEvent)e).getType().equals(Type.touchDown) )

    return false;

    BaseGame.setActiveScreen( new StoryScreen() );

    return false;

    }

    );

    TextButton quitButton = new TextButton( "Quit", BaseGame.textButtonStyle );

    quitButton.addListener(

    (Event e) ->

    {

    if ( !(e instanceof InputEvent) ||

    !((InputEvent)e).getType().equals(Type.touchDown) )

    return false;

    Gdx.app.exit();

    return false;

    }

    );

    uiTable.add(title).colspan(2);

    uiTable.row();

    uiTable.add(startButton);

    uiTable.add(quitButton);

    }

    public void update(float dt)

    {    }

    public boolean keyDown(int keyCode)

    {

    if (Gdx.input.isKeyPressed(Keys.ENTER))

    BaseGame.setActiveScreen( new StoryScreen() );

    if (Gdx.input.isKeyPressed(Keys.ESCAPE))

    Gdx.app.exit();

    return false;

    }

    }

    ```


