    非正式地说，你可以将接口视为一种其他类可以承诺履行的契约。举个简单的例子，假设你编写了一个 `Player` 类，其中包含一个名为 `talkTo` 的方法，用于与环境中的对象进行交互。`talkTo`
    方法接收一个名为 `creature` 的输入参数，在后续的代码中，你会看到：


    ```

    creature.speak();

    ```


    为了让 `talkTo` 方法正常工作，无论 `creature` 是哪个类的实例，它都必须有一个名为 `speak` 的方法。也许有时 `creature`
    是 `Person` 类的实例，而其他时候 `creature` 是 `Monster` 类的实例。通常，你希望 `talkTo` 方法尽可能包容——任何拥有
    `speak` 方法的对象都应被允许作为输入。你可以通过使用接口来指定这种行为。


    首先，按如下方式创建一个接口：


    ```

    public interface Speaker

    {

    public void speak();

    }

    ```


    乍一看，接口与类相似，只是方法仅被声明，不包含任何实际代码。所需的一切只是方法的签名：名称、输出类型、输入类型（如果有）以及任何修饰符（如 `public`）。这些信息后面跟着一个分号，而不是我们熟悉的包含代码的花括号。实现该接口的类将为其版本的
    `speak` 函数提供代码。需要强调的是，由于 `Speaker` 不是一个类，你不能创建 `Speaker` 对象的实例；相反，你需要编写其他类，这些类包含
    `Speaker` 接口中指定的方法。


    一个类通过在类名后添加关键字 `implements` 并跟上接口名称，来表示它满足该接口的要求（即包含所有指定的字段和方法）。任何实现 `Speaker`
    接口的类都必须为其版本的 `speak` 函数提供代码。下面通过一个名为 `Person` 的类和一个名为 `Monster` 的类来演示：


    ```

    public class Person implements Speaker

    {

    // 上方其他代码

    public void speak()

    {   System.out.println( "你好。" );  }

    // 下方其他代码

    }

    public class Monster implements Speaker

    {

    // 上方其他代码

    public void speak()

    {  System.out.println("嗷呜！");  }

    // 下方其他代码

    }

    ```


    永远记住：在实现接口时，你必须为接口中声明的所有内容编写方法；否则，会出现编译时错误。你甚至可以编写一个花括号内不包含任何代码的方法，如下所示（针对一个代表特别沉默的家具的类）。当你只需要使用接口的部分功能时，这会很方便。


    ```

    public class Chair implements Speaker

    {

    // 上方其他代码

    public void speak()  { }

    // 下方其他代码

    }

    ```


    最后，你编写 `talkTo` 方法，使其接收一个 `Speaker` 作为输入：


    ```

    public class Player

    {

    // 上方其他代码

    public void talkTo(Speaker creature)

    {

    creature.speak();

    }

    // 下方其他代码

    }

    ```


    任何实现了 `Speaker` 接口的类都可以作为 `Player` 对象的 `talkTo` 方法的输入。例如，我们展示一些代码，这些代码创建了每个类的实例，然后在随附的注释中描述结果：


    ```

    Player dan = new Player();

    Person chris = new Person();

    Monster grez = new Monster();

    Chair footstool = new Chair();

    dan.talkTo(chris); // 输出 "你好。"

    dan.talkTo(grez); // 输出 "嗷呜！"

    dan.talkTo(footstool); // 不输出任何内容

    ```


    在 LibGDX 中，应用程序要求用户创建的类实现 `ApplicationListener` 接口，以便它能处理游戏程序生命周期的所有阶段。然而，你可能还记得，在第
    1 章的示例中，`HelloWorldImage` 类并没有实现 `ApplicationListener` 类；它只是继承了 `Game` 类。为什么在编译该类时没有报错呢？如果你深入“引擎盖下”看看（在计算机编程语境中，通常指检查源代码³），你会注意到
    `Game` 类本身实现了 `ApplicationListener` 类，并包含了函数的“空”版本；定义每个函数体的花括号之间没有代码。这使你只需编写在继承
    `Game` 类的类中需要使用的接口方法变体，这些变体将覆盖 `Game` 类中的版本；任何你没有编写的接口方法将默认使用 `Game` 类中的空版本。（实际上，`ApplicationListener`
    接口总共需要六个方法：`create`、`render`、`resize`、`pause`、`resume` 和 `dispose`；在我们的示例中，你只编写了其中两个。）

