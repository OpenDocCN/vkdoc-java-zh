    Next, you will add the jump-through platforms. These provide a way for a player
    to reach higher parts of the level (other than jumping on a springboard or jumping
    up a series of solid tiles). Creating a vertical arrangement of platform objects
    provides ladder-like functionality. The `Platform` class will be one of two classes
    that extend the `Solid` class, and the jump-through functionality is one of the
    reasons that the `Solid` class was designed with the `enabled` property built
    in. To begin, create a new class called `Platform` with the following code:


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Platform extends Solid

    {

    public Platform(float x, float y, Stage s)

    {

    super(x,y,32,16,s);

    loadTexture("assets/items/platform.png");

    }

    }

    ```


    Next, in the `Koala` class, add the following method, which will be used to determine
    if the koala is jumping:


    ```

    public boolean isJumping()

    {

    return (velocityVec.y > 0);

    }

    ```


    Creating the platform objects is a straightforward process. As before, in the
    `initialize` method of the `LevelScreen` class, add the following code:


    ```

    for (MapObject obj : tma.getTileList("Platform") )

    {

    MapProperties props = obj.getProperties();

    new Platform( (float)props.get("x"), (float)props.get("y"), mainStage );

    }

    ```


    Typically, platforms function the same as solid objects, with two exceptions:
    the solid functionality is disabled when jumping up through the platform from
    below, or when jumping down through the platform from above. In both of these
    scenarios, the solid functionality of the platform in question must be re-enabled
    after the koala has passed through it. To begin, in the `update` method, locate
    the block of code that iterates over the list of `Solid` objects. Since the `Platform`
    class extends the `Solid` class, platform objects are included in the list. Directly
    after the line of code that casts the actor to the `Solid` class, add the following
    code, which completely handles the case where the koala jumps up through a platform:


    ```

    if ( solid instanceof Platform )

    {

    if ( jack.isJumping() && jack.overlaps(solid) )

    solid.setEnabled(false);

    if ( jack.isJumping() && !jack.overlaps(solid) )

    solid.setEnabled(true);

    }

    ```


    Jumping down through a solid is slightly more complicated. The idea is this: when
    the player presses the spacebar to jump (which is handled by the `keyDown` method),
    if the player is also currently pressing the down arrow key, then any platforms
    underneath the koala (those which overlap the below sensor) should have their
    solid functionality disabled. Then, once the koala has completely fallen through
    the platform (which can be checked in the `update` method), the solid functionality
    will be re-enabled. To accomplish this, in the `LevelScreen` class, add the following
    `import` statement:


    ```

    import com.badlogic.gdx.Gdx;

    ```


    Then, change the `keyDown` method to the following:


    ```

    public boolean keyDown(int keyCode)

    {

    if (gameOver)

    return false;

    if (keyCode == Keys.SPACE)

    {

    if ( Gdx.input.isKeyPressed(Keys.DOWN) )

    {

    for (BaseActor actor : BaseActor.getList(mainStage, "Platform"))

    {

    Platform platform = (Platform)actor;

    if ( jack.belowOverlaps(platform) )

    {

    platform.setEnabled(false);

    }

    }

    }

    else if ( jack.isOnSolid() )

    {

    jack.jump();

    }

    }

    return false;

    }

    ```


    This change takes care of disabling the solid functionality when jumping down.
    To re-enable it, in the `update` method, in the block of code you recently added
    (that checks for instances of platforms), add the following code:


    ```

    if ( jack.isFalling() && !jack.overlaps(solid) && !jack.belowOverlaps(solid) )

    solid.setEnabled(true);

    ```


    With these additions, jump-through functionality is complete.


    ### Keys and Locks


    This final addition to the Jumping Jack game involves key and lock objects. The
    locks are solid blocks that the koala cannot pass through until he collects a
    key with the same color. Locks can be used to surround the goal flag, wall off
    collections of coins, or block access to a shortcut or further progress in the
    level. Keys and locks and a puzzle-like element can be used to encourage backtracking
    and level exploration. In the tilemap, the object tiles representing the keys
    and locks have a custom property called `color` that can be set to any value desired;
    when reading in the data from the tilemap, this data can be used and the actor
    color set accordingly.


    To begin, create a new class called `Key` with the following code. Since there
    is no image-based animation (as was also the case for the `Timer` object), a value-based
    animation is added to this object to make the key rotate back and forth by a small
    amount.


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.Action;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    public class Key extends BaseActor

    {

    public Key(float x, float y, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/items/key.png");

    rotateBy(10);

    Action tilt = Actions.sequence(

    Actions.rotateBy(-20, 0.5f),

    Actions.rotateBy(20, 0.5f) );

    addAction( Actions.forever(tilt) );

    }

    }

    ```


    Next, create a new class called `Lock` with the following code. Since locks are
    solid, this class extends the `Solid` class (as was also the case for the `Platform`
    class).


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Lock extends Solid

    {

    public Lock(float x, float y, Stage s)

    {

    super(x,y,32,32,s);

    loadTexture("assets/items/lock.png");

    }

    }

    ```


    Whenever a key is collected, this is indicated by adding a corresponding-color
    key icon to the user interface. To keep track of the data (the colors of the keys
    that have been collected), an `ArrayList` will be used. When the koala comes into
    contact with a lock and has collected the corresponding-color key, the lock will
    fade out and then be removed from the game. To begin, in the `LevelScreen` class,
    add the following `import` statements:


    ```

    import java.util.ArrayList;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    ```


    Then, add the following variable declaration to the class:


    ```

    ArrayList keyList;

    ```


    In the `initialize` method, initialize the list as follows:


    ```

    keyList = new ArrayList();

    ```


    To set up the keys and locks based on the tilemap data, add the following code.
    Note that in both cases, the value of the custom property named `color` needs
    to be determined, and according to that value, the color of the actor needs to
    be set.


    ```

    for (MapObject obj : tma.getTileList("Key") )

    {

    MapProperties props = obj.getProperties();

    Key key = new Key( (float)props.get("x"), (float)props.get("y"), mainStage );

    String color = (String)props.get("color");

    if ( color.equals("red") )

    key.setColor(Color.RED);

    else // default color

    key.setColor(Color.WHITE);

    }

    for (MapObject obj : tma.getTileList("Lock") )

    {

    MapProperties props = obj.getProperties();

    Lock lock = new Lock( (float)props.get("x"), (float)props.get("y"), mainStage
    );

    String color = (String)props.get("color");

    if ( color.equals("red") )

    lock.setColor(Color.RED);

    else // default color

    lock.setColor(Color.WHITE);

    }

    ```


    Then, in the `update` method, to handle the collecting of the keys, add the following
    code:


    ```

    for (BaseActor key : BaseActor.getList(mainStage, "Key"))

    {

    if ( jack.overlaps(key) )

    {

    Color keyColor = key.getColor();

    key.remove();

    BaseActor keyIcon =  new BaseActor(0,0,uiStage);

    keyIcon.loadTexture("assets/key-icon.png");

    keyIcon.setColor(keyColor);

    keyTable.add(keyIcon);

    keyList.add(keyColor);

    }

    }

    ```'
