  trans: '

    ### 敌机


    敌机在许多方面与星星类似：它们会定期生成并以相似的方式移动，一旦移出屏幕左边缘就应从游戏中移除，能够影响玩家的得分，并且当玩家与其碰撞时会发生某些事件。首先，使用以下代码创建一个名为
    `Enemy` 的新类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Enemy extends BaseActor

    {

    public Enemy(float x, float y, Stage s)

    {

    super(x,y,s);

    String[] filenames =

    {"assets/planeRed0.png", "assets/planeRed1.png",

    "assets/planeRed2.png", "assets/planeRed1.png"};

    loadAnimationFromFiles(filenames, 0.1f, true);

    setSpeed(100);

    setMotionAngle(180);

    setBoundaryPolygon(8);

    }

    public void act(float dt)

    {

    super.act(dt);

    applyPhysics(dt);

    }

    }

    ```


    你可能会注意到这个类与 `Star` 类的一个区别：在 `Enemy` 类中，`act` 方法没有包含当敌机移出屏幕左边缘时将其从游戏中移除的代码。这是因为你还希望在此事件发生时增加玩家的得分，而这需要在
    `LevelScreen` 类中执行。现在，请将注意力转向 `LevelScreen` 类。首先，添加以下 `import` 语句，用于加载“游戏结束”消息图片（因为它不够重要，无需单独创建一个类）：


    ```

    import com.badlogic.gdx.Gdx;

    ```


    接下来，添加以下变量声明：


    ```

    float enemyTimer;

    float enemySpawnInterval;

    float enemySpeed;

    boolean gameOver;

    BaseActor gameOverMessage;

    ```


    在 `initialize` 方法的末尾，添加以下代码来初始化这些变量：


    ```

    enemyTimer = 0;

    enemySpeed = 100;

    enemySpawnInterval = 3;

    gameOver = false;

    gameOverMessage = new BaseActor(0,0,uiStage);

    gameOverMessage.loadTexture("assets/game-over.png");

    gameOverMessage.setVisible(false);

    ```


    此外，为了将“游戏结束”消息放入用户界面，请找到包含 `uiTable.add().expandY()` 语句的代码行，并将其修改为以下内容：


    ```

    uiTable.add(gameOverMessage).expandY();

    ```


    接下来，在 `update` 方法的末尾，添加以下代码。如前所述，这段代码将生成敌机，并检查碰撞和移出屏幕的情况。请注意，在敌机生成后，除了重置 `enemyTimer`
    变量的值外，敌机生成间隔会缩短，敌机速度会增加，从而提升挑战性。（稍后，你可能希望调整这些变量的变化量。）此外，一对条件语句用于确保这些变量的值不会变得过小或过大，否则会导致游戏难度变得荒谬。（例如，如果生成速率低于
    0.016，那么敌机将在每一帧生成，导致几乎连续不断的敌机流，玩家将无法躲避。）


    ```

    enemyTimer += dt;

    if (enemyTimer > enemySpawnInterval)

    {

    Enemy enemy = new Enemy( 800, MathUtils.random(100,500), mainStage );

    enemy.setSpeed(enemySpeed);

    enemyTimer = 0;

    enemySpawnInterval -= 0.10f;

    enemySpeed += 10;

    if (enemySpawnInterval  400)

    enemySpeed = 400;

    }

    for (BaseActor enemy : BaseActor.getList(mainStage, "Enemy"))

    {

    if (plane.overlaps(enemy))

    {

    plane.remove();

    gameOver = true;

    gameOverMessage.setVisible(true);

    }

    if (enemy.getX() + enemy.getWidth() < 0)

    {

    score++;

    scoreLabel.setText( Integer.toString(score) );

    enemy.remove();

    }

    }

    ```


    最后，`Boolean` 变量 `gameOver` 的目的是在游戏结束后停止星星和敌机的生成以及分数的增加。这可以通过在 `gameOver` 变为 `true`
    时跳过 `update` 方法中先前编写的代码来实现。为此，请在 `update` 方法的开头添加以下语句：


    ```

    if (gameOver)

    return;

    ```


    现在，你再次来到了测试游戏的好时机。请确保每次敌机从屏幕左侧移出时你都能获得一分，并且当玩家的飞机与敌机碰撞时，“游戏结束”消息会出现（并且物体停止生成）。在认为游戏完成之前，你还需要添加一些收尾工作：特效和音频。


    ## 收尾工作


    虽然游戏机制已完全实现，但还应额外考虑美学方面。在本节中，你将添加一些背景音乐来营造游戏氛围，并在玩家的飞机与其他物体碰撞时提供视觉和音频反馈（特效和音效）。当飞机与星星碰撞时，会出现闪烁的视觉效果，并伴有轻快、安静的叮当声。当飞机与敌机碰撞时，会出现爆炸效果，并伴有低沉、隆隆的爆炸声。背景音乐是一首富有动感的器乐作品，名为“Prelude
    and Action”，¹ 旨在为游戏增添紧张感和刺激感。


    要开始添加这些功能，你首先需要为视觉效果创建类。首先，使用以下代码创建一个名为 `Sparkle` 的类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Sparkle extends BaseActor

    {

    public Sparkle(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/sparkle.png", 8,8, 0.02f, false);

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( isAnimationFinished() )

    remove();

    }

    }

    ```


    接下来，使用以下代码创建一个名为 `Explosion` 的类：


    ```

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Explosion extends BaseActor

    {

    public Explosion(float x, float y, Stage s)

    {

    super(x,y,s);

    loadAnimationFromSheet("assets/explosion.png", 6,6, 0.02f, false);

    }

    public void act(float dt)

    {

    super.act(dt);

    if ( isAnimationFinished() )

    remove();

    }

    }

    ```


    接下来，在 `LevelScreen` 类中，添加以下两个 `import` 语句以启用游戏中的音频功能：


    ```

    import com.badlogic.gdx.audio.Sound;

    import com.badlogic.gdx.audio.Music;

    ```


    然后，添加以下变量声明：


    ```

    Music backgroundMusic;

    Sound sparkleSound;

    Sound explosionSound;

    ```


    为了初始化这些对象，请在 `initialize` 方法的末尾添加以下代码：


    ```

    backgroundMusic = Gdx.audio.newMusic(Gdx.files.internal("assets/Prelude-and-Action.mp3"));

    sparkleSound    = Gdx.audio.newSound(Gdx.files.internal("assets/sparkle.mp3"));

    explosionSound  = Gdx.audio.newSound(Gdx.files.internal("assets/explosion.wav"));

    backgroundMusic.setLooping(true);

    backgroundMusic.setVolume(1.00f);

    backgroundMusic.play();

    ```


    为了添加与星星碰撞对应的新功能，请在 `update` 方法中找到条件语句 `if (plane.overlaps(star))` 后面的代码块，并添加以下内容：


    ```

    Sparkle sp = new Sparkle(0,0,mainStage);

    sp.centerAtActor(star);

    sparkleSound.play();

    ```


    为了添加与敌机碰撞对应的新功能，同样在 `update` 方法中，找到条件语句 `if (plane.overlaps(enemy))` 后面的代码块，并添加以下内容：


    ```

    Explosion ex = new Explosion(0,0,mainStage);

    ex.centerAtActor(plane);

    ex.setScale(3);

    explosionSound.play();

    backgroundMusic.stop();

    ```


    通过这些添加，新的美学功能已完全实现。尽管实现这些功能所需的代码总量很少，但它们对玩家体验的影响将是巨大的。再次运行你的项目，确保代码按预期工作。享受你的游戏吧！

    '
- fmt: '# Summary and Next Steps


    In this chapter, you created the side-scrolling action game Plane Dodger. Using
    the custom framework classes developed in the first part of this book, you learned
    how to implement some new mechanics, such as an infinite scrolling background,
    parallax, gravity, and difficulty ramps.


    There are still many features you could add to improve the quality of this game.
    Some of the easier additions include adding a start menu that is displayed before
    the game begins, and a button that appears after the game ends to allow the player
    to return to the start menu. You may also want to store the highest score achieved
    by the player in a variable and display it on the start menu. An ambitious addition
    would be to store the high score in a text file, using the skills you developed
    in Chapter [6](#A352797_2_En_6_Chapter.html), so that the high score is preserved
    even if the player exits the application and restarts it later. For variety, you
    could also consider changing the movement pattern of the enemy planes, perhaps
    changing their y-coordinate as they move across the screen in the pattern of a
    sine wave, for example. To improve the visual and audio feedback, you could add
    an animated exhaust-like visual effect to the player’s plane that appears each
    time the player activates the vertical boost (similar in spirit to the appearance
    of the thrusters in the Space Rocks game), accompanied by a sound effect. You
    could also add an engine-like sound effect for each enemy plane that passes by.
    For a completely different gameplay feeling, you could consider moving the player’s
    plane continuously rather than discretely by removing the boost method functionality
    and checking for keyboard input in the `update` method (accelerating the player’s
    plane upward in that case). To lengthen the gameplay sessions, you could allow
    the player to be hit a fixed number of times by the enemy’s plane before being
    destroyed (similar in spirit to the purpose of the shields in the Space Rocks
    game).


    In the next chapter, you will once again explore the possibilities of this custom
    framework by creating a brick-breaking game called Rectangle Destroyer, where
    you will learn how to implement new mechanics such as bouncing and power-ups.


    Footnotes [1](#A352797_2_En_7_Chapter.html#Fn1_source)


    “Prelude and Action” was written by Kevin McLeod from [`http://incompetech.com`](http://incompetech.com)
    and released under the Creative Commons Attribution 3.0 license.


    # 8. Bouncing and Collision Games


    In this chapter, you will create a ball-bouncing, brick-breaking game called Rectangle
    Destroyer, shown in Figure [8-1](#A352797_2_En_8_Chapter.html#Fig1), inspired
    by arcade and early console games such as Breakout and Arkanoid. New features
    that will be implemented in this game include bouncing off of objects and power-up
    items.


    ![A352797_2_En_8_Fig1_HTML.jpg](A352797_2_En_8_Fig1_HTML.jpg)


    Figure 8-1. The Rectangle Destroyer Game


    ## Game Project: Rectangle Destroyer


    Rectangle Destroyer is an action game in which the player controls a paddle that
    moves from side to side along the bottom of the screen and uses it to bounce a
    ball toward the rectangular brick-like objects above to destroy them. Destroying
    each brick awards points to the player, and if all the bricks are destroyed, the
    player wins the game. If the ball falls past the bottom edge of the screen, the
    ball is lost. If there are any balls in reserve (the player begins with three
    in reserve), a new ball will be spawned above the paddle. When the ball collides
    with the paddle, the angle at which it bounces off is determined by the point
    of collision: hitting the left side of the paddle causes the ball to bounce to
    the left, hitting the right side causes the ball to bounce to the right, and hitting
    the center causes the ball to bounce straight up.


    Occasionally, a destroyed brick will release an item that will drift toward the
    bottom of the screen. Items can have various effects on gameplay, such as changing
    the size of the paddle or altering the speed of the ball. The effect of the item
    is indicated by its image. If the paddle collects the item (by colliding with
    it), then the item’s effect is activated. There are some items that make the game
    more difficult, such as the paddle-shrinking item, which the player may wish to
    avoid. Occasionally, collecting a beneficial item also includes the risk of missing
    the ball as it falls toward the bottom of the screen; the player must make decisions
    carefully.


    The player controls the paddle by moving the mouse left and right. At the start
    of the game, and every time the ball is respawned, the ball will be locked to
    the top of the paddle and will be released when the player clicks a mouse button.


    The user interface contains a few text displays. Along the top of the screen,
    the player’s score and the number of balls in reserve are displayed. In the center
    of the screen, text will appear informing the player that they should click a
    mouse button to start the game, and a message will appear when the player has
    won or lost the game.


    The game has a simple line-art style and has upbeat background music to match
    the pace of the game. Short sound effects are played when game-world objects interact:
    when the ball bounces off of the paddle, bricks, or walls, and when items appear
    and are collected.


    Beginning this project requires the same steps as in previous projects: creating
    a new project, creating an `assets` folder and a `+libs` folder (the latter not
    being necessary if you have set up the `userlib` directory), copying the custom
    framework files you created in the first part of this book (`BaseGame.java`, `BaseScreen.java`,
    `BaseActor.java`), and copying the graphics and audio for this project into your
    `assets` folder. As described in the previous chapter, a BlueJ project named `Framework`
    has been created for your convenience that contains these items (except for the
    project-specific assets), as well as a `launcher` class and extensions of the
    `BaseGame` and `BaseScreen` classes. For efficiency, these files will be used
    as a starting point. To begin this project:


    - Download the source code files for this chapter.

    - Make a copy of the downloaded `Framework` folder (and its contents) and rename
    it to `Rectangle Destroyer`.

    - Copy all the contents of the downloaded `Rectangle Destroyer` project `assets`
    folder into your newly created `Rectangle Destroyer assets` folder.

    - Open the BlueJ project in your `Rectangle Destroyer` folder.

    - In the `CustomGame` class, change the name of the class to `RectangleGame` (BlueJ
    will then rename the source code file to `RectangleGame.java`).

    - In the `Launcher` class, change the contents of the `main` method to the following:


    ```

    Game myGame = new RectangleGame();

    LwjglApplication launcher = new LwjglApplication(

    myGame, "Rectangle Destroyer", 800, 600 );

    ```


    At this point, you are ready to begin creating the classes for the game-specific
    objects and the code for the gameplay itself.


    ## Creating the Game Objects


    Over the course of this section, you will create classes for the four main game
    objects: the paddle, the walls, the bricks, and the ball. After creating each
    class, you’ll add code to the `screen` class that adds the objects to the game
    and enables them to interact with each other.'
