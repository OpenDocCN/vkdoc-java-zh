    *   `modifier` is a keyword (such as `public` or `private` ) that indicates where
    this method can be used in the program (see later in the appendix for more information).

    *   `returnType` indicates the type of data being returned and can be set to `void`
    if no data is returned by the method.

    *   `methodName` is the name of the method.


    ```

    modifer returnType methodName ( variableType variableName , ... )

    {

    // statements

    }

    ```


    Within the parentheses, for each input that is to be provided, you must list the
    type of input (indicated by `variableType` ) and the name by which it will be
    referred to in the statements that follow (indicated by `variableName` ).


    For example, the following public-access method called `average` takes two `float`
    values as input, calculates their average (which is also a `float` ), and returns
    this value:


    ```

    public float average(float x, float y)

    {

    return (x + y) / 2;

    }

    ```


    Methods can be called upon in two ways, depending on how they are written. Some
    methods may be called from the class that contains them. For example, the `Math`
    class contains a method named `sqrt` that calculates the square root of a number;
    to use this method to calculate the square root of 4, you would write `Math.sqrt(4)`
    . Alternatively, some methods are called from a variable. As an example, every
    `String` variable contains a method named `charAt` that returns the character
    at a given position in the string. If you create a `String` named `word` that
    contains the text “ `games,”` then `word.charAt(2)` returns the character `''m''`
