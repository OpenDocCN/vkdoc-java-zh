  trans: '

    ### 使用触摸板


    `Touchpad` 对象使用两张图片进行渲染：一张代表背景，另一张代表旋钮。用户可以触摸（或点击）旋钮并将其拖离中心；其移动范围被限制在一个圆形区域内，该区域包含在背景图片定义的矩形范围中。


    这些对象需要两个参数来初始化。首先，你需要提供一个死区半径的值——即旋钮必须被拖动的**最小距离**（以像素为单位），才能触发任何变化。（这与本章前面游戏手柄部分讨论的死区概念相同。）这在玩家希望将手指放在触摸板上但同时又希望角色保持静止的情况下非常有用。如果没有死区设置，控制会过于灵敏，无法实现这种操作。普通玩家不太可能拥有像素级精确的手指定位能力来让旋钮完全居中，这会导致被控制的角色产生不必要的（并且可能让玩家沮丧的）漂移。


    其次，`Touchpad` 对象中使用的图片存储在 `TouchpadStyle` 对象中，该对象包含两张图片，均以 `Drawable` 对象的形式存储，这是
    LibGDX 中 UI 元素的标准做法；你在之前为“重新开始”按钮对象创建图片时已经遇到过这种情况。和之前一样，你需要将每张图片加载到 `Texture`
    对象中，然后将其转换为 `TextureRegion`，再转换为 `TextureRegionDrawable`。


    要开始这些添加工作，请在 `LevelScreen` 类中，修改类声明，使其继承你新创建的 `BaseTouchScreen` 类，而不是 `BaseScreen`
    类，如下所示：


    ```

    public class LevelScreen extends BaseTouchScreen

    ```


    然后，添加以下 `import` 语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad;

    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad.TouchpadStyle;

    import com.badlogic.gdx.math.Vector2;

    ```


    此外，添加以下变量声明：


    ```

    private Touchpad touchpad;

    ```


    然后，在 `initialize` 方法中，添加以下代码来更改窗口大小、激活设置控制舞台和表格的函数，并添加背景图片：


    ```

    Gdx.graphics.setWindowedMode(800,800);

    initializeControlArea();

    BaseActor controlBackground = new BaseActor(0,0, controlStage);

    controlBackground.loadTexture("assets/pixels.jpg");

    ```


    在此之后，添加以下代码来设置 `Touchpad` 对象，死区半径为 5 像素：


    ```

    TouchpadStyle touchStyle = new TouchpadStyle();

    Texture padKnobTex = new Texture(Gdx.files.internal("assets/joystick-knob.png"));

    TextureRegion padKnobReg = new TextureRegion(padKnobTex);

    touchStyle.knob = new TextureRegionDrawable(padKnobReg);

    Texture padBackTex = new Texture(Gdx.files.internal("assets/joystick-background.png"));

    TextureRegion padBackReg = new TextureRegion(padBackTex);

    touchStyle.background = new TextureRegionDrawable(padBackReg);

    touchpad = new Touchpad(5, touchStyle);

    ```


    接下来，将触摸板和“重新开始”按钮添加到 `controlTable` 中，如下所示。注意添加了一个高度为 600 的空行，用于将控件保持在窗口（高度为 800）底部
    200 像素的区域内。


    ```

    controlTable.toFront();

    controlTable.pad(50);

    controlTable.add().colspan(3).height(600);

    controlTable.row();

    controlTable.add(touchpad);

    controlTable.add().expandX();

    controlTable.add(restartButton);

    ```


    现在，为了利用触摸板数据，在 `update` 方法中添加以下代码，该代码将触摸板旋钮的位移数据存储在一个向量中，使用向量的长度将乌龟的速度设置为其最大速度（100
    像素/秒）的百分比，并使用向量的角度设置乌龟的运动方向。这段代码与前面关于游戏手柄控制器的部分中的代码类似，不同之处在于 `Touchpad` 类本身处理了死区计算，因此这里没有出现比较：


    ```

    Vector2 direction = new Vector2( touchpad.getKnobPercentX(), touchpad.getKnobPercentY()
    );

    float length = direction.len();

    if ( length > 0 )

    {

    turtle.setSpeed( 100 * length );

    turtle.setMotionAngle( direction.angle() );

    }

    ```


    最后，由于你正在使用触摸板来控制乌龟的运动，你可以删除 `Turtle` 类的 `act` 方法中检查键盘输入并设置乌龟加速度的代码行。此时，海星收集者游戏应如图
    13-4 所示进行渲染，你就可以准备测试程序了，使用鼠标来控制现在移动乌龟的触摸板。


    ## 总结与下一步


    在本章中，你为海星收集者游戏添加了两种新的玩家交互方式。首先，你通过使用 LibGDX 库的控制器扩展，为基础游戏添加了游戏手柄控制器支持。这需要在你的项目中包含一些新的
    JAR 文件，以及创建一个 `BaseScreen` 类的扩展和一个专门用于存储特定游戏手柄上每个摇杆、按钮、方向键和扳机对应值的类。你学习了如何轮询连续输入，以及如何实现响应离散输入的接口。接着，你学习了如何添加触摸屏风格的支持，创建了另一个
    `BaseScreen` 类的扩展，并使用了一个 `Touchpad` 对象。本章还讨论了在添加屏幕控件时出现的设计问题，并展示了一种缓解这些问题的方法——通过使用
    `glViewport` 方法重新定位舞台的渲染位置。


    此时，为了练习和磨练你新掌握的技能，你可以回到之前的游戏项目，并为它们也实现游戏手柄或触摸屏控制。当你对自己的进展感到满意时，下一章将介绍另一个高级主题：在创建基于迷宫的游戏的背景下进行程序化内容生成。


    脚注 1


    通常被称为方向键的控制元件，在传统飞行模拟器中被称为视角控制，这解释了 LibGDX 源代码中使用 POV 缩写的原因。


    # 14. 迷宫游戏


    在本章中，你将学习如何创建基于迷宫的 Maze Runman 游戏，如图 14-1 所示，其灵感来源于诸如《吃豆人》等街机游戏以及 Atari 2600 主机游戏《迷宫狂热：警察与强盗》。本章的主要新概念是用于生成和解决迷宫的算法。


    ![A352797_2_En_14_Fig1_HTML.jpg](img/A352797_2_En_14_Fig1_HTML.jpg)


    图 14-1.


    Maze Runman 游戏

    '
- fmt: '# Game Project: Maze Runman


    `Maze Runman` is an action game in which the main character, referred to as the
    hero, races through a maze attempting to collect all the coins before being captured
    by a ghost. The ghost is somewhat slower than the hero but always follows the
    shortest path to reach the player, even if that requires suddenly changing directions
    as the hero moves about the maze. Each time the player starts the game, a new
    maze is generated, and some maze layouts may be more difficult than others: there
    may be long, dead-end corridors that the hero needs to navigate. One strategy
    for dealing with situations like this is for the hero to lead the ghost to the
    opposite end of the maze to give themselves enough time to make it in and out
    of the corridor before being trapped or cornered by the ghost. If the ghost makes
    contact with the hero, the player instantly loses, but if the hero collects all
    the coins, the ghost disappears and the player wins.


    The game features a top-down perspective, and the player uses the arrow keys to
    walk north, south, east, and west. By holding down multiple arrow keys, it is
    possible for the hero to move diagonally, which may provide a small advantage
    depending on the layout of the maze. The user interface consists of a label across
    the top of the screen (above the maze area) that displays the number of coins
    remaining, as well as a large text message that appears in the middle of the screen
    when the game ends, displaying a message that depends on whether the player won
    or lost the game.


    The game uses simple graphics for the game world, four-directional walking animations
    for the hero (similar to those used in the `Treasure Quest` game in Chapter [12](#A352797_2_En_12_Chapter.html)),
    and a translucent animation for the ghost. When a coin is collected, a sound effect
    plays. In addition, there is a quiet ambient wind sound that plays in the background
    that gets louder as the ghost gets closer to the hero.


    Beginning this project requires similar steps as in previous projects. In BlueJ,
    create a new project called `Maze Runman`. In the project folder, create an `assets`
    folder and a `+libs` folder containing the LibGDX JAR files (the latter not being
    necessary if you have set up the `userlib` directory). Add the custom framework
    files you created in the first part of this book (`BaseGame.java`, `BaseScreen.java`,
    `BaseActor.java`). In addition, you should download the source files for this
    chapter and copy the contents of the downloaded `assets` folder into your project’s
    `assets` folder.


    ## Maze Generation


    The first and most important task in this project is to create the maze that the
    hero and the ghost will navigate. While in theory you could create a maze using
    level-design software such as the Tiled map editor, in this chapter you will instead
    write an algorithm that generates a new maze every time the player starts the
    game. One benefit to this approach is that it greatly adds to the replay value
    of the game; each new play session will be a brand-new experience. Techniques
    such as this fall under the category of procedural content generation: the creation
    of structured game content with algorithms. It can also incorporate techniques
    such as creating entire textures from code (rather than loading them from image
    files), but typically does not include techniques such as randomly initializing
    game-character parameters (such as enemy size or speed) or background scenery
    elements that have no effect on gameplay.


    The overall process you will use for maze generation is as follows: first, you
    will create a rectangular grid of rooms (each 64 by 64 pixels large), where walls
    are placed on each of the edges. Second, you will remove walls between rooms in
    such a way as to create a maze: starting from any room in the maze, there should
    be a path the player can follow to reach any other room. Third, you will remove
    some additional walls at random to create multiple paths between rooms.


    To implement the first step in this process, you will create a `Wall` class, followed
    by a `Room` class (which will contain four `Wall` objects and store references
    to the adjacent `Room` objects), and then a `Maze` class that will create the
    grid of rooms. To test it out, you will then create a `LevelScreen` class that
    extends `BaseScreen`, a `MazeGame` class that extends `BaseGame`, and a `Launcher`
    class to run the game.


    To begin, create a new class named `Wall` with the following code. Note that the
    constructor also takes the width and the height of the wall as parameters; this
    will be useful, as in each room the north and south walls will have a greater
    width, while the east and west walls will have a greater height.


    ```java

    import com.badlogic.gdx.scenes.scene2d.Stage;

    public class Wall extends BaseActor

    {

    public Wall(float x, float y, float w, float h, Stage s)

    {

    super(x,y,s);

    loadTexture("assets/square.jpg");

    setSize(w,h);

    setBoundaryRectangle();

    }

    }

    ```


    Next, create a class called `Room` as follows. Note that there are arrays to store
    the walls and references to adjacent rooms (called neighbors), as well as a set
    of named constants to more easily identify which direction each array index represents.
    There are also methods for accessing and altering the data in these arrays.'
