- fmt: '# Part I


    ## Fundamental Concepts


    In the following chapters, you will be introduced to the LibGDX library and build
    a custom framework on top of this library to simplify creating a variety of games.
    These chapters are the foundation for the rest of the book; future chapters will
    assume a working knowledge of the topics presented here.


    **Chapter 1: Getting Started with Java and LibGDX**


    This chapter will explain how to set up BlueJ, a Java development environment
    that has been chosen for its simplicity and user-friendliness. The standard first
    program (which prints “Hello, World!” to the text console) will be explained.
    Next, instructions for setting up the LibGDX software library will be given, and
    a visual “Hello, World!” program will be presented (which displays an image of
    the world in a window). Finally, some of the benefits of using LibGDX for game
    development will be explained in detail.


    **Chapter 2: The LibGDX Framework**


    This chapter will begin by discussing the overall structure of a video game program,
    including the stages that a game program progresses through and the tasks that
    must be accomplished at each stage. Many of the major features and classes of
    the LibGDX library will be introduced in the process of creating a basic game
    called Starfish Collector. This game is a recurring example throughout the book;
    features will be added to this project when introducing new topics.


    **Chapter 3: Extending the Framework**


    In this chapter, you’ll start with a core LibGDX class that represents game entities
    and create an extension of this class to support animation, physics-based movement,
    improved collision detection, and the ability to manage multiple instances of
    an entity using lists.


    **Chapter 4: Shoot-em-up Games**


    This chapter will demonstrate the power of the framework you have created by using
    that framework to make an entirely new game: Space Rocks, a space-themed shoot-em-up
    game inspired by the classic arcade game Asteroids. Along the way, you will add
    to the framework, incorporating the ability to handle input for discrete actions
    such as shooting lasers (in contrast to continuous actions, such as movement).


    **Chapter 5: Text and User Interfaces**


    In this chapter, you will learn how to display text, create buttons that display
    an image or text, and design a user interface using tables. First, you will be
    introduced to these skills by adding these features to the Starfish Collector
    game from Chapter 3. Then, you will build on and strengthen these skills while
    learning how to create cutscenes (sometimes called in-game cinematics) that provide
    a narrative element to your games. In an optional final section, you will create
    a visual novel–style game called The Missing Homework, which focuses on a story
    and allows the player to make decisions about how the story proceeds.


    **Chapter 6: Audio**


    In this chapter, you will learn how to add audio elements—sound effects and background
    music—to your game. First, you will be introduced to these topics by adding these
    features to the Starfish Collector. Then, in an optional section, you will build
    on these skills with a musical rhythm–based game called Rhythm Tapper, in which
    the player presses a sequence of keys indicated visually that are synchronized
    with music playing in the background.


    # 1. Getting Started with Java and LibGDX


    This chapter will explain how to set up a Java development environment and configure
    it to run with the LibGDX game development framework. You’ll see a simple example
    of a “Hello, World!” program and explore it in enough detail to understand the
    different parts. Finally, you’ll learn some of the advantages to be gained by
    working with the LibGDX library.


    ## Choosing a Development Environment


    Before diving into Java programming, you will need to set up an integrated development
    environment (IDE)—the software you will use for writing, debugging, and compiling
    code. There are many editors for writing your Java programs, each customized for
    different skill levels. BlueJ ([`www.bluej.org`](http://www.bluej.org)) and DrJava
    ([`www.drjava.org`](http://www.drjava.org)) are designed for beginners and educational
    use and are frequently used in introductory programming courses in schools and
    colleges. IntelliJ IDEA ([`www.jetbrains.com/idea/`](http://www.jetbrains.com/idea/)),
    NetBeans (`netbeans.org`), and Eclipse (`eclipse.org`) are advanced editors that
    are preferred by practicing professionals. For compiling and running Java code,
    you’ll need the Java Development Kit (JDK), which is available directly from the
    Oracle Corporation or is bundled directly with some of the editors just listed.


    Each editor has advantages and disadvantages. BlueJ and DrJava are user friendly
    and have simple, minimal user interfaces, but lack some of the advanced editors’
    features, such as autocompletion of fields, methods, and import statements. The
    advanced editors are faster, feature-packed, more powerful, highly customizable,
    and replete with various plug-ins, but they also have a steep learning curve and
    user interfaces that may be more daunting to beginners. Figure 1-1 illustrates
    this point with a side-by-side comparison of the Eclipse and BlueJ interfaces.
    The screenshots and descriptions of the BlueJ software in this chapter are from
    BlueJ version 4.1.0.


    ![A352797_2_En_1_Fig1_HTML.jpg](A352797_2_En_1_Fig1_HTML.jpg)


    **Figure 1-1.** User interfaces for Eclipse (left) and BlueJ (right)


    This chapter will cover how to set up BlueJ. I chose this particular IDE because
    it is quick and easy to set up and configure, which will enable you to start programming
    games even faster. However, if you are already familiar and comfortable with one
    of the more advanced editors, of course you should feel free to use it rather
    than BlueJ. A wealth of informational material is available for setting up Eclipse,
    NetBeans, and IntelliJ IDEA with LibGDX at the LibGDX wiki ([`https://github.com/libgdx/libgdx/wiki`](https://github.com/libgdx/libgdx/wiki)).
    If you choose to use one of these programs, then after your IDE is set up, skip
    ahead to the upcoming section “Creating a ‘Hello, World!’ Program for LibGDX.”


    ## Setting Up BlueJ


    This section will cover how to set up the BlueJ IDE. Since it was designed for
    beginners, the number of steps is small and the process is straightforward, as
    you will see.


    ### Downloading and Installing


    BlueJ can be downloaded from [`www.bluej.org`](http://www.bluej.org).


    There are multiple download options available for a variety of operating systems.
    Furthermore, some of these downloads are bundled with the JDK, and some are not.
    The JDK includes tools for developing and debugging Java applications; in particular,
    it is necessary for compiling your code. If you have used your computer to develop
    Java applications before, you likely already have the JDK installed and can just
    select the stand-alone BlueJ installer. If you aren’t sure, you should download
    and run the BlueJ combined installer.'
