    ### 1.4.2 什么是 Knative？


    Knative 是 Kubernetes 的扩展，使无服务器工作负载能够在 Kubernetes 集群上运行。与 Kubernetes 工作相比，开发人员将代码从
    IDE 部署到 Kubernetes 的过程中需要的工具数量庞大，这与 Kubernetes 所宣称的环境敏捷性背道而驰。Knative 通过 Kubernetes
    原生的提供者操作符自动完成构建包和部署到 Kubernetes 的过程。因此，名称中包含“K”和“Native”。


    Knative 有两个主要组件：


    *   *服务（Serving）*：提供组件，使无服务器容器能够快速部署，自动扩展和实现时间点快照功能


    *   *事件驱动（Eventing）*：通过提供从生产者到订阅者/接收器的事件路由工具，帮助开发人员使用事件驱动架构


    您可以在 [`​Knative.​dev/​docs`](https://Knative.dev/docs) 了解更多关于 Knative 的信息。


    ## 1.5 示例用例：薪资应用程序


    让我们看看如何将无服务器函数应用于现实中的例子。


    我们在本章开头介绍了薪资应用程序，现在将在此基础上进行扩展。考虑一个如图 1-8 所示的薪资应用程序配置。


    ![](img/526597_1_En_1_Fig8_HTML.jpg)


    一张表格描述了业务功能数据库和集成。其中一些功能涉及读取员工记录数据库中的员工记录和支付信息，而集成部分则涉及 I R S。


    图 1-8


    薪资应用程序组件


    图 1-9 显示了该配置。


    ![](img/526597_1_En_1_Fig9_HTML.png)


    一个流程图描述了员工记录和月度薪资数据流，用于验证员工数据以计算薪资。月度薪资率和税率表用于计算薪资，其中包含部分税收和储蓄信息。


    图 1-9


    薪资应用程序流程


    将此流程图转换为可在企业数据中心部署的实际实现，结果如图 1-10 所示。您会发现这些函数被开发为通过批量模式执行的 REST API。这些 REST API
    暴露了 SAP ECC 薪资模块。这些 REST API 每 15 天作为批量作业运行。数据库托管在 Oracle 上，集成通过 IBM API Connect
    (APIC) 暴露。请注意，这不是按需流程，当空闲时可能会消耗大量资源。由于 SAP NetWeaver 组件启动时间通常在 JVM 配置不同情况下为 2
    到 15 分钟，这些 REST API 无法轻易关闭和启动。这些应用程序组件必须持续运行，以防止薪资应用程序崩溃。


    ![](img/526597_1_En_1_Fig10_HTML.jpg)


    架构图描述了 Oracle 数据库中的员工记录关系型数据库和月度薪资数据流，用于验证员工数据以计算薪资。月度薪资率和税率表用于计算薪资。


    图 1-10


    当前薪资架构


    使用此用例，后续章节将探讨如何利用 Spring Cloud Function 将此应用程序现代化并转换为一个高效、可扩展且可移植的系统。


    ## 1.6 Spring Cloud Function 支持


    Spring Cloud Function 几乎在所有云服务中都得到支持，如表 1-1 所示。


    表 1-1


    云提供商对 Spring Cloud Function 的支持情况


    | AWS | Azure | Google | IBM Cloud | 本地部署 |

    | --- | --- | --- | --- | --- |

    | Lambda | Azure Functions | Cloud Functions | IBM Functions | Tanzu with Knative
    |

    | EKS with Knative | AKS with Knative | GKE with Knative | Tanzu with Knative
    | OpenShift with Knative |

    | Fargate with Knative | ARO with Knative | OpenShift with Knative | OpenShift
    with Knative | 任何支持 Knative 的 Kubernetes 服务 |

    | ROSA with Knative | Tanzu with Knative | Tanzu with Knative | IBM Kubernetes
    with Knative |   |

    | Tanzu with Knative |   |   |   |   |


    缩写说明：ROSA: AWS 上的 Red Hat OpenShift；ARO: Azure Red Hat OpenShift；EKS: Elastic
    Kubernetes Services；AKS: Azure Kubernetes Services；GKE: Google Kubernetes Engine


    ### 1.6.1 在 AWS Lambda 上的 Spring Cloud Function


    将本地部署的应用程序转换为利用 AWS Lambda 环境并实现可移植性，需要编写抽象掉 AWS Lambda 硬依赖的函数代码。此示例使用 Spring
    Cloud Function 作为函数代码框架，Lambda 作为容器。通过使用 Spring Cloud Function 一次编写，您可以利用后续章节中讨论的
    DevOps 流水线将应用程序部署到其他无服务器环境。图 1-11 展示了 AWS 及其组件如何帮助在云中实现薪资应用程序。


    ![](img/526597_1_En_1_Fig11_HTML.jpg)


    架构图描述了员工详细信息的关系型数据库和月度薪资数据流，用于验证员工数据以计算薪资。薪资率和税率通过 Amazon S Q S 流向 Spring Cloud
    Function。


    图 1-11


    在 AWS 上的 Spring Cloud Function


    现在需要在 AWS Lambda 上部署薪资系统。部署顺序很重要，您需要先部署 SAP ECC 和 Oracle 数据库，然后进行集成并配置 API 和消息传递以与
    SAP 集成。Spring Cloud Function 可以使用虚拟数据进行创建和测试，但必须在与 SAP ECC 的集成测试后部署：


    1.  在 AWS EC2 实例上部署 SAP ECC。


    2.  将 Oracle DB 部署为 RDS 实例。


    3.  配置 SAP 与 Oracle 的集成。


    4.  在 AWS 上部署 Spring Cloud Function。


    5.  设置 Amazon API 网关。


    6.  设置 Amazon SQS 用于消息传递。

