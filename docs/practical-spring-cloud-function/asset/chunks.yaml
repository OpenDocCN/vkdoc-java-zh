    ## 2.6 Setting Up AWS with EKS and Knative with Spring Cloud Function


    This section looks at deploying to an AWS EKS cluster that has Knative configured.
    You will see similarities to Section 2.5, because you create the cluster, enable
    Knative, and deploy a Docker image.


    Prerequisites:


    *   AWS subscription ([`https://aws.amazon.com/`](https://aws.amazon.com/))


    *   AWS CLI, which can be found at [`https://aws.amazon.com/cli/`](https://aws.amazon.com/cli/)


    *   Eksctl CLI ([`https://eksctl.io/`](https://eksctl.io/))


    *   Knative serving ([`https://knative.dev/docs/serving`](https://knative.dev/docs/serving))


    *   Knative CLI ([`https://knative.dev/docs/client/install-kn/`](https://knative.dev/docs/client/install-kn/))


    *   IntelliJ, Eclipse, VS Code, or other IDEs


    *   Code from GitHub


    *   Docker image registered in the Docker hub


    Step 1: Set up a Kubernetes cluster with EKS. Before you run the command in Listing
    [2-18](#526597_1_En_2_Chapter.xhtml#PC37), ensure that you are properly connected
    to AWS and have the subscriptions and permissions to create a cluster. Additional
    information can be found at [`https://docs.aws.amazon.com/eks/latest/userguide/getting-started.xhtml`](https://docs.aws.amazon.com/eks/latest/userguide/getting-started.xhtml).


    ```

    apiVersion: eksctl.io/v1alpha5

    kind: ClusterConfig

    metadata:

    name: payroll-clstr

    region: us-east-2

    nodeGroups:

    - name: payroll-nodes

    instanceType: m5.large

    desiredCapacity: 3

    volumeSize: 80

    Listing 2-18

    cluster.yaml

    ```


    Create your Amazon EKS cluster using the following command:


    ```

    $eksctl create cluster -f cluster.yaml

    ```


    The process takes 10 to 15 minutes. At the end of the process, you will have created
    a cluster in EKS. You can verify it in the AWS EKS console in the cloud. See Figure
    [2-27](#526597_1_En_2_Chapter.xhtml#Fig27).


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig27_HTML.jpg)


    A screenshot of amazon elastic Kubernetes service. The payroll cluster contains
    an overview and its node''s details. They are node name, instance type, node group,
    created, and status.


    Figure 2-27


    EKS console


    You will see that the dashboard shows the name of the cluster you provided in
    the Listing [2-18](#526597_1_En_2_Chapter.xhtml#PC37) and the creation of three
    nodes as set for `desiredCapacity` in the listing.


    Verify that the clusters are up and running (see Figure [2-28](#526597_1_En_2_Chapter.xhtml#Fig28)).
    You can do that by running the following command:


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig29_HTML.jpg)


    A screenshot of K native components running logs. It contains name, ready, status,
    restarts, and age. All namespaces were running status.


    Figure 2-29


    Knative components running on EKS


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig28_HTML.jpg)


    A screenshot of elastic Kubernetes service running logs. It contains Kubect l
    get pods all namespaces, name, ready, status, restarts, and age. All namespaces
    were running successfully.


    Figure 2-28


    EKS cluster running successfully


    ```

    $kubectl get pods --all-namespaces

    ```


    Step 2: Configure Knative on EKS. In this step, you configure Knative on the EKS
    cluster you created. See Listing [2-19](#526597_1_En_2_Chapter.xhtml#PC40).


    ```

    $kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.4.0/serving-crds.yaml

    $kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.4.0/serving-core.yaml

    $kubectl apply -f https://github.com/knative/net-kourier/releases/download/knative-v1.4.0/kourier.yaml

    $kubectl patch configmap/config-network \

