    ### 2.1.4 Step 4: Write the Supplier


    The supplier function in this example allows you to get all the data in the database.
    You can change it to suit your needs.


    Note that you will be using the `Spring Data Repositories` to interact with the
    database. This is a common way for both `Spring Data REST` and `Spring Cloud Function`.


    ```

    package com.kubeforce.payrol;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;

    import java.util.List;

    import java.util.function.Supplier;

    @Component

    public class EmployeeSupplier implements Supplier

    {

    public static final Logger LOGGER = LoggerFactory.getLogger(EmployeeSupplier.class);

    @Autowired

    private EmployeeRepository employeeRepository;

    @Override

    public Employee get ()

    {

    List employees = employeeRepository.findAll();

    LOGGER.info("Getting the employee of our choice - ", employees);

    return employees.get(0);

    }

    }

    Listing 2-6

    EmployeeSupplier.java

    ```


    ### 2.1.5 Step 5: Write the Function


    This step is optional, and you can see from the code that you can create a function
    definition outside of the consumer and supplier and allow for getting the data
    associated with an specific ID. See Listing [2-7](#526597_1_En_2_Chapter.xhtml#PC7).


    ```

    package com.kubeforce.payroll;

    import org.springframework.beans.factory.annotation.Autowired;

    import java.util.Optional;

    import java.util.function.Function;

    public class EmployeeFunction implements Function  {

    @Autowired

    private EmployeeRepository employeeRepository;

    @Override

    public Employee apply (Long s)

    {

    Optional employeeOptional = employeeRepository.findById(s);

    if (employeeOptional.isPresent()) {

    return employeeOptional.get();

    }

    return null;

    }

    }

    Listing 2-7

    EmployeeFunction.java

    ```


    Once you have developed your code, you can run the function locally. The key step
    to run this locally is to modify the main class to include:


    ```

    `SpringApplication.run`(PayrollApplication.class, args)

    ```


    For deployment to other environments such as Lambda, use:


    ```

    `FunctionalSpringApplication.run`(PayrollApplication.class, args)

    ```


    The use of `SpringApplication` allows you to keep the code up and running so that
    you can test the function with tools such as Postman.


    ### 2.1.6 Step 6: Deploy and Run the Code Locally


    In this step, you run the code just like you would for any other Spring Boot code.


    Note that the code runs and is available in port 8080.


    This allows for the function to be tested by tools such as Postman and curl.


    ### 2.1.7 Step 7: Test the Function


    You can use curl or Postman to test your function. Here I use Postman. You can
    download Postman at [`https://www.postman.com/downloads/`](https://www.postman.com/downloads/).


    In Postman, choose `POST`, the `http://localhost:8080/employeeConsumer` URL, and
    the JSON format input.


    ```

    {

    "name": "xxx",

    "employeeIdentifier":"2",

    "email": xxx@yahoo.com,

    "salary":"1000"

    }

    ```


    You can test all the three interfaces here, but when you go to Lambda or other
    environments, you will be restricted to just one interface.


    You can also verify if the data has been added by going to the `H2` console, as
    shown in Figure [2-5](#526597_1_En_2_Chapter.xhtml#Fig5).


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig5_HTML.jpg)


    A screenshot of the H 2 console. S Q L statement is Select star from an employee.
    The employee details are I D, email, employee identifier, name, and salary.


    Figure 2-5


    H2 console showing the employee table being updated with the data


    This completes the steps for creating, running, and testing the code of a local
    function.


