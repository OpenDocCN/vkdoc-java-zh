    创建事件流


    步骤 5：部署函数到 IBM Cloud。


    此步骤不使用 IBM Cloud 内置的函数。您可以使用 IBM Kubernetes 服务来构建和部署 Spring Cloud Function 到 Knative
    服务。您可以通过搜索 IBM Cloud 或目录，或者直接访问 [`https://cloud.ibm.com/kubernetes/catalog/create`](https://cloud.ibm.com/kubernetes/catalog/create)
    进入 IBM Kubernetes 服务。


    现在创建一个最小化的免费集群。这是我喜欢 IBM Cloud 的地方；即使对于 Kubernetes 集群，您也能真正获得免费服务。这与其他云提供商不同，其他云提供商需要为底层计算和存储付费。


    如果您创建的是免费集群，请注意此集群将在 30 天后被删除。


    一旦进入 Kubernetes 集群页面，选择定价计划，IBM Cloud 将为您创建 Kubernetes 集群。使用 Lite 计划时，您无法命名集群。您可以订阅标准层级以获得更多控制权。参见图
    7-8。


    ![](img/526597_1_En_7_Fig8_HTML.png)


    IBM Kubernetes 集群仪表板的截图。它提供了创建、计划详情、Kubernetes 版本和资源详情等选项。


