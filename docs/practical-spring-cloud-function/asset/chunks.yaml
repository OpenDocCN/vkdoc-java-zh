- fmt: "\n## 3.4 Setting Up a CI/CD Pipeline to Deploy to a Target Platform\n\nAs\
    \ discussed in the introduction of this chapter, you’ll use two tools for the\
    \ CI/CD process. `GitHub Actions` can be used as a tool for both CI (Continuous\
    \ Integration) and CD (Continuous Deployment), while `ArgoCD` is a CD tool.\n\n\
    `ArgoCD` was designed for `Kubernetes`, so you can leverage this tool exclusively\
    \ for `Knative`/`Kubernetes` deployment. You’ll use `GitHub Actions` for serverless\
    \ environments such as `Lambda`.\n\nFigure [3-13](#526597_1_En_3_Chapter.xhtml#Fig13)\
    \ shows the flow when deploying to serverless environments like `AWS Lambda`,\
    \ `Google Cloud Functions`, and `Azure Functions`.\n\nThe process steps are as\
    \ follows:\n\n1. Create code and push/commit code to `GitHub`.\n2. `GitHub Actions`\
    \ senses the event trigger of the commit and starts the build and deploy process\
    \ to the serverless environments defined in the actions script.\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig13_HTML.jpg)\n\
    \nA flow diagram of deploying to serverless functions. The code created is pushed\
    \ to `GitHub` through Git flows repo name and branch name. Event-triggered from\
    \ `GitHub` results in `GitHub Actions` and deploys to `Spring Cloud Function`.\n\
    \nFigure 3-13\n\nDeploying to serverless functions environments\n\nFigure [3-13](#526597_1_En_3_Chapter.xhtml#Fig13)\
    \ shows the flow when deploying `Spring Cloud Function` to a `Kubernetes` environment\
    \ with `Knative` configured.\n\nThe process steps are as follows:\n\n1. Create\
    \ code and push/commit code to `GitHub`.\n2. `GitHub Actions` senses the event\
    \ trigger of the commit and starts the build process and deploys the created container\
    \ image into `Docker Hub`.\n3. `ArgoCD` polls for changes in `GitHub` and triggers\
    \ a \"sync.\" It then retrieves the container image from `Docker Hub` and deploys\
    \ to `Knative` on `Kubernetes`. See Figure [3-14](#526597_1_En_3_Chapter.xhtml#Fig14).\n\
    \n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig14_HTML.jpg)\n\nA flow diagram\
    \ describes deploying to a `Knative`-`Kubernetes` environment. Commit code through\
    \ Git is pushed to `GitHub`. Event-triggered `GitHub Actions` are pushed to `Docker`\
    \ and synced and pulled to `ArgoCD`. It deploys the `Spring Cloud Function` on\
    \ `Kubernetes`.\n\nFigure 3-14\n\nDeploying to a `Knative`-`Kubernetes` environment\n\
    \n## 3.5 Deploying to the Target Platform\n\nThis section looks at the process\
    \ of deploying the `Spring Cloud Function` to the target environments such as\
    \ `AWS Lambda`, `Google Cloud Functions`, `Azure Functions`, and `Knative` on\
    \ `Kubernetes`.\n\nHere are the prerequisites for all the environments:\n\n* `GitHub`\
    \ repository with code deployed to `GitHub`\n* Access and connection information\
    \ to the environments\n* All Chapter [2](#526597_1_En_2_Chapter.xhtml) prerequisites\
    \ for each of the environments. Refer to Chapter [2](#526597_1_En_2_Chapter.xhtml)\
    \ for each environment\n* Use the successful deployments of Chapter [2](#526597_1_En_2_Chapter.xhtml)\
    \ as a reference for each of the deploys\n\n### 3.5.1 Deploying to `AWS Lambda`\n\
    \nDeploying to `AWS Lambda` requires using a `SAM` (Serverless Application Model)\
    \ based `GitHub Actions` script. This section explains how to use `SAM` and `GitHub\
    \ Actions`. There is no additional coding required.\n\nPrerequisites:\n\n* `AWS`\
    \ account\n* `AWS Lambda` Function subscription\n* `S3` bucket to store the code\
    \ build\n* `AWS CLI` (optional) to verify deployments through the CLI\n* Code\
    \ from `GitHub` at [`https://github.com/banup-kubeforce/payroll-aws-h2`](https://github.com/banup-kubeforce/payroll-aws-h2)\n\
    \n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig15_HTML.jpg)\n\nA flow diagram\
    \ describes deploying `Spring Cloud Function` with `GitHub Actions`. Commit code\
    \ through Git is pushed to `GitHub`. Event-triggered `GitHub Actions` deploy `Spring\
    \ Cloud Function` on `Lambda`.\n\nFigure 3-15\n\nDeploying `Spring Cloud Function`\
    \ with `GitHub Actions` on `AWS Lambda`\n\nStep 1: `Spring Cloud Function` code\
    \ in `GitHub`.\n\nPush the code to `GitHub`. You can bring down code from `GitHub`\
    \ at [`https://github.com/banup-kubeforce/payroll-aws-h2`](https://github.com/banup-kubeforce/payroll-aws-h2).\
    \ This code can be modified to your specs and deployed to the repository of your\
    \ choice.\n\nStep 2: Implement `GitHub Actions` with `AWS SAM`. `AWS SAM` (Serverless\
    \ Application Model) is a framework for building serverless applications. More\
    \ information can be found at [`https://aws.amazon.com/serverless/sam/`](https://aws.amazon.com/serverless/sam/).\n\
    \n`AWS` has a sample `SAM`-based actions script that is available in the `GitHub`\
    \ marketplace that you can leverage. This script will execute the `SAM` commands.\n\
    \nThe action code in `Listing [3-5]` can be created on the `GitHub Actions` dashboard\
    \ or in your IDE\n\n```\nname: CI\non:\n  push:\n    branches: [ \"master\" ]\n\
    jobs:\n  build-deploy:\n    runs-on: ubuntu-latest\n    steps:\n      - uses:\
    \ actions/checkout@v2\n      - uses: actions/setup-java@v2\n        with:\n  \
    \        java-version: '11'\n          distribution: 'temurin'\n          cache:\
    \ maven\n      - uses: aws-actions/setup-sam@v1\n      - uses: aws-actions/configure-aws-credentials@v1\n\
    \        with:\n          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}\n\
    \          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n     \
    \     aws-region: us-east-2\n      - name: Build with Maven\n        run: mvn\
    \ -B package --file pom.xml\n      # sam package\n      - run: sam package --template-file\
    \ template.yaml --output-template-file packaged.yaml --s3-bucket payrollbucket\n\
    \      # Run Unit tests- Specify unit tests here\n      # sam deploy\n      -\
    \ run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name\
    \ payroll-aws --s3-bucket payrollbucket --capabilities CAPABILITY_IAM --region\
    \ us-east-2\n```\n\nListing 3-5\n\nWorkflow for Payroll Function to be Deployed\
    \ on `AWS Lambda`\n\nThe secrets for these two elements can be stored in `GitHub`\
    \ secrets:\n\n```\naws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}\naws-secret-access-key:\
    \ ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n```\n\nFigure [3-16](#526597_1_En_3_Chapter.xhtml#Fig16)\
    \ shows the place to store configuration secrets for `GitHub Actions`. It is under\
    \ the `Settings` tab.\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig16_HTML.png)\n\
    \nA screenshot of the `banup-kubeforce` window. The `Settings` tab is selected.\
    \ It displays `action` secrets and environmental secrets with its details.\n\n\
    Figure 3-16\n\n`action` secrets for credentials and configuration\n\nStep 3: Execute\
    \ `GitHub Actions`. Once the workflow is configured, the actions can be triggered\
    \ from the `GitHub` console or through a code commit, as defined by the following\
    \ code in the `sam-pipeline.yaml` file.\n\n```\non:\n  push:\n    branches: [\
    \ \"master\" ]\n```\n\n`GitHub Actions` execute the steps outlined in the YAML\
    \ file and deploy the function to `AWS Lambda`. Figure [3-17](#526597_1_En_3_Chapter.xhtml#Fig17)\
    \ shows a successful run.\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig17_HTML.jpg)\n\
    \nA screenshot of the `banup-kubeforce` window. The `build deploy` button is selected.\
    \ It displays a new window on `build deploy` which includes `set up job`, `build\
    \ with Maven`, `run Sam package`, etc.\n\nFigure 3-17\n\nA successful execution\
    \ of `GitHub Actions` on `AWS Lambda`\n\nStep 4: Verify that the function is up\
    \ and running in `AWS Lambda`.\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig18_HTML.jpg)\n\
    \nA screenshot of `AWS Lambda` window. The function is selected. It displayed\
    \ the function name.\n\nFigure 3-18\n\nFunction created after execution of `GitHub\
    \ Actions`\n\nSince the `payroll-aws-h2` application exposes `EmployeeSupplier`,\
    \ you will do a simple `GET` against the function to see if you get the result\
    \ of data that has been inserted into the database on `Spring Cloud Function`\
    \ startup.\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig19_HTML.jpg)\n\
    \nA screenshot of the `Lambda` function window. It depicts function overview with\
    \ its description.\n\nFigure 3-19\n\nTesting if the function was successful. See\
    \ the JSON response\n\nIn Figure [3-19](#526597_1_En_3_Chapter.xhtml#Fig19), you\
    \ can see that the test was successful and see a JSON result of what is in the\
    \ database.\n"
  raw: '## 3.4 Setting Up a CI/CD Pipeline to Deploy to a Target Platform


    As discussed in the introduction of this chapter, you’ll use two tools for the
    CI/CD process. GitHub Actions can be used as a tool for both CI (Continuous Integration)
    and CD (Continuous Deployment), while ArgoCD is a CD tool.


    ArgoCD was designed for Kubernetes, so you can leverage this tool exclusively
    for Knative/Kubernetes deployment. You’ll use GitHub Actions for serverless environments
    such as Lambda.


    Figure [3-13](#526597_1_En_3_Chapter.xhtml#Fig13) shows the flow when deploying
    to serverless environments like AWS Lambda, Google Cloud Functions, and Azure
    Functions.


    The process steps are as follows:


    1.  Create code and push/commit code to GitHub.


    2.  GitHub Actions senses the event trigger of the commit and starts the build
    and deploy process to the serverless environments defined in the actions script.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig13_HTML.jpg)


    A flow diagram of deploying to serverless functions. The code created is pushed
    to GitHub through Git flows repo name and branch name. Event-triggered from GitHub
    results in GitHub actions and deploys to spring cloud function.


    Figure 3-13


    Deploying to serverless functions environments


    Figure [3-13](#526597_1_En_3_Chapter.xhtml#Fig13) shows the flow when deploying
    Spring Cloud Function to a Kubernetes environment with Knative configured.


    The process steps are as follows:


    1.  Create code and push/commit code to GitHub.


    2.  GitHub Actions senses the event trigger of the commit and starts the build
    process and deploys the created container image into Docker Hub.


    3.  ArgoCD polls for changes in GitHub and triggers a “sync.” It then retrieves
    the container image from Docker hub and deploys to Knative on Kubernetes. See
    Figure [3-14](#526597_1_En_3_Chapter.xhtml#Fig14).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig14_HTML.jpg)


    A flow diagram describes deploying to a Knative-kubernetes environment. Commit
    code through Git is pushed to GitHub. Event-triggered GitHub actions are pushed
    to docker and synced and pulled to Argo. It deploys the spring cloud function
    on kubernetes.


    Figure 3-14


    Deploying to a Knative-Kubernetes environment


    ## 3.5 Deploying to the Target Platform


    This section looks at the process of deploying the Spring Cloud Function to the
    target environments such as AWS Lambda, Google Cloud Functions, Azure Functions,
    and Knative on Kubernetes.


    Here are the prerequisites for all the environments:


    *   GitHub repository with code deployed to GitHub


    *   Access and connection information to the environments


    *   All Chapter [2](#526597_1_En_2_Chapter.xhtml) prerequisites for each of the
    environments. Refer to Chapter [2](#526597_1_En_2_Chapter.xhtml) for each environment


    *   Use the successful deployments of Chapter [2](#526597_1_En_2_Chapter.xhtml)
    as a reference for each of the deploys


    ### 3.5.1 Deploying to AWS Lambda


    Deploying to AWS Lambda requires using a SAM (Serverless Application Model) based
    GitHub Actions script. This section explains how to use SAM and GitHub Actions.
    There is no additional coding required.


    Prerequisites:


    *   AWS account


    *   AWS Lambda Function subscription


    *   S3 bucket to store the code build


    *   AWS CLI (optional) to verify deployments through the CLI


    *   Code from GitHub at [`https://github.com/banup-kubeforce/payroll-aws-h2`](https://github.com/banup-kubeforce/payroll-aws-h2)


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig15_HTML.jpg)


    A flow diagram describes deploying spring cloud function with GitHub actions.
    Commit code through Git is pushed to GitHub. Event-triggered GitHub actions deploy
    spring cloud function on lambda.


    Figure 3-15


    Deploying Spring Cloud Function with GitHub Actions on AWS Lambda


    Step 1: Spring Cloud Function code in GitHub.


    Push the code to GitHub. You can bring down code from GitHub at [`https://github.com/banup-kubeforce/payroll-aws-h2`](https://github.com/banup-kubeforce/payroll-aws-h2).
    This code can be modified to your specs and deployed to the repository of your
    choice.


    Step 2: Implement GitHub Actions with AWS SAM. AWS SAM (Serverless Application
    Model) is a framework for building serverless applications. More information can
    be found at [`https://aws.amazon.com/serverless/sam/`](https://aws.amazon.com/serverless/sam/).


    AWS has a sample SAM-based actions script that is available in the GitHub marketplace
    that you can leverage. This script will execute the SAM commands.


    The action code in Listing [3-5](#526597_1_En_3_Chapter.xhtml#PC12) can be created
    on the GitHub Actions dashboard or in your IDE


    ```

    name: CI

    on:

    push:

    branches: [ "master" ]

    jobs:

    build-deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v2

    - uses: actions/setup-java@v2

    with:

    java-version: ''11''

    distribution: ''temurin''

    cache: maven

    - uses: aws-actions/setup-sam@v1

    - uses: aws-actions/configure-aws-credentials@v1

    with:

    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    aws-region: us-east-2

    - name: Build with Maven

    run: mvn -B package --file pom.xml

    # sam package

    - run: sam package --template-file template.yaml --output-template-file packaged.yaml
    --s3-bucket payrollbucket

    # Run Unit tests- Specify unit tests here

    # sam deploy

    - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name
    payroll-aws --s3-bucket payrollbucket --capabilities CAPABILITY_IAM --region us-east-2

    Listing 3-5

    Workflow for Payroll Function to be Deployed on AWS Lambda

    ```


    The secrets for these two elements can be stored in GitHub secrets:


    ```

    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    ```


    Figure [3-16](#526597_1_En_3_Chapter.xhtml#Fig16) shows the place to store configuration
    secrets for GitHub Actions. It is under the Settings tab.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig16_HTML.png)


    A screenshot of the ban up-Kubeforce window. The settings tab is selected. It
    displays action secrets and environmental secrets with its details.


    Figure 3-16


    Actions secrets for credentials and configuration


    Step 3: Execute GitHub Actions. Once the workflow is configured, the actions can
    be triggered from the GitHub console or through a code commit, as defined by the
    following code in the `sam-pipeline.yaml` file.


    ```

    on:

    push:

    branches: [ "master" ]

    ```


    GitHub Actions execute the steps outlined in the YAML file and deploy the function
    to AWS Lambda. Figure [3-17](#526597_1_En_3_Chapter.xhtml#Fig17) shows a successful
    run.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig17_HTML.jpg)


    A screenshot of the banup-kubeforce window. The build deploy button is selected.
    It displays a new window on build deploy which includes set up job, build with
    Maven, run Sam package, etc.


    Figure 3-17


    A successful execution of GitHub Actions on AWS Lambda


    Step 4: Verify that the function is up and running in AWS Lambda.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig18_HTML.jpg)


    A screenshot of A W S Lambda window. The function is selected. It displayed the
    function name.


    Figure 3-18


    Function created after execution of GitHub Actions


    Since the `payroll-aws-h2` application exposes `EmployeeSupplier`, you will do
    a simple `GET` against the function to see if you get the result of data that
    has been inserted into the database on Spring Cloud Function startup.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig19_HTML.jpg)


    A screenshot of the Lambda function window. It depicts function overview with
    its description.


    Figure 3-19


    Testing if the function was successful. See the JSON response


    In Figure [3-19](#526597_1_En_3_Chapter.xhtml#Fig19), you can see that the test
    was successful and see a JSON result of what is in the database.'
