  trans: '

    ### 1.6.3 Google Cloud Functions 上的 Spring Cloud Function


    Google Cloud Functions 提供了一种云替代方案，用于 AWS Lambda 函数。虽然 Google Cloud Functions 的推出时间晚于
    Lambda，但借助 Anthos 战略，它正在迅速占据函数计算领域的重要地位。Spring.io 与 Google 紧密合作，使 Spring.io 组件能够无缝集成到
    Google Cloud 组件中。


    要在 Google Cloud Functions 上部署薪资系统，请按照此处描述的流程（见图 1-13）操作：在开发和部署 Spring Cloud Function
    之前，确保 SAP ECC 和 Oracle 数据库已启动并完成集成：


    ![](img/526597_1_En_1_Fig13_HTML.jpg)


    架构图描述了 Oracle 数据库在 GCE VMs 上处理员工详细信息的流程，从验证到计算薪资。数据流通过云 Pub/Sub 平台传输至 Spring Cloud
    Function。


    图 1-13


    Google Cloud Functions 上的 Spring Cloud Function


    1. 将 SAP ECC 部署到 GCE。

    2. 在 GCE VMs 上部署 Oracle 数据库，因为 GCP 上没有类似 AWS RDS 的服务。

    3. 配置 SAP 与 Oracle 的集成。

    4. 设置 Google Cloud Functions 项目。

    5. 将 Spring Cloud Function 部署到 Google Cloud Functions。

    6. 在 GCP 上部署 Apigee 以托管函数 API。

    7. 设置 Google Cloud Pub/Sub 消息平台。


    ### 1.6.4 Knative 和 GCP 上的 GKE


    如前所述，Knative 是一种实现函数可移植性的方法。顺便提及的是，Knative 是由 Google 创建的。在 GCP 上，您可以将 Knative
    部署在 GKE（Google Kubernetes Engine）上，这是 Google 提供的 Kubernetes 引擎。


    要在 GCP GKE 上部署薪资系统，请按照此处描述的流程（图 1-14）操作：在开发和部署 Spring Cloud Function 之前，确保 SAP
    ECC 和 Oracle 数据库已启动并完成集成：


    ![](img/526597_1_En_1_Fig14_HTML.jpg)


    架构图描述了 Oracle 数据库在 GCE VMs 上处理员工详细信息的流程，从验证到计算薪资。薪资率和税收数据流经验证后计算薪资。数据流通过云 Pub/Sub
    平台传输至 Spring Cloud Function。


    图 1-14


    GCP 上的 Knative Spring Cloud Function


    1. 将 SAP ECC 作为 Docker 镜像部署到 GKE 集群。

    2. 将 Oracle 数据库作为 Docker 镜像部署到 GKE 集群。

    3. 配置 SAP 与 Oracle 的集成。

    4. 在 GKE 集群中配置 Knative。

    5. 将 Spring Cloud Function 部署到 Knative。

    6. 设置 Apigee API 网关。

    7. 在 GKE 上设置 RabbitMQ 用于消息传递。


    ### 1.6.5 Azure Functions 上的 Spring Cloud Function


    部署在 Azure Functions 上的 Spring Cloud Function 由于显式使用 Azure Function Invoker 类，因此不具备可移植性。虽然
    Lambda 和 Google Cloud Functions 需要修改 Pom.xml（如果使用 Maven），但 Azure 需要额外的类。这使得其可移植性较低。如果您有一千个在
    AWS 上运行的 Spring Cloud Function 需要迁移到 Azure，必须进行大量开发工作，这会带来显著的中断。


    要在 Azure Functions 上部署薪资系统，请按照此处描述的流程（见图 1-15）操作：在开发和部署 Spring Cloud Function
    之前，确保 SAP ECC 和 Oracle 数据库已启动并完成集成：


    ![](img/526597_1_En_1_Fig15_HTML.jpg)


    架构图描述了 Oracle 数据库在 Azure VMs 上处理员工详细信息的流程，从验证到计算薪资。数据流通过 Azure 队列传输至 Azure Function
    加上 Spring Cloud Function。


    图 1-15


    Azure 上的 Spring Cloud Function


    1. 在 Azure VMs 上部署 SAP ECC。

    2. 在 Azure VMs 上部署 Oracle 数据库。

    3. 配置 SAP 与 Oracle 的集成。

    4. 配置 Azure Functions。

    5. 将 Spring Cloud Function 部署到 Azure Functions。

    6. 在 Azure 上设置 Azure API 网关。

    7. 在 Azure 上设置 Azure 队列存储用于消息传递。


    ### 1.6.6 Knative 和 Azure AKS 上的 Spring Cloud Function


    在 Azure AKS 上部署 Knative 是唯一能让 Spring Cloud Function 在 Azure 上实现可移植性的选项。如同任何 Kubernetes
    实现一样，它需要 Knative 的实现来运行函数。将薪资应用迁移到 AKS 需要一个 AKS 集群。


    要在 Azure AKS 环境中部署薪资系统，请按照此处描述的流程（图 1-16）操作：在开发和部署 Spring Cloud Function 之前，确保
    SAP ECC 和 Oracle 数据库已启动并完成集成：


    ![](img/526597_1_En_1_Fig16_HTML.jpg)


    架构图描述了 Oracle 数据库在 Azure VMs 上处理员工详细信息的流程，从验证到计算薪资。数据流通过 Azure 队列存储传输至 AKS 加上
    Knative 的 Spring Cloud Function。


    图 1-16


    Azure 上的 Knative Spring Cloud Function


    1. 在 Azure VMs 上部署 SAP ECC 作为 Docker 镜像。

    2. 在 Azure VMs 上部署 Oracle 数据库作为 Docker 镜像。

    3. 配置 SAP 与 Oracle 的集成。

    4. 在 AKS 集群中配置 Knative。

    5. 将 Spring Cloud Function 部署到 Knative。

    6. 在 AKS 上设置 Spring Cloud 网关作为 API 网关。

    7. 在 AKS 上设置 RabbitMQ 用于消息传递。


    ### 1.6.7 VMware Tanzu（TKG, PKS）上的 Spring Cloud Function


    VMware Tanzu 是 Pivotal Cloud Foundry（PCF）的演进版本。熟悉 PCF 的用户应该了解“cf push”的体验。这是一种一键式资源分配方法，在开发者社区中非常流行。Knative
    通过其 Knative 构建功能提供了类似体验。要将薪资应用迁移到 VMware Tanzu，需要使用 Tanzu Kubernetes Grid（TKG）。TKG
    基于 Kubernetes 主分支代码构建，可以在本地和云端部署，支持多云或混合云策略。您可以通过提供商市场订阅服务，在 AWS、Azure 或 Google
    上启动 TKG 实例。


    在数据中心中，您需要一组服务器或类似 VxRail 的超融合基础设施，并配备 PRA（Pivotal Ready Architecture）。您还需要将 vSphere
    升级到版本 7。


    回到薪资应用，您需要按照此处描述的流程（图 1-17）操作：在开发和部署 Spring Cloud Function 之前，确保 SAP ECC 和 Oracle
    数据库已启动并完成集成：


    ![](img/526597_1_En_1_Fig18_HTML.jpg)


    图表描述了集群。它包含 Tanzu Kubernetes Grid、网络和服务。通过管理端口组和工作负载端口组的 vSphere 分布式交换机连接到 K8s
    控制平面。


    图 1-18


    带有 HAProxy 的四节点 VxRail P570F 集群用于 vSphere with Tanzu


    ![](img/526597_1_En_1_Fig17_HTML.jpg)


    架构图描述了 Oracle 数据库在 Docker 加上 TKG 上处理员工详细信息的流程，从验证到计算薪资。数据流通过 RabbitMQ 传输至 TKG
    加上 Knative 的 Spring Cloud Function。


    图 1-17


    TKG 上的 Spring Cloud Function


    1. 将 SAP ECC 作为 Docker 镜像部署到 TKG。

    2. 将 Oracle 数据库作为 Docker 镜像部署到 TKG。

    3. 配置 SAP 与 Oracle 的集成。

    4. 在 TKG 集群中配置 Knative。

    5. 将 Spring Cloud Function 部署到 Knative。

    6. 在 TKG 上设置 Spring Cloud 网关作为 API 网关。

    7. 在 TKG 上设置 RabbitMQ 用于消息传递。

