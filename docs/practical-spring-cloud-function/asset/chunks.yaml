    ### 1.6.3 Spring Cloud Function on Cloud Functions on GCP


    `GCP` Cloud Functions provide a cloud alternative to AWS Lambda Functions. The
    `GCP` offering is newer than Lambda, but with the Anthos strategy, it is gaining
    a good amount of the function space. Spring.io works closely with Google to make
    the Spring.io components work seamlessly with the `GCP` components.


    To deploy the payroll system on `Cloud Functions` on `GCP`, follow the process
    outlined here (see Figure [1-13](#526597_1_En_1_Chapter.xhtml#Fig13)). Ensure
    that the `SAP ECC` and `Oracle DB` are up and integrated before developing and
    deploying Spring Cloud Function on `Cloud Functions`:


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig13_HTML.jpg)


    An architecture diagram describes an `Oracle` on `GCE` VMs of employee details
    flows to validation to compute salary. It flows through the cloud pub to the spring
    cloud function.


    Figure 1-13


    Spring Cloud Function on `GCP`


    1. Deploy `SAP ECC` onto `GCE`.

    2. Deploy `Oracle DB` on `GCE` VMs.

    3. Configure the `SAP` to `Oracle` integration.

    4. Set up a `GCP` Cloud Function project.

    5. Deploy Spring Cloud Function onto `GCP` Cloud Functions.

    6. Deploy `Apigee` on `GCP` to host function APIs.

    7. Set up the `Google Cloud pub/sub` messaging platform.


    ### 1.6.4 Spring Cloud Function on Knative and GKE on GCP


    `Knative`, as discussed, is a way to make the functions portable. `Knative` was
    created by Google. With `GCP`, you can set up `Knative` on `GKE`, which is the
    Kubernetes engine provided by Google.


    To deploy the payroll system on `Knative` hosted on a `GCP` `GKE`, follow the
    process outlined here (Figure [1-14](#526597_1_En_1_Chapter.xhtml#Fig14)). Ensure
    that the `SAP ECC` and `Oracle DB` are up and integrated before developing and
    deploying Spring Cloud Function on `Knative`:


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig14_HTML.jpg)


    An architecture diagram describes an `Oracle` on `GCE` VMs of employee details
    flows to validation to compute salary. Pay rates and tax flow to compute salary.
    It flows through the cloud pub to the spring cloud function.


    Figure 1-14


    Spring Cloud Function on `Knative` on `GCP`


    1. Deploy `SAP ECC` as a Docker image onto the `GKE` cluster.

    2. Deploy `Oracle DB` as a Docker image onto the `GKE` cluster.

    3. Configure the `SAP` to `Oracle` integration.

    4. Configure a `GKE` cluster with `Knative`.

    5. Deploy Spring Cloud Function onto `Knative`.

    6. Set up the `Apigee` API Gateway.

    7. Set up `RabbitMQ` on `GKE` for messaging.

    8. Set up `Google cloud pub/sub`.


    ### 1.6.5 Spring Cloud Function on Azure Functions on Azure


    Spring Cloud Function deployed on `Azure Functions` is not portable due to the
    explicit use of an `Azure Function Invoker` class. While Lambda and `GCP` Cloud
    Functions require a change to Pom.xml (if you are using Maven), `Azure` needs
    an additional class. This makes it less portable. If you have a portfolio of one
    thousand Spring Cloud Functions in AWS that you need to move to `Azure`, you have
    to do a lot of development activity. This is disruptive.


    To deploy the payroll system on `Azure Functions`, follow the process outlined
    here (see Figure [1-15](#526597_1_En_1_Chapter.xhtml#Fig15)). Ensure that the
    `SAP ECC` and `Oracle DB` are up and integrated before developing and deploying
    Spring Cloud Function on `Azure Functions`:


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig15_HTML.jpg)


    An architecture diagram describes an `Oracle` on `Azure` VMs of employee details
    flows to validation to compute salary. It flows through the `Azure queue` to the
    `Azure` plus spring cloud function.


    Figure 1-15


    Spring Cloud Function on `Azure`


    1. Deploy `SAP ECC` on `Azure` VMs.

    2. Deploy `Oracle DB` on `Azure` VMs.

    3. Configure the `SAP` to `Oracle` integration.

    4. Configure `Azure Functions`.

    5. Deploy Spring Cloud Function on `Azure Functions`.

    6. Set up the `Azure API Gateway` on `Azure`.

    7. Set up `Azure Queue` storage on `Azure` for messaging.


    ### 1.6.6 Spring Cloud Function on Knative and AKS on Azure


    `Knative` on `Azure AKS` is the only option for deploying Spring Cloud Function
    on `Azure` that makes it portable. As in any Kubernetes implementation, it requires
    an implementation of `Knative` to run the functions. Transforming the payroll
    application to AKS requires an `AKS` cluster.


    To deploy the payroll system on `Knative` hosted on an `Azure AKS` environment,
    follow the process outlined here (Figure [1-16](#526597_1_En_1_Chapter.xhtml#Fig16)).
    Ensure that the `SAP ECC` and `Oracle DB` have been up and integrated before developing
    and deploying Spring Cloud Function on `Knative`:


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig16_HTML.jpg)


    An architecture diagram describes an `Oracle` on `Azure` VMs of employee details
    flows to validation to compute salary. It flows through the `Azure queue` storage
    to the `AKS` plus `Knative` spring cloud function.


    Figure 1-16


    Spring Cloud Function on `Knative` on `Azure`


    1. Deploy `SAP ECC` on `Azure` VMs.

    2. Deploy `Oracle DB` on `Azure` VMs.

    3. Configure the `SAP` to `Oracle` integration.

    4. Configure an `AKS` cluster with `Knative`.

    5. Deploy Spring Cloud Function onto `Knative`.

    6. Set up a `Spring Cloud Gateway` on `AKS` as an API Gateway.

    7. Set up `RabbitMQ` on `AKS` for messaging.


    ### 1.6.7 Spring Cloud Function on VMware Tanzu (TKG, PKS)


    `VMware Tanzu` is an evolution of Pivotal Cloud Foundry (PCF). Those who are familiar
    with PCF should be aware of the `cf push` experience. It was a one-click provisioning
    approach and was very popular in the developer community. This is the same experience
    that `Knative` provides through its `Knative build` feature. To transform the
    payroll application to run on `VMware Tanzu`, you need the `Tanzu Kubernetes grid`,
    also known as `TKG`. `TKG` is built using the main branch of Kubernetes code.
    This can be deployed on-premises and in the cloud and can facilitate a multi-cloud
    or hybrid-cloud strategy. You can start up an instance of `TKG` on `AWS`, `Azure`,
    or `GCP` by subscribing to the service in the provider’s marketplace.


    In a datacenter, you need a collection of servers or a hyper-converged infrastructure
    like `VxRail` with `Pivotal Ready Architecture` (`PKS`). You also need to upgrade
    your `vSphere` to Version 7.


    Going back to the payroll application, you need to follow the process outlined
    here (Figure [1-17](#526597_1_En_1_Chapter.xhtml#Fig17)). Ensure that the `SAP
    ECC` and `Oracle DB` have been up and integrated before developing and deploying
    Spring Cloud Function on `Knative`:


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig17_HTML.jpg)


    An architecture diagram describes an `Oracle` on `docker` plus `TKG` of employee
    details flows to validation to compute salary. It flows through the `RabbitMQ`
    to the `TKG` plus `Knative` spring cloud function.


    Figure 1-17


    Spring Cloud Function on `TKG`


    1. Deploy `SAP ECC` as a Docker image onto `TKG`.

    2. Deploy `Oracle DB` as a Docker image onto `TKG`.

    3. Configure the `SAP` to `Oracle` integration.

    4. Configure a `TKG` cluster with `Knative`.

    5. Deploy Spring Cloud Function onto `Knative`.

    6. Set up a `Spring Cloud Gateway` on `TKG` as an API Gateway.

    7. Set up `RabbitMQ` on `TKG` for messaging.

