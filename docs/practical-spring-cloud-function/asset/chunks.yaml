    ![](img/526597_1_En_6_Fig6_HTML.png)


    一个流程图包含 2 个模块。在汽车装配工厂模块中，传感器通过 TCP/IP 向 Azure IoT Edge 设备发送数据。数据随后通过工厂防火墙传输至 Azure
    云模块，该模块包含 Azure IoT Hub、Spring Cloud Function Azure Functions 环境以及 Azure Blob
    存储组件。


    图 6-6


    使用 Azure 和 Spring Cloud Function 的制造工厂数据处理


    让我们来实现这个解决方案。


    前提条件：


    *   配置为 Spring Boot 的 VS Studio Code，因为其与 Azure IoT 集成非常好


    *   用于存储容器化 Spring Cloud Function 的 Azure Container Registry


    *   GitHub 上的代码 [`https://github.com/banup-kubeforce/AzureIoTSimulator.git`](https://github.com/banup-kubeforce/AzureIoTSimulator.git)


    *   已设置并配置的 Azure IoTEdge 和 Azure IoTHub


    步骤 1：安装 Azure IoT Edge 设备。您可以按照 [`https://docs.microsoft.com/en-us/azure/iot-edge/quickstart-linux?view=iotedge-2020-11`](https://docs.microsoft.com/en-us/azure/iot-edge/quickstart-linux%253Fview%253Diotedge-2020-11)
