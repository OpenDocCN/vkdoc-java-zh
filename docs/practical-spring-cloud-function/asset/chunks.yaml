    A screenshot depicts the RabbitMQ Queue for any messages. It represents Exchange,
    Routing key, Redelivered, Properties, and Payload under the Queries tab with a
    message the server reported 0 messages remaining.


    Now you have a function that can post messages to a RabbitMQ topic. The `SCDF`
    data pipeline will be listening to the queue and will start processing.


    You can also look at the logs associated with each of the components to monitor
    the status of the data pipeline, as shown in Figure [4-20](#526597_1_En_4_Chapter.xhtml#Fig20).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig20_HTML.png)


    A screenshot depicts the details of the vehicle data pipeline. It shows the logs
    associated with each of the components to monitor.


