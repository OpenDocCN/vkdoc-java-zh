    ready, and reason.


    Figure 3-38


    `URL` for testing `payroll-h2`


    You can use Postman for testing. See Figure [3-39](#526597_1_En_3_Chapter.xhtml#Fig39).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig39_HTML.jpg)


    A screenshot of the Get window. params selected. It contains query parameters
    of key, value, description, and bulk edit. The body includes a code with other
