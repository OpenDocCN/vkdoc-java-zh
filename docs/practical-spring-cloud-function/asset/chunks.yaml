    ## 4.4 Spring Cloud Function and Google Cloud Dataflow


    Google Cloud Dataflow is very similar to Spring Cloud Data Flow, in that it allows
    you to wire up a data pipeline with a source, processor, and sink. The `Dataflow`
    product is easier to develop with. You can read about `Dataflow` and its capabilities
    at [`https://cloud.google.com/dataflow`](https://cloud.google.com/dataflow).


    For the example in this section, you will create a `dataflow` that includes `cloud
    pub/sub`:


    `Spring Cloud Function ➤ Dataflow {cloud pub/sub ➤ cloud storage}`


    Prerequisites:


    * Subscription to `Google Dataflow`

    * A `cloud pub/sub` instance

    * A `cloud storage` bucket

    * Code from GitHub at [`https://github.com/banup-kubeforce/GooglePubSub`](https://github.com/banup-kubeforce/GooglePubSub)


    Step 1: Create and configure a `cloud pub/sub` instance.


    Before coming to this step, ensure that you are subscribed to `cloud pub/sub`.
    Also ensure that you have proper subscriptions to the APIs.


    Navigate to `Cloud Pub/Sub` console in your subscription to create a topic. See
    Figure [4-29](#526597_1_En_4_Chapter.xhtml#Fig29).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig29_HTML.png)


    A screenshot depicts the creation and configuration of `cloud pub/sub` instance
    in Google Cloud.


    Figure 4-29


    `Cloud Pub/Sub` with a topic


    Step 2: Create and configure a bucket in `cloud storage`. Create a `cloud storage`
    instance and bucket. I created a bucket called `vehiclebucket1` to store the file
    coming from `cloud pub/sub`; see Figure [4-30](#526597_1_En_4_Chapter.xhtml#Fig30).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig30_HTML.jpg)


    A screenshot depicts the Google Cloud Storage with `vehiclebucket1`. It includes
    the tabs create and refresh with a list of names under buckets.


    Figure 4-30


    Google Cloud Storage with `vehiclebucket1`


    Now you are ready to build the `Dataflow` data pipeline.


    Step 3: Create a data pipeline. Navigate to the `Dataflow` dashboard and create
    a pipeline. I created a pipeline using a prebuilt template.


    **1: Pick the template**


    This example uses the `Pub/Sub` to Text Files on `Cloud Storage` template, as
    shown in Figure [4-31](#526597_1_En_4_Chapter.xhtml#Fig31).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig31_HTML.jpg)


