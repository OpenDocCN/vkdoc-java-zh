    $kubectl patch svc argocd-server -n argocd -p ''{"spec": {"type": "LoadBalancer"}}''

    ```


    Now run the following command:


    ```

    $kubectl get svc -n argocd

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig8_HTML.jpg)


    A screenshot of the external I P of Argo c d-server run logs. It contains name,
    type, cluster-I P, external-I P, port, and age.


    Figure 3-8


    Take note of the external IP of argocd-server


    You will see an external IP associated with `argocd-server`. This will allow you
    to connect to the `argocd-server`.


    Before you start to use ArgoCD, you need to change the “admin” user password.
    You can use Kubectl to read the secret associated with the “admin” user.


    Run the following command:


    ```

    $ kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}"
    | base64 -d; echo

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig9_HTML.jpg)


    A screenshot of getting the password of admin user. The screenshot depicts a code.


    Figure 3-9


    Get the password of the "admin" user


    The output of this command is the password for the “admin” user.


    You can now log in using the web browser. Then navigate to the 20.119.112.240
    URL to change the password.


    Log in to ArgoCD with the following command:


    ```

    $argocd login 20.119.112.240

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig10_HTML.jpg)


    A screenshot of logging in to Argo C D run logs. If it gets a warning error, the
    command is a certificate signed by an unknown authority. Run logs contain details
    and the admin logged in successfully.


    Figure 3-10


    Log in to ArgoCD


    You have successfully installed and connected to ArgoCD. Figure [3-11](#526597_1_En_3_Chapter.xhtml#Fig11)
    shows a sample of the ArgoCD UI.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig11_HTML.png)


    A screenshot of deploying an application in Argo C D U I. It depicts Payroll-h
    2 which contains project, labels, status, repository, path, destination, etc.
    The status is healthy and synced.


    Figure 3-11


    ArgoCD UI showing an app deployed


    Now that you have learned about GitHub Actions and ArgoCD, you can move on to
    deploying your application and automating the CI/CD process.


    ## 3.3 Building a Simple Example with Spring Cloud Function


    You will use the same example from Chapter [2](#526597_1_En_2_Chapter.xhtml),
    but instead of using the `EmployeeConsumer` interface, this example uses `EmployeeSupplier`.
    In order to do that, you need a prepopulated database. You’ll then query the database
    using a supplier function. You can find the code at [`https://github.com/banup-kubeforce/payroll-h2`](https://github.com/banup-kubeforce/payroll-h2).


    Here are the required changes.


    Step 1: Create scripts to populate the H2 database when the function starts up.
    Create a schema that creates the `employee` table. Store the script in a `Schema.sql`
    file, as shown in Listing [3-2](#526597_1_En_3_Chapter.xhtml#PC9).


    ```

    DROP TABLE IF EXISTS employee;

    CREATE TABLE employee (

    id INT AUTO_INCREMENT PRIMARY KEY,

    name varchar(250),

    employeeid varchar(250),

    email varchar(250),

    salary varchar(250)

    );

    Listing 3-2

    Schema.sql

    ```


    Populate the database with an `INSERT` statement. Then create a file called `Data.sql`
    and store the `INSERT` statement in it, as shown in Listing [3-3](#526597_1_En_3_Chapter.xhtml#PC10).


    ```

    INSERT INTO employee (name, employeeid, email, salary) values

    (''banu'',''001'',''banup@yahoo.com'',''10000'');

    Listing 3-3

    Data.sql

    ```


    Add these two files to the resources folder of the main project, as shown in Figure
    [3-12](#526597_1_En_3_Chapter.xhtml#Fig12).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig12_HTML.jpg)


    A screenshot of the spring boot project structure. In a project structure, the
    s r c folder is selected. It contains a resources folder. Resources folder includes
    data. s q l, and schema. s q l folders along with other folders.


    Figure 3-12


    Spring Boot project structure with data.sql and schema.sql


    Modify the `Application.properties` as follows. Change `spring.cloud.function.definition`
    from `employeeConsumer` to `employeeSupplier`. This will route function calls
    to `employeeSupplier`. See Listing [3-4](#526597_1_En_3_Chapter.xhtml#PC11).


    ```

    spring.cloud.function.definition=employeeSupplier

    spring.datasource.url=jdbc:h2:mem:employee

    spring.datasource.driverClassName=org.h2.Driver

    spring.datasource.username=sa

    spring.datasource.password=

    spring.h2.console.enabled=true

    spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

    spring.jpa.defer-datasource-initialization=true

    Listing 3-4

    Application.properties

    ```


    Also add `spring.jpa.defer-datasource-initialization=true` to ensure that the
    data gets populated on startup.


    No other code changes are required. It is important to note that the changes you
    made only affect the configuration file.'
