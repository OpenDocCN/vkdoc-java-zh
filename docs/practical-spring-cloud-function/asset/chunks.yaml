    \n![](img/526597_1_En_7_Fig29_HTML.png)\n\n一张 IBM 云仪表板的截图。它包含不同的选项，包括创建仪表板、资源摘要、计划维护和\
    \ IBM 云状态。\n\n图 7-29\n\nIBM 云仪表板\n\n1.  注册 Watson Assistant 并创建实例。\n\n您可以通过在 IBM\
    \ Cloud 门户中搜索或使用此链接[`https://cloud.ibm.com/catalog/services/watson-assistant`](https://cloud.ibm.com/catalog/services/watson-assistant)到达\
