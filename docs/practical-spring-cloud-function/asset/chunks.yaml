- fmt: '

    ## 2.5 Setting Up Locally with Kubernetes and Knative and Spring Cloud Function


    This section explores another way to deploy Spring Cloud Function. Kubernetes,
    as you might be aware, is a portable approach to containerization and running
    containers. Kubernetes allows you to host containers that are packaged as images
    and deployed on Kubernetes pods.


    Knative is an environment that sits on Kubernetes and can host a function. Chapter
    [1](#526597_1_En_1_Chapter.xhtml) explained how the cloud providers created environments
    such as AWS Lambda that could start up on demand and shut down when a resource
    is not in use. Similarly, you can create such an on-demand environment with Knative
    for functions. This section explores how to set up the Knative environment locally,
    which is difficult with AWS and Google Functions, and deploy and work with your
    functions locally and on the cloud. This section starts with local deployment
    and then moves on to the cloud.


    You will notice that I used `EmployeeSupplier` as the function. To do this, you
    need to prepopulate the H2 database with some data so that you can query the database
    using the `EmployeeSupplier` function.


    ### Prerequisites

    * Docker on Mac, Linux, or Windows

    * Kind (Kubernetes in Docker)

    * Knative serving

    * IntelliJ, Eclipse, VS Code, or other IDEs

    * Code from GitHub


    Here is the process of setting up Kubernetes and Knative and deploying Spring
    Cloud Function.


    ### Step 1: Set up a Kubernetes cluster locally

    In this step, you install a local Kubernetes cluster. You deploy a KIND (Kubernetes
    IN Docker). Cluster. Of course, you can use Minikube or Minishift to deploy locally.


    First, you need Docker.


    1. Install Docker


    I am using a Ubuntu VM since it is a popular Linux offering. The command lines
    are provided in sequence, so you can follow the process. See Listing [2-13](#526597_1_En_2_Chapter.xhtml#PC19).


    ```

    sudo apt-get update

    sudo apt-get install -y \

    apt-transport-https \

    ca-certificates \

    curl \

    gnupg-agent \

    software-properties-common

    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -

    sudo add-apt-repository \

    "deb [arch=amd64] https://download.docker.com/linux/ubuntu \

    $(lsb_release -cs) \

    stable"

    sudo apt-get update

    sudo apt-get install -y docker-ce docker-ce-cli containerd.io

    sudo usermod -aG docker $USER

    Listing 2-13

    Install Docker

    ```


    Once you run these commands, you will have a running Docker instance.


    1. Install Kubectl


    This step is required, as you need `kubectl` to interact with the Kubernetes cluster


    ```

    sudo curl -L "https://storage.googleapis.com/kubernetes-release/release/`curl
    -s https://storage.googleapis.com/kubernetes-release/release/stable.txt`/bin/linux/amd64/kubectl"
    -o /usr/local/bin/kubectl

    ```


    Run `chmod` to make Kubectl executable:


    1. Install KIND


    ```

    sudo chmod +x /usr/local/bin/kubectl

    ```


    ```

    sudo curl -L "https://kind.sigs.k8s.io/dl/v0.8.1/kind-$(uname)-amd64" -o /usr/local/bin/kind

    ```


    Run `chmod` to make KIND executable:


    ```

    sudo chmod +x /usr/local/bin/kind

    ```


    Now you have the KIND bits that will allow you to install the cluster and deploy
    Knative.


    ### Step 2: Configure Knative

    In order to configure Knative, you need a KIND cluster. You will create a cluster
    with custom configuration.


    Create a cluster using a configuration file called `clusterconfig.yaml`. Note
    that the name of the cluster is "`knative`". You can name it differently, but
    you have to use that cluster to deploy Knative; see Listing [2-14](#526597_1_En_2_Chapter.xhtml#PC24).


    ```

    cat > clusterconfig.yaml << EOF

    kind: Cluster

    apiVersion: kind.x-k8s.io/v1alpha4

    nodes:

    - role: control-plane

    extraPortMappings:

    ## expose port 31380 of the node to port 80 on the host

    - containerPort: 31080

    hostPort: 80

    ## expose port 31443 of the node to port 443 on the host

    - containerPort: 31443

    hostPort: 443

    EOF

    kind create cluster --name knative --config clusterconfig.yaml

    Listing 2-14

    Create clusterconfig.yaml and Run the Create Cluster

    ```


    To set up Knative, you need to install and configure the following:


    * Knative serving (information about Knative serving is available at [`https://knative.dev/docs/serving`](https://knative.dev/docs/serving))

    * Kourier is a lightweight Knative serving ingress and is available at [`https://github.com/knative-sandbox/net-kourier`](https://github.com/knative-sandbox/net-kourier).

    * Magic DNS is a DNS provider and is available at [`https://knative.dev/docs/install/yaml-install/serving/install-serving-with-yaml/#configure-dns`](https://knative.dev/docs/install/yaml-install/serving/install-serving-with-yaml/%2523configure-dns).


    Install Knative serving


    1. Install the Knative serving components (i.e., `crds` and `core`):


    1. Set up networking using Kourier:


    ```

    kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.6.0/serving-crds.yaml

    kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.6.0/serving-core.yaml

    ```


    1. Change the file to use nodePort, as shown in Listing [2-15](#526597_1_En_2_Chapter.xhtml#PC27).


    ```

    curl -Lo kourier.yaml https://github.com/knative/net-kourier/releases/download/knative-v1.6.0/kourier.yaml

    ```


    1. Install Kourier


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: kourier

    namespace: kourier-system

    labels:

    networking.knative.dev/ingress-provider: kourier

    spec:

    ports:

    - name: http2

    port: 80

    protocol: TCP

    targetPort: 8080

    nodePort: 31080

    - name: https

    port: 443

    protocol: TCP

    targetPort: 8443

    nodePort: 31443

    selector:

    app: 3scale-kourier-gateway

    type: NodePort

    Listing 2-15

    Configure nodePort

    ```


    Install Kourier by running the following command (see Figure [2-23](#526597_1_En_2_Chapter.xhtml#Fig23)):


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig23_HTML.jpg)


    A screenshot of the execution log. It includes configuration, service account,
    cluster role, deployment, and service of kourier. The output is service kourier-internal
    created.


    Figure 2-23


    Kourier is installed successfully


    ```

    kubectl apply --filename kourier.yaml

    ```


    1. Set Kourier as the default networking layer by installing the following patch:


    1. Set up a wildcard DNS with `sslip.io`:


    ```

    kubectl patch configmap/config-network \

    --namespace knative-serving \

    --type merge \

    --patch ''{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}''

    ```


    1. Patch with `sslip.io`:


    ```

    kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.6.0/serving-default-domain.yaml

    ```


    1. Get the status of the pods in the Knative serving:


    ```

    kubectl patch configmap/config-domain \

    --namespace knative-serving \

    --type merge \

    --patch ''{"data":{"127.0.0.1.sslip.io":""}}''

    ```


    ```

    kubectl get pods -n knative-serving

    ```


    You can see in Figure [2-24](#526597_1_En_2_Chapter.xhtml#Fig24) that all the
    components are up and running. You can go to the next step of publishing your
    Spring Cloud Function app on Knative.


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig24_HTML.jpg)


    A screenshot of the run log. It includes Kubert l get pods k native serving name,
    an activator, autoscaler, default domain, and domain mapping.


    Figure 2-24


    Knative services pods are up and running


    ### Step 3: Containerize the app and push it to a repository

    Create a Dockerfile with the parameters set shown in Listing [2-16](#526597_1_En_2_Chapter.xhtml#PC33).
    I used jdk8.


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig25_HTML.jpg)


    A screenshot of the docker file. The left side contains the project. A docker
    file is selected. Push image page created. It contains a registry, namespace,
    repository, and tag.


    Figure 2-25


    Docker Push from IntellJ


    1. Push to Dockerhub. You can use the IDEs Docker features to push it to the Docker
    registry, as shown in Figure [2-25](#526597_1_En_2_Chapter.xhtml#Fig25).


    ```

    FROM openjdk:8-jdk-alpine

    ARG JAR_FILE=target/*.jar

    COPY ${JAR_FILE} app.jar

    ENTRYPOINT ["java","-jar","/app.jar"]

    Listing 2-16

    The Dockerfile

    ```

    '
