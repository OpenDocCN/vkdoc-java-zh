    Step 4: Create a Spring Cloud Function to get data from the IoT core. Create a
    class to subscribe and get messages from Mqtt.


    If you want to access the data that you published, you can run `MqttSubscriber.java`
    from the command line. You can use `MqttSubscriber.java`. This subscribes to a
    specific topic, `device/info` for example, and gets the messages. See Listing
    [6-3](#526597_1_En_6_Chapter.xhtml#PC4).


    ```

    import software.amazon.awssdk.crt.CRT;

    import software.amazon.awssdk.crt.CrtRuntimeException;

    import software.amazon.awssdk.crt.mqtt.MqttClientConnection;

    import software.amazon.awssdk.crt.mqtt.MqttClientConnectionEvents;

    import software.amazon.awssdk.crt.mqtt.QualityOfService;

    import software.amazon.awssdk.iot.iotjobs.model.RejectedError;

    import java.nio.charset.StandardCharsets;

    import java.util.concurrent.CompletableFuture;

    import java.util.concurrent.CountDownLatch;

    import java.util.concurrent.ExecutionException;

    import java.util.concurrent.atomic.AtomicReference;

    public class MqttSubscriber {

    static String ciPropValue = System.getProperty("aws.crt.ci");

    static boolean isCI = ciPropValue != null && Boolean.valueOf(ciPropValue);

    static String topic = "device/info";

    static String message = "Device Info";

    static int messagesToPublish = 10;

    static CommandLineUtils cmdUtils;

    static void onRejectedError(RejectedError error) {

    System.out.println("Request rejected: " + error.code.toString() + ": " + error.message);

    }

    /*

    * When called during a CI run, throw an exception that will escape and fail the
    exec:java task

    * When called otherwise, print what went wrong (if anything) and just continue
    (return from main)

    */

    static void onApplicationFailure(Throwable cause) {

    if (isCI) {

    throw new RuntimeException("BasicPubSub execution failure", cause);

    } else if (cause != null) {

    System.out.println("Exception encountered: " + cause.toString());

    }

    }

    public String MqttSubscribe() {

    final String[] payload = {""};

    cmdUtils = new CommandLineUtils();

    cmdUtils.registerProgramName("PubSub");

    cmdUtils.addCommonMQTTCommands();

    cmdUtils.addCommonTopicMessageCommands();

    cmdUtils.registerCommand("key", "", "Path to your key in PEM format.");

    cmdUtils.registerCommand("cert", "", "Path to your client certificate in PEM format.");

    cmdUtils.registerCommand("client_id", "", "Client id to use (optional, default=''test-*'').");

    cmdUtils.registerCommand("port", "", "Port to connect to on the endpoint (optional,
    default=''8883'').");

    cmdUtils.registerCommand("count", "", "Number of messages to publish (optional,
    default=''10'').");

    topic = cmdUtils.getCommandOrDefault("topic", topic);

    message = cmdUtils.getCommandOrDefault("message", message);

    messagesToPublish = Integer.parseInt(cmdUtils.getCommandOrDefault("count", String.valueOf(messagesToPublish)));

    MqttClientConnectionEvents callbacks = new MqttClientConnectionEvents() {

    @Override

    public void onConnectionInterrupted(int errorCode) {

    if (errorCode != 0) {

    System.out.println("Connection interrupted: " + errorCode + ": " + CRT.awsErrorString(errorCode));

    }

    }

    @Override

    public void onConnectionResumed(boolean sessionPresent) {

    System.out.println("Connection resumed: " + (sessionPresent ? "existing session"
    : "clean session"));

    }

    };

    try {

    MqttClientConnection connection = cmdUtils.buildMQTTConnection(callbacks);

    if (connection == null) {

    onApplicationFailure(new RuntimeException("MQTT connection creation failed!"));

    }

    CompletableFuture connected = connection.connect();

    try {

    boolean sessionPresent = connected.get();

    System.out.println("Connected to " + (!sessionPresent ? "new" : "existing") +
    " session!");

    } catch (Exception ex) {

    throw new RuntimeException("Exception occurred during connect", ex);

    }

    CountDownLatch countDownLatch = new CountDownLatch(messagesToPublish);

    CompletableFuture subscribed = connection.subscribe(topic, QualityOfService.AT_LEAST_ONCE,
    (message) -> {

    payload[0] = new String(message.getPayload(), StandardCharsets.UTF_8);

    System.out.println("MESSAGE: " + payload[0]);

    countDownLatch.countDown();

    });

    subscribed.get();

    countDownLatch.await();

    CompletableFuture disconnected = connection.disconnect();

    disconnected.get();

    // Close the connection now that we are completely done with it.

    connection.close();

    } catch (CrtRuntimeException | InterruptedException | ExecutionException ex) {

    onApplicationFailure(ex);

    }

    return payload[0];

    }

    ```


