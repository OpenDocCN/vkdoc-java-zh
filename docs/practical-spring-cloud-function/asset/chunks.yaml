    and shutdown times. Google Cloud Functions, on the other hand, use gVisor and
    are not compatible with Firecracker. gVisor is an application kernel for containers.
    More information can be found at [https://​github.​com/​google/​gvisor](https://github.com/google/gvisor).


    Azure Functions take a totally different approach of using the PaaS offering app
    service as their base. So, you can see that the major cloud providers use their
    own frameworks for the managing functions’ containers. This makes it difficult
    for functions to move between clouds in a multi-cloud environment. This portability
    issue becomes more pronounced due to the lack of portability at the container
    level.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig3_HTML.jpg)


    A comparison table. Function codes for Lambda of them are Lambda run time, sandbox,
    guest O S. For Google, gVisor, Host Kernel, and Google computes engine. For Azure,
    some of them are language runtime, and web jobs script runtime.


    Figure 1-3


    Serverless architecture comparison


    You can see that the code and containers both differ from the provider and are
    not easily portable.


    In the discussions so far, you have seen the following issues related to FaaS:


    *   Portability of code


    *   Portability of the serverless container


    *   Cold start of the serverless environment


    How do you solve these issues?


    Enter Spring Cloud Function and Knative. Spring Cloud Function addresses function
    code portability, and Knative addresses container portability.


    Information on Spring Cloud Function is available at [https://​spring.​io/​projects/​spring-cloud-function](https://spring.io/projects/spring-cloud-function),
    and information about Knative is available at [https://​knative.​dev/​docs/​](https://knative.dev/docs/).


    The following sections deep dive into each of these topics.'
  trans: "\n#### 为什么无服务器函数需要是非专有的？\n\n企业正逐渐转向多云、混合云的云策略。如图 1-2 所示，对 3000 名全球受访者的调查表明，76%的企业已经在多云环境中开展工作。这意味着它们不再局限于单一云服务商。采用多云策略可以缓解供应商锁定的风险。\n\
    \n![](img/526597_1_En_1_Fig2_HTML.jpg)\n\n一个圆形图展示了所有组织的云策略。2%为单一私有云，9%为单一公有云，89%为多云。多云部分进一步细分为\
    \ 80%混合云、7%多公有云、2%多私有云。\n\n图 1-3\n\n多云采用报告 来源：*https://info.flexera.com/CM-REPORT-State-of-the-Cloud?lead_source=Website%20Visitor&id=Blog*\n\
    \n在多云世界中，企业必须订阅能够轻松在云之间迁移的服务。这对于标准化服务尤为重要。\n\nFaaS（无服务器函数）近期已成为一种标准化服务，所有提供商都围绕\
    \ FaaS 提供了相关服务。因此，FaaS 容器必须避免包含专有代码。\n\n当无服务器函数不使用专有代码时，它们才能实现可移植性。可移植的无服务器函数允许工作负载在云之间迁移。例如，如果\
    \ AWS Lambda 函数成本高昂而 Azure Functions 成本较低，企业可以轻松利用成本优势，将 Lambda 工作负载迁移到 Azure\
    \ Functions。\n\n后续章节将详细探讨这些可移植性问题，并解释如何解决它们。\n\n## 1.2 代码可移植性问题\n\n清单 1-1 展示了使用\
    \ Java 编写的 AWS Lambda 示例代码。这段代码是通过 AWS SAM（Serverless Application Model）模板生成的。观察代码可以发现，AWS\
    \ 特定的库引用和方法调用将代码绑定到了 AWS。虽然这部分内容不多，但其影响非常显著。在企业中，通常会有数百甚至数千段此类代码，若要将其迁移到其他云服务商，必须进行重构。这是一项昂贵的操作。\n\
    \n清单 1-1. 使用 AWS SAM 框架的示例代码\n\n![](img/526597_1_En_1_Figa_HTML.png)\n\n亚马逊网络服务的无服务器应用模型框架。包名为\
    \ HelloWorld。它描述了亚马逊网络服务特定的代码和方法调用，这些将代码绑定到亚马逊网络服务。\n\n下一节将探讨底层无服务器容器的可移植性问题，这会影响多云迁移的实施方式。\n\
    \n### 1.2.1 无服务器容器可移植性问题\n\nLambda 底层的无服务器框架如何？它是否具有可移植性？\n\n深入研究 AWS Lambda 会发现，其使用的虚拟化技术是\
    \ Firecracker。Firecracker 基于 KVM（基于内核的虚拟机）创建和管理微虚拟机。您可以在 [`aws.amazon.com/blogs/aws/firecracker-lightweight-virtualization-for-serverless-computing/`](https://aws.amazon.com/blogs/aws/firecracker-lightweight-virtualization-for-serverless-computing/)\
    \ 查阅更多关于 Firecracker 的信息。\n\nFirecracker 的极简设计原则使其具备快速启动和关闭的特性。另一方面，Google Cloud\
    \ Functions 使用 gVisor 技术，且不兼容 Firecracker。gVisor 是容器的应用内核。更多信息请访问 [`github.com/google/gvisor`](https://github.com/google/gvisor)。\n\
    \nAzure Functions 则采用完全不同的方法，以 PaaS 服务 App Service 作为其基础。因此，您可以看到主要云服务商都使用自己的框架来管理函数容器。这使得函数在多云环境中的迁移变得困难。由于容器层缺乏可移植性，这一可移植性问题更加突出。\n\
    \n![](img/526597_1_En_1_Fig3_HTML.jpg)\n\n一个比较表格。Lambda 的函数代码包括 Lambda 运行时、沙箱、客户操作系统。对于\
    \ Google，包含 gVisor、主机内核和 Google 计算引擎。对于 Azure，部分包含语言运行时和 Web 作业脚本运行时。\n\n图 1-3\n\
    \n无服务器架构比较\n\n您可以看到，代码和容器都与提供商相关，且难以实现可移植性。\n\n到目前为止的讨论中，您已了解与 FaaS 相关的以下问题：\n\
    \n* 代码的可移植性  \n* 无服务器容器的可移植性  \n* 无服务器环境的冷启动\n\n如何解决这些问题？\n\n引入 Spring Cloud Function\
    \ 和 Knative。Spring Cloud Function 解决函数代码的可移植性问题，而 Knative 解决容器的可移植性问题。\n\n关于 Spring\
    \ Cloud Function 的信息请访问 [`spring.io/projects/spring-cloud-function`](https://spring.io/projects/spring-cloud-function)，关于\
    \ Knative 的信息请访问 [`knative.dev/docs/`](https://knative.dev/docs/)。\n\n后续章节将深入探讨这些主题。\n"
