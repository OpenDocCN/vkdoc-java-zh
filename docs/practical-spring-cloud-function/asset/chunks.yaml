    \n让我们深入探讨 GitHub Actions 和 ArgoCD。\n\n## 3.1 GitHub Actions\n\n这是一个与 GitHub 紧密集成的\
    \ CI/CD 平台；它允许你从 GitHub 创建和触发工作流。因此，如果你是 GitHub 的粉丝，你会非常喜欢这个新功能。当你注册 GitHub 时，GitHub\
    \ Actions 会自动集成到你的项目中，因此你无需使用 Jenkins 或 Circle CI 等独立工具。当然，这意味着你的代码仓库必须限制在 GitHub\
    \ 上。创建工作流非常简单。你可以通过导航到你的项目并点击 Actions 选项卡中的“新建工作流”按钮，在 GitHub 网站上直接创建工作流，如图 3-1\
    \ 所示。\n\n![](img/526597_1_En_3_Fig1_HTML.jpg)\n\nbanup-kubeforce 窗口的截图。选中了动作选项卡。它描述了所有工作流。包含所有工作流的运行记录、事件、状态、品牌和操作者。\n\
    \n图 3-1\n\n创建新的 GitHub Actions 工作流\n\n点击“新建工作流”后，如图 3-2 所示，你会进入工作流“市场”，可以选择建议的工作流或自行设置工作流。点击“自行设置工作流”链接以开始创建自定义工作流。\n\
    \n![](img/526597_1_En_3_Fig2_HTML.png)\n\nbanup-kubeforce 窗口的截图。选中了动作选项卡，该选项卡显示了一条选择工作流的消息。\n\
    \n图 3-2\n\n选择工作流设置的市场\n\n如图 3-3 所示，点击“自行设置工作流”窗口会带你到可以编写工作流脚本的页面。\n\n![](img/526597_1_En_3_Fig3_HTML.png)\n\
    \nbanup-kubeforce 窗口的截图。选中了代码选项卡。窗口左侧显示代码，右侧在市场选项卡下包含特色操作，如上传构建产物和设置 Java JDK。\n\
    \n图 3-3\n\n创建自定义工作流的页面\n\n如图 3-3 所示，工作流指向在项目根目录下的`./github/workflows`目录中创建的`main.yaml`文件。你也可以在\
    \ IDE 中创建相同文件，一旦提交代码，它就会出现在 Actions 选项卡下。列表 3-1 展示了为 AWS Lambda 部署的示例代码。\n\n```\n\
    name: CI\non:\n  push:\n    branches: [ \"master\" ]\njobs:\n  build-deploy:\n\
    \    runs-on: ubuntu-latest\n    steps:\n    - uses: actions/checkout@v2\n   \
    \ - uses: actions/setup-java@v2\n      with:\n        java-version: '8'\n    \
