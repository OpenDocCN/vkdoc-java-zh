    **2：创建** `TrackDetail` **类。**


    `TrackDetail` 类将包含三个字段—`vehicleId`、`driverId` 和 `driverName`；参见清单 4-15。


    ```

    package com.kubeforce.googlepubsub;

    public class TrackDetail {

    private String vehicleId;

