    |


    从表 5-2 可以看出，云函数被推荐用于实验。Google 建议对于生产部署，使用计算引擎搭配 TF Serving，或其 SaaS 平台（AI 平台）进行预测。


    这种方法的问题在于，基于函数的方案不仅仅是实验环境。函数是一种通过 API 暴露预测服务能力的方式，同时节省成本。这是一种无服务器架构，因此企业无需担心扩展问题。


