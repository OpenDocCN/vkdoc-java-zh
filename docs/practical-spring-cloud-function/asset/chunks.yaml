    ### 5.3.2 Spring Cloud Function with DJL


    For this example, we borrow an example from DJL called pneumonia detection. This
    sample is available at [`https://github.com/deepjavalibrary/djl-demo/tree/master/pneumonia-detection`](https://github.com/deepjavalibrary/djl-demo/tree/master/pneumonia-detection).


    This example uses an Xray image from [`https://djlai.s3.amazonaws.com/resources/images/chest_xray.jpg`](https://djlai.s3.amazonaws.com/resources/images/chest_xray.jpg).


    It predicts using a model from [`https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip`](https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip).


    The Spring Cloud Function you create will take an image, load the model, and provide
    a prediction, as in the cat example.


    Prerequisites:


    *   DJL libraries


    *   A model: [`https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip`](https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip)


    *   The URL of the image to analyze: [`https://djl-ai.s3.amazonaws.com/resources/images/chest_xray.jpg`](https://djl-ai.s3.amazonaws.com/resources/images/chest_xray.jpg)


    Step 1: Create the Spring Cloud Function with DJL framework. Add dependencies
    to the Hadoop file.


    Add the DJL highlighted dependencies along with `spring-cloud-function-web` and
    GCP dependencies, as shown in Listing [5-2](#526597_1_En_5_Chapter.xhtml#PC5).


    ```


    org.springframework.boot

    spring-boot-starter-web


    org.springframework.cloud

    spring-cloud-function-web


    ai.djl

    bom

    0.12.0

    pom


    ai.djl

    api

    0.12.0


    ai.djl.tensorflow

    tensorflow-api

    0.12.0


    ai.djl.tensorflow

    tensorflow-engine

    0.12.0


    ai.djl.tensorflow

    tensorflow-native-auto

    2.4.1

    runtime


    org.projectlombok

    lombok

    true


    Listing 5-2

    Dependencies for DJL

    ```


    Step 2: Create the Spring Cloud Function.


    Now create an `XRAYFunction` that stores a model from the URL provided: [`https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip`](https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip).
    See Listing [5-3](#526597_1_En_5_Chapter.xhtml#PC6).


    ```

    package com.kubeforce.djlxray;

    import ai.djl.inference.Predictor;

    import ai.djl.modality.Classifications;

    import ai.djl.modality.cv.Image;

    import ai.djl.modality.cv.ImageFactory;

    import ai.djl.modality.cv.translator.ImageClassificationTranslator;

    import ai.djl.modality.cv.util.NDImageUtils;

    import ai.djl.repository.zoo.Criteria;

    import ai.djl.repository.zoo.ZooModel;

    import ai.djl.translate.Translator;

    import lombok.SneakyThrows;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import java.io.IOException;

    import java.util.Arrays;

    import java.util.List;

    import java.util.Map;

    import java.util.function.Function;

    public class XRAYFunction implements Function, String> {

    private static final Logger logger = LoggerFactory.getLogger(XRAYFunction.class);

    private static final List CLASSES = Arrays.asList("Normal", "Pneumonia");

    String imagePath;

    String savedModelPath;

    @SneakyThrows

    @Override

    public String apply(Map imageinput) {

    imagePath= imageinput.get("url");

    savedModelPath = imageinput.get("savedmodelpath");

    Image image;

    try {

    image = ImageFactory.getInstance().fromUrl(imagePath);

    } catch (IOException e) {

    throw new RuntimeException(e);

    }

    Translator translator =

    ImageClassificationTranslator.builder()

    .addTransform(a -> NDImageUtils.resize(a, 224).div(255.0f))

    .optSynset(CLASSES)

    .build();

    Criteria criteria =

    Criteria.builder()

    .setTypes(Image.class, Classifications.class)

    //                           .optModelUrls("https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip")

    .optModelUrls(savedModelPath)

    .optTranslator(translator)

    .build();

    try (ZooModel model = criteria.loadModel();

    Predictor predictor = model.newPredictor()) {

    Classifications result = predictor.predict(image);

    logger.info("Diagnose: {}", result);

    return result.toJson();

    }

    }

    }

    Listing 5-3

    XRAYFunction.java

    ```


    Step 3: Test locally. Run the Spring Cloud Function and invoke the endpoint `http://localhost:8080/xrayFunction`


    Provide input:


    ```

    {

    "url":"https://djl-ai.s3.amazonaws.com/resources/images/chest_xray.jpg",

    "savedmodelpath":https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip

    }

    ```


    This is executed in Postman, as shown in Figure [5-8](#526597_1_En_5_Chapter.xhtml#Fig8).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig8_HTML.jpg)


    A screenshot of the postman testing. It highlights the local host, body, and row
    options with a testing program.


    Figure 5-8


    Testing with a POST in Postman


    Upon invoking the function, the model is downloaded and then loaded into memory.
    This takes about a minute to load, after which it comes back with a successful
    message. The model took 802066 microseconds (80 seconds) to load, and this is
    critical for your function calls, as you will have to accommodate for this model-loading
    time. See Figure [5-9](#526597_1_En_5_Chapter.xhtml#Fig9).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig10_HTML.jpg)


    A flow diagram of the saved model. It classifies as training and deployment. It
    represents the tensor flow components. The output from the training is sent to
    the saved model and further to the deployment.


    Figure 5-10


    TensorFlow components^([¹](#fn1))


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig9_HTML.png)


    A screenshot of programming functions with number, date, and time. It represents
    the results from image evaluation.


    Figure 5-9


    Prediction results from the image evaluation


    This section successfully demonstrated that Spring Cloud Function can act as a
    model server in AI/ML. This is a critical function, as you can move the loading
    and serving of models from traditional servers to a function-based, “pay-per-use”
    model.


    You also learned how to use deep learning Java libraries in your functions. You
    can deploy this Spring Cloud Function to any cloud, as shown in Chapter [2](#526597_1_En_2_Chapter.xhtml).


