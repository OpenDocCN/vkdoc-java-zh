    ## 2.4 Setting Up Spring Cloud Function Azure Functions


    You will use the same example from Section 2.1 and modify it a bit to make it
    run on Azure Functions. You will see that the approach for Azure Functions is
    different from AWS or Google. You have to add another class called `EmployeeConsumerHandler`,
    which extends a `FunctionInvoker<I,O>`. This `FunctionInvoker` class is merely
    a pass through for the `EmployeeConsumer` function.


    Prerequisites:


    *   Azure account


    *   Subscription to Azure Functions


    *   Azure Functions CLI. You can download the tools at [`https://docs.microsoft.com/en-us/azure/azure-functions/functions-run-local`](https://docs.microsoft.com/en-us/azure/azure-functions/functions-run-local)


    *   Code from GitHub at [`https://github.com/banup-kubeforce/payroll-azure`](https://github.com/banup-kubeforce/payroll-azure)


    ### Step 1: Follow Steps 1-6 outlined in Section 2.1


    You have to introduce a `FunctionInvoker<I,O>` class, which makes the code non-portable
    to other cloud providers. While AWS and Google externalize the invocation of the
    function, as you have seen in previous sections, Azure forces you to provide a
    handler class that extends a `FunctionInvoker`.


    Listing [2-12](#526597_1_En_2_Chapter.xhtml#PC18) introduces the class called
    `EmployeeConsumerHandler`, which extends `FunctionInvoker`. The input for this
    `FunctionInvoker` will be a `Map<String,String>`, which will take in the JSON
    object that is passed. This then gets sent to the `EmployeeConsumer` function,
    which processes the data.


    ```

    package com.kubeforce.payrollazure;

    import com.microsoft.azure.functions.*;

    import com.microsoft.azure.functions.annotation.*;

    import org.aspectj.weaver.NewConstructorTypeMunger;

    import org.springframework.cloud.function.adapter.azure.FunctionInvoker;

    import java.util.List;

    import java.util.Map;

    import java.util.Optional;

    import org.springframework.messaging.Message;

    import org.springframework.messaging.support.MessageBuilder;

    public class EmployeeConsumerHandler extends FunctionInvoker<String, ?> {

    @FunctionName("employeeConsumer")

    public String execute(

    @HttpTrigger(name = "request", methods = {HttpMethod.GET, HttpMethod.POST}, authLevel
    = AuthorizationLevel.ANONYMOUS) HttpRequestMessage<String> request,

    ExecutionContext context) {

    String message = "Successfully inserted: " + request.getBody().get().getName();

    return message;

    }

    }

    ```


