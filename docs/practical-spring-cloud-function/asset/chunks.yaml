    You use the same example outlined at https://cloud.google.com/blog/products/ai-machine-learning/how-to-serve-deep-learning-models-using-tensorflow-2-0-with-cloud-functions.
    This will allow you to concentrate more on the `Spring Cloud Function` code that
    you will be creating rather than the actual implementation in Python.


    You will then serve the model using `Spring Cloud Function`.


    Step 1: Install TensorFlow.


    ```

    python3 -m pip install tensorflow

    ```


    Step 2: Create a project. Create a project called `MNIST` and then create a `main.py`
