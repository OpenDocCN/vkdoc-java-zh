    ### 5.4.1 TensorFlow


    TensorFlow was developed by Google and is an open source platform for machine
    learning. It is an interface for expressing and executing machine learning algorithms.
    The beauty of TensorFlow is that a model expressed in TensorFlow can be executed
    with minimal changes on mobile devices, laptops, or large-scale systems with multiple
    GPUs and CPUs. TensorFlow is flexible and can express a lot of algorithms, including
    training and inference algorithms for deep neural networks, speech recognition,
    robotics, drug discovery, and so on.


    In Figure [5-9](#526597_1_En_5_Chapter.xhtml#Fig9), you can see that TensorFlow
    can be deployed to multiple platforms and has many language interfaces. Unfortunately,
    TensorFlow is written in Python, so most of the models are written and deployed
    in Python. This poses a unique challenge for enterprises who have standardized
    on Java.


    Even though TensorFlow is written in Python, there are lots of frameworks written
    in Java that work on a saved model.


    Let’s look at how you can work with TensorFlow on the Google Cloud platform.


    Google Cloud provides different approaches to working on models. You can use a
    container- or Kubernetes-based approach, an SaaS-based approach, or a Cloud Functions-based
    approach. Each has advantages and disadvantages. Google has published a good guide
    for you to pick the right platform for your needs, as shown in Table [5-2](#526597_1_En_5_Chapter.xhtml#Tab2).


    Table 5-2


    Google and AI/ML Environment^([²](#fn2))


    | ![](images/526597_1_En_5_Chapter/526597_1_En_5_Figa_HTML.jpg)A table with 4
    columns and 6 rows. The column headers are the features, compute engine, A L platform
    prediction, and cloud functions. It categorizes features and descriptions. |


    As you can see from Table [5-2](#526597_1_En_5_Chapter.xhtml#Tab2), cloud functions
    are recommended for experimentation. Google recommends Compute Engine with TF
    Serving, or its SaaS platform (AI Platform) for predictions for production deployments.


    The issue with this approach is that a function-based approach is more than just
    an experimentation environment. Functions are a way of saving on cost while exposing
    the serving capabilities for predictions through APIs. It is a serverless approach,
    so enterprises do not have to worry about scaling.


    ### 5.4.2 Example Model Training and Serving


    In this section you see how to train an AI model locally and upload it to Google
    Cloud Storage. You will then download the model and test an image through a Cloud
    Function API. You will use a model that is based on MNIST. More about MNIST can
    be found at https://en.wikipedia.org/wiki/MNIST_database.


    In this example, you develop the model in Python and then expose the model through
    `Spring Cloud Function` using `djl`; see Figure [5-11](#526597_1_En_5_Chapter.xhtml#Fig11).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig11_HTML.jpg)


