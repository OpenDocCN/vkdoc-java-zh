- fmt: "\n## 7.2 Enabling Healthcare with Spring Cloud Function and Big Data Pipelines\n\
    \nHealthcare is dependent on data. Be it patient records, image recognition, genomics,\
    \ tracking wearables, and using sensors, a healthcare system is bombarded with\
    \ data. Figure [7-25](#526597_1_En_7_Chapter.xhtml#Fig25) conceptualizes Big Data\
    \ in healthcare.\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig25_HTML.jpg)\n\
    \nA schema of healthcare context has circles with big data. The central part has\
    \ aggregation, analysis, and action flowing from the top to the bottom. The aggregation\
    \ is further connected to other components.\n\nFigure 7-25\n\nHealthcare context\
    \ Source: [https://www.researchgate.net/publication/330249318/figure/fig1/AS:713182909829120@1547047464835/Conceptualizing-big-data-in-healthcare-Health-system-data-are-aggregated-with-data.png](https://www.researchgate.net/publication/330249318/figure/fig1/AS:713182909829120%253F1547047464835/Conceptualizing-big-data-in-healthcare-Health-system-data-are-aggregated-with-data.png)\
    \ `(Creative commons license https://creativecommons.org/licenses/by/4.0/)`\n\n\
    The use case here is that a patient walks into a hospital complaining of a pain\
    \ in the back, near the spine. The pain has been persistent and they want a quick\
    \ diagnosis.\n\nThe process:\n\n1. The patient is admitted into the hospital by\
    \ means of a patient portal and check-in process.\n2. Initial patient analysis\
    \ is done using EHRs and patient-provided information, such as quality of life,\
    \ pain, expectations, and so on.\n3. The doctor recommends imaging and laboratory\
    \ tests.\n4. The patient is provided with a smart wearable that tracks their movement\
    \ in the hospital.\n5. Once the imaging, laboratory tests, and other pertinent\
    \ information comes in, the doctors use their smart AI diagnostic portal to diagnose\
    \ possible conditions.\n6. The doctor informs the patient of the diagnosis.\n\n\
    Let’s now look at the systems involved in this process:\n\n- Patient portal for\
    \ intake of patient information (data acquisition)\n- Intake and aggregate patient\
    \ surveys and patient history (data aggregation)\n- Labs and imaging (image data)\n\
    - Diagnosis (data analysis and AI recommendations)\n- Smart wearables (IoT streaming\
    \ data)\n\nTranslating this process into a cloud architecture view, you can see\
    \ that Spring Cloud Function plays an important role in all these processes. It\
    \ is therefore essential for the functions to be portable so that the best cloud\
    \ providers can be used in each case. See Figure [7-26](#526597_1_En_7_Chapter.xhtml#Fig26).\n\
    \n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig26_HTML.jpg)\n\nA schema to\
    \ depict the Spring Cloud Function application. It has 5 components listed patient\
    \ portal, initial patient analysis, labs and imaging, diagnosis, and smart bands\
    \ and devices. Icons related to these components are beside.\n\nFigure 7-26\n\n\
    Applications of Spring Cloud Function in the various healthcare flows\n\n## 7.3\
    \ Conversational AI in Retail Using Spring Cloud Function\n\nAI and retail are\
    \ inextricably tied at the hip. Humans enjoy shopping, mall strolling, online\
    \ shopping, and just online browsing. They constantly encounter AI by way of targeted\
    \ advertising, product recommendations, and product placements. Many of these\
    \ features are run by robots. This means that AI and retail are converging.\n\n\
    Based on Fortune business insights, the retail AI market is expected to reach\
    \ $19.9 billion by 2027, with a growth rate of 34.4 percent from 2020 to 2027\
    \ (Source: [https://www.meticulousresearch.com/product/artificial-intelligence-in-retail-market-4979](https://www.meticulousresearch.com/product/artificial-intelligence-in-retail-market-4979)).\n\
    \nSome of the top ways that AI is used in retail include:\n\n- Predictive analytics\
    \ using Big Data\n- Demand forecasting\n- Visual searching\n- Recommender systems\n\
    - Chatbots\n- Augmented reality\n- Brand management\n\nCOVID-19 changed the way\
    \ that AI interacted with retail. AI powered by chatbots rose to prominence.\n\
    \nChatbots—or conversational AI—in fact became the AI interface for retail. Most\
    \ communication with a product or support team is initiated using an AI interactive\
    \ session. Better customer experience through these chatbots is of paramount importance\
    \ to retailers. If the chatbots were bad, the customer would move on to another\
    \ retailer. So brand management, recommendations, predictions, and forecasting\
    \ all relied on how the chatbot interacted with the customers and if it extracted\
    \ the right information to provide the customers with the best experience.\n\n\
    IBM, AWS, Azure, Google, and other cloud providers focused their attention on\
    \ capturing the conversational AI market, as every retailer was clamoring for\
    \ an edge with these customer interactions.\n\nYou will look at how IBM approached\
    \ conversational AI and at how Spring Cloud Function plays a role in connecting\
    \ systems with people.\n\nThe IBM conversational AI offering includes a wide array\
    \ of products on the IBM Cloud and on cloud paks. Cloud paks are software that\
    \ can be deployed to any cloud.\n\nIBM Cloud provides both generic Kubernetes\
    \ and Red Hat OpenShift Kubernetes, while the cloud paks are offered on Red Hat\
    \ OpenShift. Spring Cloud Function can be deployed on any Kubernetes offering.\n\
    \nFigure [7-27](#526597_1_En_7_Chapter.xhtml#Fig27) shows a conceptual representation\
    \ of conversational AI.\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig27_HTML.png)\n\
    \nA schema of artificial intelligence conversational concepts. It has data sources,\
    \ conversational artificial intelligence processing, conversation channels, and\
    \ outcomes. All these have sub-components.\n\nFigure 7-27\n\nConversational AI\
    \ concept\n\nBy translating this concept into an IBM Cloud-based architecture,\
    \ you get Figure [7-28](#526597_1_En_7_Chapter.xhtml#Fig28).\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig28_HTML.jpg)\n\
    \nA schema of artificial intelligence conversational system. It starts with conversational\
    \ endpoints, then to EDGE services, IBM cloud, and to the user. The IBM cloud\
    \ has components associated with it.\n\nFigure 7-28\n\nConversational AI systems\
    \ view\n\n### 7.3.1 Components of Conversational AI Solutions\n\n1. Edge services\n\
    \n   Edge services allow the flow of data on the Internet. These services include\
    \ DNS, CDNs, firewalls, load balancers, and so on.\n\n2. IBM Watson Assistant\n\
    \n   Watson Assistant enables you to create virtual agents and chatbots that combine\
    \ machine learning, natural language processing, and graphical tools to design\
    \ your conversational flows. Additional information is available at [https://www.ibm.com/products/watson-assistant](https://www.ibm.com/products/watson-assistant).\n\
    \n3. IBM Watson Discovery Services\n\n   Watson Discovery Services helps you ingest,\
    \ parse, index, and annotate content. The ingested data can come from internal\
    \ and external data sources. Additional information is available at [https://www.ibm.com/cloud/watson-discovery](https://www.ibm.com/cloud/watson-discovery).\n\
    \n4. Watson Speech to Text\n\n   Watson Speech to Text converts voice to text.\
    \ Additional information is available at [https://www.ibm.com/cloud/watson-speech-to-text](https://www.ibm.com/cloud/watson-speech-to-text).\n\
    \n5. Spring Cloud Function deployed on Knative on OpenShift (IBM Cloud)\n\n  \
    \ Spring Cloud Function can be deployed on OpenShift in the IBM Cloud. Knative\
    \ has to be configured on OpenShift. This process is outlined in the Knative deployment\
    \ discussion throughout this book.\n\n6. DB2 on cloud\n\n   This is a fully managed\
    \ SQL database on the cloud. Information about DB2 on cloud can be found at [https://www.ibm.com/cloud/db2-on-cloud](https://www.ibm.com/cloud/db2-on-cloud).\n\
    \n7. Cloudant DB\n\n   This is a fully managed distributed database ideal for\
    \ web and mobile apps and storing IoT or mobile data. More information can be\
    \ found at [https://www.ibm.com/cloud/cloudant](https://www.ibm.com/cloud/cloudant).\n"
