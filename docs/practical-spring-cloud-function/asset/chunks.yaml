    Figure 3-39


    Successful execution of test against `payroll-h2` deployed on AKS Knative


    This completes the successful deployment using GitHub Actions and ArgoCD.


    ### 3.9 Summary


    In this chapter, you learned how to set up some CI/CD tools to create an automated
    deployment for your Spring Cloud Function.


    You learned how to trigger the deployment of functions on Lambda, Google Cloud
    Functions, and Azure Functions.


    You also learned that you can combine the build of Docker images stored in Docker
    hub and ArgoCD to deploy the image to any Kubernetes cluster that is running Knative.


    If you want to achieve “write-once deploy-anywhere,” you have to look at using
    Kubernetes and Knative. Spring Cloud Function is really a portable function.


    # 4. Building Event-Driven Data Pipelines with Spring Cloud Function


    Spring Cloud Function plays a critical role in the hybrid cloud or on-premises/private
    cloud space. Building events/data pipelines that span across the local datacenter
    and the cloud increases complexity due to the firewall boundaries. Data pipelines
    play an important role when you want to acquire, move, or transform data as it
    comes (streaming) or when it’s offline (batch).


    So, what are event data pipelines?

