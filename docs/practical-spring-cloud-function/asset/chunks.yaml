- fmt: "\n## 3.7 Deploying to Azure Functions\n\nSpring Cloud Function on Azure Functions\
    \ require a bit of tweaking, as you learned in Chapter [2](#526597_1_En_2_Chapter.xhtml).\
    \ This is because the configuration is not externalized, as with AWS Lambda or\
    \ GCP Cloud Functions. This does not mean that you cannot deploy easily. You have\
    \ to understand how Azure Function code interprets Spring Cloud Function code\
    \ and execute. See Chapter [2](#526597_1_En_2_Chapter.xhtml) for discussions around\
    \ this issue; make sure that you execute and test locally before pushing to the\
    \ Azure cloud.\n\nStep 1: Spring Cloud Function code in GitHub. Push your code\
    \ to GitHub. If you cloned the [`https://github.com/banup-kubeforce/payroll-azure-h2.git`](https://github.com/banup-kubeforce/payroll-azure-h2.git),\
    \ you have everything that you need to push the code to your repository.\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig24_HTML.jpg)\n\
    \nA flow diagram describes flow of spring cloud function deployment on azure.\
    \ Commit code through Git is pushed to GitHub. Event-triggered GitHub actions\
    \ and deploy spring cloud function in Azure functions.\n\nFigure 3-24\n\nFlow\
    \ of Spring Cloud Function deployment on Azure\n\nStep 2: Set up Azure Function\
    \ App Actions. See Listing [3-7](#526597_1_En_3_Chapter.xhtml#PC17).\n\n```\n\
    name: Deploy Java project to Azure Function App\non:\npush:\nbranches: [ `master`\
    \ ]\n# CONFIGURATION\n# For help, go to https://github.com/Azure/Actions\n#\n\
    # 1\\. Set up the following secrets in your repository:\n#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE\n\
    #\n# 2\\. Change these variables for your configuration:\nenv:\n`AZURE_FUNCTIONAPP_NAME`:\
    \ payroll-kubeforce-new      # set this to your function app name on Azure\n`POM_XML_DIRECTORY`:\
    \ '.'                     # set this to the directory which contains pom.xml file\n\
    `POM_FUNCTIONAPP_NAME`: payroll-kubeforce-new       # set this to the function\
    \ app name in your local development environment\n`JAVA_VERSION`: '11'       \
    \               # set this to the java version to use\njobs:\nbuild-and-deploy:\n\
    runs-on: ubuntu-latest\nenvironment: dev\nsteps:\n- name: 'Checkout GitHub Action'\n\
    uses: actions/checkout@master\n- name: Setup Java Sdk ${{ env.JAVA_VERSION }}\n\
    uses: actions/setup-java@v1\nwith:\njava-version: ${{ env.JAVA_VERSION }}\n- name:\
    \ 'Restore Project Dependencies Using Mvn'\nshell: bash\nrun: |\npushd './${{\
    \ env.POM_XML_DIRECTORY }}'\nmvn clean package\npopd\n- name: 'Run Azure Functions\
    \ Action'\nuses: Azure/functions-action@v1\nid: fa\nwith:\napp-name: ${{ env.AZURE_FUNCTIONAPP_NAME\
    \ }}\npackage: './${{ env.POM_XML_DIRECTORY }}/target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME\
    \ }}'\npublish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}\n```\n\
    \nListing 3-7  \nWorkflow for Payroll Function to be Deployed on Azure Functions\n\
    \nStep 3: Execute GitHub Actions. GitHub Actions are executed by this setting\
    \ in the `actions` file:\n\n```\non:\npush:\nbranches: [ `master` ]\n```\n\nAny\
    \ commit or push to the `master` branch will trigger an execution of GitHub Actions;\
    \ see Figure [3-25](#526597_1_En_3_Chapter.xhtml#Fig25).\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig25_HTML.jpg)\n\
    \nA screenshot of the summary window. The build and deploy button is selected\
    \ which displays build deployment window which includes set up job, build with\
    \ Maven, run Sam package, etc.\n\nFigure 3-25\n\nSuccessful deployment of Payroll\
    \ Spring Cloud Function using GitHub Actions\n\nAfter successfully deploying using\
    \ GitHub actions, you need to verify the deployment in the Azure Functions dashboard;\
    \ see Figure [3-26](#526597_1_En_3_Chapter.xhtml#Fig26).\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig26_HTML.png)\n\
    \nA screenshot of the azure functions dashboard. Functions selected under payroll-kubeforce\
    \ includes name, trigger and status with its details.\n\nFigure 3-26\n\nAzure\
    \ Functions dashboard showing the function employeeSupplier has been deployed\n\
    \nClick the `employeeSupplier` link to get to Figure [3-27](#526597_1_En_3_Chapter.xhtml#Fig27).\n\
    \n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig28_HTML.jpg)\n\nA screenshot\
    \ of the employee supplier dashboard. The tab overview is selected. It displays\
    \ the Get function U r l along with the default function key and ok tab.\n\nFigure\
    \ 3-28\n\nGet the URL of the function\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig27_HTML.jpg)\n\
    \nA screenshot of the employee supplier dashboard. The tab overview is selected.\
    \ The get function under overview is selected which displays essentials along\
    \ with other details such as function app, status, etc.\n\nFigure 3-27\n\nClick\
    \ the Get Function URL on the employeeSupplier dashboard\n\nThe URL of the function\
    \ is [`https://payroll-kubeforce.azurewebsites.net/api/employeeSupplier`](https://payroll-kubeforce.azurewebsites.net/api/employeeSupplier).\
    \ Use this URL for testing.\n\nStep 4: Testing. You will use an external testing\
    \ tool to see if the deployed functions work. The tool you use here is Postman.\n\
    \nYou can simply use a `GET` operation to test, as shown in Figure [3-29](#526597_1_En_3_Chapter.xhtml#Fig29).\n\
    \n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig29_HTML.jpg)\n\nA screenshot\
    \ of the window of testing of the payroll-Kubeforce azure website. The tab body\
    \ is selected. It displays options raw, binary, and Graph Q L along with other\
    \ details.\n\nFigure 3-29\n\nSuccessful test result with Postman\n\nThis completes\
    \ the deployment of Spring Cloud Function on Azure Functions using GitHub Actions.\n"
  raw: '## 3.7 Deploying to Azure Functions


    Spring Cloud Function on Azure Functions require a bit of tweaking, as you learned
    in Chapter [2](#526597_1_En_2_Chapter.xhtml). This is because the configuration
    is not externalized, as with AWS Lambda or GCP Cloud Functions. This does not
    mean that you cannot deploy easily. You have to understand how Azure Function
    code interprets Spring Cloud Function code and execute. See Chapter [2](#526597_1_En_2_Chapter.xhtml)
    for discussions around this issue; make sure that you execute and test locally
    before pushing to the Azure cloud.


    Step 1: Spring Cloud Function code in GitHub. Push your code to GitHub. If you
    cloned the [`https://github.com/banup-kubeforce/payroll-azure-h2.git`](https://github.com/banup-kubeforce/payroll-azure-h2.git),
    you have everything that you need to push the code to your repository.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig24_HTML.jpg)


    A flow diagram describes flow of spring cloud function deployment on azure. Commit
    code through Git is pushed to GitHub. Event-triggered GitHub actions and deploy
    spring cloud function in Azure functions.


    Figure 3-24


    Flow of Spring Cloud Function deployment on Azure


    Step 2: Set up Azure Function App Actions. See Listing [3-7](#526597_1_En_3_Chapter.xhtml#PC17).


    ```

    name: Deploy Java project to Azure Function App

    on:

    push:

    branches: [ "master" ]

    # CONFIGURATION

    # For help, go to https://github.com/Azure/Actions

    #

    # 1\. Set up the following secrets in your repository:

    #   AZURE_FUNCTIONAPP_PUBLISH_PROFILE

    #

    # 2\. Change these variables for your configuration:

    env:

    AZURE_FUNCTIONAPP_NAME: payroll-kubeforce-new      # set this to your function
    app name on Azure

    POM_XML_DIRECTORY: ''.''                     # set this to the directory which
    contains pom.xml file

    POM_FUNCTIONAPP_NAME: payroll-kubeforce-new       # set this to the function app
    name in your local development environment

    JAVA_VERSION: ''11''                      # set this to the java version to use

    jobs:

    build-and-deploy:

    runs-on: ubuntu-latest

    environment: dev

    steps:

    - name: ''Checkout GitHub Action''

    uses: actions/checkout@master

    - name: Setup Java Sdk ${{ env.JAVA_VERSION }}

    uses: actions/setup-java@v1

    with:

    java-version: ${{ env.JAVA_VERSION }}

    - name: ''Restore Project Dependencies Using Mvn''

    shell: bash

    run: |

    pushd ''./${{ env.POM_XML_DIRECTORY }}''

    mvn clean package

    popd

    - name: ''Run Azure Functions Action''

    uses: Azure/functions-action@v1

    id: fa

    with:

    app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}

    # package: ''./${{ env.POM_XML_DIRECTORY }}/target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME
    }}''

    package: ''./${{ env.POM_XML_DIRECTORY }}/target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME
    }}''

    #        package: ''${{ env.POM_XML_DIRECTORY }}/target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME
    }}''

    #  package: ''target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME }}''

    publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

    Listing 3-7

    Workflow for Payroll Function to be Deployed on Azure Functions

    ```


    Step 3: Execute GitHub Actions. GitHub Actions are executed by this setting in
    the `actions` file:


    ```

    on:

    push:

    branches: [ “master” ]

    ```


    Any commit or push to the “master” branch will trigger an execution of GitHub
    Actions; see Figure [3-25](#526597_1_En_3_Chapter.xhtml#Fig25).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig25_HTML.jpg)


    A screenshot of the summary window. The build and deploy button is selected which
    displays build deployment window which includes set up job, build with Maven,
    run Sam package, etc.


    Figure 3-25


    Successful deployment of Payroll Spring Cloud Function using GitHub Actions


    After successfully deploying using GitHub actions, you need to verify the deployment
    in the Azure Functions dashboard; see Figure [3-26](#526597_1_En_3_Chapter.xhtml#Fig26).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig26_HTML.png)


    A screenshot of the azure functions dashboard. Functions selected under payroll-kubeforce
    includes name, trigger and status with its details.


    Figure 3-26


    Azure Functions dashboard showing the function employeeSupplier has been deployed


    Click the `employeeSupplier` link to get to Figure [3-27](#526597_1_En_3_Chapter.xhtml#Fig27).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig28_HTML.jpg)


    A screenshot of the employee supplier dashboard. The tab overview is selected.
    It displays the Get function U r l along with the default function key and ok
    tab.


    Figure 3-28


    Get the URL of the function


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig27_HTML.jpg)


    A screenshot of the employee supplier dashboard. The tab overview is selected.
    The get function under overview is selected which displays essentials along with
    other details such as function app, status, etc.


    Figure 3-27


    Click the Get Function URL on the employeeSupplier dashboard


    The URL of the function is [`https://payroll-kubeforce.azurewebsites.net/api/employeeSupplier`](https://payroll-kubeforce.azurewebsites.net/api/employeeSupplier).
    Use this URL for testing.


    Step 4: Testing. You will use an external testing tool to see if the deployed
    functions work. The tool you use here is Postman.


    You can simply use a `GET` operation to test, as shown in Figure [3-29](#526597_1_En_3_Chapter.xhtml#Fig29).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig29_HTML.jpg)


    A screenshot of the window of testing of the payroll-Kubeforce azure website.
    The tab body is selected. It displays options raw, binary, and Graph Q L along
    with other details.


    Figure 3-29


    Successful test result with Postman


    This completes the deployment of Spring Cloud Function on Azure Functions using
    GitHub Actions.'
  trans: '

    ## 3.7 部署到 Azure Functions


    在 Azure Functions 上部署 Spring Cloud Function 需要一些调整，正如你在第 2 章中所学到的。这是因为配置未实现外部化，与
    AWS Lambda 或 GCP Cloud Functions 不同。这并不意味着你无法轻松部署。你需要理解 Azure Function 代码如何解释
    Spring Cloud Function 代码并执行。有关此问题的讨论，请参见第 2 章；在将代码推送到 Azure 云之前，请务必在本地执行和测试。


    步骤 1：在 GitHub 上的 Spring Cloud Function 代码。将你的代码推送到 GitHub。如果你克隆了 [`https://github.com/banup-kubeforce/payroll-azure-h2.git`](https://github.com/banup-kubeforce/payroll-azure-h2.git)，则你已具备将代码推送到仓库所需的一切。


    ![](img/526597_1_En_3_Fig24_HTML.jpg)


    一个流程图描述了在 Azure 上部署 Spring Cloud Function 的流程。通过 Git 提交的代码被推送到 GitHub。事件触发的 GitHub
    操作和部署 Spring Cloud Function 到 Azure Functions。


    图 3-24


    在 Azure 上部署 Spring Cloud Function 的流程


    步骤 2：设置 Azure Function 应用操作。参见清单 3-7。


    ```

    name: Deploy Java project to Azure Function App

    on:

    push:

    branches: [ "master" ]

    # 配置

    # 如需帮助，请访问 https://github.com/Azure/Actions

    #

    # 1\. 在仓库中设置以下密钥：

    #   AZURE_FUNCTIONAPP_PUBLISH_PROFILE

    #

    # 2\. 根据你的配置更改这些变量：

    env:

    AZURE_FUNCTIONAPP_NAME: payroll-kubeforce-new      # 设置为 Azure 上的函数应用名称

    POM_XML_DIRECTORY: ''.''                     # 设置为包含 pom.xml 文件的目录

    POM_FUNCTIONAPP_NAME: payroll-kubeforce-new       # 设置为本地开发环境中的函数应用名称

    JAVA_VERSION: ''11''                      # 设置为要使用的 Java 版本

    jobs:

    build-and-deploy:

    runs-on: ubuntu-latest

    environment: dev

    steps:

    - name: ''Checkout GitHub Action''

    uses: actions/checkout@master

    - name: Setup Java Sdk ${{ env.JAVA_VERSION }}

    uses: actions/setup-java@v1

    with:

    java-version: ${{ env.JAVA_VERSION }}

    - name: ''使用 Mvn 恢复项目依赖''

    shell: bash

    run: |

    pushd ''./${{ env.POM_XML_DIRECTORY }}''

    mvn clean package

    popd

    - name: ''运行 Azure Functions 操作''

    uses: Azure/functions-action@v1

    id: fa

    with:

    app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}

    # package: ''./${{ env.POM_XML_DIRECTORY }}/target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME
    }}''

    package: ''./${{ env.POM_XML_DIRECTORY }}/target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME
    }}''

    #        package: ''${{ env.POM_XML_DIRECTORY }}/target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME
    }}''

    #  package: ''target/azure-functions/${{ env.POM_FUNCTIONAPP_NAME }}''

    publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

    清单 3-7

    用于在 Azure Functions 上部署 Payroll 函数的工作流

    ```


    步骤 3：执行 GitHub 操作。GitHub 操作通过 `actions` 文件中的以下设置执行：


    ```

    on:

    push:

    branches: [ “master” ]

    ```


    任何对 “master” 分支的提交或推送都会触发 GitHub 操作的执行；参见图 3-25。


    ![](img/526597_1_En_3_Fig25_HTML.jpg)


    测试窗口的截图。选中“构建和部署”按钮，显示包含设置任务、使用 Maven 构建、运行 Sam 包装等的构建部署窗口。


    图 3-25


    使用 GitHub 操作成功部署 Payroll Spring Cloud Function


    在成功使用 GitHub 操作部署后，你需要通过 Azure Functions 控制台验证部署；参见图 3-26。


    ![](img/526597_1_En_3_Fig26_HTML.png)


    Azure Functions 控制台的截图。在 payroll-kubeforce 下选中的函数包括名称、触发器和状态等详细信息。


    图 3-26


    Azure Functions 控制台显示函数 employeeSupplier 已部署


    点击 `employeeSupplier` 链接以查看图 3-27。


    ![](img/526597_1_En_3_Fig28_HTML.jpg)


    employee supplier 控制台的截图。选中“概览”标签。显示获取函数 URL、默认函数密钥和 ok 标签。


    图 3-28


    获取函数的 URL


    ![](img/526597_1_En_3_Fig27_HTML.jpg)


    employee supplier 控制台的截图。选中“概览”标签，选中“概览”下的获取函数，显示基本信息及其他详细信息（如函数应用、状态等）。


    图 3-27


    在 employeeSupplier 控制台点击获取函数 URL


    函数的 URL 是 [`https://payroll-kubeforce.azurewebsites.net/api/employeeSupplier`](https://payroll-kubeforce.azurewebsites.net/api/employeeSupplier)。使用此
    URL 进行测试。


    步骤 4：测试。你将使用外部测试工具来验证已部署的函数是否正常运行。此处使用的工具是 Postman。


    你可以简单地使用 `GET` 操作进行测试，如图 3-29 所示。


    ![](img/526597_1_En_3_Fig29_HTML.jpg)


    测试 payroll-Kubeforce Azure 网站的窗口截图。选中“正文”标签。显示原始、二进制和 Graph Q L 等选项及其他详细信息。


    图 3-29


    使用 Postman 成功测试结果


    至此，已完成通过 GitHub 操作在 Azure Functions 上部署 Spring Cloud Function 的流程。

    '
- fmt: "\n## 3.8 Deploying to Knative on Kubernetes\n\nThe CI/CD for deploying Spring\
    \ Cloud Function on Knative are similar for every Kubernetes. The only change\
    \ is the cluster name. This section uses ArgoCD (`http://argoproj.github.io`)\
    \ for CD even though you can achieve the same result with GitHub Actions. I found\
    \ GitHub Actions a bit code-intensive. I wanted to separate the CD process and\
    \ have a good visual tool that shows the deployment. ArgoCD provides a good visual\
    \ interface.\n\nTo have a common repository for all the cloud environments, you’ll\
    \ use Docker hub in this example. Docker hub provides a good interface for managing\
    \ images and it is popular with developers. If you use ECR, GCR, or ACR, you’ll\
    \ experience vendor lock-in.\n\nThe prerequisites for deploying to any Kubernetes\
    \ platform are the same:\n\n* Get the code from GitHub. You can use `https://github.com/banup-kubeforce/payroll-h2.git`\
    \ or push your custom code\n\n* A `Dockerhub` account\n\n* A `DockerFile` to push\
    \ to Dockerhub\n\n* Actions code in your GitHub project\n\n* Access to a Kubernetes\
    \ Cluster with Knative configured\n\n* ArgoCD up and running\n\n* An app in ArgoCD\
    \ that is configured to poll the GitHub project\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig30_HTML.jpg)\n\
    \nA flow diagram describes deployment flow for spring cloud function with Github\
    \ actions and ArgoCD. Commit code through Git pushes it to GitHub. Event-triggered\
    \ Github actions push to docker and pull and sync to Argo. It deploys spring cloud\
    \ function in kubernetes.\n\nFigure 3-30\n\nDeployment flow for Spring Cloud Function\
    \ with GitHub Actions and ArgoCD\n\nOnce you have the prerequisites set up, you\
    \ can begin configuring an automated CI/CD pipeline. For this example implementation,\
    \ you’ll use the code from GitHub at `https://github.com/banup-kubeforce/payroll-h2.git`.\n\
    \nStep 1: Spring Cloud Function code in GitHub. Push your code to GitHub. You\
    \ can use the code for `payroll-h2` in GitHub.\n\nStep 2: Create a GitHub Action.\
    \ Listing [3-8](#526597_1_En_3_Chapter.xhtml#PC19) shows the code for the action.\n\
    \n```\nname: ci\non:\n  push:\n    branches:\n      - 'main'\njobs:\n  docker:\n\
    \    runs-on: ubuntu-latest\n    steps:\n      -\n        name: Set up QEMU\n\
    \        uses: docker/setup-qemu-action@v2\n      -\n        name: Set up Docker\
    \ Buildx\n        uses: docker/setup-buildx-action@v2\n      - uses: actions/checkout@v2\n\
    \      - uses: actions/setup-java@v2\n        with:\n          java-version: '8'\n\
    \          distribution: 'temurin'\n          cache: maven\n      -\n        name:\
    \ Login to DockerHub\n        uses: docker/login-action@f054a8b539a109f9f41c37508980b4b5e9bcdc5dc\n\
    \        with:\n          username: ${{ secrets.DOCKERHUB_USERNAME }}\n      \
    \    password: ${{ secrets.DOCKERHUB_TOKEN }}\n      - name: Extract metadata\
    \ (tags, labels) for Docker1\n        id: meta\n        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38\n\
    \        with:\n          images: banupkubeforce/springcloudfunctions\n      -\
    \ name: Build with Maven\n        run: `mvn` -B package --file `pom.xml`\n   \
    \   - name: Build and push Docker image\n        uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc\n\
    \        with:\n          context: .\n          file: `./DockerFile`\n       \
    \   push: true\n          tags: ${{ steps.meta.outputs.tags }}\n          labels:\
