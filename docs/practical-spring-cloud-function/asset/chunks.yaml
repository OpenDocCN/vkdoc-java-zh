    ## 6.1 The State of IoT


    IoT (Internet of Things) has been growing and is expected to grow 22 percent in
    2022\. This phenomenal growth has led to a plethora of data that needs to be acquired
    and processed.


    According to a study by IoT Analytics Research in September 2021, the IoT device
    market is expected to grow phenomenally and by 2025 it is predicted to reach 25
    billion devices. More about the study is available at [`https://iotbusinessnews.com/2021/09/23/13465-number-of-connected-iot-devices-growing-9-to-12-3-billion-globally-cellular-iot-now-surpassing-2-billion/`](https://iotbusinessnews.com/2021/09/23/13465-number-of-connected-iot-devices-growing-9-to-12-3-billion-globally-cellular-iot-now-surpassing-2-billion/).


    With this growth potential, you can safely assume that the supporting technologies
    will also grow. These technologies not only include hardware sensors and IoT gateways,
    but also technologies such as microservices and functions. The IoT industry is
    best suited to implement these technologies, as they are highly distributed and
    rely heavily on the software components to be small and efficient.


    Serverless function-based environments that are triggered on demand are perfectly
    suited to IoT, as they can save significant cost. Traditional approaches to IoT
    relied on dedicated applications running 24/7\. They used up a lot of resources,
    adding to the cost of operation. With the nearly ephemeral nature of serverless
    functions, this cost can be moved to the “pay per use” approach.


    Before you start working on some of the examples of IoT and Spring Cloud Function,
    it is best to understand why you need to code in Java. There are many alternative
    languages you can code in, but Java is the best for IoT and here is why:


    *   Java was designed with IoT in mind. If you look at early Java examples from
    Sun Microsystems, you will see that synchronization of digital clocks was referred
    to often.


    *   Java has been ported to many microcontrollers.


    *   Java is designed to run in a resource-constrained environment such as sensors.


    *   JVM makes code portable across platforms; you write once run anywhere.


    As per the IoT survey done by [`iot.eclipse.org`](http://iot.eclipse.org), which
    is available at [`https://iot.eclipse.org/community/resources/iot-surveys/assets/iot-developer-survey-2020.pdf`](https://iot.eclipse.org/community/resources/iot-surveys/assets/iot-developer-survey-2020.pdf),
    you can see that Java is the preferred language, both in the edge and in the cloud.
    Implementations on the edge are moving to containerization, per the study. This
    is great for Knative on Kubernetes installations on the edge.


    Furthermore, the Spring Framework has been the platform of choice for many IIoT
    (Industrial IoT) projects. You can review a presentation at a SpringOne event
    in 2017 at [`https://youtu.be/MReQD9tXQuA`](https://youtu.be/MReQD9tXQuA).


    Components like Spring Cloud Streams, Spring Cloud Data Flow, Spring Integration,
    Spring MQTT, Spring Data, and Spring XD play a significant role in IoT data acquisition,
    storing, and the transformation pipeline.


    ### 6.1.1 Example Spring Implementation


    Consider this example implementation of Spring and its components in a connected
    fleet scenario.


    The team at Penske leveraged Spring-based microservices, Spring Cloud Streams
    in combination with Spring Cloud Data Flow, to acquire data from sensors that
    were installed on Penske trucks. This application allowed Penske to monitor the
    trucks, do predictive maintenance, and manage the trucks in real-time. See Figure
    [6-1](#526597_1_En_6_Chapter.xhtml#Fig1).


