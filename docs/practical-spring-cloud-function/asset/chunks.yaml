    \ ProducerFunction implements Function {\n@Autowired\nprivate PubSubPublisher\
    \ publisher;\n@Override\npublic String apply(TrackDetail trackDetail) {\nObjectMapper\
    \ mapper = new ObjectMapper();\nString data = “”;\ntry {\ndata = mapper.writeValueAsString(trackDetail);\n\
    MessageEntity entity = new MessageEntity(LocalDateTime.now(), data);\npublisher.publish(data);\n\
    } catch (JsonProcessingException e) {\ne.printStackTrace();\n} catch (Exception\
    \ e) {\ne.printStackTrace();\n}\nreturn \"Saved data into Kinesis successfully!\"\
    ;\n}\n}\nListing 4-17\nProducerFunction.java\n```\n\n**5:** **运行应用程序并测试是否已将消息发布到\
    \ Cloud Pub/Sub。**\n\n前往 Google Cloud 控制台中的 Pub/Sub 控制台，验证消息是否已发布；参见图 4-37。\n\n\
    ![](img/526597_1_En_4_Fig37_HTML.png)\n\n一张截图展示了在 Google 云的 Pub/Sub 控制台中发布的消息。\n\
    \n图 4-37\n\n消息已发布到 Cloud Pub/Sub\n\n**6: 验证消息是否已加载到 Cloud Storage 中。**\n\n前往 Google\
    \ Cloud 中的 Cloud Storage 控制台以验证消息是否已加载；参见图 4-38。\n\n![](img/526597_1_En_4_Fig38_HTML.jpg)\n\
    \n一张截图展示了 Cloud Storage 控制台，用于验证消息是否已加载到存储中。它显示了 vehicle bucket one 的存储桶详细信息。\n\
    \n图 4-38\n\n消息已加载到 Cloud Storage 中\n\n在本节中，您学习了如何使用 Spring Cloud Function 触发基于\
    \ Google Cloud Dataflow 的数据管道。\n\n## 4.5 总结\n\n本章解释了如何创建数据流和数据管道，无论是使用 SCDF 在本地还是在云环境中。对于云环境，您可以使用\
    \ SCDF 或云原生工具。\n\nSpring Cloud Function 功能强大，可以在数据管道的上下文中用作触发器或流程的一部分。\n\n通过 AWS\
    \ Glue 和 Google Data Flow，您了解到可以将 Spring Cloud Function 用作流程的触发器。这需要通过添加相关库并调用流程来实现一些额外的编码。\n\
    \n后续章节将探讨 Spring Cloud Function 的其他用例。\n\n# 5. 使用 Spring Cloud Function 构建 AI/ML\
    \ 训练的无服务器端点\n\n本章探讨了 Spring Cloud Function 如何在 AI/ML 领域发挥作用。您将了解 AI/ML 流程，并学习\
    \ Spring Cloud Function 在该流程中的定位。您还将了解云服务提供商（如 AWS、Google 和 Azure）的一些服务。\n\n在深入探讨\
    \ Spring Cloud Function 实现细节之前，您需要理解 AI/ML 流程。这将为实现 Spring Cloud Function 奠定基础。\n\
    \n## 5.1 AI/ML 简明概述\n\nAI/ML 正在变得越来越流行，因为几乎所有云服务提供商都提供了相关服务。为了确保 AI/ML 正常运行，理解其背后流程非常重要。参见图\
    \ 5-1。\n\n![](img/526597_1_En_5_Fig1_HTML.jpg)\n\n机器学习生命周期流程。四个处理步骤包括：收集需求、设置\
    \ AI/ML 管道、执行 AI/ML 以及监控。\n\n图 5-1\n\n机器学习生命周期\n\n让我们深入探讨图 5-1 中所示的流程，并了解其完成的工作。\n\
    \n1. 收集需求\n    * 模型需求\n\n这是 AI/ML 流程中的重要步骤。这决定了 AI/ML 模型活动的最终成败。模型的需求必须与业务目标相匹配。\n\
    \n* 期望从该活动中获得的投资回报率（ROI）是什么？\n\n* 目标是什么？示例可能包括降低制造成本、减少设备故障或提高操作员生产力。\n\n* 需要包含在模型中的特征有哪些？\n\
    \n* 在字符识别中，可以是计算水平和垂直方向上黑色像素数量的直方图，内部孔的数量等。\n\n* 在语音识别中，可以是识别音素。\n\n* 在计算机视觉中，可以包含大量特征，如物体、边缘、形状尺寸、深度等。\n\
    \n* 部署数据的差异\n\n* 差异指的是学习算法对训练数据集的敏感性。每次尝试拟合模型时，输出参数可能会有细微变化，这将改变预测结果。在模型已部署的生产环境中，如果这些差异未及时修正，可能会产生显著影响。\n\
    \n* 数据完整性变化\n\n* 机器学习数据是动态的，需要调整以确保向模型提供正确的数据。存在三种类型的数据完整性问题——缺失值、范围违规和类型不匹配。持续监控和管理这些问题对于良好的运营机器学习非常重要。\n\
    \n* 数据漂移\n\n* 当训练数据集与生产环境中的输出数据不匹配时，就会发生数据漂移。\n\n* 概念漂移\n\n* 概念漂移是指随时间推移输入数据与输出数据之间关系的变化。例如，当您尝试预测消费者购买行为时，行为可能受您模型中未指定的因素影响。这些未在模型预测中显式使用的因素称为隐藏上下文。\n\
    \n1. 设置数据管道\n    * 数据收集\n        1. 需要整合哪些数据集\n\n2. 数据来源是什么\n\n3. 数据集是否可用\n\n\
    * 数据清洗：此活动涉及从数据集中移除不准确或噪声记录。这可能包括修正拼写和语法错误、标准化数据集、移除空字段以及删除重复数据。45%的数据科学家时间用于数据清洗（[`https://analyticsindiamag.com/data-scientists-spend-45-of-their-time-in-data-wrangling/`](https://analyticsindiamag.com/data-scientists-spend-45-of-their-time-in-data-wrangling/)）。\n"
- fmt: '

    ## Performing the AI/ML tasks


    * Feature engineering: This refers to all activities that are performed to extract
    and select features for machine learning models. This includes the use of domain
    knowledge to select and transform the most relevant variables from raw data to
    create predictive models. The goal of feature engineering is to improve the performance
    of machine learning algorithms. The success or failure of the predictive model
    is determined by feature engineering and ensure that the model will be comprehensible
    to humans.


    * Train model: In this step the machine learning algorithm is fed with sufficient
    training data to learn from. The training model dataset consists of sample output
    data and the corresponding sets of input data that influence the output. This
    is an iterative process that takes the input data through the algorithm and correlates
    it against the sample output. The result is then used to modify the model. This
    iterative process is called “model fitting” until the model precision meets the
    goals.


    * Model evaluation: This process involves using metrics to understand the model’s
    performance, including its strengths and weaknesses. For example, doing a classification
    prediction, the metrics can include true positives, true negatives, false positives,
    and false negatives. Other derived metrics can be accuracy, precision, and recall.
    Model evaluation allows you to determine how well the model is doing, the usefulness
    of the model, how additional model training will improve performance, and whether
    you should include more features.


    * Deploy model: This process involves deploying a model to a live environment.
    These models can then be exposed to other processes through the method of model
    serving. The deployment of models can involve a process of storing the models
    in a store such as `Google Cloud Storage`.


    ## Monitoring the AI/ML models


    In this process, you want to make sure that the model is working properly and
    that the model predictions are effective. The reason you need to monitor model
    is that models may degrade over time due to these factors:


    Let’s evaluate these activities from a compute perspective. This will allow us
    to determine what kind of compute elements we can assign to these processes.


    Some of the activities in this process are short lived and some are long running
    processes. For example, deploying models and accessing the deployed models is
    a short lived process. While `Train model` and `model evaluation` require both
    a manual and programmatic intervention and will take a lot of processing time.


    | AI/ML Process | Human | Compute |   |

    | --- | --- | --- | --- |

    |   |   | **`Spring Cloud Function` (Short Run)** | **Batch (Long Run)** |

    | Model requirements | Human/manual process |   |   |

    | Collect data |   | Integration triggers, data pipeline sources or sinks | `Data
    pipeline process-Transformation` |

    | Data cleaning |   | Integration triggers | `Transformation process` |

    | Data labeling |   | Tagging discrete elements-updates, deletes | `Bulk tagging`
    |

    | Feature engineering | Manual |   |   |

    | `Train model` |   | Trigger for training | `Training process` |

    | `Model evaluation` | Manual | Triggers for evaluation | `Bulk evaluation` |

    | Deploy models |   | `Model serving`, `model` | `Bulk storage` |

    | Monitoring models |   | `alerts` |   |


    AI/ML processes require varying compute and storage requirements. Depending on
    the model size, the time taken to train, the complexity of the model, and so on,
    the process may require different compute and storage at different times. So,
    the environment should be scalable. In earlier days, AI/ML activities were conducted
    with a fixed infrastructure, through over-allocated VMs, dedicated bare metal
    servers, or parallel or concurrent processing units. This made the whole process
    costly and it was left to companies with deep pockets to be able to conduct proper
    AI/ML activities.


    Today, with all the cloud providers providing some level of AI/ML activities through
    an API or SaaS approach, and with the ability to pay per use or pay as you go,
    companies small and big have begun to utilize AI/ML in their compute activities.


    `Spring Cloud Function` paradigms make it even easier to take advantage of a scalable
    platform offered by the cloud. Activities such as `model storage` and `model retrieval`
    can be done on demand with `Spring Cloud Function`. Serving pre-trained models
    is easy through `Spring Cloud Function` and these models can be made available
    to any client without the need to install client libraries. Here are some of the
    advantages of `Spring Cloud Function` in AI/ML:


    * Codeless inference makes getting started easy


    * Scalable infrastructure


    * No management of infrastructure required


    * Separate storage for the `model`, which is very convenient for tracking versions
    of the `model` and for comparing their performance


    * Cost structure allows you to pay per use


    * Ability to use different frameworks


    ### 5.1.1 Deciding Between Java and Python or Other Languages for AI/ML


    Most of the popular frameworks such as `TensorFlow` are written in Python, so
    the models’ outputs are also Python based. Therefore, it’s easy for anyone working
    on AI/ML to code in Python. See Figure [5-2](#526597_1_En_5_Chapter.xhtml#Fig2).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig2_HTML.jpg)


    A pictorial horizontal bar graph of the most popular programming languages. It
    mentions the logo of worldwide languages with percentages and a laptop image.
    Python has the highest at 25.95 and Ruby, has the lowest at 1.53.


    Figure 5-2


    AI/ML language popularity


    It is very important to understand that the popularity of a language does not
    equate to it being a good, robust, secure language for use in AI/ML.


    There are several reasons to choose Java over Python or R:


    * Enterprises have standardized on Java, so they prefer to have their AI/ML platform
    written in Java to ease the integration into existing systems.


    * `Apache.org`, the open source community for Java, is very robust and has many
    libraries and tools that have been tuned toward speed of compute, data processing,
    and so on. Tools such as `Hadoop`, `Hive`, and `Spark` are integral to the AI/ML
    process. Developers can easily use these tools and libraries in their Java code.


    * Java can be used at all touchpoints in the AI/ML process, including data collection,
    cleansing, labeling, `model training`, and so on. This way you can standardize
    on one language for AI/ML needs.


    * `JVMs` allow for applications to be portable across different machine types.


    * Due to Java’s object-oriented mechanisms and `JVMs`, it is easier to scale.


    * Java-based computation for AI/ML can be made to perform faster with some tuning
    at the algorithm and `JVM` level. Therefore, it is a preferred language for sites
    like `Twitter`, `Facebook`, and so on.


    * Java is a strong typing programming language, meaning developers must be explicit
    and specific about variables and types of data.


    * Finally, production codebases are often written in Java. If you want to build
    an enterprise-grade application, Java is the preferred language.


    Since Java is a preferred enterprise language for AI/ML, we can safely say that
    `Spring Cloud Function` is a better framework to use when developing enterprise-grade
    functions for AI/ML.


    This chapter explores the different offerings from the different cloud providers
    and explains how you can use `Spring Cloud Function` with these offerings.

