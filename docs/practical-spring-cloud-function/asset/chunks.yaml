  raw: '## 3.8 Deploying to Knative on Kubernetes


    The CI/CD for deploying Spring Cloud Function on Knative are similar for every
    Kubernetes. The only change is the cluster name. This section uses ArgoCD ([`http://argoproj.github.io`](http://argoproj.github.io))
    for CD even though you can achieve the same result with GitHub Actions. I found
    GitHub Actions a bit code-intensive. I wanted to separate the CD process and have
    a good visual tool that shows the deployment. ArgoCD provides a good visual interface.


    To have a common repository for all the cloud environments, you’ll use Docker
    hub in this example. Docker hub provides a good interface for managing images
    and it is popular with developers. If you use ECR, GCR, or ACR, you’ll experience
    vendor lock-in.


    The prerequisites for deploying to any Kubernetes platform are the same:


    *   Get the code from GitHub. You can use [`https://github.com/banup-kubeforce/payroll-h2.git`](https://github.com/banup-kubeforce/payroll-h2.git)
    or push your custom code


    *   A Dockerhub account


    *   A Dockerfile to push to Dockerhub


    *   Actions code in your GitHub project


    *   Access to a Kubernetes Cluster with Knative configured


    *   ArgoCD up and running


    *   An app in ArgoCD that is configured to poll the GitHub project


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig30_HTML.jpg)


    A flow diagram describes deployment flow for spring cloud function with Github
    actions and Argo C D. Commit code through Git pushes it to GitHub. Event-triggered
    Github actions push to docker and pull and sync to Argo. It deploys spring cloud
    function in kubernetes.


    Figure 3-30


    Deployment flow for Spring Cloud Function with GitHub Actions and ArgoCD


    Once you have the prerequisites set up, you can begin configuring an automated
    CI/CD pipeline. For this example implementation, you’ll use the code from GitHub
    at [`https://github.com/banup-kubeforce/payroll-h2.git`](https://github.com/banup-kubeforce/payroll-h2.git).


    Step 1: Spring Cloud Function code in GitHub. Push your code to GitHub. You can
    use the code for `payroll-h2` in GitHub.


    Step 2: Create a GitHub Action. Listing [3-8](#526597_1_En_3_Chapter.xhtml#PC19)
    shows the code for the action.


    ```

    name: ci

    on:

    push:

    branches:

    - ''main''

    jobs:

    docker:

    runs-on: ubuntu-latest

    steps:

    -

    name: Set up QEMU

    uses: docker/setup-qemu-action@v2

    -

    name: Set up Docker Buildx

    uses: docker/setup-buildx-action@v2

    - uses: actions/checkout@v2

    - uses: actions/setup-java@v2

    with:

    java-version: ''8''

    distribution: ''temurin''

    cache: maven

    -

    name: Login to DockerHub

    uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9

    with:

    username: ${{ secrets.DOCKERHUB_USERNAME }}

    password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker1

    id: meta

    uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38

    with:

    images: banupkubeforce/springcloudfunctions

    - name: Build with Maven

    run: mvn -B package --file pom.xml

    - name: Build and push Docker image

    uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc

    with:

    context: .

    file: ./DockerFile

    push: true

    tags: ${{ steps.meta.outputs.tags }}

    labels: ${{ steps.meta.outputs.labels }}

    Listing 3-8

    Workflow for Payroll Function Image to be Pushed to Docker Hub

    ```


    This code creates a Docker image and pushes it to the Docker hub. You can store
    the username and password as secrets in the GitHub site (see Figure [3-31](#526597_1_En_3_Chapter.xhtml#Fig31)).


    ```

    username: ${{ secrets.DOCKERHUB_USERNAME }}

    password: ${{ secrets.DOCKERHUB_TOKEN }}

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig31_HTML.png)


    A screenshot of the payroll-Kubeforce window. In settings, action is selected.
    It displays environment and repository secrets and their details.


    Figure 3-31


    GitHub Secrets store for configurations and credentials


    Step 3: Execute GitHub Actions to build and push the Docker image.


    The execution of GitHub Actions can be triggered by a push/commit. The trigger
    is defined in the GitHub Actions YAML file:


    ```

    on:

    push:

    branches:

    - ''main''

    ```'
  trans: '

    ## 3.8 在 Kubernetes 上部署到 Knative


    在 Kubernetes 上部署 Spring Cloud Function 的 CI/CD 流程对于所有平台都相似，唯一不同的是集群名称。本节使用 ArgoCD
    ([`http://argoproj.github.io`](http://argoproj.github.io)) 进行持续交付，尽管你也可以使用 GitHub
    Actions 实现相同效果。我发现 GitHub Actions 需要较多的代码配置，因此希望将 CD 流程与开发过程分离，并使用能够直观展示部署状态的工具。ArgoCD
    提供了良好的可视化界面。


    为了拥有适用于所有云环境的公共仓库，本示例将使用 Docker Hub。Docker Hub 提供了良好的镜像管理界面，并且受到开发者的广泛欢迎。如果你使用
    ECR、GCR 或 ACR，可能会面临厂商锁定的风险。


    在任何 Kubernetes 平台上部署的前提条件是相同的：


    * 从 GitHub 获取代码。你可以使用 [`https://github.com/banup-kubeforce/payroll-h2.git`](https://github.com/banup-kubeforce/payroll-h2.git)
    或推送自定义代码


    * 一个 Docker Hub 账户


    * 一个用于推送至 Docker Hub 的 Dockerfile


    * 项目中的 GitHub Actions 代码


    * 一个配置了 Knative 的 Kubernetes 集群


    * ArgoCD 已启动运行


    * ArgoCD 中配置了用于轮询 GitHub 项目的应用


    ![](img/526597_1_En_3_Fig30_HTML.jpg)


    流程图描述了使用 GitHub Actions 和 ArgoCD 部署 Spring Cloud Function 的流程。通过 Git 提交代码会推送至
    GitHub，事件触发的 GitHub Actions 会将代码推送到 Docker 并从 GitHub 拉取同步至 ArgoCD，最终在 Kubernetes
    中部署 Spring Cloud Function。


    图 3-30


    使用 GitHub Actions 和 ArgoCD 部署 Spring Cloud Function 的流程


    一旦前提条件准备就绪，你就可以开始配置自动化 CI/CD 流水线。对于本示例实现，你将使用 GitHub 上的代码 [`https://github.com/banup-kubeforce/payroll-h2.git`](https://github.com/banup-kubeforce/payroll-h2.git)。


    步骤 1：GitHub 上的 Spring Cloud Function 代码。将你的代码推送到 GitHub。你可以使用 GitHub 中的 `payroll-h2`
    代码。


    步骤 2：创建 GitHub Action。列表 3-8 显示了该操作的代码。


    ```

    name: ci

    on:

    push:

    branches:

    - ''main''

    jobs:

    docker:

    runs-on: ubuntu-latest

    steps:

    -

    name: 设置 QEMU

    uses: docker/setup-qemu-action@v2

    -

    name: 设置 Docker Buildx

    uses: docker/setup-buildx-action@v2

    - uses: actions/checkout@v2

    - uses: actions/setup-java@v2

    with:

    java-version: ''8''

    distribution: ''temurin''

    cache: maven

    -

    name: 登录 DockerHub

    uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9

    with:

    username: ${{ secrets.DOCKERHUB_USERNAME }}

    password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 提取 Docker 元数据（标签、标签）

    id: meta

    uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38

    with:

    images: banupkubeforce/springcloudfunctions

    - name: 构建并推送 Docker 镜像

    uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc

    with:

    context: .

    file: ./DockerFile

    push: true

    tags: ${{ steps.meta.outputs.tags }}

    labels: ${{ steps.meta.outputs.labels }}

    列表 3-8

    推送 Payroll 函数镜像至 Docker Hub 的工作流

    ```


    此代码会创建 Docker 镜像并推送到 Docker Hub。你可以在 GitHub 网站上将用户名和密码存储为密钥（见图 3-31）。


    ```

    username: ${{ secrets.DOCKERHUB_USERNAME }}

    password: ${{ secrets.DOCKERHUB_TOKEN }}

    ```


    ![](img/526597_1_En_3_Fig31_HTML.png)


    Payroll-Kubeforce 窗口的截图。在设置中选择操作，显示环境和仓库密钥及其详细信息。


    图 3-31


    GitHub 密钥存储用于配置和凭证管理


    步骤 3：执行 GitHub Actions 构建并推送 Docker 镜像。


    GitHub Actions 的执行可以通过推送/提交触发。触发器在 GitHub Actions 的 YAML 文件中定义：


    ```

    on:

    push:

    branches:

    - ''main''

    ```

