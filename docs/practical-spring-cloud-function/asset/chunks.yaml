    ## 3.9 总结


    在本章中，您学习了如何设置一些 CI/CD 工具以为您 Spring Cloud Function 创建自动部署。


    您还学习了如何在 Lambda、Google Cloud Functions 和 Azure Functions 上触发函数的部署。


    此外，您了解到可以将存储在 Docker hub 中的 Docker 镜像构建与 ArgoCD 结合，将镜像部署到任何运行 Knative 的 Kubernetes
    集群。


    如果您希望实现“一次编写，随处部署”，必须考虑使用 Kubernetes 和 Knative。Spring Cloud Function 实际上是一个可移植的函数。


    # 4. 使用 Spring Cloud Function 构建事件驱动的数据流水线


    Spring Cloud Function 在混合云或本地/私有云环境中发挥着关键作用。构建跨越本地数据中心和云的数据流水线会增加复杂性，因为需要处理防火墙边界。当您希望获取、移动或转换数据（无论是实时流式处理还是离线批量处理）时，数据流水线都扮演着重要角色。


    因此，什么是事件数据流水线？

