    file is selected. The push image page is created. It includes a registry, namespace,
    repository, and tag.


    Figure 2-30


    Docker push from the IntelliJ IDE


    Once the push is successful, you can navigate to Dockerhub to check for the deployment
    of the image, as shown in Figure [2-31](#526597_1_En_2_Chapter.xhtml#Fig31).


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig31_HTML.jpg)


    A screenshot of the deploy image of the docker hub. The general page contains
    spring cloud functions, docker commands, tags and scans, and automated builds.


    Figure 2-31


    Dockerhub with the deployed image


    ## Step 5: Deploy the app to Knative on EKS


    In this step, you create a YAML file and set the location of the image that you
    will deploy to Knative.


    Create the `payroll.yaml` file and set up the image to be deployed, as shown in
    Listing [2-21](#526597_1_En_2_Chapter.xhtml#PC42).


    ```

    apiVersion: service.knative.dev/v1

    kind: service

    metadata:

    name: payroll

    spec:

    template:

    spec:

    containers:

    - image: docker.io/banupkubeforce/springcloudfunctions/payrollv2

    ports:

    - containerPort: 80

    env:

    - name: TARGET

    value: "employeeconsumer"

    Listing 2-21

    The payroll.yaml File

    ```


    Deploy the app to Knative on EKS.


    Run the following command:


    ```

    $ kubectl apply -f payoll.yaml

    ```


    Alternatively, you can use a Knative CLI. More information can be found at [`https://knative.dev/docs/client/#kubectl`](https://knative.dev/docs/client/%2523kubectl).


    ```

    $ kn service create payroll –image docker.io/banupkubeforce/springcloudfunctions:payrollv2

    ```


    Figure [2-32](#526597_1_En_2_Chapter.xhtml#Fig32) shows the result of running
    the `kn cli`. A YAML execution gives you more control over the target environment.
    Note the URL, as it is required for the testing step. The URL shown here for example
    is [`https://payroll.default.13.58.221.247.sslip.io`](https://payroll.default.13.58.221.247.sslip.io).


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig32_HTML.jpg)


    A screenshot of payroll deployment logs. The run commands are route is still working
    to reflect, configuration payroll is waiting, waiting for a load balancer to be
    ready, and ready to serve.


    Figure 2-32


    Payroll is deployed successfully


    ## Step 6: Testing


    Use the URL you got in Step 5 and run the test. The URL in this case is [`https://payroll.default.13.58.221.247.sslip.io/employeeConsumer`](https://payroll.default.13.58.221.247.sslip.io/employeeConsumer)


    You can use Postman or curl to run the tests. Figure [2-33](#526597_1_En_2_Chapter.xhtml#Fig33)
    shows the Postman test results.


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig34_HTML.jpg)


    A screenshot of cluster running logs. It contains the name, location, master version,
    master IP, machine type, node version, number of nodes, and status.


    Figure 2-34


    Cluster is up and running


    ![](images/526597_1_En_2_Chapter/526597_1_En_2_Fig33_HTML.jpg)


    A screenshot of the postman page. The header tags are home, workspace, API network,
    reports, and explore. The body contains the name, employee identifier, email,
    and salary.


    Figure 2-33


    Test Is Postman with the URL

