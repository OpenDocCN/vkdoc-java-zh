    The Streams dashboard allows you to wire up a data pipeline. Click the Create
    Streams button to start the process, as shown in Figure [4-10](#526597_1_En_4_Chapter.xhtml#Fig10).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig10_HTML.jpg)


    A screenshot depicts the streams button to create a stream in the streams dashboard.


    Figure 4-10


    The Streams dashboard


    Then perform the following steps:


    1. `Pick` the source.


    This example uses a `RabbitMQ` as the source, so `Pick` `Rabbit` from the available
    options, as shown in Figure [4-11](#526597_1_En_4_Chapter.xhtml#Fig11).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig11_HTML.jpg)


    A screenshot depicts the create stream and picking the available option from the
    source.


    Figure 4-11


    Create a source


    1. `Pick` a processor.


    `Pick` the `Transform` component from the list, as shown in Figure [4-12](#526597_1_En_4_Chapter.xhtml#Fig12).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig12_HTML.jpg)


    A screenshot depicts a selection and creation of a processor for the `Transform`
    component.


    Figure 4-12


    Create a processor


    1. `Pick` a sink.


    `Pick` the `Log` component from the list, as shown in Figure [4-13](#526597_1_En_4_Chapter.xhtml#Fig13).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig13_HTML.png)


    A screenshot depicts a selection and creation of a sink for the `Log` component.


    Figure 4-13


    Create a sink


    Now you wire them by dragging from the output of the first component to the input
    of the second component, as depicted in Figure [4-14](#526597_1_En_4_Chapter.xhtml#Fig14).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig14_HTML.png)


    A screenshot depicts wiring the data pipeline by dragging the output of the first
    component to the input of the second component.


    Figure 4-14


    Wiring the data pipeline


    The next step is to configure the pipeline.


    1. `Configure` `RabbitMQ`.

