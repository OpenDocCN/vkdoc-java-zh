- fmt: "\nOn the initial run, the model you specified will be loaded:\n\n```\n\"resnet=https://tfhub.dev/tensorflow/resnet_50/classification/1\"\
    \n```\n\nOn subsequent runs, the model server will be available at port 8080 at\
    \ `http://localhost:8080`.\n\nThis example provides an image of kitten and it\
    \ will try to recognize the kitten by providing output with probabilities:\n\n\
    ```\n$curl -O https://resources.djl.ai/images/kitten.jpg\n```\n\nThis will show\
    \ the image in Figure [5-5](#526597_1_En_5_Chapter.xhtml#Fig5).\n\n![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig5_HTML.jpg)\n\
    \nA photograph of a kitten with closed eyes and legs laid out.\n\nFigure 5-5\n\
    \nImage of a kitten for the model to predict\n\nNext, run the following and you\
    \ will see the output with probabilities.\n\nYou provide the djl-`serving` instance\
    \ that is running at `http://localhost:8080/predictions` with the kitten image\
    \ that is located in the current directory, and you get a response shown in Figure\
    \ [5-6](#526597_1_En_5_Chapter.xhtml#Fig6), which shows that the image is probably\
    \ a tabby cat. The probability is 0.4107377231121063\\. This is close.\n\n![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig7_HTML.png)\n\
    \nAn X-ray image. It diagnosis the lungs using a saved model.\n\nFigure 5-7\n\n\
    Xray image provided to the saved_model\n\n![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig6_HTML.jpg)\n\
    \nA screenshot of the window. It has the class name and probability input and\
    \ outputs. It represents the D J L results.\n\nFigure 5-6\n\nDJL results for the\
    \ image\n\nNext, you see how you can use DJL to create a Spring Cloud Function\
    \ to serve models.\n\n## 5.3.2 Spring Cloud Function with DJL\n\nFor this example,\
    \ we borrow an example from DJL called pneumonia detection. This sample is available\
    \ at [`https://github.com/deepjavalibrary/djl-demo/tree/master/pneumonia-detection`](https://github.com/deepjavalibrary/djl-demo/tree/master/pneumonia-detection).\n\
    \nThis example uses an Xray image from [`https://djlai.s3.amazonaws.com/resources/images/chest_xray.jpg`](https://djlai.s3.amazonaws.com/resources/images/chest_xray.jpg).\n\
    \nIt predicts using a model from [`https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip`](https://djl-ai.s3.amazonaws.com/resources/demo/pneumonia-detection-model/saved_model.zip).\n\
    \nThe Spring Cloud Function you create will take an image, load the model, and\
