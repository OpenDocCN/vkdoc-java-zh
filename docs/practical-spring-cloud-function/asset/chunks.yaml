    import com.fasterxml.jackson.databind.ObjectMapper;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import java.time.LocalDateTime;\nimport java.util.function.Function;\npublic class\
    \ ProducerFunction implements Function {\n@Autowired\nprivate PubSubPublisher\
    \ publisher;\n@Override\npublic String apply(TrackDetail trackDetail) {\nObjectMapper\
    \ mapper = new ObjectMapper();\nString data = \"\";\ntry {\ndata = mapper.writeValueAsString(trackDetail);\n\
    MessageEntity entity = new MessageEntity(LocalDateTime.now(), data);\npublisher.publish(data);\n\
    } catch (JsonProcessingException e) {\ne.printStackTrace();\n} catch (Exception\
    \ e) {\ne.printStackTrace();\n}\nreturn \"Saved data into Kinesis successfully!\"\
    ;\n}\n}\n```\n\n## 4.5 Summary\n\nThis chapter explained how to create dataflow\
    \ and data pipelines, whether on-premises using `SCDF` or in the cloud. For the\
    \ cloud, you can use `SCDF` or cloud-native tools.\n\n`Spring Cloud Function`\
    \ is versatile and can be used in the context of data pipelines as a trigger or\
    \ as part of the flow.\n\nWith `AWS Glue` and `Google Data Flow`, you saw that\
    \ you can use `Spring Cloud Function` as a trigger for the flows. This requires\
    \ some additional coding by adding some relevant libraries and invoking the flow.\n\
    \nUpcoming chapters discuss other use cases of `Spring Cloud Function`.\n\n# 5.\
    \ AI/ML Trained Serverless Endpoints with Spring Cloud Function\n\nThis chapter\
    \ looks at how `Spring Cloud Function` can be leveraged in AI/ML. You learn about\
    \ the AI/ML process and learn where `Spring Cloud Function` fits in the process.\
    \ You also learn about some of the offerings from the cloud providers, such as\
    \ `AWS`, `Google`, and `Azure`.\n\nBefore delving into the details of `Spring\
    \ Cloud Function` implementation, you need to understand the AI/ML process. This\
    \ will set the stage for implementing `Spring Cloud Function`.\n\n## 5.1 AI/ML\
    \ in a Nutshell\n\nAI/ML is gaining popularity, as it is being offered by almost\
    \ all cloud providers. For AI/ML to work properly, it is important to understand\
    \ the process behind it. See Figure [5-1](#526597_1_En_5_Chapter.xhtml#Fig1).\n\
    \n![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig1_HTML.jpg)\n\nA process of\
    \ the ML lifecycle. The 4 processing steps are, gathering requirements, setting\
    \ AI slash ML pipeline, performing AI slash ML, and monitoring.\n\nFigure 5-1\n\
    \nML lifecycle\n\nLet’s dig deeper into the process depicted in Figure [5-1](#526597_1_En_5_Chapter.xhtml#Fig1)\
    \ and see what is accomplished.\n\n1. Gathering requirements\n    * Model requirements\n\
    \nThis is an important step in the AI/ML process. This determines the ultimate\
    \ success or failure of the AI/ML model activity. The requirements for models\
    \ must match the business objectives.\n\n* What is the return on investment (ROI)\
    \ expected from this activity?\n\n* What are the objectives? Examples may include\
    \ reduce manufacturing costs, reduce equipment failures, or improve operator productivity.\n\
    \n* What are the features that need to be included in the model?\n\n* In character\
    \ recognition, it can be histograms counting the number of black pixels along\
    \ horizontal and vertical directions, the number of internal holes, and so on.\n\
    \n* In speech recognition, it can be recognizing phonemes.\n\n* In computer vision,\
    \ it can be a lot of features such as objects, edges, shape size, depth, and so\
    \ on.\n\n* Variance in deployed data\n\nVariance refers to the sensitivity of\
    \ the learning algorithms to the training dataset. Every time you try to fit a\
    \ model, the output parameters may vary ever so slightly, which will alter the\
    \ predictions. In a production environment where the model has been deployed,\
    \ these variances may have a significant impact if they’re not corrected in time.\n\
    \n* Changes in data integrity\n\nMachine learning data is dynamic and requires\
    \ tweaking to ensure the right data is supplied to the model. There are three\
    \ types of data integrity problems—missing values, range violations, and type\
    \ mismatches. Constant monitoring and management of these types of issues is important\
    \ for a good operational ML.\n\n* Data drift\n\nData drift occurs when the training\
    \ dataset does not match the data output in production.\n\n* Concept drift\n\n\
    Concept drift is the change in relationships between input and output data over\
    \ time. For example, when you are trying to predict consumer purchasing behavior,\
    \ the behavior may be influenced by factors other than what you specified in the\
    \ model. factors that are not explicitly used in the model prediction are called\
    \ hidden contexts.\n\n1. Setting up the data pipeline\n    * Data collection\n\
    \        1. What datasets to integrate\n\n2. What are the sources\n\n3. Are the\
    \ datasets available\n\n* Data cleaning: This activity involves removing inaccurate\
    \ or noisy records from the dataset. This may include fixing spelling and syntax\
    \ errors, standardizing datasets, removing empty fields, and removing duplicate\
    \ data. 45 percent of a data scientist’s time is spent on cleaning data (`https://analyticsindiamag.com/data-scientists-spend-45-of-their-time-in-data-wrangling/`).\n\
    \n* Data labeling: Tagging or labeling raw data such as images, videos, text,\
    \ audio, and so on, is an important part of the AI/ML activity. This makes the\
    \ data meaningful and allows the machine learning model to identify a particular\
    \ class of objects. This helps a lot in the supervised learning activities such\
    \ as image classification, image segmentation, and so on.\n"
