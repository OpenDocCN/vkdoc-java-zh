    is important, as you need to deploy SAP ECC and Oracle before integrating and
    then configure API and messaging for the Spring Cloud Function to integrate with
    SAP. Spring Cloud Function can be created and tested with dummy information, but
    it needs to be deployed after integration testing with SAP ECC:


    1.  Deploy SAP ECC on the AWS EC2 instances.


    2.  Deploy Oracle DB as an RDS instance.


    3.  Configure the SAP to Oracle integration.


    4.  Deploy Spring Cloud Function to AWS.


    5.  Set up the Amazon API Gateway.


    6.  Set up Amazon SQS for messaging.


    ### 1.6.2 Spring Cloud Function on Knative and EKS on AWS


    If you want to implement a truly portable environment in AWS, you can leverage
    the AWS EKS, which is a Kubernetes platform that AWS offers. You can install Knative
    in EKS and this will give you a truly portable, serverless container that allows
    for faster deployment and improved cold starts. It uses appropriate technologies,
    such as Spring Cloud Function on GraalVMs. GraalVMs uses the AOT (Ahead of Time)
    compilation technique, which significantly improves execution times. Subsequent
    sections address GraalVMs and Spring Cloud Function. See Figure [1-12](#526597_1_En_1_Chapter.xhtml#Fig12).


