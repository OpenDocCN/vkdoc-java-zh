  trans: '

    ## 5.2 Spring 框架与 AI/ML


    在 Java 中已经开发了许多框架，可以利用 Spring 框架进行使用。这些框架中最新的由 AWS 开发，名为 DJL（Deep Java Library）。该库可以与基于
    PyTorch、TensorFlow、Apache MXNet、ONNX、Python 和 TFLite 的模型进行集成。


    您需要的重要能力之一是模型服务，可以通过 Spring Cloud Function 来提供训练好的模型服务，而 DJL 内置了这一功能。它被称为 djl-serving。


    Spring Cloud Function 在跨越本地和云环境方面具有独特能力，尤其是在 AI/ML 领域。尽管云服务已变得流行，但并非所有公司都完全迁移到云环境。事实上，大多数公司采用了混合方法。一些应用程序和数据仍然驻留在公司自有的数据中心中，或与第三方服务提供商运营的数据中心共存。围绕数据中心内数据进行的
    AI/ML 活动将需要使用能够部署在数据中心的云函数来提供训练并存储的模型服务。部署在数据中心的云函数比部署在云环境中的云函数更接近数据源，因此性能更优。这就是
    Spring Cloud Function 能够帮助在本地提供模型服务的原因。参见图 5-3。


    ![](img/526597_1_En_5_Fig3_HTML.jpg)


    本地数据中心的模型示意图。数据流包括训练好的模型数据、模型服务、企业应用、防火墙和外部应用。


    图 5-3


    模型服务的本地部署与 Spring Cloud Function 部署


    ## 5.3 使用 Spring Cloud Function 和 DJL 进行模型服务


    在探索云服务商选项之前，建议先在本地尝试。为此，您需要安装一个框架并访问良好的张量模型和图像。本示例中使用的框架称为`djl-serving`。


    ### 5.3.1 什么是 DJL？


    深度学习库（DJL） [`https://docs.djl.ai/`](https://docs.djl.ai/) 是一个高级、引擎无关的 Java 深度学习框架。它允许您连接到任何框架（如
    TensorFlow 或 PyTorch），并从 Java 进行 AI/ML 活动。


    DJL 还与 Spring Boot 有很好的集成能力，可以通过 Spring 框架轻松调用。DJL 在不同框架之间充当抽象层，使与这些框架的交互变得简单，如图
    5-4 所示。


    ![](img/526597_1_En_5_Fig4_HTML.jpg)


    深度学习库（DJL）的分层模型。包括带有 Spring Boot 标志的 Java 框架、Spring Cloud Function，以及 MXNet、TensorFlow、PyTorch
    等机器学习框架。深度学习库（DJL）在框架之间被提及。


    图 5-4


    深度学习库（DJL）的分层结构


    DJL 包含许多有用的组件，但其模型服务功能尤为引人注目。


    运行以下命令获取`djl-serving`组件。然后将文件解压到您选择的目录，并将路径设置为`~\serving-0.19.0\bin\serving.bat`。这样您就可以在机器上的任何位置执行服务。


    ```

    curl -O https://publish.djl.ai/djl-serving/serving-0.19.0.zip

    unzip serving-0.19.0.zip

    ```


    清单 5-1 展示了使用 TensorFlow 模型运行`djl-serving`的示例。

    '
