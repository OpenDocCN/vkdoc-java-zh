    ## 2.2 Setting Up Spring Cloud Function and AWS Lambda


    This section discusses deploying the code that you created into AWS Lambda.


    You have to do a little bit of tweaking to make the code compatible with Lambda.
    The tweaking is not too disruptive. Again, going back to real situations where
    you have over a thousand functions you want to move to AWS, this tweak will not
    be that significant. Of course, it depends on what cloud provider you are starting
    to create functions for. Ideally, I have seen enterprises gravitate toward Lambda,
    but there are enterprises that start with Azure or Google. In any case, making
    these functions portable across clouds requires a few code changes and some `pom.xml`
    changes.


    Prerequisites:


    *   AWS account


    *   AWS Lambda Function subscription


    *   AWS CLI (optional)


    *   Code from GitHub at [`https://github.com/banup-kubeforce/payroll-aws`](https://github.com/banup-kubeforce/payroll-aws)


    Step 1: First follow Steps 1-6 outlined in Section 2.1. The code remains the same
    for any serverless offerings from the cloud providers.


    The change introduced at the code level will be in the main Spring Boot class
    called `PayrollApplication`. You will change this:


    ```

    `SpringApplication.run`(PayrollApplication.class, args )

    ```


    to this:


    ```

    `FunctionalSpringApplication.run`(PayrollApplication.class, args)

    ```


    This process is shown in Listing [2-8](#526597_1_En_2_Chapter.xhtml#PC13).


    ```

    package com.kubeforce.payrollaws;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.cloud.function.context.FunctionalSpringApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class PayrollAwsApplication {

    public static void main(String[] args) {`SpringApplication.run`(PayrollAwsApplication.class,args);

    //`SpringApplication.run` can be used to run the function application locally.

    //Change `SpringApplication.run` to `FunctionalSpringApplication.run` when deploying
    to serverless platforms

    // such as lambda, knative, etc.

    }

    @Bean

    public EmployeeFunction employeeFunction() {

    return new EmployeeFunction();

    }

    @Bean

    public EmployeeConsumer employeeConsumer() {

    return new EmployeeConsumer();

    }

    @Bean

    public EmployeeSupplier employeeSupplier() {

    return new EmployeeSupplier();

    }

    }

    Listing 2-8

    PayrollAwsApplication.java

    ```


    The next step is to change the `pom.xml` file to add the AWS Lambda adapter.


    Step 2: Package the application into a JAR file to deploy to AWS Lambda. Figure
    [2-6](#526597_1_En_2_Chapter.xhtml#Fig6) shows how to trigger a Maven package
    run in IntelliJ. Note that `payroll-aws-0.0.1-SNAPSHOT-aws.jar` is created in
    the target folder.

