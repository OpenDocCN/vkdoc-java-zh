    ### 2.1.2 Step 2: Create the Employee Model


    The model creates the getters and setters for the ID, name, `employee identifier`,
    email, and salary.


    I created this manually, but you can generate this using the Spring JPA data model
    generator for data that resides in an RDBM such as Oracle, MYSQL, or SQL Server,
    or a document database such as MongoDB. The database support for the generation
    of code using Spring JPA depends on the adapter and can be found at [`https://docs.spring.io/spring-integration/reference/html/jpa.xhtml#jpa`](https://docs.spring.io/spring-integration/reference/html/jpa.xhtml%2523jpa).


    The model created in Listing [2-4](#526597_1_En_2_Chapter.xhtml#PC4) allows for
    CRUD operations into the `H2 Database`.


    ```

    package com.kubeforce.payroll;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    import javax.persistence.Table;

    @Entity

    @Table(name= "employee")

    public class `Employee` {

    @Id

    @GeneratedValue(generator = "UUID")

    private Long id;

    private String name;

    private int `employeeid`;

    private String email;

    private String salary;

    public `Employee`(String name, int `employeeIdentifier`, String email, String
    salary)

    {

    this.name = name;

    this.`employeeid` = `employeeIdentifier`;

    this.email = email;

    this.salary = salary;

    }

    public `Employee`() {

    }

    public String getName ()

    {

    return name;

    }

    public void setName (String name)

    {

    this.name = name;

    }

    public int getEmployeeIdentifier ()

    {

    return `employeeid`;

    }

    public void setCustomerIdentifier (int `employeeIdentifier`)

    {

    this.`employeeid` = `employeeIdentifier`;

    }

    public String getEmail ()

    {

    return email;

    }

    public void setEmail (String email)

    {

    this.email = email;

    }

    public String getSalary ()

    {

    return salary;

    }

    public void setSalary (String salary)

    {

    this.salary = salary;

    }

    public Long getId ()

    {

    return id;

    }

    public void setId (Long id)

    {

    this.id = id;

    }

    }

    Listing 2-4

    `Employee` Entity Model

    ```


    Once the model is created/generated, you can proceed with coding the `consumer`
    that will write to the database and the `supplier` that will read from the database.


    ### 2.1.3 Step 3: Write the Consumer


    In this step, you write the `consumer` that will write to the database. Here,
    you expose the function attributes such as name, `employeeIdentifier`, email,
    and salary, which enable you to pass the data to the function.


    ```

    package com.kubeforce.payroll;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.beans.factory.annotation.Autowired;

    import java.util.Map;

    import java.util.function.Consumer;

    public class `EmployeeConsumer` implements Consumer> {

    public static final Logger LOGGER = LoggerFactory.getLogger(`EmployeeConsumer`.class);

    @Autowired

    private `EmployeeRepository` `employeeRepository`;

    @Override

    public void accept (Map map)

    {

    LOGGER.info("Creating the employee", map);

    `Employee` employee = new `Employee` (map.get("name"), Integer.parseInt(map.get(

    "employeeIdentifier")), map.get("email"), map.get("salary"));

    `employeeRepository`.save(employee);

    }

    }

    Listing 2-5

    `EmployeeConsumer` Class

    ```

