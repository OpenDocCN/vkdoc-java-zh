    # Why Is It Important for Serverless Functions to be Non-Proprietary?


    Enterprises are gravitating toward a multi-cloud, hybrid-cloud approach to their
    cloud strategy. As you can see in Figure [1-2](#526597_1_En_1_Chapter.xhtml#Fig2),
    the survey of 3,000 global respondents indicated that 76 percent already work
    in a multi-cloud environment. This means they are not bound to one single cloud
    provider. The adoption of a multi-cloud strategy alleviates the risk of vendor
    lock-in.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig2_HTML.jpg)


    A circle diagram depicts the cloud strategy for all organizations. 2% single private,
    and 9% single public, 80% hybrid cloud, 7% multiple public, and 2% multiple private.


    Figure 1-2


    Multi-cloud adoption report Source: `https://info.flexera.com/CM-REPORT-State-of-the-Cloud?lead_source=Website%20Visitor&id=Blog`


    In a multi-cloud world, it is essential that enterprises subscribe to services
    that can be easily ported between clouds. This is especially important for commodity
    services.


    `FaaS`, or serverless functions, have of late become a commodity with all the
    providers having some services around `FaaS`. It is therefore imperative that
    `FaaS` containers not have proprietary code.


    Serverless functions become portable when they do not use proprietary code. Portable
    serverless functions allow for workload mobility across clouds. If, for instance,
    `AWS Lambda` functions are costly and `Azure Functions` are cheap, enterprises
    can avail the cost savings and move that `AWS Lambda` workload to `Azure Functions`
    with very little effort.


    ## 1.2 Code Portability Issues


    `AWS Lambda` code written in Java. This code was generated using the `AWS SAM`
    (Serverless Application Model) template. When observing the code, you can see
    that the `AWS`-specific library references and method calls bind the code to `AWS`.
    It is not much, but it is potent. In an enterprise, you typically have hundreds
    if not thousands of pieces of code that you must refactor if you want to move
    this type of code to another cloud provider. This is a costly affair.


    Listing 1-1. Sample Code Using the `AWS SAM` Framework


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Figa_HTML.png)


    A framework of `Amazon Web Services` serverless application model. `Package HelloWorld`.
    It describes `Amazon Web Services`-specific code and method calls that bind the
    code to `Amazon Web Services`.


    The following section explores the portability of the underlying serverless container,
    which impacts how multi-cloud migrations are conducted.


    ### 1.2.1 Serverless Container Portability Issue


    What about `Lambda`''s underlying serverless framework? Is it portable?


    If you deep dive into `AWS Lambda`, the virtualization technology used is `Firecracker`.
    `Firecracker` uses `KVM` (a kernel-based virtual machine) to create and manage
    microVMs. You can find more information on `Firecracker` at [https://aws.amazon.com/blogs/aws/firecracker-lightweight-virtualization-for-serverless-computing/](https://aws.amazon.com/blogs/aws/firecracker-lightweight-virtualization-for-serverless-computing/).


    The minimalist design principle that `Firecracker` is built on allows for fast
    startup and shutdown times. `Google Cloud Functions`, on the other hand, use `gVisor`
    and are not compatible with `Firecracker`. `gVisor` is an application kernel for
    containers. More information can be found at [https://github.com/google/gvisor](https://github.com/google/gvisor).


    `Azure Functions` take a totally different approach of using the `PaaS` offering
    app service as their base. So, you can see that the major cloud providers use
    their own frameworks for the managing functions'' containers. This makes it difficult
    for functions to move between clouds in a multi-cloud environment. This portability
    issue becomes more pronounced due to the lack of portability at the container
    level.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig3_HTML.jpg)


    A comparison table. Function codes for `Lambda` of them are `Lambda run time`,
    `sandbox`, `guest O S`. For `Google`, `gVisor`, `Host Kernel`, and `Google computes
    engine`. For `Azure`, some of them are `language runtime`, and `web jobs script
    runtime`.


    Figure 1-3


    Serverless architecture comparison


    You can see that the code and containers both differ from the provider and are
    not easily portable.


    In the discussions so far, you have seen the following issues related to `FaaS`:


    * Portability of code


    * Portability of the serverless container


    * Cold start of the serverless environment


    How do you solve these issues?


    Enter `Spring Cloud Function` and `Knative`. `Spring Cloud Function` addresses
    function code portability, and `Knative` addresses container portability.


    Information on `Spring Cloud Function` is available at [https://spring.io/projects/spring-cloud-function](https://spring.io/projects/spring-cloud-function),
    and information about `Knative` is available at [https://knative.dev/docs/](https://knative.dev/docs/).


    The following sections deep dive into each of these topics.

    '
