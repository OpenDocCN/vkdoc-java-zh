    ### 7.1.3 IBM Cloud Functions


    IBM Cloud offers serverless cloud functions that can be either scripted on the
    web-based console or deployed on `Docker` containers. If you are developing in
    Java and dotnet, you need to use the `Docker` option. Alternatively, `Knative`
    on `Kubernetes` is offered as a way to deploy `Spring Cloud Function` with `Docker`
    images. More information is available at [`https://www.ibm.com/cloud/functions`](https://www.ibm.com/cloud/functions).


    ### 7.1.4 IBM Watson IoT Platform


    This product from IBM also allows you to set up and manage connected devices.
    It has a dashboard that offers device management, MQTT support, data lifecycle
    management, and secure communication with TLS for MQTT. More information is available
    at [`https://www.ibm.com/cloud/internet-of-things`](https://www.ibm.com/cloud/internet-of-things).


    ### 7.1.5 IBM Watson IoT Platform: Message Gateway


    `IBM Message Gateway` receives the message that IoT sensors send and sends it
    to platforms such as `IBM Event Streams`.


    More information is available at [`https://www.ibm.com/docs/en/wip-mg`](https://www.ibm.com/docs/en/wip-mg).


    ### 7.1.6 IBM Event Streams


    This is based on Apache Kafka and allows for managing streaming event data coming
    from the `IBM Watson IoT platform`. More information is available at [`https://www.ibm.com/cloud/event-streams`](https://www.ibm.com/cloud/event-streams).


    ### 7.1.7 IBM Cloudant DB


    This is a fully managed distributed database that allows for storing data from
    the `IBM Watson IoT platform`. You can find more information at [`https://www.ibm.com/cloud/cloudant`](https://www.ibm.com/cloud/cloudant).


    Now you''ll see how to realize the flow shown in Figure [7-2](#526597_1_En_7_Chapter.xhtml#Fig2),
    where the IoT sensors send information to the `IBM Event Streams` through the
    message gateway. The message is then received from `IBM Event Streams` through
    a `Spring Cloud Function` and stored in `Cloudant DB`. It is suggested you explore
    the integration between sensors and the message gateway at [`https://www.ibm.com/docs/en/wip-mg/5.0.0.1?topic=os-imaserver-rpm`](https://www.ibm.com/docs/en/wip-mg/5.0.0.1%253Ftopic%253Dos-imaserver-rpm).


    ![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig2_HTML.png)


    A flow model of data sensor. The sensor sends information to the `IBM Cloud` via
    `MQTT`, `event streams`, and the `Spring Cloud Function`. Finally, it is stored
    in a database.


    Figure 7-2


    Use case for sensor data consumption flow


    Figure [7-2](#526597_1_En_7_Chapter.xhtml#Fig2) shows the flow that this example
    plans to achieve.


    The focus is on creating a `Spring Cloud Function` that receives the message published
    to a topic called `"Sensor-topic"` in `event streams` and stores it into the `Cloudant
    DB`.


