    if (kinesisProducer == null) {

    BasicAWSCredentials awsCreds = new BasicAWSCredentials("AKIAZKRBTXXLPA3V2RW5",
    "kUqeO3bJyHEGziM09ru83/yU5vulbYagqHXmM4zG");

