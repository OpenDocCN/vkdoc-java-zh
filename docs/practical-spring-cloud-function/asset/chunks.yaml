    \ template.yaml --output-template-file packaged.yaml --s3-bucket payrollbucket\n\
    \    # 运行单元测试- 指定单元测试\n    # sam deploy\n    - run: sam deploy --no-confirm-changeset\
    \ --no-fail-on-empty-changeset --stack-name payroll-aws --s3-bucket payrollbucket\
    \ --capabilities CAPABILITY_IAM --region us-east-2\n```\n\n列表 3-1\n用于在 AWS Lambda\
