  raw: '## 6.4 Spring Cloud Function on Azure IoT Edge


    Spring Cloud Function will be deployed on the Azure IoT Edge devices. Azure IoT
    Edge allows for deployment of containerized functions. More information can be
    found `at` [`https://learn.microsoft.com/en-us/azure/iot-edge/tutorial-deploy-function?view=iotedge-1.4`](https://learn.microsoft.com/en-us/azure/iot-edge/tutorial-deploy-function%253Fview%253Diotedge-1.4).


    Figure [6-6](#526597_1_En_6_Chapter.xhtml#Fig6) shows this solution.


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig6_HTML.png)


    A flow diagram has 2 modules. In the automotive assembly plant module, sensors
    send data to azure I o T edge device by T C P I P. The data is then sent via the
    plant firewall, to the azure cloud module, which has components, azure I o T hub,
    spring cloud function azure functions environment, and azure blob store.


    Figure 6-6


    Manufacturing plant processing using Azure and Spring Cloud Function


    Let’s implement this solution.


    Prerequisites:


    *   VS Studio Code configured for Spring Boot, as this has a very good integration
    with Azure IoT


    *   Azure Container Registry to store your containerized Spring Cloud Function


    *   Code from GitHub at [`https://github.com/banup-kubeforce/AzureIoTSimulator.git`](https://github.com/banup-kubeforce/AzureIoTSimulator.git)


    *   Azure IoTEdge and Azure IoTHub set up and configured


    Step 1: Install an Azure IoT Edge device. You can follow the instructions at [`https://docs.microsoft.com/en-us/azure/iot-edge/quickstart-linux?view=iotedge-2020-11`](https://docs.microsoft.com/en-us/azure/iot-edge/quickstart-linux%253Fview%253Diotedge-2020-11)
    to enable either a Windows or Linux device.


    Step 2: Connect the device to Azure IoT. Since you cannot deploy the Azure Stack
    hub, it is best to use an Azure IoT hub on the web.


    You can enable it on the Azure Portal. More information on how to configure your
    edge devices to connect to the IoT hub is available at [`https://docs.microsoft.com/en-us/azure/iot-edge/quickstart-linux?view=iotedge-2020-11`](https://docs.microsoft.com/en-us/azure/iot-edge/quickstart-linux%253Fview%253Diotedge-2020-11).


    You also have to register your device on the hub. See Figure [6-7](#526597_1_En_6_Chapter.xhtml#Fig7).


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig7_HTML.jpg)


    A screenshot of a Microsoft azure portal. The I o T hub subscription page is selected.
    The management tab has headings, scale tier and units, and role-based access control
    with options under them. Other tabs on top are basics, networking, tags, and review
    plus create.


    Figure 6-7


    IoT hub subscription in Azure Portal


    Here is an example command line:


    ```

    az iot hub device-identity create --device-id myEdgeDevice --edge-enabled --hub-name
    {hub_name}

    az iot hub device-identity connection-string show --device-id myEdgeDevice --hub-name
    {hub_name}

    ```


    Step 3: Create a Spring Cloud Function and deploy it on Azure IoT Edge.


    This code is available at [`https://github.com/banup-kubeforce/AzureIoTSimulator.git`](https://github.com/banup-kubeforce/AzureIoTSimulator.git).


    You can create a Spring Cloud Function that sends information from the edge device
    to the IoT hub. Make sure you have the connection string that you created in Step
    1.


    Dependencies:


    ```

    com.microsoft.azure.sdk.iot

    iot-device-client

    2.1.1


    ```


    Write the code to connect to the IoT hub. The `iot.connection.string` variable
    is where you store the connection string you got in Step 1.


    ```

    import com.microsoft.azure.sdk.iot.device.DeviceClient;

    import com.microsoft.azure.sdk.iot.device.IotHubClientProtocol;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import java.net.URISyntaxException;

    @Configuration

    public class IOTConfiguration {

    @Bean

    public DeviceClient deviceClient(@Value("${iot.connection.string}") String connString)
    throws URISyntaxException {

    return new DeviceClient(connString, IotHubClientProtocol.HTTPS);

    }

    }

    ```


    Create a payload entity to construct the message:


    ```

    package com.kubeforce.azureiotsimulator;

    import java.time.LocalDateTime;

    public class PayloadEntity {

    private final LocalDateTime timestamp;

    private final String message;

    public PayloadEntity(LocalDateTime timestamp, String message) {

    this.timestamp = timestamp;

    this.message = message;

    }

    public LocalDateTime getTimestamp() {

    return timestamp;

    }

    public String getMessage() {

    return message;

    }

    }

    ```


    Create the function to send the message:


    ```

    package com.kubeforce.azureiotsimulator;

    import com.microsoft.azure.sdk.iot.device.DeviceClient;

    import com.microsoft.azure.sdk.iot.device.Message;

    import com.microsoft.azure.sdk.iot.device.MessageSentCallback;

    import com.microsoft.azure.sdk.iot.device.exceptions.IotHubClientException;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.beans.factory.annotation.Autowired;

    import java.lang.invoke.MethodHandles;

    import java.util.function.Function;

    public class SendtoIoTFunction implements Function {

    public static final Logger LOGGER = LoggerFactory.getLogger(MethodHandles.lookup().lookupClass());

    @Autowired

    private DeviceClient deviceClient;

    Message message=null;

    @Override

    public String apply(PayloadEntity payloadEntity) {

    try {

    deviceClient.open(false);

    deviceClient.sendEventAsync(message, new MessageSentCallback() {

    @Override

    public void onMessageSent(Message message, IotHubClientException e, Object o)
    {

    LOGGER.info("IOT Response || STATUS CODE || {}",message.toString());

    }

    }, null);

    deviceClient.close();

    } catch (IotHubClientException e) {

    throw new RuntimeException(e);

    }

    return null;

    }

    }

    ```


    Step 4: Deploy the function into Azure Function on the edge devices.


    You will have to containerize the function as discussed in Chapter [2](#526597_1_En_2_Chapter.xhtml).
    Instead of pushing to Dockerhub, you have to push it to Azure Container Registry.
    Information on Azure Container Registry is available at [`https://azure.microsoft.com/en-us/products/container-registry/`](https://azure.microsoft.com/en-us/products/container-registry/).


