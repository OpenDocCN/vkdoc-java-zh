    ### 6.1.2 An Argument for Serverless Functions On-Premises


    Since the sensors send data in intervals, it is best to have the input handled
    by a `cloud function` rather than dedicated `microservices`. Dedicated `microservices`
    need to be served up in an environment and do not have the ability to scale down
    to zero when invoked. They can only be provisioned in environments that need to
    be available when invoked. This makes `microservices` a costly approach. `Functions`,
    on the other hand, are only invoked when there is an event trigger. Utilization
    of resources goes down to zero if they are not invoked. This is because the underlying
    serverless infrastructure such as `Lambda` and `Knative` can be scaled down to
    zero when not invoked.


    This makes it a more cost-effective alternative. This applies to both on-premises
    and on the cloud. If it is on-premises, the argument against `cloud functions`
    on a serverless environment would be that the infrastructure cost has already
    been accounted for. Therefore, a dedicated `microservice` that is always on would
    be feasible. Wasting resources because you have them is not a prudent way to efficiently
    use IT. With `functions` running on serverless environments, such as `Knative`
    running on `OpenShift` or `VMware Tanzu`, on-premises would help save resources
    that could be used to run other activities. The on-premise resources are finite,
    so it''s prudent to make the best use of them.


    ## 6.2 Spring Cloud Function on the Cloud with AWS IoT


    Consider a use case where an automotive assembly plant wants to ensure that its
    robots are performing well. The engineers want to ensure that each of the robot''s
    data is monitored for any anomalies and, in an event of a breakdown, the engineers
    are alerted. The assembly plant is firewalled and any data that needs to be analyzed
    can be sent to the cloud.


    The solution is a hybrid cloud environment that isolates the assembly plant floor
    but connects to the cloud to send data from the plant floor. Figure [6-3](#526597_1_En_6_Chapter.xhtml#Fig3)
    shows a solution that is implemented with `AWS` products that can be deployed
    on-premises and connect to the cloud to synchronize the data with the rest of
    the systems involved in decision-making.


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig3_HTML.png)


    A flow diagram has 2 modules with 3 steps. Step 1, in the automotive assembly
    plant module, sensors send data to `spring cloud components` on-premises, `AWS
    Lambda` and `AWS IoT Greengrass`. Step 2, In `AWS cloud` module `AWS IoT Core`
    receives data from the plant module through a firewall and sends it to `Lambda`.
    Step 3, data from `Lambda` is stored in `AWS`''s `Simple Storage Service`, `S3`.


    Figure 6-3


    Manufacturing plant process flow with `AWS` and `Spring Cloud Function`


    Solution components:


    * `AWS IoT Greengrass` on-premises


    * Prebuilt `AWS Lambda` functions that capture the sensor data


    * `AWS IoT Core` on cloud


    * `Spring Cloud Function` running on `AWS Lambda`


    * `S3` storage to store the data


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Figa_HTML.png)


    A table of 5 rows and 2 columns. It describes components and their description.
    Components are `AWS IoT Greengrass` on-premises, prebuilt `AWS Lambda` functions
    that capture the sensor data, `AWS IoT Core` on a cloud, `Spring Cloud Function`
    running on `AWS Lambda`, and `AWS S3`.


    You can build the solution using `AWS IoT Greengrass` and leverage a `Spring Cloud
    Function` that is deployed on `Lambda`. The point of this exercise is to understand
    the capabilities of `Spring Cloud Function` as a component that is integral to
    the solution.


    The `AWS IoT Greengrass` implementation extends `AWS Cloud` to on-premises. You
    can run `Lambda` functions on `Greengrass`''s edge.


    Step 1: Install `AWS IoT Greengrass`. Install `AWS IoT Greengrass` on a device
    ([`https://docs.aws.amazon.com/greengrass/v1/developerguide/install-ggc.xhtml`](https://docs.aws.amazon.com/greengrass/v1/developerguide/install-ggc.xhtml)).
    To test it, I installed the software on `Windows`. I used the tutorial at [`https://aws.amazon.com/blogs/iot/aws-iot-greengrass-now-supports-the-windows-operating-system/`](https://aws.amazon.com/blogs/iot/aws-iot-greengrass-now-supports-the-windows-operating-system/)
    to get my first `Greengrass` implementation.


    Once you have `AWS IoT` up and running, you need to create a function to connect
    to devices and collect data. Let’s create a sample function.


    Step 2: `Spring Cloud Function` to publish an `MQTT` message. You can clone the
    project from GitHub at [`https://github.com/banup-kubeforce/AWSIots3-V2.git`](https://github.com/banup-kubeforce/AWSIots3-V2.git).


    Devices communicate with `MQTT`, so you need to leverage `MQTT` as a protocol.
    Create a `Spring Cloud Function` that publishes an `MQTT` message and create a
    consumer function to call `MQTT` publish.


    This consumer will publish data using the `MqttPublish` class and will be the
    function that is exposed by `Lambda`; see Listing [6-1](#526597_1_En_6_Chapter.xhtml#PC1).

    '
