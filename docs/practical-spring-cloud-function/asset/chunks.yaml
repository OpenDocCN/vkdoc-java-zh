    ## 3.6 部署到 GCP 云函数


    使用 GitHub Actions 将代码部署到 GCP 云函数有点侵入性，因为您需要在 resources 文件夹中添加一个 `MANIFEST.MF`
    文件。请查看 GitHub 中的代码。


    前提条件：


