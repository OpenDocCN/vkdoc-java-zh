  raw: '# 3. CI/CD with Spring Cloud Function


    As you learned in Chapter [2](#526597_1_En_2_Chapter.xhtml), you can build a Spring
    Cloud Function and deploy it to multiple environments. You can use various manual
    methods such as Azure-Function:Deploy, Gcloud CLI, AWS CLI, Kubectl, and Knative
    CLI. These manual approaches are not sustainable in an enterprise with many different
    teams, a lot of programmers, and a lot of code. It will be a management nightmare
    if every team member uses their own method to build and deploy code. Also, as
    you can see, this process is repeatable. Since it is a repeatable process, there
    is a chance to leverage automation.


    This chapter explores ways to automate the deployment process. It leverages some
    popular approaches for automating your deploys. It explores GitHub Actions for
    deploying Lambda, Google Cloud Functions, and Azure Functions and you will integrate
    with ArgoCD to push to a Kubernetes/Knative environment. While you can use GitHub
    Actions alone for all environments, that would require custom scripting to push
    to Kubernetes. ArgoCD has built-in hooks to deploy to Kubernetes, which is the
    preferred way. More information on GitHub Actions can be found at [`https://github.com/features/actions`](https://github.com/features/actions),
    and information on ArgoCD can be found at [`https://argoproj.github.io/cd/`](https://argoproj.github.io/cd/).


    Let’s dig a bit deeper into GitHub Actions and ArgoCD.


    ## 3.1 GitHub Actions


    This is a CI/CD platform tightly integrated with GitHub; it allows you to create
    and trigger workflows from GitHub. So, if you are a fan of GitHub, you will really
    like this new feature. When you sign up for GitHub, GitHub Actions will automatically
    be integrated into your project, so you do not have to use a separate tool like
    Jenkins or Circle CI. Of course, this means that you are restricted to GitHub
    as your code repository. Creating a workflow is quite straightforward. You can
    create a workflow directly on the GitHub website by navigating to your project
    and clicking the New Workflow button in the Actions tab, as shown in the Figure
    [3-1](#526597_1_En_3_Chapter.xhtml#Fig1).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig1_HTML.jpg)


    A screenshot of the banup-kubeforce window. Tab action is selected. It describes
    all workflows. It contains runs from all workflows, events, statuses, brands,
    and actors.


    Figure 3-1


    Creating a new GitHub Actions workflow


    Upon clicking New Workflow, as shown in Figure [3-2](#526597_1_En_3_Chapter.xhtml#Fig2),
    you will be taken to the workflow “marketplace,” where you can choose from the
    suggested flows or set up a workflow yourself. Click the Set Up a Workflow Yourself
    link to start creating a custom workflow.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig2_HTML.png)


    A screenshot of the banup-kubeforce window. Tab actions is selected which displays
    a message to choose a workflow.


    Figure 3-2


    Workflow marketplace to choose your workflow setup


    The Set Up a Workflow Yourself window, as shown in Figure [3-3](#526597_1_En_3_Chapter.xhtml#Fig3),
    will take you to the page where you can write the script to create your workflow.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig3_HTML.png)


    A screenshot of a banup-kubeforce window. Tab code is selected. Code is present
    on the left side of the window. The right side of the window contains feature
    actions under the tab marketplace. The featured actions are upload a build artifact
    and set up Java J D K.


    Figure 3-3


    Workflow page to create custom workflows


    As you can see in Figure [3-3](#526597_1_En_3_Chapter.xhtml#Fig3), the workflow
    points to a `main.yaml` file that is created in the `./github/workflows` directory
    under your root project folder. You can also create the same file in your IDE
    and it will show up under the Actions tab once you commit the code. Listing [3-1](#526597_1_En_3_Chapter.xhtml#PC1)
    shows the sample code created for AWS Lambda.


    ```

    name: CI

    on:

    push:

    branches: [ "master" ]

    jobs:

    build-deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v2

    - uses: actions/setup-java@v2

    with:

    java-version: ''8''

    distribution: ''temurin''

    cache: maven

    - uses: aws-actions/setup-sam@v1

    - uses: aws-actions/configure-aws-credentials@v1

    with:

    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    aws-region: us-east-2

    - name: Build with Maven

    run: mvn -B package --file pom.xml

    # sam package

    - run: sam package --template-file template.yaml --output-template-file packaged.yaml
    --s3-bucket payrollbucket

    # Run Unit tests- Specify unit tests here

    # sam deploy

    - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name
    payroll-aws --s3-bucket payrollbucket --capabilities CAPABILITY_IAM --region us-east-2

    Listing 3-1

    Workflow for Payroll Function to be Deployed on AWS Lambda

    ```


    Let’s dive deep into the components of the YAML file.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig4_HTML.png)


    A screenshot of workflow code elaboration. It contains name, on-push, jobs, runs-on
    ubuntu-latest, steps, uses, and run along with its details.


    Figure 3-4


    Work flow code elaboration


    This sets up the GitHub Actions workflow and the triggers. Now, every time you
    commit or push code to this project repository in GitHub, this workflow will execute.
    Figure [3-5](#526597_1_En_3_Chapter.xhtml#Fig5) shows a sample execution of this
    workflow.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig5_HTML.png)


    A screenshot of chapter 3 S C F plus Lambda. Build-deploy is selected under jobs.
    Build-deploy window contains set up job, run action, run a w s-actions, build
    with Maven, run Sam package and deploy, post run a w s, etc.


    Figure 3-5


    A successful execution of the workflow'
  trans: "\n# 3. 使用 Spring Cloud Function 进行 CI/CD\n\n正如你在第 2 章所学到的，你可以构建一个 Spring\
