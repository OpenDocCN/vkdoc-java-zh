    are alerted. The assembly plant is firewalled and any data that needs to be analyzed
    can be sent to the cloud.


    The solution is a hybrid cloud environment that isolates the assembly plant floor
    but connects to the cloud to send data from the plant floor. Figure [6-3](#526597_1_En_6_Chapter.xhtml#Fig3)
    shows a solution that is implemented with AWS products that can be deployed on-premises
    and connect to the cloud to synchronize the data with the rest of the systems
    involved in decision-making.


