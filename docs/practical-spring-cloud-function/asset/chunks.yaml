    \ Watson Assistant 与您的函数进行通信，您可以使用此功能在 Watson Assistant 中配置自定义扩展。\n\n步骤 2：配置 Watson\
    \ Assistant。\n\n1.  定义聊天机器人的范围：\n    1.  示例用例\n        1.  告诉用户有哪些 Apple 产品可供选择。\n\
