    ## 6.5 Spring Cloud Function On-Premises with IoT Gateway on a SaaS Provider (SmartSense)


    Enterprises that do not want to use any of the cloud provider’s IoT components
    can offload the collection of sensor data to third-party companies. These third-party
    companies can then send the data as streams or a batch to systems that are hosted
    within the enterprise''s datacenter.


    Figure [6-9](#526597_1_En_6_Chapter.xhtml#Fig9) shows the implementation without
    using a hyperscaler like `Azure` or `AWS`.


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig9_HTML.png)


    An illustrated diagram. The fleet management sends `GPS` and vehicle information
    via a cell tower to a third-party cloud `IoT` gateway. The gateway triggers a
    `Spring Cloud Function` to send data to the `Kubernetes` platform, which is either
    on `OpenShift` or `VMware Tanzu`.


    Figure 6-9


    Fleet management example


    For this use case, a company wants to manage its fleet of vehicles and provide
    data to its consumers about the vehicle''s health, location, maintenance, repair
    info, driver info, and so on, to enable visibility of its fleet and cargo. The
    vehicle data needs to be collected and processed in its own datacenter. See Table
    [6-1](#526597_1_En_6_Chapter.xhtml#Tab1).


    Table 7-1


    Components for an Example Solution


    | Sensor | The Preferred Sensor |

    | --- | --- |

    | IoT Gateway | Your preferred gateway product |

    | `IBM Cloud Functions` | [`https://cloud.ibm.com/functions/`](https://cloud.ibm.com/functions/)
    |

    | `IBM Watson IoT Platform` | [`https://www.ibm.com/cloud/watson-iot-platform`](https://www.ibm.com/cloud/watson-iot-platform)
    |

    | `IBM Watson IoT Platform – Message Gateway` | [`https://www.ibm.com/docs/en/wip-mg`](https://www.ibm.com/docs/en/wip-mg)
    |

    | `IBM Event Streams` | [`https://www.ibm.com/cloud/event-streams`](https://www.ibm.com/cloud/event-streams)
    |

    | `IBM Cloudant DB` | [`https://www.ibm.com/cloud/cloudant`](https://www.ibm.com/cloud/cloudant)
    |


    ### 7.1.1 Sensors


    There are multiple parameters that need to be measured and tracked when monitoring
    the health of a pipeline. This data can be categorized into asset and external
    data.


    Asset data can include pressure, flow rate, wall thickness, and cracks. External
    data can include temperature, humidity, pH levels, and soil resistivity. Smart
    sensors can be installed along the length of the pipeline to transmit information
    to a nearby `IoT` gateway.


    ### 7.1.2 IoT Gateway


    These devices act as sensor data aggregators and send the acquired data to receiving
    systems like the `Watson IoT` platform. They also allow the `Watson IoT` platform
    to connect and manage sensor devices. There are many cloud-ready gateways in the
    market.


    These cloud-ready gateways allow for connectivity to different cloud platforms,
    including `Azure`, `AWS`, the `Watson IoT` platform, and so on.


    ## 6.6 Summary


    As you learned in this chapter, you can build IoT-based solutions using `Spring
    Cloud Function`, both in an on-premises environment, and as well as in `AWS` and
    `Azure`.


    `Spring Cloud Function` is one of the most versatile frameworks in the Java world.
    It can be deployed on proprietary cloud-based serverless environments and on `Knative`,
    making it a very portable component.


    Whether it is a manufacturing plant walled off from the public Internet or on
    the road with fleet management, you can build secure and reliable solutions with
    `Spring Cloud Function`.


    # 7. Industry-Specific Examples with Spring Cloud Function


    This chapter explores some of the industry-specific implementations of `Spring
    Cloud Function`.


    It leverages the IBM Cloud offering to demonstrate that `Spring Cloud Function`
    is supported on any cloud offering.


    Some of the examples in this chapter are real-world scenarios in which functions
    play a critical role. For example, a function that sends alarms about pipeline
    leaks and a chat function that helps customers solve problems.


    ## 7.1 Oil/Natural Gas Pipeline Tracking with Spring Cloud Function and IoT


    This section looks at how `Spring Cloud Function` can be used in the context of
    natural gas pipelines.


    Miles and miles of gas pipelines need to be constantly monitored for leaks, cracks,
    temperature fluctuations, and pressure issues in order to avoid costly breakdowns
    in the transmission of gas and to avoid explosions.


    This solution leverages IBM Cloud and its IoT platform offerings along with smart
    gateways to capture sensor data and provide analysis and visualizations. You''ll
    see how to deploy `Spring Cloud Function` and integrate it with IBM Event streams
    to store the streaming data into IBM Cloudant DB. See Figure [7-1](#526597_1_En_7_Chapter.xhtml#Fig1).


    ![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig1_HTML.png)


    A schema of implementation of gas pipeline. It includes a Gas pipeline, sensors,
    `IoT` gateway, `cellular` network, `MQTT`, and a monitoring dashboard.


    Figure 7-1


    Gas pipeline IoT implementation


    The required components are outlined in Table [7-1](#526597_1_En_7_Chapter.xhtml#Tab1).

    '
  raw: '## 6.5 Spring Cloud Function On-Premises with IoT Gateway on a SaaS Provider
    (SmartSense)


    Enterprises that do not want to use any of the cloud provider’s IoT components
    can offload the collection of sensor data to third-party companies. These third-party
    companies can then send the data as streams or a batch it to systems that are
    hosted within the enterprise''s datacenter.


    Figure [6-9](#526597_1_En_6_Chapter.xhtml#Fig9) shows the implementation without
    using a hyperscaler like Azure or AWS.


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig9_HTML.png)


    An illustrated diagram. The fleet management sends G P S and vehicle Information
    via a cell tower to a third-party cloud I o T gateway. The gateway triggers a
    spring cloud function to send data to the Kubernetes platform, which is either
    on OpenShift or V M ware Tanzu.


    Figure 6-9


    Fleet management example


    For this use case, a company wants to manage its fleet of vehicles and provide
    data to its consumers about the vehicle''s health, location, maintenance, repair
    info, driver info, and so on, to enable visibility of its fleet and cargo. The
    vehicle data needs to be collected and processed in its own datacenter. See Table
    [6-1](#526597_1_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    Components Description


    | -![](images/526597_1_En_6_Chapter/526597_1_En_6_Figb_HTML.gif)A table with 5
    rows and 2 columns. The column headers are components and descriptions. Components
    are the third-party I o T gateway providers, Kubernetes platform on-premises,
    spring cloud data flow, spring cloud functions on knative, and S 3 bucket hosted
    in the data center. |


    Solution:


    *   Third-party IoT gateway providers such as Michelin, Erickson, Samsara, and
    so on


    *   Kubernetes platform on-premises such as OpenShift or VMware Tanzu


    *   Spring Cloud Data Flow


    *   S3 bucket hosted in the datacenter, like Minio or Ceph


    *   Spring Cloud Function on Knative


    Step 1: Contact your third-party provider to get the information about their IoT
    hub. Since the work of acquiring the sensor data is offloaded to third-party providers,
    you can assume that data will be accumulated and routed to the third-party cloud
    from the vehicles.


    Once the data is accumulated at the third-party gateway, it gets routed to the
    company''s datacenter via an invocation of a function.


    Step 2: Set up Spring Cloud Data Flow in your environment.


    *   Install Spring Cloud Data Flow in a Kubernetes environment like OpenShift
    or VMware Tanzu


    *   Create a Spring Cloud Data Flow data pipeline.


    Installation of Spring Cloud Data Flow is discussed in Chapter [4](#526597_1_En_4_Chapter.xhtml).


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig10_HTML.png)


    A screenshot of a spring cloud data flow window. The streams tab is selected.
    Create stream is the page header. A search option is next to a data pipeline with
    blocks rabbit, transform, and s 3\. The cancel and create stream buttons are below.


    Figure 6-10


    Spring Cloud Data Flow


    This example uses RabbitMQ as the source and S3 Minio/Ceph as the sink.


    Step 3: Publish to RabbitMQ. See Chapter [4](#526597_1_En_4_Chapter.xhtml) for
    details of publishing to RabbitMQ.


    Step 4: Deploy the Spring Cloud Function on Knative, as you did in Chapter [2](#526597_1_En_2_Chapter.xhtml),
    and expose a public endpoint for the IoT gateway to connect.


    This completes the implementation of an on-premises solution that uses a third-party
    IoT gateway. You can leverage the serverless environment, just like AWS Lambda
    or Azure Functions. Knative on Kubernetes provides that serverless environment
    to run the Spring Cloud Function.


    You leveraged Spring Cloud Data Flow as the data pipeline to collect and process
    the sensor data.


    More information on the project is available at [`https://github.com/banup-kubeforce/onpremIoT.git`](https://github.com/banup-kubeforce/onpremIoT.git).


    ## 6.6 Summary


    As you learned in this chapter, you can build IoT-based solutions using Spring
    Cloud Function, both in an on-premises environment, and as well as in AWS and
    Azure.


    Spring Cloud Function is one of the most versatile frameworks in the Java world.
    It can be deployed on proprietary cloud-based serverless environments and on Knative,
    making it a very portable component.


    Whether it is a manufacturing plant walled off from the public Internet or on
    the road with fleet management, you can build secure and reliable solutions with
    Spring Cloud Function.


    # 7. Industry-Specific Examples with Spring Cloud Function


    This chapter explores some of the industry-specific implementations of Spring
    Cloud Function.


    It leverages the IBM Cloud offering to demonstrate that Spring Cloud Function
    is supported on any cloud offering.


    Some of the examples in this chapter are real-world scenarios in which functions
    play a critical role. For example, a function that sends alarms about pipeline
    leaks and a chat function that helps customers solve problems.


    ## 7.1 Oil/Natural Gas Pipeline Tracking with Spring Cloud Function and IOT


    This section looks at how Spring Cloud Function can be used in the context of
    natural gas pipelines.


    Miles and miles of gas pipelines need to be constantly monitored for leaks, cracks,
    temperature fluctuations, and pressure issues in order to avoid costly breakdowns
    in the transmission of gas and to avoid explosions.


    This solution leverages IBM Cloud and its IoT platform offerings along with smart
    gateways to capture sensor data and provide analysis and visualizations. You''ll
    see how to deploy Spring Cloud Function and integrate it with IBM Event streams
    to store the streaming data into IBM Cloudant DB. See Figure [7-1](#526597_1_En_7_Chapter.xhtml#Fig1).


    ![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig1_HTML.png)


    A schema of implementation of gas pipeline. It includes a Gas pipeline, sensors,
    I o T gateway, cellular network, M Q T T, and a monitoring dashboard.


    Figure 7-1


    Gas pipeline IoT implementation


    The required components are outlined in Table [7-1](#526597_1_En_7_Chapter.xhtml#Tab1).


    Table 7-1


    Components for an Example Solution


    | Sensor | The Preferred Sensor |

    | --- | --- |

    | IoT Gateway | Your preferred gateway product |

    | IBM Cloud Functions | [`https://cloud.ibm.com/functions/`](https://cloud.ibm.com/functions/)
    |

    | IBM Watson IoT Platform | [`https://www.ibm.com/cloud/watson-iot-platform`](https://www.ibm.com/cloud/watson-iot-platform)
    |

    | IBM Watson IoT Platform – Message Gateway | [`https://www.ibm.com/docs/en/wip-mg`](https://www.ibm.com/docs/en/wip-mg)
    |

    | IBM Event Streams | [`https://www.ibm.com/cloud/event-streams`](https://www.ibm.com/cloud/event-streams)
    |

    | IBM Cloudant DB | [`https://www.ibm.com/cloud/cloudant`](https://www.ibm.com/cloud/cloudant)
    |


    ### 7.1.1 Sensors


    There are multiple parameters that need to be measured and tracked when monitoring
    the health of a pipeline. This data can be categorized into asset and external
    data.


    Asset data can include pressure, flow rate, wall thickness, and cracks. External
    data can include temperature, humidity, pH levels, and soil resistivity. Smart
    sensors can be installed along the length of the pipeline to transmit information
    to a nearby IoT gateway.


    ### 7.1.2 IoT Gateway


    These devices act as sensor data aggregators and send the acquired data to receiving
    systems like the Watson IoT platform. They also allow the Watson IoT platform
    to connect and manage sensor devices. There are many cloud-ready gateways in the
    market.


    These cloud-ready gateways allow for connectivity to different cloud platforms,
    including Azure, AWS, the Watson IoT platform, and so on.'
