    ### 5.4.1 TensorFlow


    TensorFlow 是由 Google 开发的开源机器学习平台。它是表达和执行机器学习算法的接口。TensorFlow 的美妙之处在于，用 TensorFlow
    表达的模型可以几乎无需修改地在移动设备、笔记本电脑或配备多个 GPU 和 CPU 的大规模系统上运行。TensorFlow 具有高度灵活性，能够表达大量算法，包括深度神经网络的训练和推理算法、语音识别、机器人技术、药物发现等。


    在图 5-9 中，你可以看到 TensorFlow 可以部署到多个平台，并支持多种语言接口。不幸的是，TensorFlow 是用 Python 编写的，因此大多数模型都是用
    Python 编写和部署的。这对采用 Java 标准化的企业来说提出了独特的挑战。


    尽管 TensorFlow 是用 Python 编写的，但仍有大量基于 Java 的框架可以与保存的模型配合使用。


    让我们看看如何在 Google Cloud 平台上使用 TensorFlow。


    Google Cloud 提供了多种处理模型的方式。你可以使用基于容器或 Kubernetes 的方法、基于 SaaS 的方法，或基于 Cloud Functions
    的方法。每种方法都有其优缺点。Google 发布了一篇优秀的指南，帮助你根据需求选择合适的平台，如表 5-2 所示。


    表 5-2


    Google 和 AI/ML 环境^(²)


