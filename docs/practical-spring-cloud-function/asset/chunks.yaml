    ### 1.6.8 Spring Cloud Function on Red Hat OpenShift (OCP)


    Red Hat OpenShift can be an on-premises option for deploying Spring Cloud Function.
    As in any Kubernetes implementation, it requires an implementation of Knative
    to run the functions. OpenShift has its own serverless implementation, called
    OpenShift serverless. Transforming the payroll application to OpenShift requires
    an OpenShift cluster.


    To deploy the payroll system to OpenShift hosted on a VMware vSphere environment,
    follow the outlined process. First ensure that the SAP ECC and Oracle DB are up
    and integrated before developing and deploying Spring Cloud Function on Knative:


    1. Deploy SAP ECC as a Docker image onto OpenShift cluster.

    2. Deploy an Oracle DB as a Docker image onto the OpenShift cluster.

    3. Configure the SAP to Oracle integration.

    4. Configure an OpenShift cluster with Knative.

    5. Deploy Spring Cloud Function onto Knative.

    6. Set up a Red Hat 3scale API Gateway on OpenShift.

    7. Set up RabbitMQ on `TKG` for messaging.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig19_HTML.jpg)


    An architecture diagram describes an Oracle on Docker plus OpenShift of employee
    details flows to validation to compute salary. It flows through the RabbitMQ to
    the OpenShift serverless plus Spring Cloud Function.


    Figure 1-19


    Spring Cloud Function on Red Hat OpenShift


    ## 1.7 Summary


    This chapter discussed FaaS environments, Spring Cloud Function, and Knative.
    You saw that FaaS containers/environments provided by AWS, Google, or Microsoft
    Azure are not portable, as the underlying components that host the FaaS environment
    do not have the same architecture, which makes it difficult to move or migrate
    FaaS containers between cloud providers. You also saw that Spring Cloud Function
    can abstract the dependent AWS and Google libraries and provide a portable alternative.
    Spring Cloud Function on Knative can improve developer productivity by "writing
    once and deploying anywhere." You saw how to apply Spring Cloud Function and Knative
    to an enterprise payroll application and learned about the various implementation
    approaches. The next chapter walks through the deployments step-by-step. You will
    also see how to develop and deploy code to various targets, such as AWS, GCP,
    Azure, OpenShift, and VMware Tanzu. This will help you understand the power of
    Spring Cloud Function.


    # 2. Getting Started with Spring Cloud Function


    This chapter discusses how to develop code using Spring Cloud Function and deploy
    it to environments in the cloud, on-premises (on a premises datacenter), and on
    your laptop. It includes a step-by-step approach to coding and deploying the function.


    A sample payroll use case of inserting salary details and retrieving salary information
    is provided. Here are some of the common tasks that need to be performed for each
    of these environments:


    1. Set up the IDE for the Spring Boot framework.

    2. Add JPA, H2 (this example uses an embedded database to demonstrate the CRUD
    operations), Spring Cloud Function, and Spring Web Support.

    3. Complete the code for `EmployeeFunction`, `EmployeeConsumer`, and `EmployeeSupplier`.


    Note that the code remains the same in all environments; the only change you make
    is to the `pom.xml` file. There is also an introduction to a `FunctionInvoker`
    `<Message<String>`, `<String>` class regarding Azure Functions. Azure build looks
    for this class during the build process. Another difference you will notice with
    Azure is that you have to use JDK 11 and above to get the Azure templates in the
    IDE.


    The common tasks you will perform for Knative and Kubernetes environments such
    as EKS, AKS, GKE, OpenShift, and Kubernetes grid are the following:


    1. Create a Docker image of the code.

    2. Set up Knative on all environments.

    3. Deploy the code to Knative.


    Deployment of Spring Cloud Function to Knative will demonstrate true portability.


    You also see how to use a single IDE such as IntelliJ or VS Code to perform all
    the functions (i.e., building and deploying to the target environments).


    I have used multiple devices to set up the local and on-premises Kubernetes environments.
    I recommend that `VMware` VMs be used. You can get the `VMware` workstation player
    from `VMware` for free at `https://www.vmware.com/products/workstation-player.xhtml`.
    You can also use other alternatives, such as Windows Subsystem for Linux (WSL)
    or Virtual Box.


    All the code is available on GitHub at `https://github.com/banup-kubeforce/payroll-h2.git`.


    Happy coding!


    ## 2.1 Setting Up the Spring Boot and Spring Cloud Function Locally


    This is a preliminary step that you undertake to determine if the Spring Cloud
    Function works. This will set the stage for deployment.


    Prerequisites:


    * An IDE such as IntelliJ, Eclipse, Spring IDE, or Red Hat Code Ready workspace

    * Maven or Gradle

    * Postman for testing

    * Code from GitHub at `https://github.com/banup-kubeforce/payroll.git`


    Here are the steps:


    * Step 1: Create the Spring Boot scaffolding.

    * Step 2: Create the employee model.

    * Step 3: Write the consumer.

    * Step 4: Write the supplier.

    * Step 5: Write the function.

    * Step 6: Deploy and run the code locally.

    * Step 7: Test the function.


    I am using IntelliJ, as it makes me more productive with all the capabilities
    such as plugins for the cloud, Docker, Maven, and so on.

    '
