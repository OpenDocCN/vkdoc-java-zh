  raw: '## 3.6 Deploying to GCP Cloud Functions


    Deploying to GCP Cloud Functions using GitHub Actions is a bit intrusive, as you
    have to add a `MANIFEST.MF` file to the resources folder. See the code in GitHub.


    Prerequisites:


    *   A GitHub repository with the code. The code at [`https://github.com/banup-kubeforce/payroll-gcp-h2.git`](https://github.com/banup-kubeforce/payroll-gcp-h2.git)
    can be leveraged


    *   Google `accountSubscribe` to Google Cloud Functions


    *   Gcloud CLI is optional if you are just using the GitHub Actions dashboard


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig20_HTML.jpg)


    A flow diagram describes G C P and GitHub actions flow. Commit code through Git
    is pushed to GitHub. Event-triggered GitHub actions deploy spring cloud function
    in google cloud function.


    Figure 3-20


    GCP and GitHub Actions flow


    Step 1: Spring Cloud Function code in GitHub. Push your code to GitHub. If you
    have cloned the [`https://github.com/banup-kubeforce/payroll-gcp-h2.git`](https://github.com/banup-kubeforce/payroll-gcp-h2.git)
    then you have everything that you need to push the code to your repository.


    Step 2: Set up Cloud Functions actions.


    Set up GitHub actions to run the Cloud Functions command. You have two choices:


    *   Use `deploy-cloud-functions runner`


    *   Use `gcloud-cli`


    Listing [3-6](#526597_1_En_3_Chapter.xhtml#PC15) shows the GitHub Actions file.


    ```

    name: Google Cloud Functions

    on:

    push:

    branches: [ "master" ]

    jobs:

    build-deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v2

    - uses: actions/setup-java@v2

    with:

    java-version: ''11''

    distribution: ''temurin''

    cache: maven

    - name: Build with Maven

    run: mvn -B package --file pom.xml

    - id: ''auth''

    uses: ''google-github-actions/auth@v0''

    with:

    credentials_json: ''${{ secrets.GCP_CREDENTIALS }}''

    - name: ''Set up Cloud SDK''

    uses: ''google-github-actions/setup-gcloud@v0''

    - name: ''Use gcloud CLI''

    run: ''gcloud functions deploy payroll-gcp --entry-point org.springframework.cloud.function.adapter.gcp.GcfJarLauncher
    --runtime java11 --trigger-http --source target/deploy --memory 512MB''

    Listing 3-6

    Workflow for Payroll Function to be Deployed on GCP Cloud Functions

    ```


    Note that you will have to store your `GCP_CREDENTIALS` in the GitHub Secrets
    dashboard.


    As in the previous example with AWS Lambda, note that the steps to check out,
    set up, and build Maven are the same. For the authentication and deployment, you
    use the Google Cloud CLI. The Set up Cloud SDK task will download and set up the
    Google CLI. You can use the same command line script that you used when you deployed
    from a laptop in Chapter [2](#526597_1_En_2_Chapter.xhtml).


    Step 3: Commit and push code to trigger the GitHub Actions. This trigger is defined
    in the actions code. In this example, any push or commit to the “master” branch
    will trigger the GitHub Actions.


    ```

    on:

    push:

    branches: [ "master" ]

    ```


    This can be done on the GitHub Actions website or in the IDE. You can go to GitHub
    and commit a change by doing a simple modification at the “master” branch. This
    will start the GitHub Action flow.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig21_HTML.jpg)


    A screenshot of the banup-kubeforce window. The build deploy button is selected.
    A new window on build deployment is displayed, it includes set up job, build with
    Maven, run Sam package, etc.


    Figure 3-21


    GitHub Actions gets triggered by a code commit


    Once the actions successfully complete the job, you can go to the Google Cloud
    Functions dashboard and test the function. Again, you execute a simple GET against
    the `EmployeeSupplier` function.


    Step 4: Test the function.


    Before you test the function, ensure that you pick the function to be invoked
    from an unauthenticated device such as your laptop. Once you’re done testing,
    remove the privilege to avoid unnecessary invocations.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig22_HTML.png)


    A screenshot of the unauthenticated set for payroll-g c p- h 2 which is allowed.
    It includes a link to 1st gen payroll along with other details.


    Figure 3-22


    Allow unauthenticated set for Payroll-gcp-h2


    You can go to the console of your function in the Google Cloud Functions dashboard
    and execute the test. You do not have to provide any input; simply click the Test
    the Function button to execute the test. You will see the output of `EmployeeSupplier`
    in the Output section, as shown in Figure [3-23](#526597_1_En_3_Chapter.xhtml#Fig23).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig23_HTML.jpg)


    A screenshot of the google cloud window. It displays cloud functions. In payroll-g
    c p-h 2, a function is selected. It configures triggering events and displays
    the test command.


    Figure 3-23


    Successful output of the Spring Cloud Function test in GCP Cloud Functions'
