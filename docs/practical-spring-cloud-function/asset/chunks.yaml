  trans: '

    ## 2.5 使用 Kubernetes、Knative 和 Spring Cloud Function 本地设置


    本节探讨了另一种部署 Spring Cloud Function 的方法。Kubernetes，如您所知，是一种可移植的容器化和运行容器的方法。Kubernetes
    允许您托管以镜像形式打包并部署在 Kubernetes Pod 上的容器。


    Knative 是建立在 Kubernetes 之上的环境，可以托管函数。第 1 章解释了云提供商如何创建诸如 AWS Lambda 这样的环境，这些环境可以按需启动并在线资源未使用时关闭。类似地，您也可以使用
    Knative 为函数创建这样的按需环境。本节将探讨如何在本地设置 Knative 环境，这在 AWS 和 Google Functions 上较为困难，并部署和使用您的函数在本地和云端。本节首先介绍本地部署，然后过渡到云端。


    您会注意到我使用了 `EmployeeSupplier` 作为函数。为此，您需要预先在 H2 数据库中填充一些数据，以便可以使用 `EmployeeSupplier`
    函数查询数据库。


    前提条件：


    *   Docker（适用于 Mac、Linux 或 Windows）


    *   Kind（Kubernetes in Docker）


    *   Knative serving


    *   IntelliJ、Eclipse、VS Code 或其他 IDE


    *   GitHub 上的代码


    以下是设置 Kubernetes 和 Knative 并部署 Spring Cloud Function 的过程。


    步骤 1：本地设置 Kubernetes 集群。在此步骤中，您安装一个本地 Kubernetes 集群。您将部署一个 KIND（Kubernetes IN
    Docker）集群。当然，您也可以使用 Minikube 或 Minishift 进行本地部署。


    首先，您需要 Docker。


    1.  安装 Docker。


    我使用的是 Ubuntu 虚拟机，因为它是一种流行的 Linux 发行版。提供的命令行是按顺序排列的，您可以按照流程操作。参见 Listing 2-13。


    ```

    $sudo apt-get update

    $sudo apt-get install -y \

    apt-transport-https \

    ca-certificates \

    curl \

    gnupg-agent \

    software-properties-common

    $curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -

    $sudo add-apt-repository \

    "deb [arch=amd64] https://download.docker.com/linux/ubuntu \

    $(lsb_release -cs) \

    stable"

    $sudo apt-get update

    $sudo apt-get install -y docker-ce docker-ce-cli containerd.io

    $sudo usermod -aG docker $USER

    Listing 2-13

    安装 Docker

    ```


    一旦运行这些命令，您将拥有一个正在运行的 Docker 实例。


    1.  安装 Kubectl。


    此步骤是必需的，因为您需要 Kubectl 来与 Kubernetes 集群交互


    ```

    $sudo curl -L "https://storage.googleapis.com/kubernetes-release/release/`curl
    -s https://storage.googleapis.com/kubernetes-release/release/stable.txt`/bin/linux/amd64/kubectl"
    -o /usr/local/bin/kubectl

    ```


    运行 `chmod` 命令使 Kubectl 可执行：


    1.  安装 KIND。


    ```

    $sudo chmod +x /usr/local/bin/kubectl

    ```


    ```

    $sudo curl -L "https://kind.sigs.k8s.io/dl/v0.8.1/kind-$(uname)-amd64" -o /usr/local/bin/kind

    ```


    运行 `chmod` 命令使 KIND 可执行：


    ```

    $sudo chmod +x /usr/local/bin/kind

    ```


    现在您拥有 KIND 的组件，可以安装集群并部署 Knative。


    步骤 2：配置 Knative。为了配置 Knative，您需要一个 KIND 集群。您将使用自定义配置文件创建集群。


    使用名为 `clusterconfig.yaml` 的配置文件创建集群。请注意，集群的名称是 "`knative`"。您可以使用不同的名称，但必须使用该集群来部署
    Knative；参见 Listing 2-14。


    ```

    $cat > clusterconfig.yaml << EOF

    kind: Cluster

    apiVersion: kind.x-k8s.io/v1alpha4

    nodes:

    - role: control-plane

    extraPortMappings:

    ## 将节点的端口 31380 暴露为主机的端口 80

    - containerPort: 31080

    hostPort: 80

    ## 将节点的端口 31443 暴露为主机的端口 443

    - containerPort: 31443

    hostPort: 443

    EOF

    $kind create cluster --name knative --config clusterconfig.yaml

    Listing 2-14

    创建 clusterconfig.yaml 并运行创建集群

    ```


    为了设置 Knative，您需要安装和配置以下组件：


    *   Knative serving（关于 Knative serving 的信息可在 [`https://knative.dev/docs/serving`](https://knative.dev/docs/serving)
    找到）


    *   Kourier 是一个轻量级的 Knative serving 入口，可在 [`https://github.com/knative-sandbox/net-kourier`](https://github.com/knative-sandbox/net-kourier)
    找到。


    *   Magic DNS 是一个 DNS 提供商，可在 [`https://knative.dev/docs/install/yaml-install/serving/install-serving-with-yaml/#configure-dns`](https://knative.dev/docs/install/yaml-install/serving/install-serving-with-yaml/%2523configure-dns)
    找到。


    安装 Knative serving


    1.  安装 Knative serving 组件（即 `crds` 和 `core`）：


    1.  使用 Kourier 设置网络：


    ```

    $ kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.6.0/serving-crds.yaml

    $ kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.6.0/serving-core.yaml

    ```


    1.  将文件更改为使用 nodePort，如 Listing 2-15 所示。


    ```

    $curl -Lo kourier.yaml https://github.com/knative/net-kourier/releases/download/knative-v1.6.0/kourier.yaml

    ```


    1.  安装 Kourier。


    ```

    apiVersion: v1

    kind: Service

    metadata:

    name: kourier

    namespace: kourier-system

    labels:

    networking.knative.dev/ingress-provider: kourier

    spec:

    ports:

    - name: http2

    port: 80

    protocol: TCP

    targetPort: 8080

    nodePort: 31080

    - name: https

    port: 443

    protocol: TCP

    targetPort: 8443

    nodePort: 31443

    selector:

    app: 3scale-kourier-gateway

    type: NodePort

    Listing 2-15

    配置 nodePort

    ```


    通过运行以下命令安装 Kourier（参见 Figure 2-23）：


    ![](img/526597_1_En_2_Fig23_HTML.jpg)


    执行日志的截图。它包含 kourier 的配置、服务账户、集群角色、部署和服务。输出为 service kourier-internal 创建成功。


    Figure 2-23


    Kourier 安装成功


    ```

    $ kubectl apply --filename kourier.yaml

    ```


    1.  通过安装以下补丁将 Kourier 设置为默认网络层：


    1.  使用 `sslip.io` 设置通配符 DNS：


    ```

    $ kubectl patch configmap/config-network \

    --namespace knative-serving \

    --type merge \

    --patch ''{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}''

    ```


    1.  使用 `sslip.io` 进行补丁：


    ```

    $ kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.6.0/serving-default-domain.yaml

    ```


    1.  获取 Knative serving 中 Pod 的状态：


    ```

    $ kubectl patch configmap/config-domain \

    --namespace knative-serving \

    --type merge \

    --patch ''{"data":{"127.0.0.1.sslip.io":""}}''

    ```


    ```

    $ kubectl get pods -n knative-serving

    ```


    您可以在 Figure 2-24 中看到所有组件都已启动并运行。您可以继续下一步，将 Spring Cloud Function 应用发布到 Knative。


    ![](img/526597_1_En_2_Fig24_HTML.jpg)


    运行日志的截图。它包含 knative-serving 命名空间中的 kubernetes get pods 命令、activator、autoscaler、默认域和域映射。


    Figure 2-24


    Knative 服务 Pod 已启动并运行


    步骤 3：将应用容器化并推送到仓库。使用 Listing 2-16 中所示的参数设置创建 Dockerfile。我使用了 jdk8。


    ![](img/526597_1_En_2_Fig25_HTML.jpg)


    Docker 文件的截图。左侧包含项目，选中了 Docker 文件，创建了推送镜像页面。它包含注册表、命名空间、仓库和标签。


    Figure 2-25


    从 IntelliJ 推送 Docker 镜像


    1.  推送至 Dockerhub。您可以使用 IDE 的 Docker 功能将应用推送到 Docker 注册表，如 Figure 2-25 所示。


    ```

    FROM openjdk:8-jdk-alpine

    ARG JAR_FILE=target/*.jar

    COPY ${JAR_FILE} app.jar

    ENTRYPOINT ["java","-jar","/app.jar"]

    Listing 2-16

    Dockerfile

    ```

