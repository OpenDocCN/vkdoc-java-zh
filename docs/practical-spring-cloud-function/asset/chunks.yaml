    ## Step 5: Deploy a function to IBM Cloud


    This step does not use the IBM Cloud functions that come out of the box. You can
    use the IBM Kubernetes services to build and deploy your Spring Cloud Function
    on a Knative service. You can get to the IBM Kubernetes service by searching the
    IBM Cloud or catalog or by going directly to `https://cloud.ibm.com/kubernetes/catalog/create`.


    Now create a bare minimum cluster that is free. This is what I like about the
    IBM Cloud; you are really getting a free service even for a Kubernetes cluster.
    This is unlike other cloud providers, where you must pay for the underlying compute
    and storage.


    If you are creating a free cluster, be aware that this cluster will be deleted
    after 30 days.


    Once on the Kubernetes cluster page, pick the pricing plan and a Kubernetes cluster
    will be created for you. With Lite, you do not have the option to name the cluster.
    You can subscribe to the standard tier to get more control. See Figure [7-8](#526597_1_En_7_Chapter.xhtml#Fig8).


    ![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig8_HTML.png)


    A screenshot of the I B M Kubernetes cluster dashboard. It has options of create,
    plan details, Kubernetes version, and resource details.


    Figure 7-8


    Subscribe to IBM Kubernetes


    IBM Cloud will go through the process of creating the cluster and bring you to
    the page shown in Figure [7-9](#526597_1_En_7_Chapter.xhtml#Fig9).


    ![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig10_HTML.jpg)


    A set of instructions after creating the cluster. It has 3 steps to connect to
    the cluster which include login, setting the context, and verifying. At the bottom,
    it has a tip.


    Figure 7-10


    Some boilerplate instructions after creating the cluster


    ![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig9_HTML.png)


    A screenshot of the I B M cluster dashboard. Overview with the details, node health
    is included.


