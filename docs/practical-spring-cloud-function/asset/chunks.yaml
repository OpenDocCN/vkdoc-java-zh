    ## 5.7 总结


    正如你在本章所学到的，你可以使用 Spring Cloud Function 来部署模型。但你也了解到，使用 Spring Cloud Function 和
    Java 来部署 AI/ML 模型有些牵强，因为这些模型是用 Python 编写的。虽然 Python 可能很流行，但也要注意，在企业环境中，Java 才是主导。在
    AI/ML 中找到利用 Java 的方法，是构建企业统一环境的关键。基于 Python 的函数冷启动耗时较长。这就是为什么使用 Java 和 GraalVM
    等框架可以加快启动时间。


    下一章将探讨 IoT 和对话式 AI 的一些实际应用案例，并解释 Spring Cloud Function 的使用方法。


    脚注 1   2


    # 6. Spring Cloud Function 与 IoT


    本章将介绍 Spring Cloud Function 与 IoT 的实现方式。你将看到一些来自制造业和物流领域的实际案例。你将探索 Spring Cloud
    Function 如何与现有的云平台和数据中心 IoT 平台协同工作。你还将了解一些在 Penske 中的具体实现，这些实现几乎可以应用于所有 IoT 相关场景。


    在开始探索解决方案之前，你需要先深入了解 IoT 和当前 IoT 市场的状况。你还将查看一些调查报告，了解为什么 Java 是 IoT 开发的首选企业语言。


    ### 6.1 IoT 现状


    IoT（物联网）正在快速增长，预计 2022 年将增长 22%。这种惊人的增长导致了大量数据需要被采集和处理。


    根据 IoT Analytics Research 在 2021 年 9 月的研究，IoT 设备市场预计会以惊人的速度增长，到 2025 年预计将达到 250
    亿台设备。更多关于该研究的信息可访问 [`https://iotbusinessnews.com/2021/09/23/13465-number-of-connected-iot-devices-growing-9-to-12-3-billion-globally-cellular-iot-now-surpassing-2-billion/`](https://iotbusinessnews.com/2021/09/23/13465-number-of-connected-iot-devices-growing-9-to-12-3-billion-globally-cellular-iot-now-surpassing-2-billion/)。


    凭借这种增长潜力，你可以合理假设支持技术也会随之增长。这些技术不仅包括硬件传感器和 IoT 网关，还包括微服务和函数等技术。IoT 行业最适合实施这些技术，因为它们高度分布式，且严重依赖于小型高效的软件组件。


    按需触发的无服务器函数环境非常适合 IoT，因为它们可以显著降低成本。传统的 IoT 方法依赖于全天候运行的专用应用程序。这些应用消耗大量资源，增加了运营成本。而无服务器函数几乎瞬时的特性，使得这种成本可以转换为“按使用付费”的模式。


    在开始处理 IoT 与 Spring Cloud Function 的一些示例之前，最好先理解为何需要使用 Java 进行编码。虽然有许多替代语言可供选择，但
    Java 在 IoT 领域表现最佳，原因如下：


    *   Java 的设计初衷就考虑到了 IoT。如果你查看 Sun Microsystems 早期的 Java 示例，会发现经常提到数字时钟的同步。


    *   Java 已被移植到许多微控制器上。


    *   Java 专为在资源受限的环境（如传感器）中运行而设计。


    *   JVM 使得代码可以在不同平台间移植；一次编写，随处运行。


    根据 [`iot.eclipse.org`](http://iot.eclipse.org) 进行的 IoT 调查（ [`https://iot.eclipse.org/community/resources/iot-surveys/assets/iot-developer-survey-2020.pdf`](https://iot.eclipse.org/community/resources/iot-surveys/assets/iot-developer-survey-2020.pdf)
    ），你可以看到 Java 在边缘计算和云端都是首选语言。根据研究，边缘端的实现正在转向容器化，这对边缘上的 Knative on Kubernetes 部署非常有利。


    此外，Spring 框架已成为许多工业物联网（IIoT）项目的首选平台。你可以在 2017 年 SpringOne 活动的演示中查看相关信息，访问 [`https://youtu.be/MReQD9tXQuA`](https://youtu.be/MReQD9tXQuA)。


    Spring Cloud Streams、Spring Cloud Data Flow、Spring Integration、Spring MQTT、Spring
    Data 和 Spring XD 等组件在 IoT 数据采集、存储和转换管道中发挥着重要作用。


    ### 6.1.1 Spring 实现示例


    考虑一个 Spring 及其组件在互联车队场景中的示例实现。


    Penske 团队利用基于 Spring 的微服务，结合 Spring Cloud Streams 和 Spring Cloud Data Flow，从安装在
    Penske 卡车上的传感器中采集数据。该应用程序使 Penske 能够监控卡车、进行预测性维护，并实时管理卡车。参见图 6-1。


    ![](img/526597_1_En_6_Fig1_HTML.png)


    一张图表展示了 Penske 互联车队的组件。卡车车队每天向采集应用发送 20 亿次心跳信号，这些信号通过 Spring Cloud Data Flow 流和微服务连接到
    Tanzu 应用服务。AWS 上的 Kafka 以及 VMware Tanzu GemFire、Postgres 和 Greenplum 接收这些数据。最终用户包括业务用户、实时分析和
    Wavefront 观测服务。


    图 6-1


    Penske 基于 Spring Cloud 的互联车队实现


    更多关于此主题的信息可在 SpringOne 网站上找到，访问 [`https://springone.io/2020/sessions/iot-scale-event-stream-processing-for-predictive-maintenance-at-penske`](https://springone.io/2020/sessions/iot-scale-event-stream-processing-for-predictive-maintenance-at-penske)。


    让我们更深入地探讨 IoT 流程；参见图 6-2。


    ![](img/526597_1_En_6_Fig2_HTML.jpg)


    一个流程图展示了 IoT 流程，从 IoT 传感器开始，经过数据流采集、原始数据存储、转换、数据湖存储，最终到达分析阶段。


    图 6-2


    IoT 流程图

