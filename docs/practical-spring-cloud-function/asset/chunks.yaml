  trans: '

    ## 2.8 使用 AKS 和 Knative 配置 Azure 与 Spring Cloud Function


    本节将探讨在已配置 Knative 的 Azure AKS 集群上部署应用。你将看到与第 2.5 节相似的内容，因为你会创建集群、启用 Knative 并部署
    Docker 镜像。


    前提条件：


    *   Azure 订阅 ([`https://portal.azure.com`](https://portal.azure.com)`/`)


    *   Azure CLI，可在 [`https://docs.microsoft.com/en-us/cli/azure/install-azure-cli`](https://docs.microsoft.com/en-us/cli/azure/install-azure-cli)
    找到


    *   kubectl ([`https://kubernetes.io/docs/tasks/tools/`](https://kubernetes.io/docs/tasks/tools/))


    *   Knative 服务 ([`https://knative.dev/docs/serving`](https://knative.dev/docs/serving))


    *   Knative CLI ([`https://knative.dev/docs/client/install-kn/`](https://knative.dev/docs/client/install-kn/`)`


    *   IntelliJ、Eclipse、VS Code 或其他 IDE


    *   GitHub 上的代码（如果你仅使用 Dockerhub 上的镜像则可选）


    *   注册在 Docker hub 上的 Docker 镜像


    步骤 1：使用 AKS 设置 Kubernetes 集群。在此步骤中，你将创建一个 AKS 集群。请确保你拥有足够的权限来创建集群。更多信息请参见 [`https://docs.microsoft.com/en-us/azure/aks/learn/quick-kubernetes-deploy-cli`](https://docs.microsoft.com/en-us/azure/aks/learn/quick-kubernetes-deploy-cli)。


    在运行以下命令之前，请确保已使用 Azure CLI 登录 Azure。然后运行清单 2-24 中的命令。


    ```

    az aks create --resource-group $RESOURCE_GROUP \

    --name $CLUSTER_NAME \

    --generate-ssh-keys \

    --kubernetes-version 1.22.6 \

    --enable-rbac \

    --node-vm-size Standard_DS3_v2

    Listing 2-24

    Dockerfile

    ```


    通过运行清单 2-25 中的命令，配置你的 `kubeconfig` 以使用你创建的 AKS 集群。


    ```

    $ az aks get-credentials --resource-group payroll-rsg --name payrollclstr

    Listing 2-25

    设置 Kubeconfig

    ```


    通过运行清单 2-26 中的命令，检查集群状态。


    ```

    kubectl get nodes

    Listing 2-26

    检查状态

    ```


    步骤 2：在 AKS 上配置 Knative。此步骤与之前在 EKS 或本地 Kubernetes 上的操作类似。


    安装 Knative 服务：


    ```

    $kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.4.0/serving-crds.yaml

    $kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.4.0/serving-core.yaml

    $kubectl apply -f https://github.com/knative/net-kourier/releases/download/knative-v1.4.0/kourier.yaml

    ```


    使用以下命令配置 Kourier 以用于入口（ingress）：


    ```

    $kubectl patch configmap/config-network \

    --namespace knative-serving \

    --type merge \

    --patch ''{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}''

    ```


    使用以下命令应用默认域名：


    ```

    $kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.4.0/serving-default-domain.yaml

    ```


    通过运行清单 2-27 中的命令，获取 Kourier 入口信息。


    ```

    $kubectl –namespace kourier-system get service kourier

    Listing 2-27

    获取入口信息

    ```


    现在你已经配置并运行了 Knative，可以继续下一步将应用镜像推送到 Knative。


    步骤 3：使用 Docker 容器化应用并将其推送到仓库。如果你选择创建并部署到 Dockerhub 仓库，则可参考第 2.5、2.6 或 2.7 节的步骤
    3。


    步骤 4：将应用部署到 AKS 上的 Knative。在此，我再次使用 Knative CLI `kn` 部署应用，因为这对这个简单的练习来说非常方便。


    运行清单 2-28 中的命令。


    ```

    $ kn service create payroll –image docker.io/banupkubeforce/springcloudfunctions:payrollv2

    Listing 2-28

    部署 Payroll 应用

    ```


    注意生成的 URL。你将使用此 URL 进行测试。


    步骤 5：测试。使用步骤 4 提供的 DNS 名称，测试以下 URL：


    [`https://payroll.default.20.121.248.sslip.io/employeeConsumer`](https://payroll.default.20.121.248.sslip.io/employeeConsumer)


    ## 2.9 在 VMware Tanzu TKG 上设置与 Knative


    与其他 Kubernetes 产品类似，在本地笔记本电脑上设置和安装 Tanzu Kubernetes Grid（TKG）上的 Knative 非常简单。


    VMware 发布了一个社区版，可在本地安装。更多信息请参见 [`https://tanzucommunityedition.io/download/`](https://tanzucommunityedition.io/download/)。


    前提条件：


    *   TKG 下载 ([`https://tanzucommunityedition.io/download/`](https://tanzucommunityedition.io/download/))


    *   kubectl ([`https://kubernetes.io/docs/tasks/tools/`](https://kubernetes.io/docs/tasks/tools/))


    *   Knative 服务 ([`https://knative.dev/docs/serving`](https://knative.dev/docs/serving))


    *   Knative CLI (`https://knative.dev/docs/client/install-kn/`)


    *   IntelliJ、Eclipse、VS Code 或其他 IDE


    *   GitHub 上的代码（如果你仅使用 Dockerhub 上的镜像则可选）


    *   注册在 Docker hub 上的 Docker 镜像


    以下是配置和部署 Spring Cloud Function 到 VMware Tanzu 的步骤：


    *   步骤 1：在本地设置 TKG。


    *   步骤 2：为你的应用创建 Kubernetes 集群。


    *   步骤 3：在 TKG 集群上安装 Knative。


    *   步骤 4：在 Knative 上部署应用。


    步骤 1：在本地设置 TKG。按照网站上的说明在本地设置 TKG。这将为你提供一个非管理集群。


    图 2-48 展示了一个成功的安装。


    步骤 2：为你的应用创建集群。在此，你将为 payroll 示例创建一个集群。运行以下命令：


    ```

    $tanzu unmanaged-cluster create payroll

    ```


    你将收到一条消息，表明 payroll 集群已完成，如图 2-49 所示。


    步骤 3：在 TKG 集群上安装 Knative。运行以下命令在 TKG 集群上安装 `kantive-serving`：


    ```

    $tanzu package install knative-serving --package-name knative-serving.community.tanzu.vmware.com
    --version 1.0.0

    ```


    步骤 4：如图 2-50 所示，在 Knative 上部署应用。


    注意提供的 URL。在这种情况下，它是 `http://payroll.default.127.0.0.241.nip.io`。


    步骤 5：测试。参考第 2.5 节的步骤 5，使用 Postman 或 curl 测试 [`http://payroll.default.127.0.0.241.nip.io/employeeConsumer`](http://payroll.default.127.0.0.241.nip.io/employeeConsumer)
    URL。


    这完成了 Tanzu Kubernetes Grid 或 TKG 的成功部署。


    ## 2.10 总结


    本章解释了如何使用 Spring Cloud Function 开发和部署到各种目标平台，包括 AWS Lambda、Google Functions、Azure
    Functions 以及 Kubernetes 环境如 AWS EKS、Google 的 GKE、Azure AKS、VMware Tanzu 等。借助 Kubernetes，你可以使用
    Knative 将相同镜像部署到所有其他 Kubernetes 平台，而无需更改代码。Knative 确保代码可以在任何 Kubernetes 平台中移植。这一点至关重要，因为它确保了在迁移至任何云平台时的最小中断。总结来说，你现在应该对如何使用
    Spring Cloud Function 构建无服务器函数有了良好的理解。下一章将探讨如何自动化 Spring Cloud Function 的部署过程。

    '
- fmt: "\n# 3. CI/CD with Spring Cloud Function\n\nAs you learned in Chapter [2](#526597_1_En_2_Chapter.xhtml),\
    \ you can build a Spring Cloud Function and deploy it to multiple environments.\
    \ You can use various manual methods such as `Azure-Function:Deploy`, `Gcloud`\
    \ CLI, `AWS` CLI, `Kubectl`, and `Knative` CLI. These manual approaches are not\
    \ sustainable in an enterprise with many different teams, a lot of programmers,\
    \ and a lot of code. It will be a management nightmare if every team member uses\
    \ their own method to build and deploy code. Also, as you can see, this process\
    \ is repeatable. Since it is a repeatable process, there is a chance to leverage\
    \ automation.\n\nThis chapter explores ways to automate the deployment process.\
    \ It leverages some popular approaches for automating your deploys. It explores\
    \ `GitHub Actions` for deploying `Lambda`, `Google Cloud Functions`, and `Azure\
    \ Functions` and you will integrate with `ArgoCD` to push to a `Kubernetes/Knative`\
    \ environment. While you can use `GitHub Actions` alone for all environments,\
    \ that would require custom scripting to push to `Kubernetes`. `ArgoCD` has built-in\
    \ hooks to deploy to `Kubernetes`, which is the preferred way. More information\
    \ on `GitHub Actions` can be found at [`https://github.com/features/actions`](https://github.com/features/actions),\
    \ and information on `ArgoCD` can be found at [`https://argoproj.github.io/cd/`](https://argoproj.github.io/cd/).\n\
    \nLet’s dig a bit deeper into `GitHub Actions` and `ArgoCD`.\n\n## 3.1 GitHub\
    \ Actions\n\nThis is a CI/CD platform tightly integrated with `GitHub`; it allows\
    \ you to create and trigger workflows from `GitHub`. So, if you are a fan of `GitHub`,\
    \ you will really like this new feature. When you sign up for `GitHub`, `GitHub\
    \ Actions` will automatically be integrated into your project, so you do not have\
    \ to use a separate tool like `Jenkins` or `Circle CI`. Of course, this means\
    \ that you are restricted to `GitHub` as your code repository. Creating a workflow\
    \ is quite straightforward. You can create a workflow directly on the `GitHub`\
    \ website by navigating to your project and clicking the New Workflow button in\
    \ the Actions tab, as shown in the Figure [3-1](#526597_1_En_3_Chapter.xhtml#Fig1).\n\
    \n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig1_HTML.jpg)\n\nA screenshot\
    \ of the banup-kubeforce window. Tab action is selected. It describes all workflows.\
    \ It contains runs from all workflows, events, statuses, brands, and actors.\n\
    \nFigure 3-1\n\nCreating a new `GitHub Actions` workflow\n\nUpon clicking New\
    \ Workflow, as shown in Figure [3-2](#526597_1_En_3_Chapter.xhtml#Fig2), you will\
    \ be taken to the workflow “marketplace,” where you can choose from the suggested\
    \ flows or set up a workflow yourself. Click the Set Up a Workflow Yourself link\
    \ to start creating a custom workflow.\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig2_HTML.png)\n\
    \nA screenshot of the banup-kubeforce window. Tab actions is selected which displays\
    \ a message to choose a workflow.\n\nFigure 3-2\n\nWorkflow marketplace to choose\
    \ your workflow setup\n\nThe Set Up a Workflow Yourself window, as shown in Figure\
    \ [3-3](#526597_1_En_3_Chapter.xhtml#Fig3), will take you to the page where you\
    \ can write the script to create your workflow.\n\n![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig3_HTML.png)\n\
    \nA screenshot of a banup-kubeforce window. Tab code is selected. Code is present\
    \ on the left side of the window. The right side of the window contains feature\
    \ actions under the tab marketplace. The featured actions are upload a build artifact\
    \ and set up Java J D K.\n\nFigure 3-3\n\nWorkflow page to create custom workflows\n\
    \nAs you can see in Figure [3-3](#526597_1_En_3_Chapter.xhtml#Fig3), the workflow\
    \ points to a `main.yaml` file that is created in the `./github/workflows` directory\
    \ under your root project folder. You can also create the same file in your IDE\
    \ and it will show up under the Actions tab once you commit the code. Listing\
    \ [3-1](#526597_1_En_3_Chapter.xhtml#PC1) shows the sample code created for `AWS\
    \ Lambda`.\n\n```\nname: CI\non:\n  push:\n    branches: [ \"master\" ]\njobs:\n\
    \  build-deploy:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: `actions/checkout@v2`\n\
    \      - uses: `actions/setup-java@v2`\n      - with:\n          java-version:\
