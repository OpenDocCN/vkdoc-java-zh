    ## 4.1 数据事件管道


    让我们来看一个例子。假设你正在驾驶汽车，突然与另一辆车发生碰撞。几分钟后，你会接到 OnStar 的电话询问你是否安全，因为当时发生了碰撞。OnStar 是如何知道你发生了碰撞的？这一切都发生在瞬间。车辆内的传感器被碰撞事件触发，开始将数据以流的方式发送到
    OnStar 系统。OnStar 系统处理来自其他多个系统的数据，并通过触发 OnStar 操作员的电话呼叫来产生响应。引发数据处理的事件以及输出结果共同构成了事件数据管道。图
    4-1 展示了这一过程。


    ![](img/526597_1_En_4_Fig1_HTML.jpg)


    一张示意图展示了 OnStar 在车辆中实现的事件驱动数据管道。车辆将数据发送到附近的基站，基站将数据中继到 OnStar 数据中心。OnStar 数据中心将信息路由到呼叫中心。通过这一过程，紧急服务如警察、医疗响应团队和拖车公司被激活。


    图 4-1


    使用 OnStar 的车辆事件驱动数据管道示例


    所有关于事故的数据都会被收集、处理、分析，并发送到 OnStar 内外部的各种目标系统。这是事件数据管道的一个示例。


    数据管道是一组流程，从不同来源获取原始数据，然后通过过滤、转换和移动，将数据存储到目标存储系统中，以便进行分析和以视觉上引人注目的方式呈现。


    数据可以以流或批次的形式存在。流通常与实时或近实时的数据传输相关联，而批次通常是计划的且非实时的。图 4-2 展示了这一点。


    ![](img/526597_1_En_4_Fig2_HTML.png)


    一张示意图展示了数据管道作为一组流程，这些流程会摄入结构化或非结构化数据，并通过数据湖或数据仓库检索和转换数据，进一步通过人工智能或机器学习流程进行分析。


    图 4-2


    数据管道流程


    数据也可以是非结构化或结构化的。非结构化数据可以来自多种资源，包括基于互联网的平台如 Twitter，以及汽车设备发出的数据。


    结构化数据通常源自公司内部的应用程序。这些数据需要在对象存储的着陆区进行组合。这些对象存储可以是本地部署或云环境中的。一旦数据被摄入到对象存储中，它就会被检索和转换，通常通过
    ETL 流程在其他数据存储（如数据湖或数据仓库）中进行。然后，这些数据会通过商业智能工具（如 Power BI 和 Tableau）或进一步通过人工智能/机器学习流程进行分析。


    从数据摄入到消费的整个过程称为数据管道。


    让我们更深入地探讨数据管道流程中提到的各个子流程。


    ### 4.1.1 获取数据


    获取数据是数据管道流程的第一步。在这里，业务所有者和数据架构师决定使用哪些数据来满足特定用例的需求。


    例如，在 OnStar 的碰撞事件检测场景中，数据需要从传感器获取。这种传感器数据需要与来自内部和外部合作伙伴（如金融、拖车、租赁合作伙伴等）的数据进行组合。


    表 4-1 展示了车辆事件驱动管道的数据、数据类型和数据源。


    表 4-1


    数据识别


    | 数据 | 数据类型 | 数据源 |

    | --- | --- | --- |

    | **传感器** | 非结构化（JSON、CSV） | 传感器 |

    | **租赁信息** | 关系型（RDBMS） | 外部租赁机构 |

    | **用户信息** | 关系型（RDBMS） | OnStar 注册 |

    | **车辆信息** | 关系型（RDBMS） | 车辆数据系统 |

    | **拖车信息** | 关系型（RDBMS） | 外部拖车公司 |


    ### 4.1.2 存储/摄入数据


    从各种来源获取的数据被存储为原始数据到所选存储系统中。摄入方法可以是基于流的或基于批次的。


    例如，在 OnStar 的案例中，传感器数据以固定间隔流式传输或基于事件触发。其他数据（如租赁信息）可以基于批次或按需查询驱动。原始数据存储可以是托管在云中的
    S3 对象存储或本地部署。


    ### 4.1.3 转换数据


    存储在对象存储中的原始数据随后被处理。该过程可能包括将非结构化数据转换为结构化数据，并存储到 RDBMS 数据库中。


    例如，在 OnStar 中，合作伙伴数据和内部数据将被组合并转换为通用数据模型。传感器数据也会被转换为 RDBMS 格式。


    ### 4.1.4 加载数据


    一旦数据被转换，它就会被加载到具有共同模式的单个或多个数据库中。该模式基于特定于用例的预定义数据模型。目标数据存储可以是数据湖或其他 RDBMS 存储。在这里，分析类型再次决定了具体选择。


    例如，如果是 OLTP 类型的分析，数据需要被快速处理并发送到请求系统。这需要 RDBMS 存储。需要用于报告和研究的数据可以存储在数据湖中。


    ### 4.1.5 分析数据


    在此子流程中，存储在数据湖或 RDBMS 中的数据将通过 Tableau、Power BI 或专用的报告网页等工具进行分析。


    在 OnStar 的案例中，存储在数据湖中的数据将通过 Tableau 或 Power BI 进行分析，而需要立即处理的数据则通过自定义仪表板或网页报告界面进行分析。


    Spring Cloud Function 在整个过程中起着至关重要的作用，尤其是在与 Spring Cloud Data Flow、AWS Glue、Azure
    Data Factory、Google 的数据流等工具结合使用时。你将在本章深入探讨这些工具。


    ## 4.2 Spring Cloud Function 与 Spring Cloud Data Flow 与 Spring Cloud Streams


    Spring Cloud Data Flow（SCDF）是一款基于 Spring.io 的产品，支持创建和部署数据管道。它支持批处理和事件驱动的数据，使其非常灵活。SCDF
    管道可以通过编程方式构建，也可以通过图形界面进行连接。它高度依赖于 Spring 框架和 Java，这使其在 Spring 开发者中非常受欢迎。


    图 4-3 展示了 SCDF 的一个示例仪表板，其中包含一个简单的数据管道，具有源、处理器和接收器。你可以从可用组件中拖放以构建管道。你也可以构建自定义的源、处理器和接收器，并将其部署到企业内部使用。


    ![](img/526597_1_En_4_Fig3_HTML.jpg)


    一张截图展示了 SCDF，显示了车辆数据管道的定义、状态和应用。


    图 4-3


    SCDF 中数据管道的示例图形表示


    从仪表板可以看出，你可以构建基于流或基于批次（任务）的数据管道，并通过单一仪表板管理这些管道。


    与云中其他数据管道工具不同，SCDF 可以在 Kubernetes、Docker 或 Cloud Foundry 环境中部署，使其成为数据管道开发和部署的便携式工具。

    '
- fmt: '

    ### 4.2.1 Spring Cloud Function and SCDF


    `Spring Cloud Function` and `SCDF` are perfectly matched, as they are built out
    of the same framework, `Spring`. You can deploy `Spring Cloud Function` as a source,
    processor, sink, or as a trigger for the pipeline. Since the data pipelines are
    usually invoked sporadically for processing data, you can optimize utilization
    of resources and costs with a `Spring Cloud Function`.


    Let’s look at a sample implementation of `Spring Cloud Function` with `SCDF`.


    In this example, you will build a simple data pipeline using `RabbitMQ` as a source,
    do a simple transformation, and store the messages in a log. You will publish
    sample vehicle information into a `RabbitMQ` topic called `VehicleInfo` and do
    a simple transformation, then store it in a log file.


    `RabbitMQ` ➤ `Transform` ➤ `Log`


    Prerequisites:


    * `SCDF` deployed on `Kubernetes` or locally in `Docker`

    * `Kubernetes` or `Docker`

    * A `RabbitMQ` cluster/instance

    * A queue to publish messages

    * Code from GitHub at [`https://github.com/banup-kubeforce/SCDF-Rabbit-Function.git`](https://github.com/banup-kubeforce/SCDF-Rabbit-Function.git)


    Additional prerequisites for each environment can be found at [`https://dataflow.spring.io/docs/installation`](https://dataflow.spring.io/docs/installation)


    Step 1: Installing `Spring Cloud Data Flow`.


    * Local machine: `Docker Compose` is an easy way to get an instance of `Spring
    Cloud Data Flow` up and running. The details of the installation are available
    at [`https://dataflow.spring.io/docs/installation/local/docker/`](https://dataflow.spring.io/docs/installation/local/docker/)


    * `Kubernetes`: Instructions for installing this on `Kubernetes` are available
    at[`https://dataflow.spring.io/docs/installation/kubernetes/`](https://dataflow.spring.io/docs/installation/kubernetes/).


    For this example, I used an existing cluster that I created in Chapter [2](#526597_1_En_2_Chapter.xhtml)
    and ran the following `helm` command to install the `SCDF`, which results in the
    output shown in Figure [4-4](#526597_1_En_4_Chapter.xhtml#Fig4).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig4_HTML.jpg)


    A screenshot depicts the `helm` command to install the `SCDF`. It consists of
    name, last deployed, namespace, status, test suite, notes, chart name, chart version
    and app version.


    Figure 4-4


    Successful execution of a `helm` chart for `SCDF`


    ```

    $helm install scdf bitnami/spring-cloud-dataflow -n scdf-system --set server.service.type=LoadBalancer
    --set server.service.loadBalancerIP=${ingress} --set server.ingress.enabled=true
    --set server.ingress.server.host=scdf.${ingress}.xip.io

    ```


    Once the command runs successfully, as shown in Figure [4-4](#526597_1_En_4_Chapter.xhtml#Fig4),
    you can check the status by running `kubectl get pods`. You can also get the external
    IP with the `kubectl get svc` commands, as shown in Figures [4-5](#526597_1_En_4_Chapter.xhtml#Fig5)
    and [4-6](#526597_1_En_4_Chapter.xhtml#Fig6).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig6_HTML.jpg)


    A screenshot depicts the command to get the status of the `SCDF`. The command
    used is `$ kubect 1 get s v c -n scdf-system`.


    Figure 4-6


    Get the status of `SCDF`


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig5_HTML.jpg)


    A screenshot depicts the command to get external IP of the `SCDF`. The command
    used is `$ kubect 1 get pods -n scdf-system`.


    Figure 4-5


    Get the external IP of the `SCDF`


    ```

    $kubectl get pods -n scdf-system

    ```


    ```

    $kubectl get svc -n scdf-system

    ```


    You can now access `SCDF` using the external IP. For example, [`http://20.241.228.184:8080/dashboard`](http://20.241.228.184:8080/dashboard)


    The next step is to add applications. `Spring` provides a standard set of templates
    that you can use to build your pipeline.


    Step 2: Add Applications to your `SCDF` Instance


    Use the Add Application(s) button to create some starter apps that you can use
    to create a data pipeline; see Figures [4-7](#526597_1_En_4_Chapter.xhtml#Fig7)
    and [4-8](#526597_1_En_4_Chapter.xhtml#Fig8).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig8_HTML.jpg)


    A screenshot depicts the options to add applications and `docker`-based or `rabbitMQ`
    `kafka`-based.


    Figure 4-8


    Pick the starters of your choice. If `SCDF` is deployed in `Kubernetes`, pick
    `docker`-based starters


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig7_HTML.jpg)


    A screenshot depicts the `SCDF` add application view to create a data pipeline.


    Figure 4-7


    Add application view in `SCDF`


    Figure [4-8](#526597_1_En_4_Chapter.xhtml#Fig8) shows you the options to add applications
    that are custom built through the Registering One or More Applications option.
    You import the application coordinates from an HTTP URI or use a properties file.
    There is also an option to import some prebuilt starters from `Spring`. Furthermore,
    you can choose starters that are `Maven`- or `docker`-based or `RabbitMQ`- or
    `Kafka`-based. `RabbitMQ` and `Kafka` are used as backbone messaging systems for
    internal `SCDF` components and not for external use. When deploying to a `Kubernetes`
    cluster, you have to choose a `docker`-based starter. When deploying locally in
    a `docker` environment, you can choose between `Maven` and `docker`-based starters.


    Figure [4-9](#526597_1_En_4_Chapter.xhtml#Fig9) shows prebuilt templates with
    the `docker` images URI. `SCDF` is running on a `Kubernetes` environment, so the
    prebuilt images have a `docker` URI.


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig9_HTML.jpg)


    A screenshot depicts the `SCDF` running on a `Kubernetes` environment and prebuilt
    templates installed in `SCDF`.


    Figure 4-9


    Prebuilt templates are installed in `SCDF`


    These prebuilt templates come in three categories—source, processor, and sink.
    They allow you to wire up a data pipeline without the need for coding. If you
    want a custom component, you can follow the examples in [`https://dataflow.spring.io/docs/stream-developer-guides/`](https://dataflow.spring.io/docs/stream-developer-guides/).


    The next step is to create a stream using the starter templates you loaded.


