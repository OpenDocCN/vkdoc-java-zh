    You will be able to pick the topic that you created in Step 1 and the bucket in
    Step 2. See Figure [4-32](#526597_1_En_4_Chapter.xhtml#Fig32).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig32_HTML.jpg)


