    ## 4.1 Data Event Pipelines


    Let’s look at an example. Say you are driving a car and suddenly you collide with
    a vehicle. After a few minutes, you get a call from `OnStar` asking you if you
    are alright as you were in a collision. How did `OnStar` know that you were in
    a collision? All this happens in a flash. `Sensors` in your vehicle are triggered
    by the collision event and begin sending data as streams into the `OnStar` system.
    The `OnStar` system processes the data from numerous other systems and triggers
    a response in the form of an `OnStar` operator calling you. The event that triggered
    the data processing along with the output is the event data pipeline. Figure [4-1](#526597_1_En_4_Chapter.xhtml#Fig1)
    illustrates this process.


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig1_HTML.jpg)


    An illustration depicts the `OnStar` event-driven data pipeline implementation
    for vehicles. The vehicle sends data to nearby `Cell tower`, `Cell tower` relays
    data to `OnStar` datacenter. `OnStar` datacenter routes information to the call
    center. Through this emergency services such as police, medical response team
    and towing company are activated.


    Figure 4-1


    An example event-driven data pipeline implementation for vehicles using `OnStar`


    An example of event data pipeline. All data regarding the incident is collated,
    processed, analyzed, and sent to various target systems, both internal and external
    to `OnStar`. This is an example of event data pipeline.


    A data pipeline is a set of processes that takes raw data from disparate sources,
    and then filters, transforms, and moves the data to target stores, where it can
    be analyzed and presented in a visually compelling way.


    The data can be in the form of streams or batches. Streaming is usually associated
    with real-time to near real-time data movement and batches are usually scheduled
    and non-real-time. Figure [4-2](#526597_1_En_4_Chapter.xhtml#Fig2) illustrates
    this.


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig2_HTML.png)


    An illustration depicts the data pipeline as a set of processes that ingests the
    structured or unstructured data and retrieves and transforms the data through
    data lakes or data warehouses which is further analyzed through `AI` or `ML` processes.


    Figure 4-2


    Data pipeline process


    The data can also be unstructured or structured. Unstructured data can be from
    a multitude of resources, including Internet-based platforms such as `Twitter`,
    to an automotive device emanating data.


    Structured data usually originates from within the company’s applications. This
    data needs to be combined at a landing zone of object stores. These object stores
    can be on-premises or in the cloud. Once the data is ingested into the object
    stores, it is then retrieved and transformed, usually through an `ETL` process
    in other datastores such as data lakes or data warehouses. This data is then further
    analyzed using `BI` tools such as `Power BI` and `Tableau` or further processed
    with the `AI`/`ML` processes.


    This whole process—from data ingestion to consumption—is called the data pipeline.


    Let’s dive a bit deeper into the various sub-processes outlined in the data pipeline
    process.


    ### 4.1.1 Acquire Data


    Acquiring data is the first step in the data pipeline process. Here, business
    owners and data architects decide on what data to use to fulfil the requirements
    for a specific use case.


    For example, in the case of a collision event detection for `OnStar`, the data
    needs to be acquired from `Sensors`. This sensor data then needs to be combined
    with data from internal and external partners, like `finance`, `towing` partners,
    `rental` partners, and so on.


    Table [4-1](#526597_1_En_4_Chapter.xhtml#Tab1) shows the data, the type of data,
    and the sources for a vehicle event-driven pipeline.


    Table 4-1


    Data Identification


    | Data | Type of Data | Data Source |

    | --- | --- | --- |

    | `Sensor` | Unstructured (`JSON`, `CSV`) | `Sensors` |

    | `Rental info` | Relational (`RDBMS`) | External `rental` agency |

    | `User info` | Relational (`RDBMS`) | `OnStar` registration |

    | `Vehicle info` | Relational (`RDBMS`) | `Vehicle` data systems |

    | `Towing info` | Relational (`RDBMS`) | External `towing` company |


    ### 4.1.2 Store/Ingest Data


    The data from various sources is acquired and stored as raw data into the store
    of choice. The method of ingestion can be stream-based or batch-based.


    For example, in the case of `OnStar`, sensor data is streamed at regular intervals
    or is event-based. Other data, such as `rental` info, can either be batch based
    or on-demand query driven. The raw datastore can be an `S3` object store hosted
    in the cloud or on-premises.


    ### 4.1.3 Transform Data


    The data that is stored raw in the object store is then processed. The process
    may include converting or transforming unstructured data into structured data
    and storing it in an `RDBMS` database.


    For example, in `OnStar`, partner data and internal data will be combined and
    transformed into a common data model. The sensor data will also be transformed
    into an `RDBMS` format.


    ### 4.1.4 Load Data


    Once the data is transformed, it is then loaded into a single or multiple databases
    with a common schema. This schema is based on a predefined data model specific
    to the use case. The target datastore can be a data lake or another `RDBMS` store.
    Here again, it depends on the type of analysis that needs to be done.


    For example, if this is an `OLTP` type of analysis, the data needs to be processed
    and sent to requesting systems quickly. This would require an `RDBMS` store. Data
    that needs to be available for reporting and research can be stored in a data
    lake.


    ### 4.1.5 Analyze Data


    During this sub-process, the data that is stored in a data lake or `RDBMS` will
    be analyzed using tools such as `Tableau`, `Power BI`, or a dedicated web page
    for reporting.


    In the case of `OnStar`, data that is stored in the data lake will be analyzed
    using `Tableau` or `Power BI`, while the data that needs immediate attention will
    be analyzed by a custom dashboard or reporting interface on the web.


    `Spring Cloud Function` plays an integral role in the whole process, especially
    when combined with tools such as `Spring Cloud Data Flow`, `AWS Glue`, `Azure
    Data Factory`, `Google`’s data flow, and so on. You will dive deep into these
    tools in this chapter.


    ## 4.2 `Spring Cloud Function` and `Spring Cloud Data Flow` and `Spring Cloud
    Streams`


    `Spring Cloud Data Flow` (SCDF) is a Spring.io-based product that supports the
    creation and deployment of a data pipeline. It supports batch and event-driven
    data, which makes it versatile. SCDF pipelines can be built programmatically or
    wired up through a GUI. It is heavily based on the Spring Framework and Java,
    which makes it very popular among Spring developers.


    Figure [4-3](#526597_1_En_4_Chapter.xhtml#Fig3) shows a sample dashboard of SCDF
    with a simple data pipeline that has a source, a processor, and a sink. You can
    drag-and-drop from the available components to build the pipeline. You can also
    build your custom source, processors, and sinks and deploy them for use within
    your enterprise.


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig3_HTML.jpg)


    A screenshot of a `SCDF`. It shows the stream vehicle data pipelines definition,
    status and applications.


    Figure 4-3


    A sample graphical representation of a data pipeline in `SCDF`


    As you can see from the dashboard, you can build stream-based or batch-based (task)
    data pipelines and manage these through a single dashboard.


    `SCDF`, unlike other the data pipeline tools available in the cloud, can be deployed
    in a `Kubernetes`, `Docker`, or `Cloud Foundry` environment, making it a portable
    tool for data pipeline development and deployment.

