    Step 7: Testing. The best way to get the URL to test is to connect to the cluster
    via the command line and get the URL, as explained in Chapter [2](#526597_1_En_2_Chapter.xhtml).


    Run `$ kn service list` to get the URL for testing, as shown in Figure [3-38](#526597_1_En_3_Chapter.xhtml#Fig38).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig38_HTML.jpg)


