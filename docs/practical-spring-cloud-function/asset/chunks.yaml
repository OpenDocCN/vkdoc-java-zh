    ## Spring Cloud Function on the Cloud with Azure IoT


    This is the same use case as in the prior example, where an automotive assembly
    plant wants to ensure that its robots are performing well. The data from the sensors
    needs to be collected and analyzed for anomalies. Each assembly plant is walled
    off from the public Internet through firewalls.


    The solution with Azure is very similar to the one you saw with AWS Greengrass.
    You need a way to get the device information from the plant floor, analyze it,
    and respond to it with an action within the plant floor, and then send the data
    to the cloud for further processing. Actionable insights are made closer to the
    devices.


    ### Components


    *   `Azure IoT Edge Device`


    *   `Azure IoT hub`


    *   `Spring Cloud Function` running on `Azure Functions` environment and deployed
    on the `Azure IoT Edge`


    *   `Azure Blob store` to store data in the cloud


    ### Azure IoT Edge Device


    The `IoT Edge` device manages communications between downstream leaf devices and
    the `IoT hub`. In this case, the leaf devices are robots with sensors. The `IoT
    Edge` device has a runtime that enables cloud logic on the devices. It supports
    `Azure Functions` to run on the edge device. See Figure [6-5](#526597_1_En_6_Chapter.xhtml#Fig5).


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig5_HTML.jpg)


    A diagram of `azure I o T edge device` has `azure I o T edge runtime` that connects
    to 3 modules: telemetry, insight, and action. Telemetry includes temperature and
    pressure. Insight includes `azure streaming analytics` and `azure M L`. Action
    includes `spring cloud function` and `azure functions`.


    Figure 6-5


    `Azure IoT Edge Device` implementation


    ### Azure IoT Hub


    This hub is a managed service offering from Azure that allows you to collect data
    from IoT devices and send them to other Azure services for further processing.
    This is an IoT gateway where you can connect and manage your devices through a
    single portal. More information can be found at [`https://docs.microsoft.com/en-us/azure/architecture/reference-architectures/iot`](https://docs.microsoft.com/en-us/azure/architecture/reference-architectures/iot).


    This is straightforward, as Azure has Java-based SDKs to help build the `Spring
    Cloud Function` clients. You also learned that you can deploy `Lambda` functions
    locally.

