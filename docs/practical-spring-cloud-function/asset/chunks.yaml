    ## 6.4 Spring Cloud Function 在 Azure IoT Edge 上


    Spring Cloud Function 将部署在 Azure IoT Edge 设备上。Azure IoT Edge 允许部署容器化函数。更多信息请参见
    [`https://learn.microsoft.com/en-us/azure/iot-edge/tutorial-deploy-function?view=iotedge-1.4`](https://learn.microsoft.com/en-us/azure/iot-edge/tutorial-deploy-function%253Fview%253Diotedge-1.4)。


