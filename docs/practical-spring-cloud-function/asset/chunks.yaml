    \ 3-5 展示了该工作流的执行示例。\n\n![](img/526597_1_En_3_Fig5_HTML.png)\n\n第 3 章 S C F 加 Lambda\
    \ 的截图。在 jobs 下选中了 build-deploy。build-deploy 窗口包含设置任务、运行操作、运行 aws-actions、使用 Maven\
    \ 构建、运行 Sam 打包和部署、post 运行 aws 等。\n\n图 3-5\n\n工作流的成功执行\n"
- fmt: '

    ## 3.2 ArgoCD


    While GitHub Actions can push code to serverless environments such as Lambda,
    it lacks a good graphical representation of code deployed when it comes to the
    Kubernetes environment. Kubernetes is a orchestrator of containers and has a plethora
    services that manage deployments. ArgoCD was created for Kubernetes. ArgoCD is
    a declarative CD (Continuous Delivery) tool, which means application definitions,
    configurations, and environments can be version controlled. ArgoCD, similar to
    GitHub Actions, uses Git repositories as a single source of truth. This is also
    known as `GitOps`.


    > Declarative means configuration is guaranteed by a set of facts instead of by
    a set of instructions.


    Declarative `GitOps` allows the programmer or the ones who created the application
    to control the configuration of the environment in which the environment will
    run. This means the programmer does not have to rely on different teams, such
    as infrastructure or DevOps teams, to manage the pieces of the application. The
    programmers are in control, and this is a good thing.


    ArgoCD set up is mostly programmatic and relies on the underlying Kubernetes configmaps.
    This is, as you can see, is different from other tools like `Jenkins`.


    Here is how I set up the ArgoCD environment.


    Prerequisites:


    * A Kubernetes cluster

    * `Kubectl` CLI configured to access your cluster

    * ArgoCD CLI installation instructions can be found at [`https://argo-cd.readthedocs.io/en/stable/cli_installation/`](https://argo-cd.readthedocs.io/en/stable/cli_installation/)


    Step 1: Create a namespace for ArgoCD.


    Run the following command against your Kubernetes cluster:


    ```

    $kubectl create namespace argocd

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig6_HTML.jpg)


    A screenshot of creating an ArgoCD namespace. The screenshot reads, dollar sign
    `kubectl` create namespace `argocd` namespace forward slash `argocd` created.


    Figure 3-6


    Create an ArgoCD namespace


    Step 2: install ArgoCD.


    ```

    $kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

    ```


    This will go through a lengthy process to install ArgoCD. Once the installation
    is successful, you can validate it by using the following command:


    ```

    $kubectl get all -n argocd

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig7_HTML.jpg)


    A screenshot describes the status of an ArgoCD installation run logs. It includes
    name, status, restarts, etc.


    Figure 3-7


    View the status of an ArgoCD installation


    Now you can see that the ArgoCD services are up and running. Notice that an external
    IP has not been associated with `service/argocd-server`.


    Run the following command to attach a LoadBalancer to the `argocd-server`:


    ```

    $kubectl patch svc argocd-server -n argocd -p ''{"spec": {"type": "LoadBalancer"}}''

    ```


    Now run the following command:


    ```

    $kubectl get svc -n argocd

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig8_HTML.jpg)


    A screenshot of the external IP of `argocd-server` run logs. It contains name,
    type, cluster-IP, external-IP, port, and age.


    Figure 3-8


    Take note of the external IP of `argocd-server`


    You will see an external IP associated with `argocd-server`. This will allow you
    to connect to the `argocd-server`.


    Before you start to use ArgoCD, you need to change the “admin” user password.
    You can use `Kubectl` to read the secret associated with the “admin” user.


    Run the following command:


    ```

    $ kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}"
    | base64 -d; echo

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig9_HTML.jpg)


    A screenshot of getting the password of admin user. The screenshot depicts a code.


    Figure 3-9


    Get the password of the "admin" user


    The output of this command is the password for the “admin” user.


    You can now log in using the web browser. Then navigate to the `20.119.112.240`
    URL to change the password.


    Log in to ArgoCD with the following command:


    ```

    $argocd login 20.119.112.240

    ```


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig10_HTML.jpg)


    A screenshot of logging in to ArgoCD run logs. If it gets a warning error, the
    command is a certificate signed by an unknown authority. Run logs contain details
    and the admin logged in successfully.


    Figure 3-10


    Log in to ArgoCD


    You have successfully installed and connected to ArgoCD. Figure [3-11](#526597_1_En_3_Chapter.xhtml#Fig11)
    shows a sample of the ArgoCD UI.


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig11_HTML.png)


    A screenshot of deploying an application in ArgoCD UI. It depicts `Payroll-h2`
    which contains project, labels, status, repository, path, destination, etc. The
    status is healthy and synced.


    Figure 3-11


    ArgoCD UI showing an app deployed


    Now that you have learned about GitHub Actions and ArgoCD, you can move on to
    deploying your application and automating the CI/CD process.


    ## 3.3 Building a Simple Example with Spring Cloud Function


    You will use the same example from Chapter [2](#526597_1_En_2_Chapter.xhtml),
    but instead of using the `EmployeeConsumer` interface, this example uses `EmployeeSupplier`.
    In order to do that, you need a prepopulated database. You’ll then query the database
    using a supplier function. You can find the code at [`https://github.com/banup-kubeforce/payroll-h2`](https://github.com/banup-kubeforce/payroll-h2).


    Here are the required changes.


    Step 1: Create scripts to populate the H2 database when the function starts up.
    Create a schema that creates the `employee` table. Store the script in a `Schema.sql`
    file, as shown in Listing [3-2](#526597_1_En_3_Chapter.xhtml#PC9).


    ```

    DROP TABLE IF EXISTS employee;

    CREATE TABLE employee (

    id INT AUTO_INCREMENT PRIMARY KEY,

    name varchar(250),

    employeeid varchar(250),

    email varchar(250),

    salary varchar(250)

    );

    Listing 3-2

    Schema.sql

    ```


    Populate the database with an `INSERT` statement. Then create a file called `Data.sql`
    and store the `INSERT` statement in it, as shown in Listing [3-3](#526597_1_En_3_Chapter.xhtml#PC10).


    ```

    INSERT INTO employee (name, employeeid, email, salary) values

    (''banu'',''001'',''banup@yahoo.com'',''10000'');

    Listing 3-3

    Data.sql

    ```


    Add these two files to the resources folder of the main project, as shown in Figure
    [3-12](#526597_1_En_3_Chapter.xhtml#Fig12).


    ![](images/526597_1_En_3_Chapter/526597_1_En_3_Fig12_HTML.jpg)


    A screenshot of the Spring Boot project structure. In a project structure, the
    `src` folder is selected. It contains a resources folder. Resources folder includes
    `data.sql`, and `schema.sql` folders along with other folders.


    Figure 3-12


    Spring Boot project structure with `data.sql` and `schema.sql`


    Modify the `Application.properties` as follows. Change `spring.cloud.function.definition`
    from `employeeConsumer` to `employeeSupplier`. This will route function calls
    to `employeeSupplier`. See Listing [3-4](#526597_1_En_3_Chapter.xhtml#PC11).


    ```

    spring.cloud.function.definition=employeeSupplier

    spring.datasource.url=jdbc:h2:mem:employee

    spring.datasource.driverClassName=org.h2.Driver

    spring.datasource.username=sa

    spring.datasource.password=

    spring.h2.console.enabled=true

    spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

    spring.jpa.defer-datasource-initialization=true

    Listing 3-4

    Application.properties

    ```


    Also add `spring.jpa.defer-datasource-initialization=true` to ensure that the
    data gets populated on startup.


    No other code changes are required. It is important to note that the changes you
    made only affect the configuration file.

    '
