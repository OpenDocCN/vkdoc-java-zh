  trans: "\n2.  执行 AI/ML 任务\n    *   特征工程：这指的是所有用于从原始数据中提取和选择特征以构建预测模型的活动。这包括利用领域知识从原始数据中选择并转换最相关的变量。特征工程的目标是提升机器学习算法的性能。预测模型的成功或失败取决于特征工程，并确保模型对人类可解释。\n\
    \n    *   训练模型：在此步骤中，机器学习算法会通过足够的训练数据进行学习。训练模型的数据集包含样本输出数据和影响输出的输入数据集。这是一个迭代过程，将输入数据通过算法进行处理，并将其与样本输出进行关联。然后使用结果调整模型。这个迭代过程称为“模型拟合”，直到模型精度达到目标。\n\
    \n    *   模型评估：此过程涉及使用指标来理解模型的性能，包括其优势和不足。例如，在进行分类预测时，指标可以包括真正例、真负例、假正例和假负例。其他衍生指标可以是准确率、精确率和召回率。模型评估可帮助您判断模型的表现、模型的实用性、额外训练如何提升性能，以及是否需要增加更多特征。\n\
    \n    *   部署模型：此过程涉及将模型部署到实际运行环境中。这些模型可以通过模型服务的方式暴露给其他流程。模型的部署可能涉及将模型存储在如 Google\
    \ Cloud Storage 等存储服务中。\n\n3.  监控 AI/ML 模型\n\n在此过程中，您需要确保模型正常运行且预测结果有效。需要监控模型的原因是，模型可能因以下因素随时间推移而退化：\n\
    \n让我们从计算角度评估这些活动。这将帮助我们确定可以分配给这些流程的计算元素类型。\n\n此过程中的某些活动是短暂的，而另一些则是长期运行的流程。例如，部署模型和访问已部署的模型是短暂的流程。而训练模型和模型评估则需要手动和编程干预，并且会消耗大量计算时间。\n\
    \n表 5-1 展示了可用于这些流程的计算类型。某些流程是手动操作的。\n\n表 5-1\n\n在 AI/ML 流程中使用 Spring Cloud Function\
    \ 的场景\n\n| AI/ML 流程 | 人工 | 计算 |   |\n| --- | --- | --- | --- |\n|   |   | **Spring\
    \ Cloud Function（短时运行）** | **批量处理（长时运行）** |\n| 模型需求 | 人工/手动流程 |   |   |\n| 收集数据\
    \ |   | 集成触发器、数据管道源或目标 | 数据管道流程-转换 |\n| 数据清洗 |   | 集成触发器 | 转换流程 |\n| 数据标注 |  \
    \ | 标注离散元素-更新、删除 | 批量标注 |\n| 特征工程 | 手动 |   |   |\n| 训练模型 |   | 训练触发器 | 训练流程 |\n\
    | 模型评估 | 手动 | 评估触发器 | 批量评估 |\n| 部署模型 |   | 模型服务、模型 | 批量存储 |\n| 监控模型 |   | 报警 |\
    \   |\n\nAI/ML 流程需要的计算和存储需求各不相同。根据模型规模、训练所需时间、模型复杂度等因素，流程在不同阶段可能需要不同的计算和存储资源。因此，环境需要具备可扩展性。在早期，AI/ML\
    \ 活动通常通过固定基础设施进行，如过度分配的虚拟机、专用的裸金属服务器或并行/并发处理单元。这种方式使整个过程成本高昂，只有资金充足的公司才能开展规范的\
    \ AI/ML 活动。\n\n如今，随着各大云服务商通过 API 或 SaaS 方式提供 AI/ML 功能，并支持按使用量付费或按需付费模式，大小企业都开始在计算活动中应用\
    \ AI/ML。\n\n云函数等范式使利用云提供的可扩展平台变得更加容易。模型存储和检索等操作可以通过云函数按需完成。通过云函数提供预训练模型非常简便，且这些模型可以无需安装客户端库即可对任何客户端可用。以下是云函数在\
    \ AI/ML 中的优势：\n\n*   无需编写代码即可进行推理，使入门变得简单\n*   可扩展的基础设施\n*   无需管理基础设施\n*   模型独立存储，便于追踪版本和比较性能\n\
    *   成本结构允许按使用量付费\n*   支持使用不同框架\n\n### 5.1.1 在 AI/ML 中选择 Java、Python 或其他语言的考量\n\
    \n大多数流行框架（如 TensorFlow）是用 Python 编写的，因此模型输出也基于 Python。因此，从事 AI/ML 工作的任何人都可以轻松使用\
    \ Python。参见图 5-2。\n\n![](img/526597_1_En_5_Fig2_HTML.jpg)\n\n一张展示最流行编程语言的水平条形图。图中提到了全球语言的标志、百分比和笔记本电脑图像。Python\
    \ 占比最高为 25.95%，Ruby 占比最低为 1.53%。\n\n图 5-2\n\nAI/ML 语言流行度\n\n需要明确的是，语言的流行度并不等同于其在\
    \ AI/ML 中的适用性。选择 Java 而非 Python 或 R 的原因包括：\n\n*   企业已标准化使用 Java，因此更倾向于使用 Java\
    \ 开发 AI/ML 平台以简化与现有系统的集成。\n\n*   Apache.org 作为 Java 的开源社区非常强大，拥有大量经过优化的库和工具，这些工具针对计算速度、数据处理等方面进行了调优。Hadoop、Hive\
    \ 和 Spark 等工具是 AI/ML 流程的重要组成部分。开发者可以轻松在 Java 代码中使用这些工具和库。\n\n*   Java 可以在 AI/ML\
    \ 流程的所有环节中使用，包括数据收集、清洗、标注、模型训练等。这样您就可以统一使用一种语言满足 AI/ML 需求。\n\n*   JVM 允许应用程序在不同机器类型间移植。\n\
    \n*   由于 Java 的面向对象机制和 JVM，使其更容易实现扩展。\n\n*   在算法和 JVM 层面进行适当调优后，基于 Java 的 AI/ML\
    \ 计算可以实现更快的性能。因此，Twitter、Facebook 等平台更倾向于使用 Java。\n\n*   Java 是一种强类型编程语言，意味着开发者必须明确且具体地定义变量和数据类型。\n\
    \n*   最后，生产代码库通常使用 Java 编写。如果您希望构建企业级应用，Java 是首选语言。\n\n由于 Java 是 AI/ML 企业的首选语言，我们可以安全地认为，Spring\
    \ Cloud Function 是开发企业级 AI/ML 函数时更优的框架。\n\n本章将探讨不同云服务商提供的各项服务，并解释如何使用 Spring Cloud\
    \ Function 与这些服务进行整合。\n"
- fmt: '

    ## 5.2 Spring Framework and AI/ML


    A lot of frameworks have been developed in Java that can be leveraged using the
    Spring Framework. The latest of these frameworks was developed by AWS and is called
    `djl-serving` (Deep Java Library). This library can integrate with PyTorch, TensorFlow,
    Apache MXNet, ONNX, Python, and TFLite based models.


    One of the important capabilities that you need is model serving, where you can
    leverage `Spring Cloud Function` to serve trained models, and `djl-serving` provides
    this capability out of the box. It’s called `djl-serving`.


    `Spring Cloud Function` is unique in its ability to transcend the on-premises
    and cloud, especially in the realm of AI/ML. Even though cloud has become popular,
    not all companies have fully transitioned to the cloud. Most of them in fact have
    adopted a hybrid approach. Some of the applications and data still reside in the
    company-owned datacenters or are co-hosted in datacenters operated by third-party
    service providers. AI/ML activities revolving the data that is residing in the
    datacenters will need to have models that are trained and stored and be served
    using cloud functions that can be hosted in the datacenter. Cloud functions hosted
    in the datacenter are nearer to their data and therefore have better performance
    than cloud functions that are hosted in the cloud and access models that are trained
    and stored in the on-premises datacenters. This is where `Spring Cloud Function`
    can help serve models on-premises. See Figure [5-3](#526597_1_En_5_Chapter.xhtml#Fig3).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig3_HTML.jpg)


    An illustrated model of the on-prem data center. The flow of data includes trained
    model data, the model serving, an enterprise application, a firewall, and an external
    application.


    Figure 5-3


    On-premises and `Spring Cloud Function` deployment for model serving


    ## 5.3 Model Serving with Spring Cloud Function with DJL


    Before you explore the cloud provider’s option, it’s a good idea try this out
    locally. To do that, you need a framework installed and access to a good tensor
    model and an image. The framework that you use in this example is called `djl-serving`.


    ### 5.3.1 What Is DJL?


    `Deep Java Library` (DJL) [`https://docs.djl.ai/`](https://docs.djl.ai/) is a
    high-level, engine-agnostic Java framework for deep learning. It allows you to
    connect to any framework like `TensorFlow` or `PyTorch` and conduct AI/ML activities
    from Java.


    DJL has also great hooks to `Spring Boot` and can easily be invoked through the
    `Spring Framework`. `DJL` acts as an abstraction layer across frameworks and makes
    it easy to interact with those frameworks, as shown in Figure [5-4](#526597_1_En_5_Chapter.xhtml#Fig4).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig4_HTML.jpg)


    A model of layers of the `Deep Java Library`. It includes a Java framework with
    a logo of `Spring Boot`, and `Spring Cloud Function`. An ML framework of `MXNet`,
    `TensorFlow`, `PyTorch`. `Deep Java Library` is mentioned between the frameworks.


    Figure 5-4


    `Deep Java Library` (DJL) layers


    There are many components in `DJL` that are useful to look at, but the `djl-serving`
    is interesting.


    Run the following commands to get the `djl-serving` bits. Then unzip the file
    into your directory of choice and set the path to the `serving.bat` located at
    `~\djl-serving\0.19.0\bin\serving.bat`. This will allow you to execute serving
    from anywhere on your machine.


    ```

    curl -O https://publish.djl.ai/djl-serving/serving-0.19.0.zip

    unzip serving-0.19.0.zip

    ```


    Listing [5-1](#526597_1_En_5_Chapter.xhtml#PC2) shows a sample run of `djl-serving`
    with a `TensorFlow` model.

    '
