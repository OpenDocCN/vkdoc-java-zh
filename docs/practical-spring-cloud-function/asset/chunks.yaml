    ## 5.7 Summary


    As you learned in this chapter, you can serve models using `Spring Cloud Function`.
    But you also learned that serving models using `Spring Cloud Function` and Java
    is a stretch because the AI/ML models are written in Python. While Python may
    be popular, it is also important to note that in an enterprise, `Java` is king.
    Finding ways to leverage `Java` in AI/ML is the key to having an integrated environment
    within your enterprise. Cold starts of Python-based functions take a long time.
    This is where using `Java` and frameworks such as GraalVM speeds up the startup
    times.


    The next chapter explores some real-world use cases of IoT and Conversation AI
    and explains how `Spring Cloud Function` can be used.


    Footnotes [1](#526597_1_En_5_Chapter.xhtml#Fn1_source)   [2](#526597_1_En_5_Chapter.xhtml#Fn2_source)


    # 6. Spring Cloud Function and IoT


    This chapter covers `Spring Cloud Function` implementations with IoT. You''ll
    see some real-world examples from manufacturing and logistics. You explore how
    `Spring Cloud Function` can operate with existing IoT platforms on the cloud and
    in datacenters. You also explore some specific implementations in Penske, which
    is interesting, as they can be applied to nearly all IoT-related scenarios.


    Before you explore the solutions, you need to dive a bit into IoT and understand
    the status of the IoT market. You''ll also look at some surveys on why `Java`
    is the preferred enterprise language for IoT development.


    ## 6.1 The State of IoT


    IoT (Internet of Things) has been growing and is expected to grow 22 percent in
    2022\. This phenomenal growth has led to a plethora of data that needs to be acquired
    and processed.


    According to a study by `iot.eclipse.org`, which is available at [`https://iot.eclipse.org/community/resources/iot-surveys/assets/iot-developer-survey-2020.pdf`](https://iot.eclipse.org/community/resources/iot-surveys/assets/iot-developer-survey-2020.pdf),
    you can see that `Java` is the preferred language, both in the edge and in the
    cloud. Implementations on the edge are moving to containerization, per the study.
    This is great for `Knative` on `Kubernetes` installations on the edge.


    Furthermore, the `Spring Framework` has been the platform of choice for many IIoT
    (Industrial IoT) projects. You can review a presentation at a `SpringOne` event
    in 2017 at [`https://youtu.be/MReQD9tXQuA`](https://youtu.be/MReQD9tXQuA).


    `Spring Cloud Streams`, `Spring Cloud Data Flow`, `Spring Integration`, `Spring
    MQTT`, `Spring Data`, and `Spring XD` play a significant role in IoT data acquisition,
    storing, and the transformation pipeline.


    ### 6.1.1 Example Spring Implementation


    Consider this example implementation of `Spring` and its components in a connected
    fleet scenario.


    The team at Penske leveraged `Spring`-based microservices, `Spring Cloud Streams`
    in combination with `Spring Cloud Data Flow`, to acquire data from sensors that
    were installed on Penske trucks. This application allowed Penske to monitor the
    trucks, do predictive maintenance, and manage the trucks in real-time. See Figure
    [6-1](#526597_1_En_6_Chapter.xhtml#Fig1).


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig1_HTML.png)


    A diagram depicts components of Penske''s connected fleet. The truck fleet sends
    2 billion pings per day to poller apps, which along with `Spring Cloud Data Flow`
    streams, and microservices connect to the `Tanzu` application service. `Kafka
    on A W S` along with `VMware Tanzu Gemfire`, `Postgres`, and `Greenplum` receive
    this data. Business users, real time analytics, and `Wavefront` for observability
    as a service are the end users.


    Figure 6-1


    Penske connected fleet implementation with `Spring Cloud Function`


    More information is available on the `SpringOne` website at [`https://springone.io/2020/sessions/iot-scale-event-stream-processing-for-predictive-maintenance-at-penske`](https://springone.io/2020/sessions/iot-scale-event-stream-processing-for-predictive-maintenance-at-penske).


    Let’s dig a little more into the IoT process; see Figure [6-2](#526597_1_En_6_Chapter.xhtml#Fig2).


    ![](images/526597_1_En_6_Chapter/526597_1_En_6_Fig2_HTML.jpg)


    A flow diagram depicts the IoT process flow that starts from IoT sensors, stream
    acquisition, raw storage, transformation, data lake storage, and ends in analysis.


    Figure 6-2


    IoT Process flow


    As in any data pipeline process, the IoT process includes acquiring data from
    sensors in the field. This data is then stored, transformed, and loaded into data
    lakes for further analysis.


    Depending on the type of application, sensors send data either through a trigger
    event such as a repair or collision or via regular intervals. These intervals
    are 30 seconds to a minute in the case of logistics tracking or every few hours
    in the case of maintenance data. The data usually comes in as streams that need
    to be acquired. The most popular mechanism for acquisition is `Apache Kafka`.

