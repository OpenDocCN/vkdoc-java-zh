    ## 4.3 Spring Cloud Function and AWS Glue


    AWS Glue works very similarly to Spring Cloud Data Flow in that you can wire up
    a data pipeline that has a source, processor, and sink. More information can be
    found at [`https://us-east-2.console.aws.amazon.com/gluestudio/home?region=us-east-2#/`](https://us-east-2.console.aws.amazon.com/gluestudio/home%253Fregion%253Dus-east-2%2523/).


    Spring Cloud Function can participate in the data pipeline process as a trigger,
    or simply by integrating with one of the components in the data pipeline.


    For example, if you have AWS Kinesis as a source and you need to get data from
    a vehicle, you can have Spring Cloud Function stream the data that it gets into
    AWS Kinesis.


    In the example in this section, you will be publishing data into AWS Kinesis and
    then kick off an AWS Glue job manually.


    The flow will be:


    Spring Cloud Function ➤ Kinesis ➤ AWS Glue Job ➤ S3


    The prerequisites are:


    * Subscription to AWS, AWS Glue job, Kinesis, and S3


    * AWS Glue job with Kinesis as the source and S3 as the target


    * Code from GitHub at [`https://github.com/banup-kubeforce/Kinesis_trigger.git`](https://github.com/banup-kubeforce/Kinesis_trigger.git)


    It is assumed that you have some knowledge of AWS Glue, as we do not delve into
    the details of this product. The focus is on creating the Spring Cloud Function.


    ### 4.3.1 Step 1: Set Up Kinesis


    You can get to Kinesis at [`https://us-east-1.console.aws.amazon.com/kinesis/home?region=us-east-1#/`](https://us-east-1.console.aws.amazon.com/kinesis/home%253Fregion%253Dus-east-1%2523/).


    Once you subscribe to Kinesis, you can begin creating the data stream. Make sure
    you select on-demand (see Figure [4-21](#526597_1_En_4_Chapter.xhtml#Fig21)),
    as this will save you some money.


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig22_HTML.png)


    A screenshot depicts the active vehicle data stream under the monitoring tab.


    Figure 4-22


    vehicledatastream is active


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig21_HTML.jpg)


    A screenshot depicts the setup for Kinesis to create a data stream for a vehicle.
    It shows the data stream configuration, data stream capacity and data stream settings.


    Figure 4-21


    Create a vehicledatastream in AWS Kinesis


    You can now connect and publish to the stream using your Spring Cloud Function.


    ### 4.3.2 Step 2: Set Up AWS Glue


    You can access the AWS Glue Studio at [`https://us-east-1.console.aws.amazon.com/gluestudio/home?region=us-east-1#/`](https://us-east-1.console.aws.amazon.com/gluestudio/home%253Fregion%253Dus-east-1%2523/).


    Once you have the subscription, you can begin creating a glue job.


    Go to the AWS Glue Studio to start the creation of the glue job, as shown in Figure
    [4-23](#526597_1_En_4_Chapter.xhtml#Fig23).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig23_HTML.png)


    A screenshot depicts the creation of a job on AWS Glue Studio.


    Figure 4-23


    AWS Glue Studio, Create a Job


    Create a job called `vehicledatapipeline`. Use Amazon Kinesis as the source and
    Amazon S3 as the target. Ensure that you set the proper configurations for each
    of these components.


    The job shown in Figure [4-24](#526597_1_En_4_Chapter.xhtml#Fig24) will read Amazon
    Kinesis shards and post the data into Amazon S3.


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig24_HTML.png)


    A screenshot depicts the configuration of Amazon Kinesis as the source and Amazon
    S3 integration for each component.


    Figure 4-24


    Configure Kinesis and S3 integration


    Now you have a job in AWS Glue that you can trigger manually or via a function.


    ### 4.3.3 Step 3: Create a Function to Load Data into Kinesis


    **1: Set the application properties.** Make sure that you provide the stream name.
    AWS information has to be set, as shown in Listing [4-6](#526597_1_En_4_Chapter.xhtml#PC10).


    ```

    spring.cloud.function.definition=producerFunction

    #use your aws credentials here

    aws.access_key =

    aws.secret_key =

    aws.region = us-east-2

    #use your stream name that you have created

    aws.stream_name = vehicledatastream

    Listing 4-6

    application.properties

