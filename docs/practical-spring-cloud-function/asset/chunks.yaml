    ### 1.6.1 Spring Cloud Function on AWS Lambda on AWS


    Transforming an application deployed on-premises to leverage an AWS Lambda environment
    and be portable requires function code that abstracts away the hard dependencies
    of AWS Lambda from the implementation and the serverless container. This example
    uses Spring Cloud Function for the function code framework and Lambda for the
    container. By writing once using Spring Cloud Function, you can use the DevOps
    pipeline, discussed in subsequent chapters, to deploy to other serverless environments.
    Figure [1-11](#526597_1_En_1_Chapter.xhtml#Fig11) shows how AWS and its components
    help realize the payroll application in the cloud.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig11_HTML.jpg)


