    ## 1.3 Spring Cloud Function：一次编写，部署到任意云平台


    正如你从之前的讨论中所学到的，为 AWS Lambda、Google Cloud Functions 或 Azure Functions 编写函数是一种专有操作。你必须为超大规模云服务提供商编写特定的代码。超大规模云服务提供商指的是像
    AWS、Google 或 Azure 这样的大型云平台，它们拥有完整的硬件和设施组合，能够扩展到数千台服务器。如果你的策略是建立与单一超大规模云服务提供商的强关联关系，这种做法并不算坏，但随着时间推移，当你的策略转变为混合云或多云时，你可能需要重新思考你的方法。


    > *混合云由私有云和公有云组成，并作为一个整体进行管理。多云包含多个公有云，不包含私有云组件。*


    这就是 Spring Cloud Function 的用武之地。Spring.io 团队启动 Spring Cloud Function 项目时设定了以下目标：


    * 通过函数实现业务逻辑的推广。


    * 将业务逻辑的开发生命周期与任何特定运行时目标解耦，使得相同代码可以作为 Web 端点、流处理器或任务运行。


    * 支持跨无服务器提供商的统一编程模型，以及能够独立运行（本地或 PaaS 环境）的能力。


    * 在无服务器提供商上启用 Spring Boot 特性（自动配置、依赖注入、指标监控）。


    来源：[`spring.io/projects/spring-cloud-function`](https://spring.io/projects/spring-cloud-function)


    关键目标包括与特定运行时解耦，并支持跨无服务器提供商的统一编程模型。


    这些目标是如何实现的呢？


    * 使用 Spring Boot


    * 为 Function<T, R>（Predicate）、Consumer<T>和 Supplier<T>提供包装 Bean


    * 通过适配器将函数打包部署到目标平台，如 AWS Lambda、Azure Functions、Google Cloud Functions 和 Knative


    * Spring Cloud Function 的另一个令人兴奋的特点是它使函数能够在本地执行。这允许开发者在无需部署到云平台的情况下进行单元测试


    图 1-4 和图 1-5 展示了如何部署 Spring Cloud Function。当 Spring Cloud Function 与特定库捆绑时，它可以部署到
    AWS Lambda、Google Cloud Functions 或 Azure Functions。


    ![](img/526597_1_En_1_Fig5_HTML.jpg)


    模型图描述了 spring cloud function 与 K native 的部署方式。它被部署到超大规模云平台以及本地或混合云环境。


    图 1-5


    在云提供商提供的 Kubernetes 环境中部署 Spring Cloud Function 到 Knative serverless


    ![](img/526597_1_En_1_Fig4_HTML.png)


    模型图描述了 spring cloud function 的部署。使用特定实现库，spring cloud function 被部署到 Amazon 云、Google
    云和 Azure。


    图 1-4


    直接将 Spring Cloud Function 部署到云提供商提供的 FaaS 环境


    当 Spring Cloud Function 在 Knative 中容器化时，它可以部署到任何 Kubernetes 环境，无论是云平台还是本地环境。这是在混合云和多云环境中部署的首选方式。


    ## 1.4 Project Knative 与可移植的无服务器容器


    拥有可移植的无服务器容器同样重要。这可以最小化在云平台之间迁移所需的复杂性和时间。在云平台之间迁移以利用折扣定价，能够大幅节省成本。一种使用的方法称为*云爆发*（图
    1-6）。云爆发通过向云平台添加资源来弥补本地缺乏基础设施的问题。这通常是混合云的一个特性。


    ![](img/526597_1_En_1_Fig6_HTML.jpg)


    模型图描述了正常流量流向托管应用程序，流量激增时流向爆发应用程序。企业数据中心和公有云与托管和爆发应用程序同步。


    图 1-6


    云爆发


    图 1-6 显示，当流量激增时，为了弥补私有云资源不足的问题，资源会被分配到公有云平台，流量会被路由到那里。当流量激增结束后，公有云资源会被移除。这使得成本和资源的使用更加精准——即仅在流量激增期间使用额外资源。像黑色星期五购物节这样的电商活动期间的活动激增是一个很好的流量激增示例。


    仅靠可移植代码无法轻松实现这一点。你需要的不仅是可移植的代码，还需要可移植的容器。这样，容器才能跨云边界迁移以应对流量激增。在图 1-6 中，你可以看到 VMware
    的虚拟机被用作容器。由于数据中心和云平台中托管的虚拟机在结构上相似，因此云爆发成为可能。


    将这一概念应用于函数即服务（FaaS），你需要一种新的方法来实现底层无服务器容器的可移植性。


    云函数领域的一种革命性方法是 Knative。下一节将深入探讨 Knative。


    ### 1.4.1 容器、无服务器平台与 Knative


    为何需要容器/无服务器平台？


    在 IT 发展的过程中，需要对运行中的进程进行安全隔离。在 90 年代初期，基于 chroot jail 的隔离允许开发者创建和托管软件系统的虚拟化副本。2008
    年引入了 Linux Containers（LXC），为开发者提供了虚拟化环境。2011 年 Cloud Foundry 引入了容器的概念，2019 年通过
    Warden 实现了容器编排。2013 年推出的 Docker 提供了可以托管任何操作系统的容器。2014 年推出的 Kubernetes 提供了基于 Docker
    的容器编排能力。最终，2018 年推出的 Knative 扩展了 Kubernetes，使其能够运行无服务器工作负载。


    无服务器工作负载（Knative）的出现源于帮助开发者快速创建和部署应用程序的需求，而无需担心底层基础设施。无服务器计算模型负责资源的配置、管理、调度和补丁，使云提供商能够实现“按资源使用付费”的模式。


    借助 Knative，你可以在任何 Kubernetes 环境中运行可移植的无服务器容器。这使得 FaaS 在多云或多混合云环境中具备可移植性。


    除了提升开发者的生产力，无服务器环境还提供了更快的部署速度（参见图 1-7）。开发者可以采用“快速失败、频繁失败”的模式，更快地启动或关闭代码和基础设施，这有助于推动快速创新。


    ![](img/526597_1_En_1_Fig7_HTML.jpg)


    模型图描述了服务器在月度部署、虚拟机在分钟级部署、容器在秒级部署、无服务器在毫秒级部署。


    图 1-7


    无服务器部署速度最快

    '
- fmt: '

    ### 1.4.2 What Is `Knative`?


    `Knative` is an extension of `Kubernetes` that enables serverless workloads to
    run on `Kubernetes` clusters. Working with `Kubernetes` is a pain. The amount
    of tooling that is required to help developers move their code from the IDE to
    `Kubernetes` defeats the purpose of the agility that `Kubernetes` professes to
    bring to the environment. `Knative` automates the process of build packages and
    deploying to `Kubernetes` by provider operators that are native to `Kubernetes`.
    Hence, the names "K" and "Native".


    `Knative` has two main components:


    * `Serving`: Provides components that enable rapid deployment of serverless containers,
    autoscaling, and point-in-time snapshots


    * `Eventing`: Helps developers use event-driven architecture by providing tools
    to route events from producers to subscribers/sinks


    You can read more about `Knative` at [https://Knative.dev/docs](https://Knative.dev/docs).


    ## 1.5 Sample Use Case: Payroll Application


    Let’s look at how you can apply serverless functions to a real-life example.


    We introduced the payroll application in the beginning of the chapter, we’ll now
    build on it. Consider a payroll application with the configuration shown in Figure
    [1-8](#526597_1_En_1_Chapter.xhtml#Fig8).


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig8_HTML.jpg)


    A table describes business functions databases and integrations. Some of them
    are in business functions of reading employee records, and payment information
    in a database of employee records, and in Integrations of I R S.


    Figure 1-8


    Payroll application components


    Figure [1-9](#526597_1_En_1_Chapter.xhtml#Fig9) shows the configuration.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig9_HTML.png)


    A flow diagram describes the employee records and monthly pay data flows to validate
    employee data to compute salary. Monthly pay rates and tax tables flow to compute
    salary and some of them are taxes and savings information.


    Figure 1-9


    Payroll application flow


    Translating this flow diagram into an actual implementation that can be deployed
    in a corporate datacenter results in Figure [1-10](#526597_1_En_1_Chapter.xhtml#Fig10).
    You see that the functions are developed as REST APIs that are executed in batch
    mode. The REST APIs expose SAP ECC payroll modules. These REST APIs are run as
    batch jobs every 15 days. The databases are hosted on Oracle, and integrations
    are exposed using IBM API Connect (APIC). Note that this is not an on-demand process
    and can consume a lot of resources when idle. These REST APIs cannot be easily
    shut down and started up because a typical time for booting up a SAP NetWeaver
    component can be anywhere from 2 to 15 minutes, depending on the JVM configuration.
    These application components must be running constantly to keep the payroll application
    from breaking down.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig10_HTML.jpg)


    An architecture diagram describes an Oracle database of employee records and monthly
    pay data flows to validate employee data to compute salary. Monthly pay rates
    and tax tables flow to compute salary.


    Figure 1-10


    Current payroll architecture


    Using this use case, the following sections explore how you can leverage `Spring
    Cloud Function` to modernize and transform this application into a highly efficient,
    scalable, and portable system.


    ## 1.6 Spring Cloud Function Support


    `Spring Cloud Function` is supported in almost all cloud offerings, as shown in
    Table [1-1](#526597_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    `Spring Cloud Function` Support Among `Cloud Providers`


    | `AWS` | `Azure` | `Google` | `IBM Cloud` | `On-Premises` |

    | --- | --- | --- | --- | --- |

    | `Lambda` | `Azure Functions` | `Cloud Functions` | `IBM Functions` | `Tanzu
    with Knative` |

    | `EKS with Knative` | `AKS with Knative` | `GKE with Knative` | `Tanzu with Knative`
    | `OpenShift with Knative` |

    | `Fargate with Knative` | `ARO with Knative` | `OpenShift with Knative` | `OpenShift
    with Knative` | `Any Kubernetes offering with Knative` |

    | `ROSA with Knative` | `Tanzu with Knative` | `Tanzu with Knative` | `IBM Kubernetes
    with Knative` |   |

    | `Tanzu with Knative` |   |   |   |   |


    Abbreviations: `ROSA`: Red Hat OpenShift on `AWS`; `ARO`: Azure Red Hat OpenShift;
    `EKS`: Elastic Kubernetes Services; `AKS`: Azure Kubernetes Services; `GKE`: Google
    Kubernetes Engine


    ### 1.6.1 `Spring Cloud Function` on `AWS` Lambda on `AWS`


    Transforming an application deployed on-premises to leverage an `AWS` Lambda environment
    and be portable requires function code that abstracts away the hard dependencies
    of `AWS` Lambda from the implementation and the serverless container. This example
    uses `Spring Cloud Function` for the function code framework and `Lambda` for
    the container. By writing once using `Spring Cloud Function`, you can use the
    DevOps pipeline, discussed in subsequent chapters, to deploy to other serverless
    environments. Figure [1-11](#526597_1_En_1_Chapter.xhtml#Fig11) shows how `AWS`
    and its components help realize the payroll application in the cloud.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig11_HTML.jpg)


    An architecture diagram describes a relational database of employee details flows
    to validation to compute salary. Pay rates and tax flow to compute salary. It
    flows through Amazon S Q S to the `Spring Cloud Function`.


    Figure 1-11


    `Spring Cloud Function` on `AWS`


    Follow this process to deploy the payroll system on `Knative` hosted on an `Azure`
    AKS and ensure that the SAP ECC and Oracle DB are up and integrated. You do this
    before developing and deploying `Spring Cloud Function` on `Knative`:


    1. Deploy SAP ECC on `AWS` EC2 instances.


    2. Deploy Oracle DB as an RDS instance.


    3. Configure the SAP to Oracle integration.


    4. Set up `Knative` on an `AWS` EKS cluster.


    5. Deploy `Spring Cloud Function` on `Knative`.


    6. Set up the `Amazon API Gateway`.


    7. Set up `Amazon SQS` for messaging.

    '
