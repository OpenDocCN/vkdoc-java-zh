    ## Point the Rabbit Source to Your RabbitMQ Instance


    You have to point the Rabbit source to your RabbitMQ instance. There are three
    categories in the form to populate. Open and fill in the appropriate fields. I
    used `username`, `password`, `port`, `host`, and `queue`, as shown in Figure [4-15](#526597_1_En_4_Chapter.xhtml#Fig15).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig15_HTML.jpg)


    ### Configure the Transform


    In this example, you simply transform the incoming string to uppercase. Note that
    you have to use `SpEL` (Spring Expression Language). More information on `SpEL`
    is available at [`https://docs.spring.io/spring-framework/docs/3.0.x/reference/expressions.xhtml`](https://docs.spring.io/spring-framework/docs/3.0.x/reference/expressions.xhtml).
    See Figure [4-16](#526597_1_En_4_Chapter.xhtml#Fig16).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig16_HTML.jpg)


    ### Configure the Sink


    In this case, you just use a simple log. No configuration is required. See Figure
    [4-17](#526597_1_En_4_Chapter.xhtml#Fig17).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig17_HTML.jpg)


    ### Wire up the Data Pipeline


    Once you wire up, you will get a data pipeline. This will also show a `Stream
    DSL` (Domain Specific Language) expression that you can save and reuse using a
    `SCDF` shell or dashboard, as shown in Figure [4-18](#526597_1_En_4_Chapter.xhtml#Fig18).


    ![](images/526597_1_En_4_Chapter/526597_1_En_4_Fig18_HTML.png)


    ### Deploy the Stream


    #### Step 4: Create a Function to Publish Data to RabbitMQ


    Here, you create a Spring Cloud Function to publish the data to start the data-pipeline
    process.


    The components that you will create are as follows:


    * `SenderConfig`

    * `QueueSender`

    * `SenderFunction`


    Prerequisites:


    * A POM with the necessary dependencies for RabbitMQ and Spring Cloud Functions,
    as shown in Listing [4-1](#526597_1_En_4_Chapter.xhtml#PC5).


    ```

    org.springframework.boot

    spring-boot-starter-data-jpa


    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-amqp


    org.springframework.cloud

    spring-cloud-function-web


    org.springframework.boot

    spring-boot-starter-test

    test


    org.springframework.cloud

    spring-cloud-dependencies

    ${spring-cloud.version}

    pom

    import

    ```


    #### Step 5: Add RabbitMQ Server and Configuration References


    Add the RabbitMQ server and configuration references to the `application.properties`
    file, as in Listing [4-2](#526597_1_En_4_Chapter.xhtml#PC6).


    ```

    spring.cloud.function.definition=`senderFunction`

    spring.rabbitmq.host=`20.40.208.246`

    spring.rabbitmq.port=`5672`

    spring.rabbitmq.username=`banup`

    spring.rabbitmq.password=`pa55word`

    queue.name=`VehicleInfo`

    ```


    #### Step 6: Create the SenderConfig Component


    This is a simple setter for the `queue` name. You can expand this to include other
    RabbitMQ configurations. This is the entity definition (see Listing [4-3](#526597_1_En_4_Chapter.xhtml#PC7)).


    ```

    package com.kubeforce.scdffunctiontigger;

    import org.springframework.amqp.core.Queue;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    @Configuration

    public class SenderConfig {

    @Value("${queue.name}")

    private String `message`;

    @Bean

    public Queue `queue`() {

    return new Queue(`message`, true);

    }

    }

    ```


    #### Step 7: Create the QueueSender Component


    You use a `RabbitTemplate` from the `springframework amqp` library to define the
    connection to the RabbitMQ instance (see Listing [4-4](#526597_1_En_4_Chapter.xhtml#PC8)).


    ```

    package com.kubeforce.scdftrigger;

    import org.springframework.amqp.core.Queue;

    import org.springframework.amqp.rabbit.core.RabbitTemplate;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;

    @Component

    public class QueueSender {

    @Autowired

    private RabbitTemplate `rabbitTemplate`;

    @Autowired

    private Queue `queue`;

    public void `send`(String `order`) {

    `rabbitTemplate`.convertAndSend(this.`queue`.getName(), `order`);

    }

    }

    ```


    #### Step 8: Wrap the Sender in Spring Cloud Function Framework


    This example uses the `queueSender` to send the data (see Listing [4-5](#526597_1_En_4_Chapter.xhtml#PC9)).


    ```

    package com.kubeforce.scdftrigger;

    import org.springframework.beans.factory.annotation.Autowired;

    import java.util.function.Function;

    public class SenderFunction implements Function {

    @Autowired

    private QueueSender `queueSender`;

    @Override

    public String apply(String `s`) {

    `queueSender`.send("Vehicle:SUV,Make:Ford,Model:Edge,Year:2021");

    return "ok. done";

    }

    }

    ```


