    ## 1.3 Spring Cloud Function: Writing Once and Deploying to Any Cloud


    As you learned from the earlier discussion, writing functions for `AWS Lambda`,
    `Google Cloud Functions`, or `Azure Functions` is a proprietary activity. You
    have to write code specific to a hyperscaler. Hyperscalers refer to large-scale
    cloud providers like AWS, Google, or Azure, who have a complete mix of hardware
    and facilities that can scale to 1000s of servers. This is not bad if your strategy
    is to have a strong single hyperscaler relationship, but over time, when your
    strategy changes to a hybrid cloud or multi-cloud, you may have to rethink your
    approach.


    > A hybrid cloud comprises a private cloud and a public cloud and is managed as
    one entity. Multi-cloud includes more than one public cloud and does not have
    a private cloud component.


    This is where the Spring Cloud Function comes in. The Spring.io team started the
    Spring Cloud Function project with the following goals:


    * Promote the implementation of business logic via functions.

    * Decouple the development lifecycle of business logic from any specific runtime
    target so that the same code can run as a web endpoint, a stream processor, or
    a task.

    * Support a uniform programming model across serverless providers, as well as
    the ability to run standalone (locally or in a PaaS).

    * Enable Spring Boot features (auto-configuration, dependency injection, metrics)
    on serverless providers.


    Source: [https://spring.io/projects/spring-cloud-function](https://spring.io/projects/spring-cloud-function)


    The key goals are decoupling from a specific runtime and supporting a uniform
    programming model across serverless providers.


    Here’s how these goals are achieved:


    * Using `Spring Boot`

    * Wrapper beans for `Function<T, R>` (Predicate), `Consumer<T>`, and `Supplier<T>`

    * Packaging functions for deployments to target platforms such as `AWS Lambda`,
    `Azure Functions`, `Google Cloud Functions`, and Knative using adapters

    * Another exciting aspect of Spring Cloud Function is that it enables functions
    to be executed locally. This allows developers to unit test without deploying
    to the cloud


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig5_HTML.jpg)


    A model diagram describes the deployment of the spring cloud function plus K native.
    It deployed to hyper-scale clouds and on-prem or hybrid.


    Figure 1-5


    Deploying Spring Cloud Function on Knative serverless configured on Kubernetes
    environments provided by the cloud providers


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig4_HTML.png)


    A model diagram describes the deployment of the spring cloud function. Spring
    cloud function deployed to Amazon cloud, Google cloud, and Azure using implementation-specific
    libraries.


    Figure 1-4


    Deploying Spring Cloud Function directly to FaaS environments provided by the
    cloud providers


    When Spring Cloud Function is containerized on Knative, it can be deployed to
    any Kubernetes offering, whether on the cloud or on-premises. This is the preferred
    way to deploy it on hybrid and multi-cloud environments.


    ## 1.4 Project Knative and Portable Serverless Containers


    Having a portable serverless container is also important. This minimizes the complexity
    and time required to move between cloud providers. Moving between cloud providers
    to take advantage of discounted pricing goes a long way toward saving costs. One
    methodology used is called **cloud bursting** (Figure [1-6](#526597_1_En_1_Chapter.xhtml#Fig6)).
    Cloud bursting compensates for the lack of infrastructure on-premises by adding
    resources to the cloud. This is usually a feature of a hybrid cloud.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig6_HTML.jpg)


    A diagram describes normal traffic flows to hosted applications, and traffic spike
    flows to burst applications. A corporate data center and public cloud synchronize
    with hosted and burst applications.


    Figure 1-6


    Cloud bursting


    Figure [1-6](#526597_1_En_1_Chapter.xhtml#Fig6) shows that, to compensate for
    the lack of resources in a private cloud during a traffic spike, resources are
    allocated to the public cloud where the traffic is routed. When the traffic spike
    goes down, the public cloud resources are removed. This allows for targeted use
    of costs and resources—that is, it uses additional resources only during the traffic
    spike period. The burst of activity during an eCommerce event like Cyber Monday
    is a great example of a traffic spike.


    This cannot be easily achieved with just a portable code. You need containers
    that are also portable. This way, containers can be moved across cloud boundaries
    to accommodate traffic spikes. In Figure [1-6](#526597_1_En_1_Chapter.xhtml#Fig6),
    you can see that VMs from VMware are used as containers. Since the VMs hosted
    in the datacenter and hosted in the cloud are similar in construct, cloud bursting
    is possible.


    Applying this to Functions as a Service, you need a new way to make the underlying
    serverless containers portable.


    One such revolutionary approach in the cloud function world is `Knative`. The
    next section dives deep into `Knative`.


    ### 1.4.1 Containers, Serverless Platforms, and Knative


    What was the need for containers /serverless platforms?


    Over the course of the evolution of IT, there has been a need for secure isolation
    of running processes. In the early 90’s, chroot jail-based isolation allowed developers
    to create and host a virtualized copy of the software system. In 2008 Linux Containers
    (LXC) was introduced which gave the developers a virtualized environment. In 2011
    Cloud Foundry introduced the concept of a container, and with Warden in 2019 container
    orchestration became a reality. Docker, introduced in 2013, provided containers
    that can host any operating system. Kubernetes, introduced in 2014, provided the
    capability to orchestrate containers based on Docker. Finally, `Knative`, introduced
    in 2018, extended Kubernetes to enable serverless workloads to run on Kubernetes
    clusters.


    Serverless workloads (`Knative`) grew out of the need to help developers rapidly
    create and deploy applications without worrying about the underlying infrastructure.
    The serverless computing model takes care of provisioning, management, scheduling,
    and patching and allows cloud providers to develop the “pay only for resources
    used” model.


    With `Knative`, you can create portable serverless containers that run on any
    Kubernetes environment. This allows for FaaS to be portable in a multi-cloud or
    hybrid-cloud environment.


    Besides making developers more productive, the serverless environment offers faster
    deploys (see Figure [1-7](#526597_1_En_1_Chapter.xhtml#Fig7)). Developers can
    use the “fail fast and fail often” model and spin up or spin down code and infrastructure
    faster, which helps drive rapid innovation.


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig7_HTML.jpg)


    A diagram describes the servers deployed in months, virtual machines deployed
    in minutes, containers deployed in seconds, and serverless deployed in milliseconds.


    Figure 1-7


    Serverless deploys the quickest

    '
