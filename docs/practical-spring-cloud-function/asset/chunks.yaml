    \nFigure 5-31  \nDeploy the model\n\nStep 5: Make a note of the endpoints. See\
    \ Figures [5-32](#526597_1_En_5_Chapter.xhtml#Fig32) and [5-33](#526597_1_En_5_Chapter.xhtml#Fig33).\n\
    \n![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig33_HTML.png)\n\nA screenshot\
    \ of the window indicates the endpoint settings. It includes the name, type, ARN,\
    \ creation time, status, last updated, URL.\n\nFigure 5-33  \nDetails of the endpoint\n\
    \n![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig32_HTML.png)\n\nA screenshot\
    \ of the window of Amazon SageMaker. It has endpoints that include the name, ARN,\
    \ creation time, status, and last update.\n\nFigure 5-32  \nEndpoint of the deployment\n\
    \nStep 6: Create the Spring Cloud Function code to access the endpoint. Listing\
    \ [5-7](#526597_1_En_5_Chapter.xhtml#PC15) shows the POM dependencies.\n\n```\n\
    com.amazonaws\naws-java-sdk-sagemakerruntime\n1.11.979\n\ncom.amazonaws\naws-java-sdk-core\n\
    \ncom.amazonaws\naws-java-sdk-core\n1.11.979\n\nListing 5-7\nAWS SDK Dependencies\n\
    ```\n\nCreate a `Supplier` class to call and get the result from the SageMaker\
    \ endpoint. The `SupplierFunction`, unlike discussed in Section 5.3, will invoke\
    \ an endpoint URL and provide the results. Here, you use SageMaker’s own model-serving\
    \ capabilities. The Spring Cloud Function acts as a client for SageMaker. See\
    \ Figure [5-34](#526597_1_En_5_Chapter.xhtml#Fig34).\n\n![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig34_HTML.jpg)\n\
    \nA screenshot of the window with the programming function input and output components.\
    \ It represents the SageMaker supplier in Java.\n\nFigure 5-34  \nSageMakerSupplier.java\n\
    \nDeploy the function in Lambda, as shown in Chapter [2](#526597_1_En_2_Chapter.xhtml).\n\
    \nThis section explained how to create and deploy a model in AWS SageMaker. You\
    \ then called the SageMaker endpoint using the SageMaker JDK client in the Spring\
    \ Cloud Function, which was deployed in AWS Lambda.\n\nThe Java-based Lambda function\
    \ can be tuned to be more responsive and have a shorter cold startup time by using\
    \ mechanisms such as GraalVMs.\n"
  raw: '## 5.6 Spring Cloud Function with AWS SageMaker or AI/ML


    This section explores the offering from AWS called SageMaker and shows how you
    can use Spring Cloud Function with it.


    AWS SageMaker ([`https://aws.amazon.com/sagemaker/`](https://aws.amazon.com/sagemaker/))
    is a comprehensive platform for AI/ML activities. It is like a one-stop shop for
    creating and deploying ML models. Figure [5-21](#526597_1_En_5_Chapter.xhtml#Fig21)
    shows AWS SageMaker’s flow.


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig21_HTML.png)


    A model of the A W S sage maker. The process includes labeling data, building,
    training, tuning, deploying, and discovering. Each step has a logo associated
    with it.


    Figure 5-21


    AWS SageMaker flow


    SageMaker allows you to build and deploy models with Python as the language of
    choice, but when it comes to endpoints, there are Java SDKs much like AWS Glue
    that create prediction APIs or serve models for further processing. You can leverage
    Lambda functions for these APIs.


    So, as you saw in TensorFlow, you have to work in Python and Java to model and
    expose models for general-purpose use.


    Let’s run through a typical example and see if you can then switch to exposing
    APIs in Spring Cloud Function.


    Note


    This example uses the same sample to build, train, and deploy as in this hands-on
    tutorial in AWS.


    [`https://aws.amazon.com/getting-started/hands-on/build-train-deploy-machine-learning-model-sagemaker/`](https://aws.amazon.com/getting-started/hands-on/build-train-deploy-machine-learning-model-sagemaker/)


    Step 1: Create a notebook instance. Log on to SageMaker and create a notebook
    instance, as shown in Figure [5-22](#526597_1_En_5_Chapter.xhtml#Fig22). Note:
    It is assumed that you have walked through the tutorial that Amazon provided.


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig22_HTML.jpg)


    A screenshot of the create notebook instance. It includes Notebook instance settings,
    Permissions, and encryption. It asks for the notebook instance name, type, elastic
    inference, platform identifier, and I A M role.


    Figure 5-22


    Notebook instance in SageMaker with properties set


    Your notebook instance will be created, as shown in Figure [5-23](#526597_1_En_5_Chapter.xhtml#Fig23).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig23_HTML.png)


    A screenshot of the deployment of the notebook. It highlights the amazon sage
    maker and search notebook instance. It asks for name, instance, creation time,
    status, and actions.


    Figure 5-23


    Successful deployment of the notebook


    Step 2: Prepare the data. Use Python to prepare the data. This example uses the
    XGBoost ML algorithm. See Figure [5-24](#526597_1_En_5_Chapter.xhtml#Fig24).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig24_HTML.png)


    A screenshot of the jupyter notebook. It highlights the option for new notebooks.
    It has the title files, running, cluster, sage maker example, and conda.


    Figure 5-24


    Pick a framework in the Jupyter notebook


    As you can see from the list, most frameworks use Python. This example uses `conda_python3`,
    as suggested in the AWS tutorial.


    Copy and paste the Python code into the Jupyter notebook cell and run it. You
    will get a “success” message, as shown in Figure [5-25](#526597_1_En_5_Chapter.xhtml#Fig25).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig25_HTML.jpg)


    A screenshot of the window of the Jupyter notebook code. It creates a sage maker
    for instance. In this program, the log mentions import libraries, defines I A
    M role, X G boost container.


    Figure 5-25


    Code to create a SageMaker instance


    Copy and paste the code to create the `s3` bucket to store your model, as shown
    in Figure [5-26](#526597_1_En_5_Chapter.xhtml#Fig26).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig26_HTML.jpg)


    A screenshot of the window for the creation of a bucket. This program includes
    the bucket name, steps, and process. The bucket was created successfully.


    Figure 5-26


    Create a bucket


    Now copy and paste the code to download data into a dataframe, as shown in Figure
    [5-27](#526597_1_En_5_Chapter.xhtml#Fig27).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig27_HTML.jpg)


    A screenshot of the window for downloading the data to a data frame. The program
    includes the process of trying, except, and printing data.


    Figure 5-27


    Download the data into a dataframe


    Scuffle and split the dataset, as shown in Figure [5-28](#526597_1_En_5_Chapter.xhtml#Fig28).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig28_HTML.jpg)


    A screenshot of the window for the work on the dataset. The program includes splitting
    the dataset to train data, test data, split data, and print.


    Figure 5-28


    Work on the dataset


    Step 3: Train the model. See Figure [5-29](#526597_1_En_5_Chapter.xhtml#Fig29).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig29_HTML.jpg)


    A screenshot of the window for inputs and outputs. It indicates the training of
    the model with 3 steps.


    Figure 5-29


    Train the model


    You have to wait for Step 3 to finish before deploying the model; see Figure [5-30](#526597_1_En_5_Chapter.xhtml#Fig30).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig30_HTML.jpg)


    A screenshot of the window with the input and outputs. It indicates the S 3 training
    completion. It mentions that the training job was completed.


    Figure 5-30


    Training is complete


    Step 4: Deploy the model. Make a note of the compute sizes used. This will impact
    your billing. See Figure [5-31](#526597_1_En_5_Chapter.xhtml#Fig31).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig31_HTML.jpg)


    A screenshot of the window for the deployment of the model. It indicates the programming
    function.


    Figure 5-31


    Deploy the model


    Step 5: Make a note of the endpoints. See Figures [5-32](#526597_1_En_5_Chapter.xhtml#Fig32)
    and [5-33](#526597_1_En_5_Chapter.xhtml#Fig33).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig33_HTML.png)


    A screenshot of the window indicates the endpoint settings. It includes the name,
    type, A R N, creation time, status, last updated, U R L.


    Figure 5-33


    Details of the endpoint


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig32_HTML.png)


    A screenshot of the window of Amazon sage maker. It has endpoints that include
    the name, A R N, creation time, status, and last update.


    Figure 5-32


    Endpoint of the deployment


    Step 6: Create the Spring Cloud Function code to access the endpoint. Listing
    [5-7](#526597_1_En_5_Chapter.xhtml#PC15) shows the POM dependencies.


    ```

    com.amazonaws

    aws-java-sdk-sagemakerruntime

    1.11.979


    com.amazonaws

    aws-java-sdk-core


    com.amazonaws

    aws-java-sdk-core

    1.11.979


    Listing 5-7

    AWS SDK Dependencies

    ```


    Create a `Supplier` class to call and get the result from the SageMaker endpoint.
    The `SupplierFunction`, unlike discussed in Section 5.3, will invoke an endpoint
    URL and provide the results. Here, you use SageMaker’s own model-serving capabilities.
    The Spring Cloud Function acts as a client for SageMaker. See Figure [5-34](#526597_1_En_5_Chapter.xhtml#Fig34).


    ![](images/526597_1_En_5_Chapter/526597_1_En_5_Fig34_HTML.jpg)


    A screenshot of the window with the programming function input and output components.
    It represents the sage maker supplier in Java.


    Figure 5-34


    SageMakerSupplier.java


    Deploy the function in Lambda, as shown in Chapter [2](#526597_1_En_2_Chapter.xhtml).


    This section explained how to create and deploy a model in AWS SageMaker. You
    then called the SageMaker endpoint using the SageMaker JDK client in the Spring
    Cloud Function, which was deployed in AWS Lambda.


    The Java-based Lambda function can be tuned to be more responsive and have a shorter
    cold startup time by using mechanisms such GraalVMs.'
  trans: '

    ## 5.6 使用 AWS SageMaker 或 AI/ML 的 Spring Cloud Function


    本节探讨了 AWS 提供的 SageMaker 服务，并展示如何使用 Spring Cloud Function 与之结合。


    AWS SageMaker ([`https://aws.amazon.com/sagemaker/`](https://aws.amazon.com/sagemaker/))
    是一个全面的 AI/ML 平台。它类似于创建和部署 ML 模型的一站式商店。图 5-21 展示了 AWS SageMaker 的流程。


    ![](img/526597_1_En_5_Fig21_HTML.png)


    AWS SageMaker 模型示意图。流程包括数据标注、构建、训练、调优、部署和发现。每个步骤都有对应的图标。


    图 5-21


    AWS SageMaker 流程


    SageMaker 允许您使用 Python 作为首选语言来构建和部署模型，但当涉及到端点时，有类似 AWS Glue 的 Java SDK，可以创建预测
    API 或为后续处理提供模型服务。您可以利用 Lambda 函数来实现这些 API。


    因此，正如您在 TensorFlow 中看到的那样，您需要同时使用 Python 和 Java 来建模并对外暴露模型。


    让我们通过一个典型示例来演示，之后您就可以在 Spring Cloud Function 中暴露 API 了。


    注意


    此示例使用与 AWS 动手教程中相同的样本数据来构建、训练和部署模型。


    [`https://aws.amazon.com/getting-started/hands-on/build-train-deploy-machine-learning-model-sagemaker/`](https://aws.amazon.com/getting-started/hands-on/build-train-deploy-machine-learning-model-sagemaker/)


    步骤 1：创建一个笔记本实例。登录 SageMaker 并创建笔记本实例，如图 5-22 所示。注意：假设您已经完成了 Amazon 提供的教程。


    ![](img/526597_1_En_5_Fig22_HTML.jpg)


    创建笔记本实例的窗口截图。包含笔记本实例设置、权限和加密选项。需要输入笔记本实例名称、类型、弹性推理、平台标识符和 IAM 角色。


    图 5-22


    SageMaker 笔记本实例属性设置


    您的笔记本实例将如图 5-23 所示创建完成。


    ![](img/526597_1_En_5_Fig23_HTML.png)


    笔记本部署窗口截图。突出显示了 Amazon SageMaker 和搜索笔记本实例选项。需要输入名称、实例、创建时间、状态和操作。


    图 5-23


    笔记本成功部署


    步骤 2：准备数据。使用 Python 准备数据。此示例使用 XGBoost ML 算法。参见图 5-24。


    ![](img/526597_1_En_5_Fig24_HTML.png)


    Jupyter 笔记本窗口截图。突出显示了新笔记本选项。包含标题文件、运行、集群、SageMaker 示例和 Conda 选项。


    图 5-24


    在 Jupyter 笔记本中选择框架


    从列表可以看出，大多数框架使用 Python。此示例使用`conda_python3`，如 AWS 教程中建议的那样。


    将 Python 代码复制粘贴到 Jupyter 笔记本单元格中并运行。您将获得如图 5-25 所示的“成功”消息。


    ![](img/526597_1_En_5_Fig25_HTML.jpg)


    Jupyter 笔记本代码窗口截图。创建了 SageMaker 实例。在此程序中，日志提到了导入库、定义 IAM 角色和 XGBoost 容器。


    图 5-25


    创建 SageMaker 实例的代码


    将代码复制粘贴到创建`s3`存储桶以存储模型的窗口中，如图 5-26 所示。


    ![](img/526597_1_En_5_Fig26_HTML.jpg)


    存储桶创建窗口截图。此程序包含存储桶名称、步骤和流程。存储桶已成功创建。


    图 5-26


    创建存储桶


    现在将代码复制粘贴到下载数据到数据框的窗口中，如图 5-27 所示。


    ![](img/526597_1_En_5_Fig27_HTML.jpg)


    将数据下载到数据框的窗口截图。程序包含尝试、异常处理和打印数据的流程。


    图 5-27


    将数据下载到数据框


    如图 5-28 所示，对数据集进行打乱和分割。


    ![](img/526597_1_En_5_Fig28_HTML.jpg)


    数据集处理窗口截图。程序包含分割数据集为训练数据、测试数据、分割数据和打印操作。


    图 5-28


    数据集处理


    步骤 3：训练模型。参见图 5-29。


    ![](img/526597_1_En_5_Fig29_HTML.jpg)


    输入输出窗口截图。表示模型训练的 3 个步骤。


    图 5-29


    模型训练


    在部署模型之前，需要等待步骤 3 完成；参见图 5-30。


    ![](img/526597_1_En_5_Fig30_HTML.jpg)


    输入输出窗口截图。表示 S3 训练完成。提到训练任务已完成。


    图 5-30


    训练已完成


    步骤 4：部署模型。记录使用的计算规模。这将影响您的计费。参见图 5-31。


    ![](img/526597_1_En_5_Fig31_HTML.jpg)


    模型部署窗口截图。表示编程功能。


    图 5-31


    模型部署


    步骤 5：记录端点信息。参见图 5-32 和图 5-33。


    ![](img/526597_1_En_5_Fig33_HTML.png)


    端点设置窗口截图。包含名称、类型、ARN、创建时间、状态、最后更新时间和 URL。


    图 5-33


