    \ the IBM Cloud portal or using this link [`https://cloud.ibm.com/catalog/services/watson-assistant`](https://cloud.ibm.com/catalog/services/watson-assistant).\n\
    \nPick your plan and choose a location, as shown in Figure [7-30](#526597_1_En_7_Chapter.xhtml#Fig30).\n\
    \n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig30_HTML.jpg)\n\nA screenshot\
    \ of I B M cloud with Watson assistant signup page. It has different options including\
    \ the plan, features, and pricing details.\n\nFigure 7-30\n\nThe Watson Assistant\
    \ signup page\n\nClick the Create button to proceed to the next step of personalizing\
    \ your assistant.\n\n1.  Create and personalize your assistant.\n\nChoose the\
    \ name you want for your assistant and click Next. See Figure [7-31](#526597_1_En_7_Chapter.xhtml#Fig31).\n\
    \n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig31_HTML.jpg)\n\nA screenshot\
    \ of the create your first assistance page. It has options to enter the assistant\
    \ name, description, and language.\n\nFigure 7-31\n\nCreate your assistant\n\n\
    Choose your options. You will be provided a preview of the chat window.\n\nYou\
    \ can choose the type of deployment you prefer. This example uses Facebook, as\
    \ it provides a nice interface. See Figure [7-32](#526597_1_En_7_Chapter.xhtml#Fig32).\n\
    \n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig32_HTML.jpg)\n\nA screenshot\
    \ of the personalize your assistant creation. It has options to choose the instance\
    \ where the assistance needs to be deployed and other options.\n\nFigure 7-32\n\
    \nCreate an assistant with a template\n\nFill in the Tell Us About Yourself section\
    \ to your liking. See Figure [7-33](#526597_1_En_7_Chapter.xhtml#Fig33).\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig33_HTML.jpg)\n\
    \nA screenshot of the Watson Personalize your assistance page. It has the option\
    \ to personalize the assistant with Facebook and tell us about yourself.\n\nFigure\
    \ 7-33\n\nAssistant with a Facebook template\n\nClick Create to arrive at the\
    \ next window. The assistant should now be configured successfully, as shown in\
    \ Figure [7-34](#526597_1_En_7_Chapter.xhtml#Fig34).\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig34_HTML.png)\n\
    \nA screenshot of the home page of the new Watson assistant. It has the option\
    \ to get started and to create a conversation.\n\nFigure 7-34\n\nThe assistant\
    \ has been created successfully\n\n1.  Create an action.\n\nCreate an action that\
    \ helps you to interact with the customers. You can do this by choosing Create\
    \ Your First Action under the Create a Conversation section of the page. You can\
    \ choose to use a template or create this from scratch.\n\nChoose the options\
    \ highlighted in Figure [7-35](#526597_1_En_7_Chapter.xhtml#Fig35) to create your\
    \ action.\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig35_HTML.jpg)\n\n\
    A screenshot to create your action. It highlights the text and the steps to create\
    \ action. The steps are set by the assistant, name, choose to start from scratch,\
    \ choose options, and fill in options 1 and 2.\n\nFigure 7-35\n\nFlow of activities\
    \ to create your action\n\nContinue following the instructions to complete the\
    \ action. You can click Preview to look at how the conversation flows and modify\
    \ it to fit your needs. You now need to tie this to the Inventory function you\
    \ created in Step 1 to let the bot search the inventory and respond. See Figure\
    \ [7-36](#526597_1_En_7_Chapter.xhtml#Fig36).\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig36_HTML.jpg)\n\
    \nA screenshot of the Greet customer page. It has options to create an action\
    \ in 2 steps by selecting the options available.\n\nFigure 7-36\n\nCreate an action\n\
    \nYou now have to create an integration using the Integrations button shown at\
    \ the bottom-left side of the screen in Figure [7-37](#526597_1_En_7_Chapter.xhtml#Fig37).\
    \ This is available on the Home button.\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig37_HTML.jpg)\n\
    \nA screenshot of the I B M Watson assistant page. It has options for home, actions,\
    \ preview, publish, environments, and analyze.\n\nFigure 7-37\n\nAdd an integration\
    \ to support calling the Spring Cloud Function\n\n1.  Build a custom extension.\n\
    \nThe Integrations button will take you to the Build Custom Integrations dashboard,\
    \ as shown in Figure [7-38](#526597_1_En_7_Chapter.xhtml#Fig38).\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig38_HTML.png)\n\
    \nA screenshot of the Watson assistant page. It displays the Integration catalog\
    \ with the option to build custom extensions.\n\nFigure 7-38\n\nBuild a custom\
    \ extension from the integration catalog\n\nProvide your extension name and a\
    \ description, as shown in Figure [7-39](#526597_1_En_7_Chapter.xhtml#Fig39).\n\
    \n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig39_HTML.png)\n\nA screenshot\
    \ of the I B M Watson assistant page. It displays the custom extension page with\
    \ options to enter the basic information.\n\nFigure 7-39\n\nProvide the custom\
    \ extension information\n\nPick the function that you deployed. Once you provide\
    \ the URL, it will give you some options to choose from, as shown in Figure [7-40](#526597_1_En_7_Chapter.xhtml#Fig40).\n\
    \n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig40_HTML.jpg)\n\nA screenshot\
    \ of the I B M Watson assistant. It displays the custom extension page with options\
    \ to review extensions including servers and operations.\n\nFigure 7-40\n\nAdd\
    \ Open API URL for the deployed Spring Cloud Function\n\nApply the custom extension,\
    \ as shown in Figure [7-41](#526597_1_En_7_Chapter.xhtml#Fig41).\n\n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig41_HTML.jpg)\n\
    \nA screenshot of the I B M Watson assistant. It displays the extension setup\
    \ page with check inventory in extensions and inventory supplier in operations\
    \ tabs.\n\nFigure 7-41\n\nApply the custom extension\n\nThe custom extension is\
    \ now available for the action, as shown in Figure [7-42](#526597_1_En_7_Chapter.xhtml#Fig42).\n\
    \n![](images/526597_1_En_7_Chapter/526597_1_En_7_Fig42_HTML.png)\n\nA screenshot\
    \ of the I B M Watson assistant. It displays the completed custom extension page\
    \ with a confirmation that step 1 is taken without condition.\n\nFigure 7-42\n\
    \nThe custom extension is available for the action\n\nYou can now can retest your\
    \ chat interface by going back to the chat that you created.\n\nSee GitHub at\
    \ [`https://github.com/banup-kubeforce/Watson-imacs.git`](https://github.com/banup-kubeforce/Watson-imacs.git)\
    \ for additional information. Deploy the code in your environment and integrate.\
    \ This is a fun exercise."
