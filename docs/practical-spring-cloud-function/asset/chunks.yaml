    ## 2.8 Setting Up Azure with AKS and Knative with Spring Cloud Function


    This section looks at deploying to an Azure AKS cluster that has Knative configured.
    You will see similarities to Section 2.5, because you create the cluster, enable
    Knative, and deploy a Docker image.


    Prerequisites:


    * Azure subscription (`https://portal.azure.com`)


    * Azure CLI, which can be found at (`https://docs.microsoft.com/en-us/cli/azure/install-azure-cli`)


    * kubectl (`https://kubernetes.io/docs/tasks/tools/`)


    * Knative serving (`https://knative.dev/docs/serving`)


    * Knative CLI (`https://knative.dev/docs/client/install-kn/`)


    * IntelliJ, Eclipse, VS Code, or other IDEs


    * Code from GitHub (optional if you just use the image from Dockerhub)


    * Docker image registered in Docker hub


    Step 1: Set up a Kubernetes cluster with AKS. In this step, you create an AKS
    cluster. Make sure you have the sufficient permissions to create the cluster.
    Additional information can be found at (`https://docs.microsoft.com/en-us/azure/aks/learn/quick-kubernetes-deploy-cli`).


    Before running the following command, ensure that you have logged in to Azure
    using the Azure CLI. Then run the command in Listing [2-24](#526597_1_En_2_Chapter.xhtml#PC56).


    ```

    `az` aks create --resource-group `$RESOURCE_GROUP` \

    --name `$CLUSTER_NAME` \

    --generate-ssh-keys \

    --kubernetes-version 1.22.6 \

    --enable-rbac \

    --node-vm-size Standard_DS3_v2

    Listing 2-24

    The Dockerfile

    ```


    Configure your `kubeconfig` to use the AKS cluster that you created by running
    the command in Listing [2-25](#526597_1_En_2_Chapter.xhtml#PC57).


    ```

    `az` aks get-credentials --resource-group payroll-rsg --name payrollclstr

    Listing 2-25

    Set up Kubeconfig

    ```


    Check the status of the cluster by running the command in Listing [2-26](#526597_1_En_2_Chapter.xhtml#PC58).


    ```

    `kubectl` get nodes

    Listing 2-26

    Check the Status

    ```


    Step 2: Configure Knative on AKS. This step is similar to what you did earlier
    with EKS or local Kubernetes.


    Install Knative serving:


    ```

    `kubectl` apply -f https://github.com/knative/serving/releases/download/knative-v1.4.0/serving-crds.yaml

    `kubectl` apply -f https://github.com/knative/serving/releases/download/knative-v1.4.0/serving-core.yaml

    `kubectl` apply -f https://github.com/knative/net-kourier/releases/download/knative-v1.4.0/kourier.yaml

    ```


    Configure Kourier for ingress with the following command:


    ```

    `kubectl` patch configmap/config-network \

    --namespace knative-serving \

    --type merge \

    --patch ''{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}''

    ```


    Apply the default domain using the following command:


    ```

    `kubectl` apply -f https://github.com/knative/serving/releases/download/knative-v1.4.0/serving-default-domain.yaml

    ```


    Check the status of the Knative components by running the following command:


    ```

    `kubectl` get pods -n knative-serving

    ```


    Run the command in Listing [2-27](#526597_1_En_2_Chapter.xhtml#PC63) to get the
    Kourier ingress information.


    ```

    `kubectl` --namespace kourier-system get service kourier

    Listing 2-27

    Get the Ingress Information

    ```


    Now that you have the Knative configured and running, you can proceed to the next
    step of pushing the app image to Knative.


    Step 3: Containerize the app with Docker and push it to a repository. Follow Step
    3 in Sections 2.5, 2.6, or 2.7 if you choose to create and deploy an image to
    the Dockerhub repository.


    Step 4: Deploy the app to Knative on AKS. Here again, I use the Knative CLI `kn`
    to deploy the app, as it is convenient for this simple exercise.


    Run the command in Listing [2-28](#526597_1_En_2_Chapter.xhtml#PC64).


    ```

    `kn` service create payroll --image docker.io/banupkubeforce/springcloudfunctions:payrollv2

    Listing 2-28

    Deploy Payroll Apps

    ```


    Note the URL that is generated. You will use this URL for testing.


    Step 5: Test. Use the DNS name provided in Step 4 to test against the `http://payroll.default.20.121.248.sslip.io/employeeConsumer`
    URL.


    ## 2.9 Setting Up VMware Tanzu TKG and Knative


    As with other Kubernetes offerings, setting up and installing Knative on TKG on
    your local laptop is pretty straightforward.


    VMware released a community edition that can be locally installed. Additional
    information can be found at (`https://tanzucommunityedition.io/download/`).


    Prerequisites:


    * TKG download (`https://tanzucommunityedition.io/download/`)


    * kubectl (`https://kubernetes.io/docs/tasks/tools/`)


    * Knative serving (`https://knative.dev/docs/serving`)


    * Knative CLI (`https://knative.dev/docs/client/install-kn/`)


    * IntelliJ, Eclipse, VS Code, or other IDEs


    * Code from GitHub (optional if you just use the image from the Dockerhub)


    Here are the steps to configure and deploy Spring Cloud Function on VMware Tanzu:


    * Step1: Set up TKG locally.


    * Step2: Create a Kubernetes Cluster for your app.


    * Step 3: Install Knative on TKG cluster.


    * Step 4: Deploy the app on Knative.


    Step 1: Set up TKG locally. Follow the instructions provided on the website to
    set up TKG locally. This will give you an unmanaged cluster.


    Figure [2-48](#526597_1_En_2_Chapter.xhtml#Fig48) shows a successful install.


    Step 2: Create a cluster for your app. Here you create a cluster for the payroll
    example. Run the following command:


    ```

    `tanzu` unmanaged-cluster create payroll

    ```


    You will get a message that the payroll cluster has been completed, as shown in
    Figure [2-49](#526597_1_En_2_Chapter.xhtml#Fig49).


    Step 3: Install Knative on the TKG cluster. Run the following command to install
    `kantive-serving` on the TKG cluster:


    ```

    `tanzu` package install knative-serving --package-name knative-serving.community.tanzu.vmware.com
    --version 1.0.0

    ```


    Step 4: Deploy the app on Knative, as shown in Figure [2-50](#526597_1_En_2_Chapter.xhtml#Fig50).


    Note the URL provided. In this case, it is `http://payroll.default.127.0.0.241.nip.io`.


    Step 5: Test Follow Section 2.5, Step 5 and use Postman or curl to test against
    the `http://payroll.default.127.0.0.241.nip.io/employeeConsumer` URL.


    This completes the successful deployment of Tanzu Kubernetes Grid or TKG.


    ## 2.10 Summary


    This chapter explained how Spring Cloud Function can be developed and deployed
    to various target platforms, including AWS Lambda, Google Functions, Azure Functions,
    and Kubernetes environments such as AWS EKS, Google’s GKE, Azure AKS, VMware Tanzu,
    and the like. With Kubernetes, you were able to use Knative to deploy the same
    image to all the other Kubernetes flavors without changing the code. Knative ensures
    that the code is portable across any Kubernetes platform. This is critical, as
    it ensures movement to any cloud with minimal disruptions. To summarize, you should
    now have a good understanding of how to build serverless functions with Spring
    Cloud Function. The next chapter looks at how to automate the deployment process
    for Spring Cloud Function.

    '
  raw: '## 2.8 Setting Up Azure with AKS and Knative with Spring Cloud Function


    This section looks at deploying to an Azure AKS cluster that has Knative configured.
    You will see similarities to Section 2.5, because you create the cluster, enable
    Knative, and deploy a Docker image.


    Prerequisites:


    *   Azure subscription ([`https://portal.azure.com`](https://portal.azure.com)`/`)


