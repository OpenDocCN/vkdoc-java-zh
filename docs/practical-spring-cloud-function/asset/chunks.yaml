    with:

    credentials_json: ''${{ secrets.GCP_CREDENTIALS }}''

    - name: ''设置 Cloud SDK''

    uses: ''google-github-actions/setup-gcloud@v0''

    - name: ''使用 gcloud CLI''

    run: ''gcloud functions deploy payroll-gcp --entry-point org.springframework.cloud.function.adapter.gcp.GcfJarLauncher
    --runtime java11 --trigger-http --source target/deploy --memory 512MB''

    列表 3-6

    部署到 GCP 云函数的 Payroll 函数工作流

    ```


    请注意，您需要在 GitHub 密钥仪表板中存储 `GCP_CREDENTIALS`。


    与之前的 AWS Lambda 示例类似，注意检出、设置和构建 Maven 的步骤是相同的。对于认证和部署，您使用 Google Cloud CLI。设置
    Cloud SDK 任务会下载并配置 Google CLI。您可以使用与第 2 章节中从笔记本电脑部署时相同的命令行脚本。


    步骤 3：提交并推送代码以触发 GitHub Actions。此触发器由 actions 代码定义。在此示例中，任何对“master”分支的推送或提交都会触发
    GitHub Actions。


    ```

    on:

    push:

    branches: [ "master" ]

    ```


    这可以在 GitHub Actions 网站或 IDE 中完成。您可以通过在“master”分支上进行简单修改来提交更改。这将启动 GitHub Action
    流程。


    ![](img/526597_1_En_3_Fig21_HTML.jpg)


    banup-kubeforce 窗口的截图。已选择“构建部署”按钮。构建部署窗口显示了一个新界面，包括设置任务、使用 Maven 构建、运行 Sam 包装等。


    图 3-21


    代码提交触发 GitHub Actions


    一旦 actions 成功完成任务，您可以前往 Google 云函数仪表板并测试该函数。同样，您只需对 `EmployeeSupplier` 函数执行一个简单的
    GET 请求即可。


    步骤 4：测试函数。


    在测试函数之前，请确保从未认证设备（如您的笔记本电脑）调用该函数。完成测试后，请移除权限以避免不必要的调用。


    ![](img/526597_1_En_3_Fig22_HTML.png)


    payroll-g c p- h 2 的未认证设置截图。已允许设置，其中包括指向第一代 payroll 的链接及其他详细信息。


    图 3-22


    允许 payroll-gcp-h2 的未认证设置


    您可以前往 Google 云函数仪表板中的函数控制台并执行测试。您无需提供任何输入，只需点击“测试函数”按钮即可执行测试。您将在“输出”部分看到 `EmployeeSupplier`
    的输出结果，如图 3-23 所示。


    ![](img/526597_1_En_3_Fig23_HTML.jpg)


    Google 云窗口的截图。显示了云函数。在 payroll-g c p-h 2 中，已选择一个函数。它配置了触发事件并显示了测试命令。


    图 3-23


    GCP 云函数中 Spring Cloud Function 测试的成功输出

