  raw: '## 1.1 Functions as a Service (FaaS)


    FaaS is a revolutionary technology. It is a great boon for developers and businesses.
    FaaS allows businesses to adapt to rapidly changing business needs by enabling
    their development teams to develop products and features at a “high” velocity,
    thereby improving their Mean Time To Market (MTTM). Developers can develop functions
    without worrying about setting up, configuring, or maintaining the underlying
    infrastructure. FaaS models are also designed to use just the right quantity of
    infrastructure and compute time. They also can be scaled to fit exact demand,
    by focusing on billing for the number of invocations as compared to billing for
    uptime. FaaS has two parts, as shown in Figure [1-1](#526597_1_En_1_Chapter.xhtml#Fig1).


    ![](images/526597_1_En_1_Chapter/526597_1_En_1_Fig1_HTML.jpg)


    An illustration describes a container containing function code, app server, and
    operating system. An events cloud flows a consumer to a container, and a container
    flows a supplier to an events cloud.


    Figure 1-1


    FaaS component architecture


    *   The function code encapsulates the business logic in any language, such as
    Java, C#, Python, Node, and so on.


    *   The underlying container hosts an application server and an operating system.


    ### 1.1.1 Implementation of an Enterprise Application


    Imagine all the infrastructure needed to run a single payroll application on the
    cloud. This application may consume only 16GB of RAM and eight vCPUs, but you
    are charged continuously for the entire duration that the application is active.
    Using a simple AWS pricing formula, this works out to around $1,000 per year.
    This cost is for the whole time the application is hosted and active, regardless
    of use. Of course, you can cost-justify it through a TCO (Total Cost of Ownership)
    calculation, which helps you determine how your application can bring in revenue
    or value that compensates for the expense. This revenue-generation model is more
    suitable to applications that generate revenue for the company, such as an ecommerce
    site. It is more difficult to prove the value that a supporting application, running
    in the backend of an enterprise, brings to a company.


    ### 1.1.2 Migration ROI for a Portfolio of Application


    The value equation gets more complex if you plan to migrate an extensive portfolio
    of apps in your enterprise.


    Let’s for a moment assume, as a CTO or CIO of a company, you have a portfolio
    of about one thousand applications that you plan on migrating to the cloud. The
    key factors to consider, among the many, include:


    *   What is the current infrastructure supporting the apps?


    *   What is the utilization of these apps?


    The utilization of apps is an essential factor in determining the value of the
    application. Consider this—after analyzing the utilization of apps, you find that
    this portfolio includes the following distribution:


    *   10% with 80% utilization


    *   40% with 50% utilization


    *   50% with 20% utilization


    If you calculate the billing cost using an AWS cost calculator, you see that you
    will spend $1 million per year. This spend is for applications that are critical
    and highly utilized, as well as for applications that are minimally utilized.
    This cost is due to the fact that the cloud providers charge for the entire duration
    the application is active and consuming the infrastructure. The key here is that
    the infrastructure is fully allocated for the application’s life. Imagine how
    much you could save if the infrastructure was allocated only for the duration
    that the application was active and serving. This would be a great cost and resource
    saving approach. Cloud providers have thought through this because they also faced
    the pressure of finite infrastructure and considered the time needed to provision
    additional infrastructure.


    ### 1.1.3 The Serverless Functions Concept


    To work around the problem of finite infrastructure utilization, AWS created Lambda
    serverless functions. This was a genius invention. Subscribers to this service
    pay only for the time the application is invoked. The infrastructure is unallocated
    when it is not invoked. This way, AWS can save on infrastructure by repurposing
    the infrastructure for other needy applications while transferring the cost savings
    to the customer. This is a win-win. It’s worth considering whether you can apply
    this same approach to all the enterprise applications in your company today. You
    would be able to save a lot of money. Also, if you were to bring this technology
    to the datacenter, you would be able to reap the benefits that AWS realized. Isn’t
    this wonderful?


    ### 1.1.4 Applying the Serverless Functions Concept to an Enterprise Application


    Let’s dig deeper into the concept of functions and how AWS realizes the magic
    of infrastructure savings. Functions are tiny code pieces with a single input
    and a single output, and a processing layer (a predicate) acting as the glue.
    Compare this to enterprise apps, which are designed to do many things. Take a
    simple payroll system, for example. A payroll system has multiple input interfaces
    and multiple output interfaces. Here are some of those interfaces:


    *   Timecard system to get the hours employees worked in a month


    *   Performance evaluation system


    *   Peer feedback system


    *   Inflation adjustment calculator system


    *   The outgoing interface to the IRS


    *   The outgoing interface to the medical insurance provider


    *   An outgoing interface to the internal web portal where employees can download
    their paystubs


    Running this payroll application is not trivial. I have seen such a payroll system
    use the following:


    *   Fourteen dedicated middleware application servers


    *   Two RDBMS database stores


    *   Two integration tools such as message queues and FTP


    *   Four dedicated bare-metal servers, with each server configured with 128GB
    RAM, 32 CPUs, 4TB of HDD, 10TB of vSAN, and the like


    The key factor in determining whether this application can be hosted on a serverless
    functions infrastructure like Lambda is the time it takes for the application
    to boot up (the startup time or cold start) and the time it takes for the application
    to shut down (the shutdown time). The faster the startup and shutdown times, the
    larger the cost savings.


    It is also important that these times be quick so that they don’t cause disruptions.
    If you were to research the startup times for large enterprise applications like
    the payroll application, you would find that it is not pretty. An average startup
    time is around 15 minutes for all components to come up and another 15 minutes
    for the application to come down. This would not fly. Imagine if you deployed
    this application to an AWS Lambda serverless function. Thirty minutes of downtime
    for each invocation? This will not work. Your users would abandon the application
    entirely. As you can see, large applications cannot benefit from resource release
    and resource reassignment because they take a long time to start up and shut down,
    which would impact the general operation of the application.


    Can you make this large payroll application behave in an expected way for serverless
    functions? The answer is yes. A lot of refactoring is required, but it can be
    done.


    #### Serverless Function in the Cloud


    All cloud providers have now incorporated the serverless functions into their
    infrastructure offerings. AWS has Lambda Functions, Google has Cloud Functions,
    and Azure has Azure Functions. These providers, in the quest for making their
