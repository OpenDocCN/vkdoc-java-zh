    **3: Create the** `PubSubPublisher` **.**


    The `PubSubPublisher` will use the topic defined in `application.properties` to
    send messages; see Listing [4-16](#526597_1_En_4_Chapter.xhtml#PC20).


    ```

    package com.kubeforce.googlepubsub;

    import com.google.cloud.spring.pubsub.core.PubSubTemplate;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.stereotype.Component;

    @Component

    public class PubSubPublisher {

    private final String topic;

    private final PubSubTemplate pubSubTemplate;

    public PubSubPublisher(

    @Value("${pubsub.topic}") String topic,

    PubSubTemplate pubSubTemplate) {

    this.topic = topic;

    this.pubSubTemplate = pubSubTemplate;

    }

    public void publish(String payload) {

    pubSubTemplate.publish(topic, payload);

    }

    }

    ```


