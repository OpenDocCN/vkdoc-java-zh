    plant module, sensors send data to spring cloud components on-premises, A W S
    lambda and I o T greengrass. Step 2, In A W S cloud module I o T core receives
    data from the plant module through a firewall and sends it to Lambda. Step 3,
    data from lambda is stored in amazon''s simple storage service, S 3.


