  \ Google Cloud Functions 的推出时间晚于 Lambda，但借助 Anthos 战略，它正在迅速占据函数计算领域的重要地位。Spring.io\
  \ 与 Google 紧密合作，使 Spring.io 组件能够无缝集成到 Google Cloud 组件中。\n\n要在 Google Cloud Functions\
  \ 上部署薪资系统，请按照此处描述的流程（见图 1-13）操作：在开发和部署 Spring Cloud Function 之前，确保 SAP ECC 和 Oracle\
  \ 数据库已启动并完成集成：\n\n![](img/526597_1_En_1_Fig13_HTML.jpg)\n\n架构图描述了 Oracle 数据库在 GCE\
