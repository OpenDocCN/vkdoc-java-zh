  \ GitHub Actions 可以将代码推送到 Lambda 等无服务器环境，但在 Kubernetes 环境中，它缺乏对已部署代码的良好图形化表示。Kubernetes\
  \ 是容器编排工具，拥有大量管理部署的服务。ArgoCD 是专为 Kubernetes 设计的，它是一个声明式 CD（持续交付）工具，这意味着应用程序定义、配置和环境都可以进行版本控制。与\
  \ GitHub Actions 类似，ArgoCD 使用 Git 仓库作为单一真实来源。这也被称为*GitOps*。\n\n> *声明式意味着配置由一组事实保证，而不是由一组指令保证。*\n\
  \n声明式 GitOps 允许程序员或应用程序创建者控制应用程序运行环境的配置。这意味着程序员无需依赖基础设施团队或 DevOps 团队来管理应用程序的各个部分。程序员掌控一切，这是件好事。\n\
  \nArgoCD 的设置主要通过编程方式完成，并依赖于底层 Kubernetes 的 configmaps。正如你所看到的，这与其他工具如 Jenkins 不同。\n\
