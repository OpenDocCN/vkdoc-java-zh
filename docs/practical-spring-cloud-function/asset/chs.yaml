- "# 1. 为什么使用 Spring Cloud Function\n\n本章通过一个示例用例——人力资源管理系统（HRM）来探讨 Spring Cloud Function。重点在于企业内部的系统。本章涉及\
  \ FaaS（函数即服务）概念，并解释它在企业中的发展趋势。本章还深入探讨其在云环境中的实现。你将了解代码和容器层面存在的可移植性问题，并阅读有关 Knative\
  \ 在 Kubernetes 上的实现等概念，其中包括容器可移植性。你还将学习 Spring Cloud Function 在 AWS、GCP、Azure、VMware\
  \ Tanzu 和 Red Hat OpenShift 等平台上的高级实现。\n\n\n\n## 1.1 无服务器函数（FaaS）\n\nFaaS 是一种革命性技术。它为开发者和企业带来了巨大价值。FaaS\
  \ 通过使开发团队能够以“高”速度开发产品和功能，帮助企业快速适应不断变化的业务需求，从而提升其平均市场响应时间（MTTM）。开发者可以专注于函数开发，无需担心底层基础设施的搭建、配置或维护。FaaS\
  \ 模型还设计为仅使用适量的基础设施和计算时间。它们还可以通过按调用次数计费而非按运行时间计费来精确满足需求。FaaS 包含两个部分，如图 1-1 所示。\n\n\
  ![](img/526597_1_En_1_Fig1_HTML.jpg)\n\n一幅示意图展示了一个容器，其中包含函数代码、应用服务器和操作系统。事件云从消费者流向容器，容器将数据流向事件云。\n\
  \n图 1-1\n\nFaaS 组件架构\n\n*   函数代码封装了任何语言的业务逻辑，例如 Java、C#、Python、Node 等。\n\n*   底层容器承载了应用服务器和操作系统。\n\
  \n### 1.1.1 企业应用的实现\n\n想象一下在云上运行单个薪资系统所需的所有基础设施。该应用程序可能仅消耗 16GB 的 RAM 和八核 vCPU，但您会为其整个运行时间持续付费。根据简单的\
  \ AWS 计价公式，这每年大约需要 1000 美元。这种成本涵盖了应用程序整个运行期间，无论是否被使用。当然，您可以通过总拥有成本（TCO）计算来证明其合理性，这有助于您确定应用程序如何为公司创造收入或价值以抵消成本。这种收入生成模式更适合为公司创造收入的应用程序，例如电商平台。但对于运行在企业后端的支持性应用程序，证明其对公司的价值则更为困难。\n\
  \n### 1.1.2 应用组合的迁移投资回报率\n\n如果您计划将企业中大量应用程序迁移到云上，价值计算公式会变得更加复杂。\n\n假设您作为公司的首席技术官（CTO）或首席信息官（CIO），拥有约一千个应用程序的组合并计划迁移到云上。在众多因素中，需要重点考虑的包括：\n\
  \n*   当前支持这些应用程序的基础设施是什么？\n\n*   这些应用程序的利用率如何？\n\n应用程序的利用率是决定其价值的关键因素之一。请考虑以下情况——在分析应用程序利用率后，您会发现该组合的分布如下：\n\
  \n*   10%的应用程序利用率高达 80%\n\n*   40%的应用程序利用率约为 50%\n\n*   50%的应用程序利用率仅为 20%\n\n如果使用\
  \ AWS 成本计算器计算计费成本，您会发现每年需要花费 100 万美元。这笔支出涵盖了关键且高利用率的应用程序，以及利用率极低的应用程序。这种成本源于云服务提供商对应用程序整个运行期间消耗基础设施的计费方式。关键在于，基础设施在整个应用程序生命周期中都被完全分配。试想一下，如果仅在应用程序运行并提供服务期间分配基础设施，您能节省多少成本？这将是一种极佳的成本和资源节约方案。云服务提供商已经考虑到这一点，因为他们也面临有限的基础设施压力，并评估了额外基础设施配置所需的时间。\n\
  \n### 1.1.3 无服务器函数概念\n\n为解决有限基础设施利用率的问题，AWS 创建了 Lambda 无服务器函数。这是个天才的发明。该服务的订阅者只需为应用程序被调用的时间付费。当未被调用时，基础设施不会被分配。这样，AWS\
  \ 可以通过将基础设施重新分配给其他需要的应用程序，从而节省成本并将其节约传递给客户。这是一种双赢模式。值得思考的是，您是否可以将这种方案应用于公司当前的所有企业应用程序？您将能够节省大量资金。此外，如果将这项技术引入数据中心，您也能获得\
  \ AWS 所实现的相同效益。这不是非常棒吗？\n\n### 1.1.4 将无服务器函数概念应用于企业应用程序\n\n让我们深入探讨函数的概念以及 AWS 如何实现基础设施节约的魔力。函数是包含单一输入和单一输出的微型代码片段，并通过一个处理层（谓词）作为粘合剂。这与企业应用程序形成对比，后者被设计为执行多种功能。以一个简单的薪资系统为例。薪资系统包含多个输入接口和多个输出接口。以下是一些示例接口：\n\
  \n*   时间卡系统以获取员工每月的工作时长\n\n*   绩效评估系统\n\n*   同事反馈系统\n\n*   通货膨胀调整计算器系统\n\n*   向美国国税局（IRS）的输出接口\n\
  \n*   向医疗保险提供商的输出接口\n\n*   向内部网络门户的输出接口（员工可在此下载工资单）\n\n运行此类薪资应用程序并不简单。我曾见过这样的薪资系统使用以下配置：\n\
  \n*   十四个专用中间件应用服务器\n\n*   两个关系型数据库管理系统（RDBMS）数据库存储\n\n*   两个集成工具（如消息队列和 FTP）\n\n\
  *   四个专用裸金属服务器，每个服务器配置为 128GB RAM、32 核 CPU、4TB HDD 和 10TB vSAN 等\n\n确定此类应用程序是否可以部署在\
  \ Lambda 等无服务器函数基础设施上的关键因素是应用程序的启动时间（冷启动时间）和关闭时间。启动和关闭时间越短，成本节约就越大。\n\n此外，这些时间必须足够短，以避免造成中断。如果您研究大型企业应用程序（如薪资系统）的启动时间，会发现情况并不乐观。所有组件的平均启动时间约为\
  \ 15 分钟，应用程序关闭时间需要另外 15 分钟。这种延迟显然不可接受。试想一下，如果将此类应用程序部署到 AWS Lambda 无服务器函数，每次调用都需要\
  \ 30 分钟的停机时间？这显然行不通。您的用户会完全放弃该应用程序。正如您所看到的，大型应用程序无法从资源释放和重新分配中获益，因为它们启动和关闭时间过长，这将影响应用程序的整体运行。\n\
  \n您能让这个大型薪资系统以符合无服务器函数预期的方式运行吗？答案是肯定的。虽然需要大量重构，但这是可以实现的。\n\n#### 云中的无服务器函数\n\n所有云服务提供商现已将其无服务器函数整合到基础设施服务中。AWS\
  \ 提供 Lambda 函数，Google 提供 Cloud Functions，Azure 提供 Azure Functions。这些提供商在追求让客户依赖其服务的过程中，确保在其环境中引入了专有元素。运行函数所需的两个核心组件是：\n\
  \n*   提供函数服务的无服务器函数代码\n\n*   支持代码的无服务器基础设施（容器）\n\n\n\n#### 为什么无服务器函数需要是非专有的？\n\n\
  企业正逐渐转向多云、混合云的云策略。如图 1-2 所示，对 3000 名全球受访者的调查表明，76%的企业已经在多云环境中开展工作。这意味着它们不再局限于单一云服务商。采用多云策略可以缓解供应商锁定的风险。\n\
  \n![](img/526597_1_En_1_Fig2_HTML.jpg)\n\n一个圆形图展示了所有组织的云策略。2%为单一私有云，9%为单一公有云，89%为多云。多云部分进一步细分为\
  \ 80%混合云、7%多公有云、2%多私有云。\n\n图 1-3\n\n多云采用报告 来源：*https://info.flexera.com/CM-REPORT-State-of-the-Cloud?lead_source=Website%20Visitor&id=Blog*\n\
  \n在多云世界中，企业必须订阅能够轻松在云之间迁移的服务。这对于标准化服务尤为重要。\n\nFaaS（无服务器函数）近期已成为一种标准化服务，所有提供商都围绕\
  \ FaaS 提供了相关服务。因此，FaaS 容器必须避免包含专有代码。\n\n当无服务器函数不使用专有代码时，它们才能实现可移植性。可移植的无服务器函数允许工作负载在云之间迁移。例如，如果\
  \ AWS Lambda 函数成本高昂而 Azure Functions 成本较低，企业可以轻松利用成本优势，将 Lambda 工作负载迁移到 Azure Functions。\n\
  \n后续章节将详细探讨这些可移植性问题，并解释如何解决它们。\n\n## 1.2 代码可移植性问题\n\n清单 1-1 展示了使用 Java 编写的 AWS Lambda\
  \ 示例代码。这段代码是通过 AWS SAM（Serverless Application Model）模板生成的。观察代码可以发现，AWS 特定的库引用和方法调用将代码绑定到了\
  \ AWS。虽然这部分内容不多，但其影响非常显著。在企业中，通常会有数百甚至数千段此类代码，若要将其迁移到其他云服务商，必须进行重构。这是一项昂贵的操作。\n\n\
  清单 1-1. 使用 AWS SAM 框架的示例代码\n\n![](img/526597_1_En_1_Figa_HTML.png)\n\n亚马逊网络服务的无服务器应用模型框架。包名为\
  \ HelloWorld。它描述了亚马逊网络服务特定的代码和方法调用，这些将代码绑定到亚马逊网络服务。\n\n下一节将探讨底层无服务器容器的可移植性问题，这会影响多云迁移的实施方式。\n\
  \n### 1.2.1 无服务器容器可移植性问题\n\nLambda 底层的无服务器框架如何？它是否具有可移植性？\n\n深入研究 AWS Lambda 会发现，其使用的虚拟化技术是\
  \ Firecracker。Firecracker 基于 KVM（基于内核的虚拟机）创建和管理微虚拟机。您可以在 [`aws.amazon.com/blogs/aws/firecracker-lightweight-virtualization-for-serverless-computing/`](https://aws.amazon.com/blogs/aws/firecracker-lightweight-virtualization-for-serverless-computing/)\
  \ 查阅更多关于 Firecracker 的信息。\n\nFirecracker 的极简设计原则使其具备快速启动和关闭的特性。另一方面，Google Cloud\
  \ Functions 使用 gVisor 技术，且不兼容 Firecracker。gVisor 是容器的应用内核。更多信息请访问 [`github.com/google/gvisor`](https://github.com/google/gvisor)。\n\
  \nAzure Functions 则采用完全不同的方法，以 PaaS 服务 App Service 作为其基础。因此，您可以看到主要云服务商都使用自己的框架来管理函数容器。这使得函数在多云环境中的迁移变得困难。由于容器层缺乏可移植性，这一可移植性问题更加突出。\n\
  \n![](img/526597_1_En_1_Fig3_HTML.jpg)\n\n一个比较表格。Lambda 的函数代码包括 Lambda 运行时、沙箱、客户操作系统。对于\
  \ Google，包含 gVisor、主机内核和 Google 计算引擎。对于 Azure，部分包含语言运行时和 Web 作业脚本运行时。\n\n图 1-3\n\
  \n无服务器架构比较\n\n您可以看到，代码和容器都与提供商相关，且难以实现可移植性。\n\n到目前为止的讨论中，您已了解与 FaaS 相关的以下问题：\n\n\
  * 代码的可移植性  \n* 无服务器容器的可移植性  \n* 无服务器环境的冷启动\n\n如何解决这些问题？\n\n引入 Spring Cloud Function\
  \ 和 Knative。Spring Cloud Function 解决函数代码的可移植性问题，而 Knative 解决容器的可移植性问题。\n\n关于 Spring\
  \ Cloud Function 的信息请访问 [`spring.io/projects/spring-cloud-function`](https://spring.io/projects/spring-cloud-function)，关于\
  \ Knative 的信息请访问 [`knative.dev/docs/`](https://knative.dev/docs/)。\n\n后续章节将深入探讨这些主题。\n\
  \n\n\n## 1.3 Spring Cloud Function：一次编写，部署到任意云平台\n\n正如你从之前的讨论中所学到的，为 AWS Lambda、Google\
  \ Cloud Functions 或 Azure Functions 编写函数是一种专有操作。你必须为超大规模云服务提供商编写特定的代码。超大规模云服务提供商指的是像\
  \ AWS、Google 或 Azure 这样的大型云平台，它们拥有完整的硬件和设施组合，能够扩展到数千台服务器。如果你的策略是建立与单一超大规模云服务提供商的强关联关系，这种做法并不算坏，但随着时间推移，当你的策略转变为混合云或多云时，你可能需要重新思考你的方法。\n\
  \n> *混合云由私有云和公有云组成，并作为一个整体进行管理。多云包含多个公有云，不包含私有云组件。*\n\n这就是 Spring Cloud Function\
  \ 的用武之地。Spring.io 团队启动 Spring Cloud Function 项目时设定了以下目标：\n\n* 通过函数实现业务逻辑的推广。\n\n\
  * 将业务逻辑的开发生命周期与任何特定运行时目标解耦，使得相同代码可以作为 Web 端点、流处理器或任务运行。\n\n* 支持跨无服务器提供商的统一编程模型，以及能够独立运行（本地或\
  \ PaaS 环境）的能力。\n\n* 在无服务器提供商上启用 Spring Boot 特性（自动配置、依赖注入、指标监控）。\n\n来源：[`spring.io/projects/spring-cloud-function`](https://spring.io/projects/spring-cloud-function)\n\
  \n关键目标包括与特定运行时解耦，并支持跨无服务器提供商的统一编程模型。\n\n这些目标是如何实现的呢？\n\n* 使用 Spring Boot\n\n* 为\
  \ Function<T, R>（Predicate）、Consumer<T>和 Supplier<T>提供包装 Bean\n\n* 通过适配器将函数打包部署到目标平台，如\
  \ AWS Lambda、Azure Functions、Google Cloud Functions 和 Knative\n\n* Spring Cloud\
  \ Function 的另一个令人兴奋的特点是它使函数能够在本地执行。这允许开发者在无需部署到云平台的情况下进行单元测试\n\n图 1-4 和图 1-5 展示了如何部署\
  \ Spring Cloud Function。当 Spring Cloud Function 与特定库捆绑时，它可以部署到 AWS Lambda、Google\
  \ Cloud Functions 或 Azure Functions。\n\n![](img/526597_1_En_1_Fig5_HTML.jpg)\n\n\
  模型图描述了 spring cloud function 与 K native 的部署方式。它被部署到超大规模云平台以及本地或混合云环境。\n\n图 1-5\n\
  \n在云提供商提供的 Kubernetes 环境中部署 Spring Cloud Function 到 Knative serverless\n\n![](img/526597_1_En_1_Fig4_HTML.png)\n\
  \n模型图描述了 spring cloud function 的部署。使用特定实现库，spring cloud function 被部署到 Amazon 云、Google\
  \ 云和 Azure。\n\n图 1-4\n\n直接将 Spring Cloud Function 部署到云提供商提供的 FaaS 环境\n\n当 Spring\
  \ Cloud Function 在 Knative 中容器化时，它可以部署到任何 Kubernetes 环境，无论是云平台还是本地环境。这是在混合云和多云环境中部署的首选方式。\n\
  \n## 1.4 Project Knative 与可移植的无服务器容器\n\n拥有可移植的无服务器容器同样重要。这可以最小化在云平台之间迁移所需的复杂性和时间。在云平台之间迁移以利用折扣定价，能够大幅节省成本。一种使用的方法称为*云爆发*（图\
  \ 1-6）。云爆发通过向云平台添加资源来弥补本地缺乏基础设施的问题。这通常是混合云的一个特性。\n\n![](img/526597_1_En_1_Fig6_HTML.jpg)\n\
  \n模型图描述了正常流量流向托管应用程序，流量激增时流向爆发应用程序。企业数据中心和公有云与托管和爆发应用程序同步。\n\n图 1-6\n\n云爆发\n\n图\
  \ 1-6 显示，当流量激增时，为了弥补私有云资源不足的问题，资源会被分配到公有云平台，流量会被路由到那里。当流量激增结束后，公有云资源会被移除。这使得成本和资源的使用更加精准——即仅在流量激增期间使用额外资源。像黑色星期五购物节这样的电商活动期间的活动激增是一个很好的流量激增示例。\n\
  \n仅靠可移植代码无法轻松实现这一点。你需要的不仅是可移植的代码，还需要可移植的容器。这样，容器才能跨云边界迁移以应对流量激增。在图 1-6 中，你可以看到 VMware\
  \ 的虚拟机被用作容器。由于数据中心和云平台中托管的虚拟机在结构上相似，因此云爆发成为可能。\n\n将这一概念应用于函数即服务（FaaS），你需要一种新的方法来实现底层无服务器容器的可移植性。\n\
  \n云函数领域的一种革命性方法是 Knative。下一节将深入探讨 Knative。\n\n### 1.4.1 容器、无服务器平台与 Knative\n\n为何需要容器/无服务器平台？\n\
  \n在 IT 发展的过程中，需要对运行中的进程进行安全隔离。在 90 年代初期，基于 chroot jail 的隔离允许开发者创建和托管软件系统的虚拟化副本。2008\
  \ 年引入了 Linux Containers（LXC），为开发者提供了虚拟化环境。2011 年 Cloud Foundry 引入了容器的概念，2019 年通过\
  \ Warden 实现了容器编排。2013 年推出的 Docker 提供了可以托管任何操作系统的容器。2014 年推出的 Kubernetes 提供了基于 Docker\
  \ 的容器编排能力。最终，2018 年推出的 Knative 扩展了 Kubernetes，使其能够运行无服务器工作负载。\n\n无服务器工作负载（Knative）的出现源于帮助开发者快速创建和部署应用程序的需求，而无需担心底层基础设施。无服务器计算模型负责资源的配置、管理、调度和补丁，使云提供商能够实现“按资源使用付费”的模式。\n\
  \n借助 Knative，你可以在任何 Kubernetes 环境中运行可移植的无服务器容器。这使得 FaaS 在多云或多混合云环境中具备可移植性。\n\n除了提升开发者的生产力，无服务器环境还提供了更快的部署速度（参见图\
  \ 1-7）。开发者可以采用“快速失败、频繁失败”的模式，更快地启动或关闭代码和基础设施，这有助于推动快速创新。\n\n![](img/526597_1_En_1_Fig7_HTML.jpg)\n\
  \n模型图描述了服务器在月度部署、虚拟机在分钟级部署、容器在秒级部署、无服务器在毫秒级部署。\n\n图 1-7\n\n无服务器部署速度最快\n\n\n\n###\
  \ 1.4.2 什么是 Knative？\n\nKnative 是 Kubernetes 的扩展，使无服务器工作负载能够在 Kubernetes 集群上运行。与\
  \ Kubernetes 工作相比，开发人员将代码从 IDE 部署到 Kubernetes 的过程中需要的工具数量庞大，这与 Kubernetes 所宣称的环境敏捷性背道而驰。Knative\
  \ 通过 Kubernetes 原生的提供者操作符自动完成构建包和部署到 Kubernetes 的过程。因此，名称中包含“K”和“Native”。\n\nKnative\
  \ 有两个主要组件：\n\n*   *服务（Serving）*：提供组件，使无服务器容器能够快速部署，自动扩展和实现时间点快照功能\n\n*   *事件驱动（Eventing）*：通过提供从生产者到订阅者/接收器的事件路由工具，帮助开发人员使用事件驱动架构\n\
  \n您可以在 [`​Knative.​dev/​docs`](https://Knative.dev/docs) 了解更多关于 Knative 的信息。\n\n\
