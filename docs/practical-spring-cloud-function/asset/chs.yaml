  ## 5.7 总结


  正如你在本章所学到的，你可以使用 Spring Cloud Function 来部署模型。但你也了解到，使用 Spring Cloud Function 和 Java
  来部署 AI/ML 模型有些牵强，因为这些模型是用 Python 编写的。虽然 Python 可能很流行，但也要注意，在企业环境中，Java 才是主导。在 AI/ML
  中找到利用 Java 的方法，是构建企业统一环境的关键。基于 Python 的函数冷启动耗时较长。这就是为什么使用 Java 和 GraalVM 等框架可以加快启动时间。


  下一章将探讨 IoT 和对话式 AI 的一些实际应用案例，并解释 Spring Cloud Function 的使用方法。


