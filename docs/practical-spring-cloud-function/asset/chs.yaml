  亿台设备。更多关于该研究的信息可访问 [`https://iotbusinessnews.com/2021/09/23/13465-number-of-connected-iot-devices-growing-9-to-12-3-billion-globally-cellular-iot-now-surpassing-2-billion/`](https://iotbusinessnews.com/2021/09/23/13465-number-of-connected-iot-devices-growing-9-to-12-3-billion-globally-cellular-iot-now-surpassing-2-billion/)。


  凭借这种增长潜力，你可以合理假设支持技术也会随之增长。这些技术不仅包括硬件传感器和 IoT 网关，还包括微服务和函数等技术。IoT 行业最适合实施这些技术，因为它们高度分布式，且严重依赖于小型高效的软件组件。


  按需触发的无服务器函数环境非常适合 IoT，因为它们可以显著降低成本。传统的 IoT 方法依赖于全天候运行的专用应用程序。这些应用消耗大量资源，增加了运营成本。而无服务器函数几乎瞬时的特性，使得这种成本可以转换为“按使用付费”的模式。


  在开始处理 IoT 与 Spring Cloud Function 的一些示例之前，最好先理解为何需要使用 Java 进行编码。虽然有许多替代语言可供选择，但
  Java 在 IoT 领域表现最佳，原因如下：


  *   Java 的设计初衷就考虑到了 IoT。如果你查看 Sun Microsystems 早期的 Java 示例，会发现经常提到数字时钟的同步。


  *   Java 已被移植到许多微控制器上。


  *   Java 专为在资源受限的环境（如传感器）中运行而设计。


  *   JVM 使得代码可以在不同平台间移植；一次编写，随处运行。


  根据 [`iot.eclipse.org`](http://iot.eclipse.org) 进行的 IoT 调查（ [`https://iot.eclipse.org/community/resources/iot-surveys/assets/iot-developer-survey-2020.pdf`](https://iot.eclipse.org/community/resources/iot-surveys/assets/iot-developer-survey-2020.pdf)
  ），你可以看到 Java 在边缘计算和云端都是首选语言。根据研究，边缘端的实现正在转向容器化，这对边缘上的 Knative on Kubernetes 部署非常有利。


  此外，Spring 框架已成为许多工业物联网（IIoT）项目的首选平台。你可以在 2017 年 SpringOne 活动的演示中查看相关信息，访问 [`https://youtu.be/MReQD9tXQuA`](https://youtu.be/MReQD9tXQuA)。


  Spring Cloud Streams、Spring Cloud Data Flow、Spring Integration、Spring MQTT、Spring
  Data 和 Spring XD 等组件在 IoT 数据采集、存储和转换管道中发挥着重要作用。


