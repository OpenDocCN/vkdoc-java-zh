  \ IBM 云。\n\n图 7-24\n\nWatson 物联网上下文\n\n\n\n## 7.2 通过 Spring Cloud Function 和大数据管道实现医疗健康\n\
  \n医疗健康依赖于数据。无论是患者记录、图像识别、基因组学、追踪可穿戴设备还是使用传感器，医疗系统都会被大量数据所淹没。图 7-25 概念化了医疗健康中的大数据。\n\
  \n![](img/526597_1_En_7_Fig25_HTML.jpg)\n\n一个医疗健康场景的架构图包含大数据环形组件。中央部分从上至下流动着数据聚合、分析和行动。数据聚合进一步连接到其他组件。\n\
  \n图 7-25\n\n医疗健康场景 来源：[*https://www.researchgate.net/publication/330249318/figure/fig1/AS:713182909829120@1547047464835/Conceptualizing-big-data-in-healthcare-Health-system-data-are-aggregated-with-data.png*](https://www.researchgate.net/publication/330249318/figure/fig1/AS:713182909829120%253F1547047464835/Conceptualizing-big-data-in-healthcare-Health-system-data-are-aggregated-with-data.png)\
  \ `(知识共享协议 https://creativecommons.org/licenses/by/4.0/)`\n\n此处的用例是：一位患者走进医院抱怨背部（靠近脊柱）疼痛。这种疼痛持续存在，他们希望快速获得诊断。\n\
  \n流程如下：\n\n1.  患者通过患者门户和签到流程进入医院。\n\n2.  初始患者分析使用电子健康记录（EHR）和患者提供的信息（如生活质量、疼痛程度、期望值等）进行。\n\
  \n3.  医生建议进行影像学检查和实验室检测。\n\n4.  患者被提供智能可穿戴设备以追踪其在医院内的活动。\n\n5.  当影像学检查、实验室检测和其他相关信息汇总后，医生使用智能\
  \ AI 诊断门户进行可能疾病的诊断。\n\n6.  医生向患者通报诊断结果。\n\n现在让我们看看这个流程涉及的系统：\n\n*   患者门户（数据采集）\n\
  \n*   患者信息采集与汇总（数据聚合）\n\n*   实验室和影像学检查（图像数据）\n\n*   诊断（数据分析与 AI 推荐）\n\n*   智能可穿戴设备（物联网实时数据）\n\
  \n将这一流程转化为云架构视角，可以看出 Spring Cloud Function 在所有这些流程中都扮演着重要角色。因此，确保函数可移植性至关重要，以便在每个场景中都能使用最佳的云服务提供商。参见图\
  \ 7-26。\n\n![](img/526597_1_En_7_Fig26_HTML.jpg)\n\n一个展示 Spring Cloud Function 应用的架构图。包含五个组件：患者门户、初始患者分析、实验室和影像学检查、诊断以及智能手环和设备。这些组件的图标位于旁边。\n\
  \n图 7-26\n\nSpring Cloud Function 在医疗健康流程中的应用\n\n## 7.3 使用 Spring Cloud Function\
  \ 的零售业对话式 AI\n\nAI 与零售业紧密相连。人类享受购物、逛商场、在线购物以及单纯的网络浏览。他们不断接触到 AI，例如通过定向广告、产品推荐和产品展示。许多这些功能由机器人实现。这意味着\
  \ AI 与零售业正在融合。\n\n根据财富商业洞察，零售 AI 市场预计到 2027 年将达到 199 亿美元，2020 年至 2027 年的年复合增长率达\
  \ 34.4%（来源：[`https://www.meticulousresearch.com/product/artificial-intelligence-in-retail-market-4979`](https://www.meticulousresearch.com/product/artificial-intelligence-in-retail-market-4979)）。\n\
  \nAI 在零售业中的主要应用方式包括：\n\n*   基于大数据的预测分析\n\n*   需求预测\n\n*   视觉搜索\n\n*   推荐系统\n\n*\
  \   聊天机器人\n\n*   增强现实\n\n*   品牌管理\n\n新冠疫情改变了 AI 与零售业的互动方式。由聊天机器人驱动的 AI 功能变得尤为重要。\n\
  \n实际上，聊天机器人（或对话式 AI）成为了零售业的 AI 接口。大多数与产品或支持团队的沟通都是通过 AI 交互会话发起的。通过这些聊天机器人提供更好的客户体验对零售商至关重要。如果聊天机器人表现不佳，客户可能会转向其他零售商。因此，品牌管理、推荐、预测和预测都依赖于聊天机器人如何与客户互动，以及是否能提取正确信息以提供最佳体验。\n\
  \nIBM、AWS、Azure、Google 等云服务商将注意力集中在对话式 AI 市场，因为每个零售商都渴望通过这些客户互动获得竞争优势。\n\n我们将探讨\
  \ IBM 如何应对对话式 AI，以及 Spring Cloud Function 在连接系统与用户方面的作用。\n\nIBM 的对话式 AI 解决方案包括 IBM\
  \ Cloud 和云套装（Cloud Pak）上的多种产品。云套装是可以在任何云平台上部署的软件。\n\nIBM Cloud 提供通用 Kubernetes 和\
  \ Red Hat OpenShift Kubernetes，而云套装则基于 Red Hat OpenShift 提供。Spring Cloud Function\
  \ 可以部署在任何 Kubernetes 平台。\n\n图 7-27 展示了对话式 AI 的概念性表示。\n\n![](img/526597_1_En_7_Fig27_HTML.png)\n\
  \n一个展示人工智能对话概念的架构图。包含数据源、对话式 AI 处理、对话渠道和结果。所有这些都有子组件。\n\n图 7-27\n\n对话式 AI 概念\n\n\
  将这一概念转化为基于 IBM Cloud 的架构，即可得到图 7-28。\n\n![](img/526597_1_En_7_Fig28_HTML.jpg)\n\n\
  一个展示对话式 AI 系统的架构图。流程从对话端点开始，经过边缘服务、IBM 云，最终到达用户。IBM 云包含相关组件。\n\n图 7-28\n\n对话式 AI\
  \ 系统视图\n\n### 7.3.1 对话式 AI 解决方案的组件\n\n1.  边缘服务\n\n    边缘服务允许互联网数据流动。这些服务包括 DNS、CDN、防火墙、负载均衡器等。\n\
  \n2.  IBM Watson Assistant\n\n    Watson Assistant 使您能够创建结合机器学习、自然语言处理和图形工具的虚拟代理和聊天机器人，以设计您的对话流程。更多信息请访问\
  \ [`https://www.ibm.com/products/watson-assistant`](https://www.ibm.com/products/watson-assistant)。\n\
  \n3.  IBM Watson Discovery Services\n\n    Watson Discovery Services 帮助您摄入、解析、索引和注释内容。摄入的数据可以来自内部和外部数据源。更多信息请访问\
  \ [`https://www.ibm.com/cloud/watson-discovery`](https://www.ibm.com/cloud/watson-discovery)。\n\
  \n4.  Watson 语音转文本\n\n    Watson 语音转文本将语音转换为文本。更多信息请访问 [`https://www.ibm.com/cloud/watson-speech-to-text`](https://www.ibm.com/cloud/watson-speech-to-text)。\n\
  \n5.  Spring Cloud Function 部署在 OpenShift（IBM Cloud）上的 Knative\n\n    Spring Cloud\
  \ Function 可以部署在 IBM Cloud 的 OpenShift 平台上。需要在 OpenShift 上配置 Knative。此过程在本书的 Knative\
  \ 部署讨论中进行了详细说明。\n\n6.  云上 DB2\n\n    这是一个完全托管的 SQL 数据库。关于云上 DB2 的信息请访问 [`https://www.ibm.com/cloud/db2-on-cloud`](https://www.ibm.com/cloud/db2-on-cloud)。\n\
  \n7.  Cloudant 数据库\n\n    这是一个完全托管的分布式数据库，适用于 Web 和移动应用，以及存储物联网或移动数据。更多信息请访问 [`https://www.ibm.com/cloud/cloudant`](https://www.ibm.com/cloud/cloudant)。\n\
  \n\n\n### 7.3.2 Watson Assistant Webhooks 与 Spring Cloud Function\n\n一旦您创建并部署了一个\
  \ Spring Cloud Function，就需要能够从 Watson Assistant 调用它。这可以通过 Webhooks 实现。\n\nWebhooks\
  \ 需要满足以下要求：\n\n*   调用必须是 `POST` HTTP 请求。您可以在此处使用消费者函数。\n\n*   请求正文必须是 JSON 对象（`Content-Type:\
  \ application/json`）。\n\n*   响应必须是 JSON 对象（`Accept: application/json`）。\n\n*   调用必须在八秒或更少的时间内完成。这是一个重要要求，使用\
  \ Spring Cloud Function 可以轻松满足。\n\n### 7.3.3 使用 Spring Cloud Function 实现 Watson\
  \ Assistant\n\n步骤 1：编写 Spring Cloud Function 代码。Watson Assistant 需要 OpenAPI 规范。将本节中的代码添加到您的\
  \ `Pom.xml` 文件中。\n\n清单 7-6 显示了依赖项。\n\n```\norg.springdoc\nspringdoc-openapi-ui\n\
  1.6.11\n\n清单 7-6\n连接到 Watson Assistant 的 Open API 依赖项\n```\n\n现在您需要为 iMac 库存创建 Spring\
  \ Cloud Function 代码。该模型允许 Watson 连接并获取响应。请参见清单 7-7。\n\n```\npackage com.kubeforce.watsonimacs;\n\
  import javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\nimport\
  \ javax.persistence.Id;\nimport javax.persistence.Table;\n@Entity\n@Table(name=\
  \ \"inventory\")\npublic class Inventory {\n@Id\n@GeneratedValue(generator = \"\
  UUID\")\nprivate Long id;\nprivate String name;\nprivate int inventoryid;\nprivate\
  \ String description;\nprivate String quantity;\npublic Inventory(String name, int\
  \ invid, String description, String quantity)\n{\nthis.name = name;\nthis.inventoryid\
  \ = invid;\nthis.description = description;\nthis.quantity = quantity;\n}\npublic\
  \ Inventory() {\n}\npublic String getName ()\n{\nreturn name;\n}\npublic void setName\
  \ (String name)\n{\nthis.name = name;\n}\npublic int getEmployeeIdentifier ()\n\
  {\nreturn inventoryid;\n}\npublic void setCustomerIdentifier (int invid)\n{\nthis.inventoryid\
  \ = invid;\n}\npublic String getEmail ()\n{\nreturn description;\n}\npublic void\
  \ setEmail (String email)\n{\nthis.description = description;\n}\npublic String\
  \ getSalary ()\n{\nreturn quantity;\n}\npublic void setSalary (String salary)\n\
  {\nthis.quantity = quantity;\n}\npublic Long getId ()\n{\nreturn id;\n}\npublic\
  \ void setId (Long id)\n{\nthis.id = id;\n}\n}\n清单 7-7\ninventory.java\n```\n\n\
  清单 7-8 显示了 `InventoryConsumer` 文件。\n\n```\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport java.util.Map;\n\
  import java.util.function.Consumer;\npublic class InventoryConsumer implements Consumer>\
  \ {\npublic static final Logger LOGGER = LoggerFactory.getLogger(InventoryConsumer.class);\n\
  @Autowired\nprivate InventoryRepository InventoryRepository;\n@Override\npublic\
  \ void accept (Map map)\n{\nLOGGER.info(\"Creating the inventory\", map);\nInventory\
  \ inventory = new Inventory (map.get(\"name\"), Integer.parseInt(map.get(\n\"inventoryid\"\
  )), map.get(\"description\"), map.get(\"quantity\"));\nInventoryRepository.save(inventory);\n\
  }\n}\n清单 7-8\nInventoryConsumer.java\n```\n\n清单 7-9 显示了 `InventoryFunction` 文件。\n\
  \n```\npackage com.kubeforce.watsonimacs;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import java.util.Optional;\nimport java.util.function.Function;\npublic class InventoryFunction\
  \ implements Function  {\n@Autowired\nprivate InventoryRepository inventoryRepository;\n\
  @Override\npublic Inventory apply (Long s)\n{\nOptional inventoryOptional = inventoryRepository.findById(s);\n\
  if (inventoryOptional.isPresent()) {\nreturn inventoryOptional.get();\n}\nreturn\
  \ null;\n}\n}\n清单 7-9\nInventoryFunction.java\n```\n\n清单 7-10 显示了 `InventorySupplier`\
  \ 文件。\n\n```\npackage com.kubeforce.watsonimacs;\nimport org.slf4j.Logger;\nimport\
  \ org.slf4j.LoggerFactory;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.stereotype.Component;\nimport java.util.List;\nimport\
  \ java.util.function.Supplier;\n@Component\npublic class InventorySupplier implements\
  \ Supplier\n{\npublic static final Logger LOGGER = LoggerFactory.getLogger(InventorySupplier.class);\n\
  @Autowired\nprivate InventoryRepository InventoryRepository;\n@Override\npublic\
  \ Inventory get ()\n{\nList inventories = InventoryRepository.findAll();\nLOGGER.info(\"\
  Getting the computer of our choice - \", inventories);\nreturn inventories.get(0);\n\
  }\n}\n清单 7-10\nInventorySupplier.java\n```\n\n\n\n将此代码部署到 IBM Kubernetes Knative\
