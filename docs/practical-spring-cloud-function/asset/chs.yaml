  \ 成功测试结果\n\n至此，已完成通过 GitHub 操作在 Azure Functions 上部署 Spring Cloud Function 的流程。\n\
  \n\n\n## 3.8 在 Kubernetes 上部署到 Knative\n\n在 Kubernetes 上部署 Spring Cloud Function\
  \ 的 CI/CD 流程对于所有平台都相似，唯一不同的是集群名称。本节使用 ArgoCD ([`http://argoproj.github.io`](http://argoproj.github.io))\
  \ 进行持续交付，尽管你也可以使用 GitHub Actions 实现相同效果。我发现 GitHub Actions 需要较多的代码配置，因此希望将 CD 流程与开发过程分离，并使用能够直观展示部署状态的工具。ArgoCD\
  \ 提供了良好的可视化界面。\n\n为了拥有适用于所有云环境的公共仓库，本示例将使用 Docker Hub。Docker Hub 提供了良好的镜像管理界面，并且受到开发者的广泛欢迎。如果你使用\
  \ ECR、GCR 或 ACR，可能会面临厂商锁定的风险。\n\n在任何 Kubernetes 平台上部署的前提条件是相同的：\n\n* 从 GitHub 获取代码。你可以使用\
  \ [`https://github.com/banup-kubeforce/payroll-h2.git`](https://github.com/banup-kubeforce/payroll-h2.git)\
  \ 或推送自定义代码\n\n* 一个 Docker Hub 账户\n\n* 一个用于推送至 Docker Hub 的 Dockerfile\n\n* 项目中的\
  \ GitHub Actions 代码\n\n* 一个配置了 Knative 的 Kubernetes 集群\n\n* ArgoCD 已启动运行\n\n* ArgoCD\
  \ 中配置了用于轮询 GitHub 项目的应用\n\n![](img/526597_1_En_3_Fig30_HTML.jpg)\n\n流程图描述了使用 GitHub\
  \ Actions 和 ArgoCD 部署 Spring Cloud Function 的流程。通过 Git 提交代码会推送至 GitHub，事件触发的 GitHub\
  \ Actions 会将代码推送到 Docker 并从 GitHub 拉取同步至 ArgoCD，最终在 Kubernetes 中部署 Spring Cloud\
  \ Function。\n\n图 3-30\n\n使用 GitHub Actions 和 ArgoCD 部署 Spring Cloud Function 的流程\n\
  \n一旦前提条件准备就绪，你就可以开始配置自动化 CI/CD 流水线。对于本示例实现，你将使用 GitHub 上的代码 [`https://github.com/banup-kubeforce/payroll-h2.git`](https://github.com/banup-kubeforce/payroll-h2.git)。\n\
  \n步骤 1：GitHub 上的 Spring Cloud Function 代码。将你的代码推送到 GitHub。你可以使用 GitHub 中的 `payroll-h2`\
  \ 代码。\n\n步骤 2：创建 GitHub Action。列表 3-8 显示了该操作的代码。\n\n```\nname: ci\non:\npush:\n\
  branches:\n- 'main'\njobs:\ndocker:\nruns-on: ubuntu-latest\nsteps:\n-\nname: 设置\
  \ QEMU\nuses: docker/setup-qemu-action@v2\n-\nname: 设置 Docker Buildx\nuses: docker/setup-buildx-action@v2\n\
  - uses: actions/checkout@v2\n- uses: actions/setup-java@v2\nwith:\njava-version:\
  \ '8'\ndistribution: 'temurin'\ncache: maven\n-\nname: 登录 DockerHub\nuses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9\n\
  with:\nusername: ${{ secrets.DOCKERHUB_USERNAME }}\npassword: ${{ secrets.DOCKERHUB_TOKEN\
  \ }}\n- name: 提取 Docker 元数据（标签、标签）\nid: meta\nuses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38\n\
  with:\nimages: banupkubeforce/springcloudfunctions\n- name: 构建并推送 Docker 镜像\nuses:\
  \ docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc\nwith:\ncontext:\
  \ .\nfile: ./DockerFile\npush: true\ntags: ${{ steps.meta.outputs.tags }}\nlabels:\
  \ ${{ steps.meta.outputs.labels }}\n列表 3-8\n推送 Payroll 函数镜像至 Docker Hub 的工作流\n```\n\
  \n此代码会创建 Docker 镜像并推送到 Docker Hub。你可以在 GitHub 网站上将用户名和密码存储为密钥（见图 3-31）。\n\n```\n\
  username: ${{ secrets.DOCKERHUB_USERNAME }}\npassword: ${{ secrets.DOCKERHUB_TOKEN\
  \ }}\n```\n\n![](img/526597_1_En_3_Fig31_HTML.png)\n\nPayroll-Kubeforce 窗口的截图。在设置中选择操作，显示环境和仓库密钥及其详细信息。\n\
  \n图 3-31\n\nGitHub 密钥存储用于配置和凭证管理\n\n步骤 3：执行 GitHub Actions 构建并推送 Docker 镜像。\n\n\
  GitHub Actions 的执行可以通过推送/提交触发。触发器在 GitHub Actions 的 YAML 文件中定义：\n\n```\non:\npush:\n\
  branches:\n- 'main'\n```\n\n\n\n![](img/526597_1_En_3_Fig32_HTML.jpg)\n\nbanup-kubeforce\
  \ 窗口的截图。Docker 按钮已被选中。在 Docker 下方显示了设置任务、设置 Q E M U、使用 Maven 构建、运行 Sam 包等操作。\n\n\
  图 3-32\n\nGitHub Actions 成功运行\n\n步骤 4：配置 ArgoCD。\n\n按照本章引言中概述的步骤进行 ArgoCD 配置。在执行此命令之前，需要在本地机器上连接到您的集群；请参见列表\
