  下一步是添加应用程序。Spring 提供了一套标准的模板，可用于构建你的数据管道。


  步骤 2：向 SCDF 实例添加应用程序


  使用“添加应用程序”按钮创建一些初始应用程序，用于构建数据管道；参见图 4-7 和 4-8。


