  \ CI/CD 流程。\n\n## 3.3 使用 Spring Cloud Function 构建简单示例\n\n你将使用与第 2 章相同的示例，但这次示例使用的是`EmployeeSupplier`而非`EmployeeConsumer`接口。为此，你需要一个预填充的数据库。随后，你将使用供应商函数查询数据库。你可以在此处找到代码：\
