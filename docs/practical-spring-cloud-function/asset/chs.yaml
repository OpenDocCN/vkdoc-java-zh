  \n\n\n## 3.4 设置 CI/CD 流水线以部署到目标平台\n\n如本章引言中所讨论的，您将使用两个工具进行 CI/CD 流程。GitHub Actions\
  \ 可用作 CI（持续集成）和 CD（持续交付）的工具，而 ArgoCD 是专门用于 CD 的工具。\n\nArgoCD 是为 Kubernetes 设计的，因此您可以专门使用该工具进行\
  \ Knative/Kubernetes 部署。您将使用 GitHub Actions 来处理 Lambda 等无服务器环境。\n\n图 3-13 展示了将代码部署到\
  \ AWS Lambda、Google Cloud Functions 和 Azure Functions 等无服务器环境时的流程。\n\n流程步骤如下：\n\n\
  1. 创建代码并将代码推送到 GitHub 仓库。\n2. GitHub Actions 检测到提交事件触发器，并启动在 actions 脚本中定义的无服务器环境的构建和部署流程。\n\
  \n![](img/526597_1_En_3_Fig13_HTML.jpg)\n\n部署到无服务器函数的流程图。通过 Git 流将代码推送到 GitHub 仓库，GitHub\
  \ 事件触发导致 GitHub Actions 执行并将 Spring Cloud Function 部署到 Lambda。\n\n图 3-13\n\n部署到无服务器函数环境\n\
  \n图 3-13 展示了将 Spring Cloud Function 部署到配置了 Knative 的 Kubernetes 环境时的流程。\n\n流程步骤如下：\n\
  \n1. 创建代码并将代码推送到 GitHub 仓库。\n2. GitHub Actions 检测到提交事件触发器，启动构建流程并将生成的容器镜像部署到 Docker\
  \ Hub。\n3. ArgoCD 轮询 GitHub 的更改并触发“同步”操作。然后从 Docker Hub 获取容器镜像，并将其部署到 Kubernetes\
  \ 上的 Knative。参见图 3-14。\n\n![](img/526597_1_En_3_Fig14_HTML.jpg)\n\n描述部署到 Knative-Kubernetes\
  \ 环境的流程图。通过 Git 提交的代码被推送到 GitHub，GitHub 事件触发的 Actions 将代码推送到 Docker 并同步，Argo 则拉取镜像进行部署。Spring\
  \ Cloud Function 在 Kubernetes 上运行。\n\n图 3-14\n\n部署到 Knative-Kubernetes 环境\n\n##\
  \ 3.5 部署到目标平台\n\n本节将探讨将 Spring Cloud Function 部署到目标环境（如 AWS Lambda、Google Cloud\
  \ Functions、Azure Functions 和 Kubernetes 上的 Knative）的流程。\n\n所有环境的前置条件如下：\n\n* 部署到\
  \ GitHub 的代码仓库\n* 访问和连接目标环境的权限信息\n* 每个环境的第 2 章所有前置条件。请参见第 2 章获取每个环境的详细信息\n* 使用第\
  \ 2 章中成功部署的案例作为每个部署的参考\n\n### 3.5.1 部署到 AWS Lambda\n\n部署到 AWS Lambda 需要使用基于 SAM（Serverless\
  \ Application Model）的 GitHub Actions 脚本。本节将解释如何使用 SAM 和 GitHub Actions。无需额外编码。\n\
  \n前置条件：\n\n* AWS 账户\n* AWS Lambda 函数订阅\n* 存储代码构建的 S3 存储桶\n* （可选）AWS CLI 以通过 CLI\
  \ 验证部署\n* GitHub 上的代码：[`github.com/banup-kubeforce/payroll-aws-h2`](https://github.com/banup-kubeforce/payroll-aws-h2)\n\
  \n![](img/526597_1_En_3_Fig15_HTML.jpg)\n\n描述通过 GitHub Actions 部署 Spring Cloud Function\
  \ 的流程图。通过 Git 提交的代码被推送到 GitHub，GitHub 事件触发的 Actions 将 Spring Cloud Function 部署到\
  \ Lambda。\n\n图 3-15\n\n通过 GitHub Actions 在 AWS Lambda 上部署 Spring Cloud Function\n\
  \n步骤 3：执行 GitHub Actions。一旦工作流配置完成，即可通过 GitHub 控制台或通过`sam-pipeline.yaml`文件中定义的代码提交触发操作。\n\
  \n```\non:\npush:\nbranches: [ \"master\" ]\n```\n\nGitHub Actions 执行 YAML 文件中列出的步骤，并将函数部署到\
  \ AWS Lambda。图 3-17 展示了成功运行的示例。\n\n![](img/526597_1_En_3_Fig17_HTML.jpg)\n\nbanup-kubeforce\
  \ 窗口的截图。选中了构建部署按钮，显示了构建部署窗口，包含设置任务、使用 Maven 构建、运行 Sam package 等操作。\n\n图 3-17\n\n\
  GitHub Actions 在 AWS Lambda 上的成功执行\n\n步骤 4：验证 AWS Lambda 中函数是否正常运行。\n\n![](img/526597_1_En_3_Fig18_HTML.jpg)\n\
  \nAWS Lambda 窗口的截图。选中了函数，显示了函数名称。\n\n图 3-18\n\nGitHub Actions 执行后创建的函数\n\n由于`payroll-aws-h2`应用程序暴露了`EmployeeSupplier`，您可以通过对函数执行简单的`GET`请求，查看\
  \ Spring Cloud Function 启动时插入数据库的数据是否返回结果。\n\n![](img/526597_1_En_3_Fig19_HTML.jpg)\n\
  \nLambda 函数窗口的截图。展示了函数的概述及其描述。\n\n图 3-19\n\n测试函数是否成功。查看 JSON 响应\n\n在图 3-19 中，您可以看到测试已成功，并查看了数据库中的\
  \ JSON 结果。\n\n\n\n## 3.6 部署到 GCP 云函数\n\n使用 GitHub Actions 将代码部署到 GCP 云函数有点侵入性，因为您需要在\
  \ resources 文件夹中添加一个 `MANIFEST.MF` 文件。请查看 GitHub 中的代码。\n\n前提条件：\n\n*   一个包含代码的 GitHub\
  \ 仓库。您可以通过 [`https://github.com/banup-kubeforce/payroll-gcp-h2.git`](https://github.com/banup-kubeforce/payroll-gcp-h2.git)\
  \ 获取代码\n\n*   在 Google Cloud Functions 中注册 Google 账户\n\n*   如果您仅使用 GitHub Actions\
  \ 网站，Gcloud CLI 是可选的\n\n![](img/526597_1_En_3_Fig20_HTML.jpg)\n\n流程图描述了 GCP 与 GitHub\
  \ Actions 的交互流程。通过 Git 提交的代码会被推送到 GitHub。事件触发的 GitHub Actions 会将 Spring Cloud Function\
  \ 部署到 Google 云函数。\n\n图 3-20\n\nGCP 与 GitHub Actions 流程\n\n步骤 1：GitHub 中的 Spring\
  \ Cloud Function 代码。将您的代码推送到 GitHub。如果您已经克隆了 [`https://github.com/banup-kubeforce/payroll-gcp-h2.git`](https://github.com/banup-kubeforce/payroll-gcp-h2.git)，则您已具备将代码推送到仓库所需的所有内容。\n\
  \n步骤 2：设置 Cloud Functions 动作。\n\n设置 GitHub Actions 以运行 Cloud Functions 命令。您有两个选择：\n\
  \n*   使用 `deploy-cloud-functions runner`\n\n*   使用 `gcloud-cli`\n\n列表 3-6 显示了 GitHub\
  \ Actions 文件。\n\n```\nname: Google Cloud Functions\non:\npush:\nbranches: [ \"master\"\
  \ ]\njobs:\nbuild-deploy:\nruns-on: ubuntu-latest\nsteps:\n- uses: actions/checkout@v2\n\
  - uses: actions/setup-java@v2\nwith:\njava-version: '11'\ndistribution: 'temurin'\n\
  cache: maven\n- name: 使用 Maven 构建\nrun: mvn -B package --file pom.xml\n- id: 'auth'\n\
  uses: 'google-github-actions/auth@v0'\nwith:\ncredentials_json: '${{ secrets.GCP_CREDENTIALS\
  \ }}'\n- name: '设置 Cloud SDK'\nuses: 'google-github-actions/setup-gcloud@v0'\n-\
  \ name: '使用 gcloud CLI'\nrun: 'gcloud functions deploy payroll-gcp --entry-point\
  \ org.springframework.cloud.function.adapter.gcp.GcfJarLauncher --runtime java11\
  \ --trigger-http --source target/deploy --memory 512MB'\n列表 3-6\n部署到 GCP 云函数的 Payroll\
  \ 函数工作流\n```\n\n请注意，您需要在 GitHub 密钥仪表板中存储 `GCP_CREDENTIALS`。\n\n与之前的 AWS Lambda 示例类似，注意检出、设置和构建\
  \ Maven 的步骤是相同的。对于认证和部署，您使用 Google Cloud CLI。设置 Cloud SDK 任务会下载并配置 Google CLI。您可以使用与第\
  \ 2 章节中从笔记本电脑部署时相同的命令行脚本。\n\n步骤 3：提交并推送代码以触发 GitHub Actions。此触发器由 actions 代码定义。在此示例中，任何对“master”分支的推送或提交都会触发\
  \ GitHub Actions。\n\n```\non:\npush:\nbranches: [ \"master\" ]\n```\n\n这可以在 GitHub\
  \ Actions 网站或 IDE 中完成。您可以通过在“master”分支上进行简单修改来提交更改。这将启动 GitHub Action 流程。\n\n![](img/526597_1_En_3_Fig21_HTML.jpg)\n\
  \nbanup-kubeforce 窗口的截图。已选择“构建部署”按钮。构建部署窗口显示了一个新界面，包括设置任务、使用 Maven 构建、运行 Sam 包装等。\n\
  \n图 3-21\n\n代码提交触发 GitHub Actions\n\n一旦 actions 成功完成任务，您可以前往 Google 云函数仪表板并测试该函数。同样，您只需对\
  \ `EmployeeSupplier` 函数执行一个简单的 GET 请求即可。\n\n步骤 4：测试函数。\n\n在测试函数之前，请确保从未认证设备（如您的笔记本电脑）调用该函数。完成测试后，请移除权限以避免不必要的调用。\n\
  \n![](img/526597_1_En_3_Fig22_HTML.png)\n\npayroll-g c p- h 2 的未认证设置截图。已允许设置，其中包括指向第一代\
  \ payroll 的链接及其他详细信息。\n\n图 3-22\n\n允许 payroll-gcp-h2 的未认证设置\n\n您可以前往 Google 云函数仪表板中的函数控制台并执行测试。您无需提供任何输入，只需点击“测试函数”按钮即可执行测试。您将在“输出”部分看到\
  \ `EmployeeSupplier` 的输出结果，如图 3-23 所示。\n\n![](img/526597_1_En_3_Fig23_HTML.jpg)\n\
  \nGoogle 云窗口的截图。显示了云函数。在 payroll-g c p-h 2 中，已选择一个函数。它配置了触发事件并显示了测试命令。\n\n图 3-23\n\
  \nGCP 云函数中 Spring Cloud Function 测试的成功输出\n\n\n\n## 3.7 部署到 Azure Functions\n\n在\
  \ Azure Functions 上部署 Spring Cloud Function 需要一些调整，正如你在第 2 章中所学到的。这是因为配置未实现外部化，与\
