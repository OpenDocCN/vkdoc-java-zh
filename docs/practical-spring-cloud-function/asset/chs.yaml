  ## 5.4 使用 Google Cloud Functions 和 TensorFlow 通过 Spring Cloud Function 进行模型服务


  本节探讨了在 Google 上的模型服务。它使用 TensorFlow，这是 Google 的 AI/ML 产品，并解释了如何使用 MNIST (`https://en.wikipedia.org/wiki/MNIST_database`)
  等数据集构建和保存 AI 模型。




  ### 5.4.1 TensorFlow


  TensorFlow 是由 Google 开发的开源机器学习平台。它是表达和执行机器学习算法的接口。TensorFlow 的美妙之处在于，用 TensorFlow
  表达的模型可以几乎无需修改地在移动设备、笔记本电脑或配备多个 GPU 和 CPU 的大规模系统上运行。TensorFlow 具有高度灵活性，能够表达大量算法，包括深度神经网络的训练和推理算法、语音识别、机器人技术、药物发现等。


  在图 5-9 中，你可以看到 TensorFlow 可以部署到多个平台，并支持多种语言接口。不幸的是，TensorFlow 是用 Python 编写的，因此大多数模型都是用
  Python 编写和部署的。这对采用 Java 标准化的企业来说提出了独特的挑战。


  尽管 TensorFlow 是用 Python 编写的，但仍有大量基于 Java 的框架可以与保存的模型配合使用。


  让我们看看如何在 Google Cloud 平台上使用 TensorFlow。


  Google Cloud 提供了多种处理模型的方式。你可以使用基于容器或 Kubernetes 的方法、基于 SaaS 的方法，或基于 Cloud Functions
  的方法。每种方法都有其优缺点。Google 发布了一篇优秀的指南，帮助你根据需求选择合适的平台，如表 5-2 所示。


  表 5-2


  Google 和 AI/ML 环境^(²)


  | ![](img/526597_1_En_5_Figa_HTML.jpg)一个包含 4 列 6 行的表格。列标题为特征、计算引擎、AI 平台预测、云函数。它对特征和描述进行了分类。
  |


  从表 5-2 可以看出，云函数被推荐用于实验。Google 建议对于生产部署，使用计算引擎搭配 TF Serving，或其 SaaS 平台（AI 平台）进行预测。


  这种方法的问题在于，基于函数的方案不仅仅是实验环境。函数是一种通过 API 暴露预测服务能力的方式，同时节省成本。这是一种无服务器架构，因此企业无需担心扩展问题。


  ### 5.4.2 示例模型训练与服务


  在本节中，你将看到如何在本地训练 AI 模型并上传到 Google Cloud Storage。随后，你将下载该模型并通过 Cloud Function API
  测试一张图片。你将使用基于 MNIST 的模型。关于 MNIST 的更多信息可以访问 `https://en.wikipedia.org/wiki/MNIST_database`。


  在本示例中，你将在 Python 中开发模型，然后通过 Spring Cloud Function 和 DJL 暴露该模型；如图 5-11 所示。


  ![](img/526597_1_En_5_Fig11_HTML.jpg)


  Spring Cloud Function 模型。它展示了 HTTP JSON 请求、云存储和云函数的 TensorFlow 流程，包含两个 Spring Cloud
  Function 标志和深度 Java 库。


  图 5-11


  Spring Cloud Function 与 DJL 和 TensorFlow


  你将使用在 `https://cloud.google.com/blog/products/ai-machine-learning/how-to-serve-deep-learning-models-using-tensorflow-2-0-with-cloud-functions`
  中概述的相同示例。这将使你能够更专注于即将创建的 Spring Cloud Function 代码，而不是 Python 的实际实现。


  随后，你将使用 Spring Cloud Function 来服务该模型。


  步骤 1：安装 TensorFlow。


  ```

  python3 -m pip install tensorflow

  ```


  步骤 2：创建项目。创建一个名为`MNIST`的项目，然后使用列表 5-4 中的代码创建一个`main.py`文件。我使用 PyCharm 运行了这段代码。


  在你的 Mac 上，运行代码前请确保执行以下命令；否则会出现证书错误。代码尝试从`googleapis`下载包：


  ```

  open /Applications/Python\ 3.7/Install\ Certificates.command

  ```


  我运行了`main.py`，整个过程耗时 13 分钟。最终，我得到了两个模型文件作为输出。




  ```

  from __future__ import absolute_import

  from __future__ import division

  from __future__ import print_function

  from __future__ import unicode_literals

  import tensorflow as tf

  from tensorflow.keras.layers import Dense, Flatten, Conv2D

  from tensorflow.keras import Model

  EPOCHS = 10

  mnist = tf.keras.datasets.mnist

  fashion_mnist = tf.keras.datasets.fashion_mnist

  (x_train, y_train), (x_test, y_test) = fashion_mnist.load_data()

  x_train, x_test = x_train / 255.0, x_test / 255.0

  # Add a channels dimension e.g. (60000, 28, 28) => (60000, 28, 28, 1)

  x_train = x_train[..., tf.newaxis]

  x_test = x_test[..., tf.newaxis]

  train_ds = tf.data.Dataset.from_tensor_slices(

  (x_train, y_train)).shuffle(10000).batch(32)

  test_ds = tf.data.Dataset.from_tensor_slices((x_test, y_test)).batch(32)

  class CustomModel(Model):

  def __init__(self):

  super(CustomModel, self).__init__()

  self.conv1 = Conv2D(32, 3, activation=''relu'')

  self.flatten = Flatten()

  self.d1 = Dense(128, activation=''relu'')

  self.d2 = Dense(10, activation=''softmax'')

  def call(self, x):

  x = self.conv1(x)

  x = self.flatten(x)

  x = self.d1(x)

  return self.d2(x)

  model = CustomModel()

  loss_object = tf.keras.losses.SparseCategoricalCrossentropy()

  optimizer = tf.keras.optimizers.Adam()

  train_loss = tf.keras.metrics.Mean(name=''train_loss'')

  train_accuracy = tf.keras.metrics.SparseCategoricalAccuracy(name=''train_accuracy'')

  test_loss = tf.keras.metrics.Mean(name=''test_loss'')

  test_accuracy = tf.keras.metrics.SparseCategoricalAccuracy(name=''test_accuracy'')

  @tf.function

  def train_step(images, labels):

  with tf.GradientTape() as tape:

  predictions = model(images)

  loss = loss_object(labels, predictions)

  gradients = tape.gradient(loss, model.trainable_variables)

  optimizer.apply_gradients(zip(gradients, model.trainable_variables))

  train_loss(loss)

  train_accuracy(labels, predictions)

  @tf.function

  def test_step(images, labels):

  predictions = model(images)

  t_loss = loss_object(labels, predictions)

  test_loss(t_loss)

  test_accuracy(labels, predictions)

  for epoch in range(EPOCHS):

  for images, labels in train_ds:

  train_step(images, labels)

  for test_images, test_labels in test_ds:

  test_step(test_images, test_labels)

  template = ''Epoch {}, Loss: {}, Accuracy: {}, Test Loss: {}, Test Accuracy: {}''

  print(template.format(epoch + 1,

  train_loss.result(),

  train_accuracy.result() * 100,

  test_loss.result(),

  test_accuracy.result() * 100))

  # Save the weights

  model.save_weights(''fashion_mnist_weights'')

  tf.saved_model.save(model, export_dir="c://Users//banua//Downloads/MNIST/models")

  Listing 5-4

  main.py

  ```


  关键是 `tf.saved_model.save(model, export_dir="c://Users//banua//Downloads/MNIST/models")`。


  这将保存模型，以便任何模型服务器都可以使用它。


