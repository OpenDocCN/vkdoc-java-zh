  \ 设置 Google Cloud Functions 项目。\n5. 将 Spring Cloud Function 部署到 Google Cloud Functions。\n\
  6. 在 GCP 上部署 Apigee 以托管函数 API。\n7. 设置 Google Cloud Pub/Sub 消息平台。\n\n### 1.6.4 Knative\
  \ 和 GCP 上的 GKE\n\n如前所述，Knative 是一种实现函数可移植性的方法。顺便提及的是，Knative 是由 Google 创建的。在 GCP\
