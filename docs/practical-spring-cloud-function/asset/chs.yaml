  ## 2.4 设置 Spring Cloud Function Azure 函数


  你将使用第 2.1 节中的相同示例，并对其进行少量修改以使其在 Azure 函数上运行。你将看到 Azure 函数的处理方式与其他云平台（如 AWS 或 Google）不同。你需要添加一个名为`EmployeeConsumerHandler`的类，该类继承自`FunctionInvoker<I,O>`。这个`FunctionInvoker`类仅仅是`EmployeeConsumer`函数的简单传递。


  前提条件：


  * Azure 账户

  * Azure 函数订阅

  * Azure 函数 CLI。你可以通过 [`https://docs.microsoft.com/en-us/azure/azure-functions/functions-run-local`](https://docs.microsoft.com/en-us/azure/azure-functions/functions-run-local)
  下载相关工具

  * GitHub 上的代码 [`https://github.com/banup-kubeforce/payroll-azure`](https://github.com/banup-kubeforce/payroll-azure)


  步骤 1：按照第 2.1 节中概述的步骤 1-6 进行操作。


  你需要引入一个名为`FunctionInvoker <I,O>`的类，这会使代码无法在其他云平台上直接运行。虽然 AWS 和 Google 会将函数调用外部化（如前几节所示），但
  Azure 要求你提供一个继承自`FunctionInvoker`的处理类。


  清单 2-12 引入了名为`EmployeeConsumerHandler`的类，该类继承自`FunctionInvoker`。该`FunctionInvoker`的输入将是一个`Map<String,String>`，它会接收传递的
  JSON 对象。然后该对象会被发送到`EmployeeConsumer`函数进行处理。


  ```

  package com.kubeforce.payrollazure;

  import com.microsoft.azure.functions.*;

  import com.microsoft.azure.functions.annotation.*;

  import org.aspectj.weaver.NewConstructorTypeMunger;

  import org.springframework.cloud.function.adapter.azure.FunctionInvoker;

  import java.util.List;

  import java.util.Map;

  import java.util.Optional;

  import org.springframework.messaging.Message;

  import org.springframework.messaging.support.MessageBuilder;

  public class EmployeeConsumerHandler extends FunctionInvoker<String, String> {

  @FunctionName("employeeConsumer")

  public String execute(

  @HttpTrigger(name = "request", methods = {HttpMethod.GET, HttpMethod.POST}, authLevel
  = AuthorizationLevel.ANONYMOUS) HttpRequestMessage<String> request,

  ExecutionContext context) {

  String message = "成功插入： " +request.getBody().get().getName();

  return message;

  }

  }

  清单 2-12

  EmployeeConsumerHandler.java

  ```


