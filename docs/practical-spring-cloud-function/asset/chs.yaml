  ```

  $sudo curl -L "https://storage.googleapis.com/kubernetes-release/release/`curl -s
  https://storage.googleapis.com/kubernetes-release/release/stable.txt`/bin/linux/amd64/kubectl"
  -o /usr/local/bin/kubectl

