  导入一些预构建的初始模板。你还可以选择基于 Maven 或 Docker 的初始模板，或基于 RabbitMQ 或 Kafka 的初始模板。RabbitMQ 和
  Kafka 作为 SCDF 内部组件的骨干消息系统，不用于外部场景。在 Kubernetes 集群部署时，必须选择基于 Docker 的初始模板。在本地 Docker
  环境部署时，可以选择基于 Maven 或 Docker 的初始模板。


