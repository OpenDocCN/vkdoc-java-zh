  \ 加上 Knative 的 Spring Cloud Function。\n\n图 1-17\n\nTKG 上的 Spring Cloud Function\n\
  \n1. 将 SAP ECC 作为 Docker 镜像部署到 TKG。\n2. 将 Oracle 数据库作为 Docker 镜像部署到 TKG。\n3. 配置\
  \ SAP 与 Oracle 的集成。\n4. 在 TKG 集群中配置 Knative。\n5. 将 Spring Cloud Function 部署到 Knative。\n\
  6. 在 TKG 上设置 Spring Cloud 网关作为 API 网关。\n7. 在 TKG 上设置 RabbitMQ 用于消息传递。\n\n\n\n###\
  \ 1.6.8 Spring Cloud Function 在 Red Hat OpenShift (OCP)上部署\n\nRed Hat OpenShift\
  \ 可以作为部署 Spring Cloud Function 的本地选项。与任何 Kubernetes 实现一样，它需要实现 Knative 才能运行函数。OpenShift\
  \ 拥有自己的无服务器实现，称为 OpenShift serverless。将薪资系统应用程序转换为 OpenShift 需要一个 OpenShift 集群。\n\
  \n要将薪资系统部署到 VMware vSphere 环境上的 OpenShift，需遵循以下流程。首先确保 SAP ECC 和 Oracle DB 已启动并集成，然后再在\
  \ Knative 上开发和部署 Spring Cloud Function：\n\n1.  将 SAP ECC 作为 Docker 镜像部署到 OpenShift\
  \ 集群中。\n2.  将 Oracle DB 作为 Docker 镜像部署到 OpenShift 集群中。\n3.  配置 SAP 与 Oracle 的集成。\n\
  4.  在 OpenShift 集群中配置 Knative。\n5.  将 Spring Cloud Function 部署到 Knative。\n6.  在\
  \ OpenShift 上设置 Red Hat 3scale API 网关。\n7.  在 TKG 上设置 RabbitMQ 用于消息传递。\n\n![](img/526597_1_En_1_Fig19_HTML.jpg)\n\
  \n架构图描述了 Oracle 在 Docker 上加上 OpenShift 的员工详细信息流程，从验证到计算薪资。该流程通过 RabbitMQ 流向 OpenShift\
  \ 无服务器架构加上 Spring Cloud Function。\n\n图 1-19\n\nSpring Cloud Function 在 Red Hat OpenShift\
  \ 上\n\n## 1.7 总结\n\n本章讨论了 FaaS 环境、Spring Cloud Function 和 Knative。您了解到 AWS、Google\
  \ 或 Microsoft Azure 提供的 FaaS 容器/环境不具备可移植性，因为底层组件的架构不同，导致难以在云服务商之间迁移 FaaS 容器。您还看到\
  \ Spring Cloud Function 可以抽象依赖的 AWS 和 Google 库，提供一种可移植的替代方案。在 Knative 上使用 Spring\
  \ Cloud Function 可以实现“一次编写，随处部署”，从而提升开发者效率。您学习了如何将 Spring Cloud Function 和 Knative\
  \ 应用于企业薪资系统，并了解了各种实现方式。下一章将逐步演示部署过程。您还将看到如何使用 IntelliJ 或 VS Code 等单一 IDE 开发并部署代码到不同目标环境，如\
  \ AWS、GCP、Azure、OpenShift 和 VMware Tanzu。这将帮助您理解 Spring Cloud Function 的强大功能。\n\n"
- '# 2. 使用 Spring Cloud Function 入门


  本章讨论如何使用 Spring Cloud Function 开发代码，并将其部署到云环境、本地（本地数据中心）和笔记本电脑上。它包含编码和部署函数的逐步方法。


  提供了一个薪资系统的示例用例，包括插入薪资详情和检索薪资信息。以下是这些环境中需要执行的一些常见任务：


  1.  设置 Spring Boot 框架的 IDE。

  2.  添加 JPA、H2（本示例使用嵌入式数据库来演示 CRUD 操作）、Spring Cloud Function 和 Spring Web 支持。

  3.  完成`EmployeeFunction`、`EmployeeConsumer`和`EmployeeSupplier`代码的编写。


  请注意，在所有环境中代码保持不变，您唯一需要修改的是`pom.xml`文件。您还会看到一个关于 Azure Functions 的`FunctionInvoker`
  `<Message<String>`, `<String>`类的介绍。Azure 构建过程会在构建时寻找此类。另一个与 Azure 的不同之处是，您必须使用 JDK
  11 及以上版本才能在 IDE 中获取 Azure 模板。


  在 Knative 和 Kubernetes 环境（如 EKS、AKS、GKE、OpenShift 和 Kubernetes 网格）中，您将执行以下常见任务：


  1.  创建代码的 Docker 镜像。

  2.  在所有环境中设置 Knative。

  3.  将代码部署到 Knative。


  将 Spring Cloud Function 部署到 Knative 将展示真正的可移植性。


  您还将看到如何使用单一 IDE（如 IntelliJ 或 VS Code）执行所有功能（即构建和部署到目标环境）。


  我使用了多种设备来设置本地和本地 Kubernetes 环境。我建议使用 VMware 虚拟机。您可以从 VMware 免费获取 VMware Workstation
  Player：[`https://www.vmware.com/products/workstation-player.xhtml`](https://www.vmware.com/products/workstation-player.xhtml)。您也可以使用其他替代方案，如
  Windows Subsystem for Linux (WSL)或 Virtual Box。


  所有代码均可在 GitHub 上获取：`https://github.com/banup-kubeforce payroll-h2.git`。


