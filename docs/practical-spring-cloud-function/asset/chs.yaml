  AWS IoT Greengrass 的实现将 AWS 云扩展到本地环境。您可以在 Greengrass 的边缘运行 Lambda 函数。


  步骤 1：安装 AWS IoT Greengrass。在设备上安装 AWS IoT Greengrass（[`https://docs.aws.amazon.com/greengrass/v1/developerguide/install-ggc.xhtml`](https://docs.aws.amazon.com/greengrass/v1/developerguide/install-ggc.xhtml)）。为了测试，我在
