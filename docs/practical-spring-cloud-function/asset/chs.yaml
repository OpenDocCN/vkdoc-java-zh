  ### 6.1.2 在本地部署无服务器函数的优势


  由于传感器是按间隔发送数据，因此最好由云函数处理输入，而不是专用的微服务。专用微服务需要在环境中运行，并且在调用时无法缩放到零。它们只能在需要调用时存在的环境中进行配置。这使得微服务成为一种高成本的方法。另一方面，函数仅在有事件触发时才会被调用。如果未被调用，资源利用率可以降至零。这是因为底层的无服务器基础设施（如
  Lambda 和 Knative）在未被调用时可以缩放到零。


  这使其成为一种更具成本效益的替代方案。该方案适用于本地部署和云端环境。如果是在本地部署，反对在无服务器环境中使用云函数的论点是：基础设施成本已经计入。因此，始终在线的专用微服务是可行的。将资源浪费在拥有它们上并不是高效使用
  IT 资源的明智方式。在无服务器环境中运行的函数（如在 OpenShift 或 VMware Tanzu 上运行的 Knative）可以帮助本地节省资源，这些资源可以用于运行其他活动。本地资源是有限的，因此充分利用它们是明智的。


  ## 6.2 使用 AWS IoT 在云端部署 Spring Cloud Function


  考虑一个使用案例：一家汽车装配工厂希望确保其机器人正常运行。工程师们希望监控每个机器人数据以检测异常，并在发生故障时及时收到警报。该装配工厂设有防火墙，任何需要分析的数据都可以发送到云端。


  解决方案是一个混合云环境，隔离装配工厂的车间但连接云端以传输车间数据。图 6-3 展示了使用 AWS 产品实现的解决方案，这些产品可在本地部署并连接云端，以与决策相关的其他系统同步数据。


  ![](img/526597_1_En_6_Fig3_HTML.png)


  一个流程图包含 2 个模块和 3 个步骤。步骤 1：在汽车装配工厂模块中，传感器将数据发送到本地部署的 Spring Cloud 组件，包括 AWS Lambda
  和 AWS IoT Greengrass。步骤 2：在 AWS 云模块中，AWS IoT Core 通过防火墙接收来自工厂模块的数据，并将其发送到 Lambda。步骤
  3：Lambda 的数据存储在亚马逊的简单存储服务 S3 中。


