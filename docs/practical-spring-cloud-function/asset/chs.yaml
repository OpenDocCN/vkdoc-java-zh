  将本地部署的应用程序转换为利用 AWS Lambda 环境并实现可移植性，需要编写抽象掉 AWS Lambda 硬依赖的函数代码。此示例使用 Spring Cloud\
  \ Function 作为函数代码框架，Lambda 作为容器。通过使用 Spring Cloud Function 一次编写，您可以利用后续章节中讨论的 DevOps\
  \ 流水线将应用程序部署到其他无服务器环境。图 1-11 展示了 AWS 及其组件如何帮助在云中实现薪资应用程序。\n\n![](img/526597_1_En_1_Fig11_HTML.jpg)\n\
