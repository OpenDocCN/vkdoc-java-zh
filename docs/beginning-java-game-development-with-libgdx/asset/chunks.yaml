  raw: 'Return to the TreasureQuest project in BlueJ, and as usual, copy the classes
    BaseGame, BaseScreen, BaseActor, AnimatedActor, PhysicsActor, and GameUtils. You
    can also copy a launcher-style class and a BaseGame-extending class from a previous
    project, and modify their code as needed. The only new class you need to code
    from scratch is the GameScreen class (which extends the BaseScreen class), discussed
    next.


    You’ll start with the core code for the GameScreen class, including the import
    statements you will eventually need (of which there are many!), variable declarations,
    and method declarations (which will be filled in later). You need various types
    of actor variables for the player, key, door, and a base coin instance from which
    additional coins will be cloned later. Lists are needed to keep track of the coins
    and walls for collision checking later in the update method. The variables tileSize,
    tileCountWidth, and tileCountHeight are used to calculate the values of mapWidth
    and mapHeight. The integer arrays backgroundLayers and foregroundLayers store
    the indices of the tilemap layers to be rendered before and after the main stage,
    respectively. Most interesting are the instances of the newly imported classes,
    which accomplish the following tasks:


    *   The TiledMap object is used to store the data from the tilemap file, which
    is loaded using a static method from the TmxMapLoader class.

    *   The OrthogonalTileMapRenderer object is used to draw the contents of the various
    layers of the tilemap; the layers to be rendered are specified by an array of
    integers.

    *   The OrthographicCamera is used to determine which region of a tilemap layer
    should be rendered, analogous to the role of the Camera object that belongs to
    each Stage.


    Without further ado, here is the core code for the BaseScreen class:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.graphics.g2d.Animation.PlayMode;

    import com.badlogic.gdx.graphics.Camera;

    import com.badlogic.gdx.math.MathUtils;

    import com.badlogic.gdx.math.Rectangle;

    import com.badlogic.gdx.graphics.GL20;


    import com.badlogic.gdx.maps.MapObject;

    import com.badlogic.gdx.maps.MapObjects;

    import com.badlogic.gdx.maps.objects.RectangleMapObject;

    import com.badlogic.gdx.maps.tiled.TiledMap;

    import com.badlogic.gdx.maps.tiled.TmxMapLoader;

    import com.badlogic.gdx.maps.tiled.renderers.OrthogonalTiledMapRenderer;

    import com.badlogic.gdx.graphics.OrthographicCamera;


    import java.util.ArrayList;


    public class GameScreen extends BaseScreen

    {

        private PhysicsActor player;

        private BaseActor door;

        private BaseActor key;

        private boolean hasKey;


    private BaseActor baseCoin;

        private ArrayList<BaseActor> coinList;


    private ArrayList<BaseActor> wallList;

        private ArrayList<BaseActor> removeList;


    private int tileSize = 64;

        private int tileCountWidth = 20;

        private int tileCountHeight = 20;


    // calculate game world dimensions

        final int mapWidth  = tileSize * tileCountWidth;

        final int mapHeight = tileSize * tileCountHeight;


    private TiledMap tiledMap;

        private OrthographicCamera tiledCamera;

        private OrthogonalTiledMapRenderer tiledMapRenderer;

        private int[] backgroundLayers = {0,1};

        private int[] foregroundLayers = {2};


    public GameScreen(BaseGame g)

        {  super(g);   }


    public void create()

        {    }


    public void update(float dt)

        {    }


    public void render(float dt)

        {    }


    }

    ```


    Now let’s turn our attention to the create method. The following code initializes
    the player, key, door, and a base coin instance. Note, however, that the positions
    of these objects are not set at this time; this data will be set later after retrieving
    it from the tilemap. In addition, the code initializes all the needed lists.


    ```

    player = new PhysicsActor();

    Texture playerTex = new Texture( Gdx.files.internal("assets/general-single.png")
    );

    player.storeAnimation("default", playerTex);

    player.setEllipseBoundary();

    mainStage.addActor(player);


    key = new BaseActor();

    key.setTexture( new Texture(Gdx.files.internal("assets/key.png")) );

    key.setSize(36,24);

    key.setEllipseBoundary();

    mainStage.addActor( key );


    door = new BaseActor();

    door.setTexture( new Texture(Gdx.files.internal("assets/door.png")) );

    door.setRectangleBoundary();

    mainStage.addActor( door );


    baseCoin = new BaseActor();

    baseCoin.setTexture( new Texture(Gdx.files.internal("assets/coin.png")) );

    baseCoin.setEllipseBoundary();


    coinList = new ArrayList<BaseActor>();

    wallList = new ArrayList<BaseActor>();

    removeList = new ArrayList<BaseActor>();

    ```


    Next, you initialize the objects from the new classes:


    ```

    // set up tile map, renderer, and camera

    tiledMap = new TmxMapLoader().load("assets/game-map.tmx");

    tiledMapRenderer = new OrthogonalTiledMapRenderer(tiledMap);

    tiledCamera = new OrthographicCamera();

    tiledCamera.setToOrtho(false, viewWidth, viewHeight);

    tiledCamera.update();

    ```


    Now you will write the code that retrieves geometric data from the tilemap. From
    the tilemap object, you can retrieve the list of layers, followed by a specific
    layer (by name), followed by a list of MapObjects contained in that layer. While
    iterating over this list, you can retrieve the name of each object (which you
    entered when using the Tiled program). Since only rectangles were used in the
    object data layers, each MapObject can be safely cast into a RectangleMapObject
    in order to retrieve its position. Then, with a sequence of conditional statements
    that check the name of the object, the position of the corresponding game entity
    can be set. If the MapObject represents a coin, the base coin instance must be
    cloned and this new actor added to the main stage.


    ```

    MapObjects objects = tiledMap.getLayers().get("ObjectData").getObjects();

    for (MapObject object : objects)

    {

        String name = object.getName();


    RectangleMapObject rectangleObject = (RectangleMapObject)object;

        Rectangle r = rectangleObject.getRectangle();


    switch (name)

        {

            case "player":

                player.setPosition( r.x, r.y );

                break;

           case "coin":

                BaseActor coin = baseCoin.clone();

                coin.setPosition(r.x, r.y);

                mainStage.addActor(coin);

                coinList.add(coin);

                break;

            case "door":

                door.setPosition( r.x, r.y );

                break;

            case "key":

                key.setPosition( r.x, r.y );

                break;

            default:

                System.err.println("Unknown tilemap object: " + name);

        }

    }

    ```


    You repeat this process to gather the geometric data that represents solid walls.
    First, retrieve the list of map objects from the layer named PhysicsData. The
    names of these objects don’t need to be retrieved; you didn’t set their names
    when using Tiled, because all objects in this layer serve the same purpose and
    it is not necessary to distinguish between them. Note in particular that no texture
    is set for these objects, nor are they added to any stage. This is because the
    graphics are already represented by the tilemap; the only purposes these actors
    serve is for collision detection, and so they only need to be added to the appropriate
    ArrayList for later checking in the update method.


    ```

    objects = tiledMap.getLayers().get("PhysicsData").getObjects();

    for (MapObject object : objects)

    {

        RectangleMapObject rectangleObject = (RectangleMapObject)object;

        Rectangle r = rectangleObject.getRectangle();


    BaseActor solid = new BaseActor();

        solid.setPosition(r.x, r.y);

        solid.setSize(r.width, r.height);

        solid.setRectangleBoundary();

        wallList.add(solid);

    }

    ```


    This completes the code for the create method; the next area of focus is the contents
    of the update method.'
