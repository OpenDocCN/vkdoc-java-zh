    This completes the methods for the BaseActor class.


    The AnimatedActor Class


    Next, you’ll modify the AnimatedActor class. The main purpose of this class is
    to manage a set of animations, and select the correct image from the active animation
    (by *active*, I mean the animation that is currently being rendered). For simplicity,
    to each Animation you’d like to associate a String that represents its name. For
    example, in a top-view adventure game, the main character might have four animations
    named north, south, east, and west, one for each direction she might be walking
    in. In a platformer action game, the main character might have animations named
    stand, walk, and jump that correspond to each of these actions in the game.


    To store this information, you’ll use the HashMap data structure, as discussed
    previously. String objects will be used as keys, and Animation objects will be
    the associated values; therefore, the full data type is HashMap<String,Animation>.
    You’ll include a method named storeAnimation that puts this data into the HashMap,
    and a method named setActiveAnimation that gets an animation from the HashMap
    and sets it to be the currently active animation. You’ll also have a field named
    activeName that stores the name of the currently active animation, to make it
    easier to check what’s currently playing. You’ll also add a few nice touches for
    convenience: the first animation loaded will be set as the default, and there
    will be a version of the storeAnimation method that takes a Texture as input and
    will automatically convert it to a one-frame, or *still*, animation.


    Here is the code for the AnimatedActor class:


    ```

    import com.badlogic.gdx.graphics.g2d.Batch;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import java.util.HashMap;


    public class AnimatedActor extends BaseActor

    {

        private float elapsedTime;

        private Animation activeAnim;

        private String activeName;

        private HashMap<String,Animation> animationStorage;


    public AnimatedActor()

        {

            super();

            elapsedTime = 0;

            activeAnim = null;

            activeName = null;

            animationStorage = new HashMap<String,Animation>();

        }


    public void storeAnimation(String name, Animation anim)

        {

            animationStorage.put(name, anim);

            if (activeName == null)

                setActiveAnimation(name);

        }


    public void storeAnimation(String name, Texture tex)

        {

            TextureRegion reg = new TextureRegion(tex);

            TextureRegion[] frames = { reg };

            Animation anim = new Animation(1.0f, frames);

            storeAnimation(name, anim);

        }


    public void setActiveAnimation(String name)

        {

            if ( !animationStorage.containsKey(name) )

            {

                System.out.println("No animation: " + name);

                return;

            }


    // no need to set animation if already running

            if ( activeName.equals(name) )

                return;


    activeName = name;

            activeAnim = animationStorage.get(name);

            elapsedTime = 0;


    Texture tex = activeAnim.getKeyFrame(0).getTexture();

            setWidth( tex.getWidth() );

            setHeight( tex.getHeight() );

        }


    public String getAnimationName()

        {

            return activeName;

        }


    public void act(float dt)

        {

            super.act( dt );

            elapsedTime += dt;

        }


    public void draw(Batch batch, float parentAlpha)

        {

            region.setRegion( activeAnim.getKeyFrame(elapsedTime) );

            super.draw(batch, parentAlpha);

        }

    }

    ```


    The PhysicsActor Class


    Finally, we come to the topic of the brand new PhysicsActor class, which extends
    the AnimatedActor class. This class will store velocity as well as acceleration
    data, which will make movement appear much smoother. Instead of setting velocity
    when a movement key is pressed, you can choose to set acceleration, which causes
    the actor to slowly gain speed (much like a car does when the gas pedal, also
    known as the accelerator, is pressed). This data will be stored using the Vector2
    class, which stores two-dimensional vector data, both an x and a y component;
    there are also convenience methods for operations such as adding two vectors together,
    or calculating the length of a vector. In the PhysicsActor class, you’ll store
    a maxSpeed value, which will be used to stop the actor from gaining speed indefinitely,
    and also a deceleration value, which will control how quickly the character slows
    down (its speed decreases) when not accelerating. Finally, a Boolean variable
    autoAngle will determine whether an actor’s image should be rotated to match the
    direction of motion. The following are the import statements, variable declarations,
    and constructor method for this class:


    ```

    import com.badlogic.gdx.math.Vector2;

    import com.badlogic.gdx.math.MathUtils;


    public class PhysicsActor extends AnimatedActor

    {

        private Vector2 velocity;

        private Vector2 acceleration;


    // maximum speed

        private float maxSpeed;


    // speed reduction, in pixels/second, when not accelerating

        private float deceleration;


    // should image rotate to match velocity?

        private boolean autoAngle;


    public PhysicsActor()

        {

            velocity = new Vector2();

            acceleration = new Vector2();

            maxSpeed = 9999;

            deceleration = 0;

            autoAngle = false;

        }

    }

    ```


    This PhysicsActor class contains many methods for getting and setting this information.
    For the Vector2 variables, velocity and acceleration, we provide two ways to set
    their data: either in terms of the x and y components, or in terms of the angle
    and magnitude (or size), which the methods then convert to x and y components
    by using trigonometry, as illustrated in [Figure 3-8](#9781484215012_Ch03.xhtml#Fig8).
    If the vector’s direction angle is given by A, and the magnitude is given by M,
    then the x component of the vector is calculated by the formula x = M × cos(A),
    and similarly, the y component is given by y = M × sin(A).


    ![9781484215012_Fig03-08.jpg](OEBPS/Images/9781484215012_Fig03-08.jpg)


    [Figure 3-8](#9781484215012_Ch03.xhtml#_Fig8). Converting a vector’s angle and
    magnitude to x and y components


    The methods involving velocity and acceleration are as follows:


