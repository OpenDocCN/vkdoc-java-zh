- fmt: "接下来需要向`AnimatedActor`类添加一些功能。能够停止动画播放，以及设置显示特定帧（这在动画暂停时很有用）会很有帮助。在《Treasure\
    \ Quest》中，当角色停止移动时，行走动画应该停止，并显示动画帧1，即角色站立而非行走的姿态。（这些帧出现在[图7-15](#9781484215012_Ch07.xhtml#Fig15)的中间列。）以下所有修改都应应用于`AnimatedActor`类。\n\
    \n首先，添加一个变量来跟踪动画当前是否暂停：\n\n```\nprivate boolean pauseAnim;\n```\n\n然后，在构造函数中初始化它：\n\
    \n```\npauseAnim = false;\n```\n\n添加一对方法来切换动画的暂停状态：\n\n```\npublic void pauseAnimation()\n\
    {  pauseAnim = true;  }\npublic void startAnimation()\n{  pauseAnim = false; \
    \ }\n```\n\n在`act`方法中，使用暂停状态来决定是否应增加已用时间（这将导致`draw`方法显示后续帧）：\n\n```\npublic void\
    \ act(float dt)\n{\n    super.act( dt );\n    if (!pauseAnim)\n        elapsedTime\
    \ += dt;\n}\n```\n\n还需要向`AnimatedActor`类中已有的`setActiveAnimation`方法添加代码。首先，如果动画已经在播放，则不应重置`elapsedTime`变量，因此在这种情况下需要立即从方法中返回。其次，仅当演员的宽度和高度尚未设置时（通过任一值当前为零来表示），才应更新它们。完整方法如下，新增内容以粗体显示：\n\
    \n```\npublic void setActiveAnimation(String name)\n{\n    if ( !animationStorage.containsKey(name)\
    \ )\n    {\n        System.out.println(\"No animation: \" + name);\n        return;\n\
    \    }\n\nif ( name.equals(activeName) )\n        return;\n    activeName = name;\n\
    \    activeAnim = animationStorage.get(name);\n    elapsedTime = 0;\n\nif ( getWidth()\
    \ == 0 || getHeight() == 0 )\n    {\n        Texture tex = activeAnim.getKeyFrame(0).getTexture();\n\
    \        setWidth( tex.getWidth() );\n        setHeight( tex.getHeight() );\n\
    \    }\n}\n```\n\n最后，为了设置动画的特定帧显示，需要一个方法来调整动画的已用时间，使其对应于该特定帧显示时的值：\n\n```\npublic\
    \ void setAnimationFrame(int n)\n{  elapsedTime = n * activeAnim.getFrameDuration();\
    \  }\n```\n\n现在，利用这些新功能，将以下代码添加到`GameScreen`类中。在`create`方法中，移除设置玩家动画（名为`default`，由单个纹理组成）的代码行，并将其替换为以下代码：\n\
    \n```\nfloat t = 0.15f;\nplayer.storeAnimation(\"down\",\n    GameUtils.parseSpriteSheet(\"\
    assets/general-48.png\", 3, 4,\n        new int[] {0, 1, 2}, t, PlayMode.LOOP_PINGPONG));\n\
    \nplayer.storeAnimation(\"left\",\n    GameUtils.parseSpriteSheet(\"assets/general-48.png\"\
    , 3, 4,\n        new int[] {3, 4, 5}, t, PlayMode.LOOP_PINGPONG));\n\nplayer.storeAnimation(\"\
    right\",\n    GameUtils.parseSpriteSheet(\"assets/general-48.png\", 3, 4,\n  \
    \      new int[] {6, 7, 8}, t, PlayMode.LOOP_PINGPONG));\n\nplayer.storeAnimation(\"\
    up\",\n    GameUtils.parseSpriteSheet(\"assets/general-48.png\", 3, 4,\n     \
    \   new int[] {9, 10, 11}, t, PlayMode.LOOP_PINGPONG));\nplayer.setSize(48,48);\n\
    ```\n\n接下来，在`update`方法中处理用户输入的部分，添加以下代码，以便在按下方向键时设置相应的动画。同时，根据玩家的速度（决定玩家是否应该看起来在行走）来暂停或启动动画。以下是实现这些任务的代码：\n\
    \n```\nif (Gdx.input.isKeyPressed(Keys.LEFT))\n{\n    player.setVelocityXY(-playerSpeed,0);\n\
    \    player.setActiveAnimation(\"left\");\n}\nif (Gdx.input.isKeyPressed(Keys.RIGHT))\n\
    {\n    player.setVelocityXY(playerSpeed,0);\n    player.setActiveAnimation(\"\
    right\");\n}\nif (Gdx.input.isKeyPressed(Keys.UP))\n{\n    player.setVelocityXY(0,playerSpeed);\n\
    \    player.setActiveAnimation(\"up\");\n}\nif (Gdx.input.isKeyPressed(Keys.DOWN))\n\
    {\n    player.setVelocityXY(0,-playerSpeed);\n    player.setActiveAnimation(\"\
    down\");\n}\nif ( player.getSpeed() < 1 )\n{\n    player.pauseAnimation();\n \
    \   player.setAnimationFrame(1);\n}\nelse\n    player.startAnimation();\n```\n\
    \n完成这些更改后，再次尝试运行《Treasure Quest》游戏，并在引导角色在地图上移动时享受改进后的动画效果。\n\n## 使用Box2D模拟高级物理\n\
    \n在之前的项目中，你遇到的另一个挑战是实现逼真的物理效果，特别是碰撞检测与响应。LibGDX提供了圆形、矩形和多边形形状的类，并且通过`Intersector`类提供的方法，你可以检查两个矩形是否重叠、矩形与圆形是否重叠、两个圆形是否重叠或两个多边形是否重叠（但此类无法检查其他组合）。响应碰撞则更加困难。同样，`Intersector`类提供的功能有限：在多边形重叠的情况下，LibGDX可以计算最小平移向量，该向量表示其中一个多边形必须移动的最小距离，以使两个形状不再重叠。此功能已在`BaseActor`类中使用，允许你模拟与固体物体的碰撞（阻止一个`BaseActor`穿过另一个）。\n\
    \n在上一章的《Rectangle Destroyer》游戏中，对碰撞响应的主题进行了更深入的探讨，并提供了一些代码来模拟球从平面（如墙壁或砖块）上弹起。在《Plane\
    \ Dodger》游戏中，通过在y方向设置恒定的负加速度来模拟重力，并解释了如何连续或离散地模拟飞机对象的向上动量。\n\n本节介绍如何使用名为*Box2D*的第三方软件库：一个“物理引擎”，能够处理之前描述的所有模拟，甚至更多。Box2D是免费且开源的，最初由Erin\
    \ Catto用C++编程语言编写并于2007年发布。此后，它已被移植到多种编程语言（包括Java），并已集成到许多游戏开发框架（如LibGDX）中。\n\n\
    在本节中，你将学习如何在LibGDX中使用Box2D的基本功能，同时创建一个名为*Jumping Jack*的新项目。该项目属于*沙盒游戏*类别，用户控制一个可以以多种方式与环境交互的角色，但没有明确的最终目标或需要克服的一系列挑战（就像在现实生活中的沙盒中玩耍一样）。《Jumping\
    \ Jack》具有平台游戏风格，玩家控制考拉Jack。Jack可以在屏幕上跳跃，并与足球和板条箱互动，这两者都具有逼真的物理行为。该游戏的截图见[图7-16](#9781484215012_Ch07.xhtml#Fig16)。\n\
    \n![9781484215012_Fig07-16.jpg](OEBPS/Images/9781484215012_Fig07-16.jpg)\n\n[图7-16](#9781484215012_Ch07.xhtml#_Fig16).\
    \ 沙盒游戏《Jumping Jack》\n\n### 物理入门\n\n在创建新项目之前，理解一些物理术语以及Box2D库中相应的对象非常重要。"
  raw: 'The next bit of functionality will need to be added to the AnimatedActor class.
    It is helpful to be able to stop an animation from playing, and also to be able
    set a particular frame to display (which will be useful only when the animation
    is paused). In Treasure Quest, the walking animation should stop whenever your
    character stops moving, and animation frame 1 should be displayed, which shows
    the character standing rather than striding. (These frames appear in the center
    column of [Figure 7-15](#9781484215012_Ch07.xhtml#Fig15).) The changes indicated
    next should all be applied to the AnimatedActor class.


    First, add a variable that keeps track of whether the animation is currently paused:


    ```

    private boolean pauseAnim;

    ```


    Then, initialize it in the constructor method:


    ```

    pauseAnim = false;

    ```


    Add a pair of methods that toggle the pause state of the animation:


    ```

    public void pauseAnimation()

    {  pauseAnim = true;  }

    public void startAnimation()

    {  pauseAnim = false;  }

    ```


    In the act method, the pause state is used to determine whether the elapsed time
    should be increased (which results in subsequent frames being displayed by the
    draw method):


    ```

    public void act(float dt)

    {

        super.act( dt );

        if (!pauseAnim)

            elapsedTime += dt;

    }

    ```


    Code also needs to be added to the already existing setActiveAnimation method
    in the AnimatedActor class. First, if an animation is already playing, the elapsedTime
    variable should not be reset, and so it is necessary to return from the method
    immediately in this case. Second, the width and the height of the actor should
    only be updated if these values have not been set (which is indicated when either
    value is currently zero). The complete method is given here, with the additions
    to be made appearing in bold font:


    ```

    public void setActiveAnimation(String name)

    {

        if ( !animationStorage.containsKey(name) )

        {

            System.out.println("No animation: " + name);

            return;

        }


    if ( name.equals(activeName) )

            return;

        activeName = name;

        activeAnim = animationStorage.get(name);

        elapsedTime = 0;


    if ( getWidth() == 0 || getHeight() == 0 )

        {

            Texture tex = activeAnim.getKeyFrame(0).getTexture();

            setWidth( tex.getWidth() );

            setHeight( tex.getHeight() );

        }

    }

    ```


    Finally, to set a particular frame of the animation to display, a method is needed
    that adjusts the elapsed time of the animation to the value corresponding to when
    that particular frame is displayed:


    ```

    public void setAnimationFrame(int n)

    {  elapsedTime = n * activeAnim.getFrameDuration();  }

    ```


    Now, taking advantage of this new functionality, add the following code to the
    GameScreen class. In the create method, remove the line of code that sets the
    player animation (named default and consisting of a single texture) and replace
    it with the following code:


    ```

    float t = 0.15f;

    player.storeAnimation("down",

        GameUtils.parseSpriteSheet("assets/general-48.png", 3, 4,

            new int[] {0, 1, 2}, t, PlayMode.LOOP_PINGPONG));


    player.storeAnimation("left",

        GameUtils.parseSpriteSheet("assets/general-48.png", 3, 4,

            new int[] {3, 4, 5}, t, PlayMode.LOOP_PINGPONG));


    player.storeAnimation("right",

        GameUtils.parseSpriteSheet("assets/general-48.png", 3, 4,

            new int[] {6, 7, 8}, t, PlayMode.LOOP_PINGPONG));


    player.storeAnimation("up",

        GameUtils.parseSpriteSheet("assets/general-48.png", 3, 4,

            new int[] {9, 10, 11}, t, PlayMode.LOOP_PINGPONG));

    player.setSize(48,48);

    ```


    Next, in the section of the update method that processes user input, add the following
    code that sets the corresponding animation whenever an arrow key is pressed. Also,
    the animation is either paused or started, depending on the speed of the player
    (which determines whether the player should appear to be walking). Here is the
    code that accomplishes these tasks:


    ```

    if (Gdx.input.isKeyPressed(Keys.LEFT))

    {

        player.setVelocityXY(-playerSpeed,0);

        player.setActiveAnimation("left");

    }

    if (Gdx.input.isKeyPressed(Keys.RIGHT))

    {

        player.setVelocityXY(playerSpeed,0);

        player.setActiveAnimation("right");

    }

    if (Gdx.input.isKeyPressed(Keys.UP))

    {

        player.setVelocityXY(0,playerSpeed);

        player.setActiveAnimation("up");

    }

    if (Gdx.input.isKeyPressed(Keys.DOWN))

    {

        player.setVelocityXY(0,-playerSpeed);

        player.setActiveAnimation("down");

    }

    if ( player.getSpeed() < 1 )

    {

        player.pauseAnimation();

        player.setAnimationFrame(1);

    }

    else

        player.startAnimation();

    ```


    With these changes, try out the Treasure Quest game once more, and enjoy the improved
    animation as you guide your character around the map.


    Simulating Advanced Physics with Box2D


    Another challenging aspect you’ve encountered in previous projects is implementing
    realistic physics, and in particular, collision detection and response. LibGDX
    provides classes for circle, rectangle, and polygon shapes, and via methods provided
    by the Intersector class, you can check for two rectangles overlapping, a rectangle
    and a circle overlapping, two circles overlapping, or two polygons overlapping
    (but no other combinations can be checked with this class). Responding to collisions
    is even more difficult. Again, the Intersector class provides limited functionality:
    in the case of overlapping polygons, LibGDX can calculate the minimum translation
    vector, which represents the smallest distance one of the polygons must move so
    that the two shapes are no longer overlapping. This functionality was used in
    the BaseActor class, which allowed you to simulate collisions with solid objects
    (stopping one such BaseActor from passing through another).


    In the game Rectangle Destroyer from the previous chapter, the topic of collision
    response was explored even further, and some code was presented to simulate a
    ball bouncing off a flat surface (such as a wall or a brick). In the game Plane
    Dodger, gravity was simulated by setting a constant negative acceleration in the
    y direction, and there were explanations about how to simulate upward momentum
    for the plane object, either continuously or discretely.


    This section covers how to use a third-party software library called *Box2D*:
    a “physics engine” that is capable of handling all of the simulations described
    previously, and much, much more. Box2D is freely available and open source, originally
    written by Erin Catto in the C++ programming language and released in 2007\. Since
    then, it has been ported to multiple programming languages (including Java), and
    has been incorporated into many game development frameworks (such as LibGDX).


    In this section, you will learn how to use the basic features of Box2D in LibGDX
    while creating a new project called *Jumping Jack*. This project falls into the
    category of *sandbox games*, in which the user controls a character that can interact
    with the environment in a variety of ways, but there is neither a well-defined
    end goal nor a series of challenges to overcome (as is the case when playing in
    a real-life sandbox). Jumping Jack features platformer-style game play, in which
    the player controls Jack the Koala. Jack can jump around the screen and interact
    with a soccer ball and a crate, both of which have realistic physics behaviors.
    A screenshot of this game appears in [Figure 7-16](#9781484215012_Ch07.xhtml#Fig16).


    ![9781484215012_Fig07-16.jpg](OEBPS/Images/9781484215012_Fig07-16.jpg)


    [Figure 7-16](#9781484215012_Ch07.xhtml#_Fig16). The sandbox game Jumping Jack


    Physics Primer


    Before you create your new project, it is important to understand some terms from
    physics and the corresponding objects from the Box2D library.'
