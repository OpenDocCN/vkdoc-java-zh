    产生字母 a，依此类推，直到 letters[4] 产生 s。请注意，该数组的长度为 5，但位置编号为 0 到 4。（这通常是成立的；长度为 *n* 的数组的索引编号为
    0 到 *n* – 1。）请注意，一旦创建了数组，其大小就不能更改；尝试将值存储到数组中不存在的索引位置将导致程序运行时出错。


    控制结构


    Java 程序中的语句通常按顺序一个接一个地执行。*控制结构*可以改变执行顺序，要么仅当满足某些条件时才运行某些语句，要么重复执行一组给定的语句。


    条件语句


    if 语句用于指定仅当某个条件（或条件组合，或布尔表达式）求值为 true 时，才应运行特定的一组语句。例如，以下代码仅当 time 的值大于 60 时，才会将
    100 加到变量 bonus 上；如果 time 的值不大于 60，则大括号内的代码将不会执行。


    ```

    if (time > 60)

    {

        bonus += 100;

    }

    ```


    大括号内可以包含任意数量的语句。但是，如果大括号内只包含一条语句，则可以省略大括号，代码将产生相同的结果，如下所示：


    ```

    if (time > 60)

        bonus += 100;

    ```


    当需要提供一组备选语句，以便在相关条件求值为 false 时执行时，可以使用 if-else 语句。以下代码基于前面的示例进行了扩展，增加了以下行为：如果
    time 的值*不*大于 60，则 bonus 的值将增加 50。


    ```

    if (time > 60)

    {

        bonus += 100;

    }

    else

    {

        bonus += 50;

    }

    ```


    有时，您可能希望针对一组值测试变量的相等性，并在每种情况下执行不同的语句集。例如，考虑以下代码，它根据 itemCount 的值等于 0、1、2 还是其他值来打印一条消息。


    ```

    if (itemCount == 0)

        System.out.print("You have no items.");

    else if (itemCount == 1)

        System.out.print("You have a single item.");

    else if (itemCount == 2)

        System.out.print("You have two items.");

    else

        System.out.print("You have many items!");

    ```


