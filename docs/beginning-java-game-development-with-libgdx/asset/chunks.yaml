    clone. The clone method will create and return a new BaseActor, and make this
    new object an exact duplicate of the BaseActor calling the method. This process
    is carried out via the copy method, which copies the data from one BaseActor into
    another (and in fact, this is really the only situation in which copy will need
    to be called).These methods will be helpful when you want to create multiple instances
    of an object that have only slight variations; you can create a base version of
    an object, clone it, and then change whatever properties need to be changed. The
    code for these two methods is as follows:


    ```

    public void copy(BaseActor original)

    {

        this.region = new TextureRegion( original.region );

        if (original.boundingPolygon != null)

        {

            this.boundingPolygon = new Polygon( original.boundingPolygon.getVertices()
    );

            this.boundingPolygon.setOrigin( original.getOriginX(), original.getOriginY()
    );

        }

        this.setPosition( original.getX(), original.getY() );

        this.setOriginX( original.getOriginX() );

        this.setOriginY( original.getOriginY() );

        this.setWidth( original.getWidth() );

        this.setHeight( original.getHeight() );

        this.setColor( original.getColor() );

        this.setVisible( original.isVisible() );

    }


    public BaseActor clone()

    {

        BaseActor newbie = new BaseActor();

        newbie.copy( this );

        return newbie;

    }

