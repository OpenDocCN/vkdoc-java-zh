    \n## Next Steps\n\nThe standard advice for improving the sample games in this\
    \ chapter applies here (adding a Start menu, sound effects, and a Congratulations\
    \ message when game is finished). Here are some suggestions specific to this game:\n\
    \n- Instead of having the cards appear in a random position when `GameScreen`\
    \ is loaded, create an `Action` for each card that moves it into its random starting\
    \ position from an off-screen location.\n- Give the player the option to enable/disable\
    \ hints completely, or add a `Button` that will activate the glowing hint effect\
    \ only when pressed.\n- Keep track of the time elapsed and display it in the user\
    \ interface.\n- When the game is over, celebrate the player’s victory by adding\
    \ some fun visual effects, such as `AnimatedActor` objects that contain firework\
    \ animations, or have the cards move around the screen in interesting patterns\
    \ using the `Action` class.\n\nAn alternative to polishing this game is to create\
    \ a completely new game by using the mechanics introduced here. One recommended\
    \ project is to create a single-player version of the card game Crazy Eights (which\
    \ is similar to the popular commercial game Uno). The setup and rules are as follows:\n\
    \n- There are two piles: *draw*, which initially contains all 52 cards, and *discard*,\
    \ which initially contains no cards.\n- At the start of the game, remove seven\
    \ cards from the draw pile and arrange them on the screen; this becomes your *hand*.\
    \ Also, remove one card from the draw pile and add it to the discard pile.\n-\
    \ At any time, you may move any card from your hand to the top of the discard\
    \ pile, provided that your card has the same rank or suit as the top card of the\
    \ discard pile, or has rank 8 (such a card, which can be played at any time, is\
    \ often called a *wild* card).\n- At any point, you may remove the top card from\
    \ the draw pile and add it to your hand.\n- Your goal is to move all the cards\
    \ from your hand to the discard pile while drawing as few cards from the draw\
    \ pile as possible.\n\nCreating this game will require many additions and modifications\
    \ to the code given in this example (for example, adding a `removeCard` method\
    \ to the `Pile` class), but completing this project will give your game programming\
    \ skills an excellent workout!\n\n## Summary\n\nIn this chapter, you’ve learned\
    \ how to implement a great variety of game mechanics by creating four new games:\
    \ Space Rocks, Plane Dodger, Rectangle Destroyer, and 52-Card Pickup. Along the\
    \ way, you gained practical experience with the following material:\n\n- Creating\
    \ base objects for later spawning using clone methods\n- Simplifying the creation\
    \ of `Animation` objects with static utility methods\n- Managing lists of different\
    \ types of actors to check for and handle various interactions\n- Adding new methods\
    \ to your custom `Actor` extensions\n- Further extending your custom `Actor` extensions\
    \ to incorporate additional game-specific data or functionality\n- Implementing\
    \ advanced collision detection and response\n- Incorporating randomness into games\
    \ to provide new game-play experiences\n\nIn the next chapter, you’ll investigate\
    \ how to implement even more advanced visual effects and game mechanics by incorporating\
