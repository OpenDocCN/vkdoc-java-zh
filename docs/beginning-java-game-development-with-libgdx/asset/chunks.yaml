- fmt: "```markdown\nYou then initialize this `Label` in the `create` method. At first\
    \ glance, it may be surprising that the `Skin` class does not contain any get\
    \ methods to retrieve style-related objects. However, this wasn’t a development\
    \ oversight; instead, the `Label` constructor method has an overloaded variation\
    \ that allows you to pass in the `Skin` object itself, as well as the name of\
    \ the style object to be used. The constructor itself will automatically retrieve\
    \ and convert the corresponding data as necessary. Thus, the following code can\
    \ be placed in the `create` method to initialize the `Label` with the `LabelStyle`\
    \ you created in the `TurtleGame` class:\n\n```\nstarfishLeftLabel = new Label(\"\
    Starfish Left: --\", game.skin, \"uiLabelStyle\");\n```\n\nFinally, at the end\
    \ of the `update` method, you can update the text displayed by this `Label` so\
    \ that it displays the correct number of starfish left to collect, using the following\
    \ line of code:\n\n```\nstarfishLeftLabel.setText( \"Starfish Left: \" + starfishList.size()\
    \ );\n```\n\nAt this point, the `TurtleLevel` class compiles, but no change is\
    \ visible on the screen, as the label has not been added to a stage yet; you will\
    \ do so in a later section, after exploring the remaining components for the user\
    \ interface. The next user-interface control you need for the `TurtleLevel` class\
    \ is provided by the `Button` class.\n\n## Creating Buttons\n\nA button is one\
    \ of the most basic user-interface controls that gets input from a user. There\
    \ are multiple ways to customize the appearance and behavior of a button, as well\
    \ as extensions of the `Button` class (such as `TextButton` and `CheckBox`), some\
    \ of which you will explore in this chapter.\n\nFirst, you will initialize a basic\
    \ `Button` object together with a `ButtonStyle`. A `ButtonStyle` object can store\
    \ one or more images, one of which will be displayed, depending on the current\
    \ state of the button. An image stored in the `up` field serves as the default\
    \ image. Image data for UI elements must be stored using a class that implements\
    \ the `Drawable` interface, which has methods that resize and draw an image to\
    \ fit in a given rectangular region. (`TextureRegionDrawable` is an example of\
    \ one of many such classes.) The easiest way to initialize such an object is using\
    \ the `Skin` class, which in addition to being an excellent way to manage resources,\
    \ contains many methods for converting image data. For example, it is possible\
    \ to store a `Texture` under a given name, and then retrieving that data using\
    \ the same name and the `getDrawable` method will automatically create a `Drawable`\
    \ object.\n\nAdding interactivity to a `Button` object is a process you have seen\
    \ before, in the Balloon Buster game from [Chapter 3](#9781484215012_Ch03.xhtml).\
    \ In that game, the balloon objects were derived from the `Actor` class, and thus\
    \ had the ability to listen for input events (such as being clicked/touched).\
    \ The code that was executed in this event was contained in a method called `touchDown`,\
    \ part of an anonymous inner class derived from the `InputListener` class. Since\
    \ the `Button` class is also an extension of the `Actor` class, you can (and will)\
    \ use the same approach here.\n\nFirst, you require the following import statements\
    \ to be added to the class:\n\n```\nimport com.badlogic.gdx.scenes.scene2d.ui.Button;\n\
    import com.badlogic.gdx.scenes.scene2d.ui.Button.ButtonStyle;\nimport com.badlogic.gdx.scenes.scene2d.InputEvent;\n\
    import com.badlogic.gdx.scenes.scene2d.InputListener;\n```\n\nThe following code\
    \ creates a `Button` that will be used to pause and unpause the Starfish Collector\
    \ game play (but not the music). Since you don’t need to reference this object\
    \ later in the `update` method, you can declare and initialize it within the `create`\
    \ method of the `TurtleLevel` class. First, you load a `Texture` into the skin\
    \ stored by `game`, and convert it to a `Drawable` for use in a `ButtonStyle`\
    \ object. (As usual, the image you use can be downloaded from the source code\
    \ assets folder.) Then you initialize the `Button` and add an `InputListener`\
    \ which will activate the `togglePause` method, which was defined by the `BaseScreen`\
    \ class.\n\n```\nTexture pauseTexture = new Texture(Gdx.files.internal(\"assets/pause.png\"\
    ));\ngame.skin.add(\"pauseImage\", pauseTexture );\n\nButtonStyle pauseStyle =\
    \ new ButtonStyle();\npauseStyle.up = game.skin.getDrawable(\"pauseImage\");\n\
    \nButton pauseButton = new Button( pauseStyle );\n\npauseButton.addListener(\n\
    \    new InputListener()\n    {\n        public boolean touchDown (InputEvent\
    \ event, float x, float y, int pointer, int button)\n        {\n            togglePaused();\n\
    \            return true;\n        }\n    });\n```\n\nNow that you have created\
    \ the objects `starfishLeftLabel` and `pauseButton`, and `uiTable` is provided\
    \ by the `BaseScreen` class, you are now ready and able to implement the user-interface\
    \ layout for the `TurtleLevel` class described earlier in this chapter. At the\
    \ end of the `create` method in the `TurtleLevel` class, you simply add this code:\n\
    \n```\nuiTable.pad(10);\nuiTable.add(starfishLeftLabel);\nuiTable.add().expandX();\n\
    uiTable.add(pauseButton);\nuiTable.row();\nuiTable.add().colspan(3).expandY();\n\
    ```\n\nFinally, there is one subtle but vital detail to address. In the `create`\
    \ method, you previously added an object called `overlay` to the `uiStage`. This\
    \ object contains a semitransparent image of water for the purpose of making all\
    \ the game entities rendered underneath it appear underwater. Since this object\
    \ was added to `uiStage` *after* `uiTable` was added, it is currently covering\
    \ the button object, and thus preventing the button from registering user input\
    \ (such as the `touchDown` event). To remedy this situation, you must rearrange\
    \ the elements on the `uiStage` so that `overlay` appears underneath the button;\
    \ visually speaking, you need to send it to the back of the layer. This is accomplished\
    \ by adding the following line of code to the `create` method, *after* `overlay`\
    \ has been added to `uiStage`:\n\n```\noverlay.toBack();\n```\n\n## Setting Up\
    \ the Start Screen\n\nNext, you will set up the start screen, which appears when\
    \ the user first starts the program (as depicted previously in [Figure 4-1](#9781484215012_Ch04.xhtml#Fig1)).\
    \ You will create a new class for this purpose, called `TurtleMenu`. This class\
    \ does not require you to use the `mainStage` object at all—just the `uiTable`\
    \ is used to arrange objects. In this class, you use two new classes: `Image`\
    \ and `TextButton`. Even before you introduce these classes, you can write skeleton\
    \ code for the `TurtleMenu` class, as presented here:\n\n```\nimport com.badlogic.gdx.Gdx;\n\
    import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.Texture.TextureFilter;\n\
    import com.badlogic.gdx.scenes.scene2d.ui.Image;\nimport com.badlogic.gdx.scenes.scene2d.ui.TextButton;\n\
    import com.badlogic.gdx.scenes.scene2d.InputEvent;\nimport com.badlogic.gdx.scenes.scene2d.InputListener;\n\
    \npublic class TurtleMenu extends BaseScreen\n{\n    public TurtleMenu(BaseGame\
    \ g)\n    {  super(g);  }\n\n    public void create()\n    {    }\n\n    public\
    \ void update(float dt)\n    {    }\n}\n```"
  raw: 'You then initialize this Label in the create method. At first glance, it may
    be surprising that the Skin class does not contain any get methods to retrieve
    style-related objects. However, this wasn’t a development oversight; instead,
    the Label constructor method has an overloaded variation that allows you to pass
    in the Skin object itself, as well as the name of the style object to be used.
    The constructor itself will automatically retrieve and convert the corresponding
    data as necessary. Thus, the following code can be placed in the create method
    to initialize the Label with the LabelStyle you created in the TurtleGame class:


    ```

    starfishLeftLabel = new Label("Starfish Left: --", game.skin, "uiLabelStyle");

    ```


    Finally, at the end of the update method, you can update the text displayed by
    this Label so that it displays the correct number of starfish left to collect,
    using the following line of code:


    ```

    starfishLeftLabel.setText( "Starfish Left: " + starfishList.size() );

    ```


    At this point, the TurtleLevel class compiles, but no change is visible on the
    screen, as the label has not been added to a stage yet; you will do so in a later
    section, after exploring the remaining components for the user interface. The
    next user-interface control you need for the TurtleLevel class is provided by
    the Button class.


    Creating Buttons


    A button is one of the most basic user-interface controls that gets input from
    a user. There are multiple ways to customize the appearance and behavior of a
    button, as well as extensions of the Button class (such as TextButton and CheckBox),
    some of which you will explore in this chapter.


    First, you will initialize a basic Button object together with a ButtonStyle.
    A ButtonStyle object can store one or more images, one of which will be displayed,
    depending on the current state of the button. An image stored in the up field
    serves as the default image. Image data for UI elements must be stored using a
    class that implements the Drawable interface, which has methods that resize and
    draw an image to fit in a given rectangular region. (TextureRegionDrawable is
    an example of one of many such classes.) The easiest way to initialize such an
    object is using the Skin class, which in addition to being an excellent way to
    manage resources, contains many methods for converting image data. For example,
    it is possible to store a Texture under a given name, and then retrieving that
    data using the same name and the getDrawable method will automatically create
    a Drawable object.


    Adding interactivity to a Button object is a process you have seen before, in
    the Balloon Buster game from [Chapter 3](#9781484215012_Ch03.xhtml). In that game,
    the balloon objects were derived from the Actor class, and thus had the ability
    to listen for input events (such as being clicked/touched). The code that was
    executed in this event was contained in a method called touchDown, part of an
    anonymous inner class derived from the InputListener class. Since the Button class
    is also an extension of the Actor class, you can (and will) use the same approach
    here.


    First, you require the following import statements to be added to the class:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Button;

    import com.badlogic.gdx.scenes.scene2d.ui.Button.ButtonStyle;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    import com.badlogic.gdx.scenes.scene2d.InputListener;

    ```


    The following code creates a Button that will be used to pause and unpause the
    Starfish Collector game play (but not the music). Since you don’t need to reference
    this object later in the update method, you can declare and initialize it within
    the create method of the TurtleLevel class. First, you load a Texture into the
    skin stored by game, and convert it to a Drawable for use in a ButtonStyle object.
    (As usual, the image you use can be downloaded from the source code assets folder.)
    Then you initialize the Button and add an InputListener which will activate the
    togglePause method, which was defined by the BaseScreen class.


    ```

    Texture pauseTexture = new Texture(Gdx.files.internal("assets/pause.png"));

    game.skin.add("pauseImage", pauseTexture );


    ButtonStyle pauseStyle = new ButtonStyle();

    pauseStyle.up = game.skin.getDrawable("pauseImage");


    Button pauseButton = new Button( pauseStyle );


    pauseButton.addListener(

        new InputListener()

        {

            public boolean touchDown (InputEvent event, float x, float y, int pointer,
    int button)

            {

                togglePaused();

                return true;

            }

        });

    ```


    Now that you have created the objects starfishLeftLabel and pauseButton, and uiTable
    is provided by the BaseScreen class, you are now ready and able to implement the
    user-interface layout for the TurtleLevel class described earlier in this chapter.
    At the end of the create method in the TurtleLevel class, you simply add this
    code:


    ```

    uiTable.pad(10);

    uiTable.add(starfishLeftLabel);

    uiTable.add().expandX();

    uiTable.add(pauseButton);

    uiTable.row();

    uiTable.add().colspan(3).expandY();

    ```


    Finally, there is one subtle but vital detail to address. In the create method,
    you previously added an object called overlay to the uiStage. This object contains
    a semitransparent image of water for the purpose of making all the game entities
    rendered underneath it appear underwater. Since this object was added to uiStage
    *after* uiTable was added, it is currently covering the button object, and thus
    preventing the button from registering user input (such as the touchDown event).
    To remedy this situation, you must rearrange the elements on the uiStage so that
    overlay appears underneath the button; visually speaking, you need to send it
    to the back of the layer. This is accomplished by adding the following line of
    code to the create method, *after* overlay has been added to uiStage:


    ```

    overlay.toBack();

    ```


    Setting Up the Start Screen


    Next, you will set up the start screen, which appears when the user first starts
    the program (as depicted previously in [Figure 4-1](#9781484215012_Ch04.xhtml#Fig1)).
    You will create a new class for this purpose, called TurtleMenu. This class does
    not require you to use the mainStage object at all—just the uiTable is used to
    arrange objects. In this class, you use two new classes: Image and TextButton.
    Even before you introduce these classes, you can write skeleton code for the TurtleMenu
    class, as presented here:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.scenes.scene2d.ui.Image;

    import com.badlogic.gdx.scenes.scene2d.ui.TextButton;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    import com.badlogic.gdx.scenes.scene2d.InputListener;


    public class TurtleMenu extends BaseScreen

    {

        public TurtleMenu(BaseGame g)

        {  super(g);  }


    public void create()

        {    }


    public void update(float dt)

        {    }

    }

    ```'
