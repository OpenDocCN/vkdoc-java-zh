    the view of the game world. An alternative approach that you will implement in
    this section is to reserve a particular region of the screen for the controls,
    and render the game world in the remaining area, as illustrated in [Figure 5-4](#9781484215012_Ch05.xhtml#Fig4).


    ![9781484215012_Fig05-04.jpg](OEBPS/Images/9781484215012_Fig05-04.jpg)


    [Figure 5-4](#9781484215012_Ch05.xhtml#_Fig4). Placing the game controls below
