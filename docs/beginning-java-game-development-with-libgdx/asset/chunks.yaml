    Player Plane


    Next, you’ll set up the player object: a green plane that can maneuver vertically.
    This plane is constantly being pulled down by the force of gravity, but the player
    can move it upward by pressing a key on the keyboard to apply vertical thrust.


    To simplify the creation of the Animation for this object (and others that will
    follow), at this point you will write another helper method in the new GameUtils
    class (introduced in the previous section). This method, called parseImageFiles,
    will create an Animation from a set of image files, provided they follow a specified
    naming convention: the file names should be identical except for a number used
    to specify the order in which they appear. This process, which you’ve seen in
    previous programs, is carried out by the following code:


    ```

    // creates an Animation from a set of image files

    // name format: fileNamePrefix + N + fileNameSuffix, where 0 <= N < frameCount


    public static Animation parseImageFiles(String fileNamePrefix, String fileNameSuffix,

        int frameCount, float frameDuration, PlayMode mode)

    {

        TextureRegion[] frames = new TextureRegion[frameCount];


    for (int n = 0; n < frameCount; n++)

        {

            String fileName = fileNamePrefix + n + fileNameSuffix;

            Texture tex = new Texture( Gdx.files.internal(fileName) );

            tex.setFilter(TextureFilter.Linear, TextureFilter.Linear);

            frames[n] = new TextureRegion( tex );

        }


    Array<TextureRegion> framesArray = new Array<TextureRegion>(frames);

        return new Animation(frameDuration, framesArray, mode);

    }

    ```


