  trans: "\n*   ***启动阶段**：在此阶段，加载所有需要的文件（如图像或声音），创建游戏对象，并初始化数值。\n*   ***游戏循环**：在游戏运行期间持续重复的阶段，包含以下三个子阶段：\n\
    \    *   ***处理输入**：程序检查用户是否执行了任何向计算机发送数据的操作：按下键盘按键、移动鼠标或点击鼠标按钮、触摸或滑动触摸屏、或按下游戏手柄的摇杆或按钮。\n\
    \    *   ***更新**：执行涉及游戏世界状态及其内部实体的任务。这可能包括根据用户输入或物理模拟改变实体的位置，执行碰撞检测以确定两个实体何时相互接触以及应执行何种响应动作，或为非玩家角色选择行动。\n\
    \    *   ***渲染**：在屏幕上绘制所有图形，例如背景图像、游戏世界实体和用户界面（通常覆盖在游戏世界之上）。\n*   ***关闭阶段**：当玩家向计算机输入表明其已完成软件使用的指令时（例如，点击“退出”按钮），此阶段开始。可能涉及从内存中移除图像或数据、保存玩家数据或游戏状态、通知计算机停止监控硬件设备的用户输入，以及关闭游戏创建的所有窗口。\n\
    \n图 2-2 中的流程图说明了这些阶段发生的顺序。\n\n![9781484215012_Fig02-02.jpg](img/9781484215012_Fig02-02.jpg)\n\
    \n图 2-2. 游戏程序的各个阶段\n\n一些游戏开发者可能会在游戏循环中包含额外的阶段，例如：\n\n*   ***休眠**阶段：将程序的执行暂停一段指定的时间。许多游戏开发者致力于编写能够以每秒\
    \ 60 帧（FPS）运行的程序，这意味着游戏循环每 16.67 毫秒运行一次。¹ 如果游戏循环运行速度可以超过此值，则可以指示程序在 16.67 毫秒间隔的剩余时间内暂停，从而将\
    \ CPU 释放给可能正在后台运行的其他应用程序。LibGDX 会自动为我们处理此问题，因此我们在此无需担心。\n*   ***音频**阶段：在此阶段，流式播放背景音乐或播放音效。在本书中，我们将播放音频视为更新阶段的一部分，并将在后续章节中讨论如何实现。\n\
    \n这些阶段中的大多数都由 LibGDX 中的相应方法处理。例如，启动阶段由 `create` 方法执行，更新和渲染阶段均由 `render` 方法处理，²\
    \ 而任何关闭操作则由名为 `dispose` 的方法执行。\n\n实际上，当你的驱动类创建任何类型的 `Application`（例如 `LwjglApplication`）时，只有当提供给它的对象包含一组特定的方法（包括\
    \ `create`、`render` 和 `dispose`）时，该应用程序才能正常工作；这是一项必要的约定，以便 `Application` 知道在游戏程序生命周期的每个阶段该做什么。在\
    \ Java 程序中，强制执行此类要求的方式是使用接口。\n\n接口\n\n非正式地说，你可以将*接口*视为一种其他类可以承诺履行的契约。举一个简单的例子，假设你编写了一个\
    \ `Player` 类，其中包含一个名为 `talkTo` 的方法，用于与环境中的对象进行交互。`talkTo` 方法接受一个名为 `creature`\
    \ 的单一输入，在随后的代码中，你会有：\n\n`creature.speak();`\n\n为了使 `talkTo` 方法正常工作，无论 `creature`\
    \ 是哪个类的实例，它*必须*有一个名为 `speak` 的方法。也许有时 `creature` 是 `Person` 类的实例，而其他时候 `creature`\
    \ 是 `Monster` 类的实例。通常，你希望 `talkTo` 方法尽可能具有包容性——任何具有 `speak` 方法的对象都应被允许作为输入。你可以通过使用接口来实现此行为。\n\
    \n首先，你创建一个接口，如下所示：\n\n`public interface Speaker`\n`{`\n`    public void speak();`\n\
    `}`\n\n乍一看，接口看起来类似于类，不同之处在于方法仅被声明；它们不包含任何实际代码。所需要的只是方法的*签名*：名称、输出类型、输入类型（如果有）以及任何修饰符（如\
    \ `public`）。此信息后跟一个分号，而不是我们熟悉的包含代码的花括号。实现此接口的类将为其版本的 `speak` 函数提供代码。我强调，由于 `Speaker`\
    \ 不是一个类，你*不能*创建 `Speaker` 对象的实例；相反，你编写其他类，这些类包含 `Speaker` 接口中指定的方法。\n\n一个类通过在类名后添加关键字\
    \ `implements`，后跟接口名称，来表示它满足接口的要求（即它包含所有指定的字段和方法）。任何实现 `Speaker` 接口的类都必须为其版本的\
    \ `speak` 函数提供代码。以下通过一个名为 `Person` 的类和一个名为 `Monster` 的类进行演示：\n\n`public class\
    \ Person implements Speaker`\n`{`\n`    // 上面的附加代码`\n`    public void speak()`\n\
    `    {   System.out.println( \"Hello.\" );  }`\n`    // 下面的附加代码`\n`}`\n\n`public\
    \ class Monster implements Speaker`\n`{`\n`    // 上面的附加代码`\n`    public void speak()`\n\
    `    {  System.out.println(\"Grrr!\");  }`\n`    // 下面的附加代码`\n`}`\n\n永远记住，在实现接口时，你*必须*为接口中声明的所有内容编写方法；否则，将会出现编译时错误。你甚至可以编写一个在花括号之间不包含任何代码的方法，如下所示（针对一个代表特别沉默寡言的家具的类）。当你只需要使用接口的部分功能时，这可能会很方便。\n\
    \n`public class Chair implements Speaker`\n`{`\n`    // 上面的附加代码`\n`    public\
    \ void speak()  { }`\n`    // 下面的附加代码`\n`}`\n\n最后，你编写 `talkTo` 方法，使其接受一个 `Speaker`\
    \ 作为输入：\n\n`public class Player`\n`{`\n`        // 上面的附加代码`\n\n`public void talkTo(Speaker\
    \ creature)`\n`        {`\n`                creature.speak();`\n`        }`\n\n\
    `// 下面的附加代码`\n`}`\n\n任何实现了 `Speaker` 接口的类都可以用作 `Player` 对象的 `talkTo` 方法的输入。例如，我们提供一些代码来创建这些类中每一个的实例，并在随附的注释中描述结果：\n\
    \n`Player dan = new Player();`\n`Person chris = new Person();`\n`Monster grez\
    \ = new Monster();`\n`Chair footstool = new Chair();`\n`dan.talkTo(chris); //\
    \ 打印 “Hello.”`\n`dan.talkTo(grez); // 打印 “Grrr!”`\n`dan.talkTo(footstool); //\
    \ 不打印任何内容`\n"
- fmt: "# An Application in LibGDX\n\nAn Application in LibGDX requires user-created\
    \ classes to implement the `ApplicationListener` interface so that it can handle\
    \ all stages of a game program’s life cycle. You may recall, however, that in\
    \ our example from [Chapter 1](#9781484215012_Ch01.xhtml), the `HelloWorldImage`\
    \ class did not implement the `ApplicationListener` class; it only extended the\
    \ `Game` class. Why didn’t this result in an error when the class was compiled?\
    \ If you take a look “under the hood” (which, in the context of computer programming,\
    \ typically means to inspect the source code), you’ll notice that the `Game` class\
    \ itself implements the `ApplicationListener` class, and includes “empty” versions\
    \ of the functions; there is no code between the braces that define the body of\
    \ each function. This enables you to write only variations of the interface methods\
    \ that you need to use in the class that extends the `Game` class, which will\
    \ then *override* the versions in the `Game` class; any interface method that\
    \ you don’t write will default to the empty version in the `Game` class. (In fact,\
    \ the `ApplicationListener` interface requires a total of six methods: `create`,\
    \ `render`, `resize`, `pause`, `resume`, and `dispose`; in our example, you wrote\
    \ only two of these.)\n\n## Working with User Input\n\nThis section introduces\
    \ the game Cheese, Please!, where we help guide the player’s character, Mousey,\
    \ to a piece of cheese. Some of the code will be familiar from the `HelloWorldImage`\
    \ example, such as the `Texture` and `SpriteBatch` classes, the purpose of the\
    \ `create` and `render` methods, and the role of the driver class. There are a\
    \ few new additions as well. Since the coordinates of Mousey may change, you use\
    \ variables to store these values. Most significantly, you introduce some code\
    \ that makes our program interactive—you will process keyboard input from the\
    \ user. Finally, you’ll include a Boolean variable that keeps track of whether\
    \ the player has won, which becomes `true` when Mousey reaches the cheese, and\
    \ also results in a You Win message being displayed on the screen.\n\nIn this\
    \ section, as well as the sections that follow, you are invited to create a new\
    \ project in BlueJ and enter the code that is presented, or alternatively, to\
    \ simply download the source code from the web site for this book, and run the\
    \ code via the included BlueJ project files. The online source code also contains\
    \ all the images that you will need, stored in the `assets` folder in each project,\
    \ referenced in the following code.\n\nThe source code for this initial version\
    \ of our game, called `CheesePlease1`, appears next. Note in particular that for\
    \ organizational purposes, all the image files are stored in a folder called `assets`,\
    \ contained within the main project directory. There are also new import statements,\
    \ which enable you to create a variety of new objects, which are also explained\
    \ here.\n\n```\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\n\
    import com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.graphics.Texture;\n\
    import com.badlogic.gdx.graphics.g2d.SpriteBatch;\nimport com.badlogic.gdx.Game;\n\
    \npublic class CheesePlease1 extends Game\n{\n    private SpriteBatch batch;\n\
    \n    private Texture mouseyTexture;\n    private float mouseyX;\n    private\
    \ float mouseyY;\n\n    private Texture cheeseTexture;\n    private float cheeseX;\n\
    \    private float cheeseY;\n\n    private Texture floorTexture;\n    private\
    \ Texture winMessage;\n\n    private boolean win;\n\n    public void create()\n\
    \    {\n        batch = new SpriteBatch();\n\n        mouseyTexture = new Texture(\
    \ Gdx.files.internal(\"assets/mouse.png\") );\n        mouseyX = 20;\n       \
    \ mouseyY = 20;\n\n        cheeseTexture = new Texture( Gdx.files.internal(\"\
    assets/cheese.png\") );\n        cheeseX = 400;\n        cheeseY = 300;\n\n  \
    \      floorTexture = new Texture( Gdx.files.internal(\"assets/tiles.jpg\") );\n\
    \        winMessage = new Texture( Gdx.files.internal(\"assets/you-win.png\")\
    \ );\n\n        win = false;\n    }\n\n    public void render()\n    {\n     \
    \   // check user input\n        if (Gdx.input.isKeyPressed(Keys.LEFT))\n    \
    \        mouseyX--;\n        if (Gdx.input.isKeyPressed(Keys.RIGHT))\n       \
    \     mouseyX++;\n        if (Gdx.input.isKeyPressed(Keys.UP))\n            mouseyY++;\n\
    \        if (Gdx.input.isKeyPressed(Keys.DOWN))\n            mouseyY--;\n\n  \
    \      // check win condition: mousey must be overlapping cheese\n        if (\
    \ (mouseyX > cheeseX)\n          && (mouseyX + mouseyTexture.getWidth() < cheeseX\
    \ + cheeseTexture.getWidth())\n          && (mouseyY > cheeseY)\n          &&\
    \ (mouseyY + mouseyTexture.getHeight() < cheeseY + cheeseTexture.getHeight())\
    \ )\n            win = true;\n\n        // clear screen and draw graphics\n  \
    \      Gdx.gl.glClearColor(0.8f, 0.8f, 1, 1);\n        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\
    \n        batch.begin();\n        batch.draw( floorTexture, 0, 0 );\n        batch.draw(\
    \ cheeseTexture, cheeseX, cheeseY );\n        batch.draw( mouseyTexture, mouseyX,\
    \ mouseyY );\n        if (win)\n            batch.draw( winMessage, 170, 60 );\n\
    \        batch.end();\n    }\n}\n```\n\nYou also need a launcher-style class to\
    \ create an instance of this class and run it; this can be accomplished with the\
    \ following short class:\n\n```\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
    public class Launcher1\n{\n    public static void main (String[] args)\n    {\n\
    \        CheesePlease1 myProgram = new CheesePlease1();\n        LwjglApplication\
    \ launcher = new LwjglApplication( myProgram );\n    }\n}\n```\n\nIn the class\
    \ `CheesePlease1`, the `create` method initializes variables and loads textures.\
    \ This program contains four images, stored as `Texture` objects: Mousey, the\
    \ cheese, floor tiles for the background, and an image containing the words *You\
    \ Win*. For brevity, instead of creating a new variable to store each of the `FileHandle`\
    \ objects created by the `internal` method, you initialize them in the same line\
    \ where you construct each new `Texture` object. The coordinates of Mousey’s position\
    \ are stored by using floating-point numbers, since you need to store decimal\
    \ values, and the LibGDX game development framework uses `float` rather than `double`\
    \ variables in its classes for a slight increase in program efficiency. Even though\
    \ the coordinates of the cheese texture will not be changing, you store them by\
    \ using variables anyway so that future code involving these values is more readable.\
    \ The `floorTexture` and `winMessage` objects do not require variables to store\
    \ their coordinates, as their positions will not be changing, and their positions\
    \ will be specified in the `render` method (discussed later in this section).\n\
    \nThe `render` method contains three main blocks of code that roughly correspond\
    \ to the game loop substages: process input, update, and render.\n\nFirst, a sequence\
    \ of commands use a method named `isKeyPressed`, belonging to (an object belonging\
    \ to) the `Gdx` class, which determines whether a key on the keyboard is currently\
    \ being pressed. The names of each key are represented using constant values from\
    \ the `Keys` class. When one of the arrow keys is pressed, the corresponding `x`\
    \ or `y` coordinate of Mousey is adjusted accordingly; `x` values increase toward\
    \ the right side of the window, while `y` values increase toward the top of the\
    \ window.[³](#9781484215012_Ch02.xhtml#Fn3) Note that if the user presses the\
    \ left and right arrow keys at the same time, the effects of the addition and\
    \ subtraction cancel each other out, and the position of Mousey will not change;\
    \ a similar situation also applies when the user presses the up and down arrow\
    \ keys at the same time."
  raw: 'An Application in LibGDX requires user-created classes to implement the ApplicationListener
    interface so that it can handle all stages of a game program’s life cycle. You
    may recall, however, that in our example from [Chapter 1](#9781484215012_Ch01.xhtml),
    the HelloWorldImage class did not implement the ApplicationListener class; it
    only extended the Game class. Why didn’t this result in an error when the class
    was compiled? If you take a look “under the hood” (which, in the context of computer
    programming, typically means to inspect the source code), you’ll notice that the
    Game class itself implements the ApplicationListener class, and includes “empty”
    versions of the functions; there is no code between the braces that define the
    body of each function. This enables you to write only variations of the interface
    methods that you need to use in the class that extends the Game class, which will
    then *override* the versions in the Game class; any interface method that you
    don’t write will default to the empty version in the Game class. (In fact, the
    ApplicationListener interface requires a total of six methods: create, render,
    resize, pause, resume, and dispose; in our example, you wrote only two of these.)


    Working with User Input


    This section introduces the game Cheese, Please!, where we help guide the player’s
    character, Mousey, to a piece of cheese. Some of the code will be familiar from
    the HelloWorldImage example, such as the Texture and SpriteBatch classes, the
    purpose of the create and render methods, and the role of the driver class. There
    are a few new additions as well. Since the coordinates of Mousey may change, you
    use variables to store these values. Most significantly, you introduce some code
    that makes our program interactive—you will process keyboard input from the user.
    Finally, you’ll include a Boolean variable that keeps track of whether the player
    has won, which becomes true when Mousey reaches the cheese, and also results in
    a You Win message being displayed on the screen.


    In this section, as well as the sections that follow, you are invited to create
    a new project in BlueJ and enter the code that is presented, or alternatively,
    to simply download the source code from the web site for this book, and run the
    code via the included BlueJ project files. The online source code also contains
    all the images that you will need, stored in the assets folder in each project,
    referenced in the following code.


    The source code for this initial version of our game, called CheesePlease1, appears
    next. Note in particular that for organizational purposes, all the image files
    are stored in a folder called assets, contained within the main project directory.
    There are also new import statements, which enable you to create a variety of
    new objects, which are also explained here.


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.Game;


    public class CheesePlease1 extends Game

    {

        private SpriteBatch batch;


    private Texture mouseyTexture;

        private float mouseyX;

        private float mouseyY;


    private Texture cheeseTexture;

        private float cheeseX;

        private float cheeseY;


    private Texture floorTexture;

        private Texture winMessage;


    private boolean win;


    public void create()

        {

            batch = new SpriteBatch();


    mouseyTexture = new Texture( Gdx.files.internal("assets/mouse.png") );

            mouseyX = 20;

            mouseyY = 20;


    cheeseTexture = new Texture( Gdx.files.internal("assets/cheese.png") );

            cheeseX = 400;

            cheeseY = 300;


    floorTexture = new Texture( Gdx.files.internal("assets/tiles.jpg") );

            winMessage = new Texture( Gdx.files.internal("assets/you-win.png") );


    win = false;

        }


    public void render()

        {

            // check user input

            if (Gdx.input.isKeyPressed(Keys.LEFT))

                mouseyX--;

            if (Gdx.input.isKeyPressed(Keys.RIGHT))

                mouseyX++;

            if (Gdx.input.isKeyPressed(Keys.UP))

                mouseyY++;

            if (Gdx.input.isKeyPressed(Keys.DOWN))

                mouseyY--;


    // check win condition: mousey must be overlapping cheese

            if ( (mouseyX > cheeseX)

              && (mouseyX + mouseyTexture.getWidth() < cheeseX + cheeseTexture.getWidth())

              && (mouseyY > cheeseY)

              && (mouseyY + mouseyTexture.getHeight() < cheeseY + cheeseTexture.getHeight())
    )

                win = true;


    // clear screen and draw graphics

            Gdx.gl.glClearColor(0.8f, 0.8f, 1, 1);

            Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);


    batch.begin();

            batch.draw( floorTexture, 0, 0 );

            batch.draw( cheeseTexture, cheeseX, cheeseY );

            batch.draw( mouseyTexture, mouseyX, mouseyY );

            if (win)

                batch.draw( winMessage, 170, 60 );

            batch.end();

        }

    }

    ```


    You also need a launcher-style class to create an instance of this class and run
    it; this can be accomplished with the following short class:


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class Launcher1

    {

        public static void main (String[] args)

        {

            CheesePlease1 myProgram = new CheesePlease1();

            LwjglApplication launcher = new LwjglApplication( myProgram );

        }

    }

    ```


    In the class CheesePlease1, the create method initializes variables and loads
    textures. This program contains four images, stored as Texture objects: Mousey,
    the cheese, floor tiles for the background, and an image containing the words
    *You Win*. For brevity, instead of creating a new variable to store each of the
    FileHandle objects created by the internal method, you initialize them in the
    same line where you construct each new Texture object. The coordinates of Mousey’s
    position are stored by using floating-point numbers, since you need to store decimal
    values, and the LibGDX game development framework uses float rather than double
    variables in its classes for a slight increase in program efficiency. Even though
    the coordinates of the cheese texture will not be changing, you store them by
    using variables anyway so that future code involving these values is more readable.
    The floorTexture and winMessage objects do not require variables to store their
    coordinates, as their positions will not be changing, and their positions will
    be specified in the render method (discussed later in this section).


    The render method contains three main blocks of code that roughly correspond to
    the game loop substages: process input, update, and render.


    First, a sequence of commands use a method named isKeyPressed, belonging to (an
    object belonging to) the Gdx class, which determines whether a key on the keyboard
    is currently being pressed. The names of each key are represented using constant
    values from the Keys class. When one of the arrow keys is pressed, the corresponding
    x or y coordinate of Mousey is adjusted accordingly; x values increase toward
    the right side of the window, while y values increase toward the top of the window.[³](#9781484215012_Ch02.xhtml#Fn3)
    Note that if the user presses the left and right arrow keys at the same time,
    the effects of the addition and subtraction cancel each other out, and the position
    of Mousey will not change; a similar situation also applies when the user presses
    the up and down arrow keys at the same time.'
  trans: '

    在 LibGDX 中，应用程序需要用户创建的类实现 `ApplicationListener` 接口，以便处理游戏程序生命周期的所有阶段。不过你可能还记得，在第
    1 章的示例中，`HelloWorldImage` 类并没有实现 `ApplicationListener` 接口，它只是继承了 `Game` 类。为什么编译时没有报错呢？如果你深入“引擎盖下”看看（在计算机编程语境中，通常指检查源代码），就会发现
    `Game` 类本身实现了 `ApplicationListener` 接口，并且包含了这些函数的“空”版本——定义每个函数体的大括号之间没有任何代码。这样一来，你只需在继承
    `Game` 类的子类中编写你需要使用的接口方法变体，这些方法就会*覆盖* `Game` 类中的版本；任何你没有编写的接口方法都会默认使用 `Game` 类中的空版本。（实际上，`ApplicationListener`
    接口总共要求实现六个方法：`create`、`render`、`resize`、`pause`、`resume` 和 `dispose`；在我们的示例中，你只编写了其中两个。）


    处理用户输入


    本节将介绍游戏《奶酪，拜托！》，我们将帮助引导玩家角色“小老鼠”Mousey 找到一块奶酪。部分代码与 `HelloWorldImage` 示例类似，例如
    `Texture` 和 `SpriteBatch` 类、`create` 和 `render` 方法的作用，以及驱动类的作用。同时也有一些新增内容。由于 Mousey
    的坐标可能会变化，我们使用变量来存储这些值。最重要的是，我们引入了一些代码使程序具有交互性——你将处理来自用户的键盘输入。最后，我们还会包含一个布尔变量，用于跟踪玩家是否获胜，当
    Mousey 到达奶酪时该变量变为 `true`，并会在屏幕上显示“你赢了”的消息。


    在本节以及后续章节中，建议你在 BlueJ 中创建一个新项目并输入给出的代码，或者直接从本书网站下载源代码，并通过附带的 BlueJ 项目文件运行代码。在线源代码还包含你所需的所有图片，这些图片存储在每个项目的
    `assets` 文件夹中，并在以下代码中被引用。


    游戏初始版本（名为 `CheesePlease1`）的源代码如下。特别注意，为了便于组织，所有图片文件都存储在主项目目录下的 `assets` 文件夹中。此外还有一些新的
    `import` 语句，使你能够创建各种新对象，这些也会在此处解释。


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.Game;


    public class CheesePlease1 extends Game

    {

        private SpriteBatch batch;


    private Texture mouseyTexture;

        private float mouseyX;

        private float mouseyY;


    private Texture cheeseTexture;

        private float cheeseX;

        private float cheeseY;


    private Texture floorTexture;

        private Texture winMessage;


    private boolean win;


    public void create()

        {

            batch = new SpriteBatch();


    mouseyTexture = new Texture( Gdx.files.internal("assets/mouse.png") );

            mouseyX = 20;

            mouseyY = 20;


    cheeseTexture = new Texture( Gdx.files.internal("assets/cheese.png") );

            cheeseX = 400;

            cheeseY = 300;


    floorTexture = new Texture( Gdx.files.internal("assets/tiles.jpg") );

            winMessage = new Texture( Gdx.files.internal("assets/you-win.png") );


    win = false;

        }


    public void render()

        {

            // 检查用户输入

            if (Gdx.input.isKeyPressed(Keys.LEFT))

                mouseyX--;

            if (Gdx.input.isKeyPressed(Keys.RIGHT))

                mouseyX++;

            if (Gdx.input.isKeyPressed(Keys.UP))

                mouseyY++;

            if (Gdx.input.isKeyPressed(Keys.DOWN))

                mouseyY--;


    // 检查获胜条件：Mousey 必须与奶酪重叠

            if ( (mouseyX > cheeseX)

              && (mouseyX + mouseyTexture.getWidth() < cheeseX + cheeseTexture.getWidth())

              && (mouseyY > cheeseY)

              && (mouseyY + mouseyTexture.getHeight() < cheeseY + cheeseTexture.getHeight())
    )

                win = true;


    // 清除屏幕并绘制图形

            Gdx.gl.glClearColor(0.8f, 0.8f, 1, 1);

            Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);


    batch.begin();

            batch.draw( floorTexture, 0, 0 );

            batch.draw( cheeseTexture, cheeseX, cheeseY );

            batch.draw( mouseyTexture, mouseyX, mouseyY );

            if (win)

                batch.draw( winMessage, 170, 60 );

            batch.end();

        }

    }

    ```


    你还需要一个启动器类来创建该类的实例并运行它；这可以通过以下简短的类来实现：


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class Launcher1

    {

        public static void main (String[] args)

        {

            CheesePlease1 myProgram = new CheesePlease1();

            LwjglApplication launcher = new LwjglApplication( myProgram );

        }

    }

    ```


    在 `CheesePlease1` 类中，`create` 方法初始化变量并加载纹理。该程序包含四张图片，存储为 `Texture` 对象：Mousey、奶酪、背景地板瓷砖，以及一张包含“*你赢了*”字样的图片。为简洁起见，我们没有为
    `internal` 方法创建的每个 `FileHandle` 对象创建新变量，而是在构造每个新 `Texture` 对象的同一行中初始化它们。Mousey
    位置的坐标使用浮点数存储，因为需要存储小数值，而 LibGDX 游戏开发框架在其类中使用 `float` 而非 `double` 变量，以略微提高程序效率。尽管奶酪纹理的坐标不会改变，我们仍然使用变量来存储它们，以便将来涉及这些值的代码更具可读性。`floorTexture`
    和 `winMessage` 对象不需要变量来存储它们的坐标，因为它们的位置不会改变，并且它们的位置将在 `render` 方法中指定（本节稍后讨论）。


    `render` 方法包含三个主要代码块，大致对应游戏循环的子阶段：处理输入、更新和渲染。


    首先，一系列命令使用 `Gdx` 类（所属对象）的一个名为 `isKeyPressed` 的方法，该方法用于判断键盘上的某个键当前是否被按下。每个键的名称使用
    `Keys` 类中的常量值表示。当按下某个方向键时，Mousey 对应的 x 或 y 坐标会相应调整；x 值向右增加，y 值向上增加。³ 请注意，如果用户同时按下左、右方向键，加法和减法的效果会相互抵消，Mousey
    的位置不会改变；用户同时按下上、下方向键时也会出现类似情况。

