    Now that you’ve defined the collision polygons for the BaseActor class, there
    is still the matter of detecting when two polygons overlap. Unlike the Rectangle
    class, which has its own overlaps method, the Polygon class does not. Fortunately,
    another utility class provided by LibGDX, called Intersector, does have such a
    method. Even more significantly, the Intersector class also has the functionality
    to deal with collision *response*. If a character overlaps with an item or power-up,
    the typical response is to add an item to an inventory or increase character stats,
    respectively. If a character overlaps with a solid object such as a wall, then
    instead you need to calculate how to adjust that character’s position. There are
    many ways to adjust the position, many of which are mathematically complex, and
    so we’ll relegate a more comprehensive discussion to future chapters. For now,
    you’ll just provide the code for a function named overlaps, which determines whether
    this BaseActor overlaps with another. The overlaps method also takes a second
    input, a Boolean variable that indicates whether the collision should be treated
    as solid; if set to true, the position of this BaseActor will be adjusted so that
    it no longer overlaps the other BaseActor. The code for this method is as follows:


    ```

    /**

     *  Determine if the collision polygons of two BaseActor objects overlap.

     *  If (resolve == true), then when there is overlap, move this BaseActor

     *    along minimum translation vector until there is no overlap.

     */

    public boolean overlaps(BaseActor other, boolean resolve)

    {

        Polygon poly1 = this.getBoundingPolygon();

        Polygon poly2 = other.getBoundingPolygon();


    if ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )

            return false;


    MinimumTranslationVector mtv = new MinimumTranslationVector();

        boolean polyOverlap = Intersector.overlapConvexPolygons(poly1, poly2, mtv);

        if (polyOverlap && resolve)

        {

            this.moveBy( mtv.normal.x * mtv.depth, mtv.normal.y * mtv.depth );

        }

        float significant = 0.5f;

        return (polyOverlap && (mtv.depth > significant));

