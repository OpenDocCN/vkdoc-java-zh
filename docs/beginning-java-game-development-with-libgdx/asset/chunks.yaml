    with a method getBoundingPolygon that returns the collision polygon for this actor,
    adjusting it according to the actor’s current position and rotation.


    ```

    public void setRectangleBoundary()

    {

        float w = getWidth();

        float h = getHeight();

        float[] vertices = {0,0, w,0, w,h, 0,h};

        boundingPolygon = new Polygon(vertices);

        boundingPolygon.setOrigin( getOriginX(), getOriginY() );

    }


    public void setEllipseBoundary()

    {

        int n = 8; // number of vertices

        float w = getWidth();

        float h = getHeight();

        float[] vertices = new float[2*n];

        for (int i = 0; i < n; i++)

        {

            float t = i * 6.28f / n;

            // x-coordinate

            vertices[2*i] = w/2 * MathUtils.cos(t) + w/2;

            // y-coordinate

            vertices[2*i+1] = h/2 * MathUtils.sin(t) + h/2;

        }

        boundingPolygon = new Polygon(vertices);

        boundingPolygon.setOrigin( getOriginX(), getOriginY() );

    }


    public Polygon getBoundingPolygon()

    {

        boundingPolygon.setPosition( getX(), getY() );

        boundingPolygon.setRotation( getRotation() );

