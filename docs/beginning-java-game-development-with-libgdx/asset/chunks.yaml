- fmt: '# Getting Started with Java and LibGDX


    In this book, you’ll learn how to program games in Java using the LibGDX game
    development framework. The LibGDX libraries are both powerful and easy to use,
    and they will enable you to create a great variety of games quickly and efficiently.
    LibGDX is free and open-source, can be used to make 2D and 3D games, and integrates
    easily with third-party libraries to support additional features. Applications
    created in LibGDX are truly cross-platform; supported systems include Windows,
    Mac OS X, Linux, Android, iOS, and HTML5/WebGL.


    I have taught courses in Java programming and video game development for many
    years, and I’ve often struggled to find game programming books that I can recommend
    to my students without reservation, which lead me to write this book you are currently
    reading. In particular, you will find that this book contains the following unique
    combination of features, chosen with the aspiring game developer (that’s you!)
    in mind:


    - This book recommends and explains how to use a simple Java development environment
    so that you can move on to programming games more quickly.

    - By using the LibGDX framework, you won’t have to “reinvent the wheel” for common
    programming tasks such as rendering graphics and playing audio. (An explanation
    of how to write such code from scratch could easily require fifty or more additional
    pages of reading.) LibGDX streamlines the development process and allows you to
    focus on game mechanics and design.

    - This book contains *many* examples of video games that can be developed with
    LibGDX. The first few example projects will introduce you to the basic features
    provided by the framework; these starter projects will be extended in the chapters
    that follow to illustrate how to add visual polish and advanced functionality.
    Later projects will focus on implementing game mechanics from a variety of genres:
    shoot-’em-ups, infinite side scrollers, drag-and-drop games, platform games, adventure
    games with a top-down perspective, and 2.5D games. I believe that working through
    many examples is fundamental in the learning process; you will observe programming
    patterns common to many games, you will see the benefits of writing reusable code
    in practice, you will have the opportunity to compare and contrast code from different
    projects, and you will gain experience by implementing additional features on
    your own.

    - At the beginning of this book, I am only assuming that you have a basic familiarity
    with Java programming. (For more details about what background knowledge you need,
    please consult the appendix.) Throughout the first few chapters of this book,
    advanced programming concepts will be introduced and explained as they arise naturally
    and are needed in the context of game programming. By the time you reach the end
    of this book, you will have learned about many advanced Java programming topics
    that are also useful for software development in general.


    Thank you for allowing me to be your guide as you begin your journey as a game
    programmer. I hope that you find this book both informative and enjoyable, and
    that it enables and inspires you to create your own video games to share with
    the world.


    ## Chapter 1: Getting Started with Java and LibGDX


    ![image](OEBPS/Images/frontdot.jpg)


    This chapter explains how to set up a Java development environment and configure
    it to run with the LibGDX game development framework. You’ll see a simple example
    of a “Hello, World!” program, and explore it in enough detail to understand the
    different parts. Finally, you’ll learn some of the advantages to be gained by
    working with the LibGDX library.


    ### Choosing a Development Environment


    Before diving into Java programming, you need to set up an integrated development
    environment (IDE): the software you will use for writing, debugging, and compiling
    code. There are many editors for writing your Java programs, each customized for
    different skill levels. BlueJ ([www.bluej.org](http://www.bluej.org)) and DrJava
    ([www.drjava.org](http://www.drjava.org)) are designed for beginners and educational
    use, and are frequently used in introductory programming courses in schools and
    colleges. IntelliJ IDEA ([www.jetbrains.com/idea/](http://www.jetbrains.com/idea/)),
    NetBeans (netbeans.org), and Eclipse (eclipse.org) are advanced editors, preferred
    by practicing professionals. For compiling and running Java code, you’ll need
    the Java Development Kit (JDK), which is available directly from the Oracle Corporation,
    or bundled directly with some of the editors listed.


    Each editor has advantages and disadvantages. BlueJ and DrJava are user-friendly
    and have a simple, minimal user interface, but lack some of the advanced editors’
    features, such as autocompletion of fields, methods, and import statements. The
    advanced editors are faster, feature-packed, more powerful and customizable, and
    have various plug-ins available, but they also have a steep learning curve and
    user interfaces that may be more daunting to beginners. [Figure 1-1](#9781484215012_Ch01.xhtml#Fig1)
    illustrates this point with a side-by-side comparison of the Eclipse and BlueJ
    interfaces.


    ![9781484215012_Fig01-01.jpg](OEBPS/Images/9781484215012_Fig01-01.jpg)


    [Figure 1-1](#9781484215012_Ch01.xhtml#_Fig1). User interfaces for Eclipse (left)
    and BlueJ (right)


    This chapter covers how to set up BlueJ. I’ve selected this particular IDE because
    it is quick and easy to set up and configure, which will enable you to start programming
    games even faster. However, if you are already familiar and comfortable with one
    of the more advanced editors, of course you should feel free to use it rather
    than BlueJ. A wealth of informational material is available for setting up Eclipse,
    NetBeans, and IntelliJ IDEA with LibGDX, available online at the LibGDX wiki ([https://github.com/libgdx/libgdx/wiki](https://github.com/libgdx/libgdx/wiki)).
    If you choose to use one of these programs, then after your IDE is set up, skip
    ahead to the upcoming section “Creating a ‘Hello, World!’ Program for LibGDX.”


    ### Setting Up BlueJ


    This section covers how to set up the BlueJ IDE. Since it was designed for beginners,
    the number of steps is small and the process is straightforward, as you will see.


    #### Downloading and Installing


    BlueJ can be downloaded from [www.bluej.org](http://www.bluej.org).


    There are two download options: one bundled with the JDK, and one without. The
    JDK includes tools for developing and debugging Java applications; in particular,
    it is necessary for compiling your code. If you have used your computer to develop
    Java applications before, you likely already have the JDK installed and can just
    select the stand-alone BlueJ installer. If you aren’t sure, you should download
    and run the BlueJ combined installer.


    #### Using BlueJ


    When learning a new programming language or library, it is a well-established
    tradition in computer science to write a “Hello, World!” application as a first
    program. This section covers the basics of using BlueJ in the process of writing
    this program:


    1. Start up the BlueJ software. (The first time you run it, it may prompt you
    for the location of the directory where the JDK is stored.)

    2. When the main window appears, in the menu bar, select Project ![image](OEBPS/Images/arrow.jpg)
    New Project. BlueJ organizes your work into projects, which are stored as directories;
    all Java source code and compiled class files are stored in the project directory.

    3. When prompted for a project name, navigate to your Desktop folder, enter **MyProject**,
    and click the OK button. This creates a directory in the Desktop folder with the
    same name.'
