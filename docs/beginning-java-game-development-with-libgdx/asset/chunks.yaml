    object is used within only a single line of code in our program, you can simplify
    your code by creating anonymous inner classes.


    ANONYMOUS INNER CLASSES


    One of the reasons we create variables when writing a program is so that we can
    refer to them again at a later point in the code. Sometimes, however, we need
    to use an instance only once in a program, and there is no need to refer to it
    later. For example, we might want to use a Scanner object to process the contents
    of a text file. To this end, we can create a File object that provides access
    to the text file, and pass this to the Scanner object, as follows:


    File f = new File( "data.txt" );

    Scanner s = new Scanner( f );


    However, since we never need to access the File object later in this program,
    we could alternatively create an *anonymous*[¹](#9781484215012_Ch03.xhtml#Fn1)
    File instance at the single point in the code where it is needed: during the initialization
    of the Scanner object.


    Scanner s = new Scanner( new File("data.txt") );


    In Java, not only can preexisting classes be initialized in this way, but also
    new classes can be created as well. For example, perhaps you are creating a game
    in which a character collects Scroll objects, via a method called addScroll; each
    Scroll can display a different message. The Scroll class is given as follows:


    public class Scroll

    {

        public void displayMessage()  {  }

    }


    This class is meant to be extended so that the displayMessage method can be overwritten.
    However, if every Scroll-derived object is instantiated at only a single point
    in the program, creating files for all these classes results in a lot of unnecessary
    extra code. For example, we could create a class called TreasureScroll as follows:


    public class TreasureScroll extends Scroll

    {

        public void displayMessage()

        {  System.out.print("The treasure is buried in the castle garden.");  }

    }


    Then we could create an anonymous instance of this object when the player adds
    it to their Scroll collection:


    player.addScroll( new TreasureScroll() );


    We can create an *anonymous inner class* to accomplish the same goal with the
    following code:


    player.addScroll(

        new Scroll()

        {

            public void displayMessage()

            {  System.out.print("The treasure is buried in the castle garden.");  }

        }

    );


    Within the call to addScroll, we’ve created an instance of a new object, which
    extends the Scroll class, and includes a set of braces where fields and method
    declarations can be placed, just as with a regular class. This new object is *anonymous*,
    since neither the instance nor the class are named, and is an *inner class* because
    it is a class defined within another class.


    The same approach is also valid when working with interfaces. For example, assume
    that Scroll had been defined as an interface instead of a class, as follows:


    public interface Scroll

    {

        public void displayMessage();

    }


    In this situation, when an anonymous inner class is created and passed as a parameter
    to the addScroll method, the parameter will be interpreted as a class that implements
    the Scroll interface.


    This programming pattern is particularly useful when creating objects that contain
    code detailing how to respond to user input, since such objects are typically
    needed only once, as an argument to an input-processing method.


    You will create an anonymous inner class that extends the InputListener class
    and contains a single method, named touchDown, that is called when the user touches
    or clicks within the rectangular region defined by the actor. Within this method,
    you make the actor remove itself from the stage that contains it. You also increment
    the number of popped balloons; this latter instruction is why the InputListener
    is added within the BalloonLevel class rather than the Balloon class: it needs
    to access the popped variable in the BalloonLevel class.


    Next, in the update method, you use a for-each loop that iterates through the
    set of all actors stored in the mainStage object, checks whether they have passed
    beyond the boundaries of the screen, and if so, removes them from the stage and
    increments escaped, the number of escaped balloons.[²](#9781484215012_Ch03.xhtml#Fn2)


    Finally, in the update method, you update the text of the Label objects in the
    user interface. You are particularly careful to update only the Label displaying
    the hit ratio information after clickCount is greater than 0, to avoid a division-by-zero
    runtime error.


    You’re now ready for the complete source code of the update method:


    ```

    public void update(float dt)

    {

        spawnTimer += dt;

        // check time for next balloon spawn

        if (spawnTimer > spawnInterval)

        {

            spawnTimer -= spawnInterval;

            Balloon b = new Balloon();

            b.addListener(

              new InputListener()

              {

                 public boolean touchDown (InputEvent ev, float x, float y, int pointer,
    int button)

                 {

                     popped++;

                     b.remove();

                     return true;

                 }

               });

            mainStage.addActor(b);

        }


    // remove balloons that are off-screen

        for ( Actor a : mainStage.getActors() )

        {

            if (a.getX() > mapWidth || a.getY() > mapHeight)

            {

                escaped++;

                a.remove();

            }

        }


    // update user interface

        poppedLabel.setText( "Popped: " + popped );

        escapedLabel.setText( "Escaped: " + escaped );

        if ( clickCount > 0 )

        {

            int percent = (int)(100.0 * popped / clickCount);

            hitRatioLabel.setText( "Hit Ratio: " + percent + "%" );

        }

    }

    ```


    You may have noticed that you didn’t change the value of clickCount, the number
    of mouse clicks, anywhere within the update method. This is because clicking a
    mouse button is a discrete action, and is best handled by the touchDown method
    in the BalloonLevel class. (Recall that all classes that implement the InputProcessor
    interface have a touchDown method, and because of our use of the InputMultiplexer
    class, each one of these classes will have a chance to process user input.) To
    accomplish this, you add the following code immediately following the update method:


    ```

    public boolean touchDown(int screenX, int screenY, int pointer, int button)

    {

        clickCount++;

        return false;

    }

    ```


    In addition, as usual, you need to create a new class that extends the Game class:


    ```

    import com.badlogic.gdx.Game;

    public class BalloonGame extends Game

    {

        public void create()

        {

            BalloonLevel z = new BalloonLevel(this);

            setScreen( z );

        }

    }

    ```


    And also as usual, you need to create a new driver class:


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class BalloonLauncher

    {

        public static void main ()

        {

            BalloonGame myProgram = new BalloonGame();

            LwjglApplication launcher = new LwjglApplication( myProgram );

        }

    }

    ```


    This completes the core mechanics of the Balloon Buster game. Now is a good time
    to test out the game, and see how many balloons you can pop!


