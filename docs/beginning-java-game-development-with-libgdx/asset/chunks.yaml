    \n图 7-1. 启动时的 LibGDX 粒子编辑器程序\n\n粒子编辑器窗口左上方面板的预览区域中显示了一个火焰效果。产生此效果的参数位于占据窗口右侧大部分的“发射器属性”面板中。该面板包含如此多的属性，每个属性都有对应的值和图表，以至于一开始可能会让人有些不知所措。本节仅讨论对最终视觉效果影响最大的发射器属性；如需更全面的介绍，请查阅\
    \ LibGDX 维基百科（之前已引用）以获取详细信息。\n"
- fmt: '*   *Image*: 在此区域中，您可以选择每个粒子使用的图像。粒子通常会被着色；灰度图像最适合此用途。

    *   *Count*: 此区域用于设置屏幕上任意时刻应出现的最小和最大粒子数。

    *   *Duration*: 这是发射器产生粒子的持续时间。（创建连续效果时，此值将被忽略。）

    *   *Emission*: 这是每秒发射的粒子数。

    *   *Life*: 这是每个粒子在粒子系统中保持活跃的时间。

    *   *Size*: 这是图像的大小，以像素为单位。

    *   *Velocity*: 这是粒子的速度，以像素/秒为单位。

    *   *Angle*: 这是粒子的方向，以度为单位。

    *   *Tint*: 显示用于为粒子图像着色的颜色。

    *   *Transparency*: 控制图像随时间变化的透明度。

    *   *Additive*: 激活时，通过将颜色分量相加来混合颜色，从而在粒子密集的区域产生更亮的效果。

    *   *Continuous*: 激活时，使发射器持续发射粒子（忽略前面的`Duration`值）。


    在某些参数旁边，您会看到文本框和一个图表，如图[7-2](#9781484215012_Ch07.xhtml#Fig2)所示，它们可用于微调初始值和随时间变化的值。（对于某些参数，您需要点击参数名称右侧的`Active`按钮才能使这些元素出现。）


    ![9781484215012_Fig07-02.jpg](OEBPS/Images/9781484215012_Fig07-02.jpg)


    [图 7-2](#9781484215012_Ch07.xhtml#_Fig2). 用于微调参数值的粒子编辑器界面


    `High`和`Low`框中的数值指的是右侧图表顶部和底部边缘的值。图表上的蓝线指示参数值在粒子生命周期内将如何变化。在图[7-2](#9781484215012_Ch07.xhtml#Fig2)所示的图表中，蓝线在顶部保持笔直，表明参数值将保持在`High`值不变。图[7-3](#9781484215012_Ch07.xhtml#Fig3)展示了另外两种可能的图表；左侧的图表表示从`High`值到`Low`值的连续递减，而右侧的图表表示参数在粒子生命周期的大部分时间内保持在`High`值，然后突然下降到`Low`值。在本节后面，我将这两个图表分别称为“逐渐递减”图表和“突然递减”图表。


