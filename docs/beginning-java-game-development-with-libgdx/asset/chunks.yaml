    Creating Four-Directional Character Animations


    Although the finished GameScreen class from the previous section results in a
    playable game, one feature is virtually begging to be added: four-directional
    movement animation for the player character. (At present, the player graphics
    consists of only a single image.) Many top-down perspective games give their characters
    four animations, representing walking in the directions north, south, east, and
    west on the tilemap. You will implement this feature in this section, but this
    process requires a few steps to do well.


    First, observe that many sprite sheets containing top-down character walking animations
    typically contain the animation frames for all four directions in a single sprite
    sheet, one direction per row, as illustrated in [Figure 7-15](#9781484215012_Ch07.xhtml#Fig15).[²](#9781484215012_Ch07.xhtml#Fn2)
    This layout standard has been popularized in particular by the game engine software
    RPG Maker.


    ![9781484215012_Fig07-15.jpg](OEBPS/Images/9781484215012_Fig07-15.jpg)


    [Figure 7-15](#9781484215012_Ch07.xhtml#_Fig15). A sprite sheet containing walking
    animations in four directions


    In order to process this kind of sprite sheet more efficiently, extracting a subset
    of the images to create an animation, you’ll write a new method for the GameUtils
    class. In particular, you will overload the parseSpriteSheet method; this version
    will enable the user to also provide an array of integers containing the indices
    of the images to be used in the resulting Animation. It will be assumed that the
    images are numbered starting with 0 in the upper-left corner, increasing first
    from left to right, and then from top to bottom. The code for this method is presented
    here, and should be added to the GameUtils class:


    ```

    // creates an Animation from a single sprite sheet

    //  with a subset of the frames, specified by an array

    public static Animation parseSpriteSheet(String fileName, int frameCols, int frameRows,

        int[] frameIndices, float frameDuration, PlayMode mode)

    {

        Texture t = new Texture(Gdx.files.internal(fileName), true);

        t.setFilter(TextureFilter.Linear, TextureFilter.Linear);


    int frameWidth = t.getWidth() / frameCols;

        int frameHeight = t.getHeight() / frameRows;


    TextureRegion[][] temp = TextureRegion.split(t, frameWidth, frameHeight);

        TextureRegion[] frames = new TextureRegion[frameCols * frameRows];


    int index = 0;

        for (int i = 0; i < frameRows; i++)

        {

            for (int j = 0; j < frameCols; j++)

            {

                frames[index] = temp[i][j];

                index++;

            }

        }


    Array<TextureRegion> framesArray = new Array<TextureRegion>();

        for (int n = 0; n < frameIndices.length; n++)

        {

            int i = frameIndices[n];

            framesArray.add( frames[i] );

        }


    return new Animation(frameDuration, framesArray, mode);

    }

