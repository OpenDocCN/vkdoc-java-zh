- fmt: "[Figure 8-9](#9781484215012_Ch08.xhtml#_Fig9). A spherically distorted image\
    \ of the sky\n\nIn this program, you will encounter the minor difficulty that,\
    \ while the `ModelBuilder` class can easily create a spherical mesh, any materials\
    \ applied to it are displayed only from the outside, rather than the inside (which\
    \ is where your camera and game entities will be). Fortunately, you can perform\
    \ a geometric trick to resolve this problem: after creating the model, you will\
    \ scale the mesh by –1 in the `z` direction; this will cause the sphere to turn\
    \ itself “inside-out,” reversing the sides on which the image will be displayed.\
    \ Since this process could be useful in many future projects, you’ll encapsulate\
    \ this process of creating and inverting a sphere in a method called `createSphereInv`\
    \ in the `ModelUtils` class. Here is the code to accomplish this:\n\n```\npublic\
    \ static ModelInstance createSphereInv( float r, Texture t, Color c )\n{\n   \
    \ Material sphereMaterial = new Material();\n    if (t != null)\n        sphereMaterial.set(\
    \ TextureAttribute.createDiffuse(t) );\n    if (c != null)\n        sphereMaterial.set(\
    \ ColorAttribute.createDiffuse(c) );\n    int usageCode = Usage.Position + Usage.ColorPacked\n\
    \                  + Usage.Normal + Usage.TextureCoordinates;\n\nModel sphereModel\
    \ = modelBuilder.createSphere(r,r,r, 32,32, sphereMaterial, usageCode);\n\nfor\
    \ (Mesh m : sphereModel.meshes)\n        m.scale(1,1,-1) ;\n\nVector3 position\
    \ = new Vector3(0,0,0);\n\nModelInstance sphere = new ModelInstance(sphereModel,\
    \ position);\n    return sphere;\n}\n```\n\nThe third and final concept to discuss\
    \ before moving onto the main game code is collision detection. To keep the level\
    \ of complexity manageable, the motion and placement of your three-dimensional\
    \ objects will be restricted to a two-dimensional plane, thus allowing this project\
    \ to reuse collision code from the original `BaseActor` class. This technique\
    \ is well-known in game development. Games that use this approach (those which\
    \ have 3D graphics but restrict game play to a 2D plane and have restricted camera\
    \ movement) are called *2.5D games*. [Figure 8-10](#9781484215012_Ch08.xhtml#Fig10)\
    \ illustrates how the game will appear to the player, while on the right you can\
    \ see the collision polygons that will correspond to the pictured game entities\
    \ (the two rocks and the pirate ship).\n\n![9781484215012_Fig08-10.jpg](OEBPS/Images/9781484215012_Fig08-10.jpg)\n\
    \n[Figure 8-10](#9781484215012_Ch08.xhtml#_Fig10). The game world rendered in\
    \ 3D, and the corresponding 2D collision polygons\n\nTo incorporate these changes\
    \ into your project, you need to make additions to the `BaseActor3D` class. First,\
    \ add the following import statements:\n\n```\nimport com.badlogic.gdx.math.collision.BoundingBox;\n\
