    Summary


    In this chapter, you added quite a bit of polish to the Starfish Collector game.
    You started by adding sound effects and background music, using the audio object
    and the Sound and Music interfaces. Then you designed and implemented a sophisticated
    user interface, including a Start menu screen, a user interface for the main game
    screen, and a menu that overlays the main screen when the game is paused. You
    learned how to use the Table class to simplify the layout of user interfaces,
    and the Skin class to manage resources. You restructured your custom BaseScreen
    class and added a BaseGame class to incorporate these new classes. You also saw
    how to create a variety of user-interface elements using the classes Label, Button,
    TextButton, Image, and Slider, and their associated style objects. In the next
    chapter, you’ll continue your focus on the user’s experience, focusing on providing
    the user alternative forms of input to play the game.


