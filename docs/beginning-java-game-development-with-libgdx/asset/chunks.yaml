    `pad` 方法为所有方向添加内边距

    *   `width` 和 `height` 用于设置 `Cell` 的大小（`Cell` 的大小会影响其内容的大小）

    *   `expandX` 和 `expandY` 用于强制 `Cell` 增大尺寸以填充该方向上表格的剩余空间

    *   `colspan` 用于声明某个 `Cell` 将跨越多个列


    默认情况下，所有表格都只包含一行。要在表格中创建位于当前行下方的新行，可以调用 `row` 方法。


    例如，让我们创建一个名为 `t` 的 `Table`，其内容布局样式与之前图 4-1 所示的标题屏幕相同。为简化本节及相应图示的说明，我们将 `Actor`
    对象命名为 `a`、`b`、`c` 和 `d`；`a` 代表标题图片，`b` 和 `c` 代表“开始”和“退出”按钮，`d` 代表 LibGDX 图片。图
    4-4 展示了该布局。


    ![9781484215012_Fig04-04.jpg](img/9781484215012_Fig04-04.jpg)


    图 4-4. 开始屏幕的抽象表格布局


    图示表明，你需要一个包含三行两列的 `Table`。对于不需要两个独立单元格的每一行，其单个单元格应设置为跨越两列。最后一个单元格的配置最为棘手：它不仅跨越两列，而且其内容右对齐，并且与上一行之间应有
    50 像素的内边距。以下代码说明了如何实现此布局；不过，你现在无需向项目添加任何代码。稍后，你将基于此模板添加代码（将 `a`、`b`、`c` 和 `d`
    替换为对应对象的变量）。


    ```

    Table t = new Table();

    t.add(a).colspan(2);

    t.row();

    t.add(b);

    t.add(c);

    t.row();

    t.add(d).colspan(2).right().padTop(50);

    ```


    作为 `Table` 类的另一个示例，你将学习如何创建主游戏屏幕的布局（之前展示于图 4-2）。此布局的抽象版本见图 4-5。


    ![9781484215012_Fig04-05.jpg](img/9781484215012_Fig04-05.jpg)


    图 4-5. 主游戏屏幕的抽象表格布局


    在图 4-5 中，整个表格的所有边都有 10 像素的内边距（由空白边框区域表示）。单元格 `a` 包含“海星向左”标签，单元格 `c` 包含“暂停”按钮。单元格
    `b` 不包含 Actor；它将在水平（x）方向上扩展以填充第一行的所有剩余空间，从而使单元格 `a` 和 `c` 分别位于屏幕的左侧和右侧。类似地，单元格
    `d` 也用于定位目的，不包含 Actor；它跨越第二行的所有三列，并在垂直（y）方向上扩展以填充所有剩余空间，从而使第一行显示在屏幕顶部。生成图 4-5
    布局的代码如下所示（与之前一样，它将作为稍后添加到项目中的模板）：


    ```

    Table t = new Table();

    t.pad(10);

    t.add(a);

    t.add().expandX();

    t.add(c);

    t.row();

    t.add().colspan(3).expandY();

    ```


    创建将添加到这些 `Table` 对象中的内容——即 `Label`、`Image` 和 `Button` 类的实例——将在本章后面讨论。即使在讨论此主题之前，请注意，由于多个屏幕将使用
    `Table` 对象，你将编写相应代码并将其添加到 `BaseScreen` 类中。


    首先，你需要相应的导入语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Table;

    ```


    接下来，在 `Stage` 对象的声明之后，声明一个名为 `uiTable` 的 `Table` 对象：


    ```

    protected Table uiTable;

    ```


    最后，在 `BaseScreen` 类的构造函数中初始化此对象，并将其附加到 `uiStage`：


    ```

    uiTable = new Table();

    uiTable.setFillParent(true);

    uiStage.addActor(uiTable);

    ```


    接下来，在创建用户界面对象之前，你还需要做一些准备工作。你将了解如何高效地存储和重用 UI 组件。


    管理资源


    在设计用户界面时，通常希望保持主题一致。你希望在游戏的多个屏幕中使用相同的字体、样式等集合。出于效率考虑，你不希望重复创建这些游戏对象。相反，你将在 `Game`
    类初始化时创建通用的 UI 元素，并将它们存储在一种数据结构中，以便稍后由 `Screen` 对象访问。方便的是，LibGDX 库恰好为此目的提供了一个类：`Skin`
    类。


    `Skin` 对象存储对象的方式类似于 `HashMap`（在第 3 章中讨论过），使用 `String` 对象作为键，任何对象类型作为值。可以使用 `add`
    方法存储对象，使用 `get` 方法检索对象。例如，以下代码创建一个新的 `Skin`，然后创建一个新的 `Color` 并使用名称 `LightGreen`
    存储它，最后检索它并将其赋值给一个新的 `Color` 变量。


    ```

    Skin uiSkin = new Skin();

    Color greenish = new Color(0.5f, 1.0f, 0.5f, 1.0f);

    uiSkin.add( "LightGreen", greenish );

    Color textColor = uiSkin.get( "LightGreen", Color.class );

    ```


    请注意，`get` 方法中传递的第二个参数是类字段，用于确定要检索的对象类型。如果不包含此参数，则返回类型为 `Object`，并且需要手动将返回值强制转换为适当的类类型，如下所示：


    ```

    Color textColor = (Color)( uiSkin.get("LightGreen") );

    ```


    经常存储的对象类型拥有自己的 `get` 风格方法。例如，你也可以使用代码 `getColor("LightGreen")` 来检索之前存储的颜色。使用这些方法可以使代码更易于阅读，因为返回的值无需强制转换为所需类型。有关
    `Skin` 类提供的所有 `get` 相关方法的完整列表，请查阅 LibGDX 文档。

