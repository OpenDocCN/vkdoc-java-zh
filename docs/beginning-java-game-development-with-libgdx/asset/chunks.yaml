    Next are a pair of methods used to set the polygon to either a rectangular or
    approximately elliptical (eight-sided) shape. In both cases, you need to determine
    the dimensions of the object in the x and z dimensions; these quantities are analogous
    to the width and height in the two-dimensional case. These values can be determined
    by calculating the BoundingBox associated to the model, which is the smallest
    box that contains the entire model. A bounding box stores the dimensions of the
    model using two Vector3 objects: min and max, which store the values of the smallest
    and largest coordinates contained by the model, respectively. These values are
    used to create the array of vertices that is passed to the polygon object, as
    illustrated here:


    ```

    public void setRectangleBase()

    {

        BoundingBox modelBounds = modelData.calculateBoundingBox( new BoundingBox()
    );

        Vector3 max = modelBounds.max;

        Vector3 min = modelBounds.min;


    float[] vertices =

            {max.x, max.z, min.x, max.z, min.x, min.z, max.x, min.z};

