    Infinite Scrolling Effects


    Next, background elements will be set up to provide an “infinite” scrolling effect.
    This purpose requires a *seamless texture*: an image that can be placed side by
    side with itself and does not create a noticeable boundary. Two copies of such
    an image will be used, each of which is at least as large as the screen. The setup
    is shown in [Figure 6-7](#9781484215012_Ch06.xhtml#Fig7); the rectangles with
    dashed-line boundaries contain the seamless texture, while the rectangle with
    the solid-line boundary represents the game screen. The left edge of image 2 is
    adjacent to the right edge of image 1, and they both move to the left at the same
    rate. When the right edge of image 1 moves completely past the left edge of the
    screen, image 1 will be repositioned to the opposite side: the left edge of image
    1 will become adjacent to the right edge of image 2\. This process continues indefinitely.


    ![9781484215012_Fig06-07.jpg](OEBPS/Images/9781484215012_Fig06-07.jpg)


    [Figure 6-7](#9781484215012_Ch06.xhtml#_Fig7). Positioning seamless textures to
    create an infinite scrolling effect


    To set this up, in the create method you initialize an array called background
    that will contain two PhysicsActor objects. After creating the first of these,
    create a second instance by cloning the first and changing its x coordinate as
    described previously. Then, add both of these objects to background and also to
    mainStage. The code that accomplishes this is as follows:


    ```

    background = new PhysicsActor[2];


    PhysicsActor bg0 = new PhysicsActor();

    bg0.storeAnimation( "default", new Texture(Gdx.files.internal("assets/sky.png"))
    );

    bg0.setPosition( 0, 0 );

    bg0.setVelocityXY(-50,0);

    background[0] = bg0;

    mainStage.addActor( bg0 );


    PhysicsActor bg1 = bg0.clone();

    bg1.setX( bg0.getWidth() );

    background[1] = bg1;

    mainStage.addActor(bg1);

    ```


    Next, you must add the following code to the update method, to reposition these
    elements after they move past the left edge of the screen:


    ```

    // manage background objects

    for (int i = 0; i < 2; i++)

    {

        PhysicsActor bg = background[i];

        if ( bg.getX() + bg.getWidth() < 0 )

            bg.setX( bg.getX() + 2 * bg.getWidth() );

    }

    ```


    To create an infinitely scrolling image of the ground, repeat the previous process
    that loaded the background images of the sky: initialize an array, set up the
    first object and clone it to get the second, and so forth. The only difference
    will be the velocity of the ground images. If you have ever watched the scenery
    go by while travelling in a car or a train, you may have noticed that the more
    distant objects appear to change position more slowly than closer objects. This
    effect, called *parallax*, provides an easy way to add an illusion of depth in
    a 2D game. Since the ground should appear closer to the player than the background
    images of the sky, the ground should be moving at a faster rate. To implement
    this, add the following code to the create method:


    ```

