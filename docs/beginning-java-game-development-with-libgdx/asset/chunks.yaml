- fmt: "回忆一下，处理用户输入有两种方式。对于连续输入（对应行走等动作），你需要在`update`方法中轮询硬件设备的状态，该方法通常每秒运行60次。稍后你会看到，这个过程类似于键盘输入的轮询：键盘轮询使用`Gdx.input`对象的方法（如`isKeyPressed`），而游戏手柄轮询则使用`Controller`对象的方法（如`getAxis`和`getButton`）。对于离散输入（对应跳跃等动作），你之前配置程序来监控（或“监听”）事件，例如键盘按键被按下的瞬间。类似地，你将在`BaseScreen`类中添加额外代码来监控离散的游戏手柄事件，例如游戏手柄按钮被按下的瞬间。在接下来的两节中，你将逐步引入处理连续和离散游戏手柄输入的代码。\n\
    \n## 连续输入\n\n在本节中，你将在`GameScreen`类的`update`方法中添加代码，用于判断摇杆被按压的方向，并相应地移动玩家角色。首先，你需要获取活动`Controller`对象的实例。`Controllers`类提供了静态工具方法`getControllers`，该方法会获取一个包含所有已连接且活动的`Controller`对象的`Array`。假设只连接了一个游戏手柄，你只需要获取该`Array`的第零个元素，如下所示：\n\
    \n```\nController gamepad = Controllers.getControllers().get(0);\n```\n\n获取`Controller`对象后，你可以使用四个提供的`get`风格方法之一来轮询摇杆、按钮、方向键和扳机键的状态。其中许多方法需要一个参数：一个对应于游戏手柄组件的常量值。这些值是特定于游戏手柄的，并且对于特定的游戏手柄，不同操作系统上的值也可能不同。确定这些值最稳健的方法是允许玩家在运行时配置游戏手柄映射，即遍历游戏所需的不同动作，要求玩家按下对应的按钮，并存储这些值以供后续使用。为简单起见，我在本节中包含了一个名为`XBoxGamepad`的类，它存储了Xbox\
    \ 360风格控制器（包括前面提到的罗技F310控制器）的代码。该类的代码如下所示，之后我将解释如何使用这些值：\n\n```\nimport com.badlogic.gdx.controllers.PovDirection;\n\
    \npublic class XBoxGamepad\n{\n    /** button codes */\n    public static final\
    \ int BUTTON_A              = 0;\n    public static final int BUTTON_B       \
    \       = 1;\n    public static final int BUTTON_X              = 2;\n    public\
    \ static final int BUTTON_Y              = 3;\n    public static final int BUTTON_LEFT_SHOULDER\
    \  = 4;\n    public static final int BUTTON_RIGHT_SHOULDER = 5;\n    public static\
    \ final int BUTTON_BACK           = 6;\n    public static final int BUTTON_START\
    \          = 7;\n    public static final int BUTTON_LEFT_STICK     = 8;\n    public\
    \ static final int BUTTON_RIGHT_STICK    = 9;\n\n    /** directional pad codes\
    \ */\n    public static final PovDirection DPAD_UP    = PovDirection.north;\n\
    \    public static final PovDirection DPAD_DOWN  = PovDirection.south;\n    public\
    \ static final PovDirection DPAD_RIGHT = PovDirection.east;\n    public static\
    \ final PovDirection DPAD_LEFT  = PovDirection.west;\n\n    /** joystick axis\
    \ codes */\n    // X-axis: -1 = left, +1 = right\n    // Y-axis: -1 = up  , +1\
    \ = down\n    public static final int AXIS_LEFT_X  = 1;\n    public static final\
    \ int AXIS_LEFT_Y  = 0;\n    public static final int AXIS_RIGHT_X = 3;\n    public\
    \ static final int AXIS_RIGHT_Y = 2;\n\n    /** trigger codes */\n    // Left\
    \ & Right Trigger buttons treated as a single axis; same ID value\n    // Values\
    \ - Left trigger: 0 to +1.  Right trigger: 0 to -1.\n    // Note: values are additive;\
    \ they can cancel each other if both are pressed.\n    public static final int\
    \ AXIS_LEFT_TRIGGER  = 4;\n    public static final int AXIS_RIGHT_TRIGGER = 4;\n\
    }\n```\n\n以下方法可用于轮询游戏手柄组件的状态：\n\n*   要轮询摇杆的状态，请使用`getAxis(code)`，其中`code`是一个整数，对应于左摇杆或右摇杆，以及x轴或y轴方向。返回的值是一个范围在-1到1之间的浮点数。在x轴上，-1对应左，+1对应右；而在y轴上，-1对应上，+1对应下。例如，考虑以下代码行：\n\
    \n```\n    float x = gamepad.getAxis(XBoxGamepad.AXIS_LEFT_X);\n    ```\n\n如果`x`的值等于0.5，则表示游戏手柄的左摇杆被向右按压了一半。\n\
    \n需要强调的是，大多数控制器使用的y轴方向（负值对应“向上”方向）与LibGDX库假定的方向（正值对应“向上”方向）相反。在`update`方法中处理输入时，需要记住这一点。\n\
    \n*   要轮询扳机键的状态，你也需要使用`getAxis(code)`。在Xbox 360风格的控制器上，左扳机和右扳机被视为一个轴。按下左扳机会生成0（未按下）到+1（完全按下）范围内的值，而按下右扳机会生成0（未按下）到-1（完全按下）范围内的值。如果同时按下两个扳机，`getAxis`方法将返回它们值的总和；特别是，如果两个扳机都被完全按下，`getAxis`将返回0。\n\
    *   要检查游戏手柄按钮的状态，请使用`getButton(code)`，其中`code`是一个对应于游戏手柄按钮的整数。返回的值是一个布尔值，指示相应的按钮当前是否被按下。\n\
    *   要确定方向键上被按压的方向，[¹](#9781484215012_Ch05.xhtml#Fn1)请使用`getPov(num)`，其中`num`是方向键的索引（通常为0）。方向键很有趣，因为它们返回的值比按钮（布尔值）更复杂，但比摇杆轴（浮点值）简单。这种“中间地带”的输入级别通过返回导入的`PovDirection`类中定义的枚举类型（`enum`）来处理。然而，为了方便起见，我在`XBoxGamepad`类中为这些值定义了替代名称（可能对现代游戏玩家来说更熟悉）。\n\
    \n现在，你已经准备好将基于游戏手柄的控制添加到`GameScreen`类的`update`方法中。具体来说，你将通过整合`getAxis`方法，让玩家能够使用游戏手柄的左摇杆来控制Mousey。在下面的代码中，你通过检查`Array`控制器是否包含至少一个元素来测试控制器是否已连接。如果是，并且摇杆移动超过了某个阈值（称为*死区*，用于补偿控制器的灵敏度，通常设置为10%到20%之间的值），你将相应地设置角色的加速度。如果不是，你将提供备用的键盘控制。"
  raw: "Recall that you can process user input in one of two ways. For continuous\
    \ input (corresponding to actions such as walking), you poll the state of the\
    \ hardware device in the update method, which typically runs 60 times per second.\
    \ Later you will see that this process is analogous to polling for keyboard input:\
    \ keyboard polling uses methods of the Gdx.input object such as isKeyPressed,\
    \ while gamepad polling uses methods of a Controller object such as getAxis and\
    \ getButton. For discrete input (corresponding to actions such as jumping), you\
    \ previously configured the program to monitor (or “listen”) for events, such\
    \ as when a keyboard key is initially pressed down. Similarly, you will include\
    \ additional code in the BaseScreen class to monitor for discrete gamepad events,\
    \ such as when a gamepad button is initially pressed down. You will introduce\
    \ code for both continuous and discrete gamepad input over the course of the next\
    \ two sections.\n\nContinuous Input\n\nIn this section, you will add code to the\
    \ update method of the GameScreen class, which will determine the direction in\
    \ which the joystick is being pressed, and move the player’s character accordingly.\
    \ First, you need to retrieve the instance of the active Controller object. The\
    \ Controllers class provides the static utility method getControllers that retrieves\
    \ an Array of active, connected Controller objects. Assuming that just a single\
    \ gamepad is connected, you need only get the zeroth element of the Array, as\
    \ follows:\n\n```\nController gamepad = Controllers.getControllers().get(0);\n\
    ```\n\nOnce the Controller has been obtained, you can poll for the state of joysticks,\
    \ buttons, directional pads, and trigger buttons by using one of four provided\
    \ get-style methods. Many of these require a single parameter: a constant value\
    \ that corresponds to a component of the gamepad. These values are gamepad specific,\
    \ and a particular gamepad might even have different values for different operating\
    \ systems. The most robust method for determining these values is to allow the\
    \ player to configure the gamepad mapping at runtime, by looping through the different\
    \ actions required by the game, asking the player to press the corresponding button,\
    \ and storing the values for later use. For simplicity in this section, I have\
    \ included a class called XBoxGamepad that stores the codes for an Xbox 360-style\
    \ controller (which includes those such as the Logitech F310 controller mentioned\
    \ earlier). This code for this class is presented here, and I’ll explain how to\
    \ use the values afterward:\n\n```\nimport com.badlogic.gdx.controllers.PovDirection;\n\
    \npublic class XBoxGamepad\n{\n    /** button codes */\n    public static final\
    \ int BUTTON_A              = 0;\n    public static final int BUTTON_B              =\
    \ 1;\n    public static final int BUTTON_X              = 2;\n    public static\
    \ final int BUTTON_Y              = 3;\n    public static final int BUTTON_LEFT_SHOULDER  =\
    \ 4;\n    public static final int BUTTON_RIGHT_SHOULDER = 5;\n    public static\
    \ final int BUTTON_BACK           = 6;\n    public static final int BUTTON_START          =\
    \ 7;\n    public static final int BUTTON_LEFT_STICK     = 8;\n    public static\
    \ final int BUTTON_RIGHT_STICK    = 9;\n\n/** directional pad codes */\n    public\
    \ static final PovDirection DPAD_UP    = PovDirection.north;\n    public static\
    \ final PovDirection DPAD_DOWN  = PovDirection.south;\n    public static final\
    \ PovDirection DPAD_RIGHT = PovDirection.east;\n    public static final PovDirection\
    \ DPAD_LEFT  = PovDirection.west;\n\n/** joystick axis codes */\n    // X-axis:\
    \ -1 = left, +1 = right\n    // Y-axis: -1 = up  , +1 = down\n    public static\
    \ final int AXIS_LEFT_X  = 1;\n    public static final int AXIS_LEFT_Y  = 0;\n\
        public static final int AXIS_RIGHT_X = 3;\n    public static final int AXIS_RIGHT_Y\
    \ = 2;\n\n/** trigger codes */\n    // Left & Right Trigger buttons treated as\
    \ a single axis; same ID value\n    // Values - Left trigger: 0 to +1.  Right\
    \ trigger: 0 to -1.\n    // Note: values are additive; they can cancel each other\
    \ if both are pressed.\n    public static final int AXIS_LEFT_TRIGGER  = 4;\n\
        public static final int AXIS_RIGHT_TRIGGER = 4;\n}\n```\n\nThe following methods\
    \ are available to poll the state of a gamepad component:\n\n*   To poll the state\
    \ of the joystick, use getAxis(code), where code is an integer corresponding to\
    \ either the left or right joystick, and either the x or y direction. The value\
    \ returned is a float in the range from –1 to 1\\. On the x axis, –1 corresponds\
    \ to left and +1 corresponds to right, while on the y axis, –1 corresponds to\
    \ up and +1 corresponds to down. For example, consider the following line of code:\n\
    \n```\n    float x = gamepad.getAxis(XBoxGamepad.AXIS_LEFT_X);\n    ```\n\nIf\
    \ the value of x equals 0.5, then that means the left joystick of the gamepad\
    \ is being pressed halfway to the right.\n\nI emphasize that the orientation of\
    \ the y axis used by most controllers (negative values correspond to the “up”\
    \ direction) is the opposite orientation assumed by the LibGDX libraries (positive\
    \ values correspond to the “up” direction). This will need to be remembered when\
    \ processing input in the update method.\n\n*   To poll the state of the triggers,\
    \ you also use getAxis(code). On Xbox 360-style controllers, the left and right\
    \ triggers are treated as a single axis. Pressing the left trigger generates the\
    \ values in the range from 0 (not pressed) to +1 (fully pressed), while pressing\
    \ the right trigger generates values in the range from 0 (not pressed) to –1 (fully\
    \ pressed). If both triggers are pressed at once, the getAxis method will return\
    \ the sum of their values; in particular, if both triggers are fully pressed,\
    \ getAxis will return 0.\n*   To check the state of the gamepad buttons, use getButton(code),\
    \ where code is an integer corresponding to a gamepad button. The value returned\
    \ is a Boolean that indicates whether the corresponding button is currently being\
    \ pressed down.\n*   To determine which direction is being pressed on the directional\
    \ pad,[¹](#9781484215012_Ch05.xhtml#Fn1) use getPov(num), where num is the index\
    \ of the directional pad (typically 0). Directional pads are interesting, in that\
    \ they yield return values more complex than a button (a boolean value) but less\
    \ complex than a joystick axis (a float value). This “middle ground” level of\
    \ input is handled by returning an enumerated type (an enum) defined in the imported\
    \ PovDirection class. However, for convenience, I have defined alternative names\
    \ (that may be more familiar to modern gamers) for these values in the XBoxGamepad\
    \ class.\n\nYou are now ready to add gamepad–based controls to the update method\
    \ of the GameScreen class. In particular, you enable the player to control Mousey\
    \ with the gamepad left joystick, by incorporating the getAxis method. In the\
    \ following code, you check to see whether a controller is connected by testing\
    \ whether the Array of controllers contains at least one element. If so, then\
    \ provided that the joystick has moved passed a certain threshold (called the\
    \ *deadzone*, used to compensate for controller sensitivity, typically set to\
    \ a value between 10 and 20 percent), you set the acceleration of your character\
    \ accordingly. If not, you provide fallback keyboard controls for your game."
  trans: "\n回想一下，处理用户输入有两种方式。对于连续输入（对应行走等动作），你需要在更新方法中轮询硬件设备的状态，该方法通常每秒运行 60 次。稍后你会看到，这个过程类似于轮询键盘输入：键盘轮询使用`Gdx.input`对象的方法，例如`isKeyPressed`，而游戏手柄轮询则使用`Controller`对象的方法，例如`getAxis`和`getButton`。对于离散输入（对应跳跃等动作），你之前已经配置程序来监控（或“监听”）事件，例如键盘按键被首次按下时。类似地，你将在`BaseScreen`类中添加额外的代码来监控离散的游戏手柄事件，例如游戏手柄按钮被首次按下时。在接下来的两节中，你将引入处理连续和离散游戏手柄输入的代码。\n\
    \n## 连续输入\n\n在本节中，你将在`GameScreen`类的更新方法中添加代码，用于确定摇杆被按压的方向，并相应地移动玩家角色。首先，你需要获取活动`Controller`对象的实例。`Controllers`类提供了静态工具方法`getControllers`，用于获取一个包含已连接且活动的`Controller`对象的数组。假设只连接了一个游戏手柄，你只需要获取该数组的第零个元素，如下所示：\n\
    \n```\nController gamepad = Controllers.getControllers().get(0);\n```\n\n一旦获取了`Controller`对象，你就可以使用提供的四种`get`风格的方法之一来轮询摇杆、按钮、方向键和扳机键的状态。其中许多方法需要一个参数：一个对应于游戏手柄组件的常量值。这些值是特定于游戏手柄的，并且特定的游戏手柄在不同操作系统上甚至可能有不同的值。确定这些值最稳健的方法是允许玩家在运行时配置游戏手柄映射，方法是遍历游戏所需的不同动作，要求玩家按下相应的按钮，并存储这些值以供后续使用。为简单起见，在本节中，我包含了一个名为`XBoxGamepad`的类，它存储了\
    \ Xbox 360 风格控制器（包括前面提到的罗技 F310 控制器）的代码。该类的代码如下所示，之后我将解释如何使用这些值：\n\n```\nimport\
    \ com.badlogic.gdx.controllers.PovDirection;\n\npublic class XBoxGamepad\n{\n\
    \    /** 按钮代码 */\n    public static final int BUTTON_A              = 0;\n   \
    \ public static final int BUTTON_B              = 1;\n    public static final\
    \ int BUTTON_X              = 2;\n    public static final int BUTTON_Y       \
    \       = 3;\n    public static final int BUTTON_LEFT_SHOULDER  = 4;\n    public\
    \ static final int BUTTON_RIGHT_SHOULDER = 5;\n    public static final int BUTTON_BACK\
    \           = 6;\n    public static final int BUTTON_START          = 7;\n   \
    \ public static final int BUTTON_LEFT_STICK     = 8;\n    public static final\
    \ int BUTTON_RIGHT_STICK    = 9;\n\n    /** 方向键代码 */\n    public static final\
    \ PovDirection DPAD_UP    = PovDirection.north;\n    public static final PovDirection\
    \ DPAD_DOWN  = PovDirection.south;\n    public static final PovDirection DPAD_RIGHT\
    \ = PovDirection.east;\n    public static final PovDirection DPAD_LEFT  = PovDirection.west;\n\
    \n    /** 摇杆轴代码 */\n    // X 轴：-1 = 左，+1 = 右\n    // Y 轴：-1 = 上，+1 = 下\n    public\
    \ static final int AXIS_LEFT_X  = 1;\n    public static final int AXIS_LEFT_Y\
    \  = 0;\n    public static final int AXIS_RIGHT_X = 3;\n    public static final\
    \ int AXIS_RIGHT_Y = 2;\n\n    /** 扳机键代码 */\n    // 左扳机和右扳机被视为同一轴；ID 值相同\n   \
    \ // 值 - 左扳机：0 到 +1。右扳机：0 到 -1。\n    // 注意：值是相加的；如果同时按下两者，它们可能会相互抵消。\n    public\
    \ static final int AXIS_LEFT_TRIGGER  = 4;\n    public static final int AXIS_RIGHT_TRIGGER\
    \ = 4;\n}\n```\n\n以下方法可用于轮询游戏手柄组件的状态：\n\n*   要轮询摇杆的状态，请使用`getAxis(code)`，其中`code`是一个整数，对应于左摇杆或右摇杆，以及\
    \ x 方向或 y 方向。返回的值是一个范围在-1 到 1 之间的浮点数。在 x 轴上，-1 对应左，+1 对应右；而在 y 轴上，-1 对应上，+1 对应下。例如，考虑以下代码行：\n\
    \n```\n    float x = gamepad.getAxis(XBoxGamepad.AXIS_LEFT_X);\n```\n\n如果`x`的值等于\
    \ 0.5，则表示游戏手柄的左摇杆被按向右侧一半的位置。\n\n我强调一下，大多数控制器使用的 y 轴方向（负值对应“向上”方向）与 LibGDX 库假定的方向（正值对应“向上”方向）相反。在更新方法中处理输入时需要记住这一点。\n\
    \n*   要轮询扳机键的状态，你也使用`getAxis(code)`。在 Xbox 360 风格的控制器上，左扳机和右扳机被视为同一轴。按下左扳机会生成\
    \ 0（未按下）到+1（完全按下）范围内的值，而按下右扳机会生成 0（未按下）到-1（完全按下）范围内的值。如果同时按下两个扳机，`getAxis`方法将返回它们值的总和；特别是，如果两个扳机都完全按下，`getAxis`将返回\
    \ 0。\n*   要检查游戏手柄按钮的状态，请使用`getButton(code)`，其中`code`是一个对应于游戏手柄按钮的整数。返回的值是一个布尔值，指示相应的按钮当前是否被按下。\n\
    *   要确定方向键上被按下的方向，¹请使用`getPov(num)`，其中`num`是方向键的索引（通常为 0）。方向键很有趣，因为它们返回的值比按钮（布尔值）更复杂，但比摇杆轴（浮点值）简单。这种“中间地带”的输入级别通过返回导入的`PovDirection`类中定义的枚举类型来处理。然而，为了方便起见，我在`XBoxGamepad`类中为这些值定义了替代名称（可能对现代玩家更熟悉）。\n\
    \n现在，你已准备好将基于游戏手柄的控制添加到`GameScreen`类的更新方法中。具体来说，你通过整合`getAxis`方法，让玩家能够使用游戏手柄的左摇杆来控制\
    \ Mousey。在以下代码中，你通过测试控制器数组是否至少包含一个元素来检查是否有控制器已连接。如果有，并且摇杆移动超过了某个阈值（称为*死区*，用于补偿控制器灵敏度，通常设置为\
    \ 10%到 20%之间的值），你就相应地设置角色的加速度。如果没有，你将为游戏提供备用的键盘控制。\n"
- fmt: "```java\nfloat accelerate = 100.0f;\nif (Controllers.getControllers().size\
    \ > 0)\n{\n    Controller gamepad = Controllers.getControllers().get(0);\n   \
    \ float xAxis =  gamepad.getAxis(XBoxGamepad.AXIS_LEFT_X);\n    float yAxis =\
    \ -gamepad.getAxis(XBoxGamepad.AXIS_LEFT_Y);\n    float deadZone = 0.15f;\n  \
    \  if (Math.abs(xAxis) < deadZone)\n        xAxis = 0;\n    if (Math.abs(yAxis)\
    \ < deadZone)\n        yAxis = 0;\n    mousey.setAccelerationXY( xAxis * accelerate,\
    \ yAxis * accelerate);\n}\nelse\n{\n    // keyboard fallback controls\n    mousey.setAccelerationXY(0,0);\n\
    \    if (Gdx.input.isKeyPressed(Keys.LEFT))\n        mousey.addAccelerationXY(-accelerate,0);\n\
    \    if (Gdx.input.isKeyPressed(Keys.RIGHT))\n        mousey.addAccelerationXY(accelerate,0);\n\
    \    if (Gdx.input.isKeyPressed(Keys.UP))\n        mousey.addAccelerationXY(0,accelerate);\n\
    \    if (Gdx.input.isKeyPressed(Keys.DOWN))\n        mousey.addAccelerationXY(0,-accelerate);\n\
    }\n```\n\n## Discrete Input\n\nNext, you will introduce the code necessary to\
    \ process discrete gamepad input events. First, you must declare that the `BaseScreen`\
    \ class implements the `ControllerListener` interface. The first line of the class\
    \ declaration should read as follows:\n\n```java\npublic abstract class BaseScreen\
    \ implements Screen, InputProcessor, ControllerListener\n```\n\nYou need to declare\
    \ the methods required by the `ControllerListener` interface; these can be overridden\
    \ if needed by the individual classes that extend `BaseScreen`. The methods you\
    \ need to include are as follows:\n\n```java\npublic void connected(Controller\
    \ controller)\n{  }\n\npublic void disconnected(Controller controller)\n{  }\n\
    \npublic boolean xSliderMoved(Controller controller, int sliderCode, boolean value)\n\
    {  return false;  }\n\npublic boolean ySliderMoved(Controller controller, int\
    \ sliderCode, boolean value)\n{  return false;  }\n\npublic boolean accelerometerMoved(Controller\
    \ controller, int accelerometerCode, Vector3 value)\n{  return false;  }\n\npublic\
    \ boolean povMoved(Controller controller, int povCode, PovDirection value)\n{\
    \  return false;  }\n\npublic boolean axisMoved(Controller controller, int axisCode,\
    \ float value)\n{  return false;  }\n\npublic boolean buttonDown(Controller controller,\
    \ int buttonCode)\n{  return false;  }\n\npublic boolean buttonUp(Controller controller,\
    \ int buttonCode)\n{  return false;  }\n```\n\nFinally, you need to “activate”\
    \ the listener. You will add the currently active `Screen` to the set of listeners\
    \ managed by the `Controllers` class. You must also remove any previously added\
    \ `ControllerListener` objects; you don’t want other `Screen` objects that may\
    \ be inactive (but still reside in memory) to respond to input, because this could\
    \ cause unexpected problems. (For example, if the Start button were used to begin\
    \ a new game from the menu screen, after switching to the game screen, you no\
    \ longer want this action to be occur when clicking Start; therefore, you must\
    \ stop the menu screen from “listening” and responding to these events.) You can\
    \ perform this task in the `BaseScreen` constructor by adding the following lines\
    \ of code:\n\n```java\nControllers.clearListeners();\nControllers.addListener(this);\n\
    ```\n\nNow that your modifications to the `BaseScreen` class are complete, you\
    \ are ready to write game-specific code to respond to discrete gamepad input.\
    \ For example, you want to enable the player to pause the game by pressing the\
    \ X button on the Xbox gamepad. It would be inaccurate to poll for the state of\
    \ the button in the update method, as this could result in toggling the pause\
    \ state 60 times per second. Pausing the game is a *discrete* action, and thus\
    \ you override one of the `ControllerListener` methods to listen for the event\
    \ of pressing the X button. The following code, to be added to the `GameScreen`\
    \ class, accomplishes this task:\n\n```java\npublic boolean buttonDown(Controller\
    \ controller, int buttonCode)\n{\n    if (buttonCode == XBoxGamepad.BUTTON_X)\n\
    \        togglePaused();\n\nreturn false;\n}\n```\n\nSimilarly, you would like\
    \ to be able to start the game by clicking the Start button while the main menu\
    \ screen is active. To this end, you add the following code to the `MenuScreen`\
    \ class:\n\n```java\npublic boolean buttonDown(Controller controller, int buttonCode)\n\
    {\n    if (buttonCode == XBoxGamepad.BUTTON_START)\n        game.setScreen( new\
    \ GameScreen(game) );\n\nreturn false;\n}\n```\n\nThis completes the controller-based\
    \ additions to the Cheese, Please! game. The final version of the source code\
    \ is contained within the `CheesePleaseGamepad` folder that contains the source\
    \ code for this chapter.\n\n## Touch-Screen Controls\n\nIn this section, you’ll\
    \ learn how to implement gamepad-inspired onscreen touch controls. Again, as mentioned\
    \ in the beginning of the chapter, access to a touch-screen device is not needed\
    \ to test the code for this section, as LibGDX handles mouse events and touch\
    \ events with the same methods; single-touch input is simulated by the mouse.\
    \ Since you have already learned about the `Button` class in the previous chapter,\
    \ you’re well on your way. In what follows, you’ll learn about another user-interface\
    \ control provided by the LibGDX library, the `Touchpad` class, which was created\
