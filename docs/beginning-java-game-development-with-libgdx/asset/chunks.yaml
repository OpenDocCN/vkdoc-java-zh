    *   A user interface that lists how many rocks have been destroyed.

    *   The spaceship explodes when it collides with a rock.

    *   Limit the number of lasers that can be onscreen at once.

    *   A Congratulations message appears if all rocks are destroyed.

    *   A Game Over message appears if the spaceship is destroyed.

    *   Integrating game-pad controller support.

    *   Any other features you can think of!


    Plane Dodger


    This section introduces a game called *Plane* *Dodger*, inspired by modern touch-screen
    games such as Flappy Bird and Jetpack Joyride. In this game, the user controls
    a green plane that can maneuver up and down as it continuously flies through the
    game world. Stars periodically appear in the sky; the user’s goal is to collect
    as many as possible. At the same time, “enemy” red planes also appear regularly;
    dodging these planes must be the user’s first priority, as collision with them
    will end the game. This becomes more difficult as time progresses, as the speed
    of the red planes will increase. [Figure 6-6](#9781484215012_Ch06.xhtml#Fig6)
    shows this game in action.


    ![9781484215012_Fig06-06.jpg](OEBPS/Images/9781484215012_Fig06-06.jpg)


    [Figure 6-6](#9781484215012_Ch06.xhtml#_Fig6). The Plane Dodger game


    The new game-play mechanics featured by this game include the following:


    *   A side-view perspective

    *   Creating an illusion of rightward movement by scrolling backgrounds to the
    left

    *   Creating an illusion of depth by using *parallax*: scrolling distant objects
    more slowly

    *   Simulating gravity using constant acceleration

    *   Randomizing game features to produce different game-play experiences each
    time


