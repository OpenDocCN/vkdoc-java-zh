    \ now be as follows:\n\n```\npublic final int viewWidth  = 600;\npublic final\
    \ int viewHeight = 600;\npublic final int uiWidth    = 600;\npublic final int\
    \ uiHeight   = 800;\n```\n\nIn the constructor method, the initialization of `mainStage`\
    \ remains the same, but the line of code initializing `uiStage` should be changed\
    \ to the following:\n\n```\nuiStage = new Stage( new FitViewport(uiWidth, uiHeight)\
    \ );\n```\n\nIn the `render` method, you can change the rendering location of\
    \ each stage by using the method `glViewport` of the `Gdx.gl` object, before the\
    \ `draw` method of each stage is called. The parameters of `glViewport` define\
    \ the rectangular region where the stage should be rendered: the x and y coordinates\
    \ of the bottom-left corner, followed by the width and height of the rectangle.\
    \ In the following code listing, the code to be added (to adjust the rendering\
    \ locations as previously described) appears in bold:\n\n```\nGdx.gl.glViewport(0,\
    \ uiHeight-viewHeight, viewWidth, viewHeight );\nmainStage.draw();\nGdx.gl.glViewport(0,0,\
    \ uiWidth,uiHeight);\nuiStage.draw();\n```\n\nIn general, it is recommended to\
    \ use the `glViewport` method sparingly, as it changes the rendering parameters,\
    \ but not the coordinates of touch events generated by event listeners. This is\
    \ why `uiStage` was kept at the same size as the window. Otherwise, the call to\
    \ `glViewport` could result in a mismatch between where the controls are drawn\
    \ and where the controls are activated.\n\nNext, you plan the new layout of `uiTable`\
    \ that incorporates the onscreen controls, as illustrated in [Figure 5-4](#9781484215012_Ch05.xhtml#Fig4);\
    \ an abstract diagram of this layout is presented in [Figure 5-5](#9781484215012_Ch05.xhtml#Fig5).\n\
    \n![9781484215012_Fig05-05.jpg](OEBPS/Images/9781484215012_Fig05-05.jpg)\n\n[Figure\
    \ 5-5](#9781484215012_Ch05.xhtml#_Fig5). Abstract diagram of the new user-interface\
    \ layout, including control elements"
  raw: 'These objects require two parameters to be initialized. First, you supply
    a value for the deadzone radius—the minimal distance (in pixels) the knob must
    be dragged in order for any change to register. This is useful for situations
    when the player wants to leave a finger on the touch pad and also for the character
    to remain still. Without a deadzone setting, the controls would be too sensitive
    for this to be possible. It is unlikely that the average player would have pixel-perfect
    finger positioning to keep the knob exactly centered, and the result would be
    unwanted (and possibly player-frustrating) drift of the character being controlled.


    Second, the images used in a Touchpad object are stored in a TouchpadStyle object,
    which contains two images, both stored as Drawable objects, as is standard for
    UI elements in LibGDX. As usual, you will load each image into a Texture object
    and convert it into a Drawable by using the game’s Skin object. Because only one
    screen in your game uses this style, you won’t initialize the style in the class
    extending BaseGame, as you have with other style data objects.


    To begin this project, start by making another local copy of the CheesePleaseUpdate
    project directory, renaming it to CheesePleaseTouchscreen. You’ll also need to
    copy some images from this chapter’s source code directory: from CheesePleaseTouchscreen/assets,
    copy all of the images into your local project’s assets directory.


    In the GameScreen class, you begin by adding the import statements:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad;

    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad.TouchpadStyle;

    import com.badlogic.gdx.scenes.scene2d.ui.Button.ButtonStyle;

    import com.badlogic.gdx.scenes.scene2d.InputListener;

    import com.badlogic.gdx.scenes.scene2d.InputEvent;

    ```


    You include the following code to declare the Touchpad object in the GameScreen
    class, so that both the create and update methods can access it:


    ```

    private Touchpad touchPad;

    ```


    Next, in the create method, you use the following code to initialize the Touchpad
    object as well as its corresponding TouchpadStyle. While it is possible to add
    an event listener to monitor and respond to changes in the state of the touch
    pad, instead you will poll for the state of the touch pad later, in the update
    method.


    ```

    TouchpadStyle touchStyle = new TouchpadStyle();


    Texture padKnobTex = new Texture(Gdx.files.internal("assets/joystick-knob.png"));

    game.skin.add("padKnobImage", padKnobTex );

    touchStyle.knob = game.skin.getDrawable("padKnobImage");


    Texture padBackTex = new Texture(Gdx.files.internal("assets/joystick-bg.png"));

    game.skin.add("padBackImage", padBackTex );

    touchStyle.background = game.skin.getDrawable("padBackImage");


    touchPad = new Touchpad(5, touchStyle);

    ```


    In the update method, you can use the Touchpad object methods getKnobPercentX
    and getKnobPercentY to determine the current position of the knob. The returned
    values range from –1 to +1; you can multiply these values by the maximum desired
    acceleration for your character, which will give the player a great deal of control
    over the speed: the further the knob is dragged from the center of the touch pad,
    the greater the character’s speed will be. You replace the code that polls the
    state of the keyboard arrow keys and sets Mousey’s acceleration with the following:


    ```

    float accelerate = 100;

    mousey.setAccelerationXY(

        touchPad.getKnobPercentX() * accelerate, touchPad.getKnobPercentY() * accelerate
    );

    ```


    For completeness, the code that you will use to create the Pause button displayed
    in the game screenshot in [Figure 5-4](#9781484215012_Ch05.xhtml#Fig4) is given
    below; this code should be included in the create method. In this case, an event
    listener is attached to the Button object, since pausing the game is a discrete
    action.


    ```

    Texture pauseTexture = new Texture(Gdx.files.internal("assets/pause.png"));

    game.skin.add("pauseImage", pauseTexture );

    ButtonStyle pauseStyle = new ButtonStyle();

    pauseStyle.up = game.skin.getDrawable("pauseImage");


    Button pauseButton = new Button( pauseStyle );


    pauseButton.addListener(

        new InputListener()

        {

            public boolean touchDown (InputEvent event, float x, float y, int pointer,
    int button)

            {

                togglePaused();

                return true;

            }

        });

    ```


    With these elements in place, you are ready to focus your attention on creating
    the user interface layout illustrated in [Figure 5-4](#9781484215012_Ch05.xhtml#Fig4).


    Redesigning the User Interface


    As mentioned in the beginning of our discussion of touch-screen controls, you
    have to deal with the issue of control elements obstructing the user’s view of
    the game world; we have elected to display the controls at the bottom of the screen
    and render the game world above them.


    First, you’ll set the configuration options in the Launcher class so that the
    window has width 600 and height 800; the main function becomes as follows:


    ```

    public static void main (String[] args)

    {

        LwjglApplicationConfiguration config = new LwjglApplicationConfiguration();

        config.width = 600;

        config.height = 800;

        config.title = "Cheese, Please!";


    CheeseGame myProgram = new CheeseGame();

        LwjglApplication launcher = new LwjglApplication( myProgram, config );

    }

    ```


    Next, you’ll make some changes to the BaseScreen class. The user interface will
    still fill the entire window, but the game world (the contents of mainStage) will
    be rendered in the upper area of this window, as illustrated in [Figure 5-4](#9781484215012_Ch05.xhtml#Fig4).
    Thus, you’ll change the dimensions of mainStage to 600 by 600 pixels, and later
    you’ll see how to render mainStage in a different location. The constants viewWidth
    and viewHeight will now exclusively refer to the dimensions of mainStage, and
    you’ll declare the constants uiWidth and uiHeight to store the dimensions of uiStage.


    The variable declarations in the BaseScreen class should now be as follows:


    ```

    public final int viewWidth  = 600;

    public final int viewHeight = 600;

    public final int uiWidth    = 600;

    public final int uiHeight   = 800;

    ```


    In the constructor method, the initialization of mainStage remains the same, but
    the line of code initializing uiStage should be changed to the following:


    ```

    uiStage = new Stage( new FitViewport(uiWidth, uiHeight) );

    ```


    In the render method, you can change the rendering location of each stage by using
    the method glViewport of the Gdx.gl object, before the draw method of each stage
    is called. The parameters of glViewport define the rectangular region where the
    stage should be rendered: the x and y coordinates of the bottom-left corner, followed
    by the width and height of the rectangle. In the following code listing, the code
    to be added (to adjust the rendering locations as previously described) appears
    in bold:


    ```

    Gdx.gl.glViewport(0, uiHeight-viewHeight, viewWidth, viewHeight );

    mainStage.draw();

    Gdx.gl.glViewport(0,0, uiWidth,uiHeight);

    uiStage.draw();

    ```


    In general, it is recommended to use the glViewport method sparingly, as it changes
    the rendering parameters, but not the coordinates of touch events generated by
    event listeners. This is why uiStage was kept at the same size as the window.
    Otherwise, the call to glViewport could result in a mismatch between where the
    controls are drawn and where the controls are activated.


    Next, you plan the new layout of uiTable that incorporates the onscreen controls,
    as illustrated in [Figure 5-4](#9781484215012_Ch05.xhtml#Fig4); an abstract diagram
    of this layout is presented in [Figure 5-5](#9781484215012_Ch05.xhtml#Fig5).


    ![9781484215012_Fig05-05.jpg](OEBPS/Images/9781484215012_Fig05-05.jpg)


    [Figure 5-5](#9781484215012_Ch05.xhtml#_Fig5). Abstract diagram of the new user-interface
    layout, including control elements'
  trans: "\n这些对象需要两个参数才能初始化。首先，你需要提供一个**死区半径**的值——即摇杆必须被拖动的**最小距离**（以像素为单位），才能触发任何变化。这在玩家希望将手指放在触摸板上且角色保持静止时非常有用。如果没有死区设置，控件会过于灵敏，无法实现这一效果。普通玩家不太可能拥有像素级精准的手指定位能力来让摇杆完全居中，结果会导致被控制的角色出现不必要的（且可能让玩家沮丧的）漂移。\n\
    \n其次，Touchpad 对象中使用的图像存储在 `TouchpadStyle` 对象中，该对象包含两个图像，均以 `Drawable` 对象的形式存储，这是\
    \ LibGDX 中 UI 元素的标准做法。像往常一样，你需要将每个图像加载到 `Texture` 对象中，并使用游戏的 `Skin` 对象将其转换为 `Drawable`。由于你的游戏中只有一个屏幕使用此样式，因此你不会像处理其他样式数据对象那样，在继承\
    \ `BaseGame` 的类中初始化该样式。\n\n要开始这个项目，首先复制一份 `CheesePleaseUpdate` 项目目录，并将其重命名为 `CheesePleaseTouchscreen`。你还需要从本章源代码目录中复制一些图像：从\
    \ `CheesePleaseTouchscreen/assets` 中，将所有图像复制到你本地项目的 `assets` 目录中。\n\n在 `GameScreen`\
    \ 类中，你首先添加导入语句：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.ui.Touchpad;\n\
    import com.badlogic.gdx.scenes.scene2d.ui.Touchpad.TouchpadStyle;\nimport com.badlogic.gdx.scenes.scene2d.ui.Button.ButtonStyle;\n\
    import com.badlogic.gdx.scenes.scene2d.InputListener;\nimport com.badlogic.gdx.scenes.scene2d.InputEvent;\n\
    ```\n\n你需要在 `GameScreen` 类中包含以下代码来声明 `Touchpad` 对象，以便 `create` 和 `update` 方法都能访问它：\n\
    \n```\nprivate Touchpad touchPad;\n```\n\n接下来，在 `create` 方法中，你使用以下代码来初始化 `Touchpad`\
    \ 对象及其对应的 `TouchpadStyle`。虽然可以为触摸板添加事件监听器来监控和响应其状态变化，但你将改为在 `update` 方法中轮询触摸板的状态。\n\
    \n```\nTouchpadStyle touchStyle = new TouchpadStyle();\n\nTexture padKnobTex =\
    \ new Texture(Gdx.files.internal(\"assets/joystick-knob.png\"));\ngame.skin.add(\"\
    padKnobImage\", padKnobTex );\ntouchStyle.knob = game.skin.getDrawable(\"padKnobImage\"\
    );\n\nTexture padBackTex = new Texture(Gdx.files.internal(\"assets/joystick-bg.png\"\
    ));\ngame.skin.add(\"padBackImage\", padBackTex );\ntouchStyle.background = game.skin.getDrawable(\"\
    padBackImage\");\n\ntouchPad = new Touchpad(5, touchStyle);\n```\n\n在 `update`\
    \ 方法中，你可以使用 `Touchpad` 对象的 `getKnobPercentX` 和 `getKnobPercentY` 方法来确定摇杆的当前位置。返回值的范围是\
    \ -1 到 +1；你可以将这些值乘以角色所需的最大加速度，这将让玩家对速度有极大的控制：摇杆离触摸板中心越远，角色的速度就越快。你需要用以下代码替换轮询键盘方向键状态并设置\
    \ Mousey 加速度的代码：\n\n```\nfloat accelerate = 100;\nmousey.setAccelerationXY(\n\
    \    touchPad.getKnobPercentX() * accelerate, touchPad.getKnobPercentY() * accelerate\
    \ );\n```\n\n为了完整性，下面给出了用于创建游戏截图 图 5-4 中显示的暂停按钮的代码；此代码应包含在 `create` 方法中。在这种情况下，由于暂停游戏是一个离散操作，因此为\
    \ `Button` 对象附加了一个事件监听器。\n\n```\nTexture pauseTexture = new Texture(Gdx.files.internal(\"\
    assets/pause.png\"));\ngame.skin.add(\"pauseImage\", pauseTexture );\nButtonStyle\
    \ pauseStyle = new ButtonStyle();\npauseStyle.up = game.skin.getDrawable(\"pauseImage\"\
    );\n\nButton pauseButton = new Button( pauseStyle );\n\npauseButton.addListener(\n\
    \    new InputListener()\n    {\n        public boolean touchDown (InputEvent\
    \ event, float x, float y, int pointer, int button)\n        {\n            togglePaused();\n\
    \            return true;\n        }\n    });\n```\n\n有了这些元素，你就可以将注意力集中在创建 图 5-4\
    \ 所示的用户界面布局上了。\n\n**重新设计用户界面**\n\n正如我们在讨论触摸屏控件时开头提到的，你必须处理控件元素遮挡用户游戏世界视野的问题；我们选择将控件显示在屏幕底部，并在其上方渲染游戏世界。\n\
    \n首先，你需要在 `Launcher` 类中设置配置选项，使窗口宽度为 600，高度为 800；`main` 函数变为如下形式：\n\n```\npublic\
    \ static void main (String[] args)\n{\n    LwjglApplicationConfiguration config\
    \ = new LwjglApplicationConfiguration();\n    config.width = 600;\n    config.height\
    \ = 800;\n    config.title = \"Cheese, Please!\";\n\nCheeseGame myProgram = new\
    \ CheeseGame();\n    LwjglApplication launcher = new LwjglApplication( myProgram,\
    \ config );\n}\n```\n\n接下来，你需要对 `BaseScreen` 类进行一些修改。用户界面仍将填满整个窗口，但游戏世界（`mainStage`\
    \ 的内容）将渲染在该窗口的上部区域，如 图 5-4 所示。因此，你将 `mainStage` 的尺寸改为 600 x 600 像素，稍后你将看到如何在不同的位置渲染\
    \ `mainStage`。常量 `viewWidth` 和 `viewHeight` 现在将专门指代 `mainStage` 的尺寸，并且你将声明常量 `uiWidth`\
    \ 和 `uiHeight` 来存储 `uiStage` 的尺寸。\n\n`BaseScreen` 类中的变量声明现在应如下所示：\n\n```\npublic\
    \ final int viewWidth  = 600;\npublic final int viewHeight = 600;\npublic final\
    \ int uiWidth    = 600;\npublic final int uiHeight   = 800;\n```\n\n在构造函数方法中，`mainStage`\
    \ 的初始化保持不变，但初始化 `uiStage` 的代码行应更改为以下内容：\n\n```\nuiStage = new Stage( new FitViewport(uiWidth,\
    \ uiHeight) );\n```\n\n在 `render` 方法中，你可以在调用每个阶段的 `draw` 方法之前，使用 `Gdx.gl` 对象的\
    \ `glViewport` 方法来更改每个阶段的渲染位置。`glViewport` 的参数定义了阶段应渲染的矩形区域：左下角的 x 和 y 坐标，后跟矩形的宽度和高度。在下面的代码清单中，需要添加的代码（用于按前述方式调整渲染位置）以粗体显示：\n\
    \n```\nGdx.gl.glViewport(0, uiHeight-viewHeight, viewWidth, viewHeight );\nmainStage.draw();\n\
    Gdx.gl.glViewport(0,0, uiWidth,uiHeight);\nuiStage.draw();\n```\n\n一般来说，建议谨慎使用\
    \ `glViewport` 方法，因为它会更改渲染参数，但不会更改事件监听器生成的触摸事件的坐标。这就是为什么 `uiStage` 保持与窗口相同的大小。否则，调用\
    \ `glViewport` 可能会导致控件绘制位置与控件激活位置不匹配。\n\n接下来，你规划了包含屏幕控件的 `uiTable` 的新布局，如 图 5-4\
    \ 所示；该布局的抽象图如 图 5-5 所示。\n\n![9781484215012_Fig05-05.jpg](img/9781484215012_Fig05-05.jpg)\n\
    \n图 5-5. 包含控件元素的新用户界面布局抽象图\n"
- fmt: "# The contents of [Figure 5-5](#9781484215012_Ch05.xhtml#Fig5) are as follows:\n\
    \n* Cell `a` contains a right-aligned label displaying the time elapsed.\n* Cell\
    \ `b` contains the You Win image (separated by 50 pixels of padding in between),\
    \ as in the previous version of this game.\n* Cell `c` is empty and set to expand\
    \ in the `y` direction to fill any available space, to ensure that cell `d` will\
    \ be positioned at the bottom of the screen.\n* Cell `d` has a fixed size of 200\
    \ by 600 pixels, and contains another `Table`, which in turn contains the onscreen\
    \ touch controls; the `Table` in cell `d` is padded by 25 pixels all around, has\
    \ a background image that is repeated (or *tiled*) to fill the available space,\
    \ and contains three cells in a single row: `e`, `f`, and `g`.\n* Cell `e` contains\
    \ the `touchPad` object.\n* Cell `f` is empty and set to expand in the `x` direction\
    \ to fill any available space, so that cell `e` is closer to the left side of\
    \ the screen, and cell `g` is closer to the right side.\n* Cell `g` contains the\
    \ `Button` used to pause the game.\n\nBefore you implement this layout, you must\
    \ remove the code for the previous version of the UI. In particular, *delete*\
    \ the following lines from the `create` method:\n\n```\nuiTable.pad(10);\nuiTable.add().expandX();\n\
    uiTable.add(timeLabel);\nuiTable.row();\nuiTable.add(winImage).colspan(2).padTop(50);\n\
    uiTable.row();\nuiTable.add().colspan(2).expandY();\n```\n\nIn its place, you\
    \ add the following code, which uses the previously created `touchpad` and `pauseButton`\
    \ elements and implements the table layout as described:\n\n```\nuiTable.add(timeLabel).right().pad(10);\n\
    uiTable.row();\nuiTable.add(winImage).padTop(50);\nuiTable.row();\nuiTable.add().expandY();\n\
    uiTable.row();\n\nTable controlTable = new Table();\ncontrolTable.pad(25);\nTexture\
    \ controlTex = new Texture(Gdx.files.internal(\"assets/pixels-white.png\"), true);\n\
    game.skin.add( \"controlTex\", controlTex );\ncontrolTable.background( game.skin.getTiledDrawable(\"\
    controlTex\") );\ncontrolTable.add(touchPad);\ncontrolTable.add().expandX();\n\
    controlTable.add(pauseButton);\n\nuiTable.add(controlTable).width(600).height(200);\n\
    ```\n\nWith this code, the Cheese, Please! game should now render as illustrated\
    \ in [Figure 5-4](#9781484215012_Ch05.xhtml#Fig4). The source code that incorporates\
    \ all of these changes is contained within the `CheesePleaseTouchscreen` directory.\
    \ The touch-screen controls are best experienced when the program is run on a\
    \ touch-screen device, such as a tablet running the Android OS; this topic is\
    \ discussed briefly in [Chapter 9](#9781484215012_Ch09.xhtml).\n\n## Summary\n\
    \nIn this chapter, you added two new ways for the player to interact with your\
    \ game. First, you added gamepad controller support to the base game by using\
    \ the controller extensions for the LibGDX libraries. This required the inclusion\
    \ of some new JAR files in your project, as well as a class dedicated to storing\
    \ the values corresponding to each of the joysticks, buttons, directional pads,\
    \ and triggers on your particular gamepad. You learned how to poll for continuous\
    \ input, as well as how to set up event listeners to monitor for discrete input.\
    \ Afterward, you saw how to add touch-screen support to the base game, using `Touchpad`\
    \ and `Button` objects. This chapter discussed at length the design issues that\
    \ arise when adding onscreen controls, and showed one way to alleviate these issues,\
    \ by repositioning the rendering locations of the stages using the `glViewport`\
    \ method. With these new techniques at your disposal, you will be able to greatly\
    \ improve the gameplay experience for your players.\n\n___________________\n\n\
    [¹](#9781484215012_Ch05.xhtml#_Fn1)The control element typically referred to as\
    \ a directional pad was referred to as a *point-of-view* control in traditional\
    \ flight simulators, which explains the use of the POV acronym in the LibGDX source\
    \ code.\n\n# CHAPTER 6\n\n![image](OEBPS/Images/frontdot.jpg)\n\n## Additional\
    \ Game Case Studies\n\nThis chapter introduces a series of games and focuses on\
    \ how to implement a variety of game mechanics. Each of the examples is playable,\
    \ but certainly not a polished product—for example, none has a Start menu or a\
    \ user interface, and we won’t implement win or lose conditions (these are left\
    \ for the you to implement as recommended “Next Steps” at the end of each section).\
    \ Nonetheless, the techniques covered should prove to be useful for many situations.\n\
    \nFor each of the new games that is presented, you should begin by creating a\
    \ new project in BlueJ. In each project, you should copy over the classes `BaseGame`,\
    \ `BaseScreen`, `BaseActor`, `AnimatedActor`, and `PhysicsActor`. In the `BaseScreen`\
    \ class, you should change the values of `viewWidth` and `viewHeight` to 800 and\
    \ 600, respectively, as the games in this chapter require a larger window. You\
    \ should also create a launcher-style class and a class that extends `BaseGame`,\
    \ as in earlier projects. In each section, you will write a class called `GameScreen`\
    \ that is initialized by the customized `BaseGame`-extending class of each project.\n\
    \n## Space Rocks\n\nThis section introduces a game called *Space Rocks*, a space-themed\
    \ shoot-’em-up game inspired by the classic arcade game Asteroids. The user controls\
    \ a spaceship; the goal is to shoot lasers to destroy all the rocks floating around\
    \ the screen. [Figure 6-1](#9781484215012_Ch06.xhtml#Fig1) shows this game in\
    \ action.\n\n![9781484215012_Fig06-01.jpg](OEBPS/Images/9781484215012_Fig06-01.jpg)\n\
    \n[Figure 6-1](#9781484215012_Ch06.xhtml#_Fig1). The Space Rocks game\n\nThe spaceship\
    \ steers much like the turtle from the Starfish Collector game: it can rotate\
    \ left and right, and move forward in whatever direction it is facing. The new\
    \ mechanics and topics introduced with this game include the following:\n\n* Creating\
    \ a template instance of an object to be used as a basis for spawning later\n\
    * Using new methods for the `BaseActor` class to simplify centering objects\n\
    * Updating the `BaseActor` class so that groups of objects can move together\n\
    * Maintaining multiple lists of actor objects\n* Using a new method to wrap the\
    \ position of an actor around the screen (an object that moves past one edge of\
    \ the screen reappears on the opposite side)\n\nAfter creating a new project and\
    \ including the classes as described at the beginning of this chapter, you should\
    \ copy all the images from this chapter’s source directory `SpaceRocks/assets`\
    \ into your local project’s `assets` folder. You then create the core of the `GameScreen`\
    \ class, including the import statements and variable and method declarations\
