- fmt: "When this step is finished, click the **Save** button and save your file to\
    \ your local `Starscape/assets` directory using the file name `thruster.pfx`.\
    \ Although the particle effect data is stored in a text file, you will use the\
    \ extension `pfx` as a mnemonic to indicate the type of data in the file. In addition,\
    \ you will need to copy the image file `particle.png` from the **Particle Editor**\
    \ directory to your local project’s `assets` directory as well.\n\n## Explosion\
    \ Effect\n\nA classic effect that you will now create is an explosion effect,\
    \ as illustrated in [Figure 7-6](#9781484215012_Ch07.xhtml#Fig6). This effect\
    \ is composed of two emitters, one controlling the fire that appears initially,\
    \ and the other controlling the smoke that appears afterward.\n\n![9781484215012_Fig07-06.jpg](OEBPS/Images/9781484215012_Fig07-06.jpg)\n\
    \n[Figure 7-6](#9781484215012_Ch07.xhtml#_Fig6). The explosion particle effect\n\
    \nRestart the **Particle Editor**. As before, create a new emitter. Name it `fire`,\
    \ and then delete the default emitter. You’ll keep the default option settings:\
    \ the **Additive** check box should be selected, and the **Continuous** check\
    \ box should not.\n\nAdjust the **Count** property **Max** value to `100`. Change\
    \ the **Duration** value to `250`. To attain the maximum number of particles,\
    \ change the **Emission** property **High** value to `400`. Set the **Size** property\
    \ **High** value to range from `0` to `100`, and modify the graph so that it resembles\
    \ the **Gradual Decrease** graph. Set the **Velocity** property to **Active**,\
    \ set its **High** value to range from `0` to `160`, and modify its graph so that\
    \ it resembles the **Sudden Decrease** graph. Set the **Angle** property to **Active**,\
    \ and set its **High** value to range from `0` to `360`. Finally, set the **Tint**\
    \ property so that the color changes from red to orange over the course of the\
    \ particle lifetime.\n\nAt this point, the preview panel should be displaying\
    \ the following effect repeatedly: a globule shape appears, red at the borders\
    \ and yellow in the center, which then expels fragments that shrink as they move\
    \ away from the center.\n\nOnce you are pleased with this effect, create another\
    \ emitter and name it `smoke`. (Do *not* delete the `fire` emitter!) Select the\
    \ `smoke` emitter from the list, and click the **Up** button; this moves it higher\
    \ up in the rendering order. This is important, because you want the smoke particles\
    \ to appear behind the fire particles, and so the smoke particles must be rendered\
    \ first. Before continuing, make sure that in the emitter list, the `smoke` emitter\
    \ is both selected (so it is visible) and highlighted (so that the parameters\
    \ that will be changed are those of the `smoke` emitter).\n\nNow you’ll change\
    \ the `smoke` emitter properties. Set the **Count Max** value to `20`, the **Duration**\
    \ value to `200`, and the **Emission High** value to `100`. Set the **Delay**\
    \ property to **Active**, and set its value to `400`; this will cause the `smoke`\
    \ emitter to begin `400` milliseconds after the `fire` emitter has started. Next,\
    \ change the **Size High** value to `64`. Activate the **Velocity** property,\
    \ set the **High** value to `100`, and modify the graph so that it is gradually\
    \ decreasing. Also activate the **Angle** property, and set the **High** value\
    \ to range from `0` to `360`. Change the **Tint** color to a medium shade of gray,\
    \ by dragging the knob on the lower-left color slider all the way to the right,\
    \ and then dragging the knob on the lower-right color slider to the middle. Modify\
    \ the **Transparency** graph so that it is slowly decreasing. Last of all, uncheck\
    \ the **Additive** option.\n\nThis completes the explosion effect! Save your file\
    \ to the `Starscape/assets` directory with the file name `explosion.pfx`.\n\n\
    ## The ParticleActor Class\n\nAt this point, you are ready to begin writing code\
    \ for the **Starscape** project. First, from your most recent project, copy the\
    \ usual classes: `BaseGame`, `BaseScreen`, `BaseActor`, `AnimatedActor`, `PhysicsActor`,\
    \ and `GameUtils`. You should create a launcher-style class and a class that extends\
    \ `BaseGame`, and you will need to copy the images from this chapter’s source\
    \ directory `Starscape/assets` into your local project’s `assets` folder.\n\n\
    To integrate particle effects into your projects, you will once again create an\
    \ extension of the `Actor` class, called `ParticleActor`. This class stores a\
    \ `ParticleEffect` object, which is used to update and draw the effect. Most of\
    \ the methods in this class simply activate the methods of the corresponding `ParticleEffect`\
    \ object, with somewhat more intuitive names. The `update` and `draw` methods\
    \ of the `ParticleEffect` will be activated by the standard `act` and `draw` methods\
    \ common to all `Actor` objects, and a `clone` method will be included for convenience.\
    \ The code for the `ParticleActor` class is as follows:\n\n```java\nimport com.badlogic.gdx.Gdx;\n\
    import com.badlogic.gdx.scenes.scene2d.Actor;\nimport com.badlogic.gdx.graphics.g2d.Batch;\n\
    import com.badlogic.gdx.graphics.g2d.ParticleEffect;\nimport com.badlogic.gdx.graphics.g2d.ParticleEmitter;\n\
    \npublic class ParticleActor extends Actor\n{\n    private ParticleEffect pe;\n\
    \n    public ParticleActor()\n    {\n        super();\n        pe = new ParticleEffect();\n\
    \    }\n\n    public void load(String pfxFile, String imageDirectory)\n    { \
    \ pe.load(Gdx.files.internal(pfxFile), Gdx.files.internal(imageDirectory));  }\n\
    \n    public void start()\n    {  pe.start();  }\n\n    // pauses continuous emitters\n\
    \    public void stop()\n    {  pe.allowCompletion();  }\n\n    public boolean\
    \ isRunning()\n    {  return !pe.isComplete();  }\n\n    public void setPosition(float\
    \ px, float py)\n    {\n        for (ParticleEmitter e : pe.getEmitters() )\n\
    \            e.setPosition(px, py);\n    }\n\n    public void act(float dt)\n\
    \    {\n        super.act( dt );\n        pe.update( dt );\n        if ( pe.isComplete()\
    \ && !pe.getEmitters().first().isContinuous() )\n        {\n            pe.dispose();\n\
    \            this.remove();\n        }\n    }\n\n    public void draw(Batch batch,\
    \ float parentAlpha)\n    {   pe.draw(batch);  }\n\n    public ParticleActor clone()\n\
    \    {\n        ParticleActor newbie = new ParticleActor();\n        newbie.pe\
    \ = new ParticleEffect(this.pe);\n        return newbie;\n    }\n}\n```\n\nWith\
    \ this class ready for action, you can use it, together with the particle effects\
    \ you recently generated, in a demo program called **Starscape**.\n\n## Starscape:\
    \ An Interactive Visual Demo\n\n*Starscape*, which appears visually similar to\
    \ the game **Space Rocks**, is more accurately classified as a demo than a fully\
    \ functional game. In this demo, the player controls a spaceship as in the **Space\
    \ Rocks** game: the left and right arrow keys rotate the spaceship, and the up\
    \ arrow key accelerates the spaceship forward. While the up arrow key is pressed,\
    \ the thruster particle effect is visible. However, pressing the space key in\
    \ this demo doesn’t shoot lasers as it did in **Space Rocks**; instead, it generates\
    \ an explosion effect at a random location on the screen. [Figure 7-7](#9781484215012_Ch07.xhtml#Fig7)\
    \ contains a screenshot of this demo.\n\n![9781484215012_Fig07-07.jpg](OEBPS/Images/9781484215012_Fig07-07.jpg)\n\
    \n[Figure 7-7](#9781484215012_Ch07.xhtml#_Fig7). The demo Starscape\n\nNext, you\
    \ will include the code for the `GameScreen` class, which carries out the tasks\
    \ previously described. The only tricky part of this code pertains to rotating\
    \ and scaling a `ParticleActor`, which is necessary to align and resize the thruster\
    \ effect before attaching it to the spaceship object. Unfortunately, the `draw`\
    \ method of a `ParticleEffect` does not have this functionality. To remedy this\
    \ situation, you’ll create an auxiliary `BaseActor` object named `thrusterAdjuster`,\
    \ add the thruster effect to it, and make the necessary adjustments to `thrusterAdjuster`.\
    \ Since the auxiliary object should not be visible, its texture will be an image\
    \ consisting of a single transparent pixel, from the image file `blank.png`.\n\
    \n```java\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\n\
    import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.Texture.TextureFilter;\n\
    import com.badlogic.gdx.math.MathUtils;\nimport java.util.ArrayList;\n```"
  raw: 'When this step is finished, click the Save button and save your file to your
    local Starscape/assets directory using the file name thruster.pfx. Although the
    particle effect data is stored in a text file, you will use the extension pfx
    as a mnemonic to indicate the type of data in the file. In addition, you will
    need to copy the image file particle.png from the Particle Editor directory to
    your local project’s assets directory as well.


    Explosion Effect


    A classic effect that you will now create is an explosion effect, as illustrated
    in [Figure 7-6](#9781484215012_Ch07.xhtml#Fig6). This effect is composed of two
    emitters, one controlling the fire that appears initially, and the other controlling
    the smoke that appears afterward.


    ![9781484215012_Fig07-06.jpg](OEBPS/Images/9781484215012_Fig07-06.jpg)


    [Figure 7-6](#9781484215012_Ch07.xhtml#_Fig6). The explosion particle effect


    Restart the Particle Editor. As before, create a new emitter. Name it **fire**,
    and then delete the default emitter. You’ll keep the default option settings:
    the Additive check box should be selected, and the Continuous check box should
    not.


    Adjust the Count property Max value to 100\. Change the Duration value to 250\.
    To attain the maximum number of particles, change the Emission property High value
    to 400\. Set the Size property High value to range from 0 to 100, and modify the
    graph so that it resemble the Gradual Decrease graph. Set the Velocity property
    to Active, set its High value to range from 0 to 160, and modify its graph so
    that it resembles the Sudden Decrease graph. Set the Angle property to Active,
    and set its High value to range from 0 to 360\. Finally, set the Tint property
    so that the color changes from red to orange over the course of the particle lifetime.


    At this point, the preview panel should be displaying the following effect repeatedly:
    a globule shape appears, red at the borders and yellow in the center, which then
    expels fragments that shrink as they move away from the center.


    Once you are pleased with this effect, create another emitter and name it **smoke**.
    (Do *not* delete the fire emitter!) Select the smoke emitter from the list, and
    click the Up button; this moves it higher up in the rendering order. This is important,
    because you want the smoke particles to appear behind the fire particles, and
    so the smoke particles must be rendered first. Before continuing, make sure that
    in the emitter list, the smoke emitter is both selected (so it is visible) and
    highlighted (so that the parameters that will be changed are those of the smoke
    emitter).


    Now you’ll change the smoke emitter properties. Set the Count Max value to 20,
    the Duration value to 200, and the Emission High value to 100\. Set the Delay
    property to Active, and set its value to 400; this will cause the smoke emitter
    to begin 400 milliseconds after the fire emitter has started. Next, change the
    Size High value to 64\. Activate the Velocity property, set the High value to
    100, and modify the graph so that it is gradually decreasing. Also activate the
    Angle property, and set the High value to range from 0 to 360\. Change the Tint
    color to a medium shade of gray, by dragging the knob on the lower-left color
    slider all the way to the right, and then dragging the knob on the lower-right
    color slider to the middle. Modify the Transparency graph so that it is slowly
    decreasing. Last of all, uncheck the Additive option.


    This completes the explosion effect! Save your file to the Starscape/assets directory
    with the file name explosion.pfx.


    The ParticleActor Class


    At this point, you are ready to begin writing code for the Starscape project.
    First, from your most recent project, copy the usual classes: BaseGame, BaseScreen,
    BaseActor, AnimatedActor, PhysicsActor, and GameUtils. You should create a launcher-style
    class and a class that extends BaseGame, and you will need to copy the images
    from this chapter’s source directory Starscape/assets into your local project’s
    assets folder.


    To integrate particle effects into your projects, you will once again create an
    extension of the Actor class, called ParticleActor. This class stores a ParticleEffect
    object, which is used to update and draw the effect. Most of the methods in this
    class simply activate the methods of the corresponding ParticleEffect object,
    with somewhat more intuitive names. The update and draw methods of the ParticleEffect
    will be activated by the standard act and draw methods common to all Actor objects,
    and a clone method will be included for convenience. The code for the ParticleActor
    class is as follows:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.graphics.g2d.Batch;

    import com.badlogic.gdx.graphics.g2d.ParticleEffect;

    import com.badlogic.gdx.graphics.g2d.ParticleEmitter;


    public class ParticleActor extends Actor

    {

        private ParticleEffect pe;


    public ParticleActor()

        {

            super();

            pe = new ParticleEffect();

        }


    public void load(String pfxFile, String imageDirectory)

        {  pe.load(Gdx.files.internal(pfxFile), Gdx.files.internal(imageDirectory));  }


    public void start()

        {  pe.start();  }


    // pauses continuous emitters

        public void stop()

        {  pe.allowCompletion();  }


    public boolean isRunning()

        {  return !pe.isComplete();  }

