    In this program, you will encounter the minor difficulty that, while the ModelBuilder
    class can easily create a spherical mesh, any materials applied to it are displayed
    only from the outside, rather than the inside (which is where your camera and
    game entities will be). Fortunately, you can perform a geometric trick to resolve
    this problem: after creating the model, you will scale the mesh by –1 in the z
    direction; this will cause the sphere to turn itself “inside-out,” reversing the
    sides on which the image will be displayed. Since this process could be useful
    in many future projects, you’ll encapsulate this process of creating and inverting
    a sphere in a method called createSphereInv in the ModelUtils class. Here is the
    code to accomplish this:


    ```

    public static ModelInstance createSphereInv( float r, Texture t, Color c )

    {

        Material sphereMaterial = new Material();

        if (t != null)

            sphereMaterial.set( TextureAttribute.createDiffuse(t) );

        if (c != null)

            sphereMaterial.set( ColorAttribute.createDiffuse(c) );

        int usageCode = Usage.Position + Usage.ColorPacked

                      + Usage.Normal + Usage.TextureCoordinates;


    Model sphereModel = modelBuilder.createSphere(r,r,r, 32,32, sphereMaterial, usageCode);


    for (Mesh m : sphereModel.meshes)

            m.scale(1,1,-1) ;


    Vector3 position = new Vector3(0,0,0);


    ModelInstance sphere = new ModelInstance(sphereModel, position);

        return sphere;

    }

    ```


    The third and final concept to discuss before moving onto the main game code is
    collision detection. To keep the level of complexity manageable, the motion and
    placement of your three-dimensional objects will be restricted to a two-dimensional
    plane, thus allowing this project to reuse collision code from the original BaseActor
    class. This technique is well-known in game development. Games that use this approach
    (those which have 3D graphics but restrict game play to a 2D plane and have restricted
    camera movement) are called *2.5D games*. [Figure 8-10](#9781484215012_Ch08.xhtml#Fig10)
    illustrates how the game will appear to the player, while on the right you can
    see the collision polygons that will correspond to the pictured game entities
    (the two rocks and the pirate ship).


