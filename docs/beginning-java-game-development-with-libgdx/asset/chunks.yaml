- fmt: 'This is all the functionality you’ll need for the `Stage3D` class. You’re
    now ready to move on to using these classes to create your first interactive 3D
    demo.


    ## Creating an Interactive 3D Demo


    This section presents an interactive demo inspired by [Figure 8-1](#9781484215012_Ch08.xhtml#Fig1).
    This demo consists of a screenshot of the Starfish Collector game on a flattened
    box shape, and cubes with colored crate textures to represent the origin of the
    scene and the directions of the x, y, and z axes. You will include a cube textured
    with six images that the user can turn and move in any direction. Last of all,
    you will enable the user to turn, tilt, and move the camera in any direction.
    [Figure 8-7](#9781484215012_Ch08.xhtml#Fig7) shows this demo in action.


    ![9781484215012_Fig08-07.jpg](OEBPS/Images/9781484215012_Fig08-07.jpg)


    [Figure 8-7](#9781484215012_Ch08.xhtml#_Fig7). An interactive 3D demo


    Continuing with the `Project3D` project, add the most recent versions of the `BaseGame`
    and `BaseScreen` classes; the `BaseGame` class you’ll be able to use without modification,
    while the `BaseScreen` class will require a few changes to incorporate the `Stage3D`
    class in place of one of its `Stage` objects. You’ll also need a launcher-style
    class, and a class extending the `BaseGame` class, as you’ve had in previous chapters;
    feel free to copy any of these and modify their contents as needed. In addition,
    copy all the files from this chapter’s source code assets directory to your project’s
    local assets directory. (Although some of these files will not be needed until
    the project following this one, it is convenient to copy them all over at the
    same time.)


    Recall that in our minimal 3D rendering example at the beginning of this chapter,
    you created the box shape by using the `ModelBuilder` class. In this example,
    you will repeatedly need to create cubes with textures attached. To avoid writing
    redundant code and to simplify the process of creating materials (containing both
    textures and colors) and applying them to models, you’ll create a utility class
    called `ModelUtils` that includes static helper functions. This is similar in
    spirit to the `GameUtils` class from previous projects, except that instead of
    `Animation`-creating methods, it will be devoted to `ModelInstance`-creating methods.
    The first part of the new `ModelUtils` class is provided next. The `createBox`
    method contains code similar to that used to create a box in the minimal example
    presented at the beginning of this chapter. The main difference is that the `Material`
    created for the model instance in this method may also contain a `Texture`. However,
    either the `Texture` or `Color` parameters may be passed in as `null`, in which
    case the corresponding attribute will not be added to the material.


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.VertexAttributes.Usage;

    import com.badlogic.gdx.graphics.g3d.Model;

    import com.badlogic.gdx.graphics.g3d.ModelBatch;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;

    import com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;

    import com.badlogic.gdx.graphics.g3d.attributes.TextureAttribute;

    import com.badlogic.gdx.graphics.g3d.Material;

    import com.badlogic.gdx.graphics.g3d.utils.ModelBuilder;

    import com.badlogic.gdx.graphics.g3d.utils.MeshBuilder;

    import com.badlogic.gdx.graphics.g3d.utils.MeshPartBuilder;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Mesh;

    import com.badlogic.gdx.math.Matrix4;

    import com.badlogic.gdx.math.Vector3;

    import com.badlogic.gdx.math.Quaternion;


    public class ModelUtils

    {

        public static ModelBuilder modelBuilder = new ModelBuilder();


    public static ModelInstance createBox( float xSize, float ySize, float zSize,

                Texture t, Color c )

        {

            Material boxMaterial = new Material();

            if (t != null)

                boxMaterial.set( TextureAttribute.createDiffuse(t) );

            if (c != null)

                boxMaterial.set( ColorAttribute.createDiffuse(c) );


    int usageCode = Usage.Position + Usage.ColorPacked

                          + Usage.Normal + Usage.TextureCoordinates;


    Model boxModel = modelBuilder.createBox(xSize, ySize, zSize, boxMaterial, usageCode);

            Vector3 position = new Vector3(0,0,0);


    ModelInstance box = new ModelInstance(boxModel, position);

            return box;

        }

    }

    ```


    This demo also contain a unit cube that can be moved by the user. To make it simpler
    to see how the cube is oriented (which side is the front, which side is the back,
    and so forth) it would be convenient to be able to apply a different texture to
    each side. However, there is no method in the `ModelBuilder` class to automate
    such a construction. Writing such a method is a long and complicated process,
    as you need to specify coordinates for the vertices to create six separate square
    meshes, determine normal vectors for lighting purposes, assign a texture to each
    of the squares, and combine these six meshes into a single mesh for a single model.
    A method called `createCubeTexture6` provided in the chapter’s source code for
    the `ModelUtils` class accomplishes this task, but as this method is rather long,
    technical, and unnecessary for the functionality of this demo (it simply provides
    a different appearance for the cube), I will not include the code or any further
    discussion of this method here. When creating the user-controlled cube, you may
    choose whether to use the `createBox` or `createCubeTexture6` method to generate
    the model instance used for this object; if you choose the latter option, you
    may copy this method from the source code as described previously.


    The final change you need to make to this framework involves incorporating the
    `Stage3D` class into the `BaseScreen` class. Begin by removing all lines of code
    that involve the `Stage` object `mainStage`, except for the line involving the
    input multiplexer, from which only the `mainStage` parameter needs to be removed.
    (You can keep `uiStage`, because even three-dimensional games typically have two-dimensional
    user interfaces.) Then add a new variable declaration to the class:


    ```

    protected Stage3D mainStage3D;

    ```


    Next, in the constructor method, you need to initialize this variable with the
    following line:


    ```

    mainStage3D = new Stage3D();

    ```


    The greatest number of changes occur in the `render` method. You must insert code
    to call the `act` and `draw` methods of `mainStage3D` (just as you previously
    did for `mainStage`). In addition, the depth buffer must be cleared in the `glClear`
    method, and the rendering area for `mainStage3D` must be set by using the `glViewport`
    method (since a `Viewport` object will not be incorporated into the `Stage3D`
    object to manage this task). The final form of the `render` method is as follows:


    ```

    public void render(float dt)

    {

        uiStage.act(dt);


    if ( !isPaused() )

        {

            update(dt);

            mainStage3D.act(dt);

        }


    Gdx.gl.glClearColor(0.5f,0.5f,0.5f,1);

        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT + GL20.GL_DEPTH_BUFFER_BIT);

        Gdx.gl.glViewport(0, 0, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());


    mainStage3D.draw();

        uiStage.draw();

    }

    ```


    Finally, you’re ready to write a class to run your interactive 3D demo, which
    you will call `DemoScreen`. You begin by writing the core of the class, as usual:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;


    public class DemoScreen extends BaseScreen

    {

        BaseActor3D player;


    public DemoScreen(BaseGame g)

        {  super(g);  }


    public void create()

        {    }

    ```'
  raw: 'This is all the functionality you’ll need for the Stage3D class. You’re now
    ready to move on to using these classes to create your first interactive 3D demo.


    Creating an Interactive 3D Demo


    This section presents an interactive demo inspired by [Figure 8-1](#9781484215012_Ch08.xhtml#Fig1).
    This demo consists of a screenshot of the Starfish Collector game on a flattened
    box shape, and cubes with colored crate textures to represent the origin of the
    scene and the directions of the x, y, and z axes. You will include a cube textured
    with six images that the user can turn and move in any direction. Last of all,
    you will enable the user to turn, tilt, and move the camera in any direction.
    [Figure 8-7](#9781484215012_Ch08.xhtml#Fig7) shows this demo in action.


    ![9781484215012_Fig08-07.jpg](OEBPS/Images/9781484215012_Fig08-07.jpg)


    [Figure 8-7](#9781484215012_Ch08.xhtml#_Fig7). An interactive 3D demo


    Continuing with the Project3D project, add the most recent versions of the BaseGame
    and BaseScreen classes; the BaseGame class you’ll be able to use without modification,
    while the BaseScreen class will require a few changes to incorporate the Stage3D
    class in place of one of its Stage objects. You’ll also need a launcher-style
    class, and a class extending the BaseGame class, as you’ve had in previous chapters;
    feel free to copy any of these and modify their contents as needed. In addition,
    copy all the files from this chapter’s source code assets directory to your project’s
    local assets directory. (Although some of these files will not be needed until
    the project following this one, it is convenient to copy them all over at the
    same time.)


    Recall that in our minimal 3D rendering example at the beginning of this chapter,
    you created the box shape by using the ModelBuilder class. In this example, you
    will repeatedly need to create cubes with textures attached. To avoid writing
    redundant code and to simplify the process of creating materials (containing both
    textures and colors) and applying them to models, you’ll create a utility class
    called ModelUtils that includes static helper functions. This is similar in spirit
    to the GameUtils class from previous projects, except that instead of Animation-creating
    methods, it will be devoted to ModelInstance-creating methods. The first part
    of the new ModelUtils class is provided next. The createBox method contains code
    similar to that used to create a box in the minimal example presented at the beginning
    of this chapter. The main difference is that the Material created for the model
    instance in this method may also contain a Texture. However, either the Texture
    or Color parameters may be passed in as null, in which case the corresponding
    attribute will not be added to the material.


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.VertexAttributes.Usage;

    import com.badlogic.gdx.graphics.g3d.Model;

    import com.badlogic.gdx.graphics.g3d.ModelBatch;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;

    import com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;

    import com.badlogic.gdx.graphics.g3d.attributes.TextureAttribute;

    import com.badlogic.gdx.graphics.g3d.Material;

    import com.badlogic.gdx.graphics.g3d.utils.ModelBuilder;

    import com.badlogic.gdx.graphics.g3d.utils.MeshBuilder;

    import com.badlogic.gdx.graphics.g3d.utils.MeshPartBuilder;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Mesh;

    import com.badlogic.gdx.math.Matrix4;

    import com.badlogic.gdx.math.Vector3;

    import com.badlogic.gdx.math.Quaternion;


    public class ModelUtils

    {

        public static ModelBuilder modelBuilder = new ModelBuilder();


    public static ModelInstance createBox( float xSize, float ySize, float zSize,

                Texture t, Color c )

        {

            Material boxMaterial = new Material();

            if (t != null)

                boxMaterial.set( TextureAttribute.createDiffuse(t) );

            if (c != null)

                boxMaterial.set( ColorAttribute.createDiffuse(c) );


    int usageCode = Usage.Position + Usage.ColorPacked

                          + Usage.Normal + Usage.TextureCoordinates;


    Model boxModel = modelBuilder.createBox(xSize, ySize, zSize, boxMaterial, usageCode);

            Vector3 position = new Vector3(0,0,0);


    ModelInstance box = new ModelInstance(boxModel, position);

            return box;

        }

    }

    ```


    This demo also contain a unit cube that can be moved by the user. To make it simpler
    to see how the cube is oriented (which side is the front, which side is the back,
    and so forth) it would be convenient to be able to apply a different texture to
    each side. However, there is no method in the ModelBuilder class to automate such
    a construction. Writing such a method is a long and complicated process, as you
    need to specify coordinates for the vertices to create six separate square meshes,
    determine normal vectors for lighting purposes, assign a texture to each of the
    squares, and combine these six meshes into a single mesh for a single model. A
    method called createCubeTexture6 provided in the chapter’s source code for the
    ModelUtils class accomplishes this task, but as this method is rather long, technical,
    and unnecessary for the functionality of this demo (it simply provides a different
    appearance for the cube), I will not include the code or any further discussion
    of this method here. When creating the user-controlled cube, you may choose whether
    to use the createBox or createCubeTexture6 method to generate the model instance
    used for this object; if you choose the latter option, you may copy this method
    from the source code as described previously.


    The final change you need to make to this framework involves incorporating the
    Stage3D class into the BaseScreen class. Begin by removing all lines of code that
    involve the Stage object mainStage, except for the line involving the input multiplexer,
    from which only the mainStage parameter needs to be removed. (You can keep uiStage,
    because even three-dimensional games typically have two-dimensional user interfaces.)
    Then add a new variable declaration to the class:


    ```

    protected Stage3D mainStage3D;

    ```


    Next, in the constructor method, you need to initialize this variable with the
    following line:


    ```

    mainStage3D = new Stage3D();

    ```


    The greatest number of changes occur in the render method. You must insert code
    to call the act and draw methods of mainStage3D (just as you previously did for
    mainStage). In addition, the depth buffer must be cleared in the glClear method,
    and the rendering area for mainStage3D must be set by using the glViewport method
    (since a Viewport object will not be incorporated into the Stage3D object to manage
    this task). The final form of the render method is as follows:


    ```

    public void render(float dt)

    {

        uiStage.act(dt);


    if ( !isPaused() )

        {

            update(dt);

            mainStage3D.act(dt);

        }


    Gdx.gl.glClearColor(0.5f,0.5f,0.5f,1);

        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT + GL20.GL_DEPTH_BUFFER_BIT);

        Gdx.gl.glViewport(0, 0, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());


    mainStage3D.draw();

        uiStage.draw();

    }

    ```


    Finally, you’re ready to write a class to run your interactive 3D demo, which
    you will call DemoScreen. You begin by writing the core of the class, as usual:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;


    public class DemoScreen extends BaseScreen

    {

        BaseActor3D player;


    public DemoScreen(BaseGame g)

        {  super(g);  }


    public void create()

        {    }'
  trans: '

    这就是 Stage3D 类所需的全部功能。现在，你可以继续使用这些类来创建你的第一个交互式 3D 演示了。


    创建交互式 3D 演示


    本节将展示一个受图 8-1 启发的交互式演示。该演示包含一个扁平盒子形状上的《海星收集者》游戏截图，以及带有彩色板条箱纹理的立方体，用于表示场景的原点以及
    x、y、z 轴的方向。你还会包含一个贴有六张图片的立方体，用户可以向任意方向旋转和移动它。最后，你将允许用户向任意方向旋转、倾斜和移动摄像机。图 8-7 展示了此演示的运行效果。


    ![9781484215012_Fig08-07.jpg](img/9781484215012_Fig08-07.jpg)


    图 8-7。一个交互式 3D 演示


    继续使用 Project3D 项目，添加最新版本的 BaseGame 和 BaseScreen 类；BaseGame 类无需修改即可使用，而 BaseScreen
    类则需要做一些更改，以引入 Stage3D 类来替换其一个 Stage 对象。你还需要一个启动器风格的类，以及一个继承 BaseGame 的类，就像你在前几章中所做的那样；你可以随意复制这些文件并根据需要修改其内容。此外，将本章源代码
    assets 目录中的所有文件复制到项目的本地 assets 目录中。（虽然其中一些文件在下一个项目之前不会用到，但一次性全部复制过来会更方便。）


    回想一下本章开头的极简 3D 渲染示例，你使用 ModelBuilder 类创建了盒子形状。在这个示例中，你将反复需要创建带有纹理的立方体。为了避免编写冗余代码并简化创建材质（包含纹理和颜色）并将其应用于模型的过程，你将创建一个名为
    ModelUtils 的工具类，其中包含静态辅助函数。这与之前项目中的 GameUtils 类在精神上类似，区别在于它不包含创建动画的方法，而是专注于创建
    ModelInstance 的方法。新的 ModelUtils 类的第一部分如下所示。createBox 方法包含的代码与本章开头极简示例中用于创建盒子的代码类似。主要区别在于，此方法中为模型实例创建的
    Material 可能还包含一个 Texture。但是，Texture 或 Color 参数都可以作为 null 传入，在这种情况下，相应的属性将不会添加到材质中。


    ```

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.VertexAttributes.Usage;

    import com.badlogic.gdx.graphics.g3d.Model;

    import com.badlogic.gdx.graphics.g3d.ModelBatch;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;

    import com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;

    import com.badlogic.gdx.graphics.g3d.attributes.TextureAttribute;

    import com.badlogic.gdx.graphics.g3d.Material;

    import com.badlogic.gdx.graphics.g3d.utils.ModelBuilder;

    import com.badlogic.gdx.graphics.g3d.utils.MeshBuilder;

    import com.badlogic.gdx.graphics.g3d.utils.MeshPartBuilder;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Mesh;

    import com.badlogic.gdx.math.Matrix4;

    import com.badlogic.gdx.math.Vector3;

    import com.badlogic.gdx.math.Quaternion;


    public class ModelUtils

    {

        public static ModelBuilder modelBuilder = new ModelBuilder();


    public static ModelInstance createBox( float xSize, float ySize, float zSize,

                Texture t, Color c )

        {

            Material boxMaterial = new Material();

            if (t != null)

                boxMaterial.set( TextureAttribute.createDiffuse(t) );

            if (c != null)

                boxMaterial.set( ColorAttribute.createDiffuse(c) );


    int usageCode = Usage.Position + Usage.ColorPacked

                          + Usage.Normal + Usage.TextureCoordinates;


    Model boxModel = modelBuilder.createBox(xSize, ySize, zSize, boxMaterial, usageCode);

            Vector3 position = new Vector3(0,0,0);


    ModelInstance box = new ModelInstance(boxModel, position);

            return box;

        }

    }

    ```


    此演示还包含一个可由用户移动的单位立方体。为了更容易看清立方体的朝向（哪一面是正面，哪一面是背面，等等），能够为每一面应用不同的纹理将会很方便。然而，ModelBuilder
    类中没有方法可以自动完成这种构建。编写这样一个方法是一个漫长而复杂的过程，因为你需要为顶点指定坐标来创建六个独立的方形网格，确定用于光照的法线向量，为每个方形分配一个纹理，并将这六个网格合并成一个单一模型的单一网格。本章
    ModelUtils 类的源代码中提供了一个名为 createCubeTexture6 的方法来完成此任务，但由于此方法相当冗长、技术性强，并且对于此演示的功能并非必需（它只是为立方体提供了不同的外观），因此我将不在此处包含该方法的代码或进一步讨论。在创建用户控制的立方体时，你可以选择使用
    createBox 或 createCubeTexture6 方法来生成用于此对象的模型实例；如果你选择后者，可以按照前面所述从源代码中复制此方法。


    你需要对此框架进行的最后一项更改涉及将 Stage3D 类集成到 BaseScreen 类中。首先，删除所有涉及 Stage 对象 mainStage 的代码行，但涉及输入多路复用器的行除外，只需从该行中移除
    mainStage 参数即可。（你可以保留 uiStage，因为即使是三维游戏通常也有二维用户界面。）然后，向该类添加一个新的变量声明：


    ```

    protected Stage3D mainStage3D;

    ```


    接下来，在构造函数中，你需要使用以下代码行初始化此变量：


    ```

    mainStage3D = new Stage3D();

    ```


    大部分更改发生在 render 方法中。你必须插入代码来调用 mainStage3D 的 act 和 draw 方法（就像你之前对 mainStage 所做的那样）。此外，必须在
    glClear 方法中清除深度缓冲区，并且必须使用 glViewport 方法设置 mainStage3D 的渲染区域（因为 Stage3D 对象不会包含
    Viewport 对象来管理此任务）。render 方法的最终形式如下：


    ```

    public void render(float dt)

    {

        uiStage.act(dt);


    if ( !isPaused() )

        {

            update(dt);

            mainStage3D.act(dt);

        }


    Gdx.gl.glClearColor(0.5f,0.5f,0.5f,1);

        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT + GL20.GL_DEPTH_BUFFER_BIT);

        Gdx.gl.glViewport(0, 0, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());


    mainStage3D.draw();

        uiStage.draw();

    }

    ```


    最后，你可以编写一个类来运行你的交互式 3D 演示，并将其命名为 DemoScreen。像往常一样，从编写类的核心部分开始：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;


    public class DemoScreen extends BaseScreen

    {

        BaseActor3D player;


    public DemoScreen(BaseGame g)

        {  super(g);  }


    public void create()

        {    }

