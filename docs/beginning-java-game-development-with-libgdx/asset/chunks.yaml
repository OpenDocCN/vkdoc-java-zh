    Summary


    In this chapter, you added two new ways for the player to interact with your game.
    First, you added gamepad controller support to the base game by using the controller
    extensions for the LibGDX libraries. This required the inclusion of some new JAR
    files in your project, as well as a class dedicated to storing the values corresponding
    to each of the joysticks, buttons, directional pads, and triggers on your particular
    gamepad. You learned how to poll for continuous input, as well as how to set up
    event listeners to monitor for discrete input. Afterward, you saw how to add touch-screen
    support to the base game, using Touchpad and Button objects. This chapter discussed
    at length the design issues that arise when adding onscreen controls, and showed
    one way to alleviate these issues, by repositioning the rendering locations of
    the stages using the glViewport method. With these new techniques at your disposal,
    you will be able to greatly improve the gameplay experience for your players.


