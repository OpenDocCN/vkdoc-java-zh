    In past projects, after finishing the create and update methods (and occasionally
    some InputProcessor methods such as keyDown for processing discrete input), the
    project has been considered complete. However, there is one final step in this
    class: you *must* override the render method from the BaseScreen class. The render
    method draws the contents of the main stage and user-interface stage, but in this
    program the contents of the tilemap must also be rendered, using the TiledMapRenderer
    object. Furthermore, different layers need to be rendered at different times:
    the Background and Scenery layers (indexed by 0 and 1) must be rendered first,
    followed by the main stage (which contains the player), followed by the Overlay
    layer of the tilemap (since these objects should appear above the player), and
    finally, the user-interface stage. This is accomplished with the following code,
    to be inserted into the render method of the GameScreen class:


    ```

    // override the render method to interleave tilemap rendering

    public void render(float dt)

    {

        uiStage.act(dt);


    // pause only gameplay events, not UI events

        if ( !isPaused() )

        {

            mainStage.act(dt);

            update(dt);

        }


    // render

        Gdx.gl.glClearColor(0,0,0,1);

        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

        tiledMapRenderer.render(backgroundLayers);

        mainStage.draw();

        tiledMapRenderer.render(foregroundLayers);

        uiStage.draw();

    }

    ```


