- fmt: "另一个你需要解决的设计问题是哪些类应该实现哪些方法。在你将要编写的`BaseScreen`类中，你将提供某些方法的代码，例如构造函数和`render`方法。对于其他方法，例如`create`，扩展`BaseScreen`的类应该被要求提供代码。从概念上讲，`BaseScreen`的角色介于标准类（所有方法都已完全实现）和接口（方法仅被声明）之间。在Java中，这种功能可以通过*抽象类*来实现。\n\
    \n## 抽象类\n\n在编程中，我们经常通过将重复的特性重构到基类中，然后用专门的子类扩展该类来减少冗余代码。有时，我们知道所有扩展类都需要实现某个特定方法——但它们都会以不同的方式实现，因此我们无法提前在基类中编写代码，但我们确实需要在基类中声明该方法。\n\
    \n例如，我们可能创建一个奇幻风格的角色扮演游戏。我们的基类`Person`将包含所有`Person`对象都应具有的一些标准字段和方法，例如一个名为`name`的`String`，用于存储人的姓名，以及用于访问此信息的`get`和`set`方法。可能会有两个类`Wizard`和`Warrior`扩展`Person`类。该游戏的用户界面包含一个`Sword`按钮，用于激活`Person`类的`useSword`方法，而一个`Spell`按钮则激活`useSpell`方法。\n\
    \n尽管`Person`类会声明这些方法，但它们的实现在`Wizard`和`Warrior`类中会有很大不同。传统上，战士使用剑，而巫师不使用；巫师施放魔法咒语，而战士不施放。如果玩家点击了与角色无法执行的动作相对应的按钮，我们可能希望屏幕上显示一条消息来解释这一点。\n\
    \n编程难点在于，我们希望要求`Person`的扩展类必须为`useSword`和`useSpell`方法提供代码，就像接口所做的那样；然而，`Person`*不能*是接口，因为它为其某些方法（例如获取和设置`name`字段）提供了代码。在接口中，方法仅被声明，而不被编写。\n\
    \n这种情况的解决方案是声明该方法，就像我们在接口中那样，并添加额外的修饰符，表明该方法是抽象的，编写方式如下：\n\n```java\npublic abstract\
    \ void useSword();\npublic abstract void useSpell();\n```\n\n当以这种方式声明一个或多个方法时，这也会对类产生影响。由于并非所有代码都已提供，我们无法创建此类的实例（再次强调，类似于接口）。我们必须通过将类也声明为抽象来表明这一点：\n\
    \n```java\npublic abstract class Person\n{\n    private String name;\n    public\
    \ void setName(String n)  { name = n; }\n    public String getName()  { return\
    \ name; }\n    public abstract void useSword();\n    public abstract void useSpell();\n\
    }\n```\n\n现在，扩展`Person`的类必须为每个抽象方法提供实现。例如：\n\n```java\npublic class Wizard extends\
    \ Person\n{\n    public void useSword()\n    {\n        System.out.print(\"You\
    \ are unable to wield a sword…\");\n    }\n\n    public void useSpell()\n    {\n\
    \        // insert code here that damages enemies\n    }\n}\n\npublic class Warrior\
    \ extends Person\n{\n    public void useSword()\n    {\n        // insert code\
    \ here that damages enemies\n    }\n\n    public void useSpell()\n    {\n    \
    \    System.out.print(\"You are unable to use magic…\");\n    }\n}\n```\n\n通过这种方式，抽象类结合了标准类和接口的优点。\n\
    \n你希望每个扩展`BaseScreen`的类都必须实现自己的`create`方法，因为`create`将由`BaseScreen`类的构造函数调用。因此，你将编写方法签名并将其声明为抽象：\n\
    \n```java\npublic abstract void create();\n```\n\n此外，使用抽象方法使你能够解决前一章中的一个设计问题。当我们讨论游戏程序生命周期的各个阶段时，你观察到LibGDX使用`render`方法来执行游戏循环任务。然而，渲染图形实际上只是游戏循环中执行的三个任务之一，另外两个是处理输入和更新游戏世界的状态。你可以使用抽象类来帮助分离更新和渲染功能。在`BaseScreen`类的`render`方法中，你将首先调用一个名为`update`的抽象方法，然后`BaseScreen`类将继续执行所有渲染代码。总的来说，这大大降低了编写扩展`BaseScreen`类的开发人员的复杂性；他们的主要重点是编写`create`和`update`方法。\n\
    \n## 重构项目\n\n本节介绍`BaseScreen`类。具体来说，你编写的代码将处理以下任务，这些任务对所有扩展`Screen`的类都是通用的：\n\n\
    *   提供对实例化当前类的`Game`对象的引用\n*   初始化`mainStage`和`uiStage`对象\n*   在`render`方法中，调用舞台的`act`方法，清除屏幕，然后调用舞台的`draw`方法\n\
    *   为程序不需要的所有`Screen`接口方法和`InputProcessor`接口方法提供空方法\n*   提供暂停游戏和调整窗口大小的方法\n\n\
    此时，在BlueJ中创建一个新项目，并复制Cheese, Please!游戏项目先前版本中的所有类。然后创建一个名为`BaseScreen`的新类，如下所述。\n\
    \n首先，展示`BaseScreen`类的核心部分，其中包含所需的导入语句和变量声明。该类的各种方法将在后续代码清单中解释。\n\n```java\nimport\
    \ com.badlogic.gdx.Screen;\nimport com.badlogic.gdx.InputProcessor;\nimport com.badlogic.gdx.Game;\n\
    import com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
    import com.badlogic.gdx.utils.viewport.FitViewport;\nimport com.badlogic.gdx.InputMultiplexer;\n\
    \npublic abstract class BaseScreen implements Screen, InputProcessor\n{\n    protected\
    \ Game game;\n\n    protected Stage mainStage;\n    protected Stage uiStage;\n\
    \n    public final int viewWidth  = 640;\n    public final int viewHeight = 480;\n\
    \n    private boolean paused;\n}\n```\n\n接下来是构造函数，它存储对`Game`对象的引用，初始化`Stage`对象，将`paused`设置为`false`，设置`InputMultiplexer`以接收所有输入数据并将其传递给此类和舞台，并调用`create`方法。请注意，每个`Stage`都使用`FitViewport`对象初始化；此对象会缩放每个`Stage`及其内容以适应当前窗口大小，如果窗口的宽高比与`Stage`不匹配，则多余区域将填充为纯黑色。\n\
    \n```java\npublic BaseScreen(Game g)\n{\n    game = g;\n\n    mainStage = new\
    \ Stage( new FitViewport(viewWidth, viewHeight) );\n    uiStage   = new Stage(\
    \ new FitViewport(viewWidth, viewHeight) );\n\n    paused = false;\n\n    InputMultiplexer\
    \ im = new InputMultiplexer(this, uiStage, mainStage);\n    Gdx.input.setInputProcessor(\
    \ im );\n\n    create();\n}\n```\n\n之后，包含抽象方法`create`和`update`，任何扩展`BaseScreen`的类都必须实现它们：\n\
    \n```java\npublic abstract void create();\n\npublic abstract void update(float\
    \ dt);\n```\n\n接下来是`render`方法，它运行游戏循环。你包含更新舞台、调用`update`方法以及绘制图形的代码：\n\n```java\n\
    // gameloop code; update, then render.\npublic void render(float dt)\n{\n    uiStage.act(dt);\n\
    \n    // only pause gameplay events, not UI events\n    if ( !isPaused() )\n \
    \   {\n        mainStage.act(dt);\n        update(dt);\n    }\n```"
  raw: 'Another design consideration you have to address is which classes should implement
    which methods. In the BaseScreen class you will be writing, you will be providing
    the code for some methods, such as the constructor and render methods. For other
    methods, such as create, the classes extending BaseScreen should be required to
    provide the code. Conceptually, the role of BaseScreen lies somewhere between
    a standard class, where all of the methods are fully implemented, and an interface,
    where the methods are only declared. In Java, this functionality can be achieved
    by an *abstract class*.


    ABSTRACT CLASSES


    Often in programming, we’ll try to reduce redundant code by refactoring repeated
    features in a base class, and then extending that class with specialized subclasses.
    Sometimes, we’ll know that all of the extending classes will need to implement
    a particular method—but they will all do it in a different way, so we can’t write
    the code ahead of time in the base class, but we do need to declare the method
    in the base class.


    For example, we might create a fantasy-style role-playing game. Our base class,
    Person, will contain some standard fields and methods that all Person objects
    should have, like a String called name that stores the name of the person, and
    get and set methods to access this information. There may be two classes, Wizard
    and Warrior, that extend the Person class. The user interface of this game contains
    a Sword button that activates the useSword method of the Person class, while a
    Spell button activates a useSpell method.


    Although the Person class will declare these methods, their implementation will
    differ greatly in the Wizard and Warrior classes. Traditionally, warriors wield
    swords, and wizards do not; wizards cast magic spells, and warriors do not. If
    the player clicks a button corresponding to an action that a character is unable
    to perform, we may want a message to display onscreen explaining this.


    The programming difficulty is that we want to require extensions of the Person
    class to be required to provide code for the methods useSword and useSpell, as
    an interface does; however, Person *cannot* be an interface because it provides
    code for some of its methods, such as getting and setting the name field. In an
    interface, methods are only declared, not written.


    The solution to this scenario is to declare the method, as we would in an interface,
    with the additional modifier that the method is abstract, which is written as
    follows:


    public abstract void useSword();

    public abstract void useSpell();


    When one or more methods are declared in this way, this has an effect on the class
    as well. Since not all of the code is provided, we cannot create an instance of
    this class (again, similar to an interface). We must indicate this by declaring
    the class to abstract as well:


    public abstract class Person

    {

        private String name;

        public void setName(String n)  { name = n; }

        public String getName()  { return name; }

        public abstract void useSword();

        public abstract void useSpell();

    }


    Now, the classes that extend Person must provide an implementation of each abstract
    method. For example:


    public class Wizard extends Person

    {

        public void useSword()

        {

            System.out.print("You are unable to wield a sword…");

        }


    public void useSpell()

        {

            // insert code here that damages enemies

        }

    }


    public class Warrior extends Person

    {

        public void useSword()

        {

            // insert code here that damages enemies

        }


    public void useSpell()

        {

            System.out.print("You are unable to use magic…");

        }

    }


    In this way, an abstract class combines the advantages of a standard class and
    an interface.


    You want every class that extends the BaseScreen class to be required to implement
    its own create method, since create will be called by the constructor method of
    the BaseScreen class. Therefore, you will write the method signature and declare
    it to be abstract:


    public abstract void create();


    Additionally, the use of abstract methods enables you to address a design concern
    from the previous chapter. When we discussed the stages of the life cycle of a
    game program, you observed that LibGDX uses the render method to perform the game-loop
    tasks. However, rendering graphics is really only one of three tasks performed
    in the game loop, the others being processing input and updating the state of
    the game world. You can use abstract classes to help separate out the update and
    render functionality. Within the render method of the BaseScreen class, you’ll
    start by calling an abstract method named update, and then the BaseScreen class
    will proceed to perform all the rendering code. Overall, this greatly reduces
    the complexity for the developers who write the classes that extend BaseScreen;
    their primary focus is to write the methods create and update.


    Refactoring the Project


    This section introduces the BaseScreen class. In particular, the code you write
    will handle the following tasks, in common to all your Screen–extending classes:


    *   Provide a reference to the Game object that instantiated the current class

    *   Initialize the mainStage and uiStage objects

    *   In the render method, call the act method of the stages, clear the screen,
    and then call the draw method of the stages

    *   Provide empty methods for all the Screen interface methods and InputProcessor
    interface methods not needed by your program

    *   Provide methods for pausing the game and resizing the window


    At this point, create a new project in BlueJ, and copy all of the classes from
    the previous version of the Cheese, Please! game project. Then create a new class
    called BaseScreen, as described next.


    First, you present the core of the BaseScreen class, which contains the import
    statements and variable declarations needed. The various methods of this class
    will be explained in the subsequent code listings.


    ```

    import com.badlogic.gdx.Screen;

    import com.badlogic.gdx.InputProcessor;

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.utils.viewport.FitViewport;

    import com.badlogic.gdx.InputMultiplexer;


    public abstract class BaseScreen implements Screen, InputProcessor

    {

        protected Game game;


    protected Stage mainStage;

        protected Stage uiStage;


    public final int viewWidth  = 640;

        public final int viewHeight = 480;


    private boolean paused;

    }

    ```


    Next, you have the constructor, which stores a reference to the Game object, initializes
    the Stage objects, sets pause to false, sets up the InputMultiplexer to receive
    all input data and pass it along to this class and the stages, and calls the create
    method. Note that each Stage is initialized with a FitViewport object; this object
    scales each Stage and its contents to fit the current window size, and if the
    aspect ratio of the window does not match that of the Stage, then the extra region
    is filled in with solid black.


    ```

    public BaseScreen(Game g)

    {

        game = g;


    mainStage = new Stage( new FitViewport(viewWidth, viewHeight) );

        uiStage   = new Stage( new FitViewport(viewWidth, viewHeight) );


    paused = false;


    InputMultiplexer im = new InputMultiplexer(this, uiStage, mainStage);

        Gdx.input.setInputProcessor( im );


    create();

    }

    ```


    After this, you include the abstract methods create and update, which must be
    implemented by any classes that extend BaseScreen:


    ```

    public abstract void create();


    public abstract void update(float dt);

    ```


    Following this is the render method, which runs the game loop. You include the
    code that updates the stages, calls the update method, and draws the graphics:


    ```

    // gameloop code; update, then render.

    public void render(float dt)

    {

        uiStage.act(dt);


    // only pause gameplay events, not UI events

        if ( !isPaused() )

        {

            mainStage.act(dt);

            update(dt);

        }'
