            LwjglApplicationConfiguration config = new LwjglApplicationConfiguration();

            config.width = 800;

            config.height = 600;

            TheTest myProgram = new TheTest();

            LwjglApplication launcher = new LwjglApplication( myProgram, config );

        }

    }

    ```


