    about the circumstances of the collision to calculate the desired reaction: realistic
    bouncing. In this game, the collision response more closely adheres to the laws
    of physics: the result of a collision is that the velocity of the ball will reverse
    in either the x or y direction (or possibly both), depending on which side or
    corner of the rectangle the ball first overlaps with. In order for the Ball class
