    Collision detection and response, which is carried out by the overlaps method,
    will be considered next. In the BaseActor class, the overlaps method takes two
    parameters: another BaseActor, and a Boolean variable that indicates whether an
    overlap should be “resolved.” In the BaseActor class, resolving a collision involves
    adjusting the position of the actor calling the method so that there is no longer
    any overlap, which is particularly useful for simulating collision with a solid
    object. In the Ball class, you will overload the overlaps method, creating two
    new versions: one to handle collision with a paddle, and the other to handle collision
    with a brick. In each of these situations, the velocity of the ball must be adjusted,
    and in different ways.


    When a ball collides with a paddle, the speed of the ball remains the same, but
    the angle of motion changes depending on the location of the collision on the
    paddle. (The ball’s angle of motion before the collision has no effect on the
    resulting angle of motion, in contrast to the laws of physics.) If the ball collides
    with the left side of the paddle, the ball bounces to the left; similarly, collision
    with the right side of the paddle causes the ball to bounce to the right. Collision
    with an intermediate position is interpolated accordingly; in particular, colliding
    with the exact center of the paddle causes the ball to bounce straight up. Sample
    collision locations on the paddle and the resulting angle of motion of the ball
    are illustrated in [Figure 6-9](#9781484215012_Ch06.xhtml#Fig9).


