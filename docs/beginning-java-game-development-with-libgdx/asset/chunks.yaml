  trans: '

    在尽己所能尝试解决问题后，如果仍然卡住，请不要绝望：活跃且充满热情的同行游戏开发者与爱好者社区或许能提供帮助。LibGDX 论坛（[www.badlogicgames.com/forum](http://www.badlogicgames.com/forum)）和
    Stack Overflow（[www.stackoverflow.com](http://www.stackoverflow.com)）是两个极佳的求助场所。首先搜索这些网站，看看是否有人问过相同或类似的问题。如果没有，下一步是阅读任何推荐的提问指南。


    通常，你应该全面而简洁地描述你的问题或目标，并详细说明你尝试过的方法、哪些有效、哪些无效。有时你甚至会发现，向外部受众仔细措辞问题的过程，反而有助于厘清问题，并激发你找到可能的解决方案或替代方法。如果你的帖子包含代码，请适度引用，但务必确保所有变量都已向读者定义或解释。最重要的是，保持礼貌和耐心。经常访问这些网站的人通常在其他地方有全职工作，他们是出于社区意识自愿访问这些论坛并提供一般性帮助。一个已发布的问题在
    48 小时甚至更长时间内没有得到回复，是完全正常的。（在此期间，请积极参与社区活动，看看是否有人发布了*你*可能回答的问题。）


    每当有人回复你的问题时，务必向他们致谢；如果他们建议了行动方案，请写一篇后续帖子说明该方案是否有效。最后，如果你最终自己解决了问题，或者决定完全转向另一个方向来规避问题，你也应该发布这些信息，以便为未来的读者提供一个了结。


    拓展你的视野


    除了加深知识深度和提高编程熟练度，你还应该投入时间发展游戏相关领域的广度知识，这将对你所制作游戏的质量产生积极影响。本节简要提及几种实现这一目标的方法。


    玩不同类型的游戏


    大多数游戏爱好者都有自己偏爱的类型。有些人大部分时间都在玩第一人称射击游戏，另一些人则更喜欢花时间在角色扮演游戏上，等等。作为一名游戏开发者，你应该考虑尽可能广泛地玩游戏：动作、冒险、解谜、策略、角色扮演、体育、模拟、叙事等等。同时，尝试不同时期（从经典到现代）的游戏，以及不同规模开发者（从大型专业公司到小型工作室，再到独立游戏制作者和游戏开发大赛参与者）制作的游戏。


    即使你觉得某个特定游戏或类型并不吸引人，花时间玩这些游戏也会让你作为开发者成长，尤其是当你带着开发者的思维去玩时。试着理解人们为什么喜欢某个游戏。审视每个游戏的关卡推进、玩法平衡、叙事与角色发展、艺术风格和界面设计。留意是什么让每个游戏具有创新性或独特性。试着在脑海中将自己置于创造该游戏的原始开发者的角色，思考他们做出那些决定可能的原因，并思考你是否会做出同样的选择，或者走向不同的方向。


    提升你的技能组合


    在继续开发游戏的同时，你也应该考虑拓宽你的整体技能组合。扎实的编程技能非常受欢迎，但游戏开发者（尤其是独立工作或在小型工作室工作的开发者）通常需要成为多面手，尤其是在图形和音频领域。要开始学习这些领域，我推荐以下软件和教程：


    *   Inkscape：[`inkscape.org/`](http://inkscape.org/)


    用于创建矢量图形的软件，免费提供。该网站包含一系列适用于所有技能水平的高质量教程。然而，与我们兴趣最相关的是 Chris Hildenbrand 编写的一套游戏美术教程，可在此处获取：


    [`2d-game-art-tutorials.zeef.com/chris.hildenbrand`](http://2d-game-art-tutorials.zeef.com/chris.hildenbrand)


    *   Spine：[`esotericsoftware.com/`](http://esotericsoftware.com/)


    一款专为游戏开发设计的 2D 骨骼精灵动画工具。Spine 的主要开发者之一 Nathan Sweet 也是 LibGDX 的主要贡献者之一，因此将 Spine
    创建的动画文件集成到 LibGDX 项目中有一个简化的流程。


    *   Audacity：[`audacityteam.org/`](http://audacityteam.org/)


    一款多轨音频编辑器和录音器，免费提供。Audacity 手册包含大量教程，将教你各种有用的录音和编辑技巧。


    推荐阅读


    除了拓宽技能组合，拓宽知识基础也是值得的。市面上有大量与游戏开发相关的书籍，它们正是为此目的而存在。当然，这里无法一一列举，而且我无疑遗漏了一些高质量的作品。尽管如此，本节列出了一些来自不同领域的代表性样本，涵盖各种主题，以展示可获取的资源范围：游戏设计、文学方面、历史和社会影响：


    *   *游戏设计基础*，Ernest Adams 著（New Riders，2013 年）


    本书讨论了多种主题：概念开发、玩法设计、核心机制、用户界面、叙事和平衡；还包含练习、工作表和案例研究。


    *   *电子游戏写作与设计终极指南*，Flint Dille 与 John Zuur Platten 合著（Lone Eagle，2008 年）


    涵盖的主题包括将故事元素整合到游戏中、编写游戏脚本、创建设计文档、创作过程、团队动态和商业考量。


    *   *经典游戏*，Bill Loguidice 与 Matt Barton 合著（Focal Press，2012 年）


    本书探讨了有史以来最具影响力的电子游戏的历史，特别关注它们的开发过程、评论界反响以及对行业的影响。


    *   *游戏改变世界：游戏化如何让现实变得更美好*，Jane McGonigal 著（Penguin Books，2011 年）


    在这本书中，作者在游戏玩的背景下讨论了心理学、认知科学、社会学和哲学的理论，并解释了游戏如何能让我们更高效，以及如何让世界变得更美好。


    紧跟游戏行业的当前新闻和发展动态，以及了解同行游戏开发者的观点、方法、挣扎和成功，也很有用。为此，没有比关注博客更好的选择了。以下是一些特别重要的网站，它们定期发布博客文章（以及额外的有用信息和资源）：


    *   Gamasutra：[www.gamasutra.com](http://www.gamasutra.com)


    一个致力于游戏制作艺术和商业的网站，除其他资源外，还包含精心策划的博客文章列表，涉及行业的各个方面。


    *   GameDev.net：[www.gamedev.net](http://www.gamedev.net)


    面向所有领域和专业水平开发者的资源网站，包含关于游戏开发技术、创意和商业方面的文章和教程。


    *   HobbyGameDev：[www.hobbygamedev.com](http://www.hobbygamedev.com)


    由 Chris DeLeon（一位专业的电子游戏开发者、作家和讲师）维护，这个定期更新的网站包含文章、建议、教程、案例研究、访谈等内容。


    传播你的游戏

    '
- fmt: '# Packaging and Sharing Your Games


    Once you have designed and created some games of your own, you should consider
    sharing them with others—after all, games are meant to be played! This process
    will require you to package your work in a playable format, and find an audience
    of eager game enthusiasts.


    ## Packaging for Desktop Computers


    The simplest way to share your games is to create executable JAR files.


    1. To do so, verify that your launcher class contains a `main` method specified
    as shown here (adjust the name and parameters of your method to match this if
    necessary):


    ```

    public static void main (String[] args)

    ```


    2. Then, from the BlueJ menu bar, choose **Project → Create Jar File**; a small
    window appears. This window indicates that the JAR file you create will be executable
    if the main class is specified. That is exactly what you’re hoping to do! From
    the drop-down list, select the name of your launcher class.


    3. In addition, your executable JAR file will require copies of all the LibGDX
    JAR files used by BlueJ when developing your game. If you have been storing these
    files in a `+libs` folder in your project directory, you may skip ahead to the
    next paragraph. If you have been using an alternative approach, such as storing
    the LibGDX JAR files in the BlueJ `userlibs` directory, then the section of the
    window labelled **Include User Libraries** will include a list of names of JAR
    files, including those containing the LibGDX classes. In this case, be sure to
    select the check boxes next to all of the LibGDX JAR files before continuing.


    4. At this point, you can click the **Continue** button. A file directory appears,
    asking you to specify a name for the JAR file.


    5. Enter the name of your game and then click the **Create** button. Since additional
    JAR files are required by your application, a directory is created in the location
    you specified, and in that directory you will find a file with the name of your
    game and the `.jar` extension; this directory should also contain all the LibGDX
    JAR files from your BlueJ project’s `+libs` directory or those that you selected
    from the **Create Jar File** window. All of these JAR files must be located in
    the same directory in order to be able to run your game. All the contents of the
    other folders contained in the BlueJ project directory (such as the `assets` folder)
    are stored within your game’s JAR file.


    To run your game, all you need to do is to double-click your game’s JAR file,
    and your game will start.[¹](#9781484215012_Ch09.xhtml#Fn1) You can easily share
    your game with others, by sending them the set of files in this directory.[²](#9781484215012_Ch09.xhtml#Fn2)
    The one caveat is that in order to be able to run your game, potential users must
    have Java installed on their computers. For those who don’t, you have two main
    options:


    * You could inform users that they need to install Java, and direct them to the
    Java web site, [www.java.com](http://www.java.com).

    * You could use a third-party tool to convert your JAR files into native executable
    files for various operating systems; one such tool is called JWrapper, and is
    available from [www.jwrapper.com](http://www.jwrapper.com).


    ## Compiling for Other Platforms


    Compiling your project for other platforms (such as Android, iOS, and web browsers
    via HTML5/JavaScript) is one of the main strengths of LibGDX. However, to do so
    effectively requires the use of an advanced integrated development environment.
    This section briefly covers the steps required to set up a LibGDX project for
    the Android Studio IDE. For further details concerning configuring the IDE setting,
    compiling, and exporting, you will need to consult the resources listed.


    1. Android Studio[³](#9781484215012_Ch09.xhtml#Fn3) is an IDE based on the IntelliJ
    platform. After downloading and installing this software (the version bundled
    with the Android SDK), the installer will most likely download an updated set
    of packages.


    2. After this process is complete, visit the LibGDX Wiki project setup site[⁴](#9781484215012_Ch09.xhtml#Fn4)
    and download `gdx-tools.jar`, which is an executable JAR file, from the link on
    the wiki page. Run this file, and you’ll see a screen similar to [Figure 9-1](#9781484215012_Ch09.xhtml#Fig1).


    ![9781484215012_Fig09-01.jpg](OEBPS/Images/9781484215012_Fig09-01.jpg)


    [Figure 9-1](#9781484215012_Ch09.xhtml#_Fig1). The LibGDX project setup tool


    3. Here, you’ll need to enter a name for your project, a package name (such as
    `com.mygdx.spacerocks`), the name of your `Game` class (or in our extended framework,
    the class that extends `BaseGame`), the directory where you’d like to store the
    files, and the path where the Android SDK was installed when you installed Android
    Studio.


    4. In the next series of check boxes, you can specify which platforms you’ll be
    developing for (for starters, I recommend selecting **Android** and **Desktop**).
    If your project requires any third-party libraries or extensions (such as Box2D
    or the game-pad controllers extension), you can specify that here.


    5. Then click the **Generate** button, and a set of project files will be created
    for you in the directory you specified during setup. This process can take a while
    the first time a project is generated, as the setup file will download a number
    of dependency files.


    6. When it is all finished, restart Android Studio, select the **Import Project**
    option, and choose the file named `build.gradle`.


    When your project opens, you’ll notice a directory structure has been prepared
    for you, including directories named `core`, `android`, and `desktop`. The latter
    two directories contain premade launcher files for their corresponding platforms.
    The `core` directory is where you should place all your other classes. There are
    many settings that you will need to configure for your project, such as editing
    the configuration to specify a working directory where game assets are located.
    The LibGDX wiki, referenced earlier, contains details that you will need to read
    through to help get your project up and running should you decide to pursue this
    direction further.


    ## Finding Distribution Outlets


    One of the greatest joys of being a game developer is having others play your
    games. Even if a project is unfinished, having people play-test your game and
    provide feedback can help your creations reach even greater heights and attract
    an even larger audience. Many web sites support independent game developers and
    provide forums for sharing your work with the community. Some of these web sites
    (such as Indie DB and Game Jolt) will even provide you with the ability to upload
    your games onto their servers after you register for an account.


    * Indie DB: [www.indiedb.com](http://www.indiedb.com)

    * Game Jolt: [http://gamejolt.com/](http://gamejolt.com/)

    * GameDev.net: [www.gamedev.net](http://www.gamedev.net)

    * The Independent Games Source (TIGSource): [www.tigsource.com](http://www.tigsource.com)

    * Indie Gamer forums: [http://forums.indiegamer.com/](http://forums.indiegamer.com/)


    If you post a game to one of these sources, while you’re waiting to hear people’s
    opinions on your work, you should strive to be an active participant in their
    forums. Try out a few games and provide feedback to your fellow developers. We
    all benefit from a vibrant game development community, so be sure to join in and
    be a part of it!


    With that final piece of advice, we come to the end of our journey together through
    this book. Hopefully, however, your journey as a game developer will continue.
    May you have good fortune in all your future endeavors!'
