    touch, a parallax effect is added to create the illusion of depth (as in the Plane
    Dodger game): when calculating the x coordinate of the camera for the background
    layer of the tilemap, reduce its value by a factor of 4, so that as the player
    walks across the level, the background layer will appear to scroll at one-fourth
    the speed of the tile layer.


