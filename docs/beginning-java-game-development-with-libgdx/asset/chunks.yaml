    \ Sweet（LibGDX库的主要贡献者之一）移植到LibGDX。`Hiero`被打包为可执行的JAR文件；当前下载链接发布在LibGDX wiki页面上。[²](#9781484215012_Ch04.xhtml#Fn2)\n\
    \n对于本项目，我创建了一个自定义字体数据文件和位图文件（分别为`cooper.fnt`和`cooper.png`），您可以从本章源代码目录的`assets`文件夹中下载，并将其复制到您自己的项目中。如果您希望使用`Hiero`创建自己的字体，我将在下一段中简要讨论该程序的操作；否则，您可以跳到后面的段落。\n\
    \n当您启动`Hiero`时，会显示各种选项。[图4-7](#9781484215012_Ch04.xhtml#Fig7)包含了程序运行时的截图。在左上角区域，您可以选择本地安装的字体；在中央区域，您可以输入要生成其图像的字符；在右上角区域，您可以选择要应用于图像的各种效果，包括纯色、渐变、轮廓和投影。可以通过单击效果的值并输入或选择新值来更改效果的参数。完成后，从`File`菜单中选择`Save\
    \ BMFont files`，您将获得一个PNG和一个FNT文件，可供LibGDX的`BitmapFont`类使用。\n\n![9781484215012_Fig04-07.jpg](OEBPS/Images/9781484215012_Fig04-07.jpg)\n\
    \n[图4-7](#9781484215012_Ch04.xhtml#_Fig7). 用于生成位图字体数据的`Hiero`应用程序\n\n要在LibGDX中使用自定义生成的位图字体，您需要使用生成的FNT文件的`FileHandle`来初始化`BitmapFont`对象。（关联的PNG文件的名称存储在FNT文件中，因此无需在代码中直接声明。）例如：\n\
    \n```java\nBitmapFont myFont = new BitmapFont( Gdx.files.internal(\"myCustomFont.fnt\"\
    ) );\n```\n\n如果需要，可以访问`BitmapFont`对象中包含的`Texture`数据。例如，您可能希望这样做，以便在缩放图像时设置过滤器以获得更平滑的外观。为此，您可以在创建`myFont`后包含以下代码：\n\
    \n```java\nmyFont.getRegion().getTexture().setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
    ```\n\n创建`BitmapFont`后，您可以将其用作`LabelStyle`的一部分，应用于游戏中的`Label`对象。借助`BaseGame`类提供的新结构，您将在`BaseGame`扩展中创建样式对象，并在`BaseScreen`扩展中使用这些对象。\n\
    \n首先，这是完全改造后的`TurtleGame`类的代码，它现在扩展了`BaseGame`并创建和存储了共享资源：\n\n```java\nimport\
    \ com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.Texture.TextureFilter;\n\
    import com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;\nimport com.badlogic.gdx.graphics.Color;\n\
    import com.badlogic.gdx.graphics.g2d.BitmapFont;\n\npublic class TurtleGame extends\
    \ BaseGame\n{\n    public void create()\n    {\n        // initialize resources\
    \ common to multiple screens and store to skin database\n        BitmapFont uiFont\
    \ = new BitmapFont(Gdx.files.internal(\"assets/cooper.fnt\"));\n        uiFont.getRegion().getTexture().setFilter(TextureFilter.Linear,\
    \ TextureFilter.Linear);\n        skin.add(\"uiFont\", uiFont);\n\n        LabelStyle\
    \ uiLabelStyle = new LabelStyle(uiFont, Color.BLUE);\n        skin.add(\"uiLabelStyle\"\
    , uiLabelStyle);\n\n        // initialize and start main game\n        TurtleLevel\
    \ tl = new TurtleLevel(this);\n        setScreen( tl );\n    }\n}\n```\n\n在`TurtleLevel`类中，您现在可以轻松创建显示剩余海星数量的`Label`。首先，您需要包含相应的导入语句：\n\
    \n```java\nimport com.badlogic.gdx.scenes.scene2d.ui.Label;\n```\n\n接下来，您声明名为`starfishLeftLabel`的`Label`。由于这将在`create`和`update`方法中使用，您在类中全局声明它：\n\
    \n```java\nLabel starfishLeftLabel;\n```"
  raw: 'Because you may use a Skin object in most games that you will create in the
    future, you will add a new class to your framework code that extends the core
    classes provided by LibGDX. Just as your BaseScreen class extended the Screen
    class, you will create a BaseGame class that extends the Game class. BaseGame
    will contain a Skin object that is initialized by the constructor. You will override
    the empty dispose method provided by the Game class and write a method that calls
    the dispose method of the skin, so memory is freed up when the BaseGame object
    is no longer needed (similar to the disposal of audio objects, discussed earlier
    in this chapter). In addition, extensions of the Game class must include a create
    method, but as BaseGame is never meant to be instantiated directly (similar to
    BaseScreen), you will declare the create method to be abstract, which in turn
    requires the BaseGame class itself to be abstract. The code for the BaseGame class
    is as follows:


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.scenes.scene2d.ui.Skin;


    public abstract class BaseGame extends Game

    {

        // used to store resources common to multiple screens

        Skin skin;


    public BaseGame()

        {

            skin = new Skin();

        }


    public abstract void create();


    public void dispose()

        {

            skin.dispose();

        }

    }

    ```


    Following this addition, you must change the BaseScreen class so that every occurrence
    of the Game type is replaced by the BaseGame type: the game variable and constructor
    parameter should both be of type BaseGame. Similarly, in the TurtleLevel class,
    the constructor parameter should be a BaseGame object. In addition, your TurtleGame
    class should now extend BaseGame, rather than Game. In the create method of TurtleGame,
    eventually you will include code to initialize the resources common to multiple
    screens, store these resources using the Skin object, and only after these tasks
    are complete should you initialize and set the first screen to appear in the game.


    Using Customized Bitmap Fonts


    Bitmap-based fonts were briefly mentioned in [Chapter 2](#9781484215012_Ch02.xhtml);
    this section discusses them in much greater detail.


    To create a BitmapFont, you need two things: an image that contains all the characters
    you may want to represent in your application ([Figure 4-6](#9781484215012_Ch04.xhtml#Fig6)
    contains an example), and an associated data file that lists the region (position
    and size) corresponding to each character. For example, the region in [Figure
    4-6](#9781484215012_Ch04.xhtml#Fig6) corresponding to A is located at x=319, y=134,
    and has width 45 and height 41\. When a bitmap font is used to display text, the
    image region corresponding to each character of the text is extracted, and these
    image regions are aligned side by side to produce the result seen onscreen.


    ![9781484215012_Fig04-06.jpg](OEBPS/Images/9781484215012_Fig04-06.jpg)


    [Figure 4-6](#9781484215012_Ch04.xhtml#_Fig6). An image file (512 by 256 pixels)
    used to create a bitmap font


    LibGDX uses the BMFont format for storing this data, developed by Andreas Jönsson.[¹](#9781484215012_Ch04.xhtml#Fn1)
    An application named Hiero is provided by LibGDX that can be used to generate
    bitmap font data using fonts installed on your computer. The first version of
    Hiero was created by Kevin Glass for use with his Java game development library,
    Slick2D. Since then, Hiero has been ported to LibGDX by Nathan Sweet, one of the
    major contributors to the LibGDX libraries. Hiero is packaged as an executable
    JAR file; the current link to download it is posted on the LibGDX wiki page.[²](#9781484215012_Ch04.xhtml#Fn2)


    For this project, I’ve created a custom font data file and bitmap file (cooper.fnt
    and cooper.png, respectively) that you can download from the assets folder in
    the source code directory for the chapter and copy to your own project. If you
    would prefer to create your own font using Hiero, I briefly discuss the operation
    of this program in the next paragraph; otherwise, you can skip to the paragraph
    afterward.


    When you start Hiero, a variety of options are presented. [Figure 4-7](#9781484215012_Ch04.xhtml#Fig7)
    contains a screenshot of the program in action. In the upper-left area, you may
    select a locally installed font; in the center region, you can enter the characters
    whose images you wish to generate; in the upper-right area, you can select various
    effects to apply to the image, including solid coloring, gradient coloring, outline,
    and drop shadow. Parameters for effects can be altered by clicking their values
    and entering or selecting a new value. When finished, select Save BMFont files
    from the File menu, and you’ll have a PNG and FNT file ready to be used by the
    LibGDX BitmapFont class.


    ![9781484215012_Fig04-07.jpg](OEBPS/Images/9781484215012_Fig04-07.jpg)


    [Figure 4-7](#9781484215012_Ch04.xhtml#_Fig7). The Hiero application for generating
    bitmap font data


    To use a custom-generated bitmap font in LibGDX, you initialize the BitmapFont
    object with a FileHandle to the FNT file generated. (The name of the associated
    PNG file is stored within the FNT file and thus does not need to be stated directly
    in the code.) For example:


    ```

    BitmapFont myFont = new BitmapFont( Gdx.files.internal("myCustomFont.fnt") );

    ```


    If desired, it is possible to access the Texture data contained within the BitmapFont
    object. You may want to do this, for example, in order to set the filter to obtain
    a smoother appearance when images are scaled. To accomplish this, you can include
    the following code after myFont is created:


    ```

    myFont.getRegion().getTexture().setFilter(TextureFilter.Linear, TextureFilter.Linear);

    ```


    After creating a BitmapFont, you can then use it as part of a LabelStyle, to be
    applied to Label objects in your game. With the new structure provided by the
    BaseGame class, you’ll create the style objects in your BaseGame extension, and
    use these objects in your BaseScreen extensions.


    First, here is the code for the completely overhauled TurtleGame class, which
    now extends BaseGame and creates and stores the shared resources:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.g2d.BitmapFont;


    public class TurtleGame extends BaseGame

    {

        public void create()

        {

            // initialize resources common to multiple screens and store to skin database

            BitmapFont uiFont = new BitmapFont(Gdx.files.internal("assets/cooper.fnt"));

            uiFont.getRegion().getTexture().setFilter(TextureFilter.Linear, TextureFilter.Linear);

            skin.add("uiFont", uiFont);


    LabelStyle uiLabelStyle = new LabelStyle(uiFont, Color.BLUE);

            skin.add("uiLabelStyle", uiLabelStyle);


    // initialize and start main game

            TurtleLevel tl = new TurtleLevel(this);

            setScreen( tl );

        }

    }

    ```


    In the TurtleLevel class, you can now easily create the Label that displays the
    number of starfish left to collect. First you need to include the corresponding
    import statement:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    ```


    Next, you declare the Label, named starfishLeftLabel. Since this will be used
    in both the create and update methods, you declare it globally in the class:


    ```

    Label starfishLeftLabel;

    ```'
