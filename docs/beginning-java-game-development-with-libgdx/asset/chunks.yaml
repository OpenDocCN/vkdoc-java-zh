    Instances of lasers are stored by two objects in this game: a Stage object, which
    activates the updating and drawing of the actor, and an ArrayList object, which
    is used to organize the collision detection code. When one of these instances
    needs to be removed from the game, to do so completely requires that it be removed
    from both the Stage and the ArrayList that contains it. The Actor class contains
    a remove method to remove itself from the Stage. Inspired by this functionality,
    you will add some code to the BaseActor class to similarly manage removal from
    the associated ArrayList. First, in the BaseActor class, add the import statement:


    ```

    import java.util.ArrayList;

    ```


    Then add a new variable: an ArrayList called parentList, which can store a reference
    to an ArrayList the actor has been added to. The difficult part of declaring this
    variable is choosing the type of data that the ArrayList contains: in general,
    it could contain BaseActor objects, or AnimatedActor objects, or PhysicsActor
    objects—in short, any of the classes that extend the BaseActor class. To express
    this in the declaration, the Java syntax for the type declaration is ? extends
    BaseActor. In the BaseActor class, add the following line of code to the variable
    declarations:


    ```

    private ArrayList<? extends BaseActor> parentList;

    ```


    Then add a method to the BaseActor class that can be used to set this data:


    ```

    public void setParentList(ArrayList<? extends BaseActor> pl)

    {  parentList = pl;  }

    ```


    Initialize this data to null in the BaseActor constructor by adding the following
    line of code:


    ```

    parentList = null;

    ```


    And finally, add a method called destroy that will cause a BaseActor to remove
    itself from the Stage that contains it, as well as removing it from its parentList
    (if it exists):


    ```

    public void destroy()

    {

        remove(); // removes self from Stage


    if (parentList != null)

            parentList.remove(this);

    }

    ```


    Next, you will set up the code to fire a laser. Lasers should appear to be coming
    from the spaceship object. To align their origin coordinates correctly, you must
    take into account the position of the target, the origin of the target, and the
    origin of the object being centered. The results of taking these values into account,
    one step at a time, are illustrated in [Figure 6-4](#9781484215012_Ch06.xhtml#Fig4).


    ![9781484215012_Fig06-04.jpg](OEBPS/Images/9781484215012_Fig06-04.jpg)


    [Figure 6-4](#9781484215012_Ch06.xhtml#_Fig4). An illustration of the effects
    of each step in the calculation for centering a small rectangle within a larger
    rectangle


    Since this is a commonly needed operation, add the following method, named moveToOrigin,
    to the BaseActor class:


    ```

    public void moveToOrigin(BaseActor target)

    {

        this.setPosition(

            target.getX() + target.getOriginX() - this.getOriginX(),

            target.getY() + target.getOriginY() - this.getOriginY() );

    }

    ```


    In addition, laser objects will need to be cloned so there need to be clone methods
    for the AnimatedActor and PhysicsActor classes. Previously, only BaseActor objects
    were cloned, so the analogous methods for the more sophisticated classes have
    not been introduced until now. In the AnimatedActor class, add the following methods.
    Note that in the copy method, the method call super.copy activates the copy method
    of the BaseActor class, which ensures that all the data defined in that class
    will also get copied into the new actor.


    ```

    public void copy(AnimatedActor original)

    {

        super.copy(original);

        this.elapsedTime = 0;

        this.animationStorage = original.animationStorage;

        this.activeName = new String(original.activeName);

        this.activeAnim = this.animationStorage.get( this.activeName );

    }


    public AnimatedActor clone()

    {

        AnimatedActor newbie = new AnimatedActor();

        newbie.copy( this );

        return newbie;

    }

    ```


    In the PhysicsActor class, for similar purposes, add the following methods:


    ```

    public void copy(PhysicsActor original)

    {

        super.copy(original);

        this.velocity     = new Vector2(original.velocity);

        this.acceleration = new Vector2(original.acceleration);

        this.maxSpeed     = original.maxSpeed;

        this.deceleration = original.deceleration;

        this.autoAngle    = original.autoAngle;

    }


    public PhysicsActor clone()

    {

        PhysicsActor newbie = new PhysicsActor();

        newbie.copy( this );

        return newbie;

    }

    ```


    Now you are ready to return to implementing game mechanics in the GameScreen class.
    Since firing a laser is a discrete event, you’ll override the keyDown method in
    the GameScreen class to handle this action. If the space key is pressed, create
    a new PhysicsActor, called laser, by cloning baseLaser. Center the laser on the
    spaceship by using the newly created moveToOrigin method, set the velocity so
    that it is aligned with the angle of the spaceship, and add the laser to the appropriate
    Stage and ArrayList. Also, an Action sequence is added that will cause the laser
    to fade out quickly after an initial 2-second delay:


    ```

    public boolean keyDown(int keycode)

    {

        if (keycode == Keys.SPACE)

        {

            PhysicsActor laser = baseLaser.clone();

            laser. moveToOrigin( spaceship );

