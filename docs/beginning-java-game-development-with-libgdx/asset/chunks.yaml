    CHAPTER 4


    ![image](OEBPS/Images/frontdot.jpg)


    Adding Polish to Your Game


    This chapter builds on the Starfish Collector game introduced in the previous
    chapter. The core game play remains the same; the additions include background
    music and sound effects, as well as a user interface with customized bitmap fonts,
    image-based buttons, and other UI controls.


    Audio


    Incorporating audio into your game is a straightforward process, thanks to the
    built-in functionality of the LibGDX libraries. Supported file types include MP3,
    OGG, and WAV. LibGDX provides two interfaces for this purpose, Sound and Music,
    each of which can be created from the audio object of the Gdx class. (The classes
    that implement the interfaces depend on the platform being used; happily, these
    details are handled for you by LibGDX.)


    The Sound interface is provided for sound effects: small audio files that are
    played when discrete game events occur, such as when an item is collected, a character
    jumps, or two objects collide. Sound effects are typically short (a few seconds
    or less), and the corresponding files should not be larger than 1MB. (For larger
    audio clips, you should consider using the Music interface, given next.) To load
    a sound effect into memory, for example, you use this code:


    ```

    Sound beep = Gdx.audio.newSound( Gdx.files.internal("beep.wav") );

    ```


    After the sound has been loaded into memory, it can be played with the following:


    ```

    beep.play(volume);

    ```


    The variable volume is a float between 0 and 1, which determines how loudly the
    sound will be played (0 is silent, and 1 is full volume). A single sound effect
    can be played multiple times in rapid succession; the sounds will simply overlap
    each other in this case.


    The Music interface is provided for longer audio sequences, such as background
    music or ambient sounds. To prepare music for streaming, you use this code:


    ```

    Music song = Gdx.audio.newSound( Gdx.files.internal("song.ogg") );

    ```


    The volume can be set using the setVolume method, which takes a float value just
    as a Sound objects do. If you would like the audio to loop, use setLooping(true).
    To control playback, there are play, pause, and stop methods. To retrieve information
    about the current state of playback, you use the methods isPlaying, isLooping,
    and getPosition, the latter of which returns the current position in seconds.


    Sound and Music instances should be *disposed*—removed from memory—when the game
    is finished, which can be accomplished using their provided dispose methods.


    Next, you’ll see how to add music and sound effects to the Starfish Collector
    game created in the previous chapter. All the code that follows should be added
    to the TurtleLevel class. You begin by adding the following import statements:


    ```

    import com.badlogic.gdx.audio.Sound;

    import com.badlogic.gdx.audio.Music;

    ```


    Then you declare the following variables:


    ```

    private float audioVolume;

    private Sound waterDrop;

    private Music instrumental;

    private Music oceanSurf;

    ```


    At the end of the create method, you initialize these variables and start playing
    the music with the following code. The sound files referenced in the code can
    be downloaded from the assets directory containing the source code from this chapter,
    and should be added to your local project’s assets folder:


    ```

    waterDrop    = Gdx.audio.newSound(Gdx.files.internal("assets/Water_Drop.ogg"));

    instrumental = Gdx.audio.newMusic(Gdx.files.internal("assets/Master_of_the_Feast.ogg"));

    oceanSurf    = Gdx.audio.newMusic(Gdx.files.internal("assets/Ocean_Waves.ogg"));


    audioVolume = 0.80f;

    instrumental.setLooping(true);

    instrumental.setVolume(audioVolume);

    instrumental.play();

    oceanSurf.setLooping(true);

    oceanSurf.setVolume(audioVolume);

    oceanSurf.play();

    ```


    In the update method, during the collision detection, you play the water-drop
    sound effect whenever a starfish disappears. This section of code is given next;
    only the line that appears in bold font needs to be added:


    ```

    for (BaseActor b : removeList)

    {

        b.remove();

        starfishList.remove(b);

        waterDrop.play(audioVolume);

    }

    ```


    Finally, you add a dispose method, which in turn calls the dispose method of each
    audio object, so as to free up memory when the screen is closed:


    ```

    public void dispose()

    {

        waterDrop.dispose();

        instrumental.dispose();

        oceanSurf.dispose();

    }

    ```


    This method should be activated when the user exits the program; later in this
    chapter, you’ll see where this takes place.


    You may have noticed that you’re using the variable audioVolume to store the volume
    for playing sounds and music, but nowhere in the provided code is there a mechanism
    for changing this value. You will implement volume control in the next section,
    which covers advanced user-interface controls.


    Advanced User-Interface Design


    Our next goal is to create a polished user interface.


    First, you’ll create a title screen that includes the name of your game, buttons
    to start or quit the game, and a graphic that credits the LibGDX library. This
    is illustrated in [Figure 4-1](#9781484215012_Ch04.xhtml#Fig1).


    ![9781484215012_Fig04-01.jpg](OEBPS/Images/9781484215012_Fig04-01.jpg)


    [Figure 4-1](#9781484215012_Ch04.xhtml#_Fig1). Title screen layout


    Next, in the main game screen (where the game is played), you want to add some
    text that states how many starfish remain to be collected, and a Pause button.
    These elements should appear in the upper corners of the window so that they do
    not block the player’s view of the game world, which could interfere with the
    game play, resulting in a diminished player experience. This is illustrated in
    [Figure 4-2](#9781484215012_Ch04.xhtml#Fig2).


    ![9781484215012_Fig04-02.jpg](OEBPS/Images/9781484215012_Fig04-02.jpg)


    [Figure 4-2](#9781484215012_Ch04.xhtml#_Fig2). Main game layout


    Finally, when the user clicks the Pause button, in addition to pausing the game
    play, a pause menu should appear. This menu dims the view of the game world by
    overlaying a translucent black rectangle on top of it; on top of this is text
    indicating the game is paused, buttons to resume or quit the game, and a slider
    to control the audio volume, as shown in [Figure 4-3](#9781484215012_Ch04.xhtml#Fig3).


    ![9781484215012_Fig04-03.jpg](OEBPS/Images/9781484215012_Fig04-03.jpg)


    [Figure 4-3](#9781484215012_Ch04.xhtml#_Fig3). Pause game layout


    In the subsections that follow, you’ll design and implement layouts with the Table
    class, manage image and style resources with the Skin class, and learn about classes
    that provide commonly needed user-interface elements, such as Label, Image, Button
    (and its subclass TextButton), and Slider.


