    Next, you will create a new class, AnimatedActor, which extends the BaseActor
    class and uses this newly created Animation data in its draw method. The additional
    information this class needs to store includes the total elapsed time the animation
    has been playing (to determine the correct image to use at each point in time),
    and of course the Animation itself. In the act method, you will increment elapsedTime.
    For an extra bit of polish, here you’ll set the rotation of the Actor texture
    to match the direction of movement. (This value is calculated using the velocity,
    an arctangent function, and a conversion factor from radians to degrees; we’ll
    discuss the derivation of this formula at a later time.) Finally, in the draw
    method, *before* you call the draw method of the BaseActor class, you use the
    getKeyFrame method of the Animation class to retrieve the correct image based
    on the current value of elapsedTime. The complete source code for this method
    appears here:


    ```

    import com.badlogic.gdx.graphics.g2d.Batch;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.math.MathUtils;


    public class AnimatedActor extends BaseActor

    {

        public float elapsedTime;

        public Animation anim;


    public AnimatedActor()

        {

            super();

            elapsedTime = 0;

        }


    public void setAnimation(Animation a)

        {

            Texture t = a.getKeyFrame(0).getTexture();

            setTexture( t );

            anim = a;

        }


    public void act(float dt)

        {

            super.act( dt );

            elapsedTime += dt;

            if (velocityX != 0 || velocityY != 0)

                setRotation( MathUtils.atan2( velocityY, velocityX ) * MathUtils.radiansToDegrees
    );

        }


    public void draw(Batch batch, float parentAlpha)

        {

            region.setRegion( anim.getKeyFrame(elapsedTime) );

            super.draw(batch, parentAlpha);

        }

    }

