    Discrete Input


    Next, you will introduce the code necessary to process discrete gamepad input
    events. First, you must declare that the BaseScreen class implements the ControllerListener
    interface. The first line of the class declaration should read as follows:


    ```

    public abstract class BaseScreen implements Screen, InputProcessor, ControllerListener

    ```


    You need to declare the methods required by the ControllerListener interface;
    these can be overridden if needed by the individual classes that extend BaseScreen.
    The methods you need to include are as follows:


    ```

    public void connected(Controller controller)

    {  }


    public void disconnected(Controller controller)

    {  }


    public boolean xSliderMoved(Controller controller, int sliderCode, boolean value)

    {  return false;  }


    public boolean ySliderMoved(Controller controller, int sliderCode, boolean value)

    {  return false;  }


    public boolean accelerometerMoved(Controller controller, int accelerometerCode,
    Vector3 value)

    {  return false;  }


    public boolean povMoved(Controller controller, int povCode, PovDirection value)

    {  return false;  }


    public boolean axisMoved(Controller controller, int axisCode, float value)

    {  return false;  }


    public boolean buttonDown(Controller controller, int buttonCode)

    {  return false;  }


    public boolean buttonUp(Controller controller, int buttonCode)

    {  return false;  }

    ```


    Finally, you need to “activate” the listener. You will add the currently active
    Screen to the set of listeners managed by the Controllers class. You must also
    remove any previously added ControllerListener objects; you don’t want other Screen
    objects that may be inactive (but still reside in memory) to respond to input,
    because this could cause unexpected problems. (For example, if the Start button
    were used to begin a new game from the menu screen, after switching to the game
    screen, you no longer want this action to be occur when clicking Start; therefore,
    you must stop the menu screen from “listening” and responding to these events.)
    You can perform this task in the BaseScreen constructor by adding the following
    lines of code:


    ```

    Controllers.clearListeners();

    Controllers.addListener(this);

    ```


    Now that your modifications to the BaseScreen class are complete, you are ready
    to write game-specific code to respond to discrete gamepad input. For example,
    you want to enable the player to pause the game by pressing the X button on the
    Xbox gamepad. It would be inaccurate to poll for the state of the button in the
    update method, as this could result in toggling the pause state 60 times per second.
    Pausing the game is a *discrete* action, and thus you override one of the ControllerListener
    methods to listen for the event of pressing the X button. The following code,
    to be added to the GameScreen class, accomplishes this task:


    ```

    public boolean buttonDown(Controller controller, int buttonCode)

    {

        if (buttonCode == XBoxGamepad.BUTTON_X)

            togglePaused();


    return false;

    }

    ```


    Similarly, you would like to be able to start the game by clicking the Start button
    while the main menu screen is active. To this end, you add the following code
    to the MenuScreen class:


    ```

    public boolean buttonDown(Controller controller, int buttonCode)

    {

        if (buttonCode == XBoxGamepad.BUTTON_START)

            game.setScreen( new GameScreen(game) );


    return false;

    }

    ```


    This completes the controller-based additions to the Cheese, Please! game. The
    final version of the source code is contained within the CheesePleaseGamepad folder
    that contains the source code for this chapter.


    Touch-Screen Controls


    In this section, you’ll learn how to implement gamepad-inspired onscreen touch
    controls. Again, as mentioned in the beginning of the chapter, access to a touch-screen
    device is not needed to test the code for this section, as LibGDX handles mouse
    events and touch events with the same methods; single-touch input is simulated
    by the mouse. Since you have already learned about the Button class in the previous
    chapter, you’re well on your way. In what follows, you’ll learn about another
    user-interface control provided by the LibGDX library, the Touchpad class, which
    was created to simulate a traditional arcade joystick. [Figure 5-2](#9781484215012_Ch05.xhtml#Fig2)
    shows an example of a traditional arcade-style joystick, and a touch-pad control
    that can be created with LibGDX, which is rendered in a top-down perspective of
    the arcade-style joystick.


