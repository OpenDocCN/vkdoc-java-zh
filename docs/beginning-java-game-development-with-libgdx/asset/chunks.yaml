    Next, you’ll set up the AnimatedActor that stores an animated explosion that will
    appear when lasers collide with rocks. For animation sequences consisting of many
    images, it is common practice to combine all these images into a single image
    file called a *sprite sheet*, and this is the case for the image you will use,
    pictured in [Figure 6-5](#9781484215012_Ch06.xhtml#Fig5).


    ![9781484215012_Fig06-05.jpg](OEBPS/Images/9781484215012_Fig06-05.jpg)


    [Figure 6-5](#9781484215012_Ch06.xhtml#_Fig5). A sprite sheet consisting of images
    for an animation of an explosion


    The TextureRegion class has a method called split that divides an image into rectangular
    sections, and returns the results in a two-dimensional array of TextureRegion
    objects, which you can convert into an Array and use in creating an Animation.
    For convenience, I have written a static method named parseSpriteSheet that performs
    these steps. In particular, this includes a nested for loop that transfers the
    contents of the two-dimensional array into a single-dimensional array before creating
    the animation. This method is in a new helper class called GameUtils; the code
    for this class is presented here:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.graphics.g2d.Animation.PlayMode;

    import com.badlogic.gdx.utils.Array;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;


    public class GameUtils

    {

        public static Animation parseSpriteSheet(String fileName, int frameCols, int
    frameRows,

            float frameDuration, PlayMode mode)

        {

            Texture t = new Texture(Gdx.files.internal(fileName), true);

            t.setFilter(TextureFilter.Linear, TextureFilter.Linear);


    int frameWidth = t.getWidth() / frameCols;

            int frameHeight = t.getHeight() / frameRows;


    TextureRegion[][] temp = TextureRegion.split(t, frameWidth, frameHeight);

            TextureRegion[] frames = new TextureRegion[frameCols * frameRows];


    int index = 0;

            for (int i = 0; i < frameRows; i++)

            {

                for (int j = 0; j < frameCols; j++)

                {

                    frames[index] = temp[i][j];

                    index++;

                }

            }


    Array<TextureRegion> framesArray = new Array<TextureRegion>(frames);

            return new Animation(frameDuration, framesArray, mode);

        }

    }

    ```


    Now, returning to the create method of the GameScreen class, this animation-generating
    method is used to create the base object from which all explosion effects will
    be cloned later:


    ```

    baseExplosion = new AnimatedActor();

    Animation explosionAnim = GameUtils.parseSpriteSheet(

        "assets/explosion.png", 6, 6, 0.03f, PlayMode.NORMAL);

    baseExplosion.storeAnimation( "default", explosionAnim );

    baseExplosion.setWidth(96);

    baseExplosion.setHeight(96);

    baseExplosion.setOriginCenter();

    ```


    Finally, return to the update method of the GameScreen class. When a laser overlaps
    a rock, both the laser and rock should be removed from the game, and an explosion
    object should be cloned from baseExplosion and centered on the position of the
    rock. The explosion does not need to be added to any ArrayList; furthermore, an
    Action can be set up that causes the explosion to automatically remove itself
    from its Stage after its animation is complete (which requires 1.08 seconds, since
    each of the 36 animation images is displayed for 0.03 seconds). Since every possible
    pair of lasers and rocks needs to be checked for overlaps, the following code
    must be inserted within the loop that iterates through laserList:


    ```

    for ( PhysicsActor rock : rockList )

    {

        if ( laser.overlaps(rock, false) )

        {

            removeList.add( laser );

            removeList.add( rock );

            AnimatedActor explosion = baseExplosion.clone();

            explosion.moveToOrigin(rock);

            mainStage.addActor(explosion);

            explosion.addAction( Actions.sequence(Actions.delay(1.08f), Actions.removeActor())
    );

        }

    }

    ```


