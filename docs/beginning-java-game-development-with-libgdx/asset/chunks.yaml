    \n## Paddle\n\n`Paddle`类是自定义对象类中的第一个。对于本项目中将引入的自定义碰撞检测代码，将使用`Rectangle`和`Circle`对象，而不是`Polygon`对象。在此游戏中，挡板不需要`AnimatedActor`或`PhysicsActor`类的任何功能，因此`Paddle`继承自`BaseActor`类。此类的主要目的是添加一个方法，该方法将返回此Actor的边界`Rectangle`对象。此类的代码如下：\n\
    \n```\nimport com.badlogic.gdx.math.Rectangle;\n\npublic class Paddle extends\
    \ BaseActor\n{\n    public Paddle()\n    {  super();  }\n\n    public Rectangle\
    \ getRectangle()\n    {  return new Rectangle( getX(), getY(), getWidth(), getHeight()\
    \ );  }\n}\n```\n\n## Brick\n\n与`Paddle`类类似，`Brick`类具有返回边界`Rectangle`对象的能力。此外，由于在初始化游戏区域时需要克隆`Brick`对象，因此需要重写`BaseActor`的`clone`方法，使其返回`Brick`对象而不是`BaseActor`对象。最后，当砖块被摧毁时，淡出比直接从舞台上消失更具视觉趣味性，因此其`destroy`方法也将被重写，以在Actor从舞台移除之前包含一个淡出动作。这需要对`BaseActor`类中`parentList`的变量声明进行调整：需要将其从`private`改为`protected`，以便`Brick`类可以访问该变量。`Brick`类的代码如下：\n\
    \n```\nimport com.badlogic.gdx.math.Rectangle;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
    \npublic class Brick extends BaseActor\n{\n    public Brick()\n    {  super();\
    \  }\n\n    public Rectangle getRectangle()\n    {  return new Rectangle( getX(),\
    \ getY(), getWidth(), getHeight() );  }\n\n    public Brick clone()\n    {\n \
    \       Brick newbie = new Brick();\n        newbie.copy( this );\n        return\
    \ newbie;\n    }\n\n    public void destroy()\n    {\n        addAction( Actions.sequence(\
    \ Actions.fadeOut(0.5f), Actions.removeActor() ) );\n\n        if (parentList\
    \ != null)\n            parentList.remove(this);\n    }\n}\n```\n\n## Ball\n\n\
    接下来，将介绍`Ball`类，由于其独特的碰撞检测和响应算法，它将是本游戏中最概念复杂的类。由于球对象将在屏幕上移动，`Ball`类应继承`PhysicsActor`类。对于碰撞检测，将使用`Circle`作为边界形状。为此，需要有一个`getCircle`方法，该方法返回一个`Circle`对象，其参数是圆心的x和y坐标以及半径。到目前为止，`Ball`类的代码如下："
  raw: "enemyList.add( enemy );\n    enemy.setParentList( enemyList );\n    mainStage.addActor(\
    \ enemy );\n}\n```\n\nNext, each enemy must be processed, similar to the way the\
    \ stars were processed earlier. If an enemy moves beyond the left edge of the\
    \ screen, that enemy should be added to removeList. If the player overlaps an\
    \ enemy, then create an explosion special effect centered on the player, add the\
    \ player to removeList, and set gameOver to true. To accomplish these tasks, insert\
    \ the following code after removeList is cleared, but before the loop that calls\
    \ the destroy method of all elements of removeList:\n\n```\nfor (PhysicsActor\
    \ enemy : enemyList )\n{\n    if ( enemy.getX() + enemy.getWidth() < 0)\n        removeList.add(enemy);\n\
    \nif ( player.overlaps(enemy, false) )\n    {\n        AnimatedActor explosion\
    \ = baseExplosion.clone();\n        explosion.moveToOrigin(player);\n        explosion.addAction(\
    \ Actions.sequence( Actions.delay(1.08f), Actions.removeActor() ) );\n        mainStage.addActor(explosion);\n\
            removeList.add(player);\n        gameOver = true;\n    }\n}\n```\n\nFinally,\
    \ when gameOver becomes true, new stars and enemy planes should no longer be spawned,\
    \ but the background should continue scrolling. To accomplish this, insert the\
    \ following code in the update method, after the loop that manages the background\
    \ objects, and before everything else. It will cause the update loop to terminate\
    \ earlier than usual, skipping over the parts of code you no longer wish to run:\n\
    \n```\nif ( gameOver )\n    return;\n```\n\nNext Steps\n\nThis completes the new\
    \ game mechanics for Plane Dodger. As usual, this program should be considered\
    \ a work in progress, with plenty of features remaining to be added to create\
    \ a quality game. Many of the suggestions from the Space Rocks game are applicable\
    \ here: a menu screen, background music and sound effects, and a Game Over message\
    \ at the end of the game. Other game-specific features you may wish to consider\
    \ include the following:\n\n*   Keep track of the number of stars collected, and\
    \ display it on the user interface.\n*   Keep track of the player’s total progress;\
    \ you could display one of the following:\n    *   The total number of enemy planes\
    \ dodged\n    *   The total time the player has been playing\n    *   Some measure\
    \ of the game world distance the player has travelled (perhaps 20 pixels per meter)\n\
    *   Increase the challenge by slowly increasing the spawn frequency of the enemy\
    \ planes as the game progresses, or by adding a small random amount to the vertical\
    \ velocity of the enemy planes so that their paths are less predictable.\n*  \
    \ Add enemy planes with different colors or sizes for variety.\n*   When the game\
    \ is finished, calculate and display some type of performance rating for the player.\
    \ Here are two possible methods:\n    *   Calculate a final score using a formula\
    \ such as this:\n\nscore = (100 × seconds survived) + (200 × stars collected)\n\
    \n*   Calculate a rank or rating (such as A/B/C/D/E). Let N be calculated as follows:\n\
    \nN = seconds survived + stars collected\n\nThen assign a rank to each range of\
    \ values. Perhaps rank E corresponds to 0 <= N <= 20, rank D corresponds to 21\
    \ <= N <= 40, and so forth.\n\nRectangle Destroyer\n\nThis section introduces\
    \ a game called *Rectangle* *Destroyer*, inspired by the classic arcade game Breakout\
    \ and later variations such as Arkanoid and Quester. In this game, using either\
    \ mouse or touch controls, the player moves a paddle back and forth along the\
    \ bottom of the screen in order to bounce a ball upward with the goal of colliding\
    \ with (and thereby destroying) rectangular objects called *bricks*. Occasionally,\
    \ a destroyed brick will spawn an item that typically changes the game play in\
    \ some way, such as changing the size of the paddle or the speed of the ball;\
    \ changes may increase or decrease the difficulty level. [Figure 6-8](#9781484215012_Ch06.xhtml#Fig8)\
    \ shows this game in action.\n\n![9781484215012_Fig06-08.jpg](OEBPS/Images/9781484215012_Fig06-08.jpg)\n\
    \n[Figure 6-8](#9781484215012_Ch06.xhtml#_Fig8). The Rectangle Destroyer game\n\
    \nThe new game-play mechanics and topics introduced by this game include the following:\n\
    \n*   Creating game-specific extensions of your custom actor classes\n*   Implementing\
    \ circle-rectangle collision detection\n*   Overloading methods to provide various\
    \ types of collision responses\n*   Creating new animated effects from the Action\
    \ class\n*   Randomly spawning items that affect game play\n\nAs before, you begin\
    \ by creating a new project containing the classes BaseGame, BaseScreen, BaseActor,\
    \ AnimatedActor, PhysicsActor, and GameUtils. You should also create a launcher-style\
    \ class and a class that extends BaseGame. You will need to copy all the images\
    \ from this chapter’s source directory RectangleDestroyer/assets into your local\
    \ project’s assets folder.\n\nUnlike the previously discussed games in this chapter,\
    \ you will begin by writing a new set of classes before working with the GameScreen\
    \ class. In general, this is necessary whenever you have game-specific objects\
    \ that require additional data or functionality beyond that provided by your custom\
    \ Actor extensions.\n\nThe Paddle\n\nThe Paddle class is the first of the custom\
    \ object classes. For the customized collision-detection code that will be introduced\
    \ throughout this project, Rectangle and Circle objects will be used rather than\
    \ Polygon objects. In this game, the paddle doesn’t require any of the functionality\
    \ of the AnimatedActor or PhysicsActor classes, so Paddle extends the BaseActor\
    \ class. The main purpose of this class is to add a method that will return a\
    \ bounding Rectangle object for this actor. The code for this class is presented\
    \ here:\n\n```\nimport com.badlogic.gdx.math.Rectangle;\n\npublic class Paddle\
    \ extends BaseActor\n{\n    public Paddle()\n    {  super();  }\n\npublic Rectangle\
    \ getRectangle()\n    {  return new Rectangle( getX(), getY(), getWidth(), getHeight()\
    \ );  }\n}\n```\n\nThe Brick\n\nSimilar to the Paddle class, the Brick class has\
    \ the ability to return a bounding Rectangle object. In addition, since you’re\
    \ going to need to clone Brick objects when initializing the playing area, the\
    \ clone method of BaseActor needs to be overridden so that it returns a Brick\
    \ object rather than a BaseActor object. Finally, when a brick is destroyed, it\
    \ is more visually interesting for it to fade out rather than just disappear from\
    \ its stage, its destroy method will also be overridden in order to include a\
    \ fading-out action before the actor is removed from the stage. This requires\
    \ an adjustment to be made in the BaseActor class in the variable declaration\
    \ for parentList: it needs to be changed from private to protected, so that the\
    \ Brick class can access the variable. The code for the Brick class is as follows:\n\
    \n```\nimport com.badlogic.gdx.math.Rectangle;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
    \npublic class Brick extends BaseActor\n{\n    public Brick()\n    {  super();  }\n\
    \npublic Rectangle getRectangle()\n    {  return new Rectangle( getX(), getY(),\
    \ getWidth(), getHeight() );  }\n\npublic Brick clone()\n    {\n        Brick\
    \ newbie = new Brick();\n        newbie.copy( this );\n        return newbie;\n\
        }\n\npublic void destroy()\n    {\n        addAction( Actions.sequence( Actions.fadeOut(0.5f),\
    \ Actions.removeActor() ) );\n\nif (parentList != null)\n            parentList.remove(this);\n\
        }\n}\n```\n\nThe Ball\n\nNext, the Ball class will be introduced, which will\
    \ be the most conceptually complicated of the classes in this game due to its\
    \ unique collision-detection and response algorithms. Because the ball object\
    \ will be moving around the screen, the Ball class should extend the PhysicsActor\
    \ class. For collision detection, a Circle will be used as the bounding shape.\
    \ To this end, there needs to be a getCircle method that returns a Circle object,\
    \ whose parameters are the x and y coordinates of the center of the circle, and\
    \ its radius. The code for the Ball class thus far is as follows:"
  trans: "\nenemyList.add( enemy );\n    enemy.setParentList( enemyList );\n    mainStage.addActor(\
    \ enemy );\n}\n```\n\n接下来，每个敌机都需要被处理，类似于之前处理星星的方式。如果某个敌机移出屏幕左边缘，则应将该敌机添加到 removeList\
    \ 中。如果玩家与敌机重叠，则创建一个以玩家为中心的爆炸特效，将玩家添加到 removeList 中，并将 gameOver 设置为 true。要完成这些任务，请在清除\
    \ removeList 之后、但在调用 removeList 所有元素的 destroy 方法的循环之前，插入以下代码：\n\n```\nfor (PhysicsActor\
    \ enemy : enemyList )\n{\n    if ( enemy.getX() + enemy.getWidth() < 0)\n        removeList.add(enemy);\n\
    \nif ( player.overlaps(enemy, false) )\n    {\n        AnimatedActor explosion\
    \ = baseExplosion.clone();\n        explosion.moveToOrigin(player);\n        explosion.addAction(\
    \ Actions.sequence( Actions.delay(1.08f), Actions.removeActor() ) );\n        mainStage.addActor(explosion);\n\
            removeList.add(player);\n        gameOver = true;\n    }\n}\n```\n\n最后，当\
    \ gameOver 变为 true 时，不应再生成新的星星和敌机，但背景应继续滚动。要实现这一点，请在 update 方法中，在管理背景对象的循环之后、其他所有代码之前插入以下代码。这将导致更新循环提前终止，跳过你不再希望运行的代码部分：\n\
    \n```\nif ( gameOver )\n    return;\n```\n\n后续步骤\n\n至此，Plane Dodger 的新游戏机制已完成。与往常一样，此程序应被视为一个持续开发中的作品，还有许多功能有待添加才能打造出一款优质游戏。Space\
    \ Rocks 游戏中的许多建议在此同样适用：菜单界面、背景音乐和音效，以及游戏结束时的 Game Over 消息。你可能希望考虑的其他游戏特定功能包括：\n\
    \n*   记录收集到的星星数量，并在用户界面上显示。\n*   记录玩家的总进度；你可以显示以下内容之一：\n    *   躲避敌机的总数\n    *\
    \   玩家的总游戏时长\n    *   玩家在游戏世界中行进的距离（例如每米 20 像素）\n*   通过随着游戏进程逐渐提高敌机的生成频率，或为敌机的垂直速度添加一个小的随机值使其路径更难以预测，来增加挑战性。\n\
    *   添加不同颜色或大小的敌机以增加多样性。\n*   游戏结束时，计算并显示玩家的某种表现评级。以下是两种可能的方法：\n    *   使用如下公式计算最终得分：\n\
    \n得分 = (100 × 存活秒数) + (200 × 收集星星数)\n\n*   计算一个等级或评级（例如 A/B/C/D/E）。令 N 按如下方式计算：\n\
    \nN = 存活秒数 + 收集星星数\n\n然后为每个数值范围分配一个等级。例如，等级 E 对应 0 <= N <= 20，等级 D 对应 21 <= N\
    \ <= 40，以此类推。\n\n矩形破坏者\n\n本节介绍一款名为 *矩形破坏者* 的游戏，其灵感来源于经典街机游戏 Breakout 及其后续变体，如\
    \ Arkanoid 和 Quester。在这款游戏中，玩家通过鼠标或触控操作，沿屏幕底部来回移动一个挡板，以将球向上弹起，目标是撞击（从而摧毁）称为*砖块*的矩形物体。偶尔，被摧毁的砖块会生成一个道具，通常会以某种方式改变游戏玩法，例如改变挡板的大小或球的速度；这些变化可能增加或降低难度。图\
    \ 6-8 展示了这款游戏的运行画面。\n\n![9781484215012_Fig06-08.jpg](img/9781484215012_Fig06-08.jpg)\n\
    \n图 6-8. 矩形破坏者游戏\n\n这款游戏引入的新游戏机制和主题包括：\n\n*   创建自定义 Actor 类的游戏特定扩展\n*   实现圆-矩形碰撞检测\n\
    *   重载方法以提供多种类型的碰撞响应\n*   从 Action 类创建新的动画效果\n*   随机生成影响游戏玩法的道具\n\n与之前一样，你首先创建一个新项目，其中包含\
    \ BaseGame、BaseScreen、BaseActor、AnimatedActor、PhysicsActor 和 GameUtils 类。你还应创建一个启动器风格的类和一个继承自\
    \ BaseGame 的类。你需要将本章源目录 RectangleDestroyer/assets 中的所有图像复制到你本地项目的 assets 文件夹中。\n\
    \n与本章之前讨论的游戏不同，你将先编写一组新的类，然后再处理 GameScreen 类。通常，当你拥有游戏特定对象，且这些对象需要超出自定义 Actor\
    \ 扩展所提供的额外数据或功能时，这是必要的。\n\n挡板\n\nPaddle 类是自定义对象类中的第一个。对于本项目中将引入的自定义碰撞检测代码，将使用\
    \ Rectangle 和 Circle 对象，而不是 Polygon 对象。在此游戏中，挡板不需要 AnimatedActor 或 PhysicsActor\
    \ 类的任何功能，因此 Paddle 继承自 BaseActor 类。该类的主要目的是添加一个方法，该方法将返回此 Actor 的边界 Rectangle\
    \ 对象。该类的代码如下：\n\n```\nimport com.badlogic.gdx.math.Rectangle;\n\npublic class\
    \ Paddle extends BaseActor\n{\n    public Paddle()\n    {  super();  }\n\npublic\
    \ Rectangle getRectangle()\n    {  return new Rectangle( getX(), getY(), getWidth(),\
    \ getHeight() );  }\n}\n```\n\n砖块\n\n与 Paddle 类类似，Brick 类具有返回边界 Rectangle 对象的能力。此外，由于在初始化游戏区域时需要克隆\
    \ Brick 对象，因此需要重写 BaseActor 的 clone 方法，使其返回 Brick 对象而非 BaseActor 对象。最后，当砖块被摧毁时，淡出效果比直接从舞台上消失更具视觉趣味性，因此其\
    \ destroy 方法也将被重写，以便在 Actor 从舞台移除之前包含一个淡出动作。这需要对 BaseActor 类中 parentList 的变量声明进行调整：需要将其从\
    \ private 改为 protected，以便 Brick 类能够访问该变量。Brick 类的代码如下：\n\n```\nimport com.badlogic.gdx.math.Rectangle;\n\
    import com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\npublic class Brick\
    \ extends BaseActor\n{\n    public Brick()\n    {  super();  }\n\npublic Rectangle\
    \ getRectangle()\n    {  return new Rectangle( getX(), getY(), getWidth(), getHeight()\
    \ );  }\n\npublic Brick clone()\n    {\n        Brick newbie = new Brick();\n\
            newbie.copy( this );\n        return newbie;\n    }\n\npublic void destroy()\n\
        {\n        addAction( Actions.sequence( Actions.fadeOut(0.5f), Actions.removeActor()\
    \ ) );\n\nif (parentList != null)\n            parentList.remove(this);\n    }\n\
    }\n```\n\n球\n\n接下来，将介绍 Ball 类，由于其独特的碰撞检测和响应算法，它将是本游戏中概念上最复杂的类。由于球对象将在屏幕上移动，Ball\
    \ 类应继承 PhysicsActor 类。对于碰撞检测，将使用 Circle 作为边界形状。为此，需要有一个 getCircle 方法，该方法返回一个 Circle\
    \ 对象，其参数为圆心的 x 和 y 坐标以及半径。到目前为止，Ball 类的代码如下：\n"
- fmt: "```java\nimport com.badlogic.gdx.math.Circle;\npublic class Ball extends PhysicsActor\n\
    {\n    public Ball()\n    {  super();  }\n\n    public Circle getCircle()\n  \
    \  {  return new Circle( getX() + getWidth()/2, getY() + getHeight()/2, getWidth()/2\
    \ );  }\n}\n```\n\nCollision detection and response, which is carried out by the\
    \ `overlaps` method, will be considered next. In the `BaseActor` class, the `overlaps`\
    \ method takes two parameters: another `BaseActor`, and a `Boolean` variable that\
    \ indicates whether an overlap should be “resolved.” In the `BaseActor` class,\
    \ resolving a collision involves adjusting the position of the actor calling the\
    \ method so that there is no longer any overlap, which is particularly useful\
    \ for simulating collision with a solid object. In the `Ball` class, you will\
    \ overload the `overlaps` method, creating two new versions: one to handle collision\
    \ with a paddle, and the other to handle collision with a brick. In each of these\
    \ situations, the velocity of the ball must be adjusted, and in different ways.\n\
    \nWhen a ball collides with a paddle, the speed of the ball remains the same,\
    \ but the angle of motion changes depending on the location of the collision on\
    \ the paddle. (The ball’s angle of motion before the collision has no effect on\
    \ the resulting angle of motion, in contrast to the laws of physics.) If the ball\
    \ collides with the left side of the paddle, the ball bounces to the left; similarly,\
    \ collision with the right side of the paddle causes the ball to bounce to the\
    \ right. Collision with an intermediate position is interpolated accordingly;\
    \ in particular, colliding with the exact center of the paddle causes the ball\
    \ to bounce straight up. Sample collision locations on the paddle and the resulting\
    \ angle of motion of the ball are illustrated in [Figure 6-9](#9781484215012_Ch06.xhtml#Fig9).\n\
    \n![9781484215012_Fig06-09.jpg](OEBPS/Images/9781484215012_Fig06-09.jpg)\n\n[Figure\
    \ 6-9](#9781484215012_Ch06.xhtml#_Fig9). Bounce angles resulting from ball-paddle\
    \ collision at different positions\n\nThe method that performs these tasks is\
    \ presented next, and should be included in the `Ball` class. Note that, conveniently,\
    \ the `Intersector` class contains an overloaded version of its `overlaps` method\
    \ that checks whether a `Circle` and `Rectangle` overlap. For consistency with\
    \ the earlier declaration of the `overlaps` method in the `BaseActor` class, a\
    \ `Boolean` parameter is included that determines whether the velocity of the\
    \ ball should be adjusted to simulate bouncing off the paddle, as described previously.\
    \ This parameter is usually set to `true`. First, add the import statement:\n\n\
    ```java\nimport com.badlogic.gdx.math.Intersector;\n```\n\nThen, the code for\
    \ the `overlaps` method is as follows:\n\n```java\npublic boolean overlaps(Paddle\
    \ paddle, boolean bounceOff)\n{\n    if ( !Intersector.overlaps( this.getCircle(),\
    \ paddle.getRectangle() ) )\n        return false;\n\n    if ( bounceOff )\n \
    \   {\n        float ballCenterX = this.getX() + this.getWidth()/2;\n        float\
    \ percent = (ballCenterX - paddle.getX()) / paddle.getWidth();\n        // interpolate\
    \ value between 150 and 30\n        float bounceAngle = 150 - percent * 120;\n\
    \        this.setVelocityAS( bounceAngle, this.getSpeed() );\n    }\n\n    return\
    \ true;\n}\n```\n\nNext, consider the situation of a ball colliding with a brick.\
    \ The code used in the past to determine when two objects overlap does not provide\
    \ enough information about the circumstances of the collision to calculate the\
    \ desired reaction: realistic bouncing. In this game, the collision response more\
    \ closely adheres to the laws of physics: the result of a collision is that the\
    \ velocity of the ball will reverse in either the `x` or `y` direction (or possibly\
    \ both), depending on which side or corner of the rectangle the ball first overlaps\
    \ with. In order for the `Ball` class to be able to access the velocity variable\
    \ of the `PhysicsActor` class, you must change its access modifier from `private`\
    \ to `protected`. After this change is complete, add the following methods to\
    \ the `Ball` class that allow you to multiply either the `x` or `y` component\
    \ of the velocity by a constant (multiplying it by –1 reverses it in that direction):\n\
    \n```java\npublic void multVelocityX(float m)\n{  velocity.x *= m;  }\n\npublic\
    \ void multVelocityY(float m)\n{  velocity.y *= m;  }\n```\n\nThe difficult part\
    \ of the code is determining the side (or corner) of the rectangle that the ball\
    \ first collided with. To help understand this, one particular case will be examined\
    \ and discussed in detail: determining whether the circle collided with the bottom\
    \ edge of the rectangle. In order for this to happen, two conditions must be met:\n\
    \n*   The `y` component of the ball’s velocity must be positive, indicating that\
    \ it was moving up.\n*   While the circle was travelling from its previous position\
    \ to its current position, the top point of the circle (the point directly above\
    \ the center) must have crossed the bottom edge of the rectangle.\n\nThis scenario\
    \ is illustrated in [Figure 6-10](#9781484215012_Ch06.xhtml#Fig10); the circle\
    \ with the dashed boundary represents its previous position, the circle with the\
    \ solid boundary represents its current position, and the arrow indicates the\
