    类扩展了 `Screen` 类一样，你将创建一个扩展 `Game` 类的 `BaseGame` 类。`BaseGame` 将包含一个由构造函数初始化的 `Skin`
    对象。你将重写 `Game` 类提供的空 `dispose` 方法，并编写一个调用皮肤 `dispose` 方法的方法，这样当不再需要 `BaseGame`
    对象时，内存就会被释放（类似于本章前面讨论的音频对象的释放）。此外，`Game` 类的扩展必须包含一个 `create` 方法，但由于 `BaseGame`
    永远不打算被直接实例化（类似于 `BaseScreen`），你将把 `create` 方法声明为抽象方法，这反过来要求 `BaseGame` 类本身也是抽象的。`BaseGame`
    类的代码如下：


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.scenes.scene2d.ui.Skin;


    public abstract class BaseGame extends Game

    {

