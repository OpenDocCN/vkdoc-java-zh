    GameScreen 类（它继承自 BaseScreen 类），接下来将讨论这个类。


    你将先从 GameScreen 类的核心代码开始，包括最终需要的 import 语句（数量很多！）、变量声明和方法声明（这些方法将在后续填充）。你需要为玩家、钥匙、门以及一个基础金币实例（后续将从中克隆出更多金币）声明不同类型的角色变量。还需要列表来跟踪金币和墙壁，以便在
    update 方法中进行碰撞检测。变量 tileSize、tileCountWidth 和 tileCountHeight 用于计算 mapWidth 和
    mapHeight 的值。整数数组 backgroundLayers 和 foregroundLayers 分别存储要在主舞台之前和之后渲染的瓦片地图层索引。最引人注目的是新导入类的实例，它们完成以下任务：


    *   TiledMap 对象用于存储从瓦片地图文件加载的数据，该文件通过 TmxMapLoader 类的静态方法加载。

    *   OrthogonalTileMapRenderer 对象用于绘制瓦片地图各层的内容；要渲染的层由一个整数数组指定。

    *   OrthographicCamera 用于确定应渲染瓦片地图层的哪个区域，类似于每个 Stage 所拥有的 Camera 对象的作用。


    闲话少叙，以下是 BaseScreen 类的核心代码：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.graphics.g2d.Animation;

    import com.badlogic.gdx.graphics.g2d.Animation.PlayMode;

