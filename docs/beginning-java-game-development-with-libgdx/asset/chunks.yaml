    \n___________________\n\n¹[`github.com/libgdx/libgdx/wiki/2D-Particle-Editor`](https://github.com/libgdx/libgdx/wiki/2D-Particle-Editor)\n\
    \n²感谢 Andrew Viola 创建了我们将要在游戏中使用的这个角色精灵表。\n\n³与之前的项目类似，在遍历列表时无法从列表中移除对象（因此引入了\
    \ `removeList`），在物理模拟进行时也无法从世界中移除刚体（因此再次需要使用 `removeList`）。\n\n第 8 章\n\n![image](img/frontdot.jpg)\n\
    \n3D 图形入门\n\n本章介绍 LibGDX 的一些 3D 图形功能。在此过程中，你将学习描述和渲染三维场景所需的概念和类。你将创建一个简单的交互式演示，使玩家能够控制场景中的对象以及观察场景的摄像机。为了简化和精简此过程，你将改编一些旧类并编写一些新类来完成所涉及的各种任务。最后，你将基于\
    \ 2.5D 技术创建一个更复杂的演示：一个渲染高级三维图形的游戏，而其底层游戏玩法则限制在二维平面上。\n\n探索 3D 概念和类\n"
- fmt: '# 3D Graphics in LibGDX


    As it turns out, all of the previously created games in this book exist in a three-dimensional
    space. You may have noticed that when setting the position of a camera object,
    you have `x`, `y`, and `z` components to set. If the `x` axis and the `y` axis
    represent the horizontal and vertical directions on the screen, respectively,
    then the `z` axis corresponds to a straight line pointing toward the viewer, perpendicular
    to the *xy plane*—the plane containing the `x` and `y` axes. The camera can be
    thought of as positioned on the `z` axis, pointing straight toward the `xy` plane;
    all of the game entities have implicitly had their `z` coordinate set to `0`.
    This configuration is illustrated in [Figure 8-1](#9781484215012_Ch08.xhtml#Fig1),
    which shows roughly how the camera sees the Starfish Collector game from previous
    chapters.


    ![9781484215012_Fig08-01.jpg](OEBPS/Images/9781484215012_Fig08-01.jpg)


    [Figure 8-1](#9781484215012_Ch08.xhtml#_Fig1). A camera looking down the `z` axis
    at the Starfish Collector game


    Our previous projects have relied heavily on the `Stage` class, which manages
    the `Camera` and a `Batch` object (for rendering purposes). To create 3D scenes,
    you need the "3D versions" of these objects, provided by the `PerspectiveCamera`
    and `ModelBatch` classes, which are covered in detail next. However, there is
    no corresponding stage-like object to manage them, and so you will create your
    own manager class (called `Stage3D`) in a later section.


    To render a scene, you can use one of two types of cameras: an orthographic camera
    or a perspective camera. (The `Stage` class uses an `OrthographicCamera` object
    for rendering.) The difference between these two is in how they represent, or
    project, a 3D scene onto a 2D surface such as a computer screen. To illustrate
    the difference, consider one of the simplest 3D shapes: a cube. [Figure 8-2](#9781484215012_Ch08.xhtml#Fig2)
    shows an orthographic projection and a perspective projection of a cube. In an
    orthogonal projection, if the edges of an object have the same length, then they
    will be drawn as having the same length in the projection, regardless of their
    distance from the viewer. This is in contrast to a perspective projection, in
    which objects with two edges of the same length may appear different in the projection;
    an edge that is further away from the viewer will appear shorter. This also has
    the side effect that, if two edges of an object are parallel, then they remain
    parallel in an orthographic projection, but they appear to converge in a perspective
    projection. (In a perspective drawing, the point at which all such edges appear
    to converge is sometimes called the *vanishing point*.)


    ![9781484215012_Fig08-02.jpg](OEBPS/Images/9781484215012_Fig08-02.jpg)


    [Figure 8-2](#9781484215012_Ch08.xhtml#_Fig2). A cube drawn using orthographic
    projection (left) and perspective projection (right)


    When initializing a `PerspectiveCamera` object, you have to define the region
    visible to the camera, which has the shape of a truncated pyramid, or frustum
    (illustrated in [Figure 8-3](#9781484215012_Ch08.xhtml#Fig3)). This is specified
    by five parameters: the field of view (an angle that represents how far the camera
    can see to either side), the width and height of the rectangle onto which the
    scene is being projected (determined by a `Viewport` object in LibGDX), and the
    near and far values (which represent the closest and furthest distances that the
    camera will include while rendering).


    ![9781484215012_Fig08-03.jpg](OEBPS/Images/9781484215012_Fig08-03.jpg)


    [Figure 8-3](#9781484215012_Ch08.xhtml#_Fig3). A region visible to a perspective
    camera; near and far distances are indicated by shaded planes.


    The next new class is `ModelBatch`. Just as a `SpriteBatch` object can be used
    to render two-dimensional `Texture` objects, `ModelBatch` is used to render three-dimensional
    objects. The data needed to describe the appearance of a three-dimensional object
    is contained in a `Model` object, which consists of two major components: `Mesh`
    and `Material`. A *mesh* is a collection of vertices, edges, and triangular faces
    that define the shape of an object. A *material* contains color or texture data
    that is applied to the mesh, which defines its appearance while rendering. [Figure
    8-4](#9781484215012_Ch08.xhtml#Fig4) contains two images of a teapot: a wireframe
    representation of the mesh, and its appearance after applying a material. This
    particular teapot is a classic model called the *Utah teapot*, created by the
    computer scientist Martin Newell in 1975. Models can be loaded from standard 3D
    object file formats.


    ![9781484215012_Fig08-04.jpg](OEBPS/Images/9781484215012_Fig08-04.jpg)


    [Figure 8-4](#9781484215012_Ch08.xhtml#_Fig4). The Utah teapot, rendered in wireframe
    (left) and with material applied (right)


    Models can be created in two ways in LibGDX. Using the `ModelLoader` class, a
    model can be loaded from standard 3D object file formats (such as Wavefront, typically
    indicated by the `.obj` file extension), which may also contain references to
    image files used by the accompanying material. Alternatively, some basic shapes
    (such as spheres and boxes) can be generated at runtime using the `ModelBuilder`
    class. You will see examples of both of these approaches over the course of this
    chapter.


    Finally, in order to give 3D models a realistic appearance, the effects of light
    sources need to be considered. In fact, if lights are not added to a scene, you
    will not be able to see anything at all! Lights are managed by the `Environment`
    class. The two types of lighting effects you will use are ambient light and directional
    light. *Ambient light* provides overall illumination, and shines equally from
    all directions. Typically, it is important to include ambient light in a scene
    so that even the sides facing away from a light source will still be somewhat
    visible (although this amount may vary depending on the type of location you are
    simulating). A *directional light* is used to simulate light shining throughout
    the scene in a particular direction. This helps provide a sense of depth in a
    scene, in particular, allowing you to distinguish between different faces when
    an object''s material consists of just a single color.


    [Figure 8-5](#9781484215012_Ch08.xhtml#Fig5) illustrates these effects with two
    renderings of a cube. In the image on the left, the scene contains only ambient
    light, which makes it difficult to see all the edges of the cube. The image on
    the right has a directional light, primarily aimed toward the left (and thus the
    right side of the cube appears brightest).


    ## Creating a Minimal 3D Demo


    Using the previously mentioned classes, you are now ready for a minimal code example
    that renders a cube in LibGDX. The result is a single blue box, oriented as on
    the right side of [Figure 8-5](#9781484215012_Ch08.xhtml#Fig5). You begin by creating
    a new project in BlueJ called `Project3D`. You don''t need to copy any classes
    or assets to this project at this time. Rather than starting with the `Game` class
    as usual (which implements the `ApplicationListener` interface methods), you''ll
    make this example self-contained and instead implement the interface yourself.


    ![9781484215012_Fig08-05.jpg](OEBPS/Images/9781484215012_Fig08-05.jpg)


    [Figure 8-5](#9781484215012_Ch08.xhtml#_Fig5). A cube illuminated with ambient
    light only (left), and directional light added (right)'
