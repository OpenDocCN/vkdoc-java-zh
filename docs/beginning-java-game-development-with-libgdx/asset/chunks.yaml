    Repetition Statements


    The while statement is used to repeat a set of statements as long as a given condition
    is true. For example, the following code will continue to add 5 to the variable
    score, and subtract 1 from the value of stars, as long as the value of stars is
    greater than 0:


    ```

    while (stars > 0)

    {

        score += 5;

        stars -= 1;

    }

    ```


    A while statement is particularly useful when a set of statements needs to be
    repeated an unknown number of times. You must be careful when using a while statement,
    because if the associated condition always remains true, then the statements will
    continue to execute forever!


    The for statement is used to repeat a set of statements a fixed number of times.
    In typical usage, a variable is set to an initial value, and as long as a condition
    involving the variable is true, a set of statements is executed. Afterward, the
    value of the variable is changed by a given amount, the condition is checked again,
    and so forth, until the given condition evaluates to false. The following example
    initially sets a variable n to 1, and as long as n is less than 10, adds 3 to
