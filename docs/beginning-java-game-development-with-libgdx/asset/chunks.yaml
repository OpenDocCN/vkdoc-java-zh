  raw: 'To begin, recall that the Actor class stored transformation data (position,
    rotation, and scale) and methods to get, set, and change these values. All Actor
    objects contained an act method, which could be used to update their internal
    state, and a draw method, which the actor could use to render itself with a given
    Batch object. You then wrote an extension of the Actor class, called the BaseActor
    class, which additionally stored a Texture, a Polygon for collision detection,
    and related methods. Here the BaseActor3D class will be presented, which will
    provide similar functionality in a 3D setting.


    Some of the most complicated underlying concepts in 3D graphics are the mathematical
    structures used to store the transformation data. I won’t go into great detail
    here,[¹](#9781484215012_Ch08.xhtml#Fn1)but for this example, it’s important to
    know what the objects are and how to use their associated methods.


    The transformation data for a ModelInstance object is stored in its transform
    field as a Matrix4 object: a four-by-four grid of numbers. From this object, you
    can extract a Vector3 that contains the position of the object. You can also extract
    another Vector3 that contains the scaling factor in each direction (initialized
    to 1 in all directions, which results in no change in the default size). The transformation
    also stores the orientation of the model, which *cannot* be stored with a single
    number (in contrast to the rotation value of an Actor), because an object in three-dimensional
    space can be rotated any amount around any combination of the x, y, and z axes.
    For many technical reasons (such as computation, performance, and avoiding a phenomena
    known as *gimbal lock*[²](#9781484215012_Ch08.xhtml#Fn2)), an object called a
    Quaternion (corresponding to a mathematical object of the same name) is used to
    store orientation data. For convenience, rather than work with the Matrix4 directly,
    you’ll maintain separate objects to store the position, rotation, and scale data
    for each BaseActor3D object, and combine them into a Matrix4 and store it in the
    ModelInstance when needed.


    The next code listing presents the core of the BaseActor3D class: import statements,
    variable declarations, and the fundamental methods. This first set of methods
    includes the constructor; a method to set the ModelInstance for this actor; the
    calculateTransform method to combine the position, rotation, and scale data into
    a Matrix4; the act method to update the transformation data of the model instance;
    and the draw method to render the model instance using the supplied ModelBatch
    and Environment.


    ```

    import com.badlogic.gdx.graphics.g3d.Environment;

    import com.badlogic.gdx.graphics.g3d.ModelBatch;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;

    import com.badlogic.gdx.graphics.g3d.Material;

    import com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.math.Vector3;

    import com.badlogic.gdx.math.Quaternion;

    import com.badlogic.gdx.math.Matrix4;


    public class BaseActor3D

    {

        private ModelInstance modelData;

        private final Vector3 position;

        private final Quaternion rotation;

        private final Vector3 scale;


    public BaseActor3D()

        {

            modelData = null;

            position  = new Vector3(0,0,0);

            rotation  = new Quaternion();

            scale     = new Vector3(1,1,1);

        }


    public void setModelInstance(ModelInstance m)

        {  modelData = m;  }


    public Matrix4 calculateTransform()

        {  return new Matrix4(position, rotation, scale);  }


    public void act(float dt)

        {  modelData.transform.set( calculateTransform() );  }


    public void draw(ModelBatch batch, Environment env)

        {  batch.render(modelData, env);  }


    }

    ```


    Next are a variety of methods related to the position variable: get and set methods,
    and methods to add values to the current position coordinates. For convenience,
    this code includes overloaded variations of the methods that allow either a Vector3
    or individual float inputs to be used.


    ```

    public Vector3 getPosition()

    {  return position;  }


    public void setPosition(Vector3 v)

    {  position.set(v);  }


    public void setPosition(float x, float y, float z)

    {  position.set(x,y,z);  }


    public void addPosition(Vector3 v)

    {  position.add(v);  }


    public void addPosition(float x, float y, float z)

    {  addPosition( new Vector3(x,y,z) );  }

    ```


    Next, let’s discuss the rotation abilities of these actors. For simplicity, you’re
    going to limit the actor to “turning” left and right, which you can more formally
    define as rotating around the y-axis, which points upward in this 3D world, as
    illustrated in [Figure 8-1](#9781484215012_Ch08.xhtml#Fig1).[³](#9781484215012_Ch08.xhtml#Fn3)
    We will refer to this as the *turn angle.*[⁴](#9781484215012_Ch08.xhtml#Fn4) There
    will be methods to get, set, and adjust this value, each of which are implemented
    using methods from the Quaternion class.


    ```

    public float getTurnAngle()

    {  return rotation.getAngleAround(0,-1,0);  }


    public void setTurnAngle(float degrees)

    {  rotation.set( new Quaternion(Vector3.Y,degrees) );  }


    public void turn(float degrees)

    {  rotation.mul( new Quaternion(Vector3.Y,-degrees) );  }

    ```


    Also, methods must be written that enable an actor to move in directions relative
    to its current orientation. When a BaseActor3D is first initialized, it will be
    assumed that the forward direction is represented by the vector (0, 0, –1), since
    the initial position of the camera will have a positive z coordinate, and the
    actor will be facing away from the camera. Similarly, the initial upward direction
    is the vector (0, 1, 0), and the rightward direction is the vector (1, 0, 0).
    After the actor has been rotated, the relative forward, upward, and rightward
    directions can be determined by transforming these original vectors by the actor’s
    current rotation. Then to move a given distance in one of these relative directions,
    you can scale the corresponding vector by the desired distance, and add the result
    to the current position. The methods that enable the actor to move in these ways
    are given here:


    ```

    public void moveForward(float dist)

    {  addPosition( rotation.transform( new Vector3(0,0,-1) ).scl( dist ) );  }


    public void moveUp(float dist)

    {  addPosition( rotation.transform( new Vector3(0,1,0) ).scl( dist ) );  }


    public void moveRight(float dist)

    {  addPosition( rotation.transform( new Vector3(1,0,0) ).scl( dist ) );  }

    ```


    Finally, a few convenience methods will be included. First is setColor, which
    can be used to change the color of the material belonging to this particular model
    instance. In addition are copy and clone methods, to facilitate the creation of
    additional BaseActor3D objects from a given template instance at a later time.


    ```

    public void setColor(Color c)

    {

        for (Material m : modelData.materials)

            m.set( ColorAttribute.createDiffuse(c) );

    }


    public BaseActor3D clone()

    {

        BaseActor3D newbie = new BaseActor3D();

        newbie.copy(this);

        return newbie;

    }


    public void copy(BaseActor3D orig)

    {

        this.modelData = new ModelInstance(orig.modelData);

        this.position.set( orig.position );

        this.rotation.set( orig.rotation );

        this.scale.set( orig.scale );

    }

    ```


    This completes the BaseActor3D class—for now. A later section discusses collision
    detection, and adds the associated variables and methods. At present, let’s turn
    our attention to writing a complementary class that can be used to manage all
    these actors: the Stage3D class.


    The Stage3D Class'
  trans: '

    首先，回顾一下，Actor 类存储了变换数据（位置、旋转和缩放）以及用于获取、设置和更改这些值的方法。所有 Actor 对象都包含一个 act 方法，用于更新其内部状态，以及一个
    draw 方法，Actor 可以使用该方法通过给定的 Batch 对象渲染自身。接着，你编写了 Actor 类的扩展，即 BaseActor 类，它额外存储了一个
    Texture、一个用于碰撞检测的 Polygon 以及相关方法。现在将介绍 BaseActor3D 类，它将在 3D 环境中提供类似的功能。


    3D 图形中一些最复杂的基础概念是用于存储变换数据的数学结构。我不会在此深入探讨细节，¹ 但对于这个示例，了解这些对象是什么以及如何使用它们关联的方法非常重要。


    ModelInstance 对象的变换数据存储在其 transform 字段中，作为一个 Matrix4 对象：一个四乘四的数字网格。从这个对象中，你可以提取一个包含对象位置的
    Vector3。你还可以提取另一个包含每个方向缩放因子的 Vector3（所有方向初始化为 1，这意味着默认大小不变）。变换还存储了模型的朝向，这*不能*用单个数字存储（与
    Actor 的旋转值不同），因为三维空间中的对象可以绕 x、y 和 z 轴的任意组合进行任意角度的旋转。出于许多技术原因（例如计算、性能以及避免一种称为*万向锁*²
    的现象），使用一个称为 Quaternion（对应于同名的数学对象）的对象来存储朝向数据。为了方便起见，你不会直接操作 Matrix4，而是维护单独的对象来存储每个
    BaseActor3D 对象的位置、旋转和缩放数据，然后将它们组合成一个 Matrix4，并在需要时存储到 ModelInstance 中。


    接下来的代码清单展示了 BaseActor3D 类的核心：导入语句、变量声明和基本方法。这第一组方法包括构造函数；一个用于为此 Actor 设置 ModelInstance
    的方法；用于将位置、旋转和缩放数据组合成 Matrix4 的 calculateTransform 方法；用于更新模型实例变换数据的 act 方法；以及用于使用提供的
    ModelBatch 和 Environment 渲染模型实例的 draw 方法。


    ```

    import com.badlogic.gdx.graphics.g3d.Environment;

    import com.badlogic.gdx.graphics.g3d.ModelBatch;

    import com.badlogic.gdx.graphics.g3d.ModelInstance;

    import com.badlogic.gdx.graphics.g3d.Material;

    import com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.math.Vector3;

    import com.badlogic.gdx.math.Quaternion;

    import com.badlogic.gdx.math.Matrix4;


    public class BaseActor3D

    {

        private ModelInstance modelData;

        private final Vector3 position;

        private final Quaternion rotation;

        private final Vector3 scale;


    public BaseActor3D()

        {

            modelData = null;

            position  = new Vector3(0,0,0);

            rotation  = new Quaternion();

            scale     = new Vector3(1,1,1);

        }


    public void setModelInstance(ModelInstance m)

        {  modelData = m;  }


    public Matrix4 calculateTransform()

        {  return new Matrix4(position, rotation, scale);  }


    public void act(float dt)

        {  modelData.transform.set( calculateTransform() );  }


    public void draw(ModelBatch batch, Environment env)

        {  batch.render(modelData, env);  }


    }

    ```


    接下来是与位置变量相关的各种方法：获取和设置方法，以及向当前位置坐标添加值的方法。为了方便起见，此代码包含了方法的重载变体，允许使用 Vector3 或单独的浮点数输入。


    ```

    public Vector3 getPosition()

    {  return position;  }


    public void setPosition(Vector3 v)

    {  position.set(v);  }


    public void setPosition(float x, float y, float z)

    {  position.set(x,y,z);  }


    public void addPosition(Vector3 v)

    {  position.add(v);  }


    public void addPosition(float x, float y, float z)

    {  addPosition( new Vector3(x,y,z) );  }

    ```


    接下来，让我们讨论这些 Actor 的旋转能力。为简单起见，我们将 Actor 限制为“向左”和“向右”转动，更正式的定义是绕 y 轴旋转，该轴在此 3D
    世界中指向上方，如图 8-1 所示。³ 我们将此称为*转向角*。⁴ 将会有获取、设置和调整此值的方法，每个方法都使用 Quaternion 类中的方法实现。


    ```

    public float getTurnAngle()

    {  return rotation.getAngleAround(0,-1,0);  }


    public void setTurnAngle(float degrees)

    {  rotation.set( new Quaternion(Vector3.Y,degrees) );  }


    public void turn(float degrees)

    {  rotation.mul( new Quaternion(Vector3.Y,-degrees) );  }

    ```


    此外，还必须编写允许 Actor 相对于其当前朝向移动的方法。当 BaseActor3D 首次初始化时，假设前进方向由向量 (0, 0, –1) 表示，因为相机的初始位置将具有正的
    z 坐标，并且 Actor 将背对相机。类似地，初始向上方向是向量 (0, 1, 0)，向右方向是向量 (1, 0, 0)。在 Actor 旋转后，可以通过将这些原始向量乘以
    Actor 的当前旋转来确定相对的前进、向上和向右方向。然后，要沿这些相对方向之一移动给定距离，可以将相应的向量缩放所需的距离，并将结果添加到当前位置。使
    Actor 能够以这些方式移动的方法如下所示：


    ```

    public void moveForward(float dist)

    {  addPosition( rotation.transform( new Vector3(0,0,-1) ).scl( dist ) );  }


    public void moveUp(float dist)

    {  addPosition( rotation.transform( new Vector3(0,1,0) ).scl( dist ) );  }


    public void moveRight(float dist)

    {  addPosition( rotation.transform( new Vector3(1,0,0) ).scl( dist ) );  }

    ```


    最后，将包含一些便捷方法。首先是 setColor，可用于更改此特定模型实例所属材质的颜色。此外还有 copy 和 clone 方法，以便稍后从给定的模板实例创建额外的
    BaseActor3D 对象。


    ```

    public void setColor(Color c)

    {

        for (Material m : modelData.materials)

            m.set( ColorAttribute.createDiffuse(c) );

    }


    public BaseActor3D clone()

    {

        BaseActor3D newbie = new BaseActor3D();

        newbie.copy(this);

        return newbie;

    }


    public void copy(BaseActor3D orig)

    {

        this.modelData = new ModelInstance(orig.modelData);

        this.position.set( orig.position );

        this.rotation.set( orig.rotation );

        this.scale.set( orig.scale );

    }

    ```


    至此，BaseActor3D 类就完成了——目前是这样。稍后的部分将讨论碰撞检测，并添加相关的变量和方法。现在，让我们将注意力转向编写一个可用于管理所有这些
    Actor 的补充类：Stage3D 类。


    Stage3D 类

    '
- fmt: "回忆一下，`LibGDX`的`Stage`对象负责处理渲染任务（使用其内部的`Camera`和`Batch`对象），并管理一个`Actor`对象列表。`Stage`类中还有`act`和`draw`方法，它们会调用所有已附加角色的`act`和`draw`方法。你将通过`Stage3D`类创建类似的功能。首先，呈现该类的核心部分。在导入语句之后，声明了渲染所需的变量：`Environment`、`PerspectiveCamera`和`ModelBatch`。在构造函数中，你基本上复制了上一个示例中用于初始化这些对象的代码。声明了一个`ArrayList`来存储`BaseActor3D`对象，并在构造函数中初始化。\n\
    \n```java\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.Color;\n\
    import com.badlogic.gdx.math.Vector3;\nimport com.badlogic.gdx.graphics.PerspectiveCamera;\n\
    import com.badlogic.gdx.graphics.g3d.Environment;\nimport com.badlogic.gdx.graphics.g3d.ModelBatch;\n\
    import com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;\nimport com.badlogic.gdx.graphics.g3d.environment.DirectionalLight;\n\
    import java.util.ArrayList;\n\npublic class Stage3D\n{\n    private Environment\
    \ environment;\n    private PerspectiveCamera camera;\n    private final ModelBatch\
    \ modelBatch;\n    private ArrayList<BaseActor3D> actorList;\n\npublic Stage3D()\n\
    \    {\n        environment = new Environment();\n        environment.set(new\
    \ ColorAttribute(ColorAttribute.AmbientLight, 0.7f, 0.7f, 0.7f, 1));\n\nDirectionalLight\
    \ dLight = new DirectionalLight();\n       Color lightColor = new Color(0.9f,\
    \ 0.9f, 0.9f, 1);\n       Vector3 lightVector = new Vector3(-1.0f, -0.75f, -0.25f);\n\
    \       dLight.set( lightColor, lightVector );\n       environment.add( dLight\
    \ ) ;\n\ncamera = new PerspectiveCamera(67, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());\n\
    \        camera.position.set(10f, 10f, 10f);\n        camera.lookAt(0,0,0);\n\
    \        camera.near = 0.01f;\n        camera.far = 1000f;\n        camera.update();\n\
    \nmodelBatch = new ModelBatch();\n\nactorList = new ArrayList<BaseActor3D>();\n\
    \    }\n}\n```\n\n接下来是`act`和`draw`方法，它们会调用`ArrayList`中所有`BaseActor3D`对象的对应方法。此外，`camera`在`act`方法中更新。\n\
    \n```java\npublic void act(float dt)\n{\n    camera.update();\n    for (BaseActor3D\
    \ ba : actorList)\n        ba.act(dt);\n}\n\npublic void draw()\n{\n    modelBatch.begin(camera);\n\
    \    for (BaseActor3D ba : actorList)\n        ba.draw(modelBatch, environment);\n\
    \    modelBatch.end();\n}\n```\n\n以下是添加和移除角色的方法，代码如下：\n\n```java\npublic void\
    \ addActor(BaseActor3D ba)\n{  actorList.add( ba );  }\n\npublic void removeActor(BaseActor3D\
    \ ba)\n{  actorList.remove( ba );  }\n```\n\n该类的最后一部分是一组用于调整`camera`的广泛方法。首先是设置`camera`位置以及按给定量移动`camera`的方法；这些值可以通过`Vector3`对象或三个`float`值来指定：\n\
    \n```java\npublic void setCameraPosition(float x, float y, float z)\n{  camera.position.set(x,y,z);\
    \  }\n\npublic void setCameraPosition(Vector3 v)\n{  camera.position.set(v); \
    \ }\n\npublic void moveCamera(float x, float y, float z)\n{  camera.position.add(x,y,z);\
