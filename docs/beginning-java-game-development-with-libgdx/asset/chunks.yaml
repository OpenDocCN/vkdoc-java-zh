    mainStage3D.setCameraDirection(0,0,0);\n```\n\n最后，需要考虑`update`方法，它处理*大量*潜在的玩家输入。玩家使用键盘上的`W`/`A`/`S`/`D`键进行控制，分别对应向前/向左/向后/向右移动，这是许多电脑游戏中的标准配置。在此标准基础上，你还添加了`R`和`F`键用于向上和向下移动（我们将其视为上升和下降方向）。你还使用`Q`和`E`键来向左和向右转动（这似乎也容易记忆，因为这些键位于左右移动键的上方）。当同时按下`Shift`键时，可以使用相同的键以相同的方式控制相机。还可以使用`T`和`G`键向上和向下倾斜相机（你可以使用助记词*Top*和*Ground*来记忆）。以下是完成所有这些任务的代码，如前所述，应将其包含在`update`方法中：\n\
