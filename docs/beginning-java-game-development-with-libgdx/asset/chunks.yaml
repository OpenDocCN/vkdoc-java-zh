    Finally, you design and create the update method. The turtle is controlled by
    the arrow keys, but the movement is from the perspective of the turtle. The left
    and right arrow keys rotate the turtle to the left and right, and the up arrow
    key accelerates the turtle forward, in whatever direction the turtle is currently
    facing. The next lines of code switch the turtle’s animation to rest or swim,
    if necessary, based on the turtle’s current speed. After that, the turtle object
    is bound to the game-world area, so that it can’t move off-screen. Then you check
    to see whether the turtle is overlapping any of the rock objects, and resolve
    the position of the turtle if so. Finally, you check to see whether the turtle
    is overlapping any of the starfish objects (the starfish are not solid, so you
    don’t need to resolve the turtle’s position in this case). When there is an overlap,
    you want to remove the starfish from the game: both from the Stage that is rendering
    it, and from the ArrayList that is used for collision detection. This last step
    is tricky, because you can’t remove an object from a list at the same time that
    you are iterating through the list; this would be like someone tearing the pages
    out of a book while you’re trying to read it (in Java, this is called a ConcurrentModificationException
    error). Therefore, when you identify a starfish that you want to remove from the
    game, you add it to a list of objects to delete later, and then afterward you
    iterate through this second list, at which time you can safely remove the starfish
    from the Stage and the original ArrayList. The code for the update method is shown
    here:


    ```

    public void update(float dt)

    {

        // process input

        turtle.setAccelerationXY(0,0);


    if (Gdx.input.isKeyPressed(Keys.LEFT))

            turtle.rotateBy(90 * dt);

        if (Gdx.input.isKeyPressed(Keys.RIGHT))

            turtle.rotateBy(-90 * dt);

        if (Gdx.input.isKeyPressed(Keys.UP))

            turtle.accelerateForward(100);


    // set correct animation

        if ( turtle.getSpeed() > 1 && turtle.getAnimationName().equals("rest") )

            turtle.setActiveAnimation("swim");

        if ( turtle.getSpeed() < 1 && turtle.getAnimationName().equals("swim") )

            turtle.setActiveAnimation("rest");


    // bound turtle to the screen

        turtle.setX( MathUtils.clamp( turtle.getX(), 0,  mapWidth - turtle.getWidth()
    ));

        turtle.setY( MathUtils.clamp( turtle.getY(), 0,  mapHeight - turtle.getHeight()
    ));


    for (BaseActor r : rockList)

        {

            turtle.overlaps(r, true);

        }


    ArrayList<BaseActor> removeList = new ArrayList<BaseActor>();

        for (BaseActor s : starfishList)

        {

            if ( turtle.overlaps(s, false) )

                removeList.add(s);

        }


    for (BaseActor b : removeList)

        {

            b.remove();             // remove from stage

            starfishList.remove(b); // remove from list used by update

        }

    }

