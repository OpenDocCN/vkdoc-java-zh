- fmt: '`create`方法的最后一步是设置一个`ContactListener`，它将被添加到`World`对象中，用于响应所有碰撞事件（类似于`InputListener`对象用于响应用户输入事件）。当`World`对象在`update`方法中运行物理模拟时，如果任何两个`Fixture`发生碰撞，`ContactListener`将处理游戏逻辑中接下来应该发生的事情。


    事实证明，`Contact`对象使用起来有点棘手。它们存储了发生接触的两个`Fixture`对象的引用；可以通过`Contact`类的方法`getFixtureA`和`getFixtureB`获取这些引用。然而，出于游戏逻辑的目的，你需要确定这些`Fixture`是否属于某种类型的对象，如果是，则返回该对象（如果不是，则返回`null`）。这个任务将由一个名为`getContactObject`的实用方法完成，该方法接受正在检查的`Contact`对象以及正在搜索的对象类型的`Class`作为参数。（Java中的每个类都有一个名为`class`的静态字段，可用于标识其对象类型，例如`Coin.class`或`Player.class`。对于类未知的对象，可以使用`getClass`方法来确定正确的类。）如果`Contact`对象包含一个`Body`的`Fixture`，该`Body`对应一个具有指定`Class`的对象，那么`getContactObject`方法将返回对该对象的引用。


    还有一个重载版本的`getContactObject`方法，它额外有一个对应于名称的`String`参数，并且仅当关联的类具有给定类型*且*关联的`Fixture`具有给定名称时，才返回一个`Object`。为了使这些方法正常工作，`Body`用户数据必须存储关联对象的引用，并且`Fixture`用户数据必须存储`Fixture`的名称。完成这些任务的代码如下所示，应包含在`GameUtils`类中。首先，添加导入语句：


    ```

    import com.badlogic.gdx.physics.box2d.Contact;

    ```


    然后添加以下方法：


    ```

    public static Object getContactObject(Contact theContact, Class theClass)

    {

        Object objA = theContact.getFixtureA().getBody().getUserData();

        Object objB = theContact.getFixtureB().getBody().getUserData();


    if (objA.getClass().equals(theClass) )

            return objA;

        else if (objB.getClass().equals(theClass) )

            return objB;

        else

            return null;

    }


    public static Object getContactObject(Contact theContact, Class theClass, String
    fixtureName)

    {

        Object objA  = theContact.getFixtureA().getBody().getUserData();

        String nameA = (String)theContact.getFixtureA().getUserData();

        Object objB  = theContact.getFixtureB().getBody().getUserData();

        String nameB = (String)theContact.getFixtureB().getUserData();


    if ( objA.getClass().equals(theClass) && nameA.equals(fixtureName) )

            return objA;

        else if ( objB.getClass().equals(theClass) && nameB.equals(fixtureName))

            return objB;

        else

            return null;

    }

    ```


    有了这些实用方法，你现在可以回到`GameScreen`类，编写一个实现`ContactListener`接口的匿名内部类。必须编写的方法称为`beginContact`、`endContact`、`preSolve`和`postSolve`。后两个方法在此游戏中不需要，因此这里不涉及。另外两个方法`beginContact`和`endContact`非常有用；它们分别在一对`Fixture`首次相互接触时以及一对`Fixture`停止接触时被调用。


    对游戏重要的接触事件类型如下：


    *   当一个`Coin`对象和一个`Player`对象的“main”`Fixture`首次接触时，该硬币应被添加到`removeList`中。这在`beginContact`方法中处理。

    *   如果任何固体（即非`Coin`）对象与`Player`的“bottom”`Fixture`首次接触，则将玩家的地面计数变量加1，并将玩家的动画设置为站立。这也在`beginContact`方法中处理。

    *   如果任何固体（即非`Coin`）对象与`Player`的“bottom”`Fixture`脱离接触，则将玩家的地面计数变量减1。这在`endContact`方法中处理。


    这些任务由以下代码实现：


    ```

    world.setContactListener(

        new ContactListener()

        {

            public void beginContact(Contact contact)

            {

                Object objC = GameUtils.getContactObject(contact, Coin.class);

                if (objC != null)

                {

                    Object p = GameUtils.getContactObject(contact, Player.class, "main");

                    if (p != null)

                    {

                        Coin c = (Coin)objC;

                        removeList.add( c );

                    }


    return; // avoid possible jumps

                }

                Object objP = GameUtils.getContactObject(contact, Player.class, "bottom");

                if ( objP != null )

                {

                    Player p = (Player)objP;

                    p.adjustGroundCount(1);

                    p.setActiveAnimation("stand");

                }

            }


    public void endContact(Contact contact)

            {

                Object objC = GameUtils.getContactObject(contact, Coin.class);

                if (objC != null)

                    return;

                Object objP = GameUtils.getContactObject(contact, Player.class, "bottom");

                if ( objP != null )

                {

                    Player p = (Player)objP;

                    p.adjustGroundCount(-1);

                }

            }


    public void preSolve(Contact contact, Manifold oldManifold) { }


    public void postSolve(Contact contact, ContactImpulse impulse) { }


    });

    ```


    至此，`create`方法就完成了。由于前面的`ContactListener`对象中包含所有游戏逻辑代码，`update`方法非常简短。首先，清除`removeList`的内容。然后，假设游戏以每秒60帧的速度运行，使用`World`对象的`step`方法激活物理模拟。在模拟过程中，`ContactListener`可能会被激活，并且对象可能会被添加到`removeList`中；如果是这样，将它们从其`Stage`中移除，并从`World`中移除相应的`Body`。[³](#9781484215012_Ch07.xhtml#Fn3)
    然后处理连续的用户输入：如果用户正在按下左或右箭头键，则施加一个力，使玩家向相应方向移动。根据玩家的速度设置站立和行走动画。（请注意，如果玩家的跳跃动画正在播放，切换到站立动画的唯一方法是当玩家落地时，这已由前面的`ContactListener`代码处理。）


    ```

    public void update(float dt)

    {

        removeList.clear();

        world.step(1/60f, 6, 2);

        for (Box2DActor ba : removeList)

        {

            ba.destroy();

            world.destroyBody( ba.getBody() );

        }


    if( Gdx.input.isKeyPressed(Keys.LEFT) )

        {

            player.setScale(-1,1);

            player.applyForce( new Vector2(-3.0f, 0) );

        }


    if( Gdx.input.isKeyPressed(Keys.RIGHT) )

        {

            player.setScale(1,1);

            player.applyForce( new Vector2(3.0f, 0) );

        }


    if ( player.getSpeed() > 0.1 && player.getAnimationName().equals("stand") )

            player.setActiveAnimation("walk");

        if ( player.getSpeed() < 0.1 && player.getAnimationName().equals("walk") )

            player.setActiveAnimation("stand");

    }

    ```


