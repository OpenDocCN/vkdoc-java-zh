- fmt: "# 驱动类与 LibGDX 框架\n\n## 驱动类\n\n一个*驱动类*（有时也称为*主类*、*入口点*、*启动类*或*启动器类*）是一个用于驱动另一个类执行的类，通常涉及创建该类的实例并调用其一个或多个方法。驱动类通常只需要一个方法来完成此任务；这个方法传统上称为`main`。由于它是程序调用的第一个方法，`main`方法*必须*是静态的，因为当程序启动时，没有可用的实例来运行基于实例的方法。如果`main`方法不是静态的，我们就会遇到类似于哲学难题的问题：先有鸡还是先有蛋？必须有一种方法能够在自身未被实例化的情况下实例化一个类，而这正是驱动类的静态`main`方法所做的事情。\n\
    \n一个标准的“Hello, World!”程序可以使用驱动类重写如下：\n\n```java\npublic class Greeter\n{\n   \
    \ public void sayHello()\n    {\n        System.out.print(\"Hello!\");\n    }\n\
    }\n\npublic class Launcher\n{\n    public static void main()\n    {\n        Greeter\
    \ greta = new Greeter();\n        greta.sayHello();\n    }\n}\n```\n\n接下来，在同一个项目中，创建一个名为`HelloLauncher`的类，包含以下代码：\n\
    \n```java\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\npublic class\
    \ HelloLauncher\n{\n    public static void main (String[] args)\n    {\n     \
    \   HelloWorldImage myProgram = new HelloWorldImage();\n        LwjglApplication\
    \ launcher = new LwjglApplication( myProgram );\n    }\n}\n```\n\n如之前的“静态方法和驱动类”侧边栏所述，该类首先创建了一个`HelloWorldImage`类的实例，名为`myProgram`。然后，`main`方法没有直接运行`myProgram`的方法，而是创建了一个`LwjglApplication`对象，该对象将`myProgram`作为输入；构造函数执行一些初始化任务，然后按之前讨论的方式运行`myProgram`的`create`和`render`方法。\n\
    \n缩写*LWJGL*代表*轻量级Java游戏库*（Lightweight Java Game Library），这是一个由Caspian Rychlik-Prince创建的开源Java库，旨在简化游戏开发中访问桌面计算机硬件资源的过程。在LibGDX中，LWJGL用于桌面后端，以支持所有主要的桌面操作系统，如Windows、Linux和Mac\
    \ OS X。\n\n拥有一个独立于包含游戏功能的类的驱动类的另一个好处是，可以为其他平台（如Android，LibGDX也支持该平台）创建驱动类。\n\n\
    当您为两个类都输入了所有代码后，返回BlueJ的主窗口，点击编译按钮。然后右键单击`HelloLauncher`类的橙色矩形，在出现的方法列表中，选择列出的`void\
    \ main(String[] args)`方法。会弹出一个窗口，如果需要，您可以在其中输入一个字符串数组作为输入——但您不需要这样做。点击确定按钮，您应该会看到一个窗口，如[图1-5](#9781484215012_Ch01.xhtml#Fig5)所示。\n\
    \n恭喜您完成了第一个使用LibGDX的应用程序！\n\n## 使用LibGDX的优势\n\n除了能够编译游戏使其在多个平台上运行之外，使用LibGDX游戏开发框架还有许多其他优势。LibGDX使得完成以下任务变得容易：\n\
    \n- 渲染2D图形、动画、基于位图的字体和粒子效果\n- 流式播放音乐和播放音效\n- 处理来自键盘、鼠标、触摸屏、加速度计或游戏手柄的输入\n- 使用场景图和完全可换肤的UI控件库组织用户界面\n\
    - 集成第三方插件，如Box2D物理引擎（box2d.org）、Tiled地图编辑器文件格式（mapeditor.org）和Spine 2D动画软件（esotericsoftware.com）\n\
    - 使用材质和光照效果渲染3D图形，并从常见文件格式（如OBJ和FBX）加载3D模型\n\nLibGDX功能的完整列表可在网站[http://libgdx.badlogicgames.com/features.html](http://libgdx.badlogicgames.com/features.html)上找到。\n\
    \n## 总结\n\n在本章中，您已经设置了BlueJ（一个用于Java编程的集成开发环境），并配置BlueJ使用LibGDX游戏开发框架。然后，您创建了第一个使用LibGDX的应用程序：一个“Hello,\
    \ World!”程序，该程序在窗口中显示一个世界图像。该程序涉及扩展LibGDX的`Game`类，并创建一个在桌面上运行程序的驱动类。在此过程中，您还了解了该程序中涉及的一些其他类。最后，您了解了LibGDX库的一些附加功能，其中许多功能将在后续章节中详细讨论。\n\
    \n______________________\n\n[¹](#9781484215012_Ch01.xhtml#_Fn1)由于在此示例中纹理和坐标都没有变化，因此`render`方法被重复调用的事实在这里无关紧要。但是，如果您定期更改图像，则可以生成动画；如果您逐渐更改坐标，则可以模拟运动。您将在下一章中了解如何实现这两种变化。\n\
    \n# 第2章\n\n![image](OEBPS/Images/frontdot.jpg)\n\n## LibGDX框架\n\n本章介绍LibGDX库的许多主要功能。它说明了如何在创建名为*Cheese,\
    \ Please!*的游戏过程中使用这些功能，在该游戏中，您帮助玩家角色Mousey在地板上四处奔跑，寻找一块美味的奶酪。该游戏运行时的截图如[图2-1](#9781484215012_Ch02.xhtml#Fig1)所示。您将看到几种完成标准游戏编程任务的方法，例如表示游戏实体。然后，您将逐步添加各种功能，例如动画、用户界面和介绍性菜单屏幕。\n\
