    Next Steps


    Despite the advanced mechanics, by no means is this a finished product, similar
    to the situation at the end of the Balloon Buster game section. However, with
    what you’ve covered in the previous examples, you’re ready to add more features
    yourself, such as these:


    *   A start screen, which contains directions and a lists of keys to press, or
    has a button image to click in order to load the TurtleLevel screen and start
    the game.

    *   A Label in the user interface that states how many starfish remain to be collected.

    *   For added challenge, make the game world larger than the window, so that not
    all the starfish are visible at the same time, and add extra rocks to make the
    game world more maze-like and extra starfish that are located in regions of the
    game world not immediately visible at the start of the game.

    *   Add some special effects using the Actions class, such as making that starfish
    slowly rotate, and once a starfish is collected, have it fade out before it is
    removed from the stage.

    *   Add a You Win message to the game that fades in after all the starfish have
    been collected.


    Summary


    In this chapter, you created a set of reusable classes that can greatly streamline
    the code development process for future projects. You refactored the code from
    the previous chapter and created the BaseScreen class, which contains standard
    data and startup tasks common to many games, such as storing and initializing
    Stage objects. You saw how to handle discrete input, such as the initial press
    of a key or the click of a mouse, and created the Balloon Buster game. Finally,
    you created a trio of extensions of the Actor class: BaseActor, which performs
    collision detection and resolution with a generalized polygon shape; AnimatedActor,
    which manages a collection of animations; and PhysicsActor, which stores and processes
    motion-related data such as velocity and acceleration. The use of these classes
    was illustrated with the game Starfish Collector. You’ve come a long way already,
    and in the next chapter you’ll take another leap forward by learning how to incorporate
    sounds and music into your games.


