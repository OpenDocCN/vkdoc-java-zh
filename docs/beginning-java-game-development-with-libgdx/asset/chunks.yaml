  trans: '

    本章介绍了 LibGDX 库的许多特性。你首先了解了游戏程序生命周期的概览，并学习了各个阶段如何通过遵循特定命名约定的方法（由接口强制执行）来执行。你学习了如何使用
    `Gdx` 类处理键盘输入，以及如何使用 `Sprite` 类或 `Actor` 类封装游戏实体数据。你学习了如何使用 `Stage` 类管理 `Actor`
    实例，以及如何扩展 `Actor` 类以获得更强大的功能。接着，你了解了如何通过 `Actions` 类提供的基于值的动画，以及通过 `Animation`
    类提供的基于图像的动画，让角色在视觉上更有趣。然后，我介绍了 `Label`、`LabelStyle` 和 `BitmapFont` 类，帮助你创建第二个
    `Stage` 上的用户界面。你还扩大了游戏世界的尺寸，并学习了如何使用与 `Stage` 关联的 `Camera` 来显示游戏世界的正确部分。最后，本章介绍了
    `Screen` 接口，它使你能够在与包含游戏逻辑代码的类不同的类中创建开始菜单；你还了解了 `Game` 类如何管理多个屏幕。


    在下一章中，你将创建这些类的自定义扩展，以捕捉许多游戏中的共同特性，并了解如何将它们用作全新游戏的基础。


    _________________________


    ¹通常无需以比这更快的速度运行，因为大多数计算机显示硬件无法以高于此速率显示图像。


    ²下一章将介绍如何更直观地组织代码，以便更新和渲染阶段由不同的方法处理。


    ³选择让 y 值向上增加的设计，虽然符合数学惯例，但与大多数计算机科学坐标系惯例相反，后者将原点 (0,0) 置于窗口左上角，y 值向下增加。


    ⁴对于放大字体，应谨慎使用此方法，因为它可能导致图像看起来像素化。可以通过在位图字体图像上使用线性纹理滤镜来减轻这种效果，但最佳实践是尽可能使用高分辨率图像作为字体。


    ⁵但是，可以通过使用 `Actor` 类的 `setZIndex` 方法，在将 `Actor` 添加到 `Stage` 后重新排列其渲染顺序。


    第三章


    ![image](img/frontdot.jpg)


    扩展框架


    本章首先回顾上一章中 *Cheese, Please!* 游戏的代码。你的主要重点将是通过将通用元素重构为可按需重用的新类，来精简上一章的代码。这也将使引入更高级的特性（例如处理用户输入的新方法）变得更加容易。然后，你将看到你的新类如何用作其他游戏项目的基础。最后，你将通过添加改进的碰撞检测与响应、管理多个动画以及实现基于物理的运动，来改进你对
    `Actor` 类的自定义扩展。


    重温 *Cheese, Please!*


    查看上一章游戏（*Cheese, Please!*）代码的最终版本，你可以观察到实现 `Screen` 的类包含相似的数据（例如 `Stage` 对象）并执行相似的任务（例如调用舞台的
    `act` 和 `draw` 方法）。在计算机编程中，你希望尽可能消除重复并创建可重用的代码，以便你的代码更易于理解和维护。你将在本节中解决这个问题。此外，你将为这些类中的每一个引入一些新功能：


    *   处理离散输入事件的能力——仅在按下按键或点击鼠标按钮时发生一次的操作

    *   暂停游戏的能力，这需要布尔变量 `paused` 来确定游戏当前是否暂停，以及一些相关的辅助方法：`isPaused`、`setPaused` 和
    `togglePaused`

    *   调整窗口大小并使游戏世界实体相应缩放的能力


    为此，你将创建一个名为 `BaseScreen` 的新类，该类管理数据并处理你的类共有的新任务和旧任务。然后，你其他以游戏逻辑为中心的类将扩展 `BaseScreen`
    类，这将大大简化你的代码。然而，在开始编写这个类之前，你需要详细了解两个与实现相关的问题：离散输入和抽象类设计。


    离散输入


    之前，你用来处理输入的方法称为*轮询*：在游戏循环的*每次*迭代中检查输入硬件设备（例如键盘）的状态。这种方法特别适合*连续动作*——只要相应的触发器处于激活状态，这些动作就会在一段时间内持续发生。例如，只要玩家按下方向键，玩家角色就应该持续移动（除非遇到墙壁等固体障碍物）。


    相比之下，像跳跃这样的动作被称为*离散动作*，因为它每次按键只发生一次。即使玩家继续按住跳跃键，玩家角色也*不会*再次跳跃，直到跳跃键被释放并再次按下（前提是角色再次落地！）。


    使用轮询方法处理离散动作很棘手，因此 LibGDX 库提供了一种事件驱动的方法。这涉及编写在某些事件发生时（例如按键的初始按下或释放，或鼠标按钮的点击）自动调用的函数。


    任何对象都可以被分配响应输入事件的责任，但为了正确执行此操作，它必须包含一组特定的方法：即 `InputProcessor` 接口指定的方法。总共有八个这样的方法：`keyDown`、`keyUp`
    和 `keyTyped` 用于处理键盘事件；`touchDown`、`touchUp` 和 `touchDragged` 用于处理鼠标和触摸屏事件；`mouseMoved`
    和 `scrolled` 用于处理鼠标事件。我们将在 `BaseScreen` 类的源代码清单中进一步讨论这些方法。


    本节需要解决的最后一个问题是：你的程序的哪个组件应该承担响应输入事件的责任？例如，`Stage` 类实现了 `InputProcessor` 接口；这对于包含用户界面元素的
    `Stage` 特别有用，因为它使类似按钮的对象在被点击时能够激活方法。同时，你计划让 `BaseScreen` 类也实现 `InputProcessor`
    接口，以便它能够像前面描述的那样处理离散输入。应该由 `Stage` 类还是 `BaseScreen` 类负责响应输入事件？在实践中，你希望两个对象都有机会这样做。这种安排在代码中的实现方式是通过
    `InputMultiplexer` 类。`InputMultiplexer` 对象本身是一个 `InputProcessor`，它包含一个其他 `InputProcessor`
    的列表。你可以将 `Stage` 和 `BaseScreen` 对象添加到一个 `InputMultiplexer` 中，当输入事件发生时，`InputMultiplexer`
    会将信息转发给这些对象中的每一个，并让它们有机会做出相应的响应。


    抽象类设计

