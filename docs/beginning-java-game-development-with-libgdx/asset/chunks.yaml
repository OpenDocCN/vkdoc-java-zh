  trans: '

    事实证明，本书之前创建的所有游戏都存在于三维空间中。你可能已经注意到，在设置摄像机对象的位置时，需要设置 x、y 和 z 三个分量。如果 x 轴和 y 轴分别代表屏幕上的水平方向和垂直方向，那么
    z 轴则对应一条指向观察者的直线，垂直于 *xy 平面*——即包含 x 轴和 y 轴的平面。可以认为摄像机位于 z 轴上，直接指向 xy 平面；所有游戏实体都隐式地将其
    z 坐标设置为 0。这种配置如图 8-1 所示，该图大致展示了摄像机如何观察前几章中的“海星收集者”游戏。


    ![9781484215012_Fig08-01.jpg](img/9781484215012_Fig08-01.jpg)


    图 8-1。摄像机沿 z 轴向下观察“海星收集者”游戏


    我们之前的项目严重依赖于 Stage 类，该类管理 Camera 和 Batch 对象（用于渲染）。要创建 3D 场景，你需要这些对象的“3D 版本”，由
    PerspectiveCamera 和 ModelBatch 类提供，接下来将详细介绍它们。然而，并没有一个对应的类似舞台的对象来管理它们，因此你将在后面的章节中创建自己的管理器类（称为
    Stage3D）。


    要渲染一个场景，你可以使用两种类型的摄像机之一：正交摄像机或透视摄像机。（Stage 类使用 OrthographicCamera 对象进行渲染。）这两者的区别在于它们如何将
    3D 场景表示或投影到 2D 表面（如计算机屏幕）上。为了说明这种区别，考虑一个最简单的 3D 形状：立方体。图 8-2 显示了一个立方体的正交投影和透视投影。在正交投影中，如果物体的边缘长度相同，那么无论它们与观察者的距离如何，在投影中它们都会被绘制成相同的长度。这与透视投影形成对比，在透视投影中，具有相同长度的两条边缘的物体在投影中可能看起来不同；离观察者较远的边缘看起来会更短。这也会产生一个副作用：如果物体的两条边缘平行，那么在正交投影中它们保持平行，但在透视投影中它们看起来会汇聚。（在透视图中，所有这些边缘似乎汇聚的点有时被称为*消失点*。）


    ![9781484215012_Fig08-02.jpg](img/9781484215012_Fig08-02.jpg)


    图 8-2。使用正交投影（左）和透视投影（右）绘制的立方体


    在初始化 PerspectiveCamera 对象时，你必须定义摄像机可见的区域，该区域呈平截头棱锥体或视锥体形状（如图 8-3 所示）。这由五个参数指定：视野（一个角度，表示摄像机向两侧能看多远）、场景投影到的矩形的宽度和高度（由
    LibGDX 中的 Viewport 对象确定），以及近平面和远平面值（表示摄像机在渲染时将包含的最近和最远距离）。


    ![9781484215012_Fig08-03.jpg](img/9781484215012_Fig08-03.jpg)


    图 8-3。透视摄像机可见的区域；近平面和远平面距离由阴影平面表示。


    下一个新类是 ModelBatch。正如 SpriteBatch 对象可用于渲染二维 Texture 对象一样，ModelBatch 用于渲染三维对象。描述三维对象外观所需的数据包含在
    Model 对象中，该对象由两个主要组件组成：Mesh 和 Material。*网格*是定义对象形状的顶点、边和三角形面的集合。*材质*包含应用于网格的颜色或纹理数据，这些数据定义了其在渲染时的外观。图
    8-4 包含一个茶壶的两张图片：网格的线框表示，以及应用材质后的外观。这个特殊的茶壶是一个经典模型，称为*犹他茶壶*，由计算机科学家马丁·纽厄尔于 1975
    年创建。模型可以从标准的 3D 对象文件格式加载。


    ![9781484215012_Fig08-04.jpg](img/9781484215012_Fig08-04.jpg)


    图 8-4。犹他茶壶，以线框渲染（左）和应用材质后（右）


    在 LibGDX 中，可以通过两种方式创建模型。使用 ModelLoader 类，可以从标准的 3D 对象文件格式（例如 Wavefront，通常以 .obj
    文件扩展名表示）加载模型，这些文件可能还包含对随附材质使用的图像文件的引用。或者，可以使用 ModelBuilder 类在运行时生成一些基本形状（例如球体和盒子）。在本章中，你将看到这两种方法的示例。


    最后，为了使 3D 模型具有逼真的外观，需要考虑光源的效果。事实上，如果场景中没有添加灯光，你将什么也看不见！灯光由 Environment 类管理。你将使用的两种光照效果是环境光和方向光。*环境光*提供整体照明，并从所有方向均匀照射。通常，在场景中包含环境光很重要，这样即使背向光源的面也仍然可见（尽管这个量可能因你模拟的位置类型而异）。*方向光*用于模拟沿特定方向照射整个场景的光线。这有助于在场景中提供深度感，特别是当对象的材质仅由单一颜色组成时，可以让你区分不同的面。


    图 8-5 通过一个立方体的两次渲染说明了这些效果。在左侧的图像中，场景仅包含环境光，这使得很难看到立方体的所有边缘。右侧的图像有一个方向光，主要朝向左侧（因此立方体的右侧看起来最亮）。


    创建一个最小的 3D 演示


    使用前面提到的类，你现在可以准备一个在 LibGDX 中渲染立方体的最小代码示例。结果是一个单独的蓝色盒子，方向如图 8-5 右侧所示。你首先在 BlueJ
    中创建一个名为 Project3D 的新项目。此时你不需要将任何类或资源复制到此项目。与通常从 Game 类开始（它实现了 ApplicationListener
    接口方法）不同，你将使这个示例自包含，并自己实现该接口。


    ![9781484215012_Fig08-05.jpg](img/9781484215012_Fig08-05.jpg)


    图 8-5。仅用环境光照明的立方体（左），以及添加了方向光后的立方体（右）

    '
