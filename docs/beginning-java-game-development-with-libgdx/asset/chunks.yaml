    图 2-1。游戏 Cheese, Please! 的主屏幕


    理解游戏的生命周期


    在进入游戏开发的编程方面之前，理解游戏程序的整体结构非常重要：游戏程序经历的主要阶段，以及游戏程序在每个阶段必须执行的任务。这些阶段如下：

