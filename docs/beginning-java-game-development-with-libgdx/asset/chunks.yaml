    无限滚动效果


    接下来，将设置背景元素以实现“无限”滚动效果。为此，需要使用*无缝纹理*：一种可以并排放置且不会产生明显边界的图像。将使用该图像的两个副本，每个副本至少与屏幕一样大。设置方式如图
    6-7 所示；虚线边界矩形包含无缝纹理，实线边界矩形代表游戏屏幕。图像 2 的左边缘紧邻图像 1 的右边缘，两者以相同速度向左移动。当图像 1 的右边缘完全移过屏幕左边缘时，图像
    1 将被重新定位到另一侧：图像 1 的左边缘将紧邻图像 2 的右边缘。此过程无限循环。


