    ```


    方法的调用方式有两种，具体取决于它们的编写方式。某些方法可以从包含它们的类中调用。例如，`Math` 类包含一个名为 `sqrt` 的方法，用于计算一个数的平方根；要使用此方法计算
    4 的平方根，你可以编写 `Math.sqrt(4)`。或者，某些方法是从变量调用的。例如，每个 `String` 变量都包含一个名为 `charAt` 的方法，该方法返回字符串中给定位置的字符。如果你创建一个名为
    `word` 的 `String`，其中包含文本 `games`，那么 `word.charAt(2)` 将返回字符 `m`。


    对象和类


    *对象*是相关数据以及操作这些数据的方法的集合。*类*是一组代码，用作可以从中创建对象的原型或蓝图。某些类在 Java 中自动可用（例如 `String`、`Math`
    和 `System` 类）。要在程序中使用其他类，你必须通过使用 `import` 语句来指示应加载众多可用类中的哪些类。例如，为了能够在程序中使用 `Random`
    类（它是 `java.util` 包的一部分），你必须在程序的开头包含以下行：


    ```

    import java.util.Random;

    ```


    要从此类创建一个对象（也称为类的*实例*），你需要使用 `new` 运算符，后跟该类的一个称为*构造方法*的特殊方法。构造方法的名称始终与相应类的名称相同，并且它可能需要输入值来初始化属于该类的数据。例如，要创建
    `Random` 类的一个实例，你可以使用以下代码：


    ```

    Random rand = new Random();

    ```


    在此之后，你就可以使用变量 `rand` 的方法，例如 `nextInt`（它返回一个随机生成的整数），如下所示：


    ```

    int secret = rand.nextInt();

    ```


    前面提到的 `String` 类是特殊的，因为它可以像基本类型变量（如 `int` 或 `float`）一样被初始化，但它也可以使用 `new` 运算符进行初始化（这需要将要存储的文本作为输入）：


    ```

    String name = new String("Lee");

    ```


    Java（或任何面向对象编程语言）最强大的功能之一是能够定义你自己的类。作为一个深入的示例，以下名为 `Fraction` 的类存储了分数中使用的数据：分子和分母（均为整数）。有一个构造方法来设置这些值，一个创建分数
    `String` 表示的方法，以及一个将分数转换为 `float` 值（通过计算商）的方法。


    ```

    class Fraction

    {

        // numerator

        int n;

        // denominator

        int d;


    // constructor

        Fraction(int a, int b)

        {

            n = a;

            d = b;

        }


    // creates a String representation

        public String toString()

        {

            return (n + "/" + d);

        }


    // convert to a float value

        public float convertToFloat()

        {

            return (float)n / d;

        }

    }

    ```


    接下来是一个示例类，它使用了前面定义的 `Fraction` 类。具体来说，它创建并初始化了一个 `Fraction` 对象，然后使用其方法并将结果打印到屏幕上。（一个技术细节：你必须将
    `main` 方法声明为 `static`，以便能够直接从类而不是从类的实例运行该方法。）


    ```

    class Sample

    {

        public static void main()

        {

            Fraction frac = new Fraction(3,4);

            String fracString = frac.toString();

            float  fracValue  = frac.convertToFloat();

            System.out.println( "The value of " + fracString + " is " + fracValue
    );

        }

    }

    ```

    '
