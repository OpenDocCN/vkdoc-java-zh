- fmt: "Each picture that you want to display on this screen will be loaded initially\
    \ as a `Texture`. To ensure that each image scales smoothly, you will consistently\
    \ specify that linear filtering should be used each time. You can use a repeated\
    \ image for the table background, provided you convert it to a `Drawable` first\
    \ (which you do using the `skin` object). All other `Texture` objects that you\
    \ would like to include in the `uiTable` will be displayed using `Image` objects,\
    \ which exist for exactly this purpose. Recall that all user-interface objects\
    \ store images using the `Drawable` interface so that they can be resized as needed.\
    \ The `Texture` class does *not* implement the `Drawable` interface, but conveniently,\
    \ the `Image` constructor accepts a `Texture` as input and can convert it to a\
    \ `Drawable` object automatically. As usual, the image files referenced here can\
    \ be download from the source code assets folder:\n\n```\nTexture waterTex = new\
    \ Texture(Gdx.files.internal(\"assets/water.jpg\"));\nwaterTex.setFilter(TextureFilter.Linear,\
    \ TextureFilter.Linear);\ngame.skin.add( \"waterTex\", waterTex );\nuiTable.background(\
    \ game.skin.getDrawable(\"waterTex\") );\n\nTexture titleTex = new Texture(Gdx.files.internal(\"\
    assets/starfish-collector.png\"));\ntitleTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
    Image titleImage = new Image( titleTex );\n\nTexture libgdxTex = new Texture(Gdx.files.internal(\"\
    assets/created-libgdx.png\"));\nlibgdxTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
    Image libgdxImage = new Image( libgdxTex );\n```\n\nNext, you introduce an extension\
    \ of the `Button` class, called `TextButton`, which is a `Button` that has a `Label`\
    \ on top to display the associated text. The associated style object, `TextButtonStyle`,\
    \ requires both a `Drawable` for the button graphic, and a `BitmapFont` and `Color`\
    \ to draw the label.\n\nOne potential complication with creating a `TextButton`\
    \ arises when the button’s text is larger than the provided image, in which case\
    \ the text will overflow past the borders of the button. To alleviate this problem,\
    \ you can use the `NinePatch` class, which allows you to scale an image in a particular\
    \ way. A `NinePatch` object can be initialized using a `Texture` followed by four\
    \ integers, as follows:\n\n```\nNinePatch np = new NinePatch( texture, left, right,\
    \ top, bottom );\n```\n\nThe integers represent distances, measured in pixels,\
    \ from the correspondingly named edge of the image. They are used to divide the\
    \ texture into nine regions, as illustrated in [Figure 4-8](#9781484215012_Ch04.xhtml#Fig8).\n\
    \n![9781484215012_Fig04-08.jpg](OEBPS/Images/9781484215012_Fig04-08.jpg)\n\n[Figure\
    \ 4-8](#9781484215012_Ch04.xhtml#_Fig8). Dividing a texture into nine regions\n\
    \nWhen converted to a `Drawable`, the corners of the image (the regions labeled\
    \ with a in [Figure 4-8](#9781484215012_Ch04.xhtml#Fig8)) will never be scaled;\
    \ the b regions can scale horizontally, the c regions can scale vertically, and\
    \ the central region d can scale in both directions. This is particularly useful\
    \ for button-like images, so that the edges of the image do not appear distorted.\
    \ [Figure 4-9](#9781484215012_Ch04.xhtml#Fig9) illustrates a small image that\
    \ is scaled using standard methods, and also scaled using nine-patch methods.\
    \ Notice in particular that using standard scaling, the border of the enlarged\
    \ image appears thicker, while nine-patch scaling more closely preserves the appearance\
    \ of the original border, as it only scales each edge in the direction along which\
    \ it is oriented.\n\n![9781484215012_Fig04-09.jpg](OEBPS/Images/9781484215012_Fig04-09.jpg)\n\
    \n[Figure 4-9](#9781484215012_Ch04.xhtml#_Fig9). A button-like image, scaled using\
    \ standard methods and using nine-patch methods\n\nAt this point, you can turn\
    \ your attention to the `TurtleGame` class. You will write the code that initializes\
    \ the `TextButtonStyle` object, and store it using the `skin` object, so that\
    \ it can be used by all the screens in your program. First, you need to add the\
    \ following import statements:\n\n```\nimport com.badlogic.gdx.graphics.Texture;\n\
    import com.badlogic.gdx.scenes.scene2d.ui.TextButton.TextButtonStyle;\nimport\
    \ com.badlogic.gdx.graphics.g2d.NinePatch;\n```\n\nAfter downloading the nine\
    \ patch–related images into the assets folder, the code you need to add to the\
    \ `create` method is as follows:\n\n```\nTextButtonStyle uiTextButtonStyle = new\
    \ TextButtonStyle();\n\nuiTextButtonStyle.font      = uiFont;\nuiTextButtonStyle.fontColor\
    \ = Color.NAVY;\n\nTexture upTex = new Texture(Gdx.files.internal(\"assets/ninepatch-1.png\"\
    ));\nskin.add(\"buttonUp\", new NinePatch(upTex, 26,26,16,20));\nuiTextButtonStyle.up\
    \ = skin.getDrawable(\"buttonUp\");\n```\n\nTo add a bit more polish to the `TextButton`\
    \ objects, you’ll also add some information to the `TextButtonStyle` objects.\
    \ Often the appearance of a button may change depending on how the user is interacting\
    \ with it. For instance, when the mouse pointer is hovering over a button, it\
    \ may become lighter in appearance, and while the button is being pressed, the\
    \ background image may be changed to make the button look more “flat.” These variations\
    \ in appearance are illustrated in [Figure 4-10](#9781484215012_Ch04.xhtml#Fig10).\n\
    \n![9781484215012_Fig04-10.jpg](OEBPS/Images/9781484215012_Fig04-10.jpg)\n\n[Figure\
    \ 4-10](#9781484215012_Ch04.xhtml#_Fig10). Different button appearances, based\
    \ on state: default/up, hover/over, and pressed/down\n\nTo provide a `TextButton`\
    \ with the same style, you simply store additional image data to the `over` and\
    \ `down` fields of the `TextButtonStyle` object, and you may change the font colors\
    \ as well, if desired. These additions are accomplished, and the style object\
    \ is added to the `skin` object, with the code presented here:\n\n```\nTexture\
    \ overTex = new Texture(Gdx.files.internal(\"assets/ninepatch-2.png\"));\nskin.add(\"\
    buttonOver\", new NinePatch(overTex, 26,26,16,20) );\nuiTextButtonStyle.over =\
    \ skin.getDrawable(\"buttonOver\");\nuiTextButtonStyle.overFontColor = Color.BLUE;\n\
    \nTexture downTex = new Texture(Gdx.files.internal(\"assets/ninepatch-3.png\"\
    ));\nskin.add(\"buttonDown\", new NinePatch(downTex, 26,26,16,20) );\nuiTextButtonStyle.down\
    \ = skin.getDrawable(\"buttonDown\");\nuiTextButtonStyle.downFontColor = Color.BLUE;\n\
    \nskin.add(\"uiTextButtonStyle\", uiTextButtonStyle);\n```\n\nWith this style\
    \ data stored, you are now ready to create the `TextButton` objects in the `TurtleMenu`\
    \ class. The Start button will initialize the `TurtleLevel` class and set it to\
    \ be the active screen, while the Quit button will exit the application. This\
    \ listener contains two methods, each of which is activated for different events:\
    \ `touchDown` is called when the object is initially touched or when the mouse\
    \ button is pressed down while over this object; `touchUp` is called immediately\
    \ after the touching action stops or when the mouse button is released. The `touchUp`\
    \ methods are used to execute these actions, so that they occur when the buttons\
    \ are released.\n\n```\nTextButton startButton = new TextButton(\"Start\", game.skin,\
    \ \"uiTextButtonStyle\");\nstartButton.addListener(\n    new InputListener()\n\
    \    {\n        public boolean touchDown (InputEvent event, float x, float y,\
    \ int pointer, int button)\n        {  return true;  }\n\npublic void touchUp\
    \ (InputEvent event, float x, float y, int pointer, int button)\n        {\n \
    \           game.setScreen( new TurtleLevel(game) );\n        }\n    });\n\nTextButton\
    \ quitButton = new TextButton(\"Quit\", game.skin, \"uiTextButtonStyle\");\nquitButton.addListener(\n\
    \    new InputListener()\n    {\n        public boolean touchDown (InputEvent\
    \ event, float x, float y, int pointer, int button)\n        {  return true; \
    \ }\n\npublic void touchUp (InputEvent event, float x, float y, int pointer, int\
    \ button)\n        {\n            Gdx.app.exit();\n        }\n    });\n```"
  raw: 'Each picture that you want to display on this screen will be loaded initially
    as a Texture. To ensure that each image scales smoothly, you will consistently
    specify that linear filtering should be used each time. You can use a repeated
    image for the table background, provided you convert it to a Drawable first (which
    you do using the skin object). All other Texture objects that you would like to
    include in the uiTable will be displayed using Image objects, which exist for
    exactly this purpose. Recall that all user-interface objects store images using
    the Drawable interface so that they can be resized as needed. The Texture class
    does *not* implement the Drawable interface, but conveniently, the Image constructor
    accepts a Texture as input and can convert it to a Drawable object automatically.
    As usual, the image files referenced here can be download from the source code
    assets folder:


    ```

    Texture waterTex = new Texture(Gdx.files.internal("assets/water.jpg"));

    waterTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);

    game.skin.add( "waterTex", waterTex );

    uiTable.background( game.skin.getDrawable("waterTex") );


    Texture titleTex = new Texture(Gdx.files.internal("assets/starfish-collector.png"));

    titleTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);

    Image titleImage = new Image( titleTex );


    Texture libgdxTex = new Texture(Gdx.files.internal("assets/created-libgdx.png"));

    libgdxTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);

    Image libgdxImage = new Image( libgdxTex );

    ```


    Next, you introduce an extension of the Button class, called TextButton, which
    is a Button that has a Label on top to display the associated text. The associated
    style object, TextButtonStyle, requires both a Drawable for the button graphic,
    and a BitmapFont and Color to draw the label.


    One potential complication with creating a TextButton arises when the button’s
    text is larger than the provided image, in which case the text will overflow past
    the borders of the button. To alleviate this problem, you can use the NinePatch
    class, which allows you to scale an image in a particular way. A NinePatch object
    can be initialized using a Texture followed by four integers, as follows:


    ```

    NinePatch np = new NinePatch( texture, left, right, top, bottom );

    ```


    The integers represent distances, measured in pixels, from the correspondingly
    named edge of the image. They are used to divide the texture into nine regions,
    as illustrated in [Figure 4-8](#9781484215012_Ch04.xhtml#Fig8).


    ![9781484215012_Fig04-08.jpg](OEBPS/Images/9781484215012_Fig04-08.jpg)


    [Figure 4-8](#9781484215012_Ch04.xhtml#_Fig8). Dividing a texture into nine regions


    When converted to a Drawable, the corners of the image (the regions labeled with
    a in [Figure 4-8](#9781484215012_Ch04.xhtml#Fig8)) will never be scaled; the b
    regions can scale horizontally, the c regions can scale vertically, and the central
    region d can scale in both directions. This is particularly useful for button-like
    images, so that the edges of the image do not appear distorted. [Figure 4-9](#9781484215012_Ch04.xhtml#Fig9)
    illustrates a small image that is scaled using standard methods, and also scaled
    using nine-patch methods. Notice in particular that using standard scaling, the
    border of the enlarged image appears thicker, while nine-patch scaling more closely
    preserves the appearance of the original border, as it only scales each edge in
    the direction along which it is oriented.


    ![9781484215012_Fig04-09.jpg](OEBPS/Images/9781484215012_Fig04-09.jpg)


    [Figure 4-9](#9781484215012_Ch04.xhtml#_Fig9). A button-like image, scaled using
    standard methods and using nine-patch methods


    At this point, you can turn your attention to the TurtleGame class. You will write
    the code that initializes the TextButtonStyle object, and store it using the skin
    object, so that it can be used by all the screens in your program. First, you
    need to add the following import statements:


    ```

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.scenes.scene2d.ui.TextButton.TextButtonStyle;

    import com.badlogic.gdx.graphics.g2d.NinePatch;

    ```


    After downloading the nine patch–related images into the assets folder, the code
    you need to add to the create method is as follows:


    ```

    TextButtonStyle uiTextButtonStyle = new TextButtonStyle();


    uiTextButtonStyle.font      = uiFont;

    uiTextButtonStyle.fontColor = Color.NAVY;


    Texture upTex = new Texture(Gdx.files.internal("assets/ninepatch-1.png"));

    skin.add("buttonUp", new NinePatch(upTex, 26,26,16,20));

    uiTextButtonStyle.up = skin.getDrawable("buttonUp");

    ```


    To add a bit more polish to the TextButton objects, you’ll also add some information
    to the TextButtonStyle objects. Often the appearance of a button may change depending
    on how the user is interacting with it. For instance, when the mouse pointer is
    hovering over a button, it may become lighter in appearance, and while the button
    is being pressed, the background image may be changed to make the button look
    more “flat.” These variations in appearance are illustrated in [Figure 4-10](#9781484215012_Ch04.xhtml#Fig10).


    ![9781484215012_Fig04-10.jpg](OEBPS/Images/9781484215012_Fig04-10.jpg)


    [Figure 4-10](#9781484215012_Ch04.xhtml#_Fig10). Different button appearances,
    based on state: default/up, hover/over, and pressed/down


    To provide a TextButton with the same style, you simply store additional image
    data to the over and down fields of the TextButtonStyle object, and you may change
    the font colors as well, if desired. These additions are accomplished, and the
    style object is added to the skin object, with the code presented here:


    ```

    Texture overTex = new Texture(Gdx.files.internal("assets/ninepatch-2.png"));

    skin.add("buttonOver", new NinePatch(overTex, 26,26,16,20) );

    uiTextButtonStyle.over = skin.getDrawable("buttonOver");

    uiTextButtonStyle.overFontColor = Color.BLUE;


    Texture downTex = new Texture(Gdx.files.internal("assets/ninepatch-3.png"));

    skin.add("buttonDown", new NinePatch(downTex, 26,26,16,20) );

    uiTextButtonStyle.down = skin.getDrawable("buttonDown");

    uiTextButtonStyle.downFontColor = Color.BLUE;


    skin.add("uiTextButtonStyle", uiTextButtonStyle);

    ```


    With this style data stored, you are now ready to create the TextButton objects
    in the TurtleMenu class. The Start button will initialize the TurtleLevel class
    and set it to be the active screen, while the Quit button will exit the application.
    This listener contains two methods, each of which is activated for different events:
    touchDown is called when the object is initially touched or when the mouse button
    is pressed down while over this object; touchUp is called immediately after the
    touching action stops or when the mouse button is released. The touchUp methods
    are used to execute these actions, so that they occur when the buttons are released.


    ```

    TextButton startButton = new TextButton("Start", game.skin, "uiTextButtonStyle");

    startButton.addListener(

        new InputListener()

        {

            public boolean touchDown (InputEvent event, float x, float y, int pointer,
    int button)

            {  return true;  }


    public void touchUp (InputEvent event, float x, float y, int pointer, int button)

            {

                game.setScreen( new TurtleLevel(game) );

            }

        });


    TextButton quitButton = new TextButton("Quit", game.skin, "uiTextButtonStyle");

    quitButton.addListener(

        new InputListener()

        {

            public boolean touchDown (InputEvent event, float x, float y, int pointer,
    int button)

            {  return true;  }


    public void touchUp (InputEvent event, float x, float y, int pointer, int button)

            {

                Gdx.app.exit();

            }

        });

    ```'
  trans: "\n此屏幕上要显示的每张图片最初都会作为纹理（Texture）加载。为确保每张图片都能平滑缩放，你需要始终指定使用线性过滤。你可以为表格背景使用重复图片，但前提是先将它转换为可绘制对象（Drawable）（通过皮肤对象完成）。你希望包含在\
    \ uiTable 中的所有其他纹理对象都将通过图像（Image）对象来显示，这些对象正是为此目的而存在的。请记住，所有用户界面对象都使用可绘制接口来存储图像，以便它们可以根据需要调整大小。纹理类*不*实现可绘制接口，但方便的是，图像构造函数接受纹理作为输入，并能自动将其转换为可绘制对象。像往常一样，此处引用的图片文件可以从源代码资源文件夹中下载：\n\
    \n```\nTexture waterTex = new Texture(Gdx.files.internal(\"assets/water.jpg\"\
    ));\nwaterTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\ngame.skin.add(\
    \ \"waterTex\", waterTex );\nuiTable.background( game.skin.getDrawable(\"waterTex\"\
    ) );\n\nTexture titleTex = new Texture(Gdx.files.internal(\"assets/starfish-collector.png\"\
    ));\ntitleTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\nImage titleImage\
    \ = new Image( titleTex );\n\nTexture libgdxTex = new Texture(Gdx.files.internal(\"\
    assets/created-libgdx.png\"));\nlibgdxTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
    Image libgdxImage = new Image( libgdxTex );\n```\n\n接下来，你将引入按钮（Button）类的一个扩展，称为文本按钮（TextButton），它是一个顶部带有标签（Label）以显示相关文本的按钮。相关的样式对象\
    \ TextButtonStyle 需要为按钮图形提供一个可绘制对象，并为绘制标签提供位图字体（BitmapFont）和颜色（Color）。\n\n创建文本按钮时可能出现的一个潜在问题是，当按钮的文本大于提供的图片时，文本会溢出按钮的边界。为了缓解这个问题，你可以使用九宫格（NinePatch）类，它允许你以特定方式缩放图片。一个九宫格对象可以使用一个纹理后跟四个整数来初始化，如下所示：\n\
    \n```\nNinePatch np = new NinePatch( texture, left, right, top, bottom );\n```\n\
    \n这些整数表示从图片相应命名边缘开始测量的像素距离。它们用于将纹理划分为九个区域，如图 4-8 所示。\n\n![9781484215012_Fig04-08.jpg](img/9781484215012_Fig04-08.jpg)\n\
    \n图 4-8. 将纹理划分为九个区域\n\n当转换为可绘制对象时，图片的角落（图 4-8 中标记为 a 的区域）永远不会被缩放；b 区域可以水平缩放，c\
    \ 区域可以垂直缩放，而中心区域 d 可以在两个方向上缩放。这对于类似按钮的图片特别有用，这样图片的边缘就不会出现变形。图 4-9 展示了一张使用标准方法缩放以及使用九宫格方法缩放的小图片。特别注意，使用标准缩放时，放大后的图片边框看起来更粗，而九宫格缩放则更接近地保留了原始边框的外观，因为它只沿着每个边缘的方向进行缩放。\n\
    \n![9781484215012_Fig04-09.jpg](img/9781484215012_Fig04-09.jpg)\n\n图 4-9. 一张类似按钮的图片，分别使用标准方法和九宫格方法进行缩放\n\
    \n此时，你可以将注意力转向 TurtleGame 类。你将编写初始化 TextButtonStyle 对象的代码，并使用皮肤对象存储它，以便程序中的所有屏幕都能使用它。首先，你需要添加以下导入语句：\n\
    \n```\nimport com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.scenes.scene2d.ui.TextButton.TextButtonStyle;\n\
    import com.badlogic.gdx.graphics.g2d.NinePatch;\n```\n\n将九宫格相关图片下载到资源文件夹后，你需要添加到\
    \ create 方法中的代码如下：\n\n```\nTextButtonStyle uiTextButtonStyle = new TextButtonStyle();\n\
    \nuiTextButtonStyle.font      = uiFont;\nuiTextButtonStyle.fontColor = Color.NAVY;\n\
    \nTexture upTex = new Texture(Gdx.files.internal(\"assets/ninepatch-1.png\"));\n\
    skin.add(\"buttonUp\", new NinePatch(upTex, 26,26,16,20));\nuiTextButtonStyle.up\
    \ = skin.getDrawable(\"buttonUp\");\n```\n\n为了让文本按钮对象更精致一些，你还需要向 TextButtonStyle\
    \ 对象添加一些信息。按钮的外观通常会根据用户与其交互的方式而改变。例如，当鼠标指针悬停在按钮上时，它可能会变得更亮；而当按钮被按下时，背景图片可能会被更改，使按钮看起来更“扁平”。这些外观变化如图\
    \ 4-10 所示。\n\n![9781484215012_Fig04-10.jpg](img/9781484215012_Fig04-10.jpg)\n\n\
    图 4-10. 基于状态的不同按钮外观：默认/弹起、悬停/经过、按下/压下\n\n为了给文本按钮提供相同的样式，你只需将额外的图片数据存储到 TextButtonStyle\
    \ 对象的 over 和 down 字段中，并且如果需要，还可以更改字体颜色。这些添加操作通过以下代码完成，并且样式对象被添加到皮肤对象中：\n\n```\n\
    Texture overTex = new Texture(Gdx.files.internal(\"assets/ninepatch-2.png\"));\n\
    skin.add(\"buttonOver\", new NinePatch(overTex, 26,26,16,20) );\nuiTextButtonStyle.over\
    \ = skin.getDrawable(\"buttonOver\");\nuiTextButtonStyle.overFontColor = Color.BLUE;\n\
    \nTexture downTex = new Texture(Gdx.files.internal(\"assets/ninepatch-3.png\"\
    ));\nskin.add(\"buttonDown\", new NinePatch(downTex, 26,26,16,20) );\nuiTextButtonStyle.down\
    \ = skin.getDrawable(\"buttonDown\");\nuiTextButtonStyle.downFontColor = Color.BLUE;\n\
    \nskin.add(\"uiTextButtonStyle\", uiTextButtonStyle);\n```\n\n存储好这些样式数据后，你现在就可以在\
    \ TurtleMenu 类中创建文本按钮对象了。“开始”按钮将初始化 TurtleLevel 类并将其设置为活动屏幕，而“退出”按钮将退出应用程序。这个监听器包含两个方法，每个方法针对不同的事件被激活：touchDown\
    \ 在对象被首次触摸或鼠标按钮在此对象上按下时调用；touchUp 在触摸动作停止后或鼠标按钮释放时立即调用。touchUp 方法用于执行这些操作，以便它们在按钮被释放时发生。\n\
    \n```\nTextButton startButton = new TextButton(\"Start\", game.skin, \"uiTextButtonStyle\"\
    );\nstartButton.addListener(\n    new InputListener()\n    {\n        public boolean\
    \ touchDown (InputEvent event, float x, float y, int pointer, int button)\n  \
    \      {  return true;  }\n\npublic void touchUp (InputEvent event, float x, float\
    \ y, int pointer, int button)\n        {\n            game.setScreen( new TurtleLevel(game)\
    \ );\n        }\n    });\n\nTextButton quitButton = new TextButton(\"Quit\", game.skin,\
    \ \"uiTextButtonStyle\");\nquitButton.addListener(\n    new InputListener()\n\
    \    {\n        public boolean touchDown (InputEvent event, float x, float y,\
    \ int pointer, int button)\n        {  return true;  }\n\npublic void touchUp\
    \ (InputEvent event, float x, float y, int pointer, int button)\n        {\n \
    \           Gdx.app.exit();\n        }\n    });\n```\n"
- fmt: "Finally, with all the user-interface objects created, you are now ready to\
    \ place them on the screen by adding them to the `uiTable` object. You use the\
    \ same code from our earlier discussion of laying out the Start menu, with one\
    \ addition: in the interests of symmetry, you’d like the two buttons to have the\
    \ same width, but because of the text being displayed, the Start button will be\
    \ wider by default. You can change the width of the Quit button to match the width\
    \ of the Start button, by setting the width of the cell that contains it:\n\n\
    ```\nfloat w = startButton.getWidth();\nuiTable.add(titleImage).colspan(2);\n\
    uiTable.row();\nuiTable.add(startButton);\nuiTable.add(quitButton).width(w);\n\
    uiTable.row();\nuiTable.add(libgdxImage).colspan(2).right().padTop(50);\n```\n\
    \nFinally, to load the menu screen (rather than the game-play screen) when the\
    \ program starts, you need to make a change to the `TurtleGame` class. At the\
    \ end of the `create` method, instead of creating an instance of the `TurtleLevel`\
    \ class (and setting this to be the active screen), you’d like to use the `TurtleMenu`\
    \ class. To this end, change the last two lines of the `create` method to the\
    \ following:\n\n```\nTurtleMenu tm = new TurtleMenu(this);\nsetScreen(tm);\n```\n\
    \n## Creating an Overlay Menu\n\nNow that you’ve finished setting up your two\
    \ main user interfaces, you have one final addition to the Starfish Collector\
    \ game. You’d like to create an overlay-style menu that appears on top of the\
    \ main UI on the `TurtleLevel` screen when the game is paused, as illustrated\
    \ in [Figure 4-11](#9781484215012_Ch04.xhtml#Fig11). As with the previous user-interface\
    \ discussion, you show the desired result side by side with an abstract layout\
    \ diagram indicating the placement of the UI elements. In [Figure 4-11](#9781484215012_Ch04.xhtml#Fig11),\
    \ cells a and d contain labels, cells b and c contain buttons, and cell e contains\
    \ a slider. There will also be a translucent black background that dims the user’s\
    \ view of the game, which also makes the Pause menu contents more easily identifiable.\
    \ You are already familiar with two of the classes you need: `Label` and `TextButton`.\
    \ The new control element you need is a `Slider`, which will be used to change\
    \ the `audioVolume` variable that sets the volume of sound effects and background\
    \ music, introduced in the beginning of this chapter.\n\n![9781484215012_Fig04-11.jpg](OEBPS/Images/9781484215012_Fig04-11.jpg)\n\
    \n[Figure 4-11](#9781484215012_Ch04.xhtml#_Fig11). Abstract table layout for the\
    \ pause overlay\n\nFor consistency, you’ll initialize and store the associated\
    \ `SliderStyle` object in the `TurtleGame` class, alongside the other style objects.\
    \ As usual, you’ll also use the methods of the `Skin` class to convert the needed\
    \ `Texture` objects into `Drawable` objects. The two fields of the `SliderStyle`\
    \ object you must include are images for the background and the knob that is dragged\
    \ back and forth along the slider itself. You may also include two additional\
    \ images that are set to appear on top of the background, before and after the\
    \ knob image, which can be seen in [Figure 4-11](#9781484215012_Ch04.xhtml#Fig11).\
    \ The knob is the circular image; the “before” and “after” images are the colored\
    \ horizontal images that appear to the left and right of the knob, respectively.\
    \ All the necessary images can be downloaded from the source code assets folder.\
    \ You need to add the following import to the `TurtleGame` class:\n\n```\nimport\
    \ com.badlogic.gdx.scenes.scene2d.ui.Slider.SliderStyle;\n```\n\nThen, in the\
