    {

        public void create()

        {

            TurtleLevel tl = new TurtleLevel(this);

            setScreen( tl );

        }

    }

    ```


    同样和往常一样，每个项目都需要一个驱动类。这次，你创建的驱动类包含一个额外功能：一个 `LwjglApplicationConfiguration` 对象。这个类包含一些可设置的字段，允许你更改窗口特定的设置，例如游戏窗口的宽度和高度，以及标题栏中显示的文本。该对象可以作为第二个参数传递给
    `LwjglApplication` 构造函数。


