    \ 游戏Cheese, Please!的主屏幕\n\n## 理解游戏的生命周期\n\n在进入游戏开发的编程方面之前，理解游戏程序的整体结构非常重要：游戏程序经历的主要阶段，以及游戏程序在每个阶段必须执行的任务。这些阶段如下："
  raw: 'A *driver class* (also sometimes referred to as a *main*, *entry point*, *starter*,
    or *launcher* class) is a class whose purpose is to drive the execution of another
    class, which often involves creating an instance of the class and calling one
    or more of its methods. The driver class typically requires only a single method
    to accomplish this task; this method is traditionally called main. Since it is
    the first method called by the program, the main method *must* be static, because
    when a program starts, there are no instances available to run instance-based
    methods. If the main method were not static, we would have a problem similar to
    the philosophical conundrum: Which came first: the chicken or the egg? Something
    has to be able to instantiate a class without itself being instantiated, and this
    is exactly what the static main method of a driver class does.


    A standard “Hello, World!” program could be rewritten using a driver class as
    follows:


    ```

      public class Greeter

      {

              public void sayHello()

              {

                      System.out.print("Hello!");

              }

      }


    public class Launcher

      {

              public static void main()

              {

                      Greeter greta = new Greeter();

                      greta.sayHello();

              }

      }

    ```


    Next, in the same project, create a class called HelloLauncher that contains the
    following code:


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class HelloLauncher

    {

        public static void main (String[] args)

        {

            HelloWorldImage myProgram = new HelloWorldImage();

            LwjglApplication launcher = new LwjglApplication( myProgram );

        }

    }

    ```


    As mentioned in the previous “Static Methods and Driver Classes” sidebar, this
    class first creates an instance of the HelloWorldImage class, called myProgram.
    Then, instead of running the methods of myProgram directly, the main method creates
    a LwjglApplication object, which takes myProgram as input; the constructor performs
    some initialization tasks, and then runs the create and render methods of myProgram
    as discussed previously.


    The acronym *LWJGL* stands for the *Lightweight Java Game* *Library*, an open
    source Java library originally created by Caspian Rychlik-Prince to simplify game
    development in terms of accessing the desktop computer hardware resources. In
    LibGDX, LWJGL is used for the desktop back end to support all the major desktop
    operating systems, such as Windows, Linux, and Mac OS X.


    Another benefit to having a driver class, separate from the classes that contain
    the game functionality, is the potential to create driver classes for other platforms,
    such as Android, which LibGDX also supports.


    When you’ve entered all the code for both classes, return to the main window in
    BlueJ, and click the Compile button. Then right-click the orange rectangle for
    the HelloLauncher class, and in the list of methods that appears, select the method
    listed as void main(String[] args). A pop-up window appears, in which you could
    enter an array of strings as input if you needed to—but you don’t. Click the OK
    button, and you should see a window as shown previously in [Figure 1-5](#9781484215012_Ch01.xhtml#Fig5).


    Congratulations on completing your first application using LibGDX!


    Advantages to Using LibGDX


    In addition to the ability to compile your game so that it can run on multiple
    platforms, there are many other advantages to using the LibGDX game development
    framework. LibGDX makes it easy to accomplish tasks such as these:


    *   Render 2D graphics, animations, bitmap-based fonts, and particle effects

    *   Stream music and play sound effects

    *   Process input from a keyboard, mouse, touch screens, accelerometer, or game
    pad

    *   Organize user interfaces using a scene graph and fully skinnable UI control
    library

    *   Integrate third-party plug-ins, such as the Box2D physics engine (box2d.org),
    the Tiled map editor file format (mapeditor.org), and the Spine 2D animation software
    (esotericsoftware.com)

    *   Render 3D graphics with materials and lighting effects, and load 3D models
    from common file formats such as OBJ and FBX


    A complete list of LibGDX features can be found at the web site [http://libgdx.badlogicgames.com/features.html](http://libgdx.badlogicgames.com/features.html).


    Summary


    In this chapter, you’ve set up BlueJ, an integrated development environment for
    Java programming, and configured BlueJ to use the LibGDX game development framework.
    Then you created your first application with LibGDX: a “Hello, World!” program
    that displays an image of the world in a window. This program involved extending
    LibGDX’s Game class, and creating a driver class that runs the program on the
    desktop. Along the way, you learned about a few of the other classes involved
    in this program. Finally, you learned about some of the additional features of
    the LibGDX library, many of which are discussed in detail in future chapters.


    ______________________


    [¹](#9781484215012_Ch01.xhtml#_Fn1)Since neither the texture nor the coordinates
    are changing in this example, the fact that the render method is called repeatedly
    is irrelevant here. However, if you were to periodically change the image, you
    could generate an animation; if you were to gradually change the coordinates,
    you could simulate motion. You will see how to accomplish both of these variations
    in the following chapter.


    CHAPTER 2


    ![image](OEBPS/Images/frontdot.jpg)


    The LibGDX Framework


    This chapter introduces many of the major features of the LibGDX library. It illustrates
    how to use them in the process of creating a game called *Cheese, Please!*, where
    you help the player’s character, Mousey, scurry around the floor while looking
    for a tasty piece of cheese. A screenshot of this game in action appears in [Figure
    2-1](#9781484215012_Ch02.xhtml#Fig1). You’ll see a few ways to accomplish standard
    game programming tasks, such as representing game entities. Then, you’ll incrementally
    add a variety of features, such as animation, a user interface, and an introductory
    menu screen.


    ![9781484215012_Fig02-01.jpg](OEBPS/Images/9781484215012_Fig02-01.jpg)


    [Figure 2-1](#9781484215012_Ch02.xhtml#_Fig1). The main screen for the game Cheese,
    Please!


    Understanding the Life Cycle of a Game


    Before jumping into the programming aspect of game development, it is important
    to understand the overall structure of a game program: the major stages that a
    game program progresses through, and the tasks that a game program must perform
    in each stage. The stages are as follows:'
  trans: '

    *驱动程序类*（有时也称为*主类*、*入口类*、*启动类*或*启动器类*）是一种用于驱动其他类执行的类，通常涉及创建该类的实例并调用其一个或多个方法。驱动程序类通常只需要一个方法即可完成此任务；该方法传统上称为
    main。由于它是程序调用的第一个方法，因此 main 方法*必须*是静态的，因为程序启动时，没有可用的实例来运行基于实例的方法。如果 main 方法不是静态的，我们就会遇到类似于哲学难题的问题：先有鸡还是先有蛋？必须有一种方法能够在不实例化自身的情况下实例化一个类，而这正是驱动程序类的静态
    main 方法所做的事情。


    一个标准的“Hello, World!”程序可以使用驱动程序类重写如下：


    ```

      public class Greeter

      {

              public void sayHello()

              {

                      System.out.print("Hello!");

              }

      }


    public class Launcher

      {

              public static void main()

              {

                      Greeter greta = new Greeter();

                      greta.sayHello();

              }

      }

    ```


    接下来，在同一个项目中，创建一个名为 HelloLauncher 的类，其中包含以下代码：


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

    public class HelloLauncher

    {

        public static void main (String[] args)

        {

            HelloWorldImage myProgram = new HelloWorldImage();

            LwjglApplication launcher = new LwjglApplication( myProgram );

        }

    }

    ```


    正如前面“静态方法和驱动程序类”边栏中提到的，该类首先创建了一个 HelloWorldImage 类的实例，名为 myProgram。然后，main 方法没有直接运行
    myProgram 的方法，而是创建了一个 LwjglApplication 对象，该对象将 myProgram 作为输入；构造函数执行一些初始化任务，然后按照前面讨论的方式运行
    myProgram 的 create 和 render 方法。


    缩写词 *LWJGL* 代表 *Lightweight Java Game Library*（轻量级 Java 游戏库），这是一个由 Caspian Rychlik-Prince
    最初创建的开源 Java 库，旨在简化游戏开发中访问台式计算机硬件资源的过程。在 LibGDX 中，LWJGL 用于桌面后端，以支持所有主要的桌面操作系统，例如
    Windows、Linux 和 Mac OS X。


    拥有一个与包含游戏功能的类分离的驱动程序类的另一个好处是，有可能为其他平台（例如 LibGDX 也支持的 Android）创建驱动程序类。


    当您为这两个类输入所有代码后，返回 BlueJ 的主窗口，然后单击 Compile 按钮。然后右键单击 HelloLauncher 类的橙色矩形，在出现的方法列表中，选择列出的
    void main(String[] args) 方法。此时会弹出一个窗口，如果需要，您可以在其中输入一个字符串数组作为输入——但您不需要这样做。单击 OK
    按钮，您应该会看到一个窗口，如前面图 1-5 所示。


    恭喜您完成了使用 LibGDX 的第一个应用程序！


    使用 LibGDX 的优势


    除了能够编译游戏使其在多个平台上运行之外，使用 LibGDX 游戏开发框架还有许多其他优势。LibGDX 使得完成以下任务变得简单：


    *   渲染 2D 图形、动画、基于位图的字体和粒子效果

    *   流式播放音乐和播放音效

    *   处理来自键盘、鼠标、触摸屏、加速度计或游戏手柄的输入

    *   使用场景图和完全可换肤的 UI 控件库组织用户界面

    *   集成第三方插件，例如 Box2D 物理引擎 (box2d.org)、Tiled 地图编辑器文件格式 (mapeditor.org) 和 Spine
    2D 动画软件 (esotericsoftware.com)

    *   使用材质和光照效果渲染 3D 图形，并从常见文件格式（如 OBJ 和 FBX）加载 3D 模型


    LibGDX 功能的完整列表可在网站 [`libgdx.badlogicgames.com/features.html`](http://libgdx.badlogicgames.com/features.html)
    上找到。


    总结


    在本章中，您设置了 BlueJ（一个用于 Java 编程的集成开发环境），并配置 BlueJ 以使用 LibGDX 游戏开发框架。然后，您使用 LibGDX
    创建了第一个应用程序：一个“Hello, World!”程序，该程序在一个窗口中显示世界图像。该程序涉及扩展 LibGDX 的 Game 类，并创建一个在桌面上运行该程序的驱动程序类。在此过程中，您还了解了该程序中涉及的其他一些类。最后，您了解了
    LibGDX 库的一些其他功能，其中许多功能将在后续章节中详细讨论。


