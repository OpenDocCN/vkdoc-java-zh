    BaseActor3D 类

    '
- fmt: "首先，回顾一下，`Actor`类存储了变换数据（位置、旋转和缩放）以及用于获取、设置和更改这些值的方法。所有`Actor`对象都包含一个`act`方法，可用于更新其内部状态，以及一个`draw`方法，演员可以使用该方法通过给定的`Batch`对象渲染自身。然后，你编写了`Actor`类的扩展，称为`BaseActor`类，它额外存储了一个`Texture`、一个用于碰撞检测的`Polygon`以及相关方法。接下来将介绍`BaseActor3D`类，它将在3D环境中提供类似的功能。\n\
    \n3D图形中一些最复杂的基础概念是用于存储变换数据的数学结构。我不会在这里深入探讨细节，[¹](#9781484215012_Ch08.xhtml#Fn1)但对于这个示例，了解这些对象是什么以及如何使用它们的相关方法非常重要。\n\
    \n`ModelInstance`对象的变换数据存储在其`transform`字段中，作为一个`Matrix4`对象：一个四乘四的数字网格。从这个对象中，你可以提取一个包含对象位置的`Vector3`。你还可以提取另一个包含每个方向缩放因子的`Vector3`（所有方向初始化为1，这导致默认大小不变）。变换还存储了模型的朝向，这*不能*用单个数字存储（与`Actor`的旋转值相反），因为三维空间中的对象可以绕x、y和z轴的任意组合旋转任意角度。出于许多技术原因（例如计算、性能以及避免称为*万向锁*[²](#9781484215012_Ch08.xhtml#Fn2)的现象），使用一个称为`Quaternion`的对象（对应于同名的数学对象）来存储朝向数据。为了方便起见，与其直接使用`Matrix4`，你将维护单独的对象来存储每个`BaseActor3D`对象的位置、旋转和缩放数据，并将它们组合成一个`Matrix4`，在需要时存储到`ModelInstance`中。\n\
    \n下一个代码清单展示了`BaseActor3D`类的核心：导入语句、变量声明和基本方法。这第一组方法包括构造函数；一个为此演员设置`ModelInstance`的方法；`calculateTransform`方法，用于将位置、旋转和缩放数据组合成一个`Matrix4`；`act`方法，用于更新模型实例的变换数据；以及`draw`方法，用于使用提供的`ModelBatch`和`Environment`渲染模型实例。\n\
    \n```java\nimport com.badlogic.gdx.graphics.g3d.Environment;\nimport com.badlogic.gdx.graphics.g3d.ModelBatch;\n\
    import com.badlogic.gdx.graphics.g3d.ModelInstance;\nimport com.badlogic.gdx.graphics.g3d.Material;\n\
