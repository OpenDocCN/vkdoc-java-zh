    道具


    当砖块被摧毁时，它偶尔会生成一个随机物品，该物品会向屏幕底部掉落。如果玩家收集到该物品（通过用挡板触碰它），游戏的某些特性将会改变，例如挡板的大小。我们将这些物品称为*道具*，尽管它们的效果可能会增加游戏难度。


    `Powerup` 类与 `Brick` 类有一些相同的特性：它使用 `Rectangle` 进行碰撞检测，并且由于稍后将使用基础对象来生成道具，因此必须重写
    `clone` 方法以返回一个 `Powerup` 对象。`Powerup` 类需要 `AnimatedActor` 的一些功能（因为它存储多个图像——每种道具对应一个），以及
    `PhysicsActor` 的一些功能（因为道具一旦生成，就会持续向下移动）。因此，`Powerup` 类将继承 `PhysicsActor` 类。必须编写一个
    `overlaps` 方法来检查道具何时与挡板重叠。还将创建一个 `randomize` 方法，用于随机选择存储的动画之一；为此，必须对 `AnimatedActor`
    类进行修改：将 `animationStorage` 的访问修饰符从 `private` 更改为 `protected`，以便 `Powerup` 类可以访问该数据。该类的完整代码如下所示：


    ```

