    Integrating Third-Party Software


    This chapter covers how to use third-party software and libraries to simplify
    your workflow and increase the sophistication of your games. In particular, you
    will use the following:


    *   The LibGDX Particle Editor, to create visual effects

    *   Tiled, a general-purpose map editor, to simplify the level design process

    *   Box2D, a physics engine, to simulate realistic physics-based interactions


    You’ll use each of these in developing new LibGDX projects. The chapter concludes
    with a project that incorporates features from all three of these tools.


    Working with Particle Systems in LibGDX


    A *particle system* is a collection of many small images that can be used to create
    a variety of graphical special effects. Some effects that can be well replicated
    by this technique include fire, smoke, explosions, fireworks, electric sparks,
    water fountains, rain, snow, and star fields. Each of the small images in a particle
    system is called a *particle*. Every particle has many properties (such as velocity,
    size, color, and transparency) that can be initialized to a random value within
    a given range, and these property values may be configured to change over time.
    Particles are produced at a set rate by an object called an *emitter*, which may
    be configured to spawn particles either for a limited time or continuously, depending
    on the visual effect being created.


    LibGDX provides classes that support the display of particle systems. Furthermore,
    the Particle Editor tool provided with LibGDX can be used to design and preview
    particle effects, and export them to a file format that can be easily imported
    within the LibGDX framework.


    The LibGDX Particle Editor


    The LibGDX Particle Editor can be run directly from the source code, as explained
    on the LibGDX wiki.[¹](#9781484215012_Ch07.xhtml#Fn1) However, for simplicity,
    I recommend that you use the executable JAR file I have created to run the Particle
    Editor: ParticleEditor.jar, available in the ParticleEditor folder in the source
    code directory for this chapter. [Figure 7-1](#9781484215012_Ch07.xhtml#Fig1)
    shows this program when it is first started.


