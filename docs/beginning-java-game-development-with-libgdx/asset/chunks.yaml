    straight across the top, indicating that the parameter value will remain constant
    at the High value. [Figure 7-3](#9781484215012_Ch07.xhtml#Fig3) illustrates two
    more possible graphs; the graph on the left represents a continuous decrease from
    the High value to the Low value, while the graph on the right represents a parameter
    that remains at the High value for the majority of the lifetime of the particle,
    and then suddenly decreases to the Low value. I refer to these two graphs as the
    Gradual Decrease and the Sudden Decrease graphs later in this section.


    ![9781484215012_Fig07-03.jpg](OEBPS/Images/9781484215012_Fig07-03.jpg)


    [Figure 7-3](#9781484215012_Ch07.xhtml#_Fig3). Variations on the parameter change
    graph


    To modify one of these graphs, you can click anywhere to add a point, click and
    drag to move a point around, and double-click a point to remove it.


    In addition, next to the High and Low values are small buttons labelled with >
    or <; these can be used to toggle between one or two values appearing in the corresponding
    row. When two values are displayed, they represent a range of values from which
    the High or Low value will be randomly selected for each particle. This can be
    used to great effect, as you will see later.


    Finally, let’s discuss how to set the parameters for the Tint property. If desired,
    the color of a particle can change over time; the progression of the color is
    displayed from the left to the right in the topmost rectangle. For example, [Figure
    7-4](#9781484215012_Ch07.xhtml#Fig4) represents a particle that will begin tinted
    red, shift to blue, and finally end tinted green. As with the parameter change
    graphs discussed previously, additional points (represented by triangles) can
    be added by clicking within the rectangle. Triangles can be selected by clicking
    them, and their colors can be adjusted by using the sliders underneath, which
    control the hue, saturation, and brightness of the color. The triangles can be
    moved by clicking and dragging, and they can be deleted by double-clicking.


    ![9781484215012_Fig07-04.jpg](OEBPS/Images/9781484215012_Fig07-04.jpg)


    [Figure 7-4](#9781484215012_Ch07.xhtml#_Fig4). The tint parameter graph


    Now that you understand the user interface of the Particle Editor, you’ll work
    through examples that show how to create particle-based versions of the effects
    from the game Space Rocks. Creating lots of effects, more than anything, is what
    will ultimately give you a feel for the role each parameter plays in crafting
    a particle-based effect. You need a location to save your final effects, so at
    this time, create a new project in BlueJ called Starscape; within the project
    directory, create an assets folder, where you will store the effect files created
    with the LibGDX Particle Editor.


    Rocket-Thruster Effect


    Your first goal is to create a rocket-thruster effect, pictured in [Figure 7-5](#9781484215012_Ch07.xhtml#Fig5).


    ![9781484215012_Fig07-05.jpg](OEBPS/Images/9781484215012_Fig07-05.jpg)


    [Figure 7-5](#9781484215012_Ch07.xhtml#_Fig5). The rocket-thruster particle effect


    After starting the Particle Editor program, in the Effect Emitters panel in the
    lower left, click the New button and rename the newly created list entry **thruster**.
    Click the list item named Untitled (which corresponds to the default fire-like
    example), and click the Delete button to remove it.


    In the set of options at the bottom of the Emitter Properties panel, deselect
    the Additive check box, and select the Continuous check box. You should now see
    a single red dot in the middle of the preview panel.


    First, you will adjust the number of particles that will be active at any given
    moment. Change the Count property Max value to 100\. To achieve this amount, you
    also must change the Emission property High value to 200\. (Changing this value
    to 100 would be insufficient, as each particle lasts for only 0.5 seconds, since
    500 milliseconds is the default value for the Life property. An emission rate
    of 100 would result in only 50 active particles at any given time.)


    Next, click the Active buttons next to the Velocity and Angle properties. For
    Velocity, click the ![image](OEBPS/Images/arrow.jpg) button next to High, and
    enter the values 300 and 400\. For Angle, again click the ![image](OEBPS/Images/arrow.jpg)
    button next to High, and enter the values 70 and 110\. You should now see red
    particles spraying upward in a wobbly, cone-shaped pattern.


    Now change the Tint parameter graph so that the tint color changes from red at
    the start, to orange in the middle, and yellow at the end. After completing this
    step, the particles in the preview panel should appear red at the base of the
    emitter, and gradually change colors until they become yellow at the top.


    Finally, you’d like particles to shrink and fade out of existence at the end of
    their lifetime. To accomplish this, modify the parameter change graphs for both
    *Size* and Transparency so that they both resemble the Sudden Decrease graph from
    [Figure 7-3](#9781484215012_Ch07.xhtml#Fig3).'
  trans: '

    *   ***图像**：在此区域中，你可以选择用于每个粒子的图像。粒子通常会被着色；灰度图像最适合此用途。

    *   ***数量**：此区域用于设置屏幕上任意时刻应出现的最小和最大粒子数。

    *   ***持续时间**：这是发射器产生粒子的时长。（创建连续效果时，此值将被忽略。）

    *   ***发射速率**：这是每秒将发射的粒子数量。

    *   ***生命**：这是每个粒子在粒子系统中保持活跃的时长。

    *   ***大小**：这是图像的尺寸，以像素为单位。

    *   ***速度**：这是粒子的速度，以像素/秒为单位。

    *   ***角度**：这是粒子的方向，以度为单位。

    *   ***色调**：这显示用于为粒子图像着色的颜色。

    *   ***透明度**：这控制图像随时间变化的透明度。

    *   ***叠加**：激活时，此选项通过将颜色分量相加来混合颜色，从而在粒子密集的区域产生更亮的效果。

    *   ***连续**：激活时，此选项会使发射器持续发射粒子（忽略前面的“持续时间”值）。


    在某些参数旁边，你会看到文本框和一个图表，如图 7-2 所示，这些可用于微调初始值以及随时间变化的值。（对于某些参数，你需要点击参数名称右侧的“激活”按钮，这些元素才会出现。）


    ![9781484215012_Fig07-02.jpg](img/9781484215012_Fig07-02.jpg)


    图 7-2. 用于微调参数值的粒子编辑器界面


    “高值”和“低值”框中的数值指的是右侧图表顶部和底部边缘的值。图表上的蓝线表示参数值在粒子生命周期内将如何变化。在图 7-2 所示的图表中，蓝线在顶部保持平直，表示参数值将保持在“高值”不变。图
    7-3 展示了另外两种可能的图表；左侧的图表表示从“高值”到“低值”的持续下降，而右侧的图表表示参数在粒子生命周期的大部分时间内保持在“高值”，然后突然下降到“低值”。在本节后面，我将这两个图表分别称为“逐渐下降”图表和“突然下降”图表。


    ![9781484215012_Fig07-03.jpg](img/9781484215012_Fig07-03.jpg)


    图 7-3. 参数变化图表的变体


    要修改这些图表，你可以点击任意位置来添加一个点，点击并拖动来移动一个点，以及双击一个点来删除它。


    此外，在“高值”和“低值”旁边，有标有 > 或 < 的小按钮；这些按钮可用于在对应行显示一个或两个值之间切换。当显示两个值时，它们代表一个范围，每个粒子的“高值”或“低值”将从这个范围内随机选取。正如你稍后将看到的，这可以产生非常棒的效果。


    最后，我们来讨论如何设置“色调”属性的参数。如果需要，粒子的颜色可以随时间变化；颜色的变化过程在顶部的矩形中从左到右显示。例如，图 7-4 表示一个粒子将开始为红色，过渡到蓝色，最后以绿色结束。与之前讨论的参数变化图表一样，可以通过在矩形内点击来添加额外的点（由三角形表示）。可以通过点击来选择三角形，并使用下方的滑块调整其颜色，这些滑块控制颜色的色相、饱和度和亮度。三角形可以通过点击并拖动来移动，也可以通过双击来删除。


    ![9781484215012_Fig07-04.jpg](img/9781484215012_Fig07-04.jpg)


    图 7-4. 色调参数图表


    现在你已经了解了粒子编辑器的用户界面，接下来将通过示例来展示如何为游戏《太空岩石》中的效果创建基于粒子的版本。最重要的是，创建大量效果最终会让你体会到每个参数在制作基于粒子的效果中所扮演的角色。你需要一个位置来保存最终的效果文件，因此，现在在
    BlueJ 中创建一个名为 Starscape 的新项目；在项目目录中，创建一个 assets 文件夹，你将在此存储使用 LibGDX 粒子编辑器创建的效果文件。


    火箭推进器效果


    你的第一个目标是创建一个火箭推进器效果，如图 7-5 所示。


    ![9781484215012_Fig07-05.jpg](img/9781484215012_Fig07-05.jpg)


    图 7-5. 火箭推进器粒子效果


    启动粒子编辑器程序后，在左下角的“效果发射器”面板中，点击“新建”按钮，并将新创建的列表条目重命名为 **thruster**。点击名为“未命名”（对应于默认的类火焰示例）的列表项，然后点击“删除”按钮将其移除。


    在“发射器属性”面板底部的一组选项中，取消选中“叠加”复选框，并选中“连续”复选框。现在你应该在预览面板中央看到一个红点。


    首先，你将调整任意时刻活跃的粒子数量。将“数量”属性的“最大值”改为 100。要达到这个数量，你还必须将“发射速率”属性的“高值”改为 200。（将此值改为
    100 是不够的，因为每个粒子只持续 0.5 秒，因为 500 毫秒是“生命”属性的默认值。100 的发射速率在任何给定时刻只会产生 50 个活跃粒子。）


    接下来，点击“速度”和“角度”属性旁边的“激活”按钮。对于“速度”，点击“高值”旁边的 ![image](img/arrow.jpg) 按钮，并输入值 300
    和 400。对于“角度”，再次点击“高值”旁边的 ![image](img/arrow.jpg) 按钮，并输入值 70 和 110。你现在应该看到红色粒子以摇摆的锥形图案向上喷射。


    现在更改“色调”参数图表，使色调颜色从开始的红色，变为中间的橙色，再到最后的黄色。完成此步骤后，预览面板中的粒子在发射器底部应显示为红色，并逐渐改变颜色，直到顶部变为黄色。


    最后，你希望粒子在生命周期结束时缩小并淡出。为此，修改*大小*和透明度的参数变化图表，使它们都类似于图 7-3 中的“突然下降”图表。

