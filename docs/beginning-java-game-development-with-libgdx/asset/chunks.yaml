    **后续步骤**


    尽管机制已经比较高级，但这远非一个成品，类似于《气球破坏者》游戏章节结束时的状况。不过，借助你在之前示例中学到的知识，你已经可以自行添加更多功能，例如：


    *   一个开始界面，包含操作说明和按键列表，或者有一个按钮图片，点击后加载 `TurtleLevel` 界面并开始游戏。

    *   用户界面中显示剩余待收集海星数量的标签。

    *   为了增加挑战性，让游戏世界比窗口更大，这样所有海星不会同时可见；并添加更多岩石，使游戏世界更像迷宫；再添加一些位于游戏世界起始时不可见区域的海星。

    *   使用 `Actions` 类添加一些特效，例如让海星缓慢旋转，一旦海星被收集，在从舞台移除前让它淡出。

    *   添加一个“你赢了”消息，在所有海星被收集后淡入显示。


    **总结**


    在本章中，你创建了一组可重用的类，这些类可以极大地简化未来项目的代码开发流程。你重构了上一章的代码，并创建了 `BaseScreen` 类，其中包含许多游戏通用的标准数据和启动任务，例如存储和初始化
    `Stage` 对象。你了解了如何处理离散输入（例如按键的初次按下或鼠标点击），并创建了《气球破坏者》游戏。最后，你创建了 `Actor` 类的三个扩展：`BaseActor`，用于执行基于通用多边形形状的碰撞检测与解析；`AnimatedActor`，用于管理动画集合；以及
    `PhysicsActor`，用于存储和处理与运动相关的数据，如速度和加速度。这些类的使用通过《海星收集者》游戏进行了演示。你已经取得了长足的进步，在下一章中，你将通过学习如何在游戏中融入声音和音乐，再次向前迈进一大步。


    ____________________


    ¹之所以称为匿名，是因为它没有被赋予名称，因此无法在后续使用中再次访问。

