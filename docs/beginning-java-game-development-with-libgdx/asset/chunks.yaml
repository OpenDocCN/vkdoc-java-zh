    ![image](OEBPS/Images/frontdot.jpg)


    Alternative Sources of User Input


    In previous chapters, your games have been controlled with traditional desktop
    computer hardware: a keyboard and a mouse. In this chapter, you’ll explore two
    alternative sources of user input: gamepad controllers and touch-screen controls.
    If you do not have access to a gamepad with a USB connector (as discussed later
    in this chapter), you can still follow along; the code will still compile, and
    you’ll leave keyboard controls as a feedback (a good practice to consider in general
    for the convenience of your game’s players). Similarly, even if you don’t have
    access to device that’s touch-screen capable, learning about the associated design
    considerations is still worthwhile. Furthermore, touch events and mouse events
    are handled by the same methods in LibGDX; you can simulate single-touch input
    (but not multitouch input) with the mouse. On the other hand, if neither gamepad
    nor touch-based input is of interest to you, this entire chapter may be omitted
    without loss of continuity.


    As a starting point, I’ve updated the code from the Cheese, Please! game (introduced
    in [Chapter 3](#9781484215012_Ch03.xhtml)) to include the structural and design
    modifications introduced in [Chapter 4](#9781484215012_Ch04.xhtml): incorporating
    the new BaseGame class together with Skin and Table objects to organize the user
    interface. This revised code can be found in the CheesePleaseUpdate directory
    containing the source code for this chapter, and will serve as your starting point
    for both of the main sections that follow.


    Gamepad Controllers


    *Gamepad controllers* are specialized hardware devices that make it easier for
    the player to enter game-related input. They have been in existence as long as
    game consoles, and have included various configurations of components such as
    joysticks, buttons, directional pads, dials, triggers, and touch pads. With the
    increase in console-style gaming available on desktop computers, many gamepads
    that can be connected via USB ports are now available. In this section, you’ll
    develop controls for an Xbox 360 gamepad, or one of the many alternative products
    that emulate it, such as the Logitech F310 gamepad, shown in [Figure 5-1](#9781484215012_Ch05.xhtml#Fig1).


    ![9781484215012_Fig05-01.jpg](OEBPS/Images/9781484215012_Fig05-01.jpg)


    [Figure 5-1](#9781484215012_Ch05.xhtml#_Fig1). Xbox 360 and Logitech F310 gamepad
    controllers


    Support for gamepad input is provided by the Controller and Controllers classes.
    These are not part of the core LibGDX libraries, and thus their code is contained
    in different JAR files, which must be included in your project. From the same
    download location where you obtained the file libgdx.jar, discussed in [Chapter
    1](#9781484215012_Ch01.xhtml), locate the directory extensions/gdx-controllers/
    and download the following files:


    ```

    gdx-controllers.jar

    gdx-controllers-desktop.jar

    gdx-controllers-desktop-natives.jar

    ```


