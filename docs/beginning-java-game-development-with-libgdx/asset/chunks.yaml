    # CHAPTER 7\n\n![image](OEBPS/Images/frontdot.jpg)\n\n## Integrating Third-Party\
    \ Software\n\nThis chapter covers how to use third-party software and libraries\
    \ to simplify your workflow and increase the sophistication of your games. In\
    \ particular, you will use the following:\n\n- The LibGDX Particle Editor, to\
    \ create visual effects\n- Tiled, a general-purpose map editor, to simplify the\
    \ level design process\n- Box2D, a physics engine, to simulate realistic physics-based\
    \ interactions\n\nYou’ll use each of these in developing new LibGDX projects.\
    \ The chapter concludes with a project that incorporates features from all three\
    \ of these tools.\n\n### Working with Particle Systems in LibGDX\n\nA *particle\
    \ system* is a collection of many small images that can be used to create a variety\
    \ of graphical special effects. Some effects that can be well replicated by this\
    \ technique include fire, smoke, explosions, fireworks, electric sparks, water\
    \ fountains, rain, snow, and star fields. Each of the small images in a particle\
    \ system is called a *particle*. Every particle has many properties (such as velocity,\
    \ size, color, and transparency) that can be initialized to a random value within\
    \ a given range, and these property values may be configured to change over time.\
    \ Particles are produced at a set rate by an object called an *emitter*, which\
    \ may be configured to spawn particles either for a limited time or continuously,\
    \ depending on the visual effect being created.\n\nLibGDX provides classes that\
    \ support the display of particle systems. Furthermore, the Particle Editor tool\
    \ provided with LibGDX can be used to design and preview particle effects, and\
    \ export them to a file format that can be easily imported within the LibGDX framework.\n\
