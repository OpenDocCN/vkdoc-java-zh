    Starfish Collector: A Game with Improved Actor Classes


    This section introduces another new game, and the final game of this chapter:
    Starfish Collector. Developing this game will involve rearranging and adding some
    features to the BaseActor and AnimatedActor classes, as well as creating a new
    class, PhysicsActor, for improved realistic motion. In these classes and in our
    new game program, you will also use some of Java’s built-in data structure classes.


    DATA STRUCTURES


    *Data structures* are specialized formats for storing, organizing, and accessing
    data.


    The first data structure typically encountered in Java programming is the *array*,
    which can store a fixed number of objects of a single type; the values stored
    in the array can be later accessed by an integer that refers to the position index
    within the array. While simple to understand, arrays have a few drawbacks, such
    as having a fixed size when they are created, and the possibly unintuitive association
    of a number to each array element.


    Java provides a variety of data structures that address these problems, two of
    which are introduced here (and both of which you will use in this chapter and
    beyond).


    One of these data structures is the ArrayList class. It can be used to store any
    number of objects of a single type; its size is not fixed and does not need to
    be specified when it is created. Objects can be added to a particular position,
    similar to arrays, but objects can also be added to the end of an ArrayList by
    using the method add (which also increases the size of the ArrayList by 1).


    Another convenience to using an ArrayList is that if you want to use a loop to
    perform some action with each of the elements, you can use a for-each loop (illustrated
    in the following code), which allows you to create an index variable that iterates
    through the *objects* stored in the ArrayList; this is in contrast to looping
    through a standard array, where your index variable must be an int that iterates
    over the *positions* of the objects stored in the array, and retrieving the objects
    themselves requires an extra line of code.


    Finally, objects can be removed from an ArrayList by using the method remove and
    the object itself (which will also decrease the size of the ArrayList by 1). To
    accomplish the same task with an array is much more difficult: first, we have
    to somehow determine the index of the object that is to be removed; second, the
    object can’t really even be removed—it is typically replaced with a null object,
    and the size of the array isn’t changed.


    For comparison, the following are two variations of the same code. First, we use
    an array:


    // initialize array

    String[] names = new String[3];


    // add data to array

    names[0] = "Lee";

    names[1] = "Dan";

    names[2] = "Chris";


    // print the names

    for (int i = 0; i < names.length; i++)

    {

        String n = names[i];

        System.out.println( n );

    }


    // delete "Lee" from array

    names[0] = null;


    // names.length still equals 3


    Next, we write some equivalent code that instead uses the ArrayList class:


    // initialize ArrayList

    ArrayList<String> names = new ArrayList<String>();


    // add data to ArrayList

    names.add("Lee");

    names.add("Dan");

    names.add("Chris");


    // print the names

    for (String n : names)

    {

        System.out.println( n );

    }


    // delete "Lee" from ArrayList

    names.delete("Lee");


    // now, names.size() equals 2


    In many cases, the ArrayList version of the preceding code is more intuitive and
    easier to maintain.


    Another useful data structure is called an *associative array*, which stores pairs
    of objects. The first object in the pair is called the *key*; the second object
    is called the *value*. All the keys are the same type of object, as are all the
    values (but the key type may be different from the value type). A standard Java
    array is a special case of an associative array, where the keys are consecutive
    integers, ranging from 0 to some number *n*.


    The HashMap class in Java provides all the functionality of an associative array.
    For example, perhaps we would like to store a list of names (each a String) and
    their associated high scores (each an Integer) in a game. We initialize a HashMap
    object similarly to the way we initialize an ArrayList object, except that the
    angle brackets contain the names of both the key type and the value type. Key-value
    pairs can be stored using the put method, values can be retrieved using the get
    method, and the name of the associated key, and key-value pairs can be deleted
    by using the remove method and the name of the key. You can also check whether
    a given key or value exists in the HashMap by using the containsKey and containsValue
    methods. The following example demonstrates some of these methods:


    // initialize HashMap

    HashMap<String,Integer> highScores = new HashMap<String,Integer>();


    // add data to HashMap

    highScores.put( "Lee", 337 );

    highScores.put( "Dan", 9001 );

    highScores.put( "Chris", 3333361 );


    // retrieve a value

    int danScore = highScores.get( "Dan" );


    // delete an entry

    highScores.remove( "Chris" );


    // now, highScores.size() equals 2

    //  and highScores.containsKey( "Chris" ) returns false


    At this point, you will start a new project in BlueJ for the Starfish Collector
    game. To begin, copy the code from the previous project for the BaseActor and
    AnimatedActor classes, which you will modify over the course of the following
    sections.


    The BaseActor Class


    First, you will work on the BaseActor class. The purpose of this class is to manage
    a single texture and a collision polygon; you remove the velocity-related code
    (which will become part of the PhysicsActor class instead). You also replace the
    Rectangle object with a Polygon object. A Polygon is a data structure that defines
    a shape in terms of the coordinates of its vertices (corners); it is initialized
    with an array of float values that define the coordinates of the vertices, one
    after the other. For example, if the vertices of a polygon are (x0,y0), (x1,y1),
    … , (xN,yN), then the corresponding Polygon object would be initialized with the
    array {x0, y0, x1, y1, … , xN, yN}. Also, unlike a Rectangle object, a Polygon
    can be translated and rotated, which will come in useful later. You begin our
    presentation of the BaseActor class by listing the code for the import statements,
    declaring the variables you need, writing the constructor to initialize these
    variables, and you also repeat the methods that haven’t changed since the previous
    version: setTexture, act, and draw.


    ```

