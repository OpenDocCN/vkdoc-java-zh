    and a method that can be used stop the body from rotating (by default, bodies
    are able to rotate):


    ```

    public void setStatic()

    {  bodyDef.type = BodyType.StaticBody;  }


    public void setDynamic()

    {  bodyDef.type = BodyType.DynamicBody;  }


    public void setFixedRotation()

    {  bodyDef.fixedRotation = true;  }

    ```


    Following this are methods relating to the body’s fixture: methods that set the
    shape to a circle or a rectangle, and a method to set the density, friction, and
    restitution all at once. When setting the shape, recall that the pixel dimensions
    must be scaled to the physics dimensions. Also note that the body positions are
    set to be the center of the shape. The dimensions of a rectangle are specified
    using distances from the center: half the total width and half the total length,
    similar to how the radius of a circle indicates distance from the center to the
    boundary.


    ```

    public void setShapeRectangle()

    {

        setOriginCenter();

        bodyDef.position.set( (getX() + getOriginX()) / 100, (getY() + getOriginY())/100
    );

        PolygonShape rect = new PolygonShape();

        rect.setAsBox( getWidth()/200, getHeight()/200 );

        fixtureDef.shape = rect;

    }


    public void setShapeCircle()

    {

        setOriginCenter();

        bodyDef.position.set( (getX() + getOriginX()) / 100, (getY() + getOriginY())/100
    );

        CircleShape circ = new CircleShape();

        circ.setRadius( getWidth()/200 );

        fixtureDef.shape = circ;

    }


    public void setPhysicsProperties(float density, float friction, float restitution)

    {

        fixtureDef.density     = density;

        fixtureDef.friction    = friction;

        fixtureDef.restitution = restitution;

    }

    ```


    Next are have a trio of methods that enable the user to set the variables corresponding
    to maximum speeds:


    ```

    public void setMaxSpeed(float f)

    {  maxSpeed = f;  }


    public void setMaxSpeedX(float f)

    {  maxSpeedX = f;  }


    public void setMaxSpeedY(float f)

    {  maxSpeedY = f;  }

    ```


    After using these methods to set the various properties of the object, the following
    method can be used to initialize the Body based on the BodyDef (it will be automatically
    added to the World), and initialize the Fixture (it will be automatically added
    to the Body). You can store additional data in the fixture, which may be any type
    of object; storing a String containing a name for the fixture will be useful in
    the future when creating bodies with multiple fixtures that need to be identified.
    You can also store additional data in the body, and here you should store a reference
    to this Box2DActor, which contains the Body. (This will prove useful later, in
    the collision-detection code in the main program.)


    ```

    public void initializePhysics(World w)

    {

        body = w.createBody(bodyDef);

        Fixture f = body.createFixture(fixtureDef);

        f.setUserData("main");

        body.setUserData(this);

    }

    ```


    An accessor method is needed to retrieve the Body of this actor, if it will be
    necessary to remove the actor from the game later, as this process must include
    removing the body from the physics simulation.


    ```

    public Body getBody()

    {  return body;  }

    ```


    As previously discussed, once the simulation is in progress, the movement of the
    body can be affected by applying either a force (for a continuous action) or an
    impulse (for a discrete action). In either case, it should be applied to the center
    of the body to avoid spinning the object. This is accomplished using the following
    methods:


    ```

    public void applyForce(Vector2 force)

    {  body.applyForceToCenter(force, true);  }


    public void applyImpulse(Vector2 impulse)

    {  body.applyLinearImpulse(impulse, body.getPosition(), true);  }

    ```


    Next, are a series of methods used to get and set the velocity and speed of the
    body, used internally when enforcing the maximum speed values (if previously set):


    ```

    public Vector2 getVelocity()

    {  return body.getLinearVelocity();  }


    public float getSpeed()

    {  return getVelocity().len();  }


    public void setVelocity(float vx, float vy)

    {  body.setLinearVelocity(vx,vy);  }


    public void setVelocity(Vector2 v)

    {  body.setLinearVelocity(v);  }


    public void setSpeed(float s)

    {  setVelocity( getVelocity().setLength(s) );  }

    ```


    Following this is the act method, which serves two purposes. First, it will adjust
    the velocity of the body if it exceeds any of the set maximum values. Second,
    it will update the actor properties—position and angle—based on the properties
    of the body. In this process, physics units must be scaled back to pixel units,
    and the angle of rotation must be converted from radians (used by the body) to
    degrees (used by the actor).


    ```

    public void act(float dt)

    {

        super.act(dt);


    // cap max speeds, if they have been set


    if (maxSpeedX != null)

        {

            Vector2 v = getVelocity();

            v.x = MathUtils.clamp(v.x, -maxSpeedX, maxSpeedX);

            setVelocity(v);

        }

        if (maxSpeedY != null)

        {

            Vector2 v = getVelocity();

            v.y = MathUtils.clamp(v.y, -maxSpeedY, maxSpeedY);

            setVelocity(v);

        }

        if (maxSpeed != null)

        {

            float s = getSpeed();

            if (s > maxSpeed)

                setSpeed(maxSpeed);

        }


    // update image data - position and rotation - based on physics data


    Vector2 center = body.getWorldCenter();

        setPosition( 100*center.x - getOriginX(), 100*center.y - getOriginY() );


    float a = body.getAngle();                      // angle in radians

        setRotation( a * MathUtils.radiansToDegrees );  // convert from radians to
    degrees

    }

    ```


    Finally, a clone method is included that produces a new Box2DActor. However, only
    the information from the AnimatedActor class is duplicated, because copies of
    a given object will likely have different starting positions, which affects the
    initialization of the Body.


    ```

    public Box2DActor clone()

    {

        Box2DActor newbie = new Box2DActor();

        newbie.copy( this ); // only copies AnimatedActor data

        return newbie;

    }

    ```


    With this new class at your disposal, you are ready to create your physics-based
    sandbox game!


    Jumping Jack: A Physics-Based Sandbox Game


    The *Jumping Jack* game will contain a variety of Box2DActor objects: static objects
    for the ground, walls, and platforms, dynamic objects for the crate and ball,
    and sensors for the coin objects. Since there are multiple coins in this game,
    you’ll create a Coin class extending the Box2DActor class to simplify the creation
    and cloning of these objects, as follows:


    ```

    import com.badlogic.gdx.physics.box2d.World;

    public class Coin extends Box2DActor

    {

        public Coin()

        {  super();  }


    public void initializePhysics(World world)

        {

            setStatic();

            setShapeCircle();

            fixtureDef.isSensor = true;

            super.initializePhysics(world);

        }


    public Coin clone()

        {

            Coin newbie = new Coin();

            newbie.copy( this );

            return newbie;

        }

    }

    ```


