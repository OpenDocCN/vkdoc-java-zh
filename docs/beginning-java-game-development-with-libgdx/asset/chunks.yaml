- fmt: "由于您可能在未来创建的大多数游戏中使用`Skin`对象，因此您将在框架代码中添加一个新类，该类扩展了LibGDX提供的核心类。正如您的`BaseScreen`类扩展了`Screen`类一样，您将创建一个扩展`Game`类的`BaseGame`类。`BaseGame`将包含一个由构造函数初始化的`Skin`对象。您将重写`Game`类提供的空`dispose()`方法，并编写一个调用`skin.dispose()`的方法，以便在不再需要`BaseGame`对象时释放内存（类似于本章前面讨论的音频对象的释放）。此外，`Game`类的扩展必须包含一个`create`方法，但由于`BaseGame`永远不打算被直接实例化（类似于`BaseScreen`），您将把`create`方法声明为抽象方法，这反过来要求`BaseGame`类本身也是抽象的。`BaseGame`类的代码如下：\n\
    \n```java\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.scenes.scene2d.ui.Skin;\n\
    \npublic abstract class BaseGame extends Game\n{\n    // used to store resources\
    \ common to multiple screens\n    Skin skin;\n\n    public BaseGame()\n    {\n\
    \        skin = new Skin();\n    }\n\n    public abstract void create();\n\n \
    \   public void dispose()\n    {\n        skin.dispose();\n    }\n}\n```\n\n在此添加之后，您必须更改`BaseScreen`类，以便将每次出现的`Game`类型替换为`BaseGame`类型：`game`变量和构造函数参数都应为`BaseGame`类型。同样，在`TurtleLevel`类中，构造函数参数应为`BaseGame`对象。此外，您的`TurtleGame`类现在应扩展`BaseGame`，而不是`Game`。在`TurtleGame`的`create`方法中，最终您将包含代码来初始化多个屏幕共用的资源，使用`Skin`对象存储这些资源，并且只有在这些任务完成后，才应初始化并设置游戏中要显示的第一个屏幕。\n\
    \n## 使用自定义位图字体\n\n基于位图的字体在[第2章](#9781484215012_Ch02.xhtml)中简要提及；本节将更详细地讨论它们。\n\
    \n要创建`BitmapFont`，您需要两样东西：一个包含您可能希望在应用程序中表示的所有字符的图像（[图4-6](#9781484215012_Ch04.xhtml#Fig6)包含一个示例），以及一个列出每个字符对应区域（位置和大小）的关联数据文件。例如，[图4-6](#9781484215012_Ch04.xhtml#Fig6)中对应于`A`的区域位于`x=319`，`y=134`，宽度为45，高度为41。当使用位图字体显示文本时，会提取文本中每个字符对应的图像区域，并将这些图像区域并排对齐，以产生屏幕上看到的结果。\n\
    \n![9781484215012_Fig04-06.jpg](OEBPS/Images/9781484215012_Fig04-06.jpg)\n\n[图4-6](#9781484215012_Ch04.xhtml#_Fig6).\
    \ 用于创建位图字体的图像文件（512 x 256像素）\n\nLibGDX使用由Andreas Jönsson开发的BMFont格式来存储这些数据。[¹](#9781484215012_Ch04.xhtml#Fn1)\
