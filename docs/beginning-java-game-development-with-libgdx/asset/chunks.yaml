    Layering with Stage Objects


    Generally, user interface elements are drawn on top of game world entities. In
    previous examples, I have been careful in choosing the order in which the Actors
    are added to the Stage,[⁵](#9781484215012_Ch02.xhtml#Fn5) so that background images
    are rendered first, followed by the main game entities, followed by the user interface
    elements. An easier method is to create multiple Stage objects that represent
    these groups, and then render the Stage objects in the correct order.


    Adding a second Stage is a straightforward process: most of the code mirrors that
    of the already existing Stage object called mainStage. Right after mainStage is
    declared, you’ll declare a new Stage called uiStage:


    ```

