  trans: "\n当你设计并创建了自己的游戏后，应该考虑与他人分享——毕竟，游戏就是用来玩的！这个过程需要你将作品打包成可玩的格式，并找到一群热切的游戏爱好者作为受众。\n\
    \n### 为桌面电脑打包\n\n分享游戏最简单的方法是创建可执行的 JAR 文件。\n\n1.  为此，请确认你的启动器类包含如下所示的主方法（如有必要，请调整方法的名称和参数以匹配此格式）：\n\
    \n```\n    public static void main (String[] args)\n    ```\n\n2.  然后，在 BlueJ\
    \ 菜单栏中，选择 Project → Create Jar File；此时会弹出一个小窗口。该窗口提示，如果指定了主类，你创建的 JAR 文件将是可执行的。这正是你想要做的！从下拉列表中，选择你的启动器类的名称。\n\
    3.  此外，你的可执行 JAR 文件还需要 BlueJ 在开发游戏时使用的所有 LibGDX JAR 文件的副本。如果你一直将这些文件存储在项目目录的 `+libs`\
    \ 文件夹中，可以直接跳到下一段。如果你使用了其他方法，例如将 LibGDX JAR 文件存储在 BlueJ 的 userlibs 目录中，那么窗口中标记为“Include\
    \ User Libraries”的部分将列出 JAR 文件的名称，包括包含 LibGDX 类的文件。在这种情况下，请务必在继续之前选中所有 LibGDX\
    \ JAR 文件旁边的复选框。\n4.  此时，你可以点击 Continue 按钮。会弹出一个文件目录，要求你为 JAR 文件指定一个名称。\n5.  输入你的游戏名称，然后点击\
    \ Create 按钮。由于你的应用程序需要额外的 JAR 文件，系统会在你指定的位置创建一个目录，在该目录中你会找到一个以游戏名称命名、扩展名为 `.jar`\
    \ 的文件；此目录还应包含来自 BlueJ 项目 `+libs` 目录的所有 LibGDX JAR 文件，或者你在“Create Jar File”窗口中选择的那些文件。所有这些\
    \ JAR 文件必须位于同一目录中，才能运行你的游戏。BlueJ 项目目录中其他文件夹（例如 assets 文件夹）的所有内容都存储在你的游戏 JAR 文件中。\n\
    \n要运行你的游戏，只需双击游戏的 JAR 文件，游戏就会启动。¹ 你可以通过将此目录中的文件集发送给他人，轻松地与他们分享你的游戏。² 唯一需要注意的是，潜在用户必须在他们的计算机上安装\
    \ Java 才能运行你的游戏。对于没有安装 Java 的用户，你有两个主要选择：\n\n*   你可以告知用户需要安装 Java，并引导他们访问 Java\
    \ 网站 [www.java.com](http://www.java.com)。\n*   你可以使用第三方工具将你的 JAR 文件转换为适用于各种操作系统的原生可执行文件；其中一个工具叫做\
    \ JWrapper，可从 [www.jwrapper.com](http://www.jwrapper.com) 获取。\n\n### 为其他平台编译\n\
    \n为其他平台（例如 Android、iOS 以及通过 HTML5/JavaScript 的网页浏览器）编译项目是 LibGDX 的主要优势之一。然而，要有效地做到这一点，需要使用高级集成开发环境。本节简要介绍为\
    \ Android Studio IDE 设置 LibGDX 项目所需的步骤。有关配置 IDE 设置、编译和导出的更多详细信息，你需要查阅列出的资源。\n\n\
    1.  Android Studio³ 是一个基于 IntelliJ 平台的 IDE。下载并安装此软件（与 Android SDK 捆绑的版本）后，安装程序很可能会下载一组更新的软件包。\n\
    2.  此过程完成后，访问 LibGDX Wiki 项目设置网站⁴，并从 wiki 页面上的链接下载 `gdx-tools.jar`，这是一个可执行的 JAR\
    \ 文件。运行此文件，你将看到一个类似于图 9-1 的屏幕。\n\n![9781484215012_Fig09-01.jpg](img/9781484215012_Fig09-01.jpg)\n\
    \n图 9-1. LibGDX 项目设置工具\n\n3.  在这里，你需要输入项目名称、包名（例如 `com.mygdx.spacerocks`）、Game\
    \ 类的名称（或者在我们扩展的框架中，是继承自 `BaseGame` 的类）、你希望存储文件的目录，以及安装 Android Studio 时 Android\
    \ SDK 的安装路径。\n4.  在接下来的一系列复选框中，你可以指定要为哪些平台进行开发（对于初学者，我建议选择 Android 和 Desktop）。如果你的项目需要任何第三方库或扩展（例如\
    \ Box2D 或游戏手柄控制器扩展），你可以在此处指定。\n5.  然后点击 Generate 按钮，系统会在你设置时指定的目录中为你创建一组项目文件。首次生成项目时，此过程可能需要一些时间，因为设置文件会下载许多依赖文件。\n\
    6.  全部完成后，重启 Android Studio，选择 Import Project 选项，然后选择名为 `build.gradle` 的文件。\n\n\
    当你的项目打开时，你会注意到已经为你准备了一个目录结构，包括名为 *core*、*android* 和 *desktop* 的目录。后两个目录包含为其对应平台预先制作的启动器文件。*core*\
    \ 目录是你放置所有其他类的地方。你需要为项目配置许多设置，例如编辑配置以指定游戏资源所在的工作目录。前面提到的 LibGDX wiki 包含你需要阅读的详细信息，以帮助你启动并运行项目，如果你决定进一步朝这个方向发展的话。\n\
    \n### 寻找发布渠道\n\n作为一名游戏开发者，最大的乐趣之一就是让别人玩你的游戏。即使项目尚未完成，让人们试玩你的游戏并提供反馈，也能帮助你的作品达到更高的高度，并吸引更多的受众。许多网站支持独立游戏开发者，并提供论坛供你与社区分享你的作品。其中一些网站（例如\
    \ Indie DB 和 Game Jolt）甚至允许你在注册账户后将游戏上传到他们的服务器。\n\n*   Indie DB: [www.indiedb.com](http://www.indiedb.com)\n\
    *   Game Jolt: [`gamejolt.com/`](http://gamejolt.com/)\n*   GameDev.net: [www.gamedev.net](http://www.gamedev.net)\n\
    *   The Independent Games Source (TIGSource): [www.tigsource.com](http://www.tigsource.com)\n\
    *   Indie Gamer 论坛: [`forums.indiegamer.com/`](http://forums.indiegamer.com/)\n\
    \n如果你将游戏发布到这些来源之一，在等待他人对你作品的评价时，你应该努力成为其论坛的活跃参与者。尝试一些游戏，并向你的开发者同行提供反馈。我们都受益于一个充满活力的游戏开发社区，所以一定要加入并成为其中的一员！\n\
    \n有了这最后的建议，我们共同走过这本书的旅程就结束了。然而，希望你作为游戏开发者的旅程能够继续。祝你在未来的所有努力中好运！\n\n__________________\n"
