- fmt: "第二组命令执行碰撞检测：它们判断包含`mouseyTexture`的矩形区域是否完全包含在包含`cheeseTexture`的矩形区域内。要确定这一点，你需要比较矩形的左、右、上、下边界，如图[Figure\
    \ 2-3](#9781484215012_Ch02.xhtml#Fig3)所示。左侧和底边的位置分别由纹理的`x`和`y`坐标值给出；右侧和顶边的位置可以通过将纹理的宽度和高度（通过`getWidth`和`getHeight`方法获得）分别加到`x`和`y`坐标上来计算。如图[Figure\
    \ 2-3](#9781484215012_Ch02.xhtml#Fig3)所示，当以下四个条件同时成立时，矩形A完全包含矩形B：\n\n*   `A.x\
    \ < B.x`\n*   `(B.x + B.width) < (A.x + A.width)`\n*   `A.y < B.y`\n*   `(B.y\
    \ + B.height) < (A.y + A.height)`\n\n![9781484215012_Fig02-03.jpg](OEBPS/Images/9781484215012_Fig02-03.jpg)\n\
    \n[Figure 2-3](#9781484215012_Ch02.xhtml#_Fig3). 矩形包含关系示意图\n\n该测试应用于`mouseyTexture`和`cheeseTexture`，当条件为真时，布尔变量`win`被设置为`true`，表示玩家赢得了游戏。\n\
    \n第三组命令是实际渲染发生的地方。`glClear`方法使用`glClearColor`方法中指定的颜色（以红/绿/蓝/透明度值表示）在屏幕上绘制一个纯色矩形。每次渲染过程都必须以这种方式清除屏幕，有效地“擦除”屏幕，否则之前渲染调用产生的图像可能会可见。`draw`方法调用的顺序尤为重要：后渲染的纹理将覆盖在先渲染的纹理之上。因此，通常你应该先绘制背景元素，然后是主要的游戏内实体，用户界面元素通常最后绘制。用于绘图的`Batch`类通过一次向计算机的图形处理单元（GPU）发送多个图像来优化图形操作。\n\
    \n## 管理操作\n\n在前一个例子——游戏《Cheese, Please!》的首次迭代中，你已经看到每个游戏实体（如Mousey和奶酪）都有许多你需要跟踪的相关信息，例如纹理和（`x`，`y`）坐标。在像Java这样的面向对象编程语言中，一个核心设计原则是将相关信息封装在单个类中。虽然你可以创建一个`Mousey`类、一个`Cheese`类等来管理这些信息，但这种方法会导致程序中存在大量冗余，既低效又难以管理。由于软件工程的另一个指导原则是编写可重用的代码，因此你需要实现一个包含所有游戏实体通用基本信息的单一类，并在必要时对其进行扩展。\n\
    \nLibGDX在这方面展示了其灵活性，提供了多种管理这些信息的方法，本节你将探讨其中两种：`Sprite`类和`Actor`类。\n\n### Sprite类\n\
    \n`Sprite`类包含重构`CheesePlease1`类代码所需的一切。`Sprite`包含存储坐标、纹理以及旋转角度和缩放因子等附加信息的字段。甚至还有一个关联的`Rectangle`对象，它具有内置方法（如`contains`和`intersects`）来执行碰撞检测，这将大大简化我们程序的那部分。每个字段都通过标准的`get`和`set`风格函数进行访问。其他一些有用的`Sprite`方法包括`translateX`和`translateY`，它们改变`Sprite`的`x`和`y`坐标值，以及`draw`方法，`Sprite`可以使用该方法（考虑其位置和旋转）通过给定的`SpriteBatch`来渲染自身。以下是使用`Sprite`对象的《Cheese,\
    \ Please!》新版本`CheesePlease2`类的代码；除了导入`Sprite`类之外，你还导入了`Rectangle`类，你会看到它简化了碰撞检测。\n\
    \n```java\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport\
    \ com.badlogic.gdx.Input.Keys;\nimport com.badlogic.gdx.graphics.GL20;\nimport\
    \ com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.g2d.SpriteBatch;\n\
    import com.badlogic.gdx.graphics.g2d.Sprite;\nimport com.badlogic.gdx.math.Rectangle;\n\
    \npublic class CheesePlease2 extends Game\n{\n    private SpriteBatch batch;\n\
    \    private Sprite mouseySprite;\n    private Sprite cheeseSprite;\n    private\
    \ Sprite floorSprite;\n    private Sprite winTextSprite;\n    private boolean\
