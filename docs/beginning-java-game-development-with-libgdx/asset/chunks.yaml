        if (maxSpeed != null)

        {

            float s = getSpeed();

            if (s > maxSpeed)

                setSpeed(maxSpeed);

        }


    // 基于物理数据更新图像数据 - 位置和旋转


    Vector2 center = body.getWorldCenter();

        setPosition( 100*center.x - getOriginX(), 100*center.y - getOriginY() );


    float a = body.getAngle();                      // 角度（弧度）

        setRotation( a * MathUtils.radiansToDegrees );  // 从弧度转换为度

    }

    ```


