    Using Tiled for Level Design


    In many of the previous games developed in this book, one challenging aspect has
    been the placement of objects; you often had to figure out or calculate the positions
    where actors will appear on the main stage. This section introduces Tiled, which
    greatly simplifies and accelerates this process. At this point, you should create
    a new project in BlueJ called TreasureQuest, and in the project directory, create
    a folder named assets to store the file you will produce using Tiled.


    *Tiled* is a general-purpose map editor that can be used for multiple aspects
    of the level design process. Its primary feature is to take a *tileset* (a sprite
    sheet consisting of rectangular images, or *tiles*, that represent possible features
    of the game-world terrain) and enable the user to create a *tilemap* (a selection
    and arrangement of tiles that corresponds to an image of the game world). In addition,
    Tiled can also be used to store geometric data (such as the location, size, and
    shape of game entities). Levels can be designed for games with a top-down perspective
    or a side-view perspective, depending on the tileset being used.


    The Tiled software can be downloaded from [http://mapeditor.org](http://mapeditor.org).
    It is both free and open source, and is available for Windows, OS X, and Linux
    platforms. The sections that follow demonstrate how to create a tilemap using
    Tiled, and then import it into a new game that you will create called *Treasure*
    *Quest*. A screenshot of this game appears in [Figure 7-8](#9781484215012_Ch07.xhtml#Fig8).
    The images used are in the TreasureQuest/assets folder in the source code directory
    for this chapter, which you will need for this process; the images should be copied
    into your local project’s assets folder. The final version of the map file is
    saved as game-map.tmx in the aforementioned directory.


    ![9781484215012_Fig07-08.jpg](OEBPS/Images/9781484215012_Fig07-08.jpg)


    [Figure 7-8](#9781484215012_Ch07.xhtml#_Fig8). The game Treasure Quest


    Creating Tilemaps


    You’ll be using a tileset created by Kenney Veugels, part of his excellent collection
    of freely available game art assets, available at [http://kenney.nl](http://kenney.nl).
    In your assets directory, the tileset image you will be using is called rpg-tiles-64.png
    (since each tile is 64 pixels by 64 pixels), and is pictured in [Figure 7-9](#9781484215012_Ch07.xhtml#Fig9).


    ![9781484215012_Fig07-09.jpg](OEBPS/Images/9781484215012_Fig07-09.jpg)


    [Figure 7-9](#9781484215012_Ch07.xhtml#_Fig9). The tileset used for the Treasure
    Quest game


    Start the Tiled software, and from the menu bar, choose File ![image](OEBPS/Images/arrow.jpg)
    New. For the Map Size, set the Width and Height both to 20 tiles. For the Tile
    Size, set the Width and Height both to 64 pixels. These settings are illustrated
    in [Figure 7-10](#9781484215012_Ch07.xhtml#Fig10).


    ![9781484215012_Fig07-10.jpg](OEBPS/Images/9781484215012_Fig07-10.jpg)


    [Figure 7-10](#9781484215012_Ch07.xhtml#_Fig10). Configuring settings for a new
    map in Tiled


    Next, from the menu bar, choose Map ![image](OEBPS/Images/arrow.jpg) New Tileset.
    In the pop-up window that appears, click the Browse button, locate and select
    the image file rpg-tiles-64.png from your assets directory, and click the Open
    button. After returning to the New Tileset window, make sure that the tile width
    and tile height are both set to 64 px, and then click the OK button. The tileset
    should be visible in the lower-right panel of the Tiled window, similar to [Figure
    7-11](#9781484215012_Ch07.xhtml#Fig11).


    ![9781484215012_Fig07-11.jpg](OEBPS/Images/9781484215012_Fig07-11.jpg)


    [Figure 7-11](#9781484215012_Ch07.xhtml#_Fig11). The Tiled window after loading
    a tileset


    Next, you’ll add a few layers to help keep your project organized, before you
    begin drawing. In the Layers panel in the upper-right area of the Tiled window,
    double-click Tile Layer 1 and change the name to **Background**. Then, in the
    menu bar, choose Layer ![image](OEBPS/Images/arrow.jpg) Add Tile Layer, and after
    it appears in the Layers panel, change its name to **Scenery**. Repeat this process
    one more time, adding a tile layer named **Overlay**.


    Next, you’ll begin drawing the tilemap. You’ll start with the Background layer;
    this will be used for the tiles that depict ground-level elements: grass, dirt,
    water, and so forth.'
  trans: "\npublic class GameScreen extends BaseScreen\n{\n    private PhysicsActor\
    \ spaceship;\n    private ParticleActor thruster;\n    private ParticleActor baseExplosion;\n\
    \npublic GameScreen(BaseGame g)\n    {  super(g);  }\n\npublic void create()\n\
    \    {\n        BaseActor background = new BaseActor();\n        background.setTexture(\
    \ new Texture(Gdx.files.internal(\"assets/space.png\")) );\n        background.setPosition(0,\
    \ 0);\n        mainStage.addActor(background);\n\nspaceship = new PhysicsActor();\n\
    \        Texture shipTex = new Texture(Gdx.files.internal(\"assets/spaceship.png\"\
    ));\n        shipTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
    \        spaceship.storeAnimation( \"default\", shipTex );\n        spaceship.setPosition(400,\
    \ 300);\n        spaceship.setOriginCenter();\n        spaceship.setMaxSpeed(200);\n\
    \        spaceship.setDeceleration(20);\n        mainStage.addActor(spaceship);\n\
    \nthruster = new ParticleActor();\n        thruster.load(\"assets/thruster.pfx\"\
    , \"assets/\");\n        BaseActor thrusterAdjuster = new BaseActor();\n     \
    \   thrusterAdjuster.setTexture( new Texture(Gdx.files.internal(\"assets/blank.png\"\
    )) );\n        thrusterAdjuster.addActor(thruster);\n        thrusterAdjuster.setPosition(0,32);\n\
    \        thrusterAdjuster.setRotation(90);\n        thrusterAdjuster.setScale(0.25f);\n\
    \        thruster.start();\n        spaceship.addActor(thrusterAdjuster);\n  \
    \      baseExplosion = new ParticleActor();\n        baseExplosion.load(\"assets/explosion.pfx\"\
    , \"assets/\");\n    }\n\npublic void update(float dt)\n    {\n        spaceship.setAccelerationXY(0,0);\n\
    \nif (Gdx.input.isKeyPressed(Keys.LEFT))\n            spaceship.rotateBy(180 *\
    \ dt);\n        if (Gdx.input.isKeyPressed(Keys.RIGHT))\n            spaceship.rotateBy(-180\
    \ * dt);\n        if (Gdx.input.isKeyPressed(Keys.UP))\n        {\n          \
    \  spaceship.addAccelerationAS(spaceship.getRotation(), 100);\n            thruster.start();\n\
    \        }\n        else\n        {\n            thruster.stop();\n        }\n\
    \    }\n\npublic boolean keyDown(int keycode)\n    {\n        if (keycode == Keys.P)\n\
    \            togglePaused();\n\nif (keycode == Keys.R)\n            game.setScreen(\
    \ new GameScreen(game) );\n\nif (keycode == Keys.SPACE)\n        {\n         \
    \   ParticleActor explosion = baseExplosion.clone();\n            explosion.setPosition(\
    \ MathUtils.random(800), MathUtils.random(600) );\n            explosion.start();\n\
    \            mainStage.addActor(explosion);\n        }\n\nreturn false;\n    }\n\
    }\n\n至此，星空遨游（Starscape）的代码就完成了。试试运行这个项目，在太空中翱翔，欣赏无害爆炸在星空背景下绽放的奇景。\n\n使用 Tiled\
    \ 进行关卡设计\n\n在本书之前开发的许多游戏中，一个具有挑战性的方面是物体的放置；你常常需要推算或计算角色在主舞台上的出现位置。本节将介绍 Tiled，它能极大地简化和加速这一过程。现在，请在\
    \ BlueJ 中创建一个名为 TreasureQuest 的新项目，并在项目目录中创建一个名为 assets 的文件夹，用于存放你将使用 Tiled 生成的文件。\n\
    \n*Tiled* 是一款通用地图编辑器，可用于关卡设计流程的多个方面。其主要功能是获取一个*图块集*（一个由矩形图像，即*图块*组成的精灵表，这些图块代表了游戏世界地形的可能特征），并允许用户创建*图块地图*（对应游戏世界图像的一组选定并排列好的图块）。此外，Tiled\
    \ 还可用于存储几何数据（例如游戏实体的位置、大小和形状）。根据所使用的图块集，可以为俯视视角或侧视视角的游戏设计关卡。\n\nTiled 软件可从 [`mapeditor.org`](http://mapeditor.org)\
    \ 下载。它是一款免费且开源的工具，支持 Windows、OS X 和 Linux 平台。接下来的部分将演示如何使用 Tiled 创建图块地图，然后将其导入到你将要创建的新游戏\
    \ *Treasure Quest* 中。该游戏的截图见图 7-8。此过程所需的图片位于本章源代码目录的 TreasureQuest/assets 文件夹中；你需要将这些图片复制到你本地项目的\
    \ assets 文件夹中。地图文件的最终版本将保存为上述目录中的 game-map.tmx。\n\n![9781484215012_Fig07-08.jpg](img/9781484215012_Fig07-08.jpg)\n\
    \n图 7-8. 游戏《宝藏探索》（Treasure Quest）\n\n创建图块地图\n\n你将使用 Kenney Veugels 创建的图块集，这是他优秀且免费的游戏美术资源合集的一部分，可在\
    \ [`kenney.nl`](http://kenney.nl) 获取。在你的 assets 目录中，你将使用的图块集图片名为 rpg-tiles-64.png（因为每个图块是\
    \ 64 像素 x 64 像素），如图 7-9 所示。\n\n![9781484215012_Fig07-09.jpg](img/9781484215012_Fig07-09.jpg)\n\
    \n图 7-9. 用于《宝藏探索》游戏的图块集\n\n启动 Tiled 软件，从菜单栏中选择 文件 ![image](img/arrow.jpg) 新建。对于地图大小，将宽度和高度均设置为\
    \ 20 个图块。对于图块大小，将宽度和高度均设置为 64 像素。这些设置如图 7-10 所示。\n\n![9781484215012_Fig07-10.jpg](img/9781484215012_Fig07-10.jpg)\n\
    \n图 7-10. 在 Tiled 中配置新地图的设置\n\n接下来，从菜单栏中选择 地图 ![image](img/arrow.jpg) 新建图块集。在弹出的窗口中，点击“浏览”按钮，找到并选择你\
    \ assets 目录中的图片文件 rpg-tiles-64.png，然后点击“打开”按钮。返回“新建图块集”窗口后，确保图块宽度和图块高度均设置为 64\
    \ 像素，然后点击“确定”按钮。图块集应显示在 Tiled 窗口右下角的面板中，类似于图 7-11。\n\n![9781484215012_Fig07-11.jpg](img/9781484215012_Fig07-11.jpg)\n\
    \n图 7-11. 加载图块集后的 Tiled 窗口\n\n接下来，在开始绘制之前，你需要添加几个图层来帮助保持项目组织有序。在 Tiled 窗口右上角的“图层”面板中，双击“Tile\
    \ Layer 1”并将其名称改为**背景**。然后，在菜单栏中选择 图层 ![image](img/arrow.jpg) 添加图块图层，待其出现在“图层”面板后，将其名称改为**景物**。重复此过程一次，添加一个名为**覆盖层**的图块图层。\n\
    \n接下来，你将开始绘制图块地图。先从“背景”图层开始；该图层将用于绘制代表地面元素的图块：草地、泥土、水域等。\n"
- fmt: 'If the `Background` layer is not highlighted in the `Layers` panel, click
    it so that it becomes the active layer. Next, click the icon containing an image
    of a stamp; this selects the `Stamp Brush` tool, which is the tool you will use
    most frequently. In the `Tilesets` panel in the lower-right area of the `Tiled`
    window, click one of the rectangles containing a grass-like pattern. The tile
    becomes tinted blue to show that it has been selected. Click anywhere in the currently
    empty grid that represents your tilemap, and the tile image you previously selected
    appears in that square. (The `Fill` tool, represented by the icon containing an
    image of a bucket, can be used to fill large areas faster with the currently selected
    tile.) Continue this process, adding a variety of tiles, until all tiles are filled
    and you are satisfied with the layout.


    [Figure 7-12](#9781484215012_Ch07.xhtml#Fig12) shows one such possible design,
    but feel free to create your own; experiment with the different ways the tiles
    can be arranged to create continuous borders and visually interesting arrangements.
    (The grid lines that appear in the image are there as guides and will not appear
    later when the tilemap is rendered.) If you want to change the tile that has been
    placed in a given location, you can select the `Eraser` tool icon at the top of
    the window, or you can select a different tile and use the `Stamp Brush` tool
    to replace the tile at a given location. The only restriction you should consider
    at this stage is to limit yourself to the tiles whose image fills the entire square.
    In other words, while working on this layer, avoid using tiles with transparent
    areas (such as bushes, trees, or fences). Otherwise, the color used for clearing
    the screen (defined in the `render` method of the `BaseScreen` class) will appear
    at the transparent locations.


    ![9781484215012_Fig07-12.jpg](OEBPS/Images/9781484215012_Fig07-12.jpg)


    [Figure 7-12](#9781484215012_Ch07.xhtml#_Fig12). One possible layout for the `Background`
    layer of the tilemap


    Next, you’ll add visually interesting elements that render on top of the background,
    like the bushes, trees, and fences that you avoided in the `Background` layer.
    Click the `Scenery` layer in the `Layers` panel, and then click grid squares in
    the tilemap to add these images. Notice that they don’t replace the tiles previously
    added to the `Background` layer; instead, they appear on top. This is particularly
    useful in keeping the size of tilesets small while allowing for a great variety
    of combinations. For example, you could create an image of a bush on grass or
    an image of a bush on dirt, without requiring these specific combinations to be
    available in the tileset; only the individual components need to be available.


    Once again, I recommend a restriction when selecting objects to add to this layer:
    there may be some tiles that should be rendered above the game characters, such
    as roofs of buildings or the tops of trees. This creates an illusion of depth:
    the characters will appear to underneath the roofs, or behind the trees. Thus,
    after adding elements to the `Scenery` layer, select the layer named `Overlay`,
    and add any tiles that should be rendered above the player.


    [Figure 7-13](#9781484215012_Ch07.xhtml#Fig13) shows the result of adding various
    bushes, tree trunks, and building walls to the `Scenery` layer, followed by the
    result of adding treetops to the `Overlay` layer.


    ![9781484215012_Fig07-13.jpg](OEBPS/Images/9781484215012_Fig07-13.jpg)


    [Figure 7-13](#9781484215012_Ch07.xhtml#_Fig13). Results of adding detail to the
    `Scenery` and `Overlay` layers of the tilemap


    Finally, you’ll add some nonvisual data to this map: the positions and sizes of
    various in-game objects, such as the starting position of the player and various
    items the player can interact with. These objects aren’t represented by tiles,
    but rather by images that will be loaded by the accompanying program you will
    write later. This data can be added by creating object layers; you’ll create two
    of these, to keep the data organized.


    To begin, choose `Layer` ![image](OEBPS/Images/arrow.jpg) `Add Object Layer` from
    the menu bar, and name the newly added layer `ObjectData`. Repeat this process
    to add another object layer named `PhysicsData`.


    Select the layer named `ObjectData`, and you’ll notice that some of the tool icons
    in the menu bar (those involving image manipulation, such as the `Stamp Brush`
    and `Eraser`) are dimmed and are no longer accessible. Meanwhile, some of the
    previously unavailable tools (those involving creating geometric shapes) can now
    be selected, since you’re working on an object layer.


    Select the icon for the `Insert Rectangle` tool, and you’ll be able to click and
    drag on the tilemap to add rectangles of any size at any position. The first click
    sets the upper-left corner of the rectangle; drag the mouse downward and to the
    right to set the rectangle’s size. In the `Treasure Quest` game, the in-game entities
    the player can interact with include the player, a key, a door, and three coins.
    You should add rectangles (using the `Insert Rectangle` tool) to store the position
    of each item; one possible arrangement is illustrated in [Figure 7-14](#9781484215012_Ch07.xhtml#Fig14).


    ![9781484215012_Fig07-14.jpg](OEBPS/Images/9781484215012_Fig07-14.jpg)


    [Figure 7-14](#9781484215012_Ch07.xhtml#_Fig14). Tilemap with rectangle object
    data added and highlighted


    To tell these types of objects apart, properties need to be set for each rectangle.
    To do so, click a rectangle to select it, and in the `Properties` panel on the
    left side of the `Tiled` window, enter a name in the `Name` field. Names entered
    then appear above the corresponding rectangles on the tilemap. I recommend the
    obvious names (`player`, `key`, `door`, and `coin`). The names will be important
    later, because they will be used when importing the corresponding data into the
    program. If desired, you can also adjust the position and size of each rectangle
    numerically by using the `Properties` panel, or by using the `Select Objects`
    tool from the toolbar and clicking the rectangle that you want to reposition or
    resize.


    Now select the layer named `PhysicsData`, and you’ll add a series of rectangles
    to represent solid or impassible objects. For this example, you should place the
    rectangles over the water tiles, tree trunks, and building walls. In this case,
    you won’t add names to these objects, as they all are used for the same purpose
    and it is not necessary to distinguish between them.


    [Figure 7-14](#9781484215012_Ch07.xhtml#Fig14) shows the placement of the rectangles
    on the object layers as discussed previously. Since rectangles in `Tiled` are
    displayed with light gray borders, for clarity, I have highlighted the rectangles
    in the screenshot using diagonal lines. (Rectangles do *not* appear this way when
    using the `Tiled` software.)


    Once your map is complete, save it with the file name `game-map.tmx` in the `assets`
    folder of your `BlueJ` project. In the next section, you’ll see how the built-in
    `LibGDX` classes can use this file format to render images and retrieve geometric
    data.


    ## Treasure Quest: An Adventure-Style Exploration Game


    This section demonstrates how to process the information store in `Tiled` map
    files in the context of making a new game called `Treasure Quest`. Inspired by
    classic top-down adventure games such as `The Legend of Zelda`, in this game the
    player controls a character who is searching the countryside for a key that will
    unlock the door to a building filled with gold coins.'
