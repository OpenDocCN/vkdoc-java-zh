    至此，您可以开始为 Starscape 项目编写代码了。首先，从您最近的项目中复制常用类：`BaseGame`、`BaseScreen`、`BaseActor`、`AnimatedActor`、`PhysicsActor`
    和 `GameUtils`。您需要创建一个启动器风格的类和一个继承自 `BaseGame` 的类，并且需要将本章源目录 `Starscape/assets`
    中的图像复制到本地项目的 `assets` 文件夹中。


    为了将粒子效果集成到您的项目中，您将再次创建一个继承自 `Actor` 类的扩展类，名为 `ParticleActor`。该类存储一个 `ParticleEffect`
    对象，用于更新和绘制效果。该类中的大多数方法只是激活相应 `ParticleEffect` 对象的方法，但使用了更直观的名称。`ParticleEffect`
    的更新和绘制方法将由所有 `Actor` 对象共有的标准 `act` 和 `draw` 方法激活，并且为了方便起见，将包含一个 `clone` 方法。`ParticleActor`
    类的代码如下：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.graphics.g2d.Batch;

    import com.badlogic.gdx.graphics.g2d.ParticleEffect;

    import com.badlogic.gdx.graphics.g2d.ParticleEmitter;


    public class ParticleActor extends Actor

    {

        private ParticleEffect pe;


    public ParticleActor()

        {

            super();

            pe = new ParticleEffect();

        }


    public void load(String pfxFile, String imageDirectory)

        {  pe.load(Gdx.files.internal(pfxFile), Gdx.files.internal(imageDirectory));  }


    public void start()

        {  pe.start();  }


    // 暂停连续发射器

        public void stop()

        {  pe.allowCompletion();  }


    public boolean isRunning()

        {  return !pe.isComplete();  }

        public void setPosition(float px, float py)

        {

            for (ParticleEmitter e : pe.getEmitters() )

                e.setPosition(px, py);

        }


    public void act(float dt)

        {

            super.act( dt );

            pe.update( dt );

            if ( pe.isComplete() && !pe.getEmitters().first().isContinuous() )

            {

                pe.dispose();

                this.remove();

            }

        }


    public void draw(Batch batch, float parentAlpha)

        {   pe.draw(batch);  }


    public ParticleActor clone()

        {

            ParticleActor newbie = new ParticleActor();

            newbie.pe = new ParticleEffect(this.pe);

            return newbie;

        }

    }

    ```


