    within the rectangular region pictured in [Figure 3-5](#9781484215012_Ch03.xhtml#Fig5).
    This method involves some mathematical equations to calculate the coordinates
    of the vertices. The trigonometric functions, sine and cosine, can be used to
    *parameterize* a circle or an ellipse, which means you can write functions for
    the x and y coordinates in terms of another variable, t. For example, if we let
    x = cos(t) and y = sin(t), then as the variable t takes on values ranging from
    0 to 2 × pi (approximately 6.28),[⁴](#9781484215012_Ch03.xhtml#Fn4) the corresponding
    (x,y) points will trace out the shape of a circle with radius 1\. You can adapt
    these equations to generate an ellipse that fits snugly within the given rectangular
    region, as illustrated in [Figure 3-6](#9781484215012_Ch03.xhtml#Fig6). First,
    you must scale (multiply) x by w/2, and y by h/2, so the ellipse has the correct
    size. However, the resulting ellipse is centered at the origin, and you want the
    ellipse to be centered at (w/2, h/2); therefore, you add these values to the x
    and y equations, respectively. The final form of the equations are as follows:


    ```

    x = w/2 * cos(t) + w/2

    y = h/2 * sin(t) + h/2

    ```


    The setEllipseBoundary method contains a loop to generate a set of n equally spaced
    values for t in the interval [0, 6.28], then calculates the corresponding x and
    y coordinates, and stores them in an array that will be used to initialize the
    polygon. If n = 4, the polygon will be a diamond shape; if n = 8, the polygon
    will be an octagon shape, and so forth. The larger the value of n, the smoother
    the shape will be. However, there is a trade-off: collision detection for general
    polygons is computationally intensive; large values of n can drastically slow
    down your program. For the game you’re going to create, you’ll be content with
    n = 8; an ellipse alongside a polygon approximation is illustrated in [Figure
    3-7](#9781484215012_Ch03.xhtml#Fig7).


