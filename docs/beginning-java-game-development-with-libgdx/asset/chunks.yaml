    Finally, there is the update method to consider, which processes *lots* of potential
    player input. The player is controlled using the keyboard keys W/A/S/D, which
    correspond to moving forward/left/backward/right, a standard configuration in
    many computer games. To this standard, you also add the R and F keys for moving
    up and down (which we think of as the Rise and Fall directions). You also use
    the Q and E keys to turn left and right (which also seems memorable because these
    keys are positioned above the keys for moving left and right). The camera can
    be controlled in the same way, using the same keys, when the Shift key is being
    pressed simultaneously. The camera can also be tilted upward and downward using
    the T and G keys (which you can remember with the mnemonic words *Top* and *Ground*).
    The following is the code that accomplishes all of these tasks, which as mentioned
    previously, should be included in the update method:


    ```

    float speed = 3.0f;

    float rotateSpeed = 45.0f;


    if ( !(Gdx.input.isKeyPressed(Keys.SHIFT_LEFT)

           || Gdx.input.isKeyPressed(Keys.SHIFT_RIGHT)) )

    {

        if ( Gdx.input.isKeyPressed(Keys.W) )

            player.moveForward( speed * dt );

        if ( Gdx.input.isKeyPressed(Keys.S) )

            player.moveForward( -speed * dt );

        if ( Gdx.input.isKeyPressed(Keys.A) )

            player.moveRight( -speed * dt );

        if ( Gdx.input.isKeyPressed(Keys.D) )

            player.moveRight( speed * dt );


    if ( Gdx.input.isKeyPressed(Keys.Q) )

            player.turn( -rotateSpeed * dt );

        if ( Gdx.input.isKeyPressed(Keys.E) )

            player.turn( rotateSpeed * dt );


    if ( Gdx.input.isKeyPressed(Keys.R) )

            player.moveUp( speed * dt );

        if ( Gdx.input.isKeyPressed(Keys.F) )

            player.moveUp( -speed * dt );

    }


    if ( Gdx.input.isKeyPressed(Keys.SHIFT_LEFT)

         || Gdx.input.isKeyPressed(Keys.SHIFT_RIGHT) )

    {

        if (Gdx.input.isKeyPressed(Keys.W))

            mainStage3D.moveCameraForward( speed * dt );

        if (Gdx.input.isKeyPressed(Keys.S))

            mainStage3D.moveCameraForward( -speed * dt );

        if (Gdx.input.isKeyPressed(Keys.A))

            mainStage3D.moveCameraRight( -speed * dt );

        if (Gdx.input.isKeyPressed(Keys.D))

            mainStage3D.moveCameraRight( speed * dt );


    if (Gdx.input.isKeyPressed(Keys.R))

            mainStage3D.moveCameraUp( speed * dt );

        if (Gdx.input.isKeyPressed(Keys.F))

            mainStage3D.moveCameraUp( -speed * dt );


    if (Gdx.input.isKeyPressed(Keys.Q))

            mainStage3D.turnCamera(-rotateSpeed * dt);

        if (Gdx.input.isKeyPressed(Keys.E))

            mainStage3D.turnCamera(rotateSpeed * dt);


    if (Gdx.input.isKeyPressed(Keys.T))

            mainStage3D.tiltCamera(rotateSpeed * dt);

        if (Gdx.input.isKeyPressed(Keys.G))

            mainStage3D.tiltCamera(-rotateSpeed * dt);

    }

    ```


    This completes the code for the update method, as well as the code for the demo.
    Try it out and get a feel for moving around in three-dimensional space.


    Pirate Cruiser: Navigating the Sea in 3D


    In this section, you’ll create a more game-like demo called *Pirate Cruiser*,
    in which the player steers a pirate ship through the sea and navigates around
    various rocks. [Figure 8-8](#9781484215012_Ch08.xhtml#Fig8) contains a screenshot
    of this game. Most of the difficult groundwork has been laid in the previous section.
    The remaining topics include loading complex models from external files, creating
    a skydome image that surrounds the game world, and performing simplified collision
    detection. As before, you will continue adding code to Project3D, as it already
    contains many of the classes you will need (BaseGame, the updated version of BaseScreen,
    BaseActor3D, Stage3D, and ModelUtils).


    ![9781484215012_Fig08-08.jpg](OEBPS/Images/9781484215012_Fig08-08.jpg)


    [Figure 8-8](#9781484215012_Ch08.xhtml#_Fig8). The Pirate Cruiser demo


    The first task, loading a model, is relatively straightforward. To do so, you
    need an instance of the ModelLoader class, and then use its loadModel method,
    which takes a FileHandle as input and returns a Model. If the position, rotation,
    or scale of the Model is not what you’d like it to be, you can adjust the Mesh
    data if desired by applying transformations to it, which result in a permanent
    change to the mesh. You can then use the model to create a ModelInstance and use
    it in a BaseActor3D object, as before.


    Second, you need to surround your game world with an image, so as to give the
    appearance of a sky in the background. In our previous 2D games, you created a
    rectangular object that simply displayed an image of the sky. Because you’re in
    a 3D environment, here you’ll create a spherical object that is significantly
    larger than and surrounds your game world, and apply a texture to it, such as
    the one shown in [Figure 8-9](#9781484215012_Ch08.xhtml#Fig9). You may notice
    that the image appears slightly stretched near the top (and it would on the bottom,
    too, were the bottom not simply a gray color). This is because the image has been
    spherically distorted: while it looks strange as a rectangle, when the image is
    applied to a sphere, everything will appear to have the correct proportions. This
    the same phenomena that occurs when trying to make a flat rectangular map of the
    Earth, which is roughly spherical; the map will inevitably contain distorted areas
    corresponding to the regions near the poles.


