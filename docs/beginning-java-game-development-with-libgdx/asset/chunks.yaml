    `create`方法首先初始化`Environment`，并添加一个参数（`Attribute`类的子类），该参数定义了场景中环境光的颜色。通常，灯光使用灰色调（而不是黄色或蓝色等颜色），这样场景就不会被意外的颜色染色。然后，创建一个`DirectionalLight`实例，使用更亮的灰色，并指定其方向（使用`Vector3`对象）主要向左和向下；配置其参数后，将灯光添加到环境中。接着，初始化一个`PerspectiveCamera`，视场角为67度，近裁剪面和远裁剪面分别设置为0.1和1000（选择这些值是为了确保视图区域包含您将添加到场景中的对象）。设置相机的位置，并通过`lookAt`方法指定其初始观察方向。最后，初始化一个`ModelBatch`对象，稍后将在渲染时使用。这些步骤“设置场景”，并通过以下代码完成：


    ```

    environment = new Environment();

    environment.set( new ColorAttribute(ColorAttribute.AmbientLight, 0.4f, 0.4f, 0.4f,
    1f) );


    DirectionalLight dLight = new DirectionalLight();

    Color     lightColor = new Color(0.75f, 0.75f, 0.75f, 1);

    Vector3  lightVector = new Vector3(-1.0f, -0.75f, -0.25f);

    dLight.set( lightColor, lightVector );

    environment.add( dLight ) ;


    camera = new PerspectiveCamera(67, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());

    camera.near = 0.1f;

    camera.far  = 1000f;

    camera.position.set(10f, 10f, 10f);

    camera.lookAt(0,0,0);

    camera.update();


    modelBatch = new ModelBatch();

    ```


    下一个任务是创建模型实例以添加到场景中。为了简化本示例，您将使用`ModelBuilder`类的`createBox`方法来构建一个立方体。您还必须创建一个`Material`来赋予立方体在屏幕上的外观；这里使用纯蓝色漫反射颜色。（*漫反射*表示物体在纯白光照射下呈现的颜色。）


    您还必须确定模型每个顶点应包含的数据类型：在所有情况下，顶点都应存储位置，但在此示例中，它们还存储颜色数据和一个向量（称为*法向量*），该向量用于确定光线如何从物体反射，从而提供着色效果。每个属性在`Usage`类中都有一个对应的常量值；位置数据对应`Usage.Position`，颜色数据对应`Usage.ColorPacked`，法向量数据对应`Usage.Normal`，等等。当需要这些数据的组合时，通过将所需每个属性的常量值相加来生成一个值。该结果值作为参数传递给`createBox`方法。


    您还需要决定立方体本身的尺寸。由于许多建模程序使用的比例，这些值通常在1到10的范围内，因此在使用`ModelBuilder`类创建对象时，您应该使用类似的数值范围。创建`Model`（您可以将其视为模板对象）后，初始化一个`ModelInstance`。该对象包含模型信息的副本，以及一个存储此特定实例的位置、旋转和缩放数据的变换矩阵。以下代码执行所有这些任务：


    ```

    ModelBuilder modelBuilder = new ModelBuilder();


    Material boxMaterial = new Material();

    boxMaterial.set( ColorAttribute.createDiffuse(Color.BLUE) );


    int usageCode = Usage.Position + Usage.ColorPacked + Usage.Normal;


    Model boxModel = modelBuilder.createBox( 5, 5, 5, boxMaterial, usageCode );

    boxInstance = new ModelInstance(boxModel);

    ```


    最后，给出`render`方法，游戏循环的所有阶段都在此发生。在这种情况下，程序由一个静态场景组成，因此没有用户输入需要处理，也没有更新任务需要完成——只需执行渲染。此方法的代码应该看起来相对熟悉。一个区别是`glClear`函数还需要擦除上一次渲染期间生成的深度信息，因为如果相机移动，场景中每个物体到相机的距离可能会改变，在这种情况下，深度值需要重新计算。另一个区别是`ModelBatch`在其`begin`方法中将`PerspectiveCamera`作为输入。相应的代码如下：


    ```

    Gdx.gl.glClearColor(1,1,1,1);

    Gdx.gl.glViewport(0, 0, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());

    Gdx.gl.glClear( GL20.GL_COLOR_BUFFER_BIT | GL20.GL_DEPTH_BUFFER_BIT );


    modelBatch.begin(camera);

    modelBatch.render( boxInstance, environment );

    modelBatch.end();

    ```


    像往常一样，您还需要一个启动器风格的类，如下所示：


    ```

    import com.badlogic.gdx.backends.lwjgl.LwjglApplication;

