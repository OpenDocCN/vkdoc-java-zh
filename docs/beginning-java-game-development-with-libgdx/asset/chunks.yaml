    \ 类的扩展，你可以并且将会添加一个重复的动作序列，使文本产生脉冲效果。这个类的源代码在此列出；你从列出 import 语句、变量声明和方法名开始：\n\n\
    ```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\n\
    import com.badlogic.gdx.graphics.Color;\nimport com.badlogic.gdx.graphics.GL20;\n\
    import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
    import com.badlogic.gdx.scenes.scene2d.ui.Label;\nimport com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;\n\
    import com.badlogic.gdx.scenes.scene2d.actions.Actions;\nimport com.badlogic.gdx.graphics.g2d.BitmapFont;\n\
    import com.badlogic.gdx.Screen;\n\npublic class CheeseMenu implements Screen\n\
    {\n    private Stage uiStage;\n    private Game game;\n\npublic CheeseMenu(Game\
    \ g)\n    {\n        game = g;\n        create();\n    }\n\npublic void create()\n\
    \    {    }\n\npublic void render(float dt)\n    {    }\n\npublic void resize(int\
    \ width, int height) {  }\n    public void pause()   {  }\n    public void resume()\
    \  {  }\n    public void dispose() {  }\n    public void show()    {  }\n    public\
    \ void hide()    {  }\n}\n```\n\n在 create 方法中，你使用以下代码初始化 Stage 和将包含标题屏幕图像的 BaseActor\
    \ 对象，以及显示说明和相关效果的 BitmapFont 和 Label：\n\n```\nuiStage  = new Stage();\n\nBaseActor\
    \ background = new BaseActor();\nbackground.setTexture( new Texture(Gdx.files.internal(\"\
    assets/tiles-menu.jpg\")) );\nuiStage.addActor( background );\n\nBaseActor titleText\
    \ = new BaseActor();\ntitleText.setTexture( new Texture(Gdx.files.internal(\"\
    assets/cheese-please.png\")) );\ntitleText.setPosition( 20, 100 );\nuiStage.addActor(\
    \ titleText );\n\nBitmapFont font = new BitmapFont();\nString text = \" 按 S 开始，按\
    \ M 返回主菜单 \";\nLabelStyle style = new LabelStyle( font, Color.YELLOW );\nLabel\
    \ instructions = new Label( text, style );\ninstructions.setFontScale(2);\ninstructions.setPosition(100,\
    \ 50);\n// 重复的颜色脉冲效果\ninstructions.addAction(\n    Actions.forever(\n        Actions.sequence(\n\
    \            Actions.color( new Color(1, 1, 0, 1), 0.5f ),\n            Actions.delay(\
    \ 0.5f ),\n            Actions.color( new Color(0.5f, 0.5f, 0, 1), 0.5f )\n  \
    \      )\n    )\n);\nuiStage.addActor( instructions );\n```\n\n在 render 方法中，你将检查用户是否正在按下\
    \ S 键，如果是，你将使用 Game 类的 setScreen 方法将屏幕切换到一个 CheeseLevel 实例，即游戏运行的地方。此外，你执行标准任务：调用所用任何\
    \ Stage 对象的 act 方法，并将图形绘制到屏幕上，如下所示：\n\n```\n// 处理输入\nif (Gdx.input.isKeyPressed(Keys.S))\n\
    \    game.setScreen( new CheeseLevel(game) );\n\n// 更新\nuiStage.act(dt);\n\n//\
    \ 绘制图形\nGdx.gl.glClearColor(0.8f, 0.8f, 1, 1);\nGdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\
    uiStage.draw();\n```\n\n现在 CheeseMenu 类已经配置完毕，你可以回到之前创建的 CheeseLevel 类。你希望让用户能够通过按\
    \ M 键返回主菜单，因此你在 CheeseLevel 类的 render 方法的更新部分添加以下代码：\n\n```\nif (Gdx.input.isKeyPressed(Keys.M))\n\
    \    game.setScreen( new CheeseMenu(game) );\n```\n\n最后，你需要重写 CheeseGame 类，使用\
    \ CheeseMenu 的实例（而不是 CheeseLevel）作为将要加载的第一个屏幕，如下所示：\n\n```\nimport com.badlogic.gdx.Game;\n\
    public class CheeseGame extends Game\n{\n    public void create()\n    {\n   \
    \     CheeseMenu cm = new CheeseMenu(this);\n        setScreen( cm );\n    }\n\
    }\n```\n\n至此，“奶酪，请！”游戏就完成了！\n\n总结\n"
- fmt: '# Chapter 2 Summary


    This chapter introduced many features of the LibGDX library. You began with an
    overview of the life cycle of a game program, and learned how the stages are performed
    by methods with a particular naming convention, enforced by an interface. You
    learned how to process keyboard input by using the `Gdx` class, and how to encapsulate
    game entity data by using either the `Sprite` class or the `Actor` class. You
    learned how the `Stage` class can be used to manage `Actor` instances, and how
    to extend the `Actor` class for greater functionality. Next, you saw how to make
    actors more visually interesting by using value-based animations provided by the
    `Actions` class, and image-based animations via the `Animation` class. Then, I
    introduced the `Label`, `LabelStyle`, and `BitmapFont` classes to help you create
    a user interface on a second `Stage`. You also increased the size of the game
    world and learned how to use the `Camera` associated with a `Stage` to display
    the correct part of the game world. Finally, the chapter introduced the `Screen`
    interface that enabled you to create a start menu in a class separate from the
    class containing the game-play code; and you saw how the `Game` class manages
    multiple screens.


    In the next chapter, you’ll create your own extensions of these classes that capture
    the common features in many games, and see how to use these as the basis of a
    completely new game.


    ---


    [¹](#9781484215012_Ch02.xhtml#_Fn1) Running faster than this is usually unnecessary,
    because most computer display hardware is incapable of displaying images at a
    greater rate than this.


    [²](#9781484215012_Ch02.xhtml#_Fn2) The next chapter covers how to organize code
    more intuitively, so that the update and render stages are handled by separate
    methods.


    [³](#9781484215012_Ch02.xhtml#_Fn3) The design choice to have y increase toward
    the top, while consistent with mathematical conventions, is the opposite of most
    computer science coordinate system conventions, which place the origin point (0,0)
    at the top-left corner of a window, and the y value increases toward the bottom.


    [⁴](#9781484215012_Ch02.xhtml#_Fn4) For enlarging font, this method should be
    used sparingly, as it may cause images to look pixelated. This effect can be lessened
    by using a linear texture filter on the bitmap font image, but the best practice
    would be to simply use a high-resolution image for the font whenever possible.


    [⁵](#9781484215012_Ch02.xhtml#_Fn5) However, it is possible to rearrange the rendering
    order of an `Actor` after it has been added to a `Stage` by using the `setZIndex`
    method of the `Actor` class.


    # Chapter 3: Extending the Framework


    This chapter begins by reviewing the code for the *Cheese, Please!* game from
    the previous chapter. Your main focus will be streamlining your code from the
    previous chapter by refactoring common elements into new classes that can be reused
    as needed. This will also make it easier to introduce more-advanced features,
    such as new methods for processing user input. Then you will see how your new
    classes can be used as a basis for additional game projects. Finally, you will
    improve your custom extensions of the `Actor` class by adding improved collision
    detection and response, managing multiple animations, and implementing physics-based
    movement.


    ## Cheese, Please! Revisited


    Looking at the final version of the code from the previous chapter’s game (*Cheese,
    Please!*), you can observe that the `Screen`-implementing classes contain similar
    data (such as `Stage` objects) and perform similar tasks (such as calling the
    `act` and `draw` methods of the stages). In computer programming, you’d like to
    remove repetition and create reusable code whenever possible, so that your code
    is easier to understand and maintain. You’ll address this issue in this section.
    In addition, you’ll introduce some new functionality to each of these classes:


    - The ability to handle discrete input events—actions that occur only once when
    a key is pressed or a mouse button is clicked

    - The ability to pause the game, which requires the Boolean variable `paused`
    to determine whether the game is currently paused, and some associated helper
    methods: `isPaused`, `setPaused`, and `togglePaused`

    - The ability to resize the window and have the game world entities scale appropriately
    in response


    To this end, you’ll create a new class, called `BaseScreen`, which manages the
    data and handles the new and old tasks that your classes have in common. Then,
    your other game-play-centric classes will extend the `BaseScreen` class, which
    will simplify your code greatly. Before you start writing this class, however,
    you need to learn about two implementation-related issues in detail: discrete
    input and abstract class design.


    ### Discrete Input


    Previously, the method you used to process input is called *polling*: checking
    the state of the input hardware devices (such as the keyboard) during *every*
    iteration of the game loop. This approach is particularly well-suited for *continuous
    actions*—those that continue to happen during an interval of time, as long as
    the corresponding trigger is active. For instance, the player’s character should
    continue to move (barring the presence of solid obstacles such as walls) for as
    long as the player is pressing an arrow key.


    In contrast, an action such as jumping is called a *discrete action*, since it
    happens only once per key press. Even if the player continues to hold down the
    jump key, the player’s character will *not* jump again until the jump key is released
    and pressed a second time (provided that the character is on the ground again!).


    Discrete actions are tricky to handle using the polling approach, and so the LibGDX
    library provides an event-driven approach. This involves writing functions that
    are automatically called when certain events occur (such as the initial press
    or release of a key, or click of a mouse button).


    Any object can be assigned the responsibility of responding to input events, but
    in order to do so correctly, it must contain a particular set of methods: those
    specified by the `InputProcessor` interface. There are eight of these methods
    altogether: `keyDown`, `keyUp`, and `keyTyped` to handle keyboard events; `touchDown`,
    `touchUp`, and `touchDragged` to handle both mouse and touch-screen events; `mouseMoved`
    and `scrolled` to handle mouse events. We’ll discuss these methods further during
    the source code listing for the `BaseScreen` class.


    The final question we need to address in this section is this: which component
    of your program should bear the responsibility of responding to input events?
    For example, the `Stage` class implements the `InputProcessor` interface; this
    is particularly helpful for a `Stage` that contains user interface elements, because
    it enables button-like objects to activate methods when they are clicked. At the
    same time, you are planning for the `BaseScreen` class to also implement the `InputProcessor`
    interface so that it can handle discrete input as described earlier. Should the
    `Stage` class or the `BaseScreen` class be in charge of responding to input events?
    In practice, you want both objects to have the opportunity to do so. The way this
    arrangement will be implemented in your code is via the `InputMultiplexer` class.
    An `InputMultiplexer` object is itself an `InputProcessor` that contains a list
    of other `InputProcessors`. You can add the `Stage` and `BaseScreen` objects to
    an `InputMultiplexer`, and when input events occur, the `InputMultiplexer` will
    forward along the information to each of these objects and give them the opportunity
    to respond accordingly.


    ### Abstract Class Design'
