    \ will display a list of available method names.\n*   Shortcut keys for indenting/un-indenting\
    \ and commenting/uncommenting blocks of code. These are listed in the Edit menu.\n\
    *   A simple interface for adding breakpoints, which activates a debugger that\
    \ allows you to step through code line by line and easily inspect objects.\n\n\
    For complete information on these and other features, see the BlueJ reference\
    \ manual at [www.bluej.org/doc/bluej-ref-manual.pdf](http://www.bluej.org/doc/bluej-ref-manual.pdf).\n\
    \nSetting Up LibGDX\n\nIn this section, you’ll configure BlueJ so that it can\
    \ use the LibGDX software library. *Software libraries* are collections of prewritten\
    \ code and methods that can be used by other programs. Their value lies in their\
    \ reusability—they accelerate and simplify the development process when they implement\
    \ frequently needed processes, saving programmers from needing to “reinvent the\
    \ wheel” every time they write a program. The LibGDX libraries, for example, contain\
    \ methods for displaying graphics, playing sounds, and getting input from the\
    \ user. (Advanced functions are available as well, which are discussed later in\
    \ this chapter.)\n\nIn Java, libraries are stored in Java Archive (JAR) files.\
    \ A JAR file contains many files (similar to a ZIP file)—compiled Java files,\
    \ stored in a standardized directory structure that the JDK can navigate. Your\
    \ first step is to download the LibGDX JAR files that you will need for our project.\
    \ There are two online sources to obtain these files:\n\n*   From the web site\
    \ [https://libgdx.badlogicgames.com/releases/](https://libgdx.badlogicgames.com/releases/),\
    \ download the latest version of the file with a file name of the form libgdx-x.y.z.zip.\
    \ This is an archive file that contains all the various LibGDX JAR files. Extract\
    \ the following files to your Desktop directory: gdx.jar, gdx-natives.jar, gdx-backend-lwjgl.jar,\
    \ and gdx-backend-lwjgl-natives.jar. These files contain the core code for the\
    \ LibGDX library.\n*   Alternatively, the most up-to-date versions of these four\
    \ JAR files can be obtained from the web site [https://libgdx.badlogicgames.com/nightlies/dist/](https://libgdx.badlogicgames.com/nightlies/dist/).\
    \ These are the *nightly builds* of the LibGDX libraries (in contrast to the previous\
    \ link, which points to the most recent stable version of the software). These\
    \ files are the most up-to-date, but they are also under development and thus\
    \ may contain a few bugs or glitches.\n\nOnce these four JAR files have been obtained,\
    \ BlueJ needs to be configured so that it recognizes and can use the contents\
    \ of these files. There are two main ways to do so:\n\n*   The easiest way to\
    \ make BlueJ aware of JAR files is to create a directory named +libs within the\
    \ project directory, then copy the JAR files into this directory, and restart\
    \ the BlueJ software. By default, when a project is opened in BlueJ, it automatically\
    \ scans for the presence of a folder named +libs and takes its contents into account\
    \ when compiling new code.\n*   When there are JAR files that may be used in multiple\
    \ projects, rather than creating redundant copies of these files in +libs directories\
    \ for each of these projects, they can be copied to a special subdirectory, named\
    \ userlib, in the folder where the BlueJ software is installed. The full path\
    \ to the directory should be something similar to C:\\Program Files\\BlueJ\\lib\\\
    userlib\\; the exact name can be checked by selecting the menu option Tools ![image](OEBPS/Images/arrow.jpg)\
    \ Preferences in Windows, or BlueJ ![image](OEBPS/Images/arrow.jpg) Preferences\
    \ in OS X, and clicking the Libraries tab.\n\nOnce these steps are complete, BlueJ\
    \ needs to be restarted, and then you’ll be ready to write your first program\
    \ in LibGDX.\n\nCreating a “Hello, World!” Program with LibGDX\n\nTraditionally,\
    \ a “Hello, World!” program displays a text message on the screen. Since our ultimate\
    \ goal is to create video games—primarily visual programs—your first LibGDX program\
    \ will draw a picture of the world in a window, as shown in [Figure 1-5](#9781484215012_Ch01.xhtml#Fig5).\n\
    \n![9781484215012_Fig01-05.jpg](OEBPS/Images/9781484215012_Fig01-05.jpg)\n\n[Figure\
    \ 1-5](#9781484215012_Ch01.xhtml#_Fig5). A “Hello, World!” program created using\
    \ LibGDX\n\nHere, you will begin to see some of the advantages and start to understand\
    \ what I mean by *building upon* the classes provided by the LibGDX libraries.\
    \ Our first project contains two classes. The first class, called HelloWorldImage,\
    \ makes use of the functionality of a LibGDX class, called Game, by extending\
    \ it.\n\nEXTENDING A CLASS\n\nOne of the central principles of software engineering\
    \ is to design programs that avoid redundancy by creating reusable code. One way\
    \ to accomplish this is by the object-oriented concept of inheritance: the creation\
    \ of a new class based on an existing class."
  trans: "\n完成步骤 3 后，你的屏幕应类似于图 1-2。\n\n![9781484215012_Fig01-02.jpg](img/9781484215012_Fig01-02.jpg)\n\
    \n图 1-2. BlueJ 项目窗口\n\n4.  创建一个新类，可以通过点击“New Class”按钮，或从菜单栏中选择“Edit”![image](img/arrow.jpg)“New\
    \ Class”。\n5.  当系统提示你输入类名时，输入**HelloWorld**，然后按回车键或点击“OK”按钮。此时会出现一个橙色矩形，顶部显示你输入的类名。灰色对角线表示代码尚未编译。\n\
    6.  双击该矩形，或右键点击并选择“Open Editor”来编辑文件。你会看到已添加了一些模板代码；删除所有这些代码，并输入以下代码替换：\n\n```\n\
    \    public class HelloWorld\n    {\n        public static void main()\n        {\n\
    \            System.out.print(\"Hello, World!\");\n        }\n    }\n    ```\n\
    \n将这段代码输入 BlueJ 后，它应类似于图 1-3 中的截图。\n\n![9781484215012_Fig01-03.jpg](img/9781484215012_Fig01-03.jpg)\n\
    \n图 1-3. 在 BlueJ 代码编辑器中显示的“Hello, World!”程序\n\n7.  点击“Compile”按钮编译代码。（此操作也会自动保存你的代码。）你应该会在窗口底部的状态栏中看到“Class\
    \ compiled – no syntax errors”消息。\n8.  右键点击该类的橙色矩形，从出现的列表中选择方法 void main()。这将运行你刚刚编写的方法。此时会出现一个终端窗口，其中包含文本\
    \ *Hello, World!*，如图 1-4 所示。\n\n![9781484215012_Fig01-04.jpg](img/9781484215012_Fig01-04.jpg)\n\
    \n图 1-4. “Hello, World!”程序显示的文本\n\n恭喜你成功使用 BlueJ 运行了第一个程序！\n\nBlueJ 具有许多使编程更轻松的功能。在输入上述代码时，你可能已经注意到了语法高亮（Java\
    \ 关键字和字符串以不同颜色显示），以及类和方法周围显示的不同背景色，这有助于更直观地检查代码。（稍后你会注意到，条件语句和循环也以类似的背景色加以区分。）BlueJ\
    \ 还包含其他你可能觉得有用的功能，例如：\n\n*   自动代码格式化。从“Edit”菜单中选择“Auto-Layout”将调整代码中的空白，使嵌套语句对齐一致。\n\
    *   列出可用的方法名。输入类或对象名后跟句点，然后按 Ctrl+Space 将显示可用方法名列表。\n*   用于缩进/取消缩进和注释/取消注释代码块的快捷键。这些在“Edit”菜单中列出。\n\
    *   用于添加断点的简单界面，可激活调试器，让你逐行执行代码并轻松检查对象。\n\n有关这些功能及其他功能的完整信息，请参阅 BlueJ 参考手册，网址为\
    \ [www.bluej.org/doc/bluej-ref-manual.pdf](http://www.bluej.org/doc/bluej-ref-manual.pdf)。\n\
    \n设置 LibGDX\n\n在本节中，你将配置 BlueJ，使其能够使用 LibGDX 软件库。*软件库*是可供其他程序使用的预编写代码和方法的集合。它们的价值在于可重用性——当它们实现频繁需要的过程时，可以加速并简化开发过程，使程序员无需在每次编写程序时都“重新发明轮子”。例如，LibGDX\
    \ 库包含用于显示图形、播放声音和获取用户输入的方法。（高级功能也可用，本章稍后会讨论。）\n\n在 Java 中，库存储在 Java 归档（JAR）文件中。JAR\
    \ 文件包含许多文件（类似于 ZIP 文件）——编译后的 Java 文件，以 JDK 可以导航的标准目录结构存储。你的第一步是下载项目所需的 LibGDX\
    \ JAR 文件。有两个在线来源可以获取这些文件：\n\n*   从网站 [`libgdx.badlogicgames.com/releases/`](https://libgdx.badlogicgames.com/releases/)\
    \ 下载文件名格式为 libgdx-x.y.z.zip 的最新版本文件。这是一个包含所有各种 LibGDX JAR 文件的归档文件。将以下文件解压到你的桌面目录：gdx.jar、gdx-natives.jar、gdx-backend-lwjgl.jar\
    \ 和 gdx-backend-lwjgl-natives.jar。这些文件包含 LibGDX 库的核心代码。\n*   或者，可以从网站 [`libgdx.badlogicgames.com/nightlies/dist/`](https://libgdx.badlogicgames.com/nightlies/dist/)\
    \ 获取这四个 JAR 文件的最新版本。这些是 LibGDX 库的*每日构建*（与指向最新稳定版本的上一链接相对）。这些文件是最新的，但仍在开发中，因此可能包含一些错误或小问题。\n\
    \n获取这四个 JAR 文件后，需要配置 BlueJ，使其能够识别并使用这些文件的内容。有两种主要方法可以做到这一点：\n\n*   让 BlueJ 识别\
    \ JAR 文件的最简单方法是在项目目录中创建一个名为 +libs 的目录，然后将 JAR 文件复制到此目录中，并重启 BlueJ 软件。默认情况下，当在\
    \ BlueJ 中打开项目时，它会自动扫描是否存在名为 +libs 的文件夹，并在编译新代码时将其内容纳入考虑。\n*   当有 JAR 文件可能用于多个项目时，与其为每个项目在\
    \ +libs 目录中创建这些文件的冗余副本，不如将它们复制到 BlueJ 软件安装文件夹中一个名为 userlib 的特殊子目录中。该目录的完整路径应类似于\
    \ C:\\Program Files\\BlueJ\\lib\\userlib\\；具体名称可以通过在 Windows 中选择菜单选项“Tools”![image](img/arrow.jpg)“Preferences”，或在\
    \ OS X 中选择“BlueJ”![image](img/arrow.jpg)“Preferences”，然后点击“Libraries”选项卡来确认。\n\
    \n完成这些步骤后，需要重启 BlueJ，然后你就可以准备编写第一个 LibGDX 程序了。\n\n使用 LibGDX 创建“Hello, World!”程序\n\
    \n传统上，“Hello, World!”程序会在屏幕上显示一条文本消息。由于我们的最终目标是创建视频游戏——主要是视觉程序——你的第一个 LibGDX 程序将在窗口中绘制一幅世界图像，如图\
    \ 1-5 所示。\n\n![9781484215012_Fig01-05.jpg](img/9781484215012_Fig01-05.jpg)\n\n\
    图 1-5. 使用 LibGDX 创建的“Hello, World!”程序\n\n在这里，你将开始看到一些优势，并开始理解我所说的*基于* LibGDX 库提供的类进行构建的含义。我们的第一个项目包含两个类。第一个类名为\
    \ HelloWorldImage，通过扩展 LibGDX 类 Game 来利用其功能。\n\n扩展类\n\n软件工程的核心原则之一是设计避免冗余的程序，通过创建可重用代码来实现。实现这一目标的一种方法是面向对象的继承概念：基于现有类创建新类。\n"
- fmt: "例如，假设我们正在设计一款角色扮演游戏，其中可能包含多种可玩角色，例如战士、忍者、盗贼和巫师。如果我们要设计类来表示这些角色，它们会有一些共同特征：每个角色都有一个名字、一定数量的生命值（`HP`），以及一个可能在模拟战斗时使用的名为`attack`的方法。\n\
    \n某些特征也可能是每个角色独有的；例如，巫师可能还有一定数量的魔法值（`MP`），以及一个在使用魔法时调用的名为`castSpell`的方法。由于这些角色之间存在差异，我们无法创建一个能代表所有角色的单一类；同时，在每个单独的类中反复输入相同的字段也显得冗余。针对这种情况，一种优雅的方法是创建一个包含这些角色所有共同特征的基类，然后其他类继承这个基类。继承类可以访问基类的所有字段和方法，并且可以像往常一样包含自己的字段和方法。我们可以通过以下代码实现这一场景：\n\
    \n```\npublic class Person\n{\n    String name;\n    int HP;\n    public void\
    \ attack(Person other)\n    {\n        // insert code here…\n    }\n}\n```\n\n\
    然后我们可以像下面这样继承`Person`类：\n\n```\npublic class Wizard extends Person\n{\n    int\
    \ MP;\n    public void castSpell( String spellName )\n    {\n        // insert\
    \ code here…\n    }\n}\n```\n\n接着，如果我们创建这些类的实例：\n\n`Person percy = new Person();`\n\
    `Wizard merlin = new Wizard();`\n\n那么诸如`merlin.MP += 10`和`merlin.castSpell(\"\
    fireball\")`这样的命令是有效的，同时涉及基类字段和方法的命令，例如`merlin.HP -= 3`和`merlin.attack( percy\
    \ )`也是有效的。然而，名为`percy`的对象只能使用`Person`类的字段和方法；像`percy.HP += 5`这样的代码可以编译，但`percy.castSpell(\"\
    lightning\")`在文件编译时会导致错误。\n\n继承类的概念不仅对游戏内实体有用，对类似框架的元素也同样适用。例如，拥有一个包含所有菜单类型通用功能（如打开和关闭菜单）的`Menu`类会很有用。然后，可以创建其他继承该类的类：例如，可以创建一个名为`SelectionMenu`的类，它是一个专门用于显示某种信息并要求玩家从一组选项中进行选择的`Menu`。`InformationMenu`类可能是一个显示基于文本的信息，并在玩家阅读完毕后直接关闭的菜单。\n\
    \n在你的项目中创建一个名为`HelloWorldImage`的新类，并输入以下源代码。请注意，在类本身之前，有一些`import`语句，表明你将在此程序中使用的`LibGDX`类。另外请注意，此程序使用了一个文件名为`world.png`的图像；该图像包含在本章的源代码中，位于`MyProject`文件夹内（源代码可从`apress.com`获取）。你应该将此图像复制到你的`MyProject`文件夹中。或者，你也可以选择使用自己的图像；建议此程序使用\
    \ 256 x 256 像素的尺寸，如果这样做，请不要忘记相应地更改以下代码中的文件名。\n\n```\nimport com.badlogic.gdx.Game;\n\
    import com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.files.FileHandle;\nimport\
    \ com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.graphics.g2d.SpriteBatch;\n\
    import com.badlogic.gdx.graphics.Texture;\n\npublic class HelloWorldImage extends\
    \ Game\n{\n    private Texture texture;\n    private SpriteBatch batch;\n\n  \
    \  public void create()\n    {\n        FileHandle worldFile = Gdx.files.internal(\"\
    world.png\");\n        texture = new Texture(worldFile);\n        batch = new\
    \ SpriteBatch();\n    }\n\n    public void render()\n    {\n        Gdx.gl.glClearColor(1,\
    \ 1, 1, 1);\n        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\n        batch.begin();\n\
    \        batch.draw( texture, 192, 112 );\n        batch.end();\n    }\n}\n```\n\
    \n`HelloWorldImage`类包含两个对象：一个`Texture`和一个`SpriteBatch`。`Texture`是一个存储图像相关数据的对象：图像的尺寸（宽度和高度）以及每个像素的颜色。`SpriteBatch`是一个将图像绘制到屏幕上的对象。\n\
    \n`HelloWorldImage`类还包含两个方法：`create`和`render`。\n\n`create`方法初始化`Texture`和`SpriteBatch`对象。特别是，`Texture`对象需要一个图像文件，从中获取其图像数据。为此，你需要创建一个`FileHandle`：一个用于访问计算机上存储文件的`LibGDX`对象。`Gdx`类包含许多有用的静态对象和方法（类似于Java的`Math`类）；在这里，你使用一个名为`internal`的方法来生成一个`FileHandle`对象，该对象将被`Texture`对象使用。`internal`方法将在`BlueJ`项目目录中搜索该文件，该目录与编译后的类文件存储位置相同。\n\
    \n`create`方法完成后，`render`方法将由`LibGDX`大约每秒调用 60 次。该方法包含一对静态方法调用：一个用于选择特定的背景颜色，另一个用于使用该颜色清除窗口。\n\
    \n接下来，你将创建第二个类，该类创建`HelloWorldImage`类的实例并激活其方法；这样的类通常被称为*驱动类*，并且要求你编写一个`static`方法。\n\
    \n## 静态方法和驱动类\n\n默认情况下，类的方法由该类的实例调用。然而，方法也可以声明为*静态*的，这意味着它是直接从类（而不是实例）调用的。一个方法应该是基于实例的还是基于类（静态）的，取决于该方法的使用方式及其所需的数据。\n\
    \n基于实例的方法通常依赖于该实例特有的内部数据。例如，每个`String`对象都有一个名为`charAt`的方法，该方法接受一个整数作为输入，并返回存储在该`String`中该位置的字符。如果我们像下面这样创建两个`String`对象：\n\
    \n`String player1 = \"Lee\";`\n`String player2 = \"Dan\";`\n\n那么表达式`player1.charAt(1)`返回字符`e`，而`player2.charAt(1)`返回字符`a`。此方法返回的值取决于存储在该实例中的数据，因此`charAt`无疑是一个基于实例的方法。\n\
    \n在面向对象的编程语言中，一个类的大多数方法都是基于实例的，因为它们要么依赖于实例变量的值，要么可能改变这些值。当然，也存在静态方法更自然的情况。通常，任何不涉及对象内部状态的方法都可以声明为静态的（例如数学公式——Java的`Math`类的所有方法都是静态的）。"
  raw: 'For example, if we were designing a role-playing game, it would probably have
    many types of playable characters, such as warriors, ninjas, thieves, and wizards.
    If we were to design classes to represent each of these characters, they would
    have certain features in common: they each have a name, a certain number of health
    points (HP), and perhaps a method named attack that can be used when simulating
    combat.


    Some features also may be unique to each character; for example, perhaps wizards
    also have a certain number of magic points (MP), and a method named castSpell
    that is called when they use magic. Because of the differences between these characters,
    we can’t create a single class that represents all of them; at the same time,
    it feels redundant to keep entering the same fields over and over again in each
    of their separate classes. An elegant approach to this type of scenario is to
    create a base class that contains all the features common to these characters,
    and other classes will extend this base class. The extending class has access
    to all the fields and methods of the base class, and can also contain its own
    fields and methods as usual. We could implement this scenario with the following
    code:


    ```

      public class Person

      {

              String name;

              int HP;

              public void attack(Person other)

              {

                      // insert code here…

              }

      }

    ```


    And then we can extend the Person class as follows:


    ```

      public class Wizard extends Person

      {

              int MP;

              public void castSpell( String spellName )

              {

                      // insert code here…

              }

      }

    ```


    Then, if we were to create instances of these classes:


    Person percy = new Person();

    Wizard merlin = new Wizard();


    Then commands such as merlin.MP += 10 and merlin.castSpell("fireball") are valid,
    as well as commands involving fields and methods of the base class, such as merlin.HP
    -= 3 and merlin.attack( percy ). However, the object called percy can use only
    the fields and methods of the Person class; code such as percy.HP += 5 will compile,
    but percy.castSpell("lightning") will result in an error when the file is compiled.


    The concept of extending a class is not only useful for in-game entities, but
    also for framework-like elements. For example, it would be useful to have a Menu
    class that contains functionality common to all types of menus, such as opening
    and closing the menu. It might then be useful to create other classes that extend
    this one: for example, a class named SelectionMenu could be created, which is
    a Menu that specializes in displaying some sort of information and asks the player
    to make a selection from a set of options. An InformationMenu class might be a
    menu that displays some text-based information and simply closes when the player
    is finished reading it.


    Create a new class in your project, called HelloWorldImage, and enter the source
    code that follows. Note that before the class itself, there are a number of import
    statements that indicate which of the LibGDX classes you’ll be using in this program.
    Also note that this program uses an image with the file name world.png; this image
    is included in the source code for this chapter, in the folder MyProject (the
    source code is available from apress.com). You should copy this image into your
    MyProject folder. Alternatively, you could use an image of your own choosing instead;
    a size of 256 by 256 pixels is recommended for this program, and don’t forget
    to change the file name in the following code accordingly if you do.


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.files.FileHandle;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.graphics.Texture;


    public class HelloWorldImage extends Game

    {

        private Texture texture;

        private SpriteBatch batch;


    public void create()

        {

            FileHandle worldFile = Gdx.files.internal("world.png");

            texture = new Texture(worldFile);

            batch = new SpriteBatch();

        }


    public void render()

        {

            Gdx.gl.glClearColor(1, 1, 1, 1);

            Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);


    batch.begin();

            batch.draw( texture, 192, 112 );

            batch.end();

        }

    }

    ```


    The HelloWorldImage class contains two objects: a Texture and a SpriteBatch. A
    Texture is an object that stores image-related data: the dimensions (width and
    height) of an image, and the color of each pixel. A SpriteBatch is an object that
    draws images to the screen.


    The HelloWorldImage class also contains two methods: create and render.


    The create method initializes the Texture and SpriteBatch objects. In particular,
    the Texture object requires an image file from which it will get its image data.
    For this purpose, you create a FileHandle: a LibGDX object that is used to access
    files stored on the computer. The Gdx class contains many useful static objects
    and methods (similar to Java’s Math class); here, you use a method named internal
    to generate a FileHandle object that will be used by the Texture object. The internal
    method will search for the file in the BlueJ project directory, the same location
    where the compiled class files are stored.


    After the create method is finished, the render method will be called by LibGDX
    approximately 60 times per second.[¹](#9781484215012_Ch01.xhtml#Fn1) This method
    contains a pair of static method calls: one to select a particular background
    color, and another to use that color to clear the window.


    Next, you’ll create a second class that creates an instance of the HelloWorldImage
    class and activates its methods; such a class is often called a *driver class*,
    and requires you to write a static method.


    STATIC METHODS AND DRIVER CLASSES


    By default, the methods of a class are called by instances of that class. However,
    a method can also be declared to be *static*, meaning that it is called from the
    class directly (rather than an instance). Whether a method should be instance-based
    or class-based (static) depends on how the method is used and what data it requires.


    An instance-based method usually depends on the internal data specific to that
    instance. For example, every String object has a method called charAt, which takes
    an integer as input, and returns the character stored at that position in the
    String. If we create two String objects as follows:


    String player1 = "Lee";

    String player2 = "Dan";


    then the expression player1.charAt(1) returns the character e, while player2.charAt(1)
    returns a. The value returned by this method depends on the data stored in that
    instance, and thus charAt is most assuredly an instance-based method.


    In object-oriented programming languages, most of the methods of a class will
    be instance-based because they either depend upon or potentially change the values
    of an instance’s variables. There are, of course, situations where static methods
    are more natural. In general, any method that does not involve the internal state
    of an object could be declared as static (such as mathematical formulas—all the
    methods of Java’s Math class are static).'
  trans: '

    例如，假设我们正在设计一款角色扮演游戏，其中可能包含多种可玩角色，比如战士、忍者、盗贼和巫师。如果我们要为每个角色设计类，它们会具有一些共同特征：每个角色都有名字、一定数量的生命值（HP），以及一个可能在模拟战斗时调用的名为
    attack 的方法。


    某些特征也可能是每个角色所独有的；例如，巫师可能还有一定数量的魔法值（MP），以及一个在使用魔法时调用的名为 castSpell 的方法。由于这些角色之间存在差异，我们无法创建一个能代表所有角色的单一类；同时，在每个单独的类中反复输入相同的字段也显得冗余。针对这种情况，一种优雅的方法是创建一个包含这些角色所有共同特征的基类，然后其他类将继承这个基类。继承类可以访问基类的所有字段和方法，并且也可以像往常一样包含自己的字段和方法。我们可以用以下代码实现这个场景：


    ```

      public class Person

      {

              String name;

              int HP;

              public void attack(Person other)

              {

                      // 在此处插入代码…

              }

      }

    ```


    然后我们可以像下面这样继承 Person 类：


    ```

      public class Wizard extends Person

      {

              int MP;

              public void castSpell( String spellName )

              {

                      // 在此处插入代码…

              }

      }

    ```


    接着，如果我们创建这些类的实例：


    Person percy = new Person();

    Wizard merlin = new Wizard();


    那么像 `merlin.MP += 10` 和 `merlin.castSpell("fireball")` 这样的命令是有效的，同时涉及基类字段和方法的命令，如
    `merlin.HP -= 3` 和 `merlin.attack( percy )` 也是有效的。然而，名为 percy 的对象只能使用 Person 类的字段和方法；像
    `percy.HP += 5` 这样的代码可以编译通过，但 `percy.castSpell("lightning")` 在编译文件时会导致错误。


    继承类的概念不仅对游戏中的实体有用，对类似框架的元素也同样适用。例如，拥有一个包含所有菜单类型通用功能（如打开和关闭菜单）的 Menu 类会很有用。然后，创建其他继承该类的类可能也很有用：例如，可以创建一个名为
    SelectionMenu 的类，它是一个专门用于显示某种信息并要求玩家从一组选项中进行选择的菜单。而 InformationMenu 类可能是一个显示基于文本的信息，并在玩家阅读完毕后直接关闭的菜单。


    在你的项目中创建一个名为 HelloWorldImage 的新类，并输入以下源代码。请注意，在类本身之前，有一些 import 语句，用于指明你将在本程序中使用的
    LibGDX 类。另外请注意，本程序使用了一个名为 world.png 的图像文件；该图像包含在本章的源代码中，位于 MyProject 文件夹内（源代码可从
    apress.com 获取）。你应该将此图像复制到你的 MyProject 文件夹中。或者，你也可以选择使用自己的图像；建议本程序使用 256x256 像素的尺寸，如果这样做，请不要忘记相应地修改以下代码中的文件名。


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.files.FileHandle;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.graphics.Texture;


    public class HelloWorldImage extends Game

    {

        private Texture texture;

        private SpriteBatch batch;


    public void create()

        {

            FileHandle worldFile = Gdx.files.internal("world.png");

            texture = new Texture(worldFile);

            batch = new SpriteBatch();

        }


    public void render()

        {

            Gdx.gl.glClearColor(1, 1, 1, 1);

            Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);


    batch.begin();

            batch.draw( texture, 192, 112 );

            batch.end();

        }

    }

    ```


    HelloWorldImage 类包含两个对象：一个 Texture 和一个 SpriteBatch。Texture 是一个存储图像相关数据的对象：图像的尺寸（宽度和高度）以及每个像素的颜色。SpriteBatch
    是一个将图像绘制到屏幕上的对象。


    HelloWorldImage 类还包含两个方法：create 和 render。


    create 方法初始化 Texture 和 SpriteBatch 对象。特别是，Texture 对象需要一个图像文件，它将从中获取图像数据。为此，你需要创建一个
    FileHandle：一个用于访问计算机上存储文件的 LibGDX 对象。Gdx 类包含许多有用的静态对象和方法（类似于 Java 的 Math 类）；在这里，你使用一个名为
    internal 的方法来生成一个 FileHandle 对象，该对象将被 Texture 对象使用。internal 方法将在 BlueJ 项目目录中搜索该文件，该目录与编译后的类文件存储位置相同。


    create 方法执行完毕后，LibGDX 将大约每秒调用 render 方法 60 次。¹ 该方法包含一对静态方法调用：一个用于选择特定的背景颜色，另一个用于使用该颜色清除窗口。


    接下来，你将创建第二个类，该类创建 HelloWorldImage 类的实例并激活其方法；这样的类通常被称为*驱动类*，并且需要你编写一个静态方法。


    静态方法与驱动类


    默认情况下，类的方法由该类的实例调用。然而，方法也可以声明为*静态*，这意味着它是直接从类（而不是实例）调用的。一个方法应该是基于实例还是基于类（静态）取决于该方法的使用方式及其所需的数据。


    基于实例的方法通常依赖于该实例特有的内部数据。例如，每个 String 对象都有一个名为 charAt 的方法，该方法接受一个整数作为输入，并返回存储在该
    String 中该位置的字符。如果我们像下面这样创建两个 String 对象：


    String player1 = "Lee";

    String player2 = "Dan";


    那么表达式 `player1.charAt(1)` 返回字符 e，而 `player2.charAt(1)` 返回 a。此方法返回的值取决于存储在该实例中的数据，因此
    charAt 肯定是一个基于实例的方法。


    在面向对象的编程语言中，一个类的大多数方法都是基于实例的，因为它们要么依赖于实例变量的值，要么可能改变这些值。当然，也存在静态方法更自然的情况。一般来说，任何不涉及对象内部状态的方法都可以声明为静态（例如数学公式——Java
    的 Math 类的所有方法都是静态的）。

