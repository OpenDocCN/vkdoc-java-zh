    \ loader = new ObjLoader();\nModel shipModel = loader.loadModel(Gdx.files.internal(\"\
    assets/ship.obj\"));\nfor (Mesh m : shipModel.meshes)\n    m.transform( new Matrix4().setToRotation(0,1,0,\
    \ 180) );\nModelInstance shipInstance = new ModelInstance(shipModel);\nplayer.setModelInstance(shipInstance);\n\
    player.setEllipseBase();\nmainStage3D.addActor(player);\n```\n\n现在，使用之前描述的 `ModelUtils`\
    \ 类中的 `createSphereInv` 方法初始化天空穹顶：\n\n```\nBaseActor3D skydome = new BaseActor3D();\n\
    Texture skyTex = new Texture(Gdx.files.internal(\"assets/sky-sphere.png\"), true);\n\
    ModelInstance skyInstance = ModelUtils.createSphereInv( 500, skyTex, Color.WHITE\
    \ );\nskydome.setModelInstance(skyInstance);\nskydome.setPosition(0,0,0);\nmainStage3D.addActor(skydome);\n\
    ```\n\n接下来的任务是初始化存储岩石对象的 `ArrayList`，创建一个岩石的基础实例，并使用 `clone` 方法创建多个岩石，在将它们添加到游戏世界之前重新定位它们。\n\
    \n```\nrockList = new ArrayList<BaseActor3D>();\n\nModel rockModel = loader.loadModel(Gdx.files.internal(\"\
    assets/rock.obj\"));\nModelInstance rockInstance = new ModelInstance(rockModel);\n\
    BaseActor3D baseRock = new BaseActor3D();\nbaseRock.setModelInstance(rockInstance);\n\
    baseRock.setEllipseBase();\n\nBaseActor3D rock1 = baseRock.clone();\nrock1.setPosition(2,0,2);\n\
    mainStage3D.addActor(rock1);\nrockList.add(rock1);\n\nBaseActor3D rock2 = baseRock.clone();\n\
    rock2.setPosition(-4,0,4);\nmainStage3D.addActor(rock2);\nrockList.add(rock2);\n\
    \nBaseActor3D rock3 = baseRock.clone();\nrock3.setPosition(6,0,6);\nmainStage3D.addActor(rock3);\n\
    rockList.add(rock3);\n```\n\n最后，设置摄像机的位置。这里不会设置观察方向，因为稍后将在 `update` 方法中处理。\n\n\
    ```\nmainStage3D.setCameraPosition(2,3,15);\n```\n\n至此，`create` 方法完成。最终的代码添加将在\
    \ `update` 方法中进行，并且相对简短。必须完成的三个任务包括：检测玩家与岩石之间的碰撞、处理用户输入（飞船只能向前移动以及左右转向），以及设置摄像机方向使其始终面向玩家。这些任务通过以下代码实现，应将其添加到\
    \ `update` 方法中：\n\n```\nfor ( BaseActor3D rock : rockList )\n    player.overlaps(rock,\
    \ true);\n\nfloat speed = 3.0f;\nfloat rotateSpeed = 45.0f;\n\nif ( Gdx.input.isKeyPressed(Keys.W)\
    \ )\n    player.moveForward( speed * dt );\n\nif ( Gdx.input.isKeyPressed(Keys.Q)\
    \ )\n    player.turn( -rotateSpeed * dt );\nif ( Gdx.input.isKeyPressed(Keys.E)\
    \ )\n    player.turn( rotateSpeed * dt );\n\nmainStage3D.setCameraDirection( player.getPosition()\
    \ );\n```\n\n添加此代码后，`GameScreen` 类就完成了。试试看吧！驾驶你的新海盗船在开阔的海面上航行，但要小心那些岩石！\n\n##\
    \ 后续步骤\n\n有了本章奠定的基础，你现在可以尝试一些练习，并在你的 3D 项目中加入高级功能。本节列出了一些可能性。获取概览并开始阅读新特性的最佳地点通常是\
    \ LibGDX 维基，它除了包含基本信息外，有时还会提供教程链接。\n\n*   创建一个交互式 3D 场景，其中包含从外部文件加载的各种模型。以下是一些可以下载模型文件的网站（提供多种文件格式）：\n\
    \    *   OpenGameArt：[`opengameart.org`](http://opengameart.org)\n    *   The\
    \ Models Resource：[www.models-resource.com](http://www.models-resource.com)\n\
    \    *   TurboSquid：[www.turbosquid.com](http://www.turbosquid.com)（他们有许多免费模型；可以在搜索选项中指定。）\n\
    *   下载 3D 模型后，在将其加载到 LibGDX 之前，你可以使用 3D 图形软件（如 Blender）查看和修改它，该软件可在 [www.blender.org](http://www.blender.org)\
    \ 免费获取。\n*   尝试为本书前面的一些项目创建 2.5D 版本。\n*   要实现高级 3D 物理效果，请将 Bullet 物理引擎集成到你的项目中（此过程将类似于你之前为模拟真实\
    \ 2D 物理而集成 Box2D 物理引擎的工作）。\n*   为你的游戏添加 3D 粒子效果；LibGDX 提供了一个 3D 粒子编辑器（称为 *Flame*）来帮助设计效果（类似于上一章讨论的\
    \ 2D 粒子编辑器）。\n\n## 总结\n\n本章可能只是触及了 3D 游戏编程的皮毛，但这本身已经涉及了大量内容。你探索了 3D 场景的组成部分、透视摄像机和光照。你了解到\
    \ 3D 模型包含网格和材质，模型实例使用矩阵存储变换数据（位置、旋转和缩放）。你改编并扩展了自定义游戏开发框架，加入了 3D 版本的演员和舞台，并学习了在三维世界中移动对象的多种方法。最后，你通过创建两个交互式演示程序，检验了你的技能（和代码）。恭喜你完成了本章的学习，祝你在未来的\
    \ 3D 开发中好运。\n\n____________________\n\n¹关于 3D 图形数学细节的更多信息，有两本优秀的书籍可供参考：Fletcher\
    \ Dunn 和 Ian Parberry 合著的 *3D Math Primer for Graphics and Game Development*（A\
    \ K Peters/CRC Press, 2011），以及 Eric Lengyel 所著的 *Mathematics for 3D Game Programming\
    \ and Computer Graphics*（Cengage Learning PTR, 2011）。\n\n²当使用三个值来表示物体绕三个轴的旋转时，*万向节锁*\
    \ 指的是当物体处于某几个特定方向，导致两个旋转轴对齐时出现的问题，这使得物体在给定方向上无法以某些方式旋转。\n\n³理论上，选择 y 轴作为“向上”方向有些随意，因为你可以在游戏世界中调整自己的朝向，使得任何轴都对应向上方向。\n\
    \n⁴绕向上指向轴的旋转量也称为*偏航角*。类似地，绕侧向指向轴的旋转（头部上下倾斜的运动）称为*俯仰角*，绕前向指向轴的旋转（头部左右倾斜的运动）称为*翻滚角*。\n\
    \n⁵这种修改的需求通常只有在测试代码并目视检查模型时才会变得明显。或者，使用本章后面提到的 Blender 等 3D 建模程序，可以提前检查和调整模型的外观。\n\
    \n## 第九章\n\n![image](img/frontdot.jpg)\n\n旅程继续\n"
- fmt: '# 继续你的游戏开发之旅


    最后一章将介绍一系列步骤，供你在继续游戏开发时参考。你将探索如何参与其他项目、学习相关领域的技能，以及将你的游戏带给更广泛的受众。在此过程中，本章将提供各类资源列表以及适用于多种情况的通用建议。


    ## 持续提升你的开发能力


    本节将介绍如何完善当前项目并开始新项目，无论是独立完成还是作为游戏开发马拉松（Game Jam）活动的一部分。本节将提供一个在线资源列表，你可以从中获取美术资源以助一臂之力。最后，我将给出一些有益的建议，帮助你克服必然会出现的障碍。


    ### 推进项目


    希望你已经完成了本书中的所有项目示例。许多项目在结尾处都设有“下一步”章节。你应该尽可能多地完成这些建议！这一点至关重要，因为**你通过实践来学习**。无论你在阅读某个主题时觉得多么有道理，只有当你能够独立地迈出下一步，进行设计和编写代码时，你才算真正理解了该主题。在每个项目功能实现后，你都应该尝试修改代码，并尝试自己的变体。


    请确保你在所有层面上都理解每个程序。在局部层面，你应该理解每一行代码的效果，以及每个方法的目的和编写时考虑的设计因素。在全局层面，你应该知道所有类如何作为一个统一的整体协同工作，框架如此构建背后的原因，以及以不同方式修改框架的优缺点。


    当你从本书中汲取了尽可能多的知识和经验后，就该独立行动，开始创建你自己的游戏了。首先，我建议创建简单、最小的示例来实现新的游戏机制（即本书未涉及的其他机制）——也许是一款射击风格的游戏，敌人会定期向你发射激光；或者是一款迷宫逃脱游戏，包含许多出现在不同屏幕上的相互连接的房间；或者是一款冒险游戏，主角挥舞剑来击败敌人；或者是一款平台游戏，玩家还必须攀爬梯子来穿越关卡。除了了解如何编写更多机制的明显好处外，弄清楚如何做到这一点的过程也是无价的。只有通过思考、规划、编写代码、测试、调试和重写代码，你才能培养出创造力、组织能力、适应性和毅力等技能。


    一旦你能够自如地独立实现游戏机制，下一步我建议采用“克隆经典”的方法进行学习（但当然不是为了发布！）。选择一款经典游戏（尤其是20世纪80年代的游戏），并尝试尽可能多地重现其功能：实现游戏机制、关卡设计、艺术风格（图形和音频）以及用户界面（菜单屏幕和屏幕上的数据展示）。


    具体来说，我建议创建一个物理列表，识别并优先处理你将要处理的每个类别中的游戏特定功能。此外，我建议按照上一段中给出的顺序，对功能本身的类别进行优先级排序。例如，如果你的主角是一个带翅膀的弓箭手，在角色能够飞行和射箭之前，不要担心他腰带的颜色。（事实上，在游戏机制的编程阶段，开发者使用简单的彩色多边形形状是很常见的做法。）如果你不是艺术家，也不必担心；许多网站提供免费的游戏图形资源，社区中也有很多艺术家在寻找合作者。最后，当你对自己的技能和能力感到满意时，就该开发你自己的游戏，或者加入一个游戏开发团队，贡献你的编程技能。


    ### 获取美术资源


    本书的典型读者可能主要对游戏开发的编程方面感兴趣，但即便如此，每个游戏仍然受益于高质量的图形和音频。我推荐以下网站来获取美术资源。这些网站大多提供免费和付费选项，而其他网站则依靠用户捐赠：


    *   **Kenney Game Assets**：[http://kenney.nl/](http://kenney.nl/)


    由 Kenney Vleugels 创建，该网站拥有超过18,000个美术资源，可用于多种游戏类型。在本书中，来自该网站的资源被用于《太空岩石》、《飞机躲避》、《52张牌接龙》、《寻宝任务》和《跳跃杰克》系列。


    *   **GameArtGuppy**：[www.gameartguppy.com](http://www.gameartguppy.com)


    由 Vicki Wenderlich 创建，该网站包含一系列专为独立游戏开发者制作的高质量美术作品。在本书中，《跳跃杰克》游戏中的考拉角色即来自该网站。


    *   **OpenGameArt**：[http://opengameart.org](http://opengameart.org)


    一个包含所有类型媒体（2D和3D图形，以及音效和音乐）的仓库。贡献由社区驱动。许可细节和条件由各个创作者决定。


    *   **The Spriters Resource**：[www.spriters-resource.com](http://www.spriters-resource.com)


    拥有历史上众多游戏机系统中几乎全面的游戏美术资源集。然而，由于版权限制，这些资源不能用于已发布或商业游戏。


    *   **Cool Text**：[http://cooltext.com](http://cooltext.com)


    一个免费的文本艺术图形生成器，可用于创建标题屏幕的图形以及用户界面的文本和按钮。


    *   **Textures.com**：[http://textures.com](http://textures.com)


    提供多种材质（包括天然和人造材质）的图片。


    *   **Bfxr**：[www.bfxr.net](http://www.bfxr.net)


    随机生成各种复古风格的游戏音效。


    *   **Freesound**：[www.freesound.org](http://www.freesound.org)


    一个协作式的知识共享许可声音数据库，按包和标签进行组织。


    *   **Incompetech**：[http://incompetech.com/](http://incompetech.com/)


    由 Kevin MacLeod 创建，该网站拥有一个免版税的原创音乐作品集，可按流派、节奏、感觉或乐器进行搜索。在本书中，《海星收集者》游戏（见[第4章](#9781484215012_Ch04.xhtml)）的背景音乐“盛宴之主”即来自该作品集。


    ### 参与游戏开发马拉松'
  raw: 'This final chapter presents a variety of steps to consider as you continue
    on in game development. Among these, you’ll explore working on additional projects,
    learning skills in related areas, and bringing your games to a wider audience.
    Along the way, the chapter presents lists of resources of all types, and general
    advice for many situations.


    Continuing Your Developing


    This section covers how to refine your current projects and start working on new
    projects, either on your own or as part of a game jam event. The section provides
    a list of online resources where you can obtain art assets to help you along the
    way. Finally, I’ll give a healthy dose of advice for overcoming the inevitable
    obstacles that will arise.


    Working on Projects


    Hopefully, you’ve been working through all the project examples in this book.
    Many of the projects presented have concluded with a section titled “Next Steps.”
    You should try to complete as many of these suggestions as you can! This is vital
    because *you learn by doing*. No matter how much sense a topic makes when you
    read about it, you have truly understood a topic only when you can take the next
    steps of designing and writing code independently. After each of the projects
    is functional, you should always experiment with the code and try your own variations.


    Make sure that you understand each program at all levels. At the local level,
    you should understand the effects of each line of code, and also the purpose of
    each method and the design considerations that were taken into account when each
    was written. At the global level, you should know how all the classes fit together
    as a unified whole, the reasoning behind structuring the framework as it is, and
    the advantages and disadvantages to modifying the framework in different ways.


    After you’ve extracted as much knowledge and experience from this book as you
    feel is possible, it’s time to strike out on your own and start creating your
    own games. To start, I recommend creating simple, minimal examples that implement
    new game mechanics (that is, mechanics other than those featured in this book)—perhaps
    a shoot-’em-up style game with enemies who periodically fire lasers at *you*,
    or a labyrinth escape game containing many interconnected rooms that appear on
    different screens, or an adventure game with the main character swinging a sword
    to defeat the enemies, or a platformer game with a player who must also climb
    ladders to navigate the level. In addition to the obvious benefits of knowing
    how to program even more mechanics, the process of figuring out how to do so is
    invaluable. Only by engaging in the acts of pondering, planning, writing code,
    testing, debugging, and rewriting code can you build skills like inventiveness,
    organization, adaptability, and perseverance.


    Once you become comfortable implementing game mechanics on your own, as a next
    step I recommend a “cloning the classics” approach for learning purposes (but
    certainly not for publication!). Take a classic game (particularly those from
    the 1980s) and attempt to re-create as many of its features as possible: implement
    the game mechanics, level design, artistic (graphics and audio) style, and user
    interface (menu screens and onscreen data displays).


    In particular, I advise creating a physical list identifying and prioritizing
    the game-specific features within each category that you’ll be working on. Furthermore,
    I recommend prioritizing the categories of the features themselves in the order
    presented in the previous paragraph. For example, if your main character is a
    winged archer, don’t worry about the color of his belt until after the character
    is able to fly and shoot arrows. (In fact, it is common practice for developers
    to use simple colored polygon shapes during the game-mechanics phase of programming.)
    Don’t worry if you’re not an artist; many web sites exist with freely available
    video game graphics, and many artists in the community are looking for collaborators.
    Finally, once you’re comfortable with your skills and abilities, it’s time to
    develop your own game, or join a team working on a game and lend your programming
    skills.


    Obtaining Art Resources


    The typical reader of this book likely is mainly interested in the programming
    aspects of game development, but even so, every game still benefits from quality
    graphics and audio. I recommend the following web sites for obtaining artistic
    resources. Most of these web sites have both free and paid options, while others
    are driven by user donations:


    *   Kenney Game Assets: [http://kenney.nl/](http://kenney.nl/)


    Created by Kenney Vleugels, this site features over 18,000 art assets that can
    be useful in many genres. In this book, assets from this site were featured in
    Space Rocks, Plane Dodger, 52-Card Pickup, Treasure Quest, and the Jumping Jack
    series.


    *   GameArtGuppy: [www.gameartguppy.com](http://www.gameartguppy.com)


    Created by Vicki Wenderlich, this site contains a collection of high-quality art
    crafted especially for independent game developers. In this book, the Koala character
    from the Jumping Jack games was obtained from this site.


    *   OpenGameArt: [http://opengameart.org](http://opengameart.org)


    A repository for all types of media (2D and 3D graphics, as well as sound effects
    and music). Contributions are community driven. Licensing details and conditions
    are determined by the individual creators.


    *   The Spriters Resource: [www.spriters-resource.com](http://www.spriters-resource.com)


    Features a nearly comprehensive set of game art assets from many game console
    systems throughout history. Due to copyright restrictions, however, these assets
    cannot be used in published or commercial games.


    *   Cool Text: [http://cooltext.com](http://cooltext.com)


    A free text art graphics generator that can be useful for creating graphics for
    title screens as well as text and buttons for user interfaces.


    *   Textures.com: [http://textures.com](http://textures.com)


    Offers images of many types of materials, both natural and constructed.


    *   Bfxr: [www.bfxr.net](http://www.bfxr.net)


    Randomly generates a wide range of retro-style sound effects for use in games.


    *   Freesound: [www.freesound.org](http://www.freesound.org)


    A collaborative database of Creative Commons licensed sounds, organized into packs
    and also grouped by tags.


    *   Incompetech: [http://incompetech.com/](http://incompetech.com/)


    Created by Kevin MacLeod, this web site features a collection of royalty-free
    original music compositions that can be searched by genre, tempo, feel, or instrumentation.
    In this book, the background music for the game Starfish Collector (in [Chapter
    4](#9781484215012_Ch04.xhtml)), “Master of the Feast,” was obtained from this
    collection.


