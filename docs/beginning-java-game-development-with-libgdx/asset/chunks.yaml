  raw: 'Next, is the new version of our game’s source code, which uses the new BaseActor
    class throughout. There are a few changes from the Sprite-based version of the
    code. In particular:


    *   Actor objects must be added to the Stage, and the act and draw methods of
    the Stage must be called (recall that calling the act and draw methods on a Stage
    results in the Stage object calling the act and draw methods of all the Actor
    objects that have been added to it).

    *   We set the initial visibility of winText to false, because the player should
    not be able to see that particular image until later, when she has won the game.

    *   Mousey’s position is not changed directly; the change in position is calculated
    using velocity and elapsed time since the last update, the latter of which is
    given by the method getDeltaTime. A velocity of 100 (pixels per second) may seem
    large, but if the game is running at a rate of 60 frames per second, then getDeltaTime
    will return a value of approximately 0.016; this means Mousey will move about
    1.6 pixels each time the update method is called. This is comparable to Mousey’s
    speed in the version of the game from the class CheesePlease1.


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.math.Rectangle;

    import com.badlogic.gdx.scenes.scene2d.Stage;


    public class CheesePlease3 extends Game

    {

        public Stage mainStage;

        private BaseActor mousey;

        private BaseActor cheese;

        private BaseActor floor;

        private BaseActor winText;


    public void create()

        {

            mainStage = new Stage();


    floor = new BaseActor();

            floor.setTexture( new Texture(Gdx.files.internal("assets/tiles.jpg"))
    );

            floor.setPosition( 0, 0 );

            mainStage.addActor( floor );


    cheese = new BaseActor();

            cheese.setTexture( new Texture(Gdx.files.internal("assets/cheese.png"))
    );

            cheese.setPosition( 400, 300 );

            mainStage.addActor( cheese );


    mousey = new BaseActor();

            mousey.setTexture( new Texture(Gdx.files.internal("assets/mouse.png"))
    );

            mousey.setPosition( 20, 20 );

            mainStage.addActor( mousey );


    winText = new BaseActor();

            winText.setTexture( new Texture(Gdx.files.internal("assets/you-win.png"))
    );

            winText.setPosition( 170, 60 );

            winText.setVisible( false );

            mainStage.addActor( winText );

        }


    public void render()

        {

            // process input

            mousey.velocityX = 0;

            mousey.velocityY = 0;


    if (Gdx.input.isKeyPressed(Keys.LEFT))

                mousey.velocityX -= 100;

            if (Gdx.input.isKeyPressed(Keys.RIGHT))

                mousey.velocityX += 100;

            if (Gdx.input.isKeyPressed(Keys.UP))

                mousey.velocityY += 100;

            if (Gdx.input.isKeyPressed(Keys.DOWN))

                mousey.velocityY -= 100;


    // update

            float dt = Gdx.graphics.getDeltaTime();

            mainStage.act(dt);


    // check win condition: mousey must be overlapping cheese

            Rectangle cheeseRectangle = cheese.getBoundingRectangle();

            Rectangle mouseyRectangle = mousey.getBoundingRectangle();


    if ( cheeseRectangle.contains(mouseyRectangle) )

                winText.setVisible( true );


    // draw graphics

            Gdx.gl.glClearColor(0.8f, 0.8f, 1, 1);

            Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);


    mainStage.draw();

        }

    }

    ```


    In the next section, you’ll see how using the Actor class enables you to implement
    various types of animations for your game entities.


    Implementing Visual Effects


    This section shows how to implement two types of animation: value-based animation
    and image-based animation.


    Value-Based Animations


    Many visual effects can be achieved by continuously changing values associated
    with a game entity, such as the following:


    *   A movement effect can be created by changing the position coordinate values.

    *   A spinning effect can be created by changing the rotation value.

    *   A growing or shrinking effect can be created by changing the scale factors.

    *   A color-cycling effect can be created by changing the color red/green/blue
    component values.

    *   A fading in/out effect can be created by changing the alpha (transparency)
    value.


    These effects can easily be added to your game by using LibGDX’s Action class.
    An Action is an object that can be added to an Actor, which automatically changes
    the values of various fields (position, rotation, scale, color) over time. The
    code that accomplishes this is contained within the act method of the Actor class
    (and this is why you needed to call super.act(dt) when writing the act method
    of the BaseActor class—to make sure that this code was executed). To create an
    Action, it is recommended to use the static methods available in the Actions class.
    We’ll see many examples of these methods in what follows; for a complete listing,
    see the documentation for the LibGDX Actions class.


    You can also create complex, compound visual effects by combining Action objects.
    These effects can be configured to run one after the other (*in sequence*) or
    all at the same time (*in parallel*). Additionally, actions can be set to repeat
    a finite or infinite number of times. Once again, the methods of the Actions class
    greatly simplify this process.


    You will add two value-based animation effects to the program, both of which will
    occur (that is, they will be created and added to the corresponding actors) when
    the player wins the game.


    You start by creating a new class, called CheesePlease4, that contains all of
    the code from the class CheesePlease3\. To this new class, you begin by declaring
    a Boolean variable called win, and in the create method, initialize it to false.
    To check whether the player has won the game, you use the following code, which
    is structured so that win is set to true only once:


    ```

    Rectangle cheeseRectangle = cheese.getBoundingRectangle();

    Rectangle mouseyRectangle = mousey.getBoundingRectangle();

    if ( !win && cheeseRectangle.contains( mouseyRectangle ) )

    {

        win = true;

    }

    ```


    The following code listings should be added into the preceding block of code,
    where win is set to true.


    Next, you will create an effect that will cause the cheese image to rotate (360
    degrees per 1 second), shrink (change both scaling factors to 0 over the course
    of 1 second), and fade out (over the course of 1 second); furthermore, these actions
    will all occur in parallel. This also requires you to import the Action and Actions
    classes; the full import paths can be found in the LibGDX documentation, or seen
    in the source code accompanying this chapter.


    ```

    Action spinShrinkFadeOut = Actions.parallel(

        Actions.alpha(1),           // set transparency value

        Actions.rotateBy(360, 1),   // rotation amount, duration

        Actions.scaleTo(0, 0, 1),   // x amount, y amount, duration

        Actions.fadeOut(1)          // duration of fade out

    );

    cheese.addAction( spinShrinkFadeOut );

    ```


    In order for the cheese image to rotate around its center (rather than a corner),
    you need to set the origin point of the Actor, which serves as the center of rotation.
    This can be accomplished by adding the following line of code to the create method,
    after setting the Texture of the cheese object:


    ```

    mousey.setOrigin( mousey.getWidth()/2, mousey.getHeight()/2 );

    ```


    You now create a sequence of effects that causes the You Win graphic to become
    visible, and then fade in (over the course of 2 seconds). The last step will be
    an infinite loop containing a two-step sequence: shift the color tint to red,
    and then shift the color tint to blue, each of these steps occurring over the
    course of 1 second. (This will also require you to import the Color class.) Since
    the nesting of these method calls can be complicated, I’ve used indentation to
    make the code more readable:'
