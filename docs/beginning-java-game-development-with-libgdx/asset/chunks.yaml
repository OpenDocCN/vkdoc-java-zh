    \n高级用户界面设计\n\n我们的下一个目标是创建一个精美的用户界面。\n\n首先，你将创建一个标题屏幕，其中包含游戏名称、开始或退出游戏的按钮，以及一个致谢\
    \ LibGDX 库的图形。如图 4-1 所示。\n\n![9781484215012_Fig04-01.jpg](img/9781484215012_Fig04-01.jpg)\n\
    \n图 4-1. 标题屏幕布局\n\n接下来，在主游戏屏幕（进行游戏的地方）中，你想要添加一些文本，说明还有多少海星需要收集，以及一个暂停按钮。这些元素应出现在窗口的上角，以免遮挡玩家对游戏世界的视野，否则可能会干扰游戏进行，导致玩家体验下降。如图\
    \ 4-2 所示。\n\n![9781484215012_Fig04-02.jpg](img/9781484215012_Fig04-02.jpg)\n\n\
    图 4-2. 主游戏布局\n\n最后，当用户单击暂停按钮时，除了暂停游戏外，还应出现一个暂停菜单。该菜单通过在游戏世界视图上覆盖一个半透明的黑色矩形来使其变暗；在此之上是显示游戏已暂停的文本、恢复或退出游戏的按钮，以及一个控制音量的滑块，如图\
    \ 4-3 所示。\n\n![9781484215012_Fig04-03.jpg](img/9781484215012_Fig04-03.jpg)\n\n\
    图 4-3. 暂停游戏布局\n\n在接下来的小节中，你将使用 Table 类设计和实现布局，使用 Skin 类管理图像和样式资源，并了解提供常用用户界面元素的类，例如\
    \ Label、Image、Button（及其子类 TextButton）和 Slider。\n\n排列 UI 元素\n"
- fmt: '在[第2章](#9781484215012_Ch02.xhtml)中，你创建了一个名为“Cheese, Please!”的游戏，该游戏具有简单的用户界面：菜单屏幕包含标题图像和一些文本说明，主游戏屏幕包含显示已用时间的文本。确定这些项目应显示的确切屏幕坐标（同时考虑所放置项目的大小）计算起来可能很繁琐。幸运的是，`LibGDX`库提供了一个名为`Table`的类，通过自动为你放置这些元素，大大简化了这一过程。


    `Table`是`Actor`的子类，因此它可以被添加到`Stage`对象中；此外，`Table`也是`Group`的子类，因此对象也可以被添加到`Table`中。具体来说，一个`Table`由`Cell`对象组成，这些`Cell`按行和列排列，每个`Cell`包含一个`Actor`。`add`方法创建一个新的`Cell`（如果指定了`Actor`，则包含该`Actor`），并将其添加到当前行的末尾。`add`方法返回所创建的`Cell`对象，因此可以通过在结果上调用以下任意方法的组合来立即对其进行格式化：


    - `left`、`center`和`right`用于设置`Cell`内容的水平对齐方式

    - `bottom`和`top`用于设置垂直对齐方式

    - `padLeft`、`padRight`、`padBottom`、`padTop`用于为当前`Cell`的内容添加一定数量的内边距（以像素为单位），或者使用`pad`方法在所有方向上应用内边距

    - `width`和`height`用于设置`Cell`的大小（`Cell`的大小会影响其内容的大小）

    - `expandX`和`expandY`用于强制`Cell`增大其大小以填充该方向上表格的剩余空间

    - `colspan`用于声明给定的`Cell`将跨越多个列


    默认情况下，所有表格都包含单行。要创建一个位于当前行下方的新行，可以调用`row`方法。


    例如，让我们创建一个名为`t`的`Table`，其内容布局样式与之前[图4-1](#9781484215012_Ch04.xhtml#Fig1)中显示的标题屏幕相同。为简单起见，在本节及附图中，我们将`Actor`对象命名为`a`、`b`、`c`和`d`；`a`代表标题图像，`b`和`c`代表“开始”和“退出”按钮，`d`代表`LibGDX`图像。[图4-4](#9781484215012_Ch04.xhtml#Fig4)展示了该布局。


    ![9781484215012_Fig04-04.jpg](OEBPS/Images/9781484215012_Fig04-04.jpg)


    [图4-4](#9781484215012_Ch04.xhtml#_Fig4). 开始屏幕的抽象表格布局


    该图表明，你需要一个包含三行两列的`Table`。每一行如果不需要两个独立的单元格，则其单个单元格应设置为跨越两列。最后一个单元格配置起来最为棘手：它不仅跨越两列，而且其内容右对齐，并且与上一行之间应有50像素的内边距。以下代码说明了如何实现此布局；但是，此时你无需向项目添加任何代码。稍后，你将基于此模板添加代码（将`a`、`b`、`c`和`d`替换为对应于这些对象的变量）。


    ```

    Table t = new Table();

    t.add(a).colspan(2);

    t.row();

    t.add(b);

    t.add(c);

    t.row();

    t.add(d).colspan(2).right().padTop(50);

    ```


    作为`Table`类的另一个示例，你将学习如何创建主游戏屏幕的布局（之前显示在[图4-2](#9781484215012_Ch04.xhtml#Fig2)中）。此布局的抽象版本出现在[图4-5](#9781484215012_Ch04.xhtml#Fig5)中。


    ![9781484215012_Fig04-05.jpg](OEBPS/Images/9781484215012_Fig04-05.jpg)


    [图4-5](#9781484215012_Ch04.xhtml#_Fig5). 主游戏屏幕的抽象表格布局


    在[图4-5](#9781484215012_Ch04.xhtml#Fig5)中，整个表格在所有边上都有10像素的内边距（由空白边框区域表示）。单元格`a`包含“Starfish
    Left”标签，单元格`c`包含“暂停”按钮。单元格`b`不包含演员；它将在水平（`x`）方向上扩展以填充第一行中的所有剩余空间，以便单元格`a`和`c`分别位于屏幕的左侧和右侧。类似地，单元格`d`也用于定位目的，不包含演员；它跨越第二行的所有三列，并在垂直（`y`）方向上扩展以填充所有剩余空间，以便第一行出现在屏幕顶部。产生[图4-5](#9781484215012_Ch04.xhtml#Fig5)布局的代码如下所示（和之前一样，它将作为稍后添加到项目中的模板）：


    ```

    Table t = new Table();

    t.pad(10);

    t.add(a);

    t.add().expandX();

    t.add(c);

    t.row();

    t.add().colspan(3).expandY();

    ```


    创建将添加到这些`Table`对象中的内容——`Label`、`Image`和`Button`类的实例——将在本章后面讨论。即使在讨论此主题之前，请注意，由于多个屏幕将使用`Table`对象，你将编写相应的代码并将其添加到`BaseScreen`类中。


    首先，你需要相应的导入语句：


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Table;

    ```


    接下来，在`Stage`对象的声明之后，声明一个名为`uiTable`的`Table`对象：


    ```

    protected Table uiTable;

    ```


    最后，在`BaseScreen`类的构造函数中初始化此对象，并将其附加到`uiStage`：


    ```

    uiTable = new Table();

    uiTable.setFillParent(true);

    uiStage.addActor(uiTable);

    ```


    接下来，在创建用户界面对象之前，你将奠定额外的基础。你将了解如何高效地存储和重用UI组件。


    ## 管理资源


    在设计用户界面时，通常希望拥有一致的主题。你希望在游戏拥有的多个屏幕中使用相同的字体、样式等集合。出于效率考虑，你不希望重复创建这些游戏对象。相反，你将在`Game`类初始化时创建通用的UI元素，并将它们存储在稍后可由`Screen`对象访问的数据结构中。方便的是，`LibGDX`库为此目的提供了一个类：`Skin`类。


    `Skin`对象以类似于`HashMap`的方式存储对象（在[第3章](#9781484215012_Ch03.xhtml)中讨论过），使用`String`对象作为键，任何对象类型作为值。可以使用`add`方法存储对象，使用`get`方法检索对象。例如，以下代码创建一个新的`Skin`，然后创建一个新的`Color`并使用名称`LightGreen`存储它，最后检索它并将其分配给一个新的`Color`变量。


    ```

    Skin uiSkin = new Skin();

    Color greenish = new Color(0.5f, 1.0f, 0.5f, 1.0f);

    uiSkin.add( "LightGreen", greenish );

    Color textColor = uiSkin.get( "LightGreen", Color.class );

    ```


    请注意，在`get`方法中传递的第二个参数是类字段，用于确定要检索的对象的类型。如果不包含此参数，则返回类型为`Object`，并且返回的值需要手动转换为适当的类类型，如下所示：


    ```

    Color textColor = (Color)( uiSkin.get("LightGreen") );

    ```


    经常存储的对象类型有自己的`get`风格方法。例如，你也可以使用代码`getColor("LightGreen")`检索之前存储的颜色。使用这些方法可以使代码稍微更易于阅读，因为返回的值不需要转换为所需的类型。有关`Skin`类提供的`get`相关方法的完整列表，请查阅`LibGDX`文档。'
  raw: 'In [Chapter 2](#9781484215012_Ch02.xhtml), you created a game called Cheese,
    Please! that had a simple user interface: the menu screen contained a title image
    and some text instructions, and the main game screen contained text that displayed
    the time elapsed. Determining the exact screen coordinates where those items should
    be displayed, taking into account the size of the items being placed, can be tedious
    to calculate. Fortunately, the LibGDX libraries provide a class named Table that
    greatly simplifies this process by automatically placing these elements for you.


    Table is a subclass of Actor, so it can be added to Stage objects; furthermore,
    Table is also a subclass of Group, so objects can be added to a Table as well.
    In particular, a Table consists of Cell objects, laid out in rows and columns,
    each Cell containing an Actor. The add method creates a new Cell (containing an
    Actor, if one is specified), and adds it to the end of the current row. The add
    method returns the Cell object that is created, and thus can be immediately formatted
    by calling any combination of the following methods on the result:


    *   left, center, and right to set the horizontal alignment of the Cell contents

    *   bottom and top to set the vertical alignment

    *   padLeft, padRight, padBottom, padTop to add an amount of padding (in pixels)
    to the contents of the current Cell, or the pad method to apply padding in all
    directions

    *   width and height to set the size of the Cell (the size of the Cell affects
    the size of its contents)

    *   expandX and expandY to force a Cell to increase its size to fill the remaining
    table size in that direction

    *   colspan to declare that a given Cell will span multiple columns


    All tables contain a single row by default. To create a new row in the Table,
    positioned beneath the current row, you call the row method.


    For example, let’s create a Table named t with contents laid out in the style
    of the title screen shown previously in [Figure 4-1](#9781484215012_Ch04.xhtml#Fig1).
    For simplicity in this section and in the accompanying diagram, we will name the
    Actor objects a, b, c, and d; a represents the title image, b and c represent
    the Start and Quit buttons, and d represents the LibGDX image. [Figure 4-4](#9781484215012_Ch04.xhtml#Fig4)
    illustrates the layout.


    ![9781484215012_Fig04-04.jpg](OEBPS/Images/9781484215012_Fig04-04.jpg)


    [Figure 4-4](#9781484215012_Ch04.xhtml#_Fig4). Abstract table layout for the Start
    screen


    The diagram indicates that you will need a Table with three rows and two columns.
    Every row that doesn’t require two separate cells should have its single cell
    set to span two columns. The final cell is the trickiest to configure: not only
    does it span two columns, but its contents are aligned to the right, and there
    should be 50 pixels of padding between itself and the row above. The following
    code illustrates how this layout can be achieved; however, you won’t add any code
    to the project at this time. Later, you will add code based on this template (with
    a, b, c, and d replaced by the variables corresponding to these objects).


    ```

    Table t = new Table();

    t.add(a).colspan(2);

    t.row();

    t.add(b);

    t.add(c);

    t.row();

    t.add(d).colspan(2).right().padTop(50);

    ```


    As another example of the Table class, you’ll learn how to create the layout for
    the main game screen (shown previously in [Figure 4-2](#9781484215012_Ch04.xhtml#Fig2)).
    The abstract version of this layout appears in [Figure 4-5](#9781484215012_Ch04.xhtml#Fig5).


    ![9781484215012_Fig04-05.jpg](OEBPS/Images/9781484215012_Fig04-05.jpg)


    [Figure 4-5](#9781484215012_Ch04.xhtml#_Fig5). Abstract table layout for the main
    game screen


    In [Figure 4-5](#9781484215012_Ch04.xhtml#Fig5), the entire table has 10 pixels
    of padding on all sides (represented by the empty border area). Cell a contains
    the Starfish Left label, and cell c contains the Pause button. Cell b does not
    contain an actor; it will be extended in the horizontal (x) direction to fill
    all remaining space in the first row, so that cells a and c will be positioned
    on the left and right sides of the screen, respectively. Similarly, cell d is
    also used for positioning purposes and does not contain an actor; it spans all
    three columns in the second row, and is extended to fill all the remaining space
    in the vertical (y) direction, so that the first row will appear at the top of
    the screen. The code that yields the layout from [Figure 4-5](#9781484215012_Ch04.xhtml#Fig5)
    is presented here (and as before, it will serve as a template to be added to the
    project later):


    ```

    Table t = new Table();

    t.pad(10);

    t.add(a);

    t.add().expandX();

    t.add(c);

    t.row();

    t.add().colspan(3).expandY();

    ```


    Creating the content that will be added to these Table objects—instances of the
    Label, Image, and Button classes—is discussed later in this chapter. Even before
    we discuss this topic, note that because multiple screens will use a Table object,
    you will write and add the corresponding code to the BaseScreen class.


    First you need the corresponding import statement:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Table;

    ```


    Next, you declare a Table object, named uiTable, following the declaration of
    the Stage objects:


    ```

    protected Table uiTable;

    ```


    Finally, you initialize this object in the constructor of the BaseScreen class,
    and attach it to the uiStage:


    ```

    uiTable = new Table();

    uiTable.setFillParent(true);

    uiStage.addActor(uiTable);

    ```


    Next, you will lay additional groundwork before creating the user interface objects.
    You’ll see how to efficiently store and reuse UI components.


    Managing Resources


    When designing a user interface, you typically want to have a consistent theme.
    You want to use the same set of fonts, styles, and so forth in the many screens
    the game will have. In the interests of efficiency, you do not want to re-create
    these game objects repeatedly. What you will do instead is to create the common
    UI elements when the Game class is initialized, and store them in a data structure
    that can be accessed by the Screen objects at a later time. Conveniently, the
    LibGDX libraries provide a class for precisely this purpose: the Skin class.


    A Skin object stores objects in a way similar to a HashMap (discussed in [Chapter
    3](#9781484215012_Ch03.xhtml)), using String objects as keys and any object type
    as values. Objects can be stored using the add method and retrieved using the
    get method. For example, the following code creates a new Skin, and then creates
    a new Color and stores it using the name LightGreen, and finally retrieves it
    and assigns it to a new Color variable.


    ```

    Skin uiSkin = new Skin();

    Color greenish = new Color(0.5f, 1.0f, 0.5f, 1.0f);

    uiSkin.add( "LightGreen", greenish );

    Color textColor = uiSkin.get( "LightGreen", Color.class );

    ```


    Note that the second parameter passed in the get method is the class field, which
    is used to determine the type of object being retrieved. If this parameter is
    not included, the return type is Object, and the returned value would need to
    be manually cast to the appropriate class type, as follows:


    ```

    Color textColor = (Color)( uiSkin.get("LightGreen") );

    ```


    Frequently stored object types have their own get-style methods. For instance,
    you could also retrieve the color stored previously by using the code getColor("LightGreen").
    Using these methods can make the code slightly easier to read, because the value
    returned would not need to be cast into the required type. For a complete list
    of the provided get-related methods of the Skin class, please consult the LibGDX
    documentation.'
  trans: '

    在第 2 章中，你创建了一个名为“奶酪，拜托！”的游戏，其用户界面非常简单：菜单屏幕包含标题图片和一些文字说明，主游戏屏幕则显示经过时间的文字。要精确计算这些元素应放置的屏幕坐标，同时考虑元素自身的大小，计算起来可能非常繁琐。幸运的是，LibGDX
    库提供了一个名为 `Table` 的类，它能自动为你放置这些元素，从而极大地简化了这一过程。


    `Table` 是 `Actor` 的子类，因此它可以被添加到 `Stage` 对象中；此外，`Table` 也是 `Group` 的子类，因此对象也可以被添加到
    `Table` 中。具体来说，一个 `Table` 由 `Cell` 对象组成，这些 `Cell` 按行和列排列，每个 `Cell` 包含一个 `Actor`。`add`
    方法会创建一个新的 `Cell`（如果指定了 `Actor`，则包含该 `Actor`），并将其添加到当前行的末尾。`add` 方法返回所创建的 `Cell`
    对象，因此可以通过在结果上调用以下任意方法的组合来立即设置其格式：


