  raw: 'Finally, with all the user-interface objects created, you are now ready to
    place them on the screen by adding them to the uiTable object. You use the same
    code from our earlier discussion of laying out the Start menu, with one addition:
    in the interests of symmetry, you’d like the two buttons to have the same width,
    but because of the text being displayed, the Start button will be wider by default.
    You can change the width of the Quit button to match the width of the Start button,
    by setting the width of the cell that contains it:


    ```

    float w = startButton.getWidth();

    uiTable.add(titleImage).colspan(2);

    uiTable.row();

    uiTable.add(startButton);

    uiTable.add(quitButton).width(w);

    uiTable.row();

    uiTable.add(libgdxImage).colspan(2).right().padTop(50);

    ```


    Finally, to load the menu screen (rather than the game-play screen) when the program
    starts, you need to make a change to the TurtleGame class. At the end of the create
    method, instead of creating an instance of the TurtleLevel class (and setting
    this to be the active screen), you’d like to use the TurtleMenu class. To this
    end, change the last two lines of the create method to the following:


    ```

    TurtleMenu tm = new TurtleMenu(this);

    setScreen(tm);

    ```


    Creating an Overlay Menu


    Now that you’ve finished setting up your two main user interfaces, you have one
    final addition to the Starfish Collector game. You’d like to create an overlay-style
    menu that appears on top of the main UI on the TurtleLevel screen when the game
    is paused, as illustrated in [Figure 4-11](#9781484215012_Ch04.xhtml#Fig11). As
    with the previous user-interface discussion, you show the desired result side
    by side with an abstract layout diagram indicating the placement of the UI elements.
    In [Figure 4-11](#9781484215012_Ch04.xhtml#Fig11), cells a and d contain labels,
    cells b and c contain buttons, and cell e contains a slider. There will also be
    a translucent black background that dims the user’s view of the game, which also
    makes the Pause menu contents more easily identifiable. You are already familiar
    with two of the classes you need: Label and TextButton. The new control element
    you need is a Slider, which will be used to change the audioVolume variable that
    sets the volume of sound effects and background music, introduced in the beginning
    of this chapter.


    ![9781484215012_Fig04-11.jpg](OEBPS/Images/9781484215012_Fig04-11.jpg)


    [Figure 4-11](#9781484215012_Ch04.xhtml#_Fig11). Abstract table layout for the
    pause overlay


    For consistency, you’ll initialize and store the associated SliderStyle object
    in the TurtleGame class, alongside the other style objects. As usual, you’ll also
    use the methods of the Skin class to convert the needed Texture objects into Drawable
    objects. The two fields of the SliderStyle object you must include are images
    for the background and the knob that is dragged back and forth along the slider
    itself. You may also include two additional images that are set to appear on top
    of the background, before and after the knob image, which can be seen in [Figure
    4-11](#9781484215012_Ch04.xhtml#Fig11). The knob is the circular image; the “before”
    and “after” images are the colored horizontal images that appear to the left and
    right of the knob, respectively. All the necessary images can be downloaded from
    the source code assets folder. You need to add the following import to the TurtleGame
    class:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Slider.SliderStyle;

    ```


    Then, in the create method, the code you will include to initialize your SliderStyle
    object appears here:


    ```

    SliderStyle uiSliderStyle = new SliderStyle();


    skin.add("sliderBack",   new Texture(Gdx.files.internal("assets/slider-after.png"))
    );

    skin.add("sliderKnob",   new Texture(Gdx.files.internal("assets/slider-knob.png"))
    );

    skin.add("sliderAfter",  new Texture(Gdx.files.internal("assets/slider-after.png"))
    );

    skin.add("sliderBefore", new Texture(Gdx.files.internal("assets/slider-before.png"))
    );


    uiSliderStyle.background = skin.getDrawable("sliderBack");

    uiSliderStyle.knob       = skin.getDrawable("sliderKnob");

    uiSliderStyle.knobAfter  = skin.getDrawable("sliderAfter");

    uiSliderStyle.knobBefore = skin.getDrawable("sliderBefore");


    skin.add("uiSliderStyle", uiSliderStyle);

    ```


    Since each point along a slider corresponds to a numerical value, to initialize
    the Slider object in the TurtleLevel class, you must provide the minimum and maximum
    values that your Slider will represent (in our case, 0 and 1), as well as the
    smallest possible increment between values. You also must include a Boolean variable
    that determines whether the Slider should be displayed vertically (you leave this
    set to false to obtain a horizontal slider). The final arguments involve style
    data; in our case, since you stored the data using a Skin, you provide a reference
    to the Skin object and the corresponding name that was used to store the SliderStyle
    object.


    Next, you add the code that will be executed when the user interacts with the
    Slider. In this case, you diverge from your previous approach of using an EventListener,
    because of the different way in which the user interacts with this particular
    user-interface element. Multiple changes may occur between the touchDown and touchUp
    events registered by an Actor; these intermediate changes are observed by the
    ChangeListener class, which then calls its changed method.


    At this point, you return to the TurtleLevel class to make your final changes.
    First, you have the remaining import statements to add:


    ```

    import com.badlogic.gdx.scenes.scene2d.ui.Slider;

    import com.badlogic.gdx.scenes.scene2d.utils.ChangeListener;

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.scenes.scene2d.ui.Table;

    import com.badlogic.gdx.scenes.scene2d.ui.Stack;

    import com.badlogic.gdx.scenes.scene2d.utils.Drawable;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.scenes.scene2d.ui.TextButton;

    ```


    The following code creates a Slider using your previously created SliderStyle
    object, sets the coordinates of the slider’s knob to the position corresponding
    to the initial value of audioVolume, and adds a ChangeListener object that adjusts
    the volume of the audio objects whenever the user interacts with the Slider. This
    code should be added after the audioVolume variable has been initialized:


    ```

    Slider audioSlider = new Slider(0, 1, 0.005f, false, game.skin, "uiSliderStyle"
    );

    audioSlider.setValue( audioVolume );

    audioSlider.addListener(

        new ChangeListener()

        {

            public void changed(ChangeEvent event, Actor actor)

            {

                audioVolume = audioSlidergetValue();

                instrumental.setVolume(audioVolume);

                oceanSurf.setVolume(audioVolume);

            }

        });

    ```


    Next, you want to create the pause overlay menu itself. Note that you can’t just
    add these new elements into the preexisting uiTable. What you need is a second
    Table object, whose visibility depends on whether the game is paused, and when
    visible, renders on top of uiTable. The former goal can be accomplished using
    the setVisible method of the table; the latter can be arranged with a Stack object
    that, as the name suggests, places (stacks) one object above another.


    You create a new Table in the TurtleLevel class:


    ```

    private Table pauseOverlay;

    ```


    And then in the create method, you initialize it:


    ```

    pauseOverlay = new Table();

    pauseOverlay.setFillParent(true);

    ```


    Then you create a Stack object and add it to the uiStage. After this, you add
    the uiTable and the pauseOverlay table to it, which will cause them to render
    in that order:


    ```

    Stack stacker = new Stack();

    stacker.setFillParent(true);

    uiStage.addActor(stacker);

    stacker.add(uiTable);

    stacker.add(pauseOverlay);

    ```


    Next, you’ll add a white texture to the skin, and use the newDrawable method to
    create a tinted version of this texture using a translucent black color, based
    on a simple image (which can be downloaded from the source code assets folder):'
