    \n## 提供视觉提示\n\n有时玩家可能难以找到目标或确定游戏中的下一步。为了避免挫败感累积，将引入一个游戏机制：在特定时间过去后提供视觉提示。本游戏中的视觉指示器由一个名为`glowEffect`的对象提供，顾名思义，它会在当前可移动到某个牌堆的牌周围创建发光效果。通过让`glowEffect`淡入淡出，添加脉冲效果，以更轻松地吸引玩家注意力。浮点变量`hintTimer`记录自玩家触摸一张牌以来经过的时间，当其值足够大时，提示机制被激活，`glowEffect`变为可见。反之，每当玩家触摸一张牌时，提示计时器将被重置，`glowEffect`将变为不可见。\n\
