    edge of the rectangle. To do this, the previous boundary circle and the current
    boundary circle must be known, and a line segment can be drawn connecting these
    two points; if this line segment crosses the line segment connecting the bottom
    two points of the rectangle, then the second condition listed is satisfied. When
    both conditions are true, the velocity is adjusted by multiplying the y component
    by –1.


