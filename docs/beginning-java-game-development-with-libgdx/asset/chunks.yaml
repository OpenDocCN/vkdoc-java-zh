    [Figure 5-2](#9781484215012_Ch05.xhtml#_Fig2). A traditional arcade-style joystick,
    and a touch-pad control created in LibGDX


    The biggest challenge to successfully using these controls is not the creation
    of the object, but rather a design challenge: how should these elements be arranged
    and placed on the screen? One option is to overlay the elements on top of the
    game world itself, as you have with various Label objects in previous chapters.
    However, you rapidly discover the problem that having too many controls—which
    must typically be much larger than labels, for easy operation—can obscure the
    game world to the extent that it interferes with game play. If poorly placed,
    a touch pad could completely obscure the main character. [Figure 5-3](#9781484215012_Ch05.xhtml#Fig3)
    illustrates this possible situation by placing the touch pad in the lower-left
    corner of the game screen. Notice how it could cover Mousey completely!


