    和 `draw` 方法会导致 Stage 对象调用所有已添加到其中的 Actor 对象的 `act` 和 `draw` 方法）。

    *   我们将 `winText` 的初始可见性设置为 `false`，因为玩家在赢得游戏之前不应该看到该特定图像。

