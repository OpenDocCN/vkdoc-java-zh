    Balloons


    The balloon entities are particularly interesting, from a coding standpoint. You’d
    like each balloon to move a little differently, according to a set of parameters
    that are randomly generated at the time the balloon is created. Because you need
    each balloon to store this information, and the information is unique to each
    instance, you need to write a class (named Balloon) that extends the BaseActor
    class. This class will also have its own act method that sets the position of
    the actor to follow a sine wave–based path across the screen. You calculate the
    position of each balloon *parametrically*: the x and the y coordinates are each
    a function of another variable, time, which represents the amount of time that
    has passed since the Balloon object was created. As time passes, the x coordinate
    of the balloon steadily increases, while the y coordinate is calculated according
    to this formula:


    y = A × sin(B × x) + C


    where A controls the amplitude (or height) of the sine wave (illustrated in [Figure
    3-3](#9781484215012_Ch03.xhtml#Fig3)), B affects the rate of oscillation (illustrated
    in [Figure 3-4](#9781484215012_Ch03.xhtml#Fig4)), and C controls the initial height.


    ![9781484215012_Fig03-03.jpg](OEBPS/Images/9781484215012_Fig03-03.jpg)


    [Figure 3-3](#9781484215012_Ch03.xhtml#_Fig3). Sine waves with different amplitudes:
    small (dashed line) and large (solid line)


    ![9781484215012_Fig03-04.jpg](OEBPS/Images/9781484215012_Fig03-04.jpg)


    [Figure 3-4](#9781484215012_Ch03.xhtml#_Fig4). Sine waves with different rates
    of oscillation: small (dashed line) and large (solid line)


    The constructor of the Balloon object initializes and randomizes the values used
    in this formula (and also loads a texture). You use some functions from the MathUtils
    class. The random method produces a randomly generated float value between the
    two given inputs, which you use to introduce some variation in the parameters
    that control the path of the balloon. The sin method calculates the values of
    a sine wave function. You also initially offset the x position to beyond the left
    edge of the screen so that the balloon objects don’t suddenly appear in the middle
    of the sky. The source code for this class is given here:


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.math.MathUtils;

    import com.badlogic.gdx.graphics.Texture;


    public class Balloon extends BaseActor

    {

        public float speed;

        public float amplitude;

        public float oscillation;

        public float initialY;

        public float time;

        public int offset;


    public Balloon()

        {

            speed       = 80    * MathUtils.random(0.5f, 2.0f);

            amplitude   = 50    * MathUtils.random(0.5f, 2.0f);

            oscillation = 0.01f * MathUtils.random(0.5f, 2.0f);

            initialY    = 120   * MathUtils.random(0.5f, 2.0f);

            time = 0;

            offsetX = -100;

            setTexture( new Texture( Gdx.files.internal("assets/red-balloon.png"))
    );


    // initial spawn location off-screen

            setX(offsetX);

        }


    public void act(float dt)

        {

            super.act(dt);

            time += dt;

            // set starting location to left of window

            float xPos = speed * time + offsetX;

            float yPos = amplitude * MathUtils.sin(oscillation * xPos) + initialY;

            setPosition( xPos, yPos );

        }

    }

    ```


    Next, you’ll learn about the create method of the BalloonLevel class. This initializes
    most of the variables discussed previously, adding a background image to the main
    stage, creating a BitmapFont and LabelStyle for the Label objects to use, and
    then adding each Label object to the stage containing the user interface elements.
    The one object that is not initialized here is the Balloon object; these are handled
    by the update method, which is discussed later.


    ```

    public void create()

    {

        background = new BaseActor();

        background.setTexture( new Texture(Gdx.files.internal("assets/sky.jpg")) );

        background.setPosition( 0, 0 );

        mainStage.addActor( background );


    spawnTimer = 0;

        spawnInterval = 0.5f;


    // set up user interface

        BitmapFont font = new BitmapFont();

        LabelStyle style = new LabelStyle( font, Color.NAVY );


    popped = 0;

        poppedLabel = new Label( "Popped: 0", style );

        poppedLabel.setFontScale(2);

        poppedLabel.setPosition(20, 440);

        uiStage.addActor( poppedLabel );


    escaped = 0;

        escapedLabel = new Label( "Escaped: 0", style );

        escapedLabel.setFontScale(2);

        escapedLabel.setPosition(220, 440);

        uiStage.addActor( escapedLabel );


    clickCount = 0;

        hitRatioLabel = new Label( "Hit Ratio: ---", style );

        hitRatioLabel.setFontScale(2);

        hitRatioLabel.setPosition(420, 440);

        uiStage.addActor( hitRatioLabel );

    }

    ```


