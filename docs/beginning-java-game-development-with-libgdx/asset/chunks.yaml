- fmt: '一种获得宝贵游戏开发经验的方法是参加游戏开发大赛（Game Jam）。*游戏开发大赛*是游戏开发者为了在短时间内（通常约48小时）设计并创建一款游戏而进行的挑战性聚会。参与者可能是程序员、美术师、作家或其他拥有相关技能的人。由于时间限制，这些活动要求快速原型设计和开发技能，并鼓励参与者专注于创造力、核心机制以及将项目推进到完成（或至少是可玩状态）。个人参加这些活动通常就是为了提升自己在这些领域的技能。此外，许多游戏开发大赛会选择一个主题，所有在活动中开发的游戏都必须融入该主题。主题通常在每次活动开始时公布，以阻止提前规划并鼓励创造力。


    尽管有些游戏开发大赛设有评审团并宣布一名或多名获胜者，但这些活动通常是非正式且友好的，它们为参与者提供了相互联系的机会，并营造了一种社区感。一些活动可能在一个或多个实体地点举行。一些活动可能没有中心地点；开发者在自己选择的区域工作（但仍需遵守相同的时间和日程限制）。一些著名的长期举办的游戏开发大赛如下：


    *   Global Game Jam：[http://globalgamejam.org/](http://globalgamejam.org/)


    这是世界上最大的游戏开发大赛——一项每年举办一次的国际性活动，通常在每年一月底举行。这*不是*在线活动；需要现场参与，因此全球通常有数百个实体地点（大赛站点），个人可以前往参加。


    *   Ludum Dare：[http://ludumdare.com/](http://ludumdare.com/)


    主要活动每年举办三次，次要（迷你）活动在没有主要活动的月份举办。一些参与者会参加不同地点的聚会，但大多数开发者在自己所在的地方工作。


    *   One Game a Month：[www.onegameamonth.com](http://www.onegameamonth.com)


    顾名思义，这些游戏开发大赛每月举行一次。规则特别宽松，每次大赛持续整个月，以便为参与者提供最大的灵活性。组织者是Christer Kaitila，他还写了一本书，名为*《游戏开发大赛生存指南》*（Packt
    Publishing, 2012），该书详细讨论了这些活动，并提供了大量关于如何获得成功体验的建议。


    ## 克服困难


    在成为游戏开发者的旅程中，你有时会遇到挫折。每个人都会。也许你无法弄清楚如何实现某个特定的游戏机制。也许你的程序在运行时出现错误，而你不确定原因。也许你的程序编译并运行了，但你的游戏实体却以奇怪且意想不到的方式运行。无论你的困难是什么，都不要放弃！花些时间与问题搏斗。尝试不同的方法——也许需要不同的数据结构、类或算法。尝试降低代码的复杂性，将问题分解为更简单的步骤或方法，或者先实现一个简单的版本，然后逐步构建以达到最终目标。请记住，克服困难的过程是成为游戏开发者的一部分，并帮助你成长。


    然而，也要记住，平衡在开发中至关重要（就像在游戏中一样）。是的，学习如何调试和修正有故障的代码很有价值，但如果某个特定问题持续很长时间，在你变得过度沮丧或气馁之前，先休息一下。保持正确的视角：可能不值得花连续五个小时试图弄清楚为什么你的平台游戏角色无法走上斜坡。暂时离开你的电脑；散散步，想想别的事情，然后带着焕然一新的视角回来处理你的问题。'
  raw: 'One way to gain valuable game development experience is to participate in
    a game jam. A *game jam* is a gathering of game developers for the challenge of
    designing and creating a game in a short time span, typically about 48 hours.
    Participants may be programmers, artists, writers, or others with related skills.
    Due to the time limit, these events require rapid prototyping and development
    skills, and encourage participants to focus on creativity, core mechanics, and
    bringing a project to completion (or at least a playable state). Individuals often
    take part in these events for the express purpose of increasing their skills in
    these areas. In addition, many game jams select a theme that must be incorporated
    by all games developed at the event. The themes are usually announced at the start
    of each event, to discourage advanced planning and to encourage creativity.


    Although some game jams have panels of judges and declare one or more winners,
    these events are typically informal and friendly, and they give participants the
    chance to connect with each other and provide a sense of community. Some events
    may be held at one or more physical locations. Some events may have no central
    location; developers work in areas of their own choosing (but are still held to
    the same time and schedule restrictions). Some notable long-running game jam events
    are as follows:


    *   Global Game Jam: [http://globalgamejam.org/](http://globalgamejam.org/)


    This is the largest game jam in the world—an international event that takes place
    once each year, typically at the end of January. This is *not* an online event;
    on-site participation is required, so there are typically hundreds of physical
    locations (jam sites) around the world where individuals can attend.


    *   Ludum Dare: [http://ludumdare.com/](http://ludumdare.com/)


    Major events are held three times a year, and minor (mini) events are held during
    the months when there is no major event. Some participants attend gatherings at
    various sites, but most developers work from their own locations.


    *   One Game a Month: [www.onegameamonth.com](http://www.onegameamonth.com)


    As the name indicates, these game jams are held monthly. The rules are particularly
    relaxed, and each jam takes place over the course of the entire month, so as to
    provide maximum flexibility to participants. The organizer is Christer Kaitila,
    who has also written a book called *The Game Jam Survival Guide* (Packt Publishing,
    2012) which discusses these events in great detail and provides a plethora of
    advice on how to have a successful experience.


    Overcoming Difficulties


    On your journey as a game developer, you will stumble at times. Everyone does.
    Perhaps you can’t figure out how to implement a particular game mechanic. Perhaps
    your program has an error at runtime and you’re just not sure why. Perhaps your
    program compiles and runs, but your game entities are behaving in strange and
    unexpected ways. Whatever your difficulty may be, don’t give up! Spend some time
    wrestling with the problem. Try different approaches—perhaps a different data
    structure, class, or algorithm is called for. Try to reduce the complexity of
    your code, break a problem into simpler steps or methods, or implement a simpler
    version first and incrementally build up to your ultimate goal. Remember that
    the process of overcoming difficulties is part of being, and helps you grow as,
    a game developer.


    However, also remember that balance is key in development (just as it is in games).
    Yes, it is valuable to learn how to debug and correct malfunctioning code, but
    if any particular problem persists for a long time, take a break before you become
    overly frustrated or discouraged. Keep things in perspective: it probably isn’t
    worth spending five straight hours trying to figure out why your platformer character
    can’t walk up a ramp. Spend some time away from your computer; take a walk, think
    about something else, and come back to your problem later with a refreshed outlook.'
  trans: '

    获得宝贵游戏开发经验的一种方式是参加游戏创作马拉松（Game Jam）。*游戏创作马拉松*是游戏开发者为了挑战在短时间内（通常约 48 小时）设计并制作一款游戏而举办的聚会。参与者可能是程序员、美术师、编剧或其他拥有相关技能的人。由于时间限制，这类活动要求快速原型设计和开发技能，并鼓励参与者专注于创意、核心机制以及将项目完成（或至少达到可玩状态）。许多人参加这些活动正是为了提升自己在这些领域的技能。此外，许多游戏创作马拉松会选择一个主题，所有在活动中开发的游戏都必须融入该主题。主题通常在每个活动开始时公布，以避免提前规划并鼓励创意。


    尽管有些游戏创作马拉松设有评审团并宣布一名或多名获胜者，但这些活动通常是非正式且友好的，它们为参与者提供了相互联系的机会，并营造出一种社区感。有些活动可能在一个或多个实体地点举行。有些活动可能没有中心地点；开发者在自己选择的区域工作（但仍需遵守相同的时间和日程限制）。一些著名的长期举办的游戏创作马拉松活动如下：


    *   Global Game Jam：[`globalgamejam.org/`](http://globalgamejam.org/)


    这是世界上规模最大的游戏创作马拉松——一项每年举办一次的国际性活动，通常在每年一月底举行。这*不是*线上活动；需要现场参与，因此全球通常有数百个实体地点（创作站点）供个人参加。


    *   Ludum Dare：[`ludumdare.com/`](http://ludumdare.com/)


    主要活动每年举办三次，次要（迷你）活动则在没有主要活动的月份举行。一些参与者会聚集在不同的地点，但大多数开发者都在自己的所在地工作。


    *   One Game a Month：[www.onegameamonth.com](http://www.onegameamonth.com)


    顾名思义，这些游戏创作马拉松每月举行一次。规则特别宽松，每次活动持续整个月，以便为参与者提供最大的灵活性。组织者是克里斯特·凯蒂拉，他还写了一本书，名为《游戏创作马拉松生存指南》（Packt
    Publishing, 2012），该书详细讨论了这些活动，并提供了大量关于如何获得成功体验的建议。


    克服困难


    在你作为游戏开发者的旅程中，你有时会遇到挫折。每个人都会。也许你无法弄清楚如何实现某个特定的游戏机制。也许你的程序在运行时出现错误，而你不确定原因。也许你的程序编译并运行了，但你的游戏实体却表现出奇怪且出乎意料的行为。无论你的困难是什么，都不要放弃！花些时间与问题搏斗。尝试不同的方法——也许需要不同的数据结构、类或算法。尝试降低代码的复杂性，将问题分解为更简单的步骤或方法，或者先实现一个更简单的版本，然后逐步构建以达到最终目标。请记住，克服困难的过程是成为游戏开发者的一部分，并帮助你成长。


    然而，也要记住，平衡在开发中至关重要（就像在游戏中一样）。是的，学习调试和修正有问题的代码很有价值，但如果某个特定问题持续很长时间，在你变得过度沮丧或气馁之前，先休息一下。要客观看待问题：连续花五个小时试图弄清楚为什么你的平台跳跃游戏角色无法走上斜坡，可能并不值得。暂时离开你的电脑；散散步，想想别的事情，然后带着焕然一新的视角回来处理你的问题。

    '
- fmt: 'After making a sincere effort to resolve any difficulties yourself, if you
    are still stuck, don’t despair: the vibrant and active community of fellow game
    developers and enthusiasts out there may be of assistance. The LibGDX forums ([www.badlogicgames.com/forum](http://www.badlogicgames.com/forum))
    and Stack Overflow ([www.stackoverflow.com](http://www.stackoverflow.com)) are
    two excellent places to ask for help. Start by searching these sites to see whether
    someone has asked the same or a similar question. If not, the next step is to
    read any recommended guidelines for posting questions.


    Typically, you should describe your problem or goal fully and concisely, and include
    details about what you have tried, what has worked, and what hasn’t. Sometimes
    you might even find that the process of phrasing the question carefully to an
    external audience will help clarify the problem and inspire you with a possible
    solution or an alternative approach. If your post includes code, do so in moderation,
    but make sure that all variables are defined or explained to the reader. Most
    of all, be polite and patient. The people who frequent these web sites often have
    full-time jobs elsewhere, and voluntarily visit these forums and provide general
    assistance out of a sense of community. It’s perfectly normal that a posted question
    might not generate a response for 48 hours or more. (In the meantime, be active
    in the community and see if anyone has posted any questions that *you* might be
    able to answer.)


    Whenever someone responds to your question, be sure to acknowledge them; if they
    suggest a course of action, write a follow-up post as to whether it worked. And
    finally, if you turn out to be the person to resolve your own question, or decide
    to proceed in a completely different direction to circumvent the problem altogether,
    you should post that information as well, to provide future readers a sense of
    closure.


    ## Broadening Your Horizons


    In addition to increasing your depth of knowledge and programming proficiency,
    you should devote time to developing a breadth of knowledge in game-related areas,
    as this will have a positive impact on the quality of the games you produce. This
    section briefly mentions a few ways to work toward this goal.


    ### Playing Different Games


    Most game enthusiasts have a favorite genre. Some people spend most of their time
    playing first-person shooters, others prefer to devote their time to role-playing
    games, and so forth. As a game developer, you should consider playing games from
    as wide a range as you can: action, adventure, puzzle, strategy, role-playing,
    sports, simulation, storytelling, and so forth. At the same time, try games from
    various time periods (from classic to modern), and from different-size developers
    (from large professional companies to smaller studios to independent game makers
    and game jam competitors).


    Even if you don’t find a particular game or genre compelling, you will grow as
    a developer if you spend some time playing such games, especially when you do
    so with a developer’s mindset. Try to understand why people like a given game.
    Examine each game’s level progression, game play balance, narrative and character
    development, artistic style, and interface design. Keep an eye out for what makes
    each game innovative or unique. Try to mentally place yourself in the role of
    the original game developers who created the game and think about possible reasons
    that they might have made the decisions they did, and ponder whether you might
    have done the same, or branched out in a different direction.


    ### Increasing Your Skill Set


    While you continue to develop games, you should also consider broadening your
    overall skill set. A solid set of programming skills is highly desirable, but
    game developers (especially those working independently or in small studios) often
    need to be a jack-of-all-trades, especially in the areas of graphics and audio.
    To get started in these areas, I recommend the following software and tutorials:


    *   Inkscape: [http://inkscape.org/](http://inkscape.org/)


    Software for creating vector graphics, freely available. This web site contains
    a list of high-quality tutorials for all skill levels. Most relevant to our interests,
    however, is a set of game art tutorials written by Chris Hildenbrand, available
    here:


    [http://2d-game-art-tutorials.zeef.com/chris.hildenbrand](http://2d-game-art-tutorials.zeef.com/chris.hildenbrand)


    *   Spine: [http://esotericsoftware.com/](http://esotericsoftware.com/)


    A 2D skeletal sprite animation tool designed specifically for game development.
    One of the main developers of Spine, Nathan Sweet, is also one of the main contributors
    to LibGDX, and thus there is a streamlined process for integrating animation files
    created by Spine into LibGDX projects.


    *   Audacity: [http://audacityteam.org/](http://audacityteam.org/)


    A multitrack audio editor and recorder, freely available. The Audacity manual
    contains an extensive list of tutorials that will teach you all sorts of useful
    recording and editing skills.


    ### Recommended Reading


    In addition to broadening your skill set, broadening your knowledge base is also
    worthwhile. A variety of books are available on topics related to game development
    that will help you do exactly that. Of course, there are far too many to list
    here, and no doubt I have omitted some high-quality titles. Nonetheless, this
    section lists a few representative samples from across a range of fields, a cross
    section of topics, to give an indication of what’s available out there: game design,
    literary aspects, history, and social impact:


    *   *Fundamentals of Game Design*, by Ernest Adams (New Riders, 2013)


    This book discusses a variety of topics: concept development, game-play design,
    core mechanics, user interfaces, storytelling, and balancing; exercises, worksheets,
    and case studies are also included.


    *   *The Ultimate Guide to Video Game Writing and Design* by Flint Dille and John
    Zuur Platten (Lone Eagle, 2008)


    Topics covered include integrating story elements into a game, writing a game
    script, creating design documentation, the creative process, team dynamics, and
    business considerations.


    *   *Vintage Games* by Bill Loguidice and Matt Barton (Focal Press, 2012)


    This book explores the history of some of the most influential video games of
    all time, with a particular focus on their development, critical reception, and
    impact on the industry.


    *   *Reality Is Broken: Why Games Make Us Better and How They Can Change the World*
    by Jane McGonigal (Penguin Books, 2011)


    In this book, the author discusses theories from psychology, cognitive science,
    sociology, and philosophy in the context of game playing, and explains how games
    can make us more productive and change the world for the better.


    It is also useful to stay abreast of current news and developments in the game
    industry, as well as to hear the opinions, approaches, struggles, and successes
    of your fellow game developers. For these purposes, there is no better alternative
    to following blogs. The following are some particularly substantial sites featuring
    regular blog postings (as well as additional useful information and resources):


    *   Gamasutra: [www.gamasutra.com](http://www.gamasutra.com)


    A web site devoted to the art and business of making games which, among other
    resources, contains curated lists of blog postings that touch on all aspects of
    the industry.


    *   GameDev.net: [www.gamedev.net](http://www.gamedev.net)


    A resource for developers of all fields and expertise, containing articles and
    tutorials on technical, creative, and business aspects of game development.


    *   HobbyGameDev: [www.hobbygamedev.com](http://www.hobbygamedev.com)


    Maintained by Chris DeLeon (a professional video game developer, author, and instructor),
    this regularly updated web site contains articles, advice, tutorials, case studies,
    interviews, and more.


    ## Disseminating Your Games'
