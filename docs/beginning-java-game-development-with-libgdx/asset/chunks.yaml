    最后，让我们讨论如何设置`Tint`属性的参数。如果需要，粒子的颜色可以随时间变化；颜色的变化过程在最顶部的矩形中从左到右显示。例如，图[7-4](#9781484215012_Ch07.xhtml#Fig4)表示一个粒子将开始着色为红色，过渡到蓝色，最后结束于绿色。与前面讨论的参数变化图表一样，可以通过在矩形内点击来添加额外的点（由三角形表示）。可以通过点击来选择三角形，并且可以使用下方的滑块来调整它们的颜色，这些滑块控制颜色的色相、饱和度和亮度。三角形可以通过点击并拖动来移动，也可以通过双击来删除。


