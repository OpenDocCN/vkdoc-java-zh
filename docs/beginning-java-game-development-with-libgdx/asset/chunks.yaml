    [0, mapWidth – mousey.width ]. This mathematical function is called *clamping*,
    and is one of the functions provided by the MathUtils class in LibGDX. The method
    call clamp(x,a,b) will return


    *   a, when x < a

    *   x, when a <= x and x <= b

    *   b, when x > b


    Using this method, you can condense the previous two lines of code into the following:


    ```

    mousey.setX( MathUtils.clamp( mousey.getX(), 0,  mapWidth - mousey.getWidth()
    ));

    ```


    Similarly, to keep Mousey within the game world in the vertical direction, you
    need to restrict Mousey’s y coordinate to the interval [ 0, mapHeight – mousey.height
