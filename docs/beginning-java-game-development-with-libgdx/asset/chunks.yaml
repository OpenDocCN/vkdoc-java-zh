    \n        mouseySprite = new Sprite( new Texture(Gdx.files.internal(\"assets/mouse.png\"\
    )) );\n        mouseySprite.setPosition( 20, 20 );\n\n        cheeseSprite = new\
    \ Sprite( new Texture(Gdx.files.internal(\"assets/cheese.png\")) );\n        cheeseSprite.setPosition(\
    \ 400, 300 );\n\n        floorSprite = new Sprite( new Texture(Gdx.files.internal(\"\
    assets/tiles.jpg\")) );\n        floorSprite.setPosition( 0, 0 );\n\n        winTextSprite\
    \ = new Sprite( new Texture(Gdx.files.internal(\"assets/you-win.png\")) );\n \
    \       winTextSprite.setPosition( 170, 60 );\n\n        win = false;\n    }\n\
    \n    public void render()\n    {\n        // process input\n        if (Gdx.input.isKeyPressed(Keys.LEFT))\n\
    \            mouseySprite.translateX( -1 );\n        if (Gdx.input.isKeyPressed(Keys.RIGHT))\n\
    \            mouseySprite.translateX( 1 );\n        if (Gdx.input.isKeyPressed(Keys.UP))\n\
    \            mouseySprite.translateY( 1 );\n        if (Gdx.input.isKeyPressed(Keys.DOWN))\n\
    \            mouseySprite.translateY( -1 );\n\n        // check win condition\n\
    \        Rectangle cheeseRectangle = cheeseSprite.getBoundingRectangle();\n  \
    \      Rectangle mouseyRectangle = mouseySprite.getBoundingRectangle();\n\n  \
    \      if ( cheeseRectangle.contains(mouseyRectangle) )\n            win = true;\n\
    \n        // draw graphics\n        Gdx.gl.glClearColor(0.8f, 0.8f, 1, 1);\n \
    \       Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\n        batch.begin();\n\
    \        floorSprite.draw( batch );\n        cheeseSprite.draw( batch );\n   \
    \     mouseySprite.draw( batch );\n        if (win)\n            winTextSprite.draw(\
    \ batch );\n        batch.end();\n    }\n}\n```\n\n`CheesePlease2`类的代码行大部分与`CheesePlease1`类中的代码行直接对应。你可以观察到一些细微的差异：`Sprite`使用`Texture`对象进行初始化，并且使用`Rectangle`方法大大简化了碰撞检测。`CheesePlease2`类将需要自己的启动器类，类似于`CheesePlease1`的启动器类（但它应该初始化一个`CheesePlease2`实例）。由于这是一个微小的改动，我在此不列出启动器代码，但一如既往，所有示例的完整可运行源代码都可以从本书的网站下载。"
  raw: 'The second set of commands perform collision detection: they determine whether
    the rectangular region containing mouseyTexture is completely contained within
    the rectangular region containing cheeseTexture. To determine this, you need to
    compare the left, right, top, and bottom boundaries of the rectangles as indicated
    in [Figure 2-3](#9781484215012_Ch02.xhtml#Fig3). The position of the left and
    bottom sides are given by the values of the x and y coordinates of the texture,
    respectively; the position of the right and top sides can be calculated by adding
    the width and height of the texture (obtained by using the getWidth and getHeight
    methods) to the x and y coordinates, respectively. As illustrated in [Figure 2-3](#9781484215012_Ch02.xhtml#Fig3),
    rectangle A contains rectangle B exactly when these four conditions are true:


    *   A.x < B.x

    *   (B.x + B.width) < (A.x + A.width)

    *   A.y < B.y

    *   (B.y + B.height) < (A.y + A.height)


    ![9781484215012_Fig02-03.jpg](OEBPS/Images/9781484215012_Fig02-03.jpg)


    [Figure 2-3](#9781484215012_Ch02.xhtml#_Fig3). Rectangle containment diagram


    This test is applied to mouseyTexture and cheeseTexture, and when true, the Boolean
    variable win is set to true, indicating that the player has won the game.


    The third set of commands is where the actual rendering takes place. The glClear
    method draws a solid- colored rectangle on the screen, using the color specified
    in the glClearColor method (in terms of red/green/blue/alpha values). The screen
    must be cleared in this manner during every rendering pass, effectively “erasing”
    the screen, because the images from previous render calls might be visible otherwise.
    The order of the draw method calls is particularly important: textures that are
    rendered later appear on top of those rendered earlier. Thus, you typically want
    to draw the background elements first, followed by the main in-game entities,
    and the user interface elements are typically drawn last. The Batch class, used
    for drawing, optimizes graphics operations by sending multiple images at once
    to the computer’s graphics processing unit (GPU).


    Managing the Action


    In the previous example—our first iteration of the game Cheese, Please!—you have
    seen that each game entity (such as Mousey and the cheese) has a lot of related
    information that you need to keep track of, such as textures and (x,y) coordinates.
    A central design principle in an object-oriented programming language like Java
    is to encapsulate related information in a single class. While you could create
    a Mousey class, a Cheese class, and so forth to manage this information, this
    approach would result in a lot of redundancy in your program, which is both inefficient
    and difficult to manage. Since another guiding principle in software engineering
    is to write reusable code, you want to implement a single class that contains
    the basic information common to all game entities, which you can then extend when
    necessary.


    LibGDX demonstrates its flexibility in this regard by providing multiple ways
    to manage this information, two of which you’ll explore in this section: the Sprite
    class and the Actor class.


    The Sprite Class


    The Sprite class contains everything you need to refactor the code from the class
    CheesePlease1\. Sprites contain fields that store coordinates, a texture, and
    additional information such as angle of rotation and scaling factors. There is
    even an associated Rectangle object, which has built-in methods (such as contains
    and intersects) to perform collision detection, which will greatly simplify that
    part of our program. Each of these fields is accessed using standard get and set
    style functions. Some other available Sprite methods that will be useful include
    the methods translateX and translateY, which change the values of the x and y
    coordinates of the Sprite, and draw, which a Sprite can use to render itself (taking
    into account its position and rotation) using a given SpriteBatch. Following is
    the code for this new version of Cheese, Please!, the class CheesePlease2, using
    Sprite objects; in addition to importing the Sprite class, you also import the
    Rectangle class, which you will see simplifies collision detection.


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.SpriteBatch;

    import com.badlogic.gdx.graphics.g2d.Sprite;

    import com.badlogic.gdx.math.Rectangle;


    public class CheesePlease2 extends Game

    {

        private SpriteBatch batch;

        private Sprite mouseySprite;

        private Sprite cheeseSprite;

        private Sprite floorSprite;

        private Sprite winTextSprite;

        private boolean win;


    public void create()

        {

            batch = new SpriteBatch();


    mouseySprite = new Sprite( new Texture(Gdx.files.internal("assets/mouse.png"))
    );

            mouseySprite.setPosition( 20, 20 );


    cheeseSprite = new Sprite( new Texture(Gdx.files.internal("assets/cheese.png"))
    );

            cheeseSprite.setPosition( 400, 300 );


    floorSprite = new Sprite( new Texture(Gdx.files.internal("assets/tiles.jpg"))
    );

            floorSprite.setPosition( 0, 0 );


    winTextSprite = new Sprite( new Texture(Gdx.files.internal("assets/you-win.png"))
    );

            winTextSprite.setPosition( 170, 60 );


    win = false;

        }


    public void render()

        {

            // process input

            if (Gdx.input.isKeyPressed(Keys.LEFT))

                mouseySprite.translateX( -1 );

            if (Gdx.input.isKeyPressed(Keys.RIGHT))

                mouseySprite.translateX( 1 );

            if (Gdx.input.isKeyPressed(Keys.UP))

                mouseySprite.translateY( 1 );

            if (Gdx.input.isKeyPressed(Keys.DOWN))

                mouseySprite.translateY( -1 );


    // check win condition

            Rectangle cheeseRectangle = cheeseSprite.getBoundingRectangle();

            Rectangle mouseyRectangle = mouseySprite.getBoundingRectangle();


    if ( cheeseRectangle.contains(mouseyRectangle) )

                win = true;


    // draw graphics

            Gdx.gl.glClearColor(0.8f, 0.8f, 1, 1);

            Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);


    batch.begin();

            floorSprite.draw( batch );

            cheeseSprite.draw( batch );

            mouseySprite.draw( batch );

            if (win)

                winTextSprite.draw( batch );

            batch.end();

        }

    }

    ```


    For the most part, the lines of code for the CheesePlease2 class directly correspond
    to those in the CheesePlease1 class. You can observe a few minor differences:
    Sprites are initialized using a Texture object, and use of the Rectangle method
    greatly simplifies collision detection. The CheesePlease2 class will require its
    own launcher class, similar to the one for CheesePlease1 (but it should initialize
    a CheesePlease2 instance). Since the change is a minor one, I won’t list the launcher
    code here, but as always, complete functioning source code for all examples can
    be downloaded from this book’s web site.'
