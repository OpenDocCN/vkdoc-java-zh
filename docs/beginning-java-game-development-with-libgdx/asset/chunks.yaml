- fmt: "# This section covers the contents of the `update` method. You update the\
    \ `spawnTimer`, and once it exceeds a predefined period (stored in `spawnInterval`),\
    \ you create a new `Balloon` instance. Most significantly in this portion of the\
    \ code, you add an object to the `Balloon` that allows it to process input. You\
    \ may recall from our discussion of the `InputMultiplexer` object earlier in this\
    \ chapter that discrete input events can be processed by classes implementing\
    \ the `InputProcessor` interface, as well as `Actor` objects (and for this reason,\
    \ you included the `Stage` objects when creating the `InputMultiplexer`). You\
    \ specify how an `Actor` should respond to an input event via an `InputListener`\
    \ object, which contains methods corresponding to the different types of input\
    \ that can be handled. Since each custom `InputListener` object is used within\
    \ only a single line of code in our program, you can simplify your code by creating\
    \ anonymous inner classes.\n\n## Anonymous Inner Classes\n\nOne of the reasons\
    \ we create variables when writing a program is so that we can refer to them again\
    \ at a later point in the code. Sometimes, however, we need to use an instance\
    \ only once in a program, and there is no need to refer to it later. For example,\
    \ we might want to use a `Scanner` object to process the contents of a text file.\
    \ To this end, we can create a `File` object that provides access to the text\
    \ file, and pass this to the `Scanner` object, as follows:\n\n```\nFile f = new\
    \ File( \"data.txt\" );\nScanner s = new Scanner( f );\n```\n\nHowever, since\
    \ we never need to access the `File` object later in this program, we could alternatively\
    \ create an anonymous File instance at the single point in the code where it is\
    \ needed: during the initialization of the `Scanner` object.\n\n```\nScanner s\
    \ = new Scanner( new File(\"data.txt\") );\n```\n\nIn Java, not only can preexisting\
    \ classes be initialized in this way, but also new classes can be created as well.\
    \ For example, perhaps you are creating a game in which a character collects `Scroll`\
    \ objects, via a method called `addScroll`; each `Scroll` can display a different\
    \ message. The `Scroll` class is given as follows:\n\n```\npublic class Scroll\n\
    {\n    public void displayMessage()  {  }\n}\n```\n\nThis class is meant to be\
    \ extended so that the `displayMessage` method can be overwritten. However, if\
    \ every `Scroll`-derived object is instantiated at only a single point in the\
    \ program, creating files for all these classes results in a lot of unnecessary\
    \ extra code. For example, we could create a class called `TreasureScroll` as\
    \ follows:\n\n```\npublic class TreasureScroll extends Scroll\n{\n    public void\
    \ displayMessage()\n    {  System.out.print(\"The treasure is buried in the castle\
    \ garden.\");  }\n}\n```\n\nThen we could create an anonymous instance of this\
    \ object when the player adds it to their `Scroll` collection:\n\n```\nplayer.addScroll(\
    \ new TreasureScroll() );\n```\n\nWe can create an *anonymous inner class* to\
    \ accomplish the same goal with the following code:\n\n```\nplayer.addScroll(\n\
    \    new Scroll()\n    {\n        public void displayMessage()\n        {  System.out.print(\"\
    The treasure is buried in the castle garden.\");  }\n    }\n);\n```\n\nWithin\
    \ the call to `addScroll`, we’ve created an instance of a new object, which extends\
    \ the `Scroll` class, and includes a set of braces where fields and method declarations\
    \ can be placed, just as with a regular class. This new object is *anonymous*,\
    \ since neither the instance nor the class are named, and is an *inner class*\
    \ because it is a class defined within another class.\n\nThe same approach is\
    \ also valid when working with interfaces. For example, assume that `Scroll` had\
    \ been defined as an interface instead of a class, as follows:\n\n```\npublic\
    \ interface Scroll\n{\n    public void displayMessage();\n}\n```\n\nIn this situation,\
    \ when an anonymous inner class is created and passed as a parameter to the `addScroll`\
    \ method, the parameter will be interpreted as a class that implements the `Scroll`\
    \ interface.\n\nThis programming pattern is particularly useful when creating\
    \ objects that contain code detailing how to respond to user input, since such\
    \ objects are typically needed only once, as an argument to an input-processing\
    \ method.\n\nYou will create an anonymous inner class that extends the `InputListener`\
    \ class and contains a single method, named `touchDown`, that is called when the\
    \ user touches or clicks within the rectangular region defined by the actor. Within\
    \ this method, you make the actor remove itself from the stage that contains it.\
    \ You also increment the number of popped balloons; this latter instruction is\
    \ why the `InputListener` is added within the `BalloonLevel` class rather than\
    \ the `Balloon` class: it needs to access the `popped` variable in the `BalloonLevel`\
    \ class.\n\nNext, in the `update` method, you use a for-each loop that iterates\
    \ through the set of all actors stored in the `mainStage` object, checks whether\
    \ they have passed beyond the boundaries of the screen, and if so, removes them\
    \ from the stage and increments `escaped`, the number of escaped balloons.\n\n\
    Finally, in the `update` method, you update the text of the `Label` objects in\
    \ the user interface. You are particularly careful to update only the `Label`\
    \ displaying the hit ratio information after `clickCount` is greater than 0, to\
    \ avoid a division-by-zero runtime error.\n\nYou’re now ready for the complete\
    \ source code of the `update` method:\n\n```\npublic void update(float dt)\n{\n\
    \    spawnTimer += dt;\n    // check time for next balloon spawn\n    if (spawnTimer\
    \ > spawnInterval)\n    {\n        spawnTimer -= spawnInterval;\n        Balloon\
    \ b = new Balloon();\n        b.addListener(\n          new InputListener()\n\
    \          {\n             public boolean touchDown (InputEvent ev, float x, float\
    \ y, int pointer, int button)\n             {\n                 popped++;\n  \
    \               b.remove();\n                 return true;\n             }\n \
    \          });\n        mainStage.addActor(b);\n    }\n\n// remove balloons that\
    \ are off-screen\n    for ( Actor a : mainStage.getActors() )\n    {\n       \
    \ if (a.getX() > mapWidth || a.getY() > mapHeight)\n        {\n            escaped++;\n\
    \            a.remove();\n        }\n    }\n\n// update user interface\n    poppedLabel.setText(\
    \ \"Popped: \" + popped );\n    escapedLabel.setText( \"Escaped: \" + escaped\
    \ );\n    if ( clickCount > 0 )\n    {\n        int percent = (int)(100.0 * popped\
    \ / clickCount);\n        hitRatioLabel.setText( \"Hit Ratio: \" + percent + \"\
    %\" );\n    }\n}\n```\n\nYou may have noticed that you didn’t change the value\
    \ of `clickCount`, the number of mouse clicks, anywhere within the `update` method.\
    \ This is because clicking a mouse button is a discrete action, and is best handled\
    \ by the `touchDown` method in the `BalloonLevel` class. (Recall that all classes\
    \ that implement the `InputProcessor` interface have a `touchDown` method, and\
    \ because of our use of the `InputMultiplexer` class, each one of these classes\
    \ will have a chance to process user input.) To accomplish this, you add the following\
    \ code immediately following the `update` method:\n\n```\npublic boolean touchDown(int\
    \ screenX, int screenY, int pointer, int button)\n{\n    clickCount++;\n    return\
    \ false;\n}\n```\n\nIn addition, as usual, you need to create a new class that\
    \ extends the `Game` class:\n\n```\nimport com.badlogic.gdx.Game;\npublic class\
    \ BalloonGame extends Game\n{\n    public void create()\n    {\n        BalloonLevel\
    \ z = new BalloonLevel(this);\n        setScreen( z );\n    }\n}\n```\n\nAnd also\
    \ as usual, you need to create a new driver class:\n\n```\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
    public class BalloonLauncher\n{\n    public static void main ()\n    {\n     \
    \   BalloonGame myProgram = new BalloonGame();\n        LwjglApplication launcher\
    \ = new LwjglApplication( myProgram );\n    }\n}\n```\n\nThis completes the core\
    \ mechanics of the Balloon Buster game. Now is a good time to test out the game,\
    \ and see how many balloons you can pop!\n\n## Next Steps"
