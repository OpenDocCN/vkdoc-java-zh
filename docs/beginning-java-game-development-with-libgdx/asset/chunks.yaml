    ## 重新创建 Actor/Stage 框架


    为了促进和加速未来项目的开发，在本节中，您将编写一些功能类似于`BaseActor`和`Stage`类的类，但改为存储对三维图形有用的数据结构和函数。为方便起见，您将继续向之前创建的项目（名为`Project3D`）中添加代码。


    ### `BaseActor3D` 类'
  raw: 'First is the core code: import statements, variable declarations (those that
    are referenced in multiple methods), and the methods required by the interface.
    As usual, the create method is used to initialize objects, while the render method
    handles the game loop; the code for each of these methods is presented in detail
    later. (The other methods required by the interface aren’t fundamental to this
    example, and so are not discussed later.)


    ```

    import com.badlogic.gdx.ApplicationListener;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.GL20;

