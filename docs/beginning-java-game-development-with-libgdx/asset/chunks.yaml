  raw: 'The final step in the create method is to set up a ContactListener, which
    will be added to the World object and is used to respond to all collision events
    (much like an InputListener object is used to respond to user input events). While
    the World object is running the physics simulation in the update method, if any
    two fixtures collide, then the ContactListener will handle what should happen
    next in the game logic.


    As it turns out, Contact objects are a little tricky to work with. They store
    the references to the two Fixture objects that came into contact; these can be
    retrieved with the Contact class methods getFixtureA and getFixtureB. However,
    for the purposes of game logic, you want to determine whether these fixtures belong
    to a certain type of object, and if so, return that object (and if not, return
    null). This task will be accomplished by a utility method called getContactObject
    that takes as parameters the Contact object being examined, as well as the Class
    of the object type being searched for. (Every class in Java has a static field
    named class that can be used to identify the type of object it is, such as Coin.class
    or Player.class. For an object whose class is unknown, you can use the getClass
    method to determine the correct class.) If the Contact object contains a Fixture
    of a Body corresponding to an Object with the specified class, then the getContactObject
    method will return a reference to that object.


    There will also be an overloaded version of the getContactObject method that additionally
    has a String parameter corresponding to a name, and returns an Object only when
    the associated class has the given type *and* the associated fixture has the given
    name. For these methods to work correctly, the Body user data must store a reference
    to the associated object, and the Fixture user data must store the name of the
    fixture. The code that accomplishes these tasks is given next, and should be included
    in the GameUtils class. First, add the import statement:


    ```

    import com.badlogic.gdx.physics.box2d.Contact;

    ```


    Then add the following methods:


    ```

    public static Object getContactObject(Contact theContact, Class theClass)

    {

        Object objA = theContact.getFixtureA().getBody().getUserData();

        Object objB = theContact.getFixtureB().getBody().getUserData();


    if (objA.getClass().equals(theClass) )

            return objA;

        else if (objB.getClass().equals(theClass) )

            return objB;

        else

            return null;

    }


    public static Object getContactObject(Contact theContact, Class theClass, String
    fixtureName)

    {

        Object objA  = theContact.getFixtureA().getBody().getUserData();

        String nameA = (String)theContact.getFixtureA().getUserData();

        Object objB  = theContact.getFixtureB().getBody().getUserData();

        String nameB = (String)theContact.getFixtureB().getUserData();


    if ( objA.getClass().equals(theClass) && nameA.equals(fixtureName) )

            return objA;

        else if ( objB.getClass().equals(theClass) && nameB.equals(fixtureName))

            return objB;

        else

            return null;

    }

    ```


    With these utility methods now available, you can now return to the GameScreen
    class and write an anonymous inner class that implements the ContactListener interface.
    The methods that must be written are called beginContact, endContact, preSolve,
    and postSolve. The latter two are not needed for this game, and so aren’t covered
    here. The other two, beginContact and endContact, are quite useful; they are called
    when a pair of fixtures first come into contact with each other, and when a pair
    of fixtures cease being in contact with each other, respectively.


    The types of contact events that are important to the game are as follows:


    *   When a Coin object and the “main” fixture of a Player object first make contact,
    the coin should be added to the removeList. This is handled in the beginContact
    method.

    *   If any solid (that is, non-Coin) object and the “bottom” fixture of a Player
    first make contact, add 1 to the player’s ground-counting variable, and set the
    player’s animation to stand. This is also handled in the beginContact method.

    *   If any solid (that is, non-Coin) object and the “bottom” fixture of a Player
    leave contact, subtract 1 from the player’s ground-counting variable. This is
    handled in the endContact method.


    These tasks are implemented by the following code:


    ```

    world.setContactListener(

        new ContactListener()

        {

            public void beginContact(Contact contact)

            {

                Object objC = GameUtils.getContactObject(contact, Coin.class);

                if (objC != null)

