    `Card` 的等级、花色和等级索引。


    ```

    import java.util.ArrayList;


    public class Pile extends BaseActor

    {

        private ArrayList<Card> list;


    public Pile()

        {

            super();

            list = new ArrayList<Card>();

        }


    public boolean isEmpty()

        {  return list.isEmpty();  }


