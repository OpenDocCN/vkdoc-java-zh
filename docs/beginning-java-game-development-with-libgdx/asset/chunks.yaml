    ```


    Similarly, after drawing the mainStage elements, you need to draw the uiStage
    elements:


    ```

    uiStage.draw();

    ```


    At this point, you can try compiling and running the code to see how the text
    appears onscreen.


    Cameras and Scrolling


    Up to this point, we’ve implicitly assumed that the dimensions (length and width)
    of the game world are exactly the same as the dimensions of the program window,
    which are 640 by 480 pixels by default. In this section, you’ll begin by increasing
    the size of the game world to 800 by 800 pixels, which will later lead us to a
    discussion of scrolling and cameras. To this end, your first modification to the
    code will be to declare some constants to store these values, using the final
    keyword to guarantee that their values cannot accidentally be changed later. This
    will also make the code that follows more readable.


    ```

    // game world dimensions

    final int mapWidth = 800;

    final int mapHeight = 800;


    // window dimensions

    final int viewWidth = 640;

    final int viewHeight = 480;

    ```


    You’ll also change the background texture (the floor tiles) to a new image file
    that is 800 by 800 pixels, which will fit the game world exactly. You’ve made
    the edges of this image a bit darker as well so that it is clear to the player
    where the boundaries of the game world are.


    ```

    floor.setTexture( new Texture(Gdx.files.internal("assets/tiles-800-800.jpg"))
    );

    ```


    Next, you’ll address and fix a small game-play detail: as it stands, Mousey can
    move beyond the dimensions of the game world. You could stop Mousey from wandering
    past the left boundary of the game world with this code:


    ```

    if ( mousey.getX() < 0 )

         mousey.setX(0);

    ```


    You also want the right edge of Mousey’s texture to be bounded by the right edge
    of the screen; this can be expressed with the inequality mousey.getX() + mousey.getWidth()
    < mapWidth, or equivalently, Mousey’s x coordinate should always be less than
    mapWidth – mousey.getWidth(). This restriction can be accomplished with this line
    of code:


    ```

    if ( mousey.getX() > mapWidth – mousey.getWidth() )

         mousey.setX( mapWidth – mousey.getWidth();

