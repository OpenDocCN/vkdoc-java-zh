- fmt: "# 排版后的文档\n\n对于某些游戏，`Sprite`对象可能足以满足你的需求；但有时，你可能需要编写一个自定义类来扩展`Sprite`类，以便为游戏实体存储额外的数据并提供额外的功能。例如，游戏中的角色可能需要跟踪生命值（HP）；它们可能会受到伤害或被治疗，并且你需要能够检查它们是否“活着”（即HP是否大于零）。在这种情况下，你可以像下面这样扩展`Sprite`类：\n\
    \n```\npublic class SpriteWithHP extends Sprite\n{\n    private int HP;\n\n  \
    \  // constructor\n    public SpriteWithHP(Texture t)\n    {\n        // activate\
    \ constructor of the class being extended\n        super(t);\n        // set default\
    \ amount of HP\n        HP = 100;\n    }\n\n    public int getHP()\n    {  return\
    \ HP;  }\n\n    public void setHP(int amount)\n    {  HP = amount;  }\n\n    public\
    \ void damage(int amount)\n    {  HP -= amount;  }\n\n    public void heal(int\
    \ amount)\n    {  HP += amount;  }\n\n    public boolean isAlive()\n    {  return\
    \ (HP > 0);  }\n}\n```\n\n由于`SpriteWithHP`是`Sprite`类的扩展，`Sprite`类中的所有数据和函数也可以与这些对象一起使用！\n\
    \n## Actor类\n\n如前所述，LibGDX提供了多种方法来管理游戏实体相关的信息。有了`Sprite`类提供的核心功能以及根据需要扩展该类的能力，起初可能会不清楚第二种方法有何用处。此外，查看LibGDX的`Actor`类源代码，它似乎无法很好地替代`Sprite`类，因为它没有提供涉及`Texture`或`Rectangle`类的预构建功能。然而，你将会看到，这种看似“缺失”最终反而成为了`Actor`类的一个优势。你可以自由地以任何方便的方式实现图形、边界形状、`draw`方法以及任何其他功能。例如，你可以模拟`Sprite`对象的单纹理方法，如下代码所示：\n\
    \n```\npublic class SpritelikeActor extends Actor\n{\n    private Texture image;\n\
    \n    // constructor\n    public SpritelikeActor()\n    {  super();  }\n\n   \
    \ public void setTexture(Texture t)\n    {  image = t;  }\n\n    public Texture\
    \ getTexture()\n    {  return image;  }\n\n    public void draw(Batch b)\n   \
    \ {\n        b.draw( getTexture(), getX(), getY() );\n    }\n}\n```\n\n或者，你可以存储多个纹理，并自定义`draw`方法，根据对象的内部状态（例如，根据对象拥有的生命值数量）选择要渲染的纹理。这可以通过以下代码实现：\n\
    \n```\npublic class HealthyActor extends Actor\n{\n    public int HP;\n    public\
    \ Texture healthyImage;\n    public Texture damagedImage;\n    public Texture\
    \ deceasedImage;\n\n    // omitted: constructor\n    // omitted: methods to get/set\
    \ above fields\n\n    public void draw(Batch b)\n    {\n        if (HP > 50)\n\
    \            b.draw( healthyImage, getX(), getY() );\n        else if (HP > 0\
    \ && HP <= 50)\n            b.draw( damagedImage, getX(), getY() );\n        else\
    \    // in this case, HP <= 0\n            b.draw( deceasedImage, getX(), getY()\
    \ );\n    }\n}\n```\n\n你甚至可以在actor中存储一个或多个动画；你将在本章后面看到这种变体。\n\n这里应该提到`Sprite`和`Actor`类之间的一些其他基本区别。首先，除了`draw`方法之外，`Actor`类还有一个`act`方法，它可以作为`Actor`的更新方法的一种形式。其次，`Actor`类被设计为与一个名为`Stage`的类（你将在不久的将来使用它）协同工作，该类存储一个`Actor`实例列表，并包含调用已添加到其中的每个actor的`act`和`draw`方法的方法（名为`act`和`draw`）。\n\
    \n我们的下一个目标是重写Cheese, Please!游戏，使其使用`Actor`类而不是`Sprite`类来表示其游戏实体。然而，在继续之前，你首先需要扩展`Actor`类，使其存储一个`Texture`和一个`Rectangle`。你还将在新类中包含两个`float`变量；它们将表示x和y方向上的速度（以像素/秒为单位），并在`act`方法中用于自动计算`Actor`的新位置。（对于不移动的`Actor`，你将速度变量保留为其默认值0。）\n\
    \n这个名为`BaseActor`的新类如下所示：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Actor;\n\
    import com.badlogic.gdx.graphics.g2d.Batch;\nimport com.badlogic.gdx.graphics.Texture;\n\
    import com.badlogic.gdx.graphics.g2d.TextureRegion;\nimport com.badlogic.gdx.math.Rectangle;\n\
    import com.badlogic.gdx.graphics.Color;\n\npublic class BaseActor extends Actor\n\
    {\n    public TextureRegion region;\n    public Rectangle boundary;\n    public\
    \ float velocityX;\n    public float velocityY;\n\n    public BaseActor()\n  \
    \  {\n        super();\n        region = new TextureRegion();\n        boundary\
    \ = new Rectangle();\n        velocityX = 0;\n        velocityY = 0;\n    }\n\n\
    \    public void setTexture(Texture t)\n    {\n        int w = t.getWidth();\n\
    \        int h = t.getHeight();\n        setWidth( w );\n        setHeight( h\
    \ );\n        region.setRegion( t );\n    }\n\n    public Rectangle getBoundingRectangle()\n\
    \    {\n        boundary.set( getX(), getY(), getWidth(), getHeight() );\n   \
    \     return boundary;\n    }\n\n    public void act(float dt)\n    {\n      \
    \  super.act( dt );\n        moveBy( velocityX * dt, velocityY * dt );\n    }\n\
    \n    public void draw(Batch batch, float parentAlpha)\n    {\n        Color c\
    \ = getColor();\n        batch.setColor(c.r, c.g, c.b, c.a);\n        if ( isVisible()\
    \ )\n            batch.draw( region, getX(), getY(), getOriginX(), getOriginY(),\n\
    \                getWidth(), getHeight(), getScaleX(), getScaleY(), getRotation()\
    \ );\n    }\n}\n```\n\n以下是关于此代码的一些观察：\n\n*   你没有使用`Texture`，而是使用`TextureRegion`来存储图像，这将在未来扩展`BaseActor`类时提供更大的灵活性。主要区别在于，`TextureRegion`可用于存储包含多个图像或动画帧的`Texture`，并且`TextureRegion`还存储坐标，称为`(u,v)`坐标，这些坐标决定了要使用`Texture`的哪个矩形子区域。\n\
    *   首先，在`act`方法中，你包含了方法调用`super.act(dt)`。这会导致`Actor`类（被扩展的类，有时称为*超类*）中的`act`方法首先被执行。\n\
    *   接下来，在`act`方法中，你计算自上次更新以来`BaseActor`移动的距离（如果有的话）。该数量使用以下物理公式计算：\n\n    距离 =\
    \ 速率 × 时间\n\n    速率是速度变量的值；自上次更新以来经过的时间存储在变量`dt`中（代表*delta time*；在物理学中，delta通常表示值的变化）。然后，沿每个轴移动的距离被添加到相应的位置变量中。\n\
    \n*   在`draw`方法中，你将`Batch`对象的颜色值（红色、绿色、蓝色和alpha/透明度）设置为与`Actor`类中存储的`Color`的值相等。这用于为`BaseActor`纹理着色，可以在许多方面改变图像的视觉外观，而无需加载额外的图像。`Actor`的默认`Color`值是白色，这对纹理的外观没有影响。\n\
    *   最后，在`draw`方法中，在检查`Actor`字段`visible`是否设置为`true`（使用`isVisible`方法）之后，你绘制纹理，同时考虑其位置、原点（旋转中心）、宽度和高度、缩放因子以及旋转角度。"
  raw: 'For some games, the Sprite object may be sufficient for your needs; other
    times, you may need to write a customized class that extends the Sprite class
    in order to store additional data and provide extra functionality for your game
    entities. For example, the characters in your game might need to keep track of
    health points (HP); perhaps they can be damaged or healed, and you need to be
    able to check if they are “alive” (whether their HP is greater than zero). In
    this scenario, you could extend the Sprite class as follows:


    ```

    public class SpriteWithHP extends Sprite

    {

        private int HP;


    // constructor

        public SpriteWithHP(Texture t)

        {

            // activate constructor of the class being extended

            super(t);

            // set default amount of HP

            HP = 100;

    }


    public int getHP()

    {  return HP;  }


    public void setHP(int amount)

    {  HP = amount;  }


    public void damage(int amount)

    {  HP -= amount;  }


    public void heal(int amount)

    {  HP += amount;  }


    public boolean isAlive()

    {  return (HP > 0);  }


    }

    ```


    Since SpriteWithHP is an extension of the Sprite class, all the data and functions
    in the Sprite class can be used with one of these objects also!


    The Actor Class


    As mentioned previously, LibGDX provides multiple approaches to managing the information
    associated with game entities. With the core functionality provided by the Sprite
    class and the ability to extend this class as needed, at first thought it may
    be unclear how a second approach would be useful. Furthermore, checking the source
    code for the LibGDX Actor class, it may seem to be a poor substitute for the Sprite
    class, as it doesn’t provide prebuilt functionality involving the Texture or Rectangle
    class. However, as you will come to see, this seeming “omission” ultimately turns
    out to be a strength of the Actor class. You are free to implement graphics, bounding
    shapes, a draw method, and any other features in any way that is convenient to
    you. For instance, you could emulate the single-texture approach of a Sprite object,
    presented in the following code:


    ```

    public class SpritelikeActor extends Actor

    {

        private Texture image;


    // constructor

        public SpritelikeActor()

        {  super();  }


    public void setTexture(Texture t)

        {  image = t;  }


    public Texture getTexture()

        {  return image;  }


    public void draw(Batch b)

        {

            b.draw( getTexture(), getX(), getY() );

        }

    }

    ```


    Alternatively, you could store multiple textures, and customize the draw method
    to select a texture to render based on the internal state of the object (for example,
    according to the number of health points the object has). This could be accomplished
    with the following code:


    ```

    public class HealthyActor extends Actor

    {

        public int HP;

        public Texture healthyImage;

        public Texture damagedImage;

        public Texture deceasedImage;


    // omitted: constructor

        // omitted: methods to get/set above fields


    public void draw(Batch b)

        {

            if (HP > 50)

                b.draw( healthyImage, getX(), getY() );

            else if (HP > 0 && HP <= 50)

                b.draw( damagedImage, getX(), getY() );

            else    // in this case, HP <= 0

                b.draw( deceasedImage, getX(), getY() );

        }

    }

    ```


    You could even store one or more animations in your actor; you’ll see this variation
    later in this chapter.


    A few other fundamental differences between the Sprite and Actor classes should
    be mentioned here. First, in addition to a draw method, the Actor class has an
    act method, which can serve as a form of an update method for the Actor. Second,
    the Actor class was designed to be used in concert with a class called Stage (that
    you will be using in the near future), which stores a list of Actor instances
    and contains methods (named act and draw) that call the act and draw methods of
    every actor that has been added to it.


    Our next goal is to rewrite the Cheese, Please! game so that it uses the Actor
    class rather than the Sprite class to represent its game entities. Before proceeding,
    however, you first need to extend the Actor class so that it stores a Texture
    and a Rectangle. You will also include two float variables in our new class; they
    will represent the velocity (in pixels per second) in the x and y directions,
    and be used in the act method to automatically calculate the new position of the
    Actor. (For an Actor that does not move, you will leave the velocity variables
    set at their default value of 0.)


    This new class, called BaseActor, is shown here:


    ```

    import com.badlogic.gdx.scenes.scene2d.Actor;

    import com.badlogic.gdx.graphics.g2d.Batch;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.graphics.g2d.TextureRegion;

    import com.badlogic.gdx.math.Rectangle;

    import com.badlogic.gdx.graphics.Color;


    public class BaseActor extends Actor

    {

        public TextureRegion region;

        public Rectangle boundary;

        public float velocityX;

        public float velocityY;


    public BaseActor()

        {

            super();

            region = new TextureRegion();

            boundary = new Rectangle();

            velocityX = 0;

            velocityY = 0;

        }


    public void setTexture(Texture t)

        {

            int w = t.getWidth();

            int h = t.getHeight();

            setWidth( w );

            setHeight( h );

            region.setRegion( t );

        }


    public Rectangle getBoundingRectangle()

        {

            boundary.set( getX(), getY(), getWidth(), getHeight() );

            return boundary;

        }


    public void act(float dt)

        {

            super.act( dt );

            moveBy( velocityX * dt, velocityY * dt );

        }


    public void draw(Batch batch, float parentAlpha)

        {

            Color c = getColor();

            batch.setColor(c.r, c.g, c.b, c.a);

            if ( isVisible() )

                batch.draw( region, getX(), getY(), getOriginX(), getOriginY(),

                    getWidth(), getHeight(), getScaleX(), getScaleY(), getRotation()
    );

        }

    }

    ```


    The following are some observations about this code:


    *   Instead of using a Texture, you are using a TextureRegion to store your image,
    which will yield greater flexibility in future extensions of the BaseActor class.
    The main difference is that a TextureRegion can be used to store a Texture that
    contains multiple images or animation frames, and a TextureRegion also stores
    coordinates, called (u,v) coordinates, that determine which rectangular subarea
    of the Texture is to be used.

    *   First, in the act method, you include the method call super.act(dt). The causes
    the act method in the Actor class (the class being extended, sometimes called
    the *super class*) to be executed first.

    *   Next, in the act method, you calculate the distance the BaseActor has travelled
    (if any) since the last update. This amount is calculated using this physics formula:


    distance = rate × time


    The rate is the value of the velocity variable; the time elapsed since the last
    update is stored in the variable dt (which stands for *delta time*; in physics,
    delta often signifies the change in a value). The distance travelled along each
    axis is then added to the corresponding position variable.


    *   In the draw method, you set the Color values (red, green, blue, and alpha/transparency)
    of the Batch object to be equal to those of the Color stored in the Actor class.
    This is used for tinting the color of the BaseActor texture, which can vary the
    visual appearance of an image in many ways, without needing to load additional
    images. The default Color value of an Actor is white, which has no effect on the
    texture’s appearance.

    *   Finally, in the draw method, after checking whether the Actor field visible
    is set to true (using the isVisible method), you draw the texture, taking into
    account its position, origin (center of rotation), width and height, scaling factors,
    and rotation angle.'
