    import com.badlogic.gdx.graphics.g3d.Material;

    import com.badlogic.gdx.math.Vector3;


    public class TheTest implements ApplicationListener

    {

           public Environment environment;

           public PerspectiveCamera camera;

           public ModelBatch modelBatch;

           public ModelInstance boxInstance;


    public void create() {  }


    public void render() {  }


    public void dispose() {  }


    public void resize(int width, int height) {  }


    public void pause() {  }


    public void resume() {  }

    }

    ```


    The create method begins with initializing the Environment, and adding a parameter
    (a subclass of the Attribute class) that defines the color of the ambient light
    in the scene. In general, shades of gray are used for lights (rather than, say,
    colors such as yellow or blue) so that your scene will not be tinted with unexpected
    colors. Then an instance of a DirectionalLight is created, using a brighter shade
    of gray, and its direction is specified (using a Vector3 object) to be primarily
    to the left and downward; after configuring its parameters, the light is added
    to the environment. A PerspectiveCamera is then initialized, with a field of view
    of 67 degrees, and with near and far visibility set to 0.1 and 1000, respectively
    (these values have been chosen to guarantee that the view area contains the object
    you will add to the scene). The camera’s position is set, and the location it
    should initially be looking toward is specified via the lookAt method. Finally,
    a ModelBatch object is initialized, which will be used later when rendering. These
    steps “set the scene” and are accomplished with the following code:


    ```

    environment = new Environment();

    environment.set( new ColorAttribute(ColorAttribute.AmbientLight, 0.4f, 0.4f, 0.4f,
    1f) );


    DirectionalLight dLight = new DirectionalLight();

    Color     lightColor = new Color(0.75f, 0.75f, 0.75f, 1);

    Vector3  lightVector = new Vector3(-1.0f, -0.75f, -0.25f);

    dLight.set( lightColor, lightVector );

    environment.add( dLight ) ;


    camera = new PerspectiveCamera(67, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());

    camera.near = 0.1f;

    camera.far  = 1000f;

    camera.position.set(10f, 10f, 10f);

    camera.lookAt(0,0,0);

    camera.update();


    modelBatch = new ModelBatch();

    ```


    The next task is to create instances of models to add to your scene. For the sake
    of simplicity in this example, you will use the createBox method of the ModelBuilder
    class to construct a cube. You must also create a Material to give the cube its
    appearance onscreen; here, a solid blue diffuse color is used. (*Diffuse* indicates
    the apparent color of the object when illuminated by pure white light.)


    You must also determine what types of data each vertex of the model should contain:
    in every case, vertices should store a position, but for this example, they also
    store color data and a vector (called the *normal vector*) that is used to determine
    how light reflects off an object, thus providing shading effects. Each of these
    attributes has a corresponding constant value defined in the Usage class; position
    data corresponds to Usage.Position, color data corresponds to Usage.ColorPacked,
    normal vector data corresponds to Usage.Normal, and so forth. When a combination
    of this data is needed, a value is generated by adding together the constant values
    for each of the desired attributes. The resulting value is passed as a parameter
    to the createBox method.


    You also need to decide on the dimensions of the box itself. Because of the scale
    used by many modeling programs, these values are often in the range from 1 to
    10, and so you should use similar ranges of values when creating objects with
    the ModelBuilder class. After creating the Model (which you can think of as a
    template object), a ModelInstance is initialized. This object contains a copy
    of the information from the model, as well as a transformation matrix that stores
    position, rotation, and scaling data for this particular instance. The following
    code performs all these tasks:


    ```

    ModelBuilder modelBuilder = new ModelBuilder();


    Material boxMaterial = new Material();

    boxMaterial.set( ColorAttribute.createDiffuse(Color.BLUE) );


    int usageCode = Usage.Position + Usage.ColorPacked + Usage.Normal;


    Model boxModel = modelBuilder.createBox( 5, 5, 5, boxMaterial, usageCode );

    boxInstance = new ModelInstance(boxModel);

    ```


    Finally, the render method is given, which is where all the phases of the game
    loop happen. In this case, the program consists of a static scene, so there is
    no user input to process nor updating tasks to be done—just rendering to perform.
    The code for this method should appear relatively familiar. One difference is
    that the glClear function also needs to erase the depth information generated
    during the previous render, since the distance from the camera to each object
    in the scene may change if the camera moves around, in which case the depth values
    will need to be recalculated. Another difference is that the ModelBatch takes
    the PerspectiveCamera as input in its begin method. The corresponding code is
    as follows:


    ```

    Gdx.gl.glClearColor(1,1,1,1);

    Gdx.gl.glViewport(0, 0, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());

    Gdx.gl.glClear( GL20.GL_COLOR_BUFFER_BIT | GL20.GL_DEPTH_BUFFER_BIT );


    modelBatch.begin(camera);

    modelBatch.render( boxInstance, environment );

    modelBatch.end();

    ```


    As usual, you’ll also need a launcher-style class, as shown here:


    ```

