    LibGDX 框架


    本章介绍 LibGDX 库的许多主要功能。它说明了如何在创建名为 *Cheese, Please!* 的游戏过程中使用这些功能，在该游戏中，您将帮助玩家角色
    Mousey 在地板上四处乱窜，寻找一块美味的奶酪。该游戏运行时的屏幕截图如图 2-1 所示。您将看到几种完成标准游戏编程任务的方法，例如表示游戏实体。然后，您将逐步添加各种功能，例如动画、用户界面和介绍性菜单屏幕。


