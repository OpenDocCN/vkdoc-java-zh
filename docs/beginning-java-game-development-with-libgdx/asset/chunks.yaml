    \n完成这些更改后，再次尝试运行《Treasure Quest》游戏，并在引导角色在地图上移动时，享受改进后的动画效果。\n\n使用 Box2D 模拟高级物理\n\
    \n你在之前的项目中遇到的另一个具有挑战性的方面是实现逼真的物理效果，特别是碰撞检测和响应。LibGDX 提供了用于圆形、矩形和多边形形状的类，并且通过 `Intersector`\
    \ 类提供的方法，你可以检查两个矩形是否重叠、矩形与圆形是否重叠、两个圆形是否重叠或两个多边形是否重叠（但无法使用此类检查其他组合）。响应碰撞则更加困难。同样，`Intersector`\
    \ 类提供的功能有限：在多边形重叠的情况下，LibGDX 可以计算最小平移向量，该向量表示其中一个多边形必须移动的最小距离，以使两个形状不再重叠。此功能已在\
    \ `BaseActor` 类中使用，它允许你模拟与固体物体的碰撞（阻止一个 `BaseActor` 穿过另一个）。\n\n在上一章的《Rectangle\
    \ Destroyer》游戏中，对碰撞响应主题进行了更深入的探讨，并提供了一些代码来模拟球从平面（如墙壁或砖块）上弹起。在《Plane Dodger》游戏中，通过在\
    \ y 方向设置恒定的负加速度来模拟重力，并解释了如何连续或离散地模拟飞机对象的向上动量。\n\n本节介绍如何使用名为 *Box2D* 的第三方软件库：一个“物理引擎”，能够处理之前描述的所有模拟，甚至更多。Box2D\
    \ 是免费且开源的，最初由 Erin Catto 使用 C++ 编程语言编写，并于 2007 年发布。此后，它已被移植到多种编程语言（包括 Java），并已集成到许多游戏开发框架（如\
    \ LibGDX）中。\n\n在本节中，你将学习如何在 LibGDX 中使用 Box2D 的基本功能，同时创建一个名为 *Jumping Jack* 的新项目。该项目属于*沙盒游戏*类别，用户控制一个角色，该角色可以以多种方式与环境互动，但既没有明确的最终目标，也没有一系列需要克服的挑战（就像在现实生活中的沙盒中玩耍一样）。Jumping\
    \ Jack 具有平台游戏风格，玩家控制考拉杰克。杰克可以在屏幕上跳跃，并与足球和板条箱互动，这两者都具有逼真的物理行为。该游戏的截图如图 7-16 所示。\n\
    \n![9781484215012_Fig07-16.jpg](img/9781484215012_Fig07-16.jpg)\n\n图 7-16. 沙盒游戏\
    \ Jumping Jack\n\n物理入门\n\n在创建新项目之前，理解一些物理术语以及 Box2D 库中相应的对象非常重要。\n"
- fmt: "# 物理模拟与 Box2D 入门\n\n在模拟物理时，你需要创建的第一个对象是`World`类的实例；它管理所有物理实体，执行模拟计算，并报告所有碰撞事件。`World`构造函数需要一个`Vector2`对象来表示重力的强度和方向，以及一个通常设置为`true`以提高性能的`Boolean`变量。由于\
    \ Box2D 引擎针对逼真的物理模拟进行了优化，你需要将屏幕上的像素尺寸缩放为更适合物理计算的范围；为此，你将使用`1/100`的缩放因子。这意味着，例如，屏幕上显示的`100`乘`100`的正方形在物理模拟中将由一个`1`乘`1`的正方形对象表示。类似地，屏幕上宽度为`75`、高度为`250`的矩形在模拟中将由一个宽度为`0.75`、高度为`2.50`的矩形表示。根据这些值，你将`World`的重力设置为向量`Vector2(0,\
    \ -9.8f)`。\n\n由`world`对象管理的每个物理实体都是一个`Body`，其整体属性通过`BodyDef`对象设置，其各个部分使用`Fixture`对象表示。`BodyDef`可用于存储以下内容：\n\
    \n- 物体的初始位置和角度\n- 初始线速度（表示位置变化）和角速度（表示旋转速率）\n- 阻尼值（如果设置，将随时间逐渐降低线速度和角速度）\n- 对象类型：如果物体不应受外力或碰撞影响且不移动，则类型应设置为`static`（通常用于对应地面和墙壁的对象）；否则，类型应设置为`dynamic`\n\
    - 一个`Boolean`值，指示物体是否可以旋转（默认为`true`，但对于玩家对象和其他不应倾倒或旋转的对象类型，通常设置为`false`）\n\n`Fixture`表示关联`Body`的物理部分，使用`FixtureDef`对象初始化，该对象存储以下信息：\n\
    \n- 对象的物理*形状*，可以是圆形（通过`CircleShape`类）、多边形（通过`PolygonShape`类）或矩形（通过`PolygonShape`类的`setAsBox`方法实现）。\n\
    - 对象的*密度*，用于计算物体的质量（等于面积（根据形状计算）与密度的乘积）。通常，密度越大，质量越大，施加在该物体上的力对其影响越小。通常，应使用`1.0`的密度值作为基准，并将其视为与水的密度相同。较重的物体密度更大；较轻的物体密度更小。\n\
    - 对象的*摩擦系数*，用于计算两个物体相互滑动时的阻力。值为`0`表示完全光滑的表面，无摩擦；两个相互滑动的物体速度完全不受影响。值为`1`表示高摩擦；两个物体在接触时速度会大幅降低。\n\
    - 对象的*恢复系数*，用于衡量物体在碰撞后的“弹性”。值为`0`表示碰撞后完全没有弹跳，而值为`1`表示物体将弹回其初始下落时的原始高度。\n\n`Fixture`也可以设置为充当*传感器*，这意味着它将对应`Body`的一个区域，但对模拟没有物理影响；此类对象可用于确定模拟中不同区域何时重叠。\n\
    \n物理模拟开始后，可以通过多种 get 和 set 风格的方法访问`Body`的位置和速度，但如果你想在模拟中移动物体，正确的方法是施加力和冲量。*力*可以理解为对物体持续施加的推或拉作用，可能导致其速度发生变化（如果力未作用于物体中心，也可能导致物体旋转）。*冲量*类似于力的离散版本，在单个时间点施加（例如用锤子敲钉子的效果，或人跳起的效果）。力或冲量的强度和方向由`Vector2`对象指示，并且可以施加到`Body`的任意点（你通常会选择物体的中心以避免不必要的旋转）。\n\
    \n最后，每次物理模拟中两个物体碰撞时，都会生成一个`Contact`对象，该对象存储了碰撞中涉及的两个特定`Fixture`的引用。当两个物体碰撞时，可能会对游戏状态产生影响（例如玩家收集物品时）。要访问此信息，你可以创建一个`ContactListener`来处理这些事件；这将在后面更详细地讨论。\n\
    \n## Box2DActor 类\n\n为了将 Box2D 对象的功能集成到你的 LibGDX 框架中，你将创建`Actor`类（特别是`AnimatedActor`类）的另一个自定义扩展，该扩展可以有效替代`PhysicsActor`类。此扩展将命名为`Box2DActor`。\n\
    \n首先，在 BlueJ 中创建一个名为`JumpingJack`的新项目，该项目需要包含类`BaseGame`、`BaseScreen`、`BaseActor`、`AnimatedActor`、`PhysicsActor`和`GameUtils`。像往常一样，你应该创建一个启动器风格的类和一个继承`BaseGame`的类。你还需要将本章源目录`JumpingJack/assets`中的图像复制到你本地项目的`assets`文件夹中。此外，你需要将两个\
    \ JAR 文件添加到项目的`+libs`文件夹中：`gdx-box2d.jar`和`gdx-box2d-natives.jar`。这些文件可以从 LibGDX\
    \ 网站下载，如前面章节所述，或者可以从本章源目录`JumpingJack/+libs`复制。\n\n接下来是`Box2DActor`类的基础内容：导入语句、变量声明和构造函数，该函数初始化变量。除了存储`Body`和用于定义其属性的各种对象外，还添加了一些`Float`变量，用于设置最大整体速度或\
    \ x 或 y 方向的最大速度上限。`Float`和`float`之间的主要区别（除了大小写）在于`Float`扩展了基本的`Object`类（而`float`是原始数据类型），因此`Float`可以设置为`null`。稍后，你将使用它来检查用户是否设置了这些值中的任何一个（并根据情况采取相应操作）。\n\
    \n```java\nimport com.badlogic.gdx.physics.box2d.World;\nimport com.badlogic.gdx.physics.box2d.Body;\n\
    import com.badlogic.gdx.physics.box2d.BodyDef;\nimport com.badlogic.gdx.physics.box2d.BodyDef.BodyType;\n\
    import com.badlogic.gdx.physics.box2d.Fixture;\nimport com.badlogic.gdx.physics.box2d.FixtureDef;\n\
    import com.badlogic.gdx.physics.box2d.CircleShape;\nimport com.badlogic.gdx.physics.box2d.PolygonShape;\n\
    import com.badlogic.gdx.math.Vector2;\nimport com.badlogic.gdx.math.MathUtils;\n\
    \npublic class Box2DActor extends AnimatedActor\n{\n    protected BodyDef bodyDef;\n\
    \    protected Body body;\n    protected FixtureDef fixtureDef;\n\n    protected\
    \ Float maxSpeed;\n    protected Float maxSpeedX;\n    protected Float maxSpeedY;\n\
    \n    public Box2DActor()\n    {\n        body       = null;\n        bodyDef\
    \    = new BodyDef();\n        fixtureDef = new FixtureDef();\n\n        maxSpeed\
    \  = null;\n        maxSpeedX = null;\n        maxSpeedY = null;\n    }\n}\n```"
  raw: 'The first object you need to create when simulating physics is an instance
    of the World class; it manages all the physics entities, performs the calculations
    for the simulation, and reports all the collision events. The world constructor
    requires a Vector2 object representing the strength and direction of gravity,
    and a Boolean variable typically set to true to improve performance. Since the
    Box2D engine is optimized for realistic physics simulations, you will need to
    scale onscreen, pixel-based dimensions into a range more suitable for physics
    calculations; you will use a scaling factor of 1/100 for this purpose. This means
    that, for example, a 100-by-100 square displayed on the screen would be represented
    by a 1-by-1 square object in the physics simulation. Similarly, an onscreen rectangle
    with width 75 and height 250 would be represented in the simulation by a rectangle
    with width 0.75 and height 2.50\. In accordance with these values, you set the
    World gravity to be the vector Vector2(0, -9.8f).


    Each physics entity managed by the world object is a Body, whose overall properties
    are set using a BodyDef object, and whose individual parts are represented using
    Fixture objects. The BodyDef can be used to store the following:


    *   The initial position and angle of the body

    *   The initial linear velocity (which represents a change in position) and angular
    velocity (which represents the rate of rotation)

    *   Damping values (which, if set, will gradually decrease the linear velocity
    and angular velocity over time)

    *   The type of object: if the body should not be affected by forces or collisions,
    and does not move, then the type should be set to static (typically used for objects
    corresponding to ground and walls); otherwise, the type should be set to dynamic

    *   A Boolean value that indicates whether the body can rotate (which defaults
    to true, but is typically set to false for player objects and other types of objects
    that should not tip over or spin)


    A Fixture, which represents a physical part of the associated Body, is initialized
    using a FixtureDef object that stores the following information:


    *   The physical *shape* of the object, which can be a circle (via the CircleShape
    class), a polygon (via the PolygonShape class), or a rectangle (which is implemented
    via the setAsBox method of the PolygonShape class).

    *   The *density* of the object, which is used to calculate the mass of the object
    (equal to the product of the area, calculated from the shape, and the density).
    Typically, the greater the density, the greater the mass, and the less of an effect
    forces will have when applied to this object. Generally, a density value of 1.0
    should be used as a baseline, and thought of as having the same density as water.
    Heavier objects will have a greater density; lighter objects will have a lesser
    density.

    *   The *friction* of the object, which is used to calculate an opposing force
    when two objects slide across each other. A value of 0 represents a perfectly
    slippery surface with no friction; the velocity of the two objects sliding across
    each other will not be affected at all. A value of 1 represents high friction;
    the speed of the two objects will be greatly decreased while they are in contact.

    *   The *restitution* of the object, which is used to measure the “bounciness”
    of an object in response to a collision. A value of 0 indicates that there will
    be no bounce at all after a collision, while a value of 1 indicates that the object
    will bounce all the way back up to the original height from which the object initially
    fell.


    A Fixture can also be set to act as a *sensor*, which means that it will correspond
    to a region of the Body but will have no physical effect on the simulation; such
    an object can be used to determine when different areas overlap in the simulation.


    After the physics simulation begins, the position and velocity of a Body can be
    accessed by a number of get and set style methods, but if you want to move a body
    in the simulation, the proper way to do this is by applying forces and impulses.
    A *force* can be thought of as a continuous pushing or pulling action applied
    to an object, which may cause its velocity to change (and may also cause the object
    to rotate, if the force is not applied to the center of the object). An *impulse*
    is like a discrete version of a force, applied at a single instant in time (such
    as the effect of hitting a nail with a hammer, or the effect of a person jumping
    in the air). The strength and direction of a force or impulse is indicated by
    a Vector2 object, and may be applied to any point of a Body (you will typically
    choose the center of the body to avoid unwanted rotation).


    Finally, every time that two bodies collide in the physics simulation, a Contact
    object is generated, which stores references to the two particular fixtures of
    the bodies involved in the collision. When two objects collide, that may have
    an effect on the game state (such as when the player collects an item). To access
    this information, you can create a ContactListener to process and handle these
    events; this is discussed in greater detail later.


    The Box2DActor Class


    To integrate the functionality of the Box2D objects into your LibGDX framework,
    you’ll create another custom extension of the Actor class (in particular, the
    AnimatedActor class) that can effectively replace the PhysicsActor class. This
    extension will be called Box2DActor.


    You begin by creating a new project in BlueJ, called JumpingJack, which needs
    to contain the classes BaseGame, BaseScreen, BaseActor, AnimatedActor, PhysicsActor,
    and GameUtils. As usual, you should create a launcher-style class and a class
    that extends BaseGame. You will also need to copy the images from this chapter’s
    source directory JumpingJack/assets into your local project’s assets folder. In
    addition, you will need to add two JAR files to your project’s +libs folder: gdx-box2d.jar
    and gdx-box2d-natives.jar. These can be downloaded from the LibGDX web site as
    earlier chapters have discussed, or the files may be copied from this chapter’s
    source directory JumpingJack/+libs.


    Next follows the basics of the Box2DActor class: the import statements, variable
    declarations, and the constructor, which initializes the variables. In addition
    to storing a Body and the various objects used to define its properties, some
    Float variables are added that can be used to set a cap on the maximum overall
    speed, or the maximum speed in either the x or y direction. The main difference
    between a Float and a float (besides the capitalization) is that Float extends
    the basic Object class (whereas float is a primitive data type), and thus a Float
    can be set to null. Later, you’ll use this to check whether the user has chosen
    to set any of these values (and act accordingly if they have).


    ```

    import com.badlogic.gdx.physics.box2d.World;

    import com.badlogic.gdx.physics.box2d.Body;

    import com.badlogic.gdx.physics.box2d.BodyDef;

    import com.badlogic.gdx.physics.box2d.BodyDef.BodyType;

    import com.badlogic.gdx.physics.box2d.Fixture;

    import com.badlogic.gdx.physics.box2d.FixtureDef;

    import com.badlogic.gdx.physics.box2d.CircleShape;

    import com.badlogic.gdx.physics.box2d.PolygonShape;

    import com.badlogic.gdx.math.Vector2;

    import com.badlogic.gdx.math.MathUtils;


    public class Box2DActor extends AnimatedActor

    {

        protected BodyDef bodyDef;

        protected Body body;

        protected FixtureDef fixtureDef;


    protected Float maxSpeed;

        protected Float maxSpeedX;

        protected Float maxSpeedY;


    public Box2DActor()

        {

            body       = null;

            bodyDef    = new BodyDef();

            fixtureDef = new FixtureDef();


    maxSpeed  = null;

            maxSpeedX = null;

            maxSpeedY = null;

        }

    }

    ```'
