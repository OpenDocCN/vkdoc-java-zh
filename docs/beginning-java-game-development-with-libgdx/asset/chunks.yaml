    The Spaceship


    Returning to the create method of the GameScreen class, you initialize the spaceship
    object as usual:


    1.  Load and store a Texture (which is automatically converted to an Animation
    for you).

    2.  Set the starting position.

    3.  Set the physics properties (a small deceleration value will provide a “drifting”
    effect).

    4.  Select a shape for collision-detection purposes.

    5.  Add the object to a Stage.


    In contrast to the turtle object from the Starfish Collector game, you do not
    want to set the autoAngle parameter to true, because the spaceship should be able
    to face in a different direction than the one corresponding to its angle of motion.
    In fact, this is one of the distinguishing features of this game: to slow down
    quickly, the spaceship must turn around and accelerate in the opposite direction.
    Here’s the code that accomplishes the features listed above:


    ```

    spaceship = new PhysicsActor();

    Texture shipTex = new Texture(Gdx.files.internal("assets/spaceship.png"));

    shipTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);

    spaceship.storeAnimation( "default", shipTex );


    spaceship.setPosition( 400,300 );

    spaceship.setOriginCenter();

    spaceship.setMaxSpeed(200);

    spaceship.setDeceleration(20);

    spaceship.setEllipseBoundary();


    mainStage.addActor(spaceship);

    ```


    Steering the spaceship in Space Rocks is slightly different from moving the turtle
    in Starfish Collector, in that you’d like to be able to change the spaceship’s
    acceleration gradually in various directions. To this end, you need to add the
    following method to the PhysicsActor class, which will adjust an actor’s acceleration
    by adding a given amount of acceleration in another direction:


    ```

    public void addAccelerationAS(float angle, float amount)

    {

        acceleration.add( amount * MathUtils.cosDeg(angle), amount * MathUtils.sinDeg(angle)
    );

    }

    ```


    With this new method in place, it is time to return to the GameScreen class. To
    steer the spaceship, you add the following code to the update method:


    ```

    spaceship.setAccelerationXY(0,0);


    if (Gdx.input.isKeyPressed(Keys.LEFT))

        spaceship.rotateBy(180 * dt);

    if (Gdx.input.isKeyPressed(Keys.RIGHT))

        spaceship.rotateBy(-180 * dt);

    if (Gdx.input.isKeyPressed(Keys.UP))

        spaceship.addAccelerationAS(spaceship.getRotation(), 100);

    ```


    One of the interesting features of the Space Rocks game world is that there are
    no “boundaries”: an object travelling past the right edge of the screen reappears
    on the left (and vice versa), and similarly for the bottom and top edges. This
    behavior is called *wraparound*, and can be implemented by including the following
    method in the GameScreen class:


    ```

    public void wraparound(BaseActor ba)

    {

        if ( ba.getX() + ba.getWidth() < 0 )

            ba.setX( mapWidth );

        if ( ba.getX() > mapWidth )

            ba.setX( -ba.getWidth() );

        if ( ba.getY() + ba.getHeight() < 0 )

            ba.setY( mapHeight );

        if ( ba.getY() > mapHeight )

            ba.setY( -ba.getHeight() );

    }

    ```


    Then in the update method, this method should be invoked on each of the moving
    entities in the game. To start, include the following line of code:


    ```

    wraparound( spaceship );

    ```


