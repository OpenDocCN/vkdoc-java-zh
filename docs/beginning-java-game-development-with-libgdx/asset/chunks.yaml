  raw: 'Sometimes when you write a class, you’ll want to control access to data, either
    to restrict the possible set of values that can be assigned, or to prevent another
    part of the program from accidentally changing the data (possibly due to a mistake
    in the code). *Access modifiers* are used in such situations; they can be included
    to specify whether other classes can use a particular field or method. The two
    most common modifiers are public, which indicates that any class can access the
    corresponding variable or method, and private, which indicates that it may be
    accessed only within the class in which it is defined. There is a less frequently
    used modifier, protected, which allows access within the defining class and any
    subclasses (that is, those that extend) the defining class.


    As a practical example of when access modifiers are useful, let’s return to our
    custom Fraction class. The denominator of a fraction should never be set equal
    to zero (because division by zero leads to contradictory mathematical results).
    You prevent this unwanted behavior by setting the class fields to private, and
    rewriting the constructor (or any other relevant methods) to take action in this
    case, as demonstrated here:


    ```

    class Fraction

    {

        // numerator

        private int n;

        // denominator

        private int d;


    // constructor

        Fraction(int a, int b)

        {

            n = a;

            if (b == 0)

            {

                System.err.println("Invalid denominator; changing value to 1.");

                d = 1;

            }

            else

            {

                d = b;

            }

        }


    // other methods remain the same as before

    }

    ```


    Summary


    These topics—data types, operators, control structures, methods, and classes—are
    the foundations from which you will create your own programs. In real applications,
    your code will typically be much longer than the examples presented; your classes
    will no doubt contain multiple import statements, declare many variables of various
    types, and have an assortment of methods, each of which contains a significant
    number of statements. When working on your own projects, in addition to writing
    your own classes, your programs will probably use many predefined classes as well.
    For this reason, it is good to spend some time becoming familiar with the style
    and type of information that is presented in the Java documentation format, whether
    it be the official Java language reference[³](#9781484215012_App.xhtml#Fn3) or
    the documentation for any Java libraries you include in your projects.


    ____________________


    [¹](#9781484215012_App.xhtml#_Fn1)The official Java tutorials, maintained by the
    Oracle corporation, are available online at [http://docs.oracle.com/javase/tutorial/java/index.html](http://docs.oracle.com/javase/tutorial/java/index.html).


    [²](#9781484215012_App.xhtml#_Fn2)To find out the package that contains a particular
    class, you can consult the Java documentation or the documentation for the particular
    library you are using.


    [³](#9781484215012_App.xhtml#_Fn3)[http://docs.oracle.com/javase/8/docs/api/](http://docs.oracle.com/javase/8/docs/api/)


