    `BaseGame` 类型。同样，在 `TurtleLevel` 类中，构造函数参数应为 `BaseGame` 对象。此外，你的 `TurtleGame`
    类现在应扩展 `BaseGame`，而不是 `Game`。在 `TurtleGame` 的 `create` 方法中，最终你将包含初始化多个屏幕共用资源的代码，使用
    `Skin` 对象存储这些资源，并且只有在这些任务完成后，才应初始化并设置游戏中要显示的第一个屏幕。


    使用自定义位图字体


    基于位图的字体在第 2 章中简要提及过；本节将更详细地讨论它们。


    要创建 `BitmapFont`，你需要两样东西：一个包含应用程序中可能想要表示的所有字符的图像（图 4-6 包含一个示例），以及一个列出每个字符对应区域（位置和大小）的相关数据文件。例如，图
    4-6 中对应 A 的区域位于 x=319, y=134，宽度为 45，高度为 41。当使用位图字体显示文本时，会提取文本中每个字符对应的图像区域，并将这些图像区域并排对齐，以产生屏幕上看到的结果。


    ![9781484215012_Fig04-06.jpg](img/9781484215012_Fig04-06.jpg)


    图 4-6. 用于创建位图字体的图像文件（512 x 256 像素）


    LibGDX 使用由 Andreas Jönsson 开发的 BMFont 格式来存储这些数据。¹ LibGDX 提供了一个名为 Hiero 的应用程序，可用于使用计算机上安装的字体生成位图字体数据。Hiero
    的第一个版本由 Kevin Glass 创建，用于他的 Java 游戏开发库 Slick2D。此后，Hiero 由 LibGDX 库的主要贡献者之一 Nathan
    Sweet 移植到了 LibGDX。Hiero 被打包成一个可执行的 JAR 文件；当前下载链接发布在 LibGDX 维基页面上。²


    对于本项目，我创建了一个自定义字体数据文件和位图文件（分别为 cooper.fnt 和 cooper.png），你可以从本章源代码目录的 assets 文件夹中下载，并复制到你自己的项目中。如果你更愿意使用
    Hiero 创建自己的字体，我将在下一段简要讨论该程序的操作；否则，你可以跳到后面一段。


    启动 Hiero 时，会显示各种选项。图 4-7 包含了该程序运行时的截图。在左上角区域，你可以选择本地安装的字体；在中央区域，你可以输入想要生成图像的字符；在右上角区域，你可以选择应用于图像的各种效果，包括纯色、渐变着色、轮廓和投影。可以通过点击效果的值并输入或选择新值来更改效果的参数。完成后，从“文件”菜单中选择“保存
    BMFont 文件”，你将获得一个 PNG 文件和一个 FNT 文件，可供 LibGDX 的 `BitmapFont` 类使用。


    ![9781484215012_Fig04-07.jpg](img/9781484215012_Fig04-07.jpg)


    图 4-7. 用于生成位图字体数据的 Hiero 应用程序


    要在 LibGDX 中使用自定义生成的位图字体，你需要使用生成的 FNT 文件的 `FileHandle` 来初始化 `BitmapFont` 对象。（相关
    PNG 文件的名称存储在 FNT 文件中，因此无需在代码中直接指定。）例如：


    ```

    BitmapFont myFont = new BitmapFont( Gdx.files.internal("myCustomFont.fnt") );

    ```


    如果需要，可以访问 `BitmapFont` 对象中包含的纹理数据。例如，你可能希望这样做，以便在缩放图像时设置滤镜以获得更平滑的外观。为此，你可以在创建
    `myFont` 后包含以下代码：


    ```

    myFont.getRegion().getTexture().setFilter(TextureFilter.Linear, TextureFilter.Linear);

    ```


    创建 `BitmapFont` 后，你可以将其用作 `LabelStyle` 的一部分，应用于游戏中的 `Label` 对象。借助 `BaseGame` 类提供的新结构，你将在
    `BaseGame` 扩展中创建样式对象，并在 `BaseScreen` 扩展中使用这些对象。


    首先，这是完全改造后的 `TurtleGame` 类的代码，它现在扩展了 `BaseGame`，并创建和存储了共享资源：


    ```

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.graphics.Texture.TextureFilter;

    import com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.g2d.BitmapFont;


    public class TurtleGame extends BaseGame

    {

        public void create()

        {

            // 初始化多个屏幕共用的资源并存储到皮肤数据库中

            BitmapFont uiFont = new BitmapFont(Gdx.files.internal("assets/cooper.fnt"));

            uiFont.getRegion().getTexture().setFilter(TextureFilter.Linear, TextureFilter.Linear);

            skin.add("uiFont", uiFont);


    LabelStyle uiLabelStyle = new LabelStyle(uiFont, Color.BLUE);

            skin.add("uiLabelStyle", uiLabelStyle);


    // 初始化并启动主游戏

            TurtleLevel tl = new TurtleLevel(this);

            setScreen( tl );

        }

    }

    ```


