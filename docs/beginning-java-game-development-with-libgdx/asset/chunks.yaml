    The Power-up


    When a brick is destroyed, it may occasionally spawn a random item that falls
    toward the bottom of the screen. If the player collects the item (by touching
    it with the paddle), some feature of the game will be changed, such as the size
    of the paddle. We’ll refer to these items as *power-ups*, even though their effect
    may increase the difficulty of the game.


    The Powerup class has some of the same features as the Brick class: it uses a
    Rectangle for collision detection, and because a base object will be used for
    spawning power-ups later, the clone method must be overridden to return a Powerup
    object. The Powerup class requires some of the functionality of AnimatedActor
    (because it stores multiple images— one for each kind of power-up), as well as
    some of the functionality of PhysicsActor (because power-ups, once spawned, constantly
    move downward). Therefore, the Powerup class will extend the PhysicsActor class.
    An overlaps method must be written to check for when a power-up overlaps the paddle.
    A randomize method will also be created to randomly select one of the stored animations;
    to be able to do this, you must make an alteration to the AnimatedActor class:
    the access modifier of animationStorage must be changed from private to protected,
    so that the Powerup class can access that data. The complete code for the class
    is presented here:


    ```

    import com.badlogic.gdx.math.Rectangle;

    import com.badlogic.gdx.math.MathUtils;

    import com.badlogic.gdx.math.Intersector;

    import java.util.ArrayList;


    public class Powerup extends PhysicsActor

    {

        public Powerup()

        {  super();  }


    public Rectangle getRectangle()

        {  return new Rectangle( getX(), getY(), getWidth(), getHeight() );  }


    public Powerup clone()

        {

            Powerup newbie = new Powerup();

            newbie.copy( this );

            return newbie;

        }


    public boolean overlaps(Paddle other)

        {

            return Intersector.overlaps( this.getRectangle(), other.getRectangle()
    );

        }


    // randomly select one of the stored animations

        public void randomize()

        {

            ArrayList<String> names = new ArrayList<String>( animationStorage.keySet()
    );

            int n = MathUtils.random( names.size() - 1 );

            setActiveAnimation( names.get(n) );

        }

    }

    ```


