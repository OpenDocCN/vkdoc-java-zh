    In this class, you need only one Stage to contain all the elements of the user
    interface. You will use a BaseActor for the background floor tile image, and another
    for the title graphic, both of which need to be copied to the assets folder. You’ll
    use a Label to create the instruction text, and since it is an extension of the
    Actor class, you can and will add a repeating sequence of actions to give the
    text a pulsing effect. The source code for this class is listed here; you start
    by listing the import statements, variable declarations, and method names:


    ```

    import com.badlogic.gdx.Game;

    import com.badlogic.gdx.Gdx;

    import com.badlogic.gdx.Input.Keys;

    import com.badlogic.gdx.graphics.Color;

    import com.badlogic.gdx.graphics.GL20;

    import com.badlogic.gdx.graphics.Texture;

    import com.badlogic.gdx.scenes.scene2d.Stage;

    import com.badlogic.gdx.scenes.scene2d.ui.Label;

    import com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;

    import com.badlogic.gdx.scenes.scene2d.actions.Actions;

    import com.badlogic.gdx.graphics.g2d.BitmapFont;

    import com.badlogic.gdx.Screen;


    public class CheeseMenu implements Screen

    {

        private Stage uiStage;

        private Game game;


    public CheeseMenu(Game g)

        {

            game = g;

            create();

        }


    public void create()

        {    }


    public void render(float dt)

        {    }


    public void resize(int width, int height) {  }

        public void pause()   {  }

        public void resume()  {  }

        public void dispose() {  }

        public void show()    {  }

        public void hide()    {  }

    }

    ```


    In the create method, you initialize the Stage and the BaseActor objects that
    will contain the title screen images, as well as the BitmapFont and Label that
    display the instructions and the associated effect, with the following code:


    ```

    uiStage  = new Stage();


    BaseActor background = new BaseActor();

    background.setTexture( new Texture(Gdx.files.internal("assets/tiles-menu.jpg"))
    );

    uiStage.addActor( background );


    BaseActor titleText = new BaseActor();

    titleText.setTexture( new Texture(Gdx.files.internal("assets/cheese-please.png"))
    );

    titleText.setPosition( 20, 100 );

    uiStage.addActor( titleText );


    BitmapFont font = new BitmapFont();

    String text = " Press S to start, M for main menu ";

    LabelStyle style = new LatbelStyle( font, Color.YELLOW );

    Label instructions = new Label( text, style );

    instructions.setFontScale(2);

    instructions.setPosition(100, 50);

    // repeating color pulse effect

    instructions.addAction(

        Actions.forever(

            Actions.sequence(

                Actions.color( new Color(1, 1, 0, 1), 0.5f ),

                Actions.delay( 0.5f ),

                Actions.color( new Color(0.5f, 0.5f, 0, 1), 0.5f )

            )

        )

    );

    uiStage.addActor( instructions );

    ```


    In the render method, you’ll check to see whether the user is pressing the S key,
    in which case you’ll use the setScreen method of the Game class to switch the
    Screen to a CheeseLevel instance, which is where the game is played. In addition,
    you perform the standard tasks of calling the act method of any Stage objects
    being used, and drawing the graphics to the screen, as follows:


    ```

    // process input

    if (Gdx.input.isKeyPressed(Keys.S))

        game.setScreen( new CheeseLevel(game) );


    // update

    uiStage.act(dt);


    // draw graphics

    Gdx.gl.glClearColor(0.8f, 0.8f, 1, 1);

    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);

    uiStage.draw();

    ```


    Now that the CheeseMenu class has been configured, you can return to the previously
    created CheeseLevel class. You’d like to give the user the ability to return to
    the main menu by pressing the M key, and so you add the following code to the
    update section of the render method in the CheeseLevel class:


    ```

    if (Gdx.input.isKeyPressed(Keys.M))

        game.setScreen( new CheeseMenu(game) );

    ```


