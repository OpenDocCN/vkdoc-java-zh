    ## 火箭推进器效果


    您的第一个目标是创建一个火箭推进器效果，如图[7-5](#9781484215012_Ch07.xhtml#Fig5)所示。


    ![9781484215012_Fig07-05.jpg](OEBPS/Images/9781484215012_Fig07-05.jpg)


    [图 7-5](#9781484215012_Ch07.xhtml#_Fig5). 火箭推进器粒子效果


    启动粒子编辑器程序后，在左下角的`Effect Emitters`面板中，点击`New`按钮，并将新创建的列表条目重命名为`thruster`。点击名为`Untitled`的列表项（对应于默认的火焰状示例），然后点击`Delete`按钮将其移除。


    在`Emitter Properties`面板底部的一组选项中，取消选中`Additive`复选框，并选中`Continuous`复选框。您现在应该在预览面板中间看到一个红点。


    首先，您将调整任意时刻活跃的粒子数量。将`Count`属性的`Max`值更改为`100`。要达到这个数量，您还必须将`Emission`属性的`High`值更改为`200`。（将此值更改为`100`是不够的，因为每个粒子只持续`0.5`秒，因为`500`毫秒是`Life`属性的默认值。`100`的发射速率在任何给定时间只会产生`50`个活跃粒子。）


    接下来，点击`Velocity`和`Angle`属性旁边的`Active`按钮。对于`Velocity`，点击`High`旁边的![image](OEBPS/Images/arrow.jpg)按钮，并输入值`300`和`400`。对于`Angle`，再次点击`High`旁边的![image](OEBPS/Images/arrow.jpg)按钮，并输入值`70`和`110`。您现在应该看到红色粒子以摇摆的锥形图案向上喷射。


    现在更改`Tint`参数图表，使着色颜色从开始时的红色，变为中间的橙色，再到结束时的黄色。完成此步骤后，预览面板中的粒子应在发射器底部显示为红色，并逐渐改变颜色，直到在顶部变为黄色。


    最后，您希望粒子在生命周期结束时缩小并淡出。为此，修改`Size`和`Transparency`的参数变化图表，使它们都类似于图[7-3](#9781484215012_Ch07.xhtml#Fig3)中的“突然递减”图表。'
  raw: '*   *Image*: From this area, you can select the image used for each particle.
    Particles are often tinted with a color; grayscale images work best for this purpose.

    *   *Count*: This area can be used to set the minimum and maximum number of particles
    that should appear onscreen at any time.

    *   *Duration*: This is how long the emitter will produce particles. (When creating
    a continuous effect, this value will be ignored.)

    *   *Emission*: This is how many particles will be emitted per second.

    *   *Life*: This is how long each particle will be active in the particle system.

    *   *Size*: This is the size of the image, in pixels.

    *   *Velocity*: This is the particle speed, in pixels per second.

    *   *Angle*: This is the particle direction, in degrees.

    *   *Tint*: This displays the color(s) used to tint the particle image.

    *   *Transparency*: This controls the transparency of the images over time.

    *   *Additive*: When active, this blends colors by adding together the color components,
    resulting in brighter areas where many particles are present.

    *   *Continuous*: When active, this causes the emitters to continue emitting particles
    (ignoring the preceding Duration value).


    Next to some of the parameters, you’ll see text boxes and a graph, as shown in
    [Figure 7-2](#9781484215012_Ch07.xhtml#Fig2), which can be used for fine-tuning
    the initial values and changes in values over time. (For some parameters, you
    will need to click the Active button to the right of the parameter name to make
    these elements appear.)


