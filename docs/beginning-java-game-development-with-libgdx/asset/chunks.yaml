    \ 1-2](#9781484215012_Ch01.xhtml#_Fig2). The BlueJ project window\n\n4.  Create\
    \ a new class, either by clicking the `New Class` button or by choosing `Edit`\
    \ ![image](OEBPS/Images/arrow.jpg) `New Class` from the menu bar.\n5.  When you\
    \ are prompted to enter a name for the class, type `HelloWorld` and press the\
    \ `Enter` key or click the `OK` button. An orange rectangle appears with the name\
    \ of your class at its top. The gray diagonal lines indicate that the code has\
    \ not yet been compiled.\n6.  Either double-click the rectangle or right-click\
    \ and select `Open Editor` to edit the file. You will see that some template code\
    \ has been added; delete all of this code, and enter the following code in its\
    \ place:\n\n```\n    public class HelloWorld\n    {\n        public static void\
    \ main()\n        {\n            System.out.print(\"Hello, World!\");\n        }\n\
    \    }\n```\n\nAfter entering this code into BlueJ, it should appear similar to\
    \ the screenshot in [Figure 1-3](#9781484215012_Ch01.xhtml#Fig3).\n\n![9781484215012_Fig01-03.jpg](OEBPS/Images/9781484215012_Fig01-03.jpg)\n\
    \n[Figure 1-3](#9781484215012_Ch01.xhtml#_Fig3). A “Hello, World!” program displayed\
    \ in the BlueJ code editor\n\n7.  Click the `Compile` button to compile your code.\
    \ (This action also automatically saves your code.) You should see the message\
    \ “Class compiled – no syntax errors” in the status bar at the bottom of the window.\n\
    8.  Right-click the orange rectangle for the class, and select the method `void\
    \ main()` from the list that appears. This runs the method that you have just\
    \ written. A terminal window appears, containing the text `Hello, World!`, as\
    \ shown in [Figure 1-4](#9781484215012_Ch01.xhtml#Fig4).\n\n![9781484215012_Fig01-04.jpg](OEBPS/Images/9781484215012_Fig01-04.jpg)\n\
    \n[Figure 1-4](#9781484215012_Ch01.xhtml#_Fig4). Text displayed by the “Hello,\
    \ World!” program\n\nCongratulations on running your first program using BlueJ!\n\
    \nBlueJ has a number of features that make programming easier. While entering\
    \ the preceding code, you may have noticed the syntax highlighting (Java keywords\
    \ and strings appear in different colors), and also that classes and methods appear\
    \ surrounded by different background colors, to make it easier to visually inspect\
    \ your code. (Later, you’ll notice that conditional statements and loops are similarly\
    \ distinguished with background colors.) BlueJ contains additional features that\
    \ you may find useful, such as these:\n\n*   Automatic code formatting. Selecting\
    \ `Auto-Layout` from the `Edit` menu will adjust the whitespace in your code so\
    \ that nested statements are aligned consistently.\n*   Listing available method\
    \ names. After typing the name of a class or object, followed by a period, pressing\
    \ `Ctrl+Space` will display a list of available method names.\n*   Shortcut keys\
    \ for indenting/un-indenting and commenting/uncommenting blocks of code. These\
    \ are listed in the `Edit` menu.\n*   A simple interface for adding breakpoints,\
    \ which activates a debugger that allows you to step through code line by line\
    \ and easily inspect objects.\n\nFor complete information on these and other features,\
    \ see the BlueJ reference manual at [www.bluej.org/doc/bluej-ref-manual.pdf](http://www.bluej.org/doc/bluej-ref-manual.pdf).\n\
    \n## Setting Up LibGDX\n\nIn this section, you’ll configure BlueJ so that it can\
    \ use the LibGDX software library. *Software libraries* are collections of prewritten\
    \ code and methods that can be used by other programs. Their value lies in their\
    \ reusability—they accelerate and simplify the development process when they implement\
    \ frequently needed processes, saving programmers from needing to “reinvent the\
    \ wheel” every time they write a program. The LibGDX libraries, for example, contain\
    \ methods for displaying graphics, playing sounds, and getting input from the\
    \ user. (Advanced functions are available as well, which are discussed later in\
    \ this chapter.)\n\nIn Java, libraries are stored in Java Archive (JAR) files.\
    \ A JAR file contains many files (similar to a ZIP file)—compiled Java files,\
    \ stored in a standardized directory structure that the JDK can navigate. Your\
    \ first step is to download the LibGDX JAR files that you will need for our project.\
    \ There are two online sources to obtain these files:\n\n*   From the web site\
    \ [https://libgdx.badlogicgames.com/releases/](https://libgdx.badlogicgames.com/releases/),\
    \ download the latest version of the file with a file name of the form `libgdx-x.y.z.zip`.\
    \ This is an archive file that contains all the various LibGDX JAR files. Extract\
    \ the following files to your `Desktop` directory: `gdx.jar`, `gdx-natives.jar`,\
    \ `gdx-backend-lwjgl.jar`, and `gdx-backend-lwjgl-natives.jar`. These files contain\
    \ the core code for the LibGDX library.\n*   Alternatively, the most up-to-date\
    \ versions of these four JAR files can be obtained from the web site [https://libgdx.badlogicgames.com/nightlies/dist/](https://libgdx.badlogicgames.com/nightlies/dist/).\
    \ These are the *nightly builds* of the LibGDX libraries (in contrast to the previous\
    \ link, which points to the most recent stable version of the software). These\
    \ files are the most up-to-date, but they are also under development and thus\
    \ may contain a few bugs or glitches.\n\nOnce these four JAR files have been obtained,\
    \ BlueJ needs to be configured so that it recognizes and can use the contents\
    \ of these files. There are two main ways to do so:\n\n*   The easiest way to\
    \ make BlueJ aware of JAR files is to create a directory named `+libs` within\
    \ the project directory, then copy the JAR files into this directory, and restart\
    \ the BlueJ software. By default, when a project is opened in BlueJ, it automatically\
    \ scans for the presence of a folder named `+libs` and takes its contents into\
    \ account when compiling new code.\n*   When there are JAR files that may be used\
    \ in multiple projects, rather than creating redundant copies of these files in\
    \ `+libs` directories for each of these projects, they can be copied to a special\
    \ subdirectory, named `userlib`, in the folder where the BlueJ software is installed.\
    \ The full path to the directory should be something similar to `C:\\Program Files\\\
    BlueJ\\lib\\userlib\\`; the exact name can be checked by selecting the menu option\
    \ `Tools` ![image](OEBPS/Images/arrow.jpg) `Preferences` in Windows, or `BlueJ`\
    \ ![image](OEBPS/Images/arrow.jpg) `Preferences` in OS X, and clicking the `Libraries`\
    \ tab.\n\nOnce these steps are complete, BlueJ needs to be restarted, and then\
    \ you’ll be ready to write your first program in LibGDX.\n\n## Creating a “Hello,\
    \ World!” Program with LibGDX\n\nTraditionally, a “Hello, World!” program displays\
    \ a text message on the screen. Since our ultimate goal is to create video games—primarily\
    \ visual programs—your first LibGDX program will draw a picture of the world in\
    \ a window, as shown in [Figure 1-5](#9781484215012_Ch01.xhtml#Fig5).\n\n![9781484215012_Fig01-05.jpg](OEBPS/Images/9781484215012_Fig01-05.jpg)\n\
    \n[Figure 1-5](#9781484215012_Ch01.xhtml#_Fig5). A “Hello, World!” program created\
    \ using LibGDX\n\nHere, you will begin to see some of the advantages and start\
    \ to understand what I mean by *building upon* the classes provided by the LibGDX\
    \ libraries. Our first project contains two classes. The first class, called `HelloWorldImage`,\
    \ makes use of the functionality of a LibGDX class, called `Game`, by extending\
    \ it.\n\n### EXTENDING A CLASS\n\nOne of the central principles of software engineering\
    \ is to design programs that avoid redundancy by creating reusable code. One way\
    \ to accomplish this is by the object-oriented concept of inheritance: the creation\
    \ of a new class based on an existing class."
