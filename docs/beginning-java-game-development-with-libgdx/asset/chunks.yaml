    Label objects will be used to display each of these values on the user interface
    stage. Finally, you’ll store the width and height of the game world, as they will
    be needed to determine when a balloon has flown off-screen. The following is the
    code for the BalloonLevel class that includes these variables, as well as all
    the import statements you will eventually need. The create and update methods
    are blank for now; you will fill them in later in this section.


