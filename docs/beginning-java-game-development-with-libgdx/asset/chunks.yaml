    由 world 对象管理的每个物理实体都是一个 Body，其整体属性通过 BodyDef 对象设置，而其各个部分则通过 Fixture 对象表示。BodyDef
    可用于存储以下内容：


    *   物体的初始位置和角度

    *   初始线速度（表示位置变化）和角速度（表示旋转速率）

    *   阻尼值（如果设置，将随时间逐渐降低线速度和角速度）

    *   物体类型：如果物体不应受外力或碰撞影响，且不移动，则类型应设为 static（通常用于对应地面和墙壁的物体）；否则，类型应设为 dynamic

    *   一个布尔值，指示物体是否可以旋转（默认为 true，但对于玩家对象和其他不应倾倒或旋转的物体类型，通常设为 false）


    Fixture 表示关联 Body 的一个物理部分，通过 FixtureDef 对象初始化，该对象存储以下信息：


    *   物体的物理*形状*，可以是圆形（通过 CircleShape 类）、多边形（通过 PolygonShape 类）或矩形（通过 PolygonShape
    类的 setAsBox 方法实现）。

    *   物体的*密度*，用于计算物体的质量（等于由形状计算出的面积与密度的乘积）。通常，密度越大，质量越大，施加于该物体的力对其产生的影响就越小。一般来说，应将密度值
    1.0 作为基准，并视为与水的密度相同。较重的物体密度更大；较轻的物体密度更小。

    *   物体的*摩擦系数*，用于计算两个物体相互滑动时产生的阻力。值为 0 表示完全光滑的表面，无摩擦；两个相互滑动物体的速度完全不受影响。值为 1 表示高摩擦；两个物体接触时，其速度会大幅降低。

    *   物体的*恢复系数*，用于衡量物体碰撞后的“弹性”。值为 0 表示碰撞后完全没有弹跳，而值为 1 表示物体会弹回至其初始下落的高度。


    Fixture 也可以设置为充当*传感器*，这意味着它将对应 Body 的一个区域，但对模拟没有物理影响；此类对象可用于确定模拟中不同区域何时重叠。


    物理模拟开始后，可以通过多种 get 和 set 风格的方法访问 Body 的位置和速度，但若要在模拟中移动物体，正确的方法是施加力和冲量。*力*可以理解为持续作用于物体的推或拉动作，可能导致其速度改变（如果力未作用于物体中心，也可能导致物体旋转）。*冲量*类似于力的离散版本，在单个瞬间施加（例如用锤子敲钉子的效果，或人跳向空中的效果）。力或冲量的强度和方向由
    Vector2 对象表示，并可施加于 Body 的任意点（通常你会选择物体中心以避免不必要的旋转）。


    最后，每次物理模拟中两个物体碰撞时，都会生成一个 Contact 对象，该对象存储了碰撞中涉及的两个特定 Fixture 的引用。当两个物体碰撞时，可能会对游戏状态产生影响（例如玩家拾取物品时）。要访问此信息，你可以创建一个
    ContactListener 来处理这些事件；这将在后面更详细地讨论。


    Box2DActor 类


    为了将 Box2D 对象的功能集成到你的 LibGDX 框架中，你将创建 Actor 类（特别是 AnimatedActor 类）的另一个自定义扩展，该扩展可以有效替代
    PhysicsActor 类。此扩展将命名为 Box2DActor。


    首先，在 BlueJ 中创建一个名为 JumpingJack 的新项目，该项目需要包含 BaseGame、BaseScreen、BaseActor、AnimatedActor、PhysicsActor
    和 GameUtils 类。像往常一样，你应该创建一个启动器风格的类和一个扩展 BaseGame 的类。你还需要将本章源目录 JumpingJack/assets
    中的图像复制到你本地项目的 assets 文件夹中。此外，你需要将两个 JAR 文件添加到项目的 +libs 文件夹中：`gdx-box2d.jar` 和
    `gdx-box2d-natives.jar`。这些文件可以按照前面章节所述从 LibGDX 网站下载，或者从本章源目录 JumpingJack/+libs
    中复制。


    接下来是 Box2DActor 类的基本内容：导入语句、变量声明以及初始化变量的构造函数。除了存储 Body 和用于定义其属性的各种对象外，还添加了一些 Float
    变量，用于设置最大整体速度或 x 或 y 方向的最大速度上限。Float 和 float 之间的主要区别（除了大小写）在于 Float 扩展了基本的 Object
    类（而 float 是原始数据类型），因此 Float 可以设置为 null。稍后，你将使用它来检查用户是否选择了设置这些值中的任何一个（并根据情况采取相应操作）。


    ```

    import com.badlogic.gdx.physics.box2d.World;

    import com.badlogic.gdx.physics.box2d.Body;

    import com.badlogic.gdx.physics.box2d.BodyDef;

    import com.badlogic.gdx.physics.box2d.BodyDef.BodyType;

    import com.badlogic.gdx.physics.box2d.Fixture;

    import com.badlogic.gdx.physics.box2d.FixtureDef;

    import com.badlogic.gdx.physics.box2d.CircleShape;

    import com.badlogic.gdx.physics.box2d.PolygonShape;

    import com.badlogic.gdx.math.Vector2;

    import com.badlogic.gdx.math.MathUtils;


    public class Box2DActor extends AnimatedActor

    {

        protected BodyDef bodyDef;

        protected Body body;

        protected FixtureDef fixtureDef;


    protected Float maxSpeed;

        protected Float maxSpeedX;

        protected Float maxSpeedY;


    public Box2DActor()

        {

            body       = null;

            bodyDef    = new BodyDef();

            fixtureDef = new FixtureDef();


    maxSpeed  = null;

            maxSpeedX = null;

            maxSpeedY = null;

        }

    }

