  trans: '

    如果“背景”层在图层面板中未高亮显示，请单击它使其成为活动图层。接着，点击包含印章图标的按钮；这将选中**印章画笔工具**，这是你最常使用的工具。在 Tiled
    窗口右下角的“图块集”面板中，点击一个包含草地图案的矩形。该图块会变为蓝色，表示已被选中。在代表你地图的当前空白网格中任意位置点击，之前选中的图块图像便会出现在该方格中。（包含水桶图标的**填充工具**可用于使用当前选中的图块更快地填充大面积区域。）继续此过程，添加各种图块，直到所有图块都被填充，并且你对布局感到满意为止。


    图 7-12 展示了一种可能的设计方案，但你可以自由创建自己的设计；尝试不同的图块排列方式，以创建连续的边界和视觉上有趣的布局。（图像中出现的网格线是作为参考线，在后续渲染地图时不会显示。）如果你想更改已放置在某个位置的图块，可以选择窗口顶部的**橡皮擦工具**图标，或者选择另一个不同的图块，然后使用**印章画笔工具**替换该位置的图块。在此阶段，你唯一需要考虑的限制是，只使用图像填满整个方格的图块。换句话说，在此图层上工作时，避免使用带有透明区域的图块（例如灌木、树木或栅栏）。否则，用于清除屏幕的颜色（在
    `BaseScreen` 类的 `render` 方法中定义）将会在透明位置显示出来。


    ![9781484215012_Fig07-12.jpg](img/9781484215012_Fig07-12.jpg)


    图 7-12. 地图背景层的一种可能布局


    接下来，你将添加在背景之上渲染的视觉趣味元素，比如你在背景层中避免使用的灌木、树木和栅栏。点击图层面板中的“场景”层，然后点击地图中的网格方格来添加这些图像。注意，它们不会替换之前添加到背景层的图块；相反，它们会显示在背景层之上。这在保持图块集尺寸较小的同时，允许大量组合，尤其有用。例如，你可以创建草地上的灌木图像或泥土上的灌木图像，而无需在图块集中提供这些特定的组合；只需要提供各个独立的组件即可。


    再次强调，在选择要添加到此图层的对象时，我建议一个限制：有些图块应该渲染在游戏角色之上，例如建筑物的屋顶或树顶。这能创造出一种深度错觉：角色看起来会出现在屋顶下方或树木后面。因此，在向“场景”层添加元素后，选择名为“覆盖”的图层，并添加任何应该渲染在玩家角色之上的图块。


    图 7-13 展示了向“场景”层添加各种灌木、树干和建筑墙壁后的结果，接着是向“覆盖”层添加树顶后的结果。


    ![9781484215012_Fig07-13.jpg](img/9781484215012_Fig07-13.jpg)


    图 7-13. 为地图的场景层和覆盖层添加细节后的结果


    最后，你将向此地图添加一些非视觉数据：各种游戏内对象的位置和大小，例如玩家的起始位置以及玩家可以与之交互的各种物品。这些对象不由图块表示，而是由你稍后编写的配套程序加载的图像表示。可以通过创建对象层来添加这些数据；你将创建两个这样的图层，以保持数据的有序性。


    首先，从菜单栏中选择“图层”![image](img/arrow.jpg)“添加对象层”，并将新添加的图层命名为 **ObjectData**。重复此过程，添加另一个名为
    **PhysicsData** 的对象层。


    选择名为 ObjectData 的图层，你会注意到菜单栏中的一些工具图标（涉及图像操作的那些，例如印章画笔和橡皮擦）变灰且无法使用。同时，一些之前不可用的工具（涉及创建几何形状的那些）现在可以被选中，因为你正在对象层上工作。


    选择“插入矩形”工具的图标，你将能够在地图上点击并拖动，以在任何位置添加任意大小的矩形。第一次点击设置矩形的左上角；将鼠标向右下方拖动以设置矩形的大小。在《宝藏探索》游戏中，玩家可以与之交互的游戏内实体包括玩家、一把钥匙、一扇门和三枚金币。你应该使用“插入矩形”工具添加矩形来存储每个物品的位置；图
    7-14 展示了一种可能的排列方式。


    ![9781484215012_Fig07-14.jpg](img/9781484215012_Fig07-14.jpg)


    图 7-14. 添加并高亮显示了矩形对象数据的地图


    为了区分这些对象类型，需要为每个矩形设置属性。为此，点击一个矩形将其选中，然后在 Tiled 窗口左侧的“属性”面板中，在“名称”字段中输入一个名称。输入的名称随后会显示在地图上相应矩形的上方。我建议使用显而易见的名称（player、key、door
    和 coin）。这些名称稍后很重要，因为在将相应数据导入程序时会用到它们。如果需要，你还可以通过使用“属性”面板以数字方式调整每个矩形的位置和大小，或者使用工具栏中的“选择对象”工具，点击要重新定位或调整大小的矩形。


    现在选择名为 PhysicsData 的图层，你将添加一系列矩形来表示固体或不可通行的对象。在此示例中，你应该将矩形放置在水面图块、树干和建筑墙壁上。在这种情况下，你不需要为这些对象添加名称，因为它们都用于相同的目的，并且没有必要区分它们。


    图 7-14 展示了如前所述在对象层上放置矩形的情况。由于 Tiled 中的矩形以浅灰色边框显示，为了清晰起见，我在截图中使用斜线高亮显示了这些矩形。（在使用
    Tiled 软件时，矩形*不会*以这种方式显示。）


    地图完成后，将其以文件名 `game-map.tmx` 保存到你的 BlueJ 项目的 `assets` 文件夹中。在下一节中，你将看到内置的 LibGDX
    类如何使用此文件格式来渲染图像和检索几何数据。


    **宝藏探索：一款冒险风格探索游戏**


    本节演示了在制作一款名为《宝藏探索》的新游戏时，如何处理存储在 Tiled 地图文件中的信息。受《塞尔达传说》等经典俯视角冒险游戏的启发，在这款游戏中，玩家控制一个角色在乡间寻找一把钥匙，这把钥匙将打开一扇通往装满金币的建筑的大门。

