    mainStage3D.addActor(rock1);\nrockList.add(rock1);\n\nBaseActor3D rock2 = baseRock.clone();\n\
    rock2.setPosition(-4,0,4);\nmainStage3D.addActor(rock2);\nrockList.add(rock2);\n\
    \nBaseActor3D rock3 = baseRock.clone();\nrock3.setPosition(6,0,6);\nmainStage3D.addActor(rock3);\n\
    rockList.add(rock3);\n```\n\nFinally, the position of the camera is set. You won’t\
    \ set the look direction here, as that will be handled by the `update` method\
    \ later.\n\n```java\nmainStage3D.setCameraPosition(2,3,15);\n```\n\nThis finishes\
    \ the `create` method. The final code additions take place in the `update` method,\
    \ and will be relatively short. The three tasks that must be accomplished include\
    \ checking for collisions between the player and the rocks, processing user input\
    \ (the ship will only be able to move forward and turn left and right), and setting\
    \ the camera direction so that it always faces the player. These tasks are accomplished\
    \ with the following code, which should be added to the `update` method:\n\n```java\n\
    for ( BaseActor3D rock : rockList )\n    player.overlaps(rock, true);\n\nfloat\
    \ speed = 3.0f;\nfloat rotateSpeed = 45.0f;\n\nif ( Gdx.input.isKeyPressed(Keys.W)\
    \ )\n    player.moveForward( speed * dt );\n\nif ( Gdx.input.isKeyPressed(Keys.Q)\
    \ )\n    player.turn( -rotateSpeed * dt );\nif ( Gdx.input.isKeyPressed(Keys.E)\
    \ )\n    player.turn( rotateSpeed * dt );\n\nmainStage3D.setCameraDirection( player.getPosition()\
    \ );\n```\n\nAfter adding this code, you’re finished with the `GameScreen` class.\
    \ Try it out; have fun sailing your new pirate ship through the open seas, but\
    \ look out for those rocks!\n\n## Next Steps\n\nWith the foundation laid in this\
    \ chapter, you are now ready to try some exercises and incorporate advanced functionality\
    \ in your 3D projects. This section lists some possibilities. The best place to\
    \ get an overview and start reading about new features is usually the LibGDX wiki,\
    \ which in addition to containing basic information, sometimes provides links\
    \ to tutorials.\n\n*   Compose an interactive 3D scene containing a variety of\
    \ models loaded from external files. The following are some web sites from which\
    \ you can download model files (in a variety of file formats):\n    *   OpenGameArt:\
    \ [http://opengameart.org](http://opengameart.org)\n    *   The Models Resource:\
    \ [www.models-resource.com](http://www.models-resource.com)\n    *   TurboSquid:\
    \ [www.turbosquid.com](http://www.turbosquid.com) (They have many free models\
    \ available; this can be specified in their search options.)\n*   Once you have\
    \ download a 3D model, before loading it into LibGDX, you can view and modify\
    \ it using 3D graphics software such as Blender, which is freely available at\
    \ [www.blender.org](http://www.blender.org).\n*   Try creating a 2.5D version\
    \ of some of the earlier projects from this book.\n*   To implement advanced 3D\
    \ physics, integrate the Bullet physics engine into your project (this process\
    \ will be similar to your previous work incorporating the Box2D physics engine\
    \ for realistic 2D physics).\n*   Add 3D particle effects to your game; LibGDX\
    \ provides a 3D particle editor (called *Flame*) to help design the effects (similar\
    \ to the 2D Particle Editor discussed in the previous chapter).\n\n## Summary\n\
    \nThis chapter may have only scratched the surface of 3D game programming, but\
    \ that in itself entails a lot of material. You explored the components of 3D\
    \ scenes, perspective cameras, and lighting. You learned that 3D models contain\
    \ meshes and materials, and instances of models store transformation data (position,\
    \ rotation, and scale) using matrices. You adapted and extended your custom game\
    \ development framework to include 3D versions of actors and stages, and learned\
    \ the many ways you can move objects around in a three-dimensional world. Finally,\
    \ you put your skills (and your code) to the test, by creating a pair of interactive\
    \ demo programs. Congratulations on making it through, and good luck in your future\
    \ 3D endeavors.\n\n____________________\n\n[¹](#9781484215012_Ch08.xhtml#_Fn1)For\
    \ additional information, two excellent books about the mathematical details of\
    \ 3D graphics are *3D Math Primer for Graphics and Game Development* by Fletcher\
    \ Dunn and Ian Parberry (A K Peters/CRC Press, 2011), and *Mathematics for 3D\
    \ Game Programming and Computer Graphics* by Eric Lengyel (Cengage Learning PTR,\
    \ 2011).\n\n[²](#9781484215012_Ch08.xhtml#_Fn2)When using three values to represent\
    \ the rotations of an object around three axes, *gimbal lock* refers to the problem\
    \ that occurs when an object is in one of a few particular orientations and two\
    \ axes of rotation line up, making it impossible for the object to rotate in certain\
    \ ways while in the given orientation.\n\n[³](#9781484215012_Ch08.xhtml#_Fn3)In\
    \ theory, this choice of the y axis as the “up” direction is somewhat arbitrary,\
    \ as you could orient yourself in the game world so that any axis corresponds\
    \ to the up direction.\n\n[⁴](#9781484215012_Ch08.xhtml#_Fn4)The amount of rotation\
    \ around the upward-pointing axis is also called the *yaw* angle. Similarly, the\
    \ rotation around the sideways-pointing axis (the motion from tilting your head\
    \ up and down) is called the *pitch* angle, and the rotation around the forward-pointing\
    \ axis (the motion from tilting your head to the left and to the right) is called\
    \ the *roll* angle.\n\n[⁵](#9781484215012_Ch08.xhtml#_Fn5)The need for such a\
    \ modification typically becomes apparent only while testing the code and visually\
    \ inspecting the models. Alternatively, using a 3D modeling program such as Blender,\
    \ mentioned later in this chapter, can be used to inspect and adjust a model’s\
    \ appearance ahead of time.\n\n## CHAPTER 9\n\n![image](OEBPS/Images/frontdot.jpg)\n\
    \nThe Journey Continues"
