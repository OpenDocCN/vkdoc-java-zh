            brick.setPosition( 8 + 80*i,  500 - (24 + 16)*j );

            brick.setColor( colorArray[j] );

            brickList.add( brick );

            brick.setParentList( brickList );

            mainStage.addActor( brick );

        }

    }

    ```


    Next, interactivity will be added to the update method. First, the horizontal
    position of the paddle must be continuously adjusted to center on the x coordinate
    of the mouse, and the paddle object should be bound to the screen:


    ```

    paddle.setPosition( Gdx.input.getX() - paddle.getWidth()/2, 32 );


    if ( paddle.getX() < 0 )

        paddle.setX(0);


    if ( paddle.getX() + paddle.getWidth() > mapWidth )

        paddle.setX(mapWidth - paddle.getWidth());

    ```


    Next, code will be added to bounce the ball off the edges of the screen. For testing
    purposes, the ball will also bounce off the bottom edge of the screen. (In a finished
    version of this game, this does not happen; if the ball passes below the bottom
    edge, the player loses the game.)


    ```

    if (ball.getX() < 0)

    {

        ball.setX(0);

        ball.multVelocityX(-1);

    }


    if (ball.getX() + ball.getWidth() > mapWidth)

    {

        ball.setX( mapWidth - ball.getWidth() );

        ball.multVelocityX(-1);

    }


    if (ball.getY() < 0)

    {

        ball.setY(0);

        ball.multVelocityY(-1);

    }


    if (ball.getY() + ball.getHeight() > mapHeight)

    {

        ball.setY( mapHeight - ball.getHeight() );

        ball.multVelocityY(-1);

    }

    ```


    To bounce the ball off the paddle, call the overlaps method of the ball with the
    following line of code. (Although this method returns a Boolean value, we do not
    have a use for this value at this time. It could be useful later when adding polish
    to your game: for example, if the ball overlaps the paddle, then a sound effect
    could be played.)


    ```

    ball.overlaps(paddle, true);

    ```


    Next, check whether the ball has collided with any of the bricks. If so, add the
    brick to removeList, which will later call the destroy method of the brick (which
    activates the previously discussed fading-out effect). Also, in the event of a
    brick being hit, there will be a 20 percent chance that a randomized power-up
    will be spawned. Using an Action, an animated scaling effect will be added that
    will make the power-up appear to grow from a single pixel to its full size over
    the course of half a second.


    ```

    removeList.clear();


    for (Brick br : brickList)

    {

        if ( ball.overlaps(br, true) ) // bounces off bricks

        {

            removeList.add(br);

            if (Math.random() < 0.20)

            {

                Powerup pow = basePowerup.clone();

                pow.randomize();

                pow.moveToOrigin(br);


    pow.setScale(0,0);

                pow.addAction( Actions.scaleTo(1,1, 0.5f) );


    powerupList.add(pow);

                pow.setParentList(powerupList);

                mainStage.addActor(pow);

            }

        }

    }

    ```


    You also need to check whether any of the power-ups have collided with the paddle.
    If so, determine the name of the animation and carry out the associated effect.
    In this version of the game, the only power-up effects are to change the size
    of the paddle. Reasonable constraints will be set on the maximum and minimum size
    the paddle can attain, and the change in size is animated using an Action:


    ```

    for (Powerup pow : powerupList)

    {

        if ( pow.overlaps(paddle) )

        {

            String powName = pow.getAnimationName();

            if ( powName.equals("paddle-expand") && paddle.getWidth() < 256)

            {

                paddle.addAction( Actions.sizeBy(32,0, 0.5f) );

            }

            else if ( powName.equals("paddle-shrink") && paddle.getWidth() > 64)

            {

                paddle.addAction( Actions.sizeBy(-32,0, 0.5f) );

            }


    removeList.add(pow);

        }

    }

    ```


    Finally, after all the collision detection is complete, iterate over removeList,
    to destroy any objects that should be removed from the game:


    ```

    for (BaseActor b : removeList)

    {

        b.destroy();

    }

    ```


    Next Steps


    As usual, I recommend adding a Start menu screen, sound effects, and end-of-game
    messages to this program. Additional specific ideas for this game include the
    following:


    *   When the game loads, stop the ball from automatically moving (set the speed
    of the ball to zero) until the user clicks a mouse button to start the game; then
    launch the ball upward.

    *   Disable collision detection and response for the bottom edge of the screen;
    when the ball passes below the bottom edge, the game is over.

    *   Gain a set number of points for each brick that is destroyed, and display
    the score in the user interface. As a slight variation, bricks could be worth
    different amounts of points depending on either their color or height on the screen
    (bricks that are higher up are more difficult to hit and could be worth more points).

    *   For increased difficulty, gradually increase the speed of the ball as the
    game progresses.

    *   Add new power-ups that change properties of the ball such as its size or speed.

    *   Add a fireball power-up. When the power-up is collected, tint the ball orange.
    When it collides with a brick, a moderately sized explosion effect is spawned;
    if the effect overlaps any other bricks, destroy them as well.

    *   Add a thru-ball power-up. When this power-up is collected, tint the ball green.
    When checking for the collision of the ball with the bricks using the overlaps
    method, let the Boolean parameter be false, so that the velocity is not adjusted;
    the ball will be able to pass through groups of bricks.

    *   Add multiball capabilities, enabling multiple balls to be on the screen at
    a time. This requires numerous small changes throughout the program: most code
    involving the ball object (such as collision detection) will need to be iterated
    over a list of ball objects. Add a corresponding multiball power-up that spawns
    a new ball (typically from the position of the paddle) when it is collected.


    52-Card Pickup


    In this section, you’ll create the card game *52-Card* *Pickup*. In this game,
    the 52 cards from a standard deck of playing cards are randomly scattered around
    a playing area, and the goal is to pick up the cards and arrange them in piles
    according to matching suit (clubs, hearts, spades, diamonds) and ascending rank
    (Ace, 2, 3, 4, 5, 6, 7, 8, 9, 10, Jack, Queen, King). [Figure 6-11](#9781484215012_Ch06.xhtml#Fig11)
    shows this game in action.


    ![9781484215012_Fig06-11.jpg](OEBPS/Images/9781484215012_Fig06-11.jpg)


    [Figure 6-11](#9781484215012_Ch06.xhtml#_Fig11). The 52-Card Pickup game


    The main purpose of this example is to demonstrate how to implement two new mechanics:
    drag-and-drop interactions, and objects that provide visual hints. These techniques
    are useful in all manner of card games, as well as tile-matching games such as
    Bejeweled.'
