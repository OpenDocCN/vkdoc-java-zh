    语句中的每个值比较都对应于 switch 代码块中的 case 关键字出现，而最后的 else 语句对应于 default 关键字。在列出针对某个 case
    要执行的语句集之后，必须包含一个 break 语句（否则，无论变量是否等于所呈现的值，后续 case 对应的语句也将被执行）。

