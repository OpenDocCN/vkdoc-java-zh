  \ \"swim\", anim );`\n\n`Texture frame1 = new Texture(Gdx.files.internal(\"assets/turtle-1.png\"\
  ));`\n    `turtle.storeAnimation( \"rest\", frame1 );`\n\n`turtle.setOrigin( turtle.getWidth()/2,\
  \ turtle.getHeight()/2 );`\n    `turtle.setPosition( 20, 20 );`\n    `turtle.setRotation(\
  \ 90 );`\n    `turtle.setEllipseBoundary();`\n    `turtle.setMaxSpeed(100);`\n    `turtle.setDeceleration(200);`\n\
      `mainStage.addActor(turtle);`\n`}`\n\n最后，你需要设计并创建更新方法。海龟由方向键控制，但移动是基于海龟自身的视角。左右方向键让海龟向左或向右旋转，上方向键则让海龟朝当前面向的方向加速前进。接下来的几行代码会根据海龟的当前速度，在必要时将其动画切换为“休息”或“游泳”。之后，将海龟对象绑定到游戏世界区域，使其无法移出屏幕。接着，检查海龟是否与任何岩石对象重叠，如果重叠则调整海龟的位置。最后，检查海龟是否与任何海星对象重叠（海星不是固体，因此无需调整海龟位置）。当发生重叠时，你需要将海星从游戏中移除：既要从渲染它的舞台（Stage）中移除，也要从用于碰撞检测的\
  \ ArrayList 中移除。最后这一步比较棘手，因为你不能在遍历列表的同时从中移除对象；这就像有人在你读书时撕掉书页（在 Java 中，这被称为 `ConcurrentModificationException`\
  \ 错误）。因此，当你识别出要从游戏中移除的海星时，先将其添加到一个待删除列表中，然后遍历这个第二个列表，此时就可以安全地将海星从舞台和原始 ArrayList\
  \ 中移除了。更新方法的代码如下所示：\n\n```\npublic void update(float dt)\n{\n    // 处理输入\n    turtle.setAccelerationXY(0,0);\n\
  \nif (Gdx.input.isKeyPressed(Keys.LEFT))\n        turtle.rotateBy(90 * dt);\n    if\
  \ (Gdx.input.isKeyPressed(Keys.RIGHT))\n        turtle.rotateBy(-90 * dt);\n    if\
  \ (Gdx.input.isKeyPressed(Keys.UP))\n        turtle.accelerateForward(100);\n\n\
  // 设置正确的动画\n    if ( turtle.getSpeed() > 1 && turtle.getAnimationName().equals(\"\
  rest\") )\n        turtle.setActiveAnimation(\"swim\");\n    if ( turtle.getSpeed()\
  \ < 1 && turtle.getAnimationName().equals(\"swim\") )\n        turtle.setActiveAnimation(\"\
  rest\");\n\n// 将海龟限制在屏幕内\n    turtle.setX( MathUtils.clamp( turtle.getX(), 0,  mapWidth\
  \ - turtle.getWidth() ));\n    turtle.setY( MathUtils.clamp( turtle.getY(), 0,  mapHeight\
  \ - turtle.getHeight() ));\n\nfor (BaseActor r : rockList)\n    {\n        turtle.overlaps(r,\
  \ true);\n    }\n\nArrayList<BaseActor> removeList = new ArrayList<BaseActor>();\n\
      for (BaseActor s : starfishList)\n    {\n        if ( turtle.overlaps(s, false)\
  \ )\n            removeList.add(s);\n    }\n\nfor (BaseActor b : removeList)\n    {\n\
          b.remove();             // 从舞台中移除\n        starfishList.remove(b); // 从更新所用的列表中移除\n\
      }\n}\n```\n\n和往常一样，你需要一个继承自 `Game` 的类，如下所示：\n\n```\nimport com.badlogic.gdx.Game;\n\
  public class TurtleGame extends Game\n{\n    public void create()\n    {\n        TurtleLevel\
  \ tl = new TurtleLevel(this);\n        setScreen( tl );\n    }\n}\n```\n\n同样和往常一样，每个项目都需要一个驱动类。这次，你创建的驱动类包含一个额外功能：一个\
  \ `LwjglApplicationConfiguration` 对象。这个类包含一些可设置的字段，允许你更改窗口特定的设置，例如游戏窗口的宽度和高度，以及标题栏中显示的文本。该对象可以作为第二个参数传递给\
  \ `LwjglApplication` 构造函数。\n\n```\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
  import com.badlogic.gdx.backends.lwjgl.LwjglApplicationConfiguration;\npublic class\
  \ TurtleLauncher\n{\n    public static void main (String[] args)\n    {\n        LwjglApplicationConfiguration\
  \ config = new LwjglApplicationConfiguration();\n        // 更改配置设置\n        config.width\
  \ = 1000;\n        config.height = 800;\n        config.title = \"海星收集者\";\n\nTurtleGame\
  \ myProgram = new TurtleGame();\n        LwjglApplication launcher = new LwjglApplication(\
  \ myProgram, config );\n    }\n}\n```\n\n以上涵盖了《海星收集者》游戏的核心机制。\n\n**后续步骤**\n\n尽管机制已经比较高级，但这远非一个成品，类似于《气球破坏者》游戏章节结束时的状况。不过，借助你在之前示例中学到的知识，你已经可以自行添加更多功能，例如：\n\
  \n*   一个开始界面，包含操作说明和按键列表，或者有一个按钮图片，点击后加载 `TurtleLevel` 界面并开始游戏。\n*   用户界面中显示剩余待收集海星数量的标签。\n\
