  \ this );\n        return newbie;\n    }\n}\n```\n\n此类中需要的最后一个也是最复杂的对象是玩家，它需要 `Box2DActor`\
  \ 类提供之外的其他功能，这促使我们创建一个也继承 `Box2DActor` 类的 `Player` 类。平台游戏风格的角色有两种基本移动方式：左右移动和跳跃。虽然使用力来实现移动相对简单，但跳跃却出奇地复杂，因为玩家只能站在固体物体上时才能跳跃。`Player`\
  \ 类将包含一个名为 `isOnGround` 的方法，用于指示这种情况。为了实现这一点，你首先要向玩家物体添加一个夹具，将其设置为传感器并放置在主夹具下方。将使用接触事件来跟踪传感器重叠的固体物体数量，并存储在一个名为\
  \ `groundCount` 的变量中。只要此数字大于 0，就表示玩家底部接触到了固体物体，并且 `isOnGround` 将返回 `true`。`Player`\
  \ 类的代码如下：\n\n\n\n```\nimport com.badlogic.gdx.physics.box2d.World;\nimport com.badlogic.gdx.physics.box2d.Fixture;\n\
