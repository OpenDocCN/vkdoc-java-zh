  \n³选择让 y 值向上增加的设计，虽然符合数学惯例，但与大多数计算机科学坐标系惯例相反，后者将原点 (0,0) 置于窗口左上角，y 值向下增加。\n\n⁴对于放大字体，应谨慎使用此方法，因为它可能导致图像看起来像素化。可以通过在位图字体图像上使用线性纹理滤镜来减轻这种效果，但最佳实践是尽可能使用高分辨率图像作为字体。\n\
  \n⁵但是，可以通过使用 `Actor` 类的 `setZIndex` 方法，在将 `Actor` 添加到 `Stage` 后重新排列其渲染顺序。\n\n第三章\n\
  \n![image](img/frontdot.jpg)\n\n扩展框架\n\n本章首先回顾上一章中 *Cheese, Please!* 游戏的代码。你的主要重点将是通过将通用元素重构为可按需重用的新类，来精简上一章的代码。这也将使引入更高级的特性（例如处理用户输入的新方法）变得更加容易。然后，你将看到你的新类如何用作其他游戏项目的基础。最后，你将通过添加改进的碰撞检测与响应、管理多个动画以及实现基于物理的运动，来改进你对\
  \ `Actor` 类的自定义扩展。\n\n重温 *Cheese, Please!*\n\n查看上一章游戏（*Cheese, Please!*）代码的最终版本，你可以观察到实现\
  \ `Screen` 的类包含相似的数据（例如 `Stage` 对象）并执行相似的任务（例如调用舞台的 `act` 和 `draw` 方法）。在计算机编程中，你希望尽可能消除重复并创建可重用的代码，以便你的代码更易于理解和维护。你将在本节中解决这个问题。此外，你将为这些类中的每一个引入一些新功能：\n\
  \n*   处理离散输入事件的能力——仅在按下按键或点击鼠标按钮时发生一次的操作\n*   暂停游戏的能力，这需要布尔变量 `paused` 来确定游戏当前是否暂停，以及一些相关的辅助方法：`isPaused`、`setPaused`\
  \ 和 `togglePaused`\n*   调整窗口大小并使游戏世界实体相应缩放的能力\n\n为此，你将创建一个名为 `BaseScreen` 的新类，该类管理数据并处理你的类共有的新任务和旧任务。然后，你其他以游戏逻辑为中心的类将扩展\
  \ `BaseScreen` 类，这将大大简化你的代码。然而，在开始编写这个类之前，你需要详细了解两个与实现相关的问题：离散输入和抽象类设计。\n\n离散输入\n\
  \n之前，你用来处理输入的方法称为*轮询*：在游戏循环的*每次*迭代中检查输入硬件设备（例如键盘）的状态。这种方法特别适合*连续动作*——只要相应的触发器处于激活状态，这些动作就会在一段时间内持续发生。例如，只要玩家按下方向键，玩家角色就应该持续移动（除非遇到墙壁等固体障碍物）。\n\
  \n相比之下，像跳跃这样的动作被称为*离散动作*，因为它每次按键只发生一次。即使玩家继续按住跳跃键，玩家角色也*不会*再次跳跃，直到跳跃键被释放并再次按下（前提是角色再次落地！）。\n\
  \n使用轮询方法处理离散动作很棘手，因此 LibGDX 库提供了一种事件驱动的方法。这涉及编写在某些事件发生时（例如按键的初始按下或释放，或鼠标按钮的点击）自动调用的函数。\n\
  \n任何对象都可以被分配响应输入事件的责任，但为了正确执行此操作，它必须包含一组特定的方法：即 `InputProcessor` 接口指定的方法。总共有八个这样的方法：`keyDown`、`keyUp`\
  \ 和 `keyTyped` 用于处理键盘事件；`touchDown`、`touchUp` 和 `touchDragged` 用于处理鼠标和触摸屏事件；`mouseMoved`\
  \ 和 `scrolled` 用于处理鼠标事件。我们将在 `BaseScreen` 类的源代码清单中进一步讨论这些方法。\n\n本节需要解决的最后一个问题是：你的程序的哪个组件应该承担响应输入事件的责任？例如，`Stage`\
  \ 类实现了 `InputProcessor` 接口；这对于包含用户界面元素的 `Stage` 特别有用，因为它使类似按钮的对象在被点击时能够激活方法。同时，你计划让\
  \ `BaseScreen` 类也实现 `InputProcessor` 接口，以便它能够像前面描述的那样处理离散输入。应该由 `Stage` 类还是 `BaseScreen`\
  \ 类负责响应输入事件？在实践中，你希望两个对象都有机会这样做。这种安排在代码中的实现方式是通过 `InputMultiplexer` 类。`InputMultiplexer`\
  \ 对象本身是一个 `InputProcessor`，它包含一个其他 `InputProcessor` 的列表。你可以将 `Stage` 和 `BaseScreen`\
  \ 对象添加到一个 `InputMultiplexer` 中，当输入事件发生时，`InputMultiplexer` 会将信息转发给这些对象中的每一个，并让它们有机会做出相应的响应。\n\
  \n抽象类设计\n\n\n\n另一个需要处理的设计考量是，哪些类应该实现哪些方法。在你将要编写的 `BaseScreen` 类中，你将提供某些方法的代码，例如构造函数和\
  \ `render` 方法。对于其他方法，例如 `create`，则要求扩展 `BaseScreen` 的类必须提供代码。从概念上讲，`BaseScreen`\
  \ 的角色介于标准类（所有方法都已完全实现）和接口（仅声明方法）之间。在 Java 中，这种功能可以通过*抽象类*来实现。\n\n抽象类\n\n在编程中，我们常常会通过将重复的特性重构到基类中，然后用专门的子类扩展该类，来减少冗余代码。有时，我们知道所有扩展类都需要实现某个特定方法——但它们实现的方式各不相同，因此我们无法提前在基类中编写代码，但确实需要在基类中声明该方法。\n\
  \n例如，我们可能创建一个奇幻风格的角色扮演游戏。我们的基类 `Person` 将包含所有 `Person` 对象都应具有的一些标准字段和方法，比如一个名为 `name`\
  \ 的 `String` 类型字段，用于存储人物的名字，以及用于访问此信息的 get 和 set 方法。可能会有两个类，`Wizard` 和 `Warrior`，它们扩展了\
  \ `Person` 类。该游戏的用户界面包含一个 `Sword` 按钮，用于激活 `Person` 类的 `useSword` 方法，以及一个 `Spell`\
  \ 按钮，用于激活 `useSpell` 方法。\n\n尽管 `Person` 类会声明这些方法，但它们的实现在 `Wizard` 和 `Warrior` 类中会有很大不同。传统上，战士使用剑，而巫师不使用；巫师施放魔法咒语，而战士不施放。如果玩家点击了与角色无法执行的动作相对应的按钮，我们可能希望在屏幕上显示一条消息来解释这一点。\n\
  \n编程难点在于，我们希望要求 `Person` 类的扩展类必须为 `useSword` 和 `useSpell` 方法提供代码，就像接口所做的那样；然而，`Person`\
  \ *不能*是接口，因为它为其某些方法（例如获取和设置 name 字段）提供了代码。在接口中，方法只被声明，而不被编写。\n\n这种情况的解决方案是声明方法，就像我们在接口中那样，并添加额外的修饰符，表明该方法是抽象的，写法如下：\n\
  \n```java\npublic abstract void useSword();\npublic abstract void useSpell();\n\
  ```\n\n当一个或多个方法以这种方式声明时，这也会对类产生影响。由于并非所有代码都已提供，我们无法创建此类的实例（再次强调，类似于接口）。我们必须通过将类也声明为抽象类来表明这一点：\n\
  \n```java\npublic abstract class Person\n{\n    private String name;\n    public\
  \ void setName(String n)  { name = n; }\n    public String getName()  { return name;\
  \ }\n    public abstract void useSword();\n    public abstract void useSpell();\n\
  }\n```\n\n现在，扩展 `Person` 的类必须为每个抽象方法提供实现。例如：\n\n```java\npublic class Wizard extends\
  \ Person\n{\n    public void useSword()\n    {\n        System.out.print(\"你无法挥舞剑……\"\
  );\n    }\n\n    public void useSpell()\n    {\n        // 在此处插入对敌人造成伤害的代码\n   \
  \ }\n}\n\npublic class Warrior extends Person\n{\n    public void useSword()\n \
  \   {\n        // 在此处插入对敌人造成伤害的代码\n    }\n\n    public void useSpell()\n    {\n\
  \        System.out.print(\"你无法使用魔法……\");\n    }\n}\n```\n\n通过这种方式，抽象类结合了标准类和接口的优点。\n\
  \n你希望每个扩展 `BaseScreen` 的类都必须实现自己的 `create` 方法，因为 `create` 将被 `BaseScreen` 类的构造函数调用。因此，你将编写方法签名并将其声明为抽象：\n\
  \n```java\npublic abstract void create();\n```\n\n此外，使用抽象方法使你能够解决前一章中的一个设计问题。当我们讨论游戏程序生命周期的各个阶段时，你注意到\
  \ LibGDX 使用 `render` 方法来执行游戏循环任务。然而，渲染图形实际上只是游戏循环中执行的三个任务之一，另外两个是处理输入和更新游戏世界的状态。你可以使用抽象类来帮助分离更新和渲染功能。在\
  \ `BaseScreen` 类的 `render` 方法中，你将首先调用一个名为 `update` 的抽象方法，然后 `BaseScreen` 类将继续执行所有渲染代码。总的来说，这大大降低了编写扩展\
  \ `BaseScreen` 类的开发人员的复杂性；他们的主要精力集中在编写 `create` 和 `update` 方法上。\n\n重构项目\n\n本节介绍\
  \ `BaseScreen` 类。具体来说，你编写的代码将处理以下任务，这些任务对于所有扩展 `Screen` 的类都是通用的：\n\n*   提供对实例化当前类的\
  \ `Game` 对象的引用\n*   初始化 `mainStage` 和 `uiStage` 对象\n*   在 `render` 方法中，调用舞台的 `act`\
  \ 方法，清除屏幕，然后调用舞台的 `draw` 方法\n*   为程序不需要的所有 `Screen` 接口方法和 `InputProcessor` 接口方法提供空方法\n\
  *   提供暂停游戏和调整窗口大小的方法\n\n此时，在 BlueJ 中创建一个新项目，并复制“Cheese, Please!”游戏项目先前版本中的所有类。然后，按照下文所述创建一个名为\
  \ `BaseScreen` 的新类。\n\n首先，展示 `BaseScreen` 类的核心部分，其中包含所需的导入语句和变量声明。该类的各种方法将在后续代码清单中解释。\n\
  \n```java\nimport com.badlogic.gdx.Screen;\nimport com.badlogic.gdx.InputProcessor;\n\
  import com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.GL20;\n\
  import com.badlogic.gdx.scenes.scene2d.Stage;\nimport com.badlogic.gdx.utils.viewport.FitViewport;\n\
  import com.badlogic.gdx.InputMultiplexer;\n\npublic abstract class BaseScreen implements\
  \ Screen, InputProcessor\n{\n    protected Game game;\n\n    protected Stage mainStage;\n\
  \    protected Stage uiStage;\n\n    public final int viewWidth  = 640;\n    public\
  \ final int viewHeight = 480;\n\n    private boolean paused;\n}\n```\n\n接下来是构造函数，它存储对\
  \ `Game` 对象的引用，初始化 `Stage` 对象，将 `paused` 设置为 `false`，设置 `InputMultiplexer` 以接收所有输入数据并将其传递给此类和舞台，并调用\
  \ `create` 方法。请注意，每个 `Stage` 都使用 `FitViewport` 对象进行初始化；此对象会缩放每个 `Stage` 及其内容以适应当前窗口大小，如果窗口的宽高比与\
  \ `Stage` 不匹配，则多余区域将填充为纯黑色。\n\n```java\npublic BaseScreen(Game g)\n{\n    game =\
  \ g;\n\n    mainStage = new Stage( new FitViewport(viewWidth, viewHeight) );\n \
  \   uiStage   = new Stage( new FitViewport(viewWidth, viewHeight) );\n\n    paused\
  \ = false;\n\n    InputMultiplexer im = new InputMultiplexer(this, uiStage, mainStage);\n\
  \    Gdx.input.setInputProcessor( im );\n\n    create();\n}\n```\n\n在此之后，你包含了抽象方法\
  \ `create` 和 `update`，任何扩展 `BaseScreen` 的类都必须实现这些方法：\n\n```java\npublic abstract\
  \ void create();\n\npublic abstract void update(float dt);\n```\n\n接下来是 `render`\
  \ 方法，它运行游戏循环。你包含了更新舞台、调用 `update` 方法以及绘制图形的代码：\n\n```java\n// 游戏循环代码；先更新，后渲染。\n\
  public void render(float dt)\n{\n    uiStage.act(dt);\n\n    // 仅暂停游戏事件，不暂停 UI 事件\n\
  \    if ( !isPaused() )\n    {\n        mainStage.act(dt);\n        update(dt);\n\
