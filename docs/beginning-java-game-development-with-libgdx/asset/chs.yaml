  \ 弧度大致相当于 360 度，代表绕原点旋转一整圈，我们在计算椭圆周围所有点的值时需要用到这个范围。\n\n第四章\n\n![image](img/frontdot.jpg)\n\
  \n为游戏增添润色\n\n本章将基于上一章介绍的 Starfish Collector 游戏进行扩展。核心玩法保持不变；新增内容包括背景音乐和音效，以及一个包含自定义位图字体、基于图像的按钮和其他\
  \ UI 控件的用户界面。\n\n音频\n\n得益于 LibGDX 库的内置功能，将音频集成到游戏中是一个直接的过程。支持的文件类型包括 MP3、OGG 和 WAV。LibGDX\
  \ 为此提供了两个接口：Sound 和 Music，每个接口都可以通过 Gdx 类的 audio 对象创建。（实现这些接口的类取决于所使用的平台；幸运的是，这些细节已由\
  \ LibGDX 为你处理。）\n\nSound 接口用于音效：当离散的游戏事件发生时播放的小型音频文件，例如收集物品、角色跳跃或两个物体碰撞时。音效通常很短（几秒或更短），对应的文件不应超过\
  \ 1MB。（对于较大的音频片段，你应该考虑使用接下来介绍的 Music 接口。）例如，要将音效加载到内存中，你可以使用以下代码：\n\n```\nSound\
  \ beep = Gdx.audio.newSound( Gdx.files.internal(\"beep.wav\") );\n```\n\n将声音加载到内存后，可以通过以下方式播放：\n\
  \n```\nbeep.play(volume);\n```\n\n变量 volume 是一个介于 0 和 1 之间的浮点数，它决定了声音播放的音量（0 为静音，1\
  \ 为最大音量）。单个音效可以快速连续播放多次；在这种情况下，声音会相互重叠。\n\nMusic 接口用于较长的音频序列，例如背景音乐或环境音效。要准备流式播放的音乐，你可以使用以下代码：\n\
  \n```\nMusic song = Gdx.audio.newSound( Gdx.files.internal(\"song.ogg\") );\n```\n\
  \n音量可以使用 setVolume 方法设置，该方法接受一个浮点值，与 Sound 对象类似。如果你希望音频循环播放，请使用 setLooping(true)。要控制播放，有\
  \ play、pause 和 stop 方法。要获取有关当前播放状态的信息，你可以使用 isPlaying、isLooping 和 getPosition 方法，其中\
  \ getPosition 返回以秒为单位的当前位置。\n\n当游戏结束时，Sound 和 Music 实例应该被 *disposed*（处理掉）——从内存中移除——这可以通过它们提供的\
  \ dispose 方法来完成。\n\n接下来，你将看到如何为上一章创建的 Starfish Collector 游戏添加音乐和音效。以下所有代码都应添加到 TurtleLevel\
  \ 类中。首先，添加以下导入语句：\n\n```\nimport com.badlogic.gdx.audio.Sound;\nimport com.badlogic.gdx.audio.Music;\n\
  ```\n\n然后声明以下变量：\n\n```\nprivate float audioVolume;\nprivate Sound waterDrop;\n\
  private Music instrumental;\nprivate Music oceanSurf;\n```\n\n在 create 方法的末尾，你使用以下代码初始化这些变量并开始播放音乐。代码中引用的声音文件可以从本章源代码的\
  \ assets 目录中下载，并应添加到本地项目的 assets 文件夹中：\n\n```\nwaterDrop    = Gdx.audio.newSound(Gdx.files.internal(\"\
  assets/Water_Drop.ogg\"));\ninstrumental = Gdx.audio.newMusic(Gdx.files.internal(\"\
  assets/Master_of_the_Feast.ogg\"));\noceanSurf    = Gdx.audio.newMusic(Gdx.files.internal(\"\
  assets/Ocean_Waves.ogg\"));\n\naudioVolume = 0.80f;\ninstrumental.setLooping(true);\n\
  instrumental.setVolume(audioVolume);\ninstrumental.play();\noceanSurf.setLooping(true);\n\
  oceanSurf.setVolume(audioVolume);\noceanSurf.play();\n```\n\n在 update 方法中，在碰撞检测期间，每当海星消失时，你都会播放水滴音效。接下来给出这段代码；只需要添加以粗体显示的那一行：\n\
  \n```\nfor (BaseActor b : removeList)\n{\n    b.remove();\n    starfishList.remove(b);\n\
  \    waterDrop.play(audioVolume);\n}\n```\n\n最后，你添加一个 dispose 方法，该方法依次调用每个音频对象的\
  \ dispose 方法，以便在关闭屏幕时释放内存：\n\n```\npublic void dispose()\n{\n    waterDrop.dispose();\n\
  \    instrumental.dispose();\n    oceanSurf.dispose();\n}\n```\n\n当用户退出程序时，应激活此方法；在本章后面，你将看到这发生在何处。\n\
  \n你可能已经注意到，你正在使用变量 audioVolume 来存储播放声音和音乐的音量，但在提供的代码中没有任何地方有更改此值的机制。你将在下一节中实现音量控制，该节涵盖高级用户界面控件。\n\
  \n高级用户界面设计\n\n我们的下一个目标是创建一个精美的用户界面。\n\n首先，你将创建一个标题屏幕，其中包含游戏名称、开始或退出游戏的按钮，以及一个致谢\
  \ LibGDX 库的图形。如图 4-1 所示。\n\n![9781484215012_Fig04-01.jpg](img/9781484215012_Fig04-01.jpg)\n\
  \n图 4-1. 标题屏幕布局\n\n接下来，在主游戏屏幕（进行游戏的地方）中，你想要添加一些文本，说明还有多少海星需要收集，以及一个暂停按钮。这些元素应出现在窗口的上角，以免遮挡玩家对游戏世界的视野，否则可能会干扰游戏进行，导致玩家体验下降。如图\
  \ 4-2 所示。\n\n![9781484215012_Fig04-02.jpg](img/9781484215012_Fig04-02.jpg)\n\n图\
  \ 4-2. 主游戏布局\n\n最后，当用户单击暂停按钮时，除了暂停游戏外，还应出现一个暂停菜单。该菜单通过在游戏世界视图上覆盖一个半透明的黑色矩形来使其变暗；在此之上是显示游戏已暂停的文本、恢复或退出游戏的按钮，以及一个控制音量的滑块，如图\
  \ 4-3 所示。\n\n![9781484215012_Fig04-03.jpg](img/9781484215012_Fig04-03.jpg)\n\n图\
  \ 4-3. 暂停游戏布局\n\n在接下来的小节中，你将使用 Table 类设计和实现布局，使用 Skin 类管理图像和样式资源，并了解提供常用用户界面元素的类，例如\
  \ Label、Image、Button（及其子类 TextButton）和 Slider。\n\n排列 UI 元素\n\n\n\n在第 2 章中，你创建了一个名为“奶酪，拜托！”的游戏，其用户界面非常简单：菜单屏幕包含标题图片和一些文字说明，主游戏屏幕则显示经过时间的文字。要精确计算这些元素应放置的屏幕坐标，同时考虑元素自身的大小，计算起来可能非常繁琐。幸运的是，LibGDX\
  \ 库提供了一个名为 `Table` 的类，它能自动为你放置这些元素，从而极大地简化了这一过程。\n\n`Table` 是 `Actor` 的子类，因此它可以被添加到\
  \ `Stage` 对象中；此外，`Table` 也是 `Group` 的子类，因此对象也可以被添加到 `Table` 中。具体来说，一个 `Table` 由\
  \ `Cell` 对象组成，这些 `Cell` 按行和列排列，每个 `Cell` 包含一个 `Actor`。`add` 方法会创建一个新的 `Cell`（如果指定了\
  \ `Actor`，则包含该 `Actor`），并将其添加到当前行的末尾。`add` 方法返回所创建的 `Cell` 对象，因此可以通过在结果上调用以下任意方法的组合来立即设置其格式：\n\
  \n*   `left`、`center` 和 `right` 用于设置 `Cell` 内容的水平对齐方式\n*   `bottom` 和 `top` 用于设置垂直对齐方式\n\
  *   `padLeft`、`padRight`、`padBottom`、`padTop` 用于为当前 `Cell` 的内容添加指定像素的内边距，或者使用 `pad`\
  \ 方法为所有方向添加内边距\n*   `width` 和 `height` 用于设置 `Cell` 的大小（`Cell` 的大小会影响其内容的大小）\n* \
  \  `expandX` 和 `expandY` 用于强制 `Cell` 增大尺寸以填充该方向上表格的剩余空间\n*   `colspan` 用于声明某个 `Cell`\
  \ 将跨越多个列\n\n默认情况下，所有表格都只包含一行。要在表格中创建位于当前行下方的新行，可以调用 `row` 方法。\n\n例如，让我们创建一个名为 `t`\
  \ 的 `Table`，其内容布局样式与之前图 4-1 所示的标题屏幕相同。为简化本节及相应图示的说明，我们将 `Actor` 对象命名为 `a`、`b`、`c`\
  \ 和 `d`；`a` 代表标题图片，`b` 和 `c` 代表“开始”和“退出”按钮，`d` 代表 LibGDX 图片。图 4-4 展示了该布局。\n\n![9781484215012_Fig04-04.jpg](img/9781484215012_Fig04-04.jpg)\n\
  \n图 4-4. 开始屏幕的抽象表格布局\n\n图示表明，你需要一个包含三行两列的 `Table`。对于不需要两个独立单元格的每一行，其单个单元格应设置为跨越两列。最后一个单元格的配置最为棘手：它不仅跨越两列，而且其内容右对齐，并且与上一行之间应有\
  \ 50 像素的内边距。以下代码说明了如何实现此布局；不过，你现在无需向项目添加任何代码。稍后，你将基于此模板添加代码（将 `a`、`b`、`c` 和 `d`\
  \ 替换为对应对象的变量）。\n\n```\nTable t = new Table();\nt.add(a).colspan(2);\nt.row();\n\
  t.add(b);\nt.add(c);\nt.row();\nt.add(d).colspan(2).right().padTop(50);\n```\n\n\
  作为 `Table` 类的另一个示例，你将学习如何创建主游戏屏幕的布局（之前展示于图 4-2）。此布局的抽象版本见图 4-5。\n\n![9781484215012_Fig04-05.jpg](img/9781484215012_Fig04-05.jpg)\n\
  \n图 4-5. 主游戏屏幕的抽象表格布局\n\n在图 4-5 中，整个表格的所有边都有 10 像素的内边距（由空白边框区域表示）。单元格 `a` 包含“海星向左”标签，单元格\
  \ `c` 包含“暂停”按钮。单元格 `b` 不包含 Actor；它将在水平（x）方向上扩展以填充第一行的所有剩余空间，从而使单元格 `a` 和 `c` 分别位于屏幕的左侧和右侧。类似地，单元格\
  \ `d` 也用于定位目的，不包含 Actor；它跨越第二行的所有三列，并在垂直（y）方向上扩展以填充所有剩余空间，从而使第一行显示在屏幕顶部。生成图 4-5\
  \ 布局的代码如下所示（与之前一样，它将作为稍后添加到项目中的模板）：\n\n```\nTable t = new Table();\nt.pad(10);\n\
  t.add(a);\nt.add().expandX();\nt.add(c);\nt.row();\nt.add().colspan(3).expandY();\n\
  ```\n\n创建将添加到这些 `Table` 对象中的内容——即 `Label`、`Image` 和 `Button` 类的实例——将在本章后面讨论。即使在讨论此主题之前，请注意，由于多个屏幕将使用\
  \ `Table` 对象，你将编写相应代码并将其添加到 `BaseScreen` 类中。\n\n首先，你需要相应的导入语句：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.ui.Table;\n\
  ```\n\n接下来，在 `Stage` 对象的声明之后，声明一个名为 `uiTable` 的 `Table` 对象：\n\n```\nprotected Table\
  \ uiTable;\n```\n\n最后，在 `BaseScreen` 类的构造函数中初始化此对象，并将其附加到 `uiStage`：\n\n```\nuiTable\
  \ = new Table();\nuiTable.setFillParent(true);\nuiStage.addActor(uiTable);\n```\n\
  \n接下来，在创建用户界面对象之前，你还需要做一些准备工作。你将了解如何高效地存储和重用 UI 组件。\n\n管理资源\n\n在设计用户界面时，通常希望保持主题一致。你希望在游戏的多个屏幕中使用相同的字体、样式等集合。出于效率考虑，你不希望重复创建这些游戏对象。相反，你将在\
  \ `Game` 类初始化时创建通用的 UI 元素，并将它们存储在一种数据结构中，以便稍后由 `Screen` 对象访问。方便的是，LibGDX 库恰好为此目的提供了一个类：`Skin`\
  \ 类。\n\n`Skin` 对象存储对象的方式类似于 `HashMap`（在第 3 章中讨论过），使用 `String` 对象作为键，任何对象类型作为值。可以使用\
  \ `add` 方法存储对象，使用 `get` 方法检索对象。例如，以下代码创建一个新的 `Skin`，然后创建一个新的 `Color` 并使用名称 `LightGreen`\
  \ 存储它，最后检索它并将其赋值给一个新的 `Color` 变量。\n\n```\nSkin uiSkin = new Skin();\nColor greenish\
  \ = new Color(0.5f, 1.0f, 0.5f, 1.0f);\nuiSkin.add( \"LightGreen\", greenish );\n\
  Color textColor = uiSkin.get( \"LightGreen\", Color.class );\n```\n\n请注意，`get` 方法中传递的第二个参数是类字段，用于确定要检索的对象类型。如果不包含此参数，则返回类型为\
  \ `Object`，并且需要手动将返回值强制转换为适当的类类型，如下所示：\n\n```\nColor textColor = (Color)( uiSkin.get(\"\
  LightGreen\") );\n```\n\n经常存储的对象类型拥有自己的 `get` 风格方法。例如，你也可以使用代码 `getColor(\"LightGreen\"\
  )` 来检索之前存储的颜色。使用这些方法可以使代码更易于阅读，因为返回的值无需强制转换为所需类型。有关 `Skin` 类提供的所有 `get` 相关方法的完整列表，请查阅\
  \ LibGDX 文档。\n\n\n\n由于在未来的大多数游戏中你可能会使用 `Skin` 对象，因此你需要在框架代码中添加一个新类，用于扩展 LibGDX 提供的核心类。正如你的\
  \ `BaseScreen` 类扩展了 `Screen` 类一样，你将创建一个扩展 `Game` 类的 `BaseGame` 类。`BaseGame` 将包含一个由构造函数初始化的\
  \ `Skin` 对象。你将重写 `Game` 类提供的空 `dispose` 方法，并编写一个调用皮肤 `dispose` 方法的方法，这样当不再需要 `BaseGame`\
  \ 对象时，内存就会被释放（类似于本章前面讨论的音频对象的释放）。此外，`Game` 类的扩展必须包含一个 `create` 方法，但由于 `BaseGame`\
  \ 永远不打算被直接实例化（类似于 `BaseScreen`），你将把 `create` 方法声明为抽象方法，这反过来要求 `BaseGame` 类本身也是抽象的。`BaseGame`\
  \ 类的代码如下：\n\n```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.scenes.scene2d.ui.Skin;\n\
  \npublic abstract class BaseGame extends Game\n{\n    // 用于存储多个屏幕共用的资源\n    Skin\
  \ skin;\n\npublic BaseGame()\n    {\n        skin = new Skin();\n    }\n\npublic\
  \ abstract void create();\n\npublic void dispose()\n    {\n        skin.dispose();\n\
      }\n}\n```\n\n完成此添加后，你必须修改 `BaseScreen` 类，将所有出现的 `Game` 类型替换为 `BaseGame` 类型：`game`\
  \ 变量和构造函数参数都应为 `BaseGame` 类型。同样，在 `TurtleLevel` 类中，构造函数参数应为 `BaseGame` 对象。此外，你的\
  \ `TurtleGame` 类现在应扩展 `BaseGame`，而不是 `Game`。在 `TurtleGame` 的 `create` 方法中，最终你将包含初始化多个屏幕共用资源的代码，使用\
  \ `Skin` 对象存储这些资源，并且只有在这些任务完成后，才应初始化并设置游戏中要显示的第一个屏幕。\n\n使用自定义位图字体\n\n基于位图的字体在第 2\
  \ 章中简要提及过；本节将更详细地讨论它们。\n\n要创建 `BitmapFont`，你需要两样东西：一个包含应用程序中可能想要表示的所有字符的图像（图 4-6\
  \ 包含一个示例），以及一个列出每个字符对应区域（位置和大小）的相关数据文件。例如，图 4-6 中对应 A 的区域位于 x=319, y=134，宽度为 45，高度为\
  \ 41。当使用位图字体显示文本时，会提取文本中每个字符对应的图像区域，并将这些图像区域并排对齐，以产生屏幕上看到的结果。\n\n![9781484215012_Fig04-06.jpg](img/9781484215012_Fig04-06.jpg)\n\
  \n图 4-6. 用于创建位图字体的图像文件（512 x 256 像素）\n\nLibGDX 使用由 Andreas Jönsson 开发的 BMFont 格式来存储这些数据。¹\
  \ LibGDX 提供了一个名为 Hiero 的应用程序，可用于使用计算机上安装的字体生成位图字体数据。Hiero 的第一个版本由 Kevin Glass 创建，用于他的\
  \ Java 游戏开发库 Slick2D。此后，Hiero 由 LibGDX 库的主要贡献者之一 Nathan Sweet 移植到了 LibGDX。Hiero\
  \ 被打包成一个可执行的 JAR 文件；当前下载链接发布在 LibGDX 维基页面上。²\n\n对于本项目，我创建了一个自定义字体数据文件和位图文件（分别为 cooper.fnt\
  \ 和 cooper.png），你可以从本章源代码目录的 assets 文件夹中下载，并复制到你自己的项目中。如果你更愿意使用 Hiero 创建自己的字体，我将在下一段简要讨论该程序的操作；否则，你可以跳到后面一段。\n\
  \n启动 Hiero 时，会显示各种选项。图 4-7 包含了该程序运行时的截图。在左上角区域，你可以选择本地安装的字体；在中央区域，你可以输入想要生成图像的字符；在右上角区域，你可以选择应用于图像的各种效果，包括纯色、渐变着色、轮廓和投影。可以通过点击效果的值并输入或选择新值来更改效果的参数。完成后，从“文件”菜单中选择“保存\
  \ BMFont 文件”，你将获得一个 PNG 文件和一个 FNT 文件，可供 LibGDX 的 `BitmapFont` 类使用。\n\n![9781484215012_Fig04-07.jpg](img/9781484215012_Fig04-07.jpg)\n\
  \n图 4-7. 用于生成位图字体数据的 Hiero 应用程序\n\n要在 LibGDX 中使用自定义生成的位图字体，你需要使用生成的 FNT 文件的 `FileHandle`\
  \ 来初始化 `BitmapFont` 对象。（相关 PNG 文件的名称存储在 FNT 文件中，因此无需在代码中直接指定。）例如：\n\n```\nBitmapFont\
  \ myFont = new BitmapFont( Gdx.files.internal(\"myCustomFont.fnt\") );\n```\n\n\
  如果需要，可以访问 `BitmapFont` 对象中包含的纹理数据。例如，你可能希望这样做，以便在缩放图像时设置滤镜以获得更平滑的外观。为此，你可以在创建 `myFont`\
  \ 后包含以下代码：\n\n```\nmyFont.getRegion().getTexture().setFilter(TextureFilter.Linear,\
  \ TextureFilter.Linear);\n```\n\n创建 `BitmapFont` 后，你可以将其用作 `LabelStyle` 的一部分，应用于游戏中的\
  \ `Label` 对象。借助 `BaseGame` 类提供的新结构，你将在 `BaseGame` 扩展中创建样式对象，并在 `BaseScreen` 扩展中使用这些对象。\n\
  \n首先，这是完全改造后的 `TurtleGame` 类的代码，它现在扩展了 `BaseGame`，并创建和存储了共享资源：\n\n```\nimport com.badlogic.gdx.Gdx;\n\
  import com.badlogic.gdx.graphics.Texture.TextureFilter;\nimport com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;\n\
  import com.badlogic.gdx.graphics.Color;\nimport com.badlogic.gdx.graphics.g2d.BitmapFont;\n\
  \npublic class TurtleGame extends BaseGame\n{\n    public void create()\n    {\n\
          // 初始化多个屏幕共用的资源并存储到皮肤数据库中\n        BitmapFont uiFont = new BitmapFont(Gdx.files.internal(\"\
  assets/cooper.fnt\"));\n        uiFont.getRegion().getTexture().setFilter(TextureFilter.Linear,\
  \ TextureFilter.Linear);\n        skin.add(\"uiFont\", uiFont);\n\nLabelStyle uiLabelStyle\
  \ = new LabelStyle(uiFont, Color.BLUE);\n        skin.add(\"uiLabelStyle\", uiLabelStyle);\n\
  \n// 初始化并启动主游戏\n        TurtleLevel tl = new TurtleLevel(this);\n        setScreen(\
  \ tl );\n    }\n}\n```\n\n在 `TurtleLevel` 类中，你现在可以轻松创建显示剩余海星数量的标签。首先，你需要包含相应的导入语句：\n\
  \n```\nimport com.badlogic.gdx.scenes.scene2d.ui.Label;\n```\n\n接下来，声明名为 `starfishLeftLabel`\
  \ 的标签。由于它将在 `create` 和 `update` 方法中使用，你需要在类中全局声明它：\n\n```\nLabel starfishLeftLabel;\n\
  ```\n\n\n\n接下来，你需要在 create 方法中初始化这个 Label。乍一看，Skin 类竟然不包含任何用于获取样式相关对象的 get 方法，这可能会让人感到惊讶。但这并非开发疏忽；实际上，Label\
  \ 的构造方法有一个重载版本，允许你传入 Skin 对象本身，以及要使用的样式对象的名称。构造方法本身会自动检索并按需转换相应的数据。因此，你可以将以下代码放入\
  \ create 方法中，用你在 TurtleGame 类中创建的 LabelStyle 来初始化 Label：\n\n```\nstarfishLeftLabel\
  \ = new Label(\"Starfish Left: --\", game.skin, \"uiLabelStyle\");\n```\n\n最后，在\
  \ update 方法的末尾，你可以使用下面这行代码更新此 Label 显示的文本，使其显示剩余待收集海星的正确数量：\n\n```\nstarfishLeftLabel.setText(\
  \ \"Starfish Left: \" + starfishList.size() );\n```\n\n至此，TurtleLevel 类可以编译了，但屏幕上不会看到任何变化，因为该标签尚未添加到舞台中；你将在后续章节中，在探索完用户界面的其余组件后，再进行此操作。TurtleLevel\
  \ 类所需的下一个用户界面控件由 Button 类提供。\n\n创建按钮\n\n按钮是用于获取用户输入的最基本的用户界面控件之一。有多种方法可以自定义按钮的外观和行为，Button\
  \ 类也有多种扩展（例如 TextButton 和 CheckBox），本章将探讨其中一部分。\n\n首先，你将初始化一个基本的 Button 对象及其对应的\
  \ ButtonStyle。ButtonStyle 对象可以存储一个或多个图像，根据按钮的当前状态，会显示其中一张图像。存储在 up 字段中的图像作为默认图像。UI\
  \ 元素的图像数据必须使用实现了 Drawable 接口的类来存储，该接口包含调整图像大小并绘制以适配给定矩形区域的方法。（TextureRegionDrawable\
  \ 是众多此类类中的一个例子。）初始化此类对象的最简单方法是使用 Skin 类，它不仅是管理资源的绝佳方式，还包含许多用于转换图像数据的方法。例如，你可以将 Texture\
  \ 以指定名称存储，然后使用相同的名称和 getDrawable 方法检索该数据，这将自动创建一个 Drawable 对象。\n\n为 Button 对象添加交互性的过程，你在\
  \ 第 3 章 的 Balloon Buster 游戏中已经见过。在那个游戏中，气球对象派生自 Actor 类，因此能够监听输入事件（例如被点击/触摸）。在此事件中执行的代码包含在一个名为\
  \ touchDown 的方法中，该方法属于一个派生自 InputListener 类的匿名内部类。由于 Button 类也是 Actor 类的扩展，你可以（并且将会）在此处使用相同的方法。\n\
  \n首先，你需要在类中添加以下 import 语句：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.ui.Button;\n\
  import com.badlogic.gdx.scenes.scene2d.ui.Button.ButtonStyle;\nimport com.badlogic.gdx.scenes.scene2d.InputEvent;\n\
  import com.badlogic.gdx.scenes.scene2d.InputListener;\n```\n\n以下代码创建了一个按钮，用于暂停和恢复\
  \ Starfish Collector 游戏（但不包括音乐）。由于你不需要在 update 方法中稍后引用此对象，因此可以在 TurtleLevel 类的 create\
  \ 方法中声明并初始化它。首先，你将一个 Texture 加载到 game 存储的 skin 中，并将其转换为 Drawable，以便在 ButtonStyle\
  \ 对象中使用。（像往常一样，你使用的图像可以从源代码资源文件夹中下载。）然后，你初始化 Button 并添加一个 InputListener，该监听器将激活\
  \ togglePause 方法（该方法由 BaseScreen 类定义）。\n\n```\nTexture pauseTexture = new Texture(Gdx.files.internal(\"\
  assets/pause.png\"));\ngame.skin.add(\"pauseImage\", pauseTexture );\n\nButtonStyle\
  \ pauseStyle = new ButtonStyle();\npauseStyle.up = game.skin.getDrawable(\"pauseImage\"\
  );\n\nButton pauseButton = new Button( pauseStyle );\n\npauseButton.addListener(\n\
  \    new InputListener()\n    {\n        public boolean touchDown (InputEvent event,\
  \ float x, float y, int pointer, int button)\n        {\n            togglePaused();\n\
  \            return true;\n        }\n    });\n```\n\n现在你已经创建了 starfishLeftLabel\
  \ 和 pauseButton 对象，并且 uiTable 由 BaseScreen 类提供，你已经准备好并且能够实现本章前面描述的 TurtleLevel 类的用户界面布局。在\
  \ TurtleLevel 类的 create 方法末尾，只需添加以下代码：\n\n```\nuiTable.pad(10);\nuiTable.add(starfishLeftLabel);\n\
  uiTable.add().expandX();\nuiTable.add(pauseButton);\nuiTable.row();\nuiTable.add().colspan(3).expandY();\n\
  ```\n\n最后，还有一个微妙但至关重要的细节需要处理。在 create 方法中，你之前将一个名为 overlay 的对象添加到了 uiStage。此对象包含一个半透明的水面图像，目的是让所有在其下方渲染的游戏实体看起来像是在水下。由于此对象是在\
  \ uiTable 添加 *之后* 才添加到 uiStage 的，它目前覆盖了按钮对象，从而阻止了按钮注册用户输入（例如 touchDown 事件）。为了解决这个问题，你必须重新排列\
  \ uiStage 上的元素，使 overlay 出现在按钮下方；从视觉上讲，你需要将其发送到图层的背面。这可以通过在 create 方法中，*在* overlay\
  \ 被添加到 uiStage *之后*，添加以下代码行来实现：\n\n```\noverlay.toBack();\n```\n\n设置开始屏幕\n\n接下来，你将设置开始屏幕，该屏幕在用户首次启动程序时出现（如前文\
  \ 图 4-1 所示）。为此，你将创建一个名为 TurtleMenu 的新类。此类完全不需要使用 mainStage 对象——只需使用 uiTable 来排列对象。在这个类中，你将使用两个新类：Image\
  \ 和 TextButton。即使在引入这些类之前，你也可以为 TurtleMenu 类编写骨架代码，如下所示：\n\n```\nimport com.badlogic.gdx.Gdx;\n\
  import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.Texture.TextureFilter;\n\
  import com.badlogic.gdx.scenes.scene2d.ui.Image;\nimport com.badlogic.gdx.scenes.scene2d.ui.TextButton;\n\
  import com.badlogic.gdx.scenes.scene2d.InputEvent;\nimport com.badlogic.gdx.scenes.scene2d.InputListener;\n\
  \npublic class TurtleMenu extends BaseScreen\n{\n    public TurtleMenu(BaseGame\
  \ g)\n    {  super(g);  }\n\npublic void create()\n    {    }\n\npublic void update(float\
  \ dt)\n    {    }\n}\n```\n\n\n\n此屏幕上要显示的每张图片最初都会作为纹理（Texture）加载。为确保每张图片都能平滑缩放，你需要始终指定使用线性过滤。你可以为表格背景使用重复图片，但前提是先将它转换为可绘制对象（Drawable）（通过皮肤对象完成）。你希望包含在\
  \ uiTable 中的所有其他纹理对象都将通过图像（Image）对象来显示，这些对象正是为此目的而存在的。请记住，所有用户界面对象都使用可绘制接口来存储图像，以便它们可以根据需要调整大小。纹理类*不*实现可绘制接口，但方便的是，图像构造函数接受纹理作为输入，并能自动将其转换为可绘制对象。像往常一样，此处引用的图片文件可以从源代码资源文件夹中下载：\n\
  \n```\nTexture waterTex = new Texture(Gdx.files.internal(\"assets/water.jpg\"));\n\
  waterTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\ngame.skin.add(\
  \ \"waterTex\", waterTex );\nuiTable.background( game.skin.getDrawable(\"waterTex\"\
  ) );\n\nTexture titleTex = new Texture(Gdx.files.internal(\"assets/starfish-collector.png\"\
  ));\ntitleTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\nImage titleImage\
  \ = new Image( titleTex );\n\nTexture libgdxTex = new Texture(Gdx.files.internal(\"\
  assets/created-libgdx.png\"));\nlibgdxTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
  Image libgdxImage = new Image( libgdxTex );\n```\n\n接下来，你将引入按钮（Button）类的一个扩展，称为文本按钮（TextButton），它是一个顶部带有标签（Label）以显示相关文本的按钮。相关的样式对象\
  \ TextButtonStyle 需要为按钮图形提供一个可绘制对象，并为绘制标签提供位图字体（BitmapFont）和颜色（Color）。\n\n创建文本按钮时可能出现的一个潜在问题是，当按钮的文本大于提供的图片时，文本会溢出按钮的边界。为了缓解这个问题，你可以使用九宫格（NinePatch）类，它允许你以特定方式缩放图片。一个九宫格对象可以使用一个纹理后跟四个整数来初始化，如下所示：\n\
  \n```\nNinePatch np = new NinePatch( texture, left, right, top, bottom );\n```\n\
  \n这些整数表示从图片相应命名边缘开始测量的像素距离。它们用于将纹理划分为九个区域，如图 4-8 所示。\n\n![9781484215012_Fig04-08.jpg](img/9781484215012_Fig04-08.jpg)\n\
  \n图 4-8. 将纹理划分为九个区域\n\n当转换为可绘制对象时，图片的角落（图 4-8 中标记为 a 的区域）永远不会被缩放；b 区域可以水平缩放，c 区域可以垂直缩放，而中心区域\
  \ d 可以在两个方向上缩放。这对于类似按钮的图片特别有用，这样图片的边缘就不会出现变形。图 4-9 展示了一张使用标准方法缩放以及使用九宫格方法缩放的小图片。特别注意，使用标准缩放时，放大后的图片边框看起来更粗，而九宫格缩放则更接近地保留了原始边框的外观，因为它只沿着每个边缘的方向进行缩放。\n\
  \n![9781484215012_Fig04-09.jpg](img/9781484215012_Fig04-09.jpg)\n\n图 4-9. 一张类似按钮的图片，分别使用标准方法和九宫格方法进行缩放\n\
  \n此时，你可以将注意力转向 TurtleGame 类。你将编写初始化 TextButtonStyle 对象的代码，并使用皮肤对象存储它，以便程序中的所有屏幕都能使用它。首先，你需要添加以下导入语句：\n\
  \n```\nimport com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.scenes.scene2d.ui.TextButton.TextButtonStyle;\n\
  import com.badlogic.gdx.graphics.g2d.NinePatch;\n```\n\n将九宫格相关图片下载到资源文件夹后，你需要添加到\
  \ create 方法中的代码如下：\n\n```\nTextButtonStyle uiTextButtonStyle = new TextButtonStyle();\n\
  \nuiTextButtonStyle.font      = uiFont;\nuiTextButtonStyle.fontColor = Color.NAVY;\n\
  \nTexture upTex = new Texture(Gdx.files.internal(\"assets/ninepatch-1.png\"));\n\
  skin.add(\"buttonUp\", new NinePatch(upTex, 26,26,16,20));\nuiTextButtonStyle.up\
  \ = skin.getDrawable(\"buttonUp\");\n```\n\n为了让文本按钮对象更精致一些，你还需要向 TextButtonStyle\
  \ 对象添加一些信息。按钮的外观通常会根据用户与其交互的方式而改变。例如，当鼠标指针悬停在按钮上时，它可能会变得更亮；而当按钮被按下时，背景图片可能会被更改，使按钮看起来更“扁平”。这些外观变化如图\
  \ 4-10 所示。\n\n![9781484215012_Fig04-10.jpg](img/9781484215012_Fig04-10.jpg)\n\n\
  图 4-10. 基于状态的不同按钮外观：默认/弹起、悬停/经过、按下/压下\n\n为了给文本按钮提供相同的样式，你只需将额外的图片数据存储到 TextButtonStyle\
  \ 对象的 over 和 down 字段中，并且如果需要，还可以更改字体颜色。这些添加操作通过以下代码完成，并且样式对象被添加到皮肤对象中：\n\n```\n\
  Texture overTex = new Texture(Gdx.files.internal(\"assets/ninepatch-2.png\"));\n\
  skin.add(\"buttonOver\", new NinePatch(overTex, 26,26,16,20) );\nuiTextButtonStyle.over\
  \ = skin.getDrawable(\"buttonOver\");\nuiTextButtonStyle.overFontColor = Color.BLUE;\n\
  \nTexture downTex = new Texture(Gdx.files.internal(\"assets/ninepatch-3.png\"));\n\
  skin.add(\"buttonDown\", new NinePatch(downTex, 26,26,16,20) );\nuiTextButtonStyle.down\
  \ = skin.getDrawable(\"buttonDown\");\nuiTextButtonStyle.downFontColor = Color.BLUE;\n\
  \nskin.add(\"uiTextButtonStyle\", uiTextButtonStyle);\n```\n\n存储好这些样式数据后，你现在就可以在\
  \ TurtleMenu 类中创建文本按钮对象了。“开始”按钮将初始化 TurtleLevel 类并将其设置为活动屏幕，而“退出”按钮将退出应用程序。这个监听器包含两个方法，每个方法针对不同的事件被激活：touchDown\
  \ 在对象被首次触摸或鼠标按钮在此对象上按下时调用；touchUp 在触摸动作停止后或鼠标按钮释放时立即调用。touchUp 方法用于执行这些操作，以便它们在按钮被释放时发生。\n\
  \n```\nTextButton startButton = new TextButton(\"Start\", game.skin, \"uiTextButtonStyle\"\
  );\nstartButton.addListener(\n    new InputListener()\n    {\n        public boolean\
  \ touchDown (InputEvent event, float x, float y, int pointer, int button)\n    \
  \    {  return true;  }\n\npublic void touchUp (InputEvent event, float x, float\
  \ y, int pointer, int button)\n        {\n            game.setScreen( new TurtleLevel(game)\
  \ );\n        }\n    });\n\nTextButton quitButton = new TextButton(\"Quit\", game.skin,\
  \ \"uiTextButtonStyle\");\nquitButton.addListener(\n    new InputListener()\n  \
  \  {\n        public boolean touchDown (InputEvent event, float x, float y, int\
  \ pointer, int button)\n        {  return true;  }\n\npublic void touchUp (InputEvent\
  \ event, float x, float y, int pointer, int button)\n        {\n            Gdx.app.exit();\n\
  \        }\n    });\n```\n\n\n\n最后，当所有用户界面对象都创建完毕后，就可以将它们添加到 `uiTable` 对象中，从而放置到屏幕上。我们沿用之前讨论“开始”菜单布局时的代码，并做一处补充：为了对称，你希望两个按钮宽度相同，但由于显示文本不同，“开始”按钮默认会更宽。你可以通过设置包含“退出”按钮的单元格宽度，使其与“开始”按钮宽度一致：\n\
  \n```\nfloat w = startButton.getWidth();\nuiTable.add(titleImage).colspan(2);\n\
  uiTable.row();\nuiTable.add(startButton);\nuiTable.add(quitButton).width(w);\nuiTable.row();\n\
  uiTable.add(libgdxImage).colspan(2).right().padTop(50);\n```\n\n最后，为了让程序启动时加载菜单屏幕（而非游戏画面屏幕），你需要修改\
  \ `TurtleGame` 类。在 `create` 方法的末尾，不再创建 `TurtleLevel` 类的实例（并将其设为活动屏幕），而是改用 `TurtleMenu`\
  \ 类。为此，将 `create` 方法的最后两行改为以下代码：\n\n```\nTurtleMenu tm = new TurtleMenu(this);\n\
  setScreen(tm);\n```\n\n**创建覆盖菜单**\n\n现在，你已经完成了两个主要用户界面的设置，接下来要为 Starfish Collector\
  \ 游戏添加最后一个功能：创建一个覆盖式菜单，当游戏暂停时，它显示在 TurtleLevel 屏幕的主 UI 之上，如图 4-11 所示。与之前的用户界面讨论类似，我们将最终效果与抽象布局图并排展示，布局图指示了\
  \ UI 元素的位置。在图 4-11 中，单元格 a 和 d 包含标签，单元格 b 和 c 包含按钮，单元格 e 包含一个滑块。此外，还会有一个半透明的黑色背景，使游戏画面变暗，同时让暂停菜单的内容更易于识别。你已经熟悉了其中两个所需的类：`Label`\
  \ 和 `TextButton`。你需要的新控件元素是 `Slider`，它将用于更改 `audioVolume` 变量（该变量用于设置音效和背景音乐的音量，本章开头已介绍）。\n\
  \n![9781484215012_Fig04-11.jpg](img/9781484215012_Fig04-11.jpg)\n\n图 4-11. 暂停覆盖菜单的抽象表格布局\n\
  \n为保持一致性，你将在 `TurtleGame` 类中与其他样式对象一起初始化和存储关联的 `SliderStyle` 对象。像往常一样，你还会使用 `Skin`\
  \ 类的方法将所需的 `Texture` 对象转换为 `Drawable` 对象。`SliderStyle` 对象必须包含的两个字段是：背景图像和沿滑块前后拖动的旋钮图像。你还可以包含两个额外的图像，它们分别显示在旋钮图像之前和之后的背景之上，如图\
  \ 4-11 所示。旋钮是圆形图像；“之前”和“之后”图像分别是出现在旋钮左侧和右侧的彩色水平图像。所有必要的图像都可以从源代码资源文件夹中下载。你需要在 `TurtleGame`\
  \ 类中添加以下导入语句：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.ui.Slider.SliderStyle;\n\
  ```\n\n然后，在 `create` 方法中，初始化 `SliderStyle` 对象的代码如下：\n\n```\nSliderStyle uiSliderStyle\
  \ = new SliderStyle();\n\nskin.add(\"sliderBack\",   new Texture(Gdx.files.internal(\"\
  assets/slider-after.png\")) );\nskin.add(\"sliderKnob\",   new Texture(Gdx.files.internal(\"\
  assets/slider-knob.png\")) );\nskin.add(\"sliderAfter\",  new Texture(Gdx.files.internal(\"\
  assets/slider-after.png\")) );\nskin.add(\"sliderBefore\", new Texture(Gdx.files.internal(\"\
  assets/slider-before.png\")) );\n\nuiSliderStyle.background = skin.getDrawable(\"\
  sliderBack\");\nuiSliderStyle.knob       = skin.getDrawable(\"sliderKnob\");\nuiSliderStyle.knobAfter\
  \  = skin.getDrawable(\"sliderAfter\");\nuiSliderStyle.knobBefore = skin.getDrawable(\"\
  sliderBefore\");\n\nskin.add(\"uiSliderStyle\", uiSliderStyle);\n```\n\n由于滑块上的每个点都对应一个数值，为了在\
  \ `TurtleLevel` 类中初始化 `Slider` 对象，你必须提供滑块所表示的最小值和最大值（本例中为 0 和 1），以及数值之间可能的最小增量。你还必须包含一个布尔变量，用于确定滑块是否应垂直显示（此处将其设为\
  \ `false` 以获得水平滑块）。最后的参数涉及样式数据；在本例中，由于你使用 `Skin` 存储了数据，因此需要提供对 `Skin` 对象的引用以及用于存储\
  \ `SliderStyle` 对象的对应名称。\n\n接下来，添加当用户与滑块交互时执行的代码。这里，我们不再沿用之前使用 `EventListener` 的方法，因为用户与此特定\
  \ UI 元素的交互方式不同。在 `Actor` 注册的 `touchDown` 和 `touchUp` 事件之间可能发生多次变化；这些中间变化由 `ChangeListener`\
  \ 类观察，然后调用其 `changed` 方法。\n\n此时，你回到 `TurtleLevel` 类进行最后的修改。首先，添加剩余的导入语句：\n\n```\n\
  import com.badlogic.gdx.scenes.scene2d.ui.Slider;\nimport com.badlogic.gdx.scenes.scene2d.utils.ChangeListener;\n\
  import com.badlogic.gdx.scenes.scene2d.Actor;\nimport com.badlogic.gdx.scenes.scene2d.ui.Table;\n\
  import com.badlogic.gdx.scenes.scene2d.ui.Stack;\nimport com.badlogic.gdx.scenes.scene2d.utils.Drawable;\n\
  import com.badlogic.gdx.graphics.Color;\nimport com.badlogic.gdx.scenes.scene2d.ui.TextButton;\n\
  ```\n\n以下代码使用你之前创建的 `SliderStyle` 对象创建了一个 `Slider`，将滑块旋钮的坐标设置为与 `audioVolume` 初始值对应的位置，并添加了一个\
  \ `ChangeListener` 对象，当用户与滑块交互时，该对象会调整音频对象的音量。这段代码应在 `audioVolume` 变量初始化之后添加：\n\n\
  ```\nSlider audioSlider = new Slider(0, 1, 0.005f, false, game.skin, \"uiSliderStyle\"\
  \ );\naudioSlider.setValue( audioVolume );\naudioSlider.addListener(\n    new ChangeListener()\n\
  \    {\n        public void changed(ChangeEvent event, Actor actor)\n        {\n\
  \            audioVolume = audioSlider.getValue();\n            instrumental.setVolume(audioVolume);\n\
  \            oceanSurf.setVolume(audioVolume);\n        }\n    });\n```\n\n接下来，你需要创建暂停覆盖菜单本身。请注意，你不能简单地将这些新元素添加到已有的\
  \ `uiTable` 中。你需要的是第二个 `Table` 对象，其可见性取决于游戏是否暂停，并且在可见时渲染在 `uiTable` 之上。前者可以通过表格的\
  \ `setVisible` 方法实现；后者可以通过 `Stack` 对象来安排，顾名思义，该对象将一个对象放置在另一个对象之上（堆叠）。\n\n在 `TurtleLevel`\
  \ 类中创建一个新的 `Table`：\n\n```\nprivate Table pauseOverlay;\n```\n\n然后在 `create` 方法中初始化它：\n\
  \n```\npauseOverlay = new Table();\npauseOverlay.setFillParent(true);\n```\n\n接着，创建一个\
  \ `Stack` 对象并将其添加到 `uiStage`。之后，将 `uiTable` 和 `pauseOverlay` 表格添加到其中，这将使它们按此顺序渲染：\n\
  \n```\nStack stacker = new Stack();\nstacker.setFillParent(true);\nuiStage.addActor(stacker);\n\
  stacker.add(uiTable);\nstacker.add(pauseOverlay);\n```\n\n接下来，你将在皮肤中添加一个白色纹理，并使用\
  \ `newDrawable` 方法，基于一个简单图像（可从源代码资源文件夹下载），创建一个使用半透明黑色着色的该纹理版本：\n\n\n\n```\ngame.skin.add(\"\
  white\", new Texture( Gdx.files.internal(\"assets/white4px.png\")) );\nDrawable\
  \ pauseBackground = game.skin.newDrawable(\"white\", new Color(0,0,0,0.8f) );\n\
  ```\n\n接下来，为暂停覆盖菜单创建剩余的标签和文本按钮对象，并记得在退出游戏时调用之前编写的 dispose 方法来释放内存：\n\n```\nLabel\
  \ pauseLabel = new Label(\"Paused\", game.skin, \"uiLabelStyle\");\n\nTextButton\
  \ resumeButton = new TextButton(\"Resume\", game.skin, \"uiTextButtonStyle\");\n\
  resumeButton.addListener(\n    new InputListener()\n    {\n        public boolean\
  \ touchDown (InputEvent event, float x, float y, int pointer, int button)\n    \
  \    {  return true;  }\n\npublic void touchUp (InputEvent event, float x, float\
  \ y, int pointer, int button)\n        {\n            togglePaused();\n        \
  \    pauseOverlay.setVisible( isPaused() );\n        }\n    });\n\nTextButton quitButton\
  \ = new TextButton(\"Quit\", game.skin, \"uiTextButtonStyle\");\nquitButton.addListener(\n\
  \    new InputListener()\n    {\n        public boolean touchDown (InputEvent event,\
  \ float x, float y, int pointer, int button)\n        {  return true;  }\n\npublic\
  \ void touchUp (InputEvent event, float x, float y, int pointer, int button)\n \
  \       {\n            dispose();\n            Gdx.app.exit();\n        }\n    });\n\
  \nLabel volumeLabel = new Label(\"Volume\", game.skin, \"uiLabelStyle\");\n```\n\
  \n创建完所有用户界面对象后，将它们添加到 pauseOverlay 表格中，为简单起见，每行放置一个对象。同时，使用与设计 TurtleMenu 类 UI 时相同的方法，强制按钮具有相同的宽度：\n\
  \n```\nfloat w = resumeButton.getWidth();\npauseOverlay.setBackground(pauseBackground);\n\
  pauseOverlay.add(pauseLabel).pad(20);\npauseOverlay.row();\npauseOverlay.add(resumeButton);\n\
  pauseOverlay.row();\npauseOverlay.add(quitButton).width(w);\npauseOverlay.row();\n\
  pauseOverlay.add(volumeLabel).padTop(100);\npauseOverlay.row();\npauseOverlay.add(audioSlider).width(400);\n\
  ```\n\n将 pauseOverlay 初始化为不可见：\n\n```\npauseOverlay.setVisible(false);\n```\n\n\
  最后，在暂停按钮的 EventListener 的 handle 方法中添加以下代码行，这将使 pauseOverlay 在游戏暂停时可见：\n\n```\n\
  pauseOverlay.setVisible( isPaused() );\n```\n\n至此，用户界面的最后一层完成；这三层在图 4-12 中并排展示。\n\
  \n![9781484215012_Fig04-12.jpg](img/9781484215012_Fig04-12.jpg)\n\n图 4-12. Starfish\
  \ Collector 中的三层内容\n\n至此，你对 Starfish Collector 游戏的优化工作就结束了！为了练习这些技巧，我建议你重写之前其他游戏（Cheese,\
  \ Please! 和 Balloon Buster）的相应部分，将这种新的用户界面设计方法融入其中。\n\n总结\n\n在本章中，你为 Starfish Collector\
  \ 游戏增添了不少润色。你首先使用音频对象以及 Sound 和 Music 接口添加了音效和背景音乐。然后，你设计并实现了一个复杂的用户界面，包括一个开始菜单屏幕、主游戏屏幕的用户界面，以及游戏暂停时覆盖在主屏幕上的菜单。你学习了如何使用\
  \ Table 类简化用户界面的布局，以及如何使用 Skin 类管理资源。你重构了自定义的 BaseScreen 类，并添加了 BaseGame 类来整合这些新类。你还了解了如何使用\
  \ Label、Button、TextButton、Image 和 Slider 类及其相关的样式对象来创建各种用户界面元素。在下一章中，你将继续关注用户体验，重点是为用户提供替代的输入方式来玩游戏。\n\
  \n______________________\n\n¹详情请参见 [www.angelcode.com/products/bmfont/](http://www.angelcode.com/products/bmfont/)。\n\
  \n²可在 [`github.com/libgdx/libgdx/wiki/Hiero`](https://github.com/libgdx/libgdx/wiki/Hiero)\
  \ 获取。\n\n第 5 章\n\n![image](img/frontdot.jpg)\n\n用户输入的替代来源\n\n在前面的章节中，你的游戏是通过传统的桌面计算机硬件（键盘和鼠标）进行控制的。在本章中，你将探索两种替代的用户输入来源：游戏手柄控制器和触摸屏控制。如果你没有带\
  \ USB 接口的游戏手柄（本章后面会讨论），你仍然可以继续学习；代码仍然可以编译，并且你会保留键盘控制作为备用方案（这是一个值得考虑的好做法，以便为游戏玩家提供便利）。同样，即使你没有触摸屏设备，了解相关的设计考虑因素也是值得的。此外，在\
  \ LibGDX 中，触摸事件和鼠标事件由相同的方法处理；你可以用鼠标模拟单点触摸输入（但不能模拟多点触摸输入）。另一方面，如果你对游戏手柄或触摸输入都不感兴趣，可以跳过整章内容，不会影响学习的连续性。\n\
  \n作为起点，我更新了 Cheese, Please! 游戏（在第 3 章中介绍）的代码，加入了第 4 章中介绍的结构和设计修改：整合了新的 BaseGame\
  \ 类以及 Skin 和 Table 对象来组织用户界面。修改后的代码可以在本章源代码的 CheesePleaseUpdate 目录中找到，并将作为后续两个主要部分的起点。\n\
  \n游戏手柄控制器\n\n*游戏手柄控制器*是专门的硬件设备，使玩家更容易输入与游戏相关的指令。它们与游戏主机同时出现，并包含了各种组件配置，如摇杆、按钮、方向键、拨盘、扳机和触摸板。随着桌面计算机上主机风格游戏的普及，现在有许多可以通过\
  \ USB 接口连接的游戏手柄。在本节中，你将开发适用于 Xbox 360 游戏手柄（或许多模拟它的替代产品，如图 5-1 所示的罗技 F310 游戏手柄）的控制方案。\n\
  \n![9781484215012_Fig05-01.jpg](img/9781484215012_Fig05-01.jpg)\n\n图 5-1. Xbox 360\
  \ 和罗技 F310 游戏手柄控制器\n\n对游戏手柄输入的支持由 Controller 和 Controllers 类提供。这些类不属于 LibGDX 核心库，因此它们的代码包含在不同的\
  \ JAR 文件中，必须将其添加到你的项目中。从你获取 libgdx.jar 文件的同一下载位置（在第 1 章中讨论过），找到目录 extensions/gdx-controllers/\
  \ 并下载以下文件：\n\n```\ngdx-controllers.jar\ngdx-controllers-desktop.jar\ngdx-controllers-desktop-natives.jar\n\
  ```\n\n首先，复制 CheesePleaseUpdate 项目文件夹并将其重命名为 CheesePleaseGamepad。将你下载的 JAR 文件复制到项目目录中的\
  \ +libs 文件夹中。添加这些文件后，你需要重启 BlueJ 以使新添加的类可用。你需要对代码进行的第一个修改是，将控制器相关的所有类导入到将使用它们的自定义类中。为此，将以下\
  \ import 语句添加到 BaseScreen、MenuScreen 和 GameScreen 类中：\n\n```\nimport com.badlogic.gdx.controllers.*;\n\
  ```\n\n\n\n回想一下，处理用户输入有两种方式。对于连续输入（对应行走等动作），你需要在更新方法中轮询硬件设备的状态，该方法通常每秒运行 60 次。稍后你会看到，这个过程类似于轮询键盘输入：键盘轮询使用`Gdx.input`对象的方法，例如`isKeyPressed`，而游戏手柄轮询则使用`Controller`对象的方法，例如`getAxis`和`getButton`。对于离散输入（对应跳跃等动作），你之前已经配置程序来监控（或“监听”）事件，例如键盘按键被首次按下时。类似地，你将在`BaseScreen`类中添加额外的代码来监控离散的游戏手柄事件，例如游戏手柄按钮被首次按下时。在接下来的两节中，你将引入处理连续和离散游戏手柄输入的代码。\n\
  \n## 连续输入\n\n在本节中，你将在`GameScreen`类的更新方法中添加代码，用于确定摇杆被按压的方向，并相应地移动玩家角色。首先，你需要获取活动`Controller`对象的实例。`Controllers`类提供了静态工具方法`getControllers`，用于获取一个包含已连接且活动的`Controller`对象的数组。假设只连接了一个游戏手柄，你只需要获取该数组的第零个元素，如下所示：\n\
  \n```\nController gamepad = Controllers.getControllers().get(0);\n```\n\n一旦获取了`Controller`对象，你就可以使用提供的四种`get`风格的方法之一来轮询摇杆、按钮、方向键和扳机键的状态。其中许多方法需要一个参数：一个对应于游戏手柄组件的常量值。这些值是特定于游戏手柄的，并且特定的游戏手柄在不同操作系统上甚至可能有不同的值。确定这些值最稳健的方法是允许玩家在运行时配置游戏手柄映射，方法是遍历游戏所需的不同动作，要求玩家按下相应的按钮，并存储这些值以供后续使用。为简单起见，在本节中，我包含了一个名为`XBoxGamepad`的类，它存储了\
  \ Xbox 360 风格控制器（包括前面提到的罗技 F310 控制器）的代码。该类的代码如下所示，之后我将解释如何使用这些值：\n\n```\nimport\
  \ com.badlogic.gdx.controllers.PovDirection;\n\npublic class XBoxGamepad\n{\n  \
  \  /** 按钮代码 */\n    public static final int BUTTON_A              = 0;\n    public\
  \ static final int BUTTON_B              = 1;\n    public static final int BUTTON_X\
  \              = 2;\n    public static final int BUTTON_Y              = 3;\n  \
  \  public static final int BUTTON_LEFT_SHOULDER  = 4;\n    public static final int\
  \ BUTTON_RIGHT_SHOULDER = 5;\n    public static final int BUTTON_BACK          \
  \ = 6;\n    public static final int BUTTON_START          = 7;\n    public static\
  \ final int BUTTON_LEFT_STICK     = 8;\n    public static final int BUTTON_RIGHT_STICK\
  \    = 9;\n\n    /** 方向键代码 */\n    public static final PovDirection DPAD_UP    =\
  \ PovDirection.north;\n    public static final PovDirection DPAD_DOWN  = PovDirection.south;\n\
  \    public static final PovDirection DPAD_RIGHT = PovDirection.east;\n    public\
  \ static final PovDirection DPAD_LEFT  = PovDirection.west;\n\n    /** 摇杆轴代码 */\n\
  \    // X 轴：-1 = 左，+1 = 右\n    // Y 轴：-1 = 上，+1 = 下\n    public static final int\
  \ AXIS_LEFT_X  = 1;\n    public static final int AXIS_LEFT_Y  = 0;\n    public static\
  \ final int AXIS_RIGHT_X = 3;\n    public static final int AXIS_RIGHT_Y = 2;\n\n\
  \    /** 扳机键代码 */\n    // 左扳机和右扳机被视为同一轴；ID 值相同\n    // 值 - 左扳机：0 到 +1。右扳机：0 到 -1。\n\
  \    // 注意：值是相加的；如果同时按下两者，它们可能会相互抵消。\n    public static final int AXIS_LEFT_TRIGGER\
  \  = 4;\n    public static final int AXIS_RIGHT_TRIGGER = 4;\n}\n```\n\n以下方法可用于轮询游戏手柄组件的状态：\n\
  \n*   要轮询摇杆的状态，请使用`getAxis(code)`，其中`code`是一个整数，对应于左摇杆或右摇杆，以及 x 方向或 y 方向。返回的值是一个范围在-1\
  \ 到 1 之间的浮点数。在 x 轴上，-1 对应左，+1 对应右；而在 y 轴上，-1 对应上，+1 对应下。例如，考虑以下代码行：\n\n```\n   \
  \ float x = gamepad.getAxis(XBoxGamepad.AXIS_LEFT_X);\n```\n\n如果`x`的值等于 0.5，则表示游戏手柄的左摇杆被按向右侧一半的位置。\n\
  \n我强调一下，大多数控制器使用的 y 轴方向（负值对应“向上”方向）与 LibGDX 库假定的方向（正值对应“向上”方向）相反。在更新方法中处理输入时需要记住这一点。\n\
  \n*   要轮询扳机键的状态，你也使用`getAxis(code)`。在 Xbox 360 风格的控制器上，左扳机和右扳机被视为同一轴。按下左扳机会生成 0（未按下）到+1（完全按下）范围内的值，而按下右扳机会生成\
  \ 0（未按下）到-1（完全按下）范围内的值。如果同时按下两个扳机，`getAxis`方法将返回它们值的总和；特别是，如果两个扳机都完全按下，`getAxis`将返回\
  \ 0。\n*   要检查游戏手柄按钮的状态，请使用`getButton(code)`，其中`code`是一个对应于游戏手柄按钮的整数。返回的值是一个布尔值，指示相应的按钮当前是否被按下。\n\
  *   要确定方向键上被按下的方向，¹请使用`getPov(num)`，其中`num`是方向键的索引（通常为 0）。方向键很有趣，因为它们返回的值比按钮（布尔值）更复杂，但比摇杆轴（浮点值）简单。这种“中间地带”的输入级别通过返回导入的`PovDirection`类中定义的枚举类型来处理。然而，为了方便起见，我在`XBoxGamepad`类中为这些值定义了替代名称（可能对现代玩家更熟悉）。\n\
  \n现在，你已准备好将基于游戏手柄的控制添加到`GameScreen`类的更新方法中。具体来说，你通过整合`getAxis`方法，让玩家能够使用游戏手柄的左摇杆来控制\
  \ Mousey。在以下代码中，你通过测试控制器数组是否至少包含一个元素来检查是否有控制器已连接。如果有，并且摇杆移动超过了某个阈值（称为*死区*，用于补偿控制器灵敏度，通常设置为\
  \ 10%到 20%之间的值），你就相应地设置角色的加速度。如果没有，你将为游戏提供备用的键盘控制。\n\n\n\n```\nfloat accelerate\
  \ = 100.0f;\nif (Controllers.getControllers().size > 0)\n{\n    Controller gamepad\
  \ = Controllers.getControllers().get(0);\n    float xAxis =  gamepad.getAxis(XBoxGamepad.AXIS_LEFT_X);\n\
  \    float yAxis = -gamepad.getAxis(XBoxGamepad.AXIS_LEFT_Y);\n    float deadZone\
  \ = 0.15f;\n    if (Math.abs(xAxis) < deadZone)\n        xAxis = 0;\n    if (Math.abs(yAxis)\
  \ < deadZone)\n        yAxis = 0;\n    mousey.setAccelerationXY( xAxis * accelerate,\
  \ yAxis * accelerate);\n}\nelse\n{\n    // 键盘备用控制方案\n    mousey.setAccelerationXY(0,0);\n\
  \    if (Gdx.input.isKeyPressed(Keys.LEFT))\n        mousey.addAccelerationXY(-accelerate,0);\n\
  \    if (Gdx.input.isKeyPressed(Keys.RIGHT))\n        mousey.addAccelerationXY(accelerate,0);\n\
  \    if (Gdx.input.isKeyPressed(Keys.UP))\n        mousey.addAccelerationXY(0,accelerate);\n\
  \    if (Gdx.input.isKeyPressed(Keys.DOWN))\n        mousey.addAccelerationXY(0,-accelerate);\n\
  }\n```\n\n离散输入\n\n接下来，你将介绍处理离散游戏手柄输入事件所需的代码。首先，你必须声明 `BaseScreen` 类实现了 `ControllerListener`\
  \ 接口。类声明的第一行应如下所示：\n\n```\npublic abstract class BaseScreen implements Screen, InputProcessor,\
  \ ControllerListener\n```\n\n你需要声明 `ControllerListener` 接口所要求的方法；这些方法可以由继承 `BaseScreen`\
  \ 的各个类根据需要重写。你需要包含的方法如下：\n\n```\npublic void connected(Controller controller)\n\
  {  }\n\npublic void disconnected(Controller controller)\n{  }\n\npublic boolean\
  \ xSliderMoved(Controller controller, int sliderCode, boolean value)\n{  return\
  \ false;  }\n\npublic boolean ySliderMoved(Controller controller, int sliderCode,\
  \ boolean value)\n{  return false;  }\n\npublic boolean accelerometerMoved(Controller\
  \ controller, int accelerometerCode, Vector3 value)\n{  return false;  }\n\npublic\
  \ boolean povMoved(Controller controller, int povCode, PovDirection value)\n{  return\
  \ false;  }\n\npublic boolean axisMoved(Controller controller, int axisCode, float\
  \ value)\n{  return false;  }\n\npublic boolean buttonDown(Controller controller,\
  \ int buttonCode)\n{  return false;  }\n\npublic boolean buttonUp(Controller controller,\
  \ int buttonCode)\n{  return false;  }\n```\n\n最后，你需要“激活”监听器。你需要将当前活动的 `Screen`\
  \ 添加到由 `Controllers` 类管理的监听器集合中。你还必须移除任何先前添加的 `ControllerListener` 对象；你不希望其他可能处于非活动状态（但仍驻留在内存中）的\
  \ `Screen` 对象响应输入，因为这可能导致意外问题。（例如，如果“开始”按钮用于从菜单屏幕开始新游戏，那么在切换到游戏屏幕后，你不再希望点击“开始”时发生此操作；因此，你必须阻止菜单屏幕“监听”并响应这些事件。）你可以在\
  \ `BaseScreen` 构造函数中通过添加以下代码行来执行此任务：\n\n```\nControllers.clearListeners();\nControllers.addListener(this);\n\
  ```\n\n现在，你对 `BaseScreen` 类的修改已经完成，可以编写特定于游戏的代码来响应离散的游戏手柄输入了。例如，你希望玩家能够通过按下 Xbox\
  \ 游戏手柄上的 X 按钮来暂停游戏。在 `update` 方法中轮询按钮状态是不准确的，因为这可能导致每秒切换暂停状态 60 次。暂停游戏是一个*离散*动作，因此你需要重写\
  \ `ControllerListener` 方法之一来监听按下 X 按钮的事件。以下代码将添加到 `GameScreen` 类中，用于完成此任务：\n\n```\n\
  public boolean buttonDown(Controller controller, int buttonCode)\n{\n    if (buttonCode\
  \ == XBoxGamepad.BUTTON_X)\n        togglePaused();\n\nreturn false;\n}\n```\n\n\
  类似地，你希望能够在主菜单屏幕处于活动状态时，通过点击“开始”按钮来启动游戏。为此，你需要将以下代码添加到 `MenuScreen` 类中：\n\n```\n\
  public boolean buttonDown(Controller controller, int buttonCode)\n{\n    if (buttonCode\
  \ == XBoxGamepad.BUTTON_START)\n        game.setScreen( new GameScreen(game) );\n\
  \nreturn false;\n}\n```\n\n至此，基于控制器的“奶酪，拜托！”游戏扩展就完成了。最终版本的源代码包含在 `CheesePleaseGamepad`\
  \ 文件夹中，该文件夹包含了本章的源代码。\n\n触摸屏控制\n\n在本节中，你将学习如何实现受游戏手柄启发的屏幕触摸控制。再次强调，正如本章开头所述，测试本节代码不需要访问触摸屏设备，因为\
  \ LibGDX 使用相同的方法处理鼠标事件和触摸事件；单点触摸输入由鼠标模拟。由于你已经在上一章中了解了 `Button` 类，因此你已经有了良好的基础。接下来，你将学习\
  \ LibGDX 库提供的另一个用户界面控件——`Touchpad` 类，该类旨在模拟传统的街机摇杆。图 5-2 展示了一个传统街机风格摇杆的示例，以及一个可以使用\
  \ LibGDX 创建的触摸板控件，该控件以街机风格摇杆的俯视视角呈现。\n\n![9781484215012_Fig05-02.jpg](img/9781484215012_Fig05-02.jpg)\n\
  \n图 5-2. 传统街机风格摇杆，以及使用 LibGDX 创建的触摸板控件\n\n成功使用这些控件的最大挑战不在于对象的创建，而在于设计上的挑战：这些元素应如何排列并放置在屏幕上？一种选择是将这些元素叠加在游戏世界本身之上，就像你在前几章中对各种\
  \ `Label` 对象所做的那样。然而，你很快就会发现一个问题：如果控件太多（为了便于操作，它们通常必须比标签大得多），可能会遮挡游戏世界，以至于干扰游戏进行。如果放置不当，触摸板可能会完全遮挡住主角。图\
  \ 5-3 通过将触摸板放置在游戏屏幕的左下角，展示了这种可能的情况。注意它如何可能完全覆盖 Mousey！\n\n![9781484215012_Fig05-03.jpg](img/9781484215012_Fig05-03.jpg)\n\
  \n图 5-3. 放置不当的触摸板控件遮挡了主角 Mousey\n\n一些游戏试图通过使用户界面上的控件半透明来解决这个问题，但核心困难依然存在，因为玩家的手指通常会位于控件所在的区域，从而仍然遮挡游戏世界的视图。另一种方法（你将在本节中实现）是为控件保留屏幕的特定区域，并在剩余区域渲染游戏世界，如图\
  \ 5-4 所示。\n\n![9781484215012_Fig05-04.jpg](img/9781484215012_Fig05-04.jpg)\n\n图\
  \ 5-4. 将游戏控件放置在游戏世界下方\n\n使用触摸板\n\n`Touchpad` 对象使用两个图像进行渲染：一个代表背景，另一个代表旋钮。用户可以触摸（或点击）旋钮并将其拖离中心；其移动被限制在一个圆形区域内，该区域包含在由背景图像定义的矩形区域内。\n\
  \n\n\n这些对象需要两个参数才能初始化。首先，你需要提供一个**死区半径**的值——即摇杆必须被拖动的**最小距离**（以像素为单位），才能触发任何变化。这在玩家希望将手指放在触摸板上且角色保持静止时非常有用。如果没有死区设置，控件会过于灵敏，无法实现这一效果。普通玩家不太可能拥有像素级精准的手指定位能力来让摇杆完全居中，结果会导致被控制的角色出现不必要的（且可能让玩家沮丧的）漂移。\n\
  \n其次，Touchpad 对象中使用的图像存储在 `TouchpadStyle` 对象中，该对象包含两个图像，均以 `Drawable` 对象的形式存储，这是\
  \ LibGDX 中 UI 元素的标准做法。像往常一样，你需要将每个图像加载到 `Texture` 对象中，并使用游戏的 `Skin` 对象将其转换为 `Drawable`。由于你的游戏中只有一个屏幕使用此样式，因此你不会像处理其他样式数据对象那样，在继承\
  \ `BaseGame` 的类中初始化该样式。\n\n要开始这个项目，首先复制一份 `CheesePleaseUpdate` 项目目录，并将其重命名为 `CheesePleaseTouchscreen`。你还需要从本章源代码目录中复制一些图像：从\
  \ `CheesePleaseTouchscreen/assets` 中，将所有图像复制到你本地项目的 `assets` 目录中。\n\n在 `GameScreen`\
  \ 类中，你首先添加导入语句：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.ui.Touchpad;\nimport\
  \ com.badlogic.gdx.scenes.scene2d.ui.Touchpad.TouchpadStyle;\nimport com.badlogic.gdx.scenes.scene2d.ui.Button.ButtonStyle;\n\
  import com.badlogic.gdx.scenes.scene2d.InputListener;\nimport com.badlogic.gdx.scenes.scene2d.InputEvent;\n\
  ```\n\n你需要在 `GameScreen` 类中包含以下代码来声明 `Touchpad` 对象，以便 `create` 和 `update` 方法都能访问它：\n\
  \n```\nprivate Touchpad touchPad;\n```\n\n接下来，在 `create` 方法中，你使用以下代码来初始化 `Touchpad`\
  \ 对象及其对应的 `TouchpadStyle`。虽然可以为触摸板添加事件监听器来监控和响应其状态变化，但你将改为在 `update` 方法中轮询触摸板的状态。\n\
  \n```\nTouchpadStyle touchStyle = new TouchpadStyle();\n\nTexture padKnobTex = new\
  \ Texture(Gdx.files.internal(\"assets/joystick-knob.png\"));\ngame.skin.add(\"padKnobImage\"\
  , padKnobTex );\ntouchStyle.knob = game.skin.getDrawable(\"padKnobImage\");\n\n\
  Texture padBackTex = new Texture(Gdx.files.internal(\"assets/joystick-bg.png\"));\n\
  game.skin.add(\"padBackImage\", padBackTex );\ntouchStyle.background = game.skin.getDrawable(\"\
  padBackImage\");\n\ntouchPad = new Touchpad(5, touchStyle);\n```\n\n在 `update` 方法中，你可以使用\
  \ `Touchpad` 对象的 `getKnobPercentX` 和 `getKnobPercentY` 方法来确定摇杆的当前位置。返回值的范围是 -1 到\
  \ +1；你可以将这些值乘以角色所需的最大加速度，这将让玩家对速度有极大的控制：摇杆离触摸板中心越远，角色的速度就越快。你需要用以下代码替换轮询键盘方向键状态并设置\
  \ Mousey 加速度的代码：\n\n```\nfloat accelerate = 100;\nmousey.setAccelerationXY(\n  \
  \  touchPad.getKnobPercentX() * accelerate, touchPad.getKnobPercentY() * accelerate\
  \ );\n```\n\n为了完整性，下面给出了用于创建游戏截图 图 5-4 中显示的暂停按钮的代码；此代码应包含在 `create` 方法中。在这种情况下，由于暂停游戏是一个离散操作，因此为\
  \ `Button` 对象附加了一个事件监听器。\n\n```\nTexture pauseTexture = new Texture(Gdx.files.internal(\"\
  assets/pause.png\"));\ngame.skin.add(\"pauseImage\", pauseTexture );\nButtonStyle\
  \ pauseStyle = new ButtonStyle();\npauseStyle.up = game.skin.getDrawable(\"pauseImage\"\
  );\n\nButton pauseButton = new Button( pauseStyle );\n\npauseButton.addListener(\n\
  \    new InputListener()\n    {\n        public boolean touchDown (InputEvent event,\
  \ float x, float y, int pointer, int button)\n        {\n            togglePaused();\n\
  \            return true;\n        }\n    });\n```\n\n有了这些元素，你就可以将注意力集中在创建 图 5-4\
  \ 所示的用户界面布局上了。\n\n**重新设计用户界面**\n\n正如我们在讨论触摸屏控件时开头提到的，你必须处理控件元素遮挡用户游戏世界视野的问题；我们选择将控件显示在屏幕底部，并在其上方渲染游戏世界。\n\
  \n首先，你需要在 `Launcher` 类中设置配置选项，使窗口宽度为 600，高度为 800；`main` 函数变为如下形式：\n\n```\npublic\
  \ static void main (String[] args)\n{\n    LwjglApplicationConfiguration config\
  \ = new LwjglApplicationConfiguration();\n    config.width = 600;\n    config.height\
  \ = 800;\n    config.title = \"Cheese, Please!\";\n\nCheeseGame myProgram = new\
  \ CheeseGame();\n    LwjglApplication launcher = new LwjglApplication( myProgram,\
  \ config );\n}\n```\n\n接下来，你需要对 `BaseScreen` 类进行一些修改。用户界面仍将填满整个窗口，但游戏世界（`mainStage`\
  \ 的内容）将渲染在该窗口的上部区域，如 图 5-4 所示。因此，你将 `mainStage` 的尺寸改为 600 x 600 像素，稍后你将看到如何在不同的位置渲染\
  \ `mainStage`。常量 `viewWidth` 和 `viewHeight` 现在将专门指代 `mainStage` 的尺寸，并且你将声明常量 `uiWidth`\
  \ 和 `uiHeight` 来存储 `uiStage` 的尺寸。\n\n`BaseScreen` 类中的变量声明现在应如下所示：\n\n```\npublic\
  \ final int viewWidth  = 600;\npublic final int viewHeight = 600;\npublic final\
  \ int uiWidth    = 600;\npublic final int uiHeight   = 800;\n```\n\n在构造函数方法中，`mainStage`\
  \ 的初始化保持不变，但初始化 `uiStage` 的代码行应更改为以下内容：\n\n```\nuiStage = new Stage( new FitViewport(uiWidth,\
  \ uiHeight) );\n```\n\n在 `render` 方法中，你可以在调用每个阶段的 `draw` 方法之前，使用 `Gdx.gl` 对象的 `glViewport`\
  \ 方法来更改每个阶段的渲染位置。`glViewport` 的参数定义了阶段应渲染的矩形区域：左下角的 x 和 y 坐标，后跟矩形的宽度和高度。在下面的代码清单中，需要添加的代码（用于按前述方式调整渲染位置）以粗体显示：\n\
  \n```\nGdx.gl.glViewport(0, uiHeight-viewHeight, viewWidth, viewHeight );\nmainStage.draw();\n\
  Gdx.gl.glViewport(0,0, uiWidth,uiHeight);\nuiStage.draw();\n```\n\n一般来说，建议谨慎使用 `glViewport`\
  \ 方法，因为它会更改渲染参数，但不会更改事件监听器生成的触摸事件的坐标。这就是为什么 `uiStage` 保持与窗口相同的大小。否则，调用 `glViewport`\
  \ 可能会导致控件绘制位置与控件激活位置不匹配。\n\n接下来，你规划了包含屏幕控件的 `uiTable` 的新布局，如 图 5-4 所示；该布局的抽象图如 图\
  \ 5-5 所示。\n\n![9781484215012_Fig05-05.jpg](img/9781484215012_Fig05-05.jpg)\n\n图\
  \ 5-5. 包含控件元素的新用户界面布局抽象图\n\n\n\n图 5-5 的内容如下：\n\n*   单元格 a 包含一个右对齐的标签，用于显示经过的时间。\n\
  *   单元格 b 包含“你赢了”图片（中间间隔 50 像素的内边距），与本游戏之前的版本相同。\n*   单元格 c 为空，并设置为在 y 方向上扩展以填充所有可用空间，以确保单元格\
  \ d 位于屏幕底部。\n*   单元格 d 的固定大小为 200 x 600 像素，包含另一个表格，该表格又包含屏幕触摸控件；单元格 d 中的表格四周有 25\
  \ 像素的内边距，并有一个重复（或*平铺*）以填充可用空间的背景图像，且包含一行中的三个单元格：e、f 和 g。\n*   单元格 e 包含 touchPad\
  \ 对象。\n*   单元格 f 为空，并设置为在 x 方向上扩展以填充所有可用空间，以便单元格 e 更靠近屏幕左侧，单元格 g 更靠近屏幕右侧。\n*   单元格\
  \ g 包含用于暂停游戏的按钮。\n\n在实现此布局之前，你必须移除先前版本 UI 的代码。具体来说，*删除* create 方法中的以下行：\n\n```\n\
  uiTable.pad(10);\nuiTable.add().expandX();\nuiTable.add(timeLabel);\nuiTable.row();\n\
  uiTable.add(winImage).colspan(2).padTop(50);\nuiTable.row();\nuiTable.add().colspan(2).expandY();\n\
  ```\n\n取而代之，添加以下代码，该代码使用先前创建的触摸板和暂停按钮元素，并实现如上所述的表格布局：\n\n```\nuiTable.add(timeLabel).right().pad(10);\n\
  uiTable.row();\nuiTable.add(winImage).padTop(50);\nuiTable.row();\nuiTable.add().expandY();\n\
  uiTable.row();\n\nTable controlTable = new Table();\ncontrolTable.pad(25);\nTexture\
  \ controlTex = new Texture(Gdx.files.internal(\"assets/pixels-white.png\"), true);\n\
  game.skin.add( \"controlTex\", controlTex );\ncontrolTable.background( game.skin.getTiledDrawable(\"\
  controlTex\") );\ncontrolTable.add(touchPad);\ncontrolTable.add().expandX();\ncontrolTable.add(pauseButton);\n\
  \nuiTable.add(controlTable).width(600).height(200);\n```\n\n使用此代码后，“奶酪，拜托！”游戏现在应呈现为图\
  \ 5-4 所示。包含所有这些更改的源代码位于 CheesePleaseTouchscreen 目录中。在触摸屏设备（例如运行 Android 操作系统的平板电脑）上运行程序时，触摸屏控件的体验最佳；此主题在第\
  \ 9 章中简要讨论。\n\n总结\n\n在本章中，你添加了两种让玩家与游戏交互的新方式。首先，你通过使用 LibGDX 库的控制器扩展，为基础游戏添加了游戏手柄控制器支持。这需要在你的项目中包含一些新的\
  \ JAR 文件，以及一个专门用于存储特定游戏手柄上每个摇杆、按钮、方向键和扳机对应值的类。你学习了如何轮询连续输入，以及如何设置事件监听器来监控离散输入。之后，你了解了如何使用\
  \ Touchpad 和 Button 对象为基础游戏添加触摸屏支持。本章详细讨论了添加屏幕控件时出现的设计问题，并展示了一种缓解这些问题的方法，即使用 glViewport\
  \ 方法重新定位舞台的渲染位置。掌握了这些新技术，你将能够极大地改善玩家的游戏体验。\n\n___________________\n\n¹通常称为方向键的控制元素在传统飞行模拟器中被称为*视角*控制，这解释了\
  \ LibGDX 源代码中使用 POV 缩写的原因。\n\n第 6 章\n\n![image](img/frontdot.jpg)\n\n其他游戏案例研究\n\n\
  本章介绍一系列游戏，并重点介绍如何实现各种游戏机制。每个示例都是可玩的，但肯定不是完善的产品——例如，没有一个有开始菜单或用户界面，我们也不会实现胜利或失败条件（这些留给你作为每个部分末尾推荐的“后续步骤”来实现）。尽管如此，所涵盖的技术应该对许多情况都有用。\n\
  \n对于介绍的每个新游戏，你应该先在 BlueJ 中创建一个新项目。在每个项目中，你应该复制 BaseGame、BaseScreen、BaseActor、AnimatedActor\
  \ 和 PhysicsActor 类。在 BaseScreen 类中，你应该将 viewWidth 和 viewHeight 的值分别更改为 800 和 600，因为本章中的游戏需要更大的窗口。你还应该像之前的项目一样，创建一个启动器风格的类和一个扩展\
  \ BaseGame 的类。在每个部分中，你将编写一个名为 GameScreen 的类，该类由每个项目自定义的 BaseGame 扩展类初始化。\n\n太空岩石\n\
  \n本节介绍一款名为 *Space Rocks* 的游戏，这是一款太空主题的射击游戏，灵感来自经典街机游戏 Asteroids。用户控制一艘宇宙飞船；目标是发射激光摧毁所有漂浮在屏幕上的岩石。图\
  \ 6-1 展示了这款游戏的运行画面。\n\n![9781484215012_Fig06-01.jpg](img/9781484215012_Fig06-01.jpg)\n\
  \n图 6-1. 太空岩石游戏\n\n宇宙飞船的操控方式与海星收集者游戏中的海龟非常相似：它可以左右旋转，并朝其面向的任何方向前进。本游戏引入的新机制和主题包括以下内容：\n\
  \n*   创建一个对象的模板实例，用作后续生成的基准\n*   使用 BaseActor 类的新方法来简化对象居中\n*   更新 BaseActor 类，使对象组可以一起移动\n\
  *   维护多个演员对象列表\n*   使用一种新方法将演员的位置环绕屏幕（移出屏幕一侧的对象会从另一侧重新出现）\n\n在创建新项目并包含本章开头所述的类之后，你应该将本章源目录\
  \ SpaceRocks/assets 中的所有图像复制到你本地项目的 assets 文件夹中。然后，你创建 GameScreen 类的核心，包括所需的导入语句以及变量和方法声明：\n\
  \n```\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\nimport\
  \ com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.scenes.scene2d.actions.Actions;\n\
  import com.badlogic.gdx.graphics.Texture.TextureFilter;\nimport com.badlogic.gdx.graphics.g2d.Animation;\n\
  import com.badlogic.gdx.graphics.g2d.Animation.PlayMode;\nimport com.badlogic.gdx.math.MathUtils;\n\
  import java.util.ArrayList;\n\npublic class GameScreen extends BaseScreen\n{\n    private\
  \ BaseActor background;\n    private PhysicsActor spaceship;\n    private BaseActor\
  \ rocketfire;\n\n// 创建稍后克隆的“基础”对象\n    private PhysicsActor baseLaser;\n    private\
  \ AnimatedActor baseExplosion;\n\nprivate ArrayList<PhysicsActor> laserList;\n    private\
  \ ArrayList<PhysicsActor> rockList;\n    private ArrayList<BaseActor> removeList;\n\
  \n// 游戏世界尺寸\n    final int mapWidth = 800;\n    final int mapHeight = 600;\n\npublic\
  \ GameScreen(BaseGame g)\n    {  super(g);  }\n\npublic void create()\n    {            \
  \ }\n\npublic void update(float dt)\n    {             }\n\n}\n```\n\n接下来，你继续填充这些方法。在\
  \ create 方法中，你初始化背景对象：\n\n```\nbackground = new BaseActor();\nbackground.setTexture(\
  \ new Texture(Gdx.files.internal(\"assets/space.png\")) );\nbackground.setPosition(\
  \ 0, 0 );\nmainStage.addActor( background );\n```\n\n\n\n每个待初始化的对象都需要将其原点设置到关联图像的中心，以确保旋转效果正确。为简化后续代码，请在\
  \ `BaseActor` 类中添加以下方法，该方法可自动完成此过程：\n\n```\npublic void setOriginCenter()\n{\n    if\
  \ ( getWidth() == 0 )\n        System.err.println(\"error: actor size not set\"\
  );\n\nsetOrigin( getWidth()/2, getHeight()/2 );\n}\n```\n\n**飞船**\n\n回到 `GameScreen`\
  \ 类的 `create` 方法，按常规方式初始化飞船对象：\n\n1.  加载并存储纹理（该纹理将自动转换为动画）。\n2.  设置起始位置。\n3.  设置物理属性（较小的减速度值可产生“漂移”效果）。\n\
  4.  选择用于碰撞检测的形状。\n5.  将对象添加到舞台。\n\n与《海星收集者》游戏中的海龟对象不同，此处不应将 `autoAngle` 参数设为 `true`，因为飞船需要能够朝向与其运动角度不同的方向。事实上，这正是本游戏的特色之一：为了快速减速，飞船必须调头并向相反方向加速。以下是实现上述功能的代码：\n\
  \n```\nspaceship = new PhysicsActor();\nTexture shipTex = new Texture(Gdx.files.internal(\"\
  assets/spaceship.png\"));\nshipTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
  spaceship.storeAnimation( \"default\", shipTex );\n\nspaceship.setPosition( 400,300\
  \ );\nspaceship.setOriginCenter();\nspaceship.setMaxSpeed(200);\nspaceship.setDeceleration(20);\n\
  spaceship.setEllipseBoundary();\n\nmainStage.addActor(spaceship);\n```\n\n在《太空岩石》中操控飞船与在《海星收集者》中移动海龟略有不同，你需要能够逐渐改变飞船在不同方向上的加速度。为此，需要在\
  \ `PhysicsActor` 类中添加以下方法，该方法通过向另一个方向添加给定的加速度量来调整角色的加速度：\n\n```\npublic void addAccelerationAS(float\
  \ angle, float amount)\n{\n    acceleration.add( amount * MathUtils.cosDeg(angle),\
  \ amount * MathUtils.sinDeg(angle) );\n}\n```\n\n添加此新方法后，回到 `GameScreen` 类。为了操控飞船，在\
  \ `update` 方法中添加以下代码：\n\n```\nspaceship.setAccelerationXY(0,0);\n\nif (Gdx.input.isKeyPressed(Keys.LEFT))\n\
      spaceship.rotateBy(180 * dt);\nif (Gdx.input.isKeyPressed(Keys.RIGHT))\n    spaceship.rotateBy(-180\
  \ * dt);\nif (Gdx.input.isKeyPressed(Keys.UP))\n    spaceship.addAccelerationAS(spaceship.getRotation(),\
  \ 100);\n```\n\n《太空岩石》游戏世界的一个有趣特性是没有“边界”：物体从屏幕右边缘移出后会从左边缘重新出现（反之亦然），上下边缘同理。这种行为称为*环绕*，可通过在\
  \ `GameScreen` 类中包含以下方法来实现：\n\n```\npublic void wraparound(BaseActor ba)\n{\n    if\
  \ ( ba.getX() + ba.getWidth() < 0 )\n        ba.setX( mapWidth );\n    if ( ba.getX()\
  \ > mapWidth )\n        ba.setX( -ba.getWidth() );\n    if ( ba.getY() + ba.getHeight()\
  \ < 0 )\n        ba.setY( mapHeight );\n    if ( ba.getY() > mapHeight )\n        ba.setY(\
  \ -ba.getHeight() );\n}\n```\n\n然后在 `update` 方法中，对游戏中的每个移动实体调用此方法。首先，包含以下代码行：\n\n\
  ```\nwraparound( spaceship );\n```\n\n此时是编译项目并测试飞船是否按预期在屏幕上移动的好时机。\n\n你的下一个目标是创建一个视觉特效：一个火箭火焰图像，它看起来是从飞船尾部喷出的，并且仅当用户按下使飞船向前加速的按键时才可见。理想情况下，你需要以某种方式将此图像“附加”到飞船上，使其相对于飞船中心偏移一定距离，并让火箭火焰图像随飞船图像一起移动，同时考虑飞船的位置和旋转，如图\
  \ 6-2 所示。\n\n![9781484215012_Fig06-02.jpg](img/9781484215012_Fig06-02.jpg)\n\n图\
  \ 6-2. 飞船在不同位置无火箭火焰和有火箭火焰的对比\n\n在 LibGDX 中，`Group` 类正是为此目的而创建的：它是 `Actor` 类的扩展，并且类似于\
  \ `Stage`，你可以向其中添加其他 `Actor` 对象。`Group` 类的 `draw` 方法会计算所有附加 `Actor` 对象的位置和旋转，然后依次调用它们的\
  \ `draw` 方法。为了让你的 `BaseActor` 类利用这一特性，需要进行一些修改。首先，添加导入语句：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Group;\n\
  ```\n\n接下来，修改 `BaseActor` 类的声明，使其继承 `Group` 类而非 `Actor` 类：\n\n```\npublic class\
  \ BaseActor extends Group\n```\n\n在 `BaseActor` 类的 `draw` 方法末尾，需要包含以下代码行；如前所述，这将调用\
  \ `Group` 类的 `draw` 方法，进而调用所有已附加到此对象的角色的 `draw` 方法：\n\n```\nsuper.draw(batch, parentAlpha);\n\
  ```\n\n然后在 `GameScreen` 类的 `create` 方法中按如下方式初始化火箭火焰对象。特别注意，火箭火焰的位置应视为相对于飞船位置的偏移，如图\
  \ 6-3 右侧虚线所示。同时注意，`rocketfire` 对象是添加到 `spaceship` 中，而非 `mainStage`。\n\n```\nrocketfire\
  \ = new BaseActor();\nrocketfire.setPosition(-28,24);\nTexture fireTex = new Texture(Gdx.files.internal(\"\
  assets/fire.png\"));\nfireTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
  rocketfire.setTexture( fireTex );\nspaceship.addActor(rocketfire);\n```\n\n![9781484215012_Fig06-03.jpg](img/9781484215012_Fig06-03.jpg)\n\
  \n图 6-3. 火箭火焰对象添加到飞船时的默认位置（左）以及设置相对于飞船的位置后（右）\n\n回想一下，`rocketfire` 对象应仅在玩家按下加速飞船的键盘按键时才可见。这可以通过在\
  \ `update` 方法中添加以下代码行来实现：\n\n```\nrocketfire.setVisible( Gdx.input.isKeyPressed(Keys.UP)\
  \ );\n```\n\n此时是编译代码并运行游戏以验证一切行为是否符合预期的好时机。\n\n**激光**\n\n接下来，设置 `baseLaser` 对象，飞船将从中克隆出额外的激光来射击岩石。与往常一样，这需要加载并存储纹理、设置物理属性和碰撞形状，并且在此情况下，你*确实*希望激光朝向运动方向，因此将\
  \ `autoAngle` 设为 `true`。为完成这些任务，在 `GameScreen` 类的 `create` 方法中添加以下代码：\n\n```\nbaseLaser\
  \ = new PhysicsActor();\nTexture laserTex = new Texture(Gdx.files.internal(\"assets/laser.png\"\
  ));\nlaserTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\nbaseLaser.storeAnimation(\
  \ \"default\", laserTex );\n\nbaseLaser.setMaxSpeed(400);\nbaseLaser.setDeceleration(0);\n\
  baseLaser.setEllipseBoundary();\nbaseLaser.setOriginCenter();\nbaseLaser.setAutoAngle(true);\n\
  ```\n\n此外，还需要初始化用于存储激光对象实例的列表，以便后续在碰撞检测中使用：\n\n\n\n```\nlaserList = new ArrayList<PhysicsActor>();\n\
  ```\n\n在本游戏中，激光的实例由两个对象存储：一个 Stage 对象（负责激活角色的更新与绘制）和一个 ArrayList 对象（用于组织碰撞检测代码）。当某个实例需要从游戏中移除时，要完全移除它，必须同时从\
  \ Stage 和包含它的 ArrayList 中删除。Actor 类包含一个 remove 方法，用于将自身从 Stage 中移除。受此功能启发，你将在 BaseActor\
  \ 类中添加一些代码，以类似方式管理从关联 ArrayList 中的移除。首先，在 BaseActor 类中添加导入语句：\n\n```\nimport java.util.ArrayList;\n\
  ```\n\n然后添加一个新变量：一个名为 parentList 的 ArrayList，它可以存储对角色已加入的 ArrayList 的引用。声明此变量的难点在于选择\
  \ ArrayList 包含的数据类型：通常，它可以包含 BaseActor 对象、AnimatedActor 对象或 PhysicsActor 对象——简而言之，任何继承\
  \ BaseActor 类的类。为了在声明中表达这一点，Java 语法中类型声明的写法是 `? extends BaseActor`。在 BaseActor 类的变量声明中添加以下代码行：\n\
  \n```\nprivate ArrayList<? extends BaseActor> parentList;\n```\n\n然后在 BaseActor\
  \ 类中添加一个方法，用于设置此数据：\n\n```\npublic void setParentList(ArrayList<? extends BaseActor>\
  \ pl)\n{  parentList = pl;  }\n```\n\n通过在 BaseActor 构造函数中添加以下代码行，将此数据初始化为 null：\n\
  \n```\nparentList = null;\n```\n\n最后，添加一个名为 destroy 的方法，该方法将使 BaseActor 从包含它的 Stage\
  \ 中移除自身，同时从其 parentList（如果存在）中移除自身：\n\n```\npublic void destroy()\n{\n    remove();\
  \ // 从 Stage 中移除自身\n\nif (parentList != null)\n        parentList.remove(this);\n\
  }\n```\n\n接下来，你将设置发射激光的代码。激光应看起来是从飞船对象发出的。为了正确对齐它们的原点坐标，你必须考虑目标的位置、目标的原点以及被居中对象的原点。逐步考虑这些值的结果如图\
  \ 6-4 所示。\n\n![9781484215012_Fig06-04.jpg](img/9781484215012_Fig06-04.jpg)\n\n图\
  \ 6-4. 在大矩形内居中一个小矩形的计算中每一步效果的图示\n\n由于这是一个常用操作，请在 BaseActor 类中添加以下名为 moveToOrigin\
  \ 的方法：\n\n```\npublic void moveToOrigin(BaseActor target)\n{\n    this.setPosition(\n\
  \        target.getX() + target.getOriginX() - this.getOriginX(),\n        target.getY()\
  \ + target.getOriginY() - this.getOriginY() );\n}\n```\n\n此外，激光对象需要被克隆，因此 AnimatedActor\
  \ 和 PhysicsActor 类需要有克隆方法。之前只有 BaseActor 对象被克隆，所以直到现在才引入针对更复杂类的类似方法。在 AnimatedActor\
  \ 类中，添加以下方法。请注意，在 copy 方法中，调用 super.copy 会激活 BaseActor 类的 copy 方法，这确保了该类中定义的所有数据也会被复制到新角色中。\n\
  \n```\npublic void copy(AnimatedActor original)\n{\n    super.copy(original);\n\
  \    this.elapsedTime = 0;\n    this.animationStorage = original.animationStorage;\n\
  \    this.activeName = new String(original.activeName);\n    this.activeAnim = this.animationStorage.get(\
  \ this.activeName );\n}\n\npublic AnimatedActor clone()\n{\n    AnimatedActor newbie\
  \ = new AnimatedActor();\n    newbie.copy( this );\n    return newbie;\n}\n```\n\
  \n在 PhysicsActor 类中，出于类似目的，添加以下方法：\n\n```\npublic void copy(PhysicsActor original)\n\
  {\n    super.copy(original);\n    this.velocity     = new Vector2(original.velocity);\n\
  \    this.acceleration = new Vector2(original.acceleration);\n    this.maxSpeed\
  \     = original.maxSpeed;\n    this.deceleration = original.deceleration;\n   \
  \ this.autoAngle    = original.autoAngle;\n}\n\npublic PhysicsActor clone()\n{\n\
  \    PhysicsActor newbie = new PhysicsActor();\n    newbie.copy( this );\n    return\
  \ newbie;\n}\n```\n\n现在，你可以回到 GameScreen 类中实现游戏机制了。由于发射激光是一个离散事件，你将在 GameScreen\
  \ 类中重写 keyDown 方法来处理此操作。如果按下空格键，则通过克隆 baseLaser 创建一个名为 laser 的新 PhysicsActor。使用新创建的\
  \ moveToOrigin 方法将激光居中于飞船，设置速度使其与飞船的角度对齐，并将激光添加到相应的 Stage 和 ArrayList 中。此外，还添加了一个动作序列，该序列将在初始\
  \ 2 秒延迟后使激光快速淡出：\n\n```\npublic boolean keyDown(int keycode)\n{\n    if (keycode\
  \ == Keys.SPACE)\n    {\n        PhysicsActor laser = baseLaser.clone();\n     \
  \   laser. moveToOrigin( spaceship );\n        laser.setVelocityAS( spaceship.getRotation(),\
  \ 400 );\n        laserList.add(laser);\n        laser.setParentList(laserList);\n\
  \        mainStage.addActor(laser);\n\nlaser.addAction(\n            Actions.sequence(Actions.delay(2),\
  \ Actions.fadeOut(0.5f), Actions.visible(false)) );\n    }\n\nreturn false;\n}\n\
  ```\n\n在 GameScreen 的 update 方法中，你可以设置一个循环，将 wraparound 方法应用于 laserList 中的每个对象。你还可以检查是否有任何激光不可见，这是它们应从游戏中移除的指示。但是，在遍历列表时不能从列表中移除对象（这会导致“并发修改异常”错误并使程序崩溃）。为了解决这个问题，在\
  \ GameScreen 类中，有一个名为 removeList 的 ArrayList。在 create 方法中，它被初始化：\n\n```\nremoveList\
  \ = new ArrayList<BaseActor>();\n```\n\n在 update 方法的开头，其内容被清空：\n\n```\nremoveList.clear();\n\
  ```\n\n然后，如果 laserList 中的某个对象不可见，则将其添加到 removeList 中。之后，你遍历 removeList 并对其每个元素调用\
  \ destroy 方法。这将把它们从游戏中完全移除，同时避免之前描述的错误：\n\n```\nfor ( PhysicsActor laser : laserList\
  \ )\n{\n    wraparound( laser );\n    if ( !laser.isVisible() )\n        removeList.add(\
  \ laser );\n}\n\nfor (BaseActor ba : removeList)\n{\n    ba.destroy();\n}\n```\n\
  \n岩石与爆炸\n\n接下来，是时候处理太空岩石游戏中的岩石了。不需要有一个基础版的对象供以后克隆，因为岩石在被激光击中时会被摧毁，并且之后不会生成新的岩石。¹\
  \ 为简单起见，你仍然可以创建一个基础版本并重复克隆它，以生成游戏开始时在屏幕上漂移的岩石集合。然而，你将尝试让单个岩石的外观和行为有所不同，以增加游戏的趣味性。具体来说，岩石将使用不同的图像（文件名是\
  \ rock0.png、rock1.png、rock2.png 和 rock3.png），初始位置将是随机的，并且它们将具有不同的速度和旋转速率。在这里，你还必须初始化用于跟踪岩石以进行碰撞检测的\
  \ ArrayList。实现此目的的代码如下：\n\n```\nrockList = new ArrayList<PhysicsActor>();\nint numRocks\
  \ = 6;\nfor (int n = 0; n < numRocks; n++)\n{\n    PhysicsActor rock = new PhysicsActor();\n\
  \nString fileName = \"assets/rock\" + (n%4) + \".png\";\n    Texture rockTex = new\
  \ Texture(Gdx.files.internal(fileName));\n    rockTex.setFilter(TextureFilter.Linear,\
  \ TextureFilter.Linear);\n    rock.storeAnimation( \"default\", rockTex );\n```\n\
  \n\nrock.setPosition(800 * MathUtils.random(), 600 * MathUtils.random() );\n   \
  \ rock.setOriginCenter();\n    rock.setEllipseBoundary();\n    rock.setAutoAngle(false);\n\
  \nfloat speedUp = MathUtils.random(0.0f, 1.0f);\n    rock.setVelocityAS( 360 * MathUtils.random(),\
  \ 75 + 50*speedUp );\n    rock.addAction( Actions.forever( Actions.rotateBy(360,\
  \ 2 - speedUp) ) );\n\nmainStage.addActor(rock);\n    rockList.add(rock);\n    rock.setParentList(rockList);\n\
  }\n\n在 `GameScreen` 类的 `update` 方法中，需要添加一些代码，使岩石以与飞船相同的方式环绕屏幕：\n\n```\nfor ( PhysicsActor\
  \ rock : rockList )\n{\n    wraparound( rock );\n}\n```\n\n这是另一个编译项目并运行游戏的好时机，以确保岩石对象的行为符合预期。\n\
  \n接下来，你将设置一个 `AnimatedActor`，用于存储当激光与岩石碰撞时出现的爆炸动画。对于由多张图片组成的动画序列，通常的做法是将所有这些图片合并到一个称为*精灵表*的单一图像文件中，你将要使用的图片正是这种情况，如图\
  \ 6-5 所示。\n\n![9781484215012_Fig06-05.jpg](img/9781484215012_Fig06-05.jpg)\n\n图\
  \ 6-5. 由爆炸动画图片组成的精灵表\n\n`TextureRegion` 类有一个名为 `split` 的方法，该方法将图像分割成矩形区域，并将结果以 `TextureRegion`\
  \ 对象的二维数组形式返回，你可以将其转换为 `Array` 并用于创建 `Animation`。为了方便起见，我编写了一个名为 `parseSpriteSheet`\
  \ 的静态方法，用于执行这些步骤。具体来说，该方法包含一个嵌套的 `for` 循环，在创建动画之前将二维数组的内容转换为一维数组。此方法位于一个名为 `GameUtils`\
  \ 的新辅助类中；该类的代码如下所示：\n\n```\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.Texture;\n\
  import com.badlogic.gdx.graphics.g2d.TextureRegion;\nimport com.badlogic.gdx.graphics.g2d.Animation;\n\
  import com.badlogic.gdx.graphics.g2d.Animation.PlayMode;\nimport com.badlogic.gdx.utils.Array;\n\
  import com.badlogic.gdx.graphics.Texture.TextureFilter;\n\npublic class GameUtils\n\
  {\n    public static Animation parseSpriteSheet(String fileName, int frameCols,\
  \ int frameRows,\n        float frameDuration, PlayMode mode)\n    {\n        Texture\
  \ t = new Texture(Gdx.files.internal(fileName), true);\n        t.setFilter(TextureFilter.Linear,\
  \ TextureFilter.Linear);\n\nint frameWidth = t.getWidth() / frameCols;\n       \
  \ int frameHeight = t.getHeight() / frameRows;\n\nTextureRegion[][] temp = TextureRegion.split(t,\
  \ frameWidth, frameHeight);\n        TextureRegion[] frames = new TextureRegion[frameCols\
  \ * frameRows];\n\nint index = 0;\n        for (int i = 0; i < frameRows; i++)\n\
  \        {\n            for (int j = 0; j < frameCols; j++)\n            {\n   \
  \             frames[index] = temp[i][j];\n                index++;\n          \
  \  }\n        }\n\nArray<TextureRegion> framesArray = new Array<TextureRegion>(frames);\n\
  \        return new Animation(frameDuration, framesArray, mode);\n    }\n}\n```\n\
  \n现在，回到 `GameScreen` 类的 `create` 方法，这个生成动画的方法用于创建基础对象，之后所有爆炸效果都将从该对象克隆而来：\n\n```\n\
  baseExplosion = new AnimatedActor();\nAnimation explosionAnim = GameUtils.parseSpriteSheet(\n\
  \    \"assets/explosion.png\", 6, 6, 0.03f, PlayMode.NORMAL);\nbaseExplosion.storeAnimation(\
  \ \"default\", explosionAnim );\nbaseExplosion.setWidth(96);\nbaseExplosion.setHeight(96);\n\
  baseExplosion.setOriginCenter();\n```\n\n最后，回到 `GameScreen` 类的 `update` 方法。当激光与岩石重叠时，激光和岩石都应从游戏中移除，并且应从\
  \ `baseExplosion` 克隆一个爆炸对象，并将其中心定位在岩石的位置。爆炸对象不需要添加到任何 `ArrayList` 中；此外，可以设置一个 `Action`，使爆炸在动画完成后自动从舞台中移除（这需要\
  \ 1.08 秒，因为 36 张动画图片每张显示 0.03 秒）。由于需要检查每一对激光和岩石是否重叠，必须在遍历 `laserList` 的循环内插入以下代码：\n\
  \n```\nfor ( PhysicsActor rock : rockList )\n{\n    if ( laser.overlaps(rock, false)\
  \ )\n    {\n        removeList.add( laser );\n        removeList.add( rock );\n\
  \        AnimatedActor explosion = baseExplosion.clone();\n        explosion.moveToOrigin(rock);\n\
  \        mainStage.addActor(explosion);\n        explosion.addAction( Actions.sequence(Actions.delay(1.08f),\
  \ Actions.removeActor()) );\n    }\n}\n```\n\n下一步\n\n至此，我们的 Space Rocks 示例就完成了；完整的源代码可以在本章的\
  \ SpaceRocks 目录中找到。然而，如前所述，这绝不是一个完整的游戏。你应该尝试添加各种功能，例如：\n\n*   一个包含开始游戏按钮的菜单屏幕。\n\
  *   背景音乐和音效（例如激光发射或爆炸的声音）。\n*   一个显示已摧毁岩石数量的用户界面。\n*   飞船与岩石碰撞时爆炸。\n*   限制屏幕上同时出现的激光数量。\n\
  *   如果所有岩石都被摧毁，显示“恭喜”消息。\n*   如果飞船被摧毁，显示“游戏结束”消息。\n*   集成游戏手柄控制器支持。\n*   任何你能想到的其他功能！\n\
  \nPlane Dodger\n\n本节介绍一款名为 *Plane Dodger* 的游戏，其灵感来源于 Flappy Bird 和 Jetpack Joyride\
  \ 等现代触屏游戏。在这款游戏中，用户控制一架绿色飞机，在持续飞越游戏世界时可以上下机动。星星会定期出现在天空中；用户的目标是尽可能多地收集星星。同时，“敌方”红色飞机也会定期出现；躲避这些飞机必须是用户的首要任务，因为与它们碰撞将结束游戏。随着时间的推移，红色飞机的速度会加快，游戏难度也随之增加。图\
  \ 6-6 展示了这款游戏的运行画面。\n\n![9781484215012_Fig06-06.jpg](img/9781484215012_Fig06-06.jpg)\n\
  \n图 6-6. Plane Dodger 游戏\n\n这款游戏所包含的新游戏机制如下：\n\n*   侧视视角\n*   通过向左滚动背景来营造向右移动的错觉\n\
  *   使用*视差*效果营造深度感：使远处的物体滚动得更慢\n*   使用恒定加速度模拟重力\n*   随机化游戏特性，每次产生不同的游戏体验\n\n与上次一样，你应该先在\
  \ BlueJ 中创建一个新项目，并从上一个项目中复制 `BaseGame`、`BaseScreen`、`BaseActor`、`AnimatedActor`\
  \ 和 `PhysicsActor` 类，以及最近创建的 `GameUtils` 类。像往常一样，你还应该创建一个启动器风格的类和一个继承 `BaseGame`\
  \ 的类。此外，你应该将本章源目录 `PlaneDodger/assets` 中的所有图片复制到你本地项目的 `assets` 文件夹中。与上一个项目一样，你首先创建一个新的\
  \ `GameScreen` 类，并声明所需的变量：\n\n\n\n```\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\n\
  import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.Texture.TextureFilter;\n\
  import com.badlogic.gdx.graphics.g2d.Animation;\nimport com.badlogic.gdx.graphics.g2d.Animation.PlayMode;\n\
  import com.badlogic.gdx.scenes.scene2d.actions.Actions;\nimport com.badlogic.gdx.math.MathUtils;\n\
  import java.util.ArrayList;\n\npublic class GameScreen extends BaseScreen\n{\n    private\
  \ PhysicsActor[] background;\n    private PhysicsActor[] ground;\n    private PhysicsActor\
  \ player;\n\nprivate PhysicsActor baseEnemy;\n    private ArrayList<PhysicsActor>\
  \ enemyList;\n    private float enemyTimer;\n    private float enemySpeed;\n\nprivate\
  \ PhysicsActor baseStar;\n    private ArrayList<PhysicsActor> starList;\n    private\
  \ float starTimer;\n\nprivate AnimatedActor baseSparkle;\n    private AnimatedActor\
  \ baseExplosion;\n\nprivate ArrayList<BaseActor> removeList;\n    private boolean\
  \ gameOver;\n\n// 游戏世界尺寸\n    final int mapWidth = 800;\n    final int mapHeight\
  \ = 600;\n\npublic GameScreen(BaseGame g)\n    {  super(g);  }\n\npublic void create()\n\
      {    }\n\npublic void update(float dt)\n    {    }\n}\n```\n\n无限滚动效果\n\n接下来，将设置背景元素以实现“无限”滚动效果。为此，需要使用*无缝纹理*：一种可以并排放置且不会产生明显边界的图像。将使用该图像的两个副本，每个副本至少与屏幕一样大。设置方式如图\
  \ 6-7 所示；虚线边界矩形包含无缝纹理，实线边界矩形代表游戏屏幕。图像 2 的左边缘紧邻图像 1 的右边缘，两者以相同速度向左移动。当图像 1 的右边缘完全移过屏幕左边缘时，图像\
  \ 1 将被重新定位到另一侧：图像 1 的左边缘将紧邻图像 2 的右边缘。此过程无限循环。\n\n![9781484215012_Fig06-07.jpg](img/9781484215012_Fig06-07.jpg)\n\
  \n图 6-7. 定位无缝纹理以创建无限滚动效果\n\n为此，在 create 方法中初始化一个名为 background 的数组，该数组将包含两个 PhysicsActor\
  \ 对象。创建第一个对象后，通过克隆第一个对象并按照前述方式更改其 x 坐标来创建第二个实例。然后，将这两个对象都添加到 background 和 mainStage\
  \ 中。实现此功能的代码如下：\n\n```\nbackground = new PhysicsActor[2];\n\nPhysicsActor bg0 = new\
  \ PhysicsActor();\nbg0.storeAnimation( \"default\", new Texture(Gdx.files.internal(\"\
  assets/sky.png\")) );\nbg0.setPosition( 0, 0 );\nbg0.setVelocityXY(-50,0);\nbackground[0]\
  \ = bg0;\nmainStage.addActor( bg0 );\n\nPhysicsActor bg1 = bg0.clone();\nbg1.setX(\
  \ bg0.getWidth() );\nbackground[1] = bg1;\nmainStage.addActor(bg1);\n```\n\n接下来，必须在\
  \ update 方法中添加以下代码，以便在这些元素移过屏幕左边缘后重新定位它们：\n\n```\n// 管理背景对象\nfor (int i = 0; i <\
  \ 2; i++)\n{\n    PhysicsActor bg = background[i];\n    if ( bg.getX() + bg.getWidth()\
  \ < 0 )\n        bg.setX( bg.getX() + 2 * bg.getWidth() );\n}\n```\n\n要创建无限滚动的地面图像，请重复之前加载天空背景图像的过程：初始化一个数组，设置第一个对象并克隆它以获得第二个对象，依此类推。唯一的区别在于地面图像的速度。如果你曾在乘坐汽车或火车时观察过窗外掠过的风景，可能会注意到远处的物体位置变化比近处的物体慢。这种效果称为*视差*，它为在\
  \ 2D 游戏中增加深度错觉提供了一种简单方法。由于地面应比天空背景图像更靠近玩家，因此地面应以更快的速度移动。为实现此效果，请在 create 方法中添加以下代码：\n\
  \n```\nground = new PhysicsActor[2];\n\nPhysicsActor gr0 = new PhysicsActor();\n\
  gr0.storeAnimation( \"default\", new Texture(Gdx.files.internal(\"assets/ground.png\"\
  )) );\ngr0.setPosition( 0, 0 );\ngr0.setVelocityXY(-200,0);\ngr0.setRectangleBoundary();\n\
  ground[0] = gr0;\nmainStage.addActor( gr0 );\n\nPhysicsActor gr1 = gr0.clone();\n\
  gr1.setX( gr0.getWidth() );\nground[1] = gr1;\nmainStage.addActor(gr1);\n```\n\n\
  你还需要在 update 方法中添加相应的代码，放在你刚才编写的用于重新定位背景图像的同一个循环中：\n\n```\nPhysicsActor gr = ground[i];\n\
  if ( gr.getX() + gr.getWidth() < 0 )\n     gr.setX( gr.getX() + 2 * gr.getWidth()\
  \ );\n```\n\n此时是编译项目并运行代码以检查一切是否正常的好时机。\n\n玩家飞机\n\n接下来，你将设置玩家对象：一架可以垂直机动的绿色飞机。这架飞机不断受到重力向下拉，但玩家可以通过按下键盘上的按键施加垂直推力使其向上移动。\n\
  \n为了简化此对象（以及后续其他对象）动画的创建，你现在将在新的 GameUtils 类（在上一节中介绍）中编写另一个辅助方法。此方法名为 parseImageFiles，它将从一组图像文件创建动画，前提是这些文件遵循指定的命名约定：文件名应完全相同，只是用于指定显示顺序的数字不同。此过程（你在之前的程序中已经见过）通过以下代码实现：\n\
  \n```\n// 从一组图像文件创建动画\n// 名称格式：fileNamePrefix + N + fileNameSuffix，其中 0 <= N < frameCount\n\
  \npublic static Animation parseImageFiles(String fileNamePrefix, String fileNameSuffix,\n\
      int frameCount, float frameDuration, PlayMode mode)\n{\n    TextureRegion[]\
  \ frames = new TextureRegion[frameCount];\n\nfor (int n = 0; n < frameCount; n++)\n\
      {\n        String fileName = fileNamePrefix + n + fileNameSuffix;\n        Texture\
  \ tex = new Texture( Gdx.files.internal(fileName) );\n        tex.setFilter(TextureFilter.Linear,\
  \ TextureFilter.Linear);\n        frames[n] = new TextureRegion( tex );\n    }\n\
  \nArray<TextureRegion> framesArray = new Array<TextureRegion>(frames);\n    return\
  \ new Animation(frameDuration, framesArray, mode);\n}\n```\n\n回到 GameScreen 类，现在将添加玩家对象的代码。首先，在\
  \ create 方法中使用以下代码进行初始化。特别注意，你为加速度设置了一个负的 y 分量来模拟重力下拉；此值在整个程序中保持不变。\n\n```\nplayer\
  \ = new PhysicsActor();\nAnimation anim = GameUtils.parseImageFiles(\n    \"assets/planeGreen\"\
  , \".png\", 3, 0.1f, Animation.PlayMode.LOOP_PINGPONG);\nplayer.storeAnimation(\
  \ \"default\", anim );\nplayer.setPosition(200,300);\nplayer.setAccelerationXY(0,\
  \ -600); // 重力\nplayer.setOriginCenter();\nplayer.setEllipseBoundary();\nmainStage.addActor(\
  \ player );\n```\n\n\n\n接下来，你需要添加一些代码，让玩家能够控制飞机。当玩家按下某个按键时，飞机应获得一个向上的速度提升。这里将其实现为一个离散事件（类似于《Flappy\
  \ Bird》游戏的方式），因此需要在 `GameScreen` 类中重写 `keyDown` 方法，具体如下：\n\n```\npublic boolean\
  \ keyDown(int keycode)\n{\n    if (keycode == Keys.SPACE)\n        player.setVelocityXY(0,300);\n\
  \nreturn false;\n}\n```\n\n不过，如果你愿意，也可以将飞机的速度调整改为连续事件（类似于《Jetpack Joyride》游戏的方式）；你可以不采用上述代码，而是在\
  \ `update` 方法中轮询键盘输入，并增加向上的速度，具体如下：\n\n```\nif (Gdx.input.isKeyPressed(Keys.SPACE))\n\
      player.addVelocityXY(0, 25);\n```\n\n请注意，这里速度在 y 方向上的变化量远小于离散事件版本。这是因为连续事件每秒会被处理\
  \ 60 次（在可能的情况下），所以速度的变化量必须更小以进行补偿。\n\n最后，`update` 方法中会包含一些碰撞检测代码。具体来说，如果玩家碰到屏幕顶部或地面，玩家的速度应设为零，并且玩家的位置应相应调整。对于屏幕顶部，你可以轻松计算出新位置；对于地面对象，你可以利用\
  \ `overlaps` 方法，当第二个参数设为 `true` 时，该方法会调整 `BaseActor` 对象的位置。\n\n```\nif ( player.getY()\
  \ > mapHeight - player.getHeight() )\n{\n     player.setVelocityXY(0,0);\n     player.setY(\
  \ mapHeight - player.getHeight() );\n}\n\nfor (int i = 0; i < 2; i++)\n{\n    PhysicsActor\
  \ gr = ground[i];\n    if ( player.overlaps(gr, true) )\n    {\n        player.setVelocityXY(0,0);\n\
      }\n}\n```\n\n再次提醒，现在是测试项目并验证一切是否按预期运行的好时机。\n\n星星与闪光效果\n\n接下来，你初始化 `baseStar`，这是一个对象，稍后将从中克隆出可收集的星星对象。星星应相对于地面保持静止，因此\
  \ `baseStar` 的速度应设置为与地面对象的速度相同。还需要初始化用于存储星星的 `ArrayList`，以便稍后在 `update` 方法中使用，同时初始化一个名为\
  \ `starTimer` 的浮点数，用于跟踪何时应创建新的星星对象。\n\n```\nbaseStar = new PhysicsActor();\nTexture\
  \ starTex = new Texture(Gdx.files.internal(\"assets/star.png\"));\nstarTex.setFilter(TextureFilter.Linear,\
  \ TextureFilter.Linear);\nbaseStar.storeAnimation( \"default\", starTex );\nbaseStar.setVelocityXY(-200,0);\n\
  baseStar.setOriginCenter();\nbaseStar.setEllipseBoundary();\n\nstarList = new ArrayList<PhysicsActor>();\n\
  starTimer = 0;\n```\n\n此时，你还需要设置 `baseSparkle`，这是一个对象，每当收集到星星时，就会从中克隆出一个闪烁动画效果。动画的图像包含在一个精灵表中，因此可以在此处使用\
  \ `GameUtils` 类的相应方法：\n\n```\nbaseSparkle = new AnimatedActor();\nAnimation sparkleAnim\
  \ = GameUtils.parseSpriteSheet(\n    \"assets/sparkle.png\", 8,8, 0.01f, PlayMode.NORMAL);\n\
  baseSparkle.storeAnimation( \"default\", sparkleAnim );\nbaseSparkle.setWidth(64);\n\
  baseSparkle.setHeight(64);\nbaseSparkle.setOriginCenter();\n```\n\n在你仍在处理 `create`\
  \ 方法时，还必须初始化用于移除对象的 `ArrayList`：\n\n```\nremoveList = new ArrayList<BaseActor>();\n\
  ```\n\n接下来，在 `update` 方法中，添加以下代码，根据经过的时间（`dt`）来增加 `starTimer`。如果超过 1 秒，则重置 `starTimer`\
  \ 的值，并通过 `baseStar` 对象的 `clone` 方法创建一个新的星星。此外，新克隆的星星的垂直位置是随机化的，这样每次游戏的玩法都会有所不同。\n\
  \n```\nstarTimer += dt;\nif (starTimer > 1)\n{\n    starTimer = 0;\n    PhysicsActor\
  \ star = baseStar.clone();\n    star.setPosition( 900, MathUtils.random(100,500)\
  \ );\n\nstarList.add( star );\n    star.setParentList( starList );\n    mainStage.addActor(\
  \ star );\n}\n```\n\n最后，你设定了星星应从游戏中移除的条件：如果星星移出屏幕左边缘，或者玩家与星星重叠。在这两种情况下，星星都会被添加到\
  \ `removeList` 中，稍后将使用该列表调用 `destroy` 方法。在后一种情况下，你还需要通过克隆 `baseSparkle` 来生成一个新的闪光对象，并添加一系列动作，使闪光在动画播放足够长时间后从舞台中移除自身（因为精灵表中有\
  \ 64 张图像，每张显示 0.01 秒，动画在 0.64 秒后完成）。这些任务通过以下代码完成：\n\n```\nremoveList.clear();\n\n\
  for (PhysicsActor star : starList)\n{\n    if ( star.getX() + star.getWidth() <\
  \ 0)\n        removeList.add(star);\n\nif ( player.overlaps(star, false) )\n    {\n\
          removeList.add(star);\n        AnimatedActor sparkle = baseSparkle.clone();\n\
