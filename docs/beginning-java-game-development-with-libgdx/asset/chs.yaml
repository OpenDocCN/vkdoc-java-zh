  \  {  }\n}\n```\n\n打好这个基础后，你现在将创建一个 Game 类的扩展，该扩展会创建一个 CheeseLevel 类的实例（在此过程中将自身作为参数传递），并将其设置为活动屏幕：\n\
  \n```\nimport com.badlogic.gdx.Game;\npublic class CheeseGame extends Game\n{\n\
