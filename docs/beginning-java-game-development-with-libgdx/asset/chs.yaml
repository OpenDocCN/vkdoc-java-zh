  \n现在你已经了解了 BaseScreen 类如何帮助你精简之前的代码，在下一节中，你将看到它如何简化一个全新游戏的创建，该游戏采用完全不同的（鼠标驱动）控制方案。\n\
  \n气球爆破：一款鼠标驱动的游戏\n\n本节介绍一款名为*气球爆破*的游戏，它有两个目的：第一，说明上一节中 BaseScreen 类的通用适用性；第二，展示一款仅使用鼠标操作的游戏（与仅使用键盘操作的“奶酪，拜托！”形成对比）。\n\
  \n在图 3-2 所示的气球爆破游戏中，玩家的目标是尽可能多地戳破气球。气球以固定的时间间隔在屏幕左侧生成，然后按照各种随机模式向右飘过屏幕。游戏会持续进行，直到玩家决定退出。程序会跟踪并显示各种统计数据：已戳破的气球总数、\n\
  \n![9781484215012_Fig03-02.jpg](img/9781484215012_Fig03-02.jpg)\n\n图 3-2. 气球爆破游戏截图\n\
  \n逃出屏幕的气球数量，以及*命中率*（戳破的气球数与鼠标点击次数之比）。命中率值越接近 100%，玩家的准确度就越高。\n\n此时，你在 BlueJ 中创建一个新项目。你需要将\
  \ BaseScreen 和 BaseActor 类的代码复制到该项目中。此外，你还需要一个启动器类，以及一个继承 Game 并初始化及设置第一个（也是本游戏中唯一的）要显示的屏幕\
  \ BalloonLevel（接下来会描述）的类。相应的类也可以从上一个项目中复制过来，并根据需要进行修改。\n\n你将编写一个名为 BalloonLevel\
  \ 的类，它继承 BaseScreen 类，并且你将重用上一个游戏中的 BaseActor 类。这使你能够专注于确定 BalloonLevel 类所需的字段，以及\
  \ create 和 update 方法的内容。\n\n\n\n在《气球爆破者》中，主舞台上出现的游戏实体只有背景图像（天空）和玩家将要戳破的气球。你需要一个变量来记录自上一个气球生成以来经过的时间，以判断何时生成下一个气球。你还需要记录戳破的气球数量、逃逸的气球数量以及鼠标点击次数；将使用标签对象在用户界面舞台上显示这些数值。最后，你需要存储游戏世界的宽度和高度，因为需要它们来判断气球何时飞出屏幕。以下是包含这些变量的\
  \ `BalloonLevel` 类代码，以及你最终需要的所有导入语句。`create` 和 `update` 方法目前为空；你将在本节稍后部分填充它们。\n\n\
  ```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.Color;\n\
  import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.scenes.scene2d.Actor;\n\
  import com.badlogic.gdx.scenes.scene2d.ui.Label;\nimport com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;\n\
  import com.badlogic.gdx.graphics.g2d.BitmapFont;\nimport com.badlogic.gdx.scenes.scene2d.InputListener;\n\
  import com.badlogic.gdx.scenes.scene2d.InputEvent;\n\npublic class BalloonLevel\
  \ extends BaseScreen\n{\n    private BaseActor background;\n\nprivate float spawnTimer;\n\
      private float spawnInterval;\n\nprivate int popped;\n    private int escaped;\n\
      private int clickCount;\n\nprivate Label poppedLabel;\n    private Label escapedLabel;\n\
      private Label hitRatioLabel;\n\n// 游戏世界尺寸\n    final int mapWidth = 640;\n    final\
  \ int mapHeight = 480;\n\npublic BalloonLevel(Game g)\n    {  super(g);  }\n\npublic\
  \ void create()\n    {      }\n\npublic void update(float dt)\n    {      }\n}\n\
  ```\n\n气球\n\n从编码角度来看，气球实体特别有趣。你希望每个气球根据一组在创建时随机生成的参数，以略有不同的方式移动。由于每个气球都需要存储这些信息，且这些信息对每个实例都是唯一的，因此你需要编写一个继承自\
  \ `BaseActor` 类的类（命名为 `Balloon`）。这个类还将拥有自己的 `act` 方法，用于设置角色的位置，使其沿着基于正弦波的路径穿过屏幕。你*以参数方式*计算每个气球的位置：x\
  \ 和 y 坐标都是另一个变量 `time` 的函数，`time` 表示自 `Balloon` 对象创建以来经过的时间。随着时间的推移，气球的 x 坐标稳步增加，而\
  \ y 坐标则根据以下公式计算：\n\ny = A × sin(B × x) + C\n\n其中 A 控制正弦波的振幅（或高度）（如图 3-3 所示），B 影响振荡速率（如图\
  \ 3-4 所示），C 控制初始高度。\n\n![9781484215012_Fig03-03.jpg](img/9781484215012_Fig03-03.jpg)\n\
  \n图 3-3. 不同振幅的正弦波：小（虚线）和大（实线）\n\n![9781484215012_Fig03-04.jpg](img/9781484215012_Fig03-04.jpg)\n\
  \n图 3-4. 不同振荡速率的正弦波：小（虚线）和大（实线）\n\n`Balloon` 对象的构造函数会初始化并随机化此公式中使用的值（同时加载纹理）。你使用了\
  \ `MathUtils` 类中的一些函数。`random` 方法在两个给定输入之间生成一个随机浮点值，你用它来为控制气球路径的参数引入一些变化。`sin` 方法计算正弦波函数的值。你还会将\
  \ x 位置初始偏移到屏幕左边缘之外，这样气球对象就不会突然出现在天空中间。该类的源代码如下：\n\n```\nimport com.badlogic.gdx.Gdx;\n\
  import com.badlogic.gdx.math.MathUtils;\nimport com.badlogic.gdx.graphics.Texture;\n\
  \npublic class Balloon extends BaseActor\n{\n    public float speed;\n    public\
  \ float amplitude;\n    public float oscillation;\n    public float initialY;\n\
      public float time;\n    public int offset;\n\npublic Balloon()\n    {\n        speed      \
  \ = 80    * MathUtils.random(0.5f, 2.0f);\n        amplitude   = 50    * MathUtils.random(0.5f,\
  \ 2.0f);\n        oscillation = 0.01f * MathUtils.random(0.5f, 2.0f);\n        initialY    =\
  \ 120   * MathUtils.random(0.5f, 2.0f);\n        time = 0;\n        offsetX = -100;\n\
          setTexture( new Texture( Gdx.files.internal(\"assets/red-balloon.png\"))\
  \ );\n\n// 初始生成位置在屏幕外\n        setX(offsetX);\n    }\n\npublic void act(float dt)\n\
      {\n        super.act(dt);\n        time += dt;\n        // 将起始位置设置为窗口左侧\n        float\
  \ xPos = speed * time + offsetX;\n        float yPos = amplitude * MathUtils.sin(oscillation\
  \ * xPos) + initialY;\n        setPosition( xPos, yPos );\n    }\n}\n```\n\n接下来，你将了解\
  \ `BalloonLevel` 类的 `create` 方法。该方法初始化了前面讨论的大部分变量，为主舞台添加背景图像，为标签对象创建 `BitmapFont`\
  \ 和 `LabelStyle`，然后将每个标签对象添加到包含用户界面元素的舞台中。这里未初始化的一个对象是 `Balloon` 对象；这些对象由 `update`\
  \ 方法处理，稍后将讨论。\n\n```\npublic void create()\n{\n    background = new BaseActor();\n\
      background.setTexture( new Texture(Gdx.files.internal(\"assets/sky.jpg\")) );\n\
      background.setPosition( 0, 0 );\n    mainStage.addActor( background );\n\nspawnTimer\
  \ = 0;\n    spawnInterval = 0.5f;\n\n// 设置用户界面\n    BitmapFont font = new BitmapFont();\n\
      LabelStyle style = new LabelStyle( font, Color.NAVY );\n\npopped = 0;\n    poppedLabel\
  \ = new Label( \"戳破: 0\", style );\n    poppedLabel.setFontScale(2);\n    poppedLabel.setPosition(20,\
  \ 440);\n    uiStage.addActor( poppedLabel );\n\nescaped = 0;\n    escapedLabel\
  \ = new Label( \"逃逸: 0\", style );\n    escapedLabel.setFontScale(2);\n    escapedLabel.setPosition(220,\
  \ 440);\n    uiStage.addActor( escapedLabel );\n\nclickCount = 0;\n    hitRatioLabel\
  \ = new Label( \"命中率: ---\", style );\n    hitRatioLabel.setFontScale(2);\n    hitRatioLabel.setPosition(420,\
  \ 440);\n    uiStage.addActor( hitRatioLabel );\n}\n```\n\n添加交互性\n\n\n\n本节涵盖更新方法的内容。你需要更新\
  \ spawnTimer，一旦它超过预定义的时间间隔（存储在 spawnInterval 中），就创建一个新的 Balloon 实例。在这部分代码中，最重要的是你向\
  \ Balloon 添加了一个对象，使其能够处理输入。你可能还记得本章前面关于 InputMultiplexer 对象的讨论，离散输入事件可以由实现 InputProcessor\
  \ 接口的类以及 Actor 对象来处理（正因如此，你在创建 InputMultiplexer 时包含了 Stage 对象）。你通过 InputListener\
  \ 对象来指定 Actor 应如何响应输入事件，该对象包含与可处理的不同输入类型相对应的方法。由于每个自定义的 InputListener 对象在我们的程序中仅用于一行代码，你可以通过创建匿名内部类来简化代码。\n\
  \n匿名内部类\n\n我们在编写程序时创建变量的原因之一，是为了能在代码的后续位置再次引用它们。然而，有时我们只需要在程序中使用某个实例一次，之后无需再引用它。例如，我们可能想使用\
  \ Scanner 对象来处理文本文件的内容。为此，我们可以创建一个提供对文本文件访问的 File 对象，并将其传递给 Scanner 对象，如下所示：\n\n\
  File f = new File( \"data.txt\" );\nScanner s = new Scanner( f );\n\n但是，由于我们在此程序中之后无需再访问\
  \ File 对象，我们可以在代码中唯一需要它的地方——初始化 Scanner 对象时——创建一个*匿名*¹的 File 实例。\n\nScanner s =\
  \ new Scanner( new File(\"data.txt\") );\n\n在 Java 中，不仅已有的类可以这样初始化，新的类也可以这样创建。例如，假设你正在创建一个游戏，角色通过一个名为\
  \ addScroll 的方法收集 Scroll 对象；每个 Scroll 可以显示不同的消息。Scroll 类定义如下：\n\npublic class Scroll\n\
  {\n    public void displayMessage()  {  }\n}\n\n这个类旨在被扩展，以便 displayMessage 方法可以被重写。然而，如果每个\
  \ Scroll 派生对象只在程序中的一个位置实例化，为所有这些类创建文件会导致大量不必要的额外代码。例如，我们可以创建一个名为 TreasureScroll\
  \ 的类，如下所示：\n\npublic class TreasureScroll extends Scroll\n{\n    public void displayMessage()\n\
  \    {  System.out.print(\"宝藏埋在城堡花园里。\");  }\n}\n\n然后，当玩家将其添加到 Scroll 收藏中时，我们可以创建该对象的匿名实例：\n\
  \nplayer.addScroll( new TreasureScroll() );\n\n我们可以通过以下代码创建一个*匿名内部类*来实现相同的目标：\n\n\
  player.addScroll(\n    new Scroll()\n    {\n        public void displayMessage()\n\
  \        {  System.out.print(\"宝藏埋在城堡花园里。\");  }\n    }\n);\n\n在 addScroll 的调用中，我们创建了一个新对象的实例，该对象扩展了\
  \ Scroll 类，并包含一组花括号，可以在其中放置字段和方法声明，就像普通类一样。这个新对象是*匿名*的，因为实例和类都没有命名，并且它是一个*内部类*，因为它是在另一个类内部定义的类。\n\
  \n同样的方法也适用于接口。例如，假设 Scroll 被定义为一个接口而不是类，如下所示：\n\npublic interface Scroll\n{\n  \
  \  public void displayMessage();\n}\n\n在这种情况下，当创建一个匿名内部类并将其作为参数传递给 addScroll 方法时，该参数将被解释为实现\
  \ Scroll 接口的类。\n\n这种编程模式在创建包含如何响应用户输入代码的对象时特别有用，因为此类对象通常只需要一次，作为输入处理方法的参数。\n\n你将创建一个扩展\
  \ InputListener 类的匿名内部类，其中包含一个名为 touchDown 的方法，当用户触摸或点击由 actor 定义的矩形区域时，该方法会被调用。在此方法中，你让\
  \ actor 从包含它的舞台中移除自身。你还会增加已戳破气球的数量；后一条指令就是为什么 InputListener 是在 BalloonLevel 类而不是\
  \ Balloon 类中添加的原因：它需要访问 BalloonLevel 类中的 popped 变量。\n\n接下来，在 update 方法中，你使用一个 for-each\
  \ 循环遍历存储在 mainStage 对象中的所有 actor 集合，检查它们是否超出了屏幕边界，如果是，则将其从舞台中移除并增加 escaped（逃脱的气球数量）。²\n\
  \n最后，在 update 方法中，你更新用户界面中 Label 对象的文本。你特别小心，仅在 clickCount 大于 0 后才更新显示命中率信息的 Label，以避免运行时出现除零错误。\n\
  \n现在，你已经准备好查看 update 方法的完整源代码：\n\n```\npublic void update(float dt)\n{\n    spawnTimer\
  \ += dt;\n    // 检查下一个气球生成的时间\n    if (spawnTimer > spawnInterval)\n    {\n    \
  \    spawnTimer -= spawnInterval;\n        Balloon b = new Balloon();\n        b.addListener(\n\
  \          new InputListener()\n          {\n             public boolean touchDown\
  \ (InputEvent ev, float x, float y, int pointer, int button)\n             {\n \
  \                popped++;\n                 b.remove();\n                 return\
  \ true;\n             }\n           });\n        mainStage.addActor(b);\n    }\n\
  \n// 移除屏幕外的气球\n    for ( Actor a : mainStage.getActors() )\n    {\n        if (a.getX()\
  \ > mapWidth || a.getY() > mapHeight)\n        {\n            escaped++;\n     \
  \       a.remove();\n        }\n    }\n\n// 更新用户界面\n    poppedLabel.setText( \"\
  已戳破: \" + popped );\n    escapedLabel.setText( \"已逃脱: \" + escaped );\n    if (\
  \ clickCount > 0 )\n    {\n        int percent = (int)(100.0 * popped / clickCount);\n\
  \        hitRatioLabel.setText( \"命中率: \" + percent + \"%\" );\n    }\n}\n```\n\n\
  你可能已经注意到，你在 update 方法中的任何地方都没有更改 clickCount（鼠标点击次数）的值。这是因为点击鼠标按钮是一个离散动作，最好由 BalloonLevel\
  \ 类中的 touchDown 方法处理。（回想一下，所有实现 InputProcessor 接口的类都有一个 touchDown 方法，并且由于我们使用了 InputMultiplexer\
  \ 类，这些类中的每一个都有机会处理用户输入。）为此，你在 update 方法之后立即添加以下代码：\n\n```\npublic boolean touchDown(int\
  \ screenX, int screenY, int pointer, int button)\n{\n    clickCount++;\n    return\
  \ false;\n}\n```\n\n此外，像往常一样，你需要创建一个扩展 Game 类的新类：\n\n```\nimport com.badlogic.gdx.Game;\n\
  public class BalloonGame extends Game\n{\n    public void create()\n    {\n    \
  \    BalloonLevel z = new BalloonLevel(this);\n        setScreen( z );\n    }\n\
  }\n```\n\n同样像往常一样，你需要创建一个新的驱动类：\n\n```\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
  public class BalloonLauncher\n{\n    public static void main ()\n    {\n       \
  \ BalloonGame myProgram = new BalloonGame();\n        LwjglApplication launcher\
  \ = new LwjglApplication( myProgram );\n    }\n}\n```\n\n至此，Balloon Buster 游戏的核心机制就完成了。现在是测试游戏的好时机，看看你能戳破多少个气球！\n\
  \n下一步\n\n\n\n尽管这款游戏功能完整，但仍有许多功能可以更改或添加，以使其更具趣味性或视觉吸引力。以下是一些你可以实现的想法和建议，或许能激发你创造其他修改：\n\
  \n*   添加一个包含按钮图片的启动画面，点击即可开始游戏。\n*   改用 `gray-balloon.png` 图片，并在气球生成时随机选择一种颜色为其着色。\n\
  *   当气球被戳破时，添加一个动作，让气球缓慢淡出，而不是直接消失。\n*   添加结束条件——例如，游戏在固定时间后结束，或在一定数量的气球逃脱后结束，或总共生成了\
  \ 100 个气球后结束。\n*   完全改变游戏机制：随机生成红色和绿色气球；戳破绿色气球增加分数，而戳破红色气球则扣分或结束游戏。\n*   任何你能想到的其他点子——创意无限！\n\
  \n海星收集者：一款拥有改进角色类的游戏\n\n本节将介绍本章的另一款新游戏，也是最后一款游戏：海星收集者。开发这款游戏将涉及重新排列和向 `BaseActor`\
  \ 和 `AnimatedActor` 类添加一些功能，以及创建一个新类 `PhysicsActor` 以实现更逼真的运动。在这些类以及我们的新游戏程序中，你还会用到一些\
  \ Java 内置的数据结构类。\n\n数据结构\n\n*数据结构* 是用于存储、组织和访问数据的专用格式。\n\n在 Java 编程中，通常遇到的第一个数据结构是\
  \ *数组*，它可以存储固定数量的单一类型对象；存储在数组中的值之后可以通过引用数组内位置索引的整数来访问。虽然数组易于理解，但它有一些缺点，例如创建时大小固定，以及可能不直观地将数字与每个数组元素关联起来。\n\
  \nJava 提供了多种解决这些问题的数据结构，这里介绍其中两种（你将在本章及后续章节中用到它们）。\n\n其中一种数据结构是 `ArrayList` 类。它可以用来存储任意数量的单一类型对象；其大小不固定，创建时也无需指定。对象可以像数组一样被添加到特定位置，但也可以使用\
  \ `add` 方法将对象添加到 `ArrayList` 的末尾（这也会使 `ArrayList` 的大小增加 1）。\n\n使用 `ArrayList` 的另一个便利之处在于，如果你想使用循环对每个元素执行某些操作，可以使用\
  \ for-each 循环（如下代码所示），它允许你创建一个索引变量，该变量遍历存储在 `ArrayList` 中的 *对象*；这与遍历标准数组形成对比，在标准数组中，你的索引变量必须是遍历数组中存储对象\
  \ *位置* 的 `int` 类型，并且检索对象本身需要额外的代码行。\n\n最后，可以使用 `remove` 方法并传入对象本身来从 `ArrayList`\
  \ 中移除对象（这也会使 `ArrayList` 的大小减少 1）。要用数组完成同样的任务则困难得多：首先，我们必须以某种方式确定要移除对象的索引；其次，对象实际上甚至无法被移除——它通常被替换为\
  \ `null` 对象，并且数组的大小不会改变。\n\n作为对比，以下是同一代码的两种变体。首先，我们使用数组：\n\n```java\n// 初始化数组\n\
  String[] names = new String[3];\n\n// 向数组添加数据\nnames[0] = \"Lee\";\nnames[1] = \"\
  Dan\";\nnames[2] = \"Chris\";\n\n// 打印名字\nfor (int i = 0; i < names.length; i++)\n\
  {\n    String n = names[i];\n    System.out.println( n );\n}\n\n// 从数组中删除 \"Lee\"\
  \nnames[0] = null;\n\n// names.length 仍然等于 3\n```\n\n接下来，我们编写一些使用 `ArrayList` 类的等效代码：\n\
  \n```java\n// 初始化 ArrayList\nArrayList<String> names = new ArrayList<String>();\n\
  \n// 向 ArrayList 添加数据\nnames.add(\"Lee\");\nnames.add(\"Dan\");\nnames.add(\"Chris\"\
  );\n\n// 打印名字\nfor (String n : names)\n{\n    System.out.println( n );\n}\n\n//\
  \ 从 ArrayList 中删除 \"Lee\"\nnames.delete(\"Lee\");\n\n// 现在，names.size() 等于 2\n```\n\
  \n在许多情况下，前面代码的 `ArrayList` 版本更直观且更易于维护。\n\n另一种有用的数据结构称为 *关联数组*，它存储成对的对象。对中的第一个对象称为\
  \ *键*；第二个对象称为 *值*。所有键都是相同类型的对象，所有值也是相同类型的对象（但键的类型可能与值的类型不同）。标准的 Java 数组是关联数组的一个特例，其中键是连续的整数，范围从\
  \ 0 到某个数字 *n*。\n\nJava 中的 `HashMap` 类提供了关联数组的所有功能。例如，也许我们想在游戏中存储一个名字列表（每个都是 `String`）及其相关的高分（每个都是\
  \ `Integer`）。我们初始化 `HashMap` 对象的方式与初始化 `ArrayList` 对象类似，不同之处在于尖括号内包含键类型和值类型的名称。可以使用\
  \ `put` 方法存储键值对，使用 `get` 方法并传入关联键的名称来检索值，使用 `remove` 方法并传入键的名称来删除键值对。你还可以使用 `containsKey`\
  \ 和 `containsValue` 方法检查 `HashMap` 中是否存在给定的键或值。以下示例演示了其中一些方法：\n\n```java\n// 初始化\
  \ HashMap\nHashMap<String,Integer> highScores = new HashMap<String,Integer>();\n\
  \n// 向 HashMap 添加数据\nhighScores.put( \"Lee\", 337 );\nhighScores.put( \"Dan\", 9001\
  \ );\nhighScores.put( \"Chris\", 3333361 );\n\n// 检索一个值\nint danScore = highScores.get(\
  \ \"Dan\" );\n\n// 删除一个条目\nhighScores.remove( \"Chris\" );\n\n// 现在，highScores.size()\
  \ 等于 2\n// 并且 highScores.containsKey( \"Chris\" ) 返回 false\n```\n\n此时，你将在 BlueJ\
  \ 中为海星收集者游戏启动一个新项目。首先，从之前的项目中复制 `BaseActor` 和 `AnimatedActor` 类的代码，你将在接下来的章节中对它们进行修改。\n\
  \nBaseActor 类\n\n首先，你将处理 `BaseActor` 类。这个类的目的是管理单个纹理和一个碰撞多边形；你移除了与速度相关的代码（这些代码将成为\
  \ `PhysicsActor` 类的一部分）。你还将 `Rectangle` 对象替换为 `Polygon` 对象。`Polygon` 是一种数据结构，它根据其顶点（角）的坐标来定义形状；它用一个浮点值数组初始化，该数组依次定义顶点的坐标。例如，如果一个多边形的顶点是\
  \ (x0,y0), (x1,y1), … , (xN,yN)，那么相应的 `Polygon` 对象将用数组 {x0, y0, x1, y1, … , xN,\
  \ yN} 初始化。此外，与 `Rectangle` 对象不同，`Polygon` 可以平移和旋转，这在以后会很有用。我们通过列出 `import` 语句的代码、声明所需的变量、编写构造函数来初始化这些变量，并重复自上一版本以来未更改的方法：`setTexture`、`act`\
  \ 和 `draw`，来开始介绍 `BaseActor` 类。\n\n```java\nimport com.badlogic.gdx.scenes.scene2d.Actor;\n\
  import com.badlogic.gdx.graphics.g2d.Batch;\nimport com.badlogic.gdx.graphics.Texture;\n\
  import com.badlogic.gdx.graphics.g2d.TextureRegion;\nimport com.badlogic.gdx.graphics.Color;\n\
  import com.badlogic.gdx.math.Rectangle;\nimport com.badlogic.gdx.math.Polygon;\n\
  import com.badlogic.gdx.math.MathUtils;\nimport com.badlogic.gdx.math.Intersector;\n\
  import com.badlogic.gdx.math.Intersector.MinimumTranslationVector;\n```\n\n\npublic\
  \ class BaseActor extends Actor\n{\n    public TextureRegion region;\n    public\
  \ Polygon boundingPolygon;\n\npublic BaseActor()\n    {\n        super();\n        region\
  \ = new TextureRegion();\n        boundingPolygon = null;\n    }\n\npublic void\
  \ setTexture(Texture t)\n    {\n        int w = t.getWidth();\n        int h = t.getHeight();\n\
          setWidth( w );\n        setHeight( h );\n        region.setRegion( t );\n\
      }\n    public void act(float dt)\n    {\n        super.act( dt );\n    }\n\n\
  public void draw(Batch batch, float parentAlpha)\n    {\n        Color c = getColor();\n\
          batch.setColor(c.r, c.g, c.b, c.a);\n        if ( isVisible() )\n            batch.draw(\
  \ region, getX(), getY(), getOriginX(), getOriginY(),\n                getWidth(),\
  \ getHeight(), getScaleX(), getScaleY(), getRotation() );\n    }\n\n}\n```\n\n指定多边形的坐标可能是一项费力的工作，因此在\
  \ BaseActor 类中，你将包含一对方法，用于初始化一个 `Polygon` 对象，可以是矩形形状，也可以是近似圆形或椭圆形的形状。\n\n矩形的坐标很容易计算。如果矩形的宽度为\
  \ w，高度为 h，那么（如图 3-5 所示），顶点按逆时针顺序的坐标分别为 (0,0)、(w,0)、(w,h) 和 (0,h)。你可以使用浮点数数组 {0,0,\
  \ w,0, w,h, h,0} 来初始化这个多边形。`setRectangleBoundary` 方法将为你完成此设置。\n\n![9781484215012_Fig03-05.jpg](img/9781484215012_Fig03-05.jpg)\n\
  \n图 3-5. 矩形的顶点\n\n你的另一个方法 `setEllipseBoundary` 将用于初始化一个多边形，该多边形近似于包含在图 3-5 所示矩形区域内的椭圆形状³。此方法涉及一些数学方程来计算顶点的坐标。三角函数，正弦和余弦，可用于*参数化*圆或椭圆，这意味着你可以根据另一个变量\
  \ t 来编写 x 和 y 坐标的函数。例如，如果我们令 x = cos(t) 且 y = sin(t)，那么当变量 t 的取值范围从 0 到 2 × pi（约\
  \ 6.28）⁴ 时，对应的 (x,y) 点将描绘出半径为 1 的圆的形状。你可以调整这些方程来生成一个恰好适合给定矩形区域的椭圆，如图 3-6 所示。首先，你必须将\
  \ x 乘以 w/2，将 y 乘以 h/2（即缩放），这样椭圆才能有正确的大小。然而，这样得到的椭圆以原点为中心，而你希望椭圆以 (w/2, h/2) 为中心；因此，你需要将这些值分别加到\
  \ x 和 y 方程中。方程的最终形式如下：\n\n```\nx = w/2 * cos(t) + w/2\ny = h/2 * sin(t) + h/2\n\
  ```\n\n`setEllipseBoundary` 方法包含一个循环，用于在区间 [0, 6.28] 内生成一组 n 个等间距的 t 值，然后计算对应的 x\
  \ 和 y 坐标，并将它们存储在一个数组中，该数组将用于初始化多边形。如果 n = 4，多边形将是一个菱形；如果 n = 8，多边形将是一个八边形，依此类推。n\
  \ 的值越大，形状就越平滑。然而，这里有一个权衡：通用多边形的碰撞检测计算量很大；n 值过大会显著降低程序运行速度。对于你将创建的游戏，n = 8 就足够了；图\
  \ 3-7 展示了一个椭圆及其多边形近似。\n\n![9781484215012_Fig03-06.jpg](img/9781484215012_Fig03-06.jpg)\n\
  \n图 3-6. 包含在矩形内的椭圆\n\n![9781484215012_Fig03-07.jpg](img/9781484215012_Fig03-07.jpg)\n\
  \n图 3-7. 椭圆及其多边形近似\n\n`setRectangleBoundary` 和 `setEllipseBoundary` 的代码，以及一个名为 `getBoundingPolygon`\
  \ 的方法（该方法返回此角色的碰撞多边形，并根据角色的当前位置和旋转进行调整）如下所示。\n\n```\npublic void setRectangleBoundary()\n\
  {\n    float w = getWidth();\n    float h = getHeight();\n    float[] vertices = {0,0,\
  \ w,0, w,h, 0,h};\n    boundingPolygon = new Polygon(vertices);\n    boundingPolygon.setOrigin(\
  \ getOriginX(), getOriginY() );\n}\n\npublic void setEllipseBoundary()\n{\n    int\
  \ n = 8; // 顶点数量\n    float w = getWidth();\n    float h = getHeight();\n    float[]\
  \ vertices = new float[2*n];\n    for (int i = 0; i < n; i++)\n    {\n        float\
  \ t = i * 6.28f / n;\n        // x 坐标\n        vertices[2*i] = w/2 * MathUtils.cos(t)\
  \ + w/2;\n        // y 坐标\n        vertices[2*i+1] = h/2 * MathUtils.sin(t) + h/2;\n\
      }\n    boundingPolygon = new Polygon(vertices);\n    boundingPolygon.setOrigin(\
  \ getOriginX(), getOriginY() );\n}\n\npublic Polygon getBoundingPolygon()\n{\n    boundingPolygon.setPosition(\
  \ getX(), getY() );\n    boundingPolygon.setRotation( getRotation() );\n    return\
  \ boundingPolygon;\n}\n```\n\n现在你已经为 `BaseActor` 类定义了碰撞多边形，但还有一个问题：如何检测两个多边形何时重叠。与拥有自己的\
  \ `overlaps` 方法的 `Rectangle` 类不同，`Polygon` 类没有这个方法。幸运的是，LibGDX 提供的另一个实用工具类 `Intersector`\
  \ 确实有这样的方法。更重要的是，`Intersector` 类还具有处理碰撞*响应*的功能。如果一个角色与某个物品或增强道具重叠，典型的响应分别是将物品添加到库存或增加角色属性。如果一个角色与墙壁等固体物体重叠，那么你需要计算如何调整该角色的位置。调整位置的方法有很多，其中许多在数学上很复杂，因此我们将把更全面的讨论留到后续章节。现在，你只需提供一个名为\
  \ `overlaps` 的函数代码，该函数用于判断此 `BaseActor` 是否与另一个 `BaseActor` 重叠。`overlaps` 方法还接受第二个输入参数，一个布尔变量，指示是否应将碰撞视为固体碰撞；如果设置为\
  \ `true`，此 `BaseActor` 的位置将被调整，使其不再与另一个 `BaseActor` 重叠。该方法的代码如下：\n\n```\n/**\n *  确定两个\
  \ BaseActor 对象的碰撞多边形是否重叠。\n *  如果 (resolve == true)，则当存在重叠时，沿最小平移向量移动此 BaseActor，\n\
   *    直到不再重叠。\n */\npublic boolean overlaps(BaseActor other, boolean resolve)\n\
  {\n    Polygon poly1 = this.getBoundingPolygon();\n    Polygon poly2 = other.getBoundingPolygon();\n\
  \nif ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle()) )\n\
          return false;\n\nMinimumTranslationVector mtv = new MinimumTranslationVector();\n\
      boolean polyOverlap = Intersector.overlapConvexPolygons(poly1, poly2, mtv);\n\
      if (polyOverlap && resolve)\n    {\n        this.moveBy( mtv.normal.x * mtv.depth,\
  \ mtv.normal.y * mtv.depth );\n    }\n    float significant = 0.5f;\n    return\
  \ (polyOverlap && (mtv.depth > significant));\n}\n```\n\n\n\n最后，我们引入了一对通用方法，分别命名为\
  \ copy 和 clone。clone 方法会创建并返回一个新的 BaseActor，并使这个新对象成为调用该方法的 BaseActor 的精确副本。此过程通过\
  \ copy 方法执行，该方法将数据从一个 BaseActor 复制到另一个 BaseActor 中（实际上，这也是唯一需要调用 copy 方法的情况）。当你想要创建多个仅有细微差异的对象实例时，这些方法会非常有用；你可以先创建一个对象的基础版本，克隆它，然后修改任何需要更改的属性。这两个方法的代码如下：\n\
  \n```\npublic void copy(BaseActor original)\n{\n    this.region = new TextureRegion(\
  \ original.region );\n    if (original.boundingPolygon != null)\n    {\n        this.boundingPolygon\
  \ = new Polygon( original.boundingPolygon.getVertices() );\n        this.boundingPolygon.setOrigin(\
  \ original.getOriginX(), original.getOriginY() );\n    }\n    this.setPosition(\
  \ original.getX(), original.getY() );\n    this.setOriginX( original.getOriginX()\
  \ );\n    this.setOriginY( original.getOriginY() );\n    this.setWidth( original.getWidth()\
  \ );\n    this.setHeight( original.getHeight() );\n    this.setColor( original.getColor()\
  \ );\n    this.setVisible( original.isVisible() );\n}\n\npublic BaseActor clone()\n\
  {\n    BaseActor newbie = new BaseActor();\n    newbie.copy( this );\n    return\
  \ newbie;\n}\n```\n\n至此，BaseActor 类的方法就完成了。\n\nAnimatedActor 类\n\n接下来，你将修改 AnimatedActor\
  \ 类。该类的主要目的是管理一组动画，并从当前活动动画（*活动*指的是当前正在渲染的动画）中选择正确的图像。为简单起见，我们希望为每个 Animation 关联一个表示其名称的\
  \ String。例如，在一个俯视视角的冒险游戏中，主角可能有四个动画，分别命名为 north、south、east 和 west，对应她可能行走的每个方向。在一个平台动作游戏中，主角可能有名为\
  \ stand、walk 和 jump 的动画，分别对应游戏中的这些动作。\n\n为了存储这些信息，你将使用之前讨论过的 HashMap 数据结构。String\
  \ 对象将用作键，Animation 对象将作为关联的值；因此，完整的数据类型是 HashMap<String,Animation>。你将包含一个名为 storeAnimation\
  \ 的方法，用于将数据放入 HashMap，以及一个名为 setActiveAnimation 的方法，用于从 HashMap 中获取动画并将其设置为当前活动动画。你还会有一个名为\
  \ activeName 的字段，用于存储当前活动动画的名称，以便更容易地检查当前正在播放的动画。你还会添加一些便利的小功能：加载的第一个动画将被设置为默认动画，并且\
  \ storeAnimation 方法将有一个接受 Texture 作为输入的版本，它会自动将其转换为单帧或*静态*动画。\n\n以下是 AnimatedActor\
  \ 类的代码：\n\n```\nimport com.badlogic.gdx.graphics.g2d.Batch;\nimport com.badlogic.gdx.graphics.Texture;\n\
  import com.badlogic.gdx.graphics.g2d.TextureRegion;\nimport com.badlogic.gdx.graphics.g2d.Animation;\n\
  import java.util.HashMap;\n\npublic class AnimatedActor extends BaseActor\n{\n    private\
  \ float elapsedTime;\n    private Animation activeAnim;\n    private String activeName;\n\
      private HashMap<String,Animation> animationStorage;\n\npublic AnimatedActor()\n\
      {\n        super();\n        elapsedTime = 0;\n        activeAnim = null;\n\
          activeName = null;\n        animationStorage = new HashMap<String,Animation>();\n\
      }\n\npublic void storeAnimation(String name, Animation anim)\n    {\n        animationStorage.put(name,\
  \ anim);\n        if (activeName == null)\n            setActiveAnimation(name);\n\
      }\n\npublic void storeAnimation(String name, Texture tex)\n    {\n        TextureRegion\
  \ reg = new TextureRegion(tex);\n        TextureRegion[] frames = { reg };\n        Animation\
  \ anim = new Animation(1.0f, frames);\n        storeAnimation(name, anim);\n    }\n\
  \npublic void setActiveAnimation(String name)\n    {\n        if ( !animationStorage.containsKey(name)\
  \ )\n        {\n            System.out.println(\"No animation: \" + name);\n            return;\n\
          }\n\n// 如果动画已在运行，则无需设置\n        if ( activeName.equals(name) )\n            return;\n\
  \nactiveName = name;\n        activeAnim = animationStorage.get(name);\n        elapsedTime\
  \ = 0;\n\nTexture tex = activeAnim.getKeyFrame(0).getTexture();\n        setWidth(\
  \ tex.getWidth() );\n        setHeight( tex.getHeight() );\n    }\n\npublic String\
  \ getAnimationName()\n    {\n        return activeName;\n    }\n\npublic void act(float\
  \ dt)\n    {\n        super.act( dt );\n        elapsedTime += dt;\n    }\n\npublic\
  \ void draw(Batch batch, float parentAlpha)\n    {\n        region.setRegion( activeAnim.getKeyFrame(elapsedTime)\
  \ );\n        super.draw(batch, parentAlpha);\n    }\n}\n```\n\nPhysicsActor 类\n\
  \n最后，我们来到全新的 PhysicsActor 类，它继承自 AnimatedActor 类。这个类将存储速度以及加速度数据，这将使运动看起来更加平滑。你可以选择设置加速度，而不是在按下移动键时设置速度，这会使角色逐渐加速（很像汽车在踩下油门踏板（也称为加速器）时的表现）。这些数据将使用\
  \ Vector2 类来存储，该类存储二维向量数据，包含 x 和 y 两个分量；此外，还有一些便捷方法用于执行诸如将两个向量相加或计算向量长度等操作。在 PhysicsActor\
  \ 类中，你将存储一个 maxSpeed 值，用于防止角色无限加速，以及一个 deceleration 值，用于控制角色在不加速时减速（速度降低）的快慢。最后，一个布尔变量\
  \ autoAngle 将决定角色的图像是否应旋转以匹配运动方向。以下是该类的导入语句、变量声明和构造方法：\n\n```\nimport com.badlogic.gdx.math.Vector2;\n\
  import com.badlogic.gdx.math.MathUtils;\n\npublic class PhysicsActor extends AnimatedActor\n\
  {\n    private Vector2 velocity;\n    private Vector2 acceleration;\n\n// 最大速度\n\
      private float maxSpeed;\n\n// 不加速时的减速值，单位：像素/秒\n    private float deceleration;\n\
  \n// 图像是否应旋转以匹配速度方向？\n    private boolean autoAngle;\n\npublic PhysicsActor()\n\
      {\n        velocity = new Vector2();\n        acceleration = new Vector2();\n\
          maxSpeed = 9999;\n        deceleration = 0;\n        autoAngle = false;\n\
      }\n}\n```\n\n这个 PhysicsActor 类包含许多用于获取和设置这些信息的方法。对于 Vector2 类型的变量 velocity 和\
  \ acceleration，我们提供了两种设置数据的方式：要么通过 x 和 y 分量，要么通过角度和大小（或模长），然后这些方法会使用三角函数将角度和大小转换为\
  \ x 和 y 分量，如图 3-8 所示。如果向量的方向角为 A，大小为 M，那么向量的 x 分量由公式 x = M × cos(A) 计算得出，同样，y 分量由\
  \ y = M × sin(A) 给出。\n\n![9781484215012_Fig03-08.jpg](img/9781484215012_Fig03-08.jpg)\n\
  \n图 3-8. 将向量的角度和大小转换为 x 和 y 分量\n\n涉及速度和加速度的方法如下：\n\n```\n// 速度方法\n\npublic void\
  \ setVelocityXY(float vx, float vy)\n    {  velocity.set(vx,vy);  }\n\npublic void\
  \ addVelocityXY(float vx, float vy)\n    {  velocity.add(vx,vy);  }\n\n\n\n// 根据角度和速度设置速度\n\
      public void setVelocityAS(float angleDeg, float speed)\n    {\n        velocity.x\
  \ = speed * MathUtils.cosDeg(angleDeg);\n        velocity.y = speed * MathUtils.sinDeg(angleDeg);\n\
      }\n\n// 加速/减速方法\n\npublic void setAccelerationXY(float ax, float ay)\n    {  acceleration.set(ax,ay);  }\n\
  \npublic void addAccelerationXY(float ax, float ay)\n    {  acceleration.add(ax,ay);  }\n\
  \n// 根据角度和速度设置加速度\n    public void setAccelerationAS(float angleDeg, float speed)\n\
      {\n        acceleration.x = speed * MathUtils.cosDeg(angleDeg);\n        acceleration.y\
  \ = speed * MathUtils.sinDeg(angleDeg);\n    }\n    public void setDeceleration(float\
  \ d)\n    {  deceleration = d;  }\n```\n\n此外，相关的实用方法用于确定角色的运动速度和角度、改变当前速度，以及沿角色当前面对的方向加速：\n\
  \n```\n    public float getSpeed()\n    {  return velocity.len();  }\n\npublic void\
  \ setSpeed(float s)\n    {  velocity.setLength(s);  }\n\npublic void setMaxSpeed(float\
  \ ms)\n    {  maxSpeed = ms;  }\n\npublic float getMotionAngle()\n    {  return\
  \ MathUtils.atan2(velocity.y, velocity.x) * MathUtils.radiansToDegrees;  }\n\npublic\
  \ void setAutoAngle(boolean b)\n    {  autoAngle = b;  }\n\npublic void accelerateForward(float\
  \ speed)\n    {  setAccelerationAS( getRotation(), speed );  }\n```\n\n`PhysicsActor`\
  \ 类最核心的部分是 `act` 方法，它负责处理并更新角色的位置和速度数据。`act` 方法的五个步骤如下：\n\n*   根据加速度和经过的时间（dt）改变速度\n\
  *   当未加速时降低速度（减速）\n*   如果当前速度大于最大速度，则将其降低至该值\n*   根据速度和经过的时间（dt）改变位置\n*   当 `autoAngle`\
  \ 为 true 时，将角色的旋转角度设置为与运动方向一致\n\n最后，这是 `act` 方法的代码：\n\n```\npublic void act(float\
  \ dt)\n{\n    super.act(dt);\n\n// 应用加速度\n    velocity.add( acceleration.x * dt,\
  \ acceleration.y * dt );\n\n// 未加速时降低速度\n    if (acceleration.len() < 0.01)\n    {\n\
          float decelerateAmount = deceleration * dt;\n        if ( getSpeed() < decelerateAmount\
  \ )\n            setSpeed(0);\n        else\n            setSpeed( getSpeed() - decelerateAmount\
  \ );\n    }\n\n// 限制最大速度\n    if ( getSpeed() > maxSpeed )\n        setSpeed(maxSpeed);\n\
  \n// 应用速度\n    moveBy( velocity.x * dt, velocity.y * dt );\n\n// 移动时旋转图像\n    if\
  \ (autoAngle && getSpeed() > 0.1 )\n        setRotation( getMotionAngle() );\n}\n\
  ```\n\n创建游戏\n\n现在，有了这些新的通用基于 Actor 的类，你将通过一个名为“海星收集者”的新游戏来检验它们的效果。在这个游戏中，玩家引导一只海龟绕过岩石群，帮助它收集所有能看见的海星。图\
