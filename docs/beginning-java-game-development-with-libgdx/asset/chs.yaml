  \n²感谢 Andrew Viola 创建了我们将要在游戏中使用的这个角色精灵表。\n\n³与之前的项目类似，在遍历列表时无法从列表中移除对象（因此引入了 `removeList`），在物理模拟进行时也无法从世界中移除刚体（因此再次需要使用\
  \ `removeList`）。\n\n第 8 章\n\n![image](img/frontdot.jpg)\n\n3D 图形入门\n\n本章介绍 LibGDX\
  \ 的一些 3D 图形功能。在此过程中，你将学习描述和渲染三维场景所需的概念和类。你将创建一个简单的交互式演示，使玩家能够控制场景中的对象以及观察场景的摄像机。为了简化和精简此过程，你将改编一些旧类并编写一些新类来完成所涉及的各种任务。最后，你将基于\
  \ 2.5D 技术创建一个更复杂的演示：一个渲染高级三维图形的游戏，而其底层游戏玩法则限制在二维平面上。\n\n探索 3D 概念和类\n\n\n\n事实证明，本书之前创建的所有游戏都存在于三维空间中。你可能已经注意到，在设置摄像机对象的位置时，需要设置\
  \ x、y 和 z 三个分量。如果 x 轴和 y 轴分别代表屏幕上的水平方向和垂直方向，那么 z 轴则对应一条指向观察者的直线，垂直于 *xy 平面*——即包含\
  \ x 轴和 y 轴的平面。可以认为摄像机位于 z 轴上，直接指向 xy 平面；所有游戏实体都隐式地将其 z 坐标设置为 0。这种配置如图 8-1 所示，该图大致展示了摄像机如何观察前几章中的“海星收集者”游戏。\n\
  \n![9781484215012_Fig08-01.jpg](img/9781484215012_Fig08-01.jpg)\n\n图 8-1。摄像机沿 z\
  \ 轴向下观察“海星收集者”游戏\n\n我们之前的项目严重依赖于 Stage 类，该类管理 Camera 和 Batch 对象（用于渲染）。要创建 3D 场景，你需要这些对象的“3D\
  \ 版本”，由 PerspectiveCamera 和 ModelBatch 类提供，接下来将详细介绍它们。然而，并没有一个对应的类似舞台的对象来管理它们，因此你将在后面的章节中创建自己的管理器类（称为\
  \ Stage3D）。\n\n要渲染一个场景，你可以使用两种类型的摄像机之一：正交摄像机或透视摄像机。（Stage 类使用 OrthographicCamera\
  \ 对象进行渲染。）这两者的区别在于它们如何将 3D 场景表示或投影到 2D 表面（如计算机屏幕）上。为了说明这种区别，考虑一个最简单的 3D 形状：立方体。图\
  \ 8-2 显示了一个立方体的正交投影和透视投影。在正交投影中，如果物体的边缘长度相同，那么无论它们与观察者的距离如何，在投影中它们都会被绘制成相同的长度。这与透视投影形成对比，在透视投影中，具有相同长度的两条边缘的物体在投影中可能看起来不同；离观察者较远的边缘看起来会更短。这也会产生一个副作用：如果物体的两条边缘平行，那么在正交投影中它们保持平行，但在透视投影中它们看起来会汇聚。（在透视图中，所有这些边缘似乎汇聚的点有时被称为*消失点*。）\n\
  \n![9781484215012_Fig08-02.jpg](img/9781484215012_Fig08-02.jpg)\n\n图 8-2。使用正交投影（左）和透视投影（右）绘制的立方体\n\
  \n在初始化 PerspectiveCamera 对象时，你必须定义摄像机可见的区域，该区域呈平截头棱锥体或视锥体形状（如图 8-3 所示）。这由五个参数指定：视野（一个角度，表示摄像机向两侧能看多远）、场景投影到的矩形的宽度和高度（由\
  \ LibGDX 中的 Viewport 对象确定），以及近平面和远平面值（表示摄像机在渲染时将包含的最近和最远距离）。\n\n![9781484215012_Fig08-03.jpg](img/9781484215012_Fig08-03.jpg)\n\
  \n图 8-3。透视摄像机可见的区域；近平面和远平面距离由阴影平面表示。\n\n下一个新类是 ModelBatch。正如 SpriteBatch 对象可用于渲染二维\
  \ Texture 对象一样，ModelBatch 用于渲染三维对象。描述三维对象外观所需的数据包含在 Model 对象中，该对象由两个主要组件组成：Mesh\
  \ 和 Material。*网格*是定义对象形状的顶点、边和三角形面的集合。*材质*包含应用于网格的颜色或纹理数据，这些数据定义了其在渲染时的外观。图 8-4\
  \ 包含一个茶壶的两张图片：网格的线框表示，以及应用材质后的外观。这个特殊的茶壶是一个经典模型，称为*犹他茶壶*，由计算机科学家马丁·纽厄尔于 1975 年创建。模型可以从标准的\
  \ 3D 对象文件格式加载。\n\n![9781484215012_Fig08-04.jpg](img/9781484215012_Fig08-04.jpg)\n\
  \n图 8-4。犹他茶壶，以线框渲染（左）和应用材质后（右）\n\n在 LibGDX 中，可以通过两种方式创建模型。使用 ModelLoader 类，可以从标准的\
  \ 3D 对象文件格式（例如 Wavefront，通常以 .obj 文件扩展名表示）加载模型，这些文件可能还包含对随附材质使用的图像文件的引用。或者，可以使用\
  \ ModelBuilder 类在运行时生成一些基本形状（例如球体和盒子）。在本章中，你将看到这两种方法的示例。\n\n最后，为了使 3D 模型具有逼真的外观，需要考虑光源的效果。事实上，如果场景中没有添加灯光，你将什么也看不见！灯光由\
  \ Environment 类管理。你将使用的两种光照效果是环境光和方向光。*环境光*提供整体照明，并从所有方向均匀照射。通常，在场景中包含环境光很重要，这样即使背向光源的面也仍然可见（尽管这个量可能因你模拟的位置类型而异）。*方向光*用于模拟沿特定方向照射整个场景的光线。这有助于在场景中提供深度感，特别是当对象的材质仅由单一颜色组成时，可以让你区分不同的面。\n\
  \n图 8-5 通过一个立方体的两次渲染说明了这些效果。在左侧的图像中，场景仅包含环境光，这使得很难看到立方体的所有边缘。右侧的图像有一个方向光，主要朝向左侧（因此立方体的右侧看起来最亮）。\n\
  \n创建一个最小的 3D 演示\n\n使用前面提到的类，你现在可以准备一个在 LibGDX 中渲染立方体的最小代码示例。结果是一个单独的蓝色盒子，方向如图 8-5\
  \ 右侧所示。你首先在 BlueJ 中创建一个名为 Project3D 的新项目。此时你不需要将任何类或资源复制到此项目。与通常从 Game 类开始（它实现了\
  \ ApplicationListener 接口方法）不同，你将使这个示例自包含，并自己实现该接口。\n\n![9781484215012_Fig08-05.jpg](img/9781484215012_Fig08-05.jpg)\n\
  \n图 8-5。仅用环境光照明的立方体（左），以及添加了方向光后的立方体（右）\n\n\n\n首先是核心代码：导入语句、变量声明（那些在多个方法中被引用的变量）以及接口所需的方法。和往常一样，`create`\
  \ 方法用于初始化对象，而 `render` 方法负责处理游戏循环；每个方法的代码将在后面详细展示。（接口所需的其他方法对本示例而言并非核心内容，因此后续不再讨论。）\n\
  \n```\nimport com.badlogic.gdx.ApplicationListener;\nimport com.badlogic.gdx.Gdx;\n\
  import com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.graphics.Color;\n\
  import com.badlogic.gdx.graphics.PerspectiveCamera;\nimport com.badlogic.gdx.graphics.VertexAttributes.Usage;\n\
  import com.badlogic.gdx.graphics.g3d.Environment;\nimport com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;\n\
  import com.badlogic.gdx.graphics.g3d.environment.DirectionalLight;\nimport com.badlogic.gdx.graphics.g3d.utils.ModelBuilder;\n\
  import com.badlogic.gdx.graphics.g3d.Model;\nimport com.badlogic.gdx.graphics.g3d.ModelBatch;\n\
  import com.badlogic.gdx.graphics.g3d.ModelInstance;\nimport com.badlogic.gdx.graphics.g3d.Material;\n\
  import com.badlogic.gdx.math.Vector3;\n\npublic class TheTest implements ApplicationListener\n\
  {\n       public Environment environment;\n       public PerspectiveCamera camera;\n\
         public ModelBatch modelBatch;\n       public ModelInstance boxInstance;\n\
  \npublic void create() {  }\n\npublic void render() {  }\n\npublic void dispose()\
  \ {  }\n\npublic void resize(int width, int height) {  }\n\npublic void pause()\
  \ {  }\n\npublic void resume() {  }\n}\n```\n\n`create` 方法首先初始化 `Environment`，并添加一个参数（`Attribute`\
  \ 类的子类），该参数定义了场景中环境光的颜色。通常，灯光使用灰色调（而不是黄色或蓝色等颜色），这样场景就不会被意外的颜色所染色。然后创建一个 `DirectionalLight`\
  \ 实例，使用更亮的灰色，并指定其方向（使用 `Vector3` 对象）主要向左和向下；配置好参数后，将该灯光添加到环境中。接着初始化一个 `PerspectiveCamera`，视场角为\
  \ 67 度，近裁剪面和远裁剪面分别设置为 0.1 和 1000（选择这些值是为了确保视图区域包含你将添加到场景中的对象）。设置相机的位置，并通过 `lookAt`\
  \ 方法指定其初始观察方向。最后，初始化一个 `ModelBatch` 对象，该对象将在后续渲染中使用。这些步骤“搭建了场景”，并通过以下代码完成：\n\n```\n\
  environment = new Environment();\nenvironment.set( new ColorAttribute(ColorAttribute.AmbientLight,\
  \ 0.4f, 0.4f, 0.4f, 1f) );\n\nDirectionalLight dLight = new DirectionalLight();\n\
  Color     lightColor = new Color(0.75f, 0.75f, 0.75f, 1);\nVector3  lightVector\
  \ = new Vector3(-1.0f, -0.75f, -0.25f);\ndLight.set( lightColor, lightVector );\n\
  environment.add( dLight ) ;\n\ncamera = new PerspectiveCamera(67, Gdx.graphics.getWidth(),\
  \ Gdx.graphics.getHeight());\ncamera.near = 0.1f;\ncamera.far  = 1000f;\ncamera.position.set(10f,\
  \ 10f, 10f);\ncamera.lookAt(0,0,0);\ncamera.update();\n\nmodelBatch = new ModelBatch();\n\
  ```\n\n下一个任务是创建模型实例以添加到场景中。为了简化本例，你将使用 `ModelBuilder` 类的 `createBox` 方法来构建一个立方体。你还必须创建一个\
  \ `Material` 来赋予立方体在屏幕上的外观；这里使用纯蓝色的漫反射颜色。（*漫反射* 表示物体在纯白光照射下呈现的颜色。）\n\n你还必须确定模型每个顶点应包含的数据类型：在任何情况下，顶点都应存储位置信息，但在此示例中，它们还存储颜色数据和一个用于确定光线如何从物体反射的向量（称为*法向量*），从而提供着色效果。每个属性在\
  \ `Usage` 类中都有一个对应的常量值；位置数据对应 `Usage.Position`，颜色数据对应 `Usage.ColorPacked`，法向量数据对应\
  \ `Usage.Normal`，等等。当需要组合这些数据时，通过将所需每个属性的常量值相加来生成一个值。该结果值作为参数传递给 `createBox` 方法。\n\
  \n你还需要决定立方体本身的尺寸。由于许多建模程序使用的比例，这些值通常在 1 到 10 的范围内，因此在使用 `ModelBuilder` 类创建对象时，也应使用类似范围的值。创建\
  \ `Model`（你可以将其视为模板对象）后，初始化一个 `ModelInstance`。该对象包含模型信息的副本，以及一个存储该特定实例的位置、旋转和缩放数据的变换矩阵。以下代码执行所有这些任务：\n\
  \n```\nModelBuilder modelBuilder = new ModelBuilder();\n\nMaterial boxMaterial = new\
  \ Material();\nboxMaterial.set( ColorAttribute.createDiffuse(Color.BLUE) );\n\n\
  int usageCode = Usage.Position + Usage.ColorPacked + Usage.Normal;\n\nModel boxModel\
  \ = modelBuilder.createBox( 5, 5, 5, boxMaterial, usageCode );\nboxInstance = new\
  \ ModelInstance(boxModel);\n```\n\n最后，给出 `render` 方法，游戏循环的所有阶段都在此发生。在本例中，程序由一个静态场景组成，因此没有用户输入需要处理，也没有更新任务需要完成——只需执行渲染。该方法的代码应该看起来相对熟悉。一个区别是\
  \ `glClear` 函数还需要清除上一次渲染期间生成的深度信息，因为如果相机移动，场景中每个物体到相机的距离可能会改变，在这种情况下需要重新计算深度值。另一个区别是\
  \ `ModelBatch` 在其 `begin` 方法中将 `PerspectiveCamera` 作为输入。相应的代码如下：\n\n```\nGdx.gl.glClearColor(1,1,1,1);\n\
  Gdx.gl.glViewport(0, 0, Gdx.graphics.getWidth(), Gdx.graphics.getHeight());\nGdx.gl.glClear(\
  \ GL20.GL_COLOR_BUFFER_BIT | GL20.GL_DEPTH_BUFFER_BIT );\n\nmodelBatch.begin(camera);\n\
  modelBatch.render( boxInstance, environment );\nmodelBatch.end();\n```\n\n和往常一样，你还需要一个启动器风格的类，如下所示：\n\
  \n```\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplicationConfiguration;\n\
  public class Launcher1\n{\n    public static void main ()\n    {\n        LwjglApplicationConfiguration\
  \ config = new LwjglApplicationConfiguration();\n        config.width = 800;\n        config.height\
  \ = 600;\n        TheTest myProgram = new TheTest();\n        LwjglApplication launcher\
  \ = new LwjglApplication( myProgram, config );\n    }\n}\n```\n\n此时，你应该尝试运行代码。可以随意进行一些修改并重新运行代码，以查看更改的效果。例如，你可以更改立方体的颜色、光源的方向或相机的位置。\n\
  \n重新创建 Actor/Stage 框架\n\n为了促进和加速未来项目的开发，在本节中，你将编写一些功能类似于 `BaseActor` 和 `Stage` 类的类，但它们存储的是对三维图形有用的数据结构和方法。为了方便起见，你将继续向之前创建的项目（名为\
  \ `Project3D`）中添加代码。\n\nBaseActor3D 类\n\n\n\n首先，回顾一下，Actor 类存储了变换数据（位置、旋转和缩放）以及用于获取、设置和更改这些值的方法。所有\
  \ Actor 对象都包含一个 act 方法，用于更新其内部状态，以及一个 draw 方法，Actor 可以使用该方法通过给定的 Batch 对象渲染自身。接着，你编写了\
  \ Actor 类的扩展，即 BaseActor 类，它额外存储了一个 Texture、一个用于碰撞检测的 Polygon 以及相关方法。现在将介绍 BaseActor3D\
  \ 类，它将在 3D 环境中提供类似的功能。\n\n3D 图形中一些最复杂的基础概念是用于存储变换数据的数学结构。我不会在此深入探讨细节，¹ 但对于这个示例，了解这些对象是什么以及如何使用它们关联的方法非常重要。\n\
  \nModelInstance 对象的变换数据存储在其 transform 字段中，作为一个 Matrix4 对象：一个四乘四的数字网格。从这个对象中，你可以提取一个包含对象位置的\
  \ Vector3。你还可以提取另一个包含每个方向缩放因子的 Vector3（所有方向初始化为 1，这意味着默认大小不变）。变换还存储了模型的朝向，这*不能*用单个数字存储（与\
  \ Actor 的旋转值不同），因为三维空间中的对象可以绕 x、y 和 z 轴的任意组合进行任意角度的旋转。出于许多技术原因（例如计算、性能以及避免一种称为*万向锁*²\
  \ 的现象），使用一个称为 Quaternion（对应于同名的数学对象）的对象来存储朝向数据。为了方便起见，你不会直接操作 Matrix4，而是维护单独的对象来存储每个\
  \ BaseActor3D 对象的位置、旋转和缩放数据，然后将它们组合成一个 Matrix4，并在需要时存储到 ModelInstance 中。\n\n接下来的代码清单展示了\
  \ BaseActor3D 类的核心：导入语句、变量声明和基本方法。这第一组方法包括构造函数；一个用于为此 Actor 设置 ModelInstance 的方法；用于将位置、旋转和缩放数据组合成\
  \ Matrix4 的 calculateTransform 方法；用于更新模型实例变换数据的 act 方法；以及用于使用提供的 ModelBatch 和 Environment\
  \ 渲染模型实例的 draw 方法。\n\n```\nimport com.badlogic.gdx.graphics.g3d.Environment;\nimport\
  \ com.badlogic.gdx.graphics.g3d.ModelBatch;\nimport com.badlogic.gdx.graphics.g3d.ModelInstance;\n\
  import com.badlogic.gdx.graphics.g3d.Material;\nimport com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;\n\
  import com.badlogic.gdx.graphics.Color;\nimport com.badlogic.gdx.math.Vector3;\n\
  import com.badlogic.gdx.math.Quaternion;\nimport com.badlogic.gdx.math.Matrix4;\n\
  \npublic class BaseActor3D\n{\n    private ModelInstance modelData;\n    private\
  \ final Vector3 position;\n    private final Quaternion rotation;\n    private final\
  \ Vector3 scale;\n\npublic BaseActor3D()\n    {\n        modelData = null;\n        position  =\
  \ new Vector3(0,0,0);\n        rotation  = new Quaternion();\n        scale    \
  \ = new Vector3(1,1,1);\n    }\n\npublic void setModelInstance(ModelInstance m)\n\
      {  modelData = m;  }\n\npublic Matrix4 calculateTransform()\n    {  return new\
  \ Matrix4(position, rotation, scale);  }\n\npublic void act(float dt)\n    {  modelData.transform.set(\
  \ calculateTransform() );  }\n\npublic void draw(ModelBatch batch, Environment env)\n\
      {  batch.render(modelData, env);  }\n\n}\n```\n\n接下来是与位置变量相关的各种方法：获取和设置方法，以及向当前位置坐标添加值的方法。为了方便起见，此代码包含了方法的重载变体，允许使用\
  \ Vector3 或单独的浮点数输入。\n\n```\npublic Vector3 getPosition()\n{  return position;  }\n\
  \npublic void setPosition(Vector3 v)\n{  position.set(v);  }\n\npublic void setPosition(float\
  \ x, float y, float z)\n{  position.set(x,y,z);  }\n\npublic void addPosition(Vector3\
  \ v)\n{  position.add(v);  }\n\npublic void addPosition(float x, float y, float\
  \ z)\n{  addPosition( new Vector3(x,y,z) );  }\n```\n\n接下来，让我们讨论这些 Actor 的旋转能力。为简单起见，我们将\
  \ Actor 限制为“向左”和“向右”转动，更正式的定义是绕 y 轴旋转，该轴在此 3D 世界中指向上方，如图 8-1 所示。³ 我们将此称为*转向角*。⁴\
  \ 将会有获取、设置和调整此值的方法，每个方法都使用 Quaternion 类中的方法实现。\n\n```\npublic float getTurnAngle()\n\
  {  return rotation.getAngleAround(0,-1,0);  }\n\npublic void setTurnAngle(float\
  \ degrees)\n{  rotation.set( new Quaternion(Vector3.Y,degrees) );  }\n\npublic void\
  \ turn(float degrees)\n{  rotation.mul( new Quaternion(Vector3.Y,-degrees) );  }\n\
  ```\n\n此外，还必须编写允许 Actor 相对于其当前朝向移动的方法。当 BaseActor3D 首次初始化时，假设前进方向由向量 (0, 0, –1)\
  \ 表示，因为相机的初始位置将具有正的 z 坐标，并且 Actor 将背对相机。类似地，初始向上方向是向量 (0, 1, 0)，向右方向是向量 (1, 0, 0)。在\
  \ Actor 旋转后，可以通过将这些原始向量乘以 Actor 的当前旋转来确定相对的前进、向上和向右方向。然后，要沿这些相对方向之一移动给定距离，可以将相应的向量缩放所需的距离，并将结果添加到当前位置。使\
  \ Actor 能够以这些方式移动的方法如下所示：\n\n```\npublic void moveForward(float dist)\n{  addPosition(\
  \ rotation.transform( new Vector3(0,0,-1) ).scl( dist ) );  }\n\npublic void moveUp(float\
  \ dist)\n{  addPosition( rotation.transform( new Vector3(0,1,0) ).scl( dist ) );  }\n\
  \npublic void moveRight(float dist)\n{  addPosition( rotation.transform( new Vector3(1,0,0)\
  \ ).scl( dist ) );  }\n```\n\n最后，将包含一些便捷方法。首先是 setColor，可用于更改此特定模型实例所属材质的颜色。此外还有\
  \ copy 和 clone 方法，以便稍后从给定的模板实例创建额外的 BaseActor3D 对象。\n\n```\npublic void setColor(Color\
  \ c)\n{\n    for (Material m : modelData.materials)\n        m.set( ColorAttribute.createDiffuse(c)\
  \ );\n}\n\npublic BaseActor3D clone()\n{\n    BaseActor3D newbie = new BaseActor3D();\n\
      newbie.copy(this);\n    return newbie;\n}\n\npublic void copy(BaseActor3D orig)\n\
  {\n    this.modelData = new ModelInstance(orig.modelData);\n    this.position.set(\
  \ orig.position );\n    this.rotation.set( orig.rotation );\n    this.scale.set(\
  \ orig.scale );\n}\n```\n\n至此，BaseActor3D 类就完成了——目前是这样。稍后的部分将讨论碰撞检测，并添加相关的变量和方法。现在，让我们将注意力转向编写一个可用于管理所有这些\
  \ Actor 的补充类：Stage3D 类。\n\nStage3D 类\n\n\n\n回顾一下，LibGDX 的 Stage 对象负责处理渲染任务（使用其内部的\
  \ Camera 和 Batch 对象），并管理一个 Actor 对象列表。Stage 类中还有 act 和 draw 方法，它们会调用所有已添加 Actor\
  \ 的 act 和 draw 方法。你将通过 Stage3D 类创建类似的功能。首先，呈现该类的核心部分。在 import 语句之后，声明了渲染所需的变量：Environment、PerspectiveCamera\
  \ 和 ModelBatch。在构造函数中，你基本上复制了之前示例中用于初始化这些对象的代码。声明了一个 ArrayList 来存储 BaseActor3D 对象，并在构造函数中对其进行初始化。\n\
  \n```\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.graphics.Color;\nimport\
  \ com.badlogic.gdx.math.Vector3;\nimport com.badlogic.gdx.graphics.PerspectiveCamera;\n\
  import com.badlogic.gdx.graphics.g3d.Environment;\nimport com.badlogic.gdx.graphics.g3d.ModelBatch;\n\
  import com.badlogic.gdx.graphics.g3d.attributes.ColorAttribute;\nimport com.badlogic.gdx.graphics.g3d.environment.DirectionalLight;\n\
  import java.util.ArrayList;\n\npublic class Stage3D\n{\n    private Environment\
  \ environment;\n    private PerspectiveCamera camera;\n    private final ModelBatch\
  \ modelBatch;\n    private ArrayList<BaseActor3D> actorList;\n\npublic Stage3D()\n\
      {\n        environment = new Environment();\n        environment.set(new ColorAttribute(ColorAttribute.AmbientLight,\
  \ 0.7f, 0.7f, 0.7f, 1));\n\nDirectionalLight dLight = new DirectionalLight();\n\
         Color lightColor = new Color(0.9f, 0.9f, 0.9f, 1);\n       Vector3 lightVector\
  \ = new Vector3(-1.0f, -0.75f, -0.25f);\n       dLight.set( lightColor, lightVector\
  \ );\n       environment.add( dLight ) ;\n\ncamera = new PerspectiveCamera(67, Gdx.graphics.getWidth(),\
  \ Gdx.graphics.getHeight());\n        camera.position.set(10f, 10f, 10f);\n        camera.lookAt(0,0,0);\n\
          camera.near = 0.01f;\n        camera.far = 1000f;\n        camera.update();\n\
  \nmodelBatch = new ModelBatch();\n\nactorList = new ArrayList<BaseActor3D>();\n\
      }\n}\n```\n\n接下来是 act 和 draw 方法，它们会调用 ArrayList 中所有 BaseActor3D 对象的对应方法。此外，camera\
  \ 会在 act 方法中更新。\n\n```\npublic void act(float dt)\n{\n    camera.update();\n    for\
  \ (BaseActor3D ba : actorList)\n        ba.act(dt);\n}\n\npublic void draw()\n{\n\
      modelBatch.begin(camera);\n    for (BaseActor3D ba : actorList)\n        ba.draw(modelBatch,\
  \ environment);\n    modelBatch.end();\n}\n```\n\n以下是添加和移除 Actor 的方法，代码如下：\n\n```\n\
  public void addActor(BaseActor3D ba)\n{  actorList.add( ba );  }\n\npublic void\
  \ removeActor(BaseActor3D ba)\n{  actorList.remove( ba );  }\n```\n\n该类的最后一部分是一组用于调整\
  \ camera 的丰富方法。首先是设置 camera 位置以及按给定距离移动 camera 的方法；这些值可以通过 Vector3 对象或三个 float 值来指定：\n\
  \n```\npublic void setCameraPosition(float x, float y, float z)\n{  camera.position.set(x,y,z);  }\n\
  \npublic void setCameraPosition(Vector3 v)\n{  camera.position.set(v);  }\n\npublic\
  \ void moveCamera(float x, float y, float z)\n{  camera.position.add(x,y,z);  }\n\
  \npublic void moveCamera(Vector3 v)\n{  camera.position.add(v);  }\n```\n\n接下来，在这些方法的基础上，还有一些额外的方法用于相对于\
  \ camera 的当前位置移动它。Camera 对象存储了两个内部的 Vector3 对象：direction（决定 camera 当前朝向）和 up（决定应朝向屏幕顶部的方向）。在本程序中前后移动\
  \ camera 时，camera 应保持恒定高度（即使 camera 倾斜），因此可以将 direction 向量的 y 分量设为 0，从而得到一个能让你以这种方式向前移动的向量。一旦确定了该向量，就需要根据\
  \ camera 想要移动的距离对其进行缩放，然后通过 moveCamera 函数将该向量加到 camera 的当前位置上。对于向左和向右移动，你将类似地丢弃向量的\
  \ y 分量；要将 direction 向量转换为指向右侧的向量，交换 x 和 z 的值并取反 z 值，如图 8-6 中的示例所示。在此图中，请记住显示的值指的是每个向量所代表的方向变化。\n\
  \n![9781484215012_Fig08-06.jpg](img/9781484215012_Fig08-06.jpg)\n\n图 8-6。将前向向量转换为右向向量\n\
  \n向上移动 camera 是一项简单的任务。在这种情况下，移动将始终沿着 y 轴方向，*而不是* camera 的 up 向量，因为当 camera 倾斜时，其\
  \ up 向量将不再与 y 轴指向相同的方向。以这些方式移动 camera 的方法如下：\n\n```\npublic void moveCameraForward(float\
  \ dist)\n{\n    Vector3 forward = new Vector3(camera.direction.x, 0, camera.direction.z).nor();\n\
      moveCamera( forward.scl( dist ) );\n}\n\npublic void moveCameraRight(float dist)\n\
  {\n    Vector3 right = new Vector3(camera.direction.z, 0, -camera.direction.x).nor();\n\
      moveCamera( right.scl( dist ) );\n}\n\npublic void moveCameraUp(float dist)\n\
  {  moveCamera( 0,dist,0 );  }\n```\n\n还应该提供旋转 camera 的功能，并且再次强调，限制可能的 camera 移动类型将使玩家更容易直观地进行导航。与\
  \ BaseActor3D 对象一样，camera 将能够向左和向右转动，这对应于绕 y 轴旋转。此外，能够上下倾斜 camera 以看向更高或更低的位置会很方便。这可以通过像之前一样确定指向右侧的向量，然后让\
  \ camera 的 direction 向量绕指向右侧的向量旋转来实现。这两个方法，turnCamera 和 tiltCamera，如下所示：\n\n```\n\
  public void turnCamera(float angle)\n{  camera.rotate( Vector3.Y, -angle );  }\n\
  \npublic void tiltCamera(float angle)\n{\n    Vector3 right = new Vector3(camera.direction.z,\
  \ 0, -camera.direction.x);\n    camera.direction.rotate(right, angle);\n}\n```\n\
  \n最后，能够将 camera 朝向特定位置非常重要。这可以通过一个名为 lookAt 的 camera 方法来实现，但此方法可能会产生不期望的结果，即向左或向右倾斜\
  \ camera，导致地平线不再水平，这可能会让玩家迷失方向。因此，在调用 camera 的 lookAt 方法后，需要将 camera 的 up 轴重置为 y\
  \ 轴的方向以纠正此问题；此方法将命名为 setCameraDirection。和之前一样，此方法将被重载，以接受 Vector3 或三个 float 值作为输入。\n\
  \n```\npublic void setCameraDirection(Vector3 v)\n{\n    camera.lookAt(v);\n    camera.up.set(0,1,0);\n\
  }\n\npublic void setCameraDirection(float x, float y, float z)\n{   setCameraDirection(\
  \ new Vector3(x,y,z) );   }\n```\n\n\n\n这就是 Stage3D 类所需的全部功能。现在，你可以继续使用这些类来创建你的第一个交互式\
  \ 3D 演示了。\n\n创建交互式 3D 演示\n\n本节将展示一个受图 8-1 启发的交互式演示。该演示包含一个扁平盒子形状上的《海星收集者》游戏截图，以及带有彩色板条箱纹理的立方体，用于表示场景的原点以及\
  \ x、y、z 轴的方向。你还会包含一个贴有六张图片的立方体，用户可以向任意方向旋转和移动它。最后，你将允许用户向任意方向旋转、倾斜和移动摄像机。图 8-7 展示了此演示的运行效果。\n\
