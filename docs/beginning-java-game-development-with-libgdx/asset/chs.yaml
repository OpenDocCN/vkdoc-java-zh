  \ `Project3D` 添加代码，因为它已经包含了许多你需要的类（`BaseGame`、更新版本的 `BaseScreen`、`BaseActor3D`、`Stage3D`\
  \ 和 `ModelUtils`）。\n\n![9781484215012_Fig08-08.jpg](img/9781484215012_Fig08-08.jpg)\n\
  \n图 8-8. 海盗巡洋舰演示\n\n第一个任务，加载模型，相对简单。为此，你需要一个 `ModelLoader` 类的实例，然后使用其 `loadModel`\
  \ 方法，该方法接受一个 `FileHandle` 作为输入并返回一个 `Model`。如果 `Model` 的位置、旋转或缩放不符合你的要求，你可以根据需要通过对网格应用变换来调整网格数据，这将导致网格发生永久性更改。然后，你可以像之前一样，使用该模型创建一个\
  \ `ModelInstance`，并在 `BaseActor3D` 对象中使用它。\n\n其次，你需要用一个图像环绕你的游戏世界，以便在背景中呈现天空的外观。在我们之前的\
  \ 2D 游戏中，你创建了一个简单的矩形对象来显示天空图像。由于你现在处于 3D 环境中，你将创建一个球体对象，该对象明显大于你的游戏世界并将其包围，然后对其应用纹理，例如图\
  \ 8-9 中所示的纹理。你可能会注意到，图像在顶部附近看起来略有拉伸（在底部也会如此，如果底部不是单纯的灰色的话）。这是因为图像经过了球形扭曲：虽然它作为矩形看起来很奇怪，但当图像应用到球体上时，所有内容都会呈现出正确的比例。这与尝试制作一个大致呈球形的扁平矩形地球地图时发生的现象相同；地图将不可避免地包含与两极附近区域相对应的扭曲区域。\n\
  \n![9781484215012_Fig08-09.jpg](img/9781484215012_Fig08-09.jpg)\n\n```\n\n\n图 8-9.\
  \ 天空的球面扭曲图像\n\n在本程序中，你会遇到一个小难题：虽然 `ModelBuilder` 类可以轻松创建球体网格，但应用于球体的材质只会显示在外部，而非内部（而你的相机和游戏实体正位于内部）。幸运的是，你可以通过一个几何技巧来解决这个问题：创建模型后，将网格在\
  \ z 方向缩放 -1；这会使球体“内外翻转”，从而反转图像显示的面。由于此过程在未来许多项目中都可能有用，你将在 `ModelUtils` 类中封装一个名为\
  \ `createSphereInv` 的方法，用于创建并翻转球体。以下是实现此功能的代码：\n\n```\npublic static ModelInstance\
  \ createSphereInv( float r, Texture t, Color c )\n{\n    Material sphereMaterial\
  \ = new Material();\n    if (t != null)\n        sphereMaterial.set( TextureAttribute.createDiffuse(t)\
  \ );\n    if (c != null)\n        sphereMaterial.set( ColorAttribute.createDiffuse(c)\
  \ );\n    int usageCode = Usage.Position + Usage.ColorPacked\n                  +\
  \ Usage.Normal + Usage.TextureCoordinates;\n\nModel sphereModel = modelBuilder.createSphere(r,r,r,\
  \ 32,32, sphereMaterial, usageCode);\n\nfor (Mesh m : sphereModel.meshes)\n        m.scale(1,1,-1)\
  \ ;\n\nVector3 position = new Vector3(0,0,0);\n\nModelInstance sphere = new ModelInstance(sphereModel,\
  \ position);\n    return sphere;\n}\n```\n\n在进入主游戏代码之前，需要讨论的第三个也是最后一个概念是碰撞检测。为了控制复杂度，三维物体的运动和放置将被限制在二维平面上，从而使本项目能够复用原始\
  \ `BaseActor` 类中的碰撞代码。这种技术在游戏开发中广为人知。采用此方法的游戏（即具有 3D 图形但将游戏玩法限制在 2D 平面，并限制相机移动）被称为\
  \ *2.5D 游戏*。图 8-10 展示了游戏在玩家眼中的呈现效果，而右侧则显示了与图中游戏实体（两块岩石和海盗船）对应的碰撞多边形。\n\n![9781484215012_Fig08-10.jpg](img/9781484215012_Fig08-10.jpg)\n\
  \n图 8-10. 以 3D 渲染的游戏世界，以及对应的 2D 碰撞多边形\n\n要将这些更改整合到项目中，你需要对 `BaseActor3D` 类进行补充。首先，添加以下导入语句：\n\
  \n```\nimport com.badlogic.gdx.math.collision.BoundingBox;\nimport com.badlogic.gdx.math.Polygon;\n\
  import com.badlogic.gdx.math.Intersector;\nimport com.badlogic.gdx.math.Intersector.MinimumTranslationVector;\n\
  ```\n\n声明一个 `Polygon` 变量：\n\n```\nprivate Polygon boundingPolygon;\n```\n\n多边形对象在构造函数中初始化如下：\n\
  \n```\nboundingPolygon = null;\n```\n\n接下来是一对方法，用于将多边形设置为矩形或近似椭圆形（八边形）。在这两种情况下，你都需要确定物体在\
  \ x 和 z 方向上的尺寸；这些量类似于二维情况下的宽度和高度。这些值可以通过计算与模型关联的 `BoundingBox` 来确定，该包围盒是包含整个模型的最小盒子。包围盒使用两个\
  \ `Vector3` 对象存储模型的尺寸：`min` 和 `max`，分别存储模型包含的最小和最大坐标值。这些值用于创建传递给多边形对象的顶点数组，如下所示：\n\
  \n```\npublic void setRectangleBase()\n{\n    BoundingBox modelBounds = modelData.calculateBoundingBox(\
  \ new BoundingBox() );\n    Vector3 max = modelBounds.max;\n    Vector3 min = modelBounds.min;\n\
  \nfloat[] vertices =\n        {max.x, max.z, min.x, max.z, min.x, min.z, max.x,\
  \ min.z};\n    boundingPolygon = new Polygon(vertices);\n    boundingPolygon.setOrigin(0,0);\n\
  }\n\npublic void setEllipseBase()\n{\n    BoundingBox modelBounds = modelData.calculateBoundingBox(\
  \ new BoundingBox() );\n    Vector3 max = modelBounds.max;\n    Vector3 min = modelBounds.min;\n\
  \nfloat a = 0.75f; // 偏移量。\n    float[] vertices =\n        {max.x,0, a*max.x,a*max.z,\
  \ 0,max.z, a*min.x,a*max.z,\n         min.x,0, a*min.x,a*min.z, 0,min.z, a*max.x,a*min.z\
  \ };\n    boundingPolygon = new Polygon(vertices);\n    boundingPolygon.setOrigin(0,0);\n\
  }\n```\n\n设置好多边形后，你可以直接从 `BaseActor` 类复制 `getBoundingPolygon` 和 `overlaps` 方法，只需稍作修改（以粗体显示）：\n\
  \n```\npublic Polygon getBoundingPolygon()\n{\n    boundingPolygon.setPosition(\
  \ position.x, position.z );\n    boundingPolygon.setRotation( getTurnAngle() );\n\
      return boundingPolygon;\n}\n\npublic boolean overlaps(BaseActor3D other, boolean\
  \ resolve)\n{\n    Polygon poly1 = this.getBoundingPolygon();\n    Polygon poly2\
  \ = other.getBoundingPolygon();\n\nif ( !poly1.getBoundingRectangle().overlaps(poly2.getBoundingRectangle())\
  \ )\n        return false;\n\nMinimumTranslationVector mtv = new MinimumTranslationVector();\n\
      boolean polyOverlap = Intersector.overlapConvexPolygons(poly1, poly2, mtv);\n\
      if (polyOverlap && resolve)\n    {\n        this.addPosition( mtv.normal.x * mtv.depth,\
  \ 0,  mtv.normal.y * mtv.depth );\n    }\n    float significant = 0.5f;\n    return\
  \ (polyOverlap && (mtv.depth > significant));\n}\n```\n\n此外，你必须记住在复制角色时复制边界多边形数据，因此需要在\
  \ `BaseActor3D` 类的 `copy` 方法中添加以下代码：\n\n```\nif (orig.boundingPolygon != null)\n\
      this.boundingPolygon = new Polygon(orig.boundingPolygon.getVertices());\n```\n\
  \n现在，你改进后的框架已经完成，可以继续编写 `GameScreen` 类的代码了。从导入语句、变量声明和必要的方法开始。在这个游戏中，需要声明的交互对象是玩家变量，以及一个用于存储岩石对象的\
  \ `ArrayList`，这些岩石对象将在 `update` 方法中检查与玩家的碰撞。\n\n```\nimport com.badlogic.gdx.Gdx;\n\
  import com.badlogic.gdx.Input.Keys;\nimport com.badlogic.gdx.graphics.Color;\nimport\
  \ com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.Texture.TextureFilter;\n\
  import com.badlogic.gdx.graphics.g3d.ModelInstance;\nimport com.badlogic.gdx.graphics.g3d.Model;\n\
  import com.badlogic.gdx.graphics.Mesh;\nimport com.badlogic.gdx.assets.loaders.ModelLoader;\n\
  import com.badlogic.gdx.graphics.g3d.loader.ObjLoader;\nimport com.badlogic.gdx.math.Vector3;\n\
  import com.badlogic.gdx.math.Matrix4;\nimport java.util.ArrayList;\n\npublic class\
  \ GameScreen extends BaseScreen\n{\n    BaseActor3D player;\n    ArrayList<BaseActor3D>\
  \ rockList;\n\npublic GameScreen(BaseGame g)\n    {  super(g);  }\n\npublic void\
  \ create()\n    {    }\n\npublic void update(float dt)\n    {    }\n}\n```\n\n接下来是\
  \ `create` 方法的代码。它首先初始化一个薄盒子，并为其应用水的图像来表示海洋：\n\n```\nBaseActor3D sea = new BaseActor3D();\n\
  Texture seaTex = new Texture(Gdx.files.internal(\"assets/water.jpg\"), true);\n\
  seaTex.setFilter( TextureFilter.Linear, TextureFilter.Linear );\nModelInstance seaInstance\
  \ = ModelUtils.createBox(500, 0.1f, 500, seaTex, Color.GRAY);\nsea.setModelInstance(seaInstance);\n\
  mainStage3D.addActor(sea);\n```\n\n接下来，创建玩家对象。你将使用一个从外部文件加载的海盗船模型。但是，该模型应首先旋转 180\
  \ 度，使其前进方向与负 z 轴对齐。⁵ 为此，将通过应用旋转矩阵来变换船模型的网格：\n\n\n\n```\nplayer = new BaseActor3D();\n\
  player.setPosition(0,0,0);\nModelLoader loader = new ObjLoader();\nModel shipModel\
  \ = loader.loadModel(Gdx.files.internal(\"assets/ship.obj\"));\nfor (Mesh m : shipModel.meshes)\n\
  \    m.transform( new Matrix4().setToRotation(0,1,0, 180) );\nModelInstance shipInstance\
  \ = new ModelInstance(shipModel);\nplayer.setModelInstance(shipInstance);\nplayer.setEllipseBase();\n\
  mainStage3D.addActor(player);\n```\n\n现在，使用之前描述的 `ModelUtils` 类中的 `createSphereInv`\
  \ 方法初始化天空穹顶：\n\n```\nBaseActor3D skydome = new BaseActor3D();\nTexture skyTex =\
  \ new Texture(Gdx.files.internal(\"assets/sky-sphere.png\"), true);\nModelInstance\
  \ skyInstance = ModelUtils.createSphereInv( 500, skyTex, Color.WHITE );\nskydome.setModelInstance(skyInstance);\n\
  skydome.setPosition(0,0,0);\nmainStage3D.addActor(skydome);\n```\n\n接下来的任务是初始化存储岩石对象的\
  \ `ArrayList`，创建一个岩石的基础实例，并使用 `clone` 方法创建多个岩石，在将它们添加到游戏世界之前重新定位它们。\n\n```\nrockList\
  \ = new ArrayList<BaseActor3D>();\n\nModel rockModel = loader.loadModel(Gdx.files.internal(\"\
  assets/rock.obj\"));\nModelInstance rockInstance = new ModelInstance(rockModel);\n\
  BaseActor3D baseRock = new BaseActor3D();\nbaseRock.setModelInstance(rockInstance);\n\
  baseRock.setEllipseBase();\n\nBaseActor3D rock1 = baseRock.clone();\nrock1.setPosition(2,0,2);\n\
  mainStage3D.addActor(rock1);\nrockList.add(rock1);\n\nBaseActor3D rock2 = baseRock.clone();\n\
  rock2.setPosition(-4,0,4);\nmainStage3D.addActor(rock2);\nrockList.add(rock2);\n\
  \nBaseActor3D rock3 = baseRock.clone();\nrock3.setPosition(6,0,6);\nmainStage3D.addActor(rock3);\n\
  rockList.add(rock3);\n```\n\n最后，设置摄像机的位置。这里不会设置观察方向，因为稍后将在 `update` 方法中处理。\n\n```\n\
  mainStage3D.setCameraPosition(2,3,15);\n```\n\n至此，`create` 方法完成。最终的代码添加将在 `update`\
  \ 方法中进行，并且相对简短。必须完成的三个任务包括：检测玩家与岩石之间的碰撞、处理用户输入（飞船只能向前移动以及左右转向），以及设置摄像机方向使其始终面向玩家。这些任务通过以下代码实现，应将其添加到\
  \ `update` 方法中：\n\n```\nfor ( BaseActor3D rock : rockList )\n    player.overlaps(rock,\
  \ true);\n\nfloat speed = 3.0f;\nfloat rotateSpeed = 45.0f;\n\nif ( Gdx.input.isKeyPressed(Keys.W)\
  \ )\n    player.moveForward( speed * dt );\n\nif ( Gdx.input.isKeyPressed(Keys.Q)\
  \ )\n    player.turn( -rotateSpeed * dt );\nif ( Gdx.input.isKeyPressed(Keys.E)\
  \ )\n    player.turn( rotateSpeed * dt );\n\nmainStage3D.setCameraDirection( player.getPosition()\
  \ );\n```\n\n添加此代码后，`GameScreen` 类就完成了。试试看吧！驾驶你的新海盗船在开阔的海面上航行，但要小心那些岩石！\n\n## 后续步骤\n\
  \n有了本章奠定的基础，你现在可以尝试一些练习，并在你的 3D 项目中加入高级功能。本节列出了一些可能性。获取概览并开始阅读新特性的最佳地点通常是 LibGDX\
  \ 维基，它除了包含基本信息外，有时还会提供教程链接。\n\n*   创建一个交互式 3D 场景，其中包含从外部文件加载的各种模型。以下是一些可以下载模型文件的网站（提供多种文件格式）：\n\
  \    *   OpenGameArt：[`opengameart.org`](http://opengameart.org)\n    *   The Models\
  \ Resource：[www.models-resource.com](http://www.models-resource.com)\n    *   TurboSquid：[www.turbosquid.com](http://www.turbosquid.com)（他们有许多免费模型；可以在搜索选项中指定。）\n\
  *   下载 3D 模型后，在将其加载到 LibGDX 之前，你可以使用 3D 图形软件（如 Blender）查看和修改它，该软件可在 [www.blender.org](http://www.blender.org)\
  \ 免费获取。\n*   尝试为本书前面的一些项目创建 2.5D 版本。\n*   要实现高级 3D 物理效果，请将 Bullet 物理引擎集成到你的项目中（此过程将类似于你之前为模拟真实\
  \ 2D 物理而集成 Box2D 物理引擎的工作）。\n*   为你的游戏添加 3D 粒子效果；LibGDX 提供了一个 3D 粒子编辑器（称为 *Flame*）来帮助设计效果（类似于上一章讨论的\
  \ 2D 粒子编辑器）。\n\n## 总结\n\n本章可能只是触及了 3D 游戏编程的皮毛，但这本身已经涉及了大量内容。你探索了 3D 场景的组成部分、透视摄像机和光照。你了解到\
  \ 3D 模型包含网格和材质，模型实例使用矩阵存储变换数据（位置、旋转和缩放）。你改编并扩展了自定义游戏开发框架，加入了 3D 版本的演员和舞台，并学习了在三维世界中移动对象的多种方法。最后，你通过创建两个交互式演示程序，检验了你的技能（和代码）。恭喜你完成了本章的学习，祝你在未来的\
  \ 3D 开发中好运。\n\n____________________\n\n¹关于 3D 图形数学细节的更多信息，有两本优秀的书籍可供参考：Fletcher\
  \ Dunn 和 Ian Parberry 合著的 *3D Math Primer for Graphics and Game Development*（A K\
  \ Peters/CRC Press, 2011），以及 Eric Lengyel 所著的 *Mathematics for 3D Game Programming\
  \ and Computer Graphics*（Cengage Learning PTR, 2011）。\n\n²当使用三个值来表示物体绕三个轴的旋转时，*万向节锁*\
  \ 指的是当物体处于某几个特定方向，导致两个旋转轴对齐时出现的问题，这使得物体在给定方向上无法以某些方式旋转。\n\n³理论上，选择 y 轴作为“向上”方向有些随意，因为你可以在游戏世界中调整自己的朝向，使得任何轴都对应向上方向。\n\
  \n⁴绕向上指向轴的旋转量也称为*偏航角*。类似地，绕侧向指向轴的旋转（头部上下倾斜的运动）称为*俯仰角*，绕前向指向轴的旋转（头部左右倾斜的运动）称为*翻滚角*。\n\
  \n⁵这种修改的需求通常只有在测试代码并目视检查模型时才会变得明显。或者，使用本章后面提到的 Blender 等 3D 建模程序，可以提前检查和调整模型的外观。\n\
  \n## 第九章\n\n![image](img/frontdot.jpg)\n\n旅程继续\n\n\n\n这最后一章将为你呈现一系列在游戏开发道路上值得考虑的步骤。其中包括：探索其他项目、学习相关领域的技能，以及将你的游戏带给更广泛的受众。在此过程中，本章会提供各类资源的清单，以及针对多种情况的通用建议。\n\
  \n**持续你的开发之路**\n\n本节将介绍如何完善你当前的项目，并开始着手新项目，无论是独立完成还是作为游戏开发黑客松（Game Jam）活动的一部分。本节会提供一个在线资源列表，你可以从中获取美术资源来辅助你的开发。最后，我会给出一些中肯的建议，帮助你克服那些必然会出现的障碍。\n\
  \n**推进项目**\n\n希望你已经完成了本书中的所有项目示例。本书介绍的许多项目都以一个名为“后续步骤”的章节结尾。你应该尽可能多地完成这些建议！这一点至关重要，因为*你通过实践来学习*。无论你在阅读某个主题时觉得它多么有道理，只有当你能够独立地迈出下一步，进行设计和编写代码时，你才算真正理解了它。在每个项目功能实现后，你都应该尝试修改代码，并试验你自己的变体。\n\
  \n请确保你在各个层面上都理解每个程序。在局部层面，你应该理解每一行代码的效果，以及每个方法的目的和编写时所考虑的设计因素。在全局层面，你应该知道所有类是如何作为一个统一的整体组合在一起的，框架如此构建背后的逻辑，以及以不同方式修改框架的优缺点。\n\
  \n当你觉得已经尽可能地从本书中汲取了知识和经验后，就该独立行动，开始创建你自己的游戏了。作为开始，我建议创建简单、最小化的示例来实现新的游戏机制（即本书未重点介绍的那些机制）——比如一款射击风格的游戏，敌人会定期向你发射激光；或者一款迷宫逃脱游戏，包含许多出现在不同屏幕上的相互连接的房间；又或者一款冒险游戏，主角挥舞着剑来击败敌人；再或者一款平台游戏，玩家还必须攀爬梯子来穿越关卡。除了了解如何编写更多游戏机制的明显好处之外，弄清楚如何做到这一点的过程本身也是无价的。只有通过思考、规划、编写代码、测试、调试和重写代码，你才能培养出创造力、组织能力、适应性和毅力等技能。\n\
  \n一旦你能够自如地独立实现游戏机制，下一步我建议采用“克隆经典”的方法来学习（但当然不是为了发布！）。选择一个经典游戏（尤其是 20 世纪 80 年代的游戏），并尝试尽可能多地重现其功能：实现游戏机制、关卡设计、美术（图形和音频）风格以及用户界面（菜单屏幕和屏幕上的数据展示）。\n\
  \n具体来说，我建议创建一个物理清单，识别并优先处理你将要处理的每个类别中特定于游戏的功能。此外，我建议按照上一段中给出的顺序，对功能本身的类别进行优先级排序。例如，如果你的主角是一个长着翅膀的弓箭手，在角色能够飞行和射箭之前，不要担心他腰带的颜色。（事实上，在游戏机制编程阶段，开发者使用简单的彩色多边形形状是很常见的做法。）如果你不是艺术家，也不必担心；许多网站提供免费的游戏图形资源，而且社区中也有很多艺术家在寻找合作者。最后，当你对自己的技能和能力感到满意时，就该开发你自己的游戏了，或者加入一个正在开发游戏的团队，贡献你的编程技能。\n\
  \n**获取美术资源**\n\n本书的典型读者可能主要对游戏开发的编程方面感兴趣，但即便如此，每个游戏仍然会从高质量的图形和音频中受益。我推荐以下网站来获取美术资源。这些网站大多提供免费和付费选项，而其他一些则依靠用户捐赠：\n\
  \n*   **Kenney Game Assets**: [`kenney.nl/`](http://kenney.nl/)\n\n由 Kenney Vleugels\
  \ 创建，该网站拥有超过 18,000 个美术资源，可用于多种游戏类型。在本书中，《太空岩石》、《飞机闪避者》、《52 张牌接龙》、《寻宝任务》和《跳跳杰克》系列都使用了该网站的资源。\n\
  \n*   **GameArtGuppy**: [www.gameartguppy.com](http://www.gameartguppy.com)\n\n\
  由 Vicki Wenderlich 创建，该网站包含一系列专为独立游戏开发者精心制作的高质量美术作品。在本书中，《跳跳杰克》游戏中的考拉角色就来自这个网站。\n\
  \n*   **OpenGameArt**: [`opengameart.org`](http://opengameart.org)\n\n一个包含所有类型媒体（2D\
  \ 和 3D 图形，以及音效和音乐）的仓库。贡献由社区驱动。许可细节和条件由各个创作者决定。\n\n*   **The Spriters Resource**:\
  \ [www.spriters-resource.com](http://www.spriters-resource.com)\n\n拥有来自历史上众多游戏主机系统的几乎全面的游戏美术资源集。然而，由于版权限制，这些资源不能用于已发布或商业游戏中。\n\
  \n*   **Cool Text**: [`cooltext.com`](http://cooltext.com)\n\n一个免费的文本艺术图形生成器，可用于为标题屏幕以及用户界面的文本和按钮创建图形。\n\
  \n*   **Textures.com**: [`textures.com`](http://textures.com)\n\n提供多种材质（包括天然和人造材质）的图片。\n\
  \n*   **Bfxr**: [www.bfxr.net](http://www.bfxr.net)\n\n随机生成各种复古风格的游戏音效。\n\n*   **Freesound**:\
  \ [www.freesound.org](http://www.freesound.org)\n\n一个协作式的知识共享许可音效数据库，按包组织，也按标签分组。\n\
  \n*   **Incompetech**: [`incompetech.com/`](http://incompetech.com/)\n\n由 Kevin\
  \ MacLeod 创建，该网站拥有一个免版税的原创音乐作品集，可以按流派、节奏、感觉或乐器进行搜索。在本书中，游戏《海星收集者》（见第 4 章）的背景音乐《盛宴之主》就来自这个作品集。\n\
  \n**参与游戏开发黑客松（Game Jams）**\n\n\n\n获得宝贵游戏开发经验的一种方式是参加游戏创作马拉松（Game Jam）。*游戏创作马拉松*是游戏开发者为了挑战在短时间内（通常约\
  \ 48 小时）设计并制作一款游戏而举办的聚会。参与者可能是程序员、美术师、编剧或其他拥有相关技能的人。由于时间限制，这类活动要求快速原型设计和开发技能，并鼓励参与者专注于创意、核心机制以及将项目完成（或至少达到可玩状态）。许多人参加这些活动正是为了提升自己在这些领域的技能。此外，许多游戏创作马拉松会选择一个主题，所有在活动中开发的游戏都必须融入该主题。主题通常在每个活动开始时公布，以避免提前规划并鼓励创意。\n\
  \n尽管有些游戏创作马拉松设有评审团并宣布一名或多名获胜者，但这些活动通常是非正式且友好的，它们为参与者提供了相互联系的机会，并营造出一种社区感。有些活动可能在一个或多个实体地点举行。有些活动可能没有中心地点；开发者在自己选择的区域工作（但仍需遵守相同的时间和日程限制）。一些著名的长期举办的游戏创作马拉松活动如下：\n\
  \n*   Global Game Jam：[`globalgamejam.org/`](http://globalgamejam.org/)\n\n这是世界上规模最大的游戏创作马拉松——一项每年举办一次的国际性活动，通常在每年一月底举行。这*不是*线上活动；需要现场参与，因此全球通常有数百个实体地点（创作站点）供个人参加。\n\
  \n*   Ludum Dare：[`ludumdare.com/`](http://ludumdare.com/)\n\n主要活动每年举办三次，次要（迷你）活动则在没有主要活动的月份举行。一些参与者会聚集在不同的地点，但大多数开发者都在自己的所在地工作。\n\
  \n*   One Game a Month：[www.onegameamonth.com](http://www.onegameamonth.com)\n\n\
  顾名思义，这些游戏创作马拉松每月举行一次。规则特别宽松，每次活动持续整个月，以便为参与者提供最大的灵活性。组织者是克里斯特·凯蒂拉，他还写了一本书，名为《游戏创作马拉松生存指南》（Packt\
  \ Publishing, 2012），该书详细讨论了这些活动，并提供了大量关于如何获得成功体验的建议。\n\n克服困难\n\n在你作为游戏开发者的旅程中，你有时会遇到挫折。每个人都会。也许你无法弄清楚如何实现某个特定的游戏机制。也许你的程序在运行时出现错误，而你不确定原因。也许你的程序编译并运行了，但你的游戏实体却表现出奇怪且出乎意料的行为。无论你的困难是什么，都不要放弃！花些时间与问题搏斗。尝试不同的方法——也许需要不同的数据结构、类或算法。尝试降低代码的复杂性，将问题分解为更简单的步骤或方法，或者先实现一个更简单的版本，然后逐步构建以达到最终目标。请记住，克服困难的过程是成为游戏开发者的一部分，并帮助你成长。\n\
  \n然而，也要记住，平衡在开发中至关重要（就像在游戏中一样）。是的，学习调试和修正有问题的代码很有价值，但如果某个特定问题持续很长时间，在你变得过度沮丧或气馁之前，先休息一下。要客观看待问题：连续花五个小时试图弄清楚为什么你的平台跳跃游戏角色无法走上斜坡，可能并不值得。暂时离开你的电脑；散散步，想想别的事情，然后带着焕然一新的视角回来处理你的问题。\n\
  \n\n\n在尽己所能尝试解决问题后，如果仍然卡住，请不要绝望：活跃且充满热情的同行游戏开发者与爱好者社区或许能提供帮助。LibGDX 论坛（[www.badlogicgames.com/forum](http://www.badlogicgames.com/forum)）和\
  \ Stack Overflow（[www.stackoverflow.com](http://www.stackoverflow.com)）是两个极佳的求助场所。首先搜索这些网站，看看是否有人问过相同或类似的问题。如果没有，下一步是阅读任何推荐的提问指南。\n\
  \n通常，你应该全面而简洁地描述你的问题或目标，并详细说明你尝试过的方法、哪些有效、哪些无效。有时你甚至会发现，向外部受众仔细措辞问题的过程，反而有助于厘清问题，并激发你找到可能的解决方案或替代方法。如果你的帖子包含代码，请适度引用，但务必确保所有变量都已向读者定义或解释。最重要的是，保持礼貌和耐心。经常访问这些网站的人通常在其他地方有全职工作，他们是出于社区意识自愿访问这些论坛并提供一般性帮助。一个已发布的问题在\
  \ 48 小时甚至更长时间内没有得到回复，是完全正常的。（在此期间，请积极参与社区活动，看看是否有人发布了*你*可能回答的问题。）\n\n每当有人回复你的问题时，务必向他们致谢；如果他们建议了行动方案，请写一篇后续帖子说明该方案是否有效。最后，如果你最终自己解决了问题，或者决定完全转向另一个方向来规避问题，你也应该发布这些信息，以便为未来的读者提供一个了结。\n\
  \n拓展你的视野\n\n除了加深知识深度和提高编程熟练度，你还应该投入时间发展游戏相关领域的广度知识，这将对你所制作游戏的质量产生积极影响。本节简要提及几种实现这一目标的方法。\n\
  \n玩不同类型的游戏\n\n大多数游戏爱好者都有自己偏爱的类型。有些人大部分时间都在玩第一人称射击游戏，另一些人则更喜欢花时间在角色扮演游戏上，等等。作为一名游戏开发者，你应该考虑尽可能广泛地玩游戏：动作、冒险、解谜、策略、角色扮演、体育、模拟、叙事等等。同时，尝试不同时期（从经典到现代）的游戏，以及不同规模开发者（从大型专业公司到小型工作室，再到独立游戏制作者和游戏开发大赛参与者）制作的游戏。\n\
  \n即使你觉得某个特定游戏或类型并不吸引人，花时间玩这些游戏也会让你作为开发者成长，尤其是当你带着开发者的思维去玩时。试着理解人们为什么喜欢某个游戏。审视每个游戏的关卡推进、玩法平衡、叙事与角色发展、艺术风格和界面设计。留意是什么让每个游戏具有创新性或独特性。试着在脑海中将自己置于创造该游戏的原始开发者的角色，思考他们做出那些决定可能的原因，并思考你是否会做出同样的选择，或者走向不同的方向。\n\
  \n提升你的技能组合\n\n在继续开发游戏的同时，你也应该考虑拓宽你的整体技能组合。扎实的编程技能非常受欢迎，但游戏开发者（尤其是独立工作或在小型工作室工作的开发者）通常需要成为多面手，尤其是在图形和音频领域。要开始学习这些领域，我推荐以下软件和教程：\n\
  \n*   Inkscape：[`inkscape.org/`](http://inkscape.org/)\n\n用于创建矢量图形的软件，免费提供。该网站包含一系列适用于所有技能水平的高质量教程。然而，与我们兴趣最相关的是\
  \ Chris Hildenbrand 编写的一套游戏美术教程，可在此处获取：\n\n[`2d-game-art-tutorials.zeef.com/chris.hildenbrand`](http://2d-game-art-tutorials.zeef.com/chris.hildenbrand)\n\
  \n*   Spine：[`esotericsoftware.com/`](http://esotericsoftware.com/)\n\n一款专为游戏开发设计的\
  \ 2D 骨骼精灵动画工具。Spine 的主要开发者之一 Nathan Sweet 也是 LibGDX 的主要贡献者之一，因此将 Spine 创建的动画文件集成到\
  \ LibGDX 项目中有一个简化的流程。\n\n*   Audacity：[`audacityteam.org/`](http://audacityteam.org/)\n\
  \n一款多轨音频编辑器和录音器，免费提供。Audacity 手册包含大量教程，将教你各种有用的录音和编辑技巧。\n\n推荐阅读\n\n除了拓宽技能组合，拓宽知识基础也是值得的。市面上有大量与游戏开发相关的书籍，它们正是为此目的而存在。当然，这里无法一一列举，而且我无疑遗漏了一些高质量的作品。尽管如此，本节列出了一些来自不同领域的代表性样本，涵盖各种主题，以展示可获取的资源范围：游戏设计、文学方面、历史和社会影响：\n\
  \n*   *游戏设计基础*，Ernest Adams 著（New Riders，2013 年）\n\n本书讨论了多种主题：概念开发、玩法设计、核心机制、用户界面、叙事和平衡；还包含练习、工作表和案例研究。\n\
  \n*   *电子游戏写作与设计终极指南*，Flint Dille 与 John Zuur Platten 合著（Lone Eagle，2008 年）\n\n\
  涵盖的主题包括将故事元素整合到游戏中、编写游戏脚本、创建设计文档、创作过程、团队动态和商业考量。\n\n*   *经典游戏*，Bill Loguidice 与\
  \ Matt Barton 合著（Focal Press，2012 年）\n\n本书探讨了有史以来最具影响力的电子游戏的历史，特别关注它们的开发过程、评论界反响以及对行业的影响。\n\
  \n*   *游戏改变世界：游戏化如何让现实变得更美好*，Jane McGonigal 著（Penguin Books，2011 年）\n\n在这本书中，作者在游戏玩的背景下讨论了心理学、认知科学、社会学和哲学的理论，并解释了游戏如何能让我们更高效，以及如何让世界变得更美好。\n\
  \n紧跟游戏行业的当前新闻和发展动态，以及了解同行游戏开发者的观点、方法、挣扎和成功，也很有用。为此，没有比关注博客更好的选择了。以下是一些特别重要的网站，它们定期发布博客文章（以及额外的有用信息和资源）：\n\
  \n*   Gamasutra：[www.gamasutra.com](http://www.gamasutra.com)\n\n一个致力于游戏制作艺术和商业的网站，除其他资源外，还包含精心策划的博客文章列表，涉及行业的各个方面。\n\
  \n*   GameDev.net：[www.gamedev.net](http://www.gamedev.net)\n\n面向所有领域和专业水平开发者的资源网站，包含关于游戏开发技术、创意和商业方面的文章和教程。\n\
  \n*   HobbyGameDev：[www.hobbygamedev.com](http://www.hobbygamedev.com)\n\n由 Chris\
  \ DeLeon（一位专业的电子游戏开发者、作家和讲师）维护，这个定期更新的网站包含文章、建议、教程、案例研究、访谈等内容。\n\n传播你的游戏\n\n\n\n\
  当你设计并创建了自己的游戏后，应该考虑与他人分享——毕竟，游戏就是用来玩的！这个过程需要你将作品打包成可玩的格式，并找到一群热切的游戏爱好者作为受众。\n\n\
  ### 为桌面电脑打包\n\n分享游戏最简单的方法是创建可执行的 JAR 文件。\n\n1.  为此，请确认你的启动器类包含如下所示的主方法（如有必要，请调整方法的名称和参数以匹配此格式）：\n\
  \n```\n    public static void main (String[] args)\n    ```\n\n2.  然后，在 BlueJ 菜单栏中，选择\
  \ Project → Create Jar File；此时会弹出一个小窗口。该窗口提示，如果指定了主类，你创建的 JAR 文件将是可执行的。这正是你想要做的！从下拉列表中，选择你的启动器类的名称。\n\
  3.  此外，你的可执行 JAR 文件还需要 BlueJ 在开发游戏时使用的所有 LibGDX JAR 文件的副本。如果你一直将这些文件存储在项目目录的 `+libs`\
  \ 文件夹中，可以直接跳到下一段。如果你使用了其他方法，例如将 LibGDX JAR 文件存储在 BlueJ 的 userlibs 目录中，那么窗口中标记为“Include\
  \ User Libraries”的部分将列出 JAR 文件的名称，包括包含 LibGDX 类的文件。在这种情况下，请务必在继续之前选中所有 LibGDX JAR\
  \ 文件旁边的复选框。\n4.  此时，你可以点击 Continue 按钮。会弹出一个文件目录，要求你为 JAR 文件指定一个名称。\n5.  输入你的游戏名称，然后点击\
  \ Create 按钮。由于你的应用程序需要额外的 JAR 文件，系统会在你指定的位置创建一个目录，在该目录中你会找到一个以游戏名称命名、扩展名为 `.jar`\
  \ 的文件；此目录还应包含来自 BlueJ 项目 `+libs` 目录的所有 LibGDX JAR 文件，或者你在“Create Jar File”窗口中选择的那些文件。所有这些\
  \ JAR 文件必须位于同一目录中，才能运行你的游戏。BlueJ 项目目录中其他文件夹（例如 assets 文件夹）的所有内容都存储在你的游戏 JAR 文件中。\n\
  \n要运行你的游戏，只需双击游戏的 JAR 文件，游戏就会启动。¹ 你可以通过将此目录中的文件集发送给他人，轻松地与他们分享你的游戏。² 唯一需要注意的是，潜在用户必须在他们的计算机上安装\
  \ Java 才能运行你的游戏。对于没有安装 Java 的用户，你有两个主要选择：\n\n*   你可以告知用户需要安装 Java，并引导他们访问 Java 网站\
  \ [www.java.com](http://www.java.com)。\n*   你可以使用第三方工具将你的 JAR 文件转换为适用于各种操作系统的原生可执行文件；其中一个工具叫做\
  \ JWrapper，可从 [www.jwrapper.com](http://www.jwrapper.com) 获取。\n\n### 为其他平台编译\n\n\
  为其他平台（例如 Android、iOS 以及通过 HTML5/JavaScript 的网页浏览器）编译项目是 LibGDX 的主要优势之一。然而，要有效地做到这一点，需要使用高级集成开发环境。本节简要介绍为\
  \ Android Studio IDE 设置 LibGDX 项目所需的步骤。有关配置 IDE 设置、编译和导出的更多详细信息，你需要查阅列出的资源。\n\n\
  1.  Android Studio³ 是一个基于 IntelliJ 平台的 IDE。下载并安装此软件（与 Android SDK 捆绑的版本）后，安装程序很可能会下载一组更新的软件包。\n\
  2.  此过程完成后，访问 LibGDX Wiki 项目设置网站⁴，并从 wiki 页面上的链接下载 `gdx-tools.jar`，这是一个可执行的 JAR\
  \ 文件。运行此文件，你将看到一个类似于图 9-1 的屏幕。\n\n![9781484215012_Fig09-01.jpg](img/9781484215012_Fig09-01.jpg)\n\
  \n图 9-1. LibGDX 项目设置工具\n\n3.  在这里，你需要输入项目名称、包名（例如 `com.mygdx.spacerocks`）、Game 类的名称（或者在我们扩展的框架中，是继承自\
  \ `BaseGame` 的类）、你希望存储文件的目录，以及安装 Android Studio 时 Android SDK 的安装路径。\n4.  在接下来的一系列复选框中，你可以指定要为哪些平台进行开发（对于初学者，我建议选择\
  \ Android 和 Desktop）。如果你的项目需要任何第三方库或扩展（例如 Box2D 或游戏手柄控制器扩展），你可以在此处指定。\n5.  然后点击\
  \ Generate 按钮，系统会在你设置时指定的目录中为你创建一组项目文件。首次生成项目时，此过程可能需要一些时间，因为设置文件会下载许多依赖文件。\n6.\
  \  全部完成后，重启 Android Studio，选择 Import Project 选项，然后选择名为 `build.gradle` 的文件。\n\n当你的项目打开时，你会注意到已经为你准备了一个目录结构，包括名为\
  \ *core*、*android* 和 *desktop* 的目录。后两个目录包含为其对应平台预先制作的启动器文件。*core* 目录是你放置所有其他类的地方。你需要为项目配置许多设置，例如编辑配置以指定游戏资源所在的工作目录。前面提到的\
  \ LibGDX wiki 包含你需要阅读的详细信息，以帮助你启动并运行项目，如果你决定进一步朝这个方向发展的话。\n\n### 寻找发布渠道\n\n作为一名游戏开发者，最大的乐趣之一就是让别人玩你的游戏。即使项目尚未完成，让人们试玩你的游戏并提供反馈，也能帮助你的作品达到更高的高度，并吸引更多的受众。许多网站支持独立游戏开发者，并提供论坛供你与社区分享你的作品。其中一些网站（例如\
  \ Indie DB 和 Game Jolt）甚至允许你在注册账户后将游戏上传到他们的服务器。\n\n*   Indie DB: [www.indiedb.com](http://www.indiedb.com)\n\
  *   Game Jolt: [`gamejolt.com/`](http://gamejolt.com/)\n*   GameDev.net: [www.gamedev.net](http://www.gamedev.net)\n\
  *   The Independent Games Source (TIGSource): [www.tigsource.com](http://www.tigsource.com)\n\
  *   Indie Gamer 论坛: [`forums.indiegamer.com/`](http://forums.indiegamer.com/)\n\n\
  如果你将游戏发布到这些来源之一，在等待他人对你作品的评价时，你应该努力成为其论坛的活跃参与者。尝试一些游戏，并向你的开发者同行提供反馈。我们都受益于一个充满活力的游戏开发社区，所以一定要加入并成为其中的一员！\n\
  \n有了这最后的建议，我们共同走过这本书的旅程就结束了。然而，希望你作为游戏开发者的旅程能够继续。祝你在未来的所有努力中好运！\n\n__________________\n\
  \n\n\n¹如果你的项目在 BlueJ 中运行正常，但在运行可执行的 JAR 文件时遇到困难，BlueJ 网站提供了各种建议和有用资源的链接，请访问 [www.bluej.org/help/ask-help.html](http://www.bluej.org/help/ask-help.html)。\n\
  \n²为确保在将文件发送给他人时不会遗漏任何文件，你可能需要使用诸如 7-Zip ([www.7-zip.org](http://www.7-zip.org))\
  \ 之类的程序来创建一个包含游戏所需所有 JAR 文件的单一文件（称为归档文件或 zip 文件）。\n\n³获取地址：[`developer.android.com/sdk/index.html`](http://developer.android.com/sdk/index.html)\n\
  \n⁴获取地址：[`github.com/libgdx/libgdx/wiki/Project-Setup-Gradle`](http://github.com/libgdx/libgdx/wiki/Project-Setup-Gradle)\n\
  \n附录 A\n\n![image](img/frontdot.jpg)\n\nJava 基础回顾\n\n本附录简要回顾了您应熟悉的 Java 核心概念，以便理解本书所呈现的内容。这并不是对\
  \ Java 编程的完整介绍，因此，如果您对其中任何主题不熟悉，建议查阅关于 Java 的教科书或教程系列¹以了解更多相关内容。\n\n数据类型与运算符\n\n\
  首先，我们列出 Java 中一些基本的，或称*原始*的数据类型：\n\n*   * int：整数（没有小数部分的数字）\n*   * float：小数值\n*\
  \   * double：小数值，存储精度是 float 的两倍\n*   * char：单个字符（一个字母、数字或符号）\n*   * boolean：布尔值\
  \ true 或 false\n\n另一个常用的数据类型是 String，它表示文本：一组字符。严格来说，这不是一种原始数据类型，但可以用类似的方式进行初始化。\n\
  \nJava 也使用常见的二元*算术运算符*：加法、减法、乘法、除法（对于整数来说是求商）和取余，分别由符号 +、-、*、/ 和 % 表示。当与两个相同类型的值一起使用时，结果也将是相同的类型。例如，5.0/2.0\
  \ 的值是 2.5，而 5/2 的值是 2。结果之所以不同，是因为在第一个例子中值的类型是 double，而在第二个例子中值的类型是 int。\n\n当执行涉及两种类型值的算术运算时，值将被转换，或称*强制转换*，为更复杂的类型。例如，5.0/2\
  \ 的结果是 2.5。如果需要，可以将一种类型的数值手动强制转换为另一种类型，方法是在其前面加上括号中的目标类型名称。例如，(double)2 产生值 2.0，而\
  \ (int)2.5 产生值 2。（当强制转换为 int 时，该值总是向下取整到最接近的整数值。）\n\n原始变量可以通过一行代码进行声明和初始化，语法如下：\n\
  \n```\nvariableType variableName = initialValue;\n```\n\n或者，这些任务可以在单独的语句中完成：\n\n\
  ```\nvariableType variableName;\nvariableName = initialValue;\n```\n\n除了使用 = 为变量赋值外，Java\
  \ 还提供了*赋值运算符*（为简洁起见），它们通过一个常量值修改变量的值。例如，语句 x = x + 5 可以用语句 x += 5 代替。其他每个算术运算都有对应的赋值运算符：-=、*=、/=\
  \ 和 %=。\n\n数值可以使用*条件运算符*进行比较：== 表示等于，!= 表示不等于，< 表示小于，<= 表示小于或等于，> 表示大于，>= 表示大于或等于。比较的结果是一个布尔值——true\
  \ 或 false——如果需要，可以将其存储在布尔变量中。布尔值可以使用*布尔运算符*进行组合：&& 表示*与*，|| 表示*或*，! 表示*非*。\n\n*数组*是一个包含固定数量相同类型值的对象。数组的*长度*在创建时设定。数组中的值可以在创建时初始化（并且大小将被推断出来）。例如，以下代码创建了一个包含五个字符的数组：\n\
  \n```\nchar[] letters = { 'g' , 'a' , 'm' , 'e' , 's' } ;\n```\n\n或者，可以仅指定长度来创建数组，如下所示，用于创建一个包含\
  \ 10 个整数的数组（并且可以在稍后设置值）：\n\n```\nint[] values = new int[10];\n```\n\n数组中的项通过其位置，或称*索引*来访问，索引从数字\
  \ 0 开始。例如，对于前面名为 letters 的数组，letters[0] 产生值 g，letters[1] 产生字母 a，依此类推，直到 letters[4]\
  \ 产生 s。请注意，该数组的长度为 5，但位置编号为 0 到 4。（这通常是成立的；长度为 *n* 的数组的索引编号为 0 到 *n* – 1。）请注意，一旦创建了数组，其大小就不能更改；尝试将值存储到数组中不存在的索引位置将导致程序运行时出错。\n\
  \n控制结构\n\nJava 程序中的语句通常按顺序一个接一个地执行。*控制结构*可以改变执行顺序，要么仅当满足某些条件时才运行某些语句，要么重复执行一组给定的语句。\n\
  \n条件语句\n\nif 语句用于指定仅当某个条件（或条件组合，或布尔表达式）求值为 true 时，才应运行特定的一组语句。例如，以下代码仅当 time 的值大于\
  \ 60 时，才会将 100 加到变量 bonus 上；如果 time 的值不大于 60，则大括号内的代码将不会执行。\n\n```\nif (time > 60)\n\
  {\n    bonus += 100;\n}\n```\n\n大括号内可以包含任意数量的语句。但是，如果大括号内只包含一条语句，则可以省略大括号，代码将产生相同的结果，如下所示：\n\
  \n```\nif (time > 60)\n    bonus += 100;\n```\n\n当需要提供一组备选语句，以便在相关条件求值为 false 时执行时，可以使用\
  \ if-else 语句。以下代码基于前面的示例进行了扩展，增加了以下行为：如果 time 的值*不*大于 60，则 bonus 的值将增加 50。\n\n```\n\
  if (time > 60)\n{\n    bonus += 100;\n}\nelse\n{\n    bonus += 50;\n}\n```\n\n有时，您可能希望针对一组值测试变量的相等性，并在每种情况下执行不同的语句集。例如，考虑以下代码，它根据\
  \ itemCount 的值等于 0、1、2 还是其他值来打印一条消息。\n\n```\nif (itemCount == 0)\n    System.out.print(\"\
  You have no items.\");\nelse if (itemCount == 1)\n    System.out.print(\"You have\
  \ a single item.\");\nelse if (itemCount == 2)\n    System.out.print(\"You have\
  \ two items.\");\nelse\n    System.out.print(\"You have many items!\");\n```\n\n\
  switch 语句提供了编写此类代码的另一种方式（通常更易于阅读）。以下代码包含一个 switch 语句，其效果与前面介绍的 if-else 语句完全相同。if-else\
  \ 语句中的每个值比较都对应于 switch 代码块中的 case 关键字出现，而最后的 else 语句对应于 default 关键字。在列出针对某个 case\
  \ 要执行的语句集之后，必须包含一个 break 语句（否则，无论变量是否等于所呈现的值，后续 case 对应的语句也将被执行）。\n\n\n\n```\nswitch\
  \ (itemCount)\n{\n    case 0:\n        System.out.print(\"You have no items.\");\n\
          break;\n    case 1:\n        System.out.print(\"You have a single item.\"\
  );\n        break;\n    case 2:\n        System.out.print(\"You have two items.\"\
  );\n        break;\n    default:\n        System.out.print(\"You have many items!\"\
  );\n}\n```\n\n重复语句\n\n`while` 语句用于在给定条件为真时重复执行一组语句。例如，只要变量 `stars` 的值大于 0，以下代码就会持续将变量\
  \ `score` 增加 5，并将变量 `stars` 的值减去 1：\n\n```\nwhile (stars > 0)\n{\n    score += 5;\n\
      stars -= 1;\n}\n```\n\n当一组语句需要重复执行但次数未知时，`while` 语句尤为有用。使用 `while` 语句时必须小心，因为如果关联的条件始终为真，那么这些语句将永远执行下去！\n\
  \n`for` 语句用于以固定次数重复执行一组语句。在典型用法中，一个变量被设置为初始值，只要涉及该变量的条件为真，就执行一组语句。之后，该变量的值按给定数量改变，再次检查条件，依此类推，直到给定条件求值为假。以下示例首先将变量\
  \ `n` 设置为 1，只要 `n` 小于 10，就将 `points` 增加 3；每次循环迭代时，`n` 的值增加 1：\n\n```\nfor (int n =\
  \ 1; n < 10; n++)\n{\n    points += 3;\n}\n```\n\n`for` 循环在处理数组的任务中特别有用。例如，以下代码初始化一个名为\
  \ `numbers` 的数组来存储五个整数，`for` 循环将值 `10*n` 存储在数组的每个位置 `n` 上。请注意，循环变量初始化为 0（因为这是数组的第一个索引），并且条件是变量小于数组的长度。（你必须在条件中使用*小于*比较，因为数组中的最大索引始终等于数组长度减\
  \ 1。）\n\n```\nint[] numbers = new int[5];\nFor (int n = 0; n < numbers.length();\
  \ n++)\n{\n        numbers[n] = 10 * n;\n}\n```\n\n`for` 语句语法的一种变体，称为*增强型* `for`\
  \ 语句，便于访问数组的值。作为一个示例，考虑以下代码，它从名为 `grades` 的数组中取出每个值，并将它们全部添加到一个名为 `total` 的变量中：\n\
  \n```\nfor (int n = 0; n < grades.length(); n++)\n{\n    int num = grades[n];\n\
      total += num;\n}\n```\n\n使用以下代码可以更高效地实现完全相同的结果，它会自动（按顺序）提取数组的元素，并将它们存储到一个变量中，然后执行循环内的语句：\n\
  \n```\nfor (int num : grades)\n{\n    total += num;\n}\n```\n\n方法\n\n*方法*是一组组合在一起的语句，可以被反复调用来执行一项任务。每个方法都有一个关联的名称，可以接受零个或多个值作为输入，并且可能返回一个值，也可能不返回。每个方法都包含在一个称为*类*的结构中，稍后将对此进行更详细的介绍。这里介绍方法的语法，并立即总结各个组成部分。\n\
  \n```\nmodifer returnType methodName ( variableType variableName , ... )\n{\n      //\
  \ statements\n}\n```\n\n*   `modifier` 是一个关键字（例如 `public` 或 `private`），指示此方法在程序中可以在何处使用。\n\
  *   `returnType` 指示返回的数据类型，如果方法不返回任何数据，则可以设置为 `void`。\n*   `methodName` 是方法的名称。\n\
  *   在括号内，对于要提供的每个输入，你必须列出输入的类型（由 `variableType` 指示）以及它在后续语句中将被引用的名称（由 `variableName`\
  \ 指示）。\n\n例如，以下名为 `average` 的公共访问方法接受两个 `float` 值作为输入，计算它们的平均值（也是一个 `float`），并返回此值：\n\
  \n```\npublic float average(float x, float y)\n{\n    return (x + y) / 2;\n}\n```\n\
  \n方法的调用方式有两种，具体取决于它们的编写方式。某些方法可以从包含它们的类中调用。例如，`Math` 类包含一个名为 `sqrt` 的方法，用于计算一个数的平方根；要使用此方法计算\
  \ 4 的平方根，你可以编写 `Math.sqrt(4)`。或者，某些方法是从变量调用的。例如，每个 `String` 变量都包含一个名为 `charAt` 的方法，该方法返回字符串中给定位置的字符。如果你创建一个名为\
  \ `word` 的 `String`，其中包含文本 `games`，那么 `word.charAt(2)` 将返回字符 `m`。\n\n对象和类\n\n*对象*是相关数据以及操作这些数据的方法的集合。*类*是一组代码，用作可以从中创建对象的原型或蓝图。某些类在\
  \ Java 中自动可用（例如 `String`、`Math` 和 `System` 类）。要在程序中使用其他类，你必须通过使用 `import` 语句来指示应加载众多可用类中的哪些类。例如，为了能够在程序中使用\
  \ `Random` 类（它是 `java.util` 包的一部分），你必须在程序的开头包含以下行：\n\n```\nimport java.util.Random;\n\
  ```\n\n要从此类创建一个对象（也称为类的*实例*），你需要使用 `new` 运算符，后跟该类的一个称为*构造方法*的特殊方法。构造方法的名称始终与相应类的名称相同，并且它可能需要输入值来初始化属于该类的数据。例如，要创建\
  \ `Random` 类的一个实例，你可以使用以下代码：\n\n```\nRandom rand = new Random();\n```\n\n在此之后，你就可以使用变量\
  \ `rand` 的方法，例如 `nextInt`（它返回一个随机生成的整数），如下所示：\n\n```\nint secret = rand.nextInt();\n\
  ```\n\n前面提到的 `String` 类是特殊的，因为它可以像基本类型变量（如 `int` 或 `float`）一样被初始化，但它也可以使用 `new`\
  \ 运算符进行初始化（这需要将要存储的文本作为输入）：\n\n```\nString name = new String(\"Lee\");\n```\n\n\
  Java（或任何面向对象编程语言）最强大的功能之一是能够定义你自己的类。作为一个深入的示例，以下名为 `Fraction` 的类存储了分数中使用的数据：分子和分母（均为整数）。有一个构造方法来设置这些值，一个创建分数\
  \ `String` 表示的方法，以及一个将分数转换为 `float` 值（通过计算商）的方法。\n\n```\nclass Fraction\n{\n    //\
  \ numerator\n    int n;\n    // denominator\n    int d;\n\n// constructor\n    Fraction(int\
  \ a, int b)\n    {\n        n = a;\n        d = b;\n    }\n\n// creates a String\
  \ representation\n    public String toString()\n    {\n        return (n + \"/\"\
  \ + d);\n    }\n\n// convert to a float value\n    public float convertToFloat()\n\
      {\n        return (float)n / d;\n    }\n}\n```\n\n接下来是一个示例类，它使用了前面定义的 `Fraction`\
  \ 类。具体来说，它创建并初始化了一个 `Fraction` 对象，然后使用其方法并将结果打印到屏幕上。（一个技术细节：你必须将 `main` 方法声明为 `static`，以便能够直接从类而不是从类的实例运行该方法。）\n\
  \n```\nclass Sample\n{\n    public static void main()\n    {\n        Fraction frac\
  \ = new Fraction(3,4);\n        String fracString = frac.toString();\n        float  fracValue  =\
  \ frac.convertToFloat();\n        System.out.println( \"The value of \" + fracString\
  \ + \" is \" + fracValue );\n    }\n}\n```\n\n\n\n有时在编写类时，您会希望控制对数据的访问，要么是为了限制可赋值的可能值范围，要么是为了防止程序的其他部分意外更改数据（可能是由于代码中的错误）。*访问修饰符*\
  \ 就用于此类情况；它们可以被包含进来，以指定其他类是否可以使用特定的字段或方法。最常见的两种修饰符是 `public` 和 `private`，其中 `public`\
  \ 表示任何类都可以访问相应的变量或方法，而 `private` 表示只能在定义它的类内部访问。还有一种较少使用的修饰符 `protected`，它允许在定义类及其任何子类（即继承该类的类）内部进行访问。\n\
  \n作为访问修饰符何时有用的一个实际示例，让我们回到自定义的 `Fraction` 类。分数的分母永远不应设置为零（因为除以零会导致矛盾的数学结果）。您可以通过将类字段设置为\
  \ `private`，并重写构造函数（或任何其他相关方法）以在此情况下采取行动来防止这种不希望出现的行为，如下所示：\n\n```\nclass Fraction\n\
  {\n    // 分子\n    private int n;\n    // 分母\n    private int d;\n\n// 构造函数\n    Fraction(int\
  \ a, int b)\n    {\n        n = a;\n        if (b == 0)\n        {\n            System.err.println(\"\
  无效分母；将值更改为 1。\");\n            d = 1;\n        }\n        else\n        {\n            d\
  \ = b;\n        }\n    }\n\n// 其他方法保持不变\n}\n```\n\n总结\n\n这些主题——数据类型、运算符、控制结构、方法和类——是您创建自己程序的基础。在实际应用中，您的代码通常会比给出的示例长得多；您的类无疑会包含多个\
  \ `import` 语句，声明各种类型的许多变量，并拥有多种方法，每种方法都包含大量语句。在从事自己的项目时，除了编写自己的类之外，您的程序可能还会使用许多预定义的类。因此，花些时间熟悉\
  \ Java 文档格式中呈现的信息风格和类型是很好的做法，无论是官方的 Java 语言参考³还是您项目中包含的任何 Java 库的文档。\n\n____________________\n\
  \n¹由 Oracle 公司维护的官方 Java 教程可在线获取，网址为 [`docs.oracle.com/javase/tutorial/java/index.html`](http://docs.oracle.com/javase/tutorial/java/index.html)。\n\
