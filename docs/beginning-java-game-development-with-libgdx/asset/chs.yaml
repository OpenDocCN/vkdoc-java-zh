  \n**总结**\n\n在本章中，你创建了一组可重用的类，这些类可以极大地简化未来项目的代码开发流程。你重构了上一章的代码，并创建了 `BaseScreen`\
  \ 类，其中包含许多游戏通用的标准数据和启动任务，例如存储和初始化 `Stage` 对象。你了解了如何处理离散输入（例如按键的初次按下或鼠标点击），并创建了《气球破坏者》游戏。最后，你创建了\
  \ `Actor` 类的三个扩展：`BaseActor`，用于执行基于通用多边形形状的碰撞检测与解析；`AnimatedActor`，用于管理动画集合；以及 `PhysicsActor`，用于存储和处理与运动相关的数据，如速度和加速度。这些类的使用通过《海星收集者》游戏进行了演示。你已经取得了长足的进步，在下一章中，你将通过学习如何在游戏中融入声音和音乐，再次向前迈进一大步。\n\
