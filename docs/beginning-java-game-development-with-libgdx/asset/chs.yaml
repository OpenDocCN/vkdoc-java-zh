  \ ContactListener，它将被添加到 World 对象中，用于响应所有碰撞事件（类似于使用 InputListener 对象来响应用户输入事件）。当\
  \ World 对象在 update 方法中运行物理模拟时，如果任意两个夹具发生碰撞，ContactListener 将处理游戏逻辑中接下来应该发生的事情。\n\
  \n事实证明，Contact 对象使用起来有点棘手。它们存储了发生接触的两个 Fixture 对象的引用；可以通过 Contact 类的 getFixtureA\
  \ 和 getFixtureB 方法获取这些引用。然而，出于游戏逻辑的目的，你需要确定这些夹具是否属于某种特定类型的对象，如果是，则返回该对象（如果不是，则返回\
  \ null）。这个任务将由一个名为 getContactObject 的实用方法完成，该方法将正在检查的 Contact 对象以及正在搜索的对象类型的 Class\
  \ 作为参数。（Java 中的每个类都有一个名为 class 的静态字段，可用于标识其对象类型，例如 Coin.class 或 Player.class。对于类未知的对象，你可以使用\
  \ getClass 方法来确定正确的类。）如果 Contact 对象包含一个与具有指定类的对象相对应的 Body 的 Fixture，那么 getContactObject\
  \ 方法将返回对该对象的引用。\n\n还有一个重载版本的 getContactObject 方法，它额外有一个对应于名称的 String 参数，并且仅当关联的类具有给定的类型\
  \ *并且* 关联的夹具具有给定的名称时，才返回一个 Object。为了使这些方法正常工作，Body 用户数据必须存储对关联对象的引用，并且 Fixture 用户数据必须存储夹具的名称。完成这些任务的代码如下所示，应包含在\
  \ GameUtils 类中。首先，添加 import 语句：\n\n```\nimport com.badlogic.gdx.physics.box2d.Contact;\n\
  ```\n\n然后添加以下方法：\n\n```\npublic static Object getContactObject(Contact theContact,\
  \ Class theClass)\n{\n    Object objA = theContact.getFixtureA().getBody().getUserData();\n\
      Object objB = theContact.getFixtureB().getBody().getUserData();\n\nif (objA.getClass().equals(theClass)\
  \ )\n        return objA;\n    else if (objB.getClass().equals(theClass) )\n        return\
  \ objB;\n    else\n        return null;\n}\n\npublic static Object getContactObject(Contact\
  \ theContact, Class theClass, String fixtureName)\n{\n    Object objA  = theContact.getFixtureA().getBody().getUserData();\n\
      String nameA = (String)theContact.getFixtureA().getUserData();\n    Object objB  =\
  \ theContact.getFixtureB().getBody().getUserData();\n    String nameB = (String)theContact.getFixtureB().getUserData();\n\
  \nif ( objA.getClass().equals(theClass) && nameA.equals(fixtureName) )\n        return\
  \ objA;\n    else if ( objB.getClass().equals(theClass) && nameB.equals(fixtureName))\n\
          return objB;\n    else\n        return null;\n}\n```\n\n有了这些实用方法，你现在可以回到\
  \ GameScreen 类，编写一个实现 ContactListener 接口的匿名内部类。必须编写的方法称为 beginContact、endContact、preSolve\
  \ 和 postSolve。后两个方法在此游戏中不需要，因此这里不涉及。另外两个方法 beginContact 和 endContact 非常有用；它们分别在一对夹具首次相互接触时，以及一对夹具停止接触时被调用。\n\
  \n对游戏重要的接触事件类型如下：\n\n*   当 Coin 对象和 Player 对象的“main”夹具首次接触时，该硬币应被添加到 removeList。这在\
  \ beginContact 方法中处理。\n*   如果任何固体（即非 Coin）对象和 Player 的“bottom”夹具首次接触，则将玩家的地面计数变量加\
  \ 1，并将玩家的动画设置为站立。这也在 beginContact 方法中处理。\n*   如果任何固体（即非 Coin）对象和 Player 的“bottom”夹具脱离接触，则将玩家的地面计数变量减\
  \ 1。这在 endContact 方法中处理。\n\n这些任务由以下代码实现：\n\n```\nworld.setContactListener(\n    new\
  \ ContactListener()\n    {\n        public void beginContact(Contact contact)\n\
          {\n            Object objC = GameUtils.getContactObject(contact, Coin.class);\n\
              if (objC != null)\n            {\n                Object p = GameUtils.getContactObject(contact,\
  \ Player.class, \"main\");\n                if (p != null)\n                {\n\
                      Coin c = (Coin)objC;\n                    removeList.add( c );\n\
                  }\n\nreturn; // 避免可能的跳转\n            }\n            Object objP\
  \ = GameUtils.getContactObject(contact, Player.class, \"bottom\");\n            if\
  \ ( objP != null )\n            {\n                Player p = (Player)objP;\n                p.adjustGroundCount(1);\n\
                  p.setActiveAnimation(\"stand\");\n            }\n        }\n\npublic\
  \ void endContact(Contact contact)\n        {\n            Object objC = GameUtils.getContactObject(contact,\
  \ Coin.class);\n            if (objC != null)\n                return;\n            Object\
  \ objP = GameUtils.getContactObject(contact, Player.class, \"bottom\");\n            if\
  \ ( objP != null )\n            {\n                Player p = (Player)objP;\n                p.adjustGroundCount(-1);\n\
              }\n        }\n\npublic void preSolve(Contact contact, Manifold oldManifold)\
  \ { }\n\npublic void postSolve(Contact contact, ContactImpulse impulse) { }\n\n\
  });\n```\n\n至此，create 方法就完成了。由于前面的 ContactListener 对象中包含所有游戏逻辑代码，update 方法非常简短。首先，清除\
  \ removeList 的内容。然后，假设游戏以每秒 60 帧的速度运行，使用 World 对象的 step 方法激活物理模拟。在模拟过程中，ContactListener\
  \ 可能会被激活，对象可能会被添加到 removeList；如果是这样，将它们从它们的 Stage 中移除，并从 World 中移除相应的 Body。³ 然后处理连续的用户输入：如果用户正在按下左或右箭头键，则施加一个力，使玩家向相应方向移动。根据玩家的速度设置站立和行走动画。（请注意，如果玩家的跳跃动画正在播放，切换到站立动画的唯一方法是当玩家落地时，这已由前面的\
  \ ContactListener 代码处理。）\n\n```\npublic void update(float dt)\n{\n    removeList.clear();\n\
      world.step(1/60f, 6, 2);\n    for (Box2DActor ba : removeList)\n    {\n        ba.destroy();\n\
          world.destroyBody( ba.getBody() );\n    }\n\nif( Gdx.input.isKeyPressed(Keys.LEFT)\
  \ )\n    {\n        player.setScale(-1,1);\n        player.applyForce( new Vector2(-3.0f,\
  \ 0) );\n    }\n\nif( Gdx.input.isKeyPressed(Keys.RIGHT) )\n    {\n        player.setScale(1,1);\n\
          player.applyForce( new Vector2(3.0f, 0) );\n    }\n\nif ( player.getSpeed()\
  \ > 0.1 && player.getAnimationName().equals(\"stand\") )\n        player.setActiveAnimation(\"\
  walk\");\n    if ( player.getSpeed() < 0.1 && player.getAnimationName().equals(\"\
  walk\") )\n        player.setActiveAnimation(\"stand\");\n}\n```\n\n最后，离散的用户输入——暂停游戏、重置游戏以及让玩家跳跃——通过\
  \ keyDown 方法处理：\n\n```\npublic boolean keyDown(int keycode)\n{\n    if (keycode\
  \ == Keys.P)\n        togglePaused();\n\n\n\n```java\nif (keycode == Keys.R)\n \
  \       game.setScreen( new GameScreen(game) );\n\nif (keycode == Keys.SPACE &&\
  \ player.isOnGround() )\n    {\n        Vector2 jumpVec = new Vector2(0,3);\n  \
  \      player.applyImpulse(jumpVec);\n        player.setActiveAnimation(\"jump\"\
  );\n    }\n\nreturn false;\n}\n```\n\n至此，“跳跃杰克”的代码就完成了。快来试试这个游戏吧——推动板条箱、踢球，当然还有四处跳跃！请特别注意模拟出的微妙物理特性：球会在屏幕上滚动并与物体碰撞反弹；当板条箱和球相邻时，杰克可以通过推动其中一个来同时移动两者；此外，杰克还能从球顶跳得更高（因为球的弹性系数很大）。\n\
  \n## 集成多个组件\n\n作为本章的压轴大戏，你将创建一个整合了所有主题的项目：一款基于瓦片地图中存储的关卡数据、包含粒子特效和真实物理效果的平台跳跃游戏。鉴于我们预计上一款项目“跳跃杰克”发布后会获得极高赞誉，本节将制作其续作，名为**《跳跃杰克\
  \ 2：更多金币》**，如图 7-17 所示。\n\n![9781484215012_Fig07-17.jpg](img/9781484215012_Fig07-17.jpg)\n\
