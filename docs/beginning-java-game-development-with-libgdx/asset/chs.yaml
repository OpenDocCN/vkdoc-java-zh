  \n![9781484215012_Fig07-18.jpg](img/9781484215012_Fig07-18.jpg)\n\n图 7-18. 闪光粒子特效\n\
  \n要创建此特效，请启动 LibGDX 粒子编辑器，新建一个名为**sparkler**的发射器（并删除预加载的示例发射器）。为了增加多样性，在“图像”属性部分，点击“打开”按钮，选择文件\
  \ sparkle.png。将“最大数量”设为 25，“持续时间”设为 500，“发射高值”设为 50。修改“大小”曲线，以重现“骤降”形状。将“速度”设为“激活”，并将其“高值”范围设为\
  \ 20 到 50。将“角度”设为“激活”，并将其“高值”范围设为 0 到 360。最后，将“色调”颜色设为橙色。将此发射器以文件名 sparkle.pfx 保存到你的\
  \ assets 目录中（别忘了添加.pfx 后缀，因为编辑器不会自动添加）。\n\n接下来，你将使用 Tiled 设置一个瓦片地图。新建一个宽 20 个瓦片、高\
  \ 10 个瓦片的瓦片地图；每个瓦片的宽度和高度均为 64 像素。然后加载瓦片集 platform-tiles-64.png（其瓦片尺寸也是 64x64 像素）。为了将项目组织成图层，首先将现有图层命名为**Tiles**。然后从菜单栏中选择“图层”![image](img/arrow.jpg)“添加图像图层”，并将其命名为**Background**。（你可能已经猜到，该图层可用于显示图像，且该图像将作为背景。）在“图层”面板中，右键单击\
  \ Background 图层并选择“下移图层”；这将把 Background 图层移到 Tiles 图层下方，这在渲染瓦片地图时非常重要。最后，添加两个对象图层；将第一个命名为**ObjectData**，第二个命名为**PhysicsData**。\n\
  \n现在，是时候设计和构建关卡了。首先，单击 Background 图层，在左侧的“属性”面板中会出现一个“图像”字段，你可以在其中加载图像。无需手动输入名称，可以使用选中该字段时出现的省略号按钮。从\
  \ assets 文件夹中选择名为 background.png 的图像。接下来，切换到 Tiles 图层，使用“印章画笔”设计你的关卡。图 7-19 展示了一种设计方案，但你可以根据自己的喜好自由修改布局。\n\
  \n![9781484215012_Fig07-19.jpg](img/9781484215012_Fig07-19.jpg)\n\n图 7-19. 《跳跃杰克\
  \ 2》的瓦片地图布局\n\n接下来，需要向对象图层添加几何数据。在 ObjectData 图层上，添加一个矩形来表示玩家的起始位置，并在“属性”面板中将该矩形命名为**player**。同样在\
  \ ObjectData 图层上，添加多个矩形来表示金币对象的位置，并确保将每个矩形都命名为**coin**。为了方便，可以通过右键单击并选择“复制对象”来复制矩形对象；新副本将直接出现在原始对象上方，然后可以将其拖拽到新位置。最后，在\
  \ PhysicsData 图层上，添加覆盖所有代表固体表面的瓦片部分的矩形，并在瓦片地图的边界周围添加一些矩形，以防止玩家走出地图边界（你可能需要缩小视图才能访问瓦片地图边界以外的区域）。这些矩形的添加如图\
  \ 7-20 所示，与之前一样，我在图中用斜线突出显示了这些矩形，使其更清晰可见。完成后，将你的工作以文件名 platform-map.tmx 保存到 assets\
  \ 目录中。\n\n![9781484215012_Fig07-20.jpg](img/9781484215012_Fig07-20.jpg)\n\n图 7-20.\
  \ 添加并突出显示矩形对象数据的瓦片地图\n\n完成粒子特效和瓦片地图数据后，你现在可以继续为《跳跃杰克 2》编写代码了。\n\n## 《跳跃杰克 2：更多金币》\n\
  \n在 ParticleActor 和 Box2DActor 类奠定所有基础之后，你已经准备好直接进入 GameScreen 类的代码编写了。首先，你需要编写数量惊人的导入语句：\n\
  \n```java\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\nimport\
  \ com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.GL20;\nimport\
  \ com.badlogic.gdx.graphics.Texture.TextureFilter;\nimport com.badlogic.gdx.graphics.g2d.Animation;\n\
  import com.badlogic.gdx.graphics.g2d.Animation.PlayMode;\nimport com.badlogic.gdx.math.MathUtils;\n\
  import com.badlogic.gdx.math.Vector2;\nimport com.badlogic.gdx.math.Rectangle;\n\
  import java.util.ArrayList;\n\n// box2d 导入\nimport com.badlogic.gdx.physics.box2d.World;\n\
  import com.badlogic.gdx.physics.box2d.ContactListener;\nimport com.badlogic.gdx.physics.box2d.Contact;\n\
  import com.badlogic.gdx.physics.box2d.Manifold;\nimport com.badlogic.gdx.physics.box2d.ContactImpulse;\n\
  \n// tilemap 导入\nimport com.badlogic.gdx.maps.MapObject;\nimport com.badlogic.gdx.maps.MapObjects;\n\
  import com.badlogic.gdx.maps.objects.RectangleMapObject;\nimport com.badlogic.gdx.maps.objects.PolygonMapObject;\n\
  import com.badlogic.gdx.maps.tiled.TiledMap;\nimport com.badlogic.gdx.maps.tiled.TiledMapRenderer;\n\
  import com.badlogic.gdx.maps.tiled.TmxMapLoader;\nimport com.badlogic.gdx.maps.tiled.renderers.OrthogonalTiledMapRenderer;\n\
  import com.badlogic.gdx.graphics.Camera;\nimport com.badlogic.gdx.graphics.OrthographicCamera;\n\
  ```\n\n\n\n接下来是变量声明和必要的方法。其中包含一个 Player 对象和一个用于模拟物理效果的 World。一个 ArrayList 将存储待从游戏中移除的演员，而一个\
  \ ParticleActor 的基础实例将用于在需要时进行克隆。此外，还有一个用于存储瓦片地图的变量，以及用于渲染瓦片地图的对象。\n\n```\npublic\
  \ class GameScreen extends BaseScreen\n{\n    private Player player;\n    private\
  \ World world;\n    private ArrayList<Box2DActor> removeList;\n    private ParticleActor\
  \ baseSparkle;\n    TiledMap tiledMap;\n    OrthographicCamera tiledCamera;\n    TiledMapRenderer\
  \ tiledMapRenderer;\n    int[] backgroundLayer = {0};\n    int[] tileLayer      \
  \ = {1};\n    // 游戏世界尺寸\n    final int mapWidth = 1280; // 比以前更大！\n    final int\
  \ mapHeight = 600;\n\npublic GameScreen(BaseGame g)\n    {  super(g);  }\n\npublic\
  \ void create()\n    {    }\n\npublic void update(float dt)\n    {    }\n\n}\n```\n\
  \n此外，还会有一个名为 addSolid 的方法，用于生成与固体对象对应的 Box2DActor。不过，与原始 Jumping Jack 游戏中需要手动计算位置和尺寸的版本不同，此方法旨在从瓦片地图数据中的\
  \ RectangleMapObject 提取必要信息。\n\n```\npublic void addSolid(RectangleMapObject rmo)\n\
  {\n    Rectangle r = rmo.getRectangle();\n    Box2DActor solid = new Box2DActor();\n\
      solid.setPosition(r.x, r.y);\n    solid.setSize(r.width, r.height);\n    solid.setStatic();\n\
      solid.setShapeRectangle();\n    solid.initializePhysics(world);\n}\n```\n\n\
  接下来是 create 方法的代码。首先，照常初始化 world 和 removeList。由于瓦片地图会处理背景图像，因此无需 BaseActor 来显示背景。玩家的动画会立即初始化，但玩家的物理数据要等到从瓦片地图中获取玩家位置后才会初始化。此外，本部分还初始化了\
  \ Coin 对象的基础实例和用于后续使用的闪光效果。\n\n```\nworld = new World(new Vector2(0, -9.8f), true);\n\
  removeList = new ArrayList<Box2DActor>();\n\n// 背景图像由瓦片地图提供\n\n// 玩家\nplayer = new\
  \ Player();\n\nAnimation walkAnim = GameUtils.parseImageFiles(\n        \"assets/walk-\"\
  , \".png\", 3, 0.15f, Animation.PlayMode.LOOP_PINGPONG);\nplayer.storeAnimation(\
  \ \"walk\", walkAnim );\n\nTexture standTex = new Texture(Gdx.files.internal(\"\
  assets/stand.png\"));\nstandTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
  player.storeAnimation( \"stand\", standTex );\n\nTexture jumpTex = new Texture(Gdx.files.internal(\"\
  assets/jump.png\"));\njumpTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
  player.storeAnimation( \"jump\", jumpTex );\n\nplayer.setSize(60,90);\nmainStage.addActor(player);\n\
  // 稍后设置玩家其他属性...\n\n// 金币\nCoin baseCoin = new Coin();\nTexture coinTex = new Texture(Gdx.files.internal(\"\
  assets/coin.png\"));\ncoinTex.setFilter(TextureFilter.Linear, TextureFilter.Linear);\n\
  baseCoin.storeAnimation( \"default\", coinTex );\n\nbaseSparkle = new ParticleActor();\n\
  baseSparkle.load(\"assets/sparkler.pfx\", \"assets/\");\n```\n\n接下来，加载瓦片地图并初始化相关对象，方式与\
  \ Treasure Quest 游戏相同：\n\n```\n// 加载瓦片地图\ntiledMap = new TmxMapLoader().load(\"\
  assets/platform-map.tmx\");\ntiledMapRenderer = new OrthogonalTiledMapRenderer(tiledMap);\n\
  tiledCamera = new OrthographicCamera();\ntiledCamera.setToOrtho(false,viewWidth,viewHeight);\n\
  tiledCamera.update();\n```\n\n遍历瓦片地图的 ObjectData 层，获取与玩家和金币对象相关的数据：\n\n```\nMapObjects\
  \ objects = tiledMap.getLayers().get(\"ObjectData\").getObjects();\nfor (MapObject\
  \ object : objects)\n{\n    String name = object.getName();\n    // 所有对象数据均假定以矩形形式存储\n\
      RectangleMapObject rectangleObject = (RectangleMapObject)object;\n    Rectangle\
  \ r = rectangleObject.getRectangle();\n```\n\n\n```\nif ( name.equals(\"player\"\
  ) )\n    {\n        player.setPosition( r.x, r.y );\n    }\n    else if ( name.equals(\"\
  coin\") )\n    {\n        Coin coin = baseCoin.clone();\n        coin.setPosition(r.x,\
  \ r.y);\n        mainStage.addActor(coin);\n        coin.initializePhysics(world);\n\
  \    }\n    else\n        System.err.println(\"Unknown tilemap object: \" + name);\n\
  }\n```\n\n既然玩家位置已知，就可以初始化玩家与物理相关的数据：\n\n```\nplayer.setDynamic();\nplayer.setShapeRectangle();\n\
  player.setPhysicsProperties(1, 0.5f, 0.1f);\nplayer.setMaxSpeedX(2);\nplayer.setFixedRotation();\n\
  player.initializePhysics(world);\n```\n\n接下来，遍历瓦片地图的 `PhysicsData` 图层，并使用前面的 `addSolid`\
  \ 方法初始化固体对象：\n\n```\nobjects = tiledMap.getLayers().get(\"PhysicsData\").getObjects();\n\
  for (MapObject object : objects)\n{\n    if (object instanceof RectangleMapObject)\n\
  \        addSolid( (RectangleMapObject)object );\n    else\n        System.err.println(\"\
  Unknown PhysicsData object.\");\n}\n```\n\n最后，在 `create` 方法中，需要初始化 `ContactListener`。这段代码与原始\
  \ Jumping Jack 游戏中的对应代码几乎相同。唯一的区别是增加了一些代码，当玩家与金币接触时，会生成一个新的闪烁粒子效果。\n\n```\nworld.setContactListener(\n\
  \    new ContactListener()\n    {\n        public void beginContact(Contact contact)\n\
  \        {\n            Object objC = GameUtils.getContactObject(contact, Coin.class);\n\
  \            if (objC != null)\n            {\n                Object objP = GameUtils.getContactObject(contact,\
  \ Player.class, \"main\");\n                if (objP != null)\n                {\n\
  \                    Coin c = (Coin)objC;\n                    removeList.add( c\
  \ );\n                    ParticleActor sparkle = baseSparkle.clone();\n       \
  \             sparkle.setPosition(\n                        c.getX() + c.getOriginX(),\
  \ c.getY() + c.getOriginY() );\n                    sparkle.start();\n         \
  \           mainStage.addActor(sparkle);\n                }\n                return;\
  \ // 避免可能的跳跃\n            }\n\n            Object objP = GameUtils.getContactObject(contact,\
  \ Player.class, \"bottom\");\n            if ( objP != null )\n            {\n \
  \               Player p = (Player)objP;\n                p.adjustGroundCount(1);\n\
  \                p.setActiveAnimation(\"stand\");\n            }\n        }\n\n\
  \        public void endContact(Contact contact)\n        {\n            Object\
  \ objC = GameUtils.getContactObject(contact, Coin.class);\n            if (objC\
  \ != null)\n                return;\n\n            Object objP = GameUtils.getContactObject(contact,\
  \ Player.class, \"bottom\");\n            if ( objP != null )\n            {\n \
  \               Player p = (Player)objP;\n                p.adjustGroundCount(-1);\n\
  \            }\n        }\n\n        public void preSolve(Contact contact, Manifold\
  \ oldManifold) { }\n\n        public void postSolve(Contact contact, ContactImpulse\
  \ impulse) { }\n    });\n```\n\n`update` 方法和 `keyDown` 方法与 Jumping Jack 游戏中的*完全*相同，但为了完整性，这里再次包含它们的代码：\n\
  \n```\npublic void update(float dt)\n{\n    removeList.clear();\n    world.step(1/60f,\
  \ 6, 2);\n\n    for (Box2DActor ba : removeList)\n    {\n        ba.destroy();\n\
  \        world.destroyBody( ba.getBody() );\n    }\n\n    if ( Gdx.input.isKeyPressed(Keys.LEFT)\
  \ )\n    {\n        player.setScale(-1,1);\n        player.applyForce( new Vector2(-3.0f,\
  \ 0) );\n    }\n\n    if ( Gdx.input.isKeyPressed(Keys.RIGHT) )\n    {\n       \
  \ player.setScale(1,1);\n        player.applyForce( new Vector2(3.0f, 0) );\n  \
  \  }\n\n    if ( player.getSpeed() > 0.1 && player.getAnimationName().equals(\"\
  stand\") )\n        player.setActiveAnimation(\"walk\");\n    if ( player.getSpeed()\
  \ < 0.1 && player.getAnimationName().equals(\"walk\") )\n        player.setActiveAnimation(\"\
  stand\");\n}\n\npublic boolean keyDown(int keycode)\n{\n    if (keycode == Keys.P)\n\
  \        togglePaused();\n\n    if (keycode == Keys.R)\n        game.setScreen(\
  \ new GameScreen(game) );\n\n    if (keycode == Keys.SPACE && player.isOnGround()\
  \ )\n    {\n        Vector2 jumpVec = new Vector2(0,3);\n        player.applyImpulse(jumpVec);\n\
  \        player.setActiveAnimation(\"jump\");\n    }\n\n    return false;\n}\n```\n\
  \n最后，与之前处理瓦片地图时一样，需要重写 `BaseScreen` 类的 `render` 方法，以便相对于舞台以正确的顺序渲染瓦片地图的各个图层。作为最后的润色，添加了视差效果以营造深度感（如同\
  \ Plane Dodger 游戏）：在计算瓦片地图背景层的摄像机 x 坐标时，将其值缩小 4 倍，这样当玩家在关卡中行走时，背景层的滚动速度将仅为瓦片层的四分之一。\n\
  \n```\npublic void render(float dt)\n{\n    uiStage.act(dt);\n\n    // 仅暂停游戏事件，不暂停\
  \ UI 事件\n    if ( !isPaused() )\n    {\n        mainStage.act(dt);\n        update(dt);\n\
  \    }\n\n    // 渲染\n    Gdx.gl.glClearColor(0,0,0,1);\n    Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\
  \n    Camera mainCamera = mainStage.getCamera();\n    mainCamera.position.x =  player.getX()\
  \ + player.getOriginX();\n    // 将主摄像机限制在布局内\n    mainCamera.position.x = MathUtils.clamp(\n\
  \        mainCamera.position.x, viewWidth/2,  mapWidth - viewWidth/2);\n    mainCamera.update();\n\
  \n    // 背景滚动更慢以产生视差效果\n    tiledCamera.position.x = mainCamera.position.x/4 + mapWidth/4;\n\
  \    tiledCamera.position.y = mainCamera.position.y;\n    tiledCamera.update();\n\
  \    tiledMapRenderer.setView(tiledCamera);\n    tiledMapRenderer.render(backgroundLayer);\n\
  \n    tiledCamera.position.x = mainCamera.position.x;\n    tiledCamera.position.y\
  \ = mainCamera.position.y;\n    tiledCamera.update();\n    tiledMapRenderer.setView(tiledCamera);\n\
  \    tiledMapRenderer.render(tileLayer);\n\n    mainStage.draw();\n    uiStage.draw();\n\
  }\n```\n\n至此，Jumping Jack 2 的代码就完成了。试试这个游戏，帮助杰克收集所有金币吧！\n\n总结\n\n在本章中，你学习了如何使用第三方工具和库创建粒子效果、瓦片地图和逼真的物理效果，并将它们分别或组合集成到各种项目中。这些技能将提高你作为游戏开发者的工作效率，使你能够从事更大、更高级的游戏项目。\n\
