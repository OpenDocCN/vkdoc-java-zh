  \n条件语句\n\n循环语句\n\n方法\n\n对象与类\n\n总结\n\n索引\n\n关于作者\n\n**李·斯特姆科斯基**是计算机科学和数学教授。他从事教学已有十年，过去五年专注于视频游戏编程及相关课程。他撰写了多篇学术文章以及游戏开发教程。\n\
  \n关于技术审校\n\n**加里·帕切特**在 IT 和工程领域拥有超过 20 年的经验，从事产品设计、软件创建、系统管理与文档编写。他拥有项目管理硕士学位，是一位专注的“系统极客”，兴趣从技术领域延伸到哲学领域。加里目前以自由职业者身份工作，并参与多个开源项目。\n\
  \n致谢\n\n我要感谢 Apress 出版社出色的编辑和支持团队，没有他们的才华和奉献，您正在阅读的这本书将不会存在。特别感谢本·雷诺-克拉克从一开始就相信这本书，以及马克·鲍尔斯持续的支持和鼓励。\n\
  \n我还要感谢技术审校加里·帕切特，他对本书的编程和教学方面都给予了关注。从一开始，他就凭直觉理解了目标读者是谁，以及他们所需的细节和指导水平。加里许多富有洞察力的评论和建议极大地提高了本书的清晰度，我非常感谢他投入所有时间和精力，帮助使这本书达到最佳状态。\n\
  \n最后，特别感谢我过去和现在的学生们，感谢他们持续且富有感染力的热情。你们对游戏开发的动力和奉献精神正是激励我撰写本书的原因。\n\n引言\n\n欢迎阅读《使用\
  \ LibGDX 进行游戏开发入门》！\n\n\n\n在本书中，你将学习如何使用 LibGDX 游戏开发框架，用 Java 编写游戏程序。LibGDX 库既强大又易于使用，能让你快速高效地创建种类繁多的游戏。LibGDX\
  \ 是免费且开源的，可用于制作 2D 和 3D 游戏，并能轻松集成第三方库以支持更多功能。使用 LibGDX 创建的应用程序是真正的跨平台应用；支持的系统包括\
  \ Windows、Mac OS X、Linux、Android、iOS 以及 HTML5/WebGL。\n\n我教授 Java 编程和电子游戏开发课程已有多年，但常常难以找到一本可以毫无保留地推荐给学生的游戏编程书籍，这促使我撰写了你现在正在阅读的这本书。特别值得一提的是，你会发现本书包含了以下独特的组合特性，这些特性是专门为有志于成为游戏开发者的你（没错，就是你！）而挑选的：\n\
  \n*   本书推荐并解释了如何使用一个简单的 Java 开发环境，以便你能更快地开始编写游戏程序。\n*   通过使用 LibGDX 框架，你无需为渲染图形和播放音频等常见编程任务“重新发明轮子”。（从头开始编写此类代码的解释很容易就需要额外阅读五十页或更多内容。）LibGDX\
  \ 简化了开发流程，让你能够专注于游戏机制和设计。\n*   本书包含*大量*可使用 LibGDX 开发的电子游戏示例。最初的几个示例项目将向你介绍该框架提供的基本功能；这些入门项目将在后续章节中得到扩展，以说明如何添加视觉优化和高级功能。后续项目将重点实现来自多种类型的游戏机制：射击游戏、无限横向卷轴游戏、拖放游戏、平台游戏、俯视视角冒险游戏以及\
  \ 2.5D 游戏。我相信，完成大量示例是学习过程中的基础；你将观察到许多游戏共有的编程模式，你将看到在实践中编写可重用代码的好处，你将有机会比较和对比不同项目中的代码，并且你将通过自行实现额外功能来积累经验。\n\
  *   在本书开头，我仅假设你对 Java 编程有基本的了解。（关于你需要具备哪些背景知识的更多细节，请参阅附录。）在本书的前几章中，高级编程概念将在它们自然出现且为游戏编程所需时被引入和解释。当你读完本书时，你将学到许多高级\
  \ Java 编程主题，这些主题对于一般的软件开发也很有用。\n\n感谢你允许我作为你的向导，开启你的游戏程序员之旅。我希望你会发现本书既富有知识性又充满乐趣，并且它能让你有能力并受到启发，去创建属于自己的电子游戏，与全世界分享。\n\
  \n第 1 章\n\n![image](img/frontdot.jpg)\n\nJava 与 LibGDX 入门\n\n本章将解释如何搭建 Java 开发环境，并将其配置为能与\
  \ LibGDX 游戏开发框架一起运行。你将看到一个简单的“Hello, World!”程序示例，并对其进行足够详细的探索，以理解其不同部分。最后，你将了解使用\
  \ LibGDX 库所能获得的一些优势。\n\n选择开发环境\n\n在深入 Java 编程之前，你需要搭建一个集成开发环境（IDE）：你将用于编写、调试和编译代码的软件。有许多用于编写\
  \ Java 程序的编辑器，每种都针对不同的技能水平进行了定制。BlueJ（[www.bluej.org](http://www.bluej.org)）和 DrJava（[www.drjava.org](http://www.drjava.org)）是为初学者和教育用途设计的，常用于学校和大学的编程入门课程。IntelliJ\
  \ IDEA（[www.jetbrains.com/idea/](http://www.jetbrains.com/idea/)）、NetBeans（netbeans.org）和\
  \ Eclipse（eclipse.org）是高级编辑器，受到从业专业人士的青睐。要编译和运行 Java 代码，你需要 Java 开发工具包（JDK），它可以直接从\
  \ Oracle 公司获得，或者与上面列出的一些编辑器捆绑在一起。\n\n每个编辑器都有其优缺点。BlueJ 和 DrJava 用户友好，具有简单、极简的用户界面，但缺少一些高级编辑器的功能，例如字段、方法和导入语句的自动补全。高级编辑器速度更快、功能丰富、更强大且可定制，并且有各种可用的插件，但它们也有陡峭的学习曲线，并且其用户界面可能让初学者望而生畏。图\
  \ 1-1 通过并排比较 Eclipse 和 BlueJ 的界面说明了这一点。\n\n![9781484215012_Fig01-01.jpg](img/9781484215012_Fig01-01.jpg)\n\
  \n图 1-1. Eclipse（左）和 BlueJ（右）的用户界面\n\n本章将介绍如何搭建 BlueJ。我选择这个特定的 IDE，是因为它设置和配置起来快速简便，这能让你更快地开始编写游戏程序。然而，如果你已经熟悉并习惯使用更高级的编辑器之一，你当然可以随意使用它而不是\
  \ BlueJ。网上有大量关于如何使用 LibGDX 搭建 Eclipse、NetBeans 和 IntelliJ IDEA 的信息资料，可在 LibGDX 维基（[`github.com/libgdx/libgdx/wiki`](https://github.com/libgdx/libgdx/wiki)）上找到。如果你选择使用这些程序之一，那么在设置好你的\
  \ IDE 后，请跳到下一节“为 LibGDX 创建‘Hello, World!’程序”。\n\n搭建 BlueJ\n\n本节将介绍如何搭建 BlueJ IDE。由于它是为初学者设计的，步骤数量很少，过程也很直接，正如你将看到的那样。\n\
  \n下载与安装\n\nBlueJ 可以从 [www.bluej.org](http://www.bluej.org) 下载。\n\n有两个下载选项：一个与 JDK\
  \ 捆绑，另一个不带 JDK。JDK 包含用于开发和调试 Java 应用程序的工具；特别是，它对于编译你的代码是必需的。如果你以前曾使用你的计算机开发过 Java\
  \ 应用程序，你可能已经安装了 JDK，只需选择独立的 BlueJ 安装程序即可。如果你不确定，你应该下载并运行 BlueJ 组合安装程序。\n\n使用 BlueJ\n\
  \n在学习一门新的编程语言或库时，计算机科学中有一个悠久的传统，就是编写一个“Hello, World!”应用程序作为第一个程序。本节将介绍在编写此程序的过程中使用\
  \ BlueJ 的基础知识：\n\n1.  启动 BlueJ 软件。（第一次运行时，它可能会提示你输入存储 JDK 的目录位置。）\n2.  当主窗口出现时，在菜单栏中，选择\
  \ Project ![image](img/arrow.jpg) New Project。BlueJ 将你的工作组织成项目，这些项目以目录形式存储；所有 Java\
  \ 源代码和编译后的类文件都存储在项目目录中。\n3.  当提示输入项目名称时，导航到你的桌面文件夹，输入 **MyProject**，然后点击 OK 按钮。这将在桌面文件夹中创建一个同名的目录。\n\
  \n\n\n完成步骤 3 后，你的屏幕应类似于图 1-2。\n\n![9781484215012_Fig01-02.jpg](img/9781484215012_Fig01-02.jpg)\n\
  \n图 1-2. BlueJ 项目窗口\n\n4.  创建一个新类，可以通过点击“New Class”按钮，或从菜单栏中选择“Edit”![image](img/arrow.jpg)“New\
  \ Class”。\n5.  当系统提示你输入类名时，输入**HelloWorld**，然后按回车键或点击“OK”按钮。此时会出现一个橙色矩形，顶部显示你输入的类名。灰色对角线表示代码尚未编译。\n\
  6.  双击该矩形，或右键点击并选择“Open Editor”来编辑文件。你会看到已添加了一些模板代码；删除所有这些代码，并输入以下代码替换：\n\n```\n\
  \    public class HelloWorld\n    {\n        public static void main()\n        {\n\
  \            System.out.print(\"Hello, World!\");\n        }\n    }\n    ```\n\n\
  将这段代码输入 BlueJ 后，它应类似于图 1-3 中的截图。\n\n![9781484215012_Fig01-03.jpg](img/9781484215012_Fig01-03.jpg)\n\
  \n图 1-3. 在 BlueJ 代码编辑器中显示的“Hello, World!”程序\n\n7.  点击“Compile”按钮编译代码。（此操作也会自动保存你的代码。）你应该会在窗口底部的状态栏中看到“Class\
  \ compiled – no syntax errors”消息。\n8.  右键点击该类的橙色矩形，从出现的列表中选择方法 void main()。这将运行你刚刚编写的方法。此时会出现一个终端窗口，其中包含文本\
  \ *Hello, World!*，如图 1-4 所示。\n\n![9781484215012_Fig01-04.jpg](img/9781484215012_Fig01-04.jpg)\n\
  \n图 1-4. “Hello, World!”程序显示的文本\n\n恭喜你成功使用 BlueJ 运行了第一个程序！\n\nBlueJ 具有许多使编程更轻松的功能。在输入上述代码时，你可能已经注意到了语法高亮（Java\
  \ 关键字和字符串以不同颜色显示），以及类和方法周围显示的不同背景色，这有助于更直观地检查代码。（稍后你会注意到，条件语句和循环也以类似的背景色加以区分。）BlueJ\
  \ 还包含其他你可能觉得有用的功能，例如：\n\n*   自动代码格式化。从“Edit”菜单中选择“Auto-Layout”将调整代码中的空白，使嵌套语句对齐一致。\n\
  *   列出可用的方法名。输入类或对象名后跟句点，然后按 Ctrl+Space 将显示可用方法名列表。\n*   用于缩进/取消缩进和注释/取消注释代码块的快捷键。这些在“Edit”菜单中列出。\n\
  *   用于添加断点的简单界面，可激活调试器，让你逐行执行代码并轻松检查对象。\n\n有关这些功能及其他功能的完整信息，请参阅 BlueJ 参考手册，网址为 [www.bluej.org/doc/bluej-ref-manual.pdf](http://www.bluej.org/doc/bluej-ref-manual.pdf)。\n\
  \n设置 LibGDX\n\n在本节中，你将配置 BlueJ，使其能够使用 LibGDX 软件库。*软件库*是可供其他程序使用的预编写代码和方法的集合。它们的价值在于可重用性——当它们实现频繁需要的过程时，可以加速并简化开发过程，使程序员无需在每次编写程序时都“重新发明轮子”。例如，LibGDX\
  \ 库包含用于显示图形、播放声音和获取用户输入的方法。（高级功能也可用，本章稍后会讨论。）\n\n在 Java 中，库存储在 Java 归档（JAR）文件中。JAR\
  \ 文件包含许多文件（类似于 ZIP 文件）——编译后的 Java 文件，以 JDK 可以导航的标准目录结构存储。你的第一步是下载项目所需的 LibGDX JAR\
  \ 文件。有两个在线来源可以获取这些文件：\n\n*   从网站 [`libgdx.badlogicgames.com/releases/`](https://libgdx.badlogicgames.com/releases/)\
  \ 下载文件名格式为 libgdx-x.y.z.zip 的最新版本文件。这是一个包含所有各种 LibGDX JAR 文件的归档文件。将以下文件解压到你的桌面目录：gdx.jar、gdx-natives.jar、gdx-backend-lwjgl.jar\
  \ 和 gdx-backend-lwjgl-natives.jar。这些文件包含 LibGDX 库的核心代码。\n*   或者，可以从网站 [`libgdx.badlogicgames.com/nightlies/dist/`](https://libgdx.badlogicgames.com/nightlies/dist/)\
  \ 获取这四个 JAR 文件的最新版本。这些是 LibGDX 库的*每日构建*（与指向最新稳定版本的上一链接相对）。这些文件是最新的，但仍在开发中，因此可能包含一些错误或小问题。\n\
  \n获取这四个 JAR 文件后，需要配置 BlueJ，使其能够识别并使用这些文件的内容。有两种主要方法可以做到这一点：\n\n*   让 BlueJ 识别 JAR\
  \ 文件的最简单方法是在项目目录中创建一个名为 +libs 的目录，然后将 JAR 文件复制到此目录中，并重启 BlueJ 软件。默认情况下，当在 BlueJ\
  \ 中打开项目时，它会自动扫描是否存在名为 +libs 的文件夹，并在编译新代码时将其内容纳入考虑。\n*   当有 JAR 文件可能用于多个项目时，与其为每个项目在\
  \ +libs 目录中创建这些文件的冗余副本，不如将它们复制到 BlueJ 软件安装文件夹中一个名为 userlib 的特殊子目录中。该目录的完整路径应类似于\
  \ C:\\Program Files\\BlueJ\\lib\\userlib\\；具体名称可以通过在 Windows 中选择菜单选项“Tools”![image](img/arrow.jpg)“Preferences”，或在\
  \ OS X 中选择“BlueJ”![image](img/arrow.jpg)“Preferences”，然后点击“Libraries”选项卡来确认。\n\n\
  完成这些步骤后，需要重启 BlueJ，然后你就可以准备编写第一个 LibGDX 程序了。\n\n使用 LibGDX 创建“Hello, World!”程序\n\n\
  传统上，“Hello, World!”程序会在屏幕上显示一条文本消息。由于我们的最终目标是创建视频游戏——主要是视觉程序——你的第一个 LibGDX 程序将在窗口中绘制一幅世界图像，如图\
  \ 1-5 所示。\n\n![9781484215012_Fig01-05.jpg](img/9781484215012_Fig01-05.jpg)\n\n图\
  \ 1-5. 使用 LibGDX 创建的“Hello, World!”程序\n\n在这里，你将开始看到一些优势，并开始理解我所说的*基于* LibGDX 库提供的类进行构建的含义。我们的第一个项目包含两个类。第一个类名为\
  \ HelloWorldImage，通过扩展 LibGDX 类 Game 来利用其功能。\n\n扩展类\n\n软件工程的核心原则之一是设计避免冗余的程序，通过创建可重用代码来实现。实现这一目标的一种方法是面向对象的继承概念：基于现有类创建新类。\n\
  \n\n\n例如，假设我们正在设计一款角色扮演游戏，其中可能包含多种可玩角色，比如战士、忍者、盗贼和巫师。如果我们要为每个角色设计类，它们会具有一些共同特征：每个角色都有名字、一定数量的生命值（HP），以及一个可能在模拟战斗时调用的名为\
  \ attack 的方法。\n\n某些特征也可能是每个角色所独有的；例如，巫师可能还有一定数量的魔法值（MP），以及一个在使用魔法时调用的名为 castSpell\
  \ 的方法。由于这些角色之间存在差异，我们无法创建一个能代表所有角色的单一类；同时，在每个单独的类中反复输入相同的字段也显得冗余。针对这种情况，一种优雅的方法是创建一个包含这些角色所有共同特征的基类，然后其他类将继承这个基类。继承类可以访问基类的所有字段和方法，并且也可以像往常一样包含自己的字段和方法。我们可以用以下代码实现这个场景：\n\
  \n```\n  public class Person\n  {\n          String name;\n          int HP;\n          public\
  \ void attack(Person other)\n          {\n                  // 在此处插入代码…\n          }\n\
    }\n```\n\n然后我们可以像下面这样继承 Person 类：\n\n```\n  public class Wizard extends Person\n\
    {\n          int MP;\n          public void castSpell( String spellName )\n          {\n\
                    // 在此处插入代码…\n          }\n  }\n```\n\n接着，如果我们创建这些类的实例：\n\nPerson\
  \ percy = new Person();\nWizard merlin = new Wizard();\n\n那么像 `merlin.MP += 10`\
  \ 和 `merlin.castSpell(\"fireball\")` 这样的命令是有效的，同时涉及基类字段和方法的命令，如 `merlin.HP -= 3`\
  \ 和 `merlin.attack( percy )` 也是有效的。然而，名为 percy 的对象只能使用 Person 类的字段和方法；像 `percy.HP\
  \ += 5` 这样的代码可以编译通过，但 `percy.castSpell(\"lightning\")` 在编译文件时会导致错误。\n\n继承类的概念不仅对游戏中的实体有用，对类似框架的元素也同样适用。例如，拥有一个包含所有菜单类型通用功能（如打开和关闭菜单）的\
  \ Menu 类会很有用。然后，创建其他继承该类的类可能也很有用：例如，可以创建一个名为 SelectionMenu 的类，它是一个专门用于显示某种信息并要求玩家从一组选项中进行选择的菜单。而\
  \ InformationMenu 类可能是一个显示基于文本的信息，并在玩家阅读完毕后直接关闭的菜单。\n\n在你的项目中创建一个名为 HelloWorldImage\
  \ 的新类，并输入以下源代码。请注意，在类本身之前，有一些 import 语句，用于指明你将在本程序中使用的 LibGDX 类。另外请注意，本程序使用了一个名为\
  \ world.png 的图像文件；该图像包含在本章的源代码中，位于 MyProject 文件夹内（源代码可从 apress.com 获取）。你应该将此图像复制到你的\
  \ MyProject 文件夹中。或者，你也可以选择使用自己的图像；建议本程序使用 256x256 像素的尺寸，如果这样做，请不要忘记相应地修改以下代码中的文件名。\n\
  \n```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.files.FileHandle;\n\
  import com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.graphics.g2d.SpriteBatch;\n\
  import com.badlogic.gdx.graphics.Texture;\n\npublic class HelloWorldImage extends\
  \ Game\n{\n    private Texture texture;\n    private SpriteBatch batch;\n\npublic\
  \ void create()\n    {\n        FileHandle worldFile = Gdx.files.internal(\"world.png\"\
  );\n        texture = new Texture(worldFile);\n        batch = new SpriteBatch();\n\
      }\n\npublic void render()\n    {\n        Gdx.gl.glClearColor(1, 1, 1, 1);\n\
          Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\nbatch.begin();\n        batch.draw(\
  \ texture, 192, 112 );\n        batch.end();\n    }\n}\n```\n\nHelloWorldImage 类包含两个对象：一个\
  \ Texture 和一个 SpriteBatch。Texture 是一个存储图像相关数据的对象：图像的尺寸（宽度和高度）以及每个像素的颜色。SpriteBatch\
  \ 是一个将图像绘制到屏幕上的对象。\n\nHelloWorldImage 类还包含两个方法：create 和 render。\n\ncreate 方法初始化\
  \ Texture 和 SpriteBatch 对象。特别是，Texture 对象需要一个图像文件，它将从中获取图像数据。为此，你需要创建一个 FileHandle：一个用于访问计算机上存储文件的\
  \ LibGDX 对象。Gdx 类包含许多有用的静态对象和方法（类似于 Java 的 Math 类）；在这里，你使用一个名为 internal 的方法来生成一个\
  \ FileHandle 对象，该对象将被 Texture 对象使用。internal 方法将在 BlueJ 项目目录中搜索该文件，该目录与编译后的类文件存储位置相同。\n\
  \ncreate 方法执行完毕后，LibGDX 将大约每秒调用 render 方法 60 次。¹ 该方法包含一对静态方法调用：一个用于选择特定的背景颜色，另一个用于使用该颜色清除窗口。\n\
  \n接下来，你将创建第二个类，该类创建 HelloWorldImage 类的实例并激活其方法；这样的类通常被称为*驱动类*，并且需要你编写一个静态方法。\n\n\
  静态方法与驱动类\n\n默认情况下，类的方法由该类的实例调用。然而，方法也可以声明为*静态*，这意味着它是直接从类（而不是实例）调用的。一个方法应该是基于实例还是基于类（静态）取决于该方法的使用方式及其所需的数据。\n\
  \n基于实例的方法通常依赖于该实例特有的内部数据。例如，每个 String 对象都有一个名为 charAt 的方法，该方法接受一个整数作为输入，并返回存储在该\
  \ String 中该位置的字符。如果我们像下面这样创建两个 String 对象：\n\nString player1 = \"Lee\";\nString player2\
  \ = \"Dan\";\n\n那么表达式 `player1.charAt(1)` 返回字符 e，而 `player2.charAt(1)` 返回 a。此方法返回的值取决于存储在该实例中的数据，因此\
  \ charAt 肯定是一个基于实例的方法。\n\n在面向对象的编程语言中，一个类的大多数方法都是基于实例的，因为它们要么依赖于实例变量的值，要么可能改变这些值。当然，也存在静态方法更自然的情况。一般来说，任何不涉及对象内部状态的方法都可以声明为静态（例如数学公式——Java\
  \ 的 Math 类的所有方法都是静态的）。\n\n\n\n*驱动程序类*（有时也称为*主类*、*入口类*、*启动类*或*启动器类*）是一种用于驱动其他类执行的类，通常涉及创建该类的实例并调用其一个或多个方法。驱动程序类通常只需要一个方法即可完成此任务；该方法传统上称为\
  \ main。由于它是程序调用的第一个方法，因此 main 方法*必须*是静态的，因为程序启动时，没有可用的实例来运行基于实例的方法。如果 main 方法不是静态的，我们就会遇到类似于哲学难题的问题：先有鸡还是先有蛋？必须有一种方法能够在不实例化自身的情况下实例化一个类，而这正是驱动程序类的静态\
  \ main 方法所做的事情。\n\n一个标准的“Hello, World!”程序可以使用驱动程序类重写如下：\n\n```\n  public class Greeter\n\
    {\n          public void sayHello()\n          {\n                  System.out.print(\"\
  Hello!\");\n          }\n  }\n\npublic class Launcher\n  {\n          public static\
  \ void main()\n          {\n                  Greeter greta = new Greeter();\n                  greta.sayHello();\n\
            }\n  }\n```\n\n接下来，在同一个项目中，创建一个名为 HelloLauncher 的类，其中包含以下代码：\n\n```\n\
  import com.badlogic.gdx.backends.lwjgl.LwjglApplication;\npublic class HelloLauncher\n\
  {\n    public static void main (String[] args)\n    {\n        HelloWorldImage myProgram\
  \ = new HelloWorldImage();\n        LwjglApplication launcher = new LwjglApplication(\
  \ myProgram );\n    }\n}\n```\n\n正如前面“静态方法和驱动程序类”边栏中提到的，该类首先创建了一个 HelloWorldImage\
  \ 类的实例，名为 myProgram。然后，main 方法没有直接运行 myProgram 的方法，而是创建了一个 LwjglApplication 对象，该对象将\
  \ myProgram 作为输入；构造函数执行一些初始化任务，然后按照前面讨论的方式运行 myProgram 的 create 和 render 方法。\n\n\
  缩写词 *LWJGL* 代表 *Lightweight Java Game Library*（轻量级 Java 游戏库），这是一个由 Caspian Rychlik-Prince\
  \ 最初创建的开源 Java 库，旨在简化游戏开发中访问台式计算机硬件资源的过程。在 LibGDX 中，LWJGL 用于桌面后端，以支持所有主要的桌面操作系统，例如\
  \ Windows、Linux 和 Mac OS X。\n\n拥有一个与包含游戏功能的类分离的驱动程序类的另一个好处是，有可能为其他平台（例如 LibGDX 也支持的\
  \ Android）创建驱动程序类。\n\n当您为这两个类输入所有代码后，返回 BlueJ 的主窗口，然后单击 Compile 按钮。然后右键单击 HelloLauncher\
  \ 类的橙色矩形，在出现的方法列表中，选择列出的 void main(String[] args) 方法。此时会弹出一个窗口，如果需要，您可以在其中输入一个字符串数组作为输入——但您不需要这样做。单击\
  \ OK 按钮，您应该会看到一个窗口，如前面图 1-5 所示。\n\n恭喜您完成了使用 LibGDX 的第一个应用程序！\n\n使用 LibGDX 的优势\n\n\
  除了能够编译游戏使其在多个平台上运行之外，使用 LibGDX 游戏开发框架还有许多其他优势。LibGDX 使得完成以下任务变得简单：\n\n*   渲染 2D\
  \ 图形、动画、基于位图的字体和粒子效果\n*   流式播放音乐和播放音效\n*   处理来自键盘、鼠标、触摸屏、加速度计或游戏手柄的输入\n*   使用场景图和完全可换肤的\
  \ UI 控件库组织用户界面\n*   集成第三方插件，例如 Box2D 物理引擎 (box2d.org)、Tiled 地图编辑器文件格式 (mapeditor.org)\
  \ 和 Spine 2D 动画软件 (esotericsoftware.com)\n*   使用材质和光照效果渲染 3D 图形，并从常见文件格式（如 OBJ 和\
  \ FBX）加载 3D 模型\n\nLibGDX 功能的完整列表可在网站 [`libgdx.badlogicgames.com/features.html`](http://libgdx.badlogicgames.com/features.html)\
  \ 上找到。\n\n总结\n\n在本章中，您设置了 BlueJ（一个用于 Java 编程的集成开发环境），并配置 BlueJ 以使用 LibGDX 游戏开发框架。然后，您使用\
  \ LibGDX 创建了第一个应用程序：一个“Hello, World!”程序，该程序在一个窗口中显示世界图像。该程序涉及扩展 LibGDX 的 Game 类，并创建一个在桌面上运行该程序的驱动程序类。在此过程中，您还了解了该程序中涉及的其他一些类。最后，您了解了\
  \ LibGDX 库的一些其他功能，其中许多功能将在后续章节中详细讨论。\n\n______________________\n\n¹由于在此示例中纹理和坐标都没有变化，因此\
  \ render 方法被重复调用的事实与此无关。但是，如果您定期更改图像，则可以生成动画；如果您逐渐更改坐标，则可以模拟运动。您将在下一章中了解如何实现这两种变化。\n\
  \n第 2 章\n\n![image](img/frontdot.jpg)\n\nLibGDX 框架\n\n本章介绍 LibGDX 库的许多主要功能。它说明了如何在创建名为\
  \ *Cheese, Please!* 的游戏过程中使用这些功能，在该游戏中，您将帮助玩家角色 Mousey 在地板上四处乱窜，寻找一块美味的奶酪。该游戏运行时的屏幕截图如图\
  \ 2-1 所示。您将看到几种完成标准游戏编程任务的方法，例如表示游戏实体。然后，您将逐步添加各种功能，例如动画、用户界面和介绍性菜单屏幕。\n\n![9781484215012_Fig02-01.jpg](img/9781484215012_Fig02-01.jpg)\n\
  \n图 2-1。游戏 Cheese, Please! 的主屏幕\n\n理解游戏的生命周期\n\n在进入游戏开发的编程方面之前，理解游戏程序的整体结构非常重要：游戏程序经历的主要阶段，以及游戏程序在每个阶段必须执行的任务。这些阶段如下：\n\
  \n\n\n*   ***启动阶段**：在此阶段，加载所有需要的文件（如图像或声音），创建游戏对象，并初始化数值。\n*   ***游戏循环**：在游戏运行期间持续重复的阶段，包含以下三个子阶段：\n\
  \    *   ***处理输入**：程序检查用户是否执行了任何向计算机发送数据的操作：按下键盘按键、移动鼠标或点击鼠标按钮、触摸或滑动触摸屏、或按下游戏手柄的摇杆或按钮。\n\
  \    *   ***更新**：执行涉及游戏世界状态及其内部实体的任务。这可能包括根据用户输入或物理模拟改变实体的位置，执行碰撞检测以确定两个实体何时相互接触以及应执行何种响应动作，或为非玩家角色选择行动。\n\
  \    *   ***渲染**：在屏幕上绘制所有图形，例如背景图像、游戏世界实体和用户界面（通常覆盖在游戏世界之上）。\n*   ***关闭阶段**：当玩家向计算机输入表明其已完成软件使用的指令时（例如，点击“退出”按钮），此阶段开始。可能涉及从内存中移除图像或数据、保存玩家数据或游戏状态、通知计算机停止监控硬件设备的用户输入，以及关闭游戏创建的所有窗口。\n\
  \n图 2-2 中的流程图说明了这些阶段发生的顺序。\n\n![9781484215012_Fig02-02.jpg](img/9781484215012_Fig02-02.jpg)\n\
  \n图 2-2. 游戏程序的各个阶段\n\n一些游戏开发者可能会在游戏循环中包含额外的阶段，例如：\n\n*   ***休眠**阶段：将程序的执行暂停一段指定的时间。许多游戏开发者致力于编写能够以每秒\
  \ 60 帧（FPS）运行的程序，这意味着游戏循环每 16.67 毫秒运行一次。¹ 如果游戏循环运行速度可以超过此值，则可以指示程序在 16.67 毫秒间隔的剩余时间内暂停，从而将\
  \ CPU 释放给可能正在后台运行的其他应用程序。LibGDX 会自动为我们处理此问题，因此我们在此无需担心。\n*   ***音频**阶段：在此阶段，流式播放背景音乐或播放音效。在本书中，我们将播放音频视为更新阶段的一部分，并将在后续章节中讨论如何实现。\n\
  \n这些阶段中的大多数都由 LibGDX 中的相应方法处理。例如，启动阶段由 `create` 方法执行，更新和渲染阶段均由 `render` 方法处理，² 而任何关闭操作则由名为\
  \ `dispose` 的方法执行。\n\n实际上，当你的驱动类创建任何类型的 `Application`（例如 `LwjglApplication`）时，只有当提供给它的对象包含一组特定的方法（包括\
  \ `create`、`render` 和 `dispose`）时，该应用程序才能正常工作；这是一项必要的约定，以便 `Application` 知道在游戏程序生命周期的每个阶段该做什么。在\
  \ Java 程序中，强制执行此类要求的方式是使用接口。\n\n接口\n\n非正式地说，你可以将*接口*视为一种其他类可以承诺履行的契约。举一个简单的例子，假设你编写了一个\
  \ `Player` 类，其中包含一个名为 `talkTo` 的方法，用于与环境中的对象进行交互。`talkTo` 方法接受一个名为 `creature` 的单一输入，在随后的代码中，你会有：\n\
  \n`creature.speak();`\n\n为了使 `talkTo` 方法正常工作，无论 `creature` 是哪个类的实例，它*必须*有一个名为 `speak`\
  \ 的方法。也许有时 `creature` 是 `Person` 类的实例，而其他时候 `creature` 是 `Monster` 类的实例。通常，你希望 `talkTo`\
  \ 方法尽可能具有包容性——任何具有 `speak` 方法的对象都应被允许作为输入。你可以通过使用接口来实现此行为。\n\n首先，你创建一个接口，如下所示：\n\
  \n`public interface Speaker`\n`{`\n`    public void speak();`\n`}`\n\n乍一看，接口看起来类似于类，不同之处在于方法仅被声明；它们不包含任何实际代码。所需要的只是方法的*签名*：名称、输出类型、输入类型（如果有）以及任何修饰符（如\
  \ `public`）。此信息后跟一个分号，而不是我们熟悉的包含代码的花括号。实现此接口的类将为其版本的 `speak` 函数提供代码。我强调，由于 `Speaker`\
  \ 不是一个类，你*不能*创建 `Speaker` 对象的实例；相反，你编写其他类，这些类包含 `Speaker` 接口中指定的方法。\n\n一个类通过在类名后添加关键字\
  \ `implements`，后跟接口名称，来表示它满足接口的要求（即它包含所有指定的字段和方法）。任何实现 `Speaker` 接口的类都必须为其版本的 `speak`\
  \ 函数提供代码。以下通过一个名为 `Person` 的类和一个名为 `Monster` 的类进行演示：\n\n`public class Person implements\
  \ Speaker`\n`{`\n`    // 上面的附加代码`\n`    public void speak()`\n`    {   System.out.println(\
  \ \"Hello.\" );  }`\n`    // 下面的附加代码`\n`}`\n\n`public class Monster implements Speaker`\n\
  `{`\n`    // 上面的附加代码`\n`    public void speak()`\n`    {  System.out.println(\"\
  Grrr!\");  }`\n`    // 下面的附加代码`\n`}`\n\n永远记住，在实现接口时，你*必须*为接口中声明的所有内容编写方法；否则，将会出现编译时错误。你甚至可以编写一个在花括号之间不包含任何代码的方法，如下所示（针对一个代表特别沉默寡言的家具的类）。当你只需要使用接口的部分功能时，这可能会很方便。\n\
  \n`public class Chair implements Speaker`\n`{`\n`    // 上面的附加代码`\n`    public void\
  \ speak()  { }`\n`    // 下面的附加代码`\n`}`\n\n最后，你编写 `talkTo` 方法，使其接受一个 `Speaker` 作为输入：\n\
  \n`public class Player`\n`{`\n`        // 上面的附加代码`\n\n`public void talkTo(Speaker\
  \ creature)`\n`        {`\n`                creature.speak();`\n`        }`\n\n\
  `// 下面的附加代码`\n`}`\n\n任何实现了 `Speaker` 接口的类都可以用作 `Player` 对象的 `talkTo` 方法的输入。例如，我们提供一些代码来创建这些类中每一个的实例，并在随附的注释中描述结果：\n\
  \n`Player dan = new Player();`\n`Person chris = new Person();`\n`Monster grez =\
  \ new Monster();`\n`Chair footstool = new Chair();`\n`dan.talkTo(chris); // 打印 “Hello.”`\n\
  `dan.talkTo(grez); // 打印 “Grrr!”`\n`dan.talkTo(footstool); // 不打印任何内容`\n\n\n\n在\
  \ LibGDX 中，应用程序需要用户创建的类实现 `ApplicationListener` 接口，以便处理游戏程序生命周期的所有阶段。不过你可能还记得，在第\
  \ 1 章的示例中，`HelloWorldImage` 类并没有实现 `ApplicationListener` 接口，它只是继承了 `Game` 类。为什么编译时没有报错呢？如果你深入“引擎盖下”看看（在计算机编程语境中，通常指检查源代码），就会发现\
  \ `Game` 类本身实现了 `ApplicationListener` 接口，并且包含了这些函数的“空”版本——定义每个函数体的大括号之间没有任何代码。这样一来，你只需在继承\
  \ `Game` 类的子类中编写你需要使用的接口方法变体，这些方法就会*覆盖* `Game` 类中的版本；任何你没有编写的接口方法都会默认使用 `Game` 类中的空版本。（实际上，`ApplicationListener`\
  \ 接口总共要求实现六个方法：`create`、`render`、`resize`、`pause`、`resume` 和 `dispose`；在我们的示例中，你只编写了其中两个。）\n\
  \n处理用户输入\n\n本节将介绍游戏《奶酪，拜托！》，我们将帮助引导玩家角色“小老鼠”Mousey 找到一块奶酪。部分代码与 `HelloWorldImage`\
  \ 示例类似，例如 `Texture` 和 `SpriteBatch` 类、`create` 和 `render` 方法的作用，以及驱动类的作用。同时也有一些新增内容。由于\
  \ Mousey 的坐标可能会变化，我们使用变量来存储这些值。最重要的是，我们引入了一些代码使程序具有交互性——你将处理来自用户的键盘输入。最后，我们还会包含一个布尔变量，用于跟踪玩家是否获胜，当\
  \ Mousey 到达奶酪时该变量变为 `true`，并会在屏幕上显示“你赢了”的消息。\n\n在本节以及后续章节中，建议你在 BlueJ 中创建一个新项目并输入给出的代码，或者直接从本书网站下载源代码，并通过附带的\
  \ BlueJ 项目文件运行代码。在线源代码还包含你所需的所有图片，这些图片存储在每个项目的 `assets` 文件夹中，并在以下代码中被引用。\n\n游戏初始版本（名为\
  \ `CheesePlease1`）的源代码如下。特别注意，为了便于组织，所有图片文件都存储在主项目目录下的 `assets` 文件夹中。此外还有一些新的 `import`\
  \ 语句，使你能够创建各种新对象，这些也会在此处解释。\n\n```\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\n\
  import com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.graphics.Texture;\n\
  import com.badlogic.gdx.graphics.g2d.SpriteBatch;\nimport com.badlogic.gdx.Game;\n\
  \npublic class CheesePlease1 extends Game\n{\n    private SpriteBatch batch;\n\n\
  private Texture mouseyTexture;\n    private float mouseyX;\n    private float mouseyY;\n\
  \nprivate Texture cheeseTexture;\n    private float cheeseX;\n    private float\
  \ cheeseY;\n\nprivate Texture floorTexture;\n    private Texture winMessage;\n\n\
  private boolean win;\n\npublic void create()\n    {\n        batch = new SpriteBatch();\n\
  \nmouseyTexture = new Texture( Gdx.files.internal(\"assets/mouse.png\") );\n        mouseyX\
  \ = 20;\n        mouseyY = 20;\n\ncheeseTexture = new Texture( Gdx.files.internal(\"\
  assets/cheese.png\") );\n        cheeseX = 400;\n        cheeseY = 300;\n\nfloorTexture\
  \ = new Texture( Gdx.files.internal(\"assets/tiles.jpg\") );\n        winMessage\
  \ = new Texture( Gdx.files.internal(\"assets/you-win.png\") );\n\nwin = false;\n\
      }\n\npublic void render()\n    {\n        // 检查用户输入\n        if (Gdx.input.isKeyPressed(Keys.LEFT))\n\
              mouseyX--;\n        if (Gdx.input.isKeyPressed(Keys.RIGHT))\n            mouseyX++;\n\
          if (Gdx.input.isKeyPressed(Keys.UP))\n            mouseyY++;\n        if\
  \ (Gdx.input.isKeyPressed(Keys.DOWN))\n            mouseyY--;\n\n// 检查获胜条件：Mousey\
  \ 必须与奶酪重叠\n        if ( (mouseyX > cheeseX)\n          && (mouseyX + mouseyTexture.getWidth()\
  \ < cheeseX + cheeseTexture.getWidth())\n          && (mouseyY > cheeseY)\n          &&\
  \ (mouseyY + mouseyTexture.getHeight() < cheeseY + cheeseTexture.getHeight()) )\n\
              win = true;\n\n// 清除屏幕并绘制图形\n        Gdx.gl.glClearColor(0.8f, 0.8f,\
  \ 1, 1);\n        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\nbatch.begin();\n\
          batch.draw( floorTexture, 0, 0 );\n        batch.draw( cheeseTexture, cheeseX,\
  \ cheeseY );\n        batch.draw( mouseyTexture, mouseyX, mouseyY );\n        if\
  \ (win)\n            batch.draw( winMessage, 170, 60 );\n        batch.end();\n\
      }\n}\n```\n\n你还需要一个启动器类来创建该类的实例并运行它；这可以通过以下简短的类来实现：\n\n```\nimport com.badlogic.gdx.backends.lwjgl.LwjglApplication;\n\
  public class Launcher1\n{\n    public static void main (String[] args)\n    {\n\
          CheesePlease1 myProgram = new CheesePlease1();\n        LwjglApplication\
  \ launcher = new LwjglApplication( myProgram );\n    }\n}\n```\n\n在 `CheesePlease1`\
  \ 类中，`create` 方法初始化变量并加载纹理。该程序包含四张图片，存储为 `Texture` 对象：Mousey、奶酪、背景地板瓷砖，以及一张包含“*你赢了*”字样的图片。为简洁起见，我们没有为\
  \ `internal` 方法创建的每个 `FileHandle` 对象创建新变量，而是在构造每个新 `Texture` 对象的同一行中初始化它们。Mousey\
  \ 位置的坐标使用浮点数存储，因为需要存储小数值，而 LibGDX 游戏开发框架在其类中使用 `float` 而非 `double` 变量，以略微提高程序效率。尽管奶酪纹理的坐标不会改变，我们仍然使用变量来存储它们，以便将来涉及这些值的代码更具可读性。`floorTexture`\
  \ 和 `winMessage` 对象不需要变量来存储它们的坐标，因为它们的位置不会改变，并且它们的位置将在 `render` 方法中指定（本节稍后讨论）。\n\
  \n`render` 方法包含三个主要代码块，大致对应游戏循环的子阶段：处理输入、更新和渲染。\n\n首先，一系列命令使用 `Gdx` 类（所属对象）的一个名为\
  \ `isKeyPressed` 的方法，该方法用于判断键盘上的某个键当前是否被按下。每个键的名称使用 `Keys` 类中的常量值表示。当按下某个方向键时，Mousey\
  \ 对应的 x 或 y 坐标会相应调整；x 值向右增加，y 值向上增加。³ 请注意，如果用户同时按下左、右方向键，加法和减法的效果会相互抵消，Mousey 的位置不会改变；用户同时按下上、下方向键时也会出现类似情况。\n\
  \n\n\n第二组命令执行碰撞检测：它们判断包含 mouseyTexture 的矩形区域是否完全包含在包含 cheeseTexture 的矩形区域内。要确定这一点，你需要比较如图\
  \ 2-3 所示的矩形的左、右、上、下边界。左侧和底边的位置分别由纹理的 x 和 y 坐标值给出；右侧和顶边的位置可以通过将纹理的宽度和高度（通过使用 `getWidth`\
  \ 和 `getHeight` 方法获得）分别加到 x 和 y 坐标上来计算。如图 2-3 所示，当以下四个条件同时成立时，矩形 A 完全包含矩形 B：\n\n\
  *   A.x < B.x\n*   (B.x + B.width) < (A.x + A.width)\n*   A.y < B.y\n*   (B.y +\
  \ B.height) < (A.y + A.height)\n\n![9781484215012_Fig02-03.jpg](img/9781484215012_Fig02-03.jpg)\n\
  \n图 2-3. 矩形包含关系示意图\n\n此测试应用于 mouseyTexture 和 cheeseTexture，当条件为真时，布尔变量 `win` 被设置为\
  \ `true`，表示玩家赢得了游戏。\n\n第三组命令负责实际的渲染工作。`glClear` 方法使用 `glClearColor` 方法中指定的颜色（以红/绿/蓝/透明度值表示）在屏幕上绘制一个纯色矩形。在每次渲染过程中都必须以这种方式清除屏幕，有效地“擦除”屏幕，否则之前渲染调用产生的图像可能会可见。`draw`\
  \ 方法的调用顺序尤其重要：后渲染的纹理将覆盖在先渲染的纹理之上。因此，通常你应该先绘制背景元素，然后是主要的游戏内实体，而用户界面元素通常最后绘制。用于绘图的\
  \ `Batch` 类通过一次向计算机的图形处理单元（GPU）发送多个图像来优化图形操作。\n\n管理操作\n\n在之前的例子——我们游戏《奶酪，请！》的第一个迭代版本中——你已经看到每个游戏实体（例如\
  \ Mousey 和奶酪）都有许多你需要跟踪的相关信息，比如纹理和 (x, y) 坐标。在像 Java 这样的面向对象编程语言中，一个核心的设计原则是将相关信息封装在单个类中。虽然你可以创建一个\
  \ `Mousey` 类、一个 `Cheese` 类等来管理这些信息，但这种方法会导致程序中存在大量冗余，既低效又难以管理。由于软件工程的另一个指导原则是编写可重用的代码，因此你需要实现一个包含所有游戏实体通用基本信息的单一类，然后在必要时对其进行扩展。\n\
  \nLibGDX 在这方面展示了其灵活性，它提供了多种管理这些信息的方法，在本节中你将探索其中两种：`Sprite` 类和 `Actor` 类。\n\nSprite\
  \ 类\n\n`Sprite` 类包含了重构 `CheesePlease1` 类代码所需的一切。精灵包含存储坐标、纹理以及旋转角度和缩放因子等附加信息的字段。甚至还有一个关联的\
  \ `Rectangle` 对象，它内置了执行碰撞检测的方法（例如 `contains` 和 `intersects`），这将大大简化我们程序中的这一部分。每个字段都通过标准的\
  \ get 和 set 风格函数进行访问。其他一些有用的 `Sprite` 方法包括 `translateX` 和 `translateY`，它们用于改变精灵的\
  \ x 和 y 坐标值，以及 `draw` 方法，精灵可以使用它（考虑其位置和旋转）通过给定的 `SpriteBatch` 来渲染自身。以下是这个新版本《奶酪，请！》——`CheesePlease2`\
  \ 类的代码，它使用了 `Sprite` 对象；除了导入 `Sprite` 类之外，你还导入了 `Rectangle` 类，你会看到这简化了碰撞检测。\n\n\
  ```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\nimport com.badlogic.gdx.Input.Keys;\n\
  import com.badlogic.gdx.graphics.GL20;\nimport com.badlogic.gdx.graphics.Texture;\n\
  import com.badlogic.gdx.graphics.g2d.SpriteBatch;\nimport com.badlogic.gdx.graphics.g2d.Sprite;\n\
  import com.badlogic.gdx.math.Rectangle;\n\npublic class CheesePlease2 extends Game\n\
  {\n    private SpriteBatch batch;\n    private Sprite mouseySprite;\n    private\
  \ Sprite cheeseSprite;\n    private Sprite floorSprite;\n    private Sprite winTextSprite;\n\
      private boolean win;\n\npublic void create()\n    {\n        batch = new SpriteBatch();\n\
  \nmouseySprite = new Sprite( new Texture(Gdx.files.internal(\"assets/mouse.png\"\
  )) );\n        mouseySprite.setPosition( 20, 20 );\n\ncheeseSprite = new Sprite(\
  \ new Texture(Gdx.files.internal(\"assets/cheese.png\")) );\n        cheeseSprite.setPosition(\
  \ 400, 300 );\n\nfloorSprite = new Sprite( new Texture(Gdx.files.internal(\"assets/tiles.jpg\"\
  )) );\n        floorSprite.setPosition( 0, 0 );\n\nwinTextSprite = new Sprite( new\
  \ Texture(Gdx.files.internal(\"assets/you-win.png\")) );\n        winTextSprite.setPosition(\
  \ 170, 60 );\n\nwin = false;\n    }\n\npublic void render()\n    {\n        // 处理输入\n\
          if (Gdx.input.isKeyPressed(Keys.LEFT))\n            mouseySprite.translateX(\
  \ -1 );\n        if (Gdx.input.isKeyPressed(Keys.RIGHT))\n            mouseySprite.translateX(\
  \ 1 );\n        if (Gdx.input.isKeyPressed(Keys.UP))\n            mouseySprite.translateY(\
  \ 1 );\n        if (Gdx.input.isKeyPressed(Keys.DOWN))\n            mouseySprite.translateY(\
  \ -1 );\n\n// 检查获胜条件\n        Rectangle cheeseRectangle = cheeseSprite.getBoundingRectangle();\n\
          Rectangle mouseyRectangle = mouseySprite.getBoundingRectangle();\n\nif ( cheeseRectangle.contains(mouseyRectangle)\
  \ )\n            win = true;\n\n// 绘制图形\n        Gdx.gl.glClearColor(0.8f, 0.8f,\
  \ 1, 1);\n        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\nbatch.begin();\n\
          floorSprite.draw( batch );\n        cheeseSprite.draw( batch );\n        mouseySprite.draw(\
  \ batch );\n        if (win)\n            winTextSprite.draw( batch );\n        batch.end();\n\
      }\n}\n```\n\n在大多数情况下，`CheesePlease2` 类的代码行与 `CheesePlease1` 类中的代码行直接对应。你可以观察到一些细微的差别：精灵使用\
  \ `Texture` 对象进行初始化，并且使用 `Rectangle` 方法极大地简化了碰撞检测。`CheesePlease2` 类将需要自己的启动器类，类似于\
  \ `CheesePlease1` 的启动器类（但它应该初始化一个 `CheesePlease2` 实例）。由于这个改动很小，我在此不列出启动器代码，但一如既往，所有示例的完整可运行源代码都可以从本书的网站下载。\n\
  \n\n\n对于某些游戏而言，Sprite 对象可能足以满足需求；但在其他情况下，你可能需要编写一个继承 Sprite 类的自定义类，以便为游戏实体存储额外数据并提供额外功能。例如，游戏中的角色可能需要追踪生命值（HP）；它们可能会受伤或接受治疗，并且你需要能够检查它们是否“存活”（即\
  \ HP 是否大于零）。在这种情况下，你可以像下面这样扩展 Sprite 类：\n\n```\npublic class SpriteWithHP extends\
  \ Sprite\n{\n    private int HP;\n\n// 构造函数\n    public SpriteWithHP(Texture t)\n\
      {\n        // 激活被扩展类的构造函数\n        super(t);\n        // 设置默认 HP 值\n        HP\
  \ = 100;\n}\n\npublic int getHP()\n{  return HP;  }\n\npublic void setHP(int amount)\n\
  {  HP = amount;  }\n\npublic void damage(int amount)\n{  HP -= amount;  }\n\npublic\
  \ void heal(int amount)\n{  HP += amount;  }\n\npublic boolean isAlive()\n{  return\
  \ (HP > 0);  }\n\n}\n```\n\n由于 `SpriteWithHP` 是 `Sprite` 类的扩展，因此 `Sprite` 类中的所有数据和函数也可以用于这些对象！\n\
  \n### Actor 类\n\n如前所述，LibGDX 提供了多种方法来管理游戏实体相关的信息。鉴于 `Sprite` 类提供的核心功能以及按需扩展该类的能力，乍一看可能不清楚第二种方法有何用处。此外，查看\
  \ LibGDX `Actor` 类的源代码，它似乎无法很好地替代 `Sprite` 类，因为它没有提供涉及 `Texture` 或 `Rectangle` 类的预置功能。然而，你将会看到，这种看似“缺失”的特性最终反而成为了\
  \ `Actor` 类的一个优势。你可以自由地以任何方便的方式实现图形、碰撞形状、绘制方法以及任何其他功能。例如，你可以模拟 `Sprite` 对象的单纹理方法，如下代码所示：\n\
  \n```\npublic class SpritelikeActor extends Actor\n{\n    private Texture image;\n\
  \n// 构造函数\n    public SpritelikeActor()\n    {  super();  }\n\npublic void setTexture(Texture\
  \ t)\n    {  image = t;  }\n\npublic Texture getTexture()\n    {  return image;  }\n\
  \npublic void draw(Batch b)\n    {\n        b.draw( getTexture(), getX(), getY()\
  \ );\n    }\n}\n```\n\n或者，你可以存储多个纹理，并自定义 `draw` 方法，根据对象的内部状态（例如，根据对象拥有的生命值数量）选择要渲染的纹理。这可以通过以下代码实现：\n\
  \n```\npublic class HealthyActor extends Actor\n{\n    public int HP;\n    public\
  \ Texture healthyImage;\n    public Texture damagedImage;\n    public Texture deceasedImage;\n\
  \n// 省略：构造函数\n    // 省略：获取/设置上述字段的方法\n\npublic void draw(Batch b)\n    {\n        if\
  \ (HP > 50)\n            b.draw( healthyImage, getX(), getY() );\n        else if\
  \ (HP > 0 && HP <= 50)\n            b.draw( damagedImage, getX(), getY() );\n        else    //\
  \ 在这种情况下，HP <= 0\n            b.draw( deceasedImage, getX(), getY() );\n    }\n\
  }\n```\n\n你甚至可以在 Actor 中存储一个或多个动画；本章稍后你将看到这种变体。\n\n这里还应提及 `Sprite` 和 `Actor` 类之间的其他几个基本区别。首先，除了\
  \ `draw` 方法之外，`Actor` 类还有一个 `act` 方法，它可以作为 Actor 的一种更新方法。其次，`Actor` 类被设计为与一个名为 `Stage`\
  \ 的类（你将在不久的将来使用它）协同工作，该类存储一个 `Actor` 实例列表，并包含调用已添加到其中的每个 Actor 的 `act` 和 `draw`\
  \ 方法的方法（名为 `act` 和 `draw`）。\n\n我们的下一个目标是重写“奶酪，拜托！”游戏，使其使用 `Actor` 类而不是 `Sprite`\
  \ 类来表示其游戏实体。然而，在继续之前，你首先需要扩展 `Actor` 类，使其存储一个 `Texture` 和一个 `Rectangle`。你还将在新类中包含两个浮点变量；它们将表示\
  \ x 和 y 方向上的速度（以像素/秒为单位），并在 `act` 方法中用于自动计算 Actor 的新位置。（对于不移动的 Actor，你将速度变量保留为其默认值\
  \ 0。）\n\n这个名为 `BaseActor` 的新类如下所示：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.Actor;\n\
  import com.badlogic.gdx.graphics.g2d.Batch;\nimport com.badlogic.gdx.graphics.Texture;\n\
  import com.badlogic.gdx.graphics.g2d.TextureRegion;\nimport com.badlogic.gdx.math.Rectangle;\n\
  import com.badlogic.gdx.graphics.Color;\n\npublic class BaseActor extends Actor\n\
  {\n    public TextureRegion region;\n    public Rectangle boundary;\n    public\
  \ float velocityX;\n    public float velocityY;\n\npublic BaseActor()\n    {\n        super();\n\
          region = new TextureRegion();\n        boundary = new Rectangle();\n        velocityX\
  \ = 0;\n        velocityY = 0;\n    }\n\npublic void setTexture(Texture t)\n    {\n\
          int w = t.getWidth();\n        int h = t.getHeight();\n        setWidth(\
  \ w );\n        setHeight( h );\n        region.setRegion( t );\n    }\n\npublic\
  \ Rectangle getBoundingRectangle()\n    {\n        boundary.set( getX(), getY(),\
  \ getWidth(), getHeight() );\n        return boundary;\n    }\n\npublic void act(float\
  \ dt)\n    {\n        super.act( dt );\n        moveBy( velocityX * dt, velocityY\
  \ * dt );\n    }\n\npublic void draw(Batch batch, float parentAlpha)\n    {\n        Color\
  \ c = getColor();\n        batch.setColor(c.r, c.g, c.b, c.a);\n        if ( isVisible()\
  \ )\n            batch.draw( region, getX(), getY(), getOriginX(), getOriginY(),\n\
                  getWidth(), getHeight(), getScaleX(), getScaleY(), getRotation()\
  \ );\n    }\n}\n```\n\n关于这段代码的一些说明：\n\n*   你使用的是 `TextureRegion` 而不是 `Texture` 来存储图像，这将在未来扩展\
  \ `BaseActor` 类时提供更大的灵活性。主要区别在于，`TextureRegion` 可用于存储包含多个图像或动画帧的 `Texture`，并且 `TextureRegion`\
  \ 还存储坐标，称为 (u,v) 坐标，用于确定要使用 `Texture` 的哪个矩形子区域。\n*   首先，在 `act` 方法中，你包含了方法调用 `super.act(dt)`。这会导致\
  \ `Actor` 类（被扩展的类，有时称为*超类*）中的 `act` 方法首先被执行。\n*   接下来，在 `act` 方法中，你计算自上次更新以来 `BaseActor`\
  \ 移动的距离（如果有的话）。该数量使用以下物理公式计算：\n\n距离 = 速率 × 时间\n\n速率是速度变量的值；自上次更新以来经过的时间存储在变量 `dt`\
  \ 中（代表*增量时间*；在物理学中，delta 通常表示值的变化）。然后，沿每个轴移动的距离被添加到相应的位置变量中。\n\n*   在 `draw` 方法中，你将\
  \ `Batch` 对象的颜色值（红、绿、蓝和 alpha/透明度）设置为与 `Actor` 类中存储的 `Color` 值相等。这用于为 `BaseActor`\
  \ 纹理着色，可以通过多种方式改变图像的视觉外观，而无需加载额外的图像。Actor 的默认 `Color` 值是白色，这对纹理的外观没有影响。\n*   最后，在\
  \ `draw` 方法中，在检查 `Actor` 的 `visible` 字段是否设置为 `true`（使用 `isVisible` 方法）之后，你绘制纹理，同时考虑其位置、原点（旋转中心）、宽度和高度、缩放因子以及旋转角度。\n\
  \n\n\n接下来是我们游戏源代码的新版本，该版本全程使用了新的 `BaseActor` 类。与基于 Sprite 的代码版本相比，有以下几处变化：\n\n*\
  \   Actor 对象必须添加到 Stage 中，并且必须调用 Stage 的 `act` 和 `draw` 方法（请记住，调用 Stage 的 `act`\
  \ 和 `draw` 方法会导致 Stage 对象调用所有已添加到其中的 Actor 对象的 `act` 和 `draw` 方法）。\n*   我们将 `winText`\
  \ 的初始可见性设置为 `false`，因为玩家在赢得游戏之前不应该看到该特定图像。\n*   Mousey 的位置不会直接更改；位置的变化是通过速度以及自上次更新以来经过的时间（后者由\
  \ `getDeltaTime` 方法提供）计算得出的。速度为 100（像素/秒）可能看起来很大，但如果游戏以每秒 60 帧的速度运行，那么 `getDeltaTime`\
  \ 将返回大约 0.016 的值；这意味着每次调用 `update` 方法时，Mousey 将移动大约 1.6 像素。这与 `CheesePlease1` 类游戏中\
  \ Mousey 的速度相当。\n\n```\nimport com.badlogic.gdx.Game;\nimport com.badlogic.gdx.Gdx;\n\
  import com.badlogic.gdx.Input.Keys;\nimport com.badlogic.gdx.graphics.GL20;\nimport\
  \ com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.g2d.SpriteBatch;\n\
  import com.badlogic.gdx.math.Rectangle;\nimport com.badlogic.gdx.scenes.scene2d.Stage;\n\
  \npublic class CheesePlease3 extends Game\n{\n    public Stage mainStage;\n    private\
  \ BaseActor mousey;\n    private BaseActor cheese;\n    private BaseActor floor;\n\
      private BaseActor winText;\n\npublic void create()\n    {\n        mainStage\
  \ = new Stage();\n\nfloor = new BaseActor();\n        floor.setTexture( new Texture(Gdx.files.internal(\"\
  assets/tiles.jpg\")) );\n        floor.setPosition( 0, 0 );\n        mainStage.addActor(\
  \ floor );\n\ncheese = new BaseActor();\n        cheese.setTexture( new Texture(Gdx.files.internal(\"\
  assets/cheese.png\")) );\n        cheese.setPosition( 400, 300 );\n        mainStage.addActor(\
  \ cheese );\n\nmousey = new BaseActor();\n        mousey.setTexture( new Texture(Gdx.files.internal(\"\
  assets/mouse.png\")) );\n        mousey.setPosition( 20, 20 );\n        mainStage.addActor(\
  \ mousey );\n\nwinText = new BaseActor();\n        winText.setTexture( new Texture(Gdx.files.internal(\"\
  assets/you-win.png\")) );\n        winText.setPosition( 170, 60 );\n        winText.setVisible(\
  \ false );\n        mainStage.addActor( winText );\n    }\n\npublic void render()\n\
      {\n        // 处理输入\n        mousey.velocityX = 0;\n        mousey.velocityY\
  \ = 0;\n\nif (Gdx.input.isKeyPressed(Keys.LEFT))\n            mousey.velocityX -=\
  \ 100;\n        if (Gdx.input.isKeyPressed(Keys.RIGHT))\n            mousey.velocityX\
  \ += 100;\n        if (Gdx.input.isKeyPressed(Keys.UP))\n            mousey.velocityY\
  \ += 100;\n        if (Gdx.input.isKeyPressed(Keys.DOWN))\n            mousey.velocityY\
  \ -= 100;\n\n// 更新\n        float dt = Gdx.graphics.getDeltaTime();\n        mainStage.act(dt);\n\
  \n// 检查胜利条件：mousey 必须与 cheese 重叠\n        Rectangle cheeseRectangle = cheese.getBoundingRectangle();\n\
          Rectangle mouseyRectangle = mousey.getBoundingRectangle();\n\nif ( cheeseRectangle.contains(mouseyRectangle)\
  \ )\n            winText.setVisible( true );\n\n// 绘制图形\n        Gdx.gl.glClearColor(0.8f,\
  \ 0.8f, 1, 1);\n        Gdx.gl.glClear(GL20.GL_COLOR_BUFFER_BIT);\n\nmainStage.draw();\n\
      }\n}\n```\n\n在下一节中，你将看到如何使用 Actor 类为游戏实体实现各种类型的动画。\n\n## 实现视觉效果\n\n本节将展示如何实现两种类型的动画：基于值的动画和基于图像的动画。\n\
  \n### 基于值的动画\n\n许多视觉效果可以通过持续更改与游戏实体关联的值来实现，例如：\n\n*   通过更改位置坐标值可以创建移动效果。\n*   通过更改旋转值可以创建旋转效果。\n\
  *   通过更改缩放因子可以创建放大或缩小效果。\n*   通过更改红/绿/蓝颜色分量值可以创建颜色循环效果。\n*   通过更改 alpha（透明度）值可以创建淡入/淡出效果。\n\
  \n通过使用 LibGDX 的 `Action` 类，可以轻松地将这些效果添加到游戏中。`Action` 是一个可以添加到 Actor 的对象，它会随时间自动更改各种字段（位置、旋转、缩放、颜色）的值。实现此功能的代码包含在\
  \ Actor 类的 `act` 方法中（这就是为什么在编写 `BaseActor` 类的 `act` 方法时需要调用 `super.act(dt)`——以确保这段代码被执行）。要创建\
  \ Action，建议使用 `Actions` 类中可用的静态方法。我们将在后续内容中看到许多这些方法的示例；有关完整列表，请参阅 LibGDX Actions\
  \ 类的文档。\n\n你还可以通过组合 Action 对象来创建复杂的复合视觉效果。这些效果可以配置为按顺序运行（*顺序执行*）或同时运行（*并行执行*）。此外，动作可以设置为重复有限次或无限次。同样，`Actions`\
  \ 类的方法极大地简化了这一过程。\n\n你将在程序中添加两种基于值的动画效果，这两种效果都将在玩家赢得游戏时发生（即，它们将被创建并添加到相应的 Actor\
  \ 中）。\n\n首先，创建一个名为 `CheesePlease4` 的新类，其中包含 `CheesePlease3` 类的所有代码。在这个新类中，首先声明一个名为\
  \ `win` 的布尔变量，并在 `create` 方法中将其初始化为 `false`。为了检查玩家是否赢得了游戏，你使用以下代码，其结构确保 `win` 仅被设置为\
  \ `true` 一次：\n\n```\nRectangle cheeseRectangle = cheese.getBoundingRectangle();\n\
  Rectangle mouseyRectangle = mousey.getBoundingRectangle();\nif ( !win && cheeseRectangle.contains(\
  \ mouseyRectangle ) )\n{\n    win = true;\n}\n```\n\n以下代码清单应添加到上述将 `win` 设置为 `true`\
  \ 的代码块中。\n\n接下来，你将创建一个效果，使奶酪图像旋转（每秒 360 度）、缩小（在 1 秒内将两个缩放因子更改为 0）并淡出（在 1 秒内）；此外，这些动作将并行发生。这还需要你导入\
  \ `Action` 和 `Actions` 类；完整的导入路径可以在 LibGDX 文档中找到，或者在本章附带的源代码中看到。\n\n```\nAction\
  \ spinShrinkFadeOut = Actions.parallel(\n    Actions.alpha(1),           // 设置透明度值\n\
      Actions.rotateBy(360, 1),   // 旋转量，持续时间\n    Actions.scaleTo(0, 0, 1),   //\
  \ x 量，y 量，持续时间\n    Actions.fadeOut(1)          // 淡出持续时间\n);\ncheese.addAction(\
  \ spinShrinkFadeOut );\n```\n\n为了使奶酪图像围绕其中心（而不是角落）旋转，你需要设置 Actor 的原点，该原点作为旋转中心。这可以通过在\
  \ `create` 方法中设置奶酪对象的 Texture 后添加以下代码行来实现：\n\n```\nmousey.setOrigin( mousey.getWidth()/2,\
  \ mousey.getHeight()/2 );\n```\n\n现在，你创建一个效果序列，使“You Win”图形变为可见，然后淡入（在 2 秒内）。最后一步将是一个包含两步序列的无限循环：将颜色色调变为红色，然后将颜色色调变为蓝色，每一步持续\
  \ 1 秒。（这还需要你导入 `Color` 类。）由于这些方法调用的嵌套可能很复杂，我使用了缩进以使代码更易读：\n\n\n\n```\nAction fadeInColorCycleForever\
  \ = Actions.sequence(\n    Actions.alpha(0),   // 设置透明度值\n    Actions.show(),  \
  \   // 设置可见为 true\n    Actions.fadeIn(2),  // 淡入持续时间\n    Actions.forever(\n   \
  \     Actions.sequence(\n            // 颜色渐变目标，持续时间\n            Actions.color(\
  \ new Color(1,0,0,1), 1 ),\n            Actions.color( new Color(0,0,1,1), 1 )\n\
  \        )\n    )\n);\nwinText.addAction( fadeInColorCycleForever );\n```\n\n基于图像的动画\n\
  \n*基于图像的* *动画*是通过快速连续显示图像序列来产生运动错觉的。在 LibGDX 中，可以使用 Animation 类来实现。创建动画需要三个信息：\n\
  \n*   一个 TextureRegion 对象数组（动画中使用的图像）\n*   每张图像应显示的时长\n*   一个指示帧播放方式的枚举值——按给定顺序、逆序、从头到尾再从头（*乒乓顺序*），以及是否重复（循环）播放动画\n\
  \n以下代码展示了如何创建一个动画，该动画稍后将用于 Mousey 角色。首先初始化一个标准数组来存储纹理。接着，使用 for 循环从图像文件加载纹理（图 2-4\
  \ 中显示的图像），设置滤镜类型（控制图像旋转或拉伸时像素颜色的插值方式），并将纹理存储在数组中。要加载图像，必须确保它们已复制到项目的 assets 文件夹中（这些图像包含在本章的源代码中）。然后将标准\
  \ Java 数组转换为 LibGDX 的 Array 实例。最后，初始化一个 Animation。这需要额外添加四条 import 语句，分别用于 TextureRegion、TextureFilter、Array\
  \ 和 Animation 类。\n\n```\nTextureRegion[] frames = new TextureRegion[4];\nfor (int\
  \ n = 0; n < 4; n++)\n{\n    String fileName = \"assets/mouse\" + n + \".png\";\n\
  \    Texture tex = new Texture(Gdx.files.internal(fileName));\n    tex.setFilter(TextureFilter.Linear,\
  \ TextureFilter.Linear);\n    frames[n] = new TextureRegion( tex );\n}\nArray<TextureRegion>\
  \ framesArray = new Array<TextureRegion>(frames);\nAnimation anim = new Animation(0.1f,\
  \ framesArray, Animation.PlayMode.LOOP_PINGPONG);\n```\n\n![9781484215012_Fig02-04.jpg](img/9781484215012_Fig02-04.jpg)\n\
  \n图 2-4. 用于制作 Mousey 动画的图像：mouse0.png 到 mouse3.png\n\n接下来，你将创建一个新类 AnimatedActor，它继承自\
  \ BaseActor 类，并在其 draw 方法中使用这个新创建的动画数据。该类需要存储的额外信息包括动画已播放的总时间（用于确定每个时间点应使用的正确图像），当然还有动画本身。在\
  \ act 方法中，你将增加 elapsedTime。为了增加一点细节，这里你将设置 Actor 纹理的旋转角度以匹配移动方向。（该值使用速度、反正切函数以及从弧度到角度的转换因子计算得出；我们稍后会讨论这个公式的推导。）最后，在\
  \ draw 方法中，*在*调用 BaseActor 类的 draw 方法*之前*，你使用 Animation 类的 getKeyFrame 方法根据 elapsedTime\
  \ 的当前值检索正确的图像。该方法的完整源代码如下：\n\n```\nimport com.badlogic.gdx.graphics.g2d.Batch;\n\
  import com.badlogic.gdx.graphics.Texture;\nimport com.badlogic.gdx.graphics.g2d.Animation;\n\
  import com.badlogic.gdx.math.MathUtils;\n\npublic class AnimatedActor extends BaseActor\n\
  {\n    public float elapsedTime;\n    public Animation anim;\n\npublic AnimatedActor()\n\
  \    {\n        super();\n        elapsedTime = 0;\n    }\n\npublic void setAnimation(Animation\
  \ a)\n    {\n        Texture t = a.getKeyFrame(0).getTexture();\n        setTexture(\
  \ t );\n        anim = a;\n    }\n\npublic void act(float dt)\n    {\n        super.act(\
  \ dt );\n        elapsedTime += dt;\n        if (velocityX != 0 || velocityY !=\
  \ 0)\n            setRotation( MathUtils.atan2( velocityY, velocityX ) * MathUtils.radiansToDegrees\
  \ );\n    }\n\npublic void draw(Batch batch, float parentAlpha)\n    {\n       \
  \ region.setRegion( anim.getKeyFrame(elapsedTime) );\n        super.draw(batch,\
  \ parentAlpha);\n    }\n}\n```\n\n现在你已经创建了一个处理动画的类，可以重写 Mousey 的初始化代码来使用 AnimatedActor\
  \ 类。声明 mousey 实例如下：\n\n```\nprivate AnimatedActor mousey;\n```\n\n最后，*在* create\
  \ 方法中初始化 anim（Mousey 的动画）*之后*，将 Mousey 的初始化代码替换为以下代码。（注意，你需要将 Mousey 的原点坐标设置为图像中心，以便旋转效果符合预期。）\n\
  \n```\nmousey = new AnimatedActor();\nmousey.setAnimation( anim );\nmousey.setOrigin(\
  \ mousey.getWidth()/2, mousey.getHeight()/2 );\nmousey.setPosition( 20, 20 );\n\
  mainStage.addActor(mousey);\n```\n\n此示例的完整源代码（包含了引入两种动画类型的所有更改）可以在 CheesePlease4.java\
  \ 文件中找到。运行此版本时，你应该会看到 Mousey 的胡须抽动，尾巴来回摆动，并且她面向移动的方向。\n\n引入用户界面\n\n游戏的*用户界面*通常使用图形和文本的组合来显示游戏世界或玩家状态的信息。我们之前已经详细讨论过如何显示图形，因此在本节中，我们将讨论一种显示基于图像文本的简单方法。你还会添加第二个\
  \ Stage 来包含用户界面元素：既包括“You Win”纹理，也包括一个显示游戏运行时间的基于文本的对象。最后，你将扩大游戏世界的尺寸，使其大于程序窗口，然后了解如何调整\
  \ Stage 中绘制到窗口的区域。你将创建一个名为 CheesePlease5 的新类，该类以 CheesePlease4 中的所有代码为起点。\n\n在此过程中，你将学习一些新的\
  \ LibGDX 类，因此需要将以下 import 语句添加到代码中：\n\n```\nimport com.badlogic.gdx.scenes.scene2d.ui.Label;\n\
  import com.badlogic.gdx.scenes.scene2d.ui.Label.LabelStyle;\nimport com.badlogic.gdx.graphics.g2d.BitmapFont;\n\
  import com.badlogic.gdx.graphics.Camera;\nimport com.badlogic.gdx.math.MathUtils;\n\
  ```\n\n标签和位图字体\n\n要在 LibGDX 中显示文本，最直接的方法是使用 Label 类，它恰好也是 Actor 类的扩展（因此可以以相同方式添加到\
  \ Stage 中）。Label 初始化时需要（至少）两个信息：要显示的文本（通常为字符串格式）和一个 LabelStyle。LabelStyle 本身在初始化时需要两个信息：一个\
  \ BitmapFont 和一个用于为字体图形着色的 Color。\n\n计算机生成字体的数据通常以两种方式之一存储：要么作为一组数学曲线和公式（这称为*轮廓字体*或*矢量字体*，包括\
  \ TrueType 字体等标准格式），要么作为一组图像。后者称为*位图字体*，是 LabelStyle 类使用的格式。\n\n初始化 BitmapFont 对象的方法有很多种，我们将在后续章节中详细讨论。现在，你使用无参构造函数，它默认使用\
  \ LibGDX 库中包含的 15 号 Arial 字体文件。\n\n对 CheesePlease5 类的添加如下：\n\n首先，初始化一个 float 变量来跟踪总运行时间，以及一个\
  \ Label 变量来显示此信息：\n\n\n\n```\nprivate float timeElapsed;\nprivate Label timeLabel;\n\
  ```\n\n接下来，在 create 方法中初始化这两个变量。程序开始时，timeElapsed 应设置为 0。在初始化 Label 之前，先初始化默认的 BitmapFont，然后创建一个包含文本\
  \ \"Time: 0\" 的标签，并使用带有该字体且颜色为海军蓝的 LabelStyle。你可以通过 setFontScale 方法让字体显得更大，⁴ 并且可以像处理任何\
  \ Actor 对象一样，使用 setPosition 方法设置文本的坐标。\n\n```\ntimeElapsed = 0;\nBitmapFont font\
  \ = new BitmapFont();\nString text = \"Time: 0\";\nLabelStyle style = new LabelStyle(\
  \ font, Color.NAVY );\ntimeLabel = new Label( text, style );\ntimeLabel.setFontScale(2);\n\
  timeLabel.setPosition(500, 440);\n```\n\n更新这些变量（timeElapsed 和 timeLabel）相当直接。在更新部分需要执行两个额外任务：增加已用时间，以及更改标签的文本（使用\
  \ Label 类的 setText 方法，并通过将 timeElapsed 转换为 int 类型来四舍五入为整数）。以下代码演示了这些添加内容。由于这些更改只应在游戏仍在进行时发生（即玩家*尚未*赢得游戏），因此代码被放置在一个条件块中：\n\
  \n```\nif (!win)\n{\n    timeElapsed += dt;\n    timeLabel.setText( \"Time: \" +\
  \ (int)timeElapsed );\n}\n```\n\n## 使用舞台对象进行分层\n\n通常，用户界面元素绘制在游戏世界实体的上方。在之前的示例中，我谨慎地选择了将\
  \ Actor 添加到 Stage 的顺序，⁵ 以便先渲染背景图像，然后是主要游戏实体，最后是用户界面元素。一个更简单的方法是创建多个代表这些组的 Stage\
  \ 对象，然后按正确顺序渲染这些 Stage 对象。\n\n添加第二个 Stage 是一个直接的过程：大部分代码与已有的名为 mainStage 的 Stage\
  \ 对象相似。在声明 mainStage 之后，立即声明一个名为 uiStage 的新 Stage：\n\n```\nprivate Stage uiStage;\n\
  ```\n\n你需要在 create 方法中初始化 uiStage（在 mainStage 初始化之后的那一行）：\n\n```\nuiStage = new\
  \ Stage();\n```\n\n同样在 create 方法中，将 timeLabel 对象添加到 uiStage，并更改一行代码，使 winText 添加到\
  \ uiStage 而不是 mainStage：\n\n```\nuiStage.addActor( winText );\nuiStage.addActor(\
  \ timeLabel );\n```\n\n在游戏循环的更新部分，紧接在调用 mainStage 的 act 方法之后，对 uiStage 执行相同操作：\n\
  \n```\nuiStage.act(dt);\n```\n\n类似地，在绘制 mainStage 元素之后，你需要绘制 uiStage 元素：\n\n```\n\
  uiStage.draw();\n```\n\n此时，你可以尝试编译并运行代码，看看文本如何显示在屏幕上。\n\n## 摄像机与滚动\n\n到目前为止，我们隐含地假设游戏世界的尺寸（长和宽）与程序窗口的尺寸完全相同，默认情况下为\
  \ 640 x 480 像素。在本节中，你将首先将游戏世界的大小增加到 800 x 800 像素，这将引导我们讨论滚动和摄像机。为此，你对代码的第一个修改将是声明一些常量来存储这些值，使用\
  \ final 关键字来保证它们的值以后不会被意外更改。这也将使后续代码更具可读性。\n\n```\n// 游戏世界尺寸\nfinal int mapWidth\
  \ = 800;\nfinal int mapHeight = 800;\n\n// 窗口尺寸\nfinal int viewWidth = 640;\nfinal\
  \ int viewHeight = 480;\n```\n\n你还需要将背景纹理（地板砖块）更改为一个新的 800 x 800 像素的图像文件，这将完全适合游戏世界。你还使该图像的边缘颜色稍深，以便玩家清楚地知道游戏世界的边界在哪里。\n\
  \n```\nfloor.setTexture( new Texture(Gdx.files.internal(\"assets/tiles-800-800.jpg\"\
  )) );\n```\n\n接下来，你将解决并修复一个小游戏细节：目前，Mousey 可以移动到游戏世界尺寸之外。你可以使用以下代码阻止 Mousey 游荡到游戏世界左边界之外：\n\
  \n```\nif ( mousey.getX() < 0 )\n     mousey.setX(0);\n```\n\n你还希望 Mousey 纹理的右边缘被屏幕的右边缘限制；这可以用不等式\
  \ mousey.getX() + mousey.getWidth() < mapWidth 来表示，或者等价地，Mousey 的 x 坐标应始终小于 mapWidth\
  \ – mousey.getWidth()。这个限制可以通过以下代码实现：\n\n```\nif ( mousey.getX() > mapWidth – mousey.getWidth()\
  \ )\n     mousey.setX( mapWidth – mousey.getWidth() );\n```\n\n实际上，你所做的是将 mousey.x\
  \ 的值限制在区间 [0, mapWidth – mousey.width] 内。这个数学函数称为*钳制*，是 LibGDX 中 MathUtils 类提供的函数之一。方法调用\
  \ clamp(x,a,b) 将返回：\n\n*   当 x < a 时，返回 a\n*   当 a <= x 且 x <= b 时，返回 x\n*   当 x\
  \ > b 时，返回 b\n\n使用这个方法，你可以将前面的两行代码压缩为以下一行：\n\n```\nmousey.setX( MathUtils.clamp(\
  \ mousey.getX(), 0,  mapWidth - mousey.getWidth() ));\n```\n\n类似地，为了将 Mousey 保持在游戏世界的垂直方向内，你需要将\
  \ Mousey 的 y 坐标限制在区间 [0, mapHeight – mousey.height] 内。这可以通过以下代码实现：\n\n```\nmousey.setY(\
  \ MathUtils.clamp( mousey.getY(), 0,  mapHeight - mousey.getHeight() ));\n```\n\n\
  前面的两行代码可以插入到包含 mainStage.act(dt) 的那一行之后。\n\n此时是另一个编译和测试代码的好时机，并验证 Mousey 是否不再能完全移出屏幕边界。\n\
  \n接下来，你需要使用 Camera 类，因为它决定了渲染 Stage 的哪一部分；这一点现在很重要，因为程序窗口一次只能显示游戏世界的一部分。在游戏循环的渲染部分，在绘制\
  \ mainStage 之前，你将获取与 mainStage 关联的 Camera 对象，并将其居中（通过设置其位置）于玩家（Mousey）的位置。\n\n然而，当\
  \ Mousey 接近游戏世界的边缘时，如果摄像机仍然以 Mousey 为中心，那么摄像机显示的区域可能包括游戏世界边界之外的区域，这是不可接受的。因此，你需要对摄像机的位置进行第二次调整：你需要限制摄像机的位置，使其保持在游戏世界的中心区域。更准确地说，如图\
  \ 2-5 所示，摄像机的 x 坐标必须始终至少距离游戏世界左右边界 viewWidth/2 像素。除以 2 是因为摄像机位于屏幕中心，因此每侧只需要一半宽度的缓冲。类似地，y\
  \ 坐标必须至少距离游戏世界顶部和底部边界 viewHeight/2 像素。\n\n![9781484215012_Fig02-05.jpg](img/9781484215012_Fig02-05.jpg)\n\
  \n图 2-5. 摄像机位置的边界\n\n这可以使用 clamp 方法高效地完成，类似于你将 Mousey 的位置限制在游戏世界内时的方法。实现此功能的代码如下所示，应放在调用\
  \ mainStage.draw() 之前：\n\n```\nCamera cam = mainStage.getCamera();\n\n// 将摄像机居中于玩家\n\
  cam.position.set( mousey.getX() + mousey.getOriginX(),\n    mousey.getY() + mousey.getOriginY(),\
  \ 0 );\n```\n\n\n// 将摄像机限制在布局范围内\ncam.position.x = MathUtils.clamp(cam.position.x,\
  \ viewWidth/2, mapWidth - viewWidth/2);\ncam.position.y = MathUtils.clamp(cam.position.y,\
  \ viewHeight/2, mapHeight - viewHeight/2);\ncam.update();\n```\n\n请注意，你无需对包含用户界面的舞台进行任何类似的调整，因为\
  \ UI 的内容不会像游戏世界那样滚动。\n\n此示例的完整源代码未在此列出；你可以从本书网站上的 `CheesePlease5.java` 文件中查看。现在尝试运行代码，并观察摄像机如何在可能的情况下始终以\
  \ Mousey 为中心。\n\n处理多个屏幕\n\n视频游戏软件中你尚未实现的一个主要组件是处理多个屏幕的能力。几乎每个游戏都有一个*标题屏幕*，显示游戏名称，可能还带有菜单项或按钮，这些按钮可以将玩家带到包含说明的帮助屏幕，或加载一个开始游戏的新屏幕。LibGDX\
  \ 库的 `Game` 类使你能够实现这些目标。\n\n回想一下，`Game` 类实现了 `ApplicationListener` 接口，因此它可以处理游戏生命周期的所有任务。`Game`\
  \ 类还能够将这些功能委托给另一个对象，但该对象必须包含一组特定的方法才能使这种方法正常工作。正如你之前所见，这种约定是通过使用接口来强制执行的；LibGDX\
  \ 为此任务提供的特定接口称为 `Screen`。它与 `ApplicationListener` 接口非常相似，但存在以下区别：\n\n*   不需要 `create`\
  \ 方法。相反，你可以从实现该接口的类的构造函数中调用一个类似 `create` 的方法。\n*   需要两个新方法，称为 `show` 和 `hide`。当实现类分别获得或失去焦点时，会调用这些方法。\n\
  \n要将当前版本的游戏适配到这个新框架，基本步骤如下：\n\n你创建一个名为 `CheeseLevel` 的新类，其中包含我们主示例（`CheesePlease5`）上一次迭代的所有代码，并且接下来讨论的所有更改都应应用于这个新类。`CheeseLevel`\
  \ 还应导入 `com.badlogic.gdx.Screen` 类。\n\n类声明不应再扩展 `Game` 类；相反，它应实现 `Screen` 接口，因此应如下所示：`public\
  \ class CheeseLevel implements Screen`。此外，你需要为接口所需的每个方法包含代码；目前，你将每个方法体留空，如下所示：\n\
  \n```\npublic void resize(int width, int height) {  }\npublic void pause()   { \
  \ }\npublic void resume()  {  }\npublic void dispose() {  }\npublic void show()\
  \    {  }\npublic void hide()    {  }\n```\n\n该接口还假定 `render` 方法接收一个表示自上一帧以来经过的时间的浮点参数（这意味着你不再需要计算它）。你将\
  \ `render` 的方法声明重写为 `public void render(float dt)`，并且可以从 `render` 方法中删除以下（现在多余的）代码行：\n\
  \n```\nfloat dt = Gdx.graphics.getDeltaTime();\n```\n\n你还希望存储一个对创建此屏幕的 `Game` 的引用，这将使你以后能够切换屏幕。在现有变量声明之后，你添加以下内容：\n\
  \n```\npublic Game game;\n```\n\n你为此类编写一个构造函数方法；它将一个 `Game` 对象作为参数，以便如前所述存储以供以后访问，并且它还将调用\
  \ `create` 方法，如下所示：\n\n```\npublic CheeseLevel(Game g)\n{\n    game = g;\n    create();\n\
