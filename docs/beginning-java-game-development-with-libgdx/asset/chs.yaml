  \ Actions.delay(0.64f), Actions.removeActor() ) );\n        mainStage.addActor(sparkle);\n\
      }\n}\n\nfor (BaseActor ba : removeList)\n{\n    ba.destroy();\n}\n```\n\n敌机\n\
  \n此时，你将敌机添加到游戏中。这个过程与之前讨论的星星对象的创建和管理非常相似。首先，在 `create` 方法中，初始化所有与敌机相关的变量：`baseEnemy`\
  \ 用于后续克隆，`enemyList` 用于存储敌机对象以便在 `update` 方法中使用，`enemyTimer` 用于跟踪何时生成敌机，以及 `enemySpeed`\
  \ 用于设置每个新创建敌机的速度。此外，敌机对象的大小将比原始图像尺寸放大 25%。\n\n```\nbaseEnemy = new PhysicsActor();\n\
  Animation redAnim = GameUtils.parseImageFiles(\n    \"assets/planeRed\", \".png\"\
  , 3, 0.1f, Animation.PlayMode.LOOP_PINGPONG);\nbaseEnemy.storeAnimation( \"default\"\
  , redAnim );\nbaseEnemy.setWidth( baseEnemy.getWidth() * 1.25f );\nbaseEnemy.setHeight(\
  \ baseEnemy.getHeight() * 1.25f );\nbaseEnemy.setOriginCenter();\nbaseEnemy.setEllipseBoundary();\n\
  \nenemyTimer = 0;\nenemySpeed = -250;\nenemyList = new ArrayList<PhysicsActor>();\n\
