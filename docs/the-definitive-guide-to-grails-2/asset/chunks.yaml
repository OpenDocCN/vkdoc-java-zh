    ### 测试服务


    由于大部分业务逻辑和复杂性都封装在服务中，因此对这些组件进行测试非常重要。就测试而言，服务只是另一个类，可以像测试其他类一样进行测试。为服务提供的单元测试支持与其他工件类型提供的支持类似。


    清单 10-13 展示了由 `create-service` 命令创建的默认测试。


    ***清单 10-13.** 默认服务单元测试模板*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `/**`

    ` * 有关使用说明，请参阅 {@link grails.test.mixin.services.ServiceUnitTestMixin} 的 API`

    ` */`

    `@TestFor(AlbumArtService)`

    `class AlbumArtServiceTests {`


    `    void testSomething() {`

    `        fail "Implement me"`

    `    }`

    `}`


    要测试 `AlbumArtService`，请使用标准的 Groovy 单元测试技术来填充它。请参阅清单 10-14。


    ***清单 10-14.** 单元测试 AlbumArtService*


    `package com.gtunes`


    `import grails.plugins.rest.client.RestBuilder`

    `import groovy.mock.interceptor.MockFor`

    `import grails.test.mixin.*`

    `//import org.junit.*`


    `/**`

    ` * 有关使用说明，请参阅 {@link grails.test.mixin.services.ServiceUnitTestMixin} 的 API`

    ` */`

    `@TestFor(AlbumArtService)`

    `class AlbumArtServiceTests {`


    `    void testNullAlbumAndArtist() {`

    `        def result = service.getAlbumArt(null, null)                  `

    `                                     assert AlbumArtService.DEFAULT_ALBUM_ART_IMAGE
    == result`

    `    }`


    `    void testGoodResult() {`

    `        mockCodec org.codehaus.groovy.grails.plugins.codecs.URLCodec`

    `        def artworkClient = new groovy.mock.interceptor.MockFor(RestBuilder)`

    `        artworkClient.demand.get { String s ->`

    `            def results = []`

    `            results << [artistName: ''Thin Lizzy'',`

    `                        collectionName: ''Jailbreak'',`

    `                        artworkUrl100: ''http://somesite/jailbreak.jpg'']`

    `            results << [artistName: ''Tool'',`

    `                        collectionName: ''Lateralus'',`

    `                        artworkUrl100: ''http://somesite/lateralus.jpg'']`

    `            [json: [results: results]]`

    `        }`

    `        def result`

    `        artworkClient.use {`

    `            result = service.getAlbumArt(''Tool'', ''Lateralus'')`

    `        }`

    `        assert ''http://somesite/lateralus.jpg'' == result`

    `    }`

    `}`


    请注意，测试引用了一个名为 `service` 的属性，该属性由测试框架提供，并自动初始化为被测类的实例，在本例中为 `AlbumArtService class`。


    ### 暴露服务


    作为 Grails 应用程序的一部分编写的服务包含了应用程序中大部分的业务逻辑。使用 Grails 内置的自动依赖注入，可以轻松地从应用程序的任何位置访问这些服务。这些业务逻辑中的很大一部分可能对其他
    Grails 应用程序也有用。事实上，它可能对非 Grails 应用程序也有用。自动依赖注入仅在应用程序内部有效。实际上没有任何方法可以将这些服务注入到其他应用程序中。但是，可以从其他应用程序访问这些服务，而
    Grails 使这变得非常容易。


    使服务可用于另一个进程称为*暴露*服务。许多可用的 Grails 插件支持使用各种远程处理技术来暴露服务。例如，一个插件极大地简化了使用 Java 管理扩展
    (JMX) 技术暴露服务的过程。^(2) JMX 自 J2SE 5.0 版本以来一直是 Java 平台的一部分，它提供了一种非常简单的机制来监控和管理应用程序内的资源。


    您可以通过将适当的依赖声明添加到 `grails-app/conf/BuildConfig.groovy` 来安装 JMX 插件，如清单 10-15 所示。


    ***清单 10-15.** 声明对 JMX 插件的依赖*


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`

    `    // ...`

    `    plugins {`

    `        runtime '':jmx:0.7''`

    `        // ...`

    `    }`

    `}`


    与 Grails 可用的其他远程处理插件一样，JMX 插件会在所有服务类中查找名为 `expose` 的属性。`expose` 属性应该是一个 `String`
    列表，如果该列表包含字符串 `jmx`，则该插件将使用 JMX 暴露该服务。


    ![Image](img/line.jpg)


    ² 您可以在 [`http://java.sun.com/javase/technologies/core/mntrmgmt/javamanagement/`](http://java.sun.com/javase/technologies/core/mntrmgmt/javamanagement/)
    找到有关 JMX 的更多信息。


    清单 10-16 展示了 gTunes 应用程序中一个已通过 JMX 暴露的服务。


    ***清单 10-16.** 使用 JMX 暴露 StoreService*


    `package com.gtunes`


    `class StoreService {`


    `    static transactional = true`


    `    static expose = [''jmx'']`

    `    int getNumberOfAlbums() {`

    `        Album.count()`

    `    }`

    `    int getNumberOfAlbumsForGenre(String genre) {`

    `        Album.countByGenre(genre)`

    `    }`

    ` }`


    `StoreService` 包含一个方法 `getNumberOfAlbums`，该方法返回数据库中当前 `Album` 对象的数量。该服务可以包含任意数量的方法。服务中的所有方法都将作为
    JMX 操作暴露。


    就代码而言，要使用 JMX 暴露您的服务，您只需在 `expose` 属性的值中包含 `jmx` 即可。这再简单不过了！还有另一个不涉及代码的步骤。启用对已通过
    JMX 暴露的服务的远程访问的方法是在 Grails 应用程序启动时设置 `com.sun.management.jmxremote` 系统属性。一个简单的方法是给
    `JAVA_OPTS` 环境变量赋值。该值应包含 `-Dcom.sun.management.jmxremote`。请注意，该属性不需要赋值；只需设置即可。例如，在
    Bash shell 中，您可以使用清单 10-17 所示的代码以交互方式设置环境变量。


    ***清单 10-17.** 在 Bash Shell 中设置 JAVA_OPTS*


    `export JAVA_OPTS=-Dcom.sun.management.jmxremote`


    在 Windows shell 中，您可以使用清单 10-18 所示的代码。


    ***清单 10-18.** 在 Windows Shell 中设置 JAVA_OPTS*


    `set JAVA_OPTS=-Dcom.sun.management.jmxremote`

    '
