    行则更有趣；它展示了如何使用 `BeanBuilder` 类的 `registerBeans` 方法，将 `BeanBuilder` 实例中定义的所有 Bean
    定义注册到所提供的 `ApplicationContext` 中：


    `14 newBeans.registerBeans(applicationContext)`


    当然，并非所有插件都需要根据 `onChange` 事件来注册新的 Bean。只有当你在 `doWithSpring` 闭包中注册了需要重新加载行为的 Bean
