- fmt: "#### Inheriting Dependencies\n\nThe first section is the inherits section.\
    \ This is where you can specify that you want to inherit dependencies from the\
    \ framework, which is what most applications are going to want to do. The framework\
    \ has runtime dependencies on a lot of things, including Spring, SiteMesh, and\
    \ Hibernate. Since those runtime dependencies need to be available when your application\
    \ is run, the most common thing to do is to express that you want to inherit those\
    \ global dependencies from the framework. That is what the default `BuildConfig.groovy`\
    \ file expresses by invoking `inherits(\"global\")`.\n\nThe `inherits` method\
    \ there accepts an optional second parameter, a closure that may be used to further\
    \ configure what is being inherited. It may be the case that the application wants\
    \ to inherit all of the global dependencies but for some reason wants to exclude\
    \ something, maybe multiple things, in particular. The way to do that is by invoking\
    \ the `excludes` method inside that closure and passing strings as arguments.\
    \ Those strings represent the names of dependencies that should be excluded, as\
    \ shown in [Listing 11-12](#Chapter11.html#list_11_12).\n\n**Listing 11-12.**\
    \ Excluding Inherited Dependencies\n\n```\ninherits(\"global\") {\n    excludes\
    \ \"ehcache\", \"oscache\"\n}\n```\n\nIt may be the case that the application\
    \ wants to inherit all of the global dependencies from the framework but does\
    \ not want those dependencies to be included in the WAR file when the application\
    \ is deployed. The most common use case for something like that is when numerous\
    \ Grails applications are to be deployed to the same container and you would like\
    \ to avoid having all of those applications bundle their own copies of the same\
    \ dependencies. The dependencies can be installed into the container (see your\
    \ container’s documentation for details on how to do that); then slimmer WAR files\
    \ are created for the Grails applications that contain only the dependencies introduced\
    \ by the applications themselves, not those inherited from the framework. [Listing\
    \ 11-13](#Chapter11.html#list_11_13) shows how to express that those dependencies\
    \ will be provided by the container with the `defaultDependenciesProvided` method.\n\
    \n**Listing 11-13.** Indicating That Default Dependencies Will Be Provided by\
    \ the Container\n\n```\ngrails.project.dependency.resolution = {\n    defaultDependenciesProvided\
    \ true\n    inherits(\"global\")\n}\n```\n\nFor most of the code in `BuildConfig.groovy`,\
    \ order is not important. This is an exception to that rule. It is important that\
    \ the `defaultDependenciesProvided` method be invoked before the `inherit` method;\
    \ otherwise all of the global dependencies will still be included in the generated\
    \ WAR file.\n\n#### Declaring Repositories\n\nApplications will often have dependencies\
    \ on things that are not provided by Grails. These may include plug-ins and jar\
    \ files for libraries that your application depends on, such as the MySQL Connector\
    \ that gTunes is using. Grails needs to know where to find those dependencies,\
    \ and `BuildConfig.groovy` allows for the specification of a list of repositories\
    \ where the dependency resolution system should look for those dependencies. See\
    \ [Listing 11-14](#Chapter11.html#list_11_14).\n\n**Listing 11-14.** Configuring\
    \ Repositories\n\n```\ngrails.project.dependency.resolution = {\n    repositories\
    \ {\n        grailsPlugins()\n        grailsHome()\n        grailsCentral()\n\
    \        mavenCentral()\n        ...\n    }\n}\n```\n\nThe repositories section\
    \ of the file is where you can express which repositories Grails should use for\
    \ resolving dependencies. The three that are configured by default are `grailsPlugins()`,\
    \ `grailsHome()`, and `grailsCentral()`. The first, `grailsPlugins()`, configures\
    \ a resolver that can find dependencies bundled in the `lib/directory` of any\
    \ plug-ins that this project may depend on. The second, `grailsHome()`, configures\
    \ a resolver that can find all of the dependencies that are bundled with the framework.\
    \ The third, `grailsCentral()`, configures a resolver that can find dependencies\
    \ in the main public Grails repositories, which is where most Grails plug-ins\
    \ are deployed. These three are in the file for newly created applications, and\
    \ most applications will need to leave them there. Some projects may want to augment\
    \ them with additional repositories, the most common of which is Maven Central;\
    \ that is the repository that the `mavenCentral()` method configures, of course.\
    \ The gTunes application uses `mavenCentral()` as the place to resolve the MySQL\
    \ Connector.\n\nFor many applications, maybe most, the repositories mentioned\
    \ are all that will be needed. However, there are cases where you may want Grails\
    \ to resolve dependencies from some other Maven repository, perhaps one on your\
    \ enterprise’s intranet. There is a simple way to configure those repositories\
    \ in `BuildConfig.groovy`; it is done by using the `mavenRepo` method (see [Listing\
    \ 11-15](#Chapter11.html#list_11_15)).\n\n**Listing 11-15.** Configuring Custom\
    \ Repositories\n\n```\ngrails.project.dependency.resolution = {\n    repositories\
    \ {\n        // Do not inherit repositories from plug-ins\n        inherits false\n\
    \n        mavenRepo  name: 'codehaus', 'http://repository.codehaus.org'\n    \
    \    mavenRepo  'http://myserver.com/repo/'\n        ...\n    }\n}\n```\n\nNotice\
    \ that the `codehaus` repo is being given a name, which is optional. The name\
    \ may be useful when evaluating log files. Also notice the call to `inherits false`,\
    \ which instructs the dependency resolution system not to inherit repositories\
    \ from plug-ins installed in the app. This is a very common use case if you want\
    \ to host your own plug-in repository.\n\nThe next section of the file is the\
    \ dependencies section. That is where you express dependencies on libraries (JAR\
    \ files), which are not provided by the framework. The gTunes application currently\
    \ has a dependency on the MySQL Connector (see [Listing 11-16](#Chapter11.html#list_11_16)).\n\
    \n**Listing 11-16.** A Runtime Library Dependency\n\n```\ngrails.project.dependency.resolution\
    \ = {\n    ...\n    dependencies {\n        // specify dependencies here under\
    \ either 'build',\n        // 'compile', 'runtime', 'test', or 'provided' scopes,\
    \ e.g.\n\n        runtime 'mysql:mysql-connector-java:5.1.21'\n    }\n    ...\n\
    }\n```\n\nNotice that the MySQL Connector library is a runtime dependency. The\
    \ library will be needed at runtime when the application attempts to connect to\
    \ the MySQL database, but since no code in the application makes any direct references\
    \ to MySQL code, there’s no need for the library to be available at compile time.\
    \ Several scopes are supported in addition to runtime (see [Table 11-1](#Chapter11.html#tab_11_1)).\n\
    \n![Image](images/tab_11_1.jpg)"
  raw: '#### Inheriting Dependencies


    The first section is the inherits section. This is where you can specify that
    you want to inherit dependencies from the framework, which is what most applications
    are going to want to do. The framework has runtime dependencies on a lot of things,
    including Spring, SiteMesh, and Hibernate. Since those runtime dependencies need
    to be available when your application is run, the most common thing to do is to
    express that you want to inherit those global dependencies from the framework.
    That is what the default `BuildConfig.groovy` file expresses by invoking `inherits("global")`.


    The inherits method there accepts an optional second parameter, a closure that
    may be used to further configure what is being inherited. It may be the case that
    the application wants to inherit all of the global dependencies but for some reason
    wants to exclude something, maybe multiple things, in particular. The way to do
    that is by invoking the `excludes` method inside that closure and passing strings
    as arguments. Those strings represent the names of dependencies that should be
    excluded, as shown in [Listing 11-12](#Chapter11.html#list_11_12).


    ***Listing 11-12.** Excluding Inherited Dependencies*


    `inherits("global") {`

    `    excludes "ehcache", "oscache"`

    `}`


    It may be the case that the application wants to inherit all of the global dependencies
    from the framework but does not want those dependencies to be included in the
    WAR file when the application is deployed. The most common use case for something
    like that is when numerous Grails applications are to be deployed to the same
    container and you would like to avoid having all of those applications bundle
    their own copies of the same dependencies. The dependencies can be installed into
    the container (see your container’s documentation for details on how to do that);
    then slimmer WAR files are created for the Grails applications that contain only
    the dependencies introduced by the applications themselves, not those inherited
    from the framework. [Listing 11-13](#Chapter11.html#list_11_13) shows how to express
    that those dependencies will be provided by the container with the `defaultDependenciesProvided`
    method.


    ***Listing 11-13.** Indicating That Default Dependencies Will Be Provided by the
    Container*


    `grails.project.dependency.resolution = {`

    `    defaultDependenciesProvided true`

    `    inherits("global")`

    `}`


    For most of the code in `BuildConfig.groovy`, order is not important. This is
    an exception to that rule. It is important that the defaultDependenciesProvided
    method be invoked before the inherit method; otherwise all of the global dependencies
    will still be included in the generated WAR file.


    #### Declaring Repositories


    Applications will often have dependencies on things that are not provided by Grails.
    These may include plug-ins and jar files for libraries that your application depends
    on, such as the MySQL Connector that gTunes is using. Grails needs to know where
    to find those dependencies, and `BuildConfig.groovy` allows for the specification
    of a list of repositories where the dependency resolution system should look for
    those dependencies. See [Listing 11-14](#Chapter11.html#list_11_14).


    ***Listing 11-14.** Configuring Repositories*


    `grails.project.dependency.resolution = {`

    `    repositories {`

    `        grailsPlugins()`

    `        grailsHome()`

    `        grailsCentral()`

    `        mavenCentral()`

    `        ...`

    `    }`

    `}`


    The repositories section of the file is where you can express which repositories
    Grails should use for resolving dependencies. The three that are configured by
    default are `grailsPlugins()`, `grailsHome()`, and `grailsCentral()`. The first,
    `grailsPlugins()`, configures a resolver that can find dependencies bundled in
    the `lib/directory` of any plug-ins that this project may depend on. The second,
    `grailsHome()`, configures a resolver that can find all of the dependencies that
    are bundled with the framework. The third, `grailsCentral()`, configures a resolver
    that can find dependencies in the main public Grails repositories, which is where
    most Grails plug-ins are deployed. These three are in the file for newly created
    applications, and most applications will need to leave them there. Some projects
    may want to augment them with additional repositories, the most common of which
    is Maven Central; that is the repository that the `mavenCentral()` method configures,
    of course. The gTunes application uses `mavenCentral()` as the place to resolve
    the MySQL Connector.


    For many applications, maybe most, the repositories mentioned are all that will
    be needed. However, there are cases where you may want Grails to resolve dependencies
    from some other Maven repository, perhaps one on your enterprise’s intranet. There
    is a simple way to configure those repositories in `BuildConfig.groovy`; it is
    done by using the `mavenRepo` method (see [Listing 11-15](#Chapter11.html#list_11_15)).


    ***Listing 11-15.** Configuring Custom Repositories*


    `grails.project.dependency.resolution = {`

    `    repositories {`

    `        // Do not inherit repositories from plug-ins`

    `        inherits false`


    `        mavenRepo  name: ''codehaus'', ''http://repository.codehaus.org''`

    `        mavenRepo  ''http://myserver.com/repo/''`

    `        ...`

    `    }`

    `}`


    Notice that the `codehaus` repo is being given a name, which is optional. The
    name may be useful when evaluating log files. Also notice the call to `inherits
    false`, which instructs the dependency resolution system not to inherit repositories
    from plug-ins installed in the app. This is a very common use case if you want
    to host your own plug-in repository.


    The next section of the file is the dependencies section. That is where you express
    dependencies on libraries (JAR files), which are not provided by the framework.
    The gTunes application currently has a dependency on the MySQL Connector (see
    [Listing 11-16](#Chapter11.html#list_11_16)).


    ***Listing 11-16.** A Runtime Library Dependency*


    `grails.project.dependency.resolution = {`

    `    ...`

    `    dependencies {`

    `        // specify dependencies here under either ''build'',`

    `        // ''compile'', ''runtime'', ''test'', or ''provided'' scopes, e.g.`


    `        runtime ''mysql:mysql-connector-java:5.1.21''`

    `    }`

    `    ...`

    `}`


    Notice that the MySQL Connector library is a runtime dependency. The library will
    be needed at runtime when the application attempts to connect to the MySQL database,
    but since no code in the application makes any direct references to MySQL code,
    there’s no need for the library to be available at compile time. Several scopes
    are supported in addition to runtime (see [Table 11-1](#Chapter11.html#tab_11_1)).


    ![Image](images/tab_11_1.jpg)'
  trans: '

    #### 继承依赖


    第一部分是继承部分。在这里，你可以指定希望从框架中继承依赖，这是大多数应用程序都会想要做的事情。框架在运行时依赖于许多东西，包括 Spring、SiteMesh
    和 Hibernate。由于这些运行时依赖在应用程序运行时需要可用，最常见的做法是声明希望从框架中继承这些全局依赖。这就是默认的 `BuildConfig.groovy`
    文件通过调用 `inherits("global")` 所表达的内容。


    `inherits` 方法接受一个可选的第二个参数，即一个闭包，可用于进一步配置要继承的内容。可能会出现这样的情况：应用程序希望继承所有全局依赖，但由于某种原因，想要排除某个（或多个）特定的依赖。实现方法是，在该闭包内调用
    `excludes` 方法，并将字符串作为参数传入。这些字符串代表应排除的依赖名称，如清单 11-12 所示。


    ***清单 11-12.** 排除继承的依赖*


    `inherits("global") {`

    `    excludes "ehcache", "oscache"`

    `}`


    可能会出现这样的情况：应用程序希望从框架继承所有全局依赖，但不希望这些依赖在部署时被包含在 WAR 文件中。这种场景最常见的用例是，当多个 Grails 应用程序要部署到同一个容器中时，你希望避免所有这些应用程序都捆绑它们自己相同依赖的副本。这些依赖可以安装到容器中（有关如何操作的详细信息，请参阅容器的文档）；然后为
    Grails 应用程序创建更精简的 WAR 文件，其中只包含应用程序自身引入的依赖，而不包含从框架继承的依赖。清单 11-13 展示了如何使用 `defaultDependenciesProvided`
    方法声明这些依赖将由容器提供。


    ***清单 11-13.** 指示默认依赖将由容器提供*


    `grails.project.dependency.resolution = {`

    `    defaultDependenciesProvided true`

    `    inherits("global")`

    `}`


    对于 `BuildConfig.groovy` 中的大部分代码，顺序并不重要。但这是一个例外。`defaultDependenciesProvided` 方法必须在
    `inherit` 方法之前调用，这一点很重要；否则，所有全局依赖仍会被包含在生成的 WAR 文件中。


    #### 声明仓库


    应用程序通常会对 Grails 未提供的内容有依赖。这些可能包括插件以及应用程序所依赖的库的 JAR 文件，例如 gTunes 正在使用的 MySQL Connector。Grails
    需要知道在哪里找到这些依赖，而 `BuildConfig.groovy` 允许指定一个仓库列表，依赖解析系统应在此列表中查找这些依赖。请参见清单 11-14。


    ***清单 11-14.** 配置仓库*


    `grails.project.dependency.resolution = {`

    `    repositories {`

    `        grailsPlugins()`

    `        grailsHome()`

    `        grailsCentral()`

    `        mavenCentral()`

    `        ...`

    `    }`

    `}`


    文件中的 `repositories` 部分用于声明 Grails 应使用哪些仓库来解析依赖。默认配置的三个仓库是 `grailsPlugins()`、`grailsHome()`
    和 `grailsCentral()`。第一个 `grailsPlugins()` 配置了一个解析器，可以找到此项目可能依赖的任何插件的 `lib/` 目录中捆绑的依赖。第二个
    `grailsHome()` 配置了一个解析器，可以找到框架附带的所有依赖。第三个 `grailsCentral()` 配置了一个解析器，可以在主要的公共
    Grails 仓库中找到依赖，大多数 Grails 插件都部署在那里。对于新创建的应用程序，这三个仓库会出现在文件中，并且大多数应用程序都需要保留它们。有些项目可能希望用额外的仓库来补充它们，最常见的是
    Maven Central；当然，这就是 `mavenCentral()` 方法配置的仓库。gTunes 应用程序使用 `mavenCentral()` 作为解析
    MySQL Connector 的地方。


    对于许多应用程序（也许是大多数），上面提到的仓库就足够了。然而，在某些情况下，你可能希望 Grails 从其他 Maven 仓库解析依赖，例如企业内网上的某个仓库。在
    `BuildConfig.groovy` 中配置这些仓库有一种简单的方法；即使用 `mavenRepo` 方法（参见清单 11-15）。


    ***清单 11-15.** 配置自定义仓库*


    `grails.project.dependency.resolution = {`

    `    repositories {`

    `        // 不从插件继承仓库`

    `        inherits false`


    `        mavenRepo  name: ''codehaus'', ''http://repository.codehaus.org''`

    `        mavenRepo  ''http://myserver.com/repo/''`

    `        ...`

    `    }`

    `}`


    请注意，`codehaus` 仓库被赋予了一个名称，这是可选的。该名称在评估日志文件时可能有用。还要注意对 `inherits false` 的调用，它指示依赖解析系统不要从应用程序中安装的插件继承仓库。如果你想托管自己的插件仓库，这是一个非常常见的用例。


    文件的下一部分是 `dependencies` 部分。在这里，你可以声明对框架未提供的库（JAR 文件）的依赖。gTunes 应用程序目前依赖于 MySQL
    Connector（参见清单 11-16）。


    ***清单 11-16.** 运行时库依赖*


    `grails.project.dependency.resolution = {`

    `    ...`

    `    dependencies {`

    `        // 在此处指定依赖，范围可以是 ''build''、`

    `        // ''compile''、''runtime''、''test'' 或 ''provided''，例如`


    `        runtime ''mysql:mysql-connector-java:5.1.21''`

    `    }`

    `    ...`

    `}`


    请注意，MySQL Connector 库是一个运行时依赖。当应用程序尝试连接到 MySQL 数据库时，运行时需要该库，但由于应用程序中没有代码直接引用 MySQL
    代码，因此编译时不需要该库可用。除了 `runtime` 之外，还支持几种范围（参见表 11-1）。


    ![图片](img/tab_11_1.jpg)

