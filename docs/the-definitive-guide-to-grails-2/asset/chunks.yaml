  raw: '#### Packaging and Distributing a Grails Plug-in


    Once you are confident that your plug-in is ready for distribution, you can package
    it using the `grails package-plugin` command. In the command window, simply type
    `grails package-plugin` from the root of your plug-in project, as shown in [Listing
    12-28](#Chapter12.html#list_12_28).


    ***Listing 12-28.** Packaging a Plug-in*


    `$ grails package-plugin`

    `  ...`


    `| Plugin packaged grails-simple-cache-0.1.zip`


    As you can see from the output in [Listing 12-28](#Chapter12.html#list_12_28),
    the `package-plugin` command generates a zip file using the name and version number
    of your plug-in. In this case, you’re packaging the `simple-cache` plug-in you
    developed earlier. [Figure 12-2](#Chapter12.html#fig_12_2) shows an example of
    the resulting zip file.


    ![Image](images/9781430243779_Fig12-02.jpg)


    ***Figure 12-2.** The simple-cache plug-in’s packaged zip file*


    Using the steps explained earlier in this chapter in the “Plug-in Installation”
    section, you can now install the `simple-cache` plug-in into other applications
    and make use of the tag library and services it provides.


    If you want to distribute your plug-in within the Grails central repository, you
    first need to obtain a plug-in developer account for the Grails central repository.
    You can find the steps to do so on the Grails web site at [`http://grails.org/Creating+Plugins`](http://grails.org/Creating+Plugins).


    Once you have obtained an account, you can publish your plug-in to the Grails
    central repository by using the `publish-plugin` command, which is provided by
    the release plug-in.


    `$ grails publish-plugin`


    The `publish-plugin` command needs your authorization credentials in order to
    publish to the repository. Those credentials should be defined in `$HOME/.grails/settings.groovy`,
    as shown in [Listing 12-29](#Chapter12.html#list_12_29).


    ***Listing 12-29.** Plug-in Repository Credentials*


    `// ~/.grails/settings.groovy`

    `grails.project.repos.grailsCentral.username = ''your username''`

    `grails.project.repos.grailsCentral.password = ''your password''`


    The `publish-plugin` command does all the heavy lifting for you in making sure
    that the appropriate resources have been published in the repository and been
    tagged appropriately. The `publish-plugin` command will also generate an updated
    plug-in list so that your plug-in appears whenever a Grails user types the `list-plugins`
    command.


    #### Local Plug-in Repositories


    If you want to take advantage of the plug-in distribution and discovery mechanism
    in Grails on your own local network, you can set up a local plug-in repository.
    The Grails plug-in repositories are currently backed by a maven-compatible repository.
    Tools like Nexus and Artifactory can be used to help manage these. Once you have
    a maven-compatible repository up and running, you need to configure the release
    plug-in so that it knows about your repository. The way to do that is by defining
    a property in `BuildConfig.groovy` for each of the repositories that you want
    to interact with (see [Listing 12-30](#Chapter12.html#list_12_30)).


    ***Listing 12-30.** Configuring Maven Repositories in BuildConfig.groovy*


    `grails.project.repos.myRepo.url = "http://localhost:8081/myRepo"`

    `grails.project.repos.myRepo.type = "maven"`

    `grails.project.repos.myRepo.username = "admin"`

    `grails.project.repos.myRepo.password = "password"`

    `grails.project.repos.myRepo.portal = "grailsCentral"`


    `grails.project.repos.myOtherRepo.url = "http://localhost:8081/myOtherRepo"`

    `grails.project.repos.myOtherRepo.type = "maven"`

    `grails.project.repos.myOtherRepo.username = "admin"`

    `grails.project.repos.myOtherRepo.password = "password"`

    `grails.project.repos.myOtherRepo.portal = "grailsCentral"`


    Now that you have configured the system to know about your own Maven repositories,
    you can publish to them, as shown in [Listing 12-31](#Chapter12.html#list_12_31).


    ***Listing 12-31.** Publishing to a Custom Repository*


    `grails publish-plugin –-repository=myRepo`

    `grails publish-plugin –-repository=myOtherRepo`


    The release plug-in also supports publishing to your local Maven cache. This does
    not require any repository server but instead installs directly to your file system
    under `$HOME/.m2/`. The maven-install command will publish a plug-in to the local
    Maven cache. In order for an application to resolve plug-ins that have been installed
    to the local Maven cache, `mavenLocal()` needs to be configured as a repository
    in `BuildConfig.groovy`, as shown in [Listing 12-32](#Chapter12.html#list_12_32).


    ***Listing 12-32.** Configuring the Local Maven Cache As a Repository*


    `grails.project.dependency.resolution = {`

    `    ...`

    `    repositories {`

    `        mavenLocal()`

    `        ...`

    `    }`

    `    ...`

    `}`


    With that, we’ve reached the end of this tour of the plug-in system. You’ve seen
    how to take advantage of the plug-in system in many different ways. This section
    has touched on some ideas for plug-ins, including the `simple-cache` plug-in and
    the Quartz plug-in, but the plug-in system is such a critical part of the Grails
    ecosystem that the lessons learned should be put to further use. In the next section,
    you’ll be applying what you’ve learned so far to create two new plug-ins for the
    gTunes application. Along the way, you’ll discover how plug-ins in Grails can
    be used as both a way to extend the functionality of an existing application and
    a way to effectively modularize your code base.


    ### Plug-ins in Action


    You’ve learned what plug-ins are and the basics of creating plug-ins. Now it is
    time to put that knowledge to work by developing a couple of plug-ins for the
    gTunes application. The first one you’re going to create is a plug-in that makes
    the album art service and tag library you developed in [Chapter 8](#Chapter08.html#ch8)
    into a reusable plug-in. This is a perfect example of developing a plug-in to
    add functionality and enhance behavior.'
  trans: '

    #### 打包与分发 Grails 插件


    当你确信插件已准备好分发时，可以使用 `grails package-plugin` 命令进行打包。在命令窗口中，只需在插件项目的根目录下输入 `grails
    package-plugin`，如清单 12-28 所示。


    ***清单 12-28.** 打包插件*


    `$ grails package-plugin`

    `  ...`


    `| Plugin packaged grails-simple-cache-0.1.zip`


    从清单 12-28 的输出可以看出，`package-plugin` 命令会根据插件的名称和版本号生成一个 zip 文件。在此例中，你打包的是之前开发的 `simple-cache`
    插件。图 12-2 展示了生成的 zip 文件示例。


    ![Image](img/9781430243779_Fig12-02.jpg)


    ***图 12-2.** simple-cache 插件打包后的 zip 文件*


    按照本章前面“插件安装”部分介绍的步骤，你现在可以将 `simple-cache` 插件安装到其他应用程序中，并使用它提供的标签库和服务。


    如果你想将插件分发到 Grails 中央仓库，首先需要获取一个 Grails 中央仓库的插件开发者账户。你可以在 Grails 网站 [`http://grails.org/Creating+Plugins`](http://grails.org/Creating+Plugins)
    上找到相关步骤。


    获得账户后，你可以使用 release 插件提供的 `publish-plugin` 命令将插件发布到 Grails 中央仓库。


    `$ grails publish-plugin`


    `publish-plugin` 命令需要你的授权凭证才能发布到仓库。这些凭证应在 `$HOME/.grails/settings.groovy` 中定义，如清单
    12-29 所示。


    ***清单 12-29.** 插件仓库凭证*


    `// ~/.grails/settings.groovy`

    `grails.project.repos.grailsCentral.username = ''your username''`

    `grails.project.repos.grailsCentral.password = ''your password''`


    `publish-plugin` 命令会为你完成所有繁重的工作，确保适当的资源已发布到仓库并正确标记。该命令还会生成一个更新的插件列表，以便每当 Grails
    用户输入 `list-plugins` 命令时，你的插件都会出现。


    #### 本地插件仓库


    如果你想在自己的本地网络上利用 Grails 的插件分发和发现机制，可以设置一个本地插件仓库。Grails 插件仓库目前由兼容 Maven 的仓库支持。可以使用
    Nexus 和 Artifactory 等工具来帮助管理这些仓库。一旦你启动并运行了一个兼容 Maven 的仓库，就需要配置 release 插件，使其了解你的仓库。方法是在
    `BuildConfig.groovy` 中为每个要交互的仓库定义一个属性（参见清单 12-30）。


    ***清单 12-30.** 在 BuildConfig.groovy 中配置 Maven 仓库*


    `grails.project.repos.myRepo.url = "http://localhost:8081/myRepo"`

    `grails.project.repos.myRepo.type = "maven"`

    `grails.project.repos.myRepo.username = "admin"`

    `grails.project.repos.myRepo.password = "password"`

    `grails.project.repos.myRepo.portal = "grailsCentral"`


    `grails.project.repos.myOtherRepo.url = "http://localhost:8081/myOtherRepo"`

    `grails.project.repos.myOtherRepo.type = "maven"`

    `grails.project.repos.myOtherRepo.username = "admin"`

    `grails.project.repos.myOtherRepo.password = "password"`

    `grails.project.repos.myOtherRepo.portal = "grailsCentral"`


    现在你已经配置好系统，使其了解你自己的 Maven 仓库，就可以发布到这些仓库了，如清单 12-31 所示。


    ***清单 12-31.** 发布到自定义仓库*


    `grails publish-plugin –-repository=myRepo`

    `grails publish-plugin –-repository=myOtherRepo`


    release 插件还支持发布到本地 Maven 缓存。这不需要任何仓库服务器，而是直接安装到文件系统的 `$HOME/.m2/` 目录下。`maven-install`
    命令会将插件发布到本地 Maven 缓存。为了让应用程序能够解析已安装到本地 Maven 缓存的插件，需要在 `BuildConfig.groovy` 中将
    `mavenLocal()` 配置为一个仓库，如清单 12-32 所示。


    ***清单 12-32.** 将本地 Maven 缓存配置为仓库*


    `grails.project.dependency.resolution = {`

    `    ...`

    `    repositories {`

    `        mavenLocal()`

    `        ...`

    `    }`

    `    ...`

    `}`


    至此，我们对插件系统的介绍就结束了。你已经了解了如何以多种不同方式利用插件系统。本节涉及了一些插件的思路，包括 `simple-cache` 插件和 Quartz
    插件，但插件系统是 Grails 生态系统中如此关键的一部分，以至于学到的知识应该得到进一步应用。在下一节中，你将运用目前所学的内容，为 gTunes 应用程序创建两个新插件。在此过程中，你将发现
    Grails 中的插件既可以作为扩展现有应用程序功能的一种方式，也可以作为有效模块化代码库的一种方式。


    ### 插件实战


    你已经了解了什么是插件以及创建插件的基础知识。现在是时候通过为 gTunes 应用程序开发几个插件来将这些知识付诸实践了。你要创建的第一个插件是将你在第 8
    章中开发的专辑封面服务和标签库变成一个可重用的插件。这是开发插件以添加功能并增强行为的绝佳示例。

