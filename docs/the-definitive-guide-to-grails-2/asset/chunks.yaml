    \n\n  static namespace = \"music\"\n```"
  raw: 'Notice how you can use the `update` attribute to specify that you want the
    contents of the response to be placed into an HTML `<div>` that has a DOM ID with
    the value `musicPanel`. If you refresh the page at this point and try the links,
    you’ll notice that the Ajax part of the picture is working already! The downside
    is that since there is no display action in the `AlbumController` at this point,
    you get a 404 “Page not found” error from the server.


    Let’s correct that by opening `AlbumController` and implementing the `display`
    action. [Listing 8-16](#Chapter08.html#list_8_16) shows the code, which simply
    obtains the `Album` instance using the `id` parameter from the `params` object
    and then uses it to render the `_album.gsp` template developed in [Listing 8-14](#Chapter08.html#list_8_14).


    ***Listing 8-16.** The display Action of AlbumController*


    `def display() {`

    `    def album = Album.get(params.id)`

    `    if(album) {`

    `        def artist = album.artist`

    `        render(template:"album", model:[artist:artist, album:album])`

    `    } else {`

    `        render "Album not found."`

    `    }`

    `}`


    By adding a bit of CSS magic to enhance the look of the `_album.gsp` template,
    all of a sudden you have album details being obtained via Ajax and rendered to
    the view. [Figure 8-2](#Chapter08.html#fig_8_2) shows the result of your hard
    work.


    ![Image](images/9781430243779_Fig08-02.jpg)


    ***Figure 8-2.** Displaying albums using Ajax*


    Sadly, even with the CSS enhancements, `Album` details are looking a bit bland
    with all that text. Wouldn’t it be nice to be able to display the album art for
    each album? Where there is a will, there is a way—luckily, Apple has come to the
    rescue here by providing a REST-based web service that lets developers look up
    album art from its massive pool of assets. The service is available at [`http://itunes.apple.com/search`](http://itunes.apple.com/search)`.`
    Open that URL in a web browser and you should see a response that looks something
    like this:


    `{`

    ` "resultCount":0,`

    ` "results": []`

    ` }`


    That doesn’t look very interesting. Certainly it doesn’t look like anything that
    will help you display album artwork in gTunes. What is shown there is the JSON
    response to our request. The problem is that we didn’t really request anything
    useful, and so we didn’t *get* anything useful. Let’s make it a little more interesting
    by including some request parameters. Try [`http://itunes.apple.com/search?media=music&entity=album&attribute=albumTerm&term=Church+Of+Broken+Glass`](http://itunes.apple.com/search?media=music&entity=album&attribute=albumTerm&term=Church+Of+Broken+Glass).
    That URL includes several request parameters.


    ![Image](images/p179-01.jpg)


    To summarize, the request URL above is searching for music for an album titled
    *Church of Broken Glass*. That request should yield a response that looks something
    like this:


    `{`

    ` "resultCount":1,`

    ` "results": [`

    `{"wrapperType":"collection", "collectionType":"Album", "artistId":80907270,`

    `"collectionId":293455812, "amgArtistId":512604, "artistName":"Hammers of Misfortune",`

    `"collectionName":"Church of Broken Glass", "collectionCensoredName":"Church of
    Broken Glass",`

    `"artistViewUrl":"https://itunes.apple.com/us/artist/hammers-of-misfortune/id80907270?uo=4",`

    `"collectionViewUrl":"https://itunes.apple.com/us/album/church-of-broken-glass/id293455812?uo=4",`

    `"artworkUrl60":"http://a397.phobos.apple.com/us/r30/Music/98/da/c2/mzi.wvlbbglb.60x60-50.jpg",`

    `"artworkUrl100":"http://a862.phobos.apple.com/us/r30/Music/98/da/c2/mzi.wvlbbglb.100x100-75.jpg",`

    `"collectionPrice":9.99, "collectionExplicitness":"notExplicit", "trackCount":5,`

    `"copyright":" 2008 Hammers of Misfortune", "country":"USA", "currency":"USD",`

    `"releaseDate":"2008-09-30T07:00:00Z", "primaryGenreName":"Rock"}]`

    `}`


    That response includes a lot of information—more than we need—but we can ignore
    most of it and pull out just what we do need: the value of the `artworkUrl100`
    attribute—[`http://a862.phobos.apple.com/us/r30/Music/98/da/c2/mzi.wvlbbglb.100x100-75.jpg`](http://a862.phobos.apple.com/us/r30/Music/98/da/c2/mzi.wvlbbglb.100x100-75.jpg),
    in this case. That value represents a URL to the corresponding album artwork.


