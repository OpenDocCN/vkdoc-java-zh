    虽然这段代码很短，但它包含了不少需要理解的新概念。让我们从第 6 行开始逐一讲解，这里获取了事件 `source` 的引用：


    `6 Class changedJob = event.source`


    拿到 `source` 后，`onChange` 事件做的下一件事是通过调用 `addArtefact` 方法，将新的 `Class` 注册到 `GrailsApplication`
