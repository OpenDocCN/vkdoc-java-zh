- fmt: '#### Generating the Views


    It would be nice to have some views for your actions to delegate to. Fortunately,
    you can generate them with the `grails generate-views` command, which is executed
    according to the same process described in the section “Generating a Controller”
    (see [Listing 2-19](#Chapter02.html#list_2_19)).


    ***Listing 2-19.** Generating Views*


    ```

    grails> generate-views com.gtunes.Album

    | Finished generation for domain class com.gtunes.Album

    grails>

    ```


    ![Image](images/9781430243779_Fig02-10.jpg)


    ***Figure 2-10.** The generated scaffolding views*


    The resulting output from the command window will resemble [Figure 2-10](#Chapter02.html#fig_2_10).


    All in all, you can generate four views:


    > *   `list.gsp`: Used by the `list` action to display a list of `Album` instances.

    > *   `show.gsp`: Used by the `show` action to display an individual `Album` instance.

    > *   `edit.gsp`: Used by the `edit` action to edit a `Album` instance’s properties.

    > *   `create.gsp`: Used by the `create` action to create a new `Album` instance.

    > *   `_form.gsp`: Used by the `create` and `edit` views.


    ![Image](images/square.jpg) **Note**  All the views use the main layout found
    at `grails-app/views/layouts/main.gsp`. This includes the placement of title,
    logo, and any included style sheets. Layouts are discussed in detail in [Chapter
    5](#Chapter05.html).


    You now have a controller and views to perform CRUD. So what have you achieved
    beyond what you saw in dynamic scaffolding? Well, nothing yet. The power of command-line
    scaffolding is that it gives you a starting point to build your application. Having
    started with nothing, you now have a controller in which to place your own custom
    business logic. You have views, which you can customize to your heart’s content.
    And you accomplished all this while writing minimal code. Most developers are
    on a constant mission to write less code, and scaffolding proves a useful tool
    toward achieving this goal.


    With the `AlbumController` and associated views in place, delete the existing
    `SongController` and repeat the steps in [Listings 2-10](#Chapter02.html#list_2_10)
    and [2-19](#Chapter02.html#list_2_19) to generate a controller and views for the
    `Song` domain class. You’re going to need the generated code as you build on the
    basic CRUD functionality in later chapters.


    In the meantime, let’s move on to understanding more of what’s necessary to kick-start
    Grails development, beginning with environments.


    ### Being Environmentally Friendly


    It’s typical in any web-application production team to have a development configuration
    for the application that can be configured to work with a locally installed database.
    This configuration sometimes even differs from developer to developer, depending
    on the specific desktop configurations.


    In addition, QA staff who test the work produced by developers have separate machines
    configured in a way similar to the production environment. Thus, there are two
    environments so far: the development configuration and the test configuration.
    The third is the production configuration, which is needed when the system goes
    live.


    This scenario is ubiquitous across pretty much every development project, with
    each development team spinning custom automated-build solutions via Ant or another
    custom-build system, instead of getting the solution from the framework itself.


    Grails supports the concept of *development, test*, and *production* environments
    by default and will configure itself accordingly when executed. Some of this is
    done completely transparently to the developer. For example, autoreloading is
    enabled when Grails is configured in development mode but disabled when it’s in
    production mode (to increase performance and minimize any security risk, however
    small).


    Executing Grails under different environments is remarkably simple. For instance,
    the following command will run a Grails application with the production settings:


    ```

    $ grails prod run-app

    ```


    If you recall the output of the `grails help` command, you will remember that
    the basic usage of the `grails` command is as follows:


    ```

    Usage (optionals marked with *):

    grails  [environment]* [target]   [arguments]*

    ```


    In other words, the first optional token after the `grails` executable is the
    environment, and three built-in options ship with Grails:


    > *   `prod`: The production environment settings. Grails executes in the most
    efficient manner possible, against all configured production settings.

    > *   `test`: The test environment settings. Grails executes in the most efficient
    manner possible, against all configured test settings.

    > *   `dev`: The development environment settings. Grails is run in development
    mode with tools and behavior (such as hot reloading) enabled to optimize developer
    productivity.


    Of course, Grails is not limited to just three environments. You can specify a
    custom environment by passing in a system property called `grails.env` to the
    `grails` command. For example:


    ```

    grails -Dgrails.env=myenvironment test-app

    ```


    Here you execute the Grails test cases using an environment called `myenvironment`.
    All this environment switching may be handy, but what does it mean in practical
    terms? For one thing, it allows you to configure different databases for different
    environments, as you’ll see in the next section.


    ### Configuring Data Sources


    Armed with your newly acquired knowledge of environments and how to switch between
    them, you’ll see the implications when you start configuring data sources. What
    initial configuration steps are required to get a Grails application up and running?
    None. That’s right; you don’t have to configure a thing.


    Even configuring the data source is optional. If you don’t configure it, Grails
    will start up with an in-memory H2 database. This is highly advantageous to begin
    with, particularly in terms of testing, because you can start an application with
    a fresh set of data on each load.


    However, since it is a pretty common requirement, let’s delve into data sources
    because you’ll certainly need to configure them; plus, they’ll help you develop
    your knowledge of environments.'
  raw: '#### Generating the Views


    It would be nice to have some views for your actions to delegate to. Fortunately,
    you can generate them with the `grails generate-views` command, which is executed
    according to the same process described in the section “Generating a Controller”
    (see [Listing 2-19](#Chapter02.html#list_2_19)).


    ***Listing 2-19.** Generating Views*


    `grails> generate-views com.gtunes.Album`

    `| Finished generation for domain class com.gtunes.Album`

    `grails>` ![Image](images/9781430243779_Fig02-10.jpg)


    ***Figure 2-10.** The generated scaffolding views*


    The resulting output from the command window will resemble [Figure 2-10](#Chapter02.html#fig_2_10).


    All in all, you can generate four views:


    > *   `list.gsp`: Used by the `list` action to display a list of `Album` instances.

    > *   `show.gsp`: Used by the `show` action to display an individual `Album` instance.

    > *   `edit.gsp`: Used by the `edit` action to edit a `Album` instance’s properties.

    > *   `create.gsp`: Used by the `create` action to create a new `Album` instance.

    > *   `_form.gsp`: Used by the `create` and `edit` views.


    ![Image](images/square.jpg) **Note**  All the views use the main layout found
    at `grails-app/views/layouts/main.gsp`. This includes the placement of title,
    logo, and any included style sheets. Layouts are discussed in detail in [Chapter
    5](#Chapter05.html).


    You now have a controller and views to perform CRUD. So what have you achieved
    beyond what you saw in dynamic scaffolding? Well, nothing yet. The power of command-line
    scaffolding is that it gives you a starting point to build your application. Having
    started with nothing, you now have a controller in which to place your own custom
    business logic. You have views, which you can customize to your heart’s content.
    And you accomplished all this while writing minimal code. Most developers are
    on a constant mission to write less code, and scaffolding proves a useful tool
    toward achieving this goal.


    With the `AlbumController` and associated views in place, delete the existing
    `SongController` and repeat the steps in [Listings 2-10](#Chapter02.html#list_2_10)
    and [2-19](#Chapter02.html#list_2_19) to generate a controller and views for the
    `Song` domain class. You’re going to need the generated code as you build on the
    basic CRUD functionality in later chapters.


    In the meantime, let’s move on to understanding more of what’s necessary to kick-start
    Grails development, beginning with environments.


    ### Being Environmentally Friendly


    It’s typical in any web-application production team to have a development configuration
    for the application that can be configured to work with a locally installed database.
    This configuration sometimes even differs from developer to developer, depending
    on the specific desktop configurations.


    In addition, QA staff who test the work produced by developers have separate machines
    configured in a way similar to the production environment. Thus, there are two
    environments so far: the development configuration and the test configuration.
    The third is the production configuration, which is needed when the system goes
    live.


    This scenario is ubiquitous across pretty much every development project, with
    each development team spinning custom automated-build solutions via Ant or another
    custom-build system, instead of getting the solution from the framework itself.


    Grails supports the concept of *development, test*, and *production* environments
    by default and will configure itself accordingly when executed. Some of this is
    done completely transparently to the developer. For example, autoreloading is
    enabled when Grails is configured in development mode but disabled when it’s in
    production mode (to increase performance and minimize any security risk, however
    small).


    Executing Grails under different environments is remarkably simple. For instance,
    the following command will run a Grails application with the production settings:


    `$ grails prod run-app`


    If you recall the output of the `grails help` command, you will remember that
    the basic usage of the `grails` command is as follows:


    `Usage (optionals marked with *):`

    `grails  [environment]* [target]   [arguments]*`


    In other words, the first optional token after the `grails` executable is the
    environment, and three built-in options ship with Grails:


    > *   *prod*: The production environment settings. Grails executes in the most
    efficient manner possible, against all configured production settings.

    > *   *test*: The test environment settings. Grails executes in the most efficient
    manner possible, against all configured test settings.

    > *   *dev*: The development environment settings. Grails is run in development
    mode with tools and behavior (such as hot reloading) enabled to optimize developer
    productivity.


    Of course, Grails is not limited to just three environments. You can specify a
    custom environment by passing in a system property called `grails.env` to the
    `grails` command. For example:


    `grails -Dgrails.env=myenvironment test-app`


    Here you execute the Grails test cases using an environment called `myenvironment`.
    All this environment switching may be handy, but what does it mean in practical
    terms? For one thing, it allows you to configure different databases for different
    environments, as you’ll see in the next section.


    ### Configuring Data Sources


    Armed with your newly acquired knowledge of environments and how to switch between
    them, you’ll see the implications when you start configuring data sources. What
    initial configuration steps are required to get a Grails application up and running?
    None. That’s right; you don’t have to configure a thing.


    Even configuring the data source is optional. If you don’t configure it, Grails
    will start up with an in-memory H2 database. This is highly advantageous to begin
    with, particularly in terms of testing, because you can start an application with
    a fresh set of data on each load.


    However, since it is a pretty common requirement, let’s delve into data sources
    because you’ll certainly need to configure them; plus, they’ll help you develop
    your knowledge of environments.'
