- fmt: "#### Saving, Updating, and Deleting\n\nAs you’ve seen already, objects can\
    \ be persisted by calling the `save()` method. For example, the code in [Listing\
    \ 9-4](#Chapter09.html#list_9_4) demonstrates how to persist an instance of the\
    \ `Album` class, assuming it validates successfully.\n\n**Listing 9-4.** Saving\
    \ an Instance\n\n```\ndef album = new Album(params)\nalbum.save()\n```\n\nWe’ll\
    \ have more to say about how GORM persists objects to the database in “The Semantics\
    \ of GORM,” later in this chapter. For now, all you need to know is that at some\
    \ point the underlying Hibernate engine will execute an SQL `INSERT` to persist\
    \ the `Album` instance to the database. Updating objects is strikingly similar;\
    \ doing so involves calling the same `save()` method on an existing persistent\
    \ instance, as shown in [Listing 9-5](#Chapter09.html#list_9_5).\n\n**Listing\
    \ 9-5.** Updating an Instance\n\n```\ndef album = Album.get(1)\nalbum.title =\
    \ \"The Changed Title\"\nalbum.save()\n```\n\nWhen the `save()` method is called,\
    \ Hibernate automatically works out whether it should issue an SQL `INSERT` or\
    \ an SQL `UPDATE`. Occasionally, on certain older databases, Hibernate may get\
    \ this decision wrong and issue an `UPDATE` when it should be doing an `INSERT`.\
    \ You can get around this by passing an explicit `insert` argument to the `save()`\
    \ method:\n\n```\nalbum.save(insert:true)\n```\n\nAs for deleting objects, this\
    \ is done with the `delete()` method:\n\n```\nalbum.delete()\n```\n\nThat’s the\
    \ simple stuff. Next you’ll be looking in more detail at associations in GORM\
    \ and how those work.\n\n### Associations\n\n[Chapter 3](#Chapter03.html#ch3)\
    \ already provided some detail on GORM associations in their different incarnations,\
    \ but there is a lot more to the associations that GORM supports. In a typical\
    \ one-to-many association such as the `songs` property of the `Album` class, the\
    \ type is a `java.util.Set`. If you recall, the semantics of `Set` as defined\
    \ by javadoc don’t allow duplicates and have no order. However, you may want an\
    \ association to have a particular order.\n\nOne option is to use a `SortedSet`,\
    \ which requires you to implement the `Comparable` interface for any item placed\
    \ into the `SortedSet`. For example, [Listing 9-6](#Chapter09.html#list_9_6) shows\
    \ how to sort tracks by the `trackNumber` property.\n\n**Listing 9-6.** Using\
    \ `SortedSet` to Sort Associations\n\n```\nclass Album {\n    ...\n    SortedSet\
    \ songs\n}\nclass Song implements Comparable {\n    ...\n    int compareTo(o)\
    \ {\n        if(this.trackNumber > o.trackNumber) {\n            return 1\n  \
    \      } else if(this.trackNumber < o.trackNumber) {\n            return -1\n\
    \        }\n        return 0\n    }\n}\n```\n\nAlternatively, you can specify\
    \ the sort order declaratively, using the `mapping` property introduced in [Chapter\
    \ 3](#Chapter03.html#ch3). For example, if you want to sort `Song` instances by\
    \ track number for all queries, you can do so with the `sort` method:\n\n```\n\
    class Song {\n    ...\n    static mapping = {\n        sort \"trackNumber\"\n\
    \    }\n}\n```\n\nYou may not want to sort by the `trackNumber` property for every\
    \ query or association, in which case you can apply sorting to the `songs` association\
    \ of the `Album` class only:\n\n```\nstatic mapping = {\n    songs sort: \"trackNumber\"\
    \n}\n```\n\nAnother way to change the way sorting is done is to use a different\
    \ collection type, such as `java.util.List`. Unlike a `Set`, a `List` allows duplicates\
    \ and retains the order in which objects are placed into the `List`. To support\
    \ `List` associations, Hibernate uses a special index column that contains the\
    \ index of each item in the `List`. [Listing 9-7](#Chapter09.html#list_9_7) shows\
    \ an example of using a `List` for the `songs` association.\n\n**Listing 9-7.**\
    \ Using a `List` Association\n\n```\nclass Album {\n    ...\n    List songs\n\
    }\n```\n\n`Set` associations have no concept of order, but with a `List` you can\
    \ index into a specific entry; for example:\n\n```\nprintln album.songs[0]\n```\n\
    \nGORM also supports associations being stored in a Hibernate Bag. A Bag is not\
    \ necessarily ordered and doesn’t have to guarantee uniqueness; for those reasons,\
    \ it may be more performant for a lot of situations. To use a Bag, declare the\
    \ property—like the `List` declared in [Listing 9-7](#Chapter09.html#list_9_7)—but\
    \ use the type `java.util.Collection` instead of `java.util.List`.\n\nFinally,\
    \ GORM also supports `Map` associations where the key is a `String`. Simply change\
    \ the type from `List` to `Map` in the example in [Listing 9-7](#Chapter09.html#list_9_7)\
    \ and use a `String` instead of an `Integer` to access entries. For both `List`\
    \ and `Map` collection types, Grails creates an index column. In the case of a\
    \ `List`, the index column holds a numeric value that signifies its position in\
    \ the `List`, while for a `Map` the index column holds the `Map` key.\n\n####\
    \ Relationship Management Methods\n\nAs well as giving you the ability to map\
    \ associations to the database, GORM also automatically provides you with methods\
    \ to manage those associations. The `addTo*` and `removeFrom*` dynamic methods\
    \ allow you to add and remove entries from an association. Additionally, both\
    \ methods return the instance they are called on, thus allowing you to chain method\
    \ calls. [Listing 9-8](#Chapter09.html#list_9_8) shows an example of using the\
    \ `addToSongs` method of the `Album` class.\n\n**Listing 9-8.** Using Relationship\
    \ Management Methods\n\n```\nnew Album(title:\"Odelay\",\n          artist:beck,\n\
    \          year:1996)\n            .addToSongs(title:\"Devil's Haircut\",\n  \
    \                      artist:beck, duration:342343)\n            .addToSongs(title:\"\
    Hotwax\", artist:beck, duration:490583)\n            ...\n            .save()\n\
    ```\n\nAs you see from the example, you can pass just the `Song` values as named\
    \ parameters to the `addToSongs` method; GORM will automatically instantiate a\
    \ new instance and add it to the `songs` association. Alternatively, if you already\
    \ have a `Song` instance, you can simply pass that into the `addToSongs` method.\n\
    \n#### Transitive Persistence\n\nWhenever you save, update, or delete an instance\
    \ in GORM, the operation can cascade to any associated objects. The default cascade\
    \ behavior in GORM is dictated by the `belongsTo` property first discussed in\
    \ [Chapter 3](#Chapter03.html#ch3). For example, if the `Song` class `belongsTo`\
    \ the `Album` class, then whenever an `Album` instance is deleted, all of the\
    \ associated `Song` instances are deleted too. If there is no `belongsTo` definition\
    \ in an association, then saves and updates cascade, but deletes don’t.\n\nIf\
    \ you need more control over the cascading behavior, you can customize it, using\
    \ the `cascade` method of the `mapping` block, as shown in [Listing 9-9](#Chapter09.html#list_9_9).\n\
    \n**Listing 9-9.** Customizing the Cascading Behavior\n\n```\nclass Album {\n\
    \    ...\n    static mapping = {\n        songs cascade:'save-udpate'\n    }\n\
    }\n```\n\nA special cascade style, `delete-orphan`, exists in case you want a\
    \ child object deleted if it is removed from an association but not deleted explicitly.\n\
    \n![Image](images/square.jpg) **Tip** For information on available cascade options,\
    \ see the related section in the Hibernate documentation: [`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive)."
  raw: '#### Saving, Updating, and Deleting


    As you’ve seen already, objects can be persisted by calling the `save()` method.
    For example, the code in [Listing 9-4](#Chapter09.html#list_9_4) demonstrates
    how to persist an instance of the `Album` class, assuming it validates successfully.


    ***Listing 9-4.** Saving an Instance*


    `def album = new Album(params)`

    `album.save()`


    We’ll have more to say about how GORM persists objects to the database in “The
    Semantics of GORM,” later in this chapter. For now, all you need to know is that
    at some point the underlying Hibernate engine will execute an SQL `INSERT` to
    persist the `Album` instance to the database. Updating objects is strikingly similar;
    doing so involves calling the same `save()` method on an existing persistent instance,
    as shown in [Listing 9-5](#Chapter09.html#list_9_5).


    ***Listing 9-5.** Updating an Instance*


    `def album = Album.get(1)`

    `album.title = "The Changed Title"`

    `album.save()`


    When the `save()` method is called, Hibernate automatically works out whether
    it should issue an SQL `INSERT` or an SQL `UPDATE`. Occasionally, on certain older
    databases, Hibernate may get this decision wrong and issue an `UPDATE` when it
    should be doing an `INSERT`. You can get around this by passing an explicit `insert`
    argument to the `save()` method:


    `album.save(insert:true)`


    As for deleting objects, this is done with the `delete()` method:


    `album.delete()`


    That’s the simple stuff. Next you’ll be looking in more detail at associations
    in GORM and how those work.


    ### Associations


    [Chapter 3](#Chapter03.html#ch3) already provided some detail on GORM associations
    in their different incarnations, but there is a lot more to the associations that
    GORM supports. In a typical one-to-many association such as the songs property
    of the `Album` class, the type is a `java.util.Set`. If you recall, the semantics
    of `Set` as defined by javadoc don’t allow duplicates and have no order. However,
    you may want an association to have a particular order.


    One option is to use a `SortedSet`, which requires you to implement the Comparable
    interface for any item placed into the `SortedSet`. For example, [Listing 9-6](#Chapter09.html#list_9_6)
    shows how to sort tracks by the `trackNumber` property.


    ***Listing 9-6.** Using SortedSet to Sort Associations*


    `class Album {`

    `    ...`

    `    SortedSet songs`

    `}`

    `class Song implements Comparable {`

    `    ...`

    `    int compareTo(o) {`

    `        if(this.trackNumber > o.trackNumber) {`

    `            return 1`

    `        } else if(this.trackNumber < o.trackNumber) {`

    `            return -1`

    `        }`

    `        return 0`

    `    }`

    `}`


    Alternatively, you can specify the sort order declaratively, using the `mapping`
    property introduced in [Chapter 3](#Chapter03.html#ch3). For example, if you want
    to sort `Song` instances by track number for all queries, you can do so with the
    `sort` method:


    `class Song {`

    `    ...`

    `    static mapping = {`

    `        sort "trackNumber"`

    `    }`

    `}`


    You may not want to sort by the `trackNumber` property for every query or association,
    in which case you can apply sorting to the `songs` association of the `Album`
    class only:


    `static mapping = {`

    `    songs sort: "trackNumber"`

    `}`


    Another way to change the way sorting is done is to use a different collection
    type, such as `java.util.List`. Unlike a `Set`, a `List` allows duplicates and
    retains the order in which objects are placed into the `List`. To support `List`
    associations, Hibernate uses a special index column that contains the index of
    each item in the `List`. [Listing 9-7](#Chapter09.html#list_9_7) shows an example
    of using a `List` for the `songs` association.


    ***Listing 9-7.** Using a List Association*


    `class Album {`

    `    ...`

    `    List songs`

    `}`


    `Set` associations have no concept of order, but with a `List` you can index into
    a specific entry; for example:


    `println album.songs[0]`


    GORM also supports associations being stored in a Hibernate Bag. A Bag is not
    necessarily ordered and doesn’t have to guarantee uniqueness; for those reasons,
    it may be more performant for a lot of situations. To use a Bag, declare the property—like
    the `List` declared in [Listing 9-7](#Chapter09.html#list_9_7)—but use the type
    `java.util.Collection` instead of `java.util.List`.


    Finally, GORM also supports `Map` associations where the key is a `String`. Simply
    change the type from `List` to `Map` in the example in [Listing 9-7](#Chapter09.html#list_9_7)
    and use a `String` instead of an `Integer` to access entries. For both `List`
    and `Map` collection types, Grails creates an index column. In the case of a `List`,
    the index column holds a numeric value that signifies its position in the `List`,
    while for a `Map` the index column holds the `Map` key.


    #### Relationship Management Methods


    As well as giving you the ability to map associations to the database, GORM also
    automatically provides you with methods to manage those associations. The `addTo*`
    and `removeFrom*` dynamic methods allow you to add and remove entries from an
    association. Additionally, both methods return the instance they are called on,
    thus allowing you to chain method calls. [Listing 9-8](#Chapter09.html#list_9_8)
    shows an example of using the `addToSongs` method of the `Album` class.


    ***Listing 9-8.** Using Relationship Management Methods*


    `new Album(title:"Odelay",`

    `          artist:beck,`

    `          year:1996)`

    `            .addToSongs(title:"Devil''s Haircut",`

    `                        artist:beck, duration:342343)`

    `            .addToSongs(title:"Hotwax", artist:beck, duration:490583)`

    `            ...`

    `            .save()`


    As you see from the example, you can pass just the `Song` values as named parameters
    to the `addToSongs` method; GORM will automatically instantiate a new instance
    and add it to the `songs` association. Alternatively, if you already have a `Song`
    instance, you can simply pass that into the `addToSongs` method.


    #### Transitive Persistence


    Whenever you save, update, or delete an instance in GORM, the operation can cascade
    to any associated objects. The default cascade behavior in GORM is dictated by
    the `belongsTo` property first discussed in [Chapter 3](#Chapter03.html#ch3).
    For example, if the `Song` class `belongsTo` the `Album` class, then whenever
    an `Album` instance is deleted, all of the associated `Song` instances are deleted
    too. If there is no `belongsTo` definition in an association, then saves and updates
    cascade, but deletes don’t.


    If you need more control over the cascading behavior, you can customize it, using
    the `cascade` method of the `mapping` block, as shown in [Listing 9-9](#Chapter09.html#list_9_9).


    ***Listing 9-9.** Customizing the Cascading Behavior*


    `class Album {`

    `    ...`

    `    static mapping = {`

    **`        songs cascade:''save-udpate''`**

    `    }`

    `}`


    A special cascade style, `delete-orphan`, exists in case you want a child object
    deleted if it is removed from an association but not deleted explicitly.


    ![Image](images/square.jpg) **Tip** For information on available cascade options,
    see the related section in the Hibernate documentation: [`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive).'
