    遗憾的是，即使有了 CSS 增强，`Album` 的详细信息看起来还是因为全是文字而显得有些单调。如果能显示每张专辑的封面图，岂不是很好？有志者，事竟成——幸运的是，苹果公司提供了一个基于
    REST 的网络服务来救场，该服务允许开发者从其庞大的资源库中查找专辑封面图。该服务的地址是 [`http://itunes.apple.com/search`](http://itunes.apple.com/search)。在浏览器中打开该
    URL，你应该会看到类似这样的响应：


    `{`

