    #### 添加用户领域类


    为了对用户进行建模，你需要创建一个包含个人信息（如名字和姓氏）以及每个用户的登录名和密码的 `User` 领域类。为此，你可以使用 `create-domain-class`
    命令：


    `grails create-domain-class com.gtunes.User`


    这将在 `grails-app/domain/com/gtunes/User.groovy` 位置创建一个新的领域类。完成此操作后，你需要向 `User`
    领域类中添加一些属性，如清单 4-55 所示。


    ***清单 4-55.** 用户领域类*


    `package com.gtunes`

    `class User {`

    `    String login`

    `    String password`

    `    String firstName`

    `    String lastName`

    `    static hasMany = [purchasedSongs:Song]`

    `}`


    如你所见，清单 4-56 中的代码仅捕获了用户的基本信息，但你可以轻松扩展这些信息，以包含地址、联系电话等。需要注意的一个属性是 `purchasedSongs`
    关联，一旦你实现了音乐购买功能，它将持有用户购买的所有歌曲的引用。


    然而，在我们过于超前之前，先添加一些约束条件，以确保领域实例保持有效状态（参见清单 4-56）。


    ***清单 4-56.** 对用户类应用约束*


    `class User {`

    `    ...`

    `    static constraints = {`

    `        login blank:false, size:5..15,matches:/[\S]+/, unique:true`

    `        password blank:false, size:5..15,matches:/[\S]+/`

    `        firstName blank:false`

    `        lastName blank:false`

    `    }`

    `}`


    有了这些约束，你可以确保用户不能输入空白值或不符合必要大小限制的值。此外，请注意 `unique` 约束的使用，它确保了 `login` 属性对每个用户是唯一的。我们稍后会更详细地讨论这一点；现在，让我们专注于登录和注册。


    #### 添加登录表单


    因为你已经有了一个主页，将登录表单添加在那里可能是有意义的。但随着时间的推移，你会希望允许用户匿名浏览 gTunes 音乐目录，因此用户应该能够从任何地方登录。考虑到这一点，你需要将登录表单添加到
    `grails-app/views/layouts/main.gsp` 布局中，以便它在每个页面上都可用。


    清单 4-57 展示了实现此功能的 GSP 代码。请注意如何检查 `session` 对象中是否已存在用户，并相应地显示欢迎框或登录表单。


    ***清单 4-57.** 在所有地方添加登录表单*


    `<div id="loginBox" class="loginBox">`

    `  <g:if test="${session?.user}">`

    `    <div style="margin-top:20px">`

    `      <div style="float:right;">`

    `        <a href="#">个人资料</a> | <g:link controller="user"`

    `                                    action="logout">退出登录</g:link><br>`

    `      </div>`

    `      欢迎回来`

    `      <span id="userFirstName">`

    `        ${session?.user?.firstName}!`

    `      </span><br><br>`


    `      您已购买 (${session.user.purchasedSongs?.size() ?: 0}) 首歌曲。<br>`

    `    </div>`

    `  </g:if>`

    `  <g:else>`

    `    <g:form`

    `      name="loginForm"`

    `      url="[controller:''user'',action:''login'']">`

    `      <div>用户名：</div>`

    `      <g:textField name="login"`

    `                   value="${fieldValue(bean:loginCmd, field:''login'')}">`

    `      </g:textField>`

    `      <div>密码：</div>`

    `      <g:passwordField name="password"></g:passwordField>    `

    `      <br/>`

    `      <input  type="image"`

    `          src="${createLinkTo(dir:''images'', file:''login-button.gif'')}"`

    `          name="loginButton" id="loginButton" border="0"></input>`

    `    </g:form>`

    `    <g:renderErrors bean="${loginCmd}"></g:renderErrors>`

    `  </g:else>`

    `</div>`


    除了提供登录框，你还需要提供一个允许用户注册的链接。一旦登录，用户将能够点击进入商店浏览，并点击“我的音乐”链接查看已购买的音乐。当用户未登录时，这些链接不会显示，因此你可以利用屏幕空间放置一个指向注册页面的醒目链接。清单
    4-58 显示了添加到 `main.gsp` 布局中的注册链接。


    ***清单 4-58.** 添加指向注册页面的链接*


    `    <div id="navPane">`

    `      <g:if test="${session.user}">`

    `        <ul>`

    `          <li><g:link controller="user"`

    `                      action="music">我的音乐</g:link></li>`

    `          <li><g:link controller="store"`

    `                      action="shop">商店</g:link></li>        `

    `        </ul>    `

    `      </g:if>`

    `      <g:else>`

    `        <div id="registerPane">`

    `          需要账户？`

    `            <g:link controller="user"`

    `                    action="register">立即注册</g:link>`

    `          开始创建您个人的音乐收藏吧！`

    `        </div>            `

    `      </g:else>`

    `    </div>`


    在让网页设计师参与进来并对层叠样式表（CSS）进行一些调整后，主页从零开始变得稍微像样了一些（参见图 4-3）。


    ![图片](img/9781430243779_Fig04-03.jpg)


    ***图 4-3.** gTunes 主页*

