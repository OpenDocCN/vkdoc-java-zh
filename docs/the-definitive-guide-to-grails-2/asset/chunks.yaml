    that need to be applied to the message. [Listing 7-11](#Chapter07.html#list_7_11)
    shows how to pass arguments to the `message` tag.


    ***Listing 7-11.** Using the message Tag to Populate a Parameterized Message*


    `<div>`

    `<g:message code="gtunes.purchased.songs" args="[97]"/>`

    `</div>`


    Of course, for this or a similar message, you will probably not want to hard-code
    the parameter value in a GSP like that. More likely, you will want that value
    to be dynamic. The code in [Listing 7-12](#Chapter07.html#list_7_12) is passing
    a parameter to the message to be applied to the `gtunes.purchased. songs` message.
    If the currently logged in user has purchased any songs, then the value of the
    parameter will be the number of songs he or she has purchased; otherwise, the
    value of the parameter will be 0.


    ***Listing 7-12.** Using the message Tag to Populate a Parameterized Message Dynamically*


    `<div> <g:message code="gtunes.purchased.songs"`

    `args="[session.user.purchasedSongs?.size() ?: 0]"/> </div>`


    ![Image](images/square.jpg) **Note**  Note the use of the so-called Elvis operator
    (?:) in the previous code. The Elvis operator is a shorthand version of Java ternary
    operator where the return value for the true condition is the same as the expression
    being evaluated. For example, the following expressions accomplish the same thing:


    `size = session.user.purchasedSongs?.size() ? session.user.purchasedSongs?.size()
    : 0 size =`

    `session.user.purchasedSongs?.size() ?: 0`'
  trans: '

    测试 Grails 应用本地化的一种简单方法是在请求中包含一个名为 `lang` 的参数，并为其分配一个有效的语言代码，例如西班牙语使用“es”（[`http://localhost:8080/gTunes/?lang=es`](http://localhost:8080/gTunes/?lang=es)）。图
    7-3 展示了该应用的西班牙语版本。


    ![Image](img/9781430243779_Fig07-03.jpg)


    ***图 7-3.** 西班牙语版的 gTunes*


    #### 使用 URL 映射实现国际化


    如前所述，名为 `lang` 的请求参数会告知框架在处理该请求时使用特定的语言代码。指定该请求参数的一种方式是将其包含在请求 URL 中，例如 [`http://localhost:8080/gTunes/?lang=es`](http://localhost:8080/gTunes/?lang=es)。另一种指定请求参数的方式是定义自定义
    URL 映射，如清单 7-7 所示。


    ***清单 7-7.** 用于本地化的 URL 映射*


    `class UrlMappings {`

    `  static mappings = {`

    `    "/store/$lang"(controller:''store'')`


    `    // ...`

    `  }`

    `}`


    清单 7-7 中的映射会将所有请求映射到诸如 [`http://localhost:8080/gTunes/en/`](http://localhost:8080/gTunes/en/)
    或 [`http://localhost:8080/gTunes/es/`](http://localhost:8080/gTunes/es/) 这样的 URL，其中“en”和“es”可以是任何有效的语言代码。


    ### 使用参数化消息


    用户消息通常不仅仅由简单的静态文本组成。消息可能需要包含一些直到运行时才能确定的数据。例如，gTunes 会显示一条消息，让用户知道他们购买了多少首歌曲。消息内容大致如下：“您已购买
    (97) 首歌曲。” 消息中的“97”部分就是一条直到运行时才能确定的信息。


    #### 使用 java.text.MessageFormat


    Java 包含一个名为 `java.text.MessageFormat` 的类。`java.text.MessageFormat` 的一个有用功能是以语言中立的方式支持参数化消息，例如前面描述的那种。参数化消息可以包含任意数量的参数，这些参数在消息值中用花括号括起来的数字表示。清单
    7-8 展示了“您已购买 (97) 首歌曲。”这条消息在 `grails-app/i18n/messages.properties` 中可能如何表示。


    ***清单 7-8.** 定义参数化消息*


    `# messages.properties`

    `gtunes.purchased.songs=You have purchased ({0}) songs.`

    `...`


    `gtunes.purchased.songs` 消息的值中包含一个参数。与 Java 和 Groovy 中的惯例几乎一致，`java.text.MessageFormat`
    类使用从零开始的索引；消息中的 `{0}` 是第一个参数值的占位符。如果消息有多个参数，它们将在消息值中用 `{0}`、`{1}`、`{2}` 等占位符表示。


    清单 7-9 中的代码展示了如何在 Java 程序中使用 `java.text.MessageFormat`。


    ***清单 7-9.** 使用 MessageFormat 用 Java 填充参数化消息*


    `// JavaMessages.java`

    `import java.util.ResourceBundle;`

    `import java.text.MessageFormat;`


    `public class JavaMessages {`


    `    public static void main(String[] args) {`

    `        ResourceBundle bundle = ResourceBundle.getBundle("messages");`

    `        String songsPurchased = bundle.getString("gtunes.purchased.songs");`

    `        String message = MessageFormat.format(songsPurchased, 97);`

    `        System.out.println("message: " + message);`

    `    }`

    `}`


    清单 7-10 展示了一个执行相同操作的 Groovy 脚本。


    ***清单 7-10.** 使用 MessageFormat 用 Groovy 填充参数化消息*


    `import java.text.MessageFormat`


    `def bundle = ResourceBundle.getBundle(''messages'')`

    `def songsPurchased = bundle.getString(''gtunes.purchased.songs'')`

    `def message = MessageFormat.format(songsPurchased, 97)`


    `println "message: ${message}"`


    #### 使用 message 标签处理参数化消息


    Grails 允许使用参数化消息，而无需应用开发者直接处理 `java.text.MessageFormat` 类。`message` 标签支持一个名为 `args`
    的可选参数，如果为该参数赋值，其值将被视为需要应用到消息上的参数列表。清单 7-11 展示了如何向 `message` 标签传递参数。


    ***清单 7-11.** 使用 message 标签填充参数化消息*


    `<div>`

    `<g:message code="gtunes.purchased.songs" args="[97]"/>`

    `</div>`


    当然，对于这条或类似的消息，您可能不希望像那样在 GSP 中硬编码参数值。更可能的情况是，您希望该值是动态的。清单 7-12 中的代码正在向消息传递一个参数，该参数将被应用到
    `gtunes.purchased.songs` 消息上。如果当前登录的用户已购买过歌曲，那么该参数的值将是其购买的歌曲数量；否则，该参数的值将为 0。


    ***清单 7-12.** 使用 message 标签动态填充参数化消息*


    `<div> <g:message code="gtunes.purchased.songs"`

    `args="[session.user.purchasedSongs?.size() ?: 0]"/> </div>`


    ![Image](img/square.jpg) **注意**  请注意前面代码中使用了所谓的 Elvis 运算符（?:）。Elvis 运算符是 Java
    三元运算符的一种简写形式，其中条件为真时的返回值与正在计算的表达式相同。例如，以下表达式实现的功能相同：


    `size = session.user.purchasedSongs?.size() ? session.user.purchasedSongs?.size()
    : 0 size =`

    `session.user.purchasedSongs?.size() ?: 0`

