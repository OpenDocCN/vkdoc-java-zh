    ### 嵌入对象


    Grails 支持组合的概念——可以将其视为一种更强的关联关系。在这种关系下，将“子对象”内联存储在“父对象”所在的位置通常是合理的。考虑一个 `Car`
    和 `Engine` 之间的简单关系。如果该关系通过组合实现，那么在持久化层面，`Engine` 实际上会被包含在 `Car` 中。也就是说，会有一个表包含
    `Car` 类中所有持久化属性的列，以及属于该 `Car` 的 `Engine` 的所有持久化属性。检索一个 `Car` 及其 `Engine` 不需要跨多个表进行连接，因为所有信息都存储在同一个表中。这样做的一个后果是，如果删除了一个
    `Car`，其 `Engine` 也会随之被删除（参见清单 3-30）。


    ***清单 3-30.** Car 和 Engine 领域类之间的组合关系*


    `class Car {`

    `    String make`

    `    String model`

    `    Engine engine`

    `}`


    `class Engine {`

    `    String manufacturer`

    `    Integer numberOfCylinders`

    `}`


    通常，`Car` 对象和 `Engine` 对象会存储在不同的表中；你需要使用外键来关联这些表（参见清单 3-31 和 3-32）。


    ***清单 3-31.** Car 表*


    ![Image](img/9781430243779_unFig03-07.jpg)


    ***清单 3-32.** Engine 表*


    ![Image](img/9781430243779_unFig03-08.jpg)


    为了将这些类之间的关系视为组合，`Car` 类必须指示 Grails 将 `Engine` “嵌入”到 `Car` 中。你可以通过在 `Car` 类中定义一个公共静态属性
    `embedded`，并将该属性赋值为一个包含所有嵌入属性名称的字符串列表来实现这一点（参见清单 3-33）。


    ***清单 3-33.** 在 Car 中嵌入 Engine*


    `class Car {`

    `    String make`

    `    String model`

    `    Engine engine`

    `    static embedded = [''engine'']`

    `}`


    有了这个嵌入属性，Grails 就知道 `Car` 对象的 `Engine` 属性应该与 `Car` 对象嵌入到同一个表中。`car` 表现在看起来像清单
    3-34 所示。


    ![Image](img/square.jpg) **注意**  嵌入属性在 GORM 的 MongoDB 实现中特别有用，因为在 MongoDB 中，在文档内嵌套文档是非常常见的做法。


    ***清单 3-34.** 嵌入了 Engine 属性的 Car 表*


    ![Image](img/9781430243779_unFig03-09.jpg)


    ### 测试领域类


    自动化测试是构建复杂应用并确认系统按预期运行的重要组成部分。特别是，对于使用 Groovy 这类动态语言构建复杂系统，测试尤为重要。使用动态语言时，开发者无法像使用
    Java 或其他静态类型语言那样从编译器获得同样的反馈。


    例如，在 Java 中，如果你在方法调用中打错了字，编译器会提示你犯了错误。而当你使用 Groovy 时，由于该语言的动态特性及其运行时，编译器无法标记同样的错误。使用
    Groovy，很多事情直到运行时才能确定。你必须执行代码才能知道它是否正确。通过自动化测试执行代码是确保代码按预期工作的绝佳方式。


    Grails 为测试应用的许多方面提供了一流的支持。本节将介绍如何测试领域类。


    Grails 直接支持两种测试：单元测试和集成测试。单元测试位于项目顶层的 `test/unit/` 目录下，集成测试位于 `test/integration/`
    目录下。你必须理解单元测试和集成测试之间的区别。Grails 应用启动时会发生许多动态行为。Grails 在启动时做的事情之一就是为领域类增加许多动态方法，包括
    `validate()` 和 `save()`。当你运行集成测试时，所有这些动态行为都是可用的，因此测试可以调用领域对象上的 `validate()` 或
    `save()` 方法，即使这些方法并未出现在领域类的源代码中。


    然而，当你运行单元测试时，完整的动态环境并未启动，因此诸如 `validate()` 和 `save()` 之类的方法是不可用的。启动整个动态环境是有代价的。因此，你应该只将依赖完整
    Grails 运行时环境的测试作为集成测试来运行。


    话虽如此，Grails 提供了高级功能，允许你对领域类和其他工件中的许多动态行为进行单元测试。如果你使用 `create-domain-class` 命令创建领域类，Grails
    会自动创建一个单元测试。如果你执行 `grails create-domain-class com.gtunes.Song`，Grails 会创建 `grails-app/domain/com/gtunes/Song.groovy`
    和 `test/unit/com/gtunes/SongTests.groovy`。Grails 鼓励你做正确的事情——为你的领域类编写测试。如果你没有使用
    `create-domain-class` 命令创建领域类，你可以自行创建测试（参见清单 3-35）。请确保将测试放在适当的目录中。


    ***清单 3-35.** 自动生成的 Song 类单元测试*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `/**`

    ` * See the API for {@link grails.test.mixin.domain.DomainClassUnitTestMixin}
    for usage`

    `instructions`

    ` */`

    `@TestFor(Song)`

    `class SongTests {`


    `    void testSomething() {`

    `       fail "Implement me"`

    `    }`

    `}`

    '
- fmt: "从[Listing 3-35](#Chapter03.html#list_3_35)可以看出，默认的单元测试模板将`@TestFor`注解应用于测试类，并将`Song`类作为该注解的值。这告诉测试框架，该测试是针对`Song`类的测试。这是一个重要步骤；为了让测试框架能够装配与`Song`领域类相关的许多动态行为，这是必要的。Grails单元测试运行在一个由`ConcurrentHashMap`支持、而非真实数据库的健壮内存GORM实现上。这种内存实现支持大部分GORM\
    \ API，但基于字符串的查询除外。基于字符串的查询无法在单元测试中完成，必须通过集成测试或功能测试来覆盖。除了基于字符串的查询，大多数GORM交互都可以在单元测试中进行测试。单元测试环境的启动成本较低，因为它仅使用`ConcurrentHashMap`作为存储。集成测试依赖于真实数据库，会产生额外的运行时开销。\n\
    \n要运行测试，请在命令行中调用`test-app Grails`命令。`test-app`命令将运行项目中所有的单元测试和集成测试。如果只想运行单元测试，请运行类似`test-app\
    \ unit:`的命令。同样，`test-app integration:`将仅运行集成测试。\n\n`test-app`目标不仅会运行测试，还会生成一份报告，其中包括所有已运行测试的状态。该报告是标准的JUnit测试报告，Java开发人员对此非常熟悉。报告的HTML版本将生成在项目根目录下的`http://test/reports/html/index.html`。\n\
    \ngTunes应用程序中的`Song`类具有`title`和`duration`属性（参见[Listing 3-36](#Chapter03.html#list_3_36)）。\n\
    \n***Listing 3-36.** Song领域类*\n\n```\npackage com.gtunes\n\nclass Song {\n   \
    \ String title\n    String artist\n    Integer duration\n}\n```\n\n应用程序应将非正数的`duration`视为无效值。该属性的类型是`java.lang.Integer`，其有效值包括32位有符号`int`的全部取值范围，包括零和大量负数。应用程序应包含一个如[Listing\
    \ 3-37](#Chapter03.html#list_3_37)所示的单元测试，该测试断言系统不会接受非正数的`duration`。\n\n***Listing\
    \ 3-37.** Song单元测试*\n\n```\npackage com.gtunes\n\nimport grails.test.mixin.*\n\
    import org.junit.*\n\n/**\n * See the API for {@link grails.test.mixin.domain.DomainClassUnitTestMixin}\
    \ for usage\ninstructions\n */\n@TestFor(Song)\nclass SongTests {\n\n    void\
    \ testMinimumDuration() {\n\n        // set the Song class up for constraints\
    \ testing . . .\n        mockForConstraintsTests Song\n\n        // create a new\
    \ Song\n        def song = new Song(title: 'Some Title',\n                   \
    \         artist: 'Some Artist',\n                            duration: 0)\n \
    \       // make sure that validation fails . . .\n        assert !song.validate()\n\
    \n        // make sure that the 'min' constraint failed . . .\n        assert\
    \ 'min' == song.errors['duration']\n\n    }\n}\n```\n\n请注意[Listing 3-36](#Chapter03.html#list_3_36)中对`mockForConstraintsTests(Class)`方法的调用，它为`Song`领域类的`validate()`方法提供了一个模拟实现。执行`grails\
    \ test-app Song`将运行该测试。该测试（参见[Listing 3-38](#Chapter03.html#list_3_38)）最初应该会失败，因为它不包含任何指定`0`是`duration`属性无效值的代码。\n\
    \n***Listing 3-38.** SongTests的测试输出*\n\n```\n$ grails test-app unit:\n| Running\
    \ 1 unit test... 1 of 1\n| Failure:  testMinimumDuration(com.gtunes.SongTests)\n\
    |  Assertion failed:\n\nassert 'min' == song.errors['duration']\n            \
    \ |  |    |     |\n             |  |    |     null\n             |  |    org.codehaus.groovy.grails.plugins.testing.GrailsMockErrors:\
    \ 0 errors\n             |  com.gtunes.Song : null\n             false\n\n   \
    \ at com.gtunes.SongTests.testMinimumDuration(SongTests.groovy:23)\n| Completed\
    \ 1 unit test, 1 failed in 826ms\n| Tests FAILED  - view reports in /projects/gtunes/target/test-reports\n\
    ```\n\n从一个像这样的失败测试开始，遵循了测试驱动开发（TDD）的理念。该测试代表了所需的行为，它将“驱动”实现以满足需求。\n\n向`Song`类添加一个简单的领域约束，如[Listing\
    \ 3-39](#Chapter03.html#list_3_39)所示，应该就能满足测试要求。\n\n***Listing 3-39.** 带约束的Song领域类*\n\
    \n```\npackage com.gtunes\n\nclass Song {\n\n    String title\n    String artist\n\
    \    Integer duration\n\n    static constraints = {\n        duration min: 1\n\
    \    }\n}\n```\n\n有了这个约束，单元测试应该就能通过。领域类的编写是为了满足测试中表达的需求。具体来说，该领域类将`duration`的任何非正数值视为无效。\n\
    \n关于如何对领域类进行单元测试的更多细节将在[第4章](#Chapter04.html)中提供，届时可以在测试控制器操作的上下文中测试领域类的行为。\n\n\
    ### 总结\n\n本章介绍了Grails领域类的基础知识，涵盖了不少内容。Grails为常见问题（如验证领域类和映射到关系数据库）提供了巧妙的解决方案。GORM技术是这些能力的主要来源。GORM将在[第9章](#Chapter09.html)中进行更详细的探讨。\n\
    \n## 第4章\n\n![Image](images/3squ.jpg)\n\n## 理解控制器\n\nGrails控制器是一个负责处理进入应用程序的请求的类。控制器接收请求，可能对请求进行一些处理，最后决定下一步应该做什么。下一步可能包括以下内容：\n\
    \n> *   执行另一个控制器操作（可能但不一定在同一个控制器中）\n> *   渲染一个视图\n> *   直接将信息渲染到响应中\n\n控制器默认是原型作用域的，这意味着每个请求都会创建一个新实例，因此开发人员无需过于谨慎地维护单例控制器中的线程安全代码。可以通过在控制器中使用名为`scope`的静态属性，并将该属性赋值为`\"\
    singleton\"`或`\"session\"`来定义控制器的作用域。要更改应用程序中所有控制器的默认作用域，请在`grails-app/conf/Config.groovy`中定义一个名为`grails.controller.defaultScope`的属性，并将其赋值为`\"\
    singleton\"`或`\"session\"`。\n\n将控制器视为Grails应用程序的编排者。它们通过协调传入的请求、将请求委托给服务或领域类以处理业务逻辑，并渲染视图，为任何Grails应用程序提供主要入口点。\n\
    \n在深入探讨数据绑定和命令对象等更重要的主题之前，让我们先了解如何创建控制器的基本知识。"
  raw: 'As you can see from [Listing 3-35](#Chapter03.html#list_3_35), the default
    unit test template applies the `@TestFor` annotation to the test class and provides
    the `Song` class as the value for the annotation. This tells the testing framework
    that this test is a test for the `Song` class. This is an important step; it is
    necessary in order for the testing framework to rig up a lot of the dynamic behavior
    associated with the `Song` domain class. Grails unit tests run with a robust in-memory
    GORM implementation backed by a `ConcurrentHashMap`, not a real database. This
    in-memory implementation supports the majority of the GORM API, with the exception
    of string-based queries. Testing string-based queries cannot be done in a unit
    test and must be covered with an integration test or a functional test. Aside
    from string-based queries, most of your GORM interactions can be tested in a unit
    test. The unit testing environment has a lower startup cost since it uses only
    a `ConcurrentHashMap` for the store. Integration tests rely on a real database
    and will have additional associated runtime overhead.


    To run the test, invoke the `test-app Grails` command from the command line. The
    `test-app` command will run all the unit tests and integration tests that are
    part of the project. To run only the unit tests, run a command like “`test-app
    unit:`”. Likewise, “`test-app integration:`” will run only the integration tests.


    The `test-app` target will not only run the tests but also generate a report,
    including the status of all the tests that were run. This report is a standard
    JUnit test report, which Java developers know very well. An HTML version of the
    report will be generated under the project root at [`http://test/reports/html/index.html`](http://test/reports/html/index.html).


    The Song class in the gTunes application has `title` and `duration` properties
    (see [Listing 3-36](#Chapter03.html#list_3_36)).


    ***Listing 3-36.** The Song Domain Class*


    `package com.gtunes`


    `class Song {`

    `    String title`

    `    String artist`

    `    Integer duration`

    `}`


    The application should consider a nonpositive duration to be an invalid value.
    The type of the property is `java.lang.Integer`, whose valid values include the
    full range of values in a 32-bit signed `int`, including zero and a lot of negative
    numbers. The application should include a unit test like that shown in [Listing
    3-37](#Chapter03.html#list_3_37), which asserts that the system will not accept
    nonpositive durations.


    ***Listing 3-37.** The Song Unit Test*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `/**`

    ` * See the API for {@link grails.test.mixin.domain.DomainClassUnitTestMixin}
    for usage`

    `instructions`

    ` */`

    `@TestFor(Song)`

    `class SongTests {`


    `    void testMinimumDuration() {`


    `        // set the Song class up for constraints testing . . .`

    `        mockForConstraintsTests Song`


    `        // create a new Song`

    `        def song = new Song(title: ''Some Title'',`

    `                            artist: ''Some Artist'',`

    `                            duration: 0)`

    `        // make sure that validation fails . . .`

    `        assert !song.validate()`


    `        // make sure that the ''min'' constraint failed . . .`

    `        assert ''min'' == song.errors[''duration'']`


    `    }`

    `}`


    Notice the call to the `mockForConstraintsTests(Class)` method in [Listing 3-36](#Chapter03.html#list_3_36),
    which provides a mock implementation of the `validate()` method on the `Song`
    domain class. Executing `grails test-app Song` will run the test. The test (see
    [Listing 3-38](#Chapter03.html#list_3_38)) should fail initially because it contains
    no code specifying that `0` is an invalid value for the duration property.


    ***Listing 3-38.** Test Output for SongTests*


    `$ grails test-app unit:`

    `| Running 1 unit test... 1 of 1`

    `| Failure:  testMinimumDuration(com.gtunes.SongTests)`

    `|  Assertion failed:`


    `assert ''min'' == song.errors[''duration'']`

    `             |  |    |     |`

    `             |  |    |     null`

    `             |  |    org.codehaus.groovy.grails.plugins.testing.GrailsMockErrors:
    0 errors`

    `             |  com.gtunes.Song : null`

    `             false`


    `    at com.gtunes.SongTests.testMinimumDuration(SongTests.groovy:23)`

    `| Completed 1 unit test, 1 failed in 826ms`

    `| Tests FAILED  - view reports in /projects/gtunes/target/test-reports`


    Starting with a failing test like this subscribes to the ideas of test-driven
    development (TDD). The test represents required behavior, and it will “drive”
    the implementation to satisfy the requirement.


    Adding a simple domain constraint to the `Song` class, as shown in [Listing 3-39](#Chapter03.html#list_3_39),
    should satisfy the test.


    ***Listing 3-39.** The Song Domain Class with a Constraint*


    `package com.gtunes`


    `class Song {`


    `    String title`

    `    String artist`

    `    Integer duration`


    `    static constraints = {`

    `        duration min: 1`

    `    }`

    `}`


    With that constraint in place, the unit test should pass. The domain class is
    written to satisfy the requirements expressed in the test. Specifically, the domain
    class considers any nonpositive value for `duration` to be invalid.


    More details on how to unit-test domain classes will be provided in [Chapter 4](#Chapter04.html),
    where domain class behavior can be tested within the context of testing controller
    actions.


    ### Summary


    This chapter, which introduced the fundamentals of Grails domain classes, covered
    quite a bit of ground. Grails provides slick solutions to common problems like
    validating domain classes and mapping to a relational database. The GORM technology
    is responsible for much of that capability. GORM will be explored in more detail
    in [Chapter 9](#Chapter09.html).


    ## CHAPTER 4


    ![Image](images/3squ.jpg)


    ## Understanding Controllers


    A Grails controller is a class that is responsible for handling requests coming
    in to the application. The controller receives a request, potentially does some
    work with the request, and finally decides what should happen next. What happens
    next might include the following:


    > *   executing another controller action (possibly but not necessarily in the
    same controller)

    > *   rendering a view

    > *   rendering information directly to the response


    A controller is prototyped by default, meaning that a new instance is created
    for each request, so developers don’t need to be as cautious about maintaining
    thread-safe code in a singleton controller. The controller’s scope may be defined
    by using a static property in the controller named `scope` and assigning that
    property a value of “singleton” or “session”. To change the default scope for
    all controllers in an application, define a property in `grails-app/conf/Config.groovy`
    named `grails.controller.defaultScope` and assign it a value of “singleton” or
    “session”.


    Think of controllers as the orchestrators of a Grails application. They provide
    the main entry point for any Grails application by coordinating incoming requests,
    delegating them to services or domain classes for business logic, and rendering
    views.


    Let’s look at the basics of how to create a controller before moving on to such
    meatier subjects as data binding and command objects.'
