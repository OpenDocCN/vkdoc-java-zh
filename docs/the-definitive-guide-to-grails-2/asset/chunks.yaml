    as a value for a JavaScript variable, as [Listing 5-19](#Chapter05.html#list_5_19)
    shows.


    ***Listing 5-19.** Examples of createLink*


    `<a href="${createLink(action:''list'')}">List Albums</a>`

    `<script type="text/javascript">`

    `    var listAlbumsLink = "${createLink(action:''list'')}";`

    `</script>`


    Another tag, similar in both name and usage to `<g:createLink>`, is the `<g:resource>`
