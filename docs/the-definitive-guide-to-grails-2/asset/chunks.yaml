    ## CHAPTER 5


    ![Image](images/3squ.jpg)


    ## Understanding Views


    The topic of view technologies for web applications in the open source world appears
    to be rather popular, at least if the seemingly endless number of them available
    for Java is any indication. There always seems to be a newer, better one to learn
    if you grow tired of the incumbent JSP. JSP, however, remains the most popular
    view technology produced by Sun to compete with Microsoft’s Active Server Pages
    (ASP), JSP has become the industry standard, and there is a high level of developer
    knowledge surrounding JSP.


    JSP allows developers to mix a traditional markup language such as HTML with bits
    of Java code (called *scriptlets*) to produce dynamic output. On the downside,
    this facility is extremely open to abuse; therefore, there are custom tag libraries
    that add the ability to abstract logic from a JSP page via tags. JSP has been
    augmented with two missing ingredients, the JSP Standard Tag Library (JSTL) and
    an expression language (EL), to bring it up to speed with some of its open source
    competitors.


    Given JSP’s maturity, robustness, and familiarity within the industry, why on
    earth, then, would anyone need yet another view technology for Grails with Groovy
    Server Pages (GSP)? The answer lies with the Groovy runtime environment.


    > *   To fully take advantage of Grails, the view technology requires knowledge
    of Groovy’s runtime environment and associated dynamic method dispatching.

    > *   Groovy provides a far more powerful expression language, including GPath
    expressions, Groovy bean notation, and overrideable operators.

    > *   Other Groovy features—such as regular expression support, `GString`s, and
    an expressive syntax for maps and lists—make it perfect for a view technology.


    Of course, for any new view technology, it is important not to fall into the same
    traps that JSP fell into in its early iterations. Mixing scriptlets and markup
    code is recognized as a bad thing, and to this end, GSP provides a mechanism for
    creating custom tags, just as JSP does, but without sacrificing any agility.


    ### The Basics


    Having been exposed to GSP at various points throughout the book, you may already
    be verging on the expert level. Still, discussing GSP’s basics could prove invaluable
    to helping you fully grasp all the concepts within it.


    It is important to note that GSP is actually remarkably similar to JSP, and you
    will know from experience that, with JSP, a number of objects are simply *available*
    by default. These include the `request`, `response`, and `session` objects—the
    same ones you saw in [Chapter 4](#Chapter04.html). If you recall, that particular
    discussion mentioned that a few additional objects, including `flash`, are available
    to controllers. You’ll be pleased to know these can also be accessed from GSP
    views, as can an additional `out` attribute, which is a `java.io.Writer` instance
    representing the response output. [Table 5-1](#Chapter05.html#tab_5_1) describes
    the GSP attributes available.


    ![Image](images/9781430243779_Tab05-01.jpg)


    You already know how to get to these from controllers, but what about in views?
    Unsurprisingly, GSP supports the same constructs available in JSP, as well as
    a few additional ones. The next few examples may start to look a little like a
    JSP 101 tutorial, but don’t be confused—you’re definitely dealing with Groovy,
    not Java.


    #### Understanding the Model


    One of the fundamental activities in any MVC pattern, such as that which Grails
    employs, is to pass information (the model) to the view for rendering. In [Chapter
    4](#Chapter04.html) you saw this in action, but just to recap, [Listing 5-1](#Chapter05.html#list_5_1)
    shows an example of how you can achieve this in Grails.


    ***Listing 5-1.** Creating the Model*


    `package package com.gtunes`

    `class StoreController {`


    `    def shop() {`

    `        def genreList =`

    `            new DetachedCriteria(Album).distinct(''genre'').list()`

    `        [genres:genreList.sort()]`

    `    }`

    `}`


    In [Listing 5-1](#Chapter05.html#list_5_1) (the `shop` action of the `StoreController`),
    the result is a map with one element, the key for which is a string with the value
    `genres`. This key (and its value) is then placed in a GSP model (or *binding*,
    for those more familiar with Groovy lingo), which makes it accessible as a variable,
    in the same way as the page attributes in [Table 5-1](#Chapter05.html#tab_5_1)
    were.


    In the following sections, you will see examples of a `genres` variable being
    referenced. Just remember that this variable didn’t appear by magic. As in the
    listing, it is passed to the view in code via the controller.'
