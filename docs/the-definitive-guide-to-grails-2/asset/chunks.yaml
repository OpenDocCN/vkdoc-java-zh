    `4 lastFilter + {`

    `5     filter {`

    `6          ''filter-name''(''urlMapping'')`

    `7          ''filter-class''(UrlMappingsFilter.getName())`

    `8     }`

    `9 }`


    请注意，在 Groovy 中，你可以使用字符串作为方法名；例如，你可以选择一个惯用的 XML 元素名称（如 `<filter-name>`）作为方法名。上述代码会将以下等效的
