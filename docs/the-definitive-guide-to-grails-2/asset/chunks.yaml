    \ by calling the `attach()` method, for example:\n\n```\nalbum.attach()\n```\n\
    \nNote that if an object already exists in the `Session` with the same identifier,\
    \ then you’ll get an `org.hibernate.NonUniqueObjectException`. To get around this,\
