    #### Providing Spring Beans


    The `doWithSpring` hook allows you to specify new Spring beans


    to configure at runtime using the Grails `BeanBuilder` domain-specific language
    (DSL) for Spring. Grails is built completely on the Spring Framework. Grails has
    what is known as an `ApplicationContext`, which is essentially a container provided
    by Spring that holds one or more beans. By default, each bean is a singleton,
    meaning there is only one of them in the `ApplicationContext`.


    As you learned in [Chapter 10](#Chapter10.html#ch10), Grails allows services to
    be autowired into controllers and tag libraries. This autowire feature is powered
    by the Spring container and is often referred to as *dependency injection*. An
    extremely powerful pattern, it allows you to effectively separate out dependencies
    and the construction of those dependencies. That’s the theory. . . now let’s take
    a look at an example.


    Earlier, you created a new service in the `simple-cache` plug-in called `CacheService`.
    The `CacheService` is going to work in conjunction with a cache provider to provide
    application-layer caching to any user of the `simple-cache` plug-in. Since it
    is a little pointless to reinvent the wheel and implement your own homegrown caching
    implementation, you’re going to take advantage of the Ehcache library.


    Plug-ins may register beans with the Spring application context by using `doWithSpring`.
    [Listing 12-17](#Chapter12.html#list_12_17) shows how to define a `globalCache`
    bean.


    ***Listing 12-17.** Defining Beans in doWithSpring*


    `class SimpleCacheGrailsPlugin {`

    `    ...`

    `    def doWithSpring = {`

    `        globalCache(org.springframework.cache.ehcache.EhCacheFactoryBean) {`

    `            timeToLive = 300`

    `        }`

    `    }`

    `}`


    The name of the bean is the name of the method, which in this case is `globalCache`.
    The bean class is the first argument, while the closure passed as the last argument
    allows you to set property values on the bean. In this case, a `globalCache` bean
    is configured to expire entries every 5 minutes (300 seconds).


    With that done, let’s begin implementing the `CacheService`. First you need to
    get a reference to the `globalCache` bean defined by the plug-in. To do this,
    simply add a property that matches the name of the bean to the `CacheService`,
    as shown in [Listing 12-18](#Chapter12.html#list_12_18).


    ***Listing 12-18.** Obtaining Beans Supplied by doWithSpring*


    `import net.sf.ehcache.Ehcache`

    `class CacheService {`

    `    static transactional = false`

    `    Ehcache globalCache`

    `    ...`

    `}`


    The `globalCache` property is in bold in [Listing 12-18](#Chapter12.html#list_12_18).
    Note that transactions have been disabled for the service by setting `static transactional
    = false`, since transactions won’t be a requirement for this service.


    Now let’s implement the caching logic. When implementing caching, the pattern
    is typically that you look up an object from the cache, and if it doesn’t exist,
    you execute some logic that obtains the data to be cached. [Listing 12-19](#Chapter12.html#list_12_19)
    shows some pseudocode for this pattern.


    ***Listing 12-19.** The Caching Pattern*


    `def obj = cache.get("myentry")`

    `if(!obj)   {`

