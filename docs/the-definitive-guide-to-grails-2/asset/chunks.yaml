- fmt: "### Using the Resources Plug-in\n\nThe resources plug-in provides a lot of\
    \ functionality related to managing static resources in your application. This\
    \ includes things like deferring the inclusion of Javascript files until the end\
    \ of the document to optimize page load times, preventing resources from being\
    \ included in the same page multiple times unnecessarily, correcting load order\
    \ of resources, and others. The plug-in is quite flexible and quite powerful.\
    \ Here we will take a look at some of the basic functionality provided by the\
    \ plug-in. Let’s start by writing a couple of simple Javascript functions in separate\
    \ files.\n\n**Listing 12-47.** `web-app/js/hello.js`\n\n```javascript\nfunction\
    \ sayHello() {\n    alert('Hello!');\n}\n```\n\n**Listing 12-48.** `web-app/js/goodbye.js`\n\
    \n```javascript\nfunction sayGoodbye() {\n    alert('Goodbye!');\n}\n```\n\nNow\
    \ let’s write a simple GSP page, one that will make use of those Javascript functions.\n\
    \n**Listing 12-49.** `grails-app/views/index.gsp`\n\n```html\n<!doctype html>\n\
    <html>\n       <head>\n              <title>Resources Plugin Demo</title>\n  \
    \      <g:javascript library=\"jquery\"/>\n        <g:javascript src=\"hello.js\"\
    />\n        <g:javascript src=\"goodbye.js\"/>\n        <r:layoutResources/>\n\
    \       </head>\n       <body>\n            <r:script>\n            $('#helloLink').click(function()\
    \ {\n                sayHello();\n                return false;\n            });\n\
    \            $('#goodbyeLink').click(function() {\n                sayGoodbye();\n\
    \                return false;\n            });\n            </r:script>\n   \
    \         <p><a id=\"helloLink\" href=\"hello\">Say Hello</a></p>\n          \
    \  <p><a id=\"goodbyeLink\" href=\"goodbye\">Say Goodbye</a></p>\n           \
    \ <r:layoutResources/>\n       </body>\n</html>\n```\n\nWhen that GSP is rendered,\
    \ the result will look something like [Listing 12-50](#Chapter12.html#list_12_50).\n\
    \n**Listing 12-50.** A Simple Rendered Page\n\n```html\n<!doctype html>\n<html>\n\
    \  <head>\n    <title>Welcome to Grails</title>    \n    <script src=\"/resourcesdemo/js/hello.js\"\
    \ntype=\"text/javascript\"></script>\n    <script src=\"/resourcesdemo/js/goodbye.js\"\
    \ type=\"text/javascript\"></script>\n    <script src=\"/resourcesdemo/static/plugins/jquery-1.7.1/js/jquery/jquery-1.7.1.min.js\"\
    \ type=\"text/javascript\" ></script>\n  </head>\n  <body>\n    <p><a id=\"helloLink\"\
    \ href=\"hello\">Say Hello</a></p>\n    <p><a id=\"goodbyeLink\" href=\"goodbye\"\
    >Say Goodbye</a></p>\n    <script type=\"text/javascript\">\n      $('#helloLink').click(function()\
    \ {\n        sayHello();\n        return false;\n      });\n      $('#goodbyeLink').click(function()\
    \ {\n        sayGoodbye();\n        return false;\n      });\n    </script>\n\
    \  </body>\n</html>\n```\n\nMost of the rendered page is very straightforward\
    \ and maps closely to what is written in the GSP—and probably maps pretty closely\
    \ to what you expected. One interesting thing to note is that the Javascript that\
    \ is embedded into the page, the code that is attaching functions to the “`hello`”\
    \ and “`goodbye`” anchor tags, is rendered at the very bottom of the body, even\
    \ though the code in the GSP is written at the top of the body. This is our first\
    \ look at one of the benefits offered by the resources plug-in. Best practice\
    \ is to put all Javascript at the bottom of the page to improve page load times.\
    \ The resources plug-in is making that happen. The plug-in is rendering the Javascript\
    \ at the very bottom of the page. The `layoutResources` tag, which is invoked\
    \ at the bottom of the body in the GSP, is what actually does that. Let’s move\
    \ on.\n\nOne of the features that the resources plug-in provides is the ability\
    \ to define “modules,” or groups of static resources, that should be loaded together.\
    \ It may be that you want `goodbye.js` and `hello.js` to be kept separate from\
    \ a coding perspective to make them easier to maintain but you want them always\
    \ to be loaded together into a page. If that is the case, it may make sense to\
    \ define those two `.js` files as part of a module. Then pages that want to make\
    \ use of the contents of the module don’t have to make references to each of the\
    \ static resources that are contained in the module; instead, they can simply\
    \ express a dependency on the module.\n\nNow let’s edit `grails-app/conf/ApplicationResources.groovy`.\
    \ In the file we’ll define a new module, “messages,” and include both of your\
    \ `.js` files in the module. The syntax for this task is shown in [Listing 12-51](#Chapter12.html#list_12_51).\n\
    \n**Listing 12-51.** Defining the messages Module\n\n```groovy\nmodules = {\n\
    \    application {\n        resource url:'js/application.js'\n    }\n\n    //\
    \ This defines a new module named \"messages\" and the\n    // contents includes\
    \ 2 js files\n    messages {\n        resource url: 'js/hello.js'\n        resource\
    \ url: 'js/goodbye.js'\n    }\n}\n```\n\nNow remove references to the `.js` files\
    \ from the GSP and replace it with `<r:require module=\"messages\"/>` to express\
    \ that this page should include all of the `.js` files that are part of the messages\
    \ module. See [Listing 12-52](#Chapter12.html#list_12_52).\n\n**Listing 12-52.**\
    \ Including a Module\n\n```html\n...\n\n<head>\n    <title>Welcome to Grails</title>\n\
    \    <g:javascript library=\"jquery\"/>\n    <r:require module=\"messages\"/>\n\
    \    <r:layoutResources/>\n</head>\n\n...\n```\n\nNow the rendered page will look\
    \ something like [Listing 12-53](#Chapter12.html#list_12_53).\n\n**Listing 12-53.**\
    \ The Rendered Page\n\n```html\n<!doctype html>\n<html>\n  <head>\n    <title>Welcome\
    \ to Grails</title>\n    <script src=\"/resourcesdemo/static/plugins/jquery-1.7.1/js/jquery/jquery-1.7.1.min.js\"\
    \ntype=\"text/javascript\" ></script>\n  </head>\n  <body>\n    <p><a id=\"helloLink\"\
    \ href=\"hello\">Say Hello</a></p>\n    <p><a id=\"goodbyeLink\" href=\"goodbye\"\
    >Say Goodbye</a></p>\n    <script src=\"/resourcesdemo/static/bundle-bundle_messages_defer.js\"\
    \ type=\"text/javascript\"\n></script>\n    <script type=\"text/javascript\">\n\
    \      $('#helloLink').click(function() {\n        sayHello();\n        return\
    \ false;\n      });\n      $('#goodbyeLink').click(function() {\n        sayGoodbye();\n\
    \        return false;\n      });\n    </script>\n  </body>\n</html>\n```\n\n\
    Notice there are no longer references to `hello.js` and `goodbye.js` in the page;\
    \ instead, there is a reference to `bundle-bundle_messages_defer.js`. If you point\
    \ your browser at that URL, you will see that the file contains the union of the\
    \ contents from your `hello.js` and `goodbye.js` files. Pretty slick stuff, indeed.\
    \ Let’s take this a little further.\n\nEdit `BuildConfig.groovy` and add a dependency\
    \ on the `yui-minify-resources` plug-in, as shown in [Listing 12-54](#Chapter12.html#list_12_54).\n\
    \n**Listing 12-54.** Depend on the `yui-minify-resources` Plug-in\n\n```groovy\n\
    grails.project.dependency.resolution = {\n\n    ...\n\n    plugins {\n       \
    \ runtime \":hibernate:$grailsVersion\"\n        runtime \":jquery:1.7.1\"\n \
    \       runtime \":resources:1.1.6\"\n        runtime \":yui-minify-resources:0.1.5\"\
    \n\n        ...\n    }\n}\n```\n\nIncluding the `yui-minify-resources` plug-in\
    \ will allow the resources plug-in to minify all of the Javascript in the messages\
    \ module. The rendered HTML will now include a reference to a file named `bundle-bundle_messages_defer.min.js`\
    \ (note that “`min`” is part of the file name), and that file will include a minified\
    \ version of all of the relevant Javascript.\n\nThe resources plug-in is capable\
    \ of a lot more than what has been introduced here, but even the little bit of\
    \ functionality you’ve seen is quite valuable. The plug-in document at [`http://grails.org/plug-in/resources`](http://grails.org/plug-in/resources)\
    \ has much more detail on the plug-in’s capabilities."
  raw: '### Using the Resources Plug-in


    The resources plug-in provides a lot of functionality related to managing static
    resources in your application. This includes things like deferring the inclusion
    of Javascript files until the end of the document to optimize page load times,
    preventing resources from being included in the same page multiple times unnecessarily,
    correcting load order of resources, and others. The plug-in is quite flexible
    and quite powerful. Here we will take a look at some of the basic functionality
    provided by the plug-in. Let’s start by writing a couple of simple Javascript
    functions in separate files.


    ***Listing 12-47.** web-app/js/hello.js*


    `function sayHello() {`

    `    alert(''Hello!'');`

    `}`


    ***Listing 12-48**. web-app/js/goodbye.js*


    `function sayGoodbye() {`

    `    alert(''Goodbye!'');`

    `}`


    Now let’s write a simple GSP page, one that will make use of those Javascript
    functions.


    ***Listing 12-49.** grails-app/views/index.gsp*


    `<!doctype html>`

    `<html>`

    `       <head>`

    `              <title>Resources Plugin Demo</title>`

    `        <g:javascript library="jquery"/>`

    `        <g:javascript src="hello.js"/>`

    `        <g:javascript src="goodbye.js"/>`

    `        <r:layoutResources/>`

    `       </head>`

    `       <body>`

    `            <r:script>`

    `            $(''#helloLink'').click(function() {`

    `                sayHello();`

    `                return false;`

    `            });`

    `            $(''#goodbyeLink'').click(function() {`

    `                sayGoodbye();`

    `                return false;`

    `            });`

    `            </r:script>`

    `            <p><a id="helloLink" href="hello">Say Hello</a></p>`

    `            <p><a id="goodbyeLink" href="goodbye">Say Goodbye</a></p>`

    `            <r:layoutResources/>`

    `       </body>`

    `</html>`


    When that GSP is rendered, the result will look something like [Listing 12-50](#Chapter12.html#list_12_50).


    ***Listing 12-50.** A Simple Rendered Page*


    `<!doctype html>`

    `<html>`

    `  <head>`

    `    <title>Welcome to Grails</title>    `

    `    <script src="/resourcesdemo/js/hello.js"`

    `type="text/javascript"></script>`

    `    <script src="/resourcesdemo/js/goodbye.js" type="text/javascript"></script>`

    `    <script src="/resourcesdemo/static/plugins/jquery-1.7.1/js/jquery/jquery-1.7.1.min.js"
    type="text/javascript" ></script>`

    `  </head>`

    `  <body>`

    `    <p><a id="helloLink" href="hello">Say Hello</a></p>`

    `    <p><a id="goodbyeLink" href="goodbye">Say Goodbye</a></p>`

    `    <script type="text/javascript">`

    `      $(''#helloLink'').click(function() {`

    `        sayHello();`

    `        return false;`

    `      });`

    `      $(''#goodbyeLink'').click(function() {`

    `        sayGoodbye();`

    `        return false;`

    `      });`

    `    </script>`

    `  </body>`

    `</html>`


    Most of the rendered page is very straightforward and maps closely to what is
    written in the GSP—and probably maps pretty closely to what you expected. One
    interesting thing to note is that the Javascript that is embedded into the page,
    the code that is attaching functions to the “`hello`” and “`goodbye`” anchor tags,
    is rendered at the very bottom of the body, even though the code in the GSP is
    written at the top of the body. This is our first look at one of the benefits
    offered by the resources plug-in. Best practice is to put all Javascript at the
    bottom of the page to improve page load times. The resources plug-in is making
    that happen. The plug-in is rendering the Javascript at the very bottom of the
    page. The `layoutResources` tag, which is invoked at the bottom of the body in
    the GSP, is what actually does that. Let’s move on.


    One of the features that the resources plug-in provides is the ability to define
    “modules,” or groups of static resources, that should be loaded together. It may
    be that you want `goodbye.js` and `hello.js` to be kept separate from a coding
    perspective to make them easier to maintain but you want them always to be loaded
    together into a page. If that is the case, it may make sense to define those two
    `.js` files as part of a module. Then pages that want to make use of the contents
    of the module don’t have to make references to each of the static resources that
    are contained in the module; instead, they can simply express a dependency on
    the module.


    Now let’s edit `grails-app/conf/ApplicationResources.groovy`. In the file we’ll
    define a new module, “messages,” and include both of your `.js` files in the module.
    The syntax for this task is shown in [Listing 12-51](#Chapter12.html#list_12_51).


    ***Listing 12-51.** Defining the messages Module*


    `modules = {`

    `    application {`

    `        resource url:''js/application.js''`

    `    }`


    `    // This defines a new module named "messages" and the`

    `    // contents includes 2 js files`

    `    messages {`

    `        resource url: ''js/hello.js''`

    `        resource url: ''js/goodbye.js''`

    `    }`

    `}`


    Now remove references to the `.js` files from the GSP and replace it with `<r:require
    module="messages"/>` to express that this page should include all of the `.js`
    files that are part of the messages module. See [Listing 12-52](#Chapter12.html#list_12_52).


    ***Listing 12-52.** Including a Module*


    `...`


    `<head>`

    `    <title>Welcome to Grails</title>`

    `    <g:javascript library="jquery"/>`

    `    <r:require module="messages"/>`

    `    <r:layoutResources/>`

    `</head>`


    `...`


    Now the rendered page will look something like [Listing 12-53](#Chapter12.html#list_12_53).


    ***Listing 12-53.** The Rendered Page*


    `<!doctype html>`

    `<html>`

    `  <head>`

    `    <title>Welcome to Grails</title>`

    `    <script src="/resourcesdemo/static/plugins/jquery-1.7.1/js/jquery/jquery-1.7.1.min.js"`

    `type="text/javascript" ></script>`

    `  </head>`

    `  <body>`

    `    <p><a id="helloLink" href="hello">Say Hello</a></p>`

    `    <p><a id="goodbyeLink" href="goodbye">Say Goodbye</a></p>`

    `    <script src="/resourcesdemo/static/bundle-bundle_messages_defer.js" type="text/javascript"`

    `></script>`

    `    <script type="text/javascript">`

    `      $(''#helloLink'').click(function() {`

    `        sayHello();`

    `        return false;`

    `      });`

    `      $(''#goodbyeLink'').click(function() {`

    `        sayGoodbye();`

    `        return false;`

    `      });`

    `    </script>`

    `  </body>`

    `</html>`


    Notice there are no longer references to `hello.js` and `goodbye.js` in the page;
    instead, there is a reference to `bundle-bundle_messages_defer.js`. If you point
    your browser at that URL, you will see that the file contains the union of the
    contents from your `hello.js` and `goodbye.js` files. Pretty slick stuff, indeed.
    Let’s take this a little further.


    Edit `BuildConfig.groovy` and add a dependency on the `yui-minify-resources` plug-in,
    as shown in [Listing 12-54](#Chapter12.html#list_12_54).


    ***Listing 12-54.** Depend on the yui-minify-resources Plug-in*


    `grails.project.dependency.resolution = {`


    `    ...`


    `    plugins {`

    `        runtime ":hibernate:$grailsVersion"`

    `        runtime ":jquery:1.7.1"`

    `        runtime ":resources:1.1.6"`

    `        runtime ":yui-minify-resources:0.1.5"`


    `        ...`

    `    }`

    `}`


    Including the `yui-minify-resources` plug-in will allow the resources plug-in
    to minify all of the Javascript in the messages module. The rendered HTML will
    now include a reference to a file named bundle`-bundle_messages_defer.min.js`
    (note that “`min`” is part of the file name), and that file will include a minified
    version of all of the relevant Javascript.


    The resources plug-in is capable of a lot more than what has been introduced here,
    but even the little bit of functionality you’ve seen is quite valuable. The plug-in
    document at [`http://grails.org/plug-in/resources`](http://grails.org/plug-in/resources)
    has much more detail on the plug-in’s capabilities.'
  trans: '

    ### 使用资源插件


    资源插件提供了许多与管理应用程序中静态资源相关的功能。这包括将 JavaScript 文件的包含推迟到文档末尾以优化页面加载时间、防止资源在同一页面中被多次不必要地包含、纠正资源的加载顺序等等。该插件非常灵活且功能强大。这里我们将了解该插件提供的一些基本功能。让我们从在单独的文件中编写几个简单的
    JavaScript 函数开始。


    ***清单 12-47.** web-app/js/hello.js*


    `function sayHello() {`

    `    alert(''Hello!'');`

    `}`


    ***清单 12-48**. web-app/js/goodbye.js*


    `function sayGoodbye() {`

    `    alert(''Goodbye!'');`

    `}`


    现在让我们编写一个简单的 GSP 页面，该页面将使用这些 JavaScript 函数。


    ***清单 12-49.** grails-app/views/index.gsp*


    `<!doctype html>`

    `<html>`

    `       <head>`

    `              <title>资源插件演示</title>`

    `        <g:javascript library="jquery"/>`

    `        <g:javascript src="hello.js"/>`

    `        <g:javascript src="goodbye.js"/>`

    `        <r:layoutResources/>`

    `       </head>`

    `       <body>`

    `            <r:script>`

    `            $(''#helloLink'').click(function() {`

    `                sayHello();`

    `                return false;`

    `            });`

    `            $(''#goodbyeLink'').click(function() {`

    `                sayGoodbye();`

    `                return false;`

    `            });`

    `            </r:script>`

    `            <p><a id="helloLink" href="hello">打招呼</a></p>`

    `            <p><a id="goodbyeLink" href="goodbye">说再见</a></p>`

    `            <r:layoutResources/>`

    `       </body>`

    `</html>`


    当该 GSP 被渲染时，结果将类似于清单 12-50。


    ***清单 12-50.** 一个简单的渲染页面*


    `<!doctype html>`

    `<html>`

    `  <head>`

    `    <title>欢迎使用 Grails</title>    `

    `    <script src="/resourcesdemo/js/hello.js"`

    `type="text/javascript"></script>`

    `    <script src="/resourcesdemo/js/goodbye.js" type="text/javascript"></script>`

    `    <script src="/resourcesdemo/static/plugins/jquery-1.7.1/js/jquery/jquery-1.7.1.min.js"
    type="text/javascript" ></script>`

    `  </head>`

    `  <body>`

    `    <p><a id="helloLink" href="hello">打招呼</a></p>`

    `    <p><a id="goodbyeLink" href="goodbye">说再见</a></p>`

    `    <script type="text/javascript">`

    `      $(''#helloLink'').click(function() {`

    `        sayHello();`

    `        return false;`

    `      });`

    `      $(''#goodbyeLink'').click(function() {`

    `        sayGoodbye();`

    `        return false;`

    `      });`

    `    </script>`

    `  </body>`

    `</html>`


    渲染页面的大部分内容非常直接，与 GSP 中编写的内容紧密对应——并且很可能与你预期的内容非常接近。一个值得注意的有趣之处是，嵌入到页面中的 JavaScript，即那些将函数附加到“`hello`”和“`goodbye`”锚点标签的代码，被渲染在
    body 的最底部，尽管 GSP 中的代码写在 body 的顶部。这是我们首次看到资源插件提供的好处之一。最佳实践是将所有 JavaScript 放在页面底部以改善页面加载时间。资源插件实现了这一点。该插件将
    JavaScript 渲染在页面的最底部。在 GSP 的 body 底部调用的 `layoutResources` 标签正是实现这一点的关键。我们继续往下看。


    资源插件提供的功能之一是能够定义“模块”，即应一起加载的静态资源组。从编码角度来看，你可能希望将 `goodbye.js` 和 `hello.js` 分开以方便维护，但又希望它们总是被一起加载到页面中。如果是这种情况，那么将这两个
    `.js` 文件定义为一个模块的一部分可能是有意义的。这样，想要使用模块内容的页面就不必引用模块中包含的每个静态资源；相反，它们只需声明对该模块的依赖即可。


    现在让我们编辑 `grails-app/conf/ApplicationResources.groovy`。在该文件中，我们将定义一个名为“messages”的新模块，并将你的两个
    `.js` 文件都包含在该模块中。此任务的语法如清单 12-51 所示。


    ***清单 12-51.** 定义 messages 模块*


    `modules = {`

    `    application {`

    `        resource url:''js/application.js''`

    `    }`


    `    // 这定义了一个名为 "messages" 的新模块，并且`

    `    // 内容包含 2 个 js 文件`

    `    messages {`

    `        resource url: ''js/hello.js''`

    `        resource url: ''js/goodbye.js''`

    `    }`

    `}`


    现在从 GSP 中移除对 `.js` 文件的引用，并将其替换为 `<r:require module="messages"/>`，以表明此页面应包含 messages
    模块中的所有 `.js` 文件。参见清单 12-52。


    ***清单 12-52.** 包含一个模块*


    `...`


    `<head>`

    `    <title>欢迎使用 Grails</title>`

    `    <g:javascript library="jquery"/>`

    `    <r:require module="messages"/>`

    `    <r:layoutResources/>`

    `</head>`


    `...`


    现在渲染的页面将类似于清单 12-53。


    ***清单 12-53.** 渲染后的页面*


    `<!doctype html>`

    `<html>`

    `  <head>`

    `    <title>欢迎使用 Grails</title>`

    `    <script src="/resourcesdemo/static/plugins/jquery-1.7.1/js/jquery/jquery-1.7.1.min.js"`

    `type="text/javascript" ></script>`

    `  </head>`

    `  <body>`

    `    <p><a id="helloLink" href="hello">打招呼</a></p>`

    `    <p><a id="goodbyeLink" href="goodbye">说再见</a></p>`

    `    <script src="/resourcesdemo/static/bundle-bundle_messages_defer.js" type="text/javascript"`

    `></script>`

    `    <script type="text/javascript">`

    `      $(''#helloLink'').click(function() {`

    `        sayHello();`

    `        return false;`

    `      });`

    `      $(''#goodbyeLink'').click(function() {`

    `        sayGoodbye();`

    `        return false;`

    `      });`

    `    </script>`

    `  </body>`

    `</html>`


    请注意，页面中不再有对 `hello.js` 和 `goodbye.js` 的引用；取而代之的是对 `bundle-bundle_messages_defer.js`
    的引用。如果你在浏览器中访问该 URL，你会看到该文件包含了你的 `hello.js` 和 `goodbye.js` 文件内容的合并。确实相当巧妙。让我们再进一步。


    编辑 `BuildConfig.groovy` 并添加对 `yui-minify-resources` 插件的依赖，如清单 12-54 所示。


    ***清单 12-54.** 依赖 yui-minify-resources 插件*


    `grails.project.dependency.resolution = {`


    `    ...`


    `    plugins {`

    `        runtime ":hibernate:$grailsVersion"`

    `        runtime ":jquery:1.7.1"`

    `        runtime ":resources:1.1.6"`

    `        runtime ":yui-minify-resources:0.1.5"`


    `        ...`

    `    }`

    `}`


    包含 `yui-minify-resources` 插件将允许资源插件压缩 messages 模块中的所有 JavaScript。渲染后的 HTML 现在将包含对名为
    `bundle-bundle_messages_defer.min.js` 的文件的引用（注意文件名中包含“`min`”），并且该文件将包含所有相关 JavaScript
    的压缩版本。


    资源插件的功能远不止于此，但即使是你已经看到的这一点点功能也非常有价值。位于 [`http://grails.org/plug-in/resources`](http://grails.org/plug-in/resources)
    的插件文档提供了关于该插件功能的更多详细信息。

    '
- fmt: "### Using the Database Migration Plug-in\n\nSo far we haven’t dealt much with\
    \ defining database tables and columns or any kind of DDL. GORM does a great job\
    \ of helping manage a lot of that. As you have seen, you can define your domain\
    \ classes, and then let GORM take it from there. If you want to customize the\
    \ schema that is being generated or if you are mapping your application to an\
    \ existing schema, you can tweak some of the ORM details, like table names and\
    \ column names, by writing code in the `mapping` block of your domain classes.\
    \ This is all very flexible and very powerful but doesn’t take care of everything.\
    \ For example, it may be that a particular version of your application introduces\
    \ new domain classes or new properties to existing domain classes; when that happens,\
    \ you need some way to migrate your schema from one version of your domain model\
    \ to the next. This is where the database migration plug-in comes into play. The\
    \ database migration plug-in helps manage the evolution of your database schema\
    \ from one version of your domain model to the next.\n\nHere’s an example scenario.\
    \ Consider that you have a trivial application which contains a `Person` domain\
    \ class, such as that defined in [Listing 12-55](#Chapter12.html#list_12_55).\n\
    \n**Listing 12-55.** The Person Class\n\n```\npackage migrationdemo\n\nclass Person\
    \ {\n    String firstName\n    String lastName\n\n    static constraints = {\n\
    \        firstName blank: false, size: 1..35\n        lastName blank: false, size:\
    \ 1..35\n    }\n}\n```\n\nYour application is fully developed, and you are ready\
    \ to ship to production. This is a good time to create a snapshot of what your\
    \ schema looks like. This snapshot will be a base point that may come into play\
    \ later if your domain model changes. When the model does change, you will want\
    \ to create a diff between this initial snapshot and the schema that is necessary\
    \ to support the future model after changes have been made. A way to create this\
    \ initial snapshot is with the `dbm-generate-gorm-changelog` command provided\
    \ by the database migration plug-in. In order to use that, the plug-in must first\
    \ be installed, as shown in [Listing 12-56](#Chapter12.html#list_12_56).\n\n**Listing\
    \ 12-56.** Installing the database-migration Plug-in\n\n```\n// grails-app/conf/BuildConfig.groovy\n\
    grails.project.dependency.resolution = {\n    ...\n\n    plugins {\n        runtime\
    \ \":database-migration:1.2\"\n        ...\n    }\n}\n```\n\nNote that you need\
    \ to install the plug-in if you are using Grails 2.0.x. As of Grails 2.1 the plug-in\
    \ is installed by default.\n\nWith the plug-in installed you can now execute the\
    \ `dbm-generate-gorm-changelog` script.\n\n```\n$ grails dbm-generate-gorm-changelog\
    \ changelog.groovy\n| Packaging Grails application.....\n| Finished dbm-generate-gorm-changelog\n\
    ```\n\nThis will create `grails-app/migrations/changelog.groovy`. See [Listing\
    \ 12-57](#Chapter12.html#list_12_57).\n\n**Listing 12-57.** grails-app/migrations/changelog.groovy\n\
    \n```\ndatabaseChangeLog = {\n\n  changeSet(author: \"jeff (generated)\", id:\
    \ \"1352303958472-1\") {\n    createTable(tableName: \"person\") {\n      column(autoIncrement:\
    \ \"true\", name: \"id\", type: \"bigint\") {\n        constraints(nullable: \"\
    false\", primaryKey: \"true\",\n                    primaryKeyName: \"personPK\"\
    )\n      }\n\n      column(name: \"version\", type: \"bigint\") {\n        constraints(nullable:\
    \ \"false\")\n      }\n\n      column(name: \"first_name\", type: \"varchar(35)\"\
    ) {\n        constraints(nullable: \"false\")\n      }\n\n      column(name: \"\
    last_name\", type: \"varchar(35)\") {\n        constraints(nullable: \"false\"\
    )\n      }\n    }\n  }\n}\n```\n\nObviously that file contains, not SQL, but DSL\
    \ code for defining your schema. The plug-in can interpret that code and turn\
    \ it into SQL suitable for execution in the database. The DSL is pretty intuitive.\
    \ You can probably read through the code and understand pretty much everything\
    \ that is being expressed there. It is important that you review this code and\
    \ understand what is being expressed. You should not blindly rely on the generated\
    \ code. Make sure that it represents what you need before applying this code to\
    \ your production database. That process should include evaluating not only the\
    \ DSL code but also the generated SQL. A way to see the corresponding SQL code\
    \ is by running the `dbm-update-sql` command, as shown in [Listing 12-58](#Chapter12.html#list_12_58).\n\
    \n**Listing 12-58.** Running dbm-update-sql\n\n```\n$ grails dbm-update-sql\n\
    | Starting dbm-update-sql for database sa @ jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000\n\
    -- *********************************************************************\n-- Update\
    \ Database Script\n-- *********************************************************************\n\
    -- Change Log: changelog.groovy\n-- Ran at: 11/7/12 8:04 AM\n-- Against: SA@jdbc:h2:mem:devDb\n\
    -- Liquibase version: 2.0.5\n-- *********************************************************************\n\
    \n-- Create Database Lock Table\nCREATE TABLE DATABASECHANGELOGLOCK (ID INT NOT\
    \ NULL, LOCKED BOOLEAN NOT NULL, LOCKGRANTED\nTIMESTAMP, LOCKEDBY VARCHAR(255),\
    \ CONSTRAINT PK_DATABASECHANGELOGLOCK PRIMARY KEY (ID));\n\nINSERT INTO DATABASECHANGELOGLOCK\
    \ (ID, LOCKED) VALUES (1, FALSE);\n\n-- Lock Database\n-- Create Database Change\
    \ Log Table\nCREATE TABLE DATABASECHANGELOG (ID VARCHAR(63) NOT NULL, AUTHOR VARCHAR(63)\
    \ NOT NULL, FILENAME\nVARCHAR(200) NOT NULL, DATEEXECUTED TIMESTAMP NOT NULL,\
    \ ORDEREXECUTED INT NOT NULL, EXECTYPE\nVARCHAR(10) NOT NULL, MD5SUM VARCHAR(35),\
    \ DESCRIPTION VARCHAR(255), COMMENTS VARCHAR(255), TAG\nVARCHAR(255), LIQUIBASE\
    \ VARCHAR(20), CONSTRAINT PK_DATABASECHANGELOG PRIMARY KEY (ID, AUTHOR,\nFILENAME));\n\
    \n-- Changeset changelog.groovy::1352303958472-1::jeff (generated)::(Checksum:\
    \ 3:cbe21510703560534\nc81be19417709dd)\nCREATE TABLE person (id BIGINT GENERATED\
    \ BY DEFAULT AS IDENTITY NOT NULL, version BIGINT NOT\nNULL, first_name VARCHAR(35)\
    \ NOT NULL, last_name VARCHAR(35) NOT NULL, CONSTRAINT personPK\nPRIMARY KEY (id));\n\
    \nINSERT INTO DATABASECHANGELOG (AUTHOR, COMMENTS, DATEEXECUTED, DESCRIPTION,\
    \ EXECTYPE, FILENAME,\nID, LIQUIBASE, MD5SUM, ORDEREXECUTED) VALUES ('jeff (generated)',\
    \ '', NOW(), 'Create Table',\n'EXECUTED', 'changelog.groovy', '1352303958472-1',\
    \ '2.0.5', '3:cbe21510703560534c81be19417709dd'\n, 1);\n| Finished dbm-update-sql\n\
    ```\n\nOnce you have reviewed the DSL code and the corresponding SQL and are happy\
    \ that all is consistent with your requirements, you can have that SQL executed\
    \ against your production database in a couple of different ways. One is to let\
    \ the plug-in handle it for you at deployment time. To do that, you need to set\
    \ the `grails.plugin.databasemigration.updateOnStart` config property to `true`\
    \ in `Config.groovy`, as shown in [Listing 12-59](#Chapter12.html#list_12_59).\n\
    \n**Listing 12-59.** Enable Automatic Schema Updating\n\n```\n// grails-app/conf/Config.groovy\n\
    grails.plugin.databasemigration.updateOnStart = true\n```\n\nNote that for your\
    \ production database you will most likely want to set `dbCreate` to `\"none\"\
    ` in `grails-app/conf/DataSource.groovy`. The migrations plug-in is more controlled\
    \ and safer way of managing schema migrations. Using Hibernate’s schema generation\
    \ tools by setting `dbCreate` to something like `\"create-drop\"` is useful and\
    \ efficient for your development environment, but probably not what you want for\
    \ production."
  raw: '### Using the Database Migration Plug-in


    So far we haven’t dealt much with defining database tables and columns or any
    kind of DDL. GORM does a great job of helping manage a lot of that. As you have
    seen, you can define your domain classes, and then let GORM take it from there.
    If you want to customize the schema that is being generated or if you are mapping
    your application to an existing schema, you can tweak some of the ORM details,
    like table names and column names, by writing code in the mapping block of your
    domain classes. This is all very flexible and very powerful but doesn’t take care
    of everything. For example, it may be that a particular version of your application
    introduces new domain classes or new properties to existing domain classes; when
    that happens, you need some way to migrate your schema from one version of your
    domain model to the next. This is where the database migration plug-in comes into
    play. The database migration plug-in helps manage the evolution of your database
    schema from one version of your domain model to the next.


    Here’s an example scenario. Consider that you have a trivial application which
    contains a `Person` domain class, such as that defined in [Listing 12-55](#Chapter12.html#list_12_55).


    ***Listing 12-55.** The Person Class*


    `package migrationdemo`


    `class Person {`

    `    String firstName`

    `    String lastName`


    `    static constraints = {`

    `        firstName blank: false, size: 1..35`

    `        lastName blank: false, size: 1..35`

    `    }`

    `}`


    Your application is fully developed, and you are ready to ship to production.
    This is a good time to create a snapshot of what your schema looks like. This
    snapshot will be a base point that may come into play later if your domain model
    changes. When the model does change, you will want to create a diff between this
    initial snapshot and the schema that is necessary to support the future model
    after changes have been made. A way to create this initial snapshot is with the
    `dbm-generate-gorm-changelog` command provided by the database migration plug-in.
    In order to use that, the plug-in must first be installed, as shown in [Listing
    12-56](#Chapter12.html#list_12_56).


    ***Listing 12-56.** Installing the database-migration Plug-in*


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`

    `    ...`


    `    plugins {`

    `        runtime ":database-migration:1.2"`

    `        ...`

    `    }`

    `}`


    Note that you need to install the plug-in if you are using Grails 2.0.x. As of
    Grails 2.1 the plug-in is installed by default.


    With the plug-in installed you can now execute the `dbm-generate-gorm-changelog`
    script.


    `$ grails dbm-generate-gorm-changelog changelog.groovy`

    `| Packaging Grails application.....`

    `| Finished dbm-generate-gorm-changelog`


    This will create `grails-app/migrations/changelog.groovy`. See [Listing 12-57](#Chapter12.html#list_12_57).


    ***Listing 12-57.** grails-app/migrations/changelog.groovy*


    `databaseChangeLog = {`


    `  changeSet(author: "jeff (generated)", id: "1352303958472-1") {`

    `    createTable(tableName: "person") {`

    `      column(autoIncrement: "true", name: "id", type: "bigint") {`

    `        constraints(nullable: "false", primaryKey: "true",`

    `                    primaryKeyName: "personPK")`

    `      }`


    `      column(name: "version", type: "bigint") {`

    `        constraints(nullable: "false")`

    `      }`


    `      column(name: "first_name", type: "varchar(35)") {`

    `        constraints(nullable: "false")`

    `      }`


    `      column(name: "last_name", type: "varchar(35)") {`

    `        constraints(nullable: "false")`

    `      }`

    `    }`

    `  }`

    `}`


    Obviously that file contains, not SQL, but DSL code for defining your schema.
    The plug-in can interpret that code and turn it into SQL suitable for execution
    in the database. The DSL is pretty intuitive. You can probably read through the
    code and understand pretty much everything that is being expressed there. It is
    important that you review this code and understand what is being expressed. You
    should not blindly rely on the generated code. Make sure that it represents what
    you need before applying this code to your production database. That process should
    include evaluating not only the DSL code but also the generated SQL. A way to
    see the corresponding SQL code is by running the `dbm-update-sql` command, as
    shown in [Listing 12-58](#Chapter12.html#list_12_58).


    ***Listing 12-58.** Running dbm-update-sql*


    `$ grails dbm-update-sql`

    `| Starting dbm-update-sql for database sa @ jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000`

    `-- *********************************************************************`

    `-- Update Database Script`

    `-- *********************************************************************`

    `-- Change Log: changelog.groovy`

    `-- Ran at: 11/7/12 8:04 AM`

    `-- Against: SA@jdbc:h2:mem:devDb`

    `-- Liquibase version: 2.0.5`

    `-- *********************************************************************`


    `-- Create Database Lock Table`

    `CREATE TABLE DATABASECHANGELOGLOCK (ID INT NOT NULL, LOCKED BOOLEAN NOT NULL,
    LOCKGRANTED`

    `TIMESTAMP, LOCKEDBY VARCHAR(255), CONSTRAINT PK_DATABASECHANGELOGLOCK PRIMARY
    KEY (ID));`


    `INSERT INTO DATABASECHANGELOGLOCK (ID, LOCKED) VALUES (1, FALSE);`


    `-- Lock Database`

    `-- Create Database Change Log Table`

    `CREATE TABLE DATABASECHANGELOG (ID VARCHAR(63) NOT NULL, AUTHOR VARCHAR(63) NOT
    NULL, FILENAME`

    `VARCHAR(200) NOT NULL, DATEEXECUTED TIMESTAMP NOT NULL, ORDEREXECUTED INT NOT
    NULL, EXECTYPE`

    `VARCHAR(10) NOT NULL, MD5SUM VARCHAR(35), DESCRIPTION VARCHAR(255), COMMENTS
    VARCHAR(255), TAG`

    `VARCHAR(255), LIQUIBASE VARCHAR(20), CONSTRAINT PK_DATABASECHANGELOG PRIMARY
    KEY (ID, AUTHOR,`

    `FILENAME));`


    `-- Changeset changelog.groovy::1352303958472-1::jeff (generated)::(Checksum:
    3:cbe21510703560534`

    `c81be19417709dd)`

    `CREATE TABLE person (id BIGINT GENERATED BY DEFAULT AS IDENTITY NOT NULL, version
    BIGINT NOT`

    `NULL, first_name VARCHAR(35) NOT NULL, last_name VARCHAR(35) NOT NULL, CONSTRAINT
    personPK`

    `PRIMARY KEY (id));`


    `INSERT INTO DATABASECHANGELOG (AUTHOR, COMMENTS, DATEEXECUTED, DESCRIPTION, EXECTYPE,
    FILENAME,`

    `ID, LIQUIBASE, MD5SUM, ORDEREXECUTED) VALUES (''jeff (generated)'', '''', NOW(),
    ''Create Table'',`

    `''EXECUTED'', ''changelog.groovy'', ''1352303958472-1'', ''2.0.5'', ''3:cbe21510703560534c81be19417709dd''`

    `, 1);`

    `| Finished dbm-update-sql`


    Once you have reviewed the DSL code and the corresponding SQL and are happy that
    all is consistent with your requirements, you can have that SQL executed against
    your production database in a couple of different ways. One is to let the plug-in
    handle it for you at deployment time. To do that, you need to set the `grails.plug-in.databasemigration.updateOnStart`
    `config` property to `true` in `Config.groovy`, as shown in [Listing 12-59](#Chapter12.html#list_12_59).


    ***Listing 12-59.** Enable Automatic Schema Updating*


    `// grails-app/conf/Config.groovy`

    `grails.plugin.databasemigration.updateOnStart = true`


    Note that for your production database you will most likely want to set `dbCreate`
    to “`none`” in `grails-app/conf/DataSource.groovy`. The migrations plug-in is
    more controlled and safer way of managing schema migrations. Using Hibernate’s
    schema generation tools by setting `dbCreate` to something like “`create-drop`”
    is useful and efficient for your development environment, but probably not what
    you want for production.'
  trans: '

    ### 使用数据库迁移插件


    到目前为止，我们还没有过多地涉及定义数据库表、列或任何类型的 DDL。GORM 在帮助管理这些方面做得非常出色。正如你所见，你可以定义领域类，然后让 GORM
    来处理后续工作。如果你想自定义正在生成的模式，或者正在将应用程序映射到现有模式，可以通过在领域类的 `mapping` 块中编写代码来调整一些 ORM 细节，例如表名和列名。这一切都非常灵活且强大，但并不能处理所有事情。例如，应用程序的某个特定版本可能会引入新的领域类或为现有领域类添加新属性；当这种情况发生时，你需要某种方法将模式从一个版本的领域模型迁移到下一个版本。这就是数据库迁移插件发挥作用的地方。数据库迁移插件有助于管理数据库模式从一个版本的领域模型到下一个版本的演变。


    下面是一个示例场景。假设你有一个简单的应用程序，其中包含一个 `Person` 领域类，如清单 12-55 中所定义。


    ***清单 12-55.** Person 类*


    `package migrationdemo`


    `class Person {`

    `    String firstName`

    `    String lastName`


    `    static constraints = {`

    `        firstName blank: false, size: 1..35`

    `        lastName blank: false, size: 1..35`

    `    }`

    `}`


    你的应用程序已完全开发完毕，准备发布到生产环境。此时是创建模式快照的好时机。如果以后领域模型发生变化，这个快照将作为一个基准点。当模型确实发生变化时，你需要在这个初始快照与支持更改后未来模型所需的模式之间创建差异。创建此初始快照的一种方法是使用数据库迁移插件提供的
    `dbm-generate-gorm-changelog` 命令。要使用该命令，必须首先安装该插件，如清单 12-56 所示。


    ***清单 12-56.** 安装 database-migration 插件*


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`

    `    ...`


    `    plugins {`

    `        runtime ":database-migration:1.2"`

    `        ...`

    `    }`

    `}`


    请注意，如果你使用的是 Grails 2.0.x，则需要安装此插件。从 Grails 2.1 开始，该插件默认已安装。


    安装插件后，你现在可以执行 `dbm-generate-gorm-changelog` 脚本。


    `$ grails dbm-generate-gorm-changelog changelog.groovy`

    `| Packaging Grails application.....`

    `| Finished dbm-generate-gorm-changelog`


    这将创建 `grails-app/migrations/changelog.groovy`。参见清单 12-57。


    ***清单 12-57.** grails-app/migrations/changelog.groovy*


    `databaseChangeLog = {`


    `  changeSet(author: "jeff (generated)", id: "1352303958472-1") {`

    `    createTable(tableName: "person") {`

    `      column(autoIncrement: "true", name: "id", type: "bigint") {`

    `        constraints(nullable: "false", primaryKey: "true",`

    `                    primaryKeyName: "personPK")`

    `      }`


    `      column(name: "version", type: "bigint") {`

    `        constraints(nullable: "false")`

    `      }`


    `      column(name: "first_name", type: "varchar(35)") {`

    `        constraints(nullable: "false")`

    `      }`


    `      column(name: "last_name", type: "varchar(35)") {`

    `        constraints(nullable: "false")`

    `      }`

    `    }`

    `  }`

    `}`


    显然，该文件包含的不是 SQL，而是用于定义模式的 DSL 代码。该插件可以解释这些代码并将其转换为适合在数据库中执行的 SQL。DSL 非常直观。你大概可以通读代码并理解其中表达的大部分内容。审查这些代码并理解其含义非常重要。你不应该盲目依赖生成的代码。在将这些代码应用到生产数据库之前，请确保它代表了你需要的内容。该过程应包括评估
    DSL 代码以及生成的 SQL。查看相应 SQL 代码的一种方法是运行 `dbm-update-sql` 命令，如清单 12-58 所示。


    ***清单 12-58.** 运行 dbm-update-sql*


    `$ grails dbm-update-sql`

    `| Starting dbm-update-sql for database sa @ jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000`

    `-- *********************************************************************`

    `-- Update Database Script`

    `-- *********************************************************************`

    `-- Change Log: changelog.groovy`

    `-- Ran at: 11/7/12 8:04 AM`

    `-- Against: SA@jdbc:h2:mem:devDb`

    `-- Liquibase version: 2.0.5`

    `-- *********************************************************************`


    `-- Create Database Lock Table`

    `CREATE TABLE DATABASECHANGELOGLOCK (ID INT NOT NULL, LOCKED BOOLEAN NOT NULL,
    LOCKGRANTED`

    `TIMESTAMP, LOCKEDBY VARCHAR(255), CONSTRAINT PK_DATABASECHANGELOGLOCK PRIMARY
    KEY (ID));`


    `INSERT INTO DATABASECHANGELOGLOCK (ID, LOCKED) VALUES (1, FALSE);`


    `-- Lock Database`

    `-- Create Database Change Log Table`

    `CREATE TABLE DATABASECHANGELOG (ID VARCHAR(63) NOT NULL, AUTHOR VARCHAR(63) NOT
    NULL, FILENAME`

    `VARCHAR(200) NOT NULL, DATEEXECUTED TIMESTAMP NOT NULL, ORDEREXECUTED INT NOT
    NULL, EXECTYPE`

    `VARCHAR(10) NOT NULL, MD5SUM VARCHAR(35), DESCRIPTION VARCHAR(255), COMMENTS
    VARCHAR(255), TAG`

    `VARCHAR(255), LIQUIBASE VARCHAR(20), CONSTRAINT PK_DATABASECHANGELOG PRIMARY
    KEY (ID, AUTHOR,`

    `FILENAME));`


    `-- Changeset changelog.groovy::1352303958472-1::jeff (generated)::(Checksum:
    3:cbe21510703560534`

    `c81be19417709dd)`

    `CREATE TABLE person (id BIGINT GENERATED BY DEFAULT AS IDENTITY NOT NULL, version
    BIGINT NOT`

    `NULL, first_name VARCHAR(35) NOT NULL, last_name VARCHAR(35) NOT NULL, CONSTRAINT
    personPK`

    `PRIMARY KEY (id));`


    `INSERT INTO DATABASECHANGELOG (AUTHOR, COMMENTS, DATEEXECUTED, DESCRIPTION, EXECTYPE,
    FILENAME,`

    `ID, LIQUIBASE, MD5SUM, ORDEREXECUTED) VALUES (''jeff (generated)'', '''', NOW(),
    ''Create Table'',`

    `''EXECUTED'', ''changelog.groovy'', ''1352303958472-1'', ''2.0.5'', ''3:cbe21510703560534c81be19417709dd''`

    `, 1);`

    `| Finished dbm-update-sql`


    一旦你审查了 DSL 代码和相应的 SQL，并确认所有内容都符合你的要求，你可以通过几种不同的方式让该 SQL 针对你的生产数据库执行。一种方法是在部署时让插件为你处理。为此，你需要在
    `Config.groovy` 中将 `grails.plugin.databasemigration.updateOnStart` `config` 属性设置为
    `true`，如清单 12-59 所示。


    ***清单 12-59.** 启用自动模式更新*


    `// grails-app/conf/Config.groovy`

    `grails.plugin.databasemigration.updateOnStart = true`


    请注意，对于生产数据库，你很可能希望将 `grails-app/conf/DataSource.groovy` 中的 `dbCreate` 设置为 `"none"`。迁移插件是一种更可控、更安全的模式迁移管理方式。通过将
    `dbCreate` 设置为类似 `"create-drop"` 的值来使用 Hibernate 的模式生成工具，对于开发环境来说既有用又高效，但可能不适合生产环境。

    '
- fmt: "将`updateOnStart`设置为`true`后，迁移插件会在部署时通过生成并执行与最新迁移DSL代码相对应的SQL，确保你的模式是最新的。某些应用希望在部署前对此有更明确的控制。如果你想提前生成模式，并且不想将`updateOnStart`设置为`true`，一种方法是使用`dbm-update`脚本。`dbm-update`脚本会评估迁移DSL，生成相应的SQL，并将该SQL发送到数据库执行。[清单12-60](#Chapter12.html#list_12_60)展示了如何针对`DataSource.groovy`中的生产数据源配置运行`dbm-update`脚本的语法。\n\
    \n***清单12-60.** 更新生产模式*\n\n`$ grails prod dbm-update`\n\n请谨慎操作任何针对生产数据源的运行。确保SQL已经过审查，并且已做好适当的备份。\n\
    \n现在，生产模式与当前的领域模型保持一致，你可以创建一个`WAR`文件并将其部署到生产环境；目前一切应该都准备就绪。如果你以后更改了领域模型，则需要生成一个新的迁移脚本，该脚本将调整现有模式以适应领域模型的任何更改。让我们向`Person`类添加几个新属性，如[清单12-61](#Chapter12.html#list_12_61)所示。\n\
    \n***清单12-61.** 向Person类添加age和email属性*\n\n```\npackage migrationdemo\n\nclass\
    \ Person {\n    String firstName\n    String lastName\n    Integer age\n    String\
    \ email\n\n    static constraints = {\n        firstName blank: false, size: 1..35\n\
    \        lastName blank: false, size: 1..35\n        email email: true\n     \
    \   age range: 16..66\n    }\n}\n```\n\n如果我们将该代码部署到生产环境，将会出现问题，因为`person`表中没有用于存储`age`和`email`属性的列。迁移插件可以帮助迁移现有模式以支持新属性。`dbm-gorm-diff`脚本会评估你当前的领域模型，将其与现有模式进行比较，然后生成必要的代码来调整现有模式以支持当前的领域模型。\n\
    \n`$ grails dbm-gorm-diff change1.groovy --add`\n\n`dbm-gorm-diff`命令的第一个参数是要创建的DSL文件的名称——在本例中是`change1.groovy`。`--add`开关告诉迁移插件向根`changelog`文件中添加一个引用此新创建文件的包含项。参见[清单12-62](#Chapter12.html#list_12_62)。\n\
    \n***清单12-62.** change1.groovy的内容*\n\n```\ndatabaseChangeLog = {\n\n       changeSet(author:\
    \ \"jeff (generated)\", id: \"1352305604562-1\") {\n              addColumn(tableName:\
    \ \"person\") {\n                    column(name: \"age\", type: \"integer\")\
    \ {\n                           constraints(nullable: \"false\")\n           \
    \         }\n              }\n       }\n\n       changeSet(author: \"jeff (generated)\"\
    , id: \"1352305604562-2\") {\n              addColumn(tableName: \"person\") {\n\
    \                    column(name: \"email\", type: \"varchar(255)\") {\n     \
    \                      constraints(nullable: \"false\")\n                    }\n\
    \              }\n       }\n}\n```\n\n请注意，`change1.groovy`不包含整个领域模型的信息。该文件仅包含与当前模型和当前模式之间差异相关的信息。在此例中，它包含了与`email`和`age`属性相关的变更集。再次运行`dbm-update-sql`脚本以查看相应的SQL。\n\
    \n`$ grails dbm-update-sql`\n```\n| Starting dbm-update-sql for database sa @\
    \ jdbc:h2:devDB;MVCC=TRUE;LOCK_TIMEOUT=10000\n-- *********************************************************************\n\
    -- Update Database Script\n-- *********************************************************************\n\
    -- Change Log: changelog.groovy\n-- Ran at: 11/7/12 8:36 AM\n-- Against: SA@jdbc:h2:devDB\n\
    -- Liquibase version: 2.0.5\n-- *********************************************************************\n\
    \n-- Lock Database\n-- Changeset changelog.groovy::1352303958472-1::jeff (generated)::(Checksum:\
    \ 3:cbe21510703560534\nc81be19417709dd)\nCREATE TABLE person (id BIGINT GENERATED\
    \ BY DEFAULT AS IDENTITY NOT NULL, version BIGINT NOT\nNULL, first_name VARCHAR(35)\
    \ NOT NULL, last_name VARCHAR(35) NOT NULL, CONSTRAINT personPK\nPRIMARY KEY (id));\n\
    \nINSERT INTO DATABASECHANGELOG (AUTHOR, COMMENTS, DATEEXECUTED, DESCRIPTION,\
    \ EXECTYPE, FILENAME,\nID, LIQUIBASE, MD5SUM, ORDEREXECUTED) VALUES ('jeff (generated)',\
    \ '', NOW(), 'Create Table',\n'EXECUTED', 'changelog.groovy', '1352303958472-1',\
    \ '2.0.5', '3:cbe21510703560534c81be19417709dd'\n, 2);\n\n-- Changeset change1.groovy::1352305604562-1::jeff\
    \ (generated)::(Checksum:\n3:0dce963c7c6e443c64ac983289725133)\nALTER TABLE person\
    \ ADD age INT NOT NULL;\n\nINSERT INTO DATABASECHANGELOG (AUTHOR, COMMENTS, DATEEXECUTED,\
    \ DESCRIPTION, EXECTYPE, FILENAME,\nID, LIQUIBASE, MD5SUM, ORDEREXECUTED) VALUES\
    \ ('jeff (generated)', '', NOW(), 'Add Column',\n'EXECUTED', 'change1.groovy',\
    \ '1352305604562-1', '2.0.5', '3:0dce963c7c6e443c64ac983289725133',\n3);\n\n--\
    \ Changeset change1.groovy::1352305604562-2::jeff (generated)::(Checksum:\n3:d67ce27cffbfbc1c117fc0d3841e9a16)\n\
    ALTER TABLE person ADD email VARCHAR(255) NOT NULL;\n\nINSERT INTO DATABASECHANGELOG\
    \ (AUTHOR, COMMENTS, DATEEXECUTED, DESCRIPTION, EXECTYPE, FILENAME,\nID, LIQUIBASE,\
    \ MD5SUM, ORDEREXECUTED) VALUES ('jeff (generated)', '', NOW(), 'Add Column',\n\
    'EXECUTED', 'change1.groovy', '1352305604562-2', '2.0.5', '3:d67ce27cffbfbc1c117fc0d3841e9a16',\n\
    4);\n\n| Finished dbm-update-sql\n```\n\n请注意，生成的SQL正在修改`person`表以添加新属性的列，并且还在更新`DATABASECHANGELOG`表，该表是迁移插件用来跟踪已运行迁移信息的表。此时，你拥有与最初创建模式时相同的选项来应用差异。你可以将`updateOnStart`属性设置为`true`，或者显式运行`dbm-update`脚本。\n\
    \n上述用法是对插件提供的一些功能的良好介绍，但插件提供的功能远不止于此。有关更多详细信息，请参阅[`http://grails.org/plug-in/database-migration`](http://grails.org/plug-in/database-migration)上的文档。\n\
    \n### 总结\n\n在本章中，我们希望你已经了解了Grails插件系统的强大之处，不仅在于提供API增强的插件，还在于提供功能完整的应用模块的用例，就像你在上一节中看到的那样。插件开发是一个非常广泛的主题，本章仅触及了可能性的表面。然而，本章已经为你提供了足够的知识来探索开发自己的插件。\n\
    \n从创建和填充插件元数据的基础知识，到开发插件本身的复杂性，最后到插件的打包和分发，本章涵盖了很多内容。正如你所见，Grails开箱即用提供了广泛的功能，但通过其插件系统，它可以无限扩展。\n\
    \n![Image](images/3squ.jpg)\n\n## 索引"
  raw: 'With `updateOnStart` set to `true`, the migration plug-in will make sure that
    your schema is up to date at deployment time by generating and executing the SQL
    that corresponds to the latest migration DSL code. Some applications will want
    to be a little more explicit about this before deployment time. If you want to
    generate the schema ahead of time and do not want to set `updateOnStart` to `true`,
    a way to do that is with the `dbm-update` script. The `dbm-update` script will
    evaluate the migration DSL, generate the corresponding SQL, and send that SQL
    to the database for execution. [Listing 12-60](#Chapter12.html#list_12_60) shows
    the syntax for running the `dbm-update` script against your production dataSource
    configuration from `DataSource.groovy`.


    ***Listing 12-60.** Update the Production Schema*


    `$ grails prod dbm-update`


    Be careful about running anything against your production data source. Make sure
    that the SQL has been reviewed and that you have appropriate backups in place.


    Now that the production schema is consistent with your current domain model, you
    can create a `WAR` file and deploy the `WAR` file to production; everything should
    be good to go for now. If you ever change your domain model, you will need to
    generate a new migration script that will adapt your existing schema to account
    for whatever changes have been made to the domain model. Let’s add a couple of
    new properties to the `Person` class, as shown in [Listing 12-61](#Chapter12.html#list_12_61).


    ***Listing 12-61.** Add age and email Properties to the Person Class*


    `package migrationdemo`


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`

    `    String email`


    `    static constraints = {`

    `        firstName blank: false, size: 1..35`

    `        lastName blank: false, size: 1..35`

    `        email email: true`

    `        age range: 16..66`

    `    }`

    `}`


    If we deployed that code to production, we would have problems, since there are
    no columns in the person table to account for the `age` and `email` properties.
    The migration plug-in can help migrate the existing schema to support the new
    properties. The `dbm-gorm-diff` script will evaluate your current domain model,
    compare it with your existing schema, and then generate the code necessary to
    adapt your existing schema to support your current domain model.


    `$ grails dbm-gorm-diff change1.groovy --add`


    The first argument to the `dbm-gorm-diff` command is the name of the DSL file
    that will be created—in this case `change1.groovy`. The `--add` switch tells the
    migration plug-in to add an inlude to the root `changelog` file that references
    this newly created file. See [Listing 12-62](#Chapter12.html#list_12_62).


    ***Listing 12-62.** The Contents of change1.groovy*


    `databaseChangeLog = {`


    `       changeSet(author: "jeff (generated)", id: "1352305604562-1") {`

    `              addColumn(tableName: "person") {`

    `                    column(name: "age", type: "integer") {`

    `                           constraints(nullable: "false")`

    `                    }`

    `              }`

    `       }`


    `       changeSet(author: "jeff (generated)", id: "1352305604562-2") {`

    `              addColumn(tableName: "person") {`

    `                    column(name: "email", type: "varchar(255)") {`

    `                           constraints(nullable: "false")`

    `                    }`

    `              }`

    `       }`

    `}`


    Notice that `change1.groovy` does not contain information about the entire domain
    model. The file includes only information related to the differences between the
    current model and the current schema. In this case it includes change sets related
    to the `email` and `age` properties. Run the `dbm-update-sql` script again to
    see the corresponding SQL.


    `$ grails dbm-update-sql`

    `| Starting dbm-update-sql for database sa @ jdbc:h2:devDB;MVCC=TRUE;LOCK_TIMEOUT=10000`

    `-- *********************************************************************`

    `-- Update Database Script`

    `-- *********************************************************************`

    `-- Change Log: changelog.groovy`

    `-- Ran at: 11/7/12 8:36 AM`

    `-- Against: SA@jdbc:h2:devDB`

    `-- Liquibase version: 2.0.5`

    `-- *********************************************************************`


    `-- Lock Database`

    `-- Changeset changelog.groovy::1352303958472-1::jeff (generated)::(Checksum:
    3:cbe21510703560534`

    `c81be19417709dd)`

    `CREATE TABLE person (id BIGINT GENERATED BY DEFAULT AS IDENTITY NOT NULL, version
    BIGINT NOT`

    `NULL, first_name VARCHAR(35) NOT NULL, last_name VARCHAR(35) NOT NULL, CONSTRAINT
    personPK`

    `PRIMARY KEY (id));`


    `INSERT INTO DATABASECHANGELOG (AUTHOR, COMMENTS, DATEEXECUTED, DESCRIPTION, EXECTYPE,
    FILENAME,`

    `ID, LIQUIBASE, MD5SUM, ORDEREXECUTED) VALUES (''jeff (generated)'', '''', NOW(),
    ''Create Table'',`

    `''EXECUTED'', ''changelog.groovy'', ''1352303958472-1'', ''2.0.5'', ''3:cbe21510703560534c81be19417709dd''`

    `, 2);`


    `-- Changeset change1.groovy::1352305604562-1::jeff (generated)::(Checksum:`

    `3:0dce963c7c6e443c64ac983289725133)`

    `ALTER TABLE person ADD age INT NOT NULL;`


    `INSERT INTO DATABASECHANGELOG (AUTHOR, COMMENTS, DATEEXECUTED, DESCRIPTION, EXECTYPE,
    FILENAME,`

    `ID, LIQUIBASE, MD5SUM, ORDEREXECUTED) VALUES (''jeff (generated)'', '''', NOW(),
    ''Add Column'',`

    `''EXECUTED'', ''change1.groovy'', ''1352305604562-1'', ''2.0.5'', ''3:0dce963c7c6e443c64ac983289725133'',`

    `3);`


    `-- Changeset change1.groovy::1352305604562-2::jeff (generated)::(Checksum:`

    `3:d67ce27cffbfbc1c117fc0d3841e9a16)`

    `ALTER TABLE person ADD email VARCHAR(255) NOT NULL;`


    `INSERT INTO DATABASECHANGELOG (AUTHOR, COMMENTS, DATEEXECUTED, DESCRIPTION, EXECTYPE,
    FILENAME,`

    `ID, LIQUIBASE, MD5SUM, ORDEREXECUTED) VALUES (''jeff (generated)'', '''', NOW(),
    ''Add Column'',`

    `''EXECUTED'', ''change1.groovy'', ''1352305604562-2'', ''2.0.5'', ''3:d67ce27cffbfbc1c117fc0d3841e9a16'',`

    `4);`


    `| Finished dbm-update-sql`


    Notice that the generated SQL is altering the `person` table to add columns for
    the new properties and is also updating the `DATABASECHANGELOG` table, which is
    the table that the migration plug-in uses to keep track of information about migrations
    that have been run. At this point you have the same options for having the diff
    applied as when you initially created the schema. You can set the `updateOnStart`
    property to `true` or run the `dbm-update` script explicitly.


    The usage described above is a good introduction to some of the capabilities provided
    by the plug-in, but the plug-in provides quite a bit more functionality than is
    described here. See the documentation at [`http://grails.org/plug-in/database-migration`](http://grails.org/plug-in/database-migration)
    for more details.


    ### Summary


    In this chapter, we hope you have learned the power of the Grails plug-in system,
    not just for plug-ins that provide API enhancements but equally for use cases
    that provide fully functional application modules, like those you saw in the previous
    section. Plug-in development is a very broad topic, and this chapter only brushed
    the surface of what is possible. However, the chapter has given you enough knowledge
    to investigate developing your own plug-ins.


    From the basics of creating and populating plug-in metadata, to the intricacies
    of developing the plug-in itself, and finally to the packaging and distribution
    of your plug-ins, this chapter has covered a lot of ground. As you have seen,
    Grails provides a broad set of functionality out of the box, yet it can be extended
    without limits through its plug-in system.


