    ### 事件自动时间戳


    GORM 提供了许多内置钩子，你可以利用它们来介入持久化事件。每个事件都在领域类本身中定义为一个闭包属性。可用的事件如下：


    > *   `onLoad/beforeLoad`：当从数据库加载对象时触发

    > *   `beforeInsert`：在对象首次持久化到数据库之前触发

    > *   `beforeValidate`：在对象被验证之前触发

    > *   `beforeUpdate`：在对象更新到数据库之前触发

    > *   `beforeDelete`：在对象从数据库删除之前触发

    > *   `afterInsert`：在对象持久化到数据库之后触发

    > *   `afterUpdate`：在对象更新到数据库之后触发

    > *   `afterDelete`：在对象从数据库删除之后触发


    这些事件对于执行审计日志记录和跟踪等任务非常有用。例如，你可以创建另一个领域类来建模 `AuditLogEvent`，每当实例被访问或保存时，该事件就会被持久化。清单
    9-72 展示了这一概念的实际应用。


    ***清单 9-72.** 使用 GORM 事件*


    `class Album {`

    `    ...`

    `    def onLoad() {`

    `        new AuditLogEvent(type:"read", data:title).save()`

    `    }`

    `    def beforeSave() {`

    `        new AuditLogEvent(type:"save", data:title).save()`

    `    }`


    `    def beforeValidate() {`

    `        // 在验证发生之前执行`

    `    }`


    `    def beforeValidate(List propertiesBeingValidated) {`

    `        // 在验证发生之前执行，并且 propertiesBeingValidated`

    `        // 是一个包含所有即将被验证的属性名称的列表。`

    `    }`

    `}`


    GORM 还支持自动时间戳。本质上，如果你提供了一个名为 `dateCreated` 或 `lastUpdated` 的属性，GORM 会在每次保存或更新实例时自动填充其值。事实上，你已经在使用这个功能了，因为
    `Album` 类包含了 `lastUpdated` 和 `dateCreated` 属性。但是，如果你更倾向于手动管理这些属性，可以通过 `mapping`
    块的 `autoTimestamp` 方法来禁用自动时间戳，如清单 9-73 所示。


    ***清单 9-73.** 禁用自动时间戳*


    `class Album {`

    `    ...`

    `    static mapping = {`

    `        autoTimestamp false`

    `    }`

    `}`


    ### 总结


    至此，你已经完成了对 GORM 的探索之旅。正如你所发现的，很大程度上得益于 Hibernate，GORM 是一个功能齐全的动态 ORM 工具，它模糊了对象与数据库之间的界限。从动态查找器到条件查询，有大量的选项可以满足你的查询需求。然而，它并非只有巧妙的技巧；GORM
    还为诸如即时加载和乐观锁等更棘手的问题提供了解决方案。


    本章最重要的方面可能是你获得的关于 GORM 语义的知识。通过理解你正在使用的 ORM 工具，你会发现过程中遇到的意外会更少，并且你会成为一名更高效的开发者。尽管
    GORM 在很大程度上消除了对数据访问层的需求（例如在纯 Java 应用程序中常见的那种），但它并没有消除以结构化方式对逻辑单元进行分组的必要性。在下一章中，我们将探讨
    Grails 服务，它正好提供了这一点。敬请期待！


    ## 第 10 章


    ![图片](img/3squ.jpg)


    ## 服务


    在企业软件开发中，一种常见的模式是所谓的服务层，它封装了一组业务操作。在 Java Web 开发中，通常认为提供抽象层并减少 MVC 应用程序中各层之间的耦合是一种良好实践。


    服务层提供了一种将应用程序行为集中到一个 API 中的方法，该 API 可以被控制器或其他服务使用。将逻辑封装到服务层有很多充分的理由，但以下是主要的驱动因素：


    > *   你需要将业务逻辑集中到一个服务 API 中。

    > *   应用程序中的用例操作多个领域对象，并建模复杂的业务操作，这些操作最好不与控制器逻辑混合在一起。

    > *   某些用例和业务流程最好封装在领域对象之外，并放在一个 API 中。


    如果你的需求属于这些类别之一，那么创建服务很可能就是你想做的事情。服务本身通常具有多个依赖项；例如，服务的一个常见活动是与持久化层交互，无论是直接的 JDBC
    还是像 Hibernate 这样的 ORM 系统。


    显然，无论你使用哪种系统，你都可能依赖于数据源、会话工厂，或者仅仅是另一个服务。以松散耦合的方式配置这些依赖关系一直是早期采用 Java EE 技术的人面临的主要挑战之一。


    像许多其他软件开发挑战一样，这个问题是通过一种软件设计模式解决的——在这种情况下，称为控制反转（IoC）或依赖注入。像 Spring 这样的项目通过提供一个
    IoC 容器来实现这种模式。


    Grails 在内部使用 Spring 进行配置，而 Grails 正是基于这个基础，通过约定来提供服务。让我们直接来看看 Grails 服务是什么，以及如何创建一个基本服务。


