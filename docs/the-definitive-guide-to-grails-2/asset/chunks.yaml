    方法时，才刷新会话。手动刷新模式的缺点是，你可能会从查询中获取过时数据，并且必须始终将 `flush:true` 参数传递给 `save()` 或 `delete()`
    方法。

    > *   `commit`：仅在事务提交时刷新（请参阅下一节）。

