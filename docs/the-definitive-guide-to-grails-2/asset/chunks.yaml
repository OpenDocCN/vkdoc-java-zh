    :5,\n\"copyright\":\" 2008 Hammers of Misfortune\", \"country\":\"USA\", \"currency\"\
    :\"USD\",\n\"releaseDate\":\"2008-09-30T07:00:00Z\", \"primaryGenreName\":\"Rock\"\
    }]}\n```\n\n该响应包含大量信息——比我们需要的多——但我们可以忽略大部分内容，只提取我们需要的：`artworkUrl100`属性的值——在本例中是[`http://a862.phobos.apple.com/us/r30/Music/98/da/c2/mzi.wvlbbglb.100x100-75.jpg`](http://a862.phobos.apple.com/us/r30/Music/98/da/c2/mzi.wvlbbglb.100x100-75.jpg)。该值代表对应专辑封面的URL。\n\
    \n该API支持许多其他搜索选项，但上面列出的这些已经足够满足我们的需求。搜索服务的更完整文档可在[`www.apple.com/itunes/affiliates/resources/documentation/itunes-store-web-service-search-api.html`](http://www.apple.com/itunes/affiliates/resources/documentation/itunes-store-web-service-search-api.html)找到。\n\
    \n完成这些后，是时候创建你的第一个标签库了。你将创建一个`AlbumArtTagLib`，用于处理从亚马逊获取专辑封面的逻辑。为此，首先运行`create-tag-lib`命令：\n\
