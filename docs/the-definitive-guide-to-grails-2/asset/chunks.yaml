    ### 命名 URL 映射


    在某些场景下，多个 URL 映射可能匹配同一个反向映射请求，而框架不一定知道该应用哪个映射。命名 URL 映射通过允许映射关联一个名称，并在请求反向 URL
    映射查找时引用该名称，从而解决了这个问题。框架随后可以使用该名称，将反向映射请求明确地关联到特定的 URL 映射。清单 6-25 定义了一个名为 `artistDetails`
    的 URL 映射。


    ***清单 6-25.** 一个命名 URL 映射*


    `class UrlMappings {`

    `  static mappings = {`

    `    name artistDetails: "/showArtist/$artistName" {`

    `      controller = "artist"`

    `      action = "show"`

    `    }`

    `}`


    link 标签支持一个名为 mapping 的可选属性，可用于指定本次查找应使用的映射名称。清单 6-26 演示了此技术。


    ***清单 6-26.** 使用 Link 标签指定命名 URL 映射*


    `<g:link mapping="artistDetails"`

    `        params="artistName:${artist.name.replaceAll('' '', ''_'')}">`

    `     ${artist.name}`

    `</g:link>`


    请注意，无需指定控制器或操作名称。框架会定位名为 `"artistDetails"` 的映射，并找到相应的控制器和操作名称作为命名 URL 映射定义的一部分。


    作为在 link 标签上将 URL 映射名称指定为 mapping 属性值的替代方案，Grails 支持调用 link 命名空间中名称与映射名称匹配的标签。使用此方法时，参数可以作为标签的属性来指定。[清单
    6-27 展示了一个示例，它生成的链接与清单 6-26 中的代码相同。


    ***清单 6-27.** 使用 Link 命名空间*


    `<link:artistDetails artistName="${artist.name.replaceAll('' '', ''_'')}">`

    `     ${artist.name}`

    `</link:artistDetails>`


    清单 6-27 中的代码比清单 6-26 中的相应代码要简洁得多。


    ### 定义多个 URL 映射类


    当应用程序定义了大量自定义 URL 映射时，`UrlMappings` 类可能会变得很长，因此有必要将映射拆分成多个映射类。几个小型、专注的映射类比一个单一的庞大类更容易编写和维护。要引入新的映射类，只需在
    `grails-app/conf/` 下定义名称以 `UrlMappings` 结尾的类即可。这些类的结构应与默认的 `UrlMappings` 类完全相同。清单
    6-28 展示了一个包含与 `Artist` 相关映射的自定义映射类。


    ***清单 6-28.** 用于 Artist 映射的 URL 映射类*


    `class ArtistUrlMappings {`

    `    static mappings = {`

    `        "/showArtist/$artistName" (controller:''artist'', action:''display'')`

    `    }`

    `}`


    ### 测试 URL 映射


    与应用程序的大多数其他方面一样，您需要为自定义 URL 映射编写自动化测试，以断言应用程序确实按照您的预期响应请求。Grails 提供了一种非常简洁的机制来编写这些测试。测试
    URL 映射最简单的方法是为 URL 映射类创建一个单元测试，该类可用于测试自定义映射。


    清单 6-29 展示了一个简单的映射，用于支持像 `/showArtist/Jeff_Beck` 这样的 URL。对此类 URL 的请求应映射到 `ArtistController`
    中的 `display` 操作。


    ***清单 6-29.** 一个自定义 URL 映射*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showArtist/$artistName" (controller:''artist'', action:''display'')`

    `        // ...`

    `    }`

    `}`


    `assertForwardUrlMapping` 方法可用于断言对像 `/showArtist/Jeff_Beck` 这样的 URL 的请求被发送到了正确的控制器操作。清单
    6-30 中的代码演示了此测试可能的样子。


    ***清单 6-30.** 单元测试 URL 映射*


    `@TestFor(ArtistUrlMappings)`

    `@Mock(com.gtunes.ArtistController)`

    `class ArtistUrlMappingsTests {`


    `    void testShowArtistUrlMapping() {`

    `        // 断言 /showArtist/Jeff_Beck 由 artist 控制器中的`

    `        // display 操作处理`

    `        assertForwardUrlMapping(''/showArtist/Jeff_Beck'',`

    `                                controller: ''artist'', action: ''display'')`

    `    }`

    `}`


    请注意，模拟与所测试的 URL 映射相关的任何控制器非常重要。这可以通过将 `Mock` 注解应用于测试类并将相应的 URL 映射类作为参数传递来实现。在清单
    6-30 中，这个类是 `ArtistController`。清单 6-29 中定义的映射包含一个嵌入式变量 `artistName`。有一种简单的机制可以断言这些映射变量被赋予了正确的值：只需将一个闭包作为最后一个参数传递给
    `assertForwardUrlMapping` 方法，并在闭包中为与嵌入式变量名称一致的属性赋值。请参见清单 6-31 中的示例。此测试不仅会断言请求映射到了
    `ArtistController` 中的 `display` 操作，还会断言 `artistName` 请求参数被填充了正确的值。


    ***清单 6-31.** 测试 URL 映射变量*


    `@TestFor(ArtistUrlMappings)`

    `@Mock(com.gtunes.ArtistController)`

    `class ArtistUrlMappingsTests {`


    `    void testShowArtistUrlMapping() {`

    `        // 断言 /showArtist/Jeff_Beck 由 artist 控制器中的`

    `        // display 操作处理，并且存在一个名为 artistName`

    `        // 且值为 Jeff_Beck 的请求参数`

    `        assertForwardUrlMapping(''/showArtist/Jeff_Beck'',`

    `                                controller: ''artist'', action: ''display'')
    {`

    `            artistName = ''Jeff_Beck''`

    `        }`

    `    }`

    `}`


    清单 6-32 演示了测试反向 URL 映射是否按预期工作的类似方法。请注意，这次断言方法被称为 `assertReverseUrlMapping`。


    ***清单 6-32.** 测试反向 URL 映射*


    `@TestFor(ArtistUrlMappings)`

    `@Mock(com.gtunes.ArtistController)`

    `class ArtistUrlMappingsTests {`

    `    void testShowArtistReverseUrlMapping() {`

    `        // 断言当对 artist 控制器中的 display 操作`

    `        // 进行反向 URL 查找，且请求参数 artistName`

    `        // 的值为 Jeff_Beck 时，生成的 URL 是 /showArtist/Jeff_Beck`

    `        assertReverseUrlMapping(''/showArtist/Jeff_Beck'',`

    `                                controller: ''artist'', action: ''display'')
    {`

    `            artistName = ''Jeff_Beck''`

    `        }`

    `    }`

    `}`


    通常，您希望同时测试正向和反向 URL 映射。一种方法是同时使用 `assertForwardUrlMapping` 方法和 `assertReverseUrlMapping`
    方法。虽然这种组合可以完成任务，但它涉及的工作量比您需要的要多。使用 `assertUrlMapping` 方法将断言正向和反向 URL 映射都正常工作，如果其中任何一个失败，测试将失败。请参见清单
    6-33 中的示例。


    ***清单 6-33.** 测试正向和反向 URL 映射*


    `@TestFor(ArtistUrlMappings)`

    `@Mock(com.gtunes.ArtistController)`

    `class ArtistUrlMappingsTests {`

    `    void testForwardAndReverseUrlMapping() {`

    `       assertUrlMapping(''/showArtist/Jeff_Beck'',`

    `                                controller: ''artist'', action: ''display'')
    {`

    `            artistName = ''Jeff_Beck''`

    `        }`

    `    }`

    `}`

