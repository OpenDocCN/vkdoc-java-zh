    #### 为脚本编写文档


    你可能已经注意到，在清单 11-11 的脚本模板中，主目标（main target）有一个用于描述目标的占位符：


    `target(main: "The description of the script goes here!") {`


    你可以通过为脚本中的 `USAGE` 属性赋值，来提供关于某个目标的额外信息，以便其他人更好地理解如何使用你的脚本。例如，要为 `hello-world`
    脚本提供信息，你可以进行如下修改：


    `includeTargets << grailsScript("_GrailsInit")`


    `target(main: "Prints a Hello message") {`

    `    def message = "Hello ${argsMap.params ? argsMap.params[0] : ''World''}"`

    `    if(argsMap.uppercase) {`

    `        println message.toUpperCase()`

    `    } else {`

    `        println message`

    `    }`

    `}`


    `setDefaultTarget(main)`


    `USAGE = ''''''`

    `    hello-world [-uppercase] [NAME]`


    `where`

    `    -uppercase = Convert the message to all uppercase`

    `    NAME       = The name of the person to say hello to`

    `''''''`


    这样一来，如果你的脚本的其他用户需要帮助，他们可以使用 Grails 提供的 `help` 命令，如清单 11-25 所示。


    ***清单 11-25.** 从 Gant 脚本获取帮助*


    `grails> help hello-world`

    `| Environment set to development.....`


    `    grails hello-world -- Prints a Hello message`


    `Usage (optionals in square brackets):`


    `    hello-world [-uppercase] [NAME]`


    `where`

    `    -uppercase = Convert the message to all uppercase`

    `    NAME       = The name of the person to say hello to`

    `grails>`


    #### 更多地复用 Grails


    在清单 11-11 中包含 `GrailsInit.groovy` 脚本，只是包含现有 Grails 脚本的一个例子。实际上，你可以包含一个提供不同功能的脚本数组。例如，假设你想确保在脚本执行之前先运行测试。你可以包含
    `_GrailsTest.groovy` 脚本并依赖于 `allTests` 目标，如清单 11-26 所示。


    ***清单 11-26.** 执行测试*


    `includeTargets << grailsScript(''_GrailsTest'')`


    `target(main: "The description of the script goes here!") {`

    `    depends allTests`

    `}`


    `setDefaultTarget main`


    或者，如果你想确保容器已启动并正在运行，也许是为了执行某种自动化功能测试，你可以使用 `RunApp.groovy` 脚本。这个脚本与你在命令行输入 `grails
    run-app` 时使用的脚本相同，它提供了一个名为 `runApp` 的目标，你可以用它来加载 Grails 中嵌入的 Tomcat 容器。作为对此的扩展，下一节将介绍如何加载
    Grails，甚至无需容器。


    #### 从命令行引导 Grails


    如果你需要从命令行访问 Grails 环境，可以使用 `GRAILS_HOME/scripts/Bootstrap.groovy` 脚本加载 Grails。例如，这将使你能够从命令行使用
    GORM 进行批处理。


    首先，你需要包含以下 `Bootstrap.groovy` 脚本：


    `includeTargets << grailsScript("_GrailsBootstrap")`

    `然后调用 bootstrap 目标：`

    `bootstrap()`


    完成此操作后，将创建许多新变量，包括以下内容：


    > *   `grailsApp`：对 `org.codehaus.groovy.grails.commons.GrailsApplication` 类的引用，允许你检查正在运行的
    Grails 应用程序中的约定。

    > *   `appCtx`：Spring `ApplicationContext` 实例，包含 Grails 应用程序的 bean 定义，在运行时可见。

    > *   `servletContext`：`ServletContext` 的模拟实现，可从命令行使用。

    > *   `pluginManager`：对 `org.codehaus.groovy.grails.plugins.GrailsPluginManager`
    实例的引用，允许你检查当前安装的插件。


    其中最常用的是 `appCtx` 变量，它允许访问 Spring `ApplicationContext` 中包含的所有 bean。例如，如果你需要获取 Hibernate
    `SessionFactory` 和/或 SQL `DataSource`，你可以使用 `appCtx` 轻松实现：


    `DataSource dataSource = appCtx.getBean("dataSource") SessionFactory SessionFactory
    = appCtx.`

    `getBean("sessionFactory")`


    了解了这些基础知识后，让我们看几个示例，展示如何使用 Gant 来提高命令行生产力。


    #### Gant 实战


    在命令窗口中打印“Hello World!”虽然有趣，但归根结底并不是很有用。在接下来的章节中，你将看到几个真实的 Gant 脚本。第一个脚本将允许你快速部署到
    Tomcat。

