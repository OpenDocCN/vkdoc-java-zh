    do the same thing but exhibit a bit more intelligence by having “expectations.”
    For example, a mock can specify that it “expects” a given method to be invoked
    at least once—even ten times if required. As we progress through the book, the
    difference between unit tests and integration tests will become clearer.


    To test the `StoreController` in its current state, assert the value of the response
    that was sent to the user. A simple way of doing this appears in [Listing 1-9](#Chapter01.html#list_1_9).


    ***Listing 1-9.** Testing the StoreController’s Index Action*


    `package gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `/**`

    ` * See the API for {@link grails.test.mixin.web.ControllerUnitTestMixin} for
    usage instructions`

    ` */`

    `@TestFor(StoreController)`

    `class StoreControllerTests {`


    `    void testSomething() {`

    `        controller.index()`

    `        assert ''Welcome to the gTunes store!'' == response.text`

    `    }`

    `}`


    What we’re doing here is using the built-in testing capabilities of Grails to
    evaluate the content of the `response` object. During a test run, Grails magically
    transforms the regular servlet HttpServletResponse object into a Grails `MockHttpServletResponse`,
    which has helper properties, such as `text`, that enable you to evaluate what
    happened as the result of a call to the `render` method.


    Nevertheless, don’t get too hung up about the ins and outs of using this code
    just yet. The whole book will be littered with examples; they will gradually ease
    you into becoming proficient at testing with Grails.


    #### Step 5: Running the Tests


    To run the tests and verify that everything works as expected, you can use the
    `grails test-app` command. The `test-app` command will execute all the tests in
    the application and output the results to the `test/reports` directory. In addition,
    you can run only `StoreControllerTests` by issuing the command `grails test-app
    StoreController`. [Listing 1-10](#Chapter01.html#list_1_10) shows some typical
    output that results when the `grails test-app` command is run.


    ***Listing 1-10.** Running Tests with grails test-app*


    `| Completed 1 unit test, 0 failed in 1107ms`

    `| Tests PASSED - view reports in target/test-reports`


    If you want to review the reports, you’ll find XML, HTML, and plain-text reports
    in the `test/reports` directory. [Figure 1-4](#Chapter01.html#fig_1_4) shows what
    the generated HTML reports look like in a browser—they’re definitely easier on
    the eye than the XML equivalent!


    ![Image](images/9781430243779_Fig01-04.jpg)


    ***Figure 1-4.** Generated HTML test reports*


    #### Step 6: Running the Application


    Now that you’ve tested your code, the final step is to see it in action. Do this
    using the `grails run-app` command, which will start up a locally running Grails
    server on port 8080 by default.


    Get Grails going by typing `grails run-app` into the command prompt:


    `$ grails run-app`


    You’ll notice that Grails will start up and inform you of a URL you can use to
    access the Grails instance (see [Listing 1-11](#Chapter01.html#list_1_11)).


    ***Listing 1-11.** Running an Application with run-app*


    `...`

    `| Server running. Browse to http://localhost:8080/gTunes`


    If you get a bind error, such as the following one, it probably resulted from
    a port conflict: “Server failed to start: java.net.BindException: Address already
    in use”.


    This error typically occurs if you already have another container, such as Apache
    Tomcat ([`http://tomcat.apache.org`](http://tomcat.apache.org)), running on port
    8080\. You can work around this issue by running Grails on a different port by
    passing the `server.port` argument and specifying an alternative value:


    `grails -Dserver.port=8087 run-app`


    In the preceding case, Grails will start up on port 8087 as expected. Barring
    any port conflicts, you should have Grails up and running and ready to serve requests
    at this point. Open your favorite browser and navigate to the URL prompted by
    the Grails `run-app` command shown in [Listing 1-11](#Chapter01.html#list_1_11).
    You’ll be presented with the Grails welcome page that looks something like [Figure
    1-5](#Chapter01.html#fig_1_5).


    The welcome screen is (by default) rendered by a Groovy Server Pages (GSP) file
    located at `web-app/index.gsp`, but you can fully customize the location of this
    file through URL mappings (discussed in [Chapter 6](#Chapter06.html)).


    As [Figure 1-5](#Chapter01.html#fig_1_5) shows, the `StoreController` you created
    earlier is one of those listed as available. Clicking the `StoreController` link
    results in printing the “Welcome to the gTunes store!” message you implemented
    earlier (see [Figure 1-6](#Chapter01.html#fig_1_6)).


    ![Image](images/9781430243779_Fig01-05.jpg)


    ***Figure 1-5.** The standard Grails welcome page*


    ![Image](images/9781430243779_Fig01-06.jpg)


    ***Figure 1-6.** StoreController prints a message.*'
  trans: '

    #### 第 4 步：测试代码


    前面的代码虽然简单，但即便是最简单的代码也不应未经测试。打开之前生成在 `test/unit` 目录下的 `StoreControllerTests` 测试套件。清单
    1-8 展示了 `StoreControllerTests` 套件的内容。


    ***清单 1-8.** 生成的 StoreControllerTests 测试套件*


    `package gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `/**`

    ` * 有关使用说明，请参阅 {@link grails.test.mixin.web.ControllerUnitTestMixin} 的 API`

    ` */`

    `@TestFor(StoreController)`

    `class StoreControllerTests {`


    `    void testSomething() {`

    `       fail "请实现我"`

    `    }`

    `}`


    Grails 将测试分为“单元”测试和“集成”测试。集成测试会启动整个环境，包括数据库；因此，它们通常运行得更慢。此外，集成测试通常设计用于测试多个类的交互，因此需要应用程序更完整后才能运行。


    另一方面，单元测试是运行快速的测试，但它们需要大量使用模拟对象和桩。桩是测试中使用的类，通过返回任意的硬编码值来模拟方法的真实行为。模拟对象本质上做同样的事情，但通过拥有“期望”而表现出更多的智能。例如，一个模拟对象可以指定它“期望”某个方法至少被调用一次——如果需要，甚至十次。随着本书的深入，单元测试和集成测试之间的区别将变得更加清晰。


    要测试当前状态下的 `StoreController`，需要断言发送给用户的响应的值。清单 1-9 展示了一种简单的方法。


    ***清单 1-9.** 测试 StoreController 的 Index 操作*


    `package gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `/**`

    ` * 有关使用说明，请参阅 {@link grails.test.mixin.web.ControllerUnitTestMixin} 的 API`

    ` */`

    `@TestFor(StoreController)`

    `class StoreControllerTests {`


    `    void testSomething() {`

    `        controller.index()`

    `        assert ''欢迎来到 gTunes 商店！'' == response.text`

    `    }`

    `}`


    我们在这里所做的是利用 Grails 内置的测试能力来评估 `response` 对象的内容。在测试运行期间，Grails 神奇地将常规的 servlet
    HttpServletResponse 对象转换为 Grails `MockHttpServletResponse`，它拥有辅助属性（例如 `text`），使您能够评估调用
    `render` 方法的结果。


    不过，暂时不要过于纠结这段代码的来龙去脉。整本书中会穿插大量示例；它们会逐步引导您熟练使用 Grails 进行测试。


    #### 第 5 步：运行测试


    要运行测试并验证一切按预期工作，您可以使用 `grails test-app` 命令。`test-app` 命令将执行应用程序中的所有测试，并将结果输出到
    `test/reports` 目录。此外，您可以通过执行命令 `grails test-app StoreController` 仅运行 `StoreControllerTests`。清单
    1-10 展示了运行 `grails test-app` 命令时的一些典型输出。


    ***清单 1-10.** 使用 grails test-app 运行测试*


    `| 已完成 1 个单元测试，0 个失败，耗时 1107 毫秒`

    `| 测试通过 - 在 target/test-reports 中查看报告`


    如果您想查看报告，可以在 `test/reports` 目录中找到 XML、HTML 和纯文本格式的报告。图 1-4 展示了生成的 HTML 报告在浏览器中的样子——它们绝对比
    XML 版本更赏心悦目！


    ![Image](img/9781430243779_Fig01-04.jpg)


    ***图 1-4.** 生成的 HTML 测试报告*


    #### 第 6 步：运行应用程序


    现在您已经测试了代码，最后一步是看看它的实际效果。使用 `grails run-app` 命令即可，该命令将默认在 8080 端口上启动一个本地运行的 Grails
    服务器。


    通过在命令提示符中输入 `grails run-app` 来启动 Grails：


    `$ grails run-app`


    您会注意到 Grails 将启动，并告知您一个可用于访问 Grails 实例的 URL（参见清单 1-11）。


    ***清单 1-11.** 使用 run-app 运行应用程序*


    `...`

    `| 服务器正在运行。请浏览至 http://localhost:8080/gTunes`


    如果您遇到如下绑定错误，很可能是端口冲突导致的：“服务器启动失败：java.net.BindException：地址已在使用中”。


    如果您已经有另一个容器（例如 Apache Tomcat ([`http://tomcat.apache.org`](http://tomcat.apache.org))）在
    8080 端口上运行，通常会出现此错误。您可以通过传递 `server.port` 参数并指定一个替代值，让 Grails 在不同的端口上运行来解决此问题：


    `grails -Dserver.port=8087 run-app`


    在上述情况下，Grails 将按预期在 8087 端口上启动。只要没有端口冲突，此时 Grails 应该已经启动并运行，准备好处理请求了。打开您喜欢的浏览器，导航到
    清单 1-11 中 Grails `run-app` 命令提示的 URL。您将看到 Grails 的欢迎页面，看起来像图 1-5。


    欢迎页面（默认情况下）由位于 `web-app/index.gsp` 的 Groovy 服务器页面 (GSP) 文件渲染，但您可以通过 URL 映射（在第
    6 章中讨论）完全自定义此文件的位置。


    如图 1-5 所示，您之前创建的 `StoreController` 被列为可用的控制器之一。单击 `StoreController` 链接将打印您之前实现的“欢迎来到
    gTunes 商店！”消息（参见图 1-6）。


    ![Image](img/9781430243779_Fig01-05.jpg)


    ***图 1-5.** 标准的 Grails 欢迎页面*


    ![Image](img/9781430243779_Fig01-06.jpg)


    ***图 1-6.** StoreController 打印一条消息。*

