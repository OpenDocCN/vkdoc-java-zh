    ### 使用 Hudson 进行持续集成


    敏捷和测试驱动理念已被无休止地争论，这超出了本书的讨论范围。然而，如果有一种敏捷实践能够为任何项目（无论是“传统”项目还是敏捷项目）带来立竿见影的好处，那便是持续集成。


    *持续集成*涉及设置一个服务器，该服务器持续地（按计划或通过监控变更）构建最新代码、运行所有测试，并生成代码快照以供分发。持续集成服务器可以执行各种附加任务，从生成覆盖率报告到创建最新文档，甚至在构建失败时发送电子邮件或短信通知。


    本节将演示如何使用 Hudson，这是一个开源的持续集成服务器，可从 [`https://hudson.dev.java.net/`](https://hudson.dev.java.net/)
    获取。要开始使用，您需要下载 Hudson 的 `hudson.war` 发行版，并将其部署到一个容器中，例如 Apache Tomcat。使用 Tomcat
    部署只需将 WAR 文件放入 `TOMCAT_HOME/webapps` 目录并启动 Tomcat 即可。


    然后，假设 Tomcat 已在 8080 端口上运行，您可以访问 [`http://localhost:8080/hudson`](http://localhost:8080/hudson)，您将看到
    Hudson 仪表盘。


    下一步是为 Hudson 安装 Grails 插件。在仪表盘主屏幕上，点击“管理 Hudson”链接，然后点击“管理插件”链接。在“可选”选项卡中，选中 Grails
    插件旁边的复选框，然后点击页面底部的“安装”按钮。安装完插件后，您需要重启 Hudson。


    安装 Grails 插件后，下一步是在 Hudson 中配置您的 Grails 安装。该插件本身不附带 Grails 版本，它使用一个必须与 Hudson
    分开安装在系统上的版本。该插件允许您配置任意多个不同版本的 Grails。如果您在同一个 Hudson 实例中构建多个 Grails 项目，并且这些 Grails
    项目并非都使用相同的版本构建，这将非常有用。


    要在 Hudson 中配置 Grails 安装，请点击仪表盘主屏幕上的“管理 Hudson”链接，然后点击“配置系统”链接。图 11-3 显示了此屏幕中用于配置
    Grails 安装的部分。


    ![Image](img/9781430243779_Fig11-03.jpg)


    ***图 11-3.** 在 Hudson 中配置 Grails 安装*


    您可以看到每个 Grails 安装都有一个名称和一个 `GRAILS_HOME`。名称只是一个标识符，稍后在配置作业时，它将帮助您选择特定版本的 Grails。`GRAILS_HOME`
    的值必须指向一个特定的 Grails 安装目录。请注意，内置了验证功能，可以告知您输入的目录是否存在。验证在您离开文本字段后才会激活。


    配置完所有 Grails 安装后，请确保滚动到页面底部并点击“保存”按钮。


    ![Image](img/9781430243779_Fig11-04.jpg)


    ***图 11-4.** 创建一个新的自由风格作业*


    在 Hudson 中至少配置了一个 Grails 安装后，您就可以为 Grails 项目创建作业了。为 Grails 项目创建作业的方式与在 Hudson
    中为任何其他项目创建作业的方式相同。在仪表盘主屏幕上，点击“新建作业”链接。大多数情况下，您将为所谓的自由风格软件项目创建作业，因此您将在表单上选择该单选按钮来创建新作业（参见图
    11-4）。


    点击“确定”按钮后，您将进入配置此构建所有详细信息的页面。此页面允许您定义正在使用的版本控制系统、项目路径、构建项目的计划等。页面底部附近是您配置实际构建步骤的地方。安装
    Grails 插件后，应该会出现一个新的构建步骤“使用 Grails 构建”，如图 11-5 所示。


    ![Image](img/9781430243779_Fig11-05.jpg)


    ***图 11-5.** “使用 Grails 构建”构建步骤*


    当您选择“使用 Grails 构建”构建步骤时，页面将更新为一个表单，让您配置 Grails 构建。这至少包括指定要使用的 Grails 版本以及要执行的
    Grails 目标。一个典型的目标是执行 `test-app` 目标，但您可以将作业配置为执行任何有意义的目标。图 11-6 显示了 Grails 构建的详细信息。


    “Grails 安装”下拉菜单将包含您之前配置的所有 Grails 安装。选择此作业应使用的 Grails 版本。


    “目标”字段允许您指定希望作为此构建一部分执行的任意多个目标。这些目标将按照此文本框中指定的顺序执行。如果有任何参数需要传递给特定目标，则目标名称和参数应用双引号括起来，以便插件知道将它们分组为一个命令。


    有用于指定 `grails.work.dir` 和 `project.work.dir` 系统属性的字段。


    “项目基础目录”字段通常留空，但如果 Grails 项目不在作业工作目录的根目录下，则此字段很重要。例如，如果您的 Grails 项目在 SCM 系统中的路径类似于
    `/projects/development/code/grails/gTunes/`，并且由于某种原因，您需要将此作业配置为检出 `/projects/development/code/grails/gTunes/`
    下的所有内容，那么您需要为“项目基础目录”字段指定一个值。这里的问题是作业根目录是 `/projects/development/code/grails/gTunes/`；因此插件将从该目录执行所有
    Grails 命令。由于这不是 Grails 项目本身的根目录，所有 Grails 命令都将失败。为了支持这种情况，应将“项目基础目录”字段的值设置为 `/projects/development/code/grails/gTunes/`；这是从作业根目录到
    Grails 项目根目录的相对路径。设置完成后，所有 Grails 命令都将从 `/projects/development/code/grails/gTunes/`
    目录执行。


    ![Image](img/9781430243779_Fig11-06.jpg)


    ***图 11-6.** 配置 Grails 构建*


    在 Hudson 中配置 Grails 作业的所有其他方面与任何其他类型的项目没有区别。

