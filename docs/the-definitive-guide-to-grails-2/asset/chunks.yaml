    ***代码清单 9-53.** 使用 withTransaction 方法*


    `def save() {`

    `    Album.withTransaction {`

    `        def album = Album.get(params.id)`

    `        album.title = "Changed Title"`

    `        album.save(flush:true)`

    `        ...`

    `        // 出现问题`

    `        throw new Exception("Ruh Roh!")`

