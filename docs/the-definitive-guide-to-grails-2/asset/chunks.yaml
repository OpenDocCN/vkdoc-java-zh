- fmt: "#### Documenting Your Scripts\n\nYou may have noticed from the script template\
    \ in [Listing 11-11](#Chapter11.html#list_11_11) that the main target has a placeholder\
    \ for the description of the target:\n\n`target(main: \"The description of the\
    \ script goes here!\") {`\n\nYou can provide additional information about a target,\
    \ so that others understand better how to go about using your script, by assigning\
    \ a value to the `USAGE` property in the script. For example, to give information\
    \ about the `hello-world` script, you could make this modification:\n\n```\nincludeTargets\
    \ << grailsScript(\"_GrailsInit\")\n\ntarget(main: \"Prints a Hello message\"\
    ) {\n    def message = \"Hello ${argsMap.params ? argsMap.params[0] : 'World'}\"\
    \n    if(argsMap.uppercase) {\n        println message.toUpperCase()\n    } else\
    \ {\n        println message\n    }\n}\n\nsetDefaultTarget(main)\n\nUSAGE = '''\n\
    \    hello-world [-uppercase] [NAME]\n\nwhere\n    -uppercase = Convert the message\
    \ to all uppercase\n    NAME       = The name of the person to say hello to\n\
    '''\n```\n\nThen if any other users of your script should need help using the\
    \ script, they can go to the `help` command provided by Grails, as shown in [Listing\
    \ 11-25](#Chapter11.html#list_11_25).\n\n**Listing 11-25.** Getting Help from\
    \ Gant Scripts\n\n```\ngrails> help hello-world\n| Environment set to development.....\n\
    \n    grails hello-world -- Prints a Hello message\n\nUsage (optionals in square\
    \ brackets):\n\n    hello-world [-uppercase] [NAME]\n\nwhere\n    -uppercase =\
    \ Convert the message to all uppercase\n    NAME       = The name of the person\
    \ to say hello to\ngrails>\n```\n\n#### Reusing More of Grails\n\nThe inclusion\
    \ of the `GrailsInit.groovy` script in [Listing 11-11](#Chapter11.html#list_11_11)\
    \ is just one example of including an existing Grails script. You can in fact\
    \ include an array of different scripts that provide different features. For example,\
    \ say you want to make sure the tests run before your script is executed. You\
    \ can include the `_GrailsTest.groovy` script and depend on the `allTests` target,\
    \ as shown in [Listing 11-26](#Chapter11.html#list_11_26).\n\n**Listing 11-26.**\
    \ Executing Tests\n\n```\nincludeTargets << grailsScript('_GrailsTest')\n\ntarget(main:\
