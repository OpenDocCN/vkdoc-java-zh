    #### 测试注册码


    现在，我们来思考如何运用之前学到的单元测试技术来测试该操作。当你运行 `create-controller` 命令时，系统会在 `test/unit` 目录下为你创建一个针对
    `UserController` 的新单元测试。


    现在，为密码不匹配的情况编写一个测试。清单 4-62 展示了 `testPasswordsDontMatch` 测试用例，该用例用于检查密码不匹配是否会触发验证错误。


    ***清单 4-62.** testPasswordsDoNotMatch 测试用例*


    `void testPasswordsDoNotMatch() {`

    `  request.method = ''POST''`


    `  params.login = ''henry''`

    `  params.password = ''password''`

    `  params.confirm = ''wrongPassword''`

    `  params.firstName = ''Henry''`

    `  params.lastName = ''Rollins''`


    `  def model = controller.register()`

    `  def user = model.user`


    `  assert user.hasErrors()`

    `  assert ''user.password.dontmatch'' ==`

    `         user.errors[''password''].code`

    `}`


    请注意 `testPasswordsMatch` 测试用例是如何用两个不同的密码填充 `mockParams` 对象的。然后，你调用了 `register`
    操作，该操作应拒绝新的 `User` 实例，并返回 `user.password.dontmatch` 错误码。测试的最后一行通过检查 `User` 实例上的
    `errors` 对象来断言这种情况：


    `assert ''user.password.dontmatch'' ==`

    `       user.errors[''password''].code`


    接下来要考虑的场景是用户向注册表单中输入无效数据。你可能需要多个测试来检查不同类型的数据输入。请记住，测试写得再多也不为过！作为一个潜在场景的示例，清单 4-63
    展示了一个测试，用于检查用户是否输入了空白数据或未输入数据。


    ***清单 4-63.** testRegistrationFailed 测试*


    `void testRegistrationFailed() {`

    `  request.method = ''POST''`


    `  params.login = ''''`


    `  def model = controller.register()`

    `  def user = model.user`


    `  assert user.hasErrors()`

    `  assert session.user == null`

    `  assert ''blank'' == user.errors[''login''].code`

    `  assert ''nullable'' == user.errors[''firstName''].code`

    `  assert ''nullable'' == user.errors[''lastName''].code`

    `}`


    再次，你可以看到使用 `errors` 对象来检查是否违反了相应的约束。最后，你需要确保两件事来测试注册成功：


    > *   `User` 实例已被放入 `session` 对象中。

    > *   请求已被正确重定向。


    清单 4-64 展示了一个测试成功用户注册的测试用例示例。


    ***清单 4-64.** 测试成功注册*


    `void testRegistrationSuccess() {`

    `  request.method = ''POST''`


    `  params.login = ''henry''`

    `  params.password = ''password''`

    `  params.confirm = ''password''`

    `  params.firstName = ''Henry''`

    `  params.lastName = ''Rollins''`


    `  controller.register()`


    `  assert ''/store'' == response.redirectedUrl`

    `  assert session.user != null`

    `}`


    测试编写完成后，现在我们来思考如何允许用户登录 gTunes 应用程序。


    #### 允许用户登录


    由于你已经添加了登录表单，接下来需要做的就是实现控制器逻辑。登录过程非常适合使用命令对象，因为它涉及捕获信息（登录名和密码），而无需实际持久化数据。


    在这个例子中，你将创建一个 `LoginCommand` 来封装登录逻辑，让控制器操作只处理简单的事情。清单 4-65 展示了 `LoginCommand`
    类的代码，该类与 `UserController` 类定义在同一个文件中。


    ***清单 4-65.** LoginCommand*


    `class LoginCommand {`

    `  String login`

    `  String password`

    `  private u`

    `  User getUser() {`

    `                if(!u && login) {`

    `                  u = User.findByLogin(login, [fetch:[purchasedSongs:''join'']])`

    `                }`

    `                return u`

    `  }`

    `  static constraints = {`

    `                login blank:false, validator:{ val, obj ->`

    `                    if(!obj.user)`

    `                      return "user.not.found"`

    `                }`

    `             password blank:false, validator:{ val, obj ->                                          `

    `                    if(obj.user && obj.user.password != val)`

    `                      return "user.password.invalid"`

    `                }`

    `  }`

    `}`


    `LoginCommand` 定义了两个属性，用于捕获名为 `login` 和 `password` 的请求参数。然而，代码的主要逻辑在于约束定义。首先，`blank`
    约束确保登录名和/或密码不能留空。其次，`login` 参数上的自定义验证器检查用户是否存在：


    `login blank:false, validator:{ val, cmd ->`

    `    if(!cmd.user)`

    `        return "user.not.found"`

    `}`


    自定义的 `validator` 约束接受一个闭包，该闭包接收两个参数：值和 `LoginCommand` 实例。闭包内的代码调用 `LoginCommand`
    的 `getUser()` 方法来检查用户是否存在。如果用户不存在，代码返回一个错误码——“user.not.found”——表示发生了错误。


    在 `password` 参数上，另一个自定义的 `validator` 约束检查用户是否指定了正确的密码：


    `password blank:false, validator:{ val, cmd ->`

    `    if(cmd.user && cmd.user.password != val) return "user.password.invalid" }`


    这里，验证器再次使用 `LoginCommand` 的 `getUser()` 方法，将实际 `User` 实例的密码与 `LoginCommand` 持有的
    `password` 属性值进行比较。如果密码不正确，则返回一个 `error` 码，触发一个错误。你可以通过将相应的消息添加到 `grails-app/i18n/messages.properties`
    文件中，为 `LoginCommand` 返回的每个自定义错误添加合适的消息：


    `user.not.found=User not found`

    `user.password.invalid=Incorrect password`


    完成这些后，是时候通过在 `UserController` 中实现 `login` 操作来使用 `LoginCommand` 了。清单 4-66 展示了 `login`
    操作的代码。


    ***清单 4-66.** login 操作*


    `def login(LoginCommand cmd) {`

    `  if(request.method == ''POST'') {`

    `    if(!cmd.hasErrors()) {`

    `      session.user = cmd.getUser()`

    `      redirect controller:''store''`

    `    } else {`

    `      render view:''/store/index'', model:[loginCmd:cmd]`

    `    }`

    `  } else {`

    `    render view:''/store/index''`

    `  }`

    `}`


    有了命令对象，控制器只需要做它最擅长的事情：发出重定向和渲染视图。同样，与 `register` 操作类似，登录处理仅在收到 `POST` 请求时启动。然后，如果命令对象没有错误，用户将被放入会话中，请求被重定向到
    `StoreController`。

