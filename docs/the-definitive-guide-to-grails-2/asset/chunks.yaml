- fmt: "### Understanding Transient Properties\n\nBy default, every property in a\
    \ domain class is persisted to the database. For most properties, this is the\
    \ right thing to do. However, occasionally a domain class will define properties\
    \ that do not need to be persisted. Grails provides a simple mechanism for specifying\
    \ which properties in a domain class should not be persisted. This mechanism is\
    \ to define a public static property, `transients`, and assign to that property\
    \ a value that is a list of strings. Those strings represent the names of the\
    \ class’s properties, which should be treated as transient and not saved to the\
    \ database (see [Listing 3-7](#Chapter03.html#list_3_7)).\n\n**Listing 3-7.**\
    \ A Transient Property in the Company Domain Class\n\n```\nclass Company {\n \
    \   String name\n    Integer numberOfEmployees\n    BigDecimal salaryPaidYTD\n\
    \n    static transients = ['salaryPaidYTD']\n}\n```\n\nIn [Listing 3-7](#Chapter03.html#list_3_7),\
    \ the `salaryPaidYTD` property has been flagged as transient and will not be saved\
    \ to the database. Note that the default generated schema for this domain class—the\
    \ company table—does not contain a column for the `salaryPaidYTD` property (see\
    \ [Listing 3-8](#Chapter03.html#list_3_8)).\n\n**Listing 3-8.** The Company Table\n\
    \n![Image](images/9781430243779_UnFig03-02.jpg)\n\nNot all persistent properties\
    \ necessarily correspond to a field in a domain class. For example, if a domain\
    \ class has a method called `getName()` and a method called `setName()`, then\
    \ that domain class has a persistent property called `name`. It doesn’t matter\
    \ that the class doesn’t have a field called “name.” Grails will handle that situation\
    \ by creating the appropriate column in the database to store the value of the\
    \ `name` property. But you can use the `transients` property to tell Grails not\
    \ to do that if the property really should not be persisted, as in [Listing 3-9](#Chapter03.html#list_3_9).\n\
    \n**Listing 3-9.** A Transient Property in the Company Domain Class\n\n```\nclass\
    \ Company {\n    BigDecimal cash\n    BigDecimal receivables\n    BigDecimal capital\n\
    \n    BigDecimal getNetWorth() {\n        cash + receivables + capital\n    }\n\
    \n    static transients = ['netWorth']\n}\n```\n\nAnother approach for managing\
    \ the `netWorth` property is to define it as a derived property. Derived properties\
    \ are read-only persistent properties whose values are derived by the database\
    \ at the time of retrieval. Because the values are derived, there is no corresponding\
    \ column in the database to store the value. Instead, a formula in the form of\
    \ an SQL expression, which represents how the database should derive the value,\
    \ must be provided. In the case of the `netWorth` property, the value could be\
    \ derived in the database by adding the values of the `CASH`, `RECEIVABLES`, and\
    \ `CAPITAL` columns in the table. [Listing 3-10](#Chapter03.html#list_3_10) shows\
    \ what this would look like.\n\n**Listing 3-10.** A Derived Property in the Company\
    \ Domain Class\n\n```\nclass Company {\n    BigDecimal cash\n    BigDecimal receivables\n\
    \    BigDecimal capital\n    BigDecimal netWorth\n\n    static mapping = {\n \
    \       netWorth formula: 'CASH + RECEIVABLES + CAPITAL'\n    }\n}\n```\n\nNote\
    \ that the formula expressed there is SQL that must be understandable by the database.\
    \ It is not code that will be parsed and executed in the application. It will\
    \ be executed in the database, and SQL is not necessarily portable across relational\
    \ databases. Defining derived properties, such as this one, means potentially\
    \ giving up some database portability. For many applications that will not be\
    \ a problem, but it is something to be aware of when the decision is made to use\
    \ a derived property.\n\n### Customizing Your Database Mapping\n\nAs you’ve seen,\
    \ Grails does a good job of mapping your domain model to a relational database\
    \ without requiring any kind of mapping file. Many developer productivity gains\
    \ that Grails offers arise from its Convention over Configuration (CoC) features.\
    \ Whenever the conventions preferred by Grails are inconsistent with your requirements,\
    \ Grails provides a simple way for you to work with those scenarios. The custom\
    \ database mapping DSL in Grails falls in this category.\n\nGrails provides an\
    \ ORM DSL for expressing your domain mapping to help you deal with scenarios in\
    \ which the Grails defaults will not work for you. A common use case for taking\
    \ advantage of the ORM DSL is one where a Grails application is being developed\
    \ on top of an existing schema that is not entirely compatible with the default\
    \ domain-class mappings of Grails.\n\nConsider a simple `Person` class (see [Listing\
    \ 3-11](#Chapter03.html#list_3_11)).\n\n**Listing 3-11.** The Person Domain Class\n\
    \n```\nclass Person {\n    String firstName\n    String lastName\n    Integer\
    \ age\n}\n```\n\nThe default mapping in MySQL for that class will correspond to\
    \ a schema that looks like [Listing 3-12](#Chapter03.html#list_3_12).\n\n**Listing\
    \ 3-12.** The Default Person Table\n\n![Image](images/9781430243779_unFig03-03.jpg)\n\
    \nThat works perfectly if you have a greenfield application that doesn’t need\
    \ to map to an existing schema. If the application does need to map to an existing\
    \ schema, the schema will probably not match up exactly with the Grails defaults.\
    \ Imagine that a schema does exist and that it looks something like [Listing 3-13](#Chapter03.html#list_3_13).\n\
    \n**Listing 3-13.** A Legacy Table Containing Person Data\n\n![Image](images/9781430243779_unFig03-04.jpg)\n\
    \nNotice that the table contains no version column and all the column names are\
    \ prefixed with `person_`. You’ll find it straightforward to map to a schema like\
    \ that using the Grails ORM DSL. But to take advantage of the ORM DSL, your domain\
    \ class must declare a public property called `mapping` and assign a closure to\
    \ the property (see [Listing 3-14](#Chapter03.html#list_3_14)).\n\n**Listing 3-14.**\
    \ Custom Mapping for the Person Domain Class\n\n```\nclass Person {\n    String\
    \ firstName\n    String lastName\n    Integer age\n\n    static mapping = {\n\
    \        id column:'person_id'\n        firstName column:'person_first_name'\n\
    \        lastName column:'person_last_name'\n        age column:'person_age'\n\
    \        version false\n    }\n}\n```\n\nThe example in [Listing 3-13](#Chapter03.html#list_3_13)\
    \ defines column names for each of the properties and turns off the `version`\
    \ property, which Grails uses for optimistic locking. (Optimistic locking is discussed\
    \ in more detail in [Chapter 9](#Chapter09.html).) These are just a couple of\
    \ the features that the ORM DSL supports.\n\nThe default table name for persisting\
    \ instances of a Grails domain class is the name of the domain class. `Person`\
    \ objects are stored in a `person` table and `Company` objects are stored in a\
    \ `company` table. If `Person` objects need to be stored in a `people` table,\
    \ the ORM DSL allows that. [Listing 3-15](#Chapter03.html#list_3_15) includes\
    \ the necessary mapping code to store `Person` instances in the `people` table.\n\
    \n**Listing 3-15.** A Custom Table Mapping for the Person Domain Class\n\n```\n\
    class Person {\n    String firstName\n    String lastName\n    Integer age\n\n\
    \    static mapping = {\n          table 'people'\n    }\n}\n```\n\nWe’ll cover\
    \ custom database mapping in more detail in [Chapter 9](#Chapter09.html)."
  raw: '### Understanding Transient Properties


    By default, every property in a domain class is persisted to the database. For
    most properties, this is the right thing to do. However, occasionally a domain
    class will define properties that do not need to be persisted. Grails provides
    a simple mechanism for specifying which properties in a domain class should not
    be persisted. This mechanism is to define a public static property, `transients`,
    and assign to that property a value that is a list of strings. Those strings represent
    the names of the class’s properties, which should be treated as transient and
    not saved to the database (see [Listing 3-7](#Chapter03.html#list_3_7)).


    ***Listing 3-7.** A Transient Property in the Company Domain Class*


    `class Company {`

    `    String name`

    `    Integer numberOfEmployees`

    `    BigDecimal salaryPaidYTD`


    `    static transients = [''salaryPaidYTD'']`

    `}`


    In [Listing 3-7](#Chapter03.html#list_3_7), the `salaryPaidYTD` property has been
    flagged as transient and will not be saved to the database. Note that the default
    generated schema for this domain class—the company table—does not contain a column
    for the `salaryPaidYTD` property (see [Listing 3-8](#Chapter03.html#list_3_8)).


    ***Listing 3-8.** The Company Table*


    ![Image](images/9781430243779_UnFig03-02.jpg)


    Not all persistent properties necessarily correspond to a field in a domain class.
    For example, if a domain class has a method called `getName()` and a method called
    `setName()`, then that domain class has a persistent property called `name`. It
    doesn’t matter that the class doesn’t have a field called “name.” Grails will
    handle that situation by creating the appropriate column in the database to store
    the value of the `name` property. But you can use the transients property to tell
    Grails not to do that if the property really should not be persisted, as in [Listing
    3-9](#Chapter03.html#list_3_9).


    ***Listing 3-9.** A Transient Property in the Company Domain Class*


    `class Company {`

    `    BigDecimal cash`

    `    BigDecimal receivables`

    `    BigDecimal capital`


    `    BigDecimal getNetWorth() {`

    `        cash + receivables + capital`

    `    }`


    `    static transients = [''netWorth'']`

    `}`


    Another approach for managing the `netWorth` property is to define it as a derived
    property. Derived properties are read-only persistent properties whose values
    are derived by the database at the time of retrieval. Because the values are derived,
    there is no corresponding column in the database to store the value. Instead,
    a formula in the form of an SQL expression, which represents how the database
    should derive the value, must be provided. In the case of the `netWorth` property,
    the value could be derived in the database by adding the values of the `CASH`,
    `RECEIVABLES`, and `CAPITAL` columns in the table. [Listing 3-10](#Chapter03.html#list_3_10)
    shows what this would look like.


    ***Listing 3-10.** A Derived Property in the Company Domain Class*


    `class Company {`

    `    BigDecimal cash`

    `    BigDecimal receivables`

    `    BigDecimal capital`

    `    BigDecimal netWorth`


    `    static mapping = {`

    `        netWorth formula: ''CASH + RECEIVABLES + CAPITAL''`

    `    }`

    `}`


    Note that the formula expressed there is SQL that must be understandable by the
    database. It is not code that will be parsed and executed in the application.
    It will be executed in the database, and SQL is not necessarily portable across
    relational databases. Defining derived properties, such as this one, means potentially
    giving up some database portability. For many applications that will not be a
    problem, but it is something to be aware of when the decision is made to use a
    derived property.


    ### Customizing Your Database Mapping


    As you’ve seen, Grails does a good job of mapping your domain model to a relational
    database without requiring any kind of mapping file. Many developer productivity
    gains that Grails offers arise from its Convention over Configuration (CoC) features.
    Whenever the conventions preferred by Grails are inconsistent with your requirements,
    Grails provides a simple way for you to work with those scenarios. The custom
    database mapping DSL in Grails falls in this category.


    Grails provides an ORM DSL for expressing your domain mapping to help you deal
    with scenarios in which the Grails defaults will not work for you. A common use
    case for taking advantage of the ORM DSL is one where a Grails application is
    being developed on top of an existing schema that is not entirely compatible with
    the default domain-class mappings of Grails.


    Consider a simple `Person` class (see [Listing 3-11](#Chapter03.html#list_3_11)).


    ***Listing 3-11.** The Person Domain Class*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`

    `}`


    The default mapping in MySQL for that class will correspond to a schema that looks
    like [Listing 3-12](#Chapter03.html#list_3_12).


    ***Listing 3-12.** The Default Person Table*


    ![Image](images/9781430243779_unFig03-03.jpg)


    That works perfectly if you have a greenfield application that doesn’t need to
    map to an existing schema. If the application does need to map to an existing
    schema, the schema will probably not match up exactly with the Grails defaults.
    Imagine that a schema does exist and that it looks something like [Listing 3-13](#Chapter03.html#list_3_13).


    ***Listing 3-13.** A Legacy Table Containing Person Data*


    ![Image](images/9781430243779_unFig03-04.jpg)


    Notice that the table contains no version column and all the column names are
    prefixed with `person_`. You’ll find it straightforward to map to a schema like
    that using the Grails ORM DSL. But to take advantage of the ORM DSL, your domain
    class must declare a public property called `mapping` and assign a closure to
    the property (see [Listing 3-14](#Chapter03.html#list_3_14)).


    ***Listing 3-14.** Custom Mapping for the Person Domain Class*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`


    `    static mapping = {`

    `        id column:''person_id''`

    `        firstName column:''person_first_name''`

    `        lastName column:''person_last_name''`

    `        age column:''person_age''`

    `        version false`

    `    }`

    `}`


    The example in [Listing 3-13](#Chapter03.html#list_3_13) defines column names
    for each of the properties and turns off the `version` property, which Grails
    uses for optimistic locking. (Optimistic locking is discussed in more detail in
    [Chapter 9](#Chapter09.html).) These are just a couple of the features that the
    ORM DSL supports.


    The default table name for persisting instances of a Grails domain class is the
    name of the domain class. `Person` objects are stored in a `person` table and
    `Company` objects are stored in a `company` table. If `Person` objects need to
    be stored in a `people` table, the ORM DSL allows that. [Listing 3-15](#Chapter03.html#list_3_15)
    includes the necessary mapping code to store `Person` instances in the `people`
    table.


    ***Listing 3-15.** A Custom Table Mapping for the Person Domain Class*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`


    `    static mapping = {`

    `          table ''people''`

    `    }`

    `}`


    We’ll cover custom database mapping in more detail in [Chapter 9](#Chapter09.html).'
  trans: '

    ### 理解瞬态属性


    默认情况下，领域类中的每个属性都会被持久化到数据库中。对于大多数属性来说，这是正确的做法。然而，有时领域类会定义一些不需要持久化的属性。Grails 提供了一种简单的机制来指定领域类中哪些属性不应被持久化。这种机制是定义一个公共静态属性
    `transients`，并为其赋予一个字符串列表的值。这些字符串代表类中应被视为瞬态且不保存到数据库的属性的名称（参见清单 3-7）。


    ***清单 3-7.** Company 领域类中的瞬态属性*


    `class Company {`

    `    String name`

    `    Integer numberOfEmployees`

    `    BigDecimal salaryPaidYTD`


    `    static transients = [''salaryPaidYTD'']`

    `}`


    在清单 3-7 中，`salaryPaidYTD` 属性已被标记为瞬态，不会保存到数据库。请注意，此领域类默认生成的模式（即 company 表）不包含 `salaryPaidYTD`
    属性的列（参见清单 3-8）。


    ***清单 3-8.** Company 表*


    ![Image](img/9781430243779_UnFig03-02.jpg)


    并非所有持久化属性都必然对应领域类中的一个字段。例如，如果一个领域类有一个名为 `getName()` 的方法和一个名为 `setName()` 的方法，那么该领域类就有一个名为
    `name` 的持久化属性。该类是否有一个名为“name”的字段并不重要。Grails 会通过在数据库中创建适当的列来存储 `name` 属性的值来处理这种情况。但如果该属性确实不应被持久化，你可以使用
    `transients` 属性告诉 Grails 不要这样做，如清单 3-9 所示。


    ***清单 3-9.** Company 领域类中的瞬态属性*


    `class Company {`

    `    BigDecimal cash`

    `    BigDecimal receivables`

    `    BigDecimal capital`


    `    BigDecimal getNetWorth() {`

    `        cash + receivables + capital`

    `    }`


    `    static transients = [''netWorth'']`

    `}`


    管理 `netWorth` 属性的另一种方法是将其定义为派生属性。派生属性是只读的持久化属性，其值在检索时由数据库派生得出。由于值是派生出来的，数据库中就没有相应的列来存储该值。相反，必须提供一个
    SQL 表达式形式的公式，该公式表示数据库应如何派生该值。对于 `netWorth` 属性，可以通过将表中 `CASH`、`RECEIVABLES` 和 `CAPITAL`
    列的值相加来在数据库中派生其值。清单 3-10 展示了其实现方式。


    ***清单 3-10.** Company 领域类中的派生属性*


    `class Company {`

    `    BigDecimal cash`

    `    BigDecimal receivables`

    `    BigDecimal capital`

    `    BigDecimal netWorth`


    `    static mapping = {`

    `        netWorth formula: ''CASH + RECEIVABLES + CAPITAL''`

    `    }`

    `}`


    请注意，此处表达的公式是数据库必须能够理解的 SQL。它不是将在应用程序中解析和执行的代码。它将在数据库中执行，并且 SQL 在关系数据库之间不一定可移植。定义像这样的派生属性意味着可能放弃一定的数据库可移植性。对于许多应用程序来说，这不会成为问题，但在决定使用派生属性时需要意识到这一点。


    ### 自定义数据库映射


    如你所见，Grails 在将领域模型映射到关系数据库方面做得很好，无需任何映射文件。Grails 提供的许多开发人员生产力提升都源于其“约定优于配置”（CoC）特性。每当
    Grails 偏好的约定与你的需求不一致时，Grails 都提供了一种简单的方法来处理这些情况。Grails 中的自定义数据库映射 DSL 就属于这一类。


    Grails 提供了一个 ORM DSL 来表达你的领域映射，以帮助你处理 Grails 默认设置无法满足你的情况。利用 ORM DSL 的一个常见用例是，Grails
    应用程序构建在现有模式之上，而该模式与 Grails 的默认领域类映射不完全兼容。


    考虑一个简单的 `Person` 类（参见清单 3-11）。


    ***清单 3-11.** Person 领域类*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`

    `}`


    在 MySQL 中，该类的默认映射将对应一个如清单 3-12 所示的模式。


    ***清单 3-12.** 默认的 Person 表*


    ![Image](img/9781430243779_unFig03-03.jpg)


    如果你有一个不需要映射到现有模式的绿地应用程序，这完全没问题。如果应用程序确实需要映射到现有模式，那么该模式很可能与 Grails 的默认设置不完全匹配。假设存在一个模式，它看起来像清单
    3-13 所示。


    ***清单 3-13.** 包含 Person 数据的遗留表*


    ![Image](img/9781430243779_unFig03-04.jpg)


    请注意，该表不包含版本列，并且所有列名都以 `person_` 为前缀。你会发现使用 Grails ORM DSL 映射到这样的模式非常简单。但要利用 ORM
    DSL，你的领域类必须声明一个名为 `mapping` 的公共属性，并为其分配一个闭包（参见清单 3-14）。


    ***清单 3-14.** Person 领域类的自定义映射*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`


    `    static mapping = {`

    `        id column:''person_id''`

    `        firstName column:''person_first_name''`

    `        lastName column:''person_last_name''`

    `        age column:''person_age''`

    `        version false`

    `    }`

    `}`


    清单 3-13 中的示例为每个属性定义了列名，并关闭了 Grails 用于乐观锁定的 `version` 属性。（乐观锁定将在第 9 章中更详细地讨论。）这些只是
    ORM DSL 支持的部分功能。


    用于持久化 Grails 领域类实例的默认表名是领域类的名称。`Person` 对象存储在 `person` 表中，`Company` 对象存储在 `company`
    表中。如果 `Person` 对象需要存储在 `people` 表中，ORM DSL 也支持这样做。清单 3-15 包含了将 `Person` 实例存储到
    `people` 表所需的映射代码。


    ***清单 3-15.** Person 领域类的自定义表映射*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`


    `    static mapping = {`

    `          table ''people''`

    `    }`

    `}`


    我们将在第 9 章中更详细地介绍自定义数据库映射。

