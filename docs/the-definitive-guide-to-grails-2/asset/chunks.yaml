- fmt: "### The `textField` Tag\n\nFirst up is the `<g:textField>` tag. Unsurprisingly,\
    \ it handles entry of textual values. The `<g:textField>` tag takes a `name` attribute,\
    \ representing the name of the parameter to send as part of the form submission,\
    \ along with the associated `value` attribute, as shown in [Listing 5-22](#Chapter05.html#list_5_22).\n\
    \n**Listing 5-22.** Example `<g:textField>` Usage\n\n```\n<g:form action=\"register\"\
    \ name=\"registerForm\">\n...\n  <g:textField name=\"login\" value=\"${user?.login}\"\
    ></g:textField>\n  ...\n</g:form>\n```\n\nThe previous `<g:textField>` definition\
    \ will result in HTML input such as the following:\n\n```\n<input type=\"text\"\
    \ name=\"login\" value=\"A Login Name\" />\n```\n\n### Check Boxes and Radio Buttons\n\
    \nCheck boxes are often used as a representation of Boolean values from a domain\
    \ model. Unfortunately, many frameworks place a lot of burden on the developer\
    \ both to render check boxes in their correct state and to handle the server-side\
    \ processing as to whether the boxes are checked.\n\nGrails, on the other hand,\
    \ provides a `<g:checkBox>` tag that accepts a Boolean `value` attribute and will\
    \ render the tag in its correct state. In addition, Grails transparently handles\
    \ check box processing through its automatic type conversion and data binding\
    \ facility (discussed in [Chapter 7](#Chapter07.html)), as shown in [Listing 5-23](#Chapter05.html#list_5_23).\n\
    \n**Listing 5-23.** Example `<g:checkBox>` Tag\n\n```\n<g:checkBox name=\"aBooleanValue\"\
    \ value=\"${true}\" />\n```\n\nClosely related to check boxes are radio buttons,\
    \ which are used in groups, because they represent a one-from-many interaction.\
    \ For example, two radio buttons must each be given the same name to be placed\
    \ in the same group, and only one button can be selected at a time.\n\nGrails\
    \ has a `<g:radio>` tag that provides a convenient way to define radio buttons\
    \ and also to calculate that one has been checked.\n\nIn [Listing 5-24](#Chapter05.html#list_5_24),\
    \ two radio buttons are defined in the same group. The one that has been checked\
    \ is calculated using the hypothetical `someValue` variable.\n\n**Listing 5-24.**\
    \ Example `<g:radio>` Tags\n\n```\n<p>\n<g:radio name=\"myGroup\" value=\"1\"\
    \ checked=\"${someValue == 1}\" /> Radio 1 </p>\n<p>\n<g:radio name=\"myGroup\"\
    \ value=\"2\" checked=\"${someValue == 2}\" /> Radio 2 </p>\n```\n\n### Handling\
    \ Lists of Values\n\nWhen dealing with enumerated values (those that can be only\
    \ a specific set of values), it is often useful to constrain what the user can\
    \ enter by presenting an HTML select box as opposed to a free text-entry field.\n\
    \nTo make creating selects much simpler, Grails provides a `<g:select>` tag that\
    \ accepts a list or range of values via a `from` attribute. The currently selected\
    \ value can be set with the `value` attribute.\n\nThe example in [Listing 5-25](#Chapter05.html#list_5_25)\
    \ creates a select to choose a genre.\n\n**Listing 5-25.** Example `<g:select>`\
    \ Usage\n\n```\n<g:select name=\"genre\"\n       from=\"${['Rock', 'Blues', 'Jazz']}\"\
    \n       value=\"${album.genre}\" />\n```\n\nThe following is the resulting HTML\
    \ select, given an album with a genre of `Rock`:\n\n```\n<select name=\"genre\"\
    >\n  <option value=\"Rock\" selected=\"selected\">Rock</option>\n  <option value=\"\
    Blues\">Blues</option>\n  <option value=\"Jazz\">Jazz</option>\n</select>\n```\n\
    \nClearly, going just by the two examples, using the `<g:select>` tag can save\
    \ writing a few lines of code. Its usefulness extends further, thanks to two additional\
    \ attributes that allow `<g:select>` to be used in combination with object graphs\
    \ and relationships.\n\nThe first is the `optionKey` attribute, which allows customization\
    \ of the `value` attribute within each option tag of an HTML select. It may seem\
    \ a little odd that an `optionKey` attribute customizes an attribute called `value`,\
    \ but if you think of each `<option>` element as a key/value pair, it begins to\
    \ make sense. The `optionValue` attribute, on the other hand, allows customization\
    \ of the value that appears within the body of each option tag.\n\nUsing these\
    \ two in combination, for example, allows you to create a select from a list of\
    \ domain object instances, as shown in [Listing 5-26](#Chapter05.html#list_5_26).\n\
    \n**Listing 5-26.** Using `<g:select>` on a List of Domain Objects\n\n```\n<g:select\
    \ name=\"album.id\" from=\"${Album.list()}\"\n          optionKey=\"id\" optionValue=\"\
    title\"/>\n```\n\nThe previous example takes a list of albums and creates an HTML\
    \ select where the `value` attribute within the option tag is the `id` of the\
    \ `Album` and the value within the body of each option is the `title` property\
    \ of each `Album`. The result will resemble the following:\n\n```\n<select name=\"\
    album.id\">\n   <option value=\"1\">Undertow</option>\n   ...\n</select>\n```\n\
    \nIn addition to the general-purpose `<g:select>` tag, Grails provides a few others\
    \ that may come in handy. The `<g:currencySelect>`, `<g:localeSelect>`, and `<g:timeZoneSelect>`\
    \ tags are convenience tags for working with `java.util.Currency`, `java.util.Locale`\
    \ and `java.util.TimeZone` instances, respectively.\n\nUnlike the `<g:select>`\
    \ tag, each of these takes only two attributes: a `name` attribute for the name\
    \ of the select and a `value` attribute, which takes an instance of one of the\
    \ aforementioned classes, as shown in [Listing 5-27](#Chapter05.html#list_5_27).\n\
    \n**Listing 5-27.** Currency, Locale, and Time Zone Selects\n\n```\n<%-- Sets\
    \ the currency to the currency of the Locale within the request --%>\n<g:currencySelect\n\
    \       name=\"myCurrency\"\n        value=\"${ Currency.getInstance(request.locale)\
    \ }\" />\n<%-- Sets the locale to the locale of the request --%>\n<g:localeSelect\
    \ name=\"myLocale\" value=\"${ request.locale }\" />\n<%-- Sets value to default\
    \ time zone --%>\n<g:timeZoneSelect name=\"myTimeZone\" value=\"${ TimeZone.getDefault()\
    \ }\" />\n```\n\n### Working with Dates\n\nDates can be represented in a number\
    \ of ways, from drop-down selects to advanced JavaScript calendars. One of the\
    \ more common ways, because of its nonreliance on JavaScript, is use of a combination\
    \ of HTML select boxes to specify date and time, with each select representing\
    \ a time unit: year, month, day, minute, hour, and second.\n\nGrails provides\
    \ support for creating such fields (and automatically performs type conversion\
    \ onto date instances) using the `<g:datePicker>` tag (see [Listing 5-28](#Chapter05.html#list_5_28)).\n\
    \n**Listing 5-28.** A Basic Date Picker\n\n```\n<g:datePicker name=\"myDate\"\
    \ value=\"${new Date()}\" />\n```\n\nAt its most basic level, the `<g:datePicker>`\
    \ tag takes a `name` attribute and a `value` attribute as a `java.util.Date` instance.\
    \ In the previous example, it creates a `<g:datePicker>` for the current time,\
    \ which consists of selects for the year, month, day, minute, hour, *and* second.\n\
    \nClearly, it is not always useful to have that level of precision, so the `<g:datePicker>`\
    \ tag provides the aptly named `precision` attribute for changing how many selects\
    \ it renders. For example, to render only the year, month, and day selects, the\
    \ following will suffice:\n\n```\n<g:datePicker name=\"myDate\" value=\"${new\
    \ Date()}\" precision=\"day\" />\n```\n\nAll in all, Grails puts quite a few tools\
    \ in your toolbox for simplifying the creation of forms. Given that forms allow\
    \ users to enter data, often in a free-form fashion, implementing form handling\
    \ is often one of the most challenging and error-prone activities in web application\
    \ development.\n\nTo ensure data integrity, form validation is necessary. It can\
    \ be achieved on the client side using JavaScript. However, client-side validation\
    \ should only ever be seen as a usability enhancement, not a replacement for server-side\
    \ validation. Luckily, Grails provides solid support for performing validation\
    \ with specialized validation and error-handling tags."
  raw: '##### The textField Tag


    First up is the `<g:textField>` tag. Unsurprisingly, it handles entry of textual
    values. The `<g:textField>` tag takes a `name` attribute, representing the name
    of the parameter to send as part of the form submission, along with the associated
    `value` attribute, as shown in [Listing 5-22](#Chapter05.html#list_5_22).


    ***Listing 5-22.** Example <g:textField> Usage*


    `<g:form action="register" name="registerForm">`

    `...`

    `  <g:textField name="login" value="${user?.login}"></g:textField>`

    `  ...`

    `</g:form>`


    The previous `<g:textField>` definition will result in HTML input such as the
    following:


    `<input type="text" name="login" value="A Login Name" />`


    ##### Check Boxes and Radio Buttons


    Check boxes are often used as a representation of Boolean values from a domain
    model. Unfortunately, many frameworks place a lot of burden on the developer both
    to render check boxes in their correct state and to handle the server-side processing
    as to whether the boxes are checked.


    Grails, on the other hand, provides a `<g:checkBox>` tag that accepts a Boolean
    `value` attribute and will render the tag in its correct state. In addition, Grails
    transparently handles check box processing through its automatic type conversion
    and data binding facility (discussed in [Chapter 7](#Chapter07.html)), as shown
    in [Listing 5-23](#Chapter05.html#list_5_23).


    ***Listing 5-23.** Example <g:checkBox> Tag*


    `<g:checkBox name="aBooleanValue" value="${true}" />`


    Closely related to check boxes are radio buttons, which are used in groups, because
    they represent a one-from-many interaction. For example, two radio buttons must
    each be given the same name to be placed in the same group, and only one button
    can be selected at a time.


    Grails has a `<g:radio>` tag that provides a convenient way to define radio buttons
    and also to calculate that one has been checked.


    In [Listing 5-24](#Chapter05.html#list_5_24), two radio buttons are defined in
    the same group. The one that has been checked is calculated using the hypothetical
    `someValue` variable.


    ***Listing 5-24.** Example <g:radio> Tags*


    `<p>`

    `<g:radio name="myGroup" value="1" checked="${someValue == 1}" /> Radio 1 </p>`

    `<p>`

    `<g:radio name="myGroup" value="2" checked="${someValue == 2}" /> Radio 2 </p>`


    ##### Handling Lists of Values


    When dealing with enumerated values (those that can be only a specific set of
    values), it is often useful to constrain what the user can enter by presenting
    an HTML select box as opposed to a free text-entry field.


    To make creating selects much simpler, Grails provides a `<g:select>` tag that
    accepts a list or range of values via a `from` attribute. The currently selected
    value can be set with the `value` attribute.


    The example in [Listing 5-25](#Chapter05.html#list_5_25) creates a select to choose
    a genre.


    ***Listing 5-25.** Example <g:select> Usage*


    `<g:select name="genre"`

    `       from="${[''Rock'', ''Blues'', ''Jazz'']}"`

    `       value="${album.genre}" />`


    The following is the resulting HTML select, given an album with a genre of `Rock`:


    `<select name="genre">`

    `  <option value="Rock" selected="selected">Rock</option>`

    `  <option value="Blues">Blues</option>`

    `  <option value="Jazz">Jazz</option>`

    `</select>`


    Clearly, going just by the two examples, using the `<g:select>` tag can save writing
    a few lines of code. Its usefulness extends further, thanks to two additional
    attributes that allow `<g:select>` to be used in combination with object graphs
    and relationships.


    The first is the `optionKey` attribute, which allows customization of the `value`
    attribute within each option tag of an HTML select. It may seem a little odd that
    an `optionKey` attribute customizes an attribute called `value`, but if you think
    of each `<option>` element as a key/value pair, it begins to make sense. The `optionValue`
    attribute, on the other hand, allows customization of the value that appears within
    the body of each option tag.


    Using these two in combination, for example, allows you to create a select from
    a list of domain object instances, as shown in [Listing 5-26](#Chapter05.html#list_5_26).


    ***Listing 5-26.** Using <g:select> on a List of Domain Objects*


    `<g:select name="album.id" from="${Album.list()}"`

    `          optionKey="id" optionValue="title"/>`


    The previous example takes a list of albums and creates an HTML select where the
    `value` attribute within the option tag is the `id` of the `Album` and the value
    within the body of each option is the `title` property of each `Album`. The result
    will resemble the following:


    `<select name="album.id">`

    `   <option value="1">Undertow</option>`

    `   ...`

    `</select>`


    In addition to the general-purpose `<g:select>` tag, Grails provides a few others
    that may come in handy. The `<g:currencySelect>`, `<g:localeSelect>`, and `<g:timeZoneSelect>`
    tags are convenience tags for working with `java.util.Currency, java.util.Locale`
    and `java.util.TimeZone` instances, respectively.


    Unlike the `<g:select>` tag, each of these takes only two attributes: a `name`
    attribute for the name of the select and a `value` attribute, which takes an instance
    of one of the aforementioned classes, as shown in [Listing 5-27](#Chapter05.html#list_5_27).


    ***Listing 5-27.** Currency, Locale, and Time Zone Selects*


    `<%-- Sets the currency to the currency of the Locale within the request --%>`

    `<g:currencySelect`

    `       name="myCurrency"`

    `        value="${ Currency.getInstance(request.locale) }" />`

    `<%-- Sets the locale to the locale of the request --%>`

    `<g:localeSelect name="myLocale" value="${ request.locale }" />`

    `<%-- Sets value to default time zone --%>`

    `<g:timeZoneSelect name="myTimeZone" value="${ TimeZone.getDefault() }" />`


    ##### Working with Dates


    Dates can be represented in a number of ways, from drop-down selects to advanced
    JavaScript calendars. One of the more common ways, because of its nonreliance
    on JavaScript, is use of a combination of HTML select boxes to specify date and
    time, with each select representing a time unit: year, month, day, minute, hour,
    and second.


    Grails provides support for creating such fields (and automatically performs type
    conversion onto date instances) using the `<g:datePicker>` tag (see [Listing 5-28](#Chapter05.html#list_5_28)).


    ***Listing 5-28.** A Basic Date Picker*


    `<g:datePicker name="myDate" value="${new Date()}" />`


    At its most basic level, the `<g:datePicker>` tag takes a `name` attribute and
    a `value` attribute as a `java.util.Date` instance. In the previous example, it
    creates a `<g:datePicker>` for the current time, which consists of selects for
    the year, month, day, minute, hour, *and* second.


    Clearly, it is not always useful to have that level of precision, so the `<g:datePicker>`
    tag provides the aptly named `precision` attribute for changing how many selects
    it renders. For example, to render only the year, month, and day selects, the
    following will suffice:


    `<g:datePicker name="myDate" value="${new Date()}" precision="day" />`


    All in all, Grails puts quite a few tools in your toolbox for simplifying the
    creation of forms. Given that forms allow users to enter data, often in a free-form
    fashion, implementing form handling is often one of the most challenging and error-prone
    activities in web application development.


    To ensure data integrity, form validation is necessary. It can be achieved on
    the client side using JavaScript. However, client-side validation should only
    ever be seen as a usability enhancement, not a replacement for server-side validation.
    Luckily, Grails provides solid support for performing validation with specialized
    validation and error-handling tags.'
