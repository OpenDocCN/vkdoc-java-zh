    `        def song = new Song(title: ''Some Title'',`

    `                            artist: ''Some Artist'',`

    `                            duration: 0)`

    `        // 确保验证失败...`

    `        assert !song.validate()`


    `        // 确保 ''min'' 约束失败...`

    `        assert ''min'' == song.errors[''duration'']`


