- fmt: "### Uploads and Data Binding\n\nIn the “Performing Data Binding” section,\
    \ you saw how Grails handles automatic type conversion from strings to other common\
    \ Java types. What we didn’t discuss is how this capability extends to file uploads.\
    \ Grails, through Spring MVC, will automatically bind files uploaded to properties\
    \ of domain-class instances based on the following rules:\n\n> - If the target\
    \ property is a `byte[]`, the file’s bytes will be bound.\n> - If the target property\
    \ is a `String`, the file’s contents as a string will be bound.\n\nSuppose you\
    \ want to allow users of the gTunes application to upload album art for each album.\
    \ By adding a new property to the `Album` domain class called `art` of type `byte[]`,\
    \ you automatically have the capability to save the image data to the database,\
    \ as shown in [Listing 4-40](#Chapter04.html#list_4_40).\n\n**Listing 4-40.**\
    \ Adding the `art` Property\n\n```\nclass Album {\n    byte[] art\n    // ...\n\
    }\n```\n\nTo bind an uploaded file, you simply need to add an `art` upload field\
    \ that matches the `art` property name to a `<g:uploadForm>` tag.\n\n```\n<input\
    \ type=\"file\" name=\"art\" />\n```\n\nThe following line automatically handles\
    \ binding the file to the `Album`:\n\n```\ndef user = new Album( params )\n```\n\
    \nGrails will automatically recognize the request as being multipart, retrieve\
    \ the file, and bind the bytes that make up the file to the `art` byte array property\
    \ of the `Album` class. This capability also extends to usage in conjunction with\
    \ the `properties` property and `bindData` method discussed previously.\n\n###\
    \ Reading the Request InputStream\n\nIf you want to get the text contained within\
    \ the request body, you can use the `inputStream` property of the `request` object,\
    \ as shown in [Listing 4-41](#Chapter04.html#list_4_41).\n\n**Listing 4-41.**\
    \ Reading the Request Body\n\n```\ndef readText() {\n    def text = request.inputStream.text\n\
    \    render \"You sent $text\"\n}\n```\n\n### Writing a Binary Response\n\nYou\
    \ can send a binary response to the client using standard servlet API calls, such\
    \ as the example in [Listing 4-42](#Chapter04.html#list_4_42), which uses the\
    \ `HttpServletResponse` object to output binary data to the response in the form\
    \ of a ZIP file.\n\n**Listing 4-42.** Writing Binary Data to the Response\n\n\
    ```\ndef createZip() {\n    byte[] zip = ... // create the zip from some source\n\
    \    render file: zip\n}\n```\n\nThe code uses the `response` object’s `outputStream`\
    \ property in conjunction with Groovy’s overloaded left shift `<<` operator, which\
    \ is present in a number of objects that output or append to something such as\
    \ `java.io.Writer` and `java.lang.StringBuffer`, to name just a couple.\n\n##\
    \ Using Simple Interceptors\n\nFrequently, it is useful to catch the flow of method\
    \ execution by intercepting calls to certain methods. This concept is the foundation\
    \ of aspect-oriented programming (AOP), which allows the definition of “pointcuts”\
    \ (execution points) to be intercepted. You can then modify the intercepted execution\
    \ through the use of *before*, *after*, and *around* “advice.”\n\nAs the names\
    \ suggest, *before* advice in AOP is code that can be executed before an intercepted\
    \ method call; *after* advice is code that can be executed after an intercepted\
    \ method call. *Around* advice is code that can replace the method call entirely.\
    \ AOP’s great strength is providing support for implementing cross-cutting concerns.\n\
    \nThe example frequently used for this concept is the logging of method calls.\
    \ Although the interception mechanism in Grails by no means provides the same\
    \ power and flexibility in terms of what pointcuts can be intercepted, it does\
    \ fulfill the basic need of intercepting calls to actions on controllers.\n\n\
    Additionally, interceptors are useful if they apply only to a single controller.\
    \ If your requirement spans multiple controllers, you’re better off having a look\
    \ at filters (a topic covered in Chapter 14). With interceptors you can either\
    \ intercept all actions or provide more fine-grained control by specifying which\
    \ actions should be intercepted. Let’s look at a few examples, starting with *before*\
    \ interceptors.\n\n### Before Advice\n\nLuckily, as with the rest of Grails, there\
    \ is no hefty XML configuration or annotation trickery required, thanks to Convention\
    \ over Configuration. All it takes to define a *before* interceptor is to create\
    \ a closure property named `beforeInterceptor` within the target controller, as\
    \ shown in [Listing 4-43](#Chapter04.html#list_4_43).\n\n**Listing 4-43.** A `beforeInterceptor`\n\
    \n```\ndef beforeInterceptor = {\n    log.trace(\"Executing action $actionName\
    \ with params $params\")\n}\n```\n\n[Listing 4-43](#Chapter04.html#list_4_43)\
    \ uses the `log` object to output tracing information before any action within\
    \ the defining controller is executed. This example applies to every action defined\
    \ in the controller. However, you can apply more fine-grained control using interception\
    \ conditions.\n\nAs an example, say you wanted to trace each time a user views\
    \ an `Album` and each user’s country of residence. You could define a `beforeInterceptor`\
    \ as shown in [Listing 4-44](#Chapter04.html#list_4_44).\n\n**Listing 4-44.**\
    \ Using Interception Conditions\n\n```\nclass AlbumController {\n    private trackCountry\
    \ = {\n        def country = request.locale.country\n        def album = Album.get(params.id)\n\
    \        new AlbumVisit(country:country, album:album).save()\n    }\n    def beforeInterceptor\
    \ = [action: trackCountry, only: 'show']\n}\n```\n\nAs you can see from [Listing\
    \ 4-44](#Chapter04.html#list_4_44), you can define a `beforeInterceptor` using\
    \ a map literal. The `action` key defines the code that should execute. In this\
    \ case, we’re using an `only` condition, which means that the interceptor applies\
    \ only to the `show` action. You could change this to an `except` condition, in\
    \ which case the interceptor would apply to all actions *except* the `show` action.\n\
    \nFinally, a `beforeInterceptor` can also halt execution of an action by returning\
    \ `false`. For example, if you want to allow only U.S. visitors to your site,\
    \ you could send a 403 forbidden HTTP code if the user hails from outside the\
    \ United States (see [Listing 4-45](#Chapter04.html#list_4_45)).\n\n**Listing\
    \ 4-45.** Halting Execution with a `beforeInterceptor`\n\n```\nclass AlbumController\
    \ {\n    def beforeInterceptor = {\n        if(request.locale != Locale.US) {\n\
    \            response.sendError 403\n            return false\n        }\n   \
    \ }\n}\n```\n\n### After Advice\n\n*After* advice is defined using the unsurprisingly\
    \ named `afterInterceptor` property that again takes a closure. The first argument\
    \ passed to the closure is the resulting model from the action, as shown in [Listing\
    \ 4-46](#Chapter04.html#list_4_46).\n\n**Listing 4-46.** An `afterInterceptor`\
    \ Example\n\n```\ndef afterInterceptor = { model ->\n    log.trace(\"Executed\
    \ $actionName which resulted in model: $model\")\n}\n```\n\nAgain, in this rather\
    \ trivial example, the logging mechanism traces any action that executes."
  raw: '###### Uploads and Data Binding


    In the “Performing Data Binding” section, you saw how Grails handles automatic
    type conversion from strings to other common Java types. What we didn’t discuss
    is how this capability extends to file uploads. Grails, through Spring MVC, will
    automatically bind files uploaded to properties of domain-class instances based
    on the following rules:


    > *   If the target property is a `byte []`, the file’s bytes will be bound.

    > *   If the target property is a `String`, the file’s contents as a string will
    be bound.


    Suppose you want to allow users of the gTunes application to upload album art
    for each album. By adding a new property to the `Album` domain class called `art`
    of type `byte[]`, you automatically have the capability to save the image data
    to the database, as shown in [Listing 4-40](#Chapter04.html#list_4_40).


    ***Listing 4-40.** Adding the art Property*


    `class Album{`

    `    byte[] art`

    `    // ...`

    `}`


    To bind an uploaded file, you simply need to add an `art` upload field that matches
    the `art` property name to a `<g:uploadForm>` tag.


    `<input type="file" name="art" />`


    The following line automatically handles binding the file to the `Album`:


    `def user = new Album( params )`


    Grails will automatically recognize the request as being multipart, retrieve the
    file, and bind the bytes that make up the file to the `art` byte array property
    of the `Album` class. This capability also extends to usage in conjunction with
    the `properties` property and `bindData` method discussed previously.


    #### Reading the Request InputStream


    If you want to get the text contained within the request body, you can use the
    `inputStream` property of the `request` object, as shown in [Listing 4-41](#Chapter04.html#list_4_41).


    ***Listing 4-41.** Reading the Request Body*


    `def readText() {`

    `    def text = request.inputStream.text`

    `    render "You sent $text"`

    `}`


    #### Writing a Binary Response


    You can send a binary response to the client using standard servlet API calls,
    such as the example in [Listing 4-42](#Chapter04.html#list_4_42), which uses the
    `HttpServletResponse` object to output binary data to the response in the form
    of a ZIP file.


    ***Listing 4-42.** Writing Binary Data to the Response*


    `def createZip() {`

    `    byte[] zip = ... // create the zip from some source`

    `    render file: zip`

    `}`


    The code uses the `response` object’s `outputStream` property in conjunction with
    Groovy’s overloaded left shift `<<` operator, which is present in a number of
    objects that output or append to something such as `java.io.Writer` and `java.lang.StringBuffer`,
    to name just a couple.


    ### Using Simple Interceptors


    Frequently, it is useful to catch the flow of method execution by intercepting
    calls to certain methods. This concept is the foundation of aspect-oriented programming
    (AOP), which allows the definition of “pointcuts” (execution points) to be intercepted.
    You can then modify the intercepted execution through the use of *before*, *after*,
    and *around* “advice.”


    As the names suggest, *before* advice in AOP is code that can be executed before
    an intercepted method call; *after* advice is code that can be executed after
    an intercepted method call. *Around* advice is code that can replace the method
    call entirely. AOP’s great strength is providing support for implementing cross-cutting
    concerns.


    The example frequently used for this concept is the logging of method calls. Although
    the interception mechanism in Grails by no means provides the same power and flexibility
    in terms of what pointcuts can be intercepted, it does fulfill the basic need
    of intercepting calls to actions on controllers.


    Additionally, interceptors are useful if they apply only to a single controller.
    If your requirement spans multiple controllers, you’re better off having a look
    at filters (a topic covered in Chapter 14). With interceptors you can either intercept
    all actions or provide more fine-grained control by specifying which actions should
    be intercepted. Let’s look at a few examples, starting with *before* interceptors.


    #### Before Advice


    Luckily, as with the rest of Grails, there is no hefty XML configuration or annotation
    trickery required, thanks to Convention over Configuration. All it takes to define
    a *before* interceptor is to create a closure property named `beforeInterceptor`
    within the target controller, as shown in [Listing 4-43](#Chapter04.html#list_4_43).


    ***Listing 4-43.** A beforeInterceptor*


    `def beforeInterceptor = {`

    `    log.trace("Executing action $actionName with params $params")`

    `}`


    [Listing 4-43](#Chapter04.html#list_4_43) uses the `log` object to output tracing
    information before any action within the defining controller is executed. This
    example applies to every action defined in the controller. However, you can apply
    more fine-grained control using interception conditions.


    As an example, say you wanted to trace each time a user views an `Album` and each
    user’s country of residence. You could define a `beforeInterceptor` as shown in
    [Listing 4-44](#Chapter04.html#list_4_44).


    ***Listing 4-44.** Using Interception Conditions*


    `class AlbumController {`

    `    private trackCountry = {`

    `        def country = request.locale.country`

    `        def album = Album.get(params.id)`

    `        new AlbumVisit(country:country, album:album).save()`

    `    }`

    `    def beforeInterceptor = [action: trackCountry, only: ''show'']`

    `}`


    As you can see from [Listing 4-44](#Chapter04.html#list_4_44), you can define
    a `beforeInterceptor` using a map literal. The `action` key defines the code that
    should execute. In this case, we’re using an `only` condition, which means that
    the interceptor applies only to the `show` action. You could change this to an
    `except` condition, in which case the interceptor would apply to all actions *except*
    the `show` action.


    Finally, a `beforeInterceptor` can also halt execution of an action by returning
    false. For example, if you want to allow only U.S. visitors to your site, you
    could send a 403 forbidden HTTP code if the user hails from outside the United
    States (see [Listing 4-45](#Chapter04.html#list_4_45)).


    ***Listing 4-45.** Halting Execution with a beforeInterceptor*


    `class AlbumController {`

    `    def beforeInterceptor = {`

    `        if(request.locale != Locale.US) {`

    `            response.sendError 403`

    `            return false`

    `        }`

    `    }`

    `}`


    #### After Advice


    *After* advice is defined using the unsurprisingly named `afterInterceptor` property
    that again takes a closure. The first argument passed to the closure is the resulting
    model from the action, as shown in [Listing 4-46](#Chapter04.html#list_4_46).


    ***Listing 4-46.** An afterInterceptor Example*


    `def afterInterceptor = { model ->`

    `    log.trace("Executed $actionName which resulted in model: $model")`

    `}`


    Again, in this rather trivial example, the logging mechanism traces any action
    that executes.'
  trans: '好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    ###### 上传与数据绑定


    在“执行数据绑定”一节中，您已经了解了 Grails 如何处理从字符串到其他常见 Java 类型的自动类型转换。我们当时没有讨论的是，这种能力如何扩展到文件上传。Grails
    通过 Spring MVC，会根据以下规则自动将上传的文件绑定到领域类实例的属性上：


    > *   如果目标属性是 `byte []`，则会绑定文件的字节。

    > *   如果目标属性是 `String`，则会绑定文件内容（作为字符串）。


    假设您希望允许 gTunes 应用程序的用户为每张专辑上传专辑封面。通过在 `Album` 领域类中添加一个名为 `art` 且类型为 `byte[]` 的新属性，您就自动拥有了将图像数据保存到数据库的能力，如清单
    4-40 所示。


    ***清单 4-40.** 添加 art 属性*


    `class Album{`

    `    byte[] art`

    `    // ...`

    `}`


    要绑定上传的文件，您只需在 `<g:uploadForm>` 标签中添加一个与 `art` 属性名称匹配的 `art` 上传字段即可。


    `<input type="file" name="art" />`


    下面这行代码会自动处理文件到 `Album` 的绑定：


    `def user = new Album( params )`


    Grails 会自动识别请求为 multipart 类型，检索文件，并将构成该文件的字节绑定到 `Album` 类的 `art` 字节数组属性。此能力也扩展到与之前讨论的
    `properties` 属性和 `bindData` 方法结合使用。


    #### 读取请求输入流


    如果您想获取请求正文中包含的文本，可以使用 `request` 对象的 `inputStream` 属性，如清单 4-41 所示。


    ***清单 4-41.** 读取请求正文*


    `def readText() {`

    `    def text = request.inputStream.text`

    `    render "You sent $text"`

    `}`


    #### 写入二进制响应


    您可以使用标准的 Servlet API 调用向客户端发送二进制响应，例如清单 4-42 中的示例，它使用 `HttpServletResponse` 对象以
    ZIP 文件的形式将二进制数据输出到响应中。


    ***清单 4-42.** 向响应写入二进制数据*


    `def createZip() {`

    `    byte[] zip = ... // 从某个源创建 zip`

    `    render file: zip`

    `}`


    该代码结合使用了 `response` 对象的 `outputStream` 属性和 Groovy 重载的左移 `<<` 运算符，该运算符存在于许多用于输出或追加内容的对象中，例如
    `java.io.Writer` 和 `java.lang.StringBuffer` 等。


    ### 使用简单拦截器


    通常，通过拦截对特定方法的调用来捕获方法执行的流程是非常有用的。这个概念是面向切面编程（AOP）的基础，它允许定义要拦截的“切入点”（执行点）。然后，您可以通过使用
    *前置*、*后置* 和 *环绕* “通知”来修改被拦截的执行过程。


    顾名思义，AOP 中的 *前置* 通知是在被拦截的方法调用之前执行的代码；*后置* 通知是在被拦截的方法调用之后执行的代码。*环绕* 通知是可以完全替换方法调用的代码。AOP
    的强大之处在于它为实现横切关注点提供了支持。


    这个概念常用的例子是方法调用的日志记录。尽管 Grails 中的拦截机制在可拦截的切入点方面远未提供同等的强大功能和灵活性，但它确实满足了拦截控制器上操作调用的基本需求。


    此外，如果拦截器仅适用于单个控制器，那么它们会非常有用。如果您的需求跨越多个控制器，那么最好使用过滤器（第 14 章将讨论此主题）。使用拦截器，您可以拦截所有操作，也可以通过指定应拦截哪些操作来提供更细粒度的控制。让我们看几个例子，从
    *前置* 拦截器开始。


    #### 前置通知


    幸运的是，与 Grails 的其他部分一样，由于约定优于配置，不需要繁琐的 XML 配置或注解技巧。定义一个 *前置* 拦截器只需在目标控制器内创建一个名为
    `beforeInterceptor` 的闭包属性，如清单 4-43 所示。


    ***清单 4-43.** 一个 beforeInterceptor*


    `def beforeInterceptor = {`

    `    log.trace("Executing action $actionName with params $params")`

    `}`


    清单 4-43 使用 `log` 对象在定义该拦截器的控制器内的任何操作执行之前输出跟踪信息。此示例适用于控制器中定义的每个操作。但是，您可以使用拦截条件应用更细粒度的控制。


    例如，假设您想要跟踪用户每次查看 `Album` 以及每个用户的居住国家/地区。您可以定义一个 `beforeInterceptor`，如清单 4-44 所示。


    ***清单 4-44.** 使用拦截条件*


    `class AlbumController {`

    `    private trackCountry = {`

    `        def country = request.locale.country`

    `        def album = Album.get(params.id)`

    `        new AlbumVisit(country:country, album:album).save()`

    `    }`

    `    def beforeInterceptor = [action: trackCountry, only: ''show'']`

    `}`


    从清单 4-44 可以看出，您可以使用映射字面量来定义 `beforeInterceptor`。`action` 键定义了应执行的代码。在这个例子中，我们使用了
    `only` 条件，这意味着拦截器仅适用于 `show` 操作。您可以将其更改为 `except` 条件，在这种情况下，拦截器将应用于 *除* `show`
    操作之外的 *所有* 操作。


    最后，`beforeInterceptor` 还可以通过返回 false 来停止操作的执行。例如，如果您只允许美国访客访问您的站点，则可以在用户来自美国境外时发送
    403 禁止访问的 HTTP 代码（参见清单 4-45）。


    ***清单 4-45.** 使用 beforeInterceptor 停止执行*


    `class AlbumController {`

    `    def beforeInterceptor = {`

    `        if(request.locale != Locale.US) {`

    `            response.sendError 403`

    `            return false`

    `        }`

    `    }`

    `}`


    #### 后置通知


    *后置* 通知是使用名称不言自明的 `afterInterceptor` 属性定义的，该属性同样接受一个闭包。传递给该闭包的第一个参数是操作产生的模型，如清单
    4-46 所示。


    ***清单 4-46.** 一个 afterInterceptor 示例*


    `def afterInterceptor = { model ->`

    `    log.trace("Executed $actionName which resulted in model: $model")`

    `}`


    同样，在这个相当简单的例子中，日志机制跟踪任何执行的操作。

