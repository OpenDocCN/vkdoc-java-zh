    Typically an application is not made up of a bunch of disconnected domain classes.
    More often, domain classes have relationships to one another. Of course, not every
    domain class has a direct relationship with every other domain class, but it is
    not common for a domain class to exist in total isolation from any other domain
    class.


    Grails provides support for several types of relationships between domain classes.
    In a one-to-one relationship (the simplest type), each member of the relationship
    has a reference to the other. The relationship represented in [Listing 3-16](#Chapter03.html#list_3_16)
    is a bidirectional relationship.


    ***Listing 3-16.** A One-to-One Relationship Between a Car and an Engine*


    `class Car {`

    `    Engine engine`

    `}`


    `class Engine {`

    `    Car car`

    `}`


    In this model, clearly a Car has one Engine and an Engine has one Car. The entities
    are peers in the relationship; there is no real “owner.” Depending on application
    requirements, this might not be exactly what you want. Often a relationship like
    this really does have an owning side. Perhaps an Engine belongs to a Car, but
    a Car does not belong to an Engine. Grails provides a mechanism for expressing
    a relationship like that, and [Listing 3-17](#Chapter03.html#list_3_17) demonstrates
    how to specify its owning side.


    ***Listing 3-17.** An Engine Belongs to a Car*


    `class Car {`

    `    Engine engine`

    `}`


    `class Engine {`

    `    static belongsTo = [car:Car]`

    `}`


    The value of the `belongsTo` property in the `Engine` class is a `Map`. The key
    in this map is “`car`”, and the value associated with that key is the `Car` class.
    This property tells Grails that the `Car` is the owning side of this relationship
    and that an `Engine` “belongs to” its owning `Car`. The key in the map can be
    named anything—the name does not need to be the same as the owning-class name.
    However, naming the key that way almost always makes sense. That key represents
    the name of a property that will be added to the `Engine` class, as well as representing
    the reference back to the owner. The `Engine` class in [Listing 3-16](#Chapter03.html#list_3_16)
    has a property, `car`, of type `Car`. When the `Car` and `Engine` classes are
    mapped to the relational database, there will be a foreign key in the `CAR` table
    that references the primary key in the `ENGINE` table. There may be cases where
    it is desirable to have the foreign key go in the other direction. That is, you
    may want to have a foreign key in the `ENGINE` table that references the primary
    key in the `CAR` table. The way to do that is to define a `hasOne` property in
    the `Car` class, as shown in [Listing 3-18](#Chapter03.html#list_3_18).


    ***Listing 3-18.** A Car hasOne Engine*


    `class Car {`

    `    static hasOne = [engine: Engine]`

    `}`


    You might encounter situations where a relationship needs an owning side, but
    the owned side of the relationship does not need a reference back to its owner.
    Grails supports this type of relationship using the same `belongsTo` property,
    except that the value is a `Class` reference instead of a `Map`. With the approach
    used in [Listing 3-19](#Chapter03.html#list_3_19), the `Engine` still belongs
    to its owning `Car`, but the `Engine` has no reference back to its `Car`.


    ***Listing 3-19.** An Engine Belongs to a Car but Has No Reference to Its Owner*


    `class Engine {`

    `    static belongsTo = Car`

    `}`


    One of the implications of having the `belongsTo` property in place is that Grails
    will impose cascaded deletes. Grails knows that an `Engine` “belongs to” its owning
    `Car`, so any time a `Car` is deleted from the database, its `Engine` will be
    deleted as well.


    One-to-many relationships are equally simple to represent in Grails domain classes.
    Our gTunes application will require several one-to-many relationships, including
    the relationship between an `Artist` and its `Albums` and between an `Album` and
    its `Songs`. You might say that an artist has many albums and an album has many
    songs. That “has many” relationship is expressed in a domain class with the `hasMany`
    property (see [Listing 3-20](#Chapter03.html#list_3_20)).


    ***Listing 3-20.** The hasMany Property*


    `class Artist {`

    `    String name`


    `    static hasMany = [albums:Album]`

    `}`

    `class Album {`

    `    String title`


    `    static hasMany = [songs:Song]`

    `    static belongsTo = [artist:Artist]`

    `}`


    `class Song {`

    `    String title`

    `    Integer duration`


    `    static belongsTo = Album`

    `}`


    In [Listing 3-20](#Chapter03.html#list_3_20), an `Artist` has many `Albums`, and
    an `Album` belongs to its owning `Artist`. An `Album` also has a reference back
    to its owning `Artist`. An `Album` has many `Songs`, and a `Song` belongs to its
    owning `Album`. However, a `Song` does not have a reference back to its owning
    `Album`.


    The value of the `hasMany` property needs to be a `Map`. The keys in the map represent
    the names of collection properties that will be added to the domain class, and
    the values associated with the keys represent the types of objects that will be
    stored in the collection property. The `Artist` class has a domain property, `albums`,
    that will be a collection of `Album` objects. The default collection type that
    Grails will use is a `java.util.Set`, which is an unordered collection. Where
    this is the desired behavior, you don’t need to declare the property explicitly.
    Grails will inject the property for you. If you need the collection to be a `List`
    or a `SortedSet`, you must explicitly declare the property with the appropriate
    type, as shown in [Listing 3-21](#Chapter03.html#list_3_21).


    ***Listing 3-21.** The Album Class Has a SortedSet of Song Objects*


    `class Album {`

    `    String title`


    `    static hasMany = [songs:Song]`

    `    static belongsTo = [artist:Artist]`


    `    SortedSet songs`

    `}`


    ![Image](images/square.jpg) **Note**  For this to work, the `Song` class must
    implement the `Comparable` interface. This requirement isn’t specific to Grails;
    it’s how standard `SortedSet` collections work in Java.


    A `Set` is a collection of unique objects, duplicates are not allowed. A `List`
    is ordered. Hibernate has to manage all of that ordering and uniqueness, which
    can be expensive in terms of performance. For example, if an `Album` is updated
    with a new `Song` and the `Song` instances are being stored in a `Set`, Hibernate
    has to go look at all of the `Song` instances that are associated with this `Album`
    so it can figure out if the new one violates uniqueness. In this particular case
    the problem may not be terribly significant because an `Album` isn’t going to
    have really large numbers of `Songs` associated with it. For relationships where
    the collection might have a large number of elements, the problem gets more significant.
    To help manage situations like these the relationship could use a Hibernate `Bag`.
    A `Bag` does not have to impose uniqueness and does not have to maintain order
    so manipulating the contents of a `Bag` involve potentially significantly fewer
    interactions with the database. The way to take advantage of a `Bag` is to explicitly
    declare the collection type as shown above in [Listing 3-19](#Chapter03.html#list_3_19)
    but use `java.util.Collection` as the declared type of the collection.'
  trans: '

    ### 建立关系


    通常，一个应用程序并非由一堆互不关联的领域类组成。更常见的情况是，领域类之间彼此存在关系。当然，并非每个领域类都与其他所有领域类有直接关系，但一个领域类完全孤立于其他领域类存在的情况也并不常见。


    Grails 支持领域类之间的多种关系类型。在一对一关系（最简单的类型）中，关系的每一方都持有对另一方的引用。清单 3-16 中展示的关系是一种双向关系。


    ***清单 3-16.** Car 与 Engine 之间的一对一关系*


    `class Car {`

    `    Engine engine`

    `}`


    `class Engine {`

    `    Car car`

    `}`


    在这个模型中，显然一辆 Car 有一个 Engine，而一个 Engine 也有一辆 Car。这些实体在关系中是平等的；没有真正的“所有者”。根据应用程序的需求，这可能并不完全是你想要的。通常，像这样的关系确实有一个拥有方。也许一个
    Engine 属于一辆 Car，但一辆 Car 并不属于一个 Engine。Grails 提供了一种机制来表达这种关系，清单 3-17 演示了如何指定其拥有方。


    ***清单 3-17.** Engine 属于 Car*


    `class Car {`

    `    Engine engine`

    `}`


    `class Engine {`

    `    static belongsTo = [car:Car]`

    `}`


    `Engine` 类中 `belongsTo` 属性的值是一个 `Map`。这个 Map 中的键是“`car`”，与该键关联的值是 `Car` 类。这个属性告诉
    Grails，`Car` 是此关系的拥有方，并且 `Engine` “属于”其拥有者 `Car`。Map 中的键可以任意命名——名称不必与拥有类的名称相同。然而，以这种方式命名键几乎总是有意义的。该键代表一个将被添加到
    `Engine` 类的属性名称，同时也代表了对拥有者的反向引用。清单 3-16 中的 `Engine` 类有一个类型为 `Car` 的属性 `car`。当
    `Car` 和 `Engine` 类映射到关系数据库时，`CAR` 表中会有一个外键引用 `ENGINE` 表中的主键。在某些情况下，可能希望外键指向另一个方向。也就是说，你可能希望
    `ENGINE` 表中有一个外键引用 `CAR` 表中的主键。实现这一点的方法是在 `Car` 类中定义一个 `hasOne` 属性，如清单 3-18 所示。


    ***清单 3-18.** Car 拥有一个 Engine (hasOne)*


    `class Car {`

    `    static hasOne = [engine: Engine]`

    `}`


    你可能会遇到这样的情况：关系需要一个拥有方，但被拥有方不需要持有对其拥有者的引用。Grails 使用相同的 `belongsTo` 属性支持这种类型的关系，不同之处在于其值是一个
    `Class` 引用，而不是一个 `Map`。使用清单 3-19 中的方法，`Engine` 仍然属于其拥有者 `Car`，但 `Engine` 没有对其
    `Car` 的反向引用。


    ***清单 3-19.** Engine 属于 Car，但没有对其拥有者的引用*


    `class Engine {`

    `    static belongsTo = Car`

    `}`


    设置 `belongsTo` 属性的一个影响是 Grails 会实施级联删除。Grails 知道 `Engine` “属于”其拥有者 `Car`，因此每当从数据库中删除一个
    `Car` 时，其关联的 `Engine` 也会被删除。


    一对多关系在 Grails 领域类中同样易于表示。我们的 gTunes 应用程序将需要几个一对多关系，包括 `Artist` 与其 `Albums` 之间的关系，以及
    `Album` 与其 `Songs` 之间的关系。你可以说一个艺术家拥有多张专辑，一张专辑拥有多首歌曲。这种“拥有多个”的关系通过 `hasMany` 属性在领域类中表达（见清单
    3-20）。


    ***清单 3-20.** hasMany 属性*


    `class Artist {`

    `    String name`


    `    static hasMany = [albums:Album]`

    `}`

    `class Album {`

    `    String title`


    `    static hasMany = [songs:Song]`

    `    static belongsTo = [artist:Artist]`

    `}`


    `class Song {`

    `    String title`

    `    Integer duration`


    `    static belongsTo = Album`

    `}`


    在清单 3-20 中，一个 `Artist` 拥有多个 `Albums`，并且一个 `Album` 属于其拥有者 `Artist`。`Album` 也持有对其拥有者
    `Artist` 的反向引用。一个 `Album` 拥有多个 `Songs`，并且一个 `Song` 属于其拥有者 `Album`。然而，`Song` 并不持有对其拥有者
    `Album` 的反向引用。


    `hasMany` 属性的值必须是一个 `Map`。Map 中的键代表将被添加到领域类中的集合属性的名称，而与键关联的值代表将存储在该集合属性中的对象类型。`Artist`
    类有一个领域属性 `albums`，它将是一个 `Album` 对象的集合。Grails 使用的默认集合类型是 `java.util.Set`，它是一个无序集合。如果这正是你期望的行为，则无需显式声明该属性。Grails
    会为你注入该属性。如果你需要该集合是一个 `List` 或 `SortedSet`，则必须使用适当的类型显式声明该属性，如清单 3-21 所示。


    ***清单 3-21.** Album 类拥有一个 Song 对象的 SortedSet*


    `class Album {`

    `    String title`


    `    static hasMany = [songs:Song]`

    `    static belongsTo = [artist:Artist]`


    `    SortedSet songs`

    `}`


    ![Image](img/square.jpg) **注意**  要使此功能生效，`Song` 类必须实现 `Comparable` 接口。这个要求并非 Grails
    特有；这是标准 `SortedSet` 集合在 Java 中的工作方式。


    `Set` 是一个唯一对象的集合，不允许重复。`List` 是有序的。Hibernate 必须管理所有的排序和唯一性，这在性能方面可能代价高昂。例如，如果一个
    `Album` 更新了一首新的 `Song`，并且这些 `Song` 实例存储在一个 `Set` 中，Hibernate 必须去查看与此 `Album` 关联的所有
    `Song` 实例，以便判断新添加的 `Song` 是否违反了唯一性约束。在这个特定案例中，问题可能并不严重，因为一个 `Album` 关联的 `Songs`
    数量不会特别大。对于集合可能包含大量元素的关系，问题就会变得更加显著。为了帮助管理这类情况，关系可以使用 Hibernate 的 `Bag`。`Bag` 不需要强制唯一性，也不需要维护顺序，因此操作
    `Bag` 的内容可能涉及与数据库的交互显著减少。利用 `Bag` 优势的方法是像上面清单 3-19 那样显式声明集合类型，但使用 `java.util.Collection`
    作为集合的声明类型。

    '
- fmt: "一个领域类可能代表多个一对多关系的拥有方。与`hasMany`属性关联的`Map`中可以包含任意数量的条目，每个条目代表另一个一对多关系。例如，如果一个`Artist`拥有多个`Albums`和多个`Instruments`，你可以通过在`Artist`类的`hasMany`属性中添加另一个条目来表示这一点，如[清单\
    \ 3-22](#Chapter03.html#list_3_22)所示。\n\n**清单 3-22.** `hasMany`映射中的多个条目\n\n```\n\
    class Artist {\n    String name\n\n    static hasMany = [albums:Album, instruments:Instrument]\n\
    }\n```\n\n如前所述，子类中的`belongsTo`属性表示子类属于所有者；如果所有者被删除，子类也应被删除。默认情况下，Grails 会为此关系配置`all`级联策略。级联策略选项包括`all`、`merge`、`save-update`、`delete`、`lock`、`refresh`、`evict`、`replicate`和`all-delete-orphan`（仅用于一对多关系）。[清单\
    \ 3-23](#Chapter03.html#list_3_23)演示了如何为属于`Album`的`Songs`设置级联策略。\n\n**清单 3-23.**\
    \ 自定义级联行为\n\n```\nclass Album {\n    String title\n\n    static hasMany = [songs:Song]\n\
    \    static belongsTo = [artist:Artist]\n\n    static mapping = {\n        songs\
    \ cascade: 'delete'\n    }\n}\n```\n\n有关 Hibernate 级联策略的信息和文档，请参阅[`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive)。\n\
    \n### 通过继承扩展类\n\nGrails 领域类可以扩展其他 Grails 领域类。这个继承树可以任意深，但一个好的领域模型通常不会涉及超过一两个继承层级。\n\
    \n声明一个 Grails 领域类扩展自另一个领域类的语法是标准的 Groovy 继承语法，如[清单 3-24](#Chapter03.html#list_3_24)所示。\n\
    \n**清单 3-24.** 扩展`Person`类\n\n```\nclass Person {\n    String firstName\n    String\
    \ lastName\n    Integer age\n}\n\nclass Employee extends Person {\n    String\
    \ employeeNumber\n    String companyName\n}\n\nclass Player extends Person {\n\
    \    String teamName\n}\n```\n\n这些类应该如何映射到数据库？是否应该为每个领域类创建单独的表？是否应该为所有类型的`Person`对象创建一个表？Grails\
    \ 对这两种解决方案都提供了支持。如果所有`Person`对象（包括`Players`和`Employees`）都存储在同一个表中，这种方法称为每个层次结构一张表（table-per-hierarchy）映射。也就是说，会为每个继承层次结构创建一个表（参见[清单\
    \ 3-25](#Chapter03.html#list_3_25)）。Grails 将每个层次结构一张表映射作为继承关系的默认策略。\n\n**清单 3-25.**\
    \ 表示每个层次结构一张表映射的`Person`表\n\n![Image](images/9781430243779_unFig03-05.jpg)\n\n\
    请注意，[清单 3-25](#Chapter03.html#list_3_25)包含了`Person`类中所有属性的列，以及所有子类中所有属性的列。此外，该表还包含一个名为`class`的鉴别器列。由于此表将存放所有类型的`Person`对象，因此需要鉴别器列来表示任何给定行中`Person`的具体类型。应用程序永远不需要直接查询此列，但该列对于\
    \ Grails 的正常工作至关重要。鉴别器列的默认值是类的名称。可以在映射块中自定义鉴别器值，如[清单 3-26](#Chapter03.html#list_3_26)所示。\n\
    \n**清单 3-26.** 为鉴别器列指定值\n\n```\nclass Employee extends Person {\n    String employeeNumber\n\
    \    String companyName\n\n    static mapping = {\n        // Employee 实例的鉴别器列值应为\
    \ 'working people'\n        discriminator 'working people'\n    }\n}\n```\n\n\
    该示例调用了`discriminator`方法并传递了一个字符串作为参数。该字符串表示所有代表`Person`对象的行的鉴别器值。还有其他几个鉴别器属性可以配置（参见[表\
    \ 3-2](#Chapter03.html#tab_3_2)）。\n\n![Image](images/9781430243779_Tab03-02.jpg)\n\
    \n为鉴别器配置多个属性的方法是在映射块中向`discriminator`方法传递命名参数，如[清单 3-27](#Chapter03.html#list_3_27)所示。\n\
    \n**清单 3-27.** 为鉴别器列指定多个值\n\n```\nclass Employee extends Person {\n    String\
    \ employeeNumber\n    String companyName\n\n    static mapping = {\n        discriminator\
    \ value: '42', type: 'integer'\n    }\n}\n```\n\n有关 Hibernate 鉴别器的文档和信息，请参阅[`http://docs.jboss.org/hibernate/orm/3.6/reference/en-US/html/mapping.html#d0e6906`](http://docs.jboss.org/hibernate/orm/3.6/reference/en-US/html/mapping.html#d0e6906)。\n\
    \n另一种类型的继承映射称为每个子类一张表（table-per-subclass）（参见[清单 3-28](#Chapter03.html#list_3_28)）。\n\
    \n**清单 3-28.** 每个子类一张表映射\n\n```\nclass Person {\n    String firstName\n    String\
    \ lastName\n    Integer age\n\n    static mapping = {\n        tablePerHierarchy\
    \ false\n    }\n}\n```\n\n每个子类一张表映射会为继承层次结构中的每个子类生成一个单独的表（参见[清单 3-29](#Chapter03.html#list_3_29)）。要利用每个子类一张表映射，父类必须使用\
    \ ORM DSL 关闭默认的每个层次结构一张表映射。\n\n**清单 3-29.** 使用每个子类一张表映射的`Person`、`Employee`和`Player`表\n\
    \n![Image](images/9781430243779_unFig03-06.jpg)\n\n你应该使用哪种映射？答案取决于几个因素。每个层次结构一张表方法的后果之一是，任何子类都不能拥有非空属性。然而，由于不需要执行连接操作，查询性能会更好，因为所有子类共享一个包含所有子类所有属性列的表。当`Player`保存到`person`表时，`company_name`列将保持为空，因为玩家没有公司名称。同样，当`Employee`保存到`player`表时，`team_name`列将保持为空。使用每个子类一张表方法的后果之一是，在检索子类实例时必须付出性能代价，因为必须执行数据库连接来汇集构造实例所需的所有数据。\n\
    \nGrails 允许你选择最适合你应用程序的方法。考虑你的应用程序需求和典型的查询用例。这些应该有助于你决定哪种映射策略适合特定的继承关系。请注意，你不需要在整个应用程序中应用相同的映射策略。出于性能原因，使用每个子类一张表映射实现一个继承关系（因为你必须支持非空属性），同时使用每个层次结构一张表映射实现其他不相关的继承关系，这完全没有问题。\n\
    \nGrails 确实支持持久类继承层次结构中的抽象类。处理抽象持久类的支持非常直观。例如，如果`Car`和`Truck`是分别扩展`Vehicle`类的类，并且`Vehicle`类是抽象的，你可以查询所有`Vehicles`；结果将包括`Car`和`Truck`实例。"
  raw: 'A domain class might represent the owning side of numerous one-to-many relationships.
    The `Map` associated with the `hasMany` property might have any number of entries
    in it, each entry representing another one-to-many-relationship. For example,
    if an `Artist` has many `Albums` but also has many `Instruments`, you could represent
    that by adding another entry to the `hasMany` property in the `Artist` class,
    as shown in [Listing 3-22](#Chapter03.html#list_3_22).


    ***Listing 3-22.** Multiple Entries in the hasMany Map*


    `class Artist {`

    `    String name`


    `    static hasMany = [albums:Album, instruments:Instrument]`

    `}`


    As stated earlier, the `belongsTo` property in the child class expresses that
    the child belongs to the owner; if the owner is ever deleted, the children should
    be deleted as well. By default, Grails will configure a cascading policy of `all`
    for this relationship. Cascading policy options are `all`, `merge`, `save-update`,
    `delete`, `lock`, `refresh`, `evict`, `replicate`, and `all-delete-orphan` (only
    for one-to-many relationships). [Listing 3-23](#Chapter03.html#list_3_23) demonstrates
    how to set the cascading policy for `Songs` that belong to an `Album`.


    ***Listing 3-23.** Customizing Cascade Behavior*


    `class Album {`

    `    String title`


    `    static hasMany = [songs:Song]`

    `    static belongsTo = [artist:Artist]`


    `    static mapping = {`

    `        songs cascade: ''delete''`

    `    }`

    `}`


    For information on and documentation of the Hibernate cascade policies, see [`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive).


    ### Extending Classes with Inheritance


    Grails domain classes can extend other Grails domain classes. This inheritance
    tree might be arbitrarily deep, but a good domain model will seldom involve more
    than one or two levels of inheritance.


    The syntax for declaring that a Grails domain class extends from another domain
    class is standard Groovy inheritance syntax, as shown in [Listing 3-24](#Chapter03.html#list_3_24).


    ***Listing 3-24.** Extending the Person Class*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`

    `}`


    `class Employee extends Person {`

    `    String employeeNumber`

    `    String companyName`

    `}`


    `class Player extends Person {`

    `    String teamName`

    `}`


    How should these classes map to the database? Should there be separate tables
    for each of these domain classes? Should there be one table for all types of `Person`
    objects? Grails provides support for both of those solutions. If all `Person`
    objects—including `Players` and `Employees`—are to be stored in the same table,
    this approach is known as a table-per-hierarchy mapping. That is, a table will
    be created for each inheritance hierarchy (see [Listing 3-25](#Chapter03.html#list_3_25)).
    Grails imposes table-per-hierarchy mapping as the default for an inheritance relationship.


    ***Listing 3-25.** The Person Table Representing a Table-per-Hierarchy Mapping*


    ![Image](images/9781430243779_unFig03-05.jpg)


    Notice that [Listing 3-25](#Chapter03.html#list_3_25) includes columns for all
    the attributes in the `Person` class, along with columns for all the attributes
    in all the subclasses. In addition, the table includes a discriminator column,
    called `class`. Because this table will house all kinds of `Person` objects, the
    discriminator column is required to represent the specific type of `Person` represented
    in any given row. The application should never need to interrogate this column
    directly, but the column is critical for Grails to do its work. The default value
    for the discriminator column is the name of the class. The discriminator value
    may be customized in the mapping block, as shown in [Listing 3-26](#Chapter03.html#list_3_26).


    ***Listing 3-26.** Specifying a Value for the Discriminator Column*


    `class Employee extends Person {`

    `    String employeeNumber`

    `    String companyName`


    `    static mapping = {`

    `        // the value of the discriminator column for`

    `        //Employee instances should be ''working people''`

    `        discriminator ''working people''`

    `    }`

    `}`


    The example there invokes the discriminator method and passes a string as an argument.
    The string represents a value for the discriminator for all rows that represent
    `Person` objects. There are several other discriminator properties that may be
    configured (see [Table 3-2](#Chapter03.html#tab_3_2)).


    ![Image](images/9781430243779_Tab03-02.jpg)


    The way to configure multiple properties for the discriminator is to pass named
    arguments to the discriminator method in the mapping block, as shown in [Listing
    3-27](#Chapter03.html#list_3_27).


    ***Listing 3-27.** Specifying Multiple Values for the Discriminator Column*


    `class Employee extends Person {`

    `    String employeeNumber`

    `    String companyName`


    `    static mapping = {`

    `        discriminator value: ''42'', type: ''integer''`

    `    }`

    `}`


    See [`http://docs.jboss.org/hibernate/orm/3.6/reference/en-US/html/mapping.html#d0e6906`](http://docs.jboss.org/hibernate/orm/3.6/reference/en-US/html/mapping.html#d0e6906)
    for documentation and information about Hibernate discriminators.


    The other type of inheritance mapping is known as table-per-subclass (see [Listing
    3-28](#Chapter03.html#list_3_28)).


    ***Listing 3-28.** Table-per-Subclass Mapping*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`


    `    static mapping = {`

    `        tablePerHierarchy false`

    `    }`

    `}`


    Table-per-subclass mapping results in a separate table for each subclass in an
    inheritance hierarchy (see [Listing 3-29](#Chapter03.html#list_3_29)). To take
    advantage of a table-per-subclass mapping, the parent class must use the ORM DSL
    to turn off the default table-per-hierarchy mapping.


    ***Listing 3-29.** The Person, Employee, and Player Tables with Table-per-Subclass
    Mapping*


    ![Image](images/9781430243779_unFig03-06.jpg)


    Which of these mappings should you use? The answer depends on several factors.
    One of the consequences of the table-per-hierarchy approach is that none of the
    subclasses can have nonnullable properties. Because no joins are being executed,
    however, queries will perform better, because all the subclasses share a table
    that includes columns for all properties in all subclasses. When a `Player` is
    saved to the `person` table, the `company_name` column will be left null, because
    players don’t have a company name. Likewise, when an `Employee` is saved to the
    `player` table, the `team_name` column will be left null. One of the consequences
    of using the table-per-subclass approach is that you must pay a performance penalty
    when retrieving instances of the subclasses, because database joins must be executed
    to pull together all the data necessary to construct an instance.


    Grails lets you choose the approach that makes the most sense for your application.
    Consider your application requirements and typical query use cases. These should
    help you decide which mapping strategy is right for any particular inheritance
    relationship. Note that you don’t need to apply the same mapping strategy across
    the entire application. There’s nothing wrong with implementing one inheritance
    relationship using table-per-subclass mapping (because you must support nonnullable
    properties) and implementing some other unrelated inheritance relationship using
    table-per-hierarchy mapping for performance reasons.


    Grails does support abstract classes in the inheritance hierarchy of persistent
    classes. The support for dealing with abstract persistent classes is quite intuitive.
    For example, if `Car` and `Truck` are classes that each extend the `Vehicle` class
    and the `Vehicle` class is abstract, you may query for all `Vehicles`; the results
    would include `Car` and `Truck` instances.'
