    #### 可绑定约束


    如前所述，默认的数据绑定机制会绑定所有非静态、非瞬态且非动态类型的属性。`bindData` 方法允许提供白名单和黑名单，以便在数据绑定期间更精细地控制哪些属性被赋值。框架支持的另一种技术是以声明方式明确指定哪些属性是可绑定的。完成此操作后，每当执行数据绑定而未提供白名单或黑名单时，只有配置为可绑定的属性才会在数据绑定期间被赋值。清单
    4-28 演示了如何表达各个属性的可绑定性的语法。


    ***清单 4-28.** 可绑定约束*


    `class User {`

    `    /* userName 和 salary 默认是可绑定的 */`

    `    String userName`

    `    BigDecimal salary`


    `    /* group 和 numberOfActiveGroups 默认是不可绑定的 */`

    `    def group`

    `    transient int numberOfActiveGroups`


    `    static constraints = {`

    `        salary bindable: false`

    `        group bindable: true`

    `    }`

    `}`


    如果创建了清单 4-28 中定义的 `User` 类的实例，并通过类似 `user.properties = params` 的方式执行数据绑定，则只有 `userName`
    和 `group` 属性会参与数据绑定。通常 `salary` 属性会参与数据绑定，但在 `constraints` 块中为该属性指定 `bindable:
    false` 会告知框架不这样做。`salary` 属性不会参与数据绑定，因为在 `constraints` 块中为该属性指定了 `bindable: false`。`numberOfActiveGroups`
    属性不会参与数据绑定，因为它是瞬态的。


    ### 使用命令对象


    有时，某个特定操作不需要涉及领域类，但仍需要验证用户输入。在这种情况下，您可能需要考虑使用命令对象。命令对象是一个类，它拥有领域类的所有数据绑定和数据验证能力，但并非持久化。换句话说，您可以像定义领域类一样定义命令对象的约束，并对其进行验证。


    #### 定义命令对象


    与任何其他对象一样，命令对象需要定义类。您可以在 `grails-app/controllers` 目录中定义命令类，甚至可以在与控制器相同的文件中定义。与
    Java 不同，Groovy 支持每个文件定义多个类的概念，如果您计划将某个特定命令对象仅用于您正在处理的控制器，这将非常方便。


    例如，您可以定义一个 `AlbumCreateCommand`，它封装了在保存新的 `Album` 实例之前对其进行的验证和创建。清单 4-29 展示了这样一个示例。


    ***清单 4-29.** 命令对象定义示例*


    `class AlbumCreateCommand {`

    `    String artist`

    `    String title`

    `    List songs = []`

    `    List durations = []`


    `    static constraints = {`

    `        artist blank:false`

    `        title blank:false`

    `        songs minSize:1, validator:{ val, obj ->`

    `            if(val.size() != obj.durations.size())`

    `                return "songs.durations.not.equal.size"`

    `        }        `

    `    }`


    `    Album createAlbum() {`

    `        def artist = Artist.findByName(artist) ?: new Artist(name:artist)`

    `        def album = new Album(title:title)`

    `        songs.eachWithIndex { songTitle, i ->`

    `            album.addToSongs(title:songTitle, duration:durations[i])`

    `        }`

    `        return album`

    `     }`

    `}`


    在清单 4-29 中，您可以看到一个命令对象定义，它旨在捕获随后创建有效 `Album` 实例所需的一切。请注意，您可以像在领域类中一样在命令对象上定义约束。`createAlbum()`
    方法是可选的，但它很有趣，因为它展示了如何将命令对象用作工厂，获取一组有效数据并构建您的领域实例。在下一节中，您将看到如何利用清单 4-29 中的命令对象。


    #### 使用命令对象


    为了使用命令对象，您需要将命令指定为控制器操作的第一个参数。例如，要使用 `AlbumCreateCommand`，您需要有一个 `save` 操作，如清单
    4-30 所示。


    ***清单 4-30.** 使用命令对象*


    `class AlbumController {`

    `    def save(AlbumCreateCommand cmd) {`

    `        // ...`

    `    }`

    `}`


    您需要使用其类型定义将命令对象显式定义为操作的第一个参数。接下来会发生什么：当请求到来时，Grails 会自动创建一个新实例，将传入的请求参数绑定到该实例的属性，并将其作为第一个参数传递给您。


    像这样向命令提供请求参数非常简单。清单 4-31 显示了一个示例表单。


    ***清单 4-31.** 提供用于填充数据的表单*


    `<g:form url="[controller: ''album'', action: ''save''] ">`

    `       Title: <input type="text" name="title" /> <br>`

    `       Artist: <input type="text" name="artist" /> <br>`

    `                Song 1: <input type="text" name="songs[0]" /> <br>`

    `                Song 2: <input type="text" name="songs[1]" /> <br>`

    `       ...`

    `</g:form>`


    您可能希望使用一些 JavaScript 使歌曲的输入动态化；尽管如此，您可以在清单 4-31 中看到其概念。一旦您让用户能够输入数据，并使用命令对象捕获这些数据，您需要做的就是验证它。并非所有命令对象都是可验证的。要使命令对象可验证，命令对象类的源代码必须定义在使用该命令对象的控制器的同一源文件中，或者命令对象类必须使用
    `grails.validation.Validateable` 注解进行标记。请注意，`grails.validation.Validateable` 注解不仅适用于命令对象类，还可以应用于任何应具有关联验证行为的
    Groovy 类。清单 4-32 展示了使用命令对象时 `save` 操作的逻辑可能的样子。


    ***清单 4-32.** 使用命令对象进行验证*


    `def save(AlbumCreateCommand cmd) {`

    `      if(cmd.validate()) {`

    `            def album = cmd.createAlbum()`

    `            album.save()`

    `            redirect(action:"show", id:album.id)`

    `       }`

    `       else {`

    `            render(view:"create", model:[cmd:cmd])`

    `        }`

    `}`


    如您所见，现在是命令对象在确保请求的有效性，并且我们将其用作工厂来构建一个完全有效的 `Album` 实例。与领域类一样，命令对象拥有一个 `Errors`
    对象，因此您可以使用 `<g:renderErrors>` 标签向用户显示验证错误。


    `<g:renderErrors bean="{cmd}" />`


    ### 施加 HTTP 方法限制


    通常，Web 应用程序需要为特定控制器操作施加允许哪些 HTTP 请求方法的限制。例如，通常认为控制器操作响应 HTTP `GET` 请求执行任何破坏性操作是一个坏主意。此类操作应仅限于
    HTTP `POST` 和 `DELETE`。

