  trans: '

    ### 为您喜爱的 IDE 添加支持


    Java 开发者普遍对现代集成开发环境（IDE）的便利性特别依赖，这很大程度上是因为 Java 语言的严格性。从其静态类型规则到诸如每行代码末尾必须加分号这样的特性，如果没有编译器的一点“唠叨”，用
    Java 写代码几乎寸步难行。幸运的是，现代 IDE，如 Groovy/Grails Tool Suite (GGTS)、Eclipse 和 IntelliJ
    IDEA，让生活变得轻松了许多。事实上，它们做的远不止于此。随着重构工具的出现，Java 已成为目前最易于维护的语言之一。


    动态语言领域的工具通常远不如 Java 可用的工具那么先进。另一方面，许多开发者使用 TextMate、jEdit 和其他简单的文本编辑器来创建整个应用程序；他们更青睐这些工具的速度和效率，而不是功能强大、特性丰富的
    IDE 那种相对笨重和缓慢的感觉。之所以能做到这一点，是因为像 Grails 这样的框架的简洁性以及 Groovy 语法相对宽松。我们认为，在应用程序生命周期的早期阶段，你完全可以使用这些更简单的工具。


    然而，随着应用程序的增长并进入维护阶段，对 IDE 的需求也会增加——尤其是在重构和维护方面。幸运的是，尽管这些工具出现得晚得多，但你确实有可用的选择。我们将在以下章节中介绍它们。


    #### 使用 Groovy/Grails Tool Suite (GGTS)


    Groovy/Grails Tool Suite (GGTS) 为构建 Groovy 和 Grails 应用程序提供了最佳的基于 Eclipse 的开发环境。GGTS
    支持最新版本的 Groovy 和 Grails，并构建在最新的 Eclipse 版本之上。


    GGTS 可从 [`http://grails.org/products/ggts`](http://grails.org/products/ggts) 获取。下载包包含一个双击安装程序，可简化工具的安装、启动和运行过程。


    ##### 配置 Grails 安装


    GGTS 附带最新版本的 Grails——即该版本 GGTS 创建时可用的版本——但你可以在 IDE 中配置任意多个不同版本的 Grails。当你将项目从一个
    Grails 版本升级到另一个版本，或者同时处理多个使用不同 Grails 版本的项目时，此功能非常有用。


    要在 IDE 中配置 Grails 安装，请打开应用程序首选项，导航至 Groovy ä Grails，如图 11-7 所示。


    ![Image](img/9781430243779_Fig11-07.jpg)


    ***图 11-7.** 配置 Grails 安装*


    此对话框允许你配置系统中已安装的任意多个 Grails 安装。表格最左列的复选框允许你指定在 IDE 中创建新 Grails 应用程序时默认选择的版本。


    ##### 导入 Grails 项目


    配置好 Grails 安装后，下一步是导入你的 Grails 项目。幸运的是，Grails 在创建项目时会自动为你生成 Eclipse 项目和类路径文件。因此，要导入项目，请选择“文件”![Image](img/U001.jpg)“导入”菜单选项，然后选择“导入”选项，此时将出现如图
    11-8 所示的对话框。


    ![Image](img/9781430243779_Fig11-08.jpg)


    ***图 11-8.** 将 Grails 项目导入 GGTS*


    选择“Grails 项目”选项，然后单击“下一步”按钮。现在，使用“浏览”按钮浏览到 Grails 项目的根目录，然后单击“选择”或“确定”。一旦你选择了项目所在的目录，GGTS
    将自动检测指定根目录内甚至根目录子目录中是否存在 Eclipse 项目文件（参见图 11-9）。


    ![Image](img/9781430243779_Fig11-09.jpg)


    ***图 11-9.** 将 Grails 项目导入 Eclipse*


    单击“完成”按钮完成导入。此时，你的项目将配置正确的源目录和类路径。


    ###### 从 GGTS 运行 Grails 应用程序


    你可以通过右键单击项目并选择“运行方式”菜单，从 GGTS 运行 Grails 应用程序。“运行方式”下的子菜单将包含多个选项，包括“Grails 命令 (run-app)”（参见图
    11-10）。


    ![Image](img/9781430243779_Fig11-10.jpg)


    ***图 11-10.** 从 GGTS 运行 Grails 应用程序*


    如果你想在调试器中运行应用程序，则选择“调试方式”而不是“运行方式”菜单选项。在调试器中运行应用程序时，你可以设置断点、监视点以及 Java 开发者在其运行时调试器中习惯使用的所有其他功能。


    GGTS 为工作区提供了 Grails 透视图，该透视图提供了对 Grails 应用程序中所有构件的智能视图以及其他功能。有用于创建构件和运行任意命令的向导。还有一个
    Grails 插件管理器。GGTS 为构建、测试和调试 Grails 应用程序提供了一个非常灵活、非常强大的环境，并且正迅速成为 Grails 应用程序开发者的首选
    IDE。有关 GGTS 的更多信息，请参见 [`http://grails.org/products/ggts`](http://grails.org/products/ggts)。


    #### 使用 Spring Tool Suite (STS) 和 Eclipse


    大多数希望在 Eclipse 环境中开发 Grails 应用程序的开发者会选择使用 GGTS。GGTS 构建在 Eclipse 之上，提供了 Eclipse
    的所有功能，外加一整套 Groovy 和 Grails 支持。如果出于某种原因，你想在 Eclipse 环境中开发 Grails 应用程序但不想使用 GGTS，你可以将
    Groovy 和 Grails 扩展安装到 Eclipse 或 STS 中，并获得相同的功能——只是需要多做一点工作来将所有东西拼凑在一起。你可以在 [`www.grails.org/STS+Integration`](http://www.grails.org/STS+Integration)
    找到关于如何做到这一点的更多信息。


    #### IntelliJ IDEA


    JetBrains 在与 Groovy 团队密切合作下，在 IntelliJ 中构建了大部分相关支持。（你可以在 [`www.jetbrains.com/idea/features/groovy_grails.html`](http://www.jetbrains.com/idea/features/groovy_grails.html)
    了解更多关于他们对 Groovy 和 Grails 的支持信息并查看他们的文档。）图 11-11 展示了 IntelliJ IDEA 的实际运行情况。


    ![Image](img/9781430243779_Fig11-11.jpg)


    ***图 11-11.** 带有 Groovy 插件的 IntelliJ IDEA*


    #### NetBeans


    在可用的开源 IDE 中，NetBeans ([`www.netbeans.org/`](http://www.netbeans.org/)) 为 Groovy
    和 Grails 开发提供了最先进的支持。在使 NetBeans 成为市场上最好的 Ruby IDE 之一后，Sun 开始投资于 Groovy 和 Grails
    支持，随着 NetBeans 6.5 的发布，这项投资的成果开始真正显现。NetBeans 插件具有内置的 Groovy 支持，提供语法高亮、代码补全、大纲视图以及轻松访问
    Grails 命令的菜单选项。图 11-12 展示了 NetBeans Groovy 编辑器的外观。


    ![Image](img/9781430243779_Fig11-12.jpg)


    ***图 11-12.** NetBeans Groovy/Grails 集成*


    在 Grails 网站上有一篇关于 NetBeans 当前可用功能的好文章：[`http://www.grails.org/Net`](http://www.grails.org/Net)Beans+Integration。

