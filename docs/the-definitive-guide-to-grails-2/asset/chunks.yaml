    #### 自动会话刷新


    另一个常见的陷阱是，默认情况下，GORM 被配置为在发生以下情况之一时自动刷新会话：


    > *   每当执行查询时；

    > *   控制器操作完成后，如果没有抛出异常，则立即执行；

    > *   在事务提交之前立即执行。


    这会产生许多你需要考虑的影响。以代码清单 9-50 中的代码为例。


    ***代码清单 9-50.** 自动会话刷新的影响*


    `1 def album = Album.get(1)`

    `2 album.title = "Change It"`

    `3 def otherAlbums = Album.findAllWhereTitleLike("%Change%")`

    `4`

    `5 assert otherAlbums.contains(album)`


    你可能会认为，因为你从未在 `album` 上调用过 `save()`，所以它不可能被持久化到数据库中，对吧？错。一旦你加载了 `album` 实例，对于
    Hibernate 来说，它立即成为一个“受管理”的对象。由于 Hibernate 默认配置为在查询运行时刷新会话，因此当第 3 行调用 `findAllWhereTitleLike`
    方法时，`Session` 会被刷新，并且 `Album` 实例会被持久化。Hibernate 的 `Session` 会缓存更改，并仅在最后一刻才将它们推送到数据库。在自动刷新的情况下，这发生在事务结束时，或者在可能受缓存更改影响的查询运行之前。


    你可能会认为自动刷新的行为有点奇怪，但仔细想想，这在很大程度上取决于你的预期。如果对象没有被刷新到数据库，那么第 2 行对其所做的更改就不会反映在结果中。这可能也不是你所期望的！让我们考虑另一个例子，其中自动刷新可能会带来一些意外。请看代码清单
