- fmt: "# The DataSource.groovy File\n\nWhen you create a Grails application, Grails\
    \ automatically provides a `grails-app/conf/DataSource.groovy` file that contains\
    \ configuration for each environment (see [Figure 2-11](#Chapter02.html#fig_2_11)).\
    \ You might find this convenient, because it means most of the work is done for\
    \ you, but you might prefer to use another database, such as MySQL, rather than\
    \ the provided H2 database.\n\n![Image](images/9781430243779_Fig02-11.jpg)\n\n\
    ***Figure 2-11.** The DataSource.groovy file*\n\nDefining a data source is one\
    \ area where the strength of the Java platform becomes apparent. Java’s database\
    \ connectivity technology, JDBC, is extremely mature, with drivers available for\
    \ pretty much every database on the market. In fact, if a database provider does\
    \ not deliver high-quality, stable JDBC drivers, its product is unlikely to be\
    \ taken seriously in the marketplace.\n\nA data-source definition is translated\
    \ into a `javax.sql.DataSource` instance that supplies JDBC `Connection` objects.\
    \ If you’ve used JDBC before, the process will be familiar, with the first step\
    \ ensuring that the driver classes, normally packaged within a JAR archive, are\
    \ available on the classpath.\n\nThe `DataSource.groovy` file contains some common\
    \ configuration setup at the top of the data-source definition, an example of\
    \ which is presented in [Listing 2-20](#Chapter02.html#list_2_20).\n\n***Listing\
    \ 2-20.** Common Data-Source Configuration*\n\n```\ndataSource {\n    pooled =\
    \ true\n    driverClassName = \"org.h2.Driver\"\n    username = \"sa\"\n    password\
    \ = \"\"\n}\n```\n\nThe snippet indicates that by default you want a pooled data\
    \ source using the H2 driver with a username of “sa” and a blank password. You\
    \ could apply defaults to several other settings. Here’s a list of the settings\
    \ that the `DataSource.groovy` file provides:\n\n> *   `driverClassName`: This\
    \ is the class name of the JDBC driver.\n> *   `username`: This is the username\
    \ used to establish a JDBC connection.\n> *   `password`: This is the password\
    \ used to establish a JDBC connection.\n> *   `url`: This is the JDBC URL of the\
    \ database.\n> *   `dbCreate`: This specifies whether to autogenerate the database\
    \ from the domain model.\n> *   `pooled`: This specifies whether to use a pool\
    \ of connections (it defaults to true).\n> *   `configClass`: This is the class\
    \ that you use to configure Hibernate.\n> *   `logSql`: This setting enables SQL\
    \ logging.\n> *   `dialect`: This is a string or class that represents the Hibernate\
    \ dialect used to communicate with the database.\n\nIn addition to the standard\
    \ properties described here, additional driver specific properties may be configured\
    \ by defining a properties block as part of the `dataSource` configuration, as\
    \ shown in [Listing 2-21](#Chapter02.html#list_2_21).\n\n***Listing 2-21.** Configuring\
    \ Additional Data-Source Properties*\n\n```\nenvironments {\n    production {\n\
    \        dataSource {\n            dbCreate = \"update\"\n            url = \"\
    jdbc:h2:prodDb;MVCC=TRUE;LOCK_TIMEOUT=10000\"\n            pooled = true\n   \
    \         properties {\n               maxActive = -1\n               minEvictableIdleTimeMillis=1800000\n\
    \               timeBetweenEvictionRunsMillis=1800000\n               numTestsPerEvictionRun=3\n\
    \               testOnBorrow=true\n               testWhileIdle=true\n       \
    \        testOnReturn=true\n               validationQuery=\"SELECT 1\"\n    \
    \        }\n        }\n    }\n}\n```\n\nNow comes the interesting bit. Following\
    \ the global `dataSource` block, you’ll see environment-specific settings for\
    \ each known environment: development, test, and production. [Listing 2-22](#Chapter02.html#list_2_22)\
    \ presents a shortened example of the environment-specific configuration.\n\n\
    ***Listing 2-22.** Environment-Specific Data-Source Configuration*\n\n```\nenvironments\
    \ {\n    development {\n        dataSource {\n            dbCreate = \"create-drop\"\
    \ // one of 'create', 'create-drop', 'update', 'validate', ''\n            url\
    \ = \"jdbc:h2:mem:devDb;MVCC=TRUE\"\n        }\n    }\n}\n```\n\nNotice that,\
    \ by default, the development environment is configured to use an in-memory H2,\
    \ with the URL of the database being `jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000`.\
    \ Also note the `dbCreate` setting, which allows you to configure how the database\
    \ is autocreated.\n\n![Image](images/square.jpg) **Note** Hibernate users will\
    \ be familiar with the possible values because `dbCreate` relates directly to\
    \ the `hibernate.hbm2ddl.auto` property.\n\nThe `dbCreate` setting of the development\
    \ environment is configured as `create-drop`, which drops the database schema\
    \ and re-creates it every time the Grails server is restarted. This setting can\
    \ prove useful for testing because you start off with a clean set of data each\
    \ time. The available settings for the `dbCreate` property are as follows:\n\n\
    > *   `create-drop`: Drops and re-creates the database schema on each application\
    \ load.\n> *   `create`: Creates the database on application load.\n> *   `update`:\
    \ Creates and/or attempts an update to existing tables on application load.\n\
    > *   `[blank]`: Does nothing.\n\nThe production and test environments both use\
    \ `update` for `dbCreate` so that existing tables are, not dropped, but created\
    \ or updated automatically. You might find it necessary in some production environments\
    \ to create your database schema manually. Or maybe creating your database schema\
    \ is your DBA’s responsibility. If either is the case, simply remove the `dbCreate`\
    \ property altogether, and Grails will do nothing, leaving this task in your hands\
    \ or your colleague’s."
  raw: '#### The DataSource.groovy File


    When you create a Grails application, Grails automatically provides a `grails-app/conf/DataSource.groovy`
    file that contains configuration for each environment (see [Figure 2-11](#Chapter02.html#fig_2_11)).
    You might find this convenient, because it means most of the work is done for
    you, but you might prefer to use another database, such as MySQL, rather than
    the provided H2 database.


    ![Image](images/9781430243779_Fig02-11.jpg)


    ***Figure 2-11.** The DataSource.groovy file*


    Defining a data source is one area where the strength of the Java platform becomes
    apparent. Java’s database connectivity technology, JDBC, is extremely mature,
    with drivers available for pretty much every database on the market. In fact,
    if a database provider does not deliver high-quality, stable JDBC drivers, its
    product is unlikely to be taken seriously in the marketplace.


    A data-source definition is translated into a `javax.sql.DataSource` instance
    that supplies JDBC `Connection` objects. If you’ve used JDBC before, the process
    will be familiar, with the first step ensuring that the driver classes, normally
    packaged within a JAR archive, are available on the classpath.


    The `DataSource.groovy` file contains some common configuration setup at the top
    of the data-source definition, an example of which is presented in [Listing 2-20](#Chapter02.html#list_2_20).


    ***Listing 2-20.** Common Data-Source Configuration*


    `dataSource {`

    `    pooled = true`

    `    driverClassName = "org.h2.Driver"`

    `    username = "sa"`

    `    password = ""`

    `}`


    The snippet indicates that by default you want a pooled data source using the
    H2 driver with a username of “sa” and a blank password. You could apply defaults
    to several other settings. Here’s a list of the settings that the `DataSource.groovy`
    file provides:


    > *   `driverClassName`: This is the class name of the JDBC driver.

    > *   `username`: This is the username used to establish a JDBC connection.

    > *   `password`: This is the password used to establish a JDBC connection.

    > *   `url`: This is the JDBC URL of the database.

    > *   `dbCreate`: This specifies whether to autogenerate the database from the
    domain model.

    > *   `pooled`: This specifies whether to use a pool of connections (it defaults
    to true).

    > *   `conf igClass`: This is the class that you use to configure Hibernate.

    > *   `logSql`: This setting enables SQL logging.

    > *   `dialect`: This is a string or class that represents the Hibernate dialect
    used to communicate with the database.


    In addition to the standard properties described here, additional driver specific
    properties may be configured by defining a properties block as part of the `dataSource`
    configuration, as shown in [Listing 2-21](#Chapter02.html#list_2_21).


    ***Listing 2-21.** Configuring Additional Data-Source Properties*


    `environments {`

    `    production {`

    `        dataSource {`

    `            dbCreate = "update"`

    `            url = "jdbc:h2:prodDb;MVCC=TRUE;LOCK_TIMEOUT=10000"`

    `            pooled = true`

    `            properties {`

    `               maxActive = -1`

    `               minEvictableIdleTimeMillis=1800000`

    `               timeBetweenEvictionRunsMillis=1800000`

    `               numTestsPerEvictionRun=3`

    `               testOnBorrow=true`

    `               testWhileIdle=true`

    `               testOnReturn=true`

    `               validationQuery="SELECT 1"`

    `            }`

    `        }`

    `    }`

    `}`


    Now comes the interesting bit. Following the global `dataSource` block, you’ll
    see environment-specific settings for each known environment: development, test,
    and production. [Listing 2-22](#Chapter02.html#list_2_22) presents a shortened
    example of the environment-specific configuration.


    ***Listing 2-22.** Environment-Specific Data-Source Configuration*


    `environments {`

    `    development {`

    `        dataSource {`

    `            dbCreate = "create-drop" // one of ''create'', ''create-drop'', ''update'',
    ''validate'', ''''`

    `            url = "jdbc:h2:mem:devDb;MVCC=TRUE"`

    `        }`

    `    }`


    Notice that, by default, the development environment is configured to use an in-memory
    H2, with the URL of the database being `jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000"`.
    Also note the `dbCreate` setting, which allows you to configure how the database
    is autocreated.


    ![Image](images/square.jpg) **Note**  Hibernate users will be familiar with the
    possible values because `dbCreate` relates directly to the `hibernate.hbm2ddl.auto`
    property.


    The `dbCreate` setting of the development environment is configured as `create-drop`,
    which drops the database schema and re-creates it every time the Grails server
    is restarted. This setting can prove useful for testing because you start off
    with a clean set of data each time. The available settings for the `dbCreate`
    property are as follows:


    > *   `create-drop`: Drops and re-creates the database schema on each application
    load.

    > *   `create`: Creates the database on application load.

    > *   `update`: Creates and/or attempts an update to existing tables on application
    load.

    > *   `[blank]`: Does nothing.


    The production and test environments both use `update` for `dbCreate` so that
    existing tables are, not dropped, but created or updated automatically. You might
    find it necessary in some production environments to create your database schema
    manually. Or maybe creating your database schema is your DBA’s responsibility.
    If either is the case, simply remove the `dbCreate` property altogether, and Grails
    will do nothing, leaving this task in your hands or your colleague’s.'
