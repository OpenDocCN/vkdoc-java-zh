  raw: '##### The findAll Tag


    Collecting properties from a collection via the object graph is handy, but sometimes
    you want to iterate over only those values that meet certain criteria. This is
    often achieved by iterating over all elements and having nested `if` statements.
    However, using `<g:findAll>`, as shown in [Listing 5-13](#Chapter05.html#list_5_13),
    is far more elegant.


    ***Listing 5-13.** Using <g:findAll> to Locate Specific Elements*


    `<g:findAll in="${albums}" expr="${it.songs?.title.contains(''Love'')}">`

    `  <li>${it.title}</li>`

    `</g:findAll>`


    This example is another interesting demonstration of the power of GPath, Groovy’s
    expression language. The expression in bold references the default argument `it`,
    which is the current `Album` instance being iterated over, and then uses GPath
    to retrieve a collection of all the names of the songs.


    The `songs` property, too, is itself a collection (a `java.util.Set`, to be specific)
    and does not have a `title` property, but GPath recognizes that the reference
    to the `title` property is an attempt to retrieve a collection of name properties
    from the contained elements within the `songs` property.


    Since the result is a collection, you can invoke the regular JDK `contains` method
    to look up all albums that have the word *Love* in their title. The result, far
    more readable than a bunch of nested `if` statements, is another case where you
    can see how a Groovy view technology like GSP makes a remarkable amount of sense.


    You’ve seen quite a few options for performing different kinds of logical statements
    and iteration. Controlling the logical flow of a view is not, however, the only
    task you have when writing the view. One common activity is linking controllers
    and actions, which you will look at next. But before that, there is something
    important to note. This marks the end of the built-in tags. The tags you’ve seen
    so far are internally handled and optimized by GSP. The next section shifts the
    focus to Grails dynamic tags and how they differ from the built-in tags.


    ### Grails Dynamic Tags


    Dynamic tags in Grails are those provided through classes called *tag libraries*,
    which can be found within the `grails-app/taglib` directory of any Grails project.
    Grails provides a number of tag libraries out of the box that you will see in
    the next few sections. Then creating your own tag libraries will be explored.


    First, you need to understand what makes dynamic tags different from other tags—that
    is, besides the fact that they are provided by these libraries. Fundamentally,
    they can be used just as any other tag is. For example, you can use the `<g:link>`
    tag like the built-in tags you saw previously without requiring any `import` directive.


    More interestingly, dynamic tags can also be invoked as methods from scriptlets
    and `GString` expressions. Why is this useful? To maintain a clean syntax and
    valid XML, it is best to avoid nesting tags within tag attributes. In JSP you
    often see code like that in [Listing 5-14](#Chapter05.html#list_5_14), code that
    can be difficult to read and is not well-formed markup.


    ***Listing 5-14.** Unattractive JSP Example*


    `<a href="<c:out value="${application.contextPath}" />/show.jsp">A dynamic link</a>`


    Clearly, because of GSP’s rather JSP-like nature, this problem could have been
    inherited if it were not for the dynamic nature of Groovy. So how would you invoke
    a GSP tag as a method call? Observe the example in [Listing 5-15](#Chapter05.html#list_5_15).


    ***Listing 5-15.** An Example of a GSP Tag as a Method Call*


    `<!-- With a regular tag -->`

    `<a href="<g:createLink action="list" />">A dynamic link</a>`

    `<!-- As a method call -->`

    `<a href="${createLink(action:''list'')}">A dynamic link</a>`


    The two previous examples produce the same result. They call a tag called `createLink`,
    which creates a link to the `list` action. The second example, notably cleaner,
    produces well-formed markup. In addition, the body of the tag can be provided
    as the last argument to the method call.


    You can see an example of this in action in the `create` and `edit` views generated
    by scaffolding. As part of form validation, these views highlight the problematic
    field by surrounding the offender with a red box. You achieve this through the
    `hasErrors` tags, which will evaluate if a particular bean field has any validation
    errors and will set a CSS class, the name of which is the last argument on the
    surrounding `div` element if the field contains errors (see [Listing 5-16](#Chapter05.html#list_5_16)).


    ***Listing 5-16.** Field Validation Example*


    `<div class="${hasErrors(bean:album,field:''title''`*`,`*`''errors'')}">`

    `</div>`


    These are just a few examples. As you’ll soon see, you can create your own tags
    that can be invoked in the same manner. First, however, let’s take a tour through
    the tags already available to you, starting with linking.


    #### Linking Tags


    With all the controllers and actions that end up being created, remembering the
    URL patterns to link to them may become a bit challenging. Also, depending upon
    the environment you deploy to, the context path of your application could change.
    So how can you make sure you are always linking to the right place in a consistent
    manner? Luckily, Grails provides a number of tags to handle linking in an elegant
    way, the first of which is the aptly named `<g:link>`.'
