    \ {\n}\n```\n\n该标签库将提供一个自定义的GSP标签，该标签会调用REST Web服务来检索专辑封面URL，然后输出一个指向该URL的`img`标签。有一个名为`rest-client-builder`的Grails插件；它提供了一个`RestBuilder`类，使得调用REST服务并处理响应变得非常容易。要使用该插件，我们需要在`BuildConfig.groovy`中添加代码来表达对该插件的依赖。\n\
    \n```\n// grails-app/conf/BuildConfig.groovy\n\ngrails.project.dependency.resolution\
    \ = {\n\n    ...\n\n    plugins {\n        compile \":rest-client-builder:1.0.2\"\
    \n        ...\n    }\n}\n```\n\n使用`rest-client-builder`插件提供的`RestBuilder`类非常简单。（该插件的完整文档位于[`http://grails.org/plugin/rest-client-builder`](http://grails.org/plugin/rest-client-builder)；我们将在此介绍基础知识。）`RestBuilder`类有一个名为`get`的实例方法，它接受一个`String`参数；该参数应指向你想要调用的服务的URL。该方法返回一个响应，该响应将有一个`json`属性，这是一个Grails\
