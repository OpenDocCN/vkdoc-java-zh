- fmt: "#### Testing the Registration Code\n\nNow let’s consider how to test the action\
    \ using the unit testing techniques you learned about earlier. When you ran the\
    \ `create-controller` command, a new unit test for the `UserController` was created\
    \ for you in the `test/unit` directory.\n\nNow write a test for the case in which\
    \ a user enters passwords that don’t match. [Listing 4-62](#Chapter04.html#list_4_62)\
    \ shows the `testPasswordsDontMatch` case that checks whether a password mismatch\
    \ triggers a validation error.\n\n***Listing 4-62.** The testPasswordsDoNotMatch\
    \ Test Case*\n\n```\nvoid testPasswordsDoNotMatch() {\n  request.method = 'POST'\n\
    \n  params.login = 'henry'\n  params.password = 'password'\n  params.confirm =\
    \ 'wrongPassword'\n  params.firstName = 'Henry'\n  params.lastName = 'Rollins'\n\
    \n  def model = controller.register()\n  def user = model.user\n\n  assert user.hasErrors()\n\
    \  assert 'user.password.dontmatch' ==\n         user.errors['password'].code\n\
    }\n```\n\nNotice how the `testPasswordsMatch` test case populates the `mockParams`\
    \ object with two passwords that differ. Then you have a call to the `register`\
    \ action, which should reject the new `User` instance with a `user.password.dontmatch`\
    \ error code. The last line of the test asserts that this is the case by inspecting\
    \ the `errors` object on the `User` instance:\n\n```\nassert 'user.password.dontmatch'\
    \ ==\n       user.errors['password'].code\n```\n\nThe next scenario to consider\
    \ is when a user enters invalid data into the registration form. You might need\
    \ multiple tests that check for different kinds of data entered. Remember, you\
    \ can never write too many tests! As an example of one potential scenario, [Listing\
    \ 4-63](#Chapter04.html#list_4_63) shows a test that checks whether the user enters\
    \ blank data or no data.\n\n***Listing 4-63.** The testRegistrationFailed Test*\n\
    \n```\nvoid testRegistrationFailed() {\n  request.method = 'POST'\n\n  params.login\
    \ = ''\n\n  def model = controller.register()\n  def user = model.user\n\n  assert\
    \ user.hasErrors()\n  assert session.user == null\n  assert 'blank' == user.errors['login'].code\n\
    \  assert 'nullable' == user.errors['firstName'].code\n  assert 'nullable' ==\
    \ user.errors['lastName'].code\n}\n```\n\nOnce again, you can see the use of the\
    \ `errors` object to inspect that the appropriate constraints have been violated.\
    \ Finally, you need to ensure two things to test a successful registration:\n\n\
    > *   The `User` instance has been placed in the `session` object.\n> *   The\
    \ request has been redirected appropriately.\n\n[Listing 4-64](#Chapter04.html#list_4_64)\
    \ shows an example of a test case that tests a successful user registration.\n\
    \n***Listing 4-64.** Testing Successful Registration*\n\n```\nvoid testRegistrationSuccess()\
    \ {\n  request.method = 'POST'\n\n  params.login = 'henry'\n  params.password\
    \ = 'password'\n  params.confirm = 'password'\n  params.firstName = 'Henry'\n\
    \  params.lastName = 'Rollins'\n\n  controller.register()\n\n  assert '/store'\
    \ == response.redirectedUrl\n  assert session.user != null\n}\n```\n\nWith the\
    \ tests written, let’s now consider how to allow users to log in to the gTunes\
    \ application.\n\n#### Allowing Users to Log In\n\nSince you’ve already added\
    \ the login form, all you need to do is implement the controller logic. A login\
    \ process is a good candidate for a command object because it involves capturing\
    \ information—the login and password—without needing to actually persist the data.\n\
    \nIn this example you’re going to create a `LoginCommand` that encapsulates the\
    \ login logic, leaving the controller action to do the simple stuff. [Listing\
    \ 4-65](#Chapter04.html#list_4_65) shows the code for the `LoginCommand` class,\
    \ which is defined in the same file as the `UserController` class.\n\n***Listing\
    \ 4-65.** The LoginCommand*\n\n```\nclass LoginCommand {\n  String login\n  String\
    \ password\n  private u\n  User getUser() {\n                if(!u && login) {\n\
    \                  u = User.findByLogin(login, [fetch:[purchasedSongs:'join']])\n\
    \                }\n                return u\n  }\n  static constraints = {\n\
    \                login blank:false, validator:{ val, obj ->\n                \
    \    if(!obj.user)\n                      return \"user.not.found\"\n        \
    \        }\n             password blank:false, validator:{ val, obj ->       \
    \                                   \n                    if(obj.user && obj.user.password\
    \ != val)\n                      return \"user.password.invalid\"\n          \
    \      }\n  }\n}\n```\n\nThe `LoginCommand` defines two properties that capture\
    \ request parameters called `login` and `password`. The main logic of the code,\
    \ however, is in the constraints definition. First, the `blank` constraint ensures\
    \ that the login and/or password cannot be left blank. Second, a custom validator\
    \ on the `login` parameter checks whether the user exists:\n\n```\nlogin blank:false,\
    \ validator:{ val, cmd ->\n    if(!cmd.user)\n        return \"user.not.found\"\
    \n}\n```\n\nThe custom `validator` constraint takes a closure that receives two\
    \ arguments: the value and the `LoginCommand` instance. The code within the closure\
    \ calls the `getUser()` method of the `LoginCommand` to check whether the user\
    \ exists. If the user doesn’t exist, the code returns an error code—`user.not.found`—that\
    \ signifies an error has occurred.\n\nOn the `password` parameter, another custom\
    \ `validator` constraint checks whether the user has specified the correct password:\n\
    \n```\npassword blank:false, validator:{ val, cmd ->\n    if(cmd.user && cmd.user.password\
    \ != val) return \"user.password.invalid\" }\n```\n\nHere the validator again\
    \ uses the `getUser()` method of the `LoginCommand` to compare the password of\
    \ the actual `User` instance with the value of the `password` property held by\
    \ the `LoginCommand`. If the password is not correct, an `error` code is returned,\
    \ triggering an error. You can add appropriate messages for each of the custom\
    \ errors returned by the `LoginCommand` by adding them to the `grails-app/i18n/messages.properties`\
    \ file:\n\n```\nuser.not.found=User not found\nuser.password.invalid=Incorrect\
    \ password\n```\n\nWith that done, it’s time to put the `LoginCommand` to use\
    \ by implementing the `login` action in the `UserController`. [Listing 4-66](#Chapter04.html#list_4_66)\
    \ shows the code for the `login` action.\n\n***Listing 4-66.** The login Action*\n\
    \n```\ndef login(LoginCommand cmd) {\n  if(request.method == 'POST') {\n    if(!cmd.hasErrors())\
    \ {\n      session.user = cmd.getUser()\n      redirect controller:'store'\n \
    \   } else {\n      render view:'/store/index', model:[loginCmd:cmd]\n    }\n\
    \  } else {\n    render view:'/store/index'\n  }\n}\n```\n\nWith the command object\
    \ in place, the controller simply needs to do is what it does best: issue redirects\
    \ and render views. Again, like the `register` action, login processing kicks\
    \ in only when a `POST` request is received. Then if the command object has no\
    \ errors, the user is placed into the session and the request is redirected to\
    \ the `StoreController`."
  raw: '#### Testing the Registration Code


    Now let’s consider how to test the action using the unit testing techniques you
    learned about earlier. When you ran the `create-controller` command, a new unit
    test for the `UserController` was created for you in the `test/unit` directory.


    Now write a test for the case in which a user enters passwords that don’t match.
    [Listing 4-62](#Chapter04.html#list_4_62) shows the `testPasswordsDontMatch` case
    that checks whether a password mismatch triggers a validation error.


    ***Listing 4-62.** The testPasswordsDoNotMatch Test Case*


    `void testPasswordsDoNotMatch() {`

    `  request.method = ''POST''`


    `  params.login = ''henry''`

    `  params.password = ''password''`

    `  params.confirm = ''wrongPassword''`

    `  params.firstName = ''Henry''`

    `  params.lastName = ''Rollins''`


    `  def model = controller.register()`

    `  def user = model.user`


    `  assert user.hasErrors()`

    `  assert ''user.password.dontmatch'' ==`

    `         user.errors[''password''].code`

    `}`


    Notice how the `testPasswordsMatch` test case populates the `mockParams` object
    with two passwords that differ. Then you have a call to the `register` action,
    which should reject the new `User` instance with a `user.password.dontmatch` error
    code. The last line of the test asserts that this is the case by inspecting the
    errors object on the `User` instance:


    `assert ''user.password.dontmatch'' ==`

    `       user.errors[''password''].code`


    The next scenario to consider is when a user enters invalid data into the registration
    form. You might need multiple tests that check for different kinds of data entered.
    Remember, you can never write too many tests! As an example of one potential scenario,
    [Listing 4-63](#Chapter04.html#list_4_63) shows a test that checks whether the
    user enters blank data or no data.


    ***Listing 4-63.** The testRegistrationFailed Test*


    `void testRegistrationFailed() {`

    `  request.method = ''POST''`


    `  params.login = ''''`


    `  def model = controller.register()`

    `  def user = model.user`


    `  assert user.hasErrors()`

    `  assert session.user == null`

    `  assert ''blank'' == user.errors[''login''].code`

    `  assert ''nullable'' == user.errors[''firstName''].code`

    `  assert ''nullable'' == user.errors[''lastName''].code`

    `}`


    Once again, you can see the use of the `errors` object to inspect that the appropriate
    constraints have been violated. Finally, you need to ensure two things to test
    a successful registration:


    > *   The `User` instance has been placed in the `session` object.

    > *   The request has been redirected appropriately.


    [Listing 4-64](#Chapter04.html#list_4_64) shows an example of a test case that
    tests a successful user registration.


    ***Listing 4-64.** Testing Successful Registration*


    `void testRegistrationSuccess() {`

    `  request.method = ''POST''`


    `  params.login = ''henry''`

    `  params.password = ''password''`

    `  params.confirm = ''password''`

    `  params.firstName = ''Henry''`

    `  params.lastName = ''Rollins''`


    `  controller.register()`


    `  assert ''/store'' == response.redirectedUrl`

    `  assert session.user != null`

    `}`


    With the tests written, let’s now consider how to allow users to log in to the
    gTunes application.


    #### Allowing Users to Log In


    Since you’ve already added the login form, all you need to do is implement the
    controller logic. A login process is a good candidate for a command object because
    it involves capturing information—the login and password—without needing to actually
    persist the data.


    In this example you’re going to create a `LoginCommand` that encapsulates the
    login logic, leaving the controller action to do the simple stuff. [Listing 4-65](#Chapter04.html#list_4_65)
    shows the code for the `LoginCommand` class, which is defined in the same file
    as the `UserController` class.


    ***Listing 4-65.** The LoginCommand*


    `class LoginCommand {`

    `  String login`

    `  String password`

    `  private u`

    `  User getUser() {`

    `                if(!u && login) {`

    `                  u = User.findByLogin(login, [fetch:[purchasedSongs:''join'']])`

    `                }`

    `                return u`

    `  }`

    `  static constraints = {`

    `                login blank:false, validator:{ val, obj ->`

    `                    if(!obj.user)`

    `                      return "user.not.found"`

    `                }`

    `             password blank:false, validator:{ val, obj ->                                          `

    `                    if(obj.user && obj.user.password != val)`

    `                      return "user.password.invalid"`

    `                }`

    `  }`

    `}`


    The `LoginCommand` defines two properties that capture request parameters called
    `login` and `password`. The main logic of the code, however, is in the constraints
    definition. First, the `blank` constraint ensures that the login and/or password
    cannot be left blank. Second, a custom validator on the `login` parameter checks
    whether the user exists:


    `login blank:false, validator:{ val, cmd ->`

    `    if(!cmd.user)`

    `        return "user.not.found"`

    `}`


    The custom `validator` constraint takes a closure that receives two arguments:
    the value and the `LoginCommand` instance. The code within the closure calls the
    `getUser()` method of the `LoginCommand` to check whether the user exists. If
    the user doesn’t exist, the code returns an error code—“user.not.found”—that signifies
    an error has occurred.


    On the `password` parameter, another custom `validator` constraint checks whether
    the user has specified the correct password:


    `password blank:false, validator:{ val, cmd ->`

    `    if(cmd.user && cmd.user.password != val) return "user.password.invalid" }`


    Here the validator again uses the `getUser()` method of the `LoginCommand` to
    compare the password of the actual `User` instance with the value of the `password`
    property held by the `LoginCommand`. If the password is not correct, an `error`
    code is returned, triggering an error. You can add appropriate messages for each
    of the custom errors returned by the `LoginCommand` by adding them to the `grails-app/i18n/messages.properties`
    file:


    `user.not.found=User not found`

    `user.password.invalid=Incorrect password`


    With that done, it’s time to put the `LoginCommand` to use by implementing the
    `login` action in the `UserController`. [Listing 4-66](#Chapter04.html#list_4_66)
    shows the code for the `login` action.


    ***Listing 4-66.** The login Action*


    `def login(LoginCommand cmd) {`

    `  if(request.method == ''POST'') {`

    `    if(!cmd.hasErrors()) {`

    `      session.user = cmd.getUser()`

    `      redirect controller:''store''`

    `    } else {`

    `      render view:''/store/index'', model:[loginCmd:cmd]`

    `    }`

    `  } else {`

    `    render view:''/store/index''`

    `  }`

    `}`


    With the command object in place, the controller simply needs to do is what it
    does best: issue redirects and render views. Again, like the `register` action,
    login processing kicks in only when a `POST` request is received. Then if the
    command object has no errors, the user is placed into the session and the request
    is redirected to the `StoreController`.'
