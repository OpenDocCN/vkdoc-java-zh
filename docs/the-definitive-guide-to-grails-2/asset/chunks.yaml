    \ queries can solve the N+1 problem by reducing multiple SQL `SELECT` statements\
    \ to a single `SELECT` statement that uses an SQL `JOIN`. However, join queries\
    \ too can be expensive, depending on the number of joins and the amount of data\
    \ being pulled from the database.\n\nAs an alternative, you could use batch fetching,\
    \ which serves as an optimization of the lazy fetching strategy. With batch fetching,\
    \ instead of pulling in a single result, Hibernate will use a `SELECT` statement\
    \ that pulls in a configured number of results. To take advantage of batch fetching,\
    \ you need to set the `batchSize` at the class or association level.\n\nAs an\
    \ example, say you had a long `Album` with 23 songs. Hibernate would execute a\
    \ single `SELECT` to get the `Album` and then 23 extra `SELECT` statements for\
    \ each `Song`. However, if you configured a `batchSize` of 10 for the `Song` class,\
    \ Hibernate would perform only 3 queries in batches of 10, 10, and 3. [Listing\
    \ 9-64](#Chapter09.html#list_9_64) shows how to configure the `batchSize` using\
    \ the `mapping` block of the `Song` class.\n\n***Listing 9-64.** Configuring the\
    \ batchSize at the Class Level*\n\n```\nclass Song {\n    ...\n    static mapping\
    \ = {\n        batchSize 10\n    }\n}\n```\n\nAlternatively, you can also configure\
    \ the `batchSize` on the association. For example, say you loaded 15 `Album` instances.\
    \ Hibernate will execute a `SELECT` every time the songs association of each `Album`\
    \ is accessed, resulting in 15 `SELECT` statements. If you configured a `batchSize`\
    \ of 5 on the `songs` association, you would only get 3 queries. [Listing 9-65](#Chapter09.html#list_9_65)\
    \ shows how to configure the `batchSize` of the `songs` association.\n\n***Listing\
    \ 9-65.** Configuring the batchSize of an Association*\n\n```\nclass Album {\n\
    \    ...\n    static mapping = {\n        songs batchSize:10\n    }\n}\n```\n\n\
    As you can see from this discussion on eager vs. lazy fetching, a large part of\
    \ optimizing an application’s performance lies in reducing the number of calls\
    \ to the database. Eager fetching is one way to achieve that, but you’re still\
    \ making a trip to the database even if it’s only one.\n\nAn even better solution\
    \ is to eliminate the majority of calls to the database by caching the results.\
    \ In the next section, we’ll be looking at different caching techniques you can\
    \ take advantage of in GORM.\n\n### Caching\n\nIn the previous “The Semantics\
    \ of GORM” section, you discovered that the underlying Hibernate engine models\
    \ the concept of a `Session`. The `Session` is also known as the *first-level*\
    \ cache, because it stores the loaded persistent entities and prevents repeated\
    \ access to the database for the same object. However, Hibernate also has a number\
    \ of other caches including the second-level cache and the query cache. In the\
    \ next section, we’ll explain what the second-level cache is and show how it can\
    \ be used to reduce the chattiness between your application and the database.\n\
    \n#### The Second-Level Cache\n\nAs discussed, as soon as a Hibernate `Session`\
    \ is obtained by GORM, you already have an active cache: the first-level cache.\
    \ Although the first-level cache stores actual persistent instances for the scope\
    \ of the `Session`, the second-level cache exists for the whole time that the\
    \ `SessionFactory` exists. Remember, the `SessionFactory` is the object that constructs\
    \ each `Session`.\n\nIn other words, although a `Session` is typically scoped\
    \ for each request, the second-level cache is application scoped. Additionally,\
    \ the second-level cache stores only the property values and/or foreign keys rather\
    \ than the persistent instances themselves. As an example, [Listing 9-66](#Chapter09.html#list_9_66)\
    \ shows the conceptual representations of the `Album` class in the second-level\
    \ cache.\n\n***Listing 9-66.** How the Second-Level Cache Stores Data*\n\n```\n\
    9 -> [\"Odelay\",1994, \"Alternative\", 9.99, [34,35,36], 4]\n5 -> [\"Aha Shake\
    \ Heartbreak\",2004, \"Rock\", 7.99, [22,23,24], 8]\n```\n\nAs you can see, the\
    \ second-level cache stores the data using a map containing multidimensional arrays\
    \ that represent the data. The reason for doing this is that Hibernate doesn’t\
    \ have to require your classes to implement `Serializable` or some persistence\
    \ interface. By storing only the identifiers of associations, it eliminates the\
    \ chance of the associations becoming stale. The previous explanation is a bit\
    \ of an oversimplification; however, you don’t need to concern yourself too much\
    \ with the detail. Your main job is to specify a cache provider.\n\nBy default,\
    \ Grails comes preconfigured with Ehcache as the cache provider. You can change\
    \ the cache configuration in `DataSource.groovy` by modifying the settings shown\
    \ in [Listing 9-67](#Chapter09.html#list_9_67).\n\n***Listing 9-67.** Specifying\
    \ a Cache Provider*\n\n```\nhibernate {\n    cache.use_second_level_cache=true\n\
    \    cache.use_query_cache=true\n    cache.provider_class=\n        'net.sf.ehcache.hibernate.EhCacheRegionFactory\
    \ '\n}\n```\n\nYou can even configure a distributed cache such as Oracle Coherence\
    \ or Terracotta, but be careful if your application is dependent on data not being\
    \ stale. Remember, cached results don’t necessarily reflect the current state\
    \ of the data in the database.\n\nOnce you have a cache provider configured, you’re\
    \ ready to go. However, by default all persistent classes have no caching enabled.\
    \ You have to be very explicit about specifying what data you want cached and\
    \ what the cache policy is for that data.\n\nThere are essentially four cache\
    \ policies available depending on your needs:\n\n> *   `read-only`: If your application\
    \ never needs to modify data after it is created, then use this policy. It is\
    \ also an effective way to enforce read-only semantics for your objects because\
    \ Hibernate will throw an exception if you try to modify an instance in a read-only\
    \ cache. Additionally, this policy is safe even when used in a distributed cache\
    \ because there is no chance of stale data.\n> *   `nonstrict-read-write`: If\
    \ your application rarely modifies data and transactional updates aren’t an issue,\
    \ then a `nonstrict-read-write` cache may be appropriate. This strategy doesn’t\
    \ guarantee that two transactions won’t simultaneously modify a persistent instance.\
    \ It is mainly recommended for usage in scenarios with frequent reads and only\
    \ occasional updates.\n> *   `read-write`: If your application requires users\
    \ to frequently modify data, then you may want to use a `read-write` cache. Whenever\
    \ an object is updated, Hibernate will automatically evict the cached data from\
    \ the second-level cache. However, there is still a chance of phantom reads (stale\
    \ data) with this policy, and if transactional behavior is a requirement, you\
    \ should not use a `transactional` cache.\n> *   `transactional`: A `transactional`\
    \ cache provides fully transactional behavior with no chance of dirty reads. However,\
    \ you need to make sure you supply a cache provider that supports this feature,\
    \ such as JBoss TreeCache.\n\nSo how do you use these different cache levels in\
    \ a Grails application? Essentially, you need to mark each class and/or association\
    \ you want to cache using the `cache` method of the `mapping` block. For example,\
    \ [Listing 9-68](#Chapter09.html#list_9_68) shows how to configure the default\
    \ `read-write` cache for the `Album` class and a `read-only` cache for the `songs`\
    \ association.\n\n***Listing 9-68.** Specifying a Cache Policy*\n\n```\nclass\
    \ Album {\n    ...\n    static mapping {\n        cache true\n        songs cache:'read-only'\n\
    \    }\n}\n```\n\nNow, whenever you query for results, before loading them from\
    \ the database Hibernate will check whether the record is already present in the\
    \ second-level cache and, if it is, load it from there. Now let’s look at another\
    \ one of Hibernate’s caches: the query cache."
  raw: '#### Batch Fetching


    As you discovered in the previous section, using join queries can solve the N+1
    problem by reducing multiple SQL `SELECT` statements to a single `SELECT` statement
    that uses an SQL `JOIN`. However, join queries too can be expensive, depending
    on the number of joins and the amount of data being pulled from the database.


    As an alternative, you could use batch fetching, which serves as an optimization
    of the lazy fetching strategy. With batch fetching, instead of pulling in a single
    result, Hibernate will use a `SELECT` statement that pulls in a configured number
    of results. To take advantage of batch fetching, you need to set the `batchSize`
    at the class or association level.


    As an example, say you had a long `Album` with 23 songs. Hibernate would execute
    a single `SELECT` to get the `Album` and then 23 extra `SELECT` statements for
    each `Song`. However, if you configured a `batchSize` of 10 for the `Song` class,
    Hibernate would perform only 3 queries in batches of 10, 10, and 3\. [Listing
    9-64](#Chapter09.html#list_9_64) shows how to configure the `batchSize` using
    the `mapping` block of the `Song` class.


    ***Listing 9-64.** Configuring the batchSize at the Class Level*


    `class Song {`

    `    ...`

    `    static mapping = {`

    `        batchSize 10`

    `    }`

    `}`


    Alternatively, you can also configure the `batchSize` on the association. For
    example, say you loaded 15 `Album` instances. Hibernate will execute a `SELECT`
    every time the songs association of each `Album` is accessed, resulting in 15
    `SELECT` statements. If you configured a `batchSize` of 5 on the `songs` association,
    you would only get 3 queries. [Listing 9-65](#Chapter09.html#list_9_65) shows
    how to configure the `batchSize` of the `songs` association.


    ***Listing 9-65.** Configuring the batchSize of an Association*


    `class Album {`

    `    ...`

    `    static mapping = {`

    `        songs batchSize:10`

    `    }`

    `}`


    As you can see from this discussion on eager vs. lazy fetching, a large part of
    optimizing an application’s performance lies in reducing the number of calls to
    the database. Eager fetching is one way to achieve that, but you’re still making
    a trip to the database even if it’s only one.


    An even better solution is to eliminate the majority of calls to the database
    by caching the results. In the next section, we’ll be looking at different caching
    techniques you can take advantage of in GORM.


    #### Caching


    In the previous “The Semantics of GORM” section, you discovered that the underlying
    Hibernate engine models the concept of a `Session`. The `Session` is also known
    as the *first-level* cache, because it stores the loaded persistent entities and
    prevents repeated access to the database for the same object. However, Hibernate
    also has a number of other caches including the second-level cache and the query
    cache. In the next section, we’ll explain what the second-level cache is and show
    how it can be used to reduce the chattiness between your application and the database.


    ##### The Second-Level Cache


    As discussed, as soon as a Hibernate `Session` is obtained by GORM, you already
    have an active cache: the first-level cache. Although the first-level cache stores
    actual persistent instances for the scope of the `Session`, the second-level cache
    exists for the whole time that the `SessionFactory` exists. Remember, the `SessionFactory`
    is the object that constructs each `Session`.


    In other words, although a `Session` is typically scoped for each request, the
    second-level cache is application scoped. Additionally, the second-level cache
    stores only the property values and/or foreign keys rather than the persistent
    instances themselves. As an example, [Listing 9-66](#Chapter09.html#list_9_66)
    shows the conceptual representations of the `Album` class in the second-level
    cache.


    ***Listing 9-66.** How the Second-Level Cache Stores Data*


    `9 -> ["Odelay",1994, "Alternative", 9.99, [34,35,36], 4]`

    `5 -> ["Aha Shake Heartbreak",2004, "Rock", 7.99, [22,23,24], 8]`


    As you can see, the second-level cache stores the data using a map containing
    multidimensional arrays that represent the data. The reason for doing this is
    that Hibernate doesn’t have to require your classes to implement `Serializable`
    or some persistence interface. By storing only the identifiers of associations,
    it eliminates the chance of the associations becoming stale. The previous explanation
    is a bit of an oversimplification; however, you don’t need to concern yourself
    too much with the detail. Your main job is to specify a cache provider.


    By default, Grails comes preconfigured with Ehcache as the cache provider. You
    can change the cache configuration in `DataSource.groovy` by modifying the settings
    shown in [Listing 9-67](#Chapter09.html#list_9_67).


    ***Listing 9-67.** Specifying a Cache Provider*


    `hibernate {`

    `    cache.use_second_level_cache=true`

    `    cache.use_query_cache=true`

    `    cache.provider_class=`

    `        ''net.sf.ehcache.hibernate.EhCacheRegionFactory ''`

    `}`


    You can even configure a distributed cache such as Oracle Coherence or Terracotta,
    but be careful if your application is dependent on data not being stale. Remember,
    cached results don’t necessarily reflect the current state of the data in the
    database.


    Once you have a cache provider configured, you’re ready to go. However, by default
    all persistent classes have no caching enabled. You have to be very explicit about
    specifying what data you want cached and what the cache policy is for that data.


    There are essentially four cache policies available depending on your needs:


    > *   `read-only`: If your application never needs to modify data after it is
    created, then use this policy. It is also an effective way to enforce read-only
    semantics for your objects because Hibernate will throw an exception if you try
    to modify an instance in a read-only cache. Additionally, this policy is safe
    even when used in a distributed cache because there is no chance of stale data.

    > *   `nonstrict-read-write`: If your application rarely modifies data and transactional
    updates aren’t an issue, then a `nonstrict-read-write` cache may be appropriate.
    This strategy doesn’t guarantee that two transactions won’t simultaneously modify
    a persistent instance. It is mainly recommended for usage in scenarios with frequent
    reads and only occasional updates.

    > *   `read-write`: If your application requires users to frequently modify data,
    then you may want to use a `read-write` cache. Whenever an object is updated,
    Hibernate will automatically evict the cached data from the second-level cache.
    However, there is still a chance of phantom reads (stale data) with this policy,
    and if transactional behavior is a requirement, you should not use a `transactional`
    cache.

    > *   `transactional`: A `transactional` cache provides fully transactional behavior
    with no chance of dirty reads. However, you need to make sure you supply a cache
    provider that supports this feature, such as JBoss TreeCache.


    So how do you use these different cache levels in a Grails application? Essentially,
    you need to mark each class and/or association you want to cache using the `cache`
    method of the `mapping` block. For example, [Listing 9-68](#Chapter09.html#list_9_68)
    shows how to configure the default `read-write` cache for the `Album` class and
    a `read-only` cache for the `songs` association.


    ***Listing 9-68.** Specifying a Cache Policy*


    `class Album {`

    `    ...`

    `    static mapping {`

    **`cache true`**

    **`songs cache:''read-only''`**

    `    }`

    `}`


    Now, whenever you query for results, before loading them from the database Hibernate
    will check whether the record is already present in the second-level cache and,
    if it is, load it from there. Now let’s look at another one of Hibernate’s caches:
    the query cache.'
  trans: '

    #### 批量抓取


    正如你在上一节中所发现的，使用连接查询可以通过将多个 SQL `SELECT` 语句缩减为一条使用 SQL `JOIN` 的 `SELECT` 语句来解决
    N+1 问题。然而，连接查询也可能代价高昂，具体取决于连接的数量以及从数据库中拉取的数据量。


    作为替代方案，你可以使用批量抓取，它是对延迟抓取策略的一种优化。通过批量抓取，Hibernate 不会只拉取单个结果，而是使用一条 `SELECT` 语句来拉取配置数量的结果。要利用批量抓取，你需要在类级别或关联级别设置
    `batchSize`。


    例如，假设你有一张包含 23 首歌曲的长 `Album`（专辑）。Hibernate 会执行一条 `SELECT` 来获取 `Album`，然后为每首 `Song`（歌曲）额外执行
    23 条 `SELECT` 语句。但是，如果你为 `Song` 类配置了 `batchSize` 为 10，那么 Hibernate 将只执行 3 次查询，批次大小分别为
    10、10 和 3。代码清单 9-64 展示了如何使用 `Song` 类的 `mapping` 块来配置 `batchSize`。


    ***代码清单 9-64.** 在类级别配置 batchSize*


    `class Song {`

    `    ...`

    `    static mapping = {`

    `        batchSize 10`

    `    }`

    `}`


    或者，你也可以在关联上配置 `batchSize`。例如，假设你加载了 15 个 `Album` 实例。每次访问每个 `Album` 的 `songs` 关联时，Hibernate
    都会执行一条 `SELECT`，导致 15 条 `SELECT` 语句。如果你在 `songs` 关联上配置了 `batchSize` 为 5，那么你将只得到
    3 次查询。代码清单 9-65 展示了如何配置 `songs` 关联的 `batchSize`。


    ***代码清单 9-65.** 配置关联的 batchSize*


    `class Album {`

    `    ...`

    `    static mapping = {`

    `        songs batchSize:10`

    `    }`

    `}`


    从关于即时抓取与延迟抓取的讨论中可以看出，优化应用程序性能的很大一部分在于减少对数据库的调用次数。即时抓取是实现这一目标的一种方法，但即使只有一次调用，你仍然需要访问数据库。


    一个更好的解决方案是通过缓存结果来消除大部分对数据库的调用。在下一节中，我们将介绍你可以在 GORM 中利用的不同缓存技术。


    #### 缓存


    在之前的“GORM 的语义”部分中，你了解到底层的 Hibernate 引擎对 `Session`（会话）的概念进行了建模。`Session` 也被称为*一级*缓存，因为它存储了已加载的持久化实体，并防止对同一对象重复访问数据库。然而，Hibernate
    还有许多其他缓存，包括二级缓存和查询缓存。在下一节中，我们将解释什么是二级缓存，并展示如何使用它来减少应用程序与数据库之间的通信频率。


    ##### 二级缓存


    如前所述，一旦 GORM 获取到 Hibernate `Session`，你就已经拥有了一个活动缓存：一级缓存。虽然一级缓存在 `Session` 的作用域内存储实际的持久化实例，但二级缓存在
    `SessionFactory` 存在的整个期间都存在。请记住，`SessionFactory` 是构造每个 `Session` 的对象。


    换句话说，虽然 `Session` 通常作用于每个请求，但二级缓存是应用程序作用域的。此外，二级缓存只存储属性值和/或外键，而不是持久化实例本身。例如，代码清单
    9-66 展示了 `Album` 类在二级缓存中的概念表示。


    ***代码清单 9-66.** 二级缓存如何存储数据*


    `9 -> ["Odelay",1994, "Alternative", 9.99, [34,35,36], 4]`

    `5 -> ["Aha Shake Heartbreak",2004, "Rock", 7.99, [22,23,24], 8]`


    如你所见，二级缓存使用包含表示数据的多维数组的映射来存储数据。这样做的原因是 Hibernate 不需要要求你的类实现 `Serializable` 或某些持久化接口。通过仅存储关联的标识符，它消除了关联变得过时的可能性。前面的解释有点过于简化；然而，你不需要过多关注细节。你的主要任务是指定一个缓存提供程序。


    默认情况下，Grails 预配置了 Ehcache 作为缓存提供程序。你可以通过修改 代码清单 9-67 中显示的设置，在 `DataSource.groovy`
    中更改缓存配置。


    ***代码清单 9-67.** 指定缓存提供程序*


    `hibernate {`

    `    cache.use_second_level_cache=true`

    `    cache.use_query_cache=true`

    `    cache.provider_class=`

    `        ''net.sf.ehcache.hibernate.EhCacheRegionFactory ''`

    `}`


    你甚至可以配置分布式缓存，例如 Oracle Coherence 或 Terracotta，但如果你的应用程序依赖于数据不陈旧，请务必小心。请记住，缓存的结果不一定反映数据库中数据的当前状态。


    一旦配置了缓存提供程序，你就可以开始使用了。但是，默认情况下，所有持久化类都没有启用缓存。你必须非常明确地指定要缓存哪些数据以及这些数据的缓存策略是什么。


    根据你的需求，基本上有四种可用的缓存策略：


    > *   `read-only`（只读）：如果你的应用程序在数据创建后永远不需要修改它，则使用此策略。这也是为你的对象强制执行只读语义的有效方法，因为如果你尝试修改只读缓存中的实例，Hibernate
    将抛出异常。此外，即使在分布式缓存中使用此策略也是安全的，因为没有数据过时的风险。

    > *   `nonstrict-read-write`（非严格读写）：如果你的应用程序很少修改数据，并且事务性更新不是问题，那么 `nonstrict-read-write`
    缓存可能是合适的。此策略不保证两个事务不会同时修改一个持久化实例。它主要推荐用于频繁读取且仅偶尔更新的场景。

    > *   `read-write`（读写）：如果你的应用程序需要用户频繁修改数据，那么你可能希望使用 `read-write` 缓存。每当对象被更新时，Hibernate
    会自动从二级缓存中驱逐缓存的数据。但是，使用此策略仍然存在幻读（数据陈旧）的可能性，并且如果要求事务行为，则不应使用 `transactional` 缓存。

    > *   `transactional`（事务性）：`transactional` 缓存提供完全的事务性行为，没有脏读的可能性。但是，你需要确保提供一个支持此功能的缓存提供程序，例如
    JBoss TreeCache。


    那么，如何在 Grails 应用程序中使用这些不同的缓存级别呢？本质上，你需要使用 `mapping` 块的 `cache` 方法来标记每个要缓存的类和/或关联。例如，代码清单
    9-68 展示了如何为 `Album` 类配置默认的 `read-write` 缓存，并为 `songs` 关联配置 `read-only` 缓存。


    ***代码清单 9-68.** 指定缓存策略*


    `class Album {`

    `    ...`

    `    static mapping {`

    **`cache true`**

    **`songs cache:''read-only''`**

    `    }`

    `}`


    现在，每当你查询结果时，在从数据库加载之前，Hibernate 会检查该记录是否已存在于二级缓存中，如果存在，则从那里加载。现在让我们看看 Hibernate
    的另一个缓存：查询缓存。

