  raw: '### Events Auto Time Stamping


    GORM has a number of built-in hooks you can take advantage of to hook into persistence
    events. Each event is defined as a closure property in the domain class itself.
    The events available are as follows:


    > *   `onLoad/beforeLoad`: fired when an object is loaded from the database

    > *   `beforeInsert`: fired before an object is initially persisted to the database

    > *   `beforeValidate`: fired before an object is validated

    > *   `beforeUpdate`: fired before an object is updated in the database

    > *   `beforeDelete`: fired before an object is deleted from the database

    > *   `afterInsert`: fired after an object has been persisted to the database

    > *   `afterUpdate`: fired after an object has been updated in the database

    > *   `afterDelete`: fired after an object has been deleted from the database


    These events are useful for performing tasks such as audit logging and tracking.
    For example, you could have another domain class that models an `AuditLogEvent`
    that gets persisted every time an instance gets accessed or saved. [Listing 9-72](#Chapter09.html#list_9_72)
    shows this concept in action.


    ***Listing 9-72.** Using GORM Events*


    `class Album {`

    `    ...`

    `    def onLoad() {`

    `        new AuditLogEvent(type:"read", data:title).save()`

    `    }`

    `    def beforeSave() {`

    `        new AuditLogEvent(type:"save", data:title).save()`

    `    }`


    `    def beforeValidate() {`

    `        // run before validation happens`

    `    }`


    `    def beforeValidate(List propertiesBeingValidated) {`

    `        // run before validation happens and propertiesBeingValidated`

    `        // is a List containing the names of all of the properties which`

    `        // are about to be validated.`

    `    }`

    `}`


    GORM also supports automatic time stamps. Essentially, if you provide a property
    called `dateCreated` or one called `lastUpdated`, GORM will automatically populate
    the values for it every time an instance is saved or updated. In fact, you’ve
    already been using this feature, since the `Album` class has `lastUpdated` and
    `dateCreated` properties. However, if you prefer to manage these properties manually,
    you can disable automatic time stamping using the `autoTimestamp` method of the
    `mapping` block, as shown in [Listing 9-73](#Chapter09.html#list_9_73).


    ***Listing 9-73.** Disable Auto Time Stamping*


    `class Album {`

    `    ...`

    `    static mapping = {`

    `        autoTimestamp false`

    `    }`

    `}`


    ### Summary


    You’ve now reached the end of this tour of GORM. As you’ve discovered, thanks
    in large part to Hibernate, GORM is a fully featured dynamic ORM tool that blurs
    the lines between objects and the database. From dynamic finders to criteria,
    there is a plethora of options for your querying needs. However, it’s not all
    clever tricks; GORM provides solutions to such harder problems as eager fetching
    and optimistic locking.


    Possibly the most important aspect of this chapter is the knowledge you have gained
    on the semantics of GORM. By understanding the ORM tool you are using, you’ll
    find there are fewer surprises along the way, and you’ll become a more effective
    developer. Although GORM pretty much eliminates the need for data access layers
    such as those you typically find in pure Java applications, it doesn’t remove
    the need for a structured way to group units of logic. In the next chapter, we’ll
    be looking at Grails services that provide exactly this. Don’t go away!


    ## CHAPTER 10


    ![Image](images/3squ.jpg)


    ## Services


    A common pattern in the development of enterprise software is the so-called service
    layer that encapsulates a set of business operations. With Java web development,
    it is generally considered good practice to provide layers of abstraction and
    reduce coupling between the layers within an MVC application.


    The service layer provides a way to centralize application behavior into an API
    that can be utilized by controllers or other services. Many good reasons exist
    for encapsulating logic into a service layer, but the following are the main drivers:


    > *   You need to centralize business logic into a service API.

    > *   The use cases within your application operate on multiple domain objects
    and model complex business operations that are best not mixed in with controller
    logic.

    > *   Certain use cases and business processes are best encapsulated outside a
    domain object and within an API.


    If your requirements fall into one of these categories, creating a service is
    probably what you want to do. Services themselves often have multiple dependencies;
    for example, a common activity for a service is to interact with the persistence
    layer, whether that is straight JDBC or an ORM system, such as Hibernate.


    Clearly, whichever system you use, you are potentially dependent on a data source,
    a session factory, or maybe just another service. Configuring these dependencies
    in a loosely coupled way has been one of the main challenges facing early adopters
    of the Java EE technology.


    Like many other software development challenges, this problem is solved by a software
    design pattern—in this case, one called Inversion of Control (IoC), or dependency
    injection. A project such as Spring implements this pattern by providing an IoC
    container.


    Grails uses Spring to configure itself internally, and it is this foundation that
    Grails builds on to provide services by convention. Let’s jump straight into looking
    at what Grails services are and how to create a basic service.


    ### Understanding Service Basics


    Services, like other Grails artefacts, follow a convention and don’t extend any
    base class. For example, say that you decide to move logic related to retrieving
    album artwork out of the `AlbumArtTagLib` and into a service; to do so, you would
    need to create a class called `AlbumArtService`, located in the `grails-app/services/`
    directory.


    Unsurprisingly, there is a Grails target that allows you to conveniently create
    services. Building on what was just mentioned, to create the `AlbumArtService`,
    you can execute the `create-service` target, which will prompt you to enter the
    name of the service, as demonstrated in [Listing 10-1](#Chapter10.html#list_10_1).


    ***Listing 10-1.** Running the create-service Target*


    `grails> create-service com.gtunes.AlbumArt`

    `| Created file grails-app/services/com/gtunes/AlbumArtService.groovy`

    `| Created file test/unit/com/gtunes/AlbumArtServiceTests.groovy`


    This will create the `AlbumArtService` class automatically and put it in the right
    place. The result will resemble something like [Listing 10-2](#Chapter10.html#list_10_2).


    ***Listing 10-2.** grails-app/services/com/gtunes/AlbumArtService.groovy*


    `package com.gtunes`

    `class AlbumArtService {`

    `    def serviceMethod() {`

    `    }`

    `}`


    The service contains one method, which is just a placeholder for a real method.'
