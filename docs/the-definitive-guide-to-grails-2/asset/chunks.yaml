- fmt: "### Testing Controllers\n\nGrails uses mixins to provide special behavior\
    \ for unit testing controllers. As an example, the `AlbumController` class as\
    \ it stands has no test coverage. If the controller were created with the `create-controller`\
    \ command, a unit test would have been created at the same time. If not, to create\
    \ a test for this controller, you need create a new test class. The default unit\
    \ test that would have been generated by the `create-controller` command is shown\
    \ in [Listing 4-47](#Chapter04.html#list_4_47).\n\n**Listing 4-47.** Controller\
    \ Unit Test Template\n\n```\npackage com.gtunes\n\nimport grails.test.mixin.*\n\
    import org.junit.*\n\n@TestFor(AlbumController)\nclass AlbumControllerTests {\n\
    \n    void testSomething() {\n       fail \"Implement me\"\n    }\n}\n```\n\n\
    Let us consider a simple controller action that we want to test. [Listing 4-48](#Chapter04.html#list_4_48)\
    \ shows a `list` action in the `AlbumController` which returns a model that includes\
    \ a list of all of the albums in the database.\n\n**Listing 4-48.** A Simple Controller\
    \ Action\n\n```\npackage com.gtunes\n\nclass AlbumController {\n\n    def list()\
    \ {\n        [albumList: Album.list()]\n    }\n}\n```\n\nA unit test that attempts\
    \ to execute that action and verify that the model contains the expected information\
    \ might look like the code in [Listing 4-49](#Chapter04.html#list_4_49).\n\n**Listing\
    \ 4-49.** A Simple Controller Unit Test\n\n```\npackage com.gtunes\n\nimport grails.test.mixin.*\n\
    \n@TestFor(AlbumController)\nclass AlbumControllerTests {\n\n    void testListAction()\
    \ {\n        def model = controller.list()\n        // make assertions about the\
    \ model\n    }\n}\n```\n\nAttempting to run that test will lead to an error, as\
    \ shown in [Listing 4-50](#Chapter04.html#list_4_50).\n\n**Listing 4-50.** Controller\
    \ Unit Test Failure\n\n```\ngrails> test-app unit:\n| Running 1 unit test... 1\
    \ of 1\n| Failure:  testListAction(com.gtunes.AlbumControllerTests)\n|  groovy.lang.MissingMethodException:\
    \ No signature of method: com.gtunes.Album.list() is\napplicable for argument\
    \ types: () values: []\n| Completed 1 unit test, 1 failed in 200ms\n| Tests FAILED\
    \  - view reports in target/test-reports\ngrails>\n```\n\nThe problem with the\
    \ test here is that the `list` action in the `AlbumController` is invoking the\
    \ `Album.list()` method, which isn’t available in our unit testing environment.\
    \ Fortunately, the framework makes it very easy to mock the entire GORM API so\
    \ a unit test like this one can be carried out. One way to do this is to use the\
    \ `@Mock` annotation with a domain class argument. This instructs the framework\
    \ to add the GORM API to this domain class and provides a full in-memory implementation\
    \ of GORM, which allows the full GORM API to function without the need for a real\
    \ database to be created. All of that is accounted for in the more complete unit\
    \ shown in [listing 4-51](#Chapter04.html#list_4_51).\n\n**Listing 4-51.** Updated\
    \ `AlbumControllerUnitTests`\n\n```\npackage com.gtunes\n\nimport grails.test.mixin.*\n\
    import grails.test.mixin.domain.*\n\n@TestFor(AlbumController)\n@Mock(Album)\n\
    class AlbumControllerTests {\n\n    void testListAction() {\n        new Album(title:\
    \ 'Trilogy').save()\n        new Album(title: 'Tarkus').save()\n\n        def\
    \ model = controller.list()\n        assert model.albumList?.size() == 2\n   \
    \ }\n}\n```\n\nIn [Listing 4-51](#Chapter04.html#list_4_51), we’re testing the\
    \ returned model, but some controller actions write directly to the response or\
    \ issue a redirect rather than return a value. To test an action that writes to\
    \ the response, you can use the `response` object of the controller, which is\
    \ an instance of the `org.codehaus.groovy.grails.plugins.testing.GrailsMockHttpServletResponse`\
    \ class, which indirectly extends the `org.springframework.mock.web.MockHttpServletResponse`\
    \ class and provides additional utility methods.\n\nSeveral useful methods in\
    \ the `MockHttpServletResponse` class allow you to inspect the state of the current\
    \ response. In particular, the `getText()` method provides access to what is currently\
    \ written into the response as a string. For example, if you have an action that\
    \ renders some text to the response, you could test it as shown in [Listing 4-52](#Chapter04.html#list_4_52).\n\
    \n**Listing 4-52.** Testing the Contents of the Response\n\n```\nvoid testIndex()\
    \ {\n    controller.index()\n    assert 'Welcome to the gTunes store!' == response.text\n\
    }\n```\n\n### Controllers in Action\n\nIn this section, you’ll learn how to build\
    \ a simple login and registration system using Grails controllers. In [Chapter\
    \ 12](#Chapter12.html), we’ll be refactoring this system to use one of the more\
    \ generic Grails security plugins, but for the moment it will serve as a useful\
    \ starting point.\n\nOne of the first things to consider when developing any site\
    \ is the site’s point of entry. At the moment, you’ve just created a bunch of\
    \ scaffolded pages, but now it’s time to think about the real application for\
    \ the first time, starting with the home page.\n\n#### Creating the gTunes Home\
    \ Page\n\nThe gTunes application is a music store where users can log in, browse\
    \ the available music, and purchase music that they can then play. First, you\
    \ need to establish a home page. You already have a `StoreController`, so you\
    \ can use that as the controller that deals with the home page. To make sure visitors\
    \ get routed to this controller, you can modify the `grails-app/conf/UrlMappings.groovy`\
    \ file to map visitors to the root of the application to this controller (see\
    \ [Listing 4-53](#Chapter04.html#list_4_53)).\n\n**Listing 4-53.** Routing Users\
    \ to the Root of the Application to the `StoreController`\n\n```\nclass UrlMappings\
    \ {\n    static mappings = {\n        \"/\"(controller:\"store\")\n    }\n}\n\
    ```\n\nNotice how you can use a forward slash to tell Grails to map any request\
    \ to the root of the application to the `StoreController`. As you can see from\
    \ the mapping, it is not mapping onto any particular action in `StoreController`,\
    \ which will trigger the default action. The default action is the `index` action,\
    \ which currently writes out a simple-text response. You need to change the `index`\
    \ action so view delegation kicks in.\n\n```\ndef index() {}\n```\n\nNow instead\
    \ of returning a text response, the `index` action delegates to the `grails-app/views/store/index.gsp`\
    \ view, which you can use to render the home page. We’ll start with something\
    \ simple that shows just a welcome message; we can expand on this later. [Listing\
    \ 4-54](#Chapter04.html#list_4_54) shows the markup code involved.\n\n**Listing\
    \ 4-54.** The gTunes Home Page\n\n```\n<html>\n    <head>\n        <meta http-equiv=\"\
    Content-type\" content=\"text/html; charset=utf-8\">\n        <meta name=\"layout\"\
    \ content=\"main\">\n        <title>gTunes Store</title>\n                </head>\n\
    \    <body id=\"body\">\n        <h1>Your online music store and storage service!</h1>\n\
    \        <p>Manage your own library, browse music and purchase new tracks as they\n\
    \           become available</p>\n                </body>\n</html>\n```\n\nThe\
    \ next step is to consider how to enable users to register, login, and logout.\
    \ Before you can do that, you need to define the notion of a user within the gTunes\
    \ application. Let’s do that in the next section."
  raw: '### Testing Controllers


    Grails uses mixins to provide special behavior for unit testing controllers. As
    an example, the `AlbumController` class as it stands has no test coverage. If
    the controller were created with the `create-controller` command, a unit test
    would have been created at the same time. If not, to create a test for this controller,
    you need create a new test class. The default unit test that would have been generated
    by the `create-controller` command is shown in [Listing 4-47](#Chapter04.html#list_4_47).


    ***Listing 4-47.** Controller Unit Test Template*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `@TestFor(AlbumController)`

    `class AlbumControllerTests {`


    `    void testSomething() {`

    `       fail "Implement me"`

    `    }`

    `}`


    Let us consider a simple controller action that we want to test. [Listing 4-48](#Chapter04.html#list_4_48)
    shows a list action in the `AlbumController` which returns a model that includes
    a list of all of the albums in the database.


    ***Listing 4-48.** A Simple Controller Action*


    `package com.gtunes`


    `class AlbumController {`


    `    def list() {`

    `        [albumList: Album.list()]`

    `    }`

    `}`


    A unit test that attempts to execute that action and verify that the model contains
    the expected information might look like the code in [Listing 4-49](#Chapter04.html#list_4_49).


    ***Listing 4-49.** A Simple Controller Unit Test*


    `package com.gtunes`


    `import grails.test.mixin.*`


    `@TestFor(AlbumController)`

    `class AlbumControllerTests {`


    `    void testListAction() {`

    `        def model = controller.list()`

    `        // make assertions about the model`

    `    }`

    `}`


    Attempting to run that test will lead to an error, as shown in [Listing 4-50](#Chapter04.html#list_4_50).


    ***Listing 4-50.** Controller Unit Test Failure*


    `grails> test-app unit:`

    `| Running 1 unit test... 1 of 1`

    `| Failure:  testListAction(com.gtunes.AlbumControllerTests)`

    `|  groovy.lang.MissingMethodException: No signature of method: com.gtunes.Album.list()
    is`

    `applicable for argument types: () values: []`

    `| Completed 1 unit test, 1 failed in 200ms`

    `| Tests FAILED  - view reports in target/test-reports`

    `grails>`


    The problem with the test here is that the list action in the `AlbumController`
    is invoking the `Album.list()` method, which isn’t available in our unit testing
    environment. Fortunately, the framework makes it very easy to mock the entire
    GORM API so a unit test like this one can be carried out. One way to do this is
    to use the `@Mock` annotation with a domain class argument. This instructs the
    framework to add the GORM API to this domain class and provides a full in-memory
    implementation of GORM, which allows the full GORM API to function without the
    need for a real database to be created. All of that is accounted for in the more
    complete unit shown in [listing 4-51](#Chapter04.html#list_4_51).


    ***Listing 4-51.** Updated AlbumControllerUnitTests*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import grails.test.mixin.domain.*`


    `@TestFor(AlbumController)`

    `@Mock(Album)`

    `class AlbumControllerTests {`


    `    void testListAction() {`

    `        new Album(title: ''Trilogy'').save()`

    `        new Album(title: ''Tarkus'').save()`


    `        def model = controller.list()`

    `        assert model.albumList?.size() == 2`

    `    }`

    `}`


    In [Listing 4-51](#Chapter04.html#list_4_51), we’re testing the returned model,
    but some controller actions write directly to the response or issue a redirect
    rather than return a value. To test an action that writes to the response, you
    can use the `response` object of the controller, which is an instance of the `org.codehaus.groovy.grails.plugins.testing.GrailsMockHttpServletResponse`
    class, which indirectly extends the `org.springframework.mock.web.MockHttpServletResponse`
    class and provides additional utility methods.


    Several useful methods in the `MockHttpServletResponse` class allow you to inspect
    the state of the current response. In particular, the `getText()` method provides
    access to what is currently written into the response as a string. For example,
    if you have an action that renders some text to the response, you could test it
    as shown in [Listing 4-52](#Chapter04.html#list_4_52).


    ***Listing 4-52.** Testing the Contents of the Response*


    `void testIndex() {`

    `    controller.index()`

    `    assert ''Welcome to the gTunes store!'' == response.text`

    `}`


    ### Controllers in Action


    In this section, you’ll learn how to build a simple login and registration system
    using Grails controllers. In [Chapter 12](#Chapter12.html), we’ll be refactoring
    this system to use one of the more generic Grails security plugins, but for the
    moment it will serve as a useful starting point.


    One of the first things to consider when developing any site is the site’s point
    of entry. At the moment, you’ve just created a bunch of scaffolded pages, but
    now it’s time to think about the real application for the first time, starting
    with the home page.


    #### Creating the gTunes Home Page


    The gTunes application is a music store where users can log in, browse the available
    music, and purchase music that they can then play. First, you need to establish
    a home page. You already have a `StoreController`, so you can use that as the
    controller that deals with the home page. To make sure visitors get routed to
    this controller, you can modify the `grails-app/conf/ UrlMappings.groovy` file
    to map visitors to the root of the application to this controller (see [Listing
    4-53](#Chapter04.html#list_4_53)).


    ***Listing 4-53.** Routing Users to the Root of the Application to the StoreController*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/"(controller:"store")`

    `    }`

    `}`


    Notice how you can use a forward slash to tell Grails to map any request to the
    root of the application to the `StoreController`. As you can see from the mapping,
    it is not mapping onto any particular action in `StoreController`, which will
    trigger the default action. The default action is the `index` action, which currently
    writes out a simple-text response. You need to change the `index` action so view
    delegation kicks in.


    `def index() {}`


    Now instead of returning a text response, the `index` action delegates to the
    `grails-app/ views/store/index.gsp` view, which you can use to render the home
    page. We’ll start with something simple that shows just a welcome message; we
    can expand on this later. [Listing 4-54](#Chapter04.html#list_4_54) shows the
    markup code involved.


    ***Listing 4-54.** The gTunes Home Page*


    `<html>`

    `    <head>`

    `        <meta http-equiv="Content-type" content="text/html; charset=utf-8">`

    `        <meta name="layout" content="main">`

    `        <title>gTunes Store</title>`

    `                </head>`

    `    <body id="body">`

    `        <h1>Your online music store and storage service!</h1>`

    `        <p>Manage your own library, browse music and purchase new tracks as they`

    `           become available</p>`

    `                </body>`

    `</html>`


    The next step is to consider how to enable users to register, login, and logout.
    Before you can do that, you need to define the notion of a user within the gTunes
    application. Let’s do that in the next section.'
