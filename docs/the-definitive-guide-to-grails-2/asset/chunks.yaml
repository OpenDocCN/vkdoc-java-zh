    ### 管理事务


    如前所述，服务通常封装了处理多个领域对象的业务操作。如果在执行更改时发生异常，你可能不希望将之前的任何更改提交到数据库。


    本质上，你需要一种"全有或全无"的方法，也称为*事务*。事务通过其 ACID 属性对于维护数据库完整性至关重要，这些属性可能在使用关系型数据库的每本书中都有涉及。不过，我们还是在这里快速了解一下。ACID
    代表原子性、一致性、隔离性和持久性。


    > *   *原子性*：指事务中对数据的操作必须是原子的。换句话说，事务中的所有任务要么全部完成，要么全部不完成，从而允许回滚更改。

    > *   *一致性*：要求数据库在任何操作发生前后都处于一致状态。如果数据库一开始就不处于合法状态，那么尝试完成事务是没有意义的；而如果某个操作损害了数据库的完整性，那将是相当愚蠢的。

    > *   *隔离性*：指事务如何与所有其他操作隔离。本质上，这意味着其他查询或操作绝不应暴露处于中间状态的数据。

    > *   *持久性*：一旦事务完成，持久性保证该事务不可能被撤销。因此，即使发生系统故障，已提交的事务此时也无法中止。


    Grails 服务可以声明一个名为 `transactional` 的静态属性。当 `transactional` 属性设置为 `true` 时，服务的方法将由
    Spring 配置为进行事务划分。这会创建一个 Spring 代理，该代理包装每个方法调用并提供事务管理。


    Grails 为你处理整个自动运行时配置，让你可以专注于编写方法内的逻辑。如果服务不需要任何事务管理，请将 `transactional` 属性设置为 `false`
    以禁用事务。


    另一种选择是，服务需要自己对事务管理施加细粒度的控制。实现此目的的方法是将 `transactional` 属性赋值为 `false`，并自行负责管理事务。可以在任何领域类上调用静态的
    `withTransaction` 方法；它期望将一个闭包作为参数传递。该闭包代表了事务边界。清单 10-10 给出了一个示例。


    ***清单 10-10.** 在服务中使用 withTransaction*


    `package com.gtunes`

    `class StoreService {`

    `    // 关闭自动事务管理`

    `    static transactional = false`

    `    void someServiceMethod() {`

    `        Album.withTransaction {`

    `            // 此闭包内的所有操作都在一个事务中发生`

    `           // 当事务完成时，该事务将被提交`

    `        }`

    `    }`

    `}`


    如果传递给 `withTransaction` 方法的闭包抛出异常，则事务将回滚。否则，事务将被提交。


    显式控制事务回滚也很简单。事实证明，`org.springframework.transaction.TransactionStatus` 接口的一个实例作为参数传递给了闭包。`TransactionStatus`
    接口定义的方法之一是 `setRollbackOnly()`。^(1) 调用 `setRollbackOnly()` 方法将确保事务被回滚。清单 10-11
    演示了如何利用这一点。


    ***清单 10-11.** 使用 TransactionStatus 参数*


    `package com.gtunes`

    `class StoreService {`

    `    // 关闭自动事务管理`

    `    static transactional = false`

    `    void someServiceMethod() {`

    `        Album.withTransaction { tx ->`

    `            // 对数据库执行一些操作`

    `            // 如果出于任何原因需要回滚事务，`

    `            // 请在 TransactionStatus 参数上调用 setRollbackOnly()...`

    `            tx.setRollbackOnly()`

    `        }`

    `    }`

    `}`


    ![Image](img/line.jpg)


    ¹ 你可以在 [`http://static.springsource.org/spring/docs/3.1.x/javadoc-api/`](http://static.springsource.org/spring/docs/3.1.x/javadoc-api/)
    找到 TransactionStatus 接口的完整文档。


    当然，控制器和其他 Grails 工件需要获取对单例 `StoreService` 的引用。如本章前面所述，获取服务引用的最佳方法是利用 Grails 提供的自动依赖注入。


    ### 服务作用域


    你必须小心在服务中存储状态。默认情况下，所有服务的作用域都是单例，并且可以被多个请求并发使用。此外，对服务方法的访问不是同步的。对于无状态服务，这些都不是问题。如果服务必须维护状态，则其作用域应设置为
    `singleton` 以外的其他值。


    Grails 支持服务的几种作用域。使用哪种作用域取决于你的应用程序如何使用该服务以及服务中维护了何种状态。支持的作用域如下：


    > *   `prototype`：每次将服务注入到另一个类时，都会创建一个新的服务。

    > *   `request`：每个请求都会创建一个新的服务。

    > *   `flash`：仅为当前和下一个请求创建一个新的服务。

    > *   `flow`：在 Web Flow 中，服务将在该流程的作用域内存在。

    > *   `conversation`：在 Web Flow 中，服务将在该会话的作用域内存在；换句话说，即根流程及其子流程。

    > *   `session`：为用户会话的作用域创建一个服务。

    > *   `singleton`（默认）：永远只存在一个服务实例。


    如果服务要使用除 `singleton` 之外的任何作用域，则服务必须声明一个静态属性 `scope`，并将其赋值为前面列出的支持作用域之一。请参见清单 10-12。


    ***清单 10-12.** 一个请求作用域的服务*


    `class SomeUsefulService {`

    `    boolean transactional = true`

    `    // 这是一个请求作用域的服务`

    `    static scope = ''request''`

    `}`


    请谨慎选择服务作用域，并确保你的作用域与应用程序对服务的期望一致。优先选择无状态服务；对于这些服务，默认作用域 `singleton` 几乎总是最优的。当服务必须维护状态时，请选择满足应用程序需求的作用域。

