- fmt: "### Simplifying Forms with the Fields Plug-in\n\nCreating and maintaining\
    \ complicated forms with a lot of input fields can be tedious and often involves\
    \ a lot of copy-and-paste code. A form for inputting all of the fields related\
    \ to creating a `Person` object may be pretty much exactly the same as the form\
    \ for inputting all of the fields related to an `Account` object, except that\
    \ the input fields would have different names. Consider a `Person` domain class\
    \ that has `firstName`, `lastName`, and `age` properties. A form to help create\
    \ a person might include code like that shown in [Listing 5-29](#Chapter05.html#list_5_29).\n\
    \n**Listing 5-29.** Form for Creating a Person\n\n```\n<div class=\"fieldcontain\"\
    >\n    <label for=\"age\">\n          <g:message code=\"person.age.label\"\n \
    \                  default=\"Age\" />\n          <span class=\"required-indicator\"\
    >*</span>\n    </label>\n    <g:field type=\"number\"\n              name=\"age\"\
    \n              required=\"\"\n              value=\"${personInstance.age}\"/>\n\
    </div>\n\n<div class=\"fieldcontain\">\n    <label for=\"firstName\">\n      \
    \    <g:message code=\"person.firstName.label\"\n                   default=\"\
    First Name\" />\n\n    </label>\n    <g:textField name=\"firstName\"\n       \
    \          value=\"${personInstance?.firstName}\"/>\n</div>\n\n<div class=\"fieldcontain\"\
    >\n    <label for=\"lastName\">\n          <g:message code=\"person.lastName.label\"\
    \n                   default=\"Last Name\" />\n\n    </label>\n    <g:textField\
    \ name=\"lastName\"\n                 value=\"${personInstance?.lastName}\"/>\n\
    </div>\n```\n\nIf you wanted to create a form for creating an `Account` object\
    \ that had `bankName`, `accountType`, and `balance` properties, you might copy\
    \ and paste that code and then go through the code and replace property names.\
    \ Of course, managing all of that boilerplate code is not ideal.\n\nThe fields\
    \ plug-in provides tools to help eliminate all that boilerplate. As an example,\
    \ the fields plug-in provides a GSP tag named `all`, which will render input fields\
    \ for every property of a bean. The code in [Listing 5-29](#Chapter05.html#list_5_29)\
    \ could be replaced with the following:\n\n```\n<f:all bean=\"personInstance\"\
    />\n```\n\nWhich would you rather write and maintain?\n\nThe fields plug-in provides\
    \ a good bit more functionality than just the `all` tag. See [`http://grails.org/plugin/fields`](http://grails.org/plugin/fields)\
    \ for more information on the plug-in.\n\n### Validation and Error Handling\n\n\
    Since you learned how to apply constraints to your domain model in [Chapter 3](#Chapter03.html),\
    \ clearly it becomes useful at some point to display validation errors in the\
    \ view when they occur. Of course, you could use scriptlets to iterate over the\
    \ errors of a domain object and output them explicitly, but that’s work that Grails\
    \ can do for you. Just to recap how validation works, take a look at the state\
    \ diagram shown in [Figure 5-1](#Chapter05.html#fig_5_1).\n\n![Image](images/9781430243779_Fig05-01.jpg)\n\
    \n**Figure 5-1.** Validation state diagram\n\n#### The `hasErrors` Tag\n\nSince\
    \ errors do occur, it is often useful to display information conditionally. To\
    \ this end, Grails provides a `<g:hasErrors>` tag that supports the following\
    \ attributes:\n\n> *   `bean`: a bean instance to inspect for errors\n> *   `field`:\
    \ the name of the field to check for errors\n> *   `model`: an alternative to\
    \ specifying a bean; an entire model (map) can be checked\n\nYou’ll recall that\
    \ you have already seen the `<g:hasErrors>` tag used as a method, but it is also\
    \ equally applicable as a tag. Interestingly, if no attributes are specified whatsoever,\
    \ the tag will scan the entire request scope for beans and check each object found\
    \ for errors. Since the `<g:hasErrors>` tag is often used in conjunction with\
    \ `<g:eachError>`, we’ll cover that next, followed by an example.\n\n#### The\
    \ `eachError` Tag\n\nIf a bean instance does have errors, it is useful to iterate\
    \ over them and display each in turn. This can be done simply with the `<g:eachError>`\
    \ tag, which takes attributes identical to those expected by the `<g:hasErrors>`\
    \ tag.\n\n[Listing 5-30](#Chapter05.html#list_5_30) demonstrates how to use the\
    \ `hasErrors` and `eachError` tags to generate a list of error messages for an\
    \ `Album` instance.\n\n**Listing 5-30.** Displaying Errors\n\n```\n<g:hasErrors\
    \ bean=\"${album}\">\n          <ul class=\"errors\">\n        <g:eachError bean=\"\
    ${album}\">\n              <li>${it.defaultMessage}</li>\n          </g:eachError>\n\
    \     </ul>\n</g:hasErrors>\n```\n\nIn this instance, `<g:hasErrors>` checks whether\
    \ there are any errors in the first place, and if there are, it creates an HTML\
    \ list. These errors are then iterated over via the `<g:eachError>` tag, which\
    \ creates the list bullets using the *default message*. The default messages for\
    \ validation errors can be found in the `grails-app/il8n/message.properties` message\
    \ bundle.\n\nIf a list is all that is required, Grails makes it even easier to\
    \ display errors via the `<g:renderErrors>` tag, which encapsulates everything\
    \ you’ve just seen. Essentially, it takes the same arguments as the `<g:eachError>`\
    \ tag, as well as an optional `as` attribute, which allows you to specify what\
    \ to render the errors as. [Listing 5-29](#Chapter05.html#list_5_29) shows how\
    \ to render the errors as a simple HTML list:\n\n```\n<g:renderErrors bean=\"\
    ${album}\" as=\"list\"  />\n```\n\nAs noted previously, the examples shown so\
    \ far use the default message. Clearly, the default message is not always what\
    \ is desired, and it is often useful to provide specific messages for each property\
    \ within a domain class. This is where the `<g:message>` tag comes into play,\
    \ with support from Grails for internationalization (`i18n`). Internationalization\
    \ is covered in detail in [Chapter 7](#Chapter07.html)."
  raw: '##### Simplifying Forms with the Fields Plug-in


    Creating and maintaining complicated forms with a lot of input fields can be tedious
    and often involves a lot of copy-and-paste code. A form for inputting all of the
    fields related to creating a `Person` object may be pretty much exactly the same
    as the form for inputting all of the fields related to an `Account` object, except
    that the input fields would have different names. Consider a `Person` domain class
    that has `firstName`, `lastName`, and `age` properties. A form to help create
    a person might include code like that shown in [Listing 5-29](#Chapter05.html#list_5_29).


    ***Listing 5-29.** Form for Creating a Person*


    `<div class="fieldcontain">`

    `    <label for="age">`

    `          <g:message code="person.age.label"`

    `                   default="Age" />`

    `          <span class="required-indicator">*</span>`

    `    </label>`

    `    <g:field type="number"`

    `              name="age"`

    `              required=""`

    `              value="${personInstance.age}"/>`

    `</div>`


    `<div class="fieldcontain">`

    `    <label for="firstName">`

    `          <g:message code="person.firstName.label"`

    `                   default="First Name" />`


    `    </label>`

    `    <g:textField name="firstName"`

    `                 value="${personInstance?.firstName}"/>`

    `</div>`


    `<div class="fieldcontain">`

    `    <label for="lastName">`

    `          <g:message code="person.lastName.label"`

    `                   default="Last Name" />`


    `    </label>`

    `    <g:textField name="lastName"`

    `                 value="${personInstance?.lastName}"/>`

    `</div>`


    If you wanted to create a form for creating an `Account` object that had `bankName`,
    `accountType`, and `balance` properties, you might copy and paste that code and
    then go through the code and replace property names. Of course, managing all of
    that boilerplate code is not ideal.


    The fields plug-in provides tools to help eliminate all that boilerplate. As an
    example, the fields plug-in provides a GSP tag named `all,` which will render
    input fields for every property of a bean. The code in [Listing 5-29](#Chapter05.html#list_5_29)
    could be replaced with the following:


    `<f:all bean="personInstance"/>`


    Which would you rather write and maintain?


    The fields plug-in provides a good bit more functionality than just the `all`
    tag. See [`http://grails.org/plugin/fields`](http://grails.org/plugin/fields)
    for more information on the plug-in.


    #### Validation and Error Handling


    Since you learned how to apply constraints to your domain model in [Chapter 3](#Chapter03.html),
    clearly it becomes useful at some point to display validation errors in the view
    when they occur. Of course, you could use scriptlets to iterate over the errors
    of a domain object and output them explicitly, but that’s work that Grails can
    do for you. Just to recap how validation works, take a look at the state diagram
    shown in [Figure 5-1](#Chapter05.html#fig_5_1).


    ![Image](images/9781430243779_Fig05-01.jpg)


    ***Figure 5-1.** Validation state diagram*


    ##### The hasErrors Tag


    Since errors do occur, it is often useful to display information conditionally.
    To this end, Grails provides a `<g:hasErrors>` tag that supports the following
    attributes:


    > *   `bean`: a bean instance to inspect for errors

    > *   `field`: the name of the field to check for errors

    > *   `model`: an alternative to specifying a bean; an entire model (map) can
    be checked


    You’ll recall that you have already seen the `<g:hasErrors>` tag used as a method,
    but it is also equally applicable as a tag. Interestingly, if no attributes are
    specified whatsoever, the tag will scan the entire request scope for beans and
    check each object found for errors. Since the `<g:hasErrors>` tag is often used
    in conjunction with `<g:eachError>`, we’ll cover that next, followed by an example.


    ##### The eachError Tag


    If a bean instance does have errors, it is useful to iterate over them and display
    each in turn. This can be done simply with the `<g:eachError>` tag, which takes
    attributes identical to those expected by the `<g:hasErrors>` tag.


    [Listing 5-30](#Chapter05.html#list_5_30) demonstrates how to use the `hasErrors`
    and `eachError` tags to generate a list of error messages for an `Album` instance.


    ***Listing 5-30.** Displaying Errors*


    `<g:hasErrors bean="${album}">`

    `          <ul class="errors">`

    `        <g:eachError bean="${album}">`

    `              <li>${it.defaultMessage}</li>`

    `          </g:eachError>`

    `     </ul>`

    `</g:hasErrors>`


    In this instance, `<g:hasErrors>` checks whether there are any errors in the first
    place, and if there are, it creates an HTML list. These errors are then iterated
    over via the `<g:eachError>` tag, which creates the list bullets using the *default
    message*. The default messages for validation errors can be found in the `grails-app/il8n/message.properties`
    message bundle.


    If a list is all that is required, Grails makes it even easier to display errors
    via the `<g:renderErrors>` tag, which encapsulates everything you’ve just seen.
    Essentially, it takes the same arguments as the `<g:eachError>` tag, as well as
    an optional `as` attribute, which allows you to specify what to render the errors
    as. [Listing 5-29](#Chapter05.html#list_5_29) shows how to render the errors as
    a simple HTML list:


    `<g:renderErrors bean="${album}" as="list"  />`


    As noted previously, the examples shown so far use the default message. Clearly,
    the default message is not always what is desired, and it is often useful to provide
    specific messages for each property within a domain class. This is where the `<g:message>`
    tag comes into play, with support from Grails for internationalization (`i18n`).
    Internationalization is covered in detail in [Chapter 7](#Chapter07.html).'
  trans: '

    ##### 使用 Fields 插件简化表单


    创建和维护包含大量输入字段的复杂表单可能非常繁琐，并且通常涉及大量复制粘贴的代码。用于输入创建 `Person` 对象所需所有字段的表单，与用于输入创建 `Account`
    对象所需所有字段的表单可能几乎完全相同，唯一的区别在于输入字段的名称不同。考虑一个具有 `firstName`、`lastName` 和 `age` 属性的
    `Person` 领域类。用于创建人员的表单可能包含如代码清单 5-29 所示的代码。


    ***代码清单 5-29.** 用于创建人员的表单*


    `<div class="fieldcontain">`

    `    <label for="age">`

    `          <g:message code="person.age.label"`

    `                   default="Age" />`

    `          <span class="required-indicator">*</span>`

    `    </label>`

    `    <g:field type="number"`

    `              name="age"`

    `              required=""`

    `              value="${personInstance.age}"/>`

    `</div>`


    `<div class="fieldcontain">`

    `    <label for="firstName">`

    `          <g:message code="person.firstName.label"`

    `                   default="First Name" />`


    `    </label>`

    `    <g:textField name="firstName"`

    `                 value="${personInstance?.firstName}"/>`

    `</div>`


    `<div class="fieldcontain">`

    `    <label for="lastName">`

    `          <g:message code="person.lastName.label"`

    `                   default="Last Name" />`


    `    </label>`

    `    <g:textField name="lastName"`

    `                 value="${personInstance?.lastName}"/>`

    `</div>`


    如果你想创建一个用于创建具有 `bankName`、`accountType` 和 `balance` 属性的 `Account` 对象的表单，你可能会复制粘贴那段代码，然后通篇替换属性名称。当然，管理所有这些样板代码并不理想。


    fields 插件提供了有助于消除所有这些样板代码的工具。例如，fields 插件提供了一个名为 `all` 的 GSP 标签，它会为 bean 的每个属性渲染输入字段。代码清单
    5-29 中的代码可以被替换为以下内容：


    `<f:all bean="personInstance"/>`


    你更愿意编写和维护哪一个呢？


    fields 插件提供的功能远不止 `all` 标签。有关该插件的更多信息，请参见 [`http://grails.org/plugin/fields`](http://grails.org/plugin/fields)。


    #### 验证与错误处理


    既然你已经学习了如何在第 3 章中为领域模型应用约束，那么很明显，在视图中显示验证错误在某些时候会变得非常有用。当然，你可以使用 scriptlet 来遍历领域对象的错误并显式地输出它们，但这是
    Grails 可以为你完成的工作。为了回顾验证的工作原理，请看图 5-1 所示的状态图。


    ![Image](img/9781430243779_Fig05-01.jpg)


    ***图 5-1.** 验证状态图*


    ##### hasErrors 标签


    由于错误确实会发生，因此有条件地显示信息通常很有用。为此，Grails 提供了一个 `<g:hasErrors>` 标签，它支持以下属性：


    > *   `bean`：要检查错误的 bean 实例

    > *   `field`：要检查错误的字段名称

    > *   `model`：指定 bean 的替代方案；可以检查整个模型（映射）


    你可能还记得，你已经见过 `<g:hasErrors>` 标签作为方法使用，但它同样也可以作为标签使用。有趣的是，如果未指定任何属性，该标签将扫描整个请求范围以查找
    bean，并检查找到的每个对象是否存在错误。由于 `<g:hasErrors>` 标签通常与 `<g:eachError>` 一起使用，我们接下来将介绍后者，然后给出一个示例。


    ##### eachError 标签


    如果 bean 实例确实存在错误，那么遍历这些错误并逐一显示它们会很有用。这可以通过 `<g:eachError>` 标签轻松完成，该标签接受的属性与 `<g:hasErrors>`
    标签所期望的属性相同。


    代码清单 5-30 演示了如何使用 `hasErrors` 和 `eachError` 标签为 `Album` 实例生成错误消息列表。


    ***代码清单 5-30.** 显示错误*


    `<g:hasErrors bean="${album}">`

    `          <ul class="errors">`

    `        <g:eachError bean="${album}">`

    `              <li>${it.defaultMessage}</li>`

    `          </g:eachError>`

    `     </ul>`

    `</g:hasErrors>`


    在此示例中，`<g:hasErrors>` 首先检查是否存在任何错误，如果存在，则创建一个 HTML 列表。然后通过 `<g:eachError>` 标签遍历这些错误，该标签使用*默认消息*创建列表项。验证错误的默认消息可以在
    `grails-app/il8n/message.properties` 消息包中找到。


    如果只需要一个列表，Grails 通过 `<g:renderErrors>` 标签使显示错误变得更加容易，该标签封装了你刚才看到的所有内容。本质上，它接受与
    `<g:eachError>` 标签相同的参数，以及一个可选的 `as` 属性，该属性允许你指定将错误渲染为什么形式。代码清单 5-29 展示了如何将错误渲染为简单的
    HTML 列表：


    `<g:renderErrors bean="${album}" as="list"  />`


    如前所述，到目前为止展示的示例都使用了默认消息。显然，默认消息并不总是我们想要的，并且为领域类中的每个属性提供特定的消息通常很有用。这就是 `<g:message>`
    标签发挥作用的地方，它得到了 Grails 对国际化（`i18n`）的支持。国际化将在第 7 章中详细介绍。

