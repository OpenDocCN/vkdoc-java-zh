- fmt: "#### Adding Behavior With Plug-ins\n\nTo start with, run the `create-plugin`\
    \ command to create the basis of an `album-art` plug-in: `$ grails create-plugin\
    \ album-art`. The next step is to move the `AlbumArtService.groovy` file and the\
    \ `AlbumArtTagLib.groovy` file into the newly created plug-in project. Once this\
    \ is done, your plug-in should be structured like [Figure 12-3](#Chapter12.html#fig_12_3).\n\
    \n![Image](images/9781430243779_Fig12-03.jpg)\n\n***Figure 12-3.** The structure\
    \ of the album-art plug-in*\n\nRemember that the `AlbumArtService` class makes\
    \ use of the `RestBuilder` class provided by the `rest-client-builder` plug-in.\
    \ The plug-in dependency needs to be expressed in the `album-art` plug-in’s `BuildConfig.groovy`;\
    \ once the `album-art` plug-in is installed in the application, the dependency\
    \ on `rest-client-builder` may be removed from the application’s `BuildConfig.groovy`.\
    \ Also, don’t forget to move the two tests that provide coverage for the `AlbumArtService`\
    \ and `AlbumArtTagLib` from the application into the plug-in. As mentioned previously,\
    \ the great thing about plug-ins is that since they can be developed and tested\
    \ separately, they are useful for larger projects with multiple developers. With\
    \ the `AlbumArtServiceTests` and `AlbumArtTagLibTests` test cases included in\
    \ the `album-art` plug-in, you can now immediately test whether your plug-in is\
    \ working by running the `test-app` command.\n\nOnce the tests are passed, you\
    \ can add the plug-in metadata to the plug-in descriptor that describes what this\
    \ plug-in is all about. [Listing 12-33](#Chapter12.html#list_12_33) shows the\
    \ updated plug-in descriptor with the metadata provided.\n\n***Listing 12-33.**\
    \ Providing Metadata to the album-art Plug-in*\n\n```\nclass AlbumArtGrailsPlugin\
    \ {\n    def version = 0.1\n    def author = \"Joe Someone\"\n    def authorEmail\
    \ = \"joe@company.com\"\n    def title = \"Album art look-up plugin\"\n    def\
    \ description = 'A plug-in that provides facilities to look-up album art'\n  \
    \  ...\n}\n```\n\nTo spice things up even further, you’re going to do a bit of\
    \ metaprogramming—first, by adding a `getAlbumArt` method to all controllers and\
    \ second by allowing instances of the `Album` class from the gTunes application\
    \ to retrieve their art simply by calling a `getArt()` method. The first case,\
    \ in [Listing 12-34](#Chapter12.html#list_12_34), shows the necessary code, which\
    \ just gets the `AlbumArtService` instance and adds a method to all controllers\
    \ that delegate to the `AlbumArtService`.\n\n***Listing 12-34.** Adding a getAlbumArt\
    \ Method to All Controllers*\n\n```\nclass AlbumArtGrailsPlugin {\n    ...\n \
    \   def doWithDynamicMethods = { ctx ->\n        def albumArtService = ctx.getBean(\"\
    albumArtService\")\n        application.controllerClasses*.metaClass*.getAlbumArt\
    \ = { String artist, String album ->\n            return albumArtService.getAlbumArt(artist,\
    \ album)\n        }\n    }\n}\n```\n\nAdding a `getArt()` method to the `Album`\
    \ class is a little trickier, because the plug-in doesn’t know anything about\
    \ the `Album` class. So to implement this enhancement, you’ll search the `GrailsApplication`\
    \ instance for a domain class called `Album` and, if it exists, add the `getArt()`\
    \ method to it. [Listing 12-35](#Chapter12.html#list_12_35) shows the modifications\
    \ to the `doWithDynamicMethods` plug-in hook.\n\n***Listing 12-35.** Adding a\
    \ getAlbumArt Method to All Controllers*\n\n```\nclass AlbumArtGrailsPlugin {\n\
    \  ...\n  def doWithDynamicMethods = { ctx ->\n    ...\n    def albumClass = application.domainClasses.find\
    \ { it.shortName == 'Album' }\n    if(albumClass) {\n      albumClass.metaClass.getArt\
    \ ={->\n        albumArtService.getAlbumArt(delegate.artist?.name,\n         \
    \                           delegate.title)\n      }\n    }\n  }\n}\n```\n\nNotice\
    \ how within the body of the new `getArt` method you can use the closure `delegate`\
    \ to obtain the `artist` and `title`. The `delegate` property of a closure, when\
    \ used in this context, is equivalent to referring to `this` in a regular method.\
    \ With the code in [Listing 12-35](#Chapter12.html#list_12_35) in place, you can\
    \ now obtain the URL to an `Album` instance’s album art with the code shown in\
    \ [Listing 12-36](#Chapter12.html#list_12_36).\n\n***Listing 12-36.** Using the\
    \ getArt() Method to Obtain Album Art*\n\n```\ndef album = Album.get(10)\nprintln\
    \ \"The art for this album is at ${album.art}\"\n```\n\nNote that, in Groovy,\
    \ methods that follow bean conventions are accessible via the property access\
    \ notation, so the expression `album.art` is equivalent to `album.getArt()`. And\
    \ with that, you have completed the `album-art` plug-in.\n\n### Specifying Plug-in\
    \ Locations on the File System\n\nSeveral times during this book you have installed\
    \ plug-ins into the gTunes application, something normally done by expressing\
    \ a dependency in the plug-ins section of `BuildConfig.groovy`. This is the most\
    \ common way to express a dependency on a plug-in but not the only way. An application\
    \ may express a dependency on a plug-in from anywhere on the file system, even\
    \ if the plug-in has never been packaged and never been installed into a repository.\
    \ This is useful for cases where you have the source code for the plug-in and\
    \ may want to be actively developing the plug-in while developing the application.\
    \ The way to express a dependency like this is to define a property in `BuildConfig.groovy`\
    \ where the property name is of the form `grails.plugin.location.<plugin name>`\
    \ and the value assigned to that property is a path to the directory on the file\
    \ system containing the source for the plug-in project (see [Listing 12-37](#Chapter12.html#list_12_37)).\n\
    \n***Listing 12-37.** Installing the album-art Plug-in into gTunes*\n\n```\ngrails.plugin.location.'album-art'='../album-art'\n\
    ...\ngrails.project.dependency.resolution = {\n    ...\n}\n```\n\nNote that the\
    \ value assigned to the property is `../album-art`, a relative path; that path\
    \ is relative to the root directory of the gTunes application. For this to work,\
    \ the `album-art` plug-in and the gTunes application directory need to share a\
    \ parent directory. Also, notice that part of the `grails.plugin.location.'album-art'`\
    \ property name is quoted; that is because the name of the plug-in has a hyphen\
    \ in it. A hyphen is not a valid character for an identifier in Groovy; seeing\
    \ it, the compiler thinks that you are trying to do subtraction. Groovy offers\
    \ a simple way around this by quoting the property name that contains the otherwise\
    \ invalid character—namely, the hyphen.\n\nNow you can start up the gTunes application,\
    \ and it will behave exactly as before, except it is utilizing the `album-art`\
    \ plug-in’s functionality instead! One thing to note about the `album-art` plug-in\
    \ is that although it provides new functionality in the form of services, tag\
    \ libraries, and new methods, it does not comprise an entirely self-contained\
    \ application. We’ll look at how you can achieve this in the next section."
