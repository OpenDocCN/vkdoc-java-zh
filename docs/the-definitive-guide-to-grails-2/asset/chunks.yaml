    `album.discard()`

    `def album2 = Album.get(1)`

    `assert album1 == album2 // This assertion will fail`


    The default implementation of `equals` and `hashCode` in Java uses object equality
    to compare instances. The problem is that when an instance becomes detached, Hibernate
    loses all knowledge of it. As the code in [Listing 9-35](#Chapter09.html#list_9_35)
