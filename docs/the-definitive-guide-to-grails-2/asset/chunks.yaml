- fmt: "### Embedding Objects\n\nGrails supports the notion of composition—think of\
    \ it as a stronger form of relationship. With that kind of relationship, it often\
    \ makes sense to embed the “child” inline, where the “parent” is stored. Consider\
    \ a simple relationship between a `Car` and an `Engine`. If that relationship\
    \ were implemented with composition, the `Engine` would really be contained in\
    \ the `Car` as far as persistence is concerned. That is, there will be one table\
    \ that will contain columns for all of the persistent properties in the `Car`\
    \ class, as well as all of the persistent properties of the `Engine` that belongs\
    \ to a `Car`. Retrieving a `Car` and its `Engine` would not involve joins across\
    \ multiple tables, since all of the information would be stored in the same table.\
    \ A consequence of that is that if a `Car` is deleted, its `Engine` is deleted\
    \ with it (see [Listing 3-30](#Chapter03.html#list_3_30)).\n\n**Listing 3-30.**\
    \ A Composition Relationship Between the Car and Engine Domain Classes\n\n```\n\
    class Car {\n    String make\n    String model\n    Engine engine\n}\n\nclass\
    \ Engine {\n    String manufacturer\n    Integer numberOfCylinders\n}\n```\n\n\
    Normally `Car` objects and `Engine` objects are stored in separate tables; you\
    \ would use a foreign key to relate the tables to each other (see [Listings 3-31](#Chapter03.html#list_3_31)\
    \ and [3-32](#Chapter03.html#list_3_32)).\n\n**Listing 3-31.** The Car Table\n\
    \n![Image](images/9781430243779_unFig03-07.jpg)\n\n**Listing 3-32.** The Engine\
    \ Table\n\n![Image](images/9781430243779_unFig03-08.jpg)\n\nTo treat the relationship\
    \ between those classes as composition, the `Car` class must instruct Grails to\
    \ “embed” the `Engine` in the `Car`. You do this by defining a public static property,\
    \ `embedded`, in the `Car` class and assign that property a list of strings that\
    \ contains the names of all the embedded properties (see [Listing 3-33](#Chapter03.html#list_3_33)).\n\
    \n**Listing 3-33.** Embedding the Engine in a Car\n\n```\nclass Car {\n    String\
    \ make\n    String model\n    Engine engine\n    static embedded = ['engine']\n\
    }\n```\n\nWith that embedded property in place, Grails knows that the `Engine`\
    \ property of a `Car` object should be embedded in the same table with the `Car`\
    \ object. The `car` table will now look like [Listing 3-34](#Chapter03.html#list_3_34).\n\
    \n![Image](images/square.jpg) **Note** Embedding properties is particularly useful\
    \ in the MongoDB implementation of GORM, as it is very common to nest documents\
    \ within documents in MongoDB.\n\n**Listing 3-34.** The Car Table with the Engine\
    \ Attributes Embedded\n\n![Image](images/9781430243779_unFig03-09.jpg)\n\n###\
    \ Testing Domain Classes\n\nAutomated tests can be an important part of building\
    \ complex applications and confirming that the system behaves as intended. In\
    \ particular, testing is an important part of building complex systems with a\
    \ dynamic language like Groovy. With dynamic languages, developers don’t get the\
    \ same kinds of feedback from the compiler that they might get if they were working\
    \ with Java or another statically typed language.\n\nFor example, in Java if you\
    \ make a typo in a method invocation, the compiler will let you know that you\
    \ have made the mistake. The compiler cannot flag that same error when you use\
    \ Groovy, because of the language’s dynamic nature and its runtime. With Groovy,\
    \ many things are not known until runtime. You must execute the code to learn\
    \ whether it’s correct. Executing the code from automated tests is an excellent\
    \ way to ensure that the code is doing what it is supposed to do.\n\nGrails offers\
    \ first-class support for testing many aspects of your application. This section\
    \ will look at testing domain classes.\n\nGrails directly supports two kinds of\
    \ tests: unit tests and integration tests. Unit tests reside at the top of the\
    \ project in the `test/unit/` directory, and integration tests reside in the `test/integration/`\
    \ directory. You must understand the difference between unit tests and integration\
    \ tests. Many dynamic things happen when a Grails application starts up. One of\
    \ the things Grails does at startup is augment domain classes with a lot of dynamic\
    \ methods, including `validate()` and `save()`. When you run integration tests,\
    \ all of that dynamic behavior is available, so a test can invoke the `validate()`\
    \ or `save()` method on a domain object, even though these methods do not appear\
    \ in the domain-class source code.\n\nWhen you run unit tests, however, that full\
    \ dynamic environment is not fired up, and so methods such as `validate()` and\
    \ `save()` are not available. Starting up the whole dynamic environment comes\
    \ at a cost. For this reason, you should run tests that rely on the full Grails\
    \ runtime environment only as integration tests.\n\nThat said, Grails provides\
    \ advanced capabilities that let you unit-test a lot of dynamic behavior in domain\
    \ classes and other artifacts. If you create a domain class using the `create-domain-class`\
    \ command, Grails will create a unit test automatically. If you execute `grails\
    \ create-domain-class com.gtunes.Song`, Grails will create `grails-app/domain/com/gtunes/Song.groovy`\
    \ and `test/unit/com/gtunes/SongTests.groovy`. Grails is encouraging you to do\
    \ the right thing—to write tests for your domain classes. If you don’t use the\
    \ `create-domain-class` command to create your domain class, you can create the\
    \ test on your own (see [Listing 3-35](#Chapter03.html#list_3_35)). Make sure\
    \ to put the test in the appropriate directory.\n\n**Listing 3-35.** The Unit\
    \ Test for the Song Class, Generated Automatically\n\n```\npackage com.gtunes\n\
    \nimport grails.test.mixin.*\nimport org.junit.*\n\n/**\n * See the API for {@link\
    \ grails.test.mixin.domain.DomainClassUnitTestMixin} for usage\ninstructions\n\
    \ */\n@TestFor(Song)\nclass SongTests {\n\n    void testSomething() {\n      \
    \ fail \"Implement me\"\n    }\n}\n```"
  raw: '### Embedding Objects


    Grails supports the notion of composition—think of it as a stronger form of relationship.
    With that kind of relationship, it often makes sense to embed the “child” inline,
    where the “parent” is stored. Consider a simple relationship between a `Car` and
    an `Engine`. If that relationship were implemented with composition, the `Engine`
    would really be contained in the `Car` as far as persistence is concerned. That
    is, there will be one table that will contain columns for all of the persistent
    properties in the `Car` class, as well as all of the persistent properties of
    the `Engine` that belongs to a `Car`. Retrieving a `Car` and its `Engine` would
    not involve joins across multiple tables, since all of the information would be
    stored in the same table. A consequence of that is that if a `Car` is deleted,
    its `Engine` is deleted with it (see [Listing 3-30](#Chapter03.html#list_3_30)).


    ***Listing 3-30.** A Composition Relationship Between the Car and Engine Domain
    Classes*


    `class Car {`

    `    String make`

    `    String model`

    `    Engine engine`

    `}`


    `class Engine {`

    `    String manufacturer`

    `    Integer numberOfCylinders`

    `}`


    Normally `Car` objects and `Engine` objects are stored in separate tables; you
    would use a foreign key to relate the tables to each other (see [Listings 3-31](#Chapter03.html#list_3_31)
    and [3-32](#Chapter03.html#list_3_32)).


    ***Listing 3-31.** The Car Table*


    ![Image](images/9781430243779_unFig03-07.jpg)


    ***Listing 3-32.** The Engine Table*


    ![Image](images/9781430243779_unFig03-08.jpg)


    To treat the relationship between those classes as composition, the `Car` class
    must instruct Grails to “embed” the `Engine` in the `Car`. You do this by defining
    a public static property, `embedded`, in the `Car` class and assign that property
    a list of strings that contains the names of all the embedded properties (see
    [Listing 3-33](#Chapter03.html#list_3_33)).


    ***Listing 3-33.** Embedding the Engine in a Car*


    `class Car {`

    `    String make`

    `    String model`

    `    Engine engine`

    `    static embedded = [''engine'']`

    `}`


    With that embedded property in place, Grails knows that the `Engine` property
    of a `Car` object should be embedded in the same table with the `Car` object.
    The `car` table will now look like [Listing 3-34](#Chapter03.html#list_3_34).


    ![Image](images/square.jpg) **Note**  Embedding properties is particularly useful
    in the MongoDB implementation of GORM, as it is very common to nest documents
    within documents in MongoDB.


    ***Listing 3-34.** The Car Table with the Engine Attributes Embedded*


    ![Image](images/9781430243779_unFig03-09.jpg)


    ### Testing Domain Classes


    Automated tests can be an important part of building complex applications and
    confirming that the system behaves as intended. In particular, testing is an important
    part of building complex systems with a dynamic language like Groovy. With dynamic
    languages, developers don’t get the same kinds of feedback from the compiler that
    they might get if they were working with Java or another statically typed language.


    For example, in Java if you make a typo in a method invocation, the compiler will
    let you know that you have made the mistake. The compiler cannot flag that same
    error when you use Groovy, because of the language’s dynamic nature and its runtime.
    With Groovy, many things are not known until runtime. You must execute the code
    to learn whether it’s correct. Executing the code from automated tests is an excellent
    way to ensure that the code is doing what it is supposed to do.


    Grails offers first-class support for testing many aspects of your application.
    This section will look at testing domain classes.


    Grails directly supports two kinds of tests: unit tests and integration tests.
    Unit tests reside at the top of the project in the `test/unit/` directory, and
    integration tests reside in the `test/integration/` directory. You must understand
    the difference between unit tests and integration tests. Many dynamic things happen
    when a Grails application starts up. One of the things Grails does at startup
    is augment domain classes with a lot of dynamic methods, including `validate()`
    and `save()`. When you run integration tests, all of that dynamic behavior is
    available, so a test can invoke the `validate()` or `save()` method on a domain
    object, even though these methods do not appear in the domain-class source code.


    When you run unit tests, however, that full dynamic environment is not fired up,
    and so methods such as `validate()` and `save()` are not available. Starting up
    the whole dynamic environment comes at a cost. For this reason, you should run
    tests that rely on the full Grails runtime environment only as integration tests.


    That said, Grails provides advanced capabilities that let you unit-test a lot
    of dynamic behavior in domain classes and other artifacts. If you create a domain
    class using the `create-domain-class` command, Grails will create a unit test
    automatically. If you execute `grails create-domain-class com.gtunes.Song`, Grails
    will create `grails-app/domain/com/gtunes/Song.groovy` and `test/unit/com/gtunes/SongTests.groovy`.
    Grails is encouraging you to do the right thing—to write tests for your domain
    classes. If you don’t use the `create-domain-class` command to create your domain
    class, you can create the test on your own (see [Listing 3-35](#Chapter03.html#list_3_35)).
    Make sure to put the test in the appropriate directory.


    ***Listing 3-35.** The Unit Test for the Song Class, Generated Automatically*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `/**`

    ` * See the API for {@link grails.test.mixin.domain.DomainClassUnitTestMixin}
    for usage`

    `instructions`

    ` */`

    `@TestFor(Song)`

    `class SongTests {`


    `    void testSomething() {`

    `       fail "Implement me"`

    `    }`

    `}`'
