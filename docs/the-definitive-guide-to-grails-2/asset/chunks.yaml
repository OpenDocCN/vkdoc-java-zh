- fmt: '### Adding Support to Your Favorite IDE


    Java developers in general have become particularly reliant on the comfort of
    modern integrated development environments (IDEs), largely because of the strictness
    of the Java language. From its static typing rules to such quirks as its insistence
    on semicolons at the end of each line of code, it is hard to write anything in
    Java without a little nagging from the compiler. Fortunately, modern IDEs such
    as the Groovy/Grails Tool Suite (GGTS), Eclipse, and IntelliJ IDEA have made life
    a lot easier. In fact, they’ve done more than that. With the advent of refactoring
    tools, Java has become one of the most maintainable languages out there.


    The tools in the dynamic language space are in general nowhere near as advanced
    as those available for Java. On the other hand, many developers create entire
    applications in TextMate, jEdit, and other simple text editors; they prefer their
    speed and efficiency to the relative clunkiness and slowness of a robust, richly
    featured IDE. This is possible because of the simplicity of a framework such as
    Grails and the relatively forgiving Groovy grammar. It is our view that you can
    certainly get away with using the simpler tools during the early days of an application’s
    life cycle.


    However, as the application grows and enters the maintenance phase, the need for
    an IDE will also grow—particularly for refactoring and maintenance. Fortunately,
    although the tooling is much younger, you do have options available to you. We
    will be covering them in the following sections.


    #### Using The Groovy/Grails Tool Suite (GGTS)


    The Groovy/Grails Tool Suite (GGTS) provides the best Eclipse-powered development
    environment for building Groovy and Grails applications. GGTS provides support
    for the latest versions of Groovy and Grails and is built on top of the latest
    Eclipse releases.


    GGTS is available from [`http://grails.org/products/ggts`](http://grails.org/products/ggts).
    The download includes a double-click installer that simplifies getting the tool
    installed, up, and running.


    ##### Configuring Grails Installations


    GGTS ships with the latest version of Grails—that is, the one available when that
    version of GGTS was created—but you can configure as many different version of
    Grails in the IDE as you like. This feature is useful when you are upgrading projects
    from one version of Grails to another and working on multiple projects that do
    not necessarily use the same versions of Grails.


    To configure Grails installations within the IDE, open the application preferences
    and navigate to Groovy ä Grails as shown in [Figure 11-7](#Chapter11.html#fig_11_7).


    ![Image](images/9781430243779_Fig11-07.jpg)


    ***Figure 11-7.** Configuring Grails installations*


    This dialog allows you to configure as many already-installed Grails installations
    on your system as you like. The check box in the table’s far left column allows
    you to indicate which version should be selected by default when creating a new
    Grails application from within the IDE.


    ##### Importing a Grails Project


    Once you have your Grails installation(s) configured, the next step is to import
    your Grails project. Luckily, Grails automatically creates Eclipse project and
    classpath files for you when you create the project. So to import the project,
    select the `File` ![Image](images/U001.jpg) `Import` menu option, and then select
    the “Import” option, at which point the dialog box shown in [Figure 11-8](#Chapter11.html#fig_11_8)
    will appear.


    ![Image](images/9781430243779_Fig11-08.jpg)


    ***Figure 11-8.** Importing a Grails project into GGTS*


    Select the “Grails Project” option, and click the `Next` button. Now browse to
    the root of a Grails project using the `Browse` button, and click `Choose` or
    `OK`. Once you have chosen the directory where the project is located, GGTS will
    automatically detect that there are Eclipse project files within the specified
    root directory and even in subdirectories within the root (see [Figure 11-9](#Chapter11.html#fig_11_9)).


    ![Image](images/9781430243779_Fig11-09.jpg)


    ***Figure 11-9.** Importing a Grails project into Eclipse*


    Click the `Finish` button to complete the import. At this point, your project
    will be configured with the correct source directories and classpath.


    ###### Running a Grails Application from GGTS


    You can run a Grails application from GGTS by right-clicking on the project and
    selecting the “Run As” menu. The submenu underneath “Run As” will include a number
    of options, including “Grails Command (run-app)” (see [Figure 11-10](#Chapter11.html#fig_11_10)).


    ![Image](images/9781430243779_Fig11-10.jpg)


    ***Figure 11-10.** Running a Grails application from GGTS*


    If you want to run the application in the debugger, then instead of selecting
    the “Run As” menu option, select “Debug As”. When running the application in the
    debugger, you can set breakpoints, watches, and all the other things that Java
    developers are used to doing in their runtime debuggers.


    GGTS gives the workspace a Grails perspective, which provides a smart view over
    all of the artefacts in a Grails application, among other capabilities. There
    are wizards for creating artefacts and running arbitrary commands. There is a
    Grails plug-in manager. GGTS provides a really flexible, really powerful environment
    for building, testing, and debugging Grails applications, and it is fast becoming
    the IDE of choice for Grails application developers. For more information on GGTS,
    see [`http://grails.org/products/ggts`](http://grails.org/products/ggts).


    #### Using Spring Tool Suite (STS) and Eclipse


    Most developers who want to develop Grails applications in an Eclipse environment
    opt to use GGTS. GGTS is built on top of Eclipse and provides everything that
    Eclipse provides, plus a whole bunch of Groovy and Grails support. If for some
    reason you want to develop a Grails application in an Eclipse environment but
    do not want to use GGTS, you can install the Groovy and Grails extensions into
    Eclipse or STS and get the same capabilities—with just a little more work required
    to piece everything together. You’ll find more information on how to do that at
    [`www.grails.org/STS+Integration`](http://www.grails.org/STS+Integration).


    #### IntelliJ IDEA


    JetBrains worked closely with the Groovy team when building much of the relevant
    support in IntelliJ. (You’ll learn more about their support for Groovy and Grails
    and see their documentation at [`www.jetbrains.com/idea/features/groovy_grails.html`](http://www.jetbrains.com/idea/features/groovy_grails.html).)
    [Figure 11-11](#Chapter11.html#fig_11_11) shows IntelliJ IDEA in action.


    ![Image](images/9781430243779_Fig11-11.jpg)


    ***Figure 11-11.** IntelliJ IDEA with the Groovy plug-in*


    #### NetBeans


    Of the open source IDEs available, NetBeans ([`www.netbeans.org/`](http://www.netbeans.org/))
    provides the most advanced support for Groovy and Grails development. After making
    NetBeans one of the best Ruby IDEs on the market, Sun began investing in Groovy
    and Grails support, and with the release of NetBeans 6.5, the results of that
    investment have really begun to show. Featuring built-in Groovy support, the NetBeans
    plug-in provides syntax highlighting, code completion, outline views, and menu
    options to easily access Grails commands. [Figure 11-12](#Chapter11.html#fig_11_12)
    shows what the NetBeans Groovy editor looks like.


    ![Image](images/9781430243779_Fig11-12.jpg)


    ***Figure 11-12.** NetBeans Groovy/Grails integration*


    There is a good write-up on what is currently available in NetBeans on the Grails
    web site: [`http://www.grails.org/Net`](http://www.grails.org/Net)Beans+Integration.'
