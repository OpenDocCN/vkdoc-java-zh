    `def albums = Album.findAllByGenre("Alternative", [fetch:[artist:''join'']])`


    使用条件查询时，你可以使用 `join` 方法：


    `def albums = Album.withCriteria {`

    `    ...`

    `    join ''artist''`

    `}`


    最后，使用 HQL 时，你可以通过在查询中指定 `inner join` 来使用与 SQL 类似的语法：


