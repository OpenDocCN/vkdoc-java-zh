    `  }`

    `}`


    You should pull most of this code out of the taglib and put it into a service.


    #### Defining a Service


    The code that is being refactored out of the `StoreController` should be put into
    a service called `AlbumArtService`. The `AlbumArtService` class should be defined
    in the `grails-app/services/com/gtunes/` directory. That refactoring would yield
