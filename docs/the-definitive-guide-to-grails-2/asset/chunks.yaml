    ### 映射到 HTTP 请求方法


    可以配置 URL 映射，使其根据 HTTP 请求方法映射到不同的操作。^(1) 这在构建支持 RESTful API 的系统时非常有用。例如，如果对 URL
    `/artist/The_Beatles` 发起一个 GET 请求，那么控制器可能会通过生成一个显示披头士乐队详细信息的页面来响应。如果对同一个 URL 发起一个
    `DELETE` 请求，控制器可能会通过尝试删除披头士乐队及其所有相关数据（如专辑等）来响应。应用程序可以通过检查请求并根据 HTTP 请求方法做出不同反应，在同一个控制器操作中处理所有这些请求。代码清单
    6-17 展示了在 `ArtistController` 中可能的样子。


    ***代码清单 6-17.** 在控制器操作中检查 HTTP 请求方法*


    `class ArtistController {`

    `  def actionName() {`

    `    if(request.method == "GET") {`

    `      // 处理 GET 请求`

    `    } else if(request.method == "PUT") {`

    `      // 处理 PUT 请求`

    `    } else if(request.method == "POST") {`

    `      // 处理 POST 请求`

    `    } else if(request.method == "DELETE") {`

    `      // 处理 DELETE 请求`

    `    }`

    `    // ...`

    `  }`

    `}`


    ![Image](img/line.jpg)


    1  所有 HTTP 请求方法的定义，请参见 [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)。


    这段代码很繁琐，并且可能会在应用程序的许多地方重复出现。更好的做法是配置一个 URL 映射，使其匹配此 URL，并根据 HTTP 请求方法将请求映射到不同的控制器操作。请参见代码清单
    6-18 中的示例。


    ***代码清单 6-18.** 映射到 HTTP 请求方法*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/artist/$artistName" {`

    `            controller = ''artist''`

    `            action = [GET: ''show'',`

    `                      PUT: ''update'',`

    `                      POST: ''save'',`

    `                      DELETE: ''delete'']`

    `        }`


    `        // ...`

    `    }`

    `}`


    请注意，赋给 `action` 属性的值不是一个操作名称，而是一个映射（map）。映射中的键对应 HTTP 请求方法的名称，与键关联的值代表应为该特定请求方法调用的操作名称。如果该映射要将这四个标准的
    HTTP 请求方法映射到这些特定的操作名称，那么可以使用另一种更简洁的语法来表达相同的映射，如代码清单 6-19 所示。


    ***代码清单 6-19.** 映射到 HTTP 请求方法*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/artist/$artistName"(resource: "artist")`

    `        // ...`

    `    }`

    `}`


    ### 映射 HTTP 响应码


    可以为特定的 HTTP 响应码定义 URL 映射。默认映射包含一个针对 `500` 响应码（内部错误）的映射。^(2) 此映射会为任何内部错误渲染 `/error`
    视图。该视图位于 `grails-app/views/error.gsp`。这个 GSP 会渲染在开发和调试期间可能有用的堆栈信息。代码清单 6-20 展示了默认的
    `error.gsp` 页面。


    ![Image](img/line.jpg)


    2  所有 HTTP 响应码的定义，请参见 [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)。


    ***代码清单 6-20.** 默认的 grails-app/views/error.gsp 页面*


    `<body>`

    `  <h1>Grails 运行时异常</h1>`

    `  <h2>错误详情</h2>`

    `  <div class="message">`

    `    <strong>消息:</strong> ${exception.message?.encodeAsHTML()} <br />`

    `    <strong>原因:</strong> ${exception.cause?.message?.encodeAsHTML()} <br />`

    `    <strong>类:</strong> ${exception.className} <br />`

    `    <strong>所在行:</strong> [${exception.lineNumber}] <br />`

    `    <strong>代码片段:</strong><br />`

    `    <div class="snippet">`

    `      <g:each var="cs" in="${exception.codeSnippet}">`

    `        ${cs?.encodeAsHTML()}<br />`

    `      </g:each>`

    `    </div>`

    `  </div>`

    `  <h2>堆栈跟踪</h2>`

    `  <div class="stack">`

    `    <pre>`

    `      <g:each in="${exception.stackTraceLines}">`

    `        ${it.encodeAsHTML()}<br/>`

    `      </g:each>`

    `    </pre>`

    `  </div>`

    `</body>`


    你可以为特定的响应码添加自己的映射。例如，如果你希望将对任何未找到内容的请求映射到 `StoreController` 中的默认操作，你可以这样做。你还可以将特定的异常类型映射到操作或视图。代码清单
    6-21 展示了此类自定义映射。


    ***代码清单 6-21.** 所有 404 响应码的自定义映射*


    `class UrlMappings {`

    `    static mappings = {`

    `        // 404 错误应由 store 控制器中的`

    `        // 默认操作处理`

    `        "404"(controller:''store'')`


    `        // IllegalArgumentException 应由 errors 控制器中的`

    `        // illegalArgument 操作处理`

    `        "500"(controller: "errors", action: "illegalArgument",`

    `              exception: IllegalArgumentException)`


    `        // NullPointerException 应由 errors 控制器中的`

    `        // nullPointer 操作处理`

    `        "500"(controller: "errors", action: "nullPointer",`

    `              exception: NullPointerException)`


    `        // MyException 应由 errors 控制器中的`

    `        // customException 操作处理`

    `        "500"(controller: "errors", action: "customException",`

    `              exception: MyException)`


    `        // 所有其他异常应由`

    `        // /errors/serverError 视图处理`

    `        "500"(view: "/errors/serverError")`


    `        // ...`

    `    }`

    `}`


    ### 利用反向 URL 映射


    你已经了解了如何支持像 `/showArtist/Pink_Floyd` 这样的 URL，而不是像 `/artist/show/42` 这样的 URL。到目前为止所看到的支持与处理对某个
    URL 的请求有关。该交互的另一端同样重要。也就是说，你需要一个巧妙的机制来生成链接，一个能够利用自定义 URL 映射的机制。幸运的是，这个机制内置于 Grails
    中，并且使用起来与我们已经看到的映射机制一样简单。


    Grails 自带的 `<g:link>` GSP 标签对于生成指向特定控制器和操作的链接非常有用。请参见代码清单 6-22 中链接标签的常见用法。


    ***代码清单 6-22.** 链接标签*


    `<td>`

    `  <g:link action=''show''`

    `          controller=''artist''`

    `          id="${artist.id}">${artist.name}`

    `  </g:link>`

    `</td>`


    此标签会生成一个类似 `<a href="/artist/show/42">Pink Floyd</a>` 的链接。指向 `/artist/show/42`
    的链接很难看。你肯定更希望是 `/showArtist/Pink_Floyd`。好消息是，让链接标签生成后一种链接很容易。你只需告诉链接标签你想要链接到的控制器和操作，并提供自定义映射所需的所有必要参数。例如，请参见代码清单
    6-23 中的自定义映射。


    ***代码清单 6-23.** 针对 /showArtist/ URL 的映射*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showArtist/$artistName"(controller:''artist'', action:''show'')`

    `        // ...`

    `    }`

    `}`


    每当请求一个指向 `ArtistController` 中 `show` 操作的链接，并且提供了 `artistName` 参数时，链接标签就会生成一个利用此映射的链接。在
    GSP 中，这看起来类似于代码清单 6-24 中的代码。


    ***代码清单 6-24.** 使用链接标签进行反向 URL 映射*


    `<td>`

    `  <g:link action=''show''`

    `          controller=''artist''`

    `          params="[artistName:${artist.name.replaceAll('' '', ''_'')}">`

    `    ${artist.name}`

    `  </g:link>`

    `</td>`

