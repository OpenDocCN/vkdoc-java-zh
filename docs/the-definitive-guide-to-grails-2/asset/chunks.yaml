    which drags down the performance of your application. [Listing 9-60](#Chapter09.html#list_9_60)
    shows the typical output you would get from the Hibernate SQL logging, shortened
    for brevity.


    ***Listing 9-60.** Hibernate SQL Logging Output Using Lazy Associations*


    `Hibernate:`

    `    select`

    `        this_.id as id0_0_,`

    `        this_.version as version0_0_,`

    `        this_.artist_id as artist3_0_0_,`

    `              ...`

    `       from`

    `        album this_`

    `Hibernate:`

    `    select`

    `              artist0_.id as id8_0_,`

    `              ...`

    `       from`

    `              artist artist0_`

    `       where`

    `              artist0_.id=?`

    `Hibernate:`

    `    select`

    `              artist0_.id as id8_0_,`

    `         ...`

    `       from`

    `              artist artist0_`

    `       where`

    `              artist0_.id=?`

    `...`


    A knee-jerk reaction to this problem would be to make every association eager.
    An eager association uses an SQL `JOIN` so that all `Artist` associations are
    populated whenever you query for `Album` instances. [Listing 9-61](#Chapter09.html#list_9_61)
    shows you can use the `mapping` property to configure an association as eager
    by default.


    ***Listing 9-61.** Configuring an Eager Association*


    `class Album {`

    `    ...`

    `    static mapping = {`

    `        artist fetch:''join''`

    `    }`

    `}`


    However, this may not be optimal either, because you may well run into a situation
    where you pull your entire database into memory! Lazy associations are definitely
    the most sensible default here. If you’re merely after the identifier of each
    associated artist, then it is possible to retrieve the identifier without needing
    to do an additional `SELECT`. All you need to do is refer to the association name
    plus the suffix `Id`:


    `def albums = Album.list()`

    `for(album in albums) {`

    `    println album.artistId // get the artist id`

    `}`


    However, as the example in [Listing 9-38](#Chapter09.html#list_9_38) demonstrates,
    there are certain examples where a join query is desirable. You could modify the
    code as shown in [Listing 9-62](#Chapter09.html#list_9_62) to use the `fetch`
    argument.


    ***Listing 9-62.** Using the fetch Argument to Obtain Results Eagerly*


    `def albums = Album.list(fetch:[artist:''join''])`

    `for(album in albums) {`

    `    println album.artist.name`

    `}`


    If you run the code in [Listing 9-41](#Chapter09.html#list_9_41), instead of N+1
    `SELECT` statements, you get a single `SELECT` that uses an SQL `INNER JOIN` to
    obtain the data for all artists too. [Listing 9-63](#Chapter09.html#list_9_63)
    shows the output from the Hibernate SQL logging for this query.


    ***Listing 9-63.** Hibernate SQL Logging Output Using Eager Association*


    `select`

    `    this_.id as id0_1_,`

    `    this_.version as version0_1_,`

    `       this_.artist_id as artist3_0_1_,`

    `       this_.date_created as date4_0_1_,`

    `       this_.genre as genre0_1_,`

    `       this_.last_updated as last6_0_1_,`

    `       this_.price as price0_1_,`

    `       this_.title as title0_1_,`

    `    this_.year as year0_1_,`

    `    artist2_.id as id8_0_,`

    `       artist2_.version as version8_0_,`

    `       artist2_.date_created as date3_8_0_,`

    `       artist2_.last_updated as last4_8_0_,`

    `       artist2_.name as name8_0_`

    `from`

    `    album this_`

    `inner join`

    `    artist artist2_`

    `        on this_.artist_id=artist2_.id`


    Of course, the static `list()` method is not the only case where you require a
    join query to optimize performance. Luckily, dynamic finders, criteria, and HQL
    can all be used to perform a join. Using a dynamic finder, you can use the `fetch`
    parameter by passing a map as the last argument:


    `def albums = Album.findAllByGenre("Alternative", [fetch:[artist:''join'']])`


    Using criteria queries you can use the `join` method:


    `def albums = Album.withCriteria {`

    `    ...`

    `    join ''artist''`

    `}`


    Finally, with HQL you can use a similar syntax to SQL by specifying the `inner
    join` in the query:


    `def albums = Album.findAll("from Album as a inner join a.artist as artist")`'
