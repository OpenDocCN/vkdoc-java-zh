    ### Understanding the Grails Build System


    The Grails build system is powered by the Gant ([`http://gant.codehaus.org`](http://gant.codehaus.org))
    build tool. Gant is a thin wrapper around Apache Ant ([`http://ant.apache.org`](http://ant.apache.org)),
    the ever-popular Java build system. Unlike Ant, which uses an XML format to describe
    a build, Gant uses a Groovy DSL. The benefit here is that you can easily mix build
    logic with scripting in Groovy code. [Listing 11-22](#Chapter11.html#list_11_22)
    shows a typical example of a Gant build script.


    ***Listing 11-22.** An Example of a Gant Build Script*


    `targetDir = "build"`

    `target(clean:"Cleans any compiled sources") {`

    `delete(dir:targetDir) }`


    `target(compile:"The compilation task") {`

    `    depends(clean)`

    `    mkdir(dir:"$targetDir/classes")`

    `    javac(srcdir:"src/java",`

    `          destdir:"$targetDir/classes")`

    `}`

    `target(jar:"Creates a DAR file")  {`

    `    jar(destfile:"$targetDir/app.jar",basedir:"$targetDir/classes")`

    `}`

    `target(dist:"The default task") {`

    `    depends(compile, jar)`

    `}`

