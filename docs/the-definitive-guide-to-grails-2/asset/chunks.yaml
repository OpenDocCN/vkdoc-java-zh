    ***Listing 9-44.** Saving a Domain Class in Grails*


    `def album = new Album(...)`

    `album.save()`


    Now, assuming the `Album` instance validates, you may think from the code in [Listing
    9-2](#Chapter09.html#list_9_2) that GORM will execute an SQL `INSERT` statement
    when the `save()` method is called. However, this is not necessarily the case,
