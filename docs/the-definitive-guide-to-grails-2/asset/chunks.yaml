    会在查询运行之前自动刷新。这个问题很自然地将我们引向了 GORM 中的事务主题。


    ### GORM 中的事务


    首先——重要的是要强调，Hibernate 和数据库之间的*所有*通信都在数据库事务的上下文中运行，无论你是否显式地定义了事务边界。`Session` 本身是惰性的，它只在最后一刻才启动数据库事务。


