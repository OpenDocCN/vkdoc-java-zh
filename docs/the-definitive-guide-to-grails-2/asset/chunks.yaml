    #### 提供应用构件


    插件增强现有应用的一个更明显的方式是提供新的构件，例如控制器、标签库或服务。


    由于 Grails 插件本质上就是一个 Grails 应用，提供构件只需像在常规应用中一样创建它即可。对于 `simple-cache` 插件，您将实现一个提供应用层缓存的服务。为此，只需在插件根目录下使用
    `create-service` 命令：


    `$ grails create-service com.cache.Cache`


    完成后，您将在 `grails-app/services/com/cache/CacheService.groovy` 位置获得一个新服务。由于这相当简单，您还将实现一个小型标签库来执行内容级缓存。要创建标签库，请运行
    `create-tag-lib` 命令：


    `$ grails create-tag-lib com.cache.Cache`


    请注意，由于 Grails 插件就是一个 Grails 应用，您可以像运行 Grails 应用一样运行它！只需使用 `grails run-app` 命令，即可开始。这对插件开发者有显著的好处，因为插件开发与常规应用开发并无太大区别。您可以像运行常规应用一样运行您的插件，也可以像测试常规应用一样使用
    `test-app` 命令测试您的插件。您甚至可以在插件中安装其他插件，这在开发依赖于其他插件的插件时至关重要。


    至于 `CacheService` 和 `CacheTagLib`，我们稍后会讨论它们的实现细节。目前，您只需要知道，当您打包插件以供分发时，它将提供两个新的构件：一个标签库和一个服务。


    #### 插件钩子


    让我们回到插件描述符。除了提供关于插件的元数据外，描述符还允许您向插件运行时提供钩子。每个钩子都被定义为一个闭包属性，并允许插件参与插件生命周期的各个阶段。钩子按执行顺序列出如下：


    > *   `doWithWebDescriptor`：此钩子接收由 Groovy 的 `XmlSlurper` 解析为 `GPathResult` 的 `web.xml`
    文件的 XML。有关此钩子的更多信息，请参见本章后面的“修改生成的 WAR 描述符”部分。

    > *   `doWithSpring`：此钩子允许参与 Grails 底层 Spring `ApplicationContext` 的运行时配置。有关更多信息，请参见“提供
    Spring Bean”部分。

    > *   `doWithDynamicMethods`：在 `ApplicationContext` 构建后执行，此钩子是插件用于向 Grails 类提供新行为的地方。有关更多信息，请参见本章后面的“使用元编程增强行为”部分。

    > *   `doWithApplicationContext`：在 Grails `ApplicationContext` 构建后执行。`ApplicationContext`
    实例作为第一个参数传递给此钩子。


    默认情况下，您之前创建的 `simple-cache` 插件附带了所有这些钩子的空实现。如果您不打算实现任何这些钩子，可以直接从插件描述符中删除它们。代码清单
    12-10 展示了各种插件钩子，正等待被实现。


    ![Image](img/square.jpg) **注意** 如果您只想使用插件来提供应用模块化，可以直接跳到“打包和分发 Grails 插件”部分。接下来的几节将详细介绍如何挂接到
    Grails 插件系统的各个方面。


    ***代码清单 12-10.** simple-cache 插件中的插件钩子*


    `class SimpleCacheGrailsPlugin {`

    `    def version = 0.1`

    `    ...`

    `    def doWithWebDescriptor = { xml -> }`

    `    def doWithSpring = {}`


    `    def doWithDynamicMethods = { applicationContext -> }`


    `    def doWithApplicationContext = { applicationContext -> }`


    `}`

