- fmt: '#### Application Versioning and Metadata


    You may have already noticed by now that when you run the `grails war` command,
    the generated WAR file has a version number on the end of the file name. You may
    be wondering where this mysterious version number comes from. Basically, when
    you create a Grails application, the version number of the application is set
    to 0.1 in the application’s metadata.


    You can change the version number by calling the `set-version` command, as shown
    in [Listing 11-41](#Chapter11.html#list_11_41).


    ***Listing 11-41.** Setting the Application Version Number*


    `grails set-version 0.2`


    Then when you build a new WAR, the version number from [Listing 11-41](#Chapter11.html#list_11_41)
    will be used instead. At runtime you can inspect the application metadata using
    the `grailsApplication` object:


    `println grailsApplication.metadata."app.version"`


    or using the `<g:meta>` tag from a GSP, as shown in [Listing 11-42](#Chapter11.html#list_11_42).


    ***Listing 11-42.** Using Application Metadata*


    `Version <g:meta name="app.version"/>`

    `Built with Grails <g:meta name="app.grails.version"/>`


    #### Customizing the WAR


    If you want to customize the way in which the WAR file is produced, you can consider
    taking advantage of a number of hooks. For example, say you wanted to provide
    a different base `web.xml` template in order to include your own custom servlets;
    you can do so with the `grails.config.base.webXml` setting in `grails-app/conf/Config.groovy`:


    `grails.config.base.webXml="file:${userHome}/.settings/my-web.xml"`


    Also, if you need to change the location where the WAR file is generated, you
    can do so using the `grails.war.destFile` property:


    `grails.war.destFile = "${tomcatHome}/webapps"`


    If you want to include additional resources in the WAR, you can do so with the
    `grails.war.resources` setting, as shown in [Listing 11-43](#Chapter11.html#list_11_43).


    ***Listing 11-43.** Using the `grails.war.resources` Setting to Include Custom
    Resources*


    `grails.war.resources = { stagingDir ->`

    `// include static resources`

    `  copy(dir:stagingDir) {`

    `   fileset(dir:"/usr/var/www/htdocs")`

    `  }`

    `}`


    Notice how the closure assigned to `grails.war.resources` gets passed an argument
    that is the location of the directory where the WAR is being built. You can then
    use custom copy steps to include whatever extra resources you need. Once you actually
    have a WAR, you may want to perform some initial population of the database state
    when the application loads. We’ll be covering how to do this in the next section.


    ##### Populating the Database with BootStrap Classes


    Whenever an application loads for the first time, there may be some initial state
    that needs to be in place for the application to operate correctly. One way to
    do this is with `BootStrap` classes. If you look at the `grails-app/conf` directory,
    you may have noticed a class called `BootStrap.groovy`. [Listing 11-44](#Chapter11.html#list_11_44)
    shows the template for this class.


    ***Listing 11-44.** The `BootStrap` Class*


    `class BootStrap {`

    `    def init = {`

    `        servletContext ->`

    `    }`

    `    def destroy = {`

    `    }`

    `}`


    As you can see, there is an `init` method, which is called when the container
    first loads, and a `destroy` method. The `destroy` method is called on container
    shutdown. It should be noted, though, that it is not guaranteed to be invoked
    and hence shouldn’t be relied upon for anything critical.


    Within the `Bootstrap` class, you can use GORM to populate the database. Thanks
    to GORM’s usage of fluent APIs^([1](#Chapter11.html#CHP-11-FN-1)), it is pretty
    easy to create an object graph, as [Listing 11-45](#Chapter11.html#list_11_45)
    shows.


    ***Listing 11-45.** Populating Data on Application Load*


    `def init = {`

    `    def album = new Album(title:"Because of the Times")`

    `    album.addToSongs(title:"Knocked Up").addToSongs(title:"Charmer")`

    `        ...`

    `    new Artist(name:"Kings of Leon") .addToAlbums(album) .save(flush:true)`

    `}`


    If you need to populate per-environment data, use the `GrailsUtil` class to obtain
    the environment and perform a switch. See [Listing 11-46](#Chapter11.html#list_11_46)
    for an example.


    ***Listing 11-46.** Per-Environment Bootstrapping*


    `def init = {`

    `    switch(grails.util.GrailsUtil.environment) {`

    `        case "development":`

    `            // initialize in development here`

    `            break`

    `        case "production":`

    `            // initialize in production here`

    `        break`

    `    }`

    `}`


    ![Image](images/line.jpg)


    ¹ A fluent API is often referred to as method chaining because it involves writing
    methods that return objects in a manner such that multiple methods can be chained
    in a sequence. See [`www.martinfowler.com/bliki/FluentInterface.html`](http://www.martinfowler.com/bliki/FluentInterface.html)
    for a more complete definition.


    ### Summary


    Integrating Grails covers a broad spectrum, as the number of topics covered in
    this chapter demonstrate. They range from integration with command-line tools
    to your development environment to the servers you finally deploy onto. Many options
    are available to you—so many that an entire book on the subject wouldn’t be inappropriate.
    The good news is that many of the deployment options and techniques you use in
    the Java space are equally applicable to Grails.


    Whether it be with a Java EE–compliant container like Tomcat or your favorite
    build tool, there is typically a way to get Groovy and Grails to work seamlessly
    in your environment. The next chapter will deal with a whole new subject, one
    critical to the workings of Grails—the plug-in system. Throughout this book you’ve
    already used many of the more prominent plug-ins in Grails.


    Now it’s time for you to turn into a plug-in creator, to learn how you can modularize
    your application through the use of plug-ins.


    ## CHAPTER 12


    ![Image](images/3squ.jpg)


    ## Plug-ins


    Up until now, you have been a consumer of the Grails plug-in system at various
    points throughout the book. Plug-ins are very much a cornerstone of Grails. Grails
    itself is basically a plug-in runtime with little knowledge beyond how to load
    and configure an installed set of plug-ins. Most of the core of Grails is implemented
    as a suite of plug-ins for this runtime.


    The Grails plug-in system is very flexible—so much so that it would be quite reasonable
    to write an entire book on the subject. In this chapter, we aim to summarize the
    core concepts and demonstrate some common use cases for the plug-in system. However,
    the full extent of what is achievable with the plug-in system is left to your
    imagination.


    Even if you don’t plan to write a plug-in to distribute to the world, we recommend
    you take the time to read this chapter. Grails plug-ins are not just a way to
    enhance the functionality of an existing Grails application; they are also an
    effective way to modularize your code. Later in this chapter, we will demonstrate
    how you can use plug-ins to split your Grails application into separate maintainable
    plug-ins that are composed together at runtime.


    ### Plug-in Basics


    The core of Grails is a plug-in runtime environment. However, to make it immediately
    useful, it ships with a default set of plug-ins that you’ve already learned about,
    including GORM and the Grails MVC framework. Along with the default plug-ins,
    Grails ships with a set of commands to automatically discover and install new
    plug-ins. Let’s take a look at these first.'
  raw: '#### Application Versioning and Metadata


    You may have already noticed by now that when you run the `grails war` command,
    the generated WAR file has a version number on the end of the file name. You may
    be wondering where this mysterious version number comes from. Basically, when
    you create a Grails application, the version number of the application is set
    to 0.1 in the application’s metadata.


    You can change the version number by calling the `set-version` command, as shown
    in [Listing 11-41](#Chapter11.html#list_11_41).


    ***Listing 11-41.** Setting the Application Version Number*


    `grails set-version 0.2`


    Then when you build a new WAR, the version number from [Listing 11-41](#Chapter11.html#list_11_41)
    will be used instead. At runtime you can inspect the application metadata using
    the `grailsApplication` object:


    `println grailsApplication.metadata."app.version"`


    or using the `<g:meta>` tag from a GSP, as shown in [Listing 11-42](#Chapter11.html#list_11_42).


    ***Listing 11-42.** Using Application Metadata*


    `Version <g:meta name="app.version"/>`

    `Built with Grails <g:meta name="app.grails.version"/>`


    #### Customizing the WAR


    If you want to customize the way in which the WAR file is produced, you can consider
    taking advantage of a number of hooks. For example, say you wanted to provide
    a different base `web.xml` template in order to include your own custom servlets;
    you can do so with the `grails.config.base.webXml` setting in `grails-app/conf/Config.groovy`:


    `grails.config.base.webXml="file:${userHome}/.settings/my-web.xml"`


    Also, if you need to change the location where the WAR file is generated, you
    can do so using the `grails.war.destFile` property:


    `grails.war.destFile = "${tomcatHome}/webapps"`


    If you want to include additional resources in the WAR, you can do so with the
    `grails.war.resources` setting, as shown in [Listing 11-43](#Chapter11.html#list_11_43).


    ***Listing 11-43.** Using the grails.war.resources Setting to Include Custom Resources*


    `grails.war.resources = { stagingDir ->`

    `// include static resources`

    `  copy(dir:stagingDir) {`

    `   fileset(dir:"/usr/var/www/htdocs")`

    `  }`

    `}`


    Notice how the closure assigned to `grails.war.resources` gets passed an argument
    that is the location of the directory where the WAR is being built. You can then
    use custom copy steps to include whatever extra resources you need. Once you actually
    have a WAR, you may want to perform some initial population of the database state
    when the application loads. We’ll be covering how to do this in the next section.


    ##### Populating the Database with BootStrap Classes


    Whenever an application loads for the first time, there may be some initial state
    that needs to be in place for the application to operate correctly. One way to
    do this is with `BootStrap` classes. If you look at the `grails-app/conf` directory,
    you may have noticed a class called `BootStrap.groovy`. [Listing 11-44](#Chapter11.html#list_11_44)
    shows the template for this class.


    ***Listing 11-44.** The BootStrap Class*


    `class BootStrap {`

    `    def init = {`

    `        servletContext ->`

    `    }`

    `    def destroy = {`

    `    }`

    `}`


    As you can see, there is an `init` method, which is called when the container
    first loads, and a `destroy` method. The `destroy` method is called on container
    shutdown. It should be noted, though, that it is not guaranteed to be invoked
    and hence shouldn’t be relied upon for anything critical.


    Within the `Bootstrap` class, you can use GORM to populate the database. Thanks
    to GORM’s usage of fluent APIs^([1](#Chapter11.html#CHP-11-FN-1)), it is pretty
    easy to create an object graph, as [Listing 11-45](#Chapter11.html#list_11_45)
    shows.


    ***Listing 11-45.** Populating Data on Application Load*


    `def init = {`

    `    def album = new Album(title:"Because of the Times")`

    `    album.addToSongs(title:"Knocked Up").addToSongs(title:"Charmer")`

    `        ...`

    `    new Artist(name:"Kings of Leon") .addToAlbums(album) .save(flush:true)`

    `}`


    If you need to populate per-environment data, use the `GrailsUtil` class to obtain
    the environment and perform a switch. See [Listing 11-46](#Chapter11.html#list_11_46)
    for an example.


    ***Listing 11-46.** Per-Environment Bootstrapping*


    `def init = {`

    `    switch(grails.util.GrailsUtil.environment) {`

    `        case "development":`

    `            // initialize in development here`

    `            break`

    `        case "production":`

    `            // initialize in production here`

    `        break`

    `    }`

    `}`


    ![Image](images/line.jpg)


    ¹ A fluent API is often referred to as method chaining because it involves writing
    methods that return objects in a manner such that multiple methods can be chained
    in a sequence. See [`www.martinfowler.com/bliki/FluentInterface.html`](http://www.martinfowler.com/bliki/FluentInterface.html)
    for a more complete definition.


    ### Summary


    Integrating Grails covers a broad spectrum, as the number of topics covered in
    this chapter demonstrate. They range from integration with command-line tools
    to your development environment to the servers you finally deploy onto. Many options
    are available to you—so many that an entire book on the subject wouldn’t be inappropriate.
    The good news is that many of the deployment options and techniques you use in
    the Java space are equally applicable to Grails.


    Whether it be with a Java EE–compliant container like Tomcat or your favorite
    build tool, there is typically a way to get Groovy and Grails to work seamlessly
    in your environment. The next chapter will deal with a whole new subject, one
    critical to the workings of Grails—the plug-in system. Throughout this book you’ve
    already used many of the more prominent plug-ins in Grails.


    Now it’s time for you to turn into a plug-in creator, to learn how you can modularize
    your application through the use of plug-ins.


    ## CHAPTER 12


    ![Image](images/3squ.jpg)


    ## Plug-ins


    Up until now, you have been a consumer of the Grails plug-in system at various
    points throughout the book. Plug-ins are very much a cornerstone of Grails. Grails
    itself is basically a plug-in runtime with little knowledge beyond how to load
    and configure an installed set of plug-ins. Most of the core of Grails is implemented
    as a suite of plug-ins for this runtime.


    The Grails plug-in system is very flexible—so much so that it would be quite reasonable
