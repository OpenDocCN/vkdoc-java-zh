- fmt: "### Using Parameterized Messages for Validation\n\nNotice that the default\
    \ `grails-app/i18n/messages.properties` file contains a number of messages by\
    \ default. These messages are there to support the mechanism that is built in\
    \ to Grails for validating domain classes and command objects. [Listing 7-13](#Chapter07.html#list_7_13)\
    \ shows a domain class that contains some constraints.\n\n**Listing 7-13.** A\
    \ Domain Class with Constraints\n\n```\nclass Person {\n    String firstName\n\
    \    String lastName\n    Integer age\n\n    static constraints = {\n        firstName\
    \ size: 2..30, blank: false\n        lastName size: 2..30, blank: false\n    \
    \    age min: 0\n    }\n}\n```\n\nThese constraints are in place to make sure\
    \ that the `firstName` and `lastName` properties are at least 2 characters, no\
    \ more than 30 characters, and not blank. You might think that specifying a minimum\
    \ length of 2 would take care of the blank scenario, but that is not the case.\
    \ A `firstName` that is simply three spaces would satisfy the length constraint\
    \ but not the blank constraint. The `age` property also is constrained: it may\
    \ never have a negative value. If an instance of the `Person` class is created\
    \ that does not satisfy all of those constraints, then a call to the `validate()`\
    \ method on that instance would return false. Likewise, a call to `save()` on\
    \ the instance would fail.\n\nThe default scaffolded views for a domain class\
    \ contain code to display any validation errors. [Listing 7-14](#Chapter07.html#list_7_14)\
    \ shows a piece of the default `grails-app/views/person/create.gsp`.\n\n**Listing\
    \ 7-14.** `create.gsp` Containing Code to Render Validation Errors\n\n```\n<h1><g:message\
    \ code=\"default.create.label\" args=\"[entityName]\" /></h1>\n<g:if test=\"${flash.message}\"\
    >\n<div class=\"message\" role=\"status\">${flash.message}</div>\n</g:if>\n<g:hasErrors\
    \ bean=\"${personInstance}\">\n<ul class=\"errors\" role=\"alert\">\n       <g:eachError\
    \ bean=\"${personInstance}\" var=\"error\">\n       <li <g:if test=\"${error in\
    \ org.springframework.validation.FieldError}\">data-field-\nid=\"${error.field}\"\
    </g:if>><g:message error=\"${error}\"/></li>\n       </g:eachError>\n</ul>\n</g:hasErrors>\n\
    ```\n\nThe `hasErrors` tag will render its body only if `personInstance` has errors.\
    \ If `personInstance` does have errors, then the `renderErrors` tag will render\
    \ a list of all those errors, and that rendering process is using the validation\
    \ messages defined in `grails-app/i18n/messages.properties`.\n\n[Figure 7-4](#Chapter07.html#fig_7_4)\
    \ shows what the user might see when attempting to create a `Person` in the user\
    \ interface with no `firstName`, no `lastName`, and a negative `age`.\n\n![Image](images/9781430243779_Fig07-04.jpg)\n\
    \n**Figure 7-4.** Validation messages in the user interface\n\nThe error messages\
    \ you see there are all defined in `grails-app/i18n/messages.properties` as parameterized\
    \ messages, as shown in [Listing 7-15](#Chapter07.html#list_7_15).\n\n**Listing\
    \ 7-15.** Default Validation Messages\n\n```\ndefault.invalid.min.message=\\\n\
    \  Property [{0}] of class [{1}] with value [{2}] is less than minimum value [{3}]\n\
    default.blank.message=Property [{0}] of class [{1}] cannot be blank\n...\n```\n\
    \nYou may modify the values of these messages to suit your application. For example,\
    \ if the `default.blank.message` property was given a value of `{0} is a required\
    \ field`, then the user would be shown error messages like those in [Figure 7-5](#Chapter07.html#fig_7_5).\n\
    \n![Image](images/9781430243779_Fig07-05.jpg)\n\n**Figure 7-5.** Custom validation\
    \ messages in the user interface\n\nChanging the default validation message in\
    \ this manner is useful when the validation message applies to all usages of a\
    \ particular validator. Often it will be necessary to provide a custom message\
    \ for a validator as it relates to a specific property in a specific class. For\
    \ example, the `min` constraint might be applied to the `age` property in the\
    \ `Person` class, and the same constraint might be applied to the `balance` property\
    \ in the `Account` class. Describing a constraint violation for those two scenarios\
    \ requires two separate messages. If a person’s age is a negative number, it would\
    \ of course not make sense to display “Account is not allowed to be overdrawn”\
    \ or a similar message. Likewise, the message displayed when an account has a\
    \ negative balance would be different from the message displayed when a person\
    \ has a negative age. To help deal with such situations, the framework supports\
    \ the association of validation messages not only with a particular constraint\
    \ but also with a particular property in a particular class. [Listing 7-16](#Chapter07.html#list_7_16)\
    \ shows examples of messages with specific properties.\n\n**Listing 7-16.** Property-Specific\
    \ Validation Messages\n\n```\nperson.age.min.notmet=A person may not have a negative\
    \ age\naccount.balance.min.notmet=Account is not allowed to be overdrawn\n```\n\
    \nEach of the framework-provided validators that support error messages has a\
    \ specific error code pattern or patterns; they are used to define error messages\
    \ for that validator, messages that are related to specific properties in specific\
    \ classes. Those error codes are listed in [Table 7-1](#Chapter07.html#tab_7_1).\n\
    \n![Image](images/9781430243779_Tab07-01.jpg)"
  raw: '### Using Parameterized Messages for Validation


    Notice that the default `grails-app/i18n/messages.properties` file contains a
    number of messages by default. These messages are there to support the mechanism
    that is built in to Grails for validating domain classes and command objects.
    [Listing 7-13](#Chapter07.html#list_7_13) shows a domain class that contains some
    constraints.


    ***Listing 7-13.** A Domain Class with Constraints*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`


    `    static constraints = {`

    `        firstName size: 2..30, blank: false`

    `        lastName size: 2..30, blank: false`

    `        age min: 0`

    `    }`

    `}`


    These constraints are in place to make sure that the `firstName` and `lastName`
    properties are at least 2 characters, no more than 30 characters, and not blank.
    You might think that specifying a minimum length of 2 would take care of the blank
    scenario, but that is not the case. A `firstName` that is simply three spaces
    would satisfy the length constraint but not the blank constraint. The `age` property
    also is constrained: it may never have a negative value. If an instance of the
    `Person` class is created that does not satisfy all of those constraints, then
    a call to the `validate()` method on that instance would return false. Likewise,
    a call to `save()` on the instance would fail.


    The default scaffolded views for a domain class contain code to display any validation
    errors. [Listing 7-14](#Chapter07.html#list_7_14) shows a piece of the default
    `grails-app/views/person/create.gsp`.


    ***Listing 7-14.** create.gsp Containing Code to Render Validation Errors*


    `<h1><g:message code="default.create.label" args="[entityName]" /></h1>`

    `<g:if test="${flash.message}">`

    `<div class="message" role="status">${flash.message}</div>`

    `</g:if>`

    `<g:hasErrors bean="${personInstance}">`

    `<ul class="errors" role="alert">`

    `       <g:eachError bean="${personInstance}" var="error">`

    `       <li <g:if test="${error in org.springframework.validation.FieldError}">data-field-`

    `id="${error.field}"</g:if>><g:message error="${error}"/></li>`

    `       </g:eachError>`

    `</ul>`

    `</g:hasErrors>`


    The `hasErrors` tag will render its body only if `personInstance` has errors.
    If `personInstance` does have errors, then the `renderErrors` tag will render
    a list of all those errors, and that rendering process is using the validation
    messages defined in `grails-app/i18n/messages.properties`.


    [Figure 7-4](#Chapter07.html#fig_7_4) shows what the user might see when attempting
    to create a `Person` in the user interface with no `firstName`, no `lastName`,
    and a negative `age`.


    ![Image](images/9781430243779_Fig07-04.jpg)


    ***Figure 7-4.** Validation messages in the user interface*


    The error messages you see there are all defined in `grails-app/i18n/messages.properties`
    as parameterized messages, as shown in [Listing 7-15](#Chapter07.html#list_7_15).


    ***Listing 7-15.** Default Validation Messages*


    `default.invalid.min.message=\`

    `  Property [{0}] of class [{1}] with value [{2}] is less than minimum value [{3}]`

    `default.blank.message=Property [{0}] of class [{1}] cannot be blank`

    `...`


    You may modify the values of these messages to suit your application. For example,
    if the `default.blank.message` property was given a value of `{0} is a required
    field`, then the user would be shown error messages like those in [Figure 7-5](#Chapter07.html#fig_7_5).


    ![Image](images/9781430243779_Fig07-05.jpg)


    ***Figure 7-5.** Custom validation messages in the user interface*


    Changing the default validation message in this manner is useful when the validation
    message applies to all usages of a particular validator. Often it will be necessary
    to provide a custom message for a validator as it relates to a specific property
    in a specific class. For example, the min constraint might be applied to the `age`
    property in the `Person` class, and the same constraint might be applied to the
    `balance` property in the `Account` class. Describing a constraint violation for
    those two scenarios requires two separate messages. If a person’s age is a negative
    number, it would of course not make sense to display “Account is not allowed to
    be overdrawn” or a similar message. Likewise, the message displayed when an account
    has a negative balance would be different from the message displayed when a person
    has a negative age. To help deal with such situations, the framework supports
    the association of validation messages not only with a particular constraint but
    also with a particular property in a particular class. [Listing 7-16](#Chapter07.html#list_7_16)
    shows examples of messages with specific properties.


    ***Listing 7-16.** Property-Specific Validation Messages*


    `person.age.min.notmet=A person may not have a negative age`

    `account.balance.min.notmet=Account is not allowed to be overdrawn`


    Each of the framework-provided validators that support error messages has a specific
    error code pattern or patterns; they are used to define error messages for that
    validator, messages that are related to specific properties in specific classes.
    Those error codes are listed in [Table 7-1](#Chapter07.html#tab_7_1).


    ![Image](images/9781430243779_Tab07-01.jpg)'
  trans: '

    ### 使用参数化消息进行验证


    请注意，默认的 `grails-app/i18n/messages.properties` 文件中包含许多默认消息。这些消息用于支持 Grails 内置的验证域类和命令对象的机制。清单
    7-13 展示了一个包含某些约束的域类。


    ***清单 7-13.** 包含约束的域类*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`


    `    static constraints = {`

    `        firstName size: 2..30, blank: false`

    `        lastName size: 2..30, blank: false`

    `        age min: 0`

    `    }`

    `}`


    这些约束用于确保 `firstName` 和 `lastName` 属性至少包含 2 个字符，最多不超过 30 个字符，并且不能为空。你可能会认为指定最小长度为
    2 就能处理空白的情况，但事实并非如此。一个仅包含三个空格的 `firstName` 可以满足长度约束，但无法满足非空约束。`age` 属性也受到约束：它永远不能为负值。如果创建的
    `Person` 类实例不满足所有这些约束，那么对该实例调用 `validate()` 方法将返回 false。同样，对该实例调用 `save()` 也会失败。


    域类的默认脚手架视图包含用于显示任何验证错误的代码。清单 7-14 展示了默认的 `grails-app/views/person/create.gsp`
    的一部分。


    ***清单 7-14.** 包含渲染验证错误代码的 create.gsp*


    `<h1><g:message code="default.create.label" args="[entityName]" /></h1>`

    `<g:if test="${flash.message}">`

    `<div class="message" role="status">${flash.message}</div>`

    `</g:if>`

    `<g:hasErrors bean="${personInstance}">`

    `<ul class="errors" role="alert">`

    `       <g:eachError bean="${personInstance}" var="error">`

    `       <li <g:if test="${error in org.springframework.validation.FieldError}">data-field-`

    `id="${error.field}"</g:if>><g:message error="${error}"/></li>`

    `       </g:eachError>`

    `</ul>`

    `</g:hasErrors>`


    `hasErrors` 标签仅在 `personInstance` 存在错误时才会渲染其主体。如果 `personInstance` 确实存在错误，那么 `renderErrors`
    标签将渲染所有这些错误的列表，并且该渲染过程会使用在 `grails-app/i18n/messages.properties` 中定义的验证消息。


    图 7-4 展示了当用户在用户界面中尝试创建一个 `Person`，且未提供 `firstName`、`lastName` 并输入了负的 `age` 时，用户可能看到的内容。


    ![Image](img/9781430243779_Fig07-04.jpg)


    ***图 7-4.** 用户界面中的验证消息*


    你在那里看到的错误消息都定义在 `grails-app/i18n/messages.properties` 中，作为参数化消息，如清单 7-15 所示。


    ***清单 7-15.** 默认验证消息*


    `default.invalid.min.message=\`

    `  Property [{0}] of class [{1}] with value [{2}] is less than minimum value [{3}]`

    `default.blank.message=Property [{0}] of class [{1}] cannot be blank`

    `...`


    你可以修改这些消息的值以适应你的应用程序。例如，如果 `default.blank.message` 属性的值被设置为 `{0} is a required
    field`，那么用户将看到如图 7-5 所示的错误消息。


    ![Image](img/9781430243779_Fig07-05.jpg)


    ***图 7-5.** 用户界面中的自定义验证消息*


    当验证消息适用于特定验证器的所有用法时，以这种方式更改默认验证消息非常有用。通常，有必要为与特定类中特定属性相关的验证器提供自定义消息。例如，`min` 约束可能应用于
    `Person` 类中的 `age` 属性，而相同的约束可能应用于 `Account` 类中的 `balance` 属性。为这两种情况描述约束违规需要两条不同的消息。如果一个人的年龄是负数，显示“账户不允许透支”或类似的消息当然没有意义。同样，当账户余额为负时显示的消息，与当一个人年龄为负时显示的消息也会不同。为了帮助处理此类情况，该框架不仅支持将验证消息与特定约束关联，还支持与特定类中的特定属性关联。清单
    7-16 展示了包含特定属性的消息示例。


    ***清单 7-16.** 属性特定的验证消息*


    `person.age.min.notmet=A person may not have a negative age`

    `account.balance.min.notmet=Account is not allowed to be overdrawn`


    框架提供的每个支持错误消息的验证器都有一个或多个特定的错误代码模式；它们用于为该验证器定义错误消息，这些消息与特定类中的特定属性相关。这些错误代码列在表 7-1
    中。


    ![Image](img/9781430243779_Tab07-01.jpg)

