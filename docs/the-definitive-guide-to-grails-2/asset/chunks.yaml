- fmt: "### Performing Data Binding\n\nOften a controller action will need to create\
    \ new domain objects and populate the properties of the instance with values received\
    \ as request parameters. Consider the `Album` domain class, which has properties\
    \ such as `genre` and `title`. If a request is made to the `save` action in the\
    \ `AlbumController`, the controller action could create a new `Album` and save\
    \ it using a technique like that shown in [Listing 4-22](#Chapter04.html#list_4_22).\n\
    \n***Listing 4-22.** Populating an Album with Request Parameters*\n\n```\nclass\
    \ AlbumController {\n    def save() {\n        def album = new Album()\n     \
    \   album.genre = params.genre\n        album.title = params.title\n        album.save()\n\
    \    }\n}\n```\n\nThe approach in [Listing 4-22](#Chapter04.html#list_4_22) assigns\
    \ values to domain properties based on corresponding request parameters. It might\
    \ work for simple models with a small number of properties, but as your domain\
    \ model grows in complexity, this code gets longer and more tedious. Fortunately,\
    \ the Grails framework provides some slick options for binding request parameters\
    \ to a domain object.\n\nRemember that the `params` object in your controller\
    \ is a map of name/value pairs. You can pass maps to a domain class’s constructor\
    \ to initialize all the domain class’s properties with the corresponding request\
    \ parameters. [Listing 4-23](#Chapter04.html#list_4_23) shows a better approach\
    \ to creating and populating an `Album` object.\n\n***Listing 4-23.** Populating\
    \ an Album by Passing params to the Constructor*\n\n```\nclass AlbumController\
    \ {\n    def save() {\n        def album = new Album(params)\n        album.save()\n\
    \    }\n}\n```\n\n![Image](images/square.jpg) **Caution** The default data binding\
    \ mechanism will bind all properties that are not static, not transient, and not\
    \ dynamically typed. The features detailed so far can leave your web application\
    \ open to URL attacks due to the automatic setting of properties from request\
    \ parameters. This is a common issue among frameworks that perform such conversion\
    \ (including Ruby on Rails, Spring MVC, WebWork, and others). If you are developing\
    \ a web application with heightened security in mind, you should use fine-grained\
    \ control over data binding through `bindable` constraint and/or the `bindData`\
    \ method (each described later), along with stricter validation.\n\nAs you can\
    \ see, this is a much cleaner approach and scales better as the number of properties\
    \ in a domain class grows.\n\nOccasionally, setting properties on a domain object\
    \ that has already been constructed can prove useful. For example, you retrieve\
    \ a domain object from the database and then need to update it with values passed\
    \ to the controller as request parameters. In a case like this, passing a map\
    \ of parameters to the domain-class constructor will not help, because the object\
    \ already exists. Grails provides yet another slick solution here. You can use\
    \ a domain class’s `properties` property in conjunction with request parameters\
    \ to update an existing object, as shown in [Listing 4-24](#Chapter04.html#list_4_24).\n\
    \n***Listing 4-24.** Updating an Existing Object with Request Parameters*\n\n\
    ```\nclass AlbumController {\n    def update() {\n        def album = Album.get(params.id)\n\
    \        album.properties = params\n        album.save()\n    }\n}\n```\n\nWhenever\
    \ your application accepts user input, there is a chance that said input might\
    \ not be what your application requires. You’ve already seen in [Chapter 3](#Chapter03.html)\
    \ how to define custom-validation constraints on domain classes; now you’ll begin\
    \ to understand how you can use data binding in combination with these constraints\
    \ to validate incoming data.\n\n### Validating Incoming Data\n\nThe mechanics\
    \ of the data-binding and data-validation process in Grails has two phases. First,\
    \ let’s revisit the following line of code:\n\n```\nalbum.properties = params\n\
    ```\n\nAt this point, Grails will attempt to bind any incoming request parameters\
    \ onto the properties of the instance. Groovy is a strongly typed language, and\
    \ all parameters arrive as strings, so some type conversion might be necessary.\n\
    \nUnderneath the surface, Grails uses Spring’s data-binding capabilities to convert\
    \ request parameters to the target type if necessary. During this process, a type-conversion\
    \ error can occur if, for example, converting the `String` representation of a\
    \ number to a `java.lang.Integer` is impossible. If an error occurs, Grails automatically\
    \ sets the persistent instance to read-only so it cannot persist unless you yourself\
    \ explicitly make it persist (refer to [Chapter 10](#Chapter10.html) for more\
    \ information on automatic dirty checking).\n\nIf all is well, the second phase\
    \ of validation commences. At this point, you validate the persistent instance\
    \ against its defined constraints, using either the `validate()` method or the\
    \ `save()` method, as described in [Chapter 3](#Chapter03.html):\n\n```\nalbum.validate()\n\
    ```\n\nGrails will validate each property of the `Album` instance and populate\
    \ the `Errors` object with any validation errors that might have occurred. This\
    \ brings us nicely into a discussion of the Errors API.\n\n### The Errors API\
    \ and Controllers\n\nThe mechanics of Grails’ validation mechanism is built entirely\
    \ on Spring’s `org.springframework.validation` package. As discussed in [Chapter\
    \ 3](#Chapter03.html), whenever you validate a domain instance, a Spring `org.springframework.validation.Errors`\
    \ object is created and associated with the instance.\n\nFrom a controller’s point\
    \ of view, when you have a domain object in an invalid state—typically due to\
    \ invalid user input that changes an instance using data binding—you need to use\
    \ branching logic to handle the validation error.\n\n[Listing 4-25](#Chapter04.html#list_4_25)\
    \ shows an example of how to use data binding to update an `Album` instance and\
    \ validate its state.\n\n***Listing 4-25.** Dealing with Validation Errors*\n\n\
    ```\ndef save() {\n    def album = Album.get(params.id)\n    album.properties\
    \ = params\n    if(album.save()) {\n        redirect action: \"show\", id: album.id\n\
    \    } else {\n        render view: \"edit\", model: [album:album]\n    }\n}\n\
    ```\n\nNotice how in [Listing 4-20](#Chapter04.html#list_4_20) you can call the\
    \ `save()` method, which triggers validation, and send the user back to the edit\
    \ view if a validation error occurs. When a user enters invalid data, the `errors`\
    \ property on the `Album` will be an `Errors` object containing one or more validation\
    \ errors.\n\nYou can programmatically decipher these errors by iterating over\
    \ them:\n\n```\nalbum.errors.allErrors.each { println it.code }\n```\n\nIf you\
    \ merely want to check whether an instance has any errors, you can call the `hasErrors()`\
    \ method on the instance:\n\n```\nif(album.hasErrors()) println \"Something went\
    \ wrong!\"\n```\n\nIn the view, you can render these using the `<g:renderErrors>`\
    \ tag:\n\n```\n<g:renderErrors bean=\"${album}\" />\n```\n\nYou’ll be learning\
    \ more about handling errors in the view through the course of the book, but as\
    \ you can see, it’s frequently the controller’s job to coordinate errors that\
    \ occur and ensure the user enters valid data."
  raw: '### Performing Data Binding


    Often a controller action will need to create new domain objects and populate
    the properties of the instance with values received as request parameters. Consider
    the `Album` domain class, which has properties such as `genre` and `title`. If
    a request is made to the `save` action in the `AlbumController`, the controller
    action could create a new `Album` and save it using a technique like that shown
    in [Listing 4-22](#Chapter04.html#list_4_22).


    ***Listing 4-22.** Populating an Album with Request Parameters*


    `class AlbumController {`

    `    def save() {`

    `        def album = new Album()`

    `        album.genre = params.genre`

    `        album.title = params.title`

    `        album.save()`

    `    }`

    `}`


    The approach in [Listing 4-22](#Chapter04.html#list_4_22) assigns values to domain
    properties based on corresponding request parameters. It might work for simple
    models with a small number of properties, but as your domain model grows in complexity,
    this code gets longer and more tedious. Fortunately, the Grails framework provides
    some slick options for binding request parameters to a domain object.


    Remember that the `params` object in your controller is a map of name/value pairs.
    You can pass maps to a domain class’s constructor to initialize all the domain
    class’s properties with the corresponding request parameters. [Listing 4-23](#Chapter04.html#list_4_23)
    shows a better approach to creating and populating an `Album` object.


    ***Listing 4-23.** Populating an Album by Passing params to the Constructor*


    `class AlbumController {`

    `    def save() {`

    `        def album = new Album(params)`

    `        album.save()`

    `    }`

    `}`


    ![Image](images/square.jpg) **Caution**  The default data binding mechanism will
    bind all properties that are not static, not transient, and not dynamically typed.
    The features detailed so far can leave your web application open to URL attacks
    due to the automatic setting of properties from request parameters. This is a
    common issue among frameworks that perform such conversion (including Ruby on
    Rails, Spring MVC, WebWork, and others). If you are developing a web application
    with heightened security in mind, you should use fine-grained control over data
    binding through bindable constraint and/or the bindData method (each described
    later), along with stricter validation.


    As you can see, this is a much cleaner approach and scales better as the number
    of properties in a domain class grows.


    Occasionally, setting properties on a domain object that has already been constructed
    can prove useful. For example, you retrieve a domain object from the database
    and then need to update it with values passed to the controller as request parameters.
    In a case like this, passing a map of parameters to the domain-class constructor
    will not help, because the object already exists. Grails provides yet another
    slick solution here. You can use a domain class’s `properties` property in conjunction
    with request parameters to update an existing object, as shown in [Listing 4-24](#Chapter04.html#list_4_24).


    ***Listing 4-24.** Updating an Existing Object with Request Parameters*


    `class AlbumController {`

    `    def update() {`

    `        def album = Album.get(params.id)`

    `        album.properties = params`

    `        album.save()`

    `    }`

    `}`


    Whenever your application accepts user input, there is a chance that said input
    might not be what your application requires. You’ve already seen in [Chapter 3](#Chapter03.html)
    how to define custom-validation constraints on domain classes; now you’ll begin
    to understand how you can use data binding in combination with these constraints
    to validate incoming data.


    #### Validating Incoming Data


    The mechanics of the data-binding and data-validation process in Grails has two
    phases. First, let’s revisit the following line of code:


    `album.properties = params`


    At this point, Grails will attempt to bind any incoming request parameters onto
    the properties of the instance. Groovy is a strongly typed language, and all parameters
    arrive as strings, so some type conversion might be necessary.


    Underneath the surface, Grails uses Spring’s data-binding capabilities to convert
    request parameters to the target type if necessary. During this process, a type-conversion
    error can occur if, for example, converting the `String` representation of a number
    to a `java.lang.Integer` is impossible. If an error occurs, Grails automatically
    sets the persistent instance to read-only so it cannot persist unless you yourself
    explicitly make it persist (refer to [Chapter 10](#Chapter10.html) for more information
    on automatic dirty checking).


    If all is well, the second phase of validation commences. At this point, you validate
    the persistent instance against its defined constraints, using either the `validate()`
    method or the `save()` method, as described in [Chapter 3](#Chapter03.html):


    `album.validate()`


    Grails will validate each property of the `Album` instance and populate the `Errors`
    object with any validation errors that might have occurred. This brings us nicely
    into a discussion of the Errors API.


    #### The Errors API and Controllers


    The mechanics of Grails’ validation mechanism is built entirely on Spring’s `org.springframework.validation`
    package. As discussed in [Chapter 3](#Chapter03.html), whenever you validate a
    domain instance, a Spring `org.springspringframework.validation.Errors` object
    is created and associated with the instance.


    From a controller’s point of view, when you have a domain object in an invalid
    state—typically due to invalid user input that changes an instance using data
    binding—you need to use branching logic to handle the validation error.


    [Listing 4-25](#Chapter04.html#list_4_25) shows an example of how to use data
    binding to update an `Album` instance and validate its state.


    ***Listing 4-25.** Dealing with Validation Errors*


    `def save() {`

    `    def album = Album.get(params.id)`

    `    album.properties = params`

    `    if(album.save()) {`

    `        redirect action: "show", id: album.id`

    `    } else {`

    `        render view: "edit", model: [album:album]`

    `    }`

    `}`


    Notice how in [Listing 4-20](#Chapter04.html#list_4_20) you can call the `save()`
    method, which triggers validation, and send the user back to the edit view if
    a validation error occurs. When a user enters invalid data, the errors property
    on the Album will be an `Errors` object containing one or more validation errors.


    You can programmatically decipher these errors by iterating over them:


    `album.errors.allErrors.each { println it.code }`


    If you merely want to check whether an instance has any errors, you can call the
    `hasErrors()` method on the instance:


    `if(album.hasErrors()) println "Something went wrong!"`


    In the view, you can render these using the `<g:renderErrors>` tag:


    `<g:renderErrors bean="${album}" />`


    You’ll be learning more about handling errors in the view through the course of
    the book, but as you can see, it’s frequently the controller’s job to coordinate
    errors that occur and ensure the user enters valid data.'
  trans: '

    ### 执行数据绑定


    控制器动作通常需要创建新的领域对象，并用请求参数中接收到的值填充实例的属性。以 `Album` 领域类为例，它拥有 `genre` 和 `title` 等属性。如果向
    `AlbumController` 中的 `save` 动作发起请求，该控制器动作可以创建一个新的 `Album` 对象，并使用如代码清单 4-22 所示的技术将其保存。


    ***代码清单 4-22.** 使用请求参数填充 Album 对象*


    `class AlbumController {`

    `    def save() {`

    `        def album = new Album()`

    `        album.genre = params.genre`

    `        album.title = params.title`

    `        album.save()`

    `    }`

    `}`


    代码清单 4-22 中的方法根据相应的请求参数为领域属性赋值。对于属性数量较少的简单模型，这种方法可能有效，但随着领域模型复杂度的增加，这段代码会变得越来越冗长繁琐。幸运的是，Grails
    框架提供了一些巧妙的选择，用于将请求参数绑定到领域对象。


    请记住，控制器中的 `params` 对象是一个名称/值对的映射。你可以将映射传递给领域类的构造函数，以使用相应的请求参数初始化领域类的所有属性。代码清单
    4-23 展示了一种创建并填充 `Album` 对象的更好方法。


    ***代码清单 4-23.** 通过将 params 传递给构造函数来填充 Album 对象*


    `class AlbumController {`

    `    def save() {`

    `        def album = new Album(params)`

    `        album.save()`

    `    }`

    `}`


    ![Image](img/square.jpg) **警告**  默认的数据绑定机制会绑定所有非静态、非瞬态且非动态类型的属性。由于请求参数会自动设置属性，到目前为止详述的这些特性可能会使你的
    Web 应用程序面临 URL 攻击的风险。这是执行此类转换的框架（包括 Ruby on Rails、Spring MVC、WebWork 等）中常见的问题。如果你正在开发一个注重高度安全性的
    Web 应用程序，则应通过 `bindable` 约束和/或 `bindData` 方法（两者稍后都会介绍）以及更严格的验证，对数据绑定进行细粒度控制。


    如你所见，这是一种更简洁的方法，并且随着领域类中属性数量的增加，其扩展性也更好。


    有时，对已构建好的领域对象设置属性会很有用。例如，你从数据库中检索出一个领域对象，然后需要使用作为请求参数传递给控制器的值来更新它。在这种情况下，将参数映射传递给领域类构造函数是行不通的，因为对象已经存在。Grails
    在这里提供了另一个巧妙的解决方案。你可以将领域类的 `properties` 属性与请求参数结合使用来更新现有对象，如代码清单 4-24 所示。


    ***代码清单 4-24.** 使用请求参数更新现有对象*


    `class AlbumController {`

    `    def update() {`

    `        def album = Album.get(params.id)`

    `        album.properties = params`

    `        album.save()`

    `    }`

    `}`


    每当你的应用程序接受用户输入时，该输入都有可能不符合应用程序的要求。你已经在第 3 章中了解了如何在领域类上定义自定义验证约束；现在你将开始理解如何将数据绑定与这些约束结合使用来验证传入的数据。


    #### 验证传入数据


    Grails 中数据绑定和数据验证过程的机制分为两个阶段。首先，让我们重新审视下面这行代码：


    `album.properties = params`


    此时，Grails 将尝试将所有传入的请求参数绑定到实例的属性上。Groovy 是一种强类型语言，所有参数都以字符串形式到达，因此可能需要进行一些类型转换。


    在底层，Grails 使用 Spring 的数据绑定功能在必要时将请求参数转换为目标类型。在此过程中，可能会发生类型转换错误，例如，如果无法将数字的 `String`
    表示形式转换为 `java.lang.Integer`。如果发生错误，Grails 会自动将持久化实例设置为只读，因此除非你显式地使其持久化，否则它无法持久化（有关自动脏检查的更多信息，请参阅第
    10 章）。


    如果一切顺利，则开始验证的第二阶段。此时，你根据已定义的约束来验证持久化实例，可以使用 `validate()` 方法或 `save()` 方法，如第 3
    章所述：


    `album.validate()`


    Grails 将验证 `Album` 实例的每个属性，并用可能发生的任何验证错误填充 `Errors` 对象。这自然而然地引出了对 Errors API 的讨论。


    #### Errors API 与控制器


    Grails 验证机制的机制完全构建在 Spring 的 `org.springframework.validation` 包之上。如第 3 章所述，每当你验证一个领域实例时，都会创建一个
    Spring 的 `org.springframework.validation.Errors` 对象，并将其与该实例关联。


    从控制器的角度来看，当你有一个处于无效状态的领域对象时——通常是由于无效的用户输入通过数据绑定更改了实例——你需要使用分支逻辑来处理验证错误。


    代码清单 4-25 展示了一个如何使用数据绑定更新 `Album` 实例并验证其状态的示例。


    ***代码清单 4-25.** 处理验证错误*


    `def save() {`

    `    def album = Album.get(params.id)`

    `    album.properties = params`

    `    if(album.save()) {`

    `        redirect action: "show", id: album.id`

    `    } else {`

    `        render view: "edit", model: [album:album]`

    `    }`

    `}`


    请注意，在代码清单 4-20 中，你可以调用 `save()` 方法（该方法会触发验证），并在发生验证错误时将用户发送回编辑视图。当用户输入无效数据时，Album
    上的 `errors` 属性将是一个包含一个或多个验证错误的 `Errors` 对象。


    你可以通过迭代这些错误来以编程方式解读它们：


    `album.errors.allErrors.each { println it.code }`


    如果你只想检查一个实例是否有任何错误，可以在该实例上调用 `hasErrors()` 方法：


    `if(album.hasErrors()) println "Something went wrong!"`


    在视图中，你可以使用 `<g:renderErrors>` 标签来渲染这些错误：


    `<g:renderErrors bean="${album}" />`


    在本书的后续内容中，你将学习更多关于在视图中处理错误的知识，但正如你所见，协调发生的错误并确保用户输入有效数据通常是控制器的工作。

