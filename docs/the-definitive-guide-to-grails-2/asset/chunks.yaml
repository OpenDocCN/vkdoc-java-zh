- fmt: "### Ajax-Enabled Form Fields\n\nThat previous section was quite an adventure,\
    \ wasn’t it? You’re not done with Ajax yet. In this section, you’ll learn how\
    \ you can enable Ajax on form fields such as text inputs.\n\nThis is often useful\
    \ if you’re implementing features such as autocomplete or an instant search capability\
    \ like Spotlight on Mac OS X. In fact, search is exactly what you’re going to\
    \ aim to achieve in this section. Sure, it is useful to be able to click the latest\
    \ additions to the music library, but it is critical that users of gTunes can\
    \ search the back catalog of songs and albums.\n\nLuckily, jQuery can be used\
    \ to help implement the search feature. As a start, open the `grails-app/views/store/shop.gsp`\
    \ view. In this file you need to define a text field to accept search input and\
    \ write some jQuery code that will respond to input by invoking the `search` action,\
    \ as shown in [Listing 8-23](#Chapter08.html#list_8_23).\n\n**Listing 8-23.**\
    \ Using the `<g:remoteField>` Tag\n\n```\n<div id=\"searchBox\">\n    <h1>Instant\
    \ Search</h1>\n    <g:textField id=\"searchField\" name=\"searchField\"/>\n  \
    \  <div id=\"searchResults\" name=\"musicPanel\"></div>\n</div>\n<r:script>\n\
    $(\"#searchField\").keyup(function() {\n    $(\"#searchResults\").load(\"${createLink(action:\
    \ 'search')}?q=\"+this.value);\n});\n</r:script>\n```\n\nHere, you have set up\
    \ a text field that has a `keyup` event listener associated with it; it sends\
    \ a request to the `search` action of the `StoreController`.\n\n![Image](images/9781430243779_Fig08-04.jpg)\n\
    \n**Figure 8-4.** The gTunes instance search box\n\nIf you refresh the page and\
    \ start typing, you’ll see that the field is already sending remote requests,\
    \ although you’re getting 404 errors in the page rather than anything useful.\
    \ At this point, it is worth considering how to implement a search. You could,\
    \ of course, use Hibernate queries, but Hibernate is not really designed to be\
    \ used as a search engine, and designing your own search query language would\
    \ be a pain.\n\nThe Grails plug-in system comes to the rescue once again! One\
    \ of the most popular plug-ins currently available for Grails is the Searchable\
    \ plug-in, which builds on Compass ([`http://www.compass-project.org/`](http://www.compass-project.org/))\
    \ and Lucene ([`http://lucene.apache.org/`](http://lucene.apache.org/)).\n\n![Image](images/square.jpg)\
    \ **Note** This example will demonstrate the most basic capabilities of the searchable\
    \ plug-in. The full documentation is available at [`http://grails.org/plugin/searchable`](http://grails.org/plugin/searchable).\n\
    \nAs usual, installing Searchable is a trivial matter. Add the dependency to `BuildConfig.groovy`:\n\
    \n```\n// grails-app/conf/BuildConfig.groovy\ngrails.project.dependency.resolution\
    \ = {\n\n   ...\n\n    plugins {\n        runtime \":searchable:0.6.4\"\n    \
    \    ...\n    }\n}\n```\n\nThe Searchable plug-in integrates with Grails by providing\
    \ the ability to expose Grails domain classes as searchable entities. At a simple\
    \ level, it is possible to add search capabilities by adding the following line\
    \ to the domain class you want to search:\n\n```\nstatic searchable = true\n```\n\
    \nHowever, it is typically the case that you want to search only a subset of the\
    \ properties of the domain class. This is, of course, perfectly possible with\
    \ Searchable, and in fact it defines an entire DSL for mapping between your classes\
    \ and the search index (a topic beyond the scope of this book).\n\nIn this case,\
    \ you’ll want to search on an album or song’s `genre` and `title` and on an artist’s\
    \ name. [Listing 8-24](#Chapter08.html#list_8_24) shows how to enable these searches\
    \ using Searchable.\n\n**Listing 8-24.** Enabling Search on the gTunes Domain\n\
    \n```\nclass Song {\nstatic searchable = [only: ['genre', 'title']]\n    ...\n\
    }\nclass Album {\n    static searchable = [only: ['genre', 'title']]\n    ...\n\
    }\nclass Artist {\n    static searchable = [only: ['name']]\n    ...\n}\n```\n\
    \nSimple enough. Next, let’s implement the `search` action of the `StoreController`.\
    \ Like GORM, Searchable provides a bunch of new methods on domain classes that\
    \ support searching, including the following:\n\n> *   `search`: returns a search\
    \ result object containing a subset of objects matching the query\n> *   `searchTop`:\
    \ returns the first result object matching the query\n> *   `searchEvery`: returns\
    \ all result objects matching the query\n> *   `countHits`: returns the number\
    \ of hits for a query\n> *   `termFreqs`: returns term frequencies for the terms\
    \ in the index (advanced)\n\nFor full data on what each method does and how it\
    \ behaves, refer to the searchable documentation mentioned above. For your needs,\
    \ you’re going to use the `search` method to formulate the search results. [Listing\
    \ 8-25](#Chapter08.html#list_8_25) shows the implementation of the `search` action\
    \ of the `StoreController` using Searchable APIs.\n\n**Listing 8-25.** Using Searchable\
    \ to Enable Search\n\n```\n    def search(String q) {\n        def searchResults\
    \ = [:]\n        if(q) {\n            searchResults.artistResults = trySearch\
    \ { Artist.search(\"*${q}*\", [max: 10]) }\n            searchResults.albumResults\
    \ = trySearch { Album.search(\"*${q}*\", [max: 10]) }\n            searchResults.songResults\
    \ = trySearch { Song.search(\"*${q}*\", [max: 10]) }\n        }\n        render\
    \ template: 'searchResults', model: searchResults\n    }\n\n    private trySearch(Closure\
    \ callable) {\n        try {\n            return callable()\n        } catch (Exception\
    \ e) {\n            log.debug \"Search Error: ${e.message}\", e\n            return\
    \ []\n        }\n    }\n```\n\nThe code is pretty simple. It obtains the `q` parameter\
    \ representing the query and, if it isn’t blank, builds a model that contains\
    \ search results for albums, artists, and songs. One interesting aspect of this\
    \ code is the `trySearch` method, which demonstrates a compelling use of Groovy\
    \ closures to deal with exceptions. Since an exception will likely be the result\
    \ of an error in the search syntax, it is preferable to log that error and return\
    \ an empty result than throw the error back to the user.\n\nOnce the search results\
    \ have been formulated within a `searchResults` variable, the code renders a `_searchResults.gsp`\
    \ template, passing the `searchResults` as the model. As [Listing 8-26](#Chapter08.html#list_8_26)\
    \ demonstrates, the `grails-app/views/store/_searchResults.gsp` template is trivial;\
    \ it simply reuses such existing templates as `_albumList.gsp` and `_artistList.gsp`\
    \ to display results.\n\n**Listing 8-26.** The `_searchResults.gsp` Template\n\
    \n```\n<div id=\"searchResults\" class=\"searchResults\">\n  <g:if test=\"${albumResults?.results}\"\
    >\n    <div id=\"albumResults\" class=\"resultsPane\">\n      <h2>Album Search\
    \ Results</h2>\n      <g:render template=\"/album/albumList\"\n              \
    \  model=\"[albums:albumResults.results]\">\n      </g:render>\n    </div>\n \
    \ </g:if>\n  <g:if test=\"${artistResults?.results}\">\n    <div id=\"artistResults\"\
    \ class=\"resultsPane\">\n      <h2>Artist Search Results</h2>\n      <g:render\
    \ template=\"/artist/artistList\"\n                model=\"[artists:artistResults.results]\"\
    >\n      </g:render>\n    </div>\n  </g:if>\n  <g:if test=\"${songResults?.results}\"\
    >\n    <div id=\"songResults\" class=\"resultsPane\">\n      <h2>Song Search Results</h2>\n\
    \      <g:render template=\"/song/songList\"\n                model=\"[songs:songResults.results]\"\
    >\n      </g:render>\n    </div>\n  </g:if>\n</div>\n```"
  raw: '### Ajax-Enabled Form Fields


    That previous section was quite an adventure, wasn’t it? You’re not done with
    Ajax yet. In this section, you’ll learn how you can enable Ajax on form fields
    such as text inputs.


    This is often useful if you’re implementing features such as autocomplete or an
    instant search capability like Spotlight on Mac OS X. In fact, search is exactly
    what you’re going to aim to achieve in this section. Sure, it is useful to be
    able to click the latest additions to the music library, but it is critical that
    users of gTunes can search the back catalog of songs and albums.


    Luckily, jQuery can be used to help implement the search feature. As a start,
    open the `grails-app/views/store/shop.gsp` view. In this file you need to define
    a text field to accept search input and write some jQuery code that will respond
    to input by invoking the `search` action, as shown in [Listing 8-23](#Chapter08.html#list_8_23).


    ***Listing 8-23.** Using the <g:remoteField> Tag*


    `<div id="searchBox">`

    `    <h1>Instant Search</h1>`

    `    <g:textField id="searchField" name="searchField"/>`

    `    <div id="searchResults" name="musicPanel"></div>`

    `</div>`

    `<r:script>`

    `$("#searchField").keyup(function() {`

    `    $("#searchResults").load("${createLink(action: ''search'')}?q="+this.value);`

    `});`

    `</r:script>`


    Here, you have set up a text field that has a `keyup` event listener associated
    with it; it sends a request to the `search` action of the `StoreController`.


    ![Image](images/9781430243779_Fig08-04.jpg)


    ***Figure 8-4.** The gTunes instance search box*


    If you refresh the page and start typing, you’ll see that the field is already
    sending remote requests, although you’re getting 404 errors in the page rather
    than anything useful. At this point, it is worth considering how to implement
    a search. You could, of course, use Hibernate queries, but Hibernate is not really
    designed to be used as a search engine, and designing your own search query language
    would be a pain.


    The Grails plug-in system comes to the rescue once again! One of the most popular
    plug-ins currently available for Grails is the Searchable plug-in, which builds
    on Compass ([`http://www.compass-project.org/`](http://www.compass-project.org/))
    and Lucene ([`http://lucene.apache.org/`](http://lucene.apache.org/)).


    ![Image](images/square.jpg) **Note** This example will demonstrate the most basic
    capabilities of the searchable plug-in. The full documentation is available at
    [`http://grails.org/plugin/searchable`](http://grails.org/plugin/searchable).


    As usual, installing Searchable is a trivial matter. Add the dependency to `BuildConfig.groovy`:


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`


    `   ...`


    `    plugins {`

    `        runtime ":searchable:0.6.4"`

    `        ...`

    `    }`

    `}`


    The Searchable plug-in integrates with Grails by providing the ability to expose
    Grails domain classes as searchable entities. At a simple level, it is possible
    to add search capabilities by adding the following line to the domain class you
    want to search:


    `static searchable = true`


    However, it is typically the case that you want to search only a subset of the
    properties of the domain class. This is, of course, perfectly possible with Searchable,
    and in fact it defines an entire DSL for mapping between your classes and the
    search index (a topic beyond the scope of this book).


    In this case, you’ll want to search on an album or song’s `genre` and `title`
    and on an artist’s name. [Listing 8-24](#Chapter08.html#list_8_24) shows how to
    enable these searches using Searchable.


    ***Listing 8-24.** Enabling Search on the gTunes Domain*


    `class Song {`

    **`static searchable = [only: [''genre'', ''title'']]`**

    `    ...`

    `}`

    `class Album {`

    **`    static searchable = [only: [''genre'', ''title'']]`**

    `    ...`

    `}`

    `class Artist {`

    **`    static searchable = [only: [''name'']]`**

    `    ...`

    `}`


    Simple enough. Next, let’s implement the `search` action of the `StoreController`.
    Like GORM, Searchable provides a bunch of new methods on domain classes that support
    searching, including the following:


    > *   `search`: returns a search result object containing a subset of objects
    matching the query

    > *   `searchTop`: returns the first result object matching the query

    > *   `searchEvery`: returns all result objects matching the query

    > *   `countHits`: returns the number of hits for a query

    > *   `termFreqs`: returns term frequencies for the terms in the index (advanced)


    For full data on what each method does and how it behaves, refer to the searchable
    documentation mentioned above. For your needs, you’re going to use the `search`
    method to formulate the search results. [Listing 8-25](#Chapter08.html#list_8_25)
    shows the implementation of the `search` action of the `StoreController` using
    Searchable APIs.


    ***Listing 8-25.** Using Searchable to Enable Search*


    `    def search(String q) {`

    `        def searchResults = [:]`

    `        if(q) {`

    `            searchResults.artistResults = trySearch { Artist.search("*${q}*",
    [max: 10]) }`

    `            searchResults.albumResults = trySearch { Album.search("*${q}*", [max:
    10]) }`

    `            searchResults.songResults = trySearch { Song.search("*${q}*", [max:
    10]) }`

    `        }`

    `        render template: ''searchResults'', model: searchResults`

    `    }`


    `    private trySearch(Closure callable) {`

    `        try {`

    `            return callable()`

    `        } catch (Exception e) {`

    `            log.debug "Search Error: ${e.message}", e`

    `            return []`

    `        }`

    `    }`


    The code is pretty simple. It obtains the `q` parameter representing the query
    and, if it isn’t blank, builds a model that contains search results for albums,
    artists, and songs. One interesting aspect of this code is the `trySearch` method,
    which demonstrates a compelling use of Groovy closures to deal with exceptions.
    Since an exception will likely be the result of an error in the search syntax,
    it is preferable to log that error and return an empty result than throw the error
    back to the user.


    Once the search results have been formulated within a `searchResults` variable,
    the code renders a `_searchResults.gsp` template, passing the `searchResults`
    as the model. As [Listing 8-26](#Chapter08.html#list_8_26) demonstrates, the `grails-app/views/store/_searchResults.gsp`
    template is trivial; it simply reuses such existing templates as `_albumList.gsp`
    and `_artistList.gsp` to display results.


    ***Listing 8-26.** The _searchResults.gsp Template*


    `<div id="searchResults" class="searchResults">`

    `  <g:if test="${albumResults?.results}">`

    `    <div id="albumResults" class="resultsPane">`

    `      <h2>Album Search Results</h2>`

    `      <g:render template="/album/albumList"`

    `                model="[albums:albumResults.results]">`

    `      </g:render>`

    `    </div>`

    `  </g:if>`

    `  <g:if test="${artistResults?.results}">`

    `    <div id="artistResults" class="resultsPane">`

    `      <h2>Artist Search Results</h2>`

    `      <g:render template="/artist/artistList"`

    `                model="[artists:artistResults.results]">`

    `      </g:render>`

    `    </div>`

    `  </g:if>`

    `  <g:if test="${songResults?.results}">`

    `    <div id="songResults" class="resultsPane">`

    `      <h2>Song Search Results</h2>`

    `      <g:render template="/song/songList"`

    `                model="[songs:songResults.results]">`

    `      </g:render>`

    `    </div>`

    `  </g:if>`

    `</div>`'
  trans: '

    ### 支持 Ajax 的表单字段


    上一节的内容相当精彩，不是吗？不过 Ajax 的学习还没结束。在本节中，你将学习如何在文本输入框等表单字段上启用 Ajax。


    这在实现自动补全或类似 Mac OS X 中 Spotlight 的即时搜索功能时非常有用。事实上，搜索正是本节要实现的目标。当然，能够点击音乐库的最新添加内容固然不错，但
    gTunes 用户能够搜索歌曲和专辑的完整目录也同样至关重要。


    幸运的是，jQuery 可以用来帮助实现搜索功能。首先，打开 `grails-app/views/store/shop.gsp` 视图。在这个文件中，你需要定义一个文本字段来接收搜索输入，并编写一些
    jQuery 代码，通过调用 `search` 操作来响应输入，如清单 8-23 所示。


    ***清单 8-23.** 使用 <g:remoteField> 标签*


    `<div id="searchBox">`

    `    <h1>即时搜索</h1>`

    `    <g:textField id="searchField" name="searchField"/>`

    `    <div id="searchResults" name="musicPanel"></div>`

    `</div>`

    `<r:script>`

    `$("#searchField").keyup(function() {`

    `    $("#searchResults").load("${createLink(action: ''search'')}?q="+this.value);`

    `});`

    `</r:script>`


    这里，你设置了一个文本字段，并为其关联了一个 `keyup` 事件监听器；它会向 `StoreController` 的 `search` 操作发送一个请求。


    ![图片](img/9781430243779_Fig08-04.jpg)


    ***图 8-4.** gTunes 实例搜索框*


    如果你刷新页面并开始输入，你会看到该字段已经在发送远程请求，尽管页面上显示的是 404 错误，而不是任何有用的内容。此时，值得考虑如何实现搜索。当然，你可以使用
    Hibernate 查询，但 Hibernate 并非为用作搜索引擎而设计，而且设计自己的搜索查询语言会很麻烦。


    Grails 插件系统再次挺身而出！目前 Grails 最流行的插件之一是 Searchable 插件，它构建在 Compass ([`http://www.compass-project.org/`](http://www.compass-project.org/))
    和 Lucene ([`http://lucene.apache.org/`](http://lucene.apache.org/)) 之上。


    ![图片](img/square.jpg) **注意** 本示例将演示 Searchable 插件最基本的功能。完整文档可在 [`http://grails.org/plugin/searchable`](http://grails.org/plugin/searchable)
    获取。


    像往常一样，安装 Searchable 是件简单的事。将依赖添加到 `BuildConfig.groovy` 中：


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`


    `   ...`


    `    plugins {`

    `        runtime ":searchable:0.6.4"`

    `        ...`

    `    }`

    `}`


    Searchable 插件通过提供将 Grails 领域类暴露为可搜索实体的能力来与 Grails 集成。在简单层面上，可以通过在要搜索的领域类中添加以下行来添加搜索功能：


    `static searchable = true`


    然而，通常你只想搜索领域类属性的一个子集。当然，使用 Searchable 完全可以做到这一点，事实上，它定义了一整套 DSL 用于在你的类和搜索索引之间进行映射（这个话题超出了本书的范围）。


    在本例中，你将搜索专辑或歌曲的 `genre` 和 `title`，以及艺术家的名字。清单 8-24 展示了如何使用 Searchable 启用这些搜索。


    ***清单 8-24.** 在 gTunes 领域上启用搜索*


    `class Song {`

    **`static searchable = [only: [''genre'', ''title'']]`**

    `    ...`

    `}`

    `class Album {`

    **`    static searchable = [only: [''genre'', ''title'']]`**

    `    ...`

    `}`

    `class Artist {`

    **`    static searchable = [only: [''name'']]`**

    `    ...`

    `}`


    非常简单。接下来，让我们实现 `StoreController` 的 `search` 操作。与 GORM 类似，Searchable 在支持搜索的领域类上提供了一系列新方法，包括以下内容：


    > *   `search`：返回一个搜索结果对象，其中包含与查询匹配的对象子集

    > *   `searchTop`：返回与查询匹配的第一个结果对象

    > *   `searchEvery`：返回与查询匹配的所有结果对象

    > *   `countHits`：返回查询的命中次数

    > *   `termFreqs`：返回索引中词条的词频（高级）


    关于每个方法的功能和行为方式的完整数据，请参考上面提到的 Searchable 文档。根据你的需求，你将使用 `search` 方法来构建搜索结果。清单 8-25
    展示了使用 Searchable API 实现 `StoreController` 的 `search` 操作。


    ***清单 8-25.** 使用 Searchable 启用搜索*


    `    def search(String q) {`

    `        def searchResults = [:]`

    `        if(q) {`

    `            searchResults.artistResults = trySearch { Artist.search("*${q}*",
    [max: 10]) }`

    `            searchResults.albumResults = trySearch { Album.search("*${q}*", [max:
    10]) }`

    `            searchResults.songResults = trySearch { Song.search("*${q}*", [max:
    10]) }`

    `        }`

    `        render template: ''searchResults'', model: searchResults`

    `    }`


    `    private trySearch(Closure callable) {`

    `        try {`

    `            return callable()`

    `        } catch (Exception e) {`

    `            log.debug "搜索错误: ${e.message}", e`

    `            return []`

    `        }`

    `    }`


    这段代码非常简单。它获取代表查询的 `q` 参数，如果该参数不为空，则构建一个包含专辑、艺术家和歌曲搜索结果的模型。这段代码的一个有趣之处在于 `trySearch`
    方法，它展示了 Groovy 闭包在处理异常方面的一个引人注目的用途。由于异常很可能是搜索语法错误的结果，因此记录该错误并返回空结果比将错误抛回给用户更可取。


    一旦在 `searchResults` 变量中构建好搜索结果，代码就会渲染一个 `_searchResults.gsp` 模板，并将 `searchResults`
    作为模型传递。如清单 8-26 所示，`grails-app/views/store/_searchResults.gsp` 模板很简单；它只是重用诸如 `_albumList.gsp`
    和 `_artistList.gsp` 之类的现有模板来显示结果。


    ***清单 8-26.** _searchResults.gsp 模板*


    `<div id="searchResults" class="searchResults">`

    `  <g:if test="${albumResults?.results}">`

    `    <div id="albumResults" class="resultsPane">`

    `      <h2>专辑搜索结果</h2>`

    `      <g:render template="/album/albumList"`

    `                model="[albums:albumResults.results]">`

    `      </g:render>`

    `    </div>`

    `  </g:if>`

    `  <g:if test="${artistResults?.results}">`

    `    <div id="artistResults" class="resultsPane">`

    `      <h2>艺术家搜索结果</h2>`

    `      <g:render template="/artist/artistList"`

    `                model="[artists:artistResults.results]">`

    `      </g:render>`

    `    </div>`

    `  </g:if>`

    `  <g:if test="${songResults?.results}">`

    `    <div id="songResults" class="resultsPane">`

    `      <h2>歌曲搜索结果</h2>`

    `      <g:render template="/song/songList"`

    `                model="[songs:songResults.results]">`

    `      </g:render>`

    `    </div>`

    `  </g:if>`

    `</div>`

