    `AlbumArtService` 的类，位于 `grails-app/services/` 目录下。


    毫不奇怪，有一个 Grails 目标可以让你方便地创建服务。基于刚才提到的内容，要创建 `AlbumArtService`，你可以执行 `create-service`
    目标，它会提示你输入服务的名称，如清单 10-1 所示。


