  trans: '

    ### 查询


    几乎所有非平凡的应用都需要查询持久化数据。由于底层存储介质通常选择数据库，历史上实现这一目标的典型方式一直是使用 SQL。关系型数据库系统及其表和列，与 Java
    对象存在显著差异，以至于抽象数据访问长期以来一直是许多 ORM 供应商的难题。


    Hibernate 为查询存储在数据库中的对象提供了足够优雅的 Java API，但 GORM 通过完全抽象大部分数据访问逻辑，将这一能力提升到了新的水平。不要指望在你的代码库中看到大量对
    `org.hibernate` 包的依赖，因为 GORM 巧妙地抽象了与 Hibernate 交互的细节。在接下来的几节中，我们将介绍使用 GORM 进行查询的不同方式，从动态查找器到
    GORM 条件查询。


    请注意，虽然关系型数据库系统是 Grails 应用中最常见的数据库类型，但许多所谓的 NoSQL 数据库也越来越受欢迎，而 GORM 对处理其中许多数据库提供了出色的支持。MongoDB
    是其中较为流行的一种。有关将 GORM 与 MongoDB 结合使用的更多信息，请参阅 [`http://grails.org/plugin/mongodb`](http://grails.org/plugin/mongodb)。


    #### 动态查找器


    动态查找器是 GORM 最强大的概念之一；与前面提到的 `listOrderBy*` 方法一样，它们使用类的属性名来执行查询。然而，它们比这更灵活，因为它们允许使用诸如
    `And`、`Or` 和 `Not` 之类的逻辑查询来形成所谓的方法表达式。对于任何给定的类，可能有数百种组合，但同样，如果你知道约定，它们就相当容易记住。让我们先看一个
    `findBy*` 方法的示例（参见 图 9-1），该方法为指定的方法表达式定位一个唯一的实例。


    ![图片](img/9781430243779_Fig09-01.jpg)


    ***图 9-1.** 基本动态查找器语法*


    该图使用 `title` 和 `genre` 属性来查找一个 `Album` 实例。中间有一个逻辑 `And` 表达式，以确保查询中两个值都需要相等。这可以替换为逻辑
    `Or`，以查找一个 `title` 为 `Beck` 或 `genre` 为 `Alternative` 的 `Album`。


    然而，我们只是浅尝了动态查找器和方法表达式的可能性。动态查找器支持多种表达式，允许进行 `GreaterThan`、`LessThan`、`Like` 和
    `Between` 查询，仅举几例，只需在属性名末尾附加一个额外的表达式即可。清单 9-10 展示了其中一些表达式的实际应用。


    ***清单 9-10.** 动态查找器实战*


    `// 检索标题包含 ''Shake'' 的专辑`

    `def album = Album.findByTitleLike(''%Shake%'')`


    `// 获取过去 10 天内创建的专辑`

    `def today = new Date()`

    `def last10Days = Album.findByDateCreatedBetween(today-10,today)`


    `// 第一个不是 ''Rock'' 的专辑`

    `def somethingElse = Album.findByGenreNotEqual(''Rock'')`


    表 9-1 说明了所有可以附加的可能表达式、它们期望的参数数量以及每个表达式的实战示例。


    ![图片](img/tab_9_1.jpg)


    `findBy*` 方法有两个同类方法，它们接受你已经见过的相同方法表达式。第一个是 `findAllBy*`，它检索所有匹配该方法表达式的实例，并以 `java.util.List`
    形式返回。最后是 `countBy*` 方法，它返回由该方法表达式找到的实例总数，以整数形式返回。值得打开 Grails 控制台（在命令窗口中输入 `grails
    console`），尝试这些方法，体验不同的组合，并发现它们使用起来有多么简单。


    你会发现 GORM 的动态查找器几乎消除了对数据访问对象（DAO）层的需求，而这一层在 Java 应用中通常是必需的。还记得那些吗？不记得了？好吧，过程大致如下：


    > 1.  为数据访问逻辑定义一个接口。其签名将与你目前看到的动态查找器方法惊人地相似。

    > 2.  使用 Java 类实现该接口。

    > 3.  使用 Spring（或你选择的 IoC 容器）来注入依赖项，例如数据源或 Hibernate `Session`。


    仔细想想，数据访问逻辑是极其重复的，并且严重违反了 Grails 所基于的 DRY 原则。幸运的是，有了 GORM 及其动态查找器，你可以忘记 DAO。


    在下一节中，你将探索 Grails 如何通过简洁的构建器语法使条件查询更易于使用。

    '
- fmt: "#### Criteria Queries\n\nPossibly one of the most powerful mechanisms for\
    \ querying utilizes criteria. Criteria use a builder syntax for creating queries\
    \ using Groovy’s builder support. A builder in Groovy is essentially a hierarchy\
    \ of method calls and closures; it is perfect for “building” treelike structures\
    \ such as XML documents or a graphical user interface (GUI). Builders are also\
    \ good candidates for constructing queries, particularly dynamic queries, which\
    \ are often constructed with the horrifically error-prone `StringBuffer`.\n\n\
    The Hibernate Criteria API is meant to reduce the risk of errors by providing\
    \ a programmatic way to construct “criteria” queries. However, Groovy’s expressive\
    \ syntax and powerful metaprogramming support has taken this to a new level of\
    \ conciseness. Let’s start by looking at basic usage patterns of criteria, after\
    \ which we can move on to some more advanced examples.\n\nBefore you can perform\
    \ a criteria query, you need a criteria instance for the class you want to query.\
    \ To facilitate this, GORM provides a `createCriteria` static method on each domain\
    \ class. Once you have acquired the criteria instance, one of four methods can\
    \ be invoked, each of which expects a closure argument:\n\n> *   `get`: locates\
    \ a unique instance for the query\n> *   `list`: returns a list of instances for\
    \ the query\n> *   `scroll`: returns a `ScrollableResults` instance for the query\n\
    > *   `count`: returns the total results as an integer for the query\n\nThe most\
    \ common use case involves the `list()` method on the criteria instance to perform\
    \ the query, as shown in [Listing 9-11](#Chapter09.html#list_9_11).\n\n**Listing\
    \ 9-11.** A Simple Criteria Query\n\n```\ndef c = Album.createCriteria()\ndef\
    \ results = c.list {\n    eq('genre', 'Alternative')\n    between('dateCreated',\
    \ new Date()-30, new Date())\n}\n```\n\nThe previous example lists all the `Album`\
    \ instances with a `genre` of `Alternative` created in the past 30 days. The nested\
    \ method calls within the closure block translate into method calls on Hibernate’s\
    \ `org.hibernate.criterion.Restrictions` class, the API for which is too long\
    \ to list here. Nevertheless, the `eq` and `between` methods shown here are just\
    \ two of many for performing all the typical queries found in query languages\
    \ such as SQL and HQL.\n\nIt is worth taking a look at the API on the Hibernate\
    \ web site ([`http://docs.jboss.org/hibernate/core/3.6/javadocs/org/hibernate/criterion/Restrictions.html`](http://docs.jboss.org/hibernate/core/3.6/javadocs/org/hibernate/criterion/Restrictions.html))\
    \ to see what is available and to get a better understanding of the power that\
    \ is at your fingertips. Of course, you can build queries similar to those in\
    \ [Listing 9-11](#Chapter09.html#list_9_11) with dynamic finder methods. What\
    \ you haven’t really explored is the power of closures and building the query\
    \ up dynamically.\n\nConsider for the moment that a closure is just a block of\
    \ code; it can be assigned to a variable. Also, consider that a closure can reference\
    \ variables within its enclosing scope. Put the two together, and you have a pretty\
    \ powerful mechanism for reusing dynamically constructed queries.\n\nAs an example,\
    \ say you have a map whose keys define the property names to be queried, and the\
    \ values define the value, such as the `params` object provided by Grails controllers.\
    \ A query could easily be built up from this map and assigned to a variable. [Listing\
    \ 9-12](#Chapter09.html#list_9_12) provides an example of this concept in action.\n\
    \n**Listing 9-12.** Dynamic Querying with Criteria\n\n```\n 1 def today = new\
    \ Date()\n 2 def queryMap =   [ genre: 'Alternative', dateCreated: [today-10,today]\
    \  ]\n 3 def query = {\n 4     // go through the query map\n 5     queryMap.each\
    \ { key, value ->\n 6         // if we have a list assume a between query\n 7\
    \         if(value instanceof List) {\n 8             // use the spread operator\
    \ to invoke\n 9             between(key, *value)\n10        }\n11        else\
    \ {\n12            like(key,value)\n13        }\n14    }\n15 }\n16\n17 // create\
    \ a criteria instance\n18 def criteria = Album.createCriteria()\n19\n20 // count\
    \ the results\n21 println( criteria.count(query) )\n22\n23 // reuse again to get\
    \ a unique result\n24 println( criteria.get(query) )\n25\n26 // reuse again to\
    \ list all\n27 criteria.list(query).each { println it }\n28\n29 // use scrollable\
    \ results\n30 def scrollable = criteria.scroll(query)\n31 def next = scrollable.next()\n\
    32 while(next) {\n33     println(scrollable.getString('title'))\n34     next =\
    \ scrollable.next()\n35 }\n```\n\nThat fairly long example includes some fairly\
    \ advanced concepts. To simplify understanding it, we’ve included line numbers,\
    \ and we’ll go through them one at a time. The first two lines in the following\
    \ code define a date instance from the current time and a map using Groovy’s map\
    \ syntax that will dictate which properties you’re going to query. The map’s keys\
    \ are the property names to query, and the values define the value to query by.\n\
    \n```\n1 def today = new Date()\n2 def queryMap =   [ genre: 'Alternative', dateCreated:\
    \ [today-10,today]  ]\n```\n\n![Image](images/square.jpg) **Tip** In [Listing\
    \ 9-12](#Chapter09.html#list_9_12), to calculate the date range to be the past\
    \ ten days, we took a `java.util.Date` instance and subtracted ten from it. This\
    \ is an example of Groovy’s operator overloading feature used to simplify date\
    \ operations.\n\nOn line 3 a closure is assigned to the `query` variable, which\
    \ will be used in conjunction with the criteria. The closure’s closing bracket\
    \ is on line 15, but some important stuff is going on in the body of the closure:\n\
    \n```\n3   def query = {\n       ...\n15 }\n```\n\nFirst, a built-in GDK method\
    \ called `each` is used to loop over each entry in the `Map`. Essentially, the\
    \ method iterates through each element in the map and passes the key and value\
    \ to the passed closure as arguments.\n\n```\n5     queryMap.each { key, value\
    \ ->\n                ...\n14   }\n```\n\nNext up, the familiar `instanceof` operator\
    \ is used to check whether the value passed is a `List`. If the value passed *is*\
    \ a `List`, you can invoke the `between` method to pass the key and the value.\
    \ The value is split into two arguments using Groovy’s `*` spread operator:\n\n\
    ```\n7      if(value instanceof List) {\n8          // use the spread operator\
    \ to invoke\n9          between(key, *value)\n10     }\n11     else {\n12    \
    \     like(key,value)\n13     }\n```\n\nThe `*` spread operator’s job is to split\
    \ apart a `List` or an array and pass the separated values to the target. In this\
    \ case, the `between` method—which actually takes three arguments, not two—is\
    \ correctly called, with the first element of the list being the second argument\
    \ and with the second element being the third argument.\n\nNow let’s start to\
    \ look at how the query, in the form of a closure, works with a criteria instance\
    \ as a reusable code block. As usual, of course, you have to create the criteria\
    \ instance, which is accomplished on line 18:\n\n```\n18 def criteria = Album.createCriteria()\n\
    ```\n\nThe various methods of the criteria instance are then utilized using the\
    \ same closure:\n\n```\n21 println( criteria.count(query) )\n24 println( criteria.get(query)\
    \ )\n27 criteria.list(query).each { println it }\n```\n\nThe first, on line 21,\
    \ counts all the results for the query; the next prints out a unique result (if\
    \ there is one), and the last lists all the results for the query and then iterates\
    \ through them, with the already encountered `each` method printing each one to\
    \ standard out.\n\nOne more usage, on line 30, uses the `scroll` method on criteria.\
    \ This returns an instance of the Hibernate class called `org.hibernate.ScrollableResults`,\
    \ which has a similar interface to a JDBC `java.sql.ResultSet` and shares many\
    \ of the same methods. One major difference, however, is that the columns of results\
    \ are indexed from 0 and not 1, as in JDBC."
  raw: '#### Criteria Queries


    Possibly one of the most powerful mechanisms for querying utilizes criteria. Criteria
    use a builder syntax for creating queries using Groovy’s builder support. A builder
    in Groovy is essentially a hierarchy of method calls and closures; it is perfect
    for “building” treelike structures such as XML documents or a graphical user interface
    (GUI). Builders are also good candidates for constructing queries, particularly
    dynamic queries, which are often constructed with the horrifically error-prone
    `StringBuffer`.


    The Hibernate Criteria API is meant to reduce the risk of errors by providing
    a programmatic way to construct “criteria” queries. However, Groovy’s expressive
    syntax and powerful metaprogramming support has taken this to a new level of conciseness.
    Let’s start by looking at basic usage patterns of criteria, after which we can
    move on to some more advanced examples.


    Before you can perform a criteria query, you need a criteria instance for the
    class you want to query. To facilitate this, GORM provides a `createCriteria`
    static method on each domain class. Once you have acquired the criteria instance,
    one of four methods can be invoked, each of which expects a closure argument:


    > *   `get`: locates a unique instance for the query

    > *   `list`: returns a list of instances for the query

    > *   `scroll`: returns a `ScrollableResults` instance for the query

    > *   `count`: returns the total results as an integer for the query


    The most common use case involves the `list()` method on the criteria instance
    to perform the query, as shown in [Listing 9-11](#Chapter09.html#list_9_11).


    ***Listing 9-11.** A Simple Criteria Query*


    `def c = Album.createCriteria()`

    `def results = c.list {`

    `    eq(''genre'', ''Alternative'')`

    `    between(''dateCreated'', new Date()-30, new Date())`

    `}`


    The previous example lists all the `Album` instances with a `genre` of `Alternative`
    created in the past 30 days. The nested method calls within the closure block
    translate into method calls on Hibernate’s `org.hibernate.criterion.Restrictions`
    class, the API for which is too long to list here. Nevertheless, the `eq` and
    `between` methods shown here are just two of many for performing all the typical
    queries found in query languages such as SQL and HQL.


    It is worth taking a look at the API on the Hibernate web site ([`http://docs.jboss.org/hibernate/core/3.6/javadocs/org/hibernate/criterion/Restrictions.html`](http://docs.jboss.org/hibernate/core/3.6/javadocs/org/hibernate/criterion/Restrictions.html))
    to see what is available and to get a better understanding of the power that is
    at your fingertips. Of course, you can build queries similar to those in [Listing
    9-11](#Chapter09.html#list_9_11) with dynamic finder methods. What you haven’t
    really explored is the power of closures and building the query up dynamically.


    Consider for the moment that a closure is just a block of code; it can be assigned
    to a variable. Also, consider that a closure can reference variables within its
    enclosing scope. Put the two together, and you have a pretty powerful mechanism
    for reusing dynamically constructed queries.


    As an example, say you have a map whose keys define the property names to be queried,
    and the values define the value, such as the `params` object provided by Grails
    controllers. A query could easily be built up from this map and assigned to a
    variable. [Listing 9-12](#Chapter09.html#list_9_12) provides an example of this
    concept in action.


    ***Listing 9-12.** Dynamic Querying with Criteria*


    ` 1 def today = new Date()`

    ` 2 def queryMap =   [ genre: ''Alternative'', dateCreated: [today-10,today]  ]`

    ` 3 def query = {`

    ` 4     // go through the query map`

    ` 5     queryMap.each { key, value ->`

    ` 6         // if we have a list assume a between query`

    ` 7         if(value instanceof List) {`

    ` 8             // use the spread operator to invoke`

    ` 9             between(key, *value)`

    `10        }`

    `11        else {`

    `12            like(key,value)`

    `13        }`

    `14    }`

    `15 }`

    `16`

    `17 // create a criteria instance`

    `18 def criteria = Album.createCriteria()`

    `19`

    `20 // count the results`

    `21 println( criteria.count(query) )`

    `22`

    `23 // reuse again to get a unique result`

    `24 println( criteria.get(query) )`

    `25`

    `26 // reuse again to list all`

    `27 criteria.list(query).each { println it }`

    `28`

    `29 // use scrollable results`

    `30 def scrollable = criteria.scroll(query)`

    `31 def next = scrollable.next()`

    `32 while(next) {`

    `33     println(scrollable.getString(''title''))`

    `34     next = scrollable.next()`

    `35 }`


    That fairly long example includes some fairly advanced concepts. To simplify understanding
    it, we’ve included line numbers, and we’ll go through them one at a time. The
    first two lines in the following code define a date instance from the current
    time and a map using Groovy’s map syntax that will dictate which properties you’re
    going to query. The map’s keys are the property names to query, and the values
    define the value to query by.


    `1 def today = new Date()`

    `2 def queryMap =   [ genre: ''Alternative'', dateCreated: [today-10,today]  ]`


    ![Image](images/square.jpg) **Tip** In [Listing 9-12](#Chapter09.html#list_9_12),
    to calculate the date range to be the past ten days, we took a `java.util.Date`
    instance and subtracted ten from it. This is an example of Groovy’s operator overloading
    feature used to simplify date operations.


    On line 3 a closure is assigned to the `query` variable, which will be used in
    conjunction with the criteria. The closure’s closing bracket is on line 15, but
    some important stuff is going on in the body of the closure:


    `3   def query = {`

    `       ...`

    `15 }`


    First, a built-in GDK method called `each` is used to loop over each entry in
    the `Map`. Essentially, the method iterates through each element in the map and
    passes the key and value to the passed closure as arguments.


    `5     queryMap.each { key, value ->`

    `                ...`

    `14   }`


    Next up, the familiar `instanceof` operator is used to check whether the value
    passed is a `List`. If the value passed *is* a `List`, you can invoke the `between`
    method to pass the key and the value. The value is split into two arguments using
    Groovy’s `*` spread operator:


    `7      if(value instanceof List) {`

    `8          // use the spread operator to invoke`

    `9          between(key, *value)`

    `10     }`

    `11     else {`

    `12         like(key,value)`

    `13     }`


    The `*` spread operator’s job is to split apart a `List` or an array and pass
    the separated values to the target. In this case, the `between` method—which actually
    takes three arguments, not two—is correctly called, with the first element of
    the list being the second argument and with the second element being the third
    argument.


    Now let’s start to look at how the query, in the form of a closure, works with
    a criteria instance as a reusable code block. As usual, of course, you have to
    create the criteria instance, which is accomplished on line 18:


    `18 def criteria = Album.createCriteria()`


    The various methods of the criteria instance are then utilized using the same
    closure:


    `21 println( criteria.count(query) )`

    `24 println( criteria.get(query) )`

    `27 criteria.list(query).each { println it }`


    The first, on line 21, counts all the results for the query; the next prints out
    a unique result (if there is one), and the last lists all the results for the
    query and then iterates through them, with the already encountered each method
    printing each one to standard out.


    One more usage, on line 30, uses the `scroll` method on criteria. This returns
    an instance of the Hibernate class called `org.hibernate.ScrollableResults`, which
    has a similar interface to a JDBC `java.``sql.ResultSet` and shares many of the
    same methods. One major difference, however, is that the columns of results are
    indexed from 0 and not 1, as in JDBC.'
