- fmt: "# Configuring a MySQL Database\n\nBuilding on the knowledge you’ve gained\
    \ in the previous section about configuring an alternative database, you’re now\
    \ going to learn how to set up MySQL with Grails. You’re going to configure Grails\
    \ to use MySQL within the production environment; to achieve this, you need to\
    \ tell Grails how to communicate with MySQL. You’re using JDBC, so this requires\
    \ a suitable driver. You can download drivers from the MySQL web site, [`http://www.mysql.com`](http://www.mysql.com).\n\
    \nIn this book’s examples, we’ll be using version 5.1.6 of MySQL Connector/J.\
    \ To configure the driver, edit the `grails-app/conf/BuildConfig.groovy` file\
    \ shown in [Figure 2-12](#Chapter02.html#fig_2_12).\n\n![Image](images/9781430243779_Fig02-12.jpg)\n\
    \n**Figure 2-12.** `BuildConfig.groovy`\n\nEdit the `BuildConfig.groovy` file\
    \ to include the Connector/J as a declared dependency. Dependency Management will\
    \ be covered in more detail later. For now, include something like this in `BuildConfig.groovy`:\n\
    \n**Listing 2-23.** The Connector/J Dependency\n\n```\ngrails.project.dependency.resolution\
    \ = {\n    …\ndependencies {\n        // specify dependencies here under either\
    \ 'build',\n        // 'compile', 'runtime', 'test' or 'provided' scopes eg.\n\
    \n        runtime 'mysql:mysql-connector-java:5.1.19'\n    }\n}\n```\n\nWith the\
    \ driver in place, the next thing to do is configure the Grails `dataSource` to\
    \ use the settings defined by the driver’s documentation. This is common practice\
    \ with JDBC (and equivalent technologies on other platforms) and essentially requires\
    \ the following information:\n\n- the driver class name\n- the URL of the database\n\
    - the username to log in with\n- the password for the username\n\nCurrently the\
    \ production `dataSource` is configured to use an H2 database that persists to\
    \ a file. [Listing 2-24](#Chapter02.html#list_2_24) shows the production `dataSource`\
    \ configuration.\n\n**Listing 2-24.** The Production Data-Source Configuration\n\
    \n```\n    production {\n        dataSource {\n            dbCreate = \"update\"\
    \n            url = \"jdbc:h2:prodDb;MVCC=TRUE\"\n            pooled = true\n\
    \            properties {\n               maxActive = -1\n               minEvictableIdleTimeMillis=1800000\n\
    \               timeBetweenEvictionRunsMillis=1800000\n               numTestsPerEvictionRun=3\n\
    \               testOnBorrow=true\n               testWhileIdle=true\n       \
    \        testOnReturn=true\n               validationQuery=\"SELECT 1\"\n    \
    \        }\n        }\n    }\n```\n\nNotice that the remaining settings (`username`,\
    \ `password`, `driverClassName`, and so on) are inherited from the global configuration,\
    \ as shown in [Listing 2-20](#Chapter02.html#list_2_20). To configure MySQL correctly,\
    \ you need to override a few of those defaults as well as change the database\
    \ URL. [Listing 2-25](#Chapter02.html#list_2_25) presents an example of a typical\
    \ MySQL setup.\n\n**Listing 2-25.** MySQL Data-Source Configuration\n\n```\n \
    \   production {\n        dataSource {\n            dbCreate = \"update\"\n  \
    \          url = \"jdbc:mysql://localhost/gTunes\"\n            driverClassName\
    \ = \"com.mysql.jdbc.Driver\"\n            username = \"root\"\n            password\
    \ = \"\"\n            pooled = true\n            properties {\n              \
    \ maxActive = -1\n               minEvictableIdleTimeMillis=1800000\n        \
    \       timeBetweenEvictionRunsMillis=1800000\n               numTestsPerEvictionRun=3\n\
    \               testOnBorrow=true\n               testWhileIdle=true\n       \
    \        testOnReturn=true\n               validationQuery=\"SELECT 1\"\n    \
    \        }\n        }\n    }\n```\n\nThis setup assumes a MySQL server is running\
    \ on the local machine, which has been set up with a blank `root` user password.\
    \ Of course, a real production environment might have the database on a different\
    \ machine and almost certainly with a more secure set of permissions. Also, note\
    \ that you must specify the name of the MySQL driver using the `driverClassName`\
    \ setting.\n\n## Configuring a JNDI Data Source\n\nAnother common way to set up\
    \ a production data source in Grails is to use a container-provided Java Naming\
    \ and Directory Interface (JNDI) data source. This kind of setup is typical in\
    \ corporate environments where the configuration of a data source is not up to\
    \ you but to the deployment team or network administrators.\n\nConfiguring a JNDI\
    \ data source in Grails couldn’t be simpler; specifying the JNDI name is the only\
    \ requirement. [Listing 2-26](#Chapter02.html#list_2_26) shows a typical JNDI\
    \ setup.\n\n**Listing 2-26.** JNDI Data-Source Configuration\n\n```\nproduction\
    \ {\n       dataSource {\n           jndiName = \"java:comp/env/jdbc/gTunesDB\"\
    \n       }        \n}\n```\n\nOf course, this assumes that the work has been done\
    \ to configure the deployment environment to supply the JNDI data source correctly.\
    \ Configuring JNDI resources is typically container-specific, and we recommend\
    \ that you review the documentation supplied with your container (such as Apache\
    \ Tomcat) for instructions.\n\n## Supported Databases\n\nBecause Grails leverages\
    \ Hibernate, it supports every database that Hibernate supports. And because Hibernate\
    \ has become a de facto standard, it has been tried and tested against many different\
    \ databases and versions.\n\nAs it stands, the core Hibernate team performs regular\
    \ integration tests against the following database products:\n\n- DB2 9.7\n- Microsoft\
    \ SQL Server 2008\n- MySQL 5.1, 5.5\n- Oracle 11g, 11g RAC\n- PostgreSQL 8.4,\
    \ 9.1\n- Sybase ASE 15.5 (jConnect 6.0)\n\nIn addition, although not included\
    \ in the Hibernate QA team’s testing processes, these database products come with\
    \ community-led support:\n\n- Apache Derby\n- HP NonStop SQL/MX 2.0\n- Firebird\
    \ 1.5 with JayBird 1.01\n- FrontBase\n- Informix\n- Ingres\n- InterBase 6.0.1\n\
    - Mckoi SQL\n- PointBase Embedded 4.3\n- Progress 9\n- Microsoft Access 95, 97,\
    \ 2000, XP, 2002, and 2003\n- Corel Paradox 3.0, 3.5, 4.x, 5.x, and 7.x to 11.x\n\
    - a number of generic file formats including flat text, CSV, TSV, and fixed-length\
    \ and variable-length binary files\n- XBase (any dBASE; Visual dBASE; SIx Driver;\
    \ SoftC; CodeBase; Clipper; FoxBase; FoxPro; Visual Fox Pro 3.0, 5.0, 7.0, 8.0,\
    \ 9.0, and 10.0; xHarbour; Halcyon; Apollo; GoldMine; or Borland Database Engine—compatible\
    \ [BDE-compatible] database)\n- Microsoft Excel 5.0, 95, 97, 98, 2000, 2001, 2002,\
    \ 2003, and 2004\n\nA few, mostly older, database products that don’t support\
    \ JDBC metadata (which allows a database to expose information about itself) require\
    \ you to specify the Hibernate dialect explicitly, using the `dialect` property\
    \ of the data-source definition. You can find available dialects in the `org.hibernate.dialect`\
    \ package. There’ll be more to learn about data-source definitions in future chapters,\
    \ including [Chapter 12](#Chapter12.html). For now, since we have readied our\
    \ application for the production environment, let’s move on to the next step:\
    \ deployment.\n\n## Deploying the Application\n\nWhen you execute a Grails application\
    \ using the `run-app` command, Grails configures the application to be reloaded\
    \ upon changes at runtime, allowing quick iterative development. This configuration\
    \ does, however, affect your application’s performance. The `run-app` command\
    \ is thus best suited for development only. For deployment onto a production system,\
    \ use a packaged Web Application Archive (WAR) file. Doing this follows Java’s\
    \ mature deployment strategy and the separation of roles between developers and\
    \ administrators.\n\nAs a significant added bonus, Grails’s compliance with the\
    \ WAR format means that IT production teams don’t need to learn any new skills.\
    \ The same application servers, hardware, profiling, and monitoring tools that\
    \ are used with today’s Java applications work with Grails, too."
  raw: '#### Configuring a MySQL Database


    Building on the knowledge you’ve gained in the previous section about configuring
    an alternative database, you’re now going to learn how to set up MySQL with Grails.
    You’re going to configure Grails to use MySQL within the production environment;
    to achieve this, you need to tell Grails how to communicate with MySQL. You’re
    using JDBC, so this requires a suitable driver. You can download drivers from
    the MySQL web site, [`http://www.mysql.com`](http://www.mysql.com).


    In this book’s examples, we’ll be using version 5.1.6 of MySQL Connector/J. To
    configure the driver, edit the `grails-app/conf/BuildConfig.groovy` file shown
    in [Figure 2-12](#Chapter02.html#fig_2_12).


    ![Image](images/9781430243779_Fig02-12.jpg)


    ***Figure 2-12.** BuildConfig.groovy*


    Edit the `BuildConfig.groovy` file to include the Connector/J as a declared dependency.
    Dependency Management will be covered in more detail later. For now, include something
    like this in `BuildConfig.groovy`:


    ***Listing 2-23.** The Connector/J Dependency*


    `grails.project.dependency.resolution = {`

    `    …`

    `dependencies {`

    `        // specify dependencies here under either ''build'',`

    `        // ''compile'', ''runtime'', ''test'' or ''provided'' scopes eg.`


    `        runtime ''mysql:mysql-connector-java:5.1.19''`

    `    }`

    `}`


    With the driver in place, the next thing to do is configure the Grails `dataSource`
    to use the settings defined by the driver’s documentation. This is common practice
    with JDBC (and equivalent technologies on other platforms) and essentially requires
    the following information:


    > *   the driver class name

    > *   the URL of the database

    > *   the username to log in with

    > *   the password for the username


    Currently the production `dataSource` is configured to use an H2 database that
    persists to a file. [Listing 2-24](#Chapter02.html#list_2_24) shows the production
    `dataSource` configuration.


    ***Listing 2-24.** The Production Data-Source Configuration*


    `    production {`

    `        dataSource {`

    `            dbCreate = "update"`

    `            url = "jdbc:h2:prodDb;MVCC=TRUE"`

    `            pooled = true`

    `            properties {`

    `               maxActive = -1`

    `               minEvictableIdleTimeMillis=1800000`

    `               timeBetweenEvictionRunsMillis=1800000`

    `               numTestsPerEvictionRun=3`

    `               testOnBorrow=true`

    `               testWhileIdle=true`

    `               testOnReturn=true`

    `               validationQuery="SELECT 1"`

    `            }`

    `        }`

    `    }`


    Notice that the remaining settings (username, password, driverClassName, and so
    on) are inherited from the global configuration, as shown in [Listing 2-20](#Chapter02.html#list_2_20).
    To configure MySQL correctly, you need to override a few of those defaults as
    well as change the database URL. [Listing 2-25](#Chapter02.html#list_2_25) presents
    an example of a typical MySQL setup.


    ***Listing 2-25.** MySQL Data-Source Configuration*


    `    production {`

    `        dataSource {`

    `            dbCreate = "update"`

    `            url = "jdbc:mysql://localhost/gTunes"`

    `            driverClassName = "com.mysql.jdbc.Driver"`

    `            username = "root"`

    `            password = ""`

    `            pooled = true`

    `            properties {`

    `               maxActive = -1`

    `               minEvictableIdleTimeMillis=1800000`

    `               timeBetweenEvictionRunsMillis=1800000`

    `               numTestsPerEvictionRun=3`

    `               testOnBorrow=true`

    `               testWhileIdle=true`

    `               testOnReturn=true`

    `               validationQuery="SELECT 1"`

    `            }`

    `        }`

    `    }`


    This setup assumes a MySQL server is running on the local machine, which has been
    set up with a blank `root` user password. Of course, a real production environment
    might have the database on a different machine and almost certainly with a more
    secure set of permissions. Also, note that you must specify the name of the MySQL
    driver using the `driverClassName` setting.


    #### Configuring a JNDI Data Source


    Another common way to set up a production data source in Grails is to use a container-provided
    Java Naming and Directory Interface (JNDI) data source. This kind of setup is
    typical in corporate environments where the configuration of a data source is
    not up to you but to the deployment team or network administrators.


    Configuring a JNDI data source in Grails couldn’t be simpler; specifying the JNDI
    name is the only requirement. [Listing 2-26](#Chapter02.html#list_2_26) shows
    a typical JNDI setup.


    ***Listing 2-26.** JNDI Data-Source Configuration*


    `production {`

    `       dataSource {`

    `           jndiName = "java:comp/env/jdbc/gTunesDB"`

    `       }        `

    `}`


    Of course, this assumes that the work has been done to configure the deployment
    environment to supply the JNDI data source correctly. Configuring JNDI resources
    is typically container-specific, and we recommend that you review the documentation
    supplied with your container (such as Apache Tomcat) for instructions.


    #### Supported Databases


    Because Grails leverages Hibernate, it supports every database that Hibernate
    supports. And because Hibernate has become a de facto standard, it has been tried
    and tested against many different databases and versions.


    As it stands, the core Hibernate team performs regular integration tests against
    the following database products:


    > *   DB2 9.7

    > *   Microsoft SQL Server 2008

    > *   MySQL 5.1, 5.5

    > *   Oracle 11g, 11g RAC

    > *   PostgreSQL 8.4, 9.1

    > *   Sybase ASE 15.5 (jConnect 6.0)


    In addition, although not included in the Hibernate QA team’s testing processes,
    these database products come with community-led support:


    > *   Apache Derby

    > *   HP NonStop SQL/MX 2.0

    > *   Firebird 1.5 with JayBird 1.01

    > *   FrontBase

    > *   Informix

    > *   Ingres

    > *   InterBase 6.0.1

    > *   Mckoi SQL

    > *   PointBase Embedded 4.3

    > *   Progress 9

    > *   Microsoft Access 95, 97, 2000, XP, 2002, and 2003

    > *   Corel Paradox 3.0, 3.5, 4.x, 5.x, and 7.x to 11.x

    > *   a number of generic file formats including flat text, CSV, TSV, and fixed-length
    and variable-length binary files

    > *   XBase (any dBASE; Visual dBASE; SIx Driver; SoftC; CodeBase; Clipper; FoxBase;
    FoxPro; Visual Fox Pro 3.0, 5.0, 7.0, 8.0, 9.0, and 10.0; xHarbour; Halcyon; Apollo;
    GoldMine; or Borland Database Engine—compatible [BDE-compatible] database)

    > *   Microsoft Excel 5.0, 95, 97, 98, 2000, 2001, 2002, 2003, and 2004


    A few, mostly older, database products that don’t support JDBC metadata (which
    allows a database to expose information about itself) require you to specify the
    Hibernate dialect explicitly, using the `dialect` property of the data-source
    definition. You can find available dialects in the `org.hibernate.dialect` package.
    There’ll be more to learn about data-source definitions in future chapters, including
    [Chapter 12](#Chapter12.html). For now, since we have readied our application
    for the production environment, let’s move on to the next step: deployment.


    ### Deploying the Application


    When you execute a Grails application using the `run-app` command, Grails configures
    the application to be reloaded upon changes at runtime, allowing quick iterative
    development. This configuration does, however, affect your application’s performance.
    The `run-app` command is thus best suited for development only. For deployment
    onto a production system, use a packaged Web Application Archive (WAR) file. Doing
    this follows Java’s mature deployment strategy and the separation of roles between
    developers and administrators.


    As a significant added bonus, Grails’s compliance with the WAR format means that
    IT production teams don’t need to learn any new skills. The same application servers,
    hardware, profiling, and monitoring tools that are used with today’s Java applications
    work with Grails, too.'
  trans: '

    #### 配置 MySQL 数据库


    基于你在上一节中关于配置替代数据库所获得的知识，现在你将学习如何用 Grails 设置 MySQL。你将在生产环境中配置 Grails 使用 MySQL；为此，你需要告诉
    Grails 如何与 MySQL 通信。你使用的是 JDBC，因此需要一个合适的驱动程序。你可以从 MySQL 网站 [`http://www.mysql.com`](http://www.mysql.com)
    下载驱动程序。


    在本书的示例中，我们将使用 MySQL Connector/J 的 5.1.6 版本。要配置驱动程序，请编辑 图 2-12 中所示的 `grails-app/conf/BuildConfig.groovy`
    文件。


    ![Image](img/9781430243779_Fig02-12.jpg)


    ***图 2-12.** BuildConfig.groovy*


    编辑 `BuildConfig.groovy` 文件，将 Connector/J 作为声明的依赖项包含进来。依赖管理将在后面更详细地介绍。现在，请在 `BuildConfig.groovy`
    中包含类似以下内容：


    ***清单 2-23.** Connector/J 依赖项*


    `grails.project.dependency.resolution = {`

    `    …`

    `dependencies {`

    `        // 在此处指定依赖项，范围可以是 ''build''、`

    `        // ''compile''、''runtime''、''test'' 或 ''provided''，例如：`


    `        runtime ''mysql:mysql-connector-java:5.1.19''`

    `    }`

    `}`


    驱动程序就位后，下一步是配置 Grails 的 `dataSource`，使其使用驱动程序文档定义的设置。这是 JDBC（以及其他平台上的等效技术）的常见做法，基本上需要以下信息：


    > *   驱动程序类名

    > *   数据库的 URL

    > *   用于登录的用户名

    > *   该用户名的密码


    目前，生产环境的 `dataSource` 配置为使用持久化到文件的 H2 数据库。清单 2-24 显示了生产环境的 `dataSource` 配置。


    ***清单 2-24.** 生产环境数据源配置*


    `    production {`

    `        dataSource {`

    `            dbCreate = "update"`

    `            url = "jdbc:h2:prodDb;MVCC=TRUE"`

    `            pooled = true`

    `            properties {`

    `               maxActive = -1`

    `               minEvictableIdleTimeMillis=1800000`

    `               timeBetweenEvictionRunsMillis=1800000`

    `               numTestsPerEvictionRun=3`

    `               testOnBorrow=true`

    `               testWhileIdle=true`

    `               testOnReturn=true`

    `               validationQuery="SELECT 1"`

    `            }`

    `        }`

    `    }`


    请注意，其余设置（用户名、密码、driverClassName 等）继承自全局配置，如清单 2-20 所示。要正确配置 MySQL，你需要覆盖其中一些默认值，并更改数据库
    URL。清单 2-25 给出了一个典型 MySQL 设置的示例。


    ***清单 2-25.** MySQL 数据源配置*


    `    production {`

    `        dataSource {`

    `            dbCreate = "update"`

    `            url = "jdbc:mysql://localhost/gTunes"`

    `            driverClassName = "com.mysql.jdbc.Driver"`

    `            username = "root"`

    `            password = ""`

    `            pooled = true`

    `            properties {`

    `               maxActive = -1`

    `               minEvictableIdleTimeMillis=1800000`

    `               timeBetweenEvictionRunsMillis=1800000`

    `               numTestsPerEvictionRun=3`

    `               testOnBorrow=true`

    `               testWhileIdle=true`

    `               testOnReturn=true`

    `               validationQuery="SELECT 1"`

    `            }`

    `        }`

    `    }`


    此设置假设 MySQL 服务器运行在本地机器上，并且已设置了一个空白的 `root` 用户密码。当然，真实的生产环境可能会将数据库放在不同的机器上，并且几乎肯定会使用更安全的权限设置。另外，请注意，你必须使用
    `driverClassName` 设置来指定 MySQL 驱动程序的名称。


    #### 配置 JNDI 数据源


    在 Grails 中设置生产数据源的另一种常见方法是使用容器提供的 Java 命名和目录接口（JNDI）数据源。这种设置在数据源配置不由你负责，而是由部署团队或网络管理员负责的企业环境中很典型。


    在 Grails 中配置 JNDI 数据源再简单不过了；唯一的要求是指定 JNDI 名称。清单 2-26 显示了一个典型的 JNDI 设置。


    ***清单 2-26.** JNDI 数据源配置*


    `production {`

    `       dataSource {`

    `           jndiName = "java:comp/env/jdbc/gTunesDB"`

    `       }        `

    `}`


    当然，这假设已经完成了配置部署环境以正确提供 JNDI 数据源的工作。配置 JNDI 资源通常是特定于容器的，我们建议你查阅容器（例如 Apache Tomcat）附带的文档以获取说明。


    #### 支持的数据库


    由于 Grails 利用了 Hibernate，因此它支持 Hibernate 支持的所有数据库。并且由于 Hibernate 已成为事实上的标准，它已经在许多不同的数据库和版本上进行了尝试和测试。


    目前，Hibernate 核心团队定期对以下数据库产品进行集成测试：


    > *   DB2 9.7

    > *   Microsoft SQL Server 2008

    > *   MySQL 5.1, 5.5

    > *   Oracle 11g, 11g RAC

    > *   PostgreSQL 8.4, 9.1

    > *   Sybase ASE 15.5 (jConnect 6.0)


    此外，尽管未包含在 Hibernate QA 团队的测试流程中，以下数据库产品得到了社区主导的支持：


    > *   Apache Derby

    > *   HP NonStop SQL/MX 2.0

    > *   Firebird 1.5 with JayBird 1.01

    > *   FrontBase

    > *   Informix

    > *   Ingres

    > *   InterBase 6.0.1

    > *   Mckoi SQL

    > *   PointBase Embedded 4.3

    > *   Progress 9

    > *   Microsoft Access 95, 97, 2000, XP, 2002, and 2003

    > *   Corel Paradox 3.0, 3.5, 4.x, 5.x, and 7.x to 11.x

    > *   多种通用文件格式，包括纯文本、CSV、TSV 以及定长和变长二进制文件

    > *   XBase（任何 dBASE；Visual dBASE；SIx Driver；SoftC；CodeBase；Clipper；FoxBase；FoxPro；Visual
    Fox Pro 3.0, 5.0, 7.0, 8.0, 9.0, and 10.0；xHarbour；Halcyon；Apollo；GoldMine；或 Borland
    Database Engine 兼容 [BDE-compatible] 数据库）

    > *   Microsoft Excel 5.0, 95, 97, 98, 2000, 2001, 2002, 2003, and 2004


    少数数据库产品（主要是较老的）不支持 JDBC 元数据（它允许数据库暴露自身信息），你需要使用数据源定义的 `dialect` 属性显式指定 Hibernate
    方言。你可以在 `org.hibernate.dialect` 包中找到可用的方言。在未来的章节中，包括第 12 章，你将学到更多关于数据源定义的知识。现在，既然我们已经为生产环境准备好了应用程序，让我们进入下一步：部署。


    ### 部署应用程序


    当你使用 `run-app` 命令执行 Grails 应用程序时，Grails 会将应用程序配置为在运行时根据更改重新加载，从而实现快速的迭代开发。然而，这种配置会影响应用程序的性能。因此，`run-app`
    命令最适合仅用于开发。要部署到生产系统，请使用打包的 Web 应用程序归档（WAR）文件。这样做遵循了 Java 成熟的部署策略以及开发人员和管理员之间的角色分离。


    作为一个重要的额外好处，Grails 对 WAR 格式的兼容性意味着 IT 生产团队无需学习任何新技能。当今 Java 应用程序使用的相同应用服务器、硬件、性能分析和监控工具也同样适用于
    Grails。

    '
- fmt: '#### Deployment with `run-war`


    If you are satisfied with the built-in Tomcat container as a deployment environment,
    you can quickly deploy your application by setting up Grails on your production
    environment and then checking out your Grails application from the version-control
    system you have locally. Once you’ve done this, simply type:


    ```

    Grails> run-war

    ```


    This command packages up Grails as a WAR file and then runs Tomcat using the packaged
    WAR on port 8080. If you wish to change the port, you can follow the instructions
    in the “Step 6: Running the Application” section of [Chapter 1](#Chapter01.html).


    #### Deployment with a WAR File


    The `run-war` command is convenient, but you might want more control over your
    deployment environment, or you might want to deploy onto another container, such
    as Apache Tomcat or BEA WebLogic, instead of Tomcat.


    What you need in these cases is a WAR file. The WAR file is the standardized mechanism
    for deployment in the Java world. Every Java EE–compliant web container supports
    the format. But some older containers might have quirks, so check out the [`http://grails.org/Deployment`](http://grails.org/Deployment)
    page on the wiki for helpful info on container-specific issues.


    To create a WAR archive, use Grails’ `war` command:


    ```

    grails> war | Done creating WAR target/gtunes-0.1.war

    grails>

    ```


    By default, if no environment is specified, Grails assumes use of the production
    environment for a WAR file. However, as with other commands, you can change the
    environment if needed. For example:


    ```

    $ grails> test war

    ```


    Once you’ve run the command, a brand-new WAR file appears in the root of your
    project directory (see [Figure 2-13](#Chapter02.html#fig_2_13)).


    ![Image](images/9781430243779_Fig02-13.jpg)


    ***Figure 2-13.** The gTunes WAR file*


    If the root directory is not a convenient location for the WAR file, you can always
    change it by specifying the target WAR location as the last argument to the `war`
    command:


    ```

    $ grails test war /path/to/deploy/gTunes.war

    ```


    With the WAR file created, you just need to follow your container’s deployment
    instructions (which might be as simple as dropping the file into a particular
    directory), and you’re done. Notice how the WAR file includes a version number?
    Grails features built-in support for application versioning. You’ll learn more
    about versioning and deployment in [Chapter 11](#Chapter11.html).


    ### Summary


    Wow, that was a lot of ground to cover. You generated a simple CRUD interface,
    configured a different data source, and produced a WAR file ready for deployment.
    You learned some of the basics about how controllers work in Grails and previewed
    what is to come with GORM, Grails’s object-relational mapping layer.


    You also played with the Grails support for running different environments and
    configured a MySQL database for production. All of this should have provided a
    solid grounding in the basics of working with Grails. However, so far we’ve only
    touched on concepts such as domain classes, controllers, and views without going
    into much detail. This is about to change, as we plunge head first into the gory
    details of what makes Grails tick.


    Starting with [Chapter 3](#Chapter03.html), we’ll begin the in-depth tour of the
    concepts in Grails. As we do that, we’ll begin to build out the gTunes application
    and transform it from the prototype it is now into a full-fledged, functional
    application.


    ## CHAPTER 3


    ![Image](images/3squ.jpg)


    ## Understanding Domain Classes


    Object-oriented (OO) applications almost always involve a domain model representing
    the business entities that the application deals with. The gTunes application
    will include a number of domain classes, including `Artist`, `Album`, and `Song`.
    Each of these domain classes has properties associated with it. You must map those
    properties to a database in order to persist instances of those classes.


    Developers of object-oriented applications face some difficult problems in mapping
    objects to a relational database. This is not because relational databases are
    especially difficult to work with; the trouble is that you encounter an “impedance
    mismatch”^([1](#Chapter03.html#CHP-3-FN-1)) between the object-oriented domain
    model and a relational database’s table-centric view of data.


    ![Image](images/square.jpg) **Note**  As the great majority of Grails applications
    are built on top of relational databases, this book is going to focus on that
    approach. Note that Grails supports a growing number of datastores, including
    a number of nonrelational datastores, including MongoDB, Redis, and Cassandra.


    Fortunately, Grails does most of the hard work for you. It’s significantly simpler
    to write the domain model for a Grails application than for many other frameworks.
    This chapter will look at the fundamentals of a Grails domain model. [Chapter
    10](#Chapter10.html) will cover more advanced features of the GORM technology.


    ### Persisting Fields to the Database


    By default, all the fields in a domain class are persisted to the database. For
    simple field types such as `Strings` and `Integers`, each field in the class will
    map to a column in the database. Complex properties might require multiple tables
    to persist all the data. The `Song` class from [Chapter 2](#Chapter02.html) contains
    two `String` properties. The table in the database will contain a separate column
    for each of those properties.


    In MySQL, that database table will look something like [Listing 3-1](#Chapter03.html#list_3_1).


    ![Image](images/line.jpg)


    1  Scott W. Ambler, “The Object-Relational Impedance Mismatch,” [`http://www.agiledata.org/essays/impedanceMismatch.html`](http://www.agiledata.org/essays/impedanceMismatch.html),
    2006.


    ***Listing 3-1.** The Song Table*


    ![Image](images/9781430243779_unFig03-01.jpg)


    Notice that the table includes a column for each of the properties in the domain
    class, an `id` column, and a `version` column. The `id` is a unique identifier
    for a row, and Grails uses the `version` column to implement optimistic locking[2](#Chapter03.html#CHP-3-FN-2).


    [Listing 3-1](#Chapter03.html#list_3_1) shows the default mapping for a MySQL
    database. Grails provides a powerful DSL for expressing how a domain model maps
    to the database. Details about the mapping DSL appear later, in the “Customizing
    Your Database Mapping” section.'
