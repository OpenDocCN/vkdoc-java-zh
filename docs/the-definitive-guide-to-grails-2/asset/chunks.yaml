  raw: '### Defining Controllers


    A controller is a class defined under the `grails-app/controllers` directory.
    The class name must end with “Controller” by convention. Controllers do not need
    to extend any special base class or implement any special interfaces.


    [Listing 4-1](#Chapter04.html#list_4_1) shows a typical controller, one residing
    at the location `grails-app/controllers/SampleController.groovy`; it defines an
    action called `index`. The `index` action renders a simple textual response.


    ***Listing 4-1.** The SampleController Class*


    `class SampleController {`


    `  def index() {`

    `    render ''You accessed the Sample controller...''`

    `  }`

    `}`


    With this controller in place, a request to `/sample/index` will result in the
    String “You accessed the Sample controller” being rendered back to the browser.
    You can see that actions, like the `index` action, are defined as methods in a
    controller. A controller can define any number of actions, as shown in [Listing
    4-2](#Chapter04.html#list_4_2).


    ***Listing 4-2.** Defining Multiple Actions*


    `class SampleController {`

    `  def first() {  ...   }`

    `  def second() {  ...   }`

    `  def third() {  ...   }`

    `  def fourth() {  ...   }`

    `}`


    In [Chapter 6](#Chapter06.html), you will learn about the powerful URL-mapping
    support that Grails provides. By default, URLs are mapped to controller actions
    by way of a convention. The first part of the URL represents which controller
    to access, and the second part of the URL represents which action should be executed.
    For example, `/sample/first` will execute the `first` action in the `SampleController`.
    Likewise, `/sample/second` will execute the `second` action in the `SampleController`.


    #### Setting the Default Action


    You don’t necessarily need to specify the action to execute in the URL. If no
    action is specified, Grails will execute the default action in the specified controller.
    You can identify the default action using the following rules (see [Listing 4-3](#Chapter04.html#list_4_3)):


    > *   If the controller defines only one action, it becomes the default action.

    > *   If the controller defines an action called `index`, it becomes the default
    action.

    > *   If the controller defines a property called `defaultAction`, its value is
    the name of the default action.


    ***Listing 4-3.** The Default Action*


    `// Here the ''list'' action is the default as there is only one action defined`

    `class SampleController {`

    `    def list() {}`

    `}`

    `// In this example ''index'' is the default by convention`

    `class SampleController {`

    `    def list() {}`

    `    def index() {}`

    `}`


    `// Here ''list'' is explicitly set as the default`

    `class SampleController {`

    `    static defaultAction = ''list''`

    `    def list() {}`

    `    def index() {}`

    `}`


    #### Logging


    Logging, an important aspect of any application, allows the application to report
    textual information about what is going on inside it. Various logging solutions
    exist on the Java platform, including third-party logging solutions as well as
    the standard logging API introduced in Java 1.4\. You face a certain amount of
    complexity in configuring logging for an application.


    Often, application developers will avoid this complexity by avoiding logging altogether.
    They opt instead for simply printing messages using `System.out.println` and `System.err.println`.
    For a variety of reasons, this is really not a good idea.


    Fortunately, Grails tackles much of the complexity involved with setting up logging.
    A `log` property, which is injected into every controller, is an instance of `org.apache.commons.logging.Log`.
    You don’t need to write any code to initialize the `log` property because the
    framework handles that. [Listing 4-4](#Chapter04.html#list_4_4) documents the
    `org.apache.commons.logging.Log` API.


    ***Listing 4-4.** The org.apache.commons.logging.Log Interface*


    `public interface Log {`

    `public void debug(Object msg);`

    `public void debug(Object msg, Throwable t);`

    `public void error(Object msg);`

    `public void error(Object msg, Throwable t);`

    `public void fatal(Object msg);`

    `public void fatal(Object msg, Throwable t);`

    `public void info(Object msg);`

    `public void info(Object msg, Throwable t);`

    `public void trace(Object msg);`

    `public void trace(Object msg, Throwable t);`

    `public void warn(Object msg);`

    `public void warn(Object msg, Throwable t);`

    `public boolean isDebugEnabled();`

    `public boolean isErrorEnabled();`

    `public boolean isFatalEnabled();`

    `public boolean isInfoEnabled();`

    `public boolean isTraceEnabled();`

    `public boolean isWarnEnabled();`

    `}`


    The `log` property that is injected into a controller can be used from any controller
    action or any method within the controller (see [Listing 4-5](#Chapter04.html#list_4_5)).


    ***Listing 4-5.** Using the log Property*


    `class SampleController {`

    `  def index() {`

    `    log.info(''In the index action...'')`

    `    // ...`

    `  }`

    `}`


    #### Logging Exceptions


    Groovy translates all exceptions into runtime exceptions, so Groovy code is never
    forced to catch an exception. This differs from what Java developers are used
    to. In any case, even though an application is never forced to catch an exception,
    it makes sense to catch an exception in a lot of scenarios. In Groovy, the details
    for how to catch an exception are exactly the same as in Java. There is no special
    Groovy syntax for handling exceptions.


    When an exception is caught in a controller, you’ll almost always want to log
    details about the exception using the `log` property (see [Listing 4-6](#Chapter04.html#list_4_6)).


    ***Listing 4-6.** Logging an Exception*


    `class SampleController {`

    `  def index() {`

    `    try {`

    `      // do something that might throw an exception`

    `    } catch (Exception e) {`

    `      log.error (''some message goes here'', e)`

    `    }`

    `  }`

    `}`


    #### Accessing Request Attributes


    Java servlet developers will recognize components such as `HttpServletRequest`,
    `HttpServletResponse`, `HttpSession`, `ServletContext`, and others. These are
    all standard players in the servlet space. The Grails framework differs greatly
    from your standard servlet-based web frameworks, of course. However, Grails is
    built on top of those same servlet APIs. [Table 4-1](#Chapter04.html#tab_4_1)
    contains a list of standard attributes that are automatically injected into Grails
    controllers.


    ![Image](images/9781430243779_Tab04-01.jpg)


    ![Image](images/9781430243779_Tab04-01a.jpg)


    Many of the previously listed attributes are standard servlet API objects, whose
    documentation you can find on Oracle’s Java technology web site, [`http://www.oracle.com/technetwork/java/`](http://www.oracle.com/technetwork/java/).
    It is, however, interesting to observe how working with a Grails controller differs
    from working with these objects.


    A common way to interact with the request, for example, is to retrieve or set
    a request attribute. The session and servlet context also have attributes that
    you can set or retrieve. Grails unifies these by overriding the dot and subscript
    operators. [Table 4-2](#Chapter04.html#tab_4_2) shows the difference between accessing
    request, session, and servlet context attributes in regular Java servlets and
    accessing them in Grails controllers.


    ![Image](images/9781430243779_Tab04-02.jpg)


    Of course, if you are accustomed to writing code like that in the left column
    of the table, you can continue to do so. Grails just makes it a little bit easier.'
