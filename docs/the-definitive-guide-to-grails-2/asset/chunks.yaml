- fmt: "#### Text Editors\n\nThere are a number of powerful text editors out there\
    \ that provide varying levels of support for working with Grails projects. Two\
    \ of the more popular editors are TextMate and Sublime Text. For information on\
    \ using TextMate for editing Grails projects, see [`https://github.com/textmate/groovy-grails.tmbundle`](https://github.com/textmate/groovy-grails.tmbundle).\
    \ For information on using Sublime Text for editing Grails projects, see [`https://github.com/osoco/sublimetext-grails`](https://github.com/osoco/sublimetext-grails).\n\
    \n##### Remote Debugging with an IDE\n\nYou can remote debug Grails by running\
    \ the `grails-debug` executable as a substitute for the `grails` executable.\n\
    \n![Image](images/square.jpg) **Tip** The `grails-debug` executable simply sets\
    \ up the necessary Java options to start Grails with a remote debugger. You could\
    \ configure these yourself by setting the `JAVA_OPTS` environment variable.\n\n\
    The `grails-debug` executable will start Grails with a debug JVM. The debugger\
    \ is listening on port 5005, which is the default debugger port for Java. You\
    \ can then create a remote debug configuration in your IDE. For example, to do\
    \ this with IntelliJ IDEA, go to the “Debug” menu and click “Edit Configurations”.\
    \ Then click the plus icon (+) at the top left and choose “Remote,” which will\
    \ give you a remote debug configuration, as shown in [Figure 11-13](#Chapter11.html#fig_11_13).\n\
    \n![Image](images/9781430243779_Fig11-13.jpg)\n\n**Figure 11-13.** An IntelliJ\
    \ remote debug configuration\n\nYou can leave the remaining settings as they are\
    \ and just click the OK button in the bottom-right corner. With that done, just\
    \ select the remote debug configuration and hit the Debug button; IntelliJ will\
    \ connect to the Grails remote server. You can then set breakpoints in your applications\
    \ sources, and IntelliJ will stop at those points.\n\nIf you’re willing to be\
    \ adventurous, you can add the Grails source code to your path and step into the\
    \ internals of Grails—but we’ll leave that decision up to you! With IDEs out of\
    \ the way, we’re now going to talk about how you integrate Grails into the server\
    \ environment. From mail servers to containers, there is still much to cover,\
    \ so don’t go away.\n\n![Image](images/square.jpg) **Note** As of Grails 2.1,\
    \ the Grails command line script supports a `–debug` argument, so instead of `grails-debug`,\
    \ you can use `grails–debug`. In a future version of Grails, the `grails-debug.sh`\
    \ and `grails-debug.bat` scripts will likely be removed.\n\n### Integration with\
    \ E-mail Servers\n\nIt has become a frequent use case for web applications to\
    \ send e mails. The Simple Mail Transfer Protocol (SMTP) is the enabler for mail\
    \ delivery and has become pretty much the de facto standard for outgoing e mail.\
    \ A number of different server products support SMTP, from Microsoft Exchange\
    \ Server to the open source Sendmail agent, which is available on most Unix systems.\n\
    \n![Image](images/square.jpg) **Note** The configuration of an SMTP server is\
    \ beyond the scope of this book; we will show you how to set up Grails to talk\
    \ to a successfully configured mail server.\n\nYou can integrate mail with Grails\
    \ in several ways. Since Grails is built on Spring, you could use the `org.springframework.mail`\
    \ abstraction, which provides a nicer API than JavaMail ([`http://java.sun.com/products/javamail/`](http://java.sun.com/products/javamail/)).\
    \ However, that involves a lot of manual configuration, so what we’ll be demonstrating\
    \ is how to integrate the Grails Mail plug-in with your application so as to enable\
    \ the sending of confirmation e mails whenever a user registers on gTunes or makes\
    \ a purchase.\n\nTo start, you need to update `BuildConfig.groovy` to express\
    \ a dependency on the mail plugin.\n\n```\ngrails.project.dependency.resolution\
    \ = {\n    ...\n    plugins {\n        compile \":mail:1.0\"\n        ...\n  \
    \  }\n}\n```\n\nThe Mail plug-in already comes with JavaMail and its dependencies,\
    \ so you don’t need to install any more libraries or dependencies. It uses sensible\
    \ defaults and automatically assumes your mail server is running locally on port\
    \ 25. However, if this is not the case, you can configure it by using some settings\
    \ in `grails-app/conf/Config.groovy`. For example, [Listing 11-35](#Chapter11.html#list_11_35)\
    \ shows how you could configure the mail server to send e mails using a Gmail\
    \ account instead.\n\n**Listing 11-35.** Configuring the Mail Plug-in for Gmail\n\
    \n```\ngrails {\n    mail {\n        host = 'smtp.gmail.com'\n        port = 465\n\
    \        username = 'youraccount@gmail.com'\n        password = 'yourpassword'\n\
    \        props = ['mail.smtp.auth': 'true',\n                 'mail.smtp.socketFactory.port':\
    \ '465',\n                 'mail.smtp.socketFactory.class': 'javax.net.ssl.SSLSocketFactory',\n\
    \                 'mail.smtp.socketFactory.fallback': 'false']\n    }\n}\n```\n\
    \nNotice in [Listing 11-35](#Chapter11.html#list_11_35) the use of the `props`\
    \ setting, which allows you to configure the properties of the JavaMail framework.\
    \ However, for our purposes, we’ll assume that a mail server running locally is\
    \ good enough. Returning to the Mail plug-in itself, the main addition is a new\
    \ method, `sendMail`, added to all controllers. [Listing 11-36](#Chapter11.html#list_11_36)\
    \ shows an example of its use at its simplest.\n\n**Listing 11-36.** Sending a\
    \ Simple Mail Message with `sendMail`\n\n```\nsendMail {\n    to \"john@g2one.com\"\
    \n    subject \"Hello John\"\n    body \"How are you?\"\n}\n```\n\nIf you need\
    \ to access the `sendMail` method from other places in your application, such\
    \ as tag libraries and services, the Mail plug-in provides a `mailService` bean\
    \ that is available via dependency injection. Simply define a property called\
    \ `mailService` in your tag library or service as follows:\n\n```\ndef mailService\n\
    ```\n\nThe `sendMail` method can then be called using the `mailService` instance;\
    \ for example:\n\n```\nmailService.sendMail {\n    ...\n}\n```\n\nIn the example\
    \ in [Listing 11-30](#Chapter11.html#list_11_30), a simple string is used for\
    \ the body of the e mail. However, it is equally possible to use a GSP view to\
    \ define the body. That is something you’ll be doing to send registration confirmation\
    \ e mails to users of the gTunes application. Before you can do so, however, you\
    \ need to modify the `User` domain class in order to add a new `email` property.\
    \ [Listing 11-37](#Chapter11.html#list_11_37) shows the change to the `User` class.\n\
    \n**Listing 11-37.** Adding an `email` Property to the `User` Class"
  raw: '#### Text Editors


    There are a number of powerful text editors out there that provide varying levels
    of support for working with Grails projects. Two of the more popular editors are
    TextMate and Sublime Text. For information on using TextMate for editing Grails
    projects, see [`https://github.com/textmate/groovy-grails.tmbundle`](https://github.com/textmate/groovy-grails.tmbundle).
    For information on using Sublime Text for editing Grails projects, see [`https://github.com/osoco/sublimetext-grails`](https://github.com/osoco/sublimetext-grails).


    ##### Remote Debugging with an IDE


    You can remote debug Grails by running the `grails-debug` executable as a substitute
    for the `grails executable`.


    ![Image](images/square.jpg) **Tip** The `grails-debug` executable simply sets
    up the necessary Java options to start Grails with a remote debugger. You could
    configure these yourself by setting the `JAVA_OPTS` environment variable.


    The `grails-debug` executable will start Grails with a debug JVM. The debugger
    is listening on port 5005, which is the default debugger port for Java. You can
    then create a remote debug configuration in your IDE. For example, to do this
    with IntelliJ IDEA, go to the “Debug” menu and click “Edit Configurations”. Then
    click the plus icon (+) at the top left and choose “Remote,” which will give you
    a remote debug configuration, as shown in [Figure 11-13](#Chapter11.html#fig_11_13).


    ![Image](images/9781430243779_Fig11-13.jpg)


    ***Figure 11-13.** An IntelliJ remote debug configuration*


    You can leave the remaining settings as they are and just click the OK button
    in the bottom-right corner. With that done, just select the remote debug configuration
    and hit the Debug button; IntelliJ will connect to the Grails remote server. You
    can then set breakpoints in your applications sources, and IntelliJ will stop
    at those points.


    If you’re willing to be adventurous, you can add the Grails source code to your
    path and step into the internals of Grails—but we’ll leave that decision up to
    you! With IDEs out of the way, we’re now going to talk about how you integrate
    Grails into the server environment. From mail servers to containers, there is
    still much to cover, so don’t go away.


    ![Image](images/square.jpg) **Note** As of Grails 2.1, the Grails command line
    script supports a `–debug` argument, so instead of `grails-debug`, you can use
    `grails–debug`. In a future version of Grails, the `grails-debug.sh` and `grails-debug.bat`
    scripts will likely be removed.


    ### Integration with E-mail Servers


    It has become a frequent use case for web applications to send e mails. The Simple
    Mail Transfer Protocol (SMTP) is the enabler for mail delivery and has become
    pretty much the de facto standard for outgoing e mail. A number of different server
    products support SMTP, from Microsoft Exchange Server to the open source Sendmail
    agent, which is available on most Unix systems.


    ![Image](images/square.jpg) **Note** The configuration of an SMTP server is beyond
    the scope of this book; we will show you how to set up Grails to talk to a successfully
    configured mail server.


    You can integrate mail with Grails in several ways. Since Grails is built on Spring,
    you could use the `org.springframework.mail` abstraction, which provides a nicer
    API than JavaMail ([`http://java.sun.com/products/javamail/`](http://java.sun.com/products/javamail/)).
    However, that involves a lot of manual configuration, so what we’ll be demonstrating
    is how to integrate the Grails Mail plug-in with your application so as to enable
    the sending of confirmation e mails whenever a user registers on gTunes or makes
    a purchase.


    To start, you need to update `BuildConfig.groovy` to express a dependency on the
    mail plugin.


    `grails.project.dependency.resolution = {`

    `    ...`

    `    plugins {`

    `        compile ":mail:1.0"`

    `        ...`

    `    }`

    `}`


    The Mail plug-in already comes with JavaMail and its dependencies, so you don’t
    need to install any more libraries or dependencies. It uses sensible defaults
    and automatically assumes your mail server is running locally on port 25\. However,
    if this is not the case, you can configure it by using some settings in `grails-app/conf/Config.groovy`.
    For example, [Listing 11-35](#Chapter11.html#list_11_35) shows how you could configure
    the mail server to send e mails using a Gmail account instead.


    ***Listing 11-35.** Configuring the Mail Plug-in for Gmail*


    `grails {`

    `    mail {`

    `        host = ''smtp.gmail.com''`

    `        port = 465`

    `        username = ''youraccount@gmail.com''`

    `        password = ''yourpassword''`

    `        props = [''mail.smtp.auth'': ''true'',`

    `                 ''mail.smtp.socketFactory.port'': ''465'',`

    `                 ''mail.smtp.socketFactory.class'': ''javax.net.ssl.SSLSocketFactory'',`

    `                 ''mail.smtp.socketFactory.fallback'': ''false'']`

    `    }`

    `}`


    Notice in [Listing 11-35](#Chapter11.html#list_11_35) the use of the `props` setting,
    which allows you to configure the properties of the JavaMail framework. However,
    for our purposes, we’ll assume that a mail server running locally is good enough.
    Returning to the Mail plug-in itself, the main addition is a new method, `sendMail`,
    added to all controllers. [Listing 11-36](#Chapter11.html#list_11_36) shows an
    example of its use at its simplest.


    ***Listing 11-36.** Sending a Simple Mail Message with sendMail*


    `sendMail {`

    `    to "john@g2one.com"`

    `    subject "Hello John"`

    `    body "How are you?"`

    `}`


    If you need to access the `sendMail` method from other places in your application,
    such as tag libraries and services, the Mail plug-in provides a mailService bean
    that is available via dependency injection. Simply define a property called `mailService`
    in your tag library or service as follows:


    `def mailService`


    The `sendMail` method can then be called using the `mailService` instance; for
    example:


    `mailService.sendMail {`

    `    ...`

    `}`


    In the example in [Listing 11-30](#Chapter11.html#list_11_30), a simple string
    is used for the body of the e mail. However, it is equally possible to use a GSP
    view to define the body. That is something you’ll be doing to send registration
    confirmation e mails to users of the gTunes application. Before you can do so,
    however, you need to modify the `User` domain class in order to add a new `email`
    property. [Listing 11-37](#Chapter11.html#list_11_37) shows the change to the
    `User` class.


    ***Listing 11-37.** Adding an email Property to the User Class*'
  trans: '

    #### 文本编辑器


    市面上有许多功能强大的文本编辑器，它们为 Grails 项目提供了不同程度的支持。其中两款较为流行的编辑器是 TextMate 和 Sublime Text。关于如何使用
    TextMate 编辑 Grails 项目，请参阅 [`https://github.com/textmate/groovy-grails.tmbundle`](https://github.com/textmate/groovy-grails.tmbundle)。关于如何使用
    Sublime Text 编辑 Grails 项目，请参阅 [`https://github.com/osoco/sublimetext-grails`](https://github.com/osoco/sublimetext-grails)。


    ##### 使用 IDE 进行远程调试


    你可以通过运行 `grails-debug` 可执行文件来替代 `grails` 可执行文件，从而对 Grails 进行远程调试。


    ![Image](img/square.jpg) **提示** `grails-debug` 可执行文件仅会设置必要的 Java 选项，以便通过远程调试器启动
    Grails。你也可以通过设置 `JAVA_OPTS` 环境变量来手动配置这些选项。


    `grails-debug` 可执行文件将使用调试 JVM 启动 Grails。调试器监听在端口 5005 上，这是 Java 的默认调试器端口。然后，你可以在
    IDE 中创建一个远程调试配置。例如，要在 IntelliJ IDEA 中执行此操作，请转到“调试”菜单并点击“编辑配置”。然后点击左上角的加号图标 (+)，选择“远程”，这将为你提供一个远程调试配置，如
    图 11-13 所示。


    ![Image](img/9781430243779_Fig11-13.jpg)


    ***图 11-13.** IntelliJ 远程调试配置*


    你可以保持其余设置不变，只需点击右下角的“确定”按钮。完成此操作后，选择该远程调试配置并点击“调试”按钮；IntelliJ 将连接到 Grails 远程服务器。然后，你可以在应用程序源代码中设置断点，IntelliJ
    将在这些断点处停止。


    如果你愿意尝试，可以将 Grails 源代码添加到你的路径中，并深入 Grails 内部进行调试——但这由你自己决定！讲完 IDE 后，我们现在要讨论如何将
    Grails 集成到服务器环境中。从邮件服务器到容器，还有很多内容要讲，所以请不要离开。


    ![Image](img/square.jpg) **注意** 从 Grails 2.1 开始，Grails 命令行脚本支持 `–debug` 参数，因此你可以使用
    `grails–debug` 来代替 `grails-debug`。在未来的 Grails 版本中，`grails-debug.sh` 和 `grails-debug.bat`
    脚本很可能会被移除。


    ### 与邮件服务器的集成


    Web 应用程序发送电子邮件已成为一种常见用例。简单邮件传输协议 (SMTP) 是实现邮件投递的推动者，并且已成为出站电子邮件的事实标准。许多不同的服务器产品都支持
    SMTP，从 Microsoft Exchange Server 到大多数 Unix 系统上可用的开源 Sendmail 代理。


    ![Image](img/square.jpg) **注意** SMTP 服务器的配置超出了本书的范围；我们将向你展示如何设置 Grails 以与成功配置的邮件服务器进行通信。


    你可以通过多种方式将邮件与 Grails 集成。由于 Grails 构建在 Spring 之上，你可以使用 `org.springframework.mail`
    抽象，它提供了比 JavaMail ([`http://java.sun.com/products/javamail/`](http://java.sun.com/products/javamail/))
    更友好的 API。然而，这涉及大量手动配置，因此我们将演示如何将 Grails Mail 插件与你的应用程序集成，以便在用户在 gTunes 上注册或进行购买时发送确认电子邮件。


    首先，你需要更新 `BuildConfig.groovy` 以声明对 mail 插件的依赖。


    `grails.project.dependency.resolution = {`

    `    ...`

    `    plugins {`

    `        compile ":mail:1.0"`

    `        ...`

    `    }`

    `}`


    Mail 插件已经包含了 JavaMail 及其依赖项，因此你无需再安装任何其他库或依赖项。它使用合理的默认值，并自动假定你的邮件服务器在本地端口 25 上运行。但是，如果不是这种情况，你可以通过在
    `grails-app/conf/Config.groovy` 中使用一些设置来配置它。例如，清单 11-35 展示了如何配置邮件服务器以使用 Gmail
    帐户发送电子邮件。


    ***清单 11-35.** 为 Gmail 配置 Mail 插件*


    `grails {`

    `    mail {`

    `        host = ''smtp.gmail.com''`

    `        port = 465`

    `        username = ''youraccount@gmail.com''`

    `        password = ''yourpassword''`

    `        props = [''mail.smtp.auth'': ''true'',`

    `                 ''mail.smtp.socketFactory.port'': ''465'',`

    `                 ''mail.smtp.socketFactory.class'': ''javax.net.ssl.SSLSocketFactory'',`

    `                 ''mail.smtp.socketFactory.fallback'': ''false'']`

    `    }`

    `}`


    请注意，在清单 11-35 中使用了 `props` 设置，它允许你配置 JavaMail 框架的属性。不过，就我们的目的而言，我们假设本地运行的邮件服务器已经足够。回到
    Mail 插件本身，其主要新增功能是一个新方法 `sendMail`，该方法已添加到所有控制器中。清单 11-36 展示了其最简单的使用示例。


    ***清单 11-36.** 使用 sendMail 发送简单邮件消息*


    `sendMail {`

    `    to "john@g2one.com"`

    `    subject "Hello John"`

    `    body "How are you?"`

    `}`


    如果你需要从应用程序的其他位置（例如标签库和服务）访问 `sendMail` 方法，Mail 插件提供了一个可通过依赖注入获得的 mailService bean。只需在你的标签库或服务中定义一个名为
    `mailService` 的属性，如下所示：


    `def mailService`


    然后，可以使用 `mailService` 实例调用 `sendMail` 方法；例如：


    `mailService.sendMail {`

    `    ...`

    `}`


    在清单 11-30 的示例中，邮件正文使用了简单的字符串。然而，同样可以使用 GSP 视图来定义正文。这正是你将用于向 gTunes 应用程序的用户发送注册确认电子邮件的方式。不过，在此之前，你需要修改
    `User` 领域类，以添加一个新的 `email` 属性。清单 11-37 显示了对 `User` 类的更改。


    ***清单 11-37.** 向 User 类添加 email 属性*

    '
- fmt: "```groovy\nclass User {\n    String email\n    ...\n    static constraints\
    \ = {\n        ...\n        email email:true, blank:false, unique:true\n    }\n\
    }\n```\n\n如[清单 11-37](#Chapter11.html#list_11_37) 所示，你还对`email`属性应用了一组约束。`email`约束确保它是一个有效的电子邮件地址，`blank`约束确保不允许空白值，`unique`约束确保两个用户不能使用相同的电子邮件地址注册。完成此操作后，你需要修改`grails-app/views/user/register.gsp`视图，为注册表单添加一个`email`属性字段。[清单\
    \ 11-38](#Chapter11.html#list_11_38) 显示了对`register.gsp`文件所做的必要更改。\n\n***清单 11-38.**\
    \ 为 email 属性添加文本字段*\n\n```html\n<g:form action=\"register\" name=\"registerForm\"\
    >\n    ...\n    <div class=\"input clearfix\">\n        <label for=\"email\">Email\
    \ <span class=\"required\">*</span></label>\n        <g:textField required=\"\
    true\" name=\"email\" value=\"${user?.email}\" />\n        <g:hasErrors  bean=\"\
    ${user}\" field=\"email\">\n            <p class=\"error\"><g:fieldError bean=\"\
    ${user}\" field=\"email\" /></p>\n        </g:hasErrors>\n    </div>\n\n    ...\n\
    </g:form>\n```\n\n完成此操作后，你现在就有了一个可以发送确认电子邮件的电子邮件地址！要发送电子邮件，你需要修改`UserController`类的`register`操作，使用`sendMail`方法来发送电子邮件。[清单\
    \ 11-39](#Chapter11.html#list_11_39) 显示了对`register`操作的更改。\n\n***清单 11-39.** 发送电子邮件确认*\n\
    \n```groovy\ndef register() {\n    ...\n    else if(u.save()) {\n        session.user\
    \ = u\n        try {\n            sendMail {\n                to u.email\n   \
    \             subject 'Registration Confirmation'\n                body view:\
    \ '/emails/confirmRegistration',\n                         model: [user: u]\n\
