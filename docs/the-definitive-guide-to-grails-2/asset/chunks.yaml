  trans: '

    #### 使用 run-war 部署


    如果你对将内置的 Tomcat 容器作为部署环境感到满意，可以通过在生产环境中设置 Grails，然后从本地版本控制系统检出 Grails 应用程序来快速部署。完成这些操作后，只需输入


    `Grails> run-war`


    此命令会将 Grails 打包成一个 WAR 文件，然后使用打包好的 WAR 在 8080 端口上运行 Tomcat。如果你想更改端口，可以按照第 1 章中“步骤
    6：运行应用程序”一节的说明进行操作。


    #### 使用 WAR 文件部署


    `run-war` 命令很方便，但你可能希望对部署环境有更多控制，或者希望部署到其他容器（例如 Apache Tomcat 或 BEA WebLogic）上，而不是
    Tomcat。


    在这些情况下，你需要的是一个 WAR 文件。WAR 文件是 Java 世界中标准化的部署机制。每个符合 Java EE 规范的 Web 容器都支持这种格式。但一些较旧的容器可能存在特殊问题，因此请查看维基上的
    [`http://grails.org/Deployment`](http://grails.org/Deployment) 页面，以获取有关特定容器问题的有用信息。


    要创建 WAR 归档文件，请使用 Grails 的 `war` 命令：


    `grails> war | Done creating WAR target/gtunes-0.1.war`

    `grails>`


    默认情况下，如果未指定环境，Grails 会假定为 WAR 文件使用生产环境。但是，与其他命令一样，你可以根据需要更改环境。例如：


    `$ grails> test war`


    运行该命令后，一个全新的 WAR 文件会出现在项目目录的根目录中（参见图 2-13）。


    ![Image](img/9781430243779_Fig02-13.jpg)


    ***图 2-13.** gTunes WAR 文件*


    如果根目录不是存放 WAR 文件的方便位置，你始终可以通过将目标 WAR 位置指定为 `war` 命令的最后一个参数来更改它：


    `$ grails test war /path/to/deploy/gTunes.war`


    创建好 WAR 文件后，你只需遵循容器的部署说明（可能简单到将文件放入特定目录），就大功告成了。注意到 WAR 文件包含版本号了吗？Grails 具有对应用程序版本控制的内置支持。你将在第
    11 章中了解更多关于版本控制和部署的内容。


    ### 总结


    哇，我们涵盖了很多内容。你生成了一个简单的 CRUD 接口，配置了不同的数据源，并生成了一个准备部署的 WAR 文件。你学习了 Grails 中控制器工作方式的一些基础知识，并预览了
    GORM（Grails 的对象关系映射层）的未来功能。


    你还尝试了 Grails 对运行不同环境的支持，并为生产环境配置了 MySQL 数据库。所有这些都应该为你掌握 Grails 的基础知识提供了坚实的基础。然而，到目前为止，我们只是触及了领域类、控制器和视图等概念，没有深入细节。这种情况即将改变，因为我们将一头扎进
    Grails 运行机制的详尽细节中。


    从第 3 章开始，我们将开始深入探讨 Grails 中的概念。在此过程中，我们将开始构建 gTunes 应用程序，并将其从现在的原型转变为一个功能完备的应用程序。


    ## 第 3 章


    ![Image](img/3squ.jpg)


    ## 理解领域类


    面向对象（OO）应用程序几乎总是涉及一个领域模型，该模型代表应用程序处理的业务实体。gTunes 应用程序将包含许多领域类，包括 `Artist`、`Album`
    和 `Song`。这些领域类中的每一个都有与之关联的属性。你必须将这些属性映射到数据库，以便持久化这些类的实例。


    面向对象应用程序的开发人员在将对象映射到关系数据库时面临一些难题。这并不是因为关系数据库特别难用；问题在于你在面向对象的领域模型和关系数据库以表为中心的数据视图之间遇到了“阻抗不匹配”^(1)。


    ![Image](img/square.jpg) **注意**  由于绝大多数 Grails 应用程序都构建在关系数据库之上，本书将重点介绍这种方法。请注意，Grails
    支持越来越多的数据存储，包括许多非关系型数据存储，例如 MongoDB、Redis 和 Cassandra。


    幸运的是，Grails 为你完成了大部分艰苦的工作。为 Grails 应用程序编写领域模型比许多其他框架要简单得多。本章将介绍 Grails 领域模型的基础知识。第
    10 章将涵盖 GORM 技术的更高级特性。


    ### 将字段持久化到数据库


    默认情况下，领域类中的所有字段都会持久化到数据库。对于诸如 `Strings` 和 `Integers` 之类的简单字段类型，类中的每个字段都将映射到数据库中的一列。复杂的属性可能需要多个表来持久化所有数据。第
    2 章中的 `Song` 类包含两个 `String` 属性。数据库中的表将为这些属性中的每一个包含一个单独的列。


    在 MySQL 中，该数据库表将类似于清单 3-1。


    ![Image](img/line.jpg)


    1  Scott W. Ambler, “The Object-Relational Impedance Mismatch,” [`http://www.agiledata.org/essays/impedanceMismatch.html`](http://www.agiledata.org/essays/impedanceMismatch.html),
    2006.


    ***清单 3-1.** Song 表*


    ![Image](img/9781430243779_unFig03-01.jpg)


    请注意，该表包含领域类中每个属性对应的列、一个 `id` 列和一个 `version` 列。`id` 是行的唯一标识符，Grails 使用 `version`
    列来实现乐观锁定^(2)。


    清单 3-1 显示了 MySQL 数据库的默认映射。Grails 提供了一个强大的 DSL，用于表达领域模型如何映射到数据库。有关映射 DSL 的详细信息将在后面的“自定义数据库映射”部分中介绍。

    '
- fmt: "### Validating Domain Classes\n\nYou’ll probably encounter business rules\
    \ that constrain the valid values of a particular property in a domain class.\
    \ For example, a `Person` must never have an age that is less than zero. A credit\
    \ card number must adhere to an expected pattern. Rules like these should be expressed\
    \ clearly and in only one place. Luckily, Grails provides a powerful mechanism\
    \ for expressing these rules.\n\nA Grails domain class can express domain constraints\
    \ simply by defining a public static property, `constraints`, that has a closure\
    \ as a value. [Listing 3-2](#Chapter03.html#list_3_2) shows a version of the `Song`\
    \ class that has several constraints defined.\n\n**Listing 3-2.** The Song Domain\
    \ Class\n\n```\nclass Song {\n    String title\n    String artist\n    Integer\
    \ duration\n\n    static constraints = {\n        title(blank: false)\n      \
    \  artist(blank: false)\n        duration(min: 1)\n    }\n}\n```\n\nThe `Song`\
    \ class in [Listing 3-2](#Chapter03.html#list_3_2) defines constraints for each\
    \ of its persistent properties. The `title` and `artist` properties cannot be\
    \ blank. The `duration` property must have a minimum value of 1. When constraints\
    \ are defined, not every property necessarily needs to be constrained. The `constraints`\
    \ closure can include constraints for a subset of properties in the class.\n\n\
    ![Image](images/line.jpg)\n\n¹ Wikipedia, “Optimistic concurrency control,” [`http://en.wikipedia.org/wiki/Optimistic_concurrency_control`](http://en.wikipedia.org/wiki/Optimistic_concurrency_control).\n\
    \nThe validators used in [Listing 3-2](#Chapter03.html#list_3_2) are `blank` and\
    \ `min`. Grails ships with a lot of standard validators that cover common scenarios\
    \ (see [Table 3-1](#Chapter03.html#tab_3_1)).\n\n![Image](images/9781430243779_Tab03-01.jpg)\n\
    \nThe `constraints` block in a domain class will help prevent invalid data from\
    \ being saved to the database. The `save()` method on a domain object will automatically\
    \ validate against the constraints before data are written to the database. Data\
    \ are not written to the database if validation fails. If validation fails, the\
    \ `save()` method returns `null`. If validation passes, then the object is saved\
    \ to the database, and the `save()` method returns a reference to the object saved.\
    \ [Listing 3-3](#Chapter03.html#list_3_3) demonstrates how code can react to the\
    \ return value of the `save()` method.\n\n**Listing 3-3.** Validating a Song Object\n\
    \n```\n// -68 is an invalid duration\ndef song = new Song(title:'The Rover',\n\
    \                    artist:'Led Zeppelin',\n                    duration:-68)\n\
    if(song.save()) {\n    println \"Song was created!\"\n} else {\n    song.errors.allErrors.each\
    \ { println it.defaultMessage }\n}\n```\n\nAn alternative approach is to invoke\
    \ the `save` method with a `failOnError` parameter set to `true`, which will cause\
    \ the `save()` method to throw a `grails.validation.ValidationException` if validation\
    \ fails. That would look like `song.save(failOnError: true)`.\n\nAn interesting\
    \ aspect of [Listing 3-3](#Chapter03.html#list_3_3) is the use of the `errors`\
    \ property on domain classes. This property is an instance of the Spring Framework’s\
    \ `org.springframework.validation.Errors` interface, which allows advanced querying\
    \ of validation errors. In [Listing 3-3](#Chapter03.html#list_3_3), when validation\
    \ fails, the code generates a list of all the errors that occurred and prints\
    \ them to `stdout`.\n\nSome of the more useful methods in the Spring `Errors`\
    \ interface are shown in [Listing 3-4](#Chapter03.html#list_3_4).\n\n**Listing\
    \ 3-4.** Methods in the Spring Errors Interface\n\n```\npackage org.springframework.validation\n\
    \ninterface Errors {\n    List getAllErrors();\n    int getErrorCount();\n   \
    \ FieldError getFieldError(String fieldName);\n    int getFieldErrorCount();\n\
    \    List getFieldErrors(String fieldName);\n    Object getObjectName();\n   \
    \ boolean hasErrors();\n    boolean hasFieldErrors(String fieldName);\n    //\
    \ ... remaining methods\n}\n```\n\nOccasionally you’ll find it useful to make\
    \ changes to the domain model before committing to the `save()` method. For such\
    \ a case, Grails provides a `validate()` method, which returns a Boolean value\
    \ to indicate whether validation was successful. The semantics are exactly the\
    \ same as in the example with the `save()` method, except that the `validate()`\
    \ method doesn’t attempt to save the instance to the database.\n\nIf validation\
    \ fails, the application might want to make changes to the state of the domain\
    \ object and make another attempt at validation. All domain objects have a method\
    \ called `clearErrors()`, which clears any errors left over from a previous validation\
    \ attempt. [Listing 3-5](#Chapter03.html#list_3_5) demonstrates how code might\
    \ react to the return value of the `validate()` method.\n\n**Listing 3-5.** Validating\
    \ a Song Object, Revisited\n\n```\ndef song = new Song(title:'The Rover',\n  \
    \                  duration:339)\nif(!song.validate()) {\n    song.clearErrors()\n\
    \    song.artist = 'Led Zeppelin'\n    song.validate()\n}\n```\n\n### Using Custom\
    \ Validators\n\nGrails provides a wide array of built-in validators to handle\
    \ common scenarios. However, it is impossible to foresee every feasible domain\
    \ model and every specific kind of validation that an application might need.\
    \ Fortunately, Grails provides a mechanism that allows an application to express\
    \ arbitrary validation rules (see [Listing 3-6](#Chapter03.html#list_3_6)).\n\n\
    **Listing 3-6.** Constraining the Password Property in the User Domain Class\n\
    \n```\nclass User {\n    static constraints = {\n        password(unique:true,\
    \ length:5..15, validator:{val, obj ->\n            if(val?.equalsIgnoreCase(obj.firstName))\
    \ {\n                return false\n            }\n        })\n    }\n}\n```\n\n\
    The validator in [Listing 3-6](#Chapter03.html#list_3_6) will fail if the password\
    \ is equal to the `firstName` property of the `User` class. The validator closure\
    \ should return `false` if validation fails; otherwise it should return `true`.\
    \ The first argument passed to the closure is the value of the property to be\
    \ validated. The second argument passed to the closure is the object being validated.\
    \ This second argument is often useful if validation requires the inspection of\
    \ the object’s other properties, as in [Listing 3-6](#Chapter03.html#list_3_6).\n\
    \nIn addition, when `false` is returned from a custom validator, an error code\
    \ such as `user.password.validator.error` is produced. However, you can specify\
    \ a custom error code by returning a string.\n\n```\nif(val?.equalsIgnoreCase(obj.firstName))\
    \ {\n    return \"password.cannot.be.firstname\"\n}\n```\n\nIn this example, you\
    \ can trigger a validation error simply by returning a string with the value `password.cannot.be.firstname`.\
    \ You’ll learn more about error codes and how they relate to other parts of the\
    \ application in later chapters. For now, let’s move on to the topic of transient\
    \ properties."
  raw: '### Validating Domain Classes


    You’ll probably encounter business rules that constrain the valid values of a
    particular property in a domain class. For example, a `Person` must never have
    an age that is less than zero. A credit card number must adhere to an expected
    pattern. Rules like these should be expressed clearly and in only one place. Luckily,
    Grails provides a powerful mechanism for expressing these rules.


    A Grails domain class can express domain constraints simply by defining a public
    static property, `constraints`, that has a closure as a value. [Listing 3-2](#Chapter03.html#list_3_2)
    shows a version of the `Song` class that has several constraints defined.


    ***Listing 3-2.** The Song Domain Class*


    `class Song {`

    `    String title`

    `    String artist`

    `    Integer duration`


    `    static constraints = {`

    `        title(blank: false)`

    `        artist(blank: false)`

    `        duration(min: 1)`

    `    }`

    `}`


    The `Song` class in [Listing 3-2](#Chapter03.html#list_3_2) defines constraints
    for each of its persistent properties. The `title` and `artist` properties cannot
    be blank. The `duration` property must have a minimum value of 1\. When constraints
    are defined, not every property necessarily needs to be constrained. The constraints
    closure can include constraints for a subset of properties in the class.


    ![Image](images/line.jpg)


    ¹  Wikipedia, “Optimistic concurrency control,” [`http://en.wikipedia.org/wiki/Optimistic_concurrency_control`](http://en.wikipedia.org/wiki/Optimistic_concurrency_control).


    The validators used in [Listing 3-2](#Chapter03.html#list_3_2) are `blank` and
    `min`. Grails ships with a lot of standard validators that cover common scenarios
    (see [Table 3-1](#Chapter03.html#tab_3_1)).


    ![Image](images/9781430243779_Tab03-01.jpg)


    The `constraints` block in a domain class will help prevent invalid data from
    being saved to the database. The `save()` method on a domain object will automatically
    validate against the constraints before data are written to the database. Data
    are not written to the database if validation fails. If validation fails, the
    `save()` method returns `null`. If validation passes, then the object is saved
    to the database, and the `save()` method returns a reference to the object saved.
    [Listing 3-3](#Chapter03.html#list_3_3) demonstrates how code can react to the
    return value of the `save()` method.


    ***Listing 3-3.** Validating a Song Object*


    `// -68 is an invalid duration`

    `def song = new Song(title:''The Rover'',`

    `                    artist:''Led Zeppelin'',`

    `                    duration:-68)`

    `if(song.save()) {`

    `    println "Song was created!"`

    `} else {`

    `    song.errors.allErrors.each { println it.defaultMessage }`

    `}`


    An alternative approach is to invoke the `save` method with a `failOnError` parameter
    set to `true`, which will cause the `save()` method to throw a `grails.validation.ValidationException`
    if validation fails. That would look like `song.save(failOnError: true)`.


    An interesting aspect of [Listing 3-3](#Chapter03.html#list_3_3) is the use of
    the `errors` property on domain classes. This property is an instance of the Spring
    Framework’s `org.springframework.validation.Errors` interface, which allows advanced
    querying of validation errors. In [Listing 3-3](#Chapter03.html#list_3_3), when
    validation fails, the code generates a list of all the errors that occurred and
    prints them to `stdout`.


    Some of the more useful methods in the Spring Errors interface are shown in [Listing
    3-4](#Chapter03.html#list_3_4).


    ***Listing 3-4.** Methods in the Spring Errors Interface*


    `package org.springframework.validation`


    `interface Errors {`

    `    List getAllErrors();`

    `    int getErrorCount();`

    `    FieldError getFieldError(String fieldName);`

    `    int getFieldErrorCount();`

    `    List getFieldErrors(String fieldName);`

    `    Object getObjectName();`

    `    boolean hasErrors();`

    `    boolean hasFieldErrors(String fieldName);`

    `    // ... remaining methods`

    `}`


    Occasionally you’ll find it useful to make changes to the domain model before
    committing to the `save()` method. For such a case, Grails provides a `validate()`
    method, which returns a Boolean value to indicate whether validation was successful.
    The semantics are exactly the same as in the example with the `save()` method,
    except that the `validate()` method doesn’t attempt to save the instance to the
    database.


    If validation fails, the application might want to make changes to the state of
    the domain object and make another attempt at validation. All domain objects have
    a method called `clearErrors()`, which clears any errors left over from a previous
    validation attempt. [Listing 3-5](#Chapter03.html#list_3_5) demonstrates how code
    might react to the return value of the `validate()` method.


    ***Listing 3-5.** Validating a Song Object, Revisited*


    `def song = new Song(title:''The Rover'',`

    `                    duration:339)`

    `if(!song.validate()) {`

    `    song.clearErrors()`

    `    song.artist = ''Led Zeppelin''`

    `    song.validate()`

    `}`


    ### Using Custom Validators


    Grails provides a wide array of built-in validators to handle common scenarios.
    However, it is impossible to foresee every feasible domain model and every specific
    kind of validation that an application might need. Fortunately, Grails provides
    a mechanism that allows an application to express arbitrary validation rules (see
    [Listing 3-6](#Chapter03.html#list_3_6)).


    ***Listing 3-6.** Constraining the Password Property in the User Domain Class*


    `class User {`

    `    static constraints = {`

    `        password(unique:true, length:5..15, validator:{val, obj ->`

    `            if(val?.equalsIgnoreCase(obj.firstName)) {`

    `                return false`

    `            }`

    `        })`

    `    }`

    `}`


    The validator in [Listing 3-6](#Chapter03.html#list_3_6) will fail if the password
    is equal to the `firstName` property of the `User` class. The validator closure
    should return `false` if validation fails; otherwise it should return `true`.
    The first argument passed to the closure is the value of the property to be validated.
    The second argument passed to the closure is the object being validated. This
    second argument is often useful if validation requires the inspection of the object’s
    other properties, as in [Listing 3-6](#Chapter03.html#list_3_6).


    In addition, when `false` is returned from a custom validator, an error code such
    as `user.password.validator.error` is produced. However, you can specify a custom
    error code by returning a string.


    `if(val?.equalsIgnoreCase(obj.firstName)) {`

    `    return "password.cannot.be.firstname"`

    `}`


    In this example, you can trigger a validation error simply by returning a string
    with the value `password.cannot.be.firstname`. You’ll learn more about error codes
    and how they relate to other parts of the application in later chapters. For now,
    let’s move on to the topic of transient properties.'
  trans: '

    ### 验证领域类


    你可能会遇到一些业务规则，这些规则限制了领域类中特定属性的有效值。例如，`Person` 的年龄绝不能小于零。信用卡号必须符合预期的模式。像这样的规则应该清晰且唯一地表达出来。幸运的是，Grails
    提供了一个强大的机制来表达这些规则。


    Grails 领域类可以通过定义一个名为 `constraints` 的公共静态属性（其值为一个闭包）来表达领域约束。清单 3-2 展示了一个定义了若干约束的
    `Song` 类版本。


    ***清单 3-2.** Song 领域类*


    `class Song {`

    `    String title`

    `    String artist`

    `    Integer duration`


    `    static constraints = {`

    `        title(blank: false)`

    `        artist(blank: false)`

    `        duration(min: 1)`

    `    }`

    `}`


    清单 3-2 中的 `Song` 类为其每个持久化属性定义了约束。`title` 和 `artist` 属性不能为空。`duration` 属性的最小值必须为
    1。当定义了约束时，并非每个属性都必须被约束。`constraints` 闭包可以包含对类中部分属性的约束。


    ![Image](img/line.jpg)


    ¹  Wikipedia，“乐观并发控制”，[`http://en.wikipedia.org/wiki/Optimistic_concurrency_control`](http://en.wikipedia.org/wiki/Optimistic_concurrency_control)。


    清单 3-2 中使用的验证器是 `blank` 和 `min`。Grails 内置了许多覆盖常见场景的标准验证器（参见表 3-1）。


    ![Image](img/9781430243779_Tab03-01.jpg)


    领域类中的 `constraints` 块将有助于防止无效数据被保存到数据库。在数据写入数据库之前，领域对象上的 `save()` 方法会自动根据约束进行验证。如果验证失败，数据将不会写入数据库。如果验证失败，`save()`
    方法返回 `null`。如果验证通过，则对象被保存到数据库，并且 `save()` 方法返回一个指向已保存对象的引用。清单 3-3 演示了代码如何响应 `save()`
    方法的返回值。


    ***清单 3-3.** 验证 Song 对象*


    `// -68 是一个无效的 duration`

    `def song = new Song(title:''The Rover'',`

    `                    artist:''Led Zeppelin'',`

    `                    duration:-68)`

    `if(song.save()) {`

    `    println "Song was created!"`

    `} else {`

    `    song.errors.allErrors.each { println it.defaultMessage }`

    `}`


    另一种方法是调用 `save` 方法并将 `failOnError` 参数设置为 `true`，这会导致如果验证失败，`save()` 方法会抛出一个 `grails.validation.ValidationException`
    异常。调用方式如下：`song.save(failOnError: true)`。


    清单 3-3 的一个有趣之处在于使用了领域类的 `errors` 属性。该属性是 Spring 框架的 `org.springframework.validation.Errors`
    接口的一个实例，它允许对验证错误进行高级查询。在清单 3-3 中，当验证失败时，代码会生成一个包含所有发生错误的列表，并将其打印到 `stdout`。


    Spring Errors 接口中一些更有用的方法如清单 3-4 所示。


    ***清单 3-4.** Spring Errors 接口中的方法*


    `package org.springframework.validation`


    `interface Errors {`

    `    List getAllErrors();`

    `    int getErrorCount();`

    `    FieldError getFieldError(String fieldName);`

    `    int getFieldErrorCount();`

    `    List getFieldErrors(String fieldName);`

    `    Object getObjectName();`

    `    boolean hasErrors();`

    `    boolean hasFieldErrors(String fieldName);`

    `    // ... 其余方法`

    `}`


    有时你会发现，在提交 `save()` 方法之前对领域模型进行更改是很有用的。对于这种情况，Grails 提供了一个 `validate()` 方法，该方法返回一个布尔值来指示验证是否成功。其语义与
    `save()` 方法的示例完全相同，不同之处在于 `validate()` 方法不会尝试将实例保存到数据库。


    如果验证失败，应用程序可能希望更改领域对象的状态并再次尝试验证。所有领域对象都有一个名为 `clearErrors()` 的方法，该方法会清除上一次验证尝试留下的任何错误。清单
    3-5 演示了代码如何响应 `validate()` 方法的返回值。


    ***清单 3-5.** 重新验证 Song 对象*


    `def song = new Song(title:''The Rover'',`

    `                    duration:339)`

    `if(!song.validate()) {`

    `    song.clearErrors()`

    `    song.artist = ''Led Zeppelin''`

    `    song.validate()`

    `}`


    ### 使用自定义验证器


    Grails 提供了大量内置验证器来处理常见场景。然而，不可能预见到每一个可行的领域模型以及应用程序可能需要的每一种特定验证类型。幸运的是，Grails 提供了一种机制，允许应用程序表达任意的验证规则（参见清单
    3-6）。


    ***清单 3-6.** 在 User 领域类中约束 password 属性*


    `class User {`

    `    static constraints = {`

    `        password(unique:true, length:5..15, validator:{val, obj ->`

    `            if(val?.equalsIgnoreCase(obj.firstName)) {`

    `                return false`

    `            }`

    `        })`

    `    }`

    `}`


    如果密码等于 `User` 类的 `firstName` 属性，则清单 3-6 中的验证器将失败。如果验证失败，验证器闭包应返回 `false`；否则应返回
    `true`。传递给闭包的第一个参数是要验证的属性的值。传递给闭包的第二个参数是被验证的对象。如果验证需要检查对象的其他属性（如清单 3-6 所示），则第二个参数通常很有用。


    此外，当自定义验证器返回 `false` 时，会产生一个类似 `user.password.validator.error` 的错误代码。但是，你可以通过返回一个字符串来指定自定义错误代码。


    `if(val?.equalsIgnoreCase(obj.firstName)) {`

    `    return "password.cannot.be.firstname"`

    `}`


    在这个例子中，你只需返回一个值为 `password.cannot.be.firstname` 的字符串即可触发验证错误。你将在后续章节中了解更多关于错误代码及其与应用程序其他部分的关系。现在，让我们继续讨论瞬态属性的主题。

