  trans: '

    ### GORM 的语义


    正如你所发现的，使用 GORM 非常简单。事实上，它简单到可能会让你产生一种虚假的安全感，认为你再也不需要关注数据库了。然而，在使用任何 ORM 工具时，理解其运作方式及具体行为是至关重要的。


    ![图片](img/square.jpg) **提示** 由于 GORM 构建在 Hibernate 之上，因此投资一本专门介绍 Hibernate 的书籍是值得的。不过，我们仍会尽力在此涵盖关键方面。


    如果你在不了解 ORM 工具语义的情况下就开始使用它，几乎肯定会在应用程序的性能和行为方面遇到问题。ORM 工具常被视作抽象泄漏（参见 [`http://www.joelonsoftware.com/articles/LeakyAbstractions.html`](http://www.joelonsoftware.com/articles/LeakyAbstractions.html)）的一个例子，因为它们试图将你与底层数据库的复杂性隔离开来。不幸的是，沿用这个比喻，如果你不了解诸如懒加载与急加载、锁定策略和缓存等特性，这种抽象泄漏会相当频繁地发生。


    本节将对这些特性进行一些澄清，以确保你不会期望使用 GORM 来解决世界饥饿问题。可以理解的是，GORM 经常被拿来与 Rails 中的 ActiveRecord
    进行比较。不幸的是，有 Rails 经验并采用 Grails 的用户可能会遇到一些意外，因为这两个工具实际上差别很大。其中一个主要区别是 GORM 具有持久化上下文（或*会话*）的概念。


    #### Hibernate 会话


    Hibernate 与 Java 持久化 API 一样，使用 `org.hibernate.Session` 类来建模持久化会话的概念。`Session`
    类本质上是一个容器，它持有所有已知持久化类（即 Grails 中的领域类）实例的引用。在 Hibernate 的世界观中，你以对象的角度思考，并将责任委托给
    Hibernate，以确保对象的状态与数据库*同步*。


    同步过程是通过调用 `Session` 对象上的 `flush()` 方法来触发的。此时，你可能会想，既然在第 4 章中没有提到 `Session` 对象，那么这一切与
    Grails 有何关系？本质上，GORM 会透明地为你操作 `Session` 对象。


    完全可以在不直接与 Hibernate `Session` 对象交互的情况下构建整个 Grails 应用程序。然而，对于不习惯会话模型的开发者来说，可能会遇到一些意外。例如，考虑代码清单
    9-43 中的代码。


    ***代码清单 9-43.** 多次读取返回同一对象*


    `def album1 = Album.get(1)`

    `def album2 = Album.get(1)`

    `assertFalse album1.is(album2)`


    代码清单 9-1 中的代码展示了一个不习惯会话模型的开发者可能会遇到的小陷阱。第一次调用 `get` 方法时，会在底层执行一条 SQL `SELECT` 语句来检索
    `Album` 类的一个实例——这并不意外。然而，第二次调用 `get` 方法时根本不会执行任何 SQL，事实上，最后一行断言会失败。


    ![图片](img/square.jpg) **注意** 在代码清单 9-43 的示例中，最后的 `assertFalse` 语句使用了 Groovy 的
    `is` 方法，因为在 Groovy 中 `==` 等同于 Java 中调用 `equals(Object)` 方法。


    换句话说，`Session` 对象的行为类似于一个缓存；事实上，它就是一个缓存。`Session` 对象是 Hibernate 的一级缓存。另一个体现这一点的地方是保存对象时。考虑代码清单
    9-44 中的代码。


    ***代码清单 9-44.** 在 Grails 中保存领域类*


    `def album = new Album(...)`

    `album.save()`


    现在，假设 `Album` 实例验证通过，你可能会根据代码清单 9-2 中的代码认为，当调用 `save()` 方法时，GORM 会执行一条 SQL `INSERT`
    语句。然而，情况并非总是如此，实际上这在很大程度上取决于底层数据库。GORM 默认使用 Hibernate 的原生标识生成策略，该策略会尝试选择最合适的方式来生成对象的
    `id`。例如，在 Oracle 中，Hibernate 会选择使用 `sequence` 生成器来提供标识符，而在 MySQL 中则会使用 `identity`
    策略。`identity` 生成策略依赖于数据库来提供标识。


    由于在 `save()` 方法完成时必须分配标识符，因此如果使用 `sequence`，则不需要执行 `INSERT`，因为 Hibernate 可以简单地在内存中递增序列。实际的
    `INSERT` 可以在稍后 `Session` 刷新时发生。然而，对于 `identity` 策略，*必须*执行 `INSERT`，因为数据库需要生成标识符。尽管如此，这个例子足以说明，负责将对象状态同步到数据库的是
    `Session`，而不是对象本身。


    本质上，Hibernate 实现了一种称为*事务性写后*的策略。对持久化对象所做的任何更改，并不一定在你进行更改时或甚至调用 `save()` 方法时就被持久化。这种方法的好处是，Hibernate
    可以大力优化并批量处理要执行的 SQL，从而最大限度地减少网络流量。此外，这种模型还大大缩短了数据库锁（在“锁定策略”部分有更详细的讨论）的持有时间。

    '
- fmt: "# Session Management and Flushing\n\nYou may be worried at this point that\
    \ you’re losing some kind of control by allowing Hibernate to take responsibility\
    \ for persisting objects on your behalf. Fortunately, GORM provides you with the\
    \ ability to control session flushing implicitly by passing in a `flush` argument\
    \ to the `save()` or `delete()` method, as shown in [Listing 9-45](#Chapter09.html#list_9_45).\n\
    \n**Listing 9-45.** Manually Flushing the Session\n\n```\ndef album = new Album(...)\n\
    album.save(flush:true)\n```\n\nIn contrast to the example in [Listing 9-23](#Chapter09.html#list_9_23),\
    \ the code in [Listing 9-24](#Chapter09.html#list_9_24) will persist the object\
    \ but also call `flush()` on the underlying `Session` object. However, it is important\
    \ to note that since the `Session` deals with all persistent instances, other\
    \ changes may be flushed in addition to the object that is saved. [Listing 9-46](#Chapter09.html#list_9_46)\
    \ illustrates an example of this behavior.\n\n**Listing 9-46.** The Effects of\
    \ Flushing\n\n```\ndef album1 = Album.get(1)\nalbum1.title = \"The Changed Title\"\
    \nalbum1.save()\ndef album2 = new Album(..)\nalbum2.save(flush:true)\n```\n\n\
    The example in [Listing 9-25](#Chapter09.html#list_9_25) demonstrates the impact\
    \ of passing the `flush` argument to the second `save()` method. You may expect\
    \ that an SQL `UPDATE` would be executed when `save()` is called on `album1`,\
    \ and then an `INSERT` would occur when `save()` is called on `album2`. However,\
    \ the actual behavior is that both the `UPDATE` and the `INSERT` occur on the\
    \ call to `save()` on `album2`, since the `flush:true` argument passed forces\
    \ the underlying `Session` object to synchronize changes with the database.\n\n\
    You may be wondering at this point how the code in the listings you’ve seen so\
    \ far can possibly use the same `Session` instance and where this `Session` came\
    \ from in the first place. Basically, when a request comes into a Grails application,\
    \ directly before a controller action executes, Grails will transparently bind\
    \ a new Hibernate `Session` to the current thread. The `Session` is then looked\
    \ up by GORM’s dynamic methods, such as `get` in [Listing 9-8](#Chapter09.html#list_9_8).\
    \ When a controller action finishes executing, if no exceptions are thrown, the\
    \ `Session` is flushed, which synchronizes the state of the `Session` with the\
    \ database by executing any necessary SQL. These changes are then committed to\
    \ the database.\n\nHowever, that is not the end of the story. The `Session` is\
    \ not closed but instead placed in read-only mode prior to view rendering and\
    \ remains open until view rendering completes. The reason for this is that if\
    \ the session were closed, any persistent instances contained within it would\
    \ become detached. The result is that if there were any noninitialized associations,\
    \ the infamous `org.hibernate.LazyInitializationException` would occur. Ouch!\
    \ Of course, we’ll be saying more about `LazyInitializationException` and ways\
    \ to avoid the exception, including in-depth coverage of detached objects later\
    \ in the chapter.\n\nTo elaborate, the reason for placing the `Session` into read-only\
    \ mode during view rendering is to avoid any unnecessary flushing of the `Session`\
    \ during the view-rendering process. Your views really shouldn’t be modifying\
    \ database state, after all! So that is how the standard `Session` life cycle\
    \ works in Grails.\n\n# Obtaining the Session\n\nAs mentioned previously, the\
    \ `Session` is basically a cache of persistent instances. Like any cache, the\
    \ more objects it has within it, the more memory it’s going to consume. A common\
    \ mistake when using GORM is to query for a large number of objects without periodically\
    \ clearing the `Session`. If you do so, your `Session` will get bigger and bigger,\
    \ and eventually you may either cause your application’s performance to suffer\
    \ or, worse, run out of memory.\n\nIn these kinds of scenarios, it is wise to\
    \ manage the state of your `Session` manually. Before you can do so, however,\
    \ you need a reference to the `Session` object itself. You can achieve this in\
    \ two ways. The first involves the use of dependency injection to get hold of\
    \ a reference to the Hibernate `SessionFactory` object.\n\nThe `SessionFactory`\
    \ has a method, called `currentSession()`, that you can use to obtain the `Session`\
    \ bound to the current thread. To use dependency injection, simply declare a local\
    \ field called `sessionFactory` in a controller, tag library, or service, as shown\
    \ in [Listing 9-47](#Chapter09.html#list_9_47).\n\n**Listing 9-47.** Using Dependency\
    \ Injection to Obtain the Hibernate Session\n\n```\ndef sessionFactory\n...\n\
    def index() {\n    def session = sessionFactory.currentSession()\n}\n```\n\nAs\
    \ an alternative, you could use the `withSession` method that is available on\
    \ any domain class. The `withSession` method accepts a closure. The first argument\
    \ to the closure is the `Session` object; hence, you can code as in [Listing 9-48](#Chapter09.html#list_9_48).\n\
    \n**Listing 9-48.** Using the `withSession` Method\n\n```\ndef index() {\n   \
    \ Album.withSession { session ->\n        ...\n    }\n}\n```\n\nLet’s return to\
    \ the problem at hand. To avoid memory issues when using GORM with a large amount\
    \ of data (note this applies to raw Hibernate too), you need to call the `clear()`\
    \ method on the `Session` object periodically so that the contents of the `Session`\
    \ are cleared. The result is that the instances within the `Session` become candidates\
    \ for garbage collection, which frees up memory. [Listing 9-49](#Chapter09.html#list_9_49)\
    \ shows an example that demonstrates the pattern.\n\n**Listing 9-49.** Managing\
    \ the Hibernate Session\n\n```\n1      def index() {\n2          Album.withSession\
    \ { session ->\n3              def allAlbums = Album.list()\n4              for(album\
    \ in allAlbums) {\n5                  def songs = Song.findAllByAlbum(album)\n\
    6                  // do something with the songs\n7                  ...\n8 \
    \                 session.clear()\n9              }\n10         }\n11       }\n\
    ```\n\nThe example in [Listing 9-49](#Chapter09.html#list_9_49) is rather contrived,\
    \ but it serves to demonstrate effective `Session` management when dealing with\
    \ a large number of objects. On line 2, a reference to the `Session` is obtained\
    \ using the `withSession` method:\n\n```\n2  Album.withSession { session ->\n\
    \        ...\n10 }\n```\n\nThen, on line 3, a query is used to get a list of all\
    \ the albums in the system, which could be big in itself, and then iterate over\
    \ each one:\n\n```\n3 def allAlbums = Album.list()\n4 for(album in allAlbums)\
    \ {\n      ...\n9 }\n```\n\nCritically, on line 5, a dynamic finder queries for\
    \ all the `Song` instances for the current `Album`:\n\n```\n5      def songs =\
    \ Song.findAllByAlbum(album)\n```\n\nNow, each time the `findAllByAlbum` method\
    \ is executed, more and more persistent instances are being accumulated in the\
    \ `Session`. Memory consumption may at some point become an issue depending on\
    \ how much data is in the system at the time. To prevent this, the `session` is\
    \ cleared on line 8:\n\n```\n8      session.clear()\n```\n\nClearing the `Session`\
    \ with the `clear()` method is not the only way to remove objects from Hibernate’s\
    \ grasp. If you have a single object, you can also call the `discard()` method.\
    \ You could even use the `*.` operator to discard entire collections of objects\
    \ using this technique:\n\n```\nsongs*.discard()\n```\n\nThe advantage of this\
    \ approach is that although the `clear()` method removes all persistent instances\
    \ from the `Session`, using `discard()` removes only the instances you no longer\
    \ need. This can help in certain circumstances because you may end up with a `LazyInitializationException`\
    \ because removing the objects from the `Session` results in them being detached\
    \ (a subject we’ll discuss in more detail in the “Detached Objects” section)."
  raw: '#### Session Management and Flushing


    You may be worried at this point that you’re losing some kind of control by allowing
    Hibernate to take responsibility for persisting objects on your behalf. Fortunately,
    GORM provides you with the ability to control session flushing implicitly by passing
    in a `flush` argument to the `save()` or `delete()` method, as shown in [Listing
    9-45](#Chapter09.html#list_9_45).


    ***Listing 9-45.** Manually Flushing the Session*


    `def album = new Album(...)`

    `album.save(flush:true)`


    In contrast to the example in [Listing 9-23](#Chapter09.html#list_9_23), the code
    in [Listing 9-24](#Chapter09.html#list_9_24) will persist the object but also
    call `flush()` on the underlying `Session` object. However, it is important to
    note that since the `Session` deals with all persistent instances, other changes
    may be flushed in addition to the object that is saved. [Listing 9-46](#Chapter09.html#list_9_46)
    illustrates an example of this behavior.


    ***Listing 9-46.** The Effects of Flushing*


    `def album1 = Album.get(1)`

    `album1.title = "The Changed Title"`

    `album1.save()`

    `def album2 = new Album(..)`

    `album2.save(flush:true)`


    The example in [Listing 9-25](#Chapter09.html#list_9_25) demonstrates the impact
    of passing the `flush` argument to the second `save()` method. You may expect
    that an SQL `UPDATE` would be executed when `save()` is called on `album1`, and
    then an `INSERT` would occur when `save()` is called on `album2`. However, the
    actual behavior is that both the `UPDATE` and the `INSERT` occur on the call to
    `save()` on `album2`, since the `flush:true` argument passed forces the underlying
    `Session` object to synchronize changes with the database.


    You may be wondering at this point how the code in the listings you’ve seen so
    far can possibly use the same `Session` instance and where this `Session` came
    from in the first place. Basically, when a request comes into a Grails application,
    directly before a controller action executes, Grails will transparently bind a
    new Hibernate `Session` to the current thread. The `Session` is then looked up
    by GORM’s dynamic methods, such as `get` in [Listing 9-8](#Chapter09.html#list_9_8).
    When a controller action finishes executing, if no exceptions are thrown, the
    `Session` is flushed, which synchronizes the state of the `Session` with the database
    by executing any necessary SQL. These changes are then committed to the database.


    However, that is not the end of the story. The `Session` is not closed but instead
    placed in read-only mode prior to view rendering and remains open until view rendering
    completes. The reason for this is that if the session were closed, any persistent
    instances contained within it would become detached. The result is that if there
    were any noninitialized associations, the infamous `org.hibernate.LazyInitializationException`
    would occur. Ouch! Of course, we’ll be saying more about `LazyInitializationException`
    and ways to avoid the exception, including in-depth coverage of detached objects
    later in the chapter.


    To elaborate, the reason for placing the `Session` into read-only mode during
    view rendering is to avoid any unnecessary flushing of the `Session` during the
    view-rendering process. Your views really shouldn’t be modifying database state,
    after all! So that is how the standard `Session` life cycle works in Grails.


    #### Obtaining the Session


    As mentioned previously, the `Session` is basically a cache of persistent instances.
    Like any cache, the more objects it has within it, the more memory it’s going
    to consume. A common mistake when using GORM is to query for a large number of
    objects without periodically clearing the `Session`. If you do so, your `Session`
    will get bigger and bigger, and eventually you may either cause your application’s
    performance to suffer or, worse, run out of memory.


    In these kinds of scenarios, it is wise to manage the state of your `Session`
    manually. Before you can do so, however, you need a reference to the `Session`
    object itself. You can achieve this in two ways. The first involves the use of
    dependency injection to get hold of a reference to the Hibernate `SessionFactory`
    object.


    The `SessionFactory` has a method, called `currentSession()`, that you can use
    to obtain the `Session` bound to the current thread. To use dependency injection,
    simply declare a local field called `sessionFactory` in a controller, tag library,
    or service, as shown in [Listing 9-47](#Chapter09.html#list_9_47).


    ***Listing 9-47.** Using Dependency Injection to Obtain the Hibernate Session*


    `def sessionFactory`

    `...`

    `def index() {`

    `    def session = sessionFactory.currentSession()`

    `}`


    As an alternative, you could use the `withSession` method that is available on
    any domain class. The `withSession` method accepts a closure. The first argument
    to the closure is the `Session` object; hence, you can code as in [Listing 9-48](#Chapter09.html#list_9_48).


    ***Listing 9-48.** Using the withSession Method*


    `def index() {`

    `    Album.withSession { session ->`

    `        ...`

    `    }`

    `}`


    Let’s return to the problem at hand. To avoid memory issues when using GORM with
    a large amount of data (note this applies to raw Hibernate too), you need to call
    the `clear()` method on the `Session` object periodically so that the contents
    of the `Session` are cleared. The result is that the instances within the `Session`
    become candidates for garbage collection, which frees up memory. [Listing 9-49](#Chapter09.html#list_9_49)
    shows an example that demonstrates the pattern.


    ***Listing 9-49.** Managing the Hibernate Session*


    `1      def index() {`

    `2          Album.withSession { session ->`

    `3              def allAlbums = Album.list()`

    `4              for(album in allAlbums) {`

    `5                  def songs = Song.findAllByAlbum(album)`

    `6                  // do something with the songs`

    `7                  ...`

    `8                  session.clear()`

    `9              }`

    `10         }`

    `11       }`


    The example in [Listing 9-49](#Chapter09.html#list_9_49) is rather contrived,
    but it serves to demonstrate effective `Session` management when dealing with
    a large number of objects. On line 2, a reference to the `Session` is obtained
    using the `withSession` method:


    `2  Album.withSession { session ->`

    `        ...`

    `10 }`


    Then, on line 3, a query is used to get a list of all the albums in the system,
    which could be big in itself, and then iterate over each one:


    `3 def allAlbums = Album.list()`

    `4 for(album in allAlbums) {`

    `      ...`

    `9 }`


    Critically, on line 5, a dynamic finder queries for all the `Song` instances for
    the current `Album`:


    `5      def songs = Song.findAllByAlbum(album)`


    Now, each time the `findAllByAlbum` method is executed, more and more persistent
    instances are being accumulated in the `Session`. Memory consumption may at some
    point become an issue depending on how much data is in the system at the time.
    To prevent this, the `session` is cleared on line 8:


    `8      session.clear()`


    Clearing the `Session` with the `clear()` method is not the only way to remove
    objects from Hibernate’s grasp. If you have a single object, you can also call
    the `discard()` method. You could even use the `*.` operator to discard entire
    collections of objects using this technique:


    `songs*.discard()`


    The advantage of this approach is that although the `clear()` method removes all
    persistent instances from the `Session`, using `discard()` removes only the instances
    you no longer need. This can help in certain circumstances because you may end
    up with a `LazyInitializationException` because removing the objects from the
    `Session` results in them being detached (a subject we’ll discuss in more detail
    in the “Detached Objects” section).'
  trans: '

    #### 会话管理与刷新


    此时您可能会担心，让 Hibernate 代为负责持久化对象会失去某种控制。幸运的是，GORM 允许您通过向 `save()` 或 `delete()` 方法传递
    `flush` 参数来隐式控制会话刷新，如清单 9-45 所示。


    ***清单 9-45.** 手动刷新会话*


    `def album = new Album(...)`

    `album.save(flush:true)`


    与清单 9-23 中的示例不同，清单 9-24 中的代码会持久化该对象，同时还会调用底层 `Session` 对象的 `flush()` 方法。但需要注意的是，由于
    `Session` 处理所有持久化实例，因此除了被保存的对象之外，其他更改也可能被一并刷新。清单 9-46 演示了这种行为的一个示例。


    ***清单 9-46.** 刷新的影响*


    `def album1 = Album.get(1)`

    `album1.title = "The Changed Title"`

    `album1.save()`

    `def album2 = new Album(..)`

    `album2.save(flush:true)`


    清单 9-25 中的示例展示了向第二个 `save()` 方法传递 `flush` 参数所带来的影响。您可能会预期，当对 `album1` 调用 `save()`
    时会执行一条 SQL `UPDATE` 语句，然后对 `album2` 调用 `save()` 时会执行一条 `INSERT` 语句。然而，实际行为是，`UPDATE`
    和 `INSERT` 都在对 `album2` 调用 `save()` 时发生，因为传递的 `flush:true` 参数强制底层 `Session` 对象将更改与数据库同步。


    此时您可能会疑惑，到目前为止看到的清单中的代码是如何使用同一个 `Session` 实例的，以及这个 `Session` 最初是从哪里来的。基本上，当一个请求进入
    Grails 应用程序时，就在控制器动作执行之前，Grails 会透明地将一个新的 Hibernate `Session` 绑定到当前线程。然后，GORM
    的动态方法（例如清单 9-8 中的 `get`）会查找该 `Session`。当控制器动作执行完毕时，如果没有抛出异常，`Session` 会被刷新，通过执行必要的
    SQL 语句将 `Session` 的状态与数据库同步。这些更改随后会被提交到数据库。


    然而，故事并未就此结束。`Session` 不会被关闭，而是在视图渲染之前被置于只读模式，并保持打开状态直到视图渲染完成。这样做的原因是，如果会话被关闭，其中包含的任何持久化实例都会变成游离状态。结果就是，如果存在任何未初始化的关联，就会发生臭名昭著的
    `org.hibernate.LazyInitializationException` 异常。哎呀！当然，我们稍后会在本章中进一步讨论 `LazyInitializationException`
    以及避免该异常的方法，包括深入介绍游离对象。


    详细来说，在视图渲染期间将 `Session` 置于只读模式的原因是为了避免在视图渲染过程中对 `Session` 进行任何不必要的刷新。毕竟，您的视图不应该修改数据库状态！这就是
    Grails 中标准 `Session` 生命周期的工作方式。


    #### 获取会话


    如前所述，`Session` 本质上是一个持久化实例的缓存。与任何缓存一样，其中包含的对象越多，消耗的内存就越多。使用 GORM 时一个常见的错误是查询大量对象却不定期清除
    `Session`。如果这样做，您的 `Session` 会变得越来越大，最终可能导致应用程序性能下降，甚至更糟，内存耗尽。


    在这种情况下，明智的做法是手动管理 `Session` 的状态。但在这样做之前，您需要获取 `Session` 对象本身的引用。您可以通过两种方式实现这一点。第一种方式是使用依赖注入来获取
    Hibernate `SessionFactory` 对象的引用。


    `SessionFactory` 有一个名为 `currentSession()` 的方法，您可以使用它来获取绑定到当前线程的 `Session`。要使用依赖注入，只需在控制器、标签库或服务中声明一个名为
    `sessionFactory` 的局部字段即可，如清单 9-47 所示。


    ***清单 9-47.** 使用依赖注入获取 Hibernate 会话*


    `def sessionFactory`

    `...`

    `def index() {`

    `    def session = sessionFactory.currentSession()`

    `}`


    另一种方法是使用任何领域类上都可用的 `withSession` 方法。`withSession` 方法接受一个闭包。闭包的第一个参数是 `Session`
    对象；因此，您可以像清单 9-48 那样编写代码。


    ***清单 9-48.** 使用 withSession 方法*


    `def index() {`

    `    Album.withSession { session ->`

    `        ...`

    `    }`

    `}`


    让我们回到当前的问题。为了避免在使用 GORM 处理大量数据时出现内存问题（请注意，这也适用于原生 Hibernate），您需要定期调用 `Session`
    对象的 `clear()` 方法，以便清除 `Session` 的内容。这样做的结果是，`Session` 中的实例成为垃圾回收的候选对象，从而释放内存。清单
    9-49 展示了一个演示此模式的示例。


    ***清单 9-49.** 管理 Hibernate 会话*


    `1      def index() {`

    `2          Album.withSession { session ->`

    `3              def allAlbums = Album.list()`

    `4              for(album in allAlbums) {`

    `5                  def songs = Song.findAllByAlbum(album)`

    `6                  // 对歌曲进行一些操作`

    `7                  ...`

    `8                  session.clear()`

    `9              }`

    `10         }`

    `11       }`


    清单 9-49 中的示例相当刻意，但它很好地演示了在处理大量对象时有效的 `Session` 管理。在第 2 行，使用 `withSession` 方法获取了
    `Session` 的引用：


    `2  Album.withSession { session ->`

    `        ...`

    `10 }`


    然后，在第 3 行，使用一个查询获取系统中所有专辑的列表（该列表本身可能很大），然后遍历每个专辑：


    `3 def allAlbums = Album.list()`

    `4 for(album in allAlbums) {`

    `      ...`

    `9 }`


    关键的是，在第 5 行，一个动态查找器查询了当前 `Album` 的所有 `Song` 实例：


    `5      def songs = Song.findAllByAlbum(album)`


    现在，每次执行 `findAllByAlbum` 方法时，越来越多的持久化实例会在 `Session` 中累积。根据当时系统中数据量的多少，内存消耗可能会在某个时候成为问题。为了防止这种情况，在第
    8 行清除了 `session`：


    `8      session.clear()`


    使用 `clear()` 方法清除 `Session` 并不是将对象从 Hibernate 控制中移除的唯一方法。如果您有一个单独的对象，也可以调用 `discard()`
    方法。您甚至可以使用 `*.` 运算符通过此技术丢弃整个对象集合：


    `songs*.discard()`


    这种方法的好处是，虽然 `clear()` 方法会从 `Session` 中移除所有持久化实例，但使用 `discard()` 只会移除您不再需要的实例。这在某些情况下会有所帮助，因为从
    `Session` 中移除对象会导致它们变成游离状态（我们将在“游离对象”一节中更详细地讨论这个主题），从而可能引发 `LazyInitializationException`。

