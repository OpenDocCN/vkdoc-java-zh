- fmt: "### Adding the User Domain Class\n\nTo model users, you’ll need to create\
    \ a `User` domain class that contains personal information such as first name\
    \ and last name, as well as the login and password for each user. To do so, you\
    \ can use the `create-domain-class` command:\n\n`grails create-domain-class com.gtunes.User`\n\
    \nThis will create a new domain class at the location `grails-app/domain/com/gtunes/User.groovy`.\
    \ With that done, you need to populate the `User` domain class with a few properties,\
    \ as shown in [Listing 4-55](#Chapter04.html#list_4_55).\n\n**Listing 4-55.**\
    \ *The User Domain Class*\n\n```\npackage com.gtunes\nclass User {\n    String\
    \ login\n    String password\n    String firstName\n    String lastName\n    static\
    \ hasMany = [purchasedSongs:Song]\n}\n```\n\nAs you can see, the code in [Listing\
    \ 4-56](#Chapter04.html#list_4_56) captures only the basics about users, but you\
    \ could easily expand this information to include an address, contact number,\
    \ and so on. One property to note is the `purchasedSongs` association, which will\
    \ hold references to all the Songs a User buys once you have implemented music\
    \ purchasing.\n\nHowever, before we get too far ahead of ourselves, let’s add\
    \ a few constraints to ensure domain instances stay in a valid state (see [Listing\
    \ 4-56](#Chapter04.html#list_4_56)).\n\n**Listing 4-56.** *Applying Constraints\
    \ to the User Class*\n\n```\nclass User {\n    ...\n    static constraints = {\n\
    \        login blank:false, size:5..15,matches:/[\\S]+/, unique:true\n       \
    \ password blank:false, size:5..15,matches:/[\\S]+/\n        firstName blank:false\n\
    \        lastName blank:false\n    }\n}\n```\n\nWith these constraints in place,\
    \ you can ensure that a user cannot enter blank values or values that don’t fall\
    \ within the necessary size constraints. Also, note the usage of the `unique`\
    \ constraint, which ensures that the `login` property is unique to each user.\
    \ We’ll revisit this in more detail later; for now, let’s focus on login and registration.\n\
    \n### Adding a Login Form\n\nBecause you already have a home page, it might make\
    \ sense to add the login form there. But further down the line, you’ll want to\
    \ allow users to browse the gTunes music catalog anonymously, so users should\
    \ be able to login from anywhere. With this in mind, you need to add a login form\
    \ to the `grails-app/views/layouts/main.gsp` layout so that it’s available on\
    \ every page.\n\n[Listing 4-57](#Chapter04.html#list_4_57) shows the GSP code\
    \ to do so. Note how you can check whether a user already exists in the `session`\
    \ object and display a welcome box or login form, accordingly.\n\n**Listing 4-57.**\
    \ *Adding the Login Form Everywhere*\n\n```\n<div id=\"loginBox\" class=\"loginBox\"\
    >\n  <g:if test=\"${session?.user}\">\n    <div style=\"margin-top:20px\">\n \
    \     <div style=\"float:right;\">\n        <a href=\"#\">Profile</a> | <g:link\
    \ controller=\"user\"\n                                    action=\"logout\">Logout</g:link><br>\n\
    \      </div>\n      Welcome back\n      <span id=\"userFirstName\">\n       \
    \ ${session?.user?.firstName}!\n      </span><br><br>\n\n      You have purchased\
    \ (${session.user.purchasedSongs?.size() ?: 0}) songs.<br>\n    </div>\n  </g:if>\n\
    \  <g:else>\n    <g:form\n      name=\"loginForm\"\n      url=\"[controller:'user',action:'login']\"\
    >\n      <div>Username:</div>\n      <g:textField name=\"login\"\n           \
    \        value=\"${fieldValue(bean:loginCmd, field:'login')}\">\n      </g:textField>\n\
    \      <div>Password:</div>\n      <g:passwordField name=\"password\"></g:passwordField>\
    \    \n      <br/>\n      <input  type=\"image\"\n          src=\"${createLinkTo(dir:'images',\
    \ file:'login-button.gif')}\"\n          name=\"loginButton\" id=\"loginButton\"\
    \ border=\"0\"></input>\n    </g:form>\n    <g:renderErrors bean=\"${loginCmd}\"\
    ></g:renderErrors>\n  </g:else>\n</div>\n```\n\nIn addition to providing a login\
    \ box, you need to provide a link that allows a user to register. Once logged\
    \ in, the user will be able to click through the store to browse and click a “My\
    \ Music” link to view music already purchased. These links won’t display when\
    \ the user isn’t logged in, so instead you can use the screen real estate for\
    \ a prominent link to the registration page. [Listing 4-58](#Chapter04.html#list_4_58)\
    \ shows the registration link added to the `main.gsp` layout.\n\n**Listing 4-58.**\
    \ *Adding a Link to the Registration Page*\n\n```\n    <div id=\"navPane\">\n\
    \      <g:if test=\"${session.user}\">\n        <ul>\n          <li><g:link controller=\"\
    user\"\n                      action=\"music\">My Music</g:link></li>\n      \
    \    <li><g:link controller=\"store\"\n                      action=\"shop\">The\
    \ Store</g:link></li>        \n        </ul>    \n      </g:if>\n      <g:else>\n\
    \        <div id=\"registerPane\">\n          Need an account?\n            <g:link\
    \ controller=\"user\"\n                    action=\"register\">Signup now</g:link>\n\
    \          to start your own personal Music collection!\n        </div>      \
    \      \n      </g:else>\n    </div>\n```\n\nAfter getting the web designers involved\
    \ and making a few Cascading Style Sheets (CSS) tweaks, the home page has gone\
    \ from zero to something a little more respectable (see [Figure 4-3](#Chapter04.html#fig_4_3)).\n\
    \n![Image](images/9781430243779_Fig04-03.jpg)\n\n**Figure 4-3.** *The gTunes home\
    \ page*"
  raw: '#### Adding the User Domain Class


    To model users, you’ll need to create a `User` domain class that contains personal
    information such as first name and last name, as well as the login and password
    for each user. To do so, you can use the `create-domain-class` command:


    `grails create-domain-class com.gtunes.User`


    This will create a new domain class at the location `grails-app/domain/com/gtunes/User.groovy`.
    With that done, you need to populate the `User` domain class with a few properties,
    as shown in [Listing 4-55](#Chapter04.html#list_4_55).


    ***Listing 4-55.** The User Domain Class*


    `package com.gtunes`

    `class User {`

    `    String login`

    `    String password`

    `    String firstName`

    `    String lastName`

    `    static hasMany = [purchasedSongs:Song]`

    `}`


    As you can see, the code in [Listing 4-56](#Chapter04.html#list_4_56) captures
    only the basics about users, but you could easily expand this information to include
    an address, contact number, and so on. One property to note is the `purchasedSongs`
    association, which will hold references to all the Songs a User buys once you
    have implemented music purchasing.


    However, before we get too far ahead of ourselves, let’s add a few constraints
    to ensure domain instances stay in a valid state (see [Listing 4-56](#Chapter04.html#list_4_56)).


    ***Listing 4-56.** Applying Constraints to the User Class*


    `class User {`

    `    ...`

    `    static constraints = {`

    `        login blank:false, size:5..15,matches:/[\S]+/, unique:true`

    `        password blank:false, size:5..15,matches:/[\S]+/`

    `        firstName blank:false`

    `        lastName blank:false`

    `    }`

    `}`


    With these constraints in place, you can ensure that a user cannot enter blank
    values or values that don’t fall within the necessary size constraints. Also,
    note the usage of the `unique` constraint, which ensures that the `login` property
    is unique to each user. We’ll revisit this in more detail later; for now, let’s
    focus on login and registration.


    #### Adding a Login Form


    Because you already have a home page, it might make sense to add the login form
    there. But further down the line, you’ll want to allow users to browse the gTunes
    music catalog anonymously, so users should be able to login from anywhere. With
    this in mind, you need to add a login form to the `grails-app/views/layouts/main.gsp`
    layout so that it’s available on every page.


    [Listing 4-57](#Chapter04.html#list_4_57) shows the GSP code to do so. Note how
    you can check whether a user already exists in the `session` object and display
    a welcome box or login form, accordingly.


    ***Listing 4-57.** Adding the Login Form Everywhere*


    `<div id="loginBox" class="loginBox">`

    `  <g:if test="${session?.user}">`

    `    <div style="margin-top:20px">`

    `      <div style="float:right;">`

    `        <a href="#">Profile</a> | <g:link controller="user"`

    `                                    action="logout">Logout</g:link><br>`

    `      </div>`

    `      Welcome back`

    `      <span id="userFirstName">`

    `        ${session?.user?.firstName}!`

    `      </span><br><br>`


    `      You have purchased (${session.user.purchasedSongs?.size() ?: 0}) songs.<br>`

    `    </div>`

    `  </g:if>`

    `  <g:else>`

    `    <g:form`

    `      name="loginForm"`

    `      url="[controller:''user'',action:''login'']">`

    `      <div>Username:</div>`

    `      <g:textField name="login"`

    `                   value="${fieldValue(bean:loginCmd, field:''login'')}">`

    `      </g:textField>`

    `      <div>Password:</div>`

    `      <g:passwordField name="password"></g:passwordField>    `

    `      <br/>`

    `      <input  type="image"`

    `          src="${createLinkTo(dir:''images'', file:''login-button.gif'')}"`

    `          name="loginButton" id="loginButton" border="0"></input>`

    `    </g:form>`

    `    <g:renderErrors bean="${loginCmd}"></g:renderErrors>`

    `  </g:else>`

    `</div>`


    In addition to providing a login box, you need to provide a link that allows a
    user to register. Once logged in, the user will be able to click through the store
    to browse and click a “My Music” link to view music already purchased. These links
    won’t display when the user isn’t logged in, so instead you can use the screen
    real estate for a prominent link to the registration page. [Listing 4-58](#Chapter04.html#list_4_58)
    shows the registration link added to the `main.gsp` layout.


    ***Listing 4-58.** Adding a Link to the Registration Page*


    `    <div id="navPane">`

    `      <g:if test="${session.user}">`

    `        <ul>`

    `          <li><g:link controller="user"`

    `                      action="music">My Music</g:link></li>`

    `          <li><g:link controller="store"`

    `                      action="shop">The Store</g:link></li>        `

    `        </ul>    `

    `      </g:if>`

    `      <g:else>`

    `        <div id="registerPane">`

    `          Need an account?`

    `            <g:link controller="user"`

    `                    action="register">Signup now</g:link>`

    `          to start your own personal Music collection!`

    `        </div>            `

    `      </g:else>`

    `    </div>`


    After getting the web designers involved and making a few Cascading Style Sheets
    (CSS) tweaks, the home page has gone from zero to something a little more respectable
    (see [Figure 4-3](#Chapter04.html#fig_4_3)).


    ![Image](images/9781430243779_Fig04-03.jpg)


    ***Figure 4-3.** The gTunes home page*'
