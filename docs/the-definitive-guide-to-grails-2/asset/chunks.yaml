    #### 创建 Gant 脚本


    为了帮助你更好地理解，我们来看一个简单的“Hello World”风格示例。使用 `create-script` 命令，创建一个名为 `HelloWorld.groovy`
    的新脚本：


    `grails> create-script HelloWorld`

    `| Created file scripts/HelloWorld.groovy`


    正如预期，你会在项目的 `scripts` 目录下得到一个名为 `HelloWorld.groovy` 的新 Gant 脚本。图 11-1 展示了该脚本的存放位置。


    ![Image](img/9781430243779_Fig11-01.jpg)


    ***图 11-1.** HelloWorld.groovy Gant 脚本*


    Grails 在引用脚本时使用小写字母加连字符分隔的名称（例如 `hello-world`），但在生成脚本文件名时会将其转换为驼峰命名法。清单 11-23
    展示了 图 11-1 中生成的 `HelloWorld.groovy` 脚本的内容。


    ***清单 11-23.** 脚本模板*


    `grailsHome = ant.project.properties."environment.GRAILS_HOME"`

    `includeTargets << grailsScript("_GrailsInit")`


    `target(main: "The description of the script goes here!") {`

    `   // TODO`

    `}`

    `setDefaultTarget(main)`


    如你所见，该模板从 Grails 安装目录下的 `scripts` 文件夹中一个名为 `_GrailsInit.groovy` 的脚本里引入了一些现有功能。然后它定义了一个名为
    `main` 的默认目标。为了完成这个“Hello World”示例，我们使用 `println` 语句来打印一条消息：


    `includeTargets << grailsScript("_GrailsInit")`


    `target(main: "The description of the script goes here!") {`

    `    println ''Hello World!''`

    `}`


    `setDefaultTarget(main)`


    要运行 `hello-world` 脚本，只需使用 `grails` 可执行文件运行以下命令：


    `grails> hello-world`

    `| Environment set to development....`

    `Hello World!`

    `grails>`


    Grails 会搜索之前提到的所有目录，找到 `HelloWorld.groovy` 脚本。由于 `main` 目标是默认目标，Grails 将执行它，并打印出“Hello
    World!”消息。


    当然，拥有完整的 Ant API 意味着你能做的事情远不止打印消息。Ant 及其插件提供了对各种目标的访问，允许你操作文件系统、编译 Java 或 Groovy
    代码、执行 XSLT 转换，以及完成几乎任何你能在命令行中想到的任务。


    ![Image](img/square.jpg) **提示** 如果你还不熟悉 Apache Ant 手册（大多数 Java 开发者都熟悉），不妨看一看（[`http://ant.apache.org/manual/`](http://ant.apache.org/manual/)）。该手册提供了关于
    Ant 功能的全面信息。


    #### 命令行变量


    清单 11-11 中 `HelloWorld.groovy` 导入的 `_GrailsInit.groovy` 脚本提供了许多有用的变量和目标。以下是其中一部分。


    > *   `grailsVersion`：你正在使用的 Grails 版本

    > *   `grailsEnv`：Grails 执行时所处的环境

    > *   `basedir`：表示脚本执行基目录的字符串

    > *   `baseFile`：类似于 `basedir`，但以 `Java.io.File` 对象表示

    > *   `userHome`：当前用户的主目录，以字符串形式表示

    > *   `pluginsHome`：插件安装的位置

    > *   `classesDir`：类文件编译到的位置


    `grailsEnv` 变量值得特别一提。如果你还记得第 2 章的内容，你可以告诉 Grails 在开发、测试或生产环境的上下文中运行。回顾一下，以下命令将使用生产设置执行
    `run-app` 命令：


    `$ grails prod run-app`


    你的脚本可以通过使用 `grailsEnv` 变量来同样感知环境。例如，如果你希望一个 Gant 脚本仅在开发环境中运行，可以编写如下代码：


    `if(grailsEnv ==  ''development'')  {`

    `// do something }`


    其他一些变量，如 `pluginsHome` 和 `classesDir`，是由 Grails 自动构建的。默认情况下，Grails 将插件和一些编译后的资源存储在
    `USER_HOME` 目录下的一个特殊路径中。例如，你可以在 `USER_HOME/.grails/2.0.4/projects/gtunes/plugins`
    目录中找到 gTunes 应用程序的插件相关代码。


    如你所见，Grails 使用 Grails 版本号和项目名称在 `USER_HOME` 目录下构建路径。如果你对这个位置不满意，可以通过在命令行传递 `grails.work.dir`
    参数来告诉 Grails 使用不同的路径：


    `$ grails -Dgrails.work.dir=/tmp run-app`


    事实上，你可以传递大量不同的命令行参数来自定义 Grails 使用的各种位置。


    > *   `grails.work.dir`：所有 Grails 工作（包括测试和源码编译目录）的基础位置

    > *   `grails.project.classes.dir`：项目源码编译到的位置

    > *   `grails.project.resource.dir`：项目静态资源（如 `web.xml`）生成到的位置

    > *   `grails.project.test.class.dir`：测试源码编译到的位置

    > *   `grails.plugins.dir`：插件安装的位置

    > *   `grails.global.plugins.dir`：全局插件安装的位置


    #### 解析命令行参数


    与原始的 Gant 不同，`grails` 命令不支持目标链式调用；相反，它更倾向于轻松传递命令行参数。`Init.groovy` 脚本提供的一个有用的依赖目标是
    `parseArguments` 目标。`parseArguments` 目标会读取所有命令行参数，并生成一个名为 `argsMap` 的变量，以更易访问的形式包含参数的值。


    例如，假设你想让 `HelloWorld.groovy` 脚本能够打印要问候的人的名字，并且可以选择大写或小写输出。你可以允许将名字作为命令行参数传递，并将是否大写输出作为一个命令行标志，如下所示：


    `grails> hello-world John`

    `| Environment set to development....`

    `Hello John`

    `grails> hello-world John -uppercase`

    `| Environment set to development.....`

    `HELLO JOHN`

    `grails>`


    实现这些处理非常简单。清单 11-24 展示了一个更新后的 `HelloWorld.groovy` Gant 脚本，它优雅地处理了这些参数。


    ***清单 11-24.** 处理命令行参数*


    `includeTargets << grailsScript("_GrailsInit")`


    `target(main: "The description of the script goes here!") {`

    `    def message = "Hello ${argsMap.params ? argsMap.params[0] : ''World''}"`

    `    if(argsMap.uppercase) {`

    `        println message.toUpperCase()`

    `    } else {`

    `        println message`

    `    }`

    `}`


    `setDefaultTarget(main)`


    请注意，命令行标志（以 `–` 或 `--` 开头的参数）会作为布尔值放入 `argsMap` 中。清单 11-12 中的示例展示了 `-uppercase`
    标志如何最终成为一个布尔值，其键 `uppercase` 位于 `argsMap` 内部。你也可以使用带值的标志；例如，如果你传递了 `-uppercase=yes`，那么该值将是一个字符串
    `yes`，并存储在 `argsMap` 中。


    所有其他非标志参数都会放在 `params` 键下，作为一个 `List`，并保留它们被传递时的顺序。

