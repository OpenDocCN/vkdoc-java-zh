    ### Specifying Plug-in Locations on the File System


    Several times during this book you have installed plug-ins into the gTunes application,
    something normally done by expressing a dependency in the plug-ins section of
    `BuildConfig.groovy`. This is the most common way to express a dependency on a
    plug-in but not the only way. An application may express a dependency on a plug-in
    from anywhere on the file system, even if the plug-in has never been packaged
    and never been installed into a repository. This is useful for cases where you
    have the source code for the plug-in and may want to be actively developing the
    plug-in while developing the application. The way to express a dependency like
    this is to define a property in `BuildConfig.groovy` where the property name is
    of the form `grails.plugin.location.<plugin name>` and the value assigned to that
    property is a path to the directory on the file system containing the source for
    the plug-in project (see [Listing 12-37](#Chapter12.html#list_12_37)).


    ***Listing 12-37.** Installing the album-art Plug-in into gTunes*


    `grails.plugin.location.''album-art''=''../album-art''`

    `...`

    `grails.project.dependency.resolution = {`

    `    ...`

    `}`


    Note that the value assigned to the property is “`../album-art`”, a relative path;
    that path is relative to the root directory of the gTunes application. For this
    to work, the `album-art` plug-in and the gTunes application directory need to
    share a parent directory. Also, notice that part of the `grails.plugin.location.''album-art''`
    property name is quoted; that is because the name of the plug-in has a hyphen
    in it. A hyphen is not a valid character for an identifier in Groovy; seeing it,
    the compiler thinks that you are trying to do subtraction. Groovy offers a simple
    way around this by quoting the property name that contains the otherwise invalid
    character—namely, the hyphen.


    Now you can start up the gTunes application, and it will behave exactly as before,
    except it is utilizing the `album-art` plug-in’s functionality instead! One thing
    to note about the `album-art` plug-in is that although it provides new functionality
    in the form of services, tag libraries, and new methods, it does not comprise
    an entirely self-contained application. We’ll look at how you can achieve this
    in the next section.'
  trans: '

    #### 通过插件添加行为


    首先，运行 `create-plugin` 命令来创建一个 `album-art` 插件的基础结构：`$ grails create-plugin album-art`。下一步是将
    `AlbumArtService.groovy` 文件和 `AlbumArtTagLib.groovy` 文件移动到新创建的插件项目中。完成后，你的插件结构应如图
    12-3 所示。


    ![图片](img/9781430243779_Fig12-03.jpg)


    ***图 12-3.** album-art 插件的结构*


    请记住，`AlbumArtService` 类使用了由 `rest-client-builder` 插件提供的 `RestBuilder` 类。这个插件依赖需要在
    `album-art` 插件的 `BuildConfig.groovy` 中声明；一旦 `album-art` 插件安装在应用程序中，就可以从应用程序的 `BuildConfig.groovy`
    中移除对 `rest-client-builder` 的依赖。此外，别忘了将覆盖 `AlbumArtService` 和 `AlbumArtTagLib`
    的两个测试从应用程序移动到插件中。如前所述，插件的妙处在于它们可以独立开发和测试，因此对于拥有多个开发人员的大型项目非常有用。将 `AlbumArtServiceTests`
    和 `AlbumArtTagLibTests` 测试用例包含在 `album-art` 插件中后，你现在就可以通过运行 `test-app` 命令立即测试插件是否正常工作。


    一旦测试通过，你就可以将描述插件用途的元数据添加到插件描述符中。清单 12-33 展示了更新后的插件描述符及其元数据。


    ***清单 12-33.** 为 album-art 插件提供元数据*


    `class AlbumArtGrailsPlugin {`

    `    def version = 0.1`

    `    def author = "Joe Someone"`

    `    def authorEmail = "joe@company.com"`

    `    def title = "Album art look-up plugin"`

    `    def description = ''A plug-in that provides facilities to look-up album art''`

    `    ...`

    `}`


    为了进一步增加趣味性，你将进行一些元编程——首先，向所有控制器添加一个 `getAlbumArt` 方法；其次，允许 gTunes 应用程序中的 `Album`
    类实例通过调用 `getArt()` 方法来检索其封面图片。第一种情况，如清单 12-34 所示，展示了必要的代码，它只是获取 `AlbumArtService`
    实例，并向所有控制器添加一个委托给 `AlbumArtService` 的方法。


    ***清单 12-34.** 向所有控制器添加 getAlbumArt 方法*


    `class AlbumArtGrailsPlugin {`

    `    ...`

    `    def doWithDynamicMethods = { ctx ->`

    `        def albumArtService = ctx.getBean("albumArtService")`

    `        application.controllerClasses*.metaClass*.getAlbumArt = { String artist,
    String album ->`

    `            return albumArtService.getAlbumArt(artist, album)`

    `        }`

    `    }`

    `}`


    向 `Album` 类添加 `getArt()` 方法稍微复杂一些，因为插件对 `Album` 类一无所知。因此，为了实现这一增强功能，你将在 `GrailsApplication`
    实例中搜索一个名为 `Album` 的领域类，如果存在，则向其添加 `getArt()` 方法。清单 12-35 展示了 `doWithDynamicMethods`
    插件钩子的修改内容。


    ***清单 12-35.** 向所有控制器添加 getAlbumArt 方法*


    `class AlbumArtGrailsPlugin {`

    `  ...`

    `  def doWithDynamicMethods = { ctx ->`

    `    ...`

    `    def albumClass = application.domainClasses.find { it.shortName == ''Album''
    }`

    `    if(albumClass) {`

    `      albumClass.metaClass.getArt ={->`

    `        albumArtService.getAlbumArt(delegate.artist?.name,`

    `                                    delegate.title)`

    `      }`

    `    }`

    `  }`

    `}`


    请注意，在新的 `getArt` 方法体内，你可以使用闭包的 `delegate` 来获取 `artist` 和 `title`。在此上下文中，闭包的 `delegate`
    属性等同于常规方法中的 `this`。有了清单 12-35 中的代码，你现在就可以使用清单 12-36 所示的代码来获取 `Album` 实例的封面图片 URL。


    ***清单 12-36.** 使用 getArt() 方法获取封面图片*


    `def album = Album.get(10)`

    `println "The art for this album is at ${album.art}"`


    请注意，在 Groovy 中，遵循 Bean 约定的方法可以通过属性访问符号来访问，因此表达式 `album.art` 等同于 `album.getArt()`。至此，你已经完成了
    `album-art` 插件。


    ### 在文件系统上指定插件位置


    在本书中，你已经多次将插件安装到 gTunes 应用程序中，这通常是通过在 `BuildConfig.groovy` 的插件部分声明依赖来完成的。这是声明插件依赖最常见的方式，但并非唯一方式。应用程序可以声明对文件系统上任何位置的插件的依赖，即使该插件从未被打包或安装到仓库中。这对于你拥有插件源代码并希望在开发应用程序的同时积极开发插件的情况非常有用。声明此类依赖的方式是在
    `BuildConfig.groovy` 中定义一个属性，属性名格式为 `grails.plugin.location.<插件名称>`，分配给该属性的值是文件系统上包含插件项目源代码的目录路径（参见清单
    12-37）。


    ***清单 12-37.** 将 album-art 插件安装到 gTunes 中*


    `grails.plugin.location.''album-art''=''../album-art''`

    `...`

    `grails.project.dependency.resolution = {`

    `    ...`

    `}`


    请注意，分配给该属性的值是“`../album-art`”，这是一个相对路径；该路径相对于 gTunes 应用程序的根目录。要使此功能生效，`album-art`
    插件和 gTunes 应用程序目录需要共享一个父目录。另外，请注意 `grails.plugin.location.''album-art''` 属性名的一部分被引用了；这是因为插件名称中包含连字符。连字符在
    Groovy 中不是有效的标识符字符；编译器看到它时会认为你在尝试进行减法运算。Groovy 提供了一种简单的方法来解决这个问题，即引用包含无效字符（即连字符）的属性名。


    现在你可以启动 gTunes 应用程序，它的行为将与之前完全相同，只是它现在使用的是 `album-art` 插件的功能！关于 `album-art` 插件，需要注意的一点是，尽管它以服务、标签库和新方法的形式提供了新功能，但它并非一个完全自包含的应用程序。我们将在下一节中探讨如何实现这一点。

