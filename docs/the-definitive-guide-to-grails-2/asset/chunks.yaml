    Properties such as `author`, `title`, and so on, appear in the `list-plugins`
    and `plugin-info` commands when a plug-in is published to a Grails plug-in repository.
    The following list summarizes the available properties and what they represent:


    > *   `author`: The name of the plug-in author

    > *   `authorEmail`: An e mail contact address for the author

    > *   `title`: A short title for the plug-in to appear in the right column of
    the `list-plugins` command (see [Listing 12-2](#Chapter12.html#list_12_2))

    > *   `description`: A longer, more detailed description that is displayed by
    the `plug-in-info` command

    > *   `documentation`: A link to the location of the documentation for the plug-in


    All the properties in this list are optional; however, providing this information
    will help others understand the purpose of your plug-in. [Listing 12-9](#Chapter12.html#list_12_9)
    shows the `simple-cache` plug-in’s metadata information.


    ***Listing 12-9.** The simple-cache Plug-in Descriptor with Metadata Provided*


    `class SimpleCacheGrailsPlugin {`

    `    // the plugin version`

