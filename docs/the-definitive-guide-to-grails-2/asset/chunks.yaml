    ##### 使用元编程增强行为


    在上一节中，您了解了插件如何参与 Spring `ApplicationContext` 的配置。现在，让我们看看插件通常贡献的另一个领域：应用程序行为。Groovy
    是一种完全动态的语言，允许您通过其元编程 API 在运行时完全修改类的行为。


    ![Image](img/square.jpg) **提示** 如果您想要一本详细介绍 Groovy 元编程能力的书籍，请参阅 Venkat Subramaniam
    所著的 *Programming Groovy*（Pragmatic Programmers，2008 年）。


    与 Smalltalk、Ruby、Lisp 和其他动态语言一样，Groovy 具有（元对象协议 MOP）。需要记住的关键点是，MOP 在运行时决定了 Groovy
    代码的行为，因此在编译时看似执行一种操作的代码，可能被修改为执行完全不同的操作。对于 Groovy 知道的每个 `java.lang.Class`，都有一个关联的
    `MetaClass`。`MetaClass` 决定了特定方法、构造函数或属性在运行时的行为方式。


    Groovy 的 `MetaClass` 允许您向任何类添加方法、属性、构造函数和静态方法。例如，请考虑清单 12-24 中的代码。


    ***清单 12-24.** 向类添加新方法*


    `class Dog {}`

    `Dog.metaClass.bark = { "woof!" }`

    `assert "woof!" == new Dog().bark()`


    这里有一个名为 `Dog` 的简单类。`Dog` 类的实例本身无法吠叫。但是，通过使用 `MetaClass`，您可以使用以下表达式创建一个 `bark`
    方法：


    `Dog.metaClass.bark = { "woof!" }`


    显然，这个例子只是触及了可能性的表面。Groovy 提供了大量与运行时元编程相关的功能，所有这些功能在 Grails 应用程序的上下文中都是可用的。


    让我们通过尝试向所有控制器添加 `cacheOrReturn` 方法，以消除首先通过 Spring 注入服务的需要，来看一个 Grails 插件上下文中的示例。清单
    12-25 演示了如何通过简单地委托给 `CacheService`，也可以向所有控制器添加一个 `cacheOrReturn` 方法。


    ![Image](img/square.jpg) **提示** 如果您不想创建插件，但仍希望在 Grails 应用程序中进行元编程，我们建议您在 `Bootstrap`
    类中执行此操作，这是第 12 章中涵盖的主题。


    ***清单 12-25.** 向所有控制器添加方法*


    `class SimpleCacheGrailsPlugin {`

    `    ...`

    `    def doWithDynamicMethods = { applicationContext ->`

    `        def cacheService = applicationContext.getBean("cacheService")`

    `        application.controllerClasses*.metaClass*.cacheOrReturn = {`

    `            Serializable cacheKey, Closure callable ->`


    `            cacheService.cacheOrReturn(cacheKey, callable)`

    `        }`

    `    }`

    `}`


    关于清单 12-25 中的代码，另一个需要注意的重要方面是使用了 Groovy 的展开点运算符 `*.` 来从所有 `controllerClasses`
    中获取所有 `MetaClass` 实例，以及使用展开赋值来为每个 `MetaClass` 创建一个 `cacheOrReturn` 方法。这比添加 `for`
    或 `each` 循环要简单得多！


    #### 插件事件与应用程序重载


    除了“插件钩子”部分讨论的插件钩子之外，插件还可以参与许多事件，包括应用程序重载事件。Grails 旨在最大限度地减少开发期间所需的应用程序重启次数。然而，由于重载通常因每种工件类型而异，因此重载的责任被委托给了插件。


    一个插件基本上可以监听三个核心事件：`onChange`、`onConfigChange` 和 `onShutdown`。让我们先看看 `onChange`，因为它是插件处理的最常见事件。每个单独的插件都可以监视一组资源。这些资源由一个名为
    `watchedResources` 的属性定义。例如，作为 Grails 核心的一部分，有一个插件通过使用 `grails-app/i18n` 目录中的消息包来提供国际化支持（在第
    7 章中介绍）。`i18n` 插件将其 `watchedResources` 属性定义如下：


    `def watchedResources = "file:./grails-app/i18n/*.properties"`


    这意味着 `i18n` 插件将监视 `grails-app/i18n` 目录中所有以 `.properties` 文件扩展名结尾的文件。


    ![Image](img/square.jpg) **提示** 如果您想知道 `watchedResources` 属性使用的文件匹配模式，请查看 Spring
    的 `org.springframework.core.io.support.PathMatchingResourcePatternResolver` 类，以及一般的
    Spring Core IO 包，Grails 在底层使用了这些。


    每当 `grails-app/il8n` 目录中的某个属性文件发生更改时，Grails 将自动触发监视该文件的插件的 `onChange` 事件，并传入一个更改
    `event` 对象。`event` 对象本质上只是一个包含以下条目的映射：


    > *   `source`：事件的来源，可以是代表磁盘上文件的 Spring `org.springframework.core.io.Resource`
    实例，也可以是重新编译并更改后的 `Java.lang.Class` 实例（如果 `watchResources` 属性引用的是 Groovy 类）

    > *   `application`：对 `GrailsApplication` 实例的引用

    > *   `manager`：对 `GrailsPluginManager` 实例的引用

    > *   `ctx`：对 Spring `ApplicationContext` 实例的引用


    通常，`event` 映射中最重要的条目是 `source`，它包含对更改来源的引用。对于 `i18n` 插件，`source` 条目将引用一个 Spring
    `org.springframework.core.io.Resource` 实例，因为 `i18n` 插件监视的属性文件不是 Groovy 类。但是，如果您开发的插件选择监视
    Groovy 类，Grails 将自动重新编译更改后的类，并将更改后的类放入 `event` 映射的 `source` 条目中。


    考虑前面章节讨论的 Quartz 插件。该插件的 `watchedResources` 定义如下所示：


    `def watchedResources = "file:./grails-app/jobs/**/*Job.groovy"`


    每当某个 Groovy 文件发生更改时，Grails 将重新编译该类，并向您传递一个代表该任务的 `java.lang.Class` 实例的引用。然而，这就是
    Grails 所做的全部工作。然后，您需要自行对正在运行的应用程序进行任何您认为必要的更改，以确保其处于正确的状态。例如，在“使用约定的动态 Spring
    Bean”部分中，您看到了如何为每个任务类动态注册新的 `JobDetail` bean。为了正确实现 Quartz 插件的重载，您需要确保这些 bean
    被新类替换。清单 12-26 展示了一个假设的实现，该实现获取新重新编译的类，并使用 `ApplicationContext` 注册新的 bean。


    ***清单 12-26.** 为 Quartz 插件实现 onChange*

    '
- fmt: "`class QuartzGrailsPlugin {`\n`    def watchedResources = \"file:./grails-app/jobs/**/*Job.groovy\"\
    `\n`    ...`\n`    def onChange = { event ->`\n`        Class changedJob = event.source`\n\
    `        GrailsClass newJobClass = application.addArtefact(changedJob)`\n`   \
    \     def newBeans = beans {`\n`            \"${newJobClass.propertyName}\"(JobDetailBean)\
    \ {`\n`                name = newJobClass.name`\n`                jobClass = newJobClass.getClazz()`\n\
    `            }`\n`        }`\n`        newBeans.registerBeans(applicationContext)`\n\
    `    }`\n`}`\n\nAlthough the code is pretty short, it has quite a few new concepts\
    \ to understand. Let’s walk through them starting on line 6, where a reference\
    \ to the event’s `source` is obtained:\n\n`6 Class changedJob = event.source`\n\
    \nWith the `source` in hand, the next thing the `onChange` event does is register\
    \ the new `Class` with the `GrailsApplication` instance by calling the `addArtefact`\
    \ method:\n\n`7      GrailsClass newJobClass = application.addArtefact(changedJob)`\n\
    \nThe code on line 8 is pretty interesting. Here the implicit `beans` method is\
    \ used; it takes a block of code that uses the `BeanBuilder` syntax discussed\
    \ in the “Providing Spring Beans” section. The `beans` method returns a `BeanBuilder`\
    \ instance containing the bean definitions (but not the instantiated beans themselves):\n\
    \n`8      def newBeans = beans {`\n\nThe code on lines 8 to 13 is essentially\
    \ the same as that in [Listing 12-26](#Chapter12.html#list_12_26); all the code\
    \ does is create a new `JobDetailBean` bean definition from the new class. Line\
    \ 14 is far more interesting; it shows how to use the `registerBeans` method of\
    \ the `BeanBuilder` class to register all the bean definitions defined within\
    \ the `BeanBuilder` instance with the provided `ApplicationContext`:\n\n`14 newBeans.registerBeans(applicationContext)`\n\
    \nOf course, not all plug-ins will need to register new beans based on an `onChange`\
    \ event. This is a requirement only if in the `doWithSpring` closure you registered\
    \ beans that require reloading behavior. It may be possible to work with the existing\
    \ beans to implement effective reloading for a plug-in. For example, the i18n\
    \ plug-in discussed earlier simply clears the `MessageSource` cache, forcing it\
    \ to be rebuilt:\n\n```\ndef messageSource = applicationContext.getBean(\"messageSource\"\
    )\nif (messageSource instanceof ReloadableResourceBundleMessageSource) {\n   \
    \ messageSource.clearCache()\n}\n```\n\nOther than the `onChange` event, the two\
    \ other events available are `onConfigChange` and `onShutdown`. The `onConfigChange`\
    \ event is fired if the Grails global configuration file, found at `grails-app/conf/Config.groovy`,\
