    ##### 自动化部署至 Tomcat


    借助 Tomcat 自带的构建目标（参见 [`http://tomcat.apache.org/tomcat-7.0-doc/manager-howto.html`](http://tomcat.apache.org/tomcat-7.0-doc/manager-howto.html)），在
    Ant 中编写 Tomcat 部署脚本相当简单。不过，在开始本示例之前，你需要确保已安装 Tomcat，并将 `TOMCAT_HOME` 设置为其安装路径。然后按如下方式运行
    `grails create-script` 命令：


    `$ grails create-script tomcat-deploy`


    完成上述步骤后，你的项目 `scripts` 目录下应出现一个 `TomcatDeploy.groovy` 文件，如图 11-2 所示。


    ![图片](img/9781430243779_Fig11-02.jpg)


    ***图 11-2.** TomcatDeploy.groovy 脚本*


    `TomcatDeploy.groovy` 脚本模板与你之前看到的 `HelloWorld.groovy` 模板完全相同。首先，你需要确定 Tomcat 安装目录的路径。检查
    `TOMCAT_HOME` 环境变量可以帮助你实现这一点：


    `grailsHome = ant.project.properties."environment.GRAILS_HOME"`

    `tomcatHome = ant.project.properties."environment.TOMCAT_HOME"`


    在获取 Tomcat 目录信息后，下一步是引入 `GRAILS_HOME/scripts` 目录下的 `War.groovy` 脚本。`_GrailsWar.groovy`
    模板包含一些构建目标，可让你构建一个有效的 WAR 文件：


    `includeTargets << grailsScript("_GrailsWar")`


    要利用 Tomcat 的 Ant 任务，你需要通过调用 `taskdef` 方法来定义它们。此方法对应 Ant 的 `<taskdef>` 目标，因此在 Gant
    中定义 Ant 任务与在纯 Ant 中定义几乎完全相同——只是少了尖括号：


    `ant.path(id:"tomcat.lib.path") {`

    `   fileset(dir:"${tomcatHome}/server/lib",includes:"*.jar")`

    `}`

    `ant.taskdef(name:"deploy",`

    `            classname:"org.apache.catalina.ant.DeployTask",`

    `            classpathref:"tomcat.lib.path")`


    如你所见，唯一棘手的部分是确保使用 Tomcat 安装目录中的 JAR 文件，将 `DeployTask` 类所需的所有 JAR 文件正确地添加到类路径中。这是通过使用名为
    `classpathref` 的命名参数和预定义的 Ant 路径 `tomcat.lib.path` 来完成的。


    接下来，转到 `TomcatDeploy.groovy` 脚本的 `main` 目标，你可以将其修改为依赖于 `war` 目标，这将确保在其余代码运行之前构建一个有效的
    WAR 文件：


    `target(main: "将 Grails 应用程序部署到 Tomcat") {`

    `    depends war`

    `    ...`

    `}`


    完成后，你需要确定发布 WAR 文件的目标地址。例如，你可以将目标地址作为命令的第一个参数，否则默认使用 `localhost`：


    `def dest = argsMap.params ? argsMap.params[0] : "http://localhost:8080/manager"`


    完成后，剩下的工作就交给 `org.apache.catalina.ant.DeployTask` 类提供的 `deploy` 目标：


    `deploy(war:warName, url:dest,`

    `path:serverContextPath, username:"deployer", password:"secret")`


    `warName` 和 `serverContextPath` 变量由 `War.groovy` 脚本设置，你可以在此处复用。部署目标还要求你在部署到 Tomcat
    时传递 `username` 和 `password` 参数。假设你本地有一个正在运行的 Tomcat 实例，如果现在运行 `tomcat-deploy`
    目标，你很可能会收到类似如下的 401 错误：


    `java.io.IOException: Server returned HTTP response code: 401 for URL: http://localhost:8080/`

    `manager/deploy?path=%2FgTunes`


    原因是当前 Tomcat 没有注册名为 `deployer`、密码为 `secret` 的用户。要解决此问题，你需要编辑 `TOMCAT_HOME/conf/tomcat-users.xml`
    文件，并添加一个有权访问 Tomcat `manager` 应用程序的用户，如清单 11-27 所示。


    ***清单 11-27.** 添加 Tomcat 部署者*


    `<?xml version=''1.0'' encoding=''utf-8''?>`

    `<tomcat-users>`

    `   ...`

    `   <user username="deployer" password="secret" roles="standard,manager"/>`

    `</tomcat-users>`


    添加必要的 Tomcat 用户后，当你运行 `tomcat-deploy` 脚本时，Grails 将成功将你的应用程序部署到 Tomcat，如清单 11-28
    所示。


    ***清单 11-28.** 部署到 Tomcat*


    `$ grails tomcat-deploy ...`

    `Done creating WAR /Developer/grails-dev/book/dgg/code/ch12/gTunes-0.1.war [deploy]
    OK - Deployed`

    `application at context path /gTunes`


    当然，你可以进一步扩展，编写另一个 `tomcat-undeploy` 脚本，或者将它们合并到两个脚本中。不过，清单 11-29 展示了 `TomcatDeploy.groovy`
    脚本的完整代码。


    ***清单 11-29.** TomcatDeploy.groovy 脚本*


    `grailsHome = ant.project.properties."environment.GRAILS_HOME"`

    `tomcatHome = ant.project.properties."environment.TOMCAT_HOME"`


    `includeTargets << grailsScript("War")`


    `ant.path(id:"tomcat.lib.path") {`

    `    fileset(dir:"${tomcatHome}/server/lib",includes:"*.jar")`

    `}`

    `ant.taskdef(name:"deploy",`

    `                   classname:"org.apache.catalina.ant.DeployTask",`

    `                   classpathref:"tomcat.lib.path")`

    `target(main: "将 Grails 应用程序部署到 Tomcat") {`

    `    depends(parseArguments, war)`

    `    def dest = argsMap.params ? argsMap.params[0] : "http://localhost:8080/manager"`


    `    deploy(war:warName,`

    `           url:dest,`

    `           path:serverContextPath,`

    `           username:"deployer",`

    `           password:"secret")`

    `}`

    `setDefaultTarget(main)`

