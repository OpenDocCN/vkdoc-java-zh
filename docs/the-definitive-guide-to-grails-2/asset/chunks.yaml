    #### 保存、更新与删除


    正如您已经看到的，可以通过调用 `save()` 方法来持久化对象。例如，代码清单 9-4 中的代码演示了如何在验证成功后持久化 `Album` 类的一个实例。


    ***代码清单 9-4.** 保存实例*


    `def album = new Album(params)`

    `album.save()`


    关于 GORM 如何将对象持久化到数据库，我们将在本章后面的“GORM 的语义”中详细说明。目前，您只需要知道，在某个时刻，底层的 Hibernate 引擎会执行一条
    SQL `INSERT` 语句，将 `Album` 实例持久化到数据库中。更新对象的过程非常相似；只需对现有的持久化实例调用相同的 `save()` 方法，如代码清单
    9-5 所示。


    ***代码清单 9-5.** 更新实例*


    `def album = Album.get(1)`

    `album.title = "The Changed Title"`

    `album.save()`


    当调用 `save()` 方法时，Hibernate 会自动判断应该执行 SQL `INSERT` 还是 SQL `UPDATE`。在某些较旧的数据库上，Hibernate
    偶尔可能会判断错误，在应该执行 `INSERT` 时却执行了 `UPDATE`。您可以通过向 `save()` 方法传递一个显式的 `insert` 参数来解决这个问题：


    `album.save(insert:true)`


    至于删除对象，则通过 `delete()` 方法完成：


    `album.delete()`


    这些都是基础内容。接下来，您将更详细地了解 GORM 中的关联及其工作原理。


    ### 关联


    第 3 章 已经提供了一些关于 GORM 关联不同形式的细节，但 GORM 支持的关联远不止于此。在典型的一对多关联中，例如 `Album` 类的 `songs`
    属性，其类型是 `java.util.Set`。如果您还记得，根据 javadoc 的定义，`Set` 的语义不允许重复且没有顺序。然而，您可能希望关联具有特定的顺序。


    一种选择是使用 `SortedSet`，这要求您为放入 `SortedSet` 的任何项实现 `Comparable` 接口。例如，代码清单 9-6 展示了如何按
    `trackNumber` 属性对曲目进行排序。


    ***代码清单 9-6.** 使用 SortedSet 对关联进行排序*


    `class Album {`

    `    ...`

    `    SortedSet songs`

    `}`

    `class Song implements Comparable {`

    `    ...`

    `    int compareTo(o) {`

    `        if(this.trackNumber > o.trackNumber) {`

    `            return 1`

    `        } else if(this.trackNumber < o.trackNumber) {`

    `            return -1`

    `        }`

    `        return 0`

    `    }`

    `}`


    或者，您可以使用第 3 章 中介绍的 `mapping` 属性来声明式地指定排序顺序。例如，如果您希望所有查询都按曲目编号对 `Song` 实例进行排序，可以使用
    `sort` 方法：


    `class Song {`

    `    ...`

    `    static mapping = {`

    `        sort "trackNumber"`

    `    }`

    `}`


    您可能不希望每个查询或关联都按 `trackNumber` 属性排序，在这种情况下，您可以仅对 `Album` 类的 `songs` 关联应用排序：


    `static mapping = {`

    `    songs sort: "trackNumber"`

    `}`


    另一种改变排序方式的方法是使用不同的集合类型，例如 `java.util.List`。与 `Set` 不同，`List` 允许重复并保留对象放入 `List`
    的顺序。为了支持 `List` 关联，Hibernate 使用一个特殊的索引列，该列包含 `List` 中每个项的索引。代码清单 9-7 展示了在 `songs`
    关联中使用 `List` 的示例。


    ***代码清单 9-7.** 使用 List 关联*


    `class Album {`

    `    ...`

    `    List songs`

    `}`


    `Set` 关联没有顺序的概念，但使用 `List` 您可以索引到特定的条目；例如：


    `println album.songs[0]`


    GORM 也支持将关联存储在 Hibernate Bag 中。Bag 不一定有序，也不保证唯一性；因此，它在许多情况下可能性能更好。要使用 Bag，请像代码清单
    9-7 中声明 `List` 那样声明属性，但使用 `java.util.Collection` 类型代替 `java.util.List`。


    最后，GORM 还支持键为 `String` 的 `Map` 关联。只需将代码清单 9-7 示例中的类型从 `List` 改为 `Map`，并使用 `String`
    代替 `Integer` 来访问条目即可。对于 `List` 和 `Map` 这两种集合类型，Grails 都会创建一个索引列。对于 `List`，索引列保存一个数值，表示其在
    `List` 中的位置；而对于 `Map`，索引列保存 `Map` 的键。


    #### 关系管理方法


    除了让您能够将关联映射到数据库之外，GORM 还自动为您提供了管理这些关联的方法。`addTo*` 和 `removeFrom*` 动态方法允许您向关联中添加和移除条目。此外，这两个方法都会返回它们被调用的实例，从而允许您链式调用方法。代码清单
    9-8 展示了使用 `Album` 类的 `addToSongs` 方法的示例。


    ***代码清单 9-8.** 使用关系管理方法*


    `new Album(title:"Odelay",`

    `          artist:beck,`

    `          year:1996)`

    `            .addToSongs(title:"Devil''s Haircut",`

    `                        artist:beck, duration:342343)`

    `            .addToSongs(title:"Hotwax", artist:beck, duration:490583)`

    `            ...`

    `            .save()`


    从示例中可以看出，您可以将 `Song` 的值作为命名参数传递给 `addToSongs` 方法；GORM 会自动实例化一个新实例并将其添加到 `songs`
    关联中。或者，如果您已经有一个 `Song` 实例，可以直接将其传递给 `addToSongs` 方法。


    #### 传递性持久化


    每当您在 GORM 中保存、更新或删除一个实例时，该操作可以级联到任何关联的对象。GORM 中的默认级联行为由 `belongsTo` 属性决定，该属性首次在第
    3 章 中讨论。例如，如果 `Song` 类 `belongsTo` `Album` 类，那么每当一个 `Album` 实例被删除时，所有关联的 `Song`
    实例也会被删除。如果关联中没有 `belongsTo` 定义，则保存和更新会级联，但删除不会。


    如果您需要对级联行为进行更多控制，可以使用 `mapping` 块的 `cascade` 方法进行自定义，如代码清单 9-9 所示。


    ***代码清单 9-9.** 自定义级联行为*


    `class Album {`

    `    ...`

    `    static mapping = {`

    **`        songs cascade:''save-udpate''`**

    `    }`

    `}`


    存在一种特殊的级联样式 `delete-orphan`，用于当子对象从关联中移除但未显式删除时，您希望将其删除。


    ![Image](img/square.jpg) **提示** 有关可用级联选项的信息，请参阅 Hibernate 文档中的相关章节：[`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive)。

    '
- fmt: '### Querying


    Pretty much every nontrivial application will need to query persistent data. With
    the underlying storage medium of choice being the database, the typical way to
    achieve this historically has been with SQL. Relational database systems, with
    their tables and columns, are significantly different enough from Java objects
    that abstracting data access has been a long-term struggle for many an ORM vendor.


    Hibernate provides an elegant enough Java API for querying objects stored in a
    database, but GORM moves up to the next level by completely abstracting the bulk
    of data access logic. Don’t expect to see many dependencies on the `org.hibernate`
    package in your codebase, because GORM nicely abstracts the details of interaction
    with Hibernate. In the next few sections, we’ll cover the different ways you can
    query with GORM, from dynamic finders to criteria GORM.


    Note that while relational database systems are the most common type of database
    for Grails applications, there are numerous so-called NoSQL databases gaining
    popularity and GORM has great support for dealing with many of these. MongoDB
    is one of the more popular. See [`http://grails.org/plugin/mongodb`](http://grails.org/plugin/mongodb)
    for more information about using GORM with MongoDB.


    #### Dynamic Finders


    Dynamic finders are among the most powerful concepts of GORM; as with the previously
    mentioned `listOrderBy*` method, they use the property names of the class to perform
    queries. However, they are even more flexible than this, because they allow logical
    queries such as `And`, `Or`, and `Not` to form so-called method expressions. There
    can be hundreds of combinations for any given class, but, again, they’re fairly
    simple to remember if you know the convention. Let’s look at an example of the
    `findBy*` method first (see [Figure 9-1](#Chapter09.html#fig_9_1)), which locates
    a unique instance for the specified method expression.


    ![Image](images/9781430243779_Fig09-01.jpg)


    **Figure 9-1.** Basic dynamic finder syntax


    The diagram uses the `title` and `genre` properties to look up an `Album` instance.
    There is a logical `And` expression in the middle to ensure both values need to
    be equal in the query. This could be replaced with a logical `Or` to look up an
    `Album` that either has a `title` of `Beck` or has a `genre` of `Alternative`.


    We have, however, only brushed on what is possible with dynamic finders and method
    expressions. Dynamic finders support a wide range of expressions that allow `GreaterThan`,
    `LessThan`, `Like`, and `Between` queries, to name just a few, simply by appending
    an additional expression on the end of the property name. [Listing 9-10](#Chapter09.html#list_9_10)
    shows some of these in action.


    **Listing 9-10.** Dynamic Finders in Action


    ```

    // retrieve an album where the title contains ''Shake''

    def album = Album.findByTitleLike(''%Shake%'')


    // get an album created in last 10 days

    def today = new Date()

    def last10Days = Album.findByDateCreatedBetween(today-10,today)


    // first album that is not ''Rock''

    def somethingElse = Album.findByGenreNotEqual(''Rock'')

    ```


    [Table 9-1](#Chapter09.html#tab_9_1) illustrates all the possible expressions
    that can be appended, the number of arguments they expect, and an example of each
    in action.


    ![Image](images/tab_9_1.jpg)


    The `findBy*` method has two cousins that accept the same method expressions you’ve
    already seen. The first is `findAllBy*`, which retrieves all the instances that
    match the method expression as a `java.util.List`. Finally, there is the `countBy*`
    method, which returns the total number of instances found by the method expression
    as an integer. It is worth opening up the Grails console, by typing `grails console`
    in a command window, and playing with these methods to experiment with the different
    combinations and discover just how easy they are to use.


    You’ll find that GORM’s dynamic finders pretty much eliminate the need for a Data
    Access Object (DAO) layer, which you typically need in Java applications. Remember
    those? No? OK, well, the process is something like this:


    > 1.  Define an interface for the data access logic. The signatures will look
    strikingly like the dynamic finder methods you’ve seen so far.

    > 2.  Implement the interface using a Java class.

    > 3.  Use Spring (or your IoC container of choice) to wire in dependencies, such
    as the data source or Hibernate `Session`.


    If you think about it, data access logic is extremely repetitive and heavily violates
    the DRY principles Grails is founded on. Luckily, with GORM and its dynamic finders,
    you can forget the DAO.


    In the next section, you’ll explore how Grails makes criteria more accessible
    via concise builder syntax.'
