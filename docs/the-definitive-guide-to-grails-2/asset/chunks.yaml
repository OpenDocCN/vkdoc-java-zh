- fmt: "### Stack Trace Filtering\n\nWhenever an exception is thrown in Grails, the\
    \ exception’s stack trace will be filtered of all Groovy and Grails internals\
    \ before it is logged. This is very useful because it allows you to narrow the\
    \ problem down to how it relates to your code. Otherwise, with all the internal\
    \ layers of Grails exposed, you could be sifting through a rather large stack\
    \ trace.\n\nNormally, when an exception is thrown in development, you can work\
    \ out from the filtered trace what the problem is. On a rare occasion, you may\
    \ want to inspect the full nonfiltered stack trace. Grails, by default, sets up\
    \ a special logger to which it will log the full stack trace. This logger writes\
    \ to a file called `stacktrace.log` in the root of your project.\n\nHowever, you\
    \ can quite easily override this default behavior to provide your own custom logger\
    \ for unfiltered stack traces. [Listing 11-7](#Chapter11.html#list_11_7) shows\
    \ an example configuration that logs all unfiltered stack traces to a rolling\
    \ file appender.\n\n**Listing 11-7.** Logging Unfiltered Traces\n\n```\nlog4j\
    \ {\n    appenders {\n        rollingFile name:\"stacktraceLog\",\n          \
    \          file:\"/var/log/unfiltered-stacktraces.log\",\n                   \
    \ maxFileSize:\"1MB\",\n                    layout: pattern(conversionPattern:\
    \ '%c{2} %m%n')\n    }\n    error stacktraceLog:\"StackTrace\"\n```\n\nYou can\
    \ also disable this functionality completely by passing the `grails.full.stacktrace`\
    \ argument at the command line of your container or as an argument to the `run-app`\
    \ command:\n\n```\ngrails -Dgrails.full.stacktrace=true run-app\n```\n\n### Externalized\
    \ Configuration\n\nDuring deployment, the `Config.groovy` file is compiled into\
    \ a class and packaged into the WAR. Although this has its advantages, you may\
    \ want to keep all configuration outside the main WAR file. For example, say you\
    \ wanted to allow logging to be configured outside the application; to achieve\
    \ this, you can use the externalized configuration mechanism in Grails.\n\nEssentially,\
    \ within `Config.groovy` you can specify the `grails.config.locations` setting\
    \ to contain a list of locations that need to be merged into the main configuration.\
    \ Taking the logging example, [Listing 11-8](#Chapter11.html#list_11_8) shows\
    \ how to externalize the logging configuration to a file in the `USER_HOME` directory.\n\
    \n**Listing 11-8.** Using Externalized Configuration\n\n```\ngrails.config.locations\
    \ = [\"file:${userHome}/gtunes-logging.groovy\"]\n```\n\nYou can even allow the\
    \ `DataSource` to be configured externally using this mechanism. Although `DataSource.groovy`\
    \ and `Config.groovy` are separate files on the file system, Grails merges them\
    \ into a single logical configuration object. Hence, you can externalize, not\
    \ just logging or any other configuration, but the `DataSource`, as shown in [Listing\
    \ 11-9](#Chapter11.html#list_11_9).\n\n**Listing 11-9.** Externalizing DataSource\
    \ Configuration\n\n```\ngrails.config.locations = [\"file:${userHome}/.settings/gtunes-logging.groovy\"\
    ,\n                           \"file:${userHome}/.settings/gtunesdatasource.groovy\"\
    ]\n```\n\nIf you prefer, you can also use static properties files in externalized\
    \ configuration. Just use the extension `.properties` when referring to the files,\
    \ and use regular `java.util.Properties` file semantics for configuration.\n\n\
    ### Declaring Dependencies\n\nDependency management for web applications can be\
    \ tedious and complicated. Fortunately, Grails provides a sophisticated but easy-to-use\
    \ dependency management system that allows you to express your dependencies in\
    \ one place, in a declarative way, with minimal configuration. Grails will take\
    \ it from there. You have already taken advantage of this numerous times up to\
    \ this point when modifying `BuildConfig.groovy` to express dependencies on plug-ins.\n\
    \nIn this section we will take a closer look at all of the options available in\
    \ `BuildConfig.groovy`. Let’s start by taking a look at the `BuildConfig.groovy`\
    \ file that is in gTunes now. See the code in [Listing 11-10](#Chapter11.html#list_11_10).\n\
    \n**Listing 11-10.** BuildConfig.groovy\n\n```\ngrails.project.class.dir = \"\
    target/classes\"\ngrails.project.test.class.dir = \"target/test-classes\"\ngrails.project.test.reports.dir\
    \ = \"target/test-reports\"\ngrails.project.target.level = 1.6\ngrails.project.source.level\
    \ = 1.6\n//grails.project.war.file = \"target/${appName}-${appVersion}.war\"\n\
    \ngrails.project.dependency.resolution = {\n    // inherit Grails' default dependencies\n\
    \    inherits(\"global\") {\n        // uncomment to disable ehcache\n       \
    \ // excludes 'ehcache'\n    }\n    log \"error\" // log level of Ivy resolver,\
    \ either 'error', 'warn', 'info', 'debug' or 'verbose'\n    checksums true //\
    \ Whether to verify checksums on resolve\n\n    repositories {\n        inherits\
    \ true // Whether to inherit repository definitions from plugins\n        grailsPlugins()\n\
    \        grailsHome()\n        grailsCentral()\n        mavenCentral()\n\n   \
    \     // uncomment these to enable remote dependency resolution from public Maven\
    \ repositories\n        //mavenLocal()\n        //mavenRepo \"http://snapshots.repository.codehaus.org\"\
    \n        //mavenRepo \"http://repository.codehaus.org\"\n        //mavenRepo\
    \ \"http://download.java.net/maven/2/\"\n        //mavenRepo \"http://repository.jboss.com/maven2/\"\
    \n    }\n    dependencies {\n        // specify dependencies here under either\
    \ 'build', 'compile', 'runtime', 'test', or 'provided' scopes, e.g.\n\n      \
    \  runtime 'mysql:mysql-connector-java:5.1.21'\n    }\n\n    plugins {\n     \
    \   runtime \":hibernate:$grailsVersion\"\n        runtime \":jquery:1.7.1\"\n\
    \        runtime \":resources:1.1.6\"\n        runtime \":searchable:0.6.4\"\n\
    \        compile \":cache:1.0.0\"\n        compile \":rest-client-builder:1.0.2\"\
    \n\n        // Uncomment these (or add new ones) to enable additional resources\
    \ capabilities\n        //runtime \":zipped-resources:1.0\"\n        //runtime\
    \ \":cached-resources:1.0\"\n        //runtime \":yui-minify-resources:0.1.4\"\
    \n\n        build \":tomcat:$grailsVersion\"\n    }\n}\n```\n\nIt may look like\
    \ there is a lot going on there, but don’t be intimidated. We will break this\
    \ down into a few easy-to-deal-with pieces.\n\nThe first few lines in the file\
    \ define a number of properties: `grails.project.class.dir`, `grails.project.test.class.dir`,\
    \ and `grails.project.test.reports.dir`. These settings tell the Grails build\
    \ system where to put generated artefacts like class files and test reports. The\
    \ default values represented there put all of those things in a directory named\
    \ `target`. Those values are all relative to the project root directory. If you\
    \ want to specify a fully qualified path to some other location, that works just\
    \ as well:\n\n```\ngrails.project.class.dir='/Development/artefacts/gtunes/classes/'\n\
    ```\n\nThe next couple of properties are `grails.project.target.level` and `grails.project.source.level`,\
    \ which default to 1.6. Those settings tell the Grails compiler that your source\
    \ code should be compatible with Java 1.6 and that the compiler should generate\
    \ 1.6 compatible byte code. If you are deploying to a container that uses Java\
    \ 1.5, then set the target level accordingly.\n\nSo far, none of the foregoing\
    \ is really about dependency management. They are all configurations that affect\
    \ the build. The rest of the file is all about dependency management.\n\nThe rest\
    \ of the file is all code defined inside of a closure, which is assigned to the\
    \ `grails.project.dependency.resolution` property. Most of that code falls into\
    \ one of four categories: inherits, repositories, dependencies, and plug-ins (see\
    \ [Listing 11-11](#Chapter11.html#list_11_11)).\n\n**Listing 11-11.** Sections\
    \ in BuildConfig.groovy\n\n```\ngrails.project.dependency.resolution = {\n   \
    \ inherits(\"global\") {\n        ...\n    }\n    repositories {\n        ...\n\
    \    }\n    dependencies {\n        ...\n    }\n    plugins {\n        ...\n \
    \   }\n}\n```\n\nLet’s examine each of those."
  raw: '#### Stack Trace Filtering


    Whenever an exception is thrown in Grails, the exception’s stack trace will be
    filtered of all Groovy and Grails internals before it is logged. This is very
    useful because it allows you to narrow the problem down to how it relates to your
    code. Otherwise, with all the internal layers of Grails exposed, you could be
    sifting through a rather large stack trace.


    Normally, when an exception is thrown in development, you can work out from the
    filtered trace what the problem is. On a rare occasion, you may want to inspect
    the full nonfiltered stack trace. Grails, by default, sets up a special logger
    to which it will log the full stack trace. This logger writes to a file called
    `stacktrace.log` in the root of your project.


    However, you can quite easily override this default behavior to provide your own
    custom logger for unfiltered stack traces. [Listing 11-7](#Chapter11.html#list_11_7)
    shows an example configuration that logs all unfiltered stack traces to a rolling
    file appender.


    ***Listing 11-7.** Logging Unfiltered Traces*


    `log4j {`

    `appenders {`

    `  rollingFile name:"stacktraceLog",`

    `              file:"/var/log/unfiltered-stacktraces.log",`

    `              maxFileSize:"1MB",`

    `              layout: pattern(conversionPattern: ''%c{2} %m%n'')`

    `}`

    `error stacktraceLog:"StackTrace"`


    You can also disable this functionality completely by passing the `grails.full.stacktrace`
    argument at the command line of your container or as an argument to the `run-app`
    command:


    `grails -Dgrails.full.stacktrace=true run-app`


    #### Externalized Configuration


    During deployment, the `Config.groovy` file is compiled into a class and packaged
    into the WAR. Although this has its advantages, you may want to keep all configuration
    outside the main WAR file. For example, say you wanted to allow logging to be
    configured outside the application; to achieve this, you can use the externalized
    configuration mechanism in Grails.


    Essentially, within `Config.groovy` you can specify the `grails.config.locations`
    setting to contain a list of locations that need to be merged into the main configuration.
    Taking the logging example, [Listing 11-8](#Chapter11.html#list_11_8) shows how
    to externalize the logging configuration to a file in the `USER_HOME` directory.


    ***Listing 11-8.** Using Externalized Configuration*


    `grails.config.locations = ["file:${userHome}/gtunes-logging.groovy"]`


    You can even allow the `DataSource` to be configured externally using this mechanism.
    Although `DataSource.groovy` and `Config.groovy` are separate files on the file
    system, Grails merges them into a single logical configuration object. Hence,
    you can externalize, not just logging or any other configuration, but the `DataSource`,
    as shown in [Listing 11-9](#Chapter11.html#list_11_9).


    ***Listing 11-9.** Externalizing DataSource Configuration*


    `grails.config.locations = ["file:${userHome}/.settings/gtunes-logging.groovy",
                              "file:${userHome}/.settings/gtunesdatasource.groovy"]`


    If you prefer, you can also use static properties files in externalized configuration.
    Just use the extension `.properties` when referring to the files, and use regular
    `java.util.Properties` file semantics for configuration.


    ### Declaring Dependencies


    Dependency management for web applications can be tedious and complicated. Fortunately,
    Grails provides a sophisticated but easy-to-use dependency management system that
    allows you to express your dependencies in one place, in a declarative way, with
    minimal configuration. Grails will take it from there. You have already taken
    advantage of this numerous times up to this point when modifying `BuildConfig.groovy`
    to express dependencies on plug-ins.


    In this section we will take a closer look at all of the options available in
    `BuildConfig.groovy`. Let’s start by taking a look at the `BuildConfig.groovy`
    file that is in gTunes now. See the code in [Listing 11-10](#Chapter11.html#list_11_10).


    ***Listing 11-10.** BuildConfig.groovy*


    `grails.project.class.dir = "target/classes"`

    `grails.project.test.class.dir = "target/test-classes"`

    `grails.project.test.reports.dir = "target/test-reports"`

    `grails.project.target.level = 1.6`

    `grails.project.source.level = 1.6`

    `//grails.project.war.file = "target/${appName}-${appVersion}.war"`


    `grails.project.dependency.resolution = {`

    `    // inherit Grails'' default dependencies`

    `    inherits("global") {`

    `        // uncomment to disable ehcache`

    `        // excludes ''ehcache''`

    `    }`

    `    log "error" // log level of Ivy resolver, either ''error'', ''warn'', ''info'',
    ''debug'' or`

    `''verbose''`

    `    checksums true // Whether to verify checksums on resolve`


    `    repositories {`

    `        inherits true // Whether to inherit repository definitions from plugins`

    `        grailsPlugins()`

    `        grailsHome()`

    `        grailsCentral()`

    `        mavenCentral()`


    `        // uncomment these to enable remote dependency resolution from public
    Maven repositories`

    `        //mavenLocal()`

    `        //mavenRepo "http://snapshots.repository.codehaus.org"`

    `        //mavenRepo "http://repository.codehaus.org"`

    `        //mavenRepo "http://download.java.net/maven/2/"`

    `        //mavenRepo "http://repository.jboss.com/maven2/"`

    `    }`

    `    dependencies {`

    `        // specify dependencies here under either ''build'', ''compile'', ''runtime'',
    ''test'', or`

    `''provided'' scopes, e.g.`


    `        runtime ''mysql:mysql-connector-java:5.1.21''`

    `    }`


    `    plugins {`

    `        runtime ":hibernate:$grailsVersion"`

    `        runtime ":jquery:1.7.1"`

    `        runtime ":resources:1.1.6"`

    `        runtime ":searchable:0.6.4"`

    `        compile ":cache:1.0.0"`

    `        compile ":rest-client-builder:1.0.2"`


    `        // Uncomment these (or add new ones) to enable additional resources capabilities`

    `        //runtime ":zipped-resources:1.0"`

    `        //runtime ":cached-resources:1.0"`

    `        //runtime ":yui-minify-resources:0.1.4"`


    `        build ":tomcat:$grailsVersion"`

    `    }`

    `}`


    It may look like there is a lot going on there, but don’t be intimidated. We will
    break this down into a few easy-to-deal-with pieces.


    The first few lines in the file define a number of properties: `grails.project.class.dir`,
    `grails.project.test.class.dir`, and `grails.project.test.reports.dir`. These
    settings tell the Grails build system where to put generated artefacts like class
    files and test reports. The default values represented there put all of those
    things in a directory named `target`. Those values are all relative to the project
    root directory. If you want to specify a fully qualified path to some other location,
    that works just as well:


    `grails.project.class.dir=''/Development/artefacts/gtunes/classes/''`


    The next couple of properties are `grails.project.target.level` and `grails.project.source.level`,
    which default to 1.6\. Those settings tell the Grails compiler that your source
    code should be compatible with Java 1.6 and that the compiler should generate
    1.6 compatible byte code. If you are deploying to a container that uses Java 1.5,
    then set the target level accordingly.


    So far, none of the foregoing is really about dependency management. They are
    all configurations that affect the build. The rest of the file is all about dependency
    management.


    The rest of the file is all code defined inside of a closure, which is assigned
    to the `grails.project.dependency.resolution` property. Most of that code falls
    into one of four categories: inherits, repositories, dependencies, and plug-ins
    (see [Listing 11-11](#Chapter11.html#list_11_11)).


    ***Listing 11-11.** Sections in BuildConfig.groovy*


    `grails.project.dependency.resolution = {`

    `    inherits("global") {`

    `        ...`

    `    }`

    `    repositories {`

    `        ...`

    `    }`

    `    dependencies {`

    `        ...`

    `    }`

    `    plugins {`

    `        ...`

    `    }`

    `}`


    Let’s examine each of those.'
  trans: '

    #### 堆栈跟踪过滤


    每当 Grails 中抛出异常时，异常堆栈跟踪中所有 Groovy 和 Grails 内部信息都会被过滤掉，然后才会记录日志。这非常有用，因为它能让你将问题缩小到与代码相关的范围。否则，如果
    Grails 的所有内部层都暴露出来，你可能需要筛选一个相当大的堆栈跟踪。


    通常，在开发过程中抛出异常时，你可以通过过滤后的跟踪信息找出问题所在。在极少数情况下，你可能希望检查完整的未过滤堆栈跟踪。默认情况下，Grails 会设置一个特殊的日志记录器，用于记录完整的堆栈跟踪。该日志记录器会写入项目根目录下名为
    `stacktrace.log` 的文件。


    然而，你可以很容易地覆盖此默认行为，为未过滤的堆栈跟踪提供自定义日志记录器。清单 11-7 展示了一个示例配置，该配置将所有未过滤的堆栈跟踪记录到一个滚动文件追加器中。


    ***清单 11-7.** 记录未过滤的跟踪信息*


    `log4j {`

    `appenders {`

    `  rollingFile name:"stacktraceLog",`

    `              file:"/var/log/unfiltered-stacktraces.log",`

    `              maxFileSize:"1MB",`

    `              layout: pattern(conversionPattern: ''%c{2} %m%n'')`

    `}`

    `error stacktraceLog:"StackTrace"`


    你也可以通过在容器的命令行中传递 `grails.full.stacktrace` 参数，或将其作为 `run-app` 命令的参数，来完全禁用此功能：


    `grails -Dgrails.full.stacktrace=true run-app`


    #### 外部化配置


    在部署期间，`Config.groovy` 文件会被编译成一个类并打包到 WAR 文件中。尽管这有其优势，但你可能希望将所有配置保留在主 WAR 文件之外。例如，假设你想允许在应用程序外部配置日志记录；要实现这一点，你可以使用
    Grails 中的外部化配置机制。


    本质上，在 `Config.groovy` 中，你可以指定 `grails.config.locations` 设置，使其包含需要合并到主配置中的位置列表。以日志记录为例，清单
    11-8 展示了如何将日志记录配置外部化到 `USER_HOME` 目录下的一个文件中。


    ***清单 11-8.** 使用外部化配置*


    `grails.config.locations = ["file:${userHome}/gtunes-logging.groovy"]`


    你甚至可以使用此机制允许外部配置 `DataSource`。尽管 `DataSource.groovy` 和 `Config.groovy` 在文件系统中是独立的文件，但
    Grails 会将它们合并成一个逻辑配置对象。因此，你不仅可以外部化日志记录或任何其他配置，还可以外部化 `DataSource`，如清单 11-9 所示。


    ***清单 11-9.** 外部化 DataSource 配置*


    `grails.config.locations = ["file:${userHome}/.settings/gtunes-logging.groovy",
                              "file:${userHome}/.settings/gtunesdatasource.groovy"]`


    如果你愿意，也可以在外部化配置中使用静态属性文件。只需在引用文件时使用扩展名 `.properties`，并使用常规的 `java.util.Properties`
    文件语义进行配置。


    ### 声明依赖关系


    Web 应用程序的依赖管理可能既繁琐又复杂。幸运的是，Grails 提供了一个复杂但易于使用的依赖管理系统，允许你以声明方式在一个地方表达依赖关系，且只需极少的配置。剩下的工作
    Grails 会帮你完成。到目前为止，你在修改 `BuildConfig.groovy` 以表达对插件的依赖关系时，已经多次利用了这一特性。


    在本节中，我们将更详细地探讨 `BuildConfig.groovy` 中所有可用的选项。让我们先看看 gTunes 中当前的 `BuildConfig.groovy`
    文件。请参见清单 11-10 中的代码。


    ***清单 11-10.** BuildConfig.groovy*


    `grails.project.class.dir = "target/classes"`

    `grails.project.test.class.dir = "target/test-classes"`

    `grails.project.test.reports.dir = "target/test-reports"`

    `grails.project.target.level = 1.6`

    `grails.project.source.level = 1.6`

    `//grails.project.war.file = "target/${appName}-${appVersion}.war"`


    `grails.project.dependency.resolution = {`

    `    // 继承 Grails 的默认依赖`

    `    inherits("global") {`

    `        // 取消注释以禁用 ehcache`

    `        // excludes ''ehcache''`

    `    }`

    `    log "error" // Ivy 解析器的日志级别，可选 ''error'', ''warn'', ''info'', ''debug'' 或
    ''verbose''`

    `    checksums true // 是否在解析时校验校验和`


    `    repositories {`

    `        inherits true // 是否继承来自插件的仓库定义`

    `        grailsPlugins()`

    `        grailsHome()`

    `        grailsCentral()`

    `        mavenCentral()`


    `        // 取消注释以启用来自公共 Maven 仓库的远程依赖解析`

    `        //mavenLocal()`

    `        //mavenRepo "http://snapshots.repository.codehaus.org"`

    `        //mavenRepo "http://repository.codehaus.org"`

    `        //mavenRepo "http://download.java.net/maven/2/"`

    `        //mavenRepo "http://repository.jboss.com/maven2/"`

    `    }`

    `    dependencies {`

    `        // 在此处指定依赖，作用域可以是 ''build'', ''compile'', ''runtime'', ''test'' 或 ''provided''，例如`


    `        runtime ''mysql:mysql-connector-java:5.1.21''`

    `    }`


    `    plugins {`

    `        runtime ":hibernate:$grailsVersion"`

    `        runtime ":jquery:1.7.1"`

    `        runtime ":resources:1.1.6"`

    `        runtime ":searchable:0.6.4"`

    `        compile ":cache:1.0.0"`

    `        compile ":rest-client-builder:1.0.2"`


    `        // 取消注释这些（或添加新的）以启用额外的资源功能`

    `        //runtime ":zipped-resources:1.0"`

    `        //runtime ":cached-resources:1.0"`

    `        //runtime ":yui-minify-resources:0.1.4"`


    `        build ":tomcat:$grailsVersion"`

    `    }`

    `}`


    看起来可能有很多内容，但不要被吓到。我们将把它分解成几个易于处理的部分。


    文件中的前几行定义了一些属性：`grails.project.class.dir`、`grails.project.test.class.dir` 和 `grails.project.test.reports.dir`。这些设置告诉
    Grails 构建系统将生成的工件（如类文件和测试报告）放在哪里。这里表示的默认值会将所有这些内容放在名为 `target` 的目录中。这些值都是相对于项目根目录的。如果你想指定一个完全限定的路径到其他位置，那也是可以的：


    `grails.project.class.dir=''/Development/artefacts/gtunes/classes/''`


    接下来的几个属性是 `grails.project.target.level` 和 `grails.project.source.level`，默认值为 1.6。这些设置告诉
    Grails 编译器，你的源代码应与 Java 1.6 兼容，并且编译器应生成 1.6 兼容的字节码。如果你要部署到使用 Java 1.5 的容器，请相应地设置目标级别。


    到目前为止，上述内容实际上都与依赖管理无关。它们都是影响构建的配置。文件的其余部分则完全关于依赖管理。


    文件的其余部分都是在闭包内定义的代码，该闭包被赋值给 `grails.project.dependency.resolution` 属性。这些代码大部分属于以下四类之一：继承（inherits）、仓库（repositories）、依赖（dependencies）和插件（plugins）（参见清单
    11-11）。


    ***清单 11-11.** BuildConfig.groovy 中的各个部分*


    `grails.project.dependency.resolution = {`

    `    inherits("global") {`

    `        ...`

    `    }`

    `    repositories {`

    `        ...`

    `    }`

    `    dependencies {`

    `        ...`

    `    }`

    `    plugins {`

    `        ...`

    `    }`

    `}`


    让我们逐一检查这些部分。

