- fmt: "# Querying Associations with Criteria\n\nOften it is useful to execute a query\
    \ that uses the state of an association as its criterion. So far, you have performed\
    \ queries against only a single class and not its associations. So how do you\
    \ go about querying an association?\n\nThe Grails criteria builder allows querying\
    \ associations by using a nested criteria method call whose name matches the property\
    \ name. The closure argument passed to the method contains nested criteria calls\
    \ that relate to the association and not the criteria class. Say that you want\
    \ to find all albums that contain the word *Shake*. The criteria shown in [Listing\
    \ 9-13](#Chapter09.html#list_9_13) will do this.\n\n**Listing 9-13.** Querying\
    \ Associations with Criteria\n\n```\ndef criteria = Album.withCriteria {\n   \
    \ songs {\n        ilike('title', '%Shake%')\n    }\n}\n```\n\nThis is a fairly\
    \ trivial example, but all the criteria you’ve seen so far can be nested within\
    \ the nested `songs` method call in the code listing. Combine this with how criteria\
    \ can be built up from logical code blocks, and it results in a pretty powerful\
    \ mechanism for querying associations.\n\n![Image](images/square.jpg) **Tip**\
    \ You can also combine association criteria, as shown in [Listing 9-13](#Chapter09.html#list_9_13),\
    \ with regular criteria on the class itself.\n\n# Querying with Projections\n\n\
    Projections allow the results of criteria queries to be customized in some way.\
    \ For example, you may want to count only the number of results, as opposed to\
    \ retrieving each one. In other words, they are equivalent to SQL functions such\
    \ as `count`, `distinct`, and `sum`.\n\nWith criteria queries, you can specify\
    \ a `projections` method call that takes a closure and provides support for these\
    \ types of queries. Instead of criteria, however, the method calls within it map\
    \ to another Hibernate class, named `org.hibernate.criterion.Projections`.\n\n\
    Let’s adapt the example in [Listing 9-14](#Chapter09.html#list_9_14) by adding\
    \ a projection that results in counting the distinct `Album` titles in the `Alternative`\
    \ genre.\n\n**Listing 9-14.** Querying with Projections\n\n```\ndef criteria =\
    \ Album.createCriteria()\ndef count = criteria.get {\n    projections {\n    \
    \    countDistinct('name')\n    }\n    songs {\n        eq('genre', 'Alternative')\n\
    \    }\n}\n```\n\n# Detached Criteria Queries\n\nCriteria queries, as described\
    \ in the previous section, are associated with the current Hibernate session (see\
    \ the section “The Semantics of GORM” for more information on the session). In\
    \ practice, this means that you can use criteria queries only with the current\
    \ session, and they cannot be reused across sessions. Attempting to execute a\
    \ criteria query created with a different session, which potentially is no longer\
    \ present, will lead to an exception.\n\nIn order to facilitate the creation of\
    \ shared, potentially global, criteria queries that can be reused across the application,\
    \ Grails 2.0 and above introduced the notion of a detached criteria query. Represented\
    \ by the `grails.gorm.DetachedCriteria` class, detached criteria queries are composable,\
    \ immutable query objects that do not hold an underlying connection to the database.\
    \ They can be created as global variables or class properties and reused across\
    \ the application as needed.\n\n## Creating Detached Criteria Queries\n\nTo create\
    \ an instance of the `DetachedCriteria` class, simply import the necessary package\
    \ and pass the target class to the constructor, as shown in [Listing 9-15](#Chapter09.html#list_9_15).\n\
    \n**Listing 9-15.** Creating a `DetachedCriteria` instance\n\n```\nimport grails.gorm.*\n\
    \ndef query = new DetachedCriteria(Album)\n```\n\nOnce you have a reference to\
    \ the `DetachedCriteria` instance, you can use the `build` method to apply regular\
    \ criteria-style query logic (see [Listing 9-16](#Chapter09.html#list_9_16)).\n\
    \n**Listing 9-16.** Building a `DetachedCriteria` query\n\n```\ndef newQuery =\
    \ query.build {\n   like('title', '%Shake%')\n}\n```\n\n[Listing 9-16](#Chapter09.html#list_9_16)\
    \ demonstrates an important aspect of `build` method: the original query is not\
    \ mutated; instead, a copy is returned with the criteria applied to the copy.\
    \ Most operations on the `DetachedCriteria` instance do not mutate the actual\
    \ instance. Instead, they return a copy; hence, assigning the return value of\
    \ the `build` method to a new variable is required.\n\n## Executing Detached Criteria\
    \ Queries\n\nOnce you have constructed the query you wish to execute, there are\
    \ a number of ways to do so. In fact, the `DetachedCriteria` API is very similar\
    \ to the GORM API on domain classes and supports all of the typical operations,\
    \ including the `list`, `get`, and `count` methods. You can even execute dynamic\
    \ finders on the `DetachedCriteria` instance itself! [Listing 9-17](#Chapter09.html#list_9_17)\
    \ shows a few examples of the kinds of queries you can execute on a `DetachedCriteria`\
    \ instance.\n\n**Listing 9-17.** Executing a `DetachedCriteria` query\n\n```\n\
    def list = query.list() // all results\ndef only10 = query.list(max:10) // pagination\n\
    def album = query.get() // one result\nint total = query.count() // number of\
    \ results\nboolean alreadyExists = query.exists() // check for existence\ndef\
    \ rockAlbums = query.findAllByGenre('Rock') // dynamic finders\ndef punkAlbums\
    \ = query.list { // combine with other criteria\n   like('genre', 'Punk')\n}\n\
    ```\n\nAs you can see from [Listing 9-17](#Chapter09.html#list_9_17), the `DetachedCriteria`\
    \ API is extremely feature-rich, with a range of ways to execute and compose queries.\n\
    \n## Lazy Evaluation of Detached Criteria\n\nIn order to increase the performance\
    \ of your Grails applications, one of the first places to optimize tends to be\
    \ the queries the application is executing.\n\nMinimizing the network traffic\
    \ caused by executing SQL queries on a remote database system can significantly\
    \ improve response times of your applications. It is fairly common when building\
    \ an application that logic resides in the view to conditionally display data\
    \ retrieved from the database.\n\nIt would be fairly wasteful if a query were\
    \ executed to obtain some data for the database only to be omitted from view rendering\
    \ by logic in the view. An interesting use of detached criteria is lazy evaluation,\
    \ which basically means that the query is executed only until use of the detached\
    \ criteria.\n\nThe `DetachedCriteria` class implements the `java.lang.Iterable`\
    \ interface; as a result, it can be used as a collection-type object. As an example,\
    \ take the following controller action from [Listing 9-18](#Chapter09.html#list_9_18).\n\
    \n**Listing 9-18.** Lazy `DetachedCriteria` queries\n\n```\ndef showAlbums() {\n\
    \   def rockAlbums = new DetachedCriteria(Album).build {\n       eq('genre', 'Rock')\n\
    \   }\n\n   [rockAlbums: rockAlbums]\n}\n```\n\nThe action builds a `DetachedCriteria`\
    \ instance called `rockAlbums` that is returned as the actual model for the view.\
    \ The view itself can then iterate over the `DetachedCriteria` instance as if\
    \ it were a collection of results, as shown in [Listing 9-19](#Chapter09.html#list_9_19).\n\
    \n**Listing 9-19.** Iterating over `DetachedCriteria` in the View\n\n```\n<g:each\
    \ in=\"${rockAlbums}\" var=\"album\">\n    <p>${album.title}</p>\n</g:each>\n\
    ```\n\nThe actual query execution will occur only upon iterating over the `DetachedCriteria`\
    \ instance; in other words, the query is lazily evaluated. Your view could contain\
    \ conditional logic that disabled rendering of the query results, without incurring\
    \ the cost of the query itself."
