- fmt: "注意观察如何使用`update`属性来指定将响应内容放入一个DOM ID为`musicPanel`的HTML `<div>`中。如果此时刷新页面并尝试点击链接，你会发现Ajax部分已经可以工作了！但缺点是，由于`AlbumController`中目前还没有`display`动作，服务器会返回404“页面未找到”错误。\n\
    \n让我们通过打开`AlbumController`并实现`display`动作来修正这个问题。[清单8-16](#Chapter08.html#list_8_16)展示了相关代码，它简单地通过`params`对象中的`id`参数获取`Album`实例，然后使用该实例渲染在[清单8-14](#Chapter08.html#list_8_14)中开发的`_album.gsp`模板。\n\
    \n***清单8-16.** `AlbumController`的`display`动作*\n\n```\ndef display() {\n    def\
    \ album = Album.get(params.id)\n    if(album) {\n        def artist = album.artist\n\
    \        render(template:\"album\", model:[artist:artist, album:album])\n    }\
    \ else {\n        render \"Album not found.\"\n    }\n}\n```\n\n通过添加一点CSS魔法来增强`_album.gsp`模板的外观，突然间，你就可以通过Ajax获取专辑详情并将其渲染到视图中。[图8-2](#Chapter08.html#fig_8_2)展示了你的工作成果。\n\
    \n![Image](images/9781430243779_Fig08-02.jpg)\n\n***图8-2.** 使用Ajax显示专辑*\n\n遗憾的是，即使有CSS增强，`Album`详情看起来仍然有些单调，全是文字。如果能显示每张专辑的封面图，那该多好啊？有志者事竟成——幸运的是，苹果公司提供了一个基于REST的Web服务，让开发者可以从其庞大的资源库中查找专辑封面。该服务的地址是[`http://itunes.apple.com/search`](http://itunes.apple.com/search)。在浏览器中打开该URL，你应该会看到类似这样的响应：\n\
    \n```\n{\n \"resultCount\":0,\n \"results\": []\n }\n```\n\n这看起来没什么意思。显然，它看起来不像能帮助你在gTunes中显示专辑封面的东西。这里显示的是对我们请求的JSON响应。问题在于我们并没有真正请求任何有用的东西，所以也没有得到任何有用的结果。让我们通过包含一些请求参数来让它变得更有趣一些。试试[`http://itunes.apple.com/search?media=music&entity=album&attribute=albumTerm&term=Church+Of+Broken+Glass`](http://itunes.apple.com/search?media=music&entity=album&attribute=albumTerm&term=Church+Of+Broken+Glass)。该URL包含几个请求参数。\n\
    \n![Image](images/p179-01.jpg)\n\n总结一下，上面的请求URL正在搜索名为*Church of Broken Glass*的专辑音乐。该请求应该会返回类似这样的响应：\n\
    \n```\n{\n \"resultCount\":1,\n \"results\": [\n{\"wrapperType\":\"collection\"\
    , \"collectionType\":\"Album\", \"artistId\":80907270,\n\"collectionId\":293455812,\
    \ \"amgArtistId\":512604, \"artistName\":\"Hammers of Misfortune\",\n\"collectionName\"\
    :\"Church of Broken Glass\", \"collectionCensoredName\":\"Church of Broken Glass\"\
    ,\n\"artistViewUrl\":\"https://itunes.apple.com/us/artist/hammers-of-misfortune/id80907270?uo=4\"\
    ,\n\"collectionViewUrl\":\"https://itunes.apple.com/us/album/church-of-broken-glass/id293455812?uo=4\"\
