  trans: '

    #### 应用版本控制与元数据


    你可能已经注意到，当运行 `grails war` 命令时，生成的 WAR 文件名末尾会带有一个版本号。你可能会好奇这个神秘的版本号从何而来。实际上，当你创建
    Grails 应用时，应用的版本号会在元数据中被设置为 0.1。


    你可以通过调用 `set-version` 命令来更改版本号，如清单 11-41 所示。


    ***清单 11-41.** 设置应用版本号*


    `grails set-version 0.2`


    之后，当你构建新的 WAR 文件时，将使用清单 11-41 中的版本号。在运行时，你可以通过 `grailsApplication` 对象来查看应用元数据：


    `println grailsApplication.metadata."app.version"`


    或者，在 GSP 中使用 `<g:meta>` 标签，如清单 11-42 所示。


    ***清单 11-42.** 使用应用元数据*


    `版本号 <g:meta name="app.version"/>`

    `基于 Grails 构建 <g:meta name="app.grails.version"/>`


    #### 自定义 WAR


    如果你想自定义 WAR 文件的生成方式，可以考虑利用一些钩子。例如，假设你想提供一个不同的基础 `web.xml` 模板，以便包含你自己的自定义 Servlet；你可以通过在
    `grails-app/conf/Config.groovy` 中设置 `grails.config.base.webXml` 来实现：


    `grails.config.base.webXml="file:${userHome}/.settings/my-web.xml"`


    此外，如果你需要更改 WAR 文件的生成位置，可以使用 `grails.war.destFile` 属性：


    `grails.war.destFile = "${tomcatHome}/webapps"`


    如果你想在 WAR 中包含额外的资源，可以使用 `grails.war.resources` 设置，如清单 11-43 所示。


    ***清单 11-43.** 使用 grails.war.resources 设置包含自定义资源*


    `grails.war.resources = { stagingDir ->`

    `// 包含静态资源`

    `  copy(dir:stagingDir) {`

    `   fileset(dir:"/usr/var/www/htdocs")`

    `  }`

    `}`


    请注意，分配给 `grails.war.resources` 的闭包会接收一个参数，该参数是正在构建 WAR 的目录位置。然后，你可以使用自定义的复制步骤来包含你需要的任何额外资源。一旦你拥有了
    WAR 文件，你可能希望在应用加载时对数据库状态进行一些初始填充。我们将在下一节中介绍如何做到这一点。


    ##### 使用 BootStrap 类填充数据库


    每当应用首次加载时，可能需要一些初始状态才能让应用正常运行。一种方法是使用 `BootStrap` 类。如果你查看 `grails-app/conf` 目录，可能会注意到一个名为
    `BootStrap.groovy` 的类。清单 11-44 展示了这个类的模板。


    ***清单 11-44.** BootStrap 类*


    `class BootStrap {`

    `    def init = {`

    `        servletContext ->`

    `    }`

    `    def destroy = {`

    `    }`

    `}`


    如你所见，其中有一个 `init` 方法，它在容器首次加载时被调用，以及一个 `destroy` 方法。`destroy` 方法在容器关闭时被调用。但需要注意的是，不能保证该方法一定会被调用，因此不应依赖它来处理任何关键任务。


    在 `Bootstrap` 类中，你可以使用 GORM 来填充数据库。得益于 GORM 对流式 API 的使用¹(1)，创建对象图变得非常容易，如清单 11-45
    所示。


    ***清单 11-45.** 在应用加载时填充数据*


    `def init = {`

    `    def album = new Album(title:"Because of the Times")`

    `    album.addToSongs(title:"Knocked Up").addToSongs(title:"Charmer")`

    `        ...`

    `    new Artist(name:"Kings of Leon") .addToAlbums(album) .save(flush:true)`

    `}`


    如果你需要按环境填充数据，可以使用 `GrailsUtil` 类来获取环境并进行切换。请参见清单 11-46 中的示例。


    ***清单 11-46.** 按环境进行引导*


    `def init = {`

    `    switch(grails.util.GrailsUtil.environment) {`

    `        case "development":`

    `            // 在开发环境下初始化`

    `            break`

    `        case "production":`

    `            // 在生产环境下初始化`

    `        break`

    `    }`

    `}`


    ![Image](img/line.jpg)


    ¹ 流式 API 通常被称为方法链，因为它涉及编写以某种方式返回对象的方法，使得多个方法可以按顺序链接。更完整的定义请参见 [`www.martinfowler.com/bliki/FluentInterface.html`](http://www.martinfowler.com/bliki/FluentInterface.html)。


    ### 总结


    Grails 的集成涵盖了广泛的领域，正如本章所讨论的众多主题所展示的那样。这些主题从与命令行工具的集成，到与开发环境的集成，再到最终部署到的服务器。你有许多可用的选项——多到用一整本书来讨论这个主题也不为过。好消息是，你在
    Java 领域使用的许多部署选项和技术同样适用于 Grails。


    无论是使用像 Tomcat 这样符合 Java EE 标准的容器，还是你最喜欢的构建工具，通常都有办法让 Groovy 和 Grails 在你的环境中无缝工作。下一章将讨论一个全新的主题，一个对
    Grails 运行至关重要的主题——插件系统。在本书中，你已经使用了许多 Grails 中比较重要的插件。


    现在，是时候让你转变为一个插件创建者，学习如何通过使用插件来模块化你的应用。


    ## 第 12 章


    ![Image](img/3squ.jpg)


    ## 插件


    到目前为止，你在本书的各个章节中一直是 Grails 插件系统的使用者。插件是 Grails 的基石。Grails 本身基本上就是一个插件运行时，除了如何加载和配置一组已安装的插件之外，它几乎一无所知。Grails
    的大部分核心功能都是作为这个运行时的一套插件来实现的。


    Grails 的插件系统非常灵活——以至于用一整本书来讨论这个主题也完全合理。在本章中，我们旨在总结核心概念，并演示插件系统的一些常见用例。然而，插件系统所能实现的全部功能，就留待你去想象了。


    即使你不打算编写一个插件分发给全世界，我们也建议你花时间阅读本章。Grails 插件不仅仅是增强现有 Grails 应用功能的一种方式；它们也是模块化代码的有效方法。在本章后面，我们将演示如何使用插件将你的
    Grails 应用拆分成独立的、可维护的插件，这些插件在运行时组合在一起。


    ### 插件基础


    Grails 的核心是一个插件运行时环境。然而，为了使其立即可用，它附带了一组你已经了解过的默认插件，包括 GORM 和 Grails MVC 框架。除了默认插件之外，Grails
    还附带了一组命令，用于自动发现和安装新插件。让我们先来看看这些命令。

    '
- fmt: '#### Plug-in Discovery


    The Grails plug-in community is a hive of activity; it’s one of the most exciting
    areas of Grails. At the time of writing, more than 850 plug-ins were available
    from the central repository. Providing a range of functionality from job scheduling
    to search to reporting engines, all the plug-ins are discoverable through the
    `grails list-plugins` command. To run the `list-plugins` command, simply type
    “`grails list-plugins`” in a command window, as shown in [Listing 12-1](#Chapter12.html#list_12_1).


    ***Listing 12-1.** Running the list-plugins Command*


    ```

    $ grails list-plugins

    ```


    What this will do is go off to the Grails central repository and download the
    latest published plug-in list. The list is then formatted and printed to the console.
    You can see some typical output from the `list-plugins` command in [Listing 12-2](#Chapter12.html#list_12_2),
    shortened for brevity.


    ***Listing 12-2.** Output from the list-plugins Command*


    ```

    $ grails list-plugins

    | Downloading: plugins-list.xml


    Plugins available in the grailsCentral repository are listed below:

    -------------------------------------------------------------

    acegi               <0.5.3.2>   --  Acegi Plugin

    activemq            <0.4.1>     --  Grails ActiveMQ Plugin

    activiti            <5.9>       --  Grails Activiti Plugin - Enabled

    activiti-shiro      <0.1.1>     --  This plugin integrates Shiro Security

       ...

    ```


    In the left column, you see the name of the plug-in, and in the middle is its
    latest released version. Finally, on the right of the output, you see the short
    description for any given plug-in. If you want to obtain more information about
    a particular plug-in, use the `plugin-info` command. [Listing 12-3](#Chapter12.html#list_12_3)
    shows how to obtain more information about the `audit-logging` plug-in from [Listing
    12-2](#Chapter12.html#list_12_2).


    ***Listing 12-3.** Using the plugin-info Command to Get Detailed Plug-in Information*


    ```

    $ grails plugin-info spring-security-core

    | Downloading: spring-security-core-1.2.7.3.pom.sha1


    --------------------------------------------------------------------------

    Information about Grails plugin

    --------------------------------------------------------------------------

    Name: spring-security-core | Latest release: 1.2.7.3

    --------------------------------------------------------------------------

    Spring Security Core Plugin

    --------------------------------------------------------------------------

    Author: Burt Beckwith

    --------------------------------------------------------------------------

    Author''s e-mail: beckwithb@vmware.com

    --------------------------------------------------------------------------

    Find more info here: http://grails.org/plugin/spring-security-core

    --------------------------------------------------------------------------


    Spring Security Core plugin


    Dependency Definition

    --------------------------------------------------------------------------

        :spring-security-core:1.2.7.3


    Required Repositories

    --------------------------------------------------------------------------

         http://plugins.grails.org

         http://repo.grails.org/grails/plugins/

         http://repo.grails.org/grails/core/

         http://svn.codehaus.org/grails/trunk/grails-plugins

         http://repo1.maven.org/maven2/


    Transitive Dependencies

    --------------------------------------------------------------------------

         org.springframework.security:spring-security-core:3.0.7.RELEASE (compile)

         org.springframework.security:spring-security-web:3.0.7.RELEASE (compile)


    Transitive Plugins

    --------------------------------------------------------------------------


    To get info about specific release of plugin ''grails plugin-info [NAME] [VERSION]''


    To get list of all plugins type ''grails list-plugins''


    To install latest version of plugin type ''grails install-plugin [NAME]''


    To install specific version of plugin type ''grails install-plugin [NAME] [VERSION]''

    ```


    For further information, see [`http://grails.org/plug-ins`](http://grails.org/plug-ins).
    As with the `plugin-info` command, you get more information about the plug-in,
    including a long description, the author’s name, a link to the documentation ([`http://grails.org/plug-in/spring-security-core`](http://grails.org/plug-in/spring-security-core)),
    and more.


    ##### Plug-in Installation


    This brings us to the topic of installing a plug-in into an application. To do
    so, express a dependency on the plug-in in the `grails-app/conf/BuildConfig.groovy`
    file. The code in [Listing 12-4](#Chapter12.html#list_12_4) demonstrates how to
    express a compile-time dependency on version 1.2.7.3 of the `spring-security-core`
    plug-in.


    ***Listing 12-4.** Installing a Specific Version of a Plug-in with the install-plugin
    Command*


    ```

    grails.project.dependency.resolution = {

        ...

        repositories {

            ...

        }

        plugins {

            compile '':spring-security-core:1.2.7.3''

            ...

        }

        dependencies {

            ...

        }

        ...

    }

    ```


    ##### Local Plug-ins


    Of course, the plug-ins you create may not necessarily live in the central Grails
    repository. Grails plug-ins are packaged as simple zip files, and if you download
    a plug-in zip file from elsewhere, you can install it by simply running the `install-plugin`
    command and passing in the location on disk of the plug-in. [Listing 12-5](#Chapter12.html#list_12_5)
    shows how to install a plug-in located in your home directory on a Unix system.


    ***Listing 12-5.** Installing a Local Plug-in*


    ```

    $ grails install-plugin ~/grails-spring-security-core-1.2.7.3.zip

    ```


    To ease distribution within your team, instead of keeping your plug-ins locally
    on disk, you could host your plug-ins on a local web server. For that case, the
    `install-plugin` command also supports plug-in installation over HTTP. [Listing
    12-6](#Chapter12.html#list_12_6) shows how to install the `spring-security-core`
    plug-in from a private web server over HTTP, bypassing the Grails plug-in autodiscovery
    mechanism.


    ***Listing 12-6.** Installing Plug-ins over HTTP*


    ```

