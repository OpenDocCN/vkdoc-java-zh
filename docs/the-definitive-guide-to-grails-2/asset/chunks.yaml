    ### Fun with Ajax Remote Linking


    In an earlier example you implemented a bit of functionality that displayed the
    current time when the anchor tag was clicked (not exactly groundbreaking stuff,
    we know). Let’s correct this by looking at a more advanced example.


    In [Chapter 5](#Chapter05.html#ch5), you created a few panels for the right side
    of the gTunes store; they displayed the newest additions to the gTunes library
    for songs, albums, and artists, respectively. As a refresher, [Listing 8-13](#Chapter08.html#list_8_13)
    shows the code in question from the `grails-app/views/store/shop.gsp` file.


    ***Listing 8-13.** The Latest Content Panel*


    `<div id="top5Panel" class="top5Panel">`

    `    <h2>Latest Albums</h2>`

    `    <div id="albums" class="top5Item">`

