- fmt: '# The Essence of Grails


    > *Simplicity is the ultimate sophistication.*


    —Leonardo da Vinci


    To understand Grails, you first need to understand its goal: to dramatically simplify
    enterprise Java web development. To take web development to the next level of
    abstraction. To tap into what has been accessible to developers on other platforms
    for years. To have all this while still retaining the flexibility to drop down
    into the underlying technologies and utilize their richness and maturity. Simply
    put, we Java developers want to “have our cake and eat it, too.”


    Have you faced the pain of dealing with multiple crippling XML configuration files
    and an agonizing build system where testing a single change takes minutes instead
    of seconds? Grails brings back the fun of development on the Java platform, removing
    barriers and exposing users to APIs that enable them to focus purely on the business
    problem at hand. No configuration, zero overhead, immediate turnaround.


    You might be wondering how you can achieve this remarkable feat. Grails embraces
    concepts such as Convention over Configuration (CoC), Don’t Repeat Yourself (DRY),
    and sensible defaults that are enabled through the terse Groovy language and an
    array of domain-specific languages (DSLs) that make your life easier.


    As a budding Grails developer, you might think you’re cheating somehow, that you
    should be experiencing more pain. After all, you can’t squash a two-hour gym workout
    into twenty minutes, can you? There must be payback somewhere, maybe in extra
    pounds?


    As a developer you have the assurance that you are standing on the shoulders of
    giants with the technologies that underpin Grails: Spring, Hibernate, and of course,
    the Java platform. Grails takes the best of such dynamic language frameworks as
    Ruby on Rails, Django, and TurboGears and brings them to a Java Virtual Machine
    (JVM) near you.


    This chapter is going to introduce the framework at the highest level and provide
    some essentials for getting started. All of the concepts introduced here will
    be explained in detail later in the book.


    ## Simplicity and Power


    A factor that clearly sets Grails apart from its competitors is evident in the
    design choices made during its development. By not reinventing the wheel, and
    by leveraging tried and trusted frameworks such as Spring and Hibernate, Grails
    can deliver features that make your life easier without sacrificing robustness.


    Grails is powered by some of the most popular open source technologies in their
    respective categories:


    > *   *Hibernate*: The de facto standard for object-relational mapping (ORM) in
    the Java world.

    > *   *Spring*: The hugely popular open source Inversion of Control (IoC) container
    and wrapper framework for Java.

    > *   *SiteMesh*: A robust and stable layout-rendering framework.

    > *   *Tomcat*: A proven, embeddable servlet container.

    > *   *H2*: A pure Java Relational Database Management System (RDBMS) implementation.


    The concepts of ORM and IoC might seem a little alien to some readers. ORM simply
    serves as a way to map objects from the object-oriented world onto tables in a
    relational database. ORM provides an additional abstraction above SQL, allowing
    developers to think about their domain model instead of getting wrapped up in
    reams of SQL.


    IoC provides a way of “wiring” together objects so that their dependencies are
    available at runtime. As an example, an object that performs persistence might
    require access to a data source. IoC relieves the developer of the responsibility
    of obtaining a reference to the data source. But don’t get too wrapped up in these
    concepts for the moment, as their usage will become clear later in the book.


    You benefit from Grails because it wraps these frameworks by introducing another
    layer of abstraction via the Groovy language. You, as a developer, will not know
    that you are building a Spring and Hibernate application. Certainly, you won’t
    need to touch a single line of Hibernate or Spring XML, but it is there at your
    fingertips if you need it. [Figure 1-1](#Chapter01.html#fig_1_1) illustrates how
    Grails relates to these frameworks and the enterprise Java stack.


    ![Image](images/9781430243779_Fig01-01.jpg)


    ***Figure 1-1.** The Grails stack*


    ## Grails, the Platform


    When approaching Grails, you might suddenly experience a deep inhalation of breath
    followed by an outcry of “not another web framework!?” That’s understandable,
    given the dozens of web frameworks that exist for Java. But Grails is different
    and in a good way. Grails is a full-stack environment, not just a web framework.
    It is a *platform* with ambitious aims to handle everything from the view layer
    down to your persistence concerns.


    In addition, through its plug-ins system (covered in [Chapter 12](#Chapter12.html)),
    Grails aims to provide solutions to an extended set of problems that might not
    be covered out of the box. With Grails you can accomplish searching, job scheduling,
    enterprise messaging and remoting, and more.


    The sheer breadth of Grails’s coverage might conjure up unknown horrors and nightmarish
    thoughts of configuration, configuration, configuration. However, even in its
    plug-ins, Grails embraces Convention over Configuration and sensible defaults
    to minimize the work required to get up and running.


    We encourage you to think of Grails as not just another web framework but as the
    *platform* upon which to build your next web 2.0 phenomenon.'
