- fmt: "### Mapping to HTTP Request Methods\n\nA URL mapping can be configured to\
    \ map to different actions based on the HTTP request method.^([1](#Chapter06.html#CHP-6-FN-1))\
    \ This can be useful when building a system that supports RESTful APIs. For example,\
    \ if a `GET` request is made to the URL `/artist/The_Beatles`, then the controller\
    \ may respond by generating a page that displays details about the Beatles. If\
    \ a `DELETE` request is made to the same URL, the controller may respond by attempting\
    \ to delete the Beatles and all of the band’s associated data (albums and so on).\
    \ An application could deal with all these requests in the same controller action\
    \ by interrogating the request and reacting differently based on the HTTP request\
    \ method. [Listing 6-17](#Chapter06.html#list_6_17) shows what this might look\
    \ like in the `ArtistController`.\n\n***Listing 6-17.** Inspecting the HTTP Request\
    \ Method in a Controller Action*\n\n```\nclass ArtistController {\n  def actionName()\
    \ {\n    if(request.method == \"GET\") {\n      // handle the GET\n    } else\
    \ if(request.method == \"PUT\") {\n      // handle the PUT\n    } else if(request.method\
    \ == \"POST\") {\n      // handle the POST\n    } else if(request.method == \"\
    DELETE\") {\n      // handle the DELETE\n    }\n    // ...\n  }\n}\n```\n\n![Image](images/line.jpg)\n\
    \n1 See [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)\
    \ for definitions of all the HTTP request methods.\n\nThis is tedious code and\
    \ would likely be repeated in many places in your application. A better idea is\
    \ to configure a URL mapping that matches this URL and maps the request to different\
    \ controller actions based on the HTTP request method. See [Listing 6-18](#Chapter06.html#list_6_18)\
    \ for an example.\n\n***Listing 6-18.** Mapping to HTTP Request Methods*\n\n```\n\
    class UrlMappings {\n    static mappings = {\n        \"/artist/$artistName\"\
    \ {\n            controller = 'artist'\n            action = [GET: 'show',\n \
    \                     PUT: 'update',\n                      POST: 'save',\n  \
    \                    DELETE: 'delete']\n        }\n\n        // ...\n    }\n}\n\
    ```\n\nNote that the value assigned to the `action` property is, not the name\
    \ of an action, but a map. The keys in the map correspond to the names of HTTP\
    \ request methods, and the values associated with the keys represent the name\
    \ of the action that should be invoked for that particular request method. If\
    \ the mapping is going to map those standard four HTTP request methods to those\
    \ particular action names, then an alternative, more concise syntax for expressing\
    \ the same mapping may be used, as shown in [Listing 6-19](#Chapter06.html#list_6_19).\n\
    \n***Listing 6-19.** Mapping to HTTP Request Methods*\n\n```\nclass UrlMappings\
    \ {\n    static mappings = {\n        \"/artist/$artistName\"(resource: \"artist\"\
    )\n        // ...\n    }\n}\n```\n\n### Mapping HTTP Response Codes\n\nURL mappings\
    \ may be defined for specific HTTP response codes. The default mapping includes\
    \ a mapping for the `500` response code (Internal Error).^([2](#Chapter06.html#CHP-6-FN-2))\
    \ This mapping renders the `/error` view for any internal error. This view is\
    \ located at `grails-app/views/error.gsp`. This GSP renders stack information\
    \ that may be useful during development and debugging. [Listing 6-20](#Chapter06.html#list_6_20)\
    \ represents the default `error.gsp` page.\n\n![Image](images/line.jpg)\n\n2 See\
    \ [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)\
    \ for definitions of all the HTTP response codes.\n\n***Listing 6-20.** The Default\
    \ `grails-app/views/error.gsp` Page*\n\n```\n<body>\n  <h1>Grails Runtime Exception</h1>\n\
    \  <h2>Error Details</h2>\n  <div class=\"message\">\n    <strong>Message:</strong>\
    \ ${exception.message?.encodeAsHTML()} <br />\n    <strong>Caused by:</strong>\
    \ ${exception.cause?.message?.encodeAsHTML()} <br />\n    <strong>Class:</strong>\
    \ ${exception.className} <br />\n    <strong>At Line:</strong> [${exception.lineNumber}]\
    \ <br />\n    <strong>Code Snippet:</strong><br />\n    <div class=\"snippet\"\
    >\n      <g:each var=\"cs\" in=\"${exception.codeSnippet}\">\n        ${cs?.encodeAsHTML()}<br\
    \ />\n      </g:each>\n    </div>\n  </div>\n  <h2>Stack Trace</h2>\n  <div class=\"\
    stack\">\n    <pre>\n      <g:each in=\"${exception.stackTraceLines}\">\n    \
    \    ${it.encodeAsHTML()}<br/>\n      </g:each>\n    </pre>\n  </div>\n</body>\n\
    ```\n\nYou can add your own mappings for specific response codes. For example,\
    \ if you want to map every request for something that cannot be found to the default\
    \ action in the `StoreController`, you can do so. You can also map specific exception\
    \ types to actions or views. Such custom mappings are shown in [Listing 6-21](#Chapter06.html#list_6_21).\n\
    \n***Listing 6-21.** Custom Mapping for All 404 Response Codes*\n\n```\nclass\
    \ UrlMappings {\n    static mappings = {\n        // 404s should be handled by\
    \ the default\n        //action in the store controller\n        \"404\"(controller:'store')\n\
    \n        // IllegalArgumentExceptions should be handled by the\n        // illegalArgument\
    \ action in the errors controller\n        \"500\"(controller: \"errors\", action:\
    \ \"illegalArgument\",\n              exception: IllegalArgumentException)\n\n\
    \        // NullPointerException should be handled by the\n        // nullPointer\
    \ action in the errors controller\n        \"500\"(controller: \"errors\", action:\
    \ \"nullPointer\",\n              exception: NullPointerException)\n\n       \
    \ // MyException should be handled by the\n        // customException action in\
    \ the errors controller\n        \"500\"(controller: \"errors\", action: \"customException\"\
    ,\n              exception: MyException)\n\n        // all other exceptions should\
    \ be handled by\n        // the /errors/serverError view\n        \"500\"(view:\
    \ \"/errors/serverError\")\n\n        // ...\n    }\n}\n```\n\n### Taking Advantage\
    \ of Reverse URL Mapping\n\nYou have seen how to support URLs such as `/showArtist/Pink_Floyd`\
    \ instead of URLs such as `/artist/show/42`. The support seen so far relates to\
    \ handling a request to a URL. The other end of that interaction is equally important.\
    \ That is, you need a slick mechanism for generating links, one that takes advantage\
    \ of custom URL mappings. Fortunately, that mechanism is built into Grails and\
    \ is as easy to work with as the mapping mechanisms already seen.\n\nThe `<g:link>`\
    \ GSP tag that is bundled with Grails is useful for generating links to certain\
    \ controllers and actions. See [Listing 6-22](#Chapter06.html#list_6_22) for a\
    \ common use of the link tag.\n\n***Listing 6-22.** The Link Tag*\n\n```\n<td>\n\
    \  <g:link action='show'\n          controller='artist'\n          id=\"${artist.id}\"\
    >${artist.name}\n  </g:link>\n</td>\n```\n\nThis tag will generate a link like\
    \ `<a href=\"/artist/show/42\">Pink Floyd</a>`. That link to `/artist/show/42`\
    \ is ugly. You would definitely prefer `/showArtist/Pink_Floyd`. The good news\
    \ is that it is easy to get the link tag to generate a link like the latter. You\
    \ just tell the link tag what controller and action you want to link to and supply\
    \ all the necessary parameters that the custom mapping calls for. For example,\
    \ see the custom mapping in [Listing 6-23](#Chapter06.html#list_6_23).\n\n***Listing\
    \ 6-23.** A Mapping for the `/showArtist/` URL*\n\n```\nclass UrlMappings {\n\
    \    static mappings = {\n        \"/showArtist/$artistName\"(controller:'artist',\
    \ action:'show')\n        // ...\n    }\n}\n```\n\nThe link tag will generate\
    \ a link that takes advantage of this mapping whenever a request is made for a\
    \ link to the `show` action in the `ArtistController` and the `artistName` parameter\
    \ is supplied. In a GSP, that would look something like the code in [Listing 6-24](#Chapter06.html#list_6_24).\n\
    \n***Listing 6-24.** Reverse URL Mapping Using the Link Tag*\n\n```\n<td>\n  <g:link\
    \ action='show'\n          controller='artist'\n          params=\"[artistName:${artist.name.replaceAll('\
    \ ', '_')}\">\n    ${artist.name}\n  </g:link>\n</td>\n```"
  raw: '### Mapping to HTTP Request Methods


    A URL mapping can be configured to map to different actions based on the HTTP
    request method.^([1](#Chapter06.html#CHP-6-FN-1)) This can be useful when building
    a system that supports RESTful APIs. For example, if a GET request is made to
    the URL `/artist/The_Beatles`, then the controller may respond by generating a
    page that displays details about the Beatles. If a `DELETE` request is made to
    the same URL, the controller may respond by attempting to delete the Beatles and
    all of the band’s associated data (albums and so on). An application could deal
    with all these requests in the same controller action by interrogating the request
    and reacting differently based on the HTTP request method. [Listing 6-17](#Chapter06.html#list_6_17)
    shows what this might look like in the `ArtistController`.


    ***Listing 6-17.** Inspecting the HTTP Request Method in a Controller Action*


    `class ArtistController {`

    `  def actionName() {`

    `    if(request.method == "GET") {`

    `      // handle the GET`

    `    } else if(request.method == "PUT") {`

    `      // handle the PUT`

    `    } else if(request.method == "POST") {`

    `      // handle the POST`

    `    } else if(request.method == "DELETE") {`

    `      // handle the DELETE`

    `    }`

    `    // ...`

    `  }`

    `}`


    ![Image](images/line.jpg)


    1  See [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)
    for definitions of all the HTTP request methods.


    This is tedious code and would likely be repeated in many places in your application.
    A better idea is to configure a URL mapping that matches this URL and maps the
    request to different controller actions based on the HTTP request method. See
    [Listing 6-18](#Chapter06.html#list_6_18) for an example.


    ***Listing 6-18.** Mapping to HTTP Request Methods*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/artist/$artistName" {`

    `            controller = ''artist''`

    `            action = [GET: ''show'',`

    `                      PUT: ''update'',`

    `                      POST: ''save'',`

    `                      DELETE: ''delete'']`

    `        }`


    `        // ...`

    `    }`

    `}`


    Note that the value assigned to the action property is, not the name of an action,
    but a map. The keys in the map correspond to the names of HTTP request methods,
    and the values associated with the keys represent the name of the action that
    should be invoked for that particular request method. If the mapping is going
    to map those standard four HTTP request methods to those particular action names,
    then an alternative, more concise syntax for expressing the same mapping may be
    used, as shown in [Listing 6-19](#Chapter06.html#list_6_19).


    ***Listing 6-19.** Mapping to HTTP Request Methods*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/artist/$artistName"(resource: "artist")`

    `        // ...`

    `    }`

    `}`


    ### Mapping HTTP Response Codes


    URL mappings may be defined for specific HTTP response codes. The default mapping
    includes a mapping for the `500` response code (Internal Error).^([2](#Chapter06.html#CHP-6-FN-2))
    This mapping renders the `/error` view for any internal error. This view is located
    at `grails-app/views/error.gsp`. This GSP renders stack information that may be
    useful during development and debugging. [Listing 6-20](#Chapter06.html#list_6_20)
    represents the default `error.gsp` page.


    ![Image](images/line.jpg)


    2  See [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)
    for definitions of all the HTTP response codes.


    ***Listing 6-20.** The Default grails-app/views/error.gsp Page*


    `<body>`

    `  <h1>Grails Runtime Exception</h1>`

    `  <h2>Error Details</h2>`

    `  <div class="message">`

    `    <strong>Message:</strong> ${exception.message?.encodeAsHTML()} <br />`

    `    <strong>Caused by:</strong> ${exception.cause?.message?.encodeAsHTML()} <br
    />`

    `    <strong>Class:</strong> ${exception.className} <br />`

    `    <strong>At Line:</strong> [${exception.lineNumber}] <br />`

    `    <strong>Code Snippet:</strong><br />`

    `    <div class="snippet">`

    `      <g:each var="cs" in="${exception.codeSnippet}">`

    `        ${cs?.encodeAsHTML()}<br />`

    `      </g:each>`

    `    </div>`

    `  </div>`

    `  <h2>Stack Trace</h2>`

    `  <div class="stack">`

    `    <pre>`

    `      <g:each in="${exception.stackTraceLines}">`

    `        ${it.encodeAsHTML()}<br/>`

    `      </g:each>`

    `    </pre>`

    `  </div>`

    `</body>`


    You can add your own mappings for specific response codes. For example, if you
    want to map every request for something that cannot be found to the default action
    in the `StoreController`, you can do so. You can also map specific exception types
    to actions or views. Such custom mappings are shown in [Listing 6-21](#Chapter06.html#list_6_21).


    ***Listing 6-21.** Custom Mapping for All 404 Response Codes*


    `class UrlMappings {`

    `    static mappings = {`

    `        // 404s should be handled by the default`

    `        //action in the store controller`

    `        "404"(controller:''store'')`


    `        // IllegalArgumentExceptions should be handled by the`

    `        // illegalArgument action in the errors controller`

    `        "500"(controller: "errors", action: "illegalArgument",`

    `              exception: IllegalArgumentException)`


    `        // NullPointerException should be handled by the`

    `        // nullPointer action in the errors controller`

    `        "500"(controller: "errors", action: "nullPointer",`

    `              exception: NullPointerException)`


    `        // MyException should be handled by the`

    `        // customException action in the errors controller`

    `        "500"(controller: "errors", action: "customException",`

    `              exception: MyException)`


    `        // all other exceptions should be handled by`

    `        // the /errors/serverError view`

    `        "500"(view: "/errors/serverError")`


    `        // ...`

    `    }`

    `}`


    ### Taking Advantage of Reverse URL Mapping


    You have seen how to support URLs such as `/showArtist/Pink_Floyd` instead of
    URLs such as `/artist/show/42`. The support seen so far relates to handling a
    request to a URL. The other end of that interaction is equally important. That
    is, you need a slick mechanism for generating links, one that takes advantage
    of custom URL mappings. Fortunately, that mechanism is built into Grails and is
    as easy to work with as the mapping mechanisms already seen.


    The `<g:link>` GSP tag that is bundled with Grails is useful for generating links
    to certain controllers and actions. See [Listing 6-22](#Chapter06.html#list_6_22)
    for a common use of the link tag.


    ***Listing 6-22.** The Link Tag*


    `<td>`

    `  <g:link action=''show''`

    `          controller=''artist''`

    `          id="${artist.id}">${artist.name}`

    `  </g:link>`

    `</td>`


    This tag will generate a link like `<a href="/artist/show/42">Pink Floyd</a>`.
    That link to `/artist/show/42` is ugly. You would definitely prefer `/showArtist/Pink_Floyd`.
    The good news is that it is easy to get the link tag to generate a link like the
    latter. You just tell the link tag what controller and action you want to link
    to and supply all the necessary parameters that the custom mapping calls for.
    For example, see the custom mapping in [Listing 6-23](#Chapter06.html#list_6_23).


    ***Listing 6-23.** A Mapping for the /showArtist/ URL*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showArtist/$artistName"(controller:''artist'', action:''show'')`

    `        // ...`

    `    }`

    `}`


    The link tag will generate a link that takes advantage of this mapping whenever
    a request is made for a link to the `show` action in the `ArtistController` and
    the `artistName` parameter is supplied. In a GSP, that would look something like
    the code in [Listing 6-24](#Chapter06.html#list_6_24).


    ***Listing 6-24.** Reverse URL Mapping Using the Link Tag*


    `<td>`

    `  <g:link action=''show''`

    `          controller=''artist''`

    `          params="[artistName:${artist.name.replaceAll('' '', ''_'')}">`

    `    ${artist.name}`

    `  </g:link>`

    `</td>`'
