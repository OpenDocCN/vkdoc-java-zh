- fmt: "##### Using Metaprogramming to Enhance Behavior\n\nIn the previous section,\
    \ you saw how plug-ins can participate in the configuration of the Spring `ApplicationContext`.\
    \ Now let’s look at another area that plug-ins typically contribute to: the application\
    \ behavior. Groovy is a fully dynamic language that allows you to completely modify\
    \ the behavior of a class at runtime through its metaprogramming APIs.\n\n![Image](images/square.jpg)\
    \ **Tip** If you want a book with significant coverage of Groovy’s metaprogramming\
    \ capabilities, look at *Programming Groovy*, by Venkat Subramaniam (Pragmatic\
    \ Programmers, 2008).\n\nLike Smalltalk, Ruby, Lisp, and other dynamic languages,\
    \ Groovy features a Meta Object Protocol (MOP). The key thing to remember is that\
    \ it is the MOP that decides the behavior of Groovy code at runtime, so code that\
    \ looks as though it may do one thing at compile time could be made to do something\
    \ completely different. For each `java.lang.Class` that Groovy knows about, there\
    \ is an associated `MetaClass`. The `MetaClass` is what dictates how a particular\
    \ method, constructor, or property behaves at runtime.\n\nGroovy’s `MetaClass`\
    \ allows you to add methods, properties, constructors, and static methods to any\
    \ class. For example, consider the code in [Listing 12-24](#Chapter12.html#list_12_24).\n\
    \n**Listing 12-24.** Adding New Methods to a Class\n\n```\nclass Dog {}\nDog.metaClass.bark\
    \ = { \"woof!\" }\nassert \"woof!\" == new Dog().bark()\n```\n\nHere you have\
    \ a simple class called `Dog`. Instances of the `Dog` class cannot, as it stands,\
    \ bark. However, by using the `MetaClass`, you can create a `bark` method with\
    \ this expression:\n\n```\nDog.metaClass.bark = { \"woof!\" }\n```\n\nClearly,\
    \ this example has only brushed the surface of what is possible. Groovy provides\
    \ a whole lot of capabilities related to runtime metaprogramming, all of which\
    \ are available in the context of a Grails application.\n\nLet’s look at an example\
    \ within the context of a Grails plug-in by trying to add the `cacheOrReturn`\
    \ method to all controllers to eliminate the need to inject the service via Spring\
    \ first. [Listing 12-25](#Chapter12.html#list_12_25) demonstrates how, by simply\
    \ delegating to the `CacheService`, you can add a `cacheOrReturn` method to all\
    \ controllers too.\n\n![Image](images/square.jpg) **Tip** If you prefer not to\
    \ create a plug-in but would still like to do metaprogramming in your Grails application,\
    \ we recommend you do so within a `Bootstrap` class, a topic covered in [Chapter\
    \ 12](#Chapter12.html#ch12).\n\n**Listing 12-25.** Adding Methods to All Controllers\n\
    \n```\nclass SimpleCacheGrailsPlugin {\n    ...\n    def doWithDynamicMethods\
    \ = { applicationContext ->\n        def cacheService = applicationContext.getBean(\"\
    cacheService\")\n        application.controllerClasses*.metaClass*.cacheOrReturn\
    \ = {\n            Serializable cacheKey, Closure callable ->\n            cacheService.cacheOrReturn(cacheKey,\
    \ callable)\n        }\n    }\n}\n```\n\nAnother important aspect to notice about\
    \ the code in [Listing 12-25](#Chapter12.html#list_12_25) is the use of Groovy’s\
    \ spread dot operator `*.` to obtain all the `MetaClass` instances from all the\
    \ `controllerClasses` and also the use of a spread assignment to create a `cacheOrReturn`\
    \ method for each `MetaClass`. That’s far easier than adding a `for` or `each`\
    \ loop!\n\n## Plug-in Events and Application Reloading\n\nAs well as the plug-in\
    \ hooks discussed in the “Plug-in Hooks” section, plug-ins can also participate\
    \ in a number of events, including application reload events. Grails aims to minimize\
    \ the number of application restarts required during development time. However,\
    \ since reloading is typically different for each artefact type, the responsibility\
    \ to reload is delegated to plug-ins.\n\nA plug-in can essentially listen for\
    \ three core events: `onChange`, `onConfigChange`, and `onShutdown`. Let’s take\
    \ a look at `onChange` first, as it is the most common event dealt with by plug-ins.\
    \ Each individual plug-in can monitor a set of resources. These are defined by\
    \ a property called `watchedResources`. For example, as part of Grails core, there\
    \ is a plug-in that provides support for internationalization (covered in [Chapter\
    \ 7](#Chapter07.html#ch7)) through the use of message bundles found in the `grails-app/i18n`\
    \ directory. The `i18n` plug-in defines its `watchedResources` property as follows:\n\
    \n```\ndef watchedResources = \"file:./grails-app/i18n/*.properties\"\n```\n\n\
    What this says is that the `i18n` plug-in will monitor all files within the `grails-app/i18n`\
    \ directory ending with the file extension `.properties`.\n\n![Image](images/square.jpg)\
    \ **Tip** If you’re wondering about the file-matching patterns the `watchedResources`\
    \ property uses, take a look at Spring’s `org.springframework.core.io.support.PathMatchingResourcePatternResolver`\
    \ class, as well as the Spring Core IO package in general, which Grails uses under\
    \ the covers.\n\nWhenever one of the properties files in the `grails-app/i18n`\
    \ directory changes, Grails will automatically trigger the `onChange` event of\
    \ the plug-in or plug-ins, monitoring the file passing in a change `event` object.\
    \ The `event` object is essentially just a map containing the following entries:\n\
    \n- `source`: the source of the event, which is either a Spring `org.springframework.core.io.Resource`\
    \ instance, representing the file on disk, or the recompiled and changed `java.lang.Class`\
    \ instance, if the `watchedResources` property refers to Groovy classes\n- `application`:\
    \ a reference to the `GrailsApplication` instance\n- `manager`: a reference to\
    \ the `GrailsPluginManager` instance\n- `ctx`: a reference to the Spring `ApplicationContext`\
    \ instance\n\nTypically the most important entry in the `event` map is the `source`,\
    \ which contains a reference to the source of the change. In the case of the `i18n`\
    \ plug-in, the `source` entry would reference a Spring `org.springframework.core.io.Resource`\
    \ instance, since the properties files monitored by the `i18n` plug-in are not\
    \ Groovy classes. However, if you develop a plug-in where you choose to monitor\
    \ Groovy classes instead, Grails will automatically recompile the changed class\
    \ and place the altered class within the `source` entry in the `event` map.\n\n\
    Consider the Quartz plug-in discussed in previous sections. The `watchedResources`\
    \ definition for that plug-in would look something like this:\n\n```\ndef watchedResources\
    \ = \"file:./grails-app/jobs/**/*Job.groovy\"\n```\n\nWhenever one of the Groovy\
    \ files changes, Grails will recompile the class and pass you a reference to the\
    \ `java.lang.Class` instance representing the job. However, that is all Grails\
    \ will do. It’s then up to you to make whatever changes you deem necessary to\
    \ the running application to ensure it is now in the correct state. For example,\
    \ in the “Dynamic Spring Beans Using Conventions” section, you saw how to dynamically\
    \ register new `JobDetail` beans for each job class. To implement reloading correctly\
    \ for the Quartz plug-in, you need to ensure that those beans are replaced with\
    \ the new class. [Listing 12-26](#Chapter12.html#list_12_26) shows a hypothetical\
    \ implementation that takes the newly recompiled class and registers new beans\
    \ with the `ApplicationContext`.\n\n**Listing 12-26.** Implementing `onChange`\
    \ for the Quartz Plug-in"
  raw: '##### Using Metaprogramming to Enhance Behavior


    In the previous section, you saw how plug-ins can participate in the configuration
    of the Spring `ApplicationContext`. Now let’s look at another area that plug-ins
    typically contribute to: the application behavior. Groovy is a fully dynamic language
    that allows you to completely modify the behavior of a class at runtime through
    its metaprogramming APIs.


    ![Image](images/square.jpg) **Tip** If you want a book with significant coverage
    of Groovy’s metaprogramming capabilities, look at *Programming Groovy*, by Venkat
    Subramaniam (Pragmatic Programmers, 2008).


    Like Smalltalk, Ruby, Lisp, and other dynamic languages, Groovy features a (Meta
    Object Protocol MOP). The key thing to remember is that it is the MOP that decides
    the behavior of Groovy code at runtime, so code that looks as though it may do
    one thing at compile time could be made to do something completely different.
    For each `java.lang.Class` that Groovy knows about, there is an associated `MetaClass`.
    The `MetaClass` is what dictates how a particular method, constructor, or property
    behaves at runtime.


    Groovy’s `MetaClass` allows you to add methods, properties, constructors, and
    static methods to any class. For example, consider the code in [Listing 12-24](#Chapter12.html#list_12_24).


    ***Listing 12-24.** Adding New Methods to a Class*


    `class Dog {}`

    `Dog.metaClass.bark = { "woof!" }`

    `assert "woof!" == new Dog().bark()`


    Here you have a simple class called `Dog`. Instances of the `Dog` class cannot,
    as it stands, bark. However, by using the `MetaClass`, you can create a `bark`
    method with this expression:


    `Dog.metaClass.bark = { "woof!" }`


    Clearly, this example has only brushed the surface of what is possible. Groovy
    provides a whole lot of capabilities related to runtime metaprogramming, all of
    which are available in the context of a Grails application.


    Let’s look at an example within the context of a Grails plug-in by trying to add
    the `cacheOrReturn` method to all controllers to eliminate the need to inject
    the service via Spring first. [Listing 12-25](#Chapter12.html#list_12_25) demonstrates
    how, by simply delegating to the `CacheService`, you can add a `cacheOrReturn`
    method to all controllers too.


    ![Image](images/square.jpg) **Tip** If you prefer not to create a plug-in but
    would still like to do metaprogramming in your Grails application, we recommend
    you do so within a `Bootstrap` class, a topic covered in [Chapter 12](#Chapter12.html#ch12).


    ***Listing 12-25.** Adding Methods to All Controllers*


    `class SimpleCacheGrailsPlugin {`

    `    ...`

    `    def doWithDynamicMethods = { applicationContext ->`

    `        def cacheService = applicationContext.getBean("cacheService")`

    `        application.controllerClasses*.metaClass*.cacheOrReturn = {`

    `            Serializable cacheKey, Closure callable ->`


    `            cacheService.cacheOrReturn(cacheKey, callable)`

    `        }`

    `    }`

    `}`


    Another important aspect to notice about the code in [Listing 12-25](#Chapter12.html#list_12_25)
    is the use of Groovy’s spread dot operator `*.` to obtain all the `MetaClass`
    instances from all the `controllerClasses` and also the use of a spread assignment
    to create a `cacheOrReturn` method for each `MetaClass`. That’s far easier than
    adding a `for` or `each` loop!


    #### Plug-in Events and Application Reloading


    As well as the plug-in hooks discussed in the “Plug-in Hooks” section, plug-ins
    can also participate in a number of events, including application reload events.
    Grails aims to minimize the number of application restarts required during development
    time. However, since reloading is typically different for each artefact type,
    the responsibility to reload is delegated to plug-ins.


    A plug-in can essentially listen for three core events: `onChange`, `onConfigChange`,
    and `onShutdown`. Let’s take a look at `onChange` first, as it is the most common
    event dealt with by plug-ins. Each individual plug-in can monitor a set of resources.
    These are defined by a property called `watchedResources`. For example, as part
    of Grails core, there is a plug-in that provides support for internationalization
    (covered in [Chapter 7](#Chapter07.html#ch7)) through the use of message bundles
    found in the `grails-app/i18n` directory. The `i18n` plug-in defines its `watchedResources`
    property as follows:


    `def watchedResources = "file:./grails-app/i18n/*.properties"`


    What this says is that the `i18n` plug-in will monitor all files within the `grails-app/i18n`
    directory ending with the file extension `.properties`.


    ![Image](images/square.jpg) **Tip** If you’re wondering about the file-matching
    patterns the `watchedResources` property uses, take a look at Spring’s `org.springframework.core.io.support.PathMatchingResourcePatternResolver`
    class, as well as the Spring Core IO package in general, which Grails uses under
    the covers.


    Whenever one of the properties files in the `grails-app/il8n` directory changes,
    Grails will automatically trigger the `onChange` event of the plug-in or plug-ins,
    monitoring the file passing in a change `event` object. The `event` object is
    essentially just a map containing the following entries:


    > *   `source`: the source of the event, which is either a Spring `org.springframework.core.io.Resource`
    instance, representing the file on disk, or the recompiled and changed `Java.lang.Class`
    instance, if the `watchResources` property refers to Groovy classes

    > *   `application`: a reference to the `GrailsApplication` instance

    > *   `manager`: a reference to the `GrailsPluginManager` instance

    > *   `ctx`: a reference to the Spring `ApplicationContext` instance


    Typically the most important entry in the `event` map is the `source`, which contains
    a reference to the source of the change. In the case of the `i18n` plug-in, the
    `source` entry would reference a Spring `org.springframework.core.io.Resource`
    instance, since the properties files monitored by the `i18n` plug-in are not Groovy
    classes. However, if you develop a plug-in where you choose to monitor Groovy
    classes instead, Grails will automatically recompile the changed class and place
    the altered class within the `source` entry in the `event` map.


    Consider the Quartz plug-in discussed in previous sections. The `watchedResources`
    definition for that plug-in would look something like this:


    `def watchedResources = "file:./grails-app/jobs/**/*Job.groovy"`


    Whenever one of the Groovy files changes, Grails will recompile the class and
    pass you a reference to the `java.lang.Class` instance representing the job. However,
    that is all Grails will do. It’s then up to you to make whatever changes you deem
    necessary to the running application to ensure it is now in the correct state.
    For example, in the “Dynamic Spring Beans Using Conventions” section, you saw
    how to dynamically register new `JobDetail` beans for each job class. To implement
    reloading correctly for the Quartz plug-in, you need to ensure that those beans
    are replaced with the new class. [Listing 12-26](#Chapter12.html#list_12_26) shows
    a hypothetical implementation that takes the newly recompiled class and registers
    new beans with the `ApplicationContext`.


    ***Listing 12-26.** Implementing onChange for the Quartz Plug-in*'
