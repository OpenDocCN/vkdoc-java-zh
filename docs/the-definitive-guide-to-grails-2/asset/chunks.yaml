    `    album.title = "Changed Title"`

    `    album.save(flush:true)`

    `    // 出现问题`

    `    throw new Exception("Ruh Roh!")`

    `}`


    代码清单 9-52 中的示例展示了一个常见问题。在 save 操作的前三行中，使用 `get` 方法获取了一个 `Album` 类的实例，更新了标题，然后调用了
