    ### Deployment


    Moving your application from a development environment onto a production or test
    server often presents you with a number of choices. The options when deploying
    Grails are many and varied, and they run the gamut from simple to complex. In
    the following sections, you’ll be looking at different ways of deploying Grails
    and how to customize the deployment process.


    #### Deploying with Grails


    If you’re looking for a simple way to manage deployment and aren’t too concerned
    about fine-tuning the details of your container, then deploying with Grails itself
    is certainly a simple way to go about it. To deploy with Grails, all you need
    to do is install Grails on the target server and then use the `run-war` command
    from the root of the project:


    `$ grails run-war`


    This will start a Tomcat server on port 8080\. On this point, you can configure
    the ubiquitous Apache HTTPD server ([`http://httpd.apache.org/`](http://httpd.apache.org/))
    to use `mod_proxy` to relay requests to the Tomcat server. The details of the
    configuration can be found at the Apache web site, [`http://tomcat.apache.org/connectors-doc/webserver_howto/apache.html`](http://tomcat.apache.org/connectors-doc/webserver_howto/apache.html).
    Alternatively, you could even run Tomcat on port 80, so that it acts as the primary
    web server:


    `$ grails -Dserver.port=80 run-war`


    As simple as this approach is, many organizations favor a more structured approach
    to deployment and use that standard Java stalwart, the WAR file.


    #### Deploying to a Container


    You learned about creating a WAR file as early as [Chapter 2](#Chapter02.html#ch2).
    When thinking about deployment in the Java world, the first thing that usually
    comes to mind is how to create a WAR. It is one of the strengths of the Java platform
    that you can take a WAR file and deploy it onto a wide range of containers.


    From the commercial 800-pound gorillas like IBM WebSphere and BEA WebLogic to
    the popular open source containers like Tomcat and JBoss, there are options aplenty.
    Against the background of all this helpful standardization, it is unfortunate
    that the way in which you deploy a WAR file is still not standardized.


    On something like Tomcat, it’s typically just a matter of dropping your WAR file
    into the `TOMCAT_HOME/webapps` directory, while on WebSphere there is a fancy
    GUI wizard that allows you to upload a WAR file via a browser. Nevertheless, there
    are some important things to consider when deploying to a container. The following
    is a list of key points to remember when deploying with Grails.


    > *   Make sure that the `-server` flag is passed to the JVM that runs your container
    to enable the server VM. Running Grails on the client VM has a negative impact
    on performance.

    > *   Depending on the number of GSP views you have, you may need to allocate
    more *permgen* space (the area of memory the JVM uses for dynamically compiled
    classes). GSP views are compiled at runtime on first load into byte code, so they
    require permgen space. You can allocate more permgen with the `-XX:MaxPermSize=256m`
    flag.

    > *   It is advisable to allocate extra memory to the JVM when running a Grails
    application. Simple Grails applications have been known to perform well on shared
    virtual hosting with low memory, but the more you can allocate, the better. For
    example, to allocate 512 megabytes of heap space, you can use the `-Xmx512M` flag.'
