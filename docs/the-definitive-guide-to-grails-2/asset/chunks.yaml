    framework’s very early days. Earlier he was part of G2One, the Groovy/Grails company
    that eventually became part of SpringSource.


    ## About the Technical Reviewer


    ![Image](images/9781430243779_unFM-02.jpg)


    ![Image](images/square.jpg) **Graeme Rocher**, a software engineer, a consultant,
    and an expert in dynamic language, serves as head of Grails Development at SpringSource
    ([www.springsource.com](http://www.springsource.com)). Graeme is the project lead
    of the open source Grails web application framework ([http://grails.org](http://grails.org))
