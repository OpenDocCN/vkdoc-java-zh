- fmt: "### Summary\n\nThe URL mapping engine provided by Grails is very flexible.\
    \ Nearly any URL pattern that you might want to map to a particular controller\
    \ action can easily be configured simply by writing a small amount of Groovy code\
    \ in `UrlMappings.groovy`. The framework provides a lot of mechanisms that enable\
    \ you to spend less time configuring the framework and more time solving business\
    \ problems in your application. The URL mapping engine is one more example of\
    \ this. Custom URL mappings are simple to write and simple to test.\n\n## CHAPTER\
    \ 7\n\n![Image](images/3squ.jpg)\n\n## Internationalization\n\nOne of the great\
    \ things about web applications is that they are really easy to distribute to\
    \ a lot of people. When deploying web applications to a broad audience, often\
    \ the applications need to adapt and behave differently under certain circumstances.\
    \ For example, when a request from Spain is made to a web application, the application\
    \ may want to display messages to the user in Spanish, but the same application\
    \ will want to render messages in English if the request comes from New York.\
    \ The adaptations made by the application may involve more complexity than simply\
    \ displaying different versions of text. An application may need to impose different\
    \ business rules based on the origin of a particular request.\n\nGrails provides\
    \ a number of mechanisms for dealing with the internationalization and localization\
    \ of a web application. In this chapter, we will explore those mechanisms, and\
    \ you will see that internationalizing a web application does not have to be terribly\
    \ difficult.\n\n### Localizing Messages\n\nWhen deploying a Grails application\
    \ to a broad audience, you may want the application to display messages in the\
    \ user’s preferred language. One way of providing this capability is to have a\
    \ separate version of the application for each language you want to target. That\
    \ approach has lots of problems. Maintaining all those different versions and\
    \ trying to keep them all in sync would be an awful lot of work. A much better\
    \ idea is to have a single version of the application that is flexible enough\
    \ to display messages in various languages using localized messages.\n\nTo support\
    \ localized messages in your Grails application, you should be defining all user\
    \ messages in a properties file. In other words, user messages should not be hard-coded\
    \ in GSP pages, GSP templates, or anywhere else. Having messages in a properties\
    \ file allows you to maintain all of them all in a single place. It also lets\
    \ you take advantage of the localization capabilities provided by Grails.\n\n\
    #### Defining User Messages\n\nWhen a Grails app is created, the project includes\
    \ a number of localized property files in the `grails-app/i18n/` directory. [Figure\
    \ 7-1](#Chapter07.html#fig_7_1) shows the contents of the `grails-app/i18n/` directory.\n\
    \n![Image](images/9781430243779_Fig07-01.jpg)\n\n**Figure 7-1.** The `grails-app/i18n/`\
    \ directory\n\nThe `messages.properties` file in the `grails-app/i18n/` directory\
    \ contains default validation messages in English. These messages are used when\
    \ validation fails in a domain class or command object. You can add your own application\
    \ messages to this file. In addition to the default `messages.properties` file,\
    \ this directory has several other properties files that contain the same messages\
    \ in other languages. For example, “es” is the language code for Spanish, so `messages_es.properties`\
    \ contains validation messages in Spanish.\n\n![Image](images/square.jpg) **Note**\
    \ The naming convention for the messages files follows the standard convention\
    \ used by the `java.util.ResourceBundle` class. For more information, see the\
    \ documentation for `java.util.ResourceBundle` and `java.util.Locale`: [http://java.sun.com/j2se/1.5.0/docs/api/](http://java.sun.com/j2se/1.5.0/docs/api/).\n\
    \nProperty files are plain text files, which contain name-value pairs. [Listing\
    \ 7-1](#Chapter07.html#list_7_1) represents a simple properties file.\n\n**Listing\
    \ 7-1.** A Simple Property File\n\n```\n# messages.properties\napp.name=gTunes\n\
    book.title=The Definitive Guide To Grails\nfavorite.language=Groovy\nfavorite.framework=Grails\n\
    ```\n\n#### Retrieving Message Values\n\nIn a standard Java or Groovy program,\
    \ you would use the `java.util.ResourceBundle` class to retrieve values from a\
    \ properties file. [Listing 7-2](#Chapter07.html#list_7_2) demonstrates how you\
    \ would retrieve and print the value of the `app.name` property.\n\n**Listing\
    \ 7-2.** Using `java.util.ResourceBundle`\n\n```\n// JavaMessages.java\nimport\
    \ java.util.ResourceBundle;\n\npublic class JavaMessages {\n\n    public static\
    \ void main(String[] args) {\n        ResourceBundle bundle = ResourceBundle.getBundle(\"\
    messages\");\n        String appName = bundle.getString(\"app.name\");\n     \
    \   System.out.println(\"application name is \" + appName);\n    }\n}\n\n// GroovyMessages.groovy\n\
    def messages = ResourceBundle.getBundle('messages')\ndef appName = messages.getString('app.name')\n\
    println \"application name is ${appName}\"\n```\n\nThe `java.util.ResourceBundle`\
    \ class takes care of loading the properties file and providing an API to retrieve\
    \ the values of properties defined in the file. Grails provides a GSP tag called\
    \ `message` that will retrieve property values from the messages files in the\
    \ `grails-app/i18n/` directory. For the simplest case, only the `code` attribute\
    \ must be specified when calling the `message` tag. The `code` attribute tells\
    \ the `message` tag which property value should be retrieved. For example, if\
    \ a property named `gtunes.welcome` is defined in `grails-app/i18n/messages.properties`,\
    \ the value of that property may be rendered in a GSP using code like that shown\
    \ in [Listing 7-3](#Chapter07.html#list_7_3).\n\n**Listing 7-3.** Using the `message`\
    \ Tag\n\n```\n<body>\n...\n<g:message code=\"gtunes.welcome\"/>\n... </body>\n\
    ```\n\nBy default, Grails will decide which version of the property file to use\
    \ based on the locale of the current web request. Thus, you won’t often need to\
    \ do anything special in your application code with respect to localization. If\
    \ you define your message properties in several language-specific versions of\
    \ the properties files under `grails-app/i18n/`, then Grails will use the appropriate\
    \ file based on the client’s locale.\n\n[Figure 7-2](#Chapter07.html#fig_7_2)\
    \ represents the gTunes home page in English.\n\n![Image](images/9781430243779_Fig07-02.jpg)\n\
    \n**Figure 7-2.** gTunes in English\n\nThere are several user messages represented\
    \ in [Figure 7-2](#Chapter07.html#fig_7_2). For example, on the left side of the\
    \ screen is a navigation area, which includes the “My Music” and “The Store” links.\
    \ The labels for those links will include different text when the application\
    \ is accessed from different locales. The best way to deal with that is to define\
    \ those messages as properties and render the messages in the GSP with the `message`\
    \ tag. [Listing 7-4](#Chapter07.html#list_7_4) shows how those properties might\
    \ be defined in `grails-app/i18n/messages.properties`.\n\n**Listing 7-4.** User\
    \ Messages in `grails-app/i18n/messages.properties`\n\n```\ngtunes.my.music=My\
    \ Music\ngtunes.the.store=The Store ...\n```\n\nWith those properties defined,\
    \ a GSP can render those values using the `message` tag, as shown in [Listing\
    \ 7-5](#Chapter07.html#list_7_5).\n\n**Listing 7-5.** Rendering Property Values\
    \ from a GSP\n\n```\n<div id=\"navButtons\">\n  <ul>\n    <li><a href=\"#\"><g:message\
    \ code=\"gtunes.my.music\"/></a></li>\n    <li><g:link controller=\"store\" action=\"\
    shop\">\n          <g:message code=\"gtunes.the.store\"/>\n        </g:link>\n\
    \    </li>\n  </ul>\n</div>\n```\n\nWith that code in place, you may add corresponding\
    \ properties to as many of the other messages files as you like. To support a\
    \ Spanish version of the site, add corresponding properties to `grails-app/i18n/messages_es.properties`,\
    \ as shown in [Listing 7-6](#Chapter07.html#list_7_6).\n\n**Listing 7-6.** User\
    \ Messages in `grails-app/i18n/messages_es.properties`\n\n```\ngtunes.my.music=Mi\
    \ Musica\ngtunes.the.store=La Tienda\n```"
  raw: '### Summary


    The URL mapping engine provided by Grails is very flexible. Nearly any URL pattern
    that you might want to map to a particular controller action can easily be configured
    simply by writing a small amount of Groovy code in `UrlMappings.groovy`. The framework
    provides a lot of mechanisms that enable you to spend less time configuring the
    framework and more time solving business problems in your application. The URL
    mapping engine is one more example of this. Custom URL mappings are simple to
    write and simple to test.


    ## CHAPTER 7


    ![Image](images/3squ.jpg)


    ## Internationalization


    One of the great things about web applications is that they are really easy to
    distribute to a lot of people. When deploying web applications to a broad audience,
    often the applications need to adapt and behave differently under certain circumstances.
    For example, when a request from Spain is made to a web application, the application
    may want to display messages to the user in Spanish, but the same application
    will want to render messages in English if the request comes from New York. The
    adaptations made by the application may involve more complexity than simply displaying
    different versions of text. An application may need to impose different business
    rules based on the origin of a particular request.


    Grails provides a number of mechanisms for dealing with the internationalization
    and localization of a web application. In this chapter, we will explore those
    mechanisms, and you will see that internationalizing a web application does not
    have to be terribly difficult.


    ### Localizing Messages


    When deploying a Grails application to a broad audience, you may want the application
    to display messages in the user’s preferred language. One way of providing this
    capability is to have a separate version of the application for each language
    you want to target. That approach has lots of problems. Maintaining all those
    different versions and trying to keep them all in sync would be an awful lot of
    work. A much better idea is to have a single version of the application that is
    flexible enough to display messages in various languages using localized messages.


    To support localized messages in your Grails application, you should be defining
    all user messages in a properties file. In other words, user messages should not
    be hard-coded in GSP pages, GSP templates, or anywhere else. Having messages in
    a properties file allows you to maintain all of them all in a single place. It
    also lets you take advantage of the localization capabilities provided by Grails.


    #### Defining User Messages


    When a Grails app is created, the project includes a number of localized property
    files in the `grails-app/i18n/` directory. [Figure 7-1](#Chapter07.html#fig_7_1)
    shows the contents of the `grails-app/i18n/` directory.


    ![Image](images/9781430243779_Fig07-01.jpg)


    ***Figure 7-1.** The grails-app/i18n/ directory*


    The `messages.properties` file in the `grails-app/i18n/` directory contains default
    validation messages in English. These messages are used when validation fails
    in a domain class or command object. You can add your own application messages
    to this file. In addition to the default `messages.properties` file, this directory
    has several other properties files that contain the same messages in other languages.
    For example, “es” is the language code for Spanish, so `messages_es.properties`
    contains validation messages in Spanish.


    ![Image](images/square.jpg) **Note**  The naming convention for the messages files
    follows the standard convention used by the java.util.ResourceBundle class. For
    more information, see the documentation for java.util. ResourceBundle and java.util.Locale:
    [http://java.sun.com/j2se/1.5.0/docs/api/](http://java.sun.com/j2se/1.5.0/docs/api/).


    Property files are plain text files, which contain name-value pairs. [Listing
    7-1](#Chapter07.html#list_7_1) represents a simple properties file.


    ***Listing 7-1.** A Simple Property File*


    `# messages.properties`

    `app.name=gTunes`

    `book.title=The Definitive Guide To Grails`

    `favorite.language=Groovy`

    `favorite.framework=Grails`


    #### Retrieving Message Values


    In a standard Java or Groovy program, you would use the `java.util.ResourceBundle`
    class to retrieve values from a properties file. [Listing 7-2](#Chapter07.html#list_7_2)
    demonstrates how you would retrieve and print the value of the `app.name` property.


    ***Listing 7-2.** Using java.util.ResourceBundle*


    `// JavaMessages.java`

    `import java.util.ResourceBundle;`


    `public class JavaMessages {`


    `    public static void main(String[] args) {`

    `        ResourceBundle bundle = ResourceBundle.getBundle("messages");`

    `        String appName = bundle.getString("app.name");`

    `        System.out.println("application name is " + appName);`

    `    }`

    `}`


    `// GroovyMessages.groovy`

    `def messages = ResourceBundle.getBundle(''messages'')`

    `def appName = messages.getString(''app.name'')`

    `println "application name is ${appName}"`


    The `java.util.ResourceBundle` class takes care of loading the properties file
    and providing an API to retrieve the values of properties defined in the file.
    Grails provides a GSP tag called `message` that will retrieve property values
    from the messages files in the `grails-app/i18n/` directory. For the simplest
    case, only the `code` attribute must be specified when calling the `message` tag.
    The `code` attribute tells the `message` tag which property value should be retrieved.
    For example, if a property named `gtunes.welcome` is defined in `grails-app/i18n/messages.properties`,
    the value of that property may be rendered in a GSP using code like that shown
    in [Listing 7-3](#Chapter07.html#list_7_3).


    ***Listing 7-3.** Using the message Tag*


    `<body>`

    `...`

    `<g:message code="gtunes.welcome"/>`

    `... </body>`


    By default, Grails will decide which version of the property file to use based
    on the locale of the current web request. Thus, you won’t often need to do anything
    special in your application code with respect to localization. If you define your
    message properties in several language-specific versions of the properties files
    under `grails-app/i18n/`, then Grails will use the appropriate file based on the
    client’s locale.


    [Figure 7-2](#Chapter07.html#fig_7_2) represents the gTunes home page in English.


    ![Image](images/9781430243779_Fig07-02.jpg)


    ***Figure 7-2.** gTunes in English*


    There are several user messages represented in [Figure 7-2](#Chapter07.html#fig_7_2).
    For example, on the left side of the screen is a navigation area, which includes
    the “My Music” and “The Store” links. The labels for those links will include
    different text when the application is accessed from different locales. The best
    way to deal with that is to define those messages as properties and render the
    messages in the GSP with the `message` tag. [Listing 7-4](#Chapter07.html#list_7_4)
    shows how those properties might be defined in `grails-app/i18n/messages.properties`.


    ***Listing 7-4.** User Messages in grails-app/i18n/messages.properties*


    `gtunes.my.music=My Music`

    `gtunes.the.store=The Store ...`


    With those properties defined, a GSP can render those values using the `message`
    tag, as shown in [Listing 7-5](#Chapter07.html#list_7_5).


    ***Listing 7-5.** Rendering Property Values from a GSP*


    `<div id="navButtons">`

    `  <ul>`

    `    <li><a href="#"><g:message code="gtunes.my.music"/></a></li>`

    `    <li><g:link controller="store" action="shop">`

    `          <g:message code="gtunes.the.store"/>`

    `        </g:link>`

    `    </li>`

    `  </ul>`

    `</div>`


    With that code in place, you may add corresponding properties to as many of the
    other messages files as you like. To support a Spanish version of the site, add
    corresponding properties to `grails-app/i18n/messages_es.properties`, as shown
    in [Listing 7-6](#Chapter07.html#list_7_6).


    ***Listing 7-6.** User Messages in grails-app/i18n/messages_es.properties*


    `gtunes.my.music=Mi Musica`

    `gtunes.the.store=La Tienda`'
