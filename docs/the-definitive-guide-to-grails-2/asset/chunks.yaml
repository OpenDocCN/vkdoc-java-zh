    #### 合并变更


    要将一个可能处于游离状态的对象的状态合并到另一个对象中，你需要使用静态的 `merge` 方法。`merge` 方法接受一个实例，如果 `Session`
    中尚不存在同一逻辑对象的持久化实例，则会加载该实例，然后将传入实例的状态合并到已加载的持久化实例中。完成后，`merge` 方法会返回一个包含合并后状态的新实例。代码清单
    9-58 展示了使用 `merge` 方法的示例。


