- fmt: "# Exporting Data to XML\n\nAnother fairly common use of command-line scripts\
    \ is to allow the migration of data. This can be done by performing an SQL dump\
    \ of the database, but you may want to offer the ability to export all content\
    \ held in the database as XML, as some web applications such as Atlassian Confluence\
    \ and JIRA do.\n\nLet’s start by considering how you would write an export script\
    \ that dumped all the relevant data from the gTunes application into a single\
    \ parsable XML document. First, you’ll need to create a new Gant script called\
    \ `export-library-to-xml`:\n\n```\ngrails> create-script ExportLibraryToXml\n\
    | Created file scripts/ExportLibraryToXml.groovy\ngrails>\n```\n\nWith that done,\
    \ you’re going to need to take advantage of the `GRAILS_HOME/scripts/_GrailsBootstrap.groovy`\
    \ script discussed earlier. To do so, simply include `_GrailsBootstrap.groovy`:\n\
    \n```\nincludeTargets << grailsScript(\"_GrailsBootstrap\")\n```\n\nInside the\
    \ `main` target, you then need to depend on the `bootstrap` target:\n\n```\ndepends\
    \ bootstrap\n```\n\nFirst, using `argsMap`, you can work out the file to export\
    \ to by either taking the first argument or creating a name programmatically:\n\
    \n```\n    def file = argsMap.params ?\n               new File(argsMap.params[0])\
    \ :\n               new File(\"./gtunes-data=${System.currentTimeMillis()}.xml\"\
    )\n```\n\nAs mentioned previously, the `bootstrap` target will set up a `grailsApp`\
    \ variable that holds a reference to the `GrailsApplication` instance. This instance\
    \ can be used to dynamically load classes using the `classLoader` property. This\
    \ needs to be done because Gant scripts cannot directly reference the classes\
    \ in your application, as they can’t know whether those classes have been compiled\
    \ yet. Luckily, obtaining a reference to any class using the `classLoader` is\
    \ pretty trivial:\n\n```\ndef artistClass = grailsApp.classLoader.loadClass('com.gtunes.Artist')\n\
    ```\n\nUnlike Java, with Groovy you can invoke any static method using a reference\
    \ to `java.lang.Class`; hence, you can use regular GORM methods easily even with\
    \ a dynamically loaded class reference. The first example of this is using the\
    \ static `count()` method to figure out how many artists there are:\n\n```\n \
    \   def artistClass = grailsApp.classLoader.loadClass('com.gtunes.Artist')\n \
    \   def artistCount = artistClass.count()\n```\n\nNow it’s time to create the\
    \ XML. To do so, you’re going to use Groovy’s `StreamingMarkupBuilder` class.\
    \ [Listing 11-30](#Chapter11.html#list_11_30) shows how to construct and use `StreamingMarkupBuilder`.\n\
    \n**Listing 11-30.** Using `StreamingMarkupBuilder` to Write to a File\n\n```\n\
    new FileWriter(file) << new groovy.xml.StreamingMarkupBuilder().bind {\n    music\
    \ {\n        ...\n    }\n}\n```\n\nBuilders in Groovy allow you to construct hierarchies\
    \ of nodes, a concept that fits nicely into the construction of XML. In this case,\
    \ the `music` method will become the root element `<music>` of the XML document.\
    \ In the next step, you initiate a transaction using the `withTransaction` method\
    \ first discussed in [Chapter 10](#Chapter10.html#ch10).\n\nYou use a transaction\
    \ here so that a common Hibernate `Session` is shared for the remainder of the\
    \ code, hence avoiding a `LazyInitializationException` occurring when accessing\
    \ uninitialized associations. In Grails, unlike the server environment, the Hibernate\
    \ `Session` is not managed for you in scripts, but by using `withTransaction`,\
    \ you can circumvent that:\n\n```\nartistClass.withTransaction {\n    ...\n}\n\
    ```\n\nAlong with `withTransaction`, you’re going to take advantage of the `withSession`\
    \ method to obtain a reference to the Hibernate `Session` object used. As discussed\
    \ in [Chapter 10](#Chapter10.html#ch10), when reading a large amount of data into\
    \ the Hibernate `Session`, you may run out of memory if you don’t periodically\
    \ clear the `Session`. Since you don’t exactly know how much data is in the database,\
    \ you’re going to be doing that here:\n\n```\nartistClass.withSession { session\
    \ ->\n    ...\n}\n```\n\nThe next step, if you’ll excuse the pun, is to employ\
    \ the `step` method, using the previously obtained `artistCount` variable to perform\
    \ pagination of records. With this technique, you can obtain, say, ten `Artist`\
    \ instances, including associations. You can manipulate them in some way and then\
    \ clear the `Session` before loading the next ten. [Listing 11-31](#Chapter11.html#list_11_31)\
    \ shows the code in action.\n\n**Listing 11-31.** Using the `step` Method to Paginate\
    \ Records\n\n```\n0.step(artistCount, 10) { offset ->\n    def artistList = artistClass.list(offset:\
    \ offset,\n                                      max: 10,\n                  \
    \                    fetch: [albums: 'join'])\n    session.clear()\n}\n```\n\n\
    With a list of `Artist` instances in hand, now it’s just a matter of iterating\
    \ over each one to create a bunch of `<artist>` XML elements:\n\n```\nfor(currentArtist\
    \ in artistList) {\n    artist(name: currentArtist.name) {\n        ...\n    }\n\
    }\n```\n\nFinally, you also need to include all the `Album` instances associated\
    \ with each `Artist` and all the `Song` instances associated with each `Album`.\
    \ You can achieve this with a couple more nested loops:\n\n```\nfor(currentAlbum\
    \ in currentArtist.albums) {\n    album(currentAlbum.properties['title', 'year',\
    \ 'genre', 'price']) {\n        for(currentSong in currentAlbum.songs) {\n   \
    \         song(currentSong.properties['title', 'duration'])\n        }\n    }\n\
    }\n```\n\nNotice how you can reference a subset of each `Album` instance’s property\
    \ values using the subscript operator and a list of property names:\n\n```\ncurrentAlbum.properties['title',\
    \ 'year', 'genre', 'price']\n```\n\nWith that, the `export-library-to-xml` script\
    \ is complete. [Listing 11-32](#Chapter11.html#list_11_32) shows the full code\
    \ listing for the `export-library-to-xml` Gant script.\n\n**Listing 11-32.** The\
    \ Full `export-library-to-xml` Code\n\n```\nincludeTargets << grailsScript(\"\
    _GrailsBootstrap\")\n\ntarget(main: \"Exports the gTunes database to XML\") {\n\
    \  depends bootstrap\n  def file = argsMap.params ?\n               new File(argsMap.params[0])\
    \ :\n               new File(\"./gtunes-data=${System.currentTimeMillis()}.xml\"\
    )\n  def artistClass = grailsApp.classLoader.loadClass('com.gtunes.Artist')\n\
    \  def artistCount = artistClass.count()\n  println \"Creating XML for ${artistCount}\
    \ artists\"\n  new FileWriter(file) << new groovy.xml.StreamingMarkupBuilder().bind\
    \ {\n    music {\n      artistClass.withTransaction {\n          artistClass.withSession\
    \ { session ->\n            0.step(artistCount, 10) { offset ->\n            \
    \  def artistList = artistClass.list(offset: offset, max: 10, fetch: [albums:\n\
    'join'])\n              for(currentArtist in artistList) {\n                artist(name:\
    \ currentArtist.name) {\n                  for(currentAlbum in currentArtist.albums)\
    \ {\n                    album(currentAlbum.properties['title', 'year', 'genre',\
    \ 'price']) {\n                      for(currentSong in currentAlbum.songs) {\n\
    \                        song(currentSong.properties['title', 'duration'])\n \
    \                     }\n                    }\n                  }\n        \
    \        }\n              }\n            session.clear()\n          }\n      \
    \  }\n      }\n    }\n  }\n  println \"Done. Created XML ${file.absolutePath}\"\
    \n}\n\nsetDefaultTarget(main)\n```\n\nAs you can see from the full code in [Listing\
    \ 11-21](#Chapter11.html#list_11_21), you can also add a couple of `println` statements\
    \ just to inform the user what is going on. You can now run the `export-library-to-xml`\
    \ script using the `grails` command, and out will pop an XML document, as shown\
    \ in [Listing 11-33](#Chapter11.html#list_11_33).\n\n**Listing 11-33.** Running\
    \ the `export-library-to-xml` Script\n\n```\n$ grails export-library-to-xml\n\
    Creating XML for 498 artists\nDone. Created XML /Developer/projects/gtunes/gtunes-data=1351863192571.xml\n\
    ```"
  raw: '###### Exporting Data to XML


    Another fairly common use of command-line scripts is to allow the migration of
    data. This can be done by performing an SQL dump of the database, but you may
    want to offer the ability to export all content held in the database as XML, as
    some web applications such as Atlassian Confluence and JIRA do.


    Let’s start by considering how you would write an export script that dumped all
    the relevant data from the gTunes application into a single parsable XML document.
    First, you’ll need to create a new Gant script called `export-library-to-xml`:


    `grails> create-script ExportLibraryToXml`

    `| Created file scripts/ExportLibraryToXml.groovy`

    `grails>`


    With that done, you’re going to need to take advantage of the `GRAILS_HOME/scripts/_GrailsBootstrap.groovy`
    script discussed earlier. To do so, simply include `_GrailsBootstrap.groovy`:


    `includeTargets << grailsScript("_GrailsBootstrap")`


    Inside the `main` target, you then need to depend on the `bootstrap` target:


    `depends bootstrap`


    First, using `argsMap`, you can work out the file to export to by either taking
    the first argument or creating a name programmatically:


    `    def file = argsMap.params ?`

    `               new File(argsMap.params[0]) :`

    `               new File("./gtunes-data=${System.currentTimeMillis()}.xml")`


    As mentioned previously, the `bootstrap` target will set up a `grailsApp` variable
    that holds a reference to the `GrailsApplication` instance. This instance can
    be used to dynamically load classes using the `classLoader` property. This needs
    to be done because Gant scripts cannot directly reference the classes in your
    application, as they can’t know whether those classes have been compiled yet.
    Luckily, obtaining a reference to any class using the `classLoader` is pretty
    trivial:


    `def artistClass = grailsApp.classLoader.loadClass(''com.gtunes.Artist'')`


    Unlike Java, with Groovy you can invoke any static method using a reference to
    `java.lang.Class`; hence, you can use regular GORM methods easily even with a
    dynamically loaded class reference. The first example of this is using the static
    `count()` method to figure out how many artists there are:


    `    def artistClass = grailsApp.classLoader.loadClass(''com.gtunes.Artist'')`

    `    def artistCount = artistClass.count()`


    Now it’s time to create the XML. To do so, you’re going to use Groovy’s `StreamingMarkupBuilder`
    class. [Listing 11-30](#Chapter11.html#list_11_30) shows how to construct and
    use `StreamingMarkupBuilder`.


    ***Listing 11-30.** Using StreamingMarkupBuilder to Write to a File*


    `new FileWriter(file) << new groovy.xml.StreamingMarkupBuilder().bind {`

    `    music {`

    `        ...`

    `    }`

    `}`


    Builders in Groovy allow you to construct hierarchies of nodes, a concept that
    fits nicely into the construction of XML. In this case, the `music` method will
    become the root element `<music>` of the XML document. In the next step, you initiate
    a transaction using the `withTransaction` method first discussed in [Chapter 10](#Chapter10.html#ch10).


    You use a transaction here so that a common Hibernate `Session` is shared for
    the remainder of the code, hence avoiding a `LazyInitializationException` occurring
    when accessing uninitialized associations. In Grails, unlike the server environment,
    the Hibernate `Session` is not managed for you in scripts, but by using `withTransaction`,
    you can circumvent that:


    `artistClass.withTransaction {`

    `    ...`

    `}`


    Along with `withTransaction`, you’re going to take advantage of the `withSession`
    method to obtain a reference to the Hibernate `Session` object used. As discussed
    in [Chapter 10](#Chapter10.html#ch10), when reading a large amount of data into
    the Hibernate `Session`, you may run out of memory if you don’t periodically clear
    the `Session`. Since you don’t exactly know how much data is in the database,
    you’re going to be doing that here:


    `artistClass.withSession { session ->`

    `    ...`

    `}`


    The next step, if you’ll excuse the pun, is to employ the `step` method, using
    the previously obtained `artistCount` variable to perform pagination of records.
    With this technique, you can obtain, say, ten `Artist` instances, including associations.
    You can manipulate them in some way and then clear the `Session` before loading
    the next ten. [Listing 11-31](#Chapter11.html#list_11_31) shows the code in action.


    ***Listing 11-31.** Using the step Method to Paginate Records*


    `0.step(artistCount, 10) { offset ->`

    `    def artistList = artistClass.list(offset: offset,`

    `                                      max: 10,`

    `                                      fetch: [albums: ''join''])`

    `    session.clear()`

    `}`


    With a list of `Artist` instances in hand, now it’s just a matter of iterating
    over each one to create a bunch of `<artist>` XML elements:


    `for(currentArtist in artistList) {`

    `    artist(name: currentArtist.name) {`

    `        ...`

    `    }`

    `}`


    Finally, you also need to include all the `Album` instances associated with each
    `Artist` and all the `Song` instances associated with each `Album`. You can achieve
    this with a couple more nested loops:


    `for(currentAlbum in currentArtist.albums) {`

    `    album(currentAlbum.properties[''title'', ''year'', ''genre'', ''price''])
    {`

    `        for(currentSong in currentAlbum.songs) {`

    `            song(currentSong.properties[''title'', ''duration''])`

    `        }`

    `    }`

    `}`


    Notice how you can reference a subset of each `Album` instance’s property values
    using the subscript operator and a list of property names:


    `currentAlbum.properties[''title'', ''year'', ''genre'', ''price'']`


    With that, the `export-library-to-xml` script is complete. [Listing 11-32](#Chapter11.html#list_11_32)
    shows the full code listing for the `export-library-to-xml` Gant script.


    ***Listing 11-32.** The Full export-library-to-xml Code*


    `includeTargets << grailsScript("_GrailsBootstrap")`


    `target(main: "Exports the gTunes database to XML") {`

    `  depends bootstrap`

    `  def file = argsMap.params ?`

    `               new File(argsMap.params[0]) :`

    `               new File("./gtunes-data=${System.currentTimeMillis()}.xml")`

    `  def artistClass = grailsApp.classLoader.loadClass(''com.gtunes.Artist'')`

    `  def artistCount = artistClass.count()`

    `  println "Creating XML for ${artistCount} artists"`

    `  new FileWriter(file) << new groovy.xml.StreamingMarkupBuilder().bind {`

    `    music {`

    `      artistClass.withTransaction {`

    `          artistClass.withSession { session ->`

    `            0.step(artistCount, 10) { offset ->`

    `              def artistList = artistClass.list(offset: offset, max: 10, fetch:
    [albums:`

    `''join''])`

    `              for(currentArtist in artistList) {`

    `                artist(name: currentArtist.name) {`

    `                  for(currentAlbum in currentArtist.albums) {`

    `                    album(currentAlbum.properties[''title'', ''year'', ''genre'',
    ''price'']) {`

    `                      for(currentSong in currentAlbum.songs) {`

    `                        song(currentSong.properties[''title'', ''duration''])`

    `                      }`

    `                    }`

    `                  }`

    `                }`

    `              }`

    `            session.clear()`

    `          }`

    `        }`

    `      }`

    `    }`

    `  }`

    `  println "Done. Created XML ${file.absolutePath}"`

    `}`


    `setDefaultTarget(main)`


    As you can see from the full code in [Listing 11-21](#Chapter11.html#list_11_21),
    you can also add a couple of `println` statements just to inform the user what
    is going on. You can now run the `export-library-to-xml` script using the `grails`
    command, and out will pop an XML document, as shown in [Listing 11-33](#Chapter11.html#list_11_33).


    ***Listing 11-33.** Running the export-library-to-xml Script*


    *`$ grails export-library-to-xml`*

    *`Creating XML for 498 artists`*

    *`Done. Created XML /Developer/projects/gtunes/gtunes-data=1351863192571.xml`*'
  trans: '

    ###### 将数据导出为 XML


    命令行脚本另一个相当常见的用途是允许数据迁移。这可以通过对数据库执行 SQL 转储来实现，但您可能希望提供将数据库中所有内容导出为 XML 的功能，就像 Atlassian
    Confluence 和 JIRA 等一些 Web 应用程序所做的那样。


    让我们首先考虑如何编写一个导出脚本，将 gTunes 应用程序中的所有相关数据转储到一个可解析的 XML 文档中。首先，您需要创建一个名为 `export-library-to-xml`
    的新 Gant 脚本：


    `grails> create-script ExportLibraryToXml`

    `| Created file scripts/ExportLibraryToXml.groovy`

    `grails>`


    完成此操作后，您需要利用前面讨论过的 `GRAILS_HOME/scripts/_GrailsBootstrap.groovy` 脚本。为此，只需包含 `_GrailsBootstrap.groovy`：


    `includeTargets << grailsScript("_GrailsBootstrap")`


    在 `main` 目标内部，您需要依赖于 `bootstrap` 目标：


    `depends bootstrap`


    首先，使用 `argsMap`，您可以通过获取第一个参数或以编程方式创建一个名称来确定要导出的文件：


    `    def file = argsMap.params ?`

    `               new File(argsMap.params[0]) :`

    `               new File("./gtunes-data=${System.currentTimeMillis()}.xml")`


    如前所述，`bootstrap` 目标会设置一个 `grailsApp` 变量，该变量持有对 `GrailsApplication` 实例的引用。此实例可用于通过
    `classLoader` 属性动态加载类。这样做是必要的，因为 Gant 脚本无法直接引用应用程序中的类，因为它们无法知道这些类是否已被编译。幸运的是，使用
    `classLoader` 获取对任何类的引用是相当简单的：


    `def artistClass = grailsApp.classLoader.loadClass(''com.gtunes.Artist'')`


    与 Java 不同，使用 Groovy，您可以通过对 `java.lang.Class` 的引用来调用任何静态方法；因此，即使使用动态加载的类引用，您也可以轻松使用常规的
    GORM 方法。第一个示例是使用静态的 `count()` 方法来计算有多少个艺术家：


    `    def artistClass = grailsApp.classLoader.loadClass(''com.gtunes.Artist'')`

    `    def artistCount = artistClass.count()`


    现在是时候创建 XML 了。为此，您将使用 Groovy 的 `StreamingMarkupBuilder` 类。清单 11-30 展示了如何构造和使用
    `StreamingMarkupBuilder`。


    ***清单 11-30.** 使用 StreamingMarkupBuilder 写入文件*


    `new FileWriter(file) << new groovy.xml.StreamingMarkupBuilder().bind {`

    `    music {`

    `        ...`

    `    }`

    `}`


    Groovy 中的构建器允许您构建节点层次结构，这个概念非常适合 XML 的构建。在这种情况下，`music` 方法将成为 XML 文档的根元素 `<music>`。下一步，您将使用
    `withTransaction` 方法启动一个事务，该方法首次在第 10 章中讨论过。


    您在这里使用事务，以便为后续代码共享一个通用的 Hibernate `Session`，从而避免在访问未初始化的关联时发生 `LazyInitializationException`。在
    Grails 中，与服务器环境不同，Hibernate `Session` 在脚本中不会为您管理，但通过使用 `withTransaction`，您可以规避这个问题：


    `artistClass.withTransaction {`

    `    ...`

    `}`


    除了 `withTransaction`，您还将利用 `withSession` 方法来获取所使用的 Hibernate `Session` 对象的引用。如第
    10 章所述，当将大量数据读入 Hibernate `Session` 时，如果不定期清除 `Session`，可能会耗尽内存。由于您并不确切知道数据库中有多少数据，因此您将在此处执行此操作：


    `artistClass.withSession { session ->`

    `    ...`

    `}`


    下一步，请允许我使用双关语，就是使用 `step` 方法，利用之前获得的 `artistCount` 变量来对记录进行分页。通过这种技术，您可以获取，比如说，十个
    `Artist` 实例，包括其关联。您可以以某种方式操作它们，然后在加载下十个之前清除 `Session`。清单 11-31 展示了实际运行的代码。


    ***清单 11-31.** 使用 step 方法对记录进行分页*


    `0.step(artistCount, 10) { offset ->`

    `    def artistList = artistClass.list(offset: offset,`

    `                                      max: 10,`

    `                                      fetch: [albums: ''join''])`

    `    session.clear()`

    `}`


    有了 `Artist` 实例列表后，现在只需遍历每个实例以创建一组 `<artist>` XML 元素：


    `for(currentArtist in artistList) {`

    `    artist(name: currentArtist.name) {`

    `        ...`

    `    }`

    `}`


    最后，您还需要包含与每个 `Artist` 关联的所有 `Album` 实例，以及与每个 `Album` 关联的所有 `Song` 实例。您可以通过再嵌套几个循环来实现这一点：


    `for(currentAlbum in currentArtist.albums) {`

    `    album(currentAlbum.properties[''title'', ''year'', ''genre'', ''price''])
    {`

    `        for(currentSong in currentAlbum.songs) {`

    `            song(currentSong.properties[''title'', ''duration''])`

    `        }`

    `    }`

    `}`


    请注意，您可以使用下标运算符和属性名称列表来引用每个 `Album` 实例属性值的子集：


    `currentAlbum.properties[''title'', ''year'', ''genre'', ''price'']`


    至此，`export-library-to-xml` 脚本就完成了。清单 11-32 展示了 `export-library-to-xml` Gant 脚本的完整代码。


    ***清单 11-32.** export-library-to-xml 完整代码*


    `includeTargets << grailsScript("_GrailsBootstrap")`


    `target(main: "Exports the gTunes database to XML") {`

    `  depends bootstrap`

    `  def file = argsMap.params ?`

    `               new File(argsMap.params[0]) :`

    `               new File("./gtunes-data=${System.currentTimeMillis()}.xml")`

    `  def artistClass = grailsApp.classLoader.loadClass(''com.gtunes.Artist'')`

    `  def artistCount = artistClass.count()`

    `  println "Creating XML for ${artistCount} artists"`

    `  new FileWriter(file) << new groovy.xml.StreamingMarkupBuilder().bind {`

    `    music {`

    `      artistClass.withTransaction {`

    `          artistClass.withSession { session ->`

    `            0.step(artistCount, 10) { offset ->`

    `              def artistList = artistClass.list(offset: offset, max: 10, fetch:
    [albums:`

    `''join''])`

    `              for(currentArtist in artistList) {`

    `                artist(name: currentArtist.name) {`

    `                  for(currentAlbum in currentArtist.albums) {`

    `                    album(currentAlbum.properties[''title'', ''year'', ''genre'',
    ''price'']) {`

    `                      for(currentSong in currentAlbum.songs) {`

    `                        song(currentSong.properties[''title'', ''duration''])`

    `                      }`

    `                    }`

    `                  }`

    `                }`

    `              }`

    `            session.clear()`

    `          }`

    `        }`

    `      }`

    `    }`

    `  }`

    `  println "Done. Created XML ${file.absolutePath}"`

    `}`


    `setDefaultTarget(main)`


    从清单 11-21 的完整代码中可以看出，您还可以添加几个 `println` 语句，只是为了告知用户正在发生的事情。现在，您可以使用 `grails` 命令运行
    `export-library-to-xml` 脚本，然后会弹出一个 XML 文档，如清单 11-33 所示。


    ***清单 11-33.** 运行 export-library-to-xml 脚本*


    *`$ grails export-library-to-xml`*

    *`Creating XML for 498 artists`*

    *`Done. Created XML /Developer/projects/gtunes/gtunes-data=1351863192571.xml`*

