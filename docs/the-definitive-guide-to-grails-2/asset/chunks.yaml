    #### Configuring Service Bean Properties


    The `AlbumArtService` contains a property named `artworkRequestUrl`, which is
    a string that points to a RESTful web service for retrieving album artwork. The
    value could be hard-coded into the `AlbumArtService`, but a better idea may be
    to externalize the definition of that property value into a configuration file.
    You can use a technique called *property override configuration* to specify the
    value of this property in `grails-app/conf/Config.groovy`. Every service in Grails
    translates into a Spring bean. The name of the bean is formulated from the class
    name using bean conventions. Hence, the bean name for `AlbumArtService` will be
    `albumArtService`. You can set properties on the `albumArtService` bean from `Config.groovy`
    by using the `beans` block, as shown in [Listing 10-6](#Chapter10.html#list_10_6).


    ***Listing 10-6.** Configuring Beans Using Config.groovy*


