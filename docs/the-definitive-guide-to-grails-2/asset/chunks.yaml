    A number of implicit variables are available within the context of these hooks
    that allow you to inspect the conventions within a running Grails application.
    The following are the available variables and associated descriptions:


    > *   `application`: An instance of the `org.codehaus.groovy.grails.commons.GrailsApplication`
    class; it provides information about the loaded classes and the conventions within
    them.

    > *   `manager`: An instance of the `org.codehaus. groovy.grails.plugins.GrailsPluginManager`
    class; it allows you to find out what other Grails plug-ins are installed.

    > *   `plugin`: A reference to the `org.codehaus.groovy.grails.plugins.GrailsPlugin`
    class, which allows you to find out various information about the plug-in including
    its name, version, and dependencies.


    The `GrailsApplication` class is typically the most critical to understand if
    you plan to implement any hooks that work with the Grails conventions. Essentially,
    it defines a number of dynamic properties that map to each concept in a Grails
    application. For example, to obtain a list of the controller classes in a `GrailsApplication`,
    you can do this:


    `def controllerClasses = application.controllerClasses`


    Note that when we refer to *classes,* we’re not talking about instances of the
    `Java.lang.Class` interface but of the `org.codehaus.groovy.grails.commons.GrailsClass`
    interface, which defines a number of methods to inspect the conventions within
    a `GrailsApplication` for a particular artefact type.


    For example, given the `CacheService` created earlier, [Listing 12-11](#Chapter12.html#list_12_11)
    demonstrates some of the methods of the `GrailsClass` interface and how they behave.


    ***Listing 12-11.** Using the Grails Convention APIs*


    `GrailsClass serviceClass =`

    `    application.getServiceClass("com.cache.CacheService")`

    `assert "CacheService" == serviceClass.shortName`

    `assert "Cache" == serviceClass.name`

    `assert "com.cache.CacheService" == serviceClass.fullName`

    `assert "cacheService" == serviceClass.propertyName`

    `assert "cache" == serviceClass.logicalPropertyName`

    `assert "com.cache" == serviceClass.packageName`

    `assert true == serviceClass.getPropertyValue("transactional")`


    You’ll notice in [Listing 12-11](#Chapter12.html#list_12_11) the use of the `getServiceClass`
    method to obtain the `CacheService` by name. The `getServiceClass` method is another
    dynamic method available on the `GrailsApplication` class. Essentially, for each
    artefact type, the `GrailsApplication` class provides dynamic methods to access
    the artefacts of that type, which are summarized here:


    > *   `get*Classes`: to obtain a list of all the `GrailsClass` instances for a
    particular artefact type, such as with `getControllerClasses()` or via property
    access such as `controllerClasses`.

    > *   `get*Class(String name)`: to obtain a specific `GrailsClass` instance by
    name, as in `getControllerClass("HelloController")`.

    > *   `is*Class(Class theClass)`: to inquire whether a given `Java.lang.Class`
    is a particular artefact type, as in `isControllerClass(myClass)`.


    The asterisks in the previous method names are substitutes for the relevant artefact
    types you are interested in. [Table 12-1](#Chapter12.html#tab_12_1) summarizes
    the different artefact types and shows an example of the typical use for each.


    ![Image](images/tab_12_1.jpg)


    The artefact types in [Table 12-1](#Chapter12.html#tab_12_1) cover existing artefacts,
    but Grails also lets you add your own artefact types; we’ll look at them in the
    next section.


    ##### Custom Artefact Types


    Out of the box, Grails ships with a set of features, including controllers, domain
    classes, and so on. As you saw in the previous section, you can access all aspects
    of these via the `GrailsApplication` interface. However, what if you want to add
    a new artefact type? Take, for example, the existing Quartz plug-in. Quartz is
    a job-scheduling API that runs specified tasks on a scheduled basis. For example,
    you may want to run some code at noon on the last Friday of every month. Quartz
    aims to address a situation of this kind.


    Look at the existing artefact types; none of them models the idea of a job. How
    can you extend Grails and provide it new knowledge it about what a job is? Fortunately,
    you can find the answer in the Grails `org.codehaus.groovy.grails.commons.ArtefactHandler`
    interface. [Listing 12-12](#Chapter12.html#list_12_12) shows the key methods of
    the `ArtefactHandler` interface.


    ***Listing 12-12.** The ArtefactHandler Interface*


    `public interface ArtefactHandler {`

    `    String getType();`

    `    boolean isArtefact(Class aClass);`

    `    GrailsClass newArtefactClass(Class artefactClass);`

    `}`


    The `getType()` method returns the type of the `GrailsClass`, which will be one
    of the values shown in the first column of Table 13-1\. The `isArtefact(Class)`
    method is responsible for identifying whether a given class is of the current
    artefact type based on some convention. For example, does the class end with the
    convention *Controller*? If so, then it’s a `controller` class.


    The `newArtefactClass(Class)` method will create a new `GrailsClass` instance
    for the given `java.lang.Class`. The `ArtefactHandler` interface has other methods,
    but most of them are abstracted away from you because when implementing a custom
    `ArtefactHandler`, you’ll typically extend the `org.codehaus.groovy.grails.commons.ArtefactHandlerAdapter`
    class. Look at [Listing 12-13](#Chapter12.html#list_12_13), which shows a possible
    implementation for the Quartz plug-in.


    ***Listing 12-13.** An ArtefactHandler for the Quartz Plug-in*


    `1 class JobArtefactHandler extends ArtefactHandlerAdapter {`

    `2`

    `3    static final TYPE = "Job"`

    `4`

    `5    JobArtefactHandler() {`

    `6        super(TYPE, GrailsClass, DefaultGrailsClass, TYPE)`

    `7    }`

    `8`

    `9    boolean isArtefactClass(Class clazz) {`

    `10            // class shouldn''t be null and shoudd ends with Job suffix`

    `11        if(!super.isArtefactClass(clazz)) return false`

    `12        // and should have an execute method`

    `13            return clazz.methods.find { it.name == ''execute'' } != null`

    `14    }`

    `15 }`


    There are a few key things to look at in the `JobArtefactHandler` in [Listing
    12-13](#Chapter12.html#list_12_13). First, take a look at the constructor on lines
    5 to 7:


    `5    JobArtefactHandler() {`

    `6        super(TYPE, GrailsClass, DefaultGrailsClass, TYPE)`

    `7    }`


    The constructor calls the `super` implementation, passing four arguments:


    > *   *The artefact type*: In this case, you’re using a constant, called `TYPE`,
    that has the value `Job`.

    > *   *The interface to use for the artefact type*: You could extend the `GrailsClass`
    interface to provide a more specific interface such as `GrailsJobClass`.

    > *   *The implementation of the interface for the artefact type*: Grails provides
    a default implementation in the `DefaultGrailsClass`,  but you could subclass
    this if you want to provide custom logic within the artefact type.

    > *   *The suffix that the class name should end with for a* `Java.lang.Class`
    *to be considered of the artefact type*: The default implementation of the `isArtefactClass`
    method in `ArtefactHandlerAdapter` will perform a check on the passed `Java.lang.Class`
    to ensure that the class name ends with the specified suffix. As you can see on
    line 11 of [Listing 12-13](#Chapter12.html#list_12_13), the logic from the superclass
    `isArtefact` method is being reused.'
