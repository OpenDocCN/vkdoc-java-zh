    view you developed earlier. [Figure 12-6](#Chapter12.html#fig_12_6) shows the
    CKEditor component running within the gTunes application.


    ![Image](images/9781430243779_Fig12-06.jpg)


    ***Figure 12-6.** Creating blog posts in the gTunes application*


    If you type some content, including a title and body, and then hit the Post button,
    you’ll be able to create new posts on the gTunes application blog, as shown in
    [Figure 12-7](#Chapter12.html#fig_12_7).


    ![Image](images/9781430243779_Fig12-07.jpg)


    ***Figure 12-7.** A blog post in the gTunes application*


