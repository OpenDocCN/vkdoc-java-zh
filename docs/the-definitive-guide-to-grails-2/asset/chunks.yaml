- fmt: "### Named URL Mappings\n\nThere may be scenarios where multiple URL mappings\
    \ match a given request for a reverse mapping and the framework won’t necessarily\
    \ know which mapping to apply. Named URL mappings solve this problem by allowing\
    \ a mapping to have a name associated with it and then referring to that name\
    \ when requesting a reverse URL mapping lookup. The framework can then use the\
    \ name to unambiguously associate the reverse mapping request to a specific URL\
    \ mapping. [Listing 6-25](#Chapter06.html#list_6_25) defines a URL mapping with\
    \ the name `artistDetails`.\n\n***Listing 6-25.** A Named URL Mapping*\n\n```\n\
    class UrlMappings {\n  static mappings = {\n    name artistDetails: \"/showArtist/$artistName\"\
    \ {\n      controller = \"artist\"\n      action = \"show\"\n    }\n}\n```\n\n\
    The `link` tag supports an optional attribute named `mapping`, which may be used\
    \ to specify the name of the mapping that should be used for this lookup. [Listing\
    \ 6-26](#Chapter06.html#list_6_26) demonstrates this technique.\n\n***Listing\
    \ 6-26.** Specifying a Named URL mapping with the Link Tag*\n\n```\n<g:link mapping=\"\
    artistDetails\"\n        params=\"[artistName:${artist.name.replaceAll(' ', '_')}\"\
    >\n     ${artist.name}\n</g:link>\n```\n\nNotice that there is no need to specify\
    \ the controller or action name. The framework will locate the mapping named `\"\
    artistDetails\"` and will find the corresponding controller and action names as\
    \ part of the named URL mapping definition.\n\nAs an alternative to specifying\
    \ the name of the URL mapping as the value of the `mapping` attribute on the `link`\
    \ tag, Grails supports invoking a tag in the `link` namespace whose name matches\
    \ the mapping name. When using this approach, parameters may be specified as attributes\
    \ to the tag. [Listing 6-27](#Chapter06.html#list_6_27) shows an example which\
    \ generates the same link as the code in [Listing 6-26](#Chapter06.html#list_6_26).\n\
    \n***Listing 6-27.** Using the Link Namespace*\n\n```\n<link:artistDetails artistName=\"\
    ${artist.name.replaceAll(' ', '_')}\">\n     ${artist.name}\n</link:artistDetails>\n\
    ```\n\nThe code in [Listing 6-27](#Chapter06.html#list_6_27) is a good bit cleaner\
    \ than the corresponding code in [Listing 6-26](#Chapter06.html#list_6_26).\n\n\
    ### Defining Multiple URL Mappings Classes\n\nWhen an application defines a lot\
    \ of custom URL mappings, the `UrlMappings` class may get long enough to warrant\
    \ breaking the mappings up into several mappings classes. Several small, focused\
    \ mappings classes will be easier to write and maintain than one monolithic class.\
    \ To introduce new mappings classes, simply define classes under `grails-app/conf/`\
    \ with a name that ends with `UrlMappings`. The structure of those classes should\
    \ be exactly the same as the default `UrlMappings` class. [Listing 6-28](#Chapter06.html#list_6_28)\
    \ shows a custom mappings class that would contain `Artist`-related mappings.\n\
    \n***Listing 6-28.** A URL Mappings Class for Artist Mappings*\n\n```\nclass ArtistUrlMappings\
    \ {\n    static mappings = {\n        \"/showArtist/$artistName\" (controller:'artist',\
    \ action:'display')\n    }\n}\n```\n\n### Testing URL Mappings\n\nAs with most\
    \ other aspects of your application, you are going to want to write automated\
    \ tests for custom URL mappings to assert that the application does in fact respond\
    \ to requests in the way you intended. Grails provides a really slick mechanism\
    \ for writing those tests. The simplest way to test URL mappings is to create\
    \ a unit test for the URL mapping class that can be used to test custom mappings.\n\
    \n[Listing 6-29](#Chapter06.html#list_6_29) shows a simple mapping to support\
    \ URLs like `/showArtist/Jeff_Beck`. A request to a URL like that should map to\
    \ the `display` action in the `ArtistController`.\n\n***Listing 6-29.** A Custom\
    \ URL Mapping*\n\n```\nclass UrlMappings {\n    static mappings = {\n        \"\
    /showArtist/$artistName\" (controller:'artist', action:'display')\n        //\
    \ ...\n    }\n}\n```\n\nThe `assertForwardUrlMapping` method can be used to assert\
    \ that a request to a URL like `/showArtist/Jeff_Beck` is sent to the appropriate\
    \ controller action. The code in [Listing 6-30](#Chapter06.html#list_6_30) demonstrates\
    \ what this test might look like.\n\n***Listing 6-30.** Unit-Testing a URL Mapping*\n\
    \n```\n@TestFor(ArtistUrlMappings)\n@Mock(com.gtunes.ArtistController)\nclass\
    \ ArtistUrlMappingsTests {\n\n    void testShowArtistUrlMapping() {\n        //\
    \ assert that /showArtist/Jeff_Beck is handled by the\n        // display action\
    \ in the artist controller\n        assertForwardUrlMapping('/showArtist/Jeff_Beck',\n\
    \                                controller: 'artist', action: 'display')\n  \
    \  }\n}\n```\n\nNote that it is important to mock any controllers relevant to\
    \ the URL mappings that are tested. That is accomplished by applying the `Mock`\
    \ annotation to the test class and passing the corresponding URL mapping class\
    \ as an argument. In [Listing 6-30](#Chapter06.html#list_6_30) that is the `ArtistController`.\
    \ The mapping defined in [Listing 6-29](#Chapter06.html#list_6_29) includes an\
    \ embedded variable, `artistName`. There is a simple mechanism for asserting that\
    \ such mapping variables are being assigned the correct value: just pass a closure\
    \ as the last argument to the `assertForwardUrlMapping` method, and in the closure\
    \ assign values to properties with names that are consistent with the embedded\
    \ variable names. See [Listing 6-31](#Chapter06.html#list_6_31) for an example.\
    \ This test will assert not only that the request maps to the `display` action\
    \ in the `ArtistController` but also that the `artistName` request parameter is\
    \ being populated with the correct value.\n\n***Listing 6-31.** Testing URL Mapping\
    \ Variables*\n\n```\n@TestFor(ArtistUrlMappings)\n@Mock(com.gtunes.ArtistController)\n\
    class ArtistUrlMappingsTests {\n\n    void testShowArtistUrlMapping() {\n    \
    \    // assert that /showArtist/Jeff_Beck is handled by the\n        // display\
    \ action in the artist controller and a request\n        // parameter named artistName\
    \ exists with the value Jeff_Beck\n        assertForwardUrlMapping('/showArtist/Jeff_Beck',\n\
    \                                controller: 'artist', action: 'display') {\n\
    \            artistName = 'Jeff_Beck'\n        }\n    }\n}\n```\n\n[Listing 6-32](#Chapter06.html#list_6_32)\
    \ demonstrates a similar approach to testing whether reverse URL mapping is behaving\
    \ as expected. Note that the assert method is called `assertReverseUrlMapping`\
    \ this time.\n\n***Listing 6-32.** Testing Reverse URL Mapping*\n\n```\n@TestFor(ArtistUrlMappings)\n\
    @Mock(com.gtunes.ArtistController)\nclass ArtistUrlMappingsTests {\n    void testShowArtistReverseUrlMapping()\
    \ {\n        // assert that when a reverse url lookup is done for the\n      \
    \  // display action in the artist controller with a request\n        // parameter\
    \ named artistName with value Jeff_Beck, then\n        // the generated url is\
    \ /showArtist/Jeff_Beck\n        assertReverseUrlMapping('/showArtist/Jeff_Beck',\n\
    \                                controller: 'artist', action: 'display') {\n\
    \            artistName = 'Jeff_Beck'\n        }\n    }\n}\n```\n\nOften it is\
    \ the case that you want to test both forward and reverse URL mapping. One way\
    \ to do so is to use the `assertForwardUrlMapping` method in addition to using\
    \ the `assertReverseUrlMapping` method. Although this combination will get the\
    \ job done, it involves more work than you need to do. Using the `assertUrlMapping`\
    \ method will assert that both forward and reverse URL mapping are working, and\
    \ if either of them fail, the test will fail. See [Listing 6-33](#Chapter06.html#list_6_33)\
    \ for an example.\n\n***Listing 6-33.** Testing Both Forward and Reverse URL Mapping*\n\
    \n```\n@TestFor(ArtistUrlMappings)\n@Mock(com.gtunes.ArtistController)\nclass\
    \ ArtistUrlMappingsTests {\n    void testForwardAndReverseUrlMapping() {\n   \
    \    assertUrlMapping('/showArtist/Jeff_Beck',\n                             \
    \   controller: 'artist', action: 'display') {\n            artistName = 'Jeff_Beck'\n\
    \        }\n    }\n}\n```"
  raw: '### Named URL Mappings


    There may be scenarios where multiple URL mappings match a given request for a
    reverse mapping and the framework won’t necessarily know which mapping to apply.
    Named URL mappings solve this problem by allowing a mapping to have a name associated
    with it and then referring to that name when requesting a reverse URL mapping
    lookup. The framework can then use the name to unambiguously associate the reverse
    mapping request to a specific URL mapping. [Listing 6-25](#Chapter06.html#list_6_25)
    defines a URL mapping with the name `artistDetails`.


    ***Listing 6-25.** A Named URL Mapping*


    `class UrlMappings {`

    `  static mappings = {`

    `    name artistDetails: "/showArtist/$artistName" {`

    `      controller = "artist"`

    `      action = "show"`

    `    }`

    `}`


    The link tag supports an optional attribute named mapping, which may be used to
    specify the name of the mapping that should be used for this lookup. [Listing
    6-26](#Chapter06.html#list_6_26) demonstrates this technique.


    ***Listing 6-26.** Specifying a Named URL mapping with the Link Tag*


    `<g:link mapping="artistDetails"`

    `        params="[artistName:${artist.name.replaceAll('' '', ''_'')}">`

    `     ${artist.name}`

    `</g:link>`


    Notice that there is no need to specify the controller or action name. The framework
    will locate the mapping named `"artistDetails"` and will find the corresponding
    controller and action names as part of the named URL mapping definition.


    As an alternative to specifying the name of the URL mapping as the value of the
    mapping attribute on the link tag, Grails supports invoking a tag in the link
    namespace whose name matches the mapping name. When using this approach, parameters
    may be specified as attributes to the tag. [Listing 6-27](#Chapter06.html#list_6_27)
    shows an example which generates the same link as the code in [Listing 6-26](#Chapter06.html#list_6_26).


    ***Listing 6-27.** Using the Link Namespace*


    `<link:artistDetails artistName="${artist.name.replaceAll('' '', ''_'')}">`

    `     ${artist.name}`

    `</link:artistDetails>`


    The code in [Listing 6-27](#Chapter06.html#list_6_27) is a good bit cleaner than
    the corresponding code in [Listing 6-26](#Chapter06.html#list_6_26).


    ### Defining Multiple URL Mappings Classes


    When an application defines a lot of custom URL mappings, the `UrlMappings` class
    may get long enough to warrant breaking the mappings up into several mappings
    classes. Several small, focused mappings classes will be easier to write and maintain
    than one monolithic class. To introduce new mappings classes, simply define classes
    under `grails-app/conf/` with a name that ends with `UrlMappings`. The structure
    of those classes should be exactly the same as the default `UrlMappings` class.
    [Listing 6-28](#Chapter06.html#list_6_28) shows a custom mappings class that would
    contain `Artist`-related mappings.


    ***Listing 6-28.** A URL Mappings Class for Artist Mappings*


    `class ArtistUrlMappings {`

    `    static mappings = {`

    `        "/showArtist/$artistName" (controller:''artist'', action:''display'')`

    `    }`

    `}`


    ### Testing URL Mappings


    As with most other aspects of your application, you are going to want to write
    automated tests for custom URL mappings to assert that the application does in
    fact respond to requests in the way you intended. Grails provides a really slick
    mechanism for writing those tests. The simplest way to test URL mappings is to
    create a unit test for the URL mapping class that can be used to test custom mappings.


    [Listing 6-29](#Chapter06.html#list_6_29) shows a simple mapping to support URLs
    like `/showArtist/Jeff_Beck`. A request to a URL like that should map to the `display`
    action in the `ArtistController`.


    ***Listing 6-29.** A Custom URL Mapping*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showArtist/$artistName" (controller:''artist'', action:''display'')`

    `        // ...`

    `    }`

    `}`


    The assertForwardUrlMapping method can be used to assert that a request to a URL
    like /showArtist/Jeff_Beck is sent to the appropriate controller action. The code
    in [Listing 6-30](#Chapter06.html#list_6_30) demonstrates what this test might
    look like.


    ***Listing 6-30.** Unit-Testing a URL Mapping*


    `@TestFor(ArtistUrlMappings)`

    `@Mock(com.gtunes.ArtistController)`

    `class ArtistUrlMappingsTests {`


    `    void testShowArtistUrlMapping() {`

    `        // assert that /showArtist/Jeff_Beck is handled by the`

    `        // display action in the artist controller`

    `        assertForwardUrlMapping(''/showArtist/Jeff_Beck'',`

    `                                controller: ''artist'', action: ''display'')`

    `    }`

    `}`


    Note that it is important to mock any controllers relevant to the URL mappings
    that are tested. That is accomplished by applying the `Mock` annotation to the
    test class and passing the corresponding URL mapping class as an argument. In
    [Listing 6-30](#Chapter06.html#list_6_30) that is the `ArtistController`. The
    mapping defined in [Listing 6-29](#Chapter06.html#list_6_29) includes an embedded
    variable, `artistName`. There is a simple mechanism for asserting that such mapping
    variables are being assigned the correct value: just pass a closure as the last
    argument to the `assertForwardUrlMapping` method, and in the closure assign values
    to properties with names that are consistent with the embedded variable names.
    See [Listing 6-31](#Chapter06.html#list_6_31) for an example. This test will assert
    not only that the request maps to the `display` action in the `ArtistController`
    but also that the `artistName` request parameter is being populated with the correct
    value.


    ***Listing 6-31.** Testing URL Mapping Variables*


    `@TestFor(ArtistUrlMappings)`

    `@Mock(com.gtunes.ArtistController)`

    `class ArtistUrlMappingsTests {`


    `    void testShowArtistUrlMapping() {`

    `        // assert that /showArtist/Jeff_Beck is handled by the`

    `        // display action in the artist controller and a request`

    `        // parameter named artistName exists with the value Jeff_Beck`

    `        assertForwardUrlMapping(''/showArtist/Jeff_Beck'',`

    `                                controller: ''artist'', action: ''display'')
    {`

    `            artistName = ''Jeff_Beck''`

    `        }`

    `    }`

    `}`


    [Listing 6-32](#Chapter06.html#list_6_32) demonstrates a similar approach to testing
    whether reverse URL mapping is behaving as expected. Note that the assert method
    is called `assertReverseUrlMapping` this time.


    ***Listing 6-32.** Testing Reverse URL Mapping*


    `@TestFor(ArtistUrlMappings)`

    `@Mock(com.gtunes.ArtistController)`

    `class ArtistUrlMappingsTests {`

    `    void testShowArtistReverseUrlMapping() {`

    `        // assert that when a reverse url lookup is done for the`

    `        // display action in the artist controller with a request`

    `        // parameter named artistName with value Jeff_Beck, then`

    `        // the generated url is /showArtist/Jeff_Beck`

    `        assertReverseUrlMapping(''/showArtist/Jeff_Beck'',`

    `                                controller: ''artist'', action: ''display'')
    {`

    `            artistName = ''Jeff_Beck''`

    `        }`

    `    }`

    `}`


    Often it is the case that you want to test both forward and reverse URL mapping.
    One way to do so is to use the `assertForwardUrlMapping` method in addition to
    using the `assertReverseUrlMapping` method. Although this combination will get
    the job done, it involves more work than you need to do. Using the `assertUrlMapping`
    method will assert that both forward and reverse URL mapping are working, and
    if either of them fail, the test will fail. See [Listing 6-33](#Chapter06.html#list_6_33)
    for an example.


    ***Listing 6-33.** Testing Both Forward and Reverse URL Mapping*


    `@TestFor(ArtistUrlMappings)`

    `@Mock(com.gtunes.ArtistController)`

    `class ArtistUrlMappingsTests {`

    `    void testForwardAndReverseUrlMapping() {`

    `       assertUrlMapping(''/showArtist/Jeff_Beck'',`

    `                                controller: ''artist'', action: ''display'')
    {`

    `            artistName = ''Jeff_Beck''`

    `        }`

    `    }`

    `}`'
