    `                </g:each>`

    `            </ol>`

    `                </div>`

    `        <div class="albumLinks">`

    `    </div>`

    `</div>`


    Now that you have a template, you can alter the `grails-app/views/album/_albumList.gsp`
    template to use jQuery to call a controller action, `display`, on the `AlbumController`
    for each item in the list. [Listing 8-15](#Chapter08.html#list_8_15) shows (in
    bold) the changes made to the `_albumList.gsp` template.


    ***Listing 8-15.** Updating _albumList.gsp to use jQuery links*


    `<ul>`

    `    <g:each in="${albums?}" var="album">`

    **`<li><g:link update="musicPanel"`**

    **`controller="album"`**

    **`action="display"`**

    **`id="${album.id}"`**

    **`elementId=="albumLink${album.id}">${album.title}</g:link></li>`**

    **`<r:script>`**

    `            $(''#albumLink${album.id}'').click(function() {`

    `                $(''#musicPanel'').load(this.href);`

    `                return false;`

    `            });`

