    \ 提供了一个文本框，用于定义参数的值。填写该值后，单击包含操作名称的按钮。该操作将被远程调用，并显示返回值。\n\n![Image](images/9781430243779_Fig10-04.jpg)\n\
    \n***图 10-4.** JMX 操作*\n\nJMX 插件是几个支持使用各种远程技术暴露服务的 Grails 插件之一。有一个 XML-RPC 插件，以及一个\
    \ Remoting 插件，它允许通过 RMI、Hessian、Burlap 和 Spring 的`HttpInvoker`暴露服务。Cxf 和 Axis2\
    \ 插件都支持通过 SOAP 暴露服务。\n\n所有远程插件都使用服务类中的同一个`expose`属性作为使用任何特定技术暴露服务的触发器。[清单 10-19](#Chapter10.html#list_10_19)\
    \ 展示了如何使用 JMX 和 Axis2 暴露`StoreService`。\n\n***清单 10-19.** 使用 JMX 和 Axis2 暴露服务*\n\
    \n```\npackage com.gtunes\nclass StoreService {\n    static transactional = true\n\
    \    static expose = ['jmx', 'axis2']\n    int getNumberOfAlbums() {\n       \
