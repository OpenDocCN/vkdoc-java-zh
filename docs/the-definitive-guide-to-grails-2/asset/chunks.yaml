  raw: '#### Implementing Registration


    Before users can actually log in, they need to register with the site. You’ll
    need to run the `create-controller` command to create a controller that will handle
    the site’s login and registration logic.


    `grails> create-controller com.gtunes.User`

    `| Created file grails-app/controllers/com/gtunes/UserController.groovy`

    `| Created file grails-app/views/user`

    `| Created file test/unit/com/gtunes/UserControllerTests.groovy`

    `grails>`


    Once complete, the command will create a controller at the location `grails-app/controllers/com
    /gtunes/UserController.groovy`. Open up this controller and add a `register` action,
    as shown in [Listing 4-59](#Chapter04.html#list_4_59).


    ***Listing 4-59.** Adding a register Action*


    `class UserController {`

    `    def register() {}`

    `}`


    As you can see from the example, the `register` action currently does nothing
    beyond delegating to a view. Nevertheless, it gives you the opportunity to craft
    a registration form. [Listing 4-60](#Chapter04.html#list_4_60) shows the shortened
    code from the `grails-app/views/user/register.gsp` view that will render the form.


    ***Listing 4-60.** The register View*


    `  <body id="body">`

    `    <h1>Registration</h1>`

    `    <p>Complete the form below to create an account!</p>`

    `    <g:hasErrors bean="${user}">`

    `      <div class="errors">`

    `        <g:renderErrors bean="${user}"></g:renderErrors>`

    `      </div>      `

    `    </g:hasErrors>`


    `    <g:form action="register" name="registerForm">`

    `      <div class="formField">`

    `        <label for="login">Login:</label>`

    `        <g:textField name="login" value="${user?.login}"></g:textField>`

    `      </div>`

    `      <div class="formField">    `

    `        <label for="password">Password:</label>`

    `        <g:passwordField name="password" value="${user?.password}"></g:passwordField>`

    `      </div>`

    `      <div class="formField">`

    `        <label for="confirm">Confirm Password:</label>`

    `        <g:passwordField name="confirm" value="${params?.confirm}"></g:passwordField>`

    `      </div>`

    `      <div class="formField">`

    `        <label for="firstName">First Name:</label>`

    `        <g:textField name="firstName" value="${user?.firstName}"></g:textField>`

    `      </div>`

    `      <div class="formField">`

    `        <label for="lastName">Last Name:</label>`

    `        <g:textField name="lastName" value="${user?.lastName}"></g:textField>`

    `      </div>`

    `      <g:submitButton class="formButton" name="register" value="Register"></g:submitButton>`

    `    </g:form>`

    `  </body>`


    The rendered registration form will look like the screenshot in [Figure 4-4](#Chapter04.html#fig_4_4).


    As you can see from [Figure 4-4](#Chapter04.html#fig_4_4), you can also provide
    a confirm-password field to prevent users from entering passwords incorrectly.
    With that done, let’s consider the controller logic. To implement registration,
    you can take advantage of the data-binding capabilities of Grails to bind incoming
    request parameters to a new user instance. At this point, validation takes over,
    and the rest comes down to a little branching logic. [Listing 4-61](#Chapter04.html#list_4_61)
    shows the completed `register` action.


    ![Image](images/9781430243779_Fig04-04.jpg)


    ***Figure 4-4.** The Registration Screen*


    ***Listing 4-61.** Implementing the register Action*


    `def register() {`

    `  if(request.method == ''POST'') {`

    `    def u = new User()`

    `    u.properties[''login'', ''password'', ''firstName'', ''lastName''] = params`

    `    if(u.password != params.confirm) {`

    `      u.errors.rejectValue("password", "user.password.dontmatch")`

    `      return [user:u]`

    `    } else if(u.save()) {`

    `      session.user = u`

    `      redirect controller:"store"`

    `    } else {`

    `      return [user:u]`

    `    }`

    `  }`

    `}`


    Many of the key concepts you’ve learned throughout the course of this chapter
    have been put to use in [Listing 4-61](#Chapter04.html#list_4_61), including a
    few new ones. Let’s step through the code to see what’s going on. First the code
    checks that the incoming request is a `POST` request, because doing all this processing
    is pointless unless a form is submitted.


    `                if(request.method == ''POST'') {`


    Then data binding takes over, as it binds the incoming request parameters to the
    `User` instance.


    `                def u = new User(params)`


    Then the code confirms whether the user has entered the correct password twice.
    If not, the password is rejected altogether.


    `    if(u.password != params.confirm) {`

    `         u.errors.rejectValue("password", "user.password.dontmatch")`

    `       return [user:u]`

    `    }`


    Notice how calling the `rejectValue` method of the `org.springframework.validation.Errors`
    interface accomplishes this. The `rejectValue` method accepts two arguments: the
    name of the field to reject and an error code to use. The code in [Listing 4-61](#Chapter04.html#list_4_61)
    uses the string `user.password.dontmatch` as the error code, which will appear
    when the `<g:renderErrors>` tag kicks in to display the errors. If you want to
    provide a better error message, you can open up the `grails-app/i18n/messages.properties`
    file and add a message like this:


    `user.password.dontmatch=The passwords specified don''t match`


    Here’s one final thing to note: directly after the call to `rejectValue`, a model
    from the `controller` action is returned, which triggers the rendering `register.gsp`
    so it can display the error.


    You will notice that the code attempts to persist the user by calling the `save()`
    method. If the attempt is successful, the user is redirected back to the `StoreController`.


    `    else if(u.save()) {`

    `        session.user = u`

    `        redirect controller:"store"`

    `    }`


    Finally, if a validation error does occur as a result of calling `save()`, then
    a simple model is returned from the `register` action so that the `register` view
    can render the errors:


    `                return [user:u]`'
