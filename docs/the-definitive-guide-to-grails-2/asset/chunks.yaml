- fmt: "#### Environment-Specific Configuration\n\nAs you discovered in [Chapter 2](#Chapter02.html#ch2),\
    \ the `grails-app/conf/DataSource.groovy` file can be configured in an environment-specific\
    \ way because Grails uses the same mechanism to configure the `DataSource` as\
    \ `Config.groovy` uses for the rest of the application.\n\nJust as with `DataSource.groovy`,\
    \ by using `Config.groovy` you can specify environment-specific settings using\
    \ the `environments` block, as shown in [Listing 11-2](#Chapter11.html#list_11_2).\n\
    \n***Listing 11-2.** Environment-Specific Configuration*\n\n```\n// set per-environment\
    \ serverURL stem for creating absolute links\nenvironments {\n   development {\n\
    \         grails.serverURL = \"http://localhost:8080\"\n    } production {\n \
    \        grails.serverURL = \"http://www.gtunes.com\"\n    }\n}\n```\n\nAs [Listing\
    \ 11-2](#Chapter11.html#list_11_2) demonstrates, the `environments` block can\
    \ be used to specify a different `grails.serverURL` setting for production and\
    \ development environments. The `grails.serverURL` setting is one of a number\
    \ of built-in settings that you’ll be discovering through the course of this book.\n\
    \n#### Configuring Logging\n\nGrails uses the popular Log4j ([`http://logging.apache.org/log4j/`](http://logging.apache.org/log4j/))\
    \ library to configure logging. Traditionally, Log4j has been configured with\
    \ either a properties file format or XML. Grails, however, provides a specific\
    \ DSL for configuring logging. Within the `Config.groovy` script, you can set\
    \ a property called `log4j` using a Groovy closure.\n\nWithin this closure, you\
    \ can use the Log4j DSL to configure logging. [Listing 11-3](#Chapter11.html#list_11_3)\
    \ shows the default Log4j configuration in Grails that sets up logging for a bunch\
    \ of packages internal to Grails.\n\n***Listing 11-3.** The Default Log4j Configuration*\n\
    \n```\n// log4j configuration\nlog4j = {\nerror 'codehaus.groovy.grails.web.servlet',\
    \   // controllers\n      'codehaus.groovy.grails.web.pages',   // GSP\n     \
    \ 'codehaus.groovy.grails.web.sitemesh',   // layouts\n      'codehaus.groovy.grails.web.mapping.filter',\
    \  // URL mapping\n      'codehaus.groovy.grails.web.mapping',  // URL Mapping\n\
    \      'codehaus.groovy.grails.commons',// core / classloading\n      'codehaus.groovy.grails.plugins',//\
    \ plugins\n      'codehaus.groovy.grails.orm.hibernate'   // hibernate integration\n\
    }\n```\n\nAs you can see from [Listing 11-3](#Chapter11.html#list_11_3), inside\
    \ the body of the `log4j` closure, an `error` method is invoked. It is passed\
    \ a number of packages as arguments. The `error` method sets up the specified\
    \ packages at the `error` debug level. The following debug levels are available,\
    \ going from least to most verbose.\n\n> *   `off`: no logging at all\n> *   `fatal`:\
    \ to log only fatal errors, which are typically errors that would cause an application\
    \ to abort\n> *   `error`: to log all errors that occur but still allow the application\
    \ to continue running\n> *   `warn`: to log scenarios that could be potentially\
    \ harmful\n> *   `info`: to log informational messages that describe the progress\
    \ of the application\n> *   `debug`: to log information that is used to debug\
    \ an application\n> *   `trace`: the level for even finer-grained events than\
    \ the `debug` level\n> *   `all`: to log all messages that occur\n\nSources within\
    \ your own application can also be configured for logging. In [Chapter 4](#Chapter04.html#ch4)\
    \ you learned about the `log` property available in every controller, tag library,\
    \ or service. The output of this log property by default will use the root logging\
    \ level of `error`. However, you can use the name of the class, starting with\
    \ `grails.app`, to configure different logging behavior. For example, if you want\
    \ to see output from all log statements in the `UserController` and `AlbumArtService`\
    \ classes at the `debug` level, you could use the configuration in [Listing 11-4](#Chapter11.html#list_11_4).\n\
    \n***Listing 11-4.** Setting the Debug Level*\n\n```\nlog4j {\n     debug  'grails.app.controller.UserController',\n\
    \            'grails.app.service.AlbumArtService'\n}\n```\n\nUsing sensible defaults,\
    \ Grails will automatically configure a console appender that logs to standard\
    \ out while the root logger is set to the `error` level. You can also create your\
    \ own custom Log4j appenders. For example, the code in [Listing 11-5](#Chapter11.html#list_11_5)\
    \ sets up an additional file appender that writes the log to a file.\n\n***Listing\
    \ 11-5.** Configuring a File Appender*\n\n```\nlog4j {\n   appenders {\n     \
    \ rollingFile name:\"myl_og\",\n      file:\"/var/log/gtunes.log\", maxFileSize:\"\
    lMB\",\n      layout:  pattern(conversionPattern:   '%c{2} %m%n')\n   }\n}\n```\n\
    \nThe example in [Listing 11-5](#Chapter11.html#list_11_5) uses a `rollingFile`\
    \ appender, which is an `org.apache.log4j.RollingFileAppender` instance internally.\
    \ Each named argument is a property of the `org.apache.log4j.RollingFileAppender`\
    \ class, so to understand the configuration options, you just have to look at\
    \ the Log4j APIs. The following is a list of the available Log4j appenders.\n\n\
    > *   `jdbc`: The `org.apache.log4j.jdbc.DDBCAppender` logs to a database connection.\n\
    > *   `null`: The `org.apache.log4j.varia.NullAppender` does nothing!\n> *   `console`:\
    \ The `org.apache.log4j.ConsoleAppender` logs to standard out.\n> *   `file`:\
    \ This is an `org.apache.log4j.FileAppender` that logs to a single file.\n> *\
    \   `rollingFile`: This is an `org.apache.log4j.RollingFileAppender` that logs\
    \ to a file that gets automatically backed up and re-created when a maximum size\
    \ is hit.\n\nYou can also use the Log4j API yourself to create an appender programmatically\
    \ and then simply call the `appender` method, passing your appender, to add your\
    \ own appender. Notice also that [Listing 11-5](#Chapter11.html#list_11_5) uses\
    \ the `pattern` method to define the `layout` property of the appender. This translates\
    \ into an `org.apache.log4j.PatternLayout` instance. You can use a number of other\
    \ layout styles, including the following:\n\n> *   `xml`:: An `org.apache.log4j.xml.XMLLayout`\
    \ instance that outputs the log file in XML format.\n> *   `html`: An `org.apache.log4j.HTMLLayout`\
    \ instance that outputs the logs in HTML.\n> *   `simple`: An `org.apache.log4j.SimpleLayout`\
    \ instance that outputs to a preconfigured text format.\n> *   `pattern`: An `org.apache.log4j.PatternLayout`\
    \ instance that allows you to configure the output from Log4j. See the javadoc\
    \ API for details.\n\nOnce you have an appender, you have to tell Log4j which\
    \ packages need to be logged to that appender. [Listing 11-6](#Chapter11.html#list_11_6)\
    \ shows an example of logging Hibernate output to the `rollingFile` appender,\
    \ defined earlier at the `trace` level.\n\n***Listing 11-6.** Using an Appender*\n\
    \n```\nlog4j {\n    ...\n    trace myLog:\"org.hibernate\"\n    debug myLog:[\"\
    org.codehaus.groovy.grails.web.mapping.filter\",   \n                 \"org.codehaus.groovy.grails.web.mapping\"\
    ]\n}\n```\n\nNotice that you reference the appender by the name given to it using\
    \ the `name` argument. Finally, there is one special logger for stack traces,\
    \ which we’ll discuss in the next section."
  raw: '#### Environment-Specific Configuration


    As you discovered in [Chapter 2](#Chapter02.html#ch2), the `grails-app/conf/DataSource.groovy`
    file can be configured in an environment-specific way because Grails uses the
    same mechanism to configure the `DataSource` as `Config.groovy` uses for the rest
    of the application.


    Just as with `DataSource.groovy`, by using `Config.groovy` you can specify environment-specific
    settings using the `environments` block, as shown in [Listing 11-2](#Chapter11.html#list_11_2).


    ***Listing 11-2.** Environment-Specific Configuration*


    `// set per-environment serverURL stem for creating absolute links`

    `environments {`

    `   development {`

    `         grails.serverURL = "http://localhost:8080"`

    `    } production {`

    `         grails.serverURL = "http://www.gtunes.com"`

    `    }`

    `}`


    As [Listing 11-2](#Chapter11.html#list_11_2) demonstrates, the `environments`
    block can be used to specify a different `grails.serverURL` setting for production
    and development environments. The `grails.serverURL` setting is one of a number
    of built-in settings that you’ll be discovering through the course of this book.


    #### Configuring Logging


    Grails uses the popular Log4j ([`http://logging.apache.org/log4j/`](http://logging.apache.org/log4j/))
    library to configure logging. Traditionally, Log4j has been configured with either
    a properties file format or XML. Grails, however, provides a specific DSL for
    configuring logging. Within the `Config.groovy` script, you can set a property
    called `log4j` using a Groovy closure.


    Within this closure, you can use the Log4j DSL to configure logging. [Listing
    11-3](#Chapter11.html#list_11_3) shows the default Log4j configuration in Grails
    that sets up logging for a bunch of packages internal to Grails.


    ***Listing 11-3.** The Default Log4j Configuration*


    `// log4j configuration`

    `log4j = {`

    `error ''codehaus.groovy.grails.web.servlet''`*`,`*`   // controllers`

    `      ''codehaus.groovy.grails.web.pages''`*`,`*`   // GSP`

    `      ''codehaus.groovy.grails.web.sitemesh''`*`,`*`   // layouts`

    `      ''codehaus.groovy.grails.web.mapping.filter'',  // URL mapping`

    `      ''codehaus.groovy.grails.web.mapping'',  // URL Mapping`

    `      ''codehaus.groovy.grails.commons'',// core / classloading`

    `      ''codehaus.groovy.grails.plugins'',// plugins`

    `      ''codehaus.groovy.grails.orm.hibernate''   // hibernate integration`

    `}`


    As you can see from [Listing 11-3](#Chapter11.html#list_11_3), inside the body
    of the `log4j` closure, an `error` method is invoked. It is passed a number of
    packages as arguments. The `error` method sets up the specified packages at the
    `error` debug level. The following debug levels are available, going from least
    to most verbose.


    > *   `off`: no logging at all

    > *   `fatal`: to log only fatal errors, which are typically errors that would
    cause an application to abort

    > *   `error`: to log all errors that occur but still allow the application to
    continue running

    > *   `warn`: to log scenarios that could be potentially harmful

    > *   `info`: to log informational messages that describe the progress of the
    application

    > *   `debug`: to log information that is used to debug an application

    > *   `trace`: the level for even finer-grained events than the `debug` level

    > *   `all`: to log all messages that occur


    Sources within your own application can also be configured for logging. In [Chapter
    4](#Chapter04.html#ch4) you learned about the `log` property available in every
    controller, tag library, or service. The output of this log property by default
    will use the root logging level of `error`. However, you can use the name of the
    class, starting with `grails.app`, to configure different logging behavior. For
    example, if you want to see output from all log statements in the `UserController`
    and `AlbumArtService` classes at the `debug` level, you could use the configuration
    in [Listing 11-4](#Chapter11.html#list_11_4).


    ***Listing 11-4.** Setting the Debug Level*


    `log4j {`

    `     debug  ''grails.app.controller.UserController'',`

    `            ''grails.app.service.AlbumArtService''`

    `}`


    Using sensible defaults, Grails will automatically configure a console appender
    that logs to standard out while the root logger is set to the `error` level. You
    can also create your own custom Log4j appenders. For example, the code in [Listing
    11-5](#Chapter11.html#list_11_5) sets up an additional file appender that writes
    the log to a file.


    ***Listing 11-5.** Configuring a File Appender*


    `log4j {`

    `   appenders {`

    `      rollingFile name:"myl_og",`

    `      file:"/var/log/gtunes.log"`*`,`* `maxFileSize:"lMB",`

    `      layout:  pattern(conversionPattern:   ''%c{2} %m%n'')`

    `   }`

    `}`


    The example in [Listing 11-5](#Chapter11.html#list_11_5) uses a `rollingFile`
    appender, which is an `org.apache.log4j.RollingFileAppender` instance internally.
    Each named argument is a property of the `org.apache.log4j.``RollingFileAppender`
    class, so to understand the configuration options, you just have to look at the
    Log4j APIs. The following is a list of the available Log4j appenders.


    > *   `jdbc`: The `org.apache.log4j.jdbc.DDBCAppender` logs to a database connection.

    > *   `null`: The `org.apache.log4j.varia.NullAppender` does nothing!

    > *   `console`: The `org.apache.log4j.ConsoleAppender` logs to standard out.

    > *   `file`: This is an `org.apache.log4j.FileAppender` that logs to a single
    file.

    > *   `rollingFile`: This is an `org.apache.log4j.RollingFileAppender` that logs
    to a file that gets automatically backed up and re-created when a maximum size
    is hit.


    You can also use the Log4j API yourself to create an appender programmatically
    and then simply call the `appender` method, passing your appender, to add your
    own appender. Notice also that [Listing 11-5](#Chapter11.html#list_11_5) uses
    the `pattern` method to define the `layout` property of the appender. This translates
    into an `org.apache.log4j.PatternLayout` instance. You can use a number of other
    layout styles, including the following:


    > *   `xml`:: An `org.apache.log4j.xml.XMLLayout` instance that outputs the log
    file in XML format.

    > *   `html`: An `org.apache.log4j.HTMLLayout` instance that outputs the logs
    in HTML.

    > *   `simple`: An `org.apache.log4j.SimpleLayout` instance that outputs to a
    preconfigured text format.

    > *   `pattern`: An `org.apache.log4j.PatternLayout` instance that allows you
    to configure the output from Log4j. See the javadoc API for details.


    Once you have an appender, you have to tell Log4j which packages need to be logged
    to that appender. [Listing 11-6](#Chapter11.html#list_11_6) shows an example of
    logging Hibernate output to the `rollingFile` appender, defined earlier at the
    `trace` level.


    ***Listing 11-6.** Using an Appender*


    `log4j {`

    `    ...`

    `    trace myLog:"org.hibernate"`

    `    debug myLog:["org.codehaus.groovy.grails.web.mapping.filter",   `

    `                 "org.codehaus.groovy.grails.web.mapping"]`

    `}`


    Notice that you reference the appender by the name given to it using the `name`
    argument. Finally, there is one special logger for stack traces, which we’ll discuss
    in the next section.'
  trans: '

    #### 环境特定配置


    正如你在第 2 章中所发现的，`grails-app/conf/DataSource.groovy` 文件可以按环境特定方式进行配置，因为 Grails 使用与
    `Config.groovy` 为应用程序其余部分配置 `DataSource` 相同的机制。


    与 `DataSource.groovy` 一样，通过使用 `Config.groovy`，你可以使用 `environments` 代码块指定环境特定的设置，如清单
    11-2 所示。


    ***清单 11-2.** 环境特定配置*


    `// 设置每个环境的 serverURL 主干，用于创建绝对链接`

    `environments {`

    `   development {`

    `         grails.serverURL = "http://localhost:8080"`

    `    } production {`

    `         grails.serverURL = "http://www.gtunes.com"`

    `    }`

    `}`


    如清单 11-2 所示，`environments` 代码块可用于为生产环境和开发环境指定不同的 `grails.serverURL` 设置。`grails.serverURL`
    设置是本书中你将了解到的众多内置设置之一。


    #### 配置日志记录


    Grails 使用流行的 Log4j ([`http://logging.apache.org/log4j/`](http://logging.apache.org/log4j/))
    库来配置日志记录。传统上，Log4j 使用属性文件格式或 XML 进行配置。然而，Grails 提供了一个特定的 DSL 用于配置日志记录。在 `Config.groovy`
    脚本中，你可以使用 Groovy 闭包设置一个名为 `log4j` 的属性。


    在此闭包内，你可以使用 Log4j DSL 来配置日志记录。清单 11-3 显示了 Grails 中默认的 Log4j 配置，该配置为 Grails 内部的一系列包设置了日志记录。


    ***清单 11-3.** 默认的 Log4j 配置*


    `// log4j 配置`

    `log4j = {`

    `error ''codehaus.groovy.grails.web.servlet''`*`,`*`   // 控制器`

    `      ''codehaus.groovy.grails.web.pages''`*`,`*`   // GSP`

    `      ''codehaus.groovy.grails.web.sitemesh''`*`,`*`   // 布局`

    `      ''codehaus.groovy.grails.web.mapping.filter'',  // URL 映射`

    `      ''codehaus.groovy.grails.web.mapping'',  // URL 映射`

    `      ''codehaus.groovy.grails.commons'',// 核心 / 类加载`

    `      ''codehaus.groovy.grails.plugins'',// 插件`

    `      ''codehaus.groovy.grails.orm.hibernate''   // Hibernate 集成`

    `}`


    正如你从清单 11-3 中看到的，在 `log4j` 闭包体内，调用了 `error` 方法。该方法接收多个包作为参数。`error` 方法将指定的包设置为
    `error` 调试级别。以下是可用的调试级别，按详细程度从低到高排列。


    > *   `off`：不记录任何日志

    > *   `fatal`：仅记录致命错误，通常是会导致应用程序中止的错误

    > *   `error`：记录发生的所有错误，但仍允许应用程序继续运行

    > *   `warn`：记录可能有害的场景

    > *   `info`：记录描述应用程序进度的信息性消息

    > *   `debug`：记录用于调试应用程序的信息

    > *   `trace`：比 `debug` 级别更细粒度事件的级别

    > *   `all`：记录发生的所有消息


    你还可以配置自己应用程序中的源以进行日志记录。在第 4 章中，你了解了每个控制器、标签库或服务中可用的 `log` 属性。默认情况下，此日志属性的输出将使用根日志记录级别
    `error`。但是，你可以使用以 `grails.app` 开头的类名来配置不同的日志记录行为。例如，如果你想在 `UserController` 和 `AlbumArtService`
    类中以 `debug` 级别查看所有日志语句的输出，则可以使用清单 11-4 中的配置。


    ***清单 11-4.** 设置调试级别*


    `log4j {`

    `     debug  ''grails.app.controller.UserController'',`

    `            ''grails.app.service.AlbumArtService''`

    `}`


    使用合理的默认值，Grails 将自动配置一个控制台附加器，将日志记录到标准输出，同时根日志记录器设置为 `error` 级别。你还可以创建自己的自定义 Log4j
    附加器。例如，清单 11-5 中的代码设置了一个额外的文件附加器，将日志写入文件。


    ***清单 11-5.** 配置文件附加器*


    `log4j {`

    `   appenders {`

    `      rollingFile name:"my_log",`

    `      file:"/var/log/gtunes.log"`*`,`* `maxFileSize:"1MB",`

    `      layout:  pattern(conversionPattern:   ''%c{2} %m%n'')`

    `   }`

    `}`


    清单 11-5 中的示例使用了 `rollingFile` 附加器，它在内部是一个 `org.apache.log4j.RollingFileAppender`
    实例。每个命名参数都是 `org.apache.log4j.RollingFileAppender` 类的一个属性，因此要了解配置选项，你只需查看 Log4j
    API。以下是可用的 Log4j 附加器列表。


    > *   `jdbc`：`org.apache.log4j.jdbc.JDBCAppender` 将日志记录到数据库连接。

    > *   `null`：`org.apache.log4j.varia.NullAppender` 不执行任何操作！

    > *   `console`：`org.apache.log4j.ConsoleAppender` 将日志记录到标准输出。

    > *   `file`：这是一个 `org.apache.log4j.FileAppender`，将日志记录到单个文件。

    > *   `rollingFile`：这是一个 `org.apache.log4j.RollingFileAppender`，将日志记录到一个文件，当达到最大大小时，该文件会自动备份并重新创建。


    你也可以自己使用 Log4j API 以编程方式创建一个附加器，然后简单地调用 `appender` 方法，传入你的附加器，以添加你自己的附加器。另请注意，清单
    11-5 使用了 `pattern` 方法来定义附加器的 `layout` 属性。这转化为一个 `org.apache.log4j.PatternLayout`
    实例。你可以使用许多其他布局样式，包括以下内容：


    > *   `xml`：一个 `org.apache.log4j.xml.XMLLayout` 实例，以 XML 格式输出日志文件。

    > *   `html`：一个 `org.apache.log4j.HTMLLayout` 实例，以 HTML 格式输出日志。

    > *   `simple`：一个 `org.apache.log4j.SimpleLayout` 实例，以预配置的文本格式输出。

    > *   `pattern`：一个 `org.apache.log4j.PatternLayout` 实例，允许你配置 Log4j 的输出。有关详细信息，请参阅
    javadoc API。


    一旦你有了一个附加器，你必须告诉 Log4j 哪些包需要记录到该附加器。清单 11-6 展示了一个示例，将 Hibernate 输出以 `trace` 级别记录到之前定义的
    `rollingFile` 附加器。


    ***清单 11-6.** 使用附加器*


    `log4j {`

    `    ...`

    `    trace myLog:"org.hibernate"`

    `    debug myLog:["org.codehaus.groovy.grails.web.mapping.filter",   `

    `                 "org.codehaus.groovy.grails.web.mapping"]`

    `}`


    请注意，你通过使用 `name` 参数赋予附加器的名称来引用它。最后，有一个用于堆栈跟踪的特殊日志记录器，我们将在下一节中讨论。

