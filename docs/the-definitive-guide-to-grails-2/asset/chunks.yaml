    ### 摘要


    Grails 提供的 URL 映射引擎非常灵活。几乎任何你想要映射到特定控制器操作的 URL 模式，都可以通过在 `UrlMappings.groovy`
    中编写少量 Groovy 代码轻松配置。该框架提供了许多机制，让你能够花更少的时间配置框架，而将更多时间用于解决应用程序中的业务问题。URL 映射引擎就是其中一个例子。自定义
    URL 映射编写简单，测试也简单。


    ## 第 7 章


    ![Image](img/3squ.jpg)


    ## 国际化


    Web 应用程序的一大优点在于它们非常易于分发给大量用户。当将 Web 应用程序部署给广泛的受众时，应用程序通常需要在特定情况下进行适配并以不同方式运行。例如，当来自西班牙的请求发送到一个
    Web 应用程序时，该应用程序可能希望用西班牙语向用户显示消息；但如果请求来自纽约，同一个应用程序则需要用英语呈现消息。应用程序所做的适配可能比简单地显示不同版本的文本更复杂。应用程序可能需要根据特定请求的来源施加不同的业务规则。


    Grails 提供了多种机制来处理 Web 应用程序的国际化与本地化。在本章中，我们将探讨这些机制，你将看到国际化一个 Web 应用程序并不一定非常困难。


    ### 本地化消息


    当将 Grails 应用程序部署给广泛的受众时，你可能希望应用程序以用户偏好的语言显示消息。提供此功能的一种方法是为每种目标语言维护一个单独的应用程序版本。这种方法存在很多问题。维护所有这些不同的版本并试图让它们保持同步将是一项非常繁重的工作。更好的方法是拥有一个足够灵活的单一版本应用程序，能够使用本地化消息以多种语言显示消息。


    为了在你的 Grails 应用程序中支持本地化消息，你应该将所有用户消息定义在一个属性文件中。换句话说，用户消息不应硬编码在 GSP 页面、GSP 模板或任何其他地方。将消息放在属性文件中，可以让你在一个地方维护所有消息。它还让你能够利用
    Grails 提供的本地化功能。


    #### 定义用户消息


    创建 Grails 应用时，项目中会包含 `grails-app/i18n/` 目录下的多个本地化属性文件。图 7-1 展示了 `grails-app/i18n/`
    目录的内容。


    ![Image](img/9781430243779_Fig07-01.jpg)


    ***图 7-1.** grails-app/i18n/ 目录*


    `grails-app/i18n/` 目录中的 `messages.properties` 文件包含英文的默认验证消息。当领域类或命令对象的验证失败时，会使用这些消息。你可以将自己的应用程序消息添加到此文件中。除了默认的
    `messages.properties` 文件外，此目录还有其他几个属性文件，它们包含其他语言的相同消息。例如，“es”是西班牙语的语言代码，因此 `messages_es.properties`
    包含西班牙语的验证消息。


    ![Image](img/square.jpg) **注意**  消息文件的命名约定遵循 `java.util.ResourceBundle` 类使用的标准约定。更多信息，请参阅
    `java.util.ResourceBundle` 和 `java.util.Locale` 的文档：[`java.sun.com/j2se/1.5.0/docs/api/`](http://java.sun.com/j2se/1.5.0/docs/api/)。


    属性文件是纯文本文件，包含名称-值对。清单 7-1 展示了一个简单的属性文件。


    ***清单 7-1.** 一个简单的属性文件*


    `# messages.properties`

    `app.name=gTunes`

    `book.title=The Definitive Guide To Grails`

    `favorite.language=Groovy`

    `favorite.framework=Grails`


    #### 检索消息值


    在标准的 Java 或 Groovy 程序中，你会使用 `java.util.ResourceBundle` 类从属性文件中检索值。清单 7-2 演示了如何检索并打印
    `app.name` 属性的值。


    ***清单 7-2.** 使用 java.util.ResourceBundle*


    `// JavaMessages.java`

    `import java.util.ResourceBundle;`


    `public class JavaMessages {`


    `    public static void main(String[] args) {`

    `        ResourceBundle bundle = ResourceBundle.getBundle("messages");`

    `        String appName = bundle.getString("app.name");`

    `        System.out.println("application name is " + appName);`

    `    }`

    `}`


    `// GroovyMessages.groovy`

    `def messages = ResourceBundle.getBundle(''messages'')`

    `def appName = messages.getString(''app.name'')`

    `println "application name is ${appName}"`


    `java.util.ResourceBundle` 类负责加载属性文件，并提供 API 来检索文件中定义的属性值。Grails 提供了一个名为 `message`
    的 GSP 标签，它可以从 `grails-app/i18n/` 目录下的消息文件中检索属性值。在最简单的情况下，调用 `message` 标签时只需指定
    `code` 属性。`code` 属性告诉 `message` 标签应该检索哪个属性值。例如，如果在 `grails-app/i18n/messages.properties`
    中定义了一个名为 `gtunes.welcome` 的属性，则可以使用如清单 7-3 所示的代码在 GSP 中渲染该属性的值。


    ***清单 7-3.** 使用 message 标签*


    `<body>`

    `...`

    `<g:message code="gtunes.welcome"/>`

    `... </body>`


    默认情况下，Grails 会根据当前 Web 请求的区域设置来决定使用哪个版本的属性文件。因此，你通常不需要在应用程序代码中针对本地化做任何特殊处理。如果你在
    `grails-app/i18n/` 下的多个特定语言版本的属性文件中定义了消息属性，那么 Grails 将根据客户端的区域设置使用相应的文件。


    图 7-2 展示了英文版的 gTunes 主页。


    ![Image](img/9781430243779_Fig07-02.jpg)


    ***图 7-2.** 英文版 gTunes*


    图 7-2 中展示了几条用户消息。例如，屏幕左侧是一个导航区域，其中包含“My Music”和“The Store”链接。当从不同的区域设置访问应用程序时，这些链接的标签将包含不同的文本。处理此问题的最佳方法是将这些消息定义为属性，并使用
    `message` 标签在 GSP 中渲染这些消息。清单 7-4 展示了如何在 `grails-app/i18n/messages.properties`
    中定义这些属性。


    ***清单 7-4.** grails-app/i18n/messages.properties 中的用户消息*


    `gtunes.my.music=My Music`

    `gtunes.the.store=The Store ...`


    定义了这些属性后，GSP 可以使用 `message` 标签渲染这些值，如清单 7-5 所示。


    ***清单 7-5.** 从 GSP 渲染属性值*


    `<div id="navButtons">`

    `  <ul>`

    `    <li><a href="#"><g:message code="gtunes.my.music"/></a></li>`

    `    <li><g:link controller="store" action="shop">`

    `          <g:message code="gtunes.the.store"/>`

    `        </g:link>`

    `    </li>`

    `  </ul>`

    `</div>`


    有了这段代码，你可以根据需要向任意多个其他消息文件添加相应的属性。为了支持网站的西班牙语版本，请向 `grails-app/i18n/messages_es.properties`
    添加相应的属性，如清单 7-6 所示。


    ***清单 7-6.** grails-app/i18n/messages_es.properties 中的用户消息*


    `gtunes.my.music=Mi Musica`

    `gtunes.the.store=La Tienda`

