    #### Creating Forms and Fields


    A form is most commonly a collection of fields that a user populates with data,
    although occasionally you find forms that consist entirely of hidden fields and
    no user interaction whatsoever. Nevertheless, how this is achieved depends on
    the type of field; in other words, the user’s interaction depends on whether it
    is a text field, a drop-down select, or a radio button.


    Clearly, certain fields map nicely onto existing Java (and hence Groovy) types.
    Check boxes are great for Boolean values, text fields are good for strings, and
    selects are good when you have strings that can be contained only within a certain
    list of values (such as enums in Java 5).


    To this end, most Java web frameworks provide some mechanism to make form elements
    (or fields) interoperate smoothly with Java types, Grails being no different.
    Before you get too deeply involved in looking at the different kinds of fields,
    let’s take care of the basics by looking at how Grails helps in defining forms.


    ##### The form Tag


    Let’s build on what you have seen in linking by starting with the `<g:form>` tag,
    which is equivalent to the standard HTML `<form>` tag, except that it allows the
    same arguments as those shown with the `<g:link>` tag to allow easy submission
    to a specific controller or action or both, as shown in [Listing 5-20](#Chapter05.html#list_5_20).


    ***Listing 5-20.** An Example Form Tag from grails-app/views/user/register.gsp*


    `<g:form action="register" name="registerForm">`

    `   ...`

    `</g:form>`


    By default, the `<g:form>` tag uses the `POST` method for form submissions; that
    is, the previous example is roughly equivalent to the HTML definition (minus the
    closing tag):


    `<form action="/gTunes/user/register" method="POST" name="registerForm">`

    `   ...`

    `</form>`


    As an alternative to [Listing 5-20](#Chapter05.html#list_5_20), you can define
    the `<g:form>` tag using a single `url` attribute that uses the `key:value` map
    syntax to define the controller and action combination (see [Listing 5-21](#Chapter05.html#list_5_21)).


    ***Listing 5-21.** A <g:form> Tag with url Attribute*


    `<g:form url="[controller:''user'', action:''register'']">`

    `   ...`

    `</g:form>`


    Of course, a form is of little use without some fields, the first of which to
    be discussed is the *text field*. In HTML, most fields are handled by the `<input>`
    tag, which has a `type` attribute to change its behavior and appearance. The downside
    of this approach is that it is not clear what its purpose is from simply looking
    at the tag.


    Grails provides a number of wrapper tags that encapsulate the different types
    of HTML inputs into more meaningful tags.'
  trans: '

    ##### 链接标签


    `<g:link>` 标签将根据提供的属性（包括以下内容）创建一个简单的 HTML 锚点标签：


    > *   `controller`：要链接到的控制器名称

    > *   `action`：要链接到的操作名称

    > *   `id`：要附加到 URI 末尾的标识符

    > *   `mapping`：要使用的 URL 映射名称

    > *   `params`：作为映射传递的任何参数


    `controller` 或 `action` 属性中必须指定一个。如果指定了 `controller` 属性但未指定 `action` 属性，则该标签将链接到该控制器的默认操作。另一方面，如果指定了
    `action` 属性但未指定 `controller` 属性，则将链接到*当前正在执行*的控制器。


    除了上述属性之外，`<g:link>` 标签还支持常规 HTML 锚点标签支持的所有属性，可以根据需要添加这些属性。


    是时候看一些示例了。使用 `<g:link>` 非常简单直观，当然，如果需要动态链接，属性的值也可以是 `${...}` 类型的表达式（参见清单 5-17）。


    ***清单 5-17.** 使用 <g:link> 进行基本链接*


    `<g:link controller="album" action="list">列出专辑</g:link>`

    `<g:link action="show"  id="l">显示 ID 为 l 的专辑</g:link>`


    可能值得关注的是 `params` 属性，它接受一个请求参数的映射，并通过链接传递。实际上，通过将此属性与 `params` 对象结合使用，甚至可以将当前请求参数从一个操作传递到另一个操作，您还记得
    `params` 对象是 `java.util.Map` 的一个实例，如清单 5-18 所示。


    ***清单 5-18.** 在 <g:link> 中使用参数*


    `<g:link controller="album"`

    `        action="list"`

    `        params="[max:10,order:''title'']">显示按标题排序的前十项</g:link>`

    `<g:link action="create"`

    `        params="${params}">将参数从此操作传递到下一个操作</g:link>`


    第一个示例将 `params` 属性与参数映射结合使用，并让您首次接触到 GSP 标签的另一个特性：属性可以使用 `[key:value]` 语法指定为映射。这允许复合属性值，并最大限度地减少了对混乱嵌套标签的需求。


    最后，第二个示例演示了前面提到的内容。您没有显式指定映射，而是通过 `${...}` 表达式语法提供了对 `params` 对象的引用，从而允许将参数从当前页面传递到链接到的页面。接下来，您将看到如何创建指向其他资源的链接。


    ![图片](img/square.jpg) **注意**  Grails 中的链接标签会根据您定义的 URL 映射自动重写链接。URL 映射将在第 6 章中更详细地介绍。


    #### createLink 和 resource 标签


    `<g:createLink>` 标签已经在实际应用中出现过，因此可能不需要太多介绍。简而言之，如果从示例中还不清楚，`<g:createLink>` 接受与
    `<g:link>` 标签相同的参数，区别在于它只生成文本链接，而不是 HTML 锚点标签。实际上，`<g:link>` 标签在创建其 `href` 属性时，会委托给
    `<g:createLink>`。


    那么这有什么用处呢？您可以在常规锚点标签中使用它，或者作为 JavaScript 变量的值，如清单 5-19 所示。


    ***清单 5-19.** createLink 示例*


    `<a href="${createLink(action:''list'')}">列出专辑</a>`

    `<script type="text/javascript">`

    `    var listAlbumsLink = "${createLink(action:''list'')}";`

    `</script>`


    另一个在名称和用法上都与 `<g:createLink>` 相似的标签是 `<g:resource>` 标签，它允许方便地链接到 Web 应用程序上下文路径内的资源。


    此标签最常用于链接到图像和样式表，并且同样可以在由脚手架生成的视图中看到其实际应用：


    `<link rel="stylesheet"`

    `      href="${resource(dir:''css'',file:''main.css'')}"></link>`


    从前面的示例和清单 5-19 中可以明显看出，这两个标签往往通过方法调用而非标记来使用，因为它们生成的值通常嵌套在其他标签的属性中。


    既然已经介绍了链接，让我们看看另一个常见活动：创建表单，以便用户可以输入数据供服务器端代码捕获。在下一节中，您将看到 Grails 如何简化这一过程。


    ![图片](img/square.jpg) **注意**  `resource` 标签有效地取代了 `createLinkTo` 标签。`createLinkTo`
    标签仍然包含在 Grails 2 中，但已弃用，推荐使用 resource 标签。resource 标签提供了更大的灵活性，其中一些将在第 12 章中讨论。


    #### 创建表单和字段


    表单通常是由用户填充数据的字段集合，尽管偶尔也会发现完全由隐藏字段组成且无需任何用户交互的表单。尽管如此，如何实现这一点取决于字段的类型；换句话说，用户的交互取决于它是文本字段、下拉选择框还是单选按钮。


    显然，某些字段可以很好地映射到现有的 Java（以及 Groovy）类型。复选框非常适合布尔值，文本字段适合字符串，而当字符串只能包含在某个特定值列表（例如
    Java 5 中的枚举）中时，选择框则很合适。


    为此，大多数 Java Web 框架都提供了一些机制，使表单元素（或字段）能够与 Java 类型顺畅地互操作，Grails 也不例外。在深入探讨不同类型的字段之前，让我们先通过了解
    Grails 如何帮助定义表单来处理基础知识。


    ##### form 标签


    让我们从 `<g:form>` 标签开始，基于您在链接中看到的内容进行构建。该标签等同于标准的 HTML `<form>` 标签，不同之处在于它允许与 `<g:link>`
    标签所示相同的参数，以便轻松提交到特定的控制器或操作或两者，如清单 5-20 所示。


    ***清单 5-20.** 来自 grails-app/views/user/register.gsp 的表单标签示例*


    `<g:form action="register" name="registerForm">`

    `   ...`

    `</g:form>`


    默认情况下，`<g:form>` 标签使用 `POST` 方法提交表单；也就是说，前面的示例大致等同于以下 HTML 定义（不包括结束标签）：


    `<form action="/gTunes/user/register" method="POST" name="registerForm">`

    `   ...`

    `</form>`


    作为清单 5-20 的替代方案，您可以使用单个 `url` 属性来定义 `<g:form>` 标签，该属性使用 `key:value` 映射语法来定义控制器和操作的组合（参见清单
    5-21）。


    ***清单 5-21.** 带有 url 属性的 <g:form> 标签*


    `<g:form url="[controller:''user'', action:''register'']">`

    `   ...`

    `</g:form>`


    当然，没有字段的表单几乎没有用处，首先要讨论的是*文本字段*。在 HTML 中，大多数字段由 `<input>` 标签处理，该标签有一个 `type` 属性来改变其行为和外观。这种方法的缺点是，仅从标签本身看，其用途并不明确。


    Grails 提供了许多包装标签，将不同类型的 HTML 输入封装成更有意义的标签。

