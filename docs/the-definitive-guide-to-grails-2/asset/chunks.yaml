    `}`


    #### Supplying Application Artefacts


    One of the more obvious ways a plug-in can enhance an existing application is
    by providing a new artefact, such as a controller, tag library, or service.


    Because a Grails plug-in is simply a Grails application, supplying an artefact
    is a simple matter of creating it, just as you would in a regular application.
    For the `simple-cache` plug-in, you’ll implement a service that provides application-layer
    caching. To do so, simply use the `create-service` command from the root of the
    plug-in:


    `$ grails create-service com.cache.Cache`


    Once completed, you’ll end up with a new service at the location `grails-app/services/com/cache/CacheService.groovy`.
    Because it’s pretty simple to do, you’ll also be implementing a little tag library
    to perform content-level caching. To create the tag library, run the `create-tag-lib`
    command:


    `$ grails create-tag-lib com.cache.Cache`


    Note that since a Grails plug-in is simply a Grails application, you can run it
    just like a Grails application! Just use the `grails run-app` command, and you’re
    on your way. This has significant benefits for the plug-in developer in that plug-in
    development is not very different from regular application development. You can
    run your plug-in like a regular application, and you can also test your plug-in
    like a regular application using the `test-app` command. You can even install
    other plug-ins into a plug-in, something that is critical when developing a plug-in
    that has dependencies on other plug-ins.


    As for the `CacheService` and the `CacheTagLib`, we’ll get to the implementation
    details of these later. For the moment, all you need to know is that when you
    package up your plug-in for distribution, it will provide two new artefacts: a
    tag library and a service.


    #### Plug-in Hooks


    Let’s return to the plug-in descriptor. As well as providing metadata about the
    plug-in, the descriptor also enables you to supply hooks into the plug-in runtime.
    Each hook is defined as a closure property and allows the plug-in to participate
    in the various phases of the plug-in life cycle. The hooks are listed here in
    the order of their execution:


    > *   `doWithWebDescriptor`: This gets passed the XML for the `web.xml` file that
    has been parsed by Groovy’s `XmlSlurper` into a `GPathResult`. See the “Modifying
    the Generated WAR Descriptor” section later in the chapter for more information
    on this one.

    > *   `doWithSpring`: This allows participation in the runtime configuration of
    Grails’ underlying Spring `ApplicationContext`. See the “Providing Spring Beans”
    section for more information.

    > *   `doWithDynamicMethods`: Executed after the construction of the `ApplicationContext`,
    this is the hook that plug-ins should use to provide new behavior to Grails classes.
    See the “Using Metaprogramming to Enhance Behavior” section later in the chapter
    for more information.

    > *   `doWithApplicationContext`: This is executed after the Grails `ApplicationContext`
    has been constructed. The `ApplicationContext` instance is passed to this hook
    as the first argument.


    By default, the `simple-cache` plug-in you created earlier comes with empty implementations
    of all of these. If you don’t plan to implement any of these hooks, you can simply
    delete them from the plug-in descriptor. [Listing 12-10](#Chapter12.html#list_12_10)
    shows the various plug-in hooks, just waiting to be implemented.


    ![Image](images/square.jpg) **Note** If you merely want to use plug-ins to provide
    application modularity, you can skip to the “Packaging and Distributing a Grails
    Plug-in” section. The next few sections go into significant detail on how to hook
    into all aspects of the Grails plug-in system.


    ***Listing 12-10.** Plug-in Hooks in the simple-cache Plug-in*


    `class SimpleCacheGrailsPlugin {`

    `    def version = 0.1`

    `    ...`

    `    def doWithWebDescriptor = { xml -> }`

    `    def doWithSpring = {}`


    `    def doWithDynamicMethods = { applicationContext -> }`


    `    def doWithApplicationContext = { applicationContext -> }`


    `}`'
