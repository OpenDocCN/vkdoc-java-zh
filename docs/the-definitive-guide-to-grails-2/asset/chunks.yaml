    ### A Note on Ajax and Performance


    It is important to note the impact that using Ajax has on an application’s performance.
    Given the number of small snippets of code that get rendered, it will come as
    little surprise that badly designed Ajax applications have to deal with a significantly
    larger number of requests. What you have seen so far in this chapter is a naive
    approach to Ajax development. You have waved the Ajax magic wand over your application
    with little consideration of the performance implications.


    Nevertheless, it is not too late to take some of these things into account. You
    can use several techniques to reduce the number of requests an Ajax application
    performs before you start throwing more hardware at the problem.


    Remember that an Ajax call is a remote network call and therefore expensive. Things
    such as the Data Transfer Object (DTO) are applicable in the Ajax world. Fundamentally,
    the DTO pattern serves as a mechanism for batching operations into a single call
    and passing enough state to the server for several operations to be executed at
    once. This pattern can be equally effective in Ajax, given that it is better to
    do one call that transmits a lot of information than a dozen small ones.


    Another popular technique is to move more complexity onto the client. Given that
    Ajax clients, in general, occupy a single physical page, a fair amount of state
    can be kept on the client via caching. Caching is probably the most important
    technique in Ajax development and, where possible, should be exploited to optimize
    communications with the server.


    Whichever technique you use, it will pay dividends in the long run, and the server
    infrastructure guys will love you for it. The users of your application will also
    appreciate its faster response times and interactivity.


    ### Summary


    In this chapter, you learned about the extensive range of adaptive Ajax tags that
    Grails offers and how to apply them to give your gTunes application a more usable
    interactive interface. On this particular journey, you also explored advanced
    Grails development, learning a lot more about how controllers, templates, and
    the `render` method function in combination.


    In the past few chapters, you’ve been very much involved with the web layer of
    Grails in the shape of controllers, GSP, tag libraries, and Ajax. However, everything
    you have looked at so far has used completely stateless communication. In the
    next chapter, you’ll look at how Grails supports web flows for rich conversations
    that span multiple pages.


    ## CHAPTER 9


    ![Image](images/3squ.jpg)


    ## GORM


    As you may have garnered from this book’s table of contents, the persistence layer
    of Grails is a critical part of the picture. In [Chapter 3](#Chapter03.html#ch3)
    you were given a surface-level understanding of what domain classes are and how
    they map onto the underlying database. In this chapter you’ll plunge headfirst
    into the inner workings of GORM.


    As a starting point, you’ll learn about the basic persistence operations involved
    in reading and writing objects from a database. After going through the basics,
    you’ll then be taken through the semantics of GORM, including as many corner cases
    and surprises as we’re able to fit into a single chapter.


    ### Persistence Basics


    Fortunately, we won’t be spending long on the foundations, since you’ve already
    been exposed to the basics of GORM. Nevertheless, as a recap, let’s take a look
    at the basic read operations provided by GORM.


    #### Reading Objects


    Each domain class is automatically enhanced with a number of methods that allow
    you to query for domain instances. The simplest of these is the `get` method,
    which takes the identifier of a domain class and returns either an instance or
    `null` if no instance was found in the database. [Listing 9-1](#Chapter09.html#list_9_1)
    shows a simple example, highlighted in bold, from the `AlbumController` you’ve
    already developed.


    ***Listing 9-1.** Using the get Method*


    `class AlbumController {`

    `    def show() {`

    `        def album = Album.get(params.id)`

    `        if(album) {`

    `        }`

    `    }`

    `}`


    In addition to the simple `get` method, there is also a `getAll` method, which
    can take several identifiers and return a `List` of instances. You can specify
    the identifiers as a `List` or using varargs; for example:


    `def albums = Album.getAll(1,2,3)`


    When using the `get` method, the object is loaded from the database in a modifiable
    state. In other words, you can make changes to the object, which then get persisted
    to the database. If you want to load an object in a read-only state, you can use
    the `read` method instead:


    `def album = Album.read(params.id)`


    In this case, the `Album` instance returned cannot be modified. Any changes you
    make to the object will not be persisted. There is also a performance benefit
    because Hibernate does not have to keep track of which properties have changed
    (dirty checking).


    #### Listing, Sorting, and Counting


    A common way to retrieve items from a database is to simply list them. Clearly,
    it is not always desirable to list every instance, and the order in which they
    are returned is often important. GORM provides a `list()` method, which takes
    a number of named arguments, including `max`, `offset`, `sort`, and `order`, to
    customize the results, the definitions of which are listed here:


    > *   `max`: the maximum number of instances to return

    > *   `offset`: the offset relative to 0 of the first result to return

    > *   `sort`: the property name to sort by

    > *   `order`: the order of the results, either `asc` or `desc` for ascending
    and descending order, respectively


    In addition to `list()`, often used in combination with it, is the `count()` method,
    which counts the total number of instances in the database. To demonstrate these,
    let’s look at some examples of their usage (see [Listing 9-2](#Chapter09.html#list_9_2)).


    ***Listing 9-2.** Using the list() Method*


    `// get all the albums;  careful,  there might be many!`

    `def allAlbums = Album.list()`

    `// get the ten most recently created albums`

    `def topTen = Album.list(max:10,  sort:''dateCreated'',  order:''desc'')`

    `// get the total number of albums`

    `def totalAlbums = Album.count()`


    As you can imagine, it is fairly simple to use the `list()` method to perform
    the pagination of results by customizing the `offset` argument. In addition, there
    is a set of `listOrderBy*` methods that are variations on the `list()` method.


    The `listOrderBy*` methods provide an example where each method uses the properties
    on the class itself in the method signatures. They are unique to each domain class,
    but it is just a matter of understanding the convention to use them. [Listing
    9-3](#Chapter09.html#list_9_3) is an example that lists all `Album` instances,
    ordered by the `dateCreated` property, simply by invoking the `listOrderByDateCreated()`
    method.


    ***Listing 9-3.** Using listOrderBy*


    `// all albums ordered by creation date`

    `def allByDate = Album.listOrderByDateCreated()`


    Using standard bean conventions, the property name, starting with a capital letter,
    is appended to the end of the method signature. You’ll see more examples of this
    later in the chapter when we cover dynamic finders, including a variation of the
    count method.'
