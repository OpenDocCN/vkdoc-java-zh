- fmt: "#### The Create Operation\n\nThe magic doesn’t end here. By clicking the “New\
    \ Song” link at the top of the screen, you can create new songs. While generating\
    \ the views, Grails does its best to guess what type of field is required to edit\
    \ a property’s value. For example, if Grails finds a `String`, it will create\
    \ a text field; if it finds a `java.util.Date`, it will render drop-down boxes\
    \ that allow you to select the date and time. [Figure 2-4](#Chapter02.html#fig_2_4)\
    \ shows an example of what the generated song-creation interface looks like.\n\
    \nThe Grails built-in validation mechanism, called constraints, can also affect\
    \ how the interface is rendered, including the order in which fields are displayed\
    \ and the type of field that is rendered. Try clicking the “Create” button; you’ll\
    \ get a validation error stating that the duration must be specified, as pictured\
    \ in [Figure 2-5](#Chapter02.html#fig_2_5). The validation messages hook into\
    \ Grails’s internationalization support (often referred to with the abbreviation\
    \ i18n). But for now, all you need to know is that Grails is pulling these messages\
    \ from the properties files within the `grails-app/i18n` directory. (Constraints\
    \ will be discussed in [Chapter 3](#Chapter03.html) and internationalization in\
    \ [Chapter 8](#Chapter08.html).)\n\n![Image](images/9781430243779_Fig02-04.jpg)\n\
    \n***Figure 2-4.** The Create Song page*\n\n![Image](images/9781430243779_Fig02-05.jpg)\n\
    \n***Figure 2-5.** How Grails handles validation*\n\nYou could customize the message\
    \ at this point, but for now the defaults will do. Now let’s try to create a song\
    \ with some valid data. Specifically, try to enter these values into the provided\
    \ fields:\n\nArtist: Soundgarden\n\nTitle: Mailman\n\nNow click the “Create” button\
    \ and move on to the next section of the chapter.\n\n#### The Read Operation\n\
    \nGrails has obeyed instructions and duly created a new `Song` instance with the\
    \ necessary data in the database. It then redirects you to the “Show Song” screen,\
    \ where you can view and admire a rendered view of the `Song` instance you just\
    \ created.\n\nAdditionally, as pictured in [Figure 2-6](#Chapter02.html#fig_2_6),\
    \ the “Show Song” screen provides two buttons to let you edit or delete the `Song`\
    \ instance from the database.\n\n![Image](images/9781430243779_Fig02-06.jpg)\n\
    \n***Figure 2-6.** The Show Song screen*\n\nCurrently, you’re dealing with a trivial\
    \ domain model with only a single `Song` domain class to account for. However,\
    \ another attribute of domain classes is that they typically have multiple relationships:\
    \ one-to-many, one-to-one, and so on. If you think about a Song for a moment,\
    \ it is typically part of a collection of Songs within an album. Let’s create\
    \ an `Album` domain class to model this using the `grails create-domain-class`\
    \ command, as shown in [Listing 2-6](#Chapter02.html#list_2_6).\n\n***Listing\
    \ 2-6.** Creating the Album Domain Class*\n\n```\ngrails> create-domain-class\
    \ com.gtunes.Album\n| Created file grails-app/domain/com/gtunes/Album.groovy\n\
    | Created file test/unit/com/gtunes/AlbumTests.groovy\ngrails>\n```\n\nAn `Album`\
    \ has attributes of its own, including a title, but it also contains many songs.\
    \ [Listing 2-7](#Chapter02.html#list_2_7) shows how to set up a one-to-many relationship\
    \ between `Album` and `Song` using the `hasMany` static property of domain classes.\
    \ The `hasMany` property is assigned a Groovy map where the key is the relationship\
    \ name and the value is the class, in this case `Song`, to which the association\
    \ relates.\n\n***Listing 2-7.** Defining a One-to-Many Relationship*\n\n```\n\
    package com.gtunes\nclass Album {\n    String title\n    static hasMany = [songs:Song]\n\
    }\n```\n\nThe preceding association is unidirectional. In other words, only the\
    \ `Album` class knows about the association, while the `Song` class remains blissfully\
    \ unaware of it. To make the association bidirectional, modify the `Song` class\
    \ to include an `Album` local property, as shown in [Listing 2-8](#Chapter02.html#list_2_8).\
    \ Now `Album` and `Song` have a bidirectional, one-to-many association.\n\n***Listing\
    \ 2-8.** Making the Relationship Bidirectional*\n\n```\npackage com.gtunes\nclass\
    \ Song {\n    String title\n    String artist\n    Album album\n}\n```\n\nIn [Chapter\
    \ 3](#Chapter03.html), we’ll delve into other kinds of relationships and how they\
    \ map onto the underlying database. For now, let’s create another scaffolded controller\
    \ that can deal with the creation of `Album` instances. Use the `grails create-controller`\
    \ command and add the `static scaffold = true` property to the class definition\
    \ (see [Listing 2-9](#Chapter02.html#list_2_9)).\n\n***Listing 2-9.** Scaffolding\
    \ the Album Class*\n\n```\npackage com.gtunes\nclass AlbumController {\n    static\
    \ scaffold = true\n}\n```\n\nNow if you return to your browser and refresh the\
    \ Song list, you’ll notice that the Song you entered previously has mysteriously\
    \ vanished. The reason for this is quite simple: By default, Grails is running\
    \ with an in-memory database, and updating domain classes creates a new instance\
    \ of it. You might find this useful for testing, but you can configure a different\
    \ database if you require a less volatile storage mechanism (we’ll discuss that\
    \ later in this chapter).\n\nMore significant, however, is the fact that on the\
    \ welcome page we have an additional `AlbumController`. Click the `AlbumController`\
    \ link, followed by the “New Album” button. Enter a title for the Album—here it’s\
    \ “Soundgarden”—and click the “Create” button to see your newly created Album\
    \ displayed (see [Figure 2-7](#Chapter02.html#fig_2_7)).\n\n![Image](images/9781430243779_Fig02-07.jpg)\n\
    \n***Figure 2-7.** The Show Album screen*\n\nYou’ll also notice that the Album\
    \ has a blank Songs field. Let’s fix that next.\n\n#### The Update Operation\n\
    \nYou can perform updates by clicking the “Edit” button. In this case, you want\
    \ to add a `Song`, so click the “Add Song” link to see the “Create Song” interface.\
    \ This time, you’ll get a useful drop-down box that lets you select which `Album`\
    \ the `Song` should be part of (as shown in [Figure 2-8](#Chapter02.html#fig_2_8)).\
    \ You’ll notice that scaffolding’s default behavior is simply to call `toString()`\
    \ on each element in the drop-down list. The default `toString()` that Grails\
    \ provides uses the class name and instance id, which is not the most pleasant\
    \ thing to present to a user. You can override this behavior by implementing your\
    \ own `toString()` method inside the `Album` class.\n\nNext, populate the fields\
    \ as described in the “The Create Operation” section and click the “Create” button.\
    \ You’ll notice that the “Show Song” screen provides a link back to the `Album`;\
    \ clicking the link shows the `Album` with the newly created `Song` instance appearing\
    \ in the list of songs (see [Figure 2-9](#Chapter02.html#fig_2_9)). Grails’s scaffolding,\
    \ although not exuding genius, is clever enough to figure out what a one-to-many\
    \ relationship is and how to manage it accordingly.\n\n![Image](images/9781430243779_Fig02-08.jpg)\n\
    \n***Figure 2-8.** The Create Song screen*\n\n![Image](images/9781430243779_Fig02-09.jpg)\n\
    \n***Figure 2-9.** Show Album screen with a list of songs*\n\n#### The Delete\
    \ Operation\n\nFinally, to complete the CRUD acronym, you can delete a particular\
    \ `Song` or `Album` by clicking the “Delete” button. Grails is kind enough to\
    \ inquire whether you are completely sure that you’d like to proceed with such\
    \ a destructive operation.\n\nThis completes the tour of the dynamic-scaffolding\
    \ capabilities of Grails; in the next section you’ll see how to get access to\
    \ the underlying controller and view the code that goes into these CRUD interfaces."
  raw: '#### The Create Operation


    The magic doesn’t end here. By clicking the “New Song” link at the top of the
    screen, you can create new songs. While generating the views, Grails does its
    best to guess what type of field is required to edit a property’s value. For example,
    if Grails finds a `String`, it will create a text field; if it finds a `java.util.Date`,
    it will render drop-down boxes that allow you to select the date and time. [Figure
    2-4](#Chapter02.html#fig_2_4) shows an example of what the generated song-creation
    interface looks like.


    The Grails built-in validation mechanism, called constraints, can also affect
    how the interface is rendered, including the order in which fields are displayed
    and the type of field that is rendered. Try clicking the “Create” button; you’ll
    get a validation error stating that the duration must be specified, as pictured
    in [Figure 2-5](#Chapter02.html#fig_2_5). The validation messages hook into Grails’s
    internationalization support (often referred to with the abbreviation i18n). But
    for now, all you need to know is that Grails is pulling these messages from the
    properties files within the `grails-app/i18n` directory. (Constraints will be
    discussed in [Chapter 3](#Chapter03.html) and internationalization in [Chapter
    8](#Chapter08.html).)


    ![Image](images/9781430243779_Fig02-04.jpg)


    ***Figure 2-4.** The Create Song page*


    ![Image](images/9781430243779_Fig02-05.jpg)


    ***Figure 2-5.** How Grails handles validation*


    You could customize the message at this point, but for now the defaults will do.
    Now let’s try to create a song with some valid data. Specifically, try to enter
    these values into the provided fields:


    Artist: Soundgarden


    Title: Mailman


    Now click the “Create” button and move on to the next section of the chapter.


    #### The Read Operation


    Grails has obeyed instructions and duly created a new `Song` instance with the
    necessary data in the database. It then redirects you to the “Show Song” screen,
    where you can view and admire a rendered view of the `Song` instance you just
    created.


    Additionally, as pictured in [Figure 2-6](#Chapter02.html#fig_2_6), the “Show
    Song” screen provides two buttons to let you edit or delete the `Song` instance
    from the database.


    ![Image](images/9781430243779_Fig02-06.jpg)


    ***Figure 2-6.** The Show Song screen*


    Currently, you’re dealing with a trivial domain model with only a single `Song`
    domain class to account for. However, another attribute of domain classes is that
    they typically have multiple relationships: one-to-many, one-to-one, and so on.
    If you think about a Song for a moment, it is typically part of a collection of
    Songs within an album. Let’s create an `Album` domain class to model this using
    the `grails create-domain-class` command, as shown in [Listing 2-6](#Chapter02.html#list_2_6).


    ***Listing 2-6.** Creating the Album Domain Class*


    `grails> create-domain-class com.gtunes.Album`

    `| Created file grails-app/domain/com/gtunes/Album.groovy`

    `| Created file test/unit/com/gtunes/AlbumTests.groovy`

    `grails>`


    An `Album` has attributes of its own, including a title, but it also contains
    many songs. [Listing 2-7](#Chapter02.html#list_2_7) shows how to set up a one-to-many
    relationship between `Album` and `Song` using the `hasMany` static property of
    domain classes. The `hasMany` property is assigned a Groovy map where the key
    is the relationship name and the value is the class, in this case `Song`, to which
    the association relates.


    ***Listing 2-7.** Defining a One-to-Many Relationship*


    `package com.gtunes`

    `class Album {`

    `    String title`

    `    static hasMany = [songs:Song]`

    `}`


    The preceding association is unidirectional. In other words, only the `Album`
    class knows about the association, while the `Song` class remains blissfully unaware
    of it. To make the association bidirectional, modify the `Song` class to include
    an `Album` local property, as shown in [Listing 2-8](#Chapter02.html#list_2_8).
    Now `Album` and Song have a bidirectional, one-to-many association.


    ***Listing 2-8.** Making the Relationship Bidirectional*


    `package com.gtunes`

    `class Song {`

    `    String title`

    `    String artist`

    `    Album album`

    `}`


    In [Chapter 3](#Chapter03.html), we’ll delve into other kinds of relationships
    and how they map onto the underlying database. For now, let’s create another scaffolded
    controller that can deal with the creation of Album instances. Use the `grails
    create-controller` command and add the `static scaffold = true` property to the
    class definition (see [Listing 2-9](#Chapter02.html#list_2_9)).


    ***Listing 2-9.** Scaffolding the Album Class*


    `package com.gtunes`

    `class AlbumController {`

    `    static scaffold = true`

    `}`


    Now if you return to your browser and refresh the Song list, you’ll notice that
    the Song you entered previously has mysteriously vanished. The reason for this
    is quite simple: By default, Grails is running with an in-memory database, and
    updating domain classes creates a new instance of it. You might find this useful
    for testing, but you can configure a different database if you require a less
    volatile storage mechanism (we’ll discuss that later in this chapter).


    More significant, however, is the fact that on the welcome page we have an additional
    `AlbumController`. Click the `AlbumController` link, followed by the “New Album”
    button. Enter a title for the Album—here it’s “Soundgarden”—and click the “Create”
    button to see your newly created Album displayed (see [Figure 2-7](#Chapter02.html#fig_2_7)).


    ![Image](images/9781430243779_Fig02-07.jpg)


    ***Figure 2-7.** The Show Album screen*


    You’ll also notice that the Album has a blank Songs field. Let’s fix that next.


    #### The Update Operation


    You can perform updates by clicking the “Edit” button. In this case, you want
    to add a `Song`, so click the “Add Song” link to see the “Create Song” interface.
    This time, you’ll get a useful drop-down box that lets you select which `Album`
    the `Song` should be part of (as shown in [Figure 2-8](#Chapter02.html#fig_2_8)).
    You’ll notice that scaffolding’s default behavior is simply to call `toString()`
    on each element in the drop-down list. The default `toString()` that Grails provides
    uses the class name and instance id, which is not the most pleasant thing to present
    to a user. You can override this behavior by implementing your own `toString()`
    method inside the `Album` class.


    Next, populate the fields as described in the “The Create Operation” section and
    click the “Create” button. You’ll notice that the “Show Song” screen provides
    a link back to the `Album`; clicking the link shows the `Album` with the newly
    created `Song` instance appearing in the list of songs (see [Figure 2-9](#Chapter02.html#fig_2_9)).
    Grails’s scaffolding, although not exuding genius, is clever enough to figure
    out what a one-to-many relationship is and how to manage it accordingly.


    ![Image](images/9781430243779_Fig02-08.jpg)


    ***Figure 2-8.** The Create Song screen*


    ![Image](images/9781430243779_Fig02-09.jpg)


    ***Figure 2-9.** Show Album screen with a list of songs*


    #### The Delete Operation


    Finally, to complete the CRUD acronym, you can delete a particular `Song` or `Album`
    by clicking the “Delete” button. Grails is kind enough to inquire whether you
    are completely sure that you’d like to proceed with such a destructive operation.


    This completes the tour of the dynamic-scaffolding capabilities of Grails; in
    the next section you’ll see how to get access to the underlying controller and
    view the code that goes into these CRUD interfaces.'
  trans: '

    #### 创建操作


    神奇之处不止于此。点击屏幕顶部的“New Song”链接，即可创建新歌曲。在生成视图时，Grails 会尽力猜测编辑属性值所需的字段类型。例如，如果 Grails
    发现一个 `String`，它会创建一个文本字段；如果发现 `java.util.Date`，则会渲染下拉框，让你选择日期和时间。图 2-4 展示了生成的歌曲创建界面的示例。


    Grails 内置的验证机制（称为约束）也会影响界面的渲染方式，包括字段的显示顺序和渲染的字段类型。尝试点击“Create”按钮；你会得到一个验证错误，提示必须指定时长，如图
    2-5 所示。验证消息与 Grails 的国际化支持（常缩写为 i18n）挂钩。但目前，你只需要知道 Grails 是从 `grails-app/i18n`
    目录下的属性文件中提取这些消息的。（约束将在第 3 章中讨论，国际化将在第 8 章中讨论。）


    ![Image](img/9781430243779_Fig02-04.jpg)


    ***图 2-4.** 创建歌曲页面*


    ![Image](img/9781430243779_Fig02-05.jpg)


    ***图 2-5.** Grails 如何处理验证*


    此时你可以自定义消息，但暂时使用默认值即可。现在，让我们尝试用一些有效数据创建一首歌曲。具体来说，尝试在提供的字段中输入以下值：


    Artist: Soundgarden


    Title: Mailman


    现在点击“Create”按钮，然后进入本章的下一节。


    #### 读取操作


    Grails 已遵照指令，在数据库中创建了一个包含必要数据的新的 `Song` 实例。然后它会重定向到“Show Song”屏幕，你可以在那里查看并欣赏刚刚创建的
    `Song` 实例的渲染视图。


    此外，如图 2-6 所示，“Show Song”屏幕提供了两个按钮，让你可以编辑或删除数据库中的 `Song` 实例。


    ![Image](img/9781430243779_Fig02-06.jpg)


    ***图 2-6.** 显示歌曲屏幕*


    目前，你处理的是一个简单的领域模型，只涉及一个 `Song` 领域类。然而，领域类的另一个属性是它们通常具有多种关系：一对多、一对一等等。如果你思考一下 Song，它通常是专辑中歌曲集合的一部分。让我们使用
    `grails create-domain-class` 命令创建一个 `Album` 领域类来对此建模，如代码清单 2-6 所示。


    ***代码清单 2-6.** 创建专辑领域类*


    `grails> create-domain-class com.gtunes.Album`

    `| Created file grails-app/domain/com/gtunes/Album.groovy`

    `| Created file test/unit/com/gtunes/AlbumTests.groovy`

    `grails>`


    一个 `Album` 有自己的属性，包括标题，但它也包含许多歌曲。代码清单 2-7 展示了如何使用领域类的 `hasMany` 静态属性在 `Album`
    和 `Song` 之间建立一对多关系。`hasMany` 属性被赋予一个 Groovy 映射，其中键是关系名称，值是与该关联相关的类，在本例中是 `Song`。


    ***代码清单 2-7.** 定义一对多关系*


    `package com.gtunes`

    `class Album {`

    `    String title`

    `    static hasMany = [songs:Song]`

    `}`


    上述关联是单向的。换句话说，只有 `Album` 类知道该关联，而 `Song` 类对此毫不知情。要使关联变为双向，修改 `Song` 类以包含一个 `Album`
    本地属性，如代码清单 2-8 所示。现在 `Album` 和 `Song` 具有双向的一对多关联。


    ***代码清单 2-8.** 使关系变为双向*


    `package com.gtunes`

    `class Song {`

    `    String title`

    `    String artist`

    `    Album album`

    `}`


    在第 3 章中，我们将深入探讨其他类型的关系以及它们如何映射到底层数据库。现在，让我们创建另一个能够处理 Album 实例创建的脚手架控制器。使用 `grails
    create-controller` 命令，并将 `static scaffold = true` 属性添加到类定义中（参见代码清单 2-9）。


    ***代码清单 2-9.** 为 Album 类搭建脚手架*


    `package com.gtunes`

    `class AlbumController {`

    `    static scaffold = true`

    `}`


    现在，如果你返回浏览器并刷新歌曲列表，你会注意到之前输入的歌曲神秘地消失了。原因很简单：默认情况下，Grails 运行在内存数据库中，更新领域类会创建它的一个新实例。你可能会发现这对测试很有用，但如果你需要更稳定的存储机制，可以配置不同的数据库（我们将在本章后面讨论）。


    然而，更重要的是，在欢迎页面上我们多了一个 `AlbumController`。点击 `AlbumController` 链接，然后点击“New Album”按钮。为专辑输入一个标题——这里输入“Soundgarden”——然后点击“Create”按钮，即可看到你新创建的专辑显示出来（参见图
    2-7）。


    ![Image](img/9781430243779_Fig02-07.jpg)


    ***图 2-7.** 显示专辑屏幕*


    你还会注意到该专辑有一个空白的 Songs 字段。接下来我们来修复这个问题。


    #### 更新操作


    你可以通过点击“Edit”按钮执行更新。在这种情况下，你想添加一首 `Song`，因此点击“Add Song”链接以查看“Create Song”界面。这次，你会得到一个有用的下拉框，让你选择
    `Song` 应该属于哪个 `Album`（如图 2-8 所示）。你会注意到脚手架默认行为只是对下拉列表中的每个元素调用 `toString()`。Grails
    提供的默认 `toString()` 使用类名和实例 ID，这对用户来说并不是最友好的呈现方式。你可以通过在 `Album` 类中实现自己的 `toString()`
    方法来覆盖此行为。


    接下来，按照“创建操作”一节中的描述填充字段，然后点击“Create”按钮。你会注意到“Show Song”屏幕提供了一个返回 `Album` 的链接；点击该链接会显示该
    `Album`，其中新创建的 `Song` 实例出现在歌曲列表中（参见图 2-9）。Grails 的脚手架虽然算不上天才，但足够聪明，能够识别出一对多关系并相应地管理它。


    ![Image](img/9781430243779_Fig02-08.jpg)


    ***图 2-8.** 创建歌曲屏幕*


    ![Image](img/9781430243779_Fig02-09.jpg)


    ***图 2-9.** 显示带有歌曲列表的专辑屏幕*


    #### 删除操作


    最后，为了完成 CRUD 这个缩写，你可以通过点击“Delete”按钮删除特定的 `Song` 或 `Album`。Grails 很友好地询问你是否完全确定要执行这种破坏性操作。


    至此，Grails 动态脚手架功能的介绍就结束了；在下一节中，你将看到如何访问底层控制器并查看这些 CRUD 界面背后的代码。

    '
- fmt: "### Static Scaffolding\n\nDynamic scaffolding can serve a number of purposes,\
    \ from creating administration interfaces to providing the basis of a real application.\
    \ However, it often becomes useful to take customization to a new level, particularly\
    \ in terms of views. Fortunately, Grails provides the ability to take a domain\
    \ class and generate a controller and associated views from the command line through\
    \ the following targets:\n\n- `grails generate-controller`: Generates a controller\
    \ for the specified domain class.\n- `grails generate-views`: Generates views\
    \ for the specified domain class.\n- `grails generate-all`: Generates both a controller\
    \ and associated views.\n\nCalled “static” or “template-driven” scaffolding, this\
    \ approach offers benefits beyond simple code generation. Notably, it provides\
    \ an excellent learning tool to help you familiarize yourself with the Grails\
    \ framework and how everything fits together.\n\nYou’ve already created a domain\
    \ model that relates specifically to the problem you’re attempting to solve. Now\
    \ you can generate code that relates to your domain. Let’s start by looking at\
    \ how to generate a controller.\n\n#### Generating a Controller\n\nTo generate\
    \ a controller that implements the CRUD functionality mentioned in the section\
    \ about dynamic scaffolding, take advantage of the `grails generate-controller`\
    \ command. Like the other `generate` commands, `generate-controller` takes a domain-class\
    \ name as its first argument. For example, [Listing 2-10](#Chapter02.html#list_2_10)\
    \ shows how to use the `generate-controller` command to output a new controller\
    \ from the `Album` class.\n\n**Listing 2-10.** Outputting a New Controller\n\n\
    ```\ngrails> generate-controller com.gtunes.Album\n| Generating controller for\
    \ domain class com.gtunes.Album\n> File /grails-app/controllers/com/gtunes/AlbumController.groovy\
    \ already exists.\nOverwrite?[y,n,a] y\n> File /test/unit/com/gtunes/AlbumControllerTests.groovy\
    \ already exists. Overwrite?[y,n,a] y\n| Finished generation for domain class\
    \ com.gtunes.Album\ngrails>\n```\n\nNotice that, because the `AlbumController`\
    \ class already exists, the `generate-controller` command will ask whether you\
    \ want to overwrite the existing controller. Entering the value “y” for “yes”\
    \ followed by hitting Enter will complete the process.\n\nAt this point, you should\
    \ probably examine the contents of this mysterious controller to see how many\
    \ thousands of code lines have been generated. If you’re coming from a traditional\
    \ Java web-development background, you might expect to implement a few different\
    \ classes. For example, you would likely need a controller that calls a business\
    \ interface, which in turn invokes a Data Access Object (DAO) that actually performs\
    \ the CRUD operations.\n\nSurely the DAO will contain mountains of ORM framework\
    \ code and maybe a few lines of Java Database Connectivity (JDBC) mixed in for\
    \ good measure. Surprisingly—or not, depending on your perspective—the code is\
    \ extremely concise, well under 100 lines. That’s still not quite short enough\
    \ to list in full here, but we will step through each action in the generated\
    \ controller to understand what it is doing.\n\nThe `index` action is the default;\
    \ it is executed if no action is specified in the controller Uniform Resource\
    \ Identifier (URI). It simply redirects to the `list` action, passing any parameters\
    \ along with it (see [Listing 2-11](#Chapter02.html#list_2_11)).\n\n**Listing\
    \ 2-11.** The `index` Action\n\n```\n    def index() {\n        redirect(action:\
    \ \"list\", params: params)\n    }\n```\n\nThe `list` action provides a list of\
    \ all albums, as shown in [Listing 2-12](#Chapter02.html#list_2_12). It delegates\
    \ to the static `list` method of the `Album` class to obtain a `java.util.List`\
    \ of `Album` instances. It then places the list of `Album` instances into a Groovy\
    \ map literal (a `java.util.LinkedHashMap` under the covers), which is then returned\
    \ as the “model” from the controller to the view. (You’ll begin to understand\
    \ more about models and how they relate to views in [Chapters 4](#Chapter04.html)\
    \ and [5](#Chapter05.html).)\n\n**Listing 2-12.** The `list` Action\n\n```\n \
    \   def list() {\n        params.max = Math.min(params.max ? params.int('max')\
    \ : 10, 100)\n        [albumInstanceList: Album.list(params), albumInstanceTotal:\
    \ Album.count()]\n    }\n```\n\nBut hold on a second. Before we get ahead of ourselves,\
    \ have you noticed that you haven’t actually written a static `list` method in\
    \ the `Album` class? At this point, you will start to see the power of GORM. GORM\
    \ automatically provides a whole array of methods on every domain class you write\
    \ through Groovy’s metaprogramming capabilities, one of which is the `list` method.\
    \ By looking through this scaffolded code, you will get a preview of the capabilities\
    \ GORM has to offer."
  raw: '### Static Scaffolding


    Dynamic scaffolding can serve a number of purposes, from creating administration
    interfaces to providing the basis of a real application. However, it often becomes
    useful to take customization to a new level, particularly in terms of views. Fortunately,
    Grails provides the ability to take a domain class and generate a controller and
    associated views from the command line through the following targets:


    > *   `grails generate-controller`: Generates a controller for the specified domain
    class.

    > *   `grails generate-views`: Generates views for the specified domain class.

    > *   `grails generate-all`: Generates both a controller and associated views.


    Called “static” or “template-driven” scaffolding, this approach offers benefits
    beyond simple code generation. Notably, it provides an excellent learning tool
    to help you familiarize yourself with the Grails framework and how everything
    fits together.


    You’ve already created a domain model that relates specifically to the problem
    you’re attempting to solve. Now you can generate code that relates to your domain.
    Let’s start by looking at how to generate a controller.


    #### Generating a Controller


    To generate a controller that implements the CRUD functionality mentioned in the
    section about dynamic scaffolding, take advantage of the `grails generate-controller`
    command. Like the other `generate` commands, `generate-controller` takes a domain-class
    name as its first argument. For example, [Listing 2-10](#Chapter02.html#list_2_10)
    shows how to use the `generate-controller` command to output a new controller
    from the `Album` class.


    ***Listing 2-10.** Outputting a New Controller*


    `grails> generate-controller com.gtunes.Album`

    `| Generating controller for domain class com.gtunes.Album`

    `> File /grails-app/controllers/com/gtunes/AlbumController.groovy already exists.`

    `Overwrite?[y,n,a] y`

    `> File /test/unit/com/gtunes/AlbumControllerTests.groovy already exists. Overwrite?[y,n,a]
    y`

    `| Finished generation for domain class com.gtunes.Album`

    `grails>`


    Notice that, because the `AlbumController` class already exists, the `generate-controller`
    command will ask whether you want to overwrite the existing controller. Entering
    the value “y” for “yes” followed by hitting Enter will complete the process.


    At this point, you should probably examine the contents of this mysterious controller
    to see how many thousands of code lines have been generated. If you’re coming
    from a traditional Java web-development background, you might expect to implement
    a few different classes. For example, you would likely need a controller that
    calls a business interface, which in turn invokes a Data Access Object (DAO) that
    actually performs the CRUD operations.


    Surely the DAO will contain mountains of ORM framework code and maybe a few lines
    of Java Database Connectivity (JDBC) mixed in for good measure. Surprisingly—or
    not, depending on your perspective—the code is extremely concise, well under 100
    lines. That’s still not quite short enough to list in full here, but we will step
    through each action in the generated controller to understand what it is doing.


    The `index` action is the default; it is executed if no action is specified in
    the controller Uniform Resource Identifier (URI). It simply redirects to the list
    action, passing any parameters along with it (see [Listing 2-11](#Chapter02.html#list_2_11)).


    ***Listing 2-11.** The index Action*


    `    def index() {`

    `        redirect(action: "list", params: params)`

    `    }`


    The `list` action provides a list of all albums, as shown in [Listing 2-12](#Chapter02.html#list_2_12).
    It delegates to the static list method of the `Album` class to obtain a `java.util.List`
    of `Album` instances. It then places the list of `Album` instances into a Groovy
    map literal (a `java.util.LinkedHashMap` under the covers), which is then returned
    as the “model” from the controller to the view. (You’ll begin to understand more
    about models and how they relate to views in [Chapters 4](#Chapter04.html) and
    [5](#Chapter05.html).)


    ***Listing 2-12.** The list Action*


    `    def list() {`

    `        params.max = Math.min(params.max ? params.int(''max'') : 10, 100)`

    `        [albumInstanceList: Album.list(params), albumInstanceTotal: Album.count()]`

    `    }`


    But hold on a second. Before we get ahead of ourselves, have you noticed that
    you haven’t actually written a static `list` method in the `Album` class? At this
    point, you will start to see the power of GORM. GORM automatically provides a
    whole array of methods on every domain class you write through Groovy’s metaprogramming
    capabilities, one of which is the `list` method. By looking through this scaffolded
    code, you will get a preview of the capabilities GORM has to offer.'
  trans: '

    ### 静态脚手架


    动态脚手架可用于多种用途，从创建管理界面到为实际应用提供基础。然而，通常需要将定制化提升到新的水平，尤其是在视图方面。幸运的是，Grails 提供了从命令行通过以下目标为领域类生成控制器及相关视图的能力：


    > *   `grails generate-controller`：为指定的领域类生成控制器。

    > *   `grails generate-views`：为指定的领域类生成视图。

    > *   `grails generate-all`：同时生成控制器及相关视图。


    这种方法被称为“静态”或“模板驱动”脚手架，其优势不仅限于简单的代码生成。值得注意的是，它还是一个极佳的学习工具，能帮助你熟悉 Grails 框架以及各个组件如何协同工作。


    你已经创建了一个与你试图解决的问题直接相关的领域模型。现在，你可以生成与你的领域相关的代码。让我们先看看如何生成一个控制器。


    #### 生成控制器


    要生成一个实现动态脚手架章节中提到的 CRUD 功能的控制器，可以利用 `grails generate-controller` 命令。与其他 `generate`
    命令一样，`generate-controller` 将领域类名称作为其第一个参数。例如，清单 2-10 展示了如何使用 `generate-controller`
    命令从 `Album` 类输出一个新的控制器。


    ***清单 2-10.** 输出新控制器*


    `grails> generate-controller com.gtunes.Album`

    `| 正在为领域类 com.gtunes.Album 生成控制器`

    `> 文件 /grails-app/controllers/com/gtunes/AlbumController.groovy 已存在。`

    `是否覆盖？[y,n,a] y`

    `> 文件 /test/unit/com/gtunes/AlbumControllerTests.groovy 已存在。是否覆盖？[y,n,a] y`

    `| 已完成领域类 com.gtunes.Album 的生成`

    `grails>`


    请注意，由于 `AlbumController` 类已存在，`generate-controller` 命令会询问你是否要覆盖现有控制器。输入“y”（表示“是”）并按下回车键即可完成该过程。


    此时，你或许应该检查一下这个神秘控制器的内容，看看生成了多少行代码。如果你有传统的 Java Web 开发背景，可能会期望实现几个不同的类。例如，你可能需要一个调用业务接口的控制器，而该接口又会调用实际执行
    CRUD 操作的数据访问对象（DAO）。


    当然，DAO 中会包含大量的 ORM 框架代码，可能还会混入几行 Java 数据库连接（JDBC）代码。但令人惊讶的是（或者并不惊讶，取决于你的视角），代码极其简洁，远少于
    100 行。虽然这里无法完整列出，但我们将逐步解析生成的控制器中的每个操作，以理解其功能。


    `index` 操作是默认操作；如果在控制器统一资源标识符（URI）中未指定操作，则会执行该操作。它只是简单地重定向到 `list` 操作，并传递所有参数（见清单
    2-11）。


    ***清单 2-11.** index 操作*


    `    def index() {`

    `        redirect(action: "list", params: params)`

    `    }`


    `list` 操作提供所有专辑的列表，如清单 2-12 所示。它委托 `Album` 类的静态 `list` 方法来获取 `Album` 实例的 `java.util.List`。然后，它将
    `Album` 实例列表放入一个 Groovy 映射字面量（底层为 `java.util.LinkedHashMap`）中，该映射作为“模型”从控制器返回给视图。（你将在第
    4 章和第 5 章中开始更深入地理解模型及其与视图的关系。）


    ***清单 2-12.** list 操作*


    `    def list() {`

    `        params.max = Math.min(params.max ? params.int(''max'') : 10, 100)`

    `        [albumInstanceList: Album.list(params), albumInstanceTotal: Album.count()]`

    `    }`


    但请稍等。在我们深入之前，你是否注意到你实际上并没有在 `Album` 类中编写一个静态的 `list` 方法？此时，你将开始看到 GORM 的强大之处。GORM
    通过 Groovy 的元编程能力，自动为你编写的每个领域类提供一整套方法，其中就包括 `list` 方法。通过查看这些脚手架代码，你将预览到 GORM 所提供的功能。

    '
- fmt: "For example, the `show` action, shown in [Listing 2-13](#Chapter02.html#list_2_13),\
    \ takes the `id` parameter from the `params` object and passes it to the `get`\
    \ method of the `Album` class. The `get` method, automatically provided by GORM,\
    \ allows the lookup of domain instances using their database identifiers. The\
    \ result of the `get` method is placed inside a model ready for display, as shown\
    \ in [Listing 2-13](#Chapter02.html#list_2_13).\n\n**Listing 2-13.** The `show`\
    \ Action\n\n```\ndef show() {\n    def albumInstance = Album.get(params.id)\n\
    \    if (!albumInstance) {\n        flash.message = message(code: 'default.not.found.message',\
    \ args: [message(code: 'album.label', default: 'Album'), params.id])\n       \
    \ redirect(action: \"list\")\n        return\n    }\n\n    [albumInstance: albumInstance]\n\
    }\n```\n\nNotice how, in [Listing 2-13](#Chapter02.html#list_2_13), if the `Album`\
    \ instance does not exist, the code places a message inside the `flash` object,\
    \ which is rendered in the view. The `flash` object is a great temporary storage\
    \ for messages (or message codes if you’re using i18n). It will be discussed in\
    \ more detail in [Chapter 4](#Chapter04.html).\n\nThe action that handles deletion\
    \ of albums is aptly named the `delete` action. It retrieves an `Album` for the\
    \ specified `id` parameter and, if it exists, deletes it and redirects it to the\
    \ `list` action ([Listing 2-14](#Chapter02.html#list_2_14)).\n\n**Listing 2-14.**\
    \ The `delete` Action\n\n```\ndef delete() {\n    def albumInstance = Album.get(params.id)\n\
    \    if (!albumInstance) {\n        flash.message = message(code: 'default.not.found.message',\
    \ args: [message(code: 'album.label', default: 'Album'), params.id])\n       \
    \ redirect(action: \"list\")\n        return\n    }\n\n    try {\n        albumInstance.delete(flush:\
    \ true)\n        flash.message = message(code: 'default.deleted.message', args:\
    \ [message(code: 'album.label', default: 'Album'), params.id])\n        redirect(action:\
    \ \"list\")\n    }\n    catch (DataIntegrityViolationException e) {\n        flash.message\
    \ = message(code: 'default.not.deleted.message', args: [message(code: 'album.label',\
    \ default: 'Album'), params.id])\n        redirect(action: \"show\", id: params.id)\n\
    \    }\n}\n```\n\nWhile similar to the `show` action, which simply displays an\
    \ `Album`’s property values, the `edit` action delegates to an edit view, which\
    \ will render fields to edit the `Album`’s properties (see [Listing 2-15](#Chapter02.html#list_2_15)).\n\
    \n**Listing 2-15.** The `edit` Action\n\n```\ndef edit() {\n    def albumInstance\
    \ = Album.get(params.id)\n    if (!albumInstance) {\n        flash.message = message(code:\
    \ 'default.not.found.message', args: [message(code: 'album.label', default: 'Album'),\
    \ params.id])\n        redirect(action: \"list\")\n        return\n    }\n\n \
    \   [albumInstance: albumInstance]\n}\n```\n\nYou might be wondering at this point\
    \ how Grails decides which view to display, given that the code for the `edit`\
    \ and `show` actions are almost identical. The answer lies in the power of convention.\
    \ Grails derives the appropriate view name from the controller and action names.\
    \ In this case, since there are a controller called `AlbumController` and an action\
    \ called `edit`, Grails will look for a view at the location `grails-app/views/album/edit.gsp`\
    \ with the `album` directory inferred from the controller name and the `edit.gsp`\
    \ file taken from the action name. Simple, really.\n\nFor updating there is the\
    \ `update` action, which again makes use of the static `get` method to obtain\
    \ a reference to the `Album` instance. The magical expression `album.properties\
    \ = params` automatically binds the request’s parameters onto the properties of\
    \ the `Album` instance. Save the `Album` instance by calling the `save()` method.\
    \ If the save succeeds, an HTTP redirect is issued back to the user; otherwise,\
    \ the edit view is rendered again. The full code is shown in [Listing 2-16](#Chapter02.html#list_2_16).\n\
    \n**Listing 2-16.** The `update` Action\n\n```\ndef update() {\n    def albumInstance\
    \ = Album.get(params.id)\n    if (!albumInstance) {\n        flash.message = message(code:\
    \ 'default.not.found.message', args: [message(code: 'album.label', default: 'Album'),\
    \ params.id])\n        redirect(action: \"list\")\n        return\n    }\n\n \
    \   if (params.version) {\n        def version = params.version.toLong()\n   \
    \     if (albumInstance.version > version) {\n            albumInstance.errors.rejectValue(\"\
    version\",\n                      \"default.optimistic.locking.failure\",\n  \
    \                    [message(code: 'album.label', default: 'Album')] as Object[],\n\
    \                      \"Another user has updated this Album while you were editing\"\
    )\n            render(view: \"edit\", model: [albumInstance: albumInstance])\n\
    \            return\n        }\n    }\n\n    albumInstance.properties = params\n\
    \n    if (!albumInstance.save(flush: true)) {\n        render(view: \"edit\",\
    \ model: [albumInstance: albumInstance])\n        return\n    }\n\n    flash.message\
    \ = message(code: 'default.updated.message', args: [message(code: 'album.label',\
    \ default: 'Album'), albumInstance.id])\n    redirect(action: \"show\", id: albumInstance.id)\n\
    }\n```\n\nTo facilitate the creation of new Albums, the `create` action delegates\
    \ to the create view. The create view, like the edit view, displays appropriate\
    \ editing fields. Note how the `create` action inserts a new `Album` into the\
    \ model to ensure that field values are populated from request parameters ([Listing\
    \ 2-17](#Chapter02.html#list_2_17)).\n\n**Listing 2-17.** The `create` Action\n\
