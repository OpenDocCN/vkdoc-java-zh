- fmt: "# Batch Updates and Deletes with Detached Criteria\n\nBatch updating and deleting\
    \ of data is fairly common in modern applications but not something to be done\
    \ lightly. The Grails framework tends to shy away from providing easy-use methods\
    \ that perform potentially destructive operations.\n\nHowever, if you do need\
    \ to perform batch updates or deletes, then detached criteria are a great way\
    \ to achieve that. Essentially, the `DetachedCriteria` API provides two methods,\
    \ called `deleteAll` and `updateAll`, that allow, respectively, deleting and updating\
    \ all objects that match the query.\n\nAs an example, if you have a particular\
    \ aversion to reggae music, this can be easily remedied with the batch delete\
    \ operation from [Listing 9-20](#Chapter09.html#list_9_20).\n\n***Listing 9-20.**\
    \ Batch Deleting with DetachedCriteria*\n\n```\ndef query = new DetachedCriteria(Album).build\
    \ {\n    eq \"genre\", \"Reggae\"\n}\nint deleteCount = query.deleteAll()\n```\n\
    \nAs you can see from the example in [Listing 9-20](#Chapter09.html#list_9_20),\
    \ the `deleteAll` method returns the number of entities that were deleted by the\
    \ operation.\n\nThe `updateAll` method differs slightly in that it takes a map\
    \ representing the properties and values you wish to update. [Listing 9-21](#Chapter09.html#list_9_21)\
    \ presents an example.\n\n***Listing 9-21.** Batch Updating with DetachedCriteria*\n\
    \n```\ndef query = new DetachedCriteria(Album).build {\n    eq \"genre\", \"Reggae\"\
    \n}\nint updateCount = query.updateAll(genre: \"Rock\")\n```\n\n## Where Queries\n\
    \nBuilding on the `DetachedCriteria` API discussed in the previous section, where\
    \ queries (named as such after the `where` method, which is the main entry point\
    \ to the API) provide a way to build compile-time-checked, concise queries using\
    \ syntax familiar to all Groovy developers.\n\nGroovy’s collections API provides\
    \ numerous “finder” methods that operate on collections and take closure filter\
    \ results. An example, using Groovy’s `findAll` method, can be seen in [Listing\
    \ 9-22](#Chapter09.html#list_9_22).\n\n***Listing 9-22.** Groovy Collection API\
    \ findAll Method*\n\n```\ndef list = albums.findAll { it.genre == \"Rock\" }\n\
    ```\n\nThe Grails where queries are modeled after this API, whereby you use native\
    \ Groovy operators such as `==`, `>`, `<`, and the like, to construct the query.\n\
    \n### Where Query Basics\n\nThe `where` method accepts a closure, and within the\
    \ body of the closure you can use native Groovy operators to construct a `DetachedCriteria`\
    \ instance. [Listing 9-23](#Chapter09.html#list_9_23) presents a basic example.\n\
    \n***Listing 9-23.** A Simple where Query*\n\n```\ndef query = Album.where { genre\
    \ == \"Rock\" }\ndef results = query.list()\n```\n\nUnlike regular criteria queries,\
    \ if you misspell the property name, in this case `genre`, you will receive a\
    \ compile-time error. The returned object is a `DetachedCriteria` instance; from\
    \ there, all the features of the `DetachedCriteria` API apply (lazy evaluation,\
    \ dynamic finders, query composition, and so on).\n\nIn contrast to Groovy’s finder\
    \ methods, the closure passed to the `where` method is *not* used to filter results\
    \ from a collection. Instead the closure is translated under the covers into an\
    \ appropriate SQL query (or in the case of alternative datastores like MongoDB,\
    \ whatever native query API is required).\n\nIf you wish to execute the query\
    \ and obtain the results immediately, there are two methods, called `find` and\
    \ `findAll`, that can be used. [Listing 9-24](#Chapter09.html#list_9_24) shows\
    \ these latter two methods in action.\n\n***Listing 9-24.** Using findAll and\
    \ find Queries for Eager Querying*\n\n```\ndef rockAlbums = Album.findAll { genre\
    \ == \"Rock\" }\ndef undertow = Album.find { title == \"Undertow\" }\n```\n\n\
    ### Understanding Where Query Operators\n\nIn general the native Groovy operators\
    \ map quite nicely onto their SQL equivalents when the query is executed. [Table\
    \ 9-2](#Chapter09.html#tab_9_2) provides examples of the various supported Groovy\
    \ operators, what they map to in the SQL world, and an example of use.\n\n![Image](images/tab_9_2.jpg)\n\
    \nA few of the above examples warrant further explanation. Notably, Groovy’s matching\
    \ operator `==~` is mapped onto `LIKE`, while Groovy’s find operator `=~` is mapped\
    \ onto the equivalent of the `ILIKE` operator (case-insensitive `like`) in Postgres.\
    \ Other databases that don’t have an `ILIKE` operator tend to use functions to\
    \ convert the text to upper or lower case during comparison.\n\nAlso, notice that\
    \ Groovy ranges are used to construct SQL `BETWEEN` queries to obtain results\
    \ within between two given values.\n\nGroovy’s regular logical operators can be\
    \ used to construct conjunctions, disjunctions, and even negations. [Listing 9-25](#Chapter09.html#list_9_25)\
    \ presents an example that combines multiple logical operators.\n\n***Listing\
    \ 9-25.** Where Queries and Conjunctions/Disjunctions*\n\n```\ndef lastWeek =\
    \ new Date() - 7\ndef rockAlbums = Album.where {\n   genre == \"Rock\" && dateCreated\
    \ > lastWeek && !artist.name == \"Pink\"\n}\n```\n\nThe previous example also\
    \ introduced another capability of where queries, which is the ability to query\
    \ associations via the dot operator. The query in [Listing 9-25](#Chapter09.html#list_9_25)\
    \ queries the `name` property of the `artist` association!\n\n### Querying Associations\
    \ with Where Queries\n\nAs mentioned in the previous section, using the dot operator\
    \ you can query both single-ended and collection-type associations. However, if\
    \ you need to query multiple properties of a given association, it could end up\
    \ being very repetitive to use the dot operator over and over. For example, consider\
    \ the code in [Listing 9-26](#Chapter09.html#list_9_26).\n\n***Listing 9-26.**\
    \ Using the dot operator to query associations*\n\n```\ndef query = Song.where\
    \ {\n    album.title ==~ \"A%\" && album.dateCreated > new Date() - 7\n}\n```\n\
    \nThe code in [Listing 9-24](#Chapter09.html#list_9_24) queries two properties\
    \ of the `album` association: `title` and `dateCreated`. Notice that the repetitive\
    \ nature of using the dot operator as the name of the association is used twice,\
    \ one for each property. A more concise way to write this query can be seen in\
    \ [Listing 9-27](#Chapter09.html#list_9_27).\n\n***Listing 9-27.** Grouping Association\
    \ Criterion*\n\n```\ndef query = Song.where {\n    genre == \"Rock\" &&\n    \
    \  album { title ==~ \"A%\" && dateCreated > new Date() – 7 }\n}\n```\n\nAs you\
    \ can see from [Listing 9-25](#Chapter09.html#list_9_25), you can use a closure\
    \ after the name of the association to group related criteria and avoid repeating\
    \ the association name. Also, note that you can combine association criteria with\
    \ top-level criteria related to the class being queried.\n\nIn the case of collection\
    \ types, used to model one-to-many and many-to-many associations, where queries\
    \ provide a few additional features designed to allow querying the size of a collection.\n\
    \nIn general if you use the `size()` function on a collection and combine it with\
    \ a regular Groovy comparison operator, such as `==` or `>`, you can constrain\
    \ the size of the collection returned by a query. [Listing 9-28](#Chapter09.html#list_9_28)\
    \ presents a simple example that limits the number of songs an album can contain.\n\
    \n***Listing 9-28.** Querying collection sizes*\n\n```\ndef shortAlbums = Album.where\
    \ {\n    songs.size() < 10\n}\n```\n\nNote that, as mentioned previously, the\
    \ closure code is never actually executed in this form, but instead translated\
    \ into an SQL query at runtime. So although it may seem like we are invoking the\
    \ `size()` method on the actual collection here, what we are actually doing is\
    \ simply telling Grails that the query results should be limited by the `size()`\
    \ of the collection. Under the covers Grails will do the right thing and produce\
    \ an appropriate SQL query to be executed."
  raw: '##### Batch Updates and Deletes with Detached Criteria


    Batch updating and deleting of data is fairly common in modern applications but
    not something to be done lightly. The Grails framework tends to shy away from
    providing easy-use methods that perform potentially destructive operations.


    However, if you do need to perform batch updates or deletes, then detached criteria
    are a great way to achieve that. Essentially, the `DetachedCriteria` API provides
    two methods, called `deleteAll` and `updateAll`, that allow, respectively, deleting
    and updating all objects that match the query.


    As an example, if you have a particular aversion to reggae music, this can be
    easily remedied with the batch delete operation from [Listing 9-20](#Chapter09.html#list_9_20).


    ***Listing 9-20.** Batch Deleting with DetachedCriteria*


    `def query = new DetachedCriteria(Album).build {`

    `    eq "genre", "Reggae"`

    `}`

    `int deleteCount = query.deleteAll()`


    As you can see from the example in [Listing 9-20](#Chapter09.html#list_9_20),
    the `deleteAll` method returns the number of entities that were deleted by the
    operation.


    The `updateAll` method differs slightly in that it takes a map representing the
    properties and values you wish to update. [Listing 9-21](#Chapter09.html#list_9_21)
    presents an example.


    ***Listing 9-21.** Batch Updating with DetachedCriteria*


    `def query = new DetachedCriteria(Album).build {`

    `    eq "genre", "Reggae"`

    `}`

    `int updateCount = query.updateAll(genre: "Rock")`


    #### Where Queries


    Building on the `DetachedCriteria` API discussed in the previous section, where
    queries (named as such after the `where` method, which is the main entry point
    to the API) provide a way to build compile-time-checked, concise queries using
    syntax familiar to all Groovy developers.


    Groovy’s collections API provides numerous “finder” methods that operate on collections
    and take closure filter results. An example, using Groovy’s `findAll` method,
    can be seen in [Listing 9-22](#Chapter09.html#list_9_22).


    ***Listing 9-22.** Groovy Collection API findAll Method*


    `def list = albums.findAll { it.genre == "Rock" }`


    The Grails where queries are modeled after this API, whereby you use native Groovy
    operators such as `==`, `>`, `<`, and the like, to construct the query.


    ##### Where Query Basics


    The `where` method accepts a closure, and within the body of the closure you can
    use native Groovy operators to construct a `DetachedCriteria` instance. [Listing
    9-23](#Chapter09.html#list_9_23) presents a basic example.


    ***Listing 9-23.** A Simple where Query*


    `def query = Album.where { genre == "Rock" }`

    `def results = query.list()`


    Unlike regular criteria queries, if you misspell the property name, in this case
    `genre`, you will receive a compile-time error. The returned object is a `DetachedCriteria`
    instance; from there, all the features of the `DetachedCriteria` API apply (lazy
    evaluation, dynamic finders, query composition, and so on).


    In contrast to Groovy’s finder methods, the closure passed to the `where` method
    is *not* used to filter results from a collection. Instead the closure is translated
    under the covers into an appropriate SQL query (or in the case of alternative
    datastores like MongoDB, whatever native query API is required).


    If you wish to execute the query and obtain the results immediately, there are
    two methods, called `find` and `findAll`, that can be used. [Listing 9-24](#Chapter09.html#list_9_24)
    shows these latter two methods in action.


    ***Listing 9-24.** Using findAll and find Queries for Eager Querying*


    `def rockAlbums = Album.findAll { genre == "Rock" }`

    `def undertow = Album.find { title == "Undertow" }`


    ##### Understanding Where Query Operators


    In general the native Groovy operators map quite nicely onto their SQL equivalents
    when the query is executed. [Table 9-2](#Chapter09.html#tab_9_2) provides examples
    of the various supported Groovy operators, what they map to in the SQL world,
    and an example of use.


    ![Image](images/tab_9_2.jpg)


    A few of the above examples warrant further explanation. Notably, Groovy’s matching
    operator `==~` is mapped onto `LIKE`, while Groovy’s find operator `=~` is mapped
    onto the equivalent of the `ILIKE` operator (case-insensitive `like`) in Postgres.
    Other databases that don’t have an `ILIKE` operator tend to use functions to convert
    the text to upper or lower case during comparison.


    Also, notice that Groovy ranges are used to construct SQL `BETWEEN` queries to
    obtain results within between two given values.


    Groovy’s regular logical operators can be used to construct conjunctions, disjunctions,
    and even negations. [Listing 9-25](#Chapter09.html#list_9_25) presents an example
    that combines multiple logical operators.


    ***Listing 9-25.** Where Queries and Conjunctions/Disjunctions*


    `def lastWeek = new Date() - 7`

    `def rockAlbums = Album.where {`

    `   genre == "Rock" && dateCreated > lastWeek && !artist.name == "Pink"`

    `}`


    The previous example also introduced another capability of where queries, which
    is the ability to query associations via the dot operator. The query in [Listing
    9-25](#Chapter09.html#list_9_25) queries the `name` property of the `artist` association!


    ##### Querying Associations with Where Queries


    As mentioned in the previous section, using the dot operator you can query both
    single-ended and collection-type associations. However, if you need to query multiple
    properties of a given association, it could end up being very repetitive to use
    the dot operator over and over. For example, consider the code in [Listing 9-26](#Chapter09.html#list_9_26).


    ***Listing 9-26.** Using the dot operator to query associations*


    `def query = Song.where {`

    `    album.title ==~ "A%" && album.dateCreated > new Date() - 7`

    `}`


    The code in [Listing 9-24](#Chapter09.html#list_9_24) queries two properties of
    the `album` association: `title` and `dateCreated`. Notice that the repetitive
    nature of using the dot operator as the name of the association is used twice,
    one for each property. A more concise way to write this query can be seen in [Listing
    9-27](#Chapter09.html#list_9_27).


    ***Listing 9-27.** Grouping Association Criterion*


    `def query = Song.where {`

    `    genre == "Rock" &&`

    `      album { title ==~ "A%" && dateCreated > new Date() – 7 }`

    `}`


    As you can see from [Listing 9-25](#Chapter09.html#list_9_25), you can use a closure
    after the name of the association to group related criteria and avoid repeating
    the association name. Also, note that you can combine association criteria with
    top-level criteria related to the class being queried.


    In the case of collection types, used to model one-to-many and many-to-many associations,
    where queries provide a few additional features designed to allow querying the
    size of a collection.


    In general if you use the `size()` function on a collection and combine it with
    a regular Groovy comparison operator, such as `==` or `>`, you can constrain the
    size of the collection returned by a query. [Listing 9-28](#Chapter09.html#list_9_28)
    presents a simple example that limits the number of songs an album can contain.


    ***Listing 9-28.** Querying collection sizes*


    `def shortAlbums = Album.where {`

    `    songs.size() < 10`

    `}`


    Note that, as mentioned previously, the closure code is never actually executed
    in this form, but instead translated into an SQL query at runtime. So although
    it may seem like we are invoking the `size()` method on the actual collection
    here, what we are actually doing is simply telling Grails that the query results
    should be limited by the `size()` of the collection. Under the covers Grails will
    do the right thing and produce an appropriate SQL query to be executed.'
  trans: '

    ##### 使用分离条件进行批量更新与删除


    在现代应用程序中，批量更新和删除数据相当常见，但不可轻率为之。Grails 框架倾向于避免提供执行潜在破坏性操作的简易方法。


    然而，如果你确实需要执行批量更新或删除，分离条件（detached criteria）是实现这一目标的绝佳方式。本质上，`DetachedCriteria`
    API 提供了两个方法，分别名为 `deleteAll` 和 `updateAll`，它们允许分别删除和更新所有与查询匹配的对象。


    例如，如果你对雷鬼音乐特别反感，可以通过清单 9-20 中的批量删除操作轻松解决这个问题。


    ***清单 9-20.** 使用 DetachedCriteria 进行批量删除*


    `def query = new DetachedCriteria(Album).build {`

    `    eq "genre", "Reggae"`

    `}`

    `int deleteCount = query.deleteAll()`


    如清单 9-20 中的示例所示，`deleteAll` 方法返回了被该操作删除的实体数量。


    `updateAll` 方法略有不同，它接受一个表示你想要更新的属性和值的映射。清单 9-21 给出了一个示例。


    ***清单 9-21.** 使用 DetachedCriteria 进行批量更新*


    `def query = new DetachedCriteria(Album).build {`

    `    eq "genre", "Reggae"`

    `}`

    `int updateCount = query.updateAll(genre: "Rock")`


    #### Where 查询


    基于上一节讨论的 `DetachedCriteria` API，where 查询（因其 `where` 方法而得名，该方法是此 API 的主要入口点）提供了一种使用所有
    Groovy 开发者都熟悉的语法来构建编译时检查的、简洁查询的方式。


    Groovy 的集合 API 提供了许多“查找器”方法，这些方法对集合进行操作并接受闭包来过滤结果。在清单 9-22 中可以看到一个使用 Groovy 的
    `findAll` 方法的示例。


    ***清单 9-22.** Groovy 集合 API 的 findAll 方法*


    `def list = albums.findAll { it.genre == "Rock" }`


    Grails 的 where 查询是模仿此 API 设计的，因此你可以使用原生的 Groovy 运算符，例如 `==`、`>`、`<` 等，来构建查询。


    ##### Where 查询基础


    `where` 方法接受一个闭包，在闭包体内，你可以使用原生的 Groovy 运算符来构建一个 `DetachedCriteria` 实例。清单 9-23
    展示了一个基本示例。


    ***清单 9-23.** 一个简单的 where 查询*


    `def query = Album.where { genre == "Rock" }`

    `def results = query.list()`


    与常规的条件查询不同，如果你拼错了属性名（本例中为 `genre`），你将收到一个编译时错误。返回的对象是一个 `DetachedCriteria` 实例；由此，`DetachedCriteria`
    API 的所有特性（惰性求值、动态查找器、查询组合等）都适用。


    与 Groovy 的查找器方法相反，传递给 `where` 方法的闭包*并非*用于从集合中过滤结果。相反，该闭包在底层会被转换为适当的 SQL 查询（或者对于像
    MongoDB 这样的替代数据存储，则转换为所需的任何原生查询 API）。


    如果你希望立即执行查询并获取结果，可以使用两个方法：`find` 和 `findAll`。清单 9-24 展示了这两个方法的使用。


    ***清单 9-24.** 使用 findAll 和 find 查询进行即时查询*


    `def rockAlbums = Album.findAll { genre == "Rock" }`

    `def undertow = Album.find { title == "Undertow" }`


    ##### 理解 Where 查询运算符


    通常，在执行查询时，原生的 Groovy 运算符能很好地映射到它们对应的 SQL 运算符。表 9-2 提供了各种受支持的 Groovy 运算符的示例、它们在
    SQL 世界中的映射关系以及使用示例。


    ![Image](img/tab_9_2.jpg)


    上述示例中有几个需要进一步解释。值得注意的是，Groovy 的匹配运算符 `==~` 映射到 `LIKE`，而 Groovy 的查找运算符 `=~` 映射到
    Postgres 中相当于 `ILIKE` 运算符（不区分大小写的 `like`）的功能。其他没有 `ILIKE` 运算符的数据库，则倾向于在比较时使用函数将文本转换为大写或小写。


    另外，请注意 Groovy 的范围（ranges）用于构建 SQL 的 `BETWEEN` 查询，以获取介于两个给定值之间的结果。


    Groovy 常规的逻辑运算符可用于构建合取（conjunctions）、析取（disjunctions）甚至否定（negations）。清单 9-25 展示了一个组合了多个逻辑运算符的示例。


    ***清单 9-25.** Where 查询与合取/析取*


    `def lastWeek = new Date() - 7`

    `def rockAlbums = Album.where {`

    `   genre == "Rock" && dateCreated > lastWeek && !artist.name == "Pink"`

    `}`


    前面的示例还引入了 where 查询的另一个能力，即通过点运算符查询关联。在清单 9-25 中的查询查询了 `artist` 关联的 `name` 属性！


    ##### 使用 Where 查询查询关联


    如上一节所述，使用点运算符，你可以查询单端关联和集合类型的关联。然而，如果你需要查询某个给定关联的多个属性，反复使用点运算符可能会变得非常重复。例如，考虑清单
    9-26 中的代码。


    ***清单 9-26.** 使用点运算符查询关联*


    `def query = Song.where {`

    `    album.title ==~ "A%" && album.dateCreated > new Date() - 7`

    `}`


    清单 9-24 中的代码查询了 `album` 关联的两个属性：`title` 和 `dateCreated`。请注意，使用点运算符的重复性：关联名称被使用了两次，每个属性一次。在清单
    9-27 中可以看到一种更简洁的编写此查询的方式。


    ***清单 9-27.** 分组关联条件*


    `def query = Song.where {`

    `    genre == "Rock" &&`

    `      album { title ==~ "A%" && dateCreated > new Date() – 7 }`

    `}`


    如清单 9-25 所示，你可以在关联名称后使用一个闭包来分组相关条件，从而避免重复关联名称。另外，请注意，你可以将关联条件与针对被查询类的顶级条件组合使用。


    对于用于建模一对多和多对多关联的集合类型，where 查询提供了一些额外的功能，旨在允许查询集合的大小。


    通常，如果你对集合使用 `size()` 函数，并将其与常规的 Groovy 比较运算符（如 `==` 或 `>`）结合使用，就可以约束查询返回的集合大小。清单
    9-28 展示了一个限制专辑可以包含歌曲数量的简单示例。


    ***清单 9-28.** 查询集合大小*


    `def shortAlbums = Album.where {`

    `    songs.size() < 10`

    `}`


    请注意，如前所述，此形式的闭包代码实际上从未被执行，而是在运行时被转换为 SQL 查询。因此，虽然看起来我们像是在对实际的集合调用 `size()` 方法，但实际上我们只是告诉
    Grails 查询结果应该受限于集合的 `size()`。在底层，Grails 会做出正确的处理，并生成适当的 SQL 查询来执行。

    '
- fmt: "##### Subqueries and Functions\n\nOne advanced aspect of `where` queries is\
    \ the use of subqueries. As of the time of writing, they can be used only on the\
    \ right-hand side of any Boolean expression. Consider [Listing 9-29](#Chapter09.html#list_9_29).\n\
    \n***Listing 9-29.** Using Subqueries*\n\n```\ndef longSongs = Song.where {\n\
    \    duration > avg(duration)\n}\n```\n\nThe query in [Listing 9-29](#Chapter09.html#list_9_29)\
    \ returns all the songs whose duration is greater than the average. This is achieved\
    \ by using the `avg` subquery on the right-hand side of the expression. A more\
    \ elaborate example is seen in [Listing 9-30](#Chapter09.html#list_9_30).\n\n\
    ***Listing 9-30.** Using More Elaborate Subqueries*\n\n```\ndef longRockSongs\
    \ = Song.where {\n    genre == \"Rock\" && duration > avg(duration).of { genre\
    \ == \"Rock\" }\n}\n```\n\nIn this case the `avg` subquery is used to find all\
    \ the rock songs whose duration is longer than the average rock song. To achieve\
    \ this query, the `of` function is used on the result of the `avg` function. The\
    \ `of` function takes a closure, which can contain further Boolean expressions.\
    \ [Table 9-3](#Chapter09.html#tab_9_3) provides a comprehensive list of the available\
    \ subqueries.\n\n![Image](images/tab_9_3.jpg)\n\nThe `property` subquery deserves\
    \ a special mention; it differs in that instead of returning a single value, as\
    \ is the case with the `avg` subquery, the `property` subquery instead returns\
    \ a list of values. [Listing 9-31](#Chapter09.html#list_9_31) presents an example\
    \ of using the `property` subquery.\n\n***Listing 9-31.** Using a property Subquery*\n\
    \n```\ndef query = Song.where {\n    duration < property(duration)\n}\n```\n\n\
    The query in [Listing 9-31](#Chapter09.html#list_9_31) differs significantly from\
    \ the query previously seen in [Listing 9-27](#Chapter09.html#list_9_27) in that\
    \ it compares the duration to the duration of *all* other properties. Since this\
    \ is unlikely to be very efficient, the `property` subquery is generally used\
    \ in combination with the `of` function to constrain the number of properties\
    \ compared. An example of this can be seen in [Listing 9-32](#Chapter09.html#list_9_32).\n\
    \n***Listing 9-32.** Using a property Subquery with the of Function*\n\n```\n\
    def query = Song.where {\n    duration < property(duration).of { genre == \"Rock\"\
    \ }\n}\n```\n\nAs you have probably noted from the various examples, the property\
    \ name being queried should always be on the left-hand side of a Boolean expression.\
    \ There are, however, some additional functions that can be applied to the property\
    \ being queried. [Table 9-4](#Chapter09.html#tab_9_4) lists these functions.\n\
    \n![Image](images/tab_9_4.jpg)\n\nThe functions in [Table 9-4](#Chapter09.html#tab_9_4)\
    \ can, as of the time of writing, only be used on the left-hand side of an expression.\
    \ In other words, they should surround the property name. [Listing 9-33](#Chapter09.html#list_9_33)\
    \ gives an example that obtains all albums from 2012.\n\n***Listing 9-33.** Using\
    \ Functions on a Property*\n\n```\ndef query = Album.where {\n    year(dateCreated)\
    \ == 2012\n}\n```\n\n#### Query by Example\n\nAn alternative to criteria queries\
    \ is to pass an instance of the class you’re looking for to the `find` or `findAll`\
    \ method. This is an interesting option when used in conjunction with Groovy’s\
    \ additional implicit constructor for JavaBeans, as shown in [Listing 9-34](#Chapter09.html#list_9_34).\n\
    \n***Listing 9-34.** Query by Example*\n\n```\ndef album = Album.find( new Album(title:'Odelay')\
    \ )\n```\n\nAs you can see from [Listing 9-15](#Chapter09.html#list_9_15), the\
    \ `find` method uses the properties set on the passed `Album` instance to formulate\
    \ a query. Querying by example is a little limiting, because you don’t have access\
    \ to some of the more advanced expressions such as `Like`, `Between`, and `GreaterThan`\
    \ when passing in the example. It is, however, another useful addition to your\
    \ toolbox.\n\n#### HQL and SQL\n\nAnother way to perform queries is via the Hibernate\
    \ Query Language (HQL), which is a flexible object-oriented alternative to SQL.\
    \ A full discussion of HQL is beyond the scope of this book; however, the Hibernate\
    \ documentation does cover it splendidly ([`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/queryhql.html`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/queryhql.html)).\
    \ We will look at some basic examples of how GORM supports HQL via more built-in\
    \ methods.\n\nThose who know SQL should not find it hard to adapt to HQL, because\
    \ the syntactic differences are minimal. GORM provides three methods for working\
    \ with HQL queries: `find`, `findAll`, and `executeQuery`. Each method, when passed\
    \ a string, will assume it’s an HQL query. The example in [Listing 9-35](#Chapter09.html#list_9_35)\
    \ presents the most basic case combined with `findAll`.\n\n***Listing 9-35.**\
    \ HQL via the findAll Method*\n\n```\n// query for all albums\ndef allAlbums =\
    \ Album.findAll('from com.g2one.gtunes.Album')\n```\n\nIn addition, JDBC-style\
    \ `IN` parameters (queries with question mark [?] placeholders) are supported\
    \ by passing a list as the second argument. Thanks to Groovy’s concise syntax\
    \ for expressing lists, the result is very readable, as presented in [Listing\
    \ 9-36](#Chapter09.html#list_9_36).\n\n***Listing 9-36.** HQL with Positional\
    \ Parameters*\n\n```\n// query for an Album by title\ndef album = Album.find(\n\
    \    'from Album as a where a.title = ?', ['Odelay'])\n```\n\nIf positional parameters\
    \ aren’t your preferred option, you can also use named parameters, using the syntax\
    \ shown in [Listing 9-37](#Chapter09.html#list_9_37).\n\n***Listing 9-37.** HQL\
    \ with Named Parameters*\n\n```\n// query for an Album by title\ndef album = Album.find('from\
    \ Album as a where a.title = :theTitle',\n                        [theTitle:'Odelay'])\n\
    ```\n\nNotice how you use the colon character directly before the named parameter\
    \ `:theTitle`. Then instead of passing a list as the final argument to the `find`\
    \ method, you pass a map where the keys in the map match the named parameters\
    \ in the query.\n\nThe methods `find` and `findAll` assume the query is a query\
    \ specific to the `Album` class and will validate that this is so. It is possible,\
    \ however, to execute other HQL queries via the `executeQuery` method, as shown\
    \ in [Listing 9-38](#Chapter09.html#list_9_38).\n\n***Listing 9-38.** HQL via\
    \ executeQuery*\n\n```\n// get all the songs\ndef songs = Album.executeQuery('select\
    \ elements(b.songs) from Album as a')\n```\n\nClearly, there is a lot to learn\
    \ about HQL, since it is possible to perform more advanced queries using joins,\
    \ aggregate functions, and subqueries. Luckily, the documentation on the Hibernate\
    \ web site is an excellent overview of what is possible and can help you on your\
    \ way."
  raw: '##### Subqueries and Functions


    One advanced aspect of where queries is the use of subqueries. As of the time
    of writing, they can be used only on the right-hand side of any Boolean expression.
    Consider [Listing 9-29](#Chapter09.html#list_9_29).


    ***Listing 9-29.** Using Subqueries*


    `def longSongs = Song.where {`

    `    duration > avg(duration)`

    `}`


    The query in [Listing 9-29](#Chapter09.html#list_9_29) returns all the songs whose
    duration is greater than the average. This is achieved by using the `avg` subquery
    on the right-hand side of the expression. A more elaborate example is seen in
    [Listing 9-30](#Chapter09.html#list_9_30).


    ***Listing 9-30.** Using More Elaborate Subqueries*


    `def longRockSongs = Song.where {`

    `    genre == "Rock" && duration > avg(duration).of { genre == "Rock" }`

    `}`


    In this case the `avg` subquery is used to find all the rock songs whose duration
    is longer than the average rock song. To achieve this query, the `of` function
    is used on the result of the `avg` function. The `of` function takes a closure,
    which can contain further Boolean expressions. [Table 9-3](#Chapter09.html#tab_9_3)
    provides a comprehensive list of the available subqueries.


    ![Image](images/tab_9_3.jpg)


    The `property` subquery deserves a special mention; it differs in that instead
    of returning a single value, as is the case with the `avg` subquery, the `property`
    subquery instead returns a list of values. [Listing 9-31](#Chapter09.html#list_9_31)
    presents an example of using the `property` subquery.


    ***Listing 9-31.** Using a property Subquery*


    `def query = Song.where {`

    `    duration < property(duration)`

    ` }`


    The query in [Listing 9-31](#Chapter09.html#list_9_31) differs significantly from
    the query previously seen in [Listing 9-27](#Chapter09.html#list_9_27) in that
    it compares the duration to the duration of *all* other properties. Since this
    is unlikely to be very efficient, the property subquery is generally used in combination
    with the `of` function to constrain the number of properties compared. An example
    of this can be seen in [Listing 9-32](#Chapter09.html#list_9_32).


    ***Listing 9-32.** Using a property Subquery with the of Function*


    `def query = Song.where {`

    `    duration < property(duration).of { genre == "Rock" }`

    ` }`


    As you have probably noted from the various examples, the property name being
    queried should always be on the left-hand side of a Boolean expression. There
    are, however, some additional functions that can be applied to the property being
    queried. [Table 9-4](#Chapter09.html#tab_9_4) lists these functions.


    ![Image](images/tab_9_4.jpg)


    The functions in [Table 9-4](#Chapter09.html#tab_9_4) can, as of the time of writing,
    only be used on the left-hand side of an expression. In other words, they should
    surround the property name. [Listing 9-33](#Chapter09.html#list_9_33) gives an
    example that obtains all albums from 2012.


    ***Listing 9-33.** Using Functions on a Property*


    `def query = Album.where {`

    `    year(dateCreated) == 2012`

    `}`


    #### Query by Example


    An alternative to criteria queries is to pass an instance of the class you’re
    looking for to the `find` or `findAll` method. This is an interesting option when
    used in conjunction with Groovy’s additional implicit constructor for JavaBeans,
    as shown in [Listing 9-34](#Chapter09.html#list_9_34).


    ***Listing 9-34.** Query by Example*


    `def album = Album.find( new Album(title:''Odelay'') )`


    As you can see from [Listing 9-15](#Chapter09.html#list_9_15), the `find` method
    uses the properties set on the passed `Album` instance to formulate a query. Querying
    by example is a little limiting, because you don’t have access to some of the
    more advanced expressions such as `Like`, `Between`, and `GreaterThan` when passing
    in the example. It is, however, another useful addition to your toolbox.


    #### HQL and SQL


    Another way to perform queries is via the Hibernate Query Language (HQL), which
    is a flexible object-oriented alternative to SQL. A full discussion of HQL is
    beyond the scope of this book; however, the Hibernate documentation does cover
    it splendidly ([`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/queryhql.html`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/queryhql.html)).
    We will look at some basic examples of how GORM supports HQL via more built-in
    methods.


    Those who know SQL should not find it hard to adapt to HQL, because the syntactic
    differences are minimal. GORM provides three methods for working with HQL queries:
    `find`, `findAll`, and `executeQuery`. Each method, when passed a string, will
    assume it’s an HQL query. The example in [Listing 9-35](#Chapter09.html#list_9_35)
    presents the most basic case combined with `findAll`.


    ***Listing 9-35.** HQL via the findAll Method*


    `// query for all albums`

    `def allAlbums = Album.findAll(''from com.g2one.gtunes.Album'')`


    In addition, JDBC-style `IN` parameters (queries with question mark [?] placeholders)
    are supported by passing a list as the second argument. Thanks to Groovy’s concise
    syntax for expressing lists, the result is very readable, as presented in [Listing
    9-36](#Chapter09.html#list_9_36).


    ***Listing 9-36.** HQL with Positional Parameters*


    `// query for an Album by title def album = Album.find(`

    `''from Album as a where a.title = ?'', [''Odelay''])`


    If positional parameters aren’t your preferred option, you can also use named
    parameters, using the syntax shown in [Listing 9-37](#Chapter09.html#list_9_37).


    ***Listing 9-37.** HQL with Named Parameters*


    `// query for an Album by title`

    `def album = Album.find(''from Album as a where a.title = :theTitle'',`

    `                        [theTitle:''Odelay''])`


    Notice how you use the colon character directly before the named parameter `:theTitle`.
    Then instead of passing a list as the final argument to the `find` method, you
    pass a map where the keys in the map match the named parameters in the query.


    The methods `find` and `findAll` assume the query is a query specific to the `Album`
    class and will validate that this is so. It is possible, however, to execute other
    HQL queries via the `executeQuery` method, as shown in [Listing 9-38](#Chapter09.html#list_9_38).


    ***Listing 9-38.** HQL via executeQuery*


    `// get all the songs`

    `def songs = Album.executeQuery(''select elements(b.songs) from Album as a'')`


    Clearly, there is a lot to learn about HQL, since it is possible to perform more
    advanced queries using joins, aggregate functions, and subqueries. Luckily, the
    documentation on the Hibernate web site is an excellent overview of what is possible
    and can help you on your way.'
  trans: '

    ##### 子查询与函数


    `where` 查询的一个高级用法是使用子查询。在撰写本文时，子查询只能用于任何布尔表达式的右侧。请参考代码清单 9-29。


    ***代码清单 9-29.** 使用子查询*


    `def longSongs = Song.where {`

    `    duration > avg(duration)`

    `}`


    代码清单 9-29 中的查询返回所有时长大于平均值的歌曲。这是通过在表达式右侧使用 `avg` 子查询实现的。更复杂的示例见代码清单 9-30。


    ***代码清单 9-30.** 使用更复杂的子查询*


    `def longRockSongs = Song.where {`

    `    genre == "Rock" && duration > avg(duration).of { genre == "Rock" }`

    `}`


    在这个例子中，`avg` 子查询用于查找所有时长大于摇滚歌曲平均时长的摇滚歌曲。为了实现这个查询，在 `avg` 函数的结果上调用了 `of` 函数。`of`
    函数接受一个闭包，该闭包可以包含进一步的布尔表达式。表 9-3 提供了可用子查询的完整列表。


    ![Image](img/tab_9_3.jpg)


    `property` 子查询值得特别一提；它与 `avg` 子查询不同，`avg` 子查询返回单个值，而 `property` 子查询返回一个值列表。代码清单
    9-31 展示了使用 `property` 子查询的示例。


    ***代码清单 9-31.** 使用 property 子查询*


    `def query = Song.where {`

    `    duration < property(duration)`

    ` }`


    代码清单 9-31 中的查询与之前在代码清单 9-27 中看到的查询有显著不同，因为它将时长与*所有*其他属性的时长进行比较。由于这不太可能高效，`property`
    子查询通常与 `of` 函数结合使用，以限制比较的属性数量。示例如代码清单 9-32 所示。


    ***代码清单 9-32.** 将 property 子查询与 of 函数结合使用*


    `def query = Song.where {`

    `    duration < property(duration).of { genre == "Rock" }`

    ` }`


    你可能已经从各个示例中注意到，被查询的属性名应始终位于布尔表达式的左侧。然而，还有一些额外的函数可以应用于被查询的属性。表 9-4 列出了这些函数。


    ![Image](img/tab_9_4.jpg)


    截至撰写本文时，表 9-4 中的函数只能用于表达式的左侧。换句话说，它们应该包围属性名。代码清单 9-33 给出了一个获取 2012 年所有专辑的示例。


    ***代码清单 9-33.** 在属性上使用函数*


    `def query = Album.where {`

    `    year(dateCreated) == 2012`

    `}`


    #### 按示例查询


    条件查询的另一种替代方案是将你要查找的类的实例传递给 `find` 或 `findAll` 方法。当与 Groovy 为 JavaBeans 提供的额外隐式构造函数结合使用时，这是一个有趣的选择，如代码清单
    9-34 所示。


    ***代码清单 9-34.** 按示例查询*


    `def album = Album.find( new Album(title:''Odelay'') )`


    从代码清单 9-15 可以看出，`find` 方法使用传入的 `Album` 实例上设置的属性来构建查询。按示例查询有些局限，因为在传入示例时，你无法使用一些更高级的表达式，例如
    `Like`、`Between` 和 `GreaterThan`。不过，它仍然是你的工具箱中另一个有用的补充。


    #### HQL 和 SQL


    另一种执行查询的方式是通过 Hibernate 查询语言（HQL），这是一种灵活的、面向对象的 SQL 替代方案。对 HQL 的全面讨论超出了本书的范围；不过，Hibernate
    文档对此有出色的介绍（[`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/queryhql.html`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/queryhql.html)）。我们将通过一些内置方法，了解
    GORM 如何支持 HQL 的基本示例。


    熟悉 SQL 的人应该不难适应 HQL，因为它们的语法差异很小。GORM 提供了三种处理 HQL 查询的方法：`find`、`findAll` 和 `executeQuery`。每个方法在接收到字符串参数时，都会将其视为
    HQL 查询。代码清单 9-35 中的示例展示了与 `findAll` 结合的最基本用法。


    ***代码清单 9-35.** 通过 findAll 方法使用 HQL*


    `// 查询所有专辑`

    `def allAlbums = Album.findAll(''from com.g2one.gtunes.Album'')`


    此外，通过将列表作为第二个参数传递，还支持 JDBC 风格的 `IN` 参数（带有问号 [?] 占位符的查询）。得益于 Groovy 用于表达列表的简洁语法，结果非常易读，如代码清单
    9-36 所示。


    ***代码清单 9-36.** 带位置参数的 HQL*


    `// 按标题查询专辑`

    `def album = Album.find(`

    `''from Album as a where a.title = ?'', [''Odelay''])`


    如果位置参数不是你的首选，你也可以使用命名参数，语法如代码清单 9-37 所示。


    ***代码清单 9-37.** 带命名参数的 HQL*


    `// 按标题查询专辑`

    `def album = Album.find(''from Album as a where a.title = :theTitle'',`

    `                        [theTitle:''Odelay''])`


    注意，在命名参数 `:theTitle` 之前直接使用了冒号字符。然后，不是将列表作为 `find` 方法的最后一个参数传递，而是传递一个映射，其中映射的键与查询中的命名参数匹配。


    `find` 和 `findAll` 方法假定查询是针对 `Album` 类的特定查询，并将验证这一点。然而，也可以通过 `executeQuery` 方法执行其他
    HQL 查询，如代码清单 9-38 所示。


    ***代码清单 9-38.** 通过 executeQuery 使用 HQL*


    `// 获取所有歌曲`

    `def songs = Album.executeQuery(''select elements(b.songs) from Album as a'')`


    显然，关于 HQL 有很多需要学习的地方，因为可以使用连接、聚合函数和子查询来执行更高级的查询。幸运的是，Hibernate 网站上的文档是对其功能范围的极好概述，可以帮助你入门。

