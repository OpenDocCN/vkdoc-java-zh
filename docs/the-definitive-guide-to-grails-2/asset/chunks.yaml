    `AlbumArtService` 中，但更好的做法可能是将该属性值的定义外部化到配置文件中。您可以使用一种称为*属性覆盖配置*的技术，在 `grails-app/conf/Config.groovy`
    中指定此属性的值。Grails 中的每个服务都会转换为一个 Spring bean。bean 的名称是根据 bean 约定从类名推导出来的。因此，`AlbumArtService`
