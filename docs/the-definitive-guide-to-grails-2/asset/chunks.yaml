- fmt: "### Ajax in Action\n\nLet’s start with a simple example. Grails provides a\
    \ set of tags that simplify the creation of such Ajax-capable components as links,\
    \ forms, and text fields. For example, to create an HTML anchor tag that, when\
    \ clicked, executes an Ajax call, you can use the `<g:remoteLink>` tag. These\
    \ tags, included in Grails since very early versions, are still included, but\
    \ for most cases the provided tags are not optimal. The tags were developed before\
    \ jQuery and similar libraries developed to a point where writing the JavaScript\
    \ really became the right thing to do. The examples shown here will show how to\
    \ use jQuery to accomplish the same tasks that the Ajax-enabled tags provide.\
    \ Let’s try a “Hello World”–style example using jQuery. First update `StoreController`\
    \ by adding the action shown in [Listing 8-1](#Chapter08.html#list_8_1).\n\n***Listing\
    \ 8-1.** An Action That Renders the Date and Time*\n\n```\ndef showTime() {\n\
    \    render \"The time is ${new Date()}\"\n}\n```\n\nThe `showTime` action in\
    \ [Listing 8-1](#Chapter08.html#list_8_1) uses the `render` method, introduced\
    \ in [Chapter 4](#Chapter04.html#ch4), to render a plain-text response to the\
    \ client that contains the current date and time, trivially obtained through Java’s\
    \ `java.util.Date` class. That was simple enough; now open the `index.gsp` file\
    \ located in the `grails-app/views/store` directory. In order to write your own\
    \ Ajax in the page, you need to tell Grails which Ajax library to use. You can\
    \ do this through the `<g:javascript>` tag, which needs to go in the `<head>`\
    \ section of your `index.gsp` file, as shown in [Listing 8-2](#Chapter08.html#list_8_2).\n\
    \n***Listing 8-2.** Using the jQuery Library*\n\n```\n<g:javascript library=\"\
    jquery\" />\n```\n\nIn this case, you are telling Grails to use the jQuery library\
    \ for Ajax. As a side effect, Grails will import all the necessary jQuery dependencies\
    \ into the page, so you’re ready to go. Now, within the body of the `index.gsp`\
    \ page, add the code shown in [Listing 8-3](#Chapter08.html#list_8_3), which uses\
    \ jQuery’s api.\n\n***Listing 8-3.** Using the jQuery Ajax Function*\n\n```\n\
    <g:link action=\"showTime\" elementId=\"timeLink\">Show the time!</g:link>\n<div\
    \ id=\"time\">\n</div>\n<r:script>\n   $('#timeLink').click(function() {\n   \
    \   $('#time').load(this.href); return false;\n   });\n</r:script>\n```\n\nWhat\
    \ this does is add an HTML anchor tag (with the text “`Show the time!`”) to the\
    \ page, which when clicked will execute an asynchronous request to the `showTime`\
    \ action of the `StoreController`. The jQuery code will be executed when the link\
    \ is clicked. That code will will initiate an Ajax request to the `showTime` action\
    \ and will use the response to update the DOM in the browser. In this case, you’ve\
    \ provided an HTML `<div>` element with an `id` of time just below the anchor\
    \ tag. That div will be updated with the response of this Ajax call. It is important\
    \ that the JavaScript function return `false` in order to prevent the browser\
    \ from actually following the link. Following the link is not necessary as the\
    \ Ajax call is going to accomplish the desired behavior here.\n\nNotice that the\
    \ JavaScript code is all wrapped in the `<r:script>` tag provided by the resources\
    \ plug-in. By using the script tag, the JavaScript will always be loaded last\
    \ on the page, thus optimizing page loading time.\n\nWith that, you have completed\
    \ a trivial example of Ajax-enabling your application. Try clicking the link to\
    \ see what happens. Note that the current date and time gets placed into the `<div>`\
    \ each time you click the link! [Figure 8-1](#Chapter08.html#fig_8_1) shows an\
    \ example of this behavior.\n\n![Image](images/9781430243779_Fig08-01.jpg)\n\n\
    ***Figure 8-1.** A Simple Ajax call example*\n\n### Changing Your Ajax Provider\n\
    \nAs it stands, you are using jQuery as the underlying library for the Ajax code.\
    \ Indeed, jQuery is the default JavaScript library for Grails applications because\
    \ it’s a really powerful library—but what if you wanted to use a different library?\
    \ With Grails it’s very easy to swap to a different implementation via its plug-in\
    \ system. For example, say you wanted to use the Prototype plug-in instead of\
    \ jQuery. Simply modify `BuildConfig.groovy` to include a dependency on the plug-in:\n\
    \n```\n// grails-app/conf/BuildConfig.groovy\ngrails.project.dependency.resolution\
    \ = {\n\n   ...\n\n    plugins {\n        runtime \":prototype:1.0\"\n       \
    \ ...\n    }\n}\n```\n\nNow modify the `<g:javascript>` tag, changing the value\
    \ of the `library` attribute to `prototype`:\n\n```\n<g:javascript library=\"\
    prototype\" />\n```\n\nIn order for that to work, the jQuery JavaScript code would\
    \ need to be rewritten to use the Prototype API. In addition to Prototype, there\
    \ are plug-ins for Dojo, Ext-JS, and Yahoo UI. The Grails plug-ins page ([`http://grails.org/Plugins`](http://grails.org/Plugins))\
    \ provides the latest up-to-date information on the available plug-ins. While\
    \ Grails makes it easy for you to specify which JavaScript library you would like\
    \ to use, swapping different implementations in and out can be tedious work, as\
    \ most of the JavaScript in the application will be dependent on a particular\
    \ JavaScript implementation."
  raw: '### Ajax in Action


    Let’s start with a simple example. Grails provides a set of tags that simplify
    the creation of such Ajax-capable components as links, forms, and text fields.
    For example, to create an HTML anchor tag that, when clicked, executes an Ajax
    call, you can use the `<g:remoteLink>` tag. These tags, included in Grails since
    very early versions, are still included, but for most cases the provided tags
    are not optimal. The tags were developed before jQuery and similar libraries developed
    to a point where writing the JavaScript really became the right thing to do. The
    examples shown here will show how to use jQuery to accomplish the same tasks that
    the Ajax-enabled tags provide. Let’s try a “Hello World”–style example using jQuery.
    First update StoreController by adding the action shown in [Listing 8-1](#Chapter08.html#list_8_1).


    ***Listing 8-1.** An Action That Renders the Date and Time*


    `def showTime() {`

    `    render "The time is ${new Date()}"`

    `}`


    The `showTime` action in [Listing 8-1](#Chapter08.html#list_8_1) uses the `render`
    method, introduced in [Chapter 4](#Chapter04.html#ch4), to render a plain-text
    response to the client that contains the current date and time, trivially obtained
    through Java’s `java.util.Date` class. That was simple enough; now open the `index.gsp`
    file located in the `grails-app/views/store` directory. In order to write your
    own Ajax in the page, you need to tell Grails which Ajax library to use. You can
    do this through the `<g:javascript>` tag, which needs to go in the `<head>` section
    of your `index.gsp` file, as shown in [Listing 8-2](#Chapter08.html#list_8_2).


    ***Listing 8-2.** Using the jQuery Library*


    `<g:javascript library="jquery" />`


    In this case, you are telling Grails to use the jQuery library for Ajax. As a
    side effect, Grails will import all the necessary jQuery dependencies into the
    page, so you’re ready to go. Now, within the body of the `index.gsp` page, add
    the code shown in [Listing 8-3](#Chapter08.html#list_8_3), which uses jQuery’s
    api.


    ***Listing 8-3.** Using the jQuery Ajax Function*


    `<g:link action="showTime" elementId="timeLink">Show the time!</g:link>`

    `<div id="time">`

    `</div>`

    `<r:script>`

    `   $(''#timeLink'').click(function() {`

    `      $(''#time'').load(this.href); return false;`

    `   });`

    `</r:script>`


    What this does is add an HTML anchor tag (with the text “`Show the time!`”) to
    the page, which when clicked will execute an asynchronous request to the `showTime`
    action of the `StoreController`. The jQuery code will be executed when the link
    is clicked. That code will will initiate an Ajax request to the `showTime` action
    and will use the response to update the DOM in the browser. In this case, you’ve
    provided an HTML `<div>` element with an `id` of time just below the anchor tag.
    That div will be updated with the response of this Ajax call. It is important
    that the JavaScript function return `false` in order to prevent the browser from
    actually following the link. Following the link is not necessary as the Ajax call
    is going to accomplish the desired behavior here.


    Notice that the JavaScript code is all wrapped in the `<r:script>` tag provided
    by the resources plug-in. By using the script tag, the JavaScript will always
    be loaded last on the page, thus optimizing page loading time.


    With that, you have completed a trivial example of Ajax-enabling your application.
    Try clicking the link to see what happens. Note that the current date and time
    gets placed into the `<div>` each time you click the link! [Figure 8-1](#Chapter08.html#fig_8_1)
    shows an example of this behavior.


    ![Image](images/9781430243779_Fig08-01.jpg)


    ***Figure 8-1.** A Simple Ajax call example*


    ### Changing Your Ajax Provider


    As it stands, you are using jQuery as the underlying library for the Ajax code.
    Indeed, jQuery is the default JavaScript library for Grails applications because
    it’s a really powerful library—but what if you wanted to use a different library?
    With Grails it’s very easy to swap to a different implementation via its plug-in
    system. For example, say you wanted to use the Prototype plug-in instead of jQuery.
    Simply modify `BuildConfig.groovy` to include a dependency on the plug-in:


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`


    `   ...`


    `    plugins {`

    `        runtime ":prototype:1.0"`

    `        ...`

    `    }`

    `}`


    Now modify the `<g:javascript>` tag, changing the value of the `library` attribute
    to `prototype`:


    `<g:javascript library="prototype" />`


    In order for that to work, the jQuery JavaScript code would need to be rewritten
    to use the Prototype API. In addition to Prototype, there are plug-ins for Dojo,
    Ext-JS, and Yahoo UI. The Grails plug-ins page ([`http://grails.org/Plugins`](http://grails.org/Plugins))
    provides the latest up-to-date information on the available plug-ins. While Grails
    makes it easy for you to specify which JavaScript library you would like to use,
    swapping different implementations in and out can be tedious work, as most of
    the JavaScript in the application will be dependent on a particular JavaScript
    implementation.'
  trans: '

    ### Ajax 实战


    让我们从一个简单的例子开始。Grails 提供了一组标签，用于简化创建支持 Ajax 的组件，如链接、表单和文本字段。例如，要创建一个点击时执行 Ajax
    调用的 HTML 锚点标签，你可以使用 `<g:remoteLink>` 标签。这些标签从 Grails 早期版本就包含在内，至今仍被保留，但在大多数情况下，所提供的标签并非最优方案。这些标签是在
    jQuery 及类似库发展到真正适合编写 JavaScript 的阶段之前开发的。这里展示的例子将演示如何使用 jQuery 来完成与 Ajax 标签相同的任务。让我们尝试一个使用
    jQuery 的“Hello World”风格示例。首先，通过添加清单 8-1 中所示的操作来更新 `StoreController`。


    ***清单 8-1.** 一个渲染日期和时间的操作*


    `def showTime() {`

    `    render "The time is ${new Date()}"`

    `}`


    清单 8-1 中的 `showTime` 操作使用了第 4 章中介绍的 `render` 方法，向客户端渲染一个包含当前日期和时间的纯文本响应，该日期和时间通过
    Java 的 `java.util.Date` 类轻松获取。这非常简单；现在打开位于 `grails-app/views/store` 目录下的 `index.gsp`
    文件。为了在页面中编写你自己的 Ajax 代码，你需要告诉 Grails 使用哪个 Ajax 库。你可以通过 `<g:javascript>` 标签来实现，该标签需要放在
    `index.gsp` 文件的 `<head>` 部分，如清单 8-2 所示。


    ***清单 8-2.** 使用 jQuery 库*


    `<g:javascript library="jquery" />`


    在这种情况下，你告诉 Grails 使用 jQuery 库来处理 Ajax。作为副作用，Grails 会将所有必要的 jQuery 依赖项导入到页面中，这样你就可以直接使用了。现在，在
    `index.gsp` 页面的 `<body>` 部分，添加清单 8-3 中所示的代码，该代码使用了 jQuery 的 API。


    ***清单 8-3.** 使用 jQuery Ajax 函数*


    `<g:link action="showTime" elementId="timeLink">Show the time!</g:link>`

    `<div id="time">`

    `</div>`

    `<r:script>`

    `   $(''#timeLink'').click(function() {`

    `      $(''#time'').load(this.href); return false;`

    `   });`

    `</r:script>`


    这段代码的作用是向页面添加一个 HTML 锚点标签（文本为“`Show the time!`”），点击该标签将向 `StoreController` 的 `showTime`
    操作发起一个异步请求。当链接被点击时，jQuery 代码将被执行。该代码将向 `showTime` 操作发起一个 Ajax 请求，并使用响应来更新浏览器中的
    DOM。在这个例子中，你在锚点标签下方提供了一个 `id` 为 `time` 的 HTML `<div>` 元素。该 div 将使用此 Ajax 调用的响应进行更新。重要的是，JavaScript
    函数必须返回 `false`，以防止浏览器实际跟随该链接。跟随链接是不必要的，因为 Ajax 调用将在此处实现所需的行为。


    请注意，JavaScript 代码全部包裹在资源插件提供的 `<r:script>` 标签中。通过使用 script 标签，JavaScript 将始终在页面最后加载，从而优化页面加载时间。


    至此，你已经完成了一个为应用程序启用 Ajax 的简单示例。尝试点击链接看看会发生什么。请注意，每次点击链接时，当前的日期和时间都会被放入 `<div>`
    中！图 8-1 展示了这种行为的一个示例。


    ![Image](img/9781430243779_Fig08-01.jpg)


    ***图 8-1.** 一个简单的 Ajax 调用示例*


    ### 更换 Ajax 提供者


    目前，你正在使用 jQuery 作为 Ajax 代码的底层库。确实，jQuery 是 Grails 应用程序的默认 JavaScript 库，因为它是一个非常强大的库——但如果你想使用不同的库呢？使用
    Grails，通过其插件系统可以非常轻松地切换到不同的实现。例如，假设你想使用 Prototype 插件而不是 jQuery。只需修改 `BuildConfig.groovy`
    以包含对该插件的依赖：


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`


    `   ...`


    `    plugins {`

    `        runtime ":prototype:1.0"`

    `        ...`

    `    }`

    `}`


    现在修改 `<g:javascript>` 标签，将 `library` 属性的值改为 `prototype`：


    `<g:javascript library="prototype" />`


    为了使它正常工作，jQuery JavaScript 代码需要重写以使用 Prototype API。除了 Prototype，还有用于 Dojo、Ext-JS
    和 Yahoo UI 的插件。Grails 插件页面（[`http://grails.org/Plugins`](http://grails.org/Plugins)）提供了关于可用插件的最新信息。虽然
    Grails 让你可以轻松指定想要使用的 JavaScript 库，但来回切换不同的实现可能是一项繁琐的工作，因为应用程序中的大部分 JavaScript
    代码都依赖于特定的 JavaScript 实现。

