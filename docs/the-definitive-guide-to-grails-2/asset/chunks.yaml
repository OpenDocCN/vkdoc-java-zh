    `    // 插件所适用的 Grails 版本`

    `    def grailsVersion = "2.0 > *"`

    `    // 该插件所依赖的其他插件`

    `    def dependsOn = [:]`

    `    // 从插件打包中排除的资源`

    `    def pluginExcludes = [`

    `        "grails-app/views/error.gsp"`

    `    ]`


    `    // TODO 填写这些字段`

    `    def title = "Simple Cache Plugin" // 插件的标题显示名称`

    `    def author = "Your name"`

    `    def authorEmail = ""`

    `    def description = ''''''\`

    `插件的简要摘要/描述。`

    `''''''`


    `    // 插件文档的 URL`

    `    def documentation = "http://grails.org/plugin/simple-cache"`

    `    ...`

    `}`


    当插件发布到 Grails 插件仓库时，诸如 `author`、`title` 等属性会出现在 `list-plugins` 和 `plugin-info`
    命令的输出中。以下列表总结了可用的属性及其含义：


    > *   `author`：插件作者的姓名

