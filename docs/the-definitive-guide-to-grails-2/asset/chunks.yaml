    Let’s start with `Album`. If you recall from the domain model, an `Album` has
    a `title`, release `year`, `genre`, `artist`, and a list of `Song`s that apply
    to that album. To begin with, create a template that can render that information.
    [Listing 8-14](#Chapter08.html#list_8_14) shows the `grails-app/views/album/_album.gsp`
    template.


    ***Listing 8-14.** Implementing the _album.gsp Template*


    `<div id="album${album.id}" class="album">`

    `    <div class="albumDetails">`

    `                <div class="artistName">${artist.name}</div>`

    `                <div class="albumTitle">${album.title}</div>`

    `                <div class="albumInfo">`

