    \ shows a typical example of a Gant build script.\n\n***Listing 11-22.** An Example\
    \ of a Gant Build Script*\n\n```\ntargetDir = \"build\"\ntarget(clean:\"Cleans\
    \ any compiled sources\") {\ndelete(dir:targetDir) }\n\ntarget(compile:\"The compilation\
    \ task\") {\n    depends(clean)\n    mkdir(dir:\"$targetDir/classes\")\n    javac(srcdir:\"\
    src/java\",\n          destdir:\"$targetDir/classes\")\n}\ntarget(jar:\"Creates\
    \ a DAR file\")  {\n    jar(destfile:\"$targetDir/app.jar\",basedir:\"$targetDir/classes\"\
    )\n}\ntarget(dist:\"The default task\") {\n    depends(compile, jar)\n}\nsetDefaultTarget\
