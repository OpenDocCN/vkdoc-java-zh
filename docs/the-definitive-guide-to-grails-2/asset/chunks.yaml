- fmt: "### Building Relationships\n\nTypically an application is not made up of a\
    \ bunch of disconnected domain classes. More often, domain classes have relationships\
    \ to one another. Of course, not every domain class has a direct relationship\
    \ with every other domain class, but it is not common for a domain class to exist\
    \ in total isolation from any other domain class.\n\nGrails provides support for\
    \ several types of relationships between domain classes. In a one-to-one relationship\
    \ (the simplest type), each member of the relationship has a reference to the\
    \ other. The relationship represented in [Listing 3-16](#Chapter03.html#list_3_16)\
    \ is a bidirectional relationship.\n\n***Listing 3-16.** A One-to-One Relationship\
    \ Between a Car and an Engine*\n\n```\nclass Car {\n    Engine engine\n}\n\nclass\
    \ Engine {\n    Car car\n}\n```\n\nIn this model, clearly a `Car` has one `Engine`\
    \ and an `Engine` has one `Car`. The entities are peers in the relationship; there\
    \ is no real “owner.” Depending on application requirements, this might not be\
    \ exactly what you want. Often a relationship like this really does have an owning\
    \ side. Perhaps an `Engine` belongs to a `Car`, but a `Car` does not belong to\
    \ an `Engine`. Grails provides a mechanism for expressing a relationship like\
    \ that, and [Listing 3-17](#Chapter03.html#list_3_17) demonstrates how to specify\
    \ its owning side.\n\n***Listing 3-17.** An Engine Belongs to a Car*\n\n```\n\
    class Car {\n    Engine engine\n}\n\nclass Engine {\n    static belongsTo = [car:Car]\n\
    }\n```\n\nThe value of the `belongsTo` property in the `Engine` class is a `Map`.\
    \ The key in this map is “`car`”, and the value associated with that key is the\
    \ `Car` class. This property tells Grails that the `Car` is the owning side of\
    \ this relationship and that an `Engine` “belongs to” its owning `Car`. The key\
    \ in the map can be named anything—the name does not need to be the same as the\
    \ owning-class name. However, naming the key that way almost always makes sense.\
    \ That key represents the name of a property that will be added to the `Engine`\
    \ class, as well as representing the reference back to the owner. The `Engine`\
    \ class in [Listing 3-16](#Chapter03.html#list_3_16) has a property, `car`, of\
    \ type `Car`. When the `Car` and `Engine` classes are mapped to the relational\
    \ database, there will be a foreign key in the `CAR` table that references the\
    \ primary key in the `ENGINE` table. There may be cases where it is desirable\
    \ to have the foreign key go in the other direction. That is, you may want to\
    \ have a foreign key in the `ENGINE` table that references the primary key in\
    \ the `CAR` table. The way to do that is to define a `hasOne` property in the\
    \ `Car` class, as shown in [Listing 3-18](#Chapter03.html#list_3_18).\n\n***Listing\
    \ 3-18.** A Car hasOne Engine*\n\n```\nclass Car {\n    static hasOne = [engine:\
    \ Engine]\n}\n```\n\nYou might encounter situations where a relationship needs\
    \ an owning side, but the owned side of the relationship does not need a reference\
    \ back to its owner. Grails supports this type of relationship using the same\
    \ `belongsTo` property, except that the value is a `Class` reference instead of\
    \ a `Map`. With the approach used in [Listing 3-19](#Chapter03.html#list_3_19),\
    \ the `Engine` still belongs to its owning `Car`, but the `Engine` has no reference\
    \ back to its `Car`.\n\n***Listing 3-19.** An Engine Belongs to a Car but Has\
    \ No Reference to Its Owner*\n\n```\nclass Engine {\n    static belongsTo = Car\n\
    }\n```\n\nOne of the implications of having the `belongsTo` property in place\
    \ is that Grails will impose cascaded deletes. Grails knows that an `Engine` “belongs\
    \ to” its owning `Car`, so any time a `Car` is deleted from the database, its\
    \ `Engine` will be deleted as well.\n\nOne-to-many relationships are equally simple\
    \ to represent in Grails domain classes. Our gTunes application will require several\
    \ one-to-many relationships, including the relationship between an `Artist` and\
    \ its `Albums` and between an `Album` and its `Songs`. You might say that an artist\
    \ has many albums and an album has many songs. That “has many” relationship is\
    \ expressed in a domain class with the `hasMany` property (see [Listing 3-20](#Chapter03.html#list_3_20)).\n\
    \n***Listing 3-20.** The hasMany Property*\n\n```\nclass Artist {\n    String\
    \ name\n\n    static hasMany = [albums:Album]\n}\nclass Album {\n    String title\n\
    \n    static hasMany = [songs:Song]\n    static belongsTo = [artist:Artist]\n\
    }\n\nclass Song {\n    String title\n    Integer duration\n\n    static belongsTo\
    \ = Album\n}\n```\n\nIn [Listing 3-20](#Chapter03.html#list_3_20), an `Artist`\
    \ has many `Albums`, and an `Album` belongs to its owning `Artist`. An `Album`\
    \ also has a reference back to its owning `Artist`. An `Album` has many `Songs`,\
    \ and a `Song` belongs to its owning `Album`. However, a `Song` does not have\
    \ a reference back to its owning `Album`.\n\nThe value of the `hasMany` property\
    \ needs to be a `Map`. The keys in the map represent the names of collection properties\
    \ that will be added to the domain class, and the values associated with the keys\
    \ represent the types of objects that will be stored in the collection property.\
    \ The `Artist` class has a domain property, `albums`, that will be a collection\
    \ of `Album` objects. The default collection type that Grails will use is a `java.util.Set`,\
    \ which is an unordered collection. Where this is the desired behavior, you don’t\
    \ need to declare the property explicitly. Grails will inject the property for\
    \ you. If you need the collection to be a `List` or a `SortedSet`, you must explicitly\
    \ declare the property with the appropriate type, as shown in [Listing 3-21](#Chapter03.html#list_3_21).\n\
    \n***Listing 3-21.** The Album Class Has a SortedSet of Song Objects*\n\n```\n\
    class Album {\n    String title\n\n    static hasMany = [songs:Song]\n    static\
    \ belongsTo = [artist:Artist]\n\n    SortedSet songs\n}\n```\n\n![Image](images/square.jpg)\
    \ **Note** For this to work, the `Song` class must implement the `Comparable`\
    \ interface. This requirement isn’t specific to Grails; it’s how standard `SortedSet`\
    \ collections work in Java.\n\nA `Set` is a collection of unique objects, duplicates\
    \ are not allowed. A `List` is ordered. Hibernate has to manage all of that ordering\
    \ and uniqueness, which can be expensive in terms of performance. For example,\
    \ if an `Album` is updated with a new `Song` and the `Song` instances are being\
    \ stored in a `Set`, Hibernate has to go look at all of the `Song` instances that\
    \ are associated with this `Album` so it can figure out if the new one violates\
    \ uniqueness. In this particular case the problem may not be terribly significant\
    \ because an `Album` isn’t going to have really large numbers of `Songs` associated\
    \ with it. For relationships where the collection might have a large number of\
    \ elements, the problem gets more significant. To help manage situations like\
    \ these the relationship could use a Hibernate `Bag`. A `Bag` does not have to\
    \ impose uniqueness and does not have to maintain order so manipulating the contents\
    \ of a `Bag` involve potentially significantly fewer interactions with the database.\
    \ The way to take advantage of a `Bag` is to explicitly declare the collection\
    \ type as shown above in [Listing 3-19](#Chapter03.html#list_3_19) but use `java.util.Collection`\
    \ as the declared type of the collection."
