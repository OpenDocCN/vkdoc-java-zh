    `    artist artist2_`

    `        on this_.artist_id=artist2_.id`


    当然，静态的 `list()` 方法并非唯一需要连接查询来优化性能的情况。幸运的是，动态查找器、条件查询和 HQL 都可以用来执行连接。使用动态查找器时，你可以通过传递一个映射作为最后一个参数来使用
