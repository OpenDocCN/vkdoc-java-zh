  trans: '

    #### 缓存服务方法


    `AlbumArtService` 类中的 `getAlbumArt` 方法目前虽然可用，但仍有改进空间。当前实现的一个问题是效率低下。每次调用该方法时，都会向远程服务发送请求以获取某张专辑封面的
    URL。一个可行的优化方案是实现某种缓存机制：当请求特定专辑的封面时，先向远程服务获取相关封面 URL，然后将该 URL 缓存起来。这样，如果后续再次收到同一专辑封面的请求，就可以直接从本地缓存中获取
    URL，而无需再次调用远程服务——这将大幅提升效率。编写高效可靠的缓存机制可能很复杂。幸运的是，Grails 插件可以为你完成所有繁重的工作。


    你可以通过在 `grails-app/conf/BuildConfig.groovy` 中添加适当的依赖声明来安装缓存插件，如清单 10-7 所示。


    ***清单 10-7.** 声明对缓存插件的依赖*


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`

    `    // ...`

    `    plugins {`

    `        compile '':cache:1.0.0''`

    `        // ...`

    `    }`

    `}`


    安装插件后，你需要告知插件：对 `AlbumArtService` 类中 `getAlbumArt` 方法的所有调用都应被缓存。实现方式是用 `grails.plugin.cache.Cacheable`
    注解来标注该方法，如清单 10-8 所示。


    ***清单 10-8.** 为 getAlbumArt 方法添加缓存支持*


    `package com.gtunes`


    `// ...`

    `import grails.plugin.cache.Cacheable`


    `class AlbumArtService {`


    `    // ...`

    `    @Cacheable(''albumArt'')`

    `    def getAlbumArt(String artist, String album) {`

    `        // ...`

    `    }`

    `}`


    请注意，`Cacheable` 注解将 `albumArt` 作为参数传递。这表示与该方法关联的缓存名称。某些缓存可能被多个方法共享，而另一些则可能仅被一个方法使用。默认情况下，缓存的键将是传递给该方法的所有参数的联合，在本例中这正好符合需求。如果使用相同参数多次调用
    `getAlbumArt` 方法，则每张专辑只会向远程服务发起一次请求。


    缓存插件默认使用相对简单的内存映射进行存储。对于我们的演示应用来说，这已经足够，但更严苛的缓存需求则需要更复杂的缓存方案。主缓存插件有多个扩展，用于支持各种缓存实现。例如，有
    Redis 实现、Ehcache 实现和 Gemfire 实现。当你使用这些更复杂的实现时，应用程序中的基本用法保持不变，但配置细节会有所不同。


    我们目前仅以最基本的方式使用缓存插件，只利用了其一小部分功能。有关配置和使用缓存插件的更多信息，请参阅 [`http://grails.org/plugin/cache`](http://grails.org/plugin/cache)。


    #### 使用服务


    现在，`AlbumArtTagLib` 可以利用 `AlbumArtService` 中的 `getAlbumArt` 方法了。为此，`AlbumArtTagLib`
    需要定义 `albumArtService` 属性，然后在该属性上调用 `getAlbumArt` 方法，如清单 10-9 所示。


    ***清单 10-9.** 从 AlbumArtTagLib 调用 getAlbumArt 方法*


    `package com.gtunes`


    `class AlbumArtTagLib {`


    `    static namespace = "music"`


    `    def albumArtService`


    `    def albumArt = { attrs, body ->`

    `        def artist = attrs.remove(''artist'')?.toString()`

    `        def album = attrs.remove(''album'')?.toString()`

    `        def width = attrs.remove(''width'') ?: 200`

    `        if(artist && album) {`

    `            def albumArt = albumArtService.getAlbumArt(artist, album)`

    `            if(albumArt.startsWith("/")) {`

    `                albumArt = "${request.contextPath}${albumArt}"         `

    `            }`

    `            out << "<img width=\"$width\" src=\"${albumArt}\" border=\"0\""`

    `            attrs.each { k,v-> out << "$k=\"${v?.encodeAsHTML()}\" "}`

    `            out << "></img>"`

    `        }`

    `    }`

    `}`

