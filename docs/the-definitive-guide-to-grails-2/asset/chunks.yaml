    def json = response.json\ndef someAttributeValue = json.someAttribute\n```\n\n\
    我们的标签需要使用`RestBuilder`来调用服务以检索专辑封面URL，并从响应中提取`artworkUrl100`值。[清单8-19](#Chapter08.html#list_8_19)展示了该标签的完整工作版本。\n\
    \n***清单8-19.** `AlbumArtTagLib`*\n\n```\npackage com.gtunes\n\nimport grails.plugins.rest.client.RestBuilder\n\
