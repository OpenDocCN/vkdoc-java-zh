- fmt: "#### Step 4: Testing the Code\n\nThe preceding code is simple enough, but\
    \ even the simplest code shouldn’t go untested. Open the `StoreControllerTests`\
    \ test suite that was generated earlier inside the `test/unit` directory. [Listing\
    \ 1-8](#Chapter01.html#list_1_8) shows the contents of the `StoreControllerTests`\
    \ suite.\n\n***Listing 1-8.** The Generated StoreControllerTests Test Suite*\n\
    \n```\npackage gtunes\n\nimport grails.test.mixin.*\nimport org.junit.*\n\n/**\n\
    \ * See the API for {@link grails.test.mixin.web.ControllerUnitTestMixin} for\
    \ usage instructions\n */\n@TestFor(StoreController)\nclass StoreControllerTests\
    \ {\n\n    void testSomething() {\n       fail \"Implement me\"\n    }\n}\n```\n\
    \nGrails separates tests into “unit” and “integration” tests. Integration tests\
    \ bootstrap the whole environment, including the database; hence, they tend to\
    \ run more slowly. In addition, integration tests are typically designed to test\
    \ the interaction of a number of classes and therefore require a more complete\
    \ application before you can run them.\n\nUnit tests, on the other hand, are fast-running\
    \ tests, but they require extensive use of mocks and stubs. Stubs are classes\
    \ used in testing that mimic the real behavior of methods by returning arbitrary\
    \ hard-coded values. Mocks essentially do the same thing but exhibit a bit more\
    \ intelligence by having “expectations.” For example, a mock can specify that\
    \ it “expects” a given method to be invoked at least once—even ten times if required.\
    \ As we progress through the book, the difference between unit tests and integration\
    \ tests will become clearer.\n\nTo test the `StoreController` in its current state,\
    \ assert the value of the response that was sent to the user. A simple way of\
    \ doing this appears in [Listing 1-9](#Chapter01.html#list_1_9).\n\n***Listing\
    \ 1-9.** Testing the StoreController’s Index Action*\n\n```\npackage gtunes\n\n\
    import grails.test.mixin.*\nimport org.junit.*\n\n/**\n * See the API for {@link\
    \ grails.test.mixin.web.ControllerUnitTestMixin} for usage instructions\n */\n\
    @TestFor(StoreController)\nclass StoreControllerTests {\n\n    void testSomething()\
    \ {\n        controller.index()\n        assert 'Welcome to the gTunes store!'\
    \ == response.text\n    }\n}\n```\n\nWhat we’re doing here is using the built-in\
    \ testing capabilities of Grails to evaluate the content of the `response` object.\
    \ During a test run, Grails magically transforms the regular servlet `HttpServletResponse`\
    \ object into a Grails `MockHttpServletResponse`, which has helper properties,\
    \ such as `text`, that enable you to evaluate what happened as the result of a\
    \ call to the `render` method.\n\nNevertheless, don’t get too hung up about the\
    \ ins and outs of using this code just yet. The whole book will be littered with\
    \ examples; they will gradually ease you into becoming proficient at testing with\
    \ Grails.\n\n#### Step 5: Running the Tests\n\nTo run the tests and verify that\
    \ everything works as expected, you can use the `grails test-app` command. The\
    \ `test-app` command will execute all the tests in the application and output\
    \ the results to the `test/reports` directory. In addition, you can run only `StoreControllerTests`\
    \ by issuing the command `grails test-app StoreController`. [Listing 1-10](#Chapter01.html#list_1_10)\
    \ shows some typical output that results when the `grails test-app` command is\
    \ run.\n\n***Listing 1-10.** Running Tests with grails test-app*\n\n```\n| Completed\
    \ 1 unit test, 0 failed in 1107ms\n| Tests PASSED - view reports in target/test-reports\n\
    ```\n\nIf you want to review the reports, you’ll find XML, HTML, and plain-text\
    \ reports in the `test/reports` directory. [Figure 1-4](#Chapter01.html#fig_1_4)\
    \ shows what the generated HTML reports look like in a browser—they’re definitely\
    \ easier on the eye than the XML equivalent!\n\n![Image](images/9781430243779_Fig01-04.jpg)\n\
    \n***Figure 1-4.** Generated HTML test reports*\n\n#### Step 6: Running the Application\n\
    \nNow that you’ve tested your code, the final step is to see it in action. Do\
    \ this using the `grails run-app` command, which will start up a locally running\
    \ Grails server on port 8080 by default.\n\nGet Grails going by typing `grails\
    \ run-app` into the command prompt:\n\n```\n$ grails run-app\n```\n\nYou’ll notice\
    \ that Grails will start up and inform you of a URL you can use to access the\
    \ Grails instance (see [Listing 1-11](#Chapter01.html#list_1_11)).\n\n***Listing\
    \ 1-11.** Running an Application with run-app*\n\n```\n...\n| Server running.\
    \ Browse to http://localhost:8080/gTunes\n```\n\nIf you get a bind error, such\
    \ as the following one, it probably resulted from a port conflict: “Server failed\
    \ to start: java.net.BindException: Address already in use”.\n\nThis error typically\
    \ occurs if you already have another container, such as Apache Tomcat ([`http://tomcat.apache.org`](http://tomcat.apache.org)),\
    \ running on port 8080. You can work around this issue by running Grails on a\
    \ different port by passing the `server.port` argument and specifying an alternative\
    \ value:\n\n```\ngrails -Dserver.port=8087 run-app\n```\n\nIn the preceding case,\
    \ Grails will start up on port 8087 as expected. Barring any port conflicts, you\
    \ should have Grails up and running and ready to serve requests at this point.\
    \ Open your favorite browser and navigate to the URL prompted by the Grails `run-app`\
    \ command shown in [Listing 1-11](#Chapter01.html#list_1_11). You’ll be presented\
    \ with the Grails welcome page that looks something like [Figure 1-5](#Chapter01.html#fig_1_5).\n\
    \nThe welcome screen is (by default) rendered by a Groovy Server Pages (GSP) file\
    \ located at `web-app/index.gsp`, but you can fully customize the location of\
    \ this file through URL mappings (discussed in [Chapter 6](#Chapter06.html)).\n\
    \nAs [Figure 1-5](#Chapter01.html#fig_1_5) shows, the `StoreController` you created\
    \ earlier is one of those listed as available. Clicking the `StoreController`\
    \ link results in printing the “Welcome to the gTunes store!” message you implemented\
    \ earlier (see [Figure 1-6](#Chapter01.html#fig_1_6)).\n\n![Image](images/9781430243779_Fig01-05.jpg)\n\
    \n***Figure 1-5.** The standard Grails welcome page*\n\n![Image](images/9781430243779_Fig01-06.jpg)\n\
    \n***Figure 1-6.** StoreController prints a message.*"
