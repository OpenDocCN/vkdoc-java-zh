- fmt: "#### Plug-ins for Application Modularity\n\nAs well as making it possible\
    \ to extend the available APIs within a Grails application, plug-ins also provide\
    \ entire modules of application functionality. Many newcomers dismiss plug-ins\
    \ as purely for plug-in developers who are willing to jump into the core Grails\
    \ APIs, but in fact, plug-ins are an extremely effective way to modularize your\
    \ application. In this section, you’ll learn how to create an entire application\
    \ as a plug-in that can be installed into the gTunes application.\n\nTo keep things\
    \ simple, let’s tackle a very commonly demonstrated application in screencasts\
    \ and presentations around Grails: the blog. Yes, as with any self-respecting\
    \ modern web application, the gTunes application needs a blog, where the proprietors\
    \ of the gTunes store can make big announcements about new music, events, and\
    \ so on. Luckily, a simple blog isn’t too complicated; it takes about five minutes\
    \ to implement in Grails.\n\nThe first step is to run the `create-plugin` command\
    \ to make the blog plug-in:\n\n`$ grails create-plugin blog`\n\nThis will create\
    \ the `blog` plug-in and associated `BlogGrailsPlugin` descriptor. You can populate\
    \ the descriptor with some plug-in metadata. [Listing 12-38](#Chapter12.html#list_12_38)\
    \ shows a sample `blog` plug-in descriptor.\n\n**Listing 12-38.** Adding Metadata\
    \ to the blog Plug-in\n\n```\nclass BlogGrailsPlugin {\n    def version = 0.1\n\
    \    def author = \"Joe Someone\"\n    def authorEmail = \"joe@company.com\"\n\
    \    def title = \"A blogging plugin\"\n    def description = 'A plugin that provides\
    \ a blog facility'\n    ...\n}\n```\n\nNow it’s time to create a domain class\
    \ that models a blog post:\n\n`$ grails create-domain-class com.blog.Post`\n\n\
    Thinking about the `Post` domain class for a moment, it’s going to have the obvious\
    \ things like a title and a body, as well as a date posted. Putting this into\
    \ practice, [Listing 12-39](#Chapter12.html#list_12_39) shows the `Post` domain\
    \ class containing the necessary properties.\n\n**Listing 12-39.** The Post Domain\
    \ Class Package com.blog\n\n```\nclass Post {\n    String title\n    String body\n\
    \    Date dateCreated\n    Date lastUpdated\n    static constraints = {\n    \
    \    title blank:false\n        body type:\"text\", blank:false\n    }\n}\n```\n\
    \nNote that the `Post` domain class is using the property names `dateCreated`\
    \ and `lastUpdated` to take advantage of auto time stamping capabilities in Grails\
    \ that were first discussed in [Chapter 9](#Chapter09.html#ch9). With an appropriate\
    \ domain class in place, to help you get started, you can use scaffolding to quickly\
    \ generate a controller and views for the `Post` domain class:\n\n`$ grails generate-all\
    \ com.blog.Post`\n\nFor this first revision of the blog plug-in, you’re going\
    \ to support the creation of new entries only; hence, you can remove the generated\
    \ `edit`, `update`, and `delete` actions. In addition, you need to show only the\
    \ first five posts; therefore, you can use the `max` parameter to the static `list`\
    \ method of the `Post` class to specify that. [Listing 12-40](#Chapter12.html#list_12_40)\
    \ shows the full code for the `PostController`.\n\n**Listing 12-40.** The PostController\
    \ for the blog Plug-in\n\n```\npackage com.blog\n\nclass PostController {\n\n\
    \    // only allow the save action to be accessed via a POST request\n    static\
    \ allowedMethods = [save: 'POST']\n\n    def index() {\n        redirect(action:list,params:params)\n\
    \    }\n\n    def list() {\n        [ postList: Post.list( max:5) ]\n    }\n\n\
    \    def create() {\n        [post: new Post(params) ]\n    }\n\n    def save()\
    \ {\n        def post = new Post()\n        post.properties['title', 'body'] =\
    \ params\n        if(!post.hasErrors() && post.save()) {\n            flash.message\
    \ = \"Post ${post.id} created\"\n            redirect(action:list)\n        }\
    \ else {\n            render(view:'create',model:[post:post])\n        }\n   \
    \ }\n}\n```\n\nNow let’s move onto the views. In the case of the `blog` plug-in,\
    \ the `list.gsp` view is the most important, because it will be responsible for\
    \ showing each blog entry. However, the default scaffolding in Grails displays\
    \ the list view as a table, which is not very useful in this case. You can correct\
    \ that by modifying the `list.gsp` view to render a `_post.gsp` template instead.\
    \ [Listing 12-41](#Chapter12.html#list_12_41) shows the updated `list.gsp` code.\n\
    \n**Listing 12-41.** The blog Plug-in’s list.gsp View\n\n```\n<html>\n<head>\n\
    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\"/> <meta\
    \ name=\"layout\"\ncontent=\"${params.layout ?: 'main'}\" /> <title>Post List</title>\n\
    </head>\n<body>\n<div class=\"nav\">\n<span class=\"menuButton\">\n<g:link class=\"\
    create\" action=\"create\">New Post</g:link> </span> </div> <div class=\"blog\"\
    >\n<h1>${grailsApplication.config.blog.title ?: 'No Title'}</h1>\n<g:render plugin=\"\
    blog\"\ntemplate=\"post\" var=\"post\"\ncollection=\"${postList?.reverse()}\"\
    \ /> </div> </body> </html>\n```\n\nThere are a few key things to mention about\
    \ the `list.gsp` view in [Listing 12-41](#Chapter12.html#list_12_41). First, note\
    \ that when using the `<g:render>` tag to render a template in a plug-in view,\
    \ you *must* specify the plug-in that this template belongs to; otherwise, Grails\
    \ will attempt to resolve the template within the application it is installed\
    \ into. Second, take note of the usage of the `grailsApplication` variable to\
    \ specify the blog title:\n\n`<h1>${grailsApplication.config.blog.title ?: 'No\
    \ Title'}</h1>`\n\nHere the implicit `grailsApplication` object is used to read\
    \ a configuration setting from the `grails-app/conf/Config.groovy` file. If the\
    \ setting called `blog.title` is specified in `Config.groovy`, then the view will\
    \ use that. Hence, users of this plug-in are able to configure the blog to their\
    \ needs. An alternative approach to doing this would be to use the `<g:message>`\
    \ tag, in which case the plug-in user has to specify the message in the `grails-app/i18n/messages.properties`\
    \ file. The choice is up to you.\n\nFinally, take note of the HTML `<meta>` tag,\
    \ which dictates what layout the `list.gsp` uses:\n\n`<meta name=\"layout\" content=\"\
    ${params.layout ?: 'main'}\" />`\n\nIf there is a `layout` parameter within the\
    \ `params` object, this tag will use that parameter for the layout; otherwise,\
    \ it uses the `main` layout. The `main` layout will, of course, resolve to `grails-app/views/layouts/main.gsp`,\
    \ but why the decision to allow customization via a parameter? The idea here is\
    \ that the user of the plug-in can very easily customize the layout of the blog\
    \ through URL mappings. For example, consider the URL mapping in [Listing 12-42](#Chapter12.html#list_12_42).\n\
    \n**Listing 12-42.** Using a URL Mapping to Customize the blog Plug-in’s Layout\n\
    \n```\nclass BlogUrlMappings {\n    static mappings = {\n        '/blog'(controller:\
    \ 'post', action: 'list') {\n            layout = 'funky'\n        }\n    }\n\
    }\n```\n\nIf you add the URL mapping in [Listing 12-42](#Chapter12.html#list_12_42)\
    \ to your `grails-app/conf/BlogUrlMappings.groovy` file, users can go to the `/blog`\
    \ URL and have the `list` action of the `PostController` execute, which in turn\
    \ renders the `list.gsp` view. However, notice how a property called `layout`\
    \ is set inside the body of the closure passed to the URL mapping definition.\
    \ As you learned in [Chapter 6](#Chapter06.html#ch6), it is possible to pass parameters\
    \ in this way. The result is that for the `/blog` mapping, a layout called `grails-app/views/layouts/funky.gsp`\
    \ will be used instead! This is a pretty powerful pattern because it allows you\
    \ to apply a different layout simply by applying a new URL mapping to the same\
    \ controller and action.\n\nAs for the `_post.gsp` template used in the `<g:render>`\
    \ method of [Listing 12-41](#Chapter12.html#list_12_41), it is pretty simple and\
    \ just formats each `Post` instance appropriately. You can see the code for the\
    \ `_post.gsp` template in [Listing 12-43](#Chapter12.html#list_12_43)."
  raw: '#### Plug-ins for Application Modularity


    As well as making it possible to extend the available APIs within a Grails application,
    plug-ins also provide entire modules of application functionality. Many newcomers
    dismiss plug-ins as purely for plug-in developers who are willing to jump into
    the core Grails APIs, but in fact, plug-ins are an extremely effective way to
    modularize your application. In this section, you’ll learn how to create an entire
    application as a plug-in that can be installed into the gTunes application.


    To keep things simple, let’s tackle a very commonly demonstrated application in
    screencasts and presentations around Grails: the blog. Yes, as with any self-respecting
    modern web application, the gTunes application needs a blog, where the proprietors
    of the gTunes store can make big announcements about new music, events, and so
    on. Luckily, a simple blog isn’t too complicated; it takes about five minutes
    to implement in Grails.


    The first step is to run the `create-plugin` command to make the blog plug-in:


    `$ grails create-plugin blog`


    This will create the `blog` plug-in and associated `BlogGrailsPlugin` descriptor.
    You can populate the descriptor with some plug-in metadata. [Listing 12-38](#Chapter12.html#list_12_38)
    shows a sample `blog` plug-in descriptor.


    ***Listing 12-38.** Adding Metadata to the blog Plug-in*


    `class BlogGrailsPlugin {`

    `    def version = 0.1`

    `    def author = "Joe Someone"`

    `    def authorEmail = "joe@company.com"`

    `    def title = "A blogging plugin"`

    `    def description = ''A plugin that provides a blog facility''`

    `    ...`

    `}`


    Now it’s time to create a domain class that models a blog post:


    `$ grails create-domain-class com.blog.Post`


    Thinking about the `Post` domain class for a moment, it’s going to have the obvious
    things like a title and a body, as well as a date posted. Putting this into practice,
    [Listing 12-39](#Chapter12.html#list_12_39) shows the `Post` domain class containing
    the necessary properties.


    ***Listing 12-39.** The Post Domain Class Package com.blog*


    `class Post {`

    `    String title`

    `    String body`

    `    Date dateCreated`

    `    Date lastUpdated`

    `    static constraints = {`

    `        title blank:false`

    `        body type:"text", blank:false`

    `    }`

    `}`


    Note that the `Post` domain class is using the property names `dateCreated` and
    `lastUpdated` to take advantage of auto time stamping capabilities in Grails that
    were first discussed in [Chapter 9](#Chapter09.html#ch9). With an appropriate
    domain class in place, to help you get started, you can use scaffolding to quickly
    generate a controller and views for the `Post` domain class:


    `$ grails generate-all com.blog.Post`


    For this first revision of the blog plug-in, you’re going to support the creation
    of new entries only; hence, you can remove the generated `edit`, `update`, and
    `delete` actions. In addition, you need to show only the first five posts; therefore,
    you can use the `max` parameter to the static `list` method of the `Post` class
    to specify that. [Listing 12-40](#Chapter12.html#list_12_40) shows the full code
    for the `PostController`.


    ***Listing 12-40.** The PostController for the blog Plug-in*


    `package com.blog`


    `class PostController {`


    `    // only allow the save action to be accessed via a POST request`

    `    static allowedMethods = [save: ''POST'']`


    `    def index() {`

    `        redirect(action:list,params:params)`

    `    }`


    `    def list() {`

    `        [ postList: Post.list( max:5) ]`

    `    }`


    `    def create() {`

    `        [post: new Post(params) ]`

    `    }`


    `    def save() {`

    `        def post = new Post()`

    `        post.properties[''title'', ''body''] = params`

    `        if(!post.hasErrors() && post.save()) {`

    `            flash.message = "Post ${post.id} created"`

    `            redirect(action:list)`

    `        } else {`

    `            render(view:''create'',model:[post:post])`

    `        }`

    `    }`

    `}`


    Now let’s move onto the views. In the case of the `blog` plug-in, the `list.gsp`
    view is the most important, because it will be responsible for showing each blog
    entry. However, the default scaffolding in Grails displays the list view as a
    table, which is not very useful in this case. You can correct that by modifying
    the `list.gsp` view to render a `_post.gsp` template instead. [Listing 12-41](#Chapter12.html#list_12_41)
    shows the updated `list.gsp` code.


    ***Listing 12-41.** The blog Plug-in’s list.gsp View*


    `<html>`

    `<head>`

    `<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/> <meta name="layout"`

    `content="${params.layout ?: ''main''}" /> <title>Post List</title>`

    `</head>`

    `<body>`

    `<div class="nav">`

    `<span class="menuButton">`

    `<g:link class="create" action="create">New Post</g:link> </span> </div> <div
    class="blog">`

    `<h1>${grailsApplication.config.blog.title ?: ''No Title''}</h1>`

    `<g:render plugin="blog"`

    `template="post" var="post"`

    `collection="${postList?.reverse()}" /> </div> </body> </html>`


    There are a few key things to mention about the `list.gsp` view in [Listing 12-41](#Chapter12.html#list_12_41).
    First, note that when using the `<g:render>` tag to render a template in a plug-in
    view, you *must* specify the plug-in that this template belongs to; otherwise,
    Grails will attempt to resolve the template within the application it is installed
    into. Second, take note of the usage of the `grailsApplication` variable to specify
    the blog title:


    `<h1>${grailsApplication.config.blog.title ?: ''No Title''}</h1>`


    Here the implicit `grailsApplication` object is used to read a configuration setting
    from the `grails-app/conf/Config.groovy` file. If the setting called `blog.title`
    is specified in `Config.groovy`, then the view will use that. Hence, users of
    this plug-in are able to configure the blog to their needs. An alternative approach
    to doing this would be to use the `<g:message>` tag, in which case the plug-in
    user has to specify the message in the `grails-app/i18n/messages.properties` file.
    The choice is up to you.


    Finally, take note of the HTML `<meta>` tag, which dictates what layout the `list.gsp`
    uses:


    `<meta name="layout" content="${params.layout ?: ''main''}" />`


    If there is a `layout` parameter within the `params` object, this tag will use
    that parameter for the layout; otherwise, it uses the `main` layout. The `main`
    layout will, of course, resolve to `grails-app/views/layouts/main.gsp`, but why
    the decision to allow customization via a parameter? The idea here is that the
    user of the plug-in can very easily customize the layout of the blog through URL
    mappings. For example, consider the URL mapping in [Listing 12-42](#Chapter12.html#list_12_42).


    ***Listing 12-42.** Using a URL Mapping to Customize the blog Plug-in’s Layout*


    `class BlogUrlMappings {`

    `    static mappings = {`

    `        ''/blog''(controller: ''post'', action: ''list'') {`

    `            layout = ''funky''`

    `        }`

    `    }`

    `}`


    If you add the URL mapping in [Listing 12-42](#Chapter12.html#list_12_42) to your
    `grails-app/conf/BlogUrlMappings.groovy` file, users can go to the `/blog` URL
    and have the `list` action of the `PostController` execute, which in turn renders
    the `list.gsp` view. However, notice how a property called `layout` is set inside
    the body of the closure passed to the URL mapping definition. As you learned in
    [Chapter 6](#Chapter06.html#ch6), it is possible to pass parameters in this way.
    The result is that for the `/blog` mapping, a layout called `grails-app/views/layouts/``funky.gsp`
    will be used instead! This is a pretty powerful pattern because it allows you
    to apply a different layout simply by applying a new URL mapping to the same controller
    and action.


    As for the `_post.gsp` template used in the `<g:render>` method of [Listing 12-41](#Chapter12.html#list_12_41),
    it is pretty simple and just formats each `Post` instance appropriately. You can
    see the code for the `_post.gsp` template in [Listing 12-43](#Chapter12.html#list_12_43).'
  trans: '

    #### 用于应用模块化的插件


    除了能够扩展 Grails 应用中的可用 API 之外，插件还提供了完整的应用功能模块。许多新手认为插件只适用于那些愿意深入核心 Grails API 的插件开发者，但实际上，插件是实现应用模块化的一种极其有效的方式。在本节中，你将学习如何创建一个完整的应用作为插件，并将其安装到
    gTunes 应用中。


    为简单起见，让我们处理一个在 Grails 相关的截屏和演示中非常常见的应用：博客。是的，与任何有自尊的现代 Web 应用一样，gTunes 应用也需要一个博客，gTunes
    商店的运营者可以在其中发布关于新音乐、活动等重大公告。幸运的是，一个简单的博客并不太复杂；在 Grails 中实现它大约只需要五分钟。


    第一步是运行 `create-plugin` 命令来创建博客插件：


    `$ grails create-plugin blog`


    这将创建 `blog` 插件及其关联的 `BlogGrailsPlugin` 描述符。你可以用一些插件元数据填充该描述符。清单 12-38 展示了一个示例
    `blog` 插件描述符。


    ***清单 12-38.** 向博客插件添加元数据*


    `class BlogGrailsPlugin {`

    `    def version = 0.1`

    `    def author = "Joe Someone"`

    `    def authorEmail = "joe@company.com"`

    `    def title = "A blogging plugin"`

    `    def description = ''A plugin that provides a blog facility''`

    `    ...`

    `}`


    现在是时候创建一个对博客文章进行建模的领域类了：


    `$ grails create-domain-class com.blog.Post`


    思考一下 `Post` 领域类，它将包含一些显而易见的内容，比如标题和正文，以及发布日期。将其付诸实践，清单 12-39 展示了包含必要属性的 `Post`
    领域类。


    ***清单 12-39.** 包 com.blog 中的 Post 领域类*


    `class Post {`

    `    String title`

    `    String body`

    `    Date dateCreated`

    `    Date lastUpdated`

    `    static constraints = {`

    `        title blank:false`

    `        body type:"text", blank:false`

    `    }`

    `}`


    请注意，`Post` 领域类使用了属性名 `dateCreated` 和 `lastUpdated`，以利用 Grails 中的自动时间戳功能，该功能首次在第
    9 章中讨论过。有了合适的领域类，为了帮助你入门，你可以使用脚手架快速为 `Post` 领域类生成控制器和视图：


    `$ grails generate-all com.blog.Post`


    对于博客插件的第一个版本，你只打算支持创建新条目；因此，你可以删除生成的 `edit`、`update` 和 `delete` 操作。此外，你只需要显示前五篇文章；因此，你可以使用
    `Post` 类的静态 `list` 方法的 `max` 参数来指定这一点。清单 12-40 展示了 `PostController` 的完整代码。


    ***清单 12-40.** 博客插件的 PostController*


    `package com.blog`


    `class PostController {`


    `    // 仅允许通过 POST 请求访问 save 操作`

    `    static allowedMethods = [save: ''POST'']`


    `    def index() {`

    `        redirect(action:list,params:params)`

    `    }`


    `    def list() {`

    `        [ postList: Post.list( max:5) ]`

    `    }`


    `    def create() {`

    `        [post: new Post(params) ]`

    `    }`


    `    def save() {`

    `        def post = new Post()`

    `        post.properties[''title'', ''body''] = params`

    `        if(!post.hasErrors() && post.save()) {`

    `            flash.message = "Post ${post.id} created"`

    `            redirect(action:list)`

    `        } else {`

    `            render(view:''create'',model:[post:post])`

    `        }`

    `    }`

    `}`


    现在让我们转到视图。对于 `blog` 插件来说，`list.gsp` 视图是最重要的，因为它将负责显示每条博客条目。然而，Grails 中的默认脚手架将列表视图显示为表格，这在当前情况下不太有用。你可以通过修改
    `list.gsp` 视图来渲染一个 `_post.gsp` 模板来解决这个问题。清单 12-41 展示了更新后的 `list.gsp` 代码。


    ***清单 12-41.** 博客插件的 list.gsp 视图*


    `<html>`

    `<head>`

    `<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/> <meta name="layout"`

    `content="${params.layout ?: ''main''}" /> <title>Post List</title>`

    `</head>`

    `<body>`

    `<div class="nav">`

    `<span class="menuButton">`

    `<g:link class="create" action="create">New Post</g:link> </span> </div> <div
    class="blog">`

    `<h1>${grailsApplication.config.blog.title ?: ''No Title''}</h1>`

    `<g:render plugin="blog"`

    `template="post" var="post"`

    `collection="${postList?.reverse()}" /> </div> </body> </html>`


    关于清单 12-41 中的 `list.gsp` 视图，有几点关键内容需要提及。首先，请注意，当在插件视图中使用 `<g:render>` 标签渲染模板时，你*必须*指定该模板所属的插件；否则，Grails
    将尝试在其安装到的应用中解析该模板。其次，请注意使用 `grailsApplication` 变量来指定博客标题：


    `<h1>${grailsApplication.config.blog.title ?: ''No Title''}</h1>`


    这里，隐式的 `grailsApplication` 对象用于从 `grails-app/conf/Config.groovy` 文件中读取配置设置。如果在
    `Config.groovy` 中指定了名为 `blog.title` 的设置，那么视图将使用该设置。因此，该插件的用户能够根据自己的需求配置博客。另一种实现方式是使用
    `<g:message>` 标签，在这种情况下，插件用户需要在 `grails-app/i18n/messages.properties` 文件中指定消息。选择权在你手中。


    最后，请注意 HTML 的 `<meta>` 标签，它决定了 `list.gsp` 使用哪种布局：


    `<meta name="layout" content="${params.layout ?: ''main''}" />`


    如果 `params` 对象中存在 `layout` 参数，此标签将使用该参数作为布局；否则，它将使用 `main` 布局。当然，`main` 布局会解析为
    `grails-app/views/layouts/main.gsp`，但为什么要允许通过参数进行自定义呢？这里的想法是，插件的用户可以通过 URL 映射非常轻松地自定义博客的布局。例如，考虑清单
    12-42 中的 URL 映射。


    ***清单 12-42.** 使用 URL 映射自定义博客插件的布局*


    `class BlogUrlMappings {`

    `    static mappings = {`

    `        ''/blog''(controller: ''post'', action: ''list'') {`

    `            layout = ''funky''`

    `        }`

    `    }`

    `}`


    如果你将清单 12-42 中的 URL 映射添加到你的 `grails-app/conf/BlogUrlMappings.groovy` 文件中，用户就可以访问
    `/blog` URL，并执行 `PostController` 的 `list` 操作，进而渲染 `list.gsp` 视图。然而，请注意在传递给 URL
    映射定义的闭包体内设置了一个名为 `layout` 的属性。正如你在第 6 章中学到的，可以通过这种方式传递参数。结果是，对于 `/blog` 映射，将使用名为
    `grails-app/views/layouts/``funky.gsp` 的布局！这是一个非常强大的模式，因为它允许你通过将新的 URL 映射应用于相同的控制器和操作来应用不同的布局。


    至于清单 12-41 中 `<g:render>` 方法使用的 `_post.gsp` 模板，它非常简单，只是适当地格式化每个 `Post` 实例。你可以在清单
    12-43 中看到 `_post.gsp` 模板的代码。

    '
- fmt: "### Listing 12-43. The `_post.gsp` Template\n\n```\n<div id=\"post${post.id}\"\
    \ class=\"blogPost\"> <h2>${post.title}</h2> <div class=\"body\">\n${post.body}\
    \ </div>\n<div class=\"desc\">\nPosted on <g:formatDate date=\"${post.dateCreated}\"\
    \ format=\"dd MMMMMM yy\" /> </div>\n</div>\n```\n\nWith that, you have pretty\
    \ much completed the `list.gsp` view. [Figure 12-4](#Chapter12.html#fig_12_4)\
    \ shows what the `list.gsp` view looks like when you run the `blog` plug-in and\
    \ head off to the `list` action of the `PostController`.\n\n![Image](images/9781430243779_Fig12-04.jpg)\n\
    \n### Figure 12-4. The list view of the blog plug-in\n\nSince the view renders\
    \ each `Post` directly in the `list.gsp` view, the `show.gsp` view has been made\
    \ redundant and can be deleted. Also, for the first revision, you’re interesting\
    \ in creating new posts only, so `edit.gsp` can be deleted, too. You can always\
    \ add editing later!\n\nMoving on to the `create.gsp` view, it too could use a\
    \ little cleaning up. Also, it would be nice to provide a rich text–editing capability\
    \ for authoring the post. One of the plug-ins available for Grails is the `CKEditor`\
    \ plug-in, which adds support for CKEditor ([http://ckeditor.com](http://ckeditor.com)),\
    \ a rich text–editing component. To install the `CKEditor` plug-in into the `blog`\
    \ plug-in add the corresponding dependency in `BuildConfig.groovy`, as shown in\
    \ [Listing 12-44](#Chapter12.html#list_12_44).\n\n### Listing 12-44. Add a Dependency\
    \ to CKEditor\n\n```\ngrails.project.dependency.resolution = {\n\n    ...\n\n\
    \    plugins {\n        runtime \":ckeditor:3.6.3.0\"\n        ...\n    }\n}\n\
    ```\n\nWith that done, let’s enable CKEditor in `_form.gsp` by using the `<ckeditor:editor>`\
    \ tag provided by the `CKEditor` plug-in. [Listing 12-45](#Chapter12.html#list_12_45)\
    \ shows the updated `_form.gsp` file with the usage of the `<ckeditor:editor>`\
    \ tag highlighted in bold.\n\n### Listing 12-45. Using the CKEditor to Enable\
    \ Rich Text Editing\n\n```\n<%@ page import=\"com.blog.Post\" %>\n\n<div class=\"\
    fieldcontain ${hasErrors(bean: postInstance, field: 'title', 'error')} \">\n \
    \   <label for=\"title\">\n        <g:message code=\"post.title.label\" default=\"\
    Title\" />\n    </label>\n    <g:textField name=\"title\" value=\"${postInstance?.title}\"\
    \ />\n</div>\n\n<div class=\"fieldcontain ${hasErrors(bean: postInstance, field:\
    \ 'body', 'error')} \">\n    <ckeditor:editor name=\"body\" height=\"300\" width=\"\
    500\">\n        ${postInstance?.body}\n    </ckeditor:editor>\n</div>\n```\n\n\
    With the `<ckeditor:editor>` tag, you can specify that you want only a simple\
    \ toolbar with basic formatting options; otherwise, you’ll get a toolbar with\
    \ almost as many options as a word processor like Microsoft Word. The plug-in\
    \ documentation at [http://grails.org/plug-in/ckeditor](http://grails.org/plug-in/ckeditor)\
    \ covers all of the configuration options. [Figure 12-5](#Chapter12.html#fig_12_5)\
    \ shows the `create.gsp` view, with the `<ckeditor:editor>` tag doing the job\
    \ of rendering a rich text–editing component.\n\n![Image](images/9781430243779_Fig12-05.jpg)\n\
    \n### Figure 12-5. Creating a post with CKEditor\n\nOf course, both the `list.gsp`\
    \ and `create.gsp` pages currently look rather uninspiring, but it is up to the\
    \ application you install the `blog` plug-in into to provide useful style information\
    \ via CSS. Speaking of installing the `blog` plug-in into an application, it is\
    \ time to do exactly that! In the gTunes `BuildConfig.groovy` file, express a\
    \ dependency on the plug-in using the same technique used earlier to express a\
    \ dependency on the `album-art` plug-in, as shown in [Listing 12-46](#Chapter12.html#list_12_46).\n\
    \n### Listing 12-46. Installing the blog Plug-in into gTunes\n\n```\ngrails.plugin.location.blog='../blog'\n\
    ...\ngrails.project.dependency.resolution = {\n    ...\n}\n```\n\nRemember, the\
    \ `blog.title` setting allows you to customize the blog title; simply adding the\
    \ following setting to `Config.groovy` will do the trick:\n\n```\n// configuration\
    \ for the blog blog.title=\"The gTunes Weblog\"\n```\n\nRun the gTunes application\
    \ using the `run-app` command, and then navigate to the URL [http://localhost:8080/gTunes/post/list](http://localhost:8080/gTunes/post/list).\
    \ Like magic, you have the `blog` plug-in running inside the gTunes application\
    \ exactly as it was before—except that it is now taking advantage of the gTunes\
    \ application’s main layout. Clicking the New Post button will take you to the\
    \ `create.gsp` view you developed earlier. [Figure 12-6](#Chapter12.html#fig_12_6)\
    \ shows the CKEditor component running within the gTunes application.\n\n![Image](images/9781430243779_Fig12-06.jpg)\n\
    \n### Figure 12-6. Creating blog posts in the gTunes application\n\nIf you type\
    \ some content, including a title and body, and then hit the Post button, you’ll\
    \ be able to create new posts on the gTunes application blog, as shown in [Figure\
    \ 12-7](#Chapter12.html#fig_12_7).\n\n![Image](images/9781430243779_Fig12-07.jpg)\n\
    \n### Figure 12-7. A blog post in the gTunes application\n\nClearly, this is a\
    \ very basic blog plug-in at the moment, one with no support for RSS, comments,\
    \ calendars, archives, and all that jazz. However, as a demonstration of the concept\
    \ of using plug-ins to separate your application in reusable modules, it’s a perfect\
    \ example. A separate team of developers could happily work on the `blog` plug-in\
    \ and gradually integrate its functionality into the primary application over\
    \ time. You could even create an automated build, as you learned in [Chapter 11](#Chapter11.html#ch11),\
    \ to build and test all your plug-ins and install them into your main application\
    \ for integrating testing. So plug-ins are definitely worth a look, even if you\
    \ don’t intend to become an expert on Grails internals."
  raw: '***Listing 12-43.** The _post.gsp Template*


    `<div id="post${post.id}" class="blogPost"> <h2>${post.title}</h2> <div class="body">`

    `${post.body} </div>`

    `<div class="desc">`

    `Posted on <g:formatDate date="${post.dateCreated}" format="dd MMMMMM yy" /> </div>`

    `</div>`


    With that, you have pretty much completed the `list.gsp` view. [Figure 12-4](#Chapter12.html#fig_12_4)
    shows what the `list.gsp` view looks like when you run the `blog` plug-in and
    head off to the `list` action of the `PostController`.


    ![Image](images/9781430243779_Fig12-04.jpg)


    ***Figure 12-4.** The list view of the blog plug-in*


    Since the view renders each `Post` directly in the `list.gsp` view, the `show.gsp`
    view has been made redundant and can be deleted. Also, for the first revision,
    you’re interesting in creating new posts only, so `edit.gsp` can be deleted, too.
    You can always add editing later!


    Moving on to the `create.gsp` view, it too could use a little cleaning up. Also,
    it would be nice to provide a rich text–editing capability for authoring the post.
    One of the plug-ins available for Grails is the `CKEditor` plug-in, which adds
    support for CKEdit`or` ([`http://ckeditor.com`](http://ckeditor.com)), a rich
    text–editing component. To install the `CKEditor` plug-in into the `blog` plug-in
    add the corresponding dependency in `BuildConfig.groovy`, as shown in [Listing
    12-44](#Chapter12.html#list_12_44).


    ***Listing 12-44.** Add a Dependency to CKEditor*


    `grails.project.dependency.resolution = {`


    `    ...`


    `    plugins {`

    `        runtime ":ckeditor:3.6.3.0"`

    `        ...`

    `    }`

    `}`


    With that done, let’s enable CKEditor in `_form.gsp` by using the `<ckeditor:editor>`
    tag provided by the `CKEditor` plug-in. [Listing 12-45](#Chapter12.html#list_12_45)
    shows the updated `_form.gsp` file with the usage of the `<ckeditor:editor>` tag
    highlighted in bold.


    ***Listing 12-45.** Using the CKEditor to Enable Rich Text Editing*


    `<%@ page import="com.blog.Post" %>`


    `<div class="fieldcontain ${hasErrors(bean: postInstance, field: ''title'', ''error'')}
    ">`

    `    <label for="title">`

    `        <g:message code="post.title.label" default="Title" />`

    `    </label>`

    `    <g:textField name="title" value="${postInstance?.title}" />`

    `</div>`


    `<div class="fieldcontain ${hasErrors(bean: postInstance, field: ''body'', ''error'')}
    ">`

    **`    <ckeditor:editor name="body" height="300" width="500">`**

    **`        ${postInstance?.body}`**

    **`    </ckeditor:editor>`**

    `</div>`


    With the `<ckeditor:editor>` tag, you can specify that you want only a simple
    toolbar with basic formatting options; otherwise, you’ll get a toolbar with almost
    as many options as a word processor like Microsoft Word. The plug-in documentation
    at [`http://grails.org/plug-in/ckeditor`](http://grails.org/plug-in/ckeditor)
    covers all of the configuration options. [Figure 12-5](#Chapter12.html#fig_12_5)
    shows the `create.gsp` view, with the `<ckeditor:editor>` tag doing the job of
    rendering a rich text–editing component.


    ![Image](images/9781430243779_Fig12-05.jpg)


    ***Figure 12-5.** Creating a post with CKEditor*


    Of course, both the `list.gsp` and `create.gsp` pages currently look rather uninspiring,
    but it is up to the application you install the `blog` plug-in into to provide
    useful style information via CSS. Speaking of installing the `blog` plug-in into
    an application, it is time to do exactly that! In the gTunes `BuildConfig.groovy`
    file, express a dependency on the plug-in using the same technique used earlier
    to express a dependency on the `album-art` plug-in, as shown in [Listing 12-46](#Chapter12.html#list_12_46).


    ***Listing 12-46.** Installing the blog Plug-in into gTunes*


    `grails.plugin.location.blog=''../blog''`

    `...`

    `grails.project.dependency.resolution = {`

    `    ...`

    `}`


    Remember, the `blog.title` setting allows you to customize the blog title; simply
    adding the following setting to `Config.groovy` will do the trick:


    `// configuration for the blog blog.title="The gTunes Weblog"`


    Run the gTunes application using the `run-app` command, and then navigate to the
    URL [`http://localhost:8080/gTunes/post/list`](http://localhost:8080/gTunes/post/list).
    Like magic, you have the `blog` plug-in running inside the gTunes application
    exactly as it was before—except that it is now taking advantage of the gTunes
