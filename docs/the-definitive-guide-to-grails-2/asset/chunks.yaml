    `        def albumArtService = ctx.getBean("albumArtService")`

    `        application.controllerClasses*.metaClass*.getAlbumArt = { String artist,
    String album ->`

    `            return albumArtService.getAlbumArt(artist, album)`

    `        }`

    `    }`

    `}`


    Adding a `getArt()` method to the `Album` class is a little trickier, because
    the plug-in doesn’t know anything about the `Album` class. So to implement this
    enhancement, you’ll search the `GrailsApplication` instance for a domain class
    called `Album` and, if it exists, add the `getArt()` method to it. [Listing 12-35](#Chapter12.html#list_12_35)
    shows the modifications to the `doWithDynamicMethods` plug-in hook.


    ***Listing 12-35.** Adding a getAlbumArt Method to All Controllers*


    `class AlbumArtGrailsPlugin {`

    `  ...`

    `  def doWithDynamicMethods = { ctx ->`

    `    ...`

    `    def albumClass = application.domainClasses.find { it.shortName == ''Album''
    }`

    `    if(albumClass) {`

    `      albumClass.metaClass.getArt ={->`

    `        albumArtService.getAlbumArt(delegate.artist?.name,`

    `                                    delegate.title)`

    `      }`

    `    }`

    `  }`

    `}`


    Notice how within the body of the new `getArt` method you can use the closure
    `delegate` to obtain the `artist` and `title`. The `delegate` property of a closure,
    when used in this context, is equivalent to referring to `this` in a regular method.
    With the code in [Listing 12-35](#Chapter12.html#list_12_35) in place, you can
    now obtain the URL to an `Album` instance’s album art with the code shown in [Listing
    12-36](#Chapter12.html#list_12_36).


    ***Listing 12-36.** Using the getArt() Method to Obtain Album Art*


    `def album = Album.get(10)`

    `println "The art for this album is at ${album.art}"`


    Note that, in Groovy, methods that follow bean conventions are accessible via
    the property access notation, so the expression `album.art` is equivalent to `album.getArt()`.
