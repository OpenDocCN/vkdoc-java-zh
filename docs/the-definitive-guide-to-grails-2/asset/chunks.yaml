- fmt: "### Rendering GSP Templates\n\nA GSP template is a special GSP file that contains\
    \ only a fragment of a page. A GSP template can contain markup that is rendered\
    \ from various places in an application. In such a case, the template would facilitate\
    \ reuse. A template can be extracted from a page to simplify the containing page\
    \ by breaking it down into smaller, more manageable pieces. Whatever the reason\
    \ for isolating part of a page into a reusable template, Grails provides a really\
    \ simple mechanism for rendering the template.\n\nA template can contain just\
    \ about anything that might appear in a normal GSP. One thing that makes a template\
    \ special is its file name. GSP templates must be defined in a file whose name\
    \ begins with an underscore. For example, a template that represents a list of\
    \ albums might be defined in `grails-app/views/album/_albumList.gsp`.\n\nThe `render`\
    \ tag can be used in a GSP to render a GSP template. This tag accepts an attribute,\
    \ `template`, that represents the name of the template to be rendered. For example,\
    \ to render the template in the `grails-app/views/album/_albumList.gsp` file,\
    \ you would specify `/album/albumList` as the value of the `template` attribute\
    \ when calling the `render` tag, as shown in [Listing 5-37](#Chapter05.html#list_5_37).\n\
    \n***Listing 5-37.** Rendering the albumList Template*\n\n```\n<div id=\"artists\"\
    >\n<g:render template=\"/artist/artistList\"/>\n</div>\n```\n\nNotice that the\
    \ template file name contains an underscore but the name of the template does\
    \ not.\n\nRendering a template in a GSP is very much like taking the contents\
    \ of the GSP template and putting them inline in the containing GSP in place of\
    \ calling the `render` tag.\n\n[Figure 5-5](#Chapter05.html#fig_5_5) shows an\
    \ updated version of the gTunes application.\n\n![Image](images/9781430243779_Fig05-05.jpg)\n\
    \n***Figure 5-5.** Updated gTunes*\n\nNotice the three tabs across the top of\
    \ the screen representing the latest albums, latest songs, and newest artists.\
    \ The markup required to generate the contents of each tab would clutter the GSP.\
    \ Rather than embed the markup for those tabs in the `views/store/shop.gsp` file,\
    \ you can pull it all out into a series of templates and render them from `shop.gsp`.\
    \ Using templates to handle this will yield an application easier to maintain\
    \ than one with monolithic unmodular GSPs.\n\n[Listing 5-38](#Chapter05.html#list_5_38)\
    \ shows what those templates might look like.\n\n***Listing 5-38.** GSP Templates\
    \ for the Top Five Lists*\n\n```\n<!-- grails-app/views/artist/_artistList.gsp\
    \ -->\n<ul class=\"list\">\n    <g:each in=\"${artists?}\" var=\"artist\">\n \
    \       <li class=\"icon\">\n            <g:link controller=\"store\" action=\"\
    shop\">\n                <g:img dir=\"images/icons\" file=\"artist.png\" />\n\
    \                ${artist?.name}\n            </g:link>\n        </li>\n    </g:each>\n\
    </ul>\n\n<!-- grails-app/views/album/_albumList.gsp -->\n<ul class=\"list\">\n\
    \    <g:each in=\"${albums?}\" var=\"album\">\n          <li class=\"icon\">\n\
    \            <g:link controller=\"album\" action=\"show\" id=\"${album?.id}\"\
    >\n                <g:img dir=\"images/icons\" file=\"album.png\" />\n       \
    \         ${album.title}\n            </g:link>\n        </li>\n    </g:each>\n\
    </ul>\n\n<!-- grails-app/views/song/_songList.gsp -->\n<ul class=\"list\">\n \
    \   <g:each in=\"${songs?}\" var=\"song\">\n          <li class=\"icon\">\n  \
    \          <g:link controller=\"store\" action=\"shop\">\n                <g:img\
    \ dir=\"images/icons\" file=\"song.png\" />\n                ${song.title}\n \
    \           </g:link>\n        </li>\n    </g:each>\n</ul>\n```\n\n![Image](images/square.jpg)\
    \ **Note** These are very simple templates that render unordered lists of strings.\
    \ In [Chapter 8](#Chapter08.html) you will develop these templates to contain\
    \ some really slick Ajax-driven behavior. At that point, the value of knowing\
    \ how to isolate markup into templates will be even greater.\n\nNotice that each\
    \ template is iterating over a different collection (artists, albums, songs).\
    \ Those collections are data that must be passed into the template when the template\
    \ is rendered. The way to pass data into a GSP template is to specify an attribute,\
    \ `model`, when calling the `render` tag. The value of the `model` attribute should\
    \ be a map containing all the data being passed in to the template. [Listing 5-39](#Chapter05.html#list_5_39)\
    \ shows the templates being rendered from the `grails-app/views/store/shop.gsp`\
    \ and the appropriate data being passed to each.\n\n***Listing 5-39.** Rendering\
    \ Templates from shop.gsp*\n\n```\n<div id=\"top5Panel\" class=\"top5Panel\">\n\
    \  <ul id=\"tabs\" class=\"tabs clearfix\">\n    <li class=\"selected\"><a href=\"\
    #albums\">Latest Albums</a></li>\n    <li><a href=\"#songs\">Latest Songs</a></li>\n\
    \    <li><a href=\"#artists\">Newest Artists</a></li>\n  </ul>\n\n  <div id=\"\
    albums\" class=\"top5Item\">\n    <g:render template=\"/album/albumList\"\n  \
    \            model=\"[albums: top5Albums]\"></g:render>\n  </div>\n\n  <div id=\"\
    songs\" class=\"top5Item hide\">\n    <g:render template=\"/song/songList\"\n\
    \              model=\"[songs: top5Songs]\"></g:render>\n  </div>\n\n  <div id=\"\
    artists\" class=\"top5Item list hide\">\n    <g:render template=\"/artist/artistList\"\
    \n              model=\"[artists: top5Artists]\"></g:render>\n  </div>\n</div>\n\
    ```\n\nThe templates rendered here are `/album/albumList`, `/song/songList`, and\
    \ `/artist/artistList`. Each is a fully qualified reference to a template. When\
    \ a template name is fully qualified, the root refers to the `grails-app/views/`\
    \ directory; so `/artist/artistList` refers to the template defined in the `grails-app/views/artist/_artistList.gsp`\
    \ file. Template references may be defined with a relative path as well. Relative\
    \ template paths are paths that do not begin with a forward slash.\n\nFor example,\
    \ if instead of referring to `/artist/artistList`, the `shop.gsp` referred to\
    \ the relative `artistList` template, then Grails would look for the template\
    \ in the same directory where `shop.gsp` lives. Relative references can also include\
    \ a directory structure. If the `artistList` template were defined in `grails-app/views/store/myTemplates/_artistList.gsp`,\
    \ then the `grails-app/views/store/shop.gsp` page could refer to the template\
    \ as `myTemplates/artistList`, since the `myTemplates` directory is in the same\
    \ one as `shop.gsp`.\n\nEach of the calls to the earlier `render` tag includes\
    \ a map of data being passed as the `model` attribute. For `shop.gsp` to have\
    \ that data, the controller action that rendered `shop.gsp` needs to supply those\
    \ values. In this case, the controller action is the `shop` action in `StoreController`,\
    \ as shown in [Listing 5-40](#Chapter05.html#list_5_40).\n\n***Listing 5-40.**\
    \ The shop Action in StoreController*\n\n```\npackage com.gtunes\n\nclass StoreController\
    \ {\n\n  def shop() {\n    def genreList =\n      new DetachedCriteria(Album).distinct('genre').list()\n\
    \    [top5Albums:  Album.list(max:5, sort:\"dateCreated\", order:\"desc\"),\n\
    \     top5Songs:   Song.list(max:5, sort:\"dateCreated\", order:\"desc\"),\n \
    \    top5Artists: Artist.list(max:5, sort:\"dateCreated\", order:\"desc\"),\n\
    \     genres:  genreList.sort()]\n  }\n\n  // ...\n}\n```\n\nNotice that the controller\
    \ action is returning values for albums, songs, and artists. The values are lists\
    \ containing the five most recently created albums, songs, and artists.\n\nThese\
    \ templates have been defined to render these “Top 5” lists in the `shop.gsp`,\
    \ but they are reusable templates that can be used anywhere that the application\
    \ needs to render lists of albums, artists, or songs. It is commonplace for web\
    \ applications to render the same pieces of information on a lot of pages. When\
    \ you see the same elements showing up in multiple places, consider pulling that\
    \ markup out of your GSPs and putting it in a reusable template."
  raw: '#### Rendering GSP Templates


    A GSP template is a special GSP file that contains only a fragment of a page.
    A GSP template can contain markup that is rendered from various places in an application.
    In such a case, the template would facilitate reuse. A template can be extracted
    from a page to simplify the containing page by breaking it down into smaller,
    more manageable pieces. Whatever the reason for isolating part of a page into
    a reusable template, Grails provides a really simple mechanism for rendering the
    template.


    A template can contain just about anything that might appear in a normal GSP.
    One thing that makes a template special is its file name. GSP templates must be
    defined in a file whose name begins with an underscore. For example, a template
    that represents a list of albums might be defined in `grails-app/views/album/_albumList.gsp`.


    The `render` tag can be used in a GSP to render a GSP template. This tag accepts
    an attribute, `template`, that represents the name of the template to be rendered.
    For example, to render the template in the `grails-app/views/album/_albumList.gsp`
    file, you would specify `/album/albumList` as the value of the template attribute
    when calling the `render` tag, as shown in [Listing 5-37](#Chapter05.html#list_5_37).


    ***Listing 5-37.** Rendering the albumList Template*


    `<div id="artists">`

    `<g:render template="/artist/artistList"/>`

    `</div>`


    Notice that the template file name contains an underscore but the name of the
    template does not.


    Rendering a template in a GSP is very much like taking the contents of the GSP
    template and putting them inline in the containing GSP in place of calling the
    `render` tag.


    [Figure 5-5](#Chapter05.html#fig_5_5) shows an updated version of the gTunes application.


    ![Image](images/9781430243779_Fig05-05.jpg)


    ***Figure 5-5.** Updated gTunes*


    Notice the three tabs across the top of the screen representing the latest albums,
    latest songs, and newest artists. The markup required to generate the contents
    of each tab would clutter the GSP. Rather than embed the markup for those tabs
    in the `views/store/shop.gsp` file, you can pull it all out into a series of templates
    and render them from `shop.gsp`. Using templates to handle this will yield an
    application easier to maintain than one with monolithic unmodular GSPs.


    [Listing 5-38](#Chapter05.html#list_5_38) shows what those templates might look
    like.


    ***Listing 5-38.** GSP Templates for the Top Five Lists*


    `<!-- grails-app/views/artist/_artistList.gsp -->`

    `<ul class="list">`

    `    <g:each in="${artists?}" var="artist">`

    `        <li class="icon">`

    `            <g:link controller="store" action="shop">`

    `                <g:img dir="images/icons" file="artist.png" />`

    `                ${artist?.name}`

    `            </g:link>`

    `        </li>`

    `    </g:each>`

    `</ul>`


    `<!-- grails-app/views/album/_albumList.gsp -->`

    `<ul class="list">`

    `    <g:each in="${albums?}" var="album">`

    `          <li class="icon">`

    `            <g:link controller="album" action="show" id="${album?.id}">`

    `                <g:img dir="images/icons" file="album.png" />`

    `                ${album.title}`

    `            </g:link>`

    `        </li>`

    `    </g:each>`

    `</ul>`


    `<!-- grails-app/views/song/_songList.gsp -->`

    `<ul class="list">`

    `    <g:each in="${songs?}" var="song">`

    `          <li class="icon">`

    `            <g:link controller="store" action="shop">`

    `                <g:img dir="images/icons" file="song.png" />`

    `                ${song.title}`

    `            </g:link>`

    `        </li>`

    `    </g:each>`

    `</ul>`


    ![Image](images/square.jpg) **Note**  These are very simple templates that render
    unordered lists of strings. In [Chapter 8](#Chapter08.html) you will develop these
    templates to contain some really slick Ajax-driven behavior. At that point, the
    value of knowing how to isolate markup into templates will be even greater.


    Notice that each template is iterating over a different collection (artists, albums,
    songs). Those collections are data that must be passed into the template when
    the template is rendered. The way to pass data into a GSP template is to specify
    an attribute, `model`, when calling the `render` tag. The value of the `model`
    attribute should be a map containing all the data being passed in to the template.
    [Listing 5-39](#Chapter05.html#list_5_39) shows the templates being rendered from
    the `grails-app/views/store/shop.gsp` and the appropriate data being passed to
    each.


    ***Listing 5-39.** Rendering Templates from shop.gsp*


    `<div id="top5Panel" class="top5Panel">`

    `  <ul id="tabs" class="tabs clearfix">`

    `    <li class="selected"><a href="#albums">Latest Albums</a></li>`

    `    <li><a href="#songs">Latest Songs</a></li>`

    `    <li><a href="#artists">Newest Artists</a></li>`

    `  </ul>`


    `  <div id="albums" class="top5Item">`

    `    <g:render template="/album/albumList"`

    `              model="[albums: top5Albums]"></g:render>`

    `  </div>`


    `  <div id="songs" class="top5Item hide">`

    `    <g:render template="/song/songList"`

    `              model="[songs: top5Songs]"></g:render>`

    `  </div>`


    `  <div id="artists" class="top5Item list hide">`

    `    <g:render template="/artist/artistList"`

    `              model="[artists: top5Artists]"></g:render>`

    `  </div>`

    `</div>`


    The templates rendered here are `/album/albumList`, `/song/songList`, and `/artist/
    artistList`. Each is a fully qualified reference to a template. When a template
    name is fully qualified, the root refers to the `grails-app/views/` directory;
    so `/artist/artistList` refers to the template defined in the `grails-app/views/artist/_artistList.gsp`
    file. Template references may be defined with a relative path as well. Relative
    template paths are paths that do not begin with a forward slash.


    For example, if instead of referring to `/artist/artistList`, the `shop.gsp` referred
    to the relative `artistList` template, then Grails would look for the template
    in the same directory where `shop.gsp` lives. Relative references can also include
    a directory structure. If the `artistList` template were defined in `grails-app/views/store/myTemplates/_artistList.gsp`,
    then the `grails-app/views/store/shop.gsp` page could refer to the template as
    `myTemplates/artistList`, since the `myTemplates` directory is in the same one
    as `shop.gsp`.


    Each of the calls to the earlier `render` tag includes a map of data being passed
    as the `model` attribute. For `shop.gsp` to have that data, the controller action
    that rendered `shop.gsp` needs to supply those values. In this case, the controller
    action is the `shop` action in `StoreController`, as shown in [Listing 5-40](#Chapter05.html#list_5_40).


    ***Listing 5-40.** The shop Action in StoreController*


    `package com.gtunes`


    `class StoreController {`


    `  def shop() {`

    `    def genreList =`

    `      new DetachedCriteria(Album).distinct(''genre'').list()`

    `    [top5Albums:  Album.list(max:5, sort:"dateCreated", order:"desc"),`

    `     top5Songs:   Song.list(max:5, sort:"dateCreated", order:"desc"),`

    `     top5Artists: Artist.list(max:5, sort:"dateCreated", order:"desc"),`

    `     genres:  genreList.sort()]`

    `  }`


    `  // ...`

    `}`


    Notice that the controller action is returning values for albums, songs, and artists.
    The values are lists containing the five most recently created albums, songs,
    and artists.


    These templates have been defined to render these “Top 5” lists in the `shop.gsp`,
    but they are reusable templates that can be used anywhere that the application
    needs to render lists of albums, artists, or songs. It is commonplace for web
    applications to render the same pieces of information on a lot of pages. When
    you see the same elements showing up in multiple places, consider pulling that
    markup out of your GSPs and putting it in a reusable template.'
  trans: '

    #### 渲染 GSP 模板


    GSP 模板是一种特殊的 GSP 文件，它仅包含页面的一部分片段。GSP 模板可以包含从应用程序不同位置渲染的标记。在这种情况下，模板有助于实现复用。可以将模板从页面中提取出来，通过将页面分解成更小、更易于管理的部分来简化包含它的页面。无论将页面的一部分隔离到可复用模板中的原因是什么，Grails
    都提供了一种非常简单的机制来渲染模板。


    模板可以包含普通 GSP 中可能出现的几乎所有内容。模板的一个特殊之处在于其文件名。GSP 模板必须定义在文件名以下划线开头的文件中。例如，表示专辑列表的模板可以定义在
    `grails-app/views/album/_albumList.gsp` 中。


    可以在 GSP 中使用 `render` 标签来渲染 GSP 模板。此标签接受一个属性 `template`，该属性表示要渲染的模板名称。例如，要渲染 `grails-app/views/album/_albumList.gsp`
    文件中的模板，你需要在调用 `render` 标签时将 `/album/albumList` 指定为 `template` 属性的值，如清单 5-37 所示。


    ***清单 5-37.** 渲染 albumList 模板*


    `<div id="artists">`

    `<g:render template="/artist/artistList"/>`

    `</div>`


    请注意，模板文件名包含下划线，但模板名称不包含。


    在 GSP 中渲染模板，非常类似于将 GSP 模板的内容内联到包含它的 GSP 中，以替代调用 `render` 标签。


    图 5-5 展示了 gTunes 应用程序的更新版本。


    ![Image](img/9781430243779_Fig05-05.jpg)


    ***图 5-5.** 更新后的 gTunes*


    请注意屏幕顶部的三个选项卡，分别代表最新专辑、最新歌曲和最新艺人。生成每个选项卡内容所需的标记会使 GSP 变得杂乱。与其将这些选项卡的标记嵌入到 `views/store/shop.gsp`
    文件中，不如将它们全部提取到一系列模板中，并从 `shop.gsp` 中渲染它们。使用模板来处理这个问题，将使应用程序比使用庞大且非模块化的 GSP 更易于维护。


    清单 5-38 展示了这些模板可能的样子。


    ***清单 5-38.** 用于前五名列表的 GSP 模板*


    `<!-- grails-app/views/artist/_artistList.gsp -->`

    `<ul class="list">`

    `    <g:each in="${artists?}" var="artist">`

    `        <li class="icon">`

    `            <g:link controller="store" action="shop">`

    `                <g:img dir="images/icons" file="artist.png" />`

    `                ${artist?.name}`

    `            </g:link>`

    `        </li>`

    `    </g:each>`

    `</ul>`


    `<!-- grails-app/views/album/_albumList.gsp -->`

    `<ul class="list">`

    `    <g:each in="${albums?}" var="album">`

    `          <li class="icon">`

    `            <g:link controller="album" action="show" id="${album?.id}">`

    `                <g:img dir="images/icons" file="album.png" />`

    `                ${album.title}`

    `            </g:link>`

    `        </li>`

    `    </g:each>`

    `</ul>`


    `<!-- grails-app/views/song/_songList.gsp -->`

    `<ul class="list">`

    `    <g:each in="${songs?}" var="song">`

    `          <li class="icon">`

    `            <g:link controller="store" action="shop">`

    `                <g:img dir="images/icons" file="song.png" />`

    `                ${song.title}`

    `            </g:link>`

    `        </li>`

    `    </g:each>`

    `</ul>`


    ![Image](img/square.jpg) **注意** 这些是非常简单的模板，用于渲染字符串的无序列表。在第 8 章中，你将开发这些模板，使其包含一些非常酷的、由
    Ajax 驱动的行为。到那时，了解如何将标记隔离到模板中的价值将更加巨大。


    请注意，每个模板都在遍历不同的集合（艺人、专辑、歌曲）。这些集合是在渲染模板时必须传递给模板的数据。将数据传递给 GSP 模板的方法是在调用 `render`
    标签时指定一个属性 `model`。`model` 属性的值应该是一个包含所有传递给模板的数据的映射。清单 5-39 展示了从 `grails-app/views/store/shop.gsp`
    渲染模板以及将适当的数据传递给每个模板的过程。


    ***清单 5-39.** 从 shop.gsp 渲染模板*


    `<div id="top5Panel" class="top5Panel">`

    `  <ul id="tabs" class="tabs clearfix">`

    `    <li class="selected"><a href="#albums">最新专辑</a></li>`

    `    <li><a href="#songs">最新歌曲</a></li>`

    `    <li><a href="#artists">最新艺人</a></li>`

    `  </ul>`


    `  <div id="albums" class="top5Item">`

    `    <g:render template="/album/albumList"`

    `              model="[albums: top5Albums]"></g:render>`

    `  </div>`


    `  <div id="songs" class="top5Item hide">`

    `    <g:render template="/song/songList"`

    `              model="[songs: top5Songs]"></g:render>`

    `  </div>`


    `  <div id="artists" class="top5Item list hide">`

    `    <g:render template="/artist/artistList"`

    `              model="[artists: top5Artists]"></g:render>`

    `  </div>`

    `</div>`


    这里渲染的模板是 `/album/albumList`、`/song/songList` 和 `/artist/artistList`。每个都是对模板的完全限定引用。当模板名称完全限定时，根目录指的是
    `grails-app/views/` 目录；因此 `/artist/artistList` 指的是定义在 `grails-app/views/artist/_artistList.gsp`
    文件中的模板。模板引用也可以使用相对路径来定义。相对模板路径是指不以正斜杠开头的路径。


    例如，如果 `shop.gsp` 引用的是相对路径的 `artistList` 模板，而不是 `/artist/artistList`，那么 Grails
    将在 `shop.gsp` 所在的同一目录中查找该模板。相对引用也可以包含目录结构。如果 `artistList` 模板定义在 `grails-app/views/store/myTemplates/_artistList.gsp`
    中，那么 `grails-app/views/store/shop.gsp` 页面可以将该模板引用为 `myTemplates/artistList`，因为
    `myTemplates` 目录与 `shop.gsp` 在同一目录下。


    前面每次调用 `render` 标签时，都包含一个作为 `model` 属性传递的数据映射。为了让 `shop.gsp` 拥有这些数据，渲染 `shop.gsp`
    的控制器动作需要提供这些值。在这种情况下，控制器动作是 `StoreController` 中的 `shop` 动作，如清单 5-40 所示。


    ***清单 5-40.** StoreController 中的 shop 动作*


    `package com.gtunes`


    `class StoreController {`


    `  def shop() {`

    `    def genreList =`

    `      new DetachedCriteria(Album).distinct(''genre'').list()`

    `    [top5Albums:  Album.list(max:5, sort:"dateCreated", order:"desc"),`

    `     top5Songs:   Song.list(max:5, sort:"dateCreated", order:"desc"),`

    `     top5Artists: Artist.list(max:5, sort:"dateCreated", order:"desc"),`

    `     genres:  genreList.sort()]`

    `  }`


    `  // ...`

    `}`


    请注意，控制器动作返回了专辑、歌曲和艺人的值。这些值是包含最近创建的五个专辑、歌曲和艺人的列表。


    这些模板被定义为在 `shop.gsp` 中渲染这些“前五名”列表，但它们也是可复用的模板，可以在应用程序需要渲染专辑、艺人或歌曲列表的任何地方使用。Web
    应用程序在多个页面上渲染相同的信息片段是很常见的。当你在多个地方看到相同的元素时，请考虑将这些标记从你的 GSP 中提取出来，放到一个可复用的模板中。

