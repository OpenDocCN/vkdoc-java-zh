    `                  model="[albums: top5Albums]" />`

    `    </div>`

    `    <h2>Latest Songs</h2>`

    `    <div id="songs" class="top5Item">`

    `        <g:render template="/song/songList" model="[songs: top5Songs]" />`

    `    </div>`

    `    <h2>Newest Artists</h2>`

    `    <div id="artists" class="top5Item">`

    `    <g:render template="/artist/artistList"`

    `              model="[artists: top5Artists]" />`

    `    </div>`

    `</div>`


    Each of these uses a specific template to render a simple HTML unordered list
    for each category. It would be nice if the list items, instead of being plain
    text, consisted of HTML links that used Ajax to display details about the `Album`,
