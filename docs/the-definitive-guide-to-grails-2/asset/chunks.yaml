    \ the database again. As you can imagine, each object goes through an implicit\
    \ life cycle, a topic we’ll be looking at first.\n\n### The Persistence Life Cycle\n\
    \nBefore an object has been saved, it is said to be transient. Transient objects\
    \ are just like regular Java objects and have no notion of persistence. Once you\
    \ call the `save()` method, the object is in a persistent state. Persistent objects\
    \ have an assigned identifier and may have enhanced capabilities such as the ability\
    \ to lazily load associations. If the object is discarded by calling the `discard()`\
    \ method or if the `Session` has been cleared, it is said to be in a *detached*\
    \ state. In other words, each persistent object is associated with a single `Session`,\
    \ and if the object is no longer managed by the `Session`, it has been detached\
    \ from the `Session`.\n\n[Figure 9-2](#Chapter09.html#fig_9_2) shows a state diagram\
    \ describing the persistence life cycle and the various states an object can go\
    \ through. As the diagram notes, another way an object can become detached is\
    \ if the `Session` itself is closed. If you recall, we mentioned that a new `Session`\
    \ is bound for each Grails request. When the request completes, the `Session`\
    \ is closed. Any objects that are still around, for example, held within the `HttpSession`,\
