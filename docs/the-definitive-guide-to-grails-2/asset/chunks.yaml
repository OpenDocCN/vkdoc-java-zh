    The tag library is going to provide a custom GSP tag which will invoke the REST
    web service to retrieve the album artwork URL and then output an `img` tag which
    points to that URL. There is a Grails plug-in named rest-client-builder; it provides
    a `RestBuilder` class that makes it very easy to invoke a REST service and deal
    with the response. To use the plug-in, we need to add code to `BuildConfig.groovy`
    to express a dependency on the plug-in.


    `// grails-app/conf/BuildConfig.groovy`


    `grails.project.dependency.resolution = {`


    `    ...`


    `    plugins {`

    `        compile ":rest-client-builder:1.0.2"`

    `        ...`

    `    }`

    `}`


    Using the `RestBuilder` class provided by the rest-client-builder plug-in is quite
    simple. (The plug-in’s full documentation is at [`http://grails.org/plugin/rest-client-builder`](http://grails.org/plugin/rest-client-builder);
    we’ll cover the basics here.) The `RestBuilder` class has an instance method,
    named `get`, which accepts a `String` argument; that argument should be a URL
    that points to the service you want to invoke. The method returns a response that
    will have a `json` property, a Grails `JSONObject` that represents an unordered
    collection of name/value pairs parsed out of the JSON response. [Listing 8-18](#Chapter08.html#list_8_18)
    shows a simple usage.


    ***Listing 8-18.** Using the RestClient*


    `def restBuilder = new RestBuilder()`

    `def url = "http://someserver.com/someService"`

    `def response = restBuilder.get(url)`

    `def json = response.json`

    `def someAttributeValue = json.someAttribute`


