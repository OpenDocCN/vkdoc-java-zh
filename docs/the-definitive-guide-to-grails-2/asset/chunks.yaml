- fmt: '### Grails Interactive Mode


    So far all of the Grails commands that we have seen have been executed by running
    `grails` and passing a command name as an argument, for example, `grails create-domain-class`.
    When a command is executed like this, several things have to happen. The `grails`
    command first starts up the JVM, the Groovy runtime environment has to be initialized,
    and a certain amount of the Grails runtime environment has to be initialized.
    All of that has to happen before the command can actually be executed and all
    of that “warming up” takes time. The amount of time will, of course, vary depending
    on your hardware. Grails “interactive mode” can be a big help here. To start interactive
    mode, enter the `grails` command with no arguments. See [Listing 1-12](#Chapter01.html#list_1_12).


    ***Listing 1-12.** Starting Interactive Mode*


    ```

    $ grails

    grails>

    ```


    As long as you are in the interactive mode, any grails command that could have
    been executed on the command line may be executed. The syntax is exactly the same
    as it would be on the command line, except that there is no need to prefix every
    command with “grails”. For example, on the command line you might type something
    like `grails create-domain-class com.gtunes.Store` but in interactive mode you
    would type the shorter `create-domain-class com.gtunes.Store` as shown in [Listing
    1-13](#Chapter01.html#list_1_13).


    ***Listing 1-13.** Creating a Domain Class in Interactive Mode*


    ```

    $ grails

    grails> create-domain-class com.gtunes.Store

    | Created file grails-app/domain/com/gtunes/Store.groovy

    | Created file test/unit/com/gtunes/StoreTests.groovy

    grails>

    ```


    Notice that running this command in interactive mode is considerably quicker than
    running the same command from the command line.


    Since pressing the up arrow will cycle through recently executed commands, it’s
    really quick and easy to execute similar commands one after the other. As an example,
    after executing `create-domain-class com.gtunes.Store`, press the up arrow to
    recall that command and then backspace over `Store` to replace it with `Song`
    in order to quickly execute `create-domain-class com.gtunes.Song`.


    Another great productivity boost provided by interactive mode is intuitive tab
    completion. While in interactive mode, type `cre` followed by pressing Tab, and
    interactive mode will show all the available commands that start with `cre`, as
    shown in [Listing 1-14](#Chapter01.html#list_1_14).


    ***Listing 1-14.** Tab Completion in Interactive Mode*


    ```

    grails> create-


    create-controller            create-domain-class          create-filters               create-

    hibernate-cfg-xml     create-integration-test      create-plugin                create-

    scaffold-controller   create-script                create-service

    create-tag-lib               create-unit-test             create-web-xml-config

    grails> create-

    ```


    Now that the interactive mode has completed the `cre` command as far as it can—that
    is, to `create-`—you can type `d` and press Tab again, at which point the interactive
    mode will complete the command to `create-domain-class`, since that is the only
    available command starting with `create-d`. This same style of autocompletion
    works for all available commands. Further, some commands that accept arguments
    also support autocompletion. For example, if you press Tab after `generate-all`,
    since the `generate-all` command accepts a domain-class name as an argument, the
    console will show all of the domain classes that are available in the application.
    This makes it very easy to fill the argument in without typing the full class
    name. You need to type only enough of the domain-class name to make it unique;
    the interactive mode can complete the rest.


    Interactive mode can help quickly open certain kinds of reports. After generating
    a domain class or any other artifact, run `test-app unit:` from within interactive
    mode to run all of the unit tests. The test results will be generated below the
    project root at `target/test-reports/html/index.html`. In order to open that report
    in your default web browser from within interactive mode, use the `open` command,
    as shown in [Listing 1-15](#Chapter01.html#list_1_15):


    ***Listing 1-15.** Opening Unit Test Report in Interactive Mode*


    ```

    grails> open target/test-reports/html/index.html

    grails>

    ```


    Note that tab completion may be used to help complete the path to the HTML file.


    It turns out that the `open` command knows where to find the test report; so a
    simpler way to open the report is shown in [Listing 1-16](#Chapter01.html#list_1_16).


    ***Listing 1-16.** Opening Unit Test Report by Name in Interactive Mode*


    ```

    grails> open test-report

    grails>

    ```


    The way to exit the interactive mode is to enter `exit` at the interactive mode
    prompt. An exception to this occurs if the application is currently running, as
    it would be after executing `run-app` from the console. In such a case the `exit`
    command will exit the application but leave you in interactive mode. At that point
    you could execute `exit` again to leave interactive mode altogether.


    If you are only going to execute a single command, then interactive mode isn’t
    going to be of much use. Interactive mode really benefits the more typical workflow
    situation where numerous Grails commands are executed over a period of time. You
    may want to run the tests, view the reports, make some code changes and continue
    iterating through that loop. You may want to generate several domain classes at
    once, fill in some of their details, and then generate corresponding controllers
    and views. Anytime you are going to be executing more than one or two Grails commands
    during a work session, interactive mode is probably going to be a big help. While
    doing real development, executing those commands from interactive mode will save
    you a lot of time.


    Interactive mode provides a lot of developer productivity. Getting used to using
    it will make many development tasks much easier to manage and quicker to execute.


    ### Summary


    Success! You have your first Grails application up and running. In this chapter
    you’ve taken the first steps toward learning Grails by setting up and configuring
    your Grails installation. In addition, you’ve created your first Grails application,
    along with a basic controller.


    Now it is time to see what else Grails does to kick-start your project development.
    In the chapters that follow, we’ll look at some Create, Read, Update, Delete (CRUD)
    generation facilities, by means of which Grails allows you to flesh out prototype
    applications in no time.


    ## CHAPTER 2


    ![Image](images/3squ.jpg)


    ## Getting Started with Grails


    In [Chapter 1](#Chapter01.html), you got your first introduction to the Grails
    framework and a feel for the basic command-line interface while creating the basis
    for the gTunes application. This chapter is going to build on that foundation
    by showing how you can use the Grails scaffolding feature to quickly build a prototype
    application that can generate simple CRUD (Create, Read, Update, Delete) interfaces.


    Then comes an explanation of some of the basic concepts within the Grails ecosystem,
    including environments, data sources, and deployment. Get ready—this is an action-packed
    chapter with loads of information!'
