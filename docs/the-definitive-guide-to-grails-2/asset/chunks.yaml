- fmt: "### Living in the Java Ecosystem\n\nAs well as leveraging Java frameworks\
    \ that you know and love, Grails gives you a platform that allows you to take\
    \ full advantage of Java and the JVM—thanks to Groovy. No other dynamic language\
    \ on the JVM integrates with Java like Groovy. Groovy is designed to work seamlessly\
    \ with Java at every level. Starting with syntax, the similarities continue as\
    \ follows:\n\n> * The Groovy grammar is derived from the Java 5 grammar, making\
    \ most valid Java code also valid Groovy code.\n> * Groovy shares the same underlying\
    \ APIs as Java, so your trusty javadocs are still valid!\n> * Groovy objects are\
    \ Java objects. This has powerful implications that might not be immediately apparent.\
    \ For example, a Groovy object can implement `Java.io.Serializable` and be sent\
    \ over Remote Method Invocation (RMI) or clustered using session-replication tools.\n\
    > * Through Groovy’s joint compiler you can have circular references between Groovy\
    \ and Java without running into compilation issues.\n> * With Groovy you can easily\
    \ use the same profiling tools, the same monitoring tools, and all existing and\
    \ future Java technologies.\n\nGroovy’s ability to integrate seamlessly with Java,\
    \ along with its Java-like syntax, is the number-one reason why its conception\
    \ generated so much hype. Here was a language with capabilities similar to those\
    \ of languages such as Ruby and Smalltalk running directly in the JVM. The potential\
    \ is obvious, and the ability to intermingle Java code with dynamic Groovy code\
    \ is huge. In addition, Groovy allows mixing of static types and dynamic types,\
    \ combining the safety of static typing with the power and flexibility to use\
    \ dynamic typing where necessary.\n\nThis level of Java integration is what drives\
    \ Groovy’s continued popularity, particularly in the world of web applications.\
    \ Across different programming platforms, varying idioms essentially express the\
    \ same concept. In the Java world there are servlets, filters, tag libraries,\
    \ and JavaServer Pages (JSP). Moving to a new platform requires relearning all\
    \ of these concepts and their equivalent APIs or idioms—easy for some, a challenge\
    \ for others. Not that learning new things is bad, but a cost is attached to knowledge\
    \ gain in the real world, a cost that can present a major stumbling block in the\
    \ adoption of any new technology that deviates from the standards or conventions\
    \ defined within the Java platform and the enterprise.\n\nIn addition, Java has\
    \ standards for deployment, management, security, naming, and more. The goal of\
    \ Grails is to create a platform with the essence of frameworks like Rails or\
    \ Django or CakePHP, but one that embraces the mature environment of Java Enterprise\
    \ Edition (Java EE) and its associated APIs.\n\nGrails is, however, a technology\
    \ that speaks for itself: the moment you experience using it, a little light bulb\
    \ will go on inside your head. So without delay, let’s get moving with the example\
    \ application that will flow throughout the course of this book.\n\nThe gTunes\
    \ example will guide you through the development of a music store similar to those\
    \ provided by Apple, Amazon, and Napster. An application of this nature opens\
    \ up a wide variety of interesting possibilities, from e-commerce to RESTful APIs\
    \ and RSS or Atom feeds. We hope it will provide a broad understanding of Grails\
    \ and its feature set.\n\n### Installing and Configuring Grails\n\nInstalling\
    \ Grails is almost as simple as using it, but there is at least one prerequisite\
    \ to take into account. Grails requires a valid installation of the Java SDK 1.6\
    \ or above, which, of course, can be obtained from Oracle: [http://www.oracle.com/technetwork/java/javase/](http://www.oracle.com/technetwork/java/javase/).\n\
    \nAfter installing the Java SDK, set the `JAVA_HOME` environment variable to the\
    \ location where it is installed and add the `JAVA_HOME/bin` directory to the\
    \ PATH variables.\n\n![Image](images/square.jpg) **Note** If you are working on\
    \ Mac OS X, you already have Java installed! However, you still need to set `JAVA_HOME`\
    \ in your `~/.profile` file.\n\nTo test your installation, open up a command prompt\
    \ and type `java –version`:\n\n```\n$java -version\n```\n\nYou should see output\
    \ similar to [Listing 1-1](#Chapter01.html#list_1_1).\n\n***Listing 1-1.** Running\
    \ the Java Executable*\n\n```\njava version \"1.6.0_29\"\nJava(TM) SE Runtime\
    \ Environment (build 1.6.0_29-b11-402-11D50b)\nJava HotSpot(TM) 64-Bit Server\
    \ VM (build 20.4-b02-402, mixed mode)\n```\n\nAs is typical with many other Java\
    \ frameworks, including Apache Tomcat and Apache Ant, the installation process\
    \ involves following a few simple steps. Download and unzip Grails from [`http://grails.org`](http://grails.org),\
    \ create a `GRAILS_HOME` variable that points to the location where you installed\
    \ Grails, and add the `GRAILS_HOME/bin` directory to your `PATH` variable.\n\n\
    To validate your installation, open a command window and type the command `grails\
    \ -version`:\n\n```\n$ grails -version\n```\n\nIf you have successfully installed\
    \ Grails, the command will output the usage help shown in [Listing 1-2](#Chapter01.html#list_1_2).\n\
    \n***Listing 1-2.** Running the Grails Executable*\n\n```\nGrails version: 2.1.0\n\
    ```\n\nTyping `grails help` will display more usage information, including a list\
    \ of available commands. If more information about a particular command is needed,\
    \ you can append the command name to the help command. For example, if you want\
    \ to know more about the `create-app` command, simply type `grails help create-app`:\n\
    \n```\n$ grails help create-app\n```\n\n[Listing 1-3](#Chapter01.html#list_1_3)\
    \ provides an example of the typical output.\n\n***Listing 1-3.** Getting Help\
    \ on a Command*\n\n```\n    grails create-app -- Creates a Grails application\
    \ for the given name\n\nUsage (optionals in square brackets):\n\n    create-app\
    \ [--inplace] [NAME]\n\nwhere\n    --inplace  = Creates the project in the current\
    \ directory rather than\n                 creating a new directory.\n    NAME\
    \       = The name of the project. If not provided, this command will\n      \
    \           ask you for the name.\n```\n\nThe Grails command-line interface is\
    \ built on another Groovy-based project called Gant ([`http://gant.codehaus.org/`](http://gant.codehaus.org/)),\
    \ which wraps the ever-popular Apache Ant ([`http://ant.apache.org/`](http://ant.apache.org/))\
    \ build system. Gant allows seamless mixing of Ant targets and Groovy code.\n\n\
    We’ll discuss the Grails command line further in [Chapter 12](#Chapter12.html).\n\
    \n### Creating Your First Application\n\nIn this section you’re going to create\
    \ your first Grails application, which will include a simple controller. Here\
    \ are the steps you’ll take to achieve this:\n\n> 1. Run the command `grails create-app\
    \ gTunes` to create the application (with “gTunes” being the application’s name).\n\
    > 2. Navigate into the `gTunes` directory by issuing the command `cd gtunes`.\n\
    > 3. Create a storefront controller with the command `grails create-controller\
    \ store`.\n> 4. Write some code to display a welcome message to the user.\n> 5.\
    \ Test your code and run the tests with `grails test-app`.\n> 6. Run the application\
    \ with `grails run-app`."
  raw: '### Living in the Java Ecosystem


    As well as leveraging Java frameworks that you know and love, Grails gives you
    a platform that allows you to take full advantage of Java and the JVM—thanks to
    Groovy. No other dynamic language on the JVM integrates with Java like Groovy.
    Groovy is designed to work seamlessly with Java at every level. Starting with
    syntax, the similarities continue as follows:


    > *   The Groovy grammar is derived from the Java 5 grammar, making most valid
    Java code also valid Groovy code.

    > *   Groovy shares the same underlying APIs as Java, so your trusty javadocs
    are still valid!

    > *   Groovy objects are Java objects. This has powerful implications that might
    not be immediately apparent. For example, a Groovy object can implement `Java.io.Serializable`
    and be sent over Remote Method Invocation (RMI) or clustered using session-replication
    tools.

    > *   Through Groovy’s joint compiler you can have circular references between
    Groovy and Java without running into compilation issues.

    > *   With Groovy you can easily use the same profiling tools, the same monitoring
    tools, and all existing and future Java technologies.


    Groovy’s ability to integrate seamlessly with Java, along with its Java-like syntax,
    is the number-one reason why its conception generated so much hype. Here was a
    language with capabilities similar to those of languages such as Ruby and Smalltalk
    running directly in the JVM. The potential is obvious, and the ability to intermingle
    Java code with dynamic Groovy code is huge. In addition, Groovy allows mixing
    of static types and dynamic types, combining the safety of static typing with
    the power and flexibility to use dynamic typing where necessary.


    This level of Java integration is what drives Groovy’s continued popularity, particularly
    in the world of web applications. Across different programming platforms, varying
    idioms essentially express the same concept. In the Java world there are servlets,
    filters, tag libraries, and JavaServer Pages (JSP). Moving to a new platform requires
    relearning all of these concepts and their equivalent APIs or idioms—easy for
    some, a challenge for others. Not that learning new things is bad, but a cost
    is attached to knowledge gain in the real world, a cost that can present a major
    stumbling block in the adoption of any new technology that deviates from the standards
    or conventions defined within the Java platform and the enterprise.


    In addition, Java has standards for deployment, management, security, naming,
    and more. The goal of Grails is to create a platform with the essence of frameworks
    like Rails or Django or CakePHP, but one that embraces the mature environment
    of Java Enterprise Edition (Java EE) and its associated APIs.


    Grails is, however, a technology that speaks for itself: the moment you experience
    using it, a little light bulb will go on inside your head. So without delay, let’s
    get moving with the example application that will flow throughout the course of
    this book.


    The gTunes example will guide you through the development of a music store similar
    to those provided by Apple, Amazon, and Napster. An application of this nature
    opens up a wide variety of interesting possibilities, from e-commerce to RESTful
    APIs and RSS or Atom feeds. We hope it will provide a broad understanding of Grails
    and its feature set.


    ### Installing and Configuring Grails


    Installing Grails is almost as simple as using it, but there is at least one prerequisite
    to take into account. Grails requires a valid installation of the Java SDK 1.6
    or above, which, of course, can be obtained from Oracle: [http://www.oracle.com/technetwork/java/javase/](http://www.oracle.com/technetwork/java/javase/).


    After installing the Java SDK, set the `JAVA_HOME` environment variable to the
    location where it is installed and add the `JAVA_HOME/bin` directory to the PATH
    variables.


    ![Image](images/square.jpg) **Note**  If you are working on Mac OS X, you already
    have Java installed! However, you still need to set `JAVA_HOME` in your ~/.profile
    file.


    To test your installation, open up a command prompt and type java –version:


    `$java -version`


    You should see output similar to [Listing 1-1](#Chapter01.html#list_1_1).


    ***Listing 1-1.** Running the Java Executable*


    `java version "1.6.0_29"`

    `Java(TM) SE Runtime Environment (build 1.6.0_29-b11-402-11D50b)`

    `Java HotSpot(TM) 64-Bit Server VM (build 20.4-b02-402, mixed mode)`


    As is typical with many other Java frameworks, including Apache Tomcat and Apache
    Ant, the installation process involves following a few simple steps. Download
    and unzip Grails from [`http://grails.org`](http://grails.org), create a `GRAILS_HOME`
    variable that points to the location where you installed Grails, and add the `GRAILS_HOME/bin`
    directory to your `PATH` variable.


    To validate your installation, open a command window and type the command `grails
    -version`:


    `$ grails -version`


    If you have successfully installed Grails, the command will output the usage help
    shown in [Listing 1-2](#Chapter01.html#list_1_2).


    ***Listing 1-2.** Running the Grails Executable*


    `Grails version: 2.1.0`


    Typing `grails help` will display more usage information, including a list of
    available commands. If more information about a particular command is needed,
    you can append the command name to the help command. For example, if you want
    to know more about the `create-app` command, simply type `grails help create-app`:


    `$ grails help create-app`


    [Listing 1-3](#Chapter01.html#list_1_3) provides an example of the typical output.


    ***Listing 1-3.** Getting Help on a Command*


    `    grails create-app -- Creates a Grails application for the given name`


    `Usage (optionals in square brackets):`


    `    create-app [--inplace] [NAME]`


    `where`

    `    --inplace  = Creates the project in the current directory rather than`

    `                 creating a new directory.`

    `    NAME       = The name of the project. If not provided, this command will`

    `                 ask you for the name.`


    The Grails command-line interface is built on another Groovy-based project called
    Gant ([`http://gant.codehaus.org/`](http://gant.codehaus.org/)), which wraps the
    ever-popular Apache Ant ([`http://ant.apache.org/`](http://ant.apache.org/)) build
    system. Gant allows seamless mixing of Ant targets and Groovy code.


    We’ll discuss the Grails command line further in [Chapter 12](#Chapter12.html).


    ### Creating Your First Application


    In this section you’re going to create your first Grails application, which will
    include a simple controller. Here are the steps you’ll take to achieve this:


    > 1.  Run the command `grails create-app gTunes` to create the application (with
    “gTunes” being the application’s name).

    > 2.  Navigate into the `gTunes` directory by issuing the command `cd gtunes`.

    > 3.  Create a storefront controller with the command `grails create-controller
    store`.

    > 4.  Write some code to display a welcome message to the user.

    > 5.  Test your code and run the tests with `grails test-app`.

    > 6.  Run the application with `grails run-app`.'
  trans: '

    ### 生活在 Java 生态系统中


    除了利用您熟悉和喜爱的 Java 框架之外，Grails 还为您提供了一个平台，让您能够借助 Groovy 充分利用 Java 和 JVM 的优势。在 JVM
    上，没有其他动态语言能像 Groovy 那样与 Java 完美集成。Groovy 旨在与 Java 在每一个层面都无缝协作。从语法开始，相似之处体现在以下几个方面：


    > *   Groovy 语法源自 Java 5 语法，这使得大多数有效的 Java 代码同时也是有效的 Groovy 代码。

    > *   Groovy 与 Java 共享相同的底层 API，因此您信赖的 javadoc 仍然有效！

    > *   Groovy 对象就是 Java 对象。这具有强大的意义，可能不会立即显现。例如，Groovy 对象可以实现 `Java.io.Serializable`，并通过远程方法调用（RMI）发送，或使用会话复制工具进行集群。

    > *   通过 Groovy 的联合编译器，您可以在 Groovy 和 Java 之间建立循环引用，而不会遇到编译问题。

    > *   使用 Groovy，您可以轻松地使用相同的性能分析工具、相同的监控工具以及所有现有和未来的 Java 技术。


    Groovy 与 Java 无缝集成的能力，加上其类似 Java 的语法，是其诞生之初就引起如此轰动的首要原因。这是一种能力与 Ruby 和 Smalltalk
    等语言相似，并且直接在 JVM 上运行的语言。其潜力显而易见，而将 Java 代码与动态 Groovy 代码混合使用的能力更是巨大。此外，Groovy 允许混合使用静态类型和动态类型，将静态类型的安全性以及在必要时使用动态类型的强大功能和灵活性结合起来。


    这种与 Java 的集成水平是推动 Groovy 持续流行的原因，尤其是在 Web 应用领域。在不同的编程平台上，不同的惯用语法本质上表达的是相同的概念。在
    Java 世界中，有 Servlet、过滤器、标签库和 JavaServer Pages (JSP)。迁移到一个新平台需要重新学习所有这些概念及其等效的 API
    或惯用语法——这对一些人来说很容易，但对另一些人来说则是一个挑战。这并不是说学习新事物不好，但在现实世界中，获取知识是有成本的，这种成本可能会成为采用任何偏离
    Java 平台和企业级标准或约定的新技术的重大障碍。


    此外，Java 在部署、管理、安全、命名等方面都有标准。Grails 的目标是创建一个具有 Rails、Django 或 CakePHP 等框架精髓的平台，但同时又拥抱
    Java 企业版 (Java EE) 及其相关 API 的成熟环境。


    然而，Grails 是一项不言自明的技术：一旦您体验过它，您脑海中就会灵光一现。所以，事不宜迟，让我们开始学习本书中贯穿始终的示例应用程序。


    gTunes 示例将引导您开发一个类似于 Apple、Amazon 和 Napster 提供的音乐商店。这种性质的应用程序开辟了各种有趣的可能性，从电子商务到
    RESTful API 以及 RSS 或 Atom 订阅源。我们希望它能帮助您广泛了解 Grails 及其功能集。


    ### 安装和配置 Grails


    安装 Grails 几乎和使用它一样简单，但至少有一个先决条件需要考虑。Grails 需要有效安装 Java SDK 1.6 或更高版本，当然，您可以从 Oracle
    获取：[`www.oracle.com/technetwork/java/javase/`](http://www.oracle.com/technetwork/java/javase/)。


    安装 Java SDK 后，将 `JAVA_HOME` 环境变量设置为安装位置，并将 `JAVA_HOME/bin` 目录添加到 PATH 变量中。


    ![Image](img/square.jpg) **注意**  如果您使用的是 Mac OS X，则已经安装了 Java！但是，您仍然需要在 ~/.profile
    文件中设置 `JAVA_HOME`。


    要测试您的安装，请打开命令提示符并输入 java –version：


    `$java -version`


    您应该会看到类似于清单 1-1 的输出。


    ***清单 1-1.** 运行 Java 可执行文件*


    `java version "1.6.0_29"`

    `Java(TM) SE Runtime Environment (build 1.6.0_29-b11-402-11D50b)`

    `Java HotSpot(TM) 64-Bit Server VM (build 20.4-b02-402, mixed mode)`


    与许多其他 Java 框架（包括 Apache Tomcat 和 Apache Ant）一样，安装过程涉及几个简单的步骤。从 [`http://grails.org`](http://grails.org)
    下载并解压 Grails，创建一个指向 Grails 安装位置的 `GRAILS_HOME` 变量，并将 `GRAILS_HOME/bin` 目录添加到您的
    `PATH` 变量中。


    要验证您的安装，请打开一个命令窗口并输入命令 `grails -version`：


    `$ grails -version`


    如果您已成功安装 Grails，该命令将输出如清单 1-2 所示的使用帮助。


    ***清单 1-2.** 运行 Grails 可执行文件*


    `Grails version: 2.1.0`


    输入 `grails help` 将显示更多使用信息，包括可用命令列表。如果需要了解某个特定命令的更多信息，可以将命令名称附加到 help 命令后面。例如，如果您想了解更多关于
    `create-app` 命令的信息，只需输入 `grails help create-app`：


    `$ grails help create-app`


    清单 1-3 提供了一个典型输出的示例。


    ***清单 1-3.** 获取命令帮助*


    `    grails create-app -- 为给定名称创建一个 Grails 应用程序`


    `用法（可选参数在方括号中）：`


    `    create-app [--inplace] [NAME]`


    `其中`

    `    --inplace  = 在当前目录中创建项目，而不是`

    `                 创建一个新目录。`

    `    NAME       = 项目的名称。如果未提供，此命令将`

    `                 询问您名称。`


    Grails 命令行界面构建在另一个基于 Groovy 的项目 Gant ([`http://gant.codehaus.org/`](http://gant.codehaus.org/))
    之上，该项目封装了广受欢迎的 Apache Ant ([`http://ant.apache.org/`](http://ant.apache.org/))
    构建系统。Gant 允许无缝混合使用 Ant 目标和 Groovy 代码。


    我们将在第 12 章中进一步讨论 Grails 命令行。


    ### 创建您的第一个应用程序


    在本节中，您将创建您的第一个 Grails 应用程序，其中将包含一个简单的控制器。以下是实现此目标的步骤：


    > 1.  运行命令 `grails create-app gTunes` 来创建应用程序（其中“gTunes”是应用程序的名称）。

    > 2.  通过执行命令 `cd gtunes` 进入 `gTunes` 目录。

    > 3.  使用命令 `grails create-controller store` 创建一个店面控制器。

    > 4.  编写一些代码来向用户显示欢迎消息。

    > 5.  测试您的代码并使用 `grails test-app` 运行测试。

    > 6.  使用 `grails run-app` 运行应用程序。

    '
- fmt: "#### Step 1: Creating the Application\n\nSound easy? It is, and your first\
    \ port of call is the `create-app` command; you managed to extract some help with\
    \ it in the previous section. To run the command, simply type `grails create-app`\
    \ and hit Enter in the command window:\n\n```\n$ grails create-app\n```\n\nGrails\
    \ will automatically prompt you for a project name, as presented in [Listing 1-4](#Chapter01.html#list_1_4).\
    \ When this happens, type `gTunes` and hit Enter. As an alternative, use the command\
    \ `grails create-app gTunes`, in which case Grails takes the appropriate action\
    \ automatically.\n\n***Listing 1-4.** Creating an Application with the `create-app`\
    \ Command*\n\n```\nEnvironment set to development . . .\nApplication name not\
    \ specified. Please enter: gTunes\n```\n\nUpon completion, the command will have\
    \ created the `gTunes` Grails application and the necessary directory structure.\
    \ The next step is to navigate to the newly created application in the command\
    \ window using the shell command:\n\n```\ncd gTunes\n```\n\nAt this point you\
    \ have a clean slate—a newly created Grails application—with the default settings\
    \ in place. A screenshot of the structure of a Grails application appears in [Figure\
    \ 1-2](#Chapter01.html#fig_1_2).\n\nWe will delve deeper into the structure of\
    \ a Grails application and the roles of the various files and directories as we\
    \ progress through the book. Notice, however, how Grails contains directories\
    \ for controllers, domain objects (models), and views.\n\n![Image](images/9781430243779_Fig01-02.jpg)\n\
    \n***Figure 1-2.** The `gTunes` application structure*\n\n#### Step 2: Creating\
    \ a Controller\n\nGrails is an MVC^([1](#Chapter01.html#CHP-1-FN-1)) framework,\
    \ which means it has models, views, and controllers to separate concerns cleanly.\
    \ Controllers, which are central to a Grails application, can easily marshal requests,\
    \ deliver responses, and delegate to views. Because the `gTunes` application centers\
    \ on the concept of a music store, we’ll show how to create a “store” controller.\n\
    \nTo help along the way, Grails features an array of helper commands for creating\
    \ classes that “fit” into the various slots in a Grails application. For example,\
