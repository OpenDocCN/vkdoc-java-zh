    ##### findAll 标签


    通过对象图从集合中收集属性非常方便，但有时你只想遍历那些满足特定条件的值。通常的做法是遍历所有元素并嵌套 `if` 语句。然而，如代码清单 5-13 所示，使用
    `<g:findAll>` 要优雅得多。


    ***代码清单 5-13.** 使用 <g:findAll> 定位特定元素*


    `<g:findAll in="${albums}" expr="${it.songs?.title.contains(''Love'')}">`

    `  <li>${it.title}</li>`

    `</g:findAll>`


    这个例子再次有趣地展示了 GPath（Groovy 的表达式语言）的强大功能。加粗的表达式引用了默认参数 `it`，即当前正在遍历的 `Album` 实例，然后使用
    GPath 获取所有歌曲名称的集合。


    `songs` 属性本身也是一个集合（具体来说是 `java.util.Set`），并且没有 `title` 属性，但 GPath 识别出对 `title`
    属性的引用是试图从 `songs` 属性包含的元素中检索名称属性的集合。


    由于结果是一个集合，你可以调用常规的 JDK `contains` 方法来查找所有标题中包含单词 *Love* 的专辑。结果比一堆嵌套的 `if` 语句可读性强得多，这是另一个例子，展示了像
    GSP 这样的 Groovy 视图技术为何如此合理。


    你已经看到了不少用于执行不同类型逻辑语句和迭代的选项。然而，控制视图的逻辑流程并不是编写视图时的唯一任务。一项常见的活动是链接控制器和操作，接下来你将学习这部分内容。但在此之前，有一点很重要需要注意：这是内置标签的结尾。到目前为止你看到的标签都是由
    GSP 内部处理和优化的。下一节将重点介绍 Grails 动态标签，以及它们与内置标签的区别。


    ### Grails 动态标签


    Grails 中的动态标签是通过称为*标签库*的类提供的，这些类可以在任何 Grails 项目的 `grails-app/taglib` 目录中找到。Grails
    提供了一些开箱即用的标签库，你将在接下来的几节中看到。然后，我们将探讨如何创建自己的标签库。


    首先，你需要了解动态标签与其他标签的不同之处——除了它们由这些库提供之外。从根本上说，它们的使用方式与其他任何标签一样。例如，你可以像之前看到的内置标签一样使用
    `<g:link>` 标签，而无需任何 `import` 指令。


    更有趣的是，动态标签还可以作为方法从脚本片段和 `GString` 表达式中调用。这为什么有用？为了保持语法简洁和 XML 有效，最好避免在标签属性中嵌套标签。在
    JSP 中，你经常看到像代码清单 5-14 那样的代码，这些代码难以阅读且不是格式良好的标记。


    ***代码清单 5-14.** 不美观的 JSP 示例*


    `<a href="<c:out value="${application.contextPath}" />/show.jsp">A dynamic link</a>`


    显然，由于 GSP 与 JSP 颇为相似的性质，如果没有 Groovy 的动态特性，这个问题可能会被继承下来。那么，如何将 GSP 标签作为方法调用来使用呢？请观察代码清单
    5-15 中的示例。


    ***代码清单 5-15.** 将 GSP 标签作为方法调用的示例*


    `<!-- 使用常规标签 -->`

    `<a href="<g:createLink action="list" />">A dynamic link</a>`

    `<!-- 作为方法调用 -->`

    `<a href="${createLink(action:''list'')}">A dynamic link</a>`


    前面两个示例产生相同的结果。它们都调用了一个名为 `createLink` 的标签，该标签创建一个指向 `list` 操作的链接。第二个示例明显更简洁，并生成了格式良好的标记。此外，标签的主体可以作为最后一个参数提供给方法调用。


    你可以在脚手架生成的 `create` 和 `edit` 视图中看到这样一个实际示例。作为表单验证的一部分，这些视图通过用红色框包围有问题的字段来突出显示它。这是通过
    `hasErrors` 标签实现的，该标签会评估特定 bean 字段是否有任何验证错误，如果字段包含错误，则会在外层 `div` 元素上设置一个 CSS 类，其名称是最后一个参数（参见代码清单
    5-16）。


    ***代码清单 5-16.** 字段验证示例*


    `<div class="${hasErrors(bean:album,field:''title''`*`,`*`''errors'')}">`

    `</div>`


    这些只是几个例子。你很快就会看到，你可以创建自己的标签，并以同样的方式调用它们。不过，首先让我们浏览一下已经可用的标签，从链接标签开始。


    #### 链接标签


    随着创建了大量的控制器和操作，记住链接到它们的 URL 模式可能会变得有些困难。此外，根据你部署的环境，应用程序的上下文路径可能会发生变化。那么，如何确保始终以一致的方式链接到正确的位置呢？幸运的是，Grails
    提供了许多标签来优雅地处理链接，第一个就是恰如其名的 `<g:link>`。

