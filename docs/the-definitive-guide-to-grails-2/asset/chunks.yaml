    \ uses Convention *over* Configuration, which means that conventions are used\
    \ to ease development, but configuration is still possible if required. Later\
    \ in this chapter you’ll see an example that uses the Grails `ConfigObject`, which\
    \ is obtainable using the `getConfig()` method of the `GrailsApplication` class.\n\
    \nFinally, the `onShutdown` event is fired when the `shutdown()` method of the\
    \ `GrailsPluginManager` is called. This happens, for example, when a Grails application\
    \ is undeployed from a container and the Grails servlet’s `destroy()` method is\
    \ invoked.\n\n## Modifying the Generated WAR Descriptor\n\nAs discussed in [Chapter\
    \ 12](#Chapter12.html#ch12), the `web.xml` file Grails uses to integrate with\
