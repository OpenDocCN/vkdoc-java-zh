    \      Album.countByGenre(genre)\n    }\n}\n```\n\n请记住，要使该代码正常工作，您需要安装 JMX 和 Axis2\
    \ 插件。\n\n暴露 Grails 服务是允许应用程序访问 Grails 应用程序内部业务逻辑的好方法。实际上，您可以构建一个仅包含服务层的 Grails\
    \ 应用程序。该应用程序可能仅包含提供数据访问的领域类和服务，类似于前面展示的`StoreService`。该应用程序不一定需要任何控制器、视图或其他任何东西。\n\
    \n### 总结\n\n服务是几乎所有重要的 Grails 应用程序中的重要组件，应用程序的大部分业务逻辑和复杂性都归属于它们。\n\n在本章中，您了解了\
    \ Grails 如何通过鼓励将复杂性隔离到服务中来帮助简化应用程序。您学习了如何轻松利用 Spring 依赖注入功能的强大之处，而无需编写配置文件来配置\
    \ Spring。\n\n您还了解了事务管理如何与 Grails 服务协同工作。对于大多数场景，默认的方法级事务划分是完美的选择。对于应用程序需要对事务进行更细粒度控制的场景，Grails\
    \ 提供了一种非常简单的机制来处理它们。\n\n通过使用任意数量的远程技术来暴露 Grails 服务，您应该养成利用 Grails 服务提供的强大功能和灵活性的习惯。如果您这样做，您的应用程序将更易于编写、更易于理解、更易于维护和更易于测试。\n\
    \n## 第 11 章\n\n![Image](images/3squ.jpg)\n\n## 集成与依赖管理\n\n到目前为止，我们已经探讨了支撑 Grails\
    \ 的许多核心概念。从控制器到 GORM 和服务，您现在应该对 Grails 的运作方式有了相当好的理解。在本章中，您将学习如何将 Grails 集成到您现有的生态系统中。我们希望您能从本章中很好地理解如何将\
    \ Grails 纳入您的构建系统、开发工具、报告设置和服务器环境。\n\n内容很多，让我们从仔细研究 Grails 中的配置开始。\n\n### Grails\
    \ 与配置\n\n通过使用“约定优于配置”（CoC），Grails 显著减少了您需要进行的配置量。然而，关键的是，它是约定*优于*配置，而不是约定*代替*配置。仍然有多种不同的方式来配置\
    \ Grails。\n\n大多数配置可以使用 Grails 内部的中央配置机制来完成。文件`grails-app/conf/Config.groovy`包含应用程序的许多配置细节。您已经在本书的各个地方看到过这个文件的使用。在接下来的部分中，我们将更深入地了解如何使用`Config.groovy`来配置\
    \ Grails，以及有哪些配置选项可供您使用。\n\n#### 配置基础\n\n`Config.groovy`文件是一个 Groovy 脚本，类似于常规的\
    \ Java 属性文件。您可以使用点解引用运算符来设置其属性：\n\n`grails.mime.file.extensions = true`\n\n由于它是一个\
    \ Groovy 脚本，所有类型信息都会被保留。因此，在前面的示例中，一个名为`grails.mime.file.extensions`的布尔属性被设置为`true`。要访问此设置，请使用控制器和视图中可用的`grailsApplication`对象的`config`属性：\n\
    \n`assert grailsApplication.config.grails.mime.file.extensions == true`\n\n除了像`grails.mime.file.extensions`设置这样在单行上指定的设置外，Groovy\
    \ 还支持使用块进行分组设置（参见[清单 11-1](#Chapter11.html#list_11_1)）。\n\n***清单 11-1.** 在 Config.groovy\
    \ 中分组设置*\n\n```\ngrails.mime {\n   file.extensions = true\n   types = [html: 'text/html']\n\
    }\n```\n\n[清单 11-1](#Chapter11.html#list_11_1) 中的示例将在`config`中生成两个条目：`grails.mime.file.extensions`和`grails.mime.types`。您还可以按环境进行配置设置。这将在接下来介绍。"
  raw: 'The `com.sun.management.jmxremote` system property must be set when the Grails
    application starts. If the property is set after the Grails application has started,
    the application will not be affected.


    Versions 5.0 and later of the J2SE include the Java Monitoring and Management
    Console, known as JConsole. The JConsole application is a GUI tool for interacting
    with beans that have been exposed using JMX.


    With your Grails application up and running, start JConsole by running the `jconsole`
    command at a command prompt. The application should open with the dialog box shown
    in [Figure 10-1](#Chapter10.html#fig_10_1).


    This dialog box allows selection of the agent you want to connect to. Typically
    you will see just one agent in the list. Find your Grails application in the list,
    select it, and click the Connect button.


    Once you have connected to an agent, the main JConsole window should appear, as
    shown in [Figure 10-2](#Chapter10.html#fig_10_2).


    ![Image](images/9781430243779_Fig10-01.jpg)


    ***Figure 10-1.** The Connect to Agent dialog box in JConsole*


    ![Image](images/9781430243779_Fig10-02.jpg)


    ***Figure 10-2.** The main JConsole window*


    The main screen displays a lot of information about the Grails process. Click
    the MBeans tab at the top of the screen to view all the accessible beans. On that
    screen, you should see a list of all of your JMX-exposed services under the `gtunes/service`
    folder on the left, as shown in [Figure 10-3](#Chapter10.html#fig_10_3).


    ![Image](images/9781430243779_Fig10-03.jpg)


    ***Figure 10-3.** Grails services exposed using JMX*


    Expand the Operations folder under StoreService. This will list all the operations
    that have been exposed by this bean, including all the methods defined in your
    service, as shown in [Figure 10-4](#Chapter10.html#fig_10_4).


    Notice that for operations that require parameters, JConsole provides a text box,
    where the value of the parameter is defined. Once that value is filled in, click
    the button that contains the operation name. The operation will be invoked remotely,
    and the return value will be displayed.


    ![Image](images/9781430243779_Fig10-04.jpg)


    ***Figure 10-4.** JMX operations*


    The JMX plug-in is one of several Grails plug-ins that support exposing services
    using various remoting technologies. There is an XML-RPC plug-in, as well as a
    Remoting plug-in that allows services to be exposed via RMI, Hessian, Burlap,
    and Spring’s `HttpInvoker`. The Cxf  and Axis2 plug-ins each support exposing
    services via SOAP.


    All of the remoting plug-ins use the same `expose` property in a service class
    as the trigger for exposing a service using any particular technology. [Listing
    10-19](#Chapter10.html#list_10_19) shows how you would expose the `StoreService`
    using JMX and Axis2.


    ***Listing 10-19.** Exposing a Service Using JMX and Axis2*


    `package com.gtunes`

    `class StoreService {`

    `    static transactional = true`

    `    static expose = [''jmx'', ''axis2'']`

    `    int getNumberOfAlbums() {`

    `        Album.count()`

    `    }`

    `    int getNumberOfAlbumsForGenre(String genre) {`

    `        Album.countByGenre(genre)`

    `    }`

    `}`


    Remember that in order for that code to work, you need to have the JMX and Axis2
    plug-ins installed.


    Exposing Grails services is a great way to allow applications to access business
    logic inside a Grails application. In fact, you could build a Grails application
    that is just a service layer. That application might consist of nothing more than
    domain classes and services that provide access to the data, similar to the `StoreService`
    shown earlier. The application would not necessarily need to have any controllers,
    any views, or anything else.


    ### Summary


    Services, important components in almost any nontrivial Grails application, are
    where much of the application’s business logic and complexity belong.


    In this chapter, you saw how Grails helps simplify an application by encouraging
    the isolation of that complexity into services. You learned how you can easily
    take advantage of the power of Spring’s dependency injection capabilities without
    the burden of having to write configuration files to instrument Spring.


    You also saw how transaction management works with respect to Grails services.
    For most scenarios, the default method-level transaction demarcation is a perfect
    fit. For scenarios where the application needs more fine-grained control over
    transactions, Grails provides a really simple mechanism for dealing with them.


    With so many options for exposing Grails services, using any number of remoting
    technologies, you should make a habit of taking advantage of the power and flexibility
    that Grails services provide. If you do, your applications will be easier to write,
    easier to understand, easier to maintain, and easier to test.


    ## CHAPTER 11


    ![Image](images/3squ.jpg)


    ## Integration and Dependency Management


    So far, a number of the core concepts that underpin Grails have been explored.
    From controllers to GORM and services, you should now have a pretty good understanding
    of what makes Grails tick. In this chapter, you’ll learn how you can fit Grails
    into your existing ecosystem. We hope what you’ll get from this chapter is a good
    understanding of how to go about including Grails in your build system, development
    tools, reporting setup, and server environment.


    There is a lot of ground to cover, so let’s get started by taking a closer look
    at configuration in Grails.


    ### Grails and Configuration


    Using Convention over Configuration (CoC), Grails significantly reduces the amount
    of configuration you need to do. Crucially, however, it is convention *over* configuration,
    not convention instead of configuration. There are still a number of different
    ways you can configure Grails.


    Most configuration can be done using the central configuration mechanism within
    Grails. The file `grails-app/conf/Config.groovy` contains many configuration details
    for the application. You’ve already seen this file being used at various points
    throughout the book. In the following sections, we’ll look closer at how you use
    `Config.groovy` to configure Grails and what configuration options are available
    to you.


    #### Configuration Basics


    The `Config.groovy` file is a Groovy script similar to a regular Java properties
    file. You can set its properties using the dot dereference operator:


    `grails.mime.file.extensions = true`


    Since it’s a Groovy script, all the type information is retained. So in the previous
    example a Boolean property called `grails.mime.file.extensions` is set to `true`.
    To access this setting, use the `config` property of the `grailsApplication` object
    available in controllers and views:


    `assert grailsApplication.config.grails.mime.file.extensions == true`


    Besides settings specified on a single line, like the `grails.mime.file.extensions`
    setting, Groovy also supports group settings using blocks (see [Listing 11-1](#Chapter11.html#list_11_1)).


    ***Listing 11-1.** Grouping Settings in Config.groovy*


    `grails.mime {`

    `   file.extensions = true`

    `   types = [html: ''text/html'']`

    `}`


    The example in [Listing 11-1](#Chapter11.html#list_11_1) will produce two entries
    in `config: grails.mime.file. extensions` and `grails.mime.types`. You can also
    configure settings on a per-environment basis. That will be covered next.'
