    \ return two different hash codes even though they share the same database identifier!\n\
    \nTo get around this problem, you could use the database identifier, but this\
    \ is not recommended, because a transient object that then becomes persistent\
    \ will return different hash codes over time. This breaks the contract defined\
    \ by the `hashCode` method, which states that the `hashCode` implementation must\
    \ return the same integer for the lifetime of the object. The recommended approach\
    \ is to use Groovy’s `equals` and `hashcode` AST transformation to generate appropriate\
    \ `equals` and `hashcode` methods. Marking a class with the `@EqualsAndHashCode`\
    \ annotation will trigger this transformation. See [`http://groovy.codehaus.org/api/groovy/transform/EqualsAndHashCode.html`](http://groovy.codehaus.org/api/groovy/transform/EqualsAndHashCode.html)\
    \ for more information on the annotation. [Listing 9-57](#Chapter09.html#list_9_57)\
    \ shows an example implementation.\n\n**Listing 9-57.** Implementing `equals`\
    \ and `hashCode`\n\n```\n@groovy.transform.EqualsAndHashCode\nclass Album {\n\
    \    ...\n}\n```\n\nAn important thing to remember is that you need to implement\
    \ `equals` and `hashCode` only if you are:\n\n- using detached instances extensively;\n\
    - placing the detached instances into data structures, like the `Set` and `Map`\
