    attribute is specified but no `action` attribute is specified, the tag will link
    to the default action of the controller. If, on the other hand, an `action` attribute
    is specified but no `controller` attribute is specified, the *currently executing*
    controller will be linked to.


    Beyond the previous attributes, the `<g:link>` tag also supports all attributes
    that the regular HTML anchor tag supports, which can be added as required.


    It’s time for some examples. Using `<g:link>` is pretty simple and intuitive,
    and of course the values of the attributes could just as well be expressions of
    the `${...}` kind if dynamic linking is required (see [Listing 5-17](#Chapter05.html#list_5_17)).


