- fmt: "### What Is Scaffolding?\n\nScaffolding is a Grails feature that allows you\
    \ to quickly generate CRUD interfaces for an existing domain. It offers several\
    \ benefits, the most significant of which is that it serves as a superb learning\
    \ tool, allowing you to relate how the Grails controller and view layers interact\
    \ with the domain model that you created.\n\nYou should note, however, that Grails\
    \ is not just a CRUD framework. And scaffolding, although a useful feature in\
    \ your repertoire, is not the main benefit of Grails. If you’re looking for a\
    \ framework that provides purely CRUD-oriented features, better options are at\
    \ your disposal.\n\nAs with a lot of Grails features, scaffolding is best demonstrated\
    \ visually, so let’s plunge right in and see what can be done.\n\n### Creating\
    \ a Domain\n\nGrails’s domain classes serve as the heart of your application and\
    \ business-model concepts. If you were constructing a bookstore application, for\
    \ example, you would be thinking about books, authors, and publishers. With gTunes\
    \ you have albums, artists, songs, and other things in mind.\n\nThe most significant\
    \ attribute that differentiates domain classes from other artifacts within a Grails\
    \ application is that they are persistent and that Grails automatically maps each\
    \ domain class onto a physical table in the configured database. (There will be\
    \ more about how to change the database setup later in the chapter.)\n\nThe act\
    \ of mapping classes onto a relational database layer is also known as object-relational\
    \ mapping (ORM). The Grails ORM layer, called GORM, is built on the ever-popular\
    \ Hibernate library ([`http://www.hibernate.org`](http://www.hibernate.org)).\n\
    \nDomain classes reside snugly in the `grails-app/domain` directory. You create\
    \ a domain class by using either the `create-domain-class` command from within\
    \ interactive mode or your favorite IDE or text editor. Type the helper command\
    \ shown in [Listing 2-1](#Chapter02.html#list_2_1) into a command window from\
    \ the root of the gTunes project.\n\n**Listing 2-1.** Creating the Song Domain\
    \ Class\n\n```\ngrails> create-domain-class com.gtunes.Song\n| Created file grails-app/domain/com/gtunes/Song.groovy\n\
    | Created file test/unit/com/gtunes/SongTests.groovy\ngrails>\n```\n\n[Listing\
    \ 2-1](#Chapter02.html#list_2_1) shows that you’ll be using a package to hold\
    \ your domain classes. Groovy follows exactly the same packaging rules as Java,\
    \ and as with Java, it is good practice to use packages. You might not see the\
    \ benefit of packages in the beginning, but as your application grows and you\
    \ begin taking advantage of Grails plug-ins and integrating more Java code, you\
    \ will appreciate the organization that they provide (for more about plug-ins,\
    \ see Chapter 13).\n\nOnce the command in [Listing 2-1](#Chapter02.html#list_2_1)\
    \ completes, the result will be a new `Song` domain class located in the `grails-app/domain/com/gtunes`\
    \ directory, as dictated by the package prefix specified. [Figure 2-1](#Chapter02.html#fig_2_1)\
    \ shows the newly created structure and the `Song.groovy` file containing the\
    \ domain class definition.\n\n![Image](images/9781430243779_Fig02-01.jpg)\n\n\
    **Figure 2-1.** The Song domain class and the Song.groovy file\n\nCurrently, the\
    \ `Song` domain isn’t doing a great deal; it’s simply a blank class definition,\
    \ as shown in [Listing 2-2](#Chapter02.html#list_2_2).\n\n**Listing 2-2.** The\
    \ Song Domain Class\n\n```\npackage com.gtunes\nclass Song {\n    static constraints\
    \ = {\n    }\n}\n```\n\nAt this point, you should think about what aspects make\
    \ up a “Song”. A Song typically has a title and an artist, among other things.\
    \ If you really want to go overboard, you could model your `Song` domain class\
    \ on all the fields you can populate in an MP3 file’s ID3 tag. But in this case\
    \ keep it simple: add only the two previously mentioned properties, as shown in\
    \ [Listing 2-3](#Chapter02.html#list_2_3).\n\n**Listing 2-3.** Adding Properties\
    \ to the Song Domain Class\n\n```\npackage com.gtunes\nclass Song {\n    String\
    \ title\n    String artist\n\n    static constraints = {\n        title blank:\
    \ false\n        artist blank: false\n    }\n}\n```\n\nThat was simple enough,\
    \ and the class doesn’t look much different from your typical Groovy bean (see\
    \ the Appendix for information about Groovy beans). GORM essentially maps the\
    \ class name onto the table name and each property onto a separate column in the\
    \ database, with their types relating to SQL types. Don’t get too hung up on this\
    \ now; we’ll be digging more deeply into domain classes and GORM in Chapters 3\
    \ and 10. Also, the code in the constraints block will be discussed in more detail\
    \ in [Chapter 9](#Chapter09.html). For the moment, let’s move on to seeing the\
    \ application in action.\n\n### Introducing Dynamic Scaffolding\n\nScaffolding\
    \ comes in two flavors: dynamic (or runtime) and static (or template-driven).\
    \ First, we’ll look at dynamic scaffolding, where a CRUD application’s controller\
    \ logic and views are generated at runtime. Dynamic scaffolding does not involve\
    \ boilerplate code or templates; it uses advanced techniques such as reflection\
    \ and Groovy’s metaprogramming capabilities to achieve its goals. However, before\
    \ you can dynamically scaffold your `Song` class, you need a controller.\n\nYou\
    \ had a brief introduction to creating controllers in [Chapter 1](#Chapter01.html),\
    \ and the controller code necessary to enable scaffolding is minimal. Create the\
    \ scaffolded controller for the `Song` class either manually or via the command\
    \ line, as shown in [Listing 2-4](#Chapter02.html#list_2_4).\n\n**Listing 2-4.**\
    \ Creating the SongController\n\n```\ngrails> create-scaffold-controller com.gtunes.Song\n\
    | Created file grails-app/controllers/com/gtunes/SongController.groovy\n| Created\
    \ file grails-app/views/song\n| Created file test/unit/com/gtunes/SongControllerTests.groovy\n\
    grails>\n```\n\nAgain, you should use the package prefix with the `create-controller`\
    \ command, which will create the `SongController` within the `grails-app/controllers/com/gtunes`\
    \ directory (see [Figure 2-2](#Chapter02.html#fig_2_2)).\n\n![Image](images/9781430243779_Fig02-02.jpg)\n\
    \n**Figure 2-2.** Locating the SongController in the directory\n\nTo enable dynamic\
    \ scaffolding, the `SongController` defines a `scaffold` property with a value\
    \ of `true`, as shown in [Listing 2-5](#Chapter02.html#list_2_5).\n\n**Listing\
    \ 2-5.** Enabling Dynamic Scaffolding\n\n```\npackage com.gtunes\nclass SongController\
    \ {\n   static scaffold = true\n}\n```\n\n![Image](images/square.jpg) **Note**\
    \ Groovy automatically resolves class names, such as `Song` in [Listing 2-5](#Chapter02.html#list_2_5),\
    \ to the `java.lang.Class` instance without requiring the `.class` suffix. In\
    \ other words `Song` = `Song.class`.\n\nWith that done, simply start up Grails\
    \ with the `grails run-app` command, open a browser, and navigate to the gTunes\
    \ application at the usual link: [`http://localhost:8080/gTunes`](http://localhost:8080/gTunes).\n\
    \nThe Grails welcome page, first demonstrated in [Chapter 1](#Chapter01.html),\
    \ will show the `SongController` instance in the list of available controllers,\
    \ as well as the usual comforting welcome message. Click the `SongController`\
    \ link to pull up a page listing all the `Song` objects (there may be none, of\
    \ course), as depicted in [Figure 2-3](#Chapter02.html#fig_2_3).\n\n![Image](images/9781430243779_Fig02-03.jpg)\n\
    \n**Figure 2-3.** The Song List page\n\nWithout breaking a sweat and in a grand\
    \ total of three lines of code (excluding the package declaration), you have managed\
    \ to create a useful CRUD interface, one that lets you create and fully manage\
    \ the `Song` instances within the gTunes application. Each of the components of\
    \ CRUD (Create, Read, Update and Delete) is described in the rest of this section."
  raw: '### What Is Scaffolding?


    Scaffolding is a Grails feature that allows you to quickly generate CRUD interfaces
    for an existing domain. It offers several benefits, the most significant of which
    is that it serves as a superb learning tool, allowing you to relate how the Grails
    controller and view layers interact with the domain model that you created.


    You should note, however, that Grails is not just a CRUD framework. And scaffolding,
    although a useful feature in your repertoire, is not the main benefit of Grails.
    If you’re looking for a framework that provides purely CRUD-oriented features,
    better options are at your disposal.


    As with a lot of Grails features, scaffolding is best demonstrated visually, so
    let’s plunge right in and see what can be done.


    ### Creating a Domain


    Grails’s domain classes serve as the heart of your application and business-model
    concepts. If you were constructing a bookstore application, for example, you would
    be thinking about books, authors, and publishers. With gTunes you have albums,
    artists, songs, and other things in mind.


    The most significant attribute that differentiates domain classes from other artifacts
    within a Grails application is that they are persistent and that Grails automatically
    maps each domain class onto a physical table in the configured database. (There
    will be more about how to change the database setup later in the chapter.)


    The act of mapping classes onto a relational database layer is also known as object-relational
    mapping (ORM). The Grails ORM layer, called GORM, is built on the ever-popular
    Hibernate library ([`http://www.hibernate.org`](http://www.hibernate.org)).


    Domain classes reside snugly in the `grails-app/domain` directory. You create
    a domain class by using either the `create-domain-class` command from within interactive
    mode or your favorite IDE or text editor. Type the helper command shown in [Listing
    2-1](#Chapter02.html#list_2_1) into a command window from the root of the gTunes
    project.


    ***Listing 2-1.** Creating the Song Domain Class*


    `grails> create-domain-class com.gtunes.Song`

    `| Created file grails-app/domain/com/gtunes/Song.groovy`

    `| Created file test/unit/com/gtunes/SongTests.groovy`

    `grails>`


    [Listing 2-1](#Chapter02.html#list_2_1) shows that you’ll be using a package to
    hold your domain classes. Groovy follows exactly the same packaging rules as Java,
    and as with Java, it is good practice to use packages. You might not see the benefit
    of packages in the beginning, but as your application grows and you begin taking
    advantage of Grails plug-ins and integrating more Java code, you will appreciate
    the organization that they provide (for more about plug-ins, see Chapter 13).


    Once the command in [Listing 2-1](#Chapter02.html#list_2_1) completes, the result
    will be a new `Song` domain class located in the `grails-app/domain/com/gtunes`
    directory, as dictated by the package prefix specified. [Figure 2-1](#Chapter02.html#fig_2_1)
    shows the newly created structure and the `Song.groovy` file containing the domain
    class definition.


    ![Image](images/9781430243779_Fig02-01.jpg)


    ***Figure 2-1.** The Song domain class and the Song.groovy file*


    Currently, the `Song` domain isn’t doing a great deal; it’s simply a blank class
    definition, as shown in [Listing 2-2](#Chapter02.html#list_2_2).


    ***Listing 2-2.** The Song Domain Class*


    `package com.gtunes`

    `class Song {`

    `    static constraints = {`

    `    }`

    `}`


    At this point, you should think about what aspects make up a “Song”. A Song typically
    has a title and an artist, among other things. If you really want to go overboard,
    you could model your `Song` domain class on all the fields you can populate in
    an MP3 file’s ID3 tag. But in this case keep it simple: add only the two previously
    mentioned properties, as shown in [Listing 2-3](#Chapter02.html#list_2_3).


    ***Listing 2-3.** Adding Properties to the Song Domain Class*


    `package com.gtunes`

    `class Song {`

    `    String title`

    `    String artist`


    `    static constraints = {`

    `        title blank: false`

    `        artist blank: false`

    `    }`

    `}`


    That was simple enough, and the class doesn’t look much different from your typical
    Groovy bean (see the Appendix for information about Groovy beans). GORM essentially
    maps the class name onto the table name and each property onto a separate column
    in the database, with their types relating to SQL types. Don’t get too hung up
    on this now; we’ll be digging more deeply into domain classes and GORM in Chapters
    3 and 10. Also, the code in the constraints block will be discussed in more detail
    in [Chapter 9](#Chapter09.html). For the moment, let’s move on to seeing the application
    in action.


    ### Introducing Dynamic Scaffolding


    Scaffolding comes in two flavors: dynamic (or runtime) and static (or template-driven).
    First, we’ll look at dynamic scaffolding, where a CRUD application’s controller
    logic and views are generated at runtime. Dynamic scaffolding does not involve
    boilerplate code or templates; it uses advanced techniques such as reflection
    and Groovy’s metaprogramming capabilities to achieve its goals. However, before
    you can dynamically scaffold your `Song` class, you need a controller.


    You had a brief introduction to creating controllers in [Chapter 1](#Chapter01.html),
    and the controller code necessary to enable scaffolding is minimal. Create the
    scaffolded controller for the `Song` class either manually or via the command
    line, as shown in [Listing 2-4](#Chapter02.html#list_2_4).


    ***Listing 2-4.** Creating the SongController*


    `grails> create-scaffold-controller com.gtunes.Song`

    `| Created file grails-app/controllers/com/gtunes/SongController.groovy`

    `| Created file grails-app/views/song`

    `| Created file test/unit/com/gtunes/SongControllerTests.groovy`

    `grails>`


    Again, you should use the package prefix with the `create-controller` command,
    which will create the `SongController` within the `grails-app/controllers/com/gtunes`
    directory (see [Figure 2-2](#Chapter02.html#fig_2_2)).


    ![Image](images/9781430243779_Fig02-02.jpg)


    ***Figure 2-2.** Locating the SongController in the directory*


    To enable dynamic scaffolding, the `SongController` defines a `scaffold` property
    with a value of `true`, as shown in [Listing 2-5](#Chapter02.html#list_2_5).


    ***Listing 2-5.** Enabling Dynamic Scaffolding*


    `package com.gtunes`

    `class SongController {`

    `   static scaffold = true`

    `}`


    ![Image](images/square.jpg) **Note**  Groovy automatically resolves class names,
    such as `Song` in [Listing 2-5](#Chapter02.html#list_2_5), to the `java.lang.Class`
    instance without requiring the `.class` suffix. In other words `Song` = `Song.class`.


    With that done, simply start up Grails with the `grails run-app` command, open
    a browser, and navigate to the gTunes application at the usual link: [`http://localhost:8080/gTunes`](http://localhost:8080/gTunes).


    The Grails welcome page, first demonstrated in [Chapter 1](#Chapter01.html), will
    show the `SongController` instance in the list of available controllers, as well
    as the usual comforting welcome message. Click the `SongController` link to pull
    up a page listing all the `Song` objects (there may be none, of course), as depicted
    in [Figure 2-3](#Chapter02.html#fig_2_3).


    ![Image](images/9781430243779_Fig02-03.jpg)


    ***Figure 2-3.** The Song List page*


    Without breaking a sweat and in a grand total of three lines of code (excluding
    the package declaration), you have managed to create a useful CRUD interface,
    one that lets you create and fully manage the `Song` instances within the gTunes
    application. Each of the components of CRUD (Create, Read, Update and Delete)
    is described in the rest of this section.'
  trans: '

    ### 什么是脚手架？


    脚手架是 Grails 的一项功能，允许你为现有领域类快速生成 CRUD 接口。它提供了若干好处，其中最重要的是，它作为一个极佳的学习工具，能让你理解 Grails
    控制器和视图层如何与你创建的领域模型进行交互。


    然而，你应该注意，Grails 不仅仅是一个 CRUD 框架。脚手架虽然是你技能库中的一个有用功能，但并非 Grails 的主要优势。如果你正在寻找一个纯粹提供
    CRUD 导向功能的框架，那么有更好的选择可供你使用。


    与 Grails 的许多功能一样，脚手架最好通过可视化方式演示，所以让我们直接深入，看看能实现什么。


    ### 创建领域类


    Grails 的领域类是应用程序和业务模型概念的核心。例如，如果你正在构建一个书店应用程序，你会考虑书籍、作者和出版商。而在 gTunes 中，你会考虑专辑、艺术家、歌曲以及其他内容。


    领域类与 Grails 应用程序中其他工件最显著的区别在于，它们是持久化的，并且 Grails 会自动将每个领域类映射到已配置数据库中的一张物理表上。（本章稍后将详细介绍如何更改数据库设置。）


    将类映射到关系数据库层的操作也称为对象关系映射（ORM）。Grails 的 ORM 层称为 GORM，它构建在广受欢迎的 Hibernate 库（[`http://www.hibernate.org`](http://www.hibernate.org)）之上。


    领域类整齐地存放在 `grails-app/domain` 目录中。你可以通过在交互模式下使用 `create-domain-class` 命令，或使用你喜欢的
    IDE 或文本编辑器来创建领域类。在 gTunes 项目的根目录下，将 清单 2-1 中显示的辅助命令输入到命令窗口中。


    ***清单 2-1.** 创建 Song 领域类*


    `grails> create-domain-class com.gtunes.Song`

    `| Created file grails-app/domain/com/gtunes/Song.groovy`

    `| Created file test/unit/com/gtunes/SongTests.groovy`

    `grails>`


    清单 2-1 显示你将使用一个包来存放你的领域类。Groovy 遵循与 Java 完全相同的打包规则，并且与 Java 一样，使用包是一种良好的实践。一开始你可能看不到包的好处，但随着应用程序的增长，并且你开始利用
    Grails 插件并集成更多 Java 代码时，你会欣赏它们所提供的组织结构（有关插件的更多信息，请参见第 13 章）。


    一旦 清单 2-1 中的命令执行完毕，结果将是一个新的 `Song` 领域类，位于 `grails-app/domain/com/gtunes` 目录中，正如指定的包前缀所规定的那样。图
    2-1 显示了新创建的结构以及包含领域类定义的 `Song.groovy` 文件。


    ![Image](img/9781430243779_Fig02-01.jpg)


    ***图 2-1.** Song 领域类和 Song.groovy 文件*


    目前，`Song` 领域类并没有做太多事情；它只是一个空白的类定义，如 清单 2-2 所示。


    ***清单 2-2.** Song 领域类*


    `package com.gtunes`

    `class Song {`

    `    static constraints = {`

    `    }`

    `}`


    此时，你应该思考一下“歌曲”由哪些方面构成。一首歌曲通常有标题和艺术家等属性。如果你真的想做得过火，你可以根据 MP3 文件 ID3 标签中所有可填充的字段来建模你的
    `Song` 领域类。但在这里，我们保持简单：只添加前面提到的两个属性，如 清单 2-3 所示。


    ***清单 2-3.** 向 Song 领域类添加属性*


    `package com.gtunes`

    `class Song {`

    `    String title`

    `    String artist`


    `    static constraints = {`

    `        title blank: false`

    `        artist blank: false`

    `    }`

    `}`


    这已经足够简单了，这个类看起来与你典型的 Groovy Bean 没有太大区别（关于 Groovy Bean 的信息，请参见附录）。GORM 基本上将类名映射到表名，并将每个属性映射到数据库中的一个单独列，其类型与
    SQL 类型相关。现在不要太纠结于此；我们将在第 3 章和第 10 章更深入地探讨领域类和 GORM。此外，约束块中的代码将在第 9 章中更详细地讨论。现在，让我们继续看看应用程序的实际运行情况。


    ### 介绍动态脚手架


    脚手架有两种形式：动态（或运行时）和静态（或模板驱动）。首先，我们将介绍动态脚手架，其中 CRUD 应用程序的控制器逻辑和视图在运行时生成。动态脚手架不涉及样板代码或模板；它使用诸如反射和
    Groovy 元编程能力等高级技术来实现其目标。然而，在你能够动态地为你的 `Song` 类搭建脚手架之前，你需要一个控制器。


    你在第 1 章中已经简要了解了如何创建控制器，而启用脚手架所需的控制器代码非常少。为 `Song` 类创建脚手架控制器，可以手动创建，也可以通过命令行创建，如
    清单 2-4 所示。


    ***清单 2-4.** 创建 SongController*


    `grails> create-scaffold-controller com.gtunes.Song`

    `| Created file grails-app/controllers/com/gtunes/SongController.groovy`

    `| Created file grails-app/views/song`

    `| Created file test/unit/com/gtunes/SongControllerTests.groovy`

    `grails>`


    同样，你应该在 `create-controller` 命令中使用包前缀，这将在 `grails-app/controllers/com/gtunes` 目录中创建
    `SongController`（参见图 2-2）。


    ![Image](img/9781430243779_Fig02-02.jpg)


    ***图 2-2.** 在目录中定位 SongController*


    要启用动态脚手架，`SongController` 需要定义一个值为 `true` 的 `scaffold` 属性，如 清单 2-5 所示。


    ***清单 2-5.** 启用动态脚手架*


    `package com.gtunes`

    `class SongController {`

    `   static scaffold = true`

    `}`


    ![Image](img/square.jpg) **注意**  Groovy 会自动将类名（例如 清单 2-5 中的 `Song`）解析为 `java.lang.Class`
    实例，而无需 `.class` 后缀。换句话说，`Song` 等同于 `Song.class`。


    完成这些后，只需使用 `grails run-app` 命令启动 Grails，打开浏览器，并通过常用链接导航到 gTunes 应用程序：[`http://localhost:8080/gTunes`](http://localhost:8080/gTunes)。


    Grails 欢迎页面（首次在第 1 章中演示）将在可用控制器列表中显示 `SongController` 实例，以及通常令人安心的欢迎消息。点击 `SongController`
    链接，会打开一个列出所有 `Song` 对象（当然，可能一个都没有）的页面，如图 2-3 所示。


    ![Image](img/9781430243779_Fig02-03.jpg)


    ***图 2-3.** Song 列表页面*


    不费吹灰之力，仅用三行代码（不包括包声明），你就成功创建了一个有用的 CRUD 接口，该接口允许你在 gTunes 应用程序中创建并完全管理 `Song`
    实例。CRUD（创建、读取、更新和删除）的每个组件将在本节剩余部分进行描述。

