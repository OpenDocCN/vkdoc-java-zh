  raw: '#### Documenting Your Scripts


    You may have noticed from the script template in [Listing 11-11](#Chapter11.html#list_11_11)
    that the main target has a placeholder for the description of the target:


    `target(main: "The description of the script goes here!") {`


    You can provide additional information about a target, so that others understand
    better how to go about using your script, by assigning a value to the `USAGE`
    property in the script. For example, to give information about the `hello-world`
    script, you could make this modification:


    `includeTargets << grailsScript("_GrailsInit")`


    `target(main: "Prints a Hello message") {`

    `    def message = "Hello ${argsMap.params ? argsMap.params[0] : ''World''}"`

    `    if(argsMap.uppercase) {`

    `        println message.toUpperCase()`

    `    } else {`

    `        println message`

    `    }`

    `}`


    `setDefaultTarget(main)`


    `USAGE = ''''''`

    `    hello-world [-uppercase] [NAME]`


    `where`

    `    -uppercase = Convert the message to all uppercase`

    `    NAME       = The name of the person to say hello to`

    `''''''`


    Then if any other users of your script should need help using the script, they
    can go to the `help` command provided by Grails, as shown in [Listing 11-25](#Chapter11.html#list_11_25).


    ***Listing 11-25.** Getting Help from Gant Scripts*


    `grails> help hello-world`

    `| Environment set to development.....`


    `    grails hello-world -- Prints a Hello message`


    `Usage (optionals in square brackets):`


    `    hello-world [-uppercase] [NAME]`


    `where`

    `    -uppercase = Convert the message to all uppercase`

    `    NAME       = The name of the person to say hello to`

    `grails>`


    #### Reusing More of Grails


    The inclusion of the `GrailsInit.groovy` script in [Listing 11-11](#Chapter11.html#list_11_11)
    is just one example of including an existing Grails script. You can in fact include
    an array of different scripts that provide different features. For example, say
    you want to make sure the tests run before your script is executed. You can include
    the `_GrailsTest.groovy` script and depend on the `allTests` target, as shown
    in [Listing 11-26](#Chapter11.html#list_11_26).


    ***Listing 11-26.** Executing Tests*


    `includeTargets << grailsScript(''_GrailsTest'')`


    `target(main: "The description of the script goes here!") {`

    `    depends allTests`

    `}`


    `setDefaultTarget main`


    Alternatively, if you want to make sure that the container is up and running,
    maybe in order to perform some kind of automated functional tests, you can use
    the `RunApp.groovy` script. This, the same script used when you type `grails run-app`
    at the command line, provides a target called `runApp` that you can use to load
    the Tomcat container embedded in Grails. As an extension to this, the next section
    will look at how to load Grails without even the need for a container.


    #### Bootstrapping Grails from the Command Line


    If you need access to the Grails environment from the command line, you can load
    Grails using the `GRAILS_HOME/scripts/Bootstrap.groovy` script. This will enable
    you, for example, to use GORM from the command line for batch processing.


    To get started, you need to include the following `Bootstrap.groovy` script:


    `includeTargets << grailsScript("_GrailsBootstrap")`

    `and then call the bootstrap target:`

    `bootstrap()`


    Once this is done, a number of new variables will be created including the following:


    > *   `grailsApp`: a reference to the `org.codehaus.groovy.grails.commons.GrailsApplication`
    class, which allows you to inspect the conventions in a running Grails application

    > *   `appCtx`: the Spring `ApplicationContext` instance that contains the bean
    definitions for the Grails application, as found at runtime.

    > *   `servletContext`: a mock implementation of the `ServletContext`, usable
    from the command line.

    > *   `pluginManager`: a reference to the `org.codehaus.groovy.grails.plugins.GrailsPluginManager`
    instance, which allows you to inspect the currently installed plug-ins.


    The most commonly used of these is the `appCtx` variable, which allows access
    to all the beans contained within the Spring `ApplicationContext`. For example,
    if you need to obtain the Hibernate `SessionFactory` and/or SQL `DataSource`,
    you can easily do so using the `appCtx`:


    `DataSource dataSource = appCtx.getBean("dataSource") SessionFactory SessionFactory
    = appCtx.`

    `getBean("sessionFactory")`


    With the basics out of the way, let’s see a couple of examples that show how to
    use Gant to boost your command-line productivity.


    #### Gant in Action


    Printing “Hello World!” to the command window is fun and all, but ultimately it’s
    not very useful. In the following sections, you’ll be looking at a couple of real-world
    Gant scripts. The first is a script that will allow you to quickly deploy to Tomcat.'
