    将应用程序从开发环境迁移到生产或测试服务器时，通常会面临多种选择。部署 Grails 的选项多种多样，从简单到复杂，应有尽有。在接下来的几节中，你将了解部署
    Grails 的不同方式以及如何自定义部署过程。


    #### 使用 Grails 部署


    如果你正在寻找一种简单的部署管理方式，并且不太关心容器的细节调优，那么使用 Grails 本身进行部署无疑是一种简单的方法。要使用 Grails 部署，你只需在目标服务器上安装
