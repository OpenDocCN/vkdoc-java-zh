- fmt: "### Creating a Model\n\nOne of the most fundamental activities carried out\
    \ in a controller is gathering data that will be rendered in the view. A controller\
    \ can gather data directly or delegate to Grails services or other components\
    \ to gather the data. However the controller gathers the data, the data are typically\
    \ made available to the view in the form of a map that the controller action returns.\
    \ When a controller action returns a map, that map represents data that the view\
    \ can reference. [Listing 4-20](#Chapter04.html#list_4_20) displays the `show`\
    \ action of the `SongController`.\n\n**Listing 4-20.** Returning a Map of Data\
    \ to Be Rendered by the View\n\n```\nclass SongController {\n    def show() {\n\
    \        [ song: Song.get(params.id) ]\n    }\n}\n```\n\nRemember that `return`\
    \ statements are optional in Groovy. Because the last expression evaluated in\
    \ the `show` action is a map, the map is the return value from this action. This\
    \ map contains data that will be passed in to the view to be rendered. In [Listing\
    \ 4-14](#Chapter04.html#list_4_14), the sole key in the map is `song` and the\
    \ value associated with that key is a `Song` object retrieved from the database\
    \ based on the `id` request parameter.\n\nNow the view can reference this song.\
    \ Whereas this map contains only a single entry, a map returned from a controller\
    \ action can include as many entries as is appropriate. Every entry represents\
    \ an object that the view can reference.\n\n### Rendering a View\n\nThe subject\
    \ of views in Grails is so important that an entire chapter ([Chapter 5](#Chapter05.html))\
    \ is dedicated to it. But for now, you need to understand how Grails goes about\
    \ view selection from a controller’s point of view. First, let’s look at the default\
    \ view-selection strategy.\n\n#### Finding the Default View\n\nAs you saw in [Listing\
    \ 4-15](#Chapter04.html#list_4_15), the `SongController` has a single action,\
    \ called `show`. The `show` action returns a model containing a single key, called\
    \ `song`, which references an instance of the `Song` domain class. However, nowhere\
    \ in the code can you see any reference to the view that will be used to deal\
    \ with the rendering part of this action.\n\nThat’s perfectly understandable,\
    \ because we haven’t explicitly told Grails what view to render. To mitigate this\
    \ problem, Grails makes that decision for you based on the conventions in the\
    \ application. In the case of the `show` action, Grails will look for a view at\
    \ the location `grails-app/views/song/show.gsp`. The name of the view is taken\
    \ from the name of the action, while the name of the parent directory is taken\
    \ from the controller name. Simple, really.\n\nBut what if you want to display\
    \ a completely different view? The ever-flexible `render` method comes to the\
    \ rescue again.\n\n#### Selecting a Custom View\n\nTo tell Grails to render a\
    \ custom view, you can use the `render` method’s `view` argument, as shown in\
    \ [Listing 4-21](#Chapter04.html#list_4_21).\n\n**Listing 4-21.** Rendering a\
    \ Custom View\n\n```\nclass SongController {\n    def show() {\n        render\
    \ view: \"display\", model: [ song: Song.get(params.id) ]\n    }\n}\n```\n\nNotice\
    \ how you can use the `model` argument to pass in the model rather than the return\
    \ value of the action. In the example in [Listing 4-21](#Chapter04.html#list_4_21),\
    \ we’re asking Grails to render a view called `display`. In this case, Grails\
    \ assumes you mean a view at the location `grails-app/views/song/display.gsp`.\
    \ Notice how the view is automatically scoped with the `grails-app/views/song`\
    \ directory.\n\nIf the view you want to render is in another, possibly shared,\
    \ directory, you can specify an absolute path to the view:\n\n```\nrender view:\"\
    /common/song\", model:[song: Song.get(params.id) ]\n```\n\nBy starting with a\
    \ `/` character, you can reference any view within the `grails-app/views` directory.\
    \ In the previous example, Grails will try to render a view at the location `grails-app/views/common/song.gsp`.\n\
    \n#### Rendering Templates\n\nIn addition to views, Grails supports the notion\
    \ of templates—small snippets of view code that other views can include. We’ll\
    \ be covering templates in more detail in [Chapter 5](#Chapter05.html), but for\
    \ now, just know that you can render a template from a controller using the `render`\
    \ method:\n\n```\nrender template: \"/common/song\", model: [song: Song.get(params.id)\
    \ ]\n```\n\nIn this case, Grails will try to render a template at the location\
    \ `grails-app/views/common/_song.gsp`. Notice how, unlike views, the name of the\
    \ template starts with an underscore by convention."
  raw: '### Creating a Model


    One of the most fundamental activities carried out in a controller is gathering
    data that will be rendered in the view. A controller can gather data directly
    or delegate to Grails services or other components to gather the data. However
    the controller gathers the data, the data are typically made available to the
    view in the form of a map that the controller action returns. When a controller
    action returns a map, that map represents data that the view can reference. [Listing
    4-20](#Chapter04.html#list_4_20) displays the `show` action of the `SongController`.


    ***Listing 4-20.** Returning a Map of Data to Be Rendered by the View*


    `class SongController {`

    `    def show() {`

    `        [ song: Song.get(params.id) ]`

    `    }`

    `}`


    Remember that `return` statements are optional in Groovy. Because the last expression
    evaluated in the `show` action is a map, the map is the return value from this
    action. This map contains data that will be passed in to the view to be rendered.
    In [Listing 4-14](#Chapter04.html#list_4_14), the sole key in the map is `song`
    and the value associated with that key is a `Song` object retrieved from the database
    based on the `id` request parameter.


    Now the view can reference this song. Whereas this map contains only a single
    entry, a map returned from a controller action can include as many entries as
    is appropriate. Every entry represents an object that the view can reference.


    ### Rendering a View


    The subject of views in Grails is so important that an entire chapter ([Chapter
    5](#Chapter05.html)) is dedicated to it. But for now, you need to understand how
    Grails goes about view selection from a controller’s point of view. First, let’s
    look at the default view-selection strategy.


    #### Finding the Default View


    As you saw in [Listing 4-15](#Chapter04.html#list_4_15), the `SongController`
    has a single action, called `show`. The `show` action returns a model containing
    a single key, called `song`, which references an instance of the `Song` domain
    class. However, nowhere in the code can you see any reference to the view that
    will be used to deal with the rendering part of this action.


    That’s perfectly understandable, because we haven’t explicitly told Grails what
    view to render. To mitigate this problem, Grails makes that decision for you based
    on the conventions in the application. In the case of the `show` action, Grails
    will look for a view at the location `grails-app/views/song/show.gsp`. The name
    of the view is taken from the name of the action, while the name of the parent
    directory is taken from the controller name. Simple, really.


    But what if you want to display a completely different view? The ever-flexible
    `render` method comes to the rescue again.


    #### Selecting a Custom View


    To tell Grails to render a custom view, you can use the `render` method’s `view`
    argument, as shown in [Listing 4-21](#Chapter04.html#list_4_21).


    ***Listing 4-21.** Rendering a Custom View*


    `class SongController {`

    `    def show() {`

    `        render view: "display", model: [ song: Song.get(params.id) ]`

    `    }`

    `}`


    Notice how you can use the `model` argument to pass in the model rather than the
    return value of the action. In the example in [Listing 4-21](#Chapter04.html#list_4_21),
    we’re asking Grails to render a view called display. In this case, Grails assumes
    you mean a view at the location `grails-app/views/song/display.gsp`. Notice how
    the view is automatically scoped with the `grails-app/views/song directory.`


    If the view you want to render is in another, possibly shared, directory, you
    can specify an absolute path to the view:


    `render view:"/common/song", model:[song: Song.get(params.id) ]`


    By starting with a / character, you can reference any view within the `grails-app/views`
    directory. In the previous example, Grails will try to render a view at the location
    `grails-app/views/common/song.gsp`.


    #### Rendering Templates


    In addition to views, Grails supports the notion of templates—small snippets of
    view code that other views can include. We’ll be covering templates in more detail
    in [Chapter 5](#Chapter05.html), but for now, just know that you can render a
    template from a controller using the `render` method:


    `render template: "/common/song", model: [song: Song.get(params.id) ]`


    In this case, Grails will try to render a template at the location `grails-app/views/common/_song.gsp`.
    Notice how, unlike views, the name of the template starts with an underscore by
    convention.'
  trans: '

    ### 创建模型


    控制器中最基础的操作之一就是收集将在视图中渲染的数据。控制器可以直接收集数据，也可以委托给 Grails 服务或其他组件来完成。无论控制器如何收集数据，这些数据通常都会以控制器动作返回的映射（map）形式提供给视图。当控制器动作返回一个映射时，该映射代表视图可以引用的数据。代码清单
    4-20 展示了 `SongController` 中的 `show` 动作。


    ***代码清单 4-20.** 返回将由视图渲染的数据映射*


    `class SongController {`

    `    def show() {`

    `        [ song: Song.get(params.id) ]`

    `    }`

    `}`


    请记住，在 Groovy 中 `return` 语句是可选的。由于 `show` 动作中最后一个被求值的表达式是一个映射，因此该映射就是此动作的返回值。这个映射包含的数据将被传递给视图进行渲染。在代码清单
    4-14 中，映射中唯一的键是 `song`，与该键关联的值是基于 `id` 请求参数从数据库中检索到的 `Song` 对象。


    现在，视图可以引用这个 song 对象了。尽管这个映射只包含一个条目，但从控制器动作返回的映射可以包含任意数量的条目，只要合适即可。每个条目都代表视图可以引用的一个对象。


    ### 渲染视图


    Grails 中的视图主题非常重要，以至于专门用了一整章（第 5 章）来讨论。但现在，你需要了解 Grails 是如何从控制器的角度进行视图选择的。首先，我们来看一下默认的视图选择策略。


    #### 查找默认视图


    正如你在代码清单 4-15 中所见，`SongController` 只有一个名为 `show` 的动作。`show` 动作返回一个模型，其中包含一个名为
    `song` 的键，该键引用了一个 `Song` 领域类的实例。然而，在代码中任何地方都看不到对将用于处理此动作渲染部分的视图的引用。


    这完全可以理解，因为我们没有明确告诉 Grails 要渲染哪个视图。为了解决这个问题，Grails 会根据应用程序中的约定为你做出决定。对于 `show`
    动作，Grails 会在 `grails-app/views/song/show.gsp` 位置查找视图。视图的名称取自动作的名称，而父目录的名称则取自控制器名称。真的很简单。


    但是，如果你想显示一个完全不同的视图呢？始终灵活的 `render` 方法再次派上了用场。


    #### 选择自定义视图


    要告诉 Grails 渲染一个自定义视图，你可以使用 `render` 方法的 `view` 参数，如代码清单 4-21 所示。


    ***代码清单 4-21.** 渲染自定义视图*


    `class SongController {`

    `    def show() {`

    `        render view: "display", model: [ song: Song.get(params.id) ]`

    `    }`

    `}`


    请注意，你可以使用 `model` 参数来传递模型，而不是使用动作的返回值。在代码清单 4-21 的示例中，我们要求 Grails 渲染一个名为 display
    的视图。在这种情况下，Grails 会假定你指的是位于 `grails-app/views/song/display.gsp` 的视图。请注意，视图会自动限定在
    `grails-app/views/song` 目录下。


    如果你要渲染的视图位于另一个（可能是共享的）目录中，你可以指定视图的绝对路径：


    `render view:"/common/song", model:[song: Song.get(params.id) ]`


    通过以 `/` 字符开头，你可以引用 `grails-app/views` 目录中的任何视图。在上一个示例中，Grails 将尝试渲染位于 `grails-app/views/common/song.gsp`
    的视图。


    #### 渲染模板


    除了视图之外，Grails 还支持模板的概念——即其他视图可以包含的小段视图代码。我们将在第 5 章中更详细地介绍模板，但现在你只需要知道，你可以使用 `render`
    方法从控制器渲染一个模板：


    `render template: "/common/song", model: [song: Song.get(params.id) ]`


    在这种情况下，Grails 将尝试渲染位于 `grails-app/views/common/_song.gsp` 的模板。请注意，与视图不同，按照约定，模板的名称以下划线开头。

