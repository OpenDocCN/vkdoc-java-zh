    ### 对 URL 映射应用约束


    URL 映射引擎提供了一种非常强大的机制，用于对嵌入在 URL 映射中的变量应用约束。这些约束与应用于领域对象的约束类似。有关领域约束的信息，请参阅第 3
    章中的“验证领域类”一节。对 URL 映射中的变量应用约束，可以大大简化剔除某些无效数据的工作，否则这些数据将不得不在控制器或服务中以命令式方式处理。


    考虑一个用 Grails 编写的博客应用程序。博客系统中 URL 的典型格式可能是 `/grailsblogs/2009/01/15/new_grails_release`。为了支持这样的
    URL，你可以像代码清单 6-12 那样定义一个映射。


    ***代码清单 6-12.** 典型的博客类型 URL 映射*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/grailsblogs/$year/$month/$day/$entry_name?" {`

    `            controller = ''blog''`

    `            action = ''display''`

    `            constraints {`

    `                // 在此处应用约束`

    `            }`

    `        }`

    `        // ...`

    `    }`

    `}`


    有了这样的映射，URL `/grailsblogs/2009/01/15/new_grails_release` 将映射到 `BlogController`
    中的 `display` 操作，请求参数分别为 `year`、`month`、`day` 和 `entry_name`，其值分别为 `2009`、`01`、`15`
    和 `new_grails_release`。


    此映射的一个问题是，它不仅会匹配像 `/grailsblogs/2009/01/15/new_grails_release` 这样的 URL，还会匹配像 `/grailsblogs/grails/rocks/big/time`
    这样的 URL。在这种情况下，控制器操作将收到 `grails` 作为年份的值，`rocks` 作为月份的值，依此类推。处理这种情况会使控制器中的逻辑变得复杂。更好的管理方式是对映射应用约束，让框架知道，例如，`grails`
    不是映射中 `year` 参数的有效匹配项。代码清单 6-13 中指定的约束使用正则表达式来限制 `year`、`month` 和 `day` 参数，使其仅匹配那些包含正确位数且仅为数字的值。


    ***代码清单 6-13.** 对映射参数应用约束*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/grailsblogs/$year/$month/$day/$entry_name?" {`

    `            controller = ''blog''`

    `            action = ''display''`

    `            constraints {`

    `                year matches: /[0-9]{4}/`

    `                month matches: /[0-9]{2}/`

    `                day matches: /[0-9]{2}/`

    `            }`

    `        }`


    `        // ...`

    `    }`

    `}`


    与领域类约束的情况一样，映射参数可以根据需要应用任意数量的约束。所有约束都必须通过，映射才能生效。


    ![Image](img/square.jpg) **注意**  在 URL 映射中指定约束的方式与在领域类中指定约束的方式存在一个小的语法差异。在领域类中，定义了一个
    `constraints` 属性，并为其分配一个闭包作为值。而在 URL 映射中，你是在调用一个名为 `constraints` 的方法，并将一个闭包作为参数传递给它。这就是为什么在
    URL 映射中，`constraints` 和闭包之间不需要等号，而在领域类中，`constraints` 和闭包之间需要等号。


    #### 在映射中包含通配符


    你已经了解了映射如何包含静态文本以及任意数量的变量参数（可选和必需），也了解了如何对变量参数应用约束。在映射定义中，你可以使用的另一个提高灵活性的工具是通配符。通配符表示映射模式中的占位符，它可以匹配任何内容，但不代表会作为请求参数传递的信息。映射定义中的通配符用星号（*）表示。代码清单
    6-14 包含一个带有通配符的映射。


    ***代码清单 6-14.** 映射中的通配符*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/images/*.jpg"(controller:''image'')`


    `        // ...`

    `    }`

    `}`


    此映射将处理对 `/images/` 目录下以 `.jpg` 扩展名结尾的任何文件的请求。例如，此映射将处理 `/images/header.jpg` 和
    `/images/footer.jpg`，但不会匹配 `/images/` 目录下某个子目录中可能存在的 `.jpg` 文件的请求。例如，对 `/images/photos/president.jpg`
    这样的请求将不会匹配。可以使用双通配符来匹配任意数量的子目录。代码清单 6-15 展示了一个双通配符映射。


    ***代码清单 6-15.** 映射中的双通配符*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/images/**.jpg"(controller:''image'')`

    `        // ...`

    `    }`

    `}`


    此映射将匹配对诸如 `/images/header.jpg` 和 `/images/footer.jpg` 以及 `/images/photos/president.jpg`
    等内容的请求。


    在某些情况下，可能希望将匹配通配符的值作为请求参数传递给控制器。这可以通过在映射中的通配符前添加一个变量来实现。请参见代码清单 6-16。


    ***代码清单 6-16.** 映射中带有变量的双通配符*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/images/$pathToFile**.jpg"(controller:''image'')`

    `        // ...`

    `    }`

    `}`


    在这种情况下，`pathToFile` 请求参数将表示 URL 中匹配通配符的部分。例如，对 `/images/photos/president.jpg`
    的请求将导致 `pathToFile` 请求参数的值为 `photos/president`。

