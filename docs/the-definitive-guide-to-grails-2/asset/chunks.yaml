    \   // URL to the plugin's documentation\n    def documentation = \"http://grails.org/plugin/simple-cache\"\
    \n    ...\n}\n```\n\nProperties such as `author`, `title`, and so on, appear in\
    \ the `list-plugins` and `plugin-info` commands when a plug-in is published to\
    \ a Grails plug-in repository. The following list summarizes the available properties\
    \ and what they represent:\n\n> *   `author`: The name of the plug-in author\n\
    > *   `authorEmail`: An e mail contact address for the author\n> *   `title`:\
    \ A short title for the plug-in to appear in the right column of the `list-plugins`\
    \ command (see [Listing 12-2](#Chapter12.html#list_12_2))\n> *   `description`:\
    \ A longer, more detailed description that is displayed by the `plug-in-info`\
    \ command\n> *   `documentation`: A link to the location of the documentation\
    \ for the plug-in\n\nAll the properties in this list are optional; however, providing\
    \ this information will help others understand the purpose of your plug-in. [Listing\
    \ 12-9](#Chapter12.html#list_12_9) shows the `simple-cache` plug-in’s metadata\
    \ information.\n\n**Listing 12-9.** The `simple-cache` Plug-in Descriptor with\
    \ Metadata Provided\n\n```\nclass SimpleCacheGrailsPlugin {\n    // the plugin\
    \ version\n    def version = \"0.1\"\n    // the version or versions of Grails\
    \ the plugin is designed for\n    def grailsVersion = \"2.0 > *\"\n    // the\
    \ other plugins this plugin depends on\n    def dependsOn = [:]\n    // resources\
    \ that are excluded from plugin packaging\n    def pluginExcludes = [\n      \
    \  \"grails-app/views/error.gsp\"\n    ]\n\n    // TODO Fill in these fields\n\
    \    def title = \"Simple Cache Plugin\" // Headline display name of the plugin\n\
    \    def author = \"Jeff Brown\"\n    def authorEmail = \"jbrown@vmware.com\"\n\
    \    def description = '''\\\nA simple demo plugin which provides very simple\
    \ caching services.\nThis plugin is for demonstration purposes only.  For serious\n\
    caching needs, http://grails.org/plugins/cache is a real solution.\n'''\n\n  \
    \  // URL to the plugin's documentation\n    def documentation = http://grails.org/plugin/simple-cache\n\
    \n    ...\n}\n```\n\n### Supplying Application Artefacts\n\nOne of the more obvious\
    \ ways a plug-in can enhance an existing application is by providing a new artefact,\
    \ such as a controller, tag library, or service.\n\nBecause a Grails plug-in is\
    \ simply a Grails application, supplying an artefact is a simple matter of creating\
    \ it, just as you would in a regular application. For the `simple-cache` plug-in,\
    \ you’ll implement a service that provides application-layer caching. To do so,\
    \ simply use the `create-service` command from the root of the plug-in:\n\n```\n\
    $ grails create-service com.cache.Cache\n```\n\nOnce completed, you’ll end up\
    \ with a new service at the location `grails-app/services/com/cache/CacheService.groovy`.\
    \ Because it’s pretty simple to do, you’ll also be implementing a little tag library\
    \ to perform content-level caching. To create the tag library, run the `create-tag-lib`\
    \ command:\n\n```\n$ grails create-tag-lib com.cache.Cache\n```\n\nNote that since\
    \ a Grails plug-in is simply a Grails application, you can run it just like a\
    \ Grails application! Just use the `grails run-app` command, and you’re on your\
    \ way. This has significant benefits for the plug-in developer in that plug-in\
    \ development is not very different from regular application development. You\
    \ can run your plug-in like a regular application, and you can also test your\
    \ plug-in like a regular application using the `test-app` command. You can even\
    \ install other plug-ins into a plug-in, something that is critical when developing\
    \ a plug-in that has dependencies on other plug-ins.\n\nAs for the `CacheService`\
    \ and the `CacheTagLib`, we’ll get to the implementation details of these later.\
    \ For the moment, all you need to know is that when you package up your plug-in\
    \ for distribution, it will provide two new artefacts: a tag library and a service.\n\
    \n### Plug-in Hooks\n\nLet’s return to the plug-in descriptor. As well as providing\
    \ metadata about the plug-in, the descriptor also enables you to supply hooks\
    \ into the plug-in runtime. Each hook is defined as a closure property and allows\
    \ the plug-in to participate in the various phases of the plug-in life cycle.\
    \ The hooks are listed here in the order of their execution:\n\n> *   `doWithWebDescriptor`:\
    \ This gets passed the XML for the `web.xml` file that has been parsed by Groovy’s\
    \ `XmlSlurper` into a `GPathResult`. See the “Modifying the Generated WAR Descriptor”\
    \ section later in the chapter for more information on this one.\n> *   `doWithSpring`:\
    \ This allows participation in the runtime configuration of Grails’ underlying\
    \ Spring `ApplicationContext`. See the “Providing Spring Beans” section for more\
    \ information.\n> *   `doWithDynamicMethods`: Executed after the construction\
    \ of the `ApplicationContext`, this is the hook that plug-ins should use to provide\
    \ new behavior to Grails classes. See the “Using Metaprogramming to Enhance Behavior”\
    \ section later in the chapter for more information.\n> *   `doWithApplicationContext`:\
    \ This is executed after the Grails `ApplicationContext` has been constructed.\
    \ The `ApplicationContext` instance is passed to this hook as the first argument.\n\
    \nBy default, the `simple-cache` plug-in you created earlier comes with empty\
    \ implementations of all of these. If you don’t plan to implement any of these\
    \ hooks, you can simply delete them from the plug-in descriptor. [Listing 12-10](#Chapter12.html#list_12_10)\
    \ shows the various plug-in hooks, just waiting to be implemented.\n\n![Image](images/square.jpg)\
    \ **Note** If you merely want to use plug-ins to provide application modularity,\
    \ you can skip to the “Packaging and Distributing a Grails Plug-in” section. The\
    \ next few sections go into significant detail on how to hook into all aspects\
    \ of the Grails plug-in system.\n\n**Listing 12-10.** Plug-in Hooks in the `simple-cache`\
    \ Plug-in\n\n```\nclass SimpleCacheGrailsPlugin {\n    def version = 0.1\n   \
    \ ...\n    def doWithWebDescriptor = { xml -> }\n    def doWithSpring = {}\n\n\
    \    def doWithDynamicMethods = { applicationContext -> }\n\n    def doWithApplicationContext\
    \ = { applicationContext -> }\n\n}\n```"
