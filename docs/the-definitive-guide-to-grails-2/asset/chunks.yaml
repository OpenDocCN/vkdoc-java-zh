- fmt: "# Caching Service Methods\n\nThe `getAlbumArt` method in the `AlbumArtService`\
    \ class is functional at the moment but could use some improvement. One problem\
    \ with the current implementation is that it is inefficient. Every time the method\
    \ is called, requests are being made to a remote service to retrieve a URL for\
    \ some album art. One thing to do that might help with this is implement some\
    \ sort of caching mechanism, so when the artwork for a particular album is requested,\
    \ a request is made to the remote service to get the relevant artwork URL, which\
    \ then could be cached. So if another request arrives for artwork for that same\
    \ album, instead of making a call to the remote service, the URL can be retrieved\
    \ from the local cache—a much more efficient procedure. Writing efficient and\
    \ reliable caching mechanisms can be complicated. Fortunately, a Grails plug-in\
    \ does all the hard work for you.\n\nYou can install the cache plug-in by adding\
    \ the appropriate dependency declaration to `grails-app/conf/BuildConfig.groovy`,\
    \ as shown in [Listing 10-7](#Chapter10.html#list_10_7).\n\n**Listing 10-7.**\
    \ Declaring a Dependency on the Cache Plug-in\n\n```\n// grails-app/conf/BuildConfig.groovy\n\
    grails.project.dependency.resolution = {\n    // ...\n    plugins {\n        compile\
    \ ':cache:1.0.0'\n        // ...\n    }\n}\n```\n\nWith the plug-in installed,\
    \ you need to tell the plug-in that all calls to the `getAlbumArt` method in the\
    \ `AlbumArtService` class should be cached. The way to do this is to annotate\
    \ the method with the `grails.plugin.cache.Cacheable` annotation, as shown in\
    \ [Listing 10-8](#Chapter10.html#list_10_8).\n\n**Listing 10-8.** Adding Caching\
    \ Support to the `getAlbumArt` Method\n\n```\npackage com.gtunes\n\n// ...\nimport\
    \ grails.plugin.cache.Cacheable\n\nclass AlbumArtService {\n\n    // ...\n   \
    \ @Cacheable('albumArt')\n    def getAlbumArt(String artist, String album) {\n\
    \        // ...\n    }\n}\n```\n\nNotice that the `Cacheable` annotation is passing\
    \ `albumArt` as an argument. This represents the name of the cache that will be\
    \ associated with this method. Some caches may be shared across numerous methods,\
    \ whereas others may be used by only one method. By default the keys for the cache\
    \ will be the union of all of the arguments that are being passed to the method,\
    \ which for this case is exactly what is wanted. If the `getAlbumArt` method is\
    \ invoked numerous times with the same argument, the calls to the remote service\
    \ are made only once for each album.\n\nThe cache plug-in by default uses a relatively\
    \ simple in-memory map for storage. For our demo application this is fine, but\
    \ more demanding caching requirements call for a more sophisticated cache. There\
    \ are several extensions to the main cache plug-in to support various cache implementations.\
    \ For example, there is a Redis implementation, an Ehcache implementation, and\
    \ a Gemfire implementation. When you use these more sophisticated implementations,\
    \ the basic usage in your application stays the same, but configuration details\
    \ will vary.\n\nWe are using the cache plug-in in the most basic way and taking\
    \ advantage of only a small part of its capabilities. See [`http://grails.org/plugin/cache`](http://grails.org/plugin/cache)\
    \ for more information on configuring and using the cache plug-in.\n\n## Using\
    \ a Service\n\nThe `AlbumArtTagLib` can now take advantage of the `getAlbumArt`\
    \ method in the `AlbumArtService`. To do this, the `AlbumArtTagLib` needs to define\
    \ the `albumArtService` property and then invoke the `getAlbumArt` method on that\
    \ property, as shown in [Listing 10-9](#Chapter10.html#list_10_9).\n\n**Listing\
    \ 10-9.** Calling the `getAlbumArt` Method from the `AlbumArtTagLib`\n\n```\n\
    package com.gtunes\n\nclass AlbumArtTagLib {\n\n    static namespace = \"music\"\
    \n\n    def albumArtService\n\n    def albumArt = { attrs, body ->\n        def\
    \ artist = attrs.remove('artist')?.toString()\n        def album = attrs.remove('album')?.toString()\n\
    \        def width = attrs.remove('width') ?: 200\n        if(artist && album)\
    \ {\n            def albumArt = albumArtService.getAlbumArt(artist, album)\n \
    \           if(albumArt.startsWith(\"/\")) {\n                albumArt = \"${request.contextPath}${albumArt}\"\
    \         \n            }\n            out << \"<img width=\\\"$width\\\" src=\\\
    \"${albumArt}\\\" border=\\\"0\\\"\"\n            attrs.each { k,v-> out << \"\
    $k=\\\"${v?.encodeAsHTML()}\\\" \"}\n            out << \"></img>\"\n        }\n\
    \    }\n}\n```"
  raw: '#### Caching Service Methods


    The `getAlbumArt` method in the `AlbumArtService` class is functional at the moment
    but could use some improvement. One problem with the current implementation is
    that it is inefficient. Every time the method is called, requests are being made
    to a remote service to retrieve a URL for some album art. One thing to do that
    might help with this is implement some sort of caching mechanism, so when the
    artwork for a particular album is requested, a request is made to the remote service
    to get the relevant artwork URL, which then could be cached. So if another request
    arrives for artwork for that same album, instead of making a call to the remote
    service, the URL can be retrieved from the local cache—a much more efficient procedure.
    Writing efficient and reliable caching mechanisms can be complicated. Fortunately,
    a Grails plug-in does all the hard work for you.


    You can install the cache plug-in by adding the appropriate dependency declaration
    to `grails-app/conf/BuildConfig.groovy`, as shown in [Listing 10-7](#Chapter10.html#list_10_7).


    ***Listing 10-7.** Declaring a Dependency on the Cache Plug-in*


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`

    `    // ...`

    `    plugins {`

    `        compile '':cache:1.0.0''`

    `        // ...`

    `    }`

    `}`


    With the plug-in installed, you need to tell the plug-in that all calls to the
    `getAlbumArt` method in the `AlbumArtService` class should be cached. The way
    to do this is to annotate the method with the `grails.plugin.cache.Cacheable`
    annotation, as shown in [Listing 10-8](#Chapter10.html#list_10_8).


    ***Listing 10-8.** Adding Caching Support to the getAlbumArt Method*


    `package com.gtunes`


    `// ...`

    `import grails.plugin.cache.Cacheable`


    `class AlbumArtService {`


    `    // ...`

    `    @Cacheable(''albumArt'')`

    `    def getAlbumArt(String artist, String album) {`

    `        // ...`

    `    }`

    `}`


    Notice that the `Cacheable` annotation is passing `albumArt` as an argument. This
    represents the name of the cache that will be associated with this method. Some
    caches may be shared across numerous methods, whereas others may be used by only
    one method. By default the keys for the cache will be the union of all of the
    arguments that are being passed to the method, which for this case is exactly
    what is wanted. If the `getAlbumArt` method is invoked numerous times with the
    same argument, the calls to the remote service are made only once for each album.


    The cache plug-in by default uses a relatively simple in-memory map for storage.
    For our demo application this is fine, but more demanding caching requirements
    call for a more sophisticated cache. There are several extensions to the main
    cache plug-in to support various cache implementations. For example, there is
    a Redis implementation, an Ehcache implementation, and a Gemfire implementation.
    When you use these more sophisticated implementations, the basic usage in your
    application stays the same, but configuration details will vary.


    We are using the cache plug-in in the most basic way and taking advantage of only
    a small part of its capabilities. See [`http://grails.org/plugin/cache`](http://grails.org/plugin/cache)
    for more information on configuring and using the cache plug-in.


