    `def index() {`

    `    def album = session.album`

    `    album = Album.merge(album)`

    `    render album.title`

    `}`


    ### GORM 性能调优


    上一节关于 GORM 语义的内容展示了底层 Hibernate 引擎如何通过缓存（`Session`）来优化数据库访问。然而，有多种方法可以优化查询性能。在接下来的几节中，我们将介绍调优
    GORM 的不同方法，帮助你充分利用这项技术。你可能希望通过在 `DataSource.groovy` 中将 `logSql` 设置为 `true` 来启用
    SQL 日志记录，正如上一节关于配置 GORM 中所解释的那样。


    #### 即时关联与延迟关联


    GORM 中的关联默认是延迟加载的。这意味着什么？假设你使用静态的 `list()` 方法查找了一堆 `Album` 实例：


    `def albums = Album.list()`


    为了获取所有 `Album` 实例，Hibernate 在底层会执行一条 SQL `SELECT` 语句来获取相应的数据行。如你所知，每个 `Album`
    都有一个 `Artist`，可以通过 `artist` 关联访问。现在假设你需要遍历每首歌曲并打印 `Artist` 名称，如代码清单 9-59 所示。


    ***代码清单 9-59.** 遍历延迟关联*


    `def albums = Album.list()`

    `for(album in albums) {`

    `    println album.artist.name`

    `}`


