- fmt: "### Asynchronous Form Submission\n\nNow that you have had a chance to explore\
    \ a trivial example, let’s try something a little more challenging. When building\
    \ Ajax applications, it is often useful to submit a form and its data to the server\
    \ asynchronously. Currently, the login process of the gTunes application uses\
    \ a regular form submission, but wouldn’t it be useful if users could log in without\
    \ a refresh?\n\nThe login form now contained within the `grails-app/views/layouts/main.gsp`\
    \ layout submits using a regular form. In other words, form submission is synchronous;\
    \ it doesn’t occur in a background process, as an Ajax request would. The jQuery\
    \ library makes it fairly easy to create a form that will submit an Ajax request.\n\
    \nHowever, before you write the jQuery code that is necessary to implement the\
    \ new Ajax enabled form, let’s move the code that renders the login form into\
    \ its own GSP template. (The importance of doing this will become clear later.)\
    \ Now create a new file, `grails-app/views/user/_loginForm.gsp`, which will form\
    \ the basis of the template, and then cut and paste the code from the layout,\
    \ so that the template looks like [Listing 8-4](#Chapter08.html#list_8_4).\n\n\
    **Listing 8-4.** The Login Template\n\n```\n<p class=\"legend\">Log in to your\
    \ gTunes account</p>\n<g:form name=\"loginForm\" url=\"[controller:'user',action:'login']\"\
    \ class=\"form\">\n    <div class=\"input\">\n        <g:textField required=\"\
    true\"\n                     placeholder=\"Username\"\n                     name=\"\
    login\"\n                     value=\"${fieldValue(bean:loginCmd, field:'login')}\"\
    \ />\n        <g:hasErrors  bean=\"${loginCmd}\" field=\"login\">\n        <p\
    \ class=\"error\"><g:fieldError bean=\"${loginCmd}\" field=\"login\" /></p>\n\
    \        </g:hasErrors>\n    </div>\n    <div class=\"input\">\n        <g:passwordField\
    \ required=\"true\"\n                         placeholder=\"Password\"\n     \
    \                    name=\"password\" />\n        <g:hasErrors  bean=\"${loginCmd}\"\
    \ field=\"password\">\n        <p class=\"error\">\n            <g:fieldError\
    \ bean=\"${loginCmd}\" field=\"password\" />\n        </p>\n        </g:hasErrors>\n\
    \    </div>\n    <div class=\"submit\">\n        <input type=\"submit\" value=\"\
    Login\" class=\"btn\" />\n    </div>\n</g:form>\n```\n\nNow create one more template\
    \ to render the `loginForm` template and also render some of the markup related\
    \ to creating a new account. It makes sense to group all of this markup together\
    \ because the two sections (`create new account` and `login`) will always be rendered\
    \ next to each other. Create a file called `grails-app/views/user/_loginBox.gsp`\
    \ that looks like [Listing 8-5](#Chapter08.html#list_8_5).\n\n**Listing 8-5.**\
    \ The loginBox Template\n\n```\n<div class=\"left\">\n    <h1>Need an account?</h1>\n\
    \    <p class=\"legend\"><g:link controller=\"user\" action=\"register\">Signup\
    \ now</g:link> to start\nyour own personal Music collection!</p>\n    <g:link\
    \ controller=\"user\" action=\"register\" class=\"btn\">Signup now</g:link>\n\
    </div>\n<div class=\"right\" id=\"loginBox\">\n    <h1>Already a member?</h1>\n\
    \    <g:render template=\"/user/loginForm\"/>\n</div>\n```\n\nNow within the `grails-app/views/store/index.gsp`\
    \ layout, use the `<g:render>` tag to render the template, as shown in [Listing\
    \ 8-6](#Chapter08.html#list_8_6).\n\n**Listing 8-6.** Using the Tag to Display\
    \ the Login Form\n\n```\n<g:render template=\"/user/loginBox\"/>\n```\n\nWith\
    \ that done, it is time to write some jQuery code that will initiate the Ajax\
    \ call and will handle the response. That code should be defined in `grails-app/views/store/index.gsp`.\
    \ See [Listing 8-7](#Chapter08.html#list_8_7).\n\n**Listing 8-7.** Ajax Login\
    \ Code\n\n```\n<r:script>\n$(function() {\n    $('#loginForm').ajaxForm(function(result)\
    \ {\n        $('#loginBox').html(result);\n    });\n});\n</r:script>\n```\n\n\
    That code depends on the jQuery Form Plug-in from [`https://github.com/malsup/form`](https://github.com/malsup/form).\
    \ Note that is not a Grails plug-in. Download the `jquery.form.js` file from that\
    \ repository and put it in the `web-app/js/` directory. Once the file is in place,\
    \ edit `grails-app/conf/ApplicationResources.groovy` to look like [Listing 8-8](#Chapter08.html#list_8_8).\n\
    \n**Listing 8-8.** Add jQuery Form Code to ApplicationResources.groovy\n\n```\n\
    // grails-app/conf/ApplicationResources.groovy\nmodules = {\n    application {\n\
    \        resource url:'js/application.js'\n        resource url:'js/jquery.form.js'\n\
    \    }\n}\n```\n\nThe `ApplicationResources.groovy` file is a configuration file\
    \ read by the resources plug-in. The resources plug-in helps optimize the management\
    \ of static resources like JavaScript files used by your application. The code\
    \ in [Listing 8-8](#Chapter08.html#list_8_8) defines a group of static resources,\
    \ called a module, which contains the two JavaScript files mentioned there. The\
    \ `r:script` tag from [Listing 8-7](#Chapter08.html#list_8_7) is also provided\
    \ by the resources plug-in. One of the benefits of wrapping that JavaScript code\
    \ in the `r:script` tag is that the resources plug-in will make sure that the\
    \ JavaScript is loaded at the bottom of the rendered page, which is beneficial\
    \ for optimizing page load times. The resources plug-in is discussed in more detail\
    \ in [Chapter 12](#Chapter12.html#ch12). For now, just configure the files as\
    \ described and things should work just fine.\n\nThe `ajaxForm` function from\
    \ [Listing 8-7](#Chapter08.html#list_8_7) will submit an Ajax request to the login\
    \ controller action and use the response to update the `loginBox` element in the\
    \ DOM. No change is required to any of the input fields or the Submit button.\
    \ Now if you refresh the page and try to log in, a surprising thing will happen.\
    \ Surprisingly, you get the contents of the entire page placed within the `loginBox`\
    \ `<div>`! This happens because you updated the client code but paid no attention\
    \ to the server logic, which is still displaying the entire view. To correct this\
    \ problem, you need to revisit the server-side code to render only a snippet of\
    \ HTML instead of the entire page.\n\nJust in case you don’t recall the code in\
    \ question, [Listing 8-9](#Chapter08.html#list_8_9) shows what the current code\
    \ for the `login` action of the `UserController` looks like.\n\n**Listing 8-9.**\
    \ The Current login Action Code\n\n```\ndef login(LoginCommand cmd) {\n    if(request.method\
    \ == 'POST') {\n        if(!cmd.hasErrors()) {\n            session.user = cmd.getUser()\n\
    \            redirect(controller:'store')\n        }\n        else {\n       \
    \     render(view:'/store/index', model:[loginCmd:cmd])\n        }\n    }\n  \
    \  else {\n        render(view:'/store/index')\n    }\n}\n```\n\nAt the moment,\
    \ the code in [Listing 8-9](#Chapter08.html#list_8_9) renders the entire `grails-app/views/store/\
    \ index.gsp` view, but you actually want only the login form displayed again (on\
    \ login failure) or a welcome message displayed if the user successfully logs\
    \ in. Let’s refactor the code to achieve this goal; [Listing 8-10](#Chapter08.html#list_8_10)\
    \ shows the result.\n\n**Listing 8-10.** Handing an Ajax Login Request\n\n```\n\
    def login(LoginCommand cmd) {\n    if(request.method == 'POST') {\n        if(!cmd.hasErrors())\
    \ {\n            session.user = cmd.getUser()\n            render template: '/user/welcomeMessage'\n\
    \        }\n        else {\n            render template: 'loginBox', model: [loginCmd:\
    \ cmd]\n        }\n    }\n    else {\n        render template: 'loginBox'\n  \
    \  }\n}\n```"
  raw: '### Asynchronous Form Submission


    Now that you have had a chance to explore a trivial example, let’s try something
    a little more challenging. When building Ajax applications, it is often useful
    to submit a form and its data to the server asynchronously. Currently, the login
    process of the gTunes application uses a regular form submission, but wouldn’t
    it be useful if users could log in without a refresh?


    The login form now contained within the `grails-app/views/layouts/main.gsp` layout
    submits using a regular form. In other words, form submission is synchronous;
    it doesn’t occur in a background process, as an Ajax request would. The jQuery
    library makes it fairly easy to create a form that will submit an Ajax request.


    However, before you write the jQuery code that is necessary to implement the new
    Ajax enabled form, let’s move the code that renders the login form into its own
    GSP template. (The importance of doing this will become clear later.) Now create
    a new file, `grails-app/views/user/_loginForm.gsp`, which will form the basis
    of the template, and then cut and paste the code from the layout, so that the
    template looks like [Listing 8-4](#Chapter08.html#list_8_4).


    ***Listing 8-4.** The Login Template*


    `<p class="legend">Log in to your gTunes account</p>`

    `<g:form name="loginForm" url="[controller:''user'',action:''login'']" class="form">`

    `    <div class="input">`

    `        <g:textField required="true"`

    `                     placeholder="Username"`

    `                     name="login"`

    `                     value="${fieldValue(bean:loginCmd, field:''login'')}" />`

    `        <g:hasErrors  bean="${loginCmd}" field="login">`

    `        <p class="error"><g:fieldError bean="${loginCmd}" field="login" /></p>`

    `        </g:hasErrors>`

    `    </div>`

    `    <div class="input">`

    `        <g:passwordField required="true"`

    `                         placeholder="Password"`

    `                         name="password" />`

    `        <g:hasErrors  bean="${loginCmd}" field="password">`

    `        <p class="error">`

    `            <g:fieldError bean="${loginCmd}" field="password" />`

    `        </p>`

    `        </g:hasErrors>`

    `    </div>`

    `    <div class="submit">`

    `        <input type="submit" value="Login" class="btn" />`

    `    </div>`

    `</g:form>`


    Now create one more template to render the `loginForm` template and also render
    some of the markup related to creating a new account. It makes sense to group
    all of this markup together because the two sections (`create new account` and
    `login`) will always be rendered next to each other. Create a file called `grails-app/views/user/_loginBox.gsp`
    that looks like [Listing 8-5](#Chapter08.html#list_8_5).


    ***Listing 8-5.** The loginBox Template*


    `<div class="left">`

    `    <h1>Need an account?</h1>`

    `    <p class="legend"><g:link controller="user" action="register">Signup now</g:link>
    to start`

    `your own personal Music collection!</p>`

    `    <g:link controller="user" action="register" class="btn">Signup now</g:link>`

    `</div>`

    `<div class="right" id="loginBox">`

    `    <h1>Already a member?</h1>`

    `    <g:render template="/user/loginForm"/>`

    `</div>`


    Now within the `grails-app/views/store/index.gsp` layout, use the `<g:render>`
    tag to render the template, as shown in [Listing 8-6](#Chapter08.html#list_8_6).


    ***Listing 8-6.** Using the Tag to Display the Login Form*


    `<g:render template="/user/loginBox"/>`


    With that done, it is time to write some jQuery code that will initiate the Ajax
    call and will handle the response. That code should be defined in `grails-app/views/store/index.gsp`.
    See [Listing 8-7](#Chapter08.html#list_8_7).


    ***Listing 8-7.** Ajax Login Code*


    `<r:script>`

    `$(function() {`

    `    $(''#loginForm'').ajaxForm(function(result) {`

    `        $(''#loginBox'').html(result);`

    `    });`

    `});`

    `</r:script>`


    That code depends on the jQuery Form Plug-in from [`https://github.com/malsup/form`](https://github.com/malsup/form).
    Note that is not a Grails plug-in. Download the `jquery.form.js` file from that
    repository and put it in the `web-app/js/` directory. Once the file is in place,
    edit `grails-app/conf/ApplicationResources.groovy` to look like [Listing 8-8](#Chapter08.html#list_8_8).


    ***Listing 8-8.** Add jQuery Form Code to ApplicationResources.groovy*


    `// grails-app/conf/ApplicationResources.groovy`

    `modules = {`

    `    application {`

    `        resource url:''js/application.js''`

    `        resource url:''js/jquery.form.js''`

    `    }`

    `}`


    The `ApplicationResources.groovy` file is a configuration file read by the resources
    plug-in. The resources plug-in helps optimize the management of static resources
    like JavaScript files used by your application. The code in [Listing 8-8](#Chapter08.html#list_8_8)
    defines a group of static resources, called a module, which contains the two JavaScript
    files mentioned there. The `r:script` tag from [Listing 8-7](#Chapter08.html#list_8_7)
    is also provided by the resources plug-in. One of the benefits of wrapping that
    JavaScript code in the `r:script` tag is that the resources plug-in will make
    sure that the JavaScript is loaded at the bottom of the rendered page, which is
    beneficial for optimizing page load times. The resources plug-in is discussed
    in more detail in [Chapter 12](#Chapter12.html#ch12). For now, just configure
    the files as described and things should work just fine.


    The `ajaxForm` function from [Listing 8-7](#Chapter08.html#list_8_7) will submit
    an Ajax request to the login controller action and use the response to update
    the `loginBox` element in the DOM. No change is required to any of the input fields
    or the Submit button. Now if you refresh the page and try to log in, a surprising
    thing will happen. Surprisingly, you get the contents of the entire page placed
    within the `loginBox` `<div>`! This happens because you updated the client code
    but paid no attention to the server logic, which is still displaying the entire
    view. To correct this problem, you need to revisit the server-side code to render
    only a snippet of HTML instead of the entire page.


    Just in case you don’t recall the code in question, [Listing 8-9](#Chapter08.html#list_8_9)
    shows what the current code for the `login` action of the `UserController` looks
    like.


    ***Listing 8-9.** The Current login Action Code*


    `def login(LoginCommand cmd) {`

    `    if(request.method == ''POST'') {`

    `        if(!cmd.hasErrors()) {`

    `            session.user = cmd.getUser()`

    `            redirect(controller:''store'')`

    `        }`

    `        else {`

    `            render(view:''/store/index'', model:[loginCmd:cmd])`

    `        }`

    `    }`

    `    else {`

    `        render(view:''/store/index'')`

    `    }`

    `}`


    At the moment, the code in [Listing 8-9](#Chapter08.html#list_8_9) renders the
    entire `grails-app/views/store/ index.gsp` view, but you actually want only the
    login form displayed again (on login failure) or a welcome message displayed if
    the user successfully logs in. Let’s refactor the code to achieve this goal; [Listing
    8-10](#Chapter08.html#list_8_10) shows the result.


    ***Listing 8-10.** Handing an Ajax Login Request*


    `def login(LoginCommand cmd) {`

    `    if(request.method == ''POST'') {`

    `        if(!cmd.hasErrors()) {`

    `            session.user = cmd.getUser()`

    `            render template: ''/user/welcomeMessage''`

    `        }`

    `        else {`

    `            render template: ''loginBox'', model: [loginCmd: cmd]`

    `        }`

    `    }`

    `    else {`

    `        render template: ''loginBox''`

    `    }`

    `}`'
