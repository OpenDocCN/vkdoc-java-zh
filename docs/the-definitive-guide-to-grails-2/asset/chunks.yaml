    ### Continuous Integration with Hudson


    Agile and test-driven philosophies have been debated endlessly and are a subject
    beyond the scope of this book. Nevertheless, if there is one agile practice that
    would bring immediate benefits to any project, whether “traditional” or agile,
    it is continuous integration.


    *Continuous integration* involves setting up a server that continuously (either
    on a schedule or through monitoring for changes) builds the latest code, runs
    any tests, and produces a snapshot of the code for distribution. The continuous
    integration server can perform all manner of additional tasks, from producing
    coverage reports to creating the latest documentation and even sending e mails
    or SMS messages to notify of build failures.


    This section will demonstrate how to use Hudson, an open source continuous integration
    server available at [`https://hudson.dev.java.net/`](https://hudson.dev.java.net/).
    To get started, you need to download the `hudson.war` distribution of Hudson and
    deploy it to a container, such as Apache Tomcat. Deployment with Tomcat is a simple
    matter of dropping the WAR into the `TOMCAT_HOME/webapps` directory and firing
    up Tomcat.


    Then you can go to [`http://localhost:8080/hudson`](http://localhost:8080/hudson),
    assuming Tomcat is up and running on port 8080, and you’ll be presented with the
    Hudson Dashboard.


    The next step is to install the Grails plug-in for Hudson. From the main Dashboard
    screen, click the “Manage Hudson” link, and then click the “Manage Plugins” link.
    On the Available tab, select the check box next to the Grails plug-in, and click
    the “Install” button at the bottom of the page. Once you have installed the plug-in,
    you’ll need to restart Hudson.


    Once the Grails plug-in is installed, the next step is to configure your Grails
    installations in Hudson. The plug-in, which does not come with its own version
    of Grails, uses a version that must be installed on the system separately from
    Hudson. The plug-in allows you to configure as many different versions of Grails
    as you like. This is useful if you are building multiple Grails projects in the
    same Hudson instance and not all of those Grails projects are built with the same
    version.


    To configure Grails installations in Hudson, click the “Manage Hudson” link on
    the main Dashboard screen, then click the “Configure System” link. [Figure 11-3](#Chapter11.html#fig_11_3)
    shows the part of this screen used to configure your Grails installations.


    ![Image](images/9781430243779_Fig11-03.jpg)


    ***Figure 11-3.** Configuring Grails installations in Hudson*


    You can see that each Grails installation has a name and a `GRAILS_HOME`. The
    name is simply an identifier that will help you select a particular version of
    Grails later when configuring jobs. The value of `GRAILS_HOME` must point to a
    specific Grails installation directory. Notice that there is validation built
    in to let you know whether the directory you have entered does not exist. The
    validation is not activated until you tab out of the text field.


    Once you have configured all your Grails installations, make sure you scroll all
    the way to the bottom of the page and click the Save button.


    ![Image](images/9781430243779_Fig11-04.jpg)


    ***Figure 11-4.** Creating a new free-style job*


    With at least one Grails installation configured in Hudson, you are ready to create
    a job for a Grails project. You create a job for a Grails project in the same
    way you would for any other project in Hudson. From the main Dashboard screen,
    click the “New Job” link. Most often you will be creating a job for a so-called
    free-style software project, and so you will select that radio button on the form
    to create a new job (see [Figure 11-4](#Chapter11.html#fig_11_4)).


    Once you click the OK button, you will be taken to the page where you configure
    all the details for how this build will be carried out. This page allows you to
    define which version control system you are using, paths to the project, a schedule
    for building the project, and so on. Near the bottom of the page is where you
    will configure the actual build steps. Once the Grails plug-in is installed, a
    new build step, “Build With Grails,” should show up, as shown in [Figure 11-5](#Chapter11.html#fig_11_5).


    ![Image](images/9781430243779_Fig11-05.jpg)


    ***Figure 11-5.** The “Build With Grails” build step*


    When you select the “Build With Grails” build step, the page will be updated with
    a form that lets you configure the Grails build. This will include at a minimum
    specifying a version of Grails to use and which Grails targets to execute. A typical
    target to execute is the `test-app` target, but you can configure your job to
    execute whichever targets make sense. [Figure 11-6](#Chapter11.html#fig_11_6)
    shows the details of a Grails build.


    The “Grails Installation” drop-down will include all the Grails installations
    you configured earlier. Select the version of Grails that this job should be built
    with.


    The “Targets” field lets you specify as many targets as you’d like to have executed
    as part of this build. The targets will be executed in the order specified in
    this text box. If any arguments are to be passed to a particular target, then
    the target name and the arguments should be surrounded by double quotes so the
    plug-in knows to group them as one command.


    There are fields for specifying the `grails.work.dir` and `project.work.dir` system
    properties.


    The “Project Base Directory” field will typically be left blank, but it is important
    if the Grails project is not at the root of the job’s working directory. For example,
    if your Grails project is in your SCM system at a path like `/projects/development/code/grails/gTunes/`
    and for some reason you need to configure this job to check out everything under
    `/projects/development/code/ grails/gTunes/`, you will need to specify a value
    for the “Project Base Directory” field. The problem here is that the job root
    is `/projects/development/code/grails/gTunes/`; so the plug-in will execute all
    Grails commands from that directory. Since that isn’t the root of the Grails project
    itself, all the Grails commands will fail. To support this scenario, the “Project
    Base Directory” field should be given the value `/projects/development/code/grails/gTunes/`;
    this is a relative path down from the job root directory to the root of the Grails
    project. With that in place, all Grails commands will be executed from the `/projects/development/
    code/grails/gTunes/` directory.


    ![Image](images/9781430243779_Fig11-06.jpg)


    ***Figure 11-6.** Configuring a Grails build*


    All other aspects of configuring a Grails job in Hudson are no different from
    what they are for any other type of project.'
