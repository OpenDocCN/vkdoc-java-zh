    `$ grails run-war`


    这将在 8080 端口上启动一个 Tomcat 服务器。在此基础上，你可以配置无处不在的 Apache HTTPD 服务器（[`http://httpd.apache.org/`](http://httpd.apache.org/)），使用
    `mod_proxy` 将请求转发到 Tomcat 服务器。配置详情可以在 Apache 网站 [`http://tomcat.apache.org/connectors-doc/webserver_howto/apache.html`](http://tomcat.apache.org/connectors-doc/webserver_howto/apache.html)
    上找到。或者，你甚至可以在 80 端口上运行 Tomcat，使其充当主 Web 服务器：


    `$ grails -Dserver.port=80 run-war`


    尽管这种方法很简单，但许多组织更喜欢结构化的部署方法，并使用 Java 领域的标准利器——WAR 文件。


    #### 部署到容器


