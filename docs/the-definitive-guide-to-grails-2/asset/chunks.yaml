- fmt: "# The Link Tag\n\nThe `<g:link>` tag will essentially create a simple HTML\
    \ anchor tag based on the supplied attributes, which include the following:\n\n\
    > - `controller`: the controller name to link to\n> - `action`: the action name\
    \ to link to\n> - `id`: the identifier to append to the end of the URI\n> - `mapping`:\
    \ the name of the URL mapping to use\n> - `params`: any parameters to pass as\
    \ a map\n\nOne of either the `controller` or the `action` attribute is required.\
    \ If the `controller` attribute is specified but no `action` attribute is specified,\
    \ the tag will link to the default action of the controller. If, on the other\
    \ hand, an `action` attribute is specified but no `controller` attribute is specified,\
    \ the *currently executing* controller will be linked to.\n\nBeyond the previous\
    \ attributes, the `<g:link>` tag also supports all attributes that the regular\
    \ HTML anchor tag supports, which can be added as required.\n\nIt’s time for some\
    \ examples. Using `<g:link>` is pretty simple and intuitive, and of course the\
    \ values of the attributes could just as well be expressions of the `${...}` kind\
    \ if dynamic linking is required (see [Listing 5-17](#Chapter05.html#list_5_17)).\n\
    \n***Listing 5-17.** Basic Linking with `<g:link>`*\n\n```\n<g:link controller=\"\
    album\" action=\"list\">list Albums</g:link>\n<g:link action=\"show\"  id=\"l\"\
    >Show album with id K/g:link>\n```\n\nOf interest may be the `params` attribute,\
    \ which takes a map of request parameters to pass via the link. In fact, the current\
    \ request parameters can even be passed from one action to the other by using\
    \ this attribute in combination with the `params` object, which you’ll recall\
    \ is an instance of `java.util.Map`, as shown in [Listing 5-18](#Chapter05.html#list_5_18).\n\
    \n***Listing 5-18.** Using Parameters with `<g:link>`*\n\n```\n<g:link controller=\"\
    album\"\n        action=\"list\"\n        params=\"[max:10,order:'title']\">Show\
    \ first ten ordered by Title</g:link>\n<g:link action=\"create\"\n        params=\"\
    ${params}\">Pass parameters from this action to next</g:link>\n```\n\nThe first\
    \ example uses the `params` attribute in conjunction with a map of parameters\
    \ and provides your first exposure to another feature of GSP tags: attributes\
    \ can be specified as maps with the `[key:value]` syntax. This allows for composite\
    \ attribute values and minimizes the need for messy nested tags.\n\nFinally, the\
    \ second example demonstrates what was mentioned previously. Instead of specifying\
    \ a map explicitly, you provide a reference to the `params` object via the `${...}`\
    \ expression syntax, which then allows parameters to be passed from the current\
    \ page to the linked page. Next you’ll see how to create links to other resources.\n\
    \n![Image](images/square.jpg) **Note** The linking tags in Grails automatically\
    \ rewrite the links based on the URL mappings you have defined. URL mappings will\
    \ be covered in more detail in [Chapter 6](#Chapter06.html).\n\n## The `createLink`\
    \ and `resource` Tags\n\nThe `<g:createLink>` tag has already been seen in action\
    \ and so probably needs less of an introduction. Simply put, if it’s not clear\
    \ from the examples, `<g:createLink>` takes the same arguments as the `<g:link>`\
    \ tag, except that it produces just the textual link and not an HTML anchor tag.\
    \ In fact, the `<g:link>` tag actually delegates to `<g:createLink>` when creating\
    \ its `href` attribute.\n\nSo what is this useful for? You could use it within\
    \ a regular anchor tag or possibly as a value for a JavaScript variable, as [Listing\
    \ 5-19](#Chapter05.html#list_5_19) shows.\n\n***Listing 5-19.** Examples of `createLink`*\n\
    \n```\n<a href=\"${createLink(action:'list')}\">List Albums</a>\n<script type=\"\
    text/javascript\">\n    var listAlbumsLink = \"${createLink(action:'list')}\"\
    ;\n</script>\n```\n\nAnother tag, similar in both name and usage to `<g:createLink>`,\
    \ is the `<g:resource>` tag, which allows convenient linking to resources within\
    \ the web application’s context path.\n\nThis tag is most commonly used for linking\
    \ to images and style sheets and, again, can be seen in action in the views generated\
    \ by scaffolding:\n\n```\n<link rel=\"stylesheet\"\n      href=\"${resource(dir:'css',file:'main.css')}\"\
    ></link>\n```\n\nAs is apparent from the previous examples and in [Listing 5-19](#Chapter05.html#list_5_19),\
    \ both tags tend to be used via method calls as opposed to markup, because the\
    \ values produced by them are usually nested within attributes of other tags.\n\
    \nNow that linking has been covered, let’s look at another common activity: creating\
    \ forms so that users can enter data to be captured by server-side code. In the\
    \ following section, you’ll see how Grails makes this easier.\n\n![Image](images/square.jpg)\
    \ **Note** The `resource` tag effectively replaces the `createLinkTo` tag. The\
    \ `createLinkTo` tag is still included in Grails 2 but is deprecated in favor\
    \ of the `resource` tag. The `resource` tag provides more flexibility, some of\
    \ which will be discussed in [Chapter 12](#Chapter12.html).\n\n## Creating Forms\
    \ and Fields\n\nA form is most commonly a collection of fields that a user populates\
    \ with data, although occasionally you find forms that consist entirely of hidden\
    \ fields and no user interaction whatsoever. Nevertheless, how this is achieved\
    \ depends on the type of field; in other words, the user’s interaction depends\
    \ on whether it is a text field, a drop-down select, or a radio button.\n\nClearly,\
    \ certain fields map nicely onto existing Java (and hence Groovy) types. Check\
    \ boxes are great for Boolean values, text fields are good for strings, and selects\
    \ are good when you have strings that can be contained only within a certain list\
    \ of values (such as enums in Java 5).\n\nTo this end, most Java web frameworks\
    \ provide some mechanism to make form elements (or fields) interoperate smoothly\
    \ with Java types, Grails being no different. Before you get too deeply involved\
    \ in looking at the different kinds of fields, let’s take care of the basics by\
    \ looking at how Grails helps in defining forms.\n\n### The `form` Tag\n\nLet’s\
    \ build on what you have seen in linking by starting with the `<g:form>` tag,\
    \ which is equivalent to the standard HTML `<form>` tag, except that it allows\
    \ the same arguments as those shown with the `<g:link>` tag to allow easy submission\
    \ to a specific controller or action or both, as shown in [Listing 5-20](#Chapter05.html#list_5_20).\n\
    \n***Listing 5-20.** An Example Form Tag from `grails-app/views/user/register.gsp`*\n\
    \n```\n<g:form action=\"register\" name=\"registerForm\">\n   ...\n</g:form>\n\
    ```\n\nBy default, the `<g:form>` tag uses the `POST` method for form submissions;\
    \ that is, the previous example is roughly equivalent to the HTML definition (minus\
    \ the closing tag):\n\n```\n<form action=\"/gTunes/user/register\" method=\"POST\"\
    \ name=\"registerForm\">\n   ...\n</form>\n```\n\nAs an alternative to [Listing\
    \ 5-20](#Chapter05.html#list_5_20), you can define the `<g:form>` tag using a\
    \ single `url` attribute that uses the `key:value` map syntax to define the controller\
    \ and action combination (see [Listing 5-21](#Chapter05.html#list_5_21)).\n\n\
    ***Listing 5-21.** A `<g:form>` Tag with `url` Attribute*\n\n```\n<g:form url=\"\
    [controller:'user', action:'register']\">\n   ...\n</g:form>\n```\n\nOf course,\
    \ a form is of little use without some fields, the first of which to be discussed\
    \ is the *text field*. In HTML, most fields are handled by the `<input>` tag,\
    \ which has a `type` attribute to change its behavior and appearance. The downside\
    \ of this approach is that it is not clear what its purpose is from simply looking\
    \ at the tag.\n\nGrails provides a number of wrapper tags that encapsulate the\
    \ different types of HTML inputs into more meaningful tags."
