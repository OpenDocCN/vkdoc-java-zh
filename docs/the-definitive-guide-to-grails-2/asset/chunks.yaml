- fmt: "### Creating Custom Tags\n\nCustom tags in JSP constitute a wonderfully powerful\
    \ feature. They provide the ability to cleanly separate concerns between the view\
    \ and controller logic. In MVC terms, they can be thought of as view helpers.\
    \ Unfortunately, for all their wonderful attributes, they are tremendously complicated\
    \ to develop. The reasons for this are understandable, because JSP tags attempt\
    \ to account for every possible tag creation scenario, including the following:\n\
    \n> *   simple tags that have attributes only but no body\n> *   body tags that\
    \ have both attributes and a body\n> *   tags that have a parent-child relationship\n\
    > *   nested tags and a complete API for finding tag ancestors\n\nThe implication,\
    \ however, is that the API for creating JSP custom tags is robust, to say the\
    \ least. To compound matters, additional information is required about the tag\
    \ in a tag library descriptor (TLD) file that is loaded on application startup.\
    \ This makes tags difficult to reload without a server restart, because the application\
    \ server utilizes this file to configure the tag library. As you can imagine,\
    \ all this is not very agile; rather, it is a complete contradiction to the code-by-convention\
    \ approach.\n\nFrom a user’s perspective, developers rarely go to the effort of\
    \ creating tags themselves, and typically the ones used tend to be those provided\
    \ by the frameworks and specifications, such as JSTL. This is rather a shame,\
    \ because the concept is sound, though the implementation is not.\n\nSo what can\
    \ Grails and, more specifically, GSP provide to make creating tags simpler? Clearly,\
    \ supporting every tag type under the sun would result in a complicated API, much\
    \ like that in JSP. In reality, the most commonly used tags can be broken down\
    \ into three categories:\n\n> *   *Simple tags*: tags that have attributes but\
    \ no body\n> *   *Logical tags*: those that have a body that executes conditionally\n\
    > *   *Iterative tags*: tags that loop and execute the body of the tag one or\
    \ more times\n\nYou will find that the majority of tags you come across fall into\
    \ one of these categories. Since Grails is all about making the common cases simple,\
    \ creating a simplified API for these tag types seems only logical. The question\
    \ is, why create a new API at all? This is where Groovy and the power of closures\
    \ start to shine.\n\n### Creating a Tag Library\n\nHaving already seen quite a\
    \ few Grails tags throughout this discussion, you may well have already browsed\
    \ the source and become familiar with what a Grails tag is all about. Whatever\
    \ the case, it is important to understand how to create a tag library from scratch.\n\
    \nIt is generally good practice to place tags inside a library that encapsulates\
    \ their general function, much as a package does in Java.\n\nA *tag library* is\
    \ quite simply a class that ends with the convention `TagLib` in the class name\
    \ and resides snugly in the `grails-app/taglib` directory. Like the other Grails\
    \ artifacts you’ve seen, a convenience target exists for creating tag libraries.\
    \ To create a new tag library for the gTunes application, you can run the `grails\
    \ create-tag-lib` target (see [Listing 5-41](#Chapter05.html#list_5_41)).\n\n\
    ***Listing 5-41.** Creating the Gtunes Tag Library*\n\n```\n$ grails create-tag-lib\
    \ com.gtunes.Gtunes\n| Created file grails-app/taglib/com/gtunes/GtunesTagLib.groovy\n\
    | Created file test/unit/com/gtunes/GtunesTagLibTests.groovy\n```\n\nTo see how\
    \ to go about making a tag library, in the next section you’ll look at a basic\
    \ tag. In [Chapter 8](#Chapter08.html) you’ll see how to write a custom tag library,\
    \ one that will add some snazzy functionality to the gTunes application for rendering\
    \ album cover art.\n\n### Custom Tag Basics\n\nFirst, let’s look at the basics.\
    \ A tag is essentially a closure property that takes two arguments: the tag attributes\
    \ as a `java.util.Map` and the body of the tag as a closure (see [Listing 5-42](#Chapter05.html#list_5_42)).\n\
    \n***Listing 5-42.** An Example Tag*\n\n```\npackage com.gtunes\n\nclass GtunesTagLib\
    \ {\n\n    def repeat = { attrs, body ->\n        // retrieve the 'times' attribute\
    \ and convert it to an int\n        int n = attrs.int('times')\n\n        // render\
    \ the body 'n' times, passing a 1 based\n        // counter into the body each\
    \ time\n        n?.times { counter ->\n            out << body(counter + 1)\n\
    \        }\n    }\n}\n```\n\nThis example defines a tag called `repeat`, which\
    \ looks for an attribute called `times`, which it attempts to convert to an integer;\
    \ it then uses Groovy’s built-in `times` method to execute the body multiple times.\n\
    \nAs mentioned previously, the body is a closure and therefore can be invoked\
    \ like a method. In addition, you pass the number of the current iteration, as\
    \ the variable `counter`, to the body as the first argument to the closure call.\
    \ Why is this useful? It means that the number is available as the default `it`\
    \ argument in the tag’s body. As an example, let’s try the new tag in a GSP view,\
    \ as in [Listing 5-43](#Chapter05.html#list_5_43). Note that the name of the tag\
    \ in the markup matches the property name defined in the library shown in [Listing\
    \ 5-42](#Chapter05.html#list_5_42).\n\n***Listing 5-43.** Using the repeat Tag*\n\
    \n```\n<g:repeat times=\"3\">\n  Hello number ${it}\n</g:repeat>\n```\n\nAs you\
    \ can see, the tag uses the default `it` argument to reference the value passed\
    \ when the tag calls the body closure. The resulting output will be the following:\n\
    \n* * *\n\n```\nHello number 1\nHello number 2\nHello number 3\n```\n\n* * *\n\
    \nAll the tags that are bundled with Grails are defined in the `g` namespace.\
    \ By default, all your own custom tags are also put in the `g` namespace. To avoid\
    \ naming conflicts with built-in tags and with tags that may be installed into\
    \ a project as part of a plug-in, you should define a namespace for your own tag\
    \ libraries. Defining a namespace for a tag library is as simple as declaring\
    \ a static property called `namespace` in the `taglib` class and assigning that\
    \ property a `String` value, as shown in [Listing 5-44](#Chapter05.html#list_5_44).\n\
    \n***Listing 5-44.** Defining a Custom Namespace for a Tag Library*\n\n```\npackage\
    \ com.gtunes\n\nclass GtunesTagLib {\n\n    static namespace = 'gt'\n\n    def\
    \ repeat = { attrs, body ->\n        // retrieve the 'times' attribute and convert\
    \ it to an int\n        int n = attrs.int('times')\n\n        // render the body\
    \ n times, passing a 1 based\n        // counter into the body each time\n   \
    \     n.times { counter ->\n            out << body(counter + 1)\n        }\n\
    \    }\n}\n```\n\nWith that `namespace` property in place, all the tags defined\
    \ in the `GTunesTagLib` are now in the `gt` namespace. Instead of referring to\
    \ `<g:repeat/>`, GSPs should now refer to `<gt:repeat/>`.\n\nNot only are Grails\
    \ tags amazingly concise as compared with their JSP brethren, but it is important\
    \ to note that all changes to tags can be reloaded at runtime, just as with controllers.\
    \ With no need to configure tag library descriptors or restart servers, Grails\
    \ tags become a far more interesting and agile proposition."
  raw: '#### Creating Custom Tags


    Custom tags in JSP constitute a wonderfully powerful feature. They provide the
    ability to cleanly separate concerns between the view and controller logic. In
    MVC terms, they can be thought of as view helpers. Unfortunately, for all their
    wonderful attributes, they are tremendously complicated to develop. The reasons
    for this are understandable, because JSP tags attempt to account for every possible
    tag creation scenario, including the following:


    > *   simple tags that have attributes only but no body

    > *   body tags that have both attributes and a body

    > *   tags that have a parent-child relationship

    > *   nested tags and a complete API for finding tag ancestors


    The implication, however, is that the API for creating JSP custom tags is robust,
    to say the least. To compound matters, additional information is required about
    the tag in a tag library descriptor (TLD) file that is loaded on application startup.
    This makes tags difficult to reload without a server restart, because the application
    server utilizes this file to configure the tag library. As you can imagine, all
    this is not very agile; rather, it is a complete contradiction to the code-by-convention
    approach.


    From a user’s perspective, developers rarely go to the effort of creating tags
    themselves, and typically the ones used tend to be those provided by the frameworks
    and specifications, such as JSTL. This is rather a shame, because the concept
    is sound, though the implementation is not.


    So what can Grails and, more specifically, GSP provide to make creating tags simpler?
    Clearly, supporting every tag type under the sun would result in a complicated
    API, much like that in JSP. In reality, the most commonly used tags can be broken
    down into three categories:


    > *   *Simple tags*: tags that have attributes but no body

    > *   *Logical tags*: those that have a body that executes conditionally

    > *   *Iterative tags*: tags that loop and execute the body of the tag one or
    more times


    You will find that the majority of tags you come across fall into one of these
    categories. Since Grails is all about making the common cases simple, creating
    a simplified API for these tag types seems only logical. The question is, why
    create a new API at all? This is where Groovy and the power of closures start
    to shine.


    #### Creating a Tag Library


    Having already seen quite a few Grails tags throughout this discussion, you may
    well have already browsed the source and become familiar with what a Grails tag
    is all about. Whatever the case, it is important to understand how to create a
    tag library from scratch.


    It is generally good practice to place tags inside a library that encapsulates
    their general function, much as a package does in Java.


    A *tag library* is quite simply a class that ends with the convention `TagLib`
    in the class name and resides snugly in the `grails-app/taglib` directory. Like
    the other Grails artifacts you’ve seen, a convenience target exists for creating
    tag libraries. To create a new tag library for the gTunes application, you can
    run the `grails create-tag-lib` target (see [Listing 5-41](#Chapter05.html#list_5_41)).


    ***Listing 5-41.** Creating the Gtunes Tag Library $ grails `$ grails create-taglib`*


    `$ grails create-tag-lib com.gtunes.Gtunes`

    `| Created file grails-app/taglib/com/gtunes/GtunesTagLib.groovy`

    `| Created file test/unit/com/gtunes/GtunesTagLibTests.groovy`


    To see how to go about making a tag library, in the next section you’ll look at
    a basic tag. In [Chapter 8](#Chapter08.html) you’ll see how to write a custom
    tag library, one that will add some snazzy functionality to the gTunes application
    for rendering album cover art.


    #### Custom Tag Basics


    First, let’s look at the basics. A tag is essentially a closure property that
    takes two arguments: the tag attributes as a `java.util.Map` and the body of the
    tag as a closure (see [Listing 5-42](#Chapter05.html#list_5_42)).


    ***Listing 5-42.** An Example Tag*


    `package com.gtunes`


    `class GtunesTagLib {`


    `    def repeat = { attrs, body ->`

    `        // retrieve the ''times'' attribute and convert it to an int`

    `        int n = attrs.int(''times'')`


    `        // render the body ''n'' times, passing a 1 based`

    `        // counter into the body each time`

    `        n?.times { counter ->`

    `            out << body(counter + 1)`

    `        }`

    `    }`

    `}`


    This example defines a tag called `repeat`, which looks for an attribute called
    `times`, which it attempts to convert to an integer; it then uses Groovy’s built-in
    `times` method to execute the body multiple times.


    As mentioned previously, the body is a closure and therefore can be invoked like
    a method. In addition, you pass the number of the current iteration, as the variable
    `counter`, to the body as the first argument to the closure call. Why is this
    useful? It means that the number is available as the default it argument in the
    tag’s body. As an example, let’s try the new tag in a GSP view, as in [Listing
    5-43](#Chapter05.html#list_5_43). Note that the name of the tag in the markup
    matches the property name defined in the library shown in [Listing 5-42](#Chapter05.html#list_5_42).


    ***Listing 5-43.** Using the repeat Tag*


    `<g:repeat times="3">`

    `  Hello number ${it}`

    `</g:repeat>`


    As you can see, the tag uses the default it argument to reference the value passed
    when the tag calls the body closure. The resulting output will be the following:


    * * *


    `Hello number 1`

    `Hello number 2`

    `Hello number 3`


    * * *


    All the tags that are bundled with Grails are defined in the `g` namespace. By
    default, all your own custom tags are also put in the `g` namespace. To avoid
    naming conflicts with built-in tags and with tags that may be installed into a
    project as part of a plug-in, you should define a namespace for your own tag libraries.
    Defining a namespace for a tag library is as simple as declaring a static property
    called `namespace` in the `taglib` class and assigning that property a `String`
    value, as shown in [Listing 5-44](#Chapter05.html#list_5_44).


    ***Listing 5-44.** Defining a Custom Namespace for a Tag Library class GtunesTagLib
    {*


    `package com.gtunes`


    `class GtunesTagLib {`


    `    static namespace = ''gt''`


    `    def repeat = { attrs, body ->`

    `        // retrieve the ''times'' attribute and convert it to an int`

    `        int n = attrs.int(''times'')`


    `        // render the body n times, passing a 1 based`

    `        // counter into the body each time`

    `        n.times { counter ->`

    `            out << body(counter + 1)`

    `        }`

    `    }`

    `}`


    With that `namespace` property in place, all the tags defined in the `GTunesTagLib`
    are now in the `gt` namespace. Instead of referring to `<g:repeat/>`, GSPs should
    now refer to `<gt:repeat/>`.


    Not only are Grails tags amazingly concise as compared with their JSP brethren,
    but it is important to note that all changes to tags can be reloaded at runtime,
    just as with controllers. With no need to configure tag library descriptors or
    restart servers, Grails tags become a far more interesting and agile proposition.'
  trans: '

    #### 创建自定义标签


    JSP 中的自定义标签是一项非常强大的功能。它们能够清晰地将视图与控制器逻辑的关注点分离开来。用 MVC 的术语来说，它们可以被视为视图助手。遗憾的是，尽管它们拥有诸多优点，但开发起来却极其复杂。其原因可以理解，因为
    JSP 标签试图涵盖所有可能的标签创建场景，包括以下几种：


    > *   仅包含属性但没有主体的简单标签

    > *   同时包含属性和主体的主体标签

    > *   具有父子关系的标签

    > *   嵌套标签以及用于查找标签祖先的完整 API


    然而，这意味着创建 JSP 自定义标签的 API 至少可以说是非常健壮的。更复杂的是，还需要在应用程序启动时加载的标签库描述符（TLD）文件中提供关于该标签的额外信息。这使得标签在无需重启服务器的情况下难以重新加载，因为应用服务器会利用此文件来配置标签库。正如你所想，这一切并不敏捷；相反，它与“约定优于配置”的方法完全背道而驰。


    从用户的角度来看，开发者很少会费心自己去创建标签，通常使用的往往是那些由框架和规范提供的标签，例如 JSTL。这相当可惜，因为其概念本身是合理的，只是实现方式不尽如人意。


    那么，Grails，更具体地说是 GSP，能提供什么来简化标签的创建呢？显然，支持所有类型的标签会导致一个复杂的 API，就像 JSP 那样。实际上，最常用的标签可以归结为以下三类：


    > *   **简单标签**：有属性但没有主体的标签

    > *   **逻辑标签**：有条件地执行主体的标签

    > *   **迭代标签**：循环并多次执行标签主体的标签


    你会发现，你遇到的大多数标签都属于这些类别之一。由于 Grails 的宗旨是让常见情况变得简单，为这些标签类型创建一个简化的 API 似乎是合乎逻辑的。问题是，为什么非要创建一个新的
    API 呢？这正是 Groovy 和闭包强大之处开始展现的地方。


    #### 创建标签库


    在之前的讨论中，我们已经看到了不少 Grails 标签，你可能已经浏览过源码，并对 Grails 标签的实质有所了解。无论如何，理解如何从头创建一个标签库是很重要的。


    通常，好的做法是将标签放在一个封装了其通用功能的库中，就像 Java 中的包一样。


    一个**标签库**非常简单，就是一个类名以约定 `TagLib` 结尾，并且位于 `grails-app/taglib` 目录下的类。与你见过的其他 Grails
    构件一样，也存在一个用于创建标签库的便捷目标。要为 gTunes 应用创建一个新的标签库，你可以运行 `grails create-tag-lib` 目标（见清单
    5-41）。


    ***清单 5-41.** 创建 Gtunes 标签库 $ grails `$ grails create-taglib`*


    `$ grails create-tag-lib com.gtunes.Gtunes`

    `| Created file grails-app/taglib/com/gtunes/GtunesTagLib.groovy`

    `| Created file test/unit/com/gtunes/GtunesTagLibTests.groovy`


    为了了解如何制作一个标签库，在下一节中，你将看到一个基础标签。在第 8 章中，你将看到如何编写一个自定义标签库，该库将为 gTunes 应用添加一些炫酷的功能，用于渲染专辑封面图。


    #### 自定义标签基础


    首先，让我们看看基础知识。一个标签本质上是一个闭包属性，它接受两个参数：作为 `java.util.Map` 的标签属性和作为闭包的标签主体（见清单 5-42）。


    ***清单 5-42.** 一个示例标签*


    `package com.gtunes`


    `class GtunesTagLib {`


    `    def repeat = { attrs, body ->`

    `        // 获取 ''times'' 属性并将其转换为整数`

    `        int n = attrs.int(''times'')`


    `        // 将主体渲染 ''n'' 次，每次向主体传递一个`

    `        // 从 1 开始的计数器`

    `        n?.times { counter ->`

    `            out << body(counter + 1)`

    `        }`

    `    }`

    `}`


    这个例子定义了一个名为 `repeat` 的标签，它查找一个名为 `times` 的属性，并尝试将其转换为整数；然后使用 Groovy 内置的 `times`
    方法多次执行主体。


    如前所述，主体是一个闭包，因此可以像方法一样被调用。此外，你将当前迭代的次数作为变量 `counter`，作为闭包调用的第一个参数传递给主体。这为什么有用呢？这意味着该数字在标签主体中可以作为默认的
    it 参数使用。举个例子，让我们在 GSP 视图中尝试这个新标签，如清单 5-43 所示。请注意，标记中标签的名称与清单 5-42 所示标签库中定义的属性名称相匹配。


    ***清单 5-43.** 使用 repeat 标签*


    `<g:repeat times="3">`

    `  Hello number ${it}`

    `</g:repeat>`


    如你所见，该标签使用默认的 it 参数来引用标签调用主体闭包时传递的值。最终输出结果如下：


    * * *


    `Hello number 1`

    `Hello number 2`

    `Hello number 3`


    * * *


    所有随 Grails 一起提供的标签都定义在 `g` 命名空间中。默认情况下，你所有的自定义标签也会被放入 `g` 命名空间。为了避免与内置标签以及作为插件一部分安装到项目中的标签发生命名冲突，你应该为自己的标签库定义一个命名空间。为标签库定义命名空间非常简单，只需在
    `taglib` 类中声明一个名为 `namespace` 的静态属性，并为其赋予一个 `String` 值即可，如清单 5-44 所示。


    ***清单 5-44.** 为标签库定义自定义命名空间 class GtunesTagLib {*


    `package com.gtunes`


    `class GtunesTagLib {`


    `    static namespace = ''gt''`


    `    def repeat = { attrs, body ->`

    `        // 获取 ''times'' 属性并将其转换为整数`

    `        int n = attrs.int(''times'')`


    `        // 将主体渲染 n 次，每次向主体传递一个`

    `        // 从 1 开始的计数器`

    `        n.times { counter ->`

    `            out << body(counter + 1)`

    `        }`

    `    }`

    `}`


    有了这个 `namespace` 属性，`GTunesTagLib` 中定义的所有标签现在都位于 `gt` 命名空间中。GSP 现在应该引用 `<gt:repeat/>`，而不是
    `<g:repeat/>`。


    与 JSP 中的同类标签相比，Grails 标签不仅极其简洁，而且重要的是，所有对标签的修改都可以在运行时重新加载，就像控制器一样。无需配置标签库描述符或重启服务器，Grails
    标签因此成为一个更有趣、更敏捷的选择。

