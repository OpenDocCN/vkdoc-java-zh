- fmt: "#### Automatic Session Flushing\n\nAnother common gotcha is that by default\
    \ GORM is configured to flush the session automatically when one of the following\
    \ occurs:\n\n- whenever a query is run;\n- directly after a controller action\
    \ completes, if no exceptions are thrown;\n- directly before a transaction is\
    \ committed.\n\nThis has a number of implications that you need to consider. Take,\
    \ for example, the code in [Listing 9-50](#Chapter09.html#list_9_50).\n\n**Listing\
    \ 9-50.** *The Implications of Automatic Session Flushing*\n\n```\n1 def album\
    \ = Album.get(1)\n2 album.title = \"Change It\"\n3 def otherAlbums = Album.findAllWhereTitleLike(\"\
    %Change%\")\n4\n5 assert otherAlbums.contains(album)\n```\n\nYou may think that\
    \ because you never called `save()` on the `album` there is no way it could possibly\
    \ have been persisted to the database, right? Wrong. As soon as you load the `album`\
    \ instance, it immediately becomes a “managed” object as far as Hibernate is concerned.\
    \ Since Hibernate is by default configured to flush the session when a query runs,\
    \ the `Session` is flushed on line 3 when the `findAllWhereTitleLike` method is\
    \ called and the `Album` instance is persisted. The Hibernate `Session` caches\
    \ changes and pushes them to the database only at the latest possible moment.\
    \ In the case of automatic flushing, this is at the end of a transaction or before\
    \ a query runs that might be affected by the cached changes.\n\nYou may consider\
    \ the behavior of automatic flushing to be a little odd, but if you think about\
    \ it, it depends very much on your expectations. If the object weren’t flushed\
    \ to the database, then the change made to it on line 2 would not be reflected\
    \ in the results. That may not be what you’re expecting either! Let’s consider\
    \ another example where automatic flushing may present a few surprises. Take a\
    \ look at the code in [Listing 9-51](#Chapter09.html#list_9_51).\n\n**Listing\
    \ 9-51.** *Another Implication of Automatic Session Flushing*\n\n```\ndef album\
    \ = Album.get(1)\nalbum.title = \"Change It\"\n```\n\nIn [Listing 9-16](#Chapter09.html#list_9_16),\
    \ an instance of the `Album` class is looked up and the `title` is changed, but\
    \ the `save()` method is never called. You may expect that since `save()` was\
    \ never called, the `Album` instance will not be persisted to the database. However,\
    \ you’d be wrong again. Hibernate does automatic dirty checking and flushes any\
    \ changes to the persistent instances contained within the `Session`.\n\nIt is\
    \ our recommendation that you should *always* call the `save()` method when persisting\
    \ objects. The `save()` method will call the Grails validation mechanism and mark\
    \ the object as read-only, including any associations of the object, if a validation\
    \ error occurs. If you were never planning to save the object in the first place,\
    \ then you may want to consider using the `read` method instead of the `get` method,\
    \ which returns the object in a read-only state:\n\n```\ndef album = Album.read(1)\n\
    ```\n\nIf all of this is too dreadful to contemplate and you prefer to have full\
    \ control over how and when the `Session` is flushed, then you may want to consider\
    \ changing the default `FlushMode` used by specifying the `hibernate.flush.mode`\
    \ setting in `DataSource.groovy`:\n\n```\nhibernate.flush.mode=\"manual\"\n```\n\
    \nThe possible values of the `hibernate.flush.mode` setting are summarized as\
    \ follows:\n\n- `manual`: Flush only when you say so! In other words, only flush\
    \ the session when the `flush:true` argument is passed to `save()` or `delete()`.\
    \ The downside with a manual flush mode is that you may receive stale data from\
    \ queries, and you must always pass the `flush:true` argument to the `save()`\
    \ or `delete()` method.\n- `commit`: Flush only when the transaction is committed\
    \ (see the next section).\n- `auto`: Flush when the transaction is committed and\
    \ before a query is run.\n\nNevertheless, assuming you stick with the default\
    \ `auto` setting, the `save()` method might not, excuse the pun, save you in the\
    \ case of the code from [Listing 9-15](#Chapter09.html#list_9_15). Remember in\
    \ this case the `Session` is automatically flushed before the query is run. This\
    \ problem brings us nicely onto the topic of transactions in GORM.\n\n## Transactions\
    \ in GORM\n\nFirst things first—it is important to emphasize that *all* communication\
    \ between Hibernate and the database runs within the context of a database transaction\
    \ regardless of whether you are explicit about the transaction demarcation boundaries.\
    \ The `Session` itself is lazy in that it only ever initiates a database transaction\
    \ at the last possible moment.\n\nConsider the code in [Listing 9-15](#Chapter09.html#list_9_15)\
    \ again. When the code is run, a `Session` has already been opened and bound to\
    \ the current thread. However, a transaction is initiated only on first communication\
    \ with the database, which happens within the call to `get` on line 1.\n\nAt this\
    \ point, the `Session` is associated with a JDBC `Connection` object. The `autoCommit`\
    \ property of the `Connection` object is set to `false`, which initiates a transaction.\
