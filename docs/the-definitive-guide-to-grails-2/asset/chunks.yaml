    ### 小结


    至此，你已经为 gTunes 应用实现了登录和注册流程。本书后续章节将提供更多使用控制器的示例，但本章你已经扎实掌握了适用于控制器的核心概念。从数据绑定、验证到命令对象，Grails
    控制器机制为你提供了大量工具。要全面理解各部分如何协同工作，你需要深入掌握 Grails 的视图技术——Groovy Server Pages (GSP)。在下一章中，我们将更详细地探讨
    GSP 及其提供的动态标签库和模板机制。


    ## 第 5 章


    ![Image](img/3squ.jpg)


    ## 理解视图


    在开源世界中，Web 应用的视图技术似乎相当受欢迎，至少从 Java 领域数量繁多的视图技术来看是如此。如果你对传统的 JSP 感到厌倦，似乎总有更新、更好的技术值得学习。然而，JSP
    仍然是 Sun 公司为与微软的 Active Server Pages (ASP) 竞争而推出的最流行的视图技术，它已成为行业标准，并且开发者对 JSP 有着丰富的知识积累。


    JSP 允许开发者将 HTML 等传统标记语言与 Java 代码片段（称为 *scriptlets*）混合使用，以生成动态输出。缺点是，这种机制极易被滥用；因此，出现了自定义标签库，它们能够通过标签将逻辑从
    JSP 页面中抽象出来。JSP 通过增加两个缺失的组件——JSP 标准标签库 (JSTL) 和表达式语言 (EL)——来提升其性能，以追赶一些开源竞争对手。


    鉴于 JSP 的成熟性、健壮性以及在行业内的熟悉度，为什么还有人需要为 Grails 使用另一种视图技术——Groovy Server Pages (GSP)
    呢？答案在于 Groovy 运行时环境。


    > *   要充分利用 Grails，视图技术需要了解 Groovy 的运行时环境及其相关的动态方法分发机制。

    > *   Groovy 提供了更强大的表达式语言，包括 GPath 表达式、Groovy Bean 表示法和可重载的运算符。

    > *   Groovy 的其他特性——例如正则表达式支持、`GString` 以及用于映射和列表的简洁语法——使其成为视图技术的理想选择。


    当然，对于任何新的视图技术，重要的是不要重蹈 JSP 早期迭代的覆辙。混合使用 scriptlets 和标记代码被认为是不好的做法，为此，GSP 提供了一种创建自定义标签的机制，就像
    JSP 一样，但不会牺牲任何敏捷性。


    ### 基础知识


    由于在本书的多个章节中已经接触过 GSP，你可能已经接近专家水平了。尽管如此，讨论 GSP 的基础知识对于帮助你全面掌握其中的所有概念仍然非常宝贵。


    需要注意的是，GSP 实际上与 JSP 非常相似，根据经验你会知道，在 JSP 中，许多对象默认是*可用*的。这些对象包括 `request`、`response`
    和 `session` 对象——与你在第 4 章中看到的相同。如果你还记得，那部分讨论提到，包括 `flash` 在内的几个额外对象对控制器是可用的。你会很高兴地知道，这些对象也可以从
    GSP 视图中访问，此外还有一个额外的 `out` 属性，它是一个代表响应输出的 `java.io.Writer` 实例。表 5-1 描述了可用的 GSP
    属性。


    ![Image](img/9781430243779_Tab05-01.jpg)


    你已经知道如何从控制器中访问这些对象，但在视图中呢？不出所料，GSP 支持 JSP 中可用的相同结构，以及一些额外的结构。接下来的几个示例可能看起来有点像
    JSP 101 教程，但不要混淆——你肯定是在处理 Groovy，而不是 Java。


    #### 理解模型


    在任何 MVC 模式（例如 Grails 采用的模式）中，基本活动之一是将信息（模型）传递给视图进行渲染。在第 4 章中你已经看到了实际应用，但为了回顾一下，清单
    5-1 展示了如何在 Grails 中实现这一点。


    ***清单 5-1.** 创建模型*


    `package package com.gtunes`

    `class StoreController {`


    `    def shop() {`

    `        def genreList =`

    `            new DetachedCriteria(Album).distinct(''genre'').list()`

    `        [genres:genreList.sort()]`

    `    }`

    `}`


    在清单 5-1 中（`StoreController` 的 `shop` 操作），结果是一个包含一个元素的映射，其键是一个值为 `genres` 的字符串。这个键（及其值）随后被放入
    GSP 模型（或者对于更熟悉 Groovy 术语的人来说，称为 *binding*），使其可以像表 5-1 中的页面属性一样作为变量访问。


    在接下来的章节中，你将看到引用 `genres` 变量的示例。请记住，这个变量并非凭空出现。如清单所示，它是通过控制器中的代码传递给视图的。

