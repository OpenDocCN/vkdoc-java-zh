    ***清单 12-43.** _post.gsp 模板*


    `<div id="post${post.id}" class="blogPost"> <h2>${post.title}</h2> <div class="body">`

    `${post.body} </div>`

    `<div class="desc">`

    `发布于 <g:formatDate date="${post.dateCreated}" format="dd MMMMMM yy" /> </div>`

    `</div>`


    至此，你已经基本完成了 `list.gsp` 视图。图 12-4 展示了当你运行 `blog` 插件并访问 `PostController` 的 `list`
    操作时，`list.gsp` 视图的显示效果。


    ![Image](img/9781430243779_Fig12-04.jpg)


    ***图 12-4.** 博客插件的列表视图*


    由于视图直接在 `list.gsp` 中渲染每个 `Post`，`show.gsp` 视图已变得多余，可以删除。同样，在第一个版本中，你只关心创建新帖子，因此
    `edit.gsp` 也可以删除。你随时可以在后续版本中添加编辑功能！


    接下来看 `create.gsp` 视图，它也需要稍作清理。此外，如果能提供富文本编辑功能来撰写帖子，那就更好了。Grails 可用的插件之一是 `CKEditor`
    插件，它增加了对 CKEditor（[`http://ckeditor.com`](http://ckeditor.com)）的支持，这是一个富文本编辑组件。要将
    `CKEditor` 插件安装到 `blog` 插件中，需要在 `BuildConfig.groovy` 中添加相应的依赖，如清单 12-44 所示。


    ***清单 12-44.** 添加对 CKEditor 的依赖*


    `grails.project.dependency.resolution = {`


    `    ...`


    `    plugins {`

    `        runtime ":ckeditor:3.6.3.0"`

    `        ...`

    `    }`

    `}`


    完成上述操作后，让我们在 `_form.gsp` 中使用 `CKEditor` 插件提供的 `<ckeditor:editor>` 标签来启用 CKEditor。清单
    12-45 展示了更新后的 `_form.gsp` 文件，其中 `<ckeditor:editor>` 标签的使用已用粗体突出显示。


    ***清单 12-45.** 使用 CKEditor 启用富文本编辑*


    `<%@ page import="com.blog.Post" %>`


    `<div class="fieldcontain ${hasErrors(bean: postInstance, field: ''title'', ''error'')}
    ">`

    `    <label for="title">`

    `        <g:message code="post.title.label" default="标题" />`

    `    </label>`

    `    <g:textField name="title" value="${postInstance?.title}" />`

    `</div>`


    `<div class="fieldcontain ${hasErrors(bean: postInstance, field: ''body'', ''error'')}
    ">`

    **`    <ckeditor:editor name="body" height="300" width="500">`**

    **`        ${postInstance?.body}`**

    **`    </ckeditor:editor>`**

    `</div>`


    使用 `<ckeditor:editor>` 标签，你可以指定只需要一个包含基本格式选项的简单工具栏；否则，你会得到一个几乎与 Microsoft Word
    等文字处理器一样多选项的工具栏。插件文档位于 [`http://grails.org/plug-in/ckeditor`](http://grails.org/plug-in/ckeditor)，涵盖了所有配置选项。图
    12-5 展示了 `create.gsp` 视图，其中 `<ckeditor:editor>` 标签负责渲染富文本编辑组件。


    ![Image](img/9781430243779_Fig12-05.jpg)


    ***图 12-5.** 使用 CKEditor 创建帖子*


    当然，目前 `list.gsp` 和 `create.gsp` 页面看起来都相当平淡无奇，但这取决于你安装 `blog` 插件的应用程序，通过 CSS 提供有用的样式信息。说到将
    `blog` 插件安装到应用程序中，现在正是时候！在 gTunes 的 `BuildConfig.groovy` 文件中，使用与之前表达对 `album-art`
    插件依赖相同的技术，来表达对该插件的依赖，如清单 12-46 所示。


    ***清单 12-46.** 将 blog 插件安装到 gTunes 中*


    `grails.plugin.location.blog=''../blog''`

    `...`

    `grails.project.dependency.resolution = {`

    `    ...`

    `}`


    请记住，`blog.title` 设置允许你自定义博客标题；只需在 `Config.groovy` 中添加以下设置即可：


    `// 博客配置 blog.title="The gTunes Weblog"`


    使用 `run-app` 命令运行 gTunes 应用程序，然后导航到 URL [`http://localhost:8080/gTunes/post/list`](http://localhost:8080/gTunes/post/list)。神奇的是，`blog`
    插件已经在 gTunes 应用程序中运行，并且与之前完全一样——只不过现在它利用了 gTunes 应用程序的主布局。点击“新建帖子”按钮将带你进入之前开发的
    `create.gsp` 视图。图 12-6 展示了在 gTunes 应用程序中运行的 CKEditor 组件。


    ![Image](img/9781430243779_Fig12-06.jpg)


    ***图 12-6.** 在 gTunes 应用程序中创建博客帖子*


    如果你输入一些内容，包括标题和正文，然后点击“发布”按钮，你将能够在 gTunes 应用程序博客上创建新帖子，如图 12-7 所示。


    ![Image](img/9781430243779_Fig12-07.jpg)


    ***图 12-7.** gTunes 应用程序中的一篇博客帖子*


    显然，目前这只是一个非常基础的博客插件，不支持 RSS、评论、日历、归档等功能。然而，作为使用插件将应用程序分离为可重用模块这一概念的演示，这是一个完美的例子。一个独立的开发团队可以愉快地开发
    `blog` 插件，并随着时间的推移逐步将其功能集成到主应用程序中。你甚至可以创建一个自动化构建，如你在第 11 章中学到的那样，来构建和测试所有插件，并将它们安装到主应用程序中进行集成测试。因此，即使你不打算成为
    Grails 内部机制的专家，插件也绝对值得一看。

