    2.0 > *\"\n    // the other plugins this plugin depends on\n    def dependsOn\
    \ = [:]\n    // resources that are excluded from plugin packaging\n    def pluginExcludes\
    \ = [\n        \"grails-app/views/error.gsp\"\n    ]\n\n    // TODO Fill in these\
