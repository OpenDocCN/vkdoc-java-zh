    With transactions out of the way, let’s revisit a topic that has been touched
    on at various points throughout this chapter: detached objects.


    ### Detached Objects


    The Hibernate `Session` is critically important to understand the nature of detached
    objects. Remember, the `Session` keeps track of all persistent instances and acts
    like a cache, returning instances that already exist in the `Session` rather than
    hitting the database again. As you can imagine, each object goes through an implicit
    life cycle, a topic we’ll be looking at first.


    #### The Persistence Life Cycle


    Before an object has been saved, it is said to be transient. Transient objects
    are just like regular Java objects and have no notion of persistence. Once you
    call the `save()` method, the object is in a persistent state. Persistent objects
    have an assigned identifier and may have enhanced capabilities such as the ability
    to lazily load associations. If the object is discarded by calling the `discard()`
    method or if the `Session` has been cleared, it is said to be in a *detached*
    state. In other words, each persistent object is associated with a single `Session`,
    and if the object is no longer managed by the `Session`, it has been detached
    from the `Session`.


    [Figure 9-2](#Chapter09.html#fig_9_2) shows a state diagram describing the persistence
    life cycle and the various states an object can go through. As the diagram notes,
    another way an object can become detached is if the `Session` itself is closed.
    If you recall, we mentioned that a new `Session` is bound for each Grails request.
    When the request completes, the `Session` is closed. Any objects that are still
    around, for example, held within the `HttpSession`, are now in a detached state.


    ![Image](images/9781430243779_Fig09-02.jpg)


    ***Figure 9-2.** The persistence life cycle*


    What is the implication of being in a detached state? For one, if a detached object
    that is stored in the `HttpSession` has any noninitialized associations, then
    you will get a `LazyInitializationException`.


