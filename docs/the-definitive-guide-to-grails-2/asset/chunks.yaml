- fmt: "### Creating Gant Scripts\n\nTo help you understand this better, let’s take\
    \ a look at a simple “Hello World”–style example. Using the `create-script` command,\
    \ create a new script called `HelloWorld.groovy`:\n\n```\ngrails> create-script\
    \ HelloWorld\n| Created file scripts/HelloWorld.groovy\n```\n\nAs expected, you’ll\
    \ end up with a new Gant script, `HelloWorld.groovy`, in the `scripts` directory\
    \ of your project. [Figure 11-1](#Chapter11.html#fig_11_1) shows the script snugly\
    \ in place.\n\n![Image](images/9781430243779_Fig11-01.jpg)\n\n**Figure 11-1.**\
    \ The `HelloWorld.groovy` Gant script\n\nGrails uses lowercase names separated\
    \ by hyphens—for example, `hello-world`—when referencing scripts but transforms\
    \ the name into camelCase for the script name. [Listing 11-23](#Chapter11.html#list_11_23)\
    \ shows the contents of the generated `HelloWorld.groovy` script from [Figure\
    \ 11-1](#Chapter11.html#fig_11_1).\n\n**Listing 11-23.** The Script Template\n\
    \n```\ngrailsHome = ant.project.properties.\"environment.GRAILS_HOME\"\nincludeTargets\
    \ << grailsScript(\"_GrailsInit\")\n\ntarget(main: \"The description of the script\
    \ goes here!\") {\n   // TODO\n}\nsetDefaultTarget(main)\n```\n\nAs you can see,\
    \ the template pulls in some existing functionality from a script called `_GrailsInit.groovy`\
    \ in the `scripts` directory of the location where you installed Grails. It then\
    \ defines a single target, the default target, called `main`. To complete the\
    \ “Hello World” example, use a `println` statement to print a message:\n\n```\n\
    includeTargets << grailsScript(\"_GrailsInit\")\n\ntarget(main: \"The description\
    \ of the script goes here!\") {\n    println 'Hello World!'\n}\n\nsetDefaultTarget(main)\n\
    ```\n\nTo run the `hello-world` script, just run this command using the `grails`\
    \ executable:\n\n```\ngrails> hello-world\n| Environment set to development....\n\
    Hello World!\ngrails>\n```\n\nGrails will perform a search of all the directories\
    \ mentioned previously and find the `HelloWorld.groovy` script. Since the `main`\
    \ target is the default target, Grails will execute it, and the “Hello World!”\
    \ message will be printed.\n\nOf course, having the entire Ant API at your disposal\
    \ allows you to do a lot more than just print messages. Ant, along with its plug-ins,\
    \ provides access to targets that allow you to manipulate the file system, compile\
    \ Java or Groovy code, perform XSLT transformations, and do just about anything\
    \ else you could dream of from the command line.\n\n![Image](images/square.jpg)\
    \ **Tip** If you aren’t already familiar with the Apache Ant manual (most Java\
    \ developers are), it may be useful to take a look at it ([`http://ant.apache.org/manual/`](http://ant.apache.org/manual/)).\
    \ The manual provides comprehensive information about what you can do with Ant.\n\
    \n### Command-Line Variables\n\nThe `_GrailsInit.groovy` script that was imported\
    \ by `HelloWorld.groovy` in [Listing 11-11](#Chapter11.html#list_11_11) provides\
    \ a bunch of useful variables and targets. Here are some of them.\n\n> *   `grailsVersion`:\
    \ the version of Grails you’re using\n> *   `grailsEnv`: the environment in which\
    \ Grails is executing\n> *   `basedir`: a string representing the base directory\
    \ from which the script is executing\n> *   `baseFile`: similar to `basedir`,\
    \ but a `Java.io.File` representation\n> *   `userHome`: the current user’s home\
    \ directory as a string\n> *   `pluginsHome`: the location where plug-ins are\
    \ installed\n> *   `classesDir`: the location to which classes are compiled\n\n\
    The `grailsEnv` variable deserves special mention. If you recall from [Chapter\
    \ 2](#Chapter02.html#ch2), you can tell Grails to run within the context of development,\
    \ test, or production environments. To recap, the following command will execute\
    \ the `run-app` command using the production settings:\n\n```\n$ grails prod run-app\n\
    ```\n\nYour scripts can be equally environment-aware using the `grailsEnv` variable.\
    \ For example, if you want a Gant script to run only in the development environment,\
    \ you can write code like this:\n\n```\nif(grailsEnv ==  'development')  {\n//\
    \ do something }\n```\n\nSome of the other variables, such as the `pluginsHome`\
    \ and `classesDir` variables, are automatically constructed by Grails. By default,\
    \ Grails stores plug-ins and some compiled resources in your `USER_HOME` directory\
    \ under a special path. For example, you can find the gTunes application’s plug-in\
    \ related code in the directory `USER_HOME/.grails/2.0.4/projects/gtunes/plugins`.\n\
    \nAs you can see, Grails takes the Grails version number and the project name\
    \ to formulate a path within the `USER_HOME` directory. If you are not happy with\
    \ this location, then you can tell Grails to use a different path by passing the\
    \ `grails.work.dir` argument at the command line:\n\n```\n$ grails -Dgrails.work.dir=/tmp\
    \ run-app\n```\n\nIn fact, you can pass a whole load of different command-line\
    \ arguments to customize the different locations that Grails uses.\n\n> *   `grails.work.dir`:\
    \ the base location where all Grails work occurs, including the test and source\
    \ compilation directories\n> *   `grails.project.classes.dir`: the location to\
    \ which project sources are compiled\n> *   `grails.project.resource.dir`: the\
    \ location to which project static resources (such as `web.xml`) are generated\n\
    > *   `grails.project.test.class.dir`: the location to which test sources are\
    \ compiled\n> *   `grails.plugins.dir`: the location where plug-ins are installed\n\
    > *   `grails.global.plugins.dir`: the location where global plug-ins are installed\n\
    \n### Parsing Command-Line Arguments\n\nUnlike raw Gant, the `grails` command\
    \ doesn’t support chaining of targets; instead, it favors the easy passing of\
    \ command-line arguments. One useful target to depend on that is provided by the\
    \ `Init.groovy` script is the `parseArguments` target. The `parseArguments` target\
    \ will read any command-line arguments and produce a variable called `argsMap`,\
    \ containing the values of the arguments in a more accessible form.\n\nFor example,\
    \ say you wanted to enable the `HelloWorld.groovy` script to be able to print\
    \ the name of the person to say hello to in either uppercase or lowercase. You\
    \ could allow the name to be passed as a command-line argument and whether to\
    \ print in uppercase or not as a command-line flag, as follows:\n\n```\ngrails>\
    \ hello-world John\n| Environment set to development....\nHello John\ngrails>\
    \ hello-world John -uppercase\n| Environment set to development.....\nHELLO JOHN\n\
    grails>\n```\n\nImplementing the handling of these is very simple. [Listing 11-24](#Chapter11.html#list_11_24)\
    \ shows an updated `HelloWorld.groovy` Gant script that gracefully handles these\
    \ arguments.\n\n**Listing 11-24.** Handling Command-Line Arguments\n\n```\nincludeTargets\
    \ << grailsScript(\"_GrailsInit\")\n\ntarget(main: \"The description of the script\
    \ goes here!\") {\n    def message = \"Hello ${argsMap.params ? argsMap.params[0]\
    \ : 'World'}\"\n    if(argsMap.uppercase) {\n        println message.toUpperCase()\n\
    \    } else {\n        println message\n    }\n}\n\nsetDefaultTarget(main)\n```\n\
    \nNotice that command-line flags (the arguments that start with `–` or `--`) are\
    \ placed as Boolean values into the `argsMap`. The example in [Listing 11-12](#Chapter11.html#list_11_12)\
    \ shows how the `-uppercase` flag ends up as a Boolean value, with the key `uppercase`\
    \ inside the `argsMap`. You can also have flags with values; for example, if you\
    \ passed `-uppercase=yes`, then the value would be a `String` with the value `yes`\
    \ in the `argsMap`.\n\nAll other arguments that are not flags are placed in the\
    \ `params` key as a `List` that retains the order in which they were passed."
  raw: '#### Creating Gant Scripts


    To help you understand this better, let’s take a look at a simple “Hello World”–style
    example. Using the `create-script` command, create a new script called `HelloWorld.groovy`:


    `grails> create-script HelloWorld`

    `| Created file scripts/HelloWorld.groovy`


    As expected, you’ll end up with a new Gant script, `HelloWorld.groovy`, in the
    `scripts` directory of your project. [Figure 11-1](#Chapter11.html#fig_11_1) shows
    the script snugly in place.


    ![Image](images/9781430243779_Fig11-01.jpg)


    ***Figure 11-1.** The HelloWorld.groovy Gant script*


    Grails uses lowercase names separated by hyphens—for example, `hello-world`—when
    referencing scripts but transforms the name into camelCase for the script name.
    [Listing 11-23](#Chapter11.html#list_11_23) shows the contents of the generated
    `HelloWorld.groovy` script from [Figure 11-1](#Chapter11.html#fig_11_1).


    ***Listing 11-23.** The Script Template*


    `grailsHome = ant.project.properties."environment.GRAILS_HOME"`

    `includeTargets << grailsScript("_GrailsInit")`


    `target(main: "The description of the script goes here!") {`

    `   // TODO`

    `}`

    `setDefaultTarget(main)`


    As you can see, the template pulls in some existing functionality from a script
    called `_GrailsInit.groovy` in the `scripts` directory of the location where you
    installed Grails. It then defines a single target, the default target, called
    `main`. To complete the “Hello World” example, use a `println` statement to print
    a message:


    `includeTargets << grailsScript("_GrailsInit")`


    `target(main: "The description of the script goes here!") {`

    `    println ''Hello World!''`

    `}`


    `setDefaultTarget(main)`


    To run the `hello-world` script, just run this command using the `grails` executable:


    `grails> hello-world`

    `| Environment set to development....`

    `Hello World!`

    `grails>`


    Grails will perform a search of all the directories mentioned previously and find
    the `HelloWorld.groovy` script. Since the `main` target is the default target,
    Grails will execute it, and the “Hello World!” message will be printed.


    Of course, having the entire Ant API at your disposal allows you to do a lot more
    than just print messages. Ant, along with its plug-ins, provides access to targets
    that allow you to manipulate the file system, compile Java or Groovy code, perform
    XSLT transformations, and do just about anything else you could dream of from
    the command line.


    ![Image](images/square.jpg) **Tip** If you aren’t already familiar with the Apache
    Ant manual (most Java developers are), it may be useful to take a look at it ([`http://ant.apache.org/manual/`](http://ant.apache.org/manual/)).
    The manual provides comprehensive information about what you can do with Ant.


    #### Command-Line Variables


    The `_GrailsInit.groovy` script that was imported by `HelloWorld.groovy` in [Listing
    11-11](#Chapter11.html#list_11_11) provides a bunch of useful variables and targets.
    Here are some of them.


    > *   `grailsVersion`: the version of Grails you’re using

    > *   `grailsEnv`: the environment in which Grails is executing

    > *   `basedir`: a string representing the base directory from which the script
    is executing

    > *   `baseFile`: similar to `basedir`, but a `Java. io.File` representation

    > *   `userHome`: the current user’s home directory as a string

    > *   `pluginsHome`: the location where plug-ins are installed

    > *   `classesDir`: the location to which classes are compiled


    The `grailsEnv` variable deserves special mention. If you recall from [Chapter
    2](#Chapter02.html#ch2), you can tell Grails to run within the context of development,
    test, or production environments. To recap, the following command will execute
    the `run-app` command using the production settings:


    `$ grails prod run-app`


    Your scripts can be equally environment-aware using the `grailsEnv` variable.
    For example, if you want a Gant script to run only in the development environment,
    you can write code like this:


    `if(grailsEnv ==  ''development'')  {`

    `// do something }`


    Some of the other variables, such as the `pluginsHome` and `classesDir` variables,
    are automatically constructed by Grails. By default, Grails stores plug-ins and
    some compiled resources in your `USER_HOME` directory under a special path. For
    example, you can find the gTunes application’s plug-in related code in the directory
    `USER_HOME/.grails/2.0.4/projects/gtunes/plugins`.


    As you can see, Grails takes the Grails version number and the project name to
    formulate a path within the `USER_HOME` directory. If you are not happy with this
    location, then you can tell Grails to use a different path by passing the `grails.
    work.dir` argument at the command line:


    `$ grails -Dgrails.work.dir=/tmp run-app`


    In fact, you can pass a whole load of different command-line arguments to customize
    the different locations that Grails uses.


    > *   `grails.work.dir`: the base location where all Grails work occurs, including
    the test and source compilation directories

    > *   `grails.project.classes.dir`: the location to which project sources are
    compiled

    > *   `grails.project.resource.dir`: the location to which project static resources
    (such as `web.xml`) are generated

    > *   `grails.project.test.class.dir`: the location to which test sources are
    compiled

    > *   `grails.plugins.dir`: the location where plug-ins are installed

    > *   `grails.global.plugins.dir`: the location where global plug-ins are installed


    #### Parsing Command-Line Arguments


    Unlike raw Gant, the `grails` command doesn’t support chaining of targets; instead,
    it favors the easy passing of command-line arguments. One useful target to depend
    on that is provided by the `Init.groovy` script is the `parseArguments` target.
    The `parseArguments` target will read any command-line arguments and produce a
    variable called `argsMap`, containing the values of the arguments in a more accessible
    form.


    For example, say you wanted to enable the `HelloWorld.groovy` script to be able
    to print the name of the person to say hello to in either uppercase or lowercase.
    You could allow the name to be passed as a command-line argument and whether to
    print in uppercase or not as a command-line flag, as follows:


    `grails> hello-world John`

    `| Environment set to development....`

    `Hello John`

    `grails> hello-world John -uppercase`

    `| Environment set to development.....`

    `HELLO JOHN`

    `grails>`


    Implementing the handling of these is very simple. [Listing 11-24](#Chapter11.html#list_11_24)
    shows an updated `HelloWorld.groovy` Gant script that gracefully handles these
    arguments.


    ***Listing 11-24.** Handling Command-Line Arguments*


    `includeTargets << grailsScript("_GrailsInit")`


    `target(main: "The description of the script goes here!") {`

    `    def message = "Hello ${argsMap.params ? argsMap.params[0] : ''World''}"`

    `    if(argsMap.uppercase) {`

    `        println message.toUpperCase()`

    `    } else {`

    `        println message`

    `    }`

    `}`


    `setDefaultTarget(main)`


    Notice that command-line flags (the arguments that start with `–` or `--`) are
    placed as Boolean values into the `argsMap`. The example in [Listing 11-12](#Chapter11.html#list_11_12)
    shows how the `-uppercase` flag ends up as a Boolean value, with the key `uppercase`
    inside the `argsMap`. You can also have flags with values; for example, if you
    passed -`uppercase=yes`, then the value would be a `String` with the value `yes`
    in the `argsMap`.


    All other arguments that are not flags are placed in the `params` key as a `List`
    that retains the order in which they were passed.'
