    再次借助你的 CSS 技能，现在搜索结果的呈现已经相当规整。更棒的是，由于它们使用了与屏幕右侧“最新专辑”列表相同的 `<g:remoteLink>` 标签，因此开箱即用，支持
    Ajax。只需点击一个搜索结果，就能通过 Ajax 拉取一张 `Album` 的详细信息！图 8-5 展示了搜索框的使用，并演示了如何通过 Searchable
    插件支持使用星号 (*) 字符的通配符功能。


    ![Image](img/9781430243779_Fig08-05.jpg)


    ***图 8-5.** 使用 <g:remoteField> 和 Searchable 实现即时搜索结果*


    ### 关于 Ajax 与性能的说明


    注意 Ajax 对应用程序性能的影响至关重要。考虑到需要渲染大量的小代码片段，设计不佳的 Ajax 应用程序需要处理数量显著更多的请求也就不足为奇了。本章到目前为止所展示的是一种较为初级的
    Ajax 开发方法。你只是对应用程序挥舞了 Ajax 的魔法棒，却很少考虑其性能影响。


    不过，现在开始考虑这些问题也为时不晚。在投入更多硬件资源之前，你可以使用多种技术来减少 Ajax 应用程序执行的请求数量。


    请记住，Ajax 调用是一次远程网络调用，因此代价高昂。诸如数据传输对象（DTO）之类的概念在 Ajax 领域同样适用。从根本上说，DTO 模式作为一种机制，可以将多个操作批量打包到一次调用中，并向服务器传递足够的状态，以便一次性执行多个操作。这种模式在
    Ajax 中同样有效，因为一次传输大量信息的调用，比十几次小调用要好。


    另一种流行的技术是将更多复杂性转移到客户端。鉴于 Ajax 客户端通常只占据一个物理页面，因此可以通过缓存将相当多的状态保留在客户端。缓存可能是 Ajax
    开发中最重要的技术，在可能的情况下，应充分利用它来优化与服务器的通信。


    无论你使用哪种技术，从长远来看都会带来回报，服务器基础设施的工程师们会因此感激你。你的应用程序用户也会欣赏其更快的响应速度和交互性。


    ### 本章小结


    在本章中，你了解了 Grails 提供的广泛的自适应 Ajax 标签，以及如何应用它们来为你的 gTunes 应用程序提供一个更易用的交互式界面。在这段特别的旅程中，你还探索了
    Grails 的高级开发，更深入地学习了控制器、模板和 `render` 方法如何协同工作。


    在过去的几章中，你通过控制器、GSP、标签库和 Ajax 等形式，深入参与了 Grails 的 Web 层开发。然而，到目前为止你所看到的一切都使用了完全无状态的通信方式。在下一章中，你将了解
    Grails 如何支持用于跨多个页面的丰富会话的 Web Flow。


    ## 第 9 章


    ![Image](img/3squ.jpg)


    ## GORM


    正如你可能从本书的目录中了解到的那样，Grails 的持久化层是整个架构中的关键部分。在第 3 章中，你已经对领域类是什么以及它们如何映射到底层数据库有了一个表面的理解。在本章中，你将一头扎进
    GORM 的内部工作机制。


    作为起点，你将学习涉及从数据库读取和写入对象的基本持久化操作。在了解了基础知识之后，你将进一步学习 GORM 的语义，包括我们尽可能在一章中涵盖的许多边界情况和令人惊讶的特性。


    ### 持久化基础


    幸运的是，我们不会在基础上花费太多时间，因为你已经接触过 GORM 的基础知识了。不过，作为回顾，让我们看看 GORM 提供的基本读取操作。


    #### 读取对象


    每个领域类都会自动增强一些方法，允许你查询领域实例。其中最简单的是 `get` 方法，它接受一个领域类的标识符，并返回一个实例，如果在数据库中没有找到该实例，则返回
    `null`。代码清单 9-1 展示了一个简单的示例，来自你已经开发过的 `AlbumController`，相关代码以粗体显示。


    ***代码清单 9-1.** 使用 get 方法*


    `class AlbumController {`

    `    def show() {`

    `        def album = Album.get(params.id)`

    `        if(album) {`

    `        }`

    `    }`

    `}`


    除了简单的 `get` 方法之外，还有一个 `getAll` 方法，它可以接受多个标识符并返回一个实例的 `List`。你可以将标识符指定为一个 `List`
    或使用可变参数；例如：


    `def albums = Album.getAll(1,2,3)`


    当使用 `get` 方法时，对象会以可修改的状态从数据库加载。换句话说，你可以对对象进行更改，这些更改随后会被持久化到数据库。如果你想以只读状态加载对象，可以使用
    `read` 方法代替：


    `def album = Album.read(params.id)`


    在这种情况下，返回的 `Album` 实例不能被修改。你对对象所做的任何更改都不会被持久化。这样做还有一个性能优势，因为 Hibernate 不必跟踪哪些属性发生了变化（脏检查）。


    #### 列表、排序和计数


    从数据库中检索项目的一种常见方法是简单地列出它们。显然，列出所有实例并不总是可取的，并且返回结果的顺序通常很重要。GORM 提供了一个 `list()` 方法，它接受许多命名参数，包括
    `max`、`offset`、`sort` 和 `order`，以自定义结果，其定义如下：


    > *   `max`：要返回的最大实例数

    > *   `offset`：相对于 0 的第一个返回结果的偏移量

    > *   `sort`：用于排序的属性名

    > *   `order`：结果的排序顺序，`asc` 表示升序，`desc` 表示降序


    除了 `list()` 方法（通常与其结合使用）之外，还有 `count()` 方法，它用于计算数据库中实例的总数。为了演示这些方法，让我们看一些它们的使用示例（见代码清单
    9-2）。


    ***代码清单 9-2.** 使用 list() 方法*


    `// 获取所有专辑；注意，可能有很多！`

    `def allAlbums = Album.list()`

    `// 获取最近创建的十张专辑`

    `def topTen = Album.list(max:10, sort:''dateCreated'', order:''desc'')`

    `// 获取专辑总数`

    `def totalAlbums = Album.count()`


    可以想象，通过自定义 `offset` 参数，使用 `list()` 方法来执行结果的分页是非常简单的。此外，还有一组 `listOrderBy*` 方法，它们是
    `list()` 方法的变体。


    `listOrderBy*` 方法提供了一个示例，其中每个方法在方法签名中都使用了类本身的属性。它们对于每个领域类都是唯一的，但理解其约定即可使用。代码清单
    9-3 是一个示例，它通过简单地调用 `listOrderByDateCreated()` 方法，列出了所有按 `dateCreated` 属性排序的 `Album`
    实例。


    ***代码清单 9-3.** 使用 listOrderBy*


    `// 所有按创建日期排序的专辑`

    `def allByDate = Album.listOrderByDateCreated()`


    使用标准的 Bean 约定，属性名（首字母大写）被附加到方法签名的末尾。在本章后面介绍动态查找器（包括 `count` 方法的一个变体）时，你还会看到更多这样的例子。

