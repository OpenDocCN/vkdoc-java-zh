- fmt: "The string being passed to the `scope` method in [Listing 11-16](#Chapter11.html#list_11_16)\
    \ describes the dependency. The syntax is `group:name:version`, and so in `mysql:mysql-connector-java:5.1.21`,\
    \ “`mysql`” is the group, “`mysql-connector-java`” is the name, and “`5.1.21`”\
    \ is, of course, the version. These terms will be familiar to anyone who has worked\
    \ with Maven.\n\nAn alternative syntax is to specify details of the artefact in\
    \ the form of named arguments to the `scope` method (see [Listing 11-17](#Chapter11.html#list_11_17)).\n\
    \n***Listing 11-17.** Using Named Arguments to Express a Dependency*\n\n```\n\
    grails.project.dependency.resolution = {\n    ...\n    dependencies {\n      \
    \  runtime group: 'mysql'\n                name: 'mysql-connector-java'\n    \
    \            version: '5.1.21'\n    }\n    ...\n}\n```\n\nMultiple dependencies\
    \ may be specified in a single call (see [Listing 11-18](#Chapter11.html#list_11_18)).\n\
    \n***Listing 11-18.** Specifying Multiple Dependencies at Once*\n\n```\ngrails.project.dependency.resolution\
    \ = {\n    ...\n    dependencies {\n        // specify dependencies here under\
    \ either 'build', 'compile', 'runtime', 'test', or\n'provided' scopes, e.g.\n\n\
    \        runtime 'mysql:mysql-connector-java:5.1.21'\n        runtime 'commons-httpclient:commons-httpclient:3.1'\n\
    \n        // or ...\n\n        runtime 'mysql:mysql-connector-java:5.1.21',\n\
    \               'commons-httpclient:commons-httpclient:3.1'\n        // or...\n\
    \n        runtime [[group: 'mysql', name: 'mysql-connector-java', version: '5.1.21'],\n\
    \                 [group: 'commons-httpclient', name: 'commons-httpclient', version:\
