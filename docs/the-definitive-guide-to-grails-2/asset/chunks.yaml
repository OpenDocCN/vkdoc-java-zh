    #### 条件查询


    条件查询可能是最强大的查询机制之一。它利用 Groovy 的构建器支持，采用构建器语法来创建查询。Groovy 中的构建器本质上是一个方法调用和闭包的层级结构；它非常适合“构建”树状结构，例如
    XML 文档或图形用户界面（GUI）。构建器也是构建查询（尤其是动态查询）的理想选择，而动态查询通常使用极易出错的 `StringBuffer` 来构建。


    Hibernate 条件 API 旨在通过提供一种编程方式来构建“条件”查询，从而降低出错风险。然而，Groovy 富有表现力的语法和强大的元编程支持将其提升到了一个新的简洁水平。让我们先看看条件查询的基本使用模式，然后再介绍一些更高级的示例。


    在执行条件查询之前，你需要为要查询的类获取一个条件实例。为了方便这一点，GORM 在每个领域类上提供了一个 `createCriteria` 静态方法。一旦你获得了条件实例，就可以调用四种方法之一，每种方法都需要一个闭包参数：


    > *   `get`：为查询定位一个唯一实例

    > *   `list`：为查询返回一个实例列表

    > *   `scroll`：为查询返回一个 `ScrollableResults` 实例

    > *   `count`：为查询返回整数形式的总结果数


    最常见的用例涉及在条件实例上调用 `list()` 方法来执行查询，如清单 9-11 所示。


    ***清单 9-11.** 一个简单的条件查询*


    `def c = Album.createCriteria()`

    `def results = c.list {`

    `    eq(''genre'', ''Alternative'')`

    `    between(''dateCreated'', new Date()-30, new Date())`

    `}`


    前面的示例列出了所有 `genre` 为 `Alternative` 且在过去 30 天内创建的 `Album` 实例。闭包块内的嵌套方法调用会转换为对 Hibernate
    的 `org.hibernate.criterion.Restrictions` 类的方法调用，其 API 过于冗长，无法在此列出。尽管如此，这里展示的 `eq`
    和 `between` 方法只是众多方法中的两个，用于执行 SQL 和 HQL 等查询语言中的所有典型查询。


    值得查看 Hibernate 网站上的 API（[`http://docs.jboss.org/hibernate/core/3.6/javadocs/org/hibernate/criterion/Restrictions.html`](http://docs.jboss.org/hibernate/core/3.6/javadocs/org/hibernate/criterion/Restrictions.html)），以了解可用的功能，并更好地理解你触手可及的能力。当然，你可以使用动态查找器方法构建类似于清单
    9-11 中的查询。但你尚未真正探索的是闭包的力量以及动态构建查询的能力。


    现在考虑一下，闭包只是一段代码块；它可以被赋值给一个变量。同时，考虑一下闭包可以引用其封闭作用域内的变量。将这两者结合起来，你就拥有了一种非常强大的机制来重用动态构建的查询。


    例如，假设你有一个映射，其键定义了要查询的属性名称，值定义了要查询的值，例如 Grails 控制器提供的 `params` 对象。可以轻松地根据此映射构建一个查询并赋值给一个变量。清单
    9-12 提供了此概念的实际示例。


    ***清单 9-12.** 使用条件进行动态查询*


    ` 1 def today = new Date()`

    ` 2 def queryMap =   [ genre: ''Alternative'', dateCreated: [today-10,today]  ]`

    ` 3 def query = {`

    ` 4     // 遍历查询映射`

    ` 5     queryMap.each { key, value ->`

    ` 6         // 如果是一个列表，则假定为 between 查询`

    ` 7         if(value instanceof List) {`

    ` 8             // 使用展开运算符调用`

    ` 9             between(key, *value)`

    `10        }`

    `11        else {`

    `12            like(key,value)`

    `13        }`

    `14    }`

    `15 }`

    `16`

    `17 // 创建一个条件实例`

    `18 def criteria = Album.createCriteria()`

    `19`

    `20 // 统计结果`

    `21 println( criteria.count(query) )`

    `22`

    `23 // 再次使用以获取唯一结果`

    `24 println( criteria.get(query) )`

    `25`

    `26 // 再次使用以列出所有结果`

    `27 criteria.list(query).each { println it }`

    `28`

    `29 // 使用可滚动结果`

    `30 def scrollable = criteria.scroll(query)`

    `31 def next = scrollable.next()`

    `32 while(next) {`

    `33     println(scrollable.getString(''title''))`

    `34     next = scrollable.next()`

    `35 }`


    这个相当长的示例包含了一些相当高级的概念。为了简化理解，我们添加了行号，并将逐一进行讲解。下面代码中的前两行使用当前时间定义了一个日期实例，并使用 Groovy
    的映射语法定义了一个映射，该映射将决定你要查询哪些属性。映射的键是要查询的属性名称，值定义了要查询的值。


    `1 def today = new Date()`

    `2 def queryMap =   [ genre: ''Alternative'', dateCreated: [today-10,today]  ]`


    ![Image](img/square.jpg) **提示** 在清单 9-12 中，为了计算过去十天的日期范围，我们取了一个 `java.util.Date`
    实例并从中减去了十。这是 Groovy 的运算符重载功能的一个示例，用于简化日期操作。


    在第 3 行，一个闭包被赋值给 `query` 变量，该变量将与条件一起使用。该闭包的右括号在第 15 行，但闭包主体中发生了一些重要的事情：


    `3   def query = {`

    `       ...`

    `15 }`


    首先，使用一个名为 `each` 的内置 GDK 方法来遍历 `Map` 中的每个条目。本质上，该方法会遍历映射中的每个元素，并将键和值作为参数传递给传入的闭包。


    `5     queryMap.each { key, value ->`

    `                ...`

    `14   }`


    接下来，使用熟悉的 `instanceof` 运算符来检查传递的值是否为 `List`。如果传递的值*是*一个 `List`，则可以调用 `between`
    方法来传递键和值。该值使用 Groovy 的 `*` 展开运算符拆分为两个参数：


    `7      if(value instanceof List) {`

    `8          // 使用展开运算符调用`

    `9          between(key, *value)`

    `10     }`

    `11     else {`

    `12         like(key,value)`

    `13     }`


    `*` 展开运算符的作用是将一个 `List` 或数组拆分开，并将分离后的值传递给目标。在这种情况下，`between` 方法（实际上接受三个参数，而不是两个）被正确调用，列表的第一个元素作为第二个参数，第二个元素作为第三个参数。


    现在，让我们开始看看以闭包形式存在的查询如何与条件实例一起作为可重用的代码块工作。当然，像往常一样，你必须创建条件实例，这在第 18 行完成：


    `18 def criteria = Album.createCriteria()`


    然后，使用相同的闭包来调用条件实例的各种方法：


    `21 println( criteria.count(query) )`

    `24 println( criteria.get(query) )`

    `27 criteria.list(query).each { println it }`


    第一个（第 21 行）统计查询的所有结果；下一个打印出一个唯一结果（如果存在的话），最后一个列出查询的所有结果，然后遍历它们，使用之前遇到的 `each`
    方法将每个结果打印到标准输出。


    还有一个用法，在第 30 行，使用了条件上的 `scroll` 方法。这将返回一个名为 `org.hibernate.ScrollableResults`
    的 Hibernate 类的实例，该实例具有与 JDBC `java.sql.ResultSet` 类似的接口，并共享许多相同的方法。然而，一个主要区别是，结果列的索引从
    0 开始，而不是像 JDBC 那样从 1 开始。

