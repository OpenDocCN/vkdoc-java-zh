    `       from`

    `              artist artist0_`

    `       where`

    `              artist0_.id=?`

    `Hibernate:`

    `    select`

    `              artist0_.id as id8_0_,`

    `         ...`

    `       from`

    `              artist artist0_`

    `       where`

    `              artist0_.id=?`

    `...`


    对此问题的一个本能反应是将所有关联都设置为即时加载。即时关联使用 SQL `JOIN`，这样每当查询 `Album` 实例时，所有 `Artist` 关联都会被填充。代码清单
    9-61 展示了如何使用 `mapping` 属性将关联默认配置为即时加载。


    ***代码清单 9-61.** 配置即时关联*


    `class Album {`

    `    ...`

    `    static mapping = {`

    `        artist fetch:''join''`

    `    }`

    `}`


