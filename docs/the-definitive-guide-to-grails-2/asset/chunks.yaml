  raw: '#### Step 1: Creating the Application


    Sound easy? It is, and your first port of call is the `create-app` command; you
    managed to extract some help with it in the previous section. To run the command,
    simply type `grails create-app` and hit Enter in the command window:


    `$ grails create-app`


    Grails will automatically prompt you for a project name, as presented in [Listing
    1-4](#Chapter01.html#list_1_4). When this happens, type `gTunes` and hit Enter.
    As an alternative, use the command `grails create-app gTunes`, in which case Grails
    takes the appropriate action automatically.


    ***Listing 1-4.** Creating an Application with the create-app Command*


    `Environment set to development . . .`

    `Application name not specified. Please enter: gTunes`


    Upon completion, the command will have created the gTunes Grails application and
    the necessary directory structure. The next step is to navigate to the newly created
    application in the command window using the shell command:


    `cd gTunes`


    At this point you have a clean slate—a newly created Grails application—with the
    default settings in place. A screenshot of the structure of a Grails application
    appears in [Figure 1-2](#Chapter01.html#fig_1_2).


    We will delve deeper into the structure of a Grails application and the roles
    of the various files and directories as we progress through the book. Notice,
    however, how Grails contains directories for controllers, domain objects (models),
    and views.


    ![Image](images/9781430243779_Fig01-02.jpg)


    ***Figure 1-2.** The gTunes application structure*


    #### Step 2: Creating a Controller


    Grails is an MVC^([1](#Chapter01.html#CHP-1-FN-1)) framework, which means it has
    models, views, and controllers to separate concerns cleanly. Controllers, which
    are central to a Grails application, can easily marshal requests, deliver responses,
    and delegate to views. Because the gTunes application centers on the concept of
    a music store, we’ll show how to create a “store” controller.


    To help along the way, Grails features an array of helper commands for creating
    classes that “fit” into the various slots in a Grails application. For example,
    for controllers there is the `create-controller` command, which will do nicely.
    But using these commands is not mandatory. As you grow more familiar with the
    different concepts in Grails, you can just as easily create a controller class
    using your favorite text editor or integrated development environment (IDE).


    ![Image](images/line.jpg)


    1  The Model-View-Controller (MVC) pattern is a common pattern found in many web
    frameworks designed to separate user interface and business logic. See Wikipedia,
    “Model-view-controller,” [http://en.wikipedia.org/wiki/Model-view-controller](http://en.wikipedia.org/wiki/Model-view-controller),
    2003.


    Nevertheless, let’s get going with the `create-controller` command, which, as
    with `create-app`, takes an argument where you can specify the name of the controller
    you wish to create. Simply type `grails create-controller store`:


    `$ grails create-controller store`


    Now sit back while Grails does the rest (see [Listing 1-5](#Chapter01.html#list_1_5)).


    ***Listing 1-5.** Creating a Controller with the create-controller Command*


    `| Created file grails-app/controllers/gtunes/StoreController.groovy`

    `| Created file grails-app/views/store`

    `| Created file test/unit/gtunes/StoreControllerTests.groovy`


    Once the `create-controller` command has finished running, Grails will have created,
    not one, but two classes for you: a new controller called `StoreController` within
    the `grails-app/ controllers` directory and an associated test case in the `test/unit`
    directory. Since a package name was not specified on the command line, Grails
    defaults to creating artifacts in a package name that matches the application
    name. [Figure 1-3](#Chapter01.html#fig_1_3) shows the newly created controller
    nesting nicely in the appropriate directory.


    ![Image](images/9781430243779_Fig01-03.jpg)


    ***Figure 1-3.** The newly created StoreController*


    Due to Groovy’s dynamic nature, you should aim for a high level of test coverage^([2](#Chapter01.html#CHP-1-FN-2))
    in any Grails project (Grails assumes you’ll need a test if you’re writing a controller).
    Dynamic languages such as Groovy, Ruby, and Python do not give nearly as much
    compile-time assistance as a statically typed language such as Java. Some errors
    that you might expect to be caught at compile time are actually left to runtime,
    including method resolution. Sadly, the comfort of the compiler often encourages
    Java developers to forget about testing altogether. Needless to say, the compiler
    is not a substitute for a good suite of unit tests, and what you lose in compile-time
    assistance you gain in expressivity.


    ![Image](images/line.jpg)


    2  Code coverage is a measure used in software testing. It describes the degree
    to which the source code of a program has been tested.


    Throughout this book we will demonstrate automated-testing techniques that make
    the most of Grails’s testing support.


    #### Step 3: Printing a Message


    Let’s return to the `StoreController`. By default, Grails will create the controller
    and give it a single action called `index`. The `index` action is, by convention,
    the default action in the controller. [Listing 1-6](#Chapter01.html#list_1_6)
    shows the `StoreController` containing the default `index` action.


    ***Listing 1-6.** The Default index Action*


    `package gtunes`

    `class StoreController {`

    `    def index() {}`

    `}`


    The `index` action doesn’t seem to be doing much, but by convention its declaration
    instructs Grails to try to render a view called `grails-app/views/store/index.gsp`
    automatically. Views are the subject of [Chapter 5](#Chapter05.html), so for the
    sake of simplicity we’re going to try something less ambitious instead.


    Grails controllers come with a number of implicit methods, which we’ll cover in
    [Chapter 4](#Chapter04.html). One of these is `render`, a multipurpose method
    that, among other things, can render a simple textual response. [Listing 1-7](#Chapter01.html#list_1_7)
    shows how to print a simple response: “Welcome to the gTunes store!”


    ***Listing 1-7.** Printing a Message Using the render Method*


    `package gtunes`

    **`class StoreController {`**

    **`    def index() {`**

    **`        render ''Welcome to the gTunes store!''`**

    **`    }`**

    **`}`**'
  trans: '

    #### 步骤 1：创建应用程序


    听起来很简单？确实如此，你的第一步是使用 `create-app` 命令；你在上一节中已经成功获取了该命令的一些帮助信息。要运行该命令，只需在命令窗口中输入
    `grails create-app` 并按下回车键：


    `$ grails create-app`


    Grails 会自动提示你输入项目名称，如清单 1-4 所示。此时，输入 `gTunes` 并按下回车键。或者，你也可以使用命令 `grails create-app
    gTunes`，在这种情况下，Grails 会自动执行相应操作。


    ***清单 1-4.** 使用 create-app 命令创建应用程序*


    `Environment set to development . . .`

    `Application name not specified. Please enter: gTunes`


    完成后，该命令将创建 gTunes Grails 应用程序及必要的目录结构。下一步是使用 shell 命令在命令窗口中导航到新创建的应用程序：


    `cd gTunes`


    此时，你拥有一个全新的起点——一个采用默认设置的新建 Grails 应用程序。Grails 应用程序结构的截图如图 1-2 所示。


    随着本书的深入，我们将进一步探讨 Grails 应用程序的结构以及各个文件和目录的作用。不过，请注意 Grails 如何包含用于控制器、领域对象（模型）和视图的目录。


    ![Image](img/9781430243779_Fig01-02.jpg)


    ***图 1-2.** gTunes 应用程序结构*


    #### 步骤 2：创建控制器


    Grails 是一个 MVC^(1) 框架，这意味着它拥有模型、视图和控制器来清晰分离关注点。控制器是 Grails 应用程序的核心，可以轻松地编排请求、传递响应并委托给视图。由于
    gTunes 应用程序以音乐商店的概念为中心，我们将演示如何创建一个“商店”控制器。


    为了提供帮助，Grails 提供了一系列辅助命令，用于创建能够“适配”到 Grails 应用程序各个槽位的类。例如，对于控制器，有 `create-controller`
    命令，它非常适用。但使用这些命令并非强制要求。随着你对 Grails 中不同概念的熟悉，你也可以使用自己喜欢的文本编辑器或集成开发环境（IDE）轻松创建控制器类。


    ![Image](img/line.jpg)


    1  Model-View-Controller（模型-视图-控制器）模式是许多 Web 框架中常见的模式，旨在分离用户界面和业务逻辑。参见维基百科，“Model-view-controller”，[`en.wikipedia.org/wiki/Model-view-controller`](http://en.wikipedia.org/wiki/Model-view-controller)，2003
    年。


    尽管如此，我们还是开始使用 `create-controller` 命令吧。与 `create-app` 类似，该命令接受一个参数，你可以在其中指定要创建的控制器名称。只需输入
    `grails create-controller store`：


    `$ grails create-controller store`


    现在，只需静待 Grails 完成其余工作（参见清单 1-5）。


    ***清单 1-5.** 使用 create-controller 命令创建控制器*


    `| Created file grails-app/controllers/gtunes/StoreController.groovy`

    `| Created file grails-app/views/store`

    `| Created file test/unit/gtunes/StoreControllerTests.groovy`


    一旦 `create-controller` 命令执行完毕，Grails 将为你创建两个类：一个是在 `grails-app/controllers` 目录下名为
    `StoreController` 的新控制器，另一个是在 `test/unit` 目录下的关联测试用例。由于命令行中未指定包名，Grails 默认会使用与应用程序名称匹配的包名来创建工件。图
    1-3 展示了新创建的控制器整齐地嵌套在相应目录中。


    ![Image](img/9781430243779_Fig01-03.jpg)


    ***图 1-3.** 新创建的 StoreController*


    由于 Groovy 的动态特性，你应该在任何 Grails 项目中追求高水平的测试覆盖率^(2)（Grails 假设如果你编写控制器，就需要进行测试）。像
    Groovy、Ruby 和 Python 这样的动态语言，在编译时提供的帮助远不如 Java 这样的静态类型语言。一些你可能期望在编译时捕获的错误，实际上会留到运行时处理，包括方法解析。遗憾的是，编译器的舒适性常常促使
    Java 开发者完全忘记测试。毋庸置疑，编译器不能替代一套良好的单元测试，而你在编译时辅助方面失去的，将在表达力方面得到弥补。


    ![Image](img/line.jpg)


    2  代码覆盖率是软件测试中使用的一种度量标准。它描述了程序源代码被测试的程度。


    在本书中，我们将演示如何充分利用 Grails 测试支持的自动化测试技术。


    #### 步骤 3：打印消息


    让我们回到 `StoreController`。默认情况下，Grails 会创建控制器并为其提供一个名为 `index` 的单一操作。按照惯例，`index`
    操作是控制器中的默认操作。清单 1-6 展示了包含默认 `index` 操作的 `StoreController`。


    ***清单 1-6.** 默认的 index 操作*


    `package gtunes`

    `class StoreController {`

    `    def index() {}`

    `}`


    `index` 操作似乎没做什么，但按照惯例，它的声明指示 Grails 自动尝试渲染一个名为 `grails-app/views/store/index.gsp`
    的视图。视图是第 5 章的主题，因此为了简单起见，我们将尝试一些不那么复杂的事情。


    Grails 控制器带有许多隐式方法，我们将在第 4 章中介绍。其中之一是 `render`，这是一个多用途方法，除其他功能外，它可以渲染简单的文本响应。清单
    1-7 展示了如何打印一个简单的响应：“Welcome to the gTunes store!”


    ***清单 1-7.** 使用 render 方法打印消息*


    `package gtunes`

    **`class StoreController {`**

    **`    def index() {`**

    **`        render ''Welcome to the gTunes store!''`**

    **`    }`**

    **`}`**

