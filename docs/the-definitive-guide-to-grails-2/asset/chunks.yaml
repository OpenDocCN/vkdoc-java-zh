    Often it is useful to execute a query that uses the state of an association as
    its criterion. So far, you have performed queries against only a single class
    and not its associations. So how do you go about querying an association?


    The Grails criteria builder allows querying associations by using a nested criteria
    method call whose name matches the property name. The closure argument passed
    to the method contains nested criteria calls that relate to the association and
    not the criteria class. Say that you want to find all albums that contain the
    word *Shake*. The criteria shown in [Listing 9-13](#Chapter09.html#list_9_13)
    will do this.


    ***Listing 9-13.** Querying Associations with Criteria*


    `def criteria = Album.withCriteria {`

    `    songs {`

    `        ilike(''title'', ''%Shake%'')`

    `    }`

    `}`


    This is a fairly trivial example, but all the criteria you’ve seen so far can
    be nested within the nested `songs` method call in the code listing. Combine this
    with how criteria can be built up from logical code blocks, and it results in
    a pretty powerful mechanism for querying associations.


    ![Image](images/square.jpg) **Tip** You can also combine association criteria,
    as shown in [Listing 9-13](#Chapter09.html#list_9_13), with regular criteria on
    the class itself.


    ##### Querying with Projections


    Projections allow the results of criteria queries to be customized in some way.
    For example, you may want to count only the number of results, as opposed to retrieving
    each one. In other words, they are equivalent to SQL functions such as `count`,
    `distinct`, and `sum`.


    With criteria queries, you can specify a `projections` method call that takes
    a closure and provides support for these types of queries. Instead of criteria,
    however, the method calls within it map to another Hibernate class, named `org.hibernate.criterion.Projections`.


    Let’s adapt the example in [Listing 9-14](#Chapter09.html#list_9_14) by adding
    a projection that results in counting the distinct `Album` titles in the `Alternative`
    genre.


    ***Listing 9-14.** Querying with Projections*


    `def criteria = Album.createCriteria()`

    `def count = criteria.get {`

    `    projections {`

    `        countDistinct(''name'')`

    **`    }`**

    `    songs {`

    `        eq(''genre'', ''Alternative'')`

    `    }`

    `}`


    #### Detached Criteria Queries


    Criteria queries, as described in the previous section, are associated with the
    current Hibernate session (see the section “The Semantics of GORM” for more information
    on the session). In practice, this means that you can use criteria queries only
    with the current session, and they cannot be reused across sessions. Attempting
    to execute a criteria query created with a different session, which potentially
    is no longer present, will lead to an exception.


    In order to facilitate the creation of shared, potentially global, criteria queries
    that can be reused across the application, Grails 2.0 and above introduced the
    notion of a detached criteria query. Represented by the `grails.gorm.DetachedCriteria`
    class, detached criteria queries are composable, immutable query objects that
    do not hold an underlying connection to the database. They can be created as global
    variables or class properties and reused across the application as needed.


    ##### Creating Detached Criteria Queries


    To create an instance of the `DetachedCriteria` class, simply import the necessary
    package and pass the target class to the constructor, as shown in [Listing 9-15](#Chapter09.html#list_9_15).


    ***Listing 9-15.** Creating a DetachedCriteria instance*


    `import grails.gorm.*`


    `def query = new DetachedCriteria(Album)`


    Once you have a reference to the `DetachedCriteria` instance, you can use the
    `build` method to apply regular criteria-style query logic (see [Listing 9-16](#Chapter09.html#list_9_16)).


    ***Listing 9-16.** Building a DetachedCriteria query*


    `def newQuery = query.build {`

    `   like(''title'', ''%Shake%'')`

    `}`


    [Listing 9-16](#Chapter09.html#list_9_16) demonstrates an important aspect of
    build method: the original query is not mutated; instead, a copy is returned with
    the criteria applied to the copy. Most operations on the `DetachedCriteria` instance
    do not mutate the actual instance. Instead, they return a copy; hence, assigning
    the return value of the `build` method to a new variable is required.


    ##### Executing Detached Criteria Queries


    Once you have constructed the query you wish to execute, there are a number of
    ways to do so. In fact, the `DetachedCriteria` API is very similar to the GORM
    API on domain classes and supports all of the typical operations, including the
    `list`, `get`, and `count` methods. You can even execute dynamic finders on the
    DetachedCriteria instance itself! [Listing 9-17](#Chapter09.html#list_9_17) shows
    a few examples of the kinds of queries you can execute on a `DetachedCriteria`
    instance.


    ***Listing 9-17.** Executing a DetachedCriteria query*


    `def list = query.list() // all results`

    `def only10 = query.list(max:10) // pagination`

    `def album = query.get() // one result`

    `int total = query.count() // number of results`

    `boolean alreadyExists = query.exists() // check for existence`

    `def rockAlbums = query.findAllByGenre(''Rock'') // dynamic finders`

    `def punkAlbums = query.list { // combine with other criteria`

    `   like(''genre'', ''Punk'')`

    `}`


    As you can see from [Listing 9-17](#Chapter09.html#list_9_17), the `DetachedCriteria`
    API is extremely feature-rich, with a range of ways to execute and compose queries.


    ##### Lazy Evaluation of Detached Criteria


    In order to increase the performance of your Grails applications, one of the first
    places to optimize tends to be the queries the application is executing.


    Minimizing the network traffic caused by executing SQL queries on a remote database
    system can significantly improve response times of your applications. It is fairly
    common when building an application that logic resides in the view to conditionally
    display data retrieved from the database.


    It would be fairly wasteful if a query were executed to obtain some data for the
    database only to be omitted from view rendering by logic in the view. An interesting
    use of detached criteria is lazy evaluation, which basically means that the query
    is executed only until use of the detached criteria.


    The `DetachedCriteria` class implements the `java.lang.Iterable` interface; as
    a result, it can be used as a collection-type object. As an example, take the
    following controller action from [Listing 9-18](#Chapter09.html#list_9_18).


    ***Listing 9-18.** Lazy DetachedCriteria queries*


    `def showAlbums() {`

    `   def rockAlbums = new DetachedCriteria(Album).build {`

    `       eq(''genre'', ''Rock'')`

    `   }`


    `   [rockAlbums: rockAlbums]`

    `}`


    The action builds a `DetachedCriteria` instance called `rockAlbums` that is returned
    as the actual model for the view. The view itself can then iterate over the `DetachedCriteria`
    instance as if it were a collection of results, as shown in [Listing 9-19](#Chapter09.html#list_9_19).


    ***Listing 9-19.** Iterating over DetachedCriteria in the View*


    `<g:each in="${rockAlbums}" var="album">`

    `    <p>${album.title}</p>`

    `</g:each>`


    The actual query execution will occur only upon iterating over the `DetachedCriteria`
    instance; in other words, the query is lazily evaluated. Your view could contain
    conditional logic that disabled rendering of the query results, without incurring
    the cost of the query itself.'
  trans: '

    ##### 使用条件查询关联


    通常，根据关联对象的状态来执行查询非常有用。到目前为止，你只对单个类执行过查询，而没有涉及其关联。那么，如何查询关联呢？


    Grails 条件构建器允许通过使用一个嵌套的条件方法调用来查询关联，该方法的名称与属性名匹配。传递给该方法的闭包参数包含与关联相关的嵌套条件调用，而不是与条件类相关。假设你想查找所有包含
    *Shake* 一词的专辑。清单 9-13 中所示的条件即可实现此目的。


    ***清单 9-13.** 使用条件查询关联*


    `def criteria = Album.withCriteria {`

    `    songs {`

    `        ilike(''title'', ''%Shake%'')`

    `    }`

    `}`


    这是一个相当简单的例子，但到目前为止你见过的所有条件都可以嵌套在代码清单中的 `songs` 方法调用内。将此与如何从逻辑代码块构建条件相结合，就产生了一个用于查询关联的相当强大的机制。


    ![Image](img/square.jpg) **提示** 你也可以将关联条件（如清单 9-13 所示）与类本身上的常规条件结合起来。


    ##### 使用投影查询


    投影允许以某种方式自定义条件查询的结果。例如，你可能只想统计结果的数量，而不是检索每一个结果。换句话说，它们等同于 SQL 函数，例如 `count`、`distinct`
    和 `sum`。


    使用条件查询，你可以指定一个 `projections` 方法调用，该方法接受一个闭包，并为这些类型的查询提供支持。然而，其中的方法调用映射到另一个 Hibernate
    类，名为 `org.hibernate.criterion.Projections`，而不是条件。


    让我们调整清单 9-14 中的示例，添加一个投影，用于统计 `Alternative` 流派中不同的 `Album` 标题数量。


    ***清单 9-14.** 使用投影查询*


    `def criteria = Album.createCriteria()`

    `def count = criteria.get {`

    `    projections {`

    `        countDistinct(''name'')`

    **`    }`**

    `    songs {`

    `        eq(''genre'', ''Alternative'')`

    `    }`

    `}`


    #### 分离条件查询


    如前所述，条件查询与当前的 Hibernate 会话相关联（有关会话的更多信息，请参阅“GORM 的语义”一节）。实际上，这意味着你只能在当前会话中使用条件查询，并且它们不能跨会话重用。尝试使用不同会话（该会话可能已不存在）创建的条件查询将会导致异常。


    为了便于创建可在应用程序中重用的共享（甚至可能是全局的）条件查询，Grails 2.0 及以上版本引入了分离条件查询的概念。由 `grails.gorm.DetachedCriteria`
    类表示的分离条件查询是可组合、不可变的查询对象，它们不持有与数据库的底层连接。它们可以作为全局变量或类属性创建，并根据需要在应用程序中重用。


    ##### 创建分离条件查询


    要创建 `DetachedCriteria` 类的实例，只需导入必要的包并将目标类传递给构造函数，如清单 9-15 所示。


    ***清单 9-15.** 创建 DetachedCriteria 实例*


    `import grails.gorm.*`


    `def query = new DetachedCriteria(Album)`


    一旦你获得了 `DetachedCriteria` 实例的引用，就可以使用 `build` 方法来应用常规的条件式查询逻辑（参见清单 9-16）。


    ***清单 9-16.** 构建 DetachedCriteria 查询*


    `def newQuery = query.build {`

    `   like(''title'', ''%Shake%'')`

    `}`


    清单 9-16 展示了 `build` 方法的一个重要方面：原始查询不会被修改；相反，会返回一个副本，并将条件应用于该副本。对 `DetachedCriteria`
    实例的大多数操作都不会修改实际实例。相反，它们会返回一个副本；因此，需要将 `build` 方法的返回值赋给一个新变量。


    ##### 执行分离条件查询


    一旦构建了想要执行的查询，有多种方式可以执行它。事实上，`DetachedCriteria` API 与领域类上的 GORM API 非常相似，并支持所有典型操作，包括
    `list`、`get` 和 `count` 方法。你甚至可以在 `DetachedCriteria` 实例本身上执行动态查找器！清单 9-17 展示了一些可以在
    `DetachedCriteria` 实例上执行的查询类型的示例。


    ***清单 9-17.** 执行 DetachedCriteria 查询*


    `def list = query.list() // 所有结果`

    `def only10 = query.list(max:10) // 分页`

    `def album = query.get() // 单个结果`

    `int total = query.count() // 结果数量`

    `boolean alreadyExists = query.exists() // 检查是否存在`

    `def rockAlbums = query.findAllByGenre(''Rock'') // 动态查找器`

    `def punkAlbums = query.list { // 与其他条件结合`

    `   like(''genre'', ''Punk'')`

    `}`


    正如你从清单 9-17 中看到的，`DetachedCriteria` API 功能极其丰富，提供了多种执行和组合查询的方式。


    ##### 分离条件的惰性求值


    为了提高 Grails 应用程序的性能，首先要优化的地方之一往往是应用程序正在执行的查询。


    最小化因在远程数据库系统上执行 SQL 查询而产生的网络流量，可以显著提高应用程序的响应时间。在构建应用程序时，视图层中常驻有逻辑，用于有条件地显示从数据库检索到的数据。


    如果执行一个查询来获取数据库中的某些数据，但随后被视图中的逻辑省略而不进行渲染，那将是非常浪费的。分离条件的一个有趣用途是惰性求值，这基本上意味着查询仅在需要使用分离条件时才执行。


    `DetachedCriteria` 类实现了 `java.lang.Iterable` 接口；因此，它可以被用作集合类型的对象。例如，以下来自清单 9-18
    的控制器操作。


    ***清单 9-18.** 惰性 DetachedCriteria 查询*


    `def showAlbums() {`

    `   def rockAlbums = new DetachedCriteria(Album).build {`

    `       eq(''genre'', ''Rock'')`

    `   }`


    `   [rockAlbums: rockAlbums]`

    `}`


    该操作构建了一个名为 `rockAlbums` 的 `DetachedCriteria` 实例，并将其作为实际模型返回给视图。然后，视图本身可以像遍历结果集合一样遍历
    `DetachedCriteria` 实例，如清单 9-19 所示。


    ***清单 9-19.** 在视图中遍历 DetachedCriteria*


    `<g:each in="${rockAlbums}" var="album">`

    `    <p>${album.title}</p>`

    `</g:each>`


    实际的查询执行只会在遍历 `DetachedCriteria` 实例时发生；换句话说，查询是惰性求值的。你的视图可以包含条件逻辑来禁用查询结果的渲染，而无需承担查询本身的成本。

