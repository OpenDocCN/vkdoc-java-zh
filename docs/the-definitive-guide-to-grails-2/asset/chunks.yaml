    一个领域类可能代表多个一对多关系的拥有方。与 `hasMany` 属性关联的 `Map` 中可以包含任意数量的条目，每个条目代表另一个一对多关系。例如，如果一个
    `Artist` 拥有多个 `Albums` 和多个 `Instruments`，你可以通过在 `Artist` 类的 `hasMany` 属性中添加另一个条目来表示这一点，如清单
    3-22 所示。


    ***清单 3-22.** hasMany 映射中的多个条目*


    `class Artist {`

    `    String name`


    `    static hasMany = [albums:Album, instruments:Instrument]`

    `}`


    如前所述，子类中的 `belongsTo` 属性表示子类属于所有者；如果所有者被删除，子类也应被删除。默认情况下，Grails 会为此关系配置 `all`
    的级联策略。级联策略选项包括 `all`、`merge`、`save-update`、`delete`、`lock`、`refresh`、`evict`、`replicate`
    和 `all-delete-orphan`（仅用于一对多关系）。清单 3-23 演示了如何为属于 `Album` 的 `Songs` 设置级联策略。


    ***清单 3-23.** 自定义级联行为*


    `class Album {`

    `    String title`


    `    static hasMany = [songs:Song]`

    `    static belongsTo = [artist:Artist]`


    `    static mapping = {`

    `        songs cascade: ''delete''`

    `    }`

    `}`


    有关 Hibernate 级联策略的信息和文档，请参阅 [`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/objectstate.html#objectstate-transitive)。


    ### 通过继承扩展类


    Grails 领域类可以扩展其他 Grails 领域类。这个继承树可以任意深，但一个好的领域模型很少会涉及超过一两个层次的继承。


    声明一个 Grails 领域类扩展自另一个领域类的语法是标准的 Groovy 继承语法，如清单 3-24 所示。


    ***清单 3-24.** 扩展 Person 类*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`

    `}`


    `class Employee extends Person {`

    `    String employeeNumber`

    `    String companyName`

    `}`


    `class Player extends Person {`

    `    String teamName`

    `}`


    这些类应该如何映射到数据库？是否应该为每个领域类分别创建单独的表？是否应该为所有类型的 `Person` 对象创建一个表？Grails 对这两种解决方案都提供了支持。如果所有
    `Person` 对象（包括 `Players` 和 `Employees`）都存储在同一张表中，这种方法称为每个层次结构一张表映射。也就是说，会为每个继承层次结构创建一个表（参见清单
    3-25）。Grails 将每个层次结构一张表映射作为继承关系的默认方式。


    ***清单 3-25.** 表示每个层次结构一张表映射的 Person 表*


    ![Image](img/9781430243779_unFig03-05.jpg)


    请注意，清单 3-25 包含了 `Person` 类中所有属性的列，以及所有子类中所有属性的列。此外，该表还包含一个名为 `class` 的鉴别器列。由于此表将存放所有类型的
    `Person` 对象，因此需要鉴别器列来表示任意给定行中 `Person` 的具体类型。应用程序永远不需要直接查询此列，但该列对于 Grails 的正常工作至关重要。鉴别器列的默认值是类的名称。可以在映射块中自定义鉴别器值，如清单
    3-26 所示。


    ***清单 3-26.** 为鉴别器列指定值*


    `class Employee extends Person {`

    `    String employeeNumber`

    `    String companyName`


    `    static mapping = {`

    `        // Employee 实例的鉴别器列值应为 ''working people''`

    `        discriminator ''working people''`

    `    }`

    `}`


    上面的示例调用了鉴别器方法，并传递了一个字符串作为参数。该字符串表示所有代表 `Person` 对象的行的鉴别器值。还可以配置其他几个鉴别器属性（参见表 3-2）。


    ![Image](img/9781430243779_Tab03-02.jpg)


    为鉴别器配置多个属性的方法是在映射块中向鉴别器方法传递命名参数，如清单 3-27 所示。


    ***清单 3-27.** 为鉴别器列指定多个值*


    `class Employee extends Person {`

    `    String employeeNumber`

    `    String companyName`


    `    static mapping = {`

    `        discriminator value: ''42'', type: ''integer''`

    `    }`

    `}`


    有关 Hibernate 鉴别器的文档和信息，请参阅 [`http://docs.jboss.org/hibernate/orm/3.6/reference/en-US/html/mapping.html#d0e6906`](http://docs.jboss.org/hibernate/orm/3.6/reference/en-US/html/mapping.html#d0e6906)。


    另一种继承映射类型称为每个子类一张表（参见清单 3-28）。


    ***清单 3-28.** 每个子类一张表映射*


    `class Person {`

    `    String firstName`

    `    String lastName`

    `    Integer age`


    `    static mapping = {`

    `        tablePerHierarchy false`

    `    }`

    `}`


    每个子类一张表映射会为继承层次结构中的每个子类生成一个单独的表（参见清单 3-29）。要利用每个子类一张表映射，父类必须使用 ORM DSL 关闭默认的每个层次结构一张表映射。


    ***清单 3-29.** 使用每个子类一张表映射的 Person、Employee 和 Player 表*


    ![Image](img/9781430243779_unFig03-06.jpg)


    你应该使用哪种映射？答案取决于多个因素。每个层次结构一张表方法的一个后果是，任何子类都不能有非空属性。然而，由于不需要执行连接操作，查询性能会更好，因为所有子类共享一个包含所有子类所有属性列的表。当
    `Player` 保存到 `person` 表时，`company_name` 列将保持为空，因为玩家没有公司名称。同样，当 `Employee` 保存到
    `player` 表时，`team_name` 列将保持为空。使用每个子类一张表方法的一个后果是，在检索子类实例时必须付出性能代价，因为需要执行数据库连接来汇总构建实例所需的所有数据。


    Grails 允许你选择最适合应用程序的方法。请考虑你的应用程序需求和典型的查询用例。这些因素应帮助你决定哪种映射策略适合特定的继承关系。请注意，你不需要在整个应用程序中应用相同的映射策略。出于性能原因，使用每个子类一张表映射实现一个继承关系（因为必须支持非空属性），同时使用每个层次结构一张表映射实现其他不相关的继承关系，这完全没有问题。


    Grails 确实支持持久类继承层次结构中的抽象类。处理抽象持久类的支持非常直观。例如，如果 `Car` 和 `Truck` 是分别扩展 `Vehicle`
    类的类，并且 `Vehicle` 类是抽象的，你可以查询所有 `Vehicles`；结果将包含 `Car` 和 `Truck` 实例。

