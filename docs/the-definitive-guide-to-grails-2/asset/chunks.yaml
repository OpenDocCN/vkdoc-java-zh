- fmt: "### Using Controller Scopes\n\nYou can choose from a number of scopes when\
    \ developing controllers. The following list defines all the scopes available\
    \ in order of their longevity:\n\n> * `request`: Objects placed into the `request`\
    \ are kept for the duration of the currently executing request.\n> * `flash`:\
    \ Objects placed into `flash` are kept for the duration of the current request\
    \ and the next request only.\n> * `session`: Objects placed into `session` are\
    \ kept until the user session is invalidated, either manually or through expiration.\n\
    > * `servletContext`: Objects placed into `servletContext` are shared across the\
    \ entire application and kept for the lifetime of the application.\n\nAs you can\
    \ see, each scope is unique and provides very different semantics. In an ideal\
    \ world, sticking to `request` scope allows you to maintain a completely stateless\
    \ application. In terms of scalability, this has significant advantages, as you\
    \ do not need to consider issues such as replication of session state and session\
    \ affinity.\n\nHowever, you can certainly scale stateful applications that use\
    \ `flash` and `session` scope with container-provided replication services or\
    \ distributed data grids. The advantage of `session` scope is that it allows you\
    \ to associate data on the server with individual clients. This typically works\
    \ using cookies to associate individual users with their sessions.\n\n> Finally,\
    \ the `servletContext` is a rarely used scope that allows you to share state across\
    \ the entire application. Although this can prove useful, you should exercise\
    \ caution when using the `servletContext` because objects placed within it will\
    \ not be garbage-collected unless the application explicitly removes them. Also,\
    \ access to the `servletContext` object is not synchronized, so you need to do\
    \ manual synchronization if you plan to read and write objects from the `servletContext`\
    \ object, as shown in [Listing 4-7](#Chapter04.html#list_4_7).\n\n**Listing 4-7.**\
    \ Synchronized Access to the `servletContext`\n\n```\ndef index() {\n    synchronized(servletContext)\
    \ {\n        def myValue = servletContext.myAttr\n        servletContext.myAttr\
    \ = \"changed\"\n        render myValue\n    }\n}\n```\n\nOf course, writing code\
    \ like this will result in a serious bottleneck in your application, which leads\
    \ us to the best-practice usage of the `servletContext` object: in general, if\
    \ you really need to use the `servletContext`, you should prepopulate it with\
    \ any values you need at startup and then read those values only at runtime. This\
    \ allows you to access the `servletContext` in an unsynchronized manner.\n\n###\
    \ Understanding Flash Scope\n\nThe `flash` object is a map, accessible in the\
    \ same way as the `params` object, the fundamental difference being that key/value\
    \ pairs stored in the `flash` object are stored in `flash` scope. What is `flash`\
    \ scope? It’s best explained with the problem it solves.\n\nA common usage pattern\
    \ in web applications is to do some processing and then redirect the request to\
    \ another controller, servlet, or whatever. This is not an issue in itself, except\
    \ what happens when the request is redirected? Redirecting the request essentially\
    \ creates a brand-new request, wiping out all previous data that might have resided\
    \ in the request attributes. The target of the redirect often needs this data,\
    \ but unfortunately, the target action is out of luck. Some have worked around\
    \ this issue by storing this information in the session instead.\n\nThis is all\
    \ fine and good, but the problem with the session is that developers often forget\
    \ to clear out this temporarily stored data, which places the burden on the developer\
    \ to explicitly manage this state. [Figure 4-1](#Chapter04.html#fig_4_1) illustrates\
    \ this problem in action.\n\nThe first request that comes in sets an attribute\
    \ on the request called `message`. It then redirects the request by sending a\
    \ redirect response back to the client. This creates a brand-new request instance,\
    \ which is sent to the controller. Sadly, the `message` attribute is lost and\
    \ evaluates to `null`.\n\n![Image](images/9781430243779_Fig04-01.jpg)\n\n**Figure\
    \ 4-1.** Request attributes and redirects\n\nTo get around this little annoyance,\
    \ the `flash` object stores its values for the next request—and the next request\
    \ only—after which they automatically vanish. This feature manages the burden\
    \ of this kind of use case for you. It’s another small but significant feature\
    \ that allows you to focus on the problem at hand instead of the surrounding issues.\n\
    \nOne of the more common use cases for `flash` scope is to store a message that\
    \ will display when some form of validation fails. [Listing 4-8](#Chapter04.html#list_4_8)\
    \ demonstrates how to store a hypothetical message in the `flash` object so it’s\
    \ available for the next request.\n\n**Listing 4-8.** Storing a Message in Flash\
    \ Scope\n\n```\nflash.message = 'I am available next time you request me!'\n```\n\
    \nRemember that the `flash` object implements `java.util.Map`, so all the regular\
    \ methods of this class are also available. [Figure 4-2](#Chapter04.html#fig_4_2)\
    \ shows how `flash` scope solves the aforementioned problem. Here, on the first\
    \ request, you store a message variable to the `flash` object and then redirect\
    \ the request. When the new request comes in, you can access this message; no\
    \ problem. The message variable will then automatically be removed for the next\
    \ request that comes in.\n\n![Image](images/square.jpg) **Note** The `flash` object\
    \ does still use the `HttpSession` instance internally to store itself, so if\
    \ you require any kind of session affinity or clustering, remember that it applies\
    \ to the `flash` object, too.\n\n![Image](images/9781430243779_Fig04-02.jpg)\n\
    \n**Figure 4-2.** Using flash scope\n\n### Accessing Request Parameters\n\nA controller\
    \ action is often given input that will affect the behavior of the controller.\
    \ For example, if a user submits a form that he or she has filled out, all the\
    \ form’s field names and values will be available to the controller in the form\
    \ of request parameters. The standard servlet API provides an API for accessing\
    \ request parameters. [Listing 4-9](#Chapter04.html#list_4_9) shows how a controller\
    \ might retrieve the `userName` request parameter.\n\n**Listing 4-9.** Request\
    \ Parameters via Standard Servlet API\n\n```\ndef userName = request.getParameter('userName')\n\
    log.info(\"User Name: ${userName}\")\n```\n\nOne of the dynamic properties injected\
    \ into a Grails controller is a property called `params`. This `params` property\
    \ is a map of request parameters. [Listing 4-10](#Chapter04.html#list_4_10) shows\
    \ how a controller might retrieve the `userName` request parameter using the `params`\
    \ property.\n\n**Listing 4-10.** Request Parameters via `params` Property\n\n\
    ```\ndef userName = params.userName\nlog.info(\"User Name: ${userName}\")\n```"
  raw: '#### Using Controller Scopes


    You can choose from a number of scopes when developing controllers. The following
    list defines all the scopes available in order of their longevity


    > *   `request`: Objects placed into the `request` are kept for the duration of
    the currently executing request.

    > *   `flash`: Objects placed into `flash` are kept for the duration of the current
    request and the next request only.

    > *   `session`: Objects placed into the `session` are kept until the user session
    is invalidated, either manually or through expiration.

    > *   `servletContext`: Objects placed into the `servletContext` are shared across
    the entire application and kept for the lifetime of the application.


    As you can see, each scope is unique and provides very different semantics. In
    an ideal world, sticking to `request` scope allows you to maintain a completely
    stateless application. In terms of scalability, this has significant advantages,
    as you do not need to consider issues such as replication of session state and
    session affinity.


    However, you can certainly scale stateful applications that use `flash` and `session`
    scope with container-provided replication services or distributed data grids.
    The advantage of `session` scope is that it allows you to associate data on the
    server with individual clients. This typically works using cookies to associate
    individual users with their sessions.


    > *   Finally, the `servletContext` is a rarely used scope that allows you to
    share state across the entire application. Although this can prove useful, you
    should exercise caution when using the `servletContext` because objects placed
    within it will not be garbage-collected unless the application explicitly removes
    them. Also, access to the `servletContext` object is not synchronized, so you
    need to do manual synchronization if you plan to read and write objects from the
    `servletContext` object, as shown in [Listing 4-7](#Chapter04.html#list_4_7).


    ***Listing 4-7.** Synchronized Access to the servletContext*


    `def index() {`

    `     synchronized(servletContext) {`

    `             def myValue = servletContext.myAttr`

    `             servletContext.myAttr = "changed"`

    `             render myValue`

    `     }`

    `}`


    Of course, writing code like this will result in a serious bottleneck in your
    application, which leads us to the best-practice usage of the `servletContext`
    object: in general, if you really need to use the `servletContext`, you should
    prepopulate it with any values you need at startup and then read those values
    only at runtime. This allows you to access the `servletContext` in an unsynchronized
    manner.


    #### Understanding Flash Scope


    The `flash` object is a map, accessible in the same way as the `params` object,
    the fundamental difference being that key/value pairs stored in the `flash` object
    are stored in `flash` scope. What is `flash` scope? It’s best explained with the
    problem it solves.


    A common usage pattern in web applications is to do some processing and then redirect
    the request to another controller, servlet, or whatever. This is not an issue
    in itself, except what happens when the request is redirected? Redirecting the
    request essentially creates a brand-new request, wiping out all previous data
    that might have resided in the request attributes. The target of the redirect
    often needs this data, but unfortunately, the target action is out of luck. Some
    have worked around this issue by storing this information in the session instead.


    This is all fine and good, but the problem with the session is that developers
    often forget to clear out this temporarily stored data, which places the burden
    on the developer to explicitly manage this state. [Figure 4-1](#Chapter04.html#fig_4_1)
    illustrates this problem in action.


    The first request that comes in sets an attribute on the request called `message`.
    It then redirects the request by sending a redirect response back to the client.
    This creates a brand-new request instance, which is sent to the controller. Sadly,
    the `message` attribute is lost and evaluates to `null`.


    ![Image](images/9781430243779_Fig04-01.jpg)


    ***Figure 4-1.** Request attributes and redirects*


    To get around this little annoyance, the `flash` object stores its values for
    the next request—and the next request only—after which they automatically vanish.
    This feature manages the burden of this kind of use case for you. It’s another
    small but significant feature that allows you to focus on the problem at hand
    instead of the surrounding issues.


    One of the more common use cases for `flash` scope is to store a message that
    will display when some form of validation fails. [Listing 4-8](#Chapter04.html#list_4_8)
    demonstrates how to store a hypothetical message in the `flash` object so it’s
    available for the next request.


    ***Listing 4-8.** Storing a Message in Flash Scope*


    `flash.message = ''I am available next time you request me!''`


    Remember that the `flash` object implements `java.util.Map`, so all the regular
    methods of this class are also available. [Figure 4-2](#Chapter04.html#fig_4_2)
    shows how `flash` scope solves the aforementioned problem. Here, on the first
    request, you store a message variable to the `flash` object and then redirect
    the request. When the new request comes in, you can access this message; no problem.
    The message variable will then automatically be removed for the next request that
    comes in.


    ![Image](images/square.jpg) **Note**  The flash object does still use the HttpSession
    instance internally to store itself, so if you require any kind of session affinity
    or clustering, remember that it applies to the flash object, too.


    ![Image](images/9781430243779_Fig04-02.jpg)


    ***Figure 4-2.** Using flash scope*


    #### Accessing Request Parameters


    A controller action is often given input that will affect the behavior of the
    controller. For example, if a user submits a form that he or she has filled out,
    all the form’s field names and values will be available to the controller in the
    form of request parameters. The standard servlet API provides an API for accessing
    request parameters. [Listing 4-9](#Chapter04.html#list_4_9) shows how a controller
    might retrieve the `userName` request parameter.


    ***Listing 4-9.** Request Parameters via Standard Servlet API*


    `def userName = request.getParameter(''userName'')`

    `log.info("User Name: ${userName}")`


    One of the dynamic properties injected into a Grails controller is a property
    called `params`. This `params` property is a map of request parameters. [Listing
    4-10](#Chapter04.html#list_4_10) shows how a controller might retrieve the `userName`
    request parameter using the `params` property.


    ***Listing 4-10.** Request Parameters via params Property*


    `def userName = params.userName`

    `log.info("User Name: ${userName}")`'
  trans: '

    #### 使用控制器作用域


    在开发控制器时，你可以从多种作用域中进行选择。以下列表按生命周期从短到长定义了所有可用的作用域：


    > *   `request`：放入`request`中的对象在当前正在执行的请求期间保持有效。

    > *   `flash`：放入`flash`中的对象仅在当前请求和下一个请求期间保持有效。

    > *   `session`：放入`session`中的对象在用户会话失效前保持有效，失效方式可以是手动或过期。

    > *   `servletContext`：放入`servletContext`中的对象在整个应用程序中共享，并在应用程序的整个生命周期内保持有效。


    如你所见，每个作用域都是独一无二的，并提供了截然不同的语义。在理想情况下，坚持使用`request`作用域可以让你维护一个完全无状态的应用程序。在可扩展性方面，这具有显著优势，因为你无需考虑会话状态复制和会话亲和性等问题。


    然而，你当然也可以使用容器提供的复制服务或分布式数据网格来扩展使用`flash`和`session`作用域的有状态应用程序。`session`作用域的优势在于，它允许你将服务器上的数据与单个客户端关联起来。这通常通过使用
    cookie 将单个用户与其会话关联来实现。


    > *   最后，`servletContext`是一个很少使用的作用域，它允许你在整个应用程序中共享状态。虽然这可能会很有用，但在使用`servletContext`时应谨慎，因为放入其中的对象不会被垃圾回收，除非应用程序显式地移除它们。此外，对`servletContext`对象的访问不是同步的，因此如果你计划从`servletContext`对象中读取和写入对象，则需要手动进行同步，如清单
    4-7 所示。


    ***清单 4-7.** 对 servletContext 的同步访问*


    `def index() {`

    `     synchronized(servletContext) {`

    `             def myValue = servletContext.myAttr`

    `             servletContext.myAttr = "changed"`

    `             render myValue`

    `     }`

    `}`


    当然，编写这样的代码会导致应用程序出现严重的性能瓶颈，这引出了`servletContext`对象的最佳实践用法：通常，如果你确实需要使用`servletContext`，你应该在启动时预先填充所有需要的值，然后在运行时仅读取这些值。这样你就可以以非同步的方式访问`servletContext`。


    #### 理解 Flash 作用域


    `flash`对象是一个映射（map），其访问方式与`params`对象相同，根本区别在于存储在`flash`对象中的键/值对存储在`flash`作用域中。什么是`flash`作用域？最好通过它解决的问题来解释。


    Web 应用程序中一种常见的模式是执行一些处理，然后将请求重定向到另一个控制器、Servlet 或其他组件。这本身不是问题，但问题在于请求被重定向时会发生什么？重定向请求本质上会创建一个全新的请求，清除所有可能存在于请求属性中的先前数据。重定向的目标通常需要这些数据，但不幸的是，目标操作无法获取到。有些人通过将这些信息存储在会话中来绕过这个问题。


    这固然很好，但会话的问题在于开发者经常忘记清除这些临时存储的数据，这给开发者带来了显式管理此状态的负担。图 4-1 说明了这个问题在实际中的表现。


    第一个传入的请求在请求上设置了一个名为`message`的属性。然后它通过向客户端发送重定向响应来重定向请求。这会创建一个全新的请求实例，并发送给控制器。遗憾的是，`message`属性丢失了，其值为`null`。


    ![Image](img/9781430243779_Fig04-01.jpg)


    ***图 4-1.** 请求属性与重定向*


    为了解决这个小小的麻烦，`flash`对象将其值存储起来，仅供下一个请求使用——并且仅限下一个请求——之后它们会自动消失。此功能为你管理了此类用例的负担。这是另一个虽小但重要的特性，它让你能够专注于手头的问题，而不是周边的问题。


    `flash`作用域最常见的用例之一是存储一条消息，当某种表单验证失败时显示该消息。清单 4-8 演示了如何将一条假设的消息存储在`flash`对象中，以便下一个请求可以使用它。


    ***清单 4-8.** 在 Flash 作用域中存储消息*


    `flash.message = ''我将在你下次请求我时可用！''`


    请记住，`flash`对象实现了`java.util.Map`，因此该类的所有常规方法也都可用。图 4-2 展示了`flash`作用域如何解决前述问题。在这里，在第一个请求中，你将一个消息变量存储到`flash`对象中，然后重定向请求。当新请求到来时，你可以访问此消息；没有问题。然后，该消息变量将自动为下一个传入的请求移除。


    ![Image](img/square.jpg) **注意**  flash 对象内部仍然使用`HttpSession`实例来存储自身，因此如果你需要任何形式的会话亲和性或集群，请记住这也适用于
    flash 对象。


    ![Image](img/9781430243779_Fig04-02.jpg)


    ***图 4-2.** 使用 flash 作用域*


    #### 访问请求参数


    控制器动作通常会接收影响其行为的输入。例如，如果用户提交了一个已填写的表单，那么表单的所有字段名称和值都将以请求参数的形式提供给控制器。标准的 Servlet
    API 提供了用于访问请求参数的 API。清单 4-9 展示了控制器如何检索`userName`请求参数。


    ***清单 4-9.** 通过标准 Servlet API 获取请求参数*


    `def userName = request.getParameter(''userName'')`

    `log.info("用户名: ${userName}")`


    注入到 Grails 控制器中的动态属性之一是名为`params`的属性。这个`params`属性是一个请求参数的映射。清单 4-10 展示了控制器如何使用`params`属性检索`userName`请求参数。


    ***清单 4-10.** 通过 params 属性获取请求参数*


    `def userName = params.userName`

    `log.info("用户名: ${userName}")`

