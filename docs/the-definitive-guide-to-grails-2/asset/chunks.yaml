    \ common thing to do. Grails provides an easy-to-use mechanism for retrieving\
    \ data from the database (GORM) and simple mechanisms for rendering the data (GSPs\
    \ and GSP tags).\n\nWeb applications often serve as a front end to a database\
    \ that may contain large volumes of data. The application may need to provide\
    \ mechanisms for the user to manage navigating through all the data. For example,\
    \ the gTunes application may contain thousands of artists, albums, and songs.\
    \ A page that lists all the albums may be overwhelming and difficult for the user\
    \ to work with (see [Figure 5-2](#Chapter05.html#fig_5_2)).\n\n![Image](images/9781430243779_Fig05-02.jpg)\n\
    \n***Figure 5-2.** A long list of albums*\n\n[Figure 5-2](#Chapter05.html#fig_5_2)\
    \ represents what a user who requested a list of all the albums in the system\
    \ that belong to the `Rock` genre might see. This very long page includes several\
    \ hundred albums. An argument could be made that too much data is displayed on\
    \ a single page. What if there were thousands of albums? Hundreds of thousands\
    \ of albums? Clearly, it would not make sense to present all those albums to the\
    \ user on a single page.\n\nThe gTunes application needs to be smart about presenting\
    \ manageable lists of data to the user. Instead of displaying hundreds or thousands\
    \ of albums in a single list, maybe the application should display only five or\
    \ ten. If the application displays only five or ten albums on the page, then the\
    \ application also needs to provide a mechanism for the user to navigate around\
    \ the larger virtual list to view the rest of the albums five or ten at a time.\
    \ [Figure 5-3](#Chapter05.html#fig_5_3) represents a much more manageable interface.\n\
    \n![Image](images/9781430243779_Fig05-03.jpg)\n\n***Figure 5-3.** A paginated\
    \ list of albums*\n\nThe list in [Figure 5-3](#Chapter05.html#fig_5_3) includes\
    \ only ten albums. The view provides mechanisms for navigating over the larger\
    \ virtual list, which includes all the albums in this genre. This approach yields\
    \ a much better user experience, especially for scenarios where the user may be\
    \ overwhelmed with large sets of data.\n\nSince some complexity is involved in\
    \ generating pagination controls like these, the application needs to do several\
    \ things: (1) retrieve smaller amounts of data from the database for each view;\
    \ (2) provide support for requesting the batch of records that fall immediately\
    \ before or immediately after the current batch; (3) provide a mechanism for jumping\
    \ straight to an area of the list, as opposed to navigating through the larger\
    \ list a single page at a time; (4) know the total number of records in the larger\
    \ list. All these things normally involve writing a lot of code.\n\nThe good news\
    \ is that Grails provides a really simple mechanism for managing all that. That\
    \ mechanism is a GSP tag called `paginate`. The `paginate` tag manages a lot of\
    \ the tedious work that would otherwise be required in order to provide UI elements\
    \ for navigating over large lists of data.\n\nThe GSP responsible for rendering\
    \ this list is in `grails-app/views/store/genre.gsp`. That page includes the markup\
    \ shown in [Listing 5-31](#Chapter05.html#list_5_31).\n\n***Listing 5-31.** The\
    \ genre.gsp <h1>Online Store</h1>*\n\n```\n<h1>Online Store</h1>\n\n<h2>Genre:\
    \ ${genre.encodeAsHTML()}</h2>\n<table border=\"0\" class=\"albumsTable\">\n \
    \ <tr>\n    <th>Artist</th>\n    <th>Album</th>\n    <th>Year</th>\n  </tr>\n\
    \  <g:each var=\"album\" in=\"${albums}\">\n    <tr>\n          <td>${album.artist.name}</td>\n\
    \      <td><g:link action=\"show\"\n                  controller=\"album\"\n \
    \                 id=\"${album.id}\">${album.title}</g:link>\n      </td>\n  \
    \        <td>${album.year}</td>\n    </tr>\n  </g:each>\n\n</table>\n<div class=\"\
    paginateButtons\">\n  <g:paginate controller=\"store\"\n                 action=\"\
    genre\"\n                 params=\"[name:genre]\"\n              total=\"${totalAlbums}\"\
    \ />\n</div>\n```\n\nThe markup represented there renders an HTML table containing\
    \ a header row and a row for each of the elements in the `albums` collection.\
    \ Notice the use of the `paginate` tag at the bottom of [Listing 5-30](#Chapter05.html#list_5_30).\
    \ That is all the code required in the GSP to render the pagination controls.\
    \ The `paginate` tag takes care of all the tedious work involved in generating\
    \ the “Previous” and “Next” links, all of the links that support jumping to a\
    \ particular page, and all of the appropriate request parameters associated with\
    \ each of those links. All is handled by this single call to a GSP tag. The whole\
    \ thing could barely be simpler!\n\nThe `paginate` tag is generating a number\
    \ of links. The `controller` and `action` parameters tell the `paginate` tag where\
    \ each of those links should submit. In this particular case, all the links submit\
    \ to the `genre` action in the `StoreController`. If all the links reference the\
    \ same controller action, you might wonder how the application knows the difference\
    \ between the user clicking one link as opposed to another. The answer has to\
    \ do with the fact that the `paginate` tag tacks a number of request parameters\
    \ on the end of each link; those request parameters are used by the controller\
    \ action. For example, the “7” link points to the URL `/store/genre?offset=60&max=10&name=Rock`.\
    \ The “8” link points to the URL `/store/genre?offset=70&max=10&name=Rock`. Notice\
    \ that those links each include the same value for the `max` and `name` parameters,\
    \ but they include a different value for the `offset` parameter. That `offset`\
    \ parameter is an important part of the request, because through it the controller\
    \ will know what page of data should be returned when the user clicks one of those\
    \ links. Let’s take a look at the relevant controller action.\n\n[Listing 5-32](#Chapter05.html#list_5_32)\
    \ includes the code that is in the `genre` action in the `StoreController`.\n\n\
    ***Listing 5-32.** The genre Action*\n\n```\ndef genre() {\n    def max = Math.min(params.int('max')\
    \ ?: 10, 100)\n    def offset = params.int('offset') ?: 0\n\n    def total = Album.countByGenre(params.name)\n\
    \    def albumList = Album.withCriteria {\n          eq 'genre', params.name\n\
    \      projections {\n        artist {\n          order 'name'\n        }\n  \
    \    }\n      maxResults max\n      firstResult offset\n    }\n          return\
    \ [albums:albumList,\n                        totalAlbums:total,\n           \
    \             genre:params.name]\n  }\n```\n\n![Image](images/square.jpg) **Note**  The\
    \ query whose code is in [Listing 5-32](#Chapter05.html#list_5_32) uses the Hibernate\
    \ Criteria API, whose general behavior will be described next. The Criteria API\
    \ is discussed in detail in the “Criteria Queries” section of [Chapter 10](#Chapter10.html).\n\
    \nThe `name` request parameter is used in both of the previous queries. The first\
    \ query is necessary to count the number of albums in the database that belong\
    \ to a certain genre. The second query actually retrieves a list of albums. That\
    \ second query does not retrieve all the albums that belong to a certain genre\
    \ but only a subset of at most ten of those albums.\n\nFor example, imagine there\
    \ is a list of 1,000 albums, and each of them has an index associated with it\
    \ starting with 0 and running through 999. When a request is sent to the `/store/genre?offset=60&max=10&name=Rock`\
    \ URL, the call to the `Album.withCriteria(...)` method will return ten of those\
    \ albums, starting with the `Album` at index 60. The `max` parameter represents\
    \ the maximum number of albums that should be returned."
  raw: '#### Paginating Views


    Rendering lists of data in a web application is a common thing to do. Grails provides
    an easy-to-use mechanism for retrieving data from the database (GORM) and simple
    mechanisms for rendering the data (GSPs and GSP tags).


    Web applications often serve as a front end to a database that may contain large
    volumes of data. The application may need to provide mechanisms for the user to
    manage navigating through all the data. For example, the gTunes application may
    contain thousands of artists, albums, and songs. A page that lists all the albums
    may be overwhelming and difficult for the user to work with (see [Figure 5-2](#Chapter05.html#fig_5_2)).


    ![Image](images/9781430243779_Fig05-02.jpg)


    ***Figure 5-2.** A long list of albums*


    [Figure 5-2](#Chapter05.html#fig_5_2) represents what a user who requested a list
    of all the albums in the system that belong to the `Rock` genre might see. This
    very long page includes several hundred albums. An argument could be made that
    too much data is displayed on a single page. What if there were thousands of albums?
    Hundreds of thousands of albums? Clearly, it would not make sense to present all
    those albums to the user on a single page.


    The gTunes application needs to be smart about presenting manageable lists of
    data to the user. Instead of displaying hundreds or thousands of albums in a single
    list, maybe the application should display only five or ten. If the application
    displays only five or ten albums on the page, then the application also needs
    to provide a mechanism for the user to navigate around the larger virtual list
    to view the rest of the albums five or ten at a time. [Figure 5-3](#Chapter05.html#fig_5_3)
    represents a much more manageable interface.


    ![Image](images/9781430243779_Fig05-03.jpg)


    ***Figure 5-3.** A paginated list of albums*


    The list in [Figure 5-3](#Chapter05.html#fig_5_3) includes only ten albums. The
    view provides mechanisms for navigating over the larger virtual list, which includes
    all the albums in this genre. This approach yields a much better user experience,
    especially for scenarios where the user may be overwhelmed with large sets of
    data.


    Since some complexity is involved in generating pagination controls like these,
    the application needs to do several things: (1) retrieve smaller amounts of data
    from the database for each view; (2) provide support for requesting the batch
    of records that fall immediately before or immediately after the current batch;
    (3) provide a mechanism for jumping straight to an area of the list, as opposed
    to navigating through the larger list a single page at a time; (4) know the total
    number of records in the larger list. All these things normally involve writing
    a lot of code.


    The good news is that Grails provides a really simple mechanism for managing all
    that. That mechanism is a GSP tag called `paginate`. The `paginate` tag manages
    a lot of the tedious work that would otherwise be required in order to provide
    UI elements for navigating over large lists of data.


    The GSP responsible for rendering this list is in `grails-app/views/store/genre.gsp`.
    That page includes the markup shown in [Listing 5-31](#Chapter05.html#list_5_31).


    ***Listing 5-31.** The genre.gsp <h1>Online Store</h1>*


    `<h1>Online Store</h1>`


    `<h2>Genre: ${genre.encodeAsHTML()}</h2>`

    `<table border="0" class="albumsTable">`

    `  <tr>`

    `    <th>Artist</th>`

    `    <th>Album</th>`

    `    <th>Year</th>`

    `  </tr>`

    `  <g:each var="album" in="${albums}">`

    `    <tr>`

    `          <td>${album.artist.name}</td>`

    `      <td><g:link action="show"`

    `                  controller="album"`

    `                  id="${album.id}">${album.title}</g:link>`

    `      </td>`

    `          <td>${album.year}</td>`

    `    </tr>`

    `  </g:each>`


    `</table>`

    `<div class="paginateButtons">`

    `  <g:paginate controller="store"`

    `                 action="genre"`

    `                 params="[name:genre]"`

    `              total="${totalAlbums}" />`

    `</div>`


    The markup represented there renders an HTML table containing a header row and
    a row for each of the elements in the `albums` collection. Notice the use of the
    `paginate` tag at the bottom of [Listing 5-30](#Chapter05.html#list_5_30). That
    is all the code required in the GSP to render the pagination controls. The `paginate`
    tag takes care of all the tedious work involved in generating the “Previous” and
    “Next” links, all of the links that support jumping to a particular page, and
    all of the appropriate request parameters associated with each of those links.
    All is handled by this single call to a GSP tag. The whole thing could barely
    be simpler!


    The `paginate` tag is generating a number of links. The `controller` and `action`
    parameters tell the `paginate` tag where each of those links should submit. In
    this particular case, all the links submit to the `genre` action in the `StoreController`.
    If all the links reference the same controller action, you might wonder how the
    application knows the difference between the user clicking one link as opposed
    to another. The answer has to do with the fact that the `paginate` tag tacks a
    number of request parameters on the end of each link; those request parameters
    are used by the controller action. For example, the “7” link points to the URL
    `/store/genre?offset=60&max=10&name=Rock`. The “8” link points to the URL `/store/genre?offset=70&max=10&name=Rock`.
    Notice that those links each include the same value for the `max` and `name` parameters,
    but they include a different value for the `offset` parameter. That `offset` parameter
    is an important part of the request, because through it the controller will know
    what page of data should be returned when the user clicks one of those links.
    Let’s take a look at the relevant controller action.


    [Listing 5-32](#Chapter05.html#list_5_32) includes the code that is in the `genre`
    action in the `StoreController`.


    ***Listing 5-32.** The genre Action*


    `def genre() {`

    `    def max = Math.min(params.int(''max'') ?: 10, 100)`

    `    def offset = params.int(''offset'') ?: 0`


    `    def total = Album.countByGenre(params.name)`

    `    def albumList = Album.withCriteria {`

    `          eq ''genre'', params.name`

    `      projections {`

    `        artist {`

    `          order ''name''`

    `        }`

    `      }`

    `      maxResults max`

    `      firstResult offset`

    `    }`

    `          return [albums:albumList,`

    `                        totalAlbums:total,`

    `                        genre:params.name]`

    `  }`


    ![Image](images/square.jpg) **Note**  The query whose code is in [Listing 5-32](#Chapter05.html#list_5_32)
    uses the Hibernate Criteria API, whose general behavior will be described next.
    The Criteria API is discussed in detail in the “Criteria Queries” section of [Chapter
    10](#Chapter10.html).


    The `name` request parameter is used in both of the previous queries. The first
    query is necessary to count the number of albums in the database that belong to
    a certain genre. The second query actually retrieves a list of albums. That second
    query does not retrieve all the albums that belong to a certain genre but only
    a subset of at most ten of those albums.


    For example, imagine there is a list of 1,000 albums, and each of them has an
    index associated with it starting with 0 and running through 999\. When a request
    is sent to the `/store/genre?offset=60&max=10&name=Rock` URL, the call to the
    `Album.withCriteria(...)` method will return ten of those albums, starting with
    the `Album` at index 60\. The `max` parameter represents the maximum number of
    albums that should be returned.'
