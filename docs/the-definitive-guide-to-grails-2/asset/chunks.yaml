  raw: '#### Automatic Session Flushing


    Another common gotcha is that by default GORM is configured to flush the session
    automatically when one of the following occurs:


    > *   whenever a query is run;

    > *   directly after a controller action completes, if no exceptions are thrown;

    > *   directly before a transaction is committed.


    This has a number of implications that you need to consider. Take, for example,
    the code in [Listing 9-50](#Chapter09.html#list_9_50).


    ***Listing 9-50.** The Implications of Automatic Session Flushing*


    `1 def album = Album.get(1)`

    `2 album.title = "Change It"`

    `3 def otherAlbums = Album.findAllWhereTitleLike("%Change%")`

    `4`

    `5 assert otherAlbums.contains(album)`


    You may think that because you never called `save()` on the `album` there is no
    way it could possibly have been persisted to the database, right? Wrong. As soon
    as you load the `album` instance, it immediately becomes a “managed” object as
    far as Hibernate is concerned. Since Hibernate is by default configured to flush
    the session when a query runs, the `Session` is flushed on line 3 when the `findAllWhereTitleLike`
    method is called and the `Album` instance is persisted. The Hibernate `Session`
    caches changes and pushes them to the database only at the latest possible moment.
    In the case of automatic flushing, this is at the end of a transaction or before
    a query runs that might be affected by the cached changes.


    You may consider the behavior of automatic flushing to be a little odd, but if
    you think about it, it depends very much on your expectations. If the object weren’t
    flushed to the database, then the change made to it on line 2 would not be reflected
    in the results. That may not be what you’re expecting either! Let’s consider another
    example where automatic flushing may present a few surprises. Take a look at the
    code in [Listing 9-51](#Chapter09.html#list_9_51).


    ***Listing 9-51.** Another Implication of Automatic Session Flushing*


    `def album = Album.get(1)`

    `album.title = "Change It"`


    In [Listing 9-16](#Chapter09.html#list_9_16), an instance of the `Album` class
    is looked up and the `title` is changed, but the `save()` method is never called.
    You may expect that since `save()` was never called, the `Album` instance will
    not be persisted to the database. However, you’d be wrong again. Hibernate does
    automatic dirty checking and flushes any changes to the persistent instances contained
    within the `Session`.


    It is our recommendation that you should *always* call the `save()` method when
    persisting objects. The `save()` method will call the Grails validation mechanism
    and mark the object as read-only, including any associations of the object, if
    a validation error occurs. If you were never planning to save the object in the
    first place, then you may want to consider using the `read` method instead of
    the `get` method, which returns the object in a read-only state:


    `def album = Album.read(1)`


    If all of this is too dreadful to contemplate and you prefer to have full control
    over how and when the `Session` is flushed, then you may want to consider changing
    the default `FlushMode` used by specifying the `hibernate.flush.mode` setting
    in `DataSource.groovy`:


    `hibernate.flush.mode="manual"`


    The possible values of the `hibernate.flush.mode` setting are summarized as follows:


    > *   `manual`: Flush only when you say so! In other words, only flush the session
    when the flush:true argument is passed to `save()` or `delete()`. The downside
    with a manual flush mode is that you may receive stale data from queries, and
    you must always pass the flush:true argument to the `save()` or `delete()` method.

    > *   `commit`: Flush only when the transaction is committed (see the next section).

    > *   `auto`: Flush when the transaction is committed and before a query is run.


    Nevertheless, assuming you stick with the default `auto` setting, the `save()`
    method might not, excuse the pun, save you in the case of the code from [Listing
    9-15](#Chapter09.html#list_9_15). Remember in this case the `Session` is automatically
    flushed before the query is run. This problem brings us nicely onto the topic
    of transactions in GORM.


    ### Transactions in GORM


    First things first—it is important to emphasize that *all* communication between
    Hibernate and the database runs within the context of a database transaction regardless
    of whether you are explicit about the transaction demarcation boundaries. The
    `Session` itself is lazy in that it only ever initiates a database transaction
    at the last possible moment.


    Consider the code in [Listing 9-15](#Chapter09.html#list_9_15) again. When the
    code is run, a `Session` has already been opened and bound to the current thread.
    However, a transaction is initiated only on first communication with the database,
    which happens within the call to `get` on line 1.


    At this point, the `Session` is associated with a JDBC `Connection` object. The
    `autoCommit` property of the `Connection` object is set to `false`, which initiates
    a transaction. The `Connection` will then be released only once the `Session`
    is closed. Hence, as you can see, there is never really a circumstance where Grails
    operates without an active transaction, since the same `Session` is shared across
    the entire request.


    Given that there is a transaction anyway, you would think that if something went
    wrong, any problems would be rolled back. However, without specific transaction
    boundaries and if the `Session` is flushed, any changes are permanently committed
    to the database.


    This is a particular problem if the flush is beyond your control (for instance,
    the result of a query). Then those changes will be permanently persisted to the
    database. The result may be the rather painful one of having your database left
    in an inconsistent state. To help you understand, let’s look at another illustrative
    example, as shown in [Listing 9-52](#Chapter09.html#list_9_52).


    ***Listing 9-52.** Updates Gone Wrong*


    `def save() {`

    `    def album = Album.get(params.id)`

    `    album.title = "Changed Title"`

    `    album.save(flush:true)`

    `    // something goes wrong`

    `    throw new Exception("Ruh Roh!")`

    `}`


    The example in [Listing 9-52](#Chapter09.html#list_9_52) shows a common problem.
    In the first three lines of the save action, an instance of the `Album` class
    is obtained using the `get` method, the title is updated, and the `save()` method
    is called and passes the `flush` argument to ensure updates are synchronized with
    the database. Then later in the code, something goes wrong, and an exception is
    thrown. Unfortunately, if you were expecting previous updates to the `Album` instance
    to be rolled back, you’re out of luck. The changes have already been persisted
    when the `Session` was flushed! You can correct this in two ways; the first is
    to move the logic into a transactional service. Services are the subject of [Chapter
    10](#Chapter10.html), so we’ll be showing the latter option, which is to use programmatic
    transactions. [Listing 9-53](#Chapter09.html#list_9_53) shows the code updated
    to use the `withTransaction` method to demarcate the transactional boundaries.


    ***Listing 9-53.** Using the withTransaction Method*


    `def save() {`

    `    Album.withTransaction {`

    `        def album = Album.get(params.id)`

    `        album.title = "Changed Title"`

    `        album.save(flush:true)`

    `        ...`

    `        // something goes wrong`

    `        throw new Exception("Ruh Roh!")`

    `    }`

    `}`


    Grails uses Spring’s `PlatformTransactionManager` abstraction layer under the
    covers. In this case, if an exception is thrown, all changes made within the scope
    of the transaction will be rolled back as expected. The first argument to the
    `withTransaction` method is a Spring `TransactionStatus` object, which also allows
    you to programmatically roll back the transaction by calling the `setRollbackOnly()`
    method, as shown in [Listing 9-54](#Chapter09.html#list_9_54).


    ***Listing 9-54.** Programmatically Rolling Back a Transaction*'
