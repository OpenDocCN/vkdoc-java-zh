    再执行一条 SQL `SELECT` 语句（N 条语句），加上最初检索专辑列表的那一条语句。显然，如果 `Album` 关联返回的结果集很大，你就会遇到大问题。每条
    SQL 语句的执行都会导致进程间通信，这会拖慢应用程序的性能。代码清单 9-60 展示了使用延迟关联时，Hibernate SQL 日志记录的典型输出，为简洁起见已做删减。


    ***代码清单 9-60.** 使用延迟关联的 Hibernate SQL 日志输出*


