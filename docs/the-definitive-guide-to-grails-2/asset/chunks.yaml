- fmt: "### Managing Transactions\n\nAs mentioned previously, services often encapsulate\
    \ business operations that deal with several domain objects. If an exception occurs\
    \ while executing changes, you may not want any earlier changes to be committed\
    \ to the database.\n\nEssentially, you want an all-or-nothing approach, also known\
    \ as a *transaction*. Transactions are essential for maintaining database integrity\
    \ via their ACID properties, which have probably been covered in every book that\
    \ has used a relational database. Nevertheless, let’s have a quick look at them\
    \ here. ACID stands for atomicity, consistency, isolation, and durability.\n\n\
    > *   *atomicity*: This refers to the fact that operations on data within a transaction\
    \ must be atomic. In other words, all tasks within a transaction will be completed\
    \ or none at all will be, thus allowing the changes to be rolled back.\n> *  \
    \ *consistency*: This requires that the database be in a consistent state before\
    \ and after any operations occur. There is no point attempting to complete a transaction\
    \ if the database is not in a legal state to begin with, and it would be rather\
    \ silly if an operation left the database’s integrity compromised.\n> *   *isolation*:\
    \ This refers to how transactions are isolated from all other operations. Essentially,\
    \ this means other queries or operations should never be exposed to data that\
    \ are in an intermediate state.\n> *   *durability*: Once a transaction is completed,\
    \ durability guarantees that the transaction cannot possibly be undone. Thus,\
    \ even if system failure occurs, the committed transaction cannot at that point\
    \ be aborted.\n\nGrails services may declare a static property named `transactional`.\
    \ When the `transactional` property is set to `true`, the methods of the service\
    \ are configured for transaction demarcation by Spring. What this does is create\
    \ a Spring proxy that wraps each method call and provides transaction management.\n\
    \nGrails handles the entire automatic runtime configuration for you, leaving you\
    \ to concentrate on writing the logic within your methods. If the service does\
    \ not require any transaction management, set the `transactional` property to\
    \ `false` to disable transactions.\n\nAnother option is a service’s need to impose\
    \ its own fine-grained control over transaction management. The way to do this\
    \ is to assign the `transactional` property a value of `false` and take responsibility\
    \ yourself for managing transactions. The static `withTransaction` method may\
    \ be called on any domain class; it expects a closure to be passed as an argument.\
    \ The closure represents the transaction boundary. [Listing 10-10](#Chapter10.html#list_10_10)\
    \ has an example.\n\n***Listing 10-10.** Using `withTransaction` in a Service*\n\
    \n```\npackage com.gtunes\nclass StoreService {\n    // turn off automatic transaction\
    \ management\n    static transactional = false\n    void someServiceMethod() {\n\
    \        Album.withTransaction {\n            // everything in this closure is\
    \ happening within a transaction\n           // which will be committed when the\
    \ closure completes\n        }\n    }\n}\n```\n\nIf the closure that is passed\
    \ to the `withTransaction` method throws an exception, the transaction will be\
    \ rolled back. Otherwise, the transaction is committed.\n\nTaking explicit control\
    \ over rolling back the transaction is simple to do as well. It turns out that\
    \ an instance of the `org.springframework.transaction.TransactionStatus` interface\
    \ is being passed as an argument to the closure. One of the methods defined by\
    \ the `TransactionStatus` interface is `setRollbackOnly()`.^([1](#Chapter10.html#CHP-10-FN-1))\
    \ Calling the `setRollbackOnly()` method will ensure that the transaction gets\
    \ rolled back. [Listing 10-11](#Chapter10.html#list_10_11) demonstrates how to\
    \ take advantage of this.\n\n***Listing 10-11.** Using the `TransactionStatus`\
    \ Argument*\n\n```\npackage com.gtunes\nclass StoreService {\n    // turn off\
    \ automatic transaction management\n    static transactional = false\n    void\
    \ someServiceMethod() {\n        Album.withTransaction { tx ->\n            //\
    \ do some work with the database\n            // if the transaction needs to be\
    \ rolled back for\n            // any reason,  call setRollbackOnly() on the\n\
    \            // TransactionStatus argument...\n            tx.setRollbackOnly()\n\
    \        }\n    }\n}\n```\n\n![Image](images/line.jpg)\n\n¹ You can find the full\
    \ documentation for the `TransactionStatus` interface at [`http://static.springsource.org/spring/docs/3.1.x/javadoc-api/`](http://static.springsource.org/spring/docs/3.1.x/javadoc-api/).\n\
    \nControllers and other Grails artefacts will, of course, need to get hold of\
    \ a reference to the singleton `StoreService`. As described earlier in this chapter,\
    \ the best way to get hold of a reference to a service is to take advantage of\
    \ the automatic dependency injection provided by Grails.\n\n### Scoping Services\n\
    \nYou must be careful about storing state in a service. By default all services\
    \ are scoped as singletons and can be used concurrently by multiple requests.\
    \ Further, access to service methods is not synchronized. For stateless services,\
    \ none of that is a problem. If a service must maintain state, it should be scoped\
    \ to something other than `singleton`.\n\nGrails supports several scopes for services.\
    \ Which scope you use will depend on how your application uses the service and\
    \ what kind of state is maintained in the service. The support scopes are as follows:\n\
    \n> *   `prototype`: A new service is created every time it is injected into another\
    \ class.\n> *   `request`: A new service will be created per request.\n> *   `flash`:\
    \ A new service will be created for the current and next requests only.\n> * \
    \  `flow`: In Web Flow, the service will exist for the scope of the flow.\n> *\
    \   `conversation`: In Web Flow, the service will exist for the scope of the conversation;\
    \ in other words, a root flow and its subflows.\n> *   `session`: A service is\
    \ created for the scope of a user session.\n> *   `singleton` (default): Only\
    \ one instance of the service ever exists.\n\nIf a service is to be scoped using\
    \ anything other than `singleton`, the service must declare a static property,\
    \ `scope`, and assign it a value that is one of the support scopes listed earlier.\
    \ See [Listing 10-12](#Chapter10.html#list_10_12).\n\n***Listing 10-12.** A request\
    \ Scoped Service*\n\n```\nclass SomeUsefulService {\n    boolean transactional\
    \ = true\n    // this is a request scoped service\n    static scope = 'request'\n\
    }\n```\n\nChoose the service scope carefully, and make sure your scope is consistent\
    \ with the application’s expectations of the service. Prefer stateless services;\
    \ for these, the default scope, `singleton`, is almost always optimum. When a\
    \ service must maintain state, choose the scope that satisfies the application’s\
    \ requirements."
  raw: '### Managing Transactions


    As mentioned previously, services often encapsulate business operations that deal
    with several domain objects. If an exception occurs while executing changes, you
    may not want any earlier changes to be committed to the database.


    Essentially, you want an all-or-nothing approach, also known as a *transaction*.
    Transactions are essential for maintaining database integrity via their ACID properties,
    which have probably been covered in every book that has used a relational database.
    Nevertheless, let’s have a quick look at them here. ACID stands for atomicity,
    consistency, isolation, and durability.


    > *   *atomicity*: This refers to the fact that operations on data within a transaction
    must be atomic. In other words, all tasks within a transaction will be completed
    or none at all will be, thus allowing the changes to be rolled back.

    > *   *consistency*: This requires that the database be in a consistent state
    before and after any operations occur. There is no point attempting to complete
    a transaction if the database is not in a legal state to begin with, and it would
    be rather silly if an operation left the database’s integrity compromised.

    > *   *isolation*: This refers to how transactions are isolated from all other
    operations. Essentially, this means other queries or operations should never be
    exposed to data that are in an intermediate state.

    > *   *durability*: Once a transaction is completed, durability guarantees that
    the transaction cannot possibly be undone. Thus, even if system failure occurs,
    the committed transaction cannot at that point be aborted.


    Grails services may declare a static property named `transactional`. When the
    `transactional` property is set to `true`, the methods of the service are configured
    for transaction demarcation by Spring. What this does is create a Spring proxy
    that wraps each method call and provides transaction management.


    Grails handles the entire automatic runtime configuration for you, leaving you
    to concentrate on writing the logic within your methods. If the service does not
    require any transaction management, set the transactional property to `false`
    to disable transactions.


    Another option is a service’s need to impose its own fine-grained control over
    transaction management. The way to do this is to assign the `transactional` property
    a value of `false` and take responsibility yourself for managing transactions.
    The static `withTransaction` method may be called on any domain class; it expects
    a closure to be passed as an argument. The closure represents the transaction
    boundary. [Listing 10-10](#Chapter10.html#list_10_10) has an example.


    ***Listing 10-10.** Using withTransaction in a Service*


    `package com.gtunes`

    `class StoreService {`

    `    // turn off automatic transaction management`

    `    static transactional = false`

    `    void someServiceMethod() {`

    `        Album.withTransaction {`

    `            // everything in this closure is happening within a transaction`

    `           // which will be committed when the closure completes`

    `        }`

    `    }`

    `}`


    If the closure that is passed to the `withTransaction` method throws an exception,
    the transaction will be rolled back. Otherwise, the transaction is committed.


    Taking explicit control over rolling back the transaction is simple to do as well.
    It turns out that an instance of the `org.springframework.transaction.TransactionStatus`
    interface is being passed as an argument to the closure. One of the methods defined
    by the `TransactionStatus` interface is `setRollbackOnly()`.^([1](#Chapter10.html#CHP-10-FN-1))
    Calling the `setRollbackOnly()` method will ensure that the transaction gets rolled
    back. [Listing 10-11](#Chapter10.html#list_10_11) demonstrates how to take advantage
    of this.


    ***Listing 10-11.** Using the TransactionStatus Argument*


    `package com.gtunes`

    `class StoreService {`

    `    // turn off automatic transaction management`

    `    static transactional = false`

    `    void someServiceMethod() {`

    `        Album.withTransaction { tx ->`

    `            // do some work with the database`

    `            // if the transaction needs to be rolled back for`

    `            // any reason,  call setRollbackOnly() on the`

    `            // TransactionStatus argument...`

    `            tx.setRollbackOnly()`

    `        }`

    `    }`

    `}`


    ![Image](images/line.jpg)


    ¹ You can find the full documentation for the TransactionStatus interface at [`http://static.springsource.org/spring/docs/3.1.x/javadoc-api/`](http://static.springsource.org/spring/docs/3.1.x/javadoc-api/).


    Controllers and other Grails artefacts will, of course, need to get hold of a
    reference to the singleton `StoreService`. As described earlier in this chapter,
    the best way to get hold of a reference to a service is to take advantage of the
    automatic dependency injection provided by Grails.


    ### Scoping Services


    You must be careful about storing state in a service. By default all services
    are scoped as singletons and can be used concurrently by multiple requests. Further,
    access to service methods is not synchronized. For stateless services, none of
    that is a problem. If a service must maintain state, it should be scoped to something
    other than `singleton`.


    Grails supports several scopes for services. Which scope you use will depend on
    how your application uses the service and what kind of state is maintained in
    the service. The support scopes are as follows:


    > *   `prototype`: A new service is created every time it is injected into another
    class.

    > *   `request`: A new service will be created per request.

    > *   `flash`: A new service will be created for the current and next requests
    only.

    > *   `flow`: In Web Flow, the service will exist for the scope of the flow.

    > *   `conversation`: In Web Flow, the service will exist for the scope of the
    conversation; in other words, a root flow and its subflows.

    > *   `session`: A service is created for the scope of a user session.

    > *   `singleton` (default): Only one instance of the service ever exists.


    If a service is to be scoped using anything other than `singleton`, the service
    must declare a static property, `scope`, and assign it a value that is one of
    the support scopes listed earlier. See [Listing 10-12](#Chapter10.html#list_10_12).


    ***Listing 10-12.** A request Scoped Service*


    `class SomeUsefulService {`

    `    boolean transactional = true`

    `    // this is a request scoped service`

    `    static scope = ''request''`

    `}`


    Choose the service scope carefully, and make sure your scope is consistent with
    the application’s expectations of the service. Prefer stateless services; for
    these, the default scope, `singleton`, is almost always optimum. When a service
    must maintain state, choose the scope that satisfies the application’s requirements.'
