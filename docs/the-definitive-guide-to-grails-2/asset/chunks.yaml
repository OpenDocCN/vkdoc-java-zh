    #### DataSource.groovy 文件


    创建 Grails 应用时，Grails 会自动提供一个 `grails-app/conf/DataSource.groovy` 文件，其中包含每个环境的配置（参见图
    2-11）。你可能会觉得这很方便，因为这意味着大部分工作已经为你完成，但你可能更倾向于使用其他数据库（例如 MySQL），而不是默认提供的 H2 数据库。


    ![图片](img/9781430243779_Fig02-11.jpg)


    ***图 2-11.** DataSource.groovy 文件*


    定义数据源是体现 Java 平台优势的领域之一。Java 的数据库连接技术 JDBC 已经非常成熟，市面上几乎每种数据库都有对应的驱动程序。事实上，如果某个数据库提供商不能提供高质量、稳定的
    JDBC 驱动，其产品在市场上就很难被认真对待。


    数据源定义会被转换为一个 `javax.sql.DataSource` 实例，该实例提供 JDBC `Connection` 对象。如果你之前使用过 JDBC，那么对这个过程应该很熟悉：第一步是确保驱动类（通常打包在
    JAR 文件中）在类路径上可用。


    `DataSource.groovy` 文件在数据源定义的顶部包含一些通用配置设置，清单 2-20 展示了一个示例。


    ***清单 2-20.** 通用数据源配置*


    `dataSource {`

    `    pooled = true`

    `    driverClassName = "org.h2.Driver"`

    `    username = "sa"`

    `    password = ""`

    `}`


    这段代码片段表明，默认情况下，你希望使用一个基于 H2 驱动的连接池数据源，用户名为“sa”，密码为空。你也可以为其他几个设置应用默认值。以下是 `DataSource.groovy`
    文件提供的设置列表：


    > *   `driverClassName`：JDBC 驱动的类名。

    > *   `username`：用于建立 JDBC 连接的用户名。

    > *   `password`：用于建立 JDBC 连接的密码。

    > *   `url`：数据库的 JDBC URL。

    > *   `dbCreate`：指定是否根据领域模型自动生成数据库。

    > *   `pooled`：指定是否使用连接池（默认为 true）。

    > *   `conf igClass`：用于配置 Hibernate 的类。

    > *   `logSql`：此设置启用 SQL 日志记录。

    > *   `dialect`：一个字符串或类，表示用于与数据库通信的 Hibernate 方言。


    除了此处描述的标准属性外，还可以通过在 `dataSource` 配置中定义一个 `properties` 块来配置其他特定于驱动的属性，如清单 2-21
    所示。


    ***清单 2-21.** 配置其他数据源属性*


    `environments {`

    `    production {`

    `        dataSource {`

    `            dbCreate = "update"`

    `            url = "jdbc:h2:prodDb;MVCC=TRUE;LOCK_TIMEOUT=10000"`

    `            pooled = true`

    `            properties {`

    `               maxActive = -1`

    `               minEvictableIdleTimeMillis=1800000`

    `               timeBetweenEvictionRunsMillis=1800000`

    `               numTestsPerEvictionRun=3`

    `               testOnBorrow=true`

    `               testWhileIdle=true`

    `               testOnReturn=true`

    `               validationQuery="SELECT 1"`

    `            }`

    `        }`

    `    }`

    `}`


    接下来是重点。在全局的 `dataSource` 块之后，你会看到每个已知环境（开发、测试和生产）的环境特定设置。清单 2-22 展示了一个环境特定配置的简化示例。


    ***清单 2-22.** 环境特定的数据源配置*


    `environments {`

    `    development {`

    `        dataSource {`

    `            dbCreate = "create-drop" // 可选值：''create'', ''create-drop'', ''update'',
    ''validate'', ''''`

    `            url = "jdbc:h2:mem:devDb;MVCC=TRUE"`

    `        }`

    `    }`


    请注意，默认情况下，开发环境配置为使用内存中的 H2 数据库，其数据库 URL 为 `jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000"`。同时注意
    `dbCreate` 设置，它允许你配置数据库的自动创建方式。


    ![图片](img/square.jpg) **注意**  Hibernate 用户应该对这些可能的值很熟悉，因为 `dbCreate` 直接对应于 `hibernate.hbm2ddl.auto`
    属性。


    开发环境的 `dbCreate` 设置被配置为 `create-drop`，这意味着每次 Grails 服务器重启时，都会删除数据库模式并重新创建。这个设置对于测试非常有用，因为每次你都会从一组干净的数据开始。`dbCreate`
    属性的可用设置如下：


    > *   `create-drop`：每次应用加载时删除并重新创建数据库模式。

    > *   `create`：在应用加载时创建数据库。

    > *   `update`：在应用加载时创建和/或尝试更新现有表。

    > *   `[空白]`：不执行任何操作。


    生产环境和测试环境都将 `dbCreate` 设置为 `update`，这样现有表不会被删除，而是自动创建或更新。在某些生产环境中，你可能需要手动创建数据库模式。或者，创建数据库模式可能是你的
    DBA 的职责。如果是这两种情况之一，只需完全移除 `dbCreate` 属性，Grails 就不会执行任何操作，将这个任务留给你或你的同事。

