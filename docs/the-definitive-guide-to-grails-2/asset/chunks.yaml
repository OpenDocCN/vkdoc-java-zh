- fmt: "# Packaging and Distributing a Grails Plug-in\n\nOnce you are confident that\
    \ your plug-in is ready for distribution, you can package it using the `grails\
    \ package-plugin` command. In the command window, simply type `grails package-plugin`\
    \ from the root of your plug-in project, as shown in [Listing 12-28](#Chapter12.html#list_12_28).\n\
    \n***Listing 12-28.** Packaging a Plug-in*\n\n```\n$ grails package-plugin\n \
    \ ...\n| Plugin packaged grails-simple-cache-0.1.zip\n```\n\nAs you can see from\
    \ the output in [Listing 12-28](#Chapter12.html#list_12_28), the `package-plugin`\
    \ command generates a zip file using the name and version number of your plug-in.\
    \ In this case, you’re packaging the `simple-cache` plug-in you developed earlier.\
    \ [Figure 12-2](#Chapter12.html#fig_12_2) shows an example of the resulting zip\
    \ file.\n\n![Image](images/9781430243779_Fig12-02.jpg)\n\n***Figure 12-2.** The\
    \ simple-cache plug-in’s packaged zip file*\n\nUsing the steps explained earlier\
    \ in this chapter in the “Plug-in Installation” section, you can now install the\
    \ `simple-cache` plug-in into other applications and make use of the tag library\
    \ and services it provides.\n\nIf you want to distribute your plug-in within the\
    \ Grails central repository, you first need to obtain a plug-in developer account\
    \ for the Grails central repository. You can find the steps to do so on the Grails\
    \ web site at [`http://grails.org/Creating+Plugins`](http://grails.org/Creating+Plugins).\n\
    \nOnce you have obtained an account, you can publish your plug-in to the Grails\
    \ central repository by using the `publish-plugin` command, which is provided\
    \ by the release plug-in.\n\n```\n$ grails publish-plugin\n```\n\nThe `publish-plugin`\
    \ command needs your authorization credentials in order to publish to the repository.\
    \ Those credentials should be defined in `$HOME/.grails/settings.groovy`, as shown\
    \ in [Listing 12-29](#Chapter12.html#list_12_29).\n\n***Listing 12-29.** Plug-in\
    \ Repository Credentials*\n\n```\n// ~/.grails/settings.groovy\ngrails.project.repos.grailsCentral.username\
    \ = 'your username'\ngrails.project.repos.grailsCentral.password = 'your password'\n\
    ```\n\nThe `publish-plugin` command does all the heavy lifting for you in making\
    \ sure that the appropriate resources have been published in the repository and\
    \ been tagged appropriately. The `publish-plugin` command will also generate an\
    \ updated plug-in list so that your plug-in appears whenever a Grails user types\
    \ the `list-plugins` command.\n\n## Local Plug-in Repositories\n\nIf you want\
    \ to take advantage of the plug-in distribution and discovery mechanism in Grails\
    \ on your own local network, you can set up a local plug-in repository. The Grails\
    \ plug-in repositories are currently backed by a maven-compatible repository.\
    \ Tools like Nexus and Artifactory can be used to help manage these. Once you\
    \ have a maven-compatible repository up and running, you need to configure the\
    \ release plug-in so that it knows about your repository. The way to do that is\
    \ by defining a property in `BuildConfig.groovy` for each of the repositories\
    \ that you want to interact with (see [Listing 12-30](#Chapter12.html#list_12_30)).\n\
    \n***Listing 12-30.** Configuring Maven Repositories in BuildConfig.groovy*\n\n\
    ```\ngrails.project.repos.myRepo.url = \"http://localhost:8081/myRepo\"\ngrails.project.repos.myRepo.type\
    \ = \"maven\"\ngrails.project.repos.myRepo.username = \"admin\"\ngrails.project.repos.myRepo.password\
    \ = \"password\"\ngrails.project.repos.myRepo.portal = \"grailsCentral\"\n\ngrails.project.repos.myOtherRepo.url\
    \ = \"http://localhost:8081/myOtherRepo\"\ngrails.project.repos.myOtherRepo.type\
    \ = \"maven\"\ngrails.project.repos.myOtherRepo.username = \"admin\"\ngrails.project.repos.myOtherRepo.password\
    \ = \"password\"\ngrails.project.repos.myOtherRepo.portal = \"grailsCentral\"\n\
    ```\n\nNow that you have configured the system to know about your own Maven repositories,\
    \ you can publish to them, as shown in [Listing 12-31](#Chapter12.html#list_12_31).\n\
    \n***Listing 12-31.** Publishing to a Custom Repository*\n\n```\ngrails publish-plugin\
    \ –-repository=myRepo\ngrails publish-plugin –-repository=myOtherRepo\n```\n\n\
    The release plug-in also supports publishing to your local Maven cache. This does\
    \ not require any repository server but instead installs directly to your file\
    \ system under `$HOME/.m2/`. The `maven-install` command will publish a plug-in\
    \ to the local Maven cache. In order for an application to resolve plug-ins that\
    \ have been installed to the local Maven cache, `mavenLocal()` needs to be configured\
    \ as a repository in `BuildConfig.groovy`, as shown in [Listing 12-32](#Chapter12.html#list_12_32).\n\
    \n***Listing 12-32.** Configuring the Local Maven Cache As a Repository*\n\n```\n\
    grails.project.dependency.resolution = {\n    ...\n    repositories {\n      \
    \  mavenLocal()\n        ...\n    }\n    ...\n}\n```\n\nWith that, we’ve reached\
    \ the end of this tour of the plug-in system. You’ve seen how to take advantage\
    \ of the plug-in system in many different ways. This section has touched on some\
    \ ideas for plug-ins, including the `simple-cache` plug-in and the Quartz plug-in,\
