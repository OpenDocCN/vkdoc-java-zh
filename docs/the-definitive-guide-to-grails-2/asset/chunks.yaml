- fmt: "### Using `messageSource`\n\nThe `message` tag is easy and sensible to use\
    \ when a user message needs to be retrieved from `messages.properties` and the\
    \ message is going to be rendered in a GSP. However, sometimes an application\
    \ may need to retrieve the value of a user message and do something with it other\
    \ than render the value in a GSP. For example, the message could be used in an\
    \ e mail message. In fact, the message could be used for any number of things,\
    \ and not all of them involve rendering text in a GSP.\n\nGrails provides a bean\
    \ named `messageSource` that can be injected into any Grails artefact, including\
    \ controllers, taglibs, other beans, and so on. The `messageSource` bean is an\
    \ instance of the `org.springframework.context.MessageSource` interface provided\
    \ by the Spring Framework. This interface defines three overloaded versions of\
    \ the `getMessage` method for retrieving messages from the source. [Listing 7-17](#Chapter07.html#list_7_17)\
    \ shows the signatures of these methods.^([1](#Chapter07.html#CHP-7-FN-1))\n\n\
    ![Image](images/square.jpg) **Note**  Throughout the source code and documentation\
    \ of Grails, the word artefact is used to refer to a Groovy file that fulfills\
    \ a certain concept (such as a controller, tag library, or domain class). Since\
    \ it is spelled using the British English spelling of artefact (as opposed to\
    \ artifact), we will be using that spelling throughout the book to maintain consistency\
    \ with the APIs.\n\n***Listing 7-17.** The `MessageSource` Interface*\n\n```\n\
    String getMessage(String code, Object[] args, Locale locale)\nString getMessage(String\
    \ code, Object[] args, String defaultMessage, Locale locale)\nString getMessage(MessageSourceResolvable\
    \ resolvable, Locale locale)\n```\n\nSince the `messageSource` bean participates\
    \ in Grails’s dependency autowiring process, all you need to do to get a reference\
    \ to the bean is declare a property named `messageSource` in your Grails artefact.\
    \ The code in [Listing 7-18](#Chapter07.html#list_7_18) shows how to use the `messageSource`\
    \ bean in a service.\n\n***Listing 7-18.** Using `messageSource` in a Service*\n\
    \n```\npackage com.gtunes\n\nclass StoreService {\n\n    def messageSource\n\n\
    \    def someServiceMethod() {\n        def msg = messageSource.getMessage('gtunes.my.music',\
    \ null, null)\n        // ...\n    }\n    ...\n}\n```\n\nNote that the second\
    \ and third arguments are `null`. The second argument is an `Object[]`, which\
    \ would be used to pass parameters to a parameterized message. The third argument\
    \ is a `java.util.Locale`, which may be specified to retrieve a message for any\
    \ Locale other than the default Locale for this request. For example, [Listing\
    \ 7-19](#Chapter07.html#list_7_19) demonstrates retrieving a message in Italian.\n\
    \n***Listing 7-19.** Using `messageSource` and Specifying a Locale*\n\n```\npackage\
    \ com.gtunes\n\nclass StoreService {\n\n    def messageSource\n\n    def someServiceMethod()\
    \ {\n        def msg = messageSource.getMessage('gtunes.my.music',\n         \
    \                                  null,\n                                   \
    \        Locale.ITALIAN)\n        // ...\n    }\n    ...\n}\n```\n\n![Image](images/line.jpg)\n\
    \n1  See [`http://static.springsource.org/spring/docs/3.1.x/javadoc-api/`](http://static.springsource.org/spring/docs/3.1.x/javadoc-api/)\
    \ for complete documentation of the `MessageSource` interface and related classes.\n\
    \nFrom within a Controller or TagLib artefact, a simpler way to retrieve messages\
    \ is to invoke the `message` GSP tag as a method on the special `g` namespace\
    \ variable available in those artefacts, as shown in [Listing 7-20](#Chapter07.html#list_7_20)\n\
    \n***Listing 7-20.** Invoking `g.message()` from a Controller*\n\n```\npackage\
    \ com.gtunes\n\nclass StoreController {\n\n    def index() {\n        def msg\
    \ = g.message(code:'gtunes.my.music')\n        // …\n    }\n}\n```\n\n![Image](images/square.jpg)\
    \ **Note**  The code in [Listing 7-20](#Chapter07.html#list_7_20) is effectively\
    \ invoking the `message` tag, which is defined in the `g` namespace. There isn’t\
    \ really anything special about accessing the `message` tag, however. All tag\
    \ libraries are accessible using the very same technique.\n\n### Summary\n\nInternationalization\
    \ is an important aspect of building widely distributed applications. Grails provides\
    \ a number of mechanisms that make the process much easier than it might otherwise\
    \ be. All the message property files in a Grails application are located in the\
    \ same place. Thus, an application developer does not need to tell Grails where\
    \ to look for these files. What’s more, as a Grails developer moves from one Grails\
    \ project to the next, he or she knows exactly where to look for the property\
    \ files because they are always in the same place. This is the practical working\
    \ power of coding by convention. Also, retrieving messages from a property file\
    \ is a snap in a Grails application. The `message` tag is very easy to access\
    \ and use from GSP pages and GSP templates. The `messageSource` bean is easily\
    \ accessible from wherever the application may need it. All of these enhancements\
    \ are built on top of proven and well-understood Java-platform tools, including\
    \ `java.text.MessageFormat` and `org.springframework.context.MessageSource`.\n\
    \n## CHAPTER 8\n\n![Image](images/3squ.jpg)\n\n## Ajax\n\n**Ajax is a really important\
    \ piece of the modern web application story.** The technology was originally developed\
    \ by Microsoft to power a web-based version of its Outlook e mail software. Microsoft\
    \ implemented Ajax as an ActiveX control that could be used by its browser, Internet\
    \ Explorer, and be called from JavaScript to perform asynchronous browser requests.\n\
    \nThe advantage of the approach is that the browser doesn’t have to refresh the\
    \ entire page to interact with the server, thus allowing the development of applications\
    \ that bear a closer resemblance to their desktop counterparts. Since then, browsers\
    \ other than Internet Explorer have standardized on a native JavaScript object\
    \ called `XMLHttpRequest`, which has largely the same API as Microsoft’s ActiveX\
    \ control.\n\n### Writing Ajax Code\n\nWriting JavaScript code can become rather\
    \ repetitive and tedious. Fortunately, there are Ajax frameworks that encapsulate\
    \ much of this logic, ranging from the simple to the comprehensive. Efforts are\
    \ underway to standardize on a JavaScript library, but as is always the case with\
    \ any collaborative effort, the process could be long and painful and is likely\
    \ never to satisfy everyone.\n\nBy default, Grails ships with the jQuery. Through\
    \ the Grails plug-in system, you can add support for alternative libraries that\
    \ supply the underlying implementation of the Ajax tags in Grails.\n\nBefore you\
    \ delve into the world of Ajax, you should revisit the gTunes application, since\
    \ you’ll be enhancing the gTunes application by adding a range of Ajax-powered\
    \ features that improve the user experience:\n\n> *   the ability to log in asynchronously\n\
    > *   a new feature that allows you to search and filter songs within your library\
    \ and the store using Ajax-powered search fields\n> *   finally, a slicker way\
    \ of displaying albums and songs, including album art\n\nSo before getting too\
    \ carried away, let’s move on to the guts of the chapter by improving the gTunes\
    \ application interface, Ajax style."
  raw: '### Using messageSource


    The `message` tag is easy and sensible to use when a user message needs to be
    retrieved from `messages.properties` and the message is going to be rendered in
    a GSP. However, sometimes an application may need to retrieve the value of a user
    message and do something with it other than render the value in a GSP. For example,
    the message could be used in an e mail message. In fact, the message could be
    used for any number of things, and not all of them involve rendering text in a
    GSP.


    Grails provides a bean named `messageSource` that can be injected into any Grails
    artefact, including controllers, taglibs, other beans, and so on. The `messageSource`
    bean is an instance of the `org.springframework.context.MessageSource` interface
    provided by the Spring Framework. This interface defines three overloaded versions
    of the `getMessage` method for retrieving messages from the source. [Listing 7-17](#Chapter07.html#list_7_17)
    shows the signatures of these methods.^([1](#Chapter07.html#CHP-7-FN-1))


    ![Image](images/square.jpg) **Note**  Throughout the source code and documentation
    of Grails, the word artefact is used to refer to a Groovy file that fulfills a
    certain concept (such as a controller, tag library, or domain class). Since it
    is spelled using the British English spelling of artefact (as opposed to artifact),
    we will be using that spelling throughout the book to maintain consistency with
    the APIs.


    ***Listing 7-17.** The MessageSource Interface*


    `String getMessage(String code, Object[] args, Locale locale)`

    `String getMessage(String code, Object[] args, String defaultMessage, Locale locale)`

    `String getMessage(MessageSourceResolvable resolvable, Locale locale)`


    Since the `messageSource` bean participates in Grails’s dependency autowiring
    process, all you need to do to get a reference to the bean is declare a property
    named `messageSource` in your Grails artefact. The code in [Listing 7-18](#Chapter07.html#list_7_18)
    shows how to use the `messageSource` bean in a service.


    ***Listing 7-18.** Using messageSource in a Service*


    `package com.gtunes`


    `class StoreService {`


    `    def messageSource`


    `    def someServiceMethod() {`

    `        def msg = messageSource.getMessage(''gtunes.my.music'', null, null)`

    `        // ...`

    `    }`

    `    ...`

    `}`


    Note that the second and third arguments are null. The second argument is an `Object[]`,
    which would be used to pass parameters to a parameterized message. The third argument
    is a `java.util.Locale`, which may be specified to retrieve a message for any
    Locale other than the default Locale for this request. For example, [Listing 7-19](#Chapter07.html#list_7_19)
    demonstrates retrieving a message in Italian.


    ***Listing 7-19.** Using messageSource and Specifying a Locale*


    `package com.gtunes`


    `class StoreService {`


    `    def messageSource`


    `    def someServiceMethod() {`

    `        def msg = messageSource.getMessage(''gtunes.my.music'',`

    `                                           null,`

    `                                           Locale.ITALIAN)`

    `        // ...`

    `    }`

    `    ...`

    `}`


    ![Image](images/line.jpg)


    1  See [`http://static.springsource.org/spring/docs/3.1.x/javadoc-api/`](http://static.springsource.org/spring/docs/3.1.x/javadoc-api/)
    for complete documentation of the MessageSource interface and related classes.


    From within a Controller or TagLib artefact, a simpler way to retrieve messages
    is to invoke the `message GSP tag as a method` on the special `g` namespace variable
    available in those artefacts, as shown in [Listing 7-20](#Chapter07.html#list_7_20)


    ***Listing 7-20.** Invoking g.message() from a Controller*


    `package com.gtunes`


    `class StoreController {`


    `    def index() {`

    `        def msg = g.message(code:''gtunes.my.music'')`

    `        // …`

    `    }`

    `}`


    ![Image](images/square.jpg) **Note**  The code in [Listing 7-20](#Chapter07.html#list_7_20)
    is effectively invoking the message tag, which is defined in the g namespace.
    There isn’t really anything special about accessing the message tag, however.
    All tag libraries are accessible using the very same technique.


    ### Summary


    Internationalization is an important aspect of building widely distributed applications.
    Grails provides a number of mechanisms that make the process much easier than
    it might otherwise be. All the message property files in a Grails application
    are located in the same place. Thus, an application developer does not need to
    tell Grails where to look for these files. What’s more, as a Grails developer
    moves from one Grails project to the next, he or she knows exactly where to look
    for the property files because they are always in the same place. This is the
    practical working power of coding by convention. Also, retrieving messages from
    a property file is a snap in a Grails application. The `message` tag is very easy
    to access and use from GSP pages and GSP templates. The `messageSource` bean is
    easily accessible from wherever the application may need it. All of these enhancements
    are built on top of proven and well-understood Java-platform tools, including
    `java.text. MessageFormat` and `org.springframework.context.MessageSource`.


    ## CHAPTER 8


    ![Image](images/3squ.jpg)


    ## Ajax


    **Ajax is a really important piece of the modern web application story.** The
    technology was originally developed by Microsoft to power a web-based version
    of its Outlook e mail software. Microsoft implemented Ajax as an ActiveX control
    that could be used by its browser, Internet Explorer, and be called from JavaScript
    to perform asynchronous browser requests.


    The advantage of the approach is that the browser doesn’t have to refresh the
    entire page to interact with the server, thus allowing the development of applications
    that bear a closer resemblance to their desktop counterparts. Since then, browsers
    other than Internet Explorer have standardized on a native JavaScript object called
    `XMLHttpRequest`, which has largely the same API as Microsoft’s ActiveX control.


    ### Writing Ajax Code


    Writing JavaScript code can become rather repetitive and tedious. Fortunately,
    there are Ajax frameworks that encapsulate much of this logic, ranging from the
    simple to the comprehensive. Efforts are underway to standardize on a JavaScript
    library, but as is always the case with any collaborative effort, the process
    could be long and painful and is likely never to satisfy everyone.


    By default, Grails ships with the jQuery. Through the Grails plug-in system, you
    can add support for alternative libraries that supply the underlying implementation
    of the Ajax tags in Grails.


    Before you delve into the world of Ajax, you should revisit the gTunes application,
    since you’ll be enhancing the gTunes application by adding a range of Ajax-powered
    features that improve the user experience:


    > *   the ability to log in asynchronously

    > *   a new feature that allows you to search and filter songs within your library
    and the store using Ajax-powered search fields

    > *   finally, a slicker way of displaying albums and songs, including album art


    So before getting too carried away, let’s move on to the guts of the chapter by
    improving the gTunes application interface, Ajax style.'
  trans: '

    ### 使用 messageSource


    当需要从 `messages.properties` 中获取用户消息并在 GSP 中渲染时，`message` 标签使用起来既简单又直观。然而，有时应用程序可能需要获取用户消息的值并对其进行其他处理，而不仅仅是在
    GSP 中渲染该值。例如，该消息可能用于电子邮件中。事实上，消息可以用于多种用途，并非所有用途都涉及在 GSP 中渲染文本。


    Grails 提供了一个名为 `messageSource` 的 bean，它可以被注入到任何 Grails 构件中，包括控制器、标签库、其他 bean 等。`messageSource`
    bean 是 Spring 框架提供的 `org.springframework.context.MessageSource` 接口的一个实例。该接口定义了三个重载版本的
    `getMessage` 方法，用于从源中检索消息。清单 7-17 展示了这些方法的签名。^(1)


    ![Image](img/square.jpg) **注意**  在 Grails 的源代码和文档中，术语“artefact”用于指代实现特定概念（如控制器、标签库或领域类）的
    Groovy 文件。由于它使用的是英式英语拼写“artefact”（而非“artifact”），为了与 API 保持一致，本书将统一使用该拼写。


    ***清单 7-17.** MessageSource 接口*


    `String getMessage(String code, Object[] args, Locale locale)`

    `String getMessage(String code, Object[] args, String defaultMessage, Locale locale)`

    `String getMessage(MessageSourceResolvable resolvable, Locale locale)`


    由于 `messageSource` bean 参与了 Grails 的依赖自动装配过程，要获取该 bean 的引用，您只需在 Grails 构件中声明一个名为
    `messageSource` 的属性即可。清单 7-18 中的代码展示了如何在服务中使用 `messageSource` bean。


    ***清单 7-18.** 在服务中使用 messageSource*


    `package com.gtunes`


    `class StoreService {`


    `    def messageSource`


    `    def someServiceMethod() {`

    `        def msg = messageSource.getMessage(''gtunes.my.music'', null, null)`

    `        // ...`

    `    }`

    `    ...`

    `}`


    请注意，第二个和第三个参数为 null。第二个参数是一个 `Object[]`，用于向参数化消息传递参数。第三个参数是一个 `java.util.Locale`，可以指定它来检索除该请求的默认
    Locale 之外的任何 Locale 的消息。例如，清单 7-19 演示了如何检索意大利语的消息。


    ***清单 7-19.** 使用 messageSource 并指定 Locale*


    `package com.gtunes`


    `class StoreService {`


    `    def messageSource`


    `    def someServiceMethod() {`

    `        def msg = messageSource.getMessage(''gtunes.my.music'',`

    `                                           null,`

    `                                           Locale.ITALIAN)`

    `        // ...`

    `    }`

    `    ...`

    `}`


    ![Image](img/line.jpg)


    1  有关 MessageSource 接口和相关类的完整文档，请参见 [`http://static.springsource.org/spring/docs/3.1.x/javadoc-api/`](http://static.springsource.org/spring/docs/3.1.x/javadoc-api/)。


    在 Controller 或 TagLib 构件中，一种更简单的检索消息的方法是调用这些构件中可用的特殊 `g` 命名空间变量上的 `message GSP
    标签作为方法`，如清单 7-20 所示。


    ***清单 7-20.** 从 Controller 中调用 g.message()*


    `package com.gtunes`


    `class StoreController {`


    `    def index() {`

    `        def msg = g.message(code:''gtunes.my.music'')`

    `        // …`

    `    }`

    `}`


    ![Image](img/square.jpg) **注意**  清单 7-20 中的代码实际上是在调用定义在 g 命名空间中的 message 标签。然而，访问
    message 标签并没有什么特别之处。所有标签库都可以使用完全相同的技术进行访问。


    ### 总结


    国际化是构建广泛分布应用程序的一个重要方面。Grails 提供了许多机制，使得这一过程比原本要容易得多。Grails 应用程序中的所有消息属性文件都位于同一位置。因此，应用程序开发者无需告诉
    Grails 在哪里查找这些文件。更重要的是，当 Grails 开发者从一个 Grails 项目转到另一个项目时，他或她确切地知道在哪里查找属性文件，因为它们总是在同一个位置。这就是约定优于编码的实际工作能力。此外，在
    Grails 应用程序中从属性文件检索消息非常容易。`message` 标签在 GSP 页面和 GSP 模板中非常易于访问和使用。`messageSource`
    bean 可以从应用程序需要的任何地方轻松访问。所有这些增强功能都建立在经过验证且广为人知的 Java 平台工具之上，包括 `java.text.MessageFormat`
    和 `org.springframework.context.MessageSource`。


    ## 第 8 章


    ![Image](img/3squ.jpg)


    ## Ajax


    **Ajax 是现代 Web 应用程序故事中非常重要的一部分。** 该技术最初由微软开发，用于驱动其 Outlook 电子邮件软件的基于 Web 的版本。微软将
    Ajax 实现为一个 ActiveX 控件，该控件可供其浏览器 Internet Explorer 使用，并可从 JavaScript 调用以执行异步浏览器请求。


    这种方法的好处在于，浏览器无需刷新整个页面即可与服务器交互，从而允许开发与桌面应用程序更为相似的应用程序。自那时起，除 Internet Explorer
    之外的浏览器已经标准化了一个名为 `XMLHttpRequest` 的原生 JavaScript 对象，其 API 与微软的 ActiveX 控件大致相同。


    ### 编写 Ajax 代码


    编写 JavaScript 代码可能会变得相当重复和乏味。幸运的是，有一些 Ajax 框架封装了大部分此类逻辑，范围从简单到全面。目前正在努力标准化一个 JavaScript
    库，但正如任何协作努力一样，这个过程可能漫长而痛苦，并且很可能无法让所有人满意。


    默认情况下，Grails 附带 jQuery。通过 Grails 插件系统，您可以添加对替代库的支持，这些库为 Grails 中的 Ajax 标签提供底层实现。


    在深入 Ajax 世界之前，您应该重新审视 gTunes 应用程序，因为您将通过添加一系列 Ajax 驱动的功能来增强 gTunes 应用程序，从而改善用户体验：


    > *   异步登录功能

    > *   一项新功能，允许您使用 Ajax 驱动的搜索字段在您的库和商店中搜索和过滤歌曲

    > *   最后，一种更流畅的显示专辑和歌曲的方式，包括专辑封面


    因此，在过于激动之前，让我们通过以 Ajax 风格改进 gTunes 应用程序界面，进入本章的核心内容。

