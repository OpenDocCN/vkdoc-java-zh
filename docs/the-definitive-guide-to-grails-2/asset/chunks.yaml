- fmt: "### Providing Plug-in Metadata\n\nThe plug-in descriptor serves a number of\
    \ purposes. The first and primary purpose is for the plug-in author to provide\
    \ metadata about the plug-in: the author name, version number, description, and\
    \ so on. [Listing 12-8](#Chapter12.html#list_12_8) shows the `SimpleCacheGrailsPlugin`\
    \ class and the placeholder fields used to supply this information.\n\n**Listing\
    \ 12-8.** The `SimpleCacheGrailsPlugin` Plug-in Descriptor\n\n```\nclass SimpleCacheGrailsPlugin\
    \ {\n    // the plugin version\n    def version = \"0.1\"\n    // the version\
