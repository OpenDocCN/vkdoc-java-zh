- fmt: "#### Request Parameter Type Conversions\n\nIncoming request parameters are\
    \ typically strings. If a controller action wants to accept a request parameter\
    \ named `counter` and use it to control how many times some operation may be executed,\
    \ the code might look something like [Listing 4-11](#Chapter04.html#list_4_11).\n\
    \n***Listing 4-11.** Request Parameter Type Conversion*\n\n```\ndef index() {\n\
    \    // since params.counter is a string, it must be converted to an int if\n\
    \    // the application intends to use the value as a number\n    def counter\
    \ = params.counter.toInteger()\n    // …\n}\n```\n\nGrails provides convenience\
    \ methods for doing this type of conversion on request parameters. Those methods\
    \ are available on the `params` object and have names that correspond to all eight\
    \ of the primitive types defined by Java (`Boolean`, `byte`, `char`, `short`,\
    \ `int`, `long`, `float`, and `double`). The methods each accept one or two arguments.\
    \ The first argument is the name of the request parameter that is to be converted,\
    \ and the optional second argument is a default value that will be returned if\
    \ a corresponding request parameter cannot be found or if an error occurs during\
    \ the conversion. [Listing 4-12](#Chapter04.html#list_4_12) demonstrates using\
    \ the `int` convenience method.\n\n***Listing 4-12.** Using the int Type of Conversion\
    \ Method*\n\n```\ndef index() {\n    def counter = params.int('counter')\n   \
    \ // …\n}\n```\n\nAnother type of converting method is named `list`. The `list`\
    \ method is useful when dealing with multiple request parameters of the same name.\
    \ The `list` method will return a list containing all of the values associated\
    \ with the specified request parameter name, as shown in [Listing 4-13](#Chapter04.html#list_4_13).\n\
    \n***Listing 4-13.** Using The list Type Conversion Method*\n\n```\ndef index()\
    \ {\n    for (name in params.list('name') {\n        // do something with name\n\
    \    }\n}\n```\n\nIf a controller action accepts parameters of simple types, including\
    \ the eight primitive types, their corresponding type wrappers, and `java.lang.String`,\
    \ then Grails will automatically attempt the corresponding type of conversion\
    \ and pass the resulting value into the controller action as a method argument.\
    \ The two controller actions defined in [Listing 4-14](#Chapter04.html#list_4_14)\
    \ accomplish the same thing.\n\n***Listing 4-14.** Binding Request Parameters\
    \ to Method Arguments*\n\n```\ndef firstAction() {\n    def counter = params.int('counter')\n\
    \    def name = params.name\n    // …\n}\ndef secondAction(int counter, String\
    \ name) {\n    // there is no need to interact with the params object as\n   \
    \ // the request parameters have been bound to the counter\n    // and name method\
    \ arguments\n}\n```\n\nBy default the method argument name will correspond to\
    \ a request parameter name. If for some reason the request parameter and the method\
    \ argument need to have different names, then the `grails.web.RequestParameter`\
    \ annotation may be used to be explicit about which request parameter should be\
    \ bound to a particular method argument, as shown in [Listing 4-15](#Chapter04.html#list_4_15).\n\
    \n***Listing 4-15.** The RequestParameter Annotation*\n\n```\nimport grails.web.RequestParameter\n\
    \nclass AdminController {\n\n   // mainNumber will be initialized with the value\n\
    \   // of params.accountNumber\n   // accountType will be initialized with params.int('accountType')\n\
    \   def action(@RequestParameter('accountNumber') String mainNumber,\n       \
    \       int accountType) {\n       // …\n   }\n}\n```\n\nWhether you are using\
    \ the `RequestParameter` annotation or associating method arguments with request\
    \ parameters by convention, if a corresponding request parameter does not exist\
    \ or a conversion error occurs for method action arguments, then the default value\
    \ for the corresponding type will be passed in as the argument value. For Booleans\
    \ this is `false`, for all of the other seven primitive types this is zero (`0`),\
    \ and for all reference types this is `null`. Controllers have an `errors` property\
    \ that may contain errors related to type conversions of request parameters. [Listing\
    \ 4-16](#Chapter04.html#list_4_16) shows how a controller might interact with\
    \ the `errors` property.\n\n***Listing 4-16.** A Controller’s errors Property*\n\
    \n```\nclass AdminController {\n\n  def action(String accountNumber, int accountType)\
    \ {\n   if(accountNumber == null && errors.hasErrors()) {\n     def accountNumberError\
    \ = errors.getFieldError('accountNumber')\n       if(accountNumberError != null)\
    \ {\n         // accountNumberError is an instance of\n         // org.springframework.validation.FieldError\n\
    \         // ...\n      }\n    }\n  }\n}\n```\n\n#### Rendering Text\n\nIn its\
    \ most basic form, you can use the `render` method from a controller to output\
    \ text to the response. [Listing 4-17](#Chapter04.html#list_4_17) demonstrates\
    \ how to render a simple string to the response.\n\n***Listing 4-17.** Rendering\
    \ a Simple String*\n\n```\nrender 'this text will be rendered back as part of\
    \ the response'\n```\n\nOptionally, you can specify the `contentType`:\n\n```\n\
    render text:'<album>Revolver</album>', contentType:'text/xml'\n```\n\nThe most\
    \ common use of the `render` method is to render a GSP view or a GSP template.\
    \ We’ll cover GSP in detail in [Chapter 5](#Chapter05.html).\n\n#### Redirecting\
    \ a Request\n\nOften a controller action will need to redirect control to another\
    \ controller action. This is a common thing for a controller action to do, so\
    \ Grails provides a simple technique to manage redirecting to another controller\
    \ action.\n\nGrails provides all controllers with a `redirect` method that accepts\
    \ a map as an argument. The map should contain all the information that Grails\
    \ needs to carry out the redirect, including the name of the action to redirect\
    \ to. In addition, the map can contain the name of the controller to redirect\
    \ to.\n\nSpecifying the controller is required only if the request is being redirected\
    \ to an action defined in a controller other than the current controller. [Listing\
    \ 4-18](#Chapter04.html#list_4_18) shows a standard redirect from the first action\
    \ to the second action within the sample controller.\n\n***Listing 4-18.** A Simple\
    \ Redirect*\n\n```\nclass SampleController {\n  def first() {\n    // redirect\
    \ to the \"second\" action...\n    redirect action: \"second\"\n  }\n  def second()\
    \ {\n    // ...\n  }\n}\n```\n\nIf the redirect is bound for an action in another\
    \ controller, you must specify the name of the other controller. [Listing 4-19](#Chapter04.html#list_4_19)\
    \ demonstrates how to redirect to an action in another controller.\n\n***Listing\
    \ 4-19.** Redirecting to an Action in Another Controller*\n\n```\nclass SampleController\
    \ {\n  def first() {\n    // redirect to the 'list' action in the 'store' controller...\n\
    \    redirect action: \"list\", controller: \"store\"\n  }\n}\n```\n\nAlthough\
    \ the previous examples are pretty trivial, the `redirect` method is pretty flexible.\
    \ [Table 4-3](#Chapter04.html#tab_4_3) shows the different arguments that the\
    \ `redirect` method accepts.\n\n![Image](images/9781430243779_Tab04-03.jpg)\n\n\
    As you can see, the `redirect` method allows you to effectively pass control from\
    \ one action to the next. However, often you simply want to formulate some data\
    \ to be rendered by a view. In the next couple of sections, we’ll take a look\
    \ at how to achieve this."
  raw: '#### Request Parameter Type Conversions


    Incoming request parameters are typically strings. If a controller action wants
    to accept a request parameter named `counter` and use it to control how many times
    some operation may be executed, the code might look something like [Listing 4-11](#Chapter04.html#list_4_11).


    ***Listing 4-11.** Request Parameter Type Conversion*


    `def index() {`

    `    // since params.counter is a string, it must be converted to an int if`

    `    // the application intends to use the value as a number`

    `    def counter = params.counter.toInteger()`

    `    // …`

    `}`


    Grails provides convenience methods for doing this type of conversion on request
    parameters. Those methods are available on the `params` object and have names
    that correspond to all eight of the primitive types defined by Java (Boolean,
    byte, char, short, int, long, float, and double). The methods each accept one
    or two arguments. The first argument is the name of the request parameter that
    is to be converted, and the optional second argument is a default value that will
    be returned if a corresponding request parameter cannot be found or if an error
    occurs during the conversion. [Listing 4-12](#Chapter04.html#list_4_12) demonstrates
    using the `int` convenience method.


    ***Listing 4-12.** Using the int Type of Conversion Method*


    `def index() {`

    `    def counter = params.int(''counter'')`

    `    // …`

    `}`


    Another type of converting method is named `list`. The `list` method is useful
    when dealing with multiple request parameters of the same name. The `list` method
    will return a list containing all of the values associated with the specified
    request parameter name, as shown in [Listing 4-13](#Chapter04.html#list_4_13).


    ***Listing 4-13.** Using The list Type Conversion Method*


    `def index() {`

    `    for (name in params.list(''name'') {`

    `        // do something with name`

    `    }`

    `}`


    If a controller action accepts parameters of simple types, including the eight
    primitive types, their corresponding type wrappers, and `java.lang.String`, then
    Grails will automatically attempt the corresponding type of conversion and pass
    the resulting value into the controller action as a method argument. The two controller
    actions defined in [Listing 4-14](#Chapter04.html#list_4_14) accomplish the same
    thing.


    ***Listing 4-14.** Binding Request Parameters to Method Arguments*


    `def firstAction() {`

    `    def counter = params.int(''counter'')`

    `    def name = params.name`

    `    // …`

    `}`

    `def secondAction(int counter, String name) {`

    `    // there is no need to interact with the params object as`

    `    // the request parameters have been bound to the counter`

    `    // and name method arguments`

    `}`


    By default the method argument name will correspond to a request parameter name.
    If for some reason the request parameter and the method argument need to have
    different names, then the `grails.web.RequestParameter` annotation may be used
    to be explicit about which request parameter should be bound to a particular method
    argument, as shown in [Listing 4-15](#Chapter04.html#list_4_15).


    ***Listing 4-15.** The RequestParameter Annotation*


    `import grails.web.RequestParameter`


    `class AdminController {`


    `   // mainNumber will be initialized with the value`

    `   // of params.accountNumber`

    `   // accountType will be initialized with params.int(''accountType'')`

    `   def action(@RequestParameter(''accountNumber'') String mainNumber,`

    `              int accountType) {`

    `       // …`

    `   }`

    `}`


    Whether you are using the `RequestParameter` annotation or associating method
    arguments with request parameters by convention, if a corresponding request parameter
    does not exist or a conversion error occurs for method action arguments, then
    the default value for the corresponding type will be passed in as the argument
    value. For Booleans this is `false`, for all of the other seven primitive types
    this is zero (0), and for all reference types this is `null`. Controllers have
    an `errors` property that may contain errors related to type conversions of request
    parameters. [Listing 4-16](#Chapter04.html#list_4_16) shows how a controller might
    interact with the `errors` property.


    ***Listing 4-16.** A Controller’s errors Property*


    `class AdminController {`


    `  def action(String accountNumber, int accountType) {`

    `   if(accountNumber == null && errors.hasErrors()) {`

    `     def accountNumberError = errors.getFieldError(caccountNumber'')`

    `       if(accountNumberError != null) {`

    `         // accountNumberError is an instance of`

    `         // org.springframework.validation.FieldError`

    `         // ...`

    `      }`

    `    }`

    `  }`

    `}`


    #### Rendering Text


    In its most basic form, you can use the `render` method from a controller to output
    text to the response. [Listing 4-17](#Chapter04.html#list_4_17) demonstrates how
    to render a simple string to the response.


    ***Listing 4-17.** Rendering a Simple String*


    `render ''this text will be rendered back as part of the response''`


    Optionally, you can specify the `contentType`:


    `render text:''<album>Revolver</album>'', contentType:''text/xml''`


    The most common use of the `render` method is to render a GSP view or a GSP template.
    We’ll cover GSP in detail in [Chapter 5](#Chapter05.html).


    #### Redirecting a Request


    Often a controller action will need to redirect control to another controller
    action. This is a common thing for a controller action to do, so Grails provides
    a simple technique to manage redirecting to another controller action.


    Grails provides all controllers with a `redirect` method that accepts a map as
    an argument. The map should contain all the information that Grails needs to carry
    out the redirect, including the name of the action to redirect to. In addition,
    the map can contain the name of the controller to redirect to.


    Specifying the controller is required only if the request is being redirected
    to an action defined in a controller other than the current controller. [Listing
    4-18](#Chapter04.html#list_4_18) shows a standard redirect from the first action
    to the second action within the sample controller.


    ***Listing 4-18.** A Simple Redirect*


    `class SampleController {`

    `  def first() {`

    `    // redirect to the "second" action...`

    `    redirect action: "second"`

    `  }`

    `  def second() {`

    `    // ...`

    `  }`

    `}`


    If the redirect is bound for an action in another controller, you must specify
    the name of the other controller. [Listing 4-19](#Chapter04.html#list_4_19) demonstrates
    how to redirect to an action in another controller.


    ***Listing 4-19.** Redirecting to an Action in Another Controller*


    `class SampleController {`

    `  def first() {`

    `    // redirect to the ''list'' action in the ''store'' controller...`

    `    redirect action: "list", controller: "store"`

    `  }`

    `}`


    Although the previous examples are pretty trivial, the `redirect` method is pretty
    flexible. [Table 4-3](#Chapter04.html#tab_4_3) shows the different arguments that
    the `redirect` method accepts.


    ![Image](images/9781430243779_Tab04-03.jpg)


    As you can see, the `redirect` method allows you to effectively pass control from
    one action to the next. However, often you simply want to formulate some data
    to be rendered by a view. In the next couple of sections, we’ll take a look at
    how to achieve this.'
  trans: '

    #### 请求参数类型转换


    传入的请求参数通常是字符串。如果控制器动作想要接收名为 `counter` 的请求参数，并用它来控制某个操作可执行的次数，代码可能类似于清单 4-11。


    ***清单 4-11.** 请求参数类型转换*


    `def index() {`

    `    // 由于 params.counter 是字符串，如果应用程序打算将该值用作数字，`

    `    // 则必须将其转换为 int 类型`

    `    def counter = params.counter.toInteger()`

    `    // …`

    `}`


    Grails 提供了便捷方法用于对请求参数进行此类类型转换。这些方法可在 `params` 对象上使用，其名称对应于 Java 定义的全部八种基本类型（Boolean、byte、char、short、int、long、float
    和 double）。每个方法接受一个或两个参数。第一个参数是要转换的请求参数名称，可选的第二个参数是默认值，当找不到对应的请求参数或在转换过程中发生错误时，将返回该默认值。清单
    4-12 演示了如何使用 `int` 便捷方法。


    ***清单 4-12.** 使用 int 类型转换方法*


    `def index() {`

    `    def counter = params.int(''counter'')`

    `    // …`

    `}`


    另一种转换方法名为 `list`。当处理多个同名的请求参数时，`list` 方法非常有用。`list` 方法会返回一个列表，其中包含与指定请求参数名称关联的所有值，如清单
    4-13 所示。


    ***清单 4-13.** 使用 list 类型转换方法*


    `def index() {`

    `    for (name in params.list(''name'') {`

    `        // 对 name 执行某些操作`

    `    }`

    `}`


    如果控制器动作接受简单类型的参数，包括八种基本类型、它们对应的包装类型以及 `java.lang.String`，那么 Grails 将自动尝试进行相应的类型转换，并将结果值作为方法参数传入控制器动作。清单
    4-14 中定义的两个控制器动作实现了相同的功能。


    ***清单 4-14.** 将请求参数绑定到方法参数*


    `def firstAction() {`

    `    def counter = params.int(''counter'')`

    `    def name = params.name`

    `    // …`

    `}`

    `def secondAction(int counter, String name) {`

    `    // 无需与 params 对象交互，因为`

    `    // 请求参数已绑定到 counter`

    `    // 和 name 方法参数`

    `}`


    默认情况下，方法参数名称将与请求参数名称对应。如果由于某种原因，请求参数和方法参数需要有不同的名称，则可以使用 `grails.web.RequestParameter`
    注解来明确指定哪个请求参数应绑定到特定的方法参数，如清单 4-15 所示。


    ***清单 4-15.** RequestParameter 注解*


    `import grails.web.RequestParameter`


    `class AdminController {`


    `   // mainNumber 将使用`

    `   // params.accountNumber 的值进行初始化`

    `   // accountType 将使用 params.int(''accountType'') 进行初始化`

    `   def action(@RequestParameter(''accountNumber'') String mainNumber,`

    `              int accountType) {`

    `       // …`

    `   }`

    `}`


    无论你是使用 `RequestParameter` 注解，还是按照约定将方法参数与请求参数关联，如果对应的请求参数不存在，或者方法动作参数发生转换错误，则会传入相应类型的默认值作为参数值。对于
    Boolean 类型，默认值为 `false`；对于其他七种基本类型，默认值为零 (0)；对于所有引用类型，默认值为 `null`。控制器有一个 `errors`
    属性，其中可能包含与请求参数类型转换相关的错误。清单 4-16 展示了控制器如何与 `errors` 属性交互。


    ***清单 4-16.** 控制器的 errors 属性*


    `class AdminController {`


    `  def action(String accountNumber, int accountType) {`

    `   if(accountNumber == null && errors.hasErrors()) {`

    `     def accountNumberError = errors.getFieldError(caccountNumber'')`

    `       if(accountNumberError != null) {`

    `         // accountNumberError 是`

    `         // org.springframework.validation.FieldError 的一个实例`

    `         // ...`

    `      }`

    `    }`

    `  }`

    `}`


    #### 渲染文本


    在最基本的形式中，你可以使用控制器中的 `render` 方法将文本输出到响应中。清单 4-17 演示了如何向响应渲染一个简单的字符串。


    ***清单 4-17.** 渲染一个简单字符串*


    `render ''此文本将作为响应的一部分被渲染返回''`


    你也可以指定 `contentType`：


    `render text:''<album>Revolver</album>'', contentType:''text/xml''`


    `render` 方法最常见的用途是渲染 GSP 视图或 GSP 模板。我们将在第 5 章中详细介绍 GSP。


    #### 重定向请求


    控制器动作通常需要将控制权重定向到另一个控制器动作。这是控制器动作的常见操作，因此 Grails 提供了一种简单的技术来管理重定向到另一个控制器动作。


    Grails 为所有控制器提供了一个 `redirect` 方法，该方法接受一个映射作为参数。该映射应包含 Grails 执行重定向所需的所有信息，包括要重定向到的动作名称。此外，该映射还可以包含要重定向到的控制器名称。


    仅当请求被重定向到当前控制器以外的控制器中定义的动作时，才需要指定控制器。清单 4-18 展示了示例控制器中从第一个动作到第二个动作的标准重定向。


    ***清单 4-18.** 一个简单的重定向*


    `class SampleController {`

    `  def first() {`

    `    // 重定向到 "second" 动作...`

    `    redirect action: "second"`

    `  }`

    `  def second() {`

    `    // ...`

    `  }`

    `}`


    如果重定向的目标是另一个控制器中的动作，则必须指定该控制器的名称。清单 4-19 演示了如何重定向到另一个控制器中的动作。


    ***清单 4-19.** 重定向到另一个控制器中的动作*


    `class SampleController {`

    `  def first() {`

    `    // 重定向到 ''store'' 控制器中的 ''list'' 动作...`

    `    redirect action: "list", controller: "store"`

    `  }`

    `}`


    尽管前面的示例相当简单，但 `redirect` 方法非常灵活。表 4-3 展示了 `redirect` 方法接受的不同参数。


    ![Image](img/9781430243779_Tab04-03.jpg)


    如你所见，`redirect` 方法允许你有效地将控制权从一个动作传递到下一个动作。然而，通常你只是想要整理一些数据以供视图渲染。在接下来的几节中，我们将探讨如何实现这一点。

