- fmt: "# Automated Deployment to Tomcat\n\nWriting a Tomcat deployment script in\
    \ Ant is pretty trivial, thanks to the targets that ship with Tomcat (see [`http://tomcat.apache.org/tomcat-7.0-doc/manager-howto.html`](http://tomcat.apache.org/tomcat-7.0-doc/manager-howto.html)).\
    \ However, before you can start this example, you need to make sure you have Tomcat\
    \ installed and `TOMCAT_HOME` set to the location where you installed it. Then\
    \ run the `grails create-script` command as follows:\n\n```\n$ grails create-script\
    \ tomcat-deploy\n```\n\nWith that done, you should have a `TomcatDeploy.groovy`\
    \ file in the `scripts` directory of your project, as shown in [Figure 11-2](#Chapter11.html#fig_11_2).\n\
    \n![Image](images/9781430243779_Fig11-02.jpg)\n\n**Figure 11-2.** The `TomcatDeploy.groovy`\
    \ script\n\nThe `TomcatDeploy.groovy` script template will look identical to the\
    \ `HelloWorld.groovy` template you saw earlier. To begin with, you’re going to\
    \ need to figure out the path to the Tomcat installation directory. Inspecting\
    \ the `TOMCAT_HOME` environment variable can help you achieve this:\n\n```\ngrailsHome\
    \ = ant.project.properties.\"environment.GRAILS_HOME\"\ntomcatHome = ant.project.properties.\"\
    environment.TOMCAT_HOME\"\n```\n\nWith knowledge of the Tomcat directory in hand,\
    \ the next thing to do is include the `War.groovy` script available in `GRAILS_HOME/scripts`.\
    \ The `_GrailsWar.groovy` template contains targets that allow you to construct\
    \ a valid WAR file:\n\n```\nincludeTargets << grailsScript(\"_GrailsWar\")\n```\n\
    \nTo take advantage of the Tomcat Ant tasks, you have to define them by calling\
    \ the `taskdef` method. This method relates to the `<taskdef>` target of Ant,\
    \ so defining Ant tasks in Gant is pretty much identical to doing so in pure Ant—minus\
    \ the angle brackets:\n\n```\nant.path(id:\"tomcat.lib.path\") {\n   fileset(dir:\"\
    ${tomcatHome}/server/lib\",includes:\"*.jar\")\n}\nant.taskdef(name:\"deploy\"\
    ,\n            classname:\"org.apache.catalina.ant.DeployTask\",\n           \
    \ classpathref:\"tomcat.lib.path\")\n```\n\nAs you can see, the only tricky part\
    \ is ensuring that all the JAR files for the `DeployTask` class are placed onto\
    \ the classpath appropriately using the JAR files available in your Tomcat installation\
    \ directory. This is done using the `classpathref` named argument and a predefined\
    \ Ant path called `tomcat.lib.path`.\n\nMoving onto the `main` target of the `TomcatDeploy.groovy`\
    \ script, you can change it to depend on the `war` target, which will ensure a\
    \ valid WAR file is constructed before the rest of the code runs:\n\n```\ntarget(main:\
    \ \"Deploys the Grails application to Tomcat\") {\n    depends war\n    ...\n\
    }\n```\n\nOnce that is done, you need to establish the destination to publish\
    \ the WAR to. You could, for example, accept the destination as the first argument\
    \ to the command and otherwise default to `localhost`:\n\n```\ndef dest = argsMap.params\
    \ ? argsMap.params[0] : \"http://localhost:8080/manager\"\n```\n\nOnce that is\
    \ done, the rest is left to the `deploy` target supplied by the `org.apache.catalina.ant.DeployTask`\
    \ class:\n\n```\ndeploy(war:warName, url:dest,\npath:serverContextPath, username:\"\
    deployer\", password:\"secret\")\n```\n\nThe `warName` and `serverContextPath`\
    \ variables are set up by the `War.groovy` script, which you can reuse here. The\
    \ deploy target also requires that you pass `username` and `password` arguments\
    \ whenever deploying to Tomcat. Given that you have a running instance of Tomcat\
    \ locally, if you run the `tomcat-deploy` target now, you’ll probably get a 401\
    \ error such as the following:\n\n```\njava.io.IOException: Server returned HTTP\
    \ response code: 401 for URL: http://localhost:8080/\nmanager/deploy?path=%2FgTunes\n\
    ```\n\nThe reason is that currently Tomcat doesn’t have a user called `deployer`\
    \ with a password of `secret` registered with it. To do so, you need to edit the\
    \ `TOMCAT_HOME/conf/tomcat-users.xml` file and add a user who has access to the\
    \ Tomcat `manager` application, as shown in [Listing 11-27](#Chapter11.html#list_11_27).\n\
    \n**Listing 11-27.** Adding a Tomcat Deployer\n\n```\n<?xml version='1.0' encoding='utf-8'?>\n\
    <tomcat-users>\n   ...\n   <user username=\"deployer\" password=\"secret\" roles=\"\
    standard,manager\"/>\n</tomcat-users>\n```\n\nOnce you have added the necessary\
    \ Tomcat user, when you run the `tomcat-deploy` script, Grails will successfully\
    \ deploy your application to Tomcat, as demonstrated in [Listing 11-28](#Chapter11.html#list_11_28).\n\
    \n**Listing 11-28.** Deploying to Tomcat\n\n```\n$ grails tomcat-deploy ...\n\
    Done creating WAR /Developer/grails-dev/book/dgg/code/ch12/gTunes-0.1.war [deploy]\
    \ OK - Deployed\napplication at context path /gTunes\n```\n\nYou can, of course,\
    \ take this further and write another `tomcat-undeploy` script or even combine\
    \ them into two scripts. Nevertheless, [Listing 11-29](#Chapter11.html#list_11_29)\
    \ shows the full code for the `TomcatDeploy.groovy` scripts.\n\n**Listing 11-29.**\
    \ The `TomcatDeploy.groovy` Script\n\n```\ngrailsHome = ant.project.properties.\"\
    environment.GRAILS_HOME\"\ntomcatHome = ant.project.properties.\"environment.TOMCAT_HOME\"\
    \n\nincludeTargets << grailsScript(\"War\")\n\nant.path(id:\"tomcat.lib.path\"\
    ) {\n    fileset(dir:\"${tomcatHome}/server/lib\",includes:\"*.jar\")\n}\nant.taskdef(name:\"\
    deploy\",\n                   classname:\"org.apache.catalina.ant.DeployTask\"\
    ,\n                   classpathref:\"tomcat.lib.path\")\ntarget(main: \"Deploys\
    \ the Grails application to Tomcat\") {\n    depends(parseArguments, war)\n  \
    \  def dest = argsMap.params ? argsMap.params[0] : \"http://localhost:8080/manager\"\
    \n\n    deploy(war:warName,\n           url:dest,\n           path:serverContextPath,\n\
    \           username:\"deployer\",\n           password:\"secret\")\n}\nsetDefaultTarget(main)\n\
    ```"
  raw: '##### Automated Deployment to Tomcat


    Writing a Tomcat deployment script in Ant is pretty trivial, thanks to the targets
    that ship with Tomcat (see [`http://tomcat.apache.org/tomcat-7.0-doc/manager-howto.html`](http://tomcat.apache.org/tomcat-7.0-doc/manager-howto.html)).
    However, before you can start this example, you need to make sure you have Tomcat
    installed and `TOMCAT_HOME` set to the location where you installed it. Then run
    the `grails create-script` command as follows:


    `$ grails create-script tomcat-deploy`


    With that done, you should have a `TomcatDeploy.groovy` file in the `scripts`
    directory of your project, as shown in [Figure 11-2](#Chapter11.html#fig_11_2).


    ![Image](images/9781430243779_Fig11-02.jpg)


    ***Figure 11-2.** The TomcatDeploy.groovy script*


    The `TomcatDeploy.groovy` script template will look identical to the `HelloWorld.groovy`
    template you saw earlier. To begin with, you’re going to need to figure out the
    path to the Tomcat installation directory. Inspecting the `TOMCAT_HOME` environment
    variable can help you achieve this:


    `grailsHome = ant.project.properties."environment.GRAILS_HOME"`

    `tomcatHome = ant.project.properties."environment.TOMCAT_HOME"`


    With knowledge of the Tomcat directory in hand, the next thing to do is include
    the `War.groovy` script available in `GRAILS_HOME/scripts`. The `_GrailsWar.groovy`
    template contains targets that allow you to construct a valid WAR file:


    `includeTargets << grailsScript("_GrailsWar")`


    To take advantage of the Tomcat Ant tasks, you have to define them by calling
    the `taskdef` method. This method relates to the `<taskdef>` target of Ant, so
    defining Ant tasks in Gant is pretty much identical to doing so in pure Ant—minus
    the angle brackets:


    `ant.path(id:"tomcat.lib.path") {`

    `   fileset(dir:"${tomcatHome}/server/lib",includes:"*.jar")`

    `}`

    `ant.taskdef(name:"deploy",`

    `            classname:"org.apache.catalina.ant.DeployTask",`

    `            classpathref:"tomcat.lib.path")`


    As you can see, the only tricky part is ensuring that all the JAR files for the
    `DeployTask` class are placed onto the classpath appropriately using the JAR files
    available in your Tomcat installation directory. This is done using the `classpathref`
    named argument and a predefined Ant path called `tomcat.lib.path`.


    Moving onto the `main` target of the `TomcatDeploy.groovy` script, you can change
    it to depend on the `war` target, which will ensure a valid WAR file is constructed
    before the rest of the code runs:


    `target(main: "Deploys the Grails application to Tomcat") {`

    `    depends war`

    `    ...`

    `}`


    Once that is done, you need to establish the destination to publish the WAR to.
    You could, for example, accept the destination as the first argument to the command
    and otherwise default to `localhost`:


    `def dest = argsMap.params ? argsMap.params[0] : "http://localhost:8080/manager"`


    Once that is done, the rest is left to the `deploy` target supplied by the `org.apache.cat-alina.ant.DeployTask`
    class:


    `deploy(war:warName, url:dest,`

    `path:serverContextPath, username:"deployer", password:"secret")`


    The `warName` and `serverContextPath` variables are set up by the `War.groovy`
    script, which you can reuse here. The deploy target also requires that you pass
    `username` and `password` arguments whenever deploying to Tomcat. Given that you
    have a running instance of Tomcat locally, if you run the `tomcat-deploy` target
    now, you’ll probably get a 401 error such as the following:


    `java.io.IOException: Server returned HTTP response code: 401 for URL: http://localhost:8080/`

    `manager/deploy?path=%2FgTunes`


    The reason is that currently Tomcat doesn’t have a user called `deployer` with
    a password of `secret` registered with it. To do so, you need to edit the `TOMCAT_HOME/conf/tomcat-users.xml`
    file and add a user who has access to the Tomcat `manager` application, as shown
    in [Listing 11-27](#Chapter11.html#list_11_27).


    ***Listing 11-27.** Adding a Tomcat Deployer*


    `<?xml version=''1.0'' encoding=''utf-8''?>`

    `<tomcat-users>`

    `   ...`

    `   <user username="deployer" password="secret" roles="standard,manager"/>`

    `</tomcat-users>`


    Once you have added the necessary Tomcat user, when you run the `tomcat-deploy`
    script, Grails will successfully deploy your application to Tomcat, as demonstrated
    in [Listing 11-28](#Chapter11.html#list_11_28).


    ***Listing 11-28.** Deploying to Tomcat*


    `$ grails tomcat-deploy ...`

    `Done creating WAR /Developer/grails-dev/book/dgg/code/ch12/gTunes-0.1.war [deploy]
    OK - Deployed`

    `application at context path /gTunes`


    You can, of course, take this further and write another `tomcat-undeploy` script
    or even combine them into two scripts. Nevertheless, [Listing 11-29](#Chapter11.html#list_11_29)
    shows the full code for the `TomcatDeploy.groovy` scripts.


    ***Listing 11-29.** The TomcatDeploy.groovy Script*


    `grailsHome = ant.project.properties."environment.GRAILS_HOME"`

    `tomcatHome = ant.project.properties."environment.TOMCAT_HOME"`


    `includeTargets << grailsScript("War")`


    `ant.path(id:"tomcat.lib.path") {`

    `    fileset(dir:"${tomcatHome}/server/lib",includes:"*.jar")`

    `}`

    `ant.taskdef(name:"deploy",`

    `                   classname:"org.apache.catalina.ant.DeployTask",`

    `                   classpathref:"tomcat.lib.path")`

    `target(main: "Deploys the Grails application to Tomcat") {`

    `    depends(parseArguments, war)`

    `    def dest = argsMap.params ? argsMap.params[0] : "http://localhost:8080/manager"`


    `    deploy(war:warName,`

    `           url:dest,`

    `           path:serverContextPath,`

    `           username:"deployer",`

    `           password:"secret")`

    `}`

    `setDefaultTarget(main)`'
