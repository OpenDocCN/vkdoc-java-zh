- fmt: "### Applying Constraints to URL Mappings\n\nThe URL mapping engine provides\
    \ a really powerful mechanism for applying constraints to variables embedded in\
    \ a URL mapping. The constraints are similar those applied to domain objects.\
    \ See the “Validating Domain Classes” section in [Chapter 3](#Chapter03.html)\
    \ for information about domain constraints. Applying constraints to variables\
    \ in a URL mapping can greatly simplify the job of weeding out certain kinds of\
    \ invalid data that would otherwise have to be dealt with in an imperative manner\
    \ in a controller or service.\n\nConsider a blogging application written in Grails.\
    \ A typical format for a URL in a blogging system might be something like `/grailsblogs/2009/01/15/new_grails_release`.\
    \ To support a URL like that, you might define a mapping as is done in [Listing\
    \ 6-12](#Chapter06.html#list_6_12).\n\n***Listing 6-12.** A Typical Blog-Type\
    \ URL Mapping*\n\n```\nclass UrlMappings {\n    static mappings = {\n        \"\
    /grailsblogs/$year/$month/$day/$entry_name?\" {\n            controller = 'blog'\n\
    \            action = 'display'\n            constraints {\n                //\
    \ apply constraints here\n            }\n        }\n        // ...\n    }\n}\n\
    ```\n\nWith such a mapping in place, the URL `/grailsblogs/2009/01/15/new_grails_release`\
    \ would map to the `display` action in the `BlogController` with request parameters\
    \ named `year`, `month`, `day`, and `entry_name` and the values `2009`, `01`,\
    \ `15`, and `new_grails_release`, respectively.\n\nA problem with this mapping\
    \ is that it will match not only a URL such as `/grailsblogs/2009/01/15/new_grails_release`\
    \ but also a URL such as `/grailsblogs/grails/rocks/big/time`. In this case, the\
    \ controller action would receive the value `grails` for the `year`, `rocks` for\
    \ the `month`, and so on. Dealing with a scenario like this would complicate the\
    \ logic in the controller. A better way to manage it is to apply constraints to\
    \ the mapping that would let the framework know that `grails` is not a valid match\
    \ for the `year` parameter in the mapping, for example. The constraints specified\
    \ in [Listing 6-13](#Chapter06.html#list_6_13) use regular expressions to limit\
    \ the `year`, `month`, and `day` parameters to match only those values that include\
    \ the right number of digits and only digits.\n\n***Listing 6-13.** Applying Constraints\
    \ to Mapping Parameters*\n\n```\nclass UrlMappings {\n    static mappings = {\n\
    \        \"/grailsblogs/$year/$month/$day/$entry_name?\" {\n            controller\
    \ = 'blog'\n            action = 'display'\n            constraints {\n      \
    \          year matches: /[0-9]{4}/\n                month matches: /[0-9]{2}/\n\
    \                day matches: /[0-9]{2}/\n            }\n        }\n\n       \
    \ // ...\n    }\n}\n```\n\nAs is the case with domain-class constraints, mapping\
    \ parameters may have as many constraints applied to them as necessary. All the\
    \ constraints must pass in order for the mapping to apply.\n\n![Image](images/square.jpg)\
    \ **Note** There is a small syntactical difference between the way constraints\
    \ are specified in a URL mapping and how they are specified in a domain class.\
    \ In a domain class, a `constraints` property is defined and assigned a value\
    \ that is a closure. In a URL mapping, you are calling a method named `constraints`\
    \ and passing a closure as an argument. This is why no equals sign is needed between\
    \ `constraints` and the closure in a URL mapping but is needed between `constraints`\
    \ and the closure in a domain class.\n\n### Including Wildcards in a Mapping\n\
    \nYou’ve seen how a mapping may contain static text as well as any number of variable\
    \ parameters (optional and required), and you’ve also seen how constraints may\
    \ be applied to variable parameters. One more aid to flexibility that you can\
    \ use in a mapping definition is a wildcard. Wildcards represent placeholders\
    \ in a mapping pattern that may be matched by anything but do not represent information\
    \ that will be passed as request parameters. Wildcards in a mapping definition\
    \ are represented by an asterisk (`*`). [Listing 6-14](#Chapter06.html#list_6_14)\
    \ includes a mapping with a wildcard in it.\n\n***Listing 6-14.** A Wildcard in\
    \ a Mapping*\n\n```\nclass UrlMappings {\n    static mappings = {\n        \"\
    /images/*.jpg\"(controller:'image')\n\n        // ...\n    }\n}\n```\n\nThis mapping\
    \ will handle any request for a file under the `/images/` directory that ends\
    \ with the `.jpg` extension. For example, this mapping will handle `/images/header.jpg`\
    \ and `/images/footer.jpg`, but it will not match requests for `.jpg` files that\
    \ may exist in some subdirectory under the `/images/` directory. For example,\
    \ a request for something like `/images/photos/president.jpg` would not match.\
    \ A double wildcard can be used to match any number of subdirectories. [Listing\
    \ 6-15](#Chapter06.html#list_6_15) shows a double wildcard mapping.\n\n***Listing\
    \ 6-15.** A Double Wildcard in a Mapping*\n\n```\nclass UrlMappings {\n    static\
    \ mappings = {\n        \"/images/**.jpg\"(controller:'image')\n        // ...\n\
    \    }\n}\n```\n\nThis mapping will match requests for things such as `/images/header.jpg`\
    \ and `/images/footer.jpg` as well as things such as `/images/photos/president.jpg`.\n\
    \nFor some situations, it may be desirable for the value that matched the wildcard\
    \ to be passed to the controller as a request parameter. This is achieved by prepending\
    \ a variable to the wildcard in the mapping. See [Listing 6-16](#Chapter06.html#list_6_16).\n\
    \n***Listing 6-16.** A Double Wildcard with a Variable in a Mapping*\n\n```\n\
    class UrlMappings {\n    static mappings = {\n        \"/images/$pathToFile**.jpg\"\
    (controller:'image')\n        // ...\n    }\n}\n```\n\nIn this case, the `pathToFile`\
    \ request parameter would represent the part of the URL that matched the wildcard.\
    \ For example, a request for `/images/photos/president.jpg` would result in the\
    \ `pathToFile` request parameter having a value of `photos/president`."
  raw: '### Applying Constraints to URL Mappings


    The URL mapping engine provides a really powerful mechanism for applying constraints
    to variables embedded in a URL mapping. The constraints are similar those applied
    to domain objects. See the “Validating Domain Classes” section in [Chapter 3](#Chapter03.html)
    for information about domain constraints. Applying constraints to variables in
    a URL mapping can greatly simplify the job of weeding out certain kinds of invalid
    data that would otherwise have to be dealt with in an imperative manner in a controller
    or service.


    Consider a blogging application written in Grails. A typical format for a URL
    in a blogging system might be something like `/grailsblogs/2009/01/15/new_grails_release`.
    To support a URL like that, you might define a mapping as is done in [Listing
    6-12](#Chapter06.html#list_6_12).


    ***Listing 6-12.** A Typical Blog-Type URL Mapping*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/grailsblogs/$year/$month/$day/$entry_name?" {`

    `            controller = ''blog''`

    `            action = ''display''`

    `            constraints {`

    `                // apply constraints here`

    `            }`

    `        }`

    `        // ...`

    `    }`

    `}`


    With such a mapping in place, the URL `/grailsblogs/2009/01/15/new_grails_release`
    would map to the `display` action in the `BlogController` with request parameters
    named `year`, `month`, `day`, and `entry_name` and the values `2009`, `01`, `15`,
    and `new_grails_release`, respectively.


    A problem with this mapping is that it will match not only a URL such as `/grailsblogs/2009/01/15/new_grails_release`
    but also a URL such as `/grailsblogs/grails/rocks/big/time`. In this case, the
    controller action would receive the value `grails` for the year, `rocks` for the
    month, and so on. Dealing with a scenario like this would complicate the logic
    in the controller. A better way to manage it is to apply constraints to the mapping
    that would let the framework know that `grails` is not a valid match for the `year`
    parameter in the mapping, for example. The constraints specified in [Listing 6-13](#Chapter06.html#list_6_13)
    use regular expressions to limit the `year`, `month`, and `day` parameters to
    match only those values that include the right number of digits and only digits.


    ***Listing 6-13.** Applying Constraints to Mapping Parameters*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/grailsblogs/$year/$month/$day/$entry_name?" {`

    `            controller = ''blog''`

    `            action = ''display''`

    `            constraints {`

    `                year matches: /[0-9]{4}/`

    `                month matches: /[0-9]{2}/`

    `                day matches: /[0-9]{2}/`

    `            }`

    `        }`


    `        // ...`

    `    }`

    `}`


    As is the case with domain-class constraints, mapping parameters may have as many
    constraints applied to them as necessary. All the constraints must pass in order
    for the mapping to apply.


    ![Image](images/square.jpg) **Note**  There is a small syntactical difference
    between the way constraints are specified in a URL mapping and how they are specified
    in a domain class. In a domain class, a constraints property is defined and assigned
    a value that is a closure. In a URL mapping, you are calling a method named constraints
    and passing a closure as an argument. This is why no equals sign is needed between
    constraints and the closure in a URL mapping but is needed between constraints
    and the closure in a domain class.


    #### Including Wildcards in a Mapping


    You’ve seen how a mapping may contain static text as well as any number of variable
    parameters (optional and required), and you’ve also seen how constraints may be
    applied to variable parameters. One more aid to flexibility that you can use in
    a mapping definition is a wildcard. Wildcards represent placeholders in a mapping
    pattern that may be matched by anything but do not represent information that
    will be passed as request parameters. Wildcards in a mapping definition are represented
    by an asterisk (*). [Listing 6-14](#Chapter06.html#list_6_14) includes a mapping
    with a wildcard in it.


    ***Listing 6-14.** A Wildcard in a Mapping*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/images/*.jpg"(controller:''image'')`


    `        // ...`

    `    }`

    `}`


    This mapping will handle any request for a file under the `/images/` directory
    that ends with the `.jpg` extension. For example, this mapping will handle `/images/header.jpg`
    and `/images/ footer.jpg`, but it will not match requests for `.jpg` files that
    may exist in some subdirectory under the `/images/` directory. For example, a
    request for something like `/images/photos/president.jpg` would not match. A double
    wildcard can be used to match any number of subdirectories. [Listing 6-15](#Chapter06.html#list_6_15)
    shows a double wildcard mapping.


    ***Listing 6-15.** A Double Wildcard in a Mapping*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/images/**.jpg"(controller:''image'')`

    `        // ...`

    `    }`

    `}`


    This mapping will match requests for things such as `/images/header.jpg` and `/images/footer.jpg`
    as well as things such as `/images/photos/president.jpg`.


    For some situations, it may be desirable for the value that matched the wildcard
    to be passed to the controller as a request parameter. This is achieved by prepending
    a variable to the wildcard in the mapping. See [Listing 6-16](#Chapter06.html#list_6_16).


    ***Listing 6-16.** A Double Wildcard with a Variable in a Mapping*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/images/$pathToFile**.jpg"(controller:''image'')`

    `        // ...`

    `    }`

    `}`


    In this case, the `pathToFile` request parameter would represent the part of the
    URL that matched the wildcard. For example, a request for `/images/photos/president.jpg`
    would result in the `pathToFile` request parameter having a value of `photos/president`.'
