- fmt: "#### Implementing an Imperative Solution\n\nOne approach to dealing with this\
    \ concern is for a controller action to inspect the request method and prevent\
    \ certain actions from being carried out in response to an inappropriate HTTP\
    \ request method. [Listing 4-33](#Chapter04.html#list_4_33) shows a simple imperative\
    \ approach to the problem.\n\n***Listing 4-33.** Inspecting the HTTP Request Method\
    \ in a Controller Action*\n\n```\nclass SongController {\n  def delete() {\n \
    \   if(request.method == \"GET\") {\n      // do not delete in response to a GET\
    \ request\n      // redirect to the list action\n      redirect action: \"list\"\
    \n    } else {\n      // carry out the delete here...\n    }\n  }\n}\n```\n\n\
    While this approach is fairly straightforward and does get the job done, it’s\
    \ a tedious solution to the problem. In a real-world application, this same logic\
    \ would appear in many controller actions.\n\n#### Taking Advantage of a Declarative\
    \ Syntax\n\nA better solution to limiting actions to certain HTTP request methods\
    \ is to take advantage of a simple declarative syntax that expresses which HTTP\
    \ request methods are valid for a particular controller action. Grails supports\
    \ an approach like this through the optional `allowedMethods` property in a controller.\n\
    \nThe `allowedMethods` property expresses which HTTP request methods are valid\
    \ for any particular controller action. By default, all HTTP request methods are\
    \ considered valid for any particular controller action. If you want an action\
    \ to be accessible through specific request methods only, then you should include\
    \ the action in the `allowedMethods` property.\n\nYou should assign the `allowedMethods`\
    \ property a value that is a map. The keys in the map should be the names of actions\
    \ that you want restricted. The value(s) associated with the keys should be a\
    \ string representing a specific request method or a list of strings representing\
    \ all allowed methods for that particular action. [Listing 4-34](#Chapter04.html#list_4_34)\
    \ shows an example.\n\n***Listing 4-34.** Restricting Access to Controller Actions\
    \ Using the allowedMethods Property*\n\n```\nclass SomeController {\n    // action1\
    \ may be invoked via a POST\n    // action2 has no restrictions\n    // action3\
    \ may be invoked via a POST or DELETE\n    static allowedMethods = [action1: 'POST',\
    \ action3: ['POST', 'DELETE']]\n    def action1() { ... }\n    def action2() {\
    \ ... }\n    def action3() { ... }\n}\n```\n\nIf the rules expressed in the `allowedMethods`\
    \ property are violated, the framework will deny the request and return a 405\
    \ error code, which the HTTP specification defines as “Method Not Allowed.”\n\n\
    ### Controller IO\n\nAs you’ve learned so far, controllers can control request\
    \ flow through redirects and rendering views. In addition to this, controllers\
    \ might need to read and write binary input to and from the client. In this section,\
    \ we’ll look at how to read data, including file uploads, and how to write binary\
    \ responses to the client.\n\n#### Handling File Uploads\n\nOne of the more common\
    \ use cases when developing web applications is to allow the user to upload a\
    \ local file to the server using a multipart request. This is where the solid\
    \ Grails foundation of Spring MVC starts to shine through.\n\nSpring has excellent\
    \ support for handling file uploads via an extension to the servlet API’s `HttpServletRequest`\
    \ interface called `org.springframework.web.multipart.MultipartHttpServletRequest`,\
    \ the definition of which is in [Listing 4-35](#Chapter04.html#list_4_35).\n\n\
    ***Listing 4-35.** The org.springframework.web.multipart.MultipartHttpServletRequest\
    \ Interface*\n\n```\ninterface MultipartHttpServletRequest extends HttpServletRequest\
    \ {\n         public MultipartFile getFile(String name);\n         public Map\
    \ getFileMap();\n         public Iterator getFileNames();\n}\n```\n\nAs you can\
    \ see, the `MultipartHttpServletRequest` interface simply extends the default\
    \ `HttpServletRequest` interface to provide useful methods to work with files\
    \ in the request.\n\n###### Working with Multipart Requests\n\nEssentially, whenever\
    \ a multipart request is detected, a request object that implements the `MultipartHttpServletRequest`\
    \ interface is present in the controller instance. This provides access to the\
    \ methods seen in [Listing 4-35](#Chapter04.html#list_4_35) to access files uploaded\
    \ in a multipart request. [Listing 4-36](#Chapter04.html#list_4_36) also shows\
    \ how you can define a multipart form using the `<g:uploadForm>` tag.\n\n***Listing\
    \ 4-36.** An Example Upload Form*\n\n```\n<g:uploadForm action=\"upload\">\n \
    \     <input type=\"file\" name=\"myFile\" />\n      <input type=\"submit\" value=\"\
    Upload! \" />\n</g:uploadForm>\n```\n\nThe important bits are highlighted in bold,\
    \ but an upload form essentially requires two things:\n\n> *   A `<form>` tag\
    \ with the `enctype` attribute set to the value `multipart/form-data`. The `<g:uploadForm>`\
    \ in [Listing 4-36](#Chapter04.html#list_4_36) does this for you automatically.\n\
    > *   An `<input>` tag whose `type` attribute is set to the value `file`.\n\n\
    In the previous case, the name of the file input is `myFile`; this is crucial\
    \ because it’s the named reference that you work with when using the `getFile`\
    \ method of the `MultipartHttpServletRequest` interface. For example, the code\
    \ within an `upload` action will retrieve the uploaded file from the request (see\
    \ [Listing 4-37](#Chapter04.html#list_4_37)).\n\n***Listing 4-37.** Retrieving\
    \ the Uploaded File*\n\n```\ndef upload() {\n    def file = request.getFile('myFile')\n\
    \    // do something with the file\n}\n```\n\nNote that the `getFile` method does\
    \ not return a `java.io.File`. Instead, it returns an instance of `org.springframework.web.multipart.MultipartFile`,\
    \ the interface detailed in [Listing 4-38](#Chapter04.html#list_4_38). If the\
    \ file is not found in the request, the `getFile` method will return `null`.\n\
    \n***Listing 4-38.** The org.springframework.web.multipart.MultipartFile Interface*\n\
    \n```\ninterface MultipartFile {\n    public byte[] getBytes();\n    public String\
    \ getContentType();\n    public java.io.InputStream getInputStream();\n    public\
    \ String getName();\n    public String getOriginalFilename();\n    public long\
    \ getSize();\n    public boolean isEmpty();\n    public void transferTo(java.io.File\
    \ dest);\n}\n```\n\nMany useful methods are defined in the `MultipartFile` interface.\
    \ Potential use cases include the following:\n\n> *   Use the `getSize()` method\
    \ to allow uploads only of certain file sizes.\n> *   Reject empty files using\
    \ the `isEmpty()` method.\n> *   Read the file as a `Java.io.InputStream` using\
    \ the `getInputStream()` method.\n> *   Allow only certain file types to be uploaded\
    \ using the `getContentType()` method.\n> *   Transfer the file onto the server\
    \ using the `transferTo(dest)` method.\n\nAs an example, the code in [Listing\
    \ 4-39](#Chapter04.html#list_4_39) will upload a file to the server if it’s not\
    \ empty and if it’s fewer than 1,024 bytes in size.\n\n***Listing 4-39.** File\
    \ Uploads in Action*\n\n```\ndef upload() {\n    def file = request.getFile('myFile')\n\
    \    if(file && !file.empty && file.size < 1024)  {\n        file.transferTo(\
    \ new File( \"/local/server/path/${file.name}\" ) )\n    }\n}\n```\n\nWorking\
    \ directly with a `MultipartHttpServletRequest` instance is one way to manage\
    \ file uploads, but frequently you need to read the contents of a file. In the\
    \ next section, we’ll look at how Grails makes this easier through data binding."
  raw: '#### Implementing an Imperative Solution


    One approach to dealing with this concern is for a controller action to inspect
    the request method and prevent certain actions from being carried out in response
    to an inappropriate HTTP request method. [Listing 4-33](#Chapter04.html#list_4_33)
    shows a simple imperative approach to the problem.


    ***Listing 4-33.** Inspecting the HTTP Request Method in a Controller Action*


    `class SongController {`

    `  def delete() {`

    `    if(request.method == "GET") {`

    `      // do not delete in response to a GET request`

    `      // redirect to the list action`

    `      redirect action: "list"`

    `    } else {`

    `      // carry out the delete here...`

    `    }`

    `  }`

    `}`


    While this approach is fairly straightforward and does get the job done, it’s
    a tedious solution to the problem. In a real-world application, this same logic
    would appear in many controller actions.


    #### Taking Advantage of a Declarative Syntax


    A better solution to limiting actions to certain HTTP request methods is to take
    advantage of a simple declarative syntax that expresses which HTTP request methods
    are valid for a particular controller action. Grails supports an approach like
    this through the optional `allowedMethods` property in a controller.


    The `allowedMethods` property expresses which HTTP request methods are valid for
    any particular controller action. By default, all HTTP request methods are considered
    valid for any particular controller action. If you want an action to be accessible
    through specific request methods only, then you should include the action in the
    `allowedMethods` property.


    You should assign the `allowedMethods` property a value that is a map. The keys
    in the map should be the names of actions that you want restricted. The value(s)
    associated with the keys should be a string representing a specific request method
    or a list of strings representing all allowed methods for that particular action.
    [Listing 4-34](#Chapter04.html#list_4_34) shows an example.


    ***Listing 4-34.** Restricting Access to Controller Actions Using the allowedMethods
    Property*


    `class SomeController {`

    `    // action1 may be invoked via a POST`

    `    // action2 has no restrictions`

    `    // action3 may be invoked via a POST or DELETE`

    `    static allowedMethods = [action1: ''POST'', action3: [''POST'', ''DELETE'']]`

    `    def action1() { ... }`

    `    def action2() { ... }`

    `    def action3() { ... }`

    `}`


    If the rules expressed in the `allowedMethods` property are violated, the framework
    will deny the request and return a 405 error code, which the HTTP specification
    defines as “Method Not Allowed.”


    ### Controller IO


    As you’ve learned so far, controllers can control request flow through redirects
    and rendering views. In addition to this, controllers might need to read and write
    binary input to and from the client. In this section, we’ll look at how to read
    data, including file uploads, and how to write binary responses to the client.


    #### Handling File Uploads


    One of the more common use cases when developing web applications is to allow
    the user to upload a local file to the server using a multipart request. This
    is where the solid Grails foundation of Spring MVC starts to shine through.


    Spring has excellent support for handling file uploads via an extension to the
    servlet API’s `HttpServletRequest` interface called `org.springframework.web.multipart.MultipartHttpServletRequest`,
    the definition of which is in [Listing 4-35](#Chapter04.html#list_4_35).


    ***Listing 4-35.** The org.springframework.web.multipart.MultipartHttpServletRequest
    Interface*


    `interface MultipartHttpServletRequest extends HttpServletRequest {`

    `         public MultipartFile getFile(String name);`

    `         public Map getFileMap();`

    `         public Iterator getFileNames();`

    `}`


    As you can see, the `MultipartHttpServletRequest` interface simply extends the
    default `HttpServletRequest` interface to provide useful methods to work with
    files in the request.


    ###### Working with Multipart Requests


    Essentially, whenever a multipart request is detected, a request object that implements
    the `MultipartHttpServletRequest` interface is present in the controller instance.
    This provides access to the methods seen in [Listing 4-35](#Chapter04.html#list_4_35)
    to access files uploaded in a multipart request. [Listing 4-36](#Chapter04.html#list_4_36)
    also shows how you can define a multipart form using the `<g:uploadForm>` tag.


    ***Listing 4-36.** An Example Upload Form*


    `<g:uploadForm action="upload">`

    `      <input type="file" name="myFile" />`

    `      <input type="submit" value="Upload! " />`

    `</g:uploadForm>`


    The important bits are highlighted in bold, but an upload form essentially requires
    two things:


    > *   A `<form>` tag with the `enctype` attribute set to the value `multipart/form-data`.
    The `<g:uploadForm>` in [Listing 4-36](#Chapter04.html#list_4_36) does this for
    you automatically.

    > *   An `<input>` tag whose `type` attribute is set to the value `file`.


    In the previous case, the name of the file input is `myFile`; this is crucial
    because it’s the named reference that you work with when using the `getFile` method
    of the `MultipartHttpServletRequest` interface. For example, the code within an
    `upload` action will retrieve the uploaded file from the request (see [Listing
    4-37](#Chapter04.html#list_4_37)).


    ***Listing 4-37.** Retrieving the Uploaded File*


    `def upload() {`

    `    def file = request.getFile(''myFile'')`

    `    // do something with the file`

    `}`


    Note that the `getFile` method does not return a `java.io.File`. Instead, it returns
    an instance of `org.springframework.web.multipart.MultipartFile`, the interface
    detailed in [Listing 4-38](#Chapter04.html#list_4_38). If the file is not found
    in the request, the `getFile` method will return `null`.


    ***Listing 4-38.** The org.springframework.web.multipart.MultipartFile Interface*


    `interface MultipartFile {`

    `    public byte[] getBytes();`

    `    public String getContentType();`

    `    public java.io.InputStream getInputStream();`

    `    public String getName();`

    `    public String getOriginalFilename();`

    `    public long getSize();`

    `    public boolean isEmpty();`

    `    public void transferTo(java.io.File dest);`

    `}`


    Many useful methods are defined in the `MultipartFile` interface. Potential use
    cases include the following:


    > *   Use the `getSize()` method to allow uploads only of certain file sizes.

    > *   Reject empty files using the `isEmpty()` method.

    > *   Read the file as a `Java.io.InputStream` using the `getInputStream()` method.

    > *   Allow only certain file types to be uploaded using the `getContentType()`
    method.

    > *   Transfer the file onto the server using the `transferTo(dest)` method.


    As an example, the code in [Listing 4-39](#Chapter04.html#list_4_39) will upload
    a file to the server if it’s not empty and if it’s fewer than 1,024 bytes in size.


    ***Listing 4-39.** File Uploads in Action*


    `def upload() {`

    `    def file = request.getFile(''myFile'')`

    `    if(file && !file.empty && file.size < 1024)  {`

    `        file.transferTo( new File( "/local/server/path/${file.name}" ) )`

    `    }`

    `}`


    Working directly with a `MultipartHttpServletRequest` instance is one way to manage
    file uploads, but frequently you need to read the contents of a file. In the next
    section, we’ll look at how Grails makes this easier through data binding.'
  trans: '

    #### 实现命令式解决方案


    处理此问题的一种方法是让控制器动作检查请求方法，并阻止针对不恰当的 HTTP 请求方法执行某些操作。代码清单 4-33 展示了一个简单的命令式解决方案。


    ***代码清单 4-33.** 在控制器动作中检查 HTTP 请求方法*


    `class SongController {`

    `  def delete() {`

    `    if(request.method == "GET") {`

    `      // 不要响应 GET 请求执行删除操作`

    `      // 重定向到列表动作`

    `      redirect action: "list"`

    `    } else {`

    `      // 在此处执行删除操作...`

    `    }`

    `  }`

    `}`


    虽然这种方法相当直接且能完成任务，但它是一个繁琐的解决方案。在实际应用中，同样的逻辑会出现在许多控制器动作中。


    #### 利用声明式语法


    将动作限制为特定 HTTP 请求方法的更好解决方案是利用一种简单的声明式语法，该语法表达了哪些 HTTP 请求方法对特定控制器动作是有效的。Grails 通过控制器中可选的
    `allowedMethods` 属性支持这种方法。


    `allowedMethods` 属性表达了哪些 HTTP 请求方法对任何特定控制器动作是有效的。默认情况下，所有 HTTP 请求方法都被视为对任何特定控制器动作有效。如果你希望某个动作只能通过特定的请求方法访问，那么你应该将该动作包含在
    `allowedMethods` 属性中。


    你应该为 `allowedMethods` 属性赋予一个映射值。映射中的键应该是你想要限制的动作名称。与键关联的值应该是一个表示特定请求方法的字符串，或者是一个表示该特定动作所有允许方法的字符串列表。代码清单
    4-34 展示了一个示例。


    ***代码清单 4-34.** 使用 allowedMethods 属性限制对控制器动作的访问*


    `class SomeController {`

    `    // action1 只能通过 POST 调用`

    `    // action2 没有限制`

    `    // action3 可以通过 POST 或 DELETE 调用`

    `    static allowedMethods = [action1: ''POST'', action3: [''POST'', ''DELETE'']]`

    `    def action1() { ... }`

    `    def action2() { ... }`

    `    def action3() { ... }`

    `}`


    如果违反了 `allowedMethods` 属性中表达的规则，框架将拒绝该请求并返回 405 错误代码，HTTP 规范将其定义为“方法不允许”。


    ### 控制器输入输出


    到目前为止，你已经了解到控制器可以通过重定向和渲染视图来控制请求流。除此之外，控制器可能还需要从客户端读取二进制输入或向客户端写入二进制输出。在本节中，我们将探讨如何读取数据（包括文件上传）以及如何向客户端写入二进制响应。


    #### 处理文件上传


    开发 Web 应用程序时，更常见的用例之一是允许用户使用多部分请求将本地文件上传到服务器。这正是 Grails 基于 Spring MVC 的坚实基础开始大放异彩的地方。


    Spring 通过 servlet API 的 `HttpServletRequest` 接口的一个扩展——`org.springframework.web.multipart.MultipartHttpServletRequest`，对处理文件上传提供了出色的支持，其定义见代码清单
    4-35。


    ***代码清单 4-35.** org.springframework.web.multipart.MultipartHttpServletRequest
    接口*


    `interface MultipartHttpServletRequest extends HttpServletRequest {`

    `         public MultipartFile getFile(String name);`

    `         public Map getFileMap();`

    `         public Iterator getFileNames();`

    `}`


    如你所见，`MultipartHttpServletRequest` 接口只是扩展了默认的 `HttpServletRequest` 接口，以提供处理请求中文件的有用方法。


    ###### 处理多部分请求


    本质上，每当检测到多部分请求时，控制器实例中就会存在一个实现了 `MultipartHttpServletRequest` 接口的请求对象。这提供了对代码清单
    4-35 中所示方法的访问，以访问多部分请求中上传的文件。代码清单 4-36 还展示了如何使用 `<g:uploadForm>` 标签定义多部分表单。


    ***代码清单 4-36.** 一个上传表单示例*


    `<g:uploadForm action="upload">`

    `      <input type="file" name="myFile" />`

    `      <input type="submit" value="上传！" />`

    `</g:uploadForm>`


    重要的部分已用粗体标出，但上传表单基本上需要两样东西：


    > *   一个 `<form>` 标签，其 `enctype` 属性设置为 `multipart/form-data`。代码清单 4-36 中的 `<g:uploadForm>`
    会自动为你完成此操作。

    > *   一个 `<input>` 标签，其 `type` 属性设置为 `file`。


    在前面的例子中，文件输入的名称为 `myFile`；这一点至关重要，因为它是你在使用 `MultipartHttpServletRequest` 接口的 `getFile`
    方法时使用的命名引用。例如，`upload` 动作中的代码将从请求中检索上传的文件（参见代码清单 4-37）。


    ***代码清单 4-37.** 检索上传的文件*


    `def upload() {`

    `    def file = request.getFile(''myFile'')`

    `    // 对文件进行一些操作`

    `}`


    请注意，`getFile` 方法返回的不是 `java.io.File`。相反，它返回的是 `org.springframework.web.multipart.MultipartFile`
    的一个实例，该接口的详细信息见代码清单 4-38。如果在请求中未找到该文件，`getFile` 方法将返回 `null`。


    ***代码清单 4-38.** org.springframework.web.multipart.MultipartFile 接口*


    `interface MultipartFile {`

    `    public byte[] getBytes();`

    `    public String getContentType();`

    `    public java.io.InputStream getInputStream();`

    `    public String getName();`

    `    public String getOriginalFilename();`

    `    public long getSize();`

    `    public boolean isEmpty();`

    `    public void transferTo(java.io.File dest);`

    `}`


    `MultipartFile` 接口中定义了许多有用的方法。潜在用例包括以下内容：


    > *   使用 `getSize()` 方法仅允许上传特定大小的文件。

    > *   使用 `isEmpty()` 方法拒绝空文件。

    > *   使用 `getInputStream()` 方法将文件作为 `Java.io.InputStream` 读取。

    > *   使用 `getContentType()` 方法仅允许上传特定类型的文件。

    > *   使用 `transferTo(dest)` 方法将文件传输到服务器。


    例如，代码清单 4-39 中的代码将在文件不为空且大小小于 1024 字节时将其上传到服务器。


    ***代码清单 4-39.** 文件上传实战*


    `def upload() {`

    `    def file = request.getFile(''myFile'')`

    `    if(file && !file.empty && file.size < 1024)  {`

    `        file.transferTo( new File( "/local/server/path/${file.name}" ) )`

    `    }`

    `}`


    直接使用 `MultipartHttpServletRequest` 实例是管理文件上传的一种方式，但通常你需要读取文件的内容。在下一节中，我们将探讨 Grails
    如何通过数据绑定使这变得更容易。

