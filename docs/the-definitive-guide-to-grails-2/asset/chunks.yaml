    `  }`

    `}`


    One advantage of this approach is that thanks to the features offered by `Config.groovy`,
    you can easily specify per-environment values rather than hard-coding the value
    into the `AlbumArtService` class. With that configuration code in place, the hard-coded
    value may be removed from the `AlbumArtService` class. The property still needs
