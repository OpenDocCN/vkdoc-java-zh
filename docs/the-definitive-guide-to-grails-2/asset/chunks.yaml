- fmt: "### Query Caching\n\nHibernate, and hence GORM, supports the ability to cache\
    \ the results of a query. Under some circumstances this is useful but can also\
    \ be problematic for a lot of situations. Enabling the query cache is a controversial\
    \ topic and the framework errs on the side of disabling the cache by default.\
    \ The query cache can be enabled and disabled using the `hibernate.cache.use_query_cache`\
    \ setting in `DataSource.groovy`, as shown in [Listing 9-46](#Chapter09.html#list_9_46).\
    \ For more information on some of the issues with enabling the query cache see\
    \ [`http://tech.puredanger.com/2009/07/10/hibernate-query-cache/`](http://tech.puredanger.com/2009/07/10/hibernate-query-cache/).\n\
    \n![Image](images/square.jpg) **Note** The query cache works together with the\
    \ second-level cache, so unless you specify a caching policy as shown in the previous\
    \ section, the results of a cached query will not be cached.\n\nBy default, even\
    \ if query caching is enabled not all queries are cached. Like caching of instances,\
    \ you have to specify explicitly that a query needs caching. To do so, in the\
    \ `list()` method you could use the `cache` argument:\n\n```\ndef albums = Album.list(cache:true)\n\
    ```\n\nThe same technique can be used with dynamic finders using a map passed\
    \ as the last argument:\n\n```\ndef albums = Album.findAllByGenre(\"Alternative\"\
    , [cache:true])\n```\n\nYou can also cache criteria queries using the `cache`\
    \ method:\n\n```\ndef albums = Album.withCriteria {\n    ...\n    cache true\n\
    }\n```\n\nThat’s it for caching; in the next section, we’ll cover the impacts\
    \ of inheritance in ORM mapping.\n\n### Inheritance Strategies\n\nAs demonstrated\
    \ in [Chapter 3](#Chapter03.html#ch3), you can implement inheritance using two\
    \ different strategies called *table-per-hierarchy* or *table-per-subclass*. With\
    \ a table-per-hierarchy mapping, one table is shared between the parent and all\
    \ child classes, while table-per-subclass uses a different table for each subsequent\
    \ subclass.\n\nIf you were going to identify one area of ORM technology that really\
    \ demonstrates the object vs. relational mismatch, it would be inheritance mapping.\
    \ If you go for table-per-hierarchy, then you’re forced to have not-null constraints\
    \ on all child columns because they share the same table. The alternative solution,\
    \ table-per-subclass, could be seen as better since you avoid the need to specify\
    \ nullable columns as each subclass resides in its own table.\n\nThe main disadvantage\
    \ of table-per-subclass is that in a deep inheritance hierarchy you may end up\
    \ with an excessive number of `JOIN` queries to obtain the results from all the\
    \ parents of a given child. As you can imagine, this can lead to a performance\
    \ problem if not used with caution; that’s why we’re covering the topic here.\n\
    \nOur advice is to keep things simple and try to avoid modeling domains with more\
    \ than three levels of inheritance when using table-per-subclass. Alternatively,\
    \ if you’re happy sticking with table-per-hierarchy, then you’re even better off\
    \ because no `JOIN` queries at all are required. With that, we end our coverage\
    \ of performance tuning GORM. In the next section, we’ll be covering locking strategies\
    \ and concurrency.\n\n## Locking Strategies\n\nGiven that Grails executes within\
    \ the context of a multithreaded servlet container, concurrency is an issue that\
    \ you need to consider whenever persisting domain instances. By default, GORM\
    \ uses optimistic locking with versioning. What this means is that the Hibernate\
    \ engine does not hold any locks on database rows by performing a `SELECT FOR...UPDATE`.\
    \ Instead, Hibernate versions every domain instance.\n\nYou may already have noticed\
    \ that every table generated by GORM contains a version column. Whenever a domain\
    \ instance is saved, the version number contained within the version column is\
    \ incremented. Just before any update to a persistent instance, Hibernate will\
    \ issue an SQL `SELECT` to check the current version. If the version number in\
    \ the table doesn’t match the version number of the instance being saved, then\
    \ an `org.hibernate.StaleObjectStateException` is thrown; it is wrapped in a Spring\
    \ `org.springframework.dao.OptimisticLockingFailureException` and rethrown.\n\n\
    The implication is that if your application is processing updates with a high\
    \ level of concurrency, you may need to deal with the case when you get a conflicting\
    \ version. The upside is that since table rows are never locked, performance is\
    \ much better. So, how do you go about gracefully handling an `OptimisticLockingFailureException`?\
    \ Well, this is a domain-specific question. You could, for example, use the merge\
    \ method to merge the changes back into the database. Alternatively, you could\
    \ return the error to the user and ask him to perform a manual merge of the changes.\
    \ It really does depend on the application. Nevertheless, [Listing 9-69](#Chapter09.html#list_9_69)\
    \ shows how to handle an `OptimisticLockingFailureException` using the merge technique.\n\
    \n**Listing 9-69.** Dealing with Optimistic Locking Exceptions\n\n```\ndef update()\
    \ {\n    def album = Album.get(params.id)\n    album.properties = params\n   \
    \ try {\n        if(album.save(flush:true)) {\n            // success\n      \
    \      ...\n        } else {\n            // validation error\n            ...\n\
    \        }\n    }\n    catch(OptimisticLockingFailureException e) {\n        album\
    \ = Album.merge(album)\n    }\n}\n```\n\nIf you prefer not to use optimistic locking,\
    \ either because you’re mapping to a legacy database or because you just don’t\
    \ like it, then you can disable optimistic locking using the `version` method\
    \ inside the `mapping` closure of a domain class:\n\n```\nstatic mapping = {\n\
    \    version false\n}\n```\n\nIf you’re not expecting a heavy load on your site,\
    \ then an alternative may be to use pessimistic locking. Unlike optimistic locking,\
    \ pessimistic locking will perform `SELECT FOR...UPDATE` on the underlying table\
    \ row, which will block any other threads’ access to the same row until the update\
    \ is committed. As you can imagine, this will have an impact on the performance\
    \ of your application. To use pessimistic locking, you need to call the static\
    \ `lock()` method, passing the identifier of the instance to obtain a lock. [Listing\
    \ 9-70](#Chapter09.html#list_9_70) shows an example of using pessimistic locking\
    \ with the `lock` method.\n\n**Listing 9-70.** Using the lock Method to Obtain\
    \ a Pessimistic Lock\n\n```\ndef update() {\n    def album = Album.lock(params.id)\n\
    \    ...\n}\n```\n\nIf you have a reference to an existing persistent instance,\
    \ then you can call the `lock()` instance method, which upgrades to a pessimistic\
    \ lock. [Listing 9-71](#Chapter09.html#list_9_71) shows how to use the `lock`\
    \ instance method.\n\n**Listing 9-71.** Using the lock Instance Method to Upgrade\
    \ to a Pessimistic Lock\n\n```\ndef update() {\n    def album = Album.get(params.Id)\n\
    \    album.lock() // lock the Instance\n}\n```\n\nNote that you need to be careful\
    \ when using the `lock` instance method because you still get an `OptimisticLockingFailureException`\
    \ if another thread has updated the row in the time it takes to get the instance\
    \ and call `lock()` on it! With locks out of the way, let’s move on to looking\
    \ at GORM’s support for events."
  raw: '##### Query Caching


    Hibernate, and hence GORM, supports the ability to cache the results of a query.
    Under some circumstances this is useful but can also be problematic for a lot
    of situations. Enabling the query cache is a controversial topic and the framework
    errs on the side of disabling the cache by default. The query cache can be enabled
    and disabled using the `hibernate.cache.use_query_cache` setting in `DataSource.groovy`,
    as shown in [Listing 9-46](#Chapter09.html#list_9_46). For more information on
    some of the issues with enabling the query cache see [`http://tech.puredanger.com/2009/07/10/hibernate-query-cache/`](http://tech.puredanger.com/2009/07/10/hibernate-query-cache/).


    ![Image](images/square.jpg) **Note** The query cache works together with the second-level
    cache, so unless you specify a caching policy as shown in the previous section,
    the results of a cached query will not be cached.


    By default, even if query caching is enabled not all queries are cached. Like
    caching of instances, you have to specify explicitly that a query needs caching.
    To do so, in the `list()` method you could use the `cache` argument:


    `def albums = Album.list(cache:true)`


    The same technique can be used with dynamic finders using a map passed as the
    last argument:


    `def albums = Album.findAllByGenre("Alternative", [cache:true])`


    You can also cache criteria queries using the `cache` method:


    `def albums = Album.withCriteria {`

    `    ...`

    `    cache true`

    `}`


    That’s it for caching; in the next section, we’ll cover the impacts of inheritance
    in ORM mapping.


    #### Inheritance Strategies


    As demonstrated in [Chapter 3](#Chapter03.html#ch3), you can implement inheritance
    using two different strategies called *table-per-hierarchy* or *table-per-subclass*.
    With a table-per-hierarchy mapping, one table is shared between the parent and
    all child classes, while table-per-subclass uses a different table for each subsequent
    subclass.


    If you were going to identify one area of ORM technology that really demonstrates
    the object vs. relational mismatch, it would be inheritance mapping. If you go
    for table-per-hierarchy, then you’re forced to have not-null constraints on all
    child columns because they share the same table. The alternative solution, table-per-subclass,
    could be seen as better since you avoid the need to specify nullable columns as
    each subclass resides in its own table.


    The main disadvantage of table-per-subclass is that in a deep inheritance hierarchy
    you may end up with an excessive number of `JOIN` queries to obtain the results
    from all the parents of a given child. As you can imagine, this can lead to a
    performance problem if not used with caution; that’s why we’re covering the topic
    here.


    Our advice is to keep things simple and try to avoid modeling domains with more
    than three levels of inheritance when using table-per-subclass. Alternatively,
    if you’re happy sticking with table-per-hierarchy, then you’re even better off
    because no `JOIN` queries at all are required. With that, we end our coverage
    of performance tuning GORM. In the next section, we’ll be covering locking strategies
    and concurrency.


    ### Locking Strategies


    Given that Grails executes within the context of a multithreaded servlet container,
    concurrency is an issue that you need to consider whenever persisting domain instances.
    By default, GORM uses optimistic locking with versioning. What this means is that
    the Hibernate engine does not hold any locks on database rows by performing a
    `SELECT FOR...UPDATE`. Instead, Hibernate versions every domain instance.


    You may already have noticed that every table generated by GORM contains a version
    column. Whenever a domain instance is saved, the version number contained within
    the version column is incremented. Just before any update to a persistent instance,
    Hibernate will issue an SQL `SELECT` to check the current version. If the version
    number in the table doesn’t match the version number of the instance being saved,
    then an `org.hibernate.StaleObjectStateException` is thrown; it is wrapped in
    a Spring `org.springframework.dao.OptimisticLockingFailureException` and rethrown.


    The implication is that if your application is processing updates with a high
    level of concurrency, you may need to deal with the case when you get a conflicting
    version. The upside is that since table rows are never locked, performance is
    much better. So, how do you go about gracefully handling an `OptimisticLockingFailureException`?
    Well, this is a domain-specific question. You could, for example, use the merge
    method to merge the changes back into the database. Alternatively, you could return
    the error to the user and ask him to perform a manual merge of the changes. It
    really does depend on the application. Nevertheless, [Listing 9-69](#Chapter09.html#list_9_69)
    shows how to handle an `OptimisticLockingFailureException` using the merge technique.


    ***Listing 9-69.** Dealing with Optimistic Locking Exceptions*


    `def update() {`

    `    def album = Album.get(params.id)`

    `    album.properties = params`

    `    try {`

    `        if(album.save(flush:true)) {`

    `            // success`

    `            ...`

    `        } else {`

    `            // validation error`

    `            ...`

    `        }`

    `    }`

    `    catch(OptimisticLockingFailureException e) {`

    `        album = Album.merge(album)`

    `    }`

    `}`


    If you prefer not to use optimistic locking, either because you’re mapping to
    a legacy database or because you just don’t like it, then you can disable optimistic
    locking using the `version` method inside the `mapping` closure of a domain class:


    `static mapping = {`

    **`version false`**

    `}`


    If you’re not expecting a heavy load on your site, then an alternative may be
    to use pessimistic locking. Unlike optimistic locking, pessimistic locking will
    perform `SELECT FOR...UPDATE` on the underlying table row, which will block any
    other threads’ access to the same row until the update is committed. As you can
    imagine, this will have an impact on the performance of your application. To use
    pessimistic locking, you need to call the static `lock()` method, passing the
    identifier of the instance to obtain a lock. [Listing 9-70](#Chapter09.html#list_9_70)
    shows an example of using pessimistic locking with the `lock` method.


    ***Listing 9-70.** Using the lock Method to Obtain a Pessimistic Lock*


    `def update() {`

    `    def album = Album.lock(params.id)`

    `    ...`

    `}`


    If you have a reference to an existing persistent instance, then you can call
    the `lock()` instance method, which upgrades to a pessimistic lock. [Listing 9-71](#Chapter09.html#list_9_71)
    shows how to use the `lock` instance method.


    ***Listing 9-71.** Using the lock Instance Method to Upgrade to a Pessimistic
    Lock*


    `def update() {`

    `    def album = Album.get(params.Id)`

    `    album.lock() // lock the Instance`

    `}`


    Note that you need to be careful when using the `lock` instance method because
    you still get an `OptimisticLockingFailureException` if another thread has updated
    the row in the time it takes to get the instance and call `lock()` on it! With
    locks out of the way, let’s move on to looking at GORM’s support for events.'
  trans: '

    ##### 查询缓存


    Hibernate（以及 GORM）支持缓存查询结果的功能。在某些情况下这很有用，但在很多情况下也可能带来问题。启用查询缓存是一个有争议的话题，框架默认倾向于禁用缓存。查询缓存可以通过
    `DataSource.groovy` 中的 `hibernate.cache.use_query_cache` 设置来启用或禁用，如清单 9-46 所示。关于启用查询缓存可能带来的一些问题，更多信息请参阅
    [`http://tech.puredanger.com/2009/07/10/hibernate-query-cache/`](http://tech.puredanger.com/2009/07/10/hibernate-query-cache/)。


    ![图片](img/square.jpg) **注意** 查询缓存与二级缓存协同工作，因此除非你像上一节那样指定了缓存策略，否则缓存查询的结果不会被缓存。


    默认情况下，即使启用了查询缓存，也并非所有查询都会被缓存。与实例缓存类似，你需要显式指定某个查询需要缓存。为此，在 `list()` 方法中，你可以使用 `cache`
    参数：


    `def albums = Album.list(cache:true)`


    同样的技术也可以用于动态查找器，只需将映射作为最后一个参数传入：


    `def albums = Album.findAllByGenre("Alternative", [cache:true])`


    你也可以使用 `cache` 方法来缓存条件查询：


    `def albums = Album.withCriteria {`

    `    ...`

    `    cache true`

    `}`


    关于缓存的内容就到这里；在下一节中，我们将介绍继承在 ORM 映射中的影响。


    #### 继承策略


    如第 3 章所示，你可以使用两种不同的策略来实现继承，分别称为*单表继承*或*每个子类一张表*。使用单表继承映射时，父类和所有子类共享一个表；而每个子类一张表则为每个后续子类使用不同的表。


    如果你要找出 ORM 技术中真正体现对象与关系不匹配的一个领域，那便是继承映射。如果你选择单表继承，那么你被迫要在所有子类的列上设置非空约束，因为它们共享同一个表。另一种方案，每个子类一张表，可能被视为更好的选择，因为每个子类位于自己的表中，从而避免了指定可为空列的需要。


    每个子类一张表的主要缺点是，在深度继承层次结构中，为了从给定子类的所有父类获取结果，你可能最终会执行过多的 `JOIN` 查询。可以想象，如果不谨慎使用，这可能会导致性能问题；这就是我们在此讨论该主题的原因。


    我们的建议是保持简单，并在使用每个子类一张表时，尽量避免建模超过三层继承的领域。或者，如果你乐意坚持使用单表继承，那么你的情况会更好，因为根本不需要任何 `JOIN`
    查询。至此，我们结束了对 GORM 性能调优的讨论。在下一节中，我们将介绍锁定策略和并发性。


    ### 锁定策略


    鉴于 Grails 在多线程 Servlet 容器上下文中执行，并发性是你在持久化领域实例时需要考虑的一个问题。默认情况下，GORM 使用带版本控制的乐观锁。这意味着
    Hibernate 引擎不会通过执行 `SELECT FOR...UPDATE` 来持有数据库行上的任何锁。相反，Hibernate 会对每个领域实例进行版本控制。


    你可能已经注意到，GORM 生成的每个表都包含一个版本列。每当保存一个领域实例时，版本列中包含的版本号就会递增。就在对持久化实例进行任何更新之前，Hibernate
    会发出一个 SQL `SELECT` 来检查当前版本。如果表中的版本号与正在保存的实例的版本号不匹配，则会抛出 `org.hibernate.StaleObjectStateException`；该异常会被包装在
    Spring 的 `org.springframework.dao.OptimisticLockingFailureException` 中并重新抛出。


    这意味着，如果你的应用程序以高并发级别处理更新，你可能需要处理遇到版本冲突的情况。好处是，由于表行从未被锁定，性能要好得多。那么，如何优雅地处理 `OptimisticLockingFailureException`
    呢？嗯，这是一个特定于领域的问题。例如，你可以使用 merge 方法将更改合并回数据库。或者，你可以将错误返回给用户，并让他手动合并更改。这确实取决于应用程序。尽管如此，清单
    9-69 展示了如何使用 merge 技术处理 `OptimisticLockingFailureException`。


    ***清单 9-69.** 处理乐观锁异常*


    `def update() {`

    `    def album = Album.get(params.id)`

    `    album.properties = params`

    `    try {`

    `        if(album.save(flush:true)) {`

    `            // 成功`

    `            ...`

    `        } else {`

    `            // 验证错误`

    `            ...`

    `        }`

    `    }`

    `    catch(OptimisticLockingFailureException e) {`

    `        album = Album.merge(album)`

    `    }`

    `}`


    如果你不想使用乐观锁，无论是由于映射到遗留数据库，还是仅仅因为不喜欢它，那么你可以在领域类的 `mapping` 闭包中使用 `version` 方法来禁用乐观锁：


    `static mapping = {`

    **`version false`**

    `}`


    如果你预计网站负载不高，那么另一种选择是使用悲观锁。与乐观锁不同，悲观锁会对底层表行执行 `SELECT FOR...UPDATE`，这将阻塞任何其他线程对该行的访问，直到更新提交。可以想象，这会对应用程序的性能产生影响。要使用悲观锁，你需要调用静态的
    `lock()` 方法，传入要获取锁的实例标识符。清单 9-70 展示了使用 `lock` 方法进行悲观锁定的示例。


    ***清单 9-70.** 使用 lock 方法获取悲观锁*


    `def update() {`

    `    def album = Album.lock(params.id)`

    `    ...`

    `}`


    如果你有一个对现有持久化实例的引用，那么你可以调用 `lock()` 实例方法，该方法会升级为悲观锁。清单 9-71 展示了如何使用 `lock` 实例方法。


    ***清单 9-71.** 使用 lock 实例方法升级为悲观锁*


    `def update() {`

    `    def album = Album.get(params.Id)`

    `    album.lock() // 锁定实例`

    `}`


    请注意，在使用 `lock` 实例方法时需要小心，因为在获取实例和对其调用 `lock()` 之间的时间内，如果另一个线程更新了该行，你仍然会收到 `OptimisticLockingFailureException`！锁的问题讨论完毕，接下来我们来看看
    GORM 对事件的支持。

