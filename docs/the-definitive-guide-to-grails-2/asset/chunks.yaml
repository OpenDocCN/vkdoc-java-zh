  trans: '

    ### Grails 交互模式


    到目前为止，我们所见到的所有 Grails 命令都是通过运行 `grails` 并传递一个命令名称作为参数来执行的，例如 `grails create-domain-class`。当像这样执行一个命令时，需要完成几件事情。`grails`
    命令首先会启动 JVM，接着需要初始化 Groovy 运行时环境，并且还需要初始化一定量的 Grails 运行时环境。所有这些准备工作都必须在命令实际执行之前完成，而这一整套“预热”过程需要时间。所需时间当然会因硬件而异。Grails
    的“交互模式”在这方面能提供很大帮助。要启动交互模式，只需输入不带任何参数的 `grails` 命令。参见清单 1-12。


    ***清单 1-12.** 启动交互模式*


    `$ grails`

    `grails>`


    只要处于交互模式中，任何原本可以在命令行上执行的 Grails 命令都可以执行。其语法与在命令行上完全相同，只是无需在每个命令前加上“grails”前缀。例如，在命令行上你可能会输入类似“grails
    create-domain-class com.gtunes.Store”的内容，但在交互模式下，你只需输入更短的“create-domain-class
    com.gtunes.Store”，如清单 1-13 所示。


    ***清单 1-13.** 在交互模式下创建领域类*


    `$ grails`

    `grails> create-domain-class com.gtunes.Store`

    `| Created file grails-app/domain/com/gtunes/Store.groovy`

    `| Created file test/unit/com/gtunes/StoreTests.groovy`

    `grails>`


    请注意，在交互模式下运行此命令比从命令行运行同一命令要快得多。


    由于按向上箭头键可以循环浏览最近执行过的命令，因此连续执行相似的命令变得非常快速和简单。例如，在执行“create-domain-class com.gtunes.Store”之后，按向上箭头键调出该命令，然后按退格键删除“Store”并将其替换为“Song”，即可快速执行“create-domain-class
    com.gtunes.Song”。


    交互模式提供的另一个巨大生产力提升是直观的 Tab 键自动补全功能。在交互模式下，输入“cre”后按 Tab 键，交互模式将显示所有以“cre”开头的可用命令，如清单
    1-14 所示。


    ***清单 1-14.** 交互模式下的 Tab 键自动补全*


    `grails> create-`


    `create-controller            create-domain-class          create-filters               create-`

    `hibernate-cfg-xml     create-integration-test      create-plugin                create-`

    `scaffold-controller   create-script                create-service`

    `create-tag-lib               create-unit-test             create-web-xml-config`

    `grails> create-`


    现在，交互模式已经尽可能补全了“cre”命令——即补全到“create-”——你可以输入“d”并再次按 Tab 键，此时交互模式会将命令补全为“create-domain-class”，因为这是唯一以“create-d”开头的可用命令。这种自动补全方式适用于所有可用命令。此外，某些接受参数的命令也支持自动补全。例如，如果你在“generate-all”之后按
    Tab 键，由于 `generate-all` 命令接受一个领域类名称作为参数，控制台将显示应用程序中所有可用的领域类。这使得无需输入完整的类名就能轻松填充参数。你只需输入足够区分领域类名称的部分，交互模式就能补全其余部分。


    交互模式可以帮助快速打开某些类型的报告。在生成一个领域类或任何其他工件之后，在交互模式下运行“test-app unit:”即可运行所有单元测试。测试结果将生成在项目根目录下的
    `target/test-reports/html/index.html` 中。要在交互模式下于默认网页浏览器中打开该报告，请使用 `open` 命令，如清单
    1-15 所示：


    ***清单 1-15.** 在交互模式下打开单元测试报告*


    `grails> open target/test-reports/html/index.html`

    `grails>`


    请注意，可以使用 Tab 键自动补全来帮助完成 HTML 文件的路径。


    事实证明，`open` 命令知道在哪里可以找到测试报告；因此，一种更简单的打开报告的方式如清单 1-16 所示。


    ***清单 1-16.** 在交互模式下按名称打开单元测试报告*


    `grails> open test-report`

    `grails>`


    退出交互模式的方法是在交互模式提示符下输入“exit”。但有一个例外情况：如果应用程序当前正在运行（例如在控制台执行“run-app”之后），此时 `exit`
    命令将退出应用程序，但会让你留在交互模式中。这时，你可以再次执行“exit”来完全退出交互模式。


    如果你只打算执行单个命令，那么交互模式用处不大。交互模式真正有益于更典型的工作流程场景，即在一段时间内执行大量 Grails 命令。你可能希望运行测试、查看报告、修改一些代码，然后继续迭代这个循环。你可能希望一次性生成多个领域类，填写它们的一些细节，然后生成相应的控制器和视图。只要你在一次工作会话中要执行超过一两个
    Grails 命令，交互模式很可能就会带来很大帮助。在进行实际开发时，通过交互模式执行这些命令将为你节省大量时间。


    交互模式极大地提升了开发者的生产力。习惯使用它将使许多开发任务更易于管理且执行更快。


    ### 总结


    成功！你已经启动并运行了你的第一个 Grails 应用程序。在本章中，你通过设置和配置 Grails 安装，迈出了学习 Grails 的第一步。此外，你还创建了第一个
    Grails 应用程序以及一个基本的控制器。


    现在是时候看看 Grails 还能做些什么来启动你的项目开发了。在接下来的章节中，我们将研究一些创建、读取、更新、删除（CRUD）的生成工具，借助这些工具，Grails
    能让你在极短时间内构建出原型应用程序。


    ## 第 2 章


    ![Image](img/3squ.jpg)


    ## Grails 入门


    在第 1 章中，你首次接触了 Grails 框架，并在创建 gTunes 应用程序基础的同时，体验了基本的命令行界面。本章将在此基础上，向你展示如何使用 Grails
    的脚手架功能快速构建一个原型应用程序，该程序能够生成简单的 CRUD（创建、读取、更新、删除）界面。


    接着，将解释 Grails 生态系统中的一些基本概念，包括环境、数据源和部署。准备好了——这将是一章信息量巨大、内容丰富的章节！

