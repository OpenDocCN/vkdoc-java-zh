    现在你有了一个模板，就可以修改 `grails-app/views/album/_albumList.gsp` 模板，使其使用 jQuery 为列表中的每一项调用
    `AlbumController` 上的控制器动作 `display`。代码清单 8-15 以粗体显示了 `_albumList.gsp` 模板的修改内容。


    ***代码清单 8-15.** 更新 _albumList.gsp 以使用 jQuery 链接*


