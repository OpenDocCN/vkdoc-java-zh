    ##### 提供插件元数据


    插件描述符具有多种用途。首要用途是让插件作者提供关于插件的元数据：作者姓名、版本号、描述等。代码清单 12-8 展示了 `SimpleCacheGrailsPlugin`
    类以及用于提供这些信息的占位字段。


    ***代码清单 12-8.** SimpleCacheGrailsPlugin 插件描述符*


