    #### 分页视图


    在 Web 应用程序中渲染数据列表是一项常见任务。Grails 提供了易于使用的机制来从数据库（GORM）检索数据，以及简单的机制来渲染数据（GSP 和 GSP
    标签）。


    Web 应用程序通常作为数据库的前端，而数据库中可能包含大量数据。应用程序可能需要提供机制，让用户能够管理并浏览所有数据。例如，gTunes 应用程序可能包含数千位艺术家、专辑和歌曲。一个列出所有专辑的页面可能会让用户感到不知所措且难以操作（参见图
    5-2）。


    ![Image](img/9781430243779_Fig05-02.jpg)


    ***图 5-2.** 一个很长的专辑列表*


    图 5-2 展示了一个用户请求系统中所有属于 `Rock` 流派的专辑列表时可能看到的内容。这个非常长的页面包含了数百张专辑。可以说，单个页面上显示的数据太多了。如果有数千张专辑呢？数十万张专辑呢？显然，将所有专辑都展示在一个页面上是不合理的。


    gTunes 应用程序需要智能地向用户展示可管理的数据列表。与其在一个列表中显示数百或数千张专辑，不如只显示五张或十张。如果应用程序在页面上只显示五张或十张专辑，那么它还需要提供一种机制，让用户能够在更大的虚拟列表中导航，以便每次查看其余的五张或十张专辑。图
    5-3 展示了一个更易于管理的界面。


    ![Image](img/9781430243779_Fig05-03.jpg)


    ***图 5-3.** 一个分页的专辑列表*


    图 5-3 中的列表只包含十张专辑。该视图提供了在更大的虚拟列表（包含该流派的所有专辑）中导航的机制。这种方法带来了更好的用户体验，尤其是在用户可能被大量数据淹没的情况下。


    由于生成此类分页控件涉及一些复杂性，应用程序需要做几件事：(1) 为每个视图从数据库中检索较少量的数据；(2) 提供请求当前批次之前或之后紧邻的记录批次的支持；(3)
    提供一种直接跳转到列表某个区域的机制，而不是一次一页地浏览整个大列表；(4) 知道大列表中的记录总数。所有这些通常需要编写大量代码。


    好消息是，Grails 提供了一种非常简单的机制来管理所有这些。这种机制是一个名为 `paginate` 的 GSP 标签。`paginate` 标签管理了大量繁琐的工作，否则就需要手动提供用于在大型数据列表中导航的
    UI 元素。


    负责渲染此列表的 GSP 位于 `grails-app/views/store/genre.gsp`。该页面包含清单 5-31 中所示的标记。


    ***清单 5-31.** genre.gsp <h1>在线商店</h1>*


    `<h1>在线商店</h1>`


    `<h2>流派: ${genre.encodeAsHTML()}</h2>`

    `<table border="0" class="albumsTable">`

    `  <tr>`

    `    <th>艺术家</th>`

    `    <th>专辑</th>`

    `    <th>年份</th>`

    `  </tr>`

    `  <g:each var="album" in="${albums}">`

    `    <tr>`

    `          <td>${album.artist.name}</td>`

    `      <td><g:link action="show"`

    `                  controller="album"`

    `                  id="${album.id}">${album.title}</g:link>`

    `      </td>`

    `          <td>${album.year}</td>`

    `    </tr>`

    `  </g:each>`


    `</table>`

    `<div class="paginateButtons">`

    `  <g:paginate controller="store"`

    `                 action="genre"`

    `                 params="[name:genre]"`

    `              total="${totalAlbums}" />`

    `</div>`


    这里展示的标记渲染了一个 HTML 表格，其中包含一个标题行和 `albums` 集合中每个元素对应的一行。请注意清单 5-30 底部 `paginate`
    标签的使用。这就是在 GSP 中渲染分页控件所需的全部代码。`paginate` 标签负责处理生成“上一页”和“下一页”链接、所有支持跳转到特定页面的链接以及与每个链接关联的所有适当请求参数的所有繁琐工作。所有这些都由对
    GSP 标签的这一次调用处理。整个过程再简单不过了！


    `paginate` 标签生成了许多链接。`controller` 和 `action` 参数告诉 `paginate` 标签每个链接应该提交到哪里。在这个特定案例中，所有链接都提交到
    `StoreController` 中的 `genre` 操作。如果所有链接都引用同一个控制器操作，您可能会想，应用程序如何知道用户点击的是哪个链接？答案在于
    `paginate` 标签在每个链接的末尾附加了许多请求参数；这些请求参数由控制器操作使用。例如，“7”链接指向 URL `/store/genre?offset=60&max=10&name=Rock`。“8”链接指向
    URL `/store/genre?offset=70&max=10&name=Rock`。请注意，这些链接都包含相同的 `max` 和 `name` 参数值，但包含不同的
    `offset` 参数值。`offset` 参数是请求的重要组成部分，因为通过它，控制器将知道当用户点击这些链接之一时应返回哪一页的数据。让我们看看相关的控制器操作。


    清单 5-32 包含了 `StoreController` 中 `genre` 操作的代码。


    ***清单 5-32.** genre 操作*


    `def genre() {`

    `    def max = Math.min(params.int(''max'') ?: 10, 100)`

    `    def offset = params.int(''offset'') ?: 0`


    `    def total = Album.countByGenre(params.name)`

    `    def albumList = Album.withCriteria {`

    `          eq ''genre'', params.name`

    `      projections {`

    `        artist {`

    `          order ''name''`

    `        }`

    `      }`

    `      maxResults max`

    `      firstResult offset`

    `    }`

    `          return [albums:albumList,`

    `                        totalAlbums:total,`

    `                        genre:params.name]`

    `  }`


    ![Image](img/square.jpg) **注意**  清单 5-32 中的查询代码使用了 Hibernate Criteria API，其一般行为将在下文描述。Criteria
    API 在第 10 章的“Criteria 查询”部分有详细讨论。


    `name` 请求参数在前两个查询中都被使用。第一个查询用于统计数据库中属于某个流派的专辑数量。第二个查询实际检索一个专辑列表。该第二个查询不会检索属于某个流派的*所有*专辑，而只检索这些专辑中最多十个的子集。


    例如，假设有一个包含 1,000 张专辑的列表，每张专辑都有一个从 0 到 999 的关联索引。当向 URL `/store/genre?offset=60&max=10&name=Rock`
    发送请求时，对 `Album.withCriteria(...)` 方法的调用将返回其中十张专辑，从索引为 60 的 `Album` 开始。`max` 参数表示应返回的最大专辑数量。

    '
- fmt: "注意，在`genre`操作的第一行中，如果没有找到`max`请求参数，则为其分配默认值`10`。`params`对象上的`int`方法接受一个字符串参数，该参数代表请求参数的名称。如果请求参数存在，其值将被转换为`int`并返回。如果请求参数不存在或无法转换为`int`，则该方法返回`null`。如果找到了`max`请求参数且其值大于`100`，系统将回退到最大值`10`。每页显示超过`100`个专辑会破坏分页支持的目的。\n\
    \n`offset`参数表示此十个元素的列表在更大列表中的起始点。如果没有提供`offset`请求参数，系统默认其值为`0`，即列表的开头。\n\n`genre`操作返回的数据映射不仅包含专辑列表，还包含`totalAlbums`和`genre`的值，每个值都在`genre.gsp`中作为`paginate`标签的参数使用。所有这些都需要作为控制器操作与GSP之间交互的一部分保持同步。\n\
    \n`paginate`标签支持多个参数。[表5-2](#Chapter05.html#tab_5_2)列出了这些参数。\n\n![Image](images/9781430243779_Tab05-02.jpg)\n\
    \n`paginate`标签支持的所有参数都是可选的，除了`total`参数。\n\nGrails应用程序中默认的脚手架列表视图包含对列表分页和定义简单域类的支持，如[清单5-33](#Chapter05.html#list_5_33)中所示的`Car`类。\n\
    \n***清单5-33.** 一个Car域类*\n\n```\npackage com.demo\n\nclass Car {\n    String make\n\
    \    String model\n}\n```\n\n为`Car`类生成脚手架，您将看到`CarController`中的默认`list`操作和默认的`grails-app/view/car/list.gsp`包含对汽车列表分页的支持。[清单5-34](#Chapter05.html#list_5_34)显示了GSP的相关部分。\n\
    \n***清单5-34.** grails-app/view/car/list.gsp*\n\n```\n<div id=\"list-car\" class=\"\
    content scaffold-list\" role=\"main\">\n    <h1><g:message code=\"default.list.label\"\
    \ args=\"[entityName]\" /></h1>\n    <g:if test=\"${flash.message}\">\n    <div\
    \ class=\"message\" role=\"status\">${flash.message}</div>\n    </g:if>\n    <table>\n\
    \          <thead>\n                 <tr>\n                        <g:sortableColumn\
    \ property=\"make\" title=\"${message(code: 'car.make.label', default: 'Make')}\"\
    \ />\n                        <g:sortableColumn property=\"model\" title=\"${message(code:\
    \ 'car.model.label', default: 'Model')}\" />\n                 </tr>\n       \
    \   </thead>\n          <tbody>\n          <g:each in=\"${carInstanceList}\" status=\"\
    i\" var=\"carInstance\">\n                 <tr class=\"${(i % 2) == 0 ? 'even'\
    \ : 'odd'}\">\n\n                        <td><g:link action=\"show\" id=\"${carInstance.id}\"\
    >${fieldValue(bean: carInstance, field: \"make\")}</g:link></td>\n\n         \
    \               <td>${fieldValue(bean: carInstance, field: \"model\")}</td>\n\n\
    \                 </tr>\n          </g:each>\n          </tbody>\n    </table>\n\
    \    <div class=\"pagination\">\n          <g:paginate total=\"${carInstanceTotal}\"\
    \ />\n    </div>\n</div>\n```\n\n在此对`paginate`标签的调用中，唯一指定的属性是必需的`total`属性。请注意，在这种情况下，`total`属性的值就是数据库中汽车的总数。这与前面显示的示例略有不同，在之前的示例中，`total`属性的值不一定是数据库中专辑的总数，而是数据库中属于特定流派的专辑数量。\n\
    \n[清单5-35](#Chapter05.html#list_5_35)显示了`CarController`中的`list`操作。\n\n***清单5-35.**\
    \ CarController中的分页支持*\n\n```\nclass CarController {\n\n    def list(Integer max)\
    \ {\n        params.max = Math.min(max ?: 10, 100)\n        [carInstanceList:\
    \ Car.list(params), carInstanceTotal: Car.count()]\n    }\n\n  ...\n}\n```\n\n\
    `CarController`中的默认`list`操作会在未提供`max`请求参数时为其分配值`10`。\n\n应用程序可以使用GORM支持的任意多种技术来控制汽车的排序顺序。对于这个特定情况，最简单的解决方案是在动态方法中包含`order`子句，如[清单5-36](#Chapter05.html#list_5_36)所示。\n\
    \n***清单5-36.** 按Model类CarController排序汽车*\n\n```\nclass CarController {\n\n   \
    \ def list(Integer max) {\n        params.max = Math.min(max ?: 10, 100)\n   \
    \     [carInstanceList: Car.listOrderByModel(params),\n         carInstanceTotal:\
    \ Car.count()]\n    }\n\n  ...\n}\n```\n\n完成所有这些设置后，如果数据库包含超过十辆汽车，视图中的分页支持将启动，如[图5-4](#Chapter05.html#fig_5_4)所示。\n\
    \n![Image](images/9781430243779_Fig05-04.jpg)\n\n***图5-4.** 对汽车列表进行分页*"
  raw: 'Notice that the first line in the `genre` action assigns a default value of
    10 to `max` if no `max` request parameter is found. The `int` method on the `params`
    object accepts a string parameter, which represents the name of a request parameter.
    If the request parameter exists, its value will be converted to an `int` and returned.
    If the request parameter does not exist or if it cannot be converted to an `int`,
    then the method returns `null`. If a `max` request parameter is found and the
    value is greater than 100, the system is falling back to a max of 10\. Displaying
    more than 100 albums per page would defeat the purpose of having the pagination
    support in place.


    The `offset` parameter represents the point in the larger list at which this list
    of ten should begin. If no `offset` request parameter is supplied, the system
    defaults the value to 0, or the beginning of the list.


    The map of data being returned by the `genre` action includes not only the list
    of albums but also values for `totalAlbums` and `genre`, each of which is used
    in `genre.gsp` as a parameter to the `paginate` tag. All of this needs to be kept
    in sync as part of the interaction between the controller action and the GSP.


    The `paginate` tag supports a number of arguments. [Table 5-2](#Chapter05.html#tab_5_2)
    lists those arguments.


    ![Image](images/9781430243779_Tab05-02.jpg)


    All of the parameters supported by the `paginate` tag are optional except for
    the total parameter.


    The default scaffolded list views in a Grails application include support for
    paginating the list and defining a simple domain class, like the `Car` class shown
    in [Listing 5-33](#Chapter05.html#list_5_33).


    ***Listing 5-33.** A Car Domain Class*


    `package com.demo`


    `class Car {`

    `    String make`

    `    String model`

    `}`


    Generate scaffolding for the `Car` class, and you will see that the default list
    action in the `CarController` and the default `grails-app/view/car/list.gsp` include
    support for paginating the list of cars. [Listing 5-34](#Chapter05.html#list_5_34)
    shows the relevant part of the GSP.


    ***Listing 5-34.** grails-app/view/car/list.gsp*


    `<div id="list-car" class="content scaffold-list" role="main">`

    `    <h1><g:message code="default.list.label" args="[entityName]" /></h1>`

    `    <g:if test="${flash.message}">`

    `    <div class="message" role="status">${flash.message}</div>`

    `    </g:if>`

    `    <table>`

    `          <thead>`

    `                 <tr>`

    `                        <g:sortableColumn property="make" title="${message(code:
    ''car.make.`

    `label'', default: ''Make'')}" />`

    `                        <g:sortableColumn property="model" title="${message(code:
    ''car.model.`

    `label'', default: ''Model'')}" />`

    `                 </tr>`

    `          </thead>`

    `          <tbody>`

    `          <g:each in="${carInstanceList}" status="i" var="carInstance">`

    `                 <tr class="${(i % 2) == 0 ? ''even'' : ''odd''}">`


    `                        <td><g:link action="show" id="${carInstance.id}">${fieldValue(bean:`

    `carInstance, field: "make")}</g:link></td>`


    `                        <td>${fieldValue(bean: carInstance, field: "model")}</td>`


    `                 </tr>`

    `          </g:each>`

    `          </tbody>`

    `    </table>`

    `    <div class="pagination">`

    `          <g:paginate total="${carInstanceTotal}" />`

    `    </div>`

    `</div>`


    The only attribute specified in this call to the `paginate` tag is the required
    `total` attribute. Notice that in this case the value of the `total` attribute
    is simply the total number of cars in the database. This is a little bit different
    from the example shown earlier, where the value of the `total` attribute was not
    necessarily that of the whole number of albums in the database but was the number
    of albums in the database that belong to a particular genre.


    [Listing 5-35](#Chapter05.html#list_5_35) shows the list action in the `CarController`.


    ***Listing 5-35.** Pagination Support in the CarController*


    **`class CarController {`**


    **`    def list(Integer max) {`**

    **`        params.max = Math.min(max ?: 10, 100)`**

    **`        [carInstanceList: Car.list(params), carInstanceTotal: Car.count()]`**

    **`    }`**


    **`  ...`**

    **`}`**


    The default list action in the `CarController` will assign a value of 10 to the
    `max` request parameter if a value is not supplied.


    The application may take control over the order of the cars, using any number
    of techniques supported by GORM. The simplest solution for this particular case
    is including the order clause in the dynamic method, as shown in [Listing 5-36](#Chapter05.html#list_5_36).


    ***Listing 5-36.** Ordering Cars by Model Class CarController {*


    `class CarController {`


    `    def list(Integer max) {`

    `        params.max = Math.min(max ?: 10, 100)`

    `        [carInstanceList: Car.listOrderByModel(params),`

    `         carInstanceTotal: Car.count()]`

    `    }`


    `  ...`

    `}`


    With all of that in place, if the database includes more than ten cars, then the
    pagination support in the view will kick in, as shown in [Figure 5-4](#Chapter05.html#fig_5_4).


    ![Image](images/9781430243779_Fig05-04.jpg)


    ***Figure 5-4.** Paginating a list of cars*'
