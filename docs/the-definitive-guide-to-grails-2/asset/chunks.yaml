- fmt: "### A Simple Way to Test Localization\n\nA simple way to test your Grails\
    \ application’s localization is to include a request parameter named `lang` and\
    \ assign it a valid language code, such as “es” for Spanish ([`http://localhost:8080/gTunes/?lang=es`](http://localhost:8080/gTunes/?lang=es)).\
    \ [Figure 7-3](#Chapter07.html#fig_7_3) shows a Spanish version of the application.\n\
    \n![Image](images/9781430243779_Fig07-03.jpg)\n\n***Figure 7-3.** gTunes in Spanish*\n\
    \n### Using URL Mappings for Internationalization\n\nAs shown previously, a request\
    \ parameter named `lang` will tell the framework to use a specific language code\
    \ while processing this request. One way to specify the request parameter is to\
    \ include it in the request URL, as in [`http://localhost:8080/gTunes/?lang=es`](http://localhost:8080/gTunes/?lang=es).\
    \ Another way to specify the request parameter is by defining a custom URL mapping,\
    \ as shown in [Listing 7-7](#Chapter07.html#list_7_7).\n\n***Listing 7-7.** A\
    \ URL Mapping for Localization*\n\n```\nclass UrlMappings {\n    static mappings\
    \ = {\n        \"/store/$lang\"(controller:'store')\n        // ...\n    }\n}\n\
    ```\n\nThe mapping in [Listing 7-7](#Chapter07.html#list_7_7) will map all requests\
    \ to a URL such as [`http://localhost:8080/gTunes/en/`](http://localhost:8080/gTunes/en/)\
    \ or [`http://localhost:8080/gTunes/es/`](http://localhost:8080/gTunes/es/), where\
    \ “en” and “es” could be any valid language code.\n\n### Using Parameterized Messages\n\
    \nOften a user message may consist of more than simple static text. The message\
    \ may need to include some data that is not known until runtime. For example,\
    \ gTunes displays a message that lets users know how many songs they have purchased.\
    \ The message reads something like this: “You have purchased (97) songs.” The\
    \ “97” part of that message is a piece of information that isn’t known until runtime.\n\
    \n#### Using java.text.MessageFormat\n\nJava includes a class called `java.text.MessageFormat`.\
    \ One of the things that `java.text.MessageFormat` is useful for is supporting\
    \ parameterized messages, such as the one described earlier, in a language-neutral\
    \ way. A parameterized message may contain any number of parameters, and the parameters\
    \ are represented with numbers surrounded by curly braces in the value of the\
    \ message. [Listing 7-8](#Chapter07.html#list_7_8) shows how the “You have purchased\
    \ (97) songs.” message might be represented in `grails-app/i18n/messages.properties`.\n\
    \n***Listing 7-8.** Defining a Parameterized Message*\n\n```\n# messages.properties\n\
    gtunes.purchased.songs=You have purchased ({0}) songs.\n...\n```\n\nThe value\
    \ of the `gtunes.purchased.songs` message has one parameter in it. As is almost\
    \ always the case in Java and Groovy, the `java.text.MessageFormat` class uses\
    \ a zero-based index; `{0}` in the message is a placeholder for the value of the\
    \ first parameter. If the message had multiple parameters, they would be represented\
    \ in the value of the message with placeholders like `{0}`, `{1}`, `{2}`, and\
    \ so on.\n\nThe code in [Listing 7-9](#Chapter07.html#list_7_9) shows how `java.text.MessageFormat`\
    \ might be used from a Java program.\n\n***Listing 7-9.** Using MessageFormat\
    \ to Populate a Parameterized Message with Java*\n\n```\n// JavaMessages.java\n\
    import java.util.ResourceBundle;\nimport java.text.MessageFormat;\n\npublic class\
    \ JavaMessages {\n    public static void main(String[] args) {\n        ResourceBundle\
    \ bundle = ResourceBundle.getBundle(\"messages\");\n        String songsPurchased\
    \ = bundle.getString(\"gtunes.purchased.songs\");\n        String message = MessageFormat.format(songsPurchased,\
    \ 97);\n        System.out.println(\"message: \" + message);\n    }\n}\n```\n\n\
    [Listing 7-10](#Chapter07.html#list_7_10) shows a Groovy script that does the\
    \ same thing.\n\n***Listing 7-10.** Using MessageFormat to Populate a Parameterized\
    \ Message with Groovy*\n\n```\nimport java.text.MessageFormat\n\ndef bundle =\
    \ ResourceBundle.getBundle('messages')\ndef songsPurchased = bundle.getString('gtunes.purchased.songs')\n\
    def message = MessageFormat.format(songsPurchased, 97)\n\nprintln \"message: ${message}\"\
    \n```\n\n#### Using the message Tag for Parameterized Messages\n\nGrails allows\
    \ for parameterized messages to be used without the need for you, the application\
    \ developer, to deal directly with the `java.text.MessageFormat` class. The `message`\
    \ tag supports an optional parameter named `args`, and if that parameter is assigned\
    \ a value, its value will be treated as a list of parameters that need to be applied\
    \ to the message. [Listing 7-11](#Chapter07.html#list_7_11) shows how to pass\
    \ arguments to the `message` tag.\n\n***Listing 7-11.** Using the message Tag\
    \ to Populate a Parameterized Message*\n\n```\n<div>\n<g:message code=\"gtunes.purchased.songs\"\
    \ args=\"[97]\"/>\n</div>\n```\n\nOf course, for this or a similar message, you\
    \ will probably not want to hard-code the parameter value in a GSP like that.\
    \ More likely, you will want that value to be dynamic. The code in [Listing 7-12](#Chapter07.html#list_7_12)\
    \ is passing a parameter to the message to be applied to the `gtunes.purchased.songs`\
    \ message. If the currently logged in user has purchased any songs, then the value\
    \ of the parameter will be the number of songs he or she has purchased; otherwise,\
    \ the value of the parameter will be 0.\n\n***Listing 7-12.** Using the message\
    \ Tag to Populate a Parameterized Message Dynamically*\n\n```\n<div> <g:message\
    \ code=\"gtunes.purchased.songs\"\nargs=\"[session.user.purchasedSongs?.size()\
    \ ?: 0]\"/> </div>\n```\n\n![Image](images/square.jpg) **Note**  Note the use\
    \ of the so-called Elvis operator (`?:`) in the previous code. The Elvis operator\
    \ is a shorthand version of Java ternary operator where the return value for the\
    \ true condition is the same as the expression being evaluated. For example, the\
    \ following expressions accomplish the same thing:\n\n```\nsize = session.user.purchasedSongs?.size()\
    \ ? session.user.purchasedSongs?.size() : 0\nsize = session.user.purchasedSongs?.size()\
    \ ?: 0\n```"
