    清单 11-16 中传递给作用域方法的字符串描述了依赖关系。其语法为 group:name:version，因此在 `mysql:mysql-connector-java:5.1.21`
    中，“`mysql`”是组名，“`mysql-connector-java`”是名称，“`5.1.21`”自然是版本号。任何使用过 Maven 的人都会熟悉这些术语。


    另一种语法是以命名参数的形式向 `scope` 方法指定构件的详细信息（见清单 11-17）。


    ***清单 11-17.** 使用命名参数表达依赖关系*


    `grails.project.dependency.resolution = {`

    `    ...`

    `    dependencies {`

    `        runtime group: ''mysql''`

    `                name: ''mysql-connector-java''`

    `                version: ''5.1.21''`

    `    }`

    `    ...`

    `}`


    可以在单次调用中指定多个依赖关系（见清单 11-18）。


    ***清单 11-18.** 同时指定多个依赖关系*


    `grails.project.dependency.resolution = {`

    `    ...`

    `    dependencies {`

    `        // 在此处指定依赖关系，可选用 ''build'', ''compile'', ''runtime'', ''test'' 或 ''provided''
    作用域，例如：`


    `        runtime ''mysql:mysql-connector-java:5.1.21''`

    `        runtime ''commons-httpclient:commons-httpclient:3.1''`


    `        // 或者 ...`


    `        runtime ''mysql:mysql-connector-java:5.1.21'',`

    `               ''commons-httpclient:commons-httpclient:3.1''`

    `        // 或者...`


    `        runtime [[group: ''mysql'', name: ''mysql-connector-java'', version:
    ''5.1.21''],`

    `                 [group: ''commons-httpclient'', name: ''commons-httpclient'',
    version: ''3.1'']]`

    `    }`

    `    ...`

    `}`


    默认情况下，当 Grails 解析依赖关系时，框架不仅会解析显式声明的依赖关系，还会解析传递性依赖关系。这意味着如果你的应用程序声明了对库 A 的依赖，而库
    A 依赖于库 B，库 B 又依赖于库 C，系统将解析所有这些依赖关系。这通常是可取的，因为如果你的应用程序使用了 A 且 A 依赖于 B，你可能需要 B 存在。但有时你可能希望禁用传递性依赖解析。实现此目的的语法如清单
    11-19 所示。


    ***清单 11-19.** 排除传递性依赖*


    `grails.project.dependency.resolution = {`

    `    ...`

    `    dependencies {`

    `        // 在此处指定依赖关系，可选用 ''build'', ''compile'', ''runtime'', ''test'' 或 ''provided''
    作用域，例如：`


    `        runtime(''mysql:mysql-connector-java:5.1.21'') {`

    `            transitive = false`

    `        }`


    `        // 或者...`

    `        runtime group: ''mysql''`

    `                     name: ''mysql-connector-java''`

    `                     version: ''5.1.21''`

    `                     transitive: false`

    `        // 或者，排除特定依赖关系，同时保留其他所有传递性依赖关系以供解析`

    `        runtime(''mysql:mysql-connector-java:5.1.21'') {`

    `            excludes ''xml-apis'', ''commons-logging''`

    `        }`

    `    }`

    `    ...`

    `}`


    `BuildConfig` 文件的最后一部分是插件部分，你已经多次使用过它。这是你声明应用程序将要使用的插件依赖关系的地方。声明插件依赖关系的语法与声明库依赖关系的语法非常相似，如上所示。一个显著的区别是，插件依赖关系不需要组名，默认组名为
    `org.grails.plugins`。见清单 11-20。


    ***清单 11-20.** 指定插件依赖关系*


    `grails.project.dependency.resolution = {`

    `    ...`


    `    plugins {`

    `        runtime ":hibernate:$grailsVersion"`

    `        runtime ":jquery:1.7.1"`

    `        runtime ":resources:1.1.6"`

    `        runtime ":searchable:0.6.4"`

    `        compile ":cache:1.0.0"`

    `        compile ":rest-client-builder:1.0.2"`

    `        build ":tomcat:$grailsVersion"`

    `    }`

    `}`


    传递性插件解析的工作方式与传递性库解析非常相似。如果你声明了对插件 A 的依赖，而插件 A 依赖于插件 B，那么插件 B 将被解析。插件依赖关系也可以进行排除，就像库依赖关系一样（见清单
    11-21）。


    ***清单 11-21.** 排除传递性插件依赖关系*


    `grails.project.dependency.resolution = {`

    `    ...`


    `    plugins {`

    `        runtime('':someplugin:1.0'') {`

    `            excludes ''pluginA'', ''pluginB''`

    `        }`

    `    }`

    `}`


    ### 理解 Grails 构建系统


    Grails 构建系统由 Gant（[`http://gant.codehaus.org`](http://gant.codehaus.org)）构建工具驱动。Gant
    是 Apache Ant（[`http://ant.apache.org`](http://ant.apache.org)）的一个轻量级封装，Ant 是广受欢迎的
    Java 构建系统。与使用 XML 格式描述构建的 Ant 不同，Gant 使用 Groovy DSL。这样做的好处是，你可以轻松地将构建逻辑与 Groovy
    代码中的脚本混合在一起。清单 11-22 展示了一个典型的 Gant 构建脚本示例。


    ***清单 11-22.** Gant 构建脚本示例*


    `targetDir = "build"`

    `target(clean:"Cleans any compiled sources") {`

    `delete(dir:targetDir) }`


    `target(compile:"The compilation task") {`

    `    depends(clean)`

    `    mkdir(dir:"$targetDir/classes")`

    `    javac(srcdir:"src/java",`

    `          destdir:"$targetDir/classes")`

    `}`

    `target(jar:"Creates a DAR file")  {`

    `    jar(destfile:"$targetDir/app.jar",basedir:"$targetDir/classes")`

    `}`

    `target(dist:"The default task") {`

    `    depends(compile, jar)`

    `}`

    `setDefaultTarget ( dist )`


    请注意，清单 11-10 中的示例通过调用 `target` 方法定义了许多目标。这些目标相当于 Ant 的 `<target>` 标签。此外，如你所见，你可以使用
    `depends` 方法指定目标之间的依赖关系：


    `depends(compile, jar)`


    如果你在 Grails 之外安装 Gant，Gant 通过 `gant` 命令提供自己的命令行界面。`gant` 命令会搜索名为 `build.gant`
    的文件（就像 Ant 查找 `build.xml` 一样），如果找到则尝试调用它。使用 `gant` 命令，你可以调用单个目标或链接多个目标，如下所示：


    `$ gant clean jar`


    此时，你将开始意识到普通 Gant 与 Grails 之间的区别。尽管 Gant 的行为与 Ant 非常相似，但 Grails 将 Gant 封装在其自己的
    `grails` 命令中——也就是你在本书中一直使用的那个命令。`grails` 命令利用 Grails 项目中的约定，尝试自动确定要执行哪个脚本。例如，当你运行命令


    `$ grails create-app`


    Grails 将搜索以下目录，查找名为 `CreateApp.groovy` 的 Gant 脚本并执行：


    > *   `PRODECTHOME/scripts`：当前项目的 `scripts` 目录。

    > *   `GRAILSHOME/scripts`：你安装 Grails 位置的 `scripts` 目录。

    > *   `PLUGINS_HOME/*/scripts`：每个已安装插件的 `scripts` 目录。

    > *   `USERHOME/.grails/scripts`：当前用户主目录下 `.grails` 目录中的 `scripts` 目录。此位置取决于操作系统。


    如果找到匹配的 Gant 脚本，`grails` 命令将执行该 Gant 脚本的*默认*目标。与 `gant` 命令相比，`grails` 命令针对 Grails
    项目布局、插件系统以及轻松传递参数进行了优化。

