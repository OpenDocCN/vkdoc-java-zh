    #### 测试自定义标签


    与 Grails 应用中的大部分代码一样，自定义标签库中的代码也应进行测试。测试标签库可能有些棘手。测试需要一种方式来调用标签、提供参数、提供标签体，并检查调用标签的效果。幸运的是，Grails
    提供了一种非常巧妙的机制来管理这一切。自定义标签库的单元测试应使用 `@TestFor` 注解来指定正在测试哪个标签库。清单 5-45 包含了对之前定义的
    `GtunesTagLib` 类的单元测试。


    ***清单 5-45.** 测试 GtunesTagLib*


    `// test/unit/com/gtunes/GtunesTagLibTests.groovy`

    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `@TestFor(GtunesTagLib)`

    `class GtunesTagLibTests {`


    `    void testRepeatTag() {`

    `        // 定义一段待评估的标记代码`

    `        def template = ''<gt:repeat times="3">Number ${it}<br/></gt:repeat>''`


    `        // 评估该代码片段`

    `        def result = applyTemplate(template)`


    `        // 确保结果符合预期`

    `        def expected = ''Number 1<br/>Number 2<br/>Number 3<br/>''`

    `        assert expected == result`

    `    }`

    `}`


    这里的 `testRepeatTag()` 方法渲染了一段调用 `repeat` 标签的标记代码。实现方式是，将一个代表待评估标记的 `字符串` 作为参数传递给
    `applyTemplate` 方法。`applyTemplate` 方法返回一个 `字符串`，该字符串代表对传入参数进行评估后的结果。测试方法底部的断言检查了预期结果是否被正确渲染。


    如果被评估的字符串是由模型动态驱动的，则可以将该模型作为第二个参数传递给 `applyTemplate` 方法。清单 5-46 展示了一个向 `applyTemplate`
    方法提供模型的示例。


    ***清单 5-46.** 使用模型测试 GtunesTagLib*


    `// test/unit/com/gtunes/GtunesTagLibTests.groovy`

    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `@TestFor(GtunesTagLib)`

    `class GtunesTagLibTests {`


    `    void testRepeatTagWithAModel() {`

    `        // 定义一段待评估的标记代码`

    `        def template =`

    `          ''<gt:repeat times="${someNumber}">Number ${it}<br/></gt:repeat>''`


    `        // 评估该代码片段`

    `        def result = applyTemplate(template, [someNumber: 2])`


    `        // 确保结果符合预期`

    `        def expected = ''Number 1<br/>Number 2<br/>''`

    `        assert expected == result`


    `        // 使用不同的模型评估该代码片段`

    `        result = applyTemplate(template, [someNumber: 4])`


    `        // 确保结果符合预期`

    `        expected = ''Number 1<br/>Number 2<br/>Number 3<br/>Number 4<br/>''`

    `        assert expected == result`

    `    }`

    `}`


    ### 本章小结


    在本章中，你学习了 Grails 中的高级视图技术、GSP，以及与之捆绑的一系列强大标签。你还学习了如何构建和测试你自己的 GSP 标签，并在此过程中进一步扩展了关于
    Groovy 模拟的知识。简而言之，本章涵盖了大量内容，你现在应该对 GSP 的强大功能有了清晰的认识。凭借 GPath、表达式语言和动态标签库，GSP 在提高你的生产力和开发乐趣方面提供了很多价值。


