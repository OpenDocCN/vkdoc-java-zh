- fmt: "#### Data Binding to Multiple Domain Objects\n\nIn the examples of data binding\
    \ you’ve seen so far, the assumption has been that you wish to bind parameters\
    \ to a single domain instance. However, you might encounter a scenario in which\
    \ you must create several domain instances.\n\nConsider, for example, the creation\
    \ of `Artist` instances in the gTunes application. The application might require\
    \ that an `Artist` can exist only if he or she has released at least one `Album`.\
    \ In this case, it makes sense to create both the `Artist` and the first `Album`\
    \ simultaneously.\n\nTo understand data binding when dealing with multiple domain\
    \ instances, you first need to understand how parameters are submitted from forms.\
    \ Consider, for example, the case of updating an `Album` and the line\n\n`album.properties\
    \ = params`\n\nIn this case, the expectation is that parameters are not namespaced\
    \ in any way. In other words, to update the `title` property of the `Album` instance,\
    \ you can provide an HTML input such as the following:\n\n`<input type=\"text\"\
    \ name=\"title\" />`\n\nNotice how the name of the `<input>` matches the property\
    \ name. This clearly would not work in the case of multiple domain classes, because\
    \ you might have two different domain classes that have a property called title.\
    \ You can get around this problem namespacing any parameters passed using a dot:\n\
    \n`<input type=\"text\" name=\"album.title\" />`\n`<input type=\"text\" name=\"\
    artist.name\" />`\n`...`\n\nNow create and bind both `Album` and `Artist` instances\
    \ by referring to them within the `params` object by their respective namespaces:\n\
    \n```\ndef album = new Album( params[\"album\"] )\ndef artist = new Artist( params[\"\
    artist\"] )\n```\n\n#### Data Binding with the bindData Method\n\nThe data-binding\
    \ techniques you have seen so far are automatic and handled implicitly by Grails.\
    \ However, in some circumstances you might need to exercise greater control over\
    \ the data-binding process or bind data to objects other than domain classes.\
    \ To help tackle this issue, Grails provides a `bindData` method that takes the\
    \ object to bind the data to and a `java.util.Map`.\n\nThe map should contain\
    \ keys that match the property names of the target properties within the passed\
    \ object. As an example, if you wanted to ensure only the `title` property was\
    \ bound to an `Album` instance, you could use the code shown in [Listing 4-26](#Chapter04.html#list_4_26).\n\
    \n**Listing 4-26.** Using the bindData Method\n\n```\nclass AlbumController {\n\
    \    def save() {\n        def album = Album.get(params.id)\n        bindData(album,\
    \ params, [include:\"title\"])\n        // ...\n    }\n}\n```\n\nNotice how in\
    \ [Listing 4-26](#Chapter04.html#list_4_26) you can pass the `Album` instance\
    \ as the first argument, and the parameters to bind to the instance as the second\
    \ argument. The final argument is a map specifying that you wish to include only\
    \ the `title` property in the data-binding process. You could change the key within\
    \ the map to exclude if you wished to bind all properties *except* the title property.\n\
    \nFinally, as you saw in the previous section, you can bind to multiple domain\
    \ instances using the default data-binding mechanism in Grails. You can do this\
    \ with the `bindData` method too, using the last argument that specifies the prefix\
    \ to filter by.\n\n```\nbindData(album, params, [include:\"title\"], \"album\"\
    )\n```\n\nIn this example, the prefix `album` is passed as the last argument,\
    \ making the `bindData` method bind all parameters that begin with the `album`\
    \ prefix.\n\n#### Data Binding and Associations\n\nThe final topic to consider\
    \ when doing data binding is how it relates to associations. The easiest case\
    \ to understand is many-to-one and one-to-one associations. For example, consider\
    \ the `artist` property of the `Album` class, which is a many-to-one association,\
    \ as shown in [Listing 4-27](#Chapter04.html#list_4_27).\n\n**Listing 4-27.**\
    \ The artist Association of the Album Class\n\n```\nclass Album {\n    Artist\
    \ artist\n    // ...\n}\n```\n\nYou need to consider two cases when working with\
    \ a many-to-one association like this. The first involves creating new instances.\
    \ Suppose you create a new `Album` instance using this code:\n\n```\ndef album\
    \   = new Album(params)\n```\n\nIn this case, if any parameters reference the\
    \ `artist` association, such as `artist.name`, a new `Artist` instance will be\
    \ automatically instantiated and assigned to the `Album` instance. The names of\
    \ the properties to set are taken from the value of the right side of the dot\
    \ in the request-parameter name. With `artist.name`, the property to set is `name`.\
    \ To further clarify, the following `<input>` tag shows an example of a form field\
    \ that will populate the `artist` association of the `Album` class:\n\n`<input\
    \ type=\"text\" name=\"artist.name\" />`\n\nThe second scenario occurs when you\
    \ are assigning an existing instance of an association (an existing `Artist`,\
    \ for example) or modifying an association. To do this, you need to pass the association’s\
    \ identifier using a request parameter with the `.id` suffix. For example, you\
    \ can use the following `<input>` to specify the `Artist` that should be associated\
    \ with an existing or new `Album`:\n\n`<input type=\"text\" name=\"artist.id\"\
    \ value=\"1\" />`\n\nWith single-ended associations out of the way, let’s consider\
    \ associations that contain multiple objects. For example, an `Album` has many\
    \ `Song` instances in its `songs` associations. What if you wanted to provide\
    \ a form that enabled you to create an `Album` and its associated songs? To enable\
    \ this, you can use subscript-style references to populate or update multiple\
    \ `Song` instances:\n\n`<input type=\"text\" name=\"songs[0].title\" value=\"\
    The Bucket\" />`\n`<input type=\"text\" name=\"songs[1].title\" value=\"Milk\"\
    \ />`\n\nNote that the default collection type for association in Grails is a\
    \ `java.util.Set`, so unless you change the default to `java.util.List`, the order\
    \ of entries will not be retained because `Set` types have no concept of order.\
    \ If you want to create a new `Album` instance and populate the `songs` association\
    \ with an existing collection of songs, then you can just specify their identifiers\
    \ using the `.id` suffix:\n\n`<input type=\"text\" name=\"songs[0].id\" value=\"\
    23\" />`\n`<input type=\"text\" name=\"songs[1].id\" value=\"47\" />`"
  raw: '#### Data Binding to Multiple Domain Objects


    In the examples of data binding you’ve seen so far, the assumption has been that
    you wish to bind parameters to a single domain instance. However, you might encounter
    a scenario in which you must create several domain instances.


    Consider, for example, the creation of `Artist` instances in the gTunes application.
    The application might require that an `Artist` can exist only if he or she has
    released at least one `Album`. In this case, it makes sense to create both the
    `Artist` and the first `Album` simultaneously.


    To understand data binding when dealing with multiple domain instances, you first
    need to understand how parameters are submitted from forms. Consider, for example,
    the case of updating an `Album` and the line


    `album.properties = params`


    In this case, the expectation is that parameters are not namespaced in any way.
    In other words, to update the `title` property of the `Album` instance, you can
    provide an HTML input such as the following:


    `<input type="text" name="title" />`


    Notice how the name of the `<input>` matches the property name. This clearly would
    not work in the case of multiple domain classes, because you might have two different
    domain classes that have a property called title. You can get around this problem
    namespacing any parameters passed using a dot:


    `<input type="text" name="album.title" />`

    `<input type="text" name="artist.name" />`

    `...`


    Now create and bind both `Album` and `Artist` instances by referring to them within
    the `params` object by their respective namespaces:


    `def album = new Album( params["album"] )`

    `def artist = new Artist( params["artist"] )`


    #### Data Binding with the bindData Method


    The data-binding techniques you have seen so far are automatic and handled implicitly
    by Grails. However, in some circumstances you might need to exercise greater control
    over the data-binding process or bind data to objects other than domain classes.
    To help tackle this issue, Grails provides a `bindData` method that takes the
    object to bind the data to and a `java.util.Map`.


    The map should contain keys that match the property names of the target properties
    within the passed object. As an example, if you wanted to ensure only the `title`
    property was bound to an `Album` instance, you could use the code shown in [Listing
    4-26](#Chapter04.html#list_4_26).


    ***Listing 4-26.** Using the bindData Method*


    `class AlbumController {`

    `    def save() {`

    `        def album = Album.get(params.id)`

    `        bindData(album, params, [include:"title"])`

    `        // ...`

    `    }`

    `}`


    Notice how in [Listing 4-26](#Chapter04.html#list_4_26) you can pass the `Album`
    instance as the first argument, and the parameters to bind to the instance as
    the second argument. The final argument is a map specifying that you wish to include
    only the `title` property in the data-binding process. You could change the key
    within the map to exclude if you wished to bind all properties *except* the title
    property.


    Finally, as you saw in the previous section, you can bind to multiple domain instances
    using the default data-binding mechanism in Grails. You can do this with the `bindData`
    method too, using the last argument that specifies the prefix to filter by.


    `bindData(album, params, [include:"title"], "album")`


    In this example, the prefix `album` is passed as the last argument, making the
    `bindData` method bind all parameters that begin with the `album` prefix.


    #### Data Binding and Associations


    The final topic to consider when doing data binding is how it relates to associations.
    The easiest case to understand is many-to-one and one-to-one associations. For
    example, consider the `artist` property of the `Album` class, which is a many-to-one
    association, as shown in [Listing 4-27](#Chapter04.html#list_4_27).


    ***Listing 4-27.** The artist Association of the Album Class*


    `class Album {`

    `    Artist artist`

    `    // ...`

    `}`


    You need to consider two cases when working with a many-to-one association like
    this. The first involves creating new instances. Suppose you create a new `Album`
    instance using this code:


    `def album   = new Album(params)`


    In this case, if any parameters reference the `artist` association, such as `artist.name`,
    a new `Artist` instance will be automatically instantiated and assigned to the
    `Album` instance. The names of the properties to set are taken from the value
    of the right side of the dot in the request-parameter name. With `artist.name`,
    the property to set is `name`. To further clarify, the following `<input>` tag
    shows an example of a form field that will populate the `artist` association of
    the `Album` class:


    `<input type="text" name="artist.name" />`


    The second scenario occurs when you are assigning an existing instance of an association
    (an existing `Artist`, for example) or modifying an association. To do this, you
    need to pass the association’s identifier using a request parameter with the `.id`
    suffix. For example, you can use the following `<input>` to specify the `Artist`
    that should be associated with an existing or new `Album`:


    `<input type="text" name="artist.id" value="1" />`


    With single-ended associations out of the way, let’s consider associations that
    contain multiple objects. For example, an `Album` has many `Song` instances in
    its `songs` associations. What if you wanted to provide a form that enabled you
    to create an `Album` and its associated songs? To enable this, you can use subscript-style
    references to populate or update multiple `Song` instances:


    `<input type="text" name="songs[0].title" value="The Bucket" />`

    `<input type="text" name="songs[1].title" value="Milk" />`


    Note that the default collection type for association in Grails is a `java.util.Set`,
    so unless you change the default to `java.util.List`, the order of entries will
    not be retained because `Set` types have no concept of order. If you want to create
    a new `Album` instance and populate the `songs` association with an existing collection
    of songs, then you can just specify their identifiers using the `.id` suffix:


    `<input type="text" name="songs[0].id" value="23" />`

    `<input type="text" name="songs[1].id" value="47" />`'
  trans: '

    #### 数据绑定到多个领域对象


    在迄今为止所见的数据绑定示例中，都假设您希望将参数绑定到单个领域实例。然而，您可能会遇到需要创建多个领域实例的场景。


    例如，考虑在 gTunes 应用程序中创建 `Artist` 实例的情况。应用程序可能要求一个 `Artist` 只有在至少发布了一张 `Album` 时才能存在。在这种情况下，同时创建
    `Artist` 和第一张 `Album` 是合理的。


    要理解处理多个领域实例时的数据绑定，首先需要了解参数是如何从表单提交的。例如，考虑更新一个 `Album` 的情况以及这行代码：


    `album.properties = params`


    在这种情况下，期望参数不以任何方式进行命名空间化。换句话说，要更新 `Album` 实例的 `title` 属性，您可以提供一个如下的 HTML 输入：


    `<input type="text" name="title" />`


    请注意 `<input>` 的 name 属性如何与属性名匹配。这在多个领域类的情况下显然行不通，因为您可能有两个不同的领域类都拥有名为 title 的属性。您可以通过使用点号对传递的任何参数进行命名空间化来解决这个问题：


    `<input type="text" name="album.title" />`

    `<input type="text" name="artist.name" />`

    `...`


    现在，通过在 `params` 对象中按其各自的命名空间引用它们，来创建并绑定 `Album` 和 `Artist` 实例：


    `def album = new Album( params["album"] )`

    `def artist = new Artist( params["artist"] )`


    #### 使用 bindData 方法进行数据绑定


    您目前所见的数据绑定技术是自动的，并由 Grails 隐式处理。然而，在某些情况下，您可能需要对数据绑定过程进行更精细的控制，或者将数据绑定到领域类以外的对象。为了帮助解决这个问题，Grails
    提供了一个 `bindData` 方法，该方法接受要绑定数据的对象和一个 `java.util.Map`。


    该映射应包含与传入对象中目标属性名称匹配的键。例如，如果您只想确保 `title` 属性被绑定到 `Album` 实例，您可以使用清单 4-26 中所示的代码。


    ***清单 4-26.** 使用 bindData 方法*


    `class AlbumController {`

    `    def save() {`

    `        def album = Album.get(params.id)`

    `        bindData(album, params, [include:"title"])`

    `        // ...`

    `    }`

    `}`


    请注意在清单 4-26 中，您可以将 `Album` 实例作为第一个参数传递，将要绑定到该实例的参数作为第二个参数传递。最后一个参数是一个映射，指定您希望仅在数据绑定过程中包含
    `title` 属性。如果您希望绑定除 title 属性之外的*所有*属性，您可以将映射中的键改为 exclude。


    最后，正如您在上一节中所见，您可以使用 Grails 中的默认数据绑定机制绑定到多个领域实例。您也可以使用 `bindData` 方法做到这一点，使用最后一个参数来指定要过滤的前缀。


    `bindData(album, params, [include:"title"], "album")`


    在这个例子中，前缀 `album` 作为最后一个参数传递，使得 `bindData` 方法绑定所有以 `album` 前缀开头的参数。


    #### 数据绑定与关联


    进行数据绑定时要考虑的最后一个主题是它如何与关联相关联。最容易理解的情况是多对一和一对一关联。例如，考虑 `Album` 类的 `artist` 属性，它是一个多对一关联，如清单
    4-27 所示。


    ***清单 4-27.** Album 类的 artist 关联*


    `class Album {`

    `    Artist artist`

    `    // ...`

    `}`


    在处理像这样的多对一关联时，您需要考虑两种情况。第一种情况涉及创建新实例。假设您使用以下代码创建一个新的 `Album` 实例：


    `def album   = new Album(params)`


    在这种情况下，如果有任何参数引用了 `artist` 关联，例如 `artist.name`，则会自动实例化一个新的 `Artist` 实例并将其分配给 `Album`
    实例。要设置的属性名称取自请求参数名称中点号右侧的值。对于 `artist.name`，要设置的属性是 `name`。为了进一步说明，以下 `<input>`
    标签展示了一个表单字段的示例，该字段将填充 `Album` 类的 `artist` 关联：


    `<input type="text" name="artist.name" />`


    第二种情况发生在您分配一个关联的现有实例（例如，一个现有的 `Artist`）或修改一个关联时。为此，您需要使用带有 `.id` 后缀的请求参数传递关联的标识符。例如，您可以使用以下
    `<input>` 来指定应与现有或新的 `Album` 关联的 `Artist`：


    `<input type="text" name="artist.id" value="1" />`


    处理完单端关联后，让我们考虑包含多个对象的关联。例如，一个 `Album` 在其 `songs` 关联中拥有多个 `Song` 实例。如果您想提供一个表单来创建
    `Album` 及其关联的歌曲，该怎么办？为了实现这一点，您可以使用下标风格的引用来填充或更新多个 `Song` 实例：


    `<input type="text" name="songs[0].title" value="The Bucket" />`

    `<input type="text" name="songs[1].title" value="Milk" />`


    请注意，Grails 中关联的默认集合类型是 `java.util.Set`，因此除非您将默认值更改为 `java.util.List`，否则条目的顺序将不会保留，因为
    `Set` 类型没有顺序的概念。如果您想创建一个新的 `Album` 实例并使用现有的歌曲集合填充 `songs` 关联，那么您只需使用 `.id` 后缀指定它们的标识符即可：


    `<input type="text" name="songs[0].id" value="23" />`

    `<input type="text" name="songs[1].id" value="47" />`

    '
- fmt: "#### The Bindable Constraint\n\nAs mentioned earlier, the default data binding\
    \ mechanism will bind all properties which are not static, not transient and not\
    \ dynamically typed. The `bindData` method allows white lists and black lists\
    \ to be provided to gain more control over which properties are assigned values\
    \ during data binding. An additional technique supported by the framework is to\
    \ be explicit about which properties are bindable in a declarative way. Having\
    \ done that, whenever data binding is carried out without supplying a white list\
    \ or a black list, only properties configured to be bindable will be assigned\
    \ values during data binding. [Listing 4-28](#Chapter04.html#list_4_28) demonstrates\
    \ the syntax for expressing the bindability of individual properties.\n\n***Listing\
    \ 4-28.** The bindable Constraint*\n\n```\nclass User {\n    /* userName and salary\
    \ would be bindable by default */\n    String userName\n    BigDecimal salary\n\
    \n    /* group and numberOfActiveGroups would not be bindable by default */\n\
    \    def group\n    transient int numberOfActiveGroups\n\n    static constraints\
    \ = {\n        salary bindable: false\n        group bindable: true\n    }\n}\n\
    ```\n\nIf an instance of the `User` class defined in [Listing 4-28](#Chapter04.html#list_4_28)\
    \ were created and data binding was carried out with something like `user.properties\
    \ = params`, only the `userName` and `group` properties would be subject to data\
    \ binding. Normally the `salary` property would be subject to data binding, but\
    \ expressing `bindable: false` for the property in the `constraints` block tells\
    \ the framework otherwise. The `salary` property would not be subject to data\
    \ binding because `bindable: false` is expressed for that property in the `constraints`\
    \ block. The `numberOfActiveGroups` property would not be subject to data binding\
    \ because it is transient.\n\n### Working with Command Objects\n\nSometimes a\
    \ particular action doesn’t require the involvement of a domain class but still\
    \ requires the validation of user input. In this case, you might want to consider\
    \ using a command object. A command object is a class that has all the data-binding\
    \ and data-validation capabilities of a domain class but is not persistent. In\
    \ other words, you can define constraints of a command object and validate them\
    \ just like a domain class.\n\n#### Defining Command Objects\n\nA command object\
    \ requires the definition of class, just as with any other object. You can define\
    \ command classes in the `grails-app/controllers` directory or even in the same\
    \ file as a controller. Unlike Java, Groovy supports the notion of multiple class\
    \ definitions per file, which is quite handy if you plan to use a particular command\
    \ object only for the controller you’re working with.\n\nFor example, you could\
    \ define an `AlbumCreateCommand` that encapsulates the validation and creation\
    \ of new `Album` instances before they are saved. [Listing 4-29](#Chapter04.html#list_4_29)\
    \ presents such an example.\n\n***Listing 4-29.** An Example Command Object Definition*\n\
    \n```\nclass AlbumCreateCommand {\n    String artist\n    String title\n    List\
    \ songs = []\n    List durations = []\n\n    static constraints = {\n        artist\
    \ blank:false\n        title blank:false\n        songs minSize:1, validator:{\
    \ val, obj ->\n            if(val.size() != obj.durations.size())\n          \
    \      return \"songs.durations.not.equal.size\"\n        }        \n    }\n\n\
    \    Album createAlbum() {\n        def artist = Artist.findByName(artist) ?:\
    \ new Artist(name:artist)\n        def album = new Album(title:title)\n      \
    \  songs.eachWithIndex { songTitle, i ->\n            album.addToSongs(title:songTitle,\
    \ duration:durations[i])\n        }\n        return album\n     }\n}\n```\n\n\
    In [Listing 4-29](#Chapter04.html#list_4_29), you can see a command-object definition\
    \ that is designed to capture everything necessary to subsequently create a valid\
    \ `Album` instance. Notice how you can define constraints on a command object,\
    \ just as in a domain class. The `createAlbum()` method, which is optional, is\
    \ interesting because it shows how you can use command objects as factories that\
    \ take a valid set of data and construct your domain instances. In the next section,\
    \ you’ll see how to take advantage of the command object in [Listing 4-29](#Chapter04.html#list_4_29).\n\
    \n#### Using Command Objects\n\nIn order to use a command object, you need to\
    \ specify the command as the first argument in a controller action. For example,\
    \ to use `AlbumCreateCommand`, you need to have a `save` action, such as the one\
    \ shown in [Listing 4-30](#Chapter04.html#list_4_30).\n\n***Listing 4-30.** Using\
    \ a Command Object*\n\n```\nclass AlbumController {\n    def save(AlbumCreateCommand\
    \ cmd) {\n        // ...\n    }\n}\n```\n\nYou need to explicitly define the command\
    \ object using its type definition as the first argument to the action. Here’s\
    \ what happens next: when a request comes in, Grails will automatically create\
    \ a new instance, bind the incoming request parameters to the properties of the\
    \ instance, and pass it to you as the first argument.\n\nProviding the request\
    \ parameters to a command like this is pretty trivial. [Listing 4-31](#Chapter04.html#list_4_31)\
    \ shows an example form.\n\n***Listing 4-31.** Providing a Form to Populate the\
    \ Data*\n\n```\n<g:form url=\"[controller: 'album', action: 'save'] \">\n    \
    \   Title: <input type=\"text\" name=\"title\" /> <br>\n       Artist: <input\
    \ type=\"text\" name=\"artist\" /> <br>\n                Song 1: <input type=\"\
    text\" name=\"songs[0]\" /> <br>\n                Song 2: <input type=\"text\"\
    \ name=\"songs[1]\" /> <br>\n       ...\n</g:form>\n```\n\nYou’ll probably want\
    \ to make the input of the songs dynamic using some JavaScript; nevertheless,\
    \ you can see the concept in [Listing 4-31](#Chapter04.html#list_4_31). Once you’ve\
    \ given the user the ability to enter data and you’re capturing said data using\
    \ the command object, all you need to do is validate it. Not all command objects\
    \ are validateable. In order for a command object to be validateable, the source\
    \ code for the command object class must be defined in the same source file as\
    \ a controller that uses the command object, or the command object class must\
    \ be marked with the `grails.validation.Validateable` annotation. Note that the\
    \ `grails.validation.Validateable` annotation is not only for command object classes\
    \ but may be applied to any Groovy class that should have validation behavior\
    \ associated with it. [Listing 4-32](#Chapter04.html#list_4_32) shows how the\
    \ `save` action’s logic might look with the command object in use.\n\n***Listing\
    \ 4-32.** Using the Command Object for Validation*\n\n```\ndef save(AlbumCreateCommand\
    \ cmd) {\n      if(cmd.validate()) {\n            def album = cmd.createAlbum()\n\
    \            album.save()\n            redirect(action:\"show\", id:album.id)\n\
    \       }\n       else {\n            render(view:\"create\", model:[cmd:cmd])\n\
    \        }\n}\n```\n\nAs you can see, it’s now the command object that is ensuring\
    \ the validity of the request, and we’re using it as a factory to construct a\
    \ perfectly valid `Album` instance. As with domain classes, command objects have\
    \ an `Errors` object, so you can use the `<g:renderErrors>` tag to display validation\
    \ errors to the user.\n\n```\n<g:renderErrors bean=\"{cmd}\" />\n```\n\n### Imposing\
    \ HTTP Method Restrictions\n\nOften a web application needs to impose restrictions\
    \ on which HTTP request methods are allowed for a specific controller action.\
    \ For example, it is generally considered a bad idea for a controller action to\
    \ carry out any destructive operation in response to an HTTP `GET`. Such operations\
    \ should be limited to HTTP `POST` and `DELETE`."
  raw: '#### The Bindable Constraint


    As mentioned earlier, the default data binding mechanism will bind all properties
    which are not static, not transient and not dynamically typed. The `bindData`
    method allows white lists and black lists to be provided to gain more control
    over which properties are assigned values during data binding. An additional technique
    supported by the framework is to be explicit about which properties are bindable
    in a declarative way. Having done that, whenever data binding is carried out without
    supplying a white list or a black list, only properties configured to be bindable
    will be assigned values during data binding. [Listing 4-28](#Chapter04.html#list_4_28)
    demonstrates the syntax for expressing the bindability of individual properties.


    ***Listing 4-28.** The bindable Constraint*


    `class User {`

    `    /* userName and salary would be bindable by default */`

    `    String userName`

    `    BigDecimal salary`


    `    /* group and numberOfActiveGroups would not be bindable by default */`

    `    def group`

    `    transient int numberOfActiveGroups`


    `    static constraints = {`

    `        salary bindable: false`

    `        group bindable: true`

    `    }`

    `}`


    If an instance of the User class defined in [Listing 4-28](#Chapter04.html#list_4_28)
    were created and data binding was carried out with something like `user.properties
    = params`, only the `userName` and `group` properties would be subject to data
    binding. Normally the `salary` property would be subject to data binding, but
    expressing `bindable: false` for the property in the `constraints` block tells
    the framework otherwise. The `salary` property would not be subject to data binding
    because `bindable: false` is expressed for that property in the `constraints`
    block. The `numberOfActiveGroups` property would not be subject to data binding
    because it is transient.


    ### Working with Command Objects


    Sometimes a particular action doesn’t require the involvement of a domain class
    but still requires the validation of user input. In this case, you might want
    to consider using a command object. A command object is a class that has all the
    data-binding and data-validation capabilities of a domain class but is not persistent.
    In other words, you can define constraints of a command object and validate them
    just like a domain class.


    #### Defining Command Objects


    A command object requires the definition of class, just as with any other object.
    You can define command classes in the `grails-app/controllers` directory or even
    in the same file as a controller. Unlike Java, Groovy supports the notion of multiple
    class definitions per file, which is quite handy if you plan to use a particular
    command object only for the controller you’re working with.


    For example, you could define an `AlbumCreateCommand` that encapsulates the validation
    and creation of new `Album` instances before they are saved. [Listing 4-29](#Chapter04.html#list_4_29)
    presents such an example.


    ***Listing 4-29.** An Example Command Object Definition*


    `class AlbumCreateCommand {`

    `    String artist`

    `    String title`

    `    List songs = []`

    `    List durations = []`


    `    static constraints = {`

    `        artist blank:false`

    `        title blank:false`

    `        songs minSize:1, validator:{ val, obj ->`

    `            if(val.size() != obj.durations.size())`

    `                return "songs.durations.not.equal.size"`

    `        }        `

    `    }`


    `    Album createAlbum() {`

    `        def artist = Artist.findByName(artist) ?: new Artist(name:artist)`

    `        def album = new Album(title:title)`

    `        songs.eachWithIndex { songTitle, i ->`

    `            album.addToSongs(title:songTitle, duration:durations[i])`

    `        }`

    `        return album`

    `     }`

    `}`


    In [Listing 4-29](#Chapter04.html#list_4_29), you can see a command-object definition
    that is designed to capture everything necessary to subsequently create a valid
    `Album` instance. Notice how you can define constraints on a command object, just
    as in a domain class. The `createAlbum()` method, which is optional, is interesting
    because it shows how you can use command objects as factories that take a valid
    set of data and construct your domain instances. In the next section, you’ll see
    how to take advantage of the command object in [Listing 4-29](#Chapter04.html#list_4_29).


    #### Using Command Objects


    In order to use a command object, you need to specify the command as the first
    argument in a controller action. For example, to use AlbumCreateCommand, you need
    to have a `save` action, such as the one shown in [Listing 4-30](#Chapter04.html#list_4_30).


    ***Listing 4-30.** Using a Command Object*


    `class AlbumController {`

    `    def save(AlbumCreateCommand cmd) {`

    `        // ...`

    `    }`

    `}`


    You need to explicitly define the command object using its type definition as
    the first argument to the action. Here’s what happens next: when a request comes
    in, Grails will automatically create a new instance, bind the incoming request
    parameters to the properties of the instance, and pass it to you as the first
    argument.


    Providing the request parameters to a command like this is pretty trivial. [Listing
    4-31](#Chapter04.html#list_4_31) shows an example form.


    ***Listing 4-31.** Providing a Form to Populate the Data*


    `<g:form url="[controller: ''album'', action: ''save''] ">`

    `       Title: <input type="text" name="title" /> <br>`

    `       Artist: <input type="text" name="artist" /> <br>`

    `                Song 1: <input type="text" name="songs[0]" /> <br>`

    `                Song 2: <input type="text" name="songs[1]" /> <br>`

    `       ...`

    `</g:form>`


    You’ll probably want to make the input of the songs dynamic using some JavaScript;
    nevertheless, you can see the concept in [Listing 4-31](#Chapter04.html#list_4_31).
    Once you’ve given the user the ability to enter data and you’re capturing said
    data using the command object, all you need to do is validate it. Not all command
    objects are validateable. In order for a command object to be validateable, the
    source code for the command object class must be defined in the same source file
    as a controller that uses the command object, or the command object class must
    be marked with the `grails.validation.Validateable` annotation. Note that the
    `grails.validation.Validateable` annotation is not only for command object classes
    but may be applied to any Groovy class that should have validation behavior associated
    with it. [Listing 4-32](#Chapter04.html#list_4_32) shows how the `save` action’s
    logic might look with the command object in use.


    ***Listing 4-32.** Using the Command Object for Validation*


    `def save(AlbumCreateCommand cmd) {`

    `      if(cmd.validate()) {`

    `            def album = cmd.createAlbum()`

    `            album.save()`

    `            redirect(action:"show", id:album.id)`

    `       }`

    `       else {`

    `            render(view:"create", model:[cmd:cmd])`

    `        }`

    `}`


    As you can see, it’s now the command object that is ensuring the validity of the
    request, and we’re using it as a factory to construct a perfectly valid `Album`
    instance. As with domain classes, command objects have an `Errors` object, so
    you can use the `<g:renderErrors>` tag to display validation errors to the user.


    `<g:renderErrors bean="{cmd}" />`


    ### Imposing HTTP Method Restrictions


    Often a web application needs to impose restrictions on which HTTP request methods
    are allowed for a specific controller action. For example, it is generally considered
    a bad idea for a controller action to carry out any destructive operation in response
    to an HTTP `GET`. Such operations should be limited to HTTP `POST` and `DELETE`.'
