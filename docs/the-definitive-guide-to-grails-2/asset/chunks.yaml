- fmt: "### Testing a Custom Tag\n\nAs is true for most of your code in a Grails application,\
    \ the code in custom tag libraries should be tested. Testing a tag library can\
    \ be tricky. The test needs a way to invoke a tag, provide parameters, provide\
    \ a body, and inspect the effect of invoking the tag. Fortunately, Grails provides\
    \ a really slick mechanism for managing all of that. Unit tests for custom tag\
    \ libraries should use the `@TestFor` annotation to specify which tag library\
    \ is being tested. [Listing 5-45](#Chapter05.html#list_5_45) contains a unit test\
    \ for the `GtunesTagLib` class defined earlier.\n\n**Listing 5-45.** Testing `GtunesTagLib`\n\
    \n```\n// test/unit/com/gtunes/GtunesTagLibTests.groovy\npackage com.gtunes\n\n\
    import grails.test.mixin.*\nimport org.junit.*\n\n@TestFor(GtunesTagLib)\nclass\
    \ GtunesTagLibTests {\n\n    void testRepeatTag() {\n        // define a snippet\
    \ of markup to evaluate\n        def template = '<gt:repeat times=\"3\">Number\
    \ ${it}<br/></gt:repeat>'\n\n        // evaluate the snippet\n        def result\
    \ = applyTemplate(template)\n\n        // make sure the result contains what we\
    \ expect\n        def expected = 'Number 1<br/>Number 2<br/>Number 3<br/>'\n \
    \       assert expected == result\n    }\n}\n```\n\nThe `testRepeatTag()` method\
    \ here renders a block of markup that invokes the `repeat` tag. The way to do\
    \ this is to pass a `string`, representing the markup to be evaluated, as an argument\
    \ to the `applyTemplate` method. The `applyTemplate` method returns a `string`\
    \ that represents the result of evaluating the `string` that was passed as an\
    \ argument. The assertion at the bottom of the test method checks that the expected\
    \ result was rendered.\n\nIf the string being evaluated is dynamically driven\
    \ by a model, the model may be passed as a second argument to the `applyTemplate`\
    \ method. [Listing 5-46](#Chapter05.html#list_5_46) shows an example of a model\
    \ supplied to the `applyTemplate` method.\n\n**Listing 5-46.** Testing `GtunesTagLib`\
    \ with a Model\n\n```\n// test/unit/com/gtunes/GtunesTagLibTests.groovy\npackage\
    \ com.gtunes\n\nimport grails.test.mixin.*\nimport org.junit.*\n\n@TestFor(GtunesTagLib)\n\
    class GtunesTagLibTests {\n\n    void testRepeatTagWithAModel() {\n        //\
    \ define a snippet of markup to evaluate\n        def template =\n          '<gt:repeat\
    \ times=\"${someNumber}\">Number ${it}<br/></gt:repeat>'\n\n        // evaluate\
    \ the snippet\n        def result = applyTemplate(template, [someNumber: 2])\n\
    \n        // make sure the result contains what we expect\n        def expected\
    \ = 'Number 1<br/>Number 2<br/>'\n        assert expected == result\n\n      \
    \  // evaluate the snippet with a different model\n        result = applyTemplate(template,\
    \ [someNumber: 4])\n\n        // make sure the result contains what we expect\n\
    \        expected = 'Number 1<br/>Number 2<br/>Number 3<br/>Number 4<br/>'\n \
    \       assert expected == result\n    }\n}\n```\n\n### Summary\n\nIn this chapter\
    \ you learned about the advanced view technology in Grails, about GSP, and about\
    \ the array of powerful tags that come packaged with it. You also learned how\
    \ to build and test your own GSP tags, and you further extended your knowledge\
    \ of Groovy mocking in the process. In short, a lot of ground was covered, and\
    \ you should now have a clear idea of how powerful GSP is. What with GPath, an\
    \ expression language, and dynamic tag libraries, GSP has a lot to offer in terms\
    \ of increasing your productivity and enjoyment.\n\n## CHAPTER 6\n\n![Image](images/3squ.jpg)\n\
    \n## Mapping URLs\n\nGrails provides working URL mappings right out of the box.\
    \ The default URL mapping configuration is yet one more place that the Grails\
    \ framework leverages the powerful idea of convention over configuration to lessen\
    \ the burden put on the application developer. Sometimes, though, you will want\
    \ to deviate from the convention and define your own custom mappings. For example,\
    \ you may want to create more descriptive and human-readable URLs. Grails gives\
    \ you the ability to easily define these custom URL mappings.\n\nDefining application-specific\
    \ URL mappings is something that comes up all the time while building web applications.\
    \ The technique for configuring URL mappings in Grails is really powerful while\
    \ remaining very simple to work with. Like a lot of configuration options in a\
    \ Grails application, configuring custom URL mappings involves writing a little\
    \ bit of Groovy code, and that’s it. In particular, no XML configuration files\
    \ are involved. This chapter will describe the flexible URL mapping system provided\
    \ by Grails and demonstrate how to manage both forward and reverse URL lookups,\
    \ how to map requests to controller actions or views, and how to map exceptions\
    \ to controller actions and views, as well as demonstrating how to test all of\
    \ these actions.\n\n### Understanding the Default URL Mapping\n\nThe default URL\
    \ mapping configuration in a Grails app is simple. The first part of the URL corresponds\
    \ to the name of a controller, and the second, optional part of the URL corresponds\
    \ to the name of an action defined in that controller. For example, the `/store/index`\
    \ URL will map to the `index` action in the `StoreController`. Specifying the\
    \ action name is optional, so if the action name is left out of the URL, then\
    \ the default action for the specified controller will be executed. Default controller\
    \ actions are described in detail in the “Setting the Default Action” section\
    \ of [Chapter 4](#Chapter04.html). Finally, the last piece of the URL is another\
    \ optional element that represents the value of a request parameter named `id`.\
    \ For example, the `/album/show/42` URL will map to the `show` action in the `AlbumController`\
    \ with a request parameter named `id` that has a value of `42`.\n\nThe definition\
    \ of the default mapping is in `grails-app/conf/UrlMappings.groovy`. [Listing\
    \ 6-1](#Chapter06.html#list_6_1) shows what `UrlMappings.groovy` looks like by\
    \ default.\n\n**Listing 6-1.** Default `grails-app/conf/UrlMappings.groovy`\n\n\
    ```\nclass UrlMappings {\n    static mappings = {\n        \"/$controller/$action?/$id?\"\
    {\n            constraints {\n                // apply constraints here\n    \
    \        }\n        }\n        \"500\"(view:'/error')\n    }\n}\n```\n\nThe key\
    \ to this mapping is the string `\"/$controller/$action?/$id?\"`. Notice that\
    \ the `$action` and `$id` elements are both followed by a question mark. The question\
    \ mark indicates an optional piece of the URL. The `$controller` element has no\
    \ question mark, so it is a required piece of the URL. A mapping can define any\
    \ number of optional elements. If a mapping does contain any optional elements,\
    \ they must all appear at the end of the pattern.\n\n![Image](images/square.jpg)\
    \ **Note** The constraints block in the default mapping is empty. The constraints\
    \ block is optional and will be discussed in the “Applying Constraints to URL\
    \ Mappings” section later in this chapter. The mapping that begins with `\"500\"\
    ` will be discussed later in the “Mapping HTTP Response Codes” section.\n\n###\
    \ Including Static Text in a URL Mapping\n\nIn the default mapping, each of the\
    \ elements in the URL is a variable. Variable elements are prefixed with a `$`\
    \ sign. A URL mapping can contain static elements as well. A static element in\
    \ a URL mapping is simply text that must be part of the URL in order for a particular\
    \ mapping to apply. See [Listing 6-2](#Chapter06.html#list_6_2) for an example\
    \ of a mapping that contains static text.\n\n**Listing 6-2.** Including Static\
    \ Text in a Mapping\n\n```\nclass UrlMappings { static mappings = {\n    \"/showAlbum/$controller/$action?/$id?\"\
    \ {\n        constraints {\n            // apply constraints here\n        }\n\
    \    }\n}\n```\n\nThis mapping will match URLs such as `/showAlbum/album/show/42`\
    \ and `/showAlbum/album/list` but will not match a URL such as `/album/show/42`\
    \ since that one does not begin with `/showAlbum`."
  raw: '#### Testing a Custom Tag


    As is true for most of your code in a Grails application, the code in custom tag
    libraries should be tested. Testing a tag library can be tricky. The test needs
    a way to invoke a tag, provide parameters, provide a body, and inspect the effect
    of invoking the tag. Fortunately, Grails provides a really slick mechanism for
    managing all of that. Unit tests for custom tag libraries should use the `@TestFor`
    annotation to specify which tag library is being tested. [Listing 5-45](#Chapter05.html#list_5_45)
    contains a unit test for the `GtunesTagLib` class defined earlier.


    ***Listing 5-45.** Testing GtunesTagLib*


    `// test/unit/com/gtunes/GtunesTagLibTests.groovy`

    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `@TestFor(GtunesTagLib)`

    `class GtunesTagLibTests {`


    `    void testRepeatTag() {`

    `        // define a snippet of markup to evaluate`

    `        def template = ''<gt:repeat times="3">Number ${it}<br/></gt:repeat>''`


    `        // evaluate the snippet`

    `        def result = applyTemplate(template)`


    `        // make sure the result contains what we expect`

    `        def expected = ''Number 1<br/>Number 2<br/>Number 3<br/>''`

    `        assert expected == result`

    `    }`

    `}`


    The `testRepeatTag()` method here renders a block of markup that invokes the `repeat`
    tag. The way to do this is to pass a `string,` representing the markup to be evaluated,
    as an argument to the `applyTemplate` method. The `applyTemplate` method returns
    a `string` that represents the result of evaluating the `string` that was passed
    as an argument. The assertion at the bottom of the test method checks that the
    expected result was rendered.


    If the string being evaluated is dynamically driven by a model, the model may
    be passed as a second argument to the `applyTemplate` method. [Listing 5-46](#Chapter05.html#list_5_46)
    shows an example of a model supplied to the `applyTemplate` method.


    ***Listing 5-46.** Testing GtunesTagLib with a Model*


    `// test/unit/com/gtunes/GtunesTagLibTests.groovy`

    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `@TestFor(GtunesTagLib)`

    `class GtunesTagLibTests {`


    `    void testRepeatTagWithAModel() {`

    `        // define a snippet of markup to evaluate`

    `        def template =`

    `          ''<gt:repeat times="${someNumber}">Number ${it}<br/></gt:repeat>''`


    `        // evaluate the snippet`

    `        def result = applyTemplate(template, [someNumber: 2])`


    `        // make sure the result contains what we expect`

    `        def expected = ''Number 1<br/>Number 2<br/>''`

    `        assert expected == result`


    `        // evaluate the snippet with a different model`

    `        result = applyTemplate(template, [someNumber: 4])`


    `        // make sure the result contains what we expect`

    `        expected = ''Number 1<br/>Number 2<br/>Number 3<br/>Number 4<br/>''`

    `        assert expected == result`

    `    }`

    `}`


    ### Summary


    In this chapter you learned about the advanced view technology in Grails, about
    GSP, and about the array of powerful tags that come packaged with it. You also
    learned how to build and test your own GSP tags, and you further extended your
    knowledge of Groovy mocking in the process. In short, a lot of ground was covered,
    and you should now have a clear idea of how powerful GSP is. What with GPath,
    an expression language, and dynamic tag libraries, GSP has a lot to offer in terms
    of increasing your productivity and enjoyment.


    ## CHAPTER 6


    ![Image](images/3squ.jpg)


    ## Mapping URLs


    Grails provides working URL mappings right out of the box. The default URL mapping
    configuration is yet one more place that the Grails framework leverages the powerful
    idea of convention over configuration to lessen the burden put on the application
    developer. Sometimes, though, you will want to deviate from the convention and
    define your own custom mappings. For example, you may want to create more descriptive
    and human-readable URLs. Grails gives you the ability to easily define these custom
    URL mappings.


    Defining application-specific URL mappings is something that comes up all the
    time while building web applications. The technique for configuring URL mappings
    in Grails is really powerful while remaining very simple to work with. Like a
    lot of configuration options in a Grails application, configuring custom URL mappings
    involves writing a little bit of Groovy code, and that’s it. In particular, no
    XML configuration files are involved. This chapter will describe the flexible
    URL mapping system provided by Grails and demonstrate how to manage both forward
    and reverse URL lookups, how to map requests to controller actions or views, and
    how to map exceptions to controller actions and views, as well as demonstrating
    how to test all of these actions.


    ### Understanding the Default URL Mapping


    The default URL mapping configuration in a Grails app is simple. The first part
    of the URL corresponds to the name of a controller, and the second, optional part
    of the URL corresponds to the name of an action defined in that controller. For
    example, the `/store/index` URL will map to the `index` action in the `StoreController`.
    Specifying the action name is optional, so if the action name is left out of the
    URL, then the default action for the specified controller will be executed. Default
    controller actions are described in detail in the “Setting the Default Action”
    section of [Chapter 4](#Chapter04.html). Finally, the last piece of the URL is
    another optional element that represents the value of a request parameter named
    id. For example, the `/album/show/42` URL will map to the `show` action in the
    `AlbumController` with a request parameter named `id` that has a value of `42`.


    The definition of the default mapping is in `grails-app/conf/UrlMappings.groovy`.
    [Listing 6-1](#Chapter06.html#list_6_1) shows what `UrlMappings.groovy` looks
    like by default.


    ***Listing 6-1.** Default grails-app/conf/UrlMappings.groovy*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/$controller/$action?/$id?"{`

    `            constraints {`

    `                // apply constraints here`

    `            }`

    `        }`

    `        "500"(view:''/error'')`

    `    }`

    `}`


    The key to this mapping is the string `"/$controller/$action?/$id?"`. Notice that
    the `$action` and `$id` elements are both followed by a question mark. The question
    mark indicates an optional piece of the URL. The `$controller` element has no
    question mark, so it is a required piece of the URL. A mapping can define any
    number of optional elements. If a mapping does contain any optional elements,
    they must all appear at the end of the pattern.


    ![Image](images/square.jpg) **Note**  The constraints block in the default mapping
    is empty. The constraints block is optional and will be discussed in the “Applying
    Constraints to URL Mappings” section later in this chapter. The mapping that begins
    with “500” will be discussed later in the “Mapping HTTP Response Codes” section.


    ### Including Static Text in a URL Mapping


    In the default mapping, each of the elements in the URL is a variable. Variable
    elements are prefixed with a `$` sign. A URL mapping can contain static elements
    as well. A static element in a URL mapping is simply text that must be part of
    the URL in order for a particular mapping to apply. See [Listing 6-2](#Chapter06.html#list_6_2)
    for an example of a mapping that contains static text.


    ***Listing 6-2.** Including Static Text in a Mapping*


    `class UrlMappings { static mappings = {`

    `    "/showAlbum/$controller/$action?/$id?" {`

    `        constraints {`

    `            // apply constraints here`

    `        }`

    `    }`

    `}`


    This mapping will match URLs such as `/showAlbum/album/show/42` and `/showAlbum/album/list`
    but will not match a URL such as `/album/show/42` since that one does not begin
    with `/showAlbum`.'
