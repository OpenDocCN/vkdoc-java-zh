- fmt: "### Testing Services\n\nSince much of your business logic and complexity is\
    \ encapsulated in services, it is important that these components be tested. As\
    \ far as tests are concerned, a service is just another class and can be tested\
    \ as such. The unit testing support provided for services is similar to that provided\
    \ for other artefact types.\n\n[Listing 10-13](#Chapter10.html#list_10_13) shows\
    \ the default test that was created by the `create-service` command.\n\n**Listing\
    \ 10-13.** Default Service Unit Test Template\n\n```\npackage com.gtunes\n\nimport\
    \ grails.test.mixin.*\nimport org.junit.*\n\n/**\n * See the API for {@link grails.test.mixin.services.ServiceUnitTestMixin}\
    \ for usage instructions\n */\n@TestFor(AlbumArtService)\nclass AlbumArtServiceTests\
    \ {\n\n    void testSomething() {\n        fail \"Implement me\"\n    }\n}\n```\n\
    \nTo test the `AlbumArtService`, fill that out using standard Groovy unit-testing\
    \ techniques. See [Listing 10-14](#Chapter10.html#list_10_14).\n\n**Listing 10-14.**\
    \ Unit-Testing `AlbumArtService`\n\n```\npackage com.gtunes\n\nimport grails.plugins.rest.client.RestBuilder\n\
    import groovy.mock.interceptor.MockFor\nimport grails.test.mixin.*\n//import org.junit.*\n\
    \n/**\n * See the API for {@link grails.test.mixin.services.ServiceUnitTestMixin}\
    \ for usage instructions\n */\n@TestFor(AlbumArtService)\nclass AlbumArtServiceTests\
    \ {\n\n    void testNullAlbumAndArtist() {\n        def result = service.getAlbumArt(null,\
    \ null)                  \n                                     assert AlbumArtService.DEFAULT_ALBUM_ART_IMAGE\
    \ == result\n    }\n\n    void testGoodResult() {\n        mockCodec org.codehaus.groovy.grails.plugins.codecs.URLCodec\n\
    \        def artworkClient = new groovy.mock.interceptor.MockFor(RestBuilder)\n\
    \        artworkClient.demand.get { String s ->\n            def results = []\n\
    \            results << [artistName: 'Thin Lizzy',\n                        collectionName:\
    \ 'Jailbreak',\n                        artworkUrl100: 'http://somesite/jailbreak.jpg']\n\
    \            results << [artistName: 'Tool',\n                        collectionName:\
    \ 'Lateralus',\n                        artworkUrl100: 'http://somesite/lateralus.jpg']\n\
    \            [json: [results: results]]\n        }\n        def result\n     \
    \   artworkClient.use {\n            result = service.getAlbumArt('Tool', 'Lateralus')\n\
    \        }\n        assert 'http://somesite/lateralus.jpg' == result\n    }\n\
    }\n```\n\nNote that the test refers to a property named `service`, which is provided\
    \ by the testing framework and is automatically initialized to be an instance\
    \ of the class under test, in this case the `AlbumArtService` class.\n\n### Exposing\
    \ Services\n\nThe services you write as part of a Grails application contain a\
    \ large share of the business logic involved in the application. Those services\
    \ are easily accessed from just about anywhere in the application using the automatic\
    \ dependency injection built into Grails. It makes sense that a lot of that business\
    \ logic may be useful to other Grails applications. In fact, it may be useful\
    \ to applications that aren’t Grails applications. The automatic dependency injection\
    \ works only within the application. There really isn’t any way to inject those\
    \ services into other applications. However, it is possible to access those services\
    \ from other applications, and Grails makes that really easy to do.\n\nMaking\
    \ a service available to another process is known as *exposing* the service. A\
    \ number of available Grails plug-ins support exposing services using various\
    \ remoting technologies. For example, one plug-in greatly simplifies exposing\
    \ services using the Java Management Extensions (JMX) technology.^([2](#Chapter10.html#CHP-10-FN-2))\
    \ JMX, part of the Java Platform since the J2SE 5.0 release, provides a really\
    \ simple mechanism for monitoring and managing resources within an application.\n\
    \nYou can install the JMX plug-in by adding the appropriate dependency declaration\
    \ to `grails-app/conf/BuildConfig.groovy`, as shown in [Listing 10-15](#Chapter10.html#list_10_15).\n\
    \n**Listing 10-15.** Declaring a Dependency on the JMX Plug-in\n\n```\n// grails-app/conf/BuildConfig.groovy\n\
    grails.project.dependency.resolution = {\n    // ...\n    plugins {\n        runtime\
    \ ':jmx:0.7'\n        // ...\n    }\n}\n```\n\nLike other remoting plug-ins available\
    \ for Grails, the JMX plug-in will look in all service classes for a property\
    \ named `expose`. The `expose` property should be a list of `String`s, and if\
    \ the list contains the string `jmx`, then the plug-in will expose that service\
    \ using JMX.\n\n![Image](images/line.jpg)\n\n² You can find more information about\
    \ JMX at [`http://java.sun.com/javase/technologies/core/mntrmgmt/javamanagement/`](http://java.sun.com/javase/technologies/core/mntrmgmt/javamanagement/).\n\
    \n[Listing 10-16](#Chapter10.html#list_10_16) shows a service in the gTunes application\
    \ that has been exposed using JMX.\n\n**Listing 10-16.** The `StoreService` Is\
    \ Exposed Using JMX\n\n```\npackage com.gtunes\n\nclass StoreService {\n\n   \
    \ static transactional = true\n\n    static expose = ['jmx']\n    int getNumberOfAlbums()\
    \ {\n        Album.count()\n    }\n    int getNumberOfAlbumsForGenre(String genre)\
    \ {\n        Album.countByGenre(genre)\n    }\n }\n```\n\nThe `StoreService` contains\
    \ a single method, `getNumberOfAlbums`, which returns the number of `Album` objects\
    \ currently in the database. The service may contain any number of methods. All\
    \ of the methods in the service will be exposed as JMX operations.\n\nIn terms\
    \ of code, to expose your services using JMX, you need only include `jmx` in the\
    \ value of the `expose` property. It couldn’t be simpler! There is another step\
    \ that does not involve code. The way to enable remote access to services that\
    \ have been exposed using JMX is to set the `com.sun.management.jmxremote` system\
    \ property when the Grails application starts. A simple way to do this is to assign\
    \ a value to the `JAVA_OPTS` environment variable. The value should include `-Dcom.sun.management.jmxremote`.\
    \ Note that the property does not need to be assigned a value; it just needs to\
    \ be set. For example, in a Bash shell, you can interactively set the environment\
    \ variable using the code shown in [Listing 10-17](#Chapter10.html#list_10_17).\n\
    \n**Listing 10-17.** Setting `JAVA_OPTS` in a Bash Shell\n\n```\nexport JAVA_OPTS=-Dcom.sun.management.jmxremote\n\
    ```\n\nIn a Windows shell you can use the code shown in [Listing 10-18](#Chapter10.html#list_10_18).\n\
    \n**Listing 10-18.** Setting `JAVA_OPTS` in a Windows Shell\n\n```\nset JAVA_OPTS=-Dcom.sun.management.jmxremote\n\
    ```"
  raw: '### Testing Services


    Since much of your business logic and complexity is encapsulated in services,
    it is important that these components be tested. As far as tests are concerned,
    a service is just another class and can be tested as such. The unit testing support
    provided for services is similar to that provided for other artefact types.


    [Listing 10-13](#Chapter10.html#list_10_13) shows the default test that was created
    by the `create-service` command.


    ***Listing 10-13.** Default Service Unit Test Template*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `/**`

    ` * See the API for {@link grails.test.mixin.services.ServiceUnitTestMixin} for
    usage instructions`

    ` */`

    `@TestFor(AlbumArtService)`

    `class AlbumArtServiceTests {`


    `    void testSomething() {`

    `        fail "Implement me"`

    `    }`

    `}`


    To test the `AlbumArtService`, fill that out using standard Groovy unit-testing
    techniques. See [Listing 10-14](#Chapter10.html#list_10_14).


    ***Listing 10-14.** Unit-Testing AlbumArtService*


    `package com.gtunes`


    `import grails.plugins.rest.client.RestBuilder`

    `import groovy.mock.interceptor.MockFor`

    `import grails.test.mixin.*`

    `//import org.junit.*`


    `/**`

    ` * See the API for {@link grails.test.mixin.services.ServiceUnitTestMixin} for
    usage instructions`

    ` */`

    `@TestFor(AlbumArtService)`

    `class AlbumArtServiceTests {`


    `    void testNullAlbumAndArtist() {`

    `        def result = service.getAlbumArt(null, null)                  `

    `                                     assert AlbumArtService.DEFAULT_ALBUM_ART_IMAGE
    == result`

    `    }`


    `    void testGoodResult() {`

    `        mockCodec org.codehaus.groovy.grails.plugins.codecs.URLCodec`

    `        def artworkClient = new groovy.mock.interceptor.MockFor(RestBuilder)`

    `        artworkClient.demand.get { String s ->`

    `            def results = []`

    `            results << [artistName: ''Thin Lizzy'',`

    `                        collectionName: ''Jailbreak'',`

    `                        artworkUrl100: ''http://somesite/jailbreak.jpg'']`

    `            results << [artistName: ''Tool'',`

    `                        collectionName: ''Lateralus'',`

    `                        artworkUrl100: ''http://somesite/lateralus.jpg'']`

    `            [json: [results: results]]`

    `        }`

    `        def result`

    `        artworkClient.use {`

    `            result = service.getAlbumArt(''Tool'', ''Lateralus'')`

    `        }`

    `        assert ''http://somesite/lateralus.jpg'' == result`

    `    }`

    `}`


    Note that the test refers to a property named `service`, which is provided by
    the testing framework and is automatically initialized to be an instance of the
    class under test, in this case the `AlbumArtService class`.


    ### Exposing Services


    The services you write as part of a Grails application contain a large share of
    the business logic involved in the application. Those services are easily accessed
    from just about anywhere in the application using the automatic dependency injection
    built into Grails. It makes sense that a lot of that business logic may be useful
    to other Grails applications. In fact, it may be useful to applications that aren’t
    Grails applications. The automatic dependency injection works only within the
    application. There really isn’t any way to inject those services into other applications.
    However, it is possible to access those services from other applications, and
    Grails makes that really easy to do.


    Making a service available to another process is known as *exposing* the service.
    A number of available Grails plug-ins support exposing services using various
    remoting technologies. For example, one plug-in greatly simplifies exposing services
    using the Java Management Extensions (JMX) technology.^([2](#Chapter10.html#CHP-10-FN-2))
    JMX, part of the Java Platform since the J2SE 5.0 release, provides a really simple
    mechanism for monitoring and managing resources within an application.


    You can install the JMX plug-in by adding the appropriate dependency declaration
    to `grails-app/conf/BuildConfig.groovy`, as shown in [Listing 10-15](#Chapter10.html#list_10_15).


    ***Listing 10-15.** Declaring a Dependency on the JMX Plug-in*


    `// grails-app/conf/BuildConfig.groovy`

    `grails.project.dependency.resolution = {`

    `    // ...`

    `    plugins {`

    `        runtime '':jmx:0.7''`

    `        // ...`

    `    }`

    `}`


    Like other remoting plug-ins available for Grails, the JMX plug-in will look in
    all service classes for a property named `expose`. The `expose` property should
    be a list of `String`s, and if the list contains the string `jmx`, then the plug-in
    will expose that service using JMX.


    ![Image](images/line.jpg)


    ² You can find more information about JMX at [`http://java.sun.com/javase/technologies/core/mntrmgmt/javamanagement/`](http://java.sun.com/javase/technologies/core/mntrmgmt/javamanagement/).


    [Listing 10-16](#Chapter10.html#list_10_16) shows a service in the gTunes application
    that has been exposed using JMX.


    ***Listing 10-16.** The StoreService Is Exposed Using JMX*


    `package com.gtunes`


    `class StoreService {`


    `    static transactional = true`


    `    static expose = [''jmx'']`

    `    int getNumberOfAlbums() {`

    `        Album.count()`

    `    }`

    `    int getNumberOfAlbumsForGenre(String genre) {`

    `        Album.countByGenre(genre)`

    `    }`

    ` }`


    The `StoreService` contains a single method, `getNumberOfAlbums`, which returns
    the number of `Album` objects currently in the database. The service may contain
    any number of methods. All of the methods in the service will be exposed as JMX
    operations.


    In terms of code, to expose your services using JMX, you need only include `jmx`
    in the value of the `expose` property. It couldn’t be simpler! There is another
    step that does not involve code. The way to enable remote access to services that
    have been exposed using JMX is to set the `com.sun.management.jmxremote` system
    property when the Grails application starts. A simple way to do this is to assign
    a value to the `JAVA_OPTS` environment variable. The value should include `-Dcom.sun.management.jmxremote`.
    Note that the property does not need to be assigned a value; it just needs to
    be set. For example, in a Bash shell, you can interactively set the environment
    variable using the code shown in [Listing 10-17](#Chapter10.html#list_10_17).


    ***Listing 10-17.** Setting JAVA_OPTS in a Bash Shell*


    `export JAVA_OPTS=-Dcom.sun.management.jmxremote`


    In a Windows shell you can use the code shown in [Listing 10-18](#Chapter10.html#list_10_18).


    ***Listing 10-18.** Setting JAVA_OPTS in a Windows Shell*


    `set JAVA_OPTS=-Dcom.sun.management.jmxremote`'
