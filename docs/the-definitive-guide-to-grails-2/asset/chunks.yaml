    ## Grails 的精髓


    > *简约是极致的优雅。*


    ——列奥纳多·达·芬奇


    要理解 Grails，首先需要明白它的目标：大幅简化企业级 Java Web 开发，将 Web 开发提升到新的抽象层次，挖掘其他平台开发者多年来已能使用的功能，同时保留深入底层技术并利用其丰富性与成熟度的灵活性。简而言之，我们
    Java 开发者希望“鱼与熊掌兼得”。


    你是否曾因处理大量令人崩溃的 XML 配置文件而痛苦？是否曾因构建系统缓慢——测试一个改动需要数分钟而非数秒——而备受煎熬？Grails 让 Java 平台的开发重拾乐趣，消除障碍，向开发者开放
    API，使其能纯粹专注于手头的业务问题。无需配置，零开销，即时反馈。


    你或许会好奇如何实现这一非凡成就。Grails 拥抱“约定优于配置”（CoC）、“不要重复自己”（DRY）等理念，并通过简洁的 Groovy 语言和一系列领域特定语言（DSL）提供合理的默认值，让你的工作更轻松。


    作为初学 Grails 的开发者，你可能会觉得自己在“作弊”，理应经历更多痛苦。毕竟，你无法将两小时的健身训练压缩到二十分钟，对吧？总得在某个方面付出代价，比如多长几斤肉？


    作为开发者，你可以确信自己站在巨人的肩膀上——Grails 底层依赖的技术包括 Spring、Hibernate，当然还有 Java 平台。Grails 汲取了
    Ruby on Rails、Django、TurboGears 等动态语言框架的精华，并将其带到你身边的 Java 虚拟机（JVM）上。


    本章将从最高层面介绍该框架，并提供一些入门要点。此处介绍的所有概念将在本书后续章节中详细阐述。


    ### 简洁与强大


    Grails 明显区别于竞争对手的一个因素，体现在其开发过程中的设计选择。通过不重复造轮子，并利用 Spring 和 Hibernate 等久经考验的框架，Grails
    能在不牺牲稳健性的前提下提供让你工作更轻松的功能。


    Grails 由各自领域中最流行的开源技术驱动：


    > *   *Hibernate*：Java 世界中对象关系映射（ORM）的事实标准。

    > *   *Spring*：广受欢迎的开源 Java 控制反转（IoC）容器与封装框架。

    > *   *SiteMesh*：稳健且稳定的布局渲染框架。

    > *   *Tomcat*：久经考验、可嵌入的 Servlet 容器。

    > *   *H2*：纯 Java 关系数据库管理系统（RDBMS）实现。


    ORM 和 IoC 的概念对某些读者来说可能有些陌生。ORM 简单来说是一种将面向对象世界中的对象映射到关系数据库表的方法。它在 SQL 之上提供了额外的抽象层，让开发者能够专注于领域模型，而非陷入大量
    SQL 语句中。


    IoC 提供了一种“连接”对象的方式，使它们的依赖关系在运行时可用。例如，一个执行持久化的对象可能需要访问数据源。IoC 让开发者无需负责获取数据源的引用。但暂时不必过度纠结于这些概念，因为它们的用法将在本书后续章节中变得清晰。


    你之所以受益于 Grails，是因为它通过 Groovy 语言引入了另一层抽象来封装这些框架。作为开发者，你甚至不会意识到自己在构建一个 Spring 和
    Hibernate 应用。当然，你无需触碰任何一行 Hibernate 或 Spring 的 XML 配置，但如果你需要，它们随时可用。图 1-1 展示了
    Grails 与这些框架及企业级 Java 技术栈的关系。


    ![图片](img/9781430243779_Fig01-01.jpg)


    ***图 1-1.** Grails 技术栈*


    ### Grails，一个平台


    初次接触 Grails 时，你可能会深吸一口气，然后惊呼“又一个 Web 框架！？”这可以理解，毕竟 Java 领域已有数十种 Web 框架。但 Grails
    与众不同，而且是以一种好的方式。Grails 是一个全栈环境，而不仅仅是 Web 框架。它是一个*平台*，雄心勃勃地要处理从视图层到持久化层的所有问题。


    此外，通过其插件系统（详见第 12 章），Grails 旨在为那些开箱即用可能无法覆盖的扩展问题提供解决方案。借助 Grails，你可以实现搜索、任务调度、企业消息传递与远程调用等功能。


    Grails 覆盖范围的广度可能会让人联想到未知的恐怖和噩梦般的配置、配置、再配置。然而，即使在插件中，Grails 也坚持“约定优于配置”和合理的默认值，以最大限度地减少启动和运行所需的工作量。


    我们鼓励你将 Grails 视为不仅仅是又一个 Web 框架，而是构建下一个 Web 2.0 现象的*平台*。

