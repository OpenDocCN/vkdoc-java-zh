    #### 修改生成的 WAR 描述符


    如第 12 章所述，Grails 用于与 Servlet 容器集成的 `web.xml` 文件是以编程方式生成的。你在第 12 章中看到，可以通过使用 `install-templates`
    命令来修改用于生成 `web.xml` 的模板。然而，插件也可以通过使用 `doWithWebDescriptor` 钩子以编程方式修改 `web.xml`。


    本质上，当生成 `web.xml` 文件时，它会被 Groovy 的 `DOMBuilder` 解析到内存中。这个解析器会创建 XML 的内存表示，你可以对其进行修改。`doWithWebDescriptor`
    钩子会将 XML 的引用作为第一个参数传递给 `doWithWebDescriptor` 闭包。`XmlSlurper` 允许你使用类似构建器的语法来对 XML
    进行修改。


