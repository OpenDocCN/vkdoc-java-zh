  raw: '### Services and Dependency Injection


    It is important to note that services are singletons by default, which means there
    is only ever one instance of a service. So how do you go about getting a reference
    to a service within a controller, for example? Well, as part of its dependency
    injection support, Spring has a concept called *autowiring* that allows dependencies
    to automatically be injected by name or type.


    Grails services can be injected by name into a controller. For example, simply
    by creating a property with the name `albumArtService` within the `AlbumArtTagLib`,
    the `AlbumArtService` instance will automatically be available to the taglib.
    [Listing 10-3](#Chapter10.html#list_10_3) demonstrates how this is done.


    ***Listing 10-3.** Injecting a Service Instance into a Controller*


    `class AlbumArtTagLib {`

    `    AlbumArtService albumArtService`

    `    ...`

    `}`


    ![Image](images/square.jpg) **Note** The `albumArtService` property is statically
    typed in [Listing 10-3](#Chapter10.html#list_10_3). The property can be dynamically
    typed, and injection will work in the same way.


    The convention used for the name of the property is basically the property name
    representation of the class name. In other words, it is the class name with the
    first letter set in lowercase type, following the JavaBean convention for property
    names. You can then invoke methods on the singleton `AlbumArtService` instance,
    even though you have done nothing to explicitly look it up or initialize it. The
    underlying Spring IoC container handles all of this automatically.


    You can use the same convention to inject services into other services, hence
    allowing your services to interact within one another.


    It is important that you let Grails inject service instances for you. You should
    never instantiate instances of service classes directly. Later in this chapter,
    when we discuss transactions, you will see that there is some special magic going
    on when Grails is allowed to inject service instances for you. You will get none
    of those benefits if you create service instances yourself.


    Now that you’ve been shown the basics of services, let’s see an example of implementing
    a service.


    ### Services in Action


    The `AlbumArtTagLib` in the gTunes application already contains quite a bit of
    logic and complexity. Pulling that logic out of the taglib and into a service
    is a good idea.


    In general, you should strive to keep your Grails controllers and taglibs tight
    and concise. You should not let a lot of business complexity evolve in a controller
    or a taglib. When much complexity starts to evolve in a controller or a taglib,
    that should be a red flag to you. You should then consider refactoring to pull
    out a lot of that complexity. Much of it will fit perfectly into a service or
    multiple services.


    Let’s take a look at the taglib code that is a good candidate for some refactoring.
    [Listing 10-4](#Chapter10.html#list_10_4) shows the current state of the `AlbumArtTagLib`.


    ***Listing 10-4.** The AlbumArtTagLib Class*


