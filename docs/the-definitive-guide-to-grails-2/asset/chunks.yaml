    ### 定义控制器


    控制器是在 `grails-app/controllers` 目录下定义的类。按照惯例，类名必须以“Controller”结尾。控制器不需要继承任何特殊的基类或实现任何特殊的接口。


    清单 4-1 展示了一个典型的控制器，它位于 `grails-app/controllers/SampleController.groovy` 路径下；该控制器定义了一个名为
    `index` 的操作。`index` 操作会渲染一个简单的文本响应。


    ***清单 4-1.** SampleController 类*


    `class SampleController {`


    `  def index() {`

    `    render ''You accessed the Sample controller...''`

    `  }`

    `}`


    有了这个控制器，对 `/sample/index` 的请求将导致字符串“You accessed the Sample controller”被渲染回浏览器。你可以看到，像
    `index` 这样的操作被定义为控制器中的方法。一个控制器可以定义任意数量的操作，如清单 4-2 所示。


    ***清单 4-2.** 定义多个操作*


    `class SampleController {`

    `  def first() {  ...   }`

    `  def second() {  ...   }`

    `  def third() {  ...   }`

    `  def fourth() {  ...   }`

    `}`


    在第 6 章中，你将了解 Grails 提供的强大 URL 映射支持。默认情况下，URL 通过约定映射到控制器操作。URL 的第一部分表示要访问哪个控制器，第二部分表示要执行哪个操作。例如，`/sample/first`
    将执行 `SampleController` 中的 `first` 操作。同样，`/sample/second` 将执行 `SampleController`
    中的 `second` 操作。


    #### 设置默认操作


    你并不一定需要在 URL 中指定要执行的操作。如果未指定操作，Grails 将执行指定控制器中的默认操作。你可以使用以下规则来标识默认操作（参见清单 4-3）：


    > *   如果控制器只定义了一个操作，则该操作成为默认操作。

    > *   如果控制器定义了一个名为 `index` 的操作，则该操作成为默认操作。

    > *   如果控制器定义了一个名为 `defaultAction` 的属性，则该属性的值就是默认操作的名称。


    ***清单 4-3.** 默认操作*


    `// 这里 ''list'' 操作是默认操作，因为只定义了一个操作`

    `class SampleController {`

    `    def list() {}`

    `}`

    `// 在这个例子中，按照惯例 ''index'' 是默认操作`

    `class SampleController {`

    `    def list() {}`

    `    def index() {}`

    `}`


    `// 这里 ''list'' 被显式设置为默认操作`

    `class SampleController {`

    `    static defaultAction = ''list''`

    `    def list() {}`

    `    def index() {}`

    `}`


    #### 日志记录


    日志记录是任何应用程序的一个重要方面，它允许应用程序报告关于其内部运行情况的文本信息。Java 平台上有多种日志记录解决方案，包括第三方日志记录解决方案以及
    Java 1.4 中引入的标准日志记录 API。在为应用程序配置日志记录时，你会面临一定的复杂性。


    通常，应用程序开发者会完全避免日志记录以避开这种复杂性。他们转而选择简单地使用 `System.out.println` 和 `System.err.println`
    来打印消息。出于多种原因，这确实不是一个好主意。


    幸运的是，Grails 处理了设置日志记录所涉及的大部分复杂性。一个 `log` 属性被注入到每个控制器中，它是 `org.apache.commons.logging.Log`
    的一个实例。你不需要编写任何代码来初始化 `log` 属性，因为框架会处理这些。清单 4-4 记录了 `org.apache.commons.logging.Log`
    API。


    ***清单 4-4.** org.apache.commons.logging.Log 接口*


    `public interface Log {`

    `public void debug(Object msg);`

    `public void debug(Object msg, Throwable t);`

    `public void error(Object msg);`

    `public void error(Object msg, Throwable t);`

    `public void fatal(Object msg);`

    `public void fatal(Object msg, Throwable t);`

    `public void info(Object msg);`

    `public void info(Object msg, Throwable t);`

    `public void trace(Object msg);`

    `public void trace(Object msg, Throwable t);`

    `public void warn(Object msg);`

    `public void warn(Object msg, Throwable t);`

    `public boolean isDebugEnabled();`

    `public boolean isErrorEnabled();`

    `public boolean isFatalEnabled();`

    `public boolean isInfoEnabled();`

    `public boolean isTraceEnabled();`

    `public boolean isWarnEnabled();`

    `}`


    注入到控制器中的 `log` 属性可以在任何控制器操作或控制器内的任何方法中使用（参见清单 4-5）。


    ***清单 4-5.** 使用 log 属性*


    `class SampleController {`

    `  def index() {`

    `    log.info(''In the index action...'')`

    `    // ...`

    `  }`

    `}`


    #### 记录异常


    Groovy 将所有异常转换为运行时异常，因此 Groovy 代码永远不会被迫捕获异常。这与 Java 开发者习惯的方式不同。无论如何，即使应用程序永远不会被迫捕获异常，在许多场景下捕获异常也是有意义的。在
    Groovy 中，捕获异常的细节与 Java 完全相同。处理异常没有特殊的 Groovy 语法。


    当在控制器中捕获到异常时，你几乎总是希望使用 `log` 属性记录异常的详细信息（参见清单 4-6）。


    ***清单 4-6.** 记录异常*


    `class SampleController {`

    `  def index() {`

    `    try {`

    `      // 执行某些可能抛出异常的操作`

    `    } catch (Exception e) {`

    `      log.error (''some message goes here'', e)`

    `    }`

    `  }`

    `}`


    #### 访问请求属性


    Java Servlet 开发者会识别出诸如 `HttpServletRequest`、`HttpServletResponse`、`HttpSession`、`ServletContext`
    等组件。这些都是 Servlet 领域的标准角色。当然，Grails 框架与标准的基于 Servlet 的 Web 框架有很大不同。然而，Grails 是构建在这些相同的
    Servlet API 之上的。表 4-1 包含了一个自动注入到 Grails 控制器中的标准属性列表。


    ![Image](img/9781430243779_Tab04-01.jpg)


    ![Image](img/9781430243779_Tab04-01a.jpg)


    前面列出的许多属性都是标准的 Servlet API 对象，你可以在 Oracle 的 Java 技术网站 [`http://www.oracle.com/technetwork/java/`](http://www.oracle.com/technetwork/java/)
    上找到它们的文档。然而，观察使用 Grails 控制器与使用这些对象有何不同是很有趣的。


    例如，与请求交互的一种常见方式是检索或设置请求属性。会话和 Servlet 上下文也具有你可以设置或检索的属性。Grails 通过重写点运算符和下标运算符来统一这些操作。表
    4-2 展示了在常规 Java Servlet 中访问请求、会话和 Servlet 上下文属性与在 Grails 控制器中访问它们之间的区别。


    ![Image](img/9781430243779_Tab04-02.jpg)


    当然，如果你习惯于编写像表格左列那样的代码，你可以继续这样做。Grails 只是让它变得稍微容易一些。

