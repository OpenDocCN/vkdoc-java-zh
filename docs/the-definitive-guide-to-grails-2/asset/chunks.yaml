    ## 映射 URL


    Grails 提供了开箱即用的 URL 映射。默认的 URL 映射配置是 Grails 框架利用“约定优于配置”这一强大理念来减轻应用程序开发者负担的又一个例证。不过，有时你可能需要偏离约定，定义自己的自定义映射。例如，你可能希望创建更具描述性且更易于人类阅读的
    URL。Grails 让你能够轻松定义这些自定义 URL 映射。


    在构建 Web 应用程序时，定义特定于应用程序的 URL 映射是经常遇到的需求。Grails 中配置 URL 映射的技术非常强大，同时又极其简单易用。与 Grails
    应用中的许多配置选项类似，配置自定义 URL 映射只需编写少量 Groovy 代码即可，仅此而已。特别是，不涉及任何 XML 配置文件。本章将介绍 Grails
    提供的灵活 URL 映射系统，并演示如何管理正向和反向 URL 查找、如何将请求映射到控制器操作或视图、如何将异常映射到控制器操作和视图，以及如何测试所有这些操作。


    ### 理解默认 URL 映射


    Grails 应用中的默认 URL 映射配置很简单。URL 的第一部分对应控制器的名称，URL 的第二部分（可选）对应该控制器中定义的操作名称。例如，`/store/index`
    URL 将映射到 `StoreController` 中的 `index` 操作。指定操作名称是可选的，因此如果 URL 中省略了操作名称，则将执行指定控制器的默认操作。默认控制器操作在第
    4 章的“设置默认操作”部分有详细描述。最后，URL 的最后一部分是另一个可选元素，它代表名为 `id` 的请求参数的值。例如，`/album/show/42`
    URL 将映射到 `AlbumController` 中的 `show` 操作，并带有一个值为 `42` 的名为 `id` 的请求参数。


    默认映射的定义位于 `grails-app/conf/UrlMappings.groovy` 中。清单 6-1 展示了默认情况下 `UrlMappings.groovy`
    的内容。


    ***清单 6-1.** 默认的 grails-app/conf/UrlMappings.groovy*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/$controller/$action?/$id?"{`

    `            constraints {`

    `                // 在此处应用约束`

    `            }`

    `        }`

    `        "500"(view:''/error'')`

    `    }`

    `}`


    此映射的关键是字符串 `"/$controller/$action?/$id?"`。请注意，`$action` 和 `$id` 元素后面都跟有一个问号。问号表示
    URL 中的可选部分。`$controller` 元素没有问号，因此它是 URL 的必需部分。一个映射可以定义任意数量的可选元素。如果映射包含可选元素，则它们必须全部出现在模式的末尾。


    ![Image](img/square.jpg) **注意**  默认映射中的 `constraints` 块是空的。`constraints` 块是可选的，将在本章后面的“对
    URL 映射应用约束”部分讨论。以“500”开头的映射将在后面的“映射 HTTP 响应码”部分讨论。


    ### 在 URL 映射中包含静态文本


    在默认映射中，URL 的每个元素都是变量。变量元素以 `$` 符号为前缀。URL 映射也可以包含静态元素。URL 映射中的静态元素只是文本，它必须是 URL
    的一部分，以便特定的映射能够匹配。请参见清单 6-2 了解包含静态文本的映射示例。


    ***清单 6-2.** 在映射中包含静态文本*


    `class UrlMappings { static mappings = {`

    `    "/showAlbum/$controller/$action?/$id?" {`

    `        constraints {`

    `            // 在此处应用约束`

    `        }`

    `    }`

    `}`


    此映射将匹配诸如 `/showAlbum/album/show/42` 和 `/showAlbum/album/list` 之类的 URL，但不会匹配像 `/album/show/42`
    这样的 URL，因为后者不以 `/showAlbum` 开头。

