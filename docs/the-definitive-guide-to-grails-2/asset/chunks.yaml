- fmt: "# Page Directives\n\nGSP supports a limited subset of the page directives\
    \ available in JSP. A *page directive* is an instruction appearing at the top\
    \ of a GSP that performs an action that the page relies on. As an example, it\
    \ could set the content type, perform an import, or set a page property, one that\
    \ could even be container-specific.\n\nOne of the more useful of these is the\
    \ `contentType` directive, which allows you to set the content type of the response.\
    \ This is useful in that it allows you to use GSP to output formats other than\
    \ HTML markup, including XML or plain text. In use, the directive is identical\
    \ to JSP, with the directive appearing at the top of the page and starting with\
    \ `<%@`.\n\n[Listing 5-2](#Chapter05.html#list_5_2) sets the content type to `text/xml`,\
    \ which allows you to output XML. This can be useful when working with Ajax and\
    \ similar technologies.\n\n**Listing 5-2.** The contentType Page Directive\n\n\
    ```\n<%@ page contentType=\"text/xml; charset=UTF-8\" %>\n```\n\nAnother page\
    \ directive available is the `import` directive, which is analogous to the `import`\
    \ statement in a Java or Groovy class. However, because Groovy imports many classes\
    \ by default and Grails encourages an MVC architecture, where much of the logic\
    \ should be placed in a controller and not the view, use of `import` is not very\
    \ common. Nevertheless, [Listing 5-3](#Chapter05.html#list_5_3) shows an example\
    \ of importing the `Time` class from the `java.sql.*` package.\n\n**Listing 5-3.**\
    \ The import Page Directive\n\n```\n<%@ page import=\"java.sql.Time\" %>\n```\n\
    \n![Image](images/square.jpg) **Note** Groovy imports the `java.lang`, `java.util`,\
    \ `java.io`, `java.net`, `groovy.lang`, and `groovy.util` packages by default.\n\
    \n# Groovy Scriptlets\n\nGSP tries to stay as true to JSP as possible, and therefore\
    \ it supports traditional JSP scriptlet blocks using the `<%...%>` syntax. Essentially,\
    \ as soon as you type the opening `<%` declaration, you have entered the world\
    \ of Groovy and can type whatever Groovy code you so choose up until the closing\
    \ `%>` declaration.\n\nWhat this means is that you can use scriptlets to perform\
    \ loops and logical `if` statements merely by combining scriptlet declarations,\
    \ as shown in [Listing 5-4](#Chapter05.html#list_5_4).\n\n**Listing 5-4.** Scriptlets\
    \ in Action\n\n```\n<html>\n    <body>\n      <% 3.times { %>\n        <p>I'm\
    \ printed three times!</p>\n      <% } %>\n    </body>\n</html>\n```\n\nNote that\
    \ scriptlets are available more to align the syntax with JSP. In practice, they\
    \ are discouraged in favor of GSP tags, which you will see in the \"Built-in Grails\
    \ Tags\" section.\n\nAlthough the previous syntax allows arbitrary code to be\
    \ inserted between the opening and closing declarations, it doesn't actually explicitly\
    \ output anything when inside the scriptlet block. In other words, as with the\
    \ previous example, you have to use a closing `%>` bracket to close the scriptlet\
    \ expression in order to define what you want repeated three times. You can, however,\
    \ use the `out` attribute mentioned earlier to output to this response:\n\n```\n\
    <% out << \"print me!\" %>\n```\n\nThe previous code will print the text \"print\
    \ me!\" to the response using the `out` attribute. As you can imagine, having\
    \ these `out <<` statements all over the place can get a little tedious, so GSP\
    \ supports another syntax inherited from JSP through the `<%=...%>` statement\
    \ (note the equal sign directly after the opening declaration). Essentially, the\
    \ following example is equivalent to what you saw in the previous code:\n\n```\n\
    <%= \"print me!\" %>\n```\n\nHere the `=` sign after the opening scriptlet bracket\
    \ ensures that the result of whatever follows is printed to the response. The\
    \ response in general is a mix of markup and code that results in some text being\
    \ sent to the browser or client. Now that you've seen GSP's similarities with\
    \ JSP, let's look at a feature you won't find in JSP: the embedded `GString`.\n\
    \n# GSP As GStrings\n\nSince the introduction of JSTL, the use of scriptlets and\
    \ declarations such as those shown in the previous section has been looked down\
    \ on a bit. Instead, there is an expression language in JSP that can be used in\
    \ combination with the `<c:out>` standard tag to output values, as shown in [Listing\
    \ 5-5](#Chapter05.html#list_5_5).\n\n**Listing 5-5.** JSP c:out Tag\n\n```\n<%--\
    \ Output the album title --%>\n<p><c:out value=\"${album.title}\" /></p>\n```\n\
    \n![Image](images/square.jpg) **Tip** The previous JSP example uses the syntax\
    \ `<%--...--%>` for comments that should not be present in the rendered response.\
    \ These comments are also supported in GSP using the same syntax.\n\nIn addition\
    \ to the previous rather verbose tag, you would also need to import the tag library,\
    \ which contains the `<c:out>` tag using a page directive at the top of the JSP.\
    \ All this amounts to a lot of effort just to use a tag that lets you render values\
    \ to the response. Luckily, with GSP it is a little bit simpler, because of its\
    \ support for embedded `GString` values:\n\n```\n<p>${album.title}</p>\n```\n\n\
    A GSP, if you think about it, is essentially one big `GString`, thus allowing\
    \ the same `${...}` expressions nested within it as found in JSP. The expressions\
    \ allowed within a `GString` are not, thankfully, limited to simply referencing\
    \ properties. The full capability Groovy offers in terms of navigating object\
    \ graphs is at your fingertips, which often becomes useful when iterating, as\
    \ the next section will show.\n\n# Built-in Grails Tags\n\nGSP has a number of\
    \ built-in tags for performing basic operations; they include looping, switching,\
    \ and using logical `if` statements. In general, because they promote a cleaner\
    \ separation of concerns and allow you to create well-formed markup, tags are\
    \ preferable to embedding scriptlets. Each GSP tag requires the prefix `g:` before\
    \ the tag name so that it is recognized as a GSP tag. Unlike JSP, which requires\
    \ directives to import tag libraries, no additional page directive is needed.\n\
    \n![Image](images/square.jpg) **Note** GSP also supports JSP custom tag libraries,\
    \ which can be imported with the standard JSP taglib directive.\n\nIn the next\
    \ few sections, you'll see the tags that are built in to Grails. These tags are\
    \ there by default and require no extra work by the developer.\n\n## Setting Variables\
    \ with Tags\n\nOccasionally, it is useful to set the value of a variable or define\
    \ a new variable within the scope (commonly referred to as the *page context*)\
    \ of a GSP. Both use cases can be achieved via the `<g:set>` tag, which will set\
    \ or define a variable in the page context regardless of whether it already exists.\
    \ The `<g:set>` tag takes two attributes: the `var` attribute, which defines the\
    \ name of the variable to set, and a `value` attribute, which is generally an\
    \ expression:\n\n```\n<g:set var=\"albumTitle\" value=\"${album.title}\" />\n\
    ```\n\nBy default, variables set with `<g:set>` are assumed to be within the page\
    \ scope. What is more, you can set a variable in the `session` scope simply by\
    \ using the `scope` attribute:\n\n```\n<g:set scope=\"session\" var=\"user\" value=\"\
    ${user}\"  />\n```\n\nIn addition to the `session` scope, a number of others are\
    \ available.\n\n> * `application`: Stores variables for the scope of the whole\
    \ application\n> * `session`: Stores variables for the scope of the user session\n\
    > * `flash`: Stores variables for the current request and the next request only\n\
    > * `request`: Stores variables for the scope of the current request\n> * `page`:\
    \ Stores variables for the scope of the rendering page\n\nAnother fairly basic\
    \ requirement, along with setting variables, is the ability to conditionally display\
    \ information. In the next section, you'll see how you can achieve this."
  raw: '#### Page Directives


    GSP supports a limited subset of the page directives available in JSP. A *page
    directive* is an instruction appearing at the top of a GSP that performs an action
    that the page relies on. As an example, it could set the content type, perform
    an import, or set a page property, one that could even be container-specific.


    One of the more useful of these is the `contentType` directive, which allows you
    to set the content type of the response. This is useful in that it allows you
    to use GSP to output formats other than HTML markup, including XML or plain text.
    In use, the directive is identical to JSP, with the directive appearing at the
    top of the page and starting with `<%@`.


    [Listing 5-2](#Chapter05.html#list_5_2) sets the content type to `text/xml`, which
    allows you to output XML. This can be useful when working with Ajax and similar
    technologies.


    ***Listing 5-2.** The contentType Page Directive*


    `<%@ page contentType="text/xml; charset=UTF-8" %>`


    Another page directive available is the `import` directive, which is analogous
    to the `import` statement in a Java or Groovy class. However, because Groovy imports
    many classes by default and Grails encourages an MVC architecture, where much
    of the logic should be placed in a controller and not the view, use of `import`
    is not very common. Nevertheless, [Listing 5-3](#Chapter05.html#list_5_3) shows
    an example of importing the `Time` class from the `java.sql.*` package.


    ***Listing 5-3.** The import Page Directive*


    ` <%@ page import="java.sql.Time" %>`


    ![Image](images/square.jpg) **Note**  Groovy imports the `java.lang`, `java.util`,
    `java.io`, `java.net`, `groovy.lang`, and `groovy.util` packages by default.


    #### Groovy Scriptlets


    GSP tries to stay as true to JSP as possible, and therefore it supports traditional
    JSP scriptlet blocks using the `<%...%>` syntax. Essentially, as soon as you type
    the opening `<%` declaration, you have entered the world of Groovy and can type
    whatever Groovy code you so choose up until the closing `%>` declaration.


    What this means is that you can use scriptlets to perform loops and logical `if`
    statements merely by combining scriptlet declarations, as shown in [Listing 5-4](#Chapter05.html#list_5_4).


    ***Listing 5-4.** Scriptlets in Action*


    `<html>`

    `    <body>`

    `      <% 3.times { %>`

    `        <p>I''m printed three times!</p>`

    `      <% } %>`

    `    </body>`

    `</html>`


    Note that scriptlets are available more to align the syntax with JSP. In practice,
    they are discouraged in favor of GSP tags, which you will see in the “Built-in
    Grails Tags” section.


    Although the previous syntax allows arbitrary code to be inserted between the
    opening and closing declarations, it doesn’t actually explicitly output anything
    when inside the scriptlet block. In other words, as with the previous example,
    you have to use a closing `%>` bracket to close the scriptlet expression in order
    to define what you want repeated three times. You can, however, use the out attribute
    mentioned earlier to output to this response:


    `<% out << "print me!" %>`


    The previous code will print the text “print me!” to the response using the out
    attribute. As you can imagine, having these `out <<` statements all over the place
    can get a little tedious, so GSP supports another syntax inherited from JSP through
    the `<%=...%>` statement (note the equal sign directly after the opening declaration).
    Essentially, the following example is equivalent to what you saw in the previous
    code:


    `<%= "print me!" %>`


    Here the `=` sign after the opening scriptlet bracket ensures that the result
    of whatever follows is printed to the response. The response in general is a mix
    of markup and code that results in some text being sent to the browser or client.
    Now that you’ve seen GSP’s similarities with JSP, let’s look at a feature you
    won’t find in JSP: the embedded `GString`.


    #### GSP As GStrings


    Since the introduction of JSTL, the use of scriptlets and declarations such as
    those shown in the previous section has been looked down on a bit. Instead, there
    is an expression language in JSP that can be used in combination with the `<c:out>`
    standard tag to output values, as shown in [Listing 5-5](#Chapter05.html#list_5_5).


    ***Listing 5-5.** JSP c:out Tag*


    `<%-- Output the album title --%>`

    `<p><c:out value="${album.title}" /></p>`


    ![Image](images/square.jpg) **Tip**  The previous JSP example uses the syntax
    `<%--...--%>` for comments that should not be present in the rendered response.
    These comments are also supported in GSP using the same syntax.


    In addition to the previous rather verbose tag, you would also need to import
    the tag library, which contains the `<c:out>` tag using a page directive at the
    top of the JSP. All this amounts to a lot of effort just to use a tag that lets
    you render values to the response. Luckily, with GSP it is a little bit simpler,
    because of its support for embedded `GString` values:


    `<p>${album.title}</p>`


    A GSP, if you think about it, is essentially one big `GString`, thus allowing
    the same `${...}` expressions nested within it as found in JSP. The expressions
    allowed within a `GString` are not, thankfully, limited to simply referencing
    properties. The full capability Groovy offers in terms of navigating object graphs
    is at your fingertips, which often becomes useful when iterating, as the next
    section will show.


    ### Built-in Grails Tags


    GSP has a number of built-in tags for performing basic operations; they include
    looping, switching, and using logical if statements. In general, because they
    promote a cleaner separation of concerns and allow you to create well-formed markup,
    tags are preferable to embedding scriptlets. Each GSP tag requires the prefix
    `g:` before the tag name so that it is recognized as a GSP tag. Unlike JSP, which
    requires directives to import tag libraries, no additional page directive is needed.


    ![Image](images/square.jpg) **Note**  GSP also supports JSP custom tag libraries,
    which can be imported with the standard JSP taglib directive.


    In the next few sections, you’ll see the tags that are built in to Grails. These
    tags are there by default and require no extra work by the developer.


    #### Setting Variables with Tags


    Occasionally, it is useful to set the value of a variable or define a new variable
    within the scope (commonly referred to as the *page context*) of a GSP. Both use
    cases can be achieved via the `<g:set>` tag, which will set or define a variable
    in the page context regardless of whether it already exists. The `<g:set>` tag
    takes two attributes: the `var` attribute, which defines the name of the variable
    to set, and a `value` attribute, which is generally an expression:


    `<g:set var="albumTitle" value="${album.title}" />`


    By default, variables set with `<g:set>` are assumed to be within the page scope.
    What is more, you can set a variable in the `session` scope simply by using the
    `scope` attribute:


    `<g:set scope="session" var="user" value="${user}"  />`


    In addition to the `session` scope, a number of others are available.


    > *   `application`: Stores variables for the scope of the whole application

    > *   `session`: Stores variables for the scope of the user session

    > *   `flash`: Stores variables for the current request and the next request only

    > *   `request`: Stores variables for the scope of the current request

    > *   `page`: Stores variables for the scope of the rendering page


    Another fairly basic requirement, along with setting variables, is the ability
    to conditionally display information. In the next section, you’ll see how you
    can achieve this.'
  trans: '

    #### 页面指令


    GSP 支持 JSP 中可用页面指令的一个有限子集。*页面指令* 是出现在 GSP 顶部的一条指令，用于执行页面所依赖的操作。例如，它可以设置内容类型、执行导入或设置页面属性，甚至可以是特定于容器的属性。


    其中最有用的指令之一是 `contentType` 指令，它允许你设置响应的内容类型。这很有用，因为它允许你使用 GSP 输出 HTML 标记以外的格式，包括
    XML 或纯文本。在使用上，该指令与 JSP 相同，指令出现在页面顶部并以 `<%@` 开头。


    清单 5-2 将内容类型设置为 `text/xml`，这允许你输出 XML。这在处理 Ajax 和类似技术时非常有用。


    ***清单 5-2.** contentType 页面指令*


    `<%@ page contentType="text/xml; charset=UTF-8" %>`


    另一个可用的页面指令是 `import` 指令，它类似于 Java 或 Groovy 类中的 `import` 语句。然而，由于 Groovy 默认导入了许多类，并且
    Grails 鼓励采用 MVC 架构（其中大部分逻辑应放在控制器中而非视图中），因此 `import` 的使用并不常见。尽管如此，清单 5-3 展示了一个从
    `java.sql.*` 包中导入 `Time` 类的示例。


    ***清单 5-3.** import 页面指令*


    ` <%@ page import="java.sql.Time" %>`


    ![Image](img/square.jpg) **注意**  Groovy 默认导入 `java.lang`、`java.util`、`java.io`、`java.net`、`groovy.lang`
    和 `groovy.util` 包。


    #### Groovy 脚本小程序


    GSP 力求尽可能与 JSP 保持一致，因此它支持使用 `<%...%>` 语法的传统 JSP 脚本小程序块。本质上，一旦你输入了开始的 `<%` 声明，你就进入了
    Groovy 的世界，并且可以输入你选择的任何 Groovy 代码，直到结束的 `%>` 声明。


    这意味着你可以通过组合脚本小程序声明来使用脚本小程序执行循环和逻辑 `if` 语句，如清单 5-4 所示。


    ***清单 5-4.** 脚本小程序实战*


    `<html>`

    `    <body>`

    `      <% 3.times { %>`

    `        <p>我被打印了三次！</p>`

    `      <% } %>`

    `    </body>`

    `</html>`


    请注意，脚本小程序的存在更多是为了与 JSP 语法保持一致。在实践中，不鼓励使用它们，而推荐使用 GSP 标签，你将在“内置 Grails 标签”部分看到这些标签。


    虽然前面的语法允许在开始和结束声明之间插入任意代码，但它实际上并不会在脚本小程序块内部显式输出任何内容。换句话说，与前面的示例一样，你必须使用结束的 `%>`
    括号来关闭脚本小程序表达式，以便定义你想要重复三次的内容。但是，你可以使用前面提到的 `out` 属性来输出到此响应：


    `<% out << "打印我！" %>`


    前面的代码将使用 `out` 属性将文本“打印我！”输出到响应。可以想象，到处使用这些 `out <<` 语句可能会有点繁琐，因此 GSP 通过 `<%=...%>`
    语句（注意开始声明后面的等号）支持从 JSP 继承的另一种语法。本质上，以下示例等同于你在前面代码中看到的内容：


    `<%= "打印我！" %>`


    这里的 `=` 号确保开始脚本小程序括号后面的任何表达式的结果都会被输出到响应。响应通常是标记和代码的混合体，最终将一些文本发送到浏览器或客户端。现在你已经了解了
    GSP 与 JSP 的相似之处，让我们来看一个你在 JSP 中找不到的特性：嵌入的 `GString`。


    #### 作为 GString 的 GSP


    自从引入 JSTL 以来，上一节中展示的脚本小程序和声明的使用就有点不受待见了。取而代之的是，JSP 中有一种表达式语言，可以与 `<c:out>` 标准标签结合使用来输出值，如清单
    5-5 所示。


    ***清单 5-5.** JSP c:out 标签*


    `<%-- 输出专辑标题 --%>`

    `<p><c:out value="${album.title}" /></p>`


    ![Image](img/square.jpg) **提示**  前面的 JSP 示例使用 `<%--...--%>` 语法来表示不应出现在渲染响应中的注释。GSP
    也支持使用相同语法的这些注释。


    除了前面相当冗长的标签之外，你还需要导入包含 `<c:out>` 标签的标签库，方法是在 JSP 顶部使用页面指令。所有这些只是为了使用一个能将值渲染到响应的标签，需要付出大量努力。幸运的是，使用
    GSP 会稍微简单一些，因为它支持嵌入的 `GString` 值：


    `<p>${album.title}</p>`


    如果你仔细想想，一个 GSP 本质上就是一个大的 `GString`，因此允许在 JSP 中也能找到的相同 `${...}` 表达式嵌套在其中。值得庆幸的是，`GString`
    中允许的表达式并不仅限于简单地引用属性。Groovy 在导航对象图方面提供的全部能力都触手可及，这在迭代时通常非常有用，下一节将展示这一点。


    ### 内置 Grails 标签


    GSP 有许多用于执行基本操作的内置标签；它们包括循环、切换和使用逻辑 if 语句。通常，由于标签促进了更清晰的问题分离，并允许你创建格式良好的标记，因此它们比嵌入脚本小程序更可取。每个
    GSP 标签都需要在标签名称前加上前缀 `g:`，以便被识别为 GSP 标签。与需要指令来导入标签库的 JSP 不同，这里不需要额外的页面指令。


    ![Image](img/square.jpg) **注意**  GSP 也支持 JSP 自定义标签库，可以使用标准的 JSP taglib 指令导入。


    在接下来的几节中，你将看到 Grails 内置的标签。这些标签默认存在，不需要开发者做额外的工作。


    #### 使用标签设置变量


    有时，在 GSP 的作用域（通常称为*页面上下文*）内设置变量的值或定义一个新变量是很有用的。这两种用例都可以通过 `<g:set>` 标签实现，无论变量是否已存在，它都会在页面上下文中设置或定义一个变量。`<g:set>`
    标签接受两个属性：`var` 属性，定义要设置的变量名称；以及 `value` 属性，通常是一个表达式：


    `<g:set var="albumTitle" value="${album.title}" />`


    默认情况下，使用 `<g:set>` 设置的变量被认为是在页面作用域内。此外，你可以通过简单地使用 `scope` 属性在 `session` 作用域中设置一个变量：


    `<g:set scope="session" var="user" value="${user}"  />`


    除了 `session` 作用域之外，还有许多其他作用域可用。


    > *   `application`：为整个应用程序的作用域存储变量

    > *   `session`：为用户会话的作用域存储变量

    > *   `flash`：仅为当前请求和下一个请求存储变量

    > *   `request`：为当前请求的作用域存储变量

    > *   `page`：为渲染页面的作用域存储变量


    除了设置变量之外，另一个相当基本的需求是有条件地显示信息。在下一节中，你将看到如何实现这一点。

    '
- fmt: "#### Logical Tags\n\nAs previously mentioned, it is often useful to display\
    \ information based on a condition. At the most basic level, it is useful to have\
    \ basic programming constructs such as `if` and `else` in the view to facilitate\
    \ this. GSP has the aptly named `<g:if>`, `<g:elseif>`, and `<g:else>` tags that,\
    \ as with any regular programming construct, are used in conjunction with one\
    \ another to conditionally display output.\n\nThe `<g:if>` and `<g:elseif>` tags\
    \ take an attribute, called `test`, whose value can be in expression language\
    \ (that is, statements surrounded by `${..}`), as shown in [Listing 5-6](#Chapter05.html#list_5_6).\n\
    \n***Listing 5-6.** Usage of Logical Blocks*\n\n```\n<g:if test=\"${album?.year\
    \ < 1980 && album?.genre == 'Rock'}\">\n       Classic rock\n</g:if>\n<g:elseif\
    \ test=\"${album?.year >= 1980 && album?.genre == 'Rock'}\">\n       Modern Rock\n\
    </g:elseif>\n<g:else>\n       Other\n</g:else>\n```\n\nAn interesting aspect of\
    \ the previous code is the use of Groovy’s safe dereference operator, `?.`. The\
    \ operator really comes into its own when used in views, because it is often useful\
    \ to navigate an object graph and display information only if all elements navigated\
    \ through don’t evaluate to `null`. If you look at the views generated during\
    \ scaffolding, you will observe a lot of this in action. Yet another useful feature\
    \ of the method is that it allows the optional execution of methods. For example,\
    \ you may for some reason want the title of the album in uppercase, in which case\
    \ you would use an expression like the following:\n\n`${album.title.toUpperCase()}`\n\
    \nUnfortunately, if either the `album` or `title` of the `album` in the previous\
    \ code is `null`, a horrid `NullPointerException` will be thrown. To circumvent\
    \ this, the safe dereference operator comes to the rescue:\n\n`${album?.title?.toUpperCase()}`\n\
    \nHere the `toUpperCase` method is executed *only* if it can be reached; otherwise,\
    \ the entire expression evaluates to `null`. This is useful because `null` in\
    \ GSP results in an empty string being printed to the response.\n\nThat’s it for\
    \ now on logical tags, although you will see their use popping up throughout the\
    \ book.\n\n#### Iterative Tags\n\nIterating over collections of objects is one\
    \ of the more common tasks when working with any view technology, GSP being no\
    \ exception. Again, scriptlets *could* be used to achieve iteration, but why?\
    \ You have GSP tags, which allow for a much cleaner transition between code and\
    \ markup.\n\nThe first tag we’ll cover is the `<g:each>` tag, which is essentially\
    \ the tag equivalent of the Groovy `each` method and in fact simply delegates\
    \ to this method internally, as shown in [Listing 5-7](#Chapter05.html#list_5_7).\n\
    \n***Listing 5-7.** Iterating with `<g:each>`*\n\n```\n<g:each in=\"${album.songs?}\"\
    >\n  <span class=\"tag\">${it.title}</span>\n</g:each>\n```\n\n![Image](images/square.jpg)\
    \ **Tip** You can also use the safe dereference operator at the end of expressions\
    \ (see the previous section). It will not iterate if the `songs` property is `null`.\n\
    \nLike its closely related JSTL cousin, the `<g:each>` tag allows the option of\
    \ specifying the name of the object within the current iteration. The name of\
    \ the object, as with closures, defaults to an argument called `it`, as shown\
    \ in [Listing 5-7](#Chapter05.html#list_5_7). When using nested tags, however,\
    \ it is good practice to name the variable being iterated over, which you can\
    \ do with the `var` attribute, as shown in [Listing 5-8](#Chapter05.html#list_5_8).\n\
    \n***Listing 5-8.** Iterating with `<g:each>` and a Named Variable*\n\n```\n<g:each\
    \ var=\"song\" in=\"${album.songs?}\">\n  <span class=\"song\">${song.title}</span>\n\
    </g:each>\n```\n\nGSP tags are, at root, just closures, and in Groovy the variable\
    \ `it` refers to the default argument of the *innermost* closure. If you use the\
    \ `<g:each>` tag without declaring a `var` attribute and try to reference the\
    \ default `it` variable within a nested GSP tag, this will result in evaluating\
    \ it to the *current* innermost tag and not the surrounding `<g:each>` tag. By\
    \ naming the variable used by `<g:each>` using the `var` attribute, you circumvent\
    \ this conflict and any similar ones. If you remember that GSP tags are closures,\
    \ you will have no trouble at all adapting to the mind-set. The next iterative\
    \ tag GSP provides is the `<g:while>` tag, which behaves like the traditional\
    \ `while` loop by waiting for the expression specified within the `test` attribute\
    \ to evaluate to `false`. As with any `while` loop, the condition should always\
    \ end up evaluating to `false` at some point; otherwise, you will find yourself\
    \ in a never-ending loop. [Listing 5-9](#Chapter05.html#list_5_9) shows an example\
    \ that loops while the variable `i` is greater than zero.\n\n***Listing 5-9.**\
    \ The `<g:while>` Tag*\n\n```\n<g:set var=\"i\" expr=\"${album.songs?.size()}\"\
    \ />\n<g:while test=\"${i > 0}\">\n      <g:set var=\"i\" expr=\"${i-1}\" />\n\
    </g:while>\n```\n\nHere, you get the total number of `songs` from the `album`\
    \ and store them in the variable `i`. You then start a `<g:while>` loop that will\
    \ decrement the `i` variable on each iteration. The loop will continue until `i`\
    \ reaches zero. The loop is equivalent to the following Groovy code:\n\n```\n\
    while(i > 0) i=i-1\n```\n\nUsing `<g:each>` and `<g:while>` is not the only way\
    \ to loop over a collection. In the next section, you’ll see constructs that provide\
    \ the powerful combination of filtering and iteration.\n\n#### Filtering and Iteration\n\
    \nSome of the new methods that accept closures in Groovy provide the powerful\
    \ ability to filter and search collections (such as `collect`, `findAll`, and\
    \ `grep`). It would be a shame if that power couldn’t be extended into GSP tags.\
    \ Fear not—there are tag equivalents of these three that allow some pretty powerful\
    \ filtering capabilities.\n\n##### The collect Tag\n\nThe `<g:collect>` tag allows\
    \ you to iterate over and collect properties of objects within a collection. Say,\
    \ for example, you want the titles of all albums; you can achieve this simply\
    \ with `<g:collect>`, as [Listing 5-10](#Chapter05.html#list_5_10) shows.\n\n\
    ***Listing 5-10.** Using `<g:collect>` to Collect Values*\n\n```\n<ol>\n<g:collect\
    \ in=\"${albums}\" expr=\"${it.title}\">\n   <li>${it}</li>\n</g:collect>\n</ol>\n\
    ```\n\nIn the previous example, an HTML list of album titles is created by passing\
    \ a collection of albums to the `in` attribute via the `${...}` syntax. The second\
    \ attribute, the `expr` attribute, contains an expression that is used to specify\
    \ what should be collected (in this case the `title` property). Again, use the\
    \ default `it` argument within the expression just as you would in a closure.\
    \ In fact, the previous code is equivalent to the scriptlet code in [Listing 5-11](#Chapter05.html#list_5_11).\n\
    \n***Listing 5-11.** Equivalent Scriptlet Using a Closure*\n\n```\n<ol>\n  <%\
    \ albums.collect{ it.title }.each { %>\n     <li>${it}</li>\n   <%}%>\n</ol>\n\
    ```\n\nAs you can see, the expression equates to what is found within the curly\
    \ braces of the `collect` closure. Whatever you place in there can also be placed\
    \ inside the `expr` attribute.\n\nOf course, you can also do this with a GPath\
    \ expression. Recall what you learned about GPath: if you reference the `title`\
    \ property and use the dereference operator on a *list* of albums, a list of titles\
    \ is produced, as [Listing 5-12](#Chapter05.html#list_5_12) shows.\n\n***Listing\
    \ 5-12.** Using GPath to Iterate over Album Titles*\n\n```\n<ol>\n   <g:each in=\"\
    ${albums.title}\" >\n      <li>${it}</li>\n   </g:each>\n</ol>\n```\n\nThe `<g:collect>`\
    \ tag does, however, give you another option and allows the logic within the `expr`\
    \ attribute to be in your control."
  raw: '#### Logical Tags


    As previously mentioned, it is often useful to display information based on a
    condition. At the most basic level, it is useful to have basic programming constructs
    such as `if` and `else` in the view to facilitate this. GSP has the aptly named
    `<g:if>`, `<g:elseif>`, and `<g:else>` tags that, as with any regular programming
    construct, are used in conjunction with one another to conditionally display output.


    The `<g:if>` and `<g: elseif>` tags take an attribute, called `test`, whose value
    can be in expression language (that is, statements surrounded by `${..}`), as
    shown in [Listing 5-6](#Chapter05.html#list_5_6).


    ***Listing 5-6.** Usage of Logical Blocks*


    `<g:if test="${album?.year < 1980 && album?.genre == ''Rock''}">`

    `       Classic rock`

    `</g:if>`

    `<g:elseif test="${album?.year >= 1980 && album?.genre == ''Rock''}">`

    `       Modern Rock`

    `</g:elseif>`

    `<g:else>`

    `       Other`

    `</g:else>`


    An interesting aspect of the previous code is the use of Groovy’s safe dereference
    operator, `?.`. The operator really comes into its own when used in views, because
    it is often useful to navigate an object graph and display information only if
    all elements navigated through don’t evaluate to `null`. If you look at the views
    generated during scaffolding, you will observe a lot of this in action. Yet another
    useful feature of the method is that it allows the optional execution of methods.
    For example, you may for some reason want the title of the album in uppercase,
    in which case you would use an expression like the following:


    `${album.title.toUpperCase()}`


    Unfortunately, if either the `album` or `title` of the `album` in the previous
    code is `null`, a horrid `NullPointerException` will be thrown. To circumvent
    this, the safe dereference operator comes to the rescue:


    `${album?.title?.toUpperCase()}`


    Here the `toUpperCase` method is executed *only* if it can be reached; otherwise,
    the entire expression evaluates to `null`. This is useful because `null` in GSP
    results in an empty string being printed to the response.


    That’s it for now on logical tags, although you will see their use popping up
    throughout the book.


    #### Iterative Tags


    Iterating over collections of objects is one of the more common tasks when working
    with any view technology, GSP being no exception. Again, scriptlets *could* be
    used to achieve iteration, but why? You have GSP tags, which allow for a much
    cleaner transition between code and markup.


    The first tag we’ll cover is the `<g:each>` tag, which is essentially the tag
    equivalent of the Groovy `each` method and in fact simply delegates to this method
    internally, as shown in [Listing 5-7](#Chapter05.html#list_5_7).


    ***Listing 5-7.** Iterating with <g:each>*


    `<g:each in="${album.songs?}">`

    `  <span class="tag">${it.title}</span>`

    `</g:each>`


    ![Image](images/square.jpg) **Tip** You can also use the safe dereference operator
    at the end of expressions (see the previous section). It will not iterate if the
    `songs` property is `null`.


    Like its closely related JSTL cousin, the `<g:each>` tag allows the option of
    specifying the name of the object within the current iteration. The name of the
    object, as with closures, defaults to an argument called `it`, as shown in [Listing
    5-7](#Chapter05.html#list_5_7). When using nested tags, however, it is good practice
    to name the variable being iterated over, which you can do with the `var` attribute,
    as shown in [Listing 5-8](#Chapter05.html#list_5_8).


    ***Listing 5-8.** Iterating with <g:each> and a Named Variable*


    `<g:each var="song" in="${album.songs?}">`

    `  <span class="song">${song.title}</span>`

    `</g:each>`


    GSP tags are, at root, just closures, and in Groovy the variable `it` refers to
    the default argument of the *innermost* closure. If you use the `<g:each>` tag
    without declaring a `var` attribute and try to reference the default `it` variable
    within a nested GSP tag, this will result in evaluating it to the *current* innermost
    tag and not the surrounding `<g:each>` tag. By naming the variable used by `<g:each>`
    using the `var` attribute, you circumvent this conflict and any similar ones.
    If you remember that GSP tags are closures, you will have no trouble at all adapting
    to the mind-set. The next iterative tag GSP provides is the `<g:while>` tag, which
    behaves like the traditional `while` loop by waiting for the expression specified
    within the `test` attribute to evaluate to `false`. As with any `while` loop,
    the condition should always end up evaluating to `false` at some point; otherwise,
    you will find yourself in a never-ending loop. [Listing 5-9](#Chapter05.html#list_5_9)
    shows an example that loops while the variable i is greater than zero.


    ***Listing 5-9.** The <g:while> Tag*


    `<g:set var="i" expr="${album.songs?.size()}" />`

    `<g:while test="${i > 0}">`

    `      <g:set var="i" expr="${i-1}" />`

    `</g:while>`


    Here, you get the total number of `songs` from the `album` and store them in the
    variable `i`. You then start a `<g:while>` loop that will decrement the `i` variable
    on each iteration. The loop will continue until `i` reaches zero. The loop is
    equivalent to the following Groovy code:


    `while(i > 0) i=i-1`


    Using `<g:each>` and `<g:while>` is not the only way to loop over a collection.
    In the next section, you’ll see constructs that provide the powerful combination
    of filtering and iteration.


    #### Filtering and Iteration


    Some of the new methods that accept closures in Groovy provide the powerful ability
    to filter and search collections (such as `collect`, `findAll`, and `grep`). It
    would be a shame if that power couldn’t be extended into GSP tags. Fear not—there
    are tag equivalents of these three that allow some pretty powerful filtering capabilities.


    ##### The collect Tag


    The `<g:collect>` tag allows you to iterate over and collect properties of objects
    within a collection. Say, for example, you want the titles of all albums; you
    can achieve this simply with `<g:collect>`, as [Listing 5-10](#Chapter05.html#list_5_10)
    shows.


    ***Listing 5-10.** Using <g:collect> to Collect Values*


    `<ol>`

    `<g:collect in="${albums}" expr="${it.title}">`

    `   <li>${it}</li>`

    `</g:collect>`

    `</ol>`


    In the previous example, an HTML list of album titles is created by passing a
    collection of albums to the `in` attribute via the `${...}` syntax. The second
    attribute, the `expr` attribute, contains an expression that is used to specify
    what should be collected (in this case the `title` property). Again, use the default
    `it` argument within the expression just as you would in a closure. In fact, the
    previous code is equivalent to the scriptlet code in [Listing 5-11](#Chapter05.html#list_5_11).


    ***Listing 5-11.** Equivalent Scriptlet Using a Closure*


    `<ol>`

    `  <% albums.collect{ it.title }.each { %>`

    `     <li>${it}</li>`

    `   <%}%>`

    `</ol>`


    As you can see, the expression equates to what is found within the curly braces
    of the `collect` closure. Whatever you place in there can also be placed inside
    the `expr` attribute.


    Of course, you can also do this with a GPath expression. Recall what you learned
    about GPath: if you reference the `title` property and use the dereference operator
    on a *list* of albums, a list of titles is produced, as [Listing 5-12](#Chapter05.html#list_5_12)
    shows.


    ***Listing 5-12.** Using GPath to Iterate over Album Titles*


    `<ol>`

    `   <g:each in="${albums.title}" >`

    `      <li>${it}</li>`

    `   </g:each>`

    `</ol>`


    The `<g:collect>` tag does, however, give you another option and allows the logic
    within the `expr` attribute to be in your control.'
  trans: '

    #### 逻辑标签


    如前所述，根据条件显示信息通常非常有用。在最基本的层面上，在视图中使用诸如 `if` 和 `else` 之类的基本编程结构来实现这一点是很有用的。GSP 提供了命名恰当的
    `<g:if>`、`<g:elseif>` 和 `<g:else>` 标签，与任何常规编程结构一样，它们相互配合使用，以有条件地显示输出。


    `<g:if>` 和 `<g:elseif>` 标签接受一个名为 `test` 的属性，其值可以使用表达式语言（即用 `${..}` 括起来的语句），如清单
    5-6 所示。


    ***清单 5-6.** 逻辑块的使用*


    `<g:if test="${album?.year < 1980 && album?.genre == ''Rock''}">`

    `       经典摇滚`

    `</g:if>`

    `<g:elseif test="${album?.year >= 1980 && album?.genre == ''Rock''}">`

    `       现代摇滚`

    `</g:elseif>`

    `<g:else>`

    `       其他`

    `</g:else>`


    上述代码的一个有趣之处在于使用了 Groovy 的安全解引用运算符 `?.`。该运算符在视图中使用时尤其能发挥其作用，因为在导航对象图时，通常需要仅在所导航的所有元素都不为
    `null` 时才显示信息。如果你查看脚手架生成的视图，会发现大量此类用法。该方法的另一个有用特性是它允许可选地执行方法。例如，出于某种原因，你可能希望专辑标题以大写形式显示，此时可以使用如下表达式：


    `${album.title.toUpperCase()}`


    不幸的是，如果上述代码中的 `album` 或 `album` 的 `title` 为 `null`，则会抛出一个可怕的 `NullPointerException`。为了避免这种情况，安全解引用运算符就派上了用场：


    `${album?.title?.toUpperCase()}`


    在这里，`toUpperCase` 方法*仅*在可以访问到时才会执行；否则，整个表达式的结果为 `null`。这很有用，因为在 GSP 中，`null` 会导致向响应输出一个空字符串。


    关于逻辑标签就先介绍到这里，不过你会在本书中不断看到它们的身影。


    #### 迭代标签


    在使用任何视图技术时，遍历对象集合是最常见的任务之一，GSP 也不例外。同样，*可以*使用脚本片段来实现迭代，但何必呢？你有 GSP 标签，它们能实现代码与标记之间更清晰的转换。


    我们将介绍的第一个标签是 `<g:each>` 标签，它本质上相当于 Groovy 的 `each` 方法，实际上内部只是委托给了该方法，如清单 5-7 所示。


    ***清单 5-7.** 使用 <g:each> 进行迭代*


    `<g:each in="${album.songs?}">`

    `  <span class="tag">${it.title}</span>`

    `</g:each>`


    ![图片](img/square.jpg) **提示** 你也可以在表达式末尾使用安全解引用运算符（参见上一节）。如果 `songs` 属性为 `null`，则不会进行迭代。


    与其近亲 JSTL 类似，`<g:each>` 标签允许指定当前迭代中对象的名称。与闭包一样，该对象的名称默认为一个名为 `it` 的参数，如清单 5-7
    所示。然而，在使用嵌套标签时，最好为正在迭代的变量命名，这可以通过 `var` 属性实现，如清单 5-8 所示。


    ***清单 5-8.** 使用 <g:each> 和命名变量进行迭代*


    `<g:each var="song" in="${album.songs?}">`

    `  <span class="song">${song.title}</span>`

    `</g:each>`


    从根本上说，GSP 标签就是闭包，而在 Groovy 中，变量 `it` 指的是*最内层*闭包的默认参数。如果你使用 `<g:each>` 标签时没有声明
    `var` 属性，并试图在嵌套的 GSP 标签中引用默认的 `it` 变量，那么它将被解析为*当前*最内层的标签，而不是外层的 `<g:each>` 标签。通过使用
    `var` 属性为 `<g:each>` 使用的变量命名，你可以避免这种冲突以及任何类似的冲突。如果你记住 GSP 标签就是闭包，那么适应这种思维方式将毫无困难。GSP
    提供的下一个迭代标签是 `<g:while>` 标签，它的行为类似于传统的 `while` 循环，等待 `test` 属性中指定的表达式计算结果为 `false`。与任何
    `while` 循环一样，条件最终应该在某一点计算结果为 `false`；否则，你将陷入无限循环。清单 5-9 展示了一个示例，该示例在变量 `i` 大于零时循环。


    ***清单 5-9.** <g:while> 标签*


    `<g:set var="i" expr="${album.songs?.size()}" />`

    `<g:while test="${i > 0}">`

    `      <g:set var="i" expr="${i-1}" />`

    `</g:while>`


    在这里，你从 `album` 中获取 `songs` 的总数，并将其存储在变量 `i` 中。然后启动一个 `<g:while>` 循环，该循环将在每次迭代中递减变量
    `i`。循环将持续到 `i` 变为零。该循环等价于以下 Groovy 代码：


    `while(i > 0) i=i-1`


    使用 `<g:each>` 和 `<g:while>` 并不是遍历集合的唯一方法。在下一节中，你将看到提供过滤和迭代强大组合的结构。


    #### 过滤与迭代


    Groovy 中一些接受闭包的新方法提供了过滤和搜索集合的强大能力（例如 `collect`、`findAll` 和 `grep`）。如果这种能力不能扩展到
    GSP 标签中，那将是一种遗憾。别担心——这三个方法都有对应的标签，它们提供了一些相当强大的过滤能力。


    ##### collect 标签


    `<g:collect>` 标签允许你遍历并收集集合中对象的属性。例如，假设你想要所有专辑的标题；你可以简单地使用 `<g:collect>` 来实现，如清单
    5-10 所示。


    ***清单 5-10.** 使用 <g:collect> 收集值*


    `<ol>`

    `<g:collect in="${albums}" expr="${it.title}">`

    `   <li>${it}</li>`

    `</g:collect>`

    `</ol>`


    在上面的示例中，通过使用 `${...}` 语法将专辑集合传递给 `in` 属性，创建了一个包含专辑标题的 HTML 列表。第二个属性 `expr` 属性包含一个表达式，用于指定要收集的内容（在本例中是
    `title` 属性）。同样，在表达式中使用默认的 `it` 参数，就像在闭包中一样。实际上，上述代码等价于清单 5-11 中的脚本片段代码。


    ***清单 5-11.** 使用闭包的等效脚本片段*


    `<ol>`

    `  <% albums.collect{ it.title }.each { %>`

    `     <li>${it}</li>`

    `   <%}%>`

    `</ol>`


    如你所见，该表达式等同于 `collect` 闭包的花括号内的内容。你放在那里的任何内容也可以放在 `expr` 属性中。


    当然，你也可以使用 GPath 表达式来实现这一点。回想一下你学过的关于 GPath 的知识：如果你引用 `title` 属性，并对一个*列表*的专辑使用解引用运算符，则会生成一个标题列表，如清单
    5-12 所示。


    ***清单 5-12.** 使用 GPath 遍历专辑标题*


    `<ol>`

    `   <g:each in="${albums.title}" >`

    `      <li>${it}</li>`

    `   </g:each>`

    `</ol>`


    不过，`<g:collect>` 标签确实为你提供了另一种选择，并允许你控制 `expr` 属性中的逻辑。

    '
- fmt: "# The `findAll` Tag\n\nCollecting properties from a collection via the object\
    \ graph is handy, but sometimes you want to iterate over only those values that\
    \ meet certain criteria. This is often achieved by iterating over all elements\
    \ and having nested `if` statements. However, using `<g:findAll>`, as shown in\
    \ [Listing 5-13](#Chapter05.html#list_5_13), is far more elegant.\n\n***Listing\
    \ 5-13.** Using `<g:findAll>` to Locate Specific Elements*\n\n```\n<g:findAll\
    \ in=\"${albums}\" expr=\"${it.songs?.title.contains('Love')}\">\n  <li>${it.title}</li>\n\
    </g:findAll>\n```\n\nThis example is another interesting demonstration of the\
    \ power of GPath, Groovy’s expression language. The expression in bold references\
    \ the default argument `it`, which is the current `Album` instance being iterated\
    \ over, and then uses GPath to retrieve a collection of all the names of the songs.\n\
    \nThe `songs` property, too, is itself a collection (a `java.util.Set`, to be\
    \ specific) and does not have a `title` property, but GPath recognizes that the\
    \ reference to the `title` property is an attempt to retrieve a collection of\
    \ name properties from the contained elements within the `songs` property.\n\n\
    Since the result is a collection, you can invoke the regular JDK `contains` method\
    \ to look up all albums that have the word *Love* in their title. The result,\
    \ far more readable than a bunch of nested `if` statements, is another case where\
    \ you can see how a Groovy view technology like GSP makes a remarkable amount\
    \ of sense.\n\nYou’ve seen quite a few options for performing different kinds\
    \ of logical statements and iteration. Controlling the logical flow of a view\
    \ is not, however, the only task you have when writing the view. One common activity\
    \ is linking controllers and actions, which you will look at next. But before\
    \ that, there is something important to note. This marks the end of the built-in\
    \ tags. The tags you’ve seen so far are internally handled and optimized by GSP.\
    \ The next section shifts the focus to Grails dynamic tags and how they differ\
    \ from the built-in tags.\n\n## Grails Dynamic Tags\n\nDynamic tags in Grails\
    \ are those provided through classes called *tag libraries*, which can be found\
    \ within the `grails-app/taglib` directory of any Grails project. Grails provides\
    \ a number of tag libraries out of the box that you will see in the next few sections.\
    \ Then creating your own tag libraries will be explored.\n\nFirst, you need to\
    \ understand what makes dynamic tags different from other tags—that is, besides\
    \ the fact that they are provided by these libraries. Fundamentally, they can\
    \ be used just as any other tag is. For example, you can use the `<g:link>` tag\
    \ like the built-in tags you saw previously without requiring any `import` directive.\n\
    \nMore interestingly, dynamic tags can also be invoked as methods from scriptlets\
    \ and `GString` expressions. Why is this useful? To maintain a clean syntax and\
    \ valid XML, it is best to avoid nesting tags within tag attributes. In JSP you\
    \ often see code like that in [Listing 5-14](#Chapter05.html#list_5_14), code\
    \ that can be difficult to read and is not well-formed markup.\n\n***Listing 5-14.**\
    \ Unattractive JSP Example*\n\n```\n<a href=\"<c:out value=\"${application.contextPath}\"\
    \ />/show.jsp\">A dynamic link</a>\n```\n\nClearly, because of GSP’s rather JSP-like\
    \ nature, this problem could have been inherited if it were not for the dynamic\
    \ nature of Groovy. So how would you invoke a GSP tag as a method call? Observe\
    \ the example in [Listing 5-15](#Chapter05.html#list_5_15).\n\n***Listing 5-15.**\
    \ An Example of a GSP Tag as a Method Call*\n\n```\n<!-- With a regular tag -->\n\
