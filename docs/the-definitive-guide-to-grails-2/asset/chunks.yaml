    ### 测试控制器


    Grails 使用混入（mixin）为单元测试控制器提供特殊行为。例如，当前的 `AlbumController` 类没有测试覆盖。如果使用 `create-controller`
    命令创建控制器，则会同时创建一个单元测试。如果没有，要为该控制器创建测试，你需要创建一个新的测试类。`create-controller` 命令生成的默认单元测试如清单
    4-47 所示。


    ***清单 4-47.** 控制器单元测试模板*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import org.junit.*`


    `@TestFor(AlbumController)`

    `class AlbumControllerTests {`


    `    void testSomething() {`

    `       fail "Implement me"`

    `    }`

    `}`


    让我们考虑一个我们想要测试的简单控制器操作。清单 4-48 展示了 `AlbumController` 中的一个 `list` 操作，它返回一个模型，该模型包含数据库中所有专辑的列表。


    ***清单 4-48.** 一个简单的控制器操作*


    `package com.gtunes`


    `class AlbumController {`


    `    def list() {`

    `        [albumList: Album.list()]`

    `    }`

    `}`


    一个尝试执行该操作并验证模型包含预期信息的单元测试可能类似于清单 4-49 中的代码。


    ***清单 4-49.** 一个简单的控制器单元测试*


    `package com.gtunes`


    `import grails.test.mixin.*`


    `@TestFor(AlbumController)`

    `class AlbumControllerTests {`


    `    void testListAction() {`

    `        def model = controller.list()`

    `        // 对模型进行断言`

    `    }`

    `}`


    尝试运行该测试将导致错误，如清单 4-50 所示。


    ***清单 4-50.** 控制器单元测试失败*


    `grails> test-app unit:`

    `| Running 1 unit test... 1 of 1`

    `| Failure:  testListAction(com.gtunes.AlbumControllerTests)`

    `|  groovy.lang.MissingMethodException: No signature of method: com.gtunes.Album.list()
    is`

    `applicable for argument types: () values: []`

    `| Completed 1 unit test, 1 failed in 200ms`

    `| Tests FAILED  - view reports in target/test-reports`

    `grails>`


    这里测试的问题在于 `AlbumController` 中的 `list` 操作调用了 `Album.list()` 方法，而该方法在我们的单元测试环境中不可用。幸运的是，框架使得模拟整个
    GORM API 变得非常容易，因此可以执行这样的单元测试。一种方法是使用带有领域类参数的 `@Mock` 注解。这会指示框架将 GORM API 添加到此领域类，并提供
    GORM 的完整内存实现，从而允许完整的 GORM API 在无需创建真实数据库的情况下运行。所有这些都在清单 4-51 中更完整的单元测试中得到了体现。


    ***清单 4-51.** 更新后的 AlbumControllerUnitTests*


    `package com.gtunes`


    `import grails.test.mixin.*`

    `import grails.test.mixin.domain.*`


    `@TestFor(AlbumController)`

    `@Mock(Album)`

    `class AlbumControllerTests {`


    `    void testListAction() {`

    `        new Album(title: ''Trilogy'').save()`

    `        new Album(title: ''Tarkus'').save()`


    `        def model = controller.list()`

    `        assert model.albumList?.size() == 2`

    `    }`

    `}`


    在清单 4-51 中，我们测试了返回的模型，但某些控制器操作会直接写入响应或发出重定向，而不是返回值。要测试写入响应的操作，你可以使用控制器的 `response`
    对象，它是 `org.codehaus.groovy.grails.plugins.testing.GrailsMockHttpServletResponse`
    类的一个实例，该类间接扩展了 `org.springframework.mock.web.MockHttpServletResponse` 类，并提供了额外的实用方法。


    `MockHttpServletResponse` 类中的几个有用方法允许你检查当前响应的状态。特别是，`getText()` 方法提供了对当前写入响应内容的字符串访问。例如，如果你有一个向响应渲染某些文本的操作，你可以像清单
    4-52 所示那样测试它。


    ***清单 4-52.** 测试响应的内容*


    `void testIndex() {`

    `    controller.index()`

    `    assert ''Welcome to the gTunes store!'' == response.text`

    `}`


    ### 控制器实战


    在本节中，你将学习如何使用 Grails 控制器构建一个简单的登录和注册系统。在第 12 章中，我们将重构此系统以使用更通用的 Grails 安全插件之一，但目前它将作为一个有用的起点。


    开发任何网站时首先要考虑的事情之一是网站的入口点。目前，你刚刚创建了一堆脚手架页面，但现在该是第一次考虑真正应用程序的时候了，从主页开始。


    #### 创建 gTunes 主页


    gTunes 应用程序是一个音乐商店，用户可以登录、浏览可用的音乐并购买他们可以播放的音乐。首先，你需要建立一个主页。你已经有了一个 `StoreController`，因此你可以将其用作处理主页的控制器。为了确保访问者被路由到此控制器，你可以修改
    `grails-app/conf/UrlMappings.groovy` 文件，将访问应用程序根目录的访问者映射到此控制器（参见清单 4-53）。


    ***清单 4-53.** 将用户路由到应用程序根目录的 StoreController*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/"(controller:"store")`

    `    }`

    `}`


    请注意，你可以使用正斜杠告诉 Grails 将对应用程序根目录的任何请求映射到 `StoreController`。从映射中可以看出，它没有映射到 `StoreController`
    中的任何特定操作，这将触发默认操作。默认操作是 `index` 操作，它当前会写出一个简单的文本响应。你需要更改 `index` 操作，以便视图委托生效。


    `def index() {}`


    现在，`index` 操作不再返回文本响应，而是委托给 `grails-app/views/store/index.gsp` 视图，你可以使用该视图来渲染主页。我们将从一些简单的、仅显示欢迎消息的内容开始；我们稍后可以对此进行扩展。清单
    4-54 显示了相关的标记代码。


    ***清单 4-54.** gTunes 主页*


    `<html>`

    `    <head>`

    `        <meta http-equiv="Content-type" content="text/html; charset=utf-8">`

    `        <meta name="layout" content="main">`

    `        <title>gTunes Store</title>`

    `                </head>`

    `    <body id="body">`

    `        <h1>Your online music store and storage service!</h1>`

    `        <p>Manage your own library, browse music and purchase new tracks as they`

    `           become available</p>`

    `                </body>`

    `</html>`


    下一步是考虑如何让用户注册、登录和注销。在此之前，你需要在 gTunes 应用程序中定义用户的概念。让我们在下一节中完成这项工作。

