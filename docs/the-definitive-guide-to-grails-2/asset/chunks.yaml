    ### 异步表单提交


    现在你已经有机会探索一个简单的示例，让我们尝试一些更具挑战性的内容。在构建 Ajax 应用时，将表单及其数据异步提交到服务器通常非常有用。目前，gTunes
    应用的登录过程使用的是常规表单提交，但如果用户无需刷新页面就能登录，岂不是更好？


    当前包含在 `grails-app/views/layouts/main.gsp` 布局中的登录表单是通过常规表单提交的。换句话说，表单提交是同步的；它不像
    Ajax 请求那样在后台进程中发生。jQuery 库使得创建提交 Ajax 请求的表单变得相当容易。


    然而，在编写实现新的支持 Ajax 的表单所需的 jQuery 代码之前，让我们先将渲染登录表单的代码移到它自己的 GSP 模板中。（这样做的意义稍后会变得清晰。）现在创建一个新文件
    `grails-app/views/user/_loginForm.gsp`，它将作为模板的基础，然后从布局中剪切并粘贴代码，使模板看起来像清单 8-4。


    ***清单 8-4.** 登录模板*


    `<p class="legend">登录您的 gTunes 账户</p>`

    `<g:form name="loginForm" url="[controller:''user'',action:''login'']" class="form">`

    `    <div class="input">`

    `        <g:textField required="true"`

    `                     placeholder="用户名"`

    `                     name="login"`

    `                     value="${fieldValue(bean:loginCmd, field:''login'')}" />`

    `        <g:hasErrors  bean="${loginCmd}" field="login">`

    `        <p class="error"><g:fieldError bean="${loginCmd}" field="login" /></p>`

    `        </g:hasErrors>`

    `    </div>`

    `    <div class="input">`

    `        <g:passwordField required="true"`

    `                         placeholder="密码"`

    `                         name="password" />`

    `        <g:hasErrors  bean="${loginCmd}" field="password">`

    `        <p class="error">`

    `            <g:fieldError bean="${loginCmd}" field="password" />`

    `        </p>`

    `        </g:hasErrors>`

    `    </div>`

    `    <div class="submit">`

    `        <input type="submit" value="登录" class="btn" />`

    `    </div>`

    `</g:form>`


    现在创建另一个模板来渲染 `loginForm` 模板，并渲染一些与创建新账户相关的标记。将这些标记组合在一起是有意义的，因为这两个部分（“创建新账户”和“登录”）将始终相邻渲染。创建一个名为
    `grails-app/views/user/_loginBox.gsp` 的文件，内容如清单 8-5 所示。


    ***清单 8-5.** loginBox 模板*


    `<div class="left">`

    `    <h1>需要账户？</h1>`

    `    <p class="legend"><g:link controller="user" action="register">立即注册</g:link>，开始`

    `创建您个人的音乐收藏！</p>`

    `    <g:link controller="user" action="register" class="btn">立即注册</g:link>`

    `</div>`

    `<div class="right" id="loginBox">`

    `    <h1>已是会员？</h1>`

    `    <g:render template="/user/loginForm"/>`

    `</div>`


    现在，在 `grails-app/views/store/index.gsp` 布局中，使用 `<g:render>` 标签来渲染模板，如清单 8-6 所示。


    ***清单 8-6.** 使用标签显示登录表单*


    `<g:render template="/user/loginBox"/>`


    完成这些后，是时候编写一些 jQuery 代码来发起 Ajax 调用并处理响应了。这些代码应定义在 `grails-app/views/store/index.gsp`
    中。参见清单 8-7。


    ***清单 8-7.** Ajax 登录代码*


    `<r:script>`

    `$(function() {`

    `    $(''#loginForm'').ajaxForm(function(result) {`

    `        $(''#loginBox'').html(result);`

    `    });`

    `});`

    `</r:script>`


    这段代码依赖于来自 [`https://github.com/malsup/form`](https://github.com/malsup/form) 的
    jQuery Form 插件。请注意，这不是一个 Grails 插件。从该仓库下载 `jquery.form.js` 文件，并将其放入 `web-app/js/`
    目录。文件就位后，编辑 `grails-app/conf/ApplicationResources.groovy`，使其看起来像清单 8-8。


    ***清单 8-8.** 将 jQuery Form 代码添加到 ApplicationResources.groovy*


    `// grails-app/conf/ApplicationResources.groovy`

    `modules = {`

    `    application {`

    `        resource url:''js/application.js''`

    `        resource url:''js/jquery.form.js''`

    `    }`

    `}`


    `ApplicationResources.groovy` 文件是一个配置文件，由资源插件读取。资源插件有助于优化静态资源（如应用程序使用的 JavaScript
    文件）的管理。清单 8-8 中的代码定义了一组静态资源，称为一个模块，其中包含提到的两个 JavaScript 文件。清单 8-7 中的 `r:script`
    标签也由资源插件提供。将那段 JavaScript 代码包裹在 `r:script` 标签中的好处之一是，资源插件会确保 JavaScript 在渲染页面的底部加载，这有利于优化页面加载时间。资源插件将在第
    12 章中更详细地讨论。现在，只需按描述配置文件，一切应该就能正常工作。


    清单 8-7 中的 `ajaxForm` 函数将向登录控制器动作提交一个 Ajax 请求，并使用响应来更新 DOM 中的 `loginBox` 元素。任何输入字段或提交按钮都无需更改。现在，如果你刷新页面并尝试登录，将会发生一件令人惊讶的事情。令人惊讶的是，你会看到整个页面的内容被放置在了
    `loginBox` `<div>` 中！这是因为你更新了客户端代码，但没有关注服务器端逻辑，而服务器端仍然在显示整个视图。要解决这个问题，你需要重新审视服务器端代码，使其只渲染
    HTML 片段，而不是整个页面。


    以防你不记得相关的代码，清单 8-9 展示了 `UserController` 中 `login` 动作的当前代码。


    ***清单 8-9.** 当前的 login 动作代码*


    `def login(LoginCommand cmd) {`

    `    if(request.method == ''POST'') {`

    `        if(!cmd.hasErrors()) {`

    `            session.user = cmd.getUser()`

    `            redirect(controller:''store'')`

    `        }`

    `        else {`

    `            render(view:''/store/index'', model:[loginCmd:cmd])`

    `        }`

    `    }`

    `    else {`

    `        render(view:''/store/index'')`

    `    }`

    `}`


    目前，清单 8-9 中的代码渲染了整个 `grails-app/views/store/ index.gsp` 视图，但实际上你只希望在登录失败时再次显示登录表单，或者在用户成功登录时显示一条欢迎消息。让我们重构代码以实现这一目标；清单
    8-10 显示了结果。


    ***清单 8-10.** 处理 Ajax 登录请求*


    `def login(LoginCommand cmd) {`

    `    if(request.method == ''POST'') {`

    `        if(!cmd.hasErrors()) {`

    `            session.user = cmd.getUser()`

    `            render template: ''/user/welcomeMessage''`

    `        }`

    `        else {`

    `            render template: ''loginBox'', model: [loginCmd: cmd]`

    `        }`

    `    }`

    `    else {`

    `        render template: ''loginBox''`

    `    }`

    `}`

