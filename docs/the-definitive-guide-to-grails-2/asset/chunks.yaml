    that describes what this plug-in is all about. [Listing 12-33](#Chapter12.html#list_12_33)
    shows the updated plug-in descriptor with the metadata provided.


    ***Listing 12-33.** Providing Metadata to the album-art Plug-in*


    `class AlbumArtGrailsPlugin {`

    `    def version = 0.1`

    `    def author = "Joe Someone"`

    `    def authorEmail = "joe@company.com"`

    `    def title = "Album art look-up plugin"`

    `    def description = ''A plug-in that provides facilities to look-up album art''`

    `    ...`

    `}`


    To spice things up even further, you’re going to do a bit of metaprogramming—first,
    by adding a `getAlbumArt` method to all controllers and second by allowing instances
