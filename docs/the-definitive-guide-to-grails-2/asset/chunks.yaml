    #### 分页


    无论采用何种查询方式，一个典型且实用的功能是能够对结果集进行分页。您已经了解到，`list()` 方法支持诸如 `max` 和 `offset` 之类的参数，这些参数允许您执行分页操作。例如，要获取前十条结果，您可以使用以下代码：


    `def results = Album.list(max:10)`


    要获取接下来的十条结果，您可以使用 `offset` 参数：


    `def results = Album.list(max:10, offset:10)`


    既然我们谈到了查询这个话题，您会很高兴地知道，同样的参数也可以用于对查询进行分页。例如，在使用动态查找器时，您可以将一个映射作为最后一个参数传递，该映射指定了
    `max` 和 `offset` 参数：


    `def results = Album.findAllByGenre("Alternative", [max:10, offset:20])`


    事实上，您可以使用前面“列出、排序和计数”部分中提到的任何参数，例如 `sort` 和 `order`：


    `def results = Album.findAllByGenre("Alternative", [sort:''dateCreated'',`

    `order:''desc''])`


    在视图中，您可以利用 `<g:paginate>` 标签，该标签会渲染“上一页”和“下一页”链接，以及用于跳转到特定结果集的数字链接，类似于谷歌的样式。在其最简单的形式中，`<g:paginate>`
    标签只需要记录的总数：


    `<g:paginate total="${Album.count()}" />`


    此示例假设您希望对当前控制器动作进行分页。如果不是这样，您可以使用 `<g:link>` 标签接受的相同属性（例如 `controller` 和 `action`）来自定义实际执行分页的控制器：


    `<g:paginate controller="album" action="list" total="${Album.count()}" />`


    您可以使用 `prev` 和 `next` 属性分别更改默认的“上一页”和“下一页”链接：


    `<g:paginate prev="Back" next="Forward" total="${Album.count()}" />`


    如果国际化（i18n）是一个需求，您可以使用 `<g:message>` 标签（作为*方法*调用）从消息资源包中提取要显示的文本：


    `<g:paginate prev="${message(code:''back.button.text'')}"`

    `            next="${message(code:''next.button.text'')}"`

    `            total="${Album.count()}" />`


    ![Image](img/square.jpg) **提示** 如果您对 Grails 中国际化支持的机制感兴趣，请查看第 7 章，其中详细介绍了消息资源包和切换区域设置。


    ### 配置 GORM


    GORM 有许多您可能想要配置的属性。Hibernate 中几乎所有可用的选项在 GORM 中也是可用的。您最可能想要实现的基本功能之一是启用某种形式的 SQL
    日志记录，以便调试性能问题并优化查询。


    #### SQL 日志记录


    如果您纯粹对监控到达数据库的 SQL 流量感兴趣，那么一个不错的选择是使用 `grails-app/conf/DataSource.groovy` 文件中的
    `logSql` 设置：


    `dataSource {`

    `    ...`

    `    logSql = true`

    `}`


    启用此设置后，Hibernate 发出的每条 SQL 语句都将打印到控制台。`logSql` 设置的缺点是您只能看到打印到控制台的预编译语句，而看不到正在插入的实际值。如果您需要查看这些值，请在
    `grails-app/conf/Config.groovy` 中设置一个特殊的 `log4j` 日志记录器，如下所示：


    `log4j = {`

    `    ...`

    `    logger {`

    `        trace "org.hibernate.SQL", "org.hibernate.type"`

    `    }`

    `}`


    #### 指定自定义方言


    多年来，Hibernate 已针对其支持的每个数据库进行了大量优化。为了支持不同的数据库类型，Hibernate 建模了*方言*的概念。对于其支持的每个数据库，都有一个知道如何与该数据库通信的
    `dialect` 类。


    甚至针对不同的数据库版本也有不同的方言。例如，对于 Oracle，有三个 `dialect` 类：`Oracle8iDialect`、`Oracle9iDialect`
    和 `Oracle10gDialect`。通常，要使用的方言会从数据库的 JDBC 元数据中自动检测。但是，某些较旧的数据库驱动程序不支持 JDBC 元数据，在这种情况下，您可能必须显式指定方言。为此，您可以使用
    `grails-app/conf/DataSource.groovy` 文件的 `dialect` 设置。例如，如果您为 MySQL 使用 InnoDB 存储引擎，您将需要使用
    `MySQL5InnoDBDialect` 类，如代码清单 9-39 所示。


    ***代码清单 9-39.** 自定义 Hibernate 方言*


    `dataSource {`

    `    ...`

    **`dialect = org.hibernate.dialect.MySQL5InnoDBDialect`**

    `}`


    #### 其他 Hibernate 属性


    前面两节中演示的 `DataSource.groovy` 文件的 `logSql` 和 `dialect` 设置实际上只是 Hibernate `SessionFactory`
    的 `hibernate.show_sql` 和 `hibernate.dialect` 属性的快捷方式。如果您更习惯使用 Hibernate 的配置模型，那么您可以在
    `DataSource.groovy` 的 `hibernate` 块中这样做。事实上，您会注意到 Hibernate 二级缓存（在后面的“缓存”部分讨论）已经以这种方式预先配置好了，如代码清单
    9-40 所示。


    ***代码清单 9-40.** 常规 Hibernate 配置*


    `hibernate {`

    `    cache.use_second_level_cache=true`

    `    cache.use_query_cache=false`

    `    cache.provider_class=`

    `        ''net.sf.ehcache.hibernate.EhCacheRegionFactory ''`

    `}`


    如果您对 Grails 设置的默认值不满意，您可以配置所有类型的属性。例如，要更改数据库的默认事务隔离级别，您可以使用 `hibernate.connection.isolation`
    属性：


    `hibernate {`

    `    hibernate.connection.isolation=4`

    `}`


    在此示例中，我们将隔离级别更改为 `Connection.TRANSACTION_REPEATABLE_READ`。有关其他隔离级别，请参阅 `java.sql.Connection`
    类。


    ![Image](img/square.jpg) **提示** 有关其他可用的配置选项，请参阅 Hibernate 参考材料：[`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/session-configuration.html`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/session-configuration.html)。


    在一个应用程序中，可能有许多领域类具有共同的配置设置。例如，您可能希望在整个应用程序的所有领域类中关闭版本控制。您可以通过在每个领域类的 `mapping`
    块中指定“version false”来实现这一点，但在每个领域类中都指定这一点很繁琐且容易出错。幸运的是，像这样的 `mapping` 设置可以在 `Config.groovy`
    中全局配置。请参见代码清单 9-41 中的示例。


    ***代码清单 9-41.** 全局 GORM 映射设置*


    `grails.gorm.default.mapping = {`

    `    //  这些将成为所有领域类的默认映射设置。`

    `    // 这些设置可以在任何领域类的 mapping 块中被覆盖。`

    `    version false`

    `    autoTimestamp false`

    `}`


    类似地，全局约束也可以在 `Config.groovy` 中定义（参见代码清单 9-42）。


    ***代码清单 9-42.** 全局 GORM 约束*


    `grails.gorm.default.constraints = {`

    `   nullable true`

    `   blank false`

    `   size 1..20`

    `}`

    '
- fmt: '### The Semantics of GORM


    As you have discovered, using GORM is pretty easy. It’s so easy, in fact, that
    you may be lulled into a false sense of security and think that you never have
    to look at a database again. However, when working with any ORM tool, it is absolutely
    critical to understand how and what the ORM tool is doing.


    ![Image](images/square.jpg) **Tip** Since GORM is built on Hibernate, it may well
    be worth investing in a book specifically targeting Hibernate. Still, we’ll do
    our best to cover the key aspects here.


    If you start using an ORM tool without understanding its semantics, you will almost
    certainly run into issues with the performance and behavior of your application.
    ORM tools are often referred to as an example of a leaky abstraction (see [`http://www.joelonsoftware.com/articles/LeakyAbstractions.html`](http://www.joelonsoftware.com/articles/LeakyAbstractions.html))
    because they attempt to isolate you from the complexities of the underlying database.
    Unfortunately, to follow the analogy, the abstraction leaks quite frequently if
    you’re not aware of features such as lazy and eager fetching, locking strategies,
    and caching.


    This section will provide some clarity on these quirks to ensure that you don’t
    use GORM with the expectation that it will solve world hunger. GORM is often compared,
    understandably, to ActiveRecord in Rails. Unfortunately, users with Rails experience
    who adopt Grails are in for a few surprises because the tools are really quite
    different. One of the primary differences is that GORM has the concept of a persistence
    context, or *session*.


    #### The Hibernate Session


    Hibernate, like the Java Persistence API, models the concept of a persistence
    session using the `org.hibernate.Session` class. The `Session` class is essentially
    a container that holds references to all known instances of persistent classes—domain
    classes in Grails. In the Hibernate view of the world, you think in terms of objects
    and delegate responsibility to Hibernate to ensure that the state of the objects
    is *synchronized* to the database.


    The synchronization process is triggered by calling the `flush()` method on the
    `Session` object. At this point, you may be wondering how all of this relates
    to Grails, given that you saw no mention of a `Session` object in [Chapter 4](#Chapter04.html#ch4).
    Essentially, GORM manipulates the `Session` object transparently on your behalf.


    It is quite possible to build an entire Grails application without ever interacting
    directly with the Hibernate `Session` object. However, for developers who are
    not used to the session model, there may be a few surprises along the way. As
    an example, consider the code in [Listing 9-43](#Chapter09.html#list_9_43).


    ***Listing 9-43.** Multiple Reads Return the Same Object*


    ```

    def album1 = Album.get(1)

    def album2 = Album.get(1)

    assertFalse album1.is(album2)

    ```


    The code in [Listing 9-1](#Chapter09.html#list_9_1) shows a little gotcha for
    developers not used to the session model. The first call to the `get` method retrieves
    an instance of the `Album` class by executing an SQL `SELECT` statement under
    the covers—no surprises there. However, the second call to the `get` method doesn’t
    execute any SQL at all, and in fact, the assertion on the last lines fails.


    ![Image](images/square.jpg) **Note** In the example in [Listing 9-43](#Chapter09.html#list_9_43),
    the final `assertFalse` statement uses Groovy’s `is` method because `==` in Groovy
    is equivalent to calling the `equals(Object)` method in Java.


    In other words, the `Session` object appears to act like a cache; in fact, it
    is one. The `Session` object is Hibernate’s first-level cache. Another area where
    this is apparent is when saving an object. Consider the code in [Listing 9-44](#Chapter09.html#list_9_44).


    ***Listing 9-44.** Saving a Domain Class in Grails*


    ```

    def album = new Album(...)

    album.save()

    ```


    Now, assuming the `Album` instance validates, you may think from the code in [Listing
    9-2](#Chapter09.html#list_9_2) that GORM will execute an SQL `INSERT` statement
    when the `save()` method is called. However, this is not necessarily the case,
    and in fact it depends greatly on the underlying database. GORM by default uses
    Hibernate’s native identity generation strategy, which attempts to select the
    most appropriate way to generate the `id` of an object. For example, in Oracle,
    Hibernate will opt to use a `sequence` generator to supply the identifier, while
    in MySQL the `identity` strategy will be used. The `identity` generation strategy
    relies on the database to supply the identity.


    Since an identifier must be assigned by the time the `save()` method completes,
    if a `sequence` is used, no `INSERT` is needed because Hibernate can simply increment
    the sequence in memory. The actual `INSERT` can then occur later when the `Session`
    is flushed. However, in the case of the `identity` strategy, an `INSERT` *is*
    needed since the database needs to generate the identifier. Nevertheless, the
    example serves to demonstrate that it is the `Session` that is responsible for
    synchronizing the object’s state to the database, not the object itself.


    Essentially, Hibernate implements the strategy known as *transactional write-behind*.
    Any changes made to persistent objects are not necessarily persisted when you
    make them or even when you call the `save()` method. The advantage of this approach
    is that Hibernate can heavily optimize and batch up the SQL to be executed, hence
    minimizing network traffic. In addition, the time for which database locks (discussed
    in more detail in the “Locking Strategies” section) are held is greatly reduced
    by this model.'
