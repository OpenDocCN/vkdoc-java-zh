    `}`


    请记住，要使该代码生效，你需要安装 JMX 和 Axis2 插件。


    暴露 Grails 服务是允许应用程序访问 Grails 应用程序内部业务逻辑的好方法。事实上，你可以构建一个仅作为服务层的 Grails 应用程序。该应用程序可能只包含提供数据访问的领域类和服务，类似于前面展示的
    `StoreService`。该应用程序不一定需要任何控制器、视图或其他任何东西。


    ### 总结


    服务是几乎所有重要的 Grails 应用程序中的重要组件，应用程序的大部分业务逻辑和复杂性都归属于它们。


    在本章中，你了解了 Grails 如何通过鼓励将复杂性隔离到服务中来帮助简化应用程序。你学习了如何轻松利用 Spring 依赖注入的强大功能，而无需编写配置文件来配置
    Spring。


    你还了解了事务管理如何与 Grails 服务协同工作。对于大多数场景，默认的方法级事务划分是完美的选择。对于应用程序需要对事务进行更细粒度控制的场景，Grails
    提供了一种非常简单的机制来处理它们。


    有了如此多的暴露 Grails 服务的选项，可以使用任意数量的远程技术，你应该养成利用 Grails 服务提供的强大功能和灵活性的习惯。如果你这样做，你的应用程序将更易于编写、更易于理解、更易于维护和更易于测试。


    ## 第 11 章


    ![Image](img/3squ.jpg)


    ## 集成与依赖管理


    到目前为止，我们已经探讨了支撑 Grails 的许多核心概念。从控制器到 GORM 和服务，你现在应该对 Grails 的运行机制有了相当不错的理解。在本章中，你将学习如何将
    Grails 集成到你现有的生态系统中。我们希望你能从本章中很好地理解如何将 Grails 纳入你的构建系统、开发工具、报告设置和服务器环境。


    内容很多，让我们先仔细看看 Grails 中的配置。


    ### Grails 与配置


    通过使用“约定优于配置”（CoC），Grails 显著减少了你需要进行的配置量。然而，至关重要的是，它是约定*优于*配置，而不是用约定*代替*配置。仍然有多种不同的方式来配置
    Grails。


    大多数配置都可以使用 Grails 内部的中央配置机制来完成。文件 `grails-app/conf/Config.groovy` 包含应用程序的许多配置细节。你在本书的不同地方已经看到过这个文件的使用。在接下来的章节中，我们将更深入地了解如何使用
    `Config.groovy` 来配置 Grails，以及有哪些配置选项可供你使用。


    #### 配置基础


    `Config.groovy` 文件是一个 Groovy 脚本，类似于常规的 Java 属性文件。你可以使用点解引用运算符来设置其属性：


    `grails.mime.file.extensions = true`


    由于它是一个 Groovy 脚本，所有类型信息都会被保留。因此，在前面的示例中，一个名为 `grails.mime.file.extensions` 的布尔属性被设置为
    `true`。要访问此设置，请使用控制器和视图中可用的 `grailsApplication` 对象的 `config` 属性：


    `assert grailsApplication.config.grails.mime.file.extensions == true`


    除了像 `grails.mime.file.extensions` 设置这样在单行上指定的设置外，Groovy 还支持使用块进行分组设置（参见清单 11-1）。


    ***清单 11-1.** 在 Config.groovy 中分组设置*


    `grails.mime {`

    `   file.extensions = true`

    `   types = [html: ''text/html'']`

    `}`


    清单 11-1 中的示例将在 `config` 中生成两个条目：`grails.mime.file.extensions` 和 `grails.mime.types`。你还可以按环境进行配置设置。这将在接下来介绍。

