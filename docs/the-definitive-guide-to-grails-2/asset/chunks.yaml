- fmt: "### Removing the Controller and Action Names from the URL\n\nThe controller\
    \ and action names do not need to be part of the URL. These special elements can\
    \ be eliminated from the URL pattern and specified as properties of the mapping.\
    \ As shown previously, the default mapping supports a URL such as `/album/show/42`,\
    \ which will map to the `show` action in the `AlbumController`. An application\
    \ can choose to support a URL such as `/showAlbum/42` to access that same controller\
    \ action. The code in [Listing 6-3](#Chapter06.html#list_6_3) includes a mapping\
    \ to support this.\n\n**Listing 6-3.** Specifying the Controller and Action as\
    \ Properties of the Mapping\n\n```\nclass UrlMappings {\n    static mappings =\
    \ {\n        \"/showAlbum/$id\" {\n            controller = 'album'\n        \
    \    action = 'show'\n        }\n        // ...\n    }\n}\n```\n\nThe mapping\
    \ engine in Grails provides support for an alternative syntax to express the same\
    \ mapping. Which technique is chosen is a matter of personal preference. [Listing\
    \ 6-4](#Chapter06.html#list_6_4) shows the alternative syntax.\n\n**Listing 6-4.**\
    \ Specifying the Controller and Action as Parameters to the Mapping\n\n```\nclass\
    \ UrlMappings {\n    static mappings = {\n        \"/showAlbum/$id\"(controller:'album',\
    \ action:'show')\n        // ...\n    }\n}\n```\n\n### Embedding Parameters in\
    \ a Mapping\n\nOf course, Grails supports request parameters using the standard\
    \ HTTP request parameter notation. A URL such as `/showArtist?artistName=Rush`\
    \ will work if there is a mapping like that shown in [Listing 6-5](#Chapter06.html#list_6_5).\n\
    \n**Listing 6-5.** A Mapping for the `/showArtist` URL\n\n```\nclass UrlMappings\
    \ {\n    static mappings = {\n        \"/showArtist\"(controller:'artist', action:'show')\n\
    \        // ...\n    }\n}\n```\n\nAccessing `/showArtist?artistName=Rush` would\
    \ map to the `show` action in the `ArtistController`, and a request parameter\
    \ named `artistName` would be populated with the value `Rush`. Notice that the\
    \ `artistName` parameter is not represented anywhere in the mapping. This is because\
    \ the mapping applies to the `/showArtist` URL, and therefore any arbitrary parameters\
    \ can be passed to that URL without affecting the mapping.\n\nAlthough this approach\
    \ works, it has its drawbacks. One drawback is that the URL is just ugly, and\
    \ it would continue to get uglier as more request parameters were introduced.\n\
    \nThe Grails URL mapping engine provides a much slicker solution to support custom\
    \ URLs that have request parameters embedded in the URL. Instead of `/showArtist?artistName=Rush`,\
    \ let’s support a URL such as `/showArtist/Rush`. The mapping in [Listing 6-6](#Chapter06.html#list_6_6)\
    \ works perfectly for this.\n\n**Listing 6-6.** Embedding a Request Parameter\
    \ in the URL\n\n```\nclass UrlMappings {\n    static mappings = {\n        \"\
    /showArtist/$artistName\"(controller:'artist', action:'show')\n        // ...\n\
    \    }\n}\n```\n\nWith this mapping, URLs such as `/showArtist/Tool` and `/showArtist/Cream`\
    \ will be mapped to the `show` action in the `ArtistController` with a request\
    \ parameter named `artistName`, and the value of that parameter will be whatever\
    \ is in the last part of the URL; in the previous examples, these were the `Tool`\
    \ and `Cream` values. The action in the `AlbumController` would have access to\
    \ the request parameter and could use the parameter in whatever way is appropriate.\
    \ See [Listing 6-7](#Chapter06.html#list_6_7).\n\n**Listing 6-7.** Accessing a\
    \ Request Parameter in the Controller Action\n\n```\nclass ArtistController {\n\
    \    def show() {\n        def artist = Artist.findByName(params.artistName)\n\
    \        // do whatever is appropriate with the artist...\n    }\n}\n```\n\nA\
    \ little snag that must be dealt with here is that the artist names may include\
    \ characters that are not valid in a URL. One technique that might be used to\
    \ get around the snag is to URL-encode the parameters. This technique would support\
    \ accessing a band named Led Zeppelin with a URL such as `/showArtist/Led%20Zeppelin`.\
    \ Notice that the space in the name has been replaced with `%20`. Yuck! Let’s\
    \ make an application decision here and say that we’ll encode artist names by\
    \ replacing spaces with underscores. This will lead to a friendlier-looking URL:\
    \ `/showArtist/Led_Zeppelin`. The URL mapping doesn’t really care about the value\
    \ of the parameter, so it does not need to be changed to support it. However,\
    \ the controller action will need to be updated, since the underscores in the\
    \ query parameter must be replaced with spaces. [Listing 6-8](#Chapter06.html#list_6_8)\
    \ represents an updating of the code in [Listing 6-7](#Chapter06.html#list_6_7)\
    \ to deal with the underscores.\n\n**Listing 6-8.** Decoding the Request Parameter\
    \ to Replace Underscores with Spaces\n\n```\nclass ArtistController {\n    def\
    \ show() {\n        def nameToSearchFor = params.artistName.replaceAll('_', '\
    \ ')\n        def artist = Artist.findByName(nameToSearchFor)\n        // do whatever\
    \ is appropriate with the artist...\n    }\n}\n```\n\n![Image](images/square.jpg)\
    \ **Note** This encoding/decoding problem exists even if the request parameter\
    \ is not embedded in the URL. For example, something like `/showArtist?artistName=Led%20Zeppelin`\
    \ or `/showArtist?artistName=Led_Zeppelin` would be necessary to deal with the\
    \ space in the parameter value.\n\n### Specifying Additional Parameters\n\nIn\
    \ addition to embedding parameters in the URL, arbitrary request parameters may\
    \ be specified as properties of a particular mapping that never show up in the\
    \ URL. [Listing 6-9](#Chapter06.html#list_6_9) includes an example.\n\n**Listing\
    \ 6-9.** Specifying Additional Request Parameters\n\n```\nclass UrlMappings {\n\
    \  static mappings = {\n    \"/showArtist/$artistName\"(controller:'artist', action:'show')\
    \ {\n      format = 'simple'\n    }\n\n    \"/showArtistDetail/$artistName\"(controller:'artist',\
    \ action:'show') {\n      format = 'detailed'\n    }\n    // ...\n  }\n}\n```\n\
    \nWith this mapping in place, a request to the URL `/showArtist/Pink_Floyd` would\
    \ map to the `show` action in the `ArtistController`, and the request would include\
    \ parameters named `artistName` and `format` with the values `Pink_Floyd` and\
    \ `simple`, respectively. A request to the URL `/showArtistDetail/Pink_Floyd`\
    \ would map to the same action and controller, but the `format` request parameter\
    \ would have a value of `detailed`.\n\n### Mapping to a View\n\nSometimes you\
    \ might want a certain URL pattern to map directly to a view. This is useful when\
    \ the view does not require any data to be passed in and no controller action\
    \ is required. In such a case, you can define a URL mapping that is associated\
    \ with a view rather than with a controller action. The syntax is the same as\
    \ mapping to an action except that a value must be specified for the `view` property\
    \ instead of the `action` property. [Listing 6-10](#Chapter06.html#list_6_10)\
    \ demonstrates how to do this.\n\n**Listing 6-10.** Mapping to a View\n\n```\n\
    class UrlMappings { static mappings = {\n\"/\"(view:'/welcome')\n// ... } }\n\
    ```\n\nThis mapping will handle all requests to the root of the application (`/`)\
    \ by rendering the GSP at `grails-app/views/welcome.gsp`. The mapping engine also\
    \ allows a mapping to specify a view that belongs to a particular controller.\
    \ For example, [Listing 6-11](#Chapter06.html#list_6_11) demonstrates how to map\
    \ the `/find` URL to `grails-app/views/search/query.gsp`.\n\n**Listing 6-11.**\
    \ Mapping to a View for a Particular Controller\n\n```\nclass UrlMappings { static\
    \ mappings = {\n\"/find\"(view:'query', controller:'search')\n// ... } }\n```\n\
    \nRemember that no controller action is being executed for this mapping. The controller\
    \ is being specified only so the framework can locate the appropriate GSP."
  raw: '### Removing the Controller and Action Names from the URL


    The controller and action names do not need to be part of the URL. These special
    elements can be eliminated from the URL pattern and specified as properties of
    the mapping. As shown previously, the default mapping supports a URL such as `/album/show/42`,
    which will map to the `show` action in the `AlbumController`. An application can
    choose to support a URL such as `/showAlbum/42` to access that same controller
    action. The code in [Listing 6-3](#Chapter06.html#list_6_3) includes a mapping
    to support this.


    ***Listing 6-3.** Specifying the Controller and Action as Properties of the Mapping*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showAlbum/$id" {`

    `            controller = ''album''`

    `            action = ''show''`

    `        }`

    `        // ...`

    `    }`

    `}`


    The mapping engine in Grails provides support for an alternative syntax to express
    the same mapping. Which technique is chosen is a matter of personal preference.
    [Listing 6-4](#Chapter06.html#list_6_4) shows the alternative syntax.


    ***Listing 6-4.** Specifying the Controller and Action as Parameters to the Mapping*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showAlbum/$id"(controller:''album'', action:''show'')`

    `        // ...`

    `    }`

    `}`


    ### Embedding Parameters in a Mapping


    Of course, Grails supports request parameters using the standard HTTP request
    parameter notation. A URL such as `/showArtist?artistName=Rush` will work if there
    is a mapping like that shown in [Listing 6-5](#Chapter06.html#list_6_5).


    ***Listing 6-5.** A Mapping for the /showArtist URL*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showArtist"(controller:''artist'', action:''show'')`

    `        // ...`

    `    }`

    `}`


    Accessing `/showArtist?artistName=Rush` would map to the show action in the `ArtistController`,
    and a request parameter named `artistName` would be populated with the value `Rush`.
    Notice that the `artistName` parameter is not represented anywhere in the mapping.
    This is because the mapping applies to the `/showArtist` URL, and therefore any
    arbitrary parameters can be passed to that URL without affecting the mapping.


    Although this approach works, it has its drawbacks. One drawback is that the URL
    is just ugly, and it would continue to get uglier as more request parameters were
    introduced.


    The Grails URL mapping engine provides a much slicker solution to support custom
    URLs that have request parameters embedded in the URL. Instead of `/showArtist?artistName=Rush`,
    let’s support a URL such as `/showArtist/Rush`. The mapping in [Listing 6-6](#Chapter06.html#list_6_6)
    works perfectly for this.


    ***Listing 6-6.** Embedding a Request Parameter in the URL*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showArtist/$artistName"(controller:''artist'', action:''show'')`

    `        // ...`

    `    }`

    `}`


    With this mapping, URLs such as `/showArtist/Tool` and `/showArtist/Cream` will
    be mapped to the `show` action in the `ArtistController` with a request parameter
    named `artistName`, and the value of that parameter will be whatever is in the
    last part of the URL; in the previous examples, these were the `Tool` and `Cream`
    values. The action in the `AlbumController` would have access to the request parameter
    and could use the parameter in whatever way is appropriate. See [Listing 6-7](#Chapter06.html#list_6_7).


    ***Listing 6-7.** Accessing a Request Parameter in the Controller Action*


    `class ArtistController {`

    `    def show() {`

    `        def artist = Artist.findByName(params.artistName)`

    `        // do whatever is appropriate with the artist...`

    `    }`

    ` }`


    A little snag that must be dealt with here is that the artist names may include
    characters that are not valid in a URL. One technique that might be used to get
    around the snag is to URL-encode the parameters. This technique would support
    accessing a band named Led Zeppelin with a URL such as `/showArtist/Led%20Zeppelin`.
    Notice that the space in the name has been replaced with `%20`. Yuck! Let’s make
    an application decision here and say that we’ll encode artist names by replacing
    spaces with underscores. This will lead to a friendlier-looking URL: `/showArtist/
    Led_Zeppelin`. The URL mapping doesn’t really care about the value of the parameter,
    so it does not need to be changed to support it. However, the controller action
    will need to be updated, since the underscores in the query parameter must be
    replaced with spaces. [Listing 6-8](#Chapter06.html#list_6_8) represents an updating
    of the code in [Listing 6-7](#Chapter06.html#list_6_7) to deal with the underscores.


    ***Listing 6-8.** Decoding the Request Parameter to Replace Underscores with Spaces*


    `class ArtistController {`

    `    def show() {`

    `        def nameToSearchFor = params.artistName.replaceAll(''_'', '' '')`

    `        def artist = Artist.findByName(nameToSearchFor)`

    `        // do whatever is appropriate with the artist...`

    `    }`

    `}`


    ![Image](images/square.jpg) **Note**  This encoding/decoding problem exists even
    if the request parameter is not embedded in the URL. For example, something like
    `/showArtist?artistName=Led%20Zeppelin` or `/showArtist?artistName=Led_Zeppelin`
    would be necessary to deal with the space in the parameter value.


    ### Specifying Additional Parameters


    In addition to embedding parameters in the URL, arbitrary request parameters may
    be specified as properties of a particular mapping that never show up in the URL.
    [Listing 6-9](#Chapter06.html#list_6_9) includes an example.


    ***Listing 6-9.** Specifying Additional Request Parameters*


    `class UrlMappings {`

    `  static mappings = {`

    `    "/showArtist/$artistName"(controller:''artist'', action:''show'') {`

    `      format = ''simple''`

    `    }`


    `    "/showArtistDetail/$artistName"(controller:''artist'', action:''show'') {`

    `      format = ''detailed''`

    `    }`

    `    // ...`

    `  }`

    `}`


    With this mapping in place, a request to the URL `/showArtist/Pink_Floyd` would
    map to the `show` action in the `ArtistController`, and the request would include
    parameters named `artistName` and `format` with the values `Pink_Floyd` and `simple`,
    respectively. A request to the URL `/showArtistDetail/Pink_Floyd` would map to
    the same action and controller, but the `format` request parameter would have
    a value of `detailed`.


    ### Mapping to a View


    Sometimes you might want a certain URL pattern to map directly to a view. This
    is useful when the view does not require any data to be passed in and no controller
    action is required. In such a case, you can define a URL mapping that is associated
    with a view rather than with a controller action. The syntax is the same as mapping
    to an action except that a value must be specified for the view property instead
    of the `action` property. [Listing 6-10](#Chapter06.html#list_6_10) demonstrates
    how to do this.


    ***Listing 6-10.** Mapping to a View*


    `class UrlMappings { static mappings = {`

    `"/"(view:''/welcome'')`

    `// ... } }`


    This mapping will handle all requests to the root of the application (/) by rendering
    the GSP at `grails-app/views/welcome.gsp`. The mapping engine also allows a mapping
    to specify a view that belongs to a particular controller. For example, [Listing
    6-11](#Chapter06.html#list_6_11) demonstrates how to map the `/find` URL to `grails-app/views/search/query.gsp`.


    ***Listing 6-11.** Mapping to a View for a Particular Controller*


    `class UrlMappings { static mappings = {`

    `"/find"(view:''query'', controller:''search'')`

    `// ... } }`


    Remember that no controller action is being executed for this mapping. The controller
    is being specified only so the framework can locate the appropriate GSP.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    ### 从 URL 中移除控制器和操作名称


    控制器和操作名称不必是 URL 的一部分。这些特殊元素可以从 URL 模式中移除，并作为映射的属性进行指定。如前所示，默认映射支持诸如 `/album/show/42`
    这样的 URL，它会映射到 `AlbumController` 中的 `show` 操作。应用程序可以选择支持诸如 `/showAlbum/42` 这样的
    URL 来访问同一个控制器操作。代码清单 6-3 中的代码包含了一个支持此功能的映射。


    ***代码清单 6-3.** 将控制器和操作指定为映射的属性*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showAlbum/$id" {`

    `            controller = ''album''`

    `            action = ''show''`

    `        }`

    `        // ...`

    `    }`

    `}`


    Grails 中的映射引擎支持另一种语法来表达相同的映射。选择哪种技术取决于个人偏好。代码清单 6-4 展示了另一种语法。


    ***代码清单 6-4.** 将控制器和操作指定为映射的参数*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showAlbum/$id"(controller:''album'', action:''show'')`

    `        // ...`

    `    }`

    `}`


    ### 在映射中嵌入参数


    当然，Grails 支持使用标准的 HTTP 请求参数表示法来传递请求参数。如果存在如代码清单 6-5 所示的映射，那么像 `/showArtist?artistName=Rush`
    这样的 URL 就能正常工作。


    ***代码清单 6-5.** 针对 /showArtist URL 的映射*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showArtist"(controller:''artist'', action:''show'')`

    `        // ...`

    `    }`

    `}`


    访问 `/showArtist?artistName=Rush` 会映射到 `ArtistController` 中的 `show` 操作，并且一个名为 `artistName`
    的请求参数会被赋值为 `Rush`。请注意，`artistName` 参数并未在映射中的任何位置体现。这是因为该映射适用于 `/showArtist` 这个
    URL，因此任何任意参数都可以传递给该 URL 而不会影响映射。


    尽管这种方法可行，但它也有缺点。一个缺点是 URL 看起来不美观，而且随着引入更多的请求参数，它会变得越来越难看。


    Grails 的 URL 映射引擎提供了一种更优雅的解决方案，用于支持将请求参数嵌入到 URL 中的自定义 URL。让我们支持诸如 `/showArtist/Rush`
    这样的 URL，而不是 `/showArtist?artistName=Rush`。代码清单 6-6 中的映射完美地实现了这一点。


    ***代码清单 6-6.** 在 URL 中嵌入请求参数*


    `class UrlMappings {`

    `    static mappings = {`

    `        "/showArtist/$artistName"(controller:''artist'', action:''show'')`

    `        // ...`

    `    }`

    `}`


    使用此映射，诸如 `/showArtist/Tool` 和 `/showArtist/Cream` 这样的 URL 将被映射到 `ArtistController`
    中的 `show` 操作，并带有一个名为 `artistName` 的请求参数，该参数的值将是 URL 最后一部分的内容；在前面的例子中，这些值是 `Tool`
    和 `Cream`。`AlbumController` 中的操作可以访问该请求参数，并以任何适当的方式使用它。请参见代码清单 6-7。


    ***代码清单 6-7.** 在控制器操作中访问请求参数*


    `class ArtistController {`

    `    def show() {`

    `        def artist = Artist.findByName(params.artistName)`

    `        // 对 artist 对象进行任何适当的操作...`

    `    }`

    ` }`


    这里必须处理一个小问题：艺术家名称可能包含在 URL 中无效的字符。解决这个问题的一种技术是对参数进行 URL 编码。这种技术将支持通过诸如 `/showArtist/Led%20Zeppelin`
    这样的 URL 来访问名为 Led Zeppelin 的乐队。请注意，名称中的空格已被替换为 `%20`。真糟糕！让我们在此做一个应用决策，即通过将空格替换为下划线来编码艺术家名称。这将产生一个看起来更友好的
    URL：`/showArtist/Led_Zeppelin`。URL 映射并不关心参数的值，因此无需更改映射来支持它。但是，控制器操作需要更新，因为查询参数中的下划线必须替换为空格。代码清单
    6-8 展示了代码清单 6-7 中代码的更新版本，以处理下划线。


    ***代码清单 6-8.** 解码请求参数，将下划线替换为空格*


    `class ArtistController {`

    `    def show() {`

    `        def nameToSearchFor = params.artistName.replaceAll(''_'', '' '')`

    `        def artist = Artist.findByName(nameToSearchFor)`

    `        // 对 artist 对象进行任何适当的操作...`

    `    }`

    `}`


    ![Image](img/square.jpg) **注意**  即使请求参数没有嵌入到 URL 中，这个编码/解码问题也同样存在。例如，需要使用类似 `/showArtist?artistName=Led%20Zeppelin`
    或 `/showArtist?artistName=Led_Zeppelin` 这样的形式来处理参数值中的空格。


    ### 指定附加参数


    除了在 URL 中嵌入参数之外，还可以将任意请求参数指定为特定映射的属性，这些参数永远不会出现在 URL 中。代码清单 6-9 包含了一个示例。


    ***代码清单 6-9.** 指定附加的请求参数*


    `class UrlMappings {`

    `  static mappings = {`

    `    "/showArtist/$artistName"(controller:''artist'', action:''show'') {`

    `      format = ''simple''`

    `    }`


    `    "/showArtistDetail/$artistName"(controller:''artist'', action:''show'') {`

    `      format = ''detailed''`

    `    }`

    `    // ...`

    `  }`

    `}`


    有了这个映射，对 URL `/showArtist/Pink_Floyd` 的请求将映射到 `ArtistController` 中的 `show` 操作，并且该请求将包含名为
    `artistName` 和 `format` 的参数，其值分别为 `Pink_Floyd` 和 `simple`。对 URL `/showArtistDetail/Pink_Floyd`
    的请求将映射到相同的操作和控制器，但 `format` 请求参数的值将为 `detailed`。


    ### 映射到视图


    有时您可能希望某个 URL 模式直接映射到一个视图。当视图不需要传入任何数据，也不需要执行控制器操作时，这非常有用。在这种情况下，您可以定义一个与视图关联的
    URL 映射，而不是与控制器操作关联。语法与映射到操作相同，只是必须为 `view` 属性指定一个值，而不是 `action` 属性。代码清单 6-10 演示了如何执行此操作。


    ***代码清单 6-10.** 映射到视图*


    `class UrlMappings { static mappings = {`

    `"/"(view:''/welcome'')`

    `// ... } }`


    此映射将通过渲染位于 `grails-app/views/welcome.gsp` 的 GSP 来处理所有对应用程序根路径 (/) 的请求。映射引擎还允许映射指定属于特定控制器的视图。例如，代码清单
    6-11 演示了如何将 `/find` URL 映射到 `grails-app/views/search/query.gsp`。


    ***代码清单 6-11.** 映射到特定控制器的视图*


    `class UrlMappings { static mappings = {`

    `"/find"(view:''query'', controller:''search'')`

    `// ... } }`


    请记住，此映射不会执行任何控制器操作。指定控制器仅仅是为了让框架能够定位到相应的 GSP。

