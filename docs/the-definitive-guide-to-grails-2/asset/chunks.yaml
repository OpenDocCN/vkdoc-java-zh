- fmt: "# Pagination\n\nWhichever way you query, a typically useful thing to be able\
    \ to do is paginate through a set of results. You’ve already learned that the\
    \ `list()` method supports arguments such as `max` and `offset` that allow you\
    \ to perform pagination. For example, to obtain the first ten results, you can\
    \ use the following:\n\n```\ndef results = Album.list(max:10)\n```\n\nTo obtain\
    \ the following ten, you can use the `offset` argument:\n\n```\ndef results =\
    \ Album.list(max:10, offset:10)\n```\n\nWhile we’re on the topic of querying,\
    \ you’ll be happy to know that the same arguments can be used to paginate queries.\
    \ For example, when using dynamic finders, you can pass a map as the last argument,\
    \ which specifies the `max` and `offset` arguments:\n\n```\ndef results = Album.findAllByGenre(\"\
    Alternative\", [max:10, offset:20])\n```\n\nIn fact, you can use any parameter\
    \ covered in the previous “Listing, Sorting, and Counting” section, such as `sort`\
    \ and `order`:\n\n```\ndef results = Album.findAllByGenre(\"Alternative\", [sort:'dateCreated',\
    \ order:'desc'])\n```\n\nIn the view, you can take advantage of the `<g:paginate>`\
    \ tag that renders “Previous” and “Next” links, as well as linked numbers to jump\
    \ to a specific set of results à la Google. In its simplest form, the `<g:paginate>`\
    \ tag requires only the total number of records:\n\n```\n<g:paginate total=\"\
    ${Album.count()}\" />\n```\n\nThis example assumes you want to paginate the current\
    \ controller action. If you don’t, you can customize the controller that is actually\
    \ performing the pagination using the same attributes accepted by the `<g:link>`\
    \ tag, such as `controller` and `action`:\n\n```\n<g:paginate controller=\"album\"\
    \ action=\"list\" total=\"${Album.count()}\" />\n```\n\nYou can change the default\
    \ “Previous” and “Next” links using the `prev` and `next` attributes, respectively:\n\
    \n```\n<g:paginate prev=\"Back\" next=\"Forward\" total=\"${Album.count()}\" />\n\
    ```\n\nIf internationalization (i18n) is a requirement, you can use the `<g:message>`\
    \ tag, called as a *method*, to pull the text to appear from message bundles:\n\
    \n```\n<g:paginate prev=\"${message(code:'back.button.text')}\"\n            next=\"\
    ${message(code:'next.button.text')}\"\n            total=\"${Album.count()}\"\
    \ />\n```\n\n![Image](images/square.jpg) **Tip** If you’re interested in the mechanics\
    \ of i18n support in Grails, take a look at [Chapter 7](#Chapter07.html#ch7),\
    \ which covers the details of message bundles and switching locales.\n\n## Configuring\
    \ GORM\n\nGORM has a number of attributes that you may want to configure. Pretty\
    \ much all the options available in Hibernate are also available in GORM. One\
    \ of the most fundamental things you’re likely to want to achieve is to enable\
    \ some form of SQL logging so that you can debug performance issues and optimize\
    \ queries.\n\n### SQL Logging\n\nIf you’re purely interested in monitoring the\
    \ amount of SQL traffic hitting the database, then a good option to use is the\
    \ `logSql` setting in the `grails-app/conf/DataSource.groovy` file:\n\n```\ndataSource\
    \ {\n    ...\n    logSql = true\n}\n```\n\nWith this enabled, every SQL statement\
    \ issued by Hibernate will be printed to the console. The disadvantage of the\
    \ `logSql` setting is that you get to see only the prepared statements printed\
    \ to the console and not the actual values that are being inserted. If you need\
    \ to see the values, then set up a special `log4j` logger in `grails-app/conf/Config.groovy`\
    \ as follows:\n\n```\nlog4j = {\n    ...\n    logger {\n        trace \"org.hibernate.SQL\"\
    , \"org.hibernate.type\"\n    }\n}\n```\n\n### Specifying a Custom Dialect\n\n\
    Hibernate has, over the years, been heavily optimized for each individual database\
    \ that it supports. To support different database types, Hibernate models the\
    \ concept of a *dialect*. For each database it supports, there is a `dialect`\
    \ class that knows how to communicate with that database.\n\nThere are even different\
    \ dialects for different database versions. For example, for Oracle, there are\
    \ three `dialect` classes: `Oracle8iDialect`, `Oracle9iDialect`, and `Oracle10gDialect`.\
    \ Normally, the dialect to use is automatically detected from the database JDBC\
    \ metadata. However, certain older database drivers do not support JDBC metadata,\
    \ in which case you may have to specify the dialect explicitly. To do so, you\
    \ can use the `dialect` setting of the `grails-app/conf/DataSource.groovy` file.\
    \ As an example, if you use the InnoDB storage engine for MySQL, you’ll want to\
    \ use the `MySQL5InnoDBDialect` class, as shown in [Listing 9-39](#Chapter09.html#list_9_39).\n\
    \n***Listing 9-39.** Customizing the Hibernate Dialect*\n\n```\ndataSource {\n\
    \    ...\n    dialect = org.hibernate.dialect.MySQL5InnoDBDialect\n}\n```\n\n\
    ### Other Hibernate Properties\n\nThe `logSql` and `dialect` settings of the `DataSource.groovy`\
    \ file demonstrated in the previous two sections are actually just shortcuts for\
    \ the `hibernate.show_sql` and `hibernate.dialect` properties of the Hibernate\
    \ `SessionFactory`. If you’re more comfortable using Hibernate’s configuration\
    \ model, then you can do so within a `hibernate` block in `DataSource.groovy`.\
    \ In fact, you’ll note that the Hibernate second-level cache (discussed later\
    \ in the “Caching” section) is already preconfigured in this manner, as shown\
    \ in [Listing 9-40](#Chapter09.html#list_9_40).\n\n***Listing 9-40.** Regular\
    \ Hibernate Configuration*\n\n```\nhibernate {\n    cache.use_second_level_cache=true\n\
    \    cache.use_query_cache=false\n    cache.provider_class=\n        'net.sf.ehcache.hibernate.EhCacheRegionFactory\
    \ '\n}\n```\n\nYou can configure all manner of things if you’re not satisfied\
    \ with the defaults set up by Grails. For example, to change your database’s default\
    \ transaction isolation level, you could use the `hibernate.connection.isolation`\
    \ property:\n\n```\nhibernate {\n    hibernate.connection.isolation=4\n}\n```\n\
    \nIn this example, we’ve changed the isolation level to `Connection.TRANSACTION_REPEATABLE_READ`.\
    \ Refer to the `java.sql.Connection` class for the other isolation levels.\n\n\
    ![Image](images/square.jpg) **Tip** For the other configuration options available,\
    \ see the Hibernate reference material: [`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/session-configuration.html`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/session-configuration.html).\n\
    \nWithin an application it may be that there are a lot of domain classes that\
    \ have common configuration settings. For example, it may be the case that you\
    \ want versioning turned off for all domain classes across the entire application.\
    \ You can do this by specifying “version false” in the `mapping` block of every\
    \ domain class, but having to specify that in every domain class is tedious and\
    \ leads to errors. Fortunately, `mapping` settings like that can be configured\
    \ globally in `Config.groovy`. See [Listing 9-41](#Chapter09.html#list_9_41) for\
    \ an example.\n\n***Listing 9-41.** Global GORM mapping Settings*\n\n```\ngrails.gorm.default.mapping\
    \ = {\n    //  These will become default mapping settings for\n    // all domain\
    \ classes.  These settings may be overridden\n    // in the mapping block of any\
    \ domain class.\n    version false\n    autoTimestamp false\n}\n```\n\nSimilarly,\
    \ global constraints may be defined in `Config.groovy` (see [Listing 9-42](#Chapter09.html#list_9_42)).\n\
    \n***Listing 9-42.** Global GORM Constraints*\n\n```\ngrails.gorm.default.constraints\
    \ = {\n   nullable true\n   blank false\n   size 1..20\n}\n```"
  raw: '#### Pagination


    Whichever way you query, a typically useful thing to be able to do is paginate
    through a set of results. You’ve already learned that the `list()` method supports
    arguments such as `max` and `offset` that allow you to perform pagination. For
    example, to obtain the first ten results, you can use the following:


    `def results = Album.list(max:10)`


    To obtain the following ten, you can use the `offset` argument:


    `def results = Album.list(max:10, offset:10)`


    While we’re on the topic of querying, you’ll be happy to know that the same arguments
    can be used to paginate queries. For example, when using dynamic finders, you
    can pass a map as the last argument, which specifies the `max` and `offset` arguments:


    `def results = Album.findAllByGenre("Alternative", [max:10, offset:20])`


    In fact, you can use any parameter covered in the previous “Listing, Sorting,
    and Counting” section, such as `sort` and `order`:


    `def results = Album.findAllByGenre("Alternative", [sort:''dateCreated'',`

    `order:''desc''])`


    In the view, you can take advantage of the `<g:paginate>` tag that renders “Previous”
    and “Next” links, as well as linked numbers to jump to a specific set of results
    à la Google. In its simplest form, the `<g:paginate>` tag requires only the total
    number of records:


    `<g:paginate total="${Album.count()}" />`


    This example assumes you want to paginate the current controller action. If you
    don’t, you can customize the controller that is actually performing the pagination
    using the same attributes accepted by the `<g:link>` tag, such as `controller`
    and `action`:


    `<g:paginate controller="album" action="list" total="${Album.count()}" />`


    You can change the default “Previous” and “Next” links using the `prev` and `next`
    attributes, respectively:


    `<g:paginate prev="Back" next="Forward" total="${Album.count()}" />`


    If internationalization (i18n) is a requirement, you can use the `<g:message>`
    tag, called as a *method*, to pull the text to appear from message bundles:


    `<g:paginate prev="${message(code:''back.button.text'')}"`

    `            next="${message(code:''next.button.text'')}"`

    `            total="${Album.count()}" />`


    ![Image](images/square.jpg) **Tip** If you’re interested in the mechanics of i18n
    support in Grails, take a look at [Chapter 7](#Chapter07.html#ch7), which covers
    the details of message bundles and switching locales.


    ### Configuring GORM


    GORM has a number of attributes that you may want to configure. Pretty much all
    the options available in Hibernate are also available in GORM. One of the most
    fundamental things you’re likely to want to achieve is to enable some form of
    SQL logging so that you can debug performance issues and optimize queries.


    #### SQL Logging


    If you’re purely interested in monitoring the amount of SQL traffic hitting the
    database, then a good option to use is the `logSql` setting in the `grails-app/conf/DataSource.groovy`
    file:


    `dataSource {`

    `    ...`

    `    logSql = true`

    `}`


    With this enabled, every SQL statement issued by Hibernate will be printed to
    the console. The disadvantage of the `logSql` setting is that you get to see only
    the prepared statements printed to the console and not the actual values that
    are being inserted. If you need to see the values, then set up a special `log4j`
    logger in `grails-app/conf/Config.groovy` as follows:


    `log4j = {`

    `    ...`

    `    logger {`

    `        trace "org.hibernate.SQL", "org.hibernate.type"`

    `    }`

    `}`


    #### Specifying a Custom Dialect


    Hibernate has, over the years, been heavily optimized for each individual database
    that it supports. To support different database types, Hibernate models the concept
    of a *dialect*. For each database it supports, there is a `dialect` class that
    knows how to communicate with that database.


    There are even different dialects for different database versions. For example,
    for Oracle, there are three `dialect` classes: `Oracle8iDialect`, `Oracle9iDialect`,
    and `Oracle10gDialect`. Normally, the dialect to use is automatically detected
    from the database JDBC metadata. However, certain older database drivers do not
    support JDBC metadata, in which case you may have to specify the dialect explicitly.
    To do so, you can use the `dialect` setting of the `grails-app/conf/DataSource.groovy`
    file. As an example, if you use the InnoDB storage engine for MySQL, you’ll want
    to use the `MySQL5InnoDBDialect` class, as shown in [Listing 9-39](#Chapter09.html#list_9_39).


    ***Listing 9-39.** Customizing the Hibernate Dialect*


    `dataSource {`

    `    ...`

    **`dialect = org.hibernate.dialect.MySQL5InnoDBDialect`**

    `}`


    #### Other Hibernate Properties


    The `logSql` and `dialect` settings of the `DataSource.groovy` file demonstrated
    in the previous two sections are actually just shortcuts for the `hibernate.show_sql`
    and `hibernate.dialect` properties of the Hibernate `SessionFactory`. If you’re
    more comfortable using Hibernate’s configuration model, then you can do so within
    a `hibernate` block in `DataSource.groovy`. In fact, you’ll note that the Hibernate
    second-level cache (discussed later in the “Caching” section) is already preconfigured
    in this manner, as shown in [Listing 9-40](#Chapter09.html#list_9_40).


    ***Listing 9-40.** Regular Hibernate Configuration*


    `hibernate {`

    `    cache.use_second_level_cache=true`

    `    cache.use_query_cache=false`

    `    cache.provider_class=`

    `        ''net.sf.ehcache.hibernate.EhCacheRegionFactory ''`

    `}`


    You can configure all manner of things if you’re not satisfied with the defaults
    set up by Grails. For example, to change your database’s default transaction isolation
    level, you could use the `hibernate.connection.isolation` property:


    `hibernate {`

    `    hibernate.connection.isolation=4`

    `}`


    In this example, we’ve changed the isolation level to `Connection.TRANSACTION_REPEATABLE_READ`.
    Refer to the `java.sql.Connection` class for the other isolation levels.


    ![Image](images/square.jpg) **Tip** For the other configuration options available,
    see the Hibernate reference material: [`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/session-configuration.html`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/session-configuration.html).


    Within an application it may be that there are a lot of domain classes that have
    common configuration settings. For example, it may be the case that you want versioning
    turned off for all domain classes across the entire application. You can do this
    by specifying “version false” in the `mapping` block of every domain class, but
    having to specify that in every domain class is tedious and leads to errors. Fortunately,
    `mapping` settings like that can be configured globally in Config.groovy. See
    [Listing 9-41](#Chapter09.html#list_9_41) for an example.


    ***Listing 9-41.** Global GORM mapping Settings*


    `grails.gorm.default.mapping = {`

    `    //  These will become default mapping settings for`

    `    // all domain classes.  These settings may be overridden`

    `    // in the mapping block of any domain class.`

    `    version false`

    `    autoTimestamp false`

    `}`


    Similarly, global constraints may be defined in `Config.groovy` (see [Listing
    9-42](#Chapter09.html#list_9_42)).


    ***Listing 9-42.** Global GORM Constraints*


    `grails.gorm.default.constraints = {`

    `   nullable true`

    `   blank false`

    `   size 1..20`

    `}`'
