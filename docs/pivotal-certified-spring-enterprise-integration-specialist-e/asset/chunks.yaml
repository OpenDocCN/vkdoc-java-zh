    `http://lkrnac.net/about`）。因此，URL 也是一种 URI，但反之则不然。换句话说，URL 是一种特殊类型的 URI。


    无状态性


    另一个关键的 REST 原则是严格的*无状态性*。服务器不会在会话中存储任何关于客户端的信息。我们通过在每次请求中包含所有需要的用户特定数据来弥补服务器上状态的缺失。这简化了服务器端的实现，因为服务器无需在内存中为所有连接的客户端保持状态。避免长时间存在的会话也节省了大量服务器资源，因为服务请求所需的所有对象都可以在响应发送回服务器后立即释放。这是
    REST 通信的一个小缺点，因为将所有状态转换信息从客户端发送到服务器再返回，会增加网络带宽消耗。


    每个请求还必须包含执行身份验证或授权所需的数据。由于服务器对客户端及其状态一无所知，客户端必须在每个请求中满足授权或身份验证约束。另一方面，有状态通信通常通过在身份验证后生成会话令牌来实现。如果此令牌被攻击者窃取，则可以在有限的时间内（直到会话关闭或超时）被滥用。但对于无状态通信，身份验证凭据或授权令牌不会在短时间内过期。攻击者有更宽的时间窗口来实施严重攻击。这是
    REST 通信的一个小安全缺陷，也表明了使用加密的 HTTPS 协议而非普通 HTTP 至关重要。


    状态不仅消耗服务器资源（正如 Roy Fielding 在其博士论文中所述），还会使集群变得复杂。当用户会话不存储在任何服务器节点中时，用户请求被路由到哪个服务器节点就无关紧要了，因为任何节点都可以处理该请求。因此，Web
    服务的无状态特性如今已成为主要要求之一。


    为了了解应用程序中状态的存在如何使集群复杂化，让我们考虑 图 4-1 中的场景。


    ![9781484207949_Fig04-01.jpg](img/9781484207949_Fig04-01.jpg)


    图 4-1. 有状态应用程序的集群问题示例

    '
- fmt: 'Let’s consider that `Node1` in our example has a cache for storing records
    in memory. It’s not stateless, because it’s storing data (even if for only a short
    time). The first request reads the record from `Database Node1` via `Node1` and
    stores the record into cache. The next request updates the same record via `Node2`
    in `Database Node2`. Let’s also consider that our database cluster is replicated
    across all database nodes, so the record also is updated in `Database Node1`.
    Finally, the third request reads the record from `Node1` again, but this time
    it doesn’t read the record from `Database Node1`, but rather from internal cache.
    In this case, the record doesn’t reflect the change from request 2. Therefore,
    request 3 reads an inconsistent record.


    Similar problems occur if we store state in a session on the server or we use
    Hibernate as a second-level cache in any of the nodes. Hibernate using a second-level
    cache expects that only our application is accessing the database. Therefore,
    if we want to cluster an application that relies on Hibernate’s second-level cache,
    we need to host it on a separate server, and all nodes of our application need
    to be configured to use it as a second-level cache.


    This problem of storing state is common in enterprise applications. Ideally, each
    application node should be stateless. But sometimes it makes sense to cache data
    when there isn’t a strict requirement for data consistency. A good example is
    caching OAuth authentication tokens to save round-trips to the OAuth server. These
    tokens generally don’t change. They expire after a certain time, so it is OK to
    cache them until they expire.


    There also are ways to use clustering for server nodes that hold state in session.
    Load balancers can be configured to route traffic to a node where the session
    is stored. This mechanism is called a *sticky session*. But it complicates load
    balancer configuration and decreases the ability to effectively route traffic
    based on the actual load. The sticky session mechanism can be useful for persistent
    HTTP connections (keep-alive). These are used to boost latency of web services,
    because the HTTP connection remains open and the initial handshake doesn’t need
    to occur for every request, which can be slightly more expensive in the case of
    HTTPS communication.


    ## Layered Architecture


    Statelessness also enables us to easily hide *layered architecture* from the client.
    Clients don’t have a clue whether they’re talking to one physical machine or a
    distributed cluster. This is a huge advantage for architects, because it allows
    them to iteratively scale toward a more robust, secure system without exposing
    these changes.


    ## HATEOAS


    Fielding’s thinking about handling application state goes further, to a constraint
    called *hypermedia as the engine of application state*, or *HATEOAS*. For state
    transitions, the client uses only hypermedia contained in the payload from the
    server. The client’s knowledge of the service infrastructure and the structure
    of resources should be minimalized. Therefore, it’s expected that the client can
    discover most information from the server’s responses (for example, via URIs to
    resources).


    ## Cacheability


    A further advantage of REST that Fielding points out is *cacheability*. Because
    stateless communication can be cached, we can boost the performance and scalability
    of web applications. Of course, caching resources doesn’t always make sense, because
    doing so would make state transitions impossible. Therefore, it is crucial that
    the server can explicitly or implicitly mark a response as cacheable.


    ## Flexibility


    You may notice that these principles are generic and fairly limited. REST turned
    out to be a concise and maintainable approach for developing web services, because
    developers don’t need to understand a lot of complicated details, as with the
    SOAP protocol. But it allows for similar interoperability, because HTTP and JSON
    (as the major REST transport format) have good support across all significant
    programming languages. A limited number of possible operations allowed for the
    creation of various frameworks, which can generate REST APIs based on the domain
    model. One example from the Spring world is Spring Data REST, where developers
    need to specify only JPA entities. The rest of the application, including the
    web layer, will be created using REST conventions.


    When an application follows all REST principles, it is commonly called *RESTful*.
    But remember that REST is not a protocol, standard, or framework. So nothing can
    stop us from dropping any of its principles when there is a good reason to do
    so. But in that case, we can’t call our application RESTful anymore.


    Even though it may seem like REST is suitable for nearly everything, it’s not.
    Using HTTP as an application protocol can improve performance, because we operate
    on lower layers. But we are forced to do one HTTP call per one CRUD operation
    for one resource instance. Sometimes use cases require various CRUD operations
    for various resource instances. Doing a lot of HTTP calls for such use cases can
    introduce performance problems for an application. Such situations are good candidates
    for dropping some REST principles.


    For example, say a client needs to read user information (such as an e-mail address
    and name) alongside user actions. Following pure REST principles, we would design
    two resources: for example, `user` and `userAction`. But for performance reasons,
    we might want to consider aggregating these two resources into one response, so
    the client would need to perform only one HTTP call instead of two.


    Another example is a requirement to implement a real-time chat feature into our
    REST application. In this case, we would probably use WebSockets to implement
    an endpoint fulfilling this non-CRUD bidirectional communication. But all other
    endpoints could still follow REST principles.


    ## HTTP Overview


    The *Hypertext Transfer Protocol* (HTTP) was designed for distributed systems
    to exchange hypertext data. It sits on the application layer of the Open Systems
    Interconnection (OSI) model.


    ![Image](images/sq.jpg) **Note** The OSI model is a standardized, layered model
    for designing communication systems. It is beyond the scope of this book. A good
    place to start exploring it is its Wikipedia page: `http://en.wikipedia.org/wiki/OSI_model`.


    HTTP is the main protocol that drives the World Wide Web (WWW), and therefore
    is probably the most widely used application protocol on the planet. As its name
    suggests, it was designed for exchanging *hyperlinks*, which are logical links
    between documents on the Web. Communication between the client and the server
    is initiated by the client sending an HTTP request message to the server. The
    server processes the request and sends back an HTTP response.


    So there are two types of HTTP messages: request and response. [Listing 4-1](#9781484207949_Ch04.xhtml#FPar4)
    and [Listing 4-2](#9781484207949_Ch04.xhtml#FPar5) show examples of each one.'
