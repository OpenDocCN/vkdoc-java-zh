  raw: 'In the test class, we first specify a few constants that will be used during
    testing, including two string payloads for representing the resource JSON representations.
    Two injected properties follow; one is `restTemplate`, created in the configuration
    class in [Listing 4-37](#9781484207949_Ch04.xhtml#FPar47). The second injected
    bean is our testing client code `UsersClient`.


    The fake server instance is declared in the `mockServer` variable and initiated
    in the `init` method by the `MockRestServiceServer.createServer(restTemplate)`
    call. [Listing 4-41](#9781484207949_Ch04.xhtml#FPar51) shows testing of the `POST`
    request.


    [***Listing 4-41***](#9781484207949_Ch04.xhtml#_FPar51). Client -Side POST Test
    (0404-rest-boot-client)


    ```

    @Test

    public void testPost() throws Exception {

      // GIVEN

      URI expectedUri = new URI(USERS_URL + "/0");

      mockServer.expect(requestTo(USERS_URL))

        .andExpect(method(HttpMethod.POST))

        .andExpect(jsonPath("$.email", is(USER0_EMAIL)))

        .andExpect(jsonPath("$.name", is(USER0_NAME)))

        .andRespond(withCreatedEntity(expectedUri));


    User user = new User();

      user.setName(USER0_NAME);

      user.setEmail(USER0_EMAIL);


    // WHEN

      URI location = usersClient.createUser(user);


    // THEN

      assertEquals(location, expectedUri);

      mockServer.verify();

    }

    ```


    First, we create the testing URI. Then we use `mockServer` to record the URI with
    the payload and HTTP method of the expected request message. We also record the
    fake server response with the location header and success HTTP status code. `MockRestResponseCreators.withCreatedEntity`
    is designed to simulate response 201 Created and send back the `Location` header.
    That is why you would see this construct mostly for testing `POST` requests.


    Creation of the testing `User` object follows. This object is posted to the fake
    server by the testing logic `usersClient.createUser`. After we have set up for
    the test, we can execute this testing logic. It should return the URI location
    of the created object.


    In the verification phase of the test, we compare the returned location with the
    expected one. We also need to use `mockServer.verify()` to make sure that the
    recorded request occurred as expected. The test in [Listing 4-42](#9781484207949_Ch04.xhtml#FPar52)
    covers a single `GET`.


    [***Listing 4-42***](#9781484207949_Ch04.xhtml#_FPar52). Client-Side Single GET
    Test (0404-rest-boot-client)


    ```

    @Test

    public void testSingleGet() throws Exception {

      // GIVEN

      int testingIdentifier = 0;

      mockServer.expect(requestTo(USERS_URL + "/" + testingIdentifier))

        .andExpect(method(HttpMethod.GET))

        .andRespond(withSuccess(TEST_RECORD0, MediaType.APPLICATION_JSON));


    // WHEN

      User user = usersClient.getUser(testingIdentifier);


    // THEN

      mockServer.verify();

      assertEquals(user.getName(), USER0_NAME);

      assertEquals(user.getEmail(), USER0_EMAIL);

    }

    ```


    The expected `GET` request against the URI `/users/0` is recorded into the fake
    server. We also send back a JSON representation of the object belonging to the
    testing identifier `0`. The testing logic `usersClient.getUser` should return
    the `User` object for the given testing identifier.


    In the verification phase, we verify that the request was sent properly from the
    testing logic and also verify that the received object contains the fields we
    expect. [Listing 4-43](#9781484207949_Ch04.xhtml#FPar53) tests `GET` of multiple
    records.


    [***Listing 4-43***](#9781484207949_Ch04.xhtml#_FPar53). Client-Side Multi GET
    Test (0404-rest-boot-client)


    ```

    @Test

    public void testMultiGet() throws Exception {

      // GIVEN

      mockServer.expect(requestTo(USERS_URL))

        .andExpect(method(HttpMethod.GET))

        .andRespond(withSuccess("[ " + TEST_RECORD0 + ", " + TEST_RECORD1 + "]",

            MediaType.APPLICATION_JSON));


    // WHEN

      List<User> users = usersClient.getUsers();


    // THEN

      mockServer.verify();

      assertEquals(users.get(0).getName(), USER0_NAME);

      assertEquals(users.get(0).getEmail(), USER0_EMAIL);

      assertEquals(users.get(1).getName(), "User1");

      assertEquals(users.get(1).getEmail(), "user1@gmail.com");

    }

    ```


    We expect the `GET` request against the `/users` URI. The fake response is a JSON
    array of two records. The testing logic (`usersClient.getUsers`) doesn’t take
    any parameters in this case. But it should return a collection of all `User` objects.
    *All* is, in this case, the two objects we sent in the fake JSON response.


    Verification again includes a request check. Finally, we verify that the returned
    collection contains the expected `User` objects. [Listing 4-44](#9781484207949_Ch04.xhtml#FPar54)
    tests for `PUT` method.


    [***Listing 4-44***](#9781484207949_Ch04.xhtml#_FPar54). Client-Side PUT Test
    (0404-rest-boot-client)


    ```

    @Test

    public void testPut() throws Exception {

      // GIVEN

      mockServer.expect(requestTo(USERS_URL + "/0"))

        .andExpect(method(HttpMethod.PUT))

        .andExpect(jsonPath("$.email", is(USER0_EMAIL)))

        .andExpect(jsonPath("$.name", is(USER0_NAME)))

        .andRespond(withSuccess());


    User user = new User();

      user.setName(USER0_NAME);

      user.setEmail(USER0_EMAIL);


    // WHEN

      usersClient.updateOrCreateUser(0, user);


    // THEN

      mockServer.verify();

    }

    ```


    Similar to previous tests, we expect a PUT request with particular content in
    the request body against `/users/0` URI. The expected response of the fake server
    is 200 OK.


    The method under test is `UsersClient.updateOrCreateUser`. The identifier and
    `User` object are passed to the testing method as parameters.


    At the end of the test, we need to call `mockServer.verify`, to make sure that
    the client logic behaves as we expect. Next, [Listing 4-45](#9781484207949_Ch04.xhtml#FPar55)
    contains the HTTP `DELETE` client test.


    [***Listing 4-45***](#9781484207949_Ch04.xhtml#_FPar55). Client-Side DELETE Test
    (0404-rest-boot-client)


    ```

    @Test

    public void testDeleteUser() throws Exception {

      // GIVEN

      //@formatter:off

      int testingIdentifier = 1;

      mockServer.expect(requestTo(USERS_URL + "/" + testingIdentifier))

        .andExpect(method(HttpMethod.DELETE))

        .andRespond(withSuccess());

      //@formatter:on


    // WHEN

      usersClient.deleteUser(testingIdentifier);


    // THEN

      mockServer.verify();

    }

    ```


    The recorded request in `mockServer` is now `DELETE` against the URI `/users/0`.
    The fake response is sent back with HTTP status 200 OK. The testing logic should
    remove the `User` object with ID `0`. The verification phase checks that the request
    was sent according to our expectations.


    The last test method in this integration test is testing error handling, in [Listing
    4-46](#9781484207949_Ch04.xhtml#FPar56).


    [***Listing 4-46***](#9781484207949_Ch04.xhtml#_FPar56). Client-Side Error-Handling
    Test (0404-rest-boot-client)


    ```

    @Test(expectedExceptions = HttpClientErrorException.class)

      public void testClientError() throws Exception {

        // GIVEN

        //@formatter:off

        int testingIdentifier = -1;

        mockServer.expect(requestTo(USERS_URL + "/" + testingIdentifier))

          .andExpect(method(HttpMethod.GET))

          .andRespond(

              withBadRequest()

              .body("Identifier -1 is not supported.")

           );

        //@formatter:on


    // WHEN

        usersClient.getUser(testingIdentifier);


    // THEN

        mockServer.verify();

      }

    }

    ```


    We expect the `GET` request against the `/users/-1` resource URI, and the response
    should be 400 Bad Request. After calling the testing method `getUser`, we expect
    `HttpClientErrorException` to be thrown.


    Such testing can also be used for unit testing; the testing methods would be almost
    exactly the same. The only difference is in the construction of the testing object
    and class signature. This unit test is shown in [Listing 4-47](#9781484207949_Ch04.xhtml#FPar57).


