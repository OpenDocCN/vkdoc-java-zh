    package net.lkrnac.book.eiws.chapter09.step.tea;

    import org.springframework.batch.core.configuration.annotation.JobScope;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.stereotype.Component;


    @JobScope

    @Component

    public class SugarCounter {

      private int currentSugarCount;

      private int desiredSugarAmount;


    @Autowired

      public SugarCounter(@Value("#{jobParameters[sugarAmount]}") int desiredSugarAmount)
    {

        super();

        this.desiredSugarAmount = desiredSugarAmount;

        this.currentSugarCount = 0;

      }


    public boolean addSugar() {

        boolean result = currentSugarCount < desiredSugarAmount;

        currentSugarCount++;

        return result;

      }

    }

    ```


    As a Spring component with the `@JobScope` annotation, its instance will live
    only for one `JobExecution`. *JobScope* also allows us to use late binding and
    retrieve the job parameter with the name `sugarAmount`. We store it and initialize
    `currentSugarCount` to `0`. [Listing 9-98](#9781484207949_Ch09_2_Ext.xhtml#FPar102)
    shows the implementation of `AddSugar` step.


