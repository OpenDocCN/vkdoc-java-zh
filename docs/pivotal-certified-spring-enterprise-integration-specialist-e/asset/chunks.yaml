    \ started to pop up (most notably, JSON), SOAP couldn’t take advantage of them.\n\
    \nParallel to the SOAP web services track, a different school of web service development\
    \ was evolving. This approach is REST (which is only two years younger than SOAP).\
    \ Although SOAP gained a wider adoption at the beginning, people started to realize\
    \ that REST has more advantages."
