    This Java configuration is an exact mirror of the XML configuration from the previous
    example ([Listing 9-45](#9781484207949_Ch09_1.xhtml#FPar48)). We just need to
    replace the `<jdbc:embedded-database>` and `<batch:job-repository>` XML tags with
    explicit construction of these beans and register them with the `@Bean` annotation.
    For creation of the H2 in-memory database, we use `EmbeddedDatabaseBuilder`. For
    the `JobRepository` instance creation, we use the `JobRepositoryFactoryBean.getObject()`
    call. Other beans are exact Java counterparts of the `<bean>` XML tag.


    For this example, we also use `BatchConfiguration` from [Listing 9-21](#9781484207949_Ch09_1.xhtml#FPar24),
    which creates `prepareTeaJob` with three common tea `Step`s. For the main class,
    we use a similar class as for the previous example in [Listing 9-46](#9781484207949_Ch09_1.xhtml#FPar49).
    The only difference is replacement of the `@ImportResource` annotation with the
    `@ComponentScan` annotation, because we don’t have XML configuration files on
    the classpath. Instead, we have the Java configuration classes `BatchConfiguration`
    and `BatchBeansConfiguration`, which are component scanned by this annotation.
