    ## `CommandLineJobRunner`


    A lot of enterprises use some kind of scheduling system and monitoring system
    for batch processing. These systems often require running the execute batch processing
    logic from the command line. Therefore, SB provides easy execution of batch jobs
    via the command-line interface (CLI). This support is allowed via the `CommandLineJobRunner`
    class, where we can explicitly specify which `Job` should be executed as well
    as which parameters should be passed into it.


    Of course, the SB application needs to indicate the exit status of the job execution
    when it is run from the CLI. This support uses a standard numeric exit code mechanism
    for processes within the operating system. When the operating system process returns
    a `0` exit code, it indicates success. If this exit code is nonzero, an error
    occurred. Therefore, SB assigns to each `ExitStatus` a numeric value, where `COMPLETED`
    has value `0`. Every other `ExitStatus` is erroneous from the operating system
    point of view. `FAILED` status, for example, has value `5`.


    ## Execute Thin JAR from the Command Line


    A Java application can be packaged in various ways. For example, Maven will build
    a thin JAR by default. This means that our application will be packaged into a
    single JAR without all the dependencies this JAR uses. This JAR packaging expects
    to have all the dependency locations provided in the `CLASSPATH` system variable.


    This application structure is covered by the `0907-job-launcher-javaconfig` example
    we already explained. This project needs to be first built with Maven. In the
    root directory of this project is the Maven configuration file `pom.xml`. If we
    have Maven installed, we can run the command `mvn clean install`, and the project
    will be built packaged as a thin JAR. After the project is packaged, we can run
    the SB `Job` from the command line by using the command in [Listing 9-36](#9781484207949_Ch09_1.xhtml#FPar39).
    In this case, this command is executed on the Linux operating system, but the
    Windows or Mac command line would look the same.


    [***Listing 9-36***](#9781484207949_Ch09_1.xhtml#_FPar39). Executing SB thin JAR
    from command line (File `runFromCli.sh` in Example Project `0907-job-launcher-javaconfig`)


    ```

    java -cp "target/dependency-jars/*:target/0907-job-launcher-javaconfig-0.0.2-SNAPSHOT.jar"
    org.springframework.batch.core.launch.support.CommandLineJobRunner net.lkrnac.book.eiws.chapter09.BatchApplication
    prepareTeaJob

    ```


    This command is one line. The `java` command kicks off the installation of JRE
    in the operating system. The `–cp` parameter defines where to find `CLASSPATH`
    dependencies. Next, we need to specify the Java class to run. Of course, in this
    case, we want to run `CommandLineJobRunner`. Java expects the main method in this
    class, which is provided by SB. The last parameter is the name of the job we intend
    to run. After running this command, we can observe the same output as in [Listing
    9-30](#9781484207949_Ch09_1.xhtml#FPar33).


    ## Execute Fat Spring Boot JAR from the Command Line


    Another type of Java packaging type is often referred to as a *fat JAR*: all the
    JAR dependencies are packaged into the JAR file itself. This packaging can be
    easily achieved with Maven by using `spring-boot-maven-plugin`. The `0902-chunk-processing-generic-javaconfig`
    example is configured this way, so when we build this project via the Maven command
    `mvn clean install`, we can execute the batch job via the command in [Listing
    9-37](#9781484207949_Ch09_1.xhtml#FPar40).


    [***Listing 9-37***](#9781484207949_Ch09_1.xhtml#_FPar40). Executing SB Thin JAR
    from Command Line (File `runFromCli.sh` in Example Project `0902-chunk-processing-generic-javaconfig`)


    ```

    java -jar target/0902-chunk-processing-generic-javaconfig-0.0.2-SNAPSHOT.jar

    ```


    Again, `java` kicks off the JRE installation on the local machine. The `–jar`
    parameter defines which JAR to execute—in this case, the Maven artifact created
    for this example. Spring Boot automatically runs all `Job`s covered by this SB
    application, because we use autoconfiguration here. Running this command results
    in the same output as in [Listing 9-9](#9781484207949_Ch09_1.xhtml#FPar10).


    ## Execute XML Job from the Command Line


    When we use XML configuration, execution from the command line looks like [Listing
    9-38](#9781484207949_Ch09_1.xhtml#FPar41).


    [***Listing 9-38***](#9781484207949_Ch09_1.xhtml#_FPar41). Executing XML-Configured
    Job from Command Line (File `runFromCli.sh` in Example Project `0901-chunk-processing-generic-xml`)


    ```

    java -Dloader.main=org.springframework.batch.core.launch.support.CommandLineJobRunner
    -jar target/0901-chunk-processing-generic-xml-0.0.2-SNAPSHOT.jar batch-config.xml
    simpleRecordsJob

    ```


    Instead of the main configuration class, we use the XML configuration file as
    a parameter for `CommandLineJobRunner`. The output after running this command
    again looks like [Listing 9-9](#9781484207949_Ch09_1.xhtml#FPar10).


    ## Execute Job with Parameters from the Command Line


    Of course, it is possible to pass parameters into `Job` executed from the command
    line. This example is Spring Boot based. We use our common tea `Tasklet`s with
    `AddTeaWithParameter` from the previous example in [Listing 9-31](#9781484207949_Ch09_1.xhtml#FPar34),
    so that `JobParameters` can be applied. [Listing 9-39](#9781484207949_Ch09_1.xhtml#FPar42)
    shows the batch configuration.'
