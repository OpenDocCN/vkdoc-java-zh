    with SESSION_TRANSACTED mode (file sequence.uml in folder uml-diagrams of example
    project 0610-transacted-listener-success)


    This is straightforward. Spring commits the message for us automatically, after
    the listener finishes execution. Therefore, we can’t receive various messages
    in a single transaction with the local JMS transaction + Spring combination.


    Duplicate Message Scenario


    As with acknowledge modes, reception of a local JMS transaction can go wrong.
    Imagine the main and sender classes from the Spring JMS examples in this chapter
    combined with the JMS configuration from the previous example ([Listing 6-24](#9781484207949_Ch06.xhtml#FPar26))
    and the listener from [Listing 6-25](#9781484207949_Ch06.xhtml#FPar27).


    [***Listing 6-25***](#9781484207949_Ch06.xhtml#_FPar27). Listener Class for Duplicate
    Message Scenario with `SESSION_TRANSACTED` Mode (0611-transacted-listener-duplicate)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.jms.JMSException;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageListener {

      private SimpleService simpleService;

      private boolean errorSimulated = false;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @JmsListener(destination = "messageQueue")

      public void readMessage(String message) throws JMSException {

        simpleService.processText(message);

        postprocess(message);

      }


    private void postprocess(String message) {

        // simulate error

        if (!errorSimulated) {

          errorSimulated = true;

          throw new IllegalArgumentException(message);

        }

      }

    }

    ```


    In fact, we’ve seen such a listener in [Listing 6-21](#9781484207949_Ch06.xhtml#FPar23),
    in the duplicate scenario listener in `AUTO_ACKNOWLEDGE` mode. The behavior is
    shown in [Figure 6-8](#9781484207949_Ch06.xhtml#Fig8).


    ![9781484207949_Fig06-08.jpg](images/9781484207949_Fig06-08.jpg)


    [Figure 6-8](#9781484207949_Ch06.xhtml#_Fig8). Sequence diagram of duplicate message
    scenario with SESSION_TRANSACTED mode (file sequence.uml in folder uml-diagrams
    of example project 0611-transacted-listener-duplicate)


    The problem is that the message is stored into the DB, and after that, `postprocess`
    throws an exception before committing the first message. On redelivery, the same
    message is stored into the database a second time.


    JmsTransactionManager


    Spring also provides the possibility of handling JMS transactions via its transaction
    demarcation features, using the `@Transactional` annotation. Such support is possible
    when we register the `JmsTransactionManager` bean as a manager for Spring transactions.
    In such a case, Spring ignores JMS native acknowledge modes and transactional
    configuration. This support works for JMS 1.1 as well as for JMS 2.0.


    `JmsTransactionManager` can be used for a single `ConnectionFactory`, as it binds
    JMS `Connection`/`Session`/`JMSContext` to the thread. This configuration can
    be handy for a thread-bound `Session` per `ConnectionFactory`.


    It is recommended to combine this transaction manager with `CachingConnectionFactory`,
    which was shown in the previous chapter.


    An example of `JmsTransactionManager` that starts with JMS configuration is shown
    in [Listing 6-26](#9781484207949_Ch06.xhtml#FPar28).


    [***Listing 6-26***](#9781484207949_Ch06.xhtml#_FPar28). JMS Configuration with
    `JmsConfigurationManager` (0613-jms-transaction-manager)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.jms.ConnectionFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.config.DefaultJmsListenerContainerFactory;

    import org.springframework.jms.connection.JmsTransactionManager;


    @Configuration

    public class JmsConfiguration {

      @Bean

      public JmsTransactionManager transactionManager(

          ConnectionFactory connectionFactory) {

        return new JmsTransactionManager(connectionFactory);

      }'
