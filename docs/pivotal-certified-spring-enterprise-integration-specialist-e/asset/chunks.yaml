- fmt: "```java\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.jms.core.JmsTemplate;\nimport org.springframework.jms.core.MessageCreator;\n\
    import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
    \n@Slf4j\n@Component\npublic class SimpleMessageSender {\n    private static final\
    \ String SIMPLE_MESSAGE = \"simple message\";\n    private JmsTemplate jmsTemplate;\n\
    \n    @Autowired\n    public SimpleMessageSender(JmsTemplate jmsTemplate) {\n\
    \        super();\n        this.jmsTemplate = jmsTemplate;\n    }\n\n    @Scheduled(fixedRate\
    \ = 1000)\n    public void send() {\n        log.info(\"Sending message: {}\"\
    , SIMPLE_MESSAGE);\n        jmsTemplate.send(\"queue/ExpiryQueue\", new MessageCreator()\
    \ {\n            @Override\n            public Message createMessage(Session session)\
    \ throws JMSException {\n                return session.createTextMessage(SIMPLE_MESSAGE);\n\
    \            }\n        });\n    }\n}\n```\n\nThis variant of `SimpleMessageSender`\
    \ is similar to [Listing 5-20](#9781484207949_Ch05.xhtml#FPar23), except for the\
    \ `send` method implementation. Here we use the `jmsTemplate.send` call with the\
    \ name of the destination as its first parameter. The second parameter of type\
    \ `MessageCreator` is created via an anonymous inner class.\n\nTo create a message\
    \ in the `MessageCreator` callback, we use the JMS API call `session.createTextMessage`,\
    \ which returns a `TextMessage` instance. This is then passed to Spring so that\
    \ it can send the instance to the queue.\n\n## Listening to JMS Messages\n\nSynchronous\
    \ reception of JMS messages, which can be subject to delays, doesn’t really fit\
    \ into the current real-time demands from enterprise systems. Therefore, listening\
    \ to JMS messages is a much more common approach for JMS message consumption.\
    \ Spring uses the `MessageListenerContainer` interface to listen to new messages\
    \ that appear on the JMS destination.\n\nThere are two out-of-the-box implementations\
    \ that use opposite approaches for message reception:\n\n*   `SimpleMessageListenerContainer`:\
    \ This implementation uses the standard JMS listener registration `MessageConsumer.setMessageListener()`\
    \ under the hood, as we showed in the asynchronous JMS example in [Listings 5-11](#9781484207949_Ch05.xhtml#FPar12)\
    \ and [5-12](#9781484207949_Ch05.xhtml#FPar13). It is not able to participate\
    \ in any distributed transactions. Also it is using a constant number of JMS `Session`\
    \ objects, so it can’t dynamically adapt to runtime spikes in the message load.\n\
    *   `DefaultMessageListenerContainer`: This is a default implementation that uses\
    \ a mechanism called *long polling*. This means that Spring uses `MessageConsumer.receive()`\
    \ calls in a stand-alone thread to wait for messages. This thread is blocked,\
    \ and when the message appears on the destination, it is immediately received\
    \ and passed to the registered listener in a separate thread. We can configure\
    \ the number of listener threads via the `concurrentConsumers` property. To avoid\
    \ endless waiting, the `receive` call uses a time-out parameter in conjunction\
    \ with an endless loop, which makes sure that this listener container is listening\
    \ nearly all the time. There are various advantages to this approach:\n    * \
    \  The consumer can use transactional features of JMS reception and participate\
    \ in distributed transactions.\n    *   It can easily recover from a temporary\
    \ outage of the JMS destination.\n    *   We can optionally allow for dynamic\
    \ adaptation to runtime demand by specifying a `maxConcurrentConsumers` property\
    \ different from `concurrentConsumers`.\n\nVarious options exist for creating\
    \ `MessageListenerContainer`:\n\n*   Using the `<jms:listener-container>` XML\
    \ element\n*   Registering the `MessageListenerContainer` bean directly via the\
    \ `@Bean` annotation or `<bean>` XML element\n\n`MessageListenerContainer` manages\
    \ the reception of messages, but we also need to register listeners into it. Again,\
    \ various options are available for registering application logic that will be\
    \ handling received messages:\n\n*   Using the `<jms:listener>` XML element\n\
    *   Registering the `MessageListenerContainer` bean with a list of listener implementations\n\
    *   Using the `@JmsListener` annotation\n\nThe `@JmsListener` annotation was introduced\
    \ in Spring version 4.1. A method annotated with `@JmsListener` can be used for\
    \ flexible injection of JMS message instances or their parts. Spring supports\
    \ injections of the following:\n\n*   `javax.jms.Message` or any of its subclasses\n\
    *   `javax.jms.Session`\n*   `org.springframework.messaging.Message<T>` as a generic\
    \ Spring messaging abstraction for Spring messaging. This abstraction also can\
    \ be used for other messaging types Spring supports (for example, by Spring Integration,\
    \ WebSockets, AMQP)\n*   JMS message header with the `@Header` annotation\n* \
    \  All JMS message headers with the `@Headers` annotation\n*   JMS message payload\
    \ with the `@Payload` annotation\n*   Let’s demonstrate some of these constructs\
    \ on simple examples.\n\n### Examples of Registering Listener with XML Configuration\n\
    \nOur first example of the Spring JMS listener implementation is shown in [Listing\
    \ 5-27](#9781484207949_Ch05.xhtml#FPar30).\n\n[***Listing 5-27***](#9781484207949_Ch05.xhtml#_FPar30).\
    \ Message Listener as a Subclass of `javax.jms.MessageListener` (0505-async-jms-xml)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport javax.jms.JMSException;\n\
    import javax.jms.Message;\nimport javax.jms.MessageListener;\nimport javax.jms.TextMessage;\n\
    import net.lkrnac.book.eiws.chapter05.text.SimpleService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleMessageListener\
    \ implements MessageListener {\n    private SimpleService simpleService;\n\n \
    \   @Autowired\n    public SimpleMessageListener(SimpleService simpleService)\
    \ {\n        super();\n        this.simpleService = simpleService;\n    }\n\n\
    \    @Override\n    public void onMessage(Message message) {\n        try {\n\
    \            TextMessage textMessage = (TextMessage) message;\n            simpleService.processText(textMessage.getText());\n\
    \        } catch (JMSException ex) {\n            ex.printStackTrace();\n    \
    \    }\n    }\n}\n```\n\nThis listener implements the `javax.jms.MessageListener`\
    \ interface. At the same time, it is also a Spring bean that injects the `simpleService`\
    \ instance via constructor injection. This service instance is the same as in\
    \ [Listing 5-10](#9781484207949_Ch05.xhtml#FPar11).\n\n`SimpleMessageListener`\
    \ has to implement the `onMessage` method as per the JMS listener contract driven\
    \ by the interface `javax.jms.MessageListener`. An instance of `javax.jms.Message`\
    \ is passed into this method when the message is received via its JMS destination.\
    \ To consume this message in our application, we need to cast it into `TextMessage`\
    \ and pass it into our `simpleService` instance. Calling `textMessage.getTest()`\
    \ forces us to handle `JMSException` because it is a checked one.\n\n[Listing\
    \ 5-28](#9781484207949_Ch05.xhtml#FPar31) shows how to register this listener\
    \ in Spring.\n\n[***Listing 5-28***](#9781484207949_Ch05.xhtml#_FPar31). Listener\
    \ Configured Without JMS Namespace (File `spring-jms-listener.xml` in Folder `src/main/resources`\
    \ in Example Project 0505-async-jms-xml)\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n    xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \        http://www.springframework.org/schema/beans/spring-beans.xsd\">\n\n \
    \   <bean\n        class=\"org.springframework.jms.listener.DefaultMessageListenerContainer\"\
    >\n        <property name=\"connectionFactory\" ref=\"connectionFactory\" />\n\
    \        <property name=\"destinationName\" value=\"queue/ExpiryQueue\" />\n \
    \       <property name=\"messageListener\" ref=\"simpleMessageListener\" />\n\
    \    </bean>\n</beans>\n```"
