- fmt: "This class takes two properties via the constructor. First, `executorService`\
    \ represents the thread pool used for managing concurrent execution. We are using\
    \ an instance of `java.util.concurrent.ExecutorService`, so we can execute this\
    \ concurrent processing against different thread pools. The second constructor\
    \ parameter specifies the number of tasks to execute on the thread pool.\n\nThe\
    \ concurrent execution itself happens in the `executeTasks()` method. At the beginning,\
    \ it creates a collection of `Future` instances to gather results from concurrent\
    \ tasks. After that, it saves the execution start time into the variable `start`.\
    \ Subsequently, in the `for` loop, it submits one `SimpleTask` after another to\
    \ the thread pool for execution. `Future` results are gathered in the `results`\
    \ collection. At this stage, the thread pool starts executing tasks in parallel.\n\
    \nWhen all the tasks are submitted for execution and our work is being processed\
    \ in the background, two commands are included that can be used to shut down the\
    \ thread pool politely (without interrupting all the currently running threads).\
    \ After calling `executorService.shutdown()`, the thread pool rejects further\
    \ task submissions. After the `awaitTermination` call, the current thread would\
    \ be blocked until the last thread from the thread pool finishes its execution.\n\
    \nFinally, we loop through results of concurrent task executions and log them\
    \ to the console. Each result is of type `java.util.concurrent.Future`; therefore,\
    \ the call `result.get()` waits for the thread to finish, if it’s still running.\
    \ This is not our case because we already did that to all threads by calling `awaitTermination`.\
    \ You might notice that the behavior would be practically the same without the\
    \ `awaitTermination` call, because the reading of results would wait for threads\
    \ also.\n\nCalling `result.get()` can carry exceptions from parallel logic; therefore,\
    \ we catch them and log the error message to the console. The ability to return\
    \ values and bubble up exceptions from concurrent logic is a big advantage introduced\
    \ in Java SE 5 with the `java.util.concurrent` package.\n\nLast, we write to the\
    \ console the elapsed time of parallel processing. This allows us to compare various\
    \ thread-pool implementations. The remaining class is the main Java concurrency\
    \ example highlighted in [Listing 1-8](#9781484207949_Ch01.xhtml#FPar10).\n\n\
    [***Listing 1-8***](#9781484207949_Ch01.xhtml#_FPar10). Main Class of Concurrency\
    \ Example (0101-java-concurrency)\n\n```\npackage net.lkrnac.book.eiws.chapter01.javaconcurrency;\n\
    \nimport java.util.concurrent.ExecutorService;\nimport java.util.concurrent.Executors;\n\
    \npublic final class Application {\n  private static final int EXEC_COUNT = 10;\n\
    \n  public static void main(String... args) throws InterruptedException {\n  \
    \  ExecutorService fixedThreadPool = Executors.newFixedThreadPool(EXEC_COUNT);\n\
    \    SimpleTaskExecutor executorFast = new SimpleTaskExecutor(fixedThreadPool,\
    \ EXEC_COUNT);\n    executorFast.executeTasks();\n\n    ExecutorService workStealingPool\
    \ = Executors.newWorkStealingPool();\n    SimpleTaskExecutor executorSlow = new\
    \ SimpleTaskExecutor(workStealingPool, EXEC_COUNT);\n    executorSlow.executeTasks();\n\
    \  }\n}\n```\n\nThe main class specifies the number of tasks to execute as 10.\
    \ The `main` method first creates a fixed thread pool with 10 fixed threads. Then\
    \ we create `SimpleTaskExecutor` to execute 10 tasks on this thread pool. Finally,\
    \ we again execute 10 tasks, but this time on `ForkJoinPool`. When we run this\
    \ small application, the console output may look like [Listing 1-9](#9781484207949_Ch01.xhtml#FPar11).\n\
    \n[***Listing 1-9***](#9781484207949_Ch01.xhtml#_FPar11). Console Output of Java\
    \ Concurrency Example\n\n```\npool-1-thread-1 generated number -1212896919\njava.lang.UnsupportedOperationException:\
    \ pool-1-thread-2 threw exception\njava.lang.UnsupportedOperationException: pool-1-thread-3\
    \ threw exception\npool-1-thread-4 generated number -776274655\njava.lang.UnsupportedOperationException:\
    \ pool-1-thread-5 threw exception\npool-1-thread-6 generated number 233198511\n\
    pool-1-thread-7 generated number -1552830437\npool-1-thread-8 generated number\
    \ -819640425\npool-1-thread-9 generated number -144950271\npool-1-thread-10 generated\
    \ number 2002956537\nElapsed time: 1091\nForkJoinPool-1-worker-1 generated number\
    \ 1209832625\njava.lang.UnsupportedOperationException: java.lang.UnsupportedOperationException:\
    \ ForkJoinPool-1-worker-2 threw exception\nForkJoinPool-1-worker-3 generated number\
    \ 2024148305\nForkJoinPool-1-worker-0 generated number 39272021\njava.lang.UnsupportedOperationException:\
    \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-1 threw exception\n\
    ForkJoinPool-1-worker-2 generated number -281172827\njava.lang.UnsupportedOperationException:\
    \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-3 threw exception\n\
    ForkJoinPool-1-worker-0 generated number 36551191\njava.lang.UnsupportedOperationException:\
    \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-1 threw exception\n\
    java.lang.UnsupportedOperationException: java.lang.UnsupportedOperationException:\
    \ ForkJoinPool-1-worker-2 threw exception\nElapsed time: 3005\n```\n\nNotice the\
    \ big difference in the elapsed times of the same concurrent processing on different\
    \ thread pools. As you may remember, our concurrent task ([Listing 1-6](#9781484207949_Ch01.xhtml#FPar8))\
    \ contains a delay, simulating a blocking I/O operation 1,000 milliseconds long.\
    \ The fixed thread pool (with pool size 10) is able to execute 10 given tasks\
    \ in parallel and straight away after submission. So after the blocking I/O delay\
    \ of 1 second, all threads finish, and the whole parallel execution takes only\
    \ a little bit more than 1 second. In fact, the CPU was waiting mostly for the\
    \ blocking I/O operation to finish.\n\nThe second `ForkJoinPool` uses only four\
    \ threads for execution, because the machine it was executed on has four CPU cores.\
    \ So after four threads are already running, further submitted tasks are waiting\
    \ in the queue to get a free thread-pool worker. At the time, only four tasks\
    \ can be served. So simple math explains why the second parallel execution on\
    \ `ForkJoinPool` took 3 seconds.\n\nSuch a scenario is an example of how important\
    \ it is to understand the nature of tasks being executed by our thread pool. Generally,\
    \ we want to increase thread-pool size if I/O-bound operations are being processed\
    \ (but not too much). Or we can align the thread-pool size as close as possible\
    \ to the available core count in the case of CPU-bound operations. But this isn’t\
    \ a general rule for every case. Performance testing or benchmarking should apply.\
    \ Bear in mind that you can have various thread pools for various purposes in\
    \ your application, so it’s crucial to understand the behavior of your whole application\
    \ under load.\n\n## Java EE\n\nIn the Java Platform, Enterprise Edition (Java\
    \ EE), use of Java SE concurrency APIs is considered bad practice. Until Java\
    \ EE 7, enterprise developers couldn’t use any specific concurrent API that would\
    \ be managed by the container (concurrency should be handled exclusively by the\
    \ application container). Because Java EE standards didn’t provide any concurrency\
    \ support, various mechanisms specific to application containers were created:\n\
    \n*   CommonJ\n    *   WebSphere\n    *   WebLogic\n*   Java EE Connector Architecture\
    \ (JCA) work managers\n    *   JBoss (now WildFly)\n    *   GlassFish\n\nJava\
    \ EE 7 finally introduced Concurrency Utilities that allowed application developers\
    \ to use managed concurrency APIs."
