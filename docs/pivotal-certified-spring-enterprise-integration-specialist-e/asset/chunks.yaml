    要注入这些 HTTP 消息抽象之一，我们无需使用任何注解。只需将它们用作处理 HTTP 请求的方法（由 `@RequestMapping` 注解）的参数即可。


    String MVC CRUD 示例


    清单 4-16 提供了一个使用 Spring MVC 注解的简单 HTTP 映射示例。此示例使用了来自清单 4-3 和 4-4 的服务和模型 POJO。


    ***清单 4-16***. Spring MVC 映射示例 (0404-rest-boot-server)


    ```

    package net.lkrnac.book.eiws.chapter04.javaconfig;


    import java.util.Collection;

    import net.lkrnac.book.eiws.chapter04.UrlConstants;

    import net.lkrnac.book.eiws.chapter04.model.User;

    import net.lkrnac.book.eiws.chapter04.service.UserService;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.http.HttpHeaders;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.ResponseEntity;

    import org.springframework.stereotype.Controller;

    import org.springframework.web.bind.annotation.ExceptionHandler;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.bind.annotation.RequestBody;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RequestMethod;

    import org.springframework.web.bind.annotation.ResponseBody;

    import org.springframework.web.bind.annotation.ResponseStatus;

    import org.springframework.web.util.UriComponents;

    import org.springframework.web.util.UriComponentsBuilder;


    @Controller

    @RequestMapping(UrlConstants.USERS_URL)

    public class UserController {

      private final UserService userService;


    @Autowired

      public UserController(UserService userService) {

        super();

        this.userService = userService;

      }


    @RequestMapping(method = RequestMethod.GET)

      @ResponseBody

      public Collection<User> getUsers() {

        return userService.getAllUsers();

      }


    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

      @ResponseBody

      public User getUser(@PathVariable("id") int identifier) {

        return userService.getUser(identifier);

      }


    @RequestMapping(method = RequestMethod.POST)

      @ResponseStatus(HttpStatus.CREATED)

      public ResponseEntity<Void> postUser(@RequestBody User user,

          UriComponentsBuilder uriBuilder) {

        int identifier = userService.addUser(user);


    HttpHeaders httpHeaders = new HttpHeaders();

        String uri = UrlConstants.USERS_URL + "/{id}";

        UriComponents uriComponents =

            uriBuilder.path(uri).buildAndExpand(identifier);

        httpHeaders.setLocation(uriComponents.toUri());

        return new ResponseEntity<Void>(httpHeaders, HttpStatus.CREATED);

      }


    @RequestMapping(value = "/{id}", method = RequestMethod.PUT)

      @ResponseStatus(HttpStatus.OK)

      public void putUser(@PathVariable("id") int identifier, @RequestBody User user)
    {

        userService.updateOrAddUser(identifier, user);

      }


    @RequestMapping(value = "/{id}", method = RequestMethod.DELETE)

      public void deleteUser(@PathVariable("id") int identifier) {

        userService.deleteUser(identifier);

      }


    @ExceptionHandler(UnsupportedOperationException.class)

      public ResponseEntity<String> handleUnsupportedOperation(

          UnsupportedOperationException uoe) {

        return new ResponseEntity<String>(uoe.getMessage(), HttpStatus.BAD_REQUEST);

      }

    }

    ```


    `@Controller` 注解告诉 Spring 该类正在处理 HTTP 请求。`@RequestMapping` 注解将该类映射到基础 URI `/users`。在构造函数中，我们注入了
    `UserService`，即来自清单 4-4 的类。


    `getUsers` 方法被映射到 HTTP `GET` 方法，因为在其方法级别的 `@RequestMapping` 注解中指定了这一点。因此，`getUsers`
    将处理所有对 URI `/users` 的 `GET` 请求，因为方法级别的 `@RequestMapping` 中缺少 `value` 参数。因此，将使用类级别
    `@RequestMapping` 注解中指定的基础 URI。该方法本身读取存储在 `UserService` 中的所有 `User` 对象。`@ResponseBody`
    注解指示返回值应序列化为 HTTP 传输格式，在本例中是从 `Collection<User>` 转换为 JSON 数组。默认使用 JSON，因为它是当今
    HTTP 消息中最常用的传输格式。稍后我们将深入探讨一个可以缩小此配置范围的示例。


    第二个 Web 方法是 `getUser`。顾名思义，它应该读取单个用户。因此，消费者需要指定他感兴趣的是哪个 `User` 对象。这是通过 `@RequestMapping`
    注解中指定为参数 `/{id}` 的 URI 参数 `id` 来完成的。该方法的最终 URI 映射将是 `/users/{id}`，因为方法级别的 `@RequestMapping`
    与类级别的相结合。借助 `@PathVariable` 注解，来自 URI 的占位符值 `{id}` 被注入到 `identifier` 参数中。该方法根据注入的标识符读取用户并返回
    `User` 对象。借助 `@ResponseBody` 注解，此对象将默认转换为 JSON。


    处理 Web 请求的第三个方法是 `postUser`。与 `getUsers` 方法类似，`postUser` 被映射到 `/users` 端点并处理 `POST`
    HTTP 方法。HTTP 消息负载被转换为 `User` 对象。这是由 `@RequestBody` 参数注解驱动的。该方法的第二个参数是 `UriComponentBuilder`
    实例，它将帮助用户创建 `Location` 头部以满足 HTTP 契约，该契约指示服务器应为 `POST` HTTP 消息响应所创建资源实例的位置。因此，该方法创建用户，读取创建的用户标识符，创建
    HTTP `Location` 头部，并构建响应。为了使用自定义头部和 201 Created HTTP 状态码构建 HTTP 响应，我们使用了 `ResponseEntity<Void>`
    Spring 抽象。`@ResponseStatus` 注解也声明式地定义了响应的状态将始终为 201 Created。使用泛型类型 `Void` 来创建空的
    HTTP 消息体。


    `putUser` 方法处理 `PUT` HTTP 方法。`@ResponseStatus` 注解确保它返回 HTTP 状态码 200 OK，但前提是底层逻辑未抛出任何异常。`putUser`
    使用上述方法从传入请求中提取 `identifier` 和 `user` 对象。该实现调用了 `userService` 的 `updateOrAddUser`
    方法，该方法将在我们的仓库中创建或替换 `User` 对象。

