  trans: "\n随后，本章介绍了 Spring MVC 的特性。关于如何配置和路由消息的示例，应该能为使用 Spring MVC 进行 REST 开发提供良好的基础。我们还介绍了服务器端集成和单元测试支持及其示例。最后几节内容涉及客户端支持及其测试方法。\n\
    \n第五章\n\n![图片](img/frontdot.jpg)\n\nJava 消息服务\n\n本章介绍的企业集成技术是 Java 消息服务（JMS）。它与前几章讨论的技术不同，因为它本质上是一种用于交换消息的**异步**技术。\n\
    \n在远程调用、REST 和 SOAP Web 服务方法中，客户端发送请求并等待服务器响应。等待响应可以通过同步方式（客户端线程被阻塞，直到收到响应或超时）或异步方式（客户端注册回调逻辑，该逻辑在收到响应或通信超时时执行）来实现。但它们之间的\
    \ HTTP 通信始终保持连接，至少直到客户端收到响应为止。\n\nJMS 则不同，因为它不遵循这种请求-响应模式。深入来看，JMS 通信中的通信双方根本无法被描述为客户端/服务器关系。JMS\
    \ 是一种生产者向消费者发送消息的技术。但消息并非通过套接字连接直接发送给消费者。\n\nJMS 通信中使用了一个特殊的中间组件，称为*目的地*。我们可以将其视为消息的存储空间。生产者将消息发送到该目的地，之后便不再关心这条消息。消息存储在目的地中，直到被一个或多个消费者关注。当消费者准备好时，它便从目的地读取消息。因此，生产者和消费者之间是*高度解耦*的：它们无需了解通信另一方的任何信息。唯一重要的是知道如何向目的地发送消息以及如何从目的地接收消息。\n\
    \n这种通信是*异步*的，因为生产者不会等待消费者接收消息。甚至无法保证消息一定会被送达。如果没有应用程序从目的地消费消息，理论上消息可以永远停留在目的地中。\n\
    \n这种通信方式的另一个重要属性是*可靠性*。正如我们提到的，目的地会存储消息。显然，存储消息需要一个专门的服务器。这个服务器通常被称为*消息代理*。它是一种专门的中间件，可以提供各种目的地，并在需要时将消息存储在持久化存储中。\n\
    \nJava 消息服务是 Java 企业版标准的一部分，因此每个符合 JEE 标准的应用服务器也可以扮演消息代理的角色。但你现在可能会想，那轻量级的 Spring\
    \ 应用呢？这些应用通常只托管在 Servlet 容器中，不具备消息代理功能。在这些情况下，如果需要，可以将仅专注于独立 JMS 实现的项目嵌入到 Spring\
    \ 应用中。但对于大多数架构来说，将 JMS 部分作为企业系统的独立组件来托管是合理的。\n\n以下是主要的 JMS 提供者：\n\n*   Apache\
    \ ActiveMQ\n*   HornetQ (JBoss)\n*   JBoss Messaging (JBoss)\n*   WebSphere MQ\
    \ (IBM)\n*   WebSphere Application Server (IBM)\n*   SonicMQ (Progress Software)\n\
    *   Oracle WebLogic\n*   Oracle Advanced Queuing (AQ)\n*   Open Message Queue\
    \ (Oracle)\n*   FFMQ\n*   TIBCO Enterprise Message Service\n*   OpenJMS\n\n所有这些\
    \ JMS 提供者通常被称为*面向消息的中间件*（*MOM*）。其中一些是完整的符合 JEE 标准的应用服务器，而另一些仅实现了 JEE 标准中的 JMS\
    \ 部分。因此，与客户端/服务器通信相比，另一个显著区别在于管理通信中间的消息代理所带来的运维开销。如果我们使用完整的 JEE 应用服务器，这种运维开销并不大，因为消息代理与应用服务器托管在同一台服务器上。但如果我们使用轻量级解决方案（大多数\
    \ Spring 应用都是这种情况），我们可以将 JMS 消息代理作为独立的服务器实例托管，或将其嵌入到 Spring 应用中。\n\n当我们需要在生产者和消费者之间调节消息流量时，JMS\
    \ 消息传递通常非常有用。它也常被用作流式数据的临时存储，因为如果需要，我们可以轻松地重放所有消息。它作为消息存储系统的可靠性使其成为缓存进入企业系统数据的流行选择。\n\
    \n当生产者和消费者通过 JMS 目的地解耦后，我们可以轻松更改它们之间的基础设施路由，而无需触发通信任何一方的更改。此外，当消费者和接收者互不知晓时，我们可以轻松地在它们的通信通道之间插入一些逻辑——例如，过滤或转换消息。所有这些方面使得\
    \ JMS 消息传递成为在企业系统中解耦组件的绝佳选择。\n\nJMS 标准概述\n\n作为 Java 企业版的一部分，Java 消息服务为消息交换提供了标准化的\
    \ API。这很方便，因为它消除了与特定消息中间件供应商绑定相关的问题，并显著降低了迁移到不同 JMS 提供者的成本。它还使得开发者的知识能够在各种 JMS\
    \ 提供者之间复用。\n\nJMS 支持以下两种消息传递范式：\n\n*   点对点\n    *   此情况下的目的地称为*消息队列*。\n    * \
    \  每条消息*只能有一个消费者*。\n    *   当消息成功从消息队列消费后，它将被丢弃。\n    *   点对点通信有两种类型：\n      \
    \  *   *单向（仅发送）*——由于 JMS 是高度解耦的，因此不需要特殊功能。\n        *   *双向（请求-回复）*——通过请求和响应消息中包含的关联\
    \ ID 来支持。\n\n*   发布/订阅\n    *   此情况下的目的地称为*消息主题*。\n    *   消息由*所有订阅者*（消费者）消费。\n\
    \    *   只有在所有订阅者都成功消费消息后，该消息才会从 JMS 服务器中丢弃。\n\n这些 JMS 消息传递范式与目的地的类型相关。但重要的是要记住，可以有多个生产者发送消息，也可以有多个消费者接收消息。因此，让多个生产者向一个点对点队列发送消息是一种有效的配置。让多个接收者从一个点对点队列消费消息也是有效的，但一条特定的消息通常只会被其中一个接收者随机消费。\n\
    \nJMS 消息可以通过两种方式消费：\n"
- fmt: "### 异步与同步消息消费\n\n- **异步方式**：消费者向目标（destination）注册一个特殊的 JMS 组件，称为监听器（listener），并能够在消息被目标处理时消费它们。通常消息接收没有延迟。监听器在单独的线程中接收消息。\n\
    - **同步方式**：消费者负责主动从消息队列或主题（topic）发起读取。当消费者轮询目标以获取下一条 JMS 消息时，可能出现两种情况：\n    -\
    \ 目标中没有消息，消费者线程被阻塞，直到新消息到达。此等待可通过可选的超时（time-out）终止。\n    - 如果消息在消费者从目标读取之前到达，则立即被读取。但此消息必须在目标上等待一段时间才能被消费。\n\
    \n在大多数情况下，注册监听器比显式的同步接收更有意义，因为它能减少企业系统中的延迟。\n\n### Java JMS API\n\nJMS 是一个 Java\
    \ API；因此，JMS 标准包含了用于 JMS 通信的 Java 类型。该 API 在很长一段时间内（自 2003 年引入 Java 企业版 1.4 以来）保持不变，并停留在\
    \ JMS 1.1 版本。\n\n但最近版本的 Java 企业版 7 标准对 JMS API 进行了重大修订，并引入了 JMS 2.0 版本。此版本简化了\
    \ JMS 1.1 API 中一些高度冗长的方面。但由于 JEE 7 是一个相对较新的标准，到目前为止，并非所有 JMS 提供者都实现了 JMS 2.0（例如，截至\
    \ 2015 年 5 月，ActiveMQ 不支持 JMS 2.0）。JMS 1.1 的主要概念在 JMS 2.0 中保持不变，因此将两个版本的组件一起解释是有意义的。\n\
    \n### JMS 消息\n\nJMS 体系中最基本的元素当然是 JMS 消息的抽象。它由`javax.jms.Message`接口表示，该接口由以下三个元素组成：\n\
    \n- **消息头**：一组预定义类型，用于消息的标识、路由、投递和回复策略。它们主要供 JMS 基础设施使用，但有时也用于应用程序代码。\n- **消息属性**：存储在消息中的自定义值。它们通常用作不同消息传递系统之间的兼容层。其用途还包括通过消息选择器（message\
    \ selectors）过滤消息。\n- **消息体**：包含实际消息。\n\n基于不同的消息体类型，JMS API 提供了各种 JMS 消息子接口。它们都位于`javax.jms`包中：\n\
    \n- `TextMessage`：`java.lang.String`的 JMS 包装器。\n- `MapMessage`：名称/值对，其中名称是`String`对象，值是\
    \ Java 原始类型。名称的顺序未指定。\n- `BytesMessage`：字节流。\n- `StreamMessage`：Java 原始类型的流，按顺序读取。\n\
    - `ObjectMessage`：可序列化（`Serializable`）的 Java 对象。\n\n这些接口用于传输不同负载类型的消息。最佳互操作性通常通过发送文本消息实现，尤其是在最常见的传输格式（如\
    \ JSON 和 XML）中。因此，`TextMessage`是最常用的。\n\n### JMS 基础设施抽象\n\n我们已经提到了 JMS 通信的各种基本概念，包括\
    \ JMS 目标、生产者和消费者。所有这些 JMS 通信方都需要具备某些抽象，以便 JMS 客户端能够以纯 Java 方式与 JMS 服务器通信。\n\n\
    由于消费者和生产者需要反复与 JMS 目标通信，因此保持它们之间的连接处于打开状态是有意义的。当连接打开时，消费者或生产者可以作为一个通常称为**会话**（session）的工作单元来执行操作。一个连接可以打开多个会话，这样我们就可以同时运行多个工作单元。\n\
    \n由于 JMS 代表 Java 消息服务，这些抽象具有以下 Java 表示形式："
  raw: "*   *Asynchronously*: The consumer registers a special JMS component called\
    \ a listener to the destination and is able to consume messages as they are processed\
    \ by the destination. Typically no delay is involved in the message reception.\
    \ The reception of messages by the listener is done in a separate thread.\n* \
    \  *Synchronously*: The consumer is responsible for initiating a read from the\
    \ message queue or topic. When the consumers polls the destination for the next\
    \ JMS message, there are two possible scenarios:\n    *   There is no message\
    \ in the destination, and the consumer thread is blocked until a new message arrives.\
    \ This waiting can be terminated by an optional time-out.\n    *   If the message\
    \ arrives before the consumer reads it from the destination, it is read immediately.\
    \ But this message has to wait to be consumed for some time on the destination.\n\
    \nIn most cases, registering the listener makes much more sense than explicit\
    \ synchronous reception, because it decreases delays in our enterprise systems.\n\
    \nJava JMS API\n\nJMS is a Java API; therefore, the JMS standard contains Java\
    \ types for JMS communication. This API was unchanged for a long time (since Java\
    \ Enterprise Edition 1.4 was introduced in 2003) and got stuck on version JMS\
    \ 1.1.\n\nBut a recent version of the Java Enterprise Edition 7 standard made\
    \ a major revision of the JMS API and introduced version JMS 2.0\\. This version\
    \ simplifies some highly verbose aspects of the JMS 1.1 API. But as JEE 7 is a\
    \ relatively new standard, JMS 2.0 wasn’t implemented by all JMS providers so\
    \ far (for example, ActiveMQ doesn’t support JMS 2.0 as of May 2015). The main\
    \ concepts from JMS 1.1 remained unchanged in JMS 2.0, and therefore it makes\
    \ sense to explain the components of both versions together.\n\nJMS Message\n\n\
    The most fundamental piece of the JMS puzzle is of course abstraction for the\
    \ JMS message. It is represented by the `javax.jms.Message` interface, which is\
    \ composed of these three elements:\n\n*   *Message headers*: A set of predefined\
    \ types used for identification, routing, and the delivery and reply strategy\
    \ of the message. These are meant to be used mostly by the JMS infrastructure,\
    \ but sometimes also by the application code.\n*   *Message properties*: Custom\
    \ values stored in the message. They are often used as a compatibility layer between\
    \ different messaging systems. Usage also includes filtering of messages by message\
    \ selectors.\n*   *Message body*: Contains the actual message.\n*   Based on different\
    \ body types, various JMS message subinterfaces are provided by the JMS API. All\
    \ are located in the `javax.jms` package:\n*   `TextMessage`: JMS wrapper for\
    \ `java.lang.String`.\n*   `MapMessage`: Name/value pairs, where names are `String`\
    \ objects and values are Java primitive types. The order of names is not specified.\n\
    *   `BytesMessage`: Stream of bytes.\n*   `StreamMessage`: Stream of Java primitive\
    \ types, read sequentially.\n*   `ObjectMessage`: `Serializable` Java object.\n\
    \nThese interfaces are used to transfer messages of different payload types. The\
    \ best interoperability is often achieved by sending text messages, especially\
    \ in the most common transport formats such as JSON and XML. Therefore, `TextMessage`\
    \ is most often used.\n\nJMS Infrastructure Abstractions\n\nWe have mentioned\
    \ various basic concepts for JMS communication, including the JMS destination,\
    \ producer, and consumer. All these JMS communication parties need to have certain\
    \ abstractions so the JMS client can communicate in pure Java to the JMS server.\n\
    \nBecause the consumer and producer need to communicate with the JMS destination\
    \ again and again, it makes sense to keep the connection between them open. When\
    \ the connection is open, the consumer or producer can perform actions as a unit\
    \ of work commonly referred to as a *session*. One connection can have various\
    \ sessions open, so that we can run numerous units of work at the same time.\n\
    \nAs JMS stands for Java Message Service, these abstractions have these Java representations:"
  trans: "\n*   ***异步***：消费者向目的地注册一个称为监听器的特殊 JMS 组件，并能够在消息被目的地处理时进行消费。消息接收通常没有延迟。监听器接收消息是在一个单独的线程中完成的。\n\
    *   ***同步***：消费者负责发起从消息队列或主题的读取操作。当消费者轮询目的地以获取下一条 JMS 消息时，有两种可能的情况：\n    *   目的地中没有消息，消费者线程将被阻塞，直到新消息到达。这种等待可以通过可选的超时机制来终止。\n\
    \    *   如果消息在消费者从目的地读取之前到达，则会被立即读取。但这条消息必须在目的地等待一段时间才能被消费。\n\n在大多数情况下，注册监听器比显式的同步接收更有意义，因为它减少了企业系统中的延迟。\n\
    \nJava JMS API\n\nJMS 是一个 Java API；因此，JMS 标准包含了用于 JMS 通信的 Java 类型。这个 API 在很长一段时间内（自\
    \ 2003 年引入 Java 企业版 1.4 以来）保持不变，并停留在 JMS 1.1 版本。\n\n但最近版本的 Java 企业版 7 标准对 JMS\
    \ API 进行了重大修订，并引入了 JMS 2.0 版本。该版本简化了 JMS 1.1 API 中一些过于冗长的方面。但由于 JEE 7 是一个相对较新的标准，到目前为止，并非所有\
    \ JMS 提供者都实现了 JMS 2.0（例如，截至 2015 年 5 月，ActiveMQ 不支持 JMS 2.0）。JMS 1.1 的主要概念在 JMS\
    \ 2.0 中保持不变，因此将两个版本的组件一起解释是合理的。\n\nJMS 消息\n\nJMS 体系中最基本的组成部分当然是 JMS 消息的抽象。它由 `javax.jms.Message`\
    \ 接口表示，该接口由以下三个元素组成：\n\n*   ***消息头***：一组预定义的类型，用于消息的标识、路由、投递和回复策略。这些主要供 JMS 基础设施使用，但有时也用于应用程序代码。\n\
    *   ***消息属性***：存储在消息中的自定义值。它们通常用作不同消息系统之间的兼容层。其用途还包括通过消息选择器过滤消息。\n*   ***消息体***：包含实际的消息。\n\
    *   基于不同的消息体类型，JMS API 提供了各种 JMS 消息子接口。所有这些接口都位于 `javax.jms` 包中：\n*   `TextMessage`：`java.lang.String`\
    \ 的 JMS 包装器。\n*   `MapMessage`：名称/值对，其中名称是 `String` 对象，值是 Java 原始类型。名称的顺序未指定。\n\
    *   `BytesMessage`：字节流。\n*   `StreamMessage`：Java 原始类型的流，按顺序读取。\n*   `ObjectMessage`：`Serializable`\
    \ Java 对象。\n\n这些接口用于传输不同负载类型的消息。最佳互操作性通常通过发送文本消息来实现，尤其是在最常见的传输格式（如 JSON 和 XML）中。因此，`TextMessage`\
    \ 是最常用的。\n\nJMS 基础设施抽象\n\n我们已经提到了 JMS 通信的各种基本概念，包括 JMS 目的地、生产者和消费者。所有这些 JMS 通信方都需要具备一定的抽象，以便\
    \ JMS 客户端能够以纯 Java 方式与 JMS 服务器通信。\n\n由于消费者和生产者需要反复与 JMS 目的地通信，因此保持它们之间的连接处于打开状态是合理的。当连接打开时，消费者或生产者可以执行操作，这些操作作为一个工作单元，通常被称为*会话*。一个连接可以打开多个会话，这样我们就可以同时运行多个工作单元。\n\
    \n由于 JMS 代表 Java 消息服务，这些抽象具有以下 Java 表示形式：\n"
- fmt: "# JMS API Overview\n\n- `javax.jms.Destination`: Object that represents the\
    \ JMS queue or topic.\n- `javax.jms.MessageProducer`: Abstraction representing\
    \ the object responsible for sending JMS messages.\n- `javax.jms.MessageConsumer`:\
    \ Abstraction responsible for a synchronous read of JMS messages.\n- `javax.jms.JMSProducer`:\
    \ Enhanced version of `MessageProducer` introduced in JMS 2.0.\n- `javax.jms.JMSConsumer`:\
    \ Enhanced version of `MessageConsumer` introduced in JMS 2.0.\n- `javax.jms.MessageListener`:\
    \ Abstraction responsible for asynchronous reception of JMS messages.\n- `javax.jms.Session`:\
    \ Single-threaded context abstraction responsible for sending and receiving messages.\n\
    - `javax.jms.Connection`: Represents a virtual connection to the JMS provider.\n\
    - `javax.jms.JMSContext`: JMS 2.0 syntactic sugar for reducing verbosity of JMS\
    \ 1.1 API. It combines `Connection` and `Session` into a single object.\n- `javax.jms.ConnectionFactory`:\
    \ Main configuration class of JMS that is responsible for creating connections\
    \ to the JMS provider. It is usually created at the start of the JMS application.\n\
    \nSo the usual workflow of a JMS 1.1 developer is to create JMS objects in this\
    \ order: `ConnectionFactory` ![image](images/arrow.jpg) `Connection` → `Session`\
    \ → `MessageProducer`/`MessageConsumer`/`Message`. With JMS 2.0, the situation\
    \ is a little enhanced: `ConnectionFactory` → `JMSContext` → `JMSProducer`/`JMSConsumer`/`Message`.\
    \ In the case of a full-blown JEE container, `ConnectionFactory` would likely\
    \ be injected.\n\nAs you may have noticed, this workflow of JMS objects doesn't\
    \ include `Destination`. This object is created or injected separately and is\
    \ used to create `Producer` or `Consumer`. `MessageListener` is designed to be\
    \ registered into the `MessageConsumer` object.\n\n![Image](images/sq.jpg) **Note**\
    \ This overview of the JMS API is limited, because this book focuses on Spring's\
    \ abstractions built on top of a plain JMS API. Therefore, the deeper aspects\
    \ and additional features are beyond the scope of this book. The best place to\
    \ start exploring it is the JEE 7 tutorial here: `https://docs.oracle.com/javaee/7/tutorial/jms-concepts003.htm#BNCEH`.\n\
    \n## Java JMS Examples\n\nThe most common open source JMS provider is ActiveMQ.\
    \ But at the time of writing, ActiveMQ doesn't cover JMS 2.0. We chose HornetQ\
    \ to show our plain Java JMS examples, because it already supports the new JMS\
    \ 2.0 standard.\n\nAs mentioned, JMS providers are often hosted as separate instances\
    \ to our application. This is the case for our Java JMS examples. We will be running\
    \ the HornetQ instance server locally and assume that a recent Java version is\
    \ installed on the target machine.\n\nTo download the HornetQ server, you need\
    \ to download the ZIP or TAR.GZ bundle from `http://hornetq.jboss.org/downloads.html`\
    \ and unpack it. Running the server is easy. Just run the `bin/run.sh` or `bin/run.bat`\
    \ file from the command line. If the proper Java version is installed, the server\
    \ should start without any problems. To stop the server, we need to execute `bin/stop.sh`\
    \ or `bin/stop.bat`—an easy process.\n\nFor example purposes, we don't need to\
    \ tweak the default HornetQ configuration, because the example projects are using\
    \ JMS resources configured by HornetQ out of the box. These examples were tested\
    \ against HornetQ version 2.4.0.Final.\n\n## Synchronous JMS 1.1 Example\n\n-\
    \ Our first Java JMS example uses an old JMS 1.1 API that was standardized in\
    \ 2003. [Listing 5-1](#9781484207949_Ch05.xhtml#FPar2) shows how to configure\
    \ JMS 1.1 access.\n\n[***Listing 5-1***](#9781484207949_Ch05.xhtml#_FPar2). JMS\
    \ 1.1 HornetQ Configuration (0501-jms11-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.jms11jndi;\n\
    \nimport java.util.Hashtable;\nimport javax.jms.Connection;\nimport javax.jms.ConnectionFactory;\n\
    import javax.jms.JMSException;\nimport javax.jms.Queue;\nimport javax.naming.InitialContext;\n\
    import javax.naming.NamingException;\nimport lombok.Getter;\n\npublic class JmsConfiguration\
    \ implements AutoCloseable {\n  private InitialContext initialContext;\n\n@Getter\n\
    \  private Queue queue;\n  @Getter\n  private Connection connection;\n\npublic\
    \ void init() throws NamingException, JMSException {\n    Hashtable<Object, Object>\
    \ env = new Hashtable<Object, Object>();\n    env.put(\"java.naming.factory.initial\"\
    ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
    ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
    , \"jnp://localhost:1099\");\n    initialContext = new InitialContext(env);\n\n\
    queue = (Queue) initialContext.lookup(\"queue/ExpiryQueue\");\n    ConnectionFactory\
    \ connectionFactory =\n        (ConnectionFactory) initialContext.lookup(\"/ConnectionFactory\"\
    );\n    connection = connectionFactory.createConnection();\n  }\n\npublic void\
    \ close() throws NamingException, JMSException {\n    if (initialContext != null)\
    \ {\n      initialContext.close();\n    }\n    if (connection != null) {\n   \
    \   connection.close();\n    }\n  }\n}\n```\n\nThe `JmsConfiguration` class encapsulates\
    \ the JMS provider-specific configuration. It has three fields. The first one\
    \ is of type `InitialContext`, which is the starting point for resolving JNDI\
    \ names. HornetQ is a JBoss technology, which is part of the broader JBoss Application\
    \ Server portfolio. Therefore, the easiest way to initialize stand-alone HornetQ\
    \ access is to use JNDI naming abstractions.\n\nThe following two fields defined\
    \ in the `JmsConfiguration` class are the JMS objects `queue` and `connection`.\
    \ These are annotated by Lombok's `@Getter` annotation, which generates getters\
    \ for these two variables. Lombok is handy when we want to avoid Java verbosity\
    \ so often highlighted by Java opponents. So they are exposed via getters, and\
    \ other classes can use them for JMS messaging.\n\nThe first method is called\
    \ `init`. As its name suggests, it initializes the JMS configuration. We define\
    \ the map for storing JNDI naming values. The first two JNDI naming values are\
    \ created based on HornetQ manual instructions in the section \"JNDI configuration\"\
    : `http://docs.jboss.org/hornetq/2.4.0.Final/docs/user-manual/html_single/index.html#d0e1265`.\
    \ The third value, with the key `java.naming.provider.url`, specifies the address\
    \ of our HornetQ server. In this case, the server will be located on `localhost`\
    \ and port `1099`.\n\nWhen we have the JNDI configuration in the map, we can create\
    \ a JNDI `InitialContext` instance and use it to look up JMS resources. As previously\
    \ mentioned, the default HornetQ configuration is used in our Java JMS examples,\
    \ so we use the queue name `queue/ExpiryQueue` and the connection factory name\
    \ `/ConnectionFactory` to create the `queue` and `connectionFactory` objects.\
    \ `connectionFactory` is used to create a `connection` instance. A queue with\
    \ the name `queue/ExpiryQueue` is configured by default in the HornetQ server;\
    \ we are using it here for simplicity's sake.\n\nThese two instances are already\
    \ JMS abstractions, so the method `init` is the only place in our example containing\
    \ a HornetQ-specific configuration.\n\nThe next method is called `close`. As its\
    \ name suggests, it is used for closing resources that need to be closed. In this\
    \ case, we need to close `connection` and `initialContext`. But this close method\
    \ is special, because it belongs to the `java.lang.AutoCloseable` interface. This\
    \ interface was introduced in Java 7 as part of a feature often referred to as\
    \ *try-with-resources*. It adds syntactic sugar for closing resources after a\
    \ try block. We will show its use later in this example.\n\n[Listing 5-2](#9781484207949_Ch05.xhtml#FPar3)\
    \ shows how to send a message with the JMS 1.1 API.\n\n[***Listing 5-2***](#9781484207949_Ch05.xhtml#_FPar3).\
    \ Sending a JMS Message with the JMS 1.1 API (0501-jms11-jndi)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter05.jms11jndi;\n\nimport javax.jms.Connection;\n\
    import javax.jms.JMSException;\nimport javax.jms.MessageProducer;\nimport javax.jms.Queue;\n\
    import javax.jms.Session;\nimport javax.jms.TextMessage;\n```"
