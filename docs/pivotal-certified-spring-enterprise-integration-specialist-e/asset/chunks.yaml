    *   负载处理拦截器——`PayloadValidatingInterceptor`、`PayloadTransformingInterceptor`\n\
    *   安全拦截器——`XwsSecurityInterceptor`、`Wss4jSecurityInterceptor`\n\n除了内置的拦截器，我们还可以创建`EndpointInterceptor`的自定义实现。示例如[清单\
    \ 3-26](#9781484207949_Ch03.xhtml#FPar31)所示。\n\n**[***清单 3-26***](#9781484207949_Ch03.xhtml#_FPar31).\
