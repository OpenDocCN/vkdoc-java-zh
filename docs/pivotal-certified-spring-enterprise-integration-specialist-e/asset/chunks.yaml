- fmt: '步骤分区是 SB 的一项功能，它将批处理负载完全委托给远程进程。它也仅适用于面向块的处理，其中处理完全在从属进程中完成。当我们处理 I/O 密集型需求时，此机制非常方便。


    我们还必须强调，进程内分区模式是可行的；工作被委托给本地线程而不是远程进程。但这种执行是在单个进程中处理的，并且可以很容易地被并行步骤功能覆盖。并行处理更易于配置。因此，我们将纯粹专注于远程进程的分区。


    其思想是将读取数据集划分为多个分区，以便每个分区可以在单独的远程进程中执行。我们再次拥有主进程和从属进程，主进程定义分区。分区边界通常由数据集的一个维度定义。例如，如果我们有一个用户交互数据集，我们可以根据交互日期和时间将该数据集划分为不同的时间桶。属于每个桶的数据可以代表一个分区的数据集。


    对于每个分区，主进程创建一个单独的`ExecutionContext`实例，其中存储了分区的边界信息。这是在由`Partitioner`接口定义的组件中完成的。大多数情况下，此组件由应用程序开发人员实现。


    在分区被定义并封装到`ExecutionContext`中后，主进程通过消息传递接口向从属进程发送命令。从属进程将从其接收到的`ExecutionContext`实例中检索有关分区边界的信息。然后，从属进程对定义的分区数据集执行面向块的处理，并在工作完成后将结果发送回主进程。


    为了处理分区，SB 提供了`PartitionHandler`的三种实现：


    *   `TaskExecutorPartitionHandler`：使用`TaskExecutor`将工作委托给从属进程的本地线程。

    *   `JsrPartitionHandler`：使用`ThreadPoolTaskExecutor`将工作委托给从属进程的本地线程。符合 JSR-352
    分区标准。

    *   `MessageChannelPartitionHandler`：这是最有趣的实现，涉及真正的分布式扩展，其中使用`MessagingTemplate`将工作委托给从属进程的远程进程。这种扩展再次依赖于最先从主进程读取消息的最空闲的从属进程。


    如果我们使用`MessageChannelPartitionHandler`进行远程分区，主进程和从属进程需要共享一个数据库来存储 SB 元数据。该数据库实例应由主进程和所有从属进程通过
    JDBC 直接使用。


    ## 分区步骤示例


    本章的示例仅使用 XML 配置，原因与远程块处理示例相同。为了涵盖此功能，我们将使用三个项目并运行多个进程：


    *   用于处理主进程和从属进程之间消息传递的 HornetQ 服务器

    *   共享数据库服务器

    *   主项目

    *   从属项目，我们将在其中运行各种进程


    ### 共享数据库项目


    对于共享数据库，我们将使用运行存储在文件中的 H2 数据库实例的 Spring Boot 应用程序。[列表 9-130](#9781484207949_Ch09_3_Ext.xhtml#FPar134)
    显示了启动此项目时使用的脚本。


    [***列表 9-130***](#9781484207949_Ch09_3_Ext.xhtml#_FPar134)。分区示例的初始化 SQL 脚本（文件`h2-purge.sql`，位于示例项目
    0940-remote-partitioning-sql-server 的`src/main/resource`文件夹中）


    ```

    DROP ALL OBJECTS

    ```


    因为我们没有使用 H2 的持久化到文件的模式，此脚本会删除数据库中的所有对象，以便我们始终以干净的状态启动示例。在现实世界中，我们不会想这样做，但出于示例目的，从一个空数据库开始是好的。[列表
    9-131](#9781484207949_Ch09_3_Ext.xhtml#FPar135) 显示了此示例项目的 XML 配置。'
  raw: 'Step partitioning is an SB feature that delegates the batch processing load
    to remote processes completely. It also applies only to chunk-oriented processing,
    where processing is fully done in slave processes. This mechanism is handy when
    we are dealing with I/O bound requirements.


    We also have to emphasize that an inner process mode of partitioning is possible;
    work is delegated to local threads instead of remote processes. But this execution
    is handled in a single process and can be easily covered by the parallel steps
    feature. Parallel processing is easier to configure. Therefore, we will focus
    purely on partitioning remote processes.


    The idea is to divide the reading data set into partitions so that each partition
    can be executed in a separate remote process. We again have master and slave processes,
    and the master defines partitions. Partition boundaries are usually defined by
    one dimension of the data set. For example, if we have a data set of user interactions,
    we can divide this data set based on the interaction date and time into various
    time buckets. Data belonging to each bucket can represent the data set for one
    partition.


    For each partition, the master creates a separate `ExecutionContext` instance
    in which the partition’s boundary information is stored. This is done in the component
    defined by the `Partitioner` interface. Most of the time, this component is implemented
    by application developers.


    After the partitions are defined and wrapped into `ExecutionContext`, the master
    sends commands via the messaging interface to the slave processes. The slave process
    will retrieve information about partition boundaries from the `ExecutionContext`
    instance it receives. The slave then performs chunk-oriented processing on the
    defined partition data set, and after the work is done, sends the results to the
    master.


    For handling partitions, SB provides three implementations of `PartitionHandler`:


    *   `TaskExecutorPartitionHandler`: Uses `TaskExecutor` for delegating work to
    the slave’s local threads.

    *   `JsrPartitionHandler`: Uses `ThreadPoolTaskExecutor` for delegating work to
    the slave’s local threads. Conforms to the JSR-352 partitioning standard.

    *   `MessageChannelPartitionHandler`: This is the most interesting implementation
    in terms of true distributed scaling, where `MessagingTemplate` is used to delegate
    work to the slave’s remote processes. This scaling is again dependent on the least
    busy slave reading the message from the master first.


    If we are using `MessageChannelPartitionHandler` for remote partitioning, the
    master and slaves need to share a database for storing SB metadata. Thi s DB instance
    should be used by the master and all slave processes directly via JDBC.


    Partitioning Step Example


    The example for this chapter uses only an XML configuration, for the same reasons
    as the remote chunking examples. To cover this feature, we will use three projects
    and will run several processes:


    *   HornetQ server for handling messaging between master and slaves

    *   Shared database server

    *   Master project

    *   Slave project, where we will run various processes


    Shared Database Project


    For a shared database, we will use the Spring Boot application running an instance
    of an H2 database stored in the file. [Listing 9-130](#9781484207949_Ch09_3_Ext.xhtml#FPar134)
    shows the script used when we start this project.


    [***Listing 9-130***](#9781484207949_Ch09_3_Ext.xhtml#_FPar134). Initialization
    SQL Script for Partitioning Example (File h2-purge.sql in Folder src/main/resource
    of Example Project 0940-remote-partitioning-sql-server)


    ```

    DROP ALL OBJECTS

    ```


    Because we are not using H2 mode where it persists into the file, this script
    wipes out all the objects in the database so that we always start our example
    with a clean sheet. In the real world, we wouldn’t want to do this, but for example
    purposes, it is good to start with an empty DB. [Listing 9-131](#9781484207949_Ch09_3_Ext.xhtml#FPar135)
    shows the XML configuration for this example project.'
