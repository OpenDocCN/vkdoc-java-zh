    我们可以看到，回滚后，消息保留在队列中，并可在 main 方法中用于下一次事务性读取。此行为类似于关系型数据库的事务行为。因此，我们可以轻松地将消息分组到一个工作单元中，该工作单元将具有
    ACID 特性。


