    package net.lkrnac.book.eiws.chapter09;

    import javax.sql.DataSource;

    import net.lkrnac.book.eiws.chapter09.model.User;

    import org.springframework.batch.item.ItemReader;

    import org.springframework.batch.item.ItemWriter;

    import org.springframework.batch.item.database.BeanPropertyItemSqlParameterSourceProvider;

    import org.springframework.batch.item.database.JdbcBatchItemWriter;

    import org.springframework.batch.item.file.FlatFileItemReader;

    import org.springframework.batch.item.file.mapping.BeanWrapperFieldSetMapper;

    import org.springframework.batch.item.file.mapping.DefaultLineMapper;

    import org.springframework.batch.item.file.transform.DelimitedLineTokenizer;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.io.ClassPathResource;


    @Configuration

    public class ChunkConfiguration {

      @Bean

      public ItemReader<User> fileItemReader() {

        FlatFileItemReader<User> flatFileItemReader = new FlatFileItemReader<>();

        flatFileItemReader.setResource(new ClassPathResource("users.txt"));


    BeanWrapperFieldSetMapper<User> fieldSetMapper = new BeanWrapperFieldSetMapper<>();

        fieldSetMapper.setTargetType(User.class);


    DelimitedLineTokenizer lineTokenizer = new DelimitedLineTokenizer();

        lineTokenizer.setDelimiter(",");

        lineTokenizer.setNames(new String[] { "name", "email" });


    DefaultLineMapper<User> lineMapper = new DefaultLineMapper<>();

        lineMapper.setFieldSetMapper(fieldSetMapper);

        lineMapper.setLineTokenizer(lineTokenizer);


    flatFileItemReader.setLineMapper(lineMapper);

        return flatFileItemReader;

      }


    @Bean

      public ItemWriter<User> jdbcItemWriter(DataSource dataSource) {

        JdbcBatchItemWriter<User> writer = new JdbcBatchItemWriter<>();

        writer.setItemSqlParameterSourceProvider(

            new BeanPropertyItemSqlParameterSourceProvider<>());

        writer.setSql("insert into USERS (NAME, EMAIL) values (:name, :email)");

        writer.setDataSource(dataSource);

        return writer;

      }

    }

    ```


    This Spring configuration class defines two beans. The first one is used as Spring’s
    implementation of `ItemReader` for reading from flat files: `FlatFileItemReader<User>`.
    First, we need to configure the source file location. In this case, we expect
    it on the classpath with the name `users.txt` (the file in [Listing 9-13](#9781484207949_Ch09_1.xhtml#FPar14)).
    Next we need to configure the target type for the conversion from one line into
    `BeanWrapperFieldSetMapper<User>`. In our case, we use the `User` class. `DelimitedLineTokenizer`
    is used for parsing the file based on the comma delimiter and maps the parsed
    values into the `User` object fields. Finally, we configure the created line tokenizer
    and field set mapper into the `flatFileItemReader` object, and the item reader
    is configured.


    The second bean creates Spring’s item writer implementation `JdbcBatchItemWriter<User>`,
    used for writing into databases. The generic type specifies the type of the items
    to be written. In order to use the `User` field names as parameters in the JDBC
    query, we need to configure the `BeanPropertyItemSqlParameterSourceProvider<User>`
    implementation as a SQL parameter provider. Apart from that, we need to also configure
    the JDBC data source instance and the SQL query to execute into the writer.


    ![Image](images/sq.jpg) **Note**  The SB framework provides a lot of possibilities
    for out-of-the-box implementations of `ItemReader` and `ItemWriter`. Full coverage
    of these APIs and implementations is beyond the scope of this book. Refer to SB
    reference documentation for further details.


    [Listing 9-15](#9781484207949_Ch09_1.xhtml#FPar17) shows the batch configuration
    of `Step` and `Job`.


    [***Listing 9-15***](#9781484207949_Ch09_1.xhtml#_FPar17). Batch Configuration
    of File to DB Chunk-Oriented Example (0903-chunk-processing-non-generic)


