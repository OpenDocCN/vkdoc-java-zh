- fmt: "剩余拦截器是全局的，这意味着它们适用于此服务中处理的所有端点。在此案例中，我们注册了两个自定义拦截器、两个日志拦截器和一个验证拦截器。内置拦截器有时具有强制参数。在此案例中，验证拦截器需要访问`XSD`模式。此配置实际上与[清单\
    \ 3-27](#9781484207949_Ch03.xhtml#FPar32)中的`XML`配置相同。\n\n## 客户端拦截\n\nSpring Web\
    \ Services 拦截支持的一个有趣部分是在客户端。主接口`ClientInterceptor`签名与服务器端的`EndpointInterceptor`类似。唯一的区别是缺少端点\
    \ bean 实例注入到拦截接触点，因为客户端没有任何端点。该接口没有方便的抽象实现。因此，我们需要在自定义客户端拦截器中实现所有接触点。Spring Web\
    \ Services 提供的唯一开箱即用的拦截器是`PayloadValidatingInterceptor`。客户端拦截器被注册到`WebServiceTemplate`\
    \ bean 中。\n\n[清单 3-29](#9781484207949_Ch03.xhtml#FPar34)展示了一个自定义客户端拦截器的示例。\n\n\
    [***清单 3-29***](#9781484207949_Ch03.xhtml#_FPar34). 自定义客户端拦截器 (0305-ws-interceptor-client)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter03.ws.interceptor.client;\n\nimport\
    \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Component;\n\
    import org.springframework.ws.client.WebServiceClientException;\nimport org.springframework.ws.client.support.interceptor.ClientInterceptor;\n\
    import org.springframework.ws.context.MessageContext;\n\n@Component\npublic class\
    \ UserInterceptor implements ClientInterceptor {\n  @Override\n  public boolean\
    \ handleRequest(MessageContext messageContext)\n      throws WebServiceClientException\
    \ {\n    System.out.println(\"Client handleRequest\");\n    return true;\n  }\n\
