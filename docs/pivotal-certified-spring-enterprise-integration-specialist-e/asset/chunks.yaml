    此 JMS 2.0 配置与清单 5-1 中的 JMS 1.1 配置类似。唯一的区别在于，我们创建的是 `JMSContext` 实例，而非 `Connection`
    实例。`JMSContext` 是 JMS 2.0 中引入的一种新的抽象。清单 5-7 展示了一个 JMS 2.0 发送方实现的示例。


    ***清单 5-7***. 使用 JMS 2.0 API 发送 JMS 消息 (0502-jms2-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms2jndi;


    import javax.jms.JMSContext;

    import javax.jms.Queue;


    public class SimpleMessageSender {

      private JMSContext jmsContext;

      private Queue queue;


    public SimpleMessageSender(JMSContext jmsContext, Queue queue) {

        this.jmsContext = jmsContext;

        this.queue = queue;

      }


    public void sendMessage(String message) {

        jmsContext.createProducer().send(queue, message);

      }

    }

    ```


    与清单 5-2 相比，我们无需初始化 `Session` 或 `MessageProducer` 实例。因此，通过构造函数接收 `jmsContext` 和
    `queue` 并将其存储到类字段中更为合适。


    发送消息也更加简洁，因为我们通过 `jmsContext.createProducer` 调用创建了 `JMSProducer`，并使用 `queue` 对象来链式调用
    `send`。请注意，在 JMS 2.0 中发送消息时，不再需要处理受检异常 `JMSException`。清单 5-8 展示了消息读取器的实现。


    ***清单 5-8***. 使用 JMS 2.0 API 同步接收消息 (0502-jms2-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms2jndi;


    import javax.jms.JMSConsumer;

    import javax.jms.JMSContext;

    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.Queue;


    public class SimpleMessageReader {

      private JMSContext jmsContext;

      private Queue queue;


    public SimpleMessageReader(JMSContext jmsContext, Queue queue) {

        this.jmsContext = jmsContext;

        this.queue = queue;

      }


    public String readMessage() throws JMSException {

        JMSConsumer jmsConsumer = jmsContext.createConsumer(queue);

        Message message = jmsConsumer.receive(5000);

        return message.getBody(String.class);

      }

    }

    ```


    与使用 JMS 1.1 API 的清单 5-3 相比，我们同样无需初始化。相反，我们通过构造函数接收 `jmsContext` 和 `queue` 对象。在读取消息时，我们首先基于
    `queue` 对象从 `jmsContext` 创建一个 `JMSConsumer` 实例，然后执行一个可能阻塞的调用。之所以说“可能阻塞”，是因为如果消息已经在队列中，我们可能根本无需等待。超时时间
    `5000` 同样是一个可选参数。如果不指定它，我们可能会无限期等待。


    与 JMS 1.1 API 不同，这里无需将消息强制转换为 `TextMessage`。但在底层，它会根据我们为 `message.getBody()` 调用指定的
    `String.class` 参数自动完成转换。此调用可能抛出受检异常 `JMSException`，因此我们必须处理它或将其向上传递。在本例中，`readMessage()`
    方法采用了第二种选择，因此该方法的调用者也需处理该异常（参见清单 5-9）。


    ***清单 5-9***. 同步 JMS 2.0 示例的主类 (0502-jms2-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms2jndi;


    import javax.jms.JMSContext;

    import javax.jms.JMSException;

    import javax.jms.Queue;

    import javax.naming.NamingException;

    import lombok.extern.slf4j.Slf4j;


    @Slf4j

    public class Jms2JndiApplication {

      public static void main(String[] args) throws JMSException, NamingException
    {

        try (JmsConfiguration jmsConfiguration = new JmsConfiguration()) {

          jmsConfiguration.init();

          JMSContext jmsContext = jmsConfiguration.getJmsContext();

          Queue queue = jmsConfiguration.getQueue();


    SimpleMessageSender messageSender =

              new SimpleMessageSender(jmsContext, queue);

          messageSender.sendMessage("simple message");


    SimpleMessageReader messageConsumer =

              new SimpleMessageReader(jmsContext, queue);

          String message = messageConsumer.readMessage();


    log.info("Message Received: {}", message);

        }

      }

    }

    ```


    `Jms2JndiApplication` 再次与 `Jms11JndiApplication` 类似，但 JMS 2.0 API 允许我们减少对 `messageSender`
    和 `messageConsumer` 的 `init` 调用。相反，我们将 `jmsContext` 和 `queue` 对象传递到它们的构造函数中——这是相对于
    JMS 1.1 API 的显著改进。清单 5-10 展示了运行此主类后该示例的输出。


    ***清单 5-10***. 同步 JMS 2.0 示例的输出


    ```

    23:27:41.859 [main] INFO  n.l.b.e.c.j.Jms2JndiApplication - Message Received:
    simple message

    ```


    异步 JMS 示例


    我们最后一个纯 Java 示例重点介绍如何使用异步监听器接收 JMS 消息。但在深入探讨 JMS 结构之前，我们需要介绍一个将在本章大多数示例中使用的类。如清单
    5-11 所示。


    ***清单 5-11***. 用于处理消息的通用服务 (0500-jms-common)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import lombok.extern.slf4j.Slf4j;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class SimpleService {

      public void processText(String message) {

        log.info("Message received: {}", message);

      }

    }

    ```


    请注意，此示例位于公共项目 `0500-jms-common` 中。这是因为我们将在纯 Java 示例以及大多数 Spring JMS 示例中使用相同的类。其目的是作为异步接收后我们委托
    JMS 消息的类。然后，它可用于集成测试套件验证，以确保 JMS 消息已被接收。作为一名负责任的程序员，我希望确保书中的代码片段能够正常工作。但深入探讨 JMS
    集成测试超出了本书的范围，因此由您自行探索用于确保 JMS 示例正常工作的测试策略。


    `SimpleService` 类使用了 Lombok 的 `@Slf4j` 注解，当我们需要使用 SLF4J 日志门面时，这非常方便。对于纯 Java JMS
    示例来说，`@Service` 可能会令人困惑，但在 Spring JMS 异步示例中，它将被用作 Spring Bean 并被扫描。实现很简单——代码只是将接收到的消息记录到控制台。


    本示例中解释的下一个类是清单 5-12 中的 JMS 监听器实现。


    ***清单 5-12***. 使用 JMS 2.0 API 异步接收消息 (0503-async-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.asyncjndi;


    import javax.jms.Message;

    import javax.jms.MessageListener;


    import lombok.extern.slf4j.Slf4j;

    import net.lkrnac.book.eiws.chapter05.text.SimpleService;


    @Slf4j

    public class SimpleMessageListener implements MessageListener {

      private SimpleService simpleService;


    public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @Override

      public void onMessage(Message message) {

        try {

          simpleService.processText(message.getBody(String.class));

        } catch (Throwable t) {

          log.error("Error during message reception", t);

        }

      }

    }

    ```


    `SimpleMessageListener` 期望通过构造函数传入一个 `SimpleService` 实例。

