    *Notice that this sequence diagram covers processing of a single message.* After
    reception of the message, it is inserted into `TEXT_TABLE`. But after the exception
    being raised in the `postprocess()` method of the JMS listener for the first received
    message, the global transaction manager will send a rollback order to the H2 database
    and to the JMS queue `ExpiryQueue`. *This is different from the same implementation
    in Listener*[6-28](#9781484207949_Ch06.xhtml#FPar30), *where the H2 database committed
    the local transaction*.


    After the rollback is sent to the JMS queue, the message is sent for a second
    round of processing. Again, the global transaction is started and the message
    is inserted into `TEXT_TABLE`. But on second reception, `postprocess()` doesn’t
    throw an exception, and our global transaction ends successfully, sending a commit
    to both data sources. Happy global ACID days. We can sleep well when our performance
    characteristics for our application using JTA are acceptable.


    But notice that we are using a point-to-point messaging paradigm here. Dealing
    with JMS topics, where we would have various consumers, would involve an even
    more careful (and resource-intensive) approach to handle JTA transactions across
    each of them.


    Spring JTA Example with Java Configuration


    Every responsible Spring developer has noticed movement from XML to Java configuration.
    Therefore, this section covers how Spring JTA support can be configured without
    XML. [Listing 7-10](#9781484207949_Ch07.xhtml#FPar11) shows a JTA configuration.


    [***Listing 7-10***](#9781484207949_Ch07.xhtml#_FPar11). Java JTA Configuration
    (0702-jta-java-config)


    ```

    package net.lkrnac.book.eiws.chapter07;


    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.transaction.annotation.EnableTransactionManagement;

    import org.springframework.transaction.jta.JtaTransactionManager;

    import com.atomikos.icatch.jta.UserTransactionImp;

    import com.atomikos.icatch.jta.UserTransactionManager;


    @Configuration

    @EnableTransactionManagement

    public class JtaConfiguration {

      @Bean(initMethod = "init", destroyMethod = "close")

      public UserTransactionManager atomikosTransactionManager() {

        return new UserTransactionManager();

      }


    @Bean

      public JtaTransactionManager transactionManager(

          UserTransactionManager atomikosTransactionManager) {

        JtaTransactionManager transactionManager = new JtaTransactionManager();

        transactionManager.setTransactionManager(atomikosTransactionManager);

        transactionManager.setUserTransaction(new UserTransactionImp());

        return transactionManager;

      }

    }

    ```


    This configuration class enables Spring transactional support via the `@EnableTransactionManagement`
    annotation. As with XML configuration, we need to register the `com.atomikos.icatch.jta.UserTransactionManager`
    bean as an implementation of global transactional manager. We use the `initMethod`
    and `destroyMethod` attributes of this `@Bean` annotation to tell Spring how to
    instantiate and destroy this bean.


    The second bean wraps the Atomikos transaction manager into `JtaTransactionManager`,
    which is an implementation of `PlatformTransactionManager`, and enables Spring
    transactional support for this application. Again we need to configure the `userTransaction`
    property to an instance of `com.atomikos.icatch.jta.UserTransactionImp` so that
    Atomikos will work fine for this non–Java EE application. [Listing 7-11](#9781484207949_Ch07.xhtml#FPar12)
    dives into JDBC configuration of the XA data source.


    [***Listing 7-11***](#9781484207949_Ch07.xhtml#_FPar12). Java Configuration of
    JDBC XA Data Source (0702-jta-java-config)


    ```

    package net.lkrnac.book.eiws.chapter07;


    import javax.sql.DataSource;

    import org.h2.jdbcx.JdbcDataSource;

    import org.springframework.boot.jta.atomikos.AtomikosXADataSourceWrapper;

