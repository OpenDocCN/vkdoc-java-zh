    MessagingTemplate


    Use of the messaging gateway or inbound channel adapters is not necessary to send
    messages into an SI flow. SI provides the special abstraction `org.springframework.integration.core.MessagingTemplate`
    for sending and receiving messages to/from any channel in the SI flow. This mechanism
    can be more convenient, for example, in testing code or when we want to send a
    custom message to the SI flow.


    We can think of this class as the SI equivalent of `JmsTemplate` or `RestTemplate`.


    MessagingTemplate Example


    This example uses exactly the same SI flow configuration as in [Listing 8-27](#9781484207949_Ch08_1.xhtml#FPar30)
    (example `0808-gateway-generic-xml`). To remind you, a messaging gateway is used
    to send a message via `inChannel` to the outbound channel adapter mapped to our
    common bean `WriteService.writeAndIndicateSuccess()`. [Listing 8-146](#9781484207949_Ch08_2_Ext.xhtml#FPar149)
    shows the configuration of `MessagingTemplate` .


