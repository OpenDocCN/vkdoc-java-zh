    The `WriteRepository` bean logs the transformed message. [Figure 8-6](#9781484207949_Ch08_1.xhtml#Fig6)
    shows this SI flow.


    ![9781484207949_Fig08-06.jpg](images/9781484207949_Fig08-06.jpg)


    [Figure 8-6](#9781484207949_Ch08_1.xhtml#_Fig6). Visualization of generic transformer
