    \    if (!errorSimulated) {\n      errorSimulated = true;\n      throw new IllegalArgumentException(message);\n\
    \    }\n  }\n}\n```\n\nThis listener class looks familiar, as it is similar to\
    \ listeners used in the previous chapter.\n\nOne unusual property in this class\
    \ is `errorSimulated`. This variable is used for highlighting erroneous behavior,\
    \ which could happen in the real world for various reasons. In this case, we store\
    \ it in this singleton bean (which should ring a bell for every responsible developer).\
    \ Of course, storing state in a singleton bean shouldn’t be used for production\
    \ purposes, because it represents a global state that is not thread safe.\n\n\
    But for our purposes, it is essential, because we want to fail the message reception\
    \ to highlight what would happen with JMS and database integration. `errorSimulated`\
    \ is used in the private method `postprocess()` to simulate an error for the first\
    \ received message. The first hit of this method also further disables error simulation.\
    \ It is useful for highlighting a scenario in which processing the first message\
    \ can fail and the second attempt could be successful.\n\n*This pattern will be\
    \ used for error simulation across various failure examples in this chapter.*\n\
    \nIn this message reception logic, we simulate an error in the private method\
    \ `postprocess()`, which is called right after persisting the message but before\
    \ the explicit `message.acknowledge()` call. After execution of this example,\
    \ the sequence shown in [Figure 6-5](#9781484207949_Ch06.xhtml#Fig5) will happen.\n\
    \n![9781484207949_Fig06-05.jpg](images/9781484207949_Fig06-05.jpg)\n\n[Figure\
    \ 6-5](#9781484207949_Ch06.xhtml#_Fig5). Sequence diagram of duplicate message\
    \ scenario in CLIENT_ACKNOWLEDGE mode (file sequence.uml in folder uml-diagrams\
    \ of example project 0608-client-acknowledge-listener-duplicate)\n\nThe message\
    \ is received and persisted, but not acknowledged, because the `postprocess()`\
    \ method throws an error. So the JMS destination makes sure that according to\
    \ the JMS contract, this message will be redelivered. After the second persistence\
    \ call, `postprocess()` won’t throw a second error as per our example and will\
    \ let the message be explicitly acknowledged.\n\nObviously, this is behavior we\
    \ don’t want to have in our application, unless our persistent store is idempotent.\
    \ Idempotency was described in [Chapter 4](#9781484207949_Ch04.xhtml). In this\
    \ case, if the database would insert the message when it doesn’t exist and update\
    \ it when it already exists, we could perform any of the `simpleService.processText()`\
    \ duplicate calls without affecting the consistency of state in the database.\n\
    \nBut storage in our example is not idempotent; therefore, a duplicate `simpleService.processText()`\
    \ call is a problem.\n\n## DUPS_OK_ACKNOWLEDGE Mode\n\nThis acknowledge mode lazily\
    \ acknowledges messages automatically. This means that JMS is in charge of doing\
    \ so. The downside of this approach is that the client can get duplicate messages\
    \ while using this mode, because messages are acknowledged in bulk by the JMS\
    \ server. So when acknowledgement is not in the client’s hands, there’s no guarantee\
    \ that the message will be delivered exactly once. Therefore, this mode is most\
    \ suitable when the client is idempotent (can handle duplicate messages).\n\n\
    If a message is redelivered a second time, it will have the `JMSRedelivered` message\
    \ header set to `true`. So we can ask whether a message was redelivered by calling\
    \ `Message.getJMSRedelivered()` and acting according to our requirements.\n\n\
    As the acknowledgement with `DUPS_OK_ACKNOWLEDGE` mode is specific to the JMS\
    \ provider implementation, it is hard to reproduce a duplicate scenario for our\
    \ example. Therefore, we cover only a success scenario, in which we show only\
    \ the JMS configuration class in [Listing 6-22](#9781484207949_Ch06.xhtml#FPar24).\
    \ Other classes are exactly the same as for the success scenarios, without error\
    \ simulation.\n\n[***Listing 6-22***](#9781484207949_Ch06.xhtml#_FPar24). Listener\
    \ Class for Success Scenario in `DUPS_OK_ACKNOWLEDGE` Mode (0609-dups-ok-acknowledge)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.ConnectionFactory;\n\
    import javax.jms.Session;\n\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
    \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public DefaultJmsListenerContainerFactory\
    \ jmsListenerContainerFactory(\n      ConnectionFactory connectionFactory) {\n\
    \    DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
    \    factory.setConnectionFactory(connectionFactory);\n    factory.setSessionAcknowledgeMode(Session.DUPS_OK_ACKNOWLEDGE);\n\
    \    return factory;\n  }\n}\n```\n\nIn this case, `jmsListenerContainerFactory`\
    \ uses `DUPS_OK_ACKNOWLEDGE` mode. The sequence diagram of this example is shown\
    \ in [Figure 6-6](#9781484207949_Ch06.xhtml#Fig6).\n\n![9781484207949_Fig06-06.jpg](images/9781484207949_Fig06-06.jpg)\n\
    \n[Figure 6-6](#9781484207949_Ch06.xhtml#_Fig6). Sequence diagram of success scenario\
    \ with `DUPS_OK_ACKNOWLEDGE` mode (file sequence.uml in folder uml-diagrams of\
    \ example project 0609-dups-ok-acknowledge)\n\nAfter receiving and persisting\
    \ the message, the JMS provider acknowledges it at a point convenient to the JMS\
    \ provider. This option is useful for enabling various JMS destination handling\
    \ optimizations that the JMS provider might want to put in place in order to make\
    \ JMS communication more efficient.\n\n## Local JMS Transactions with Spring\n\
    \nAcknowledge modes are not the only way to make sure that our messages are delivered\
    \ reliably. The JMS standard allows us to use transacted features, similar to\
    \ ACID transactions common for relational databases.\n\nWe already covered how\
    \ to use local JMS transactions with pure Java JMS APIs. Now we are going to explore\
    \ how to use them with Spring. This support can be turned on `JmsTemplate` by\
    \ setting `setSessionTransacted()` to `true` and `setSessionAcknowledgeMode()`\
    \ to `Session.SESSION_TRANSACTED`.\n\nFor this support, Spring expects the presence\
    \ of a transaction manager bean. Therefore, it doesn’t make sense to use `JmsTemplate`\
    \ (for message sending and synchronous message reception) with transacted behavior\
    \ without the transaction manager. Use of the transaction manager will be shown\
    \ later in this book.\n\nBut we can use local JMS transactions without any transaction\
    \ manager while listening to messages. In this case, we can configure `setSessionTransacted()`\
    \ to `true` and `setSessionAcknowledgeMode()` to `Session.SESSION_TRANSACTED`\
    \ for any of these JMS listener supporting beans:\n\n*   Container listener implementations\n\
    \    *   `SimpleMessageListenerContainer` — Creates a listener container, with\
    \ pure asynchronous JMS reception, where the listener is registered to the JMS\
    \ destination and the JMS server initiates the reception of the message. It is\
    \ handy if we plan to use a listener with `CLIENT_ACKNOWLEDGE` or `AUTO_ACKNOWLEDGE`\
    \ mode.\n    *   `DefaultMessageListenerContainer` — Creates a listener container,\
    \ where Spring makes synchronous calls with a time-out in a loop under the hood,\
    \ so that the message is read as soon as it appears at the JMS destination. This\
    \ mechanism is handy when we are using JMS transaction support and is the only\
    \ support that can work with distributed transactions (covered in the next chapter).\n\
    *   Container listener factory implementations, introduced in Spring 4.1 and enables\
    \ annotating JMS listener methods with `@JmsListener`\n    *   `SimpleJmsListenerContainerFactory`\
    \ — Factory for `SimpleMessageListenerContainer`\n    *   `DefaultJmsListenerContainerFactory`\
    \ — Factory for `DefaultMessageListenerContainer`\n\n## Success Scenario"
  raw: "private void postprocess(String message) {\n    //simulate error\n    if (!errorSimulated)\
    \ {\n      errorSimulated = true;\n      throw new IllegalArgumentException(message);\n\
        }\n  }\n}\n```\n\nThis listener class looks familiar, as it is similar to\
    \ listeners used in the previous chapter.\n\nOne unusual property in this class\
    \ is `errorSimulated`. This variable is used for highlighting erroneous behavior,\
    \ which could happen in the real world for various reasons. In this case, we store\
    \ it in this singleton bean (which should ring a bell for every responsible developer).\
    \ Of course, storing state in a singleton bean shouldn’t be used for production\
    \ purposes, because it represents a global state that is not thread safe.\n\n\
    But for our purposes, it is essential, because we want to fail the message reception\
    \ to highlight what would happen with JMS and database integration. `errorSimulated`\
    \ is used in the private method `postprocess()` to simulate an error for the first\
    \ received message. The first hit of this method also further disables error simulation.\
    \ It is useful for highlighting a scenario in which processing the first message\
    \ can fail and the second attempt could be successful.\n\n*This pattern will be\
    \ used for error simulation across various failure examples in this chapter.*\n\
    \nIn this message reception logic, we simulate an error in the private method\
    \ `postprocess()`, which is called right after persisting the message but before\
    \ the explicit `message.acknowledge()` call. After execution of this example,\
    \ the sequence shown in [Figure 6-5](#9781484207949_Ch06.xhtml#Fig5) will happen.\n\
    \n![9781484207949_Fig06-05.jpg](images/9781484207949_Fig06-05.jpg)\n\n[Figure\
    \ 6-5](#9781484207949_Ch06.xhtml#_Fig5). Sequence diagram of duplicate message\
    \ scenario in CLIENT_ACKNOWLEDGE mode (file sequence.uml in folder uml-diagrams\
    \ of example project 0608-client-acknowledge-listener-duplicate)\n\nThe message\
    \ is received and persisted, but not acknowledged, because the `postprocess()`\
    \ method throws an error. So the JMS destination makes sure that according to\
    \ the JMS contract, this message will be redelivered. After the second persistence\
    \ call, `postprocess()` won’t throw a second error as per our example and will\
    \ let the message be explicitly acknowledged.\n\nObviously, this is behavior we\
    \ don’t want to have in our application, unless our persistent store is idempotent.\
    \ Idempotency was described in [Chapter 4](#9781484207949_Ch04.xhtml). In this\
    \ case, if the database would insert the message when it doesn’t exist and update\
    \ it when it already exists, we could perform any of the `simpleService.processText()`\
    \ duplicate calls without affecting the consistency of state in the database.\n\
    \nBut storage in our example is not idempotent; therefore, a duplicate `simpleService.processText()`\
    \ call is a problem.\n\nDUPS_OK_ACKNOWLEDGE Mode\n\nThis acknowledge mode lazily\
    \ acknowledges messages automatically. This means that JMS is in charge of doing\
    \ so. The downside of this approach is that the client can get duplicate messages\
    \ while using this mode, because messages are acknowledged in bulk by the JMS\
    \ server. So when acknowledgement is not in the client’s hands, there’s no guarantee\
    \ that the message will be delivered exactly once. Therefore, this mode is most\
    \ suitable when the client is idempotent (can handle duplicate messages).\n\n\
    If a message is redelivered a second time, it will have the `JMSRedelivered` message\
    \ header set to `true`. So we can ask whether a message was redelivered by calling\
    \ `Message.getJMSRedelivered()` and acting according to our requirements.\n\n\
    As the acknowledgement with `DUPS_OK_ACKNOWLEDGE` mode is specific to the JMS\
    \ provider implementation, it is hard to reproduce a duplicate scenario for our\
    \ example. Therefore, we cover only a success scenario, in which we show only\
    \ the JMS configuration class in [Listing 6-22](#9781484207949_Ch06.xhtml#FPar24).\
    \ Other classes are exactly the same as for the success scenarios, without error\
    \ simulation.\n\n[***Listing 6-22***](#9781484207949_Ch06.xhtml#_FPar24). Listener\
    \ Class for Success Scenario in `DUPS_OK_ACKNOWLEDGE` Mode (0609-dups-ok-acknowledge)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.ConnectionFactory;\n\
    import javax.jms.Session;\n\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
    \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public DefaultJmsListenerContainerFactory\
    \ jmsListenerContainerFactory(\n      ConnectionFactory connectionFactory) {\n\
        DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
        factory.setConnectionFactory(connectionFactory);\n    factory.setSessionAcknowledgeMode(Session.DUPS_OK_ACKNOWLEDGE);\n\
        return factory;\n  }\n}\n```\n\nIn this case, `jmsListenerContainerFactory`\
    \ uses `DUPS_OK_ACKNOWLEDGE` mode. The sequence diagram of this example is shown\
    \ in [Figure 6-6](#9781484207949_Ch06.xhtml#Fig6).\n\n![9781484207949_Fig06-06.jpg](images/9781484207949_Fig06-06.jpg)\n\
    \n[Figure 6-6](#9781484207949_Ch06.xhtml#_Fig6). Sequence diagram of success scenario\
    \ with DULS_OK_ACKNOWLEDGE mode (file sequence.uml in folder uml-diagrams of example\
    \ project 0609-dups-ok-acknowledge)\n\nAfter receiving and persisting the message,\
    \ the JMS provider acknowledges it at a point convenient to the JMS provider.\
    \ This option is useful for enabling various JMS destination handling optimizations\
    \ that the JMS provider might want to put in place in order to make JMS communication\
    \ more efficient.\n\nLocal JMS Transactions with Spring\n\nAcknowledge modes are\
    \ not the only way to make sure that our messages are delivered reliably. The\
    \ JMS standard allows us to use transacted features, similar to ACID transactions\
    \ common for relational databases.\n\nWe already covered how to use local JMS\
    \ transactions with pure Java JMS APIs. Now we are going to explore how to use\
    \ them with Spring. This support can be turned on `JmsTemplate` by setting `setSessionTransacted()`\
    \ to `true` and `setSessionAcknowledgeMode()` to `Session.SESSION_TRANSACTED`.\n\
    \nFor this support, Spring expects the presence of a transaction manager bean.\
    \ Therefore, it doesn’t make sense to use `JmsTemplate` (for message sending and\
    \ synchronous message reception) with transacted behavior without the transaction\
    \ manager. Use of the transaction manager will be shown later in this book.\n\n\
    But we can use local JMS transactions without any transaction manager while listening\
    \ to messages. In this case, we can configure `setSessionTransacted()` to `true`\
    \ and `setSessionAcknowledgeMode()` to `Session.SESSION_TRANSACTED` for any of\
    \ these JMS listener supporting beans:\n\n*   Container listener implementations\n\
    \    *   `SimpleMessageListenerContainer`—Creates a listener container, with pure\
    \ asynchronous JMS reception, where the listener is registered to the JMS destination\
    \ and the JMS server initiates the reception of the message. It is handy if we\
    \ plan to use a listener with CLIENT_ACKNOWLEDGE or AUTO_ACKNOWLEDGE mode.\n \
    \   *   `DefaultMessageListenerContainer`—Creates a listener container, where\
    \ Spring makes synchronous calls with a time-out in a loop under the hood, so\
    \ that the message is read as soon as it appears at the JMS destination. This\
    \ mechanism is handy when we are using JMS transaction support and is the only\
    \ support that can work with distributed transactions (covered in the next chapter).\n\
    *   Container listener factory implementations, introduced in Spring 4.1 and enables\
    \ annotating JMS listener methods with `@JmsListener`\n    *   `SimpleJmsListenerContainerFactory`—Factory\
    \ for `SimpleMessageListenerContainer`\n    *   `DefaultJmsListenerContainerFactory`—Factory\
    \ for `DefaultMessageListenerContainer`\n\nSuccess Scenario"
  trans: "\nprivate void postprocess(String message) {\n    //模拟错误\n    if (!errorSimulated)\
    \ {\n      errorSimulated = true;\n      throw new IllegalArgumentException(message);\n\
        }\n  }\n}\n```\n\n这个监听器类看起来很眼熟，因为它与上一章中使用的监听器类似。\n\n该类中一个不寻常的属性是 `errorSimulated`。这个变量用于突出显示错误行为，在现实世界中，这种错误可能由各种原因引起。在本例中，我们将其存储在这个单例\
    \ bean 中（这应该能让每个负责任的开发者警醒）。当然，在生产环境中不应将状态存储在单例 bean 中，因为它代表一种非线程安全的全局状态。\n\n但出于我们的目的，这是必要的，因为我们希望让消息接收失败，以突出显示\
    \ JMS 和数据库集成时会发生什么。`errorSimulated` 在私有方法 `postprocess()` 中被使用，用于模拟第一条接收消息的错误。该方法首次被调用时，还会进一步禁用错误模拟。这对于突出显示以下场景非常有用：处理第一条消息可能失败，而第二次尝试可能成功。\n\
    \n*本章将在各种失败示例中使用此模式进行错误模拟。*\n\n在此消息接收逻辑中，我们在私有方法 `postprocess()` 中模拟了一个错误，该方法在持久化消息之后、显式调用\
    \ `message.acknowledge()` 之前被调用。执行此示例后，将发生如图 6-5 所示的序列。\n\n![9781484207949_Fig06-05.jpg](img/9781484207949_Fig06-05.jpg)\n\
    \n图 6-5. CLIENT_ACKNOWLEDGE 模式下重复消息场景的序列图（文件位于示例项目 0608-client-acknowledge-listener-duplicate\
    \ 的 uml-diagrams 文件夹中的 sequence.uml）\n\n消息被接收并持久化，但未被确认，因为 `postprocess()` 方法抛出了错误。因此，JMS\
    \ 目的地确保根据 JMS 契约，此消息将被重新投递。在第二次持久化调用之后，根据我们的示例，`postprocess()` 不会再次抛出错误，并允许消息被显式确认。\n\
    \n显然，这是我们不希望应用程序中出现的行为，除非我们的持久化存储是幂等的。幂等性已在第 4 章中描述。在这种情况下，如果数据库在消息不存在时插入它，在消息已存在时更新它，那么我们可以执行任意多次\
    \ `simpleService.processText()` 调用，而不会影响数据库中状态的一致性。\n\n但我们的示例中的存储不是幂等的；因此，重复调用\
    \ `simpleService.processText()` 会带来问题。\n\nDUPS_OK_ACKNOWLEDGE 模式\n\n此确认模式会惰性地自动确认消息。这意味着由\
    \ JMS 负责执行此操作。这种方法的缺点是，客户端在使用此模式时可能会收到重复消息，因为消息是由 JMS 服务器批量确认的。因此，当确认权不在客户端手中时，无法保证消息恰好被投递一次。因此，此模式最适合客户端是幂等（能够处理重复消息）的情况。\n\
    \n如果消息被第二次重新投递，其 `JMSRedelivered` 消息头将被设置为 `true`。因此，我们可以通过调用 `Message.getJMSRedelivered()`\
    \ 来询问消息是否被重新投递，并根据我们的需求采取行动。\n\n由于使用 `DUPS_OK_ACKNOWLEDGE` 模式的确认方式特定于 JMS 提供者的实现，因此很难为我们的示例重现重复场景。因此，我们只介绍一个成功场景，其中我们仅在清单\
    \ 6-22 中展示 JMS 配置类。其他类与成功场景中的类完全相同，没有错误模拟。\n\n***清单 6-22***. `DUPS_OK_ACKNOWLEDGE`\
    \ 模式下成功场景的监听器类 (0609-dups-ok-acknowledge)\n\n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\
    \nimport javax.jms.ConnectionFactory;\nimport javax.jms.Session;\n\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
    \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public DefaultJmsListenerContainerFactory\
    \ jmsListenerContainerFactory(\n      ConnectionFactory connectionFactory) {\n\
        DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
        factory.setConnectionFactory(connectionFactory);\n    factory.setSessionAcknowledgeMode(Session.DUPS_OK_ACKNOWLEDGE);\n\
        return factory;\n  }\n}\n```\n\n在这种情况下，`jmsListenerContainerFactory` 使用了 `DUPS_OK_ACKNOWLEDGE`\
    \ 模式。此示例的序列图如图 6-6 所示。\n\n![9781484207949_Fig06-06.jpg](img/9781484207949_Fig06-06.jpg)\n\
    \n图 6-6. 使用 DULS_OK_ACKNOWLEDGE 模式的成功场景序列图（文件位于示例项目 0609-dups-ok-acknowledge 的\
    \ uml-diagrams 文件夹中的 sequence.uml）\n\n在接收并持久化消息后，JMS 提供者会在其方便的时间点确认该消息。此选项有助于启用\
    \ JMS 提供者可能希望实施的各种 JMS 目的地处理优化，以使 JMS 通信更高效。\n\n使用 Spring 的本地 JMS 事务\n\n确认模式并非确保消息可靠投递的唯一方式。JMS\
    \ 标准允许我们使用事务特性，类似于关系数据库中常见的 ACID 事务。\n\n我们已经介绍了如何使用纯 Java JMS API 进行本地 JMS 事务。现在我们将探讨如何将它们与\
    \ Spring 一起使用。可以通过将 `JmsTemplate` 的 `setSessionTransacted()` 设置为 `true`，并将 `setSessionAcknowledgeMode()`\
    \ 设置为 `Session.SESSION_TRANSACTED` 来启用此支持。\n\n对于此支持，Spring 期望存在一个事务管理器 bean。因此，在没有事务管理器的情况下，将\
    \ `JmsTemplate`（用于消息发送和同步消息接收）与事务行为一起使用是没有意义的。本书稍后将展示事务管理器的使用。\n\n但是，我们可以在监听消息时使用没有任何事务管理器的本地\
    \ JMS 事务。在这种情况下，我们可以为以下任何 JMS 监听器支持 bean 配置 `setSessionTransacted()` 为 `true`\
    \ 和 `setSessionAcknowledgeMode()` 为 `Session.SESSION_TRANSACTED`：\n\n*   容器监听器实现\n\
    \    *   `SimpleMessageListenerContainer`——创建一个监听器容器，用于纯异步 JMS 接收，其中监听器注册到 JMS\
    \ 目的地，JMS 服务器启动消息接收。如果我们计划使用带有 CLIENT_ACKNOWLEDGE 或 AUTO_ACKNOWLEDGE 模式的监听器，这很方便。\n\
    \    *   `DefaultMessageListenerContainer`——创建一个监听器容器，其中 Spring 在底层循环中通过超时机制进行同步调用，以便消息一出现在\
    \ JMS 目的地就被读取。此机制在我们使用 JMS 事务支持时很方便，并且是唯一可以与分布式事务（将在下一章介绍）配合使用的支持。\n*   容器监听器工厂实现，在\
    \ Spring 4.1 中引入，允许使用 `@JmsListener` 注解 JMS 监听器方法\n    *   `SimpleJmsListenerContainerFactory`——`SimpleMessageListenerContainer`\
    \ 的工厂\n    *   `DefaultJmsListenerContainerFactory`——`DefaultMessageListenerContainer`\
    \ 的工厂\n\n成功场景\n"
- fmt: "为了展示如何在Spring中使用本地JMS事务，我们可以复用本章Spring JMS示例中的`main`和`sender`类。我们也可以使用与本章成功场景相同的监听器实现（例如，在[Listing\
    \ 6-14](#9781484207949_Ch06.xhtml#FPar15)中）。唯一的区别是JMS配置，如[Listing 6-23](#9781484207949_Ch06.xhtml#FPar25)所示。\n\
    \n[***Listing 6-23***](#9781484207949_Ch06.xhtml#_FPar25). 带本地事务的成功场景的JMS配置（`0610-transacted-listener-success`）\n\
    \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.ConnectionFactory;\n\
    import javax.jms.Session;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
    \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public DefaultJmsListenerContainerFactory\
    \ jmsListenerContainerFactory(\n      ConnectionFactory connectionFactory) {\n\
    \    DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
    \    factory.setConnectionFactory(connectionFactory);\n    factory.setSessionTransacted(true);\n\
    \    factory.setSessionAcknowledgeMode(Session.SESSION_TRANSACTED);\n    return\
    \ factory;\n  }\n}\n```\n\n这将注册名为`jmsListenerContainerFactory`的`DefaultJmsListenerContainerFactory`Bean，并将`sessionTransacted`属性设置为`true`，将`sessionAcknowledgeMode`设置为`Session.SESSION_TRANSACTED`，以启用本地JMS事务支持。类似的支持也可以通过XML配置实现，如[Listing\
    \ 6-24](#9781484207949_Ch06.xhtml#FPar26)所示。\n\n[***Listing 6-24***](#9781484207949_Ch06.xhtml#_FPar26).\
    \ 带本地事务的成功场景的XML JMS配置（示例项目`0612-transacted-xml`中`src/main/resources`文件夹下的文件`spring-jms-config.xml`）\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:jms=\"http://www.springframework.org/schema/jms\"\
    \n  xsi:schemaLocation=\"http://www.springframework.org/schema/jms\n    http://www.springframework.org/schema/jms/spring-jms.xsd\n\
    \    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
    >\n\n<jms:listener-container acknowledge=\"transacted\"\n       connection-factory=\"\
    jmsConnectionFactory\">\n    <jms:listener destination=\"messageQueue\" ref=\"\
    simpleMessageListener\"\n      method=\"readMessage\" />\n  </jms:listener-container>\n\
    </beans>\n```\n\n在这种情况下，我们使用Spring的XML命名空间`jms`来指定监听器容器。通过将`acknowledge`属性设置为`transacted`值来启用本地JMS事务。此配置的其余部分应该与上一章类似。`connection-factory`引用是必需的。监听器指向名为`messageQueue`的JMS目标，以及监听器方法`simpleMessageListener.readMessage()`。此示例的行为如[Figure\
    \ 6-7](#9781484207949_Ch06.xhtml#Fig7)所示。\n\n![9781484207949_Fig06-07.jpg](images/9781484207949_Fig06-07.jpg)\n\
    \n[Figure 6-7](#9781484207949_Ch06.xhtml#_Fig7). 使用`SESSION_TRANSACTED`模式的成功场景的序列图（示例项目`0610-transacted-listener-success`的`uml-diagrams`文件夹中的文件`sequence.uml`）\n\
    \n这很简单。Spring会在监听器执行完毕后自动为我们提交消息。因此，我们无法通过本地JMS事务+Spring组合在单个事务中接收多条消息。\n\n##\
    \ 重复消息场景\n\n与确认模式一样，本地JMS事务的接收也可能出错。想象一下，将本章Spring JMS示例中的`main`和`sender`类与上一个示例（[Listing\
    \ 6-24](#9781484207949_Ch06.xhtml#FPar26)）中的JMS配置以及[Listing 6-25](#9781484207949_Ch06.xhtml#FPar27)中的监听器结合起来。\n\
    \n[***Listing 6-25***](#9781484207949_Ch06.xhtml#_FPar27). 使用`SESSION_TRANSACTED`模式的重复消息场景的监听器类（`0611-transacted-listener-duplicate`）\n\
    \n```\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.JMSException;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.annotation.JmsListener;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class SimpleMessageListener\
    \ {\n  private SimpleService simpleService;\n  private boolean errorSimulated\
    \ = false;\n\n@Autowired\n  public SimpleMessageListener(SimpleService simpleService)\
    \ {\n    super();\n    this.simpleService = simpleService;\n  }\n\n@JmsListener(destination\
    \ = \"messageQueue\")\n  public void readMessage(String message) throws JMSException\
    \ {\n    simpleService.processText(message);\n    postprocess(message);\n  }\n\
    \nprivate void postprocess(String message) {\n    // simulate error\n    if (!errorSimulated)\
    \ {\n      errorSimulated = true;\n      throw new IllegalArgumentException(message);\n\
    \    }\n  }\n}\n```\n\n实际上，我们在[Listing 6-21](#9781484207949_Ch06.xhtml#FPar23)中已经见过这样的监听器，即`AUTO_ACKNOWLEDGE`模式下的重复场景监听器。其行为如[Figure\
    \ 6-8](#9781484207949_Ch06.xhtml#Fig8)所示。\n\n![9781484207949_Fig06-08.jpg](images/9781484207949_Fig06-08.jpg)\n\
    \n[Figure 6-8](#9781484207949_Ch06.xhtml#_Fig8). 使用`SESSION_TRANSACTED`模式的重复消息场景的序列图（示例项目`0611-transacted-listener-duplicate`的`uml-diagrams`文件夹中的文件`sequence.uml`）\n\
    \n问题在于，消息被存储到数据库中，之后`postprocess`在提交第一条消息之前抛出了异常。在重新投递时，同一条消息会第二次被存储到数据库中。\n\n\
    ## `JmsTransactionManager`\n\nSpring还提供了通过其事务划分功能处理JMS事务的可能性，使用`@Transactional`注解。当我们注册`JmsTransactionManager`Bean作为Spring事务的管理器时，可以实现这种支持。在这种情况下，Spring会忽略JMS原生的确认模式和事务配置。此支持适用于JMS\
    \ 1.1以及JMS 2.0。\n\n`JmsTransactionManager`可用于单个`ConnectionFactory`，因为它将JMS `Connection`/`Session`/`JMSContext`绑定到线程。对于每个`ConnectionFactory`的线程绑定`Session`，此配置非常方便。\n\
    \n建议将此事务管理器与上一章中展示的`CachingConnectionFactory`结合使用。\n\n一个以JMS配置开始的`JmsTransactionManager`示例，如[Listing\
