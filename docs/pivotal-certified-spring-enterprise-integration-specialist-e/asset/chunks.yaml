  raw: "public CustomException(String message) {\n    super(message);\n  }\n}\n```\n\
    \nWe extend `CustomException` from `RuntimeException` to have the exception unchecked,\
    \ as it is good Java practice. The constructor takes the error message and calls\
    \ the parent constructor with the message parameter also. This is the simplest\
    \ example of a custom application-specific exception. Configuration of the `RestTemplate`\
    \ bean is shown in [Listing 4-39](#9781484207949_Ch04.xhtml#FPar49).\n\n[***Listing\
    \ 4-39***](#9781484207949_Ch04.xhtml#_FPar49). Custom Error Handler for RestTemplate\
    \ (0406-rest-errorhandler-client)\n\n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\
    \nimport java.io.IOException;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.http.HttpStatus;\nimport org.springframework.http.client.ClientHttpResponse;\n\
    import org.springframework.web.client.ResponseErrorHandler;\nimport org.springframework.web.client.RestTemplate;\n\
    \n@Configuration\n@ComponentScan\npublic class ClientConfiguration {\n  @Bean\n\
      public RestTemplate restTemplate() {\n    RestTemplate restTemplate = new RestTemplate();\n\
        restTemplate.setErrorHandler(new ResponseErrorHandler() {\n\n@Override\n      public\
    \ boolean hasError(ClientHttpResponse response) throws IOException {\n        HttpStatus\
    \ statusCode = response.getStatusCode();\n        return statusCode.is5xxServerError();\n\
          }\n\n@Override\n      public void handleError(ClientHttpResponse response)\
    \ throws IOException {\n        throw new CustomException(response.getStatusText());\n\
          }\n    });\n    return restTemplate;\n  }\n}\n```\n\nThis time, we don’t\
    \ just create the `RestTemplate` instance with all the default dependencies. We\
    \ use the `RestTemplate.setErrorHandler` method to implement our own custom error\
    \ handler. This implementation is wrapped into an anonymous inner class of type\
    \ `ResponseErrorHandler`.\n\nBecause the anonymous inner class is of type `ResponseErrorHandler`,\
    \ it must implement two methods. The `hasError` method should indicate whether\
    \ the `ClientHttpResponse` instance is erroneous. As this is our custom implementation,\
    \ we should decide when the response should trigger an error. In this case, we\
    \ decide to throw an exception when the HTTP response indicates server error 5*xx*.\n\
    \nThe second method of the custom error handler is `handleError`. This one is\
    \ designed to perform the desired action when an error happens. In this case,\
    \ we want to throw our `CustomException` with the error message received from\
    \ the server.\n\nClient-Side Testing\n\nThe great testability story of the Spring\
    \ Framework is also provided for the REST client-side code. The concept is to\
    \ create a fake server based on the `RestTemplate` instance used for the REST\
    \ client code. This mock server records expected requests and sends fake responses\
    \ to the client-side code under test. The fake server is represented by the class\
    \ `org.springframework.test.web.client.MockRestServiceServer`.\n\nAn instance\
    \ of the mock server is created by the `MockRestServiceServer.createServer` factory\
    \ method, which takes the `RestTemplate` bean as a parameter. It has to be the\
    \ same `RestTemplate` instance as used for performing the REST request in the\
    \ code under test.\n\n`MockRestServiceServer` has two methods, `expect` and `verify`,\
    \ which are used for testing. The `expect` method records the expected behavior\
    \ in the fake server. It is used for chaining the request expectations and recording\
    \ the expected response that will be returned to the testing client logic. `expect`\
    \ returns instances of the `ResponseActions` interface, which provide two methods:\n\
    \n*   `andExpect`\n    *   Takes `org.springframework.test.web.client.RequestMatcher`\
    \ as a parameter, which allows for recording expected content, headers, the HTTP\
    \ method, and URI.\n    *   `org.springframework.test.web.client.match.MockRestRequestMatchers`\
    \ is the abstract class containing the factory methods `requestTo`, `header`,\
    \ `content`, `jsonPath`, `xpath`, and anything that produces instances of `RequestMatcher`\
    \ and can be used for constructing comprehensive request expectations.\n*   `andRespond`\n\
    \    *   Takes `org.springframework.test.web.client.ResponseActions` as a parameter,\
    \ which allows for defining content, HTTP status, and headers for the response.\n\
    \    *   `org.springframework.test.web.client.response.MockRestResponseCreators`\
    \ is an abstract class containing the factory methods `withSuccess`, `withCreatedEntity`,\
    \ `withNoContent`, `withBadRequest`, `withUnauthorizedRequest`, `withServerError`,\
    \ and `withStatus` that produce instances of `ResponseCreators` and can be used\
    \ for recording comprehensive HTTP responses in the fake server.\n\nThe `verify`\
    \ method is used to verify the behavior recorded by the `expect` method.\n\nThe\
    \ example of this client-side testing concept is split into various listings to\
    \ enhance readability. First, [Listing 4-40](#9781484207949_Ch04.xhtml#FPar50)\
    \ shows the imports, constants, and properties of the test.\n\n[***Listing 4-40***](#9781484207949_Ch04.xhtml#_FPar50).\
    \ First Part of Client-Side Test (0404-rest-boot-client)\n\n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\
    \nimport static org.hamcrest.Matchers.is;\nimport static org.springframework.test.web.client.match.MockRestRequestMatchers.jsonPath;\n\
    import static org.springframework.test.web.client.match.MockRestRequestMatchers.method;\n\
    import static org.springframework.test.web.client.match.MockRestRequestMatchers.requestTo;\n\
    import static org.springframework.\n         test.web.client.response.MockRestResponseCreators.withBadRequest;\n\
    import static org.springframework.\n         test.web.client.response.MockRestResponseCreators.withCreatedEntity;\n\
    import static org.springframework.\n         test.web.client.response.MockRestResponseCreators.withSuccess;\n\
    import static org.testng.Assert.assertEquals;\nimport java.net.URI;\nimport java.util.List;\n\
    import net.lkrnac.book.eiws.chapter04.model.User;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.http.HttpMethod;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.springframework.test.web.client.MockRestServiceServer;\nimport org.springframework.web.client.HttpClientErrorException;\n\
    import org.springframework.web.client.RestTemplate;\nimport org.testng.annotations.BeforeMethod;\n\
    import org.testng.annotations.Test;\n\n@ContextConfiguration(classes = ClientConfiguration.class)\n\
    public class RestClientBootApplicationTest extends\n    AbstractTestNGSpringContextTests\
    \ {\n  private static final String USER0_NAME = \"User0\";\n  private static final\
    \ String USER0_EMAIL = \"user0@gmail.com\";\n  private static final String TEST_RECORD0\
    \ = \"{\\\"email\\\": \\\"\" + USER0_EMAIL\n      + \"\\\", \\\"name\\\": \\\"\
    \" + USER0_NAME + \"\\\"}\";\n  private static final String TEST_RECORD1 = \"\
    {\\\"email\\\": \"\n      + \"\\\"user1@gmail.com\\\", \\\"name\\\": \\\"User1\\\
    \"}\";\n  private static final String USERS_URL = \"http://localhost:10404/users\"\
    ;\n\nprivate MockRestServiceServer mockServer;\n\n@Autowired\n  private RestTemplate\
    \ restTemplate;\n\n@Autowired\n  private UsersClient usersClient;\n\n@BeforeMethod\n\
      public void init() {\n    mockServer = MockRestServiceServer.createServer(restTemplate);\n\
      }\n```\n\nThe `ContextConfiguration` annotation specifies which Spring configuration\
    \ will be used for testing. In this case, we test the client side from [Listing\
    \ 4-37](#9781484207949_Ch04.xhtml#FPar47). The test class is extended from `AbstractTestNGSpringContextTests`,\
    \ which is the Spring helper for TestNG integration testing."
