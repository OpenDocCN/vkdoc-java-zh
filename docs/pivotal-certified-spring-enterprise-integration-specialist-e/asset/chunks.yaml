    \ But the writer behavior may be a surprise, because we simulated two errors in\
    \ the writer. But when the write or whole chunk fails in chunk-oriented processing,\
    \ SB tries to subsequently process each record one by one. This is because SB\
    \ tries to write as many items as possible. This way, we are sure that one corrupted\
    \ record won’t cause write failure for other valid records belonging to the same\
    \ chunk.\n\nIn this case, the first failure in the writer failed the whole chunk,\
    \ so SB tried to write each record one by one afterward. The second error simulation\
    \ failed `record 1 processed`. The rest of the records from the chunk, as well\
    \ as all other chunks, were processed normally.\n\n## Java Configuration of Skip\
    \ and SkipListener\n\nThis example uses the same classes as the previous one.\
    \ The only difference is use of a Java configuration instead of XML. [Listing\
    \ 9-106](#9781484207949_Ch09_2_Ext.xhtml#FPar110) shows this configuration.\n\n\
    [***Listing 9-106***](#9781484207949_Ch09_2_Ext.xhtml#_FPar110). Java Configuration\
    \ of Skip (0930-skip-javaconfig)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
    \nimport net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\nimport\
    \ net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\nimport net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;\n\
    \nimport org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n\
    \  @Bean\n  public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n\
    \      SimpleRecordReader simpleRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n\
    \      SimpleRecordWriter simpleRecordWriter,\n      SimpleSkipListener simpleSkipListener)\
    \ {\n    return stepBuilderFactory.get(\"simpleRecordsStep\")\n        .<String,\
    \ String> chunk(4)\n        .reader(simpleRecordReader)\n        .processor(simpleRecordProcessor)\n\
    \        .writer(simpleRecordWriter)\n        .faultTolerant()\n        .skip(IllegalStateException.class)\n\
    \        .skipLimit(3)\n        .listener(simpleSkipListener)\n        .build();\n\
    \  }\n\n@Bean\n  public Job simpleRecordsJob(JobBuilderFactory jobBuilderFactory,\
    \ Step simpleRecordsStep) {\n    return jobBuilderFactory.get(\"simpleRecordsJob\"\
    ).start(simpleRecordsStep).build();\n  }\n}\n```\n\nWhen we define the step, we\
    \ again use the common reader and the error-simulating processor and writer. To\
    \ configure the skip, we need to include the `faultTolerant()` call into the `Step`\
    \ creation chain, so that we can configure `skipLimit()` and an exception to `skip()`.\
    \ `SkipListener` is configured last, in the `faultTolerant()` section.\n\nWhen\
    \ we run this example, the behavior is exactly the same as for the previous example\
    \ in [Listing 9-105](#9781484207949_Ch09_2_Ext.xhtml#FPar109).\n\n## XML Configuration\
    \ of Retry\n\nThis example uses common tasklets for the read and process items.\
    \ The writer tasklet is reused from the previous example ([Listing 9-102](#9781484207949_Ch09_2_Ext.xhtml#FPar106)),\
    \ simulating two errors for the first two write attempts. [Listing 9-107](#9781484207949_Ch09_2_Ext.xhtml#FPar111)\
    \ shows the retry listener.\n\n[***Listing 9-107***](#9781484207949_Ch09_2_Ext.xhtml#_FPar111).\
    \ Retry Listener Implementation (0931-retry-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.retry.RetryCallback;\nimport org.springframework.retry.RetryContext;\n\
    import org.springframework.retry.listener.RetryListenerSupport;\nimport org.springframework.stereotype.Component;\n\
    \n@Component\npublic class SimpleRetryListener extends RetryListenerSupport {\n\
    \  private SimpleExecutablePoint executablePoint;\n\n@Autowired\n  public SimpleRetryListener(SimpleExecutablePoint\
    \ executablePoint) {\n    super();\n    this.executablePoint = executablePoint;\n\
    \  }\n\n@Override\n  public <T, E extends Throwable> void onError(RetryContext\
    \ context,\n      RetryCallback<T, E> callback, Throwable throwable) {\n    executablePoint.execute(\"\
    Error occurred, retrying write of items\");\n  }\n}\n```"
