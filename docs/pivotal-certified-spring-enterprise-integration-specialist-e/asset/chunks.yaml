    出现了一些问题，下面我们来解释一下。当我们向异步发送器发送四条消息时，主线程不会被阻塞。四个新线程被启动（名称分别为 `customExecutor-1`
    到 `customExecutor-4`），异步执行 `AsyncMessageSender.sendMessage()` 中的逻辑。


    因此，我们在四个独立的并发线程中向聚合器组件发送了四条消息。这些消息应该被聚合成两条消息，正如第一条和第三条日志条目中所预期的那样。请注意这些日志条目的线程名称。日志条目
    `Text persisted: message1,message1` 由 `AsyncTaskExecutor-3` 记录，而 `Text persisted:
    message2,message2` 由 `AsyncTaskExecutor-4` 记录。所以，正如你所见，聚合器在内部使用了一个单独的线程池来聚合消息。


    现在让我们关注来自聚合器的响应。网关组件创建了四个临时回复通道，并期望收到四个回复。其中两个临时回复通道（在线程 `customExecutor-2` 和
    `customExecutor-4` 中）收到了成功响应——每个聚合后的消息对应一个。但剩下的两个临时回复通道（在线程 `customExecutor-1`
    和 `customExecutor-3` 中）在 `AsyncMessageSender.sendMessage()` 逻辑中发生了超时。因此，如果我们没有为
    `resultFuture.get()` 设置超时，线程将会永远挂起，等待一个显然不会返回的聚合器响应。


    这突显了使用聚合器配置双向流程可能有多么棘手。因此，它更适合用于单向流程，或者与拆分器结合使用。


    图 8-13 展示了此示例的 SI 图。


    ![9781484207949_Fig08-13.jpg](img/9781484207949_Fig08-13.jpg)


    图 8-13. XML 聚合器示例的 SI 配置可视化


    ### 使用 Java 配置的自定义聚合器示例


    此示例借用了上一个示例 `0827-aggregator-xml` 中的一些类**：**


    *   `SiWrapperServiceFuture` (清单 8-97)

    *   `AsyncMessageSender` (清单 8-99)

    *   `SiApplication` (清单 8-100)


    清单 8-102 展示了聚合器组件的 Java 配置。


    ***清单 8-102***. 聚合器的 Java 配置 (0828-aggregator-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import java.util.List;

    import org.springframework.integration.annotation.Aggregator;

    import org.springframework.integration.annotation.CorrelationStrategy;

    import org.springframework.integration.annotation.MessageEndpoint;

    import org.springframework.integration.annotation.ReleaseStrategy;


    @MessageEndpoint

    public class SimpleAggregator {

      @Aggregator(inputChannel = "inChannel", outputChannel = "aggregatedChannel")

      public String aggregate(List<String> messages) {

        return messages.stream().reduce((m1, m2) -> m1 + "," + m2).get();

      }


    @ReleaseStrategy

      public boolean releaseChecker(List<String> messages) {

        return messages.size() == 2;

      }


    @CorrelationStrategy

      public String correlateBy(String message) {

        return message.substring(7);

      }

    }

    ```


    该类使用 `@MessageEndpoint` 注解，以将其标记为用于集成组件扫描的 SI 组件。第一个方法 `aggregate()` 用于连接消息。我们为此使用了
    Java 8 Stream API。它将消息集合转换为 Java 8 流，并使用 `reduce()` 功能将流中的两个元素连接成一个。最后，它通过 `get()`
    方法再次将流转换为集合。`@Aggregator` 注解要求定义 `inputChannel` 和 `outputChannel` 属性。


    第二个方法 `releaseChecker()` 为聚合器定义了一个自定义释放策略。当组内消息数达到两条时，我们返回 `true` 以通知 SI 释放条件已满足。最后一个方法
    `correlateBy()` 为此聚合器定义了关联策略。如果返回值相同，则这些消息属于同一组，应聚合为一个组。


    SI 流程的其余部分通过 清单 8-103 中的 XML 配置定义——部分是为了突出如何为 SI 应用程序组合 XML 和 Java 配置，部分是为了减少此示例所需的清单数量。


    ***清单 8-103***. Java 聚合器示例的 SI 配置 (文件 si-config.xml 位于示例项目 0828-aggregator-javaconfig
    的 src/main/resources 文件夹中)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:task="http://www.springframework.org/schema/task"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:annotation-config/>


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceFuture"
    />


    <int:channel id="inChannel" />

      <int:channel id="aggregatedChannel" />


    <int:service-activator input-channel="aggregatedChannel" ref="writeService"

        method="writeAndIndicateSuccess" />

    </beans>

    ```


    元素 `<int:annotation-config>` 是 `@IntegrationComponentScan` 注解的 XML 等价物，因此它会扫描
    `@MessageEndpoint` 组件。将此配置放在主 Spring 配置类上会更好，但我们想突出 SI 框架的这个 XML 配置特性。入站网关、服务激活器和两个通道都是我们在之前的示例中已经见过的结构。


    当我们通过主类 `SiApplication` 运行此示例时，会得到与 清单 8-101 中 `0827-aggregator-xml` 示例类似的输出。


