    \ 5-1](#9781484207949_Ch05.xhtml#FPar2). The only difference is that we create\
    \ a `JMSContext` instance instead of a `Connection` instance. `JMSContext` is\
    \ a new abstraction introduced in JMS 2.0. [Listing 5-7](#9781484207949_Ch05.xhtml#FPar8)\
    \ shows an example JMS 2.0 sender implementation.\n\n[***Listing 5-7***](#9781484207949_Ch05.xhtml#_FPar8).\
