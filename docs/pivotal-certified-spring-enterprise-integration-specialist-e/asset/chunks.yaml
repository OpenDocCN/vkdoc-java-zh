    \n[***清单5-20***](#9781484207949_Ch05.xhtml#_FPar23). CachingConnectionFactory\
    \ 使用 (0511-jms-caching-connection-factory)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
    \nimport javax.jms.ConnectionFactory;\nimport org.apache.activemq.ActiveMQConnectionFactory;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.connection.CachingConnectionFactory;\n\
    \n@Configuration\n@EnableJms\npublic class JmsConfiguration {\n  @Bean\n  public\
    \ ConnectionFactory connectionFactory() {\n    ActiveMQConnectionFactory activeMqConnectionFactory\
    \ =\n        new ActiveMQConnectionFactory();\n    activeMqConnectionFactory.setBrokerURL(\"\
    vm://localhost\");\n\nCachingConnectionFactory connectionFactory =\n        new\
    \ CachingConnectionFactory(activeMqConnectionFactory);\n    connectionFactory.setSessionCacheSize(10);\n\
    \    return connectionFactory;\n  }\n}\n```"
  raw: 'Next we create the `jmsTemplate` instance, which will use the `connectionFactory`
    bean as the constructor parameter. This demonstrates how we can use beans that
    were created by the JNDI lookup. The use of and features behind the `JmsTemplate`
    itself are explained later.


    The last bean registered in this configuration file is `destinationResolver`.
    As we are doing a JNDI lookup for JMS resources, we want to use `JndiDestinationResolver`
    instead of `DynamicDestinationResolver`. This allows us to use the string name
    `queue/ExpiryQueue` of the JMS destination when we’ll be sending or receiving
    JMS messages.


    Spring JMS Java Configuration Example


    [Listing 5-18](#9781484207949_Ch05.xhtml#FPar20) shows a possible Java configuration
    of a Spring JMS application in which JMS resources are created explicitly.


    [***Listing 5-18***](#9781484207949_Ch05.xhtml#_FPar20). Java Configuration with
    Explicit Creation of JMS Resources (0506-async-jms-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import java.util.Hashtable;

    import javax.jms.ConnectionFactory;

    import javax.jms.Queue;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.jms.core.JmsTemplate;


    @Configuration

    @EnableJms

    public class JmsConfiguration {

      @Bean

      public InitialContext initialContext() throws NamingException {

        Hashtable<Object, Object> env = new Hashtable<Object, Object>();

        env.put("java.naming.factory.initial",

            "org.jnp.interfaces.NamingContextFactory");

        env.put("java.naming.factory.url.pkgs",

            "org.jboss.naming:org.jnp.interfaces");

        env.put("java.naming.provider.url", "jnp://localhost:1099");

        return new InitialContext(env);

      }


    @Bean

      public ConnectionFactory connectionFactory(InitialContext initialContext)

          throws NamingException {

        return (ConnectionFactory) initialContext.lookup("/ConnectionFactory");

      }


    @Bean

      public Queue queue(InitialContext initialContext) throws NamingException {

        return (Queue) initialContext.lookup("/queue/ExpiryQueue");

      }


    @Bean

      public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {

        return new JmsTemplate(connectionFactory);

      }

    }

    ```


    The `JmsConfiguration` class is annotated with `@Configuration` to define it as
    Spring’s configuration class. The `@EnableJms` annotation is used for enabling
    JMS annotations and some supporting beans for asynchronous JMS message reception.


    The first bean registered in this configuration class is the JNDI `InitialContext`
    instance with HornetQ access configuration. It will be used during creation of
    the JMS resources `ConnectionFactory` and `Queue`. These are also created in methods
    annotated with `@Bean` so that they will be registered in the context. We create
    them via a JNDI lookup against the `initialContext` instance, and therefore we
    need to explicitly cast them into relevant types. These three methods are the
    only use of the HornetQ-specific API within the `0506-async-jms-java-config` example
    project.


    Finally, we create and register an instance of `JmsTemplate` based on the injected
    `connectionFactory` created in this class also. `JmsTemplate` can be used for
    sending and synchronous reception of JMS messages.


    [Listing 5-19](#9781484207949_Ch05.xhtml#FPar21) shows a Spring Boot configuration
    example.


    [***Listing 5-19***](#9781484207949_Ch05.xhtml#_FPar21). Example of Configuring
    JMS with Spring Boot (0507-sync-jms-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;


    @EnableScheduling

    @SpringBootApplication

    public class JavaConfigJmsSyncApplication {

      public static void main(String[] args) throws InterruptedException {

        SpringApplication.run(JavaConfigJmsSyncApplication.class, args);

      }

    }

    ```


    You may notice that this example has no sign of the `org.springframework.jms`
    package. Spring Boot is smart enough to recognize that we have Spring JMS dependencies
    on the classpath and therefore creates all the JMS resources automatically. It
    uses opinionated default configurations for the creation. If it finds HornetQ
    client dependencies on the classpath, it creates a `ConnectionFactory` out of
    the box. If we use destinations via `String` names and not as instances of the
    `Destination` interface, `DynamicDestinationResolver` will create them for us.
    This Spring Boot approach significantly reduces the amount of configuration needed
    to create modern enterprise-ready services.


    The `@EnableScheduling` annotation is used because the example uses Spring Scheduling
    support for sending messages. This is shown in later examples.


    Caching JMS Resources


    As we mentioned, normal JMS flow is to create JMS resources in this order: `ConnectionFactory
    Connection Session MessageProducer/MessageConsumer/Message`. JMS 2.0 provided
    a little bit more convenience with use of `JMSContext`, `JMSConsumer`, and `JMSProducer`.
    But these are using older JMS 1.1 abstractions under the hood. Also Spring has
    its own JMS APIs, so these JMS 2.0 convenience abstractions are not used in Spring
    code at all. Therefore, when we are thinking about caching JMS resources, it is
    all about JMS 1.1 abstractions.


    If instances from this chain are reused across our application, everything should
    be fine. But if we were creating all these objects every time we wanted to send
    or receive a message, performance of our application would suffer. `Connection`
    and `Session` are especially time-intensive to create.


    Therefore, Spring provides two implementations of `ConnectionFactory` that can
    help cache these resources:


    *   `SingleConnectionFactory`: For every call, `ConnectionFactory.createConnection()`
    returns the same instance of `Connection` and ignores `ConnectionFactory.close()`
    calls.

    *   `CachingConnectionFactory`: Builds on top of `SingleConnectionFactory` functionality
    and adds caching of `Session`, `MessageProducer`, and `MessageConsumer` instances.
    The `sessionCacheSize` property is used to change cache size, which is by default
    1\. `MessageConsumer` and `MessageProducer` instances are cached within the `Session`
    instance.


    Both implementations are used as wrappers for a JMS provider-specific connection
    factory. An example of such a configuration is shown in [Listing 5-20](#9781484207949_Ch05.xhtml#FPar23).


    ![Image](images/sq.jpg) **Note**  As Spring Boot currently doesn’t provide an
    easy way to combine `CachingConnectionFactory` with HornetQ (see Spring Boot issue
    `https://github.com/spring-projects/spring-boot/issues/2956`), this example uses
    an ActiveMQ embedded broker.


    [***Listing 5-20***](#9781484207949_Ch05.xhtml#_FPar23). CachingConnectionFactory
    Usage (0511-jms-caching-connection-factory)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import javax.jms.ConnectionFactory;

    import org.apache.activemq.ActiveMQConnectionFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.jms.connection.CachingConnectionFactory;


    @Configuration

    @EnableJms

    public class JmsConfiguration {

      @Bean

      public ConnectionFactory connectionFactory() {

        ActiveMQConnectionFactory activeMqConnectionFactory =

            new ActiveMQConnectionFactory();

        activeMqConnectionFactory.setBrokerURL("vm://localhost");


    CachingConnectionFactory connectionFactory =

            new CachingConnectionFactory(activeMqConnectionFactory);

        connectionFactory.setSessionCacheSize(10);

        return connectionFactory;

      }

    }

    ```'
  trans: '

    接下来，我们创建 `jmsTemplate` 实例，它将使用 `connectionFactory` bean 作为构造函数参数。这展示了我们如何使用通过
    JNDI 查找创建的 bean。`JmsTemplate` 本身的使用和其背后的特性将在后文解释。


    在此配置文件中注册的最后一个 bean 是 `destinationResolver`。由于我们正在对 JMS 资源进行 JNDI 查找，我们希望使用 `JndiDestinationResolver`
    而不是 `DynamicDestinationResolver`。这允许我们在发送或接收 JMS 消息时使用 JMS 目的地的字符串名称 `queue/ExpiryQueue`。


    Spring JMS Java 配置示例


    清单 5-18 展示了一个 Spring JMS 应用程序的 Java 配置示例，其中 JMS 资源是显式创建的。


    ***清单 5-18***. 显式创建 JMS 资源的 Java 配置 (0506-async-jms-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import java.util.Hashtable;

    import javax.jms.ConnectionFactory;

    import javax.jms.Queue;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.jms.core.JmsTemplate;


    @Configuration

    @EnableJms

    public class JmsConfiguration {

      @Bean

      public InitialContext initialContext() throws NamingException {

        Hashtable<Object, Object> env = new Hashtable<Object, Object>();

        env.put("java.naming.factory.initial",

            "org.jnp.interfaces.NamingContextFactory");

        env.put("java.naming.factory.url.pkgs",

            "org.jboss.naming:org.jnp.interfaces");

        env.put("java.naming.provider.url", "jnp://localhost:1099");

        return new InitialContext(env);

      }


    @Bean

      public ConnectionFactory connectionFactory(InitialContext initialContext)

          throws NamingException {

        return (ConnectionFactory) initialContext.lookup("/ConnectionFactory");

      }


    @Bean

      public Queue queue(InitialContext initialContext) throws NamingException {

        return (Queue) initialContext.lookup("/queue/ExpiryQueue");

      }


    @Bean

      public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {

        return new JmsTemplate(connectionFactory);

      }

    }

    ```


    `JmsConfiguration` 类使用 `@Configuration` 注解，将其定义为 Spring 的配置类。`@EnableJms` 注解用于启用
    JMS 注解和一些用于异步 JMS 消息接收的支持性 bean。


    在此配置类中注册的第一个 bean 是带有 HornetQ 访问配置的 JNDI `InitialContext` 实例。它将在创建 JMS 资源 `ConnectionFactory`
    和 `Queue` 时使用。这些资源也在使用 `@Bean` 注解的方法中创建，以便它们被注册到上下文中。我们通过对 `initialContext` 实例进行
    JNDI 查找来创建它们，因此需要将它们显式转换为相关类型。这三个方法是 `0506-async-jms-java-config` 示例项目中唯一使用 HornetQ
    特定 API 的地方。


    最后，我们基于在此类中创建的注入的 `connectionFactory`，创建并注册一个 `JmsTemplate` 实例。`JmsTemplate` 可用于发送和同步接收
    JMS 消息。


    清单 5-19 展示了一个 Spring Boot 配置示例。


    ***清单 5-19***. 使用 Spring Boot 配置 JMS 的示例 (0507-sync-jms-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;


    @EnableScheduling

    @SpringBootApplication

    public class JavaConfigJmsSyncApplication {

      public static void main(String[] args) throws InterruptedException {

        SpringApplication.run(JavaConfigJmsSyncApplication.class, args);

      }

    }

    ```


    你可能注意到，这个示例中没有出现 `org.springframework.jms` 包。Spring Boot 足够智能，能够识别到类路径上有 Spring
    JMS 依赖，因此会自动创建所有 JMS 资源。它使用固执己见的默认配置来进行创建。如果在类路径上找到 HornetQ 客户端依赖，它会开箱即用地创建一个
    `ConnectionFactory`。如果我们通过 `String` 名称而不是 `Destination` 接口的实例来使用目的地，`DynamicDestinationResolver`
    会为我们创建它们。这种 Spring Boot 方法显著减少了创建现代企业级服务所需的配置量。


    使用 `@EnableScheduling` 注解是因为该示例使用了 Spring 调度支持来发送消息。这将在后续示例中展示。


    缓存 JMS 资源


    正如我们提到的，正常的 JMS 流程是按以下顺序创建 JMS 资源：`ConnectionFactory Connection Session MessageProducer/MessageConsumer/Message`。JMS
    2.0 通过使用 `JMSContext`、`JMSConsumer` 和 `JMSProducer` 提供了一些便利性。但在底层，它们仍然使用较旧的 JMS
    1.1 抽象。此外，Spring 也有自己的 JMS API，因此在 Spring 代码中完全不使用这些 JMS 2.0 的便利性抽象。因此，当我们考虑缓存
    JMS 资源时，这完全是关于 JMS 1.1 抽象的问题。


    如果这个链中的实例在我们的应用程序中被重用，那么一切都会很好。但是，如果我们每次想要发送或接收消息时都创建所有这些对象，应用程序的性能将会受到影响。`Connection`
    和 `Session` 的创建尤其耗时。


    因此，Spring 提供了两种 `ConnectionFactory` 的实现，可以帮助缓存这些资源：


    *   `SingleConnectionFactory`：对于每次调用，`ConnectionFactory.createConnection()` 返回相同的
    `Connection` 实例，并忽略 `ConnectionFactory.close()` 调用。

    *   `CachingConnectionFactory`：在 `SingleConnectionFactory` 功能的基础上构建，并增加了对 `Session`、`MessageProducer`
    和 `MessageConsumer` 实例的缓存。`sessionCacheSize` 属性用于更改缓存大小，默认为 1。`MessageConsumer`
    和 `MessageProducer` 实例在 `Session` 实例内被缓存。


    这两种实现都用作 JMS 提供者特定连接工厂的包装器。此类配置的示例见清单 5-20。


    ![Image](img/sq.jpg) **注意**  由于 Spring Boot 目前没有提供一种简单的方法将 `CachingConnectionFactory`
    与 HornetQ 结合使用（参见 Spring Boot 问题 `https://github.com/spring-projects/spring-boot/issues/2956`），此示例使用了
    ActiveMQ 嵌入式代理。


    ***清单 5-20***. CachingConnectionFactory 的使用 (0511-jms-caching-connection-factory)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import javax.jms.ConnectionFactory;

    import org.apache.activemq.ActiveMQConnectionFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.jms.connection.CachingConnectionFactory;


    @Configuration

    @EnableJms

    public class JmsConfiguration {

      @Bean

      public ConnectionFactory connectionFactory() {

        ActiveMQConnectionFactory activeMqConnectionFactory =

            new ActiveMQConnectionFactory();

        activeMqConnectionFactory.setBrokerURL("vm://localhost");


    CachingConnectionFactory connectionFactory =

            new CachingConnectionFactory(activeMqConnectionFactory);

        connectionFactory.setSessionCacheSize(10);

        return connectionFactory;

      }

    }

    ```

