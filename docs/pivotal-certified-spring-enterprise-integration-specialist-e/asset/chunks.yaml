  raw: 'In the `JobParameters` example, we slightly change the tea preparation process.
    Let’s add sugar into our cup of tea. [Listing 9-31](#9781484207949_Ch09_1.xhtml#FPar34)
    shows `Tasklet` using `JobParameter`.


    [***Listing 9-31***](#9781484207949_Ch09_1.xhtml#_FPar34). JobParameter retrieval
    (0909-job-parameters)


    ```

    package net.lkrnac.book.eiws.chapter09.step.tea;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.StepContribution;

    import org.springframework.batch.core.scope.context.ChunkContext;

    import org.springframework.batch.core.step.tasklet.Tasklet;

    import org.springframework.batch.repeat.RepeatStatus;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class AddTeaWithParameter implements Tasklet {

      private SimpleExecutablePoint simpleExecutableStep;


    @Autowired

      public AddTeaWithParameter(SimpleExecutablePoint simpleExecutableStep) {

        super();

        this.simpleExecutableStep = simpleExecutableStep;

      }


    @Override

      public RepeatStatus execute(StepContribution contribution,

          ChunkContext chunkContext) throws Exception {

        String sugarAmount = chunkContext.getStepContext().getStepExecution()

            .getJobParameters().getString("sugarAmount");

        String stepSuffix = (sugarAmount == null) ? "" : " with " + sugarAmount;

        simpleExecutableStep.execute("Add Tea" + stepSuffix);

        return RepeatStatus.FINISHED;

      }

    }

    ```


    In this tea preparation `Tasklet`, we use the `chunkContext` instance to access
    the `JobParameters` instance and retrieve the parameter with the name `sugarAmount`.
    This specifies how much sugar the caller wants to add to a cup of tea. Again,
    we simulate the action by executing the `simpleExecutableStep` instance. After
    we are finished, we mark `Step` as `FINISHED`. [Listing 9-32](#9781484207949_Ch09_1.xhtml#FPar35)
    shows the batch configuration.


    [***Listing 9-32***](#9781484207949_Ch09_1.xhtml#_FPar35). Batch Configuration
    of JobParameters Example (0909-job-parameters)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddTeaWithParameter;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;

    import net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater)
    {

        return stepFactory.get("boilWaterStep").tasklet(boilWater).build();

      }


    @Bean

      public Step addTeaStep(StepBuilderFactory stepFactory, AddTeaWithParameter addTea)
    {

        return stepFactory.get("addTeaStep").tasklet(addTea).build();

      }


    @Bean

      public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)
    {

        return stepFactory.get("addWaterStep").tasklet(addWater).build();

      }


    @Bean

      public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,

          @Qualifier("boilWaterStep") Step boilWaterStep,

          @Qualifier("addTeaStep") Step addTeaStep,

          @Qualifier("addWaterStep") Step addWaterStep) {

        return jobBuilderFactory.get("prepareTeaJob")

            .start(boilWaterStep)

            .next(addTeaStep)

            .next(addWaterStep)

            .build();

      }

    }

    ```


    In this batch flow, we use `AddTeaWithParameter` instead of `AddTea`. Otherwise,
    the batch flow is exactly the same as in previous examples. [Listing 9-33](#9781484207949_Ch09_1.xhtml#FPar36)
    shows the main class of this example.


    [***Listing 9-33***](#9781484207949_Ch09_1.xhtml#_FPar36). Main Class of JobParameters
    Example (0909-job-parameters)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.JobExecution;

    import org.springframework.batch.core.JobParameters;

    import org.springframework.batch.core.JobParametersBuilder;

    import org.springframework.batch.core.launch.JobLauncher;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ConfigurableApplicationContext;


    @Slf4j

    @SpringBootApplication

    public class BatchApplication {

      public static void main(String[] args) throws Exception {

        ConfigurableApplicationContext context =

            SpringApplication.run(BatchApplication.class, args);


    JobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);

        Job job = (Job) context.getBean("prepareTeaJob");


    JobParameters jobParameters1 = createJobParameters("no sugar");

        JobExecution execution1 = jobLauncher.run(job, jobParameters1);

        log.info("Exit Status: {}", execution1.getStatus());


    JobParameters jobParameters2 = createJobParameters("two spoons of sugar");

        JobExecution execution2 = jobLauncher.run(job, jobParameters2);

        log.info("Exit Status: {}", execution2.getStatus());

        context.close();

      }


    public static JobParameters createJobParameters(String sugarAmountValue) {

        return new JobParametersBuilder()

            .addString("sugarAmount", sugarAmountValue)

            .toJobParameters();

      }

    }

    ```


    When we create the Spring context instance and retrieve `JobLauncher` and `Job`,
    we execute the `prepareTeaJob` job various times. The `createJobParameters` method
    helps us create the `JobParameters` instance with the parameter called `sugarAmount`.
    The first execution is done without sugar, and the second cup of tea is prepared
    with two spoonfuls of sugar. Each execution status is printed, and the Spring
    context is closed at the end of the program. [Listing 9-34](#9781484207949_Ch09_1.xhtml#FPar37)
    shows the Spring Boot configuration file.


    [***Listing 9-34***](#9781484207949_Ch09_1.xhtml#_FPar37). Turn Off Default Execution
    of SB Job by Spring Boot (File application.properties in Folder src/main/properties
    of Example Project 0909-job-parameters)


    ```

    spring.batch.job.enabled=false

    ```


    By default, Spring Boot with autoconfiguration enables executing all the SB `Job`s
    it finds. But in this case, we don’t want to run a default job without parameters,
    because we want to execute them explicitly with parameters. Therefore, this configuration
    is needed to disable automatic execution of SB jobs by Spring Boot autoconfiguration.
    [Listing 9-35](#9781484207949_Ch09_1.xhtml#FPar38) shows the output when we run
    this example.


