    This listing shows the imports class signature with the constructor and method
    handling `GET` requests. Most of these constructs should already be familiar from
    previous examples. The only new element here is the new `@RequestMapping` attribute
    `produces`. It defines that the method will be mapped only to requests that expect
    a JSON response body format. This consumer’s requirement involves HTTP content
    negotiation and is driven by the HTTP header `Accept`. The second part of the
    example is shown in [Listing 4-19](#9781484207949_Ch04.xhtml#FPar29).


    ![Image](images/sq.jpg) **Note**  Content negotiation is beyond the scope of this
    book. I suggest starting an investigation on this wiki page: `https://en.wikipedia.org/wiki/Content_negotiation`.


    [***Listing 4-19***](#9781484207949_Ch04.xhtml#_FPar29). POST Part of Spring MVC
    Example with Headers and Query Parameters (0406-rest-parameters-server)


    ```

    @RequestMapping(method = RequestMethod.POST, consumes = MediaType.APPLICATION_JSON_VALUE,

         headers = "version=1")

    public ResponseEntity<String> postUser(@RequestBody User user,

        UriComponentsBuilder uriBuilder,

        @RequestHeader(required = false) String version) {

      if ("1".equals(version)) {

        int identifier = userService.addUser(user);


    HttpHeaders httpHeaders = new HttpHeaders();

        String uri = UrlConstants.USERS_URL + "/{id}";

        UriComponents uriComponents =

            uriBuilder.path(uri).buildAndExpand(identifier);

        httpHeaders.setLocation(uriComponents.toUri());

        return new ResponseEntity<String>(httpHeaders, HttpStatus.CREATED);

      } else {

        return ResponseEntity.badRequest().body("Expected version is 1!");

      }

    }

    ```


    The `@RequestMapping` annotation has various attributes. The `method` attribute
    specifies the HTTP method that the annotated method is mapped to. The `consumes`
    attribute indicates that we are handling only JSON content. So the request must
    contain `Content-Type: application/json` in order to be routed to this method.
    The annotation attribute `headers` has the value `version=1`, which indicates
    that only requests with an API version equal to 1 will be routed to this logic.


    `postUser` has three parameters. The first two, `user` and `uriBuilder`, were
    already covered in [Listing 4-16](#9781484207949_Ch04.xhtml#FPar24). The last
    parameter, `version`, is annotated with `@RequestHeader`, which reads the HTTP
    header with the name `version` and injects it into this parameter.


    The implementation verifies that the version of API is 1 and returns the HTTP
    status 400 Bad Request if not. If the version is 1, the implementation stores
    the `User` object and returns a response with the status 200 OK and the `Location`
    header. Checking the header in the implementation of the `postUser` method is
    not necessary, because the mapping annotation attribute `headers` is configured
    to consume only requests with version 1\. But the code shows us how the `@RequestHeader`
    annotation can extract HTTP headers.


    [Listing 4-20](#9781484207949_Ch04.xhtml#FPar30) is the last piece of the Spring
    MVC server-side examples.


    [***Listing 4-20***](#9781484207949_Ch04.xhtml#_FPar30). PUT and GET Interval
    Part of Spring MVC Example with Headers and Query Parameters (0406-rest-parameters-server)


    ```

    @RequestMapping(value = "/{id}", method = RequestMethod.PUT, headers = "version=1")

      public ResponseEntity<String> putUser(@PathVariable("id") int identifier,

          RequestEntity<User> request) {

        List<String> versions = request.getHeaders().get("version");

        boolean versionIsCorrect = versions != null && "1".equals(versions.get(0));

        if (versionIsCorrect) {

          userService.updateOrAddUser(identifier, request.getBody());

          return ResponseEntity.ok("");

        } else {

          return ResponseEntity.badRequest().body("Expected version is 1!");

        }

      }


    @RequestMapping(method = RequestMethod.GET, params = "lowerId",

          produces = MediaType.APPLICATION_JSON_VALUE)

      public Collection<User> getUsersInterval(@RequestParam int lowerId,

          @RequestParam("upperId") int upId) {

        return userService.getUsersInterval(lowerId, upId);

      }

    }

    ```


    The `@RequestMapping` annotation for the `putUser` method is annotated in a similar
    fashion as the `putUser` method from [Listing 4-16](#9781484207949_Ch04.xhtml#FPar24).
    The difference is the `headers` attribute, which also ties this method to handle
    only requests with the HTTP header `version: 1`.


    Parameters of the `putUser` method are also slightly different from [Listing 4-16](#9781484207949_Ch04.xhtml#FPar24).
    Alongside the path variable extraction, there is also a new parameter called `request`
    of type `RequestEntity<User>`. This is the Spring representation of the HTTP request,
    where the body is marshaled into the type `User`. Spring converts the `User` type
    from the request body and wraps this object into `RequestEntity<User>` and injects
    it into the request parameter. We can use this object to inspect various attributes
    of the request, such as the HTTP method, headers, and URI.


    In this case, we extracted the header `version` and used it to verify that the
    HTTP request with the correct version was routed into this logic. Again, such
    a check is not necessary, because the mapping based on `headers="version-1"` takes
    care of excluding other versions. But it shows an alternative to extracting the
    HTTP request metadata.


    Testing Spring MVC REST APIs


    Spring has a strong focus on testability. Because the Spring MVC is one of the
    most widely used Spring abstractions, it is of course not an exception. The concept
    behind testing the Spring MVC APIs is to perform fake HTTP requests to test the
    controller and verify the response. Even if this testing code is not running in
    a servlet container, the controller behaves the same way as it were registered
    to `DispatcherServlet`.'
