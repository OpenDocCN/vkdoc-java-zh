  raw: 'Dynamic WSDL generation is useful during the development stage of our web
    service, as requirements may change a lot. But in production we want to make sure
    that contact with the web service is stable. Because the generation algorithm
    can sometimes bring in small changes, it’s a good practice during production to
    use static WSDL (not generated). This configuration is shown in [Listing 3-13](#9781484207949_Ch03.xhtml#FPar17).


    [***Listing 3-13***](#9781484207949_Ch03.xhtml#_FPar17). Web Service XML Context
    Configuration with Static WSDL Exposure (File web-service-config.xml in Example
    Project 0301-ws-xmlconfig-service)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xmlns:ws="http://www.springframework.org/schema/web-services"

      xsi:schemaLocation="http://www.springframework.org/schema/web-services

        http://www.springframework.org/schema/web-services/web-services.xsd

                    http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

                    http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context.xsd">


    <context:component-scan base-package="net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server"
    />


    <ws:annotation-driven />


    <ws:static-wsdl id="userDetails" location="classpath:userDetailsSchema.wsdl"/>

    </beans>

    ```


    The XML element `<ws:static-wsdl>` is used for static WSDL exposure. A prerequirement
    is the existence of a WSDL file in our project. In this case, the file `userDetailsSchema.wsdl`
    should be in the classpath. As we are using the Maven build system, the concrete
    file is `src/main/resources`. The parameter `id` is important for the final name
    of the exposed WSDL. In this case, it is `userDetails`. Therefore, if we run the
    server on `localhost` and port 10301, the final WSDL location would be `http://localhost:10301/0301-ws-xmlconfig-service/userDetails.wsdl`
    again.


    This XML configuration is becoming less relevant these days because of a shift
    toward more-maintainable Java Spring configurations. An analogous Java configuration
    is shown in [Listing 3-14](#9781484207949_Ch03.xhtml#FPar18).


    [***Listing 3-14***](#9781484207949_Ch03.xhtml#_FPar18). Web Service Java Context
    Configuration (0302-ws-javaconfig-service)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.javaconfig.server;


    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ws.config.annotation.EnableWs;

    import org.springframework.ws.wsdl.wsdl11.DefaultWsdl11Definition;

    import org.springframework.xml.xsd.SimpleXsdSchema;

    import org.springframework.xml.xsd.XsdSchema;


    @EnableWs

    @ComponentScan

    @Configuration

    public class ServerConfiguration {

      public static final String NAMESPACE =

          "http://localhost:10302/0302-ws-javaconfig-service";


    @Bean

      public DefaultWsdl11Definition userDetails(XsdSchema userDetailsSchema) {

        DefaultWsdl11Definition wsdlDefinition = new DefaultWsdl11Definition();

        wsdlDefinition.setTargetNamespace(NAMESPACE);

        wsdlDefinition.setSchema(userDetailsSchema);

        wsdlDefinition.setPortTypeName("UserDetailsPort");

        wsdlDefinition.setLocationUri("/");

        return wsdlDefinition;

      }


    @Bean

      public XsdSchema userDetailsSchema() {

        return new SimpleXsdSchema(new ClassPathResource("userDetailsSchema.xsd"));

      }

    }

    ```


    The class is annotated with the standard `@Configuration` annotation used for
    Java Spring configurations, and the framework scans the current package and subpackages
    for Spring components. This scanning will pick up `@Endpoint` if web services
    are enabled with `@EnableWs`, which is the Java annotation replacement for the
    `<ws:annotation-driven>` XML element. The bean registered by the `userDetails`
    method facilitates the dynamic WSDL creation. Here we are injecting the XSD bean
    registered by the `userDetailSchema` method. [Listing 3-14](#9781484207949_Ch03.xhtml#FPar18)
    is, in fact, the exact mirror of the XML configuration in [Listing 3-12](#9781484207949_Ch03.xhtml#FPar16).
    Only the namespace differs, because it is located in a different example project.


    A static WSDL exposure with a Java configuration is shown in [Listing 3-15](#9781484207949_Ch03.xhtml#FPar19).


    [***Listing 3-15***](#9781484207949_Ch03.xhtml#_FPar19). Web Service Java Context
    Configuration with Static WSDL Exposure (0302-ws-javaconfig-service)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.javaconfig.server;


    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ws.config.annotation.EnableWs;

    import org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;


    @EnableWs

    @ComponentScan

    @Configuration

    public class ServerConfiguration {

      public static final String NAMESPACE =

          "http://localhost:10302/0302-ws-javaconfig-service";


    @Bean

      public SimpleWsdl11Definition userDetails() {

        return new SimpleWsdl11Definition(new ClassPathResource(

            "userDetailsSchema.wsdl"));

      }

    }

    ```


    Transports


    There are various ways to configure the transport layer for Spring Web Services.
    Each transport protocol requires certain Spring abstractions to be registered.


    HTTP/HTTPS


    First, there is the servlet container:


    *   `MessageDispatcherServlet`: This is the easiest and most used mechanism.

    *   `DispatcherServlet`: This is useful when we need to provide a SOAP endpoint
    alongside REST or Spring MVC endpoints. `WebServiceMessageReceiverHandlerAdapter`
    and `RequestMappingHandlerAdapter` create a bridge from the web service endpoints
    to `DispatcherServlet`.


    Alternatively, there is the simple HTTP server, with the following as receivers:


    *   `SoapMessageDispatcher`

    *   `SimpleHttpServerFactoryBean`

    *   `SoapMessageDispatcher`


    JMS


    With JMS, we use the following:


    *   `SoapMessageDispatcher`

    *   `ActiveMQConnectionFactory`

    *   `DefaultMessageListenerContainer`


    E-mail


    With e-mail, we use the following:


    *   `SoapMessageDispatcher`

    *   `MailMessageReceiver`


    XMPP


    With XMPP, we use the following:


    *   `SoapMessageDispatcher`

    *   `XmppConnectionFactoryBean`

    *   `XmppMessageReceiver`


    As you may notice for nonservlet transports, there are a few common bean types:


    *   Message factory

    *   Message dispatcher

    *   Message receiver

    *   Connection factory (XMPP, JMS)


    ![Image](images/sq.jpg) **Note**  Details of nonservlet transport configuration
    are not covered in Enterprise Integration with Spring certification. Therefore,
    we focus on only `MessageDispatcherServlet`. Information about configuration of
    nonservlet web service transports can be found in Spring Web Services reference
    documentation.


    Servlet Transports


    Bear in mind that `MessageDispatcherServlet` and `DispatcherServlet` are different
    servlet implementations. One serves SOAP endpoints, and the other serves MVC or
    REST endpoints. Configuring `MessageDispatcherServlet` in a Spring application
    can be done in various ways. The Spring Framework and Spring Boot projects nowadays
    provide various servlet descriptor wrappers to simplify web container configuration.
    [Listing 3-16](#9781484207949_Ch03.xhtml#FPar21) shows a classic XML-based servlet
    descriptor configuration in a `web.xml` file.'
