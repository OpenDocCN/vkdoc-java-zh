- fmt: "\nThe last two factory methods shown in [Listing 1-3](#9781484207949_Ch01.xhtml#FPar3)\
    \ were introduced in Java SE 8. They use `java.util.concurrent.ForkJoinPool` as\
    \ their underlying thread-pool implementation. Introduced in Java SE 7, this implementation\
    \ uses a unique algorithm of CPU load distribution between threads called *work-stealing*.\
    \ Idle threads can “steal” work from busy threads rather than waiting silently.\n\
    \n`Executors.newWorkStealingPool()` creates a thread pool with a size equal to\
    \ the number of cores on the machine it’s currently running on. Thus it tries\
    \ to use CPU power most effectively, because having more running threads than\
    \ cores leads to frequent context switching, which isn’t a resource-free operation.\
    \ But this type of thread pool isn’t suitable for I/O-bound processing. The reason\
    \ is related to the number of threads again. If threads are mostly waiting on\
    \ I/O operations and there aren’t other threads in the pool able to keep CPU cores\
    \ busy, a lot of CPU cycles are wasted on waiting. A much better fit for such\
    \ I/O-bound operations is a fixed thread pool with a number of cores bigger than\
    \ the available cores. A better fit is a cached thread pool.\n\n`Executors.newWorkStealingPool(int\
    \ parallelism)` creates a pool that doesn’t take into account the number of cores\
    \ on the current machine, but rather optimizes the pool to the given parallelism\
    \ level. So the pool size is optimized toward the number of threads specified\
    \ by `parallelism`. Unless you are a skilled user of `ForkJoinPool`, use the default\
    \ parallelism, equal to the number of available cores (`Executors.newWorkStealingPool()`\
    \ without the `parallelism` parameter).\n\n![Image](images/sq.jpg) **Note** The\
    \ fork/join algorithm is beyond the scope of this book. To become familiar with\
    \ this algorithm’s special features, the Oracle tutorial for fork/join pools provides\
    \ a good explanation: `http://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html`.\
    \ Javadoc documentation for `java.util.concurrent.ForkJoinPool` and `java.util.concurrent.ForkJoinTask`\
    \ provides a detailed explanation of why this type of pool isn’t suitable for\
    \ I/O-bound operations.\n\nThe parameters of a thread pool (especially its size)\
    \ can significantly improve or diminish performance of parallel processing. It\
    \ is important to understand the nature of concurrent tasks processed by a thread\
    \ pool. Various considerations affect thread-pool configuration. For example,\
    \ a developer needs to understand whether parallel tasks are CPU bound, I/O bound,\
    \ or mixed.\n\nIf we are dealing with CPU-bound operations, we want to keep the\
    \ number of threads as close to the number of cores on the machine as possible.\
    \ This avoids frequent switching between threads causing unnecessary overhead\
    \ when there is enough processing to keep the CPU busy.\n\nIf we are processing\
    \ I/O-intensive operations, we generally want to have a larger number of threads\
    \ available, because we don’t want the CPU to waste cycles on blocking I/O operations.\
    \ But the number of threads can’t be too large, because the overhead of switching\
    \ threads can decrease performance. Balance needs to be found.\n\nBalance needs\
    \ to be found also for mixed types of processing. There isn’t any guidance for\
    \ tuning configuration when I/O- and CPU-intensive operations are mixed within\
    \ one thread pool. A developer may consider splitting the tasks into various threads\
    \ if it helps. But such splitting doesn’t make sense for `ForkJoinPool`, because\
    \ is it optimized toward the number of cores on the current machine. Therefore,\
    \ we likely want to have only one instance of it reserved for processing CPU-intensive\
    \ operations.\n\nTrying to guess the thread-pool configuration is impossible.\
    \ It needs to be backed up by performance testing, or at least by benchmarking\
    \ or micro-benchmarking of certain modules. Performance testing with the environment\
    \ as close as possible to that experienced in production, and with a similar load\
    \ as expected in production, will lead to more accurate results than benchmarking\
    \ modules in isolation.\n\n![Image](images/sq.jpg) **Note** If you want to dive\
    \ deeper into thread-pool sizing alongside other crucial aspects of thread pools,\
    \ this article by Brian Goetz provides a short, decent introduction to this complicated\
    \ topic: `www.ibm.com/developerworks/library/j-jtp0730/index.html`.\n\nImplementations\
    \ of the `java.util.concurrent.Executor` interface effectively made the `java.lang.Thread`\
    \ class obsolete, because they abstract out the need for low-level thread handling\
    \ and provide the same flexibility.\n\nAfter all this theory, it’s time to show\
    \ an example. See [Listing 1-6](#9781484207949_Ch01.xhtml#FPar8).\n\n[***Listing\
    \ 1-6***](#9781484207949_Ch01.xhtml#_FPar8). Simple Asynchronous Task (0101-java-concurrency)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter01.javaconcurrency;\nimport java.util.Random;\n\
    import java.util.concurrent.Callable;\npublic class SimpleTask implements Callable<String>\
