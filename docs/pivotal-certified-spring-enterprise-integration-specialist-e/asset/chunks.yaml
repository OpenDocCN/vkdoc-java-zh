    \ can be injected into any chunk-oriented `ItemProcessor`, `ItemWriter`, and `ItemReader`\
    \ via the initialization method annotated with `@BeforeStep`. For `Tasklet`, there\
    \ is an even easier mechanism, whereby SB injects the `ChunkContext` instance\
    \ as a second parameter of `Tasklet.execute()`. The `StepExecution` instance can\
    \ be accessed and then `ChunkContext.getStepContext().getStepExecution()`."
