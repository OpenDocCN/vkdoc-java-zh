    Notice that when the request arrives to the gateway and is converted into a message,
    a temporary reply channel is created for this message. The gateway will be expecting
    a response message via this temporary reply channel.


    Messages received by this gateway will be passed to the service activator endpoint,
    which is mapped to the `writeService.writeAndIndicateSuccess()` method. This method
    returns the result of the write operation; therefore, we are dealing with bidirectional
    message flow. To send a reply message back to the gateway, the temporary reply
    channel created for the request will be used automatically. When a value is returned
    from `WriteService.writeAndIndicateSuccess()`, the service activator converts
    this value into a reply message and sends it to the temporary reply channel. The
    gateway receives this response message via the temporary reply channel and converts
    it to a return value of the service interface `SiWrapperService`.


