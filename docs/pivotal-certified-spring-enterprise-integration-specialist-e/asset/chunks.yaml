- fmt: "After a component scan for SI components, this defines two channels: `inChannel`\
    \ and `bridgedChannel`. These channels are bridged via the `value` attribute of\
    \ the `@BridgeFrom` annotation. The `@Poller` annotation turns this bridge to\
    \ an active component. [Listing 8-87](#9781484207949_Ch08_1.xhtml#FPar90) shows\
    \ the main class of this example.\n\n[***Listing 8-87***](#9781484207949_Ch08_1.xhtml#_FPar90).\
    \ Main Class of `@BridgeFrom` Example (0822-bridge-from-javaconfig)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter08;\nimport lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceAnnotated;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.ApplicationContext;\n\n@Slf4j\n@SpringBootApplication\n\
    public class SiApplication {\n  public static void main(String[] args) throws\
    \ InterruptedException {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class,\
    \ args);\n\n    SiWrapperServiceAnnotated wrapperService =\n        ctx.getBean(SiWrapperServiceAnnotated.class);\n\
    \    boolean result = wrapperService.processText(\"simple message\");\n    log.info(\"\
    Result: \" + result);\n  }\n}\n```\n\nAfter running the Spring context, we send\
    \ the message via the `SiWrapperServiceAnnotated` service interface and log the\
    \ result returned by the SI flow. [Listing 8-88](#9781484207949_Ch08_1.xhtml#FPar91)\
    \ shows the output after running this example.\n\n[***Listing 8-88***](#9781484207949_Ch08_1.xhtml#_FPar91).\
    \ Output of `@BridgeFrom` Example\n\n```\n2015-08-27 19:36:10.635  INFO 22768\
    \ --- [ask-scheduler-1]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
    \ simple message\n2015-08-27 19:36:10.637  INFO 22768 --- [           main]\n\
    n.l.book.eiws.chapter08.SiApplication    : Result: true\n```\n\nThe message is\
    \ persisted in the task scheduler thread, and the result is handled in the main\
    \ thread.\n\n## `@BridgeTo` Example\n\nThis example is similar to the `@BridgeFrom`\
    \ example. The only difference between these two examples is shown in [Listing\
    \ 8-89](#9781484207949_Ch08_1.xhtml#FPar92).\n\n[***Listing 8-89***](#9781484207949_Ch08_1.xhtml#_FPar92).\
    \ SI Configuration of `@BridgeTo` Example (0823-bridge-to-javaconfig)\n\n```\n\
    package net.lkrnac.book.eiws.chapter08;\n\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.annotation.BridgeTo;\n\
    import org.springframework.integration.annotation.IntegrationComponentScan;\n\
    import org.springframework.integration.annotation.Poller;\nimport org.springframework.integration.channel.DirectChannel;\n\
    import org.springframework.integration.channel.QueueChannel;\nimport org.springframework.messaging.MessageChannel;\n\
    import org.springframework.messaging.PollableChannel;\n\n@Configuration\n@IntegrationComponentScan\n\
    public class SiConfiguration {\n  @Bean\n  @BridgeTo(value = \"bridgedChannel\"\
    , poller = @Poller(fixedDelay = \"100\"))\n  public PollableChannel inChannel()\
    \ {\n    return new QueueChannel();\n  }\n\n  @Bean\n  public MessageChannel bridgedChannel()\
    \ {\n    return new DirectChannel();\n  }\n}\n```\n\nThe `@BridgeTo` annotation\
    \ is on `inChannel` in this case. The output of this example is also the same\
    \ as for the `@BridgeFrom` example. As we can see, `@BridgeTo` annotates the source\
    \ channel or component—the opposite of `@BridgeFrom`, which annotates the target\
    \ channel or component.\n\n## Chain\n\nA *chain* is a passive middle component,\
    \ which also means it can participate in unidirectional and bidirectional message\
    \ flows. As its name suggests, it is used for chaining message endpoints together\
    \ without the need to specify channels to connect them. Messages are most commonly\
    \ passed sequentially through chain subelements.\n\nThis component can wrap a\
    \ set of message endpoints into one message endpoint. In fact, we can use a chain\
    \ as a component in a higher-level chain and thus create a complex structure of\
    \ SI flow chunks connected on various chain levels. Such nested chains need to\
    \ be defined with use of the messaging gateway.\n\nA chain can be configured via\
    \ the XML element `<int:chain>`. Notice that there is no Java annotation equivalent\
    \ for a chain definition. It requires only one mandatory attribute: `input-channel`.\
    \ Components used in chains have various restrictions as compared to their use\
    \ outside the chain. For example, components in a chain shouldn’t specify `input-channel`.\
    \ In addition, the following are restrictions for the last element in the chain\
    \ in relation to the output channel:\n\n*   If the chain is connected to a downstream\
    \ message endpoint, the last element in the chain must specify `output-channel`,\
    \ or the message should have the `replyChannel` header defined.\n*   If the last\
    \ element is a channel adapter or service activator, it doesn’t need to specify\
    \ the output channel.\n\nAnother restriction is that each endpoint in a chain\
    \ must produce a message (can’t return `null`) and thus terminate the flow. Only\
    \ the last element can discard the message. Elements in a chain can’t be active\
    \ (can’t have `poller`).\n\n### Chain Example\n\nThis example borrows all the\
    \ classes from the `0814-header-enricher-xml` example:\n\n*   `SimpleHeaderEnricher`\
    \ ([Listing 8-52](#9781484207949_Ch08_1.xhtml#FPar55))\n*   `WriteServiceWithHeaders`\
    \ ([Listing 8-54](#9781484207949_Ch08_1.xhtml#FPar57))\n*   `SiApplication` ([Listing\
    \ 8-55](#9781484207949_Ch08_1.xhtml#FPar58))\n\n[Listing 8-90](#9781484207949_Ch08_1.xhtml#FPar93)\
    \ shows the SI flow with the chain.\n\n[***Listing 8-90***](#9781484207949_Ch08_1.xhtml#_FPar93).\
    \ SI Flow for Chain Example (File `si-config.xml` in Folder `src/main/resources`\
    \ of Example Project 0824-chain-xml)\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n  <int:gateway default-request-channel=\"inChannel\"\n      service-interface=\"\
    net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n  <int:channel id=\"\
    inChannel\"/>\n\n  <int:chain input-channel=\"inChannel\">\n    <int:header-enricher>\n\
    \      <int:header name=\"simpleHeader\" ref=\"simpleHeaderEnricher\" method=\"\
    addHeader\"/>\n    </int:header-enricher>\n    <int:outbound-channel-adapter ref=\"\
    writeServiceWithHeaders\" method=\"write\"/>\n  </int:chain>\n</beans>\n```\n\n\
    As compared to the `0814-header-enricher-xml` example, we don’t need to define\
    \ `enrichedChannel`, because the header enricher and outbound channel adapter\
    \ are wrapped in a chain. The output of this example is also the same as the output\
    \ of the header enricher example in [Listing 8-56](#9781484207949_Ch08_1.xhtml#FPar59).\
    \ The SI graph for this flow is shown in [Figure 8-11](#9781484207949_Ch08_2_Ext.xhtml#Fig11).\n\
    \n![9781484207949_Fig08-11.jpg](images/9781484207949_Fig08-11.jpg)\n\n[Figure\
    \ 8-11](#9781484207949_Ch08_1.xhtml#_Fig11). SI graph for chain example\n\n##\
    \ Splitter\n\nA *splitter* is a middle component (can participate in unidirectional\
    \ or bidirectional flows) that can operate in passive or active mode. It has a\
    \ unique function in the SI framework, splitting the received message into various\
    \ messages based on these mechanisms:\n\n*   *Custom Java logic*: Generic component,\
    \ which can be configured via the `<int:splitter>` XML element or `@Splitter`\
    \ annotation\n*   *XPath*: XML payload specific, which can be configured via `<int-xml:xpath-splitter>`"
