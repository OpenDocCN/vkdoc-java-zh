    \      : Job: [SimpleJob: [name=prepareTeaJob]] completed with the following parameters:\
    \ [{sugarAmount=no sugar}] and the following status: [COMPLETED]\n```\n\n## JobRepository\n\
    \nWe already mentioned that SB needs to have the `JobRepository` bean configured.\
    \ This bean ensures that every `JobExecution` and `StepExecution` states (or other\
    \ states SB uses) are persisted into a data store. This data store can be any\
    \ type of SQL database Spring can use. This access is based on the `DataSource`\
    \ bean defined in the Spring context.\n\nSB uses a defined database schema to\
    \ store its metadata and provides SQL scripts to create or drop the schema for\
    \ the most commonly used relational databases. These schemas are located in the\
    \ `spring-batch-core` library in the `org/springframework/batch/core` folder.\
    \ So, for example, if we want to create a schema for the PostgreSQL database,\
    \ we can use the SQL script `classpath:/org/springframework/batch/core/schema-postgresql.sql`\
    \ to create the SB schema and the script `classpath:/org/springframework/batch/core/schema-drop-postgresql.sql`\
    \ to erase it.\n\nThis mechanism is powerful, because the developer doesn’t need\
    \ to care about persisting the state of batch execution. SB persists execution\
    \ states automatically, so it is easy to handle scenarios in which, for example,\
    \ `Job` is killed in the middle of execution and we want to continue execution\
    \ from the point where the DB execution was left behind.\n\n### Configuring JobRepository\
    \ with XML Configuration\n\nThis example does not use Spring Boot. [Listing 9-45](#9781484207949_Ch09_1.xhtml#FPar48)\
    \ shows the SB bean configuration needed for this example.\n\n[***Listing 9-45***](#9781484207949_Ch09_1.xhtml#_FPar48).\
    \ Beans Needed for JobRepository Configuration (File `batch-beans-config.xml`\
    \ in Folder `src/main/resources` of Example Project `0911-job-repository-xml`)\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:batch=\"\
    http://www.springframework.org/schema/batch\"\n  xmlns:context=\"http://www.springframework.org/schema/context\"\
    \n  xmlns:jdbc=\"http://www.springframework.org/schema/jdbc\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
    \    http://www.springframework.org/schema/jdbc\n    http://www.springframework.org/schema/jdbc/spring-jdbc.xsd\n\
    \    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\"\
    >\n\n<context:component-scan base-package=\"net.lkrnac.book.eiws.chapter09\" />\n\
    \n<bean id=\"transactionManager\"\n    class=\"org.springframework.batch.support.transaction.ResourcelessTransactionManager\"\
    \ />\n\n<bean id=\"jobLauncher\"\n    class=\"org.springframework.batch.core.launch.support.SimpleJobLauncher\"\
    >\n    <property name=\"jobRepository\" ref=\"jobRepository\" />\n  </bean>\n\n\
    <jdbc:embedded-database id=\"dataSource\" type=\"H2\">\n    <jdbc:script\n   \
    \   location=\"classpath:/org/springframework/batch/core/schema-h2.sql\" />\n\
    \  </jdbc:embedded-database>\n\n<bean id=\"jdbcTemplate\" class=\"org.springframework.jdbc.core.JdbcTemplate\"\
    >\n    <property name=\"dataSource\" ref=\"dataSource\"/>\n  </bean>\n\n<batch:job-repository\
    \ id=\"jobRepository\" data-source=\"dataSource\"\n    transaction-manager=\"\
    transactionManager\" table-prefix=\"BATCH_\"\n    max-varchar-length=\"1000\"\
    \ />\n</beans>\n```\n\nWe use four namespaces that the Spring and SB frameworks\
    \ provide: `beans`, `jdbc`, `context`, and `batch`. The default namespace here\
    \ is `beans`, as we don’t have a lot of `batch` XML tags. `<context:component-scan>`,\
    \ `transactionManager`, and `jobLauncher` were already covered in previous examples.\
    \ The component scan registers all the beans from the defined package into the\
    \ Spring context. The transaction manager is needed to handle transactions, and\
    \ `JobLauncher` is used for execution of batch jobs.\n\nThe `<jdbc:embedded-database>`\
    \ XML tag configures the in-memory database we use in this example. This data\
    \ source will be handling only storage of SB states, so we create a schema for\
    \ it via the SQL script `classpath:/org/springframework/batch/core/schema-h2.sql`.\n\
    \n`JdbcTemplate` enables us to easily query the SB `JobRepository` data store.\
    \ Finally, we create the `JobRepository` bean via the SB XML tag `<batch:job-repository>`.\
    \ We need to specify the mandatory attributes `transaction-manager` and `data-source`,\
    \ where we use the bean instances created earlier in this XML configuration. We\
    \ can also define a prefix for all the SB tables in the database, which is handy\
    \ for avoiding possible DB table name conflicts. The last attribute we use is\
    \ the length of `VARCHAR` types in the DB. This can be handy if our `Job` or `Step`\
    \ names are too long.\n\nFor SB `Job` configuration, we reuse the same `prepareTeaJob`\
    \ flow from [Listing 9-19](#9781484207949_Ch09_1.xhtml#FPar22). [Listing 9-46](#9781484207949_Ch09_1.xhtml#FPar49)\
    \ shows the main class of this example.\n\n[***Listing 9-46***](#9781484207949_Ch09_1.xhtml#_FPar49).\
