    在事务性监听器方法 `readMessage` 中，我们注入了消息文本和 `javax.jms.Message` 实例。需要消息实例来调用 `message.getJMSRedelivered()`，该方法用于判断此消息是否为重新投递。此外，还有一个名为
    `processIfNeeded()` 的新私有方法。该方法首先验证消息是否已被处理；如果未处理，则调用 `simpleMessage.processText()`
    进行持久化。


    因此，完整的逻辑如下：如果消息是重新投递的，则仅在需要时处理它；如果不是，则直接处理。你可能会问：“为什么我们不总是调用 `processIfNeeded()`，而无需关心
    `message.getJMSRedelivered()` 检查呢？”原因很简单。检查消息是否已被处理是对外部系统的一次额外调用，通常*代价高昂*，而消息重新投递非常罕见，因此我们可以通过先检查消息是否被重新投递，再检查它是否已被处理/持久化，来消除大部分不必要的调用。


