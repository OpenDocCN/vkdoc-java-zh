    [***Listing 6-16***](#9781484207949_Ch06.xhtml#_FPar18). Listener of Lost Message
    Scenario with `AUTO_ACKNOWLEDGE` Mode (0605-auto-acknowledge-listener-lost)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.jms.Session;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageListener {

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @JmsListener(destination = "ExpiryQueue")

      public void readMessage(String message, Session session) {

        preprocess(message);

        simpleService.processText(message);

      }


    private void preprocess(String message) {

        // simulate error

        throw new IllegalArgumentException(message);

      }

    }

    ```


    In this case, we don’t simulate an error after persisting the message. We simulate
    it in a method called `preprocess()` before the `simpleService.processText()`
    call. [Figure 6-2](#9781484207949_Ch06.xhtml#Fig2) shows the behavior after running
    this example.


    ![9781484207949_Fig06-02.jpg](images/9781484207949_Fig06-02.jpg)


    [Figure 6-2](#9781484207949_Ch06.xhtml#_Fig2). Sequence diagram of message lost
    scenario with listener and `AUTO_ACKNOWLEDGE` mode (file sequence.uml in folder
    uml-diagrams of example project 0605-auto-acknowledge-listener-lost)


    As Spring uses long polling, synchronous reception with a time-out is used in
    an infinite loop under the hood to simulate asynchronous behavior. Synchronous
    reception is by JMS definition autoacknowledged straight after the return from
    the `MessageConsumer.receive()` call. This is because we are using a `DefaultJmsListenerContainerFactory`
    implementation for the listener container.


    Therefore, when our listener calls the `preprocess()` method, the message is already
    acknowledged. The exception in `preprocess()` stops processing in the listener
    before the message is persisted. But the message was already discarded from the
    destination and is lost.


    Lost Message with Synchronous Reception


    Example `0606-auto-acknowledge-sync-lost` explains how `AUTO_ACKNOWLEDGE` mode
    in combination with synchronous reception can also lead to message loss. Again,
    the main and sender classes of this example are exactly the same as in [Listings
    6-13](#9781484207949_Ch06.xhtml#FPar14) and [6-14](#9781484207949_Ch06.xhtml#FPar15).
    [Listing 6-17](#9781484207949_Ch06.xhtml#FPar19) shows the JMS configuration.


    [***Listing 6-17***](#9781484207949_Ch06.xhtml#_FPar19). JMS Configuration of
    Synchronous `AUTO_ACKNOWLEDGE` Mode (0606-auto-acknowledge-sync-lost)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.jms.ConnectionFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.scheduling.annotation.EnableScheduling;


    @Configuration

    @EnableScheduling

    public class JmsConfiguration {

      @Bean

      public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {

        JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);

        jmsTemplate.setReceiveTimeout(1000);

        return jmsTemplate;

      }

    }

    ```


    This configuration class registers the `JmsTemplate` bean, which has one nondefault
    property, `receiveTimeout`. By default, the receive time-out is 0, which means
    infinite waiting if no messages are available for read. We should specify the
    receive time-out, if we want to make sure that our reading thread won’t be stuck,
    forever waiting for a message.


    The `JmsConfiguration` class also enables scheduling via the `@EnableScheduling`
    annotation, which will be used to initialize a synchronous read of the JMS message,
    which is shown in [Listing 6-18](#9781484207949_Ch06.xhtml#FPar20).


    [***Listing 6-18***](#9781484207949_Ch06.xhtml#_FPar20). Synchronous Reader of
    `AUTO_ACKNOWLEDGE` Scenario with Lost Message (0604-auto-acknowledge-sync-lost)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class SimpleMessageReader {

      private JmsTemplate jmsTemplate;

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageReader(JmsTemplate jmsTemplate,

          SimpleService simpleService) {

        super();

        this.jmsTemplate = jmsTemplate;

        this.simpleService = simpleService;

      }


    @Scheduled(fixedRate = Long.MAX_VALUE)

      public void readMessage() {

        String message = (String) jmsTemplate.receiveAndConvert("messageQueue");

        log.info("Message read: {}", message);


    preprocess(message);

        simpleService.processText(message);

      }


    private void preprocess(String message) {

        // simulate error

        throw new IllegalArgumentException(message);

      }

    }

    ```


    This reader class is similar to synchronous examples from the previous chapter.
    It defines a Spring component with the Lombok logging capability enabled by the
    `@Slf4j` annotation. It injects two dependencies via constructor injection. `JmsTemplate`
    is used for reception of messages, and `SimpleService` is our bean for processing
    and persisting messages.


    Message reception is done by the `readMessage()` method, which is kicked off by
    the Spring scheduling feature. We picked a long fixed rate of scheduling because
    we want the read to occur once. Notice that the `preprocess()` call is placed
    between the `jmsTemplate.receiveAndConvert()` call and `simpleService.processText()`
    to simulate errors that can occur between synchronous reception and persisting
    the message. [Figure 6-3](#9781484207949_Ch06.xhtml#Fig3) shows this behavior
    with a sequence diagram.


    ![9781484207949_Fig06-03.jpg](images/9781484207949_Fig06-03.jpg)


    [Figure 6-3](#9781484207949_Ch06.xhtml#_Fig3). Sequence diagram of message lost
    scenario with synchronous reception and `AUTO_ACKNOWLEDGE` mode (file sequence.uml
    in folder uml-diagrams of example project 0606-auto-acknowledge-sync-lost)


    The behavior is similar to the previous example. The only difference is that we
    explicitly ask to receive, and in the previous example, Spring did it for us under
    the `DefaultJmsListenerContainerFactory` hood. In fact, from the JMS provider
    point of view, both examples are synchronous.


    CLIENT_ACKNOWLEDGE Mode


    As we have mentioned, with `CLIENT_ACKNOWLEDGE` mode, the client is responsible
    for explicitly acknowledging one or a batch of messages. If we use client acknowledging
    in batches, we decrease the number of calls against the JMS provider server, and
    therefore can save some bandwidth.


    But Spring’s design of `JmsTemplate` acknowledges the message before is it returned
    to our logic. Therefore, `CLIENT_ACKNOWLEDGE` mode works for synchronous message
    reception with Spring exactly the same way as if we were using `AUTO_ACKNOWLEDGE`.
    Therefore, it doesn’t make practical sense to configure `JmsTemplate` with this
    mode. Spring’s documentation doesn’t explicitly state why such behavior is in
    place, so we avoid any speculation about it.


    Success Scenario


    The first Spring example using `CLIENT_ACKNOWLEDGE` mode highlights a success
    scenario. Our common main and listener classes are in use again. [Listing 6-19](#9781484207949_Ch06.xhtml#FPar21)
    shows the JMS configuration.


    [***Listing 6-19***](#9781484207949_Ch06.xhtml#_FPar21). JMS Configuration of
    CLIENT_ACKNOWLEDGE Success Scenario (0607-client-acknowledge-listener-success)'
