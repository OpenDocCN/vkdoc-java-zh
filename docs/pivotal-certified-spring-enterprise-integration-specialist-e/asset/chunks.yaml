    @ComponentScan

    @EnableAutoConfiguration

    public class ServerConfiguration {

      public static void main(String... args) {

        SpringApplication.run(ServerConfiguration.class);

      }


    @Bean(name = "/BarService")

      public HttpInvokerServiceExporter exportBarService(BarService barService) {

        HttpInvokerServiceExporter httpInvokerServiceExporter =

            new HttpInvokerServiceExporter();

        httpInvokerServiceExporter.setService(barService);

        httpInvokerServiceExporter.setServiceInterface(BarService.class);

        return httpInvokerServiceExporter;

      }

    }

    ```


    Configuration of the exporter bean is similar to that in the “HttpInvoker Served
    via HttpRequestHandlerServlet” section. The only difference is the bean name,
    `/BarService` (notice the forward slash character at the beginning). A name with
    a slash character tells Spring that the bean should be served by `DispatcherServlet`
    from the URL endpoint defined by this name. No other configuration changes are
    needed if `DispatcherServlet` is already configured properly.'
