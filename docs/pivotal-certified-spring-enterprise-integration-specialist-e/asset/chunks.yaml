    处理重复消息


    即使采用了我们提到的所有可靠性机制，某些场景仍然可能导致消息丢失或重复。Spring 无法抽象出 JMS 与其他事务性存储选项集成的所有问题，但会尽力降低失败的可能性。


    因此，如果我们的 JMS 消息接收基于确认模式（尤其是 `AUTO_ACKNOWLEDGE`），建议使用 `SimpleMessageListenerContainer`
    或 `SimpleJmsListenerContainerFactory`。如果我们使用 JMS 事务进行消息接收，最合适的实现是 `DefaultMessageListenerContainer`
    或 `DefaultJmsListenerContainerFactory`。


    还有另一个我们尚未提及的选项，它能在各种事务性数据存储之间提供 ACID 特性。该选项基于分布式 JTA 事务，将在下一章中描述。然而，它资源消耗大，且被广泛认为是显著的性能杀手。因此，每个程序员都应尽可能避免使用它。幸运的是，存在一些无需分布式事务即可确保不丢失消息或避免重复的选项。但首先，我们需要考虑各种因素。


    首先，我们需要知道目标存储是否具有幂等性——即它能否处理重复消息而不产生不一致的状态。当存储具有幂等性时，我们可以使用本章中的任何重复场景示例，JMS 与数据库之间的集成将是安全的。


    当我们没有这种能够检测重复的智能存储时，情况就会变得更加复杂。下一个示例将解释如何处理这种场景。我们复用了清单 6-27 中上一个示例的通用主程序、发送者实现以及基于
    `JmsTransactionManager` 的 JMS 配置。此示例的监听器如清单 6-28 所示。


    ***清单 6-28***. 处理消息持久化后出现错误的重复场景的监听器类 (0614-handle-duplicates-error-after)


