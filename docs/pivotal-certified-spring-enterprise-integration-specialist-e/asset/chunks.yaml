    如果你不熟悉*流畅 API* 这个术语，后续的示例会对其进行说明。请注意，Spring Core 框架在 4.0 版本中引入了一个消息模块，其中包含 `org.springframework.messaging.support.MessageBuilder<T>`。它的实现与
    `org.springframework.integration.support.MessageBuilder<T>` 略有不同，但生成的消息类型相同。使用
    SI 时，我们应该使用 `org.springframework.integration.support.MessageBuilder<T>`，因为它可以创建专为
    SI 通信定制的各种消息头。


    请记住，本示例的重点是消息的创建，而非消息的处理。本示例中的处理部分将被隐藏，并在本章后续部分进行解释。本示例将使用一个 SI 流程的包装器，如代码清单 8-6
    所示。


    ***代码清单 8-6***. 用于编程式消息创建示例的 SI 包装器接口 (0801-programmatic-message-creation)


    ```

    package net.lkrnac.book.eiws.chapter08.in;

    import org.springframework.messaging.Message;


    public interface SiWrapperServiceMessage {

      public void processMessage(Message<String> message);

    }

    ```


    这个 SI 流程包装器接口与代码清单 8-1 和 8-2 中的常见包装器接口略有不同，因为它接受的是完整的消息对象，而不仅仅是消息的有效负载。这是因为我们希望将带有消息头的消息传递给
    SI 流程，以突出 `MessageBuilder<T>` 的特性。代码清单 8-7 展示了消息的创建过程。


    ***代码清单 8-7***. 编程式消息创建示例 (0801-programmatic-message-creation)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceMessage;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.ImportResource;

    import org.springframework.integration.support.MessageBuilder;

    import org.springframework.messaging.Message;


    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    SiWrapperServiceMessage wrapperService =

            ctx.getBean(SiWrapperServiceMessage.class);


    Message<String> message1 = MessageBuilder.withPayload("message1")

                .setHeader("simpleHeader", "simple header")

                .build();

        wrapperService.processMessage(message1);


    Message<String> message2 = MessageBuilder.fromMessage(message1)

            .setPriority(10)

            .setCorrelationId(System.currentTimeMillis())

            .build();

        wrapperService.processMessage(message2);


    Message<String> message3 = MessageBuilder.withPayload("message3")

            .copyHeaders(message2.getHeaders())

            .removeHeader("simpleHeader")

            .build();

        wrapperService.processMessage(message3);


    Message<String> message4 = MessageBuilder.withPayload("message4")

            .setPriority(5)

            .copyHeadersIfAbsent(message2.getHeaders())

            .build();

        wrapperService.processMessage(message4);

      }

    }

    ```


    这是一个包含 `main` 方法的 Java 类，它使用 Spring Boot 通过 `@SpringBootApplication` 和 `SpringApplication.run()`
    方法来启动应用程序。它导入了位于 `si-config.xml` 文件中的 XML SI 流程配置。隐藏在此 SI 配置背后的 SI 流程对于这个消息创建示例并不重要，因此我们暂时不关注它。位于
    `si-config.xml` XML 配置中的 SI 构建块将在后续示例中解释。这里唯一重要的事实是，它配置了一个简单的 SI 流程，该流程仅在后台记录消息。


    在 `SpringApplication.run()` 之后，SI 应用程序被启动并配置好，我们就可以开始使用它了。首先，我们读取 `SiWrapperServiceMessage`
    bean，以便拥有发送消息的入口点。你可能会困惑，我们如何在不将其实现注册到 Spring 上下文的情况下注入这个 bean。我们在此仅提及，该接口的实现是在
    `si-config.xml` 中配置的，并由 SI 组件组成。


    此调用之后的逻辑将在我们以 Java 应用程序方式执行此类后进行解释。我们可以观察到与代码清单 8-8 类似的输出。


    ***代码清单 8-8***. 编程式消息创建示例的输出


    ```

    2015-08-21 21:39:12.353  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage

    : Message: GenericMessage [payload=message1, headers={simpleHeader=simple header,

    id=9779333f-b352-eb83-afdf-a52f7f4fed01, timestamp=1440189552345}]

    2015-08-21 21:39:12.366  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage

    : Message: GenericMessage [payload=message1, headers={simpleHeader=simple header,

    correlationId=1440189552365, id=c46ff29f-c743-90dd-11b2-4c64e36a3d0b, priority=10,

    timestamp=1440189552365}]

    2015-08-21 21:39:12.367  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage

    : Message: GenericMessage [payload=message3, headers={correlationId=1440189552365,

    id=1fbbf243-0cc5-9d35-a8d1-f2d97a54d63d, priority=10, timestamp=1440189552366}]

    2015-08-21 21:39:12.367  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage

    : Message: GenericMessage [payload=message4, headers={simpleHeader=simple header,

    correlationId=1440189552365, id=b91e5386-9151-0c94-cc6f-361bb688f480, priority=5,

    timestamp=1440189552367}]

    ```


    借助 `MessageBuilder<T>` 的帮助，我们创建了一个消息，其有效负载为 `message1`，消息头为 `simpleHeader`，值为
    `simple header`。对 `MessageBuilder<T>` 的调用，我们通过点号调用链式方法，这就是我们提到的*流畅 API*。这个链（流畅
    API）可以一直持续到我们完成消息创建。创建过程通过调用 `MessageBuilder<T>.build()` 完成。最后需要这个调用，因为创建的消息是不可变的，`build()`
    方法会调用 `Message<T>` 和 `MessageHeaders` 的所有必要构造函数，根据记录的配置来创建我们的消息。


    创建消息后，我们调用 `wrapperService` bean 来启动 SI 流程，在这个简单案例中，该流程会记录消息。


    第二条消息是从 `message1` 创建的，并通过专门的方法添加了一些 SI 默认消息头。在这种情况下，我们配置了 `priority`，它可以用来修改
    SI 流程中的消息消费顺序，以及 `correlationId`，它可以用来将多个消息聚合为一个消息。我们现在无需担心这些 SI 特性，因为它们将在本章后面解释。这里强调的特性是，我们可以使用专门的方法来创建
    SI 能够理解的消息头，并利用它们来影响消息的流程。


    第三条消息复制了 `message2` 的所有消息头。当我们想要稍微修改 SI 消息时，这很方便。在这种情况下，提到的修改是移除 `simpleHeader`
    消息头。

