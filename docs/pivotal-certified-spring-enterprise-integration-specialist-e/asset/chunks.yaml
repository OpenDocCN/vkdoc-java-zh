    for PriorityChannel Example (File si-config.xml in Folder src/main/resources of
    Example Project 0830-channel-priority-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />


    <int:channel id="inChannel">

        <int:priority-queue capacity="10" comparator="simpleMessageComparator"/>

      </int:channel>


    <int:outbound-channel-adapter channel="inChannel" ref="writeService" method="write">

         <int:poller receive-timeout="1" fixed-delay="100" max-messages-per-poll="1"/>

      </int:outbound-channel-adapter>

    </beans>

    ```


    On the input side of the SI flow, we use the inbound gateway mapped to our common
    service interface `SiWrapperServiceVoid` and connected to `inChannel`. This in
    channel is configured as the priority channel with capacity `10` and `SimpleMessageComparator`
    bean as `comparator`.


    The outbound channel adapter (connected to `inChannel`) is configured as an active
    component with a polling interval of 100 ms. It will also read only one message
    per poll cycle (attribute `max-messages-per-poll`) and will time out after 1 ms
    when reading from `inChannel`. The latter configuration is needed to highlight
    the changed ordering of the priority channel. If we didn’t configure such a short
    interval, the outbound channel adapter would eagerly wait to consume the first
    message that appears in the channel queue, and we wouldn’t have a chance to gather
    at least two messages.


    [Listing 8-111](#9781484207949_Ch08_2_Ext.xhtml#FPar114) shows the main class
    of this example.


    [***Listing 8-111***](#9781484207949_Ch08_2_Ext.xhtml#_FPar114). Main Class of
    PriorityChannel Example (0830-channel-priority-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import lombok.extern.slf4j.Slf4j;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.ImportResource;


    @Slf4j

    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      private static final String MESSAGE2 = "message2";

      private static final String MESSAGE1 = "message1";


    public static void main(String[] args) throws InterruptedException {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    SiWrapperServiceVoid wrapperService =

            ctx.getBean(SiWrapperServiceVoid.class);

        log.info("Starting to send messages...");

        wrapperService.processText(MESSAGE1);

        log.info(MESSAGE1 + " sent");

        wrapperService.processText(MESSAGE2);

        log.info(MESSAGE2 + " sent");

      }

    }

    ```


    After running the application with the XML SI configuration we described, we read
    the service interface bean `SiWrapperServiceVoid` from the Spring context to send
    messages. We also log the information that the message was sent to the SI flow
    already. [Listing 8-112](#9781484207949_Ch08_2_Ext.xhtml#FPar115) shows the output
    when we run this main class.


    [***Listing 8-112***](#9781484207949_Ch08_2_Ext.xhtml#_FPar115). Output of PriorityChannel
    Example (0830-channel-priority-xml)


    ```

    2015-08-30 14:36:35.149  INFO 16162 --- [           main]

    n.l.book.eiws.chapter08.SiApplication    : Starting to send messages...

    2015-08-30 14:36:35.160  INFO 16162 --- [           main]

    n.l.book.eiws.chapter08.SiApplication    : message1 sent

    2015-08-30 14:36:35.160  INFO 16162 --- [           main]

    n.l.book.eiws.chapter08.SiApplication    : message2 sent

    2015-08-30 14:36:35.272  INFO 16162 --- [ask-scheduler-1]

    n.l.b.e.chapter08.out.WriteRepository    : Text persisted: message2

    2015-08-30 14:36:35.375  INFO 16162 --- [ask-scheduler-2]

    n.l.b.e.chapter08.out.WriteRepository    : Text persisted: message1

    ```


    Information about sending both messages is printed first. This means that the
    caller (main thread) isn’t blocked with the `wrapperService.processText()` call.
    When both messages are gathered in the priority channel, the output channel adapter
    reads them in reverse alphabetical order, as we configured.


    RendezvousChannel


    `RendezvousChannel` is also a child class of `QueueChannel`, but it uses `SynchronousQueue`
    as the queue implementation (it’s `BlockingQueue` configured with zero capacity).
    So it is able to perform synchronously (via direct handoff) but at the same time
    act as an active component (consumer is polling for messages). The sender of the
    message is blocked until the active consumer reads the message from `RendezvousChannel`.


    `RendezvousChannel` can be configured via the following:


    *   The XML element `<int:channel>` with the `<int:rendezvous-queue/>` subelement.

    *   Use one of the constructors to create an instance of `RendezvousChannel` and
    register it as a Spring bean via the `@Bean` annotation. The name of this bean
    can be then used as the channel name in the message endpoint configuration.


    RendezvousChannel Example


    [Listing 8-113](#9781484207949_Ch08_2_Ext.xhtml#FPar116) shows the XML SI configuration.


    [***Listing 8-113***](#9781484207949_Ch08_2_Ext.xhtml#_FPar116). SI Configuration
    for `RendezvousChannel` Example (File si-config.xml in Folder src/main/resources
    of Example Project 0831-channel-rendezvous-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />


    <int:channel id="inChannel">

        <int:rendezvous-queue/>

      </int:channel>


    <int:outbound-channel-adapter channel="inChannel" ref="writeService" method="write">

         <int:poller fixed-delay="1000" max-messages-per-poll="1"/>

      </int:outbound-channel-adapter>

    </beans>

    ```


    The `inChannel` channel is configured as `RendezvousChannel` and is connected
    to the inbound gateway and outbound channel adapter. In this case, the outbound
    channel adapter polls at 1-second intervals and reads one message at the per poll
    cycle. This polling was chosen to highlight `RendezvousChannel` features in the
    output from [Listing 8-114](#9781484207949_Ch08_2_Ext.xhtml#FPar117). The main
    class is the same as in the `0830-channel-priority-xml` example in [Listing 8-111](#9781484207949_Ch08_2_Ext.xhtml#FPar114).


    [***Listing 8-114***](#9781484207949_Ch08_2_Ext.xhtml#_FPar117). Output of RendezvousChannel
    Example (0831-channel-rendezvous-xml)'
