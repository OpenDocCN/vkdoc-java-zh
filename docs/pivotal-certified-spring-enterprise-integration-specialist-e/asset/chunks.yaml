    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.integration.annotation.IntegrationComponentScan;

    import org.springframework.integration.channel.DirectChannel;

    import org.springframework.messaging.MessageChannel;


    @Configuration

    @IntegrationComponentScan

    public class SiConfiguration {

      @Bean

      public MessageChannel inChannel() {

        return new DirectChannel();

      }


    @Bean

      public MessageChannel splitChannel() {

        return new DirectChannel();

      }

    }

    ```


    This configuration class with an SI component scan registers two channels: `inChannel`
    and `splitChannel`. [Listing 8-96](#9781484207949_Ch08_2_Ext.xhtml#FPar99) finally
    shows an annotated example of the splitter.


    [***Listing 8-96***](#9781484207949_Ch08_2_Ext.xhtml#_FPar99). Annotated Splitter
    Example (0826-splitter-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;


    import java.util.Arrays;

    import java.util.List;


    import org.apache.commons.lang3.StringUtils;

    import org.springframework.integration.annotation.MessageEndpoint;

    import org.springframework.integration.annotation.Splitter;


    @MessageEndpoint

    public class SimpleSplitter {

      @Splitter(inputChannel = "inChannel", outputChannel = "splitChannel")

      public List<String> splitMessage(String message) {

        return Arrays.asList(StringUtils.split(message, ";"));

      }

    }

    ```


    The class needs to be annotated by `@MessageEndpoint` to mark it as a bean for
    SI endpoints. `@Splitter` annotates the splitting method with two mandatory parameters:
    `inputChannel` and `outputChannel`. The splitting method needs to return the `List<String>`
    of the object, which will be represented as payloads for split messages. The output
    is also the same as for the `0825-splitter-delimiters-xml` example in [Listing
    8-94](#9781484207949_Ch08_2_Ext.xhtml#FPar97).


    Aggregator


    An aggregator is a passive middle component, so it can be integrated into bidirectional
    and unidirectional SI flows. As we already mentioned, an aggregator’s function
    is the opposite of a splitter’s. An aggregator aggregates various messages into
    one message and can be configured via the XML element `<int:aggregator>` or via
    the annotation `@Aggregator`. An aggregation is performed based on these two mechanisms:


    *   `CorrelationStrategy`: A mechanism used to group incoming messages, so that
    they can be aggregated together. A custom `CorrelationStrategy` can be configured
    via the `correlation-strategy-method` or `correlation-strategy-expression` XML
    attributes or the `@CorrelationStrategy` annotation with a Java configuration.

    *   `ReleaseStrategy`: A mechanism to decide when the group of input messages
    is complete, so that they can be aggregated. The custom `ReleaseStrategy` can
    be configured via the `release-strategy-method` or `release-strategy-expression`
    attributes or the `@ReleaseStrategy` annotation with a Java configuration.


    By default, aggregation is performed based on these message headers:


    *   `correlationId`: Tells the aggregator that messages with the same `correlationId`
    should be merged (`CorrelationStrategy` based on `correlationId`).

    *   `sequenceSize`: Tells the aggregator how big the group of messages is to aggregate.

    *   `sequenceNumber`: Tells the aggregator the order of the current message within
    the group to aggregate.


    So, by default, the aggregator’s `ReleaseStrategy` works based on gathering messages,
    and then inspecting their `sequenceSize`, `sequenceNumber`, and `correlationId`.
    Messages are released when we have a full group of correlated messages.


    We can also configure a time-out for the aggregator component, whereby a group
    of messages will be released/aggregated after a defined time. In this case, we
    have to specify whether we want to aggregate a partial message or discard a partial
    group of messages.'
