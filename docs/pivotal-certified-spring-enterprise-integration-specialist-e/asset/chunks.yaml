    \ XML element `<int:channel>` with the `<int:dispatcher task-executor=\"...\"\
    />` subelement.\n*   Use one of constructors to create an instance of `ExecutorChannel`\
    \ and register it as a Spring bean via the `@Bean` annotation. The name of this\
    \ bean can then be used as the channel name in the message endpoint configurations.\n\
    \n## ExecutorChannel Example\n\n[Listing 8-115](#9781484207949_Ch08_2_Ext.xhtml#FPar118)\
    \ shows the SI configuration.\n\n[***Listing 8-115***](#9781484207949_Ch08_2_Ext.xhtml#_FPar118).\
    \ SI Configuration for ExecutorsChannel Example (File si-config.xml in Folder\
    \ src/main/resources of Example Project 0832-channel-executor-xml)\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xmlns:task=\"\
    http://www.springframework.org/schema/task\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/task\n\
    \    http://www.springframework.org/schema/task/spring-task.xsd\n    http://www.springframework.org/schema/beans\n\
    \    http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
    \    http://www.springframework.org/schema/context/spring-context.xsd\n    http://www.springframework.org/schema/integration\n\
    \    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
    net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<task:executor\
    \ id=\"executor\" pool-size=\"10\"/>\n\n<int:channel id=\"inChannel\">\n    <int:dispatcher\
    \ task-executor=\"executor\"/>\n  </int:channel>\n\n<int:outbound-channel-adapter\
    \ channel=\"inChannel\" ref=\"writeService\" method=\"write\" />\n</beans>\n```\n\
    \nThe `inChannel` channel is configured as `ExecutorChannel`, using the `TaskExecutor`\
    \ bean with the name `executor`. This `TaskExecutor` bean is also created in this\
    \ configuration file by the XML element `<task:executor>`. `inChannel` is connected\
    \ to the inbound gateway with our common service interface `SiWrapperServiceVoid`.\
    \ The consumer of `inChannel` is in this case the passive outbound channel adapter\
    \ mapped to the common `WriteService.write()`.\n\nWe again use the same main class\
    \ as for `0830-channel-priority-xml` from [Listing 8-111](#9781484207949_Ch08_2_Ext.xhtml#FPar114).\
    \ When we run this main class, we can observe the output in [Listing 8-116](#9781484207949_Ch08_2_Ext.xhtml#FPar119).\n\
    \n[***Listing 8-116***](#9781484207949_Ch08_2_Ext.xhtml#_FPar119). Output of ExecutorChannel\
    \ Example\n\n```\n2015-08-30 15:42:48.844  INFO 18377 --- [           main]\n\
    n.l.book.eiws.chapter08.SiApplication    : Starting to send messages...\n2015-08-30\
    \ 15:42:48.858  INFO 18377 --- [           main]\nn.l.book.eiws.chapter08.SiApplication\
    \    : message1 sent\n2015-08-30 15:42:48.859  INFO 18377 --- [           main]\n\
    n.l.book.eiws.chapter08.SiApplication    : message2 sent\n2015-08-30 15:42:48.877\
    \  INFO 18377 --- [     executor-1]\nn.l.b.e.chapter08.out.WriteRepository   \
    \ : Text persisted: message1\n2015-08-30 15:42:48.877  INFO 18377 --- [     executor-2]\n\
    n.l.b.e.chapter08.out.WriteRepository    : Text persisted: message2\n```\n\nNotice\
    \ that the handoff occurs immediately and in separate threads (using the `executor`\
    \ thread pool) without blocking the caller (`main`) thread.\n\n## PublishSubscribeChannel\n\
    \n`PublishSubscribeChannel` uses the publish/subscribe model of messaging, whereby\
    \ all the subscribers will receive message sent to it. So our message can have\
    \ multiple consumers.\n\n`PublishSubscribeChannel` can be configured via the following:\n\
    \n*   The XML element `<int:publish-subscribe-channel>`.\n*   Use one of the constructors\
    \ to create an instance of `PublishSubscribeChannel` and register it as a Spring\
    \ bean via the `@Bean` annotation. The name of this bean can then be used as the\
    \ channel name in the message endpoint configurations.\n\nWe can configure `PublishSubscribeChannel`\
    \ to handle message passing as follows:\n\n*   Synchronously\n    *   Default\
    \ configuration\n    *   Processing of all consumers is done sequentially in the\
    \ sender’s thread, so each consumer needs to wait for other consumers.\n    *\
    \   *Can* propagate transaction, security context, and exceptions between consumers\
    \ and sender.\n*   Asynchronously\n    *   Can be configured with the `task-executor`\
    \ attribute of `<int:publish-subscribe-channel>`, whereby we specify the reference\
    \ to the `TaskExecutor` instance.\n    *   Each consumer processing can be done\
    \ in a separate thread and thus they occur concurrently.\n    *   Transaction\
    \ propagation, passing the security context, and bubbling exceptions between consumers\
    \ and sender *doesn’t work in this mode*.\n\n## PublishSubscribeChannel example\n\
    \n[Listing 8-117](#9781484207949_Ch08_2_Ext.xhtml#FPar120) shows the SI configuration.\n\
    \n[***Listing 8-117***](#9781484207949_Ch08_2_Ext.xhtml#_FPar120). SI Configuration\
    \ of PublishSubscribeChannel Example (File si-config.xml in Folder src/main/resources\
    \ of Example Project 0833-channel-pub-sub-xml)\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
    net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:publish-subscribe-channel\
    \ id=\"inChannel\" />\n\n<int:outbound-channel-adapter channel=\"inChannel\" ref=\"\
    writeService\" method=\"write\"/>\n  <int:outbound-channel-adapter channel=\"\
    inChannel\" ref=\"writeService\" method=\"write\"/>\n</beans>\n```"
