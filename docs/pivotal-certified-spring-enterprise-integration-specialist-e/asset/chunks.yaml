    ***清单 6-14***. 主类 (0603-auto-acknowledge-listener-success)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;


    @SpringBootApplication

    public class JmsApplication {

      public static void main(String[] args) throws Exception {

        SpringApplication.run(JmsApplication.class, args);

      }

    }

    ```


    `@SpringBootApplication` 注解是 `@Configuration`、`@ComponentScan` 和 `@EnableAutoConfiguration`
    这组注解的便捷快捷方式。`@Configuration` 将此类标记为 Spring 配置类。


    `@ComponentScan` 对当前包及其子包执行 Spring Bean 的扫描。由于 `0600-jms-tx-common` 项目是本示例项目（`0603-auto-acknowledge-listener-success`）的依赖项，此扫描还会将来自清单
    6-12 和 6-13 的 `SimpleRepository` 和 `SimpleService` Bean 加载并注册到我们的上下文中。


    `@EnableAutoConfiguration` 将使 Spring Boot 扫描类路径以查找已知依赖项，并根据类路径上存在的库应用通用的默认配置。在本例中（示例项目
    `0603-auto-acknowledge-listener-success`），我们的类路径上有 H2 数据库引擎，因此 Spring Boot 会自动将
    `DataSource` Bean 配置为连接到 H2 数据库引擎的网关，并将 `JdbcTemplate` Bean 配置为对其执行 JDBC 操作。然后，这个
    `JdbcTemplate` Bean 会被注入到 `SimpleRepository` 中。


    由 `@EnableAutoConfiguration` 初始化的第二个支持是 JMS。由于项目 `0603-auto-acknowledge-listener-success`
    的类路径上包含 HornetQ 代理依赖项，Spring Boot 会自动初始化此 JMS 提供者的嵌入式实例，并通过 `JmsTemplate` Bean
    配置对其的访问。我们只需要在我们的 Bean 中注入 `JmsTemplate` 并使用它即可。


    *本章中的所有 Spring 示例都将使用此配置方法*。在 main 方法中，我们只需调用 `SpringApplication.run()` 来将此 Spring
    Boot 配置作为 Java 应用程序执行。


    成功场景


    清单 6-15 展示了本示例的 JMS 监听器。


    ***清单 6-15***. AUTO_ACKNOWLEDGE 示例的 JMS 监听器 (0603-auto-acknowledge-listener-success)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageListener {

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @JmsListener(destination = "ExpiryQueue")

      public void readMessage(String message) {

        simpleService.processText(message);

      }

    }

    ```


    这个类应该很熟悉，因为所有结构都在前一章中描述过了。我们在这里介绍它是因为此实现确保了消息的正确接收。重要的是要记住，Spring Boot 会自动为此监听器创建
    `DefaultJmsListenerContainerFactory`；因此，当我们即将调用 `simpleService.processText()`
    时，JMS 消息已经被确认并从 JMS 目的地丢弃。


    为了探索这种 JMS 接收场景，我们使用图 6-1 中的时序图。


    ![9781484207949_Fig06-01.jpg](img/9781484207949_Fig06-01.jpg)


    图 6-1. 使用 DefaultJmsListenerContainerFactory 的 `AUTO_ACKNOWLEDGE` 场景时序图（文件 sequence.uml
    位于示例项目 0603-auto-acknowledge-listener-success 的 uml-Diagrams 文件夹中）


    此时序图显示，确认是在调用 `SimpleMessageListener.readMessage()` 方法之前完成的，因为 `DefaultJmsListenerContainerFactory`
    使用了长轮询。通过这种机制，消息在 Spring 调用监听器方法之前就被确认了。


    进入监听器方法代码后，成功场景的流程会经过 `SimpleService`、`SimpleRepository`，并将消息存储在我们的数据库表 `TEXT_TABLE`
    中。


    ![Image](img/sq.jpg) **注意**  本章中的所有时序图都是由一个名为 PlantUML (plantuml.com) 的优秀开源项目创建的。它提供了一种易于掌握的领域特定语言
    (DSL)，用于创建各种 UML 图。这是一种不同于经典 UML 编辑器（UMLet、Enterprise Architect、Visio）的方法，能够提高生产力，因为我们开发人员编写代码比拖拽、调整大小和连接矩形与箭头更高效。它还与大多数
    IDE 和编辑器以及不同的编程工具具有良好的集成性（更多信息请参见 `plantuml.com/running.html`）。


    监听器导致的消息丢失


    成功行为是每个开发人员在实现带有数据库支持的 JMS 时所追求的目标。但现实世界并不总是对我们良好的意图如此友好。在 `AUTO_ACKNOWLEDGE`
    模式下，如果我们使用与成功场景中相同的主类和发送者类，并配合 `DefaultJmsListenerContainerFactory`，消息很容易丢失。此监听器容器工厂使用的长轮询机制强制它在接收后立即确认消息。

