    ### 使用 Java 配置的拆分器示例


    此示例将使用与前一个示例 `0825-splitter-delimiters-xml` 类似的结构。为避免重复展示冗长的代码清单，我们将列出相似的类：


    *   `WriteServiceAnnotated`：一个 Java 实现，类似于清单 8-91 中的 `WriteService`，*仅有一处不同：*
    `WriteServiceAnnotated.writeAndIndicateSuccess()` 方法使用了 `@ServiceActivator` 注解，并连接到
    `splitChannel`。

    *   `SiWrapperServiceAnnoated`：与通用的 `SiWrapperService` 接口签名相同，但使用了 `@Gateway`
    和 `@MessageEndpoint` 注解。

    *   `SiApplication`：与清单 8-93 中的 `SiApplication` 类相同。唯一的区别是缺少对 `si-config.xml`
    文件的导入，因为这是一个 Java 配置的示例。


    清单 8-95 展示了 SI 配置。


    ***清单 8-95***. 注解式拆分器示例的 SI 配置 (0826-splitter-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.integration.annotation.IntegrationComponentScan;

    import org.springframework.integration.channel.DirectChannel;

    import org.springframework.messaging.MessageChannel;


    @Configuration

    @IntegrationComponentScan

    public class SiConfiguration {

      @Bean

      public MessageChannel inChannel() {

        return new DirectChannel();

      }


    @Bean

      public MessageChannel splitChannel() {

        return new DirectChannel();

      }

    }

    ```


    这个带有 SI 组件扫描的配置类注册了两个通道：`inChannel` 和 `splitChannel`。清单 8-96 最终展示了一个注解式的拆分器示例。


    ***清单 8-96***. 注解式拆分器示例 (0826-splitter-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;


    import java.util.Arrays;

    import java.util.List;


    import org.apache.commons.lang3.StringUtils;

    import org.springframework.integration.annotation.MessageEndpoint;

    import org.springframework.integration.annotation.Splitter;


    @MessageEndpoint

    public class SimpleSplitter {

      @Splitter(inputChannel = "inChannel", outputChannel = "splitChannel")

      public List<String> splitMessage(String message) {

        return Arrays.asList(StringUtils.split(message, ";"));

      }

    }

    ```


    该类需要使用 `@MessageEndpoint` 注解，以将其标记为 SI 端点的 Bean。`@Splitter` 注解用于标记拆分方法，并带有两个必需参数：`inputChannel`
    和 `outputChannel`。拆分方法需要返回 `List<String>` 对象，该对象将作为拆分后消息的有效载荷。其输出也与清单 8-94 中 `0825-splitter-delimiters-xml`
    示例的输出相同。


    ### 聚合器


    聚合器是一个被动的中间组件，因此它可以集成到双向和单向的 SI 流程中。正如我们之前提到的，聚合器的功能与拆分器相反。聚合器将多条消息聚合成一条消息，可以通过
    XML 元素 `<int:aggregator>` 或 `@Aggregator` 注解进行配置。聚合基于以下两种机制执行：


    *   `CorrelationStrategy`：一种用于对传入消息进行分组的机制，以便将它们聚合在一起。可以通过 `correlation-strategy-method`
    或 `correlation-strategy-expression` XML 属性，或者在 Java 配置中使用 `@CorrelationStrategy`
    注解来配置自定义的 `CorrelationStrategy`。

    *   `ReleaseStrategy`：一种用于决定输入消息组何时完成以便进行聚合的机制。可以通过 `release-strategy-method`
    或 `release-strategy-expression` 属性，或者在 Java 配置中使用 `@ReleaseStrategy` 注解来配置自定义的
    `ReleaseStrategy`。


    默认情况下，聚合基于以下消息头执行：


    *   `correlationId`：告知聚合器具有相同 `correlationId` 的消息应被合并（基于 `correlationId` 的 `CorrelationStrategy`）。

    *   `sequenceSize`：告知聚合器要聚合的消息组的大小。

    *   `sequenceNumber`：告知聚合器当前消息在待聚合组中的顺序。


    因此，默认情况下，聚合器的 `ReleaseStrategy` 基于收集消息，然后检查它们的 `sequenceSize`、`sequenceNumber`
    和 `correlationId` 来工作。当我们拥有一个完整的关联消息组时，消息就会被释放。


    我们还可以为聚合器组件配置超时，这样一组消息将在定义的时间后被释放/聚合。在这种情况下，我们必须指定是聚合部分消息还是丢弃部分消息组。

    '
- fmt: '聚合器显然必须首先临时存储消息，然后才能聚合它们。因此，它是一个比拆分器复杂得多的组件，因为它为部分消息组实现了内部存储。


