    ## Tasklet Step\n\nChunk-oriented processing is not the only type of step we need\
    \ to cover for enterprise application use cases. Sometimes we need to perform\
    \ a single action as part of a bigger flow. For example, we might need to send\
    \ a notification at the end of a job or perform a single stored procedure call.\
    \ SB provides the `Tasklet` interface. It has only one method, `execute`, where\
    \ we can place our custom logic. This instance can then be wrapped into the `TaskletStep`\
    \ class and used as a `Step` in the SB flow.\n\n### Common Classes for Tasklet\
    \ Examples\n\nVarious examples in this chapter use simple `Tasklet` steps to highlight\
    \ Spring Batch features that control job execution flow. [Listing 9-17](#9781484207949_Ch09_1.xhtml#FPar19)\
    \ shows this class, which is used often in this chapter.\n\n[***Listing 9-17***](#9781484207949_Ch09_1.xhtml#_FPar19).\
    \ Simple Executable Point (0900-batch-common)\n\n```\npackage net.lkrnac.book.eiws.chapter09.step;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Component;\n\
    \n@Slf4j\n@Component\npublic class SimpleExecutablePoint {\n  public void execute(String\
    \ message) {\n    log.info(message);\n  }\n}\n```\n\nThis simple Spring bean uses\
    \ Lombok to log a given message into the `execute()` method.\n\n![Image](images/sq.jpg)\
    \ **Note** `SimpleExecutablePoint` is useless for real-world applications, but\
    \ it is handy for the examples in this chapter, because we can fake this bean\
    \ and verify that the SB configuration works as expected. Tests alongside the\
    \ book examples can be found in the GitHub repository (`https://github.com/lkrnac/book-eiws-code-samples`).\n\
    \nOur domain for the `Tasklet` type of batch flows used in our examples is the\
    \ preparing of tea. When we want to prepare tea, we need to perform a few steps\
    \ to get a tasty result. For example, we might need to Boil Water, Add Tea to\
    \ cup, and Add Water to cup. [Listing 9-18](#9781484207949_Ch09_1.xhtml#FPar21)\
    \ shows the class simulating the Boil Water step.\n\n[***Listing 9-18***](#9781484207949_Ch09_1.xhtml#_FPar21).\
    \ Class Simulating the Boil Water step (0900-batch-common)\n\n```\npackage net.lkrnac.book.eiws.chapter09.step.tea;\n\
    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\nimport org.springframework.batch.core.StepContribution;\n\
    import org.springframework.batch.core.scope.context.ChunkContext;\nimport org.springframework.batch.core.step.tasklet.Tasklet;\n\
    import org.springframework.batch.repeat.RepeatStatus;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class BoilWater\
    \ implements Tasklet {\n  private SimpleExecutablePoint simpleExecutableStep;\n\
    \n@Autowired\n  public BoilWater(SimpleExecutablePoint simpleExecutableStep) {\n\
    \    super();\n    this.simpleExecutableStep = simpleExecutableStep;\n  }\n\n\
    @Override\n  public RepeatStatus execute(StepContribution contribution,\n    \
    \  ChunkContext chunkContext) throws Exception {\n    simpleExecutableStep.execute(\"\
    Boil Water\");\n    return RepeatStatus.FINISHED;\n  }\n}\n```\n\nThis simple\
    \ Spring component autowires `SimpleExecutablePoint`. In the execute method, we\
    \ call `simpleExecutableStep.execute()` to simulate the Boil Water step. SB injects\
    \ the `StepContribution` and `ChunkContext` instances into this method and expects\
    \ a return value of type `RepeatStatus`. Use of these types is explained in later\
    \ sections. For this example, we just need to know that `RepeatStatus.FINISHED`\
    \ indicates to the DB a successful completion of `Step`.\n\nWe won’t list the\
    \ `AddTea` and `AddWater` classes, because they are similar to `BoilWater`; we’re\
    \ only simulating the tea preparation step with a different text message.\n\n\
    ### Tasklet Step Example with XML Configuration\n\nNow that we’ve sketched the\
    \ domain, we can take a look at the SB configuration in [Listing 9-19](#9781484207949_Ch09_1.xhtml#FPar22).\n\
    \n[***Listing 9-19***](#9781484207949_Ch09_1.xhtml#_FPar22). XML Configuration\
    \ of XML Tasklet Step Example (File batch-config.xml in Folder src/main/resources\
    \ of Example Project 0904-tasklet-step-xml)\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans:beans xmlns:beans=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns=\"http://www.springframework.org/schema/batch\"\
    \n  xsi:schemaLocation=\"http://www.springframework.org/schema/batch\n    http://www.springframework.org/schema/batch/spring-batch.xsd\n\
    \    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
    >\n\n<job id=\"prepareTeaJob\">\n    <step id=\"boilWaterStep\" next=\"addTeaStep\"\
    >\n      <tasklet ref=\"boilWater\"/>\n    </step>\n    <step id=\"addTeaStep\"\
    \ next=\"addWaterStep\">\n      <tasklet ref=\"addTea\"/>\n    </step>\n    <step\
    \ id=\"addWaterStep\">\n      <tasklet ref=\"addWater\"/>\n    </step>\n  </job>\n\
    </beans:beans>\n```\n\n`Job` in this case consists of three steps; each one refers\
    \ to the `Tasklet` instance of `BoilWater`, `AddTea`, and `AddWater`. Each step\
    \ has to have a unique name and needs to specify which step should go `next` after\
    \ its completion. The main class `BatchApplication` and `BatchConfiguration` are\
    \ exactly the same as for XML chunk-oriented examples in [Listings 9-7](#9781484207949_Ch09_1.xhtml#FPar8)\
    \ and [9-8](#9781484207949_Ch09_1.xhtml#FPar9). When we run `BatchApplication`\
    \ as a Java application, we see the output in [Listing 9-20](#9781484207949_Ch09_1.xhtml#FPar23).\n\
    \n[***Listing 9-20***](#9781484207949_Ch09_1.xhtml#_FPar23). Output of Tasklet\
    \ Step Example\n\n```\n2015-09-26 23:23:04.933  INFO 6564 --- [           main]\
    \ o.s.b.c.l.support.SimpleJobLauncher      : Job: [FlowJob: [name=prepareTeaJob]]\
    \ launched with the following parameters: [{}]\n2015-09-26 23:23:04.971  INFO\
    \ 6564 --- [           main] o.s.batch.core.job.SimpleStepHandler     : Executing\
    \ step: [boilWaterStep]\n2015-09-26 23:23:04.986  INFO 6564 --- [           main]\
    \ n.l.b.e.c.step.SimpleExecutablePoint     : Boil Water\n2015-09-26 23:23:05.013\
