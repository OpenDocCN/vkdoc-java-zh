    Spring Context Configuration


    The previous section highlighted how an XSD contract can be mapped to Java logic
    with the Spring Web Services framework. A class annotated with `@Endpoint` is
    a candidate for Spring component scanning. So this class can be treated as a Spring
    component. Various options exist for integrating it into Spring’s IoC container.


    The first option is to use the Spring XML configuration shown in [Listing 3-12](#9781484207949_Ch03.xhtml#FPar16).


    [***Listing 3-12***](#9781484207949_Ch03.xhtml#_FPar16). Web Service XML Context
    Configuration (File web-service-config.xml in Example Project 0301-ws-xmlconfig-service)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xmlns:ws="http://www.springframework.org/schema/web-services"

      xsi:schemaLocation="http://www.springframework.org/schema/web-services

            http://www.springframework.org/schema/web-services/web-services.xsd

            http://www.springframework.org/schema/beans

            http://www.springframework.org/schema/beans/spring-beans.xsd

            http://www.springframework.org/schema/context

            http://www.springframework.org/schema/context/spring-context.xsd">


    <context:component-scan

            base-package="net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server" />


    <ws:annotation-driven />


    <ws:dynamic-wsdl id="userDetails" portTypeName="UserDetailsPort"

        locationUri="/"

        targetNamespace="http://localhost:10301/0301-ws-xmlconfig-service">

        <ws:xsd location="classpath:userDetailsSchema.xsd" />

      </ws:dynamic-wsdl>

    </beans>

    ```


    This configuration uses three namespaces from Spring’s deck of XML schemas:


    *   `web-services`: For web services configuration

    *   `beans`: Basic Spring IoC namespace

    *   `context`: For component scanning


    The XML element `<context:component-scan>` scans for an endpoint defined in [Listing
    3-9](#9781484207949_Ch03.xhtml#FPar13). The `<ws:annotation-driven>` configuration
    says to Spring that we want to use Web Services annotations. The last element
    is the most interesting: `<ws:dynamic-wsdl>` is used for dynamic generation of
    WSDL based on the XSD contract file located in our classpath. Spring scans the
    classpath for the XSD schema file specified. As we are using Maven in these examples,
    `userDetailsSchema.xsd` is located in the folder `src/main/resources`. The location
    URI specifies the URL endpoint from which the generated WSDL will be served. We
    used the root-level location for WSDL exposure. The parameter `id` specifies the
    exposed name of the WSDL file. So when we run the server on `localhost` and port
    10301, the final WSDL location would be `http://localhost:10301/0301-ws-xmlconfig-service/userDetails.wsdl`.'
