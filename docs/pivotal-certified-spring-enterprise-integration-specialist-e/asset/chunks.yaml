    \ this Spring Boot main class needs to enable batch processing and enable scheduling\
    \ for asynchronous polling of `inMasterAggregatedChannel` by the `partitionHandler`\
    \ bean.\n\n## Executing Remote Partitioning Example\n\nIt is obvious that this\
