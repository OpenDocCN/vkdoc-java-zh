    \    : Text persisted: message2\n```\n\nNotice the timing on these log entries.\
    \ The handoff of `message1` happens nearly immediately as it’s sent to the SI\
    \ flow. This is because the outbound channel adapter is already waiting for the\
    \ message to arrive to `inChannel`. But the second handoff of `message2` happens\
    \ approximately 1 second after the handoff of `message1`. This is because the\
    \ main thread is blocked in the `wrapperService.processText(MESSAGE2)` call until\
    \ the channel adapter poller triggers reading of `message2`.\n\n## ExecutorChannel\n\
    \n`ExecutorChannel` is a subscribable channel, so the consumer is a passive component\
    \ waiting to be triggered by the received message. But as opposed to `DirectChannel`,\
    \ the message is passed from the sender to the consumer in a separate thread.\
