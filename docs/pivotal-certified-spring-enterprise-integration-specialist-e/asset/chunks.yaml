    问题在于，消息被存储到数据库中，之后，`postprocess` 在提交第一条消息之前抛出了异常。在重新投递时，同一条消息会第二次被存储到数据库中。


    JmsTransactionManager


    Spring 还提供了通过其事务划分功能处理 JMS 事务的可能性，即使用 `@Transactional` 注解。当我们注册 `JmsTransactionManager`
    bean 作为 Spring 事务的管理器时，这种支持是可能的。在这种情况下，Spring 会忽略 JMS 原生的确认模式和事务配置。此支持适用于 JMS
    1.1 和 JMS 2.0。


    `JmsTransactionManager` 可用于单个 `ConnectionFactory`，因为它将 JMS `Connection`/`Session`/`JMSContext`
    绑定到线程。对于每个 `ConnectionFactory` 的线程绑定 `Session`，此配置可能很方便。


    建议将此事务管理器与前一章中展示的 `CachingConnectionFactory` 结合使用。


    一个从 JMS 配置开始的 `JmsTransactionManager` 示例如 清单 6-26 所示。


