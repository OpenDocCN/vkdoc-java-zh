    Custom Aggregator Example with Java Configuration


    This example borrows some classes from the previous example, `0827-aggregator-xml`**:**


    *   `SiWrapperServiceFuture` ([Listing 8-97](#9781484207949_Ch08_2_Ext.xhtml#FPar100))

    *   `AsyncMessageSender` ([Listing 8-99](#9781484207949_Ch08_2_Ext.xhtml#FPar102))

    *   `SiApplication` ([Listing 8-100](#9781484207949_Ch08_2_Ext.xhtml#FPar103))


    [Listing 8-102](#9781484207949_Ch08_2_Ext.xhtml#FPar105) shows the Java configuration
    of the aggregator component.


    [***Listing 8-102***](#9781484207949_Ch08_2_Ext.xhtml#_FPar105). Java Configuration
    of Aggregator (0828-aggregator-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import java.util.List;

    import org.springframework.integration.annotation.Aggregator;

    import org.springframework.integration.annotation.CorrelationStrategy;

    import org.springframework.integration.annotation.MessageEndpoint;

    import org.springframework.integration.annotation.ReleaseStrategy;


    @MessageEndpoint

    public class SimpleAggregator {

      @Aggregator(inputChannel = "inChannel", outputChannel = "aggregatedChannel")

      public String aggregate(List<String> messages) {

        return messages.stream().reduce((m1, m2) -> m1 + "," + m2).get();

      }


    @ReleaseStrategy

      public boolean releaseChecker(List<String> messages) {

        return messages.size() == 2;

      }


    @CorrelationStrategy

      public String correlateBy(String message) {

        return message.substring(7);

      }

    }

    ```


    The class is annotated with `@MessageEndpoint` to mark it as an SI component for
    the integration component scan. The first method, `aggregate()`, joins messages.
    We used the Java 8 Stream API for this purpose. It converts the message collection
    into the Java 8 stream and uses the `reduce()` feature to concatenate two elements
    of the stream into one. Finally, it again converts the stream into the collection
    via the `get()` method. The `@Aggregator` annotation requires the `inputChannel`
    and `outputChannel` attributes to be defined.


    The second method, `releaseChecker()`, defines a custom release strategy for the
    aggregator. When the group reaches two messages, we return `true` to inform SI
    about the fulfilled release condition. The last method, `correlateBy()`, defines
    the correlation strategy for this aggregator. If the returned value is the same,
    the messages belong together and should be aggregated into one group.


    The rest of the SI flow is defined via the XML configuration in [Listing 8-103](#9781484207949_Ch08_2_Ext.xhtml#FPar106)—partially
    to highlight how to combine XML and Java configurations for an SI application,
    and partially to decrease the number of listings needed for this example.


    [***Listing 8-103***](#9781484207949_Ch08_2_Ext.xhtml#_FPar106). SI Configuration
    for Java Aggregator Example (File si-config.xml in Folder src/main/resources of
    Example Project 0828-aggregator-javaconfig)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:task="http://www.springframework.org/schema/task"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:annotation-config/>


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceFuture"
    />


    <int:channel id="inChannel" />

      <int:channel id="aggregatedChannel" />


    <int:service-activator input-channel="aggregatedChannel" ref="writeService"

        method="writeAndIndicateSuccess" />

    </beans>

    ```


    The element `<int:annotation-config>` is the XML equivalent of the `@IntegrationComponentScan`
    annotation, so it performs a scan for the `@MessageEndpoint` components. Better
    placement of this configuration would be on the main Spring configuration class,
    but we want to highlight this XML configuration feature of the SI framework. The
    inbound gateway, service activators, and two channels are constructs we’ve already
    seen in previous examples.


    When we run this example via the main `SiApplication` class, we get similar output
    similar to that of the `0827-aggregator-xml` example in [Listing 8-101](#9781484207949_Ch08_2_Ext.xhtml#FPar104).


