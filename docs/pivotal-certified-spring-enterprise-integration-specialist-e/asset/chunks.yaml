    的网名闻名。他为 Apress 出版社技术审阅了多本书籍，包括《Pro Spring, 第四版》（2014）；《Practical Spring LDAP》（2013）；《Pro
    JPA 2, 第二版》（2013）；以及《Pro Spring Security》（2013）。


    阅读他关于众多 Spring 技术的 13 篇详细教程，并通过他的博客 `www.manueljordanelera.blogspot.com` 联系他。你也可以在他的
