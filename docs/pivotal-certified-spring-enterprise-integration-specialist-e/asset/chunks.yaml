    重复消息场景


    与确认模式一样，本地 JMS 事务的接收也可能出错。想象一下，将本章 Spring JMS 示例中的 main 类和 sender 类与上一个示例（清单 6-24）中的
    JMS 配置以及 清单 6-25 中的监听器结合起来。


    ***清单 6-25***. 使用 `SESSION_TRANSACTED` 模式的重复消息场景的监听器类 (0611-transacted-listener-duplicate)


