    语言中一些冗长的部分。`hashCode` 和 `equals` 方法由 `@EqualsAndHashCode` 注解生成。由于我们只需要在相等性契约中使用
    `email` 属性，因此在注解参数 `of` 中指定了它。如果我们没有显式指定，Lombok 将在哈希/相等性契约中使用 `User` POJO 的所有属性。


    此外，Lombok 通过 `@Data` 注解帮助我们为 `User` 类中的所有属性生成 getter 和 setter 方法。


