    \ Custom Error Handler for RestTemplate (0406-rest-errorhandler-client)\n\n```java\n\
    package net.lkrnac.book.eiws.chapter04.client;\n\nimport java.io.IOException;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.http.HttpStatus;\n\
    import org.springframework.http.client.ClientHttpResponse;\nimport org.springframework.web.client.ResponseErrorHandler;\n\
    import org.springframework.web.client.RestTemplate;\n\n@Configuration\n@ComponentScan\n\
    public class ClientConfiguration {\n  @Bean\n  public RestTemplate restTemplate()\
    \ {\n    RestTemplate restTemplate = new RestTemplate();\n    restTemplate.setErrorHandler(new\
    \ ResponseErrorHandler() {\n\n@Override\n      public boolean hasError(ClientHttpResponse\
    \ response) throws IOException {\n        HttpStatus statusCode = response.getStatusCode();\n\
    \        return statusCode.is5xxServerError();\n      }\n\n@Override\n      public\
    \ void handleError(ClientHttpResponse response) throws IOException {\n       \
    \ throw new CustomException(response.getStatusText());\n      }\n    });\n   \
    \ return restTemplate;\n  }\n}\n```\n\n这次，我们不只是创建带有所有默认依赖项的`RestTemplate`实例。我们使用`RestTemplate.setErrorHandler`方法来实现我们自己的自定义错误处理器。该实现被包装到`ResponseErrorHandler`类型的匿名内部类中。\n\
    \n由于匿名内部类是`ResponseErrorHandler`类型，它必须实现两个方法。`hasError`方法应指示`ClientHttpResponse`实例是否有错误。作为我们的自定义实现，我们应决定何时响应应触发错误。在这种情况下，我们决定在HTTP响应指示服务器错误5*xx*时抛出异常。\n\
    \n自定义错误处理器的第二个方法是`handleError`。该方法旨在在发生错误时执行所需操作。在这种情况下，我们希望抛出带有从服务器接收的错误消息的`CustomException`。\n\
    \n## 客户端测试\n\nSpring Framework出色的可测试性也适用于REST客户端代码。其概念是基于用于REST客户端代码的`RestTemplate`实例创建一个假服务器。这个模拟服务器记录预期的请求，并向被测客户端代码发送假响应。该假服务器由`org.springframework.test.web.client.MockRestServiceServer`类表示。\n\
    \n模拟服务器的实例由`MockRestServiceServer.createServer`工厂方法创建，该方法将`RestTemplate` Bean作为参数。它必须与在被测代码中执行REST请求时使用的`RestTemplate`实例相同。\n\
    \n`MockRestServiceServer`有两个方法：`expect`和`verify`，用于测试。`expect`方法在假服务器中记录预期行为。它用于链式请求期望并记录将返回给测试客户端逻辑的预期响应。`expect`返回`ResponseActions`接口的实例，该接口提供两个方法：\n\
    \n*   `andExpect`\n    *   接受`org.springframework.test.web.client.RequestMatcher`作为参数，允许记录预期的内容、标头、HTTP方法和URI。\n\
    \    *   `org.springframework.test.web.client.match.MockRestRequestMatchers`是一个抽象类，包含工厂方法`requestTo`、`header`、`content`、`jsonPath`、`xpath`以及任何生成`RequestMatcher`实例的方法，可用于构建全面的请求期望。\n\
    *   `andRespond`\n    *   接受`org.springframework.test.web.client.ResponseActions`作为参数，允许定义响应的内容、HTTP状态和标头。\n\
    \    *   `org.springframework.test.web.client.response.MockRestResponseCreators`是一个抽象类，包含工厂方法`withSuccess`、`withCreatedEntity`、`withNoContent`、`withBadRequest`、`withUnauthorizedRequest`、`withServerError`和`withStatus`，这些方法生成`ResponseCreators`实例，可用于在假服务器中记录全面的HTTP响应。\n\
    \n`verify`方法用于验证由`expect`方法记录的行为。\n\n为了增强可读性，此客户端测试概念的示例被拆分为多个清单。首先，[清单4-40](#9781484207949_Ch04.xhtml#FPar50)显示了测试的导入、常量和属性。\n\
    \n[***Listing 4-40***](#9781484207949_Ch04.xhtml#_FPar50). First Part of Client-Side\
    \ Test (0404-rest-boot-client)\n\n```java\npackage net.lkrnac.book.eiws.chapter04.client;\n\
