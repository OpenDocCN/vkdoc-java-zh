- fmt: "# HTTP 消息抽象\n\n- `javax.servlet.ServletRequest`和`javax.servlet.ServletResponse`的HTTP子接口。\n\
    - 这些接口以`InputStream`的形式提供消息负载。\n- `javax.servlet.http.HttpServletRequest`是表示HTTP请求抽象的接口。\n\
    - `javax.servlet.http.HttpServletResponse`是表示HTTP响应抽象的接口。\n\n## Spring HTTP 消息抽象\n\
    \n- 这些接口提供转换为泛型类型`T`的消息负载。\n- 泛型类型`T`指定负载的Java类型。\n- `org.springframework.http.HttpEntity<T>`是Spring提供的表示HTTP请求抽象的接口。\n\
    - `org.springframework.http.ResponseEntity<T>`是Spring提供的表示HTTP响应抽象的接口。包含头部、正文和HTTP状态字段。\n\
    - `org.springframework.http.RequestEntity<T>`是Spring提供的表示HTTP请求抽象的接口。包含HTTP头部、正文、URI和HTTP方法字段。\n\
    \n要注入这些HTTP消息抽象之一，我们不需要使用任何注解。我们只需将它们用作处理HTTP请求的方法的参数（由`@RequestMapping`注解标记）。\n\
    \n# Spring MVC CRUD 示例\n\n[清单4-16](#9781484207949_Ch04.xhtml#FPar24)提供了一个使用Spring\
    \ MVC注解的简单HTTP映射示例。此示例使用了[清单4-3](#9781484207949_Ch04.xhtml#FPar9)和[4-4](#9781484207949_Ch04.xhtml#FPar11)中的服务和模型POJO。\n\
    \n[***清单4-16***](#9781484207949_Ch04.xhtml#_FPar24). Spring MVC 映射示例 (0404-rest-boot-server)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter04.javaconfig;\n\nimport java.util.Collection;\n\
    import net.lkrnac.book.eiws.chapter04.UrlConstants;\nimport net.lkrnac.book.eiws.chapter04.model.User;\n\
    import net.lkrnac.book.eiws.chapter04.service.UserService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.http.HttpHeaders;\nimport org.springframework.http.HttpStatus;\n\
    import org.springframework.http.ResponseEntity;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.web.bind.annotation.ExceptionHandler;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
    import org.springframework.web.bind.annotation.RequestBody;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
    import org.springframework.web.bind.annotation.RequestMethod;\nimport org.springframework.web.bind.annotation.ResponseBody;\n\
    import org.springframework.web.bind.annotation.ResponseStatus;\nimport org.springframework.web.util.UriComponents;\n\
    import org.springframework.web.util.UriComponentsBuilder;\n\n@Controller\n@RequestMapping(UrlConstants.USERS_URL)\n\
    public class UserController {\n  private final UserService userService;\n\n@Autowired\n\
    \  public UserController(UserService userService) {\n    super();\n    this.userService\
    \ = userService;\n  }\n\n@RequestMapping(method = RequestMethod.GET)\n  @ResponseBody\n\
    \  public Collection<User> getUsers() {\n    return userService.getAllUsers();\n\
    \  }\n\n@RequestMapping(value = \"/{id}\", method = RequestMethod.GET)\n  @ResponseBody\n\
    \  public User getUser(@PathVariable(\"id\") int identifier) {\n    return userService.getUser(identifier);\n\
    \  }\n\n@RequestMapping(method = RequestMethod.POST)\n  @ResponseStatus(HttpStatus.CREATED)\n\
    \  public ResponseEntity<Void> postUser(@RequestBody User user,\n      UriComponentsBuilder\
    \ uriBuilder) {\n    int identifier = userService.addUser(user);\n\nHttpHeaders\
    \ httpHeaders = new HttpHeaders();\n    String uri = UrlConstants.USERS_URL +\
    \ \"/{id}\";\n    UriComponents uriComponents =\n        uriBuilder.path(uri).buildAndExpand(identifier);\n\
    \    httpHeaders.setLocation(uriComponents.toUri());\n    return new ResponseEntity<Void>(httpHeaders,\
    \ HttpStatus.CREATED);\n  }\n\n@RequestMapping(value = \"/{id}\", method = RequestMethod.PUT)\n\
    \  @ResponseStatus(HttpStatus.OK)\n  public void putUser(@PathVariable(\"id\"\
    ) int identifier, @RequestBody User user) {\n    userService.updateOrAddUser(identifier,\
    \ user);\n  }\n\n@RequestMapping(value = \"/{id}\", method = RequestMethod.DELETE)\n\
    \  public void deleteUser(@PathVariable(\"id\") int identifier) {\n    userService.deleteUser(identifier);\n\
    \  }\n\n@ExceptionHandler(UnsupportedOperationException.class)\n  public ResponseEntity<String>\
    \ handleUnsupportedOperation(\n      UnsupportedOperationException uoe) {\n  \
    \  return new ResponseEntity<String>(uoe.getMessage(), HttpStatus.BAD_REQUEST);\n\
    \  }\n}\n```\n\n`@Controller`注解告诉Spring此类正在处理HTTP请求。`@RequestMapping`注解将此映射到基础URI\
    \ `/users`。在构造函数中，我们注入了`UserService`，这是[清单4-4](#9781484207949_Ch04.xhtml#FPar11)中的类。\n\
    \n`getUsers`方法映射到HTTP `GET`方法，因为在其方法级别的`@RequestMapping`注解中指定了这一点。因此，`getUsers`将处理所有对URI\
    \ `/users`的`GET`请求，因为方法级别的`@RequestMapping`中缺少`value`参数。因此，使用了类级别`@RequestMapping`注解中指定的基础URI。该方法本身读取存储在`UserService`中的所有`User`对象。`@ResponseBody`注解指示返回值应序列化为HTTP传输格式，在本例中是从`Collection<User>`转换为JSON数组。默认使用JSON，因为它是当今HTTP消息中最常用的传输格式。我们稍后将深入探讨一个可以缩小此配置范围的示例。\n\
    \n第二个Web方法是`getUser`。顾名思义，它应读取单个用户。因此，消费者需要指定他感兴趣的`User`对象。这是通过`@RequestMapping`注解中指定为参数`/{id}`的URI参数`id`完成的。该方法的最终URI映射将是`/users/{id}`，因为方法级别的`@RequestMapping`与类级别的相结合。借助`@PathVariable`注解，URI中的占位符值`{id}`被注入到`identifier`参数中。该方法根据注入的标识符读取用户并返回`User`对象。借助`@ResponseBody`注解，此对象将默认转换为JSON。\n\
    \n处理Web请求的第三个方法是`postUser`。与`getUsers`方法类似，`postUser`映射到`/users`端点并处理`POST` HTTP方法。HTTP消息负载被转换为`User`对象。这是由`@RequestBody`参数注解驱动的。此方法的第二个参数是`UriComponentBuilder`实例，它将帮助用户创建`Location`头部以满足HTTP契约，该契约指示服务器应为`POST`\
    \ HTTP消息响应所创建资源实例的位置。因此，该方法创建用户，读取创建的用户标识符，创建HTTP `Location`头部，并构造响应。为了使用自定义头部和201\
    \ Created HTTP状态构造HTTP响应，我们使用`ResponseEntity<Void>` Spring抽象。`@ResponseStatus`注解也声明式地定义了响应的状态将始终为201\
    \ Created。泛型类型`Void`用于创建空的HTTP消息正文。\n\n`putUser`方法处理`PUT` HTTP方法。`@ResponseStatus`注解确保它返回HTTP状态200\
    \ OK，但前提是底层逻辑未抛出异常。`putUser`使用上述方法从传入请求中提取`identifier`和`user`对象。该实现调用`userService`的`updateOrAddUser`方法，该方法将在我们的存储库中创建或替换`User`对象。"
  raw: '*   HTTP subinterfaces of `javax.servlet.ServletRequest` and `javax.servlet.ServletResponse`.

    *   These interfaces provide a message payload in the form of `InputStream`.

    *   `javax.servlet.http.HttpServletRequest` is the interface that represents an
    abstraction for the HTTP request.

    *   `javax.servlet.http.HttpServletResponse` is the interface that represents
    an abstraction for the HTTP response.


    Spring HTTP Message Abstractions


    *   These interfaces provide a message payload converted into generic type `T`.

    *   Generic type `T` specifies the Java type of the payload.

    *   `org.springframework.http.HttpEntity<T>` is the interface that represents
    an abstraction for the HTTP request provided by Spring.

    *   `org.springframework.http.ResponseEntity<T>` is the interface that represents
    an abstraction for the HTTP response provided by Spring. Contains fields for headers,
    body, and HTTP status.

    *   `org.springframework.http.RequestEntity<T>` is the interface that represents
    an abstraction for the HTTP request provided by Spring. Contains fields for HTTP
    headers, body, URI, and HTTP method.


    To inject one of these HTTP message abstractions, we don’t need to use any annotations.
    We just need to use them as parameters of the method handling the HTTP requests
    (annotated by `@RequestMapping`).


    String MVC CRUD Example


    [Listing 4-16](#9781484207949_Ch04.xhtml#FPar24) provides an example of a simple
    HTTP mapping that uses Spring MVC annotation. This example uses the service and
    model POJO from [Listings 4-3](#9781484207949_Ch04.xhtml#FPar9) and [4-4](#9781484207949_Ch04.xhtml#FPar11).


    [***Listing 4-16***](#9781484207949_Ch04.xhtml#_FPar24). Spring MVC Mapping Example
    (0404-rest-boot-server)


    ```

    package net.lkrnac.book.eiws.chapter04.javaconfig;


    import java.util.Collection;

    import net.lkrnac.book.eiws.chapter04.UrlConstants;

    import net.lkrnac.book.eiws.chapter04.model.User;

    import net.lkrnac.book.eiws.chapter04.service.UserService;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.http.HttpHeaders;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.ResponseEntity;

    import org.springframework.stereotype.Controller;

    import org.springframework.web.bind.annotation.ExceptionHandler;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.bind.annotation.RequestBody;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RequestMethod;

    import org.springframework.web.bind.annotation.ResponseBody;

    import org.springframework.web.bind.annotation.ResponseStatus;

    import org.springframework.web.util.UriComponents;

    import org.springframework.web.util.UriComponentsBuilder;


    @Controller

    @RequestMapping(UrlConstants.USERS_URL)

    public class UserController {

      private final UserService userService;


    @Autowired

      public UserController(UserService userService) {

        super();

        this.userService = userService;

      }


    @RequestMapping(method = RequestMethod.GET)

      @ResponseBody

      public Collection<User> getUsers() {

        return userService.getAllUsers();

      }


    @RequestMapping(value = "/{id}", method = RequestMethod.GET)

      @ResponseBody

      public User getUser(@PathVariable("id") int identifier) {

        return userService.getUser(identifier);

      }


    @RequestMapping(method = RequestMethod.POST)

      @ResponseStatus(HttpStatus.CREATED)

      public ResponseEntity<Void> postUser(@RequestBody User user,

          UriComponentsBuilder uriBuilder) {

        int identifier = userService.addUser(user);


    HttpHeaders httpHeaders = new HttpHeaders();

        String uri = UrlConstants.USERS_URL + "/{id}";

        UriComponents uriComponents =

            uriBuilder.path(uri).buildAndExpand(identifier);

        httpHeaders.setLocation(uriComponents.toUri());

        return new ResponseEntity<Void>(httpHeaders, HttpStatus.CREATED);

      }


    @RequestMapping(value = "/{id}", method = RequestMethod.PUT)

      @ResponseStatus(HttpStatus.OK)

      public void putUser(@PathVariable("id") int identifier, @RequestBody User user)
    {

        userService.updateOrAddUser(identifier, user);

      }


    @RequestMapping(value = "/{id}", method = RequestMethod.DELETE)

      public void deleteUser(@PathVariable("id") int identifier) {

        userService.deleteUser(identifier);

      }


    @ExceptionHandler(UnsupportedOperationException.class)

      public ResponseEntity<String> handleUnsupportedOperation(

          UnsupportedOperationException uoe) {

        return new ResponseEntity<String>(uoe.getMessage(), HttpStatus.BAD_REQUEST);

      }

    }

    ```


    The `@Controller` annotation tells Spring that this class is handling HTTP requests.
    The `@RequestMapping` annotation maps this class to the base URI `/users`. In
    the constructor, we inject the `UserService`, which is the class from [Listing
    4-4](#9781484207949_Ch04.xhtml#FPar11).


    The `getUsers` method is mapped to the HTTP `GET` method, because this is specified
    in its method-level `@RequestMapping` annotation. So `getUsers` will handle all
    `GET` requests for URI `/users`, because the value parameter is missing in the
    method-level `@RequestMapping`. Therefore, the basic URI specified in the class-level
    `@RequestMapping` annotation is used. The method itself reads all the `User` objects
    stored in `UserService`. The `@ResponseBody` annotation indicates that the return
    value should be serialized into HTTP transport format, which is a conversion from
    `Collection<User>` into a JSON array in this case. JSON is used by default because
    it is the most used transport format in HTTP messages nowadays. We will dive into
    an example that can narrow down this configuration later.


    The second web method is `getUser`. As its name suggests, it should read a single
    user. Therefore, the consumer needs to specify which `User` object he is interested
    in. This is done via the URI parameter `id` specified as the parameter `/{id}`
    in the `@RequestMapping` annotation. The final URI mapping of this method will
    be `/users/{id}`, because the method-level `@RequestMapping` is combined with
    class level 1. With the help of the `@PathVariable` annotation, the placeholder
    value `{id}` from the URI is injected into the `identifier` parameter. The method
    reads the user based on the injected identifier and returns the `User` object.
    This object will be converted into JSON by default with the help of the `@ResponseBody`
    annotation.


    The third method handling web requests is `postUser`. Similar to the `getUsers`
    method, `postUser` is mapped to the `/users` endpoint and handles the `POST` HTTP
    method. The HTTP message payload is converted into the `User` object. This is
    driven by the `@RequestBody` parameter annotation. The second parameter of this
    method is the `UriComponentBuilder` instance, which will help the user create
    the `Location` header to fulfill the HTTP contract, which indicates that the server
    should respond with the location of the created resource instance for the `POST`
    HTTP message. So the method creates the user, reads the created user identifier,
    creates the HTTP `Location` header, and constructs the response. To construct
    the HTTP response with a custom header and 201 Created HTTP status, we use the
    `ResponseEntity<Void>` Spring abstraction. The `@ResponseStatus` annotation also
    declaratively defines that the status of the response will always be 201 Created.
    The generic type `Void` is used to create the empty HTTP message body.


    The `putUser` method handles the `PUT` HTTP method. The `@ResponseStatus` annotation
    ensures that it returns the HTTP status 200 OK, but only if no exception was thrown
    from underneath the logic. `putUser` uses the mentioned approaches to extract
    the `identifier` and `user` objects from the incoming request. The implementation
    calls the `updateOrAddUser` method of `userService`, which will create or replace
    the `User` object in our repository.'
