    and starts the Spring Boot application. Notice that we didn’t register the channels
    `inChannel` and `aggregatedChannel` anywhere. SI can sometimes figure out wiring
    without explicit definition of channels. It creates `DirectChannel`s under the
    hood in such a case (as discussed in the following “Message Channel” section).


    After everything is configured, we retrieve the `AsyncMessageSender` bean and
    send four messages with correlation IDs. The output after running this class is
    similar to that of the `0827-aggregator-xml` example in [Listing 8-101](#9781484207949_Ch08_2_Ext.xhtml#FPar104).


