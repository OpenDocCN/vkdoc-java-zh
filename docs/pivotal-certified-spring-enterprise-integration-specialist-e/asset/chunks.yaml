    这种 Spring 与 JAX-RS 的集成为开发 REST Web 服务提供了一种全面的方法。即使 Spring 提供了自己的替代 API，它也受到 Spring
    生态系统的支持。


    Spring MVC


    *Spring MVC* 是 Spring Web 支持的核心模块。其约定是 JAX-RS 抽象的竞争对手。顾名思义，这个 Spring 模块最初并非为开发
    REST 服务而设计。但自 Spring Framework 3.0 版本以来，用于模型-视图-控制器（MVC）架构风格的 API 已经足够成熟，足以涵盖
    REST 的相关需求。这是一个双赢的局面，因为熟悉 MVC API 的开发人员可以轻松切换到 REST 端点开发，反之亦然。


    JAX-RS 面向应用程序到应用程序的通信。因此，我们可以使用任何主流编程平台（包括浏览器中的 JavaScript）开发的客户端与 REST 服务器进行通信。但有时，我们可能需要使用纯
    HTML 作为端点的消费者。关于 HTML 的一个重要事实是，它仅支持 `GET`（例如，用户点击网页链接时）和 `POST`（例如，用户提交 HTML 表单时）HTTP
    方法。问题在于，对于纯 HTML 来说，缺少 `DELETE`、`PUT` 和 `HEADER` HTTP 方法。这对 JAX-RS 来说将是一个重大问题，因为它不期望如此受限的环境。


    Spring MVC 通过一种称为 *HTTP 方法转换* 的技术支持浏览器作为 REST 客户端。此概念背后的主要思想是使用 HTML 表单执行带有隐藏表单参数的
    `POST`。该参数应指定要执行的所需 HTTP 方法，可以是 `DELETE`、`HEADER` 或 `PUT`，而不是 `POST`。在服务器端，我们可以注册一个
    Servlet 过滤器，该过滤器会将 HTML `POST` 请求转换为由隐藏表单输入参数定义的 HTTP 请求。但此功能超出了本书的范围。


    Spring MVC 和 JAX-RS 之间的另一个区别在于客户端 API 支持。JAX-RS 在 2.0 版本中引入了客户端 API。此版本的 JAX-RS
    是标准 Java EE 7 的一部分。因此，如果我们运行的是较旧的 Java EE 版本，则没有原生的 JAX-RS 客户端 API 支持。而企业公司通常停留在
    Java EE 5 或 6 上，这主要是因为昂贵的 Java EE 应用服务器的许可成本，因为升级对公司来说可能是一笔重大投资。使用 Spring MVC，即使在较旧的
    Java EE 应用服务器中，您也可以使用客户端 API，因为 Spring Framework 是轻量级的，并且可以轻松地插入任何 Java EE 平台。


    Spring MVC 模块相对于 JAX-RS 的一个显著优势是对测试的支持。Spring MVC 测试模块提供了强大的模拟构造，允许对服务器端和客户端进行集成测试或单元测试。这些构造允许在
    Servlet 容器之外测试映射。这在持续集成中是一个巨大的优势。


    在考虑 REST 编程模型时，使 Spring MVC API 处于更有利位置的一个重要特性是内容协商。使用 Spring MVC，此功能是框架开箱即用的内置功能。但
    JAX-RS 没有对内容协商的标准支持；因此，开发人员需要依赖他们正在使用的非标准 JAX-RS 实现，或者显式地实现它。

