- fmt: "![9781484207949_Fig08-05.jpg](images/9781484207949_Fig08-05.jpg)\n\n[Figure\
    \ 8-5](#9781484207949_Ch08_1.xhtml#_Fig5). Visualization of SI flow for generic\
    \ inbound gateway example\n\n## Generic Messaging Gateway Example Based on Java\
    \ Configuration\n\n[Listing 8-30](#9781484207949_Ch08_1.xhtml#FPar33) covers the\
    \ SI configuration class.\n\n[***Listing 8-30***](#9781484207949_Ch08_1.xhtml#_FPar33).\
    \ Java Configuration for Generic Inbound Gateway Example (0809-gateway-generic-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.annotation.IntegrationComponentScan;\n\
    import org.springframework.integration.channel.DirectChannel;\nimport org.springframework.messaging.MessageChannel;\n\
    \n@Configuration\n@IntegrationComponentScan\npublic class SiConfiguration {\n\
    \  @Bean\n  public MessageChannel inChannel() {\n    return new DirectChannel();\n\
    \  }\n}\n```\n\nAlongside the standard Spring `@Configuration` annotation, we\
    \ also use the `@IntegrationComponentScan` annotation. It is needed to scan the\
    \ current package and its subpackages for SI components. In addition, the `inChannel`\
    \ bean is configured as an SI channel. [Listing 8-31](#9781484207949_Ch08_1.xhtml#FPar34)\
    \ shows the output of the service activator configuration.\n\n[***Listing 8-31***](#9781484207949_Ch08_1.xhtml#_FPar34).\
    \ Output Service Activator for Generic Messaging Gateway Example (0809-gateway-generic-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.integration.annotation.ServiceActivator;\nimport org.springframework.stereotype.Service;\n\
    \n@Service\npublic class WriteServiceAnnotated {\n  private WriteRepository writeRepository;\n\
    \n@Autowired\n  public WriteServiceAnnotated(WriteRepository writeRepository)\
    \ {\n    super();\n    this.writeRepository = writeRepository;\n  }\n\n@ServiceActivator(inputChannel\
    \ = \"inChannel\")\n  public boolean writeAndIndicateSuccess(String message) {\n\
    \    return writeRepository.persist(message) == 1;\n  }\n}\n```\n\nThis service\
    \ activator is different from the previous examples, because it returns the result\
    \ of the write operation from the mapped method `WriteServiceAnnotated.writeAndIndicateSuccess()`\
    \ and thus is able to participate in bidirectional message flow. As we already\
    \ know, bidirectional flow involves automatic creation of a temporary reply channel,\
    \ which is used to send a reply back to the upstream consumer. [Listing 8-32](#9781484207949_Ch08_1.xhtml#FPar35)\
    \ covers the inbound gateway configuration.\n\n[***Listing 8-32***](#9781484207949_Ch08_1.xhtml#_FPar35).\
    \ Messaging Gateway Java Configuration (0809-gateway-generic-javaconfig)\n\n```\n\
    package net.lkrnac.book.eiws.chapter08.in;\nimport org.springframework.integration.annotation.Gateway;\n\
    import org.springframework.integration.annotation.MessagingGateway;\n\n@MessagingGateway\n\
    public interface SiWrapperServiceAnnotated {\n  @Gateway(requestChannel = \"inChannel\"\
    )\n  public boolean processText(String text);\n}\n```\n\nThe `@MessagingGateway`\
    \ annotation is needed to mark this interface as an SI inbound gateway. The wrapper\
    \ method is annotated by `@Gateway`, where `requestChannel` is a mandatory attribute.\
    \ This interface doesn’t have any implementation defined, because SI creates an\
    \ implementation based on the SI flow definition. Notice that this method returns\
    \ a Boolean value, which will be converted into a reply message of bidirectional\
    \ message flow, where a temporary reply channel is created under the hood automatically.\
    \ [Listing 8-33](#9781484207949_Ch08_1.xhtml#FPar36) shows the main class of this\
    \ example.\n\n[***Listing 8-33***](#9781484207949_Ch08_1.xhtml#_FPar36). Main\
    \ Class of Inbound Gateway Example Configured with Java (0809-gateway-generic-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08;\n\nimport lombok.extern.slf4j.Slf4j;\n\
    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceAnnotated;\n\nimport\
    \ org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.ApplicationContext;\n\n@Slf4j\n@SpringBootApplication\n\
    public class SiApplication {\n  public static void main(String[] args) throws\
    \ InterruptedException {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class,\
    \ args);\n\nSiWrapperServiceAnnotated wrapperService =\n        ctx.getBean(SiWrapperServiceAnnotated.class);\n\
    \    boolean result = wrapperService.processText(\"simple message\");\n    log.info(\"\
    Result: \" + result);\n  }\n}\n```\n\n`@ImportResource` is not needed in this\
    \ case, as we have a pure Java configuration. After the Spring Boot application\
    \ is started via the main method, we read our service interface from the Spring\
    \ context, send the message to the SI flow, and log the result. The output from\
    \ running this main class looks similar to the output of the previous example,\
    \ `0808-gateway-generic-xml` in [Listing 8-29](#9781484207949_Ch08_1.xhtml#FPar32).\n\
    \n## Technology-Specific Gateway Example\n\nThis example uses an HTTP inbound\
    \ gateway and JDBC outbound gateway to handle bidirectional SI flow. [Listing\
    \ 8-34](#9781484207949_Ch08_1.xhtml#FPar37) shows the XML SI configuration.\n\n\
    [***Listing 8-34***](#9781484207949_Ch08_1.xhtml#_FPar37). SI Flow XML Configuration\
    \ for Technology-Specific Gateways Example (File si-config.xml in Folder src/main/resources\
    \ of Example Project 0810-gateway-non-generic)\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:int-http=\"http://www.springframework.org/schema/integration/http\"\n\
    \  xmlns:int-jdbc=\"http://www.springframework.org/schema/integration/jdbc\"\n\
    \  xsi:schemaLocation=\"http://www.springframework.org/schema/integration/jdbc\
    \ http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd\n\
    \    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/integration/http\n    http://www.springframework.org/schema/integration/http/spring-integration-http.xsd\n\
    \    http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int-http:inbound-gateway path=\"/\" request-channel=\"inChannel\" supported-methods=\"\
    POST\"/>\n\n<int:channel id=\"inChannel\" />\n\n<int-jdbc:outbound-gateway data-source=\"\
    dataSource\" request-channel=\"inChannel\"\n    update=\"insert into TEXT_TABLE\
    \ values (:payload)\" />\n</beans>\n```\n\nWe use two technology-specific XML\
    \ namespaces here: `int-http` and `int-jdbc`. The input part uses an HTTP inbound\
