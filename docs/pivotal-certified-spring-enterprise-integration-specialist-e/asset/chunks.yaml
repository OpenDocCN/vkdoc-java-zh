    Consuming REST


    So far, we have focused on the server side of REST communication. But Spring also
    supports client-side access from the Java client application. The main class for
    client access to REST services is `org.springframework.web.client.RestTemplate`.
    You should create its instance via the constructor. It contains methods for performing
    all the REST-related HTTP methods, as shown in [Table 4-1](#9781484207949_Ch04.xhtml#Tab1).


    [Table 4-1](#9781484207949_Ch04.xhtml#_Tab1). `RestTemplate` Methods


    | HTTP Method | RestTemplate Method | Explanation |

    | --- | --- | --- |

    | `DELETE` | `delete` | Delete objects based on a given URI. |

    | `POST` | `postForLocation` | Post object and read location of it. |

    | `postForObject` | Post object and expect its instance as a response. |

    | `postForEntity` | Post object and expect a response of `ResponseEntity<T>` type.
    Generic type `T` is the type of the response payload. |

    | `HEAD` | `headForHeaders` | Read headers based on a given URL and return the
    `HttpHeaders` object. |

    | `GET` | `getForObject` | Read the object based on a given URL. |

    | `getForEntity` | Read the `ResponseEntity<T>` instance based on a given URI.
    Generic type `T` is the type of the response payload. |

    | `OPTIONS` | `optionsForAllow` | Return the value of the `Allow` header for a
    given URI. |

    | `PUT` | `put` | Perform the `PUT` of a given object against a given URI. |

    | Any HTTP method | `exchange` | Perform any HTTP method against a server and
    exchange `HttpEntity<T>` and `ResponseEntity<T>` instances. |'
