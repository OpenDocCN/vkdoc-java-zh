    总结


    本章介绍了更高级集成框架的优势，以及将更复杂的消息流抽象到诸如 Spring Integration 这样简洁框架中的必要性。我们重点介绍了 SI 的主要概念和杀手级特性。SI
    是轻量级的，因为它不需要任何特殊的运行时环境。


    我们涵盖了 SI 的三个主要构建块（消息、消息端点和消息通道），并介绍了每种组件的不同类型。我们展示了如何在需要时以编程方式创建消息组件，并强调了默认消息类型的不可变性。


    最值得注意的是，我们涵盖了许多用于消息路由、转换以及将 SI 流程连接到第三方技术或 Java 类和接口的消息端点类型。这些组件以被动（同步）和主动（带轮询器的异步）模式进行了说明。我们还介绍了哪些组件可以参与单向（即发即忘场景）和双向（请求-响应场景）流程。


    我们还研究了消息通道的类型和特性。我们介绍了它们的行为方式，以及为什么它们在主动与被动消息端点相关的不同场景中很有用。


    最后，我们涵盖了错误处理，以及与同步与异步消息流相关的错误和事务传播。


    第 9 章


