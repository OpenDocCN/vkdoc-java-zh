    首次接收到消息后，`message.getJMSRedelivered()` 返回 `false`；随后 `else` 部分中的 `preprocess()`
    抛出了消息。`readMessage()` 方法的处理失败，消息在未持久化的情况下被回滚。


    消息重新投递后，`message.getJMSRedelivered()` 返回 `true`，因此调用了 `processIfNeeded()` 方法。在此情况下，我们检查到
    `simpleService.isProcessed()` 为 false；于是我们调用 `simpleService.processText()`。最终，我们也恰好持久化了一条消息，符合预期。


    总结


    本章解释了 JMS 消息传递具有多种机制来处理安全的消息投递。我们列出了 JMS API 提供的所有投递确认和事务模式，并强调了使用该 API 可能带来的繁琐性。


    接着，我们探讨了如何将这些机制与 Spring 结合使用，并涵盖了各种成功和失败的场景，因为如果不小心，在我们集成 JMS 的系统中，消息很容易丢失或重复。


    我们还强调，如果不使用分布式事务，就无法跨多个事务系统获得 ACID 特性。但我们也解释了如何在不使用分布式事务的情况下优雅地处理这个问题。因此，我们现在知道了如何处理
    JMS 与其他事务性存储的集成，从而可靠地避免资源昂贵的分布式事务。


    第 7 章


    ![image](img/frontdot.jpg)


    分布式事务


    第 6 章涵盖了 Java 和 Spring 平台为事务性数据源（例如关系数据库）或 JMS 提供者提供的 ACID 特性（原子性、一致性、隔离性和持久性）。针对单一数据源的事务通常被称为*本地事务*。但单一数据源并非这种支持的终点。有时，我们可能需要确保跨多种类型存储的单一
    ACID 事务。


    Java（以及 Spring 的抽象层）提供了对跨多个数据源的单一事务的支持。这被称为*分布式事务*，有时也称为*全局事务*。这种事务通常超越单个服务器或网络主机的边界，并且必须在这些数据存储或
    JMS 服务器之间进行同步。


    理解分布式事务


    假设我们有一个 PostgreSQL 数据库和一个 HornetQ JMS 服务器。当我们在这些存储之上分布事务时，我们可以开始从 HornetQ JMS
    目标读取消息，并通过 JDBC 将它们插入到 PostgreSQL 存储中。如果某个插入语句失败，我们可以确保消息不会丢失，因为事务管理器将确保在此全局事务中执行的
    JMS 操作被回滚。


    可以想象，这种支持实现起来并不简单；需要具备多种机制才能使分布式事务成为可能。首先，需要一个特殊的*全局事务管理器*来协调跨多个事务性存储的分布式事务。该事务管理器需要符合
    *Java 事务 API (JTA)*。该 API 定义了分布式事务划分的机制。


    我们还需要确保参与全局事务的每个存储都支持 *XA 标准*（扩展架构标准）。该标准由 The Open Group（前身为 X/Open）制定，这是一个由多个专注于开放
    Unix 系统标准的成员组织组成的联盟（`www.opengroup.org`）。


    XA 标准规定了*全局事务管理器与本地事务管理器之间的接口*，以便能够参与 ACID 全局事务。一个符合 XA 标准的本地事务管理器需要有一个符合 JTA
    标准的全局事务管理器与之协作。你可以将 XA 视为本地事务管理器（处理单一数据源事务的管理器）与 JTA 全局事务管理器（协调本地管理器以在全局事务中协作的管理器）之间的桥梁。所以，长话短说，*XA
    需要 JTA* 才能正常工作。这些标准之间的协作通过*两阶段提交算法/协议*来确保，该协议按以下阶段工作：

    '
- fmt: "1.  Commit request phase (voting phase)\n    1.  全局事务管理器（也称为*协调者*）询问所有XA本地事务管理器（也称为*XA存储*或*参与者*），以决定需要执行提交还是回滚。\n\
    \    2.  如果参与者决定提交事务，则该参与者应等待全局事务管理器的指令，并且不对底层存储执行任何额外操作。\n    3.  参与者可以决定回滚事务，并将此意图告知全局事务管理器。\n\
    2.  Commit phase\n    *   d. 全局事务管理器根据所有响应，决定所有参与者（本地事务管理器）是否需要提交或回滚。\n    * \
    \  e. 本地事务管理器执行全局事务管理器命令的选定操作（提交或回滚）。\n\n此算法涉及多个步骤，可能难以想象。[图7-1](#9781484207949_Ch07.xhtml#Fig1)和[图7-2](#9781484207949_Ch07.xhtml#Fig2)提供了此算法成功和失败场景的时序图。\n\
    \n![9781484207949_Fig07-01.jpg](images/9781484207949_Fig07-01.jpg)\n\n[图7-1](#9781484207949_Ch07.xhtml#_Fig1).\
    \ JTA事务的成功场景\n\n![9781484207949_Fig07-02.jpg](images/9781484207949_Fig07-02.jpg)\n\
    \n[图7-2](#9781484207949_Ch07.xhtml#_Fig2). JTA事务的失败场景\n\n显然，此算法涉及大量仪式性操作，以在多个数据源之间实现ACID事务边界。我们必须强调，前面的图仅描绘了包含两个数据源的场景。如果我们添加更多数据源，仪式性操作的数量将会成倍增加。\n\
    \n重要的是要记住，JTA是Java企业版的一部分标准。因此，存在多种JTA和全局事务管理器的实现。这些实现可以是独立的，也可以是Java EE应用服务器的一部分。事实上，如果我们使用嵌入在应用服务器中的Java\
    \ EE事务管理，我们可以开箱即用地获得此支持。\n\n因此，JTA提供者列表将包括每个符合Java EE标准的应用服务器。此外，主要的独立提供者如下：\n\
    \n*   Atomikos (`www.atomikos.com`)\n*   Bitronix JTA (`https://github.com/bitronix/btm`)\n\
    \n分布式事务的缺点\n\n分布式事务非常强大。我们可以想象它能够神奇地解决前一章中描述的所有可能问题（包括重复数据和数据丢失）。但这种机制有显著的性能开销；如果我们引入两阶段提交，它涵盖了多个数据源（两个、三个甚至更多）及其涉及的各个阶段，那么此分布式事务的性能可能会非常慢。\n\
    \n这对于分布式系统中要求的高性能来说通常是一个巨大的问题。因此，这些系统的架构师经常试图避免使用两阶段提交。通常，更明智的做法是使用[第6章](#9781484207949_Ch06.xhtml)末尾描述的方法来处理单独数据源的提交，我们在那里进行了显式的重复检查。但有时需求迫使我们使用分布式事务。\n\
    \n性能降低是两阶段提交算法最大但并非唯一的问题。此类事务涉及太多部分，任何本地事务管理器或全局事务管理器的故障都可能破坏整个事务。此外，想象一下在提交请求阶段之后全局事务管理器发生故障的情况，此时所有本地事务管理器无法执行任何操作，只能等待它。它们将一直等待，直到超时出现（如果有的话）。\n\
    \n另一个问题是监控全局事务。如果我们想进行故障排除，常见的方法是对通信中涉及的各方进行日志记录。但分布式事务中至少涉及三方（一个全局和两个本地事务管理器），并且每一方都会为每个阶段创建至少一条日志条目。如果为生产系统启用了日志记录，则会增加大量日志记录开销，并且处理速度会变得更慢。\n\
    \n因此，我们可以看到有很多理由应该尽量避免使用分布式事务。\n\n使用Spring的分布式事务\n\n配置和实现分布式事务并非易事。但是，通过使用Spring抽象，我们可以免于这种复杂性。这种方法高度依赖于对Spring事务支持的理解。\n\
    \n此支持由一个名为`spring-tx`的核心模块提供。它提供了通用接口`PlatformTransactionManager`，该接口支持基于`@Transactional`注解的事务划分。`spring-tx`模块功能强大，是我们在处理事务性数据库或JMS提供者时Spring的主要旗舰特性之一。\n\
    \n![Image](images/sq.jpg) **注意** Spring事务支持不属于Spring企业集成认证的一部分。因此，它超出了本书的范围。但此知识对于理解使用Spring的分布式事务至关重要，并且是Spring核心认证的一部分。我将在此提及一个简单的黄金法则：由Spring管理的事务始于被`@Transactional`注解包裹的类或公共方法，并在代码离开此包裹逻辑时结束。但请记住，`@Transactional`注解具有各种属性，可以显著改变事务边界。\n\
    \n实际上，相同的API能够处理分布式事务。Spring提供了`PlatformTransactionManager`接口的实现`JtaTransactionManager`，从而启用了此支持。但请记住，`JtaTransactionManager`本身并没有为我们提供全局事务管理器的完整JTA兼容实现。它只是一个运行在Java\
    \ EE或独立JTA事务管理器实现（例如，Atomikos或Bitronix JTA）之上的包装器。因此，Spring本身并没有为我们提供此支持。这很明智，因为当不需要时，Spring为什么要重新发明轮子呢？Spring利用现有实现，并在`JtaTransactionManager`包装器的保护伞下使用它们。\n\
    \n此接口的主要含义是，当我们的事务性业务代码被标记为`@Transactional`时，它不需要知道我们正在使用分布式事务。我们只需要配置由JTA实现支持的`JtaTransactionManager`，并使用各种XA数据源来跨它们获得ACID事务特性。\n\
    \n当Java EE服务器强制平台上存在JTA事务管理器时，它们存在缺点。使用Spring，我们可以简单地更改配置并打开或关闭此支持。`@Transactional`注解边界指定了事务的开始，无论是全局事务还是本地事务。这将在本章的示例中看到。\n\
    \nJTA示例的通用类\n\n为了演示使用Spring跨多个数据源的分布式事务的ACID特性，我们将对类似于前一章中存在重复或丢失消息问题的示例应用JTA事务管理器。我们将在本章的所有示例中使用几个通用类。第一个，在[清单7-1](#9781484207949_Ch07.xhtml#FPar2)中，是位于DAO层的仓库。\n\
    \n[***清单7-1***](#9781484207949_Ch07.xhtml#_FPar2). 用于JTA示例的仓库类 (0700-jta-common)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter07;\n```"
  raw: "1.  Commit request phase (voting phase)\n    1.  The global transaction manager\
    \ (also called the *coordinator*) asks all the XA local transaction managers (also\
    \ called *XA stores* or *participants*) to decide whether a commit or rollback\
    \ needs to be performed.\n    2.  If the participant decides to commit the transaction,\
    \ the participant should then wait for orders from the global transaction manager\
    \ and not perform any additional actions against the underlying storage.\n   \
    \ 3.  The participant may decide to roll back the transaction and disclose this\
    \ intention to the global transaction manager.\n2.  Commit phase\n    *   d.  \
    \ The global transaction manager decides, based on all the responses, whether\
    \ all participants (local transaction managers) need to commit or roll back.\n\
    \    *   e.   The local transaction managers perform the chosen action (commit\
    \ or rollback) that was ordered by the global transaction manager.\n\nThis algorithm\
    \ involves various steps and can be hard to imagine. [Figures 7-1](#9781484207949_Ch07.xhtml#Fig1)\
    \ and [7-2](#9781484207949_Ch07.xhtml#Fig2) provide sequence diagrams for success\
    \ and failure scenarios for this algorithm.\n\n![9781484207949_Fig07-01.jpg](images/9781484207949_Fig07-01.jpg)\n\
    \n[Figure 7-1](#9781484207949_Ch07.xhtml#_Fig1). Success scenario for a JTA transaction\n\
    \n![9781484207949_Fig07-02.jpg](images/9781484207949_Fig07-02.jpg)\n\n[Figure\
    \ 7-2](#9781484207949_Ch07.xhtml#_Fig2). Failure scenario for a JTA transaction\n\
    \nIt is obvious that this algorithm involves a lot of ceremony to achieve the\
    \ ACID transaction boundary across various data sources. We have to emphasize\
    \ that the preceding figures depict scenarios with only two data sources. The\
    \ amount of ceremony would multiply if we were to add more data sources.\n\nIt\
    \ is important to remember that JTA is a standard that is part of Java Enterprise\
    \ Edition. Therefore, various implementations of JTA and global transaction managers\
    \ exist. These implementations can be stand-alone or part of a Java EE application\
    \ server. In fact, if we are using Java EE transaction management embedded with\
    \ an application server, we get this support out of the box.\n\nSo the list of\
    \ JTA providers would include every Java EE–compliant application server. Additionally,\
    \ the main stand-alone providers are as follows:\n\n*   Atomikos (`www.atomikos.com`)\n\
    *   Bitronix JTA (`https://github.com/bitronix/btm`)\n\nCons of Distributed Transactions\n\
    \nDistributed transactions are powerful. We can imagine that it is able to magically\
    \ solve all the possible problems (including duplicate data and lost data) described\
    \ in the previous chapter. But this mechanism has significant performance overhead;\
    \ if we bring into the equation a two-phase commit, which covers various data\
    \ sources (two, three, or even more) and the various phases involved in it, the\
    \ performance of this distributed transaction may be very slow.\n\nThis often\
    \ means a huge problem for the high-performance requirements demanded in distributed\
    \ systems. Therefore, the architects of these systems often try to avoid the need\
    \ for two-phase commits. It is often much smarter to handle commits for separate\
    \ data sources with the approach described at the end of [Chapter 6](#9781484207949_Ch06.xhtml),\
    \ where we did an explicit check for duplicates. But sometimes requirements force\
    \ us to use distributed transactions.\n\nReduced performance is the biggest, but\
    \ not the only, problem of the two-phase commit algorithm. Too many parts are\
    \ involved in such transactions, and the failure of any local transaction managers\
    \ or global transaction managers can destroy the whole transaction. In addition,\
    \ imagine a failure of a global transaction manager after the commit request phase,\
    \ when all the local transaction managers can’t perform any actions and are waiting\
    \ for him. They will keep waiting until a time-out appears (if there are any).\n\
    \nAnother problem is monitoring the global transaction. If we want to troubleshoot,\
    \ a common way is to log the sides involved in the communication. But three sides,\
    \ at a minimum, are involved in the distributed transaction (a global and two\
    \ local transaction managers), and each side creates at least one log entry for\
    \ each phase. If logging is enabled for a production system, a lot of logging\
    \ overhead is added, and processing slows even more.\n\nSo we can see there are\
    \ a lot of reasons that we should strive to avoid distributed transactions.\n\n\
    Distributed Transactions with Spring\n\nConfiguring and implementing distributed\
    \ transactions is not trivial. But we can be spared from this complexity by using\
    \ Spring abstractions. This approach highly depends on understanding Spring transactional\
    \ support.\n\nThis support is covered by a core module called `spring-``tx`. It\
    \ provides the generic interface `PlatformTransactionManager`, which enables transaction\
    \ demarcation based on the `@Transactional` annotation. The `spring-tx` module\
    \ is powerful and one of the main flagship features of Spring when we are dealing\
    \ with transactional databases or JMS providers.\n\n![Image](images/sq.jpg) **Note**  Spring\
    \ transactional support is not part of the Enterprise Integration with Spring\
    \ certification. Therefore, it is beyond the scope of this book. But this knowledge\
    \ is crucial for understanding distributed transactions with Spring and is part\
    \ of the Spring Core certification. I will mention the simple golden rule here:\
    \ a Spring managed transaction starts on a class or public method wrapped into\
    \ the `@Transactional` annotation and ends when code escapes this wrapped logic.\
    \ But bear in mind that the `@Transactional` annotation has various attributes\
    \ that can significantly change transaction boundaries.\n\nIn fact, the same APIs\
    \ are able to work with distributed transactions. Spring provides implementation\
    \ of  `JtaTransactionManager` of the `PlatformTransactionManager` interface, which\
    \ enables this support. But bear in mind that `JtaTransactionManager` itself doesn’t\
    \ give us full JTA-compliant implementation of a global transaction manager. It\
    \ is just a wrapper that operates on top of Java EE or a stand-alone JTA transaction\
    \ manager implementation (for example, Atomikos or Bitronix JTA). So Spring alone\
    \ doesn’t give us this support. This is smart, because why would Spring reinvent\
    \ the wheel when it’s not necessary? Spring takes advantage of existing implementations\
    \ and uses them under the `JtaTransactionManager` wrapper umbrella.\n\nThe main\
    \ implication of this interface is that our transacted business code doesn’t need\
    \ to know we are using a distributed transaction when it is marked as `@Transactional`.\
    \ We just need to configure `JtaTransactionManager`, backed up by a JTA implementation\
    \ and use various XA data sources to get ACID transaction characteristics across\
    \ them.\n\nJava EE servers have disadvantages when they force the presence of\
    \ a JTA transaction manager on the platform. With Spring, we can simply change\
    \ the configuration and turn this support on or off. The `@Transactional` annotation\
    \ boundary specifies the start of a transaction, whether it is a global or local\
    \ one. This will be seen in the examples of this chapter.\n\nCommon Classes for\
    \ JTA Examples\n\nTo demonstrate ACID characteristics of distributed transactions\
    \ across various data sources with Spring, we will apply a JTA transaction manager\
    \ on examples similar to those in the preceding chapter that had problems with\
    \ duplicating or losing messages. We will use a few common classes across all\
    \ examples in this chapter. The first one, in [Listing 7-1](#9781484207949_Ch07.xhtml#FPar2),\
    \ is a repository sitting on the DAO layer.\n\n[***Listing 7-1***](#9781484207949_Ch07.xhtml#_FPar2).\
    \ Repository Class Used for JTA Examples (0700-jta-common)\n\n```\npackage net.lkrnac.book.eiws.chapter07;"
  trans: "\n1.  提交请求阶段（投票阶段）\n    1.  全局事务管理器（也称为*协调者*）向所有 XA 本地事务管理器（也称为*XA 存储*或*参与者*）询问是否需要执行提交或回滚。\n\
    \    2.  如果参与者决定提交事务，则参与者应等待全局事务管理器的指令，并且不对底层存储执行任何额外操作。\n    3.  参与者可以决定回滚事务，并将此意图告知全局事务管理器。\n\
    2.  提交阶段\n    *   d. 全局事务管理器根据所有响应，决定所有参与者（本地事务管理器）是否需要提交或回滚。\n    *   e. 本地事务管理器执行全局事务管理器指令的操作（提交或回滚）。\n\
    \n该算法涉及多个步骤，可能难以想象。图 7-1 和图 7-2 提供了该算法成功和失败场景的时序图。\n\n![9781484207949_Fig07-01.jpg](img/9781484207949_Fig07-01.jpg)\n\
    \n图 7-1. JTA 事务的成功场景\n\n![9781484207949_Fig07-02.jpg](img/9781484207949_Fig07-02.jpg)\n\
    \n图 7-2. JTA 事务的失败场景\n\n显然，该算法需要大量仪式性操作才能跨多个数据源实现 ACID 事务边界。我们必须强调，前面的图仅描绘了包含两个数据源的场景。如果添加更多数据源，仪式性操作的数量将成倍增加。\n\
    \n重要的是要记住，JTA 是 Java 企业版的一部分标准。因此，存在多种 JTA 和全局事务管理器的实现。这些实现可以是独立的，也可以是 Java EE\
    \ 应用服务器的一部分。事实上，如果我们使用嵌入在应用服务器中的 Java EE 事务管理，我们可以直接获得这种支持。\n\n因此，JTA 提供商的列表将包括每个符合\
    \ Java EE 规范的应用服务器。此外，主要的独立提供商如下：\n\n*   Atomikos (`www.atomikos.com`)\n*   Bitronix\
    \ JTA (`https://github.com/bitronix/btm`)\n\n分布式事务的缺点\n\n分布式事务功能强大。我们可以想象它能够神奇地解决前一章中描述的所有可能问题（包括重复数据和数据丢失）。但这种机制有显著的性能开销；如果我们将涵盖多个数据源（两个、三个甚至更多）及其所涉及多个阶段的两阶段提交纳入考量，这种分布式事务的性能可能会非常慢。\n\
    \n这对于分布式系统中要求的高性能来说，通常意味着一个巨大的问题。因此，这些系统的架构师常常试图避免使用两阶段提交。通常，更明智的做法是使用第 6 章末尾描述的方法来处理独立数据源的提交，即我们显式检查重复项。但有时需求迫使我们使用分布式事务。\n\
    \n性能降低是两阶段提交算法最大但并非唯一的问题。此类事务涉及太多部分，任何本地事务管理器或全局事务管理器的故障都可能破坏整个事务。此外，想象一下在提交请求阶段之后全局事务管理器发生故障的情况，此时所有本地事务管理器都无法执行任何操作，只能等待它。它们将一直等待，直到超时发生（如果有超时机制的话）。\n\
    \n另一个问题是监控全局事务。如果我们想进行故障排除，常见的方法是记录通信中涉及的各方日志。但分布式事务中至少涉及三方（一个全局事务管理器和两个本地事务管理器），并且每一方都会为每个阶段创建至少一条日志条目。如果为生产系统启用了日志记录，则会增加大量日志记录开销，处理速度会变得更慢。\n\
    \n因此，我们可以看到有很多理由应该尽量避免使用分布式事务。\n\n使用 Spring 的分布式事务\n\n配置和实现分布式事务并非易事。但我们可以通过使用\
    \ Spring 的抽象来避免这种复杂性。这种方法高度依赖于对 Spring 事务支持的理解。\n\n这种支持由一个名为`spring-tx`的核心模块提供。它提供了通用接口`PlatformTransactionManager`，该接口支持基于`@Transactional`注解进行事务划分。`spring-tx`模块功能强大，是我们在处理事务性数据库或\
    \ JMS 提供者时 Spring 的主要旗舰特性之一。\n\n![Image](img/sq.jpg) **注意** Spring 事务支持不属于 Spring\
    \ 企业集成认证的一部分。因此，它超出了本书的范围。但此知识对于理解使用 Spring 的分布式事务至关重要，并且是 Spring 核心认证的一部分。我将在此提及一个简单的黄金法则：Spring\
    \ 管理的事务始于被`@Transactional`注解包裹的类或公共方法，并在代码离开此包裹逻辑时结束。但请记住，`@Transactional`注解具有多种属性，可以显著改变事务边界。\n\
    \n实际上，相同的 API 能够处理分布式事务。Spring 提供了`PlatformTransactionManager`接口的`JtaTransactionManager`实现，从而启用了这种支持。但请记住，`JtaTransactionManager`本身并没有为我们提供完全符合\
    \ JTA 规范的全局事务管理器实现。它只是一个运行在 Java EE 或独立 JTA 事务管理器实现（例如 Atomikos 或 Bitronix JTA）之上的包装器。因此，仅靠\
    \ Spring 本身并不能提供这种支持。这是明智的，因为既然没有必要，Spring 为什么要重新发明轮子呢？Spring 利用现有的实现，并将它们置于`JtaTransactionManager`包装器的保护伞下。\n\
    \n此接口的主要含义是，当我们的事务性业务代码被标记为`@Transactional`时，它不需要知道我们正在使用分布式事务。我们只需要配置由 JTA 实现支持的`JtaTransactionManager`，并使用各种\
    \ XA 数据源来跨它们获得 ACID 事务特性。\n\n当 Java EE 服务器强制平台上存在 JTA 事务管理器时，它们存在缺点。使用 Spring，我们可以简单地更改配置来打开或关闭此支持。`@Transactional`注解边界指定了事务的开始，无论是全局事务还是本地事务。这将在本章的示例中看到。\n\
    \nJTA 示例的通用类\n\n为了演示使用 Spring 跨多个数据源的分布式事务的 ACID 特性，我们将在与前一章存在消息重复或丢失问题的示例类似的示例上应用\
    \ JTA 事务管理器。我们将在本章的所有示例中使用几个通用类。第一个，在清单 7-1 中，是位于 DAO 层的仓库类。\n\n***清单 7-1***.\
    \ 用于 JTA 示例的仓库类 (0700-jta-common)\n\n```\npackage net.lkrnac.book.eiws.chapter07;\n\
    ```"
