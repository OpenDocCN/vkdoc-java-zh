    `AddTea`, `AddWater`, and `AddSugar`. Because this configuration is straightforward
    and we’ve seen similar ones previously in this chapter, we’ll skip it. [Listing
    9-99](#9781484207949_Ch09_2_Ext.xhtml#FPar103) shows the main class of this example.


