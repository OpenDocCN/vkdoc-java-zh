    \ jmsContext;\n  private Queue queue;\n\npublic SimpleMessageSender(JMSContext\
    \ jmsContext, Queue queue) {\n    this.jmsContext = jmsContext;\n    this.queue\
    \ = queue;\n  }\n\npublic void sendMessage(String message) {\n    jmsContext.createProducer().send(queue,\
    \ message);\n  }\n}\n```\n\nIn comparison to [Listing 5-2](#9781484207949_Ch05.xhtml#FPar3),\
    \ we don’t need to initialize `Session` nor `MessageProducer` instances. Therefore,\
    \ it’s more suitable to accept `jmsContext` and `queue` via the constructor and\
    \ store them into the class fields.\n\nThe sending message is also more concise,\
    \ because we create `JMSProducer` via the `jmsContext.createProducer` call and\
    \ use the `queue` object to chain the `send` call. Notice that the need to handle\
    \ the checked `JMSException` disappeared with JMS 2.0 when sending the message.\
    \ [Listing 5-8](#9781484207949_Ch05.xhtml#FPar9) shows the implementation of the\
    \ message reader.\n\n[***Listing 5-8***](#9781484207949_Ch05.xhtml#_FPar9). Synchronous\
    \ Message Reception with JMS 2.0 API (0502-jms2-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.jms2jndi;\n\
    \nimport javax.jms.JMSConsumer;\nimport javax.jms.JMSContext;\nimport javax.jms.JMSException;\n\
    import javax.jms.Message;\nimport javax.jms.Queue;\n\npublic class SimpleMessageReader\
    \ {\n  private JMSContext jmsContext;\n  private Queue queue;\n\npublic SimpleMessageReader(JMSContext\
    \ jmsContext, Queue queue) {\n    this.jmsContext = jmsContext;\n    this.queue\
    \ = queue;\n  }\n\npublic String readMessage() throws JMSException {\n    JMSConsumer\
    \ jmsConsumer = jmsContext.createConsumer(queue);\n    Message message = jmsConsumer.receive(5000);\n\
    \    return message.getBody(String.class);\n  }\n}\n```\n\nIn comparison to [Listing\
    \ 5-3](#9781484207949_Ch05.xhtml#FPar4), which uses the JMS 1.1 API, we again\
