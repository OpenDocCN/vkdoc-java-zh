    call, when we build `Step`. These steps might be useful for validating or releasing
    resources after processing.


    We can also define the number of times that `Step` can be executed. This can be
    configured via the `start-limit` XML attribute of `<tasklet>` or via the `startLimit()`
    method during the Java-configured `Step` construction. This can be handy—for example,
    when we need to pre-populate the database with initial metadata, we may want to
    ensure that it will run only once with the start limit configured to `1`.


    We also can configure the restarting behavior of the `Job`. By default, `Job`
    is restartable. If we want to disable the restarting of the job, we need to set
    up `false` for the `restartable` attribute of the XML tag `<job>` or use the `preventRestart()`
    method while building `Job`.


    XML Configuration Example of Step Restart


    [Listing 9-93](#9781484207949_Ch09_2_Ext.xhtml#FPar97) shows the XML configuration.


    [***Listing 9-93***](#9781484207949_Ch09_2_Ext.xhtml#_FPar97). XML Configuration
    of Step and Job Restart (File batch-config.xml in Folder src/main/resource of
    Example Project 0926-restart-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

      http://www.springframework.org/schema/batch/spring-batch.xsd

      http://www.springframework.org/schema/beans

      http://www.springframework.org/schema/beans/spring-beans.xsd">


    <step id="boilWaterStepParent">

        <tasklet ref="boilWater" allow-start-if-complete="true"/>

      </step>

      <step id="addTeaStepParent">

        <tasklet ref="addTea" allow-start-if-complete="true" start-limit="2"/>

      </step>

      <step id="addWaterStepParent">

        <tasklet ref="addWater"/>

      </step>


    <job id="prepareTeaJob">

        <step id="boilWaterStep" parent="boilWaterStepParent" next="addTeaStep"/>

        <step id="addTeaStep" parent="addTeaStepParent" next="addWaterStep"/>

        <step id="addWaterStep" parent="addWaterStepParent"/>

      </job>


    <job id="prepareTeaJobNotRestartable" restartable="false">

        <step id="boilWaterStepNR" parent="boilWaterStepParent" next="addTeaStepNR"/>

        <step id="addTeaStepNR" parent="addTeaStepParent" next="addWaterStepNR"/>

        <step id="addWaterStepNR" parent="addWaterStepParent"/>

      </job>

    </beans:beans>

    ```


    We have two `Job`s configured here. The second one can’t be restarted. If we try
    to run this job twice, this attempt will throw an exception.


    Both `Job`s use steps inherited from the parent `Step`s that are using our common
    `Tasklet`s. The first `Step` definition, `boilWaterStepParent`, can be restarted
    anytime we need. The second `Step` definition, `addTeaStepParent`, can be restarted
    twice. If we try to run it a third time, it will throw an exception and fail the
    `JobExecution`.


    The last `Step` definition, `addWaterStepParent`, uses the default restarting
    behavior, which does not execute the `Step` logic but allows the `JobExecution`
    to succeed.


    This example again uses the common `BatchConfiguration`. The main Spring Boot
    class is shown in [Listing 9-94](#9781484207949_Ch09_2_Ext.xhtml#FPar98).


