    ## Summary


    This chapter focused on background processing in the enterprise, where the Spring
    Batch framework has a unique position as one of the first abstractions in the
    Java world and a reference implementation for the JEE 7 standard for batch processing.


    We covered the Spring Batch domain, which consists of `Job` and `Step` as its
    main pillars. Chunk-oriented processing is the most common mechanism for handling
    batch requirements, but we also have the option to use `Tasklet`, a one-time task
    to perform batching work.


    Various options for running the job programmatically and from the command line
    were shown, alongside possibilities for executing `Job` with parameters. To allow
    for state sharing, we showed how to pass `ExecutionContext` between Spring Batch
    constructs. We also covered special Spring Batch scopes as an alternative to the
    `ExecutionContext` approach.


    Next we explored the rich possibilities for intercepting processing of the Spring
    Batch framework and how to open/close/update third-party resources. `Job` and
    `Step` inheritance allows us to consolidate XML configuration for Spring Batch.
    The following sections dived into the mechanisms for controlling Spring Batch
    flow to repeat certain tasks, perform conditional `Step`s, and react to errors.


    The remaining parts focused on scaling and parallel processing, so that we can
    boost our application’s performance.


