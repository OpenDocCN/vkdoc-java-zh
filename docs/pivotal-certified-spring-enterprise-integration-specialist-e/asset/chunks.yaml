    we use synchronous reception. The `jmsTemplate.receiveAndConvert` call returns
    `Object`, so we need to explicitly cast to `String`. Spring also converts the
    JMS `Message` instance under the hood. Finally, we pass the message in text form
    to `simpleService`.


