    ```


    这表明我们发送的消息已成功处理。当然，我们的服务器并非完全符合 HTTP 规范，因为它本应回复所创建资源的 location URL，但为了不使此示例复杂化，我们暂且忽略这一点。清单
    8-51 显示了应用程序记录的输出。


    ***清单 8-51***. JSON 转换器示例的输出


    ```

    2015-08-25 00:05:53.791  INFO 17254 --- [io-18080-exec-1]

    n.l.b.eiws.chapter08.out.UserRepository  : Object received: User(email=lubos.krnac@gmail.com,

    name=Lubos Krnac)

    ```


    `UserRepository` Bean 已从 JSON 负载中接收到转换后的 `User` 对象。请注意，在此示例中，无法创建对应的 Java 配置，因为
    `<int-http:inbound-gateway>` SI 组件没有对应的 Java 注解。


    内容增强器


    *内容增强器*在消息端点特性上与转换器类似。它可以参与单向或双向通信，可以是被动或主动的，并且位于 SI 流程的中间位置。


    从功能角度来看，可能存在以下类型的内容增强器：


    *   *通用标头增强器*：此端点最常见的用途，用于向消息添加新标头。当然，消息默认是不可变的，因此通用上下文增强器会基于原始消息创建一个新的消息实例，并附带增强的标头。它没有任何可用的
    SI 注解，因此只能通过 XML 元素 `<int:header-enricher>` 进行配置。

    *   *通用负载增强器*：这实际上是一种特殊类型的消息转换器，通过添加信息来增强接收消息的负载。此增强器只能通过 XML 元素 `<int:enricher>`
    进行配置。

    *   *特定技术标头增强器*：为三种技术（Mail、XPath 和 XMPP（Jabber 协议））增强标头。这些配置只能通过 XML 配置实现，并使用特定的技术专用
    XML 命名空间：`<int-xml:xpath-header-enricher>`、`<int-xmpp:header-enricher>` 和 `<int-mail:header-enricher>`。


    标头增强器示例


    清单 8-52 展示了标头增强器逻辑。


    ***清单 8-52***. 标头增强器逻辑（0814-header-enricher-xml）


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleHeaderEnricher {

      public String addHeader(String message) {

        return message.contains("1") ? "header1" : "header2";

      }

    }

    ```


    这个 Spring Bean 检查接收到的消息是否包含 `1`，并根据结果返回一个标头值。该返回值将在 SI 流程中用于增强消息。清单 8-53 展示了 SI
    流程配置。


    ***清单 8-53***. 标头增强器示例的 SI 流程（文件 si-config.xml，位于示例项目 0814-header-enricher-xml
    的 src/main/resources 文件夹中）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />

      <int:channel id="inChannel"/>


    <int:header-enricher input-channel="inChannel" output-channel="enrichedChannel">

        <int:header name="simpleHeader" ref="simpleHeaderEnricher" method="addHeader"/>

      </int:header-enricher>

      <int:channel id="enrichedChannel"/>


    <int:outbound-channel-adapter channel="enrichedChannel" ref="writeServiceWithHeaders"

        method="write"/>

    </beans>

    ```


    入站网关配置为使用我们通用的服务接口 `SiWrapperServiceVoid`，将其参数转换为消息，并传递给 `inChannel`。


    消息从该通道被标头增强器拾取，该增强器在顶层 XML 元素 `<int:header-enricher>` 上定义了必需的 `input-channel`
    和 `output-channel` 属性。现在我们可以定义一个或多个要增强的标头。这是通过 XML 子元素 `<int:header>` 完成的。对于单个标头，我们需要指定
    `name`（它将作为标头映射中的键），以及包含标头增强器逻辑的 Bean 的 `ref` 和 `method`。在本例中，它是 `SimpleHeaderEnricher.addHeader()`。在
    `<int:header>` 标签中，我们还可以使用 Spring 表达式语言 (SpEL) 来内联定义增强器逻辑。SpEL 的使用将在本章后面展示。


    我们流程中的最后一个元素是出站通道适配器，它封装了 清单 8-54 中所示的逻辑。


    ***清单 8-54***. 标头增强器示例中使用的写入服务（0814-header-enricher-xml）


    ```

    package net.lkrnac.book.eiws.chapter08.out;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.messaging.handler.annotation.Header;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class WriteServiceWithHeaders {

      private WriteRepository writeRepository;


    @Autowired

      public WriteServiceWithHeaders(WriteRepository writeRepository) {

        super();

        this.writeRepository = writeRepository;

      }


    public void write(String message, @Header String simpleHeader) {

        log.info("Writing message: {}; simpleHeader: {}", message, simpleHeader);

        writeRepository.persist(message);

      }

    }

    ```


    此服务注入我们通用的 `WriteRepository` 以持久化接收到的消息负载。它还会记录此负载以及之前在流程中增强的 `simpleHeader`。清单
    8-55 涵盖了此示例的主类。


    ***清单 8-55***. 标头增强器示例的主类（0814-header-enricher-xml）


    ```

