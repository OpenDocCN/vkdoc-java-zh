    总结


    本章重点介绍了企业中的后台处理，Spring Batch 框架在其中占据着独特地位，它是 Java 世界中首批抽象之一，也是 JEE 7 批处理标准的参考实现。


    我们介绍了 Spring Batch 领域，其核心支柱是 `Job` 和 `Step`。面向块的处理是处理批处理需求最常用的机制，但我们也可以选择使用 `Tasklet`，这是一种执行批处理工作的单次任务。


    我们展示了以编程方式和从命令行运行作业的各种选项，以及使用参数执行 `Job` 的可能性。为了实现状态共享，我们演示了如何在 Spring Batch 构造之间传递
    `ExecutionContext`。我们还介绍了特殊的 Spring Batch 作用域，作为 `ExecutionContext` 方法的替代方案。


    接下来，我们探讨了拦截 Spring Batch 框架处理的丰富可能性，以及如何打开/关闭/更新第三方资源。`Job` 和 `Step` 的继承允许我们整合
    Spring Batch 的 XML 配置。后续章节深入探讨了控制 Spring Batch 流程的机制，以重复某些任务、执行条件 `Step` 以及对错误做出反应。


    剩余部分重点介绍了扩展和并行处理，以便我们能够提升应用程序的性能。


