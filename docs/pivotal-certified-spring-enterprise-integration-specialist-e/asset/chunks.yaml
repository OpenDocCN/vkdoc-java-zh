    ```

    package net.lkrnac.book.eiws.chapter06.javaasynctx;


    import javax.jms.JMSContext;

    import javax.jms.Queue;

    import lombok.extern.slf4j.Slf4j;


    @Slf4j

    public class SimpleMessageSender {

      private JMSContext jmsContext;

      private Queue queue;


    public SimpleMessageSender(JMSContext jmsContext, Queue queue) {

        super();

        this.jmsContext = jmsContext;

        this.queue = queue;

      }


    public void sendMessage(String message) {

        log.info("Sending message: {}", message);

        try {

          jmsContext.createProducer().send(queue, message);

          jmsContext.commit();

        } catch (Throwable throwable) {

          jmsContext.rollback();

        }

      }

    }

    ```


    该类与上一章中纯 Java JMS 2.0 示例的类相似。不同之处在于 `sendMessage()` 方法，它使用 `jmsContext.commit()`
    调用来确认事务性工作单元，在本例中即发送一条消息。发送和提交消息的操作被封装在 `try-catch` 块中，这确保了如果发生错误，事务会被回滚。本示例的最后一个类如清单
    6-9 所示。


