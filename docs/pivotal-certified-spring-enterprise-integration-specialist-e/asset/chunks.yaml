  trans: '

    假设我们示例中的 Node1 有一个用于在内存中存储记录的高速缓存。它并非无状态，因为它存储了数据（即使只是短暂存储）。第一个请求通过 Node1 从数据库
    Node1 读取记录，并将该记录存入缓存。下一个请求通过 Node2 更新数据库 Node2 中的同一条记录。同时，假设我们的数据库集群在所有数据库节点间进行了复制，因此该记录在数据库
    Node1 中也会被更新。最后，第三个请求再次从 Node1 读取记录，但这次它并非从数据库 Node1 读取，而是从内部缓存中读取。在这种情况下，该记录并未反映第二个请求所做的更改。因此，第三个请求读取到了一条不一致的记录。


    如果我们将状态存储在服务器上的会话中，或者在任意节点中使用 Hibernate 作为二级缓存，也会出现类似的问题。使用二级缓存的 Hibernate 期望只有我们的应用程序在访问数据库。因此，如果我们想对一个依赖
    Hibernate 二级缓存的应用程序进行集群部署，就需要将其托管在独立的服务器上，并且我们应用程序的所有节点都需要配置为使用该服务器作为二级缓存。


    这种状态存储问题在企业级应用中很常见。理想情况下，每个应用节点都应该是无状态的。但有时，当对数据一致性没有严格要求时，缓存数据也是有意义的。一个很好的例子是缓存
    OAuth 认证令牌，以减少与 OAuth 服务器的往返通信。这些令牌通常不会改变。它们会在一定时间后过期，因此在过期前缓存它们是可行的。


    也有一些方法可以对在会话中持有状态的服务器节点进行集群。可以配置负载均衡器，将流量路由到存储会话的节点。这种机制被称为*粘性会话*。但这会使负载均衡器的配置复杂化，并降低根据实际负载有效路由流量的能力。粘性会话机制对于持久
    HTTP 连接（keep-alive）可能很有用。持久连接用于提升 Web 服务的延迟表现，因为 HTTP 连接保持打开状态，无需为每个请求都进行初始握手，这在
    HTTPS 通信的情况下开销会稍高一些。


    分层架构


    无状态性还使我们能够轻松地向客户端隐藏*分层架构*。客户端完全不知道它们是在与一台物理机器通信，还是与一个分布式集群通信。这对架构师来说是一个巨大的优势，因为它允许他们迭代式地扩展系统，使其更健壮、更安全，而无需将这些变化暴露给客户端。


    HATEOAS


    Fielding 关于处理应用状态的思考更进一步，提出了一个名为*超媒体作为应用状态引擎*（*HATEOAS*）的约束。对于状态转换，客户端仅使用服务器响应负载中包含的超媒体。客户端对服务基础设施和资源结构的了解应被最小化。因此，期望客户端能够从服务器的响应中发现大部分信息（例如，通过指向资源的
    URI）。


    可缓存性


    Fielding 指出的 REST 的另一个优势是*可缓存性*。由于无状态通信可以被缓存，我们可以提升 Web 应用的性能和可扩展性。当然，缓存资源并非总是有意义的，因为这样做会使状态转换变得不可能。因此，服务器能够显式或隐式地将响应标记为可缓存是至关重要的。


    灵活性


    你可能会注意到，这些原则是通用且相当有限的。REST 被证明是一种简洁且可维护的 Web 服务开发方法，因为开发者无需像使用 SOAP 协议那样理解大量复杂的细节。但它允许类似的互操作性，因为
    HTTP 和 JSON（作为主要的 REST 传输格式）在所有主流编程语言中都得到了良好的支持。有限数量的允许操作使得创建各种框架成为可能，这些框架可以基于领域模型生成
    REST API。Spring 世界中的一个例子是 Spring Data REST，开发者只需指定 JPA 实体。应用程序的其余部分，包括 Web 层，将使用
    REST 约定创建。


    当一个应用遵循所有 REST 原则时，通常被称为*RESTful*。但请记住，REST 不是一个协议、标准或框架。因此，当有充分理由时，没有什么能阻止我们放弃其任何原则。但在那种情况下，我们就不能再称我们的应用为
    RESTful 了。


    尽管 REST 似乎几乎适用于所有场景，但事实并非如此。使用 HTTP 作为应用协议可以提升性能，因为我们在较低的层次上操作。但我们必须为每个资源实例的每个
    CRUD 操作执行一次 HTTP 调用。有时，用例需要对多个资源实例执行各种 CRUD 操作。为此类用例执行大量 HTTP 调用可能会给应用带来性能问题。这种情况是放弃某些
    REST 原则的合适时机。


    例如，假设客户端需要读取用户信息（如电子邮件地址和姓名）以及用户操作。遵循纯粹的 REST 原则，我们会设计两个资源：例如 `user` 和 `userAction`。但出于性能考虑，我们可能希望将这两个资源聚合到一个响应中，这样客户端只需执行一次
    HTTP 调用，而不是两次。


    另一个例子是需要在我们的 REST 应用中实现实时聊天功能。在这种情况下，我们可能会使用 WebSocket 来实现一个端点，以满足这种非 CRUD 的双向通信。但所有其他端点仍然可以遵循
    REST 原则。


    HTTP 概述


    *超文本传输协议*（HTTP）是为分布式系统交换超文本数据而设计的。它位于开放系统互连（OSI）模型的应用层。


    ![图片](img/sq.jpg) **注意** OSI 模型是用于设计通信系统的标准化分层模型。它超出了本书的讨论范围。探索它的一个好起点是其维基百科页面：`http://en.wikipedia.org/wiki/OSI_model`。


    HTTP 是驱动万维网（WWW）的主要协议，因此它可能是地球上使用最广泛的应用协议。顾名思义，它被设计用于交换*超链接*，即 Web 上文档之间的逻辑链接。客户端与服务器之间的通信由客户端向服务器发送
    HTTP 请求消息发起。服务器处理该请求并发回 HTTP 响应。


    因此，HTTP 消息有两种类型：请求和响应。清单 4-1 和 清单 4-2 分别展示了每种类型的示例。

    '
- fmt: "![Image](images/sq.jpg) **Note**  For testing HTTP applications (including\
    \ REST), I find handy the Chrome plug-ins `DHC - REST/HTTP API Client` (`https://chrome.google.com/webstore/detail/dhc-resthttp-api-client/aejoelaoggembcahagimdiliamlcdmfm`)\
    \ and `Advanced REST Client` (`https://chrome.google.com/webstore/detail/advanced-rest-client/hgmloofddffdnphfgcellkdfbfbjeloo/`).\
    \ A more sophisticated tool often used for testing is `SoapUI` (`www.soapui.org`).\
    \ The free version is powerful enough for testing REST endpoints, but the UI is\
    \ not modern. A similar tool is `Apache JMeter` ([https://jmeter.apache.org/](https://jmeter.apache.org/)),\
    \ but it’s targeted more toward performance testing. For troubleshooting and sniffing\
    \ HTTP communication, including inspecting raw HTTP messages, I suggest `Zed Attack\
    \ Proxy`, or `ZAP`, (`www.owasp.org/index.php/OWASP_Zed_Attack_Proxy_Project`).\
    \ It is an Open Web Application Security Project (OWASP) subproject used for penetration\
    \ testing, but is also useful for developing REST APIs.\n\n[***Listing 4-1***](#9781484207949_Ch04.xhtml#_FPar4).\
    \ HTTP Request Message\n\n```\nGET http://localhost:10403/users/1 HTTP/1.1\nProxy-Connection:\
    \ keep-alive\nAccept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8\n\
    User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko)\
    \ Chrome/41.0.2272.101 Safari/537.36\nAccept-Encoding: sdch\nAccept-Language:\
    \ en-US,en;q=0.8,sk;q=0.6\nHost: localhost:10403\n```\n\n[***Listing 4-2***](#9781484207949_Ch04.xhtml#_FPar5).\
    \ HTTP Response Message\n\n```\nHTTP/1.1 200 OK\nServer: Apache-Coyote/1.1\nContent-Type:\
    \ application/json;charset=UTF-8\nDate: Tue, 31 Mar 2015 21:06:27 GMT\n\n{\"email\"\
    : \"lubos.krnac@gmail.com\",\"name\": \"Lubos Krnac\"}\n```\n\nThe structures\
    \ of the request and response messages are similar and effectively differ only\
    \ in the first line. These are the parts of the HTTP message as described by the\
    \ Hypertext Transfer Protocol:\n\n*   Initial line\n    *   In a request message,\
    \ this is a request line containing the following:\n        *   HTTP method\n\
    \        *   Hostname with target URL\n        *   HTTP version\n    *   In a\
    \ response message, this is a status line containing the following:\n        *\
    \   HTTP version\n        *   Status code\n        *   Status message\n*   Headers\n\
    *   Empty line\n*   Optional body of the message\n\nAn important piece of information\
    \ embedded in the response message is the HTTP status code. It has the form of\
    \ a three-digit number and should inform the client about the result of processing\
    \ the request. In some cases, the status is about server health. For convenience,\
    \ status codes are separated into groups of a hundred:\n\n*   *100+ Informational*:\
    \ Informs the client that the service didn’t finish processing the request and\
    \ that a full response will come later.\n*   *200+ Success*: Informs the client\
    \ that the request was received, understood, accepted, and processed by the server.\n\
    *   *300+ - Redirection*: Informs the client that further action is needed to\
    \ process the request. Such scenarios are commonly used for URL redirection.\n\
    *   *400+ - Client errors*: Informs the client that an error occurred, and it\
    \ was most probably caused by the client sending an incorrect request. Such an\
    \ error generally can be fixed by the client. The server must provide enough information\
    \ about the error, so the client can figure out the problem.\n*   *500+ - Server\
    \ errors*: Informs the client about a server error that can’t be fixed by client\
    \ intervention. Such errors often indicate that the server application is down\
    \ or irresponsible.\n\nNot all the error codes within these intervals are occupied.\
    \ Inventors of HTTP were thinking ahead and left enough space in the error codes\
    \ for further revisions of the protocol—including future statuses that could be\
    \ introduced, or custom statuses that could be introduced by an application using\
    \ HTTP.\n\n![Image](images/sq.jpg) **Note**  Listing HTTP status codes is beyond\
    \ the scope of this book. A useful resource for inspecting these status codes\
    \ and their contracts is at `www.restapitutorial.com/httpstatuscodes.html`. This\
    \ resource contains citations from the HTTP specification as well as from Wikipedia.\n\
    \nSome groups of status codes require specific headers in the response. For example,\
    \ when the status code is `201 Created` (indicating that the resource was successfully\
    \ created by request), the response should include the `Location` header, so the\
    \ client knows where to find the created resource.\n\nHeaders of the HTTP message\
    \ are optional. Various types of HTTP headers exist:\n\n*   Request headers (standard\
    \ and nonstandard)\n*   Response headers (standard and nonstandard)\n*   Custom\
    \ headers\n\nThe first two categories of headers are used by the server or client\
    \ to control various aspects of communication. Some headers inform a counterpart\
    \ (for example, what content type the user accepts or which browser type it is\
    \ using). Other headers have a deeper function within communication (for example,\
    \ can turn on compression of the payload or control caching).\n\n![Image](images/sq.jpg)\
    \ **Note**  A list of default HTTP headers is beyond the scope of this book. Wikipedia\
    \ provides a nice overview of HTTP headers: `http://en.wikipedia.org/wiki/List_of_HTTP_header_fields`.\n\
    \nCustom headers are intended to be used by business logic.\n\n## HTTP Methods\
    \ Used by REST\n\nWe mentioned that REST principles rely on a limited number of\
    \ operations that can be performed against the resource instance. These operations\
    \ are commonly called CRUD, as noted previously. HTTP (used as the application\
    \ protocol in the REST world) contains methods for performing these operations.\n\
    \nAn important parameter of HTTP methods is *idempotency*: the HTTP call will\
    \ have the same effect if the same request is sent various times. This principle\
    \ is not HTTP specific and can be applied to various use cases, including in mathematics.\
    \ For example, multiplying any number by 1 is an idempotent operation, because\
    \ any number can be multiplied by 1 many times with the same result. Another math\
    \ example is logical OR with a true value. Examples from the computer world include\
    \ reading a record from a database or updating a record in a database.\n\nHowever,\
    \ it is not guaranteed that a sequence of various idempotent actions will have\
    \ the same result. For example, a sequence of DB reads of the same record can\
    \ be nonidempotent if we also execute an update of the same record in the meantime.\n\
    \nThe next important parameter of HTTP methods is *safety*. A safe method doesn’t\
    \ have side effects; It doesn’t change the state of the application when an operation\
    \ is performed. For example, reading a record from a database doesn’t have any\
    \ side effects because the persisted state in the database remains the same.\n\
    \nThe following are HTTP methods used in REST services for performing CRUD operations:\n\
    \n`GET`:\n\n*   Used for reading the resource representation\n*   Idempotent operation,\
    \ because recurrent reading should return the same result\n*   Safe operation,\
    \ because reading the resource shouldn’t change the state of the application\n\
    *   Read-only nature of `GET` drives the fact that it is cacheable\n*   Request\
    \ shouldn’t contain a body\n*   Response should contain a representation of the\
    \ resource in the message body\n*   Commonly used response success statuses:\n\
    \    *   `200 OK`—resource read was successful\n    *   `204 No Content`—resource\
    \ does not exist\n\n`POST`:"
  raw: "![Image](images/sq.jpg) **Note**  For testing HTTP applications (including\
    \ REST), I find handy the Chrome plug-ins DHC - REST/HTTP API Client (`https://chrome.google.com/webstore/detail/dhc-resthttp-api-client/aejoelaoggembcahagimdiliamlcdmfm`)\
    \ and Advanced REST Client (`https://chrome.google.com/webstore/detail/advanced-rest-client/hgmloofddffdnphfgcellkdfbfbjeloo/`).\
    \ A more sophisticated tool often used for testing is SoapUI (`www.soapui.org`).\
    \ The free version is powerful enough for testing REST endpoints, but the UI is\
    \ not modern. A similar tool is Apache JMeter ([https://jmeter.apache.org/](https://jmeter.apache.org/)),\
    \ but it’s targeted more toward performance testing. For troubleshooting and sniffing\
    \ HTTP communication, including inspecting raw HTTP messages, I suggest Zed Attack\
    \ Proxy, or ZAP, (`www.owasp.org/index.php/OWASP_Zed_Attack_Proxy_Project`). It\
    \ is an Open Web Application Security Project (OWASP) subproject used for penetration\
    \ testing, but is also useful for developing REST APIs.\n\n[***Listing 4-1***](#9781484207949_Ch04.xhtml#_FPar4).\
    \ HTTP Request Message\n\n```\nGET http://localhost:10403/users/1 HTTP/1.1\nProxy-Connection:\
    \ keep-alive\nAccept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8\n\
    User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko)\
    \ Chrome/41.0.2272.101 Safari/537.36\nAccept-Encoding: sdch\nAccept-Language:\
    \ en-US,en;q=0.8,sk;q=0.6\nHost: localhost:10403\n```\n\n[***Listing 4-2***](#9781484207949_Ch04.xhtml#_FPar5).\
    \ HTTP Response Message\n\n```\nHTTP/1.1 200 OK\nServer: Apache-Coyote/1.1\nContent-Type:\
    \ application/json;charset=UTF-8\nDate: Tue, 31 Mar 2015 21:06:27 GMT\n\n{\"email\"\
    : \"lubos.krnac@gmail.com\",\"name\": \"Lubos Krnac\"}\n```\n\nThe structures\
    \ of the request and response messages are similar and effectively differ only\
    \ in the first line. These are the parts of the HTTP message as described by the\
    \ Hypertext Transfer Protocol:\n\n*   Initial line\n    *   In a request message,\
    \ this is a request line containing the following:\n        *   HTTP method\n\
    \        *   Hostname with target URL\n        *   HTTP version\n    *   In a\
    \ response message, this is a status line containing the following:\n        *\
    \   HTTP version\n        *   Status code\n        *   Status message\n*   Headers\n\
    *   Empty line\n*   Optional body of the message\n\nAn important piece of information\
    \ embedded in the response message is the HTTP status code. It has the form of\
    \ a three-digit number and should inform the client about the result of processing\
    \ the request. In some cases, the status is about server health. For convenience,\
    \ status codes are separated into groups of a hundred:\n\n*   *100+ Informational*:\
    \ Informs the client that the service didn’t finish processing the request and\
    \ that a full response will come later.\n*   *200+ Success*: Informs the client\
    \ that the request was received, understood, accepted, and processed by the server.\n\
    *   *300+ - Redirection*: Informs the client that further action is needed to\
    \ process the request. Such scenarios are commonly used for URL redirection.\n\
    *   *400+ - Client errors*: Informs the client that an error occurred, and it\
    \ was most probably caused by the client sending an incorrect request. Such an\
    \ error generally can be fixed by the client. The server must provide enough information\
    \ about the error, so the client can figure out the problem.\n*   *500+ - Server\
    \ errors*: Informs the client about a server error that can’t be fixed by client\
    \ intervention. Such errors often indicate that the server application is down\
    \ or irresponsible.\n\nNot all the error codes within these intervals are occupied.\
    \ Inventors of HTTP were thinking ahead and left enough space in the error codes\
    \ for further revisions of the protocol—including future statuses that could be\
    \ introduced, or custom statuses that could be introduced by an application using\
    \ HTTP.\n\n![Image](images/sq.jpg) **Note**  Listing HTTP status codes is beyond\
    \ the scope of this book. A useful resource for inspecting these status codes\
    \ and their contracts is at`www.restapitutorial.com/httpstatuscodes.html`. This\
    \ resource contains citations from the HTTP specification as well as from Wikipedia.\n\
    \nSome groups of status codes require specific headers in the response. For example,\
    \ when the status code is 201 Created (indicating that the resource was successfully\
    \ created by request), the response should include the `Location` header, so the\
    \ client knows where to find the created resource.\n\nHeaders of the HTTP message\
    \ are optional. Various types of HTTP headers exist:\n\n*   Request headers (standard\
    \ and nonstandard)\n*   Response headers (standard and nonstandard)\n*   Custom\
    \ headers\n\nThe first two categories of headers are used by the server or client\
    \ to control various aspects of communication. Some headers inform a counterpart\
    \ (for example, what content type the user accepts or which browser type it is\
    \ using). Other headers have a deeper function within communication (for example,\
    \ can turn on compression of the payload or control caching).\n\n![Image](images/sq.jpg) **Note**  A\
    \ list of default HTTP headers is beyond the scope of this book. Wikipedia provides\
    \ a nice overview of HTTP headers: `http://en.wikipedia.org/wiki/List_of_HTTP_header_fields`.\n\
    \nCustom headers are intended to be used by business logic.\n\nHTTP Methods Used\
    \ by REST\n\nWe mentioned that REST principles rely on a limited number of operations\
    \ that can be performed against the resource instance. These operations are commonly\
    \ called CRUD, as noted previously. HTTP (used as the application protocol in\
    \ the REST world) contains methods for performing these operations.\n\nAn important\
    \ parameter of HTTP methods is *idempotency*: the HTTP call will have the same\
    \ effect if the same request is sent various times. This principle is not HTTP\
    \ specific and can be applied to various use cases, including in mathematics.\
    \ For example, multiplying any number by 1 is an idempotent operation, because\
    \ any number can be multiplied by 1 many times with the same result. Another math\
    \ example is logical OR with a true value. Examples from the computer world include\
    \ reading a record from a database or updating a record in a database.\n\nHowever,\
    \ it is not guaranteed that a sequence of various idempotent actions will have\
    \ the same result. For example, a sequence of DB reads of the same record can\
    \ be nonidempotent if we also execute an update of the same record in the meantime.\n\
    \nThe next important parameter of HTTP methods is *safety*. A safe method doesn’t\
    \ have side effects; It doesn’t change the state of the application when an operation\
    \ is performed. For example, reading a record from a database doesn’t have any\
    \ side effects because the persisted state in the database remains the same.\n\
    \nThe following are HTTP methods used in REST services for performing CRUD operations:\n\
    \n`GET`:\n\n*   Used for reading the resource representation\n*   Idempotent operation,\
    \ because recurrent reading should return the same result\n*   Safe operation,\
    \ because reading the resource shouldn’t change the state of the application\n\
    *   Read-only nature of `GET` drives the fact that it is cacheable\n*   Request\
    \ shouldn’t contain a body\n*   Response should contain a representation of the\
    \ resource in the message body\n*   Commonly used response success statuses:\n\
    \    *   200 OK—resource read was successful\n    *   204 No Content—resource\
    \ does not exist\n\n`POST`:"
  trans: "\n![Image](img/sq.jpg) **注意** 对于测试 HTTP 应用程序（包括 REST），我发现 Chrome 插件 DHC\
    \ - REST/HTTP API Client (`https://chrome.google.com/webstore/detail/dhc-resthttp-api-client/aejoelaoggembcahagimdiliamlcdmfm`)\
    \ 和 Advanced REST Client (`https://chrome.google.com/webstore/detail/advanced-rest-client/hgmloofddffdnphfgcellkdfbfbjeloo/`)\
    \ 非常方便。一个常用于测试的更复杂工具是 SoapUI (`www.soapui.org`)。其免费版本对于测试 REST 端点来说功能足够强大，但用户界面不够现代。一个类似的工具是\
    \ Apache JMeter ([`jmeter.apache.org/`](https://jmeter.apache.org/))，但它更侧重于性能测试。对于故障排除和嗅探\
    \ HTTP 通信（包括检查原始 HTTP 消息），我建议使用 Zed Attack Proxy（简称 ZAP）(`www.owasp.org/index.php/OWASP_Zed_Attack_Proxy_Project`)。这是一个开放\
    \ Web 应用程序安全项目（OWASP）的子项目，用于渗透测试，但也对开发 REST API 很有用。\n\n***清单 4-1***。HTTP 请求消息\n\
    \n```\nGET http://localhost:10403/users/1 HTTP/1.1\nProxy-Connection: keep-alive\n\
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8\n\
    User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko)\
    \ Chrome/41.0.2272.101 Safari/537.36\nAccept-Encoding: sdch\nAccept-Language:\
    \ en-US,en;q=0.8,sk;q=0.6\nHost: localhost:10403\n```\n\n***清单 4-2***。HTTP 响应消息\n\
    \n```\nHTTP/1.1 200 OK\nServer: Apache-Coyote/1.1\nContent-Type: application/json;charset=UTF-8\n\
    Date: Tue, 31 Mar 2015 21:06:27 GMT\n\n{\"email\": \"lubos.krnac@gmail.com\",\"\
    name\": \"Lubos Krnac\"}\n```\n\n请求和响应消息的结构相似，实际上仅在第一行有所不同。以下是超文本传输协议描述的 HTTP\
    \ 消息的组成部分：\n\n*   初始行\n    *   在请求消息中，这是一个请求行，包含以下内容：\n        *   HTTP 方法\n \
    \       *   带有目标 URL 的主机名\n        *   HTTP 版本\n    *   在响应消息中，这是一个状态行，包含以下内容：\n\
    \        *   HTTP 版本\n        *   状态码\n        *   状态消息\n*   头部\n*   空行\n*   可选的消息体\n\
    \n嵌入在响应消息中的一个重要信息是 HTTP 状态码。它采用三位数字的形式，应告知客户端请求处理的结果。在某些情况下，状态码关乎服务器健康。为方便起见，状态码按百位分组：\n\
    \n*   *100+ 信息性*：告知客户端服务尚未完成请求处理，完整的响应将在稍后发送。\n*   *200+ 成功*：告知客户端请求已被服务器接收、理解、接受并处理。\n\
    *   *300+ 重定向*：告知客户端需要进一步操作才能处理请求。此类场景通常用于 URL 重定向。\n*   *400+ 客户端错误*：告知客户端发生了错误，且很可能是由客户端发送了不正确的请求导致的。此类错误通常可由客户端修复。服务器必须提供足够的错误信息，以便客户端能够找出问题所在。\n\
    *   *500+ 服务器错误*：告知客户端发生了服务器错误，该错误无法通过客户端干预来修复。此类错误通常表明服务器应用程序已宕机或无响应。\n\n并非这些区间内的所有错误码都被占用。HTTP\
    \ 的发明者具有前瞻性，在错误码中为协议的后续修订预留了足够的空间——包括未来可能引入的状态码，或使用 HTTP 的应用程序可能引入的自定义状态码。\n\n\
    ![Image](img/sq.jpg) **注意** 列出 HTTP 状态码超出了本书的范围。一个用于检查这些状态码及其约定的有用资源位于 `www.restapitutorial.com/httpstatuscodes.html`。该资源包含了来自\
    \ HTTP 规范以及维基百科的引用。\n\n某些状态码组需要在响应中包含特定的头部。例如，当状态码为 201 Created（表示资源已通过请求成功创建）时，响应应包含\
    \ `Location` 头部，以便客户端知道在哪里找到已创建的资源。\n\nHTTP 消息的头部是可选的。存在多种类型的 HTTP 头部：\n\n*  \
    \ 请求头部（标准和非标准）\n*   响应头部（标准和非标准）\n*   自定义头部\n\n前两类头部由服务器或客户端用于控制通信的各个方面。一些头部用于告知对方信息（例如，用户接受哪种内容类型，或正在使用哪种浏览器类型）。其他头部在通信中具有更深层的功能（例如，可以开启有效负载的压缩或控制缓存）。\n\
    \n![Image](img/sq.jpg) **注意** 默认 HTTP 头部的列表超出了本书的范围。维基百科提供了 HTTP 头部的良好概述：`http://en.wikipedia.org/wiki/List_of_HTTP_header_fields`。\n\
    \n自定义头部旨在供业务逻辑使用。\n\nREST 使用的 HTTP 方法\n\n我们提到过，REST 原则依赖于可对资源实例执行的有限数量的操作。如前所述，这些操作通常称为\
    \ CRUD。HTTP（在 REST 世界中用作应用协议）包含了执行这些操作的方法。\n\nHTTP 方法的一个重要参数是*幂等性*：如果多次发送相同的请求，HTTP\
    \ 调用将产生相同的效果。此原则并非 HTTP 特有，可应用于各种用例，包括数学领域。例如，任何数乘以 1 是一个幂等操作，因为任何数都可以多次乘以 1 而得到相同的结果。另一个数学示例是与\
    \ true 值进行逻辑或运算。来自计算机世界的示例包括从数据库读取记录或更新数据库中的记录。\n\n然而，并不能保证一系列不同的幂等操作会产生相同的结果。例如，如果我们在读取同一记录的同时还执行了更新操作，那么对同一记录的一系列数据库读取可能就不是幂等的。\n\
    \nHTTP 方法的下一个重要参数是*安全性*。安全方法没有副作用；执行操作时不会改变应用程序的状态。例如，从数据库读取记录没有任何副作用，因为数据库中持久化的状态保持不变。\n\
    \n以下是 REST 服务中用于执行 CRUD 操作的 HTTP 方法：\n\n`GET`：\n\n*   用于读取资源表示\n*   幂等操作，因为重复读取应返回相同结果\n\
    *   安全操作，因为读取资源不应改变应用程序的状态\n*   `GET` 的只读性质决定了它是可缓存的\n*   请求不应包含消息体\n*   响应应在消息体中包含资源的表示\n\
    *   常用的成功响应状态码：\n    *   200 OK——资源读取成功\n    *   204 No Content——资源不存在\n\n`POST`：\n"
- fmt: "# HTTP Methods Overview\n\n## `POST`\n\n- Creates a new instance of the resource\
    \ based on a generic resource URL\n- Nonidempotent operation, because a recurrent\
    \ request should create a new resource\n- Should send back a `Location` header\
    \ in response, to identify the created resource instance\n- Unsafe operation,\
    \ because recurrent creation changes the state, by creating new resource instances\n\
    - Request should contain a representation of the resource in the message body\n\
    - Response typically doesn’t contain a body\n- Commonly used response success\
    \ statuses:\n  - `201 Created`—resource creation was successful\n\n## `PUT`\n\n\
    - Used for updating or creating a resource instance specified by a concrete URI\n\
    - Idempotent operation, because it doesn’t create a new resource instance every\
    \ time. The first time, it creates a new instance; subsequently, it updates the\
    \ same instance. So each request has the same effect.\n- Unsafe operation, because\
    \ it changes the state of the application\n- Request should contain a representation\
    \ of the resource in the message body\n- Response typically doesn’t contain a\
    \ body\n- Commonly used response success statuses:\n  - `200 OK`—resource was\
    \ updated\n  - `201 Created`—resource was created\n\n## `DELETE`\n\n- Releases\
    \ instance of the resource based on a given URI\n- Idempotent operation, because\
    \ all requests for deleting the same resource instance have the same result—the\
    \ resource instance is released.\n- Unsafe operation, because it changes the state\
    \ of the application\n- Request or response of this type shouldn’t contain a body\n\
    - Commonly used response success statuses:\n  - `200 OK`—resource was deleted\n\
    \  - `204 No Content`—resource doesn’t exist\n\n## `HEAD`\n\n- Similar to `GET`,\
    \ but it reads headers without the body\n- Idempotent and safe operation\n- Is\
    \ also cacheable\n- Request or response of this type shouldn’t contain body\n\
    - Commonly used response success statuses:\n  - `200 OK`—resource read was successful\n\
    \  - `204 No Content`—resource does not exist\n\n**Note** A full list of HTTP\
    \ method types can be found on Wikipedia: `en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods`.\n\
    \nDevelopers have to bear in mind that the safety and idempotency parameters of\
    \ these HTTP methods are fulfilled only when the HTTP standard is followed. Unfortunately,\
    \ a lot of applications are implemented without these parameters in mind or by\
    \ breaking HTTP contract rules. Such applications break the HTTP contract and\
    \ therefore can’t be called RESTful.\n\nImplementing all methods for each resource\
    \ isn’t necessary. For example, some resources are read-only based on application\
    \ requirements, so the server doesn’t need to handle `POST`/`PUT`/`DELETE`. Therefore,\
    \ the server should send HTTP status code `405 Method Not Allowed`, if such a\
    \ request is performed against a read-only resource.\n\n# JAX-RS\n\nSupport for\
    \ developing REST applications is represented in Java by a standard API, which\
    \ is part of Java Enterprise Edition (JEE) standards. Its name is Java API for\
    \ RESTful Web Services, or JAX-RS (`https://jax-rs-spec.java.net`). Like all APIs\
    \ from JEE, JAX-RS is not an implementation of REST support. It’s a standard abstraction.\
    \ For running and using this API in production, a JEE-compliant application server\
    \ or at least a server that conforms to the JAX-RS standard is needed.\n\nA similar\
    \ approach is used across all the APIs provided by JEE. Each API’s abstraction\
    \ can have various implementations. The JEE standard was created to unify the\
    \ surface layers of Java application servers provided from different vendors.\
    \ Migration from one JEE-compliant server to another is much easier when most\
    \ of their APIs are the same. In addition, leveraging JEE APIs allows for reuse\
    \ of experience and JEE API knowledge, which decreases the learning curve for\
    \ developers migrating to a different application server.\n\n## JAX-RS Implementations\n\
    \nSo when we want to use JAX-RS, we also need an application server or a lightweight\
    \ runtime implementing this API. As JAX-RS is an abstraction on top of servlets,\
    \ we have to use it with a servlet container. Here are the main application servers\
    \ or runtimes implementing JAX-RS:\n\n- *Jersey*: A reference implementation of\
    \ JAX-RS APIs. Can be used alone and is also shipped by Oracle as part of the\
    \ GlassFish JEE application server.\n- *Apache CXF*: Framework for SOAP and REST\
    \ web services with JMS, OSGi, and CORBA support.\n- *RESTEasy*: Implementation\
    \ of JAX-RS that can run on any servlet container. Can be used alone or with JBoss\
    \ Application server.\n- *Restlet*: Open source JAX-RS implementation, which can\
    \ integrate with various Java technologies and frameworks.\n- *WebSphere Application\
    \ Server*: Full JEE-compliant commercial solution from IBM.\n- *WebLogic Server*:\
    \ Full JEE-compliant commercial solution from Oracle.\n- *Apache Tuscany*: Provides\
    \ REST support alongside wider support for the Service Component Architecture\
    \ (SCA) specification.\n\n## JAX-RS API\n\nThe main surface of the JAX-RS API\
    \ consists of various annotations for declaring Java REST endpoints. We have annotations\
    \ for declaring the following:\n\n- URL mapping—`@Path`\n- HTTP method binding—`@GET`,\
    \ `@HEADER`, `@POST`, `@PUT`, `@DELETE`\n- Content type handling\n  - `@Produces`:\
    \ Content types being produced by endpoint\n  - `@Consumes`: Content types that\
    \ can be consumed by endpoint\n- Data extraction from the HTTP message\n  - `@QueryParam`:\
    \ Parses the parameter value from the query part of the URI\n  - `@PathParam`:\
    \ Parses the parameter value from the URI\n  - `@HeaderParam`: Parses the HTTP\
    \ header\n  - `@DefaultValue`: Specifies the default value if the parameter binding\
    \ is not found\n  - `@Context`: Retrieves the entire context of the request or\
    \ response (for example, `@Context HttpServletRequest httpRequest`)\n  - `@CookieParam`:\
    \ Retrieves the cookie value into the method parameter\n  - `@FormParam`: Retrieves\
    \ the form value into the method parameter\n\nWith these annotations, we have\
    \ powerful control over parsing and handling HTTP message metadata. For handling\
    \ the HTTP message payload itself, JAX-RS integrates with various payload serialization\
    \ libraries. So for converting Java objects into JSON, XML, and other formats\
    \ and back, JAX-RS can integrate with main libraries such as Jackson (JSON serialization\
    \ library) or JAXB 2 (XML serialization library). In the majority of cases, we\
    \ don’t need to call these libraries directly, because JAX-RS (or more precisely,\
    \ the implementation of JAX-RS we are using) uses them under the hood.\n\n## Common\
    \ Classes Used in Examples\n\nLet’s dive into a simple example. Because this book\
    \ is about Spring, we are going to integrate JAX-RS with Spring. But first we\
    \ need to introduce the domain for all the examples in this chapter. A simple\
    \ model POJO is shown in [Listing 4-3](#9781484207949_Ch04.xhtml#FPar9).\n\n**Listing\
    \ 4-3.** Model POJO Used in All REST Examples (0400-rest-common)\n\n```java\n\
    package net.lkrnac.book.eiws.chapter04.model;\n\nimport lombok.Data;\nimport lombok.EqualsAndHashCode;\n\
    \n@Data\n@EqualsAndHashCode(of = { \"email\" })\npublic class User {\n  private\
    \ String email;\n  private String name;\n}\n```\n\nThis is a simple class with\
    \ simplified modeling of the `User` object. Properties of this simple POJO should\
    \ store an e-mail address and user’s name. Such a simplified model is enough to\
    \ demonstrate REST API development.\n\nIn some examples, we will need to compare\
    \ the equality of `User` objects. Historically, we would override `Object.hashCode`\
    \ and `Object.equals` methods to fulfill the Java hash code and equality contract."
  raw: "*   Creates a new instance of the resource based on a generic resource URL\n\
    *   Nonidempotent operation, because a recurrent request should create a new resource\n\
    *   Should send back a `Location` header in response, to identify the created\
