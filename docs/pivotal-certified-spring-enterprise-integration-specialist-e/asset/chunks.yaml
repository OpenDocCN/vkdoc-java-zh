    \ `org.springframework.messaging.Message<T>` 类型，并直接发送到 WebSocket，无需任何转换。\n\n此外，Spring\
    \ Integration 模块高度依赖于使用 `org.springframework.messaging.Message<T>` 通过其管道进行发送。因此，`JmsMessagingTemplate`\
    \ 在涉及 Spring Integration 和 JMS 的某些用例中会非常有用。\n\n总结\n\n本章解释了 JMS 消息传递通信与其他类型的通信协议和方法有何不同。在一个纯\
    \ Java 示例中，我们探讨了如何使用较旧的 JMS 1.1 和较新的 JMS 2.0 API，以及同步接收与异步接收。这些 Java 示例使我们能够比较\
    \ Spring 抽象的优势以及显著减少纯 JMS API 的冗长性。\n\n基于纯 XML 或 `jms` 命名空间，我们解释了各种可能的 Spring\
    \ JMS 配置。还介绍了 Java 配置和 Spring Boot。然后，我们介绍了 `JmsTemplate` 的特性，以及如何将其用于同步 JMS 消息接收和消息发送。\n\
    \n为了立即从 JMS 目的地接收 JMS 消息，您学习了 Spring 的 `MessageListener` 抽象，以及如何使用 XML 和 Java\
    \ 配置它们。\n\n重要的 `MessageConverter` 抽象使我们能够使用各种标准和自定义传输格式。我们还深入探讨了 Spring 4.1 的各种新特性，例如\
    \ `@JmsListener`、`@Header`、`@Headers`、`@Payload` 和 `JmsMessagingTemplate`。\n\n\
    在本章末尾，我们还展示了如何使用发布/订阅 JMS 模型。\n\n第 6 章\n\n![image](img/frontdot.jpg)\n\nJMS 事务\n\
    \n本章介绍如何使用本地 JMS 事务以及显式或隐式确认模式来可靠地发送和接收 JMS 消息。在前一章解释主要消息传递概念时，我们跳过了消息传递通信最重要的方面之一：*可靠性*。Java\
    \ 消息服务在大多数情况下通过网络进行通信。而网络经常发生故障。因此，如果我们依赖消息传递通信，就需要确保这种通信是*容错*的。\n\n这个概念类似于数据持久化，因为持久化数据也需要可靠和容错。您可能熟悉数据持久化领域的\
    \ *ACID 原则*。这个缩写代表以下原则：\n\n*   *原子性*：整个事务要么提交，要么不执行任何更改。\n*   *一致性*：状态转换从一个有效状态变为另一个有效状态。\n\
    *   *隔离性*：事务的部分更改不会影响任何其他事务。\n*   *持久性*：事务的更改一旦完成，将保持持久化。\n\n所有这些原则之所以重要，是因为我们将状态存储到数据库中。但\
    \ Java 消息服务也会存储状态。事实上，JMS 提供者通常也会将消息持久化到硬盘上，并充当一种特殊的临时文档存储，从 JMS 目的地发送或移除消息。因此，ACID\
    \ 原则对于 JMS 通信完全适用。\n\nJMS 可靠性机制\n\n为了实现消息传递的 ACID 参数，Java 消息服务协议提供了多种机制。所有这些机制都围绕\
    \ `javax.jms.Session` 展开。在 JMS 2.0 中，这一职责转移到了 `javax.jms.JMSContext` 抽象上。我们可以将这两种抽象视为一个*工作单元*，它可以跟踪对其执行的所有操作。\n\
    \n为了可靠地向/从 JMS 服务器传递消息，JMS 标准提供了两个支持概念：消息确认和本地事务。以下是所有可能的 JMS 可靠性模式列表：\n\n*  \
    \ *确认模式*：仅对消息接收有意义，不影响发送\n    *   `AUTO_ACKNOWLEDGE`：消息在发送或接收时自动确认。\n    *   `CLIENT_ACKNOWLEDGE`：客户端需要显式调用\
    \ `Message.acknowledge()` 来确认发送或接收。\n    *   `DUPS_OK_ACKNOWLEDGE`：消息以批量方式自动确认。可能出现重复消息，应用程序需要处理它们。\n\
    *   *事务支持*：应用程序需要为 `javax.jms.Session` 或 `javax.jms.JMSContext` 显式调用 `commit()`\
    \ 或 `rollback()`。事务行为适用于 JMS 消息接收和发送。\n\n当消息在 JMS 目的地被确认时，意味着客户端已完成其处理，并且该操作可以反映在\
    \ JMS 服务器上。*在读取期间确认消息*会将消息标记为已投递，并从队列中丢弃该消息。因此，消息接收按以下三个步骤执行：\n"
