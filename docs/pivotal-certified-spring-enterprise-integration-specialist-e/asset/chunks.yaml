    Consuming REST Asynchronously


    `RestTemplate` calls against the REST server block the caller thread on the client
    side. This may not be suitable sometimes. We might need to not block the caller
    thread on the client side. Such a requirement is often referred to as a *fire
    and forget scenario*.


    In the days before Spring 4, Spring developers were forced to use explicit asynchronous
    programming for such use cases. Spring’s `@Async` annotation is good for this.
    The Spring 4 release introduced a new class, `AsyncRestTemplate`, which handles
    these asynchronous scenarios by registering callbacks or using the Java `Feature`
    implementation `ListenableFuture`.


    To explain this use in an example, we need to extend our domain. We still need
    to consume a remote REST API that provides user information, as in the previous
    examples. But let’s have an additional requirement to read user actions from separate
    storage and aggregate them into one object. [Listing 4-48](#9781484207949_Ch04.xhtml#FPar58)
    shows this aggregated model class.


    [***Listing 4-48***](#9781484207949_Ch04.xhtml#_FPar58). Extended Model for Reading
    User Information with User Actions (0405-rest-async-client)


    ```

    package net.lkrnac.book.eiws.chapter04.model;


    import java.util.Collection;

    import lombok.Value;


    @Value

    public class UserInfo {

      private User user;

      private Collection<String> userActions;

    }

    ```


    We again use the Lombok project to generate boilerplate getters and a constructor
    with parameters. The aggregated model class `UserInfo` contains an instance to
    the `User` object and a collection of user actions. For simplicity, a user action
    is represented by the `String` type. [Listing 4-49](#9781484207949_Ch04.xhtml#FPar59)
    shows an implementation of the user’s action repository.


    [***Listing 4-49***](#9781484207949_Ch04.xhtml#_FPar59). User’s Action Repository
    (0405-rest-async-client)


    ```

    package net.lkrnac.book.eiws.chapter04.client;


    import java.util.Arrays;

    import java.util.Collection;


    import org.springframework.stereotype.Repository;


    @Repository

    public class UserActionsRepository {

      public Collection<String> getUserActions(int identifier) {

        return Arrays.asList(new String[] { "dummy action 1", "dummy action 2", });

      }

    }

    ```


    To keep the example simple, we return dummy values. This class is not of deep
    interest anyway. We want to explore an asynchronous REST call. This is present,
    because we need to perform an action while the REST API call is executed asynchronously.
    [Listing 4-50](#9781484207949_Ch04.xhtml#FPar60) shows the Spring configuration
    of this asynchronous example.


    [***Listing 4-50***](#9781484207949_Ch04.xhtml#_FPar60). Consuming REST Asynchronously
    (0405-rest-async-client)


    ```

    package net.lkrnac.book.eiws.chapter04.client;


    import java.util.concurrent.Executor;

    import java.util.concurrent.Executors;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.scheduling.concurrent.ConcurrentTaskExecutor;

    import org.springframework.web.client.AsyncRestTemplate;


    @Configuration

    @ComponentScan

    public class ClientConfiguration {

      @Bean

      public AsyncRestTemplate asyncRestTemplate() {

        Executor executor = Executors.newFixedThreadPool(10);

        ConcurrentTaskExecutor taskExecutor = new ConcurrentTaskExecutor(executor);

        return new AsyncRestTemplate(taskExecutor);

      }

    }

    ```


    `ClientConfiguration` is annotated as a standard Spring configuration. `@Configuration`
    defines Spring’s configuration class, and `@ComponentScan` performs a scan for
    Spring’s beans within the current package and its subpackages.


    This configuration registers only one bean of type `AsyncRestTemplate`. By default,
    Spring uses the `SimpleAsyncTaskExecutor` thread pool implementation for asynchronous
    beans. But this implementation doesn’t reuse threads from the thread pool, and
    therefore it’s not suitable for production usage.


    We use the Java `Executors` factory to create a thread pool with a fixed number
    of threads in the pool. When we wrap this `Executor` implementation into `ConcurrentTaskExecutor`,
    we can register it as a thread pool used by our instance of `AsyncRestTemplate`.
    The `AsyncRestTemplate` instance will be reusing a thread instance from this thread
    pool for asynchronous REST calls. [Listing 4-51](#9781484207949_Ch04.xhtml#FPar61)
    shows example usage of `AsyncRestTemplate`.


    [***Listing 4-51***](#9781484207949_Ch04.xhtml#_FPar61). Consuming REST Asynchronously
