    Chunk-Oriented Processing Example with Java Configuration


    Now let’s configure the same behavior with a Java configuration. [Listing 9-10](#9781484207949_Ch09_1.xhtml#FPar11)
    shows the Java batch configuration.


    [***Listing 9-10***](#9781484207949_Ch09_1.xhtml#_FPar11). Java Configuration
    of Chunk-Oriented Processing Example (0902-chunk-processing-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;

    import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;

    import net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,

          SimpleRecordReader simpleRecordReader,

          SimpleRecordProcessor simpleRecordProcessor,

          SimpleRecordWriter simpleRecordWriter) {

        return stepBuilderFactory.get("simpleRecordsStep")

            .<String, String> chunk(4)

            .reader(simpleRecordReader)

            .processor(simpleRecordProcessor)

            .writer(simpleRecordWriter)

            .build();

      }


    @Bean

      public Job simpleRecordsJob(JobBuilderFactory jobBuilderFactory,

          Step simpleRecordsStep) {

        return jobBuilderFactory.get("simpleRecordsJob")

            .start(simpleRecordsStep)

            .build();

      }

    }

    ```


    The `@Configuration` annotation is  typically used for Spring Java configuration,
    and `@EnableBatchProcessing` was discussed in the previous example. The `Step`
    bean is created via the `simpleRecordsStep()` method, which is annotated by `@Bean`.
    Spring injects instances of the reader, writer, and processor alongside the instance
    of `StepBuilderFactory`. As its name suggests, it is used for building steps.
    Its creation was initiated by the `@EnableBatchProcessing` annotation.


    When we have all the necessary beans injected, we can create the step. SB provides
    fluent APIs for defining batch flows. The `stepBuilderFactory.get()` method takes
    the name of the `Step` as a parameter, but notice that the Spring bean name can
    be different from the `Step` name. So we can’t confuse the `Step` name with the
    Spring bean name of the `Step` instance.


    The next call in the chain is the specification of the chunk size via the `chunk()`
    method. In this call, we need to define generic types of the items handled by
    the writer, reader, and processor. The `Step` creation chain then continues—defining
    the reader, writer, and processor in this step—and is finalized by the `build()`
    call, which applies the recorded configuration and creates the `Step` instance.


    The second `@Bean` definition creates the `Job` instance. We need an instance
    of the `Step` and `JobBuilderFactory`, which is for `Job` instance creation. Similar
    to the `Step` creation chain, the `Job` creation chain needs to call `JobBuilderFactory.get()`
    to name the `Job`. Again, notice that the `Job` name can be different from the
    name of the bean specified by method. This `Job` will start only the `Step` we
    created, so we need to call `start` to define the `Step` method and build the
    job. In this case, we use only one step. Jobs with various steps are shown later
    in the chapter.


    The main class of this application is the standard Spring Boot main class (shown
    previously in [Listing 9-8](#9781484207949_Ch09_1.xhtml#FPar9)). When we run it,
    we can see output similar to that in [Listing 9-9](#9781484207949_Ch09_1.xhtml#FPar10).


