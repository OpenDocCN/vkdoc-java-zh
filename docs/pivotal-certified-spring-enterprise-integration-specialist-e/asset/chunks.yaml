    正如我们所见，`record 0` 因处理器中的错误而被跳过。但写入器的行为可能令人意外，因为我们在写入器中模拟了两个错误。然而，在面向块的处理中，当写入或整个块失败时，SB
    会尝试随后逐个处理每条记录。这是因为 SB 试图写入尽可能多的项目。这样，我们可以确保一条损坏的记录不会导致同一块中其他有效记录的写入失败。


    在这种情况下，写入器中的第一次失败导致整个块失败，因此 SB 随后尝试逐个写入每条记录。第二次错误模拟导致 `record 1 processed` 失败。该块中的其余记录以及所有其他块都正常处理。


