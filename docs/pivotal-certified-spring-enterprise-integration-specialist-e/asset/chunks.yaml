    \ Processing Example with Java Configuration\n\nNow let’s configure the same behavior\
    \ with a Java configuration. [Listing 9-10](#9781484207949_Ch09_1.xhtml#FPar11)\
    \ shows the Java batch configuration.\n\n**[Listing 9-10](#9781484207949_Ch09_1.xhtml#_FPar11).**\
    \ Java Configuration of Chunk-Oriented Processing Example (0902-chunk-processing-generic-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\n\
    import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\nimport net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;\n\
    import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n\
    \  @Bean\n  public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n\
    \      SimpleRecordReader simpleRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n\
    \      SimpleRecordWriter simpleRecordWriter) {\n    return stepBuilderFactory.get(\"\
    simpleRecordsStep\")\n        .<String, String> chunk(4)\n        .reader(simpleRecordReader)\n\
    \        .processor(simpleRecordProcessor)\n        .writer(simpleRecordWriter)\n\
    \        .build();\n  }\n\n@Bean\n  public Job simpleRecordsJob(JobBuilderFactory\
    \ jobBuilderFactory,\n      Step simpleRecordsStep) {\n    return jobBuilderFactory.get(\"\
    simpleRecordsJob\")\n        .start(simpleRecordsStep)\n        .build();\n  }\n\
    }\n```\n\nThe `@Configuration` annotation is typically used for Spring Java configuration,\
    \ and `@EnableBatchProcessing` was discussed in the previous example. The `Step`\
    \ bean is created via the `simpleRecordsStep()` method, which is annotated by\
    \ `@Bean`. Spring injects instances of the reader, writer, and processor alongside\
    \ the instance of `StepBuilderFactory`. As its name suggests, it is used for building\
    \ steps. Its creation was initiated by the `@EnableBatchProcessing` annotation.\n\
    \nWhen we have all the necessary beans injected, we can create the step. SB provides\
    \ fluent APIs for defining batch flows. The `stepBuilderFactory.get()` method\
    \ takes the name of the `Step` as a parameter, but notice that the Spring bean\
    \ name can be different from the `Step` name. So we can’t confuse the `Step` name\
    \ with the Spring bean name of the `Step` instance.\n\nThe next call in the chain\
    \ is the specification of the chunk size via the `chunk()` method. In this call,\
    \ we need to define generic types of the items handled by the writer, reader,\
    \ and processor. The `Step` creation chain then continues—defining the reader,\
    \ writer, and processor in this step—and is finalized by the `build()` call, which\
    \ applies the recorded configuration and creates the `Step` instance.\n\nThe second\
    \ `@Bean` definition creates the `Job` instance. We need an instance of the `Step`\
    \ and `JobBuilderFactory`, which is for `Job` instance creation. Similar to the\
    \ `Step` creation chain, the `Job` creation chain needs to call `JobBuilderFactory.get()`\
    \ to name the `Job`. Again, notice that the `Job` name can be different from the\
    \ name of the bean specified by method. This `Job` will start only the `Step`\
    \ we created, so we need to call `start` to define the `Step` method and build\
    \ the job. In this case, we use only one step. Jobs with various steps are shown\
    \ later in the chapter.\n\nThe main class of this application is the standard\
    \ Spring Boot main class (shown previously in [Listing 9-8](#9781484207949_Ch09_1.xhtml#FPar9)).\
    \ When we run it, we can see output similar to that in [Listing 9-9](#9781484207949_Ch09_1.xhtml#FPar10).\n\
    \n## Example with File Reader and JDBC Writer\n\nFirst, we define the model class\
