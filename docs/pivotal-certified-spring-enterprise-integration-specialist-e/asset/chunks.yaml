  trans: '

    *   通过 `JobExecutionListener` 接口或 `@BeforeJob` 和 `@AfterJob` 注解，在 `Job` 的*之前*和*之后*执行操作

    *   通过 `StepExecutionListener` 接口或 `@BeforeStep` 和 `@AfterStep` 注解，在 `Step` 的*之前*和*之后*执行操作

    *   通过 `ChunkListener` 接口或 `@BeforeChunk` 和 `@AfterChunk` 注解，在*块之前*、*块之后*以及*块出错后*执行操作

    *   通过 `ItemReadListener<T>` 接口或 `@BeforeRead`、`@AfterRead` 和 `@OnReadError` 注解，在*读取前*、*读取后*以及*读取项目出错时*执行操作

    *   通过 `ItemProcessListener<T, S>` 接口或 `@BeforeProcess`、`@AfterProcess` 和 `@OnProcessError`
    注解，在*处理前*、*处理后*以及*处理项目出错时*执行操作

    *   通过 `ItemWriteListener<S>` 接口或 `@BeforeWrite`、`@AfterWrite` 和 `@OnWriteError`
    注解，在*写入前*、*写入后*以及*写入项目出错时*执行操作

    *   通过 `SkipListener<T,S>` 或 `@OnSkipInRead`、`@OnSkipInProcess` 和 `@OnSkipInWrite`
    注解，在*读取*、*处理*和*写入*过程中发生*跳过*时执行操作（使用监听器的跳过机制将在本章后面介绍）

    *   通过 Spring 核心接口 `org.springframework.retry.RetryListener`，在*重试模式下出错、打开、关闭*时执行操作（使用监听器的重试机制将在本章后面介绍）


    如果我们不需要使用某个特定监听器的所有拦截方法，SB 还提供了以 `Support` 为后缀的便捷空实现监听器。这样，我们只需实现自己感兴趣的拦截方法即可。例如，如果我们只想在块操作之后进行拦截，可以实现
    `ChunkListenerSupport` 并仅重写 `afterChunk()` 方法。


