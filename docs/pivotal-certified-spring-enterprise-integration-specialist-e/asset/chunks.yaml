    分割器


    *分割器*是一个中间组件（可以参与单向或双向流程），可以在被动或主动模式下运行。它在 SI 框架中具有独特的功能，可以根据以下机制将接收到的消息分割成多条消息：


    *   *自定义 Java 逻辑*：通用组件，可以通过 `<int:splitter>` XML 元素或 `@Splitter` 注解进行配置

    *   *XPath*：特定于 XML 负载，可以通过 `<int-xml:xpath-splitter>` 进行配置

    '
- fmt: '每个由分割器生成的消息将填充以下标头：


    - `correlationId`：默认情况下，从单个消息创建的消息将具有相同的`correlationId`。

    - `sequenceSize`：默认情况下，从原始消息创建的消息数量。

    - `sequenceNumber`：默认情况下，从原始消息创建的消息的顺序。


    这些标头将在后续的“聚合器”部分详细说明。聚合器通常与消息流中的分割器一起使用。


