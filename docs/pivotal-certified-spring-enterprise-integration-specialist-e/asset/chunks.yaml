    步骤的条件执行


    SB 提供了以编程方式决定是否需要执行`Step`的功能。这种编程决策在实现`JobExecutionDecider`的 Bean 中完成，然后在构建`Job`时，通过
    XML 的`<decision>`元素，或通过 Java 配置中`next()`、`on()`、`to()`和`from()`方法的组合来使用该 Bean。


    步骤决策的 XML 配置


    清单 9-111 展示了`JobExecutionDecider`的实现。


    ***清单 9-111***. JobExecutionDecider 实现（0933-decision-xml）


    ```

    package net.lkrnac.book.eiws.chapter09;

    import org.springframework.batch.core.JobExecution;

    import org.springframework.batch.core.StepExecution;

    import org.springframework.batch.core.job.flow.FlowExecutionStatus;

    import org.springframework.batch.core.job.flow.JobExecutionDecider;

    import org.springframework.stereotype.Component;


    @Component

    public class TeaIngredientDecider implements JobExecutionDecider {

      @Override

      public FlowExecutionStatus decide(JobExecution jobExecution,

          StepExecution stepExecution) {

        String teaIngredient = jobExecution.getJobParameters().getString("teaIngredient");

        return ("milk".equals(teaIngredient))

            ? new FlowExecutionStatus(teaIngredient)

            : FlowExecutionStatus.COMPLETED;

      }

    }

    ```

    '
- fmt: 'The component acting as `JobExecutionDecider` has to implement the `decide()`
    method, which has to return the `FlowExecutionStatus` type. We can use standard
    SB constants—for example, `FlowExecutionStatus.COMPLETED` or `FlowExecutionStatus.FAILED`.
    Notice that there are more out-of-the-box status constants in `FlowExecutionStatus`.


    We can also wrap any string value into the `FlowExecutionStatus` type, which gives
    us an indefinite number of flow control opportunities in addition to the out-of-the-box
    status constants. In this case, we retrieve the `teaIngredient` job parameter
    from the injected `jobExecution` instance, and if milk is the desired ingredient,
    we indicate it in the return value; otherwise, the return status will be `COMPLETED`.


    For this example we also introduce a new tasklet step called `AddMilk`. Because
    it is similar to all other tea tasklets, we skip its listing. It simulates the
    `Add Milk` action. [Listing 9-112](#9781484207949_Ch09_2_Ext.xhtml#FPar116) shows
    the XML configuration.


    [***Listing 9-112***](#9781484207949_Ch09_2_Ext.xhtml#_FPar116). XML Configuration
    of Conditional Step (File batch-config.xml in Folder src/main/resource of Example
    Project 0933-decision-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

        http://www.springframework.org/schema/batch/spring-batch.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <job id="prepareTeaJob">

        <step id="boilWaterStep" next="addTeaStep">

          <tasklet ref="boilWater"/>

        </step>

        <step id="addTeaStep" next="addWaterStep">

          <tasklet ref="addTea"/>

        </step>

        <step id="addWaterStep" next="teaIngredientDecision">

          <tasklet ref="addWater"/>

        </step>

        <decision decider="teaIngredientDecider" id="teaIngredientDecision">

          <next on="milk" to="addMilkStep"/>

          <end on="COMPLETED"/>

        </decision>

        <step id="addMilkStep">

          <tasklet ref="addMilk"/>

        </step>

      </job>

    </beans:beans>

    ```


    The `AddWater` step defines `teaIngredientDecision` as the next `Step`. This decision
    block uses the `TeaIngredientDecider` bean as the decider logic. If the decider
    returns the `milk` value, we execute `addMilkStep`. If any other value is returned,
    we end the `Job` flow. [Listing 9-113](#9781484207949_Ch09_2_Ext.xhtml#FPar117)
    shows the main class of this example.


    [***Listing 9-113***](#9781484207949_Ch09_2_Ext.xhtml#_FPar117). Main Class of
    Decision Step Example (0933-decision-xml)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.JobParameters;

    import org.springframework.batch.core.JobParametersBuilder;

    import org.springframework.batch.core.launch.JobLauncher;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ConfigurableApplicationContext;


    @SpringBootApplication

    public class BatchApplication {

      public static void main(String[] args) throws Exception {

        ConfigurableApplicationContext context =

            SpringApplication.run(BatchApplication.class, args);


    JobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);

        Job job = (Job) context.getBean("prepareTeaJob");


    jobLauncher.run(job, createJobParameters("milk"));

        jobLauncher.run(job, createJobParameters(""));

        context.close();

      }


    public static JobParameters createJobParameters(String teaIngredient) {

        return new JobParametersBuilder()

            .addString("teaIngredient", teaIngredient)

            .toJobParameters();

      }

    }

    ```


