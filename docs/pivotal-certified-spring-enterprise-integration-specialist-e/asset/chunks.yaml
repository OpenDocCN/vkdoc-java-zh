    Developers can take advantage of the flexibility of the Spring Web Services binding
    mechanism and vary it with parameters.


    Spring can also inject into our web service method the metadata of the message—for
    example, the SOAP header or message context. The message context contains all
    data involved in the service’s current request:


    *   Request

    *   Repose

    *   Properties, which can be used to communicate with the interceptors and endpoint


    Let’s say we want to read the SOAP header `role` and use the message context in
    web service logic now. [Listing 3-10](#9781484207949_Ch03.xhtml#FPar14) reflects
    this requirement.


