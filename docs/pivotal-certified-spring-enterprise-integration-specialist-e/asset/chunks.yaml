    \ \"Krnac\");\n    mockWsServer.verify();\n  }\n}\n```\n\nSimilar to the server-side\
    \ testing example in [Listing 3-37](#9781484207949_Ch03.xhtml#FPar42), TestNG\
    \ is used as a testing framework. The test uses `WsBootClientConfiguration` as\
    \ a configuration under test. For creation of a fake server, we need to autowire\
    \ an instance of `WebServiceTemplate`. Then we record requests that are expected\
    \ from the client and responses provided by the fake server.\n\nThe testing client\
    \ instance was injected from the Spring testing configuration. We perform the\
    \ client call as it would be done from our client application. In the verification\
    \ phase, we need to verify that the client correctly represented responses from\
    \ the fake server. Last but not least, we need to verify that the requests sent\
    \ from the test client to the fake server were correct. This is done by a method\
    \ called `verify` on the fake server instance.\n\n## Summary\n\nIn this chapter,\
    \ we briefly compared concepts for creating web services and distributed applications\
    \ and the advantages that arise from decoupling services in comparison to remoting\
    \ technologies. Then we presented XML marshalling technologies that can be integrated\
    \ into Spring’s ecosystem.\n\nWe also explored the benefits of a Contract First\
    \ approach for building web services with the Spring Web Services project. This\
    \ approach helps abstract away the complexity of developing web services and makes\
    \ it much more approachable by providing APIs to follow best practices on top\
    \ of existing libraries and protocols. It enables us to create SOAP-based web\
    \ services that can communicate via HTTP, JMS, e-mail, and XMPP transport protocols.\n\
    \nWe showed how to optimally start developing a web service contract based on\
    \ communication requirements. The message payload is the starting line for generating\
    \ an XSD contract draft. Subsequently, the JAXB 2 Java model can be generated\
    \ based on this contract. Configuring a container environment and Spring configuration\
    \ with use of XML and Java contexts was also covered.\n\nRouting web service messages\
    \ is the backbone of productive development with Spring. We can benefit from routing\
