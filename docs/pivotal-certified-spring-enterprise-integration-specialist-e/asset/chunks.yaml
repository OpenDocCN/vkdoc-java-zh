    ```

    package net.lkrnac.book.eiws.chapter09;

    import java.util.HashMap;

    import java.util.Map;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.batch.core.partition.support.Partitioner;

    import org.springframework.batch.item.ExecutionContext;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class RecordsPartitioner implements Partitioner {

      @Override

      public Map<String, ExecutionContext> partition(int gridSize) {

        int min = 0;

        int max = 16;

        int targetSize = (max - min) / gridSize;

        log.info("***** 分区分布 *****");

        log.info("最小值 = " + min + " 最大值 = " + max + " 目标大小 = " + targetSize);


    Map<String, ExecutionContext> result = new HashMap<String, ExecutionContext>();

        int partitionIdx = 0;

        int start = min;

        int end = start + targetSize - 1;


    while (start < max) {

          ExecutionContext value = new ExecutionContext();

          result.put("partition" + partitionIdx, value);


    if (end > max) {

            end = max - 1;

          }

          log.info("分区起始" + partitionIdx + " = " + start);

          log.info("分区结束" + partitionIdx + " = " + end);


    value.putInt("currentIndex", start);

          value.putInt("partitionEnd", end);

          start += targetSize;

          end += targetSize;

          partitionIdx++;

        }


    log.info("分区数 = " + result.size());

        log.info("*********************************");

        return result;

      }

    }

    ```


    这个 SB 组件根据给定的 `gridSize`（分区数）将分区划分到独立的 `ExecutionContext` 实例中。每个 `ExecutionContext`
    实例包含其所属分区的起始和结束索引。数据集的大小（要处理的记录数）被硬编码为 `16`，因为此示例的 `IndexedReadRepository` 只有
    `16` 条记录需要处理。希望您能谅解这一点，这是为了使示例更简单而设计的。因此，例如，当 `gridSize` 为 `2` 个分区时，我们将创建两个 `ExecutionContext`，其分区边界分别为
    `0..7` 和 `8..15`。


    ![Image](img/sq.jpg) **注意**  此算法以及此分区示例中的其他构造，深受 Michael Minella 在 `https://github.com/mminella/Spring-Batch-Talk-2.0`
    上的远程分区示例的影响。


