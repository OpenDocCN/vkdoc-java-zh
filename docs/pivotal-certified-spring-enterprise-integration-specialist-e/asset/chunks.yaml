  trans: '

    *   *消息特定错误通道*：如果某条消息具有名为 `errorChannel` 的指定标头，则由该消息引起的错误将被发送到此标头指定的通道。

    *   *组件特定错误通道*：如果发起异步消息分发的组件具有指定的 `error-channel`，则其线程中发生的错误消息将被发送到此属性指定的通道（请注意，这必须是异步分发，因为同步分发代表同步消息传递，错误会传播回发送方）。

    *   *全局错误通道*：如果前面的机制都不匹配，则将使用全局错误通道来处理错误消息。SI 默认创建发布/订阅的 `errorChannel`，该通道将错误消息发送到日志记录组件。因此，默认情况下，所有错误消息至少会被项目中使用的日志记录库记录。如果需要，我们可以通过显式定义名为
    `errorChannel` 的通道来覆盖这个默认的全局错误通道。


    另外值得一提的是，SI 提供了一种特殊类型的路由器，专门用于根据引发的 `Exception` 类型来路由 `ErrorMessage` 消息。它可以通过
    `<int:exception-type-router>` XML 元素进行配置。


