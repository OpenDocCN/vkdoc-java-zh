           connection-factory="jmsConnectionFactory">

        <jms:listener destination="messageQueue" ref="simpleMessageListener"

          method="readMessage" />

      </jms:listener-container>

    </beans>

    ```


    In this case, we use Spring’s XML namespace, `jms`, to specify the listener container.
    The local JMS transaction is enabled by setting the `acknowledge` attribute to
    the `transacted` value. The rest of this configuration should be familiar from
    the previous chapter. The `connection-factory` reference is mandatory. The listener
    points to the JMS destination with the name `messageQueue`, and the listener method
    `simpleMessageListener.readMessage()`. The behavior of this example is shown in
    [Figure 6-7](#9781484207949_Ch06.xhtml#Fig7).


