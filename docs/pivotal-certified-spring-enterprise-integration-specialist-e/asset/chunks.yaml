    \ 配置的范围\n*   通过使用参数，提供将 Spring Bean 及其方法灵活映射到 URL 的功能。以下每个属性都可以在方法级别和类级别使用：\n\
    \    *   `value`：将方法映射到 URI 或 URL 模式。如果同时使用了类级别和方法级别的注解，最终的映射 URI 将被拼接起来。\n  \
    \  *   `method`：指定正在处理的 HTTP 方法。\n    *   `consumes`：指定可以消费的内容类型。\n    *   `produces`：指定可以生成的内容类型。\n\
