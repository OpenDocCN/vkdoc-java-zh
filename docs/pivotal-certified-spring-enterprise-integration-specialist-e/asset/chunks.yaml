    \    }\n\n    @PostConstruct\n    public Integer initDbTable() {\n        jdbcTemplate.execute(\"\
    drop table USERS if exists\");\n        jdbcTemplate.execute(\"create table USERS(NAME\
    \ varchar(50), EMAIL varchar(50))\");\n        return null;\n    }\n}\n```\n\n\
    Spring Boot initializes the `JdbcTemplate` and `DataSource` by default if autoconfiguration\
    \ is turned on and the relevant database libraries are on the classpath. In this\
    \ case, we have an H2 in-memory database configured on the classpath. This Spring\
    \ bean injects the `JdbcTemplate` instance to initiate the schema of the in-memory\
    \ database. The `initDbTable()` method is annotated by `@PostConstruct`, so it\
    \ will be executed right after the Spring context is initialized.\n\nNext, [Listing\
    \ 9-13](#9781484207949_Ch09_1.xhtml#FPar14) shows the input file we are using\
    \ as a data source for reading.\n\n[***Listing 9-13***](#9781484207949_Ch09_1.xhtml#_FPar14).\
    \ Input File for File to DB Chunk-Oriented Example (File `users.txt` in Folder\
    \ `src/main/resources` for Example Project 0903-chunk-processing-non-generic)\n\
    \n```\nLubos Krnac,lubos.krnac@gmail.com\nCade Mckee,massa.rutrum@magnaNam.ca\n\
    Melvin Boone,enim.Nunc@Sedcongue.co.uk\nThane Flowers,vulputate.velit@dignissimlacus.org\n\
    Mohammad Salas,convallis@malesuada.ca\nUpton Ewing,tincidunt.nibh@natoque.org\n\
    ```\n\nThe delimiter for this file is a comma. [Listing 9-14](#9781484207949_Ch09_1.xhtml#FPar15)\
    \ shows the configuration of the file reader and JDBC writer.\n\n[***Listing 9-14***](#9781484207949_Ch09_1.xhtml#_FPar15).\
    \ Reader and Writer Configuration for File to DB Chunk-Oriented Example (0903-chunk-processing-non-generic)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter09;\nimport javax.sql.DataSource;\n\
    import net.lkrnac.book.eiws.chapter09.model.User;\nimport org.springframework.batch.item.ItemReader;\n\
    import org.springframework.batch.item.ItemWriter;\nimport org.springframework.batch.item.database.BeanPropertyItemSqlParameterSourceProvider;\n\
    import org.springframework.batch.item.database.JdbcBatchItemWriter;\nimport org.springframework.batch.item.file.FlatFileItemReader;\n\
    import org.springframework.batch.item.file.mapping.BeanWrapperFieldSetMapper;\n\
    import org.springframework.batch.item.file.mapping.DefaultLineMapper;\nimport\
    \ org.springframework.batch.item.file.transform.DelimitedLineTokenizer;\nimport\
    \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.core.io.ClassPathResource;\n\n@Configuration\npublic\
    \ class ChunkConfiguration {\n    @Bean\n    public ItemReader<User> fileItemReader()\
    \ {\n        FlatFileItemReader<User> flatFileItemReader = new FlatFileItemReader<>();\n\
    \        flatFileItemReader.setResource(new ClassPathResource(\"users.txt\"));\n\
    \n        BeanWrapperFieldSetMapper<User> fieldSetMapper = new BeanWrapperFieldSetMapper<>();\n\
    \        fieldSetMapper.setTargetType(User.class);\n\n        DelimitedLineTokenizer\
    \ lineTokenizer = new DelimitedLineTokenizer();\n        lineTokenizer.setDelimiter(\"\
    ,\");\n        lineTokenizer.setNames(new String[] { \"name\", \"email\" });\n\
    \n        DefaultLineMapper<User> lineMapper = new DefaultLineMapper<>();\n  \
    \      lineMapper.setFieldSetMapper(fieldSetMapper);\n        lineMapper.setLineTokenizer(lineTokenizer);\n\
    \n        flatFileItemReader.setLineMapper(lineMapper);\n        return flatFileItemReader;\n\
    \    }\n\n    @Bean\n    public ItemWriter<User> jdbcItemWriter(DataSource dataSource)\
    \ {\n        JdbcBatchItemWriter<User> writer = new JdbcBatchItemWriter<>();\n\
    \        writer.setItemSqlParameterSourceProvider(\n            new BeanPropertyItemSqlParameterSourceProvider<>());\n\
    \        writer.setSql(\"insert into USERS (NAME, EMAIL) values (:name, :email)\"\
    );\n        writer.setDataSource(dataSource);\n        return writer;\n    }\n\
    }\n```\n\nThis Spring configuration class defines two beans. The first one is\
    \ used as Spring’s implementation of `ItemReader` for reading from flat files:\
    \ `FlatFileItemReader<User>`. First, we need to configure the source file location.\
    \ In this case, we expect it on the classpath with the name `users.txt` (the file\
    \ in [Listing 9-13](#9781484207949_Ch09_1.xhtml#FPar14)). Next we need to configure\
    \ the target type for the conversion from one line into `BeanWrapperFieldSetMapper<User>`.\
    \ In our case, we use the `User` class. `DelimitedLineTokenizer` is used for parsing\
    \ the file based on the comma delimiter and maps the parsed values into the `User`\
    \ object fields. Finally, we configure the created line tokenizer and field set\
    \ mapper into the `flatFileItemReader` object, and the item reader is configured.\n\
    \nThe second bean creates Spring’s item writer implementation `JdbcBatchItemWriter<User>`,\
    \ used for writing into databases. The generic type specifies the type of the\
    \ items to be written. In order to use the `User` field names as parameters in\
    \ the JDBC query, we need to configure the `BeanPropertyItemSqlParameterSourceProvider<User>`\
    \ implementation as a SQL parameter provider. Apart from that, we need to also\
    \ configure the JDBC data source instance and the SQL query to execute into the\
    \ writer.\n\n![Image](images/sq.jpg) **Note** The SB framework provides a lot\
    \ of possibilities for out-of-the-box implementations of `ItemReader` and `ItemWriter`.\
    \ Full coverage of these APIs and implementations is beyond the scope of this\
    \ book. Refer to SB reference documentation for further details.\n\n[Listing 9-15](#9781484207949_Ch09_1.xhtml#FPar17)\
    \ shows the batch configuration of `Step` and `Job`.\n\n[***Listing 9-15***](#9781484207949_Ch09_1.xhtml#_FPar17).\
    \ Batch Configuration of File to DB Chunk-Oriented Example (0903-chunk-processing-non-generic)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.model.User;\n\
    import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.Step;\n\
    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
