    \ 21:41:20.519  INFO 8057 --- [           main] n.l.book.eiws.chapter08.SiApplication\n\
    : Result:true\n```\n\n路由按预期工作。我们还能得到返回值，就好像 SI 流只是一个单一的服务调用。图 8-9 展示了此示例的 SI 图。\n\
