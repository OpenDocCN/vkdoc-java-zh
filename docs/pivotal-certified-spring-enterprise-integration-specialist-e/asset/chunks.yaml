        String message = (String) jmsTemplate.receiveAndConvert("queue/ExpiryQueue");

        simpleService.processText(message);

      }

    }

    ```


    The `SimpleMessageReader` class is again a Spring component and injects two dependencies
    via constructor injection. The first one is the famous `jmsTemplate` instance.
    We make sure that synchronous reception wouldn’t be blocked forever by configuring
    the `receiveTimeout` property for `jmsTemplate`. The second dependency is `simpleService`,
    which is responsible for processing messages (logging them).


