    在此配置中，我们使用 `tx` 命名空间在 JTA 事务管理器的框架下启用 `@Transactional` 注解。JTA Bean 的定义随后使用 `bean`
    命名空间。我们需要创建的第一个 Bean 是 `com.atomikos.icatch.jta.UserTransactionManager`，作为全局事务管理器。我们之前提到过，Spring
    本身不具备 JTA 能力，因此需要借助外部 JTA 框架。


    为了将 Atomikos 全局事务管理器作为 `PlatformTransactionManager` 集成到 Spring 应用中，我们需要将其包装到 Spring
    的 `JtaTransactionManager` 中。这使我们能够在 Atomikos 实现的基础上利用 Spring 的事务 JTA 支持。一个重要的配置步骤是创建
    `com.atomikos.icatch.jta.UserTransactionImp`，它用于启动 Atomikos 事务服务。在 Java SE 环境中进行此配置非常重要。对于
    Java EE 驱动的应用，我们会使用 `com.atomikos.icatch.jta.J2eeUserTransaction`。


    清单 7-5 展示了 JDBC 数据源的配置。


    ***清单 7-5***. JDBC XA 数据源的 XML 配置（文件位于示例项目 0701-jta-xml-config 的 src/main/resources
    文件夹中的 spring-jdbc-config.xml）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <bean id="dataSource" class="com.atomikos.jdbc.AtomikosDataSourceBean">

        <property name="uniqueResourceName" value="jdbcDataSource" />

        <property name="xaDataSource">

          <bean class="org.h2.jdbcx.JdbcDataSource">

            <property name="url"

              value="jdbc:h2:mem:testdb"/>

            <property name="user" value="sa"/>

          </bean>

        </property>

      </bean>


    <bean id="jdbcTemplate" class="org.springframework.jdbc.core.JdbcTemplate">

        <property name="dataSource" ref="dataSource"/>

      </bean>

    </beans>

    ```


    这里我们仅使用 Spring XML 的 `bean` 命名空间来定义 Spring Bean。首先，我们基于 Atomikos 提供的 `com.atomikos.jdbc.AtomikosDataSourceBean`
    实现创建一个 XA 数据源 Bean。需要此实现才能与 JTA 全局事务管理器正常协作。`uniqueResourceName` 是一个必填参数，当应用中存在多个此类型的
    XA 数据源时，该值必须唯一。因此，在我们的示例中，值 `jdbcDataSource` 完全合适。


    在 `xaDataSource` 属性中，我们包装了本地数据源实现。需要此包装器，以便经典的 JDBC 数据源能够参与全局事务。在此例中，我们使用了一个内存中的
    H2 数据库引擎，正如经典 JDBC 数据源中所提到的。我们还需要将此 Bean 包装到 `JdbcTemplate` Bean 中，以便在此 XA 数据源之上启用
    Spring JDBC 支持。因此，`JdbcTemplate` 并不知道它正在处理一个 XA 数据源。清单 7-6 展示了 JMS 配置。


    ***清单 7-6***. JMS XA 数据源的 XML 配置（文件位于示例项目 0701-jta-xml-config 的 src/main/resources
    文件夹中的 spring-jms-config.xml）


    ```

