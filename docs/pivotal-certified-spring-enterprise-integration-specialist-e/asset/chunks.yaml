  raw: '```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddMilk;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;

    import net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.batch.core.job.flow.FlowExecutionStatus;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater)
    {

        return stepFactory.get("boilWaterStep").tasklet(boilWater).build();

      }


    @Bean

      public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {

        return stepFactory.get("addTeaStep").tasklet(addTea).build();

      }


    @Bean

      public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)
    {

        return stepFactory.get("addWaterStep").tasklet(addWater).build();

      }


    @Bean

      public Step addMilkStep(StepBuilderFactory stepFactory, AddMilk addMilk) {

        return stepFactory.get("addMilkStep").tasklet(addMilk).build();

      }


    @Bean

      public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,

          @Qualifier("boilWaterStep") Step boilWaterStep,

          @Qualifier("addTeaStep") Step addTeaStep,

          @Qualifier("addWaterStep") Step addWaterStep,

          @Qualifier("addMilkStep") Step addMilkStep,

          TeaIngredientDecider teaIngredientDecider) {

        return jobBuilderFactory.get("prepareTeaJob")

            .start(boilWaterStep)

            .next(addTeaStep)

            .next(addWaterStep)

            .next(teaIngredientDecider)

              .on("milk")

                .to(addMilkStep)

                .from(teaIngredientDecider)

              .on(FlowExecutionStatus.COMPLETED.getName())

                .end()

              .build()

            .build();

      }

    }

    ```


    The definition of steps is straightforward; we use our common tea tasklets with
    the `AddMilk` tasklet and inject it into the `Job` bean construction method. This
    is where the interesting constructs start. `addWaterStep` goes to `teaIngredientDecider`.


    The following execution path depends on the decider’s return value. If the decider
    returns the `milk` value, the branch with `on("milk")` is executed. It defines
    `addMilkStep` as the next step to execute. We also have to define the `from()
    Step`; otherwise, the `Job` will fail. If the decider returns `FlowExecutionStatus.COMPLETED`,
    the second branch of execution is applied. This value ends the execution of the
    batch flow.


    Execution of the `build()` method is needed twice, because the first call builds
    the `Job` subflow initiated by the decider. The second `build()` call constructs
    the main `Job` instance. After we run this example, we can observe the same output
    as for the previous example ([Listing 9-114](#9781484207949_Ch09_2_Ext.xhtml#FPar118)).


    Scaling and Parallel Processing


    All the executions so far have been single-threaded. Sequential processing is
    often required by the nature of the data being processed, or simply isn’t slow
    enough to represent a bottleneck in an enterprise system.


    But often data doesn’t have to be processed in sequence. In these cases, we can
    consider whether distributing the batch processing into separate threads or processes
    would boost overall performance. Fortunately, SB’s creators considered such use
    cases and implemented support for the following:


    *   Multithreaded step (executed in a single process)

    *   Parallel steps (executed in a single process)

    *   Remote chunking of steps (executed in various processes)

    *   Partitioning a step (executed in various processes)


    Multithreaded Step


    The idea of using multiple threads for one `Step` is applicable only to Chunk-oriented
    processing. Each chunk is processed in a separate thread. The threads are handled
    by a thread pool configured for `Step`.


    XML Configuration of Multithreaded Step


    This example reuses the common chunk-oriented reader, processor, and writer as
    well as the common `BatchConfiguration` and Spring Boot main class. The only new
    part is the XML configuration introduced in [Listing 9-116](#9781484207949_Ch09_3_Ext.xhtml#FPar120).


    [***Listing 9-116***](#9781484207949_Ch09_3_Ext.xhtml#_FPar120). XML Configuration
    of Multithreaded Step (File batch-config.xml in Folder src/main/resource of Example
    Project 0935-multi-threaded-step-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xmlns:task="http://www.springframework.org/schema/task"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

        http://www.springframework.org/schema/batch/spring-batch.xsd

        http://www.springframework.org/schema/task

        http://www.springframework.org/schema/task/spring-task.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <job id="simpleRecordsJob">

        <step id="simpleRecordsStep">

          <tasklet task-executor="taskExecutor">

            <chunk reader="simpleRecordReader" writer="simpleRecordWriter"

              processor="simpleRecordProcessor" commit-interval="4" />

