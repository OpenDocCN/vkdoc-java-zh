- fmt: "```java\n@Bean\npublic DefaultJmsListenerContainerFactory jmsListenerContainerFactory(\n\
    \    ConnectionFactory connectionFactory,\n    JmsTransactionManager transactionManager)\
    \ {\n  DefaultJmsListenerContainerFactory factory =\n      new DefaultJmsListenerContainerFactory();\n\
    \  factory.setConnectionFactory(connectionFactory);\n  factory.setTransactionManager(transactionManager);\n\
    \  return factory;\n}\n```\n\nFirst of all, we create and register the `JmsTransactionManager`\
    \ bean based on a `connectionFactory` instance injected by Spring. The second\
    \ bean is `DefaultJmsListenerContainerFactory`, also based on the same `connectionFactory`\
    \ object as shown in the previous examples. But now we also inject and configure\
    \ `transactionManager` into the listener container factory to enable Spring transactional\
    \ features on top of this listener container factory.\n\n[Listing 6-27](#9781484207949_Ch06.xhtml#FPar29)\
    \ shows a listener implementation for this example.\n\n***Listing 6-27***. Listener\
    \ Class for `JmsConfigurationManager` Example (0613-jms-transaction-manager)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.JMSException;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.annotation.JmsListener;\n\
    import org.springframework.stereotype.Component;\nimport org.springframework.transaction.annotation.Transactional;\n\
    \n@Component\npublic class SimpleMessageListener {\n  private SimpleService simpleService;\n\
    \  private boolean errorSimulated = false;\n\n  @Autowired\n  public SimpleMessageListener(SimpleService\
    \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
    \n  @Transactional\n  @JmsListener(destination = \"messageQueue\")\n  public void\
    \ readMessage(String messageText) throws JMSException {\n    preprocess(messageText);\n\
    \    simpleService.processText(messageText);\n  }\n\n  private void preprocess(String\
    \ message) {\n    // simulate error\n    if (!errorSimulated) {\n      errorSimulated\
    \ = true;\n      throw new IllegalArgumentException(message);\n    }\n  }\n}\n\
    ```\n\nWe used a transaction demarcation feature for the listener method `readMessage()`.\
    \ The `preprocess()` method called before `simpleService.processText()` simulated\
    \ an error for the first received message. For subsequent messages, no error is\
    \ simulated. The sequence diagram for this behavior after running the example\
    \ is shown in [Figure 6-9](#9781484207949_Ch06.xhtml#Fig9).\n\n![9781484207949_Fig06-09.jpg](images/9781484207949_Fig06-09.jpg)\n\
    \n[Figure 6-9](#9781484207949_Ch06.xhtml#_Fig9). Sequence diagram of `JmsTransactionManager`\
    \ example (file `sequence.uml` in folder `uml-diagrams` of example project `0613-jms-transaction-manager`)\n\
    \nWhen the first message is received and an exception from `preprocess()` is thrown,\
    \ `JmsTransactionManager` rolls back the transaction created on message reception.\
    \ That causes redelivery of the message. The second `preprocess()` call doesn’t\
    \ throw an exception, and the message is, on second attempt, persisted and committed\
    \ afterward.\n\n*Notice that if we simulated an error in `postprocess()` after\
    \ message persistence, the result would be a duplicate message in the database\
    \ again.* But we’ll skip this example because we already covered a duplicate scenario\
    \ with JMS transactions.\n\n## Handling Duplicates\n\nEven with all the reliability\
    \ mechanisms we’ve mentioned, some scenarios can still cause message loss or duplication.\
    \ Spring can’t abstract out all the problems of JMS integration with other transactional\
    \ storage options, but tries to decrease the possibility of failure.\n\nTherefore,\
    \ using `SimpleMessageListenerContainer` or `SimpleJmsListenerContainerFactory`\
    \ is recommended if our JMS message reception is based on acknowledge modes, especially\
    \ `AUTO_ACKNOWLEDGE`. If we use transactions for JMS for message reception, the\
    \ best-suited implementation is `DefaultMessageListenerContainer` or `DefaultJmsListenerContainerFactory`.\n\
    \nThere is another option that we haven’t mentioned, which provides ACID characteristics\
    \ across various transacted data stores. Based on distributed JTA transactions,\
    \ this option is described in the next chapter. However, it is resource intensive\
    \ and widely considered a significant performance killer. Therefore, every programmer\
    \ should try to avoid it if possible. Fortunately, options exist for ensuring\
    \ that no lost messages or duplicates occur without distributed transactions.\
    \ But first, we need to take into account various considerations.\n\nFirst, we\
    \ need to know whether the target storage is idempotent—whether it can handle\
    \ duplicate messages without creating an inconsistent state. When storage is idempotent,\
    \ we can use any of the duplicate scenario examples from this chapter, and your\
    \ integration between JMS and the database would be safe.\n\nA more complicated\
    \ situation arises when we don’t have such smart storage that can detect duplicates.\
    \ Handling this scenario is explained in the next example. We reuse the common\
    \ main and sender implementations and JMS configuration based on `JmsTransactionManager`\
    \ from the previous example in [Listing 6-27](#9781484207949_Ch06.xhtml#FPar29).\
    \ The listener of this example is shown in [Listing 6-28](#9781484207949_Ch06.xhtml#FPar30).\n\
    \n***Listing 6-28***. Listener Class for Handling Duplicates Covering Scenario\
    \ with Error after Message Persistence (0614-handle-duplicates-error-after)\n\n\
    ```java\npackage net.lkrnac.book.eiws.chapter06.text;\n\nimport javax.jms.JMSException;\n\
    import javax.jms.Message;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.jms.annotation.JmsListener;\nimport org.springframework.stereotype.Component;\n\
    import org.springframework.transaction.annotation.Transactional;\n\n@Component\n\
    public class SimpleMessageListener {\n  private SimpleService simpleService;\n\
    \n  @Autowired\n  public SimpleMessageListener(SimpleService simpleService) {\n\
    \    super();\n    this.simpleService = simpleService;\n  }\n\n  @Transactional\n\
    \  @JmsListener(destination = \"messageQueue\")\n  public void readMessage(String\
    \ messageText, Message message)\n      throws JMSException {\n    if (message.getJMSRedelivered())\
    \ {\n      processIfNeeded(messageText);\n    } else {\n      simpleService.processText(messageText);\n\
    \      postprocess(messageText);\n    }\n  }\n\n  private void processIfNeeded(String\
    \ messageText) {\n    if (!simpleService.isProcessed(messageText)) {\n      simpleService.processText(messageText);\n\
    \    }\n  }\n\n  private void postprocess(String messageText) {\n    // simulate\
    \ error\n    throw new IllegalArgumentException(messageText);\n  }\n}\n```\n\n\
    Into the transacted listener method `readMessage`, we inject the text of the message\
    \ and the `javax.jms.Message` instance. A message instance is needed for a call\
    \ to `message.getJMSRedelivered()`, which is used to find out whether this message\
    \ is a redelivery. There is also a new private method called `processIfNeeded()`.\
    \ This method first verifies whether the message is already processed; if not,\
    \ the method would call `simpleMessage.processText()` to persist it.\n\nSo here\
    \ is the full logic: If the message is redelivered, process it only if needed;\
    \ if not, just process it. You may ask: ”Why don’t we always call `processIfNeeded()`\
    \ without bothering about the `message.getJMSRedelivered()` check?” The reason\
    \ is simple. Checking whether the message was already processed is one additional,\
    \ usually *expensive*, call to the external system, and message redelivery is\
    \ so rare that we can eliminate wasting the majority of these calls by simply\
    \ checking whether the message was redelivered before checking whether it was\
    \ processed/persisted.\n\nLet’s explore the behavior in the sequence diagram in\
    \ [Figure 6-10](#9781484207949_Ch06.xhtml#Fig10).\n\n![9781484207949_Fig06-10.jpg](images/9781484207949_Fig06-10.jpg)"
