    We use Spring Boot here to initialize everything with autoconfiguration by the
    using `@SpringBootApplication` annotation. As we have the JAR dependencies needed
    for running the embedded servlet container as well as in-memory database support
    on the classpath, Spring automatically configures for us the servlet container
    and `jdbcTemplate` and `dataSource` bean to access this in-memory database. This
    annotation also scans the current package and subpackages for Spring beans, and
    of course initializes SI. You can think of it as having `@EnableIntegration` under
    the hood, because `@SpringBootApplication` turns on this feature via autoconfiguration.


    The next annotation imports our XML SI configuration. In the main method, we run
    the Spring Boot application via the `SpringApplication.run()` call. When we run
    it, the application listens on address `http://localhost:18080`. Any text POSTed
    to this address will be persisted into `TEXT_TABLE`. [Chapter 4](#9781484207949_Ch04.xhtml)
    already covered REST and how to send payloads via HTTP. We used the Advanced REST
    Client Chrome plug-in for this purpose, so please refer to [Chapter 4](#9781484207949_Ch04.xhtml)
    if you are unsure about sending HTTP messages.


    Visualization of the SI flow looks similar to the XML generic channel adapters
    example in [Figure 8-1](#9781484207949_Ch08_1.xhtml#Fig1).


    Service Activator


    A *service activator* is a generic SI message endpoint, which maps a message channel
    onto a Spring bean and invokes a specified method. The message received by this
    endpoint will try to be converted (if needed) into a parameter or various parameters
    of the mapped method. Similarly, the eventual return value from the method will
    try to be converted into a new message (if needed). If any of these conversions
    fail, an exception will be thrown.


    The service activator can be plugged into the middle of the SI flow or as an output
    component; therefore, the input channel attribute is mandatory. This fact also
    means that the method mapped to the service activator must have at least one parameter,
    so that the message can be passed to the service. It can participate in a unidirectional
    as well as a bidirectional message flow. The difference in these flows depends
    on the signature of the method mapped into the service activator.


    If the mapped method is void (it doesn’t return any value), it can act as a unidirectional
    output message endpoint. This mode is pretty much the same as that of the generic
    outbound channel adapter.


    If the mapped method returns a value, the service activator can act as follows:


    An output component in bidirectional SI flow.


    *   A middle component in bidirectional or unidirectional SI flow. In this configuration,
    it is similar to a message transformer endpoint (will have its own section) in
    the sense that it receives a message and returns a different message. The fundamental
    difference here is that the message transformer is designed to convert messages,
    whereas the service activator is designed to invoke a method on the Spring bean
    and optionally gather a return value into the message.


    If the mapped method returns null and an upstream SI component requires a response
    (for example, an upstream message gateway has `request-reply` configured to `true`),
    an exception is thrown in the SI flow.


    For configuring the service activator, we use the `<int:service-activator>` XML
    tag or `@ServiceActivator` annotation.


    Service Activator Example with XML Configuration


    [Listing 8-22](#9781484207949_Ch08_1.xhtml#FPar25) shows the XML SI configuration.


    [***Listing 8-22***](#9781484207949_Ch08_1.xhtml#_FPar25). XML Configuration for
    Service Activator Example (File si-config.xml in Folder src/main/resources of
    Example Project 0806-service-activator-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:inbound-channel-adapter ref="readService" method="read" channel="inChannel">

        <int:poller fixed-rate="1000" />

      </int:inbound-channel-adapter>


    <int:channel id="inChannel" />


    <int:service-activator input-channel="inChannel" ref="writeService" method="write"
    />

    </beans>

    ```


    The input part of the SI message flow is identical to `0803-channel-adapter-generic-xml`
    from [Listing 8-12](#9781484207949_Ch08_1.xhtml#FPar15). In fact, we are using
    the same `readService` bean for message creation. The difference is in the output
    part of the SI flow, which uses `<int:service-activator>` to map the `writeService.write()`
    method to our message flow. As you may remember, this method is `void`, so no
    response will be generated and it is compatible with the input channel adapter’s
    unidirectional nature. The main class of this example is shown in [Listing 8-23](#9781484207949_Ch08_1.xhtml#FPar26).


    [***Listing 8-23***](#9781484207949_Ch08_1.xhtml#_FPar26). Main Class of XML Service
    Activator Example (0806-service-activator-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.ImportResource;


    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        SpringApplication.run(SiApplication.class, args);

      }

    }

    ```


    This is the Spring Boot configuration class and the main class, which executes
    itself as the Spring Boot application. This is a common pattern with Spring Boot.
    The `@ImportResource` annotation includes the XML SI flow into this Spring context.
    `@SpringBootApplication` also covers component scanning for Spring beans. That
    is why references to `readService` and `writeService` are available for us in
    the `si-config.xml` file.'
