- fmt: "由于它实现了 JMS 接口，`MessageListener` 必须实现 `onMessage` 方法。该方法具有由 JMS 契约定义的签名，它必须接受一个\
    \ `Message` 参数。这是消息监听器的方法，当 JMS 队列需要发送新消息时，该方法将被异步执行。它实际上是观察者模式的一种实现。\n\n由于此方法将在由\
    \ HornetQ 客户端库创建的线程池管理的单独线程中被调用，因此处理所有异常是一个好主意。在这种情况下，我们记录堆栈跟踪。消息本身在接收后被委托给 `simpleService.processText()`\
    \ 调用。\n\n[列表 5-13](#9781484207949_Ch05.xhtml#FPar14) 展示了 HornetQ JMS 配置。\n\n[***列表\
    \ 5-13***](#9781484207949_Ch05.xhtml#_FPar14). 异步 JMS HornetQ 配置 (0503-async-jndi)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter05.asyncjndi;\n\nimport java.util.Hashtable;\n\
    import javax.jms.ConnectionFactory;\nimport javax.jms.JMSConsumer;\nimport javax.jms.JMSContext;\n\
    import javax.jms.MessageListener;\nimport javax.jms.Queue;\nimport javax.naming.InitialContext;\n\
    import javax.naming.NamingException;\nimport lombok.Getter;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
    \npublic class JmsConfiguration implements AutoCloseable {\n  private InitialContext\
    \ initialContext;\n  private SimpleService simpleService;\n\n@Getter\n  private\
    \ JMSContext jmsContext;\n  @Getter\n  private Queue queue;\n\npublic JmsConfiguration(SimpleService\
    \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
    \npublic void init() throws NamingException {\n    Hashtable<Object, Object> env\
    \ = new Hashtable<Object, Object>();\n    env.put(\"java.naming.factory.initial\"\
    ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
    ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
    , \"jnp://localhost:1099\");\n    initialContext = new InitialContext(env);\n\n\
    queue = (Queue) initialContext.lookup(\"queue/ExpiryQueue\");\n    ConnectionFactory\
    \ cf =\n        (ConnectionFactory) initialContext.lookup(\"/ConnectionFactory\"\
    );\n    jmsContext = cf.createContext();\n\nJMSConsumer jmsConsumer = jmsContext.createConsumer(queue);\n\
    \    MessageListener messageListener = new SimpleMessageListener(simpleService);\n\
    \    jmsConsumer.setMessageListener(messageListener);\n  }\n\n@Override\n  public\
    \ void close() throws NamingException {\n    if (initialContext != null) {\n \
    \     initialContext.close();\n    }\n    if (jmsContext != null) {\n      jmsContext.close();\n\
    \    }\n  }\n}\n```\n\n此 JMS 配置再次类似于[列表 5-6](#9781484207949_Ch05.xhtml#FPar7)\
    \ 中纯 Java JMS 2.0 示例的配置。这个 `JmsConfiguration` 在构造函数中期望一个 `SimpleService` 实例。额外的一部分是消息监听器的创建和注册。\n\
    \n首先，我们需要基于 `queue` 从 `jmsContext` 对象创建 `JMSConsumer` 实例。要创建 `SimpleMessageListener`\
    \ 实例，我们需要 `SimpleService` 实例，正如我们从[列表 5-12](#9781484207949_Ch05.xhtml#FPar13)\
    \ 中已经了解的那样。接下来，我们将监听器注册到 `jmsConsumer` 中，监听器就注册完成了。[列表 5-14](#9781484207949_Ch05.xhtml#FPar15)\
    \ 展示了此示例的主类。\n\n[***列表 5-14***](#9781484207949_Ch05.xhtml#_FPar15). 异步 JMS 2.0\
    \ 示例的主类 (0503-async-jndi)\n\n```java\npackage net.lkrnac.book.eiws.chapter05.asyncjndi;\n\
    \nimport javax.jms.JMSContext;\nimport javax.jms.JMSException;\nimport javax.jms.Queue;\n\
    import javax.naming.NamingException;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
    \npublic class AsyncJndiApplication {\n  public static void main(String[] args)\
    \ throws JMSException, NamingException {\n    SimpleService simpleService = new\
    \ SimpleService();\n    try (JmsConfiguration jmsConfiguration =\n        new\
    \ JmsConfiguration(simpleService)) {\n      jmsConfiguration.init();\n      JMSContext\
    \ jmsContext = jmsConfiguration.getJmsContext();\n      Queue queue = jmsConfiguration.getQueue();\n\
    \nSimpleMessageSender messageSender =\n          new SimpleMessageSender(jmsContext,\
    \ queue);\n      messageSender.sendMessage(\"simple message\");\n    }\n  }\n\
    }\n```\n\n`main` 方法创建一个 `SimpleService` 实例，并且在 try-with-resources 块内，它初始化 JMS\
    \ 配置并发送消息。此 `main` 方法与同步 JMS 示例之间的区别在于缺少从 `queue` 显式读取。在这种情况下，这是不需要的，因为我们已经针对队列注册了\
    \ JMS 监听器。\n\n此示例中使用的最后一个部分是 `SimpleMessageSender`，但其实现与同步 JMS 示例完全相同。因此，我们跳过此列表。当我们针对正在运行的\
    \ HornetQ 服务器执行此主类时，消息被发送到 `queue`，由 `SimpleMessageListener` 接收，并由 `SimpleService`\
    \ 记录，输出类似于[列表 5-15](#9781484207949_Ch05.xhtml#FPar16)。\n\n[***列表 5-15***](#9781484207949_Ch05.xhtml#_FPar16).\
    \ 异步 JMS 2.0 示例的输出\n\n```\n18:08:33.330 [Thread-0 (HornetQ-client-global-threads-114132791)]\
    \ INFO n.l.b.e.chapter05.text.SimpleService - Message received: simple message\n\
    ```\n\n请注意，记录的线程不是主线程，这与同步示例不同。此线程由 HornetQ 客户端库线程池管理。\n\n## Spring JMS\n\nSpring\
    \ JMS 支持旨在简化 JMS 资源的使用、创建和释放。与其他 Spring 抽象类似，它将应用程序代码与底层 JMS 基础设施和侵入式 JMS API\
    \ 的细节解耦。Spring JMS 特性可以分为以下几个主要领域：\n\n*   支持创建或获取 JMS 资源\n    *   通过 `<jee:jndi-lookup>`\
    \ XML 元素对容器管理的 JMS 资源进行 JNDI 查找\n    *   直接创建 `javax.jms.ConnectionFactory` 和\
    \ `javax.jms.Destination` 对象\n*   通过 `org.springframework.jms.core.JmsTemplate`\
    \ 类支持发送和同步接收 JMS 消息\n*   支持异步接收 JMS 消息\n    *   `@JmsListener` 注解\n    *   `<jms:listener-container>`\
    \ 和 `<jms:listener>` XML 元素\n    *   通过 `@Payload`、`@Header`、`@Headers` 注解提取 JMS\
    \ 消息元素\n    *   为了启用 Spring JMS 注解配置，Spring 4.1 引入了 `@EnableJms` 注解\n*   丰富的 JMS\
    \ 消息转换——允许轻松转换文本消息\n    *   从/到各种传输格式，如 JSON 或 XML\n    *   通过 `org.springframework.jms.support.converter.MessageConverter`\
    \ 接口进行自定义 JMS 消息转换\n\nSpring JMS 的一个重要特性对于上述大多数特性来说是通用的。它将受检异常 `javax.jms.JMSException`\
    \ 转换为非受检异常 `org.springframework.jms.JmsException`。这允许应用程序开发人员将应用程序代码与底层 JMS 通信结构完全解耦。\n\
    \n由于每个提到的 Spring JMS 领域都是一个更广泛的主题，我们将通过不同的示例分别介绍它们。\n\n### 配置 Spring JMS\n\nSpring\
    \ 为其支持的技术提供了多种配置可能性。Spring JMS 模块也不例外。"
  raw: "Because it implements the JMS interface, `MessageListener` must implement\
    \ the `onMessage` method. This method has a defined signature by JMS contract,\
    \ where it has to accept a `Message` parameter. This is the method of the message\
    \ listener that will be asynchronously executed when the JMS queue needs to send\
    \ a new message. It is effectively an implementation of the observer pattern.\n\
    \nBecause this method will be called in a separate thread, which is managed by\
    \ a thread pool created by the HornetQ client library, it is good idea to handle\
    \ all the exceptions. In this case, we log the stack trace. The message itself\
    \ is delegated to the `simpleService.processText()` call after reception.\n\n\
    [Listing 5-13](#9781484207949_Ch05.xhtml#FPar14) shows the HornetQ JMS configuration.\n\
    \n[***Listing 5-13***](#9781484207949_Ch05.xhtml#_FPar14). Asynchronous JMS HornetQ\
    \ Configuration (0503-async-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.asyncjndi;\n\
    \nimport java.util.Hashtable;\nimport javax.jms.ConnectionFactory;\nimport javax.jms.JMSConsumer;\n\
    import javax.jms.JMSContext;\nimport javax.jms.MessageListener;\nimport javax.jms.Queue;\n\
    import javax.naming.InitialContext;\nimport javax.naming.NamingException;\nimport\
    \ lombok.Getter;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\n\
    public class JmsConfiguration implements AutoCloseable {\n  private InitialContext\
    \ initialContext;\n  private SimpleService simpleService;\n\n@Getter\n  private\
    \ JMSContext jmsContext;\n  @Getter\n  private Queue queue;\n\npublic JmsConfiguration(SimpleService\
    \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
    \npublic void init() throws NamingException {\n    Hashtable<Object, Object> env\
    \ = new Hashtable<Object, Object>();\n    env.put(\"java.naming.factory.initial\"\
    ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
    ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
    , \"jnp://localhost:1099\");\n    initialContext = new InitialContext(env);\n\n\
    queue = (Queue) initialContext.lookup(\"queue/ExpiryQueue\");\n    ConnectionFactory\
    \ cf =\n        (ConnectionFactory) initialContext.lookup(\"/ConnectionFactory\"\
    );\n    jmsContext = cf.createContext();\n\nJMSConsumer jmsConsumer = jmsContext.createConsumer(queue);\n\
        MessageListener messageListener = new SimpleMessageListener(simpleService);\n\
        jmsConsumer.setMessageListener(messageListener);\n  }\n\n@Override\n  public\
    \ void close() throws NamingException {\n    if (initialContext != null) {\n      initialContext.close();\n\
        }\n    if (jmsContext != null) {\n      jmsContext.close();\n    }\n  }\n\
    }\n```\n\nThis JMS configuration is again similar to the configuration of the\
    \ pure Java JMS 2.0 example in [Listing 5-6](#9781484207949_Ch05.xhtml#FPar7).\
    \ This `JmsConfiguration` expects an instance of `SimpleService` in the constructor.\
    \ One additional piece is the creation and registration of the message listener.\n\
    \nFirst we need to create the `JMSConsumer` instance from the `jmsContext` object\
    \ based on `queue`. To create the `SimpleMessageListener` instance, we need the\
    \ `SimpleService` instance, as we already know from [Listing 5-12](#9781484207949_Ch05.xhtml#FPar13).\
    \ Next we register our listener into `jmsConsumer`, and the listener is registered.\
    \ [Listing 5-14](#9781484207949_Ch05.xhtml#FPar15) shows the main class of this\
    \ example.\n\n[***Listing 5-14***](#9781484207949_Ch05.xhtml#_FPar15). Main Class\
    \ of Asynchronous JMS 2.0 Example (0503-async-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.asyncjndi;\n\
    \nimport javax.jms.JMSContext;\nimport javax.jms.JMSException;\nimport javax.jms.Queue;\n\
    import javax.naming.NamingException;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
    \npublic class AsyncJndiApplication {\n  public static void main(String[] args)\
    \ throws JMSException, NamingException {\n    SimpleService simpleService = new\
    \ SimpleService();\n    try (JmsConfiguration jmsConfiguration =\n        new\
    \ JmsConfiguration(simpleService)) {\n      jmsConfiguration.init();\n      JMSContext\
    \ jmsContext = jmsConfiguration.getJmsContext();\n      Queue queue = jmsConfiguration.getQueue();\n\
    \nSimpleMessageSender messageSender =\n          new SimpleMessageSender(jmsContext,\
    \ queue);\n      messageSender.sendMessage(\"simple message\");\n    }\n  }\n\
    }\n```\n\n`The main` method creates a `SimpleService` instance, and within the\
    \ try-with-resources block, it initializes the JMS configuration and sends the\
    \ message. The difference between this `main` method and the synchronous JMS examples\
    \ is a lack of explicit reading from `queue`. In this case, it’s not needed, because\
    \ we registered the JMS listener against the queue.\n\nThe last piece used in\
    \ this example is `SimpleMessageSender`, but its implementation is exactly the\
    \ same as for synchronous JMS examples. Therefore, we skip this listing. When\
    \ we execute this main class against running the HornetQ server, the message is\
    \ sent to `queue`, received by `SimpleMessageListener`, and logged by `SimpleService`\
    \ with output similar to [Listing 5-15](#9781484207949_Ch05.xhtml#FPar16).\n\n\
    [***Listing 5-15***](#9781484207949_Ch05.xhtml#_FPar16). Output of Asynchronous\
    \ JMS 2.0 Example\n\n```\n18:08:33.330 [Thread-0 (HornetQ-client-global-threads-114132791)]\
    \ INFO n.l.b.e.chapter05.text.SimpleService - Message received: simple message\n\
    ```\n\nNotice that the logged thread is not the main thread, as with the synchronous\
    \ examples. This thread is managed by the HornetQ client library thread pool.\n\
    \nSpring JMS\n\nSpring JMS support aims to simplify use, creation, and release\
    \ of JMS resources. Similar to other Spring abstractions, it decouples the application\
    \ code from details of the underlying JMS infrastructure and an invasive JMS API.\
    \ Spring JMS features can be divided into these main areas:\n\n*   Support for\
    \ creating or obtaining JMS resources\n    *   JNDI lookup of container-managed\
    \ JMS resources via the `<jee:jndi-lookup>` XML element\n    *   Direct creation\
    \ of `javax.jms.ConnectionFactory` and `javax.jms.Destination` objects\n*   Support\
    \ for sending and synchronous reception of JMS messages via the `org.springframework.jms.core.JmsTemplate`\
    \ class\n*   Support for asynchronous reception of JMS messages\n    *   `@JmsListener`\
    \ annotation\n    *   `<jms:listener-container>` and `<jms:listener>` XML elements\n\
    \    *   Extraction of JMS message elements via the annotations `@Payload`, `@Header`,\
    \ `@Headers`\n    *   To enable Spring JMS annotation configuration, Spring 4.1\
    \ introduced the `@EnableJms` annotation\n*   Rich conversion of JMS messages—allows\
    \ for easy conversion of text messages\n    *   From/to various transport formats\
    \ such as JSON or XML\n    *   Custom JMS message conversion via the interface\
    \ `org.springframework.jms.support.converter.MessageConverter`\n\nOne important\
    \ feature of Spring JMS is common for most of the above-mentioned features. It\
    \ translates the checked `javax.jmsJMSException` into the unchecked exception\
    \ `org.springframework.jms.JmsException`. This allows the application developer\
    \ to completely decouple the application code from the underlying JMS communication\
    \ constructs.\n\nAs each of the mentioned Spring JMS areas is a broader topic,\
    \ we will cover them separately with various examples.\n\nConfiguring Spring JMS\n\
    \nSpring provides various possibilities for configuring the technologies it supports.\
    \ The Spring JMS module isn’t an exception."
  trans: "\n由于实现了 JMS 接口，`MessageListener` 必须实现 `onMessage` 方法。该方法具有 JMS 契约定义的签名，必须接受一个\
    \ `Message` 参数。这是消息监听器的方法，当 JMS 队列需要发送新消息时，该方法将被异步执行。它实际上是观察者模式的一种实现。\n\n由于此方法将在由\
    \ HornetQ 客户端库创建的线程池管理的独立线程中被调用，因此最好处理所有异常。在本例中，我们记录了堆栈跟踪。消息本身在接收后被委托给 `simpleService.processText()`\
    \ 调用。\n\n列表 5-13 展示了 HornetQ JMS 配置。\n\n***列表 5-13***. 异步 JMS HornetQ 配置 (0503-async-jndi)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter05.asyncjndi;\n\nimport java.util.Hashtable;\n\
    import javax.jms.ConnectionFactory;\nimport javax.jms.JMSConsumer;\nimport javax.jms.JMSContext;\n\
    import javax.jms.MessageListener;\nimport javax.jms.Queue;\nimport javax.naming.InitialContext;\n\
    import javax.naming.NamingException;\nimport lombok.Getter;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
    \npublic class JmsConfiguration implements AutoCloseable {\n  private InitialContext\
    \ initialContext;\n  private SimpleService simpleService;\n\n@Getter\n  private\
    \ JMSContext jmsContext;\n  @Getter\n  private Queue queue;\n\npublic JmsConfiguration(SimpleService\
    \ simpleService) {\n    super();\n    this.simpleService = simpleService;\n  }\n\
    \npublic void init() throws NamingException {\n    Hashtable<Object, Object> env\
    \ = new Hashtable<Object, Object>();\n    env.put(\"java.naming.factory.initial\"\
    ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
    ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
    , \"jnp://localhost:1099\");\n    initialContext = new InitialContext(env);\n\n\
    queue = (Queue) initialContext.lookup(\"queue/ExpiryQueue\");\n    ConnectionFactory\
    \ cf =\n        (ConnectionFactory) initialContext.lookup(\"/ConnectionFactory\"\
    );\n    jmsContext = cf.createContext();\n\nJMSConsumer jmsConsumer = jmsContext.createConsumer(queue);\n\
        MessageListener messageListener = new SimpleMessageListener(simpleService);\n\
        jmsConsumer.setMessageListener(messageListener);\n  }\n\n@Override\n  public\
    \ void close() throws NamingException {\n    if (initialContext != null) {\n      initialContext.close();\n\
        }\n    if (jmsContext != null) {\n      jmsContext.close();\n    }\n  }\n\
    }\n```\n\n此 JMS 配置再次类似于列表 5-6 中纯 Java JMS 2.0 示例的配置。此 `JmsConfiguration` 在构造函数中期望一个\
    \ `SimpleService` 实例。额外的一部分是消息监听器的创建和注册。\n\n首先，我们需要基于 `queue` 从 `jmsContext` 对象创建\
    \ `JMSConsumer` 实例。要创建 `SimpleMessageListener` 实例，我们需要 `SimpleService` 实例，正如我们从列表\
    \ 5-12 中已经了解的那样。接下来，我们将监听器注册到 `jmsConsumer` 中，监听器即注册完成。列表 5-14 展示了此示例的主类。\n\n\
    ***列表 5-14***. 异步 JMS 2.0 示例的主类 (0503-async-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.asyncjndi;\n\
    \nimport javax.jms.JMSContext;\nimport javax.jms.JMSException;\nimport javax.jms.Queue;\n\
    import javax.naming.NamingException;\nimport net.lkrnac.book.eiws.chapter05.text.SimpleService;\n\
    \npublic class AsyncJndiApplication {\n  public static void main(String[] args)\
    \ throws JMSException, NamingException {\n    SimpleService simpleService = new\
    \ SimpleService();\n    try (JmsConfiguration jmsConfiguration =\n        new\
    \ JmsConfiguration(simpleService)) {\n      jmsConfiguration.init();\n      JMSContext\
    \ jmsContext = jmsConfiguration.getJmsContext();\n      Queue queue = jmsConfiguration.getQueue();\n\
    \nSimpleMessageSender messageSender =\n          new SimpleMessageSender(jmsContext,\
    \ queue);\n      messageSender.sendMessage(\"simple message\");\n    }\n  }\n\
    }\n```\n\n`main` 方法创建一个 `SimpleService` 实例，并在 try-with-resources 块内初始化 JMS 配置并发送消息。此\
    \ `main` 方法与同步 JMS 示例的区别在于缺少从 `queue` 显式读取。在本例中，不需要这样做，因为我们已经针对队列注册了 JMS 监听器。\n\
    \n此示例中使用的最后一个部分是 `SimpleMessageSender`，但其实现与同步 JMS 示例完全相同。因此，我们跳过此列表。当我们针对正在运行的\
    \ HornetQ 服务器执行此主类时，消息被发送到 `queue`，由 `SimpleMessageListener` 接收，并由 `SimpleService`\
    \ 记录，输出类似于列表 5-15。\n\n***列表 5-15***. 异步 JMS 2.0 示例的输出\n\n```\n18:08:33.330 [Thread-0\
    \ (HornetQ-client-global-threads-114132791)] INFO n.l.b.e.chapter05.text.SimpleService\
    \ - Message received: simple message\n```\n\n请注意，记录的线程不是主线程，这与同步示例不同。此线程由 HornetQ\
    \ 客户端库线程池管理。\n\nSpring JMS\n\nSpring JMS 支持旨在简化 JMS 资源的使用、创建和释放。与其他 Spring 抽象类似，它将应用程序代码与底层\
    \ JMS 基础设施的细节以及侵入性的 JMS API 解耦。Spring JMS 特性可以分为以下几个主要领域：\n\n*   支持创建或获取 JMS 资源\n\
    \    *   通过 `<jee:jndi-lookup>` XML 元素对容器管理的 JMS 资源进行 JNDI 查找\n    *   直接创建 `javax.jms.ConnectionFactory`\
    \ 和 `javax.jms.Destination` 对象\n*   支持通过 `org.springframework.jms.core.JmsTemplate`\
    \ 类发送和同步接收 JMS 消息\n*   支持异步接收 JMS 消息\n    *   `@JmsListener` 注解\n    *   `<jms:listener-container>`\
    \ 和 `<jms:listener>` XML 元素\n    *   通过注解 `@Payload`、`@Header`、`@Headers` 提取 JMS\
    \ 消息元素\n    *   为了启用 Spring JMS 注解配置，Spring 4.1 引入了 `@EnableJms` 注解\n*   丰富的 JMS\
    \ 消息转换——允许轻松转换文本消息\n    *   从/到各种传输格式，如 JSON 或 XML\n    *   通过接口 `org.springframework.jms.support.converter.MessageConverter`\
    \ 进行自定义 JMS 消息转换\n\nSpring JMS 的一个重要特性对于上述大多数特性来说是通用的。它将受检异常 `javax.jms.JMSException`\
    \ 转换为非受检异常 `org.springframework.jms.JmsException`。这允许应用程序开发人员将应用程序代码与底层 JMS 通信结构完全解耦。\n\
    \n由于上述每个 Spring JMS 领域都是一个更广泛的主题，我们将通过不同的示例分别介绍它们。\n\n配置 Spring JMS\n\nSpring\
    \ 为其支持的技术提供了多种配置方式。Spring JMS 模块也不例外。\n"
- fmt: "# Spring JMS 配置概述\n\n当我们的应用程序托管在 Java Enterprise Edition 容器上时，JMS 资源（如 `ConnectionFactory`\
    \ 或 `Destination`）通常由应用服务器管理。在这种情况下，JEE 标准提供了一种标准 API，通过 JNDI 命名服务来发现此类受管理的 JMS\
    \ 资源。Spring 通过使用属于命名空间 `www.springframework.org/schema/jee` 的 `<jee:jndi-lookup>`\
    \ XML 元素，实现了与底层应用服务的 JNDI 集成。另一种选择是通过注册 `javax.naming.InitialContext` 实例来配置 JNDI\
    \ 服务。\n\n如果我们的应用程序使用不提供 JMS 资源的轻量级容器，或者我们的应用程序作为独立的 Java 应用程序运行，我们可以使用标准依赖注入构造将\
    \ JMS 资源注册到 Spring 容器中。\n\n创建 JMS 资源（如 `Destination` 和 `ConnectionFactory`）的一个相对较新的选项是使用\
    \ Spring Boot 项目。它通过 `@EnableAutoConfiguration` 注解实现了 JMS 访问的自动配置。基于此注解，Spring\
    \ 容器会检查类路径依赖项，如果存在 ActiveMQ 或 HornetQ JMS 客户端的实现，则会使用默认配置创建 JMS 资源。\n\n当我们的类路径依赖项中包含\
    \ HornetQ 或 ActiveMQ 服务器的实现时，Spring Boot 还会配置嵌入式 JMS 服务器，该服务器可以模拟类似于带有 JMS 代理的完整\
    \ JEE 应用服务器的配置。\n\nSpring Boot 1.2 引入了 `@SpringBootApplication` 注解，它是 `@Configuration`、`@ComponentScan`\
    \ 和 `@EnableAutoConfiguration` 注解组合的便捷快捷方式。\n\nSpring 4.1 中引入的另一个新配置选项是 `@EnableJms`\
    \ 注解。它启用了 `@JmsListener` 注解，并创建了一个负责管理异步 JMS 消息接收的监听器容器工厂。\n\nSpring JMS API 在发送或接收消息时通常使用纯字符串名称来表示\
    \ JMS 目标。但这与 JMS API 不兼容，JMS API 要求所有队列或主题都实现 `javax.jms.Destination` 接口。那么基于名称的解析是如何工作的呢？对于\
    \ JMS 目标的名称解析，Spring 使用一个类型为 `org.springframework.jms.support.destination.DestinationResolver`\
    \ 的特殊 bean。该接口的签名如[清单 5-16](#9781484207949_Ch05.xhtml#FPar17)所示。\n\n[***清单 5-16***](#9781484207949_Ch05.xhtml#_FPar17).\
    \ `DestinationResolver` 签名\n\n```java\npackage org.springframework.jms.support.destination;\n\
    \nimport javax.jms.Destination;\nimport javax.jms.JMSException;\nimport javax.jms.Session;\n\
    \npublic interface DestinationResolver {\n  Destination resolveDestinationName(Session\
    \ session, String destinationName,\n    boolean pubSubDomain) throws JMSException;\n\
    }\n```\n\n该接口旨在根据 JMS 目标的字符串名称和运行时给定的 JMS 会话，解析查找 JMS `Destination` 实例。Spring\
    \ 提供了多种开箱即用的实现：\n\n*   `BeanFactoryDestinationResolver`：基于 Spring 的 `BeanFactory`\
    \ 的实现，根据名称解析类型为 `javax.jms.Destination` 的 Spring 管理 bean。\n*   `DynamicDestinationResolver`：根据给定名称动态创建\
    \ JMS 目标实例。如果未明确指定，则默认使用此实现。\n*   `JndiDestinationResolver`：根据给定的 JNDI 名称解析 JMS\
    \ 目标。\n\n所有这些特性为使用 Spring 配置 JMS 提供了多种方法和组合。主要方法将在后续示例中介绍。\n\n![Image](images/sq.jpg)\
    \ **注意** 本章前面部分的 Java 示例使用 HornetQ 作为 JMS 提供者，因为它允许我们同时探索 JMS 2.0 API。为了保持 JMS\
    \ 提供者的一致性，以下大多数示例都使用 HornetQ。仅当 Spring Boot 支持不易提供某些特性时，我们才使用 ActiveMQ。\n\n# Spring\
    \ JMS XML 配置示例\n\n第一个 Spring JMS 配置示例使用 XML 来配置 JMS 资源，如[清单 5-17](#9781484207949_Ch05.xhtml#FPar19)所示。\n\
    \n[***清单 5-17***](#9781484207949_Ch05.xhtml#_FPar19). Spring JMS JNDI 查找配置（文件\
    \ `spring-jms-config.xml`，位于示例项目 `0504-async-jms-namespace` 的 `src/main/resources`\
    \ 文件夹中）\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"\
    http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n  xmlns:jee=\"http://www.springframework.org/schema/jee\"\n  xmlns:util=\"http://www.springframework.org/schema/util\"\
    \n  xsi:schemaLocation=\"http://www.springframework.org/schema/jee\n    http://www.springframework.org/schema/jee/spring-jee.xsd\n\
    \                http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \                http://www.springframework.org/schema/util\n    http://www.springframework.org/schema/util/spring-util.xsd\"\
    >\n\n<util:map id=\"jndiProperties\" map-class=\"java.util.Properties\">\n   \
    \ <entry key=\"java.naming.factory.initial\"\n      value=\"org.jnp.interfaces.NamingContextFactory\"\
    \ />\n    <entry key=\"java.naming.factory.url.pkgs\"\n      value=\"org.jboss.naming:org.jnp.interfaces\"\
    \ />\n    <entry key=\"java.naming.provider.url\" value=\"jnp://localhost:1099\"\
    \ />\n  </util:map>\n\n<jee:jndi-lookup id=\"connectionFactory\" jndi-name=\"\
    /ConnectionFactory\"\n    environment-ref=\"jndiProperties\" />\n  <jee:jndi-lookup\
    \ id=\"queue\" jndi-name=\"queue/ExpiryQueue\"\n    environment-ref=\"jndiProperties\"\
    \ />\n\n<bean id=\"jmsTemplate\" class=\"org.springframework.jms.core.JmsTemplate\"\
    >\n    <constructor-arg ref=\"connectionFactory\" />\n  </bean>\n\n<bean id=\"\
    destinationResolver\"\n    class=\"org.springframework.jms.support.destination.JndiDestinationResolver\"\
    >\n    <property name=\"jndiEnvironment\" ref=\"jndiProperties\" />\n  </bean>\n\
    </beans>\n```\n\n此 Spring XML 配置文件使用了三个命名空间。`bean` 是标准的依赖注入命名空间，是任何 Spring XML\
    \ 配置文件的基础。`jee` 命名空间用于与 Java Enterprise Edition 应用容器集成。`util` 命名空间用于各种非标准的 XML\
    \ 配置结构。\n\n在此例中，我们使用 `util` 命名空间为 HornetQ 配置定义 JNDI 属性映射。我们使用了 HornetQ 文档（`http://docs.jboss.org/hornetq/2.4.0.Final/docs/user-manual/html_single/index.html#d0e1265`）中建议的相同值。这些值与纯\
    \ Java JMS 示例中使用的值相同。此配置可以与运行在 `localhost` 上且使用默认配置的 HornetQ 服务器通信。\n\n这里需要这些属性，因为我们的示例并非运行在\
    \ JEE 应用服务器上。如果是这种情况，我们将完全排除 `jndiProperties` 部分，因为 Spring 会针对应用服务器的命名服务执行 JNDI\
    \ 查找。\n\n下一部分是 JNDI 查找本身。我们使用 `<jee:jndi-lookup>` 元素，根据 JNDI 名称和 `jndiProperties`\
    \ 映射获取 JMS `ConnectionFactory` 和 `Queue` 的实例。同样，如果 JNDI 查找是针对 JEE 容器执行的，我们将能够排除\
    \ `environment-ref` 属性。这些操作的结果是在 Spring 上下文中注册了两个 bean，名称分别为 `connectionFactory`\
    \ 和 `queue`。这对于从 Spring 应用程序的角度抽象出 JNDI 资源非常方便。"
  raw: 'When our application is hosted on the Java Enterprise Edition container, JMS
    resources such as `ConnectionFactory` or `Destination` typically are managed by
    the application server. It this case, the JEE standard provides a standard API
    to discover such managed JMS resources via the JNDI naming service. Spring enables
    integration with the underlying application service via JNDI by use of the `<jee:jndi-lookup>`
    XML element that belongs to the namespace `www.springframework.org/schema/jee`.
    Another option is to configure the JNDI service via registering the `javax.naming.InitialContext`
    instance.


    If our application uses a lightweight container that doesn’t provide JMS resources,
    or our application is running as a stand-alone Java application, we can use standard
    dependency injection constructs to register JMS resources into the Spring container.


    A relatively new option for creating JMS resources such as `Destination` and `ConnectionFactory`
    is to use the Spring Boot project. It enables autoconfiguration of JMS access
    via the `@EnableAutoConfiguration` annotation. Based on this annotation, the Spring
    container inspects classpath dependencies, and if there is an implementation of
    the ActiveMQ or HornetQ JMS client, it creates JMS resources with the default
    configuration.


    When we have an implementation of a HornetQ or ActiveMQ server between our classpath
    dependencies, Spring Boot also configures the embedded JMS server, which can simulate
    a configuration similar to a full-blown JEE application server with a JMS broker.


    Spring Boot 1.2 introduced the `@SpringBootApplication` annotation, which is a
    convenient shortcut for the combination of `@Configuration`, `@ComponentScan`,
    and `@EnableAutoConfiguration` annotations under one umbrella.


    Another new configuration option introduced in Spring 4.1 is the `@EnableJms`
    annotation. It enables the `@JmsListener` annotation and also creates a listener
    container factory that is responsible for managing the asynchronous JMS message
    reception.


    Spring JMS APIs often use plain string names for the JMS destination when sending
    or receiving messages. But this is not compatible with the JMS API, which requires
    all the queues or topics to implement the `javax.jms.Destination` interface. So
    how can a resolution based on names work? For name resolution of the JMS destination,
    Spring uses a special bean of type `org.springframework.jms.support.destination.DestinationResolver`.
    The signature of this interface is shown in [Listing 5-16](#9781484207949_Ch05.xhtml#FPar17).


    [***Listing 5-16***](#9781484207949_Ch05.xhtml#_FPar17). DestinationResolver Signature


    ```

    package org.springframework.jms.support.destination;


    import javax.jms.Destination;

    import javax.jms.JMSException;

    import javax.jms.Session;


    public interface DestinationResolver {

      Destination resolveDestinationName(Session session, String destinationName,

        boolean pubSubDomain) throws JMSException;

    }

    ```


    This interface is designed to resolve finding the JMS `Destination` instance based
    on the string name of the JMS destination and a given JMS session on the runtime.
    Spring provides various out-of-the-box implementations:


    *   `BeanFactoryDestinationResolver`: An implementation based on Spring’s `BeanFactory`
    that resolves Spring-managed beans of type `javax.jms.Destination` based on their
    name.

    *   `DynamicDestinationResolver`: Creates JMS destination instances dynamically,
    based on given names. This implementation is used by default if not explicitly
    specified.

    *   `JndiDestinationResolver`: Resolved JMS destination based on given JNDI names.


    All these features provide a lot of approaches and combinations for configuring
    JMS with Spring. Major approaches are covered in subsequent examples.


    ![Image](images/sq.jpg) **Note**  Java examples in earlier sections of this chapter
    use HornetQ as a JMS provider, because it allowed us to also explore the JMS 2.0
    API. To keep the JMS provider consistent, HornetQ is used in most of the following
    examples. We use ActiveMQ only when Spring Boot support does not easily provide
    certain features.


    Spring JMS XML Configuration Example


    The first Spring JMS configuration example uses XML to configure JMS resources,
    as shown in [Listing 5-17](#9781484207949_Ch05.xhtml#FPar19).


    [***Listing 5-17***](#9781484207949_Ch05.xhtml#_FPar19). Spring JMS JNDI Lookup
    Configuration (File spring-jms-config.xml in Folder src/main/resources in Example
    Project 0504-async-jms-namespace)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:jee="http://www.springframework.org/schema/jee"

      xmlns:util="http://www.springframework.org/schema/util"

      xsi:schemaLocation="http://www.springframework.org/schema/jee

        http://www.springframework.org/schema/jee/spring-jee.xsd

                    http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

                    http://www.springframework.org/schema/util

        http://www.springframework.org/schema/util/spring-util.xsd">


    <util:map id="jndiProperties" map-class="java.util.Properties">

        <entry key="java.naming.factory.initial"

          value="org.jnp.interfaces.NamingContextFactory" />

        <entry key="java.naming.factory.url.pkgs"

          value="org.jboss.naming:org.jnp.interfaces" />

        <entry key="java.naming.provider.url" value="jnp://localhost:1099" />

      </util:map>


    <jee:jndi-lookup id="connectionFactory" jndi-name="/ConnectionFactory"

        environment-ref="jndiProperties" />

      <jee:jndi-lookup id="queue" jndi-name="queue/ExpiryQueue"

        environment-ref="jndiProperties" />


    <bean id="jmsTemplate" class="org.springframework.jms.core.JmsTemplate">

        <constructor-arg ref="connectionFactory" />

      </bean>


    <bean id="destinationResolver"

        class="org.springframework.jms.support.destination.JndiDestinationResolver">

        <property name="jndiEnvironment" ref="jndiProperties" />

      </bean>

    </beans>

    ```


    This Spring XML configuration file uses three namespaces. `bean` is a standard
    dependency injection namespace, which is the backbone of any Spring XML configuration
    file. The `jee` namespace is meant for integration with Java Enterprise Edition
    application containers. The namespace `util` is used for various nonstandard XML
    configuration constructs.


    In this case, we are using the `util` namespace to define the map of JNDI properties
    for the HornetQ configuration. We use the same values that are suggested by the
    HornetQ documentation here `http://docs.jboss.org/hornetq/2.4.0.Final/docs/user-manual/html_single/index.html#d0e1265`.
    The same values were used for the plain Java JMS examples. This configuration
    can talk to the HornetQ server with the default configuration running on `localhost`.


    These properties are needed here because our example is not running on a JEE application
    server. If that were the case, we would exclude the `jndiProperties` part completely,
    as Spring would perform a JNDI lookup against the application server naming service.


    The next section is the JNDI lookup itself. We use `<jee:jndi-lookup>` elements
    to obtain an instance of the JMS `ConnectionFactory` and `Queue` based on their
    JNDI names and `jndiProperties` map. Again we would be able to exclude the `environment-ref`
    attribute if the JNDI lookup were performed against the JEE container. The results
    of these operations are two registered beans in Spring’s context with the names
    `connectionFactory` and `queue`. This is handy for abstracting out JNDI resources
    from the Spring application’s point of view.'
  trans: '

    当我们的应用程序托管在 Java 企业版容器上时，诸如 `ConnectionFactory` 或 `Destination` 之类的 JMS 资源通常由应用服务器管理。在这种情况下，JEE
    标准提供了一套标准 API，用于通过 JNDI 命名服务发现此类受管理的 JMS 资源。Spring 通过使用属于命名空间 `www.springframework.org/schema/jee`
    的 `<jee:jndi-lookup>` XML 元素，实现了与底层应用服务通过 JNDI 的集成。另一种选择是通过注册 `javax.naming.InitialContext`
    实例来配置 JNDI 服务。


    如果我们的应用程序使用不提供 JMS 资源的轻量级容器，或者我们的应用程序作为独立的 Java 应用程序运行，我们可以使用标准的依赖注入结构将 JMS 资源注册到
    Spring 容器中。


    一个相对较新的创建 JMS 资源（如 `Destination` 和 `ConnectionFactory`）的选项是使用 Spring Boot 项目。它通过
    `@EnableAutoConfiguration` 注解实现了 JMS 访问的自动配置。基于此注解，Spring 容器会检查类路径依赖项，如果存在 ActiveMQ
    或 HornetQ JMS 客户端的实现，则会使用默认配置创建 JMS 资源。


    当我们的类路径依赖项中包含 HornetQ 或 ActiveMQ 服务器的实现时，Spring Boot 还会配置嵌入式 JMS 服务器，该服务器可以模拟类似于带有
    JMS 代理的完整 JEE 应用服务器的配置。


    Spring Boot 1.2 引入了 `@SpringBootApplication` 注解，它是 `@Configuration`、`@ComponentScan`
    和 `@EnableAutoConfiguration` 注解组合的便捷快捷方式。


    Spring 4.1 中引入的另一个新配置选项是 `@EnableJms` 注解。它启用了 `@JmsListener` 注解，并创建了一个负责管理异步 JMS
    消息接收的监听器容器工厂。


    Spring JMS API 在发送或接收消息时，通常对 JMS 目标使用纯字符串名称。但这与 JMS API 不兼容，JMS API 要求所有队列或主题都实现
    `javax.jms.Destination` 接口。那么，基于名称的解析是如何工作的呢？对于 JMS 目标的名称解析，Spring 使用了一个类型为 `org.springframework.jms.support.destination.DestinationResolver`
    的特殊 bean。该接口的签名如清单 5-16 所示。


    ***清单 5-16***. DestinationResolver 签名


    ```

    package org.springframework.jms.support.destination;


    import javax.jms.Destination;

    import javax.jms.JMSException;

    import javax.jms.Session;


    public interface DestinationResolver {

      Destination resolveDestinationName(Session session, String destinationName,

        boolean pubSubDomain) throws JMSException;

    }

    ```


    该接口旨在根据 JMS 目标的字符串名称和运行时给定的 JMS 会话，解析查找 JMS `Destination` 实例。Spring 提供了多种开箱即用的实现：


    *   `BeanFactoryDestinationResolver`：基于 Spring 的 `BeanFactory` 的实现，根据名称解析类型为 `javax.jms.Destination`
    的 Spring 管理 bean。

    *   `DynamicDestinationResolver`：根据给定的名称动态创建 JMS 目标实例。如果未明确指定，则默认使用此实现。

    *   `JndiDestinationResolver`：根据给定的 JNDI 名称解析 JMS 目标。


    所有这些特性为使用 Spring 配置 JMS 提供了多种方法和组合。主要方法将在后续示例中介绍。


    ![Image](img/sq.jpg) **注意**  本章前面部分的 Java 示例使用 HornetQ 作为 JMS 提供者，因为它还允许我们探索 JMS
    2.0 API。为了保持 JMS 提供者的一致性，以下大多数示例中都使用 HornetQ。仅当 Spring Boot 支持不易提供某些特性时，我们才使用
    ActiveMQ。


    Spring JMS XML 配置示例


    第一个 Spring JMS 配置示例使用 XML 配置 JMS 资源，如清单 5-17 所示。


    ***清单 5-17***. Spring JMS JNDI 查找配置（文件 spring-jms-config.xml 位于示例项目 0504-async-jms-namespace
    的 src/main/resources 文件夹中）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:jee="http://www.springframework.org/schema/jee"

      xmlns:util="http://www.springframework.org/schema/util"

      xsi:schemaLocation="http://www.springframework.org/schema/jee

        http://www.springframework.org/schema/jee/spring-jee.xsd

                    http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

                    http://www.springframework.org/schema/util

        http://www.springframework.org/schema/util/spring-util.xsd">


    <util:map id="jndiProperties" map-class="java.util.Properties">

        <entry key="java.naming.factory.initial"

          value="org.jnp.interfaces.NamingContextFactory" />

        <entry key="java.naming.factory.url.pkgs"

          value="org.jboss.naming:org.jnp.interfaces" />

        <entry key="java.naming.provider.url" value="jnp://localhost:1099" />

      </util:map>


    <jee:jndi-lookup id="connectionFactory" jndi-name="/ConnectionFactory"

        environment-ref="jndiProperties" />

      <jee:jndi-lookup id="queue" jndi-name="queue/ExpiryQueue"

        environment-ref="jndiProperties" />


    <bean id="jmsTemplate" class="org.springframework.jms.core.JmsTemplate">

        <constructor-arg ref="connectionFactory" />

      </bean>


    <bean id="destinationResolver"

        class="org.springframework.jms.support.destination.JndiDestinationResolver">

        <property name="jndiEnvironment" ref="jndiProperties" />

      </bean>

    </beans>

    ```


    这个 Spring XML 配置文件使用了三个命名空间。`bean` 是标准的依赖注入命名空间，是任何 Spring XML 配置文件的支柱。`jee` 命名空间用于与
    Java 企业版应用容器集成。`util` 命名空间用于各种非标准的 XML 配置结构。


    在此例中，我们使用 `util` 命名空间为 HornetQ 配置定义 JNDI 属性映射。我们使用了 HornetQ 文档 `http://docs.jboss.org/hornetq/2.4.0.Final/docs/user-manual/html_single/index.html#d0e1265`
    中建议的相同值。这些值与纯 Java JMS 示例中使用的值相同。此配置可以与在 `localhost` 上运行默认配置的 HornetQ 服务器通信。


    这里需要这些属性，因为我们的示例不是在 JEE 应用服务器上运行的。如果是这种情况，我们将完全排除 `jndiProperties` 部分，因为 Spring
    会针对应用服务器命名服务执行 JNDI 查找。


    下一部分是 JNDI 查找本身。我们使用 `<jee:jndi-lookup>` 元素，根据其 JNDI 名称和 `jndiProperties` 映射获取
    JMS `ConnectionFactory` 和 `Queue` 的实例。同样，如果 JNDI 查找是针对 JEE 容器执行的，我们将能够排除 `environment-ref`
    属性。这些操作的结果是在 Spring 上下文中注册了两个 bean，名称分别为 `connectionFactory` 和 `queue`。这对于从 Spring
    应用程序的角度抽象出 JNDI 资源非常方便。

