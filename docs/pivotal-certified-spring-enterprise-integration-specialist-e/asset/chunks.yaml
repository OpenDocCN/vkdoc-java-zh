    `WebServiceTemplate` are `marshaller` and `unmarshaller`. These are both served
    by the `marshaller` bean. It is registered as a separate bean and used for XML-to-Java
    POJOs conversion. We can observe from earlier POJOs generation that JAXB 2 is
