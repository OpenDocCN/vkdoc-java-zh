    );\n\n    webServiceTemplate.setFaultMessageResolver(new SoapFaultMessageResolver());\n\
    \    return webServiceTemplate;\n  }\n}\n```\n\n## Out-of-Container Testing\n\n\
    Various approaches exist for automatically testing web services. Unit tests usually\
    \ don’t create Spring’s context instance. A class or group of classes are tested\
    \ in isolation, and the test fakes dependencies. These tests are useful as documentation\
    \ of a developer’s intentions of how the module should work. Such testing is particularly\
    \ useful for sanitizing the business logic of the web service or web service consumer.\n\
    \nIn another type of testing, we automatically deploy the web service to a target\
    \ environment and execute a test suite, which would perform or consume real requests.\
    \ This is heading toward an end-to-end level of testing. Because deployment steps\
    \ are needed in the build pipeline, these tests may take some time. Therefore,\
    \ this type of testing is commonly not triggered as often as unit testing.\n\n\
    Slightly more suitable is simulating a deployment environment during the build\
    \ process. Examples are `tomcat7-maven-plugin` or `gradle-maven-plugin`, which\
    \ enable us to build a full artifact of our application and deploy it to an embedded\
    \ servlet container.\n\nAdditionally, Spring Web Services provides support for\
    \ integration testing of full or partial Spring configurations. It can be integrated\
    \ with a unit-testing framework of your choice (most commonly JUnit or TestNG).\
    \ This testing support is handy, because it covers integrated Spring configuration\
    \ and doesn’t need to use a servlet container (or other type of resource-intensive\
    \ environment) at the same time.\n\n## Server-Side Testing Support\n\nWhen we\
    \ are testing a web service server, we need to send requests to the web service\
    \ under test, receive the request, and verify a response. The Spring Web Services\
    \ project provides helpers to fulfill these tasks easily:\n\n*   `MockWebServiceClient`\
    \ is used to simulate the client and for sending requests.\n*   `org.springframework.ws.test.server.RequestCreator`/`org.springframework.ws.test.server.RequestCreators`\
    \ helps with creation of request messages.\n*   `org.springframework.ws.test.server.ResponseActions`/`org.springframework.ws.test.server.ResponseMatchers`\
    \ provides support for response verification.\n\nIn this example, we’ll use a\
    \ testing request from [Listing 3-35](#9781484207949_Ch03.xhtml#FPar40) and a\
    \ response located in [Listing 3-36](#9781484207949_Ch03.xhtml#FPar41).\n\n[***Listing\
    \ 3-35***](#9781484207949_Ch03.xhtml#_FPar40). Request Used for Testing (File\
    \ testRequest.xml in Example Project 0303-ws-boot-service)\n\n```\n<ns2:UserRequest\
    \ xmlns:ns2=\"http://localhost:10303/0303-ws-boot-service\"\n    Email=\"lubos.krnac@gmail.com\"\
    \ />\n```\n\n[***Listing 3-36***](#9781484207949_Ch03.xhtml#_FPar41). Response\
    \ Used for Testing (File testResponse.xml in Example Project 0303-ws-boot-service)\n\
    \n```\n<ns2:UserDetailsResponse\n  xmlns:ns2=\"http://localhost:10303/0303-ws-boot-service\"\
    >\n  <ns2:FirstName>Lubos</ns2:FirstName>\n  <ns2:LastName>Krnac</ns2:LastName>\n\
    </ns2:UserDetailsResponse>\n```\n\nLet’s explore service-side testing support\
    \ in [Listing 3-37](#9781484207949_Ch03.xhtml#FPar42).\n\n[***Listing 3-37***](#9781484207949_Ch03.xhtml#_FPar42).\
    \ Server-Side Testing (0303-ws-boot-service)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.boot.client;\n\
    \nimport java.io.IOException;\nimport net.lkrnac.book.eiws.chapter03.ws.boot.server.ServerConfiguration;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.ApplicationContext;\n\
    import org.springframework.core.io.ClassPathResource;\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.springframework.ws.test.server.MockWebServiceClient;\nimport org.springframework.ws.test.server.RequestCreator;\n\
    import org.springframework.ws.test.server.RequestCreators;\nimport org.springframework.ws.test.server.ResponseActions;\n\
    import org.springframework.ws.test.server.ResponseMatchers;\nimport org.testng.annotations.Test;\n\
    \n@ContextConfiguration(classes = ServerConfiguration.class)\npublic class WsJavaConfigServerITest\
    \ extends AbstractTestNGSpringContextTests {\n  @Autowired\n  private ApplicationContext\
    \ applicationContext;\n\n  @Test\n  public void testGetUserDetails() throws IOException\
    \ {\n    // GIVEN\n    MockWebServiceClient wsClient =\n        MockWebServiceClient.createClient(applicationContext);\n\
    \n    RequestCreator requestCreator =\n        RequestCreators.withPayload(new\
    \ ClassPathResource(\"testRequest.xml\"));\n\n    // WHEN\n    ResponseActions\
    \ response = wsClient.sendRequest(requestCreator);\n\n    // THEN\n    response.andExpect(ResponseMatchers.noFault()).andExpect(\n\
    \        ResponseMatchers.payload(new ClassPathResource(\"testResponse.xml\")));\n\
    \  }\n}\n```\n\nTestNG is a testing framework used for powering the test. To integrate\
    \ it with the Spring context, we need to inherit the test class from `AbstractTestNGSpringContextTests`.\
    \ This class is part of the Spring Core test module. We are testing the Spring\
    \ configuration defined by the class `ServerConfiguration` from the example project\
