    Filter


    A *filter* is another middle SI message endpoint that can participate in bidirectional
    and unidirectional flows. It can act as a passive as well as an active component.
    Its purpose is to decide whether the received message should or shouldn’t be passed
    to the downstream flow. This decision can be based on generic logic, which can
    be configured via the `<int:filter>` XML element or the `@Filter` annotation.
    The annotation configuration doesn’t provide the flexibility of XML, which can
    be based on the following:


    *   *Custom Java logic*: Should implement the interface `MessageSelector` and
    can be defined via the `<beans:bean>` subelement of the `<int:filter>` tag or
    its `ref` attribute.

    *   *SpEL expression*: Can be configured via the `<int:expression>` XML subelement
    or the `expression` attribute of the `<int:filter>` XML tag.

    *   *Custom script*: Supports Ruby and Groovy via the `<int-script:script>` subelement
    of the `<int:filter>` XML tag.


    Alongside these generic filter types, we can also configure special filters for
    these technologies:


    *   *XPath filter*: `<int-xml:xpath-filter>`

    *   *XML validation filter*: `<int-xml:validating-filter>`


    The filter’s decision to pass the message to the next component in the SI flow
    is represented by the Boolean value returned by the filter logic (whether it is
    Java logic, SpEL, or scripting). If the value is `false`, the filter gives us
    the opportunity to discard the message or throw an exception in the SI flow. If
    we discard the message, we can specify `discardChannel` to route the message.


    An important fact is that by default the filter silently discards messages.


    A filter can also be embedded into unidirectional flow as the channel adapter’s
    attribute (for example, `local-filter` for `<int-ftp:inbound-channel-adapter>`
    or `mail-filter-expression` for `<int-mail:imap-idle-channel-adapter>`).


    Filter Example Based on XML Configuration


    [Listing 8-57](#9781484207949_Ch08_1.xhtml#FPar60) shows custom filter logic .


    [***Listing 8-57***](#9781484207949_Ch08_1.xhtml#_FPar60). Custom Filter Logic
    for XML Configuration Example (0815-filter-xml-ref)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.integration.core.MessageSelector;

    import org.springframework.messaging.Message;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleFilter implements MessageSelector {

      @Override

      public boolean accept(Message<?> message) {

        String stringPayload = (String) message.getPayload();

        return !stringPayload.contains("corrupt");

      }

    }

    ```


    This Spring bean, which implements the `MessageSelector` interface, can be used
    as filter logic in the SI flow. It needs to implement the `MessageSelector.accept()`
    method. In this case, we inspect the `String` payload of the message and refuse
    it if it contains the `corrupt` substring. [Listing 8-58](#9781484207949_Ch08_1.xhtml#FPar61)
    dives into the SI flow configuration for this example.


    [***Listing 8-58***](#9781484207949_Ch08_1.xhtml#_FPar61). SI Flow Configuration
    for XML Filter Example (File si-config.xml in Folder src/main/resources of Example
    Project 0815-filter-xml-ref)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xmlns:int-http="http://www.springframework.org/schema/integration/http"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />

      <int:channel id="inChannel"/>


    <int:filter input-channel="inChannel" output-channel="filteredChannel"

        ref="simpleFilter" />

      <int:channel id="filteredChannel"/>


    <int:service-activator input-channel="filteredChannel" ref="writeService"

        method="write"/>

    </beans>

    ```


    The inbound gateway uses our common `SiWrapperServiceVoid` bean to hide the SI
    flow, which indicates unidirectional message handling. Messages are handled in
    `inChannel`, where the filter comes into play. It has to define mandatory `input-channel`
    and `output-channel` attributes and one of the `expression` or `ref` attributes.
    In this case, it is a reference to our filter bean `simpleFilter`.


    The message is then sent to `filteredChannel` and passed to the service activator,
    which executes another common bean, `WriteService.write()`. To highlight that
    filtering works, take a look at [Listing 8-59](#9781484207949_Ch08_1.xhtml#FPar62).


    [***Listing 8-59***](#9781484207949_Ch08_1.xhtml#_FPar62). Main Class of XML Filter
    Example (0815-filter-xml-ref)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.ImportResource;


    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      private static final String SIMPLE_MESSAGE = "simple message";


    public static void main(String[] args) throws InterruptedException {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    SiWrapperServiceVoid wrapperService =

            ctx.getBean(SiWrapperServiceVoid.class);

        wrapperService.processText(SIMPLE_MESSAGE);

        wrapperService.processText("corrupted message");

        wrapperService.processText(SIMPLE_MESSAGE);

      }

    }

    ```


    We sent three messages to the SI flow, one of which is corrupted. So in [Listing
    8-60](#9781484207949_Ch08_1.xhtml#FPar63) we expect to see only two messages.


