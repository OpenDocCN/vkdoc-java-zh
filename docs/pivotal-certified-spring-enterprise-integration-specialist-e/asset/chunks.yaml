    The inbound gateway uses the `SiWrapperServiceFuture` service interface and is
    connected to the aggregator via `inChannel`. The aggregator needs to specify the
    `input-channel` and `output-channel` attributes. In this case, we also specify
    the custom correlation and release strategy via inline SpEL expressions. Correlation
    of messages is based on the eighth character in the message. So if this character
    matches, messages should be aggregated together. The release strategy is based
    on the message group size. As soon as we have two correlated messages, we release
    them. By default, string messages are aggregated by concatenation with a comma.


    This aggregator is connected to the service activator, which invokes our common
