    it, we can see the same output as for the previous example ([Listing 9-47](#9781484207949_Ch09_1.xhtml#FPar51)).


    Stateful Job and Step Execution


    There is often a need to pass state between `Job`s or `Step`s, which can be any
    Java object. For example, one `Step` or `Job` might be processing records, and
    a subsequent `Job` or `Step` needs to send notification of how many records were
    processed.


    Normally, Java developers would create some kind of in-memory cache, which needs
    to be thread safe. But fortunately, SB provides various mechanisms for passing
    state in a clean and thread-safe manner.


    ExecutionContext


    The first option for state transition can be done via the `ExecutionContext` class.
    This class encapsulates a map of type `Map<String, Object>`. So we are able to
    store any type of state that needs to be transferred between steps or chunk-oriented
    item handlers. This can be handy if we need to store partial results during batch
    processing. But, of course, this instance needs to be somehow injected into the
    place we need to use it. Luckily, SB provides a lot of ways to access `ExecutionContext`
    from any part of the SB application.


    As we mentioned, when `Step` is executed, a `StepExecution` instance is created,
    and when `Job` is executed, an instance of `JobExecution` is created. Via `StepExecution.getJobExecution()`,
    we can access the `JobExecution` instance, and via `JobExecution.getExecutionContext()`,
    we can access the `ExecutionContext` instance.


    The `StepExecution` instance can be injected into any chunk-oriented `ItemProcessor`,
    `ItemWriter`, and `ItemReader` via the initialization method annotated with `@BeforeStep`.
    For `Tasklet`, there is an even easier mechanism, whereby SB injects the `ChunkContext`
    instance as a second parameter of `Tasklet.execute()`. The `StepExecution` instance
    can be accessed and then `ChunkContext.getStepContext().getStepExecution()`.'
