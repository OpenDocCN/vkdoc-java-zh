    is the `httpInvokerRequestExecutor` field. We explicitly configured it to use
    the Apache HttpComponents client library.


    Summary


    This chapter discussed remoting support of the Spring framework. In this synchronous
    communication, the client is blocked until the remote service finishes its job.


    Serialization is needed for all classes involved in the communication (service
    method parameters and return type). Whether this is standard Java serialization,
    CORBA, or Caucho’s XML binary serialization, it creates a significant constraint:
    the inability to version a server API. Each change to the client/server contract
    needs to be aligned on both sides. Therefore, these technologies should be avoided
    if we need to create a server API that has the following characteristics:


    *   Publicly facing.

    *   Not under our control.

    *   Consumed by a large number of clients. If the server contract is changed,
    all clients need to be changed also.


    Each Spring remoting abstraction uses a different combination of transport protocol
    and serialization mechanism:


    *   RMI uses Java serialization and Java Remote Method Protocol.

    *   RMI-IIOP uses Java serialization and Internet Inter-Orb Protocol, which makes
    communication CORBA compatible.

    *   HttpInvoker uses Java serialization and HTTP.

    *   Hessian uses Caucho’s binary XML serialization and HTTP.

    *   Burlap uses Caucho’s textual XML serialization and HTTP.


    The transport protocol and serialization mechanism can narrow architectural decisions
    when a remoting method needs to be chosen. For example, if communicating with
    non-Java applications is required, only Hessian or RMI-IIOP are suitable (Burlap
    should be avoided, because its Spring abstractions are deprecated since Spring
    4). When we need to communicate via HTTP, only HttpInvoker and Hessian can fulfill
    this requirement.


    Spring significantly simplifies transitions between remoting technologies, because
    it uses the same concepts for exposing and consuming services. While exposing
    a service, the notion of an exported service is used (`RmiServiceExporter`, `HttpInvokerServiceExporter`,
    `HessianServiceExporter`, `BurlapServiceExporter`). When consuming, a proxy factory
    bean mechanism penetrates all remoting abstractions (`RmiProxyFactoryBean`, `HttpInvokerProxyFactoryBean`,
    `HessianProxyFactoryBean`, `BurlapProxyFactoryBean`). All these abstractions have
    similar properties across different remoting technologies. Such API consistencies
    decrease the learning curve if we need to switch remoting technologies.


    When using RMI, there are numerous benefits to using Spring abstractions instead
    of standard Java APIs.


    Benefits on the server are as follows:


    *   No need to throw checked exceptions

    *   No need to implement or extend invasive RMI types

    *   Allows for exposing business services without changes

    *   Handles creation of RMI registry if needed


    Benefits on the client are as follows:


    *   Translating of checked exceptions into runtime

    *   Allows for consuming remote services without changing client code


    While each remoting approach provides an easy way to implement distributed applications,
    they are rarely used in enterprise applications nowadays, because they create
    tight coupling between applications. So a certain remoting technology is not required
    or slightly lower performance is suitable, SOAP or especially RESTful web services
    likely will be considered for new projects.


    CHAPTER 3


    ![image](images/frontdot.jpg)


    Web Services


    This chapter covers the Spring Web Services project. SOAP web services can be
    considered as completely opposite to remote procedure calls (RPCs) in terms of
    decoupling and performance, because SOAP provides a very high level of decoupling
    but not for free. The cost of this variability is performance problems that can
    occur because of the bloated XML protocol SOAP uses. Implementation of SOAP services
    is also complex. We will dive into the Spring support provided in this field and
    show how Spring helps to simplify this process by leveraging best practices and
    reusing most modern approaches.


    Introduction to Web Services'
