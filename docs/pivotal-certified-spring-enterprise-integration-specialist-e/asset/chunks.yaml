    for this example has only `16` records to process.We hope you excuse this fact,
    which is created to make this example simple. So, for example, with a `gridSize`
    of `2` partitions, we would create two `ExecutionContexts` with the partition
    boundaries `0..7` and `8..15`.


    ![Image](images/sq.jpg) **Note**  This algorithm as well as other constructs in
    this partitioning example are highly influenced by Michael Minella’s remote partitioning
    example at `https://github.com/mminella/Spring-Batch-Talk-2.0`.


