- fmt: 'An example of a `JobScope` feature is shown in a transition of state between
    `simpleRecordsStep` and `boilWaterStep`. You can see that when we started preparing
    tea, we knew how many records were written in the previous step. At the same time,
    this state was reset between two `Job` runs.


    [Figure 9-6](#9781484207949_Ch09_1.xhtml#Fig6) shows the sequence diagram of state
    transitions during execution of `combinedJob`.


    ![9781484207949_Fig09-06.jpg](images/9781484207949_Fig09-06.jpg)


    [Figure 9-6](#9781484207949_Ch09_1.xhtml#_Fig6). Sequence diagram of XML batch
    scopes example


    To fit this diagram on the page, we skipped the stateless steps and `SimpleRecordProcessor`
    and added notes when they should be executed.


    The `ReadCountRestricter` instance is used only during `simpleRecordsStep` to
    store the number of records we already read and decide whether we need to read
    another one. So it is used to transition the state between various `statefulRecordReader.read()`
    executions. This instance is also active only during this step execution. Each
    new execution of this step will create a new instance.


    The `WrittenRecordsCounter` instance is used for the transition state (the written
    records count) between the steps `simpleRecordsStep` and `boilWaterStep`. This
    instance is abandoned after the `prepareTeaJob` execution is over. So a new execution
    of this `Job` will get a fresh instance from the Spring context.


    ## Batch Scopes Java Example


    [Listing 9-66](#9781484207949_Ch09_1.xhtml#FPar70) shows an example of a bean
    configured with `StepScope` and a Java annotation.


    [***Listing 9-66***](#9781484207949_Ch09_1.xhtml#_FPar70). StepScope Bean Configured
    with Java Annotation (0916-batch-scopes-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import lombok.Getter;

    import lombok.Setter;

    import org.springframework.batch.core.configuration.annotation.StepScope;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.stereotype.Component;


    @Getter

    @StepScope

    @Component

    public class ReadCountRestricter {

      private long countToProcess;


    @Setter

      private long readCount;


    @Autowired

      public ReadCountRestricter(

          @Value("#{jobParameters[recordCountToProcess]}") long countToProcess) {

        super();

        this.countToProcess = countToProcess;

      }

    }

    ```


    The `@StepScope` annotation defines the correct scope for this bean. Therefore,
    we can use late binding to `JobParameter recordCountToProcess` in the constructor
    injection. [Listing 9-67](#9781484207949_Ch09_1.xhtml#FPar71) shows `JobScope`
    defined with a Java annotation.


    [***Listing 9-67***](#9781484207949_Ch09_1.xhtml#_FPar71). JobScope Bean Configured
