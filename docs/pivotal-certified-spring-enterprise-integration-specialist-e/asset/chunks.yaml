    2015-08-23 17:43:26.798  INFO 21994 --- [           main]

    n.l.b.e.chapter08.out.WriteRepository    : Text persisted: simple message

    2015-08-23 17:43:26.799  INFO 21994 --- [           main]

    n.l.book.eiws.chapter08.SiApplication    : Result: true

    ```


    正如预期的那样，输入消息被记录在 `WriteRepository` 中，此操作的响应被记录在主类中。此 SI 流程的可视化如图 8-5 所示。

