    \ Example\n\n```\n2015-08-30 20:05:00.379  INFO 24624 --- [           main]\n\
    n.l.book.eiws.chapter08.SiApplication    : Starting to send messages...\n2015-08-30\
    \ 20:05:00.390  INFO 24624 --- [           main]\nn.l.b.eiws.chapter08.SimpleInterceptor\
    \   : Going to send message GenericMessage\n[payload=message1, headers={id=a1f4c8ca-c227-3315-646c-e14820558db7,\
    \ timestamp=1440961500390}]\nto channel inChannel\n2015-08-30 20:05:00.391  INFO\
    \ 24624 --- [           main]\nn.l.b.eiws.chapter08.SimpleInterceptor   : Message\
    \ GenericMessage [payload=message1,\nheaders={id=a1f4c8ca-c227-3315-646c-e14820558db7,\
    \ timestamp=1440961500390}] was successfully\nsend to channel inChannel\n2015-08-30\
    \ 20:05:00.391  INFO 24624 --- [ask-scheduler-1]\nn.l.b.eiws.chapter08.SimpleInterceptor\
    \   : Message GenericMessage [payload=message1,\nheaders={id=a1f4c8ca-c227-3315-646c-e14820558db7,\
    \ timestamp=1440961500390}] was successfully\nreceived to channel inChannel\n\
    2015-08-30 20:05:00.392  INFO 24624 --- [ask-scheduler-1]\nn.l.b.eiws.chapter08.SimpleInterceptor\
    \   : Message GenericMessage [payload=message1,\nheaders={id=a1f4c8ca-c227-3315-646c-e14820558db7,\
    \ timestamp=1440961500390}] was received to\nchannel inChannel\n2015-08-30 20:05:00.392\
    \  INFO 24624 --- [           main]\nn.l.b.eiws.chapter08.SimpleInterceptor  \
    \ : Message GenericMessage [payload=message1,\nheaders={id=a1f4c8ca-c227-3315-646c-e14820558db7,\
    \ timestamp=1440961500390}] was send to\nchannel inChannel\n2015-08-30 20:05:00.392\
    \  INFO 24624 --- [           main]\nn.l.book.eiws.chapter08.SiApplication   \
    \ : message1 sent\n...\n```\n\nWe include log entries for only one message. The\
    \ second message would have similar log entries. All the interception points were\
    \ executed because the consumer needs to poll (explicitly execute `AbstractPollableChannel.receive()`)\
    \ against `inChannel`.\n\n### Wire Tap\n\nA *wire tap* is one of the original\
    \ enterprise integration patterns and, in fact, is a special type of interceptor.\
    \ It sends a message to another channel without affecting the original flow. This\
    \ behavior is especially useful for monitoring and debugging.\n\nIt can be configured\
    \ as follows:\n\n- **Global wire tap**: Can be configured as a top-level XML element\
    \ `<int:wire-tap>`. It can specify a pattern for channel names to intercept.\n\
    - **Local wire tap**: Can be configured as part of the `<int:interceptors>` list\
    \ for the channel and uses the `<int:wire-tap>` XML subelement.\n\n### Wire Tap\
    \ Example\n\n**Listing 8-122** shows the SI configuration.\n\n**Listing 8-122.**\
    \ SI Configuration of Wire Tap Example (File `si-config.xml` in Folder `src/main/resources`\
    \ of Example Project `0835-channel-wire-tap-xml`)\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
    net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:channel id=\"\
    inChannel\">\n    <int:interceptors>\n        <int:wire-tap channel=\"logChannel\"\
    />\n    </int:interceptors>\n  </int:channel>\n\n<int:outbound-channel-adapter\
    \ channel=\"inChannel\" ref=\"writeService\" method=\"write\"/>\n\n<int:channel\
    \ id=\"logChannel\"/>\n  <int:logging-channel-adapter channel=\"logChannel\" level=\"\
    INFO\"/>\n</beans>\n```\n\nThe `inChannel` channel is configured with the interceptors\
    \ list, and only the wire tap is configured. This wire tap sends messages to `logChannel`,\
    \ which is connected to the logging channel adapter. It will log the message payload\
    \ if the correct logging level is configured (in this case, at least `INFO`).\n\
    \nThe main message flow is untouched, so the message is received by the inbound\
    \ gateway with the service interface `SiWrapperServiceVoid` and handed to the\
    \ outbound channel adapter mapped to `WriteService.write()`.\n\nWe again borrow\
    \ the main class from **Listing 8-111** of the `0830-channel-priority-xml` example\
    \ project. When we run it, we get the output in **Listing 8-123**.\n\n**Listing\
    \ 8-123.** Output of Wire Tap Example\n\n```\n2015-08-30 20:55:48.647  INFO 26516\
    \ --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : Starting to\
    \ send messages...\n2015-08-30 20:55:48.656  INFO 26516 --- [           main]\n\
    o.s.integration.handler.LoggingHandler   : message1\n2015-08-30 20:55:48.673 \
    \ INFO 26516 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    :\
    \ Text persisted: message1\n2015-08-30 20:55:48.674  INFO 26516 --- [        \
    \   main]\nn.l.book.eiws.chapter08.SiApplication    : message1 sent\n2015-08-30\
    \ 20:55:48.675  INFO 26516 --- [           main]\no.s.integration.handler.LoggingHandler\
    \   : message2\n2015-08-30 20:55:48.676  INFO 26516 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository\
    \    : Text persisted: message2\n2015-08-30 20:55:48.677  INFO 26516 --- [   \
    \        main]\nn.l.book.eiws.chapter08.SiApplication    : message2 sent\n```\n\
    \nAs we expect, the main flow happens correctly. In addition, we have the message\
    \ payload logged by the SI internal `LoggingHandler`.\n\n### Error Handling\n\n\
    Reliable error handling is an important part of each production-ready application.\
    \ An SI application is no exception. Therefore, SI provides various mechanisms\
    \ to simplify error-handling implementations. We can divide these mechanisms as\
    \ follows:\n\n- **Synchronous error handling**: When an error happens during synchronous\
    \ message passing, it is wrapped into `org.springframework.messaging.MessageHandlingException`\
    \ and propagated back to the sender of the message.\n- **Asynchronous error handling**\n\
    \    - **Unidirectional flow**: In the case of an asynchronous handoff, the exception\
    \ can’t be propagated to the sender. So SI in this case creates `org.springframework.messaging.support.ErrorMessage`\
    \ from the exception and sends this message to a suitable `errorChannel`.\n  \
    \  - **Bidirectional flow**: The error is propagated to the sender of the messages\
    \ even if we are dealing with an asynchronous message handoff.\n\nWe mentioned\
    \ that `errorChannel` is used to send `ErrorMessage` in case an exception is thrown\
    \ in a unidirectional asynchronous message flow. But SI enables us to configure\
    \ `errorChannel` in various ways."
