    [Figure 4-4](#9781484207949_Ch04.xhtml#_Fig4). HTTP PUT request against JAX-RS
    example


    ![9781484207949_Fig04-05.jpg](images/9781484207949_Fig04-05.jpg)


    [Figure 4-5](#9781484207949_Ch04.xhtml#_Fig5). HTTP DELETE request against JAX-RS
    example


    This Spring and JAX-RS integration provide a full-fledged approach to developing
    REST web services. It is supported by the Spring ecosystem even if Spring provides
    its own alternative APIs.


    Spring MVC


    *Spring MVC* is a central module for Spring web support. Its contracts are competitors
    to JAX-RS abstractions. As the name of this Spring module suggests, it wasn’t
    originally designed for developing REST services. But APIs for the Model-View-Controller
    (MVC) style of architecture have been suitable enough to also cover REST concerns
    since Spring Framework version 3.0\. It is a double win, because developers used
    to MVC APIs can easily switch to REST endpoint development, and vice versa.


    JAX-RS is targeted toward application-to-application communication. So we can
    communicate with the REST server from a client developed in any major programming
    platform, including JavaScript in the browser. But sometimes we may need to use
    plain HTML as a consumer of our endpoint. An important fact about HTML is that
    it supports only `GET` (for example, when a user clicks a web page link) and `POST`
    (for example, when a user submits an HTML form) HTTP methods. The problem is the
    missing `DELETE`, `PUT`, and `HEADER` HTTP methods, in the case of plain HTML.
    This would be a significant problem for JAX-RS, as it doesn’t expect such a restricted
    environment.


    Spring MVC supports browsers as REST clients with a technique called *HTTP method
    conversion*. The main idea behind this concept is to use HTML forms to perform
    a `POST` with a hidden form parameter. This parameter should specify the desired
    HTTP method being performed, which may be `DELETE`, `HEADER`, or `PUT` instead
    of `POST`. On the server side, we can then register the servlet filter that will
    convert the HTML `POST` request into an HTTP request defined by the hidden form
    input parameter. But this feature is beyond the scope of this book.


    Another difference between Spring MVC and JAX-RS is in client-side API support.
    JAX-RS introduced a client-side API in version 2.0\. This version of JAX-RS is
    part of the standard Java EE 7\. So if we are running older Java EE editions,
    we don’t have native JAX-RS client API support. And enterprise companies often
    get stuck on Java EE 5 or 6, mainly because of the licence costs for expensive
    Java EE application servers, as an upgrade can be major investment for a company.
    With Spring MVC, you can use client-side APIs even within older Java EE application
    servers, because the Spring Framework is lightweight and easily pluggable into
    any Java EE platform.


    A significant advantage of the Spring MVC module over JAX-RS is support for testing.
    The Spring MVC testing module provides powerful fake constructs that allow for
    the integration or unit testing of the server and client side. These constructs
    allow testing of mappings out of the servlet container. This is a huge benefit
    in continuous integration.


    A significant feature that puts the Spring MVC API into a better position, when
    considering REST programming models, is content negotiation. With Spring MVC,
    this feature is embedded into the framework out of the box. But JAX-RS doesn’t
    have standard support for content negotiation; therefore, developers need to rely
    on nonstandard JAX-RS implementations they are using or implement it explicitly.'
