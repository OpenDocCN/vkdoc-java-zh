    TestNG is a testing framework used for powering the test. To integrate it with
    the Spring context, we need to inherit the test class from `AbstractTestNGSpringContextTests`.
    This class is part of the Spring Core test module. We are testing the Spring configuration
    defined by the class `ServerConfiguration` from the example project `0303-ws-boot-service`.
    This configuration was already explained in earlier sections of this chapter.
    To create the mock client, we can use an autowired application context instance.'
