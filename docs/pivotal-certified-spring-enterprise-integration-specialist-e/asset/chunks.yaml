    NullChannel


    `NullChannel` is a special type of channel used for discarding messages. SI creates
    this channel by default, so we can use it by specifying `nullChannel` as the channel
    name.


    Channel Interceptor


    As its name suggests, a *channel interceptor* is used for intercepting channels.
    We can implement the interface `org.springframework.messaging.support.ChannelInterceptor`
    and register it as a Spring bean and use this custom logic when on these interception
    points: `preSend`, `postSend`, `afterSendCompletion`, `preReceive`, `postReceive`,
    `afterReceiveCompletion`.


    If the intercepted channel is `AbstractSubscribableChannel`, only the `preSend`,
    `postSend`, and `afterSendCompletion` interception points are relevant, because
    the consumer is triggered by the channel and is not executing the `receive` action.
    If the intercepted channel is `AbstractPollableChannel`, all interception points
    are relevant, because it has the `send` action as well as `receive` available.


    The interception points `afterSendCompletion` and `afterReceiveCompletion` are
    executed only after the related action (send/receive) is successful.


    A channel interceptor can be configured as follows:


    *   *Global interceptor*: The top-level XML element `<int:channel-interceptor>`,
    where we can specify the `pattern` attribute for channel names we want to intercept.
    The bean implementing the `org.springframework.messaging.support.ChannelInterceptor`
    interface can be configured via the `ref` attribute or via the `<bean>` subelement.

    *   *Local interceptor*: The channel XML subelement `<int:interceptors>`, where
    we can specify the list of interceptors for a particular channel. The bean implementing
    the `ChannelInterceptor` interface can be configured via the `<ref>` subelement
    of the `<int:interceptors>` tag.


    Channel Interceptor Example


    [Listing 8-119](#9781484207949_Ch08_2_Ext.xhtml#FPar122) shows a simple implementation
    of `ChannelInterceptor`.


    [***Listing 8-119***](#9781484207949_Ch08_2_Ext.xhtml#_FPar122). Interceptor Implementation
    Example (0834-channel-interceptor-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.messaging.Message;

    import org.springframework.messaging.MessageChannel;

    import org.springframework.messaging.support.ChannelInterceptor;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class SimpleInterceptor implements ChannelInterceptor {

      @Override

      public Message<?> preSend(Message<?> message, MessageChannel channel) {

        log.info("Going to send message {} to channel {}", message.getPayload(),

            channel);

        return message;

      }


    @Override

      public void postSend(Message<?> message, MessageChannel channel, boolean sent)
    {

        log.info("Sending of message {} to channel {} finished",

            message.getPayload(), channel);

      }


    @Override

      public void afterSendCompletion(Message<?> message, MessageChannel channel,

          boolean sent, Exception ex) {

        log.info("Message {} was successfully send to channel {}",

            message.getPayload(), channel);

      }


    @Override

      public boolean preReceive(MessageChannel channel) {

        log.info("Going to receive message from channel {}", channel);

        return true;

      }


    @Override

      public Message<?> postReceive(Message<?> message, MessageChannel channel) {

        log.info("Receiving of message {} from channel {} finished",

            message.getPayload(), channel);

        return message;

      }


    @Override

      public void afterReceiveCompletion(Message<?> message,

          MessageChannel channel, Exception ex) {

        log.info("Message {} was successfully received from channel {}",

            message.getPayload(), channel);

      }

    }

    ```


    On each interception point that we need to implement as a contract for the `ChannelInterceptor`
    interface, we log information about hitting it. Notice that the `preSend` and
    `postReceive` intercept points have an option to return the message instance as
    a return value, and thus replace the message if needed. Also, the `preReceive`
    method returns a Boolean value, which may stop the receive action if `false` is
    returned. [Listing 8-120](#9781484207949_Ch08_2_Ext.xhtml#FPar123) shows the SI
    configuration.


    [***Listing 8-120***](#9781484207949_Ch08_2_Ext.xhtml#_FPar123). SI Configuration
    of Channel Interceptor Example (File si-config.xml in Folder src/main/resources
    of Example Project 0834-channel-interceptor-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />


    <int:channel-interceptor pattern="in*" ref="simpleInterceptor"/>


    <int:channel id="inChannel">

        <int:queue capacity="10"/>

      </int:channel>


    <int:outbound-channel-adapter channel="inChannel" ref="writeService" method="write">

        <int:poller fixed-rate="100" max-messages-per-poll="1"/>

      </int:outbound-channel-adapter>

    </beans>

    ```


    The configuration of the input and output component is common in our examples.
    We use the `QueueChannel` implementation, whereby the outbound channel adapter
    polls against `inChannel`. The channel interceptor configuration is interesting;
    the `SimpleInterceptor` bean is configured as the interceptor for all channels
    whose name starts with the `in` prefix.


    The main class is again reused from `0830-channel-priority-xml` ([Listing 8-111](#9781484207949_Ch08_2_Ext.xhtml#FPar114)).
    When we run it, we get the output in [Listing 8-121](#9781484207949_Ch08_2_Ext.xhtml#FPar124).'
