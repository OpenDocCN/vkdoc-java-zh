    for `RecordsReaderItemStream` and `StreamRecordWriter` as expected.


    Java Configuration Example of ItemStream Usage


    For a Java configuration example of `ItemStream`, we use all the same classes
    as for the previous example, except `BatchConfiguration`, as shown in [Listing
    9-90](#9781484207949_Ch09_2_Ext.xhtml#FPar94).


    [***Listing 9-90***](#9781484207949_Ch09_2_Ext.xhtml#_FPar94). Java Configuration
    Example of ItemStream (0924-item-stream-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;

    import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,

          SimpleRecordReader simpleRecordReader,

          SimpleRecordProcessor simpleRecordProcessor,

          StreamRecordWriter StreamRecordWriter,

          RecordsReaderItemStream recordsReaderItemStream) {

        return stepBuilderFactory.get("simpleRecordsStep")

            .<String, String> chunk(4)

            .reader(simpleRecordReader)

            .processor(simpleRecordProcessor)

            .writer(StreamRecordWriter)

            .stream(recordsReaderItemStream)

            .build();

      }


    @Bean

      public Job simpleRecordsJob(JobBuilderFactory jobBuilderFactory, Step simpleRecordsStep)
    {

        return jobBuilderFactory.get("simpleRecordsJob").start(simpleRecordsStep).build();

      }

    }

    ```


    Notice that this is the mirror of the XML configuration from the previous example.
    Instead of the `<stream>` tag, we use the `stream()` method in step building.
    The output is the same as for the previous example ([Listing 9-89](#9781484207949_Ch09_2_Ext.xhtml#FPar93)).


    Job and Step Inheritance


    Sometimes we need to define a common configuration for `Step` or `Job`, which
    can be reused to define various `Step`s or `Job`s. With a Java configuration,
    we use composition or inheritance for this purpose. But XML doesn’t provide an
    easy composition out of the box. Therefore, the SB XML configuration support introduced
    the concept of `Step` or `Job` inheritance.


    This example reuses `TeaJobListener` from [Listing 9-69](#9781484207949_Ch09_2_Ext.xhtml#FPar73).
    [Listing 9-91](#9781484207949_Ch09_2_Ext.xhtml#FPar95) shows the XML configuration.


    [***Listing 9-91***](#9781484207949_Ch09_2_Ext.xhtml#_FPar95). XML Configuration
    of Job and Step Inheritance (File batch-config.xml in Folder src/main/resource
    of Example Project 0925-job-inheritance)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

      http://www.springframework.org/schema/batch/spring-batch.xsd

      http://www.springframework.org/schema/beans

      http://www.springframework.org/schema/beans/spring-beans.xsd">


    <step id="boilWaterStep" abstract="true">

        <tasklet ref="boilWater" />

      </step>

      <step id="addTeaStep" abstract="true">

        <tasklet ref="addTea" />

      </step>

      <step id="addWaterStep" abstract="true">

        <tasklet ref="addWater" />

      </step>


    <job id="prepareTeaJob" abstract="true">

        <listeners>

          <listener ref="teaJobListener"/>

        </listeners>

      </job>


    <job id="prepareMildTeaJob" parent="prepareTeaJob">

        <step id="boilWaterForMildTea" parent="boilWaterStep" next="addTeaForMildTea"
    />

        <step id="addTeaForMildTea" parent="addTeaStep" next="addWaterForMildTea"/>

        <step id="addWaterForMildTea" parent="addWaterStep"/>

      </job>


    <job id="prepareStrongTeaJob" parent="prepareTeaJob">

        <step id="boilWaterForStrongTea" parent="boilWaterStep" next="addTea1ForStrongTea"
    />

        <step id="addTea1ForStrongTea" parent="addTeaStep" next="addTea2ForStrongTea"/>

        <step id="addTea2ForStrongTea" parent="addTeaStep" next="addWaterForStrongTea"/>

        <step id="addWaterForStrongTea" parent="addWaterStep"/>

      </job>

    </beans:beans>

    ```


    We define two jobs here. One prepares mild tea, and the other prepares strong
    tea. We also want to register the same listener for both `Job`s, so the listener
    definition is an abstract parent job, `prepareTeaJob`. Similarly, we specify the
    abstract parent `Step`s, where we use the common prepare tea `Tasklet`s. This
    way, we can define the child `Step`s based on the parent `Step`s configuration.
    Notice that we also reuse one parent in two steps of the same job.


    We again use the common `BatchConfiguration` and the Spring Boot main class. After
    running it, we can observe the output in [Listing 9-92](#9781484207949_Ch09_2_Ext.xhtml#FPar96).


    [***Listing 9-92***](#9781484207949_Ch09_2_Ext.xhtml#_FPar96). Output for Step
    and Job Inheritance Example'
