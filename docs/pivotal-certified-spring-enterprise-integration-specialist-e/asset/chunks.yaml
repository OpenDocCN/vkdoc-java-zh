    Into the transacted listener method `readMessage`, we inject the text of the message
    and the `javax.jms.Message` instance. A message instance is needed for a call
    to `message.getJMSRedelivered()`, which is used to find out whether this message
    is a redelivery. There is also a new private method called `processIfNeeded()`.This
    method first verifies whether the message is already processed; if not, the method
    would call `simpleMessage.processText()` to persist it.


    So here is the full logic: If the message is redelivered, process it only if needed;
    if not, just process it. You may ask: ”Why don’t we always call `processIfNeeded()`
    without bothering about the `message.getJMSRedelivered()` check?” The reason is
    simple. Checking whether the message was already processed is one additional,
    usually *expensive*, call to the external system, and message redelivery is so
    rare that we can eliminate wasting the majority of these calls by simply checking
    whether the message was redelivered before checking whether it was processed/persisted.


    Let’s explore the behavior in the sequence diagram in [Figure 6-10](#9781484207949_Ch06.xhtml#Fig10).


