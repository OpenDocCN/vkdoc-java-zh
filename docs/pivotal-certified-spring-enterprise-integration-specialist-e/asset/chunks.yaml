    \ highlights how to transfer and convert messages with a custom conversion format.\
    \ [Listing 5-41](#9781484207949_Ch05.xhtml#FPar44) shows conversion into/from\
    \ our custom payload format.\n\n[***Listing 5-41***](#9781484207949_Ch05.xhtml#_FPar44).\
    \ Custom Message Converter (0510-jms-custom-converter)\n\n```\npackage net.lkrnac.book.eiws.chapter05.user;\n\
    \nimport javax.jms.JMSException;\nimport javax.jms.Message;\nimport javax.jms.Session;\n\
    import net.lkrnac.book.eiws.chapter05.user.User;\nimport org.springframework.jms.support.converter.MessageConversionException;\n\
    import org.springframework.jms.support.converter.MessageConverter;\nimport org.springframework.stereotype.Component;\n\
    \n@Component\npublic class UserMessageConverter implements MessageConverter {\n\
    \  private static final String DELIMITER = \";\";\n\n@Override\n  public Message\
    \ toMessage(Object object, Session session) throws JMSException,\n      MessageConversionException\
    \ {\n    User user = (User) object;\n    String userString = user.getEmail() +\
    \ DELIMITER + user.getName();\n    return session.createTextMessage(userString);\n\
    \  }\n\n@Override\n  public Object fromMessage(Message message) throws JMSException,\n\
    \      MessageConversionException {\n    String userMessage = message.getBody(String.class);\n\
    \    String[] userStringChunks = userMessage.split(DELIMITER);\n    User user\
    \ = new User();\n    user.setEmail(userStringChunks[0]);\n    user.setName(userStringChunks[1]);\n\
    \    return user;\n  }\n}\n```\n\nThis class implements the `org.springframework.jms.support.converter.MessageConverter`\
    \ interface. Its contract is driven by two methods: `toMessage` and `fromMessage`.\
    \ In `toMessage`, we receive a Java `object` that should be converted into `javax.jms.Message`.\
    \ We know that it will be of type `User`; therefore, we cast it into this type.\
    \ Our custom format is a simple listing of `User` object properties in the order\
    \ `email` and `name`, delimited by `;`. When we have the `userString` payload\
    \ constructed, we call `session.createTextMessage()` to wrap `String` into `javax.jms.Message`.\
    \ The session instance is injected into the `toMessage` conversion method via\
    \ a parameter from Spring.\n\nThe second method, `fromMessage`, does the exact\
    \ opposite. It extracts an injected `message` of type `javax.jms.Message` into\
    \ the `String` representation `userMessage` and splits it into an array of values\
    \ based on the delimiter. Subsequently, a user object is created based on these\
    \ values and returned to the Spring framework.\n\nThis converter component is\
    \ annotated by `@Component`, and therefore Spring can use it for configuring `JmsTemplate`\
    \ and `DefaultJmsListenerContainerFactory`. This configuration is shown in [Listing\
    \ 5-42](#9781484207949_Ch05.xhtml#FPar45).\n\n[***Listing 5-42***](#9781484207949_Ch05.xhtml#_FPar45).\
    \ Custom JMS Converter Example Configuration (0510-jms-custom-converter)\n\n```\n\
    package net.lkrnac.book.eiws.chapter05.user;\n\nimport javax.jms.ConnectionFactory;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.config.DefaultJmsListenerContainerFactory;\n\
    import org.springframework.jms.core.JmsTemplate;\nimport org.springframework.jms.support.converter.MessageConverter;\n\
    \n@Configuration\n@EnableJms\npublic class JmsConfiguration {\n  @Bean\n  public\
    \ JmsTemplate jmsTemplate(ConnectionFactory connectionFactory,\n      MessageConverter\
    \ messageConverter) {\n    JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);\n\
    \    jmsTemplate.setMessageConverter(messageConverter);\n    return jmsTemplate;\n\
    \  }\n\n@Bean\n  public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(\n\
    \      ConnectionFactory connectionFactory, MessageConverter messageConverter)\
    \ {\n    DefaultJmsListenerContainerFactory factory =\n        new DefaultJmsListenerContainerFactory();\n\
    \    factory.setConnectionFactory(connectionFactory);\n    factory.setMessageConverter(messageConverter);\n\
    \    return factory;\n  }\n}\n```\n\nThis configuration is similar to [Listing\
    \ 5-35](#9781484207949_Ch05.xhtml#FPar38). The only difference is that the message\
    \ converter is our custom converter `UserMessageConverter` instance.\n\nSending\
    \ and listening to messages is exactly the same as in [Listings 5-36](#9781484207949_Ch05.xhtml#FPar39)\
    \ and [5-37](#9781484207949_Ch05.xhtml#FPar40) from the JSON conversion example.\n\
