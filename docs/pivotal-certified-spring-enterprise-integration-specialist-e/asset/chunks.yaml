    message types, and return a `Future<Boolean>` result. The asynchronous method
    `sendMessage()` constructs messages based on the given `stringMessage` payload
    and `correlationId` parameters using `MessageBuilder`. The `sequenceSize` header
    is hard-coded to value 2, so the aggregator will aggregate the two messages into
    one. One more header is needed for aggregation: `sequenceNumber`, which defines
    the order of messages in the sequence so that aggregator can release all messages
    from the sequence when they arrive. This header is injected into messages by default.


    The rest of the logic should be familiar. We send messages to the SI flow and
    read the `Future<Boolean>` result. Subsequently, we wait for the SI flow to respond
    or time out. [Listing 8-108](#9781484207949_Ch08_2_Ext.xhtml#FPar111) shows the
    main class of this example.


