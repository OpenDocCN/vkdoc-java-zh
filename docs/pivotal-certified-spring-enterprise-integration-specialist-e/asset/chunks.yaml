    Out-of-Container Testing


    Various approaches exist for automatically testing web services. Unit tests usually
    don’t create Spring’s context instance. A class or group of classes are tested
    in isolation, and the test fakes dependencies. These tests are useful as documentation
    of a developer’s intentions of how the module should work. Such testing is particularly
    useful for sanitizing the business logic of the web service or web service consumer.


    In another type of testing, we automatically deploy the web service to a target
    environment and execute a test suite, which would perform or consume real requests.
    This is heading toward an end-to-end level of testing. Because deployment steps
    are needed in the build pipeline, these tests may take some time. Therefore, this
    type of testing is commonly not triggered as often as unit testing.


    Slightly more suitable is simulating a deployment environment during the build
    process. Examples are `tomcat7-maven-plugin` or `gradle-maven-plugin`, which enable
    us to build a full artifact of our application and deploy it to an embedded servlet
    container.


    Additionally, Spring Web Services provides support for integration testing of
    full or partial Spring configurations. It can be integrated with a unit-testing
    framework of your choice (most commonly JUnit or TestNG). This testing support
    is handy, because it covers integrated Spring configuration and doesn’t need to
    use a servlet container (or other type of resource-intensive environment) at the
    same time.


    Server-Side Testing Support


    When we are testing a web service server, we need to send requests to the web
    service under test, receive the request, and verify a response. The Spring Web
    Services project provides helpers to fulfill these tasks easily:


    *   `MockWebServiceClient` is used to simulate the client and for sending requests.

    *   `org.springframework.ws.test.server.RequestCreator`/`org.springframework.ws.test.server.RequestCreators`
    helps with creation of request messages.

    *   `org.springframework.ws.test.server.ResponseActions`/`org.springframework.ws.test.server.ResponseMatchers`
    provides support for response verification.


    In this example, we’ll use a testing request from [Listing 3-35](#9781484207949_Ch03.xhtml#FPar40)
    and a response located in [Listing 3-36](#9781484207949_Ch03.xhtml#FPar41).


    [***Listing 3-35***](#9781484207949_Ch03.xhtml#_FPar40). Request Used for Testing
    (File testRequest.xml in Example Project 0303-ws-boot-service)


    ```

    <ns2:UserRequest xmlns:ns2="http://localhost:10303/0303-ws-boot-service"

        Email="lubos.krnac@gmail.com" />

    ```


    [***Listing 3-36***](#9781484207949_Ch03.xhtml#_FPar41). Response Used for Testing
    (File testResponse.xml in Example Project 0303-ws-boot-service)


    ```

    <ns2:UserDetailsResponse

      xmlns:ns2="http://localhost:10303/0303-ws-boot-service">

      <ns2:FirstName>Lubos</ns2:FirstName>

      <ns2:LastName>Krnac</ns2:LastName>

    </ns2:UserDetailsResponse>

    ```


    Let’s explore service-side testing support in [Listing 3-37](#9781484207949_Ch03.xhtml#FPar42).


    [***Listing 3-37***](#9781484207949_Ch03.xhtml#_FPar42). Server-Side Testing (0303-ws-boot-service)


