    ## Conditional Execution of Step


    SB provides features to programmatically decide whether `Step` needs to be executed.
    This programmatic decision is done in the bean implementing `JobExecutionDecider`,
    which is then used in the `<decision>` XML element or by combination of the methods
    `next()`, `on()`, `to()`, and `from()` when we are building a `Job` with a Java
    configuration.


    ### XML Configuration of Step Decision


    [Listing 9-111](#9781484207949_Ch09_2_Ext.xhtml#FPar115) shows the implementation
    of `JobExecutionDecider`.


    [***Listing 9-111***](#9781484207949_Ch09_2_Ext.xhtml#_FPar115). `JobExecutionDecider`
    Implementation (0933-decision-xml)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import org.springframework.batch.core.JobExecution;

    import org.springframework.batch.core.StepExecution;

    import org.springframework.batch.core.job.flow.FlowExecutionStatus;

    import org.springframework.batch.core.job.flow.JobExecutionDecider;

    import org.springframework.stereotype.Component;


    @Component

    public class TeaIngredientDecider implements JobExecutionDecider {

      @Override

      public FlowExecutionStatus decide(JobExecution jobExecution,

          StepExecution stepExecution) {

        String teaIngredient = jobExecution.getJobParameters().getString("teaIngredient");

        return ("milk".equals(teaIngredient))

            ? new FlowExecutionStatus(teaIngredient)

            : FlowExecutionStatus.COMPLETED;

      }

    }

