  raw: 'The TestNG framework is used for testing. Therefore, for the Spring integration
    test, we need to use the `AbstractTestNGSpringContextTests` parent also provided
    by the Spring framework. The `FULL_USER_URL` constant enables test methods to
    not repeat the same String literal. The `mockMvc` variable is used in every test
    method for sending HTTP requests and verification.


    Next, the class-level variable injects the Spring context instance created for
    the integration test. This instance is the one used by the application when running
    in the servlet container. The `init` method uses the `MockMvcBuilders` helper
    to initiate the `mockMvc` object before each test method, which is declared by
    the TestNG’s `BeforeMethod` annotation.


    The `createTestRecord` method helps us to create the JSON Spring representation
    of the user model used for sending requests. It will be used by various test methods
    in subsequent test example listings.


    MockMvc Example for POST


    Let’s start with the `POST` version (see [Listing 4-22](#9781484207949_Ch04.xhtml#FPar32)).


    [***Listing 4-22***](#9781484207949_Ch04.xhtml#_FPar32). Integration Testing HTTP
    POST (0403-rest-java-config-server)


    ```

      @Test

      public void testPost() throws Exception {

        // GIVEN

        String testingRecord = createTestRecord(0);


    // WHEN

        MvcResult mvcResult = mockMvc.perform(post(FULL_USER_URL)

            .contentType(MediaType.APPLICATION_JSON)

            .content(testingRecord))

            .andReturn();


    // THEN

        int httpStatus = mvcResult.getResponse().getStatus();

        assertEquals(httpStatus, HttpStatus.CREATED.value());

      }

    ```


    All testing methods are annotated with `org.testng.annotations.Test`, which marks
    the method as a test, similar to JUnit. In the method body, we create the testing
    record. Then we use the `mockMvc` class-level property to perform the `POST` operation
    against our URI. This is testing the URI mapping of the controller. We also use
    `MockHttpServletRequestBuilder` chaining for sending the JSON content type with
    the created JSON payload. This chained call will simulate the `POST` request against
    the controller in [Listing 4-13](#9781484207949_Ch04.xhtml#FPar21). The result
    of this operation is stored in a local variable called `mvcResult`, which is used
    for retrieving and verifying the response status.


    MockMvc Example for GET


    The next test method covers testing of the `GET` request (see [Listing 4-23](#9781484207949_Ch04.xhtml#FPar33)).


    [***Listing 4-23***](#9781484207949_Ch04.xhtml#_FPar33). Testing HTTP GET of Single
    Resource Instance (0403-rest-java-config-server)


    ```

    @Test

    public void testSingleGet() throws Exception {

      // GIVEN

      mockMvc.perform(post(FULL_USER_URL)

          .contentType(MediaType.APPLICATION_JSON)

          .content(createTestRecord(0)));


    // WHEN

      mockMvc.perform(get(FULL_USER_URL + "/{id}", 0)

          .accept(MediaType.APPLICATION_JSON)

        )


    // THEN

        .andDo(print())

        .andExpect(status().isOk())

        .andExpect(jsonPath("$.email").value("user0@gmail.com"))

        .andExpect(jsonPath("$.name").value("User0"));

    }

    ```


    At first, we use `mockMvc` to `POST` the testing record. This is needed because
    we use a clean sheet for each test method provided by the `@DirtiesContext` annotation.
    Testing the Spring context involves storing objects into `UserService`, so we
    need to `POST` the resource instance before testing `GET`. Next, the `mockMvc`
    call retrieves the testing resource instance. It specifies the URI with the identifier
    path variable and the `Accept` HTTP header to indicate that the client wants to
    consume JSON.


    Then we chain-print the response to the console. Printing can be useful for troubleshooting
    purposes in case of continuous integration errors. The verification phase of the
    test is next. We make sure that the response status is correct and that the JSON
    payload contains the expected elements. The payload verification uses JSONPath
    Spring wrappers. JSONPath is a library for parsing the JSON payload. So it has
    to be on the classpath. This is another example of how Spring effectively uses
    third-party open source libraries to provide powerful APIs.


    When we execute this test method, `andDo(print())` prints the output shown in
    [Listing 4-24](#9781484207949_Ch04.xhtml#FPar34).


    [***Listing 4-24***](#9781484207949_Ch04.xhtml#_FPar34). The Results of Testing
    HTTP GET of Single Resource Instance (0403-rest-java-config-server)


    ```

    MockHttpServletRequest:

             HTTP Method = GET

             Request URI = /users/0

              Parameters = {}

                 Headers = {Accept=[application/json]}


    Handler:

                    Type = net.lkrnac.book.eiws.chapter04.javaconfig.UserController

                  Method = public net.lkrnac.book.eiws.chapter04.model.User net.lkrnac.book.

                           eiws.chapter04.javaconfig.UserController.getUser(int)


    Async:

       Was async started = false

            Async result = null


    Resolved Exception:

                    Type = null


    ModelAndView:

               View name = null

                    View = null

                   Model = null


    FlashMap:


    MockHttpServletResponse:

                  Status = 200

           Error message = null

                 Headers = {Content-Type=[application/json;charset=UTF-8]}

            Content type = application/json;charset=UTF-8

                    Body = {"email":"user0@gmail.com","name":"User0"}

           Forwarded URL = null

          Redirected URL = null

                 Cookies = []

    ```


    Such output is handy for troubleshooting HTTP communication. The next method,
    in [Listing 4-25](#9781484207949_Ch04.xhtml#FPar35), tests a multi `GET` request.


    [***Listing 4-25***](#9781484207949_Ch04.xhtml#_FPar35). Integration Testing HTTP
    GET of Various Resource Instances (0403-rest-java-config-server)


    ```

    @Test

    public void testMultiGet() throws Exception {

      // GIVEN

      mockMvc.perform(post(FULL_USER_URL)

          .contentType(MediaType.APPLICATION_JSON)

          .content(createTestRecord(0)));

      mockMvc.perform(post(FULL_USER_URL)

          .contentType(MediaType.APPLICATION_JSON)

          .content(createTestRecord(1)));


    // WHEN

      mockMvc.perform(get(FULL_USER_URL).accept(MediaType.APPLICATION_JSON))


    // THEN

        .andExpect(status().isOk())

        .andExpect(jsonPath("$[0].email").value("user0@gmail.com"))

        .andExpect(jsonPath("$[0].name").value("User0"))

        .andExpect(jsonPath("$[1].email").value("user1@gmail.com"))

        .andExpect(jsonPath("$[1].name").value("User1"));

    }

    ```


    Similar to the single `GET` test in [Listing 4-23](#9781484207949_Ch04.xhtml#FPar33),
    we first `POST` the testing records. Then we use `mockMvc` to perform the `GET`
    method without the ID placeholder in the URI, which means we want to read all
    stored records. Then we use chained JSONPath verifications to ensure that the
    expected records were included in the response.


    MockMvc Example for PUT


    The `PUT` version is shown in [Listing 4-26](#9781484207949_Ch04.xhtml#FPar36).


    [***Listing 4-26***](#9781484207949_Ch04.xhtml#_FPar36). Integration Testing HTTP
    DELETE (0403-rest-java-config-server)


    ```

    @Test

    public void testPut() throws Exception {

      // GIVEN: test record


    // WHEN

      mockMvc.perform(put(FULL_USER_URL + "/0")

          .contentType(MediaType.APPLICATION_JSON)

          .content(createTestRecord(0)))


    // THEN

        .andExpect(status().isOk());

    }

    ```


    In this test, we send the `PUT` request to the URI `/users/0` with the test record
    and expect the response 200 OK.


    MockMvc Example for DELETE


    The next part of the REST integration testing example covers HTTP `DELETE`. It
    is shown in [Listing 4-27](#9781484207949_Ch04.xhtml#FPar37).'
