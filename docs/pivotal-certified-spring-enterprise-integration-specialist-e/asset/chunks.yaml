    We use four namespaces that the Spring and SB frameworks provide: `beans`, `jdbc`,
    `context`, and `batch`. The default namespace here is `beans`, as we don’t have
    a lot of `batch` XML tags. `<context:component-scan>`, `transactionManager`, and
    `jobLauncher` were already covered in previous examples. The component scan registers
    all the beans from the defined package into the Spring context. The transaction
    manager is needed to handle transactions, and `JobLauncher` is used for execution
    of batch jobs.


    The `<jdbc:embedded-database>` XML tag configures the in-memory database we use
    in this example. This data source will be handling only storage of SB states,
    so we create a schema for it via the SQL script `classpath:/org/springframework/batch/core/schema-h2.sql`.


    `JdbcTemplate` enables us to easily query the SB `JobRepository` data store. Finally,
    we create the `JobRepository` bean via the SB XML tag `<batch:job-repository>`.
    We need to specify the mandatory attributes `transaction-manager` and `data-source`,
    where we use the bean instances created earlier in this XML configuration. We
    can also define a prefix for all the SB tables in the database, which is handy
    for avoiding possible DB table name conflicts. The last attribute we use is the
