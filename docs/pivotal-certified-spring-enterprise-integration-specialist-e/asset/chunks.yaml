    消息*转换器*是一种位于 SI 流中间的消息端点。与所有中间 SI 组件一样，它可以参与单向流和双向流。它可以在被动模式下运行。它也可以拥有一个轮询器子组件，从而充当一个主动组件。以下是可能的转换器类型：


    *   *通用消息转换器*：将接收到的 Java 对象转换为另一个 Java 对象。由于默认情况下所有消息都是不可变的，因此会创建一个新消息。因此，通用转换器是使用
    `MessageBuilder<T>` 从原始接收消息创建转换后消息的理想选择。XML 配置使用 `<int:transformer>` 标签。当我们想通过
    Java 配置进行配置时，需要使用 `@MessageEndpoint` 注解 `Transformer` 类，并使用 `@Transformer` 注解转换方法。要将此
    Bean 扫描到 Spring 上下文中，我们需要在 Java 配置类中的某处使用 `@IntegrationComponentScan`。

    *   *特定技术转换器*：在各种标准 Java 类型（例如 `Map`、`Object`）和各种常见格式（例如 JSON、XML）之间转换接收到的消息。这些转换器只能通过
    XML 标签（例如 `<int:json-to-object-transformer>`、`<int:map-to-object-transformer>`、`<int:object-to-json-transformer>`）进行配置。

    *   *标头过滤器*：消息转换器的一个子集，用于移除指定的标头。可以通过 `<int:header-filter>` 进行配置。


    使用 XML 配置的通用转换器示例


    清单 8-35 展示了转换类。


    ***清单 8-35***。XML 转换器示例的转换类 (0811-transformer-generic-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;


    public class SimpleMessageTransformer {

      public String transformMessage(String message) {

        return new String(message + " transformed");

      }

    }

    ```


    这个类甚至不是一个 Spring Bean，它有一个方法，用于向消息负载追加一个字符串。很容易想象，任何转换逻辑都可以在这里实现。只要该方法返回一个可以表示或转换为
    SI 消息的值，并且其参数是 SI 可以注入值的（例如，负载或使用 `@Header`/`@Headers` 注解标记的标头），它就可以在 SI 流中使用。


    清单 8-36 涵盖了 SI 流配置。


    ***清单 8-36***。通用转换器示例的 XML SI 流配置（文件 si-config.xml，位于示例项目 0811-transformer-generic-xml
    的 src/main/resources 文件夹中）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperService" />

      <int:channel id="inChannel" />


    <int:transformer input-channel="inChannel" output-channel="transformedChannel">

        <bean class="net.lkrnac.book.eiws.chapter08.SimpleMessageTransformer" />

      </int:transformer>

      <int:channel id="transformedChannel" />


    <int:service-activator input-channel="transformedChannel" ref="writeService"

        method="writeAndIndicateSuccess">

      </int:service-activator>

    </beans>

    ```


    入站网关是前面示例中已经熟悉的组件。同样，它映射了我们通用的服务接口 `SiWrapperService`，并将消息发送到 `inChannel`。然后，该通道连接到转换器。`<int:transformer>`
    标签指定了 `input-channel` 和 `output-channel`。转换 Bean 是通过 `<bean>` 子元素创建的，这是用于创建 Bean
    的标准 Spring 构造。


    然后，转换器的输出通道连接到映射到我们通用 `WriteService.writeAndIndicateSuccess()` 的服务激活器。由于此方法返回一个值，我们处理的是双向流，并且响应通过一个临时回复通道发送回网关组件。清单
    8-37 展示了此示例的主类。


    ***清单 8-37***。通用转换器示例的主类 (0811-transformer-generic-xml)


