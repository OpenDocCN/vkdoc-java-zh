    事务处理


    事务在 SI 流程中的传播边界与异常的传播边界略有不同。正如我们之前展示的，即使处理的是异步消息传递，异常有时也能传播回调用方。但对于事务传播而言，情况并非如此。*只有当整个流程是同步时，事务才能在
    SI 流程中传播。* 要配置事务支持，我们可以使用标准的 Spring 机制（例如 `@Transactional` 注解）。


    但是，有一种选项可以让事务存在于异步消息子流程中，即事务边界从一个活跃组件开始。当我们为任何活跃组件指定 `<int:poller>` 时，可以定义 XML
    轮询器子元素 `<int:transactional>`。该元素告诉 SI，我们希望为由轮询器触发启动的每个新线程开启一个事务。这种机制称为*事务性轮询*。


