    ```


    This example is the client counterpart for the XML server configuration in [Listing
    2-14](#9781484207949_Ch02.xhtml#FPar16). Therefore, port 10203 is used. You may
    notice that it is similar to the Java configuration. Notice that in the Java client
    configuration example in [Listing 2-9](#9781484207949_Ch02.xhtml#FPar10), we had
    to create the proxy bean explicitly. In this case, Spring will create it automatically,
    so it’s enough to register only the factory bean.


    As you can see, these examples document the API enhancements Spring provides for
    RMI. Although it’s easy to expose services via RMI and much easier with Spring,
    there are a few architectural risks when using RMI. First of all, every type that
    is part of the contract has to be serializable. This is restrictive, because both
    sides need to have the same version of each return type or parameter. So changes
