    ***清单 6-1***. JMS 1.1 配置类 (0601-java-jms11-sync-tx)


    ```

    package net.lkrnac.book.eiws.chapter06.javasynctx;


    import java.util.Hashtable;

    import javax.jms.Connection;

    import javax.jms.ConnectionFactory;

    import javax.jms.JMSException;

    import javax.jms.Queue;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import lombok.Getter;


    public class JmsConfiguration implements AutoCloseable {

      private InitialContext initialContext;


    @Getter

      private Queue queue;

      @Getter

      private Connection connection;


    public void init() throws NamingException, JMSException {

        Hashtable<Object, Object> env = new Hashtable<>();

        env.put("java.naming.factory.initial",

            "org.jnp.interfaces.NamingContextFactory");

        env.put("java.naming.factory.url.pkgs",

            "org.jboss.naming:org.jnp.interfaces");

        env.put("java.naming.provider.url", "jnp://localhost:1099");

        initialContext = new InitialContext(env);


    queue = (Queue) initialContext.lookup("/queue/ExpiryQueue");

        ConnectionFactory connectionFactory =

            (ConnectionFactory) initialContext.lookup("/ConnectionFactory");

        connection = connectionFactory.createConnection();

      }


    public void close() throws NamingException, JMSException {

        if (initialContext != null) {

          initialContext.close();

        }

        if (connection != null) {

          connection.close();

        }

      }

    }

    ```


    此配置与我们上一章用于配置 JMS 1.1 示例的配置相同。它使用 JNDI `initialContext` 实例的 HornetQ 配置来查找 `queue`
    和 `connection` 的实例。这两个是适用于连接到 JMS 提供者的 JMS 对象。`queue` 基于对 `/queue/ExpiryQueue`
    的 JNDI 查找创建，`connectionFactory` 实例基于 `/ConnectionFactory` 创建。这些是 HornetQ 服务器的默认配置。此配置位于文件
    `config/stand-alone/non-clustered/hornetq-jms.xml` 中。


    `queue` 和 `connection` 对象的私有实例通过 Lombok 生成的 getter 暴露给外部世界。`@Getter` 负责此操作。


    `close` 方法将释放需要释放的资源——即 JNDI `initialContext` 和 JMS `connection`。`JmsConfigurable`
    类参与了 `AutoClosable` 契约，该契约代表了 Java 7 的 try-with-resources 特性。通过特殊的 `try` 块，Java
    会自动调用 `close()` 方法，就像它是 `finally` 块的一部分一样。


