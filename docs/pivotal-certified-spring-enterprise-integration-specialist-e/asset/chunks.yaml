  raw: 'This JMS 2.0 configuration is similar to the JMS 1.1 configuration in [Listing
    5-1](#9781484207949_Ch05.xhtml#FPar2). The only difference is that we create a
    `JMSContext` instance instead of a `Connection` instance. `JMSContext` is a new
    abstraction introduced in JMS 2.0\. [Listing 5-7](#9781484207949_Ch05.xhtml#FPar8)
    shows an example JMS 2.0 sender implementation.


    [***Listing 5-7***](#9781484207949_Ch05.xhtml#_FPar8). Sending a JMS Message with
    the JMS 2.0 API (0502-jms2-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms2jndi;


    import javax.jms.JMSContext;

    import javax.jms.Queue;


    public class SimpleMessageSender {

      private JMSContext jmsContext;

      private Queue queue;


    public SimpleMessageSender(JMSContext jmsContext, Queue queue) {

        this.jmsContext = jmsContext;

        this.queue = queue;

      }


    public void sendMessage(String message) {

        jmsContext.createProducer().send(queue, message);

      }

    }

    ```


    In comparison to [Listing 5-2](#9781484207949_Ch05.xhtml#FPar3), we don’t need
    to initialize `Session` nor `MessageProducer` instances. Therefore, it’s more
    suitable to accept `jmsContext` and `queue` via the constructor and store them
    into the class fields.


    The sending message is also more concise, because we create `JMSProducer` via
    the `jmsContext.createProducer` call and use the `queue` object to chain the `send`
    call. Notice that the need to handle the checked `JMSException` disappeared with
    JMS 2.0 when sending the message. [Listing 5-8](#9781484207949_Ch05.xhtml#FPar9)
    shows the implementation of the message reader.


    [***Listing 5-8***](#9781484207949_Ch05.xhtml#_FPar9). Synchronous Message Reception
    with JMS 2.0 API (0502-jms2-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms2jndi;


    import javax.jms.JMSConsumer;

    import javax.jms.JMSContext;

    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.Queue;


    public class SimpleMessageReader {

      private JMSContext jmsContext;

      private Queue queue;


    public SimpleMessageReader(JMSContext jmsContext, Queue queue) {

        this.jmsContext = jmsContext;

        this.queue = queue;

      }


    public String readMessage() throws JMSException {

        JMSConsumer jmsConsumer = jmsContext.createConsumer(queue);

        Message message = jmsConsumer.receive(5000);

        return message.getBody(String.class);

      }

    }

    ```


    In comparison to [Listing 5-3](#9781484207949_Ch05.xhtml#FPar4), which uses the
    JMS 1.1 API, we again don’t need to initialize. Instead, we accept the `jmsContext`
    and `queue` objects via the constructor. When reading the message, we first create
    a `JMSConsumer` instance from `jmsContext` based on the `queue` object and then
    perform a potentially blocking call. It is potentially blocking because if the
    message is already sitting in the queue, we may not need to wait at all. Time-out
    `5000` is again an optional parameter. If we don’t specify it, we could wait forever.


    Unlike with the JMS 1.1 API, there’s no need to cast a message to `TextMessage`.
    But it’s done anyway under the hood based on the `String.class` parameter we specify
    for the `message.getBody()` call. This call can throw a checked `JMSException`,
    so we are forced to handle it or bubble it up. In this case, the second option
    is used by the `readMessage()` method, so the caller of this method will need
    to take care of it also (see [Listing 5-9](#9781484207949_Ch05.xhtml#FPar10)).


    [***Listing 5-9***](#9781484207949_Ch05.xhtml#_FPar10). Main Class of Synchronous
    JMS 2.0 Example (0502-jms2-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms2jndi;


    import javax.jms.JMSContext;

    import javax.jms.JMSException;

    import javax.jms.Queue;

    import javax.naming.NamingException;

    import lombok.extern.slf4j.Slf4j;


    @Slf4j

    public class Jms2JndiApplication {

      public static void main(String[] args) throws JMSException, NamingException
    {

        try (JmsConfiguration jmsConfiguration = new JmsConfiguration()) {

          jmsConfiguration.init();

          JMSContext jmsContext = jmsConfiguration.getJmsContext();

          Queue queue = jmsConfiguration.getQueue();


    SimpleMessageSender messageSender =

              new SimpleMessageSender(jmsContext, queue);

          messageSender.sendMessage("simple message");


    SimpleMessageReader messageConsumer =

              new SimpleMessageReader(jmsContext, queue);

          String message = messageConsumer.readMessage();


    log.info("Message Received: {}", message);

        }

      }

    }

    ```


    `Jms2JndiApplication` is again similar to `Jms11JndiApplication`, but the JMS
    2.0 API allowed us to reduce the `init` calls for `messageSender` and `messageConsumer`.
    Instead, we pass into their constructor the `jmsContext` and `queue` objects—nice
    improvements against the JMS 1.1 API. [Listing 5-10](#9781484207949_Ch05.xhtml#FPar11)
    shows the output of this example after running this main class.


    [***Listing 5-10***](#9781484207949_Ch05.xhtml#_FPar11). Output of Synchronous
    JMS 2.0 Example


    ```

    23:27:41.859 [main] INFO  n.l.b.e.c.j.Jms2JndiApplication - Message Received:
    simple message

    ```


    Asynchronous JMS Example


    Our last pure Java example highlights how to receive JMS messages with an asynchronous
    listener. But before we dive into JMS constructs, we need to introduce the class
    that will be used across most examples in this chapter. It is shown in [Listing
    5-11](#9781484207949_Ch05.xhtml#FPar12).


    [***Listing 5-11***](#9781484207949_Ch05.xhtml#_FPar12). Common Service for Processing
    Messages (0500-jms-common)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import lombok.extern.slf4j.Slf4j;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class SimpleService {

      public void processText(String message) {

        log.info("Message received: {}", message);

      }

    }

    ```


    Notice that this example is located in the common project `0500-jms-common`. This
    is because we will use the same class in this pure Java example and in most of
    the Spring JMS examples. Its purpose is to be the class where we delegate JMS
    messages after asynchronous reception. It can then be used in integration test
    suite verification that the JMS message was received. As a responsible programmer,
    I want to make sure that code snippets in the book are working. But diving into
    JMS integration testing is beyond the scope of this book, so it’s up to you to
    explore the testing strategies used to make sure that JMS examples are working.


    The `SimpleService` class is annotated with Lombok’s `@Slf4j` annotation, which
    is handy when we need to use the SLF4J logging façade. `@Service` may be confusing
    for a pure Java JMS example, but it will be used and scanned as a Spring bean
    in Spring JMS asynchronous examples. Implementation is trivial—the code just logs
    the received message to the console.


    The next class explained in this example is the JMS listener implementation in
    [Listing 5-12](#9781484207949_Ch05.xhtml#FPar13).


    [***Listing 5-12***](#9781484207949_Ch05.xhtml#_FPar13). Asynchronous Message
    Reception with JMS 2.0 API (0503-async-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.asyncjndi;


    import javax.jms.Message;

    import javax.jms.MessageListener;


    import lombok.extern.slf4j.Slf4j;

    import net.lkrnac.book.eiws.chapter05.text.SimpleService;


    @Slf4j

    public class SimpleMessageListener implements MessageListener {

      private SimpleService simpleService;


    public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


