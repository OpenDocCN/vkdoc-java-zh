- fmt: '# Configuring JMS Publish/Subscribe with Spring


    So far we’ve used the JMS destination `queue/ExpiryQueue`, because this queue
    is configured by the HornetQ server by default. But for the publish/subscribe
    JMS communication model, we need to use the JMS topic instead of the queue. So
    we need to change the HornetQ default configuration to provide this capability.


    At the beginning of this chapter, we explained how to run the HornetQ server with
    the `bin/run.sh` or `bin/run.bat` commands. For the same HornetQ server, we need
    to append the topic configuration at the end of the configuration file `config/stand-alone/non-clustered/hornet-jms.xml`,
    as shown in [Listing 5-51](#9781484207949_Ch05.xhtml#FPar54).


    [***Listing 5-51***](#9781484207949_Ch05.xhtml#_FPar54). HornetQ Topic Configuration


    ```

       <!-- ... -->


    <queue name="ExpiryQueue">

          <entry name="/queue/ExpiryQueue"/>

       </queue>


    <topic name="simpleTopic">

          <entry name="/topic/simpleTopic"/>

       </topic>

    </configuration>

    ```


    As we mentioned, `ExpiryQueue` is configured by default in the HornetQ installation.
    Every JMS example so far has used this queue. To configure our `simpleTopic`,
    we append the `<topic>` XML element at the end of this configuration file.


    The main Spring class is named `JmsApplication`. It uses the same constructs as
    the main classes already shown in the previous examples, so we don’t list it.
    Also, the sender of the messages is similar to other sender classes from this
    chapter, except instead of `queue/ExpiryQueue`, we use `simpleTopic`.


    [Listing 5-52](#9781484207949_Ch05.xhtml#FPar55) shows the Java JMS configuration
    for the publish/subscribe model for the sender and listeners.


    [***Listing 5-52***](#9781484207949_Ch05.xhtml#_FPar55). Java Configuration of
    Publish/Subscribe Model (0515-publish-subscribe-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.pubsub;


    import java.util.Hashtable;

    import javax.jms.ConnectionFactory;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.jms.config.DefaultJmsListenerContainerFactory;

    import org.springframework.jms.core.JmsTemplate;


    @Configuration

    @EnableJms

    public class JmsConfiguration {

      @Bean

      public InitialContext initialContext() throws NamingException {

        Hashtable<Object, Object> env = new Hashtable<Object, Object>();

        env.put("java.naming.factory.initial",

            "org.jnp.interfaces.NamingContextFactory");

        env.put("java.naming.factory.url.pkgs",

            "org.jboss.naming:org.jnp.interfaces");

        env.put("java.naming.provider.url", "jnp://localhost:1099");

        return new InitialContext(env);

      }


    @Bean

      public ConnectionFactory connectionFactory(InitialContext initialContext)

          throws NamingException {

        return (ConnectionFactory) initialContext.lookup("/ConnectionFactory");

      }


    @Bean

      public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {

        JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);

        jmsTemplate.setPubSubDomain(true);

        return jmsTemplate;

      }


    @Bean

      public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(

          ConnectionFactory connectionFactory) {

        DefaultJmsListenerContainerFactory factory =

            new DefaultJmsListenerContainerFactory();

        factory.setConnectionFactory(connectionFactory);

        factory.setPubSubDomain(true);

        return factory;

      }

    }

    ```


    The HornetQ JNDI configuration with the `connectionFactory` bean is the same as
    for the point-to-point examples. The publish/subscribe model needs to be turned
    on for `JmsTemplate` and `DefaultJmsListenerContainerFactory` via the `pubSubDomain`
    flag on both beans. When we run the `JmsApplication` class, we will see output
    similar to [Listing 5-53](#9781484207949_Ch05.xhtml#FPar56).


    [***Listing 5-53***](#9781484207949_Ch05.xhtml#_FPar56). Output of Publish/Subscribe
    Example


    ```

    2015-05-30 20:52:19.860  INFO 23740 --- [pool-1-thread-1] n.l.b.e.c.pubsub.SimpleMessageSender    
    : Sending message: simple message

    2015-05-30 20:52:19.869  INFO 23740 --- [enerContainer-1] n.l.b.e.chapter05.pubsub.PubSubService  
    : Message Received: simple message via listener 2

    2015-05-30 20:52:19.869  INFO 23740 --- [enerContainer-1] n.l.b.e.chapter05.pubsub.PubSubService  
    : Message Received: simple message via listener 1

    2015-05-30 20:52:20.860  INFO 23740 --- [pool-1-thread-1] n.l.b.e.c.pubsub.SimpleMessageSender    
    : Sending message: simple message

    2015-05-30 20:52:20.871  INFO 23740 --- [enerContainer-1] n.l.b.e.chapter05.pubsub.PubSubService  
    : Message Received: simple message via listener 2

    2015-05-30 20:52:20.872  INFO 23740 --- [enerContainer-1] n.l.b.e.chapter05.pubsub.PubSubService  
    : Message Received: simple message via listener 1

    ```


    ## Spring Boot JMS Publish/Subscribe Example


    There is also a new way of configuring the embedded HornetQ or ActiveMQ JMS broker
    hosted alongside our application. This configuration can help us reduce the Spring
    configuration boilerplate to a bare minimum and focus on business logic.


    So far, we’ve used HornetQ and our JMS provider. But the latest stable version
    of Spring Boot doesn’t work with embedded HornetQ in publish/subscribe mode. Therefore,
    we switch to the embedded ActiveMQ JMS broker for this example. ActiveMQ by default
    creates the JMS destination if it’s been configured before. Therefore, no special
    configuration targeted to ActiveMQ is needed.


    The only crucial piece of configuration is in [Listing 5-54](#9781484207949_Ch05.xhtml#FPar57).


    [***Listing 5-54***](#9781484207949_Ch05.xhtml#_FPar57). Spring Boot Publish/Subscribe
    Configuration (File `application.properties` in Folder `src/main/resources` in
    Example Project 0515-publish-subscribe-spring-boot)


    ```

    spring.jms.pub-sub-domain=true

    ```


    This configuration enables publish/subscribe mode on the JMS provider used in
    this example. It is fair to mention that Spring Boot externalized a huge number
    of properties for configuring underlying technologies. This way, we can amend
    the opinionated default behavior of Spring Boot to fit our requirements. In this
    case, we switched from point-to-point JMS communication to publish/subscribe.


    All other classes are the same as for the previous plain Spring Java configuration
    example, but in this case we don’t need to specify any JMS configuration beans,
    because Spring will autoconfigure them for us.


    ## Integrating JMS with Higher-Level Messaging Abstractions


    The Spring framework introduced in version 4.0 uniform messaging abstractions
    that can be used across various protocols such as STOMP, WebSockets, AMQP, JMS,
    or SockJS. These abstractions are located under a new Spring module called `spring-messaging`.
    The central abstraction for this support is `org.springframework.messaging.Message<T>`,
    which aims to abstract all the messages for the mentioned protocols.


    Spring 4.1 created a new `JmsMessagingTemplate` class, built on top of `JmsTemplate`,
    that provides integration with the generic messaging abstraction (see [Listing
    5-55](#9781484207949_Ch05.xhtml#FPar58)). Similar to `JmsTemplate`, `JmsMessagingTemplate`
    is also used for synchronous reception and sending of messages. On the other hand,
    listening to generic messages can be also integrated with the `@JmsListener` annotation.


    [***Listing 5-55***](#9781484207949_Ch05.xhtml#_FPar58). Configuration of `JmsMessagingTemplate`
    (0513-jms-messaging-template)


    ```

    package net.lkrnac.book.eiws.chapter05.userwithrole;

    ```'
