    \ = new Random();\n\n@Override\n  public String call() throws Exception {\n  \
    \  Integer value = random.nextInt();\n    String threadName = Thread.currentThread().getName();\n\
    \nThread.sleep(SIMULATE_IO);\n    if (value % 2 == 0) {\n      throw new UnsupportedOperationException(threadName\
    \ + \" threw exception\");\n    }\n    return threadName + \" generated number\
    \ \" + value;\n  }\n}\n```\n\nThe class `SimpleTask` is our logic that should\
    \ be executed concurrently. It implements the `java.util.concurrent.Callable`\
    \ interface with the generic type `String` to specify a return value type passed\
    \ from the concurrent logic to the caller thread. It also contains various statements\
    \ that highlight these features of the `java.util.concurrent` package:\n\n*  \
    \ Generates a random `value` to simulate an error in the form of `UnsupportedOperationException`\
    \ thrown from the concurrent logic.\n*   Simulates a blocking I/O operation with\
