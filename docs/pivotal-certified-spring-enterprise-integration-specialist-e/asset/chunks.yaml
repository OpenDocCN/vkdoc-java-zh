    the service layer. The first statement defines the SLF4J constant for logging.
    This is a standard construct for a Java application.


    Then we specify the REST service URL that will be called from this service and
    define dependencies. We have two dependencies: `UserActionsRepository` and `AsyncRestTemplate`.
    These two beans will be used to asynchronously aggregate data into the `UserInfo`
    object. They are injected by constructor injection.


    The first method is the private `logElapsedTime`, used for logging time measurements.


    The second method, `getUserAsync`, is responsible for executing an asynchronous
    REST call by calling `asyncRestTemplate.getForEntity`. This call performs a `GET`
    request against the REST server and returns the `ListenableFuture<ResponseEntity<User>>`
    type. This call kicks off a REST call in a separate thread, and we can retrieve
    a response via this return value wrapped into the `ListenableFuture` abstraction.


    As we are interested in timings of this call, we register a callback into the
    `futureResult` return value that logs elapsed time of the asynchronous REST call.
    The last statement in this method returns a `futureResult` instance so that it
    is used for retrieving the REST server response.


    The last method, `getUserInfo`, is the main and the only public method of this
    service, where aggregation happens. First we store the start time for time measurements.
    Then we call the private method `getUserAsync` and pass parameters `identifier`
    and `start` time, so that it can retrieve the `User` object asynchronously and
    log the elapsed time. When we get the `futureResult` instance, the REST call is
    being performed in the background. Our thread can focus on retrieving user actions
    from `userActionsRepository`.


    When we have the `userActions` collection, we can call `futureResult.get`. This
    call blocks this thread until the asynchronous REST call finishes if it is still
    progress. If the asynchronous REST call is already finished, `futureResult.get`
    returns a response immediately. When we have the `User` object and user actions,
    we can aggregate them into the `UserInfo` object.


