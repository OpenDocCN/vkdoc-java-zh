  raw: 'The last two factory methods shown in [Listing 1-3](#9781484207949_Ch01.xhtml#FPar3)
    were introduced in Java SE 8\. They use `java.util.concurrent.ForkJoinPool` as
    their underlying thread-pool implementation. Introduced in Java SE 7, this implementation
    uses a unique algorithm of CPU load distribution between threads called *work-stealing*.
    Idle threads can “steal” work from busy threads rather than waiting silently.


    `Executors.newWorkStealingPool()` creates a thread pool with a size equal to the
    number of cores on the machine it’s currently running on. Thus it tries to use
    CPU power most effectively, because having more running threads than cores leads
    to frequent context switching, which isn’t a resource-free operation. But this
    type of thread pool isn’t suitable for I/O-bound processing. The reason is related
    to the number of threads again. If threads are mostly waiting on I/O operations
    and there aren’t other threads in the pool able to keep CPU cores busy, a lot
    of CPU cycles are wasted on waiting. A much better fit for such I/O-bound operations
    is a fixed thread pool with a number of cores bigger than the available cores.
    A better fit is a cached thread pool.


    `Executors.newWorkStealingPool(int parallelism)` creates a pool that doesn’t take
    into account the number of cores on the current machine, but rather optimizes
    the pool to the given parallelism level. So the pool size is optimized toward
    the number of threads specified by `parallelism`. Unless you are a skilled user
    of `ForkJoinPool`, use the default parallelism, equal to the number of available
    cores (`Executors.newWorkStealingPool()` without the `parallelism` parameter.


    ![Image](images/sq.jpg) **Note**  The fork/join algorithm is beyond the scope
    of this book. To become familiar with this algorithm’s special features, the Oracle
    tutorial for fork/join pools provides a good explanation: `http://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html`.
    Javadoc documentation for `java.util.concurrent.ForkJoinPool` and `java.util.concurrent.ForkJoinTask`
    provides a detailed explanation of why this type of pool isn’t suitable for I/O-bound
    operations.


    The parameters of a thread pool (especially its size) can significantly improve
    or diminish performance of parallel processing. It is important to understand
    the nature of concurrent tasks processed by a thread pool. Various considerations
    affect thread-pool configuration. For example, a developer needs to understand
    whether parallel tasks are CPU bound, I/O bound, or mixed.


    If we are dealing with CPU-bound operations, we want to keep the number of threads
    as close to the number of cores on the machine as possible. This avoids frequent
    switching between threads causing unnecessary overhead when there is enough processing
    to keep the CPU busy.


    If we are processing I/O-intensive operations, we generally want to have a larger
    number of threads available, because we don’t want the CPU to waste cycles on
    blocking I/O operations. But the number of threads can’t be too large, because
    the overhead of switching threads can decrease performance. Balance needs to be
    found.


    Balance needs to be found also for mixed types of processing. There isn’t any
    guidance for tuning configuration when I/O- and CPU-intensive operations are mixed
    within one thread pool. A developer may consider splitting the tasks into various
    threads if it helps. But such splitting doesn’t make sense for `ForkJoinPool`,
    because is it optimized toward the number of cores on the current machine. Therefore,
    we likely want to have only one instance of it reserved for processing CPU-intensive
    operations.


    Trying to guess the thread-pool configuration is impossible. It needs to be backed
    up by performance testing, or at least by benchmarking or micro-benchmarking of
    certain modules. Performance testing with the environment as close as possible
    to that experienced in production, and with a similar load as expected in production,
    will lead to more accurate results than benchmarking modules in isolation.


    ![Image](images/sq.jpg) **Note**  If you want to dive deeper into thread-pool
    sizing alongside other crucial aspects of thread pools, this article by Brian
    Goetz provides a short, decent introduction to this complicated topic: `www.ibm.com/developerworks/library/j-jtp0730/index.html`.


    Implementations of the `java.util.concurrent.Executor` interface effectively made
    the `java.lang.Threa``d` class obsolete, because they abstract out the need for
    low-level thread handling and provide the same flexibility.


    After all this theory, it’s time to show an example. See [Listing 1-6](#9781484207949_Ch01.xhtml#FPar8).


    [***Listing 1-6***](#9781484207949_Ch01.xhtml#_FPar8). Simple Asynchronous Task
    (0101-java-concurrency)


    ```

    package net.lkrnac.book.eiws.chapter01.javaconcurrency;

    import java.util.Random;

    import java.util.concurrent.Callable;

    public class SimpleTask implements Callable<String> {

      private static final int SIMULATE_IO = 1000;

      private final Random random = new Random();


    @Override

      public String call() throws Exception {

        Integer value = random.nextInt();

        String threadName = Thread.currentThread().getName();


    Thread.sleep(SIMULATE_IO);

        if (value % 2 == 0) {

          throw new UnsupportedOperationException(threadName + " threw exception");

        }

        return threadName + " generated number " + value;

      }

    }

    ```


    The class `SimpleTask` is our logic that should be executed concurrently. It implements
    the `java.util.concurrent.Callable` interface with the generic type `String` to
    specify a return value type passed from the concurrent logic to the caller thread.
    It also contains various statements that highlight these features of the `java.util.concurrent`
    package:


    *   Generates a random `value` to simulate an error in the form of `UnsupportedOperationException`
    thrown from the concurrent logic.

    *   Simulates a blocking I/O operation with `Thread.sleep(SIMULATE_IO)` call.
    It blocks concurrent logic for 1 second.

    *   Returns a `String` value in the case of success.


    *But notice that this mechanism doesn’t allow asynchronous code to accept parameters.*
    `SimpleTask` is called from the class shown in [Listing 1-7](#9781484207949_Ch01.xhtml#FPar9).


    [***Listing 1-7***](#9781484207949_Ch01.xhtml#_FPar9). Caller of Asynchronous
    Tasks (0101-java-concurrency)


    ```

    package net.lkrnac.book.eiws.chapter01.javaconcurrency;


    import java.util.ArrayList;

    import java.util.Collection;

    import java.util.concurrent.ExecutionException;

    import java.util.concurrent.ExecutorService;

    import java.util.concurrent.Future;

    import java.util.concurrent.TimeUnit;


    public class SimpleTaskExecutor {

      private final ExecutorService executorService;

      private final int execCount;


    public SimpleTaskExecutor(ExecutorService executorService, int execCount) {

        super();

        this.executorService = executorService;

        this.execCount = execCount;

      }


    public void executeTasks() throws InterruptedException {

        Collection<Future<String>> results = new ArrayList<>(execCount);

        long start = System.currentTimeMillis();

        SimpleTask task = new SimpleTask();

        for (int idx = 0; idx < execCount; idx++) {

          results.add(executorService.submit(task));

        }


    executorService.shutdown();

        executorService.awaitTermination(Integer.MAX_VALUE, TimeUnit.DAYS);


    results.forEach(result -> {

          try {

             System.out.println(result.get());

          } catch (InterruptedException | ExecutionException exception) {

             System.out.println(exception.getLocalizedMessage());

          }

        });

        System.out.println("Elapsed time: " + (System.currentTimeMillis() - start));

      }

    }

    ```'
  trans: '

    清单 1-3 中展示的最后两个工厂方法是在 Java SE 8 中引入的。它们使用 `java.util.concurrent.ForkJoinPool`
    作为底层线程池实现。该实现于 Java SE 7 中引入，采用了一种独特的线程间 CPU 负载分配算法，称为*工作窃取*。空闲线程可以从繁忙线程那里“窃取”工作，而不是静默等待。


    `Executors.newWorkStealingPool()` 会创建一个线程池，其大小等于当前运行机器的核心数。因此，它试图最有效地利用 CPU 能力，因为运行中的线程数超过核心数会导致频繁的上下文切换，而上下文切换并非无资源消耗的操作。但这种线程池不适合
    I/O 密集型处理。原因同样与线程数量有关。如果线程大部分时间都在等待 I/O 操作，并且池中没有其他线程能让 CPU 核心保持忙碌，那么大量的 CPU 周期就会浪费在等待上。对于此类
    I/O 密集型操作，一个更好的选择是固定线程池，其线程数大于可用核心数。更优的选择是缓存线程池。


    `Executors.newWorkStealingPool(int parallelism)` 创建的线程池不会考虑当前机器的核心数，而是根据给定的并行度级别来优化线程池。因此，池的大小会根据
    `parallelism` 指定的线程数进行优化。除非你是 `ForkJoinPool` 的熟练用户，否则请使用默认并行度，即等于可用核心数（使用不带 `parallelism`
    参数的 `Executors.newWorkStealingPool()`）。


    ![图片](img/sq.jpg) **注意**  fork/join 算法超出了本书的讨论范围。要熟悉该算法的特殊功能，Oracle 关于 fork/join
    池的教程提供了很好的解释：`http://docs.oracle.com/javase/tutorial/essential/concurrency/forkjoin.html`。`java.util.concurrent.ForkJoinPool`
    和 `java.util.concurrent.ForkJoinTask` 的 Javadoc 文档详细解释了为什么这种类型的池不适合 I/O 密集型操作。


    线程池的参数（尤其是其大小）可以显著提升或降低并行处理的性能。理解线程池所处理的并发任务的性质至关重要。各种考量因素都会影响线程池的配置。例如，开发人员需要了解并行任务是
    CPU 密集型、I/O 密集型还是混合型。


    如果处理的是 CPU 密集型操作，我们希望线程数尽可能接近机器的核心数。这可以避免在线程之间频繁切换，从而在 CPU 有足够处理任务保持忙碌时，减少不必要的开销。


    如果处理的是 I/O 密集型操作，我们通常希望有更多的可用线程，因为我们不希望 CPU 在阻塞的 I/O 操作上浪费周期。但线程数不能太多，因为线程切换的开销会降低性能。需要找到平衡点。


    对于混合类型的处理，同样需要找到平衡点。当 I/O 密集型和 CPU 密集型操作混合在同一个线程池中时，没有任何调整配置的指导原则。如果有助于解决问题，开发人员可以考虑将任务拆分到不同的线程中。但这种拆分对于
    `ForkJoinPool` 来说没有意义，因为它是针对当前机器的核心数进行优化的。因此，我们可能希望只保留一个实例用于处理 CPU 密集型操作。


    试图猜测线程池的配置是不可能的。它需要由性能测试来支撑，或者至少通过基准测试或对某些模块的微基准测试来验证。在尽可能接近生产环境且负载与预期生产负载相似的条件下进行性能测试，会比孤立地对模块进行基准测试得到更准确的结果。


    ![图片](img/sq.jpg) **注意**  如果你想更深入地了解线程池大小调整以及线程池的其他关键方面，Brian Goetz 的这篇文章对这个复杂主题提供了一个简短而恰当的介绍：`www.ibm.com/developerworks/library/j-jtp0730/index.html`。


    `java.util.concurrent.Executor` 接口的实现有效地使 `java.lang.Threa``d` 类过时了，因为它们抽象出了对底层线程处理的需求，并提供了相同的灵活性。


    在所有这些理论之后，是时候展示一个示例了。请参见清单 1-6。


    ***清单 1-6***. 简单异步任务 (0101-java-concurrency)


    ```

    package net.lkrnac.book.eiws.chapter01.javaconcurrency;

    import java.util.Random;

    import java.util.concurrent.Callable;

    public class SimpleTask implements Callable<String> {

      private static final int SIMULATE_IO = 1000;

      private final Random random = new Random();


    @Override

      public String call() throws Exception {

        Integer value = random.nextInt();

        String threadName = Thread.currentThread().getName();


    Thread.sleep(SIMULATE_IO);

        if (value % 2 == 0) {

          throw new UnsupportedOperationException(threadName + " threw exception");

        }

        return threadName + " generated number " + value;

      }

    }

    ```


    `SimpleTask` 类是我们的逻辑，它应该被并发执行。它实现了带有泛型类型 `String` 的 `java.util.concurrent.Callable`
    接口，以指定从并发逻辑传递到调用者线程的返回值类型。它还包含各种语句，以突出 `java.util.concurrent` 包的以下特性：


    *   生成一个随机的 `value`，以模拟从并发逻辑中抛出的 `UnsupportedOperationException` 形式的错误。

    *   通过调用 `Thread.sleep(SIMULATE_IO)` 模拟阻塞的 I/O 操作。它会使并发逻辑阻塞 1 秒钟。

    *   在成功的情况下返回一个 `String` 值。


    *但请注意，这种机制不允许异步代码接受参数。* `SimpleTask` 由清单 1-7 中所示的类调用。


    ***清单 1-7***. 异步任务的调用者 (0101-java-concurrency)


    ```

    package net.lkrnac.book.eiws.chapter01.javaconcurrency;


    import java.util.ArrayList;

    import java.util.Collection;

    import java.util.concurrent.ExecutionException;

    import java.util.concurrent.ExecutorService;

    import java.util.concurrent.Future;

    import java.util.concurrent.TimeUnit;


    public class SimpleTaskExecutor {

      private final ExecutorService executorService;

      private final int execCount;


    public SimpleTaskExecutor(ExecutorService executorService, int execCount) {

        super();

        this.executorService = executorService;

        this.execCount = execCount;

      }


    public void executeTasks() throws InterruptedException {

        Collection<Future<String>> results = new ArrayList<>(execCount);

        long start = System.currentTimeMillis();

        SimpleTask task = new SimpleTask();

        for (int idx = 0; idx < execCount; idx++) {

          results.add(executorService.submit(task));

        }


    executorService.shutdown();

        executorService.awaitTermination(Integer.MAX_VALUE, TimeUnit.DAYS);


    results.forEach(result -> {

          try {

             System.out.println(result.get());

          } catch (InterruptedException | ExecutionException exception) {

             System.out.println(exception.getLocalizedMessage());

          }

        });

        System.out.println("Elapsed time: " + (System.currentTimeMillis() - start));

      }

    }

    ```

