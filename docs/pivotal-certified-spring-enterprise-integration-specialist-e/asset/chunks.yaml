- fmt: "The first XML element specifies the generic inbound gateway. We need to define\
    \ the mandatory `default-request-channel`, which specifies the channel where inbound\
    \ messages will be passed in (in this case, `inChannel`). The `service-interface`\
    \ attribute is also mandatory and specifies the Java interface, which will be\
    \ used for hiding SI flow from caller. In this case, we use our common interface\
    \ `SiWrapperService`. Notice that when the request arrives to the gateway and\
    \ is converted into a message, a temporary reply channel is created for this message.\
    \ The gateway will be expecting a response message via this temporary reply channel.\n\
    \nMessages received by this gateway will be passed to the service activator endpoint,\
    \ which is mapped to the `writeService.writeAndIndicateSuccess()` method. This\
    \ method returns the result of the write operation; therefore, we are dealing\
    \ with bidirectional message flow. To send a reply message back to the gateway,\
    \ the temporary reply channel created for the request will be used automatically.\
    \ When a value is returned from `WriteService.writeAndIndicateSuccess()`, the\
    \ service activator converts this value into a reply message and sends it to the\
    \ temporary reply channel. The gateway receives this response message via the\
    \ temporary reply channel and converts it to a return value of the service interface\
    \ `SiWrapperService`.\n\n[Listing 8-28](#9781484207949_Ch08_1.xhtml#FPar31) shows\
    \ the main class of this application.\n\n[***Listing 8-28***](#9781484207949_Ch08_1.xhtml#_FPar31).\
    \ Main Class of Generic Messaging Gateway Example with XML Configuration (0808-gateway-generic-xml)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport lombok.extern.slf4j.Slf4j;\n\
    import net.lkrnac.book.eiws.chapter08.in.SiWrapperService;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
    import org.springframework.context.annotation.ImportResource;\n\n@Slf4j\n@SpringBootApplication\n\
    @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n \
    \ public static void main(String[] args) throws InterruptedException {\n    ApplicationContext\
    \ ctx = SpringApplication.run(SiApplication.class, args);\n\nSiWrapperService\
    \ wrapperService = ctx.getBean(SiWrapperService.class);\n    boolean result =\
    \ wrapperService.processText(\"simple message\");\n    log.info(\"Result: \" +\
    \ result);\n  }\n}\n```\n\nWe are dealing with a Spring Boot application that\
    \ scans for Spring beans. In this case, we need to have `WriteService` scanned.\
    \ `@ImportResource` includes your XML SI flow into this application context. `@Slf4j`\
    \ enables logging for this class. In the main method, we execute the Spring configuration\
    \ defined by this class. Remember this Spring configuration, because it will be\
    \ used alongside most subsequent examples, so we won’t need to explain it again\
    \ and again.\n\nAfter the Spring context with SI flow is up, we retrieve the `SiWrapperService`\
    \ bean from the Spring context. You may wonder where the implementation of this\
    \ interface is defined. So notice that the gateway defined in the XML configuration\
    \ represents the implementation of this interface. So by executing `wrapperService.processText()`,\
    \ we send a message to the gateway. After the reception of the response, we just\
    \ log it. Running this example results in the output shown in [Listing 8-29](#9781484207949_Ch08_1.xhtml#FPar32).\n\
    \n[***Listing 8-29***](#9781484207949_Ch08_1.xhtml#_FPar32). Output of XML Generic\
    \ Gateway Example\n\n```\n2015-08-23 17:43:26.798  INFO 21994 --- [          \
    \ main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted: simple message\n\
    2015-08-23 17:43:26.799  INFO 21994 --- [           main]\nn.l.book.eiws.chapter08.SiApplication\
    \    : Result: true\n```\n\nAs expected, the input message is logged in `WriteRepository`,\
    \ and the response of this operation is logged in the main class. Visualization\
