    `value`，以将其连接到消息通道 `inChannel`。


    因为我们还希望此组件处于活动状态（这意味着它将主动轮询带注解的方法），所以我们为此适配器配置了固定频率为 1 秒的 `@Poller`。此注解将在底层创建一个
