    package net.lkrnac.book.eiws.chapter08.in;

    import java.util.concurrent.Future;

    import java.util.concurrent.TimeUnit;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.scheduling.annotation.Async;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class AsyncMessageSender {

      private SiWrapperServiceFuture wrapperService;


    @Autowired

      public AsyncMessageSender(SiWrapperServiceFuture wrapperService) {

        super();

        this.wrapperService = wrapperService;

      }


    @Async("customExecutor")

      public void sendMessage(String message) throws Exception {

        Future<Boolean> resultFuture = wrapperService.processText(message);

        boolean result = resultFuture.get(1, TimeUnit.SECONDS);

        log.info("Result for " + message + ": " + result);

      }

    }

    ```


    This Spring bean injects `SiWrapperServiceFuture`, which is the service interface
    used in the gateway, and encapsulates SI flow. The `sendMessage()` method is annotated
    with `@Async`, so it will be executed in a separate thread when called. Notice
    that we use `customExecutor` as an annotation attribute, which specifies the name
    of the executor bean used to execute this asynchronous logic.


    In this method, we call the service interface to pass the message to the SI flow.
    The returned `resultFuture` is then used to wait for the resulting Boolean value
    that will eventually be returned. To be make sure it won’t stay hanging in the
    `resultFuture.get()` call forever, we configure a 1-second time-out for this operation.
    Finally, we log the returned result. [Listing 8-100](#9781484207949_Ch08_2_Ext.xhtml#FPar103)
    shows the main class of this example.


