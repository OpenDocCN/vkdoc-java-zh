  trans: "\n***清单 8-121***. 通道拦截器示例的输出\n\n```\n2015-08-30 20:05:00.379  INFO 24624\
    \ --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : Starting to\
    \ send messages...\n2015-08-30 20:05:00.390  INFO 24624 --- [           main]\n\
    n.l.b.eiws.chapter08.SimpleInterceptor   : Going to send message GenericMessage\n\
    [payload=message1, headers={id=a1f4c8ca-c227-3315-646c-e14820558db7, timestamp=1440961500390}]\n\
    to channel inChannel\n2015-08-30 20:05:00.391  INFO 24624 --- [           main]\n\
    n.l.b.eiws.chapter08.SimpleInterceptor   : Message GenericMessage [payload=message1,\n\
    headers={id=a1f4c8ca-c227-3315-646c-e14820558db7, timestamp=1440961500390}] was\
    \ successfully\nsend to channel inChannel\n2015-08-30 20:05:00.391  INFO 24624\
    \ --- [ask-scheduler-1]\nn.l.b.eiws.chapter08.SimpleInterceptor   : Message GenericMessage\
    \ [payload=message1,\nheaders={id=a1f4c8ca-c227-3315-646c-e14820558db7, timestamp=1440961500390}]\
    \ was successfully\nreceived to channel inChannel\n2015-08-30 20:05:00.392  INFO\
    \ 24624 --- [ask-scheduler-1]\nn.l.b.eiws.chapter08.SimpleInterceptor   : Message\
    \ GenericMessage [payload=message1,\nheaders={id=a1f4c8ca-c227-3315-646c-e14820558db7,\
    \ timestamp=1440961500390}] was received to\nchannel inChannel\n2015-08-30 20:05:00.392  INFO\
    \ 24624 --- [           main]\nn.l.b.eiws.chapter08.SimpleInterceptor   : Message\
    \ GenericMessage [payload=message1,\nheaders={id=a1f4c8ca-c227-3315-646c-e14820558db7,\
    \ timestamp=1440961500390}] was send to\nchannel inChannel\n2015-08-30 20:05:00.392  INFO\
    \ 24624 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : message1\
    \ sent\n...\n```\n\n我们只包含了一条消息的日志条目。第二条消息会有类似的日志条目。所有拦截点都被执行了，因为消费者需要对 `inChannel`\
    \ 进行轮询（显式执行 `AbstractPollableChannel.receive()`）。\n\n**线路窃听**\n\n*线路窃听*是最初的企业集成模式之一，实际上，它是一种特殊的拦截器。它会在不影响原始流程的情况下，将消息发送到另一个通道。这种行为对于监控和调试特别有用。\n\
    \n它可以按如下方式配置：\n\n*   *全局线路窃听*：可以配置为顶级 XML 元素 `<int:wire-tap>`。它可以指定要拦截的通道名称模式。\n\
    *   *本地线路窃听*：可以配置为通道的 `<int:interceptors>` 列表的一部分，并使用 `<int:wire-tap>` XML 子元素。\n\
    \n**线路窃听示例**\n\n清单 8-122 展示了 SI 配置。\n\n***清单 8-122***. 线路窃听示例的 SI 配置（示例项目 0835-channel-wire-tap-xml\
    \ 的 src/main/resources 文件夹中的文件 si-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
        http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
    net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:channel id=\"\
    inChannel\">\n    <int:interceptors>\n        <int:wire-tap channel=\"logChannel\"\
    />\n    </int:interceptors>\n  </int:channel>\n\n<int:outbound-channel-adapter\
    \ channel=\"inChannel\" ref=\"writeService\" method=\"write\"/>\n\n<int:channel\
    \ id=\"logChannel\"/>\n  <int:logging-channel-adapter channel=\"logChannel\" level=\"\
    INFO\"/>\n</beans>\n```\n\n`inChannel` 通道配置了拦截器列表，并且只配置了线路窃听。这个线路窃听将消息发送到 `logChannel`，该通道连接到了日志通道适配器。如果配置了正确的日志级别（本例中至少为\
    \ `INFO`），它将记录消息负载。\n\n主消息流不受影响，因此消息由具有服务接口 `SiWrapperServiceVoid` 的入站网关接收，并交给映射到\
    \ `WriteService.write()` 的出站通道适配器。\n\n我们再次借用 `0830-channel-priority-xml` 示例项目中清单\
    \ 8-111 的主类。运行它时，我们会得到清单 8-123 中的输出。\n\n***清单 8-123***. 线路窃听示例的输出\n\n```\n2015-08-30\
    \ 20:55:48.647  INFO 26516 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
    \ Starting to send messages...\n2015-08-30 20:55:48.656  INFO 26516 --- [          \
    \ main]\no.s.integration.handler.LoggingHandler   : message1\n2015-08-30 20:55:48.673  INFO\
    \ 26516 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text\
    \ persisted: message1\n2015-08-30 20:55:48.674  INFO 26516 --- [           main]\n\
    n.l.book.eiws.chapter08.SiApplication    : message1 sent\n2015-08-30 20:55:48.675  INFO\
    \ 26516 --- [           main]\no.s.integration.handler.LoggingHandler   : message2\n\
    2015-08-30 20:55:48.676  INFO 26516 --- [           main]\nn.l.b.e.chapter08.out.WriteRepository    :\
    \ Text persisted: message2\n2015-08-30 20:55:48.677  INFO 26516 --- [          \
    \ main]\nn.l.book.eiws.chapter08.SiApplication    : message2 sent\n```\n\n正如我们所料，主流程正确执行。此外，SI\
    \ 内部的 `LoggingHandler` 还记录了消息负载。\n\n**错误处理**\n\n可靠的错误处理是每个生产就绪应用程序的重要组成部分。SI 应用程序也不例外。因此，SI\
    \ 提供了多种机制来简化错误处理的实现。我们可以将这些机制划分如下：\n\n*   *同步错误处理*：当同步消息传递过程中发生错误时，该错误会被包装成 `org.springframework.messaging.MessageHandlingException`\
    \ 并传播回消息的发送方。\n*   *异步错误处理*\n    *   *单向流*：在异步交接的情况下，异常无法传播给发送方。因此，在这种情况下，SI 会从异常创建\
    \ `org.springframework.messaging.support.ErrorMessage`，并将此消息发送到合适的 `errorChannel`。\n\
    \    *   *双向流*：即使我们处理的是异步消息交接，错误也会传播给消息的发送方。\n\n我们提到，在单向异步消息流中抛出异常时，会使用 `errorChanel`\
    \ 来发送 `ErrorMessage`。但 SI 使我们能够以多种方式配置 `errorChannel`：\n"
- fmt: "*   *Message-specific error channel*: If a message has a specified header\
