    \ - Boil Water\n16:15:58.919 [main] INFO  o.s.batch.core.job.SimpleStepHandler\
    \ - Executing step: [addTeaStep]\n16:15:58.923 [main] INFO  n.l.b.e.c.step.SimpleExecutablePoint\
    \ - Add Tea\n16:15:58.956 [main] INFO  o.s.batch.core.job.SimpleStepHandler -\
    \ Executing step: [addWaterStep]\n16:15:58.959 [main] INFO  n.l.b.e.c.step.SimpleExecutablePoint\
    \ - Add Water\n16:15:58.974 [main] INFO  o.s.b.c.l.support.SimpleJobLauncher -\
    \ Job: [FlowJob: [name=prepareTeaJob]] completed with the following parameters:\
    \ [{}] and the following status: [COMPLETED]\n16:15:58.974 [main] INFO  n.l.b.e.chapter09.BatchApplication\
    \ - Exit Status: COMPLETED\n```\n\n## JobLauncher Example with Java Configuration\n\
    \n[Listing 9-26](#9781484207949_Ch09_1.xhtml#FPar29) shows the Java configuration\
    \ of the mandatory SB beans.\n\n[***Listing 9-26***](#9781484207949_Ch09_1.xhtml#_FPar29).\
    \ Java Configuration of JobLauncher Example (0907-job-launcher-javaconfig)\n\n\
    ```\npackage net.lkrnac.book.eiws.chapter09;\nimport org.springframework.batch.core.launch.JobLauncher;\n\
    import org.springframework.batch.core.launch.support.SimpleJobLauncher;\nimport\
    \ org.springframework.batch.core.repository.JobRepository;\nimport org.springframework.batch.core.repository.support.MapJobRepositoryFactoryBean;\n\
    import org.springframework.batch.support.transaction.ResourcelessTransactionManager;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.transaction.PlatformTransactionManager;\n\n@Configuration\n\
    public class BatchBeansConfiguration {\n  @Bean\n  public PlatformTransactionManager\
    \ transactionManager() {\n    return new ResourcelessTransactionManager();\n \
    \ }\n\n@Bean\n  public JobRepository jobRepository(PlatformTransactionManager\
    \ transactionManager)\n      throws Exception {\n    return new MapJobRepositoryFactoryBean(transactionManager).getObject();\n\
    \  }\n\n@Bean\n  public JobLauncher jobLauncher(JobRepository jobRepository) {\n\
    \    SimpleJobLauncher simpleJobLauncher = new SimpleJobLauncher();\n    simpleJobLauncher.setJobRepository(jobRepository);\n\
    \    return simpleJobLauncher;\n  }\n}\n```\n\nReaders familiar with Spring Core\
    \ features shouldn’t be surprised. This Java configuration is the exact mirror\
