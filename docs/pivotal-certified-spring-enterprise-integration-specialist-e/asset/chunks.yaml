    \  }\n}\n```\n\n与清单 3-37 中的服务器端测试示例类似，这里使用 TestNG 作为测试框架。该测试使用 `WsBootClientConfiguration`\
    \ 作为被测配置。为了创建模拟服务器，我们需要自动注入一个 `WebServiceTemplate` 实例。然后，我们记录客户端预期的请求以及模拟服务器提供的响应。\n\
    \n测试客户端实例是从 Spring 测试配置中注入的。我们像从客户端应用程序中那样执行客户端调用。在验证阶段，我们需要验证客户端是否正确表示了来自模拟服务器的响应。最后但同样重要的是，我们需要验证从测试客户端发送到模拟服务器的请求是否正确。这是通过模拟服务器实例上一个名为\
    \ `verify` 的方法完成的。\n\n总结\n\n在本章中，我们简要比较了创建 Web 服务和分布式应用的概念，以及与服务解耦相比远程技术所带来的优势。然后，我们介绍了可以集成到\
    \ Spring 生态系统中的 XML 编组技术。\n\n我们还探讨了使用 Spring Web Services 项目构建 Web 服务时“契约优先”方法的好处。这种方法有助于抽象掉开发\
    \ Web 服务的复杂性，并通过提供 API 在现有库和协议之上遵循最佳实践，使其更易于上手。它使我们能够创建基于 SOAP 的 Web 服务，这些服务可以通过\
    \ HTTP、JMS、电子邮件和 XMPP 传输协议进行通信。\n\n我们展示了如何基于通信需求来最优地开始开发 Web 服务契约。消息负载是生成 XSD\
    \ 契约草案的起点。随后，可以基于此契约生成 JAXB 2 Java 模型。我们还介绍了如何使用 XML 和 Java 上下文来配置容器环境和 Spring\
    \ 配置。\n\n路由 Web 服务消息是使用 Spring 进行高效开发的支柱。我们可以受益于基于负载根元素、WS-Addressing 和 `SOAPAction`\
    \ 头的路由。\n\n客户端支持是 Spring 产品的重要组成部分，因为它允许我们从 XSD 契约生成 Java 模型。最后，本章解释了如何拦截和处理错误，以及如何更有效地隔离测试\
    \ Spring 配置。\n\n第 4 章\n\n![image](img/frontdot.jpg)\n\nRESTful Web 服务\n\n本章将解释征服企业集成世界的原则。它关乎表述性状态转移，即\
    \ REST。\n\n分布式系统的演进并未止步于远程技术和 Web 服务。SOAP 实现了高度解耦，解决了远程技术的一个主要问题。作为远程技术的后继者，SOAP\
    \ Web 服务被大型企业公司所采用。由于 SOAP Web 服务依赖于契约，分布式开发团队之间的协作得到了加强。一个定义良好的 XSD/WSDL 契约有助于避免歧义，或改善客户端和服务器端开发者之间沟通不畅的问题。\n\
    \n但一段时间后，许多人开始遇到 SOAP Web 服务的问题。首先，开发 SOAP Web 服务并非易事。SOAP 的复杂性开始成为开发企业应用越来越大的瓶颈。即使\
    \ SOAP 为复杂需求提供了丰富的可能性，但在大多数情况下，它被证明是过度设计的。这拖慢了开发速度，并使维护成本更高。\n\n传统 Web 服务另一个备受批评的方面是其依赖的\
    \ XML 负载。即使计算能力每隔几年就成倍增长，用户也开始期望越来越低的延迟。但 XML 是冗长的，而 SOAP 完全依赖于 XML 交换格式。因此，当轻量级交换格式开始涌现（最著名的是\
    \ JSON）时，SOAP 无法利用它们。\n\n与 SOAP Web 服务路线并行，另一种不同的 Web 服务开发学派也在演进。这种方法就是 REST（它只比\
    \ SOAP 年轻两岁）。尽管 SOAP 在开始时获得了更广泛的采用，但人们开始意识到 REST 拥有更多优势。\n"
- fmt: '# REST 的起源与原则


    REST 诞生于 Roy Fielding 的博士论文《Architectural Styles and the Design of Network-Based
    Software Architectures》。他在论文中基于超文本传输协议（HTTP）为分布式计算定义了一些架构概念，并为这些概念创造了一个新术语：表述性状态转移（Representational
    State Transfer，REST）。


    根据定义，REST 运行于 HTTP 之上。事实上，它将 HTTP 提升为一种应用协议——这与 SOAP 形成对比，后者仅将 HTTP 用作传输协议。SOAP
    框架在底层使用 HTTP 来传输 SOAP 消息。SOAP 开发者无需了解 HTTP 的特性，因为他们使用的是更高层次的 SOAP 抽象。而 REST 则使用
    HTTP 编程模型；开发者需要实现 HTTP，因为它驱动着客户端与服务器之间的通信契约。


    但 **REST 并非一种协议**；它是一组架构概念。因此，这些概念也可以用于其他非 HTTP 协议。


    REST 之所以流行，是因为它比 SOAP 轻量得多。它不涉及严格的契约。没有严格的规则，开发者有更多空间来满足业务需求。同时，他们面对的是更简单的编程模型，因为
    REST 不依赖模式（schema）。


    第二个主要优势是能够运行在各种交换格式之上。REST 可以利用一些轻量级的 XML 替代方案。目前非常流行的一种是 JavaScript 对象表示法（JSON），由
    Douglas Crockford 发明。顾名思义，它最初是为 JavaScript 语言创建的。但其简洁性和轻量级特性迅速在所有主流编程平台上流行起来。


    随着时间的推移，在大多数情况下，REST 显然比 SOAP 更优。如今，REST 是明显的赢家。然而，在某些情况下，使用 SOAP 仍然完全合理。例如，当需要状态性或事务时，SOAP
    可能比 REST 更合适。请记住，SOAP 和 REST 并非对立面。它们各自适用于不同的场景。


    ## REST 原则


    如前所述，Roy Fielding 在其博士论文中正式定义了 REST。这种架构风格使用以下原则来简化分布式系统的开发和运维。


    ### 客户端/服务器分离


    REST 的基本原则是解耦客户端/服务器通信，并将它们的关注点分离成可管理的一组需求。例如，客户端应专门负责表示层。服务器的关注点包括持久化数据以及向客户端隐藏持久化细节。当通过统一接口进行通信时，通信的任何一方都可以被替换。例如，你可以替换服务器上的持久化存储类型而不影响客户端。或者，你可以替换客户端的渲染引擎而不影响服务器。这显著增强了企业系统的模块化。


    ### CRUD 操作


    大多数 SOAP 服务对资源执行操作（例如，预订航班）。因此，这些服务被设计为以动词为中心：资源类型（名词）和操作类型（动词）对于客户端和服务器之间的契约都很重要。


    Roy Fielding 决定为 REST Web 服务简化这种以动词为中心的方法。他认识到我们主要想执行创建、读取、更新和删除（CRUD）操作。而所有这些操作都已包含在他参与创建的
    HTTP 中：`GET`、`POST`、`PUT` 和 `DELETE`。因此，他显著简化了 Web 服务的一个维度，因为去除了设计动词的需要。这使得设计
    REST 服务更加容易，因为我们只需要识别系统中的资源（或名词）。操作已由 CRUD 操作定义。


    ### 统一接口


    在我们的应用程序中识别资源（或领域模型）并通过一组固定的操作来暴露它们，就创建了一个**统一接口**。对资源（领域模型）的操作通过 HTTP 定义良好的操作来完成。为了能够操作一个资源，它必须有一个唯一的标识符（例如，URI）。不仅资源本身需要可识别，特定资源的实例也需要可识别。Fielding
    还进一步规定，关于资源的消息必须包含操作该资源所需的所有信息，无论之前是否有关于该资源的任何消息。因此，消息应包含在资源实例上执行任何 CRUD 操作所需的所有信息。


    ![Image](images/sq.jpg) **注意** 理解统一资源标识符（URI）和统一资源定位符（URL）之间的区别很重要。URI 是用于标识资源的文本表示（例如，`http://lkrnac.net/about`、`../../file.txt`、`file.txt`
    和 `/users`）。URL 指定了资源在网络上的位置（例如，`http://lkrnac.net/about`）。因此，URL 也是一种 URI，但反之则不然。换句话说，URL
    是一种特殊类型的 URI。


    ### 无状态性


    另一个关键的 REST 原则是严格的无状态性。服务器不会将会话中关于客户端的任何信息存储起来。我们通过在每次请求中包含所有需要的用户特定数据来弥补服务器上状态的缺失。这简化了服务器端的实现，因为服务器不需要为所有连接的客户端在内存中保持状态。避免长时间存在的会话也节省了大量服务器资源，因为服务请求所需的所有对象都可以在响应发送回服务器后立即释放。这是
    REST 通信的一个小缺点，因为将所有状态转换信息从客户端发送到服务器再返回，会增加网络带宽消耗。


    每个请求还必须包含执行身份验证或授权所需的数据。由于服务器对客户端及其状态一无所知，客户端必须在每个请求中满足授权或身份验证约束。另一方面，有状态通信通常通过在身份验证后生成会话令牌来实现。如果此令牌被攻击者窃取，它可以在有限的时间内被滥用，直到会话关闭或超时。但在无状态通信中，身份验证凭据或授权令牌不会在短时间内过期。攻击者有更宽的时间窗口来实施严重攻击。这是
    REST 通信的一个轻微安全缺陷，也说明了使用加密的 HTTPS 协议而非普通 HTTP 是多么关键。


    状态不仅消耗服务器上的资源（正如 Roy Fielding 在其博士论文中所述），还会使集群变得复杂。当用户会话不存储在任何服务器节点中时，用户请求被路由到哪个服务器节点就无关紧要了，因为任何节点都可以处理该请求。因此，Web
    服务的无状态特性如今已成为主要要求之一。


    为了了解应用程序中的状态如何使集群复杂化，让我们考虑 [图 4-1](#9781484207949_Ch04.xhtml#Fig1) 中的场景。


    ![9781484207949_Fig04-01.jpg](images/9781484207949_Fig04-01.jpg)


    [图 4-1](#9781484207949_Ch04.xhtml#_Fig1). 有状态应用程序的集群问题示例'
  raw: 'REST was born in a dissertation by Roy Fielding named “Architectural Styles
    and the Design of Network-Based Software Architectures.” He codified a few architectural
    concepts for distributed computing based on the Hypertext Transfer Protocol and
    defined a new term for these concepts: Representational State Transfer (REST).


    By definition, REST operates over HTTP. In fact, it promotes HTTP as an application
    protocol—as opposed to SOAP, which uses HTTP as a transport protocol only. The
    SOAP framework uses HTTP under the hood to transfer SOAP messages. A SOAP developer
    doesn’t need to know about HTTP features, because that developer is using higher-level
    SOAP abstractions. REST uses an HTTP programming model, on the other hand; the
    developer needs to implement HTTP, because it drives the communication contract
    between the client and the server.


    But *REST is not a protocol*; it’s a set of architectural concepts. Therefore,
    these concepts can be used with other non-HTTP protocols.


    REST gained popularity because it’s much more lightweight than SOAP. No strict
    contract is involved. Without strict rules, developers have more space to fulfill
    business requirements. At the same time, they are dealing with a simpler programming
    model, because REST doesn’t rely on schema.


    A second big advantage is the ability to operate on top of various exchange formats.
    REST can take advantage of some lightweight XML alternatives. An extremely popular
    one nowadays is JavaScript Object Notation (JSON), invented by Douglas Crockford.
    As its name suggests, it was created primarily for the JavaScript language. But
    its simplicity and lightweight aspects quickly became popular across all major
    programming platforms.


    Over time, it became clear that REST is a better approach than SOAP in most cases.
    Today, REST is the obvious winner. However, in some cases, using SOAP still makes
    perfect sense. For example, a need for statefulness or transactions would probably
    shift SOAP into a better position than REST. Keep in mind that SOAP and REST are
    not opposites. Each is useful in different cases.


    REST Principles


    As noted previously, Roy Fielding codified REST in his dissertation. This architectural
    style uses the following principles to simplify the development and operation
    of distributed systems.


    Client/Server Separation


    REST’s basic principle is the decoupling of client/server communication and the
    separation of their concerns into manageable sets of requirements. For example,
    the client should be exclusively responsible for the presentation layer. Server
    concerns include persisting data and hiding persistence details from the client.
    When communication occurs via a unified interface, any side of the communication
    can be replaced. For example, you can replace the persistence storage type on
    the server without affecting the client side. Or you can replace the rendering
    engine on the client without affecting the server. This significantly enhances
    the modularity of an enterprise system.


    CRUD Operations


    Most SOAP services perform actions on top of resources (for example, booking a
    flight). So these services are designed to be verb-centric: both the type of resource
    (noun) and the type of action (verb) are important for the contract between the
    client and server.


    Roy Fielding decided to simplify this verb-centric approach for REST web services.
    He recognized that we want to perform mostly create, read, update, and delete
    (CRUD) actions. And all of these are already contained in the Hypertext Transfer
    Protocol he helped to create: `GET`, `POST`, `PUT`, and `DELETE`. So he significantly
    simplified one dimension of the web services space because he removed the need
    to design verbs. This makes designing REST services easier, because we need to
    identify only the resources (or nouns) in our system. Actions are already defined
    by CRUD operations.


    Uniform Interface


    Identifying resources (or a domain model) within our application and exposing
    them via a constant set of actions creates a *uniform interface*. Manipulation
    of resources (the domain model) is done via the well-defined operations of HTTP.
    To be able to manipulate a resource, it has to have a unique identifier (for example,
    a URI). Not only does the resource itself need to be identifiable, but also the
    instance of certain resources. Fielding also goes further and specifies that messages
    about the resource need to contain all the information needed to manipulate the
    resource, regardless of any previous messages about it. So messages should contain
    all the information needed to perform any of the CRUD operations on top of the
    resource instance.


    ![Image](images/sq.jpg) **Note**  It is important to understand the difference
    between a uniform resource identifier (URI) and a uniform resource locator (URL).
    A URI is a text representation used to identify a resource (examples include `http://lkrnac.net/about`,
    `../../file.txt`, `file.txt`, and `/users`). A URL specifies the location of a
    resource on the network (for example, `http://lkrnac.net/about`). So a URL is
    also a URI, but not the other way around. In other words, a URL is a special type
    of URI.


    Statelessness


    Another crucial REST principle is strict *statelessness*. The server doesn’t store
    any information about clients in sessions. We compensate for this lack of state
    on the server by including all needed user-specific data for each request. This
    simplifies implementation on the server side, because the server doesn’t need
    to hold state in memory for all connected clients. Avoiding longer-lived sessions
    also saves a lot of server resources, because all objects needed to serve the
    request can be released immediately after the response is sent back to the server.
    This is a slight downside of REST communication, because sending all state transition
    information from the client to the server and back increases network bandwidth
    consumption.


    Each request also has to contain data to perform authentication or authorization.
    Because the server doesn’t know anything about the clients and their state, the
    client must fulfill authorization or authentication constraints in each request.
    On the other side, stateful communication is mostly implemented by generating
    session tokens after authentication occurs. If this token is stolen by an attacker,
    it can be abused for a limited amount of time, until the session is closed or
    times out. But with stateless communication, authentication credentials or authorization
    tokens don’t expire in a short amount of time. The attacker has a wider window
    for performing serious attacks. This is a slight security downside of REST communication
    and shows how crucial it is to use encrypted HTTPS protocols instead of plain
    HTTP.


    State not only consumes resources on the server (as Roy Fielding described in
    his dissertation), but also complicates clustering. When a user session isn’t
    stored in any of the server nodes, it doesn’t really matter to which server node
    user requests are routed, because any node can serve the request. Therefore, the
    stateless nature of web services is nowadays one of the main requirements.


    To see how the presence of state in an application can complicate clustering,
    let’s consider the scenario in [Figure 4-1](#9781484207949_Ch04.xhtml#Fig1).


    ![9781484207949_Fig04-01.jpg](images/9781484207949_Fig04-01.jpg)


    [Figure 4-1](#9781484207949_Ch04.xhtml#_Fig1). Example of clustering problems
    with stateful application'
