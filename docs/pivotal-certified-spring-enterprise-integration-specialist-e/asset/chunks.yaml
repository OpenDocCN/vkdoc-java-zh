    传输层


    有多种方式可以为 Spring Web 服务配置传输层。每种传输协议都需要注册特定的 Spring 抽象。


    HTTP/HTTPS


    首先，是 Servlet 容器：


    *   `MessageDispatcherServlet`：这是最简单且最常用的机制。

    *   `DispatcherServlet`：当我们需要在 REST 或 Spring MVC 端点之外同时提供 SOAP 端点时，此 Servlet 非常有用。`WebServiceMessageReceiverHandlerAdapter`
    和 `RequestMappingHandlerAdapter` 在 Web 服务端点和 `DispatcherServlet` 之间建立了一座桥梁。


    另外，还有简单的 HTTP 服务器，其接收器如下：


    *   `SoapMessageDispatcher`

    *   `SimpleHttpServerFactoryBean`

    *   `SoapMessageDispatcher`


    JMS


    使用 JMS 时，我们使用以下组件：


    *   `SoapMessageDispatcher`

    *   `ActiveMQConnectionFactory`

    *   `DefaultMessageListenerContainer`


    电子邮件


    使用电子邮件时，我们使用以下组件：


    *   `SoapMessageDispatcher`

    *   `MailMessageReceiver`


    XMPP


    使用 XMPP 时，我们使用以下组件：


    *   `SoapMessageDispatcher`

    *   `XmppConnectionFactoryBean`

    *   `XmppMessageReceiver`


    正如你可能注意到的，对于非 Servlet 传输，有一些常见的 Bean 类型：


    *   消息工厂

    *   消息分发器

    *   消息接收器

    *   连接工厂（XMPP、JMS）


    ![Image](img/sq.jpg) **注意**  非 Servlet 传输配置的详细信息不在 Spring 企业集成认证的考察范围内。因此，我们只关注
    `MessageDispatcherServlet`。关于非 Servlet Web 服务传输的配置信息，可以在 Spring Web 服务参考文档中找到。


    Servlet 传输


    请记住，`MessageDispatcherServlet` 和 `DispatcherServlet` 是不同的 Servlet 实现。一个服务于 SOAP
    端点，另一个服务于 MVC 或 REST 端点。在 Spring 应用程序中配置 `MessageDispatcherServlet` 可以通过多种方式完成。如今的
    Spring 框架和 Spring Boot 项目提供了各种 Servlet 描述符包装器，以简化 Web 容器配置。清单 3-16 展示了 `web.xml`
    文件中经典的基于 XML 的 Servlet 描述符配置。

    '
- fmt: '[***Listing 3-16***](#9781484207949_Ch03.xhtml#_FPar21). XML Servlet Descriptor
    Configuration with `MessageDispatcherServlet` (0301-ws-xmlconfig-client)


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <web-app xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://xmlns.jcp.org/xml/ns/javaee"

      xsi:schemaLocation="http://java.sun.com/xml/ns/javaee

        http://java.sun.com/xml/ns/javaee/web-app.xsd">

      <display-name>0301-ws-xmlconfig-service</display-name>

      <servlet>

        <servlet-name>web-service</servlet-name>

        <servlet-class>org.springframework.ws.transport.http.MessageDispatcherServlet

        </servlet-class>

        <init-param>

          <param-name>contextConfigLocation</param-name>

          <param-value>classpath:web-service-config.xml</param-value>

        </init-param>

        <init-param>

          <param-name>transformWsdlLocations</param-name>

          <param-value>true</param-value>

        </init-param>

        <load-on-startup>1</load-on-startup>

      </servlet>

      <servlet-mapping>

        <servlet-name>web-service</servlet-name>

        <url-pattern>/*</url-pattern>

      </servlet-mapping>

    </web-app>

    ```


    This servlet configuration is pretty common. `MessageDispatcherServlet` is used
    as a servlet class. If we didn’t specify the `contextConfigurationLocation` parameter,
    Spring would try to find the Spring configuration in the file `{servlet-name}-servlet.xml`.
    But in this case, we used the explicit approach with the `web-service-config.xml`
    context configuration from the classpath (located in the directory `src/main/resources`).


    The parameter `transformWsdlLocations` is `false` by default. If it’s `true`,
    Spring treats the `location` element in the WSDL as a relative address and transforms
    the WSDL `location` element according to the URL received from the client. So
    by default Spring does not do this transformation, and the WSDL `location` element
    is hard-coded. But hard-coding is not suitable for professional software development,
    in which the same application artifact is promoted to various environments (for
    example, development, QA, performance, and production environments). So we want
    to have `transformWsdlLocations` configured to `true` nearly always.


    [Listing 3-16](#9781484207949_Ch03.xhtml#FPar21) includes two remaining elements
    of servlet configuration. The `load-on-startup` configuration tells the servlet
    container that we don’t want to use the lazy initialization feature. So our servlet
    is initialized at the start of the servlet container. Otherwise, the servlet would
    be initialized when the first request arrives. Finally, the `servlet-mapping`
    element specifies the relative root URL of the servlet.


    In the Java world, a big shift is occurring from XML configuration toward annotations.
    The Spring Web Services project is no exception in this field. Enhanced support
    for Servlet 3.0 Java configuration was introduced in version 2.2.


    The example in [Listing 3-17](#9781484207949_Ch03.xhtml#FPar22) has a similar
    effect as the `web.xml` configuration in [Listing 3-16](#9781484207949_Ch03.xhtml#FPar21).


    [***Listing 3-17***](#9781484207949_Ch03.xhtml#_FPar22). Java Servlet Descriptor
    Configuration with `MessageDispatcherServlet` (0302-ws-javaconfig-service)


    ```java

    package net.lkrnac.book.eiws.chapter03.ws.javaconfig.server;


    import org.springframework.ws.transport.http.support.

             AbstractAnnotationConfigMessageDispatcherServletInitializer;


    public class WsServletinitializer extends

      AbstractAnnotationConfigMessageDispatcherServletInitializer {


    @Override

      protected Class<?>[] getRootConfigClasses() {

        return null;

      }


    @Override

      protected Class<?>[] getServletConfigClasses() {

        return new Class[] { ServerConfiguration.class };

      }

      @Override

      protected String[] getServletMappings() {

        return new String[] { "/*" };

      }

    }

    ```


    The `AbstractAnnotationConfigMessageDispatcherServletInitializer` class is an
    abstract implementation of `WebApplicationInitializer`, which is the interface
    helping with programmatic servlet configuration in the Spring world. Spring automatically
    seeks `WebApplicationInitializer` implementations if a servlet container is in
    the classpath.


    `MessageDispatcherServlet` is configured by Spring under the hood when the `AbstractAnnotationConfigMessageDispatcherServletInitializer`
    implementation is detected in the classpath. The Spring servlet context configuration
    is defined in the `ServerConfiguration` class, which uses the `@Configuration`
    annotation to define a Java-based Spring context. We don’t need the root Spring
    context for this example, so we can return `null` from `getRootConfigClasses()`.
    The last piece of this servlet configuration is the servlet URL mapping, which
    defines the relative address where the servlet will be located. But the default
    `AbstractAnnotationConfigMessageDispatcherServletInitializer` uses the `/services`
    value defined in one of the servlet initializer parent classes. Our example uses
    `/*`.


    [Listing 3-17](#9781484207949_Ch03.xhtml#FPar22) highlights a relatively new approach
    for Spring Web Services servlet configuration. But an even more modern approach
    introduced by the Spring Boot project is shown in [Listing 3-18](#9781484207949_Ch03.xhtml#FPar23).


    [***Listing 3-18***](#9781484207949_Ch03.xhtml#_FPar23). Servlet Registration
    with Spring Boot (0303-ws-boot-service)


    ```java

    package net.lkrnac.book.eiws.chapter03.ws.boot.server;


    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.boot.context.embedded.ServletRegistrationBean;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ws.config.annotation.EnableWs;

    import org.springframework.ws.transport.http.MessageDispatcherServlet;

    import org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;


    @EnableWs

    @Configuration

    @ComponentScan

    @EnableAutoConfiguration

    public class ServerConfiguration {

      public static final String NAMESPACE =

          "http://localhost:10303/0303-ws-boot-service";


    @Bean

      public SimpleWsdl11Definition userDetails() {

        return new SimpleWsdl11Definition(new ClassPathResource("userDetails.wsdl"));

      }


    @Bean

      public ServletRegistrationBean dispatcherServlet(

          ApplicationContext applicationContext) {

        MessageDispatcherServlet servlet = new MessageDispatcherServlet();

        servlet.setApplicationContext(applicationContext);

        servlet.setTransformWsdlLocations(true);

        return new ServletRegistrationBean(servlet, "/*");

      }

    }

    ```


    The `@ComponentScan`, `@Configuration` annotation should already be familiar.
    This Spring configuration class scans the current package and subpackages for
    Spring components. `@EnableWs` turns on Spring Web Services support.


    One additional annotation is `@EnableAutoConfiguration`. It’s one line, but its
    impact is very big. Spring Boot takes a look at the set of dependencies used by
    our application and guesses the desired Spring configuration based on it. It creates
    a few default beans out of the box. In this case, we need it for autoconfiguration
    of the embedded servlet container.'
