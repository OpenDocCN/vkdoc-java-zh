    引言


    Java 凭借其坚如磐石的 JVM，在企业级世界中占据主导地位。Spring 是分布式系统中使用的主要 Java 平台。理解 Spring 产品组合对于企业级
    Java 开发者至关重要。市场对 Spring 技能的需求正在急剧增长。


    本书涵盖了 Spring 产品组合为企业级开发提供的所有主要特性，并为你准备 Pivotal 认证的企业集成专家（Spring）考试。当你获得 Pivotal
    认证时，你将拥有 Java 领域最有价值的证书之一。


    涵盖的考试主题包括：任务与调度、远程调用、Spring Web Services 框架、基于 Spring MVC 的 RESTful 服务、Spring
    JMS 模块、基于 Spring 的 JMS 和 JTA 事务，以及使用 Spring Batch 和 Spring Integration 框架进行批处理。本书通过解释示例并聚焦于主要的架构考量和概念来涵盖这些内容。示例是本书篇幅的最大贡献者，并在
    GitHub 上开源（`https://github.com/lkrnac/book-eiws-code-samples`）。


    本书的一个重要方面是关注 Spring 框架提供的新颖和现代的抽象。因此，大多数特性都通过 Java 注解（如果存在）以及传统的 XML 配置来展示。大多数示例也基于
    Spring Boot 框架。由于 Spring Boot 能够根据合理的默认配置显著简化 Spring 配置，其采用率呈指数级增长。但 Spring Boot
    并非考试目标，因此所有特性也通过纯 Spring 配置示例进行了介绍。


    你将学到什么


    本书涵盖以下主题：


    *   如何使用 Spring 创建并发应用程序和调度任务

    *   如何进行远程调用以实现客户端/服务器应用程序

    *   如何使用 Spring Web Services 创建松耦合的 Web 服务和客户端

    *   如何使用 Spring MVC 创建 RESTful Web 服务和客户端

    *   如何集成 JMS 以实现基于异步消息传递的通信

    *   如何在 Spring 中使用本地 JMS 事务

    *   如何在 Spring 中配置全局 JTA 事务

    *   如何使用 Spring Integration 创建事件驱动的管道-过滤器架构并与外部应用程序集成

    *   如何使用 Spring Batch 进行基于自定义和内置处理组件的、可管理的、可扩展的批处理


    本书读者对象


    本书面向具有 Spring 框架编程和开发经验的开发者和架构师。理解 Java 是阅读本书的必要条件，同时还需要了解依赖注入模式和 Spring 的控制反转容器特性。考试所需的所有其他特性都将从零开始讲解，重点在于让初学者也能理解，同时为中级和专家级读者提供有价值的材料。


