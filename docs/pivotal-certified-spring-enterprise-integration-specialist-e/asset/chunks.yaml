    使用发布/订阅 JMS 模型


    在本章开头，我们提到了一种向多个订阅者发送消息的通信范式。到目前为止，示例中尚未涵盖这一重要的 JMS 抽象概念。接下来的示例将弥补这一点。


    首先介绍的是用于委托接收消息的服务类，如清单 5-49 所示。


    ***清单 5-49***. PubSubService (0515-publish-subscribe-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.pubsub;


    import lombok.extern.slf4j.Slf4j;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class PubSubService {

      public void handleMessage(int listenerId, String message) {

        log.info("Message Received: {} via listener {}", message, listenerId);

      }

    }

    ```


    该服务会记录接收到的消息以及接收该消息的监听器 ID。清单 5-50 展示了本例中使用的监听器。


    ***清单 5-50***. 发布/订阅的监听器 (0515-publish-subscribe-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.pubsub;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageListener1 {

      private PubSubService pubSubService;


    @Autowired

      public SimpleMessageListener1(PubSubService pubSubService) {

        super();

        this.pubSubService = pubSubService;

      }


    @JmsListener(destination = "simpleTopic")

      public void readMessage(String message) {

        pubSubService.processText(1, message);

      }

    }

    ```


    `SimpleMessageListener1` 看起来与我们之前见过的监听器类似。但请注意，这里使用的 JMS 目的地名称为 `simpleTopic`。在下一节中，你将看到如何配置这种类型为
    `javax.jms.Topic` 的 JMS 目的地。


    与本章其他监听器最明显的区别在于类名中的数字。这是有意为之的；为了演示两个监听器接收同一条消息，本例项目中包含了两个监听器。为保持示例简洁并缩短清单长度，第二个监听器命名为
    `SimpleMessageListener2`，它是 `SimpleMessageListener1` 的精确副本，仅将 `1` 改为 `2`。

