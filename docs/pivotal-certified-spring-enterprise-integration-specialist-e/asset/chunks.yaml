    Bean 的名称可用作消息端点配置中的通道名称。


    PriorityChannel 示例


    此示例实现了我们自己的比较器，用于在 `PriorityChannel` 中对消息进行排序。这是一个基于 XML 的配置。清单 8-109 显示了比较器的实现。


    ***清单 8-109***. PriorityChannel 示例的比较器 (0830-channel-priority-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import java.util.Comparator;

    import org.springframework.messaging.Message;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageComparator implements Comparator<Message<String>> {

      @Override

      public int compare(Message<String> o1, Message<String> o2) {

        return -1 * o1.getPayload().compareTo(o2.getPayload());

      }

    }

    ```


    这里值得记住 `Comparator<T>.compare()` 的约定。比较器将根据返回的负整数/零/正整数来决定 `o1` 与 `o2` 相比是小于/等于/大于。较小的对象将首先从通道中被消费。


    在这种情况下，我们对 `String` 消息负载使用反向自然排序。`String` 的自然排序是按字母顺序。因此，如果我们的消息应该按反向字母顺序从通道中被消费，我们就使用这个比较器。清单
    8-110 显示了 XML SI 配置。

