    or JMS servers.


    Understanding Distributed Transactions


    So let’s say we have a PostgreSQL database and HornetQ JMS server. When we distribute
    the transaction on top of these stores, we can start reading messages from the
    HornetQ JMS destination and start inserting them via JDBC into the PostgreSQL
    storage. If one of the insert statements fails, we can be sure that our messages
    won’t get lost, because the transaction manager will ensure that the JMS operations
    performed in this global transaction are rolled back.


    As you can imagine, this support is not trivial to implement; various mechanisms
    need to be in place for distributed transactions to be possible. First, a special
    *global transaction manager* needs to coordinate the distributed transaction across
    various transactional stores. This transaction manager needs to conform to the
    *Java Transaction API (JTA)*. This API defines mechanisms for distributed transaction
    demarcation.


    We also need to make sure that each store involved in the global transaction supports
    the *XA standard* (eXtended Architecture standard). This standard was developed
    by The Open Group (formerly X/Open), a consortium of several member organizations
    specializing in open Unix system standards (`www.opengroup.org`).


    The XA standard specifies an *interface between the global and local transaction
    managers* to be able to participate in an ACID global transaction. An XA-compliant
    local transaction manager needs to have a JTA-compliant global transaction manager
    to cooperate with. You can think of XA as bridge between the local transaction
    manager (the manager handling transactions for a single data source) and the JTA
    global transaction manager (the manager coordinating local managers to cooperate
    in a global transaction). So, long story short, *XA needs JTA* in order to work
    properly. Cooperation between these standards is ensured via a *two-phase commit
    algorithm/protocol*, which works in the following phases:'
