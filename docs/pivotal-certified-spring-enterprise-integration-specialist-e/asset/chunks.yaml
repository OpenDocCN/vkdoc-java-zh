    \nThe message endpoint is probably the most diverse SI component. The SI reference\
    \ documentation refers to it as a *filter* from the pipes-and-filters architecture.\
    \ We already mentioned that in order to send or receive messages, the endpoint\
    \ has to be connected to one or more message channels. Its primary role is to\
    \ encapsulate application logic and decouple it from the SI messaging infrastructure.\
