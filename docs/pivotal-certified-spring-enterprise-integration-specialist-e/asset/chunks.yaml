    package net.lkrnac.book.eiws.chapter09;

    import org.springframework.batch.core.ItemReadListener;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;


    @Component

    public class SimpleItemReaderListener implements ItemReadListener<String> {

      private SimpleExecutablePoint executablePoint;


    @Autowired

      public SimpleItemReaderListener(SimpleExecutablePoint executablePoint) {

        super();

        this.executablePoint = executablePoint;

      }


    @Override

      public void beforeRead() {

        executablePoint.execute("开始读取...");

      }


    @Override

      public void afterRead(String item) {

        executablePoint.execute("读取完成，项目: " + item);

      }


    @Override

      public void onReadError(Exception ex) {

        executablePoint.execute("读取时发生错误");

      }

    }

    ```


    我们实现了 `ItemReadListener<String>` 接口，该接口包含三个拦截方法。显然，在读取之前我们不知道将要读取什么项目。因此，`beforeRead()`
    方法没有任何参数。读取后，SB 会注入一个项目实例。如果发生错误，SB 会注入发生的异常实例。清单 9-81 展示了项目处理监听器。


