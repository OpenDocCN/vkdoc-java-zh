    \ 标签创建一个 `ThreadPoolTaskExecutor` 实例作为线程池实现。如果我们需要使用不同的实现，则需要使用标准的 bean 定义来指定。`AsyncTask`\
    \ 注解不再需要自定义任务执行器名称参数，因为线程池引用是由 `<task:annotation-driven/>` 标签中的 `executor` 参数配置的。我们使用由\
    \ `<task:executor/>` 标签定义的 `customTaskExecutor` 实例。\n\n`<task:executor/>` 标签具有多种参数：\n"
- fmt: "- `pool-size`：此可选参数有两种形式：\n    - 单个值指定池中保留的线程数，即使它们处于空闲状态（核心池大小）。\n    - 由短横线分隔的值范围（例如，`5-25`）。第一个值指定核心池大小（默认值为\
    \ 1）。第二个值指定最大池大小（默认值为 `Integer.MAX_INT`）。如果未指定范围，则默认核心大小为 1，最大池大小为 `Integer.MAX_INT`。\n\
    - `queue-capacity`：指定 `ThreadPoolTaskExecutor` 的 `BlockingQueue` 的容量。当池中没有空闲线程时，队列用于存储计划任务。当队列容量达到上限时，任务执行器会拒绝进一步的线程提交。默认队列容量为\
    \ `Integer.MAX_INT`。此值通常不可取，因为如果大量线程排队，可能会发生 `OutOfMemory` 问题。因此，限制 `queue-capacity`\
    \ 始终是一个好主意。\n- `rejection-policy`：指定队列容量达到上限时的拒绝行为。选项如下。\n    - `ABORT`：当提交额外任务时，线程池抛出\
    \ `TaskRejectedException`。这是默认行为。\n    - `CALLER_RUNS`：逻辑在调用者线程中同步执行。它允许保持调用者线程忙碌，直到后续任务提交执行。在此期间，线程池中的某些线程可能完成并释放一些容量。\n\
    \    - `DISCARD`：提交的任务被静默丢弃。\n    - `DISCARD_OLDEST`：丢弃队列头部的任务。\n\n## 配置计划任务\n\
    \n调度配置由类级别的 `@EnableScheduling` 注解启用。它应与 `@Configuration` 注解一起使用。使用 `@EnableScheduling`\
    \ 和 `@Configuration` 注解的类可以通过 `@Import` 注解导入到另一个 Spring 配置类中。第二种选择是对此类进行组件扫描。\n\
    \n`@Scheduled` 方法级别注解定义了应定期执行的逻辑。它不能接受任何参数，也不能返回任何值。该注解可以包含以下参数：\n\n- `fixedDelay`：以毫秒为单位的数值\n\
    - `fixedRate`：以毫秒为单位的数值\n- `cron`：字符串 Cron 表达式\n- `initialDelay`：延迟首次启动的毫秒数\n\n\
    必须指定 `fixedDelay`、`fixedRate` 或 `cron` 参数中的恰好一个。否则，将此 bean 注册到 Spring 上下文将会失败。最后一个参数\
    \ `initialDelay` 是可选的。当我们不希望立即调度第一次迭代，而是希望将此执行推迟到稍后时间时，它会很有用。[清单 1-25](#9781484207949_Ch01.xhtml#FPar30)\
    \ 展示了此注解的示例。\n\n[***清单 1-25***](#9781484207949_Ch01.xhtml#_FPar30)。计划任务示例 (0103-scheduled-job)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter01.scheduling.task;\n\nimport java.text.DateFormat;\n\
    import java.text.SimpleDateFormat;\nimport java.util.Date;\nimport java.util.Locale;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.scheduling.annotation.Scheduled;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class ScheduledTask\
    \ {\n  private static final int SCHEDULING_DELAY = 1000;\n\nprivate final DateFormat\
    \ dateFormat = new SimpleDateFormat(\"HH:mm:ss:SSS\",\n      Locale.getDefault());\n\
    \n@Scheduled(fixedRate = SCHEDULING_DELAY)\n  public void call() {\n    System.out.println(dateFormat.format(new\
    \ Date()) + \" - job kicked off\");\n  }\n}\n```\n\n`ScheduledTask` 是一个 Spring\
    \ bean，其一个方法使用了 `@Scheduled` 注解。在此例中，我们使用固定速率调度方法，间隔为 1 秒。此方法仅将当前时间打印到控制台。Spring\
    \ 配置如[清单 1-26](#9781484207949_Ch01.xhtml#FPar31) 所示。\n\n[***清单 1-26***](#9781484207949_Ch01.xhtml#_FPar31)。计划任务配置\
    \ (0103-scheduled-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.scheduling;\n\
    \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.context.annotation.ComponentScan;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
    \n@Configuration\n@ComponentScan\n@EnableScheduling\npublic class ScheduledConfiguration\
    \ {\n  public static void main(String... args) {\n    SpringApplication.run(ScheduledConfiguration.class,\
    \ args);\n  }\n}\n```\n\n此示例使用 `@EnableScheduling` 注解来启用调度功能。它还使用组件扫描来注册当前包及其子包中的\
    \ Spring bean。此类最后一个值得注意的方面是使用 Spring Boot 将此配置作为可执行 JAR 应用程序简单运行。当我们运行此 Java\
    \ 应用程序时，应该会看到类似于[清单 1-27](#9781484207949_Ch01.xhtml#FPar32) 的输出。\n\n[***清单 1-27***](#9781484207949_Ch01.xhtml#_FPar32)。计划任务控制台输出\n\
    \n```\n19:36:34:454 - job kicked off\n19:36:35:454 - job kicked off\n19:36:36:454\
    \ - job kicked off\n19:36:37:454 - job kicked off\n...\n```\n\n我们的任务被调度为每秒执行一次。此应用程序将保持此行为，直到我们强制终止它。\n\
    \n## 用于调度的 XML 配置\n\n也可以使用 `task` 命名空间通过 XML 配置调度，该命名空间具有用于调度支持的各种标签。第一个是 `<task:scheduler>`，用于配置驱动调度的\
    \ `ThreadPoolTaskScheduler` 线程池。`<task:scheduler>` 有一个必需参数 `id`，用于指定调度器 bean 的名称和工作线程名称的前缀。第二个参数\
    \ `pool-size` 是可选的，用于指定用于调度的线程池实现的核心大小。当未显式指定时，默认值为 1，表示将使用单个线程来执行计划逻辑。\n\n用于调度支持的第二个顶级元素是\
    \ `<task:scheduled-tasks>`。它可以包含多个 `<task:scheduled>` 子元素，每个子元素指定一个计划任务。`<task:scheduled>`\
    \ 可以包含以下参数之一：\n\n- `fixed-delay`：以毫秒为单位的数值\n- `fixed-rate`：以毫秒为单位的数值\n- `cron`：字符串\
    \ Cron 表达式\n\n必须指定其中之一。下一个参数是可选的 `initial-delay`。它可用于将初始迭代延迟给定的毫秒数。最后两个参数 `ref`\
    \ 和 `method` 是必需的。它们指定对 Spring bean 的引用以及将被调度的方法的名称。*此方法必须为 void 且不能接受参数。*\n\n\
    此外，顶级元素 `<task:scheduled-tasks>` 有一个可选参数 `scheduler`，用于定义调度器 bean 的引用。如果未指定，则使用单线程执行器来调度定义为子元素的任务。[清单\
    \ 1-28](#9781484207949_Ch01.xhtml#FPar33) 显示了配置。\n\n[***清单 1-28***](#9781484207949_Ch01.xhtml#_FPar33)。用于调度的\
    \ XML 配置支持示例\n\n```\n<task:scheduler id=\"customScheduler\" pool-size=\"10\"/>\n\
    <task:scheduled-tasks scheduler=\"customScheduler\">\n        <task:scheduled\
    \ ref=\"bean1\" method=\"method1\" cron=\"*/10 9-17 * * * MON-FRI\"/>\n      \
    \  <task:scheduled ref=\"bean2\" method=\"method2\" fixed-delay=\"1000\"/>\n \
    \       <task:scheduled ref=\"bean3\" method=\"method3\" fixed-rate=\"1000\"/>\n\
    </task:scheduled-tasks>\n```\n\n## 总结"
  raw: "*   `pool-size`: This optional parameter can have two forms:\n    *   A single\
    \ value specifies the number of threads to keep in the pool, even if they are\
    \ idle (the core pool size).\n    *   A range of values, separated by a dash (for\
    \ example, `5-25`). The first value specifies the core pool size (the default\
    \ value is 1). The second value specifies the maximum pool size (the default value\
    \ is `Integer.MAX_INT`). If the range isn’t specified, the default core size is\
    \ 1 and the maximum pool size is `Integer.MAX_INT`.\n*   `queue-capacity`: Specifies\
    \ the capacity for `ThreadPoolTaskExecutor`’s `BlockingQueue`. Queue is used for\
    \ storing scheduled tasks when there aren’t free threads in pool. When the capacity\
    \ of the queue is reached, the task executor rejects further thread submissions.\
    \ The default queue capacity is `Integer.MAX_INT`. This value is often not desirable,\
    \ because `OutOfMemory` problems can occur if a lot of threads are queued. So\
    \ it’s always a good idea to limit `queue-capacity`*.*\n*   `rejection-policy`:\
    \ Specifies the rejection behavior when the queue capacity is reached. Options\
    \ are as follows.\n    *   `ABORT`: The thread pool throws `TaskRejectedException`\
    \ when an additional task is submitted. This is the default behavior.\n    * \
    \  `CALLER_RUNS`: Logic is executed synchronously in the caller thread. It allows\
    \ you to keep the caller thread busy until subsequent tasks are submitted for\
    \ execution. In the meantime, some threads from the thread pool may finish and\
    \ free some capacity.\n    *   `DISCARD`: The submitted task is silently discarded.\n\
    \    *   `DISCARD_OLDEST`: The task at the head of the queue is discarded.\n\n\
    Configuring Scheduled Tasks\n\nScheduling configuration is enabled by the `@EnableScheduling`\
    \ class-level annotation. It should be used with the `@Configuration` annotation.\
    \ A class annotated with `@EnableScheduling` and `@Configuration` can be imported\
    \ by the `@Import` annotation into another Spring configuration class. The second\
    \ option is to component scan such an annotated class.\n\nThe `@Scheduled` method-level\
    \ annotation defines logic that should be scheduled for recurring execution. It\
    \ can’t take any parameters nor return any value. An annotation can have these\
    \ parameters:\n\n*   `fixedDelay`: Numeric value in milliseconds\n*   `fixedRate`:\
    \ Numeric value in milliseconds\n*   `cron`: String Cron expression\n*   `initialDelay`:\
    \ Delay first start in milliseconds\n\nExactly one of the parameters `fixedDelay`,\
    \ `fixedRate`, or `cron` must be specified. Otherwise, registering such a bean\
    \ into the Spring context would fail. The last parameter, `initialDelay`, is optional.\
    \ It would be useful when we don’t want to schedule a first iteration immediately\
    \ but rather want to defer this execution to a later time. [Listing 1-25](#9781484207949_Ch01.xhtml#FPar30)\
    \ shows an example of this annotation.\n\n[***Listing 1-25***](#9781484207949_Ch01.xhtml#_FPar30).\
    \ Scheduled Task Example (0103-scheduled-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.scheduling.task;\n\
    \nimport java.text.DateFormat;\nimport java.text.SimpleDateFormat;\nimport java.util.Date;\n\
    import java.util.Locale;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
    \n@Component\npublic class ScheduledTask {\n  private static final int SCHEDULING_DELAY\
    \ = 1000;\n\nprivate final DateFormat dateFormat = new SimpleDateFormat(\"HH:mm:ss:SSS\"\
    ,\n      Locale.getDefault());\n\n@Scheduled(fixedRate = SCHEDULING_DELAY)\n  public\
    \ void call() {\n    System.out.println(dateFormat.format(new Date()) + \" - job\
    \ kicked off\");\n  }\n}\n```\n\n`ScheduledTask` is a Spring bean with one method\
    \ annotated by the `@Scheduled` annotation. In this case, we use the fixed-rate\
    \ scheduling method with 1-second intervals. This method simply prints the current\
    \ time to the console. The Spring configuration looks like [Listing 1-26](#9781484207949_Ch01.xhtml#FPar31).\n\
    \n[***Listing 1-26***](#9781484207949_Ch01.xhtml#_FPar31). Scheduled Task Configuration\
    \ (0103-scheduled-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.scheduling;\n\
    \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.context.annotation.ComponentScan;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
    \n@Configuration\n@ComponentScan\n@EnableScheduling\npublic class ScheduledConfiguration\
    \ {\n  public static void main(String... args) {\n    SpringApplication.run(ScheduledConfiguration.class,\
    \ args);\n  }\n}\n```\n\nThis example uses the `@EnableScheduling` annotation\
    \ to enable the scheduling feature. It also uses a component scan to register\
    \ Spring beans from the current package and its subpackages. The last notable\
    \ aspect of this class is usage of Spring Boot to simply execute this configuration\
    \ as an executable JAR application. When we run this Java application, we should\
    \ see output similar to [Listing 1-27](#9781484207949_Ch01.xhtml#FPar32).\n\n\
    [***Listing 1-27***](#9781484207949_Ch01.xhtml#_FPar32). Scheduled Task Console\
    \ Output\n\n```\n19:36:34:454 - job kicked off\n19:36:35:454 - job kicked off\n\
    19:36:36:454 - job kicked off\n19:36:37:454 - job kicked off\n...\n```\n\nOur\
    \ job is scheduled for execution each second. This application would have this\
    \ behavior until we terminate it forcibly.\n\nXML Configuration for Scheduling\n\
    \nIt is also possible to configure scheduling with XML by using the `task` namespace,\
    \ which has various tags for scheduling support. The first one is `<task:scheduler>`,\
    \ used to configure the `ThreadPoolTaskScheduler` thread pool that will be driving\
    \ scheduling. `<task:scheduler>` has one mandatory parameter, `id`, which specifies\
    \ the name of the scheduler bean and the prefix for worker thread names. The second\
    \ parameter, `pool-size`, is optional and specifies the core size of the thread-pool\
    \ implementation used for scheduling. When it’s not explicitly specified, the\
    \ default value is 1, indicating that a single thread will be used to execute\
    \ scheduled logic.\n\nThe second top-level element for scheduling support is `<task:scheduled-tasks>`.\
    \ It can have various `<task:scheduled>` subelements, where each subelement specifies\
    \ one scheduled task. `<task:scheduled>` can have one of these parameters:\n\n\
    *   `fixed-delay`: Numeric value in milliseconds\n*   `fixed-rate`: Numeric value\
    \ in milliseconds\n*   `cron`: String Cron expression\n\nOne of them has to be\
    \ specified. The next parameter is the optional `initial-delay`. It may be used\
    \ to delay initial iteration by a given number of milliseconds. The last two parameters,\
    \ `ref` and `method`, are mandatory. They specify a reference to a Spring bean\
    \ and the name of the method that will be scheduled. *This method has to be void\
    \ and can’t accept parameters.*\n\nAlso, the top-level element, `<task:scheduled-tasks>`,\
    \ has one optional parameter, `scheduler`, used to define the scheduler bean reference.\
    \ If it isn’t specified, a single-threaded executor is used for scheduling tasks\
    \ defined as subelements. [Listing 1-28](#9781484207949_Ch01.xhtml#FPar33) shows\
    \ the configuration.\n\n[***Listing 1-28***](#9781484207949_Ch01.xhtml#_FPar33).\
    \ Examples of XML Configuration Support for Scheduling\n\n```\n<task:scheduler\
    \ id=\"customScheduler\" pool-size=\"10\"/>\n<task:scheduled-tasks scheduler=\"\
    customScheduler\">\n        <task:scheduled ref=\"bean1\" method=\"method1\" cron=\"\
    */10 9-17 * * * MON-FRI\"/>\n        <task:scheduled ref=\"bean2\" method=\"method2\"\
    \ fixed-delay=\"1000\"/>\n        <task:scheduled ref=\"bean3\" method=\"method3\"\
    \ fixed-rate=\"1000\"/>\n</task:scheduled-tasks>\n```\n\nSummary"
  trans: "\n*   `pool-size`：此可选参数有两种形式：\n    *   单个值指定池中保留的线程数，即使它们处于空闲状态（核心池大小）。\n\
    \    *   一个由破折号分隔的值范围（例如，`5-25`）。第一个值指定核心池大小（默认值为 1）。第二个值指定最大池大小（默认值为 `Integer.MAX_INT`）。如果未指定范围，则默认核心大小为\
    \ 1，最大池大小为 `Integer.MAX_INT`。\n*   `queue-capacity`：指定 `ThreadPoolTaskExecutor`\
    \ 的 `BlockingQueue` 的容量。当池中没有空闲线程时，队列用于存储计划任务。当队列容量达到上限时，任务执行器会拒绝进一步的线程提交。默认队列容量为\
    \ `Integer.MAX_INT`。这个值通常不可取，因为如果大量线程排队，可能会发生 `OutOfMemory` 问题。因此，限制 `queue-capacity`\
    \ 始终是一个好主意*。*\n*   `rejection-policy`：指定当队列容量达到上限时的拒绝行为。选项如下。\n    *   `ABORT`：当提交额外任务时，线程池抛出\
    \ `TaskRejectedException`。这是默认行为。\n    *   `CALLER_RUNS`：逻辑在调用者线程中同步执行。它允许保持调用者线程忙碌，直到后续任务被提交执行。在此期间，线程池中的一些线程可能完成工作并释放一些容量。\n\
    \    *   `DISCARD`：提交的任务被静默丢弃。\n    *   `DISCARD_OLDEST`：丢弃队列头部的任务。\n\n配置计划任务\n\
    \n调度配置通过类级别的 `@EnableScheduling` 注解启用。它应与 `@Configuration` 注解一起使用。一个使用 `@EnableScheduling`\
    \ 和 `@Configuration` 注解的类可以通过 `@Import` 注解导入到另一个 Spring 配置类中。第二种选择是对此类进行组件扫描。\n\
    \n`@Scheduled` 方法级别的注解定义了应被调度以重复执行的逻辑。它不能接受任何参数，也不能返回任何值。该注解可以包含以下参数：\n\n*   `fixedDelay`：以毫秒为单位的数值\n\
    *   `fixedRate`：以毫秒为单位的数值\n*   `cron`：字符串类型的 Cron 表达式\n*   `initialDelay`：首次启动的延迟时间（毫秒）\n\
    \n必须指定 `fixedDelay`、`fixedRate` 或 `cron` 参数中的恰好一个。否则，将此 bean 注册到 Spring 上下文将会失败。最后一个参数\
    \ `initialDelay` 是可选的。当我们不想立即调度第一次迭代，而是希望将此执行推迟到稍后时间时，它会很有用。清单 1-25 展示了此注解的一个示例。\n\
    \n***清单 1-25***. 计划任务示例 (0103-scheduled-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.scheduling.task;\n\
    \nimport java.text.DateFormat;\nimport java.text.SimpleDateFormat;\nimport java.util.Date;\n\
    import java.util.Locale;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
    \n@Component\npublic class ScheduledTask {\n  private static final int SCHEDULING_DELAY\
    \ = 1000;\n\nprivate final DateFormat dateFormat = new SimpleDateFormat(\"HH:mm:ss:SSS\"\
    ,\n      Locale.getDefault());\n\n@Scheduled(fixedRate = SCHEDULING_DELAY)\n  public\
    \ void call() {\n    System.out.println(dateFormat.format(new Date()) + \" - job\
    \ kicked off\");\n  }\n}\n```\n\n`ScheduledTask` 是一个 Spring bean，其一个方法使用了 `@Scheduled`\
    \ 注解。在此例中，我们使用了固定频率的调度方法，间隔为 1 秒。该方法简单地将当前时间打印到控制台。Spring 配置如清单 1-26 所示。\n\n***清单\
    \ 1-26***. 计划任务配置 (0103-scheduled-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.scheduling;\n\
    \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.context.annotation.ComponentScan;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
    \n@Configuration\n@ComponentScan\n@EnableScheduling\npublic class ScheduledConfiguration\
    \ {\n  public static void main(String... args) {\n    SpringApplication.run(ScheduledConfiguration.class,\
    \ args);\n  }\n}\n```\n\n此示例使用 `@EnableScheduling` 注解来启用调度功能。它还使用组件扫描来注册来自当前包及其子包的\
    \ Spring bean。该类最后一个值得注意的方面是使用 Spring Boot 将此配置作为可执行 JAR 应用程序简单运行。当我们运行此 Java\
    \ 应用程序时，应该会看到类似于清单 1-27 的输出。\n\n***清单 1-27***. 计划任务控制台输出\n\n```\n19:36:34:454\
    \ - job kicked off\n19:36:35:454 - job kicked off\n19:36:36:454 - job kicked off\n\
    19:36:37:454 - job kicked off\n...\n```\n\n我们的任务被调度为每秒执行一次。此应用程序将保持此行为，直到我们强制终止它。\n\
    \n调度的 XML 配置\n\n也可以使用 `task` 命名空间通过 XML 配置调度，该命名空间包含各种用于调度支持的标签。第一个是 `<task:scheduler>`，用于配置将驱动调度的\
    \ `ThreadPoolTaskScheduler` 线程池。`<task:scheduler>` 有一个必需参数 `id`，用于指定调度器 bean 的名称和工作线程名称的前缀。第二个参数\
    \ `pool-size` 是可选的，用于指定用于调度的线程池实现的核心大小。当未明确指定时，默认值为 1，表示将使用单个线程来执行调度逻辑。\n\n用于调度支持的第二个顶级元素是\
    \ `<task:scheduled-tasks>`。它可以包含多个 `<task:scheduled>` 子元素，每个子元素指定一个计划任务。`<task:scheduled>`\
    \ 可以包含以下参数之一：\n\n*   `fixed-delay`：以毫秒为单位的数值\n*   `fixed-rate`：以毫秒为单位的数值\n*  \
    \ `cron`：字符串类型的 Cron 表达式\n\n必须指定其中之一。下一个参数是可选的 `initial-delay`。它可用于将初始迭代延迟给定的毫秒数。最后两个参数\
    \ `ref` 和 `method` 是必需的。它们指定了对 Spring bean 的引用以及将被调度的方法的名称。*此方法必须为 void 类型且不能接受参数。*\n\
    \n此外，顶级元素 `<task:scheduled-tasks>` 有一个可选参数 `scheduler`，用于定义调度器 bean 的引用。如果未指定，则使用单线程执行器来调度定义为子元素的任务。清单\
    \ 1-28 展示了该配置。\n\n***清单 1-28***. 调度 XML 配置支持示例\n\n```\n<task:scheduler id=\"customScheduler\"\
    \ pool-size=\"10\"/>\n<task:scheduled-tasks scheduler=\"customScheduler\">\n        <task:scheduled\
    \ ref=\"bean1\" method=\"method1\" cron=\"*/10 9-17 * * * MON-FRI\"/>\n        <task:scheduled\
    \ ref=\"bean2\" method=\"method2\" fixed-delay=\"1000\"/>\n        <task:scheduled\
    \ ref=\"bean3\" method=\"method3\" fixed-rate=\"1000\"/>\n</task:scheduled-tasks>\n\
    ```\n\n总结\n"
- fmt: '# 排版后的内容


    This chapter described Spring’s APIs for multithreading and scheduling and compared
    them with pure Java SE multithreading support. It is important to bear in mind
    that multithreading is a double-edged sword. Throwing a pool of threads on the
    problem can slow computation, because switching context between threads can become
    more expensive than the computation itself. This can happen especially when there
    are many more running threads than CPU cores in the system. In addition, multithreaded
    logic could be too simple and not worth the cost of context switching. So figuring
    out the correct level of parallelism isn’t a trivial job and requires a good understanding
    of the problem and the surrounding environment. Benchmarking and accurate performance
    testing are always a good idea when problems are being solved by multithreading.


    ![Image](images/sq.jpg) **Note** In addition to multithreading, you can use other
    approaches to solve problems of blocking I/O operations. But these are beyond
    the scope of this book. For more information, you can research Java Futures and
    Reactive Extensions (for example, see the RxJava library at `https://github.com/ReactiveX/RxJava`)
    and Actor systems (for example, Spring Reactor at `https://github.com/reactor/reactor`
    or Akka at `http://akka.io/`). A good example of an aggressive nonblocking I/O
    approach is the event loop in Node.js (`https://nodejs.org/`) that naturally evolved
    from the web browser’s event loop.


    ## CHAPTER 2


    ![image](images/frontdot.jpg)


    ## Remoting


    Let’s compare the Ultrabook (Dell’s super thin laptop) to a desktop PC. Most people
    would probably go for an Ultrabook these days, because it’s lighter, silent, and
    can be carried nearly everywhere. So does a desktop PC have any advantage at all,
    apart from its lower price? Yes—it is modular. What would you do with an Ultrabook
    when its processor breaks or its power connector burns out? These kinds of problems
    would likely make the Ultrabook unrepairable. But if this happened to a desktop
    PC’s monitor or power supply, those can be replaced easily. The capability to
    replace PC components is supported by standardized connectors. They allow us to
    build a whole PC by using components from different vendors.


    Now imagine a big cloud service provider. The infrastructure of this system is
    closer to PC architecture in terms of our PC vs. Ultrabook metaphor. Enterprise
    systems are composed of applications that are often implemented in different programming
    languages and are running on machines located in various parts of the world. It
    is obvious that these applications need to communicate with each other via common
    protocols, so that a broken application eventually can be replaced without affecting
    the whole enterprise.


    Spring remoting support is an abstraction umbrella for interapplication communication
    mechanisms used in the enterprise world. These technologies can be categorized
    into two basic groups based on their nature: synchronous and asynchronous.


    Let’s start with method invocation technologies (synchronous communication):


    * Remote Method Invocation (RMI)

    * HTTPInvoker: Java serialization over HTTP

    * Hessian: Lightweight binary HTTP-based protocol designed by Caucho Technology

    * Burlap: XML-based version of Hessian

    * Java API for XML Web Services (JAX-WS): Replaced JAX-RPC with the introduction
    of Java EE 5, covered in [Chapter 3](#9781484207949_Ch03.xhtml)


    And now consider technologies for message passing (asynchronous communication):


    * Java Message Service (JMS): Covered in [Chapter 5](#9781484207949_Ch05.xhtml)

    * Advanced Message Queuing Protocol (AMQP): Covered by the Spring AMQP project
    and out of the scope of this book


    As you can see, the Spring umbrella is rich. But each of these technologies also
    can be used without Spring. So the question is, what benefits do the Spring abstractions
    provide? For remoting technologies, the benefits are as follows:


    * Decouples remoting logic from application code

    * Propagates a declarative paradigm to configure and expose services

    * Supports various protocols with consistent APIs

    * Translates checked exceptions into runtime exceptions


    Let’s explore each of these technologies and Spring’s abstractions in more detail.


    ![Image](images/sq.jpg) **Note** Hessian and Burlap were included in previous
    versions of the Enterprise Integration with Spring certification, but were removed
    from the latest version, which covers Spring 4.0 features. Therefore, they are
    beyond the scope of this book.


    ## Remote Method Invocation


    As its name suggests, *Remote Method Invocation* (RMI) is used for executing methods
    located on a remote JVM or system. RMI provides a convenient way to integrate
    distributed systems. Developers don’t need to convert data models into another
    format in order to communicate with the remote system. To transfer data between
    JVMs, serialization is used. Serialization is a standard Java mechanism to convert
    data and code into binary form, so they can be stored or sent through the wire.


    Initial implementations of RMI worked only for inter-JVM communication. They were
    based on the Java Remote Method Protocol (JRMP). To make RMI more flexible, the
    RMI over Internet Inter-Orb Protocol (RMI-IIOP) was developed. This version is
    based on the Common Object Request Broker Architecture (CORBA) standard and can
    be used for intercommunication of diverse systems. The important take-away of
    this is that RMI-IIOP makes method invocation possible with non-JVM runtime environments.


    As mentioned, RMI is used for communication between remote environments potentially
    located on different hosts. So two sides are involved. One side exposes logic.
    The second side consumes the exposed RMI method. Both sides are able to communicate
    via the network, because the JRMP provides an RMI registry. Each side of the communication
    registers a proxy object into the RMI registry, and these objects then communicate
    with each other with the help of a standard Java serialization mechanism.


    In order to understand each other, the client and server need to have a common
    contract available on both sides. This contract in the RMI world isn’t anything
    other than a standard Java interface. The method provider needs to implement this
    interface, and the RMI client needs it during the remote method call. There are
    two ways to ensure that this contract is available on both sides:


    * The interface is located in a shared JAR library that would be used by both
    sides as a dependency.

    * The interface is duplicated with the same signature on both sides.


    Each approach has its pros and cons. Extracting into a shared library creates
    complexity around handling and maintaining that shared library. Duplicating an
    interface on both sides obviously creates the risk of making the interface incompatible
    on one of the sides.


    It may seem like developers can take any call and easily expose it via RMI without
    any changes. But this isn’t exactly the case. Certain RMI contract specifics need
    to be fulfilled:


    * The contract interface needs to extend the `java.rmi.Remote` interface.

    * The exposing method must throw a `java.rmi.RemoteException`.

    * The class implementing the RMI method (logic that will be shared) needs to extend
    `java.rmi.server.UnicastRemoteObject`.

    * The class implementing the RMI method needs to have an explicit constructor,
    which must throw `java.rmi.RemoteException`.

    * The client consuming the RMI method needs to handle the checked exception `java.rmi.RemoteException`.


    Another important part of the contract is serialization. Each parameter, return
    type, and implementing class itself needs to be serializable. For the service
    implementation class, this is ensured via extending `java.rmi.server.UnicastRemoteObject`.


    Let’s explore RMI contract specifics in examples. Our shared interface is highlighted
    in [Listing 2-1](#9781484207949_Ch02.xhtml#FPar2).'
