    第 1 章


    ![image](img/frontdot.jpg)


    任务与调度


    如今，随着计算机核心数量的增加和处理器速度的提升，应用程序能够利用这种计算能力变得至关重要。让我们将处理器比作工作中的你。想象一下，你被一个任务卡住了，只有你经验丰富的队友能帮你。但他去吃午饭了。你可以切换到另一个任务，或者等他。但当你决定等待队友的帮助并刷一会儿社交媒体时，你的工作进度就被阻塞了。在你的导师回来之前，你完全没有产出。如果他不回来了呢？你的雇主可不会高兴。


    现在想象一个需要通过超文本传输协议（HTTP）访问文件系统、数据库或第三方系统的应用程序。该应用程序的操作是一个阻塞操作：CPU 在等待输入/输出（I/O）响应时什么也不做。同时，新的请求不断涌入并等待处理。这种场景是性能瓶颈的典型例子。


    这种情况可以通过将 CPU 的注意力转移到单独的线程执行上来解决。当前线程的堆栈和上下文被挂起（这样处理器可以在之后继续计算，就好像线程从未被终止一样），然后
    CPU 开始短时间地计算另一个线程。这种线程间的上下文切换允许 CPU 优先处理管道，专注于需要处理的任务，而不是那些等待 I/O 响应的任务。这个概念通常被称为*多任务处理*、*多线程*或*并发处理*。


    线程对于以下类型的应用程序非常有价值：


    *   输入/输出密集型（例如，存储和从数据库读取数据的应用程序）

    *   为多个客户端提供请求服务的应用程序（例如，Web 应用程序）

    *   希望充分利用所有 CPU 核心全部性能的应用程序


    多线程涵盖了即时的并行执行。它通常由用户操作触发——例如，从 Web 浏览器发送请求，或通过应用程序图形用户界面（GUI）中执行的操作触发。但某些处理不能依赖外部触发。这时，并发编程的另一个重要概念就发挥作用了：*任务调度*。执行可以被安排在特定时间启动一次，甚至重复执行。例如后台批处理和系统维护静默时段。


    创建可维护的并发代码的能力已成为开发者知识库的重要组成部分。然而，这并不容易。语言的演进带来了各种有助于实现这一点的抽象。理解如何应用这些抽象以实现最佳性能至关重要。


    Spring 企业组合中的所有项目都依赖于多线程。这就是为什么你需要理解 Spring 用于线程和调度的构造。本章还强调了它们相对于标准 Java API
    的优势。但它不涵盖诸如同步、锁定、死锁或资源共享等复杂部分。


    Java 中的多线程'
- fmt: "# Developing Asynchronous Concurrent Applications\n\nDeveloping asynchronous\
    \ concurrent applications isn’t trivial. Early Java versions provided threading\
    \ abstractions that were hard to maintain. Let’s quickly gather the basic concepts\
    \ and skip the less important parts.\n\n## Java SE\n\nIn the Java world, the primary\
    \ element of multithreading is the `java.lang.Runnable` interface (shown in [Listing\
    \ 1-1](#9781484207949_Ch01.xhtml#FPar1)).\n\n[***Listing 1-1***](#9781484207949_Ch01.xhtml#_FPar1).\
    \ Runnable Interface\n\n```\npackage java.lang;\n\npublic interface Runnable {\n\
    \    public abstract void run();\n}\n```\n\nA Java developer implements this interface\
    \ and places the concurrent logic into the `Runnable.run()` method. It doesn’t\
    \ take nor return any parameters.\n\nFor controlling concurrent execution, the\
    \ `java.lang.Thread` class can be used. When the method `Thread.start()` is executed,\
    \ the Java virtual machine (JVM) kicks off a new thread, while the current thread\
    \ also continues processing—kind of. The CPU switches its attention between these\
    \ two tasks, and the developer can’t predict at which point the attention of the\
    \ processor will be given to a particular piece of code. If the CPU has multiple\
    \ cores, both threads can be running simultaneously, leveraging the best allocation\
    \ of computational power.\n\nThread creation is a CPU- and memory-expensive operation.\
    \ Also, direct `java.lang.Thread` usage turned out to be too low level and often\
    \ led to unmaintainable code. Therefore, Java SE 5 introduced the new `java.util.concurrent`\
    \ package, which utilizes reuse of threads in so-called *thread pools*. The main\
    \ interface `java.util.concurrent.Executor` is shown in [Listing 1-2](#9781484207949_Ch01.xhtml#FPar2).\n\
    \n[***Listing 1-2***](#9781484207949_Ch01.xhtml#_FPar2). Executor Interface\n\n\
    ```\npackage java.util.concurrent;\n\npublic interface Executor {\n    void execute(Runnable\
    \ command);\n}\n```\n\nThe basic concept is to wrap the concurrent behavior into\
    \ a class implementing the `java.lang.Runnable` interface and pass it to a thread\
    \ pool for execution. The thread pool (an implementation of `java.util.concurrent.Executor`)\
    \ takes care of executing the concurrent code in a parallel thread of execution.\n\
    \nA crucial subinterface of `java.util.concurrent.Executor` introduced with Java\
    \ SE 5 concurrency utilities is `java.util.concurrent.ExecutorService`, shown\
    \ in [Listing 1-3](#9781484207949_Ch01.xhtml#FPar3).\n\n[***Listing 1-3***](#9781484207949_Ch01.xhtml#_FPar3).\
    \ Partial ExecutorService Interface Signature\n\n```\npackage java.util.concurrent;\n\
    \npublic interface ExecutorService extends Executor {\n    void shutdown();\n\
    \    boolean isShutdown();\n    boolean isTerminated();\n    boolean awaitTermination(long\
    \ timeout, TimeUnit unit)\n        throws InterruptedException;\n    <T> Future<T>\
    \ submit(Callable<T> task);\n    <T> Future<T> submit(Runnable task, T result);\n\
    \    Future<?> submit(Runnable task);\n    ...\n}\n```\n\n`ExecutorService` provides\
    \ two groups of operations on top of the thread pool. One group is used to terminate\
    \ thread execution. Here are the main players from this category:\n\n*   `shutdown`:\
    \ The thread pool doesn’t accept new tasks for execution.\n*   `isShutdown`: Indicates\
    \ whether the thread pool is scheduled for shutdown (some threads can still be\
    \ running).\n*   `isTerminated`: Indicates whether the thread was terminated (all\
    \ threads are finished).\n*   `awaitTermination`: Blocks current threads until\
    \ all tasks are finished.\n\nThe second group of `ExecutorService` methods is\
    \ designed for submitting tasks for execution. As you can see from the declaration,\
    \ they have complicated-looking signatures. Newcomers are `java.util.concurrent.Future<V>`\
    \ and `java.util.concurrent.Callable<V>`. They are designed for use cases that\
    \ `java.util.Runnable` can’t handle, such as returning a value from a thread and\
    \ populating exceptions into the caller thread.\n\nAs its name suggests, `Future`\
    \ wraps a value returned later by the concurrent logic. The value type is specified\
    \ by generic type `V`. It will be filled in the future by a forked thread. The\
    \ caller thread can grab it by calling `Future.get()`. But the caller thread will\
    \ be blocked until the value is filled by the forked thread. Optionally, we can\
    \ pass a time-out to `Future.get(long timeout, TimeUnit unit)` when it’s not suitable\
    \ to block the caller for a long time.\n\n`java.util.concurrent.Callable` is the\
    \ interface designed for task declaration, similar to `java.lang.Runnable`. But\
    \ it provides more possibilities than `java.lang.Runnable`, because its method\
    \ can return a value and throw an exception. See [Listing 1-4](#9781484207949_Ch01.xhtml#FPar4).\n\
    \n[***Listing 1-4***](#9781484207949_Ch01.xhtml#_FPar4). Callable Interface\n\n\
    ```\npackage java.util.concurrent;\n\npublic interface Callable<V> {\n    V call()\
    \ throws Exception;\n}\n```\n\nThe thread-pool abstraction `java.util.concurrent.ExecutorService`\
    \ has various implementations. Most notable is the class `java.util.concurrent.ThreadPoolExecutor`,\
    \ which has various constructors to configure its properties. Thread-pool properties\
    \ can be used for fine-grained tuning of thread pools. The most important properties\
    \ of `java.util.concurrent.ThreadPoolExecutor` are as follows:\n\n*   `corePoolSize`:\
    \ The number of threads to keep in the pool\n*   `maximumPoolSize`: The maximum\
    \ number of threads to allow to run concurrently\n*   `keepAliveTime` with `unit`:\
    \ The keep-alive time-out for threads that exceed `corePoolSize`\n*   `workQueue`:\
    \ The queue for waiting threads that are submitted for execution when there aren’t\
    \ enough worker threads in the pool\n\nWe can create thread pools directly via\
    \ `java.util.concurrent.ThreadPoolExecutor` constructors, but a more convenient\
    \ way is to create them via the factory class `java.util.concurrent.Executors`,\
    \ as shown in [Listing 1-5](#9781484207949_Ch01.xhtml#FPar5).\n\n[***Listing 1-5***](#9781484207949_Ch01.xhtml#_FPar5).\
    \ Partial Executors Class Signature—Factory Methods for Basic Thread Pools\n\n\
    ```\npackage java.util.concurrent;\n\npublic class Executors {\n    public static\
    \ ExecutorService newFixedThreadPool(int nThreads);\n    public static ExecutorService\
    \ newSingleThreadExecutor();\n    public static ExecutorService newCachedThreadPool();\n\
    \n//introduced in Java SE 8:\n    public static ExecutorService newWorkStealingPool();\n\
    \    public static ExecutorService newWorkStealingPool(int parallelism)\n\n...\n\
    }\n```\n\n`Executors` contain many more factory methods that enable powerful control\
    \ over your thread pools, but in most cases the preceding methods should be enough.\
    \ The first three factory methods use `java.util.concurrent.ThreadPoolExecutor`\
    \ as a thread-pool implementation. Each factory creates it with different constructor\
    \ parameters.\n\n`newFixedThreadPool(int nThreads)` creates a thread pool of a\
    \ fixed size. The desired size of the pool is passed into this factory method\
    \ as a parameter. This pool will start execution of a new thread immediately if\
    \ the `nThreads` limit is not reached. When the pool contains `nThreads` running\
    \ threads, any subsequent tasks submitted for execution will be waiting in the\
    \ queue until one of the running threads finishes its work or is interrupted.\
    \ So when an unexpected peak event occurs, threads are blocked, but this situation\
    \ doesn’t overload the whole application.\n\n`newSingleThreadExecutor()` creates\
    \ a thread pool with only one thread. If this single worker thread is currently\
    \ running, subsequent submitted tasks will be queued.\n\n`newCachedThreadPool()`\
    \ creates a thread pool that reuses finished threads. It creates new ones only\
    \ when there isn’t an idle one in the pool. This pool is handy if we need to serve\
    \ a lot of short tasks. Because creation of a thread is a CPU- and memory-intensive\
    \ operation, we may benefit from reusing the same thread instances."
  raw: 'Developing asynchronous concurrent applications isn’t trivial. Early Java
    versions provided threading abstractions that were hard to maintain. Let’s quickly
    gather the basic concepts and skip the less important parts.


    Java SE


    In the Java world, the primary element of multithreading is the `java.lang.Runnable`
    interface (shown in [Listing 1-1](#9781484207949_Ch01.xhtml#FPar1)).


    [***Listing 1-1***](#9781484207949_Ch01.xhtml#_FPar1). Runnable Interface


    ```

    package java.lang;


    public interface Runnable {

        public abstract void run();

    }

    ```


    A Java developer implements this interface and places the concurrent logic into
    the `Runnable.run()` method. *It doesn’t take nor return any parameters.*


    For controlling concurrent execution, the `java.lang.Thread` class can be used.
    When the method `Thread.start()` is executed, the Java virtual machine (JVM) kicks
    off a new thread, while the current thread also continues processing—kind of.
    The CPU switches its attention between these two tasks, and the developer can’t
    predict at which point the attention of the processor will be given to a particular
    piece of code. If the CPU has multiple cores, both threads can be running simultaneously,
    leveraging the best allocation of computational power.


    Thread creation is a CPU- and memory-expensive operation. Also, direct `java.lang.Thread`
    usage turned out to be too low level and often led to unmaintainable code. Therefore,
    Java SE 5 introduced the new `java.util.concurrent` package, which utilizes reuse
    of threads in so-called *thread pools*. The main interface `java.util.concurrent.Executor`
    is shown in [Listing 1-2](#9781484207949_Ch01.xhtml#FPar2).


    [***Listing 1-2***](#9781484207949_Ch01.xhtml#_FPar2). Executor Interface


    ```

    package java.util.concurrent;


    public interface Executor {

        void execute(Runnable command);

    }

    ```


    The basic concept is to wrap the concurrent behavior into a class implementing
    the `java.lang.Runnable` interface and pass it to a thread pool for execution.
    The thread pool (an implementation of `java.util.concurrent.Executor`) takes care
    of executing the concurrent code in a parallel thread of execution.


    A crucial subinterface of `java.util.concurrent.Executor` introduced with Java
    SE 5 concurrency utilities is `java.util.concurrent.ExecutorService`, shown in
    [Listing 1-3](#9781484207949_Ch01.xhtml#FPar3).


    [***Listing 1-3***](#9781484207949_Ch01.xhtml#_FPar3). Partial ExecutorService
    Interface Signature


    ```

    package java.util.concurrent;


    public interface ExecutorService extends Executor {

        void shutdown();

        boolean isShutdown();

        boolean isTerminated();

        boolean awaitTermination(long timeout, TimeUnit unit)

            throws InterruptedException;

        <T> Future<T> submit(Callable<T> task);

        <T> Future<T> submit(Runnable task, T result);

        Future<?> submit(Runnable task);

        ...

    }

    ```


    `ExecutorService` provides two groups of operations on top of the thread pool.
    One group is used to terminate thread execution. Here are the main players from
    this category:


    *   `shutdown`: The thread pool doesn’t accept new tasks for execution.

    *   `isShutdown`: Indicates whether the thread pool is scheduled for shutdown
    (some threads can still be running).

    *   `isTerminated`: Indicates whether the thread was terminated (all threads are
    finished).

    *   `awaitTermination`: Blocks current threads until all tasks are finished.


    The second group of `ExecutorService` methods is designed for submitting tasks
    for execution. As you can see from the declaration, they have complicated-looking
    signatures. Newcomers are `java.util.concurrent.Future<V>` and `java.util.concurrent.Callable<V>`.
    They are designed for use cases that `java.util.Runnable` can’t handle, such as
    returning a value from a thread and populating exceptions into the caller thread.


    As its name suggests, `Future` wraps a value returned later by the concurrent
    logic. The value type is specified by generic type `V`. It will be filled in the
    future by a forked thread. The caller thread can grab it by calling `Future.get()`.
    But the caller thread will be blocked until the value is filled by the forked
    thread. Optionally, we can pass a time-out to `Future.get(long timeout, TimeUnit
    unit)` when it’s not suitable to block the caller for a long time.


    `java.util.concurrent.Callable` is the interface designed for task declaration,
    similar to `java.lang.Runnable`. But it provides more possibilities than `java.lang.Run``nable`,
    because its method can return a value and throw an exception. See [Listing 1-4](#9781484207949_Ch01.xhtml#FPar4).


    [***Listing 1-4***](#9781484207949_Ch01.xhtml#_FPar4). Callable Interface


    ```

    package java.util.concurrent;


    public interface Callable<V> {

        V call() throws Exception;

    }

    ```


    The thread-pool abstraction `java.util.concurrent.ExecutorService` has various
    implementations. Most notable is the class `java.util.concurrent.ThreadPoolExecutor`,
    which has various constructors to configure its properties. Thread-pool properties
    can be used for fine-grained tuning of thread pools. The most important properties
    of `java.util.concurrent.ThreadPoolExecutor` are as follows:


    *   `corePoolSize`: The number of threads to keep in the pool

    *   `maximumPoolSize`: The maximum number of threads to allow to run concurrently

    *   `keepAliveTime` with `unit`: The keep-alive time-out for threads that exceed
    `corePoolSize`

    *   `workQueue`: The queue for waiting threads that are submitted for execution
    when there aren’t enough worker threads in the pool


    We can create thread pools directly via `java.util.concurrent.ThreadPoolExecutor`
    constructors, but a more convenient way is to create them via the factory class
    `java.util.concurrent.Executors`, as shown in [Listing 1-5](#9781484207949_Ch01.xhtml#FPar5).


    [***Listing 1-5***](#9781484207949_Ch01.xhtml#_FPar5). Partial Executors Class
    Signature—Factory Methods for Basic Thread Pools


    ```

    package java.util.concurrent;


    public class Executors {

        public static ExecutorService newFixedThreadPool(int nThreads);

        public static ExecutorService newSingleThreadExecutor();

        public static ExecutorService newCachedThreadPool();


    //introduced in Java SE 8:

        public static ExecutorService newWorkStealingPool();

        public static ExecutorService newWorkStealingPool(int parallelism)


    ...

    }

    ```


    Executors contain many more factory methods that enable powerful control over
    your thread pools, but in most cases the preceding methods should be enough. The
    first three factory methods use `java.util.concurrent.ThreadPoolExecutor` as a
    thread-pool implementation. Each factory creates it with different constructor
    parameters.


    `newFixedThreadPool(int nThreads)` creates a thread pool of a fixed size. The
    desired size of the pool is passed into this factory method as a parameter. This
    pool will start execution of a new thread immediately if the `nThreads` limit
    is not reached. When the pool contains `nThreads` running threads, any subsequent
    tasks submitted for execution will be waiting in the queue until one of the running
    threads finishes its work or is interrupted. So when an unexpected peak event
    occurs, threads are blocked, but this situation doesn’t overload the whole application.


    `newSingleThreadExecutor()` creates a thread pool with only one thread. If this
    single worker thread is currently running, subsequent submitted tasks will be
    queued.


    `newCachedThreadPool()` creates a thread pool that reuses finished threads. It
    creates new ones only when there isn’t an idle one in the pool. This pool is handy
    if we need to serve a lot of short tasks. Because creation of a thread is a CPU-
    and memory-intensive operation, we may benefit from reusing the same thread instances.'
  trans: '

    开发异步并发应用程序并非易事。早期的 Java 版本提供了难以维护的线程抽象。让我们快速了解基本概念，跳过不太重要的部分。


    Java SE


    在 Java 世界中，多线程的主要元素是 `java.lang.Runnable` 接口（如清单 1-1 所示）。


    ***清单 1-1***. Runnable 接口


    ```

    package java.lang;


    public interface Runnable {

        public abstract void run();

    }

    ```


    Java 开发者实现此接口，并将并发逻辑放入 `Runnable.run()` 方法中。*它既不接收也不返回任何参数。*


    为了控制并发执行，可以使用 `java.lang.Thread` 类。当执行 `Thread.start()` 方法时，Java 虚拟机 (JVM) 会启动一个新线程，同时当前线程也会继续处理——大致如此。CPU
    在这两个任务之间切换其注意力，开发者无法预测处理器的注意力会在何时分配给某段特定代码。如果 CPU 有多个核心，两个线程可以同时运行，从而充分利用计算能力的最佳分配。


    创建线程是一项 CPU 和内存密集型操作。此外，直接使用 `java.lang.Thread` 被证明过于底层，并且常常导致代码难以维护。因此，Java SE
    5 引入了新的 `java.util.concurrent` 包，该包在所谓的*线程池*中实现了线程的复用。主要接口 `java.util.concurrent.Executor`
    如清单 1-2 所示。


    ***清单 1-2***. Executor 接口


    ```

    package java.util.concurrent;


    public interface Executor {

        void execute(Runnable command);

    }

    ```


    基本概念是将并发行为封装到实现 `java.lang.Runnable` 接口的类中，并将其传递给线程池执行。线程池（`java.util.concurrent.Executor`
    的一个实现）负责在并行的执行线程中执行并发代码。


    Java SE 5 并发工具引入的 `java.util.concurrent.Executor` 的一个关键子接口是 `java.util.concurrent.ExecutorService`，如清单
    1-3 所示。


    ***清单 1-3***. 部分 ExecutorService 接口签名


    ```

    package java.util.concurrent;


    public interface ExecutorService extends Executor {

        void shutdown();

        boolean isShutdown();

        boolean isTerminated();

        boolean awaitTermination(long timeout, TimeUnit unit)

            throws InterruptedException;

        <T> Future<T> submit(Callable<T> task);

        <T> Future<T> submit(Runnable task, T result);

        Future<?> submit(Runnable task);

        ...

    }

    ```


    `ExecutorService` 在线程池之上提供了两组操作。一组用于终止线程执行。以下是此类别中的主要方法：


    *   `shutdown`：线程池不再接受新任务执行。

    *   `isShutdown`：指示线程池是否已计划关闭（某些线程可能仍在运行）。

    *   `isTerminated`：指示线程是否已终止（所有线程都已完成）。

    *   `awaitTermination`：阻塞当前线程，直到所有任务完成。


    `ExecutorService` 的第二组方法用于提交任务执行。从声明中可以看出，它们的签名看起来很复杂。新引入的是 `java.util.concurrent.Future<V>`
    和 `java.util.concurrent.Callable<V>`。它们专为 `java.util.Runnable` 无法处理的用例而设计，例如从线程返回值以及将异常传播到调用者线程。


    顾名思义，`Future` 包装了稍后由并发逻辑返回的值。值类型由泛型 `V` 指定。它将在未来由分叉线程填充。调用者线程可以通过调用 `Future.get()`
    来获取它。但调用者线程将被阻塞，直到该值被分叉线程填充。或者，当不适合长时间阻塞调用者时，我们可以将超时传递给 `Future.get(long timeout,
    TimeUnit unit)`。


    `java.util.concurrent.Callable` 是为任务声明而设计的接口，类似于 `java.lang.Runnable`。但它提供了比 `java.lang.Run``nable`
    更多的可能性，因为它的方法可以返回值并抛出异常。请参见清单 1-4。


    ***清单 1-4***. Callable 接口


    ```

    package java.util.concurrent;


    public interface Callable<V> {

        V call() throws Exception;

    }

    ```


    线程池抽象 `java.util.concurrent.ExecutorService` 有多种实现。最值得注意的是 `java.util.concurrent.ThreadPoolExecutor`
    类，它具有多种构造函数来配置其属性。线程池属性可用于对线程池进行细粒度调优。`java.util.concurrent.ThreadPoolExecutor`
    最重要的属性如下：


    *   `corePoolSize`：池中要保持的线程数

    *   `maximumPoolSize`：允许同时运行的最大线程数

    *   `keepAliveTime` 与 `unit`：超过 `corePoolSize` 的线程的空闲超时时间

    *   `workQueue`：当池中没有足够的工作线程时，用于存放已提交等待执行的任务的队列


    我们可以直接通过 `java.util.concurrent.ThreadPoolExecutor` 构造函数创建线程池，但更方便的方式是通过工厂类 `java.util.concurrent.Executors`
    创建，如清单 1-5 所示。


    ***清单 1-5***. 部分 Executors 类签名——基本线程池的工厂方法


    ```

    package java.util.concurrent;


    public class Executors {

        public static ExecutorService newFixedThreadPool(int nThreads);

        public static ExecutorService newSingleThreadExecutor();

        public static ExecutorService newCachedThreadPool();


    //在 Java SE 8 中引入：

        public static ExecutorService newWorkStealingPool();

        public static ExecutorService newWorkStealingPool(int parallelism)


    ...

    }

    ```


    `Executors` 包含更多工厂方法，可以对线程池进行强大的控制，但在大多数情况下，上述方法应该足够了。前三个工厂方法使用 `java.util.concurrent.ThreadPoolExecutor`
    作为线程池实现。每个工厂都使用不同的构造函数参数创建它。


    `newFixedThreadPool(int nThreads)` 创建一个固定大小的线程池。池的期望大小作为参数传递给此工厂方法。如果未达到 `nThreads`
    限制，此池将立即开始执行新线程。当池中包含 `nThreads` 个正在运行的线程时，任何后续提交执行的任务都将在队列中等待，直到某个正在运行的线程完成其工作或被中断。因此，当发生意外的峰值事件时，线程会被阻塞，但这种情况不会使整个应用程序过载。


    `newSingleThreadExecutor()` 创建一个只有一个线程的线程池。如果这个单个工作线程当前正在运行，后续提交的任务将被排队。


    `newCachedThreadPool()` 创建一个重用已完成线程的线程池。它仅在池中没有空闲线程时才创建新线程。如果我们需要处理大量短任务，这个池会很方便。因为创建线程是一项
    CPU 和内存密集型操作，我们可以从重用相同的线程实例中受益。

