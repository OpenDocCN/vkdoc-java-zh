    \ [Listing 8-15](#9781484207949_Ch08_1.xhtml#FPar18) shows a partial XML configuration\
    \ of SI flow, because so far there isn’t an annotation for the outbound channel\
    \ adapter.\n\n[***Listing 8-15***](#9781484207949_Ch08_1.xhtml#_FPar18). Partial\
    \ XML Configuration of Outbound Channel Adapter (File `si-config.xml` in Folder\
    \ `src/main/resources` of Example Project `0804-channel-adapter-generic-javaconfig`)\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \                http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int:channel id=\"inChannel\"/>\n\n<int:outbound-channel-adapter channel=\"\
    inChannel\" ref=\"writeService\" method=\"write\"/>\n</beans>\n```\n\nThis configuration\
    \ of an outbound channel adapter was already shown in a previous example. The\
    \ channel could be configured with a Java configuration, but we show that configuration\
    \ later in the examples. [Listing 8-16](#9781484207949_Ch08_1.xhtml#FPar19) shows\
    \ a Java configuration of an inbound channel adapter.\n\n[***Listing 8-16***](#9781484207949_Ch08_1.xhtml#_FPar19).\
    \ Java Configuration of Inbound Channel Adapter (`0804-channel-adapter-generic-javaconfig`)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter08.in;\nimport org.springframework.integration.annotation.InboundChannelAdapter;\n\
    import org.springframework.integration.annotation.Poller;\nimport org.springframework.stereotype.Service;\n\
    \n@Service\npublic class ReadServiceAnnotated {\n  @InboundChannelAdapter(value\
    \ = \"inChannel\",\n      poller = @Poller(fixedRate = \"1000\", maxMessagesPerPoll\
    \ = \"1\"))\n  public String read() {\n    return \"simple message\";\n  }\n}\n\
    ```\n\nIn this case, the read service method `read()` is annotated with `@InboundChannelAdapter`,\
    \ which makes it an SI message endpoint. We need to specify the mandatory `value`\
    \ attribute of this annotation to connect it to the message channel `inChannel`.\n\
    \nBecause we also want to have this component active (which means it will be actively\
    \ polling an annotated method), we configure `@Poller` with a fixed rate of 1\
    \ second for this adapter. This annotation will create a Spring scheduler under\
    \ the hood to perform active polling. With the `maxMessagesPerPoll` attribute,\
    \ we define that only one message should be read per poll.\n\n[Listing 8-17](#9781484207949_Ch08_1.xhtml#FPar20)\
    \ shows the main class of this example.\n\n[***Listing 8-17***](#9781484207949_Ch08_1.xhtml#_FPar20).\
    \ Main Application of Channel Adapters Example with Java Configuration (`0804-channel-adapter-generic-javaconfig`)\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.context.annotation.ImportResource;\nimport org.springframework.integration.config.EnableIntegration;\n\
    \n@Configuration\n@ComponentScan\n@EnableIntegration\n@ImportResource(\"classpath:si-config.xml\"\
    )\npublic class SiApplication {\n  public static void main(String[] args) throws\
    \ InterruptedException {\n    new AnnotationConfigApplicationContext(SiApplication.class);\n\
    \  }\n}\n```\n\nThis main class also acts as a Spring configuration class (`@Configuration`\
    \ annotation) and scans the current package with subpackages for Spring beans.\
    \ The `@ImportResource` annotation also plugs into this Spring context the XML\
    \ part of the SI flow. The last annotation, `@EnableIntegration`, turns on the\
    \ SI features. After running this class, we would see similar output as in [Listing\
    \ 8-14](#9781484207949_Ch08_1.xhtml#FPar17) for the `0803-channel-adapter-generic-xml`\
    \ example.\n\nThe downside of the Java configuration is that the SI flow can’t\
    \ be visualized or edited via the integration-graph editor of STS.\n\n## Nongeneric\
    \ Channel Adapters Example\n\nNow it’s time to explore adapters for external technologies.\
    \ In this case, we expose our SI flow as a REST service on the input side and\
    \ connect it to a JDBC data source on the output side. As a database, we use the\
    \ H2 database engine. When Spring Boot autoconfiguration detects it on the classpath,\
    \ it configures the `jdbcTeamplate` bean automatically. [Listing 8-18](#9781484207949_Ch08_1.xhtml#FPar21)\
    \ shows the SI configuration.\n\n[***Listing 8-18***](#9781484207949_Ch08_1.xhtml#_FPar21).\
    \ SI Configuration for Nongeneric Channel Adapters (File `si-config.xml` in Folder\
    \ `src/main/resources` of Example Project `0805-channel-adapter-non-generic`)\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:int-http=\"http://www.springframework.org/schema/integration/http\"\n\
    \  xmlns:int-jdbc=\"http://www.springframework.org/schema/integration/jdbc\"\n\
    \  xsi:schemaLocation=\"http://www.springframework.org/schema/integration/jdbc\n\
    \    http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd\n\
    \    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/integration/http\n    http://www.springframework.org/schema/integration/http/spring-integration-http.xsd\n\
    \    http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int-http:inbound-channel-adapter path=\"/\" channel=\"inChannel\" supported-methods=\"\
    POST\" />\n  <int:channel id=\"inChannel\" />\n\n<int-jdbc:outbound-channel-adapter\
    \ data-source=\"dataSource\" channel=\"inChannel\"\n    query=\"insert into TEXT_TABLE\
    \ values (:payload)\"/>\n</beans>\n```\n\nWe use the `beans` and `context` Spring\
    \ namespaces and the generic SI `int` namespace again. New namespaces are `int-http`\
    \ and `int-jdbc` to allow the use of adapters for these technologies. The first\
    \ XML element is `<int-http:inbound-channel-adapter>`. It exposes `inChannel`\
    \ as a REST endpoint, which listens to POST messages on the root URL. The payload\
    \ will be a simple string.\n\nOn the other side of `inChannel`, we configured\
    \ the connected SI to the JDBC data source via `<int-jdbc:outbound-channel-adapter>`.\
    \ This component needs to know which `data-source` bean to use for JDBC access.\
    \ In this case, we refer it to the bean with the name `dataSource`, which is created\
    \ in the Spring context (creation of it is discussed later in this section). Of\
    \ course, when we are accessing the database, we need to have a query to execute.\
    \ In this case, we use the inline `query` attribute to define it. It is a simple\
    \ `insert` into `TEXT_TABLE`, where the stored value will be used from the SI\
    \ message payload. This payload is received from the REST endpoint.\n\n[Listing\
    \ 8-19](#9781484207949_Ch08_1.xhtml#FPar22) shows initialization of the `TEXT_TABLE`\
    \ table.\n\n[***Listing 8-19***](#9781484207949_Ch08_1.xhtml#_FPar22). Initialization\
    \ of DB Table (`0805-channel-adapter-non-generic`)\n\n```java\npackage net.lkrnac.book.eiws.chapter08;\n\
    import javax.annotation.PostConstruct;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.stereotype.Repository;\n\
    ```"
  raw: 'Next we will show how to configure the same flow with a Java configuration.
    [Listing 8-15](#9781484207949_Ch08_1.xhtml#FPar18) shows a partial XML configuration
    of SI flow, because so far there isn’t an annotation for the outbound channel
    adapter.


    [***Listing 8-15***](#9781484207949_Ch08_1.xhtml#_FPar18). Partial XML Configuration
    of Outbound Channel Adapter (File si-config.xml in Folder src/main/resources of
    Example Project 0804-channel-adapter-generic-javaconfig)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

                    http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:channel id="inChannel"/>


    <int:outbound-channel-adapter channel="inChannel" ref="writeService" method="write"/>

    </beans>

    ```


    This configuration of an outbound channel adapter was already shown in a previous
    example. The channel could be configured with a Java configuration, but we show
    that configuration later in the examples. [Listing 8-16](#9781484207949_Ch08_1.xhtml#FPar19)
    shows a Java configuration of an inbound channel adapter.


    [***Listing 8-16***](#9781484207949_Ch08_1.xhtml#_FPar19). Java Configuration
    of Inbound Channel Adapter (0804-channel-adapter-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08.in;

    import org.springframework.integration.annotation.InboundChannelAdapter;

    import org.springframework.integration.annotation.Poller;

    import org.springframework.stereotype.Service;


    @Service

    public class ReadServiceAnnotated {

      @InboundChannelAdapter(value = "inChannel",

          poller = @Poller(fixedRate = "1000", maxMessagesPerPoll = "1"))

      public String read() {

        return "simple message";

      }

    }

    ```


    In this case, the read service method `read()` is annotated with `@InboundChannelAdapter`,
    which makes it an SI message endpoint. We need to specify the mandatory `value`
    attribute of this annotation to connect it to the message channel `inChannel`.


    Because we also want to have this component active (which means it will be actively
    polling an annotated method), we configure `@Poller` with a fixed rate of 1 second
    for this adapter. This annotation will create a Spring scheduler under the hood
    to perform active polling. With the `maxMessagesPerPoll` attribute, we define
    that only one message should be read per poll.


    [Listing 8-17](#9781484207949_Ch08_1.xhtml#FPar20) shows the main class of this
    example.


    [***Listing 8-17***](#9781484207949_Ch08_1.xhtml#_FPar20). Main Application of
    Channel Adapters Example with Java Configuration (0804-channel-adapter-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.context.annotation.AnnotationConfigApplicationContext;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.annotation.ImportResource;

    import org.springframework.integration.config.EnableIntegration;


    @Configuration

    @ComponentScan

    @EnableIntegration

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        new AnnotationConfigApplicationContext(SiApplication.class);

      }

    }

    ```


    This main class also acts as a Spring configuration class (`@Configuration` annotation)
    and scans the current package with subpackages for Spring beans. The `@ImportResource`
    annotation also plugs into this Spring context the XML part of the SI flow. The
    last annotation, `@EnableIntegration`, turns on the SI features. After running
    this class, we would see similar output as in [Listing 8-14](#9781484207949_Ch08_1.xhtml#FPar17)
    for the `0803-channel-adapter-generic-xml` example.


    The downside of the Java configuration is that the SI flow can’t be visualized
    or edited via the integration-graph editor of STS.


    Nongeneric Channel Adapters Example


    Now it’s time to explore adapters for external technologies. In this case, we
    expose our SI flow as a REST service on the input side and connect it to a JDBC
    data source on the output side. As a database, we use the H2 database engine.
    When Spring Boot autoconfiguration detects it on the classpath, it configures
    the `jdbcTeamplate` bean automatically. [Listing 8-18](#9781484207949_Ch08_1.xhtml#FPar21)
    shows the SI configuration.


    [***Listing 8-18***](#9781484207949_Ch08_1.xhtml#_FPar21). SI Configuration for
    Nongeneric Channel Adapters (File si-config.xml in Folder src/main/resources of
    Example Project 0805-channel-adapter-non-generic)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:int-http="http://www.springframework.org/schema/integration/http"

      xmlns:int-jdbc="http://www.springframework.org/schema/integration/jdbc"

      xsi:schemaLocation="http://www.springframework.org/schema/integration/jdbc

        http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd

        http://www.springframework.org/schema/beans

