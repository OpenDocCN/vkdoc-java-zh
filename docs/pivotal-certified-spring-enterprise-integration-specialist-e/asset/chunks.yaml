- fmt: "# Chapter 5\n\n![image](images/frontdot.jpg)\n\n## Java Message Service\n\n\
    The enterprise integration technology explained in this chapter is the Java Message\
    \ Service (`JMS`). It is different from the technologies discussed in previous\
    \ chapters, because it is an inherently asynchronous technology for exchanging\
    \ messages.\n\nIn the remoting, REST, and SOAP web services approaches, a client\
    \ sends a request and waits for a server response. Waiting for a response can\
    \ be implemented synchronously (the client thread is blocked until a response\
    \ is received or times out) or asynchronously (the client registers callback logic,\
    \ which is executed when the response arrives or the communication times out).\
    \ But the HTTP communication between them remains open, at least until the client\
    \ receives a response.\n\n`JMS` is different, because it doesn’t follow this approach\
    \ of request-response. Looking deeper, communication counterparts in `JMS` communication\
    \ can’t be characterized as a client/server relationship at all. `JMS` is a technology\
    \ whereby a producer sends a message to a consumer. But the message is not directly\
    \ sent to the consumer via a socket connection.\n\nA special middle component\
    \ is used in `JMS` communication, called a *destination*. We can think of it as\
    \ storage for messages. The producer sends a message to this destination and then\
    \ doesn’t care about this message anymore. The message is stored in the destination\
    \ and sits there until it gets attention from a consumer or consumers. When the\
    \ consumer is ready, it reads the message from the destination. So the producer\
    \ and consumer are *highly decoupled* from each other: they don’t need to know\
    \ anything about the other side of this communication. The only important aspect\
    \ is to know how to send/receive the message to/from destination.\n\nSuch communication\
    \ is *asynchronous*, because the producer doesn’t wait for the consumer to receive\
    \ the message. There is no guarantee that the message will be delivered at all.\
    \ If there’s no application consuming messages from the destination, the message\
    \ could sit in the destination theoretically forever.\n\nAnother important attribute\
    \ of this type of communication is *reliability*. As we mentioned, the destination\
    \ stores messages. It is obvious that storing messages requires a specialized\
    \ server that can store them. This server is often called a *message broker*.\
    \ It is specialized middleware, which can provide various destinations and can\
    \ store messages in persistent storage if needed.\n\nThe Java Message Service\
    \ is part of the Java Enterprise Edition standard, and therefore each JEE-compliant\
    \ application server can also perform the role of a message broker. But you may\
    \ wonder now, what about lightweight Spring applications? These applications are\
    \ often hosted only on servlet containers without message broker capabilities.\
    \ In these cases, projects focusing only on a stand-alone `JMS` implementation\
    \ could be embedded into the Spring application if needed. But for most architectures,\
    \ it makes sense to host the `JMS` parts as separate components of the enterprise\
    \ system.\n\nThe following are main `JMS` providers:\n\n*   Apache ActiveMQ\n\
    *   HornetQ (JBoss)\n*   JBoss Messaging (JBoss)\n*   WebSphere MQ (IBM)\n*  \
    \ WebSphere Application Server (IBM)\n*   SonicMQ (Progress Software)\n*   Oracle\
    \ WebLogic\n*   Oracle Advanced Queuing (AQ)\n*   Open Message Queue (Oracle)\n\
    *   FFMQ\n*   TIBCO Enterprise Message Service\n*   OpenJMS\n\nAll these `JMS`\
    \ providers are often referred to as *message-oriented middleware* (*MOM*). Some\
    \ of them are full JEE-compliant application servers, and others implement only\
    \ the `JMS` part of the JEE standard. So another significant difference in comparison\
    \ to client/server communication is operational overhead for managing the message\
    \ broker in the middle of the communication. If we are using a full JEE application\
    \ server, this operational overhead is not huge, because the message broker is\
    \ hosted with the JEE application server on the same server. But if we are using\
    \ a lightweight solution (which is the case with most Spring applications), we\
    \ can host a `JMS` message broker as a stand-alone server instance or embed it\
    \ into the Spring application.\n\n`JMS` messaging is often useful when we need\
    \ to throttle messages between a producer and consumer. Also it is often used\
    \ as temporary storage for streamed data, because we can easily replay all the\
    \ messages if needed. Its reliability as a storage system for messages makes it\
    \ a popular choice for caching data that enters our enterprise system.\n\nWhen\
    \ the producer and consumer are decoupled via a `JMS` destination, we can easily\
    \ change the infrastructure routing between them without triggering any changes\
    \ to either side of the communication. Moreover, when the consumer and receiver\
    \ don’t know about each other, we can easily plug in some logic in between their\
    \ communication channels—for example, filtering or transforming messages. All\
    \ these aspects make `JMS` messaging an excellent choice for decoupling components\
    \ in an enterprise system.\n\n## JMS Standard Overview\n\nAs part of Java Enterprise\
    \ Edition, the Java Message Service provides a standardized API for message exchange.\
    \ This is handy because it eliminates problems related to locking into a particular\
    \ messaging middleware vendor and significantly decreases the cost of migrating\
    \ to a different `JMS` provider. It also enables reuse of the developer’s knowledge\
    \ across various `JMS` providers.\n\nThese two messaging paradigms are supported\
    \ by `JMS`:\n\n*   **Point-to-point**\n    *   The destination is in this case\
    \ called the *message queue*.\n    *   Each message can have *exactly one consumer*.\n\
    \    *   When a message is successfully consumed from the message queue, it is\
    \ discarded.\n    *   There are two types of point-to-point communication:\n \
    \       *   *Unidirectional (sending only)*—As `JMS` is highly decoupled, no special\
    \ features are needed.\n        *   *Bidirectional (request-reply)*—Is supported\
    \ via correlation IDs, contained within the request and response messages.\n\n\
    *   **Publish/subscribe**\n    *   The destination is in this case called the\
    \ *message topic*.\n    *   The message is consumed by *all subscribers* (consumers).\n\
    \    *   The message is discarded from the `JMS` server only after all subscribers\
    \ have successfully consumed the message.\n\nThese `JMS` messaging paradigms relate\
    \ to the type of destination. But it is important to remember that there can be\
    \ various producers sending messages as well as various consumers receiving messages.\
    \ So it is a valid configuration to have various producers sending messages to\
    \ a point-to-point queue. It is also valid to have various receivers consuming\
    \ messages from a point-to-point queue, but a particular message typically would\
    \ be consumed by only one of them randomly.\n\n`JMS` messages can be consumed\
    \ in two ways:"
  raw: "Subsequently, the chapter presented Spring MVC features. Examples of how to\
    \ configure and route messages should provide a decent foundation for REST development\
