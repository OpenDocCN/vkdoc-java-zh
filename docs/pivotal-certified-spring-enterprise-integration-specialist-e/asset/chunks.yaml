    此行为与上一个示例类似。唯一的区别在于，我们显式请求接收，而在上一个示例中，Spring 在 `DefaultJmsListenerContainerFactory`
    内部为我们完成了此操作。实际上，从 JMS 提供者的角度来看，这两个示例都是同步的。


    ### CLIENT_ACKNOWLEDGE 模式


    如前所述，使用 `CLIENT_ACKNOWLEDGE` 模式时，客户端负责显式确认一条或一批消息。如果我们批量使用客户端确认，则会减少对 JMS 提供者服务器的调用次数，从而节省一些带宽。


    但是，Spring 的 `JmsTemplate` 设计会在消息返回给我们的逻辑之前对其进行确认。因此，`CLIENT_ACKNOWLEDGE` 模式在 Spring
    中用于同步消息接收时，其工作方式与使用 `AUTO_ACKNOWLEDGE` 完全相同。因此，使用此模式配置 `JmsTemplate` 没有实际意义。Spring
    文档并未明确说明为何存在这种行为，因此我们避免对此进行任何推测。


