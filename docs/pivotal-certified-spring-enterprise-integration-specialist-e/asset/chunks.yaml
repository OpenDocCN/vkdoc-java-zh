  trans: "\n该类通过构造函数接收两个属性。首先，`executorService` 代表用于管理并发执行的线程池。我们使用 `java.util.concurrent.ExecutorService`\
    \ 的实例，以便能够针对不同的线程池执行并发处理。第二个构造函数参数指定了要在该线程池上执行的任务数量。\n\n并发执行本身发生在 `executeTasks()`\
    \ 方法中。开始时，它创建了一个 `Future` 实例的集合，用于收集并发任务的结果。之后，它将执行开始时间保存到变量 `start` 中。随后，在 `for`\
    \ 循环中，它逐个将 `SimpleTask` 提交到线程池执行。`Future` 结果被收集到 `results` 集合中。在此阶段，线程池开始并行执行任务。\n\
    \n当所有任务都已提交执行，并且我们的工作正在后台处理时，包含了两个可用于礼貌地关闭线程池（不中断所有当前正在运行的线程）的命令。调用 `executorService.shutdown()`\
    \ 后，线程池将拒绝进一步的任务提交。调用 `awaitTermination` 后，当前线程将被阻塞，直到线程池中的最后一个线程完成其执行。\n\n最后，我们遍历并发任务执行的结果，并将其记录到控制台。每个结果的类型都是\
    \ `java.util.concurrent.Future`；因此，调用 `result.get()` 会等待线程完成（如果它仍在运行）。在我们的例子中并非如此，因为我们已经通过调用\
    \ `awaitTermination` 对所有线程执行了此操作。您可能会注意到，即使没有 `awaitTermination` 调用，行为实际上也是相同的，因为读取结果也会等待线程。\n\
    \n调用 `result.get()` 可能会携带来自并行逻辑的异常；因此，我们捕获它们并将错误消息记录到控制台。从并发逻辑返回值并向上冒泡异常的能力是 Java\
    \ SE 5 中通过 `java.util.concurrent` 包引入的一大优势。\n\n最后，我们将并行处理的耗时写入控制台。这使我们能够比较各种线程池的实现。剩余的类是主要的\
    \ Java 并发示例，如清单 1-8 所示。\n\n***清单 1-8***。并发示例的主类 (0101-java-concurrency)\n\n```\n\
    package net.lkrnac.book.eiws.chapter01.javaconcurrency;\n\nimport java.util.concurrent.ExecutorService;\n\
    import java.util.concurrent.Executors;\n\npublic final class Application {\n  private\
    \ static final int EXEC_COUNT = 10;\n\npublic static void main(String... args)\
    \ throws InterruptedException {\n    ExecutorService fixedThreadPool = Executors.newFixedThreadPool(EXEC_COUNT);\n\
        SimpleTaskExecutor executorFast = new SimpleTaskExecutor(fixedThreadPool,\
    \ EXEC_COUNT);\n    executorFast.executeTasks();\n\nExecutorService workStealingPool\
    \ = Executors.newWorkStealingPool();\n    SimpleTaskExecutor executorSlow = new\
    \ SimpleTaskExecutor(workStealingPool, EXEC_COUNT);\n    executorSlow.executeTasks();\n\
      }\n}\n```\n\n主类指定要执行的任务数量为 10。`main` 方法首先创建一个包含 10 个固定线程的固定线程池。然后我们创建 `SimpleTaskExecutor`\
    \ 来在此线程池上执行 10 个任务。最后，我们再次执行 10 个任务，但这次是在 `ForkJoinPool` 上。当我们运行这个小应用程序时，控制台输出可能如清单\
    \ 1-9 所示。\n\n***清单 1-9***。Java 并发示例的控制台输出\n\n```\npool-1-thread-1 generated number\
    \ -1212896919\njava.lang.UnsupportedOperationException: pool-1-thread-2 threw\
    \ exception\njava.lang.UnsupportedOperationException: pool-1-thread-3 threw exception\n\
    pool-1-thread-4 generated number -776274655\njava.lang.UnsupportedOperationException:\
    \ pool-1-thread-5 threw exception\npool-1-thread-6 generated number 233198511\n\
    pool-1-thread-7 generated number -1552830437\npool-1-thread-8 generated number\
    \ -819640425\npool-1-thread-9 generated number -144950271\npool-1-thread-10 generated\
    \ number 2002956537\nElapsed time: 1091\nForkJoinPool-1-worker-1 generated number\
    \ 1209832625\njava.lang.UnsupportedOperationException: java.lang.UnsupportedOperationException:\
    \ ForkJoinPool-1-worker-2 threw exception\nForkJoinPool-1-worker-3 generated number\
    \ 2024148305\nForkJoinPool-1-worker-0 generated number 39272021\njava.lang.UnsupportedOperationException:\
    \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-1 threw exception\n\
    ForkJoinPool-1-worker-2 generated number -281172827\njava.lang.UnsupportedOperationException:\
    \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-3 threw exception\n\
    ForkJoinPool-1-worker-0 generated number 36551191\njava.lang.UnsupportedOperationException:\
    \ java.lang.UnsupportedOperationException: ForkJoinPool-1-worker-1 threw exception\n\
    java.lang.UnsupportedOperationException: java.lang.UnsupportedOperationException:\
    \ ForkJoinPool-1-worker-2 threw exception\nElapsed time: 3005\n```\n\n请注意，在不同线程池上执行相同并发处理所花费的时间存在巨大差异。您可能还记得，我们的并发任务（清单\
    \ 1-6）包含一个延迟，模拟了 1000 毫秒的阻塞 I/O 操作。固定线程池（池大小为 10）能够在提交后立即并行执行 10 个给定的任务。因此，在 1\
    \ 秒的阻塞 I/O 延迟之后，所有线程完成，整个并行执行仅花费略多于 1 秒的时间。实际上，CPU 大部分时间都在等待阻塞 I/O 操作完成。\n\n第二个\
    \ `ForkJoinPool` 仅使用四个线程执行，因为运行它的机器有四个 CPU 核心。因此，在四个线程已经运行后，后续提交的任务将在队列中等待获取空闲的线程池工作线程。此时，只能处理四个任务。所以简单的数学计算解释了为什么在\
    \ `ForkJoinPool` 上的第二次并行执行花费了 3 秒。\n\n这样的场景说明了理解线程池所执行任务性质的重要性。通常，如果正在处理 I/O 密集型操作，我们希望增加线程池大小（但不要过大）。或者，在\
    \ CPU 密集型操作的情况下，我们可以使线程池大小尽可能接近可用的核心数。但这并非适用于所有情况的通用规则。应进行性能测试或基准测试。请记住，您可以在应用程序中为不同目的使用不同的线程池，因此了解整个应用程序在负载下的行为至关重要。\n\
    \nJava EE\n\n在 Java 平台企业版（Java EE）中，使用 Java SE 并发 API 被认为是不良实践。直到 Java EE 7，企业开发人员都无法使用任何可由容器管理的特定并发\
    \ API（并发应完全由应用程序容器处理）。由于 Java EE 标准未提供任何并发支持，因此创建了特定于应用程序容器的各种机制：\n\n*   CommonJ\n\
    \    *   WebSphere\n    *   WebLogic\n*   Java EE 连接器架构（JCA）工作管理器\n    *   JBoss（现为\
    \ WildFly）\n    *   GlassFish\n\nJava EE 7 最终引入了并发工具，允许应用程序开发人员使用受管理的并发 API。\n"
- fmt: '![Image](images/sq.jpg) **Note** Java EE 7 Concurrency Utilities are beyond
    the scope of this book. Please refer to the Java EE 7 tutorial for more information:
    `http://docs.oracle.com/javaee/7/tutorial/concurrency-utilities.htm#GKJIQ8`.


    ## Task Scheduling


    Some use cases require scheduling of tasks for later execution. For this purpose,
    Java has the interface `java.util.concurrent.ScheduledExecutorService`, shown
    in [Listing 1-10](#9781484207949_Ch01.xhtml#FPar13).


    [***Listing 1-10***](#9781484207949_Ch01.xhtml#_FPar13). `ScheduledExecutorService`
    Interface Signature


    ```

    public interface ScheduledExecutorService extends ExecutorService {

        public ScheduledFuture<?> schedule(Runnable command,

                                           long delay, TimeUnit unit);


    public <V> ScheduledFuture<V> schedule(Callable<V> callable,

                                               long delay, TimeUnit unit);

        public ScheduledFuture<?> scheduleAtFixedRate(Runnable command,

                                                      long initialDelay,

                                                      long period,

                                                      TimeUnit unit);

        public ScheduledFuture<?> scheduleWithFixedDelay(Runnable command,

                                                         long initialDelay,

                                                         long delay,

                                                         TimeUnit unit);

    }

    ```


    The important mechanisms are the last two methods. They facilitate recurring scheduling,
    whereby a task is triggered at certain time intervals. This is most commonly used
    for batch processing of jobs that doesn’t involve user interaction. Two important
    scheduling configurations are available:


    *   *Fixed Delay*: The time between the end time of the previous thread and the
    start of subsequent execution is specified (think of it as a constant gap between
    scheduled threads). The next start time is hard to predict because it depends
    on the end time of the previous execution.

    *   *Fixed Rate*: The start time of each scheduled thread is specified. So the
    gap between threads varies. If thread execution time is longer than the scheduled
    rate, the start time of the next task execution is delayed until the previous
    one finishes. So scheduled tasks wouldn’t be executed concurrently.


    With this support, we can schedule implementations of the `java.lang.Runnable`
    and `java.util.concurrent.Callable<V>` interfaces. But notice that we are not
    able to schedule `java.util.concurrent.Callable<V>` for recurring scheduling.


    Implementation of a scheduled thread pool is `java.util.concurrent.ScheduledThreadPoolExecutor`.
    It can be created via its constructor or via a factory method provided by the
    class `java.util.concurrent.Executors`. The signature of this factory method is
    shown in [Listing 1-11](#9781484207949_Ch01.xhtml#FPar14).


    [***Listing 1-11***](#9781484207949_Ch01.xhtml#_FPar14). Partial `Executors` Class
    Signature—Scheduling Factory Method


    ```

    package java.util.concurrent;


    public class Executors {

        ...

        public static ScheduledExecutorService newScheduledThreadPool(int corePoolSize);

        ...

    }

    ```


    Let’s explore how we would use this mechanism. [Listing 1-12](#9781484207949_Ch01.xhtml#FPar15)
    highlights a simple task as an implementation of the `java.lang.Runnable` interface.


    [***Listing 1-12***](#9781484207949_Ch01.xhtml#_FPar15). Simple Task (0104-java-scheduling)


    ```

    package net.lkrnac.book.eiws.chapter01.javascheduling;


    import java.text.DateFormat;

    import java.text.SimpleDateFormat;

    import java.util.Date;

    import java.util.Locale;


    public class ScheduledTask implements Runnable {

      private final DateFormat dateFormat = new SimpleDateFormat("HH:mm:ss:SSS",

          Locale.getDefault());


    public void run() {

        System.out.println(dateFormat.format(new Date()) + " - job kicked off");

      }

    }

