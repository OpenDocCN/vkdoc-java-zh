    JobParameters


    There is often a requirement to pass parameters into a batch `Job`. Imagine we
    need to process data with an attribute-created date. We may want to specify a
    date parameter for batch processing, so that only data created on the specified
    date will be processed.


    SB provides this support via the `JobParameters` class, which can be passed into
    the `JobLauncher.run()` method. This class encapsulates parameters into `Map<String,
    JobParameter>`. So each parameter has its name (key), and the value can be any
    Java type. Notice that the value in the map is the type `JobParameter` (singular),
    which represents a single batch `Job` parameter. `JobParameters` (plural) represents
    all parameters for one `JobInstance`.'
