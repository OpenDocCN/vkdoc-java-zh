    The master configuration also imports the JMS configuration to be able to send
    commands and receive responses from slaves. The `dataSource` bean accesses a shared
    database hosted in the `0940-remote-partitioning-sql-server` example project.


    The SB job definition follows. For `Step`, we use the `<batch:partition>` construct
    to define the remote execution for this processing. We need to define two properties
    here. A reference to the partitioner is covered by our work distribution algorithm
    in `RecordsPartitioner` from the previous listing.


    The second bean used in the job is `partitionHandler`. This is the main bean of
    the master processing of type `MessageChannelPartitionHandler`, because it coordinates
    the slave processing via messaging middleware. We define `gridSize` (the number
    of partitions to process), `stepName` (the name of the step to execute in the
    slave processes), and `replyChannel` (the Spring Integration channel where the
    master expects replies from the slave processes). The last parameter of `partitionHandler`
    specifies the `MessagingTemplate` instance that will be used for communication
    with slaves.


    This communication uses Spring Integration’s JMS outbound channel adapter `outMasterAdapter`
    connected to the JMS queue master commands. Responses from slaves are received
    from the JMS queue `slaveResponses`, temporarily stored in the Spring Integration
    `QueueChannel` named `inMasterAggregatedChannel`. So this channel is asynchronous.
    The last component is a Spring Integration aggregator using, again, `partitionHandler`
    to aggregate slave responses.


    [Listing 9-139](#9781484207949_Ch09_3_Ext.xhtml#FPar144) shows the main class
    of the master application.


    [***Listing 9-139***](#9781484207949_Ch09_3_Ext.xhtml#_FPar144). Main Class of
    Master Project for Remote Partitioning Example (0940-remote-partitioning-master)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.ImportResource;

    import org.springframework.scheduling.annotation.EnableScheduling;


    @SpringBootApplication

    @EnableBatchProcessing

    @EnableScheduling

    @ImportResource("classpath:batch-config.xml")

    public class BatchApplication {

      public static void main(String[] args) throws InterruptedException {

        SpringApplication.run(BatchApplication.class, args);

      }

    }

    ```


    Alongside importing the master Spring configuration, this Spring Boot main class
    needs to enable batch processing and enable scheduling for asynchronous polling
    of `inMasterAggregatedChannel` by the `partitionHandler` bean.


    Executing Remote Partitioning Example


    It is obvious that this last example is the most complicated in the entire book.
    When we execute it, the load balancing between slaves is natural; the least busy
    slave will read the messages from the `masterCommands` JMS queue first. So this
    least busy slave will perform the processing. In real life, this load balancing
    is fine.


    But my machine has four cores, and when I use two slave processes with two partitions,
    they are mostly processed by the same process, and the second slave lays there
    unused. Therefore, we will run three slave processes to increase the possibility
    of dividing the load into separate slave processes.


    To execute this example we need to do the following:


    *   Start a HornetQ server with the same configuration as in the previous example
    ([Listing 9-122](#9781484207949_Ch09_3_Ext.xhtml#FPar126)).

    *   Start a SQL server via the `SqlServerApplication` class from the example project
    `0940-remote-partitioning-sql-server`.

    *   Start three slave processes via `BatchSlaveApplication` from example project
    `0940-remote-partitioning-slave`. Just run the same project three times.

    *   Start the master process via `BatchConfiguration` from example project `0940-remote-partitioning-master`.


    After running this sequence, we can observe master process output similar to [Listing
    9-140](#9781484207949_Ch09_3_Ext.xhtml#FPar145).


