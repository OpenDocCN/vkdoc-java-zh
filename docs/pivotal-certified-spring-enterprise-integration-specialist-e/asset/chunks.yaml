  raw: 'In this configuration, we use the `tx` namespace to enable the `@Transactional`
    annotation under the umbrella of the JTA transaction manager. The JTA bean definition
    follows with use of the `bean` namespace. The first bean we need to create is
    `com.atomikos.icatch.jta.UserTransactionManager` as the global transaction manager.
    We already mentioned that Spring doesn’t have JTA capability built in, so we need
    help of an external JTA framework.


    To integrate the Atomikos global transaction manager into the Spring application
    as `PlatformTransactionManager`, we need to wrap it into Spring’s `JtaTransactionManager`.
    This allows us to take advantage of Spring’s transaction JTA support on top of
    the Atomikos implementation. An important configuration step is creation of `com.atomikos.icatch.jta.UserTransactionImp`,
    which starts the Atomikos transaction service. Configuring this for the Java SE
    environment is important. For a Java EE drive application, we would use `com.atomikos.icatch.jta.J2eeUserTransaction`.


    [Listing 7-5](#9781484207949_Ch07.xhtml#FPar6) shows configuration of the JDBC
    data source.


    [***Listing 7-5***](#9781484207949_Ch07.xhtml#_FPar6). XML Configuration of JDBC
    XA Data Source (File spring-jdbc-config.xml in Folder src/main/resources in Example
    Project 0701-jta-xml-config)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <bean id="dataSource" class="com.atomikos.jdbc.AtomikosDataSourceBean">

        <property name="uniqueResourceName" value="jdbcDataSource" />

        <property name="xaDataSource">

          <bean class="org.h2.jdbcx.JdbcDataSource">

            <property name="url"

              value="jdbc:h2:mem:testdb"/>

            <property name="user" value="sa"/>

          </bean>

        </property>

      </bean>


    <bean id="jdbcTemplate" class="org.springframework.jdbc.core.JdbcTemplate">

        <property name="dataSource" ref="dataSource"/>

      </bean>

    </beans>

    ```


    Here we use only the `bean` Spring XML namespace for defining Spring beans. First,
    we create an XA data source bean based on the `com.atomikos.jdbc.AtomikosDataSourceBean`
    implementation that Atomikos provides. This implementation is needed to properly
    work with the JTA global transaction manager. `uniqueResourceName` is a mandatory
    parameter, which needs to be unique in case we have various XA data sources of
    this type in the application. So the value `jdbcDataSource` is just fine for our
    example.


    In the `xaDataSource` property, we wrap the local data source implementation.
    This wrapper is needed to allow the classical JDBC data source to participate
    in a global transaction. In this case, we are using an in-memory H2 database engine,
    as mentioned in the classical JDBC data source. We also need to wrap this bean
    into the `JdbcTemplate` bean to enable Spring JDBC support on top of this XA data
    source. So the `JdbcTemplate` doesn’t have a clue that it is dealing with an XA
    data source. [Listing 7-6](#9781484207949_Ch07.xhtml#FPar7) shows the JMS configuration.


    [***Listing 7-6***](#9781484207949_Ch07.xhtml#_FPar7). XML Configuration of JMS
    XA Data Source (File spring-jms-config.xml in Folder src/main/resources in Example
    Project 0701-jta-xml-config)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:jee="http://www.springframework.org/schema/jee"

      xmlns:util="http://www.springframework.org/schema/util"

      xmlns:jms="http://www.springframework.org/schema/jms"

      xsi:schemaLocation="http://www.springframework.org/schema/jms

        http://www.springframework.org/schema/jms/spring-jms.xsd

        http://www.springframework.org/schema/jee

        http://www.springframework.org/schema/jee/spring-jee.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/util

        http://www.springframework.org/schema/util/spring-util.xsd">


    <util:map id="jndiProperties" map-class="java.util.Properties">

        <entry key="java.naming.factory.initial"

          value="org.jnp.interfaces.NamingContextFactory" />

        <entry key="java.naming.factory.url.pkgs"

          value="org.jboss.naming:org.jnp.interfaces" />

        <entry key="java.naming.provider.url" value="jnp://localhost:1099" />

      </util:map>


    <jee:jndi-lookup id=" " jndi-name="/ConnectionFactory"

        environment-ref="jndiProperties" />

      <jee:jndi-lookup id="connectionFactory" jndi-name="/XAConnectionFactory"

        environment-ref="jndiProperties" />

      <jee:jndi-lookup id="queue" jndi-name="/queue/ExpiryQueue"

        environment-ref="jndiProperties" />


    <bean id="jmsTemplate" class="org.springframework.jms.core.JmsTemplate">

        <constructor-arg ref="connectionFactory" />

      </bean>


    <bean id="destinationResolver"

        class="org.springframework.jms.support.destination.JndiDestinationResolver">

        <property name="jndiEnvironment" ref="jndiProperties" />

      </bean>


    <jms:listener-container transaction-manager="transactionManager" acknowledge="transacted"

          destination-resolver="destinationResolver">

        <jms:listener destination="/queue/ExpiryQueue" ref="simpleMessageListener"

          method="readMessage" />

      </jms:listener-container>

    </beans>

    ```


    In this case, we use various Spring XML namespaces. The `util` namespace helps
    us define necessary JNDI properties for the HornetQ connection, and the `jee`
    namespace is needed for JNDI lookup of these properties. We already saw this configuration
    in the preceding chapter. But this example uses connector factory beans; notice
    that the default HornetQ configuration contains `XAConfigurationFactory` and also
    plain `ConfigurationFactory`. Use of `XAConnectionFactory` ensures that the `connectionFactory`
    JMS data source will be XA compliant and thus can participate in a global transaction.
    The `nonXaJmsConnectionFactory` bean is used by the `SimpleMessageSender` bean
    to send a message for the JTA example. This connection factory doesn’t participate
    in the JTA transaction, as it would confuse the example’s behavior.


    The HornetQ JMS server has both connection factories specified in its default
    configuration. [Chapter 6](#9781484207949_Ch06.xhtml), explained how easy it is
    to download and start the HornetQ server. So if you are interested, the default
    configuration for `XAConnectionFactory` and `ConnectionFactory` can be found in
    the configuration file `<hornet>/config/stand-alone/non-clustered/hornetq-jms.xml`.


    The next step is wrapping this connection factory into the `JmsTemplate` bean.
    This allows us to send (or synchronously receive) JMS messages. The `DestinationResolver`
    bean is needed to work with JNDI lookup properties to find the JMS destination
    we are planning to send and read from.'
