    `ScheduledThreadPoolExecutor` with only one worker thread is created via the `Executors.newScheduledThreadPool(1)`
    factory method call. Subsequently, a `SimpleTask` instance is scheduled at a fixed
    rate of 1 second with no initial delay. If we run the `schduleTask()` method of
    `SimpleScheduler`, console output would look like [Listing 1-14](#9781484207949_Ch01.xhtml#FPar17).


