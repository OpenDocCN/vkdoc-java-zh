  raw: '[***Listing 9-39***](#9781484207949_Ch09_1.xhtml#_FPar42). Batch Configuration
    for Example that runs Job from SLI with Parameters (0910-job-parameters-cli)


    ```

    package net.lkrnac.book.eiws.chapter09;


    import net.lkrnac.book.eiws.chapter09.step.tea.AddTeaWithParameter;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;

    import net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;


    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater)
    {

        return stepFactory.get("boilWaterStep").tasklet(boilWater).build();

      }


    @Bean

      public Step addTeaStep(StepBuilderFactory stepFactory, AddTeaWithParameter addTea)
    {

        return stepFactory.get("addTeaStep").tasklet(addTea).build();

      }


    @Bean

      public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)
    {

        return stepFactory.get("addWaterStep").tasklet(addWater).build();

      }


    @Bean

      public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,

          @Qualifier("boilWaterStep") Step boilWaterStep,

          @Qualifier("addTeaStep") Step addTeaStep,

          @Qualifier("addWaterStep") Step addWaterStep) {

        return jobBuilderFactory.get("prepareTeaJob")

            .start(boilWaterStep)

            .next(addTeaStep)

            .next(addWaterStep)

            .build();

      }


    @Bean

      public Job prepareStrongTeaJob(JobBuilderFactory jobBuilderFactory,

          @Qualifier("boilWaterStep") Step boilWaterStep,

          @Qualifier("addTeaStep") Step addTeaStep,

          @Qualifier("addWaterStep") Step addWaterStep) {

        return jobBuilderFactory.get("prepareStrongTeaJob")

            .start(boilWaterStep)

            .next(addTeaStep)

            .next(addTeaStep)

            .next(addWaterStep)

            .build();

      }

    }

    ```


    We create two `Job`s for tea preparation. The first one, `prepareTeaJob`, uses
    only one `AddTeaWithParameter Tasklet`. The second one adds tea twice (has two
    steps with `AddTeaWithParameter`), so that we can have stronger tea. Two jobs
    are defined to highlight Spring Boot features to specify which `Job` should be
    run from the command line. [Listing 9-40](#9781484207949_Ch09_1.xhtml#FPar43)
    shows the main class of this application.


    [***Listing 9-40***](#9781484207949_Ch09_1.xhtml#_FPar43). Main Class of Example
    that Runs Job from SLI with Parameters (0910-job-parameters-cli)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;


    @SpringBootApplication

    public class BatchApplication {

      public static void main(String[] args) throws Exception {

        SpringApplication.run(BatchApplication.class, args);

      }

    }

    ```


    Notice that this main class is different from the standard Spring Boot main class
    in [Listing 9-8](#9781484207949_Ch09_1.xhtml#FPar9), because it passes command-line
    arguments from the main method to the `SpringApplication.run()` method as a second
    parameter. After we build the artifact of the fat JAR, we can execute the job
    or various jobs from the CLI. [Listing 9-41](#9781484207949_Ch09_1.xhtml#FPar44)
    shows the CLI command whereby all the jobs will run with parameters passed from
    the command line.


    [***Listing 9-41***](#9781484207949_Ch09_1.xhtml#_FPar44). Executing SB Jobs with
    Parameters from Command Line (File runFromCli.sh in Example Project 0910-job-parameters-cli)


    ```

    java -jar target/0910-job-parameters-cli-0.0.2-SNAPSHOT.jar sugarAmount="no sugar"

    ```


    In this command, we don’t specify a job name to execute. Therefore, Spring Boot
    by default executes all jobs. Running this command provides the output in [Listing
    9-42](#9781484207949_Ch09_1.xhtml#FPar45).


