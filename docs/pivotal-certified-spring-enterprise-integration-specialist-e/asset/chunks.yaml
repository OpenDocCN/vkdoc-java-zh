    import org.springframework.stereotype.Component;\n\n@Slf4j\n@Component\npublic\
    \ class SimpleMessageSender {\n  private static final String SIMPLE_MESSAGE =\
    \ \"simple message\";\n  private JmsTemplate jmsTemplate;\n\n@Autowired\n  public\
    \ SimpleMessageSender(JmsTemplate jmsTemplate) {\n    super();\n    this.jmsTemplate\
    \ = jmsTemplate;\n  }\n\n@Scheduled(fixedRate = 1000)\n  public void send() {\n\
        log.info(\"Sending message: {}\", SIMPLE_MESSAGE);\n    this.jmsTemplate.convertAndSend(\"\
    queue/ExpiryQueue\", SIMPLE_MESSAGE);\n  }\n}\n```\n"
- fmt: '`SimpleMessageSender`类是一个Spring Bean，由`@Component`注解定义。`@Slf4j`是Lombok提供的便捷快捷方式，用于创建SLF4J日志记录器常量。我们通过构造函数注入将`jmsTemplate`实例注入到这个Spring
    Bean中。


    通过`send`方法，我们将每秒发送一条简单的JMS消息。`@Scheduled`注解确保了`send`方法的定期执行。在方法体中，我们首先记录消息，然后调用`jmsTemplate.convertAndSend`方法。需要将`Spring`转换为`Message`实例，这一转换由`SimpleMessageConverter`完成。


    [清单5-23](#9781484207949_Ch05.xhtml#FPar26)展示了同步消息接收的简单实现。


    [***清单5-23***](#9781484207949_Ch05.xhtml#_FPar26). 同步JMS消息接收 (0507-sync-jms-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageReader {

      private JmsTemplate jmsTemplate;

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageReader(JmsTemplate jmsTemplate,

          SimpleService simpleService) {

        super();

        this.jmsTemplate = jmsTemplate;

        this.simpleService = simpleService;

        jmsTemplate.setReceiveTimeout(1000);

      }


    @Scheduled(fixedRate = 1200)

      public void readMessage() {

        String message = (String) jmsTemplate.receiveAndConvert("queue/ExpiryQueue");

        simpleService.processText(message);

      }

    }

    ```


    `SimpleMessageReader`类同样是一个Spring组件，并通过构造函数注入两个依赖项。第一个是著名的`jmsTemplate`实例。我们通过为`jmsTemplate`配置`receiveTimeout`属性，确保同步接收不会永久阻塞。第二个依赖项是`simpleService`，负责处理消息（记录日志）。


    `readMessage`方法每1.2秒调度一次，以突出使用同步接收时的延迟。`jmsTemplate.receiveAndConvert`调用返回`Object`，因此我们需要显式转换为`String`。Spring还会在底层转换JMS
    `Message`实例。最后，我们将文本形式的消息传递给`simpleService`。


    此示例中的最后一个类是`JavaConfigJmsSyncApplication`（如[清单5-19](#9781484207949_Ch05.xhtml#FPar21)所示）。当我们作为Java应用程序运行此类时，会得到类似于[清单5-24](#9781484207949_Ch05.xhtml#FPar27)的输出。


