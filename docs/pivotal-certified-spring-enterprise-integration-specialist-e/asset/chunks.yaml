    As we implement `StepExecutionListener`, we can’t change the names of the interception
    methods, because they need to match signatures from this interface. Signatures
    also include the parameter of `StepExecution` type. We don’t use it in our example,
    but it can be used to access SB metadata in listeners. [Listing 9-75](#9781484207949_Ch09_2_Ext.xhtml#FPar79)
