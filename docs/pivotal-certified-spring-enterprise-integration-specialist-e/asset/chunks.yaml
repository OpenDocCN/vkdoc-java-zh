    Reacting to Failures


    When batch processing contains steps, chunks, readers, processors, writers, and
    tasklets, often something goes wrong and the logic throws an exception. By default,
    SB fails the `Step` and the `Job` in such a situation. But some errors may be
    only temporary or not serious enough to fail all the processing. SB therefore
    provides various mechanisms to configure:


    *   *Skip* the item and configure the `org.springframework.batch.core.SkipListener<T,S>`
    listener.

    *   *Retry* the item and configure the `org.springframework.retry.RetryListener`
    listener. Notice that `RetryListener` is part of the common Spring module `spring-retry`.


    SB also provides convenience abstract classes with the `Support` suffix for these
    interfaces (`org.springframework.batch.core.SkipListenerSupport<T,S>` and `org.springframework.retry.RetryListenerSupport`),
    where all methods have empty implementations. If we use abstract classes instead
    of interfaces, we don’t need to implement all the interception methods. These
    mechanisms apply only to chunk-oriented processing.


    XML Configuration of Skip and SkipListener


    This example uses error simulation in the processor and writer. An error in the
    reader would have a similar effect as an error in the processor. For a reader,
    we reuse our common reader. [Listing 9-101](#9781484207949_Ch09_2_Ext.xhtml#FPar105)
    shows the processor simulating an error.


    [***Listing 9-101***](#9781484207949_Ch09_2_Ext.xhtml#_FPar105). Processor Simulating
    Error (0929-skip-xml)


    ```

    package net.lkrnac.book.eiws.chapter09.process;

    import org.springframework.batch.item.ItemProcessor;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleRecordProcessor implements ItemProcessor<String, String> {

      private boolean errorSimulated = false;


    @Override

      public String process(String item) throws Exception {

        preProcessHook();

        return item + " processed";

      }


    public void preProcessHook() {

        if (!errorSimulated) {

          errorSimulated = true;

          throw new IllegalStateException("error occurred");

        }

      }

    }

    ```


    Before we process the first record, we simulate the error by throwing `IllegalArgumentException`.
    Subsequent processing attempts will succeed. [Listing 9-102](#9781484207949_Ch09_2_Ext.xhtml#FPar106)
    shows the writer simulating an error.


    [***Listing 9-102***](#9781484207949_Ch09_2_Ext.xhtml#_FPar106). Writer Simulating
    Error (0929-skip-xml)


