    *   第 1 章探讨了 Spring 对异步处理的抽象，并将其与纯 Java 支持进行了比较。本章还涵盖了 Spring 的调度支持。

    *   第 2 章比较了 Spring RMI 支持与 Java RMI API，并解释了 Spring HttpInvoker 抽象，以及 Spring
    提供的 Hessian 和 Burlap 协议支持。

    *   第 3 章深入介绍了 Spring Web Services 框架及其特性。它展示了 Spring 如何促进 SOAP Web 服务开发的契约优先风格以及客户端支持。

    *   第 4 章介绍了 REST 原则和主要的 HTTP 特性。然后重点介绍了用于 REST 服务的 Spring MVC 用法，并将其与 JAX-RS
    API 进行了比较。本章还涵盖了客户端支持和对 REST API 有用的 Spring 测试支持。

    *   第 5 章展示了 Java 消息服务（JMS）的 Java 抽象，并将其与 Spring 抽象进行了比较。它涵盖了两种消息传递模式（点对点和发布/订阅），并解释了如何同步读取和发送消息，以及如何异步监听。

    *   第 6 章涵盖了 JMS 确认模式和事务支持。随后深入探讨了如何将它们与 Spring JMS 模块一起使用。

    *   第 7 章介绍了 JTA 事务，并展示了如何将它们与 Spring 一起使用。

    *   第 8 章审视了 Spring Integration 框架及其消息、消息端点和消息通道类型。它还重点关注了诸如拦截、同步与异步消息传递以及错误处理等主题。

    *   第 9 章讨论了 Spring Batch 框架的特性，包括其领域模型、执行批处理、向作业传递参数、状态转换、提供拦截以及控制批处理流程。它还深入探讨了提供扩展和并行处理的高级主题。


