    ```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.SkipListener;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleSkipListener implements SkipListener<String, String> {

      private SimpleExecutablePoint executablePoint;


    @Autowired

      public SimpleSkipListener(SimpleExecutablePoint executablePoint) {

        super();

        this.executablePoint = executablePoint;

      }


    @Override

      public void onSkipInRead(Throwable t) {

        executablePoint.execute("Skipping read because of error");

      }


    @Override

      public void onSkipInWrite(String item, Throwable t) {

        executablePoint

            .execute("Skipping write of ''" + item + "'' because of error");

      }


    @Override

      public void onSkipInProcess(String item, Throwable t) {

        executablePoint

            .execute("Skipping processing of ''" + item + "'' because of error");

      }

    }

    ```


    When the read item is skipped, SB can inject its instance into the interception
    method. Therefore, it injects only an instance of `Throwable` as the root cause
    of the skip. But as we mentioned, there will be no error simulator in the reader
    for this example. We needed to implement this method because of the interface
    `SkipListener<T, S>`.


    During the processor and writer interception, we also can use the instance of
    the item being skipped. `SkipListener<T, S>` uses two generic types, where `T`
    is the type before processing and `S` is the type after processing. In this case,
    both of these types are `String`, so the interface is used as `SkipListener<String,
    String`>. [Listing 9-104](#9781484207949_Ch09_2_Ext.xhtml#FPar108) shows the XML
    configuration.


