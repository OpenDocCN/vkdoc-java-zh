    总结


    本章探讨了 JTA/XA 协议如何帮助我们通过全局分布式事务覆盖各种事务性数据源，并在其上实现 ACID 特性。即使这种支持在 Spring 中很有吸引力且易于使用，每个聪明的开发者都应该尽可能避免使用分布式事务。


    示例展示了使用 XML 和 Java 配置全局事务管理器是多么容易，而使用 Spring Boot 的新机制则更加容易。我们还将这种支持与纯事务支持进行了比较，并探讨了它如何帮助我们解决在单个应用程序中使用多个独立数据源可能遇到的问题。


    第 8 章


    ![image](img/frontdot.jpg)


    Spring Integration


    本书涵盖了企业系统的两个最基本范式：请求-响应模型（例如 REST、SOAP）和消息传递（JMS）。第一个可以是同步的（服务调用者被阻塞，直到响应到达）或异步的（调用者注册一个回调来执行，或者注册一个
    `Future` 在响应到达时填充）。第二个，根据定义，是异步的；消息的发送者不会等待消费者处理完消息。


    这些机制对于提供分布式应用程序之间的通信至关重要：*将它们集成在一起*。但在现代企业中，需要集成成百上千个应用程序。当然，企业架构师需要尽可能保持它们的解耦，但为了向客户提供功能和价值，这样的企业系统将会有一定程度的耦合。不难想象，这样一个复杂分布式系统的流程图随着时间的推移会变得多么复杂。


    对于这样的需求，请求-响应和消息传递集成作为构建块和抽象来说粒度太粗了。随着越来越大的企业系统的产生，各种架构模式开始涌现。Gregor Hohpe 和 Bobby
    Woolf 将它们收集到他们著名的著作《企业集成模式》（Addison-Wesley Professional，2003）中。这些模式提供了比请求-响应或消息传递模型更高级别的抽象，但通常将它们用作部分构建块。

    '
- fmt: "大约在同一时间，David Chappell 出版了《Enterprise Service Bus》（O'Reilly Media, 2004）。其目标是在面向服务的架构（SOA）中简化服务的集成和通信。核心概念是一个总线（类似于硬件总线），它应控制服务之间交换的请求或消息的路由和流程。\n\
    \n在这些模式和原则被编纂成文后，许多公司和开源开发者认识到，这些模式和原则可以实现在通用框架中，这些框架通常被称为企业服务总线（ESB）框架。如今，它们有时被分为轻量级集成框架、中型\
    \ ESB 框架和 ESB 分布式系统等类别。\n\nESB 软件产品领域的主要参与者如下：\n\n*   开源\n    *   `Spring Integration`\
    \ 框架\n    *   `Apache Camel`\n    *   `Mule ESB`（社区版）\n    *   `Talend ESB`\n\
    \    *   `Petals ESB`\n    *   `Apache ServiceMix`\n    *   `WSO2 ESB`\n    *\
    \   `JBoss ESB`\n*   商业\n    *   `WebSphere Message Broker`（IBM）\n    *   `WebSphere\
    \ ESB`（IBM）\n    *   `Oracle ESB`\n    *   `Mule ESB`（企业版）\n\n## Spring Integration\
    \ 简介\n\n作为一本关于使用 Spring 进行企业集成的书，它显然会重点介绍 `Spring Integration`（SI）框架。这一切始于 Mark\
    \ Fisher 阅读《Enterprise Integration Patterns》一书并开始实现这些模式。多年来，它发展成为一个项目，现在被认为是 ESB\
    \ 框架市场的领导者（公平地说，与 `Apache Camel` 并列）。\n\nSI 是 Spring 产品组合中的一个独立项目，但使用了 Spring\
    \ 框架的概念，例如依赖注入和控制反转。因此，它需要 `Spring Framework` 作为依赖项。\n\n`Spring Integration` 提供了两个杀手级特性：\n\
    \n*   以内存消息传递的形式实现企业集成模式\n*   以可插拔适配器的形式与各种技术和外部应用程序进行强大的集成\n\n来自同一项目组合的 API 通常不会相互竞争，但\
    \ SI 是个例外。其适配器为 Spring 模块（如 `Spring JDBC`、`Spring MVC`、`Spring JMS`、`Spring ORM`、`Spring\
    \ WS` 以及各种 `Spring Data` 和 `Spring Social` 项目）提供了替代 API。这是因为 SI 旨在实现企业集成模式的可插拔实现，并轻松映射到这些外部\
    \ API。事实上，SI 经常在底层使用这些模块和项目，以避免重复造轮子。\n\n来自外部系统的消息或请求通过强大的 Spring 转换机制被转换为内存消息（Java\
    \ POJO）。这确保了与几乎所有现代（例如，`WebSockets`）或传统（例如，`FTP`）协议或流行的第三方服务（例如，`Twitter`）的极致互操作性。\n\
    \n这种消息传递特性确保了数据流被分离成小的、可组合的单元，这些单元之间同步或异步地交换消息。这种方法确保了高水平的解耦、模块化和可测试性。业务逻辑与集成逻辑（通常称为*管道*逻辑）的关注点分离是\
    \ SI 的一个关键目标。\n\n另一个主要特性是在同步和异步处理之间轻松切换：SI 抽象允许将异步执行器、调度器和轮询器插入消息流，而无需更改处理逻辑。当使用同步消息流时，我们可以轻松地在\
    \ SI 组件之间传播异常和事务。\n\n由于 Spring 框架的主要配置方法最初是针对 XML 配置的，SI 从一开始就遵循了这一习惯。与此同时，Spring\
    \ 框架已将其配置重点转向基于 Java 注解的方法。这一转变也影响了 SI 框架，现在大多数组件都可以使用 Java 注解以及集成流进行配置。但建模集成流\
    \ XML 仍然是首选方法，原因如下：\n\n*   许多用于外部协议或技术的适配器只能以 XML 形式提供。\n*   当 ESB 流分散到带有注解的各种\
    \ Java 类中时，往往难以跟踪。\n*   SI 流可以借助 `Spring Tools Suite`（STS）IDE 进行可视化。我们将在本章后面探讨这些图表。\n\
    \n![Image](images/sq.jpg) **注意** 如果您是或希望成为一名 Spring 开发者，并且不熟悉 STS，那么是时候从 `http://spring.io/tools/sts`\
    \ 下载并尝试它了。它基于 Eclipse，因此该流行 IDE 的所有功能都可用于 STS。除了 Eclipse 提供的功能外，STS 还包含许多为 Spring\
    \ 开发量身定制的功能。STS 的质量保证在于它由 Spring 团队维护。\n\n## Spring Integration 的主要概念\n\n编程模型主要涉及在消息端点之间发送、路由和消费消息。`Spring\
    \ Integration` 包含许多组件，其中大部分是可配置的。每个组件都属于以下三个类别之一：\n\n*   消息\n*   消息通道\n*   消息端点\n\
    \n*消息*通过*消息通道*在*消息端点*之间交换。单个消息通道连接两个消息端点。但一个消息端点可以有任意数量（甚至为零）的输入和输出消息通道。\n\n当消息端点从消息通道消费消息时，它可以*被动接收它们*（监听）或*主动读取它们*（轮询）。消息通道可以*透传消息*（直接通道）或*临时将它们存储在内存中*（队列通道）。\n\
    \n当我们对 SI 流进行建模时，理解流是*双向的*（请求-响应性质）还是*单向的*（消息传递或即发即弃性质）非常重要。基于这些需求，我们可能希望使用专为我们的场景设计的专用\
    \ SI 组件，或使用专用机制来回复消息的发起者。有时，这种流可以组合（例如，从数据库读取值，通过 REST API 暴露它，并将有关此交互的消息发送到跟踪子系统）。\n\
    \n![Image](images/sq.jpg) **注意** `Spring Integration` 提供了许多基本的内存组件以及许多用于外部系统、协议或技术的适配器，以实现极致的可配置性和灵活性。本书和\
    \ Enterprise Integration with Spring 认证都无法详细说明 SI 提供的每个适配器或 SI 组件提供的属性。如此深入的探讨需要一本专门的书籍。我们涵盖了主要的\
    \ SI 组件和特性，这些组件和特性允许您快速上手该框架，以便您掌握编程模型的概念。然后，借助 SI 参考文档，这些原则和机制可以重用于其他组件。\n\n\
    ## SI 示例中使用的通用类\n\n在我们开始深入探讨具体的 SI 特性之前，让我们介绍一些在我们的许多示例中使用的简单类和接口。由于 SI 主题很广泛，我们将使用类似\
    \ Hello World 的示例。试图将这些示例映射到一个简单的用例会使示例变得臃肿。第一个通用接口如[清单 8-1](#9781484207949_Ch08_1.xhtml#FPar3)\
    \ 所示。\n\n[***清单 8-1***](#9781484207949_Ch08_1.xhtml#_FPar3). SI 流的双向包装器接口（`0800-integration-common`）\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\npublic interface SiWrapperService\
    \ {\n  boolean processText(String text);\n}\n```"
  raw: "Around the same time, David Chappell published *Enterprise Service Bus* (O’Reilly\
    \ Media, 2004). Its goal was to simplify integration and communication of services\
    \ within a service-oriented architecture (SOA). The central concept is a bus (similar\
    \ to a hardware bus), which should control routing and flow of requests or messages\
    \ exchanged between services.\n\nAfter these patterns and principles were codified,\
    \ a lot of companies and open source developers recognized that these patterns\
    \ and principles could be implemented into generic frameworks, commonly referred\
    \ to as Enterprise Service Bus (ESB) frameworks. Nowadays they are sometimes split\
    \ into categories of lightweight integration frameworks, medium ESB frameworks,\
    \ and ESB distributed systems.\n\nMajor players in this ESB software product space\
    \ are as follows:\n\n*   Open source\n    *   Spring Integration framework\n \
    \   *   Apache Camel\n    *   Mule ESB (Community Edition)\n    *   Talend ESB\n\
    \    *   Petals ESB\n    *   Apache ServiceMix\n    *   WSO2 ESB\n    *   JBoss\
    \ ESB\n*   Commercial\n    *   WebSphere Message Broker (IBM)\n    *   WebSphere\
    \ ESB (IBM)\n    *   Oracle ESB\n    *   Mule ESB (Enterprise Edition)\n\nSpring\
    \ Integration Introduction\n\nAs a book about Enterprise Integration with Spring,\
    \ it will obviously focus on the Spring Integration (SI) framework. It all started\
    \ when Mark Fisher read the book *Enterprise Integration Patterns* and started\
    \ implementing these patterns. Over the years, it emerged into a project, which\
    \ is now considered a leader in the ESB framework market (along with Apache Camel,\
    \ to be fair).\n\nSI is a separate project in the Spring portfolio, but uses Spring\
    \ Framework concepts such as dependency injection and inversion of control. Therefore,\
    \ it requires Spring Framework as a dependency.\n\nSpring Integration provides\
    \ two killer features:\n\n*   Implementation of enterprise integration patterns\
    \ in the form of in-memory messaging\n*   Powerful integration with various technologies\
    \ and external applications in the form of pluggable adapters\n\nAPIs from the\
    \ same portfolio of projects don’t typically compete with each other, but SI is\
    \ an exception. Its adapters provide alternative APIs to Spring modules such as\
    \ Spring JDBC, Spring MVC, Spring JMS, Spring ORM, Spring WS, and various Spring\
    \ Data and Spring Social projects. This is because SI aims for pluggable implementation\
    \ of enterprise integration patterns with easy mapping to these external APIs.\
    \ In fact SI, often uses these modules and projects under the hood in order to\
    \ avoid reinventing the wheel.\n\nMessages or requests from external systems are\
    \ converted into in-memory messages (Java POJOs) with use of powerful Spring conversion\
    \ mechanisms. This ensures extreme interoperability with pretty much all modern\
    \ (for example, WebSockets) or traditional (for example, FTP) protocols or popular\
    \ third-party services (for example, Twitter).\n\nThis messaging nature ensures\
    \ that the flow of data is separated into small, composable units that exchange\
    \ messages between each other synchronously or asynchronously. Such an approach\
    \ ensures a high level of decoupling, modularity, and testability. Separation\
    \ of concerns between business logic and integration (often referred to as *plumbing*)\
    \ logic is a key goal of SI.\n\nAnother major feature is the easy switch between\
    \ synchronous and asynchronous processing: SI abstractions allow for plugging\
    \ of asynchronous executors, schedulers, and pollers into the message flow without\
    \ need for changing processing logic. When using synchronous message flows, we\
    \ can easily propagate exceptions and transactions across SI components.\n\nBecause\
    \ the Spring framework’s major configuration approach was originally targeted\
    \ toward XML configuration, SI has followed this habit since its beginning. In\
    \ the meantime, the Spring framework has shifted its configuration focus to approaches\
    \ based on Java annotations. This shift also affected the SI framework, and most\
    \ of the components can now be configured with Java annotations as well as integration\
    \ flow. But modeling integration flow XML remains the preferred approach because\
    \ of the following:\n\n*   A lot of adapters for external protocols or technologies\
    \ can be exclusively provided in XML.\n*   ESB flow tends to be hard to follow\
    \ when spread to various Java classes with annotations.\n*   SI flow can be visualized\
    \ with the help of the Spring Tools Suite (STS) IDE. We’ll explore these diagrams\
    \ later in the chapter.\n\n![Image](images/sq.jpg) **Note**  If you are or want\
    \ to be a Spring developer and are not familiar with STS, it is time to download\
    \ it from `http://spring.io/tools/sts` and try it. It is based on Eclipse, so\
    \ all the features from this popular IDE are available for STS. In addition to\
    \ the Eclipse offerings, STS contains a lot of features tailored for Spring development.\
    \ The quality guarantee of STS is that it is maintained by the Spring team.\n\n\
    Spring Integration’s Main Concepts\n\nA programming model is all about sending,\
    \ routing, and consuming messages between message endpoints. Spring Integration\
    \ contains a lot of components, and most of them are configurable. Each falls\
    \ into one of these three categories:\n\n*   Message\n*   Message channel\n* \
    \  Message endpoint\n\n*Messages* are exchanged between *message endpoints* via\
    \ *message channels*. A single message channel connects two message endpoints.\
    \ But a message endpoint can have any number of (even zero) input and output message\
    \ channels.\n\nWhen a message endpoint consumes messages from a message channel,\
    \ it can *passively receive them* (listen) or *actively read them* (poll). Message\
    \ channels can *pass through messages* (direct channel) or *temporarily store\
    \ them in memory* (queue channel).\n\nWhen we are modeling SI flow, it’s important\
    \ to understand whether the flow is *bidirectional* (of a request-response nature)\
    \ or *unidirectional* (of a messaging or fire-and-forget nature). Based on these\
    \ requirements, we may want to use specialized SI components designed for our\
    \ case or use specialized mechanisms for replying to the originator of the message.\
    \ Sometimes this flow can be combined (for example, read the value from the DB,\
    \ expose it via the REST API, and send a message about this interaction into the\
    \ tracking subsystem).\n\n![Image](images/sq.jpg) **Note**  Spring Integration\
    \ provides a lot of basic in-memory components and many adapters for external\
    \ systems, protocols, or technologies in order to enable extreme configurability\
    \ and flexibility. Neither this book nor Enterprise Integration with Spring certification\
    \ can detail each adapter that SI provides or attributes provided by SI components.\
    \ Such a deep dive requires a book of its own. We cover major SI components and\
    \ features that allow for a quick start with the framework so you can grasp the\
    \ idea of the programming model. These principles and mechanisms can then be reused\
    \ for additional components with the help of the SI reference documentation.\n\
    \nCommon Classes Used in SI Examples\n\nBefore we start diving into concrete SI\
    \ features, let’s introduce some simple classes and interfaces used across a lot\
    \ of our examples. Because the SI topic is broad, we’ll go with Hello World–like\
    \ examples. Trying to map these examples to a simple use case would make the examples\
    \ bloated. The first common interface is shown in [Listing 8-1](#9781484207949_Ch08_1.xhtml#FPar3).\n\
    \n[***Listing 8-1***](#9781484207949_Ch08_1.xhtml#_FPar3). Bidirectional Wrapper\
    \ Interface for SI Flows (0800-integration-common)\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
    \npublic interface SiWrapperService {\n  boolean processText(String text);\n}\n\
    ```"
  trans: "\n大约在同一时期，David Chappell 出版了《*企业服务总线*》（O’Reilly Media, 2004）。其目标是在面向服务的架构（SOA）中简化服务的集成与通信。核心概念是一条总线（类似于硬件总线），它应控制服务之间请求或消息交换的路由与流程。\n\
    \n在这些模式和原则被规范化之后，许多公司和开源开发者认识到，这些模式和原则可以实现在通用框架中，这些框架通常被称为企业服务总线（ESB）框架。如今，它们有时被分为轻量级集成框架、中型\
    \ ESB 框架和 ESB 分布式系统这几类。\n\nESB 软件产品领域的主要参与者如下：\n\n*   开源\n    *   Spring Integration\
    \ 框架\n    *   Apache Camel\n    *   Mule ESB（社区版）\n    *   Talend ESB\n    * \
    \  Petals ESB\n    *   Apache ServiceMix\n    *   WSO2 ESB\n    *   JBoss ESB\n\
    *   商业\n    *   WebSphere Message Broker（IBM）\n    *   WebSphere ESB（IBM）\n  \
    \  *   Oracle ESB\n    *   Mule ESB（企业版）\n\nSpring Integration 简介\n\n作为一本关于使用\
    \ Spring 进行企业集成的书，它显然会重点介绍 Spring Integration（SI）框架。这一切始于 Mark Fisher 阅读《*企业集成模式*》一书并开始实现这些模式。多年来，它发展成为一个项目，如今被认为是\
    \ ESB 框架市场的领导者（公平地说，与 Apache Camel 并列）。\n\nSI 是 Spring 产品组合中的一个独立项目，但它使用了 Spring\
    \ 框架的概念，例如依赖注入和控制反转。因此，它需要将 Spring 框架作为依赖项。\n\nSpring Integration 提供了两个杀手级特性：\n\
    \n*   以内存消息传递的形式实现企业集成模式\n*   以可插拔适配器的形式与各种技术和外部应用进行强大的集成\n\n来自同一项目组合的 API 通常不会相互竞争，但\
    \ SI 是个例外。其适配器为 Spring 模块（如 Spring JDBC、Spring MVC、Spring JMS、Spring ORM、Spring\
    \ WS）以及各种 Spring Data 和 Spring Social 项目提供了替代 API。这是因为 SI 旨在通过易于映射到这些外部 API 的方式，实现企业集成模式的可插拔实现。事实上，SI\
    \ 经常在底层使用这些模块和项目，以避免重复造轮子。\n\n来自外部系统的消息或请求，通过强大的 Spring 转换机制被转换为内存消息（Java POJO）。这确保了与几乎所有现代（例如\
    \ WebSockets）或传统（例如 FTP）协议，或流行的第三方服务（例如 Twitter）的极致互操作性。\n\n这种消息传递特性确保数据流被分离成小的、可组合的单元，这些单元之间同步或异步地交换消息。这种方法确保了高水平的解耦、模块化和可测试性。将业务逻辑与集成（通常称为*管道*）逻辑的关注点分离是\
    \ SI 的一个关键目标。\n\n另一个主要特性是在同步和异步处理之间轻松切换：SI 抽象允许将异步执行器、调度器和轮询器插入消息流中，而无需更改处理逻辑。当使用同步消息流时，我们可以轻松地在\
    \ SI 组件之间传播异常和事务。\n\n由于 Spring 框架的主要配置方法最初是针对 XML 配置的，SI 从一开始就沿用了这一习惯。与此同时，Spring\
    \ 框架已将其配置重点转向基于 Java 注解的方法。这一转变也影响了 SI 框架，现在大多数组件以及集成流都可以使用 Java 注解进行配置。但使用 XML\
    \ 建模集成流仍然是首选方法，原因如下：\n\n*   许多用于外部协议或技术的适配器可能只能通过 XML 提供。\n*   当 ESB 流分散到带有注解的各种\
    \ Java 类中时，往往难以跟踪。\n*   SI 流可以借助 Spring Tools Suite (STS) IDE 进行可视化。我们将在本章后面探讨这些图表。\n\
    \n![Image](img/sq.jpg) **注意**  如果你是一名 Spring 开发者或希望成为 Spring 开发者，并且不熟悉 STS，那么是时候从\
    \ `http://spring.io/tools/sts` 下载并尝试它了。它基于 Eclipse，因此这个流行 IDE 的所有功能都适用于 STS。除了\
    \ Eclipse 提供的功能外，STS 还包含许多为 Spring 开发量身定制的功能。STS 的质量保证在于它由 Spring 团队维护。\n\nSpring\
    \ Integration 的主要概念\n\n编程模型的核心是在消息端点之间发送、路由和消费消息。Spring Integration 包含许多组件，其中大部分是可配置的。每个组件都属于以下三类之一：\n\
    \n*   消息\n*   消息通道\n*   消息端点\n\n*消息*通过*消息通道*在*消息端点*之间交换。单个消息通道连接两个消息端点。但一个消息端点可以有任意数量（甚至为零）的输入和输出消息通道。\n\
    \n当消息端点从消息通道消费消息时，它可以*被动接收它们*（监听）或*主动读取它们*（轮询）。消息通道可以*透传消息*（直接通道）或*临时将它们存储在内存中*（队列通道）。\n\
    \n当我们建模 SI 流时，理解该流是*双向的*（请求-响应性质）还是*单向的*（消息传递或即发即弃性质）非常重要。基于这些需求，我们可能希望使用专为我们的场景设计的专用\
    \ SI 组件，或使用专门的机制来回复消息的发起者。有时，这种流可以组合（例如，从数据库读取值，通过 REST API 暴露它，并将关于此交互的消息发送到跟踪子系统）。\n\
    \n![Image](img/sq.jpg) **注意**  Spring Integration 提供了许多基本的内存组件以及许多用于外部系统、协议或技术的适配器，以实现极致的可配置性和灵活性。无论是本书还是\
    \ Enterprise Integration with Spring 认证，都无法详细说明 SI 提供的每个适配器或 SI 组件提供的属性。如此深入的探讨需要一本专门的书籍。我们涵盖了主要的\
    \ SI 组件和特性，这些内容可以让您快速上手该框架，从而掌握编程模型的概念。然后，借助 SI 参考文档，这些原则和机制可以复用于其他组件。\n\nSI 示例中使用的通用类\n\
    \n在我们开始深入探讨具体的 SI 特性之前，先介绍一些在我们的许多示例中使用的简单类和接口。由于 SI 主题很广泛，我们将使用类似 Hello World\
    \ 的示例。试图将这些示例映射到一个简单的用例会使示例变得臃肿。第一个通用接口如清单 8-1 所示。\n\n***清单 8-1***. SI 流的双向包装器接口\
    \ (0800-integration-common)\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
    \npublic interface SiWrapperService {\n  boolean processText(String text);\n}\n\
    ```\n"
- fmt: "# This simple interface is designed to process a given text parameter and\
    \ return the result of that action. It will be used for wrapping SI bidirectional\
    \ flow. So we won’t implement this interface, but instead will be using SI message\
    \ flow as an implementation of this interface. The second interface is shown in\
    \ [Listing 8-2](#9781484207949_Ch08_1.xhtml#FPar4).\n\n[***Listing 8-2***](#9781484207949_Ch08_1.xhtml#_FPar4).\
    \ Unidirectional Wrapper Interface for SI Flows (0800-integration-common)\n\n\
    ```\npackage net.lkrnac.book.eiws.chapter08.in;\n\npublic interface SiWrapperServiceVoid\
    \ {\n  void processText(String text);\n}\n```\n\nThis interface is similar to\
    \ `SiWrapperService`, but in this case no result is returned to the caller. This\
    \ one will be also be used to wrap SI flow, in this case unidirectional. Next\
    \ we introduce the repository class in [Listing 8-3](#9781484207949_Ch08_1.xhtml#FPar5).\n\
    \n[***Listing 8-3***](#9781484207949_Ch08_1.xhtml#_FPar5). Repository Class Used\
    \ in Most Examples (0800-integration-common)\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Repository;\n\
    \n@Slf4j\n@Repository\npublic class WriteRepository {\n  public int persist(String\
    \ text) {\n    log.info(\"Text persisted: \" + text);\n    return 1;\n  }\n}\n\
    ```\n\nFor this example’s simplicity, this repository class will be fake. It will\
    \ log the given message parameter and return a count of written records hard-coded\
    \ to 1. It uses the `@Repository` annotation so that we can plug it into the Spring\
    \ container via a component scan. The `@Slf4j` annotation was already mentioned\
    \ and serves as an easy logger configuration. The last class from our common deck\
    \ is shown in [Listing 8-4](#9781484207949_Ch08_1.xhtml#FPar6).\n\n[***Listing\
    \ 8-4***](#9781484207949_Ch08_1.xhtml#_FPar6). Service Class Used in Most Examples\
    \ (0800-integration-common)\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
    \n@Service\npublic class WriteService {\n  private WriteRepository writeRepository;\n\
    \n@Autowired\n  public WriteService(WriteRepository writeRepository) {\n    super();\n\
    \    this.writeRepository = writeRepository;\n  }\n\npublic void write(String\
    \ message) {\n    writeRepository.persist(message);\n  }\n\npublic boolean writeAndIndicateSuccess(String\
    \ message) {\n    return writeRepository.persist(message) == 1;\n  }\n}\n```\n\
    \nThe class is called `WriteService`, because its Hello World–type concern is\
    \ to persist the message with the help of `WriteRepository`. It uses the `@Service`\
    \ annotation, so we can use it as a Spring bean. The `WriteRepository` bean is\
    \ injected via constructor injection.\n\nIt provides two methods. The `write()`\
    \ method persists the message without indicating the result of that operation\
    \ to the caller. This method will often be used as target/output logic for unidirectional\
    \ SI flows. The second method, `writeAndIndicateSuccess()`, also persists the\
    \ message and returns a Boolean value about the result of that operation. You\
    \ probably already guessed that it will be used as target logic of bidirectional\
    \ SI flows in the examples.\n\nThe SI flow mostly starts where messages/requests\
    \ are received. Think about this endpoint as input to the SI flow. We will place\
    \ Spring beans or interfaces belonging to the input part of the SI flow into the\
    \ package `net.lkrnac.book.eiws.chapter08.in`. The common interfaces `SiWrapperService`\
    \ and `SiWrapperServiceVoid` also belong to this bucket.\n\nOn the other hand,\
    \ the SI flow also has an output part. Classes or interfaces belonging to the\
    \ output part of the SI flow will be placed in the `net.lkrnac.book.eiws.chapter08.out`\
    \ package. The common classes `WriteService` and `WriteRepository` belong here.\n\
    \n## Message\n\nThe message interface used by the SI framework is defined in the\
    \ Spring Core framework. It is represented by the Java interface, and its definition\
    \ is shown in [Listing 8-5](#9781484207949_Ch08_1.xhtml#FPar7).\n\n[***Listing\
    \ 8-5***](#9781484207949_Ch08_1.xhtml#_FPar7). Message Interface\n\n```\npackage\
    \ org.springframework.messaging;\n\npublic interface Message<T> {\n  T getPayload();\n\
    \  MessageHeaders getHeaders();\n}\n```\n\nThe message is composed from headers\
    \ and message payloads. The signature of this interface uses generics to enable\
    \ users to handle any type as the payload of the message. The `org.springframework.messaging.MessageHeaders`\
    \ type is a special implementation of `Map<String, Object>`. So we can store a\
    \ header of any type into a message based on its header name.\n\nBy default, when\
    \ any SI component needs to produce a message, it uses the implementation `org.springframework.messaging.support.GenericMessage<T>`.\
    \ Notice that both the interface and implementation are not part of the SI framework,\
    \ but part of the Spring framework and its messaging module. They were moved from\
    \ SI into Spring Core since the 4.*x* versions of both frameworks, because the\
    \ Spring team is trying to enhance interoperability of various messaging Spring\
    \ abstractions.\n\nThe `GenericMessage<T>` message is *immutable*. After creation,\
    \ we can’t change the message payload or message headers. So if we need to amend\
    \ the payload or headers, we would have to create a new message and send this\
    \ new one instead of the original.\n\nThis is important because it ensures that\
    \ the message cannot be manipulated by threads running in the background of our\
    \ logic. When developers can rely on messages not being changed randomly under\
    \ the hood, they can focus on the higher-level abstractions of message flow and\
    \ easily switch between synchronous (single-threaded) and asynchronous (multithreaded)\
    \ flow.\n\nBut the immutability of `GenericMessage<T>` is shallow. Even when we\
    \ can’t change the reference stored in the message payload nor the header value\
    \ references, we can still change the fields of objects stored as the payload\
    \ or as the header value if its class definition allows it. This fact can cause\
    \ problems if we don’t take care, but there is nothing SI can do about it, as\
    \ the payload and header values can be of any type.\n\nMessage headers are meant\
    \ to store message metadata. We can store our custom business logic headers in\
    \ the message, but there are also headers that SI creates or understands. All\
    \ messages by default have the `id` or `timestamp` of the message.\n\nHeaders\
    \ can be added to a message to amend SI behavior or change message flow. For example,\
    \ we can use the header `priority` (so messages with higher priority can surpass\
    \ messages with lower priority) or `replyChannel` (so the message can specify\
    \ which channel will be used when the reply is sent to the caller component).\
    \ We discuss these headers in detail later in examples.\n\nSI messages can be\
    \ created in two major ways:\n\n*   Automatically by the SI framework\n    * \
    \  By SI adapter conversion from a transport format (for example, XML, JSON, file)\n\
    \    *   When SI generic components need to create a new message from an old message\
    \ (for example, enriching headers, transforming message)\n*   Programmatically\n\
    \n### Programmatic Creation of Messages\n\nReaders familiar with Java concepts\
    \ understand that in order to achieve immutability of `GenericMessage<T>`, its\
    \ payload and headers fields must be marked as `final`. So creation of such a\
    \ message cannot be achieved via setters. We could use constructors provided by\
    \ the `GenericMessage<T>` class, but the SI framework provides a much more convenient\
    \ way, with the help of `org.springframework.integration.support.MessageBuilder<T>`.\n\
    \nWith this class, we can use fluent APIs to do the following:\n\n*   Create a\
    \ message from scratch\n*   Create a message from an existing message\n*   Set\
    \ default headers via specialized methods\n*   Copy headers from other messages\n\
    *   Add/remove custom headers"
  raw: "This simple interface is designed to process a given text parameter and return\
    \ the result of that action. It will be used for wrapping SI bidirectional flow.\
    \ So we won’t implement this interface, but instead will be using SI message flow\
    \ as an implementation of this interface. The second interface is shown in [Listing\
    \ 8-2](#9781484207949_Ch08_1.xhtml#FPar4).\n\n[***Listing 8-2***](#9781484207949_Ch08_1.xhtml#_FPar4).\
    \ Unidirectional Wrapper Interface for SI Flows (0800-integration-common)\n\n\
    ```\npackage net.lkrnac.book.eiws.chapter08.in;\n\npublic interface SiWrapperServiceVoid\
    \ {\n  void processText(String text);\n}\n```\n\nThis interface is similar to\
    \ `SiWrapperService`, but in this case no result is returned to the caller. This\
    \ one will be also be used to wrap SI flow, in this case unidirectional. Next\
    \ we introduce the repository class in [Listing 8-3](#9781484207949_Ch08_1.xhtml#FPar5).\n\
    \n[***Listing 8-3***](#9781484207949_Ch08_1.xhtml#_FPar5). Repository Class Used\
    \ in Most Examples (0800-integration-common)\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.stereotype.Repository;\n\
    \n@Slf4j\n@Repository\npublic class WriteRepository {\n  public int persist(String\
    \ text) {\n    log.info(\"Text persisted: \" + text);\n    return 1;\n  }\n}\n\
    ```\n\nFor this example’s simplicity, this repository class will be fake. It will\
    \ log the given message parameter and return a count of written records hard-coded\
    \ to 1\\. It uses the `@Repository` annotation so that we can plug it into the\
    \ Spring container via a component scan. The `@Slf4j` annotation was already mentioned\
    \ and serves as an easy logger configuration. The last class from our common deck\
    \ is shown in [Listing 8-4](#9781484207949_Ch08_1.xhtml#FPar6).\n\n[***Listing\
    \ 8-4***](#9781484207949_Ch08_1.xhtml#_FPar6). Service Class Used in Most Examples\
    \ (0800-integration-common)\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
    \n@Service\npublic class WriteService {\n  private WriteRepository writeRepository;\n\
    \n@Autowired\n  public WriteService(WriteRepository writeRepository) {\n    super();\n\
        this.writeRepository = writeRepository;\n  }\n\npublic void write(String message)\
    \ {\n    writeRepository.persist(message);\n  }\n\npublic boolean writeAndIndicateSuccess(String\
    \ message) {\n    return writeRepository.persist(message) == 1;\n  }\n}\n```\n\
    \nThe class is called `WriteService`, because its Hello World–type concern is\
    \ to persist the message with the help of `WriteRepository`. It uses the `@Service`\
    \ annotation, so we can use it as a Spring bean. The `WriteRepository` bean is\
    \ injected via constructor injection.\n\nIt provides two methods. The `write()`\
    \ method persists the message without indicating the result of that operation\
    \ to the caller. This method will often be used as target/output logic for unidirectional\
    \ SI flows. The second method, `writeAndIndicateSuccess()`, also persists the\
    \ message and returns a Boolean value about the result of that operation. You\
    \ probably already guessed that it will be used as target logic of bidirectional\
    \ SI flows in the examples.\n\nThe SI flow mostly starts where messages/requests\
    \ are received. Think about this endpoint as input to the SI flow. We will place\
    \ Spring beans or interfaces belonging to the input part of the SI flow into the\
    \ package `net.lkrnac.book.eiws.chapter``08``.in`. The common interfaces `SiWrapperService`\
    \ and `SiWrapperServiceVoid` also belong to this bucket.\n\nOn the other hand,\
    \ the SI flow also has an output part. Classes or interfaces belonging to the\
    \ output part of the SI flow will be placed in the `net.lkrnac.book.eiws.chapter``08``.out`\
    \ package. The common classes `WriteService` and `WriteRepository` belong here.\n\
    \nMessage\n\nThe message interface used by the SI framework is defined in the\
    \ Spring Core framework. It is represented by the Java interface, and its definition\
    \ is shown in [Listing 8-5](#9781484207949_Ch08_1.xhtml#FPar7).\n\n[***Listing\
    \ 8-5***](#9781484207949_Ch08_1.xhtml#_FPar7). Message Interface\n\n```\npackage\
    \ org.springframework.messaging;\n\npublic interface Message<T> {\n  T getPayload();\n\
      MessageHeaders getHeaders();\n}\n```\n\nThe message is composed from headers\
    \ and message payloads. The signature of this interface uses generics to enable\
    \ users to handle any type as the payload of the message. The `org.springframework.messaging.MessageHeaders`\
    \ type is a special implementation of `Map<String, Object>`. So we can store a\
    \ header of any type into a message based on its header name.\n\nBy default, when\
    \ any SI component needs to produce a message, it uses the implementation `org.springframework.messaging.support.GenericMessage<T>`.\
    \ Notice that both the interface and implementation are not part of the SI framework,\
    \ but part of the Spring framework and its messaging module. They were moved from\
    \ SI into Spring Core since the 4.*x* versions of both frameworks, because the\
    \ Spring team is trying to enhance interoperability of various messaging Spring\
    \ abstractions.\n\nThe `GenericMessage<T>` message is *immutable*. After creation,\
    \ we can’t change the message payload or message headers. So if we need to amend\
    \ the payload or headers, we would have to create a new message and send this\
    \ new one instead of the original.\n\nThis is important because it ensures that\
    \ the message cannot be manipulated by threads running in the background of our\
    \ logic. When developers can rely on messages not being changed randomly under\
    \ the hood, they can focus on the higher-level abstractions of message flow and\
    \ easily switch between synchronous (single-threaded) and asynchronous (multithreaded)\
    \ flow.\n\nBut the immutability of `GenericMessage<T>` is shallow. Even when we\
    \ can’t change the reference stored in the message payload nor the header value\
    \ references, we can still change the fields of objects stored as the payload\
    \ or as the header value if its class definition allows it. This fact can cause\
    \ problems if we don’t take care, but there is nothing SI can do about it, as\
    \ the payload and header values can be of any type.\n\nMessage headers are meant\
    \ to store message metadata. We can store our custom business logic headers in\
    \ the message, but there are also headers that SI creates or understands. All\
    \ messages by default have the `id` or `timestamp` of the message.\n\nHeaders\
    \ can be added to a message to amend SI behavior or change message flow. For example,\
    \ we can use the header `priority` (so messages with higher priority can surpass\
    \ messages with lower priority) or `replyChannel` (so the message can specify\
    \ which channel will be used when the reply is sent to the caller component).\
    \ We discuss these headers in detail later in examples.\n\nSI messages can be\
    \ created in two major ways:\n\n*   Automatically by the SI framework\n    * \
    \  By SI adapter conversion from a transport format (for example, XML, JSON, file)\n\
    \    *   When SI generic components need to create a new message from an old message\
    \ (for example, enriching headers, transforming message)\n*   Programmatically\n\
    \nProgrammatic Creation of Messages\n\nReaders familiar with Java concepts understand\
    \ that in order to achieve immutability of `GenericMessage<T>`, its payload and\
    \ headers fields must be marked as `final`. So creation of such a message cannot\
    \ be achieved via setters. We could use constructors provided by the `GenericMessage<T>`\
    \ class, but the SI framework provides a much more convenient way, with the help\
    \ of `org.springframework.integration.support.MessageBuilder<T>`.\n\nWith this\
    \ class, we can use fluent APIs to do the following:\n\n*   Create a message from\
    \ scratch\n*   Create a message from an existing message\n*   Set default headers\
    \ via specialized methods\n*   Copy headers from other messages\n*   Add/remove\
    \ custom headers"
  trans: "\n这个简单的接口用于处理给定的文本参数并返回操作结果。它将被用来封装 SI 双向流。因此，我们不会实现这个接口，而是使用 SI 消息流作为该接口的实现。第二个接口如清单\
    \ 8-2 所示。\n\n***清单 8-2***. SI 流的单向封装接口 (0800-integration-common)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter08.in;\n\npublic interface SiWrapperServiceVoid\
    \ {\n  void processText(String text);\n}\n```\n\n这个接口与 `SiWrapperService` 类似，但在此情况下，不会向调用者返回任何结果。它也将用于封装\
    \ SI 流，此处为单向流。接下来，我们在清单 8-3 中介绍仓库类。\n\n***清单 8-3***. 大多数示例中使用的仓库类 (0800-integration-common)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport lombok.extern.slf4j.Slf4j;\n\
    import org.springframework.stereotype.Repository;\n\n@Slf4j\n@Repository\npublic\
    \ class WriteRepository {\n  public int persist(String text) {\n    log.info(\"\
    Text persisted: \" + text);\n    return 1;\n  }\n}\n```\n\n为简化此示例，这个仓库类将是模拟的。它会记录给定的消息参数，并返回硬编码为\
    \ 1 的写入记录数。它使用了 `@Repository` 注解，以便我们可以通过组件扫描将其注入 Spring 容器。`@Slf4j` 注解之前已提及，用于简化日志记录器的配置。我们公共代码库中的最后一个类如清单\
    \ 8-4 所示。\n\n***清单 8-4***. 大多数示例中使用的服务类 (0800-integration-common)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter08.out;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Service;\n\n@Service\npublic class WriteService\
    \ {\n  private WriteRepository writeRepository;\n\n@Autowired\n  public WriteService(WriteRepository\
    \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
      }\n\npublic void write(String message) {\n    writeRepository.persist(message);\n\
      }\n\npublic boolean writeAndIndicateSuccess(String message) {\n    return writeRepository.persist(message)\
    \ == 1;\n  }\n}\n```\n\n该类名为 `WriteService`，因为它类似于 Hello World 的功能，即借助 `WriteRepository`\
    \ 来持久化消息。它使用了 `@Service` 注解，因此我们可以将其用作 Spring Bean。`WriteRepository` Bean 通过构造函数注入。\n\
    \n它提供了两个方法。`write()` 方法持久化消息，但不向调用者指示操作结果。此方法通常用作单向 SI 流的目标/输出逻辑。第二个方法 `writeAndIndicateSuccess()`\
    \ 同样持久化消息，并返回一个布尔值表示操作结果。您可能已经猜到，它将在示例中用作双向 SI 流的目标逻辑。\n\nSI 流通常从接收消息/请求的地方开始。将此端点视为\
    \ SI 流的输入。我们将属于 SI 流输入部分的 Spring Bean 或接口放入 `net.lkrnac.book.eiws.chapter``08``.in`\
    \ 包中。公共接口 `SiWrapperService` 和 `SiWrapperServiceVoid` 也属于此类。\n\n另一方面，SI 流也有输出部分。属于\
    \ SI 流输出部分的类或接口将放在 `net.lkrnac.book.eiws.chapter``08``.out` 包中。公共类 `WriteService`\
    \ 和 `WriteRepository` 属于此处。\n\n消息\n\nSI 框架使用的消息接口定义在 Spring Core 框架中。它由 Java 接口表示，其定义如清单\
    \ 8-5 所示。\n\n***清单 8-5***. 消息接口\n\n```\npackage org.springframework.messaging;\n\
    \npublic interface Message<T> {\n  T getPayload();\n  MessageHeaders getHeaders();\n\
    }\n```\n\n消息由消息头和消息载荷组成。该接口的签名使用了泛型，使用户能够将任何类型作为消息的载荷进行处理。`org.springframework.messaging.MessageHeaders`\
    \ 类型是 `Map<String, Object>` 的一种特殊实现。因此，我们可以根据消息头的名称将任何类型的消息头存储到消息中。\n\n默认情况下，当任何\
    \ SI 组件需要生成消息时，它会使用 `org.springframework.messaging.support.GenericMessage<T>`\
    \ 实现。请注意，该接口和实现都不属于 SI 框架，而是属于 Spring 框架及其消息传递模块。自两个框架的 4.*x* 版本起，它们已从 SI 移入 Spring\
    \ Core，因为 Spring 团队正试图增强各种 Spring 消息传递抽象之间的互操作性。\n\n`GenericMessage<T>` 消息是*不可变的*。创建后，我们无法更改消息的载荷或消息头。因此，如果需要修改载荷或消息头，我们必须创建一个新消息，并发送这个新消息以替代原始消息。\n\
    \n这一点很重要，因为它确保了消息不会被我们逻辑后台运行的线程所操纵。当开发人员可以信赖消息不会在底层被随意更改时，他们就能专注于消息流的更高级抽象，并轻松地在同步（单线程）和异步（多线程）流之间切换。\n\
    \n但是，`GenericMessage<T>` 的不可变性是浅层的。即使我们无法更改消息载荷中存储的引用，也无法更改消息头值的引用，但如果载荷或消息头值所存储对象的类定义允许，我们仍然可以更改这些对象的字段。如果我们不注意，这一事实可能会引发问题，但\
    \ SI 对此无能为力，因为载荷和消息头值可以是任何类型。\n\n消息头用于存储消息的元数据。我们可以在消息中存储自定义的业务逻辑消息头，但也有一些消息头是\
    \ SI 创建或理解的。默认情况下，所有消息都包含 `id` 或 `timestamp` 消息头。\n\n可以向消息添加消息头以修改 SI 行为或改变消息流。例如，我们可以使用\
    \ `priority` 消息头（以便优先级高的消息可以超越优先级低的消息）或 `replyChannel` 消息头（以便消息可以指定当回复发送给调用者组件时使用哪个通道）。我们将在后续示例中详细讨论这些消息头。\n\
    \nSI 消息可以通过两种主要方式创建：\n\n*   由 SI 框架自动创建\n    *   通过 SI 适配器从传输格式（例如 XML、JSON、文件）转换而来\n\
    \    *   当 SI 通用组件需要从旧消息创建新消息时（例如，丰富消息头、转换消息）\n*   通过编程方式创建\n\n编程方式创建消息\n\n熟悉\
    \ Java 概念的读者知道，为了实现 `GenericMessage<T>` 的不可变性，其载荷和消息头字段必须标记为 `final`。因此，无法通过 setter\
    \ 方法创建此类消息。我们可以使用 `GenericMessage<T>` 类提供的构造函数，但 SI 框架提供了一种更方便的方式，即借助 `org.springframework.integration.support.MessageBuilder<T>`。\n\
    \n使用此类，我们可以通过流式 API 执行以下操作：\n\n*   从头创建消息\n*   从现有消息创建消息\n*   通过专用方法设置默认消息头\n\
    *   从其他消息复制消息头\n*   添加/删除自定义消息头\n"
- fmt: "If you are not familiar with the term *fluent API*, it will be described in\
    \ a subsequent example. Notice that the Spring Core framework introduced in version\
    \ 4 a messaging module with `org.springframework.messaging.support.MessageBuilder<T>`.\
    \ It is a slightly different implementation from `org.springframework.integration.support.MessageBuilder<T>`,\
    \ but produces messages of the same type. With SI, we should use `org.springframework.integration.support.MessageBuilder<T>`,\
    \ because it can create various message headers tailored to SI communication.\n\
    \nBear in mind that the focus of this example is the creation of messages, not\
    \ their processing. The processing part of this example will be hidden in this\
    \ example and explained later in the chapter. This example will use a wrapper\
    \ for SI flow, shown in [Listing 8-6](#9781484207949_Ch08_1.xhtml#FPar8).\n\n\
    [***Listing 8-6***](#9781484207949_Ch08_1.xhtml#_FPar8). SI Wrapper Interface\
    \ for Programmatic Message Creation Example (0801-programmatic-message-creation)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08.in;\nimport org.springframework.messaging.Message;\n\
    \npublic interface SiWrapperServiceMessage {\n  public void processMessage(Message<String>\
    \ message);\n}\n```\n\nThis SI flow wrapper interface is slightly different from\
    \ the common wrapper interfaces in [Listings 8-1](#9781484207949_Ch08_1.xhtml#FPar3)\
    \ and [8-2](#9781484207949_Ch08_1.xhtml#FPar4), because it accepts a full message\
    \ object instead of just the payload of the message. This is because we want to\
    \ pass the message with headers to the SI flow to highlight the `MessageBuilder<T>`\
    \ features. [Listing 8-7](#9781484207949_Ch08_1.xhtml#FPar9) shows the message\
    \ creation.\n\n[***Listing 8-7***](#9781484207949_Ch08_1.xhtml#_FPar9). Programmatic\
    \ Message Creation Example (0801-programmatic-message-creation)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter08;\nimport net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceMessage;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.ImportResource;\n\
    import org.springframework.integration.support.MessageBuilder;\nimport org.springframework.messaging.Message;\n\
    \n@SpringBootApplication\n@ImportResource(\"classpath:si-config.xml\")\npublic\
    \ class SiApplication {\n  public static void main(String[] args) throws InterruptedException\
    \ {\n    ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);\n\
    \nSiWrapperServiceMessage wrapperService =\n        ctx.getBean(SiWrapperServiceMessage.class);\n\
    \nMessage<String> message1 = MessageBuilder.withPayload(\"message1\")\n      \
    \      .setHeader(\"simpleHeader\", \"simple header\")\n            .build();\n\
    \    wrapperService.processMessage(message1);\n\nMessage<String> message2 = MessageBuilder.fromMessage(message1)\n\
    \        .setPriority(10)\n        .setCorrelationId(System.currentTimeMillis())\n\
    \        .build();\n    wrapperService.processMessage(message2);\n\nMessage<String>\
    \ message3 = MessageBuilder.withPayload(\"message3\")\n        .copyHeaders(message2.getHeaders())\n\
    \        .removeHeader(\"simpleHeader\")\n        .build();\n    wrapperService.processMessage(message3);\n\
    \nMessage<String> message4 = MessageBuilder.withPayload(\"message4\")\n      \
    \  .setPriority(5)\n        .copyHeadersIfAbsent(message2.getHeaders())\n    \
    \    .build();\n    wrapperService.processMessage(message4);\n  }\n}\n```\n\n\
    This is a Java class with the main method using Spring Boot to start the application\
    \ based on `@SpringBootApplication` and the `SpringApplication.run()` method.\
    \ It imports the XML SI flow configuration located in the file `si-config.xml`.\
    \ The SI flow hidden behind this SI configuration is not important for this message\
    \ creation example and therefore we won’t focus on it now. The SI building blocks\
    \ located in the `si-config.xml` XML configuration are explained in later examples.\
    \ The only important fact here is that it configures the simple SI flow, which\
    \ only logs the message behind the scenes.\n\nAfter the `SpringApplication.run()`,\
    \ the SI application is initiated and configured, and we can start using it. First\
    \ we read the `SiWrapperServiceMessage` bean, so that we have an entry point for\
    \ sending messages. You might be confused about how we can inject this bean without\
    \ registering its implementation into the Spring context. We just mention here\
    \ that implementation of this interface is configured in `si-config.xml` and consists\
    \ of SI components.\n\nThe logic following this call will be explained after we\
    \ execute this class as a Java application. We can observe similar output as in\
    \ [Listing 8-8](#9781484207949_Ch08_1.xhtml#FPar10).\n\n[***Listing 8-8***](#9781484207949_Ch08_1.xhtml#_FPar10).\
    \ Output of Programmatic Message Creation Example\n\n```\n2015-08-21 21:39:12.353\
    \  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage\n: Message:\
    \ GenericMessage [payload=message1, headers={simpleHeader=simple header,\nid=9779333f-b352-eb83-afdf-a52f7f4fed01,\
    \ timestamp=1440189552345}]\n2015-08-21 21:39:12.366  INFO 30700 --- [       \
    \    main] n.l.b.e.c.out.WriteServiceMessage\n: Message: GenericMessage [payload=message1,\
    \ headers={simpleHeader=simple header,\ncorrelationId=1440189552365, id=c46ff29f-c743-90dd-11b2-4c64e36a3d0b,\
    \ priority=10,\ntimestamp=1440189552365}]\n2015-08-21 21:39:12.367  INFO 30700\
    \ --- [           main] n.l.b.e.c.out.WriteServiceMessage\n: Message: GenericMessage\
    \ [payload=message3, headers={correlationId=1440189552365,\nid=1fbbf243-0cc5-9d35-a8d1-f2d97a54d63d,\
    \ priority=10, timestamp=1440189552366}]\n2015-08-21 21:39:12.367  INFO 30700\
    \ --- [           main] n.l.b.e.c.out.WriteServiceMessage\n: Message: GenericMessage\
    \ [payload=message4, headers={simpleHeader=simple header,\ncorrelationId=1440189552365,\
    \ id=b91e5386-9151-0c94-cc6f-361bb688f480, priority=5,\ntimestamp=1440189552367}]\n\
    ```\n\nWith `MessageBuilder<T>` help, we create a message with the payload `message1`,\
    \ header `simpleHeader`, and value `simple header`. Calls against `MessageBuilder<T>`,\
    \ where we chain methods via dot calls, is the *fluent API* we mentioned. This\
    \ chain (fluent API) can continue until we are finished with message creation.\
    \ Creation is finished by calling `MessageBuilder<T>.build()`. This call at the\
    \ end is needed because the created message is immutable and the `build()` method\
    \ calls all the necessary constructors for `Message<T>` and `MessageHeaders` to\
    \ create our message based on the recorded configuration.\n\nAfter we create the\
    \ message, we call the `wrapperService` bean to initiate the SI flow, which in\
    \ this simple case logs the message.\n\nThe second message is created from `message1`\
    \ and adds some SI default headers via specialized methods. In this case, we configure\
    \ `priority`, which can be used to amend message consumption ordering in the SI\
    \ flow, and `correlationId`, which can be used to aggregate various messages into\
    \ one message. We don’t need to worry about these SI features now, as they are\
    \ explained later in this chapter. The feature highlighted here is the fact that\
    \ we can use specialized methods to create message headers that SI understands\
    \ and can use them to affect the flow of messages.\n\nThe third message copies\
    \ all headers from `message2`. This is handy when we want to slightly amend the\
    \ SI message. In this case, the mentioned amendment is removal of the `simpleHeader`\
    \ header."
  raw: 'If you are not familiar with the term *fluent API*, it will be described in
    a subsequent example. Notice that the Spring Core framework introduced in version
    4 a messaging module with `org.springframework.messaging.support.MessageBuilder<T>`.
    It is a slightly different implementation from `org.springframework.integration.support.MessageBuilder<T>`,
    but produces messages of the same type. With SI, we should use `org.springframework.integration.support.MessageBuilder<T>`,
    because it can create various message headers tailored to SI communication.


    Bear in mind that the focus of this example is the creation of messages, not their
    processing. The processing part of this example will be hidden in this example
    and explained later in the chapter. This example will use a wrapper for SI flow,
    shown in [Listing 8-6](#9781484207949_Ch08_1.xhtml#FPar8).


    [***Listing 8-6***](#9781484207949_Ch08_1.xhtml#_FPar8). SI Wrapper Interface
    for Programmatic Message Creation Example (0801-programmatic-message-creation)


    ```

    package net.lkrnac.book.eiws.chapter08.in;

    import org.springframework.messaging.Message;


    public interface SiWrapperServiceMessage {

      public void processMessage(Message<String> message);

    }

    ```


    This SI flow wrapper interface is slightly different from the common wrapper interfaces
    in [Listings 8-1](#9781484207949_Ch08_1.xhtml#FPar3) and [8-2](#9781484207949_Ch08_1.xhtml#FPar4),
    because it accepts a full message object instead of just the payload of the message.
    This is because we want to pass the message with headers to the SI flow to highlight
    the `MessageBuilder<T>` features. [Listing 8-7](#9781484207949_Ch08_1.xhtml#FPar9)
    shows the message creation.


    [***Listing 8-7***](#9781484207949_Ch08_1.xhtml#_FPar9). Programmatic Message
    Creation Example (0801-programmatic-message-creation)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceMessage;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.ImportResource;

    import org.springframework.integration.support.MessageBuilder;

    import org.springframework.messaging.Message;


    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    SiWrapperServiceMessage wrapperService =

            ctx.getBean(SiWrapperServiceMessage.class);


    Message<String> message1 = MessageBuilder.withPayload("message1")

                .setHeader("simpleHeader", "simple header")

                .build();

        wrapperService.processMessage(message1);


    Message<String> message2 = MessageBuilder.fromMessage(message1)

            .setPriority(10)

            .setCorrelationId(System.currentTimeMillis())

            .build();

        wrapperService.processMessage(message2);


    Message<String> message3 = MessageBuilder.withPayload("message3")

            .copyHeaders(message2.getHeaders())

            .removeHeader("simpleHeader")

            .build();

        wrapperService.processMessage(message3);


    Message<String> message4 = MessageBuilder.withPayload("message4")

            .setPriority(5)

            .copyHeadersIfAbsent(message2.getHeaders())

            .build();

        wrapperService.processMessage(message4);

      }

    }

    ```


    This is a Java class with the main method using Spring Boot to start the application
    based on `@SpringBootApplication` and the `SpringApplication.run()` method. It
    imports the XML SI flow configuration located in the file `si-config.xml`. The
    SI flow hidden behind this SI configuration is not important for this message
    creation example and therefore we won’t focus on it now. The SI building blocks
    located in the `si-config.xml` XML configuration are explained in later examples.
    The only important fact here is that it configures the simple SI flow, which only
    logs the message behind the scenes.


    After the `SpringApplication.run()`, the SI application is initiated and configured,
    and we can start using it. First we read the `SiWrapperServiceMessage` bean, so
    that we have an entry point for sending messages. You might be confused about
    how we can inject this bean without registering its implementation into the Spring
    context. We just mention here that implementation of this interface is configured
    in `si-config.xml` and consists of SI components.


    The logic following this call will be explained after we execute this class as
    a Java application. We can observe similar output as in [Listing 8-8](#9781484207949_Ch08_1.xhtml#FPar10).


    [***Listing 8-8***](#9781484207949_Ch08_1.xhtml#_FPar10). Output of Programmatic
    Message Creation Example


    ```

    2015-08-21 21:39:12.353  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage

    : Message: GenericMessage [payload=message1, headers={simpleHeader=simple header,

    id=9779333f-b352-eb83-afdf-a52f7f4fed01, timestamp=1440189552345}]

    2015-08-21 21:39:12.366  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage

    : Message: GenericMessage [payload=message1, headers={simpleHeader=simple header,

    correlationId=1440189552365, id=c46ff29f-c743-90dd-11b2-4c64e36a3d0b, priority=10,

    timestamp=1440189552365}]

    2015-08-21 21:39:12.367  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage

    : Message: GenericMessage [payload=message3, headers={correlationId=1440189552365,

    id=1fbbf243-0cc5-9d35-a8d1-f2d97a54d63d, priority=10, timestamp=1440189552366}]

    2015-08-21 21:39:12.367  INFO 30700 --- [           main] n.l.b.e.c.out.WriteServiceMessage

    : Message: GenericMessage [payload=message4, headers={simpleHeader=simple header,

    correlationId=1440189552365, id=b91e5386-9151-0c94-cc6f-361bb688f480, priority=5,

    timestamp=1440189552367}]

    ```


    With `MessageBuilder<T>` help, we create a message with the payload `message1`,
    header `simpleHeader`, and value `simple header`. Calls against `MessageBuilder<T>`,
    where we chain methods via dot calls, is the *fluent API* we mentioned. This chain
    (fluent API) can continue until we are finished with message creation. Creation
    is finished by calling `MessageBuilder<T>.build()`. This call at the end is needed
    because the created message is immutable and the `build()` method calls all the
    necessary constructors for `Message<T>` and `MessageHeaders` to create our message
    based on the recorded configuration.


    After we create the message, we call the `wrapperService` bean to initiate the
    SI flow, which in this simple case logs the message.


    The second message is created from `message1` and adds some SI default headers
    via specialized methods. In this case, we configure `priority`, which can be used
    to amend message consumption ordering in the SI flow, and `correlationId`, which
    can be used to aggregate various messages into one message. We don’t need to worry
    about these SI features now, as they are explained later in this chapter. The
    feature highlighted here is the fact that we can use specialized methods to create
    message headers that SI understands and can use them to affect the flow of messages.


    The third message copies all headers from `message2`. This is handy when we want
    to slightly amend the SI message. In this case, the mentioned amendment is removal
    of the `simpleHeader` header.'
