    \n        processor=\"simpleRecordProcessor\" commit-interval=\"4\"/>\n    </batch:tasklet>\n\
    \  </batch:step>\n\n<int:channel id=\"inSlaveChannel\" />\n  <int-jms:message-driven-channel-adapter\n\
    \    id=\"inSlaveAdapter\" destination=\"masterCommands\" channel=\"inSlaveChannel\"\
    \ />\n\n<int:service-activator ref=\"stepExecutionRequestHandler\"\n    input-channel=\"\
    inSlaveChannel\" output-channel=\"outSlaveChannel\" />\n\n<int:channel id=\"outSlaveChannel\"\
    \ />\n  <int-jms:outbound-channel-adapter id=\"outSlaveAdapter\"\n    destination=\"\
    slaveResponses\" channel=\"outSlaveChannel\" />\n</beans>\n```\n\nFirst, we import\
    \ the JMS configuration, so that the slave process can access the JMS messaging\
    \ server in order to receive commands from the master. The `dataSource` bean is\
    \ used to access the shared database hosted by the example project `0940-remote-partitioning-sql-server`.\n\
    \nNext, the `StepExecutionRequestHandler` bean is the `MessagingEndpoint` used\
    \ to handle commands from the master process. These commands will arrive as a\
    \ `StepExecutionRequest` instance, and this handler should respond to the master\
    \ with a `StepExecution` instance. The `jobExplorer` property of this bean is\
    \ created by Spring Boot autoconfiguration and is used to access the SB metadata\
    \ stored in the shared database. The `stepLocator` property is a bean created\
    \ by the next bean definition and is of type `BeanFactoryStepLocator`. It is used\
    \ for scanning the Spring context for SB `Step` instances. `Step` located in this\
    \ Spring context will be used to perform SB work.\n\nThis `Step` instance is defined\
    \ by the `<batch:step>` XML tag and configured to use chunk-oriented processing\
    \ for this slave. For the `ItemReader`, we use `PartitionedRecordReader` shown\
    \ in the previous listing. The processor and writer instances are our common beans\
    \ used across the chapter.\n\nThe following beans define JMS communication with\
    \ the master. The commands are received from the JMS queue `masterCommands` and\
    \ forwarded to the local Spring Integration channel `inSlaveChannel`. This channel\
    \ is connected to `stepExecutionRequestHandler`, which performs batch processing.\
    \ Its reply is forwarded to Spring Integration’s `outSlaveChannel` and passed\
    \ to the JMS queue `slaveResponses`, respectively.\n\n[Figure 9-10](#9781484207949_Ch09_3_Ext.xhtml#Fig10)\
    \ shows the Spring Integration graph for this slave configuration.\n\n![9781484207949_Fig09-10.jpg](images/9781484207949_Fig09-10.jpg)\n\
    \n[Figure 9-10](#9781484207949_Ch09_3_Ext.xhtml#_Fig10). Spring Integration graph\
    \ for slave configuration of remote partitioning example (file `batch-slave-configuration.xml`\
    \ in folder `src/main/resource` of example project `0940-remote-partitioning-slave`)\n\
    \n[Listing 9-136](#9781484207949_Ch09_3_Ext.xhtml#FPar140) shows the main class\
    \ of the slave project.\n\n[***Listing 9-136***](#9781484207949_Ch09_3_Ext.xhtml#_FPar140).\
    \ Main Class of Remote Partitioning Slave (`0940-remote-partitioning-slave`)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.annotation.ImportResource;\n\n@SpringBootApplication\n\
    @EnableBatchProcessing\n@ImportResource(\"classpath:batch-slave-config.xml\")\n\
    public class BatchSlaveApplication {\n  public static void main(String[] args)\
    \ throws InterruptedException {\n    SpringApplication.run(BatchSlaveApplication.class,\
    \ args);\n  }\n}\n```\n\nWe include the slave XML configuration and run the Spring\
    \ Boot application with batch processing enabled.\n\n## Master Partitioning Project\n\
    \n[Listing 9-137](#9781484207949_Ch09_3_Ext.xhtml#FPar141) shows the `Partitioner`\
    \ implementation.\n\n[***Listing 9-137***](#9781484207949_Ch09_3_Ext.xhtml#_FPar141).\
    \ `Partitioner` Implementation (`0940-remote-partitioning-master`)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter09;\nimport java.util.HashMap;\nimport java.util.Map;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.batch.core.partition.support.Partitioner;\n\
