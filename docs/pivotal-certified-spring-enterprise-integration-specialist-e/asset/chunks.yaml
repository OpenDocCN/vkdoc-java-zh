    \nClient-side support is a crucial part of Spring offerings because it allows\
    \ us to generate a Java model from an XSD contract. Finally, the chapter explained\
    \ how to intercept and handle errors and to test Spring configurations in isolation\
    \ and more effectively.\n\n# CHAPTER 4\n\n![image](images/frontdot.jpg)\n\n# RESTful\
    \ Web Services\n\nThis chapter explains the principles that conquer the enterprise\
    \ integration world. It’s about Representational State Transfer, or REST.\n\n\
    The evolution of distributed systems didn’t stop with remoting and web services.\
    \ SOAP allowed high decoupling, which solved a major problem of remoting technologies.\
    \ As a successor of remoting technologies, SOAP web services were adopted by big\
    \ enterprise companies. Cooperation between distributed development teams was\
    \ enhanced, because SOAP web services rely on contracts. A well-defined XSD/WSDL\
    \ contract can help avoid ambiguities or sanitize poor communication between developers\
    \ on the client side and those on the server side.\n\nBut after some time, many\
    \ people started to experience problems with SOAP web services. First, developing\
    \ SOAP web services is not trivial. SOAP’s complexity started to create a bigger\
