    package net.lkrnac.book.eiws.chapter08.out;

    import net.lkrnac.book.eiws.chapter08.out.WriteRepository;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.integration.annotation.ServiceActivator;

    import org.springframework.stereotype.Service;


    @Service

    public class WriteServiceAnnotated {

      private WriteRepository writeRepository;


    @Autowired

      public WriteServiceAnnotated(WriteRepository writeRepository) {

        super();

        this.writeRepository = writeRepository;

      }


    @ServiceActivator(inputChannel = "transformedChannel")

      public boolean writeAndIndicateSuccess(String message) {

        return writeRepository.persist(message) == 1;

      }

    }

    ```


    This service activator is similar to the service activator in example `0809-gateway-generic-javaconfig`
    **(**[Listing 8-31](#9781484207949_Ch08_1.xhtml#FPar34)), with one difference.
    The service activator input channel is in this case `transformedChannel`. We also
    borrowed the class from `SiWrapperServiceAnnotated` of the same example and [Listing
    8-32](#9781484207949_Ch08_1.xhtml#FPar35).


    So the integration component scan has the chain `SiWrapperServiceAnnotated` ![image](images/arrow.jpg)
    `SimpleMessageTransformer` ![image](images/arrow.jpg) `WriteServiceAnnotated`.
    [Listing 8-42](#9781484207949_Ch08_1.xhtml#FPar45) covers the main class of this
    example.


    [***Listing 8-42***](#9781484207949_Ch08_1.xhtml#_FPar45). Main Class of Generic
    Transformer Based on Java Configuration (0812-transformer-generic-javaconfig)


    ```

