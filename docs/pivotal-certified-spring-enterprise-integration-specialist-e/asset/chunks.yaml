    Example of JSON Conversion


    To demonstrate the out-of-the-box JSON conversion that Spring JMS provides, we
    need to register the `MessageConverter` bean, as shown in [Listing 5-35](#9781484207949_Ch05.xhtml#FPar38).


    [***Listing 5-35***](#9781484207949_Ch05.xhtml#_FPar38). JSON JMS Conversion Configuration
    (0509-jms-message-converter)


    ```

    package net.lkrnac.book.eiws.chapter05.user;


    import javax.jms.ConnectionFactory;


    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.jms.config.DefaultJmsListenerContainerFactory;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.jms.support.converter.MappingJackson2MessageConverter;

    import org.springframework.jms.support.converter.MessageConverter;

    import org.springframework.jms.support.converter.MessageType;


    @Configuration

    @EnableJms

    public class JmsConfiguration {

      @Bean

      public MessageConverter messageConverter() {

        MappingJackson2MessageConverter messageConverter =

            new MappingJackson2MessageConverter();

        messageConverter.setTargetType(MessageType.TEXT);

        messageConverter.setTypeIdPropertyName("__type");

        return messageConverter;

      }


    @Bean

      public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory,

          MessageConverter messageConverter) {

        JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);

        jmsTemplate.setMessageConverter(messageConverter);

        return jmsTemplate;

      }


    @Bean

      public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(

          ConnectionFactory connectionFactory, MessageConverter messageConverter)
    {

        DefaultJmsListenerContainerFactory factory =

            new DefaultJmsListenerContainerFactory();

        factory.setConnectionFactory(connectionFactory);

        factory.setMessageConverter(messageConverter);

        return factory;

      }

    }

    ```


    The first bean registered in this configuration class is `messageConverter`. We
    use the `MappingJackson2MessageConverter` implementation that covers JSON conversion.
    In order to tell Spring that our target format is plain text, we need to configure
    the `targetType` property to `MessageType.TEXT`. The `typeIdPropertyName` property
    with the value `__type` is needed, because Spring needs to know that we are converting
    text-transport format into/from Java POJOs. The `__type` value is used as a special
    JMS header that holds the full Java name of the type being used for JSON conversion.
    Two underscores should ensure that this header won’t conflict with the custom
    JMS header that the application may use.


    The next two beans are already familiar to us. `JmsTemplate` is used for sending
    messages, and `DefaultJmsListenerContainerFactory` is used for message reception.
    The difference here is that we inject and set the `messageConverter` property
    for both.


    [Listing 5-36](#9781484207949_Ch05.xhtml#FPar39) shows how to send the `User`
    object to the JMS destination.


