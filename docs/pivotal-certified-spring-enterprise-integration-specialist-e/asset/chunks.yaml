      public static void main(String[] args) throws InterruptedException {

        SpringApplication.run(BatchApplication.class);

      }

    }

    ```


    This is the standard Spring Boot main application class. The `@SpringBootApplication`
    annotation executes Spring Boot’s autoconfiguration and component scan in the
    current package and subpackages. This configuration is then executed in the main
