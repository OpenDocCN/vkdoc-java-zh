    \ creation was successful\n\n`PUT`:\n\n*   Used for updating or creating a resource\
    \ instance specified by a concrete URI\n*   Idempotent operation, because it doesn’t\
    \ create a new resource instance every time. The first time, it creates a new\
    \ instance; subsequently, it updates the same instance. So each request has the\
    \ same effect.\n*   Unsafe operation, because it changes the state of the application\n\
    *   Request should contain a representation of the resource in the message body\n\
    *   Response typically doesn’t contain a body\n*   Commonly used response success\
    \ statuses:\n    *   200 OK—resource was updated\n    *   201 Created—resource\
    \ was created\n\n`DELETE`:\n\n*   Releases instance of the resource based on a\
    \ given URI\n*   Idempotent operation, because all requests for deleting the same\
    \ resource instance have the same result—the resource instance is released.\n\
    *   Unsafe operation, because it changes the state of the application\n*   Request\
    \ or response of this type shouldn’t contain a body\n*   Commonly used response\
    \ success statuses:\n    *   200 OK—resource was deleted\n    *   204 No Content—resource\
    \ doesn’t exist\n\n`HEAD`:\n\n*   Similar to `GET`, but it reads headers without\
    \ the body\n*   Idempotent and safe operation\n*   Is also cacheable\n*   Request\
    \ or response of this type shouldn’t contain body\n*   Commonly used response\
    \ success statuses:\n    *   200 OK—resource read was successful\n    *   204\
    \ No Content—resource does not exist\n\n![Image](images/sq.jpg) **Note**  A full\
    \ list of HTTP method types can be found on Wikipedia: `en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods`.\n\
    \nDevelopers have to bear in mind that the safety and idempotency parameters of\
    \ these HTTP methods are fulfilled only when the HTTP standard is followed. Unfortunately,\
    \ a lot of applications are implemented without these parameters in mind or by\
    \ breaking HTTP contract rules. Such applications break the HTTP contract and\
    \ therefore can’t be called RESTful.\n\nImplementing all methods for each resource\
    \ isn’t necessary. For example, some resources are read-only based on application\
    \ requirements, so the server doesn’t need to handle `POST`/`PUT`/`DELETE`. Therefore,\
    \ the server should send HTTP status code 405 Method Not Allowed, if such a request\
    \ is performed against a read-only resource.\n\nJAX-RS\n\nSupport for developing\
    \ REST applications is represented in Java by a standard API, which is part of\
    \ Java Enterprise Edition (JEE) standards. Its name is Java API for RESTful Web\
    \ Services, or JAX-RS (`https://jax-rs-spec.java.net`). Like all APIs from JEE,\
    \ JAX-RS is not an implementation of REST support. It’s a standard abstraction.\
    \ For running and using this API in production, a JEE-compliant application server\
    \ or at least a server that conforms to the JAX-RS standard is needed.\n\nA similar\
    \ approach is used across all the APIs provided by JEE. Each API’s abstraction\
    \ can have various implementations. The JEE standard was created to unify the\
    \ surface layers of Java application servers provided from different vendors.\
    \ Migration from one JEE-compliant server to another is much easier when most\
    \ of their APIs are the same. In addition, leveraging JEE APIs allows for reuse\
    \ of experience and JEE API knowledge, which decreases the learning curve for\
    \ developers migrating to a different application server.\n\nJAX-RS Implementations\n\
    \nSo when we want to use JAX-RS, we also need an application server or a lightweight\
    \ runtime implementing this API. As JAX-RS is an abstraction on top of servlets,\
    \ we have to use it with a servlet container. Here are the main application servers\
    \ or runtimes implementing JAX-RS:\n\n*   *Jersey*: A reference implementation\
    \ of JAX-RS APIs. Can be used alone and is also shipped by Oracle as part of the\
    \ GlassFish JEE application server.\n*   *Apache CXF*: Framework for SOAP and\
    \ REST web services with JMS, OSGi, and CORBA support.\n*   *RESTEasy*: Implementation\
    \ of JAX-RS that can run on any servlet container. Can be used alone or with JBoss\
    \ Application server.\n*   *Restlet*: Open source JAX-RS implementation, which\
    \ can integrate with various Java technologies and frameworks.\n*   *WebSphere\
    \ Application Server*: Full JEE-compliant commercial solution from IBM.\n*   *WebLogic\
    \ Server*: Full JEE-compliant commercial solution from Oracle.\n*   *Apache Tuscany*:\
    \ Provides REST support alongside wider support for the Service Component Architecture\
    \ (SCA) specification.\n\nJAX-RS API\n\nThe main surface of the JAX-RS API consists\
    \ of various annotations for declaring Java REST endpoints. We have annotations\
    \ for declaring the following:\n\n*   URL mapping—`@Path`\n*   HTTP method binding—`@GET`,\
    \ `@HEADER`, `@POST`, `@PUT`, `@DELETE`\n*   Content type handling\n    *   `@Produces`:\
    \ Content types being produced by endpoint\n    *   `@Consumes`: Content types\
    \ that can be consumed by endpoint\n*   Data extraction from the HTTP message\n\
    \    *   `@QueryParam`: Parses the parameter value from the query part of the\
    \ URI\n    *   `@PathParam`: Parses the parameter value from the URI\n    *  \
    \ `@HeaderParam`: Parses the HTTP header\n    *   `@DefaultValue`: Specifies the\
    \ default value if the parameter binding is not found\n    *   `@Context`: Retrieves\
    \ the entire context of the request or response (for example, `@Context HttpServletRequest\
    \ httpRequest`)\n    *   `@CookieParam`: Retrieves the cookie value into the method\
    \ parameter\n    *   `@FormParam`: Retrieves the form value into the method parameter\n\
    \nWith these annotations, we have powerful control over parsing and handling HTTP\
    \ message metadata. For handling the HTTP message payload itself, JAX-RS integrates\
    \ with various payload serialization libraries. So for converting Java objects\
    \ into JSON, XML, and other formats and back, JAX-RS can integrate with main libraries\
    \ such as Jackson (JSON serialization library) or JAXB 2 (XML serialization library).\
    \ In the majority of cases, we don’t need to call these libraries directly, because\
    \ JAX-RS (or more precisely, the implementation of JAX-RS we are using) uses them\
    \ under the hood.\n\nCommon Classes Used in Examples\n\nLet’s dive into a simple\
    \ example. Because this book is about Spring, we are going to integrate JAX-RS\
    \ with Spring. But first we need to introduce the domain for all the examples\
    \ in this chapter. A simple model POJO is shown in [Listing 4-3](#9781484207949_Ch04.xhtml#FPar9)\
    \ .\n\n[***Listing 4-3***](#9781484207949_Ch04.xhtml#_FPar9). Model POJO Used\
    \ in All REST Examples (0400-rest-common )\n\n```\npackage net.lkrnac.book.eiws.chapter04.model;\n\
    \nimport lombok.Data;\nimport lombok.EqualsAndHashCode;\n\n@Data\n@EqualsAndHashCode(of\
    \ = { \"email\" })\npublic class User {\n  private String email;\n  private String\
    \ name;\n}\n```\n\nThis is a simple class with simplified modeling of the `User`\
    \ object. Properties of this simple POJO should store an e-mail address and user’s\
    \ name. Such a simplified model is enough to demonstrate REST API development.\n\
    \nIn some examples, we will need to compare the equality of `User` objects. Historically,\
    \ we would override `Object.hashCode` and `Object.equals` methods to fulfill the\
    \ Java hash code and equality contract."
  trans: "\n*   基于通用资源 URL 创建资源的新实例\n*   非幂等操作，因为重复请求应创建新资源\n*   应在响应中返回 `Location`\
    \ 标头，以标识所创建的资源实例\n*   不安全操作，因为重复创建会通过创建新资源实例来改变状态\n*   请求应在消息体中包含资源的表示形式\n*  \
    \ 响应通常不包含消息体\n*   常用的响应成功状态码：\n    *   201 Created（已创建）——资源创建成功\n\n`PUT`：\n\n\
    *   用于更新或创建由具体 URI 指定的资源实例\n*   幂等操作，因为它不会每次都创建新的资源实例。第一次会创建新实例；后续则更新同一实例。因此每次请求的效果相同。\n\
    *   不安全操作，因为它会改变应用程序的状态\n*   请求应在消息体中包含资源的表示形式\n*   响应通常不包含消息体\n*   常用的响应成功状态码：\n\
    \    *   200 OK（成功）——资源已更新\n    *   201 Created（已创建）——资源已创建\n\n`DELETE`：\n\n*\
    \   释放基于给定 URI 的资源实例\n*   幂等操作，因为所有删除同一资源实例的请求结果相同——资源实例被释放。\n*   不安全操作，因为它会改变应用程序的状态\n\
    *   此类型的请求或响应不应包含消息体\n*   常用的响应成功状态码：\n    *   200 OK（成功）——资源已删除\n    *   204\
    \ No Content（无内容）——资源不存在\n\n`HEAD`：\n\n*   类似于 `GET`，但仅读取标头而不读取消息体\n*   幂等且安全的操作\n\
    *   也可缓存\n*   此类型的请求或响应不应包含消息体\n*   常用的响应成功状态码：\n    *   200 OK（成功）——资源读取成功\n\
    \    *   204 No Content（无内容）——资源不存在\n\n![Image](img/sq.jpg) **注意**  HTTP 方法类型的完整列表可在维基百科上找到：`en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods`。\n\
    \n开发人员必须牢记，只有在遵循 HTTP 标准时，这些 HTTP 方法的安全性和幂等性参数才能得到满足。不幸的是，许多应用程序在实现时并未考虑这些参数，甚至违反了\
    \ HTTP 契约规则。此类应用程序破坏了 HTTP 契约，因此不能被称为 RESTful。\n\n并非每个资源都需要实现所有方法。例如，根据应用程序需求，某些资源是只读的，因此服务器无需处理\
    \ `POST`/`PUT`/`DELETE`。因此，如果对只读资源执行此类请求，服务器应发送 HTTP 状态码 405 Method Not Allowed（方法不允许）。\n\
    \nJAX-RS\n\n在 Java 中，对开发 REST 应用程序的支持由标准 API 提供，该 API 是 Java 企业版（JEE）标准的一部分。其名称为\
    \ Java API for RESTful Web Services，简称 JAX-RS（`https://jax-rs-spec.java.net`）。与\
    \ JEE 的所有 API 一样，JAX-RS 并非 REST 支持的具体实现，而是一种标准抽象。要在生产环境中运行和使用此 API，需要符合 JEE 标准的应用服务器，或至少是符合\
    \ JAX-RS 标准的服务器。\n\nJEE 提供的所有 API 都采用类似的方法。每个 API 的抽象层可以有多种实现。JEE 标准的创建是为了统一不同供应商提供的\
    \ Java 应用服务器的表层。当大多数 API 相同时，从一个符合 JEE 标准的服务器迁移到另一个服务器会容易得多。此外，利用 JEE API 可以复用经验和\
    \ JEE API 知识，从而降低开发人员迁移到不同应用服务器的学习曲线。\n\nJAX-RS 实现\n\n因此，当我们想要使用 JAX-RS 时，还需要一个应用服务器或实现此\
    \ API 的轻量级运行时。由于 JAX-RS 是 Servlet 之上的抽象层，我们必须将其与 Servlet 容器一起使用。以下是实现 JAX-RS 的主要应用服务器或运行时：\n\
    \n*   *Jersey*：JAX-RS API 的参考实现。可单独使用，也可由 Oracle 作为 GlassFish JEE 应用服务器的一部分提供。\n\
    *   *Apache CXF*：支持 SOAP 和 REST Web 服务的框架，并支持 JMS、OSGi 和 CORBA。\n*   *RESTEasy*：JAX-RS\
    \ 的实现，可在任何 Servlet 容器上运行。可单独使用，也可与 JBoss 应用服务器一起使用。\n*   *Restlet*：开源 JAX-RS 实现，可与多种\
    \ Java 技术和框架集成。\n*   *WebSphere Application Server*：IBM 提供的完整符合 JEE 标准的商业解决方案。\n\
    *   *WebLogic Server*：Oracle 提供的完整符合 JEE 标准的商业解决方案。\n*   *Apache Tuscany*：在更广泛支持服务组件架构（SCA）规范的同时提供\
    \ REST 支持。\n\nJAX-RS API\n\nJAX-RS API 的主要表层由用于声明 Java REST 端点的各种注解组成。我们有以下用于声明的注解：\n\
    \n*   URL 映射——`@Path`\n*   HTTP 方法绑定——`@GET`、`@HEADER`、`@POST`、`@PUT`、`@DELETE`\n\
    *   内容类型处理\n    *   `@Produces`：端点生成的内容类型\n    *   `@Consumes`：端点可消费的内容类型\n* \
    \  从 HTTP 消息中提取数据\n    *   `@QueryParam`：从 URI 的查询部分解析参数值\n    *   `@PathParam`：从\
    \ URI 解析参数值\n    *   `@HeaderParam`：解析 HTTP 标头\n    *   `@DefaultValue`：如果未找到参数绑定，则指定默认值\n\
    \    *   `@Context`：检索请求或响应的完整上下文（例如，`@Context HttpServletRequest httpRequest`）\n\
    \    *   `@CookieParam`：将 Cookie 值检索到方法参数中\n    *   `@FormParam`：将表单值检索到方法参数中\n\
    \n借助这些注解，我们可以对 HTTP 消息元数据的解析和处理进行强大控制。对于处理 HTTP 消息有效负载本身，JAX-RS 与各种有效负载序列化库集成。因此，为了将\
    \ Java 对象转换为 JSON、XML 及其他格式并转换回来，JAX-RS 可以与 Jackson（JSON 序列化库）或 JAXB 2（XML 序列化库）等主流库集成。在大多数情况下，我们无需直接调用这些库，因为\
    \ JAX-RS（更准确地说，是我们正在使用的 JAX-RS 实现）会在底层使用它们。\n\n示例中使用的公共类\n\n让我们深入一个简单的示例。由于本书是关于\
    \ Spring 的，我们将把 JAX-RS 与 Spring 集成。但首先，我们需要介绍本章所有示例的领域模型。一个简单的模型 POJO 如清单 4-3\
    \ 所示。\n\n***清单 4-3***. 所有 REST 示例中使用的模型 POJO（0400-rest-common）\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter04.model;\n\nimport lombok.Data;\nimport lombok.EqualsAndHashCode;\n\
    \n@Data\n@EqualsAndHashCode(of = { \"email\" })\npublic class User {\n  private\
    \ String email;\n  private String name;\n}\n```\n\n这是一个简单的类，对 `User` 对象进行了简化建模。这个简单\
    \ POJO 的属性应存储电子邮件地址和用户名。这样的简化模型足以演示 REST API 的开发。\n\n在某些示例中，我们需要比较 `User` 对象的相等性。传统上，我们会重写\
    \ `Object.hashCode` 和 `Object.equals` 方法来满足 Java 哈希码和相等性契约。\n"
- fmt: "# 排版后的文本\n\nBut our implementation uses the third-party library Lombok (`https://projectlombok.org`).\
    \ Lombok is a handy productivity library that aims to eliminate some verbose parts\
    \ of the Java language. The `hashCode` and `equals` methods are generated by the\
    \ `@EqualsAndHashCode` annotation. Because we need to use only the `email` property\
    \ in the equality contract, we specify it in the annotation parameter `of`. If\
    \ we don’t specify it explicitly, Lombok will use all the properties of `User`\
    \ POJO in the hash/equality contract.\n\nMoreover, Lombok helps us to generate\
    \ getters and setters for all properties in the `User` class via the `@Data` annotation.\n\
    \n![Image](images/sq.jpg) **Note** `Object.equals` and `Object.hashCode` are fundamental\
    \ principles to understand in object-oriented Java programming: equal objects\
    \ must have equal hash codes. Proper implementation ensures that objects are treated\
    \ equally and handled properly in Java collections. Incorrect implementation can\
    \ lead to confusing bugs. Implementation of `hashCode` and `equals` can be verbose\
    \ and error prone; developers can introduce a lot of problems. Most of them are\
    \ gathered in these Stack Overflow answers: `http://stackoverflow.com/questions/27581/what-issues-should-be-considered-when-overriding-equals-and-hashcode-in-java`.\
    \ Therefore, I *strongly recommend* looking into the Lombok library (`http://projectlombok.org/features/EqualsAndHashCode.html`)\
    \ when overriding the `Object.hashCode` and `Object.equals` contract.\n\n[Listing\
    \ 4-4](#9781484207949_Ch04.xhtml#FPar11) shows the second class that will be used\
    \ in most of the REST examples.\n\n[***Listing 4-4***](#9781484207949_Ch04.xhtml#_FPar11).\
    \ User Repository Used in All REST Examples (0400-rest-common)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter04.persistence;\n\nimport java.util.Collection;\n\
    import java.util.Collections;\nimport java.util.HashMap;\nimport java.util.Map;\n\
    import java.util.stream.Collectors;\nimport net.lkrnac.book.eiws.chapter04.model.User;\n\
    import org.springframework.stereotype.Repository;\n\n@Repository\npublic class\
    \ UserRepository {\n  private final Map<Integer, User> users = new HashMap<>();\n\
    \  private int userSequence;\n\npublic synchronized Collection<User> getAllUsers()\
    \ {\n    return Collections.unmodifiableCollection(users.values());\n  }\n\npublic\
    \ synchronized User getUser(int identifier) {\n    if (identifier == -1) {\n \
    \     throw new UnsupportedOperationException(\"Identifier -1 is not supported.\"\
    );\n    }\n    return users.get(identifier);\n  }\n\npublic synchronized int addUser(User\
    \ user) {\n    users.put(userSequence, user);\n    return userSequence++;\n  }\n\
    \npublic synchronized void updateOrAddUser(int identifier, User user) {\n    users.put(identifier,\
    \ user);\n  }\n\npublic synchronized User deleteUser(int identifier) {\n    return\
    \ users.remove(identifier);\n  }\n\npublic synchronized Collection<User> getUsersInterval(int\
    \ lowerId, int upperId) {\n    //@formatter:off\n    Collection<User> usersInIdInterval\
    \ = users.entrySet().stream()\n        .filter(p -> p.getKey() >= lowerId && p.getKey()\
    \ <= upperId)\n        .collect(Collectors.toMap(p -> p.getKey(), p -> p.getValue()))\n\
    \        .values();\n    //@formatter:on\n    return Collections.unmodifiableCollection(usersInIdInterval);\n\
    \  }\n}\n```\n\nThe `UserRepository` class is annotated with the `@Repository`\
    \ annotation to indicate that it’s a Spring bean sitting on the persistence layer.\
    \ To simplify the examples, there is a simple in-memory cache for `User` objects\
    \ defined as `Map<Integer, User>`. But such caching is not suitable for production\
    \ use. Caching and persisting application state should be handled by specialized\
    \ databases or in memory grids that are battle tested for such purposes. Also\
    \ this particular usage breaks the stateless REST principle. But for simplicity,\
    \ let’s pretend that this class is calling a persistence layer for storing `User`\
    \ objects. We are interested in the web layer anyway.\n\nFirst, the `getAllUsers`\
    \ method returns a map of all users stored in this cache. The returned map is\
    \ encapsulated in an unmodifiable wrapper, so that we are sure its instance won’t\
    \ be replaced during the application run. The `getUser` method returns a single\
    \ `User` object based on a given identifier. To highlight the error-handling features,\
    \ we don’t support `-1` and the user identifier and throw `UnsupportedOperationException`.\n\
    \nThe `addUser` method is little more complicated. It uses an identifier counter\
    \ called `userSequence` to assign a unique identifier to the newly created `User`\
    \ object and increases its value afterward. The `updateOrAddUser` method accepts\
    \ the `identifier` and `User` parameters and replaces or adds this instance into\
    \ the map slot represented by the identifier. The `deleteUser` method simply removes\
    \ the object from the map.\n\nThe last method from this class is `getUsersInterval`.\
    \ It reads a collection of users based on a given interval of identifiers. This\
    \ isn’t a realistic use case, but it helps demonstrate some features of Spring\
    \ MVC mappings. The reading logic uses Java 8. First, we convert the map into\
    \ a stream and apply filtering. Values filtering is based on a lower and upper\
    \ bound of identifiers. After filtering, we collect the results into a map and\
    \ wrap the values into an unmodifiable map. This gives us a filtered collection\
    \ of users.\n\nAnother problem with this implementation is the singleton bean\
    \ scope of `UserService`. Fields/cache/state in a singleton is always dangerous\
    \ from a multithreading point of view. We can easily have various requests being\
    \ handled by our application at the same time. These requests are served in separate\
    \ threads. In this situation, various threads could be accessing this in-memory\
    \ cache at the same time. We need to make this class thread-safe, so we made all\
    \ access methods to our cache synchronized. It isn’t an effective method of caching,\
    \ but as we mentioned, it is just for example purposes.\n\nYou may ask, why not\
    \ use `ConcurrentHashMap` as a map implementation and exclude synchronization?\
    \ But remember that the `addUser` method consists of two actions that should be\
    \ atomic (adding to the map, and reading and increasing the sequence). With the\
    \ `ConcurrentHashMap` approach without synchronization, this wouldn’t be atomic\
    \ and could lead to thread-unsafe scenarios. For example, two threads could use\
    \ the same sequence number to store different objects, and thus we would lose\
    \ one of them.\n\n[Listing 4-5](#9781484207949_Ch04.xhtml#FPar12) shows the next\
    \ class heavily used in the examples.\n\n[***Listing 4-5***](#9781484207949_Ch04.xhtml#_FPar12).\
