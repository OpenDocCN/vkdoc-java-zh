    ***清单 4-20***. 带有标头和查询参数的 Spring MVC 示例的 PUT 和 GET 区间部分 (0406-rest-parameters-server)


    ```

    @RequestMapping(value = "/{id}", method = RequestMethod.PUT, headers = "version=1")

      public ResponseEntity<String> putUser(@PathVariable("id") int identifier,

          RequestEntity<User> request) {

        List<String> versions = request.getHeaders().get("version");

        boolean versionIsCorrect = versions != null && "1".equals(versions.get(0));

        if (versionIsCorrect) {

          userService.updateOrAddUser(identifier, request.getBody());

          return ResponseEntity.ok("");

        } else {

          return ResponseEntity.badRequest().body("Expected version is 1!");

        }

      }


    @RequestMapping(method = RequestMethod.GET, params = "lowerId",

          produces = MediaType.APPLICATION_JSON_VALUE)

      public Collection<User> getUsersInterval(@RequestParam int lowerId,

          @RequestParam("upperId") int upId) {

        return userService.getUsersInterval(lowerId, upId);

      }

    }

    ```


    `putUser` 方法的 `@RequestMapping` 注解方式与清单 4-16 中的 `putUser` 方法类似。不同之处在于 `headers`
    属性，该属性同样将此方法绑定为仅处理带有 HTTP 标头 `version: 1` 的请求。


    `putUser` 方法的参数也与清单 4-16 略有不同。除了路径变量提取之外，还有一个名为 `request` 的新参数，其类型为 `RequestEntity<User>`。这是
    Spring 对 HTTP 请求的表示，其中请求体会被编组为 `User` 类型。Spring 从请求体中转换 `User` 类型，并将此对象包装到 `RequestEntity<User>`
    中，然后注入到请求参数中。我们可以使用此对象来检查请求的各种属性，例如 HTTP 方法、标头和 URI。


    在本例中，我们提取了 `version` 标头，并用它来验证具有正确版本的 HTTP 请求是否被路由到此逻辑。同样，这种检查并非必要，因为基于 `headers="version-1"`
    的映射已经负责排除了其他版本。但它展示了提取 HTTP 请求元数据的另一种方法。


    测试 Spring MVC REST API


    Spring 非常注重可测试性。由于 Spring MVC 是最广泛使用的 Spring 抽象之一，它当然也不例外。测试 Spring MVC API 背后的理念是执行伪造的
    HTTP 请求来测试控制器并验证响应。即使此测试代码未在 Servlet 容器中运行，控制器的行为方式也与注册到 `DispatcherServlet` 时相同。

    '
- fmt: "# Spring MVC Testing Support\n\nThe central class of Spring MVC testing support\
    \ is `org.springframework.test.web.servlet.MockMvc`. It is the final class used\
    \ for sending fake requests and recording and verifying expected responses. With\
    \ `MockMvc`, the developer doesn’t need to create a lot of objects to fulfill\
    \ complicated HTTP use cases, but rather can implement less-verbose chaining constructs.\n\
    \n## `perform`\n\n* The method defined in the class `org.springframework.test.web.servlet.MockMvc`\n\
    * Used for sending requests\n* Uses the `MockMvcRequestBuilders` parameter as\
    \ a helper for sending HTTP requests such as `GET`, `PUT`, `POST`, `PUT`, and\
    \ `DELETE`\n* The `MockMvcRequestBuilders` methods return helper `MockHttpServletRequestBuilder`\
    \ for handling a wide-range of HTTP communication\n  * HTTP headers\n  * Content\
    \ creation and negotiation\n  * Query parameters\n  * Encoding and locale handling\n\
    \  * Session management (which is not targeted toward stateless REST)\n\n## `andExpect`\n\
    \n* Method defined in the interface `org.springframework.test.web.servlet.ResultActions`\n\
    * Provides support for chaining constructs during verification, because it also\
    \ returns `ResultActions`\n* Therefore, we can include as many expectations as\
    \ needed for the following:\n  * Verification of HTTP headers\n  * Verification\
    \ of the message body based on content parsing (for example, in XML/JSON format)\n\
    \  * Verification of HTTP status code\n\n## `andReturn`\n\n* Method defined in\
    \ the interface `org.springframework.test.web.servlet.ResultActions`\n* Provides\
    \ support for returning the `MvcResult` object, which can be used for subsequent\
    \ verifications outside the `andExpect` call chain\n\n## `andDo`\n\n* Method in\
    \ the interface `org.springframework.test.web.servlet.ResultActions`\n* Uses `MockMvcResultHandlers.print()`\
    \ for printing responses\n\n## `MockMvc` Instance Creation\n\nThe `MockMvc` instance\
    \ can be created by the factory class `MockMvcBuilders` in two ways:\n\n* Create\
    \ the `MockMvc` instance based on Spring’s context instance, `MockMvcBuilders.webAppContextSetup(WebApplicationContext\
    \ context)`, which is handy for creating Spring integration tests. With this approach,\
    \ we generally want to test Spring’s configuration with all its dependencies together.\n\
    * Create the `MockMvc` instance based on one or more controller classes, `MockMvcBuilders.standaloneSetup(Object...\
    \ controllers)`, which is handy for creating controller unit tests. This approach\
    \ can test the controller or group of controllers in isolation by mocking their\
    \ dependencies.\n\nSpring testing support allows for extreme variability in our\
    \ testing, but at the same time allows creation of a targeted unit or integration\
    \ tests. We can have short tests focusing on important aspects of our HTTP REST\
    \ communication. Such powerful support is missing for JAX-RS abstractions. This\
    \ factor often simplifies the decision process when Spring MVC and JAX-RS abstractions\
    \ are considered for REST-based projects.\n\n## `MockMvc` Integration Test Example\n\
    \nThe Spring MVC integration test example for the application using the controller\
    \ in [Listing 4-16](#9781484207949_Ch04.xhtml#FPar24) is large, which makes it\
    \ hard to present in one listing. Therefore, we split it. [Listing 4-21](#9781484207949_Ch04.xhtml#FPar31)\
    \ shows the imports and test class configuration.\n\n[***Listing 4-21***](#9781484207949_Ch04.xhtml#_FPar31).\
    \ Imports and Signature of REST Integration Test Example (0403-rest-java-config-server)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter04;\n\nimport static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.delete;\n\
    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.post;\n\
    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.put;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultHandlers.print;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.jsonPath;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
    import static org.testng.Assert.assertEquals;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.http.HttpStatus;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.test.annotation.DirtiesContext;\nimport org.springframework.test.annotation.DirtiesContext.ClassMode;\n\
    import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.springframework.test.context.web.WebAppConfiguration;\nimport org.springframework.test.web.servlet.MockMvc;\n\
    import org.springframework.test.web.servlet.MvcResult;\nimport org.springframework.test.web.servlet.setup.MockMvcBuilders;\n\
    import org.springframework.web.context.WebApplicationContext;\nimport org.testng.annotations.BeforeMethod;\n\
    import org.testng.annotations.Test;\n\n@WebAppConfiguration\n@ContextConfiguration(classes\
    \ = RestJavaConfigConfiguration.class)\n@DirtiesContext(classMode = ClassMode.AFTER_EACH_TEST_METHOD)\n\
    public class RestApplicationContextTest extends\n    AbstractTestNGSpringContextTests\
    \ {\n\nprivate static final String FULL_USER_URL = \"http://localhost:10403/users\"\
    ;\n  private MockMvc mockMvc;\n\n@Autowired\n  private WebApplicationContext webApplicationContext;\n\
    \n@BeforeMethod\n  public void init() {\n    mockMvc = MockMvcBuilders.webAppContextSetup(webApplicationContext).build();\n\
    \  }\n\nprivate static String createTestRecord(int identifier) {\n    String testingRecordString\
    \ =\n        \"{\\\"email\\\": \\\"user%d@gmail.com\\\", \\\"name\\\": \\\"User%d\\\
    \"}\";\n    return String.format(testingRecordString, identifier, identifier,\n\
    \        identifier);\n  }\n```\n\nAs you can see in the imports section, this\
    \ example uses a lot of classes—primarily because of the variability that the\
    \ Spring MVC test module provides. Design of this Spring module is not trivial.\
    \ But as you will explore in subsequent examples, it is easy for developers to\
    \ use. This is a good example of Spring’s team member qualities. Testing HTTP\
    \ possibilities is a complicated problem, but Spring solves it elegantly.\n\n\
    The test class is annotated by the `WebAppConfiguration` annotation, which indicates\
    \ that we are using the `WebApplicationContext` implementation of the Spring `ApplicationContext`\
    \ abstraction for testing. The `ContextConfiguration` annotation specifies which\
    \ Spring configuration class is being tested.\n\nBy default, Spring keeps the\
    \ testing context open in memory. So various tests can reuse the same context\
    \ and speed up integration test suites by avoiding context initialization before\
    \ each test. But remember that our `UserService` isn’t truly stateless, and we\
    \ don’t want test methods affecting each other. Therefore, we need to initiate\
    \ a fresh context for each method. This is ensured by the class-level annotation\
    \ `@DirtiesContext`. By default, this annotation would create a Spring context\
    \ from scratch for the whole test class. But with the `ClassMode.AFTER_EACH_TEST_METHOD`\
    \ attribute, we initiate a new context for each test method."
