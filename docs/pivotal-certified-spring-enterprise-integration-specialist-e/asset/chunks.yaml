    第一个 XML 元素指定了通用入站网关。我们需要定义必填的 `default-request-channel`，它指定了入站消息将被传递到的通道（本例中为
    `inChannel`）。`service-interface` 属性也是必填的，它指定了 Java 接口，该接口将用于对调用方隐藏 SI 流程。在本例中，我们使用通用接口
    `SiWrapperService`。请注意，当请求到达网关并被转换为消息时，会为此消息创建一个临时回复通道。网关将通过此临时回复通道等待响应消息。


    此网关接收到的消息将被传递给服务激活器端点，该端点映射到 `writeService.writeAndIndicateSuccess()` 方法。此方法返回写入操作的结果；因此，我们处理的是双向消息流。要将回复消息发送回网关，将自动使用为请求创建的临时回复通道。当
    `WriteService.writeAndIndicateSuccess()` 返回值时，服务激活器会将该值转换为回复消息，并将其发送到临时回复通道。网关通过临时回复通道接收此响应消息，并将其转换为服务接口
    `SiWrapperService` 的返回值。


    清单 8-28 展示了此应用程序的主类。


    ***清单 8-28***. 使用 XML 配置的通用消息传递网关示例的主类 (0808-gateway-generic-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import lombok.extern.slf4j.Slf4j;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperService;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.ImportResource;


    @Slf4j

    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    SiWrapperService wrapperService = ctx.getBean(SiWrapperService.class);

        boolean result = wrapperService.processText("simple message");

        log.info("Result: " + result);

      }

    }

    ```


    我们处理的是一个扫描 Spring Bean 的 Spring Boot 应用程序。在本例中，我们需要扫描 `WriteService`。`@ImportResource`
    将你的 XML SI 流程包含到此应用程序上下文中。`@Slf4j` 为此类启用日志记录。在 main 方法中，我们执行由此类定义的 Spring 配置。请记住此
    Spring 配置，因为它将用于后续的大多数示例，因此我们无需反复解释。


    在包含 SI 流程的 Spring 上下文启动后，我们从 Spring 上下文中检索 `SiWrapperService` Bean。你可能会想这个接口的实现是在哪里定义的。请注意，XML
    配置中定义的网关代表了此接口的实现。因此，通过执行 `wrapperService.processText()`，我们向网关发送一条消息。收到响应后，我们将其记录下来。运行此示例将产生如清单
    8-29 所示的输出。


    ***清单 8-29***. XML 通用网关示例的输出


