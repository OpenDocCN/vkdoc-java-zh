- fmt: "[***Listing 9-131***](#9781484207949_Ch09_3_Ext.xhtml#_FPar135). XML Configuration\
    \ of Shared SB Project (File `sql-server-config.xml` in Folder `src/main/resource`\
    \ of Example Project 0940-remote-partitioning-sql-server)\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:jdbc=\"http://www.springframework.org/schema/jdbc\"\
    \n  xsi:schemaLocation=\"http://www.springframework.org/schema/jdbc\n    http://www.springframework.org/schema/jdbc/spring-jdbc.xsd\n\
    \    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
    >\n\n<bean id=\"org.h2.tools.Server\" class=\"org.h2.tools.Server\" lazy-init=\"\
    false\"\n    factory-method=\"createTcpServer\" init-method=\"start\" destroy-method=\"\
    stop\">\n    <constructor-arg>\n      <array>\n        <value>-tcp</value>\n \
    \       <value>-tcpAllowOthers</value>\n        <value>-tcpPort</value>\n    \
    \    <value>8043</value>\n        <value>-properties</value>\n        <value>\"\
    ~/partition-test\"</value>\n      </array>\n    </constructor-arg>\n  </bean>\n\
    \n<jdbc:initialize-database data-source=\"dataSource\">\n    <jdbc:script location=\"\
    classpath:h2-purge.sql\"/>\n  </jdbc:initialize-database>\n\n<bean id=\"dataSource\"\
    \ class=\"org.springframework.jdbc.datasource.DriverManagerDataSource\">\n   \
    \   <property name=\"driverClassName\" value=\"org.h2.Driver\"/>\n      <property\
    \ name=\"url\" value=\"jdbc:h2:tcp://localhost:8043/~/partition-test\"/>\n   \
    \   <property name=\"username\" value=\"sa\"/>\n      <property name=\"password\"\
    \ value=\"\"/>\n  </bean>\n</beans>\n```\n\nThe first bean creates an H2 database\
    \ instance, which is exposed via TCP and allows other processes to connect to\
    \ it. The TCP port used for the DB connection is configured to 8043. The last\
    \ configuration flag specifies the location of the file the H2 DB instance is\
    \ using to store the data.\n\nThe XML tag `<jdbc:initialize-database>` will run\
    \ the `h2-purge.sql` script from [Listing 9-130](#9781484207949_Ch09_3_Ext.xhtml#FPar134),\
    \ which ensures a clean sheet in the database after we start this project. The\
    \ `dataSource` bean is needed to execute this script. The URL uses an H2 convention\
    \ to access the TCP-hosted database located in the file `~/partition-test`. The\
    \ tilde character (`~`) indicates the user’s home directory.\n\n[Listing 9-132](#9781484207949_Ch09_3_Ext.xhtml#FPar136)\
    \ shows the main class of this project.\n\n[***Listing 9-132***](#9781484207949_Ch09_3_Ext.xhtml#_FPar136).\
    \ Main Class of SQL Server for Remote Partitioning Example (0940-remote-partitioning-sql-server)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09;\n\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration;\n\
    import org.springframework.context.annotation.ImportResource;\n\n@SpringBootApplication(exclude\
    \ = { DataSourceAutoConfiguration.class })\n@ImportResource(\"classpath:sql-server-config.xml\"\
    )\npublic class SqlServerApplication {\n  public static void main(String[] args)\
    \ throws InterruptedException {\n    SpringApplication.run(SqlServerApplication.class,\
    \ args);\n  }\n}\n```\n\nThis imports the XML configuration we described previously\
    \ in [Listing 9-131](#9781484207949_Ch09_3_Ext.xhtml#FPar135). When Spring Boot,\
    \ executed with autoconfiguration, finds the H2 database dependency on the classpath,\
    \ by default it configures an in-memory database. But we want to avoid this feature,\
    \ because we have our special TCP configuration that we want to expose to other\
    \ processes also. So we exclude the Spring Boot `DataSourceAutoConfiguration`\
    \ from autoconfiguration so it doesn’t conflict with our configuration.\n\n##\
    \ Slave Partitioning Project\n\n[Listing 9-133](#9781484207949_Ch09_3_Ext.xhtml#FPar137)\
    \ shows the repository we will use in our example.\n\n[***Listing 9-133***](#9781484207949_Ch09_3_Ext.xhtml#_FPar137).\
    \ Read Repository Used for Partitioning Example (0940-remote-partitioning-slave)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09.read;\nimport java.util.List;\n\
    import java.util.stream.Collectors;\nimport java.util.stream.IntStream;\nimport\
    \ org.springframework.stereotype.Repository;\n\n@Repository\npublic class IndexedReadRepository\
    \ {\n  private static final List<String> RECORDS_LIST = generateRecords(16);\n\
    \npublic synchronized String getRecord(int index) {\n    return RECORDS_LIST.get(index);\n\
    \  }\n\nprivate static List<String> generateRecords(int count) {\n    return IntStream.range(0,\
    \ count)\n        .mapToObj(idx -> \"simple record \" + idx)\n        .collect(Collectors.toList());\n\
    \  }\n}\n```\n\nThis class represents a data set to process. As we will need to\
    \ separate the data set into partitions, we allow reading the example records\
    \ via indexes, so that each slave can index the record belonging to the partition\
    \ it should process. Each record will be exposed via the `getRecord()` method.\
    \ [Listing 9-134](#9781484207949_Ch09_3_Ext.xhtml#FPar138) shows `ItemReader`\
    \ for this slave project.\n\n[***Listing 9-134***](#9781484207949_Ch09_3_Ext.xhtml#_FPar138).\
