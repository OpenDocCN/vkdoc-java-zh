    Batch Scopes


    Every Spring developer should be familiar with the concept of bean scopes. Each
    Spring bean has by default a singleton scope, which means there is only one instance
    of that in the Spring context. Every time we inject this bean into our code, Spring
    provides the same object.


    Another useful scope is request scope, in which the bean uses the `@Scope(WebApplicationContext.SCOPE_REQUEST)`
    annotation. In this case, a new instance is created when the web request is served
    by our application, and Spring creates a new instance of this bean for each request.
    So when we inject the bean into our code, we will get a different instance for
    each request. This mechanism can be useful for sharing state in our code within
    boundaries of the request thread. For example, we can store some information into
    the local variable of this bean in the controller and retrieve this information
    in the repository.


    SB provides similar mechanisms for `Job` and `Step`. We can create beans with
    `StepScope` or `JobScope`, and SB makes sure that every new `StepExecution` will
    have a fresh instance of a bean with `StepScope`. Similarly for different `JobExecution`s,
    SB will inject fresh instances of a bean with `JobScope`.


    To define `StepScope`, we can annotate beans with `@StepScope` or via the standard
    Spring annotation `@Scope(value = "step", proxyMode = ScopedProxyMode.TARGET_CLASS)`.
    The `@JobScope` annotation defines the `JobScope`. It is also a convenience shortcut
    for `@Scope(value = "job", proxyMode = ScopedProxyMode.TARGET_CLASS)`. With XML
    configuration, we can define the `scope` attribute with the `job` or `scope` values
    of the XML tag `<bean>`.


    These scopes are also useful for late binding of references from the SB context.
    This can be done by using the placeholders `#{...}`.


