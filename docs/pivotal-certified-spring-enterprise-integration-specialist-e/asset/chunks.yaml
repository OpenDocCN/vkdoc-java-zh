  trans: '

    本章介绍了 Spring 的多线程和调度 API，并将其与纯 Java SE 的多线程支持进行了比较。需要牢记的是，多线程是一把双刃剑。向问题中投入一个线程池可能会拖慢计算速度，因为在线程之间切换上下文的开销可能比计算本身还要大。当系统中运行的线程数远多于
    CPU 核心数时，这种情况尤其容易发生。此外，多线程逻辑可能过于简单，不值得付出上下文切换的代价。因此，确定正确的并行度并非易事，需要深入理解问题本身及其周围环境。当通过多线程解决问题时，进行基准测试和准确的性能测试总是一个好主意。


    ![Image](img/sq.jpg) **注意** 除了多线程，你还可以使用其他方法来解决阻塞 I/O 操作的问题。但这些超出了本书的范围。如需更多信息，你可以研究
    Java Futures 和 Reactive Extensions（例如，参见 `https://github.com/ReactiveX/RxJava`
    上的 RxJava 库）以及 Actor 系统（例如，`https://github.com/reactor/reactor` 上的 Spring Reactor
    或 `http://akka.io/` 上的 Akka）。一个积极采用非阻塞 I/O 方法的好例子是 Node.js（`https://nodejs.org/`）中的事件循环，它自然是从
    Web 浏览器的事件循环演变而来的。


    第 2 章


    ![image](img/frontdot.jpg)


    远程调用


    让我们将 Ultrabook（戴尔超薄笔记本电脑）与台式 PC 进行比较。如今大多数人可能会选择 Ultrabook，因为它更轻、更安静，并且几乎可以随身携带。那么，除了价格更低之外，台式
    PC 还有什么优势吗？是的——它是模块化的。如果 Ultrabook 的处理器坏了或者电源接口烧毁了，你会怎么做？这类问题很可能导致 Ultrabook 无法修复。但如果这种情况发生在台式
    PC 的显示器或电源上，它们可以很容易地被更换。更换 PC 组件的能力得益于标准化的接口。它们允许我们使用来自不同供应商的组件来构建整台 PC。


    现在想象一个大型云服务提供商。就我们 PC 与 Ultrabook 的比喻而言，该系统的基础设施更接近 PC 架构。企业系统由应用程序组成，这些应用程序通常用不同的编程语言实现，并运行在世界各地的机器上。显然，这些应用程序需要通过通用协议相互通信，以便一个损坏的应用程序最终可以被替换，而不会影响整个企业。


    Spring 的远程调用支持是企业世界中应用程序间通信机制的抽象伞。这些技术可以根据其性质分为两个基本组：同步和异步。


    让我们从方法调用技术（同步通信）开始：


    *   远程方法调用（RMI）

    *   HTTPInvoker：基于 HTTP 的 Java 序列化

    *   Hessian：由 Caucho Technology 设计的轻量级二进制 HTTP 协议

    *   Burlap：基于 XML 的 Hessian 版本

    *   Java XML Web 服务 API（JAX-WS）：在 Java EE 5 引入时取代了 JAX-RPC，将在第 3 章中介绍


    现在考虑消息传递技术（异步通信）：


    *   Java 消息服务（JMS）：将在第 5 章中介绍

    *   高级消息队列协议（AMQP）：由 Spring AMQP 项目涵盖，超出本书范围


    如你所见，Spring 的伞状结构非常丰富。但这些技术中的每一种也可以在没有 Spring 的情况下使用。那么问题来了，Spring 抽象提供了哪些好处？对于远程调用技术，好处如下：


    *   将远程调用逻辑与应用程序代码解耦

    *   传播声明式范式以配置和暴露服务

    *   使用一致的 API 支持多种协议

    *   将受检异常转换为运行时异常


    让我们更详细地探讨这些技术中的每一种以及 Spring 的抽象。


    ![Image](img/sq.jpg) **注意** Hessian 和 Burlap 包含在先前版本的“使用 Spring 进行企业集成”认证中，但已从涵盖
    Spring 4.0 特性的最新版本中移除。因此，它们超出了本书的范围。


    远程方法调用


    顾名思义，*远程方法调用*（RMI）用于执行位于远程 JVM 或系统上的方法。RMI 提供了一种集成分布式系统的便捷方式。开发人员无需将数据模型转换为其他格式即可与远程系统通信。为了在
    JVM 之间传输数据，使用了序列化。序列化是一种标准的 Java 机制，用于将数据和代码转换为二进制形式，以便它们可以被存储或通过网络发送。


    RMI 的初始实现仅适用于 JVM 间的通信。它们基于 Java 远程方法协议（JRMP）。为了使 RMI 更加灵活，开发了基于 Internet Inter-Orb
    协议的 RMI（RMI-IIOP）。此版本基于公共对象请求代理体系结构（CORBA）标准，可用于不同系统之间的相互通信。其中重要的一点是，RMI-IIOP
    使得与非 JVM 运行时环境的方法调用成为可能。


    如前所述，RMI 用于可能位于不同主机上的远程环境之间的通信。因此涉及两方。一方暴露逻辑。第二方消费暴露的 RMI 方法。双方能够通过网络进行通信，因为 JRMP
    提供了一个 RMI 注册表。通信的每一方都将一个代理对象注册到 RMI 注册表中，然后这些对象借助标准的 Java 序列化机制相互通信。


    为了相互理解，客户端和服务器需要在双方都有一个可用的通用契约。在 RMI 世界中，这个契约不过是一个标准的 Java 接口。方法提供者需要实现这个接口，而
    RMI 客户端在远程方法调用期间需要它。有两种方法可以确保此契约在双方都可用：


    *   该接口位于一个共享的 JAR 库中，双方都将该库作为依赖项使用。

    *   该接口在双方使用相同的签名进行复制。


    每种方法都有其优缺点。提取到共享库中会增加处理和维护该共享库的复杂性。在双方复制接口显然会带来使接口在其中一方不兼容的风险。


    看起来开发人员可以获取任何调用并通过 RMI 轻松地将其暴露出来，而无需任何更改。但事实并非如此。需要满足某些 RMI 契约的特定要求：


    *   契约接口需要扩展 `java.rmi.Remote` 接口。

    *   暴露的方法必须抛出 `java.rmi.RemoteException`。

    *   实现 RMI 方法（将被共享的逻辑）的类需要扩展 `java.rmi.server.UnicastRemoteObject`。

    *   实现 RMI 方法的类需要有一个显式构造函数，该构造函数必须抛出 `java.rmi.RemoteException`。

    *   消费 RMI 方法的客户端需要处理受检异常 `java.rmi.RemoteException`。


    契约的另一个重要部分是序列化。每个参数、返回类型以及实现类本身都需要是可序列化的。对于服务实现类，这通过扩展 `java.rmi.server.UnicastRemoteObject`
    来保证。


    让我们通过示例来探讨 RMI 契约的细节。我们的共享接口在清单 2-1 中突出显示。

