    ![Image](images/sq.jpg) **Note**  This overview of the JMS API is limited, because
    this book focuses on Spring’s abstractions built on top of a plain JMS API. Therefore,
    the deeper aspects and additional features are beyond the scope of this book.
    The best place to start exploring it is the JEE 7 tutorial here: `https://docs.oracle.com/javaee/7/tutorial/jms-concepts003.htm#BNCEH`.


    Java JMS Examples


    The most common open source JMS provider is ActiveMQ. But at the time of writing,
    ActiveMQ doesn’t cover JMS 2.0\. We chose HornetQ to show our plain Java JMS examples,
    because it already supports the new JMS 2.0 standard.


    As mentioned, JMS providers are often hosted as separate instances to our application.
    This is the case for our Java JMS examples. We will be running the HornetQ instance
    server locally and assume that a recent Java version is installed on the target
    machine.


    To download the HornetQ server, you need to download the ZIP or TAR.GZ bundle
    from `http://hornetq.jboss.org/downloads.html` and unpack it. Running the server
    is easy. Just run the `bin/run.sh` or `bin/run.bat` file from the command line.
    If the proper Java version is installed, the server should start without any problems.
    To stop the server, we need to execute `bin/stop.sh` or `bin/stop.bat`—an easy
    process.


    For example purposes, we don’t need to tweak the default HornetQ configuration,
    because the example projects are using JMS resources configured by HornetQ out
    of the box. These examples were tested against HornetQ version 2.4.0.Final.


    Synchronous JMS 1.1 Example


    *   Our first Java JMS example uses an old JMS 1.1 API that was standardized in
    2003\. [Listing 5-1](#9781484207949_Ch05.xhtml#FPar2) shows how to configure JMS
    1.1 access.


    [***Listing 5-1***](#9781484207949_Ch05.xhtml#_FPar2). JMS 1.1 HornetQ Configuration
    (0501-jms11-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms11jndi;


    import java.util.Hashtable;

    import javax.jms.Connection;

    import javax.jms.ConnectionFactory;

    import javax.jms.JMSException;

    import javax.jms.Queue;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import lombok.Getter;


    public class JmsConfiguration implements AutoCloseable {

      private InitialContext initialContext;


    @Getter

      private Queue queue;

      @Getter

      private Connection connection;


    public void init() throws NamingException, JMSException {

        Hashtable<Object, Object> env = new Hashtable<Object, Object>();

        env.put("java.naming.factory.initial",

            "org.jnp.interfaces.NamingContextFactory");

        env.put("java.naming.factory.url.pkgs",

            "org.jboss.naming:org.jnp.interfaces");

        env.put("java.naming.provider.url", "jnp://localhost:1099");

        initialContext = new InitialContext(env);


    queue = (Queue) initialContext.lookup("queue/ExpiryQueue");

        ConnectionFactory connectionFactory =

            (ConnectionFactory) initialContext.lookup("/ConnectionFactory");

        connection = connectionFactory.createConnection();

      }


    public void close() throws NamingException, JMSException {

        if (initialContext != null) {

          initialContext.close();

        }

        if (connection != null) {

          connection.close();

        }

      }

    }

    ```


    The `JmsConfiguration` class encapsulates the JMS provider-specific configuration.
    It has three fields. The first one is of type `InitialContext`, which is the starting
    point for resolving JNDI names. HornetQ is a JBoss technology, which is part of
    the broader JBoss Application Server portfolio. Therefore, the easiest way to
    initialize stand-alone HornetQ access is to use JNDI naming abstractions.


    The following two fields defined in the `JmsConfiguration` class are the JMS objects
    `queue` and `connection`. These are annotated by Lombok’s `@Getter` annotation,
    which generates getters for these two variables. Lombok is handy when we want
    to avoid Java verbosity so often highlighted by Java opponents. So they are exposed
    via getters, and other classes can use them for JMS messaging.


    The first method is called `init`. As its name suggests, it initializes the JMS
    configuration. We define the map for storing JNDI naming values. The first two
    JNDI naming values are created based on HornetQ manual instructions in the section
    “JNDI configuration”: `http://docs.jboss.org/hornetq/2.4.0.Final/docs/user-manual/html_single/index.html#d0e1265`.
    The third value, with the key `java.naming.provider.url`, specifies the address
    of our HornetQ server. In this case, the server will be located on `localhost`
    and port `1099`.


    When we have the JNDI configuration in the map, we can create a JNDI `InitialContext`
    instance and use it to look up JMS resources. As previously mentioned, the default
    HornetQ configuration is used in our Java JMS examples, so we use the queue name
    `queue/ExpiryQueue` and the connection factory name `/ConnectionFactory` to create
    the `queue` and `connectionFactory` objects. `connectionFactory` is used to create
    a `connection` instance. A queue with the name `queue/ExpiryQueue` is configured
    by default in the HornetQ server; we are using it here for simplicity’s sake.


    These two instances are already JMS abstractions, so the method `init` is the
    only place in our example containing a HornetQ-specific configuration.


    The next method is called `close`. As its name suggests, it is used for closing
    resources that need to be closed. In this case, we need to close `connection`
    and `initialContext`. But this close method is special, because it belongs to
    the `java.lang.AutoCloseable` interface. This interface was introduced in Java
    7 as part of a feature often referred to as *try-with-resources*. It adds syntactic
    sugar for closing resources after a try block. We will show its use later in this
    example.


    [Listing 5-2](#9781484207949_Ch05.xhtml#FPar3) shows how to send a message with
    the JMS 1.1 API.


    [***Listing 5-2***](#9781484207949_Ch05.xhtml#_FPar3). Sending a JMS Message with
    the JMS 1.1 API (0501-jms11-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms11jndi;


    import javax.jms.Connection;

    import javax.jms.JMSException;

    import javax.jms.MessageProducer;

    import javax.jms.Queue;

    import javax.jms.Session;

    import javax.jms.TextMessage;'
  trans: '

    *   `javax.jms.Destination`：表示 JMS 队列或主题的对象。

    *   `javax.jms.MessageProducer`：表示负责发送 JMS 消息的对象的抽象。

    *   `javax.jms.MessageConsumer`：负责同步读取 JMS 消息的抽象。

    *   `javax.jms.JMSProducer`：JMS 2.0 中引入的 `MessageProducer` 增强版。

    *   `javax.jms.JMSConsumer`：JMS 2.0 中引入的 `MessageConsumer` 增强版。

    *   `javax.jms.MessageListener`：负责异步接收 JMS 消息的抽象。

    *   `javax.jms.Session`：负责发送和接收消息的单线程上下文抽象。

    *   `javax.jms.Connection`：表示与 JMS 提供者的虚拟连接。

    *   `javax.jms.JMSContext`：JMS 2.0 的语法糖，用于减少 JMS 1.1 API 的冗长性。它将 `Connection`
    和 `Session` 合并为一个对象。

    *   `javax.jms.ConnectionFactory`：JMS 的主要配置类，负责创建与 JMS 提供者的连接。通常在 JMS 应用程序启动时创建。

    *   因此，JMS 1.1 开发者的通常工作流程是按此顺序创建 JMS 对象：`ConnectionFactory` ![image](img/arrow.jpg)
    `Connection` `Session` `MessageProducer/MessageConsumer/Message`。在 JMS 2.0 中，情况略有改进：`ConnectionFactory`
    `JMSContext` `JMSProducer/JMSConsumer/Message`。在完整的 JEE 容器中，`ConnectionFactory`
    很可能是被注入的。

    *   你可能已经注意到，这个 JMS 对象的工作流程不包括 `Destination`。该对象是单独创建或注入的，用于创建 `Producer` 或 `Consumer`。`MessageListener`
    被设计为注册到 `MessageConsumer` 对象中。


    ![Image](img/sq.jpg) **注意**  本 JMS API 概述是有限的，因为本书侧重于构建在普通 JMS API 之上的 Spring
    抽象。因此，更深层次的方面和附加功能超出了本书的范围。开始探索的最佳位置是 JEE 7 教程：`https://docs.oracle.com/javaee/7/tutorial/jms-concepts003.htm#BNCEH`。


    Java JMS 示例


    最常见的开源 JMS 提供者是 ActiveMQ。但在撰写本文时，ActiveMQ 不支持 JMS 2.0。我们选择 HornetQ 来展示我们的普通 Java
    JMS 示例，因为它已经支持新的 JMS 2.0 标准。


    如前所述，JMS 提供者通常作为单独的实例托管在我们的应用程序之外。我们的 Java JMS 示例就是这种情况。我们将在本地运行 HornetQ 实例服务器，并假设目标机器上安装了最新的
    Java 版本。


    要下载 HornetQ 服务器，你需要从 `http://hornetq.jboss.org/downloads.html` 下载 ZIP 或 TAR.GZ
    包并解压。运行服务器很简单。只需从命令行运行 `bin/run.sh` 或 `bin/run.bat` 文件。如果安装了合适的 Java 版本，服务器应该可以毫无问题地启动。要停止服务器，我们需要执行
    `bin/stop.sh` 或 `bin/stop.bat`——一个简单的过程。


    出于示例目的，我们不需要调整默认的 HornetQ 配置，因为示例项目使用的是 HornetQ 开箱即用的 JMS 资源。这些示例已针对 HornetQ 2.4.0.Final
    版本进行了测试。


    同步 JMS 1.1 示例


    *   我们的第一个 Java JMS 示例使用了 2003 年标准化的旧版 JMS 1.1 API。清单 5-1 展示了如何配置 JMS 1.1 访问。


    ***清单 5-1***. JMS 1.1 HornetQ 配置 (0501-jms11-jndi)


    ```

    package net.lkrnac.book.eiws.chapter05.jms11jndi;


    import java.util.Hashtable;

    import javax.jms.Connection;

    import javax.jms.ConnectionFactory;

    import javax.jms.JMSException;

    import javax.jms.Queue;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import lombok.Getter;


    public class JmsConfiguration implements AutoCloseable {

      private InitialContext initialContext;


    @Getter

      private Queue queue;

      @Getter

      private Connection connection;


    public void init() throws NamingException, JMSException {

        Hashtable<Object, Object> env = new Hashtable<Object, Object>();

        env.put("java.naming.factory.initial",

            "org.jnp.interfaces.NamingContextFactory");

        env.put("java.naming.factory.url.pkgs",

            "org.jboss.naming:org.jnp.interfaces");

        env.put("java.naming.provider.url", "jnp://localhost:1099");

        initialContext = new InitialContext(env);


    queue = (Queue) initialContext.lookup("queue/ExpiryQueue");

        ConnectionFactory connectionFactory =

            (ConnectionFactory) initialContext.lookup("/ConnectionFactory");

        connection = connectionFactory.createConnection();

      }


    public void close() throws NamingException, JMSException {

        if (initialContext != null) {

          initialContext.close();

        }

        if (connection != null) {

          connection.close();

        }

      }

    }

    ```


    `JmsConfiguration` 类封装了特定于 JMS 提供者的配置。它有三个字段。第一个是 `InitialContext` 类型，它是解析 JNDI
    名称的起点。HornetQ 是一项 JBoss 技术，是更广泛的 JBoss 应用服务器产品组合的一部分。因此，初始化独立 HornetQ 访问的最简单方法是使用
    JNDI 命名抽象。


    `JmsConfiguration` 类中定义的以下两个字段是 JMS 对象 `queue` 和 `connection`。它们由 Lombok 的 `@Getter`
    注解标注，该注解为这两个变量生成 getter 方法。当我们希望避免 Java 反对者经常强调的 Java 冗长性时，Lombok 非常方便。因此，它们通过
    getter 方法暴露，其他类可以使用它们进行 JMS 消息传递。


    第一个方法叫做 `init`。顾名思义，它初始化 JMS 配置。我们定义了用于存储 JNDI 命名值的映射。前两个 JNDI 命名值是根据 HornetQ
    手册“JNDI 配置”部分的说明创建的：`http://docs.jboss.org/hornetq/2.4.0.Final/docs/user-manual/html_single/index.html#d0e1265`。第三个值，键为
    `java.naming.provider.url`，指定了我们 HornetQ 服务器的地址。在这种情况下，服务器将位于 `localhost` 和端口
    `1099`。


    当我们在映射中有了 JNDI 配置后，就可以创建一个 JNDI `InitialContext` 实例，并使用它来查找 JMS 资源。如前所述，我们的 Java
    JMS 示例中使用了默认的 HornetQ 配置，因此我们使用队列名称 `queue/ExpiryQueue` 和连接工厂名称 `/ConnectionFactory`
    来创建 `queue` 和 `connectionFactory` 对象。`connectionFactory` 用于创建 `connection` 实例。名为
    `queue/ExpiryQueue` 的队列在 HornetQ 服务器中默认配置；为了简单起见，我们在这里使用它。


    这两个实例已经是 JMS 抽象，因此方法 `init` 是我们示例中唯一包含 HornetQ 特定配置的地方。


    下一个方法叫做 `close`。顾名思义，它用于关闭需要关闭的资源。在这种情况下，我们需要关闭 `connection` 和 `initialContext`。但这个
    close 方法很特殊，因为它属于 `java.lang.AutoCloseable` 接口。该接口是在 Java 7 中作为通常称为 *try-with-resources*
    的特性的一部分引入的。它为在 try 块之后关闭资源添加了语法糖。我们将在本示例的后面展示它的使用。


