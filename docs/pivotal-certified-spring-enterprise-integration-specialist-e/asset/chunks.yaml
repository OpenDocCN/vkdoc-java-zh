    Using the MessageCreator Callback


    Sometimes we may need to construct a message based on the JMS `Session` object.
    In such a case, we need to use `JmsTemplate` with conjunction with the `MessageCreator`
    interface for sending messages. The signature of this interface is shown in [Listing
    5-25](#9781484207949_Ch05.xhtml#FPar28).


    [***Listing 5-25***](#9781484207949_Ch05.xhtml#_FPar28). Signature of the MessageCreator
    Interface


    ```

    package org.springframework.jms.core;


    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.Session;


    public interface MessageCreator {

      Message createMessage(Session session) throws JMSException;

    }

    ```


    This callback interface expects that we implement the `createMessage` method and
    provide custom logic for the `javax.jms.Message` creation based on the `javax.jms.Session`
    object. Such custom message construction logic is then passed into `JmsTemplate.send`
    and `JmsTemplate.sendAndReceive` methods while sending the message.


    This mechanism allows Spring to manage session instances (for example, for caching)
    and at the same time provides application developers full flexibility of lower-level
    JMS APIs. An example of this use is shown in [Listing 5-26](#9781484207949_Ch05.xhtml#FPar29).


