    ```


    We used a transaction demarcation feature for the listener method `readMessage()`.
    The `preprocess()` method called before `simpleService.processText()` simulated
    an error for the first received message. For subsequent messages, no error is
    simulated. The sequence diagram for this behavior after running the example is
    shown in [Figure 6-9](#9781484207949_Ch06.xhtml#Fig9).


    ![9781484207949_Fig06-09.jpg](images/9781484207949_Fig06-09.jpg)


    [Figure 6-9](#9781484207949_Ch06.xhtml#_Fig9). Sequence diagram of JmsTransactionManager
    example (file sequence.uml in folder uml-diagrams of example project 0613-jms-transaction-manager)


    When the first message is received and an exception from `preprocess()` is thrown,
    JmsTransactionManager rolls back the transaction created on message reception.
    That causes redelivery of the message. The second `preprocess()` call doesn’t
    throw an exception, and the message is, on second attempt, persisted and committed
    afterward.


    *Notice that if we simulated an error in postprocess() after message persistence,
    the result would be a duplicate message in the database again.* But we’ll skip
    this example because we already covered a duplicate scenario with JMS transactions.


    Handling Duplicates


    Even with all the reliability mechanisms we’ve mentioned, some scenarios can still
    cause message loss or duplication. Spring can’t abstract out all the problems
    of JMS integration with other transactional storage options, but tries to decrease
    the possibility of failure.


    Therefore, using `SimpleMessageListenerContainer` or `SimpleJmsListenerContainerFactory`
    is recommended if our JMS message reception is based on acknowledge modes, especially
    `AUTO_ACKNOWLEDGE`. If we use transactions for JMS for message reception, the
    best-suited implementation is `DefaultMessageListenerContainer` or `DefaultJmsListenerContainerFactory`.


    There is another option that we haven’t mentioned, which provides ACID characteristics
    across various transacted data stores. Based on distributed JTA transactions,
    this option is described in the next chapter. However, it is resource intensive
    and widely considered a significant performance killer. Therefore, every programmer
    should try to avoid it if possible. Fortunately, options exist for ensuring that
    no lost messages or duplicates occur without distributed transactions. But first,
    we need to take into account various considerations.


    First, we need to know whether the target storage is idempotent—whether it can
    handle duplicate messages without creating an inconsistent state. When storage
    is idempotent, we can use any of the duplicate scenario examples from this chapter,
    and your integration between JMS and the database would be safe.


    A more complicated situation arises when we don’t have such smart storage that
    can detect duplicates. Handling this scenario is explained in the next example.
    We reuse the common main and sender implementations and JMS configuration based
    on `JmsTransactionManager` from the previous example in [Listing 6-27](#9781484207949_Ch06.xhtml#FPar29).
    The listener of this example is shown in [Listing 6-28](#9781484207949_Ch06.xhtml#FPar30).


    [***Listing 6-28***](#9781484207949_Ch06.xhtml#_FPar30). Listener Class for Handling
    Duplicates Covering Scenario with Error after Message Persistence (0614-handle-duplicates-error-after)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.jms.JMSException;

    import javax.jms.Message;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;

    import org.springframework.transaction.annotation.Transactional;


    @Component

    public class SimpleMessageListener {

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @Transactional

      @JmsListener(destination = "messageQueue")

      public void readMessage(String messageText, Message message)

          throws JMSException {

        if (message.getJMSRedelivered()) {

          processIfNeeded(messageText);

        } else {

          simpleService.processText(messageText);

          postprocess(messageText);

        }

      }


    private void processIfNeeded(String messageText) {

        if (!simpleService.isProcessed(messageText)) {

          simpleService.processText(messageText);

