  raw: 'Finally, JAX-RS has a disadvantage in the fact that it’s standard, because
    Spring is able to iterate quicker and provide new features faster. Spring provides
    much richer possibilities for HTTP message mappings onto Java controllers and
    models. It also allows much wider possibilities for custom configurations (for
    example, message converters). These are possible reasons why the Spring MVC API
    adoption is higher than that of JAX-RS.


    Configuring Spring MVC for REST


    Spring MVC is an abstraction on top of Java servlets. So we need a servlet container
    in order to run the Spring MVC application. The most important class for integrating
    Java servlet technology is `org.springframework.web.servlet.DispatcherServlet`.
    This class is responsible for routing HTTP messages to the correct Java logic
    based on declarative mappings.


    Spring MVC relies heavily on mapping annotations. To turn on this programming
    model, we need to declare in a Spring configuration that we are using Spring MVC.
    This can be done in two ways:


    *   `<mvc:annotation-driven>` XML element of Spring’s namespace (`www.springframework.org/schema/mvc`)

    *   `@EnableWebMvc` annotation


    ![Image](images/sq.jpg) **Note**  The Spring MVC module covers a wide range of
    features for templating views, handling errors, using locales and themes, integrating
    with security frameworks, and more. All these features provide enough material
    for a book of its own (such as *Spring REST* by Balaji Varanasi and Sudha Belida,
    Apress, 2015). We highlight the main features useful for REST in this chapter.
    Anything else is beyond the scope of this book and can be found in the reference
    documentation (`http://docs.spring.io/spring/docs/current/spring-framework-reference/htmlsingle/#mvc`).


    The XML configuration for enabling Spring MVC support is shown in [Listing 4-11](#9781484207949_Ch04.xhtml#FPar19).


    [***Listing 4-11***](#9781484207949_Ch04.xhtml#_FPar19). XML Spring MVC Configuration
    (File rest-service-config.xml in Example Project 0402-rest-xml-config-server)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xmlns:mvc="http://www.springframework.org/schema/mvc"

      xsi:schemaLocation="http://www.springframework.org/schema/mvc

        http://www.springframework.org/schema/mvc/spring-mvc.xsd

                   http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

                   http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context.xsd">


    <context:component-scan base-package="net.lkrnac.book.eiws.chapter04" />

      <mvc:annotation-driven />

    </beans>

    ```


    This configuration uses two namespaces: `context` and `mvc`. The first one is
    used for component scanning of Spring beans, including controllers that will be
    mapped to HTTP URLs. The second namespace is used for enabling MVC support. The
    equivalent Java configuration is shown in [Listing 4-12](#9781484207949_Ch04.xhtml#FPar20).


    [***Listing 4-12***](#9781484207949_Ch04.xhtml#_FPar20). Spring MVC Java Configuration
    (0403-rest-java-config-server)


    ```

    package net.lkrnac.book.eiws.chapter04;


    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.web.servlet.config.annotation.EnableWebMvc;


    @Configuration

    @ComponentScan

    @EnableWebMvc

    public class RestJavaConfigConfiguration {

    }

    ```


    The Spring context is configured with three annotations. The `@Configuration`
    annotation specifies the configuration bean. The `@ComponentScan` annotation orders
    Spring to do component scanning in the current package and subpackages. With this
    annotation, we don’t need to specify the base package where the component scanning
    should be performed, because it starts from the current package. This is more
    maintainable; we can’t forget to update the base package for component scanning
    if the package is renamed or moved. Finally, `@EnableWebMvc` turns on Spring MVC
    annotations and configures various default beans for Spring MVC support.


    When we have a Spring configuration, it needs to be plugged into a servlet configuration.
    [Listing 4-13](#9781484207949_Ch04.xhtml#FPar21) contains an example of an XML
    servlet descriptor configuration.


    [***Listing 4-13***](#9781484207949_Ch04.xhtml#_FPar21). XML Servlet Descriptor
    for Spring MVC (File web.xml in Example Project 0402-rest-xml-config-server)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <web-app xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://xmlns.jcp.org/xml/ns/javaee"

      xsi:schemaLocation="http://java.sun.com/xml/ns/javaee

        http://java.sun.com/xml/ns/javaee/web-app_3_0.xsd"

      version="3.0">

      <display-name>0402-rest-xml-config-service</display-name>

      <servlet>

        <servlet-name>rest-service</servlet-name>

        <servlet-class>org.springframework.web.servlet.DispatcherServlet

        </servlet-class>

        <init-param>

          <param-name>contextConfigLocation</param-name>

          <param-value>classpath:rest-service-config.xml</param-value>

        </init-param>

        <load-on-startup>1</load-on-startup>

      </servlet>

      <servlet-mapping>

        <servlet-name>rest-service</servlet-name>

        <url-pattern>/</url-pattern>

      </servlet-mapping>

    </web-app>

    ```


    Here we specify a servlet with the name `rest-service` and the implementation
    class `DispatcherServlet`. This servlet implementation is provided by Spring and
    handles all the routing support (and much more). `DispatcherServlet` needs to
    know which Spring context should be bound to this servlet object. Therefore, we
    specify the servlet initialization parameter `contextConfigLocation`, and point
    it to the Spring configuration file `rest-service-config.xml`. If we didn’t specify
    this parameter, Spring would try to find `[servlet-name]-servlet.xml` in the `WEB-INF`
    folder.


    Next, the `load-on-startup` parameter tells the servlet container to load this
    servlet instance when the servlet container starts rather than wait for the first
    request. If we used lazy initialization, initializing the servlet would prolong
    the response time of the first request. Because the Spring load time can be measured
    in seconds, this is a significant performance hit for an initial request.


    Finally, we map our servlet to the URL. In this case, it is the root-level URL
    `/`. A similar Java configuration looks like [Listing 4-14](#9781484207949_Ch04.xhtml#FPar22).


    [***Listing 4-14***](#9781484207949_Ch04.xhtml#_FPar22). Spring Java Servlet Configuration
    (0403-rest-java-config-server)


    ```

    package net.lkrnac.book.eiws.chapter04;


    import org.springframework.web.servlet.support.

              AbstractAnnotationConfigDispatcherServletInitializer;


    public class RestInitializer extends

        AbstractAnnotationConfigDispatcherServletInitializer {


    @Override

      protected Class<?>[] getRootConfigClasses() {

        return null;

      }


    @Override

      protected Class<?>[] getServletConfigClasses() {

        return new Class[] { RestJavaConfigConfiguration.class };

      }


    @Override

      protected String[] getServletMappings() {

        return new String[] { "/" };

      }

    }

    ```'
  trans: '

    最后，JAX-RS 的一个劣势在于其作为标准，因为 Spring 能够更快地迭代并提供新功能。Spring 为 HTTP 消息到 Java 控制器和模型的映射提供了更丰富的可能性。它还允许更广泛的定制配置（例如，消息转换器）。这些可能是
    Spring MVC API 的采用率高于 JAX-RS 的原因。


    为 REST 配置 Spring MVC


    Spring MVC 是 Java Servlet 之上的一个抽象层。因此，我们需要一个 Servlet 容器来运行 Spring MVC 应用程序。集成
    Java Servlet 技术最重要的类是 `org.springframework.web.servlet.DispatcherServlet`。该类负责根据声明式映射将
    HTTP 消息路由到正确的 Java 逻辑。


    Spring MVC 高度依赖映射注解。要启用此编程模型，我们需要在 Spring 配置中声明我们正在使用 Spring MVC。这可以通过两种方式完成：


    *   Spring 命名空间（`www.springframework.org/schema/mvc`）的 `<mvc:annotation-driven>`
    XML 元素

    *   `@EnableWebMvc` 注解


    ![Image](img/sq.jpg) **注意**  Spring MVC 模块涵盖了广泛的功能，用于模板化视图、处理错误、使用区域设置和主题、与安全框架集成等。所有这些功能足以写成一本书（例如，Balaji
    Varanasi 和 Sudha Belida 合著的 *Spring REST*，Apress，2015 年）。我们在本章中重点介绍对 REST 有用的主要功能。其他内容超出了本书的范围，可以在参考文档（`http://docs.spring.io/spring/docs/current/spring-framework-reference/htmlsingle/#mvc`）中找到。


    用于启用 Spring MVC 支持的 XML 配置如清单 4-11 所示。


    ***清单 4-11***. XML Spring MVC 配置（示例项目 0402-rest-xml-config-server 中的文件 rest-service-config.xml）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xmlns:mvc="http://www.springframework.org/schema/mvc"

      xsi:schemaLocation="http://www.springframework.org/schema/mvc

        http://www.springframework.org/schema/mvc/spring-mvc.xsd

                   http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

                   http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context.xsd">


    <context:component-scan base-package="net.lkrnac.book.eiws.chapter04" />

      <mvc:annotation-driven />

    </beans>

    ```


    此配置使用了两个命名空间：`context` 和 `mvc`。第一个用于 Spring Bean 的组件扫描，包括将映射到 HTTP URL 的控制器。第二个命名空间用于启用
    MVC 支持。等效的 Java 配置如清单 4-12 所示。


    ***清单 4-12***. Spring MVC Java 配置（0403-rest-java-config-server）


    ```

    package net.lkrnac.book.eiws.chapter04;


    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.web.servlet.config.annotation.EnableWebMvc;


    @Configuration

    @ComponentScan

    @EnableWebMvc

    public class RestJavaConfigConfiguration {

    }

    ```


    Spring 上下文通过三个注解进行配置。`@Configuration` 注解指定了配置 Bean。`@ComponentScan` 注解命令 Spring
    在当前包及其子包中执行组件扫描。使用此注解，我们无需指定执行组件扫描的基础包，因为它从当前包开始。这更具可维护性；如果包被重命名或移动，我们不会忘记更新组件扫描的基础包。最后，`@EnableWebMvc`
    启用 Spring MVC 注解，并为 Spring MVC 支持配置各种默认 Bean。


    当我们有了 Spring 配置后，需要将其接入 Servlet 配置。清单 4-13 包含了一个 XML Servlet 描述符配置的示例。


    ***清单 4-13***. Spring MVC 的 XML Servlet 描述符（示例项目 0402-rest-xml-config-server 中的文件
    web.xml）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <web-app xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://xmlns.jcp.org/xml/ns/javaee"

      xsi:schemaLocation="http://java.sun.com/xml/ns/javaee

        http://java.sun.com/xml/ns/javaee/web-app_3_0.xsd"

      version="3.0">

      <display-name>0402-rest-xml-config-service</display-name>

      <servlet>

        <servlet-name>rest-service</servlet-name>

        <servlet-class>org.springframework.web.servlet.DispatcherServlet

        </servlet-class>

        <init-param>

          <param-name>contextConfigLocation</param-name>

          <param-value>classpath:rest-service-config.xml</param-value>

        </init-param>

        <load-on-startup>1</load-on-startup>

      </servlet>

      <servlet-mapping>

        <servlet-name>rest-service</servlet-name>

        <url-pattern>/</url-pattern>

      </servlet-mapping>

    </web-app>

    ```


    这里我们指定了一个名为 `rest-service` 的 Servlet，其实现类为 `DispatcherServlet`。此 Servlet 实现由 Spring
    提供，并处理所有路由支持（以及更多功能）。`DispatcherServlet` 需要知道哪个 Spring 上下文应绑定到此 Servlet 对象。因此，我们指定了
    Servlet 初始化参数 `contextConfigLocation`，并将其指向 Spring 配置文件 `rest-service-config.xml`。如果我们未指定此参数，Spring
    将尝试在 `WEB-INF` 文件夹中查找 `[servlet-name]-servlet.xml`。


    接下来，`load-on-startup` 参数告诉 Servlet 容器在容器启动时加载此 Servlet 实例，而不是等待第一个请求。如果我们使用延迟初始化，初始化
    Servlet 会延长第一个请求的响应时间。由于 Spring 的加载时间可能以秒计，这对于初始请求来说是一个显著的性能损失。


    最后，我们将 Servlet 映射到 URL。在本例中，它是根级 URL `/`。类似的 Java 配置如清单 4-14 所示。


    ***清单 4-14***. Spring Java Servlet 配置（0403-rest-java-config-server）


    ```

    package net.lkrnac.book.eiws.chapter04;


    import org.springframework.web.servlet.support.

              AbstractAnnotationConfigDispatcherServletInitializer;


    public class RestInitializer extends

        AbstractAnnotationConfigDispatcherServletInitializer {


    @Override

      protected Class<?>[] getRootConfigClasses() {

        return null;

      }


    @Override

      protected Class<?>[] getServletConfigClasses() {

        return new Class[] { RestJavaConfigConfiguration.class };

      }


    @Override

      protected String[] getServletMappings() {

        return new String[] { "/" };

      }

    }

    ```

