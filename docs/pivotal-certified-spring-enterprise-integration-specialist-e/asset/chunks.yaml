        webServiceTemplate.setMarshaller(marshaller);

        webServiceTemplate.setUnmarshaller(marshaller);

        webServiceTemplate

            .setDefaultUri("http://localhost:10302/0302-ws-javaconfig-service");

        return webServiceTemplate;

      }

    }

    ```


    This example is Spring’s default client support for web services. `WebServiceTemplate`
    uses the `HttpUrlConnectionMessageSender` bean under the hood. This bean is created
    automatically by Spring and uses the standard Java SE HTTP client implementation
    from the `java.net` package. But some advanced use cases can force you to use
    the Apache HttpComponents project for client HTTP access. Additional features
    of Apache HttpComponents are as follows:


