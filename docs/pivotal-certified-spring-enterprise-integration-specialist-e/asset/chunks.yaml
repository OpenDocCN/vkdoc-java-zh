    \ addWater) {\n    return stepFactory.get(\"addWaterStep\").tasklet(addWater).build();\n\
    }\n\n@Bean\npublic Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,\n  \
    \  @Qualifier(\"boilWaterStep\") Step boilWaterStep,\n    @Qualifier(\"addTeaStep\"\
    ) Step addTeaStep,\n    @Qualifier(\"addWaterStep\") Step addWaterStep) {\n  \
    \  return jobBuilderFactory.get(\"prepareTeaJob\")\n        .start(boilWaterStep)\n\
    \        .next(addTeaStep)\n        .next(addWaterStep)\n        .build();\n}\n\
    \n@Bean\npublic Job prepareTeaJobNotRestartable(JobBuilderFactory jobBuilderFactory,\n\
    \    @Qualifier(\"boilWaterStep\") Step boilWaterStep,\n    @Qualifier(\"addTeaStep\"\
    ) Step addTeaStep,\n    @Qualifier(\"addWaterStep\") Step addWaterStep) {\n  \
    \  Job job = jobBuilderFactory.get(\"prepareTeaJobNotRestartable\")\n        .start(boilWaterStep)\n\
    \        .next(addTeaStep)\n        .next(addWaterStep)\n        .preventRestart()\n\
    \        .build();\n    return job;\n}\n```\n\nAllowing the restart and defining\
    \ the restart limit is done while building `Step`s. Disabling `Job` from restarting\
    \ is done via calling `preventRestart()`. This example also uses the common Spring\
    \ Boot main class, and the output looks the same as for the previous example ([Listing\
    \ 9-95](#9781484207949_Ch09_2_Ext.xhtml#FPar99)).\n\n## Control Repeat of Step\
    \ Execution\n\nAt times we need to decide programmatically whether `Step` needs\
    \ to be repeated. We can control this aspect based on `RepeatStatus` returned\
    \ from `Tasklet`. [Listing 9-97](#9781484207949_Ch09_2_Ext.xhtml#FPar101) shows\
    \ the bean that will be driving the `Step` repetition logic.\n\n[***Listing 9-97***](#9781484207949_Ch09_2_Ext.xhtml#_FPar101).\
    \ Job-Scoped Bean Deciding Whether Step Needs to Repeat (0928-repeat)\n\n```java\n\
    package net.lkrnac.book.eiws.chapter09.step.tea;\nimport org.springframework.batch.core.configuration.annotation.JobScope;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\n\
    import org.springframework.stereotype.Component;\n\n@JobScope\n@Component\npublic\
    \ class SugarCounter {\n    private int currentSugarCount;\n    private int desiredSugarAmount;\n\
    \n    @Autowired\n    public SugarCounter(@Value(\"#{jobParameters[sugarAmount]}\"\
    ) int desiredSugarAmount) {\n        super();\n        this.desiredSugarAmount\
    \ = desiredSugarAmount;\n        this.currentSugarCount = 0;\n    }\n\n    public\
    \ boolean addSugar() {\n        boolean result = currentSugarCount < desiredSugarAmount;\n\
    \        currentSugarCount++;\n        return result;\n    }\n}\n```\n\nAs a Spring\
    \ component with the `@JobScope` annotation, its instance will live only for one\
    \ `JobExecution`. `JobScope` also allows us to use late binding and retrieve the\
    \ job parameter with the name `sugarAmount`. We store it and initialize `currentSugarCount`\
    \ to `0`. [Listing 9-98](#9781484207949_Ch09_2_Ext.xhtml#FPar102) shows the implementation\
    \ of `AddSugar` step.\n\n[***Listing 9-98***](#9781484207949_Ch09_2_Ext.xhtml#_FPar102).\
    \ Implementation of Repeatable Step (0928-repeat)\n\n```java\npackage net.lkrnac.book.eiws.chapter09.step.tea;\n\
    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;\nimport org.springframework.batch.core.StepContribution;\n\
    import org.springframework.batch.core.scope.context.ChunkContext;\nimport org.springframework.batch.core.step.tasklet.Tasklet;\n\
    import org.springframework.batch.repeat.RepeatStatus;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class AddSugar\
    \ implements Tasklet {\n    private SimpleExecutablePoint simpleExecutableStep;\n\
    \    private SugarCounter sugarCounter;\n\n    @Autowired\n    public AddSugar(SimpleExecutablePoint\
    \ simpleExecutableStep,\n        SugarCounter sugarCounter) {\n        super();\n\
    \        this.simpleExecutableStep = simpleExecutableStep;\n        this.sugarCounter\
    \ = sugarCounter;\n    }\n\n    @Override\n    public RepeatStatus execute(StepContribution\
    \ contribution,\n        ChunkContext chunkContext) throws Exception {\n     \
    \   if (sugarCounter.addSugar()) {\n            simpleExecutableStep.execute(\"\
    Add one spoon of sugar\");\n            return RepeatStatus.CONTINUABLE;\n   \
    \     } else {\n            return RepeatStatus.FINISHED;\n        }\n    }\n\
    }\n```\n\nWe inject our common `SimpleExecutionPoint` to simulate the action.\
    \ The second injection includes `SugarCounter` that we defined in the previous\
    \ listing. This bean is used to decide whether we add a spoonful of sugar to our\
    \ tea and also whether we should repeat the job. If we return `ReturnStatus.CONTINUABLE`,\
    \ this step will be executed again. When the logic returns `RepeatStatus.FINISHED`,\
    \ this step won’t be executed again.\n\n`BatchConfiguration` in this example is\
    \ a simple flow of the tasklets `BoilWater`, `AddTea`, `AddWater`, and `AddSugar`.\
    \ Because this configuration is straightforward and we’ve seen similar ones previously\
    \ in this chapter, we’ll skip it. [Listing 9-99](#9781484207949_Ch09_2_Ext.xhtml#FPar103)\
    \ shows the main class of this example.\n\n[***Listing 9-99***](#9781484207949_Ch09_2_Ext.xhtml#_FPar103).\
    \ Main Class of Repeat Example (0928-repeat)\n\n```java\npackage net.lkrnac.book.eiws.chapter09;\n\
    import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobParameters;\n\
    import org.springframework.batch.core.JobParametersBuilder;\nimport org.springframework.batch.core.launch.JobLauncher;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.ConfigurableApplicationContext;\n\n@SpringBootApplication\n\
    public class BatchApplication {\n    public static void main(String[] args) throws\
    \ Exception {\n        ConfigurableApplicationContext context =\n            SpringApplication.run(BatchApplication.class,\
    \ args);\n\n        JobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n\
    \        Job job = (Job) context.getBean(\"prepareTeaJob\");\n\n        jobLauncher.run(job,\
    \ createJobParameters(2));\n        context.close();\n    }\n\n    public static\
    \ JobParameters createJobParameters(long sugarAmount) {\n        return new JobParametersBuilder()\n\
    \            .addLong(\"sugarAmount\", sugarAmount)\n            .toJobParameters();\n\
    \    }\n}\n```\n\nWe run the `prepareTeaJob` and specify that we want two spoonfuls\
