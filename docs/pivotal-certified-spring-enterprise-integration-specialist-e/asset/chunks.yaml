    Java Configuration of Parallel Steps


    Again, we are building on the previous example. [Listing 9-121](#9781484207949_Ch09_3_Ext.xhtml#FPar125)
    shows the Java configuration for the same behavior as in the previous example.


    [***Listing 9-121***](#9781484207949_Ch09_3_Ext.xhtml#_FPar125). Java Configuration
    of Parallel Steps (0938-parallel-steps-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter09;


    import net.lkrnac.book.eiws.chapter09.step.tea.AddSugar;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;

    import net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;


    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.batch.core.job.builder.FlowBuilder;

    import org.springframework.batch.core.job.flow.Flow;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.task.TaskExecutor;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public TaskExecutor customTaskExecutor() {

        ThreadPoolTaskExecutor threadPool = new ThreadPoolTaskExecutor();

        threadPool.setCorePoolSize(10);

        return threadPool;

      }


    @Bean

      public Step boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater)
    {

        return stepFactory.get("boilWaterStep").tasklet(boilWater).build();

      }


    @Bean

      public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {

        return stepFactory.get("addTeaStep").tasklet(addTea).build();

      }


    @Bean

      public Step addSugarStep(StepBuilderFactory stepFactory, AddSugar addSugar)
    {

        return stepFactory.get("addSugarStep").tasklet(addSugar).build();

      }


    @Bean

      public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)
    {

        return stepFactory.get("addWaterStep").tasklet(addWater).build();

      }


    @Bean

      public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,

          @Qualifier("boilWaterStep") Step boilWaterStep,

          @Qualifier("addTeaStep") Step addTeaStep,

          @Qualifier("addSugarStep") Step addSugarStep,

          @Qualifier("addWaterStep") Step addWaterStep,

          TaskExecutor customTaskExecutor) {

        return jobBuilderFactory.get("prepareTeaJob")

            .start(boilWaterStep)

            .split(customTaskExecutor)

            .add(new FlowBuilder<Flow>("addIngredientsSplit")

                .from(boilWaterStep).next(addTeaStep)

                .from(boilWaterStep).next(addSugarStep)

                .end())

            .next(addWaterStep)

            .end()

            .build();

      }

    }

    ```


    The definition of the thread pool bean and the creation of `Step` beans isn’t
    new for us. When we create the `Job` definition, the `split()` method allows us
    to specify the thread pool instance to use for parallel definition. In the `add()`
    method, we define parallel branches of execution. As use of `split()` and `add()`
    converts `SimpleJob` to `FlowJob`, we need to use the `end()` method to close
    the parallel subflow and the main job. The output after execution of this example
    is similar to [Listing 9-120](#9781484207949_Ch09_3_Ext.xhtml#FPar124) shown previously.


    Remote Chunking of Step


    Remote chunking is a concept that can help when we are dealing with chunk-oriented
    processing and the processing or writing of items is resource intensive. The idea
    is to delegate the processing and writing part of the chunk to one remote JVM
    process or various processes. These processes can, of course, be hosted on remote
    machines.


    Reading of chunks is done in the master process. The master communicates with
    the remote slave(s) via a message queue. So communication between master and slaves
    is asynchronous. The SB framework takes advantages of the Spring Integration framework
    to configure this communication. Two separate message queues are needed for the
    following:


    *   Sending command from master to slave(s)

    *   Sending responses from slave(s) back to master


    As communication is done via the messaging interface, work is divided dynamically
    to remote slaves, and load balancing in case of various slaves is automatic. Let’s
    explain this natural load balancing. The master sends a command to the message
    queue, where various slaves are listening. As the message queue is configured
    for point-to-point messaging, only one slave can read this command. The first
    slave that picks up the message does the processing and writing. Naturally, the
    least busy slave will be the first to read this command message from the master.


    SB uses the standard `ItemReader`, `ItemProcessor`, and `ItemWriter` interfaces
    for performing the work. `ChunkProcessor<I>` is the interface helping with work
    delegation to the slave process(es). `SimpleChunkProcessor` is the out-of-the-box
    implementation that the SB framework provides.


    Notice that our example for this feature is covered only with an XML configuration.
    The example combines Spring Integration flow with SB flow, and XML configurations
    seem to be more concise in this case, so the Java configuration was skipped.


    JMS Configuration Used for Master-Slave Communication'
