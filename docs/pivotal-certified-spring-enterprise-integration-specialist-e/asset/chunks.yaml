- fmt: "After we start the Spring Boot application with the SI configuration we described,\
    \ we send the message to the SI flow via `SiWrapperServiceVoid`. It is not in\
    \ the `try-catch` block in this case, because the error is not propagated to this\
    \ code anyway. A sleep call is used to wait enough time to make sure that the\
    \ asynchronous poller inserts the message and simulates the error afterward. After\
    \ waiting, we look into the database table to see how many records were stored.\
    \ [Listing 8-145](#9781484207949_Ch08_2_Ext.xhtml#FPar148) shows the output when\
    \ we run this main class.\n\n[**Listing 8-145**](#9781484207949_Ch08_2_Ext.xhtml#_FPar148).\
    \ Output of Transacted Polling Example\n\n```\n2015-09-01 22:22:33.252 ERROR 29589\
    \ --- [ask-scheduler-1]\no.s.integration.handler.LoggingHandler   :\norg.springframework.messaging.MessageHandlingException:\
    \ ; nested exception is\njava.lang.IllegalStateException: error occurred\n   \
    \     ...\n2015-09-01 22:22:33.724  INFO 29589 --- [           main]\nn.l.book.eiws.chapter08.SiApplication\
    \    : Record count: 0\n```\n\nThe error is simulated in a separate thread, which\
    \ is the thread covered in the transactional boundary. Therefore, we observe a\
    \ zero record count after, in the main thread. If we were to remove `<int:transactional>`\
    \ from the SI configuration, the record count would be `1`, because the insert\
    \ wouldn’t be covered by the transaction and rolled back after the error simulation.\n\
    \n## MessagingTemplate\n\nUse of the messaging gateway or inbound channel adapters\
    \ is not necessary to send messages into an SI flow. SI provides the special abstraction\
    \ `org.springframework.integration.core.MessagingTemplate` for sending and receiving\
    \ messages to/from any channel in the SI flow. This mechanism can be more convenient,\
    \ for example, in testing code or when we want to send a custom message to the\
    \ SI flow.\n\nWe can think of this class as the SI equivalent of `JmsTemplate`\
    \ or `RestTemplate`.\n\n### MessagingTemplate Example\n\nThis example uses exactly\
    \ the same SI flow configuration as in [Listing 8-27](#9781484207949_Ch08_1.xhtml#FPar30)\
    \ (example `0808-gateway-generic-xml`). To remind you, a messaging gateway is\
    \ used to send a message via `inChannel` to the outbound channel adapter mapped\
    \ to our common bean `WriteService.writeAndIndicateSuccess()`. [Listing 8-146](#9781484207949_Ch08_2_Ext.xhtml#FPar149)\
    \ shows the configuration of `MessagingTemplate`.\n\n[**Listing 8-146**](#9781484207949_Ch08_2_Ext.xhtml#_FPar149).\
    \ MessagingTemplate Configuration (0843-messaging-template)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.integration.core.MessagingTemplate;\n\n@Configuration\n\
    public class SiConfiguration {\n  @Bean\n  public MessagingTemplate messagingTemplate()\
    \ {\n    MessagingTemplate messagingTemplate = new MessagingTemplate();\n    messagingTemplate.setReceiveTimeout(1000);\n\
    \    return messagingTemplate;\n  }\n}\n```\n\nIn this Spring configuration class,\
    \ we register the `messageTemplate` bean with the receive time-out of 1 second.\
    \ [Listing 8-147](#9781484207949_Ch08_2_Ext.xhtml#FPar150) shows how we would\
    \ use it.\n\n[**Listing 8-147**](#9781484207949_Ch08_2_Ext.xhtml#_FPar150). Use\
    \ of MessagingTemplate (0843-messaging-template)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.context.ConfigurableApplicationContext;\nimport org.springframework.context.annotation.ImportResource;\n\
    import org.springframework.integration.core.MessagingTemplate;\nimport lombok.extern.slf4j.Slf4j;\n\
    \n@Slf4j\n@SpringBootApplication\n@ImportResource(\"classpath:si-config.xml\"\
    )\npublic class SiApplication {\n  public static void main(String[] args) throws\
    \ InterruptedException {\n    ConfigurableApplicationContext context =\n     \
