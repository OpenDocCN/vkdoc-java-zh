    这种消息接收方式也称为*轮询*。从输出中可以看出，这种同步消息接收会引入延迟，在大多数情况下可能不满足我们的需求。因此，最常见的做法是通过注册 JMS 监听器来实现异步
    JMS 接收。


    使用 MessageCreator 回调


    有时我们可能需要基于 JMS `Session` 对象构建消息。在这种情况下，我们需要将 `JmsTemplate` 与 `MessageCreator`
    接口结合使用来发送消息。该接口的签名如清单 5-25 所示。


    ***清单 5-25***. MessageCreator 接口的签名


    ```

    package org.springframework.jms.core;


    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.Session;


    public interface MessageCreator {

      Message createMessage(Session session) throws JMSException;

    }

    ```


    此回调接口要求我们实现 `createMessage` 方法，并基于 `javax.jms.Session` 对象提供自定义的 `javax.jms.Message`
    创建逻辑。然后，在发送消息时，将这种自定义的消息构建逻辑传递给 `JmsTemplate.send` 和 `JmsTemplate.sendAndReceive`
    方法。


    这种机制允许 Spring 管理会话实例（例如，用于缓存），同时为应用程序开发人员提供底层 JMS API 的完全灵活性。此用法的示例如清单 5-26 所示。


    ***清单 5-26***. MessageCreator 用法 (0512-jms-message-creator)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.Session;


    import lombok.extern.slf4j.Slf4j;

