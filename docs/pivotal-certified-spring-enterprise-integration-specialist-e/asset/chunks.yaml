    It’s obvious that one difference from the previous example is use of our stateful
    `Tasklet`s. The second difference is enabling steps to be executed various times
    with the same `JobParameters`. If we didn’t allow starting the `Step` various
    times, we couldn’t highlight how we transition state between various `Job` runs.
    This feature is discussed later in this chapter. [Listing 9-52](#9781484207949_Ch09_1.xhtml#FPar56)
    shows the main class of this example.


