    java.lang.UnsupportedOperationException: customTaskExecutor-9 threw exception

    customTaskExecutor-10 have parameter 9

    Elapsed time: 1024 ms

    ```


    Now the overall execution took much less time than with the fork/join pool. This
    clearly shows how crucial it is for the developer to understand asynchronous behavior
    and tune the thread-pool parameters accordingly.


    XML Configuration for Task Execution


    Spring’s Java-based configuration is a modern younger brother of XML configuration.
    If you need to use XML configuration for legacy reasons, Spring allows you to
    define asynchronous behavior with the `task` namespace. To replicate [Listing
    1-23](#9781484207949_Ch01.xhtml#FPar28) with XML configuration, use the XML in
    [Listing 1-24](#9781484207949_Ch01.xhtml#FPar29).


    [***Listing 1-24***](#9781484207949_Ch01.xhtml#_FPar29). XML Configuration for
    Asynchronous Job (0102-async-job)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:task="http://www.springframework.org/schema/task"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/task http://www.springframework.org/schema/task/spring-task-4.0.xsd

                    http://www.springframework.org/schema/beans http://www.springframework.org/schema/beans/spring-beans.xsd

                    http://www.springframework.org/schema/context http://www.springframework.org/schema/context/spring-context-4.0.xsd">


    <context:component-scan base-package="net.lkrnac.book.eiws.chapter01.async.task"
    />

      <task:executor id="customTaskExecutor" pool-size="10" queue-capacity="20" />

      <task:annotation-driven executor="customTaskExecutor" />

    </beans>

    ```


    Our `AsyncTask` and `Caller` beans are located in the package `net.lkrnac.book.eiws.chapter``01``.async.task`,
    where they are component scanned. So their `@Component` annotations are still
    needed, for registration into the Spring IoC container. The `<task:executor/>`
    tag creates a `ThreadPoolTaskExecutor` instance as a thread-pool implementation.
    If we need to use a different implementation, it needs to be specified with a
    standard bean definition. The `AsyncTask` annotation doesn’t need the custom task
    executor name parameter anymore, because the thread-pool reference is configured
    by the `executor` parameter in the `<task:annotation-driven/>` tag. We use the
    `customTaskExecutor` instance defined by the `<task:executor/>` tag.


