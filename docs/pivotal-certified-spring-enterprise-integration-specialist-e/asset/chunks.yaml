    Tasklet Step


    Chunk-oriented processing is not the only type of step we need to cover for enterprise
    application use cases. Sometimes we need to perform a single action as part of
    a bigger flow. For example, we might need to send a notification at the end of
    a job or perform a single stored procedure call. SB provides the `Tasklet` interface.
    It has only one method, `execute`, where we can place our custom logic. This instance
    can then be wrapped into the `TaskletStep` class and used as a `Step` in the SB
    flow.


    Common Classes for Tasklet Examples


    Various examples in this chapter use simple `Tasklet` steps to highlight Spring
    Batch features that control job execution flow. [Listing 9-17](#9781484207949_Ch09_1.xhtml#FPar19)
    shows this class, which is used often in this chapter.


    [***Listing 9-17***](#9781484207949_Ch09_1.xhtml#_FPar19). Simple Executable Point
    (0900-batch-common)


    ```

    package net.lkrnac.book.eiws.chapter09.step;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class SimpleExecutablePoint {

      public void execute(String message) {

        log.info(message);

      }

    }

    ```


    This simple Spring bean uses Lombok to log a given message into the `execute()`
    method.


    ![Image](images/sq.jpg) **Note**  `SimpleExecutablePoint` is useless for real-world
    applications, but it is handy for the examples in this chapter, because we can
    fake this bean and verify that the SB configuration works as expected. Tests alongside
    the book examples can be found in the GitHub repository (`https://github.com/lkrnac/book-eiws-code-samples`).


    Our domain for the `Tasklet` type of batch flows used in our examples is the preparing
    of tea. When we want to prepare tea, we need to perform a few steps to get a tasty
    result. For example, we might need to Boil Water, Add Tea to cup, and Add Water
    to cup. [Listing 9-18](#9781484207949_Ch09_1.xhtml#FPar21) shows the class simulating
    the Boil Water step.


    [***Listing 9-18***](#9781484207949_Ch09_1.xhtml#_FPar21). Class Simulating the
    Boil Water step (0900-batch-common)


    ```

    package net.lkrnac.book.eiws.chapter09.step.tea;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.StepContribution;

    import org.springframework.batch.core.scope.context.ChunkContext;

    import org.springframework.batch.core.step.tasklet.Tasklet;

    import org.springframework.batch.repeat.RepeatStatus;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class BoilWater implements Tasklet {

      private SimpleExecutablePoint simpleExecutableStep;


    @Autowired

      public BoilWater(SimpleExecutablePoint simpleExecutableStep) {

        super();

        this.simpleExecutableStep = simpleExecutableStep;

      }


    @Override

      public RepeatStatus execute(StepContribution contribution,

          ChunkContext chunkContext) throws Exception {

        simpleExecutableStep.execute("Boil Water");

        return RepeatStatus.FINISHED;

      }

    }

    ```


    This simple Spring component autowires `SimpleExecutablePoint`. In the execute
    method, we call `simpleExecutableStep.execute()` to simulate the Boil Water step.
    SB injects the `StepContribution` and `ChunkContext` instances into this method
    and expects a return value of type `RepeatStatus`. Use of these types is explained
    in later sections. For this example, we just need to know that `RepeatStatus.FINISHED`
    indicates to the DB a successful completion of `Step`.


    We won’t list the `AddTea` and `AddWater` classes, because they are similar to
    `BoilWater`; we’re only simulating the tea preparation step with a different text
    message.


    Tasklet Step Example with XML Configuration


    Now that we’ve sketched the domain, we can take a look at the SB configuration
    in [Listing 9-19](#9781484207949_Ch09_1.xhtml#FPar22).


    [***Listing 9-19***](#9781484207949_Ch09_1.xhtml#_FPar22). XML Configuration of
    XML Tasklet Step Example (File batch-config.xml in Folder src/main/resources of
    Example Project 0904-tasklet-step-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

        http://www.springframework.org/schema/batch/spring-batch.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <job id="prepareTeaJob">

        <step id="boilWaterStep" next="addTeaStep">

          <tasklet ref="boilWater"/>

        </step>

        <step id="addTeaStep" next="addWaterStep">

          <tasklet ref="addTea"/>

        </step>

