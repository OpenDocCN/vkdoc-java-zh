    过滤器


    *过滤器*是另一种中间 SI 消息端点，可以参与双向和单向流程。它既可以作为被动组件，也可以作为主动组件。其目的是决定接收到的消息是否应该传递给下游流程。此决策可以基于通用逻辑，该逻辑可通过
    `<int:filter>` XML 元素或 `@Filter` 注解进行配置。注解配置不具备 XML 的灵活性，XML 可以基于以下内容：


    *   *自定义 Java 逻辑*：应实现 `MessageSelector` 接口，并可通过 `<int:filter>` 标签的 `<beans:bean>`
    子元素或其 `ref` 属性进行定义。

    *   *SpEL 表达式*：可通过 `<int:expression>` XML 子元素或 `<int:filter>` XML 标签的 `expression`
    属性进行配置。

    *   *自定义脚本*：通过 `<int:filter>` XML 标签的 `<int-script:script>` 子元素支持 Ruby 和 Groovy。


    除了这些通用过滤器类型，我们还可以为以下技术配置特殊过滤器：


    *   *XPath 过滤器*：`<int-xml:xpath-filter>`

    *   *XML 验证过滤器*：`<int-xml:validating-filter>`


    过滤器决定是否将消息传递给 SI 流程中的下一个组件，这由过滤器逻辑（无论是 Java 逻辑、SpEL 还是脚本）返回的布尔值表示。如果值为 `false`，过滤器允许我们丢弃消息或在
    SI 流程中抛出异常。如果我们丢弃消息，可以指定 `discardChannel` 来路由该消息。


    一个重要的事实是，默认情况下过滤器会静默丢弃消息。


    过滤器也可以作为通道适配器的属性嵌入到单向流程中（例如，`<int-ftp:inbound-channel-adapter>` 的 `local-filter`
    或 `<int-mail:imap-idle-channel-adapter>` 的 `mail-filter-expression`）。


    基于 XML 配置的过滤器示例


    代码清单 8-57 展示了自定义过滤器逻辑。


    ***代码清单 8-57***. XML 配置示例的自定义过滤器逻辑 (0815-filter-xml-ref)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.integration.core.MessageSelector;

    import org.springframework.messaging.Message;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleFilter implements MessageSelector {

      @Override

      public boolean accept(Message<?> message) {

        String stringPayload = (String) message.getPayload();

        return !stringPayload.contains("corrupt");

      }

    }

    ```


    这个实现了 `MessageSelector` 接口的 Spring Bean 可以用作 SI 流程中的过滤器逻辑。它需要实现 `MessageSelector.accept()`
    方法。在此例中，我们检查消息的 `String` 负载，如果包含 `corrupt` 子字符串则拒绝该消息。代码清单 8-58 深入介绍了此示例的 SI 流程配置。


