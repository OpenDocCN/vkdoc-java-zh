- fmt: "另一个通用的 SI 注解是`@IntegrationComponentScan`。顾名思义，它会扫描类路径以查找 SI 消息端点。其工作方式类似于我们熟悉的\
    \ Spring 框架中用于 SI 特定组件的`@ComponentScan`。因此，它必须与`@MessageEndpoint`或`@MessagingGateway`注解（我们将在本章后面解释这些注解）一起使用，这些注解会将\
    \ SI 特定的 Bean 注册到 Spring 上下文中。即使我们使用启用了自动配置（`@EnableAutoConfiguration`或`@SpringBootApplication`）的\
    \ Spring Boot，也需要此注解来注册 SI 特定的组件。\n\n最后一个通用注解是`@MessageEndpoint`，它标记了参与 SI 流的类，该类的一些方法将使用更具体的\
    \ SI 注解进行注解。这些具体的注解将在我们讨论具体类型的消息端点时在后面解释。\n\n这些注解的使用将作为特定 SI 组件示例的一部分进行展示。\n\n\
    ## 消息端点类型\n\n我们可以通过多种方式对消息端点进行分类，详情如下。\n\n### 消息流方向\n\n- **单向**：组件可以参与即发即弃（fire-and-forget）场景。\n\
    - **双向**：组件可以参与请求-响应场景。此流程涉及通过`replyChannel`向上游消费者发送响应。\n\n### 在消息流中的位置\n\n- **输入组件**：将\
    \ SI 流连接到上游的外部应用程序或内部 Java 逻辑。消息通过此组件进入 SI 流。\n- **输出组件**：将 SI 流连接到下游的外部应用程序或内部\
    \ Java 逻辑。消息通过此组件从 SI 流中发送出去。\n- **中间组件**：能够在流的中间运行。此组件可以参与单向以及双向消息流。\n\n### 组件的触发活动\n\
    \n- **被动**：组件等待消息通过输入通道推送到它。此模式通常是同步执行的一部分，并且能够将事务传播到输出通道或将异常冒泡到消息的发起者。\n- **主动**：组件基于内部触发主动从输入通道读取消息。这种触发可以通过一个称为**轮询器**（poller）的特殊子组件（通过`<poller>`\
    \ XML 标签或`@Poller`注解配置）来实现。此模式的一个重要要求是输入通道需要能够临时存储流入其中的消息。我们将在本章后面讨论这种通道类型。\n\n\
    ### 组件用途\n\n**通用组件**\n\n- 将消息通道映射到 Java 接口或类。如果映射到 Java 接口，则实现由 SI 抽象层覆盖。\n- 在标准\
    \ Java 类或接口之上处理消息端点关注点（例如，路由、消息转换）。\n\n**技术特定组件**\n\n- 将 SI 流连接到外部系统或传输协议（例如，FTP、HTTP、JMS）。SI\
    \ 提供了许多这些连接器组件，它们汇总在此表中：`http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`。\n\
    - 在特定技术之上处理消息端点关注点（例如，XML 消息转换、基于 XPath 表达式过滤 XML 消息）。\n\n## 消息端点列表\n\n理解每个特定的消息端点可以根据其配置以多种模式运行是很重要的。但是，一旦组件配置完成，我们就不能在运行时切换这些模式。\n\
    \n以下是 SI 提供的主要消息端点及其可以运行的模式列表。它们也被分为三个主要的功能类别。\n\n- **消息传递组件**：用于将 SI 流与外部技术或\
    \ Java 逻辑连接\n  - **通道适配器**：单向，输入/输出，被动/主动，通用/特定\n  - **服务激活器**：单向/双向，输出/中间，被动/主动，通用\n\
    \  - **消息网关**：单向/双向，输入/输出，被动，通用/特定\n- **转换组件**：其功能是将消息负载或头部转换为不同的格式。它们是中间组件，可以参与单向以及双向消息流。\n\
    \  - **转换器**：被动/主动，通用/特定\n  - **内容增强器**：被动/主动，通用/特定\n- **路由组件**：其功能是控制消息流。它们是中间组件，可以参与单向以及双向消息流。\n\
    \  - **过滤器**：被动/过滤，通用/特定\n  - **路由器**：被动，通用/特定\n  - **桥接器**：被动/主动，通用\n  - **链**：被动，通用\n\
    \  - **拆分器**：被动/主动，通用/特定\n  - **聚合器**：被动，通用\n\n![Image](images/sq.jpg) **注意**\
    \ 这不是 SI 消息端点的完整列表。此列表涵盖了您在标准集成用例中最可能使用的主要端点。针对各种边缘用例的特殊端点超出了 Spring 企业集成认证的范围，因此也超出了本书的范围。有关消息端点的完整列表，请参阅\
    \ SI 参考文档：`http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/`。\n\
    \n## 通道适配器\n\n通道适配器是一个用于单向消息流的 SI 端点组件。因此，它适用于即发即弃场景。从触发角度来看，它可以作为被动组件以及主动组件（如果配置了轮询器子组件）运行。由于每个单向消息流都需要有输入和输出，我们有两种类型的通道适配器：\n\
    \n- **输入通道适配器**：位于 SI 流的输入侧，被动监听或主动读取消息。\n- **输出通道适配器**：位于 SI 流的输出侧，将消息发送到 Java\
    \ 类或外部系统或协议。\n\n术语*适配器*表明它将消息通道映射到非 SI 系统或子系统。从这个角度来看，我们可以将通道适配器分为以下两类：\n\n- **通用\
    \ Java 适配器**：将消息通道映射到 Java 接口或类。如果适配器映射到 Java 接口，则实现由 SI 抽象层覆盖。可以通过 XML 标签`<int:inbound-channel-adapter>`或`<int:outbound-channel-adapter>`进行配置，它使用核心\
    \ SI XML 命名空间。入站通道适配器也可以通过`@InboundChannelAdapter`进行配置。截至 SI 4.1.6.RELEASE 版本，此注解不适用于出站通道适配器。\n\
    - **技术特定适配器**：将消息通道连接到外部系统或传输协议（例如，FTP、HTTP、JMS）。SI 为不同技术提供了这些适配器的众多实现，这些实现只能通过\
    \ XML 标签进行配置。对于每种技术，我们需要使用特定的 XML 命名空间（例如，`<int-http:inbound-channel-adapter>`、`<int-amqp:inbound-channel-adapter>`、`<int-mail:outbound-channel-adapter>`、`<int-jms:outbound-channel-adapter>`）。外部适配器没有可用的\
    \ SI 注解，因此我们必须为它们使用 XML 配置。一个展示外部技术通道适配器实现的简明表格可以在`http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`找到。\n\
    \n### 使用 XML 配置的通用入站和出站通道适配器示例"
  raw: "Another generic SI annotation is `@IntegrationComponentScan`. As the name\
    \ suggests, it scans the classpath for SI message endpoints. It works similarly\
    \ to the `@ComponentScan` we are used to from the Spring framework for SI-specific\
    \ components. So it has to be used with the `@MessageEndpoint` or `@MessagingGateway`\
    \ annotations (we explain these annotations later in the chapter), which register\
    \ SI-specific beans into the Spring context. This annotation is needed for registering\
    \ SI-specific components even if we are using Spring Boot with autoconfiguration\
    \ enabled (`@EnableAutoConfiguration` or `@SpringBootApplication`).\n\nThe last\
    \ generic annotation is `@MessageEndpoint`, which marks the class participating\
    \ in SI flow, where some of its methods will be annotated with more-specific SI\
    \ annotations. These specific annotations are explained later, when we discuss\
    \ concrete types of message endpoints.\n\nUse of these annotations is shown as\
    \ part of specific SI component examples.\n\nMessage Endpoint Types\n\nWe can\
    \ categorize message endpoints in various ways, detailed in the following subsections.\n\
    \nMessage Flow Direction\n\n*   *Unidirectional* : The component can participate\
    \ in fire-and-forget scenarios.\n*   *Bidirectional*: The component can participate\
    \ in request-response scenarios. This flow involves sending a response to the\
    \ upstream consumer via `replyChannel`.\n\nPlacement in the Message Flow\n\n*\
    \   *Input component* : Connects the SI flow to the upstream external application\
    \ or internal Java logic. Messages enter the SI flow via this component.\n*  \
    \ *Output component* : Connects the SI flow to the downstream external application\
    \ or internal Java logic. Messages are sent out of the SI flow via this component.\n\
    *   *Middle component* : Capable of operating in the middle of the flow. This\
    \ component can participate in unidirectional as well as bidirectional message\
    \ flow.\n\nTriggering Activity of the Component\n\n*   *Passive*: The component\
    \ waits until the message is pushed to it via the input channel. This mode is\
    \ usually part of synchronous execution and is able to propagate transactions\
    \ to the output channel or bubble up exceptions to the originator of the message.\n\
    *   *Active*: The component actively reads messages from the input channel based\
    \ on internal triggering. This triggering can be achieved with a special subcomponent\
    \ called a *poller* (configured via the `<poller>` XML tag or the `@Poller` annotation).\
    \ An important requirement for this mode is that the input channel needs to be\
    \ capable of temporarily storing messages flowing into it. We discuss this channel\
    \ type later in this chapter.\n\nComponent Purpose\n\n*Generic component*\n\n\
    *   Maps the message channel to the Java interface or class. If it’s mapped to\
    \ the Java interface, the implementation is covered by SI abstractions.\n*   Handles\
    \ the message endpoint concern (for example, routing, message transformation)\
    \ on top of standard Java classes or interfaces.\n\n*Technology-specific component*\n\
    \n*   Connects the SI flow to an external system or transport protocol (for example,\
    \ FTP, HTTP, JMS). SI provides many of these connector components, which are gathered\
    \ in this table: `http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`.\n\
    *   Handles message endpoint concerns on top of a specific technology (for example,\
    \ XML message conversion, filtering XML messages based on XPath expressions).\n\
    \nList of Message Endpoints\n\nIt’s important to understand that each particular\
    \ message endpoint can operate in various modes, based on its configuration. But\
    \ once the component is configured, we can’t switch these modes at runtime.\n\n\
    The following is a list of the major message endpoints that SI provides and the\
    \ modes they can operate in. They are also divided into three major functional\
    \ categories.\n\n*   *Messaging components*: Used to connect the SI flow with\
    \ external technology or Java logic\n    *   *Channel adapter* : Unidirectional,\
    \ input/output, passive/active, generic/specific\n    *   *Service activator*\
    \ : Unidirectional/bidirectional, output/middle, passive/active, generic\n   \
    \ *   *Messaging gateway* : Unidirectional/bi-directional, input/output, passive,\
    \ generic/specific\n*   *Transformation components*: Their function is to convert\
    \ the message payload or headers to a different format. They are middle components\
    \ that can participate in unidirectional as well as bidirectional message flow.\n\
    \    *   *Transformer* : Passive/active, generic/specific\n    *   *Content enricher*\
    \ : Passive/active, generic/specific\n*   *Routing components*: Their function\
    \ is to control the flow of messages. They are middle components that can participate\
    \ in unidirectional as well as bidirectional message flow.\n    *   *Filter* :\
    \ Passive/filter, generic/specific\n    *   *Router* : Passive, generic/specific\n\
    \    *   *Bridge* : Passive/active, generic\n    *   *Chain* : Passive, generic\n\
    \    *   *Splitter* : Passive/active, generic/specific\n    *   *Aggregator* :\
    \ Passive, generic\n\n![Image](images/sq.jpg) **Note**  This is not a complete\
    \ list of SI message endpoints. This list covers the major endpoints you are most\
    \ likely to use in practice for standard integration use cases. Special endpoints\
    \ for various corner use cases are beyond the scope of Enterprise Integration\
    \ with Spring certification and thus also beyond the scope of this book. For a\
    \ full list of message endpoints, refer to the SI reference documentation at `http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/`.\n\
    \nChannel Adapter\n\nThe channel adapter is an SI endpoint component for unidirectional\
    \ message flow. So it is suitable for fire-and-forget scenarios. From a triggering\
    \ point of view, it can act as a passive as well as active component (if the poller\
    \ subcomponent is configured). As each unidirectional message flow needs to have\
    \ input and output, we have two types of channel adapters:\n\n*   *Input* *channel\
    \ adapter*: Sits on the input side of the SI flow, where it passively listens\
    \ or actively reads messages\n*   *Output* *channel adapter*: Sits on the output\
    \ side of SI flow, where it sends messages to the Java class or external system\
    \ or protocol\n\nThe term *adapter* suggests that it maps the message channel\
    \ to a non-SI system or subsystem. From this point of view, we can divide channel\
    \ adapters into these two categories:\n\n*   *Generic Java adapters*: Map the\
    \ message channel to the Java interface or class. If the adapter is mapped to\
    \ the Java interface, implementation is covered by SI abstractions. Can be configured\
    \ via the XML tag `<int:inbound-channel-adapter>` or `<int:outbound-channel-adapter>`,\
    \ where it uses the core SI XML namespace. The inbound channel adapter can be\
    \ also configured via the `@InboundChannelAdapter`. This annotation is not available\
    \ for the outbound channel adapter as of SI version 4.1.6.RELEASE.\n*   *Technology-specific\
    \ adapters*: Connect the message channel to an external system or transport protocol\
    \ (for example, FTP, HTTP, JMS). SI provides numerous implementations of these\
    \ adapters for different technologies, which can be configured via only XML tags.\
    \ For each technology, we need to use specific XML namespaces (for example, `<int-http:inbound-channel-adapter>`,\
    \ `<int-amqp:inbound-channel-adapter>`, `<int-mail:outbound-channel-adapter>`,\
    \ `<int-jms:outbound-channel-adapter>`). External adapters don’t have any SI annotations\
    \ available, so we have to use XML configuration for them. A concise table presenting\
    \ channel adapter implementations for external technologies can be found at `http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`.\n\
    \nGeneric Inbound and Outbound Channel Adapters Example Configured with XML"
  trans: "\n另一个通用的 SI 注解是 `@IntegrationComponentScan`。顾名思义，它会扫描类路径以查找 SI 消息端点。其工作方式类似于我们在\
    \ Spring 框架中用于 SI 特定组件的 `@ComponentScan`。因此，它必须与 `@MessageEndpoint` 或 `@MessagingGateway`\
    \ 注解（我们将在本章后面解释这些注解）一起使用，这些注解会将 SI 特定的 Bean 注册到 Spring 上下文中。即使我们使用启用了自动配置的 Spring\
    \ Boot（`@EnableAutoConfiguration` 或 `@SpringBootApplication`），也需要此注解来注册 SI 特定的组件。\n\
    \n最后一个通用注解是 `@MessageEndpoint`，它标记了参与 SI 流程的类，该类中的某些方法将使用更具体的 SI 注解进行注解。当我们讨论具体类型的消息端点时，将在后面解释这些特定的注解。\n\
    \n这些注解的使用将作为特定 SI 组件示例的一部分进行展示。\n\n消息端点类型\n\n我们可以通过多种方式对消息端点进行分类，详情如下。\n\n消息流方向\n\
    \n*   *单向*：该组件可以参与即发即忘场景。\n*   *双向*：该组件可以参与请求-响应场景。此流程涉及通过 `replyChannel` 将响应发送回上游消费者。\n\
    \n在消息流中的位置\n\n*   *输入组件*：将 SI 流程连接到上游外部应用程序或内部 Java 逻辑。消息通过此组件进入 SI 流程。\n*   *输出组件*：将\
    \ SI 流程连接到下游外部应用程序或内部 Java 逻辑。消息通过此组件从 SI 流程发送出去。\n*   *中间组件*：能够在流程中间运行。此组件可以参与单向以及双向消息流。\n\
    \n组件的触发活动\n\n*   *被动*：该组件等待消息通过输入通道推送给它。此模式通常是同步执行的一部分，并且能够将事务传播到输出通道，或将异常冒泡到消息的发起者。\n\
    *   *主动*：该组件基于内部触发主动从输入通道读取消息。这种触发可以通过一个称为 *轮询器* 的特殊子组件（通过 `<poller>` XML 标签或\
    \ `@Poller` 注解配置）来实现。此模式的一个重要要求是输入通道需要能够临时存储流入其中的消息。我们将在本章后面讨论这种通道类型。\n\n组件用途\n\
    \n*通用组件*\n\n*   将消息通道映射到 Java 接口或类。如果映射到 Java 接口，则实现由 SI 抽象层提供。\n*   在标准 Java\
    \ 类或接口之上处理消息端点关注点（例如，路由、消息转换）。\n\n*特定技术组件*\n\n*   将 SI 流程连接到外部系统或传输协议（例如，FTP、HTTP、JMS）。SI\
    \ 提供了许多此类连接器组件，汇总在此表中：`http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`。\n\
    *   在特定技术之上处理消息端点关注点（例如，XML 消息转换、基于 XPath 表达式过滤 XML 消息）。\n\n消息端点列表\n\n理解每个特定的消息端点可以根据其配置以多种模式运行是很重要的。但是，一旦组件配置完成，我们就不能在运行时切换这些模式。\n\
    \n以下是 SI 提供的主要消息端点及其可以运行的模式列表。它们也被分为三个主要的功能类别。\n\n*   *消息传递组件*：用于将 SI 流程与外部技术或\
    \ Java 逻辑连接起来\n    *   *通道适配器*：单向，输入/输出，被动/主动，通用/特定\n    *   *服务激活器*：单向/双向，输出/中间，被动/主动，通用\n\
    \    *   *消息网关*：单向/双向，输入/输出，被动，通用/特定\n*   *转换组件*：其功能是将消息负载或头部转换为不同的格式。它们是中间组件，可以参与单向以及双向消息流。\n\
    \    *   *转换器*：被动/主动，通用/特定\n    *   *内容增强器*：被动/主动，通用/特定\n*   *路由组件*：其功能是控制消息流。它们是中间组件，可以参与单向以及双向消息流。\n\
    \    *   *过滤器*：被动/过滤，通用/特定\n    *   *路由器*：被动，通用/特定\n    *   *桥接器*：被动/主动，通用\n \
    \   *   *链*：被动，通用\n    *   *拆分器*：被动/主动，通用/特定\n    *   *聚合器*：被动，通用\n\n![Image](img/sq.jpg) **注意**  这不是\
    \ SI 消息端点的完整列表。此列表涵盖了你在实践中最可能用于标准集成用例的主要端点。针对各种边缘用例的特殊端点超出了 Spring 企业集成认证的范围，因此也超出了本书的范围。有关消息端点的完整列表，请参阅\
    \ `http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/`\
    \ 上的 SI 参考文档。\n\n通道适配器\n\n通道适配器是用于单向消息流的 SI 端点组件。因此，它适用于即发即忘场景。从触发角度来看，它可以作为被动组件以及主动组件（如果配置了轮询器子组件）运行。由于每个单向消息流都需要有输入和输出，我们有两种类型的通道适配器：\n\
    \n*   *输入通道适配器*：位于 SI 流程的输入侧，被动监听或主动读取消息\n*   *输出通道适配器*：位于 SI 流程的输出侧，将消息发送到 Java\
    \ 类或外部系统或协议\n\n术语 *适配器* 表明它将消息通道映射到非 SI 系统或子系统。从这个角度来看，我们可以将通道适配器分为以下两类：\n\n*\
    \   *通用 Java 适配器*：将消息通道映射到 Java 接口或类。如果适配器映射到 Java 接口，则实现由 SI 抽象层提供。可以通过 XML 标签\
    \ `<int:inbound-channel-adapter>` 或 `<int:outbound-channel-adapter>` 进行配置，其中使用核心\
    \ SI XML 命名空间。入站通道适配器也可以通过 `@InboundChannelAdapter` 进行配置。截至 SI 4.1.6.RELEASE 版本，此注解不适用于出站通道适配器。\n\
    *   *特定技术适配器*：将消息通道连接到外部系统或传输协议（例如，FTP、HTTP、JMS）。SI 为不同技术提供了这些适配器的众多实现，这些实现只能通过\
    \ XML 标签进行配置。对于每种技术，我们需要使用特定的 XML 命名空间（例如，`<int-http:inbound-channel-adapter>`、`<int-amqp:inbound-channel-adapter>`、`<int-mail:outbound-channel-adapter>`、`<int-jms:outbound-channel-adapter>`）。外部适配器没有任何可用的\
    \ SI 注解，因此我们必须为它们使用 XML 配置。一个简洁的表格，展示了外部技术的通道适配器实现，可以在 `http://docs.spring.io/spring-integration/docs/latest-ga/reference/htmlsingle/#endpoint-summary`\
    \ 找到。\n\n使用 XML 配置的通用入站和出站通道适配器示例\n"
- fmt: "以下是根据您的要求排版后的 Markdown 文档：\n\nThe following generic channel adapter examples\
    \ are the only examples in this chapter not using Spring Boot, in order to highlight\
    \ how to configure SI applications with pure Spring and SI frameworks.\n\nThis\
    \ example covers generic inbound and outbound channel adapters based on XML configuration.\
    \ The first class, shown in [Listing 8-11](#9781484207949_Ch08_1.xhtml#FPar14),\
    \ is a service we will be actively polling.\n\n[***Listing 8-11***](#9781484207949_Ch08_1.xhtml#_FPar14).\
    \ Service Used for Reading Messages via Inbound Channel Adapter (0803-channel-adapter-generic-xml)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08.in;\nimport org.springframework.stereotype.Service;\n\
    \n@Service\npublic class ReadService {\n  public String read() {\n    return \"\
    simple message\";\n  }\n}\n```\n\nThis Spring service bean has just one simple\
    \ method that returns a simple string message. [Listing 8-12](#9781484207949_Ch08_1.xhtml#FPar15)\
    \ shows the XML configuration of the SI flow.\n\n[***Listing 8-12***](#9781484207949_Ch08_1.xhtml#FPar15).\
    \ XML Configuration of SI Flow for Generic Channel Adapters Example (File `si-config.xml`\
    \ in Folder `src/main/resources` of Example Project 0803-channel-adapter-generic-xml)\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \                http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\n\
    \                http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<context:component-scan base-package=\"net.lkrnac.book.eiws.chapter08\" />\n\
    \n<int:inbound-channel-adapter ref=\"readService\" method=\"read\" channel=\"\
    inChannel\">\n    <int:poller fixed-rate=\"1000\" max-messages-per-poll=\"1\"\
    />\n  </int:inbound-channel-adapter>\n\n<int:channel id=\"inChannel\" />\n\n<int:outbound-channel-adapter\
    \ channel=\"inChannel\" ref=\"writeService\" method=\"write\" />\n</beans>\n```\n\
    \nSI provides various XML namespaces for generic SI components and separate namespaces\
    \ for particular technology we want the SI flow to hook on. In this case, we use\
    \ only a generic SI namespace aliased to `int`. Alongside this SI namespace, we\
    \ also use the standard Spring namespaces `context` and a default one for handling\
    \ Spring beans.\n\nThe first XML tag `<context:component-scan>` performs classpath\
    \ scanning for Spring components in the base package `net.lkrnac.book.eiws.chapter08`\
    \ and its subpackages. This scan includes `ReadService` and our common beans `WriteService`\
    \ and `WriteRepository`.\n\nNext we can use the SI tag `<int:inbound-channel-adapter>`\
    \ , which will be connected to the `readService` bean. We also have to specify\
    \ the attribute method, which maps this inbound channel adapter to `readService.read()`.\
    \ As `ReadService` is a passive bean not sending any messages, we need to configure\
    \ the `<int:poller>` subelement for this adapter. With attributes for this poller,\
    \ we define a 1-second fixed-rate poll interval and we will read only one message\
    \ per poll. Under the hood, SI uses a standard Spring scheduler with the fixed\
    \ rate of 1 second in this case. So every second, this channel adapter will call\
    \ `readService.read()`,and create an SI message out of its return value.\n\nThis\
    \ message is then handed to another `inChannel`, which is defined by the mandatory\
    \ attribute `channel`. `inChannel` also has to be configured for SI flow, and\
    \ this is done via the separate XML element `<int:channel>`. On the other side\
    \ of `inChannel`, we connect the outbound channel adapter via the XML tag `<int:outbound-channel-adapter>`\
    \ . This adapter is mapped to our common bean, `writeService`, and the `write`\
    \ method.\n\nThe main class of this example is shown in [Listing 8-13](#9781484207949_Ch08_1.xhtml#FPar16).\n\
    \n[***Listing 8-13***](#9781484207949_Ch08_1.xhtml#FPar16). Main Class of Generic\
    \ Channel Adapters Example Based on XML Configuration (0803-channel-adapter-generic-xml)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.support.GenericXmlApplicationContext;\n\
    import org.springframework.core.io.ClassPathResource;\n\npublic class SiApplication\
    \ {\n  public static void main(String[] args) throws InterruptedException {\n\
    \    new GenericXmlApplicationContext(new ClassPathResource(\"si-config.xml\"\
    ));\n  }\n}\n```\n\nThis class starts the Spring context defined in `si-config.xml`.\
    \ When we run this main class as a Java application, we get the output shown in\
    \ [Listing 8-14](#9781484207949_Ch08_1.xhtml#FPar17).\n\n[***Listing 8-14***](#9781484207949_Ch08_1.xhtml#FPar17).\
    \ Output of XML Generic Channel Adapters Example\n\n```\n20:35:49.774 [task-scheduler-1]\
    \ INFO  n.l.b.e.c.out.WriteRepository - Text persisted: simple\nmessage\n20:35:50.760\
    \ [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository - Text persisted: simple\n\
    message\n20:35:51.758 [task-scheduler-2] INFO  n.l.b.e.c.out.WriteRepository -\
    \ Text persisted: simple\nmessage\n20:35:52.758 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository\
    \ - Text persisted: simple\nmessage\n20:35:53.758 [task-scheduler-3] INFO  n.l.b.e.c.out.WriteRepository\
    \ - Text persisted: simple\nmessage\n```\n\nThe flow is executed in the task scheduler\
    \ threads instead of the main thread. This is because we specified a poller for\
    \ the inbound channel adapter, which reads a new message each second and sends\
    \ it to `writerService`. This is also why this Spring context remains open and\
    \ would run indefinitely until we forcibly stop the application.\n\nWe need to\
    \ bear in mind that the types of Java POJO on input and output of this flow must\
    \ match. In this case, it is of type `String`, which is used as a payload of `GenericMessage<String>`\
    \ flowing. It is also important to understand that SI components register Spring\
    \ beans into the Spring context. For example, the `<int:channel>` tag created\
    \ a Spring bean with the name `inChannel` and the type `DirectChannel`. This channel\
    \ type is explained later in the “Message Channel” section.\n\n[Figure 8-1](#9781484207949_Ch08_1.xhtml#Fig1)\
    \ shows one more interesting thing about this example.\n\n![9781484207949_Fig08-01.jpg](images/9781484207949_Fig08-01.jpg)\n\
    \n[Figure 8-1](#9781484207949_Ch08_1.xhtml#_Fig1). Visualization of generic channel’s\
    \ adapter SI flow\n\n[Figure 8-1](#9781484207949_Ch08_1.xhtml#Fig1) depicts our\
    \ SI flow. It is nice, because it effectively shows a live diagram of our SI application—something\
    \ every architect dreams of. This visualization can be found in the STS writer\
    \ window of the `si-config.xml` file, between the bottom tabs. From my experience,\
    \ a lot of developers don’t even know where these tabs are located in Eclipse/STS,\
    \ so let’s show it visually in [Figure 8-2](#9781484207949_Ch08_1.xhtml#Fig2).\n\
    \n![9781484207949_Fig08-02.jpg](images/9781484207949_Fig08-02.jpg)\n\n[Figure\
    \ 8-2](#9781484207949_Ch08_1.xhtml#_Fig2). Location of integration-graph tab\n\
    \nBut this is not only a visualization. We can also create SI flows based on this\
    \ integration-graph tab. As you can see, on left side of the writer window are\
    \ available SI components, and we can drag them into our flow. When the component\
    \ is located on our graph, we can double-click it, and STS will open the Properties\
    \ window, where we can edit properties of this component. This is shown in [Figure\
    \ 8-3](#9781484207949_Ch08_1.xhtml#Fig3).\n\n![9781484207949_Fig08-03.jpg](images/9781484207949_Fig08-03.jpg)\n\
    \n[Figure 8-3](#9781484207949_Ch08_1.xhtml#_Fig3). Editing SI component attributes\
    \ via the Properties tab\n\nAs we can see, all the possible attributes for a particular\
    \ SI component are listed. Mandatory attributes are underlined.\n\n## Generic\
    \ Inbound Channel Adapter Example Configured with Java Annotation"
  raw: 'The following generic channel adapter examples are the only examples in this
    chapter not using Spring Boot, in order to highlight how to configure SI applications
    with pure Spring and SI frameworks.


    This example covers generic inbound and outbound channel adapters based on XML
    configuration. The first class, shown in [Listing 8-11](#9781484207949_Ch08_1.xhtml#FPar14),
    is a service we will be actively polling.


    [***Listing 8-11***](#9781484207949_Ch08_1.xhtml#_FPar14). Service Used for Reading
    Messages via Inbound Channel Adapter (0803-channel-adapter-generic-xml)


    ```

    package net.lkrnac.book.eiws.chapter08.in;

    import org.springframework.stereotype.Service;


    @Service

    public class ReadService {

      public String read() {

        return "simple message";

      }

    }

    ```


    This Spring service bean has just one simple method that returns a simple string
    message. [Listing 8-12](#9781484207949_Ch08_1.xhtml#FPar15) shows the XML configuration
    of the SI flow.


    [***Listing 8-12***](#9781484207949_Ch08_1.xhtml#_FPar15). XML Configuration of
    SI Flow for Generic Channel Adapters Example (File si-config.xml in Folder src/main/resources
    of Example Project 0803-channel-adapter-generic-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

                    http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context.xsd

                    http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <context:component-scan base-package="net.lkrnac.book.eiws.chapter08" />


    <int:inbound-channel-adapter ref="readService" method="read" channel="inChannel">

        <int:poller fixed-rate="1000" max-messages-per-poll="1"/>

      </int:inbound-channel-adapter>


    <int:channel id="inChannel" />


    <int:outbound-channel-adapter channel="inChannel" ref="writeService" method="write"
    />

    </beans>

    ```


    SI provides various XML namespaces for generic SI components and separate namespaces
    for particular technology we want the SI flow to hook on. In this case, we use
    only a generic SI namespace aliased to `int`. Alongside this SI namespace, we
    also use the standard Spring namespaces `context` and a default one for handling
    Spring beans.


    The first XML tag `<context:component-scan>` performs classpath scanning for Spring
    components in the base package `net.lkrnac.book.eiws.chapter``08` and its subpackages.
    This scan includes `ReadService` and our common beans `WriteService` and `WriteRepository`.


    Next we can use the SI tag `<int:inbound-channel-adapter>` , which will be connected
    to the `readService` bean. We also have to specify the attribute method, which
    maps this inbound channel adapter to `readService.read()`. As `ReadService` is
    a passive bean not sending any messages, we need to configure the `<int:poller>`
    subelement for this adapter. With attributes for this poller, we define a 1-second
    fixed-rate poll interval and we will read only one message per poll. Under the
    hood, SI uses a standard Spring scheduler with the fixed rate of 1 second in this
    case. So every second, this channel adapter will call `readService.read()`,and
    create an SI message out of its return value.


    This message is then handed to another `inChannel`, which is defined by the mandatory
    attribute `channel. inChannel` also has to be configured for SI flow, and this
    is done via the separate XML element `<int:channel>`. On the other side of `inChannel`,
    we connect the outbound channel adapter via the XML tag `<int:outbound-channel-adapter>`
    . This adapter is mapped to our common bean, `writeService`, and the `write` method.


    The main class of this example is shown in [Listing 8-13](#9781484207949_Ch08_1.xhtml#FPar16).


    [***Listing 8-13***](#9781484207949_Ch08_1.xhtml#_FPar16). Main Class of Generic
    Channel Adapters Example Based on XML Configuration (0803-channel-adapter-generic-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.context.support.GenericXmlApplicationContext;

    import org.springframework.core.io.ClassPathResource;


    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        new GenericXmlApplicationContext(new ClassPathResource("si-config.xml"));

      }

    }

    ```


    This class starts the Spring context defined in `si-config.xml`. When we run this
    main class as a Java application, we get the output shown in [Listing 8-14](#9781484207949_Ch08_1.xhtml#FPar17).


    [***Listing 8-14***](#9781484207949_Ch08_1.xhtml#_FPar17). Output of XML Generic
    Channel Adapters Example


    ```

    20:35:49.774 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    20:35:50.760 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    20:35:51.758 [task-scheduler-2] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    20:35:52.758 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    20:35:53.758 [task-scheduler-3] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    ```


    The flow is executed in the task scheduler threads instead of the main thread.
    This is because we specified a poller for the inbound channel adapter, which reads
    a new message each second and sends it to `writerService`. This is also why this
    Spring context remains open and would run indefinitely until we forcibly stop
    the application.


    We need to bear in mind that the types of Java POJO on input and output of this
    flow must match. In this case, it is of type `String`, which is used as a payload
    of `GenericMessage<String>` flowing. It is also important to understand that SI
    components register Spring beans into the Spring context. For example, the `<int:channel>`
    tag created a Spring bean with the name `inChannel` and the type `DirectChannel`.
    This channel type is explained later in the “Message Channel” section.


    [Figure 8-1](#9781484207949_Ch08_1.xhtml#Fig1) shows one more interesting thing
    about this example.


    ![9781484207949_Fig08-01.jpg](images/9781484207949_Fig08-01.jpg)


    [Figure 8-1](#9781484207949_Ch08_1.xhtml#_Fig1). Visualization of generic channel’s
    adapter SI flow


    [Figure 8-1](#9781484207949_Ch08_1.xhtml#Fig1) depicts our SI flow. It is nice,
    because it effectively shows a live diagram of our SI application—something every
    architect dreams of. This visualization can be found in the STS writer window
    of the `si-config.xml` file, between the bottom tabs. From my experience, a lot
    of developers don’t even know where these tabs are located in Eclipse/STS, so
    let’s show it visually in [Figure 8-2](#9781484207949_Ch08_1.xhtml#Fig2).


    ![9781484207949_Fig08-02.jpg](images/9781484207949_Fig08-02.jpg)


    [Figure 8-2](#9781484207949_Ch08_1.xhtml#_Fig2). Location of integration-graph
    tab


    But this is not only a visualization. We can also create SI flows based on this
    integration-graph tab. As you can see, on left side of the writer window are available
    SI components, and we can drag them into our flow. When the component is located
    on our graph, we can double-click it, and STS will open the Properties window,
    where we can edit properties of this component. This is shown in [Figure 8-3](#9781484207949_Ch08_1.xhtml#Fig3).


    ![9781484207949_Fig08-03.jpg](images/9781484207949_Fig08-03.jpg)


    [Figure 8-3](#9781484207949_Ch08_1.xhtml#_Fig3). Editing SI component attributes
    via the Properties tab


    As we can see, all the possible attributes for a particular SI component are listed.
    Mandatory attributes are underlined.


    Generic Inbound Channel Adapter Example Configured with Java Annotation'
  trans: '

    以下通用通道适配器示例是本章中唯一未使用 Spring Boot 的示例，旨在突出展示如何通过纯 Spring 和 SI 框架配置 SI 应用。


    该示例展示了基于 XML 配置的通用入站和出站通道适配器。第一个类如**清单 8-11**所示，是一个我们将主动轮询的服务。


    ***清单 8-11***. 通过入站通道适配器读取消息的服务 (0803-channel-adapter-generic-xml)


    ```

    package net.lkrnac.book.eiws.chapter08.in;

    import org.springframework.stereotype.Service;


    @Service

    public class ReadService {

      public String read() {

        return "simple message";

      }

    }

    ```


    这个 Spring 服务 Bean 只有一个简单方法，返回一个简单的字符串消息。清单 8-12 展示了 SI 流程的 XML 配置。


    ***Listing 8-12***. 通用通道适配器示例的 SI 流程 XML 配置 (文件 si-config.xml 位于示例项目 0803-channel-adapter-generic-xml
    的 src/main/resources 文件夹)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

                    http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context.xsd

                    http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <context:component-scan base-package="net.lkrnac.book.eiws.chapter08" />


    <int:inbound-channel-adapter ref="readService" method="read" channel="inChannel">

        <int:poller fixed-rate="1000" max-messages-per-poll="1"/>

      </int:inbound-channel-adapter>


    <int:channel id="inChannel" />


    <int:outbound-channel-adapter channel="inChannel" ref="writeService" method="write"
    />

    </beans>

    ```


    SI 为通用 SI 组件提供了各种 XML 命名空间，并为 SI 流程要接入的特定技术提供了独立的命名空间。在此例中，我们仅使用了别名为 `int` 的通用
    SI 命名空间。除了这个 SI 命名空间，我们还使用了标准的 Spring 命名空间 `context` 以及一个用于处理 Spring Bean 的默认命名空间。


    第一个 XML 标签 `<context:component-scan>` 对基础包 `net.lkrnac.book.eiws.chapter``08`
    及其子包中的 Spring 组件执行类路径扫描。此扫描包括 `ReadService` 以及我们的公共 Bean `WriteService` 和 `WriteRepository`。


    接下来，我们可以使用 SI 标签 `<int:inbound-channel-adapter>`，它将连接到 `readService` Bean。我们还需要指定
    `method` 属性，该属性将此入站通道适配器映射到 `readService.read()`。由于 `ReadService` 是一个不发送任何消息的被动
    Bean，我们需要为此适配器配置 `<int:poller>` 子元素。通过此轮询器的属性，我们定义了 1 秒的固定速率轮询间隔，并且每次轮询只读取一条消息。在底层，SI
    在此例中使用标准的 Spring 调度器，固定速率为 1 秒。因此，每秒此通道适配器都会调用 `readService.read()`，并根据其返回值创建一条
    SI 消息。


    然后，此消息被传递给另一个 `inChannel`，该通道由必填属性 `channel` 定义。`inChannel` 也必须为 SI 流程进行配置，这是通过单独的
    XML 元素 `<int:channel>` 完成的。在 `inChannel` 的另一端，我们通过 XML 标签 `<int:outbound-channel-adapter>`
    连接出站通道适配器。此适配器映射到我们的公共 Bean `writeService` 及其 `write` 方法。


    此示例的主类如**清单 8-13**所示。


    ***Listing 8-13***. 基于 XML 配置的通用通道适配器示例的主类 (0803-channel-adapter-generic-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.context.support.GenericXmlApplicationContext;

    import org.springframework.core.io.ClassPathResource;


    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        new GenericXmlApplicationContext(new ClassPathResource("si-config.xml"));

      }

    }

    ```


    此类启动在 `si-config.xml` 中定义的 Spring 上下文。当我们作为 Java 应用程序运行此主类时，会得到如**清单 8-14**所示的输出。


    ***Listing 8-14***. XML 通用通道适配器示例的输出


    ```

    20:35:49.774 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    20:35:50.760 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    20:35:51.758 [task-scheduler-2] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    20:35:52.758 [task-scheduler-1] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    20:35:53.758 [task-scheduler-3] INFO  n.l.b.e.c.out.WriteRepository - Text persisted:
    simple

    message

    ```


    该流程在任务调度器线程中执行，而不是在主线程中。这是因为我们为入站通道适配器指定了一个轮询器，它每秒读取一条新消息并将其发送到 `writerService`。这也是为什么此
    Spring 上下文保持打开状态，并且会无限期运行，直到我们强制停止应用程序。


    我们需要牢记，此流程输入和输出的 Java POJO 类型必须匹配。在此例中，类型为 `String`，它被用作流动的 `GenericMessage<String>`
    的有效负载。同样重要的是要理解，SI 组件会将 Spring Bean 注册到 Spring 上下文中。例如，`<int:channel>` 标签创建了一个名为
    `inChannel`、类型为 `DirectChannel` 的 Spring Bean。此通道类型将在后面的“消息通道”部分进行解释。


    图 8-1 展示了此示例的另一个有趣之处。


    ![9781484207949_Fig08-01.jpg](img/9781484207949_Fig08-01.jpg)


    图 8-1. 通用通道适配器 SI 流程的可视化


    图 8-1 描绘了我们的 SI 流程。这很棒，因为它有效地展示了我们 SI 应用程序的实时图表——这是每个架构师都梦寐以求的。此可视化可以在 STS 编写器窗口的
    `si-config.xml` 文件中找到，位于底部选项卡之间。根据我的经验，很多开发人员甚至不知道这些选项卡在 Eclipse/STS 中的位置，所以让我们在图
    8-2 中直观地展示它。


    ![9781484207949_Fig08-02.jpg](img/9781484207949_Fig08-02.jpg)


    图 8-2. 集成图选项卡的位置


    但这不仅仅是可视化。我们还可以基于此集成图选项卡创建 SI 流程。如您所见，在编写器窗口的左侧是可用的 SI 组件，我们可以将它们拖入我们的流程中。当组件位于我们的图表上时，我们可以双击它，STS
    将打开属性窗口，我们可以在其中编辑此组件的属性。如图 8-3 所示。


    ![9781484207949_Fig08-03.jpg](img/9781484207949_Fig08-03.jpg)


    图 8-3. 通过属性选项卡编辑 SI 组件属性


    如我们所见，列出了特定 SI 组件的所有可能属性。必填属性带有下划线。


    使用 Java 注解配置的通用入站通道适配器示例

