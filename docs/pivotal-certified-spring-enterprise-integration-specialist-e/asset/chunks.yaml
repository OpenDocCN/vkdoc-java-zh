- fmt: "接下来我们创建`jmsTemplate`实例，它将使用`connectionFactory`bean作为构造函数参数。这演示了如何使用通过JNDI查找创建的bean。`JmsTemplate`本身的使用和特性将在后面解释。\n\
    \n在此配置文件中注册的最后一个bean是`destinationResolver`。由于我们正在对JMS资源进行JNDI查找，我们希望使用`JndiDestinationResolver`而不是`DynamicDestinationResolver`。这允许我们在发送或接收JMS消息时使用JMS目的地的字符串名称`queue/ExpiryQueue`。\n\
    \n## Spring JMS Java配置示例\n\n[清单5-18](#9781484207949_Ch05.xhtml#FPar20)展示了一个Spring\
    \ JMS应用程序的Java配置示例，其中JMS资源是显式创建的。\n\n[***清单5-18***](#9781484207949_Ch05.xhtml#_FPar20).\
    \ 显式创建JMS资源的Java配置 (0506-async-jms-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
    \nimport java.util.Hashtable;\nimport javax.jms.ConnectionFactory;\nimport javax.jms.Queue;\n\
    import javax.naming.InitialContext;\nimport javax.naming.NamingException;\nimport\
    \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.core.JmsTemplate;\n\
    \n@Configuration\n@EnableJms\npublic class JmsConfiguration {\n  @Bean\n  public\
    \ InitialContext initialContext() throws NamingException {\n    Hashtable<Object,\
    \ Object> env = new Hashtable<Object, Object>();\n    env.put(\"java.naming.factory.initial\"\
    ,\n        \"org.jnp.interfaces.NamingContextFactory\");\n    env.put(\"java.naming.factory.url.pkgs\"\
    ,\n        \"org.jboss.naming:org.jnp.interfaces\");\n    env.put(\"java.naming.provider.url\"\
    , \"jnp://localhost:1099\");\n    return new InitialContext(env);\n  }\n\n@Bean\n\
    \  public ConnectionFactory connectionFactory(InitialContext initialContext)\n\
    \      throws NamingException {\n    return (ConnectionFactory) initialContext.lookup(\"\
    /ConnectionFactory\");\n  }\n\n@Bean\n  public Queue queue(InitialContext initialContext)\
    \ throws NamingException {\n    return (Queue) initialContext.lookup(\"/queue/ExpiryQueue\"\
    );\n  }\n\n@Bean\n  public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory)\
    \ {\n    return new JmsTemplate(connectionFactory);\n  }\n}\n```\n\n`JmsConfiguration`类使用`@Configuration`注解，将其定义为Spring的配置类。`@EnableJms`注解用于启用JMS注解和一些用于异步JMS消息接收的支持bean。\n\
    \n在此配置类中注册的第一个bean是带有HornetQ访问配置的JNDI `InitialContext`实例。它将在创建JMS资源`ConnectionFactory`和`Queue`时使用。这些资源也在使用`@Bean`注解的方法中创建，以便它们被注册到上下文中。我们通过对`initialContext`实例进行JNDI查找来创建它们，因此需要显式地将它们转换为相关类型。这三个方法是`0506-async-jms-java-config`示例项目中唯一使用HornetQ特定API的地方。\n\
    \n最后，我们基于在此类中创建的注入的`connectionFactory`，创建并注册一个`JmsTemplate`实例。`JmsTemplate`可用于发送和同步接收JMS消息。\n\
    \n[清单5-19](#9781484207949_Ch05.xhtml#FPar21)展示了一个Spring Boot配置示例。\n\n[***清单5-19***](#9781484207949_Ch05.xhtml#_FPar21).\
    \ 使用Spring Boot配置JMS的示例 (0507-sync-jms-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
    \nimport org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.scheduling.annotation.EnableScheduling;\n\n@EnableScheduling\n\
    @SpringBootApplication\npublic class JavaConfigJmsSyncApplication {\n  public\
    \ static void main(String[] args) throws InterruptedException {\n    SpringApplication.run(JavaConfigJmsSyncApplication.class,\
    \ args);\n  }\n}\n```\n\n您可能会注意到，此示例中没有`org.springframework.jms`包的踪迹。Spring Boot足够智能，能够识别出类路径上有Spring\
    \ JMS依赖项，因此会自动创建所有JMS资源。它使用固执己见的默认配置进行创建。如果在类路径上找到HornetQ客户端依赖项，它会开箱即用地创建一个`ConnectionFactory`。如果我们通过`String`名称而不是`Destination`接口的实例来使用目的地，`DynamicDestinationResolver`会为我们创建它们。这种Spring\
    \ Boot方法显著减少了创建现代企业级服务所需的配置量。\n\n`@EnableScheduling`注解的使用是因为该示例使用Spring Scheduling支持来发送消息。这将在后面的示例中展示。\n\
    \n## 缓存JMS资源\n\n如前所述，正常的JMS流程是按以下顺序创建JMS资源：`ConnectionFactory` -> `Connection`\
    \ -> `Session` -> `MessageProducer`/`MessageConsumer`/`Message`。JMS 2.0通过使用`JMSContext`、`JMSConsumer`和`JMSProducer`提供了更多便利。但在底层，它们仍然使用较旧的JMS\
    \ 1.1抽象。此外，Spring也有自己的JMS API，因此在Spring代码中完全不使用这些JMS 2.0的便利抽象。因此，当我们考虑缓存JMS资源时，这完全是关于JMS\
    \ 1.1抽象。\n\n如果这个链中的实例在我们的应用程序中被重用，那么一切都会很好。但是，如果我们每次想要发送或接收消息时都创建所有这些对象，应用程序的性能将会受到影响。`Connection`和`Session`的创建尤其耗时。\n\
    \n因此，Spring提供了两个`ConnectionFactory`的实现，可以帮助缓存这些资源：\n\n*   `SingleConnectionFactory`：对于每次调用，`ConnectionFactory.createConnection()`返回相同的`Connection`实例，并忽略`ConnectionFactory.close()`调用。\n\
    *   `CachingConnectionFactory`：在`SingleConnectionFactory`功能的基础上构建，并增加了对`Session`、`MessageProducer`和`MessageConsumer`实例的缓存。`sessionCacheSize`属性用于更改缓存大小，默认为1。`MessageConsumer`和`MessageProducer`实例在`Session`实例内被缓存。\n\
    \n这两种实现都用作JMS提供者特定连接工厂的包装器。此类配置的示例见[清单5-20](#9781484207949_Ch05.xhtml#FPar23)。\n\
