    In a before interception, we get an instance of the item before processing via
    the parameter. In an after process interception, SB injects an instance of the
    processed/converted item and the result of the processing operation. In an after
    process error interce ption method, we get the item and exception, which occurred
    during its processing. Obviously, we can’t pick the names of methods, as we aren’t
    using annotations. [Listing 9-82](#9781484207949_Ch09_2_Ext.xhtml#FPar86) shows
    the interceptor for the item writer.


