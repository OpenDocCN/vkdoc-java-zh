- fmt: "[Figure 7-3](#9781484207949_Ch07.xhtml#_Fig3). Sequence diagram JTA transaction\
    \ example (file `sequence.uml` in folder `uml-diagrams` of example project `0701-jta-xml-config`)\n\
    \n*Notice that this sequence diagram covers processing of a single message.* After\
    \ reception of the message, it is inserted into `TEXT_TABLE`. But after the exception\
    \ being raised in the `postprocess()` method of the JMS listener for the first\
    \ received message, the global transaction manager will send a rollback order\
    \ to the H2 database and to the JMS queue `ExpiryQueue`. *This is different from\
    \ the same implementation in Listener*[6-28](#9781484207949_Ch06.xhtml#FPar30),\
    \ *where the H2 database committed the local transaction*.\n\nAfter the rollback\
    \ is sent to the JMS queue, the message is sent for a second round of processing.\
    \ Again, the global transaction is started and the message is inserted into `TEXT_TABLE`.\
    \ But on second reception, `postprocess()` doesn’t throw an exception, and our\
    \ global transaction ends successfully, sending a commit to both data sources.\
    \ Happy global ACID days. We can sleep well when our performance characteristics\
    \ for our application using JTA are acceptable.\n\nBut notice that we are using\
    \ a point-to-point messaging paradigm here. Dealing with JMS topics, where we\
    \ would have various consumers, would involve an even more careful (and resource-intensive)\
    \ approach to handle JTA transactions across each of them.\n\n## Spring JTA Example\
    \ with Java Configuration\n\nEvery responsible Spring developer has noticed movement\
    \ from XML to Java configuration. Therefore, this section covers how Spring JTA\
    \ support can be configured without XML. [Listing 7-10](#9781484207949_Ch07.xhtml#FPar11)\
    \ shows a JTA configuration.\n\n[***Listing 7-10***](#9781484207949_Ch07.xhtml#_FPar11).\
    \ Java JTA Configuration (`0702-jta-java-config`)\n\n```\npackage net.lkrnac.book.eiws.chapter07;\n\
    \nimport org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
    import org.springframework.transaction.jta.JtaTransactionManager;\nimport com.atomikos.icatch.jta.UserTransactionImp;\n\
    import com.atomikos.icatch.jta.UserTransactionManager;\n\n@Configuration\n@EnableTransactionManagement\n\
    public class JtaConfiguration {\n  @Bean(initMethod = \"init\", destroyMethod\
    \ = \"close\")\n  public UserTransactionManager atomikosTransactionManager() {\n\
    \    return new UserTransactionManager();\n  }\n\n@Bean\n  public JtaTransactionManager\
    \ transactionManager(\n      UserTransactionManager atomikosTransactionManager)\
    \ {\n    JtaTransactionManager transactionManager = new JtaTransactionManager();\n\
    \    transactionManager.setTransactionManager(atomikosTransactionManager);\n \
    \   transactionManager.setUserTransaction(new UserTransactionImp());\n    return\
    \ transactionManager;\n  }\n}\n```\n\nThis configuration class enables Spring\
    \ transactional support via the `@EnableTransactionManagement` annotation. As\
    \ with XML configuration, we need to register the `com.atomikos.icatch.jta.UserTransactionManager`\
    \ bean as an implementation of global transactional manager. We use the `initMethod`\
    \ and `destroyMethod` attributes of this `@Bean` annotation to tell Spring how\
    \ to instantiate and destroy this bean.\n\nThe second bean wraps the Atomikos\
    \ transaction manager into `JtaTransactionManager`, which is an implementation\
    \ of `PlatformTransactionManager`, and enables Spring transactional support for\
    \ this application. Again we need to configure the `userTransaction` property\
