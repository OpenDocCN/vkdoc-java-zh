    In this case, we used the `spring-config.xml` file as a Spring configuration from
    the example project `0205-http-invoker-handler-servlet-xml-config`. But all other
    aspects of XML configuration follow the same concepts as in `WebApplicationInitializer`.
    Consistency of APIs across various technologies and configuration types is the
    beauty of Spring.


    `HttpRequestHandlerServlet` is a lightweight alternative to `DispatcherServlet`,
    the backbone of the Spring MVC framework. So it is handy if we need to avoid the
    Spring MVC framework. But if your application already uses `DispatcherServlet`
    or you want to avoid unnecessary boilerplate configuration, the following approach
    is the way to go.


    HttpInvoker Served via DispatcherServlet


    `DispatcherServlet` is the central class of Spring’s web support. It is extensively
    used by Spring MVC for building web applications and REST APIs. Its job is to
    route HTTP messages to controllers based on declarative URL mappings and map responses
    onto the appropriate views.


    With `DispatcherServlet`, you can map the `HttpInvokerServiceExporter` bean directly
    to a URL. This is done by starting the bean name with a slash character, as shown
    in [Listing 2-19](#9781484207949_Ch02.xhtml#FPar21).


