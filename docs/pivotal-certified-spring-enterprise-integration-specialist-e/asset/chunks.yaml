  trans: "\n软件开发世界如同时尚行业：也有潮流。当人们意识到分布式系统将驱动现代网站，而远程过程调用的缺陷会将这些技术推向极限时，软件开发的焦点便转向了解耦。\n\
    \nWeb 服务通过面向服务的架构（SOA）高度互联，其中各种功能被拆分为独立的服务应用程序，彼此之间进行通信。这些服务由面向客户端的应用程序或其他服务消费。这种架构实现了关注点分离和低耦合。另一方面，它也带来了更高的复杂性，因为需要在\
    \ Web 服务的消费者和提供者之间定义一份明确的契约。当契约的所有方面都预先定义好后，服务和应用程序就可以独立地进行开发、测试和部署。\n\n也可以考虑\
    \ RPC 方法，但远程技术的紧耦合对 SOA 来说是一个大问题，尤其是当 Web 服务的消费者由不同的团队、部门或公司开发时。因此，通信需要通过一种有助于将客户端与\
    \ Web 服务解耦的协议进行。\n\nWeb 服务的一个重要需求是能够处理同一服务 API 的不同版本。这对 RPC 技术来说是致命的。想象一个应用程序的公开\
    \ API 以及消费它的各种客户端。当 API 需要实现变更或新功能时，并非所有客户端都愿意更新——因为这会给它们带来额外成本。我们最终可能会得到两组使用不同契约的客户端。因此，需要一种协议来处理版本控制。\n\
    \n这种协议就是 SOAP（最初称为简单对象访问协议），它使用 XML 作为其交换格式。SOAP 与传输协议无关，因此我们可以使用 HTTP、简单邮件传输协议（SMTP）、传输控制协议（TCP）、用户数据报协议（UDP）、Java\
    \ 消息服务（JMS）或可扩展消息与存在协议（XMPP）作为传输协议。这种可变性不会束缚底层网络架构。XML 负载格式灵活、平台无关且被广泛采用。所有主流平台，如\
    \ Java、.NET、C++、Ruby、PHP、Python 和 Perl 都支持它。因此，它是满足 SOA 需求的交换格式的理想选择。\n\n当客户端在运行时发现\
    \ Web 服务的能力和负载结构时，就实现了客户端与 Web 服务的最高程度解耦。XML 模式定义（XSD）和 Web 服务描述语言（WSDL）可用于此目的。XSD\
    \ 定义了 Web 服务提供或消费的 XML 负载的结构、复杂类型以及某些数据元素的验证规则。因此，我们可以将其视为 Web 服务负载的元数据。Web 服务可以针对\
    \ XSD 验证接收到的负载。WSDL 是基于 XML 的对 Web 服务所提供功能的描述。它汇集了服务名称、提供的服务方法以及服务方法的签名（参数类型和返回值类型）。\n\
    \n有了这个概念，客户端无需预先了解 Web 服务的任何信息。XML 负载可以基于 XSD 和 WSDL 文件动态构建。但这种方法也有缺点。基于 XSD 和\
    \ WSDL 文件构建 XML 请求并非易事。有了这样的元数据规则，Web 服务的实现也更加复杂。而且，当负载始终动态生成时，会带来性能损失。当然，我们可以省略\
    \ Web 服务的元数据契约，将客户端绑定到静态的负载结构。但对于这种情况，存在更简洁的交换格式（例如，JavaScript 对象表示法，即 JSON）。XML\
    \ 格式的冗长性是 SOAP 批评者指出的问题之一。\n\n那么，让我们总结一下 SOAP 与远程（RPC）技术相比最重要的优势：\n\n*   *解耦*：面向文档的通信支持版本控制和可发现性。\n\
    *   *互操作性*：可以轻松连接各种平台，并在多种传输协议之上运行。\n\n其缺点包括：\n\n*   *复杂性*：SOAP 实现起来要复杂得多，因为它需要了解\
    \ XSD、WSDL、XML 编组以及编组框架。\n*   *性能*：XML 的冗长性以及针对模式进行编组和验证的需求使其性能较差。\n\nJava Web\
    \ 服务\n\nJava 并非唯一在 SOAP 协议之上运行的平台。.NET 也是该领域的重要参与者。但 Java EE 无疑是 SOAP Web 服务概念的最大采用者。Java\
    \ 生态系统中已经发展出许多库来帮助进行 Web 服务开发。由于 SOAP 依赖于 XML，因此用于编组到 XML 和从 XML 解组的库对于 SOAP 通信至关重要。\n\
    \n让我们看看主要编程语言平台的 XML 库，从 Java 开始。这些库根据其处理 XML 的不同方法进行分类：\n\n*   *Java*\n    *\
    \   事件驱动方法——应用程序监听特定 XML 元素的事件：用于 XML 的简单 API（SAX）\n    *   基于 DOM 的方法——应用程序加载整个\
    \ XML 并将其解析为树结构：JDOM、XOM、dom4j、TrAX\n    *   用于 XML 的流式 API（StAX）：引入了 XML 文档中游标的概念，用于向前和向后读取\n\
    \    *   XML 到 Java 对象的绑定：用于 XML 绑定的 Java 架构（JAXB）、Castor XML、XMLBeans、XStream、JiBX\n\
    \    *   *.NET*：XmlSerializer、System.Xml、.NET XML 解析器\n    *   *Python*：ElementTree、BeautifulSoup、MiniDom/PullDom\n\
    \    *   *Ruby*：Builder、Nokogiri、REXML、XmlSimple\n    *   *Perl*：Perl XML、XML::Simple\n\
    \    *   *JavaScript*：LibXmlJs\n\n从这个列表中可以看出，实现基于 XML 的 Web 服务存在许多可能性。现在让我们只关注\
    \ Java Web 服务。我们一方面有 XML 消息，另一方面有 Java 对象。完成 XML 转换的最简单方法是直接绑定到 Java 对象。但这种方法并非在所有情况下都适用。例如，如果我们有一个非常大的\
    \ XML 消息，无法加载到内存中，我们需要使用更底层的 XML 处理库来处理它。\n\n但对于 SOAP 实现，绑定库是最合适的。SOAP 中的大消息可能表明通信设计存在问题。这就是为什么如今大多数\
    \ Java Web 服务都使用对象到 XML（OXM）绑定库来实现。JAXB 是主要的 Java OXM 参与者，因为它是 Java EE 标准的一部分。JAXB\
    \ 技术也适用于 SOAP 之外，因为它可以处理 JSON 格式。\n\n正如我们所描述的，XML 编组和解组发生在 SOAP 通信中。SOAP 消息具有指定的高级结构，并且需要符合正式的契约（XSD/WSDL）。\n\
    \n用于交换数据的 SOAP 消息的强制性高级结构如下：\n"
- fmt: "# Web Services Contract Development\n\n## Envelope Structure\n\n- **Envelope**:\
    \ The root element of a SOAP message\n- **Header**: May contain metadata—for example,\
    \ the data necessary for securing, routing, or business logic metadata\n- **Body**:\
    \ Contains the message itself, and may contain the target domain where the web\
    \ service is located\n\n## Contract Approaches\n\nA contract defines the exact\
    \ format for interchanged XML messages. But how do we start developing such a\
    \ web service? When we have Java objects on one side and XML messages on the other\
    \ side, one side needs to conform to the other side via conversion. We have two\
    \ possibilities to start developing a web service:\n\n- **Contract Last**: Specify\
    \ Java classes first and create a WSDL contract based on the Java classes' structure.\n\
    - **Contract First**: Create a WSDL contract up front and force the Java classes\
    \ to conform to that contract.\n\nYou may expect us now to highlight the advantages\
    \ and disadvantages of each approach—especially when both approaches nowadays\
    \ have automatic conversion libraries. But SOA experiences show that the Contract\
    \ Last approach can lead to various problems:\n\n### Problems with Contract Last\n\
    \n- **Performance**: Java object graphs can easily become very big. It is not\
    \ suitable for a communication protocol to send huge XML messages that would be\
    \ generated by big Java object graphs.\n- **Type duplication**: Careful definition\
    \ of XSD allows for reusability of XSD types. This is not possible when a contract\
    \ is generated from Java.\n- **Contract changes**:\n  - The basic idea of decoupling\
    \ is based on protecting the client from server changes. If XSD and WSDL are automatically\
    \ generated from Java interfaces, the XML contract can be a target of frequent\
    \ changes by the XSD/WSDL generation algorithm.\n  - When a contract is changed\
    \ with the Contract Last approach, we can't support two versions of the contract.\
    \ If we use the Contract First approach, we could handle changes between versions\
    \ of the contract by XSLT transformations. When messages are converted by XSLT\
    \ transformation, the same Java class representation can be used. So we can support\
    \ various versions of the contract at the same time with Contract First.\n- **Java\
    \ to XML type conversion problems**:\n  - It is easy to represent cyclic graphs\
    \ in Java. But such a representation in XML is not trivial.\n  - XSD restrictions\
    \ are a useful mechanism for restricting a group of possible data values (for\
    \ example, regular expressions for strings). But the Java language doesn't contain\
    \ such validation mechanisms out of the box.\n  - Some Java types have special\
    \ constraints or semantics. These can be interpreted in XML, but this representation\
    \ can be ambiguous. `ArrayList` can be represented on the client as `LinkedList`.\
    \ The picture can become even more complicated when communication occurs between\
    \ two programming languages.\n\nIn light of these arguments, Contract First is\
    \ considered best practice. The Contract Last development style is considered\
    \ easier, but Spring, in conjunction with existing XML libraries and tooling,\
    \ makes the Contract First approach easy as well.\n\n## Spring Web Services\n\n\
    Spring supports web services development in two ways:\n\n- **Support for JAX-WS\
    \ (formerly JAX-RPC)**: JAX-WS is the Java EE standard for developing Contract\
    \ First and Contract Last web services. It is part of Core Spring framework.\n\
    - **Spring Web Services project**: Support for Contract First web services.\n\n\
    > **Note**: JAX-WS is beyond the scope of Enterprise Integration with Spring certification\
    \ and thus also beyond the scope of this book.\n\nThe Spring Web Services project\
    \ is by far the preferred way of implementing a web service. It is a stand-alone\
    \ project within the Spring platform. As always, Spring Web Services doesn't try\
    \ to reinvent the wheel, but rather takes advantage of existing technologies to\
    \ provide convenient abstractions and features. Let's summarize some of these\
    \ features:\n\n- **Powerful routing of messages**: We can map XML messages to\
    \ endpoints via the payload root XML element, Web Services Addressing (WS-Addressing),\
    \ or `SOAPAction` headers.\n- **Wide support for XML converters**: Supports DOM,\
    \ SAX, StAX, JDOM, dom4j, XOM, and OXM technologies (for example, JAXB 2, Castor\
    \ XML, XMLBeans, XStream, JiBX).\n- **Integration with Spring Framework family**:\
    \ Developers use the same Inversion of Control (IoC) concepts as with all other\
    \ Spring modules.\n- **Support for WS-Security**: Encryption, decryption of SOAP\
    \ messages, and authentication for web service access are invaluable mechanisms\
    \ for security.\n\n> **Note**: Support for WS-Security was removed from Enterprise\
    \ Integration with Spring certification and therefore is beyond the scope of this\
    \ book.\n\n## Contract Creation\n\nSpring Web Services provides an excellent foundation\
    \ for creating web services, because it facilitates only the Contract First approach.\
    \ These well-defined steps indicate how to define a Spring Web Services contract:\n\
    \n1. Create a sample message payload.\n2. Generate an XSD schema based on the\
    \ sample message.\n3. Enhance the generated XSD if needed:\n   - Amend for the\
    \ desired contract structure.\n   - Change XSD types for elements.\n   - Extract\
    \ reusable XSD types.\n   - Define XSD restrictions for elements.\n4. Spring can\
    \ dynamically generate WSDL based on XSD.\n\nThe first three steps are optional.\
    \ A web service developer experienced with XSD may want to define a contract directly.\
    \ But the simplest way is to generate it from sample messages. There is also a\
    \ good chance that business experts will be able to provide sample messages with\
    \ the desired XML structure.\n\nLet's explain these steps with a simple example.\
    \ Our example service will provide user details based on a requested e-mail address.\
    \ This simple domain will be used across all web services examples. The request\
    \ sample message looks like [Listing 3-1](#9781484207949_Ch03.xhtml#FPar4).\n\n\
    > **Note**: Source-code files explaining the creation of XSD contracts are stored\
    \ in the example project `0301-ws-xmlconfig-service` in the directory `src/main/resources`.\n\
    \n### Listing 3-1. Sample Request\n\n```xml\n<UserRequest>\n  <Email>lubos.krnac@gmail.com</Email>\n\
    </UserRequest>\n```\n\nBased on this request, the service should provide user\
    \ details. The sample payload for the user details response is highlighted in\
    \ [Listing 3-2](#9781484207949_Ch03.xhtml#FPar5).\n\n### Listing 3-2. Sample Response\n\
    \n```xml\n<UserDetailsResponse>\n  <FirstName>Lubos</FirstName>\n  <LastName>Krnac</LastName>\n\
    </UserDetailsResponse>\n```\n\nWhen we have the request and response messages\
    \ specified, we can generate the XSD contract draft. We have various options.\
    \ Because this generation is a one-time step, there is no point in automating\
    \ it into a continuous integration pipeline. So you can use any tool of your choice.\
    \ Various types of tools with different levels of complexity and user interaction\
    \ approaches are available. Some examples include the following:\n\n- **XMLSpy**:\
    \ A comprehensive commercial XML IDE, useful for complicated XML modeling\n- **Trang**:\
    \ A simple command-line JAR utility\n- **DevUtilsOnline free XML-to-XSD generator**:\
    \ A free online generator (`http://devutilsonline.com/xsd-xml/generate-xsd-from-xml`)\n\
    \nLet's use the third option, because it doesn't require any installation nor\
    \ downloads. This tool provides various design styles for a generated XSD structure.\
    \ As we don't need reusable types, we can choose *Russian Doll Design*. [Listing\
    \ 3-3](#9781484207949_Ch03.xhtml#FPar7) was generated for the sample request,\
    \ and [Listing 3-4](#9781484207949_Ch03.xhtml#FPar8) for the sample response."
  raw: "*   Envelope\n*   Header: May contain metadata—for example, the data necessary\
    \ for securing, routing, or business logic metadata\n*   Body: Contains the message\
    \ itself, and may contain the target domain where the web service is located\n\
    \nA contract defines the exact format for interchanged XML messages. But how do\
    \ we start developing such a web service? When we have Java objects on one side\
    \ and XML messages on the other side, one side needs to conform to the other side\
    \ via conversion. We have two possibilities to start developing a web service:\n\
    \n*   *Contract* *Last* : Specify Java classes first and create a WSDL contract\
    \ based on the Java classes’ structure.\n*   *Contract* *First* : Create a WSDL\
    \ contract up front and force the Java classes to conform to that contract.\n\n\
    You may expect us now to highlight the advantages and disadvantages of each approach—especially\
    \ when both approaches nowadays have automatic conversion libraries. But SOA experiences\
    \ show that the Contract Last approach can lead to various problems:\n\n*   *Performance*:\
    \ Java object graphs can easily become very big. It is not suitable for a communication\
    \ protocol to send huge XML messages that would be generated by big Java object\
    \ graphs.\n*   *Type duplication*: Careful definition of XSD allows for reusability\
    \ of XSD types. This is not possible when a contract is generated from Java.\n\
    *   *Contract changes*:\n    *   The basic idea of decoupling is based on protecting\
    \ the client from server changes. If XSD and WSDL are automatically generated\
    \ from Java interfaces, the XML contract can be a target of frequent changes by\
    \ the XSD/WSDL generation algorithm.\n    *   When a contract is changed with\
    \ the Contract Last approach, we can’t support two versions of the contract. If\
    \ we use the Contract First approach, we could handle changes between versions\
    \ of the contract by XSLT transformations. When messages are converted by XSLT\
    \ transformation, the same Java class representation can be used. So we can support\
    \ various versions of the contract at the same time with Contract First.\n*  \
    \ *Java to XML type conversion problems*:\n    *   It is easy to represent cyclic\
    \ graphs in Java. But such a representation in XML is not trivial.\n    *   XSD\
    \ restrictions are a useful mechanism for restricting a group of possible data\
    \ values (for example, regular expressions for strings). But the Java language\
    \ doesn’t contain such validation mechanisms out of the box.\n    *   Some Java\
    \ types have special constraints or semantics. These can be interpreted in XML,\
    \ but this representation can be ambiguous. `ArrayList` can be represented on\
    \ the client as `LinkedList`. The picture can become even more complicated when\
    \ communication occurs between two programming languages.\n\nIn light of these\
    \ arguments, Contract First is considered best practice. The Contract Last development\
    \ style is considered easier, but Spring, in conjunction with existing XML libraries\
    \ and tooling, makes the Contract First approach easy as well.\n\nSpring Web Services\n\
    \nSpring supports web services development in two ways:\n\n*   *Support for JAX-WS\
    \ (formerly JAX-RPC)*: JAX-WS is the Java EE standard for developing Contract\
    \ First and Contract Last web services. It is part of Core Spring framework.\n\
    *   *Spring Web Services project*: Support for Contract First web services.\n\n\
    ![Image](images/sq.jpg) **Note**  JAX-WS is beyond the scope of Enterprise Integration\
    \ with Spring certification and thus also beyond the scope of this book.\n\nThe\
    \ Spring Web Services project is by far the preferred way of implementing a web\
    \ service. It is a stand-alone project within the Spring platform. As always,\
    \ Spring Web Services doesn’t try to reinvent the wheel, but rather takes advantage\
    \ of existing technologies to provide convenient abstractions and features. Let’s\
    \ summarize some of these features:\n\n*   *Powerful routing of messages*: We\
    \ can map XML messages to endpoints via the payload root XML element, Web Services\
    \ Addressing (WS-Addressing), or `SOAPAction` headers.\n*   *Wide support for\
    \ XML converters*: Supports DOM, SAX, StAX, JDOM, dom4j, XOM, and OXM technologies\
    \ (for example, JAXB 2, Castor XML, XMLBeans, XStream, JiBX).\n*   *Integration\
    \ with Spring Framework family*: Developers use the same Inversion of Control\
    \ (IoC) concepts as with all other Spring modules.\n*   *Support for WS-Security*:\
    \ Encryption, decryption of SOAP messages, and authentication for web service\
    \ access are invaluable mechanisms for security.\n\n![Image](images/sq.jpg) **Note**  Support\
    \ for WS-Security was removed from Enterprise Integration with Spring certification\
    \ and therefore is beyond the scope of this book.\n\nContract Creation\n\nSpring\
    \ Web Services provides an excellent foundation for creating web services, because\
    \ it facilitates only the Contract First approach. These well-defined steps indicate\
    \ how to define a Spring Web Services contract:\n\n1.  Create a sample message\
    \ payload.\n2.  Generate an XSD schema based on the sample message.\n3.  Enhance\
    \ the generated XSD if needed:\n    *   Amend for the desired contract structure.\n\
    \    *   Change XSD types for elements.\n    *   Extract reusable XSD types.\n\
    \    *   Define XSD restrictions for elements.\n4.  Spring can dynamically generate\
    \ WSDL based on XSD.\n\nThe first three steps are optional. A web service developer\
    \ experienced with XSD may want to define a contract directly. But the simplest\
    \ way is to generate it from sample messages. There is also a good chance that\
    \ business experts will be able to provide sample messages with the desired XML\
    \ structure.\n\nLet’s explain these steps with a simple example. Our example service\
    \ will provide user details based on a requested e-mail address. This simple domain\
    \ will be used across all web services examples. The request sample message looks\
    \ like [Listing 3-1](#9781484207949_Ch03.xhtml#FPar4).\n\n![Image](images/sq.jpg) **Note**  Source-code\
    \ files explaining the creation of XSD contracts are stored in the example project\
    \ `0301-ws-xmlconfig-service` in the directory `src/main/resources`.\n\n[***Listing\
    \ 3-1***](#9781484207949_Ch03.xhtml#_FPar4). Sample Request\n\n```\n<UserRequest>\n\
      <Email>lubos.krnac@gmail.com</Email>\n</UserRequest>\n```\n\nBased on this request,\
    \ the service should provide user details. The sample payload for the user details\
    \ response is highlighted in [Listing 3-2](#9781484207949_Ch03.xhtml#FPar5).\n\
    \n[***Listing 3-2***](#9781484207949_Ch03.xhtml#_FPar5). Sample Response\n\n```\n\
    <UserDetailsResponse>\n  <FirstName>Lubos</FirstName>\n  <LastName>Krnac</LastName>\n\
    </UserDetailsResponse>\n```\n\nWhen we have the request and response messages\
    \ specified, we can generate the XSD contract draft. We have various options.\
    \ Because this generation is a one-time step, there is no point in automating\
    \ it into a continuous integration pipeline. So you can use any tool of your choice.\
    \ Various types of tools with different levels of complexity and user interaction\
    \ approaches are available. Some examples include the following:\n\n*   *XMLSpy*:\
    \ A comprehensive commercial XML IDE, useful for complicated XML modeling\n* \
    \  *Trang*: A simple command-line JAR utility\n*   *DevUtilsOnline free XML-to-XSD\
    \ generator*: A free online generator (`http://devutilsonline.com/xsd-xml/generate-xsd-from-xml`)\n\
    \nLet’s use the third option, because it doesn’t require any installation nor\
    \ downloads. This tool provides various design styles for a generated XSD structure.\
    \ As we don’t need reusable types, we can choose *Russian Doll Design.* [Listing\
    \ 3-3](#9781484207949_Ch03.xhtml#FPar7) was generated for the sample request,\
    \ and [Listing 3-4](#9781484207949_Ch03.xhtml#FPar8) for the sample response."
  trans: "\n*   信封\n*   头部：可能包含元数据——例如，用于安全、路由或业务逻辑的元数据\n*   正文：包含消息本身，并可能包含 Web 服务所在的目标域\n\
    \n契约定义了交换的 XML 消息的确切格式。但我们如何开始开发这样一个 Web 服务呢？当一端是 Java 对象，另一端是 XML 消息时，一端需要通过转换来符合另一端。我们有两种开始开发\
    \ Web 服务的方式：\n\n*   **契约后置**：先指定 Java 类，然后基于 Java 类的结构创建 WSDL 契约。\n*   **契约优先**：先创建\
    \ WSDL 契约，然后强制 Java 类符合该契约。\n\n您可能期望我们现在来强调每种方法的优缺点——尤其是当这两种方法如今都有自动转换库的情况下。但\
    \ SOA 经验表明，契约后置方法可能导致各种问题：\n\n*   **性能**：Java 对象图很容易变得非常庞大。使用通信协议发送由大型 Java 对象图生成的海量\
    \ XML 消息并不合适。\n*   **类型重复**：精心定义的 XSD 允许重用 XSD 类型。当契约从 Java 生成时，这是不可能的。\n*   **契约变更**：\n\
    \    *   解耦的基本思想基于保护客户端免受服务器变更的影响。如果 XSD 和 WSDL 是从 Java 接口自动生成的，那么 XML 契约可能会因\
    \ XSD/WSDL 生成算法而频繁变更。\n    *   当使用契约后置方法变更契约时，我们无法支持两个版本的契约。如果我们使用契约优先方法，我们可以通过\
    \ XSLT 转换来处理契约版本间的变更。当消息通过 XSLT 转换时，可以使用相同的 Java 类表示。因此，使用契约优先方法，我们可以同时支持多个版本的契约。\n\
    *   **Java 到 XML 类型转换问题**：\n    *   在 Java 中表示循环图很容易。但在 XML 中进行这样的表示并非易事。\n  \
    \  *   XSD 约束是限制一组可能数据值（例如，字符串的正则表达式）的有用机制。但 Java 语言本身并不包含此类验证机制。\n    *   某些\
    \ Java 类型具有特殊的约束或语义。这些可以在 XML 中解释，但这种表示可能产生歧义。`ArrayList` 在客户端可能被表示为 `LinkedList`。当两种编程语言之间进行通信时，情况可能会变得更加复杂。\n\
    \n鉴于这些论点，契约优先被认为是最佳实践。契约后置开发风格被认为更简单，但 Spring 结合现有的 XML 库和工具，也使得契约优先方法变得容易。\n\n\
    Spring Web 服务\n\nSpring 以两种方式支持 Web 服务开发：\n\n*   **支持 JAX-WS（原 JAX-RPC）**：JAX-WS\
    \ 是用于开发契约优先和契约后置 Web 服务的 Java EE 标准。它是 Core Spring 框架的一部分。\n*   **Spring Web 服务项目**：支持契约优先的\
    \ Web 服务。\n\n![Image](img/sq.jpg) **注意** JAX-WS 超出了 Spring 企业集成认证的范围，因此也超出了本书的范围。\n\
    \nSpring Web 服务项目是目前实现 Web 服务的首选方式。它是 Spring 平台内的一个独立项目。一如既往，Spring Web 服务并非试图重新发明轮子，而是利用现有技术提供便捷的抽象和功能。让我们总结其中一些功能：\n\
    \n*   **强大的消息路由**：我们可以通过负载根 XML 元素、Web 服务寻址（WS-Addressing）或 `SOAPAction` 头部将 XML\
    \ 消息映射到端点。\n*   **广泛支持 XML 转换器**：支持 DOM、SAX、StAX、JDOM、dom4j、XOM 和 OXM 技术（例如，JAXB\
    \ 2、Castor XML、XMLBeans、XStream、JiBX）。\n*   **与 Spring 框架家族集成**：开发人员使用与所有其他 Spring\
    \ 模块相同的控制反转（IoC）概念。\n*   **支持 WS-Security**：SOAP 消息的加密、解密以及 Web 服务访问的身份验证是安全方面不可或缺的机制。\n\
    \n![Image](img/sq.jpg) **注意** 对 WS-Security 的支持已从 Spring 企业集成认证中移除，因此超出了本书的范围。\n\
    \n契约创建\n\nSpring Web 服务为创建 Web 服务提供了极好的基础，因为它仅促进契约优先方法。以下明确定义的步骤说明了如何定义 Spring\
    \ Web 服务契约：\n\n1.  创建一个示例消息负载。\n2.  基于示例消息生成 XSD 模式。\n3.  如果需要，增强生成的 XSD：\n  \
    \  *   修改以符合所需的契约结构。\n    *   更改元素的 XSD 类型。\n    *   提取可重用的 XSD 类型。\n    *   为元素定义\
    \ XSD 约束。\n4.  Spring 可以基于 XSD 动态生成 WSDL。\n\n前三个步骤是可选的。经验丰富的 XSD Web 服务开发者可能希望直接定义契约。但最简单的方法是从示例消息生成。业务专家也很有可能能够提供具有所需\
    \ XML 结构的示例消息。\n\n让我们用一个简单的例子来解释这些步骤。我们的示例服务将根据请求的电子邮件地址提供用户详细信息。这个简单的域将用于所有 Web\
    \ 服务示例。请求示例消息如 清单 3-1 所示。\n\n![Image](img/sq.jpg) **注意** 解释 XSD 契约创建的源代码文件存储在示例项目\
    \ `0301-ws-xmlconfig-service` 的 `src/main/resources` 目录中。\n\n***清单 3-1***. 示例请求\n\
    \n```\n<UserRequest>\n  <Email>lubos.krnac@gmail.com</Email>\n</UserRequest>\n\
    ```\n\n基于此请求，服务应提供用户详细信息。用户详细信息响应的示例负载在 清单 3-2 中突出显示。\n\n***清单 3-2***. 示例响应\n\n\
    ```\n<UserDetailsResponse>\n  <FirstName>Lubos</FirstName>\n  <LastName>Krnac</LastName>\n\
    </UserDetailsResponse>\n```\n\n当我们指定了请求和响应消息后，就可以生成 XSD 契约草案。我们有多种选择。由于此生成是一次性步骤，因此没有必要将其自动化到持续集成管道中。因此，您可以使用任何您选择的工具。有各种类型、不同复杂程度和用户交互方式的工具可用。一些示例如下：\n\
    \n*   **XMLSpy**：一个全面的商业 XML IDE，适用于复杂的 XML 建模\n*   **Trang**：一个简单的命令行 JAR 工具\n\
    *   **DevUtilsOnline 免费 XML 到 XSD 生成器**：一个免费的在线生成器（`http://devutilsonline.com/xsd-xml/generate-xsd-from-xml`）\n\
    \n让我们使用第三个选项，因为它不需要任何安装或下载。该工具为生成的 XSD 结构提供了多种设计风格。由于我们不需要可重用的类型，我们可以选择**俄罗斯套娃设计**。清单\
    \ 3-3 是为示例请求生成的，清单 3-4 是为示例响应生成的。\n"
- fmt: "![Image](images/sq.jpg) **Note** XSD and WSDL languages are used extensively\
    \ in web services development, and are the topic of other books. Enterprise Integration\
    \ with Spring Certification focuses on Spring-related abstractions and workflows.\
    \ It doesn’t dive deep into schema definitions nor web service descriptions. Therefore,\
    \ detailed XSD and WSDL are beyond the scope of this book.\n\n[***Listing 3-3***](#9781484207949_Ch03.xhtml#_FPar7).\
    \ Generated XSD from Sample Request\n\n```\n<?xml version=\"1.0\"?>\n<xs:schema\
    \ xmlns:xs=\"http://www.w3.org/2001/XMLSchema\" attributeFormDefault=\"unqualified\"\
    \ elementFormDefault=\"qualified\">\n  <xs:element name=\"UserRequest\">\n    <xs:complexType>\n\
          <xs:sequence>\n        <xs:element type=\"xs:string\" name=\"Email\"/>\n\
          </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n</xs:schema>\n```\n\
    \n[***Listing 3-4***](#9781484207949_Ch03.xhtml#_FPar8). Generated XSD from Sample\
    \ Response\n\n```\n<?xml version=\"1.0\"?>\n<xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\
    \ attributeFormDefault=\"unqualified\" elementFormDefault=\"qualified\">\n  <xs:element\
    \ name=\"UserDetailsResponse\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element\
    \ type=\"xs:string\" name=\"FirstName\"/>\n        <xs:element type=\"xs:string\"\
    \ name=\"LastName\"/>\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n\
    </xs:schema>\n```\n\nThese generated results provide the basic foundation for\
    \ our XSD contract. Developers may need to tweak this contract to cover input\
    \ validation requirements and to enhance readability and code reusability. This\
    \ example merges these two contracts into one file, because our contract isn’t\
    \ complicated and it’s easier to work with one contract file. The enhanced contract\
    \ is shown in [Listing 3-5](#9781484207949_Ch03.xhtml#FPar9).\n\n[***Listing 3-5***](#9781484207949_Ch03.xhtml#_FPar9).\
    \ Manually Amended XSD Contract\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\n  attributeFormDefault=\"\
    unqualified\" elementFormDefault=\"qualified\"\n  targetNamespace=\"http://localhost:10301/0301-ws-xmlconfig-service\"\
    >\n\n<xs:element name=\"UserDetailsResponse\">\n    <xs:complexType>\n      <xs:sequence>\n\
            <xs:element type=\"xs:NCName\" name=\"FirstName\" />\n        <xs:element\
    \ type=\"xs:NCName\" name=\"LastName\" />\n      </xs:sequence>\n    </xs:complexType>\n\
      </xs:element>\n\n<xs:element name=\"UserRequest\">\n    <xs:complexType>\n      <xs:attribute\
    \ name=\"Email\">\n        <xs:simpleType>\n          <xs:restriction base=\"\
    xs:string\">\n            <xs:pattern value=\"[^@]+@[^\\.]+\\..+\" />\n          </xs:restriction>\n\
            </xs:simpleType>\n      </xs:attribute>\n    </xs:complexType>\n  </xs:element>\n\
    \n</xs:schema>\n```\n\nLet’s sum up the manual changes introduced in [Listing\
    \ 3-5](#9781484207949_Ch03.xhtml#FPar9):\n\n*   Use `xs:NCName` types instead\
    \ of `xs:string` for the first name and last name. This is useful because it excludes\
    \ most special characters (which wouldn’t make sense for a person’s name).\n*\
    \   Narrow down e-mail values in the contract by using regular expression restriction.\n\
    *   Specify the `targetNamespace` where the service will be hosted.\n*   Specify\
    \ `UTF-8` encoding for the XSD document.\n\nThe XSD contract is a crucial piece\
    \ of web service interface specification. It is a single source of truth for the\
    \ web service. Designing the XSD contract correctly is important, because its\
    \ structural changes can later trigger refactoring in the Java code base. Therefore,\
    \ we want to have the contract reviewed by as many stakeholders as possible up\
    \ front.\n\nThe created XSD contract can be used for further generation of the\
    \ following:\n\n*   Java model Plain Old Java Objects (POJOs) in case we are using\
    \ a JAXB 2 XML marshaller\n*   Dynamic WSDL definition for the web service\n\n\
    ## Endpoint Mapping\n\nWhen the request hits our application, we need to route\
    \ it to certain Java logic. This binding is called *endpoint mapping* in the Spring\
    \ world. The *endpoint* refers to the class where the web service logic is defined.\
    \ This class is annotated with the `@Endpoint` annotation.\n\nWhen the class is\
    \ declared to hold web service logic, we need to route messages. Spring provides\
    \ various declarative endpoint-mapping mechanisms in the form of these method-level\
    \ annotations:\n\n*   `@PayloadRoot`: Maps the method to the root element of the\
    \ request payload\n*   `@Action`: Maps the method to the WS-Addressing `Action`\
    \ header\n*   `@SoapAction`: Maps the method to the `SOAPAction` header\n\nWith\
    \ these annotations, a web services developer can effectively route SOAP messages\
    \ declaratively based on various message attributes.\n\n`@PayloadRoot` routing\
    \ is the most popular method-mapping mechanism. The top-level (root) XML element\
    \ of the SOAP message drives the routing. The `@PayloadRoot` annotation has two\
    \ parameters:\n\n*   `localPart`: Specifies the name of the root element to map.\
    \ This is a mandatory parameter.\n*   `namespace`: Specifies the namespace of\
    \ the payload root element. This is an optional parameter.\n\nSo to map the example\
    \ message in [Listing 3-6](#9781484207949_Ch03.xhtml#FPar10), `localPart` needs\
    \ to have the value `UserRequest`, and `namespace` should have the value `http://localhost:10301/0301-ws-xmlconfig-service`.\n\
    \n[***Listing 3-6***](#9781484207949_Ch03.xhtml#_FPar10). Example SOAP Message\n\
    \n```\n<SOAP-ENV:Envelope xmlns:SOAP-ENV=\"http://schemas.xmlsoap.org/soap/envelope/\"\
    >\n  <SOAP-ENV:Header />\n  <SOAP-ENV:Body>\n    <ns2:UserRequest xmlns:ns2=\"\
    http://localhost:10301/0301-ws-xmlconfig-service\"\n      Email=\"lubos.krnac@gmail.com\"\
    \ />\n  </SOAP-ENV:Body>\n</SOAP-ENV:Envelope>\n```\n\nWhen a particular Java\
    \ method is mapped, we need to map parameters and return the value of the Java\
    \ method. Spring provides various options for signature mapping:\n\n*   Mapping\
    \ XML parser types\n    *   `@RequestPayload`: Maps the request message to the\
    \ method parameter; the parameter type is derived from the underlying XML marshaller,\
    \ used for XML-to-Java conversion.\n    *   `@ResponsePayload`: Maps the response\
    \ message to the method’s return value; the return value type is derived from\
    \ the underlying XML marshaller, used for XML-to-Java conversion.\n*   `@XPathParam`:\
    \ Used for binding parameters based on XPath expressions\n    *   `boolean` or\
    \ `Boolean`\n    *   `double` or `Double`\n    *   `String`\n    *   `org.w3c.dom.Node`\n\
    \    *   `org.w3c.dom.NodeList`\n*   Extracting message metadata into the method\
    \ parameter (no annotation usage)\n    *   `org.springframework.ws.context.MessageContext`\n\
    \    *   Soap metadata (`SoapMessage`, `SoapBody`, `SoapEnvelope`, `SoapHeader`,\
    \ `SoapHeaderElements`)\n*   Mapping parameters to a custom unmarshaller (this\
    \ method requires the parameter to be annotated with `@RequestPayload` also)\n\
    \nThe developer can decide which information from the message is relevant for\
    \ the web service and needs to be injected into a method. This list of supported\
    \ signature mappings provides huge variability. A handy Spring Web Services feature\
    \ is the ability to choose an XML parsing mechanism. [Table 3-1](#9781484207949_Ch03.xhtml#Tab1)\
    \ presents the types of XML parsers that Spring can automatically map in the method\
    \ signature. These types always have to be annotated by `@RequestPayload` or `@ResponsePayload`,\
    \ respectively.\n\n[Table 3-1](#9781484207949_Ch03.xhtml#_Tab1). XML Parsers in\
    \ Method Signature Mappings\n\n| XML Parser | Method Signature Type |\n| --- |\
    \ --- |\n| TrAX | `javax.xml.transform.Source`, `DOMSource`, `SAXSource`, `StreamSource`,\
    \ and `StAXSource` |\n| W3C DOM | `org.w3c.dom.Element` |\n| dom4j | `org.dom4j.Element`\
    \ |\n| JDOM | `org.jdom.Element` |\n| XOM | `nu.xom.Element` |\n| StAX | `javax.xml.stream.XMLStreamReader`\
    \ and `javax.xml.stream.XMLEventReader` (can be used only for method parameters\
    \ and not for return values) |\n\n## JAXB 2 Endpoint-Mapping Example"
  raw: "![Image](images/sq.jpg) **Note**  XSD and WSDL languages are used extensively\
    \ in web services development, and are the topic of other books. Enterprise Integration\
    \ with Spring Certification focuses on Spring-related abstractions and workflows.\
    \ It doesn’t dive deep into schema definitions nor web service descriptions. Therefore,\
    \ detailed XSD and WSDL are beyond the scope of this book.\n\n[***Listing 3-3***](#9781484207949_Ch03.xhtml#_FPar7).\
    \ Generated XSDfrom Sample Request\n\n```\n<?xml version=\"1.0\"?>\n<xs:schema\
    \ xmlns:xs=\"http://www.w3.org/2001/XMLSchema\" attributeFormDefault=\"unqualified\"\
    \ elementFormDefault=\"qualified\">\n  <xs:element name=\"UserRequest\">\n    <xs:complexType>\n\
          <xs:sequence>\n        <xs:element type=\"xs:string\" name=\"Email\"/>\n\
          </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n</xs:schema>\n```\n\
    \n[***Listing 3-4***](#9781484207949_Ch03.xhtml#_FPar8). Generated XSD from Sample\
    \ Response\n\n```\n<?xml version=\"1.0\"?>\n<xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\
    \ attributeFormDefault=\"unqualified\" elementFormDefault=\"qualified\">\n  <xs:element\
    \ name=\"UserDetailsResponse\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element\
    \ type=\"xs:string\" name=\"FirstName\"/>\n        <xs:element type=\"xs:string\"\
    \ name=\"LastName\"/>\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n\
    </xs:schema>\n```\n\nThese generated results provide the basic foundation for\
    \ our XSD contract. Developers may need to tweak this contract to cover input\
    \ validation requirements and to enhance readability and code reusability. This\
    \ example merges these two contracts into one file, because our contract isn’t\
    \ complicated and it’s easier to work with one contract file. The enhanced contract\
    \ is shown in [Listing 3-5](#9781484207949_Ch03.xhtml#FPar9).\n\n[***Listing 3-5***](#9781484207949_Ch03.xhtml#_FPar9).\
    \ Manually Amended XSD Contract\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\n  attributeFormDefault=\"\
    unqualified\" elementFormDefault=\"qualified\"\n  targetNamespace=\"http://localhost:10301/0301-ws-xmlconfig-service\"\
    >\n\n<xs:element name=\"UserDetailsResponse\">\n    <xs:complexType>\n      <xs:sequence>\n\
            <xs:element type=\"xs:NCName\" name=\"FirstName\" />\n        <xs:element\
    \ type=\"xs:NCName\" name=\"LastName\" />\n      </xs:sequence>\n    </xs:complexType>\n\
      </xs:element>\n\n<xs:element name=\"UserRequest\">\n    <xs:complexType>\n      <xs:attribute\
    \ name=\"Email\">\n        <xs:simpleType>\n          <xs:restriction base=\"\
    xs:string\">\n            <xs:pattern value=\"[^@]+@[^\\.]+\\..+\" />\n          </xs:restriction>\n\
            </xs:simpleType>\n      </xs:attribute>\n    </xs:complexType>\n  </xs:element>\n\
    \n</xs:schema>\n```\n\nLet’s sum up the manual changes introduced in [Listing\
    \ 3-5](#9781484207949_Ch03.xhtml#FPar9):\n\n*   Use `xs:NCName` types instead\
    \ of `xs:string` for the first name and last name. This is useful because it excludes\
    \ most special characters (which wouldn’t make sense for a person’s name).\n*\
    \   Narrow down e-mail values in the contract by using regular expression restriction.\n\
    *   Specify the `targetNamespace` where the service will be hosted.\n*   Specify\
    \ `UTF-8` encoding for the XSD document.\n\nThe XSD contact is a crucial piece\
    \ of web service interface specification. It is a single source of truth for the\
    \ web service. Designing the XSD contract correctly is important, because its\
    \ structural changes can later trigger refactoring in the Java code base. Therefore,\
    \ we want to have the contract reviewed by as many stakeholders as possible up\
    \ front.\n\nThe created XSD contract can be used for further generation of the\
    \ following:\n\n*   Java model Plain Old Java Objects (POJOs) in case we are using\
    \ a JAXB 2 XML marshaller\n*   Dynamic WSDL definition for the web service\n\n\
    Endpoint Mapping\n\nWhen the request hits our application, we need to route it\
    \ to certain Java logic. This binding is called *endpoint mapping* in the Spring\
    \ world. The *endpoint* refers to the class where the web service logic is defined.\
    \ This class is annotated with the `@Endpoint` annotation.\n\nWhen the class is\
    \ declared to hold web service logic, we need to route messages. Spring provides\
    \ various declarative endpoint-mapping mechanisms in the form of these method-level\
    \ annotations:\n\n*   `@PayloadRoot`: Maps the method to the root element of the\
    \ request payload\n*   `@Action`: Maps the method to the WS-Addressing `Action`\
    \ header\n*   `@SoapAction`: Maps the method to the `SOAPAction` header\n\nWith\
    \ these annotations, a web services developer can effectively route SOAP messages\
    \ declaratively based on various message attributes.\n\n`@PayloadRoot` routing\
    \ is the most popular method-mapping mechanism. The top-level (root) XML element\
    \ of the SOAP message drives the routing. The `@PayloadRoot` annotation has two\
    \ parameters:\n\n*   `localPart`: Specifies the name of the root element to map.\
    \ This is a mandatory parameter.\n*   `namespace`: Specifies the namespace of\
    \ the payload root element. This is an optional parameter.\n\nSo to map the example\
    \ message in [Listing 3-6](#9781484207949_Ch03.xhtml#FPar10), `localPart` needs\
    \ to have the value `UserRequest`, and `namespace` should have the value `http://localhost:10301/0301-ws-xmlconfig-service`.\n\
    \n[***Listing 3-6***](#9781484207949_Ch03.xhtml#_FPar10). Example SOAP Message\n\
    \n```\n<SOAP-ENV:Envelope xmlns:SOAP-ENV=\"http://schemas.xmlsoap.org/soap/envelope/\"\
    >\n  <SOAP-ENV:Header />\n  <SOAP-ENV:Body>\n    <ns2:UserRequest xmlns:ns2=\"\
    http://localhost:10301/0301-ws-xmlconfig-service\"\n      Email=\"lubos.krnac@gmail.com\"\
    \ />\n  </SOAP-ENV:Body>\n</SOAP-ENV:Envelope>\n```\n\nWhen a particular Java\
    \ method is mapped, we need to map parameters and return the value of the Java\
    \ method. Spring provides various options for signature mapping:\n\n*   Mapping\
    \ XML parser types\n    *   `@RequestPayload`: Maps the request message to the\
    \ method parameter; the parameter type is derived from the underlying XML marshaller,\
    \ used for XML-to-Java conversion.\n    *   `@ResponsePayload`: Maps the response\
    \ message to the method’s return value; the return value type is derived from\
    \ the underlying XML marshaller, used for XML-to-Java conversion.\n*   `@XPathParam`:\
    \ Used for binding parameters based on XPath expressions\n    *   `boolean` or\
    \ `Boolean`\n    *   `double` or `Double`\n    *   `String`\n    *   `org.w3c.dom.Node`\n\
    \    *   `org.w3c.dom.NodeList`\n*   Extracting message metadata into the method\
    \ parameter (no annotation usage)\n    *   `org.springframework.ws.context.MessageContext`\n\
    \    *   Soap metadata (`SoapMessage`, `SoapBody`, `SoapEnvelope`, `SoapHeader`,\
    \ `SoapHeaderElements`)\n*   Mapping parameters to a custom unmarshaller (this\
    \ method requires the parameter to be annotated with `@RequestPayload` also)\n\
    \nThe developer can decide which information from the message is relevant for\
    \ the web service and needs to be injected into a method. This list of supported\
    \ signature mappings provides huge variability. A handy Spring Web Services feature\
    \ is the ability to choose an XML parsing mechanism. [Table 3-1](#9781484207949_Ch03.xhtml#Tab1)\
    \ presents the types of XML parsers that Spring can automatically map in the method\
    \ signature. These types always have to be annotated by `@RequestPayload` or `@ResponsePayload`,\
    \ respectively.\n\n[Table 3-1](#9781484207949_Ch03.xhtml#_Tab1). XML Parsers in\
    \ Method Signature Mappings\n\n| XML Parser | Method Signature Type |\n| --- |\
    \ --- |\n| TrAX | `javax.xml.transform.Source`, `DOMSource`, `SAXSource`, `StreamSource`,\
    \ and `StAXSource` |\n| W3C DOM | `org.w3c.dom.Element` |\n| dom4j | `org.dom4j.Element`\
    \ |\n| JDOM | `org.jdom.Element` |\n| XOM | `nu.xom.Element` |\n| StAX | `javax.xml.stream.XMLStreamReader`\
    \ and `javax.xml.stream.XMLEventReader`(can be used only for method parameters\
    \ and not for return values) |\n\nJAXB 2 Endpoint-Mapping Example"
  trans: "\n![Image](img/sq.jpg) **注意**  XSD 和 WSDL 语言在 Web 服务开发中被广泛使用，并且是其他书籍的主题。《Spring\
    \ 认证的企业集成》专注于 Spring 相关的抽象和工作流。它不会深入探讨模式定义或 Web 服务描述。因此，详细的 XSD 和 WSDL 超出了本书的范围。\n\
    \n***清单 3-3***。从示例请求生成的 XSD\n\n```\n<?xml version=\"1.0\"?>\n<xs:schema xmlns:xs=\"\
    http://www.w3.org/2001/XMLSchema\" attributeFormDefault=\"unqualified\" elementFormDefault=\"\
    qualified\">\n  <xs:element name=\"UserRequest\">\n    <xs:complexType>\n      <xs:sequence>\n\
            <xs:element type=\"xs:string\" name=\"Email\"/>\n      </xs:sequence>\n\
        </xs:complexType>\n  </xs:element>\n</xs:schema>\n```\n\n***清单 3-4***。从示例响应生成的\
    \ XSD\n\n```\n<?xml version=\"1.0\"?>\n<xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\
    \ attributeFormDefault=\"unqualified\" elementFormDefault=\"qualified\">\n  <xs:element\
    \ name=\"UserDetailsResponse\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element\
    \ type=\"xs:string\" name=\"FirstName\"/>\n        <xs:element type=\"xs:string\"\
    \ name=\"LastName\"/>\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n\
    </xs:schema>\n```\n\n这些生成的结果为我们的 XSD 契约提供了基础。开发者可能需要调整此契约，以满足输入验证需求，并增强可读性和代码可重用性。此示例将这两个契约合并到一个文件中，因为我们的契约并不复杂，并且使用一个契约文件更易于操作。增强后的契约如清单\
    \ 3-5 所示。\n\n***清单 3-5***。手动修改的 XSD 契约\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<xs:schema xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\n  attributeFormDefault=\"\
    unqualified\" elementFormDefault=\"qualified\"\n  targetNamespace=\"http://localhost:10301/0301-ws-xmlconfig-service\"\
    >\n\n<xs:element name=\"UserDetailsResponse\">\n    <xs:complexType>\n      <xs:sequence>\n\
            <xs:element type=\"xs:NCName\" name=\"FirstName\" />\n        <xs:element\
    \ type=\"xs:NCName\" name=\"LastName\" />\n      </xs:sequence>\n    </xs:complexType>\n\
      </xs:element>\n\n<xs:element name=\"UserRequest\">\n    <xs:complexType>\n      <xs:attribute\
    \ name=\"Email\">\n        <xs:simpleType>\n          <xs:restriction base=\"\
    xs:string\">\n            <xs:pattern value=\"[^@]+@[^\\.]+\\..+\" />\n          </xs:restriction>\n\
            </xs:simpleType>\n      </xs:attribute>\n    </xs:complexType>\n  </xs:element>\n\
    \n</xs:schema>\n```\n\n让我们总结一下清单 3-5 中引入的手动更改：\n\n*   对名字和姓氏使用 `xs:NCName` 类型而不是\
    \ `xs:string`。这很有用，因为它排除了大多数特殊字符（这些字符对人名来说没有意义）。\n*   通过使用正则表达式限制，在契约中缩小电子邮件值的范围。\n\
    *   指定服务将托管的目标命名空间 `targetNamespace`。\n*   为 XSD 文档指定 `UTF-8` 编码。\n\nXSD 契约是 Web\
    \ 服务接口规范的关键部分。它是 Web 服务的单一事实来源。正确设计 XSD 契约很重要，因为其结构变化可能会在后续触发 Java 代码库中的重构。因此，我们希望尽早让尽可能多的利益相关者审查该契约。\n\
    \n创建的 XSD 契约可用于进一步生成以下内容：\n\n*   Java 模型普通 Java 对象（POJO），以防我们使用 JAXB 2 XML 编组器\n\
    *   Web 服务的动态 WSDL 定义\n\n端点映射\n\n当请求到达我们的应用程序时，我们需要将其路由到特定的 Java 逻辑。这种绑定在 Spring\
    \ 世界中称为*端点映射*。*端点*指的是定义 Web 服务逻辑的类。该类使用 `@Endpoint` 注解进行标注。\n\n当类被声明为持有 Web 服务逻辑时，我们需要路由消息。Spring\
    \ 以以下方法级注解的形式提供了多种声明式端点映射机制：\n\n*   `@PayloadRoot`：将方法映射到请求负载的根元素\n*   `@Action`：将方法映射到\
    \ WS-Addressing `Action` 头\n*   `@SoapAction`：将方法映射到 `SOAPAction` 头\n\n使用这些注解，Web\
    \ 服务开发者可以基于各种消息属性，以声明方式有效地路由 SOAP 消息。\n\n`@PayloadRoot` 路由是最流行的方法映射机制。SOAP 消息的顶层（根）XML\
    \ 元素驱动路由。`@PayloadRoot` 注解有两个参数：\n\n*   `localPart`：指定要映射的根元素的名称。这是一个必需参数。\n*\
    \   `namespace`：指定负载根元素的命名空间。这是一个可选参数。\n\n因此，要映射清单 3-6 中的示例消息，`localPart` 需要具有值\
    \ `UserRequest`，而 `namespace` 应具有值 `http://localhost:10301/0301-ws-xmlconfig-service`。\n\
    \n***清单 3-6***。示例 SOAP 消息\n\n```\n<SOAP-ENV:Envelope xmlns:SOAP-ENV=\"http://schemas.xmlsoap.org/soap/envelope/\"\
    >\n  <SOAP-ENV:Header />\n  <SOAP-ENV:Body>\n    <ns2:UserRequest xmlns:ns2=\"\
    http://localhost:10301/0301-ws-xmlconfig-service\"\n      Email=\"lubos.krnac@gmail.com\"\
    \ />\n  </SOAP-ENV:Body>\n</SOAP-ENV:Envelope>\n```\n\n当映射了特定的 Java 方法时，我们需要映射参数并返回\
    \ Java 方法的值。Spring 提供了多种签名映射选项：\n\n*   映射 XML 解析器类型\n    *   `@RequestPayload`：将请求消息映射到方法参数；参数类型源自底层\
    \ XML 编组器，用于 XML 到 Java 的转换。\n    *   `@ResponsePayload`：将响应消息映射到方法的返回值；返回值类型源自底层\
    \ XML 编组器，用于 XML 到 Java 的转换。\n*   `@XPathParam`：用于基于 XPath 表达式绑定参数\n    *   `boolean`\
    \ 或 `Boolean`\n    *   `double` 或 `Double`\n    *   `String`\n    *   `org.w3c.dom.Node`\n\
    \    *   `org.w3c.dom.NodeList`\n*   将消息元数据提取到方法参数中（无需使用注解）\n    *   `org.springframework.ws.context.MessageContext`\n\
    \    *   Soap 元数据（`SoapMessage`、`SoapBody`、`SoapEnvelope`、`SoapHeader`、`SoapHeaderElements`）\n\
    *   将参数映射到自定义解组器（此方法要求参数也使用 `@RequestPayload` 进行注解）\n\n开发者可以决定消息中的哪些信息与 Web 服务相关，并且需要注入到方法中。这个支持的签名映射列表提供了巨大的可变性。Spring\
    \ Web Services 的一个便捷功能是能够选择 XML 解析机制。表 3-1 展示了 Spring 可以在方法签名中自动映射的 XML 解析器类型。这些类型必须分别使用\
    \ `@RequestPayload` 或 `@ResponsePayload` 进行注解。\n\n表 3-1。方法签名映射中的 XML 解析器\n\n|\
    \ XML 解析器 | 方法签名类型 |\n| --- | --- |\n| TrAX | `javax.xml.transform.Source`、`DOMSource`、`SAXSource`、`StreamSource`\
    \ 和 `StAXSource` |\n| W3C DOM | `org.w3c.dom.Element` |\n| dom4j | `org.dom4j.Element`\
    \ |\n| JDOM | `org.jdom.Element` |\n| XOM | `nu.xom.Element` |\n| StAX | `javax.xml.stream.XMLStreamReader`\
    \ 和 `javax.xml.stream.XMLEventReader`（只能用于方法参数，不能用于返回值） |\n\nJAXB 2 端点映射示例\n"
- fmt: "The most widely used marshaller is `JAXB 2`, which allows for generation of\
    \ Java model classes from an XSD contract. Generated Java classes are annotated\
    \ with special mapping annotations, which map XML elements onto POJO classes.\
    \ This approach is called Object to XML Mapping (OXM). It is similar to the famous\
    \ object-relational mapping (ORM), which maps SQL DB tables onto POJOs.\n\nExamples\
    \ in this book are based on the Maven 3 build system. So `jaxb2-maven-plugin`\
    \ is used for Java model generation; the XJC binding compiler is used to generate\
    \ Java classes from the XSD contract. More information about this plug-in can\
    \ be found at `http://mojo.codehaus.org/jaxb2-maven-plugin/xjc-mojo.html`. The\
    \ Maven plug-in configuration is shown in [Listing 3-7](#9781484207949_Ch03.xhtml#FPar11).\n\
    \n[***Listing 3-7***](#9781484207949_Ch03.xhtml#_FPar11). Configuration of `jaxb2-maven-plugin`\n\
    \n```\n<plugin>\n  <groupId>org.codehaus.mojo</groupId>\n  <artifactId>jaxb2-maven-plugin</artifactId>\n\
    \  <version>1.6</version>\n  <executions>\n    <execution>\n      <id>xjc</id>\n\
    \      <goals>\n        <goal>xjc</goal>\n      </goals>\n    </execution>\n \
    \ </executions>\n  <configuration>\n    <schemaDirectory>${project.basedir}/src/main/resources/</schemaDirectory>\n\
    \    <outputDirectory>${project.basedir}/src/main/java</outputDirectory>\n   \
    \ <clearOutputDir>false</clearOutputDir>\n  </configuration>\n</plugin>\n```\n\
    \nThis configuration reads all XSD schema files from the `src/main/resources`\
    \ directory and its subfolders. It is crucial to know that it would pick up all\
    \ XSD files present in the specified directory structure and convert the XSD types/elements\
    \ into Java POJOs. Therefore, the number of POJO classes depends on the number\
    \ of XSD types/elements defined. If one file has five XSD types, five POJO classes\
    \ will be generated for these types. The conversion will fail if any name clashes\
    \ occur.\n\nWhen we run this configuration with Maven goals, JAXB POJOs will be\
    \ generated based on the XSD schema into the `src/main/java` folder:\n\n```\n\
    > clean install\n```\n\nThe generated package structure follows the namespace\
    \ of the XSD schema. In our case, it is `localhost._10301._0301_ws_xmlconfig_service`.\
    \ These POJOs basically represent the domain model of the web service. For the\
    \ XSD schema in [Listing 3-5](#9781484207949_Ch03.xhtml#FPar9), three classes\
    \ are created:\n\n*   `UserRequest`\n*   `UserDetailsReponse`\n*   `ObjectFactory`\n\
    \nThe first two classes obviously represent the XSD elements from the contract.\
    \ They contain getters and setters for subelements. The last class is a factory\
    \ for creating contract elements. It can be used to create instances of POJO classes\
    \ derived from XSD elements or types. It may not be needed, depending on the XSD\
    \ contract. [Listing 3-8](#9781484207949_Ch03.xhtml#FPar12) shows generated classes\
    \ with their JAXB 2 annotations.\n\n[***Listing 3-8***](#9781484207949_Ch03.xhtml#_FPar12).\
    \ Generated JAXB 2 Model\n\n```\npackage localhost._10301._0301_ws_xmlconfig_service;\n\
    \nimport javax.xml.bind.annotation.XmlAccessType;\nimport javax.xml.bind.annotation.XmlAccessorType;\n\
    import javax.xml.bind.annotation.XmlAttribute;\nimport javax.xml.bind.annotation.XmlRootElement;\n\
    import javax.xml.bind.annotation.XmlType;\n\n@XmlAccessorType(XmlAccessType.FIELD)\n\
    @XmlType(name = \"\")\n@XmlRootElement(name = \"UserRequest\")\npublic class UserRequest\
    \ {\n    @XmlAttribute(name = \"Email\")\n    protected String email;\n\n/**\n\
    \     * Gets the value of the email property.\n     *\n     * @return\n     *\
    \     possible object is\n     *     {@link String }\n     *\n     */\n    public\
    \ String getEmail() {\n        return email;\n    }\n\n/**\n     * Sets the value\
    \ of the email property.\n     *\n     * @param value\n     *     allowed object\
    \ is\n     *     {@link String }\n     *\n     */\n    public void setEmail(String\
    \ value) {\n        this.email = value;\n    }\n}\n\npackage localhost._10301._0301_ws_xmlconfig_service;\n\
    \nimport javax.xml.bind.annotation.XmlAccessType;\nimport javax.xml.bind.annotation.XmlAccessorType;\n\
    import javax.xml.bind.annotation.XmlElement;\nimport javax.xml.bind.annotation.XmlRootElement;\n\
    import javax.xml.bind.annotation.XmlSchemaType;\nimport javax.xml.bind.annotation.XmlType;\n\
    import javax.xml.bind.annotation.adapters.CollapsedStringAdapter;\nimport javax.xml.bind.annotation.adapters.XmlJavaTypeAdapter;\n\
    \n@XmlAccessorType(XmlAccessType.FIELD)\n@XmlType(name = \"\", propOrder = {\n\
    \    \"firstName\",\n    \"lastName\"\n})\n@XmlRootElement(name = \"UserDetailsResponse\"\
    )\npublic class UserDetailsResponse {\n    @XmlElement(name = \"FirstName\", required\
    \ = true)\n    @XmlJavaTypeAdapter(CollapsedStringAdapter.class)\n    @XmlSchemaType(name\
    \ = \"NCName\")\n    protected String firstName;\n    @XmlElement(name = \"LastName\"\
    , required = true)\n    @XmlJavaTypeAdapter(CollapsedStringAdapter.class)\n  \
    \  @XmlSchemaType(name = \"NCName\")\n    protected String lastName;\n\n/**\n\
    \     * Gets the value of the firstName property.\n     *\n     * @return\n  \
    \   *     possible object is\n     *     {@link String }\n     *\n     */\n  \
    \  public String getFirstName() {\n        return firstName;\n    }\n\n/**\n \
    \    * Sets the value of the firstName property.\n     *\n     * @param value\n\
    \     *     allowed object is\n     *     {@link String }\n     *\n     */\n \
    \   public void setFirstName(String value) {\n        this.firstName = value;\n\
    \    }\n\n/**\n     * Gets the value of the lastName property.\n     *\n     *\
    \ @return\n     *     possible object is\n     *     {@link String }\n     *\n\
    \     */\n    public String getLastName() {\n        return lastName;\n    }\n\
    \n/**\n     * Sets the value of the lastName property.\n     *\n     * @param\
    \ value\n     *     allowed object is\n     *     {@link String }\n     *\n  \
    \   */\n    public void setLastName(String value) {\n        this.lastName = value;\n\
    \    }\n}\npackage localhost._10301._0301_ws_xmlconfig_service;\n\nimport javax.xml.bind.annotation.XmlRegistry;\n\
    \n@XmlRegistry\npublic class ObjectFactory {\n\n/**\n     * Create a new ObjectFactory\
    \ that can be used to create new instances of schema derived classes for package:\
    \ localhost._10301._0301_ws_xmlconfig_service\n     *\n     */\n    public ObjectFactory()\
    \ {\n    }\n\n/**\n     * Create an instance of {@link UserDetailsResponse }\n\
