- fmt: "# RestTemplate 功能概述\n\n对于大多数方法，都需要进行序列化和反序列化。`RestTemplate`抽象了序列化库，并提供了直接与Java类型之间的转换。为此，它使用消息转换器来处理JSON、XML、GSON和RSS等主要格式。它还能够检测类路径上的转换器库（如Jackson、JAXB、GSON和Rome），并自动注册相应的转换器。\n\
    \n如果内置转换器不够用，我们可以通过`RestTemplate.setMessageConverters(List<HttpMessageConverter<?>>)`方法注册自定义转换器。当存在多种转换器时，`RestTemplate`会根据给定的内容类型使用第一个合适的转换器。这种行为使得处理内容协商变得轻而易举。\n\
    \n`RestTemplate`类的最后一个显著特性是错误处理。默认情况下，该类会将服务器错误（HTTP状态码5*xx*）和客户端错误（HTTP状态码4*xx*）转换为客户端上的受检异常。但如果不需要此行为，我们可以通过`RestTemplate.setErrorHandler(ResponseErrorHandler)`使用自定义实现覆盖错误处理器。\n\
    \n我们将在示例中探讨此类的基本用法。但首先，我们需要在[清单4-36](#9781484207949_Ch04.xhtml#FPar46)中展示客户端应用程序的配置。\n\
    \n[***清单4-36***](#9781484207949_Ch04.xhtml#_FPar46). 客户端应用程序配置 (0404-rest-boot-client)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.web.client.RestTemplate;\n\n@Configuration\n@ComponentScan\n\
    public class ClientConfiguration {\n  @Bean\n  public RestTemplate restTemplate()\
    \ {\n    return new RestTemplate();\n  }\n}\n```\n\n`@Configuration`和`@ComponentScan`注解是Spring的标准注解。它们声明了Spring配置类，该类应对当前包及其子包执行组件扫描。我们在此只注册了一个Bean，即用于向服务器发送和接收HTTP消息的`RestTemplate`实例。我们将其作为单独的Bean注册在配置类中，因为这将有助于后续示例中的测试。[清单4-37](#9781484207949_Ch04.xhtml#FPar47)展示了此REST客户端Bean的使用。\n\
    \n[***清单4-37***](#9781484207949_Ch04.xhtml#_FPar47). RestTemplate (0404-rest-boot-client)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\nimport java.net.URI;\n\
    import java.net.URISyntaxException;\nimport java.util.Arrays;\nimport java.util.List;\n\
    import net.lkrnac.book.eiws.chapter04.model.User;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.http.HttpMethod;\nimport org.springframework.http.RequestEntity;\n\
    import org.springframework.http.ResponseEntity;\nimport org.springframework.stereotype.Component;\n\
    import org.springframework.web.client.RestTemplate;\n\n@Component\npublic class\
    \ UsersClient {\n  private static final String URL = \"http://localhost:10404/users\"\
    ;\n  private RestTemplate restTemplate;\n\n  @Autowired\n  public UsersClient(RestTemplate\
    \ restTemplate) {\n    super();\n    this.restTemplate = restTemplate;\n  }\n\n\
    \  public URI createUser(User user) {\n    return restTemplate.postForLocation(URL,\
    \ user);\n  }\n\n  public User getUser(int identifier) {\n    return restTemplate.getForObject(URL\
    \ + \"/\" + identifier, User.class);\n  }\n\n  public List<User> getUsers() {\n\
    \    User[] usersArray = restTemplate.getForObject(URL, User[].class);\n    return\
    \ Arrays.asList(usersArray);\n  }\n\n  public void updateOrCreateUser(int identifier,\
    \ User user) {\n    restTemplate.put(URL + \"/\" + identifier, user);\n  }\n\n\
    \  public void deleteUser(int identifier) {\n    restTemplate.delete(URL + \"\
    /\" + identifier);\n  }\n\n  public User getUserExchange(int identifier) throws\
    \ URISyntaxException {\n    RequestEntity<Void> request =\n        new RequestEntity<Void>(HttpMethod.GET,\
    \ new URI(URL + \"/\" + identifier));\n    ResponseEntity<User> response = restTemplate.exchange(request,\
    \ User.class);\n    return response.getBody();\n  }\n}\n```\n\n`@Component`注解将此类标记为Spring\
    \ Bean，以便进行组件扫描。`url`常量定义了REST服务器的地址。然后我们定义了`restTemplate`属性，用于注入[清单4-36](#9781484207949_Ch04.xhtml#FPar46)中注册的Bean。\n\
    \n`createUser`方法使用`restTemplate.postForLocation`调用对我们的REST服务器执行`POST`请求。在此调用中，我们传入`User`对象，该对象将被转换为消息的JSON负载。此调用的返回值是URI对象，该对象由服务器作为所创建资源实例的`Location`头返回。\n\
    \n`getUser`方法对具体的资源实例执行`GET`请求。`restTemplate.getForObject`调用接受两个参数：要读取的资源的URL，以及响应负载将被转换成的类型。创建的POJO作为返回值返回。\n\
    \n`getUsers`方法也执行`GET`请求，但在此情况下，我们读取所有资源实例，并将响应负载转换为`User`对象的集合。`restTemplate.getForObject`调用只能处理数组，因为集合具有泛型类型，而Spring框架无法在运行时确定此泛型类型（因为泛型在运行时被擦除）。因此，如果我们希望Spring将其转换为`List.class`类型，则无法将其转换为`List<User>`。\n\
    \n`updateOrCreateUser`方法如其名称所示，基于给定的`identifier`和`User`对象执行操作。`identifier`从URI中解析，`user`从HTTP请求体转换而来。\n\
    \n`deleteUser`方法触发对由给定`identifier`标识的资源的`DELETE`请求。\n\n最后，我们在`getUserExchange`方法中使用了`RestTemplate.exchange`调用。其效果与`getUser`方法相同。但它突出了如何使用`RestTemplate`来覆盖更通用的HTTP通信，其中HTTP方法作为参数传递。我们还需要传递一个类型为`RequestEntity<Void>`的HTTP请求表示作为参数。泛型类型`Void`表示请求体的类型。显然，这意味着`GET`请求没有请求体。作为返回值，我们从服务器接收到Spring对HTTP响应的表示，类型为`ResponseEntity<User>`。泛型类型`User`再次表示消息体将被转换成的类型。\n\
    \n如果这些方法中的任何一个接收到HTTP状态码4*xx*或5*xx*，`RestTemplate`将抛出一个非受检异常，该异常会渗透到使用此`UserClient`\
    \ Bean的代码中。\n\n## 自定义错误处理器\n\n默认情况下，Spring将4*xx* HTTP状态码转换为`HttpClientErrorException`，将5*xx*状态码转换为`HttpServerErrorException`。两者都是非受检异常。我们不需要显式处理此类异常，因为它们是`RuntimeException`的子类。\n\
    \n但有时这种默认的`RestTemplate`错误处理行为可能不符合我们的需求。幸运的是，我们可以轻松更改默认的异常处理，并通过`RestTemplate.setErrorHandler`调用注册自定义错误处理器。\n\
    \n为了探索其用法，假设我们必须将所有服务器错误转换为自定义异常。此示例在[清单4-38](#9781484207949_Ch04.xhtml#FPar48)中展示。\n\
    \n[***清单4-38***](#9781484207949_Ch04.xhtml#_FPar48). 自定义异常 (0406-rest-errorhandler-client)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter04.client;\n\npublic class CustomException\
    \ extends RuntimeException {\n  private static final long serialVersionUID = 1L;\n\
    ```"
  raw: 'For most of these methods, marshaling and unmarshalling is needed. `RestTemplate`
    abstracts out the marshalling libraries and provides a conversion directly into/from
    Java types. For this purpose, it uses message converters for major formats such
    as JSON, XML, GSON, and RSS. It is also able to detect converter libraries such
    as Jackson, JAXB, GSON, and Rome on the classpath and to register appropriate
    converters automatically.


    If built-in converters are not enough, we can register custom converters with
    the `RestTemplate.setMessageConverters(List<HttpMessageConverter<?>>)` method.
    When there are various converters, `RestTemplate` uses the first appropriate one
    for the given content type. Such behavior enables handling content negotiation
    without much effort.


    The last notable feature of the `RestTemplate` class is error handling. By default,
    the class translates server (HTTP status codes 5*xx*) and client (HTTP status
    codes 4*xx*) errors into checked exceptions on the client by default. But if we
    don’t want this behavior, we can override the error handler with our implementation
    by using `RestTemplate.setErrorHandler(ResponseErrorHandler)`.


    We are going to explore basic use of this class in an example. But first we need
    to show the configuration of the client application in [Listing 4-36](#9781484207949_Ch04.xhtml#FPar46).


    [***Listing 4-36***](#9781484207949_Ch04.xhtml#_FPar46). Configuration of Client-Side
    Application (0404-rest-boot-client)


    ```

    package net.lkrnac.book.eiws.chapter04.client;


    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.web.client.RestTemplate;


    @Configuration

    @ComponentScan

    public class ClientConfiguration {

      @Bean

      public RestTemplate restTemplate() {

        return new RestTemplate();

      }

    }

    ```


    The `@Configuration` and `@ComponentScan` annotations are standard for Spring.
    They declare the Spring configuration class that should perform a component scan
    for the current package and its subpackages. We register just one bean here, and
    that is the `RestTemplate` instance used for sending and receiving HTTP messages
    to the server. We register it in the configuration class as a separate bean because
    it will help us with testing in later examples. [Listing 4-37](#9781484207949_Ch04.xhtml#FPar47)
    shows use of this REST client bean.


    [***Listing 4-37***](#9781484207949_Ch04.xhtml#_FPar47). RestTemplate (0404-rest-boot-client)


    ```

    package net.lkrnac.book.eiws.chapter04.client;


    import java.net.URI;

    import java.net.URISyntaxException;

    import java.util.Arrays;

    import java.util.List;

    import net.lkrnac.book.eiws.chapter04.model.User;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.http.HttpMethod;

    import org.springframework.http.RequestEntity;

    import org.springframework.http.ResponseEntity;

    import org.springframework.stereotype.Component;

    import org.springframework.web.client.RestTemplate;


    @Component

    public class UsersClient {

      private static final String URL = "http://localhost:10404/users";

      private RestTemplate restTemplate;


    @Autowired

      public UsersClient(RestTemplate restTemplate) {

        super();

        this.restTemplate = restTemplate;

      }


    public URI createUser(User user) {

        return restTemplate.postForLocation(URL, user);

      }


    public User getUser(int identifier) {

        return restTemplate.getForObject(URL + "/" + identifier, User.class);

      }


    public List<User> getUsers() {

        User[] usersArray = restTemplate.getForObject(URL, User[].class);

        return Arrays.asList(usersArray);

      }


    public void updateOrCreateUser(int identifier, User user) {

        restTemplate.put(URL + "/" + identifier, user);

      }


    public void deleteUser(int identifier) {

        restTemplate.delete(URL + "/" + identifier);

      }


    public User getUserExchange(int identifier) throws URISyntaxException {

        RequestEntity<Void> request =

            new RequestEntity<Void>(HttpMethod.GET, new URI(URL + "/" + identifier));

        ResponseEntity<User> response = restTemplate.exchange(request, User.class);

        return response.getBody();

      }

    }

    ```


    The `Component` annotation marks this class as a Spring bean so it can be component
    scanned. The `url` constant defines the address of the REST server. Then we define
    the `restTemplate` property, which is used for constructor injection of the bean
    registered in [Listing 4-36](#9781484207949_Ch04.xhtml#FPar46).


    The `createUser` method uses the `restTemplate.postForLocation` call to perform
    a `POST` request against our REST server. In this call, we pass in the `User`
    object to be converted into the JSON payload of the message. The return value
    from this call is the URI object, which was returned from the server as the `Location`
    header of the created resource instance.


    The `getUser` method performs the `GET` request for the concrete resource instance.
    The call `restTemplate.getForObject` takes two parameters: the URL of the resource
    to read, and the type that the response payload will be converted into. The created
    POJO is returned as the return value.


    The `getUsers` method performs a `GET` request also, but in this case we read
    all the resource instances and convert the response payload into a collection
    of `User` objects. The `restTemplate.getForObject` call can handle only arrays,
    because the collection has a generic type, and it is impossible for the Spring
    framework to figure out this generic type because it is erased on runtime. So
    if we would like Spring to convert it into a `List.class` type, it can’t cast
    it to `List<User>`.


    The `updateOrCreateUser` method does exactly what its name suggests, based on
    a given `identifier` and `User` object. `identifier` is parsed from the URI, and
    `user` is converted from the HTTP request body.


    The `deleteUser` method fires the `DELETE` request of the resource identified
    by the given `identifier`.


    Finally, we use the `RestTemplate.exchange` call in the `getUserExchange` method.
    It effectively has same result as the `getUser` method. But it highlights how
    we can use `RestTemplate` to cover more-generic HTTP communication, where the
    HTTP method is passed as a parameter. We also need to pass a representation of
    the HTTP request of type `RequestEntity<Void>` as a parameter. The generic type
    `Void` represents the type of the body. Obviously, this means that the `GET` request
    doesn’t have a body. As a return value, we receive from the server Spring’s representation
    of the HTTP response of type `ResponseEntity<User>`. The generic type `User` again
    represents the type that the body of the message would be converted into.


    If any of these methods receive HTTP status 4*xx* or 5*xx*, `RestTemplate` will
    throw an unchecked exception, which would penetrate into the code using this `UserClient`
    bean.


    Custom Error Handler


    By default, Spring translates 4*xx* HTTP status codes into `HttpClientErrorException`
    and 5*xx* status codes into `HttpServerErrorException`. Both are unchecked exceptions.
    We don’t need to handle such exceptions explicitly, because they are children
    of `RuntimeException`.


    But sometimes this default `RestTemplate` error-handling behavior might not fit
    our requirements. Fortunately, we can easily change the default exception handling
    and register a custom error handler with the `RestTemplate.setErrorHandler` call.


    To explore it’s use, let’s pretend that we must translate all server errors into
    our custom exception. This example is shown in [Listing 4-38](#9781484207949_Ch04.xhtml#FPar48).


    [***Listing 4-38***](#9781484207949_Ch04.xhtml#_FPar48). Custom Exception (0406-rest-errorhandler-client)


    ```

    package net.lkrnac.book.eiws.chapter04.client;


    public class CustomException extends RuntimeException {

      private static final long serialVersionUID = 1L;'
