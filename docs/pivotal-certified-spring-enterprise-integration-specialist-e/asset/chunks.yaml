    STS 批处理图形编辑器来创建 SB 流程。图 9-4 展示了该编辑器在 STS 中的位置。


    ![9781484207949_Fig09-04.jpg](img/9781484207949_Fig09-04.jpg)


    图 9-4. STS 中的批处理图形编辑器选项卡


    通过双击图形中的 SB 组件，我们可以通过“属性”选项卡更改这些组件的属性。如图 9-5 所示。


