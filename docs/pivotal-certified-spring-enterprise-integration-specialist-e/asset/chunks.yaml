    ```


    `UserInterceptor` 和 `GlobalInterceptor` bean 通过组件扫描被检测到，并自动注入到此配置类中。在 `addInterceptors`
    方法中，我们将拦截器注册到一个注入的列表中。前两个拦截器被包装在 `PayloadRootSmartSoapEndpointInterceptor` 中。此包装器使得给定的拦截器仅对命名空间为
    `http://localhost:10305/0305-ws-interceptor-service` 且本地部分为 `UserRequest` 的端点生效。我们以这种方式注册了自定义的
    `UserInterceptor` 和 `PayloadLoggingInterceptor`。

