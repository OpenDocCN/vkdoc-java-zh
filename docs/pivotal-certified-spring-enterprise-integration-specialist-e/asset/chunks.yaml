- fmt: "`UserRequest` and `UserDetailResponse` are domain model types that will be\
    \ used in web service logic. [Listing 3-9](#9781484207949_Ch03.xhtml#FPar13) shows\
    \ an example of endpoint mapping that uses generated types in the method signature.\n\
    \n[**Listing 3-9**](#9781484207949_Ch03.xhtml#_FPar13). Endpoint Root Mapping\
    \ (0301-ws-xmlconfig-service)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server;\n\
    \nimport localhost._10301._0301_ws_xmlconfig_service.UserDetailsResponse;\nimport\
    \ localhost._10301._0301_ws_xmlconfig_service.UserRequest;\nimport org.springframework.ws.server.endpoint.annotation.Endpoint;\n\
    import org.springframework.ws.server.endpoint.annotation.PayloadRoot;\nimport\
    \ org.springframework.ws.server.endpoint.annotation.RequestPayload;\nimport org.springframework.ws.server.endpoint.annotation.ResponsePayload;\n\
    \n@Endpoint\npublic class UserEndpoint {\n  @PayloadRoot(namespace = \"http://localhost:10301/0301-ws-xmlconfig-service\"\
    ,\n        localPart = \"UserRequest\")\n  @ResponsePayload\n  public UserDetailsResponse\
    \ getUserDetails(\n      @RequestPayload UserRequest userRequest) {\n    UserDetailsResponse\
    \ userDetails = null;\n    if (\"lubos.krnac@gmail.com\".equals(userRequest.getEmail()))\
    \ {\n      userDetails = new UserDetailsResponse();\n      userDetails.setFirstName(\"\
    Lubos\");\n      userDetails.setLastName(\"Krnac\");\n    }\n    return userDetails;\n\
    \  }\n}\n```\n\nDevelopers can take advantage of the flexibility of the Spring\
    \ Web Services binding mechanism and vary it with parameters.\n\nSpring can also\
    \ inject into our web service method the metadata of the message—for example,\
    \ the SOAP header or message context. The message context contains all data involved\
    \ in the service’s current request:\n\n*   Request\n*   Repose\n*   Properties,\
    \ which can be used to communicate with the interceptors and endpoint\n\nLet’s\
    \ say we want to read the SOAP header `role` and use the message context in web\
    \ service logic now. [Listing 3-10](#9781484207949_Ch03.xhtml#FPar14) reflects\
    \ this requirement.\n\n[**Listing 3-10**](#9781484207949_Ch03.xhtml#_FPar14).\
    \ Example of Payload Root Endpoint-Mapping Variations\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.xmlconfig.server;\n\
    \nimport localhost._10301._0301_ws_xmlconfig_service.UserDetailsResponse;\nimport\
    \ localhost._10301._0301_ws_xmlconfig_service.UserRequest;\nimport org.springframework.ws.context.MessageContext;\n\
    import org.springframework.ws.server.endpoint.annotation.Endpoint;\nimport org.springframework.ws.server.endpoint.annotation.PayloadRoot;\n\
    import org.springframework.ws.server.endpoint.annotation.RequestPayload;\nimport\
    \ org.springframework.ws.server.endpoint.annotation.ResponsePayload;\nimport org.springframework.ws.soap.SoapHeaderElement;\n\
    import org.springframework.ws.soap.server.endpoint.annotation.SoapHeader;\n\n\
    @Endpoint\npublic class UserEndpoint {\n  @PayloadRoot(namespace = \"http://localhost:10301/0301-ws-xmlconfig-service\"\
    , localPart = \"UserRequest\")\n  @ResponsePayload\n  public UserDetailsResponse\
    \ getUserDetails(\n      @RequestPayload UserRequest userRequest, @SoapHeader(\"\
    role\") SoapHeaderElement role, MessageContext messageContext) {\n          ...\n\
    \      }\n    return userDetails;\n  }\n}\n```\n\nRouting SOAP messages based\
    \ on the root XML element (`@PayloadRoot`) is most common. But routings also can\
    \ be based on WS-Addressing (`@Action`) or the `SOAPAction` header (`@SoapAction`).\
    \ [Listing 3-11](#9781484207949_Ch03.xhtml#FPar15) shows a `SOAPAction` routing\
    \ example. WS-Addressing would be similar.\n\n[**Listing 3-11**](#9781484207949_Ch03.xhtml#_FPar15).\
    \ SOAPAction Endpoint Mapping (0307-ws-soapaction-service)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.soapaction.server;\n\
    \nimport localhost._10307._0307_ws_soapaction_service.UserDetailsResponse;\nimport\
    \ localhost._10307._0307_ws_soapaction_service.UserRequest;\nimport org.springframework.ws.server.endpoint.annotation.Endpoint;\n\
    import org.springframework.ws.server.endpoint.annotation.RequestPayload;\nimport\
    \ org.springframework.ws.server.endpoint.annotation.ResponsePayload;\nimport org.springframework.ws.soap.server.endpoint.annotation.SoapAction;\n\
    \n@Endpoint\npublic class UserEndpoint {\n  @SoapAction(\"getUserDetails\")\n\
    \  @ResponsePayload\n  public UserDetailsResponse getUserDetails(\n      @RequestPayload\
    \ UserRequest userRequest) {\n    UserDetailsResponse userDetails = null;\n  \
    \  if (\"lubos.krnac@gmail.com\".equals(userRequest.getEmail())) {\n      userDetails\
    \ = new UserDetailsResponse();\n      userDetails.setFirstName(\"Lubos\");\n \
    \     userDetails.setLastName(\"Krnac\");\n    }\n    return userDetails;\n  }\n\
    }\n```\n\n## Spring Context Configuration\n\nThe previous section highlighted\
