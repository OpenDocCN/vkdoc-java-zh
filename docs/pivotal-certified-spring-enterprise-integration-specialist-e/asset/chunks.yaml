    \n@Component\npublic class WebServiceClient {\n  private WebServiceTemplate webServiceTemplate;\n\
    \nprivate static final SoapActionCallback messageCallback =\n      new SoapActionCallback(\"\
    getUserDetails\");\n\n@Autowired\n  public WebServiceClient(WebServiceTemplate\
