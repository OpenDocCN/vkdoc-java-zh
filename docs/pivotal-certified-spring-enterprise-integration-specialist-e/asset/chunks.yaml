    步骤分区示例


    本章的示例仅使用 XML 配置，原因与远程块处理示例相同。为了涵盖此功能，我们将使用三个项目并运行多个进程：


    *   用于处理主进程和从属进程之间消息传递的 HornetQ 服务器

    *   共享数据库服务器

    *   主项目

    *   从属项目，我们将在其中运行多个进程


    共享数据库项目


    对于共享数据库，我们将使用运行存储在文件中的 H2 数据库实例的 Spring Boot 应用程序。清单 9-130 显示了启动此项目时使用的脚本。


    ***清单 9-130***. 分区示例的初始化 SQL 脚本（文件位于示例项目 0940-remote-partitioning-sql-server 的
    src/main/resource 文件夹中的 h2-purge.sql）


    ```

    DROP ALL OBJECTS

    ```


    因为我们没有使用 H2 的持久化到文件的模式，此脚本会清除数据库中的所有对象，以便我们始终从一个干净的状态开始运行示例。在现实世界中，我们不会想这样做，但出于示例目的，从一个空数据库开始是好的。清单
