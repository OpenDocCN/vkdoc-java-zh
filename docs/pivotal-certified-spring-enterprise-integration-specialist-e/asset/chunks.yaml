    but annotated with `@Gateway` and `@MessageEndpoint`.

    *   `SiApplication`: The same as the `SiApplication` class in [Listing 8-93](#9781484207949_Ch08_2_Ext.xhtml#FPar96).
    The only difference is the missing import of the `si-config.xml` file, as this
