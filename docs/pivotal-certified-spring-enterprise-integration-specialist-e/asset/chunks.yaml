    `sessionTransacted` 属性设置为 `true`，`sessionAcknowledgeMode` 设置为 `Session.SESSION_TRANSACTED`，以启用本地
    JMS 事务支持。类似的支持也可以通过 XML 配置实现，如 清单 6-24 所示。


