    *   `setConnecionFactory`：作为 JMS 客户端访问主入口的强制连接工厂实例。\n*   将使用的默认 JMS `Destination`\n\
    \    *   `setDefaultDestination`：通过 `Destination`/`Queue`/`Topic` 实例设置目的地。\n \
    \   *   `setDefaultDestinationName`：通过名称设置目的地。\n*   `setReceiveTimeout`：更改此 `JmsTemplate`\
    \ 实例的接收超时时间。它适用于 JMS 消息的同步接收。该值以毫秒为单位，默认值为 0，这意味着接收调用将永远等待。\n*   `setPubSubDomain`：在发布/订阅和点对点通信之间切换。默认值为\
    \ false，使用点对点模式。\n*   `setDestinationDesolver`：指定负责将 JMS 目的地名称转换为 `javax.jms.Destination`\
    \ 实例的类。默认情况下，它使用 `DynamicDestinationResolver`。Spring 也提供了 `JndiDestinationResolver`。\n\
    *   `setMessageConverter`：将 JMS 消息的转换委托给一个单独的 Bean。默认情况下，它使用 `SimpleMessageConverter`。转换器将在本章后续部分进一步说明。\n\
    \n显然，所有这些存储在单个对象中的配置可能会引发疑问：这样一个对象/Bean 能否在多线程环境中使用？`JmsTemplate` 类的一个重要方面是它是线程安全的：我们可以在多个线程之间共享和使用\
    \ `JmsTemplate` 实例。\n\n当我们的实例配置完成后，我们可以使用它对 JMS 目的地或会话执行操作。它涵盖了 JMS 消息处理的多种功能：\n\
    \n*   *消息发送*方法：\n    *   `send`：将消息发送到默认或指定的目的地\n    *   `convertAndSend`：首先使用\
    \ `MessageConverter` 转换消息，然后将其发送到默认或指定的目的地\n    *   `sendAndReceive`：将消息发送到默认或指定的目的地，并异步接收回复消息\n\
    *   *同步消息接收*方法——默认情况下，这些操作会阻塞调用线程且无超时：\n    *   `receive`：同步接收消息。\n    *   `receiveSelected`：使用给定的消息选择器同步接收消息。消息选择器用于根据其过滤表达式过滤消息。\n\
    \    *   `receiveAndConvert`：同步接收消息并通过 `MessageConverter` 进行转换。\n    *   `receiveSelectedAndConvert`：结合了应用的消息选择器和消息转换器。\n\
    *   *浏览消息*的方法，即在不从 JMS 目的地删除消息的情况下读取消息：\n    *   `browse`：用于浏览所有消息。\n    *   `browseSelected`：用于浏览选定的消息；选定的消息通过\
    \ `BrowserCallback<T>` 进行缩小范围。\n*   针对 JMS 会话执行*自定义操作*的方法：\n    *   `execute`：注册操作回调，其中将传递\
    \ `Session` 对象。在此回调中，我们可以对 JMS `Session` 执行自定义操作。\n\n`JmsTemplate` 的另一个重要特性是它将受检异常\
    \ `javax.jms.JMSException` 转换为非受检异常 `org.springframework.jms.JmsException`。\n\n\
    释放 JMS 资源也很方便。当应用程序不再需要 `Connection` 和 `Session` 时，需要关闭它们。使用 JMS API 时，必须通过调用这两个\
    \ JMS 资源的 `close` 方法手动完成。但是，当我们使用 `JmsTemplate` 时，这种 JMS 资源的释放会在底层自动完成。\n\n清单\
    \ 5-21 展示了如何将 `JmsTemplate` 配置并注册为 Spring Bean。\n\n***清单 5-21***. 配置 JmsTemplate\
    \ (0507-sync-jms-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
    \nimport javax.jms.ConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.core.JmsTemplate;\n\
    \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public JmsTemplate\
    \ jmsTemplate(ConnectionFactory connectionFactory) {\n    JmsTemplate jmsTemplate\
    \ = new JmsTemplate(connectionFactory);\n    jmsTemplate.setReceiveTimeout(1000);\n\
        return jmsTemplate;\n  }\n}\n```\n\n在此例中，我们将使用 `JmsTemplate` 发送消息和同步接收消息。因此，为了避免可能阻塞读取\
    \ JMS 消息的线程，通常最好配置 `receiveTimeout` 属性。清单 5-22 展示了 JMS 消息发送实现可能的样子。\n\n***清单 5-22***.\
    \ 发送 JMS 消息 (0507-sync-jms-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
    \nimport lombok.extern.slf4j.Slf4j;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
