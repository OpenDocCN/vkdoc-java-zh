    sender classes common in the Spring JMS examples in this chapter. We can also
    have the same listener implementation as that of the success scenarios in this
    chapter (for example, in [Listing 6-14](#9781484207949_Ch06.xhtml#FPar15)). The
    only difference is the JMS configuration shown in [Listing 6-23](#9781484207949_Ch06.xhtml#FPar25).


    [***Listing 6-23***](#9781484207949_Ch06.xhtml#_FPar25). JMS Configuration of
    Success Scenario with Local Transaction (0610-transacted-listener-success)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.jms.ConnectionFactory;

    import javax.jms.Session;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.config.DefaultJmsListenerContainerFactory;


    @Configuration

    public class JmsConfiguration {

      @Bean

      public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(

          ConnectionFactory connectionFactory) {

        DefaultJmsListenerContainerFactory factory =

            new DefaultJmsListenerContainerFactory();

        factory.setConnectionFactory(connectionFactory);

        factory.setSessionTransacted(true);

        factory.setSessionAcknowledgeMode(Session.SESSION_TRANSACTED);

        return factory;

      }

    }

    ```


    This registers the `DefaultJmsListenerContainerFactory` bean with the name `jmsListenerContainerFactory`
    and sets the `sessionTransacted` property to `true` and `sessionAcknowledgeMode`
    to `Session.SESSION_TRANSACTED` to enable local JMS local transaction support.
    Similar support can be achieved with XML configuration, as shown in [Listing 6-24](#9781484207949_Ch06.xhtml#FPar26).


    [***Listing 6-24***](#9781484207949_Ch06.xhtml#_FPar26). XML JMS Configuration
    of Success Scenario with Local Transaction (File spring-jms-config.xml in Folder
    src/main/resources in Example Project 0612-transacted-xml)


    ```

