    总结


    本章讨论了 Spring 框架的远程调用支持。在这种同步通信中，客户端会被阻塞，直到远程服务完成其工作。


    通信中涉及的所有类（服务方法参数和返回类型）都需要进行序列化。无论是标准的 Java 序列化、CORBA，还是 Caucho 的 XML 二进制序列化，这都造成了一个显著的约束：无法对服务器
    API 进行版本管理。客户端/服务器契约的每一次变更都需要在双方进行对齐。因此，如果我们需要创建一个具有以下特征的服务器 API，则应避免使用这些技术：


    *   面向公众。

    *   不受我们控制。

    *   被大量客户端消费。如果服务器契约发生更改，所有客户端也需要随之更改。


    每种 Spring 远程调用抽象都使用了不同的传输协议和序列化机制组合：


    *   RMI 使用 Java 序列化和 Java 远程方法协议。

    *   RMI-IIOP 使用 Java 序列化和 Internet Inter-Orb 协议，这使得通信与 CORBA 兼容。

    *   HttpInvoker 使用 Java 序列化和 HTTP。

    *   Hessian 使用 Caucho 的二进制 XML 序列化和 HTTP。

    *   Burlap 使用 Caucho 的文本 XML 序列化和 HTTP。


    当需要选择远程调用方法时，传输协议和序列化机制可以缩小架构决策的范围。例如，如果需要与非 Java 应用程序通信，则只有 Hessian 或 RMI-IIOP
    是合适的（应避免使用 Burlap，因为其 Spring 抽象自 Spring 4 起已被弃用）。当我们需要通过 HTTP 通信时，只有 HttpInvoker
    和 Hessian 能够满足此要求。


    Spring 极大地简化了不同远程调用技术之间的转换，因为它使用相同的概念来暴露和消费服务。在暴露服务时，使用了导出服务的概念（`RmiServiceExporter`、`HttpInvokerServiceExporter`、`HessianServiceExporter`、`BurlapServiceExporter`）。在消费服务时，代理工厂
    Bean 机制贯穿所有远程调用抽象（`RmiProxyFactoryBean`、`HttpInvokerProxyFactoryBean`、`HessianProxyFactoryBean`、`BurlapProxyFactoryBean`）。所有这些抽象在不同远程调用技术中都具有相似的属性。这种
    API 的一致性降低了我们在需要切换远程调用技术时的学习曲线。


    当使用 RMI 时，使用 Spring 抽象而非标准 Java API 有许多好处。


    服务器端的好处如下：


    *   无需抛出受检异常

    *   无需实现或扩展侵入性的 RMI 类型

    *   允许在无需修改的情况下暴露业务服务

    *   在需要时处理 RMI 注册表的创建


    客户端的好处如下：


    *   将受检异常转换为运行时异常

    *   允许在无需修改客户端代码的情况下消费远程服务


    虽然每种远程调用方法都提供了一种实现分布式应用的简便方式，但如今在企业应用中已很少使用，因为它们会在应用之间造成紧密耦合。因此，如果不需要特定的远程调用技术，或者可以接受稍低的性能，那么在新项目中很可能会考虑使用
    SOAP 或特别是 RESTful Web 服务。


    第 3 章


    ![image](img/frontdot.jpg)


    Web 服务


    本章涵盖 Spring Web Services 项目。在解耦和性能方面，SOAP Web 服务可以被视为与远程过程调用（RPC）完全相反，因为 SOAP
    提供了非常高程度的解耦，但这并非没有代价。这种可变性的代价是可能由于 SOAP 使用的臃肿 XML 协议而出现性能问题。SOAP 服务的实现也很复杂。我们将深入探讨
    Spring 在该领域提供的支持，并展示 Spring 如何通过利用最佳实践和重用最现代的方法来帮助简化这一过程。


    Web 服务简介

    '
- fmt: "# The Software Development World and Web Services\n\nThe software development\
    \ world is like the fashion industry: it has trends. When it became clear that\
    \ distributed systems would be powering modern web sites and that the disadvantages\
    \ of remote procedure calls would push these technologies to the limits, the focus\
    \ of software development turned to decoupling.\n\nWeb services are highly interconnected\
    \ with service-oriented architecture (SOA), in which various pieces of functionality\
    \ are separated into stand-alone service applications communicating with one another.\
    \ These services are consumed by client-facing applications or other services.\
    \ Such architecture allows for a separation of concerns and low coupling. On the\
    \ other hand, it brings higher complexity, because a well-defined contract between\
    \ the consumer and the producer of the web service needs to be specified. When\
    \ all aspects of the contract are defined up front, services and applications\
    \ can be developed, tested, and deployed in isolation.\n\n`RPC` approaches may\
    \ be considered also, but tight coupling of remoting technologies is a big problem\
    \ for SOA, especially when the consumer of a web service is developed by a different\
    \ team, department, or company. So communication needs to occur via a protocol\
    \ that facilitates decoupling the client from the web service.\n\nAn important\
    \ requirement of web services is the ability to handle different versions of the\
    \ same service API. This is a killer for `RPC` technologies. Imagine a publicly\
    \ facing API of an application and various clients consuming it. When a change\
    \ or new feature needs to be implemented into the API, not all clients are keen\
    \ to update—because of the additional cost for them. We may end up with two groups\
    \ of clients using different contracts. Therefore, a protocol is needed, to handle\
    \ versioning.\n\nThis protocol is SOAP (originally known as the Simple Object\
    \ Access Protocol), which uses XML as its exchange format. SOAP is transport-protocol\
    \ agnostic, so we can use HTTP, Simple Mail Transfer Protocol (SMTP), Transmission\
    \ Control Protocol (TCP), User Datagram Protocol (UDP), Java Message Service (JMS),\
    \ or Extensible Messaging and Presence Protocol (XMPP) as a transport protocol.\
    \ Such variability doesn’t tie up the underlying network architecture. The XML\
    \ payload format is flexible, platform independent, and widely adopted. All major\
    \ platforms such as Java, .NET, C++, Ruby, PHP, Python, and Perl support it. Therefore,\
    \ it’s a good candidate for an exchange format fulfilling SOA requirements.\n\n\
    The highest level of decoupling the client from the web service occurs when the\
    \ client discovers the web-service capabilities and structure of the payload at\
    \ runtime. XML Schema Definition (XSD) and Web Services Description Language (WSDL)\
    \ can be used for this purpose. `XSD` defines the structure of the XML payload\
    \ provided or consumed by the web service, complex types, and validation rules\
    \ for certain data elements. So we can think of it as metadata for the web service\
    \ payload. The web service can validate received payloads against `XSD`. `WSDL`\
    \ is an XML-based description of the functionality provided by the web service.\
    \ It gathers the name of the service, the service methods provided, and the signatures\
    \ of the service methods (types of parameters and return values).\n\nWith this\
    \ concept, the client doesn’t need to know anything about the web service up front.\
    \ The XML payload can be constructed based on `XSD` and `WSDL` files on the fly.\
    \ But this approach also has downsides. Constructing an XML request based on `XSD`\
    \ and `WSDL` files isn’t trivial. Implementation of the web service is also more\
    \ complex with such metadata rules. And when a payload is generated dynamically\
    \ all the time, there are performance hits. Of course, we could omit the metadata\
    \ contract of the web service and tie down the client to the static payload structure.\
    \ But for such cases, there are less-verbose exchange formats (for example, JavaScript\
    \ Object Notation, or JSON). Verbosity of the XML format is one of the problems\
    \ pointed out by SOAP critics.\n\nSo let’s summarize the most important SOAP advantages\
    \ in comparison to remoting (`RPC`) technologies:\n\n*   *Decoupling*: Document-oriented\
    \ communication allows for versioning and discoverability.\n*   *Interoperability*:\
    \ Can connect various platforms easily and operate on top of various transport\
    \ protocols.\n\nAnd the disadvantages include the following:\n\n*   *Complexity*:\
    \ SOAP is much more complicated to implement, because it requires knowledge of\
    \ `XSD`, `WSDL`, XML marshalling, and the marshalling framework.\n*   *Performance*:\
    \ The verbosity of XML and the need for marshalling and verification against the\
    \ schema makes it perform less well.\n\n## Java Web Services\n\nJava is not the\
    \ only platform operating on top of the SOAP protocol. .NET is also a big player\
    \ in this space. But Java EE is definitely the biggest adopter of SOAP web services\
    \ concepts. Many libraries have evolved in the Java ecosystem to help with web\
    \ services development. Because SOAP relies on XML, it’s obvious that libraries\
    \ for marshalling into XML and unmarshalling from XML are crucial for SOAP communication.\n\
    \nLet’s look at the XML libraries for the major programming language platforms,\
    \ starting with Java. These libraries are categorized according to their different\
    \ approaches to XML processing:\n\n*   *Java*\n    *   Event-driven approach—application\
    \ listens to events for certain XML elements: Simple API for XML (SAX)\n    *\
    \   DOM-based approach—application loads the whole XML and parses it as a tree\
    \ structure: `JDOM`, `XOM`, `dom4j`, `TrAX`\n    *   Streaming API for XML (StAX):\
    \ Introduces the concept of a cursor within an XML document that is used for reading\
    \ forward and backward\n    *   Binding of XML to Java objects: Java Architecture\
    \ for XML Binding (JAXB), Castor XML, XMLBeans, XStream, JiBX\n    *   *.NET*:\
    \ `XmlSerializer`, `System.Xml`, .NET XML parser\n    *   *Python*: `ElementTree`,\
    \ `BeautifulSoup`, `MiniDom`/`PullDom`\n    *   *Ruby*: `Builder`, `Nokogiri`,\
    \ `REXML`, `XmlSimple`\n    *   *Perl*: Perl XML, `XML::Simple`\n    *   *JavaScript*:\
    \ `LibXmlJs`\n\nIt’s obvious from this list that many possibilities exist for\
    \ implementing XML-based web services. Let’s focus only on Java web services for\
    \ now. We have XML messages on one hand and Java objects on the other hand. The\
    \ easiest way to accomplish XML conversion is direct binding to Java objects.\
    \ But this approach is not suitable in every case. For example, if we have a really\
    \ big XML message that can’t be loaded into memory, we need to process it with\
    \ a lower-level XML-processing library.\n\nBut for SOAP implementations, binding\
    \ libraries are the best fit. Big messages in SOAP may indicate a design problem\
    \ in communication. That is why most Java web services nowadays are implemented\
    \ with Object to XML (OXM) binding libraries. `JAXB` is the main Java OXM player,\
    \ because it is part of the Java EE standards. `JAXB` technology also is useful\
    \ beyond SOAP, because it can handle JSON format.\n\nAs we described, XML marshalling\
    \ and unmarshalling are happening within SOAP communication. SOAP messages have\
    \ a specified high-level structure and need to conform to a formal contract (`XSD`/`WSDL`).\n\
    \nThe mandatory high-level structure of a SOAP message used for exchanging data\
    \ is as follows:"
  raw: "The software development world is like the fashion industry: it has trends.\
