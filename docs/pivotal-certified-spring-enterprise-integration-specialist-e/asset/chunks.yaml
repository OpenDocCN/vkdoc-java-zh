- fmt: "模拟资源`open()`、`update()`和`close()`操作已按预期为`RecordsReaderItemStream`和`StreamRecordWriter`处理。\n\
    \n## Java配置示例：ItemStream用法\n\n对于`ItemStream`的Java配置示例，我们使用与前一示例相同的所有类，但`BatchConfiguration`除外，如[清单9-90](#9781484207949_Ch09_2_Ext.xhtml#FPar94)所示。\n\
    \n[**清单9-90**](#9781484207949_Ch09_2_Ext.xhtml#_FPar94). Java配置示例：ItemStream (0924-item-stream-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter09;\nimport net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;\n\
    import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;\nimport org.springframework.batch.core.Job;\n\
    import org.springframework.batch.core.Step;\nimport org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;\n\
    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;\n\
    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    \n@Configuration\n@EnableBatchProcessing\npublic class BatchConfiguration {\n\
    \  @Bean\n  public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,\n\
    \      SimpleRecordReader simpleRecordReader,\n      SimpleRecordProcessor simpleRecordProcessor,\n\
    \      StreamRecordWriter StreamRecordWriter,\n      RecordsReaderItemStream recordsReaderItemStream)\
    \ {\n    return stepBuilderFactory.get(\"simpleRecordsStep\")\n        .<String,\
    \ String> chunk(4)\n        .reader(simpleRecordReader)\n        .processor(simpleRecordProcessor)\n\
    \        .writer(StreamRecordWriter)\n        .stream(recordsReaderItemStream)\n\
    \        .build();\n  }\n\n@Bean\n  public Job simpleRecordsJob(JobBuilderFactory\
    \ jobBuilderFactory, Step simpleRecordsStep) {\n    return jobBuilderFactory.get(\"\
    simpleRecordsJob\").start(simpleRecordsStep).build();\n  }\n}\n```\n\n请注意，这是前一示例中XML配置的镜像。在步骤构建中，我们使用`stream()`方法代替`<stream>`标签。输出结果与前一示例（[清单9-89](#9781484207949_Ch09_2_Ext.xhtml#FPar93)）相同。\n\
    \n## Job和Step继承\n\n有时我们需要为`Step`或`Job`定义通用配置，这些配置可被复用以定义各种`Step`或`Job`。使用Java配置时，我们通过组合或继承来实现此目的。但XML本身不提供开箱即用的组合方式。因此，SB\
    \ XML配置支持引入了`Step`或`Job`继承的概念。\n\n本示例复用了[清单9-69](#9781484207949_Ch09_2_Ext.xhtml#FPar73)中的`TeaJobListener`。[清单9-91](#9781484207949_Ch09_2_Ext.xhtml#FPar95)展示了XML配置。\n\
    \n[**清单9-91**](#9781484207949_Ch09_2_Ext.xhtml#_FPar95). Job和Step继承的XML配置（示例项目0925-job-inheritance的src/main/resource文件夹中的batch-config.xml文件）\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans:beans xmlns:beans=\"\
    http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n  xmlns=\"http://www.springframework.org/schema/batch\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/batch\n  http://www.springframework.org/schema/batch/spring-batch.xsd\n\
    \  http://www.springframework.org/schema/beans\n  http://www.springframework.org/schema/beans/spring-beans.xsd\"\
    >\n\n<step id=\"boilWaterStep\" abstract=\"true\">\n    <tasklet ref=\"boilWater\"\
    \ />\n  </step>\n  <step id=\"addTeaStep\" abstract=\"true\">\n    <tasklet ref=\"\
    addTea\" />\n  </step>\n  <step id=\"addWaterStep\" abstract=\"true\">\n    <tasklet\
    \ ref=\"addWater\" />\n  </step>\n\n<job id=\"prepareTeaJob\" abstract=\"true\"\
    >\n    <listeners>\n      <listener ref=\"teaJobListener\"/>\n    </listeners>\n\
    \  </job>\n\n<job id=\"prepareMildTeaJob\" parent=\"prepareTeaJob\">\n    <step\
    \ id=\"boilWaterForMildTea\" parent=\"boilWaterStep\" next=\"addTeaForMildTea\"\
    \ />\n    <step id=\"addTeaForMildTea\" parent=\"addTeaStep\" next=\"addWaterForMildTea\"\
    />\n    <step id=\"addWaterForMildTea\" parent=\"addWaterStep\"/>\n  </job>\n\n\
    <job id=\"prepareStrongTeaJob\" parent=\"prepareTeaJob\">\n    <step id=\"boilWaterForStrongTea\"\
    \ parent=\"boilWaterStep\" next=\"addTea1ForStrongTea\" />\n    <step id=\"addTea1ForStrongTea\"\
    \ parent=\"addTeaStep\" next=\"addTea2ForStrongTea\"/>\n    <step id=\"addTea2ForStrongTea\"\
    \ parent=\"addTeaStep\" next=\"addWaterForStrongTea\"/>\n    <step id=\"addWaterForStrongTea\"\
    \ parent=\"addWaterStep\"/>\n  </job>\n</beans:beans>\n```\n\n这里定义了两个`Job`。一个准备淡茶，另一个准备浓茶。我们还希望为两个`Job`注册相同的监听器，因此监听器定义位于抽象父`Job`\
    \ `prepareTeaJob`中。类似地，我们指定了抽象父`Step`，在其中使用了通用的准备茶`Tasklet`。这样，我们可以基于父`Step`的配置定义子`Step`。请注意，我们在同一个`Job`的两个步骤中复用了同一个父`Step`。\n\
    \n我们再次使用通用的`BatchConfiguration`和Spring Boot主类。运行后，可以在[清单9-92](#9781484207949_Ch09_2_Ext.xhtml#FPar96)中观察到输出。\n\
    \n[**清单9-92**](#9781484207949_Ch09_2_Ext.xhtml#_FPar96). Step和Job继承示例的输出"
