    为了指定要在服务器上执行的 SOAP 操作，需要将带有操作名称的 `SoapActionCallback` 传递给 `WebServiceTemplate`。如果使用
    WS-Addressing，则应使用 `ActionCallback` 代替 `SoapActionCallback`。


    拦截消息


    拦截消息是一种满足各种业务需求的强大机制。Spring 支持两种类型的拦截：


    *   服务器端拦截

    *   客户端拦截


    每种拦截都由不同的阶段组成。这些拦截接触点可以在客户端和服务器上进行配置（按以下顺序）：


    1.  处理请求——发生在消息从客户端发送或服务器处理之前

    2.  处理响应——发生在服务器向客户端发送响应之前

    3.  处理故障——发生在服务器和客户端，但仅在 Web 服务逻辑出现错误时

    4.  完成后——通常用于释放资源，因为它会在所有情况下发生


    前三个拦截阶段可以通过返回 `false` 值来终止请求的进一步处理。`false` 值表示处理链中出现问题，而 `true` 值表示拦截阶段成功。


    使用 Spring Web Services 项目的开发者可以利用现有的拦截器实现，或者创建自定义实现。


    服务器端拦截


    服务器端拦截由接口 `org.springframework.ws.server.EndpointInterceptor` 涵盖。Spring Web Services
    提供了该接口的多种现成实现：


    *   日志记录拦截器——`PayloadLoggingInterceptor`、`SoapEnvelopeLoggingInterceptor`

    *   负载处理拦截器——`PayloadValidatingInterceptor`、`PayloadTransformingInterceptor`

    *   安全拦截器——`XwsSecurityInterceptor`、`Wss4jSecurityInterceptor`


    除了内置拦截器之外，我们还可以创建 `EndpointInterceptor` 的自定义实现。清单 3-26 中显示了一个示例。


    ***清单 3-26***. 自定义服务器拦截器 (0305-ws-interceptor-service)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.interceptor.server;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;

    import org.springframework.ws.context.MessageContext;

    import org.springframework.ws.server.EndpointInterceptor;


    @Component

    public class UserInterceptor implements EndpointInterceptor {

      @Override

      public boolean handleRequest(MessageContext messageContext, Object endpoint)

          throws Exception {

        System.out.println("Endpoint handleRequest");

        return true;

      }


    @Override

      public boolean handleResponse(MessageContext messageContext, Object endpoint)

          throws Exception {

        System.out.println("Endpoint handleResponse");

        return true;

      }


    @Override

      public boolean handleFault(MessageContext messageContext, Object endpoint)

          throws Exception {

        System.out.println("Endpoint handleFault");

        return true;

      }


    @Override

      public void afterCompletion(MessageContext messageContext, Object endpoint,

          Exception ex) throws Exception {

        System.out.println("Endpoint afterCompletion");

      }

    }

    ```


    该拦截器是一个实现了 `EndpointInterceptor` 的普通 Spring Bean。每个拦截方法将根据本节开头解释的拦截阶段生命周期被调用。为了方便起见，还提供了
    `EndpointInterceptorAdapter` 的抽象实现，适用于开发者不需要使用所有拦截接触点的情况。该抽象实现对于可以中断处理的接触点简单地返回
    `true`。


    该机制的一个重要方面是注入的参数；通过 `messageContext` 参数，我们能够检查和操作消息。第二个参数的类型是 `Object`，因为它代表一个为消息提供服务的映射端点
    Bean。

