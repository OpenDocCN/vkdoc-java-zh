    \ and examples. The last sections were about client-side support and how to test\
    \ it.\n\nCHAPTER 5\n\n![image](images/frontdot.jpg)\n\nJava Message Service\n\n\
    The enterprise integration technology explained in this chapter is the Java Message\
    \ Service (JMS). It is different from the technologies discussed in previous chapters,\
    \ because it is an inherently asynchronous technology for exchanging messages.\n\
    \nIn the remoting, REST, and SOAP web services approaches, a client sends a request\
    \ and waits for a server response. Waiting for a response can be implemented synchronously\
    \ (the client thread is blocked until a response is received or times out) or\
    \ asynchronously (the client registers callback logic, which is executed when\
    \ the response arrives or the communication times out). But the HTTP communication\
    \ between them remains open, at least until the client receives a response.\n\n\
    JMS is different, because it doesn’t follow this approach of request-response.\
    \ Looking deeper, communication counterparts in JMS communication can’t be characterized\
    \ as a client/server relationship at all. JMS is a technology whereby a producer\
    \ sends a message to a consumer. But the message is not directly sent to the consumer\
    \ via a socket connection.\n\nA special middle component is used in JMS communication,\
    \ called a *destination*. We can think of it as storage for messages. The producer\
    \ sends a message to this destination and then doesn’t care about this message\
    \ anymore. The message is stored in the destination and sits there until it gets\
    \ attention from a consumer or consumers. When the consumer is ready, it reads\
    \ the message from the destination. So the producer and consumer are *highly decoupled*\
    \ from each other: they don’t need to know anything about the other side of this\
    \ communication. The only important aspect is to know how to send/receive the\
    \ message to/from destination.\n\nSuch communication is *asynchronous*, because\
    \ the producer doesn’t wait for the consumer to receive the message. There is\
    \ no guarantee that the message will be delivered at all. If there’s no application\
    \ consuming messages from the destination, the message could sit in the destination\
    \ theoretically forever.\n\nAnother important attribute of this type of communication\
