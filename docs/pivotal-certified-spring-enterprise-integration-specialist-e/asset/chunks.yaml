    ***清单 3-16***. 使用 MessageDispatcherServlet 的 XML Servlet 描述符配置 (0301-ws-xmlconfig-client)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <web-app xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://xmlns.jcp.org/xml/ns/javaee"

      xsi:schemaLocation="http://java.sun.com/xml/ns/javaee

        http://java.sun.com/xml/ns/javaee/web-app.xsd">

      <display-name>0301-ws-xmlconfig-service</display-name>

      <servlet>

        <servlet-name>web-service</servlet-name>

        <servlet-class>org.springframework.ws.transport.http.MessageDispatcherServlet

        </servlet-class>

        <init-param>

          <param-name>contextConfigLocation</param-name>

          <param-value>classpath:web-service-config.xml</param-value>

        </init-param>

        <init-param>

          <param-name>transformWsdlLocations</param-name>

          <param-value>true</param-value>

        </init-param>

        <load-on-startup>1</load-on-startup>

      </servlet>

      <servlet-mapping>

        <servlet-name>web-service</servlet-name>

        <url-pattern>/*</url-pattern>

      </servlet-mapping>

    </web-app>

    ```


    这个 Servlet 配置相当常见。`MessageDispatcherServlet` 被用作 Servlet 类。如果我们没有指定 `contextConfigurationLocation`
    参数，Spring 会尝试在文件 `{servlet-name}-servlet.xml` 中查找 Spring 配置。但在这个例子中，我们使用了显式方法，从类路径（位于
    `src/main/resources` 目录）加载 `web-service-config.xml` 上下文配置。


    参数 `transformWsdlLocations` 默认值为 `false`。如果设为 `true`，Spring 会将 WSDL 中的 `location`
    元素视为相对地址，并根据从客户端接收到的 URL 来转换 WSDL 的 `location` 元素。因此，默认情况下 Spring 不会进行此转换，WSDL
    的 `location` 元素是硬编码的。但硬编码不适合专业的软件开发，因为同一个应用程序工件会被部署到不同的环境（例如开发、QA、性能和生产环境）。所以，我们几乎总是希望将
    `transformWsdlLocations` 配置为 `true`。


    清单 3-16 包含了 Servlet 配置中剩余的两个元素。`load-on-startup` 配置告诉 Servlet 容器，我们不希望使用延迟初始化特性。因此，我们的
    Servlet 会在 Servlet 容器启动时被初始化。否则，Servlet 会在第一个请求到达时才被初始化。最后，`servlet-mapping` 元素指定了
    Servlet 的相对根 URL。


    在 Java 世界中，正发生着从 XML 配置向注解配置的重大转变。Spring Web Services 项目在这方面也不例外。对 Servlet 3.0
    Java 配置的增强支持是在 2.2 版本中引入的。


    清单 3-17 中的示例与清单 3-16 中的 `web.xml` 配置具有类似的效果。


    ***清单 3-17***. 使用 MessageDispatcherServlet 的 Java Servlet 描述符配置 (0302-ws-javaconfig-service)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.javaconfig.server;


    import org.springframework.ws.transport.http.support.

             AbstractAnnotationConfigMessageDispatcherServletInitializer;


    public class WsServletinitializer extends

      AbstractAnnotationConfigMessageDispatcherServletInitializer {


    @Override

      protected Class<?>[] getRootConfigClasses() {

        return null;

      }


    @Override

      protected Class<?>[] getServletConfigClasses() {

        return new Class[] { ServerConfiguration.class };

      }

      @Override

      protected String[] getServletMappings() {

        return new String[] { "/*" };

      }

    }

    ```


    `AbstractAnnotationConfigMessageDispatcherServletInitializer` 类是 `WebApplicationInitializer`
    的一个抽象实现，后者是在 Spring 世界中帮助进行程序化 Servlet 配置的接口。如果类路径中存在 Servlet 容器，Spring 会自动查找
    `WebApplicationInitializer` 的实现。


    当在类路径中检测到 `AbstractAnnotationConfigMessageDispatcherServletInitializer` 的实现时，Spring
    会在底层配置 `MessageDispatcherServlet`。Spring Servlet 上下文配置在 `ServerConfiguration`
    类中定义，该类使用 `@Configuration` 注解来定义基于 Java 的 Spring 上下文。对于这个示例，我们不需要根 Spring 上下文，因此可以从
    `getRootConfigClasses()` 返回 `null`。这个 Servlet 配置的最后一部分是 Servlet URL 映射，它定义了 Servlet
    所在的相对地址。但默认的 `AbstractAnnotationConfigMessageDispatcherServletInitializer` 使用在其某个
    Servlet 初始化器父类中定义的 `/services` 值。我们的示例使用了 `/*`。


    清单 3-17 突出展示了 Spring Web Services Servlet 配置的一种相对较新的方法。但由 Spring Boot 项目引入的一种更现代的方法如清单
    3-18 所示。


    ***清单 3-18***. 使用 Spring Boot 进行 Servlet 注册 (0303-ws-boot-service)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.boot.server;


    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.boot.context.embedded.ServletRegistrationBean;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ws.config.annotation.EnableWs;

    import org.springframework.ws.transport.http.MessageDispatcherServlet;

    import org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;


    @EnableWs

    @Configuration

    @ComponentScan

    @EnableAutoConfiguration

    public class ServerConfiguration {

      public static final String NAMESPACE =

          "http://localhost:10303/0303-ws-boot-service";


    @Bean

      public SimpleWsdl11Definition userDetails() {

        return new SimpleWsdl11Definition(new ClassPathResource("userDetails.wsdl"));

      }


    @Bean

      public ServletRegistrationBean dispatcherServlet(

          ApplicationContext applicationContext) {

        MessageDispatcherServlet servlet = new MessageDispatcherServlet();

        servlet.setApplicationContext(applicationContext);

        servlet.setTransformWsdlLocations(true);

        return new ServletRegistrationBean(servlet, "/*");

      }

    }

    ```


    `@ComponentScan` 和 `@Configuration` 注解应该已经很熟悉了。这个 Spring 配置类会扫描当前包及其子包以查找 Spring
    组件。`@EnableWs` 用于启用 Spring Web Services 支持。


    另一个注解是 `@EnableAutoConfiguration`。它只有一行，但其影响非常大。Spring Boot 会查看应用程序使用的依赖项集合，并据此猜测所需的
    Spring 配置。它会开箱即用地创建一些默认的 Bean。在这个例子中，我们需要它来自动配置嵌入式 Servlet 容器。

