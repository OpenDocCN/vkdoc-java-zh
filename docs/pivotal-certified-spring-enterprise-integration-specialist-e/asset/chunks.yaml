    \ that they are represented on the client as expected. The classes that help us\
    \ with it are as follows:\n\n- `MockWebServiceServer` is used to simulate the\
    \ client and to send requests.\n- `org.springframework.ws.test.client.ResponseCreator`\
    \ / `org.springframework.ws.test.client.ResponseCreators` provides support recording\
    \ the expected responses into the fake server. It will be used to send responses\
