    \ Spring Boot Main Class for JTA Examples (0703-jta-spring-boot)\n\n```java\n\
    package net.lkrnac.book.eiws.chapter07;\n\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
    \n@SpringBootApplication\n@EnableScheduling\npublic class JtaApplication {\n \
    \   public static void main(String[] args) throws Exception {\n        SpringApplication.run(JtaApplication.class,\
    \ args);\n    }\n}\n```\n\nThis Spring Boot main class uses the `@SpringBootApplication`\
    \ annotation to enable a Spring Boot scan for opinionated configuration of the\
    \ Spring application. It does a component scan of the current package plus subpackages\
    \ and scans classpath dependencies to enable features provided by these libraries.\
    \ In this case, it creates the necessary Spring infrastructure for the following:\n\
    \n*   Atomikos JTA transaction manager\n*   Embedded HornetQ JMS server and `JmsTemplate`\
    \ with XA support\n*   H2 embedded database and `JdbcTemplate` with XA support\n\
