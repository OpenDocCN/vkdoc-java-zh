    \ codes\n\nLower-level Abstraction Injection\n\nWith these annotations, we can\
    \ inject various lower-level HTTP message abstractions into our controller methods.\
    \ But Spring also provides annotation-free injections. If, for some reason, we\
    \ need to access lower-level abstractions of the HTTP message, Spring can inject\
    \ these types:\n\nServlet Message Abstractions\n\n*   Servlet doesn’t necessarily\
    \ need to use HTTP, so these abstractions don’t contain HTTP-specific data.\n\
    *   Most generic message abstractions conform to the Java Servlets API.\n*   `javax.servlet.ServletRequest`\
    \ is the interface that represents an abstraction for the servlet request.\n*\
    \   `javax.servlet.ServletResponse` is the interface that represents an abstraction\
    \ for the servlet request.\n\nJava EE HTTP Message Abstractions"
