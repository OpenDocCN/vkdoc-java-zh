    另一个问题是无法使用同一 API 契约的不同版本。当然，契约应尽可能保持稳定，但有时仍需变更。其他方法（如 SOAP 或 REST）允许在不修改客户端的情况下扩展
    API，而 RMI 序列化并不适合此类变更。RMI 方法签名中使用的任何类型变更都必须在客户端同步更新。


    RMI 的另一个显著缺点是只能与 JVM 运行时通信。这一问题可通过基于 CORBA 的 RMI 实现（RMI-IIOP）解决。CORBA 是由对象管理组织（OMG）定义的标准，专为不同平台间的通信而设计。Spring
    中的 RMI-IIOP 与纯 RMI 类似，唯一区别在于需要为 Spring RMI 类添加 JNDI 前缀。例如，对于 RMI-IIOP，我们将使用`JndiRmiServiceExporter`替代`RmiServiceExporter`。但即便
    CORBA 曾被视为实现分布式系统的有前景技术，由于协议及其实现存在的各种问题，它并未获得广泛采用。


    ![Image](img/sq.jpg) **注意** 深入探讨 CORBA 及其问题已超出本书范围。维基百科是很好的研究起点：`https://en.wikipedia.org/wiki/Common_Object_Request_Broker_Architecture#Problems_and_criticis`m


    RMI 的这些弱点可能引发质疑，包括为何还要使用 RMI。但它确实还有一个优势（除了简单性和优于 SOAP/REST 的性能）：无需 Web 服务器即可通信。纯
    RMI 可以在不借助额外抽象或库的情况下实现 JVM 间通信。这在需要远程通信的基于 Java 的嵌入式系统中非常实用。


    Spring RMI 总结


    需要牢记的是，与纯 Java RMI API 相比，Spring 提供了诸多优势。首先，在服务端：


    *   将服务端业务逻辑与远程协议解耦，因为我们可以直接暴露业务服务而无需修改。

    *   服务方法无需抛出`java.rmi.RemoteException`。

    *   服务接口无需继承`java.rmi.Remote`。

    *   服务实现无需继承`java.rmi.server.UnicastRemoteObject`。

    *   服务构造函数无需抛出`java.rmi.RemoteException`。

    *   Spring 可自动完成 RMI 注册表的绑定。


    其次，在客户端：


    *   调用远程方法时无需修改现有代码，因为使用服务方法时客户端无需处理受检异常`java.rmi.RemoteException`。Spring 会将其转换为非受检异常`RemoteAccessException`。

    *   将客户端业务逻辑与远程机制解耦，因此可轻松替换远程协议。


    Spring HttpInvoker


    HttpInvoker 是一种与 RMI 类似的技术。它也使用标准 Java 序列化和反序列化，但采用不同的协议传输序列化数据。RMI 使用 JRMP，RMI-IIOP
    使用 CORBA。而顾名思义，HttpInvoker 使用 HTTP。这可能是当今使用最广泛的协议，因为它支撑着整个 Web。HTTP 相比其他协议具有显著优势，因为网络基础设施最有可能广泛支持它。例如，RMI
    或 CORBA 可能被防火墙规则阻止，但大多数防火墙都启用了 HTTP。


    执行远程调用时，它使用 HTTP POST 请求，并通过标准 Java 序列化对参数和响应值进行序列化。因此其性能与 RMI 相近。但 HttpInvoker
    被 Spring 团队官方推荐为首选远程方法，因为它无需使用任何特殊的远程契约（远程接口、远程异常、代理），也不依赖 RMI 注册表机制。这就是为什么 Spring
    文档认为 HttpInvoker 比其他远程机制更轻量级。


    HttpInvoker 可通过多种方式提供服务：


    *   通过 Servlet 容器（Java EE）

    *   通过`HttpRequestHandlerServlet`（无 Spring MVC 支持）

    *   通过`DispatcherServlet`（有 Spring MVC 支持）

    *   通过简单的 Java HTTP 服务器实现（Java SE）


    最后一种实现无需特殊运行时，标准 Java 运行时即可。而前两种则需要 Java EE Servlet 容器。


    每种 HttpInvoker 解决方案都采用类似的方法暴露 Bean。它将目标服务 Bean 和服务接口封装到`HttpInvokerServiceExporter`/`SimpleHttpInvokerServiceExporter`中。该
    Bean 在 Spring 容器中注册，并通过前述 HTTP 通信机制暴露。让我们通过示例探索每种方法。清单 2-14 包含一个将被暴露的服务接口和实现示例。


    ***清单 2-14***. 共享接口与服务实现


    ```

    public interface BarService {

      String serveBar(String param);

    }


    import org.springframework.stereotype.Service;


    @Service

    public class BarServiceImpl implements BarService {

      @Override

      public String serveBar(String param) {

        return "Bar service response to parameter: " + param;

      }

    }

    ```


    该服务接口契约和服务实现将用于本章所有 HttpInvoker 示例。


    通过 HttpRequestHandlerServlet 提供 HttpInvoker 服务


    通过`HttpRequestHandlerServlet`提供 HttpInvoker 服务的示例可在项目`0204-http-invoker-handler-servlet-java-config`和`0205-http-invoker-handler-servlet-xml-config`的代码示例中找到。首先，我们需要将服务接口封装到`HttpInvokerServiceExporter`中，并将其注册为
    Spring Bean，如清单 2-15 所示。


    ***清单 2-15***. HttpInvoker 服务端配置示例


    ```

    package net.lkrnac.book.eiws.chapter02.httpinvoker.handlerservlet.javaconfig.server;


    import net.lkrnac.book.eiws.chapter02.httpinvoker.

             handlerservlet.javaconfig.shared.BarService;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter;


    @Configuration

    @ComponentScan

    public class ServerConfiguration {

      @Bean

      public HttpInvokerServiceExporter barExporter(BarService barService) {

        HttpInvokerServiceExporter httpInvokerServiceExporter =

            new HttpInvokerServiceExporter();

        httpInvokerServiceExporter.setService(barService);

        httpInvokerServiceExporter.setServiceInterface(BarService.class);

        return httpInvokerServiceExporter;

      }

    }

    ```


    这是一个非常直接的 Spring Java 配置，它扫描当前包（及子包）中的 Spring 组件，并注册一个服务导出器 Bean。请注意，该 Bean 的名称为`barExporter`（默认情况下与
    Bean 方法名相同）。Bean 名称很重要，因为它需要与 Servlet 描述符配置中配置的 Servlet 名称匹配。目标服务`barService`实例通过`HttpInvokerServiceExporter.setService`方法注入和配置。如您所见，我们还需要指定服务接口。相同
    Bean 的 XML 配置如清单 2-16 所示。


