- fmt: 'As you can see, this configuration-heavy example also is reflected in the
    output-heavy listing. But if you carefully step through it, you realize that the
    interceptions are happening as we expected.


    ## Java Configuration of Chunk-Oriented Processing Listeners


    Let’s skip the verbose listener implementations for this example. The listeners
    for `Chunk`, `ItemReader`, `ItemProcessor`, and `ItemWriter` don’t implement interfaces,
    but rather use annotations. The difference in this approach is that we are not
    forced to inject any parameters and are allowed to name interception methods differently.
    You can take a look at the `0922-chunk-listener-javaconfig` example if you’re
    interested in how these listeners are defined. [Listing 9-85](#9781484207949_Ch09_2_Ext.xhtml#FPar89)
    shows the Java configuration.


    [***Listing 9-85***](#9781484207949_Ch09_2_Ext.xhtml#_FPar89). Java Configuration
    of Chunk-Oriented Processing Listeners Example (0922-chunk-listener-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.process.SimpleRecordProcessor;

    import net.lkrnac.book.eiws.chapter09.read.SimpleRecordReader;

    import net.lkrnac.book.eiws.chapter09.write.SimpleRecordWriter;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step simpleRecordsStep(StepBuilderFactory stepBuilderFactory,

          SimpleRecordReader simpleRecordReader,

          SimpleRecordProcessor simpleRecordProcessor,

          SimpleRecordWriter simpleRecordWriter,

          SimpleItemReaderListener simpleItemReaderListener,

          SimpleItemProcessListener simpleItemProcessListener,

          SimpleItemWriterListener simpleItemWriterListener,

          SimpleChunkListener simpleChunkListener) {

        return stepBuilderFactory.get("simpleRecordsStep")

            .<String, String> chunk(4)

            .reader(simpleRecordReader)

            .listener(simpleItemReaderListener)

            .processor(simpleRecordProcessor)

            .listener(simpleItemProcessListener)

            .writer(simpleRecordWriter)

            .listener(simpleItemWriterListener)

            .listener(simpleChunkListener)

            .build();

      }


    @Bean

      public Job simpleRecordsJob(JobBuilderFactory jobBuilderFactory,

          Step simpleRecordsStep) {

        return jobBuilderFactory.get("simpleRecordsJob")

            .start(simpleRecordsStep)

            .build();

      }

    }

    ```


    The number of injected beans for the `Step` definition is far beyond the horizon
    of a wise parameter count. But as we wanted to highlight how to configure all
    listener types, please ignore that in this case. The order of registering doesn’t
    matter, because listeners are for different phases of batch processing. If we
    registered various listeners for the same batch-processing phase, they would be
    executed in the order that they were registered.


    The main class is again reused from previous examples, and when we run it, we
    get the same output as in the previous example ([Listing 9-84](#9781484207949_Ch09_2_Ext.xhtml#FPar88)).


    ## ItemStream


    Chunk-oriented processing often requires acquiring, updating, and releasing resources.
    Of course, Spring tries to handle these operations for us, for the most part.
    Examples can include opening and closing JMS or DB connections.


    But for some technologies out there, Spring doesn’t cover opening and closing
    their resources for us. These resources are often in the form of a stream, so
    SB came up with the name `ItemStream`. If we need to open, update, or close such
    resources in chunk-oriented processing, we can rely on this SB feature. We can
    think of it as a special interceptor executed at the right time to open or close
    the resource.


    This support comes in three forms:


    *   `ItemStream`: Stand-alone interface defining `open`, `update`, and `close`
    actions as interception points. The advantage is that we can use this implementation
    separately from `ItemReader` and `ItemWriter`.

    *   `ItemStreamReader<T>`: A convenience subinterface for `ItemReader<T>` and
    `ItemStream`. The advantage is to define the `ItemReader` as a stream-aware SB
    component out of the box.

    *   `ItemStreamWriter<S>`: A convenience subinterface for `ItemWriter<S>` and
    `ItemStream`. The advantage is to define `ItemWriter` as a stream-aware SB component
    out of the box.


    Notice that `ItemStreamWriter<S>` uses a different generic placeholder `S` than
    `ItemStreamReader<T>`. This is because we follow the notion of `ItemProcessor<T,
    S>`, where `T` is the type before the processing is passed into the processor,
    and `S` is the type after the processing is returned from the processor. Therefore,
    generic types after processing are marked with the placeholder `S` in this book.


