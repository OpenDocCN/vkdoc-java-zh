    execute the HTTP REST request against our server. We can use the Chrome plug-in
    DHC - REST/HTTP API Client (`https://chrome.google.com/webstore/detail/dhc-resthttp-api-client/aejoelaoggembcahagimdiliamlcdmfm`)
    for this purpose. [Figure 4-2](#9781484207949_Ch04.xhtml#Fig2) shows the `POST`
