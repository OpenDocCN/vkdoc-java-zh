    \ existing status and close the Spring context. [Listing 9-25](#9781484207949_Ch09_1.xhtml#FPar28)\
    \ shows the output when we run this main class.\n\n[***Listing 9-25***](#9781484207949_Ch09_1.xhtml#_FPar28).\
    \ Output of JobLauncher XML Example\n\n```\n16:15:58.829 [main] INFO  o.s.b.c.l.support.SimpleJobLauncher\
