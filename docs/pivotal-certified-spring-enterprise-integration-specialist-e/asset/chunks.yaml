    [Figure 9-5](#9781484207949_Ch09_1.xhtml#_Fig5). Editing SB component attributes


    Tasklet Step Example with Java Configuration


    Preparing tea with a Java configuration is shown in [Listing 9-21](#9781484207949_Ch09_1.xhtml#FPar24).


    [***Listing 9-21***](#9781484207949_Ch09_1.xhtml#_FPar24). Batch Configuration
    of Tasklet Step Example with Java Configuration ( 0905-tasklet-step-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddWater;

    import net.lkrnac.book.eiws.chapter09.step.tea.BoilWater;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step boilWaterStep(StepBuilderFactory stepFactory, BoilWater boilWater)
    {

        return stepFactory.get("boilWaterStep").tasklet(boilWater).build();

      }


    @Bean

      public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {

        return stepFactory.get("addTeaStep").tasklet(addTea).build();

      }


    @Bean

      public Step addWaterStep(StepBuilderFactory stepFactory, AddWater addWater)
    {

        return stepFactory.get("addWaterStep").tasklet(addWater).build();

      }


    @Bean

      public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,

          @Qualifier("boilWaterStep") Step boilWaterStep,

          @Qualifier("addTeaStep") Step addTeaStep,

          @Qualifier("addWaterStep") Step addWaterStep) {

        return jobBuilderFactory.get("prepareTeaJob")

            .start(boilWaterStep)

            .next(addTeaStep)

            .next(addWaterStep)

            .build();

      }

    }

    ```


    Each custom `Tasklet` (`BoilWater`, `AddTea`, `AddWater`) needs to be wrapped
    into `TaskletStep` so that we can use it as part of the `Job`. We create a `Step`
    instance for each `Tasklet` by using `StepBuilderFactory`. The `get()` method
    creates an instance of `StepBuilder` based on the given name of the `Step`, the
    `tasklet()` method creates a `TaskletStepBuilder` instance based on the given
    `Tasklet`, and finally, the `build()` call creates the `Step` instance. We register
    this instance as a Spring bean.


    When we create `Job` in the `prepareTeaJob()` method, we need to autowire each
    `Step` via the bean name instead of the type, because we have three beans of type
    `Step` in the Spring context. This is a little bit of annoying boilerplate code
    when we define an SB configuration with Java. After we inject all the steps and
    `JobBuilderFactory`, we create the `Job` instance and also register it as a Spring
    bean.


    The main class for this example is the standard Spring Boot main class. When we
    run it, we see output similar to that of the previous example ([Listing 9-20](#9781484207949_Ch09_1.xhtml#FPar23)).


    JobLauncher


    `JobLauncher` is the interface used to execute SB jobs registered in the Spring
    context. Spring provides a `SimpleJobLauncher` implementation of this interface
    out of the box.


    So far, we haven’t needed to use it, because every `Job` was executed immediately
    after the Spring context was initialized by Spring Boot. We also didn’t need to
    create the `JobLauncher` instance, as the `@EnableBatchProcessing` annotation
    created it for us. But automatic execution at the application’s start is not always
    suitable, and we may need to explicitly execute a particular job.


    [Listing 9-22](#9781484207949_Ch09_1.xhtml#FPar25) shows the signature of the
    `JobLauncher` interface.


    [***Listing 9-22***](#9781484207949_Ch09_1.xhtml#_FPar25). JobLauncher Interface


    ```

    package org.springframework.batch.core.launch;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.JobExecution;

    import org.springframework.batch.core.JobParameters;

    import org.springframework.batch.core.JobParametersInvalidException;

    import org.springframework.batch.core.repository.JobExecutionAlreadyRunningException;

    import org.springframework.batch.core.repository.JobInstanceAlreadyCompleteException;

    import org.springframework.batch.core.repository.JobRestartException;


    public interface JobLauncher {

      public JobExecution run(Job job, JobParameters jobParameters)

         throws JobExecutionAlreadyRunningException, JobRestartException,

                 JobInstanceAlreadyCompleteException, JobParametersInvalidException;

    }

    ```


    `JobLauncher` declares only one method, `run()`, which returns an instance of
    `JobExecution`. When the client executes this method, the execution is by default
    synchronous; the caller is blocked until the job finishes. In such a case, the
    resulting status of the job is indicated by `JobExecution.getExitStatus()`. When
    we use synchronous execution, the exit status is typically `ExitStatus.COMPLETED`
    or `ExitStatus.FAILED`.


    But in some cases, we don’t want to block the caller. For these cases, implementation
    of `SimpleJobLauncher` can be configured with `TaskExecutor`. With this configuration,
    the `SimpleJobLauncher.run()` call doesn’t block, and the existing status may
    configured to `ExitStatus.UNKNOWN`, `ExitStatus.STARTING`, or `ExitStatus.STARTED`,
    until the `Job` is finished.


    JobLauncher Example with XML Configuration


    In this case, we don’t use Spring Boot. [Listing 9-23](#9781484207949_Ch09_1.xhtml#FPar26)
    shows the XML configuration.


    [***Listing 9-23***](#9781484207949_Ch09_1.xhtml#_FPar26). XML Configuration of
    JobLauncher Example (File batch-beans-config.xml in Folder src/main/resources
    of Example Project 0906-job-launcher-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context.xsd">


    <context:component-scan base-package="net.lkrnac.book.eiws.chapter09" />


    <bean id="transactionManager"

        class="org.springframework.batch.support.transaction.ResourcelessTransactionManager"
    />


    <bean id="jobRepository"

        class="org.springframework.batch.core.repository.support.MapJobRepositoryFactoryBean">

        <property name="transactionManager" ref="transactionManager" />

      </bean>


    <bean id="jobLauncher"

        class="org.springframework.batch.core.launch.support.SimpleJobLauncher">

        <property name="jobRepository" ref="jobRepository" />

      </bean>

    </beans>

    ```'
