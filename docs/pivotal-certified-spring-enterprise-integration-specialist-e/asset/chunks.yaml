    Similar to JTA XML configuration, we need to wrap our H2 data source into `AtomikosXADataSourceWrapper`.
    This allows the H2 database to participate in global transactions. To enable use
    of handy Spring JDBC abstractions, we define the `JdbcTemplate` based on this
    XA data source. [Listing 7-12](#9781484207949_Ch07.xhtml#FPar13) shows the JMS
    configuration.


    [***Listing 7-12***](#9781484207949_Ch07.xhtml#_FPar13). Java Configuration of
    JMS XA Data Source (0702-jta-java-config)


    ```

    package net.lkrnac.book.eiws.chapter07;


    import java.util.Hashtable;

    import javax.jms.ConnectionFactory;

    import javax.jms.Session;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.jms.config.DefaultJmsListenerContainerFactory;

    import org.springframework.jms.core.JmsTemplate;


    @Configuration

    @EnableJms

    public class JmsConfiguration {

      @Bean

      public InitialContext initialContext() throws NamingException {

        Hashtable<Object, Object> env = new Hashtable<Object, Object>();

        env.put("java.naming.factory.initial",

            "org.jnp.interfaces.NamingContextFactory");

        env.put("java.naming.factory.url.pkgs",

            "org.jboss.naming:org.jnp.interfaces");

        env.put("java.naming.provider.url", "jnp://localhost:1099");

        return new InitialContext(env);

      }


    @Bean

      public ConnectionFactory connectionFactory(InitialContext initialContext)

          throws NamingException {

        return (ConnectionFactory) initialContext.lookup("/XAConnectionFactory");

      }


    @Bean

      public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {

        return new JmsTemplate(connectionFactory);

      }


    @Bean

      public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(

          ConnectionFactory connectionFactory) {

        DefaultJmsListenerContainerFactory factory =

            new DefaultJmsListenerContainerFactory();

        factory.setConnectionFactory(connectionFactory);

        factory.setSessionTransacted(true);

        factory.setSessionAcknowledgeMode(Session.SESSION_TRANSACTED);

        return factory;

      }

    }

    ```


    This configuration class enables JMS via the `@EnableJms` annotation and defines
    the `InitialContext` bean necessary for HornetQ access. The `ConnectionFactory`
    bean retrieves the `XAConnectionFactory` implementation from this HornetQ context.
    `JmsTemplate` and `DefaultJmsListenerContainerFactory` are standard Spring JMS
    beans explained in the previous chapter. *The important configuration is enabling
    transacted mode of the listener container; otherwise, this listener container
    wouldn’t be plugged into the JTA infrastructure.* The main class of this example
    is highlighted in [Listing 7-13](#9781484207949_Ch07.xhtml#FPar14).


