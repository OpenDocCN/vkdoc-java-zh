    So now that you know how to create `WebServiceTemplate`, let’s take a look at
    its use in [Listing 3-24](#9781484207949_Ch03.xhtml#FPar29).


    [***Listing 3-24***](#9781484207949_Ch03.xhtml#_FPar29). WebServiceTemplate for
    Payload Root Routing(0303-ws-boot-client)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.boot.client;


    import net.lkrnac.book.eiws.chapter03.ws.boot.model.UserDetailsResponse;

    import net.lkrnac.book.eiws.chapter03.ws.boot.model.UserRequest;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;

    import org.springframework.ws.client.core.WebServiceTemplate;


    @Component

    public class WebServiceClient {

      private WebServiceTemplate webServiceTemplate;


    @Autowired

      public WebServiceClient(WebServiceTemplate webServiceTemplate) {

        this.webServiceTemplate = webServiceTemplate;

      }


    public UserDetailsResponse getUserDetails(String email) {

        UserRequest request = new UserRequest();

        request.setEmail(email);


    UserDetailsResponse userDetails =

            (UserDetailsResponse) webServiceTemplate.marshalSendAndReceive(request);

        return userDetails;

      }

    }

    ```


    The method `getUserDetails` uses an injected `WebServiceTemplate` to send request
    and receive response POJOs via the method `marshalSendAndReceive`. You may notice
    that this method has four responsibilities: it marshals the message, sends it
    to the client, waits for a response, and unmarshals it. For marshalling and unmarshalling,
    it uses the instance of un/marshaller we configured during the creation of `WebServiceTemplate`.
    Request and response POJOs were generated by `maven-jax2b-plugin` in [Listing
    3-19](#9781484207949_Ch03.xhtml#FPar24).


    If we need to use a custom marshalling algorithm, we can use the `WebServiceTemplate`
    method `sendAndReceive`. This method sends a message and waits for a response,
    leaving the marshalling concerns to the caller logic.


    [Listing 3-24](#9781484207949_Ch03.xhtml#FPar29) covers routing based on the payload
    root XML element. In case of the `SOAPAction` header routing, we would need to
    specify the target SOAP action. It is highlighted in [Listing 3-25](#9781484207949_Ch03.xhtml#FPar30).


