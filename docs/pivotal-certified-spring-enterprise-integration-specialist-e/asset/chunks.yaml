    JobRepository


    我们之前提到过，SB 需要配置 `JobRepository` bean。这个 bean 确保每个 `JobExecution` 和 `StepExecution`
    的状态（或 SB 使用的其他状态）都持久化到数据存储中。这个数据存储可以是 Spring 能够使用的任何类型的 SQL 数据库。这种访问基于 Spring
    上下文中定义的 `DataSource` bean。


    SB 使用定义的数据库模式来存储其元数据，并提供了 SQL 脚本来为最常用的关系数据库创建或删除模式。这些模式位于 `spring-batch-core`
    库的 `org/springframework/batch/core` 文件夹中。例如，如果我们想为 PostgreSQL 数据库创建模式，可以使用 SQL
    脚本 `classpath:/org/springframework/batch/core/schema-postgresql.sql` 来创建 SB 模式，并使用脚本
    `classpath:/org/springframework/batch/core/schema-drop-postgresql.sql` 来删除它。


    这种机制非常强大，因为开发者无需关心批处理执行状态的持久化。SB 会自动持久化执行状态，因此很容易处理诸如 `Job` 在执行过程中被终止，而我们希望从数据库执行中断点继续执行的情况。


