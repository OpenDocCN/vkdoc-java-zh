    \ the JMS server, the JMS standard provides two supporting concepts: message acknowledgement\
    \ and local transactions. Here is list of all the possible JMS reliability modes:\n\
    \n*   *Acknowledge modes*: Make sense only for reception of messages and don’t\
    \ affect sending\n    *   `AUTO_ACKNOWLEDGE`: Messages are acknowledged automatically\
    \ with sending or reception.\n    *   `CLIENT_ACKNOWLEDGE`: Client needs to explicitly\
    \ call `Message.acknowledge()` to acknowledge sending or reception.\n    *   `DUPS_OK_ACKNOWLEDGE`:\
    \ Messages are acknowledged automatically in batches. Duplicates are possible,\
    \ and the application needs to handle them.\n*   *Transaction support*: The application\
    \ needs to explicitly call `commit()` or `rollback()` for `javax.jms.Session`\
    \ or `javax.jms.JMSContext`. Transacted behavior applies to JMS message reception\
    \ as well as to sending.\n\nWhen a message is acknowledged on the JMS destination,\
    \ it means that the client has finished its processing and that the action can\
    \ be reflected in the JMS server. *Acknowledge message during read* marks the\
    \ message as delivered and discards the message from the queue. So message reception\
    \ is performed in these three steps:"
