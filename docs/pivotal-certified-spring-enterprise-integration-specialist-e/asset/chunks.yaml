    After the Spring Boot application is started with the XML flow we defined, we
    retrieve the `SiWrapperServiceTransacted` bean. This is used for sending messages
    into the SI flow. As we expect an error to be thrown from it, this call is in
    the `try-catch` block. In the `catch` block, we read and log the number of persisted
    records in the DB. This will help highlight the transaction propagation feature.
    [Listing 8-142](#9781484207949_Ch08_2_Ext.xhtml#FPar145) shows the possible output
    after running this main class.


    [***Listing 8-142***](#9781484207949_Ch08_2_Ext.xhtml#_FPar145). Output of Transaction
    Propagation Example


    ```

    2015-09-01 21:53:58.885  INFO 28736 --- [           main]

    n.l.book.eiws.chapter08.SiApplication    : Record count: 0

    ```


    No record is persisted into the database, because after the error is thrown from
    `SiWrapperServiceTransacted` (which is our transaction boundary), Spring rolls
    back the whole transaction. If we were to remove the `@Transactional` annotation
    from `SiWrapperServiceTransacted`, we would observe the record count equal to
    1, despite the error that occurs afterward. This is because without the transaction,
    the insert from the outbound JDBC gateway would be committed immediately.


    ## Transacted Polling Example


    Now let’s explore an example of transactional behavior within asynchronous SI
    threads. As we mentioned, a transaction can’t pass an asynchronous boundary of
    SI flow, but we can start the transaction in the thread that handled the asynchronous
    SI subflow. [Listing 8-143](#9781484207949_Ch08_2_Ext.xhtml#FPar146) shows the
    SI configuration.


    [***Listing 8-143***](#9781484207949_Ch08_2_Ext.xhtml#_FPar146). SI Configuration
    for Transacted Polling Example (File si-config.xml in Folder src/main/resources
    of Example Project 0842-transacted-polling)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:int-http="http://www.springframework.org/schema/integration/http"

      xmlns:int-jdbc="http://www.springframework.org/schema/integration/jdbc"

      xsi:schemaLocation="http://www.springframework.org/schema/integration/jdbc

        http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />

      <int:channel id="inChannel">

        <int:queue capacity="10"/>

      </int:channel>


    <int-jdbc:outbound-gateway

        data-source="dataSource"

        update="insert into TEXT_TABLE values (:payload)"

        request-channel="inChannel"

        reply-channel="replyChannel" >

        <int:poller fixed-delay="100">

          <int:transactional/>

        </int:poller>

      </int-jdbc:outbound-gateway>

      <int:channel id="replyChannel" />


    <int:service-activator input-channel="replyChannel" ref="serviceWithError"

        method="handleJdbcResult">

      </int:service-activator>

    </beans>

    ```


    This SI configuration uses an inbound gateway with our common service interface
    `SiWrapperServiceVoid` and is connected to the outbound JDBC gateway via `inChannel`.
    But `inChannel` is of type `QueueChannel`, which means it needs to be consumed
    by an active SI endpoint. Therefore, the outbound JDBC gateway uses a poller to
    consume messages from `inChannel` every 100 ms in a separate thread. More important,
    this poller component is defined with the `<int:transactional>` XML subelement,
    which defines the transactional boundary for each poller thread.


    The reply channel of the outbound JDBC gateway is connected to the service activator
    via `DirectChannel`. This endpoint is mapped to `ServiceWithError.handleJdbcResult()`,
    which is same as in the example project `0841-transaction-propagation` in [Listing
    8-137](#9781484207949_Ch08_2_Ext.xhtml#FPar140). It simulates the error by throwing
    an `IllegalStateException`. [Listing 8-144](#9781484207949_Ch08_2_Ext.xhtml#FPar147)
    shows the main class of this example.


    [***Listing 8-144***](#9781484207949_Ch08_2_Ext.xhtml#_FPar147). Main Class of
    Transacted Polling Example (0842-transacted-polling)


    ```

    package net.lkrnac.book.eiws.chapter08;

