    Java Configuration JTA Example (0702-jta-java-config)


    ```

    package net.lkrnac.book.eiws.chapter07;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;

    import org.springframework.transaction.annotation.Transactional;


    @Component

    @Transactional

    public class SimpleMessageListener {

      private SimpleService simpleService;

      private boolean errorSimulated = false;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @JmsListener(destination = "ExpiryQueue")

      public void readMessage(String message) {

        simpleService.processText(message);

        postprocess(message);

      }


    private void postprocess(String message) {

        // simulate error

        if (!errorSimulated) {

          errorSimulated = true;

          throw new IllegalArgumentException(message);

        }

      }

    }

    ```


    This listener is similar to the one in [Listing 7-7](#9781484207949_Ch07.xhtml#FPar8),
    in the XML JTA example. The difference is that we have to specify that this bean
    is going to participate in a global transaction. This is done via the `@Transactional`
    annotation. The second difference is the `@JmsListener` annotation, which marks
    the method listening to the JMS messages. It is needed because there isn’t any
    separate XML configuration that would configure it for Spring.


    When we run this example, we get exactly same behavior as that shown in [Figure
    7-1](#9781484207949_Ch07.xhtml#Fig1), and similar output as for the same example
    `0701-jta-xml-config` in [Listing 7-9](#9781484207949_Ch07.xhtml#FPar10). (I believe
    you don’t want to see that Mordor again.) But in this case, the configuration
    and code is more readable and maintainable than in the XML configuration example.


    Spring Boot JTA Example


    An even more readable and maintainable application can be based on Spring Boot
    autoconfiguration support, because it registers all the necessary configuration
    beans for us. We specify the HornetQ configuration in [Listing 7-15](#9781484207949_Ch07.xhtml#FPar16).


    [***Listing 7-15***](#9781484207949_Ch07.xhtml#_FPar16). HornetQ Spring Boot Configuration
    (File application.properties in Folder src/main/resources of Example Project 0703-jta-spring-boot)


    ```

    spring.hornetq.mode=embedded

    spring.hornetq.embedded.enabled=true

    spring.hornetq.embedded.queues=ExpiryQueue

    ```


    This configuration file enables an embedded instance of the HornetQ JMS server
    with a JMS destination called `ExpiryQueue`. The main class is shown in [Listing
    7-16](#9781484207949_Ch07.xhtml#FPar17).


    [***Listing 7-16***](#9781484207949_Ch07.xhtml#_FPar17). Spring Boot Main Class
    for JTA Examples (0703-jta-spring-boot)


    ```

    package net.lkrnac.book.eiws.chapter07;


    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;


    @SpringBootApplication

    @EnableScheduling

    public class JtaApplication {

      public static void main(String[] args) throws Exception {

        SpringApplication.run(JtaApplication.class, args);

      }

    }

    ```


    This Spring Boot main class uses the `@SpringBootApplication` annotation to enable
    a Spring Boot scan for opinionated configuration of the Spring application. It
    does a component scan of the current package plus subpackages and scans classpath
    dependencies to enable features provided by these libraries. In this case, it
    creates the necessary Spring infrastructure for the following:


    *   Atomikos JTA transaction manager

    *   Embedded HornetQ JMS server and `JmsTemplate` with XA support

    *   H2 embedded database and `JdbcTemplate` with XA support


    These are defined in a Maven configuration for this example, which can be found
    on GitHub. And that’s all the configuration needed. It also uses common classes
    shown in [Listing 7-1](#9781484207949_Ch07.xhtml#FPar2), [7-2](#9781484207949_Ch07.xhtml#FPar3),
    and [7-3](#9781484207949_Ch07.xhtml#FPar4) plus exactly the same implementation
    as the listener in [Listing 7-14](#9781484207949_Ch07.xhtml#FPar15). This example
    nicely highlights why every Spring developer should look into Spring Boot, as
    it significantly reduces configuration for JTA support.


    Again, when we run this example, the behavior is the same as in [Figure 7-1](#9781484207949_Ch07.xhtml#Fig1).
    The same is true for the output, as you can see in [Listing 7-9](#9781484207949_Ch07.xhtml#FPar10)
    (example `0701-jta-xml-config`).


    Summary


    This chapter explored how JTA/XA protocols can help us cover various transactional
    data sources by global distributed transaction and enable ACID characteristics
    on top of them. Even when such support is compelling and easy to use with Spring,
    every smart developer should strive to avoid distributed transactions wherever
    possible.


    Examples showed how easy it is to configure global transaction managers with XML
    and Java configuration and even easier with new mechanisms of Spring Boot. We
    also compared this support to plain transactional support and how it can help
    us target possible problems of using separate data sources within one application.


    CHAPTER 8


    ![image](images/frontdot.jpg)


    Spring Integration


    This book covers two of the most fundamental paradigms of an enterprise system:
    the request-response model (for example, REST, SOAP) and messaging (JMS). The
    first one can be synchronous (the caller of the service is blocked until the response
    arrives) or asynchronous (the caller registers a callback to execute or `Future`
    to fill in when the response arrives). The second one is, by definition, asynchronous;
    the sender of the massage doesn’t wait until the consumer processes the message.


    These mechanisms are essential for providing communication between distributed
    applications: *integrating them together*. But in a modern enterprise, hundreds
    or thousands of applications need to be integrated. Of course, enterprise architects
    need to keep them decoupled as much as possible, but in order to provide functionality
    and value to the customer, such an enterprise system will have some level of coupling.
    It is easy to imagine how complex a flow diagram of such a complicated distributed
    system can become over time.


    For requirements like these, request-response and messaging integration are too
    granular as building blocks and abstractions. As bigger and bigger enterprise
    systems were produced, various architectural patterns started popping up. Gregor
    Hohpe and Bobby Woolf gathered them into their famous book, *Enterprise Integration
    Patterns* (Addison-Wesley Professional, 2003). These patterns provided higher-level
    abstractions than those in the request-response or messaging model, but often
    used them as partial building blocks.'
