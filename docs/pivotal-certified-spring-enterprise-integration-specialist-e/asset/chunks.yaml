    Transaction Handling


    Propagation of transactions across the SI flow has slightly different boundaries
    than propagation of exceptions. As we’ve already shown, exceptions sometimes can
    be propagated back to the caller even when we are dealing with asynchronous message
    passing. But this is not true for transaction propagation. *Transactions can be
    propagated in the SI flow only when the entire flow is synchronous.* To configure
    transaction support, we can use standard Spring mechanisms (for example, `@Transactional`
    annotation).


    But there is an option to have the transaction present for an asynchronous message
    subflow, whereby the transaction boundary starts in an active component. When
    we specify `<int:poller>` for any of the active components, we can define the
    XML poller subelement `<int:transactional>`. This element tells SI that we want
    to start a transaction for every new thread started by poller triggering. This
    mechanism is called *transacted polling*.


    Transaction Propagation Example


