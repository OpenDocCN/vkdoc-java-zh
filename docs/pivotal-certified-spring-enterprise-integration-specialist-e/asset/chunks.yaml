- fmt: "\n但此方法较为特殊，它通过`@Async`注解声明，将在单独的线程中执行。注意，与`Callable<T>`接口不同，它可以接受任意数量的参数。为了能将返回值传递回调用线程，它将结果包装在`AsyncResult<String>`中。`AsyncResult<T>`是Spring对`Future`接口的实现。\n\
    \n[清单 1-19](#9781484207949_Ch01.xhtml#FPar23)展示了如何调用异步逻辑。\n\n[***清单 1-19***](#9781484207949_Ch01.xhtml#_FPar23).\
    \ 异步逻辑的调用者 (0102-async-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.async.task;\n\
    \nimport java.util.ArrayList;\nimport java.util.Collection;\nimport java.util.concurrent.ExecutionException;\n\
    import java.util.concurrent.Future;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class Caller\
    \ {\n  private final AsyncTask asyncTask;\n  @Autowired\n  public Caller(AsyncTask\
    \ asyncTask) {\n    this.asyncTask = asyncTask;\n  }\n\npublic void kickOffAsyncTasks(int\
    \ execCount) throws InterruptedException {\n    Collection<Future<String>> results\
    \ = new ArrayList<>(execCount);\n\nlong start = System.currentTimeMillis();\n\
    \    for (int idx = 0; idx < execCount; idx++) {\n      results.add(asyncTask.call(idx));\n\
    \    }\n\nresults.forEach(result -> {\n      try {\n        System.out.println(result.get());\n\
    \      } catch (InterruptedException | ExecutionException e) {\n        System.out.println(e.getLocalizedMessage());\n\
    \      }\n    });\n    System.out.println(\"Elapsed time: \" + (System.currentTimeMillis()\
    \ - start) + \" ms\");\n  }\n}\n```\n\n`AsyncTask` Bean通过构造函数注入到`Caller`类中。方法`kickOffAsyncTasks`执行此异步逻辑。它首先将要执行的任务数量作为参数，并分配一个集合来收集`Future<String>`结果。我们跟踪执行的开始和结束时间，并将其输出到控制台。每个线程的执行通过调用`results.add(asyncTask.call(idx))`启动，该方法调用异步方法，向其传递参数，并存储`Future<String>`对象以便稍后检索返回值。一个有趣的方面是能够向异步逻辑传递参数。这是可能的，因为Spring为`AsyncTask`提供的代理机制在处理多线程行为时会传播参数。请注意，[清单\
    \ 1-6](#9781484207949_Ch01.xhtml#FPar8)中基于`java.util.concurrent.Callable<T>`的多线程示例无法直接将参数传递给线程。这是Spring多线程支持的一大优势。\n\
    \n在第一个`for`循环之后，所有线程都已提交执行。最后，我们遍历结果集合并将返回值输出到控制台。调用`result.get()`会等待线程完成其工作。此外，`try-catch`块处理从异步逻辑渗透出来的错误。\n\
    \n您可能会问，线程池在此设置中是在哪里以及如何参与的。让我们在[清单 1-20](#9781484207949_Ch01.xhtml#FPar24)中探讨它。\n\
    \n[***清单 1-20***](#9781484207949_Ch01.xhtml#_FPar24). 使用 Fork/Join 池的 Spring 异步示例的主配置\
    \ (0102-async-job)\n\n```\npackage net.lkrnac.book.eiws.chapter01.async;\n\nimport\
    \ java.util.concurrent.Executor;\nimport java.util.concurrent.Executors;\nimport\
    \ net.lkrnac.book.eiws.chapter01.async.task.Caller;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.context.ApplicationContext;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.scheduling.annotation.EnableAsync;\n\n@Configuration\n\
    @ComponentScan(basePackageClasses = Caller.class)\n@EnableAsync\npublic class\
    \ AsyncConfigurationSmallerPool {\n  @Bean\n  public Executor customTaskExecutor()\
    \ {\n    return Executors.newWorkStealingPool();\n  }\n\npublic static void main(String...\
    \ args) throws InterruptedException {\n    ApplicationContext context = SpringApplication.run(AsyncConfigurationSmallerPool.class,\
    \ args);\n    Caller caller = context.getBean(Caller.class);\n    caller.kickOffAsyncTasks(10);\n\
    \  }\n}\n```\n\n此Spring配置扫描`Caller`类所在的包以查找Spring Bean。因此，连同`Caller`一起，`AsyncTask`\
    \ Bean被注册到Spring IoC容器中。第一个方法`customTaskExecutor`将线程池Bean注册到上下文中。`java.util.concurrent.Executor`被用作Bean类型，以允许线程池实现的多样性。因此，很明显我们可以使用Spring提供的任何执行器，以及标准的Java\
    \ SE `java.util.concurrent`线程池实现。在本例中，借助`java.util.concurrent.Executors`工厂类创建了`java.util.concurrent.ForkJoinPool`。此池创建的工作线程数等于其运行机器的核心数（本例中为四个）。\n\
    \n此Bean以名称`customTaskExecutor`注册；当未显式配置Bean名称时，Spring使用方法注册的名称作为Bean名称。请注意，此名称与[清单\
    \ 1-18](#9781484207949_Ch01.xhtml#FPar22)中`AsyncTask`类的`@Async`注解的参数相同。因此，此Bean将用于执行`AsyncTask.call`方法。\n\
    \n该类中的第二个方法是`main`。每个Java开发人员都应该熟悉此方法的签名。是的，它就是著名的`main`方法，它将此类转变为命令行实用程序。数组`args`可以从命令行接收参数，但在本例中我们不使用此功能。此方法体内部发生的事情很有趣。它使用了Spring产品组合中一个相对较新的项目——*Spring\
    \ Boot*的功能。我们可以将Spring Boot项目视为Spring框架的“约定优于配置”封装。它可以显著简化和减少构建现代Java应用程序所需的Spring配置，但同时它不会降低Spring配置功能的多样性。如今，不借助它来启动一个新的Spring项目是没有意义的。\n\
    \n![Image](images/sq.jpg) **注意** Spring Boot项目超出了本书的范围，因为它不属于Spring企业集成认证的一部分。如果您想了解更多关于这个有用项目的信息，请查看Spring\
    \ Boot参考文档的“入门”部分：`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started`。\n\
    \n`SpringApplication.run`将使用给定的Spring配置和命令行参数启动应用程序。它用于简单地引导我们的异步应用程序。此方法返回创建的Spring上下文实例，该实例用于查找`Caller`\
    \ Bean并显式执行异步代码。运行此应用程序后可能的控制台输出如[清单 1-21](#9781484207949_Ch01.xhtml#FPar26)所示。\n\
    \n[***清单 1-21***](#9781484207949_Ch01.xhtml#_FPar26). Fork/Join 池可能的控制台输出\n"
  raw: 'But this method is special, which is declared by the `@Async` annotation.
    It will be executed in a separate thread. Notice that it can take any number of
    parameters, as opposed to the `Callable<T>` interface. To be able to return a
    value into the caller thread, it wraps the result into `AsyncResult<String>. AsyncResult<T>`
    is Spring’s implementation of the `Future` interface.


    [Listing 1-19](#9781484207949_Ch01.xhtml#FPar23) shows how we can call asynchronous
    logic.


    [***Listing 1-19***](#9781484207949_Ch01.xhtml#_FPar23). Caller of Asynchronous
    Logic (0102-async-job)


    ```

    package net.lkrnac.book.eiws.chapter01.async.task;


    import java.util.ArrayList;

    import java.util.Collection;

    import java.util.concurrent.ExecutionException;

    import java.util.concurrent.Future;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class Caller {

      private final AsyncTask asyncTask;

      @Autowired

      public Caller(AsyncTask asyncTask) {

        this.asyncTask = asyncTask;

      }


    public void kickOffAsyncTasks(int execCount) throws InterruptedException {

        Collection<Future<String>> results = new ArrayList<>(execCount);


    long start = System.currentTimeMillis();

        for (int idx = 0; idx < execCount; idx++) {

          results.add(asyncTask.call(idx));

        }


    results.forEach(result -> {

          try {

            System.out.println(result.get());

          } catch (InterruptedException | ExecutionException e) {

            System.out.println(e.getLocalizedMessage());

          }

        });

        System.out.println("Elapsed time: " + (System.currentTimeMillis() - start)
    + " ms");

      }

    }

    ```


    The `AsyncTask` bean is injected into the `Caller` class via constructor injection.
    The method `kickOffAsyncTasks` executes this asynchronous logic. It first takes
    the number of tasks to execute as a parameter and allocates the collection for
    gathering `Future<String>` results. We track the start and end time of execution
    and write it to the console. The execution of each thread is started by calling
    `results.add(asyncTask.call(idx))`, which calls the asynchronous method, passes
    a parameter to it, and stores the `Future<String>` object for retrieving return
    values later. An interesting aspect is the ability to pass parameters to asynchronous
    logic. It is possible because Spring’s proxy mechanism for `AsyncTask` handles
    multithreading behavior with propagating parameters. Notice that the multithreading
    example in [Listing 1-6](#9781484207949_Ch01.xhtml#FPar8) is based on `java.util.concurrent.Callable<T>`
    not being able to pass parameters to the thread directly. This is a big advantage
    of Spring’s multithreading support.


    After the first `for` loop, all threads are submitted for execution. Finally,
    we loop through the results collection and output return values to the console.
    Calling `result.get()` would wait for the thread to finish its job. In addition,
    a try-catch block handles errors penetrated from asynchronous logic.


    You might ask where and how the thread pool is involved in this setup. Let’s explore
    it in [Listing 1-20](#9781484207949_Ch01.xhtml#FPar24).


    [***Listing 1-20***](#9781484207949_Ch01.xhtml#_FPar24). Main Configuration of
    Spring Async Example with Fork/Join Pool (0102-async-job)


    ```

    package net.lkrnac.book.eiws.chapter01.async;


    import java.util.concurrent.Executor;

    import java.util.concurrent.Executors;

    import net.lkrnac.book.eiws.chapter01.async.task.Caller;

    import org.springframework.boot.SpringApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.scheduling.annotation.EnableAsync;


    @Configuration

    @ComponentScan(basePackageClasses = Caller.class)

    @EnableAsync

    public class AsyncConfigurationSmallerPool {

      @Bean

      public Executor customTaskExecutor() {

        return Executors.newWorkStealingPool();

      }


    public static void main(String... args) throws InterruptedException {

        ApplicationContext context = SpringApplication.run(AsyncConfigurationSmallerPool.class,
    args);

        Caller caller = context.getBean(Caller.class);

        caller.kickOffAsyncTasks(10);

      }

    }

    ```


    This Spring configuration scans the package for Spring beans where the `Caller`
    class is located. So with `Caller`, the `AsyncTask` bean is registered into the
    Spring IoC container. The first method, `customTaskExecutor` , registers the thread-pool
    bean into the context. `java.util.concurrent.Executor` is used as a bean type
    to allow for variability of thread-pool implementation. So it’s obvious that we
    can use any of the executors that Spring provides as well as the standard Java
    SE `java.util.concurrent` thread-pool implementations. In this case, `java.util.concurrent.ForkJoinPool`
    is created with the help of the `java.util.concurrent.Executors` factory class.
    This pool creates a number of worker threads equal to the number of cores of the
    machine it’s running on (which is four in this example).


    This bean is registered with the name `customTaskExecutor`; Spring uses the name
    of the bean registration method as the bean name when it isn’t configured explicitly.
    Notice that this name is the same as the parameter of the `@Async` annotation
    in the class `AsyncTask` in [Listing 1-18](#9781484207949_Ch01.xhtml#FPar22).
    So this bean will be used for executing the `AsyncTask.call` method .


    The second method in this class is `main`. The signature of this method should
    be familiar to every Java developer. Yes, it’s the famous `main` method that turns
    this class into a command-line utility. The array `args` can take arguments from
    the command line, but we don’t use this feature in this case. What happens in
    the body of this method is interesting. It uses a feature of a relatively new
    project from the Spring portfolio called *Spring Boot*. We can think of the Spring
    Boot project as a convention over the configuration wrapper for the Spring Framework.
    It can significantly simplify and reduce the Spring configuration needed for building
    modern Java applications, but at the same time it doesn’t reduce the variability
    of Spring configuration features. Starting a new Spring project without it wouldn’t
    make sense nowadays.


    ![Image](images/sq.jpg) **Note**  The Spring Boot project is beyond the scope
    of this book, because it’s not part of Enterprise Integration with Spring certification.
    If you want to learn more about this useful project, take a look at the “Getting
    Started” section of the Spring Boot reference documentation`:` `http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#getting-started`.


    `Spri``ngApplication``.run` will kick off the application with the given Spring
    configuration and command-line arguments. It is used to simply bootstrap our asynchronous
    application. This method returns the created Spring context instance, which is
    used to find the `Caller` bean and explicitly execute asynchronous code. The possible
    console output after running this application is shown in [Listing 1-21](#9781484207949_Ch01.xhtml#FPar26).


