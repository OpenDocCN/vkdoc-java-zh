    JobRepository


    We already mentioned that SB needs to have the `JobRepository` bean configured.
    This bean ensures that every `JobExecution` and `StepExecution` states (or other
    states SB uses) are persisted into a data store. This data store can be any type
    of SQL database Spring can use. This access is based on the `DataSource` bean
    defined in the Spring context.


    SB uses a defined database schema to store its metadata and provides SQL scripts
    to create or drop the schema for the most commonly used relational databases.
    These schemas are located in the `spring-batch-core` library in the `org/springframework/batch/core`
    folder. So, for example, if we want to create a schema for the PostgreSQL database,
    we can use the SQL script `classpath:/org/springframework/batch/core/schema-postgresql.sql`
    to create the SB schema and the script `classpath:/org/springframework/batch/core/schema-drop-postgresql.sql`
    to erase it.


    This mechanism is powerful, because the developer doesn’t need to care about persisting
    the state of batch execution. SB persists execution states automatically, so it
    is easy to handle scenarios in which, for example, `Job` is killed in the middle
    of execution and we want to continue execution from the point where the DB execution
    was left behind.


