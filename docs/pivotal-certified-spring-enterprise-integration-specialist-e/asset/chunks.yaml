    清单 4-6 展示了我们将在所有 REST 示例中使用的最后一个类：一个保存 URL 常量的类。


    ***清单 4-6***. 所有 REST 示例中使用的 URL 常量


    ```

    package net.lkrnac.book.eiws.chapter04;


    public final class UrlConstants {

      private UrlConstants() {

      }


    public static final String USERS_URL = "/users";

    }

    ```


    该类被定义为 final，并拥有一个私有构造函数，以禁止对该类进行实例化和继承。它包含一个常量，该常量代表示例中映射的根 REST 资源。该常量帮助我们多次重用同一个字符串字面量。


    JAX-RS 端点


    在定义了服务层（假设它负责从经过实战检验且可靠的持久化存储中读取/写入我们的 `User` 对象）之后，我们可以进入 REST API 示例。清单 4-7
    展示了 JAX-RS 端点的实现。


    ***清单 4-7***. JAX-RS 端点实现 (0401-rest-jax-rs-server)


    ```

    package net.lkrnac.book.eiws.chapter04.jaxrs;


    import java.net.URI;

    import java.net.URISyntaxException;

    import java.util.Collection;

    import javax.ws.rs.Consumes;

    import javax.ws.rs.DELETE;

    import javax.ws.rs.GET;

    import javax.ws.rs.POST;

    import javax.ws.rs.PUT;

    import javax.ws.rs.Path;

    import javax.ws.rs.PathParam;

    import javax.ws.rs.Produces;

    import javax.ws.rs.WebApplicationException;

    import javax.ws.rs.core.MediaType;

    import javax.ws.rs.core.Response;

    import net.lkrnac.book.eiws.chapter04.UrlConstants;

    import net.lkrnac.book.eiws.chapter04.model.User;

    import net.lkrnac.book.eiws.chapter04.service.UserService;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Path(UrlConstants.USERS_URL)

    @Component

    public class UserResource {

      private final UserService userService;


    @Autowired

      public UserResource(UserService userService) {

        super();

        this.userService = userService;

      }


    @GET

      @Produces(MediaType.APPLICATION_JSON)

      public Collection<User> getUsers() {

        return userService.getAllUsers();

      }


    @GET

      @Path("/{id}")

      @Produces(MediaType.APPLICATION_JSON)

      public User getUser(@PathParam("id") int identifier) {

        try {

          return userService.getUser(identifier);

        } catch (UnsupportedOperationException uoe) {

          throw new WebApplicationException(uoe, Response.Status.BAD_REQUEST);

        }

      }


    @POST

      @Consumes(MediaType.APPLICATION_JSON)

      public Response postUser(User user) throws URISyntaxException {

        int identifier = userService.addUser(user);

        URI uri = new URI(UrlConstants.USERS_URL + "/" + identifier);

        return Response.created(uri).build();

      }


    @PUT

      @Path("/{id}")

      @Consumes(MediaType.APPLICATION_JSON)

      public Response putUser(@PathParam("id") int identifier, User user)

          throws URISyntaxException {

        userService.updateOrAddUser(identifier, user);

        return Response.ok().build();

      }


    @DELETE

      @Path("/{id}")

      public Response deleteUser(@PathParam("id") int identifier) {

        userService.deleteUser(identifier);

        return Response.ok().build();

      }

    }

    ```


    `@Path` 注解将 `UserResource` 类绑定到 `/users` URI。当根 URI 为 `/users` 的请求到达我们的应用程序时，将由该类处理。`@Component`
    注解将 `UserResource` 类声明为一个 Spring 单例 bean。在构造函数中，我们注入了 `UserService`，它用于持久化 `User`
    对象。


    接下来是处理 `GET`、`POST` 和 `DELETE` HTTP 方法的四个方法。`getUsers()` 方法读取所有用户的集合并将其返回给消费者。它生成
    JSON 内容类型，这意味着响应将包含值为 `application/json` 的 HTTP 头 `Content-Type`。此头信息应告知消费者负载的格式。`@Produces`
    注解还指示底层的 JAX-RS 实现（此处为 Jersey）使用 Jackson JSON 序列化库。它将 `User` 对象的集合转换为 JSON 数组负载结构。


    接下来，`getUser(int identifier)` 方法也使用 `@GET` 注解读取具体的 `User` 对象。这个具体对象由 URI 路径参数
    `identifier` 标识。因此，URI `/users/1` 应执行对标识符为 1 的用户实例的读取操作。为了从 URI 中解析出标识符，我们使用了
    `@PathParam` 注解。此解析的前提是在路径绑定中指定占位符，其中 `@Path` 注解声明了占位符 `/{id}`。`/users/` 之后的任何
    URI 部分都将映射到由 `@PathParam("id")` 注解的参数 `identifier` 上。注解参数 `id` 将 `identifier`
    绑定到路径占位符 `/{id}`。返回值对象 `User` 由底层的 Jackson 库转换为 JSON 负载。


    `postUser` 方法绑定到 `POST` HTTP 方法。`@Consumes` 注解表明此端点期望一个 JSON 负载。消息体由 Jackson JSON
    序列化器库转换为 `User` 对象，并作为参数注入到方法中。在将此对象传递给下层进行存储后，我们需要向消费者发送一条消息，其中包含 HTTP 状态码 201
    Created 以及新创建对象的 `Location` 头。为了创建这样的 HTTP 响应，使用了 `javax.ws.rs.core.Response`
    工厂。它可以覆盖大多数常见的 HTTP 响应以及自定义状态码。`Location` 头通过响应创建调用 `Response.created(uri).build()`
    的 `uri` 参数来定义。


    `putUser` 方法处理 `PUT` HTTP 方法。它负责创建或更新给定的 `User` 记录。此记录作为 JSON 负载接收，并转换为方法参数 `User`。该方法的第二个参数是标识符，其提取方式与
    `getUser` 方法类似，从 URL 中提取。为了执行上述操作，它通过调用 `userService.updateOrAddUser` 将请求委托给服务层。如果一切顺利，它会发回
    HTTP 状态码 200 OK。


    `deleteUser` 方法借助 `@DELETE` 注解映射到 `DELETE` HTTP 方法。它结合了前述方法来解析 URL 参数并构建包含 HTTP
    状态码 200 OK 的响应消息。它调用 `UserService.deleteUser` 方法来释放给定的用户实例。


    将 `UserResource` bean 注册到控制反转容器中，对于 Spring 和 JAX-RS 的集成来说是不够的。每个这样的 bean 都需要注册到
    Jersey 资源配置中，如清单 4-8 所示。


    ***清单 4-8***. 将 JAX-RS/Spring Bean 注册到 Jersey 资源配置中 (0401-rest-jax-rs-server)


    ```

    package net.lkrnac.book.eiws.chapter04.jaxrs;


    import org.glassfish.jersey.server.ResourceConfig;

    import org.springframework.stereotype.Component;


    @Component

    public class EndpointRegister extends ResourceConfig {

      public EndpointRegister() {

        super();

        register(UserResource.class);

      }

    }

    ```

