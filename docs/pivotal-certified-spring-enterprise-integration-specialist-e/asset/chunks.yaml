    flows) that can operate in passive or active mode. It has a unique function in
    the SI framework, splitting the received message into various messages based on
    these mechanisms:


    *   *Custom Java logic*: Generic component, which can be configured via the `<int:splitter>`
    XML element or `@Splitter` annotation

    *   *XPath*: XML payload specific, which can be configured via `<int-xml:xpath-splitter>`'
