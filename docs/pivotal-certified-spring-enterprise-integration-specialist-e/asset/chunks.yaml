    和 Spring Batch 会用到它的可视化功能。可以从 Spring 网站 `http://spring.io/tools/sts/all` 下载。在撰写本书时，最新版本是
    3.7.1.RELEASE。你也可以使用安装了 Spring Tools Suite 插件的普通 Eclipse，但建议使用 STS 产品。


    所有示例都使用最常见的 Java 构建工具 Maven，因此你需要互联网连接来构建示例。不需要单独安装 Maven，因为 STS 开箱即用地包含了嵌入式 Maven
    安装。


