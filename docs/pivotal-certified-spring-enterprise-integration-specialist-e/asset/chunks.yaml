    \ package, which will configure the common `Tasklet` “tea” steps into our context.\
    \ Next we need to configure two mandatory beans. For `transactionManager`, we\
    \ use `ResourcelessTransactionManager`. This implementation of a transaction manager\
    \ doesn’t start a transaction; it is supposed to be used for testing purposes\
    \ only. In our case, we don’t use any transactions, but we need to configure a\
    \ transaction manager for the `JobRepository` bean.\n\n`JobRepository` is the\
    \ second mandatory bean for SB configuration. We will dive into its function later\
    \ in the chapter. We just quickly mention now that it is used to store SB processing\
    \ metadata. In this case, we aren’t using a real data store, but instead will\
    \ store metadata into an in-memory map. This implementation of `JobRepository`\
    \ is provided by `MapJobRepositoryFactoryBean`. Next we configure the `JobLauncher`\
    \ bean. The `SimpleJobLauncher` implementation requires configuring the mandatory\
    \ parameter `jobRepository`.\n\nThis example uses the same SB flow as the `TaskletStep`\
    \ XML example in [Listing 9-19](#9781484207949_Ch09_1.xhtml#FPar22). The main\
    \ class of this example is shown in [Listing 9-24](#9781484207949_Ch09_1.xhtml#FPar27).\n\
    \n[***Listing 9-24***](#9781484207949_Ch09_1.xhtml#_FPar27). Main Class of JobLauncher\
    \ XML Example (0906-job-launcher-xml)\n\n```\npackage net.lkrnac.book.eiws.chapter09;\n\
    import lombok.extern.slf4j.Slf4j;\nimport org.springframework.batch.core.Job;\n\
    import org.springframework.batch.core.JobExecution;\nimport org.springframework.batch.core.JobParameters;\n\
    import org.springframework.batch.core.launch.JobLauncher;\nimport org.springframework.context.support.GenericApplicationContext;\n\
    import org.springframework.context.support.GenericXmlApplicationContext;\nimport\
    \ org.springframework.core.io.ClassPathResource;\n\n@Slf4j\npublic class BatchApplication\
    \ {\n  public static void main(String[] args) throws Exception {\n    ClassPathResource\
    \ batchConfig = new ClassPathResource(\"batch-config.xml\");\n    ClassPathResource\
    \ batchBeansConfig = new ClassPathResource(\"batch-beans-config.xml\");\n    GenericApplicationContext\
    \ context = new GenericXmlApplicationContext(\n        batchConfig, batchBeansConfig);\n\
    \nJobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);\n\
    \    Job job = (Job) context.getBean(\"prepareTeaJob\");\n    JobExecution execution\
    \ = jobLauncher.run(job, new JobParameters());\n    log.info(\"Exit Status : {}\"\
    , execution.getStatus());\n    context.close();\n  }\n}\n```\n\n`@Slf4j` is Lombok’s\
    \ convenience annotation to define the Log4j logger instance. Notice that this\
    \ main class is not a Spring configuration in this case. This is because we create\
    \ the Spring context based on two XML configurations already mentioned in the\
    \ previous listings.\n\nWhen the Spring context instance is created, the `JobLauncher`\
    \ and `Job` instances can be retrieved via the `getBean()` method. The next call\
    \ is execution of `Job` itself. `JobLauncher.run()` also needs to take a parameter\
