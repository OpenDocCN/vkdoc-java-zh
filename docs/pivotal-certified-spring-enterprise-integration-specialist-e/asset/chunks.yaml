    Content Enricher


    A *content enricher* is similar to a transformer in messaging endpoint characteristics.
    It can participate in unidirectional or bidirectional communication, can be passive
    or active, and fits into the middle of the SI flow.


    From a functional point of view, these types of content enrichers are possible:


    *   *Generic header enricher*: Most common use of this endpoint, which adds a
    new header to the message. Of course, the message is by default immutable, so
    a generic context enricher creates a new message instance out of the original
    one with an enriched header(s). It doesn’t have any SI annotation available, so
    it can be configured only via the XML element `<int:header-enricher>`.

    *   *Generic payload enricher*: This is effectively a special type of message
    transformer, enriching the payload of the received message by adding information.
    This enricher can be configured only via the XML element `<int:enricher>`.

    *   *Technology-specific header enricher*: Enriches headers for three technologies:
    Mail, XPath, and XMPP (Jabber protocol). These configurations are possible only
    via XML configuration, which uses special technology-specific XML namespaces:
    `<int-xml:xpath-header-enricher>`, `<int-xmpp:header-enricher>`, and `<int-mail:header-enricher>`.


    Header Enricher Example


    [Listing 8-52](#9781484207949_Ch08_1.xhtml#FPar55) shows header enricher logic.


    [***Listing 8-52***](#9781484207949_Ch08_1.xhtml#_FPar55). Header Enricher Logic
    (0814-header-enricher-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleHeaderEnricher {

      public String addHeader(String message) {

        return message.contains("1") ? "header1" : "header2";

      }

    }

    ```


    This Spring bean checks whether the received message contains `1` and returns
    a header value based on the result. The return value will be used in the SI flow
    to enrich the message. [Listing 8-53](#9781484207949_Ch08_1.xhtml#FPar56) shows
    the SI flow configuration.


    [***Listing 8-53***](#9781484207949_Ch08_1.xhtml#_FPar56). SI Flow of Header Enricher
    Example (File si-config.xml in Folder src/main/resources of Example Project 0814-header-enricher-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />

      <int:channel id="inChannel"/>


    <int:header-enricher input-channel="inChannel" output-channel="enrichedChannel">

        <int:header name="simpleHeader" ref="simpleHeaderEnricher" method="addHeader"/>

      </int:header-enricher>

      <int:channel id="enrichedChannel"/>


    <int:outbound-channel-adapter channel="enrichedChannel" ref="writeServiceWithHeaders"

        method="write"/>

    </beans>

    ```


    The inbound gateway is configured to use our common service interface `SiWrapperServiceVoid`,
    convert its parameter into a message, and pass it to `inChannel`.


    From this channel, the message is picked up by the header enricher, which defines
    the `input-channel` and `output-channel` mandatory attributes on the top-level
    XML element `<int:header-enricher>`. Now we can define one or more headers to
    enrich. This is done via the XML sub-element `<int:header>`. For a single header,
    we need to specify `name`, which will become a key in the headers map, and the
    `ref` and method of the bean that contains header enricher logic. In this case,
    it is `SimpleHeaderEnricher.addHeader()`. In the `<int:header>` tag, we can also
    use Spring Expression Language (SpEL) to define enricher logic inline. Use of
    SpEL is shown later in the chapter.


    The last element in our flow is the outbound channel adapter, which encapsulates
    the logic shown in [Listing 8-54](#9781484207949_Ch08_1.xhtml#FPar57).


    [***Listing 8-54***](#9781484207949_Ch08_1.xhtml#_FPar57). Write Service Used
    in Header Enricher Example (0814-header-enricher-xml)


    ```

    package net.lkrnac.book.eiws.chapter08.out;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.messaging.handler.annotation.Header;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class WriteServiceWithHeaders {

      private WriteRepository writeRepository;


    @Autowired

      public WriteServiceWithHeaders(WriteRepository writeRepository) {

        super();

        this.writeRepository = writeRepository;

      }


    public void write(String message, @Header String simpleHeader) {

        log.info("Writing message: {}; simpleHeader: {}", message, simpleHeader);

        writeRepository.persist(message);

      }

    }

    ```


    This service injects our common `WriteRepository` to persist the received message
    payload. It also logs this payload with `simpleHeader` that was enriched earlier
    in the flow. [Listing 8-55](#9781484207949_Ch08_1.xhtml#FPar58) covers the main
    class of this example.


    [***Listing 8-55***](#9781484207949_Ch08_1.xhtml#_FPar58). Main Class of Header
