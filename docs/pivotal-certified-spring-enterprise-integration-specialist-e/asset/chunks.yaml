    The first bean creates an H2 database instance, which is exposed via TCP and allows
    other processes to connect to it. The TCP port used for the DB connection is configured
    to 8043\. The last configuration flag specifies the location of the file the H2
    DB instance is using to store the data.


    The XML tag `<jdbc:initialize-database>` will run the `h2-purge.sql` script from
    [Listing 9-130](#9781484207949_Ch09_3_Ext.xhtml#FPar134), which ensures a clean
    sheet in the database after we start this project. The `dataSource` bean is needed
    to execute this script. The URL uses an H2 convention to access the TCP-hosted
    database located in the file `~/partition-test`. The tilde character (`~`) indicates
    the user’s home directory.


