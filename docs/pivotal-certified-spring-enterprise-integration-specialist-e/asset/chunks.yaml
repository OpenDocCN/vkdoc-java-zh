    主配置还导入了 JMS 配置，以便能够向从节点发送命令并接收其响应。`dataSource` bean 访问一个共享数据库，该数据库托管在 `0940-remote-partitioning-sql-server`
    示例项目中。


    接下来是 SB 作业定义。对于 `Step`，我们使用 `<batch:partition>` 结构来定义此处理的远程执行。这里需要定义两个属性。对分区器的引用由我们在上一个清单的
    `RecordsPartitioner` 中实现的工作分配算法提供。


    作业中使用的第二个 bean 是 `partitionHandler`。这是主处理的主要 bean，类型为 `MessageChannelPartitionHandler`，因为它通过消息中间件协调从节点的处理。我们定义了
