    由于 Spring Boot 的监听器容器工厂默认实现是配置了 `AUTO_ACKNOWLEDGE` 模式的 `DefaultJmsListenerContainerFactory`，因此我们无需注册特殊的
    Bean 作为 JMS 配置。该监听器如清单 6-16 所示。


    ***清单 6-16***. 使用 `AUTO_ACKNOWLEDGE` 模式的消息丢失场景监听器 (0605-auto-acknowledge-listener-lost)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.jms.Session;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageListener {

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @JmsListener(destination = "ExpiryQueue")

      public void readMessage(String message, Session session) {

        preprocess(message);

        simpleService.processText(message);

      }


    private void preprocess(String message) {

        // 模拟错误

        throw new IllegalArgumentException(message);

      }

    }

    ```


    在此例中，我们并未在持久化消息后模拟错误，而是在调用 `simpleService.processText()` 之前，于名为 `preprocess()`
    的方法中模拟错误。图 6-2 展示了运行此示例后的行为。


    ![9781484207949_Fig06-02.jpg](img/9781484207949_Fig06-02.jpg)


    图 6-2. 使用监听器和 `AUTO_ACKNOWLEDGE` 模式的消息丢失场景时序图（文件位于示例项目 0605-auto-acknowledge-listener-lost
    的 uml-diagrams 文件夹中的 sequence.uml）


    由于 Spring 使用长轮询，其在底层通过无限循环中带有超时的同步接收来模拟异步行为。根据 JMS 定义，同步接收在 `MessageConsumer.receive()`
    调用返回后立即自动确认。这是因为我们为监听器容器使用了 `DefaultJmsListenerContainerFactory` 实现。


    因此，当我们的监听器调用 `preprocess()` 方法时，消息已被确认。`preprocess()` 中的异常会在消息持久化之前停止监听器中的处理。但此时消息已从目标中丢弃，从而丢失。


    ### 同步接收导致的消息丢失


    示例 `0606-auto-acknowledge-sync-lost` 解释了 `AUTO_ACKNOWLEDGE` 模式与同步接收结合如何同样导致消息丢失。同样，此示例的主类和发送者类与清单
    6-13 和 6-14 完全相同。清单 6-17 展示了 JMS 配置。


    ***清单 6-17***. 同步 `AUTO_ACKNOWLEDGE` 模式的 JMS 配置 (0606-auto-acknowledge-sync-lost)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.jms.ConnectionFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.scheduling.annotation.EnableScheduling;


    @Configuration

    @EnableScheduling

    public class JmsConfiguration {

      @Bean

      public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {

        JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);

        jmsTemplate.setReceiveTimeout(1000);

        return jmsTemplate;

      }

    }

    ```


    此配置类注册了 `JmsTemplate` Bean，它有一个非默认属性 `receiveTimeout`。默认情况下，接收超时为 0，这意味着如果没有可读取的消息，将无限期等待。如果我们希望确保读取线程不会因永远等待消息而卡住，则应指定接收超时。


    `JmsConfiguration` 类还通过 `@EnableScheduling` 注解启用了调度功能，该功能将用于初始化 JMS 消息的同步读取，如清单
    6-18 所示。


    ***清单 6-18***. 使用 `AUTO_ACKNOWLEDGE` 模式且消息丢失场景的同步读取器 (0604-auto-acknowledge-sync-lost)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class SimpleMessageReader {

      private JmsTemplate jmsTemplate;

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageReader(JmsTemplate jmsTemplate,

          SimpleService simpleService) {

        super();

        this.jmsTemplate = jmsTemplate;

        this.simpleService = simpleService;

      }


    @Scheduled(fixedRate = Long.MAX_VALUE)

      public void readMessage() {

        String message = (String) jmsTemplate.receiveAndConvert("messageQueue");

        log.info("读取的消息: {}", message);


    preprocess(message);

        simpleService.processText(message);

      }


    private void preprocess(String message) {

        // 模拟错误

        throw new IllegalArgumentException(message);

      }

    }

    ```


    此读取器类与上一章中的同步示例类似。它定义了一个 Spring 组件，通过 `@Slf4j` 注解启用了 Lombok 日志记录功能。它通过构造函数注入两个依赖项。`JmsTemplate`
    用于接收消息，`SimpleService` 是用于处理和持久化消息的 Bean。


    消息接收由 `readMessage()` 方法完成，该方法由 Spring 调度功能触发。我们选择了较长的固定调度速率，因为我们希望只读取一次。请注意，`preprocess()`
    调用位于 `jmsTemplate.receiveAndConvert()` 调用和 `simpleService.processText()` 之间，用于模拟同步接收与消息持久化之间可能发生的错误。图
    6-3 用时序图展示了此行为。


