    the request we want to send. In this case, we need to specify the URL of our REST
    endpoint, which is `http://localhost:10401/users`. Next we need to pick the HTTP
    method (`POST`, in this case), and finally, specify the JSON payload in the body
    section we want to send to the server.


    After clicking the Send button, the response appears below if everything is configured
    properly. In this case, the server indicates that the resource instance was created
    and also sends us the `Location` HTTP header. This gives us a full URL of the
    created resource instance. It also shows us the ID assigned to this user. In this
    case, it is 0.


