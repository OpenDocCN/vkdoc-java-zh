- fmt: "[Listing 4-6](#9781484207949_Ch04.xhtml#FPar13) shows the last class we will\
    \ use across all REST examples: a class holding the URL constant.\n\n[***Listing\
    \ 4-6***](#9781484207949_Ch04.xhtml#_FPar13). URL Constants Used in All REST Examples\n\
    \n```\npackage net.lkrnac.book.eiws.chapter04;\n\npublic final class UrlConstants\
    \ {\n  private UrlConstants() {\n  }\n\npublic static final String USERS_URL =\
    \ \"/users\";\n}\n```\n\nThis class is defined as `final` and has a private constructor\
    \ for disallowing instantiation and inheritance of this class. It contains a constant\
    \ that represents the root REST resource mapped in examples. The constant helps\
    \ us reuse the same string literal various times.\n\n## JAX-RS Endpoint\n\nAfter\
    \ defining the service layer (pretending that it is reading/writing our `User`\
    \ objects from/into the battle-tested and reliable persistence storage), we can\
    \ jump into the REST API examples. [Listing 4-7](#9781484207949_Ch04.xhtml#FPar14)\
    \ shows the JAX-RS endpoint implementation.\n\n[***Listing 4-7***](#9781484207949_Ch04.xhtml#_FPar14).\
    \ JAX-RS Endpoint Implementation (0401-rest-jax-rs-server)\n\n```\npackage net.lkrnac.book.eiws.chapter04.jaxrs;\n\
    \nimport java.net.URI;\nimport java.net.URISyntaxException;\nimport java.util.Collection;\n\
    import javax.ws.rs.Consumes;\nimport javax.ws.rs.DELETE;\nimport javax.ws.rs.GET;\n\
    import javax.ws.rs.POST;\nimport javax.ws.rs.PUT;\nimport javax.ws.rs.Path;\n\
    import javax.ws.rs.PathParam;\nimport javax.ws.rs.Produces;\nimport javax.ws.rs.WebApplicationException;\n\
    import javax.ws.rs.core.MediaType;\nimport javax.ws.rs.core.Response;\nimport\
    \ net.lkrnac.book.eiws.chapter04.UrlConstants;\nimport net.lkrnac.book.eiws.chapter04.model.User;\n\
    import net.lkrnac.book.eiws.chapter04.service.UserService;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.stereotype.Component;\n\n@Path(UrlConstants.USERS_URL)\n\
    @Component\npublic class UserResource {\n  private final UserService userService;\n\
    \n@Autowired\n  public UserResource(UserService userService) {\n    super();\n\
    \    this.userService = userService;\n  }\n\n@GET\n  @Produces(MediaType.APPLICATION_JSON)\n\
    \  public Collection<User> getUsers() {\n    return userService.getAllUsers();\n\
    \  }\n\n@GET\n  @Path(\"/{id}\")\n  @Produces(MediaType.APPLICATION_JSON)\n  public\
    \ User getUser(@PathParam(\"id\") int identifier) {\n    try {\n      return userService.getUser(identifier);\n\
    \    } catch (UnsupportedOperationException uoe) {\n      throw new WebApplicationException(uoe,\
    \ Response.Status.BAD_REQUEST);\n    }\n  }\n\n@POST\n  @Consumes(MediaType.APPLICATION_JSON)\n\
    \  public Response postUser(User user) throws URISyntaxException {\n    int identifier\
    \ = userService.addUser(user);\n    URI uri = new URI(UrlConstants.USERS_URL +\
    \ \"/\" + identifier);\n    return Response.created(uri).build();\n  }\n\n@PUT\n\
    \  @Path(\"/{id}\")\n  @Consumes(MediaType.APPLICATION_JSON)\n  public Response\
    \ putUser(@PathParam(\"id\") int identifier, User user)\n      throws URISyntaxException\
    \ {\n    userService.updateOrAddUser(identifier, user);\n    return Response.ok().build();\n\
    \  }\n\n@DELETE\n  @Path(\"/{id}\")\n  public Response deleteUser(@PathParam(\"\
    id\") int identifier) {\n    userService.deleteUser(identifier);\n    return Response.ok().build();\n\
    \  }\n}\n```\n\nThe `@Path` annotation binds the `UserResource` class to the `/users`\
    \ URI. When the request with the root URI `/users` hits our application, it will\
    \ be served by this class. The `@Component` annotation declares the `UserResource`\
    \ class as a Spring singleton bean. In the constructor, we inject `UserService`,\
    \ which is used for persisting `User` objects.\n\nFour methods handling the `GET`,\
    \ `POST`, and `DELETE` HTTP methods follow. The `getUsers()` method reads the\
    \ collection of all users and returns it to the consumer. It produces a JSON content\
    \ type, which means the response will contain the HTTP header `Content-Type` equal\
    \ to the value `application/json`. This header should inform the consumer about\
    \ the payload format. The `@Produces` annotation also indicates to the underlying\
    \ JAX-RS implementation (which in this case is Jersey) to use the Jackson JSON\
    \ serialization library. It converts the collection of `User` objects into a JSON\
    \ array payload structure.\n\nNext, the `getUser(int identifier)` method reads\
    \ the concrete `User` object with the `@GET` annotation also. This concrete object\
    \ is identified by the URI path parameter `identifier`. So the URI `/users/1`\
    \ should perform a read operation of the user instance with identifier 1. To parse\
    \ the identifier from the URI, we use the `@PathParam` annotation. A prerequirement\
    \ for this parsing is the specification of the placeholder in the path binding,\
    \ where the `@Path` annotation has the placeholder `/{id}` declared. Any URI part\
    \ after `/users/` will be mapped onto the parameter `identifier`, annotated by\
    \ the `@PathParam(\"id\")`. The annotation parameter `id` binds `identifier` to\
    \ the path placeholder `/{id}`. The return value object `User` is converted to\
    \ a JSON payload by the Jackson library under the hood.\n\nThe `postUser` method\
    \ is bound to the `POST` HTTP method. The `@Consumes` annotation indicates that\
    \ this endpoint expects a JSON payload. The message body is converted by the Jackson\
    \ JSON serializer library into a `User` object and injected into the method as\
    \ a parameter. After passing this object into the lower layer to store it, we\
    \ need to send a message to the consumer with HTTP status code 201 Created and\
    \ the `Location` header of the newly created object. For such an HTTP response\
    \ creation, the `javax.ws.rs.core.Response` factory is used. It can cover most\
    \ of the common HTTP responses as well as custom status codes. The `Location`\
    \ header is defined as with a `uri` parameter of a response creation `Response.created(uri).build()`\
    \ call.\n\nThe `putUser` method handles the `PUT` HTTP method. It is responsible\
    \ for the creation or update of the given `User` record. This record is received\
    \ as a JSON payload and converted into the method parameter `User`. The second\
    \ parameter of this method is the identifier, which is extracted from the URL\
    \ similarly to the `getUser` method. To perform the mentioned action, it delegates\
    \ a request to the service layer via the `userService.updateOrAddUser` call. If\
    \ everything goes well, it sends back HTTP status 400 OK.\n\nThe `deleteUser`\
    \ method maps to the `DELETE` HTTP method with the help of the `@DELETE` annotation.\
    \ It combines the mentioned approaches to parse the URL parameter and construct\
    \ the response message with HTTP status code 200 OK. It calls the `UserService.deleteUser`\
    \ method to release a given instance of the user.\n\nRegistering the `UserResource`\
    \ bean into an Inversion of Control container is not enough for Spring and JAX-RS\
    \ integration. Every such bean needs to be registered into a Jersey resource configuration,\
    \ shown in [Listing 4-8](#9781484207949_Ch04.xhtml#FPar15).\n\n[***Listing 4-8***](#9781484207949_Ch04.xhtml#_FPar15).\
    \ Registering JAX-RS/Spring Bean into Jersey Resource Configuration (0401-rest-jax-rs-server)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter04.jaxrs;\n\nimport org.glassfish.jersey.server.ResourceConfig;\n\
    import org.springframework.stereotype.Component;\n\n@Component\npublic class EndpointRegister\
    \ extends ResourceConfig {\n  public EndpointRegister() {\n    super();\n    register(UserResource.class);\n\
    \  }\n}\n```"
