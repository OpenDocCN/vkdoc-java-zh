  trans: "\n```\n2015-08-30 14:38:55.215  INFO 16238 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
    \ 开始发送消息...\n2015-08-30 14:38:55.224  INFO 16238 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
    \ message1 已发送\n2015-08-30 14:38:55.250  INFO 16238 --- [ask-scheduler-1]\nn.l.b.e.chapter08.out.WriteRepository    :\
    \ 文本已持久化: message1\n2015-08-30 14:38:56.252  INFO 16238 --- [           main]\n\
    n.l.book.eiws.chapter08.SiApplication    : message2 已发送\n2015-08-30 14:38:56.254  INFO\
    \ 16238 --- [ask-scheduler-1]\nn.l.b.e.chapter08.out.WriteRepository    : 文本已持久化:\
    \ message2\n```\n\n请注意这些日志条目的时间戳。`message1` 的交接几乎在它被发送到 SI 流程时立即发生。这是因为出站通道适配器已经在等待消息到达\
    \ `inChannel`。但 `message2` 的第二次交接大约在 `message1` 交接后 1 秒发生。这是因为主线程在 `wrapperService.processText(MESSAGE2)`\
    \ 调用中被阻塞，直到通道适配器轮询器触发读取 `message2`。\n\nExecutorChannel\n\n`ExecutorChannel` 是一个可订阅通道，因此消费者是一个被动组件，等待被接收到的消息触发。但与\
    \ `DirectChannel` 不同，消息在单独的线程中从发送者传递给消费者。消息的分发被委托给为 `ExecutorChannel` 配置的 `TaskExecutor`\
    \ 实例。\n\n可以通过以下方式进行配置：\n\n*   使用 XML 元素 `<int:channel>` 及其子元素 `<int:dispatcher\
    \ task-executor=\"...\"/>`。\n*   使用其中一个构造函数创建 `ExecutorChannel` 实例，并通过 `@Bean`\
    \ 注解将其注册为 Spring Bean。然后，该 Bean 的名称可以在消息端点配置中用作通道名称。\n\nExecutorChannel 示例\n\n\
    清单 8-115 展示了 SI 配置。\n\n***清单 8-115***. ExecutorChannel 示例的 SI 配置（示例项目 0832-channel-executor-xml\
    \ 的 src/main/resources 文件夹中的文件 si-config.xml）\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xmlns:task=\"\
    http://www.springframework.org/schema/task\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/task\n\
        http://www.springframework.org/schema/task/spring-task.xsd\n    http://www.springframework.org/schema/beans\n\
        http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
        http://www.springframework.org/schema/context/spring-context.xsd\n    http://www.springframework.org/schema/integration\n\
        http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
    net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<task:executor\
    \ id=\"executor\" pool-size=\"10\"/>\n\n<int:channel id=\"inChannel\">\n    <int:dispatcher\
    \ task-executor=\"executor\"/>\n  </int:channel>\n\n<int:outbound-channel-adapter\
    \ channel=\"inChannel\" ref=\"writeService\" method=\"write\" />\n</beans>\n```\n\
    \n`inChannel` 通道被配置为 `ExecutorChannel`，使用了名为 `executor` 的 `TaskExecutor` Bean。这个\
    \ `TaskExecutor` Bean 也在该配置文件中通过 XML 元素 `<task:executor>` 创建。`inChannel` 连接到入站网关，该网关使用我们通用的服务接口\
    \ `SiWrapperServiceVoid`。在这种情况下，`inChannel` 的消费者是映射到通用 `WriteService.write()`\
    \ 的被动出站通道适配器。\n\n我们再次使用与清单 8-111 中 `0830-channel-priority-xml` 相同的主类。当我们运行这个主类时，可以观察到清单\
    \ 8-116 中的输出。\n\n***清单 8-116***. ExecutorChannel 示例的输出\n\n```\n2015-08-30 15:42:48.844  INFO\
    \ 18377 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    : 开始发送消息...\n\
    2015-08-30 15:42:48.858  INFO 18377 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
    \ message1 已发送\n2015-08-30 15:42:48.859  INFO 18377 --- [           main]\nn.l.book.eiws.chapter08.SiApplication    :\
    \ message2 已发送\n2015-08-30 15:42:48.877  INFO 18377 --- [     executor-1]\nn.l.b.e.chapter08.out.WriteRepository    :\
    \ 文本已持久化: message1\n2015-08-30 15:42:48.877  INFO 18377 --- [     executor-2]\n\
    n.l.b.e.chapter08.out.WriteRepository    : 文本已持久化: message2\n```\n\n请注意，交接立即发生，并且在单独的线程中（使用\
    \ `executor` 线程池），不会阻塞调用者（`main`）线程。\n\nPublishSubscribeChannel\n\n`PublishSubscribeChannel`\
    \ 使用消息传递的发布/订阅模型，所有订阅者都会收到发送给它的消息。因此，我们的消息可以有多个消费者。\n\n`PublishSubscribeChannel`\
    \ 可以通过以下方式进行配置：\n\n*   使用 XML 元素 `<int:publish-subscribe-channel>`。\n*   使用其中一个构造函数创建\
    \ `PublishSubscribeChannel` 实例，并通过 `@Bean` 注解将其注册为 Spring Bean。然后，该 Bean 的名称可以在消息端点配置中用作通道名称。\n\
    \n我们可以按如下方式配置 `PublishSubscribeChannel` 来处理消息传递：\n\n*   同步方式\n    *   默认配置\n \
    \   *   所有消费者的处理在发送者的线程中顺序执行，因此每个消费者需要等待其他消费者。\n    *   *可以*在消费者和发送者之间传播事务、安全上下文和异常。\n\
    *   异步方式\n    *   可以通过 `<int:publish-subscribe-channel>` 的 `task-executor` 属性进行配置，我们通过该属性指定对\
    \ `TaskExecutor` 实例的引用。\n    *   每个消费者的处理可以在单独的线程中完成，因此它们是并发发生的。\n    *   事务传播、安全上下文传递以及消费者和发送者之间的异常冒泡*在此模式下不起作用*。\n\
