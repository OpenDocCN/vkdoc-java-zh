    This task simply outputs the time when it was started to the console. [Listing
    1-13](#9781484207949_Ch01.xhtml#FPar16) shows how we schedule this task.


    [***Listing 1-13***](#9781484207949_Ch01.xhtml#_FPar16). Simple Task Scheduling
    (0104-java-scheduling)


    ```

    package net.lkrnac.book.eiws.chapter01.javascheduling;


    import java.util.concurrent.Executors;

    import java.util.concurrent.ScheduledExecutorService;

    import java.util.concurrent.TimeUnit;


    public class SimpleScheduler {

