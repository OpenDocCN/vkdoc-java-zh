    This Spring bean logs a given collection of records and pretends some type of
    processing. For logging, we use the Lombok annotation `@Slf4j`. For looping through
    records, we again use the Java 8 Stream API. [Listing 9-5](#9781484207949_Ch09_1.xhtml#FPar5)
    shows the custom `ItemWriter`.


    [***Listing 9-5***](#9781484207949_Ch09_1.xhtml#_FPar5). Custom ItemWriter for
    Chunk-Oriented Processing Examples (0900-batch-common)


    ```

    package net.lkrnac.book.eiws.chapter09.write;

    import java.util.List;

    import org.springframework.batch.item.ItemWriter;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleRecordWriter implements ItemWriter<String> {

      private WriteRepository writeRepository;


    @Autowired

      public SimpleRecordWriter(WriteRepository writeRepository) {

        super();

        this.writeRepository = writeRepository;

      }


    @Override

      public void write(List<? extends String> items) throws Exception {

        writeRepository.writeRecords(items);

      }

    }

    ```


    This Spring bean implements the `ItemWriter` interface; the item type is `String`.
    *WriteRepository* is injected, so we can write records via the `write()` method.


    ![Image](images/sq.jpg) **Note**  You might ask why we have `ReadRepository` and
    `WriteRepository` in place at all when we want to keep the example as simple as
    possible. The reason is testability. I want to make sure that the examples are
    working as described, so the SB configuration is covered by simple integrations
    tests. `ReadRepository` and `WriteRepository` are often faked in these tests and
    used for verification. But this testing is beyond the scope of this book. Tests
    alongside the book examples can be found in the GitHub repository (`https://github.com/lkrnac/book-eiws-code-samples`).


    Chunk-Oriented Processing Example with XML Configuration


    The chunk-oriented processing examples use Spring Boot, but you’ll see that configuring
    SB applications with the plain Spring Framework is similar. Our first SB example,
    shown in [Listing 9-6](#9781484207949_Ch09_1.xhtml#FPar7), uses XML configuration.


    [***Listing 9-6***](#9781484207949_Ch09_1.xhtml#_FPar7). XML Configuration of
    Chunk-Oriented Processing Example (File batch-config.xml in Folder src/main/resources
    of Example Project 0901-chunk-processing-generic-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

        http://www.springframework.org/schema/batch/spring-batch.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <job id="simpleRecordsJob">

        <step id="simpleRecordsStep">

          <tasklet>

            <chunk reader="simpleRecordReader" writer="simpleRecordWriter"

              processor="simpleRecordProcessor" commit-interval="4" />

          </tasklet>

        </step>

      </job>

    </beans:beans>

    ```


    We don’t use the `beans` namespace by default, because using the `batch` namespace
    (we don’t need to use the `<batch:` prefix for batch XML tags) makes the SB configurations
    much more readable. We use this approach for SB configurations in this chapter.


    The configuration itself contains the definition of one `Job` with one `Step`,
    which uses our common reader, processor, and writer. The `<job>` and `<step>`
    XML tags create Spring beans with names defined by the `id` attribute. The last
    attribute in the `Step` definition is `commit-interval`, which specifies the chunk
    size for this step. [Listing 9-7](#9781484207949_Ch09_1.xhtml#FPar8) shows how
    the XML configuration is loaded into the Spring context.


    [***Listing 9-7***](#9781484207949_Ch09_1.xhtml#_FPar8). BatchConfiguration Class
    for Chunk-Oriented Processing Example with XML Configuration (0901-chunk-processing-generic-xml)


