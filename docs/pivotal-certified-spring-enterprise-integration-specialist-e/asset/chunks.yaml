    As you can see, all these `java.rmi` API details are invasive to the application
    code. It is obvious that exposing a method via RMI wouldn’t always be a refactoring-free
    operation. You can see that the implementation class itself needs to be serializable
    (as do the parameters and return value as well). [Listing 2-3](#9781484207949_Ch02.xhtml#FPar4)
    shows RMI code that creates the RMI registry and starts the server. It is the
    last piece of our server example.


    [***Listing 2-3***](#9781484207949_Ch02.xhtml#_FPar4). Example of Exposing the
    RMI Service (0201-java-rmi-service)


    ```

    package net.lkrnac.book.eiws.chapter02.rmi.java;


    import java.rmi.AlreadyBoundException;

    import java.rmi.RemoteException;

    import java.rmi.registry.LocateRegistry;

    import java.rmi.registry.Registry;


    public class RmiServer {

      private static final int RMI_PORT = 10201;


    public static void main(String... args) throws RemoteException,

          AlreadyBoundException {

        BarServiceImpl engine = new BarServiceImpl();

        Registry registry = LocateRegistry.createRegistry(RMI_PORT);

        registry.bind("BarService", engine);

      }

    }

    ```


    In this case, we are creating an RMI registry and thus exposing the RMI method
    on port 10201\. `BarService` is the RMI name that identifies our method. So it
    is possible to expose various methods that will be bound to different RMI names.
    This concept is similar to Spring MVC request mappings.


    The next piece of our RMI puzzle is the client side. The name of this example
    project is `0201-java-rmi-client`. [Listing 2-4](#9781484207949_Ch02.xhtml#FPar5)
    shows the main client class.


    [***Listing 2-4***](#9781484207949_Ch02.xhtml#_FPar5). RMI Client Example (0201-java-rmi-client)


    ```

    package net.lkrnac.book.eiws.chapter02.rmi.java;


    import java.rmi.NotBoundException;

    import java.rmi.RemoteException;

    import java.rmi.registry.LocateRegistry;

    import java.rmi.registry.Registry;


    public class FooClient {

      private static final int RMI_PORT = 10201;


    public static void main(String... args) throws RemoteException,

          NotBoundException {

        System.out.println(new FooClient().callService("Main method"));

      }


    public String callService(String parameter) {

        Registry registry;

        try {

          registry = LocateRegistry.getRegistry(RMI_PORT);

          BarService barService = (BarService) registry.lookup("BarService");

          return barService.serveBar(parameter);

        } catch (RemoteException | NotBoundException e) {

          throw new RuntimeException(e);

        }

      }

    }

    ```


    The method `callService` tries to find the RMI registry on port 10201\. If `callService`
    can’t find the registry, `NotBoundException` is thrown. This is another invasive
    aspect of the pure Java RMI API. The registry is then searched for the RMI object
    based on the name. Finally, the actual RMI call is performed.


    When we run server example `0201-java-rmi-service`, it creates an RMI registry
    and remains running, exposing the service. After running client `example 0201-java-rmi-client`,
    it will try to establish a connection to the remote RMI registry and call the
    remote method. [Listing 2-5](#9781484207949_Ch02.xhtml#FPar6) shows the console
    output after running the client example.


    [***Listing 2-5***](#9781484207949_Ch02.xhtml#_FPar6). Console Output of the RMI
    Example


    ```

    Bar service (Java RMI) response to parameter: Main method

    ```


    You might be wondering where Spring enters the equation and how it helps with
    the RMI. Let’s focus on that now.


    Spring RMI Support


    Spring always tries to iron out the API flaws of existing technologies. Java RMI
    is no exception. Spring allows for noninvasive RMI exposure. This means we can
    forget about `RemoteException`, `UnicastRemoteObject`, and the `Remote` interface
    altogether. We can expose existing code without changes. The only contract requirement
    needed with Spring is serialization. But Spring can’t avoid it. Serialization
    is in the nature of this distributed technology.


    RMI registry handling is also much easier with Spring. Spring tries to see whether
    there is an RMI registry on given port. If not, an RMI registry is created on
    demand. Let’s explore Spring’s RMI constructs in an example. [Listing 2-6](#9781484207949_Ch02.xhtml#FPar7)
    shows the service interface.


    [***Listing 2-6***](#9781484207949_Ch02.xhtml#_FPar7). Shared Interface (0202-spring-rmi-java-config-service
    and 0202-spring-rmi-java-config-client)


    ```

    package net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig;


    public interface BarService {

      public String serveBar(String param);

    }

    ```


    [Listing 2-7](#9781484207949_Ch02.xhtml#FPar8) shows the implementation.


    [***Listing 2-7***](#9781484207949_Ch02.xhtml#_FPar8). Shared Interface and Service
    Implementation (0202-spring-rmi-java-config-service)


    ```

    package net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.service;


    import net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;

    import org.springframework.stereotype.Service;


    @Service

    public class BarServiceImpl implements BarService {

      @Override

      public String serveBar(String param) {

        return "Bar service 0202 response to parameter: " + param;

      }

    }

    ```


    As you can see, no RMI-specific code is needed. This is a huge advantage over
    the pure Java RMI API, because we can expose any method via RMI without refactoring.
    The only requirement is serialization of all types in the method signature. The
    `RmiServiceExporter` bean is needed in the Spring context for RMI registry binding
    and registering, as shown in [Listing 2-8](#9781484207949_Ch02.xhtml#FPar9).


    [***Listing 2-8***](#9781484207949_Ch02.xhtml#_FPar9). Spring RMI Service Configuration
    (0202-spring-rmi-java-config-service)


    ```

    package net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.service;


    import net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.remoting.rmi.RmiServiceExporter;


    @Configuration

    @ComponentScan

    public class ServiceConfiguration {

      private static final int RMI_PORT = 10202;


    @Bean

      public RmiServiceExporter registerService(BarService barService) {

        RmiServiceExporter rmiServiceExporter = new RmiServiceExporter();

        rmiServiceExporter.setServiceName("BarService");

        rmiServiceExporter.setService(barService);

        rmiServiceExporter.setServiceInterface(BarService.class);

        rmiServiceExporter.setRegistryPort(RMI_PORT);


    return rmiServiceExporter;

      }

    }

