  raw: 'Last, we use the `jms` Spring namespace to configure the JMS listener plug-in’s
    JMS listener bean. Notice that we are using `transactionManager` as an attribute
    for this listener container. This allows the listener container to offer global
    transaction support. Another important attribute is enabling of transacted acknowledge
    mode in the `acknowledge` attribute. Without this configuration, the listener
    wouldn’t be transacted and therefore would ignore all transaction managers. This
    configuration is also the reason we don’t need to turn on `<tx:transaction-driven>`
    to enable the `@Transactional` annotation on `SimpleMessageSender`. We are not
    using this annotation in this case.


    As the listener method is configured, `readMessage()` is implemented in the `simpleMessageListener`
    bean shown in [Listing 7-7](#9781484207949_Ch07.xhtml#FPar8).


    [***Listing 7-7***](#9781484207949_Ch07.xhtml#_FPar8). JMS Listener Simulating
    Processing Error to Highlight JTA Support (0701-jta-xml-config)


    ```

    package net.lkrnac.book.eiws.chapter07;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    @Transactional

    public class SimpleMessageListener {

      private SimpleService simpleService;

      private boolean errorSimulated = false;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    public void readMessage(String message) {

        simpleService.processText(message);

        postprocess(message);

      }


    private void postprocess(String message) {

        // simulate error

        if (!errorSimulated) {

          errorSimulated = true;

          throw new IllegalArgumentException(message);

        }

      }

    }

    ```


    The `@Component` annotation registers this class as a Spring bean. It injects
    the `SimpleService` bean via constructor injection. The `readMessage()` method
    is used for listening to JMS messages in the JMS configuration from [Listing 7-6](#9781484207949_Ch07.xhtml#FPar7).
    The JMS listener container from this listing is configured to participate in a
    global transaction, so we have this bean covered by the `@Transactional` annotation,
    which is participating in the global JTA transaction (including JMS and the underlying
    JDBC data source).


    This method first calls `SimpleService` to process the message, which means persisting
    it into the H2 in-memory database. After that, we simulate an error, but only
    for the first received message.


    Notice that a similar implementation was already shown in [Chapter 6](#9781484207949_Ch06.xhtml),
    in [Listing 6-28](#9781484207949_Ch06.xhtml#FPar30), as we discussed potential
    duplicates if an error occurs for a transacted JMS listener. In that case, the
    behavior was shown in [Figure 6-9](#9781484207949_Ch06.xhtml#Fig9), and we ended
    up with a duplicate message being persisted in the database.


    [Listing 7-8](#9781484207949_Ch07.xhtml#FPar9) shows the main class of this example.


    [***Listing 7-8***](#9781484207949_Ch07.xhtml#_FPar9). Main Class of XML Configuration
    Example (0701-jta-xml-config)


    ```

    package net.lkrnac.book.eiws.chapter07;


    import org.springframework.boot.SpringApplication;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.annotation.ImportResource;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.scheduling.annotation.EnableScheduling;

    import org.springframework.transaction.annotation.EnableTransactionManagement;


    @Configuration

    @ComponentScan

    @EnableJms

    @EnableScheduling

    @ImportResource(value = { "classpath:spring-jdbc-config.xml",

        "classpath:spring-jta-config.xml", "classpath:spring-jms-config.xml" })

    public class JtaApplication {

      public static void main(String[] args) throws Exception {

        SpringApplication.run(JtaApplication.class, args);

      }

    }

    ```


    This class takes advantage of Spring Boot constructs to start the application
    based on the `main` method. It allows us to use this example as an executable
    JAR, something Spring Boot introduced. But we don’t use the autoconfiguration
    feature in this case, because we want to highlight plain Spring configuration
    with JTA.


    Therefore, we have to enable each Spring feature separately:


    *   Component scanning in the current package and its subpackages by the `@ComponentScan`
    annotation

    *   Enabling Spring JMS via the `@EnableJms` annotation

    *   Enabling Spring scheduling support via the `@EnableScheduling` annotation,
    used for sending messages (see [Listing 7-3](#9781484207949_Ch07.xhtml#FPar4))

    *   Importing all XML configurations explained for this example


    After running this example, we can observe the output in [Listing 7-9](#9781484207949_Ch07.xhtml#FPar10).


