    file `testRequest.xml` with the help of `RequestCreator` and `RequestCreators`.
    Now we are ready to perform virtual requests. We do this by calling the method
    `sendRequest` on the mock client instance. It returns a virtual response. Finally,
    we verify that the web service responded with the expected result and message
    payload. The `ResponseMatchers` class has a lot of helper verification methods,
    so we are capable of testing complex behaviors.


    Client-Side Testing Support


    When we are testing a web service client, we need to use the test client to perform
    requests first. Then we receive responses from the fake server and verify that
    they are represented on the client as expected. The classes that help us with
    it are as follows:


    *   `MockWebServiceServer` is used to simulate the client and to send requests.

    *   `org.springframework.ws.test.client.ResponseCreator`/`org.springframework.ws.test.client.ResponseCreators`
    provides support recording the expected responses into the fake server. It will
    be used to send responses from the fake server.

    *   `org.springframework.ws.test.client.RequestMatchers` provides support recording
    the expected requests into the fake server. It will be used to verify that the
    client sent the correct payload in the request.


    Let’s explore the testing support in [Listing 3-38](#9781484207949_Ch03.xhtml#FPar43).


    [***Listing 3-38***](#9781484207949_Ch03.xhtml#_FPar43). Client-Side Testing (0303-ws-boot-client)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.boot.client;


    import static org.testng.Assert.assertEquals;

    import java.io.IOException;

    import net.lkrnac.book.eiws.chapter03.ws.boot.model.UserDetailsResponse;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.test.annotation.DirtiesContext;

    import org.springframework.test.context.ContextConfiguration;

    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;

    import org.springframework.ws.client.core.WebServiceTemplate;

    import org.springframework.ws.test.client.MockWebServiceServer;

    import org.springframework.ws.test.client.RequestMatchers;

    import org.springframework.ws.test.client.ResponseCreator;

    import org.springframework.ws.test.client.ResponseCreators;

    import org.testng.annotations.Test;


    @ContextConfiguration(classes = WsBootClientConfiguration.class)

    public class WsBootClientITest extends AbstractTestNGSpringContextTests {

      @Autowired

      private WebServiceClient webServiceClient;


    @Autowired

      private WebServiceTemplate webServiceTemplate;


    @Test

      public void testGetUserDetails() throws IOException {

        // GIVEN

        MockWebServiceServer mockWsServer =

            MockWebServiceServer.createServer(webServiceTemplate);


    ResponseCreator responseCreator =

            ResponseCreators.withPayload(new ClassPathResource("testResponse.xml"));


    mockWsServer.expect(

            RequestMatchers.payload(new ClassPathResource("testRequest.xml")))

            .andRespond(responseCreator);


    // WHEN

        UserDetailsResponse userDetails =

            webServiceClient.getUserDetails("lubos.krnac@gmail.com");


    // THEN

        assertEquals(userDetails.getFirstName(), "Lubos");

        assertEquals(userDetails.getLastName(), "Krnac");

        mockWsServer.verify();

      }

    }

    ```


    Similar to the server-side testing example in [Listing 3-37](#9781484207949_Ch03.xhtml#FPar42),
    TestNG is used as a testing framework. The test uses `WsBootClientConfiguration`
    as a configuration under test. For creation of a fake server, we need to autowire
    an instance of `WebServiceTemplate`. Then we record requests that are expected
    from the client and responses provided by the fake server.


    The testing client instance was injected from the Spring testing configuration.
    We perform the client call as it would be done from our client application. In
    the verification phase, we need to verify that the client correctly represented
    responses from the fake server. Last but not least, we need to verify that the
    requests sent from the test client to the fake server were correct. This is done
    by a method called `verify` on the fake server instance.


    Summary


    In this chapter, we briefly compared concepts for creating web services and distributed
    applications and the advantages that arise from decoupling services in comparison
    to remoting technologies. Then we presented XML marshalling technologies that
    can be integrated into Spring’s ecosystem.


    We also explored the benefits of a Contract First approach for building web services
    with the Spring Web Services project. This approach helps abstract away the complexity
    of developing web services and makes it much more approachable by providing APIs
    to follow best practices on top of existing libraries and protocols. It enables
    us to create SOAP-based web services that can communicate via HTTP, JMS, e-mail,
    and XMPP transport protocols.


    We showed how to optimally start developing a web service contract based on communication
    requirements. The message payload is the starting line for generating an XSD contract
    draft. Subsequently, the JAXB 2 Java model can be generated based on this contract.
    Configuring a container environment and Spring configuration with use of XML and
    Java contexts was also covered.


    Routing web service messages is the backbone of productive development with Spring.
    We can benefit from routing based on the payload root element, WS-Addressing,
    and the `SOAPAction` header.


    Client-side support is a crucial part of Spring offerings because it allows us
    to generate a Java model from an XSD contract. Finally, the chapter explained
    how to intercept and handle errors and to test Spring configurations in isolation
    and more effectively.


    CHAPTER 4


    ![image](images/frontdot.jpg)


    RESTful Web Services


    This chapter explains the principles that conquer the enterprise integration world.
    It’s about Representational State Transfer, or REST.


    The evolution of distributed systems didn’t stop with remoting and web services.
    SOAP allowed high decoupling, which solved a major problem of remoting technologies.
    As a successor of remoting technologies, SOAP web services were adopted by big
    enterprise companies. Cooperation between distributed development teams was enhanced,
    because SOAP web services rely on contracts. A well-defined XSD/WSDL contract
    can help avoid ambiguities or sanitize poor communication between developers on
    the client side and those on the server side.


    But after some time, many people started to experience problems with SOAP web
    services. First, developing SOAP web services is not trivial. SOAP’s complexity
    started to create a bigger and bigger bottleneck for developing enterprise applications.
    Even if SOAP provided rich possibilities for complex requirements, it turned out
    to be overkill in most cases. This slowed development and made maintenance more
    expensive.


    The next highly criticized aspect of traditional web services is the XML payload
    it relies on. Even when computation capacities were multiplied every few years,
    users started to expect lower and lower latency. But XML is verbose, and SOAP
    completely relies on the XML exchange format. So when lightweight exchange formats
    started to pop up (most notably, JSON), SOAP couldn’t take advantage of them.


    Parallel to the SOAP web services track, a different school of web service development
    was evolving. This approach is REST (which is only two years younger than SOAP).
    Although SOAP gained a wider adoption at the beginning, people started to realize
    that REST has more advantages.'
