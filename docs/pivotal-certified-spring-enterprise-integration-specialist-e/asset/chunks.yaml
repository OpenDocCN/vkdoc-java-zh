    The *message channel* is the last category of SI components (alongside the message
    and message endpoint). It is used to connect message endpoints. A message channel
    is a simple Spring bean, so no additional infrastructure is needed to fulfill
    its task. But if needed, messages temporarily stored in a channel can be persisted
    with JMS or JDBC.


    To understand various channel types and their characteristics, it is good to review
    their inheritance structure, shown in [Figure 8-14](#9781484207949_Ch08_2_Ext.xhtml#Fig14).


