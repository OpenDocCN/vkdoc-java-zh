    Error Handling


    The Spring Web Services project enables easy translation of errors penetrated
    from web service logic. Similar to interception support, error handling is divided
    into the server and client side also.


    Server-Side Error Handling


    Lax error handling is often a source of serious security vulnerabilities that
    expose implementation details of a web service. When an exception bubbles up from
    the web service logic to the servlet container, it commonly sends a failed message
    with information about the web server and stack trace as a response message. The
    attacker can analyze (based on such a message) the type of web server, version,
    platform the web service is running on, and the frameworks used. Such data can
    be further used to create more-targeted attacks. This problem is number 6 in the
    Open Web Application Security Project (OWASP) Top 10 list of security risks.


    Translation of exceptions on the server is useful for hiding these implementation
    details. The idea is that Spring will use registered exception resolvers to create
    a generic response instead of exposing sensitive information to the client. `MessageDispatcher`
    scans the classpath for implementations of the `EndpointExceptionResolver` interface.
    It has only one method called `resolveException`. This interface can be used in
    various ways:


    *   A custom implementation fulfills special requirements of error translation.

    *   `SoapFaultMappingExceptionResolver` maps each exception to a particular SOAP
    fault with an explicit error message.

    *   `SimpleSoapExceptionResolver` translates all exceptions into the SOAP client
    error with an exception message as a response payload.


    Last but not least is the `@SoapFault` exception. It is used to mark the exception
    type, so that the exception can be translated into a message. The SOAP fault is
    specified in annotation parameters in such a case. All these mechanisms allow
    for higher security standards, but at the same time for variability to inform
    the client about known problems.


    There aren’t any specific XML elements for error handling. Therefore, we will
    focus only on Java examples. With XML, we would use standard DI elements such
    as `bean`, `property`, and `ref`. [Listing 3-32](#9781484207949_Ch03.xhtml#FPar37)
    shows how to register `SoapFaultMappingExceptionResolver`.


    [***Listing 3-32***](#9781484207949_Ch03.xhtml#_FPar37). SoapFaultMappingExceptionResolver
    Registration Example (0306-ws-error-service)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.error.server;


    import java.util.Properties;


    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.boot.context.embedded.ServletRegistrationBean;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ws.config.annotation.EnableWs;

    import org.springframework.ws.soap.server.endpoint.SoapFaultDefinition;

    import org.springframework.ws.soap.server.endpoint.SoapFaultMappingExceptionResolver;

    import org.springframework.ws.transport.http.MessageDispatcherServlet;

    import org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;


    @EnableWs

    @Configuration

    @ComponentScan

    @EnableAutoConfiguration

    public class ServerConfiguration {

      public static final String NAMESPACE =

          "http://localhost:10306/0306-ws-error-service";


    @Bean

      public SimpleWsdl11Definition userDetails() {

        return new SimpleWsdl11Definition(new ClassPathResource("userDetailsSchema.xsd"));

      }


    @Bean

      public ServletRegistrationBean dispatcherServlet(

          ApplicationContext applicationContext) {

        MessageDispatcherServlet servlet = new MessageDispatcherServlet();

        servlet.setApplicationContext(applicationContext);

        servlet.setTransformWsdlLocations(true);

        return new ServletRegistrationBean(servlet, "/*");

      }


    @Bean

      public SoapFaultMappingExceptionResolver exceptionResolver() {

        SoapFaultMappingExceptionResolver exceptionResolver =

            new SoapFaultMappingExceptionResolver();


    SoapFaultDefinition defaultSoapFault = new SoapFaultDefinition();

        defaultSoapFault.setFaultCode(SoapFaultDefinition.SERVER);

        exceptionResolver.setDefaultFault(defaultSoapFault);


    Properties errorMappings = new Properties();

        errorMappings.put(IllegalStateException.class.getName(),

            SoapFaultDefinition.CLIENT.toString());

        exceptionResolver.setExceptionMappings(errorMappings);

        exceptionResolver.setOrder(1);


    return exceptionResolver;

      }

    }

    ```


    The exception resolver is registered in the method `exceptionResolver`. We first
    create an object of type `SoapFaultMappingExceptionResolver`. Then we register
    the default SOAP fault. This is used for every error unless a more specific mapping
    exists. Specific mappings are registered as an array of `Properties` type into
    the field `exceptionMappings` of `SoapFaultMappingExceptionResolver`. In this
    case, we map `IllegalStateException` to the client SOAP error. Method `setOrder`
    specifies the order in which mappings are processed when an exception occurs.


    If we prefer `SimpleSoapExceptionResolver` or a custom exception resolver implementation,
