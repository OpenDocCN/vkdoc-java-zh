    ```


    当我们创建 Spring 上下文实例并检索`JobLauncher`和`Job`后，我们多次执行`prepareTeaJob`作业。`createJobParameters`方法帮助我们创建包含名为`sugarAmount`参数的`JobParameters`实例。第一次执行时不加糖，第二次泡茶时加两勺糖。每次执行的状态都会被打印出来，程序结束时关闭
    Spring 上下文。清单 9-34 展示了 Spring Boot 配置文件。


