- fmt: "请注意，接口（`MessageChannel`、`PollableChannel`、`SubscribableMessageChannel`）是`org.springframework.messaging`包的一部分，该包位于Spring\
    \ Core框架的`spring-messaging`模块中。所有实现都位于SI框架本身（`org.springframework.integration.channel`包）。\n\
    \n根据消费者数量，通道有两种类型：\n\n*   **点对点通道**：每条消息仅由一个端点消费。可以通过XML元素`<int:channel>`配置，或注册为Java\
    \ Bean。除`PublishSubscribeChannel`之外的所有通道实现都属于此类。\n*   **发布/订阅通道**：每条消息都会发送给所有已订阅的消费者。可以通过XML元素`<int:publish-subscribe-channel>`配置，或将`PublishSubscribeChannel`注册为Spring\
    \ Bean。\n\n从消息传递的角度来看，消息通道可以参与以下方式：\n\n**同步消息传递**\n\n*   消费者通过调用者线程立即被触发。\n* \
    \  如果SI流程仅包含同步被动组件，则调用者会被阻塞，直到下游组件回复到回复通道。\n*   通道可以在调用者和消费者之间传播事务或异常。\n*   消费者可以使用调用者的安全上下文。\n\
    *   实现：`DirectChannel`、同步`PublishSubscribeChannel`。\n\n**异步消息传递**\n\n*   消费在与消息发送不同的线程中完成。\n\
    *   消费者无法使用发送者的事务或安全上下文。\n*   消费者无法将异常传播给发送者。\n*   实现：`QueueChannel`、`PriorityChannel`、`ExecutorChannel`、`RendezvousChannel`、异步`PublishSubscribeChannel`。\n\
    \n### `DirectChannel`\n\n`DirectChannel`是最简单的通道实现。它是一个同步的、点对点的通道。消费者需要订阅它，这样在发送者发送消息后，它会立即被触发。由于它是同步的，调用者和发送者共享同一个线程，就像它们通过简单的Java调用进行交互一样。\n\
    \n该通道的展示将参考之前的示例，因为所有这些示例都使用了此通道实现。我们可以通过以下方式配置它：\n\n*   XML元素`<int:channel>`，它不使用`<int:queue>`、`<int:priority-queue>`或`<int:dispatcher>`子元素。此配置的一个示例是`0828-aggregator-javaconfig`示例项目中的`inChannel`或`aggregatedChannel`，参见[清单8-103](#9781484207949_Ch08_2_Ext.xhtml#FPar106)。\n\
    *   使用其中一个构造函数创建`DirectChannel`实例，并通过`@Bean`注解将其注册为Spring Bean。然后，此Bean的名称可用作消息端点配置中的通道名称。Java配置示例可以在`0826-splitter-javaconfig`示例项目中看到，如[清单8-95](#9781484207949_Ch08_2_Ext.xhtml#FPar98)中的`inChannel`或`splitChannel`。\n\
    \n### `QueueChannel`\n\n`QueueChannel`是第二常用的通道实现。它是一个异步的、点对点的通道，消费者需要主动轮询它以确认是否有新消息到达。此消息传递在单独的线程中完成，可能导致通信延迟。消费者组件需要是活跃的（需要配置轮询器）。\n\
    \n由于它是异步的，事务和安全上下文不会从发送者填充到消费者。此外，消费者异常不会传播回发送者。\n\n因为消费者正在轮询消息，所以通道显然需要能够临时存储消息。在内部，它使用标准的Java\
    \ `BlockingQueue`来存储它们。因此，它使用先进先出（FIFO）的消息排序。当我们配置`QueueChannel`时，可以选择配置队列容量。如果消息容量达到上限，发送者将被阻塞，直到有空间可用或达到超时时间。默认情况下，此队列的容量为`Integer.MAX_VALUE`。\n\
    \n要配置`QueueChannel`，您可以执行以下操作：\n\n*   使用带有`<int:queue>`子元素的XML元素`<int:channel>`。容量可以通过`<int:queue>`的`capacity`属性定义。此配置的一个示例是`0821-bridge-xml`示例项目中的`inChannel`，参见[清单8-81](#9781484207949_Ch08_1.xhtml#FPar84)。\n\
    *   使用其中一个构造函数创建`QueueChannel`实例，并通过`@Bean`注解将其注册为Spring Bean。队列容量可以作为参数传递给构造函数。然后，此Bean的名称可用作消息端点配置中的通道名称。Java配置示例可以在`0823-bridge-to-javaconfig`示例项目中看到，如[清单8-89](#9781484207949_Ch08_1.xhtml#FPar92)中的`inChannel`。\n\
    \n### `PriorityChannel`\n\n`PriorityChannel`是`QueueChannel`的子类。因此，它们相似并共享大多数特性。唯一的区别是`PriorityChannel`在底层队列存储中不使用FIFO进行消息排序。使用`PriorityChannel`，我们能够指定消息将从通道中被消费的顺序。此顺序可以通过两种方式配置：\n\
    \n*   基于消息头`priority`。具有更高优先级值的消息将首先被消费。当未为`PriorityChannel`配置`comparator`时，默认使用此机制。\n\
    *   基于`Comparator<Message<T>>`实现，使用自定义逻辑进行消息比较。\n\n`PriorityChannel`可以通过以下方式配置：\n\
    \n*   带有`<int:priority-queue>`子元素的XML元素`<int:channel>`。\n*   使用其中一个构造函数创建`PriorityChannel`实例，并通过`@Bean`注解将其注册为Spring\
    \ Bean。比较器或队列容量可以作为构造函数参数进行配置。然后，此Bean的名称可用作消息端点配置中的通道名称。\n\n#### `PriorityChannel`示例\n\
    \n此示例实现了我们自己的比较器，用于对`PriorityChannel`中的消息进行排序。这是一个基于XML的配置。[清单8-109](#9781484207949_Ch08_2_Ext.xhtml#FPar112)显示了比较器实现。\n\
    \n[***清单8-109***](#9781484207949_Ch08_2_Ext.xhtml#_FPar112). `PriorityChannel`示例的比较器（`0830-channel-priority-xml`）\n\
    \n```java\npackage net.lkrnac.book.eiws.chapter08;\nimport java.util.Comparator;\n\
    import org.springframework.messaging.Message;\nimport org.springframework.stereotype.Component;\n\
    \n@Component\npublic class SimpleMessageComparator implements Comparator<Message<String>>\
    \ {\n  @Override\n  public int compare(Message<String> o1, Message<String> o2)\
    \ {\n    return -1 * o1.getPayload().compareTo(o2.getPayload());\n  }\n}\n```\n\
    \n这里值得记住`Comparator<T>.compare()`的约定。比较器将根据返回的负整数/零/正整数来决定`o1`与`o2`相比是小于/等于/大于。较小的对象将首先从通道中被消费。\n\
    \n在这种情况下，我们对`String`消息负载使用反向自然排序。`String`的自然排序是按字母顺序。因此，如果我们的消息应该按反向字母顺序从通道中被消费，我们就使用这个比较器。[清单8-110](#9781484207949_Ch08_2_Ext.xhtml#FPar113)显示了XML\
    \ SI配置。"
  raw: 'Notice that the interfaces (`MessageChannel`, `PollableChannel`, `SubscribableMessageChannel`)
    are part of the `org.springframework.messaging` package, which is located in the
    `spring-messaging` module of the Spring Core framework. All the implementations
    are located in the SI framework itself (the package `org.springframework.integration.channel`).


    Two types of channels are possible in terms of the number of consumers:


    *   *Point-to-point channel*: Each message is consumed by exactly one endpoint.
    Can be configured via the XML element `<int:channel>` or registered as a Java
    bean. All channel implementations except `PublishSubscribeChannel` belong here.

    *   *Publish/subscribe channel*: Each message is sent to all subscribed consumers.
    Can be configured via the XML element `<int:publish-subscribe-channel>` or by
    registering `PublishSubscribeChannel` as a Spring bean.


    From a message hand-off point of view, a message channel can participate in the
    following:


    Synchronous message passing


    *   The consumer is triggered immediately by using a caller thread.

    *   If the SI flow contains only synchronous passive components, the caller is
    blocked until the downstream component replies to the reply channel.

    *   The channel can propagate transactions or exceptions between the caller and
    consumer.

    *   The consumer can use the security context of the caller.

    *   Implementations: `DirectChannel`, synchronous `PublishSubscribeChannel`.


    Asynchronous message passing


    *   Consumption is done in a different thread from that of the sending of the
    message.

    *   The consumer can’t use the transaction or security context from the sender.

    *   The consumer can’t propagate exceptions to the sender.

    *   Implementations: `QueueChannel`, `PriorityChannel`, `ExecutorChannel`, `RendezvousChannel`,
    asynchronous `PublishSubscribeChannel`.


    DirectChannel


    `DirectChannel` is the simplest implementation of a channel. It is a synchronous,
    point-to-point channel. The consumer needs to subscribe to it, so it will be triggered
    immediately after the sender sends the message. Because it is synchronous, the
    caller and sender share the same thread as if their interaction were done via
    a simple Java call.


    The showcase of this channel will refer to previous examples as all of them were
    using this channel implementation. We can configure it via the following:


    *   The XML element `<int:channel>` which doesn’t use `<int:queue>`, `<int:priority-queue>`,
    or `<int:dispatcher>` subelements. An example of this configuration is `inChannel`
    or `aggregatedChannel` in the `0828-aggregator-javaconfig` example project, seen
    in [Listing 8-103](#9781484207949_Ch08_2_Ext.xhtml#FPar106).

    *   Use one of the constructors to create an instance of `DirectChannel` and register
    it as a Spring bean via the `@Bean` annotation. The name of this bean then can
    be used as the channel name in the message endpoint configurations. A Java configuration
    example can be seen in [Listing 8-95](#9781484207949_Ch08_2_Ext.xhtml#FPar98)
    as `inChannel` or `splitChannel` in example project `0826-splitter-javaconfig`.


    QueueChannel


    `QueueChannel` is the second most used channel implementation. It is an asynchronous,
    point-to-point channel, whereby the consumer needs to actively poll against it
    to verify whether the new message arrived. This message passing is done in a separate
    thread and can cause delays in communication. The consumer component needs to
    be active (needs to configure the poller).


    As it’s asynchronous, the transaction and security contexts are not populated
    from the sender to the consumer. Additionally, the consumer exceptions are not
    propagated back to the sender.


    Because the consumer is polling for messages, the channel obviously needs to be
    able to temporarily store messages. Internally, it uses the standard Java `BlockingQueue`
    to store them. So it uses first-in/first-out (FIFO) ordering of messages. When
    we configure `QueueChannel`, you have the option to configure the queue capacity.
    If the capacity of the messages is reached, the sender will be blocked until room
    is available or the time-out is reached. By default, this queue has the capacity
    `Integer.MAX_VALUE`.


    To configure `QueueChannel`, you can do the following:


    *   Use the XML element `<int:channel>` with the `<int:queue>` subelement. The
    capacity can be defined via the `capacity` attribute of `<int:queue>`. An example
    of this configuration is `inChannel` in the `0821-bridge-xml` example project,
    seen in [Listing 8-81](#9781484207949_Ch08_1.xhtml#FPar84).

    *   Use one of constructors to create an instance of `QueueChannel` and register
    it as a Spring bean via the `@Bean` annotation. The queue capacity can be passed
    to the constructor as a parameter. The name of this bean can then be used as the
    channel name in the message endpoint configurations. A Java configuration example
    can be seen in [Listing 8-89](#9781484207949_Ch08_1.xhtml#FPar92) as `inChannel`
    in example project `0823-bridge-to-javaconfig`.


    PriorityChannel


    `PriorityChannel` is the child class of `QueueChannel`. Therefore, they are similar
    and share most characteristics. The only difference is that `PriorityChannel`
    does not use FIFO for message ordering in the underlying queue storage. With `PriorityChannel`,
    we are able to specify the order in which messages will be consumed from the channel.
    This order can be configured in two ways:


    *   Based on the message header `priority`. Messages with a higher-priority value
    will be consumed first. This mechanism is used by default when `comparator` is
    not configured for `PriorityChannel`.

    *   Based on the `Comparator<Message<T>>` implementation, using custom logic for
    message comparison.


    `PriorityChannel` can be configured via the following:


    *   The XML element `<int:channel>` with the `<int:priority-queue>` subelement.

    *   Use one of constructors to create an instance of `PriorityChannel` and register
    it as a Spring bean via the `@Bean` annotation. The comparator or queue capacity
    can be configured as constructor parameters. The name of this bean can then be
    used as the channel name in the message endpoint configurations.


    PriorityChannel Example


    This example implements our own comparator to order messages in `PriorityChannel`.
    It is an XML-based configuration. [Listing 8-109](#9781484207949_Ch08_2_Ext.xhtml#FPar112)
    shows the comparator implementation.


    [***Listing 8-109***](#9781484207949_Ch08_2_Ext.xhtml#_FPar112). Comparator for
    PriorityChannel Example (0830-channel-priority-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import java.util.Comparator;

    import org.springframework.messaging.Message;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageComparator implements Comparator<Message<String>> {

      @Override

      public int compare(Message<String> o1, Message<String> o2) {

        return -1 * o1.getPayload().compareTo(o2.getPayload());

      }

    }

    ```


    It’s worth remembering the `Comparator<T>.compare()` contract here. The comparator
    will decide that `o1` in comparison to `o2` is less than/equal to/greater than
    based on the returned value negative integer/zero/positive integer. Lesser objects
    will be consumed first from the channel.


    In this case, we use reverse natural ordering of the `String` message payload.
    Natural ordering is in `String`’s case alphabetical. So if our messages should
    be consumed from the channel in reverse alphabetical order, we use this comparator.
    [Listing 8-110](#9781484207949_Ch08_2_Ext.xhtml#FPar113) shows the XML SI configuration.'
