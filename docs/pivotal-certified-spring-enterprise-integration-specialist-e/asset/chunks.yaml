    unidirectional and bidirectional message flows. As its name suggests, it is used
    for chaining message endpoints together without the need to specify channels to
    connect them. Messages are most commonly passed sequentially through chain subelements.


    This component can wrap a set of message endpoints into one message endpoint.
    In fact, we can use a chain as a component in a higher-level chain and thus create
    a complex structure of SI flow chunks connected on various chain levels. Such
    nested chains need to be defined with use of the messaging gateway.


    A chain can be configured via the XML element `<int:chain>`. Notice that there
    is no Java annotation equivalent for a chain definition. It requires only one
    mandatory attribute: `input-channel`. Components used in chains have various restrictions
    as compared to their use outside the chain. For example, components in a chain
    shouldn’t specify `input-channel`. In addition, the following are restrictions
    for the last element in the chain in relation to the output channel:


    *   If the chain is connected to a downstream message endpoint, the last element
    in the chain must specify `output-channel`, or the message should have the `replyChannel`
    header defined.

    *   If the last element is a channel adapter or service activator, it doesn’t
    need to specify the output channel.


    Another restriction is that each endpoint in a chain must produce a message (can’t
    return `null`) and thus terminate the flow. Only the last element can discard
    the message. Elements in a chain can’t be active (can’t have `poller`).


