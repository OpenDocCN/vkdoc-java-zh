    When we define the step, we again use the common reader and the error-simulating
    processor and writer. To configure the skip, we need to include the `faultTolerant()`
    call into the `Step` creation chain, so that we can configure `skipLimit()` and
    an exception to `skip()`. *SkipListener* is configured last, in the `faultTolerant()`
    section.


