    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.annotation.ImportResource;


    @Configuration

    @EnableBatchProcessing

    @ImportResource("classpath:batch-config.xml")

    public class BatchConfiguration {

    }

    ```


    This is a standard Spring configuration class, importing the XML configuration
    from [Listing 9-6](#9781484207949_Ch09_1.xhtml#FPar7). The last annotation is
    `@EnableBatchProcessing`, which enables SB features and creates default beans
    needed for batch processing. We will dive into these beans later in the chapter.
    For now, we just need to know it’s necessary for SB configuration. Notice that
    this configuration class is often used in examples involving XML configuration
    of SB, so we will be referring to this listing often.


    [Listing 9-8](#9781484207949_Ch09_1.xhtml#FPar9) presents the last part of this
    example.


