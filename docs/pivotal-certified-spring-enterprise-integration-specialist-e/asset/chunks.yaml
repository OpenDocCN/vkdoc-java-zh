    Bear in mind that this code is generated from an XSD contract. Therefore, when
    the contract is changed, the JAXB 2 model is regenerated. Any changes to POJO
    field names or types can trigger Java compiler issues in the code where they are
    used. This useful behavior of the Contract First approach for creating web services
    uses the advantages of Java’s type-safety features. If the XSD contract were generated
    from a Java model, the change could be missed during development. And as we all
    know, the sooner an issue is discovered, the cheaper the damage is.


    The class `ObjectFactory` is a factory for all other types involved. It had wider
    use in earlier versions of JAXB for creation of model instances. But in recent
    versions of JAXB 2, the use of this class is limited, because POJO constructors
    can be used to create model instances now. `ObjectFactory` may be needed depending
    on the complexity of the XSD schema. If you notice that your generated `ObjectFactory`
    contains factory methods returning `JAXBElement<T>` types, your schema may not
    be directly mapped to the Java class hierarchy. Another option is that your XSD
    restrictions can’t be expressed by the Java type system. In such cases, you may
    need to create a meta-structure in the form of `JAXBElement<T>` types. But that
    is rare.'
  trans: '

    最广泛使用的编组器是 JAXB 2，它允许从 XSD 契约生成 Java 模型类。生成的 Java 类会使用特殊的映射注解进行标注，这些注解将 XML 元素映射到
    POJO 类。这种方法称为对象到 XML 映射（OXM）。它与著名的对象关系映射（ORM）类似，后者将 SQL 数据库表映射到 POJO。


    本书中的示例基于 Maven 3 构建系统。因此，使用 `jaxb2-maven-plugin` 进行 Java 模型生成；XJC 绑定编译器用于从 XSD
    契约生成 Java 类。有关此插件的更多信息，请访问 `http://mojo.codehaus.org/jaxb2-maven-plugin/xjc-mojo.html`。Maven
    插件配置如清单 3-7 所示。


    ***清单 3-7***. jsxb2-maven-plugin 的配置


    ```

    <plugin>

      <groupId>org.codehaus.mojo</groupId>

      <artifactId>jaxb2-maven-plugin</artifactId>

      <version>1.6</version>

      <executions>

        <execution>

          <id>xjc</id>

          <goals>

            <goal>xjc</goal>

          </goals>

        </execution>

      </executions>

      <configuration>

        <schemaDirectory>${project.basedir}/src/main/resources/</schemaDirectory>

        <outputDirectory>${project.basedir}/src/main/java</outputDirectory>

        <clearOutputDir>false</clearOutputDir>

      </configuration>

    </plugin>

    ```


    此配置会读取 `src/main/resources` 目录及其子文件夹中的所有 XSD 模式文件。关键要知道，它会选取指定目录结构中存在的所有 XSD 文件，并将
    XSD 类型/元素转换为 Java POJO。因此，POJO 类的数量取决于定义的 XSD 类型/元素数量。如果一个文件有五个 XSD 类型，则会为这些类型生成五个
    POJO 类。如果发生任何名称冲突，转换将失败。


    当我们使用 Maven 目标运行此配置时，JAXB POJO 将基于 XSD 模式生成到 `src/main/java` 文件夹中：


    ```

    > clean install

    ```


    生成的包结构遵循 XSD 模式的命名空间。在我们的例子中，它是 `localhost._10301._0301_ws_xmlconfig_service`。这些
    POJO 基本上代表了 Web 服务的领域模型。对于清单 3-5 中的 XSD 模式，创建了三个类：


    *   `UserRequest`

    *   `UserDetailsReponse`

    *   `ObjectFactory`


    前两个类显然代表了契约中的 XSD 元素。它们包含子元素的 getter 和 setter 方法。最后一个类是一个用于创建契约元素的工厂。它可以用于创建从
    XSD 元素或类型派生的 POJO 类的实例。根据 XSD 契约的不同，可能不需要它。清单 3-8 展示了生成的类及其 JAXB 2 注解。


    ***清单 3-8***. 生成的 JAXB 2 模型


    ```

