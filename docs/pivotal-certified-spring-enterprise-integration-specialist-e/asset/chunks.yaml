    Readers familiar with Spring Core features shouldn ’t be surprised. This Java
    configuration is the exact mirror of the XML configuration in the previous example
    ([Listing 9-23](#9781484207949_Ch09_1.xhtml#FPar26)). The `@Bean` annotation and
    `<bean>` XML tag can be interchanged one to one in most cases for Spring configurations.
    The only difference is when `FactoryBean` is used, because XML configuration calls
    `getObject()` automatically, whereas the Java configuration needs to call this
    method explicitly. In this case, we need to create `JobRepository` by the factory
    method `MapJobRepositoryFactoryBean.getObject()`.


