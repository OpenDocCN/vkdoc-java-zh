    `@RequestMapping` 注解具有多种属性。`method` 属性指定了被注解方法映射到的 HTTP 方法。`consumes` 属性表明我们只处理
    JSON 内容。因此，请求必须包含 `Content-Type: application/json` 才能被路由到此方法。注解属性 `headers` 的值为
    `version=1`，这表示只有 API 版本等于 1 的请求才会被路由到此逻辑。


