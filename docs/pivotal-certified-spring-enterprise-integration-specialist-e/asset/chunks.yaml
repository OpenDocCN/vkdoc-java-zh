- fmt: "消息*transformer*是位于SI流中间的消息端点。与所有中间SI组件一样，它可以参与单向和双向流。它可以以被动模式运行。它还可以有一个轮询子组件，从而充当主动组件。以下是可能的转换器类型：\n\
    \n- **通用消息转换器**：将接收到的Java对象转换为另一个Java对象。由于默认情况下所有消息都是不可变的，因此会创建一个新消息。因此，通用转换器是使用`MessageBuilder<T>`从原始接收消息创建转换后消息的理想选择。XML配置使用`<int:transformer>`标签。当我们想通过Java配置进行配置时，需要使用`@MessageEndpoint`注解`Transformer`类，并使用`@Transformer`注解转换方法。要将此bean扫描到Spring上下文中，我们需要在Java配置类中的某处使用`@IntegrationComponentScan`。\n\
    - **特定技术转换器**：在接收到的消息与各种标准Java类型（例如`Map`、`Object`）和各种常见格式（例如JSON、XML）之间进行转换。这些转换器只能通过XML标签（例如`<int:json-to-object-transformer>`、`<int:map-to-object-transformer>`、`<int:object-to-json-transformer>`）进行配置。\n\
    - **标头过滤器**：消息转换器的一个子集，用于移除指定的标头。可以通过`<int:header-filter>`进行配置。\n\n## 通用转换器示例（XML配置）\n\
    \n[清单8-35](#9781484207949_Ch08_1.xhtml#FPar38)展示了转换类。\n\n[***清单8-35***](#9781484207949_Ch08_1.xhtml#_FPar38).\
    \ XML转换器示例的转换类（0811-transformer-generic-xml）\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
    \npublic class SimpleMessageTransformer {\n  public String transformMessage(String\
    \ message) {\n    return new String(message + \" transformed\");\n  }\n}\n```\n\
    \n这个类甚至不是一个Spring bean，它有一个方法，用于向消息负载追加一个字符串。可以想象，这里可以存在任何转换逻辑。只要该方法返回一个可以表示或转换为SI消息的值，并且其参数是SI可以注入值的（例如，使用`@Header`/`@Headers`注解标记的负载或标头），它就可以在SI流中使用。\n\
    \n[清单8-36](#9781484207949_Ch08_1.xhtml#FPar39)涵盖了SI流配置。\n\n[***清单8-36***](#9781484207949_Ch08_1.xhtml#_FPar39).\
    \ 通用转换器示例的XML SI流配置（文件`si-config.xml`位于示例项目`0811-transformer-generic-xml`的`src/main/resources`文件夹中）\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
    net.lkrnac.book.eiws.chapter08.in.SiWrapperService\" />\n  <int:channel id=\"\
    inChannel\" />\n\n<int:transformer input-channel=\"inChannel\" output-channel=\"\
    transformedChannel\">\n    <bean class=\"net.lkrnac.book.eiws.chapter08.SimpleMessageTransformer\"\
    \ />\n  </int:transformer>\n  <int:channel id=\"transformedChannel\" />\n\n<int:service-activator\
    \ input-channel=\"transformedChannel\" ref=\"writeService\"\n    method=\"writeAndIndicateSuccess\"\
    >\n  </int:service-activator>\n</beans>\n```\n\n入站网关是前面示例中已经熟悉的组件。同样，它映射了我们的通用服务接口`SiWrapperService`，并将消息发送到`inChannel`。然后，此通道连接到转换器。`<int:transformer>`标签指定了`input-channel`和`output-channel`。转换bean是通过`<bean>`子元素创建的，这是创建bean的标准Spring构造。\n\
    \n转换器的输出通道随后连接到映射到我们通用`WriteService.writeAndIndicateSuccess()`的服务激活器。由于此方法返回一个值，我们处理的是双向流，并且响应通过临时回复通道发送回网关组件。[清单8-37](#9781484207949_Ch08_1.xhtml#FPar40)展示了此示例的主类。\n\
    \n[***清单8-37***](#9781484207949_Ch08_1.xhtml#_FPar40). 通用转换器示例的主类（0811-transformer-generic-xml）\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport lombok.extern.slf4j.Slf4j;\n\
    import net.lkrnac.book.eiws.chapter08.in.SiWrapperService;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
    import org.springframework.context.annotation.ImportResource;\n\n@Slf4j\n@SpringBootApplication\n\
    @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n \
    \ public static void main(String[] args) throws InterruptedException {\n    ApplicationContext\
    \ ctx = SpringApplication.run(SiApplication.class, args);\n\nSiWrapperService\
    \ wrapperService = ctx.getBean(SiWrapperService.class);\n    String text = \"\
    simple message\";\n    log.info(\"Sending message: \" + text);\n    boolean result\
    \ = wrapperService.processText(text);\n    log.info(\"Result: \" + result);\n\
    \  }\n}\n```\n\n在通过其服务接口`SiWrapperService`向SI网关发送消息之前，我们首先记录该消息以及从它返回的结果。[清单8-38](#9781484207949_Ch08_1.xhtml#FPar41)展示了如果我们将主类作为Java应用程序运行，此示例的输出。\n\
    \n[***清单8-38***](#9781484207949_Ch08_1.xhtml#_FPar41). XML通用转换器示例的输出\n\n```\n\
    2015-08-23 22:10:39.437  INFO 29551 --- [           main]\nn.l.book.eiws.chapter08.SiApplication\
    \    : Sending message: simple message\n2015-08-23 22:10:39.580  INFO 29551 ---\
    \ [           main]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
    \ simple message transformed\n2015-08-23 22:10:39.595  INFO 29551 --- [      \
    \     main]\nn.l.book.eiws.chapter08.SiApplication    : Result: true\n```\n\n\
    `WriteRepository`bean记录了转换后的消息。[图8-6](#9781484207949_Ch08_1.xhtml#Fig6)展示了此SI流。\n\
    \n![9781484207949_Fig08-06.jpg](images/9781484207949_Fig08-06.jpg)\n\n[图8-6](#9781484207949_Ch08_1.xhtml#_Fig6).\
    \ 通用转换器流的可视化\n\n## 通用转换器示例（Java配置）\n\n现在让我们深入了解基于Java注解的相同流。[清单8-39](#9781484207949_Ch08_1.xhtml#FPar42)展示了转换器配置。\n\
    \n[***清单8-39***](#9781484207949_Ch08_1.xhtml#_FPar42). 使用Java配置的通用转换器（0812-transformer-generic-javaconfig）\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.integration.annotation.MessageEndpoint;\n\
    import org.springframework.integration.annotation.Transformer;\n\n@MessageEndpoint\n\
    public class SimpleMessageTransformer {\n  @Transformer(inputChannel = \"inChannel\"\
    , outputChannel = \"transformedChannel\")\n  public String transformMessage(String\
    \ message) {\n    return new String(message + \" transformed\");\n  }\n}\n```"
  raw: 'A message *transformer* is a message endpoint that sits in the middle of the
    SI flow. Like all middle SI components, it can participate in unidirectional as
    well as bidirectional flow. It can operate in passive mode. It also can have a
    poller subcomponent and thus act as an active component. These types of transformers
    are possible:


    *   *Generic message transformer*: Transforms the received Java object into another
    Java object. A new message is created because, by default, all the messages are
    immutable. So a generic transformer is a good candidate for using `MessageBuilder<T>`
    to create a converted message from the original received message. The XML configuration
    uses the `<int:transformer>` tag. When we want to configure it via Java configuration,
    we need to annotate the `Transformer` class with `@MessageEndpoint` and annotate
    the transformation method with `@Transformer`. To scan this bean into the Spring
    context, we need to use `@IntegrationComponentScan` somewhere in the Java configuration
    classes.

    *   *Technology-specific transformer*: Converts the received message between various
    standard Java types (for example, `Map`, `Object`) and various common formats
    (for example, JSON, XML). These transformers can be configured only via XML tags
    (for example, `<int:json-to-object-transformer>`, `<int:map-to-object-transformer>`,
    `<int:object-to-json-transformer>`).

    *   *Header filter*: A subset of the message transformer that removes specified
    headers. Can be configured via `<int:header-filter>`.


    Generic Transformer Example with XML Configuration


    [Listing 8-35](#9781484207949_Ch08_1.xhtml#FPar38) shows the transformation class.


    [***Listing 8-35***](#9781484207949_Ch08_1.xhtml#_FPar38). Transformation Class
    for XML Transformer Example (0811-transformer-generic-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;


    public class SimpleMessageTransformer {

      public String transformMessage(String message) {

        return new String(message + " transformed");

      }

    }

    ```


    This class is not even a Spring bean and has one method that appends a string
    to the message payload. It’s easy to imagine that any transformation logic could
    be present here. As long as the method returns a value that can be represented
    or converted into an SI message and parameters that SI can inject values in (for
    example, a payload or headers marked with `@Header`/`@Headers` annotations), it
    can be used in the SI flow.


    [Listing 8-36](#9781484207949_Ch08_1.xhtml#FPar39) covers the SI flow configuration.


    [***Listing 8-36***](#9781484207949_Ch08_1.xhtml#_FPar39). XML SI Flow Configuration
    for Generic Transformer Example (File si-config.xml in Folder src/main/resources
    of Example Project 0811-transformer-generic-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperService" />

      <int:channel id="inChannel" />


    <int:transformer input-channel="inChannel" output-channel="transformedChannel">

        <bean class="net.lkrnac.book.eiws.chapter08.SimpleMessageTransformer" />

      </int:transformer>

      <int:channel id="transformedChannel" />


    <int:service-activator input-channel="transformedChannel" ref="writeService"

        method="writeAndIndicateSuccess">

      </int:service-activator>

    </beans>

    ```


    The inbound gateway is already a familiar component from the previous examples.
    Again, it maps our common service interface `SiWrapperService` and sends messages
    into `inChannel`. This channel is then connected to the transformer. The `<int:transformer>`
    tag specifies `input-channel`, `output-channel`. The transformation bean is created
    via the `<bean>` subelement, which is a normal Spring construct for creating beans.


    The output channel of the transformer is then connected to the service activator
    mapped to our common `WriteService.writeAndIndicateSuccess()`. As this method
    returns a value, we are dealing with bidirectional flow, and a response is sent
    back to the gateway component via a temporary reply channel. [Listing 8-37](#9781484207949_Ch08_1.xhtml#FPar40)
    shows the main class of this example.


    [***Listing 8-37***](#9781484207949_Ch08_1.xhtml#_FPar40). Main Class of Generic
    Transformer Example (0811-transformer-generic-xml)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import lombok.extern.slf4j.Slf4j;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperService;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.ImportResource;


    @Slf4j

    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    SiWrapperService wrapperService = ctx.getBean(SiWrapperService.class);

        String text = "simple message";

        log.info("Sending message: " + text);

        boolean result = wrapperService.processText(text);

        log.info("Result: " + result);

      }

    }

    ```


    Before sending a message to the SI gateway via its service interface `SiWrapperService`,
    we first log it as well as the result returned from it. [Listing 8-38](#9781484207949_Ch08_1.xhtml#FPar41)
    shows the output of this example if we run the main class as a Java application.


    [***Listing 8-38***](#9781484207949_Ch08_1.xhtml#_FPar41). Output of XML Generic
    Transformer Example


    ```

    2015-08-23 22:10:39.437  INFO 29551 --- [           main]

    n.l.book.eiws.chapter08.SiApplication    : Sending message: simple message

    2015-08-23 22:10:39.580  INFO 29551 --- [           main]

    n.l.b.e.chapter08.out.WriteRepository    : Text persisted: simple message transformed

    2015-08-23 22:10:39.595  INFO 29551 --- [           main]

