    parameter `faultStr``ingOrReason`.


    Client-Side Error Handling


    Client-side error translation is in place for the translation of SOAP messages
    into exceptions in client code. The central interface is called `FaultMessageResolver`
    and needs to be registered as a property of `WebServiceTemplate`. There are two
    out-of-the-box implementations:


    *   `SoapFaultMessageResolver` translates the error into `SoapFaultClientException`.

    *   `SimpleFaultMessageResolver` translates the error message into `WebServiceFaultException`.


    We can also provide a custom implementation of `FaultMessageResolver`, as shown
    in [Listing 3-34](#9781484207949_Ch03.xhtml#FPar39).


    [***Listing 3-34***](#9781484207949_Ch03.xhtml#_FPar39). Client Error Resolver
    Registration (0306-ws-error-client)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.error.client;


    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.oxm.jaxb.Jaxb2Marshaller;

    import org.springframework.ws.client.core.WebServiceTemplate;

    import org.springframework.ws.soap.client.core.SoapFaultMessageResolver;


    @Configuration

    @ComponentScan

    public class WsErrorClientConfiguration {

      @Bean

      public Jaxb2Marshaller marshaller() {

        Jaxb2Marshaller marshaller = new Jaxb2Marshaller();

        marshaller.setContextPath("net.lkrnac.book.eiws.chapter03.ws.error.model");

        return marshaller;

      }


    @Bean

      public WebServiceTemplate webServiceTemplate(Jaxb2Marshaller marshaller) {

        WebServiceTemplate webServiceTemplate = new WebServiceTemplate();

        webServiceTemplate.setMarshaller(marshaller);

        webServiceTemplate.setUnmarshaller(marshaller);

        webServiceTemplate.setDefaultUri("http://localhost:10306/0306-ws-error-service");


    webServiceTemplate.setFaultMessageResolver(new SoapFaultMessageResolver());

        return webServiceTemplate;

      }

    }

