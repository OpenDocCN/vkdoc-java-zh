    : Result:true\n2015-08-26 21:41:20.519  INFO 8057 --- [           main] n.l.b.eiws.chapter08.out.WriteService\n\
    : Route 2 hit with message: message2\n2015-08-26 21:41:20.519  INFO 8057 --- [          \
