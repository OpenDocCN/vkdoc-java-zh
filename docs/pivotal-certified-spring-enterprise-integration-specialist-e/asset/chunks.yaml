    在这种情况下不需要 `@ImportResource`，因为我们使用的是纯 Java 配置。通过 main 方法启动 Spring Boot 应用程序后，我们从
    Spring 上下文中读取服务接口，将消息发送到 SI 流，并记录结果。运行此主类的输出类似于 清单 8-29 中上一个示例 `0808-gateway-generic-xml`
    的输出。


    特定技术网关示例


    此示例使用 HTTP 入站网关和 JDBC 出站网关来处理双向 SI 流。清单 8-34 展示了 XML SI 配置。


    ***清单 8-34***. 特定技术网关示例的 SI 流 XML 配置 (文件 si-config.xml 位于示例项目 0810-gateway-non-generic
    的 src/main/resources 文件夹中)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:int-http="http://www.springframework.org/schema/integration/http"

      xmlns:int-jdbc="http://www.springframework.org/schema/integration/jdbc"

