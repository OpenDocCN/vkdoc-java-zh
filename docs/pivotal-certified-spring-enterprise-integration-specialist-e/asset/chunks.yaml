    This configuration uses the `bean` namespace to enable working with Spring beans,
    and the `jms` namespace for JMS container support. The root XML element `<jms:listener-container>`
    by default uses the `DefaultMessageListenerContainer` implementation of the listener
    container. The attribute `destination-resolver` uses the bean already shown in
    [Listing 5-16](#9781484207949_Ch05.xhtml#FPar17).


    The XML subelement `<jms:listener>` registers the listener instance `simpleMessageListener`
    for message reception via its method `handleMessage`. This method takes the `String`
    parameter, so Spring automatically converts the JMS message payload into the `String`
    type and injects it as a parameter.


    `<jms:listener-container>` can have various `<jms-listener>` subelements registered
    for different JMS destinations.


    Examples of Registering Listener with Java Configuration


    Registering the listener with a Java configuration looks like [Listing 5-31](#9781484207949_Ch05.xhtml#FPar34).


    [***Listing 5-31***](#9781484207949_Ch05.xhtml#_FPar34). Listener Configured with
    Java Configuration (0506-async-jms-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import javax.jms.ConnectionFactory;

    import javax.jms.Queue;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.listener.DefaultMessageListenerContainer;


    @Configuration

    public class JmsListenerConfiguration {

      @Bean

      public DefaultMessageListenerContainer defaultMessageListenerContainer(

          ConnectionFactory connectionFactory,

          SimpleMessageListener simpleMessageListener, Queue queue) {

        DefaultMessageListenerContainer listenerContainer =

            new DefaultMessageListenerContainer();

        listenerContainer.setConnectionFactory(connectionFactory);

        listenerContainer.setDestination(queue);

        listenerContainer.setMessageListener(simpleMessageListener);

        return listenerContainer;

      }

    }

    ```


    This Spring configuration class registers only the `DefaultMessageListenerContainer`
    bean. The method registering the bean injects three other Spring beans: `containerFactory`,
    `queue`, and `simpleMessageListener`. These are needed for configuring the `listenerContainer`
    instance after it’s created via the constructor.


    Spring 4.1 introduced a new JMS annotation, shown in [Listing 5-32](#9781484207949_Ch05.xhtml#FPar35).


    [***Listing 5-32***](#9781484207949_Ch05.xhtml#_FPar35). Listener Configured with
    @JmsListener Annotation (0508-async-listener-annotation)


    ```

    package net.lkrnac.book.eiws.chapter05.text;


    import net.lkrnac.book.eiws.chapter05.text.SimpleService;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageListener {

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @JmsListener(destination = "queue/ExpiryQueue")

      public void readMessage(String message) {

        simpleService.processText(message);

      }

    }

    ```


    The method handling messages is annotated with `@JmsListener`. Spring exposes
    this method as a JMS endpoint that listens to JMS messages. This annotation has
    the mandatory attribute `destination`, which defines the name of the destination
    it listens to. This is the preferred way of receiving messages nowadays.


    Converting JMS Messages


    A useful feature provided by the Spring JMS module is message conversion. Although
    plain JMS provides an option to send `Serializable` objects as a payload, it’s
    not a popular solution because of lack of interoperability. So as JMS primary
    uses a text and sometimes binary payload format, conversion from/to some text-based
    formats is a pretty standard requirement. This may be a verbose and error-prone
    exercise with plain Java JMS APIs.


    Fortunately, Spring JMS provides an elegant solution. We can convert messages
    on both sides of the communication channel, because both `JmsTemplate` (responsible
    for sending and for synchronous JMS message reception) and `AbstractJmsListenerContainerFactory`
    (responsible for listening to the JMS destination and the abstract parent of `DefaultJmsListenerContainerFactory`
    and `SimpleJmsListenerContainerFactory`) allows us to optionally register the
    `MessageConverter` interface as their property. [Listing 5-33](#9781484207949_Ch05.xhtml#FPar36)
    shows the signature of this interface.


    [***Listing 5-33***](#9781484207949_Ch05.xhtml#_FPar36). Signature of org.springframework.jms.support.converter.MessageConverter


    ```

    package org.springframework.jms.support.converter;


    import javax.jms.JMSException;

    import javax.jms.Message;

    import javax.jms.Session;'
