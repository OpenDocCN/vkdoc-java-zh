    **清单 8-99**。XML 聚合器示例的消息异步发送者（0827-aggregator-xml）


    ```

    package net.lkrnac.book.eiws.chapter08.in;

    import java.util.concurrent.Future;

    import java.util.concurrent.TimeUnit;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.scheduling.annotation.Async;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class AsyncMessageSender {

      private SiWrapperServiceFuture wrapperService;


    @Autowired

      public AsyncMessageSender(SiWrapperServiceFuture wrapperService) {

        super();

        this.wrapperService = wrapperService;

      }


    @Async("customExecutor")

      public void sendMessage(String message) throws Exception {

        Future<Boolean> resultFuture = wrapperService.processText(message);

        boolean result = resultFuture.get(1, TimeUnit.SECONDS);

        log.info("Result for " + message + ": " + result);

      }

    }

    ```


    这个 Spring Bean 注入了`SiWrapperServiceFuture`，它是网关中使用的服务接口，并封装了 SI 流。`sendMessage()`方法使用`@Async`注解，因此当被调用时，它将在单独的线程中执行。注意，我们使用`customExecutor`作为注解属性，它指定了用于执行此异步逻辑的执行器
    Bean 的名称。


    在此方法中，我们调用服务接口将消息传递到 SI 流。然后使用返回的`resultFuture`等待最终将返回的布尔值。为了确保它不会永远挂在`resultFuture.get()`调用中，我们为此操作配置了
    1 秒的超时。最后，我们记录返回的结果。[清单 8-100](#9781484207949_Ch08_2_Ext.xhtml#FPar103) 显示了此示例的主类。


    **清单 8-100**。自定义 XML 聚合器示例的主类（0827-aggregator-xml）


    ```

    package net.lkrnac.book.eiws.chapter08;

    import java.util.concurrent.Executor;

    import net.lkrnac.book.eiws.chapter08.in.AsyncMessageSender;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ImportResource;

    import org.springframework.scheduling.annotation.EnableAsync;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;


    @EnableAsync

    @SpringBootApplication

    @ImportResource("classpath:si-config.xml")

    public class SiApplication {

      @Bean

      public Executor customExecutor() {

        ThreadPoolTaskExecutor threadPool = new ThreadPoolTaskExecutor();

        threadPool.setCorePoolSize(10);

        return threadPool;

      }


    public static void main(String[] args) throws Exception {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    AsyncMessageSender messageSender = ctx.getBean(AsyncMessageSender.class);

        messageSender.sendMessage("message1");

        messageSender.sendMessage("message2");

        messageSender.sendMessage("message2");

        messageSender.sendMessage("message1");

      }

    }

    ```


    这个 Spring Boot 主类启用了异步 Spring 特性以及 XML SI 流配置。这也是一个 Spring 配置类，因此我们利用这一点注册了池大小为
    10 的`customExecutor`线程池，以便为我们的示例提供足够的线程。


    启动 Spring Boot 应用程序后，我们从 Spring 上下文中获取`AsyncMessageSender`，并通过此异步发送者向 SI 流发送四条消息。注意消息的顺序。请记住，我们的相关逻辑应将`message1`与`message1`相关联，将`message2`与`message2`相关联。当我们运行此示例时，会得到[清单
    8-101](#9781484207949_Ch08_2_Ext.xhtml#FPar104) 中的输出。


