  raw: 'To specify which SOAP action we want to execute on the server, `SoapActionCallback`
    with the action name is passed into `WebServiceTemplate`. In case of WS-Addressing,
    we would use `ActionCallback` instead of `SoapActionCallback`.


    Intercepting Messages


    Intercepting messages is a powerful mechanism for fulfilling various business
    requirements. Spring supports two types of interceptions:


    *   Server interception

    *   Client interception


    Each one is composed of different phases. These types of interception touchpoints
    can be configured on the client as well as on the server (in the following order):


    1.  Handle request—occurs before the message is sent from the client or processed
    on the server

    2.  Handle response— occurs before sending a response from the server to the client

    3.  Handle fault— occurs on the server and client, but only when an error occurs
    in web service logic

    4.  After completion—is usually used for releasing resources, because it will
    occur under all circumstances


    The first three intercepting phases can terminate further processing of a request
    by returning a `false` value. A false value indicates a problem in the processing
    chain, whereas a `true` value indicates success of the intercepting phase.


    Developers using the Spring Web Services project can take advantage of existing
    interceptor implementations or can create custom implementations.


    Server-Side Interception


    Server-side interception is covered by the interface `org.springframework.ws.server.EndpointInterceptor`.
    Various implementations of this interface are offered by Spring Web Services out
    of the box:


    *   Logging interceptors—`PayloadLoggingInterceptor`, `SoapEnvelopeLoggingInterceptor`

    *   Payload-handling interceptors— `PayloadValidatingInterceptor`, `PayloadTransformingInterceptor`

    *   Security interceptors—`XwsSecurityInterceptor`, `Wss4jSecurityInterceptor`


    Apart from built-in interceptors, we can create custom implementations of `EndpointInterceptor`.
    An example is shown in [Listing 3-26](#9781484207949_Ch03.xhtml#FPar31).


    [***Listing 3-26***](#9781484207949_Ch03.xhtml#_FPar31). Custom Server Interceptor
    (0305-ws-interceptor-service)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.interceptor.server;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;

    import org.springframework.ws.context.MessageContext;

    import org.springframework.ws.server.EndpointInterceptor;


    @Component

    public class UserInterceptor implements EndpointInterceptor {

      @Override

      public boolean handleRequest(MessageContext messageContext, Object endpoint)

          throws Exception {

        System.out.println("Endpoint handleRequest");

        return true;

      }


    @Override

      public boolean handleResponse(MessageContext messageContext, Object endpoint)

          throws Exception {

        System.out.println("Endpoint handleResponse");

        return true;

      }


    @Override

      public boolean handleFault(MessageContext messageContext, Object endpoint)

          throws Exception {

        System.out.println("Endpoint handleFault");

        return true;

      }


    @Override

      public void afterCompletion(MessageContext messageContext, Object endpoint,

          Exception ex) throws Exception {

        System.out.println("Endpoint afterCompletion");

      }

    }

    ```


    This interceptor is a normal Spring bean implementing `EndpointInterceptor`. Each
    intercepting method will be called according to the interception phases’ life
    cycle explained at the beginning of this section. An abstract implementation of
    `E``ndpointInterceptorAdapter` also exists for convenience, when a developer doesn’t
    need to use all interception touchpoints. This abstract implementation simply
    returns `true` for touchpoints that can interrupt processing.


    An important aspect of this mechanism are injected parameters; via the `messageContext`
    parameter, we are able to inspect and manipulate the message. The second parameter
    is of type `Object`, because it represents a mapped endpoint bean that serves
    the message.'
