    Bear in mind that automatic acknowledging of messages doesn’t work atomically
    across various messages. It is suitable only in scenarios where we can’t rely
    on ACID characteristics for a batch of messages.


    In `CLIENT_``ACKNOWLEDGE` mode, the JMS client is responsible for acknowledging
    messages explicitly. This is done via a call to `Message.acknowledge()`. From
    this API, it may look like each message needs to be acknowledged separately, but
    that’s not the case with this mode. The acknowledgement action is done against
    the session; therefore, the `Message.acknowledge()` call acknowledges all not-acknowledged
    messages consumed in the current session. So, for example, we can read 10 messages
    within the same session and acknowledge them with a single `Message.acknowledge()`.


    We may also consider using JMS local transactions, performing various actions
    against `javax.jms.Session` or `javax.jms.JMSContext` and at the end of our logical
    transaction explicitly committing or rolling back all the work done against them.
    This is a similar concept to transaction support of relational databases. Both
    JMS resources provide the explicit methods `commit()` and `rollback()` for this
    purpose.


    JMS local transactions can be used as umbrellas for JMS message reception and
    sending, whereas acknowledging of messages is handled only during message reception.


    Java JMS Transaction Examples


    ![Image](images/sq.jpg) **Note**  Acknowledging `javax.jms.Message` would be the
    same for Spring as well as for pure Java JMS. Implicit acknowledge modes (`AUTO_ACKNOWLEDGE`
    and `DUPS_OK_ACKNOWLEDGE`) are handled automatically, and explicit `CLIENT_ACKNOWLEDGE`
    mode is handled by calling `javax.jms.Message.acknowledge()`. Therefore, we will
    not focus on pure Java JMS acknowledge examples.


    Our first example covers the JMS 1.1 API with synchronous reception and transacted
    writing and reading of JMS messages. It also covers having to process various
    messages under one transaction. [Listing 6-1](#9781484207949_Ch06.xhtml#FPar2)
    shows how we configure a connection against the JMS provider.


    [***Listing 6-1***](#9781484207949_Ch06.xhtml#_FPar2). JMS 1.1 Configuration Class
    (0601-java-jms11-sync-tx)


    ```

    package net.lkrnac.book.eiws.chapter06.javasynctx;


    import java.util.Hashtable;

    import javax.jms.Connection;

    import javax.jms.ConnectionFactory;

    import javax.jms.JMSException;

    import javax.jms.Queue;

    import javax.naming.InitialContext;

    import javax.naming.NamingException;

    import lombok.Getter;


    public class JmsConfiguration implements AutoCloseable {

      private InitialContext initialContext;


    @Getter

      private Queue queue;

      @Getter

      private Connection connection;


    public void init() throws NamingException, JMSException {

        Hashtable<Object, Object> env = new Hashtable<>();

        env.put("java.naming.factory.initial",

            "org.jnp.interfaces.NamingContextFactory");

        env.put("java.naming.factory.url.pkgs",

            "org.jboss.naming:org.jnp.interfaces");

        env.put("java.naming.provider.url", "jnp://localhost:1099");

        initialContext = new InitialContext(env);


    queue = (Queue) initialContext.lookup("/queue/ExpiryQueue");

        ConnectionFactory connectionFactory =

            (ConnectionFactory) initialContext.lookup("/ConnectionFactory");

        connection = connectionFactory.createConnection();

      }


    public void close() throws NamingException, JMSException {

        if (initialContext != null) {

          initialContext.close();

        }

        if (connection != null) {

          connection.close();

        }

      }

    }

    ```


    This configuration is the same as we used in the previous chapter to configure
    the JMS 1.1 example. It uses a HornetQ configuration of the JNDI `initialContext`
    instance to look up instances of `queue` and `connection`. These two are JMS objects
    suitable for connection to a JMS provider. `queue` is created based on JNDI lookup
    of the `/queue/ExpiryQueue` and `connectionFactory` instance based on `/ConnectionFactory`.
    These are configured by default for HornetQ server. This configuration is located
    in the file `config/stand-alone/non-clustered/hornetq-jms.xml`.


    Private instances of `queue` and `connection` objects are exposed to the outside
    world via getters generated by Lombok. `@Getter` is responsible for that.


    The `close` method will close resources that need to be released—namely, JNDI
    `initialContext` and JMS `connection`. The `JmsConfigurable` class participates
    in the `AutoClosable` contract, which represents the try-with-resources Java 7
    feature. With a special `try` block, the `close()` method will be automatically
    called by Java as if it were part of the `finally` block.


    [Listing 6-2](#9781484207949_Ch06.xhtml#FPar3) shows configuration of the sender.


    [***Listing 6-2***](#9781484207949_Ch06.xhtml#_FPar3). JMS 1.1 Sender with Transaction
    Example (0601-java-jms11-sync-tx)


    ```

    package net.lkrnac.book.eiws.chapter06.javasynctx;


    import javax.jms.Connection;

    import javax.jms.JMSException;

    import javax.jms.MessageProducer;

    import javax.jms.Queue;

    import javax.jms.Session;

    import javax.jms.TextMessage;


    public class SimpleMessageSender {

      private MessageProducer messageProducer;

      private Session session;


    public void init(Connection connection, Queue queue) throws JMSException {

        session = connection.createSession(true, Session.SESSION_TRANSACTED);

        messageProducer = session.createProducer(queue);

      }


    public void sendMessages(String message1, String message2)

          throws JMSException {

        try {

          TextMessage textMessage1 = session.createTextMessage(message1);

          messageProducer.send(textMessage1);

          TextMessage textMessage2 = session.createTextMessage(message2);

          messageProducer.send(textMessage2);

          session.commit();

        } catch (Throwable throwable) {

          session.rollback();

        }

      }

    }

    ```


    This class has two properties of type `javax.jmsSession` and `javax.jms.MessageProducer`,
    which are initialized in the `init()` method based on the given parameters `javax.jms.Connection`
    and `javax.jms.Queue`. Notice that the `session` object is created from the `connection`
    instance by the `connection.createSession()` call. The first parameter in this
    method means that we are turning on transacted support, and the second means that
    we are going to use `SESSION_TRANSACTED` acknowledge mode.


    The `sendMessage` method in this case takes two `String` parameters that should
    be sent to the JMS server. We create two `TextMessage` types from `session` and
    send them via `messageProducer.send()` calls. Before we commit, both messages
    are not visible to other JMS sessions opened against `queue`. Only call `session.commit()`
    commits the JMS transaction and makes it available for processing by other sessions
    opened against the JMS destination.


    Sending messages and commits is backed up by the `try-catch` block. If an error
    occurs during the sending or commit phase, the transaction is rolled back by calling
    `session.rollback()`.


    [Listing 6-3](#9781484207949_Ch06.xhtml#FPar4) shows implementation of the reader
    class.


    [***Listing 6-3***](#9781484207949_Ch06.xhtml#_FPar4). JMS 1.1 Reader with Transaction
    (0601-java-jms11-sync-tx)


    ```

    package net.lkrnac.book.eiws.chapter06.javasynctx;


    import javax.jms.Connection;

    import javax.jms.JMSException;

    import javax.jms.MessageConsumer;

    import javax.jms.Queue;

