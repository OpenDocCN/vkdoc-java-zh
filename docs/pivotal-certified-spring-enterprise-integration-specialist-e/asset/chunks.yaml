    配置更具可读性。在本章中，我们采用这种方法进行 SB 配置。


    配置本身包含一个 `Job` 的定义，该 Job 包含一个 `Step`，它使用了我们通用的读取器、处理器和写入器。`<job>` 和 `<step>` XML
    标签创建了名称由 `id` 属性定义的 Spring Bean。`Step` 定义中的最后一个属性是 `commit-interval`，它指定了此步骤的块大小。清单
    9-7 展示了如何将 XML 配置加载到 Spring 上下文中。


