    \nSpring Web Services 项目能够轻松转换从 Web 服务逻辑中渗透出来的错误。与拦截支持类似，错误处理也分为服务器端和客户端。\n\n\
    服务器端错误处理\n\n宽松的错误处理通常是严重安全漏洞的根源，这些漏洞会暴露 Web 服务的实现细节。当异常从 Web 服务逻辑冒泡到 Servlet 容器时，它通常会发送一条包含\
    \ Web 服务器信息和堆栈跟踪的失败消息作为响应消息。攻击者可以（基于此类消息）分析 Web 服务器的类型、版本、Web 服务运行的平台以及所使用的框架。这些数据可进一步用于创建更具针对性的攻击。此问题是开放\
    \ Web 应用程序安全项目（OWASP）十大安全风险列表中的第 6 个问题。\n\n服务器端的异常转换有助于隐藏这些实现细节。其思路是 Spring 将使用已注册的异常解析器来创建通用响应，而不是向客户端暴露敏感信息。`MessageDispatcher`\
    \ 会扫描类路径以查找 `EndpointExceptionResolver` 接口的实现。该接口只有一个名为 `resolveException` 的方法。此接口可以通过多种方式使用：\n\
    \n*   自定义实现可满足错误转换的特殊要求。\n*   `SoapFaultMappingExceptionResolver` 将每个异常映射到带有显式错误消息的特定\
    \ SOAP 错误。\n*   `SimpleSoapExceptionResolver` 将所有异常转换为 SOAP 客户端错误，并将异常消息作为响应负载。\n\
    \n最后但同样重要的是 `@SoapFault` 异常。它用于标记异常类型，以便将异常转换为消息。在这种情况下，SOAP 错误在注解参数中指定。所有这些机制都允许实现更高的安全标准，同时又能灵活地向客户端告知已知问题。\n\
    \n没有专门用于错误处理的 XML 元素。因此，我们将只关注 Java 示例。对于 XML，我们将使用标准的 DI 元素，例如 `bean`、`property`\
    \ 和 `ref`。清单 3-32 展示了如何注册 `SoapFaultMappingExceptionResolver`。\n\n***清单 3-32***.\
    \ SoapFaultMappingExceptionResolver 注册示例（0306-ws-error-service）\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter03.ws.error.server;\n\nimport java.util.Properties;\n\
    \nimport org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport\
    \ org.springframework.boot.context.embedded.ServletRegistrationBean;\nimport org.springframework.context.ApplicationContext;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
    import org.springframework.ws.config.annotation.EnableWs;\nimport org.springframework.ws.soap.server.endpoint.SoapFaultDefinition;\n\
    import org.springframework.ws.soap.server.endpoint.SoapFaultMappingExceptionResolver;\n\
    import org.springframework.ws.transport.http.MessageDispatcherServlet;\nimport\
    \ org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;\n\n@EnableWs\n@Configuration\n\
    @ComponentScan\n@EnableAutoConfiguration\npublic class ServerConfiguration {\n\
    \  public static final String NAMESPACE =\n      \"http://localhost:10306/0306-ws-error-service\"\
    ;\n\n@Bean\n  public SimpleWsdl11Definition userDetails() {\n    return new SimpleWsdl11Definition(new\
    \ ClassPathResource(\"userDetailsSchema.xsd\"));\n  }\n\n@Bean\n  public ServletRegistrationBean\
    \ dispatcherServlet(\n      ApplicationContext applicationContext) {\n    MessageDispatcherServlet\
    \ servlet = new MessageDispatcherServlet();\n    servlet.setApplicationContext(applicationContext);\n\
    \    servlet.setTransformWsdlLocations(true);\n    return new ServletRegistrationBean(servlet,\
    \ \"/*\");\n  }\n\n@Bean\n  public SoapFaultMappingExceptionResolver exceptionResolver()\
    \ {\n    SoapFaultMappingExceptionResolver exceptionResolver =\n        new SoapFaultMappingExceptionResolver();\n\
    \nSoapFaultDefinition defaultSoapFault = new SoapFaultDefinition();\n    defaultSoapFault.setFaultCode(SoapFaultDefinition.SERVER);\n\
    \    exceptionResolver.setDefaultFault(defaultSoapFault);\n\nProperties errorMappings\
    \ = new Properties();\n    errorMappings.put(IllegalStateException.class.getName(),\n\
    \        SoapFaultDefinition.CLIENT.toString());\n    exceptionResolver.setExceptionMappings(errorMappings);\n\
    \    exceptionResolver.setOrder(1);\n\nreturn exceptionResolver;\n  }\n}\n```\n\
    \n异常解析器在 `exceptionResolver` 方法中注册。我们首先创建一个 `SoapFaultMappingExceptionResolver`\
    \ 类型的对象。然后注册默认的 SOAP 错误。除非存在更具体的映射，否则每个错误都会使用此默认错误。特定的映射作为 `Properties` 类型的数组注册到\
    \ `SoapFaultMappingExceptionResolver` 的 `exceptionMappings` 字段中。在此例中，我们将 `IllegalStateException`\
    \ 映射到客户端 SOAP 错误。方法 `setOrder` 指定了发生异常时处理映射的顺序。\n\n如果我们更喜欢 `SimpleSoapExceptionResolver`\
    \ 或自定义异常解析器实现，则可以通过构造函数创建它，并以类似的方式将其注册为 Spring Bean。\n\n清单 3-33 展示了如何使用 `@SoapFault`\
    \ 注解。\n\n***清单 3-33***. @SoapFault 注解（0306-ws-error-service）\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.error.server;\n\
