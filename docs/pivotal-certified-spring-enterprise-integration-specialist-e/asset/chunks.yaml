    This example does not use Spring Boot. [Listing 9-45](#9781484207949_Ch09_1.xhtml#FPar48)
    shows the SB bean configuration needed for this example.


    [***Listing 9-45***](#9781484207949_Ch09_1.xhtml#_FPar48). Beans Needed for JobRepository
    Configuration (File batch-beans-config.xml in Folder src/main/resources of Example
    Project 0911-job-repository-xml)


