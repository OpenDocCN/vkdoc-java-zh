    \n请注意，我们针对此功能的示例仅使用XML配置。该示例将Spring Integration流程与SB流程结合在一起，在这种情况下，XML配置似乎更简洁，因此跳过了Java配置。\n\
    \n### 用于主从通信的JMS配置"
