    # CHAPTER 1


    ![image](images/frontdot.jpg)


    ## Tasks and Scheduling


    With rising numbers of cores and increasing processor speed in computers nowadays,
    it is crucial for applications to be able to use this computational power. Let’s
    compare a processor to yourself at work. Imagine you get stuck with a task, and
    only your experienced teammate can help you with it. But he’s at lunch. You could
    switch to a different task or wait for him. But when you decide to wait for your
    teammate’s help and study your social account for a moment, your progress at work
    is blocked. You are not productive at all until your mentor comes back. What if
    he doesn’t return? Your employer wouldn’t be happy.


    Now imagine an application that needs to access the file system, a database, or
    a third-party system via Hypertext Transfer Protocol (HTTP). The application’s
    action is a blocking operation: the CPU is doing nothing while waiting for an
    input/output (I/O) response. At the same time, new requests are coming in and
    waiting to be processed. Such a scenario is a textbook example of a performance
    bottleneck.


    This situation can be solved by diverting the CPU’s attention to a separate thread
    of execution. The stack and context of the current thread are parked (so the processor
    can continue computation later, as if the thread was never terminated), and the
    CPU starts computing a different thread for a short amount of time. This context
    switching between threads allows the CPU to prioritize the processing pipeline
    and focus on tasks that need to be processed instead of tasks that are waiting
    for I/O responses. This concept is commonly called *multitasking*, *multithreading*,
    or *concurrent processing*.


    Threads are valuable for applications that


    *   Are I/O intensive (for example, applications storing and reading data from
    a database)

    *   Are serving requests from multiple clients (for example, web applications)

    *   Want to use full power of all CPU cores


    Multithreading covers immediate parallel execution. It is commonly triggered by
    user action—for example, sending a request from a web browser or via actions executed
    in the application’s graphical user interface (GUI). But some processing can’t
    rely on external triggering. This is where another important concept of concurrent
    programming comes into play: *task scheduling*. Execution can be planned at a
    certain time to start once or even repeatedly. Examples include background batch
    processing and housekeeping quiet hours.


    The ability to create maintainable, concurrent code has become an important part
    of a developer’s knowledge base. However, this is hard. The evolution of languages
    has led to various abstractions that can help with this implementation. It is
    crucial to understand how these abstractions can be applied, to achieve the best
    performance.


    All of the projects from Spring’s enterprise portfolio rely on multithreading.
    That is why you need to understand Spring constructs for threading and scheduling.
    This chapter also highlights their benefits against standard Java APIs. But it
    does not cover complicated parts such as synchronization, locking, deadlocks,
    or sharing resources.


