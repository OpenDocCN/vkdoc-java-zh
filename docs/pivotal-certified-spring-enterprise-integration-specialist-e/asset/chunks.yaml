    异步 JobLauncher 示例


    让我们深入探讨一个场景，即 SB 作业的调用者不能被阻塞。清单 9-28 展示了配置为异步执行 `Job` 的 SB Bean。


    ***清单 9-28***. JobLauncher 的异步配置 (0908-job-launcher-async)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import org.springframework.batch.core.launch.JobLauncher;

    import org.springframework.batch.core.launch.support.SimpleJobLauncher;

    import org.springframework.batch.core.repository.JobRepository;

    import org.springframework.batch.core.repository.support.MapJobRepositoryFactoryBean;

    import org.springframework.batch.support.transaction.ResourcelessTransactionManager;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.task.TaskExecutor;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;

    import org.springframework.transaction.PlatformTransactionManager;


    @Configuration

    public class BatchBeansConfiguration {

      @Bean

      public PlatformTransactionManager transactionManager() {

        return new ResourcelessTransactionManager();

      }


    @Bean

      public JobRepository jobRepository(PlatformTransactionManager transactionManager)

          throws Exception {

        return new MapJobRepositoryFactoryBean(transactionManager).getObject();

      }


    @Bean

      public TaskExecutor customTaskExecutor() {

        ThreadPoolTaskExecutor threadPool = new ThreadPoolTaskExecutor();

        threadPool.setCorePoolSize(10);

        return threadPool;

      }


    @Bean

      public JobLauncher jobLauncher(JobRepository jobRepository, TaskExecutor taskExecutor)
    {

        SimpleJobLauncher simpleJobLauncher = new SimpleJobLauncher();

        simpleJobLauncher.setJobRepository(jobRepository);

        simpleJobLauncher.setTaskExecutor(taskExecutor);

        return simpleJobLauncher;

      }

    }

    ```


    在此配置中，我们引入了新的 Spring Bean `TaskExecutor`，它用于创建 `JobLauncher` Bean。此设置确保 `Job`
    由 `JobLauncher` 异步执行。此示例还使用了清单 9-19 中的泡茶 `Job` 配置。此示例的主类见清单 9-29。


