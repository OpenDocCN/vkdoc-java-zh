    由于 `ItemStreamWriter<String>` 的实现将 `ItemWriter<String>` 与 `ItemStream` 接口相结合，我们需要实现
    `write()`、`open()`、`update()` 和 `close()` 方法。为了模拟 `ItemStream` 的生命周期操作，我们需要注入
    `SimpleExecutablePoint` 实例。为了在 `write()` 方法中写入条目，我们需要 `WriteRepository` 实例。清单
    9-88 展示了这些流处理器的 XML 配置。


    ***清单 9-88***. ItemStream 的 XML 配置（文件位于示例项目 0923-item-stream-xml 的 src/main/resource
    文件夹中的 batch-config.xml）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

      http://www.springframework.org/schema/batch/spring-batch.xsd

      http://www.springframework.org/schema/beans

      http://www.springframework.org/schema/beans/spring-beans.xsd">


    <job id="simpleRecordsJob">

        <step id="simpleRecordsStep">

          <tasklet>

            <chunk reader="simpleRecordReader" writer="streamRecordWriter"

              processor="simpleRecordProcessor" commit-interval="4" >

              <streams>

                <stream ref="recordsReaderItemStream"/>

              </streams>

            </chunk>

          </tasklet>

        </step>

      </job>

    </beans:beans>

    ```


    作为写入器，我们使用 `streamRecordWriter` bean，它知道资源并能处理其模拟的生命周期。对于其他块处理器，我们使用通用的 `simpleRecordReader`
    和 `simpleRecordProcessor` bean。独立的 `recordsReaderItemStream` 需要通过 `<streams>`
    XML 标签进行注册。我们再次使用通用的 `BatchConfiguration` 类将此 XML 配置导入到组件扫描和 `@EnableBatchProcessing`
    中。当我们使用通用的 Spring Boot 主类运行此示例时，会得到清单 9-89 中的输出。


