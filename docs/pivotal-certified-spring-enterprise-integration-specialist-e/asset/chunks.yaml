    is used for `JobLauncher` bean creation. This setup ensures that `Job` is executed
    asynchronously by `JobLauncher`. This example also uses the tea preparation `Job`
    configuration from [Listing 9-19](#9781484207949_Ch09_1.xhtml#FPar22). The main
    class of this example is in [Listing 9-29](#9781484207949_Ch09_1.xhtml#FPar32).


    [***Listing 9-29***](#9781484207949_Ch09_1.xhtml#_FPar32). Main Class of Asynchronous
    JobLauncher Example (0908-job-launcher-async)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.JobExecution;

    import org.springframework.batch.core.JobParameters;

    import org.springframework.batch.core.launch.JobLauncher;

    import org.springframework.context.annotation.AnnotationConfigApplicationContext;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.support.GenericApplicationContext;


    @Slf4j

    @Configuration

    @ComponentScan

    public class BatchApplication {

      public static void main(String[] args) throws Exception {

        GenericApplicationContext context =

            new AnnotationConfigApplicationContext(BatchApplication.class);


    JobLauncher jobLauncher = (JobLauncher) context.getBean(JobLauncher.class);

        Job job = (Job) context.getBean("prepareTeaJob");

        JobExecution execution = jobLauncher.run(job, new JobParameters());

        log.info("Exit Status: {}", execution.getStatus());

        Thread.sleep(10);

        log.info("Exit Status: {}", execution.getStatus());

        Thread.sleep(500);

        log.info("Exit Status: {}", execution.getStatus());

        context.close();

      }

    }

    ```


    After we execute `prepareTeaJob`, we log the exit status immediately, after 10
    ms and also after 500 ms. As `Job` is running, we should observe the exit status
    changing in these log entries. [Listing 9-30](#9781484207949_Ch09_1.xhtml#FPar33)
    shows the output after running this main class.


