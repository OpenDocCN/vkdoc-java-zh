    Distributed Transactions


    [Chapter 6](#9781484207949_Ch06.xhtml) covered ACID characteristics (atomicity,
    consistency, isolation, and durability) that Java and the Spring platform provide
    for transactional data sources (for example, relational databases) or JMS providers.
