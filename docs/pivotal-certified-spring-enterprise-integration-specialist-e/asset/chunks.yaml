    \    <url-pattern>/</url-pattern>\n  </servlet-mapping>\n</web-app>\n```\n\n在这个例子中，我们使用了示例项目\
    \ `0205-http-invoker-handler-servlet-xml-config` 中的 `spring-config.xml` 文件作为 Spring\
    \ 配置。但 XML 配置的所有其他方面都遵循与 `WebApplicationInitializer` 相同的概念。跨不同技术和配置类型的 API 一致性正是\
    \ Spring 的魅力所在。\n\n`HttpRequestHandlerServlet` 是 `DispatcherServlet`（Spring MVC\
    \ 框架的核心）的一个轻量级替代方案。因此，如果我们需要避免使用 Spring MVC 框架，它会非常方便。但如果你的应用已经使用了 `DispatcherServlet`，或者你想避免不必要的样板配置，那么下面的方法才是正确的选择。\n\
    \n通过 DispatcherServlet 提供 HttpInvoker 服务\n\n`DispatcherServlet` 是 Spring Web 支持的核心类。Spring\
    \ MVC 广泛使用它来构建 Web 应用和 REST API。它的工作是根据声明式 URL 映射将 HTTP 消息路由到控制器，并将响应映射到适当的视图。\n\
    \n使用 `DispatcherServlet`，你可以将 `HttpInvokerServiceExporter` bean 直接映射到一个 URL。这可以通过以斜杠字符开头\
    \ bean 名称来实现，如清单 2-19 所示。\n\n***清单 2-19***. 通过 DispatcherServlet 提供 HttpInvoker\
    \ 服务示例 (0206-http-invoker-bean)\n\n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.dispatcherservlet.server;\n\
    \nimport net.lkrnac.book.eiws.chapter02.httpinvoker.\n         dispatcherservlet.shared.BarService;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.EnableAutoConfiguration;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter;\n\
    \n@Configuration\n@ComponentScan\n@EnableAutoConfiguration\npublic class ServerConfiguration\
    \ {\n  public static void main(String... args) {\n    SpringApplication.run(ServerConfiguration.class);\n\
    \  }\n\n@Bean(name = \"/BarService\")\n  public HttpInvokerServiceExporter exportBarService(BarService\
    \ barService) {\n    HttpInvokerServiceExporter httpInvokerServiceExporter =\n\
    \        new HttpInvokerServiceExporter();\n    httpInvokerServiceExporter.setService(barService);\n\
    \    httpInvokerServiceExporter.setServiceInterface(BarService.class);\n    return\
    \ httpInvokerServiceExporter;\n  }\n}\n```\n\n导出器 bean 的配置与“通过 HttpRequestHandlerServlet\
    \ 提供 HttpInvoker 服务”一节中的配置类似。唯一的区别是 bean 的名称 `/BarService`（注意开头的正斜杠字符）。带有斜杠字符的名称告诉\
    \ Spring，该 bean 应由 `DispatcherServlet` 从该名称定义的 URL 端点提供服务。如果 `DispatcherServlet`\
    \ 已经正确配置，则无需其他配置更改。"
- fmt: "# Configuring `DispatcherServlet`\n\nConfiguring `DispatcherServlet` is covered\
    \ in the Spring Web certification exam and is highlighted in [Chapters 3](#9781484207949_Ch03.xhtml)\
    \ and [4](#9781484207949_Ch04.xhtml). Therefore, I grabbed the chance and used\
    \ a new approach to configure `HttpInvoker` via `DispatcherServlet`. As experienced\
    \ Spring developers would recognize, [Listing 2-19](#9781484207949_Ch02.xhtml#FPar21)\
    \ uses an API that isn’t part of the Spring Core framework (the `EnableAutoConfiguration`\
    \ annotation and `SpringApplication` class). These are part of the new Spring\
    \ Boot framework. Spring Boot promotes convention over configuration principles\
    \ for a highly configurable Spring. This significantly helps decrease the amount\
    \ of boilerplate configuration. But at the same time, conventions can be replaced\
    \ with custom Spring configurations. This allows for rapid and flexible development\
    \ with Spring family frameworks.\n\nThe `EnableAutoConfiguration` annotation tells\
    \ Spring Boot to look at the classpath and apply the most appropriate Spring configuration\
    \ based on found dependencies. [Listing 2-20](#9781484207949_Ch02.xhtml#FPar22)\
    \ contains Maven dependencies for this example.\n\n[***Listing 2-20***](#9781484207949_Ch02.xhtml#_FPar22).\
    \ Maven Dependencies (0206-http-invoker-bean)\n\n```\n<dependencies>\n  <dependency>\n\
    \    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-web</artifactId>\n\
    \  </dependency>\n  <dependency>\n      <groupId>org.springframework.boot</groupId>\n\
    \      <artifactId>spring-boot-starter-tomcat</artifactId>\n      <scope>provided</scope>\n\
    \  </dependency>\n</dependencies>\n```\n\nIn this case, we have Tomcat on the\
    \ classpath. So because we have a servlet container as a dependency, Spring Boot\
    \ applies the most common servlet configuration with `DispatcherServlet`. This\
    \ is handy for our example because it is, in fact, all the configuration needed\
    \ if we are using Spring Boot JAR packaging.\n\nIf we need to use Spring Boot\
    \ WAR packaging, one more class would be needed to cover servlet configuration,\
    \ as shown in [Listing 2-21](#9781484207949_Ch02.xhtml#FPar23).\n\n[***Listing\
    \ 2-21***](#9781484207949_Ch02.xhtml#_FPar23). Spring Boot Servlet Helper for\
    \ WAR Packaging (example project 0206-http-invoker-bean)\n\n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.dispatcherservlet.server;\n\
    \nimport org.springframework.boot.builder.SpringApplicationBuilder;\nimport org.springframework.boot.context.web.SpringBootServletInitializer;\n\
    \npublic class WebInitializer extends SpringBootServletInitializer {\n  @Override\n\
    \  protected SpringApplicationBuilder configure(\n      SpringApplicationBuilder\
    \ application) {\n    return application.sources(ServerConfiguration.class);\n\
    \  }\n}\n```\n\n`SpringBootServletInitializer` maps `DispatcherServlet` to `/`\
    \ URL and uses `ServerConfiguration` class as main Spring context definition.\n\
    \n## HttpInvoker Served via Simple Java HTTP Server\n\nIf the servlet container\
    \ is overkill for our application, we could use a pure Java SE approach for exposing\
    \ the service with `HttpInvoker`. The standard Java runtime contains a simple\
    \ HTTP server implementation, which can be used by Spring to expose the service\
    \ via `HttpInvoker`. The API details of this simple HTTP server are not relevant\
    \ because we want to use Spring abstractions. Let’s take a look at the Spring\
    \ configuration in [Listing 2-22](#9781484207949_Ch02.xhtml#FPar24).\n\n[***Listing\
    \ 2-22***](#9781484207949_Ch02.xhtml#FPar24). HttpInvoker via Simple Java Server\
    \ Configuration Example (0207-http-invoker-simple-service)\n\n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.simple.server;\n\
    \nimport java.util.HashMap;\nimport java.util.Map;\nimport net.lkrnac.book.eiws.chapter02.httpinvoker.simple.shared.BarService;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.remoting.\n         httpinvoker.SimpleHttpInvokerServiceExporter;\n\
    import org.springframework.remoting.support.SimpleHttpServerFactoryBean;\nimport\
    \ com.sun.net.httpserver.HttpHandler;\n\n@Configuration\n@ComponentScan\npublic\
    \ class ServerConfiguration {\n  @Bean\n  public SimpleHttpInvokerServiceExporter\
    \ barExporter(BarService barService) {\n    SimpleHttpInvokerServiceExporter barExporter\
    \ =\n        new SimpleHttpInvokerServiceExporter();\n    barExporter.setService(barService);\n\
    \    barExporter.setServiceInterface(BarService.class);\n    return barExporter;\n\
    \  }\n\n  @Bean\n  public SimpleHttpServerFactoryBean httpServer(\n      SimpleHttpInvokerServiceExporter\
    \ barExporter) {\n    SimpleHttpServerFactoryBean httpServer = new SimpleHttpServerFactoryBean();\n\
    \    Map<String, HttpHandler> endpoints = new HashMap<>();\n    endpoints.put(\"\
    /BarService\", barExporter);\n    httpServer.setContexts(endpoints);\n    httpServer.setPort(10207);\n\
    \    return httpServer;\n  }\n}\n```\n\n`ServerCondiguration.barExplorer` bean\
    \ is similar to the servlet `HttpInvoker` examples. The method creates an instance\
    \ of `SimpleHttpInvokerServiceExplorer`. The service exporter has mandatory fields:\
    \ the service and service interface. The service implementation instance is injected\
    \ from Spring and represents the exposed logic. The service interface is the signature\
    \ of the exposed service.\n\nThe second bean in our configuration configures a\
    \ simple HTTP service. The exposed service needs to be bound to a URL endpoint.\
    \ The second mandatory setting we need to provide is the port number where the\
    \ simple HTTP server will be listening.\n\n## HttpInvoker Service Accessed from\
    \ Client\n\nThe previous examples showed that we have various options for exposing\
    \ a service via `HttpInvoker`, differentiated by the implementation of the web\
    \ server/servlet. On the other side of the communication channel, we have two\
    \ options for consuming the `HttpInvoker` protocol:\n\n*   Standard Java Development\
    \ Kit (JDK) HTTP client—used by default\n*   Apache HttpComponents as the client\
    \ library\n\nApache HttpComponents provides a few features that are not handled\
    \ by the standard Java SE HTTP component:\n\n*   Basic HTTP authentication\n*\
    \   HTTP connection pooling\n*   HTTP state management\n\nAn example of Java configuration\
    \ with a standard Java HTTP proxy is shown in [Listing 2-23](#9781484207949_Ch02.xhtml#FPar25).\n\
    \n[***Listing 2-23***](#9781484207949_Ch02.xhtml#FPar25). HttpInvoker Client Configuration\
    \ Example (0204-http-invoker-handler-servlet-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.\n\
    \          handlerservlet.javaconfig.client;\n\nimport net.lkrnac.book.eiws.chapter02.httpinvoker.\n\
    \         handlerservlet.javaconfig.shared.BarService;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.remoting.httpinvoker.HttpInvokerProxyFactoryBean;\n\
    \n@Configuration\npublic class ClientConfiguration {\n  @Bean\n  public HttpInvokerProxyFactoryBean\
    \ httpInvokerProxy() {\n    HttpInvokerProxyFactoryBean httpInvoker =\n      \
    \  new HttpInvokerProxyFactoryBean();\n    httpInvoker.setServiceUrl(\"http://localhost:10204/BarService\"\
    );\n    httpInvoker.setServiceInterface(BarService.class);\n    return httpInvoker;\n\
    \  }\n}\n```\n\nWe need to register a bean of type `HttpInvokerProxyFactoryBean`\
    \ into the Spring context. It is a factory bean, which indicates that it will\
    \ be used for creating object(s). In this case, it will create a proxy bean, which\
    \ will act as a local instance of the remote service. All requests to this bean\
    \ will be serialized and sent through the wire to the server."
  raw: 'Configuring `DispatcherServlet` is covered in the Spring Web certification
    exam and is highlighted in [Chapters 3](#9781484207949_Ch03.xhtml) and [4](#9781484207949_Ch04.xhtml).
    Therefore, I grabbed the chance and used a new approach to configure HttpInvoker
    via `DispatcherServlet`. As experienced Spring developers would recognize, [Listing
    2-19](#9781484207949_Ch02.xhtml#FPar21) uses an API that isn’t part of the Spring
    Core framework (the `EnableAutoConfiguration` annotation and `SpringApplication`
    class). These are part of the new Spring Boot framework. Spring Boot promotes
    convention over configuration principles for a highly configurable Spring. This
    significantly helps decrease the amount of boilerplate configuration. But at the
    same time, conventions can be replaced with custom Spring configurations. This
    allows for rapid and flexible development with Spring family frameworks.


    The `EnableAutoConfiguration` annotation tells Spring Boot to look at the classpath
    and apply the most appropriate Spring configuration based on found dependencies.
    [Listing 2-20](#9781484207949_Ch02.xhtml#FPar22) contains Maven dependencies for
    this example.


    [***Listing 2-20***](#9781484207949_Ch02.xhtml#_FPar22). Maven Dependencies (0206-http-invoker-bean)


    ```

    <dependencies>

      <dependency>

        <groupId>org.springframework.boot</groupId>

        <artifactId>spring-boot-starter-web</artifactId>

      </dependency>

      <dependency>

          <groupId>org.springframework.boot</groupId>


    <artifactId>spring-boot-starter-tomcat</artifactId>

          <scope>provided</scope>

      </dependency>

    </dependencies>

    ```


    In this case, we have Tomcat on the classpath. So because we have a servlet container
    as a dependency, Spring Boot applies the most common servlet configuration with
    `DispatcherServlet`. This is handy for our example because it is, in fact, all
    the configuration needed if we are using Spring Boot JAR packaging.


    If we need to use Spring Boot WAR packaging, one more class would be needed to
    cover servlet configuration, as shown in [Listing 2-21](#9781484207949_Ch02.xhtml#FPar23).


    [***Listing 2-21***](#9781484207949_Ch02.xhtml#_FPar23). Spring Boot Servlet Helper
    for WAR Packaging (example project 0206-http-invoker-bean)


    ```

    package net.lkrnac.book.eiws.chapter02.httpinvoker.dispatcherservlet.server;


    import org.springframework.boot.builder.SpringApplicationBuilder;

    import org.springframework.boot.context.web.SpringBootServletInitializer;


    public class WebInitializer extends SpringBootServletInitializer {

      @Override

      protected SpringApplicationBuilder configure(

          SpringApplicationBuilder application) {

        return application.sources(ServerConfiguration.class);

      }

    }

    ```


    `SpringBootServletInitializer` maps `DispatcherServlet` to “`/`” URL and uses
    `ServerConfiguration` class as main Spring context definition.


    HttpInvoker Served via Simple Java HTTP Server


    If the servlet container is overkill for our application, we could use a pure
    Java SE approach for exposing the service with HttpInvoker. The standard Java
    runtime contains a simple HTTP server implementation, which can be used by Spring
    to expose the service via HttpInvoker. The API details of this simple HTTP server
    are not relevant because we want to use Spring abstractions. Let’s take a look
    at the Spring configuration in [Listing 2-22](#9781484207949_Ch02.xhtml#FPar24).


    [***Listing 2-22***](#9781484207949_Ch02.xhtml#_FPar24). HttpInvoker via Simple
    Java Server Configuration Example (0207-http-invoker-simple-service)


    ```

    package net.lkrnac.book.eiws.chapter02.httpinvoker.simple.server;


    import java.util.HashMap;

    import java.util.Map;

    import net.lkrnac.book.eiws.chapter02.httpinvoker.simple.shared.BarService;

    import org.springframework.boot.SpringApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.remoting.

             httpinvoker.SimpleHttpInvokerServiceExporter;

    import org.springframework.remoting.support.SimpleHttpServerFactoryBean;

    import com.sun.net.httpserver.HttpHandler;


    @Configuration

    @ComponentScan

    public class ServerConfiguration {

      @Bean

      public SimpleHttpInvokerServiceExporter barExporter(BarService barService) {

        SimpleHttpInvokerServiceExporter barExporter =

            new SimpleHttpInvokerServiceExporter();

        barExporter.setService(barService);

        barExporter.setServiceInterface(BarService.class);

        return barExporter;

      }


    @Bean

      public SimpleHttpServerFactoryBean httpServer(

          SimpleHttpInvokerServiceExporter barExporter) {

        SimpleHttpServerFactoryBean httpServer = new SimpleHttpServerFactoryBean();

        Map<String, HttpHandler> endpoints = new HashMap<>();

        endpoints.put("/BarService", barExporter);

        httpServer.setContexts(endpoints);

        httpServer.setPort(10207);

        return httpServer;

      }

    }

    ```


    `ServerCondiguration.barExplorer` bean is similar to the servlet HttpInvoker examples.
    The method creates an instance of `SimpleHttpInvokerServiceExplorer`. The service
    exporter has mandatory fields: the service and service interface. The service
    implementation instance is injected from Spring and represents the exposed logic.
    The service interface is the signature of the exposed service.


    The second bean in our configuration configures a simple HTTP service. The exposed
    service needs to be bound to a URL endpoint. The second mandatory setting we need
    to provide is the port number where the simple HTTP server will be listening.


    HttpInvoker Service Accessed from Client


    The previous examples showed that we have various options for exposing a service
    via HttpInvoker, differentiated by the implementation of the web server/servlet.
    On the other side of the communication channel, we have two options for consuming
    the HttpInvoker protocol:


    *   Standard Java Development Kit (JDK) HTTP client—used by default

    *   Apache HttpComponents as the client library


    Apache HttpComponents provides a few features that are not handled by the standard
    Java SE HTTP component:


    *   Basic HTTP authentication

    *   HTTP connection pooling

    *   HTTP state management


    An example of Java configuration with a standard Java HTTP proxy is shown in [Listing
    2-23](#9781484207949_Ch02.xhtml#FPar25).


    [***Listing 2-23***](#9781484207949_Ch02.xhtml#_FPar25). HttpInvoker Client Configuration
    Example (0204-http-invoker-handler-servlet-java-config)


    ```

    package net.lkrnac.book.eiws.chapter02.httpinvoker.

              handlerservlet.javaconfig.client;


    import net.lkrnac.book.eiws.chapter02.httpinvoker.

             handlerservlet.javaconfig.shared.BarService;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.remoting.httpinvoker.HttpInvokerProxyFactoryBean;


    @Configuration

    public class ClientConfiguration {

      @Bean

      public HttpInvokerProxyFactoryBean httpInvokerProxy() {

        HttpInvokerProxyFactoryBean httpInvoker =

            new HttpInvokerProxyFactoryBean();

        httpInvoker.setServiceUrl("http://localhost:10204/BarService");

        httpInvoker.setServiceInterface(BarService.class);

        return httpInvoker;

      }

    }

    ```


    We need to register a bean of type `HttpInvokerProxyFactoryBean` into the Spring
    context. It is a factory bean, which indicates that it will be used for creating
    object(s). In this case, it will create a proxy bean, which will act as a local
    instance of the remote service. All requests to this bean will be serialized and
    sent through the wire to the server.'
  trans: '

    配置`DispatcherServlet`是 Spring Web 认证考试中的内容，并在第 3 章和第 4 章中重点介绍。因此，我抓住机会，采用了一种新方法通过`DispatcherServlet`来配置
    HttpInvoker。经验丰富的 Spring 开发者会注意到，清单 2-19 使用了不属于 Spring 核心框架的 API（`EnableAutoConfiguration`注解和`SpringApplication`类）。这些是新的
    Spring Boot 框架的一部分。Spring Boot 推崇约定优于配置的原则，以构建高度可配置的 Spring 应用。这极大地有助于减少样板配置的数量。但同时，约定也可以被自定义的
    Spring 配置所取代。这使得使用 Spring 家族框架进行快速且灵活的开发成为可能。


    `EnableAutoConfiguration`注解告诉 Spring Boot 检查类路径，并根据找到的依赖项应用最合适的 Spring 配置。清单 2-20
    包含了此示例的 Maven 依赖项。


    ***清单 2-20***. Maven 依赖项 (0206-http-invoker-bean)


    ```

    <dependencies>

      <dependency>

        <groupId>org.springframework.boot</groupId>

        <artifactId>spring-boot-starter-web</artifactId>

      </dependency>

      <dependency>

          <groupId>org.springframework.boot</groupId>


    <artifactId>spring-boot-starter-tomcat</artifactId>

          <scope>provided</scope>

      </dependency>

    </dependencies>

    ```


    在这个例子中，我们的类路径上有 Tomcat。因此，由于我们有一个 Servlet 容器作为依赖项，Spring Boot 会应用最常见的、带有`DispatcherServlet`的
    Servlet 配置。这对我们的示例来说很方便，因为如果使用 Spring Boot JAR 打包，这实际上就是所需的所有配置。


    如果我们需要使用 Spring Boot WAR 打包，则需要再添加一个类来处理 Servlet 配置，如清单 2-21 所示。


    ***清单 2-21***. 用于 WAR 打包的 Spring Boot Servlet 辅助类 (示例项目 0206-http-invoker-bean)


    ```

    package net.lkrnac.book.eiws.chapter02.httpinvoker.dispatcherservlet.server;


    import org.springframework.boot.builder.SpringApplicationBuilder;

    import org.springframework.boot.context.web.SpringBootServletInitializer;


    public class WebInitializer extends SpringBootServletInitializer {

      @Override

      protected SpringApplicationBuilder configure(

          SpringApplicationBuilder application) {

        return application.sources(ServerConfiguration.class);

      }

    }

    ```


    `SpringBootServletInitializer`将`DispatcherServlet`映射到“`/`”URL，并使用`ServerConfiguration`类作为主要的
    Spring 上下文定义。


    通过简单的 Java HTTP 服务器提供 HttpInvoker 服务


    如果 Servlet 容器对我们的应用程序来说过于庞大，我们可以使用纯 Java SE 方法来通过 HttpInvoker 暴露服务。标准 Java 运行时包含一个简单的
    HTTP 服务器实现，Spring 可以利用它通过 HttpInvoker 暴露服务。这个简单 HTTP 服务器的 API 细节并不重要，因为我们希望使用
    Spring 的抽象。让我们看看清单 2-22 中的 Spring 配置。


    ***清单 2-22***. 通过简单 Java 服务器配置 HttpInvoker 的示例 (0207-http-invoker-simple-service)


    ```

    package net.lkrnac.book.eiws.chapter02.httpinvoker.simple.server;


    import java.util.HashMap;

    import java.util.Map;

    import net.lkrnac.book.eiws.chapter02.httpinvoker.simple.shared.BarService;

    import org.springframework.boot.SpringApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.remoting.

             httpinvoker.SimpleHttpInvokerServiceExporter;

    import org.springframework.remoting.support.SimpleHttpServerFactoryBean;

    import com.sun.net.httpserver.HttpHandler;


    @Configuration

    @ComponentScan

    public class ServerConfiguration {

      @Bean

      public SimpleHttpInvokerServiceExporter barExporter(BarService barService) {

        SimpleHttpInvokerServiceExporter barExporter =

            new SimpleHttpInvokerServiceExporter();

        barExporter.setService(barService);

        barExporter.setServiceInterface(BarService.class);

        return barExporter;

      }


    @Bean

      public SimpleHttpServerFactoryBean httpServer(

          SimpleHttpInvokerServiceExporter barExporter) {

        SimpleHttpServerFactoryBean httpServer = new SimpleHttpServerFactoryBean();

        Map<String, HttpHandler> endpoints = new HashMap<>();

        endpoints.put("/BarService", barExporter);

        httpServer.setContexts(endpoints);

        httpServer.setPort(10207);

        return httpServer;

      }

    }

    ```


    `ServerConfiguration.barExporter` bean 与 Servlet HttpInvoker 示例类似。该方法创建了一个`SimpleHttpInvokerServiceExporter`实例。服务导出器具有必填字段：服务和服务接口。服务实现实例从
    Spring 注入，代表暴露的逻辑。服务接口是暴露服务的签名。


    配置中的第二个 bean 配置了一个简单的 HTTP 服务。暴露的服务需要绑定到一个 URL 端点。我们需要提供的第二个必填设置是简单 HTTP 服务器将监听的端口号。


    从客户端访问 HttpInvoker 服务


    前面的示例表明，我们有多种通过 HttpInvoker 暴露服务的选项，这些选项的区别在于 Web 服务器/Servlet 的实现。在通信通道的另一端，我们有两种使用
    HttpInvoker 协议的选项：


    *   标准 Java 开发工具包（JDK）HTTP 客户端——默认使用

    *   Apache HttpComponents 作为客户端库


    Apache HttpComponents 提供了一些标准 Java SE HTTP 组件无法处理的功能：


    *   基本 HTTP 认证

    *   HTTP 连接池

    *   HTTP 状态管理


    使用标准 Java HTTP 代理的 Java 配置示例如清单 2-23 所示。


    ***清单 2-23***. HttpInvoker 客户端配置示例 (0204-http-invoker-handler-servlet-java-config)


    ```

    package net.lkrnac.book.eiws.chapter02.httpinvoker.

              handlerservlet.javaconfig.client;


    import net.lkrnac.book.eiws.chapter02.httpinvoker.

             handlerservlet.javaconfig.shared.BarService;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.remoting.httpinvoker.HttpInvokerProxyFactoryBean;


    @Configuration

    public class ClientConfiguration {

      @Bean

      public HttpInvokerProxyFactoryBean httpInvokerProxy() {

        HttpInvokerProxyFactoryBean httpInvoker =

            new HttpInvokerProxyFactoryBean();

        httpInvoker.setServiceUrl("http://localhost:10204/BarService");

        httpInvoker.setServiceInterface(BarService.class);

        return httpInvoker;

      }

    }

    ```


    我们需要将一个`HttpInvokerProxyFactoryBean`类型的 bean 注册到 Spring 上下文中。它是一个工厂 bean，表明它将用于创建对象。在这种情况下，它将创建一个代理
    bean，该 bean 将充当远程服务的本地实例。对此 bean 的所有请求都将被序列化并通过网络发送到服务器。

