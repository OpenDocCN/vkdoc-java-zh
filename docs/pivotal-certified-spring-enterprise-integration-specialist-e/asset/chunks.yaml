    Message Endpoint


    The message endpoint is probably the most diverse SI component. The SI reference
    documentation refers to it as a *filter* from the pipes-and-filters architecture.
    We already mentioned that in order to send or receive messages, the endpoint has
    to be connected to one or more message channels. Its primary role is to encapsulate
    application logic and decouple it from the SI messaging infrastructure. Our application
    code often doesn’t even know that it’s part of the SI flow. A good example is
    `WriteService`, shown previously in [Listing 8-4](#9781484207949_Ch08_1.xhtml#FPar6).
    From a first look at this class, we can’t say whether it’s a standard Spring bean
    or part of the SI flow.


    As we mentioned, it makes sense to model SI flow in an XML configuration. The
    message endpoint, as a generic component, doesn’t have any XML tag representation,
    because each type of specific component has its own XML tag. But some parts of
    the SI flow can be configured via Java annotations. In such a case generic annotations
    are required for message endpoint configuration.


    The first, most important, annotation from the SI framework is `@EnableIntegration`.
    It enables the declaration of standard SI beans when we use Spring’s `@Configuration`
    annotation. The same effect can be achieved with Spring Boot’s `@EnableAutoConfiguration`
    annotation or `@SpringBootApplication`. So when we use Spring Boot with autoconfiguration,
    we can skip `@EnableIntegration`, because it will be configured automatically
    for us.'
