    Summary


    This chapter introduced the benefits of higher-level integration frameworks and
    the need to abstract more-complicated message flows into a concise framework such
    as Spring Integration. We focused on SI’s main concepts and killer features. SI
    is lightweight, because it doesn’t need any special runtime environment.


    We covered the three main SI building blocks (message, message endpoint, and message
    channel) and covered the various types of each component. We showed how to programmatically
    create message components if needed and emphasized the immutability of the default
    message type.


    Most notably, we covered a lot of message endpoint types for message routing,
    transformation, and connecting SI flow to third-party technologies or Java classes
    and interfaces. These components were explained in passive (synchronous) and active
    (asynchronous with poller) mode. We also covered which components can participate
    in unidirectional (fire-and-forget scenarios) and bidirectional (request-response
    scenarios) flows.


    We also looked at message channel types and characteristics. We covered how they
    behave and why they are useful for different scenarios in relation to active vs.
    passive message endpoints.


    Last, we covered error handling, and error and transaction propagation in relation
    to synchronous vs. asynchronous message flow.


