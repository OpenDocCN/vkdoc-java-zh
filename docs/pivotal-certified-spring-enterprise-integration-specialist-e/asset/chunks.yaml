    This imports the XML configuration we described previously in [Listing 9-131](#9781484207949_Ch09_3_Ext.xhtml#FPar135).
    When Spring Boot, executed with autoconfiguration, finds the H2 database dependency
    on the classpath, by default it configures an in-memory database. But we want
    to avoid this feature, because we have our special TCP configuration that we want
    to expose to other processes also. So we exclude the Spring Boot `DataSourceAutoConfiguration`
    from autoconfiguration so it doesn’t conflict with our configuration.


    Slave Partitioning Project


