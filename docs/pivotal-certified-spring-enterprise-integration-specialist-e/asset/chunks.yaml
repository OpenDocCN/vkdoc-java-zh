    Generic Messaging Gateway Example Based on Java Configuration


    [Listing 8-30](#9781484207949_Ch08_1.xhtml#FPar33) covers the SI configuration
    class.


    [***Listing 8-30***](#9781484207949_Ch08_1.xhtml#_FPar33). Java Configuration
    for Generic Inbound Gateway Example (0809-gateway-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.integration.annotation.IntegrationComponentScan;

    import org.springframework.integration.channel.DirectChannel;

    import org.springframework.messaging.MessageChannel;


    @Configuration

    @IntegrationComponentScan

    public class SiConfiguration {

      @Bean

      public MessageChannel inChannel() {

        return new DirectChannel();

      }

    }

    ```


    Alongside the standard Spring `@Configuration` annotation, we also use the `@IntegrationComponentScan`
    annotation. It is needed to scan the current package and its subpackages for SI
    components. In addition, the `inChannel` bean is configured as an SI channel.
    [Listing 8-31](#9781484207949_Ch08_1.xhtml#FPar34) shows the output of the service
    activator configuration.


    [***Listing 8-31***](#9781484207949_Ch08_1.xhtml#_FPar34). Output Service Activator
    for Generic Messaging Gateway Example (0809-gateway-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08.out;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.integration.annotation.ServiceActivator;

    import org.springframework.stereotype.Service;


    @Service

    public class WriteServiceAnnotated {

      private WriteRepository writeRepository;


    @Autowired

      public WriteServiceAnnotated(WriteRepository writeRepository) {

        super();

        this.writeRepository = writeRepository;

      }


    @ServiceActivator(inputChannel = "inChannel")

      public boolean writeAndIndicateSuccess(String message) {

        return writeRepository.persist(message) == 1;

      }

    }

    ```


    This service activator is different from the previous examples, because it returns
    the result of the write operation from the mapped method `WriteServiceAnnotated.writeAndIndicateSuccess()`
    and thus is able to participate in bidirectional message flow. As we already know,
    bidirectional flow involves automatic creation of a temporary reply channel, which
    is used to send a reply back to the upstream consumer. [Listing 8-32](#9781484207949_Ch08_1.xhtml#FPar35)
    covers the inbound gateway configuration.


    [***Listing 8-32***](#9781484207949_Ch08_1.xhtml#_FPar35). Messaging Gateway Java
    Configuration (0809-gateway-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08.in;

    import org.springframework.integration.annotation.Gateway;

    import org.springframework.integration.annotation.MessagingGateway;


    @MessagingGateway

    public interface SiWrapperServiceAnnotated {

      @Gateway(requestChannel = "inChannel")

      public boolean processText(String text);

    }

    ```


    The `@MessagingGateway` annotation is needed to mark this interface as an SI inbound
    gateway. The wrapper method is annotated by `@Gateway`, where `requestChannel`
    is a mandatory attribute. This interface doesn’t have any implementation defined,
    because SI creates an implementation based on the SI flow definition. Notice that
    this method returns a Boolean value, which will be converted into a reply message
    of bidirectional message flow, where a temporary reply channel is created under
    the hood automatically. [Listing 8-33](#9781484207949_Ch08_1.xhtml#FPar36) shows
    the main class of this example.


    [***Listing 8-33***](#9781484207949_Ch08_1.xhtml#_FPar36). Main Class of Inbound
    Gateway Example Configured with Java (0809-gateway-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;


    import lombok.extern.slf4j.Slf4j;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceAnnotated;


    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;


    @Slf4j

    @SpringBootApplication

    public class SiApplication {

      public static void main(String[] args) throws InterruptedException {

        ApplicationContext ctx = SpringApplication.run(SiApplication.class, args);


    SiWrapperServiceAnnotated wrapperService =

            ctx.getBean(SiWrapperServiceAnnotated.class);

        boolean result = wrapperService.processText("simple message");

        log.info("Result: " + result);

      }

    }

    ```


    `@ImportResource` is not needed in this case, as we have a pure Java configuration.
    After the Spring Boot application is started via the main method, we read our
    service interface from the Spring context, send the message to the SI flow, and
    log the result. The output from running this main class looks similar to the output
    of the previous example, `0808-gateway-generic-xml` in [Listing 8-29](#9781484207949_Ch08_1.xhtml#FPar32).


    Technology-Specific Gateway Example


    This example uses an HTTP inbound gateway and JDBC outbound gateway to handle
    bidirectional SI flow. [Listing 8-34](#9781484207949_Ch08_1.xhtml#FPar37) shows
    the XML SI configuration.


    [***Listing 8-34***](#9781484207949_Ch08_1.xhtml#_FPar37). SI Flow XML Configuration
    for Technology-Specific Gateways Example (File si-config.xml in Folder src/main/resources
    of Example Project 0810-gateway-non-generic)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:int-http="http://www.springframework.org/schema/integration/http"

      xmlns:int-jdbc="http://www.springframework.org/schema/integration/jdbc"

      xsi:schemaLocation="http://www.springframework.org/schema/integration/jdbc http://www.springframework.org/schema/integration/jdbc/spring-integration-jdbc.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration/http

        http://www.springframework.org/schema/integration/http/spring-integration-http.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int-http:inbound-gateway path="/" request-channel="inChannel" supported-methods="POST"/>


    <int:channel id="inChannel" />


    <int-jdbc:outbound-gateway data-source="dataSource" request-channel="inChannel"

        update="insert into TEXT_TABLE values (:payload)" />

    </beans>

    ```


    We use two technology-specific XML namespaces here: `int-http` and `int-jdbc`.
    The input part uses an HTTP inbound gateway, which is mapped to the root URL assigned
    by the servlet container and consumes only POST HTTP requests. After conversion,
    the message is passed to `inChannel`.


    In the output part of the SI flow, we have a JDBC outbound gateway, using the
    `dataSource` bean to access an in-memory DB. The query used to insert the message
    into `TEXT_TABLE` should already be familiar from [Listing 8-18](#9781484207949_Ch08_1.xhtml#FPar21),
    the `0805-channel-adapter-non-generic` example. `SimpleDatabasePopulator`, which
    initializes the DB table, is also taken from the same example (see [Listing 8-19](#9781484207949_Ch08_1.xhtml#FPar22)).
    The main class is also the same as in the `0805-channel-adapter-non-generic` example
    ([Listing 8-21](#9781484207949_Ch08_1.xhtml#FPar24)). It executes the Spring Boot
    application and leaves it listening for POST requests. [Chapter 4](#9781484207949_Ch04.xhtml)
    covered how to send HTTP messages.


