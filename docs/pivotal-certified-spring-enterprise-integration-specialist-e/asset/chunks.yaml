    *   通过 `@ComponentScan` 注解在当前包及其子包中进行组件扫描

    *   通过 `@EnableJms` 注解启用 Spring JMS

    *   通过 `@EnableScheduling` 注解启用 Spring 调度支持，用于发送消息（参见清单 7-3）

    *   导入此示例中解释的所有 XML 配置


