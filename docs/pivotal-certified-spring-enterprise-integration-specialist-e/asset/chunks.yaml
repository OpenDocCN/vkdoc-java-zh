    请注意，消息的自动确认在不同消息之间并非原子操作。它仅适用于无法依赖一批消息的 ACID 特性的场景。


    在 `CLIENT_ACKNOWLEDGE` 模式下，JMS 客户端负责显式确认消息。这是通过调用 `Message.acknowledge()` 来完成的。从这个
    API 来看，似乎每条消息都需要单独确认，但在此模式下并非如此。确认操作是针对会话执行的；因此，`Message.acknowledge()` 调用会确认当前会话中所有已消费但未确认的消息。例如，我们可以在同一个会话中读取
    10 条消息，并通过一次 `Message.acknowledge()` 调用确认它们。


    我们还可以考虑使用 JMS 本地事务，对 `javax.jms.Session` 或 `javax.jms.JMSContext` 执行各种操作，并在逻辑事务结束时显式提交或回滚所有针对它们完成的工作。这与关系型数据库的事务支持概念类似。两个
    JMS 资源都为此提供了显式方法 `commit()` 和 `rollback()`。


    JMS 本地事务可以作为 JMS 消息接收和发送的保护伞，而消息的确认仅在消息接收期间处理。


