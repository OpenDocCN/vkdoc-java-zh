    SI 组件。此外，`inChannel` bean 被配置为一个 SI 通道。清单 8-31 展示了服务激活器配置的输出。


    ***清单 8-31***. 通用消息网关示例的输出服务激活器 (0809-gateway-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08.out;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.integration.annotation.ServiceActivator;

    import org.springframework.stereotype.Service;


    @Service

    public class WriteServiceAnnotated {

      private WriteRepository writeRepository;


    @Autowired

      public WriteServiceAnnotated(WriteRepository writeRepository) {

        super();

        this.writeRepository = writeRepository;

      }


    @ServiceActivator(inputChannel = "inChannel")

      public boolean writeAndIndicateSuccess(String message) {

        return writeRepository.persist(message) == 1;

      }

    }

    ```


    这个服务激活器与之前的示例不同，因为它从映射的方法 `WriteServiceAnnotated.writeAndIndicateSuccess()` 返回了写操作的结果，因此能够参与双向消息流。正如我们已经知道的，双向流涉及自动创建一个临时回复通道，用于将回复发送回上游消费者。清单
    8-32 涵盖了入站网关的配置。


    ***清单 8-32***. 消息网关 Java 配置 (0809-gateway-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08.in;

    import org.springframework.integration.annotation.Gateway;

    import org.springframework.integration.annotation.MessagingGateway;


    @MessagingGateway

    public interface SiWrapperServiceAnnotated {

      @Gateway(requestChannel = "inChannel")

      public boolean processText(String text);

    }

    ```


    `@MessagingGateway` 注解用于将此接口标记为 SI 入站网关。包装方法由 `@Gateway` 注解，其中 `requestChannel`
    是必需属性。此接口没有定义任何实现，因为 SI 会根据 SI 流定义创建实现。请注意，此方法返回一个布尔值，该值将被转换为双向消息流的回复消息，其中临时回复通道会在底层自动创建。清单
    8-33 展示了此示例的主类。


    ***清单 8-33***. 使用 Java 配置的入站网关示例的主类 (0809-gateway-generic-javaconfig)


    ```

    package net.lkrnac.book.eiws.chapter08;


    import lombok.extern.slf4j.Slf4j;

    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceAnnotated;


    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.ApplicationContext;


