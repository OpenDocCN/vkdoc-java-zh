    package net.lkrnac.book.eiws.chapter05.userwithrole;


    import javax.jms.ConnectionFactory;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.jms.annotation.EnableJms;

    import org.springframework.jms.config.DefaultJmsListenerContainerFactory;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.jms.support.converter.MappingJackson2MessageConverter;

    import org.springframework.jms.support.converter.MessageConverter;

    import org.springframework.jms.support.converter.MessageType;

    import org.springframework.jms.support.converter.MessagingMessageConverter;


    @Configuration

    @EnableJms

    public class JmsConfiguration {

      @Bean

      public JmsTemplate jmsTemplate(ConnectionFactory connectionFactory,

          MessageConverter messageConverter) {

        JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);

        jmsTemplate.setMessageConverter(messageConverter);

        return jmsTemplate;

      }


    @Bean

      public MessageConverter messageConverter() {

        MappingJackson2MessageConverter payloadConverter =

            new MappingJackson2MessageConverter();

        payloadConverter.setTargetType(MessageType.TEXT);

        payloadConverter.setTypeIdPropertyName("__type");


    MessagingMessageConverter messageConverter =

            new MessagingMessageConverter();

        messageConverter.setPayloadConverter(payloadConverter);

        return messageConverter;

      }


    @Bean

      public DefaultJmsListenerContainerFactory jmsListenerContainerFactory(

          ConnectionFactory connectionFactory, MessageConverter messageConverter)
    {

        DefaultJmsListenerContainerFactory factory =

            new DefaultJmsListenerContainerFactory();

        factory.setConnectionFactory(connectionFactory);

        factory.setMessageConverter(messageConverter);

        return factory;

      }

    }

    ```


    The noticeable difference in this snippet is in the `messageConverter` bean construction.
    Instead of returning `MappingJackson2MessageConverter` as our message converter,
    we wrap it into `MessagingMessageConverter` as the payload converter, which allows
    us to append the `String` value of the role to the messages. Without this construct,
    `String` would also try to convert our `role` from/to the `User` type. If we didn’t
    wrap it this way, conversion would obviously fail. So this configuration is needed
    when we want to inject JMS message headers and at the same time use custom conversion
    for the JMS message payload.


    All these Spring beans are again under the same umbrella of the main Spring Boot
    class shown in [Listing 5-47](#9781484207949_Ch05.xhtml#FPar50).


