    消费 REST


    到目前为止，我们主要关注 REST 通信的服务器端。但 Spring 也支持来自 Java 客户端应用程序的客户端访问。用于客户端访问 REST 服务的主要类是
    `org.springframework.web.client.RestTemplate`。您应该通过其构造函数创建其实例。它包含执行所有 REST 相关
    HTTP 方法的方法，如表 4-1 所示。


    表 4-1. `RestTemplate` 方法


    | HTTP 方法 | RestTemplate 方法 | 说明 |

    | --- | --- | --- |

    | `DELETE` | `delete` | 根据给定的 URI 删除对象。 |

    | `POST` | `postForLocation` | 提交对象并读取其位置。 |

    | `postForObject` | 提交对象并期望返回其实例。 |

    | `postForEntity` | 提交对象并期望返回 `ResponseEntity<T>` 类型的响应。泛型类型 `T` 是响应负载的类型。 |

    | `HEAD` | `headForHeaders` | 根据给定的 URL 读取标头并返回 `HttpHeaders` 对象。 |

    | `GET` | `getForObject` | 根据给定的 URL 读取对象。 |

    | `getForEntity` | 根据给定的 URI 读取 `ResponseEntity<T>` 实例。泛型类型 `T` 是响应负载的类型。 |

    | `OPTIONS` | `optionsForAllow` | 返回给定 URI 的 `Allow` 标头值。 |

    | `PUT` | `put` | 对给定的 URI 执行给定对象的 `PUT` 操作。 |

    | 任何 HTTP 方法 | `exchange` | 对服务器执行任何 HTTP 方法，并交换 `HttpEntity<T>` 和 `ResponseEntity<T>`
    实例。 |

