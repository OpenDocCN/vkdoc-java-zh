    Using the Publish/Subscribe JMS Model


    At the beginning of this chapter, we mentioned a communication paradigm for sending
    messages to various subscribers. This important JMS abstraction hasn’t been covered
    by the examples so far. The following examples will fix that.


    The first class introduced is the service where we delegate received messages.
    It’s shown in [Listing 5-49](#9781484207949_Ch05.xhtml#FPar52).


    [***Listing 5-49***](#9781484207949_Ch05.xhtml#_FPar52). PubSubService (0515-publish-subscribe-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.pubsub;


    import lombok.extern.slf4j.Slf4j;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class PubSubService {

      public void handleMessage(int listenerId, String message) {

        log.info("Message Received: {} via listener {}", message, listenerId);

      }

    }

    ```


    This logs the message received alongside the ID of the listener from which the
    message was received. [Listing 5-50](#9781484207949_Ch05.xhtml#FPar53) shows the
    listener used in this example.


    [***Listing 5-50***](#9781484207949_Ch05.xhtml#_FPar53). Listener for Publish/Subscribe
    (0515-publish-subscribe-java-config)


    ```

    package net.lkrnac.book.eiws.chapter05.pubsub;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageListener1 {

      private PubSubService pubSubService;


    @Autowired

      public SimpleMessageListener1(PubSubService pubSubService) {

        super();

        this.pubSubService = pubSubService;

      }


    @JmsListener(destination = "simpleTopic")

      public void readMessage(String message) {

        pubSubService.processText(1, message);

      }

    }

    ```


    `SimpleMessageListener1` looks like a listener we’ve already seen. But notice
    that the JMS destination used here has the name `simpleTopic`. In the next section,
    you will see how this JMS destination of type `javax.jms.Topic` can be configured.


    The most obvious difference compared to other listeners in this chapter is the
    number in the class name. This is intentional; to demonstrate reception of one
    message by two listeners, we have two listeners in this example project. To keep
    the examples simple and listings shorter, the second listener is named `SimpleMessageListener2`
    and is an exact copy of `SimpleMessageListener1`, except `1` is changed to `2`.'
