  raw: '`barService` bean is injected by Spring, so that it can be used for registering
    a service to the RMI register. Otherwise, the RMI server code is pretty straightforward.


    Let’s take a look at the client side in [Listing 2-9](#9781484207949_Ch02.xhtml#FPar10).


    [***Listing 2-9***](#9781484207949_Ch02.xhtml#_FPar10). Spring RMI Client Configuration
    (0202-spring-rmi-java-config-client)


    ```

    package net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.client;


    import net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.remoting.rmi.RmiProxyFactoryBean;


    @Configuration

    public class ClientConfiguration {

      @Bean

      public BarService createBarServiceLink() {

        RmiProxyFactoryBean rmiProxyFactoryBean = new RmiProxyFactoryBean();

        rmiProxyFactoryBean.setServiceUrl("rmi://localhost:10202/BarService");

        rmiProxyFactoryBean.setServiceInterface(BarService.class);

        rmiProxyFactoryBean.afterPropertiesSet();

        return (BarService) rmiProxyFactoryBean.getObject();

      }

    }

    ```


    First we create `org.springframework.remoting.rmi.RmiProxyFactoryBean`. This factory
    class is used to create RMI proxy objects. It has a few mandatory properties:


    *   The remote location of the RMI registry. Spring uses the URL notation of the
    RMI endpoint definition.

    *   The service interface class definition.


    Calling `rmiProxyFactoryBean.afterPropertiesSet()` applies the configured RMI
    settings and binds the factory to the remote RMI register. The last call is `rmiProxyFactoryBean.getObject()`,
    where we create a proxy object that will simulate the service bean. And that’s
    it. `BarService` is now a bean in our client Spring IoC container. [Listing 2-10](#9781484207949_Ch02.xhtml#FPar11)
    shows how this bean can be used in client business logic.


    [***Listing 2-10***](#9781484207949_Ch02.xhtml#_FPar11). Use of RMI Client Proxy
    Bean (0202-spring-rmi-java-config-client)


    ```

    package net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.client;


    import javax.annotation.PostConstruct;

    import net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class FooClient {

      private final BarService barService;


    @Autowired

      public FooClient(BarService barService) {

        this.barService = barService;

      }


    @PostConstruct

      public void callBarService() {

        System.out.println(barService.serveBar("FooClient"));

      }

    }

    ```


    In any Spring bean, we can inject an RMI proxy bean and use it with exactly the
    same API as we would call the server implementation directly. This is because
    Spring translates checked `java.rmi.RemoteException` into unchecked `org.springframework.remoting.RemoteAccessException`.
    So we can completely hide the fact that we are calling a remote method from the
    business logic.


    When we run server example `0202-spring-rmi-java-config-service` and subsequently
    client example `0202-spring-rmi-java-config-client`, we can see the console output
    shown in [Listing 2-11](#9781484207949_Ch02.xhtml#FPar12).


    [***Listing 2-11***](#9781484207949_Ch02.xhtml#_FPar12). Console Output of Spring
    RMI Example


    ```

    Bar service 0202 response to parameter: FooClient

    ```


    If you are using XML context for legacy reasons, Spring provides support for it
    also. In fact, it is similar to the Java configuration, without any special XML
    namespaces. Therefore, we skip the definition of the service interface and its
    implementation for XML examples. They are the same as in [Listing 2-6](#9781484207949_Ch02.xhtml#FPar7)
    and [Listing 2-7](#9781484207949_Ch02.xhtml#FPar8), only the packages are slightly
    different.


    The server XML RMI configuration looks like [Listing 2-12](#9781484207949_Ch02.xhtml#FPar13).


    [***Listing 2-12***](#9781484207949_Ch02.xhtml#_FPar13). Spring RMI XML Server
    Configuration (file bar-service-context.xml in example project 0203-spring-rmi-xml-config-service)


    ```

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context-4.0.xsd">


    <context:component-scan base-package=

         "net.lkrnac.book.eiws.chapter02.rmi.spring.xmlconfig.service" />


    <bean class="org.springframework.remoting.rmi.RmiServiceExporter">

        <property name="serviceName" value="BarService" />

        <property name="service" ref="barServiceImpl" />

        <property name="serviceInterface"

          value="net.lkrnac.book.eiws.chapter02.rmi.spring.xmlconfig.BarService" />

        <property name="registryPort" value="10203" />

      </bean>

    </beans>

    ```


    The beginning of the file contains a definition of the standard Spring XML namespace
    context and bean. First we perform a component scan of the package where the service
    implementation is located. Then we register the RMI service exporter bean. The
    XML configuration is using standard Spring bean registration syntax.


    Notice the different port number than in [Listing 2-8](#9781484207949_Ch02.xhtml#FPar9).
    This difference indicates that this configuration is located in a different project,
    but the service interface and its implementation are exactly the same. It is easier
    to handle integration tests when different projects within an integration test
    suite are using different ports.


    As [Listing 2-13](#9781484207949_Ch02.xhtml#FPar14) shows, the client XML configuration
    is interestingly less verbose than the Java configuration.


    [***Listing 2-13***](#9781484207949_Ch02.xhtml#_FPar14). Spring RMI XML Client
    Configuration (file foo-client-context.xml in example project 0203-spring-rmi-xml-config-client)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context-4.0.xsd">


