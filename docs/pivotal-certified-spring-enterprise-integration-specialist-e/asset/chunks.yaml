    The JMS configuration is imported. Next we define the `StepScope` bean. When we
    use XML configuration, we need to enable batch scopes by configuring them as beans
    with `proxyTargetClass` enabled. If we didn’t configure these beans, Spring wouldn’t
    know about SB scopes at all.


    The `MessagingTemplate` bean is used for communication with the slave application.
    Its `defaultChannel` is connected to `outMasterAdapter`, which is the JMS outbound
    channel adapter connected to the JMS queue `masterCommands`. This route is used
    for sending items for remote processing and writing.


    Responses from the slave are received via the JMS inbound channel adapter `inMasterAdapter`
    and gathered in `inMasterChannel`, which is of type `QueueChannel`. So it stores
    responses in memory for master job processing.


    The chunk-oriented processing `Job` is defined with the local reader bean `simpleRecordWriter`,
    but for a writer we use the special bean named `remoteRecordWriter`.


    This is defined with the step scope and is of type `ChunkMessageChannelItemWriter`,
    which delegates writing of messages to `messagineTemplate`. The `replyChannel`
    attribute is configured to `inMasterChannel`. So this SB component polls `inMasterChannel`
    and waits for responses from the slave.


    Running the Remote Chunking Example


    To execute this example, we need to start three processes. First, the HornetQ
    server needs to be running; otherwise, the master and slave couldn’t communicate
    at all. We can start the HornetQ server via the command `bin/run.sh` or `bin/run.bat`.


    The second process is started by the main class shown in [Listing 9-126](#9781484207949_Ch09_3_Ext.xhtml#FPar130).


    [***Listing 9-126***](#9781484207949_Ch09_3_Ext.xhtml#_FPar130). Main Class of
    Remote Chunking Slave Project (0939-remote-chunking-slave)


