    }

    ```


    首先，我们创建 `org.springframework.remoting.rmi.RmiProxyFactoryBean`。这个工厂类用于创建 RMI 代理对象。它有几个必需的属性：


    *   RMI 注册表的远程位置。Spring 使用 RMI 端点定义的 URL 表示法。

    *   服务接口类定义。


    调用 `rmiProxyFactoryBean.afterPropertiesSet()` 会应用配置好的 RMI 设置，并将工厂绑定到远程 RMI 注册表。最后一步是调用
    `rmiProxyFactoryBean.getObject()`，在这里我们创建一个将模拟服务 Bean 的代理对象。就这样，`BarService` 现在成为了我们客户端
    Spring IoC 容器中的一个 Bean。清单 2-10 展示了如何在客户端业务逻辑中使用这个 Bean。


    ***清单 2-10***. RMI 客户端代理 Bean 的使用 (0202-spring-rmi-java-config-client)


    ```

    package net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.client;


    import javax.annotation.PostConstruct;

    import net.lkrnac.book.eiws.chapter02.rmi.spring.javaconfig.BarService;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class FooClient {

      private final BarService barService;


    @Autowired

      public FooClient(BarService barService) {

        this.barService = barService;

      }


    @PostConstruct

      public void callBarService() {

        System.out.println(barService.serveBar("FooClient"));

      }

    }

    ```


    在任何 Spring Bean 中，我们都可以注入一个 RMI 代理 Bean，并使用与直接调用服务器实现完全相同的 API 来使用它。这是因为 Spring
    将受检异常 `java.rmi.RemoteException` 转换为非受检异常 `org.springframework.remoting.RemoteAccessException`。因此，我们可以完全隐藏业务逻辑中正在调用远程方法的事实。


    当我们运行服务器示例 `0202-spring-rmi-java-config-service`，然后运行客户端示例 `0202-spring-rmi-java-config-client`
    时，可以看到清单 2-11 中显示的控制台输出。


    ***清单 2-11***. Spring RMI 示例的控制台输出


    ```

    Bar service 0202 response to parameter: FooClient

    ```


    如果你出于遗留原因使用 XML 上下文，Spring 也提供了支持。实际上，它与 Java 配置类似，没有任何特殊的 XML 命名空间。因此，对于 XML
    示例，我们跳过了服务接口及其实现的定义。它们与清单 2-6 和清单 2-7 中的相同，只是包名略有不同。


    服务器端的 XML RMI 配置如清单 2-12 所示。


    ***清单 2-12***. Spring RMI XML 服务器配置 (示例项目 0203-spring-rmi-xml-config-service 中的文件
    bar-service-context.xml)


    ```

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context-4.0.xsd">


    <context:component-scan base-package=

         "net.lkrnac.book.eiws.chapter02.rmi.spring.xmlconfig.service" />


    <bean class="org.springframework.remoting.rmi.RmiServiceExporter">

        <property name="serviceName" value="BarService" />

        <property name="service" ref="barServiceImpl" />

        <property name="serviceInterface"

          value="net.lkrnac.book.eiws.chapter02.rmi.spring.xmlconfig.BarService" />

        <property name="registryPort" value="10203" />

      </bean>

    </beans>

    ```


    文件开头定义了标准的 Spring XML 命名空间上下文和 Bean。首先，我们对服务实现所在的包执行组件扫描。然后，我们注册 RMI 服务导出器 Bean。该
    XML 配置使用了标准的 Spring Bean 注册语法。


    请注意，这里的端口号与清单 2-8 中的不同。这种差异表明此配置位于不同的项目中，但服务接口及其实现完全相同。当集成测试套件中的不同项目使用不同的端口时，处理集成测试会更容易。


    如清单 2-13 所示，客户端的 XML 配置比 Java 配置简洁得多，这很有趣。


    ***清单 2-13***. Spring RMI XML 客户端配置 (示例项目 0203-spring-rmi-xml-config-client 中的文件
    foo-client-context.xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/context

        http://www.springframework.org/schema/context/spring-context-4.0.xsd">


    <bean id="barService"

        class="org.springframework.remoting.rmi.RmiProxyFactoryBean">

        <property name="serviceUrl" value="rmi://localhost:10203/BarService" />

        <property name="serviceInterface"

          value="net.lkrnac.book.eiws.chapter02.rmi.spring.xmlconfig.BarService" />

      </bean>

    </beans>

    ```


    此示例是清单 2-14 中 XML 服务器配置的客户端对应部分。因此，使用了端口 10203。您可能会注意到它与 Java 配置类似。请注意，在清单 2-9
    的 Java 客户端配置示例中，我们必须显式创建代理 Bean。在这种情况下，Spring 会自动创建它，因此只需注册工厂 Bean 即可。


    如您所见，这些示例记录了 Spring 为 RMI 提供的 API 增强功能。虽然通过 RMI 暴露服务很容易，使用 Spring 则更容易，但使用 RMI
    时存在一些架构风险。首先，契约中包含的每个类型都必须是可序列化的。这具有限制性，因为双方都需要拥有每个返回类型或参数的相同版本。因此，对契约的更改需要在双方进行协调。这导致了
    RMI 导出器和消费者之间的紧密耦合。

    '
- fmt: "另一个问题是无法使用同一 API 契约的不同版本。当然，契约应尽可能保持稳定，但有时变更不可避免。其他方法（如 SOAP 或 REST）允许在不修改客户端的情况下扩展\
    \ API，而 RMI 序列化不适合此类变更。RMI 方法签名中使用的类型每次变更都需在客户端同步更新。\n\nRMI 的另一个显著缺点是只能与 JVM 运行时通信。这一问题可通过基于\
    \ CORBA 的 RMI 实现（RMI-IIOP）解决。CORBA 是由对象管理组织（OMG）定义的标准，专为不同平台间的通信设计。基于 Spring 的\
    \ RMI-IIOP 与纯 RMI 类似，唯一区别在于需为 Spring RMI 类添加 JNDI 前缀。例如，对于 RMI-IIOP，我们将使用`JndiRmiServiceExporter`而非`RmiServiceExporter`。尽管\
    \ CORBA 曾是实现分布式系统的有前景技术，但由于协议或其实现的各种问题，并未获得广泛采用。\n\n![Image](images/sq.jpg) **注意**\
    \ 深入探讨 CORBA 及其问题已超出本书范围。维基百科是很好的研究起点：`https://en.wikipedia.org/wiki/Common_Object_Request_Broker_Architecture#Problems_and_criticis`m\n\
    \nRMI 的这些弱点可能引发质疑，包括为何还要使用 RMI。但它确实有一个优势（除了简单性和优于 SOAP/REST 的性能）：无需 Web 服务器即可通信。纯\
    \ RMI 可以在不使用额外抽象或库的情况下实现 JVM 间通信。这在需要远程通信的基于 Java 的嵌入式系统中非常实用。\n\n## Spring RMI\
    \ 总结\n\n与纯 Java RMI API 相比，Spring 提供了诸多优势。首先，在服务端：\n\n*   将服务端业务逻辑与远程协议解耦，因为我们可以直接暴露业务服务而无需修改。\n\
    *   服务方法无需抛出`java.rmi.RemoteException`。\n*   服务接口无需继承`java.rmi.Remote`。\n*   服务实现无需继承`java.rmi.server.UnicastRemoteObject`。\n\
    *   服务构造函数无需抛出`java.rmi.RemoteException`。\n*   Spring 可自动完成与 RMI 注册表的绑定。\n\n其次，在客户端：\n\
    \n*   调用远程方法时无需修改现有代码，因为使用服务方法时客户端无需处理受检异常`java.rmi.RemoteException`。Spring 会将其转换为非受检异常`RemoteAccessException`。\n\
    *   将客户端业务逻辑与远程机制解耦，便于轻松替换远程协议。\n\n## Spring HttpInvoker\n\nHttpInvoker 是一种与 RMI\
    \ 类似的技术。它也使用标准 Java 序列化和反序列化，但采用不同的协议传输序列化数据。RMI 使用 JRMP，RMI-IIOP 使用 CORBA，而 HttpInvoker\
    \ 如其名称所示，使用 HTTP。HTTP 可能是当今最广泛使用的协议，因为它支撑着整个 Web。HTTP 相比其他协议具有显著优势，因为它最有可能被网络基础设施广泛支持。例如，RMI\
    \ 或 CORBA 可能被防火墙规则阻止，而大多数防火墙都启用了 HTTP。\n\n执行远程调用时，它使用 HTTP POST 请求，并通过标准 Java\
    \ 序列化对参数和响应值进行序列化。因此其性能与 RMI 相近。但 HttpInvoker 被 Spring 团队官方推荐为首选远程方法，因为它无需使用任何特殊的远程契约（远程接口、远程异常、代理），也不依赖\
    \ RMI 注册表机制。这就是为什么 Spring 文档认为 HttpInvoker 比其他远程机制更轻量级。\n\nHttpInvoker 可通过以下几种方式提供服务：\n\
    \n*   通过 Servlet 容器（Java EE）\n*   通过`HttpRequestHandlerServlet`（无需 Spring MVC\
    \ 支持）\n*   通过`DispatcherServlet`（需 Spring MVC 支持）\n*   通过简单的 Java HTTP 服务器实现（Java\
    \ SE）\n\n最后一种实现无需特殊运行时，标准 Java 运行时即可。而前两种则需要 Java EE Servlet 容器。\n\n每种 HttpInvoker\
    \ 解决方案都使用类似的方法暴露 Bean。它将目标服务 Bean 和服务接口包装到`HttpInvokerServiceExporter`/`SimpleHttpInvokerServiceExporter`中。该\
    \ Bean 在 Spring 容器中注册，并通过前述 HTTP 通信机制暴露。让我们通过示例探索每种方法。[清单 2-14](#9781484207949_Ch02.xhtml#FPar16)\
    \ 包含将要暴露的服务接口和实现示例。\n\n[***清单 2-14***](#9781484207949_Ch02.xhtml#_FPar16). 共享接口与服务实现\n\
    \n```\npublic interface BarService {\n  String serveBar(String param);\n}\n\n\
    import org.springframework.stereotype.Service;\n\n@Service\npublic class BarServiceImpl\
    \ implements BarService {\n  @Override\n  public String serveBar(String param)\
    \ {\n    return \"Bar service response to parameter: \" + param;\n  }\n}\n```\n\
    \n该服务接口契约和服务实现将用于本章所有 HttpInvoker 示例。\n\n## 通过 HttpRequestHandlerServlet 提供 HttpInvoker\
    \ 服务\n\n通过`HttpRequestHandlerServlet`提供 HttpInvoker 服务的示例可在项目`0204-http-invoker-handler-servlet-java-config`和`0205-http-invoker-handler-servlet-xml-config`的代码示例中找到。首先，我们需要将服务接口包装到`HttpInvokerServiceExporter`中，并将其注册为\
    \ Spring Bean，如[清单 2-15](#9781484207949_Ch02.xhtml#FPar17)所示。\n\n[***清单 2-15***](#9781484207949_Ch02.xhtml#_FPar17).\
    \ HttpInvoker 服务端配置示例\n\n```\npackage net.lkrnac.book.eiws.chapter02.httpinvoker.handlerservlet.javaconfig.server;\n\
    \nimport net.lkrnac.book.eiws.chapter02.httpinvoker.\n         handlerservlet.javaconfig.shared.BarService;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter;\n\
    \n@Configuration\n@ComponentScan\npublic class ServerConfiguration {\n  @Bean\n\
    \  public HttpInvokerServiceExporter barExporter(BarService barService) {\n  \
    \  HttpInvokerServiceExporter httpInvokerServiceExporter =\n        new HttpInvokerServiceExporter();\n\
    \    httpInvokerServiceExporter.setService(barService);\n    httpInvokerServiceExporter.setServiceInterface(BarService.class);\n\
    \    return httpInvokerServiceExporter;\n  }\n}\n```\n\n这是一个非常直接的 Spring Java\
    \ 配置，它扫描当前包（及子包）中的 Spring 组件，并注册一个服务导出器 Bean。请注意，该 Bean 的名称为`barExporter`（默认与\
    \ Bean 方法名相同）。Bean 名称很重要，因为它需要与 Servlet 描述符配置中的 Servlet 名称匹配。目标服务`barService`实例通过`HttpInvokerServiceExporter.setService`方法注入和配置。如您所见，我们还需要指定服务接口。相同\
    \ Bean 的 XML 配置如[清单 2-16](#9781484207949_Ch02.xhtml#FPar18)所示。\n\n[***清单 2-16***](#9781484207949_Ch02.xhtml#_FPar18).\
    \ HttpInvoker 服务端 XML 配置示例"
  raw: 'Another problem is the inability to use various versions of the same API contract.
    Of course, the contract should be as stable as possible. But sometimes changes
    are required. Other approaches, such as SOAP or REST, allow extending the API
    without needing to change the client. RMI serialization is not suitable for such
    changes. Each change to types used in the RMI method signature needs to be reflected
    on the client.


    Another significant downside of RMI is that it can communicate with only the JVM
    runtime. This is solved by the RMI over CORBA implementation (RMI-IIOP). CORBA
    is a standard defined by Object Management Group (OMG) and designed for communication
    between different platforms. RMI-IIOP with Spring is similar to pure RMI. The
    only difference is to add a JNDI prefix to Spring RMI classes. So, for example,
    instead of `RmiServiceExporter`, we would use `JndiRmiServiceExporter` for RMI-IIOP.
    But even when CORBA seemed a promising technology for implementing distributed
    systems, it didn’t gain widespread adoption because of various problems with the
    protocol or its implementations.


    ![Image](images/sq.jpg) **Note**  Diving into CORBA and its problems is beyond
    the scope of this book. Wikipedia is good place to start investigation: `https://en.wikipedia.org/wiki/Common_Object_Request_Broker_Architecture#Problems_and_criticis`m


    All these weak points of RMI can lead to questions, including why to use RMI at
    all. But it does have one more advantage (alongside simplicity and better performance
    than SOAP and REST): it doesn’t require a web server to communicate. Pure RMI
    can perform communication between JVMs without using additional abstractions or
    libraries. This can be handy in Java-based embedded systems that need to communicate
    remotely.


    Spring RMI Summary


    It is important to remember that Spring provides many benefits compared to the
    pure Java RMI API. First, on the server side:


    *   Decouples server business logic from the remoting protocol because we can
    expose business services without changes.

    *   Service method doesn’t need to throw `java.rmi.RemoteException`.

    *   Service interface doesn’t extend `java.rmi.Remote`.

    *   Service implementation doesn’t extend `java.rmi.server.UnicastRemoteObject`.

    *   Service constructor doesn’t need to throw `java.rmi.RemoteException`.

    *   Binding to the RMI registry can be done automatically by Spring.


    Second, on the client side:


    *   Existing code doesn’t have to be changed when invoking a remote method, because
    the client doesn’t need to handle checked `java.rmi.RemoteException` when the
    service method is used. Spring translates it into unchecked `RemoteAccessException`.

    *   Decouples client business logic from remoting mechanism, so remoting protocols
    can be easily replaced.


    Spring HttpInvoker


    HttpInvoker is a technology similar to RMI. It also uses standard Java serialization
    and deserialization. But it uses a different protocol to transfer serialized data.
    RMI uses JRMP, and PMI-IIOP uses CORBA. In contrast, as its name suggests, HttpInvoker
    uses HTTP. This is probably the most widely used protocol nowadays, because it
    fuels the whole Web. HTTP provides a significant advantage over other protocols,
    because it is most likely to be widely supported by network infrastructures. For
    example, RMI or CORBA can be blocked by firewall rules, but HTTP is enabled in
    most firewalls.


    When a remote call is performed, it uses an HTTP POST request and serializes parameters
    and response values via standard Java serialization. So it has similar performance
    to RMI. But HttpInvoker is officially supported by the Spring team as the preferred
    remoting approach, because it doesn’t need to use any special remoting contracts
    (remote interfaces, remote exceptions, proxies). It also doesn’t rely on the mechanism
    of an RMI registry. That is why Spring documentation considers HttpInvoker lightweight
    compared to other remoting mechanisms.


    HttpInvoker can be served in several ways:


    *   From the servlet container (Java EE)

    *   Via `HttpRequestHandlerServlet` (without Spring MVC support)

    *   Via `DispatcherServlet` (with Spring MVC support)

    *   Via simple Java HTTP server implementation (Java SE)


    No special runtime is needed for the latter implementation. The standard Java
    runtime is enough. For the first two, on the other hand, a Java EE servlet container
    is needed.


    Each HttpInvoker solution uses a similar approach for bean exposure. It wraps
    the target service bean and the service interface into an `HttpInvokerServiceExporter`/`SimpleHttpInvokerServiceExporter`.
    This bean is registered in the Spring container and exposed via the previously
    mentioned HTTP communication mechanisms. Let’s explore each approach with examples.
    [Listing 2-14](#9781484207949_Ch02.xhtml#FPar16) contains an example service interface
    and implementation that will be exposed.


    [***Listing 2-14***](#9781484207949_Ch02.xhtml#_FPar16). Shared Interface and
    Service Implementation


    ```

    public interface BarService {

      String serveBar(String param);

    }


    import org.springframework.stereotype.Service;


    @Service

    public class BarServiceImpl implements BarService {

      @Override

      public String serveBar(String param) {

        return "Bar service response to parameter: " + param;

      }

    }

    ```


    This service interface contract and service implementation are used across all
    HttpInvoker examples in this chapter.


    HttpInvoker Served via HttpRequestHandlerServlet


    Examples of HttpInvoker served via `HttpRequestHandlerServlet` can be found in
    code examples under projects `0204-http-invoker-handler-servlet-java-config` and
    `0205-http-invoker-handler-servlet-xml-config`. First we need to wrap our service
    interface into `HttpInvokerServiceExporter` and register it as a Spring bean,
    as shown in [Listing 2-15](#9781484207949_Ch02.xhtml#FPar17).


    [***Listing 2-15***](#9781484207949_Ch02.xhtml#_FPar17). HttpInvoker Server Configuration
    Example


    ```

    package net.lkrnac.book.eiws.chapter02.httpinvoker.handlerservlet.javaconfig.server;


    import net.lkrnac.book.eiws.chapter02.httpinvoker.

             handlerservlet.javaconfig.shared.BarService;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter;


    @Configuration

    @ComponentScan

    public class ServerConfiguration {

      @Bean

      public HttpInvokerServiceExporter barExporter(BarService barService) {

        HttpInvokerServiceExporter httpInvokerServiceExporter =

            new HttpInvokerServiceExporter();

        httpInvokerServiceExporter.setService(barService);

        httpInvokerServiceExporter.setServiceInterface(BarService.class);

        return httpInvokerServiceExporter;

      }

    }

    ```


    This is a pretty straightforward Spring Java configuration that scans for Spring
    components in the current package (also in subpackages) and registers a service
    exporter bean. Notice that this bean has the name `barExporter` (which is the
    name of the bean method by default). The bean name is important, because it needs
    to match the servlet name configured in the servlet descriptor configuration.
    The target service `barService` instance is injected and configured via the `HttpInvokerServiceExporter.setService`
    method. As you can see, we need to specify the service interface also. XML configuration
    of the same bean looks like [Listing 2-16](#9781484207949_Ch02.xhtml#FPar18).


    [***Listing 2-16***](#9781484207949_Ch02.xhtml#_FPar18). HttpInvoker Server XML
    Configuration Example'
