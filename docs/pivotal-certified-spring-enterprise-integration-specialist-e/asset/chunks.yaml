    在此例中，我们使用了多种 Spring XML 命名空间。`util` 命名空间帮助我们为 HornetQ 连接定义必要的 JNDI 属性，而 `jee`
    命名空间则用于对这些属性进行 JNDI 查找。我们在前一章已经见过这种配置。但此示例使用了连接工厂 Bean；请注意，默认的 HornetQ 配置包含 `XAConfigurationFactory`
    以及普通的 `ConfigurationFactory`。使用 `XAConnectionFactory` 可确保 `connectionFactory`
    JMS 数据源符合 XA 标准，从而能够参与全局事务。`nonXaJmsConnectionFactory` Bean 被 `SimpleMessageSender`
    Bean 用于为 JTA 示例发送消息。此连接工厂不参与 JTA 事务，否则会混淆示例的行为。


    HornetQ JMS 服务器在其默认配置中同时指定了这两个连接工厂。第 6 章 解释了下载并启动 HornetQ 服务器是多么简单。因此，如果你感兴趣，可以在配置文件
    `<hornet>/config/stand-alone/non-clustered/hornetq-jms.xml` 中找到 `XAConnectionFactory`
    和 `ConnectionFactory` 的默认配置。


    下一步是将此连接工厂包装到 `JmsTemplate` Bean 中。这使我们能够发送（或同步接收）JMS 消息。需要 `DestinationResolver`
    Bean 来配合 JNDI 查找属性，以找到我们计划发送和读取的 JMS 目标。

