    \ separation of concerns and low coupling. On the other hand, it brings higher\
    \ complexity, because a well-defined contract between the consumer and the producer\
    \ of the web service needs to be specified. When all aspects of the contract are\
    \ defined up front, services and applications can be developed, tested, and deployed\
    \ in isolation.\n\nRPC approaches may be considered also, but tight coupling of\
    \ remoting technologies is a big problem for SOA, especially when the consumer\
