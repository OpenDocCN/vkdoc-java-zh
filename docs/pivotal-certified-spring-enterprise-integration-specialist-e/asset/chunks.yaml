    Bean，并将它们注册到其 IoC 容器中。所以，在本章的 Spring 示例中，我们不会看到任何其他与数据库相关的 Bean，因为 Spring Boot
    已经为我们配置了 `JdbcTemplate`。这是一种相对较新且便捷的配置现代 Spring 应用程序的方式：只需使用 Spring Boot 的默认设置，仅在需求强制要求时才进行更改。


    当我们通过构造函数注入 `JdbcTemplate` 时，需要初始化数据库表。`@PostConstruct` 注解确保 `initDbTable()` 方法会在应用程序初始化阶段结束时被调用，此时所有
    Spring Bean 都已创建并正确注入彼此。因此，这是初始化数据库表的便捷位置。在本例中，我们删除旧表并重新创建一个新表。


    显然，这不是我们在生产环境中会做的事情，但为 Spring 应用程序初始化数据库模式并不在本书的讨论范围内。因此，为了解释说明，我们暂且接受这种奇怪的初始化方式。


    用于存储数据的数据库表将命名为 `TEXT_TABLE`，并且只包含一个文本列 `TEXT`。同样，我们保持简单，因为我们关注的是数据库事务及其与 JMS
    事务或确认模式的协作。


    `persistText()` 方法将给定的文本存储到数据库中，而 `containsText()` 方法则检查给定文本是否存在于数据库中。清单 6-12
    展示了属于 `SimpleRepository` 的服务层 Bean。


    ***清单 6-12***. Spring JMS 示例中使用的服务类 (0600-jms-tx-common)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class SimpleService {

      private final SimpleRepository simpleRepository;


    @Autowired

      public SimpleService(SimpleRepository simpleRepository) {

        super();

        this.simpleRepository = simpleRepository;

      }


    public void processText(String text) {

        log.info("Process Message: {}", text);

        simpleRepository.persistText(text);

      }


    public boolean isProcessed(String text) {

        return simpleRepository.containsText(text);

      }

    }

    ```


    `SimpleService` 使用 Lombok 的 `@Slf4j` 注解进行日志记录。它会为我们生成日志常量 `log` 条目。`@Service`
    注解使该类能够被组件扫描为 Spring Bean，并强调其位于应用程序的服务层。该类通过构造函数注入了一个依赖项，即用于数据库访问的 `SimpleRepository`。


    这个服务 Bean 只提供了两个方法：`processText()` 和 `isProcessed()`，它们分别由 `simpleRepository.persistText()`
    和 `simpleRepository.containsText()` 使用，因为在示例中，处理消息会将其持久化到我们的数据库存储中。


    本章所有 Spring JMS 示例共用的最后一个类是 清单 6-13 中的 JMS 发送者。


    ***清单 6-13***. JMS 发送者 (0600-jms-tx-common)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import javax.annotation.PostConstruct;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class SimpleMessageSender {

      private static final String SIMPLE_MESSAGE = "simple message";

      private JmsTemplate jmsTemplate;


    @Autowired

      public SimpleMessageSender(JmsTemplate jmsTemplate) {

        super();

        this.jmsTemplate = jmsTemplate;

      }


    @PostConstruct

      public void send() {

        log.info("Sending message: {}", SIMPLE_MESSAGE);

        jmsTemplate.convertAndSend("ExpiryQueue", SIMPLE_MESSAGE);

      }

    }

    ```


    这个 JMS 发送者类与我们在前一章中看到的类似。它只是通过构造函数注入了一个 `jmsTemplate` 实例。


    消息通过 `send()` 方法发送到 `messageQueue` 目的地。与第 5 章 Spring JMS 示例的不同之处在于使用了 `@PostConstruct`
    注解。之前，我们使用调度来发送消息，因为这在上一章中便于描述同步接收中的延迟。


    本章重点介绍 JMS 消息传递的可靠性。`@PostConstruct` 更适合在 Spring 上下文初始化后发送单条消息，这更有利于突出确认和事务特性。


    AUTO_ACKNOWLEDGE 模式


    我们已经提到，确保 JMS 消息可靠传递的机制之一是 JMS 确认模式。第一种模式称为 `AUTO_ACKNOWLEDGE`，在这种模式下，JMS 消息操作的接收会立即反映在
    JMS 目的地中，并且更改会立即对针对相关 JMS 目的地打开的其他 JMS 会话可见。这是默认的 JMS 确认模式，因此如果我们没有另行配置 JMS 资源，就会使用它。


    因此，在成功接收后，消息会*立即被标记为已送达*，并从 JMS 目的地中丢弃。当 `MessageConsumer.receive()` 调用返回后，或 `MessageListener.onMessage()`
    调用成功完成后，接收即被视为成功。对于三阶段 JMS 消息接收（接收/处理/确认），唯一的例外是通过 JMS 2.0 `JMSContext` 在 `AUTO_ACKNOWLEDGE`
    模式下进行的同步接收。这种接收将接收和确认合并为一个步骤，随后在客户端进行处理。


    但是，在使用 Spring 时，当我们使用 JMS 监听器时，有一个重要的陷阱需要留意。为了回顾 Spring 中 JMS 消息监听的构造，有两种类型的监听器容器：`SimpleJmsListenerContainerFactory`
    和 `DefaultJmsListenerContainerFactory`。

