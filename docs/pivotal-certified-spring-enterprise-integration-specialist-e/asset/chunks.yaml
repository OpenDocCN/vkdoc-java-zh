    Tasklet 步骤


    面向块的批处理并非企业应用场景中唯一需要涵盖的步骤类型。有时我们需要在更大的流程中执行单个操作。例如，我们可能需要在作业结束时发送通知，或执行单个存储过程调用。SB
    提供了 `Tasklet` 接口。它只有一个方法 `execute`，我们可以在其中放置自定义逻辑。该实例随后可被封装到 `TaskletStep` 类中，并作为
    SB 流程中的 `Step` 使用。


    Tasklet 示例的通用类


    本章中的多个示例使用简单的 `Tasklet` 步骤来突出展示控制作业执行流程的 Spring Batch 特性。清单 9-17 展示了本章中经常使用的这个类。


    ***清单 9-17***. 简单可执行点 (0900-batch-common)


    ```

    package net.lkrnac.book.eiws.chapter09.step;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class SimpleExecutablePoint {

      public void execute(String message) {

        log.info(message);

      }

    }

    ```


    这个简单的 Spring Bean 使用 Lombok 将给定的消息记录到 `execute()` 方法中。


    ![Image](img/sq.jpg) **注意**  `SimpleExecutablePoint` 在实际应用中并无用处，但对于本章的示例来说非常方便，因为我们可以模拟这个
    Bean 并验证 SB 配置是否按预期工作。本书示例附带的测试可以在 GitHub 仓库中找到 (`https://github.com/lkrnac/book-eiws-code-samples`)。


    在我们的示例中，`Tasklet` 类型批处理流程的领域是泡茶。当我们想要泡茶时，需要执行几个步骤才能得到美味的结果。例如，我们可能需要烧水、将茶叶加入茶杯、以及将水加入茶杯。清单
    9-18 展示了模拟烧水步骤的类。


    ***清单 9-18***. 模拟烧水步骤的类 (0900-batch-common)


    ```

    package net.lkrnac.book.eiws.chapter09.step.tea;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.StepContribution;

    import org.springframework.batch.core.scope.context.ChunkContext;

    import org.springframework.batch.core.step.tasklet.Tasklet;

    import org.springframework.batch.repeat.RepeatStatus;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class BoilWater implements Tasklet {

      private SimpleExecutablePoint simpleExecutableStep;


    @Autowired

      public BoilWater(SimpleExecutablePoint simpleExecutableStep) {

        super();

        this.simpleExecutableStep = simpleExecutableStep;

      }


    @Override

      public RepeatStatus execute(StepContribution contribution,

          ChunkContext chunkContext) throws Exception {

        simpleExecutableStep.execute("Boil Water");

        return RepeatStatus.FINISHED;

      }

    }

    ```


    这个简单的 Spring 组件自动装配了 `SimpleExecutablePoint`。在 execute 方法中，我们调用 `simpleExecutableStep.execute()`
    来模拟烧水步骤。SB 将 `StepContribution` 和 `ChunkContext` 实例注入此方法，并期望返回 `RepeatStatus`
    类型的值。这些类型的使用将在后续章节中解释。对于本例，我们只需要知道 `RepeatStatus.FINISHED` 向数据库指示 `Step` 已成功完成。


    我们不会列出 `AddTea` 和 `AddWater` 类，因为它们与 `BoilWater` 类似；我们只是用不同的文本消息来模拟泡茶步骤。


