    \n成功行为是每个开发人员在实现带有数据库支持的 JMS 时所追求的目标。但现实世界并不总是对我们良好的意图如此友好。使用`AUTO_ACKNOWLEDGE`模式时，如果我们使用与成功场景中相同的主类和发送者类以及`DefaultJmsListenerContainerFactory`，消息很容易丢失。此监听器容器工厂使用的长轮询机制强制其在接收后立即确认消息。"
  raw: '`SimpleJmsListenerContainerFactory` , introduced in Spring 4.1, is used for
    creating the `SimpleMessageListenerContainer` bean. This listener container type
    uses standard JMS asynchronous features under the hood and registers a direct
    JMS listener against the JMS destination. Therefore, `AUTO_ACKNOWLEDGE` mode has
    behavior as defined by the JMS standard: the message is acknowledged/discarded
    from the destination *after a successful call of the listener method*.


    On the other hand, `DefaultJmsListenerContainerFactory` is a factory class for
    `DefaultMessageListenerContainer`. It also was introduced in Spring 4.1\. For
    reception of JMS messages, it uses a long-polling mechanism. Under the hood, Spring
    uses synchronous reception with a time-out in an infinite loop. When time-out
    occurs, Spring immediately performs another `MessageConsumer.receive()` call.
    This emulates asynchronous JMS message processing. In fact, this reception can
    be better performing; therefore, this type of listener container is used by default
    by Spring and Spring Boot. But the downside of this approach is *immediate acknowledgement
    of the JMS message before execution enters the listener method*. Therefore, `DefaultJmsListenerContainerFactory`
    is better suited for use with transactions (which will be explained later).


    Interestingly, with these two listener containers, we get totally opposite `AUTO_ACKNOWLEDGE`
    behavior when listening to JMS messages.


    With a successful send, the message is *immediately available for reception*.
    Sending of the message is considered successful after completion of the `MessageProducer.send()`
    call.


    The JMS client implementation acknowledges each message one by one under the hood.
    So it is automatic that an additional action is performed against the JMS destination.
    Therefore, this acknowledge mode *can be slower than other modes*, because they
    typically perform acknowledge calls less often.


    As this is the default acknowledge mode, it was used in all the examples in the
    previous chapter describing nontransacted features of Spring JMS. The following
    example is similar to examples in [Chapter 5](#9781484207949_Ch05.xhtml), but
    in this case we will also be storing messages in the H2 database. [Listing 6-14](#9781484207949_Ch06.xhtml#FPar15)
    shows the main class of this example.


    [***Listing 6-14***](#9781484207949_Ch06.xhtml#_FPar15). Main Class (0603-auto-acknowledge-listener-success)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;


    @SpringBootApplication

    public class JmsApplication {

      public static void main(String[] args) throws Exception {

        SpringApplication.run(JmsApplication.class, args);

      }

    }

    ```


    The `@SpringBootApplication` annotation is a convenient shortcut for the group
    of `@Configuration`, `@ComponentScan`, and `@EnableAutoConfiguration` annotations.
    `@Configuration` marks this class as a Spring configuration.


    `@ComponentScan` performs scans of the current package and its subpackages for
    Spring beans. Because the `0600-jms-tx-common` project is a dependency of this
    example project (`0603-auto-acknowledge-listener-success`), this scan will also
    load and register `SimpleRepository` and `SimpleService` beans from [Listings
    6-12](#9781484207949_Ch06.xhtml#FPar13) and [6-13](#9781484207949_Ch06.xhtml#FPar14)
    into our context.


    `@EnableAutoConfiguration` will make Spring Boot scan the classpath for known
    dependencies and apply a common default opinionated configuration based on libraries
    present on the classpath. In this case, (example project `0603-auto-acknowledge-listener-success`),
    we have the H2 database engine on the classpath, so Spring Boot automatically
    configures the `DataSource` bean as a connection gateway to the H2 DB engine and
    `JdbcTemplate` bean for performing JDBC operations against it. This `JdbcTemplate`
    bean is then injected into `SimpleRepository`.


    The second support initialized by `@EnableAutoConfiguration` is JMS. Because project
    `0603-auto-acknowledge-listener-success` contains the HornetQ broker dependency
    on the classpath, Spring Boot automatically initializes the embedded instance
    of this JMS provider and configured access to it via the `JmsTemplate` bean. We
    just need to inject `JmsTemplate` in our beans and use it.


    *This configuration approach will be used by all Spring examples in this chapter*.
    In the main method, we just call `SpringApplication.run()` to execute this Spring
    Boot configuration as a Java application.


    Success Scenario


    [Listing 6-15](#9781484207949_Ch06.xhtml#FPar16) shows the JMS listener for this
    example.


    [***Listing 6-15***](#9781484207949_Ch06.xhtml#_FPar16). JMS Listener of AUTO_ACKNOWLEDGE
    Example (0603-auto-acknowledge-listener-success)


    ```

    package net.lkrnac.book.eiws.chapter06.text;


    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jms.annotation.JmsListener;

    import org.springframework.stereotype.Component;


    @Component

    public class SimpleMessageListener {

      private SimpleService simpleService;


    @Autowired

      public SimpleMessageListener(SimpleService simpleService) {

        super();

        this.simpleService = simpleService;

      }


    @JmsListener(destination = "ExpiryQueue")

      public void readMessage(String message) {

        simpleService.processText(message);

      }

    }

    ```


    This class should be familiar, because all of the constructs were already described
    in the previous chapter. We cover it here because this implementation ensures
    the correct reception of the message. It is important to remember that Spring
    Boot creates `DefaultJmsListenerContainerFactory` for this listener automatically;
    therefore, when we are about to call `simpleService.processText()`, the JMS message
    is already being acknowledged and discarded from the JMS destination.


    To explore this JMS reception scenario, we use the sequence diagram in [Figure
    6-1](#9781484207949_Ch06.xhtml#Fig1).


    ![9781484207949_Fig06-01.jpg](images/9781484207949_Fig06-01.jpg)


    [Figure 6-1](#9781484207949_Ch06.xhtml#_Fig1). Sequence diagram of `AUTO_ACKNOWLEDGE`
    scenario with DefaultJmsListenerContainerFactory ( file sequence.uml in folder
    uml-Diagrams of example project 0603-auto-acknowledge-listener-success)


    This sequence diagram shows that the acknowledgement is done before the `SimpleMessageListener.readMessage()`
    method is called, because `DefaultJmsListenerContainerFactory` is using long polling.
    With this mechanism, the message is acknowledged before Spring calls the listener
    method.


    After entering the listener method code, the success scenario flows through `SimpleService`,
    `SimpleRepository` and stores the message in our database table, `TEXT_TABLE`.


    ![Image](images/sq.jpg) **Note**  All the sequence diagrams in this chapter were
    created by an excellent open source project called PlantUML (plantuml.com). It
    provides an easy-to-grasp domain-specific language (DSL) for creating various
    UML diagrams. It’s a different approach from classical UML editors (UMLet, Enterprise
    Architect, Visio), which enable higher productivity, because we developers are
    more efficient at writing code than dragging, resizing, and connecting rectangles
    and arrows. It also has good integration with most IDEs and editors as well as
    different programming tools (see `plantuml.com/running.html` for more info).


    Lost Message with Listener


    Success behavior is what each developer strives for when implementing JMS with
    database support. But the real world isn’t always so friendly to our good intentions.
    With `AUTO_ACKNOWLEDGE` mode, messages can easily get lost if we use `DefaultJmsListenerContainerFactory`
    with the same main and sender class as we showed for the success scenario. The
    long polling mechanism this listener container factory uses forces it to acknowledge
    the message right after the reception.'
