    \ Error Handling\n\nThe Spring Web Services project enables easy translation of\
    \ errors penetrated from web service logic. Similar to interception support, error\
    \ handling is divided into the server and client side also.\n\n### Server-Side\
    \ Error Handling\n\nLax error handling is often a source of serious security vulnerabilities\
    \ that expose implementation details of a web service. When an exception bubbles\
    \ up from the web service logic to the servlet container, it commonly sends a\
    \ failed message with information about the web server and stack trace as a response\
