    Router


    A *router* is an SI component that can fork your message flow. In other words,
    it represents a decision component within SI. It applies routing logic and decides
    into which channel or various channels the message should be passed further. Notice
    that it should be OK to pass the same instance of the message to various channels,
    as the message is immutable. Routing logic can be defined in numerous ways, based
    on the following:'
  trans: '

