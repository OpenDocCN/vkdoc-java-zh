    But such limited scheduling often isn’t suitable for enterprise applications.
    Fortunately, a popular library called Quartz Scheduler is commonly used for complex
    scheduling. It also provides enterprise features such as distributed transaction
    propagation, job persistence, and clustering features. But most notable are these
    scheduling features:


    *   Indicate a certain time of the day (with millisecond precision)

    *   Indicate certain days of the week/month/year

    *   Exclude days specified by a given calendar (useful for excluding public holidays)

    *   Specify an explicit number of executions

    *   Repeat until date/time


    ## Multithreading with Spring


    You might be wondering where Spring comes into this game. Spring is a well-known
    provider of fine-grained abstractions on top of common Java technologies. It removes
    a lot of boilerplate code by providing three main abstractions used for executing
    and scheduling tasks:


    *   `TaskExecutor`

    *   `Trigger`

    *   `TaskScheduler`


    ### `org.springframework.core.task.TaskExecutor`


    The purpose of this interface is to provide an abstraction for executing asynchronous
    tasks. It extends the `java.util.concurrent.Executor` interface, but doesn’t introduce
    a changed API contract in comparison to pure Java SE abstractions. See [Listing
    1-15](#9781484207949_Ch01.xhtml#FPar18).


    [***Listing 1-15***](#9781484207949_Ch01.xhtml#_FPar18). `TaskExecutor` Interface
    Signature


    ```

    public interface TaskExecutor extends Executor {

            @Override

            void execute(Runnable task);

    }

    ```


    `TaskExecutor` abstracts away the Java SE 5 `Executor` interface so it can be
    used as a superinterface for non-Java SE 5 thread pools. `TaskExecutor` is an
    umbrella for these thread executors:'
