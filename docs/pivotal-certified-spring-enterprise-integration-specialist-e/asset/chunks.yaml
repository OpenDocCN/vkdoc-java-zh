    ***清单 6-2***. 带事务的 JMS 1.1 发送者示例 (0601-java-jms11-sync-tx)


    ```

    package net.lkrnac.book.eiws.chapter06.javasynctx;


    import javax.jms.Connection;

    import javax.jms.JMSException;

    import javax.jms.MessageProducer;

    import javax.jms.Queue;

    import javax.jms.Session;

    import javax.jms.TextMessage;


    public class SimpleMessageSender {

      private MessageProducer messageProducer;

      private Session session;


    public void init(Connection connection, Queue queue) throws JMSException {

        session = connection.createSession(true, Session.SESSION_TRANSACTED);

        messageProducer = session.createProducer(queue);

      }


    public void sendMessages(String message1, String message2)

          throws JMSException {

        try {

          TextMessage textMessage1 = session.createTextMessage(message1);

          messageProducer.send(textMessage1);

          TextMessage textMessage2 = session.createTextMessage(message2);

          messageProducer.send(textMessage2);

          session.commit();

        } catch (Throwable throwable) {

          session.rollback();

        }

      }

    }

    ```


    此类有两个类型为 `javax.jmsSession` 和 `javax.jms.MessageProducer` 的属性，它们在 `init()` 方法中根据给定的参数
    `javax.jms.Connection` 和 `javax.jms.Queue` 进行初始化。请注意，`session` 对象是通过调用 `connection.createSession()`
    从 `connection` 实例创建的。此方法中的第一个参数表示我们正在开启事务支持，第二个参数表示我们将使用 `SESSION_TRANSACTED`
    确认模式。


    此例中的 `sendMessage` 方法接收两个 `String` 参数，这些参数应发送到 JMS 服务器。我们从 `session` 创建两个 `TextMessage`
    类型，并通过 `messageProducer.send()` 调用发送它们。在我们提交之前，这两个消息对于针对 `queue` 打开的其他 JMS 会话是不可见的。只有调用
    `session.commit()` 才会提交 JMS 事务，并使其可供针对 JMS 目标打开的其他会话处理。


    发送消息和提交由 `try-catch` 块支持。如果在发送或提交阶段发生错误，则通过调用 `session.rollback()` 回滚事务。


    清单 6-3 展示了读取器类的实现。


