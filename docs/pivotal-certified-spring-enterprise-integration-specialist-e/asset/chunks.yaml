    \ generated on the server counterpart in [Listing 3-8](#9781484207949_Ch03.xhtml#FPar12).\
    \ Similar to server model generation, we take advantage of type-safety Java features\
    \ on the client as well. It is obvious that the most important part of the client/server\
    \ interface is an XSD/WSDL contract from which models on both sides are generated.\n\
    \nThe central class for client Spring Web Services support is `WebServiceTemplate`.\
    \ It covers a lot of responsibilities:\n\n*   Sending and receiving messages\n\
    *   Calling marshaller/unmarshaller for converting messages\n*   Can be configured\
    \ to intercept messages\n*   Can be configured to translate errors generated on\
    \ the server into client-side runtime exceptions\n\nApart from SOAP, `WebServiceTemplate`\
    \ can work also with a Plain Old XML payload and can operate on top of the same\
    \ transport protocols as the server: HTTP, e-mail, JMS, and XMPP. Similar to server\
    \ transport Spring Web Services support, the client counterpart also provides\
    \ a set of bean wrappers for each one. The central interface is `WebServiceMessageSender`,\
    \ which defines the message sender implementation for each protocol:\n\n*   HTTP\n\
    \    *   Default configuration for HTTP protocol—`HttpUrlConnectionMessageSender`\n\
    \    *   Apache HttpComponents— `HttpComponentsMessageSender`\n*   JMS—`JmsMessage``Sender`\
    \ and JMS message factory (for example, `ActiveMQConnectionFactory`)\n*   E-mail—\
    \ `MailMessageSender`\n*   XMPP— `XmppMessageSender` and `XmppConnectionFactoryBean`\n\
    \nThese can be created directly via a Java constructor and has three mandatory\
    \ fields: `defaultUri`, `marshaller`, and `unmarshaller`.\n\nIn our examples,\
    \ we will be focusing on HTTP, which is the most common protocol for web services.\
    \ First, the client Spring context configuration example in [Listing 3-21](#9781484207949_Ch03.xhtml#FPar26)\
    \ shows an XML configuration.\n\n[***Listing 3-21***](#9781484207949_Ch03.xhtml#_FPar26).\
    \ XML Configuration of Spring Web Services Client Configuration (ws-client-config.xml\
    \ in Example Project 0301-ws-xmlconfig-client)\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"http://www.springframework.org/schema/context\"\
    \n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
        http://www.springframework.org/schema/context\n    http://www.springframework.org/schema/context/spring-context.xsd\"\
    >\n\n<context:component-scan\n    base-package=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.client\"\
    />\n\n<bean id=\"marshaller\" class=\"org.springframework.oxm.jaxb.Jaxb2Marshaller\"\
    >\n    <property name=\"contextPath\"\n      value=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.model\"\
    />\n  </bean>\n\n<bean id=\"webServiceTemplate\"\n      class=\"org.springframework.ws.client.core.WebServiceTemplate\"\
    >\n    <property name=\"marshaller\" ref=\"marshaller\"/>\n    <property name=\"\
    unmarshaller\" ref=\"marshaller\"/>\n    <property name=\"defaultUri\"\n      value=\"\
    http://localhost:10301/0301-ws-xmlconfig-service\"/>\n  </bean>\n</beans>\n```"
  trans: "\n这一新机制的关键类是 `ServletRegistrationBean`，它实际上是 Servlet 配置的包装器。因此，当它被注册到 Spring\
    \ 容器中时，Spring 会将包装后的 Servlet 注册到 Servlet 容器中。该 API 的效果是，开发者感觉 Servlet 配置是被注册到\
    \ Spring 上下文中，而不是反过来。从 API 的角度来看，它颠覆了 Servlet 容器与 Spring 上下文之间的集成机制。在清单 3-18 中，`MessageDispatcherServlet`\
    \ 是我们期望的 Servlet 实现。这个概念的一个重要方面是，我们需要配置 `applicationContext` 属性。在这种情况下，我们使用由 Spring\
    \ 注入的应用程序上下文，这实际上就是注册该 Bean 的上下文。\n\n当我们颠覆了 Spring/Servlet 配置后，可以将此 Bean 与提供 Web\
    \ 服务所需的其他 Bean 一起注册。清单 3-18 展示了最简洁的 Spring Web Services 配置，该配置使用了静态 WSDL 暴露（如前所述）。\n\
    \n**Web 服务客户端**\n\n前面几节的重点是暴露 Spring Web Services。Spring 也支持消费 Web 服务。这种客户端开发方法同样侧重于契约优先。同样，无需手动创建客户端\
    \ Java 模型。\n\nSpring 在客户端首选的 XML 编组器是 JAXB 2，与服务器端相同。由于我们的示例基于 Maven 构建系统，清单 3-19\
    \ 展示了如何从位于远程服务器上的 WSDL 生成 JAXB 2 模型类。\n\n***清单 3-19***. 从远程 WSDL 生成客户端模型（示例项目\
    \ 0301-ws-xmlconfig-client 中的 pom.xml 文件）\n\n```\n<plugin>\n  <groupId>org.jvnet.jaxb2.maven2</groupId>\n\
      <artifactId>maven-jaxb2-plugin</artifactId>\n  <version>0.12.3</version>\n  <executions>\n\
        <execution>\n      <goals>\n        <goal>generate</goal>\n      </goals>\n\
        </execution>\n  </executions>\n  <configuration>\n    <generatePackage>net.lkrnac.book.eiws.chapter03.ws.xmlconfig.model</generatePackage>\n\
        <schemas>\n      <schema>\n        <url>http://localhost:10301/0301-ws-xmlconfig-service/wsdl/userDetails.wsdl</url>\n\
          </schema>\n    </schemas>\n  </configuration>\n</plugin>\n```\n\n`maven-jax2b-plugin`\
    \ 被挂接到 Maven 的 `generate` 目标上，该目标是默认生命周期阶段的一部分。生成类的目标包由插件配置中的 `generatePackage`\
    \ 元素指定。此生成过程依赖于可在 `http://localhost:10301/0301-ws-xmlconfig-service/wsdl/userDetails.wsdl`\
    \ 访问的模式。因此，当目标 Web 服务已经上线时，这会非常方便。\n\n但是，当我们与客户端消费者同时开发 Web 服务时，WSDL 不一定在线。当我们希望将构建作为持续集成/交付/部署管道的一部分进行自动化时，不存在的远程模式会导致问题。因此，也可以选择使用本地\
    \ WSDL 文件，如清单 3-20 所示。\n\n***清单 3-20***. 从本地 WSDL 文件生成客户端模型\n\n```\n<plugin>\n\
      <groupId>org.jvnet.jaxb2.maven2</groupId>\n  <artifactId>maven-jaxb2-plugin</artifactId>\n\
      <version>0.12.3</version>\n  <executions>\n    <execution>\n      <goals>\n\
            <goal>generate</goal>\n      </goals>\n    </execution>\n  </executions>\n\
      <configuration>\n    <generatePackage>net.lkrnac.book.eiws.chapter03.ws.xmlconfig.model</generatePackage>\n\
        <schemas>\n      <schema>\n        <fileset>\n          <directory>${basedir}/src/main/schemas</directory>\n\
              <includes>\n            <include>userDetails.wsdl</include>\n          </includes>\n\
            </fileset>\n      </schema>\n    </schemas>\n  </configuration>\n</plugin>\n\
    ```\n\n模型类被生成到包 `net.lkrnac.book.eiws.chapter``03``.ws.xmlconfig.model` 中。它们基于位于文件\
    \ `userDetails.wsdl` 和目录 `src/main/schemas` 中的 WSDL 模式生成。客户端模型看起来就像清单 3-8 中服务器端生成的类一样。与服务器端模型生成类似，我们在客户端也利用了类型安全的\
    \ Java 特性。很明显，客户端/服务器接口最重要的部分是一个 XSD/WSDL 契约，双方模型都基于此契约生成。\n\nSpring Web Services\
    \ 客户端支持的核心类是 `WebServiceTemplate`。它涵盖了许多职责：\n\n*   发送和接收消息\n*   调用编组器/解组器来转换消息\n\
    *   可配置为拦截消息\n*   可配置为将服务器端生成的错误转换为客户端运行时异常\n\n除了 SOAP，`WebServiceTemplate` 还可以处理纯旧\
    \ XML 负载，并且可以在与服务器相同的传输协议上运行：HTTP、电子邮件、JMS 和 XMPP。与服务器端传输 Spring Web Services\
    \ 支持类似，客户端也为每种协议提供了一组 Bean 包装器。核心接口是 `WebServiceMessageSender`，它定义了每种协议的消息发送器实现：\n\
    \n*   HTTP\n    *   HTTP 协议的默认配置——`HttpUrlConnectionMessageSender`\n    *   Apache\
    \ HttpComponents——`HttpComponentsMessageSender`\n*   JMS——`JmsMessage``Sender`\
    \ 和 JMS 消息工厂（例如，`ActiveMQConnectionFactory`）\n*   电子邮件——`MailMessageSender`\n\
    *   XMPP——`XmppMessageSender` 和 `XmppConnectionFactoryBean`\n\n这些可以直接通过 Java 构造函数创建，并且有三个必填字段：`defaultUri`、`marshaller`\
    \ 和 `unmarshaller`。\n\n在我们的示例中，我们将重点放在 HTTP 上，这是 Web 服务最常用的协议。首先，清单 3-21 中的客户端\
    \ Spring 上下文配置示例展示了 XML 配置。\n\n***清单 3-21***. Spring Web Services 客户端配置的 XML 配置（示例项目\
    \ 0301-ws-xmlconfig-client 中的 ws-client-config.xml）\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:context=\"\
    http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
        http://www.springframework.org/schema/beans/spring-beans.xsd\n    http://www.springframework.org/schema/context\n\
        http://www.springframework.org/schema/context/spring-context.xsd\">\n\n<context:component-scan\n\
        base-package=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.client\"/>\n\n\
    <bean id=\"marshaller\" class=\"org.springframework.oxm.jaxb.Jaxb2Marshaller\"\
    >\n    <property name=\"contextPath\"\n      value=\"net.lkrnac.book.eiws.chapter03.ws.xmlconfig.model\"\
    />\n  </bean>\n\n<bean id=\"webServiceTemplate\"\n      class=\"org.springframework.ws.client.core.WebServiceTemplate\"\
    >\n    <property name=\"marshaller\" ref=\"marshaller\"/>\n    <property name=\"\
    unmarshaller\" ref=\"marshaller\"/>\n    <property name=\"defaultUri\"\n      value=\"\
    http://localhost:10301/0301-ws-xmlconfig-service\"/>\n  </bean>\n</beans>\n```\n"
- fmt: "Here we are using two Spring XML namespaces: `context` and `beans`. `Context`\
    \ is used for component scanning the bean, using `WebServiceTemplate` in the package\
    \ `net.lkrnac.book.eiws.chapter03.ws.xmlconfig.client`. Two beans are needed for\
    \ web service consumption. One of the beans is our famous `webServiceTemplate`.\
    \ It needs to have the `defaultUri` property specified, which is nothing other\
    \ than the address where the web service is hosted. Two other mandatory properties\
    \ of `WebServiceTemplate` are `marshaller` and `unmarshaller`. These are both\
    \ served by the `marshaller` bean. It is registered as a separate bean and used\
    \ for XML-to-Java POJOs conversion. We can observe from earlier POJOs generation\
    \ that JAXB 2 is our marshaller of choice (the implementation class is `Jaxb2Marshaller`).\n\
    \nNearly the same configuration written in Java is shown in [Listing 3-22](#9781484207949_Ch03.xhtml#FPar27).\
    \ The only differences are the web service URI and marshaller context path.\n\n\
    [***Listing 3-22***](#9781484207949_Ch03.xhtml#_FPar27). Java Configuration of\
    \ Spring Web Services Client Configuration (0302-ws-javaconfig-client)\n\n```\n\
    package net.lkrnac.book.eiws.chapter03.ws.javaconfig.client;\n\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.oxm.jaxb.Jaxb2Marshaller;\nimport org.springframework.ws.client.core.WebServiceTemplate;\n\
    \n@Configuration\n@ComponentScan\npublic class WsClientConfiguration {\n  @Bean\n\
    \  public Jaxb2Marshaller marshaller() {\n    Jaxb2Marshaller marshaller = new\
    \ Jaxb2Marshaller();\n    marshaller\n        .setContextPath(\"net.lkrnac.book.eiws.chapter03.ws.javaconfig.model\"\
    );\n    return marshaller;\n  }\n\n@Bean\n  public WebServiceTemplate webServiceTemplate(Jaxb2Marshaller\
    \ marshaller) {\n    WebServiceTemplate webServiceTemplate = new WebServiceTemplate();\n\
    \    webServiceTemplate.setMarshaller(marshaller);\n    webServiceTemplate.setUnmarshaller(marshaller);\n\
    \    webServiceTemplate\n        .setDefaultUri(\"http://localhost:10302/0302-ws-javaconfig-service\"\
    );\n    return webServiceTemplate;\n  }\n}\n```\n\nThis example is Spring’s default\
    \ client support for web services. `WebServiceTemplate` uses the `HttpUrlConnectionMessageSender`\
    \ bean under the hood. This bean is created automatically by Spring and uses the\
    \ standard Java SE HTTP client implementation from the `java.net` package. But\
    \ some advanced use cases can force you to use the Apache HttpComponents project\
    \ for client HTTP access. Additional features of Apache HttpComponents are as\
    \ follows:\n\n*   Client-side authentication\n*   HTTP state management\n*   HTTP\
