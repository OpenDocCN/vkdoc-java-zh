    `WebApplicationInitializer` is Spring’s interface used for servlet configuration.
    It is used as an abstraction on top of the Servlet 3 Java API (`javax.servlet.ServletContainerInitializer`).
    Spring scans the implementation of `WebApplicationInitializer` and bootstraps
    it in `SpringServletContainerInitializer` (Spring’s implementation of `javax.servlet.ServletContainerInitializer`).
    So `WebApplicationInitializer` can be used as a replacement for the `web.xml`
    configuration in Spring applications, or alongside the `web.xml` configuration.
    Such flexibility enables a smooth migration path from legacy XML configurations.


    The `WebApplicationInitializer.onStartup` method is invoked by Spring during the
    servlet container initialization phase. Spring injects the `javax.servlet.ServletContext`
    instance, which is designed for interfacing with the underlying servlet container.
    So we can register our servlets into it. First of all, we create a Spring root
    context and register our `ServerConfiguration`. Now two boilerplate lines follow
    in [Listing 2-17](#9781484207949_Ch02.xhtml#FPar19). The context needs to be refreshed
    after registering the configuration, and `ContextLoaderListener` needs to be registered
    also.


    Finally, we register a new instance of `HttpRequestHandlerServlet` with a name
    matching the service exporter bean’s name (`barExporter`) and map the servlet
    onto a URL (`/` in this case). You will probably be more familiar with the `web.xml`
    style of configuration, as shown in [Listing 2-18](#9781484207949_Ch02.xhtml#FPar20).
    It looks similar to `WebAppInitializer` in [Listing 2-17](#9781484207949_Ch02.xhtml#FPar19).


    [***Listing 2-18***](#9781484207949_Ch02.xhtml#_FPar20). HttpInvoker XML Servlet
    Description Example


