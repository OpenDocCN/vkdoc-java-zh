    \ = new Jaxb2Marshaller();\n    marshaller.setContextPath(\"net.lkrnac.book.eiws.chapter03.ws.error.model\"\
    );\n    return marshaller;\n  }\n\n  @Bean\n  public WebServiceTemplate webServiceTemplate(Jaxb2Marshaller\
