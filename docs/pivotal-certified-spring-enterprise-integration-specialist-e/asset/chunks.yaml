    in the same output as in [Listing 9-9](#9781484207949_Ch09_1.xhtml#FPar10).


    Execute XML Job from the Command Line


    When we use XML configuration, execution from the command line looks like [Listing
    9-38](#9781484207949_Ch09_1.xhtml#FPar41).


    [***Listing 9-38***](#9781484207949_Ch09_1.xhtml#_FPar41). Executing XML-Configured
    Job from Command Line (File runFromCli.sh in Example Project 0901-chunk-processing-generic-xml)


    ```

    java -Dloader.main=org.springframework.batch.core.launch.support.CommandLineJobRunner
    -jar target/0901-chunk-processing-generic-xml-0.0.2-SNAPSHOT.jar batch-config.xml
    simpleRecordsJob

    ```


    Instead of the main configuration class, we use the XML configuration file as
    a parameter for `CommandLineJobRunner`. The output after running this command
    again looks like [Listing 9-9](#9781484207949_Ch09_1.xhtml#FPar10).


    Execute Job with Parameters from the Command Line


    Of course, it is possible to pass parameters into `Job` executed from the command
    line. This example is Spring Boot based. We use our common tea `Tasklet`s with
    `AddTeaWithParameter` from the previous example in [Listing 9-31](#9781484207949_Ch09_1.xhtml#FPar34),
    so that `JobParameters` can be applied. [Listing 9-39](#9781484207949_Ch09_1.xhtml#FPar42)
    shows the batch configuration.'
