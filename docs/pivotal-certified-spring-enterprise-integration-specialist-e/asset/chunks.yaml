    This example shows an XML configuration of interceptors. Spring namespace registration,
    component scanning, and annotation declaration should already be familiar from
    earlier sections of this chapter.


    The new part of this example is an element of the `web-services` namespace: `<ws:interceptors>`.
    It registers interceptors for web services. Under this XML element, we can register
    a reference (using the `ref` element) or declare a new bean (using the `bean`
    element) of the global interceptor. Such an interceptor will be applied for all
    endpoints belonging to this Spring context. In this case, we used `Globalnterceptor`,
    which is a class just like `UserInterceptor` from [Listing 3-27](#9781484207949_Ch03.xhtml#FPar32).


    The nested element `payloadRoot` binds interceptor(s) to a concrete endpoint specified
    by `namespaceUri` and `localPart` parameters. This is handy when we need to have
    different interception logic for different endpoints. We would use the `soapAction`
    element instead of `payloadRoot` if we were using `SOAPAction` routing. In this
    case, we registered two interceptors for endpoints with the namespace `http://localhost:10301/0301-ws-xmlconfig-service`
    and the local part `UserRequest`. The first one is our custom `UserInterceptor`,
    and the second is `loggingInterceptor`, which is a bean of type `PayloadLoggingInterceptor`.
    Of course, we can use custom as well as built-in interceptor implementations within
    bean declarations or as bean references.


    Finally, we registered two more interceptors: one for logging SOAP envelopes,
    and one for validating requests against the XSD contract. The last three interceptors
    are implementations provided by the Spring Web Services project out of the box.
    We just need to register them accordingly. For validation schema interceptors,
    we need to specify the location of the schema.


    The Java configuration is shown in [Listing 3-28](#9781484207949_Ch03.xhtml#FPar33).


    [***Listing 3-28***](#9781484207949_Ch03.xhtml#_FPar33). Java Configuration of
    Server Interceptors (0305-ws-interceptor-service)


    ```

    package net.lkrnac.book.eiws.chapter03.ws.interceptor.server;


    import java.util.List;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;

    import org.springframework.boot.context.embedded.ServletRegistrationBean;

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.ComponentScan;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.io.ClassPathResource;

    import org.springframework.ws.config.annotation.EnableWs;

    import org.springframework.ws.config.annotation.WsConfigurerAdapter;

    import org.springframework.ws.server.EndpointInterceptor;

    import org.springframework.ws.server.endpoint.interceptor.PayloadLoggingInterceptor;

    import org.springframework.ws.soap.server.

    endpoint.interceptor.PayloadRootSmartSoapEndpointInterceptor;

    import org.springframework.ws.soap.server.endpoint.interceptor.PayloadValidatingInterceptor;

    import org.springframework.ws.soap.server.endpoint.interceptor.SoapEnvelopeLoggingInterceptor;

    import org.springframework.ws.transport.http.MessageDispatcherServlet;

    import org.springframework.ws.wsdl.wsdl11.SimpleWsdl11Definition;

    import org.springframework.xml.xsd.SimpleXsdSchema;


    @EnableWs

    @Configuration

    @ComponentScan

    @EnableAutoConfiguration

    public class ServerConfiguration extends WsConfigurerAdapter {

      public static final String NAMESPACE =

          "http://localhost:10305/0305-ws-interceptor-service";


    @Autowired

      private UserInterceptor userInterceptor;

      @Autowired

      private GlobalIntercetor globalInterceptor;


    @Bean

      public SimpleWsdl11Definition userDetails() {

        return new SimpleWsdl11Definition(new ClassPathResource(

            "userDetailsSchema.wsdl"));

      }


    @Bean

      public ServletRegistrationBean dispatcherServlet(

          ApplicationContext applicationContext) {

        MessageDispatcherServlet servlet = new MessageDispatcherServlet();

        servlet.setApplicationContext(applicationContext);

        servlet.setTransformWsdlLocations(true);

        return new ServletRegistrationBean(servlet, "/*");

      }


    @Override

      public void addInterceptors(List<EndpointInterceptor> interceptors) {

        interceptors.add(new PayloadRootSmartSoapEndpointInterceptor(

            userInterceptor, NAMESPACE, "UserRequest"));


    PayloadRootSmartSoapEndpointInterceptor smartLoggingInterceptor =

            new PayloadRootSmartSoapEndpointInterceptor(

                new PayloadLoggingInterceptor(), NAMESPACE, "UserRequest");

        interceptors.add(smartLoggingInterceptor);


    interceptors.add(globalInterceptor);

        interceptors.add(new SoapEnvelopeLoggingInterceptor());


    PayloadValidatingInterceptor validationInterceptor =

            new PayloadValidatingInterceptor();

        SimpleXsdSchema schema =

            new SimpleXsdSchema(new ClassPathResource("userDetailsSchema.xsd"));

        validationInterceptor.setXsdSchema(schema);

        validationInterceptor.setValidateRequest(true);

        validationInterceptor.setValidateResponse(true);

        interceptors.add(validationInterceptor);

      }

    }

    ```


    The `UserInterceptor` and `GlobalInterceptor` beans are component scanned and
    autowired into this configuration class. In the method `addInterceptors`, we are
    registering interceptors into an injected list. The first two interceptors are
    wrapped into `PayloadRootSmartSoapEndpointInterceptor`. This wrapper makes the
    given interceptor effective only for endpoints with the namespace `http://localhost:10305/0305-ws-interceptor-service`
    and the local part `UserRequest`. We registered our custom `UserInterceptor` and
    `PayloadLoggingInterceptor` this way.'
