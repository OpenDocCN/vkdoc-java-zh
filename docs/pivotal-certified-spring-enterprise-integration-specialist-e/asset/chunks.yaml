    这个 Spring Boot 主类使用 `@SpringBootApplication` 注解来启用 Spring Boot 对 Spring 应用程序的固定配置扫描。它会对当前包及其子包进行组件扫描，并扫描类路径依赖项以启用这些库提供的功能。在这种情况下，它为以下内容创建了必要的
    Spring 基础设施：


    *   Atomikos JTA 事务管理器

    *   嵌入式 HornetQ JMS 服务器和具有 XA 支持的 `JmsTemplate`

    *   H2 嵌入式数据库和具有 XA 支持的 `JdbcTemplate`


