    We use the Spring Boot project to easily host our application in an embedded Tomcat
    servlet container. This is a relatively new and convenient way to run Spring applications.
    The `@SpringBootApplication` annotation gathers various Spring annotations under
    one umbrella. It triggers component scanning in the package where the annotated
    class is declared and its subpackages (the equivalent of `@ComponentScan`). It
    also covers the `@EnableAutoConfiguration` Spring Boot annotation, which inspects
    the classpath for JAR dependencies and registers some sensible default beans .
    In this case, we are using the JAX-RS implementation, Jersey. Therefore, it starts
    the embedded Tomcat container. The class is extended from `SpringBootServlerInitializer`,
    which takes care of our servlet configuration. By default, it maps all endpoints
    to the root URL `/`. In the main method, we have the call `SpringApplication.run`
    with the Spring configuration class as a parameter. So the `RestJaxrsApplication`
    class is used as a Spring configuration and also the main class of our application.


    [Listing 4-10](#9781484207949_Ch04.xhtml#FPar17) covers the Spring Boot properties.
    These help us configure the embedded Tomcat container with port 10401 and initiate
    Spring’s JAX-RS integration and configure Jersey for hosting servlets.


    [***Listing 4-10***](#9781484207949_Ch04.xhtml#_FPar17). JAX-RS and Spring Boot
    Example Properties (File application.properties in Folder src/main/properties
    in Example Project 0401-rest-jax-rs-server)


    ```

    server.port=10401

    spring.jersey.type=servlet

    ```


