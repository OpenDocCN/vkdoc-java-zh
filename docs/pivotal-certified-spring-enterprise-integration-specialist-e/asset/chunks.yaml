    \ is a Lombok feature for enabling easy access to the SLF4J logger. Constructor\
    \ injection of the `SimpleRepository` instance enables use of the DAO bean instance.\n\
    \nNotice that we didn’t use the `@Transactional` annotation for any of these classes,\
    \ because we plan to also include the JMS data source in the global transaction\
