    \n[***Listing 5-9***](#9781484207949_Ch05.xhtml#_FPar10). Main Class of Synchronous\
    \ JMS 2.0 Example (0502-jms2-jndi)\n\n```\npackage net.lkrnac.book.eiws.chapter05.jms2jndi;\n\
