    [***Listing 9-60***](#9781484207949_Ch09_1.xhtml#_FPar64). ItemWriter Implementation
    Using Bean with JobScope (0915-batch-scopes-xml)


    ```

    package net.lkrnac.book.eiws.chapter09.write;

    import java.util.List;

    import net.lkrnac.book.eiws.chapter09.WrittenRecordsCounter;

    import org.springframework.batch.item.ItemWriter;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class StatefulRecordWriter implements ItemWriter<String> {

      private WriteRepository writeRepository;

      private WrittenRecordsCounter recordsCounter;


    @Autowired

      public StatefulRecordWriter(WriteRepository writeRepository,

          WrittenRecordsCounter recordsCounter) {

        super();

        this.writeRepository = writeRepository;

        this.recordsCounter = recordsCounter;

      }


    @Override

      @SuppressWarnings("unchecked")

      public void write(List<? extends String> items) throws Exception {

        writeRepository.writeRecords((List<String>) items);

        int previousRecordsCount = recordsCounter.getProcessedCount();

        recordsCounter.setProcessedCount(previousRecordsCount + items.size());

      }

    }

    ```


    This `ItemWriter` is autowired alongside our common `WriteRepository` and `WrittenRecordsCounter`.
    It is used to track the number of written records. If we set `WrittenRecordsCounter`
    in the XML configuration to have the `JobScope` bean, SB will create a new instance
    for each job and effectively reset the counter. [Listing 9-61](#9781484207949_Ch09_1.xhtml#FPar65)
    shows `Tasklet` using the `WrittenRecordsCounter` bean.


    [***Listing 9-61***](#9781484207949_Ch09_1.xhtml#_FPar65). Tasklet Using Bean
    with JobScope (0915-batch-scopes-xml)


    ```

    package net.lkrnac.book.eiws.chapter09.step.tea;

    import net.lkrnac.book.eiws.chapter09.WrittenRecordsCounter;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.StepContribution;

    import org.springframework.batch.core.scope.context.ChunkContext;

    import org.springframework.batch.core.step.tasklet.Tasklet;

    import org.springframework.batch.repeat.RepeatStatus;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class BoilWaterStateful implements Tasklet {

      private SimpleExecutablePoint simpleExecutableStep;

      private WrittenRecordsCounter recordsCounter;


    @Autowired

      public BoilWaterStateful(SimpleExecutablePoint simpleExecutableStep,

          WrittenRecordsCounter recordsCounter) {

        super();

        this.simpleExecutableStep = simpleExecutableStep;

        this.recordsCounter = recordsCounter;

      }


    @Override

      public RepeatStatus execute(StepContribution contribution,

          ChunkContext chunkContext) throws Exception {

        simpleExecutableStep.execute("After we processed "

            + recordsCounter.getProcessedCount() + " records, let’s have a tea");

        simpleExecutableStep.execute("Boil Water");

        return RepeatStatus.FINISHED;

      }

    }

    ```


    This `Tasklet` is similar to our common one for tea preparation, `BoilWater`.
    In this case, we also inject the `WrittenRecordsCounter` bean, so that we can
    output a specific message and highlight how the `JobScope` bean has transferred
    state between two `Step`s of the same `Job`. [Listing 9-62](#9781484207949_Ch09_1.xhtml#FPar66)
    shows the XML configuration of the SB beans.


    [***Listing 9-62***](#9781484207949_Ch09_1.xhtml#_FPar66). XML Configuration of
    SB Beans for Batch Scopes (File batch-beans-config.xml in Folder src/main/resource
    of Example Project 0915-batch-scopes-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <bean id="readCountRestricter" scope="step"

        class="net.lkrnac.book.eiws.chapter09.ReadCountRestricter">

        <constructor-arg name="countToProcess" value="#{jobParameters[recordCountToProcess]}"/>

      </bean>


    <bean id="writtenRecordsCounter" scope="job"

        class="net.lkrnac.book.eiws.chapter09.WrittenRecordsCounter"/>


    <bean class="org.springframework.batch.core.scope.StepScope">

        <property name="proxyTargetClass" value="true"/>

      </bean>


    <bean class="org.springframework.batch.core.scope.JobScope">

        <property name="proxyTargetClass" value="true"/>

      </bean>

    </beans>

    ```


    The `ReadCountRestricter` bean is configured with `step` scope. Its parameter
    is initiated via late binding from the job parameter `recordCountToProcess`. This
    late binding wouldn’t work with a singleton scope, for example, because in that
    case Spring most probably would create this bean during initialization of the
    Spring context, but `JobParameters` are not configured at that time.


    `WrittenRecordsCounter` uses the `job` scope. When we use XML configuration, we
    need to enable batch scopes by configuring them as beans with the `proxyTargetClass`
    enabled. If we didn’t configure these beans, Spring wouldn’t know about SB scopes
    at all.


    [Listing 9-63](#9781484207949_Ch09_1.xhtml#FPar67) shows the XML configuration
    of the SB flow.


