    \ = FaultCode.CLIENT)\npublic class CustomErrorException extends RuntimeException\
    \ {\n  private static final long serialVersionUID = 1L;\n\npublic CustomErrorException(String\
    \ message) {\n    super(message);\n  }\n}\n```\n\n```"
