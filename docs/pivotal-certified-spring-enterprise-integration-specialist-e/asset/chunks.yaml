    解析消息标头


    我们已经成功解释了在 SI 流程中通过编程方式创建带标头的消息。下一个特性是解析消息标头，它并非 SI 框架特有，但却是 SI 消息处理中一个有用的机制。值得强调的是，Spring
    框架的这一特性已在第 5 章中展示过。


    闲话少叙，我们直接切入正题，在代码清单 8-9 中展示一个解析消息标头的示例。我们将使用与前一个示例相同的结构，但暂时隐藏 SI 流程。别担心，我们很快就会讲到。


    ***代码清单 8-9***. 解析消息标头 (0802-parsing-headers)


    ```

    package net.lkrnac.book.eiws.chapter08.out;

    import java.util.Date;

    import java.util.Map;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.messaging.handler.annotation.Header;

    import org.springframework.messaging.handler.annotation.Headers;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class WriteServiceWithHeaders {

      private WriteRepository writeRepository;


    @Autowired

      public WriteServiceWithHeaders(WriteRepository writeRepository) {

        super();

        this.writeRepository = writeRepository;

      }


    public void write(String message, @Header("timestamp") long creationTime,

          @Headers Map<String, Object> headers) {

        log.info("Message received with payload: {}; Created: {}; Headers: {}",

            message, new Date(creationTime), headers);

        writeRepository.persist(message);

      }

    }

    ```


    这里，`@Service` 类通过构造函数注入了 `WriteRepository`，该类属于本章的公共类集合。我们关注的是 `write` 方法，该方法将消息有效载荷作为字符串参数
    `message` 接收。第二个参数使用 `@Header` 注解，该注解定义了对消息中 `timestamp` 标头的关注（基于注解属性），并将其注入到
    `creationTime` 变量中。如果参数名称与标头名称匹配，则注解属性不是必需的。最后一个参数通过 `@Headers` 注解将消息的所有 `headers`
    注入到一个映射中。这些注入的参数会被记录，随后调用 `writeRepository` 来持久化消息有效载荷。


    我们目前仍然隐藏了 SI 流程；后续示例将揭示 SI 的特性。本示例的主类与代码清单 8-7 中编程式消息创建示例的主类完全相同。`WriteServiceWithHeaders`
    类通过 `si-config.xml` 中定义的 SI 流程执行。当我们运行本示例的主类时，会得到类似于代码清单 8-10 的输出。


