- fmt: "`@Configuration`注解使`JmsConfiguration`成为一个Spring配置类。`@EnableJms`注解用于启用JMS特定的Spring注解，并创建一些JMS支持Bean。\n\
    \n在此类中，我们注册了一个类型为`ConnectionFactory`的Spring Bean。但我们没有像通常那样直接暴露ActiveMQ实例。相反，我们将`ActiveMQConnectionFactory`包装到`CachingConnectionFactory`中，并将其实例作为默认的`connectionFactory`\
    \ Bean暴露。因此，无论何处使用JMS `connectionFactory`，JMS资源都会被重用以提升性能。在此例中，缓存大小配置为存储10个`Session`对象。\n\
    \n## 使用JmsTemplate\n\n`JmsTemplate`是Spring JMS模块中最重要的类。其主要关注点是同步接收和发送JMS消息。为了对这些任务进行细粒度控制，`JmsTemplate`实例存储了各种配置选项。以下是一些最重要的选项：\n\
    \n*   `setSessionAcknowledgeMode`或`setSessionAcknowledgeModeName`：配置确认模式。可能的值如下：\n\
    \    *   `Session.AUTO_ACKNOWLEDGE`或`\"AUTO_ACKNOWLEDGE\"`\n    *   `Session.CLIENT_ACKNOWLEDGE`或`\"\
    CLIENT_ACKNOWLEDGE\"`\n    *   `Session.DUPS_OK_ACKNOWLEDGE`或`\"DUPS_OK_ACKNOWLEDGE\"\
    `\n*   `setSessionTransacted`：开启事务行为。开启后，会覆盖确认模式配置。\n*   `setConnecionFactory`：作为JMS客户端访问主入口类的必需连接工厂实例。\n\
    *   将使用的默认JMS `Destination`\n    *   `setDefaultDestination`：通过`Destination`/`Queue`/`Topic`实例设置目标。\n\
    \    *   `setDefaultDestinationName`：通过名称设置目标。\n*   `setReceiveTimeout`：更改此`JmsTemplate`实例的接收超时时间。它适用于JMS消息的同步接收。值以毫秒为单位，默认值为0，这意味着接收调用将永远等待。\n\
    *   `setPubSubDomain`：在发布/订阅和点对点通信之间切换。默认值为false，使用点对点模式。\n*   `setDestinationDesolver`：指定负责将JMS目标名称转换为`javax.jms.Destination`实例的类。默认情况下，它使用`DynamicDestinationResolver`。Spring还提供了`JndiDestinationResolver`。\n\
    *   `setMessageConverter`：将JMS消息的转换委托给一个单独的Bean。默认情况下，它使用`SimpleMessageConverter`。转换器将在本章后续部分进一步说明。\n\
    \n显然，所有这些配置存储在一个单一对象中，可能会引发关于此类对象/Bean是否可以在多线程环境中使用的问题。`JmsTemplate`类的一个重要方面是它是线程安全的：我们可以在不同线程之间共享和使用`JmsTemplate`实例。\n\
    \n当我们的实例配置完成后，我们可以使用它对JMS目标或会话执行操作。它涵盖了JMS消息处理的多种功能：\n\n*   用于*消息发送*的方法：\n   \
    \ *   `send`：将消息发送到默认或指定的目标\n    *   `convertAndSend`：首先使用`MessageConverter`转换消息，然后将其发送到默认或指定的目标\n\
    \    *   `sendAndReceive`：将消息发送到默认或指定的目标，并异步接收回复消息\n*   用于*同步消息接收*的方法——默认情况下，这些操作会阻塞调用线程且无超时：\n\
    \    *   `receive`：同步接收消息。\n    *   `receiveSelected`：使用给定的消息选择器同步接收消息。消息选择器用于根据其过滤表达式过滤消息。\n\
    \    *   `receiveAndConvert`：同步接收消息并通过`MessageConverter`进行转换。\n    *   `receiveSelectedAndConvert`：结合了应用的消息选择器和消息转换器。\n\
    *   用于*浏览消息*的方法，即在不从JMS目标中删除消息的情况下读取它们：\n    *   `browse`：用于浏览所有消息。\n    *   `browseSelected`：用于浏览选定的消息；选定的消息通过`BrowserCallback<T>`进行缩小范围。\n\
    *   用于对JMS会话执行*自定义操作*的方法：\n    *   `execute`：注册一个操作回调，其中将传递`Session`对象。在此回调中，我们可以对JMS\
    \ `Session`执行自定义操作。\n\n`JmsTemplate`的另一个重要特性是它将受检异常`javax.jms.JMSException`转换为非受检异常`org.springframework.jms.JmsException`。\n\
    \n释放JMS资源也很方便。当应用程序不再需要`Connection`和`Session`时，需要关闭它们。使用JMS API时，必须通过调用这两个JMS资源的`close`方法手动完成。但当我们使用`JmsTemplate`时，这种JMS资源的释放会在底层自动完成。\n\
    \n[清单5-21](#9781484207949_Ch05.xhtml#FPar24)展示了如何配置和注册`JmsTemplate`作为Spring Bean。\n\
    \n[***清单5-21***](#9781484207949_Ch05.xhtml#_FPar24). 配置JmsTemplate (0507-sync-jms-java-config)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport javax.jms.ConnectionFactory;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.jms.core.JmsTemplate;\n\n@Configuration\npublic class\
    \ JmsConfiguration {\n  @Bean\n  public JmsTemplate jmsTemplate(ConnectionFactory\
    \ connectionFactory) {\n    JmsTemplate jmsTemplate = new JmsTemplate(connectionFactory);\n\
    \    jmsTemplate.setReceiveTimeout(1000);\n    return jmsTemplate;\n  }\n}\n```\n\
    \n在这种情况下，我们将使用`JmsTemplate`发送消息和同步接收消息。因此，如果要避免读取JMS消息的线程可能被阻塞，通常配置`receiveTimeout`属性是个好主意。[清单5-22](#9781484207949_Ch05.xhtml#FPar25)展示了JMS消息发送实现可能的样子。\n\
    \n[***清单5-22***](#9781484207949_Ch05.xhtml#_FPar25). 发送JMS消息 (0507-sync-jms-java-config)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport lombok.extern.slf4j.Slf4j;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.core.JmsTemplate;\n\
    import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
    \n@Slf4j\n@Component\npublic class SimpleMessageSender {\n  private static final\
    \ String SIMPLE_MESSAGE = \"simple message\";\n  private JmsTemplate jmsTemplate;\n\
    \n@Autowired\n  public SimpleMessageSender(JmsTemplate jmsTemplate) {\n    super();\n\
    \    this.jmsTemplate = jmsTemplate;\n  }\n\n@Scheduled(fixedRate = 1000)\n  public\
    \ void send() {\n    log.info(\"Sending message: {}\", SIMPLE_MESSAGE);\n    this.jmsTemplate.convertAndSend(\"\
    queue/ExpiryQueue\", SIMPLE_MESSAGE);\n  }\n}\n```"
  raw: "The `@Configuration` annotation makes a Spring configuration class from `JmsConfiguration`.\
    \ The `@EnableJms` annotation is used to enable JMS-specific Spring annotations\
    \ and create some JMS supporting beans.\n\nIn this class, we register a Spring\
    \ bean of type `ConnectionFactory`. But we don’t expose the ActiveMQ instance\
    \ directly as usual. Instead, we wrap `ActiveMQConnectionFactory` into `CachingConnectionFactory`\
    \ and expose its instance as a default `connectionFactory` bean. So everywhere\
    \ JMS `connectionFactory` is used, JMS resources are reused to boost performance.\
    \ Cache size is configured in this case to store 10 `Session` objects.\n\nUsing\
    \ JmsTemplate\n\n`JmsTemplate` is the most important class of the Spring JMS module.\
    \ Its primary focus is on synchronous reception and sending JMS messages. For\
    \ fine-grained control over these tasks, the `JmsTemplate` instance stores various\
    \ configuration options. These are some of the most important:\n\n*   `setSessionAcknowledgeMode`\
    \ or `setSessionAcknowledgeModeName`: Configures acknowledge mode. Possible values\
    \ are as follows:\n    *   `Session.AUTO_ACKNOWLEDGE` or \"`AUTO_ACKNOWLEDGE\"\
    `\n    *   `Session.CLIENT_ACKNOWLEDGE` or \"`CLIENT_ACKNOWLEDGE\"`\n    *   `Session.DUPS_OK_ACKNOWLEDGE`\
    \ or `\"DUPS_OK_ACKNOWLEDGE\"`\n*   `setSessionTransacted`: Turns on transactional\
    \ behavior. When turned on, overrides acknowledge mode configuration.\n*   `setConnecionFactory`:\
    \ Mandatory connection factory instance as main entry class into JMS client access.\n\
    *   Default JMS `Destination` it will be used against\n    *   `setDefaultDestination`:\
    \ Sets the destination via the `Destination`/`Queue`/`Topic` instance.\n    *\
    \   `setDefaultDestinationName`: Sets the destination via the name.\n*   `setReceiveTimeout`:\
    \ Changes the receive time-out for this `JmsTemplate` instance. It applies for\
    \ synchronous reception of JMS messages. The value is in milliseconds, and the\
    \ default value is 0, which means that receive calls will be waiting forever.\n\
    *   `setPubSubDomain`: Switches between publish/subscribe and point-to-point communication.\
    \ The default is false, which uses point-to-point.\n*   `setDestinationDesolver`:\
    \ Specifies the class that will be responsible for translating JMS destination\
    \ names into `javax.jms.Destination` instances. By default, it uses `DynamicDestinationResolver`.\
    \ Spring also provides `JndiDestinationResolver`.\n*   `setMessageConverter`:\
    \ Delegates the conversion of JMS messages to a separate bean. By default, it\
    \ uses `SimpleMessageConverter`. Converters are further explained in later sections\
    \ of this chapter.\n\nObviously, all this configuration stored in single object\
    \ can raise questions about whether such an object/bean can be used in a multithreaded\
    \ environment. An important aspect of the `JmsTemplate` class is that it is thread-safe:\
    \ we can share and use the `JmsTemplate` instance across various threads.\n\n\
    When our instance is configured, we can use it to perform actions against the\
    \ JMS destination or session. It covers various features for JMS message handling:\n\
    \n*   Methods for *message sending*:\n    *   `send`: Sends the message to the\
    \ default or given destination\n    *   `convertAndSend`: Converts the message\
    \ with the use of `MessageConverter` first and sends it to the default or given\
    \ destination\n    *   `sendAndReceive`: Sends the message to the default or given\
    \ destination and receives a reply message asynchronously\n*   Methods for *synchronous*\
    \ *message reception*—by default, these operations are blocking a caller thread\
    \ without time-out:\n    *   `receive`: Receives the message synchronously.\n\
    \    *   `receiveSelected`: Receives the message synchronously with use of a given\
    \ message selector. Message selectors are used to filter messages based on their\
    \ filtering expression.\n    *   `receiveAndConvert`: Receives the message synchronously\
    \ and converts it via `MessageConverter`.\n    *   `receiveSelectedAndConvert`:\
    \ Combines the applied message selectors and message converter.\n*   Methods for\
    \ *browsing messages*, which means to read messages without discarding them from\
    \ the JMS destination:\n    *   `browse`: Used for browsing all messages.\n  \
    \  *   `browseSelected`: Used for browsing selected messages; selected messages\
    \ are narrowed down via `BrowserCallback<T>`.\n*   Methods for executing *custom\
    \ actions* against the JMS session:\n    *   `execute`: Registers the action callback\
    \ where the `Session` object will be passed. In this callback, we can perform\
    \ custom actions against JMS `Session`.\n\nAnother important feature of `JmsTemplate`\
    \ is that it translates the checked `javax.jmsJMSException` into the unchecked\
    \ exception `org.springframework.jms.JmsException`.\n\nReleasing JMS resources\
    \ is also convenient. `Connection` and `Session` need to be closed when they are\
    \ no longer needed by the application. With the JMS API, this has to be done manually\
    \ by calling the `close` method of both JMS resources. But when we use `JmsTemplate`,\
    \ this releasing of JMS resources is done automatically under the hood.\n\n[Listing\
    \ 5-21](#9781484207949_Ch05.xhtml#FPar24) shows how to configure and register\
    \ `JmsTemplate` as a Spring bean.\n\n[***Listing 5-21***](#9781484207949_Ch05.xhtml#_FPar24).\
    \ Configuring JmsTemplate (0507-sync-jms-java-config)\n\n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\
    \nimport javax.jms.ConnectionFactory;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.core.JmsTemplate;\n\
    \n@Configuration\npublic class JmsConfiguration {\n  @Bean\n  public JmsTemplate\
    \ jmsTemplate(ConnectionFactory connectionFactory) {\n    JmsTemplate jmsTemplate\
    \ = new JmsTemplate(connectionFactory);\n    jmsTemplate.setReceiveTimeout(1000);\n\
        return jmsTemplate;\n  }\n}\n```\n\nIn this case, we will be using `JmsTemplate`\
    \ for sending messages and for synchronous message reception. Therefore, if we\
    \ want to avoid eventual blocking of the thread reading the JMS messages, it is\
    \ often a good idea to configure the `receiveTimeout` property. [Listing 5-22](#9781484207949_Ch05.xhtml#FPar25)\
    \ shows what the JMS message-sending implementation may look like.\n\n[***Listing\
    \ 5-22***](#9781484207949_Ch05.xhtml#_FPar25). Sending JMS Message (0507-sync-jms-java-config)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter05.text;\n\nimport lombok.extern.slf4j.Slf4j;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.jms.core.JmsTemplate;\n\
    import org.springframework.scheduling.annotation.Scheduled;\nimport org.springframework.stereotype.Component;\n\
    \n@Slf4j\n@Component\npublic class SimpleMessageSender {\n  private static final\
    \ String SIMPLE_MESSAGE = \"simple message\";\n  private JmsTemplate jmsTemplate;\n\
    \n@Autowired\n  public SimpleMessageSender(JmsTemplate jmsTemplate) {\n    super();\n\
        this.jmsTemplate = jmsTemplate;\n  }\n\n@Scheduled(fixedRate = 1000)\n  public\
    \ void send() {\n    log.info(\"Sending message: {}\", SIMPLE_MESSAGE);\n    this.jmsTemplate.convertAndSend(\"\
    queue/ExpiryQueue\", SIMPLE_MESSAGE);\n  }\n}\n```"
