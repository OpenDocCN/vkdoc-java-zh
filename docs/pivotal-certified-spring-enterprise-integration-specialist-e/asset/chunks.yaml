- fmt: '# I started my career as an embedded software developer, and these capabilities
    were also the focus of my studies. But soon I changed to Java and Spring development.
    I worked hard for nearly seven years on web and enterprise projects of various
    sizes and domains. I gained Spring Enterprise Integration Specialist certification
    in 2014.


    I am naturally amazed by the Spring ecosystem; reinventing the wheel is not an
    option for me. A huge passion of mine is automation and testing. I am lazy and
    strongly believe that developers shouldn’t be doing repetitive tasks. That is
    why the examples for this book (`https://github.com/lkrnac/book-eiws-code-samples`)
    are all covered by tests. One of the reasons that Spring is my framework of choice
    is its testability.


    I write blog posts on my site, `www.lkrnac.net`, that are often republished on
    DZone, Java Code Geeks, and Web Code Geeks. I am also interested in modern JavaScript
    development: ES6, Node.js, Grunt, Gulp, LoopBack, and AngularJS. My Twitter handle
    is `@luboskrnac` and my e-mail address is `lubos.krnac@gmail.com`.


    ## About the Technical Reviewer


    ![9781484207949_unFM-02.jpg](images/9781484207949_unFM-02.jpg)


    **Manuel Jordan Elera** is an autodidactic developer and researcher who enjoys
    learning new technologies for his own experiments and creating new integrations.


    Manuel won the 2010 Springy Award—Community Champion and Spring Champion 2013.
    In his little free time, he reads the Bible and composes music on his guitar.
    Manuel is known as `dr_pompeii`. He has tech reviewed numerous books for Apress,
    including *Pro Spring, Fourth Edition* (2014); *Practical Spring LDAP* (2013);
    *Pro JPA 2, Second Edition* (2013); and *Pro Spring Security* (2013).


    Read his 13 detailed tutorials about many Spring technologies and contact him
    through his blog at `www.manueljordanelera.blogspot.com`. You can also follow
    him on his Twitter account, `@dr_pompeii`.


    ## Acknowledgments


    My biggest acknowledgement goes to my wife, Eva, and daughter, Mia, for the endless
    support, patience, and love they have provided me, and not only during my work
    on this book. Thanks very much!


    My mom, dad, and family played a huge part by supporting me from childhood and
    helping me to get to this point. Thank you very much!


    I greatly appreciate all the friends and colleagues I have had the privilege to
    work and live with during my career in Slovakia and Ireland. I learned a lot from
    you, either when I was mentored by you or when I was mentoring you. Thank you
    very much!


    I can’t forget all my nontechnical friends. You’ll probably never read this, but
    you played, and hopefully will continue to play, an important part in my life.
    Thank you very much!


    Another big part of the acknowledgements for this book belongs to the Apress team.
    You were extremely helpful in introducing me to the publishing world. Steve Anglin
    dragged me into this book’s authorship; Mark Powers managed my progress; Matthew
    Moodie provided editing and suggestions; and Sharon Wilkey, Chris Nelson, and
    Dhaneesh Kumar enhanced the final form of the content. Thanks very much!


    A special acknowledgement goes to Manuel Jordan for his valuable guidance, insight,
    and technical expertise while creating this content. Thanks very much!


    ## Introduction


    Java, with its rock-solid JVM, dominates the enterprise world. Spring is a major
    Java platform used within distributed systems. Understanding the Spring portfolio
    is essential for enterprise Java developers. The demand for Spring skills is skyrocketing.


    This books covers all the major features that the Spring portfolio provides for
    enterprise development and prepares you for the Pivotal Certified Enterprise Integration
    Specialist with Spring exam. When you become Pivotal certified, you will have
    one of the most valuable credentials in Java.


    The exam topics covered include tasks and scheduling, remoting, Spring Web Services
    framework, RESTful services with Spring MVC, Spring JMS module, JMS and JTA transactions
    with Spring, and batch processing with the Spring Batch and Spring Integration
    frameworks. This book covers them by explaining examples and focusing on major
    architectural considerations and concepts. The examples are the biggest contributor
    to the page count and are open sourced on GitHub (`https://github.com/lkrnac/book-eiws-code-samples`).


    One of the important aspects of this book is its focus on new and modern abstractions
    provided by the Spring frameworks. Therefore, most of the features are shown with
    Java annotations (if they exist) alongside established XML configurations. Most
    of the examples are also based on the Spring Boot framework. Spring Boot adoption
    has been exponential because of its capability to significantly simplify Spring
    configuration according to sensible opinionated defaults. But Spring Boot is not
    the target of the exam, so all the features are also covered with plain Spring
    configuration examples.


    ### What You’ll Learn


    This book covers the following topics:


    *   How to use Spring to create concurrent applications and schedule tasks

    *   How to do remoting to implement client/server applications

    *   How to work with Spring Web Services to create loosely coupled web services
    and clients

    *   How to use Spring MVC to create RESTful web services and clients

    *   How to integrate JMS for asynchronous messaging-based communication

    *   How to use local JMS transactions with Spring

    *   How to configure global JTA transactions with Spring

    *   How to use Spring Integration to create event-driven pipes-and-filters architectures
    and integrate with external applications

    *   How to use Spring Batch for managed, scalable batch processing that is based
    on both custom and built-in processing components


    ### Who This Book Is For


    This book is for developers and architects who have experience programming and
    developing with the Spring Framework. An understanding of Java is essential for
    this book, as well as knowledge of the dependency injection pattern and Spring
    features for the Inversion of Control container. All other features needed for
    the exam are covered from scratch, with a focus on providing an understanding
    to beginners as well as valuable material for intermediates and experts.


    ### How This Book Is Structured'
