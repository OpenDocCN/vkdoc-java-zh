    因此，通过所有这些上下文实例，我们可以在 SB 流程的任何部分访问 `ExecutionContext` 实例。


    从 Tasklet 访问 ExecutionContext 的示例


    清单 9-49 展示了将状态存储到 `ExecutionContext` 实例中的 `Tasklet`。在此示例中，我们统计了在之前的 `Job` 运行中泡茶的次数。基于此信息，我们调整了一个
    `Step` 的行为。因此，我们的泡茶 `Tasklet` 将带有 `WithCounter` 后缀。


    ***清单 9-49***. 将状态存储到 ExecutionContext 中的 Tasklet (0913-execution-context-tasklet)


    ```

    package net.lkrnac.book.eiws.chapter09.step.tea;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.StepContribution;

    import org.springframework.batch.core.scope.context.ChunkContext;

    import org.springframework.batch.core.step.tasklet.Tasklet;

    import org.springframework.batch.item.ExecutionContext;

    import org.springframework.batch.repeat.RepeatStatus;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class BoilWaterWithCounter implements Tasklet {

      private SimpleExecutablePoint simpleExecutableStep;


    @Autowired

      public BoilWaterWithCounter(SimpleExecutablePoint simpleExecutableStep) {

        super();

        this.simpleExecutableStep = simpleExecutableStep;

      }


    @Override

      public RepeatStatus execute(StepContribution contribution,

          ChunkContext chunkContext) throws Exception {

        simpleExecutableStep.execute("Boil Water");

        ExecutionContext jobExecutionContext =

            chunkContext.getStepContext().getStepExecution().getJobExecution()

                .getExecutionContext();

        int teaCount = jobExecutionContext.getInt("teaCount", 0);

        teaCount++;

        jobExecutionContext.putInt("teaCount", teaCount);

        return RepeatStatus.FINISHED;

      }

    }

    ```


    每次执行此 `Tasklet` 时，它都会递增存储在 `ExecutionContext` 实例中的 `teaCount` 值，该实例通过调用 `chunkContext.getStepContext().getStepExecution().getJobExecution().getExecutionContext()`
    获取。清单 9-50 展示了如何使用此状态。


    ***清单 9-50***. 从 ExecutionContext 检索状态的 Tasklet (0913-execution-context-tasklet)


    ```

    package net.lkrnac.book.eiws.chapter09.step.tea;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.StepContribution;

    import org.springframework.batch.core.scope.context.ChunkContext;

    import org.springframework.batch.core.step.tasklet.Tasklet;

    import org.springframework.batch.item.ExecutionContext;

    import org.springframework.batch.repeat.RepeatStatus;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class AddWaterWithCounter implements Tasklet {

      private SimpleExecutablePoint simpleExecutableStep;


    @Autowired

      public AddWaterWithCounter(SimpleExecutablePoint simpleExecutableStep) {

        super();

        this.simpleExecutableStep = simpleExecutableStep;

      }


    @Override

      public RepeatStatus execute(StepContribution contribution,

          ChunkContext chunkContext) throws Exception {

        String message = "Add Water";

        ExecutionContext jobExecutionContext =

            chunkContext.getStepContext().getStepExecution().getJobExecution()

                .getExecutionContext();

        int teaCount = jobExecutionContext.getInt("teaCount");

        if (teaCount > 2) {

          message = "Add Dirty Water (you should clean kettle with citric acid)";

        }

        simpleExecutableStep.execute(message);

        return RepeatStatus.FINISHED;

      }

    }

    ```


    这是一个 `Tasklet`，其中来自 `ExecutionContext` 的状态将用于调整步骤的行为。每次 SB 执行此 `Tasklet` 时，它也会通过调用
    `chunkContext.getStepContext().getStepExecution().getJobExecution().getExecutionContext()`
    来检索 `Job` 的 `ExecutionContext`，以查找其中存储的 `teaCount` 值。如果 `teaCount` 大于 2，它会模拟执行并附带不同的消息，以突出其对
    `ExecutionContext` 中状态的响应。清单 9-51 展示了此示例的批处理配置。


