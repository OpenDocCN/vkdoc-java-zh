- fmt: "# Transformer Logic and Configuration\n\nThe transformer logic is the same\
    \ as in the previous example, `0811-transformer-generic-xml` in [Listing 8-35](#9781484207949_Ch08_1.xhtml#FPar38),\
    \ but in this case we annotate the class with `@MessagingEndpoint`, which makes\
    \ it eligible for integration component scanning. The conversion method is annotated\
    \ with `@Transformer`, and we also have to specify the mandatory attributes `inputChannel`\
    \ and `outputChannel`. [Listing 8-40](#9781484207949_Ch08_1.xhtml#FPar43) shows\
    \ the SI configuration class.\n\n[***Listing 8-40***](#9781484207949_Ch08_1.xhtml#_FPar43).\
    \ SI Configuration Class for Generic Transformer Example (0812-transformer-generic-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.annotation.IntegrationComponentScan;\n\
    import org.springframework.integration.channel.DirectChannel;\nimport org.springframework.messaging.MessageChannel;\n\
    \n@Configuration\n@IntegrationComponentScan\npublic class SiConfiguration {\n\
    \  @Bean\n  public MessageChannel inChannel() {\n    return new DirectChannel();\n\
    \  }\n\n  @Bean\n  public MessageChannel transformedChannel() {\n    return new\
    \ DirectChannel();\n  }\n}\n```\n\nThis configuration class enables the SI component\
    \ scan based on the `@IntegrationComponentScan` annotation, which is needed to\
    \ scan `SimpleMessageTransformer`. It registers two channels used in our SI flow:\
    \ `inChannel` and `transformedChannel`. [Listing 8-41](#9781484207949_Ch08_1.xhtml#FPar44)\
    \ shows the annotated service activator configuration.\n\n[***Listing 8-41***](#9781484207949_Ch08_1.xhtml#_FPar44).\
    \ Service Activator Used in Generic Transformer Example (0812-transformer-generic-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08.out;\nimport net.lkrnac.book.eiws.chapter08.out.WriteRepository;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
    import org.springframework.stereotype.Service;\n\n@Service\npublic class WriteServiceAnnotated\
    \ {\n  private WriteRepository writeRepository;\n\n  @Autowired\n  public WriteServiceAnnotated(WriteRepository\
    \ writeRepository) {\n    super();\n    this.writeRepository = writeRepository;\n\
    \  }\n\n  @ServiceActivator(inputChannel = \"transformedChannel\")\n  public boolean\
    \ writeAndIndicateSuccess(String message) {\n    return writeRepository.persist(message)\
    \ == 1;\n  }\n}\n```\n\nThis service activator is similar to the service activator\
    \ in example `0809-gateway-generic-javaconfig` ([Listing 8-31](#9781484207949_Ch08_1.xhtml#FPar34)),\
    \ with one difference. The service activator input channel is in this case `transformedChannel`.\
    \ We also borrowed the class from `SiWrapperServiceAnnotated` of the same example\
    \ and [Listing 8-32](#9781484207949_Ch08_1.xhtml#FPar35).\n\nSo the integration\
    \ component scan has the chain `SiWrapperServiceAnnotated` ![image](images/arrow.jpg)\
    \ `SimpleMessageTransformer` ![image](images/arrow.jpg) `WriteServiceAnnotated`.\
    \ [Listing 8-42](#9781484207949_Ch08_1.xhtml#FPar45) covers the main class of\
    \ this example.\n\n[***Listing 8-42***](#9781484207949_Ch08_1.xhtml#_FPar45).\
    \ Main Class of Generic Transformer Based on Java Configuration (0812-transformer-generic-javaconfig)\n\
    \n```\npackage net.lkrnac.book.eiws.chapter08;\nimport lombok.extern.slf4j.Slf4j;\n\
    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceAnnotated;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
    \n@Slf4j\n@SpringBootApplication\npublic class SiApplication {\n  public static\
    \ void main(String[] args) throws InterruptedException {\n    ApplicationContext\
    \ ctx = SpringApplication.run(SiApplication.class, args);\n\n    SiWrapperServiceAnnotated\
    \ wrapperService =\n        ctx.getBean(SiWrapperServiceAnnotated.class);\n  \
    \  String text = \"simple message\";\n    log.info(\"Sending message: \" + text);\n\
    \    boolean result = wrapperService.processText(text);\n    log.info(\"Result:\
    \ \" + result);\n  }\n}\n```\n\nAfter we read the service interface from the context,\
    \ we create the message, log it, and send it to the SI flow. Finally, we log the\
    \ result of this operation. As it returns a value, it is a bidirectional request-response\
    \ type of flow. The output looks the same as for `0809-gateway-generic-javaconfig`\
    \ ([Listing 8-38](#9781484207949_Ch08_1.xhtml#FPar41)). Visualization of the flow\
    \ is not possible, as annotated SI flows are not currently being visualized in\
    \ STS.\n\n## JSON Transformer Example\n\nWe are also going to show a technology-specific\
    \ example of the transformer. Because one of the most common concerns nowadays\
    \ is conversion of JSON into Java objects, we are going to cover it. Obviously,\
    \ we need an object to convert JSON into. So [Listing 8-43](#9781484207949_Ch08_1.xhtml#FPar46)\
    \ shows the `User` class.\n\n[***Listing 8-43***](#9781484207949_Ch08_1.xhtml#_FPar46).\
    \ User Class Used in JSON Transformer Example (0813-transformer-json)\n\n```\n\
    package net.lkrnac.book.eiws.chapter08.model;\nimport lombok.Data;\n\n@Data\n\
    public class User {\n  private String email;\n  private String name;\n}\n```\n\
    \nIt is a simple Java POJO, where getters and setters are generated by the Lombok\
    \ annotation `@Data`. [Listing 8-44](#9781484207949_Ch08_1.xhtml#FPar47) shows\
    \ a fake repository for `User` objects.\n\n[***Listing 8-44***](#9781484207949_Ch08_1.xhtml#_FPar47).\
    \ Fake Repository for User Objects (0813-transformer-json)\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
    import lombok.extern.slf4j.Slf4j;\nimport net.lkrnac.book.eiws.chapter08.model.User;\n\
    import org.springframework.stereotype.Repository;\n\n@Slf4j\n@Repository\npublic\
    \ class UserRepository {\n  public void persistUser(User user) {\n    log.info(\"\
    Object received: \" + user);\n  }\n}\n```\n\nSimilar to the common `WriteRepository`\
    \ class we use in nearly every example, this repository is also faking the persistence\
    \ of the given parameter, which is the `User` object in this case. [Listing 8-45](#9781484207949_Ch08_1.xhtml#FPar48)\
    \ shows the service bean calling this fake repository.\n\n[***Listing 8-45***](#9781484207949_Ch08_1.xhtml#_FPar48).\
    \ Service Bean for Processing User Objects (0813-transformer-json)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter08.out;\nimport net.lkrnac.book.eiws.chapter08.model.User;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.stereotype.Service;\n\
    \n@Service\npublic class UserService {\n  private UserRepository userRepository;\n\
    \n  @Autowired\n  public UserService(UserRepository userRepository) {\n    super();\n\
    \    this.userRepository = userRepository;\n  }\n\n  public void processUser(User\
    \ user) {\n    userRepository.persistUser(user);\n  }\n}\n```\n\nThis service\
    \ bean autowires a `UserRepository` instance as a dependency. The `processUser`\
    \ method takes the `User` object as a parameter, and passes it to `UserRepository`\
    \ to persist it. This is a similar pattern as with `WriteRepository.write()`.\
    \ [Listing 8-46](#9781484207949_Ch08_1.xhtml#FPar49) finally shows the SI flow\
    \ of this example.\n\n[***Listing 8-46***](#9781484207949_Ch08_1.xhtml#_FPar49).\
    \ SI Flow of JSON Transformer Example (File `si-config.xml` in Folder `src/main/resources`\
    \ of Example Project 0813-transformer-json)"
