- fmt: "# Spring MVC Configuration and Mappings\n\nSpring tries to find implementations\
    \ of the `AbstractAnnotationConfigDispatcherServletInitializer` class on the classpath\
    \ and register it into the servlet container. This servlet initializer helper\
    \ enables use of the `DispatcherServlet` out of the box. So our job is to override\
    \ three methods to specify the servlet mapping, root, and servlet context. As\
    \ we have only this servlet in our application and are not using separation in\
    \ the servlet and context mapping, we specify the servlet configuration class\
    \ and leave the root configuration class unused.\n\nRunning the Spring application\
    \ within the servlet container would correctly initialize the servlet even without\
    \ the `web.xml` configuration, as this mechanism is using Servlet 3.0 Java configuration\
    \ under the hood.\n\nThe last configuration example in [Listing 4-15](#9781484207949_Ch04.xhtml#FPar23)\
    \ is a new and modern approach.\n\n[***Listing 4-15***](#9781484207949_Ch04.xhtml#_FPar23).\
    \ Spring Boot Application Configuration (0404-rest-boot-server)\n\n```\npackage\
    \ net.lkrnac.book.eiws.chapter04;\n\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.boot.context.web.SpringBootServletInitializer;\n\
    \n@SpringBootApplication\npublic class RestBootApplication extends SpringBootServletInitializer\
    \ {\n  public static void main(String... args) {\n    SpringApplication.run(RestBootApplication.class,\
    \ args);\n  }\n}\n```\n\nThis class uses the Spring Boot convention instead of\
    \ the configuration approach to spin up the application as a JAR. The single `SpringBootApplication`\
    \ annotation is powerful. It looks into JAR dependencies on the classpath and\
    \ applies a common configuration based on these JAR dependencies. So when we have\
    \ a `spring-boot-starter-web` library as a JAR dependency, Spring boot will do\
    \ the following:\n\n*   Initialize embedded Tomcat\n*   Register a servlet with\
    \ this Spring configuration mapped to the `/` URL\n*   Turn on MVC (`@EnableWebMvc`\
    \ under the hood)\n*   Scan the package and subpackages for Spring components\
    \ and register them into the Inversion of Control container\n\nSo with this configuration\
    \ class, we can replace the servlet and Spring configuration. Simplifying the\
    \ configuration is a significant advantage of the Spring Boot project. Such an\
    \ application can be started from the command line via the standard Java command\
    \ `java –jar 0404-rest-boot-server.jar`.\n\n## Spring MVC Mappings\n\nThe main\
    \ Spring MVC concepts are similar to JAX-RS concepts, but annotations and their\
    \ structures are slightly different. Spring MVC uses these annotations:\n\n```\n\
    @Controller\n```\n\n*   Is a class-level annotation\n*   Declares that the class\
    \ is handling HTTP requests\n    *   Creates a Spring bean, which is a candidate\
    \ for component scanning\n\n```\n@RequestMapping\n```\n\n*   As a class-level\
    \ annotation, specifies the base HTTP mapping configuration for all methods handling\
    \ HTTP requests within the class\n*   As a method-level annotation, specifies\
    \ the method-level HTTP configuration narrowing down the base/class level `@RequestMapping`\
    \ configuration\n*   Provides a flexible mapping of Spring beans and their methods\
    \ onto the URL with the use of parameters. Each of these attributes can be used\
    \ at the method as well as the class level:\n    *   `value`: Maps the method\
    \ to a URI or URL pattern. If both class- and method-level annotations are used,\
    \ the final mapping URI is concatenated.\n    *   `method`: Specifies the HTTP\
    \ method being handled.\n    *   `consumes`: Specifies the content type that can\
    \ be consumed.\n    *   `produces`: Specifies the content type that can be produced.\n\
    \    *   `headers`: Specifies the mapping based on headers. Supports wildcards\
    \ for the headers `Accept` and `Content-Type`.\n    *   `params`: Specifies the\
    \ mapping based on the query parameters of the request. Alongside equality mappings\
    \ (`queryParam=value`), it also can use a nonequality mapping (`queryParam!=value`),\
    \ or that parameter shouldn’t be present in the request (`!queryParam`).\n*  \
    \ Spring provides powerful mappings based on the following:\n    *   URI parameters\
    \ (for example, `/users/{id}`)\n    *   URI patterns with regular expressions\
    \ (for example, `/users/{id:\\\\d*}`)\n    *   URI patterns with wildcards (for\
    \ example, `/users/**`)\n\n### `@RequestBody`\n\n*   Used for annotating method\
    \ parameters in order to access the payload of the HTTP request\n\n### `@PathVariable`\n\
    \n*   Maps the URI template variable onto the method parameter\n*   Annotation\
    \ attribute is not necessary if the URI pattern name is the same as the annotated\
    \ parameter\n\n### `@RequestParam`\n\n*   Maps the query parameter onto the method\
    \ parameter\n*   Annotation attribute is not necessary if the query parameter\
    \ name is the same as the annotated parameter\n\n### `@RequestHeader`\n\n*   Maps\
    \ the HTTP header onto the method parameter\n\n### `@ResponseBody`\n\n*   Used\
    \ for annotating methods. Specifies that the return value of the method will be\
    \ converted into the body of the HTTP response.\n*   This annotation distinguishes\
    \ between REST and MVC usage.\n*   Supports content negotiation (based on the\
    \ `Accept` header); the client can request a certain format of the payload (for\
    \ example, XML, JSON), and Spring will use the appropriate marshaler library (for\
    \ example, JAXB 2, Jackson).\n\n### `@RestController`\n\n*   Convenience annotation\
    \ combining the `@Controller` and `@RequestBody` annotations\n*   Introduced in\
    \ Spring 4.0\n\n### `@ResponseStatus`\n\n*   Hard-codes the response of the method\
    \ to a particular HTTP response status code\n\n### `@ExceptionsHandler`\n\n* \
    \  Is used for handling exceptions that bubble up to `@Controller`, where it is\
    \ specified\n*   Exception types handled by exceptions handler are specified as\
    \ annotation attributes\n*   Is handy for translating exceptions into specific\
    \ HTTP status codes\n\n## Lower-level Abstraction Injection\n\nWith these annotations,\
    \ we can inject various lower-level HTTP message abstractions into our controller\
    \ methods. But Spring also provides annotation-free injections. If, for some reason,\
    \ we need to access lower-level abstractions of the HTTP message, Spring can inject\
    \ these types:\n\n### Servlet Message Abstractions\n\n*   Servlet doesn’t necessarily\
    \ need to use HTTP, so these abstractions don’t contain HTTP-specific data.\n\
    *   Most generic message abstractions conform to the Java Servlets API.\n*   `javax.servlet.ServletRequest`\
    \ is the interface that represents an abstraction for the servlet request.\n*\
    \   `javax.servlet.ServletResponse` is the interface that represents an abstraction\
    \ for the servlet request.\n\n### Java EE HTTP Message Abstractions"
