    we will use in our example.


    [***Listing 9-133***](#9781484207949_Ch09_3_Ext.xhtml#_FPar137). Read Repository
    Used for Partitioning Example (0940-remote-partitioning-slave)


    ```

    package net.lkrnac.book.eiws.chapter09.read;

    import java.util.List;

    import java.util.stream.Collectors;

    import java.util.stream.IntStream;

    import org.springframework.stereotype.Repository;


    @Repository

    public class IndexedReadRepository {

      private static final List<String> RECORDS_LIST = generateRecords(16);


    public synchronized String getRecord(int index) {

        return RECORDS_LIST.get(index);

      }


    private static List<String> generateRecords(int count) {

        return IntStream.range(0, count)

            .mapToObj(idx -> "simple record " + idx)

            .collect(Collectors.toList());

      }

    }

    ```


    This class represents a data set to process. As we will need to separate the data
    set into partitions, we allow reading the example records via indexes, so that
    each slave can index the record belonging to the partition it should process.
    Each record will be exposed via the `getRecord()` method. [Listing 9-134](#9781484207949_Ch09_3_Ext.xhtml#FPar138)
    shows `ItemReader` for this slave project.


    [***Listing 9-134***](#9781484207949_Ch09_3_Ext.xhtml#_FPar138). ItemReader Implementation
    for Partitioned Example (0940-remote-partitioning-slave)


    ```

    package net.lkrnac.book.eiws.chapter09.read;

    import org.springframework.batch.core.StepExecution;

    import org.springframework.batch.core.annotation.BeforeStep;

    import org.springframework.batch.item.ExecutionContext;

    import org.springframework.batch.item.ItemReader;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class PartitionedRecordReader implements ItemReader<String> {

      private IndexedReadRepository readRepository;

      private ExecutionContext executionContext;

      private int partitionEnd;


    @Autowired

      public PartitionedRecordReader(IndexedReadRepository readRepository) {

        super();

        this.readRepository = readRepository;

      }


    @BeforeStep

      public void storeExecutionContext(StepExecution stepExecution) {

        this.executionContext = stepExecution.getExecutionContext();

        this.partitionEnd = executionContext.getInt("partitionEnd");

      }


    @Override

      public String read() {

        int currentIndex = executionContext.getInt("currentIndex");

        String item = (currentIndex <= partitionEnd)

            ? readRepository.getRecord(currentIndex)

            : null;

        executionContext.putInt("currentIndex", currentIndex + 1);

        return item;

      }

    }

    ```


    This item reader injects `IndexedReadRepository` to read from. It also injects
    the `ExecutionContext` instance via the `@BeforeStep` annotation. Notice that
    this `ExecutionContext` instance will be sent to this slave process from the master
    and defines the partition boundaries that this slave should process.


    In this case, the partition boundaries are stored in the `currentIndex`, and `partitionEnd`
    properties are stored in `ExecutionContext`. On each `read()` execution, this
    reader will check whether we reached the end of the partition. If not, it will
    read the record and increase `currentIndex` in the execution context. If the reader
    returns `null`, it means the end of work for this slave.


    This example uses the same JMS configuration from [Listing 9-123](#9781484207949_Ch09_3_Ext.xhtml#FPar127)
    of the previous example, where we define access to the JMS destinations `MasterCommand`
    and `SlaveResponses`. These will be used for communication with the master. The
    slave Spring configuration is presented in [Listing 9-135](#9781484207949_Ch09_3_Ext.xhtml#FPar139).


    [***Listing 9-135***](#9781484207949_Ch09_3_Ext.xhtml#_FPar139). Slave XML Configuration
    for Remote Partitioning Example (File batch-slave-configuration.xml in Folder
    src/main/resource of Example Project 0940-remote-partitioning-slave)'
