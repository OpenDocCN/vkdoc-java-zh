    ### 从 Tasklet 访问 ExecutionContext 的示例


    [***清单 9-49***](#9781484207949_Ch09_1.xhtml#_FPar53) 展示了`Tasklet`，它将状态存储到`ExecutionContext`实例中。在此示例中，我们统计了在之前的`Job`运行中泡茶的次数。基于此信息，我们修改了一个`Step`的行为。因此，我们的茶`Tasklet`将带有`WithCounter`后缀。


    [***Listing 9-49***](#9781484207949_Ch09_1.xhtml#_FPar53). Tasklet That Stores
    State into ExecutionContext (0913-execution-context-tasklet)


    ```

    package net.lkrnac.book.eiws.chapter09.step.tea;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.StepContribution;

    import org.springframework.batch.core.scope.context.ChunkContext;

    import org.springframework.batch.core.step.tasklet.Tasklet;

    import org.springframework.batch.item.ExecutionContext;

    import org.springframework.batch.repeat.RepeatStatus;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class BoilWaterWithCounter implements Tasklet {

      private SimpleExecutablePoint simpleExecutableStep;


    @Autowired

      public BoilWaterWithCounter(SimpleExecutablePoint simpleExecutableStep) {

        super();

        this.simpleExecutableStep = simpleExecutableStep;

      }


    @Override

      public RepeatStatus execute(StepContribution contribution,

          ChunkContext chunkContext) throws Exception {

        simpleExecutableStep.execute("Boil Water");

        ExecutionContext jobExecutionContext =

            chunkContext.getStepContext().getStepExecution().getJobExecution()

                .getExecutionContext();

        int teaCount = jobExecutionContext.getInt("teaCount", 0);

        teaCount++;

        jobExecutionContext.putInt("teaCount", teaCount);

        return RepeatStatus.FINISHED;

      }

    }

    ```


    每次执行此`Tasklet`时，它都会递增存储在`ExecutionContext`实例中的`teaCount`值，该实例通过调用`chunkContext.getStepContext().getStepExecution().getJobExecution().getExecutionContext()`获取。[***清单
    9-50***](#9781484207949_Ch09_1.xhtml#FPar54) 展示了如何使用此状态。


    [***Listing 9-50***](#9781484207949_Ch09_1.xhtml#_FPar54). Tasklet That Retrieves
    State from ExecutionContext (0913-execution-context-tasklet)


    ```

    package net.lkrnac.book.eiws.chapter09.step.tea;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;

    import org.springframework.batch.core.StepContribution;

    import org.springframework.batch.core.scope.context.ChunkContext;

    import org.springframework.batch.core.step.tasklet.Tasklet;

    import org.springframework.batch.item.ExecutionContext;

    import org.springframework.batch.repeat.RepeatStatus;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;


    @Component

    public class AddWaterWithCounter implements Tasklet {

      private SimpleExecutablePoint simpleExecutableStep;


    @Autowired

      public AddWaterWithCounter(SimpleExecutablePoint simpleExecutableStep) {

        super();

        this.simpleExecutableStep = simpleExecutableStep;

      }


    @Override

      public RepeatStatus execute(StepContribution contribution,

          ChunkContext chunkContext) throws Exception {

        String message = "Add Water";

        ExecutionContext jobExecutionContext =

            chunkContext.getStepContext().getStepExecution().getJobExecution()

                .getExecutionContext();

        int teaCount = jobExecutionContext.getInt("teaCount");

        if (teaCount > 2) {

          message = "Add Dirty Water (you should clean kettle with citric acid)";

        }

        simpleExecutableStep.execute(message);

        return RepeatStatus.FINISHED;

      }

    }

    ```


    这是一个`Tasklet`，其中来自`ExecutionContext`的状态将用于修改步骤的行为。每次 SB 执行此`Tasklet`时，它也会通过调用`chunkContext.getStepContext().getStepExecution().getJobExecution().getExecutionContext()`来检索`Job`的`ExecutionContext`，以查找其中存储的`teaCount`值。如果`teaCount`大于
    2，它会模拟使用不同的消息执行，以突出其对`ExecutionContext`中状态的响应。[***清单 9-51***](#9781484207949_Ch09_1.xhtml#FPar55)
    展示了此示例的批处理配置。


    [***Listing 9-51***](#9781484207949_Ch09_1.xhtml#_FPar55). Batch Configuration
    of Example Accessing ExecutionContext from Tasklet (0913-execution-context-tasklet)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddTea;

    import net.lkrnac.book.eiws.chapter09.step.tea.AddWaterWithCounter;

    import net.lkrnac.book.eiws.chapter09.step.tea.BoilWaterWithCounter;

    import org.springframework.batch.core.Job;

    import org.springframework.batch.core.Step;

    import org.springframework.batch.core.configuration.annotation.EnableBatchProcessing;

    import org.springframework.batch.core.configuration.annotation.JobBuilderFactory;

    import org.springframework.batch.core.configuration.annotation.StepBuilderFactory;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;


    @Configuration

    @EnableBatchProcessing

    public class BatchConfiguration {

      @Bean

      public Step boilWaterStep(StepBuilderFactory stepFactory, BoilWaterWithCounter
    boilWater) {

        return stepFactory.get("boilWaterStep").tasklet(boilWater)

            .allowStartIfComplete(true).build();

      }


    @Bean

      public Step addTeaStep(StepBuilderFactory stepFactory, AddTea addTea) {

        return stepFactory.get("addTeaStep").tasklet(addTea)

            .allowStartIfComplete(true).build();

      }


    @Bean

      public Step addWaterStep(StepBuilderFactory stepFactory, AddWaterWithCounter
    addWater) {

        return stepFactory.get("addWaterStep").tasklet(addWater)

            .allowStartIfComplete(true).build();

      }


    @Bean

      public Job prepareTeaJob(JobBuilderFactory jobBuilderFactory,

          @Qualifier("boilWaterStep") Step boilWaterStep,

          @Qualifier("addTeaStep") Step addTeaStep,

          @Qualifier("addWaterStep") Step addWaterStep) {

        return jobBuilderFactory.get("prepareTeaJob")

            .start(boilWaterStep)

            .next(addTeaStep)

            .next(addWaterStep)

            .build();

      }

    }

    ```


    显然，与上一个示例的一个区别是我们使用了有状态的`Tasklet`。第二个区别是启用了步骤，使其能够使用相同的`JobParameters`多次执行。如果我们不允许多次启动`Step`，就无法突出显示如何在不同的`Job`运行之间转换状态。此功能将在本章后面讨论。[***清单
    9-52***](#9781484207949_Ch09_1.xhtml#FPar56) 展示了此示例的主类。


