  raw: 'But our implementation uses the third-party library Lombok (`https://projectlombok.org`).
    Lombok is a handy productivity library that aims to eliminate some verbose parts
    of the Java language. The `hashCode` and `equals` methods are generated by the
    `@EqualsAndHashCode` annotation. Because we need to use only the `email` property
    in the equality contract, we specify it in the annotation parameter `of`. If we
    don’t specify it explicitly, Lombok will use all the properties of `User` POJO
    in the hash/equality contract.


    Moreover, Lombok helps us to generate getters and setters for all properties in
    the `User` class via the `@Data` annotation.


    ![Image](images/sq.jpg) **Note**  `Object.equals` and `Object.hashCode` are fundamental
    principles to understand in object-oriented Java programming: equal objects must
    have equal hash codes. Proper implementation ensures that objects are treated
    equally and handled properly in Java collections. Incorrect implementation can
    lead to confusing bugs. Implementation of `hashCode` and `equals` can be verbose
    and error prone; developers can introduce a lot of problems. Most of them are
    gathered in these Stack Overflow answers: `http://stackoverflow.com/questions/27581/what-issues-should-be-considered-when-overriding-equals-and-hashcode-in-java`.
    Therefore, I *strongly recommend* looking into the Lombok library (`http://projectlombok.org/features/EqualsAndHashCode.html`)
    when overriding the `Object.hashCode` and `Object.equals` contract.


    [Listing 4-4](#9781484207949_Ch04.xhtml#FPar11) shows the second class that will
    be used in most of the REST examples.


    [***Listing 4-4***](#9781484207949_Ch04.xhtml#_FPar11). User Repository Used in
    All REST Examples (0400-rest-common)


    ```

    package net.lkrnac.book.eiws.chapter04.persistence;


    import java.util.Collection;

    import java.util.Collections;

    import java.util.HashMap;

    import java.util.Map;

    import java.util.stream.Collectors;

    import net.lkrnac.book.eiws.chapter04.model.User;

    import org.springframework.stereotype.Repository;


    @Repository

    public class UserRepository {

      private final Map<Integer, User> users = new HashMap<>();

      private int userSequence;


    public synchronized Collection<User> getAllUsers() {

        return Collections.unmodifiableCollection(users.values());

      }


    public synchronized User getUser(int identifier) {

        if (identifier == -1) {

          throw new UnsupportedOperationException("Identifier -1 is not supported.");

        }

        return users.get(identifier);

      }


    public synchronized int addUser(User user) {

        users.put(userSequence, user);

        return userSequence++;

      }


    public synchronized void updateOrAddUser(int identifier, User user) {

        users.put(identifier, user);

      }


    public synchronized User deleteUser(int identifier) {

        return users.remove(identifier);

      }


    public synchronized Collection<User> getUsersInterval(int lowerId, int upperId)
    {

        //@formatter:off

        Collection<User> usersInIdInterval = users.entrySet().stream()

            .filter(p -> p.getKey() >= lowerId && p.getKey() <= upperId)

            .collect(Collectors.toMap(p -> p.getKey(), p -> p.getValue()))

            .values();

        //@formatter:on

        return Collections.unmodifiableCollection(usersInIdInterval);

      }

    }

    ```


    The `UserRepository` class is annotated with the `@Repository` annotation to indicate
    that it’s a Spring bean sitting on the persistence layer. To simplify the examples,
    there is a simple in-memory cache for `User` objects defined as `Map<Integer,
    User>`. But such caching is not suitable for production use. Caching and persisting
    application state should be handled by specialized databases or in memory grids
    that are battle tested for such purposes. Also this particular usage breaks the
    stateless REST principle. But for simplicity, let’s pretend that this class is
    calling a persistence layer for storing `User` objects. We are interested in the
    web layer anyway.


    First, the `getAllUsers` method returns a map of all users stored in this cache.
    The returned map is encapsulated in an unmodifiable wrapper, so that we are sure
    its instance won’t be replaced during the application run. The `getUser` method
    returns a single `User` object based on a given identifier. To highlight the error-handling
    features, we don’t support `-1` and the user identifier and throw `UnsupportedOperationException`.


    The `addUser` method is little more complicated. It uses an identifier counter
    called `userSequence` to assign a unique identifier to the newly created `User`
    object and increases its value afterward. The `updateOrAddUser` method accepts
    the `identifier` and `User` parameters and replaces or adds this instance into
    the map slot represented by the identifier. The `deleteUser` method simply removes
    the object from the map.


    The last method from this class is `getUsersInterval`. It reads a collection of
    users based on a given interval of identifiers. This isn’t a realistic use case,
    but it helps demonstrate some features of Spring MVC mappings. The reading logic
    uses Java 8\. First, we convert the map into a stream and apply filtering. Values
    filtering is based on a lower and upper bound of identifiers. After filtering,
    we collect the results into a map and wrap the values into an unmodifiable map.
    This gives us a filtered collection of users.


    Another problem with this implementation is the singleton bean scope of `UserService`.
    Fields/cache/state in a singleton is always dangerous from a multithreading point
    of view. We can easily have various requests being handled by our application
    at the same time. These requests are served in separate threads. In this situation,
    various threads could be accessing this in-memory cache at the same time. We need
    to make this class thread-safe, so we made all access methods to our cache synchronized.
    It isn’t an effective method of caching, but as we mentioned, it is just for example
    purposes.


    You may ask, why not use `ConcurrentHashMap` as a map implementation and exclude
    synchronization?. But remember that the `addUser` method consists of two actions
    that should be atomic (adding to the map, and reading and increasing the sequence).
    With the `ConcurrentHashMap` approach without synchronization, this wouldn’t be
    atomic and could lead to thread-unsafe scenarios. For example, two threads could
    use the same sequence number to store different objects, and thus we would lose
    one of them.


