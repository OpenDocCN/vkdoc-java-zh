- fmt: "A `bridge` is simple routing endpoint that connects two message channels or\
    \ channel adapters. It is therefore used as a middle component, which can obviously\
    \ participate in unidirectional and bidirectional flows. It can be configured\
    \ via the XML element `<int:bridge>` or via the `@BridgeFrom` or `@BridgeTo` annotations,\
    \ where it is used to mark channel beans. Use includes passive as well as active\
    \ mode. In active mode, it needs to use the `<int:poller>` or `@Poller` subelement.\n\
    \nWe may, for example, use it when we need to consume messages in a passive component\
    \ from a channel designed for an active consumer (`PollableChannel` is described\
    \ later in the chapter). In this case, the channel and component are incompatible,\
    \ and the active bridge component will help us bridge this gap. Another use case\
    \ is to connect two SI flows or systems where data conversion is not needed.\n\
    \n## Bridge Example with XML Configuration\n\n[Listing 8-81](#9781484207949_Ch08_1.xhtml#FPar84)\
    \ shows the SI flow of the XML bridge example.\n\n[***Listing 8-81***](#9781484207949_Ch08_1.xhtml#_FPar84).\
    \ SI Configuration of XML Bridge Example (File `si-config.xml` in Folder `src/main/resources`\
    \ of Example Project `0821-bridge-xml`)\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\n  xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n  xmlns:int=\"http://www.springframework.org/schema/integration\"\
    \n  xmlns:context=\"http://www.springframework.org/schema/context\"\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/integration\n    http://www.springframework.org/schema/integration/spring-integration.xsd\"\
    >\n\n<int:gateway default-request-channel=\"inChannel\"\n    service-interface=\"\
    net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid\" />\n\n<int:channel id=\"\
    inChannel\" >\n    <int:queue capacity=\"10\" />\n  </int:channel>\n\n<int:bridge\
    \ input-channel=\"inChannel\" output-channel=\"outputChannelAdapter\" >\n    <int:poller\
    \ fixed-rate=\"100\" />\n  </int:bridge>\n\n<int:outbound-channel-adapter id=\"\
    outputChannelAdapter\"\n    ref=\"writeService\" method=\"write\">\n  </int:outbound-channel-adapter>\n\
    </beans>\n```\n\nMessages will be passed to the SI infrastructure via the inbound\
    \ message gateway, which uses our common `SiWrapperServiceVoid` as a service interface\
    \ and sends messages to `inChannel`. In this case, `inChannel` is configured as\
    \ a temporary store of 10 messages. This type of channel is explained in detail\
    \ later, in the “QueueChannel” section.\n\nThis channel is connected to the bridge\
    \ component, which is in this case active, and polls `inChannel` every 100 ms.\
    \ The output side of the bridge is connected directly to the outbound channel\
    \ adapter. The `output-channel` attribute of the bridge and `id` of the channel\
    \ adapter match, which means that these components are interconnected. The output\
    \ channel adapter is mapped to our common method `WriteService.write()`. [Listing\
    \ 8-82](#9781484207949_Ch08_1.xhtml#FPar85) shows the main class of this example.\n\
    \n[***Listing 8-82***](#9781484207949_Ch08_1.xhtml#_FPar85). Main Class of XML\
    \ Bridge Example (`0821-bridge-xml`)\n\n```\npackage net.lkrnac.book.eiws.chapter08;\n\
    import net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.ApplicationContext;\n\
    import org.springframework.context.annotation.ImportResource;\n\n@SpringBootApplication\n\
    @ImportResource(\"classpath:si-config.xml\")\npublic class SiApplication {\n \
    \ public static void main(String[] args) throws InterruptedException {\n    ApplicationContext\
    \ ctx = SpringApplication.run(SiApplication.class, args);\n\nSiWrapperServiceVoid\
    \ wrapperService =\n        ctx.getBean(SiWrapperServiceVoid.class);\n    wrapperService.processText(\"\
    message1\");\n    wrapperService.processText(\"message2\");\n  }\n}\n```\n\nThis\
    \ starts the Spring context and sends two messages to the SI flow via the `SiWrapperServiceVoid`\
    \ bean. [Listing 8-83](#9781484207949_Ch08_1.xhtml#FPar86) covers the output when\
    \ we run this main class.\n\n[***Listing 8-83***](#9781484207949_Ch08_1.xhtml#_FPar86).\
    \ Output of XML Bridge Example\n\n```\n2015-08-27 19:12:54.862  INFO 21268 ---\
    \ [ask-scheduler-1]\nn.l.b.e.chapter08.out.WriteRepository    : Text persisted:\
    \ message1\n2015-08-27 19:12:54.864  INFO 21268 --- [ask-scheduler-1]\nn.l.b.e.chapter08.out.WriteRepository\
    \    : Text persisted: message2\n```\n\nAs expected, both messages are being persisted.\
    \ Notice that this happens in the task scheduler thread, which is created by the\
    \ `<int:poller>` subcomponent of the bridge. [Figure 8-10](#9781484207949_Ch08_1.xhtml#Fig10)\
    \ shows the SI graph for this SI flow.\n\n![9781484207949_Fig08-10.jpg](images/9781484207949_Fig08-10.jpg)\n\
    \n[Figure 8-10](#9781484207949_Ch08_1.xhtml#_Fig10). SI graph of XML bridge example\n\
    \n## `@BridgeFrom` Example\n\n[Listing 8-84](#9781484207949_Ch08_1.xhtml#FPar87)\
    \ shows the service interface sitting on the input side of the flow.\n\n[***Listing\
    \ 8-84***](#9781484207949_Ch08_1.xhtml#_FPar87). Service Interface for `@BridgeFrom`\
    \ Example (`0822-bridge-from-javaconfig`)\n\n```\npackage net.lkrnac.book.eiws.chapter08.in;\n\
    import org.springframework.integration.annotation.Gateway;\nimport org.springframework.integration.annotation.MessagingGateway;\n\
    \n@MessagingGateway\npublic interface SiWrapperServiceAnnotated {\n  @Gateway(requestChannel\
    \ = \"inChannel\")\n  public boolean processText(String text);\n}\n```\n\nThis\
    \ bidirectional service interface is configured as an inbound gateway. [Listing\
    \ 8-85](#9781484207949_Ch08_1.xhtml#FPar88) shows the output bean of the SI flow.\n\
    \n[***Listing 8-85***](#9781484207949_Ch08_1.xhtml#_FPar88). Output of SI Flow\
    \ for `@BridgeFrom` Example (`0822-bridge-from-javaconfig`)\n\n```\npackage net.lkrnac.book.eiws.chapter08.out;\n\
    import net.lkrnac.book.eiws.chapter08.out.WriteRepository;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.integration.annotation.ServiceActivator;\nimport org.springframework.stereotype.Service;\n\
    \n@Service\npublic class WriteServiceAnnotated {\n  private WriteRepository writeRepository;\n\
    \n@Autowired\n  public WriteServiceAnnotated(WriteRepository writeRepository)\
    \ {\n    super();\n    this.writeRepository = writeRepository;\n  }\n\n@ServiceActivator(inputChannel\
    \ = \"bridgedChannel\")\n  public boolean writeAndIndicateSuccess(String message)\
    \ {\n    return writeRepository.persist(message) == 1;\n  }\n}\n```\n\n`WriterServiceAnnotated`\
    \ is configured as a service activator listening on `bridgedChannel`. [Listing\
    \ 8-86](#9781484207949_Ch08_1.xhtml#FPar89) shows the Java SI configuration in\
    \ which the bridge is configured.\n\n[***Listing 8-86***](#9781484207949_Ch08_1.xhtml#_FPar89).\
    \ SI Configuration of `@BridgeFrom` Example (`0822-bridge-from-javaconfig`)\n\n\
    ```\npackage net.lkrnac.book.eiws.chapter08;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.annotation.BridgeFrom;\n\
    import org.springframework.integration.annotation.IntegrationComponentScan;\n\
    import org.springframework.integration.annotation.Poller;\nimport org.springframework.integration.channel.DirectChannel;\n\
    import org.springframework.integration.channel.QueueChannel;\nimport org.springframework.messaging.MessageChannel;\n\
    import org.springframework.messaging.PollableChannel;\n\n@Configuration\n@IntegrationComponentScan\n\
    public class SiConfiguration {\n  @Bean\n  public PollableChannel inChannel()\
    \ {\n    return new QueueChannel();\n  }\n\n@Bean\n  @BridgeFrom(value = \"inChannel\"\
    , poller = @Poller(fixedDelay = \"100\"))\n  public MessageChannel bridgedChannel()\
    \ {\n    return new DirectChannel();\n  }\n}\n```"
  raw: 'A *bridge* is simple routing endpoint that connects two message channels or
    channel adapters. It is therefore used as a middle component, which can obviously
    participate in unidirectional and bidirectional flows. It can be configured via
    the XML element `<int:bridge>` or via the `@BridgeFrom` or `@BridgeTo` annotations,
    where it is used to mark channel beans. Use includes passive as well as active
    mode. In active mode, it needs to use the `<int:poller>` or `@Poller` subelement.


    We may, for example, use it when we need to consume messages in a passive component
    from a channel designed for an active consumer (`PollableChannel` is described
    later in the chapter). In this case, the channel and component are incompatible,
    and the active bridge component will help us bridge this gap. Another use case
    is to connect two SI flows or systems where data conversion is not needed.


    Bridge Example with XML Configuration


    [Listing 8-81](#9781484207949_Ch08_1.xhtml#FPar84) shows the SI flow of the XML
    bridge example.


    [***Listing 8-81***](#9781484207949_Ch08_1.xhtml#_FPar84). SI Configuration of
    XML Bridge Example (File si-config.xml in Folder src/main/resources of Example
    Project 0821-bridge-xml)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:int="http://www.springframework.org/schema/integration"

      xmlns:context="http://www.springframework.org/schema/context"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/integration

        http://www.springframework.org/schema/integration/spring-integration.xsd">


    <int:gateway default-request-channel="inChannel"

        service-interface="net.lkrnac.book.eiws.chapter08.in.SiWrapperServiceVoid"
    />


    <int:channel id="inChannel" >

        <int:queue capacity="10" />

      </int:channel>


    <int:bridge input-channel="inChannel" output-channel="outputChannelAdapter" >

        <int:poller fixed-rate="100" />

      </int:bridge>


    <int:outbound-channel-adapter id="outputChannelAdapter"

        ref="writeService" method="write">

      </int:outbound-channel-adapter>

    </beans>

    ```


    Messages will be passed to the SI infrastructure via the inbound message gateway,
    which uses our common `SiWrapperServiceVoid` as a service interface and sends
    messages to `inChannel`. In this case, `inChannel` is configured as a temporary
    store of 10 messages. This type of channel is explained in detail later, in the
    “QueueChannel” section.


    This channel is connected to the bridge component, which is in this case active,
    and polls `inChannel` every 100 ms. The output side of the bridge is connected
    directly to the outbound channel adapter. The `output-channel` attribute of the
    bridge and `id` of the channel adapter match, which means that these components
    are interconnected. The output channel adapter is mapped to our common method
    `WriteService.write()`. [Listing 8-82](#9781484207949_Ch08_1.xhtml#FPar85) shows
    the main class of this example.


    [***Listing 8-82***](#9781484207949_Ch08_1.xhtml#_FPar85). Main Class of XML Bridge
    Example (0821-bridge-xml)


    ```

