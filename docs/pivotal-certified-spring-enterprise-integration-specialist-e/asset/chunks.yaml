    同样，此 Java 配置与之前示例中 `prepareTeaJob` 的配置类似。请注意在构建 `Job` 实例时，监听器是如何注册到其配置中的。主类同样是通用的
    Spring Boot 主类，当我们运行它时，会得到与之前示例（清单 9-71）相同的输出。


    步骤拦截示例的 XML 配置


    清单 9-74 展示了步骤监听器的实现。


    ***清单 9-74***. 带注解的步骤监听器 (0919-step-listener-xml)


    ```

    package net.lkrnac.book.eiws.chapter09;

    import org.springframework.batch.core.ExitStatus;

    import org.springframework.batch.core.StepExecution;

    import org.springframework.batch.core.StepExecutionListener;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Component;

    import net.lkrnac.book.eiws.chapter09.step.SimpleExecutablePoint;


    @Component

    public class HotWaterStepListener implements StepExecutionListener {

      private SimpleExecutablePoint executablePoint;


    @Autowired

      public HotWaterStepListener(SimpleExecutablePoint executablePoint) {

        super();

        this.executablePoint = executablePoint;

      }


    @Override

      public void beforeStep(StepExecution stepExecution) {

        executablePoint.execute("小心热水！");

      }


    @Override

      public ExitStatus afterStep(StepExecution stepExecution) {

        executablePoint.execute("涉及热水操作的步骤已完成");

        return ExitStatus.COMPLETED;

      }

    }

    ```


    由于我们实现了 `StepExecutionListener`，因此无法更改拦截方法的名称，因为它们需要与此接口中的签名匹配。签名还包括 `StepExecution`
    类型的参数。在我们的示例中未使用它，但它可用于在监听器中访问 SB 元数据。清单 9-75 展示了使用此监听器的 XML 配置。


    ***清单 9-75***. 包含步骤监听器的 XML 批处理配置（示例项目 0919-step-listener-xml 的 src/main/resource
    文件夹中的文件 batch-config.xml）


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans:beans xmlns:beans="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns="http://www.springframework.org/schema/batch"

      xsi:schemaLocation="http://www.springframework.org/schema/batch

        http://www.springframework.org/schema/batch/spring-batch.xsd

        http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd">


    <job id="prepareTeaJob">

        <step id="boilWaterStep" next="addTeaStep">

          <tasklet ref="boilWater" />

          <listeners>

            <listener ref="hotWaterStepListener" />

          </listeners>

        </step>

        <step id="addTeaStep" next="addWaterStep">

          <tasklet ref="addTea" />

        </step>

        <step id="addWaterStep">

          <tasklet ref="addWater" />

          <listeners>

            <listener ref="hotWaterStepListener" />

          </listeners>

        </step>

      </job>

    </beans:beans>

    ```


