    Spring Batch Admin


    我们通常需要监控并手动控制批处理。例如，由于之前损坏的数据已手动修复，我们可能需要重启某个 `JobExecution`。为此，SB 提供了一个名为 Spring
    Batch Admin 的项目（`http://docs.spring.io/spring-batch-admin`）。


    这是一个 Web 应用程序，可以嵌入到我们的批处理应用程序中，用于控制和监控批处理。由于它是一个 Web 组件，需要托管在 Servlet 容器中。我们可以使用
    `spring-batch-admin-manager` 和 `spring-batch-admin-resources`，并将 `Job` 的 XML 配置放置在
    `META-INF/spring/batch/jobs` 目录下。


    为了介绍 Spring Batch Admin 的功能，我们将使用一个可从 Spring Batch Admin 网站（`http://docs.spring.io/downloads/nightly/release-download.php?project=BATCHADM`）下载的示例应用程序。本示例中我们使用的版本是
    1.3.1.RELEASE。当我们在本地端口为 8080 的 Servlet 容器中运行此应用程序时（例如，在 STS 中使用默认的 Pivotal tc
    Server），我们可以在浏览器中输入 `http://localhost:8080/spring-batch-admin-sample` 地址来控制批处理。


    ![Image](img/sq.jpg) **注意**  以下所有图片均来自 spring.io 网站 `http://docs.spring.io/spring-batch-admin/screenshots.html`。


