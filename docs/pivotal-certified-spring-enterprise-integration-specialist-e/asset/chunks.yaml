    消息端点


    消息端点可能是 SI 组件中最多样化的一个。SI 参考文档将其称为管道-过滤器架构中的*过滤器*。我们之前提到过，为了发送或接收消息，端点必须连接到一个或多个消息通道。其主要作用是封装应用程序逻辑，并将其与
    SI 消息传递基础设施解耦。我们的应用程序代码通常甚至不知道它是 SI 流程的一部分。一个很好的例子是前面代码清单 8-4 中展示的 `WriteService`。乍一看这个类，我们无法判断它是标准的
    Spring Bean 还是 SI 流程的一部分。


    正如我们提到的，在 XML 配置中建模 SI 流程是合理的。消息端点作为一个通用组件，没有对应的 XML 标签表示，因为每种特定类型的组件都有自己的 XML
    标签。但 SI 流程的某些部分可以通过 Java 注解进行配置。在这种情况下，需要通用注解来进行消息端点配置。


    SI 框架中第一个也是最重要的注解是 `@EnableIntegration`。当我们使用 Spring 的 `@Configuration` 注解时，它允许声明标准的
    SI Bean。使用 Spring Boot 的 `@EnableAutoConfiguration` 注解或 `@SpringBootApplication`
    可以达到相同的效果。因此，当我们使用带有自动配置的 Spring Boot 时，可以省略 `@EnableIntegration`，因为它会自动为我们配置好。

