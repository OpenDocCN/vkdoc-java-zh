  raw: '*   `SimpleAsyncTaskExecutor`: Creates a new thread for each task. Supports
    a limited number of threads (unlimited by default). When this limit is reached,
    execution of subsequent tasks is blocked until some of the threads finish execution.

    *   `SyncTaskExecutor`: Task execution is performed synchronously in the calling
    thread. Mainly intended for testing purposes.

    *   `ConcurrentTaskExecutor`: Wraps the provided `java.util.concurrent.Executor`
    and exposes it as `TaskExecutor`. It is useful when the developer wants to create
    a custom Java SE 5 thread pool and use it in a Spring environment. Not very common.
    In most cases, you would probably want to use `ThreadPoolTaskExecutor`.

    *   `SimpleThreadPoolTaskExecutor`: Subclass of `org.quartz.simpl.SimpleThreadPool`
    (Quartz Scheduler’s implementation of a thread pool). It is useful because it
    can understand Spring’s life-cycle callbacks.

    *   `ThreadPoolTaskExecutor`: Wrapper for `java.util.concurrent.ThreadPoolExecutor`.
    Enables you to create configurable thread pools with parameters such as `corePoolSize`,
    `maxPoolSize`, `keepAliveSeconds`, and `queueCapacity`.


    There are also some Java EE implementations of `TaskExecutor`. These implementations
    act as a bridge between the Spring environment and multithreading support of the
    enterprise application container where the configuration of thread pools is located:


    *   `org.springframework.jca.work.WorkManagerTaskExecutor`: Adapter for the JCA
    1.5 `javax.resource.spi.work.WorkManager` interface.

    *   `org.springframework.scheduling.commonj.WorkManagerTaskExecutor`: Adapter
    for the CommonJ `commonj.work.WorkManager` interface.

    *   `org.springframework.jca.work.glassfish.GlassFishWorkManagerTaskExecutor`:
    Adapter for the GlassFish JCA `WorkManager`.

    *   `org.springframework.jca.work.jboss.JbossWorkManagerTaskExecutor`: Adapter
    for the JBoss JCA WorkManager.


    All these task executors can be declared as standard Spring beans via the `@Bean`
    annotation or the `<bean/>` tag. An example is shown later in this chapter, in
    the “Configuring Asynchronous Tasks” section.


    org.springframework.scheduling.Trigger


    The `Trigger` interface, shown in [Listing 1-16](#9781484207949_Ch01.xhtml#FPar19),
    is designed for determining the next execution time based on a previous execution.
    It is used by Spring for scheduling.


    [***Listing 1-16***](#9781484207949_Ch01.xhtml#_FPar19). Trigger Interface


    ```

    public interface Trigger {

            Date nextExecutionTime(TriggerContext triggerContext);

    }

    ```


    It has two implementations:


    *   `CronTrigger`: Allows triggering based on Cron expressions.

    *   `PeriodicTrigger`: Allows you to specify Fixed Rate or Fixed Delay triggers.
    For switching between them, it exposes a flag via `PeriodicTrigger.setFixedRate(boolean
    fixedRate)`. The default triggering is Fixed Delay.


    ![Image](images/sq.jpg) **Note**  Cron is used within Unix systems for job scheduling.
    A Cron expression has six parts separated by spaces. Each part specifies the minute,
    hour, day of month, month, day of week, and year. The year is not mandatory, so
    commonly only five parts are used. But the original Cron expression allows triggering
    with the shortest intervals 1 minute long. Therefore, Spring uses a Quartz Scheduler
    style of Cron syntax. It uses seven parts instead of six, and the first one is
    in seconds. The year is not mandatory, as with Unix Cron. With powerful placeholders
    for each part, it is possible to specify complicated patterns for scheduling (for
    example, `* */10 9-17 * * MON-FRI` represents triggering every 10 minutes during
    work hours). Understanding Cron expressions isn’t in the scope of this book, but
    it’s important to know that Spring integrates this powerful triggering mechanism.
    For more information about the Quartz flavor of Cron expressions, go to `www.quartz-scheduler.org/documentation/quartz-2.1.x/tutorials/crontrigger`.


    Task Scheduler


    `org.springframework.scheduling.TaskScheduler`, shown in [Listing 1-17](#9781484207949_Ch01.xhtml#FPar21),
    is Spring’s abstraction for scheduling tasks.


    [***Listing 1-17***](#9781484207949_Ch01.xhtml#_FPar21). TaskScheduler Interface
    Signature


    ```

    public interface TaskScheduler {

            ScheduledFuture<?> schedule(Runnable task, Trigger trigger);

            ScheduledFuture<?> schedule(Runnable task, Date startTime);

            ScheduledFuture<?> scheduleAtFixedRate(Runnable task, Date startTime,
    long period);

            ScheduledFuture<?> scheduleAtFixedRate(Runnable task, long period);

            ScheduledFuture<?> scheduleWithFixedDelay(Runnable task, Date startTime,
    long delay);

            ScheduledFuture<?> scheduleWithFixedDelay(Runnable task, long delay);

    }

    ```


    As you can see from the interface declaration, Spring can schedule one-time or
    recurring jobs based on a fixed rate and fixed delay approach. It can also use
    the `Trigger` interface for complex Cron-based scheduling.


    Although it’s important to remember how `TaskExecutor` and `Trigger` interfaces
    work, we don’t need to use them directly. Spring provides powerful annotations
    and XML tags for configuring multithreading and scheduling behavior. So `TaskExecutor`
    and `Trigger` are used under the hood.


    Configuring Asynchronous Tasks


    For enabling multithreading support, Spring provides the class-level annotation
    `@EnableAsync`. A class annotated with `@EnableAsync` should be used in conjunction
    with the `@Configuration` annotation. So the `@EnableAsync` annotation basically
    switches on Spring asynchronous support.


    The `@Async` method-level annotation is designed to define asynchronous logic.
    Such tasks will be executed in a separate thread. This annotation provides much
    wider possibilities when the developer designs asynchronous APIs. Earlier sections
    about the `Callable<T>` interface explained that Java SE APIs can return value
    and bubble up exceptions from asynchronous code. Passing parameters into asynchronous
    logic is a unique feature of `@Async` annotation that Spring provides. But methods
    annotated by `@Async` have two important limitations:


    *   The method must return `void` or `Future<T>` (similar to `Callable<T>`).

    *   The method can’t be used with life-cycle callbacks (for example, `@PostConstruct`).


    `@Async` annotation has one optional parameter, which specifies the name of the
    task executor bean used for executing asynchronous logic. Let’s explore use of
    these annotations in an example. [Listing 1-18](#9781484207949_Ch01.xhtml#FPar22)
    shows logic that will be executed in a separate thread.


    [***Listing 1-18***](#9781484207949_Ch01.xhtml#_FPar22). Asynchronous Task (0102-async-job
    example project)


    ```

    package net.lkrnac.book.eiws.chapter01.async.task;


    import java.util.concurrent.Future;

    import org.springframework.scheduling.annotation.Async;

    import org.springframework.scheduling.annotation.AsyncResult;

    import org.springframework.stereotype.Component;


    @Component

    class AsyncTask {

      private static final int SIMULATE_IO = 1000;


    @Async("customTaskExecutor")

      public Future<String> call(int parameter) throws InterruptedException {

        String threadName = Thread.currentThread().getName();


    Thread.sleep(SIMULATE_IO);

        if (parameter % 2 == 0) {

          throw new UnsupportedOperationException(threadName + " threw exception");

        }

        return new AsyncResult<String>(threadName + " have parameter " + parameter);

      }

    }

    ```


    The class `AsyncTask` is annotated with the `@Component` annotation, which specifies
    that the `AsyncTask` class is a candidate for component scanning by Spring. This
    class has only one method, `call`. First it reads the name of the current thread.
    Then it simulates a blocking I/O operation, which is 1 second long. Finally, it
    simulates an error if the given parameter is odd, or the return name of the thread
    if the given parameter is even. This behavior is in place to highlight possibilities
    of this API.'
  trans: '

    *   `SimpleAsyncTaskExecutor`：为每个任务创建一个新线程。支持有限数量的线程（默认无限制）。达到此限制时，后续任务的执行将被阻塞，直到部分线程完成执行。

    *   `SyncTaskExecutor`：任务在调用线程中同步执行。主要用于测试目的。

    *   `ConcurrentTaskExecutor`：包装提供的 `java.util.concurrent.Executor`，并将其暴露为 `TaskExecutor`。当开发者想要创建自定义的
    Java SE 5 线程池并在 Spring 环境中使用时，它非常有用。不常见。大多数情况下，你可能更希望使用 `ThreadPoolTaskExecutor`。

    *   `SimpleThreadPoolTaskExecutor`：`org.quartz.simpl.SimpleThreadPool`（Quartz
    Scheduler 的线程池实现）的子类。它很有用，因为它能理解 Spring 的生命周期回调。

    *   `ThreadPoolTaskExecutor`：`java.util.concurrent.ThreadPoolExecutor` 的包装器。允许你使用
    `corePoolSize`、`maxPoolSize`、`keepAliveSeconds` 和 `queueCapacity` 等参数创建可配置的线程池。


    还有一些 `TaskExecutor` 的 Java EE 实现。这些实现充当 Spring 环境与线程池配置所在的企业应用容器多线程支持之间的桥梁：


    *   `org.springframework.jca.work.WorkManagerTaskExecutor`：JCA 1.5 `javax.resource.spi.work.WorkManager`
    接口的适配器。

    *   `org.springframework.scheduling.commonj.WorkManagerTaskExecutor`：CommonJ `commonj.work.WorkManager`
    接口的适配器。

    *   `org.springframework.jca.work.glassfish.GlassFishWorkManagerTaskExecutor`：GlassFish
    JCA `WorkManager` 的适配器。

    *   `org.springframework.jca.work.jboss.JbossWorkManagerTaskExecutor`：JBoss JCA
    WorkManager 的适配器。


    所有这些任务执行器都可以通过 `@Bean` 注解或 `<bean/>` 标签声明为标准 Spring Bean。本章稍后的“配置异步任务”部分将给出一个示例。


    org.springframework.scheduling.Trigger


    `Trigger` 接口（如清单 1-16 所示）旨在根据上一次执行来确定下一次执行时间。Spring 使用它进行调度。


    ***清单 1-16***. Trigger 接口


    ```

    public interface Trigger {

            Date nextExecutionTime(TriggerContext triggerContext);

    }

    ```


    它有两个实现：


    *   `CronTrigger`：允许基于 Cron 表达式触发。

    *   `PeriodicTrigger`：允许你指定固定速率或固定延迟触发器。为了在两者之间切换，它通过 `PeriodicTrigger.setFixedRate(boolean
    fixedRate)` 暴露一个标志。默认触发方式为固定延迟。


    ![Image](img/sq.jpg) **注意**  Cron 在 Unix 系统中用于作业调度。一个 Cron 表达式由六个部分组成，各部分之间用空格分隔。每个部分指定分钟、小时、月份中的日期、月份、星期几和年份。年份不是必需的，因此通常只使用五个部分。但原始的
    Cron 表达式允许以最短 1 分钟的间隔触发。因此，Spring 使用 Quartz Scheduler 风格的 Cron 语法。它使用七个部分而不是六个，并且第一部分是秒。年份不是必需的，与
    Unix Cron 一样。通过每个部分强大的占位符，可以指定复杂的调度模式（例如，`* */10 9-17 * * MON-FRI` 表示在工作时间内每 10
    分钟触发一次）。理解 Cron 表达式不在本书的讨论范围内，但了解 Spring 集成了这种强大的触发机制很重要。有关 Quartz 风格 Cron 表达式的更多信息，请访问
    `www.quartz-scheduler.org/documentation/quartz-2.1.x/tutorials/crontrigger`。


    任务调度器


    `org.springframework.scheduling.TaskScheduler`（如清单 1-17 所示）是 Spring 用于调度任务的抽象。


    ***清单 1-17***. TaskScheduler 接口签名


    ```

    public interface TaskScheduler {

            ScheduledFuture<?> schedule(Runnable task, Trigger trigger);

            ScheduledFuture<?> schedule(Runnable task, Date startTime);

            ScheduledFuture<?> scheduleAtFixedRate(Runnable task, Date startTime,
    long period);

            ScheduledFuture<?> scheduleAtFixedRate(Runnable task, long period);

            ScheduledFuture<?> scheduleWithFixedDelay(Runnable task, Date startTime,
    long delay);

            ScheduledFuture<?> scheduleWithFixedDelay(Runnable task, long delay);

    }

    ```


    从接口声明可以看出，Spring 可以基于固定速率和固定延迟方式调度一次性或重复性作业。它还可以使用 `Trigger` 接口进行基于 Cron 的复杂调度。


    虽然记住 `TaskExecutor` 和 `Trigger` 接口的工作原理很重要，但我们不需要直接使用它们。Spring 提供了强大的注解和 XML 标签来配置多线程和调度行为。因此，`TaskExecutor`
    和 `Trigger` 是在底层使用的。


    配置异步任务


    为了启用多线程支持，Spring 提供了类级别注解 `@EnableAsync`。带有 `@EnableAsync` 注解的类应与 `@Configuration`
    注解一起使用。因此，`@EnableAsync` 注解基本上开启了 Spring 的异步支持。


    `@Async` 方法级别注解旨在定义异步逻辑。此类任务将在单独的线程中执行。当开发者设计异步 API 时，此注解提供了更广泛的可能性。前面关于 `Callable<T>`
    接口的部分解释了 Java SE API 可以从异步代码中返回值并抛出异常。将参数传递给异步逻辑是 Spring 提供的 `@Async` 注解的一个独特功能。但由
    `@Async` 注解的方法有两个重要限制：


    *   该方法必须返回 `void` 或 `Future<T>`（类似于 `Callable<T>`）。

    *   该方法不能与生命周期回调（例如 `@PostConstruct`）一起使用。


    `@Async` 注解有一个可选参数，用于指定用于执行异步逻辑的任务执行器 Bean 的名称。让我们通过一个示例来探索这些注解的使用。清单 1-18 显示了将在单独线程中执行的逻辑。


    ***清单 1-18***. 异步任务（0102-async-job 示例项目）


    ```

    package net.lkrnac.book.eiws.chapter01.async.task;


    import java.util.concurrent.Future;

    import org.springframework.scheduling.annotation.Async;

    import org.springframework.scheduling.annotation.AsyncResult;

    import org.springframework.stereotype.Component;


    @Component

    class AsyncTask {

      private static final int SIMULATE_IO = 1000;


    @Async("customTaskExecutor")

      public Future<String> call(int parameter) throws InterruptedException {

        String threadName = Thread.currentThread().getName();


    Thread.sleep(SIMULATE_IO);

        if (parameter % 2 == 0) {

          throw new UnsupportedOperationException(threadName + " threw exception");

        }

        return new AsyncResult<String>(threadName + " have parameter " + parameter);

      }

    }

    ```


    类 `AsyncTask` 使用 `@Component` 注解进行注解，这指定了 `AsyncTask` 类是 Spring 组件扫描的候选对象。此类只有一个方法
    `call`。它首先读取当前线程的名称。然后模拟一个持续 1 秒的阻塞 I/O 操作。最后，如果给定参数为奇数，则模拟一个错误；如果给定参数为偶数，则返回线程名称。此行为旨在突出此
    API 的可能性。

