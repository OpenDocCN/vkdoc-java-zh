    \    request.setEmail(email);\n\nUserDetailsResponse userDetails =\n        (UserDetailsResponse)\
    \ webServiceTemplate.marshalSendAndReceive(request);\n    return userDetails;\n\
    \  }\n}\n```\n\nThe method `getUserDetails` uses an injected `WebServiceTemplate`\
    \ to send request and receive response POJOs via the method `marshalSendAndReceive`.\
