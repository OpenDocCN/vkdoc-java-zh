    is usage of the `@PostConstruct` annotation. Previously, we used scheduling for
    sending messages as it was handy for describing delays in synchronous reception
    in the previous chapter.


    This chapter focuses on the reliability of JMS message delivery. `@PostConstruct`
    is a better fit for sending a single message after the Spring context is initialized,
    which is better suited to highlighting acknowledge and transactional characteristics.


    AUTO_ACKNOWLEDGE Mode


    We already mentioned that one of the mechanisms for ensuring reliable JMS message
    delivery is JMS acknowledge modes. The first one is called `AUTO_ACKNOWLEDGE`,
    whereby JMS message action reception is immediately reflected in the JMS destination
    and changes are immediately visible to other JMS sessions open against the related
    JMS destination. It is the default JMS acknowledge mode, so it is used if we don’t
    configure JMS resources otherwise.


    So with successful reception, the message is *immediately marked as delivered*
    and discarded from the JMS destination. Reception is considered successful after
    return from the `MessageConsumer.receive()` call or after successful completion
    of the `MessageListener.onMessage()` call. The only exception to the three-phase
    JMS message reception (receive/process/acknowledge) is synchronous reception via
    JMS 2.0 `JMSContext` in `AUTO_ACKNOWLEDGE` mode. This reception merges receiving
    and acknowledging into one step, which is followed by processing on the client.


    But with Spring, there is an important gotcha when we use JMS listeners. To remind
    Spring constructs of JMS message listening, there are two types of listener containers:
    `SimpleJmsListenerContainerFactory` and `DefaultJmsListenerContainerFactory`.'
