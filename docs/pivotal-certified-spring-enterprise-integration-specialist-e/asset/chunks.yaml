    \  }\n}\n```\n\nThe Apache HttpComponents wrapper (`HttpComponentsMessageSender`)\
    \ needs to be configured as a `messageSender` property into `WebServiceTemplate`.\
    \ A similar approach for registering special message senders would apply for non-HTTP\
    \ protocols also.\n\nSo now that you know how to create `WebServiceTemplate`,\
    \ let’s take a look at its use in [Listing 3-24](#9781484207949_Ch03.xhtml#FPar29).\n\
    \n[***Listing 3-24***](#9781484207949_Ch03.xhtml#_FPar29). WebServiceTemplate\
    \ for Payload Root Routing(0303-ws-boot-client)\n\n```\npackage net.lkrnac.book.eiws.chapter03.ws.boot.client;\n\
    \nimport net.lkrnac.book.eiws.chapter03.ws.boot.model.UserDetailsResponse;\nimport\
