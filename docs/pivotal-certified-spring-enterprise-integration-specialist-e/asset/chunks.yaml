    \ can be done via the `ExecutionContext` class. This class encapsulates a map\
    \ of type `Map<String, Object>`. So we are able to store any type of state that\
    \ needs to be transferred between steps or chunk-oriented item handlers. This\
    \ can be handy if we need to store partial results during batch processing. But,\
