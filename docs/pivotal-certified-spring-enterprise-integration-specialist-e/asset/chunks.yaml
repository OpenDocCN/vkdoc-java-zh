  raw: 'import javax.annotation.PostConstruct;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.stereotype.Repository;


    @Repository

    public class SimpleRepository {

      private final JdbcTemplate jdbcTemplate;


    @Autowired

      public SimpleRepository(JdbcTemplate jdbcTemplate) {

        super();

        this.jdbcTemplate = jdbcTemplate;

      }


    @PostConstruct

      public void initDbTable() {

        jdbcTemplate.execute("drop table TEXT_TABLE if exists");

        jdbcTemplate.execute("create table TEXT_TABLE(TEXT varchar(30))");

      }


    public void persistText(String text) {

        jdbcTemplate.update("insert into TEXT_TABLE values (?)", text);

      }

    }

    ```


    This class is similar to the DAO from [Chapter 6](#9781484207949_Ch06.xhtml).
    The only difference is a lack of querying for the number of stored text entries.
    The `@Repository` annotation marks this class as a Spring bean sitting on the
    persistence layer. For executing JDBC queries, it injects the `JdbcTemplate` instance
    via the constructor.


    The `initDbTable()` method creates a fresh table after the Spring context is initialized.
    Its execution at this stage is ensured by the `@PostConstruct` annotation. This
    construct is obviously not typical for relational databases, but in this case
    we are using an in-memory database and want to have it empty for the examples,
    for each application to run.


    The `persistText()` method is used to insert given text into the in-memory database.
    [Listing 7-2](#9781484207949_Ch07.xhtml#FPar3) shows the service-layer class used
    for processing text messages.


    [***Listing 7-2***](#9781484207949_Ch07.xhtml#_FPar3). Service Class Used for
    JTA Examples (0700-jta-common)


    ```

    package net.lkrnac.book.eiws.chapter07;


    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Service;


    @Slf4j

    @Service

    public class SimpleService {

      private final SimpleRepository simpleRepository;


    @Autowired

      public SimpleService(SimpleRepository simpleRepository) {

        super();

        this.simpleRepository = simpleRepository;

      }


    public void processText(String text) {

        log.info("Process Message: {}", text);

        simpleRepository.persistText(text);

      }

    }

    ```


    Again this service is similar to that in the preceding chapter. The only difference
    is the missing method for reading the count of stored text records. The `@Service`
    annotation places this Spring bean at the service layer. The `@Slf4j` annotation
    is a Lombok feature for enabling easy access to the SLF4J logger. Constructor
    injection of the `SimpleRepository` instance enables use of the DAO bean instance.


    Notice that we didn’t use the `@Transactional` annotation for any of these classes,
    because we plan to also include the JMS data source in the global transaction
    boundary. So the JMS data source will be used in components using `SimpleService`.


    The `processText()` method is used in the examples to process text messages by
    logging the given message and persisting via the `simpleRepository` bean. The
    last class shared across the JTA examples is shown in [Listing 7-3](#9781484207949_Ch07.xhtml#FPar4).


    [***Listing 7-3***](#9781484207949_Ch07.xhtml#_FPar4). JMS Message Sender Used
    by JTA Examples (0700-jta-common)


    ```

    package net.lkrnac.book.eiws.chapter07;

    import javax.jms.ConnectionFactory;

    import lombok.extern.slf4j.Slf4j;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.beans.factory.annotation.Qualifier;

    import org.springframework.jms.core.JmsTemplate;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;


    @Slf4j

    @Component

    public class SimpleMessageSender {

      private static final String SIMPLE_MESSAGE = "simple message";

      private final JmsTemplate jmsTemplate;


    @Autowired

      public SimpleMessageSender(

          @Qualifier("nonXaJmsConnectionFactory") ConnectionFactory nonXaConnectionFactory)
    {

        super();

        jmsTemplate = new JmsTemplate(nonXaConnectionFactory);

      }


    @Scheduled(initialDelay = 1000, fixedRate = Long.MAX_VALUE)

      public void send() {

        log.info("Sending message: {}", SIMPLE_MESSAGE);

        jmsTemplate.convertAndSend("ExpiryQueue", SIMPLE_MESSAGE);

      }

    }

    ```


    As you may notice, this sender is similar to that in the preceding chapter, with
    a few differences. First, we are not using the `@PostConstruct` annotation to
    trigger the sending of the message. This is because JTA configuration is sometimes
    not initiated fast enough after creating this `SimpleMessageSender` bean, so sending
    the message must wait for the configuration in this example. In a real-life application,
    this sending would be triggered by the external system consuming our application.
    Therefore, for this example, we can rely on scheduling with `initialDelay`, which
    will delay sending of the example message after context creation. The scheduling
    attribute `fixedRate` is configured to `Long.MAX_VALUE` to ensure that the second
    message won’t be sent during execution of the JTA example.


    The second difference as compared to the example in the previous chapter, is injection
    of `nonXaConnectionFactory` instead of the `jmsTemplate` bean. This is needed
    because we want to have the sender of the message be independent of the JTA transaction.
    Therefore, in upcoming examples, we will create alongside the XA-compliant JMS
    `connectionFactory`, a `nonXaConnectionFactory` bean, which bypasses JTA ceremonies.
    Bear in mind that in real life this sender wouldn’t be placed in our message consumer
    application.


    Other constructs should be familiar. The constructor injection of `JmsTemplate`
    enables use of the Spring bean for sending messages. The `send()` method itself
    first logs the fact that the message is being sent and performs this action.


    Spring JTA Example with XML Configuration


    Our first example of JTA integration with Spring is based mainly on XML configuration.
    There is no need to introduce a new XML namespace for it, because we operate in
    a non-JEE environment. If our application were deployed into a JEE container,
    we would use the `jee` namespace. First, we need to configure Atomikos as the
    JTA transaction manager for the Spring application. [Listing 7-4](#9781484207949_Ch07.xhtml#FPar5)
    shows this XML configuration.


    [***Listing 7-4***](#9781484207949_Ch07.xhtml#_FPar5). XML Configuration of JTA-Related
    Beans (File spring-jta-config.xml in Folder src/main/resources in Example Project
    0701-jta-xml-config)


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <beans xmlns="http://www.springframework.org/schema/beans"

      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

      xmlns:tx="http://www.springframework.org/schema/tx"

      xsi:schemaLocation="http://www.springframework.org/schema/beans

        http://www.springframework.org/schema/beans/spring-beans.xsd

        http://www.springframework.org/schema/tx

        http://www.springframework.org/schema/tx/spring-tx.xsd">


    <tx:annotation-driven transaction-manager="transactionManager"/>


    <bean id="userTransactionManager" class="com.atomikos.icatch.jta.UserTransactionManager"

          init-method="init" destroy-method="close"/>


    <bean id="transactionManager"

          class="org.springframework.transaction.jta.JtaTransactionManager">

        <property name="transactionManager" ref="userTransactionManager"/>

        <property name="userTransaction" ref="userTransactionManager"/>

      </bean>

    </beans>

    ```'
