    Spring Boot JMS 发布/订阅示例


    还有一种新方法可以配置与我们应用程序一起托管的嵌入式 HornetQ 或 ActiveMQ JMS 代理。这种配置可以帮助我们将 Spring 配置样板代码减少到最低限度，并专注于业务逻辑。


    到目前为止，我们一直使用 HornetQ 作为我们的 JMS 提供者。但最新稳定版的 Spring Boot 在发布/订阅模式下无法与嵌入式 HornetQ
    配合使用。因此，在本示例中，我们切换到嵌入式 ActiveMQ JMS 代理。ActiveMQ 默认会在 JMS 目的地被配置之前创建它。因此，不需要针对
    ActiveMQ 的特殊配置。


    唯一关键的配置在清单 5-54 中。


    ***清单 5-54***. Spring Boot 发布/订阅配置 (示例项目 0515-publish-subscribe-spring-boot 中
    src/main/resources 文件夹下的 application.properties 文件)


    ```

    spring.jms.pub-sub-domain=true

    ```


    此配置为本示例中使用的 JMS 提供者启用了发布/订阅模式。值得一提的是，Spring Boot 外部化了大量用于配置底层技术的属性。通过这种方式，我们可以修改
    Spring Boot 的默认行为以适应我们的需求。在这个例子中，我们将 JMS 通信从点对点模式切换到了发布/订阅模式。


    所有其他类与之前的纯 Spring Java 配置示例相同，但在本例中，我们不需要指定任何 JMS 配置 bean，因为 Spring 会自动为我们配置它们。


    将 JMS 与更高级的消息抽象集成


    Spring 框架在 4.0 版本中引入了统一的消息抽象，可用于各种协议，如 STOMP、WebSockets、AMQP、JMS 或 SockJS。这些抽象位于一个名为
    `spring-messaging` 的新 Spring 模块下。此支持的核心抽象是 `org.springframework.messaging.Message<T>`，旨在抽象上述协议的所有消息。


    Spring 4.1 创建了一个新的 `JmsMessagingTemplate` 类，它构建在 `JmsTemplate` 之上，提供了与通用消息抽象的集成（参见清单
    5-55）。与 `JmsTemplate` 类似，`JmsMessagingTemplate` 也用于同步接收和发送消息。另一方面，监听通用消息也可以与 `@JmsListener`
    注解集成。


